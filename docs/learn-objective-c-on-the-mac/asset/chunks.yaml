    ![9781430245421_Fig05-01.jpg](img/9781430245421_Fig05-01.jpg)


    图 5-1。 Cocoa UI 元素示例


    **注意** 在本书中，我们有时会使用 Cocoa 类名（例如 `NSButton`），有时则会使用它们常用的通俗名称（例如 button）。通常，在讨论代码时我们会使用类名，而在其他大多数情况下则使用通俗名称，但无论哪种情况，我们实际上指的都是同一种东西。


    我们将使用这些类来创建一个模拟数据库应用的简单程序。用户可以通过一些简单的 GUI 控件来编辑和创建对象，但编辑结果不会被保存（这就是“模拟”的由来）。在后面的章节中，我们将学习如何使用
    Core Data 将对象保存到磁盘，但现在我们将专注于 GUI。


    ## 创建 VillainTracker 应用程序


    本章要创建的应用程序名为 `VillainTracker`。它是一个简单的应用程序，用于追踪超级反派、他们最后已知的下落、特殊能力等信息。对于任何称职的超级英雄团队来说，这都是一款应该安装在电脑系统中的应用，因此对于我们这样的英雄来说，它显然是一个入门应用。我们将把
    `VillainTracker` 的开发分为两个阶段：第一阶段，我们将创建一个简单的应用程序，用于编辑单个反派的信息；第二阶段（参见第 6 章），我们将添加管理整个反派列表的功能。这将演示基于模型-视图-控制器（MVC）设计模式开发应用程序的基础知识，该模式已被开发者们使用多年。无论您对此模式是否有经验，了解
    MVC 在 Cocoa 应用中的典型实现方式都非常重要，因为它确实是 Cocoa 中良好应用设计的基石。


    与之前的应用程序一样，我们首先在 Xcode 中创建一个新的应用程序项目。我们将在 Interface Builder 模式下创建 GUI，然后通过使用 control-drag
    的强大功能在生成的类中创建输出口和操作，将其与生成的代码连接起来。然后，我们将回到 Xcode，学习如何编写代码来设置和获取值——即 GUI 控件中显示的值——每次学习一个类，以便了解每个类的工作方式。通常，在构建
    Cocoa 应用时，我们会在构建和修改 GUI 与实现代码之间来回切换：先布置一些 UI，然后实现其背后的代码，检查它是否按预期工作，然后迭代。由于这个应用相对简单，我们将先布置
    GUI，然后再实现其背后的功能。


    **注意** 在讨论 GUI 问题时，术语“视图”和“控件”通常可以互换使用。从技术上讲，大多数 Cocoa 用户界面类既是视图也是控件，至少在 Cocoa
    的意义上是这样。


    `NSView` 是一个允许在屏幕上绘图的类；`NSControl` 是 `NSView` 的子类，它通过响应用户事件、在目标对象中触发操作等方式扩展了 `NSView`。因此，我们应用中视图层的大部分将由“控件”对象组成，这当然不能与控制器层混淆。如果这听起来令人困惑，只需记住“控件”是视图的一种特定类型，而“控制器”是控制器层中协调视图和模型对象的对象。我们保证，过一段时间，这一切都会变得非常清晰。


    那么，让我们创建一个新的应用程序项目。与之前的章节一样，启动 Xcode，如果它已经在运行则切换到它，然后按下 `![image](img/arrow1.jpg)N`，或者从
    **文件** 菜单中选择 **新建项目**。在新建项目辅助工具中，在左侧的 OS X 下，单击 *应用程序*；然后在右侧的大窗格中，单击 *Cocoa 应用程序*，然后单击“下一步”。


    标准的 Xcode 新建项目选项面板将提示我们输入应用程序的标识信息。在“产品名称”中输入“VillainTracker”，并在相应的两个框中输入您选择的组织名称和公司标识符。本次的类前缀，我们的示例也将使用字符串“VillainTracker”。确保选中
    *使用自动引用计数*，并取消选中其他复选框。单击“下一步”。


    接下来看到的标准保存面板允许我们导航到选择的目录并在那里创建新项目。使用控件导航到您主目录或桌面上的合适位置，然后单击“创建”。现在，Xcode 会在指定位置创建一个名为
    `VillainTracker` 的新文件夹，其中包含一些默认内容，例如 `VillainTracker.xcodeproj` 项目文件，并打开一个新窗口，显示我们项目的设置。


    ## 构建界面


    我们将从使用 Interface Builder 编辑项目的主 nib 文件开始，为 `VillainTracker` 创建 GUI。我们将添加 GUI 控件来捕获我们需要了解的每个宿敌的信息，并学习如何将控件组织成逻辑组，以及如何在调整窗口大小时让它们正确地重新定位。我们还将把它们连接到控制器类，在控制器中创建输出口，并将所有内容连接在一起。


    首先在 Xcode 的导航器窗格（屏幕左侧的项目导航器窗格中）中找到 `MainMenu.xib`。单击 `MainMenu.xib`，它将在 Xcode
    的中央窗格中以 Interface Builder 模式打开。我们将看到新应用程序的默认菜单集，以及在 Interface Builder 编辑器区域左侧的
    Dock 中的几个图标——三个占位对象（文件所有者、第一响应者和应用程序）和另外四个对象（主菜单、窗口 - VillainTracker、VillainTrackerAppDelegate
    和字体管理器）。单击“窗口 - VillainTracker”对象，一个空白的窗口将在编辑器区域中打开。


    ### 摆弄文本字段


    现在可以开始构建 GUI 了。我们将一次构建一小部分，但可以参考图 5-2 中窗口的完成版本，以了解布局。


    ![9781430245421_Fig05-02.jpg](img/9781430245421_Fig05-02.jpg)


    图 5-2。 完整的 `VillainTracker` 窗口看起来是这样的


    我们要设置的第一个控件是几个 `NSTextField`。`NSTextField` 是一个非常有用的类，它提供堪比成熟文本编辑器的文本编辑能力，即使在仅输入几个字符的场景下也是如此。在
    Xcode 窗口右侧实用工具面板的 *对象库* 区域中，确保顶部选中了 *对象* 选项卡，然后在其中选择 *对象库* 或其子项 Cocoa。然后点击窗口底部的搜索字段，输入“text
    field”。

    '
- fmt: '库中可用的对象列表缩减到只有几个，其中包括一个名为`Text Field`的对象。它应该位于列表顶部附近。将其中一个（`Text Field`，不是`Text
    Field Cell`，后者是一个略有不同的对象，我们将在第6章和第7章中遇到）拖到我们空白的窗口上，并将其放置在窗口的左上角附近。我们将在字段的左侧添加一个项目，因此请在字段和窗口边缘之间留出一些空间。现在，在选中新的文本字段的情况下，通过按`⌘D`复制它。一个新的文本字段会出现，并覆盖前一个。将新的文本字段向下拖动一点，窗口中会出现一些蓝色参考线，帮助将其对齐到前一个字段的下方。当它看起来大致如图5-3所示时，松开鼠标。


    ![9781430245421_Fig05-03.jpg](images/9781430245421_Fig05-03.jpg)


    **图5-3.** `VillainTracker`的前两个文本字段


    现在我们需要标记这些对象，以便用户知道它们代表什么。回到`Object Library`窗格，点击搜索字段（如有必要，删除已有的文本），并输入单词“label”。它应该会显示一个名为`Label`的对象。将一个标签拖到窗口上，放在我们创建的第一个文本字段的左侧。同样，当我们拖到另一个对象附近时，会出现蓝色线条，帮助我们将其定位；这些参考线有助于我们相对于标签旁边的文本字段进行顶部、中心、文本基线或底部的对齐。当我们在Interface
    Builder中编辑此标签时，它会水平调整大小以匹配其内容。这没问题——只是默认情况下文本是水平居中的，这意味着在编辑时，它会向两个方向扩展并开始与右侧的`NSTextField`重叠。为避免这种情况，打开`Attributes
    Inspector`窗格（`⌘4`），找到并点击`Text Field`设置下的`Align Right`按钮（提示：它看起来与大多数文字处理器中对应的按钮一样）。这样做将使标签在更改其内容时仍能保持其右边距。


    将标签中的文本编辑为“Name:”，然后通过按`⌘D`复制此标签。将新标签向下拖动一点，使其与下方的文本字段对齐，将其编辑为“Last Known Location:”，这样我们就完成了！如果你在标签中没有为那么多文本留出足够的空间，它会与文本字段重叠。可以随意移动对象，使布局更整洁。


    ### 让用户选择日期


    我们要准备的下一个GUI对象是一个日期选择器，它将允许用户指定反派最后一次出现的日期。日期选择器克服了解析和呈现日期时可能遇到的模棱两可和相互竞争的日期格式标准，这是一个令人头疼的问题，而且我们在Cocoa中有一个很棒的内置日期选择器，所以我们就用它吧。


    在`Object Library`窗格的搜索字段中，输入“date”并查看出现的内容。应该有一个名为`Date Picker`的条目。抓住它，将其拖入我们的窗口，并放在我们之前创建的`NSTextFields`下方，再次使用拖动到目标位置附近时出现的蓝色参考线。此控件的默认宽度小于其上方`NSTextFields`的默认宽度，因此它不会占用相同的水平空间，但这没关系。只需使其与其他控件的左边缘对齐即可。现在点击之前创建的某个标签，通过按`⌘D`再次复制它。将其向下拖动，与日期选择器对齐，并将文本更改为“Last
    Seen:”。图5-4显示了窗口现在应该是什么样子。


    ![9781430245421_Fig05-04.jpg](images/9781430245421_Fig05-04.jpg)


    **图5-4.** 我们有了一个良好的开端，为窗口添加控件和标签


    ### 创建组合框


    现在该创建组合框了。如果我们有一组预定义的有效字符串值可供选择，但又希望允许用户输入他们自己的值，那么这个控件非常有用。这对于反派的`Sworn Enemy`属性来说非常完美。我们可以提供一些默认的超级英雄名字供选择，同时仍然允许用户输入我们未预料到的名字。


    转到`Object Library`窗格，在搜索字段中输入“combo”，会看到一个`Combo Box`出现在列表中。将其拖到我们的窗口中，放在`NSTextFields`和`NSDatePicker`下方。再次使用蓝色参考线，使其与上方控件的左边缘对齐。再次复制一个现有的标签，将其放置在组合框的左侧，并将其重命名为“Sworn
    Enemy:”。


    现在，让我们用一些默认值填充组合框。我们希望用户能够指定任何超级英雄，甚至是那些我们不知道的（这就是我们选择组合框的原因），但为了方便起见，我们应该用一些流行超级英雄的名字预加载此控件，因为流行的超级英雄往往也是最招致敌人的。


    点击我们刚添加的组合框，并打开`Attributes Inspector`窗格（`⌘4`）。在上部区域有一个标有`Items`的位置，我们可以在其中添加将出现在组合框中的项目。图5-5显示了检查器此部分的操作。使用`+`按钮添加一个新项目，然后双击出现的“Item”文本，并将其更改为“Superman”。现在重复此过程，使用`+`按钮添加几个项目，每次编辑“Item”文本并将其更改为你喜欢的某个超级英雄的名字。


    ![9781430245421_Fig05-05.jpg](images/9781430245421_Fig05-05.jpg)


    **图5-5.** 在Interface Builder中配置`NSComboBox`


    添加完超级英雄列表后，通过从**Editor**菜单中选择**Simulate Document**来测试界面。我们的窗口应该会出现，我们可以验证为组合框创建的项目在点击时是否出现。我们还可以在任何字段（包括组合框）中输入文本，并与日期选择器进行交互。完成后，按`⌘Q`返回Xcode。


    ### 使用级别指示器显示评级


    我们要创建的下一个控件是`NSLevelIndicator`，我们将用它来显示和指定任何反派的邪恶程度。我们将允许用户为此值指定0到10的星级评分，而`NSLevelIndicator`实际上会将其显示为一行星星。


    回到`Object Library`窗格，在底部的搜索字段中输入“level”。出现的一个类是`NSLevelIndicator`，我们应该将其拖出并放入窗口中，再次使用蓝色参考线使其与先前控件的左边缘对齐，正好位于上一步添加的组合框下方。


    现在我们需要稍微配置一下这个新对象。`NSLevelIndicator`类具有许多内置的显示样式，适用于不同的用途。在Interface Builder中创建的新实例的默认样式称为“Discrete”，但我们要更改它以匹配我们要显示的内容，这相当于一种评级。调出`Attributes
    Inspector`（`⌘4`），我们将看到第一个选项是一个标有`Style`的弹出菜单（见图5-6）。点击弹出菜单，改为选择`Rating`。级别指示器会立即变为显示几颗星星的视图。


    ![9781430245421_Fig05-06.jpg](images/9781430245421_Fig05-06.jpg)


