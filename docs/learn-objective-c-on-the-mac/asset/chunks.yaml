    Up    This chapter contained a simple demonstration of how to maintain a list
    of items, display them in a table view, and edit the details for the selected
    item in a separate set of controls. We learned a bit about how `NSTableView` uses
    its `dataSource` to access items for display and editing, and saw how it informs
    its delegate when the selection changes, allowing us to manually update the content
    in views that are dependent on the table view’s selection.    If you’re familiar
    with other desktop GUI development environments, some of this may have seemed
    a bit foreign to you, but we hope you can see some of the advantages included
    in the approach that Cocoa supports, such as providing a clean division between
    code and GUI layout. However, at this point it’s time for a confession: the way
    we’ve been doing things thus far isn’t necessarily the best way to do these sorts
    of things in Cocoa. As simple as it’s all been so far, we’ve actually been showing
    you the hard way to solve some of these problems! During the past few years, a
    new approach to GUI programming has taken root in the Cocoa community, and it’s
    becoming more prevalent all the time. It’s a technology called Cocoa bindings,
    and it’s the topic of [Chapter 7](#9781430245421_Ch07.xhtml).    Chapter    7    Cocoa
    Bindings    [Chapters 5](#9781430245421_Ch05.xhtml) and [6](#9781430245421_Ch06.xhtml)
    covered how to connect a controller object to various kinds of view objects, both
    to display values and to retrieve new values in response to user actions.'
