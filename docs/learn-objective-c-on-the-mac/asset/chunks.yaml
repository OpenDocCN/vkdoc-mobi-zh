    the program and drops us back at the lldb prompt. As before, select the top stack
    frame (`objc_exception_throw`) in the debug navigator, and we can once again enter
    some commands at the lldb prompt to get some info about the exception:    ```
     (lldb) po $rax $0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]: object
    cannot be nil (lldb) po [$rax name] $1 = 0x00007fff783e0a30 NSInvalidArgumentException
    ```    And if we scan back down the call stack looking for the first location
    that shows black instead of grey, we’ll find `-[ECAppDelegate invalidArgumentException_insertNil]`,
