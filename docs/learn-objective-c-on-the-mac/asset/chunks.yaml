- fmt: "我们的应用应该有一个包含“Turbo 开”和“Turbo 关”两个菜单项的“工具”菜单，每次只能启用其中一个；点击已启用的菜单项应切换复选框状态并更改两个菜单项的状态，使得只有另一个菜单项被启用。此外，点击复选框应适当地影响每个菜单项的启用/禁用状态。这是一种通过绑定来启用和禁用菜单项的简单方法，但我们不能避而不谈的是，这种用法有点刻意，并非处理菜单中应用级布尔值的常规方式。在这种情况下，相比于两个菜单项（其中一个始终被禁用），你更可能使用一个带有复选框的单个菜单项来指示状态，就像我们窗口中的复选框一样。事实证明，这比我们已经做的还要容易。回到`MainMenu.xib`，在\
    \ Interface Builder 画布中打开“工具”菜单，从*对象库*中拖出一个新的菜单项到“工具”菜单上。将此新项目命名为“Turbo”，并配置其*值*绑定，使用`turbo`键路径连接到\
    \ App Delegate。这样就完成了！我们不需要通过 Control-拖拽来设置菜单项的操作；Cocoa Bindings 会为我们管理一切。保存、**运行**并进行测试。请注意，这种快速方法甚至不需要`toggleTurbo:`方法，因此如果需要，我们可以删除该方法以及“Turbo\
    \ 开”和“Turbo 关”菜单项。\n\n### 使用 First Responder 启用/禁用\n\n现在，我们将展示一种更常见的自动启用和禁用菜单项的方法，该方法为我们提供了更细粒度的控制，以便可以根据选中的窗口、窗口中选中的文本字段或其他控件等，自动更新每个菜单项的启用状态。这种方法使用响应者链，与本章前面描述的“颜色面板如何查找对象以传递所选颜色”有些类似。在这种情况下，沿着响应者链搜索的方法是`validateUserInterfaceItem:`，其声明如下：\n\
    \n```\n- (BOOL)validateUserInterfaceItem:\n    (id <NSValidatedUserInterfaceItem>)anItem;\n\
    ```\n\n如果该方法在响应者链的对象中实现，它会在适当的时候被调用来确定用户界面项（本例中为菜单项）是否应被启用。在实现此方法时，我们可以使用`anItem`获取有关即将被启用或禁用的对象的一些信息；我们可以查询它的操作（以便与我们的某个方法进行比较）和它的标签（如果我们更愿意与在对象上设置的控制标签进行比较）。通常我们只想使用操作。我们将很快演示这是如何工作的，但首先我们可能需要澄清一下这个方法何时被调用。\n\
    \n基本思路如下：每当 Cocoa 即将绘制菜单时（通常是在用户点击菜单栏时），都会对每个菜单项进行一些检查，以确定它应该被启用还是禁用。[图 11-9](#9781430245421_Ch11.xhtml#Fig9)\
    \ 中的流程图粗略地概述了事件的顺序。\n\n![9781430245421_Fig11-09.jpg](images/9781430245421_Fig11-09.jpg)\n\
    \n[图 11-9](#9781430245421_Ch11.xhtml#_Fig9). 菜单系统如何决定菜单项是否应被启用\n\n这一切的要点是，菜单项的目标对象（无论是显式配置的还是通过响应者链找到的）决定了菜单项当前是否应被启用。这意味着我们可以对每个菜单项进行完全动态控制。\n\
    \n通过在我们每个包含由菜单项调用的方法（无论是直接调用还是通过响应者链）的类中实现`validateUserInterfaceItem:`，我们可以定义一些逻辑，菜单系统会在适当的时候调用这些逻辑，并根据我们返回的结果自动启用或禁用每个菜单项。\n\
    \n让我们用一个例子来说明这一点。我们将在 nib 文件中创建一个新窗口，并为其匹配一个专门管理该窗口的新委托类，该类将实现`validateUserInterfaceItem:`来处理菜单项的状态。在真实的应用程序中，你可能会基于模型对象的内容来决定，但为了简单起见，我们将根据窗口中选中的内容来启用或禁用菜单项。\n\
    \n首先，在 Xcode 中创建一个新类，一个普通的`NSObject`子类，名为`MLListWindowDelegate`。为此，请选择**文件** ![image](images/arrow.jpg)\
    \ **新建** ![image](images/arrow.jpg) **文件**，然后在左侧的 OS X 标题下选择*Cocoa*。选择*Objective-C\
    \ Class*。将类名设置为`MLListWindowDelegate`，并将其设置为*NSObject*的子类。在其头文件中，在顶部添加一行`#import\
    \ <Cocoa/Cocoa.h>`，然后定义一个名为`selectedTag`的整数属性，我们稍后会将其绑定到一个 GUI 对象（添加用粗体显示的行）：\n\
    \n```\n// MLListWindowDelegate.h\n#import <Foundation/Foundation.h>\n#import <Cocoa/Cocoa.h>\n\
    \n@interface MLListWindowDelegate : NSObject\n@property (assign) NSInteger selectedTag;\n\
    @end\n```\n\n在匹配的`MLListWindowDelegate.m`文件中，我们将实现一个`specialAction:`方法（菜单项将通过\
    \ First Responder 代理以 target/action 方式连接到该方法），并实现`validateUserInterfaceItem:`方法。Xcode\
    \ 会自动为我们合成`selectedTag`属性的 getter 和 setter。\n\n```\n// MLListWindowDelegate.m\n\
    #import \"MLListWindowDelegate.h\"\n@implementation MLListWindowDelegate\n\n-\
    \ (BOOL)validateUserInterfaceItem:\n  (id <NSValidatedUserInterfaceItem>)anItem\
    \ {\n    // set the default response to YES, in case it's not the action we care\
    \ about\n    BOOL result = YES;\n    SEL theAction = [anItem action];\n    if\
    \ (theAction == @selector(specialAction:) ) {\n        if (self.selectedTag !=\
    \ 13013) {\n            result = NO;\n        }\n    }\n    return result;\n}\n\
    \n- (void)specialAction:(id)sender {\n    NSRunAlertPanel(@\"Boy Howdy!\",\n \
    \                   @\"That's some mighty special action you got there!\",\n \
    \                   nil, nil, nil);\n}\n@end\n```\n\n关于`validateUserInterfaceItem:`方法，我们需要指出几点。首先，请注意我们使用该项的操作（action）来确定它被点击时会调用哪个方法。在代码中，一个操作（或任何方法）可以通过\
    \ Objective-C 的`SEL`类型来引用。从技术上讲，`SEL`不是方法，而是一个“选择器”，它是方法名称的一种哈希，为了性能考虑而有所修改，Objective-C\
    \ 运行时可以用它来查找方法的实际实现。除了查找方法之外，一个`SEL`可以与另一个`SEL`进行比较，比如代码中`@selector(specialAction:)`构造返回的选择器。在我们的方法中，我们测试相关菜单项是否指向我们关心的操作方法，如果是，则进行深入检查。如果操作匹配，我们接着根据某些内部状态（以`selectedTag`属性的形式）进行简单检查，以确定是否允许启用此菜单项。如果选择器不匹配，则默认返回`YES`。\n\
    \n现在，让我们创建一个 GUI 来让这段代码工作起来。在 Interface Builder 画布中打开`MainMenu.xib`文件，然后从*对象库*中拖拽一个普通的`NSObject`到\
    \ nib 窗口（在*对象库*搜索框中搜索`NSObject`）。它将出现在屏幕左侧的对象停靠栏中。使用*身份检查器*将其类更改为`MLListWindowDelegate`。"
  raw: 'Our app should have a Tools menu containing Turbo On and Turbo Off items,
    only one of which should be enabled at a time; clicking the enabled item should
    toggle the checkbox and change the state of both menu items, so that now only
    the other item is enabled. Also, clicking the checkbox should affect the enabled/disabled
    state of each menu item appropriately.    This is a simple way to enable and disable
    menu items through the use of bindings, but we’d be remiss if we didn’t point
    out that this usage is sort of artificial and not really the way that you’d normally
    deal with application-wide Boolean values in a menu. In a case like this, instead
    of two menu items, one of which is always disabled, you’re more likely to use
    a single menu item showing a checkbox to indicate a state, just like the checkbox
    in our window does. As it turns out, that’s even easier to do than what we’ve
    already done. Go back to `MainMenu.xib`, open up the Tools menu in the Interface
    Builder Canvas, and drag out a new Menu Item from the *Object Library* onto the
    Tools menu. Name this new item “Turbo,” and configure its *Value* binding, connecting
    to App Delegate using the *turbo* key path. That’s it! We don’t need to Control-drag
    to set up the action for the menu item; Cocoa Bindings manages it all for us.
    Save, **Run**, and try it out. Note that this quick method doesn’t even need the
    `toggleTurbo:` method, so if we want, we can delete that method along with the
    Turbo On and Turbo Off items.    Enabling/Disabling With First Responder    Now
    we’re going to show a more common way of automatically enabling and disabling
    menu items, which gives us more fine-grained control so that the enabled state
    of each menu item can be updated automatically depending on which window is selected,
    which text field or other control in a window is selected, and so on. This method
    works using the responder chain, somewhat similar to how the color panel finds
    an object to pass a selected color to, as described earlier in this chapter. In
    this case, the method that’s searched for along the responder chain is `validateUserInterfaceItem:`,
    whose declaration looks like this:    ``` - (BOOL)validateUserInterfaceItem:           (id
    <NSValidatedUserInterfaceItem>)anItem; ```    If it’s implemented in the responder
    chain’s objects, this method is called at the appropriate time to see if the user
    interface item (in this case, a menu item) should be enabled or not. In implementing
    this method, we can use `anItem` to get some information about the object that’s
    going to be enabled or disabled; we can ask it for its action (so we can compare
    with one of our own methods) and for its tag (in case we’d rather compare against
    a control tag we’ve set on the object). Usually we’ll just want to use the action.
    We’ll demonstrate how this works in just a bit, but first we should probably clarify
    just when this method is called.    Here’s the basic idea: any time Cocoa is about
    to draw the menu, generally in response to the user clicking on the menu bar,
    some checks are made for each menu item to determine whether it should be enabled
    or disabled. The flowchart in [Figure 11-9](#9781430245421_Ch11.xhtml#Fig9) gives
    a rough outline of the sequence of events.    ![9781430245421_Fig11-09.jpg](images/9781430245421_Fig11-09.jpg)    [Figure
    11-9](#9781430245421_Ch11.xhtml#_Fig9). How the menu system decides whether a
    menu item should be enabled or not    The upshot of all this is that the menu
    item’s target object, whether configured explicitly or found in the responder
    chain, is the one that decides whether the menu item should be enabled (at the
    current time) or not. This means that we have complete dynamic control over each
    menu item.


    By implementing `validateUserInterfaceItem:` in each of our classes containing
    methods that are called by menu items, whether directly or through the responder
    chain, we can define some logic that the menu system calls at the right time,
    and automatically enables or disables each menu item based on what we return.    Let’s
    illustrate this with an example. We’ll create a new window in our nib file, matched
    by a new delegate class just for that window, which will implement `validateUserInterfaceItem:`
    to handle the state of a menu item. In a real application, you would probably
    base it on the content of a model object, but for simplicity’s sake, we’ll enable
    or disable a menu item based on what’s selected in the window.    Start by creating
    a new class in Xcode, just a plain `NSObject` subclass called `MLListWindowDelegate`.
    To do this, select **File** ![image](images/arrow.jpg) **New** ![image](images/arrow.jpg)
    **File**, and then select *Cocoa* under the OS X heading on the left. Select *Objective-C
    Class*. Set the name of the class to be MLListWindowDelegate, and set it as a
    Subclass of *NSObject*. In its header, add an `#import <Cocoa/Cocoa.h>` line at
    the top, and then define an integer property called `selectedTag`, which we’ll
    later bind to a GUI object (add the lines that are shown in bold):    ``` // MLListWindowDelegate.h
    #import <Foundation/Foundation.h> #import <Cocoa/Cocoa.h>  @interface MLListWindowDelegate
    : NSObject @property (assign) NSInteger selectedTag; @end ```    In the matching
    `MLListWindowDelegate.m` file, we’re going to implement the `specialAction:` method
    that a menu item will be connected to with target/action via the First Responder
    proxy, and implement the `validateUserInterfaceItem:` method. Xcode will automatically
    synthesize getters and setters for the `selectedTag` property for us.    ``` //
    MLListWindowDelegate.m #import "MLListWindowDelegate.h" @implementation MLListWindowDelegate
    - (BOOL)validateUserInterfaceItem:   (id <NSValidatedUserInterfaceItem>)anItem
    {     // set the default response to YES, in case it''s not the action we care
    about     BOOL result = YES;     SEL theAction = [anItem action];     if (theAction
    == @selector(specialAction:) ) {         if (self.selectedTag != 13013) {             result
    = NO;         }     }     return result; }  - (void)specialAction:(id)sender {
        NSRunAlertPanel(@"Boy Howdy!",                     @"That''s some mighty special
    action you got there!",                     nil, nil, nil); } @end ```    We should
    point out a thing or two about the `validateUserInterfaceItem:` method. First,
    note that we’re using the item’s action to determine what method it would call
    if clicked. In code, an action (or any kind of method for that matter) can be
    referred to by the Objective-C `SEL` type. Technically, a `SEL` is not a method,
    but a “selector,” which is a sort of hash of the method’s name, somewhat modified
    for performance considerations, that the Objective-C runtime can use to look up
    the method’s actual implementation. Besides looking up a method, a `SEL` can be
    compared to another `SEL`, such as that returned by the `@selector(specialAction:)`
    construct shown in the code. In our method, we test to see whether the menu item
    in question is targeted at the action method we care about, in which case we go
    deeper. If the actions match up, we then do a simple check against some internal
    state, in the form of the `selectedTag` property, to see if we want to allow this
    menu item to be enabled or not. If the selector doesn’t match, then we default
    to returning `YES`.    Now let’s create a GUI to put this code to work. Open the
    `MainMenu.xib` file into an Interface Builder canvas and drag a plain NSObject
    from the *Object Library* to the nib window (search for *NSObject* in the *Object
    Library* Search box). It will appear in the Object Dock along the left side of
    the screen. Use the *Identity Inspector* to change its class to `MLListWindowDelegate`.'
