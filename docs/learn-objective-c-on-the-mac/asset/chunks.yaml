  trans: "\n接着，从*对象库*中拖出一个新窗口，并将其 `delegate` 连接口连接到我们刚刚设置的 `MLListWindowDelegate`\
    \ 对象上。现在，在*对象库*中找到*单选组*，将其拖入新窗口。将此项包含在窗口中，为我们提供了一种为窗口及其委托提供某种选择的基本方法。将组的*选定标签*绑定到\
    \ `ListWindowDelegate` 的 *selectedTag* 属性。这样，每当有人点击某个单选按钮时，委托就会收到通知。现在，通过按住 Option\
    \ 键向下拖动手柄，将单选组展开以包含更多单选按钮，直到有七八个按钮为止。然后，点击中间附近的一个按钮，使用*属性检查器*将其标题更改为“特殊选择”，并将其标签改为\
    \ 13013，即我们将在代码中查找的“魔法数字”。\n\n剩下的工作就是配置一个新的菜单项，通过第一响应者调用 `specialAction:` 方法。首先，在\
    \ nib 窗口中选择第一响应者项，然后打开*属性检查器*。在这里，我们可以手动添加任何我们希望这个代理对象知道的动作方法。我们会看到一个用户定义动作的列表，起初是空的。点击\
    \ + 按钮添加我们自己的动作，并将其名称改为 `specialAction:`（别忘了冒号！）。现在是菜单项：在*对象库*中找到普通的*菜单项*，将其拖入我们之前创建的“工具”菜单中。将其标题设置为“特殊操作”，然后通过按住\
    \ Control 键拖拽到 nib 窗口中的第一响应者项，并从结果列表中选择 `specialAction:`，来配置其目标/动作。\n\n现在是时候看看实际效果了。保存工作并点击**运行**。该应用程序现在有一个新窗口，我们可以在其中选择一个单选按钮。点击几个单选按钮，每次点击“工具”顶层菜单项，看看“特殊操作”项是否启用。只有在选择了*特殊选择*按钮时，它才应该被启用。如果选择了其他单选按钮，或者选择了应用程序的其他窗口（带有\
    \ Turbo 复选框的旧窗口），则菜单项应被禁用。\n\n这个基本概念可以按你的需求任意扩展。关键在于，启用和禁用菜单项实际上非常简单。你永远不需要在应用程序中发生各种事件时手动启用或禁用单个菜单项；你只需编写当菜单项即将显示时自动调用的代码，并在那时处理它即可。\n\
    \n## 工作表\n\n本章要介绍的最后一个主题是工作表的概念。工作表只是一个临时附加到另一个窗口并以半模态方式运行的窗口，这样“另一个窗口”就不会收到任何事件。其理念是，一个应用程序可以有多个窗口，它们之间不会因用户注意力的需求而相互影响。例如，在\
    \ Mac OS X 自带的文本编辑应用程序中，你可以让“另存为”面板作为一个工作表出现在一个文档上，“打印”面板作为另一个工作表出现在另一个文档上，同时还能在第三个文档中继续打字。\n\
    \n你可能不会在你构建的每个 Cocoa 应用程序中都使用工作表，但在你的应用程序需要针对特定窗口获取某种用户输入，并且你不想使用会阻止应用程序其他部分输入的模态面板时，它们非常有用。例如，在刚刚展示的例子中，如果不使用工作表，那个“保存”面板可能会以模态方式运行，从而阻止所有其他窗口的输入，直到用户关闭它。而使用工作表，用户可以暂时搁置正在进行的保存操作，在确认保存之前与应用程序进行其他交互。\n\
    \n工作表在 Cocoa 中并不由特定的类来表示。相反，它们是以特殊方式使用的普通窗口。每个 `NSWindow` 都可以附加一个工作表，而通常以模态方式使用的每个窗口或面板也可以用作工作表。\n\
    \n让我们通过在一个名为 SheetLab 的新应用程序中将 `NSOpenPanel` 附加到一个普通窗口，来了解使用工作表的基础知识。在 Xcode 中创建一个新的\
    \ Cocoa 应用程序项目，使用 SL 作为类前缀，并将其保存为 *SheetLab*。现在，编辑 `SLAppDelegate.h`，添加一个 `openDocument:`\
    \ 动作方法：\n\n```\n#import <Cocoa/Cocoa.h>\n@interface SLAppDelegate : NSObject <NSApplicationDelegate>\n\
    @property (assign) IBOutlet NSWindow *window;\n- (IBAction)openDocument:(id)sender;\n\
    @end\n```\n\n然后编辑 `SLAppDelegate.m`，添加以下方法实现：\n\n```\n#import \"SLAppDelegate.h\"\
    \n@implementation SLAppDelegate\n- (IBAction)openDocument:(id)sender {\n    NSOpenPanel\
    \ *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n\
    \    [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"请选择一个文件进行导入。\"\
    ];\n\n    // 将面板附加到文档的窗口上显示。\n    [panel beginSheetModalForWindow:self.window\
    \ completionHandler:^(NSInteger result){\n        if (result == NSFileHandlingPanelOKButton)\
    \ {\n            // 将窗口标题设置为所选文件的文件名。\n            NSArray* urls = [panel URLs];\n\
    \            NSString *selectedFile = [[urls lastObject] lastPathComponent];\n\
    \            [self.window setTitle:selectedFile];\n        }\n    }];\n}\n@end\n\
    ```\n\n我们在这个类中声明了一个名为 `openDocument:` 的方法。`openDocument:` 是**文件** ![image](img/arrow.jpg)\
    \ **打开**菜单项使用的动作。当用户点击**文件** ![image](img/arrow.jpg) **打开**（或 ![images](img/arrow3.jpg)-O）时，响应者链会被遍历，直到找到一个响应对应\
    \ `openDocument:` 的对象。由于应用程序委托在响应者链中，并且应用程序中没有其他对象响应 `openDocument:`，我们的代码将被调用。`openDocument:`\
    \ 方法会获取标准的打开面板，将其设置为只允许选择一个文件（不能是目录，也不能是多选），并向面板添加一条消息。然后，它使用 `beginSheetModalForWindow:completionHandler:`\
    \ 方法，告诉面板以模态方式附加到一个窗口上运行（使用 `window` 属性）。此方法的第二个参数是一个 Objective-C *块*，这是我们之前没有接触过的新概念。它指定了面板运行完成后应执行的操作。在这种情况下，如果用户选择了文件并点击了确定，我们将获取所选文件的\
    \ URL，然后将窗口的 `title` 设置为路径的最后一部分，也就是文件名本身。\n\n**注意**  *块*代表一段代码（除此之外还有其他用途），它可作为参数传递给方法。在其他语言中，它被称为*闭包*或*lambda*。在\
    \ Cocoa 中，使用块（而非传递指向回调函数的指针）正变得越来越普遍。块可以访问声明时作用域内的所有变量，并且具有在使用点声明的优势。块是在 OS X\
    \ 10.6 和 iOS 4 中引入的。你可以在 Xcode 中的 Apple 开发者文档中，或访问 `https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`\
    \ 了解更多关于块的信息。\n\n保存更改，点击**运行**，应用程序将启动。按下 ![images](img/arrow3.jpg)-O 会弹出模态打开面板，并作为工作表附加在应用程序窗口之上。当我们选择一个文件时，窗口的名称将设置为该文件的名称！\n\
    \n## 总结\n\n本章介绍了 Cocoa 图形用户界面体验的几个关键部分，以及一些关于如何使用响应者链的示例。这些特性对于制作专业品质的 Mac 应用程序至关重要。Mac\
    \ 用户在应用程序在无正当理由的情况下使用非标准行为时往往相当苛刻，因此，了解如何以用户熟悉的方式处理窗口和菜单非常重要。\n"
- fmt: '# 文档排版结果


    在下一章中，我们将基于这些知识探索 Cocoa 中用于处理文档及其关联窗口的类。


    ## 第12章 基于文档的应用程序


    到目前为止，我们在本书中构建的应用程序都有一个共同的重大缺陷：它们都以某种“全有或全无”的方式工作。我们要么在应用程序使用的唯一后端存储中拥有一份特定的数据（如果它使用了存储的话），要么在没有任何地方拥有它。这些应用都没有任何概念允许我们将数据分割成离散的、不相关的存储单元——即我们所说的“文档”。虽然将所有内容放在一个数据库中对于某些目的来说是有益的，但对于其他目的来说却是一个巨大的障碍。如果我们只想与他人分享我们数据的一部分呢？如果我们希望能够并排查看多个相同类型的
    Core Data 实体的详细信息，以便相互比较呢？大多数人对于这些可能性并不陌生，因为他们使用过任何现代应用程序，这些应用程序可以同时打开多个文档，且对一个文档的操作不会影响其他文档。


    事实证明，Apple 的工程师们多年前就考虑到了这一点，并将文档支持直接内置到 Cocoa 中，其核心是`NSDocument`和`NSDocumentController`类。Cocoa
    的文档架构让我们能够访问大量原本需要我们自己构建的基础设施，例如管理窗口及其标题栏、处理打开面板和保存面板等。如果你在应用程序中使用了 Core Data，它甚至会自动处理实际的打开和保存操作，因此你的应用程序代码甚至不需要接触文档文件。


    本章将介绍如何创建一个基于文档的 Cocoa 应用程序的基础知识，包括使用 Core Data，我们将通过创建一个名为 ColorMix 的应用程序来学习。ColorMix
    允许用户使用标准的系统颜色面板选择两种颜色，然后显示一个颜色样本网格，展示将这两种颜色混合在一起的不同方法。每组选定的两种颜色（以及其 15 种混合颜色）都可以保存在一个文档中，该文档就像任何其他文件一样，可以保存在你喜欢的任何位置，并在以后重新打开。除了学习
    Cocoa 如何处理文档之外，我们还将构建一个简单的视图类来绘制彩色矩形，并在我们的代码中与 Core Data 进行交互。[图 12-1](#9781430245421_Ch12.xhtml#Fig1)
    展示了 ColorMix 应用程序完成后的外观。


    ![9781430245421_Fig12-01.jpg](images/9781430245421_Fig12-01.jpg)


    [图 12-1](#9781430245421_Ch12.xhtml#_Fig1) . ColorMix 应用程序的完成界面


    如果你使用过 Photoshop 或 Gimp 等图形软件，你可能对这些混合模式中的一些比较熟悉。每种模式都使用特定的公式，取两种颜色的红色、绿色和蓝色分量，并产生一个输出颜色。我们不会在此处描述这些混合模式，但你可以在`http://en.wikipedia.org/wiki/Blend_modes`和其他地方找到它们的详细描述和示例。我们在这里要做的是展示如何构建一个应用程序，让用户以动手的方式探索所有这些模式，一次选择两种颜色。


    我们将使用的混合模式都内置在 Core Graphics 中，这是 Cocoa 图形架构的一个重要部分，我们将在[第 13 章](#9781430245421_Ch13.xhtml)中详细讨论。使用这种内置功能让我们无需自己进行任何颜色计算；我们只需要调用
    Core Graphics 函数来设置混合模式并绘制矩形。


    ## 创建 ColorMix 应用程序


    首先在 Xcode 中创建一个新应用程序，使用新建项目助手中的 *OS X / Application* 部分的 *Cocoa Application* 模板。点击
    *Next* 后，将新应用程序命名为 *ColorMix*，并将类前缀设置为 `CM`。


    新应用程序将同时使用`NSDocument`架构和 Core Data，因此我们需要在创建应用程序时正确配置项目。确保 *Create Document-Based
    Application* 和 *Use Core Data* 复选框都被选中。请注意，启用文档复选框也会激活 *Document Extension* 文本字段。这让我们可以设置应用程序在保存文件时将使用的默认文件扩展名。在此处也输入
    `ColorMix`，以便我们可以轻松识别我们创建的文档。


    ColorMix 应用程序将有一些我们之前从未见过自动创建的项目。特别是，它有一个名为`CMDocument`的类（`NSPersistentDocument`的子类，而`NSPersistentDocument`本身是`NSDocument`的子类，我们稍后会解释这两个类），以及一个匹配的
    *CMDocument.xib* 资源。这是两个关键元素，我们将扩展它们以定义我们文档的行为和外观。除此之外，我们还会看到一个模型文件，我们将在其中设置此应用程序的
    Core Data 实体和属性信息。


    ## 检查默认的 Nib 文件


    在我们开始创建任何内容之前，在 Interface Builder 中打开 *MainMenu.xib* 文件。注意这个 nib 文件与我们之前创建的每个其他
    *MainMenu.xib* 文件相比有什么不同吗？它不包含任何窗口！打开文件会显示各种代理对象、菜单本身，仅此而已。这是另一个线索，表明我们在创建基于文档的应用程序时正在处理一种不同类型的“生物”，因为这样的应用程序（例如
    Xcode、Microsoft Office、Garage Band 等）通常没有“主窗口”的概念，而是将应用程序的主体部分放入一个或多个文档窗口中。


    打开连接检查器（Connections Inspector），花点时间点击一些菜单项，看看它们是如何连接起来的。*File* 菜单中的许多项都连接到 *First
    Responder*，调用的动作名称中包含单词“document”（例如`newDocument:`、`openDocument:`等）。事实证明，其中几个动作是在`NSDocumentController`类中实现的。这是一个特殊的类，在运行时有一个共享实例，用于管理应用程序的所有打开的文档。我们不会在这个
    nib 文件或任何其他地方看到这个共享实例，甚至看不到它的代理。`NSApplication`在应用程序启动期间创建此对象，并将其添加到响应者链中，以便它可以处理这些动作。


    查看一番之后，我们可以基本上忽略这个应用程序的 *MainMenu.xib*，因为我们再也不需要打开它了。请记住，里面唯一真正的内容是菜单，并且大多数菜单项都连接到
    *First Responder* 上的动作，这意味着它们会在适当的时候找到通往相关窗口控制器或共享的`NSDocumentController`的路径。


    现在打开 *CMDocument.xib*，看看它提供了什么。一个`NSWindow`等着我们去填充一些内容，如果我们打开身份检查器（Identity Inspector），我们会看到
    *File’s Owner* 是`CMDocument`的一个实例。除此之外，它是一张空白画布，我们稍后将在这上面留下我们的印记。


    ## 定义模型


    在我们开始构建任何类型的图形用户界面之前，让我们先创建用于表示文档的数据模型。这是一个极其简单的模型，包含一个具有两个属性的单一实体。我们将在每个文档中只创建该实体的一份实例，但你在本章中学到的关于文档的所有内容同样适用于大型、复杂的数据模型。


    打开 *CMDocument.xcdatamodeld*。创建一个实体并将其命名为 *ColorSet*。保持新实体处于选中状态，创建一个属性，将其命名为
    *color1*，将其类型设置为 *Transformable*，然后点击取消选中 *Optional* 复选框。'
  raw: 'In the next chapter, we’ll build on this knowledge as we explore Cocoa’s classes
    for dealing with documents and their associated windows.    Chapter    12    Document-Based
    Applications    So far, the applications we’ve built in this book all have one
    major shortcoming in common: each of them acts in sort of an all-or-nothing way.
    We’ve either got a particular piece of data in the one backing store that the
    application is using (if it’s using one at all), or we don’t have it anywhere.
    None of them has any notion of letting us split our data into the discrete, unrelated
    storage units that we call “documents.” Although having everything in a single
    database is good for some purposes, for others it’s a huge hindrance. What if
    we want to share just a part of our data with someone else? What if we want to
    be able to view details for two or more of the same kind of Core Data entity,
    in multiple windows beside one another, to be able to compare them? Most people
    are familiar with these possibilities from using almost any modern application
    where multiple documents can be open simultaneously and where actions applied
    to one don’t affect the others.    As it turns out, the good folks at Apple thought
    of this years ago and built document support right into Cocoa, centered around
    the `NSDocument` and `NSDocumentController` classes. Cocoa’s document architecture
    gives us access to a whole lot of infrastructure that we’d otherwise have to build
    ourselves, such as managing the window and its title bar, dealing with the open
    panels and save panels, and more. If you’re using Core Data in your application,
    it will even take care of the actual opening and saving all on its own, so your
    application code never even has to touch a document file.    This chapter will
    cover the basics of how to create a document-based Cocoa application, including
    the use of Core Data, by creating an application called ColorMix. ColorMix lets
    the user choose two colors using the standard system color panel, and then presents
    a grid of color swatches demonstrating different methods of blending the two colors
    together. Each set of two chosen colors (and its 15 blended colors) can be saved
    in a document, which is just like any other file and can be saved anywhere you
    like and then reopened later on. Along with learning about how Cocoa does documents,
    we’ll also build a simple view class for drawing colored rectangles and interact
    with Core Data in our code. [Figure 12-1](#9781430245421_Ch12.xhtml#Fig1) shows
    what the ColorMix application will look like when we’re all done.    ![9781430245421_Fig12-01.jpg](images/9781430245421_Fig12-01.jpg)    [Figure
    12-1](#9781430245421_Ch12.xhtml#_Fig1) .  The completed ColorMix application    If
    you’ve used graphics software such as Photoshop or Gimp, you’re probably familiar
    with some of these blend modes. Each of them uses a particular formula that takes
    the red, green, and blue components of each of the two colors and produces an
    output color. We won’t describe the blend modes here, but you can find detailed
    descriptions and examples of them at `http://en.wikipedia.org/wiki/Blend_modes`
    and elsewhere. What we will do here is show how to build an application that gives
    the user a hands-on way to explore all of these modes, two chosen colors at a
    time.    The blend modes we’ll be using are all built into Core Graphics, an important
    part of Cocoa’s graphics architecture that we’ll talk more about in [Chapter 13](#9781430245421_Ch13.xhtml).
    Using this built-in functionality lets us skip doing any sort of color computation
    on our own; all we do is call Core Graphics functions to set blend modes and draw
    rectangles.    Creating the ColorMix Application    Start by creating a new application
    in Xcode, using the  *Cocoa Application* template in the*OS X / Application* section
    of the New Project assistant. After clicking *Next*, name the new application
    *ColorMix*, and set the class prefix to CM.


    The new application will use both `NSDocument` architecture and Core Data, so
    we’ll need to configure the project properly when creating the application. Make
    sure that the Create Document-Based Application and Use Core Data checkboxes are
    both checked. Note that enabling the document checkbox also activates the Document
    Extension text field. This lets us set the default filename extension that our
    application will use when saving files. Enter ColorMix here as well, so that we
    can easily recognize the documents we create.    The ColorMix application will
    have a few things we haven’t seen created for us before. In particular, it has
    a class called `CMDocument` (a subclass of `NSPersistentDocument`, which is itself
    a subclass of `NSDocument`, both of which we’ll explain a little later), and a
    matching *CMDocument.xib* resource. These are the two key elements that we’ll
    extend to define the behavior and appearance of our documents. Apart from that,
    we’ll also see a model file where we’ll set up the Core Data entity and attribute
    information for this app.    Examining the Default Nib Files    Before we get
    to work on creating anything, open the *MainMenu.xib* file in Interface Builder.
    Notice something different about this nib file, compared to every other *MainMenu.xib*
    file that’s been created for us? It contains no window! Opening the file reveals
    various proxy objects, the menu itself, and that’s it. That’s another clue that
    we’re dealing with a different sort of creature when creating a document-based
    application, because such an application (such as Xcode, Microsoft Office, Garage
    Band, and the like) usually doesn’t have any notion of a “main window” and instead
    puts the bulk of the application into one or more document windows.    Open the
    Connections Inspector, and take some time to click on some of the menu items and
    see how they’re hooked up. Many of the items in the File menu are connected to
    *First Responder*, calling actions whose names contain the word “document” (`newDocument:`,
    `openDocument:`, and so on). It turns out that several of these actions are implemented
    in the `NSDocumentController` class. This is a special class that has a single
    shared instance at runtime for managing all the application’s open documents.
    We won’t see this shared instance, or even a proxy for it, in this nib file or
    anywhere else. The `NSApplication` creates this object during application launch
    and adds it to the responder chain so that it can handle these actions.    After
    taking a look around, we can basically forget about the *MainMenu.xib* for this
    application, since we’ll never need to open it again. Remember that the only real
    content in there is the menu, and most of the menu items are connected to actions
    on *First Responder*, which means they’ll find their way to the relevant window
    controller or the shared `NSDocumentController` when the time comes.    Now open
    *CMDocument.xib* and see what it has to offer. An `NSWindow` is ready for us to
    fill in some content, and if we open the *Identity Inspector*, we’ll see that
    the *File*’*s Owner* is an instance of `CMDocument`. Apart from that, it’s a blank
    slate, which we’ll make our mark on just a little later.    Defining the Model    Before
    we start building a GUI of any kind, let’s create the data model that will be
    used to represent a document. This is an extremely simple model containing a single
    entity with two attributes. We’ll create just a single instance of that one entity
    in each document, but everything you learn about documents in this chapter applies
    equally well to large, complex data models.    Open the *CMDocument.xcdatamodeld*.
    Create an entity and name it *ColorSet*. With the new entity still selected, create
    an attribute, name it *color1*, set its type to *Transformable*, and click to
    turn off the *Optional* checkbox.'
