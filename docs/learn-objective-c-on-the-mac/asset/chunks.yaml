- fmt: '# What You Need to Know Before You Begin


    This book assumes that you already have some basic programming knowledge. You
    should be comfortable with the concepts of loops, variables, pointers, and linked
    lists. This book also assumes that you understand the fundamentals of object-oriented
    programming and are familiar with the Objective-C programming language. Starting
    with Mac OS X Leopard 10.5, a new version of the language was introduced, called
    Objective-C 2.0. Don’t worry if you’re not familiar with the more recent additions
    to the Objective-C language. We’ll be sure to highlight any of the 2.0 language
    features we take advantage of and explain how they work and why we are using them.


    ## New to Objective-C?


    Here are a few resources that will help you get started.


    - New to programming? Check out *Learn C on the Mac, 4th Edition*, written by
    our good friend Dave Mark (`www.apress.com/9781430218098`).

    - New to Objective-C? Check out *Learn Objective-C on the Mac, 2nd Edition*, an
    excellent and approachable introduction to Objective-C by Mac programming experts
    Scott Knaster, Waqar Malik, and Mark Dalrymple (`www.apress.com/9781430241881`).

    - Next, navigate over to Apple’s Mac Developer Library and download a copy of
    *Programming with Objective-C*, a very detailed and extensive description of the
    language and a great reference guide (`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ProgrammingWithObjectiveC`).


    ## Are You Ready?


    The Mac is a great computing platform, and Cocoa is the best tool to use to build
    your Mac applications. If you are coming to the Mac from another platform, you
    may find working with Cocoa and Objective-C a bit disorienting. Even though you
    might find it hard to get your bearings at first, as you make your way through
    this book, we’re confident that you’ll soon start to wrap your head around the
    “Cocoa way” of doing things. With a little perseverance, it will all start to
    make sense.


    One thing you should keep in mind is that the exercises in this book are not simply
    a checklist that, when completed, grant you Cocoa developer guru status. Every
    step of the way, make sure you understand what you just did before moving on to
    the next project. Don’t be afraid to make changes to the code. Experiment and
    observe the results. That’s one of the best ways to understand the complexities
    of coding in an environment like Cocoa.


    Also, remember that we’ve set up a message forum for readers to discuss the exercises
    and content of this book. So if you get stuck, or want to chat with us and other
    Cocoa developers about any Cocoa programming topics, head over to `http://learncocoa.org`
    and register for the discussion forum.


    That said, if you’ve got Xcode installed, turn the page. If not, get to it! Then
    let’s go!


    ## Chapter 2: Hello, World


    As you’re probably well aware, it has become something of a tradition to call
    the first project in any book on programming “Hello, World.” Following the “if
    it ain’t broke, don’t fix it” guideline, we’ll stick with tradition.


    ### Building “Hello, World”


    By now, you should have Xcode installed on your machine. You should also have
    the `Learn Cocoa Projects` folder ensconced safely somewhere on your hard drive.
    If by some set of circumstances you don’t, go directly to [Chapter 1](#9781430245421_Ch01.xhtml)
    (do not pass Go, do not collect $200) and reread the appropriate sections.


    The first project we’ll be working with is located in the `Chapter02/Chapter2`
    folder. Launch Xcode, which is located in the `Applications` folder. Just in case
    you’ve never used Xcode before, we’re going to walk you through the process of
    creating a new project.


    Start by selecting New Project from the File menu, or by typing `N`. When the
    New Project Assistant comes up ([Figure 2-1](#9781430245421_Ch02.xhtml#Fig1)),
    select *Application* from under the Mac OS X heading in the left column, then
    select the *Cocoa Application* icon from the upper-right pane and click Next.


    ![9781430245421_Fig02-01.jpg](images/9781430245421_Fig02-01.jpg)


    [Figure 2-1](#9781430245421_Ch02.xhtml#_Fig1). Selecting the Cocoa Application
    project template from Xcode’s New Project Assistant


    A *Project Options* window offers a number of choices ([Figure 2-2](#9781430245421_Ch02.xhtml#Fig2)).
    We need to specify a name for our application. “Chapter2” is a good choice. We
    also need to give a company identifier, which is formatted like a reversed domain
    name (much like a Java package name or C# namespace). If we live at the `megacorp.com`
    domain name, then `com.megacorp` would be our choice here. Mac OS X uses the combination
    of the product name and the company identifier as a unique name for our program
    across the system, as well as in the Mac App Store. However, since we won’t be
    distributing this app beyond our computer, we can pick anything we like. The last
    important field here is the class prefix. As we’ll see, many of the Cocoa classes
    start with the prefix `NS` or `CF`. In those classes, Xcode will generate some
    files for us as part of creating a new project, and it will use the prefix we
    give here. For now, enter “Book.” We won’t be using the other fields in this chapter,
    so they can be left at the default values. Click Next.


    ![9781430245421_Fig02-02.jpg](images/9781430245421_Fig02-02.jpg)


    [Figure 2-2](#9781430245421_Ch02.xhtml#_Fig2). Specifying options for a new Cocoa
    application from Xcode’s New Project Assistant


    We’ll be presented with the standard Save window to set the location for our project
    ([Figure 2-3](#9781430245421_Ch02.xhtml#Fig3)). Xcode will create a new folder
    with the name of our project in the location we pick: our Documents folder or
    a newly-created separate folder to hold the Xcode projects that we build ourselves.
    It really doesn’t matter where we save an Xcode project, but it’ll be easier to
    find them later if we always save our projects in one place. We also have the
    choice to have Xcode configure our project for version control using Git, a powerful
    open-source distributed version control system. For right now, we can also leave
    this at the default setting.


    ![9781430245421_Fig02-03.jpg](images/9781430245421_Fig02-03.jpg)


    [Figure 2-3](#9781430245421_Ch02.xhtml#_Fig3). Naming our project and selecting
    the save location


    Once we select a location, a new project window will appear (as shown in [Figure
    2-4](#9781430245421_Ch02.xhtml#Fig4)). Although you might already be familiar
    with Xcode, take a second to look at the project window. This is where we will
    be spending an awful lot of our time, so let’s make sure we’re all on the same
    page. Like many applications built for Mac OS X 10.7 Lion and newer, Xcode includes
    a full-screen option. Since Xcode is a complex application, it works best with
    a lot of screen real estate, and we should make it full-screen now by clicking
    the arrows in the upper right-hand corner of the window.


    ![9781430245421_Fig02-04.jpg](images/9781430245421_Fig02-04.jpg)


    [Figure 2-4](#9781430245421_Ch02.xhtml#_Fig4). Our project’s main window in Xcode


    Our project window features a toolbar across the top, which gives us ready access
    to a bunch of commonly used commands. Below the toolbar, the window is divided
    into three main sections, or panes.


    The pane that runs down the left side of the window is called the *Navigator*
    area. All of the resources that make up our project are grouped here, as are a
    number of relevant project settings. Clicking the little triangle to the left
    of an item expands that item to show any available subitems. Clicking the triangle
    to the left of an expanded item will hide its subitems.


    The right pane is called the *Utility* area, and it shows detailed information
    about items selected in the *Navigator* area.'
