    这段代码的第一部分为每个视图逐一设置了混合模式。第二部分为每个 `CMColorBlendView` 配置了绑定。由于所有视图的绑定都相同，我们遍历一个包含所有\
    \ `ColorBlendView` 的数组（该数组在 `for` 循环之前即时创建），并为每个视图执行绑定。\n\n这是我们第一次要求您在代码中进行大量的\
    \ GUI 配置。使用 Cocoa 内建的对象，您可以直接在 Interface Builder 中配置许多内容，但对于自定义类来说，这并不总是那么简单。\n\
    \n请注意，调用 `bind:toObject:withKeyPath:` 实现了与在 Interface Builder 中配置绑定相同的效果。事实上，您在\
    \ Interface Builder 中配置的每个绑定更像是一个动词而非名词。当您的应用程序加载包含绑定的 nib 文件时，每个已保存的绑定都会触发一个您在此处看到的调用。还需要注意，Interface\
    \ Builder 中表示为 *Controller Key* 和 *Model Key Path* 的内容，最终会合并为一个字符串，用于 `bind:toObject:withKeyPath:`\
    \ 调用。\n\n好了，理论部分到此为止。现在保存工作，点击运行，您应该会看到类似图 12-6 的效果。\n\n![9781430245421_Fig12-06.jpg](img/9781430245421_Fig12-06.jpg)\n\
    \n图 12-6。最终，我们看到了混合后的颜色。如果您阅读的是本书的黑白印刷版，那么请想象这里有一组炫丽多彩的颜色阵列。\n\n点击其中一个颜色块打开颜色面板，并开始拖动里面的滑块，您会发现所有\
    \ 15 种混合颜色都会随着您设置的颜色同步更新。非常棒！\n\n现在应用程序已经运行起来，我们可以使用标准菜单项来创建多个文档、为每个文档指定不同的颜色、保存文档、关闭文档、管理其窗口等等。Cocoa\
    \ 的文档架构负责处理实例化文档和文档控制器、加载 nib 文件、使用保存面板等细节。所有这些功能都可以由开发者增强（例如，我们可以通过各种方式自定义文档保存的过程），但仅使用基本功能也能让我们走得很远，这些功能开箱即用。\n\
    \n## 关于撤销与重做\n\n现在，我们应该提一下 `NSUndoManager`，它负责处理 Cocoa 中的撤销/重做支持。请注意，我们在 ColorMix\
    \ 中执行的操作（实际上只是更改颜色）都可以通过“编辑”菜单中的项目进行撤销和重做。另外，请注意这些撤销和重做操作是文档相关的；在一个文档中进行的更改和撤销与其他文档中发生的任何事情完全独立。然而，可能不太清楚的是，究竟是什么启用了这种功能；我们并没有编写任何处理撤销和重做的代码，但它却神奇地出现了。简单的答案是：在\
    \ Core Data 应用程序中，基本的撤销/重做通常由系统为我们处理，我们无需做任何事情。负责管理模型对象的托管对象上下文能够注意到对象何时被编辑，并将反向操作添加到“撤销栈”中。\n\
    \n这样做的好处是，对于大多数现代 Cocoa 应用程序，我们免费获得了撤销和重做功能。\n\n然而，这是一本关于编程的书，而不是关于罗列框架酷炫特性的书。至少，我们需要对底层工作原理有所了解，以便在必要时知道在哪里进行调整。因此，以下是对\
    \ Cocoa 中撤销/重做支持如何工作，以及 Core Data 和 `NSDocument` 如何协同使其自动工作的速成教程。\n\n## 撤销栈\n\n\
    许多程序员可能从未深入思考过撤销和重做在应用程序中通常是如何实现的。这已经成为一种被普遍接受和期望的功能，以至于它似乎只是自然秩序的一部分。基本原理如下：每次我们在应用程序中编辑内容时，都需要创建一个代表编辑操作反向操作的项目。因此，如果用户在文本末尾添加了字母“X”，就需要有一段代码创建一个表示相反操作的项目，即一个可以删除那个“X”的操作。然后，该表示被放置到某处类似的项目的栈中（“撤销栈”）。调用“撤销”命令包括从撤销栈顶部弹出最近的项目，并执行它所描述的操作。同时，调用撤销命令最终会创建另一个项目，即来自撤销栈的反向项目的反向操作（实际上与原始编辑相同），并将其放置在“重做栈”上，以备用户后来想要撤销这个撤销操作。\n\
    \n这种架构存在多种变体，例如限制栈大小，或者根本没有栈而是只有单个撤销项目，但基本架构在大多数平台上都非常相似。Cocoa 实现此方式的一个特别之处在于，它不是将每个撤销项目以一种需要稍后以某种方式解码的特殊形式来表示，而是使用目标对象、要对该对象调用的方法选择器以及所需的任何参数，隐式地构造每个撤销项目。当触发撤销命令时，没有任何类型的解码或查找。该方法就像任何其他\
    \ Objective-C 方法一样被简单调用。\n\n让我们来看一个例子。假设有以下方法，放在一个具有可设置名称的类中：\n\n```\n- (void)setName:(NSString\
    \ *)newName {\n    if (![newName isEqual:name]) {\n        name = newName;\n \
    \   }\n}\n```\n\n现在假设我们希望设置名称成为一个可撤销的操作。通过添加以下以粗体显示的行，可以轻松实现这一点：\n\n```\n- (void)setName:(NSString\
    \ *)newName {\n    if (![newName isEqual:name]) {\n        NSUndoManager *undoManager\
    \ = ...\n        [undoManager registerUndoWithTarget:self\n                selector:@selector(setName:)\n\
    \                object:name];\n        [undoManager setActionName:@\"名称更改\"];\n\
    \        name = newName;\n    }\n}\n```\n\n请注意，我们省略了实际获取撤销管理器的代码部分。在实际应用程序中，撤销管理器可能来自几个不同的地方，具体取决于应用程序是否具有\
    \ Core Data 和 `NSDocument` 支持。在 Core Data 应用中，我们可以随时向共享的 `NSManagedObjectContext`\
    \ 对象请求一个撤销管理器；而在同时支持 Core Data 和文档的应用中，每个文档都有自己的撤销管理器。\n\n这种方式的最终体现出现在 Core Data\
    \ 应用程序中，它实际上代表我们实现了类似上述的功能。请注意，上面的 `setName:` 方法非常公式化。Core Data 在幕后实现了一些魔法，这样我们就不必实现那个\
    \ `setName:` 方法。只要模型对象发生任何编辑，Core Data 就会注意到并为我们设置撤销。\n\n## 总结\n\n我们刚刚从头开始创建了第一个基于\
    \ `NSDocument` 的应用程序。我们还学习了一些在 `NSView` 上绘图和处理颜色的知识，这些都是适用于各种应用领域的有用技能。"
- fmt: "在后面的章节中，我们会基于这些技能进行更深入的探索，特别是 Cocoa 真正大放异彩的有趣图形编程。然而，在下一章中，我们得暂时放下乐趣，学习当应用中出现问题时会发生什么——以及如何使用`NSError`和`NSException`来应对这些问题。\n\
    \n## 第 13 章 异常、信号、错误与调试\n\n任何做过编程的人都知道，事情有时并不会按计划进行。你忘记处理某个特定的边缘情况，或者一个系统调用以一种你从未料到的方式失败，然后你的程序就突然崩溃了。每种编程语言和开发环境都有处理这些问题的方法，而\
    \ Cocoa 也不例外。\n\n本章将介绍 Cocoa 用于创建和处理异常与错误的机制，这是两个听起来相似但在概念上截然不同的系统。我们将学习它们各自不同的使用方式、如何处理它们，以及如何自己发起它们。我们还将了解某些内存滥用是如何导致信号（Signal）发生的，这通常会导致崩溃。最后，我们会窥探一下\
    \ Xcode 内置的调试器，它可以帮助我们解决这些问题。\n\n## 异常处理\n\n让我们从异常处理开始。*异常*（exception）是一种特殊的对象，可以在程序的一部分中创建，以告知另一部分出现了问题；这被称为“抛出”（raising）异常，在代码中看起来可能像这样：\n\
    \n```objc\n// 想象我们正在一个方法中，该方法有一个参数 \"index\"，其值不能为负数。\nif (index < 0) {\n    [NSException\
    \ raise:NSRangeException format:\n        @\"I can't take all this negativity!\
    \ (index == %d)\", index];\n}\n```\n\n在这个例子中，我们使用`NSException`类的一个类方法，一步创建并抛出了一个异常。该方法的第一个参数是一个字符串，用于指定异常的名称（此处为`NSRangeException`，它是\
    \ Cocoa 中预定义的异常名称），这允许对异常进行一般性分类。与许多其他异常处理环境不同，`NSException`很少被子类化，因此其名称用于区分不同类型的异常。我们传递的第二个参数是异常“原因”（reason）的格式字符串，这是一个人类可读的描述性字符串。这个格式与我们可以传递给`NSLog`的参数列表类型相同，其中第一个是`NSString`，其他参数根据字符串的指定进行插值。\n\
    \n### 捕获异常\n\n当那段代码被执行时，如果`index < 0`，程序的正常流程就会被中断。程序不会继续执行该方法的其余部分，而是会沿着调用栈向下查找一个称为*异常处理器*（exception\
    \ handler）的特殊代码构造。异常处理器会执行包含在一对花括号内的所有代码，这些代码以`@try`关键字为前缀。如果在执行期间抛出了异常，执行将跳转到由`@catch`关键字标记的相邻代码块，并执行其中包含的代码。这被称为*处理异常*。最后，我们可以选择性地包含第三个由`@finally`关键字标记的代码块，无论`@try`和`@catch`部分中发生了什么，该代码块都会被执行，以执行任何必要的清理工作。\n\
    \n下面的示例创建了与之前相同的异常，但现在是在一个`@try`块内。我们在`@catch`块中捕获它并输出一条错误消息，然后进入`@finally`部分，无论发生什么，该部分都会被执行。在这个简单的例子中，我们不需要`@finally`部分，可以忽略它，但在某些情况下，例如某个资源在`@try`块中被初始化并需要释放时，它会非常有用。\n\
    \n```objc\n@try {\n    if (index < 0) {\n        [NSException raise:NSRangeException\
    \ format:\n            @\"I can't take all this negativity! (index == %d)\", index];\n\
    \    }\n} @catch (NSException *e) {\n    NSLog(@\"Encountered exception %@ with\
    \ reason %@\",\n        [e name],\n        [e reason]);\n} @finally {\n    //\
    \ 我们这里实际上没有什么可做的。\n}\n```\n\n这个示例在同一方法中处理了抛出的异常，但这实际上相当罕见。更常见的情况是，没有找到本地的异常处理器，因此系统会遍历调用栈寻找异常处理器，首先在当前方法的调用者中查找，然后是*那个*方法的调用者，依此类推。这个搜索会沿着调用栈一直进行，直到找到异常处理器为止。如果找不到，可以配置一个特殊场景来处理未捕获的异常。默认情况下，遇到未捕获异常的\
    \ Cocoa 应用会将有关异常的一些信息打印到控制台日志，然后尝试照常继续运行。\n\n### Cocoa 中有限的异常角色\n\n在 Cocoa 中，异常用于在发生不应该在程序运行时出现的严重问题时，让方法跳出其正常的操作流程。通常，如果你的代码导致抛出了异常，那就说明你有一个\
    \ bug。除极少数例外情况，一个编写得当的 Cocoa 程序应该能够永远运行而不抛出任何一个异常。\n\n如果你有 Java、Ruby、Python 或\
    \ C++ 的背景，这可能会显得有些限制。在许多其他环境中，异常的使用更为自由，例如一个文件读取方法抛出异常来告诉调用者它已经读到了文件末尾（仔细想想，这根本就不是什么异常状况，因为每个文件都有末尾）。在\
    \ Python 中，遍历数组的一种常见习语是递增索引，尝试从数组中读取索引值，并在读取超出末尾时捕获由此产生的异常。然而，在 Cocoa 中，这种做法是不被提倡的，异常通常仅用于报告可能由程序中的\
    \ bug 引起的意外结果。\n\n由于异常在 Cocoa 中的作用相当有限，你通常不会在 Cocoa 应用中看到大量的异常处理代码。与 Java 不同，Objective-C\
    \ 不要求（甚至不允许）其方法指定它们可能抛出哪些类型的异常，理论上你根本*不必*处理它们。默认情况下，你创建的每个 Cocoa 应用都会有一个顶层的异常处理器，它只是简单地将有关异常的一些信息输出到系统日志，然后让应用尽力继续运行。不幸的是，这算不上什么好策略，因为发生异常时应用正在做的事情很可能是在响应用户的上一个操作（点击按钮、按键等），而该操作在此之后本应执行的其他操作都被直接跳过了，这可能会使应用程序处于未定义或不一致的状态！\n\
    \n有些应用程序会安装自己的特殊顶层异常处理器来处理这些情况。例如，Xcode 偶尔会遇到异常（是的，即使是 Xcode 也有 bug！），这时它通常会为用户提供退出应用的机会，并意识到可能有些事情搞砸了。\n\
    \n## 创建一个测试平台\n\n让我们构建一个小的应用程序，演示 Cocoa 程序员可能遇到的几种常见异常。在 Xcode 中，创建一个新的 Cocoa\
    \ 应用程序（这次不涉及 Core Data 或文档），命名为“ExceptionCity”，并指定“EC”作为类前缀。我们创建的应用程序将自动包含一个名为`ECAppDelegate`的类。\n\
    \n我们的应用委托将是一个非常简单的类，包含`applicationDidFinishLaunching:`委托方法，该方法会调用三个不同的“工具”方法，每个方法都演示一个可能导致运行时抛出异常的常见\
    \ Cocoa 陷阱。"
  raw: 'In later chapters, we’ll build on those skills even more, especially the fun
    graphics programming where Cocoa really shines. However, in the next chapter,
    we have to take a break from the fun and learn what happens when things go wrong
    in our apps—and how to deal with them using `NSError` and `NSException`.    Chapter    13    Exceptions,
    Signals, Errors, and Debugging    Anyone who’s done any sort of programming knows
    that sometimes things just don’t work out as planned. You forget to handle a specific
    edge case, or a system call fails in a way that’s never occurred to you, and suddenly
    your program blows up in your face. Every programming language and development
    environment has ways of dealing with these problems, and Cocoa is no exception.    This
    chapter will cover Cocoa’s mechanisms for creating and handling exceptions and
    errors, two similar-sounding but conceptually very different systems. We’ll learn
    the different ways that each of them is used, how to handle them, and how to initiate
    them ourselves. We’ll also learn how certain memory abuses can cause signals to
    occur, typically resulting in a crash. And we’ll take a peek at the debugger built
    into Xcode, which can help us tackle these problems.    Exception Handling    Let’s
    start off with exception handling. An *exception* is a special object that can
    be created in one part of a program in order to tell another part that something
    has gone wrong; this is called “raising” an exception, and in code it might look
    something like this:    ``` // imagine we''re in a method that has a parameter
    "index", whose // value must not be negative. if (index < 0) {   [NSException
    raise:NSRangeException format:     @"I can''t take all this negativity! (index
    == %d)", index]; } ```    In this case, we’re creating and raising an exception
    in a single step, using a class method of the `NSException` class. The first parameter
    to this method is a string for the exception’s name (in this case `NSRangeException`,
    which is a predefined exception name in Cocoa), which allows for general categorization
    of exceptions. Unlike many other exception-handling environments, `NSException`
    is seldom subclassed, and so its name is used to differentiate between different
    types of exceptions. The second parameter we pass is a format for the exception’s
    “reason,” a human-readable descriptive string. This format is the same sort of
    list of items we can pass to `NSLog`, where the first is an `NSString` and the
    others are interpolated as specified by the string.    Catching Exceptions    When
    that code is executed, if `index < 0`, the program’s normal flow is interrupted.
    Instead of continuing with the rest of the method, the program will start working
    its way down the call stack, looking for a special code construct called an *exception
    handler*. An exception handler will execute all code contained within a pair of
    curly-braces prefaced by the `@try` keyword and, if an exception is raised during
    that execution, execution will jump to an adjacent block marked with the `@catch`
    keyword and execute the code contained there. This is called *handling the exception*.
    Finally, we may optionally include a third block of code labeled with `@finally`
    keyword, which will be executed no matter what happens in the `@try` and `@catch`
    section, in order to perform any necessary cleanup.    The following example creates
    the same exception as before, but now within a `@try` block. We catch it in the
    `@catch` block and output an error message, then move on to the `@finally` section,
    which is executed no matter what happens. In this simple case, we don’t need the
    `@finally` section and could just omit it, but it can be useful in situations
    where some resource is initialized in the `@try` block and needs to be freed up.    ```
    @try {   if (index < 0) {     [NSException raise:NSRangeException format:       @"I
    can''t take all this negativity!


    (index == %d)", index];   } } @catch (NSException *e) {   NSLog(@"Encountered
    exception %@ with reason %@",     [e name],     [e reason]); } @finally {   //
    we don''t have anything to do here, really. } ```    This example handles the
    exception in the same method where it was raised, but that’s actually pretty uncommon.
    More likely, no local exception handler is found, so the system traverses the
    call stack looking for an exception handler, first in the current method’s caller,
    then *that* method’s caller, and so on. This search continues down the call stack
    until an exception handler is found. If none is found, a special-case scenario
    can be configured to handle the uncaught exception. By default, a Cocoa app that
    encounters an uncaught exception will print some info about the exception to the
    console log and then try to continue running as usual.    The Limited Role of
    Exceptions in Cocoa    In Cocoa, exceptions are used to make a method break out
    of its normal operating flow in case of a serious problem that should not occur
    while the program is running. In general, if your code causes an exception to
    be raised, you’ve got a bug. With few exceptions, a properly written Cocoa program
    should be able to run forever without a single exception ever being raised.    If
    you have a background in Java, Ruby, Python, or C++, this may seem a little restrictive.
    In many other environments, exceptions are used a little more freely, such as
    a file-reading method raising an exception to tell the caller that it’s read to
    the end of the file (which, if you think about it, is not an exceptional state
    at all, because every file has an end). In Python, one common idiom for iterating
    through an array is to increment an index, try to read the indexed value from
    the array, and catch the resulting exception when you read past the end. In Cocoa,
    however, this sort of thing is frowned upon, and exceptions are normally used
    only for reporting unexpected results that are probably caused by a bug in the
    program.    Because of the rather limited role of exceptions in Cocoa, you don’t
    often see a lot of exception-handling code inside Cocoa apps. Unlike Java, Objective-C
    doesn’t require (or even allow) its methods to specify what kinds of exceptions
    they may raise, and in theory you don’t really *have* to handle them at all. By
    default, each Cocoa app you create will have a sort of top-level exception handler
    that simply outputs some information about the exception to the system log, and
    then lets the app continue on its way as best it can. Unfortunately, this isn’t
    much of a strategy because whatever the app was doing at the time of the exception
    was most likely happening in response to the last user action (clicking a button,
    pressing a key, and the like), and whatever else that action was supposed to be
    doing after that is just skipped right over, potentially leaving the application
    in an undefined or inconsistent state!    Some applications install a special
    top-level exception handler of their own to deal with these situations. Xcode,
    for instance, occasionally hits an exception (yes, even Xcode has bugs!), at which
    point it typically gives the user the opportunity to quit the app, recognizing
    the possibility that something is mucked up.    Create a Testbed    Let’s build
    a small application that demonstrates some of the kinds of exceptions that Cocoa
    programmers are likely to encounter. In Xcode, create a new Cocoa application
    (no Core Data or documents involved this time) named “ExceptionCity” and give
    it “EC” as the class prefix. The application we create will automatically have
    a class named `ECAppDelegate`.    Our app delegate is going to be a very simple
    class, containing the `applicationDidFinishLaunching:` delegate method, which
    calls three different “utility” methods, each of which demonstrates a common Cocoa
    pitfall that can result in exceptions being raised at runtime.'
