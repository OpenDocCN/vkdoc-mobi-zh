    \  \n\n## Binding to a Table View\n\n`DungeonThing` is fine for what it does (aside\
    \ from the fact that it doesn’t really generate the game objects, of course),\
    \ but if you started using such a system “in production” (say, while playing Dungeons\
    \ and Dragons or a similar game), you’d quickly encounter one major problem: the\
    \ random game objects aren’t retained in any way! As soon as you click to create\
    \ a new random character, for example, the previous character is just wiped out,\
    \ and you have no way of ever seeing it again.  \n\nFor the next iteration of\
    \ `DungeonThing`, we’re going to add some table views to show lists of all created\
    \ game objects. Clicking a game object in a table view will show its values in\
    \ the relevant text field. Unlike [Chapter 6](#9781430245421_Ch06.xhtml), where\
    \ we showed how to handle the table view in our own code, here we’re going to\
    \ demonstrate how to use the `NSArrayController` class, a generic controller class\
    \ included with Cocoa to manage the display of these table views with no custom\
    \ code of our own, thanks to Cocoa bindings. We’ll need to add a few outlets and\
    \ other instance variables to our `DungeonThingAppDelegate` class for three instances\
    \ of `NSArrayController` and three arrays (one for each type of game object).\
    \ We’ll also remove the `NSTextField` outlets that we just put in because those\
    \ will also be configured with bindings to display their contents. Finally, we’ll\
    \ change the action methods just slightly to insert each created object into the\
    \ relevant array. When we’re done, the source code will be almost identical in\
    \ size because all configuration of the table views is done right in the nib file.\
    \  \n\nWe’re going to start by adding some properties to `DungeonThingAppDelegate`\
    \ and modifying our `create:` methods to make use of these new properties. Before\
    \ we can use bindings in Interface Builder, we need to set them up in the code\
    \ first. We’ll then move over to Interface Builder to connect the bindings and\
    \ then back to the code for some cleanup.  \n\n## Making the Code Bindings-Ready\n\
    \nLet’s start by making the necessary changes in the header file. In order to\
    \ maintain lists of generated objects, our `DungeonThingAppDelegate` needs three\
    \ new `NSMutableArray` instance variables, one for each kind of game object. These\
    \ can’t be created from within Interface Builder; we need to declare them explicitly.\
    \ Each array will be managed by an `NSArrayController` in the nib file, which\
    \ we’ll create and configure within Interface Builder in a bit. We declare the\
    \ three `NSMutableArrays` as properties so that they are readily available for\
    \ the `NSArrayControllers` to access them. The changes we need to make in `DungeonThingAppDelegate.h`\
    \ are as follows:  \n\n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface DungeonThingAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n// add these three:\n@property (strong)\
    \ NSMutableDictionary *characters;\n@property (strong) NSMutableDictionary *monsters;\n\
    @property (strong) NSMutableDictionary *dungeons;\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n@property (weak) IBOutlet NSTextField *characterLabel;\n\
    @property (weak) IBOutlet NSTextField *monsterLabel;\n@property (weak) IBOutlet\
    \ NSTextField *dungeonLabel;\n\n- (IBAction)createCharacter:(id)sender;\n- (IBAction)createMonster:(id)sender;\n\
    - (IBAction)createDungeon:(id)sender;\n\n@end\n```\n\nAfter adding those three\
    \ property declarations, we need to complete the setup for our `NSMutableArray`\
    \ instances in the `DungeonThingAppDelegate.m` file. We’ll initialize the `NSMutableArray`\
    \ instances themselves, and modify the action methods to push the created values\
    \ into our arrays, instead of just displaying the values directly in the text\
    \ fields.  \n\nFirst, let’s implement a new `init` method to contain the initialization\
    \ for the arrays.  \n\nPlace the following code near the top of the `@implementation\
    \ DungeonThingAppDelegate` section of the `.m` file:  \n\n```objectivec\n- (id)init\
    \ {\n    if ((self = [super init])) {\n        self.characters = [NSMutableArray\
    \ array];\n        self.monsters = [NSMutableArray array];\n        self.dungeons\
    \ = [NSMutableArray array];\n    }\n    return self;\n}\n```\n\n### THE CANONICAL\
    \ INIT METHOD  \n\nThe preceding code snippet shows an example of an `init` method\
    \ that creates values for our class’s instance variables. The form of this `init`\
    \ method is fairly standard, and you’re likely to see something similar in most\
    \ Objective-C classes you see, but it does some things that seem strange at first\
    \ glance and so is worth explaining a bit. The method starts off with this peculiar\
    \ `if` statement:  \n\n`if ((self = [super init])) {`  \n\nThat `if` statement\
    \ is really killing two (or more) birds with one stone. First, it’s calling the\
    \ superclass’s implementation of `init` and assigning its return value to the\
    \ special variable `self`. Then it checks the value of the assignment itself (that\
    \ is, the value of `self` after it’s been assigned) and only executes the following\
    \ block of code if it’s not something that evaluates as `false`, such as a nil\
    \ pointer value.  \n\nThis usage of `self`, assigning a value to it, is really\
    \ unusual. In fact, the only time we’re ever likely to see code assigning a value\
    \ to `self` is within an `init` method such as this. The reason for doing it this\
    \ way is to allow for the possibility, however slight, that the superclass’s `init`\
    \ method will return a different value than what was pointed at by `self` from\
    \ the outset. On the one hand, the superclass may find that it fails to initialize\
    \ itself properly for some reason and signals this by returning nil from the `init`\
    \ method, which is the “standard” way of dealing with an object initialization\
    \ failure (rather than, say, raising an exception). In this case, the class will\
    \ notice the nil value and skip the block following the `if` statement, dropping\
    \ down to the end where it returns the value pointed at by `self`, which is now\
    \ nil.  \n\nThe other possible alternate return value for the superclass’s `init`\
    \ method is a different instance altogether. The idea is that the superclass might\
    \ have a smart scheme for recycling objects in a private pool instead of constantly\
    \ deallocating and creating new ones, and a part of that scheme would be that\
    \ the `init` method would sometimes return an old, second-hand object instead\
    \ of the shiny new one we just tried to create. The question of whether or not\
    \ this situation is a realistic one is a subject of occasional debate among Cocoa\
    \ programmers. Here, we’re erring on the side of caution by writing our `init`\
    \ method to allow for this possibility.  \n\nThere it is—all the code changes\
    \ we need to make to start connecting things in Interface Builder! Note that unlike\
    \ the example in [Chapter 6](#9781430245421_Ch06.xhtml), the code here doesn’t\
    \ have to do anything at all regarding the table views. No `delegate` or `dataSource`\
    \ methods to implement, no outlets pointing to the table views, nothing. Thanks\
    \ to bindings and `NSArrayController`, the table views will really take care of\
    \ themselves.  \n\n## Configuring the Table Views and Text Views  \n\nWe’ll now\
    \ ready to move to the nib file. We’ll create some table views, add some array\
    \ controller objects, and set up their bindings to the new arrays we added to\
    \ `DungeonThingAppDelegate`. We’ll also configure the existing text fields to\
    \ get their data through bindings. Single-click the `MainMenu.xib` file in Xcode\
    \ to get back to the Interface Builder canvas.  \n\nWe’re going to start by making\
    \ changes to the main application window. The first step is to make some room\
    \ in the window for our new table views. We’re going to create three “history”\
    \ table views, one below each of the existing sets of views, so we need to make\
    \ the window taller (but we can keep the current width)."
