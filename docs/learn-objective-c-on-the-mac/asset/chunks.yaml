    we find a speed we like. Define it like this:    ``` #define ANIM_DURATION 1.0
    ```    Now let’s move on to the `applicationDidFinishLaunching:` method. Here
    we grab the list of views from the `tabView` and store it in our `items` property.
    The `items` property needs to be a `strong` reference because the `tabView` returns
    a copy of its internal array, not a reference to the array itself. This means
