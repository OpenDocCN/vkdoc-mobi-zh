    # 本书大部分内容是在明尼苏达州圣保罗的 Shish 咖啡馆和 Kopplin''s Coffee 完成的。如果你想品尝美味的咖啡，Kopplin''s 是你最好的选择。最后，也是最重要的，彼得想感谢他的妻子莫莉·麦克贝斯，以及孩子劳雷尔和贝娅；杰克想感谢他的妻子维罗妮卡·梅杰，以及孩子亨丽埃塔和多罗特娅。他们都非常支持编写这本书所投入的时间，没有他们的帮助，这本书不可能完成。彼得和杰克将本书献给我们的家人。


    ## 第 1 章


    # 必须热爱 Cocoa


    欢迎！你来到这里，一定是因为你想为你的 Mac 编写程序。那么，你确实来对地方了。（来找普拉提的？右边第三个门。）当你读完本书时，你将了解创建快速、高效、外观精美的
    Mac OS X 应用程序所需的一切知识。


    创建现代 Mac 应用程序的关键是 Cocoa。根据苹果公司的说法，Cocoa 是一组面向对象的框架，为 Mac OS X 应用程序提供运行时环境。当你阅读本书时，你将学习关于
    Cocoa 框架和运行时环境的所有知识。现在，请将 Cocoa 视为一个程序员助手，它负责处理 Mac 开发中涉及的许多日常维护工作。几乎 Mac 应用程序执行的每一个常见任务，从绘制窗口到在文本字段中闪烁光标，在使用
    Cocoa 编写程序时都会为你自动处理，让你能够专注于使你的应用程序独一无二的代码。


    Cocoa 几乎为你的每一个开发需求都提供了类。从窗口到菜单，从滚动条到按钮，从图像到图标，Mac OS X 用户界面的每个部分都有对应的 Cocoa 类。如果你能想到一个想添加到你自己应用程序中的用户界面元素，那么这个元素很可能已经作为
    Cocoa 类实现了。


    使用 Cocoa 的另一个好处是它与 Mac OS X 紧密集成。使用 Cocoa 构建你的应用程序，你的应用程序将能与其他程序良好兼容，并与 Mac OS
    X 的元素（如 Finder 和 Dock）无缝连接。


    ## 何时 25 年不等于 25 年？


    Cocoa 自 1986 年以来以某种形式存在。我们称之为 Cocoa 的技术是从 NeXTStep AppKit 演变而来的，后者是为 NeXT 平台开发的应用程序构建工具。当苹果公司在
    1996 年收购 NeXT 时，他们开始构建一个新版本的 Mac OS，也就是我们现在所知的 OS X，新操作系统的很大一部分基于从 NeXT 收购的技术。


    随着 OS X 的发展，Cocoa 也在发展。苹果公司加入了来自经典 Mac OS 的技术，如 QuickTime，以及全新的技术，如支持 OS X 所有花哨视觉效果和动画的
    Quartz 渲染系统。他们还确保在此过程中保持了 Mac 著名的易用性。


    要点：Cocoa 在不断发展和扩展。你将在本书中学习的开发工具、库和框架是超过 25 年实验和改进的成果。


    ## 获取 Mac 并下载工具


    在你开始使用 Cocoa 创建应用程序之前，你需要一台 Mac。它不必是最新或最强大的 Mac；事实上，过去四五年左右生产的几乎任何 Mac 都能很好地完成本书中的练习。当你对编写软件变得更加认真时，你可能会发现投资一台更新或更快的机器是值得的，但现在，几乎任何基于
    Intel 的 Mac 都能很好地满足你学习所需的知识。最新的 Mac 目前最高支持 OS X 10.8，而最古老的基于 Intel 的 Mac 无法运行任何高于
    10.7 的 OS X 版本。但本书将使用的版本 `Xcode 4.6` 在 10.7 和 10.8 上都能正常工作。


    你还需要拥有一个 Apple ID（可能与你已在 Mac 或 iOS App Store 或其他 iTunes 购买中使用的 ID 相同），并且强烈建议你加入苹果开发者连接（ADC），这是苹果的开发者关系组织。有付费会员，但基本会员是免费的。要加入
    ADC，请打开你的网页浏览器，导航至 `http://developer.apple.com/mac/`。如果你已有 Apple ID，请按下 `Log in`
    按钮并输入你的信息。如果你是苹果在线服务的新用户，请点击 `register` 链接并创建你的账户。


    无论你是注册成为开发者，还是仅使用你的 Apple ID，获取苹果的免费开发者工具集 `Xcode` 最简单最好的方法是从你的 Mac 上的 App Store
    下载。只需启动 App Store，搜索 `Xcode`，然后点击安装。与 App Store 上的大多数内容一样，安装过程基本不言自明。`Xcode` 的安装可能需要比大多数其他应用程序更长的时间，因为它是一个相当大的下载文件。


    **注意** 如果你已经为 iOS 开发安装了 `Xcode`，那么你已经万事俱备了。`Xcode` 包含创建 OS X 应用程序和 iOS 应用程序所需的所有工具和框架。虽然框架确实存在重大差异，但工具基本相同，所以如果你做过任何
    iOS 开发，创建 Cocoa 程序时应该会感到得心应手。


    ## 下载源代码


    除了下载和安装 `Xcode`，你还需要下载与本书配套的示例项目。你可以在 Apress 的《在 Mac 上学习 Cocoa》网页找到代码归档，网址为 `www.apress.com/9781430245421`。此页面包含本书的所有元数据，包括代码归档、勘误表等。


    ## 获取帮助


    在阅读本书的过程中，你无疑会有一些需要解答的问题。幸运的是，有一个专为本系列书籍设计的优秀社区可以加入。请访问 `http://learncocoa.org`。在网站上注册，找到相应的书籍论坛并发布你的问题。你一定会找到其他能回答你问题的人，并且，谁知道呢，过一段时间后，你可能会发现自己也在为其他人解答问题。`learncocoa.org`
    网站也是你找到其他资源（包括其他书籍、研讨会等）来帮助你进步的地方。快来加入我们吧！

