    to use the *Bindings Inspector*. Select the Add button, open the *Bindings Inspector*,
    and expand the *Enabled* section under *Availability*. Check the *Bind to* checkbox,
    set the pull-down menu to Mythical Bands, and change the *Controller Key* field
    to read “canAdd.” For the Remove button, do the same thing, but use “canRemove”
    for the *Controller Key* field.    Now save your changes, and run the app. The
    new window appears, and we can add some bands, edit their names directly in the
    table view, and save our changes.    GIVING USEFUL NAMES TO ARRAY CONTROLLERS    There’s
    a change we want to recommend that you make in your nib file that will be helpful
    when configuring the new bindings we’re about to create. It won’t affect the behavior
    of the app, but you’ll probably be glad that you made the change, and the text
    going forward assumes that you’ve made this update.    The connection between
    the Core Data infrastructure and the UI all runs through an `NSArrayController`.
    The `NSArrayController` that we set up in the last chapter is named Mythical Person
    Array Controller. This is a long name, and is a bit longer than what the Binding
    Inspector in Xcode is really designed to show. In fact, it barely fits into the
    pop-up buttons in the Bindings Inspector, and they make all of the summary info
    shown for each bound attribute overflow, with some of its text being replaced
    with ellipses. For the Mythical Bands array controller, we didn’t put the “Array
    Controller” in the name, which makes it much easier to work with.    You can improve
    this situation by changing the name of the controller. Changing the names won’t
    modify any of the bindings you’ve configured or change anything for your application’s
    users. The only one who’ll see the change at all is you, but remember that you’re
    important, too. Just as it’s important to format your source code in such a way
    that it’s easy for you to scan through it and find what you need, doing what you
    can to streamline your editing experience in Interface Builder will save you time
    and frustration.    So, if you want to make this change, go to the main nib window,
    make sure you’re looking at the Object Dock along the left, and find your Mythical
    Person Array Controller. Click on its name, and change it to just Mythical Person.
    Doing this will eliminate some words that don’t add any value (e.g. “Array” and
    “Controller”) and that might otherwise be spread pretty liberally throughout your
    nib file and code, and leave you with a display that’s hopefully easier for your
    eyes and brain to scan and comprehend quickly.    Putting People in Bands    Now
    let’s make it possible to attach a person to a band by adding a simple pop-up
    button to the `MythicalPerson` display, which will let us pick a `MythicalBand`
    for the selected `MythicalPerson`.'
  trans: "\n很多蓝色参考线会在垂直对齐“添加”按钮时亮起，然后它会自动吸附到左侧的正确距离上。双击按钮内的文本，将其重新标记为“Remove”。这让我们获得了足够用于处理乐队列表的用户界面，但我们还需要一个对象来将所有内容整合在一起，那就是一个`NSArrayController`。从*对象库*中拖出一个数组控制器（在搜索框中输入“array”以缩小列表范围），并将其拖放到“乐队\
    \ (Band)”窗口下方的图谱画布上。它会消失，并出现在界面构建器窗格左侧的对象停靠区中。缓慢双击新的数组控制器，将其重命名为“Mythical Bands”。选中“Mythical\
    \ Bands”对象，打开*属性检查器*。在*对象控制器*部分，将*模式*从“类 (Class)”更改为“实体名称 (Entity Name)”。在*实体名称*字段中输入字符串`MythicalBand`，并勾选*准备内容\
    \ (Prepares Content)*复选框。完成后，我们的 Xcode 窗口应看起来像图 9-7 所示。![9781430245421_Fig09-07.jpg](img/9781430245421_Fig09-07.jpg)\
    \ 图 9-7 M* M* M* Mythical Band 窗口的开端  \n\n### 设置 Cocoa 绑定\n\n现在我们已经布置好了对象，需要设置合适的\
    \ Cocoa 绑定，以便将 UI 控件与 Core Data 管理的乐队列表真正连接起来。我们从数组控制器开始，因为它已经被选中。切换到*绑定检查器*，展开*参数\
    \ (Parameters)*部分。勾选*绑定到 (Bind to)*复选框，然后从下拉菜单中选择 App Delegate。接着，在*模型键路径 (Model\
    \ Key Path)*字段中输入“`managedObjectContext`”。这将数组控制器连接到 App Delegate 中的 Core Data\
    \ 机制。\n\n现在来处理表格视图的绑定。由于这个表格视图只有一列，所以会比“Mythical Persons”窗口中的那个省事一些。首先选中表格视图本身。这最好在左侧对象停靠区的大纲视图中完成。选中后，转到*绑定检查器*（应该还开着），展开*表格内容\
    \ (Table Content)*标题下的*内容 (Content)*部分。勾选*绑定到*复选框，并确保下拉菜单显示`Mythical Bands`，且*控制器键\
    \ (Controller Key)*显示`arrangedObjects`。和之前一样，我们也希望表格视图中选中的行能传回给数组控制器。为此，展开*绑定检查器*的*选择索引\
    \ (Selection Indices)*部分。在此处勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*设置为`selectionIndexes`。这看起来很像前一章节中的图\
    \ 8-10。\n\n表格视图本身的绑定设置好之后，我们可以为列设置绑定。在对象停靠区中，展开表格视图的子视图，直到显示出一个标有“Static Text\
    \ – Table View Cell”的视图。在*绑定检查器*中，展开*值 (Value)*部分，勾选*绑定到*复选框，将下拉菜单设置为`Table Cell\
    \ View`，并将*模型键路径*设置为`objectValue.name`。这应该看起来像图 9-8 所示。然后，切换到*属性检查器*，将“行为 (Behavior)”弹出菜单从“无\
    \ (None)”更改为“可编辑 (Editable)”。如果不做此更改，我们将无法在表格视图中实际输入新乐队的名称。\n\n![9781430245421_Fig09-08.jpg](img/9781430245421_Fig09-08.jpg)\
    \ 图 9-8 M* M* M* 为 Mythical Bands 表格视图设置绑定  \n\n最后，我们来处理搜索框。选择屏幕右上角的搜索字段，打开*绑定检查器*。在*绑定检查器*的底部附近有一个名为“谓词\
    \ (Predicate)”的章节。展开它，勾选*绑定到*复选框，将其绑定到`Mythical Bands`。*控制器键*应为`filterPredicate`。将*显示名\
    \ (Display Name)*设置为“`Name`”，并将谓词格式设置为`name contains[c] $value`，其中`$value`表示搜索框的内容，`name`表示应被搜索的`MythicalBand`实体属性。这就像我们在第\
    \ 8 章中对搜索字段所做的绑定一样。\n\n对于按钮，我们将使用与上一章节相同的过程，结合 target-action 和 Cocoa 绑定。我们会用 target-action\
    \ 来处理按钮按下事件，用 Cocoa 绑定来根据需要启用或禁用按钮。先从操作开始。选中“添加 (Add)”按钮，按住 Control 键拖拽到`Mythical\
    \ Bands`数组控制器。从弹出菜单中选择`add:`操作。然后，选中“移除 (Remove)”按钮，按住 Control 键拖拽到同一位置。这次，选择`remove:`操作。为了根据表格视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。选中“添加”按钮，打开*绑定检查器*，展开*可用性\
    \ (Availability)*下的*已启用 (Enabled)*部分。勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*字段修改为`canAdd`。对于“移除”按钮，执行同样的操作，但在*控制器键*字段中使用`canRemove`。\n\
    \n现在保存更改，并运行应用程序。新窗口出现了，我们可以添加一些乐队，直接在表格视图中编辑它们的名称，并保存更改。\n\n### 为数组控制器指定有用的名称\n\
    \n我们建议您在 nib 文件中做一个更改，这在配置我们即将创建的新绑定时会很有帮助。它不会影响应用程序的行为，但您很可能会因为做了这个更改而感到高兴，并且后续的文本也假定您已进行此更新。\n\
    \nCore Data 基础设施与用户界面之间的连接都是通过一个`NSArrayController`来运行的。我们在上一章节中设置的`NSArrayController`被命名为`Mythical\
    \ Person Array Controller`。这个名字很长，超出了 Xcode 中绑定检查器（Binding Inspector）实际设计的显示长度。事实上，它勉强能挤进绑定检查器的弹出按钮中，并且这导致每个绑定属性的摘要信息溢出，部分文本被省略号代替。对于`Mythical\
    \ Bands`数组控制器，我们并没有在其名称中包含“Array Controller”，这使得它更容易操作。\n\n您可以通过更改控制器的名称来改善这种情况。更改名称不会修改您已配置的任何绑定，也不会对应用程序的用户产生任何影响。能看到这个变化的只有您自己，但请记住，您也很重要。就像以易于浏览和查找所需内容的方式格式化源代码很重要一样，尽您所能简化在\
    \ Interface Builder 中的编辑体验将为您节省时间和减少挫折。\n\n因此，如果您想进行此更改，请转到主 nib 窗口，确保您查看的是左侧的对象停靠区，找到您的`Mythical\
    \ Person Array Controller`。点击它的名称，将其改为`Mythical Person`。这样做可以删除一些没有实际价值的词语（例如“Array”和“Controller”），这些词语可能会广泛分布在您的\
    \ nib 文件和代码中，最终留下的显示内容希望能让您的大脑和眼睛更快速扫描和理解。\n\n### 将人员放入乐队\n\n现在，让我们通过向`MythicalPerson`显示界面添加一个简单的弹出按钮，实现将人员关联到乐队的功能，这将允许我们为选定的`MythicalPerson`选择一个`MythicalBand`。\n"
- fmt: '弹窗按钮将通过Cocoa绑定连接，这意味着它不仅能像其他控件一样，始终自动更新以显示选中人物的正确值，还能自动更新以始终显示当前的乐队列表，并在用户在“神话乐队”窗口中做出更改时自动改变其内容。这需要通过为弹窗按钮配置几个绑定来实现，同时使用“神话人物”和“神话乐队”控制器。


    首先，对原始窗口进行一项更改，使其与新窗口更加匹配。打开原始窗口（标题为`MythBase`的窗口），然后点击其标题栏选中窗口，并使用*属性检查器*将其重命名为“`Mythical
    People`”。这样，两个窗口就具有了相同的外观。每个窗口都围绕一个特定实体居中设计，但都没有被区分成“主窗口”。


    现在，选中滑块下方的所有视图，并将它们整体向下拖动一点。在腾出的空间中，从*对象库*拖出一个标签（命名为“`Member of Band:`”）和一个弹窗按钮。将它们排列整齐，使其大致看起来像[图9-9](#9781430245421_Ch09.xhtml#Fig9)。


    ![9781430245421_Fig09-09.jpg](images/9781430245421_Fig09-09.jpg)


    [图9-9](#9781430245421_Ch09.xhtml#_Fig9). 全新且改进的“神话人物”窗口


    现在剩下的工作就是为弹窗按钮配置一些绑定。与文本字段或滑块不同，弹窗按钮的显示需要多个绑定才能使其以有用的方式工作。考虑到一个弹窗按钮需要有一个要显示的字符串数组（这里将显示所有可用的乐队名称）、一个这些字符串所属的底层对象数组（乐队本身），以及一些指示列表中被选中项的内容（通过选中人物的`band`关系）。前两项将通过“神话乐队”控制器绑定，通过它我们可以轻松绑定到所有乐队或所有乐队名称的数组。第三项将通过“神话人物”控制器绑定。


    首先，选中弹窗按钮并打开*绑定检查器*。展开列表顶部的*Content*绑定配置，在弹出列表中选择`Mythical Bands`，将*Controller
    Key*设置为“`arrangedObjects`”，并勾选复选框。这告诉了弹窗按钮在哪里找到底层对象列表。


    接下来，展开*Content Values*绑定的配置。再次在弹出列表中选择`Mythical Bands`，*Controller Key*设置为“`arrangedObjects`”，但这次将*Model
    Key Path*设置为“`name`”。这告诉弹窗按钮，它应通过获取同一个数组（`arrangedObjects`）并询问每个对象的`name`来填充其显示值。


    最后，展开*Selected Object*绑定的配置。在这里，从弹出列表中选择`Mythical Persons`，*Controller Key*设置为“`selection`”，*Model
    Key Path*设置为“`memberOf`”。弹窗列表将自动连接各项，以便当“神话人物”控制器的选择发生变化时，弹窗按钮会注意到新选中人物的乐队，在`Content`数组（从“神话乐队”控制器获取）中查找该乐队，并显示`Content
    Values`数组（也来自“神话乐队”控制器）中对应的字符串。通过保存更改、在Xcode中点击运行并测试来验证其是否有效。对于每个选中的`MythicalPerson`，我们可以选择一个`MythicalBand`来关联他们（参见[图9-10](#9781430245421_Ch09.xhtml#Fig10)）。


    ![9781430245421_Fig09-10.jpg](images/9781430245421_Fig09-10.jpg)


    [图9-10](#9781430245421_Ch09.xhtml#_Fig10). 将赫拉克勒斯设置为“希腊配方”乐队的成员


    **显示乐队成员**


    既然我们可以将人物添加到乐队，那么能否查看乐队中所有成员的列表呢？


    让我们将其添加到“神话乐队”窗口中。这很简单：我们将手动添加一个表格视图和一个数组控制器，并将它们连接起来。


    首先，从*对象库*中拖出一个`NSArrayController`，并将其拖到主nib窗口中。就像处理其他数组控制器一样，我们希望给这个控制器起一个简短但有意义的名字。这个控制器将处理`MythicalPersons`的列表，但我们已经有名为“神话人物”的数组控制器了，而且我们想让它更容易看出这其中的上下文（它只会显示选中乐队的成员），所以我们在主nib窗口中将其命名为“`Band
    Members`”。


    然后，在选中新数组控制器的情况下，打开*属性检查器*，在*Object Controller*部分将*Mode*设置为“`Entity`”，*Entity
    Name*设置为“`MythicalPerson`”。勾选*Prepares Content*复选框。这将确保当nib文件加载时，控制器的内容会被自动获取。


    现在切换到*绑定检查器*，我们将在此配置两个绑定，使这个控制器能够根据选中的`MythicalBand`自动获取其内容。首先，在最底部，展开*Managed
    Object Context*的配置。在弹出菜单中选择`App Delegate`，*Model Key Path*设置为“`managedObjectContext`”，这应会自动勾选*Bind
    to*复选框。此配置与我们所有数组控制器的配置相同，允许它们连接到Core Data存储。接下来，在*Controller Content*部分，展开*Content
    Set*绑定的配置，在弹出菜单中选择`Mythical Bands`，*Controller Key*设置为“`selection`”，*Model Key
    Path*设置为“`members`”。这样做会使控制器的内容依赖于选中的乐队。


    现在，为成员列表腾出空间。调出“神话乐队”窗口，将其拉高一些，几乎增加一倍的高度，以便在当前内容下方放置另一个表格视图。然后，从*对象库*拖出一个表格视图，点击以选中表格视图本身（而不是包含它的滚动视图，拖动后默认选中的是滚动视图）。这里只显示乐队成员的名字，因此表格只需要一列。调出*属性检查器*，找到顶部的*Content
    Mode*设置，将*Content Mode*更改为`view-based`。接下来，找到*Content Mode*下方的*Columns*设置，将其更改为1。然后，按照前几章的做法，通过将列标题设置为“`Member
    Name`”并使其填满表格宽度，来美化列标题。最后，加上一个“`Band Members`”标签，这样用户就能知道他们看到的是什么。[图9-11](#9781430245421_Ch09.xhtml#Fig11)展示了您期望的布局。


    ![9781430245421_Fig09-11.jpg](images/9781430245421_Fig09-11.jpg)


    [图9-11](#9781430245421_Ch09.xhtml#_Fig11). 向“神话乐队”窗口添加乐队成员


    剩下要做的就是为“乐队成员”表格配置绑定。我们将把表格绑定到`NSArrayController`，然后再把列绑定到表格。首先，选中表格本身。在*绑定检查器*中，展开*Table
    Content*下的*Content*部分。然后，勾选*Bind to*复选框，并将下拉菜单设置为`Band Members`。默认的*Controller
    Key*（`arrangedObjects`）就很好。接下来配置列。使用左侧的对象停靠区大纲视图，向下钻取到表格视图中的“`Static Text - Table
    View Cell`”。在*绑定检查器*中，展开*Value*部分。下拉菜单应显示`Table Cell View`。勾选*Bind to*复选框，*Model
    Key Path*设置为“`objectValue.name`”，*Controller Key*字段留空。[图9-11](#9781430245421_Ch09.xhtml#Fig11)中窗口右侧的*绑定检查器*显示了最终的配置。'
  raw: 'The pop-up button will be connected through Cocoa bindings, which means that
    besides always being automatically updated to show the correct value for the selected
    person (just like the other controls do), it will also be automatically updated
    to always show the current list of bands, changing its content automatically as
    the user makes changes in the Mythical Bands window. This will be done by configuring
    a few bindings on the pop-up button, using both the Mythical Persons and Mythical
    Bands controllers.    Start off by making a change to the original window so that
    it better matches the new one. Open up the original window (the one with MythBase
    in the title), then select the window by clicking its title, and use the *Attributes
    Inspector* to rename it “Mythical People.” This way the two windows have the same
    general appearance. Each is centered around a particular entity, but neither of
    them has any distinction as the “main window.”    Now, select all the views below
    the sliders and drag them all down a bit. In the space that we’ve opened up, drag
    out a label (name it “Member of Band:”) and a pop-up button from the *Object Library*.
    Line it all up so it looks roughly like [Figure 9-9](#9781430245421_Ch09.xhtml#Fig9).    ![9781430245421_Fig09-09.jpg](images/9781430245421_Fig09-09.jpg)    [Figure
    9-9](#9781430245421_Ch09.xhtml#_Fig9) .  The new and improved Mythical People
    window    All that’s left now is to configure some bindings for the pop-up button.
    Unlike a text field or a slider, the pop-up button’s display needs several bindings
    in order to make it behave in a useful way. Consider that a pop-up button needs
    to have an array of strings to display (we’re going to display all available band
    names here), an array of underlying objects that those strings belong to (the
    bands themselves), and something to indicate which item in the list is selected
    (through the selected person’s band relationship). The first two of those will
    be bound via the Mythical Bands controller, through which we can easily bind to
    an array of all bands or all band names. The third will be bound via the Mythical
    Persons controller.    Start by selecting the pop-up button and opening the *Bindings
    Inspector*. Open the configuration for the *Content* binding at the top of the
    list, select Mythical Bands in the pop-up list, select “arrangedObjects” for the
    *Controller Key*, and click the checkbox. This tells the pop-up button where to
    find the list of underlying objects.    Next, open the configuration for the *Content
    Values* binding. Once again select Mythical Bands in the pop-up list and “arrangedObjects”
    for the *Controller Key*, but this time pick “name” for the *Model Key Path*.
    This tells the pop-up button that it should populate its displayed values by grabbing
    the same array (`arrangedObjects`) and using the result of asking each for its
    name.    Finally, open the *Selected Object* binding configuration. Here, choose
    Mythical Persons from the pop-up list, “selection” for the *Controller Key*, and
    “memberOf” for the *Model Key Path*. The pop-up list will automatically connect
    things so that when the Mythical Persons controller’s selection changes, the pop-up
    will notice the new selection’s band, look that up in the array of `Content` (which
    it picks up from the Mythical Bands controller), and display the corresponding
    string from the `Content Values` array (also from the Mythical Bands controller).
    Verify that this works by saving the changes, pressing Run in Xcode, and trying
    it out. For each `MythicalPerson` we pick, we can select a `MythicalBand` to attach
    them to (see [Figure 9-10](#9781430245421_Ch09.xhtml#Fig10)).    ![9781430245421_Fig09-10.jpg](images/9781430245421_Fig09-10.jpg)    [Figure
    9-10](#9781430245421_Ch09.xhtml#_Fig10) .  Setting Hercules as a member of the
    band Grecian Formula    Showing the Bands’ Members    Now that we can add people
    to a band, how about being able to see a list of all the members in a band?


    Let’s add that to the Mythical Bands window. It’ll be easy: we’ll manually add
    a table view and an array controller and hook it all up.    Start by grabbing
    an NSArrayController from the *Object Library*, and dragging it to the main nib
    window. Just like we’ve done with the other array controllers, we want to give
    this controller a name that is short but meaningful. This controller is going
    to handle a list of `MythicalPersons`, but we’ve already got an array controller
    called Mythical Persons, and anyway we want to make it easy to see that there’s
    some context to this (it will only show people that are members of the selected
    band), so let’s name this one “Band Members” in the main nib window.    Then,
    with the new array controller still selected, open the *Attributes Inspector*,
    and in the *Object Controller* section set the *Mode* to “Entity” and the *Entity
    Name* to “MythicalPerson.” Click to turn on the *Prepares Content* checkbox. This
    ensures that the controller’s content is fetched automatically when the nib loads.    Now
    switch to the *Bindings Inspector* where we’re going to configure two bindings
    that will let this controller automatically get its content based on the selected
    `MythicalBand`. First, at the very bottom, open up the configuration for *Managed
    Object Context*. Choose App Delegate in the pop-up and “managedObjectContext”
    for the *Model Key Path*, which should automatically turn on the *Bind to* checkbox.
    This configuration is the same as for all our array controllers and allows them
    to connect to the Core Data storage. Next, in the *Controller Content* section,
    open up the *Content Set* binding configuration, and choose Mythical Bands in
    the pop-up, “selection” for the *Controller Key*, and “members” for the *Model
    Key Path*. Doing so makes the controller’s content dependent on the selected band.    Now,
    make room for the list of members. Bring up the Mythical Bands window, and make
    it a bit taller, almost twice as high, so that we can fit another table view beneath
    the current content. Then, drag over a table view from the *Object Library*, and
    click it to select the table view itself (instead of the scroll view containing
    it, which is what is selected by default just after the drag). We’re only going
    to show the names of the band members here, so we only need one column in this
    table. Bring up the *Attributes Inspector*, find the *Content Mode* setting at
    the top of the inspector, and change the *Content Mode* to view-based. Next, find
    the *Columns* setting just below *Content Mode*, and change it to 1\. Then make
    the column heading nicer, as we’ve done in previous chapters, by setting its title
    to “Member Name” and making it fill the width of the table. Finally, top it all
    off with a Band Members label, so the users know what they’re looking at. [Figure
    9-11](#9781430245421_Ch09.xhtml#Fig11) shows the layout that you’re aiming for.    ![9781430245421_Fig09-11.jpg](images/9781430245421_Fig09-11.jpg)    [Figure
    9-11](#9781430245421_Ch09.xhtml#_Fig11) .  Adding band members to the Mythical
    Bands window    All that’s left is to configure a binding for the Band Members
    table. We’ll bind the table to the `NSArrayController`, and then bind the column
    to the table. Start by selecting the table itself. In the *Bindings Inspector*,
    expand the *Content* section under *Table Content*. Then, set the *Bind to* checkbox
    and set the pull-down menu to Band Members. The default *Controller Key*, arrangedObjects,
    is just fine. Now for the column. Using the Object Dock outline view to the left,
    drill down to the “Static Text - Table View Cell” down inside the table view.
    In the *Bindings Inspector*, expand the *Value* section. The pull-down menu should
    read Table Cell View. Check the *Bind to* checkbox, and set the *Model Key Path*
    to be “objectValue.name” while leaving the *Controller Key* field blank. The *Bindings
    Inspector* on the right side of the window in [Figure 9-11](#9781430245421_Ch09.'
  trans: '

    弹窗按钮将通过 Cocoa 绑定连接，这意味着它不仅能像其他控件一样，始终自动更新以显示选中人物的正确值，还能自动更新以始终显示当前的乐队列表，并在用户在“神话乐队”窗口中做出更改时自动改变其内容。这需要通过为弹窗按钮配置几个绑定来实现，同时使用“神话人物”和“神话乐队”控制器。


    首先，对原始窗口进行一项更改，使其与新窗口更加匹配。打开原始窗口（标题为`MythBase`的窗口），然后点击其标题栏选中窗口，并使用*属性检查器*将其重命名为“`Mythical
    People`”。这样，两个窗口就具有了相同的外观。每个窗口都围绕一个特定实体居中设计，但都没有被区分成“主窗口”。


    现在，选中滑块下方的所有视图，并将它们整体向下拖动一点。在腾出的空间中，从*对象库*拖出一个标签（命名为“`Member of Band:`”）和一个弹窗按钮。将它们排列整齐，使其大致看起来像图
    9-9。


    ![9781430245421_Fig09-09.jpg](img/9781430245421_Fig09-09.jpg)


    图 9-9. 全新且改进的“神话人物”窗口


    现在剩下的工作就是为弹窗按钮配置一些绑定。与文本字段或滑块不同，弹窗按钮的显示需要多个绑定才能使其以有用的方式工作。考虑到一个弹窗按钮需要有一个要显示的字符串数组（这里将显示所有可用的乐队名称）、一个这些字符串所属的底层对象数组（乐队本身），以及一些指示列表中被选中项的内容（通过选中人物的`band`关系）。前两项将通过“神话乐队”控制器绑定，通过它我们可以轻松绑定到所有乐队或所有乐队名称的数组。第三项将通过“神话人物”控制器绑定。


    首先，选中弹窗按钮并打开*绑定检查器*。展开列表顶部的*Content*绑定配置，在弹出列表中选择`Mythical Bands`，将*Controller
    Key*设置为“`arrangedObjects`”，并勾选复选框。这告诉了弹窗按钮在哪里找到底层对象列表。


    接下来，展开*Content Values*绑定的配置。再次在弹出列表中选择`Mythical Bands`，*Controller Key*设置为“`arrangedObjects`”，但这次将*Model
    Key Path*设置为“`name`”。这告诉弹窗按钮，它应通过获取同一个数组（`arrangedObjects`）并询问每个对象的`name`来填充其显示值。


    最后，展开*Selected Object*绑定的配置。在这里，从弹出列表中选择`Mythical Persons`，*Controller Key*设置为“`selection`”，*Model
    Key Path*设置为“`memberOf`”。弹窗列表将自动连接各项，以便当“神话人物”控制器的选择发生变化时，弹窗按钮会注意到新选中人物的乐队，在`Content`数组（从“神话乐队”控制器获取）中查找该乐队，并显示`Content
    Values`数组（也来自“神话乐队”控制器）中对应的字符串。通过保存更改、在 Xcode 中点击运行并测试来验证其是否有效。对于每个选中的`MythicalPerson`，我们可以选择一个`MythicalBand`来关联他们（参见图
    9-10）。


    ![9781430245421_Fig09-10.jpg](img/9781430245421_Fig09-10.jpg)


    图 9-10. 将赫拉克勒斯设置为“希腊配方”乐队的成员


    **显示乐队成员**


    既然我们可以将人物添加到乐队，那么能否查看乐队中所有成员的列表呢？


    让我们将其添加到“神话乐队”窗口中。这很简单：我们将手动添加一个表格视图和一个数组控制器，并将它们连接起来。


    首先，从*对象库*中拖出一个`NSArrayController`，并将其拖到主 nib 窗口中。就像处理其他数组控制器一样，我们希望给这个控制器起一个简短但有意义的名字。这个控制器将处理`MythicalPersons`的列表，但我们已经有名为“神话人物”的数组控制器了，而且我们想让它更容易看出这其中的上下文（它只会显示选中乐队的成员），所以我们在主
    nib 窗口中将其命名为“`Band Members`”。


    然后，在选中新数组控制器的情况下，打开*属性检查器*，在*Object Controller*部分将*Mode*设置为“`Entity`”，*Entity
    Name*设置为“`MythicalPerson`”。勾选*Prepares Content*复选框。这将确保当 nib 文件加载时，控制器的内容会被自动获取。


    现在切换到*绑定检查器*，我们将在此配置两个绑定，使这个控制器能够根据选中的`MythicalBand`自动获取其内容。首先，在最底部，展开*Managed
    Object Context*的配置。在弹出菜单中选择`App Delegate`，*Model Key Path*设置为“`managedObjectContext`”，这应会自动勾选*Bind
    to*复选框。此配置与我们所有数组控制器的配置相同，允许它们连接到 Core Data 存储。接下来，在*Controller Content*部分，展开*Content
    Set*绑定的配置，在弹出菜单中选择`Mythical Bands`，*Controller Key*设置为“`selection`”，*Model Key
    Path*设置为“`members`”。这样做会使控制器的内容依赖于选中的乐队。


    现在，为成员列表腾出空间。调出“神话乐队”窗口，将其拉高一些，几乎增加一倍的高度，以便在当前内容下方放置另一个表格视图。然后，从*对象库*拖出一个表格视图，点击以选中表格视图本身（而不是包含它的滚动视图，拖动后默认选中的是滚动视图）。这里只显示乐队成员的名字，因此表格只需要一列。调出*属性检查器*，找到顶部的*Content
    Mode*设置，将*Content Mode*更改为`view-based`。接下来，找到*Content Mode*下方的*Columns*设置，将其更改为
    1。然后，按照前几章的做法，通过将列标题设置为“`Member Name`”并使其填满表格宽度，来美化列标题。最后，加上一个“`Band Members`”标签，这样用户就能知道他们看到的是什么。图
    9-11 展示了您期望的布局。


    ![9781430245421_Fig09-11.jpg](img/9781430245421_Fig09-11.jpg)


    图 9-11. 向“神话乐队”窗口添加乐队成员


    剩下要做的就是为“乐队成员”表格配置绑定。我们将把表格绑定到`NSArrayController`，然后再把列绑定到表格。首先，选中表格本身。在*绑定检查器*中，展开*Table
    Content*下的*Content*部分。然后，勾选*Bind to*复选框，并将下拉菜单设置为`Band Members`。默认的*Controller
    Key*（`arrangedObjects`）就很好。接下来配置列。使用左侧的对象停靠区大纲视图，向下钻取到表格视图中的“`Static Text - Table
    View Cell`”。在*绑定检查器*中，展开*Value*部分。下拉菜单应显示`Table Cell View`。勾选*Bind to*复选框，*Model
    Key Path*设置为“`objectValue.name`”，*Controller Key*字段留空。图 9-11 中窗口右侧的*绑定检查器*显示了最终的配置。

    '
- fmt: '图 11 显示了这在 Xcode 中的样子。好了，这个窗口的工作就完成了。现在该保存我们的工作，在 Xcode 中点击“运行”，然后查看新功能：为一个人指定乐队会将此人添加到该乐队的
    `members` 数组中，当我们在“Mythical Band”窗口中选择该乐队时，就会看到这个效果。


    ### 创建一个“Venue”窗口


    现在，是时候再创建一个用于显示和编辑 `MythicalVenues` 的窗口了。制作这个窗口的过程与我们制作“Mythical Bands”窗口时非常相似：需要一个窗口、一个表视图、几个按钮以及一个
    `NSArrayController`。由于真正的神话级场地并不多，我们省去了这个窗口上的搜索框。而且，由于我们已经做过一次，所以会加快速度。


    首先，从*对象库*中拖出一个窗口到 Interface Builder 画布上。在*属性检查器*中，将其标题设置为“Mythical Venues”。这个窗口比我们需要的要大一点，所以我们可以在垂直方向上将其缩小到大约三分之二的高度，并稍微收窄一些。拖出一个表视图，将其放置在屏幕的左上角，让蓝色参考线告诉我们放置的位置。将表视图展开以填满窗口，如[图
    9-1](#9781430245421_Ch09.xhtml#Fig1) 所示。在表视图的*属性检查器*中，将其*内容模式*更改为基于视图，并将其设置为一列。展开这一列以填满表视图的宽度。


    拖出一个渐变按钮到窗口上，将其放置在表视图的右下边缘下方。这将是我们的“添加”按钮，所以双击它并将标题改为“Add”。再拖出另一个按钮，将其放置在“添加”按钮的左侧，并将此按钮标题设置为“Remove”。和往常一样，蓝色参考线是我们正确定位的帮手。


    接下来我们需要一个 `NSArrayController`。从*对象库*中抓取一个，并将其拖到 Interface Builder 画布上。在左侧的对象停靠区中，将其标题设置为“Mythical
    Venues”。在*属性检查器*中，将其*模式*设置为“Entity Name”，将实体名称设置为“MythicalVenue”，并勾选*Prepares
    Content*复选框，以便在加载 nib 文件时获取所有场地。我们还需要将“Mythical Venues”数组控制器连接到 App Delegate 提供的托管对象上下文。在*绑定检查器*中，展开底部的*参数*部分。勾选*Bind
    to*复选框，将下拉菜单设置为“App Delegate”，并将*模型键路径*设置为“managedObjectContext”。


    现在我们需要将所有内容连接起来。让我们从表视图开始。选中表视图（记住它嵌入在一个滚动视图中）。在*绑定检查器*中，展开*表内容*下的*内容*部分。然后，勾选*Bind
    to*复选框并将下拉菜单设置为“Mythical Venues”。默认的控制器键 `arrangedObjects` 就很好。现在处理列。正如我们之前对“Band
    Members”表视图所做的那样，深入到表视图内部的“Static Text – Table View Cell”。在*绑定检查器*中，展开*值*部分。下拉菜单应该显示“Table
    Cell View”。勾选*Bind to*复选框，将*模型键路径*设置为“objectValue.name”，同时将*控制器键*字段留空。在这里，我们切换到*属性检查器*，将*行为*设置从“None”更改为“Editable”，这样当我们创建新场地时，就可以在表视图内设置名称。


    接下来，我们将处理按钮。选中“添加”按钮，按住 Control 键并拖拽到“Mythical Venues”数组控制器上。从弹出菜单中选择 `add:` 操作。然后，选中“移除”按钮，按住
    Control 键并拖拽到同一个位置。这次，选择 `remove:` 操作。为了根据表视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。


    选中“添加”按钮，打开*绑定检查器*，展开*可用性*下的*已启用*部分。勾选*Bind to*复选框，将下拉菜单设置为“Mythical Venues”，并将*控制器键*字段改为“canAdd”。对于“移除”按钮，执行相同操作，但在*控制器键*字段中使用“canRemove”。


    再次，保存我们的工作，在 Xcode 中点击“运行”，然后查看新功能：我们可以添加和删除新的神话级场地。


    ### 向“Band”窗口添加“Gig”列表


    我们需要添加的最后一项功能是能够创建 `MythicalGigs`。`MythicalGigs` 位于 `MythicalBands` 和 `MythicalVenues`
    之间，每个乐队和场地都可能有多场演出。同时，每场演出恰好与一个乐队和一个场地相关联。我们将添加另一个表视图来包含所需功能，将其放置在“Mythical Band”窗口中的成员表视图旁边。表视图的每一行将包含用于显示演出的
    `performanceDate` 和 `venue` 的字段。我们还将在此表视图下方设置一个详细信息区域，以便编辑这些字段（参见[图 9-12](#9781430245421_Ch09.xhtml#Fig12)）。


    ![9781430245421_Fig09-12.jpg](images/9781430245421_Fig09-12.jpg)


    [图 9-12](#9781430245421_Ch09.xhtml#_Fig12) . 这是最终的“Mythical Bands”窗口的样子


    首先，在*对象库*中找到一个 `NSArrayController`。将其拖到主 nib 窗口，并命名为“Gigs”。打开*属性检查器*，将*模式*设置为“Entity”，并在*实体名称*中输入“MythicalGig”，然后点击以打开*Prepares
    Content*复选框。现在切换到*绑定检查器*。将新数组控制器的*托管对象上下文*绑定到 App Delegate 的 `managedObjectContext`，并将其*内容集合*通过“Mythical
    Bands”进行绑定，将*控制器键*设置为“selection”，将*模型键路径*设置为“gigs”。


    接下来，我们将设置 GUI 本身。从*对象库*中拖出另一个表视图到“Mythical Bands”窗口，并拖出一个“Gigs”标签，按照[图 9-12](#9781430245421_Ch09.xhtml#Fig12)
    所示进行布局。这个表视图将显示一列日期和一列场地名称。默认的表视图单元格对此就完全适用。首先，在*属性检查器*中将表视图的*模式*设置为基于视图。然后，切换到*绑定检查器*，展开*表内容*下的*内容*区域。将其绑定到“Gigs”，将*控制器键*保留为“arrangedObjects”，并将*模型键路径*留空。我们还需要绑定*选择索引*。也将其绑定到“Gigs”，将*控制器键*设置为“selectionIndices”，并将*模型键路径*留空。


    表格列的标题应该有名称——左列为“Date”，右列为“Venue”——现在就去设置它们。然后，在对象停靠区中展开对象层级，深入到“Date”列的“Static
    Text – Table View Cell”对象。在*绑定检查器*中，将其绑定到“Table Cell View”，并将*模型键路径*设置为“objectValue.performanceDate”。然后，展开“Venue”列下方的对象层级，深入到该列的“Static
    Text – Table View Cell”。在*绑定检查器*中，将其绑定到`objectValue.venue.name`。这就涵盖了表视图所需做的所有工作！


    我们还需要添加和移除按钮，以便用户创建和删除演出。选择并复制窗口上部的两个按钮，将新按钮拖到演出表视图的下方。按住 Control 键从“添加”按钮拖拽到“Gigs”控制器并选择
    `add:` 操作，然后按住 Control 键从“移除”按钮拖拽到“Gigs”控制器并选择 `remove:` 操作。作为最后的润色，我们可以通过使用一些简单的绑定，让这些按钮根据表视图的内容和选择变化自动启用或禁用。'
  raw: 'xhtml#Fig11) shows what this looks like in Xcode.    All right, that should
    do it for this window. It’s time to save our work, hit Run in Xcode, and see the
    new functionality: specifying a band for a person will add that person to the
    band’s members array, which we’ll see when we select the band in the Mythical
    Band window.    Creating a Venue Window    Now it’s time to create one more window
    for displaying and editing `MythicalVenues`. The process of making this window
    will be a lot like what we did to make the Mythical Bands window—a window, a table
    view, a couple buttons, and an `NSArrayController`. Since there aren’t that many
    truly mythical venues, we’ll forego the Search box on this window. And, since
    we’ve done this once before, we’ll go a little faster.    To get started, drag
    a window out from the *Object Library* onto the Interface Builder canvas. In the
    *Attributes Inspector*, title it “Mythical Venues.” It’s a bit bigger than we’ll
    need, so we can shrink it vertically to be about 2/3rds as tall and a bit narrower
    as well. Drag out a table view and position it in the upper-left hand corner of
    the screen, letting the blue guidelines inform us where to position it. Expand
    the table view to fill the window, as shown back in [Figure 9-1](#9781430245421_Ch09.xhtml#Fig1).
    In the *Attributes Inspector* for the table view, change its *Content Mode* to
    be view-based, and change it to have one column. Expand the one column to fill
    out the table view’s width.    Drag out a Gradient button to the window, and position
    it below the lower-right edge of the table view. This will be our Add button,
    so double-click it and change the title to “Add.” Drag out another and position
    it just to the left of the Add button, and title this one “Remove.” As always,
    the blue guidelines are our friends for getting the position right.    The next
    thing we’ll need is an `NSArrayController`. Grab one of those from the *Object
    Library* and drag it out onto the Interface Builder canvas. In the Object Dock
    on the left, title it “Mythical Venues.” In the *Attributes Inspector*, set its
    *Mode* to “Entity Name,” set the entity name to “MythicalVenue,” and check the
    *Prepares Content* checkbox so that it will fetch all the venues when the nib
    is loaded. We also need to connect the Mythical Venues array controller to the
    managed object context provided by the App Delegate. In the *Bindings Inspector*,
    expand the *Parameters* section at the bottom. Check the *Bind to* checkbox, set
    the pull-down menu to App Delegate, and set the *Model Key Path* to “managedObjectContext.”    We’ve
    now got to wire this all together. Let’s start with the table view. Select the
    table view (remember that it’s embedded within a scroll view). In the *Bindings
    Inspector*, expand the *Content* section under *Table Content*. Then, set the
    *Bind to* checkbox and set the pull-down menu to Mythical Venues. The default
    controller key, arrangedObjects, is just fine. Now for the column. Just as we
    did with the Band Members table view above, drill down to the “Static Text – Table
    View Cell” down inside the table view. In the *Bindings Inspector*, expand the
    *Value* section. The pull-down menu should read Table Cell View. Check the *Bind
    to* checkbox, and set the *Model Key Path* to be “objectValue.name” while leaving
    the *Controller Key* field blank. While we’re here, switch to the *Attributes
    Inspector*, and change the *Behavior* setting from None to Editable so that when
    we create a new Venue, we can set the name inside the table view.    Next, we’ll
    tackle the buttons. Select the Add button, and control-drag to the Mythical Venues
    array controller. Select the `add:` action from the pop-up menu. Then, select
    the Remove button, and Control-drag to the same place. This time, select the `remove:`
    action. To enable and disable the buttons based on the selection in the table
    view, we need to use the *Bindings Inspector*.


    Select the Add button, open the *Bindings Inspector*, and expand the *Enabled*
    section under *Availability*. Check the *Bind to* checkbox, set the pull-down
    menu to Mythical Venues, and change the *Controller Key* field to read “canAdd.”
    For the Remove button, do the same thing, but use “canRemove” for the *Controller
    Key* field.    Once again, it’s time to save our work, hit Run in Xcode, and see
    the new functionality: we can add and remove new Mythical Venues.    Adding a
    Gig List to the Band Window    The final piece of functionality we need to add
    is the ability to create `MythicalGigs`. `MythicalGigs` sit between `MythicalBands`
    and `MythicalVenues`, each of which may have multiple gigs. Gigs, meanwhile, each
    have exactly one band and one venue. We’ll add another table view to contain the
    needed functionality, placed beside the members table view in the Mythical Band
    window. Each row of the table view will contain fields for displaying the gig’s
    performanceDate and venue. We’ll also be setting up a details area below the table
