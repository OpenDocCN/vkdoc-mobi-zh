    = _persistentStoreCoordinator; @synthesize managedObjectModel = _managedObjectModel;
    @synthesize managedObjectContext = _managedObjectContext;  #define DEFAULT_PREDICATE
    @"(quoteText CONTAINS[cd] ''missed'') OR " \                            "(character
    CONTAINS[cd] ''kramer'')" #define STORED_PREDICATE_KEY @"storedPredicateFormat"  -
    init {   if ((self = [super init])) {     NSString *format = [[NSUserDefaults
    standardUserDefaults]         objectForKey:STORED_PREDICATE_KEY];     if (format)
          self.searchPredicate = [NSPredicate predicateWithFormat: format];     else
          self.searchPredicate = [NSPredicate predicateWithFormat: DEFAULT_PREDICATE];
      }   return self; }  - (void)applicationWillTerminate:(NSNotification *)aNotification
    {   NSString *format = [self.searchPredicate predicateFormat];   [[NSUserDefaults
    standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY]; } ```    We
    start by defining a string, which will be used as a key to store and retrieve
    the predicate from the user’s preferences using `NSUserDefaults`. Then, we enhance
    the `init` method to look for a stored predicate. It first checks to see if a
    stored predicate string exists, and if it does, it populates the `searchPredicate`
    instance variable with a new predicate created from the format string. If there
    is no stored predicate, the default predicate is created instead.    Finally,
    we implement the `applicationWillTerminate:` method. This method is called automatically
    when the user quits the application, giving us a chance to do some final cleanup.
    Here, we convert the current search parameters (maintained in the `searchPredicate`
    instance variable) into a string, and save that string into the user’s preferences
    so that the same search will pop up the next time the user runs the app.    Save,
    run, and then modify the search terms. Quit the app and run it again, and the
    previous search terms show up again.    Wrap Up    This chapter showed the basics
    of how to use `NSPredicate` to narrow down a Core Data result set. We saw how
    an `NSPredicate` can be constructed in code, or in Xcode, or by user interaction
    with `NSPredicateEditor`. We even got a hint of how these predicates can be saved
    for later use, much like iTunes and Mail do with smart playlists and smart folders.
    These techniques can help you easily bring new levels of functionality to your
    own apps.    [Chapters 8](#9781430245421_Ch08.'
  trans: "\n# 向搜索窗口添加谓词编辑器\n\n现在，我们有了一个 `FoundQuotes` 控制器，它根据应用程序委托“拥有”的谓词内容来获取值。下一步是向搜索窗口添加一个\
    \ `NSPredicateEditor`，并配置它，让用户能够编辑谓词。\n\n在 Xcode 中，调出“引文查找器”窗口。将整个窗口稍微拉高一些，然后将现有的表格视图和文本视图拖到底部。接着在*对象库*中找到`NSPredicateEditor`，将其拖入窗口顶部的空白区域，并调整其大小使其填满可用空间。图\
    \ 10-7 展示了这一布局。\n\n![9781430245421_Fig10-07.jpg](img/9781430245421_Fig10-07.jpg)\n\
    \n图 10-7。谓词编辑器已就位于我们的搜索窗口中\n\n## 配置谓词编辑器\n\n现在，需要将编辑器绑定到应用程序委托的谓词实例。选中`NSPredicateEditor`（别忘了额外点击一次以选中编辑器本身，而不是包含它的滚动视图），打开*绑定检查器*，然后检查*值*绑定信息。在弹出的菜单中选择“App\
    \ Delegate”，然后在*模型键路径*组合框中输入“searchPredicate”，并按回车键激活此绑定。\n\n此时，要启用此谓词编辑器的搜索功能，我们只需再做一件事：根据我们想要搜索的属性对编辑器进行定制。`NSPredicateEditor`是一个相当复杂的控件，幸运的是，其大部分有趣的功能都可在\
    \ Xcode 中直接配置。谓词编辑器显示一个或多个`NSPredicateEditorRowTemplate`对象，每个对象都可以配置为以多种方式进行搜索。我们可以创建行模板，允许用户指定数字或日期来与对象值进行比较，或者从预定义字符串列表中选取。在我们的例子中，我们将配置一个行模板，允许用户在文本字段中输入字符串，以便按角色名称、剧集名称和引文内容进行搜索。这个行模板可以复用，允许用户同时指定多个搜索条件。此外，另一个行模板将让用户选择搜索结果中的引文是必须满足所有条件（布尔`AND`），还是只要任意匹配成功即可（布尔`OR`）。\n\
    \n在 Interface Builder 画布中，点击两个可见行中较低的那个（即包含显示“名称”和“包含”的弹出按钮的那一行），深入查看谓词编辑器。选中该行模板后，调出*属性检查器*。注意那些复选框，它们让我们可以选择允许用户使用哪些比较器；还有弹出按钮，让我们可以选择比较器两侧表达式的性质（键路径、字符串、常量值等）。默认设置（左侧为键路径，右侧为字符串）非常适合我们的需求，但我们确实需要根据搜索需求调整键路径。\n\
    \n编辑 *Left Exprs* 键路径下方列出的三个默认值，将它们修改为 `quoteText`、`character` 和 `show.name`。接着，点击选中*忽略大小写*和*忽略变音符号*复选框（参见图\
    \ 10-8）。\n\n![9781430245421_Fig10-08.jpg](img/9781430245421_Fig10-08.jpg)\n\n\
    图 10-8。配置 `NSPredicateEditorRowTemplate`\n\n然后，检查行模板本身的弹出按钮。这里会显示三个条目，名称与我们刚刚输入的键路径相同。将它们改为更易读的名称：“引文”、“角色名称”和“剧集名称”。\n\
    \n现在点击上方的行模板，即显示“以下任意一项为真”的那一个。它的配置非常简单。复选框让我们可以选择是否允许用户使用布尔 `AND`、`OR` 和 `NOT`\
    \ 进行搜索。\n\n启用所有这些选项以获得最大的实用性。\n\n现在，还有最后一项配置需要完成。默认情况下，`NSPredicateEditor` 允许用户删除所有行，直至最后一行，此时将不再有\
    \ + 按钮来添加新行。通过选中谓词编辑器本身（而不是某个行模板），并在*属性检查器*中点击取消勾选*可移除所有行*复选框来更改此行为。\n\n保存工作，在\
    \ Xcode 中点击运行，尽情享受 QuoteMonger 的强大功能吧！现在，我们可以使用在谓词编辑器中配置的三个条件，轻松搜索所有已保存的引文。\n\n\
    ## 保存谓词\n\n在收工之前，让我们再添加一项最后的润色，使 QuoteMonger 为用户带来友好的使用体验。目前，每次用户启动应用时，它都会使用我们设定的默认查询。如果它能显示上次运行时的最后一个查询，岂不是很好？事实证明，这非常简单。`NSPredicate`\
    \ 有一个便捷的方法叫做 `predicateFormat`，它以字符串形式返回谓词的值。因此，我们可以在用户退出应用时，使用 `NSUserDefaults`\
    \ 保存当前 `searchPredicate` 的字符串表示形式，并在应用启动时检查是否有保存的字符串。打开 `QMAppDelegate.m`，对其实现的第一部分进行如下修改（只需添加所有以粗体显示的行）：\n\
    \n```\n#import \"QMAppDelegate.h\"\n\n@implementation QMAppDelegate\n\n@synthesize\
    \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
    \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
    \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'missed') OR \" \\\n  \
    \                         \"(character CONTAINS[cd] 'kramer')\"\n#define STORED_PREDICATE_KEY\
    \ @\"storedPredicateFormat\"\n\n- init {\n  if ((self = [super init])) {\n   \
    \ NSString *format = [[NSUserDefaults standardUserDefaults]\n        objectForKey:STORED_PREDICATE_KEY];\n\
    \    if (format)\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
    \ format];\n    else\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
    \ DEFAULT_PREDICATE];\n  }\n  return self;\n}\n\n- (void)applicationWillTerminate:(NSNotification\
    \ *)aNotification {\n  NSString *format = [self.searchPredicate predicateFormat];\n\
    \  [[NSUserDefaults standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY];\n\
    }\n```\n\n我们首先定义了一个字符串，它将用作通过 `NSUserDefaults` 在用户偏好设置中存储和检索谓词的键。然后，我们增强了 `init`\
    \ 方法，以便查找已存储的谓词。它首先检查是否存在已存储的谓词字符串，如果存在，则使用该格式字符串创建一个新的谓词来填充 `searchPredicate`\
    \ 实例变量。如果没有存储的谓词，则创建默认谓词。\n\n最后，我们实现了 `applicationWillTerminate:` 方法。当用户退出应用程序时，这个方法会被自动调用，让我们有机会进行一些最后的清理工作。在这里，我们将当前的搜索参数（保存在\
    \ `searchPredicate` 实例变量中）转换为字符串，并将该字符串保存到用户的偏好设置中，以便用户下次运行应用时，相同的搜索条件会再次出现。\n\
    \n保存，运行，然后修改搜索词。退出应用并再次运行，之前的搜索词会再次出现。\n\n## 总结\n\n本章展示了如何使用 `NSPredicate` 来缩小\
    \ Core Data 结果集的基本知识。我们了解了如何在代码中、在 Xcode 中、或者通过用户与 `NSPredicateEditor` 的交互来构造\
    \ `NSPredicate`。我们还初步了解了如何保存这些谓词以供以后使用，就像 iTunes 和 Mail 对智能播放列表和智能文件夹所做的那样。这些技术可以帮助你轻松地为自己的应用程序带来新的功能层次。\n\
    \n[第 8 章](#9781430245421_Ch08.\n"
- fmt: '# Chapter 11: Windows and Menus and Sheets


    Chapters 1 through 10 covered the main concepts you need to get up and running
    with Core Data. Now it’s time to move on to other topics. We won’t be leaving
    Core Data behind, however, as it will still play a role in some further exercises,
    though not to the same extent. We don’t have enough space in this book to turn
    every example into a full-fledged application. Even in cases where we’re not using
    Core Data, however, you might want to think about where it could fit into what
    we’re demonstrating in the coming chapters. Now that you’ve got Core Data at your
    fingertips, you’ll probably have a whole new view on some aspects of application
    development that you would have solved in a different way before. Speaking of
    views, that’s where we’re headed in Chapter 11, with a look at some of the most
    prominent and widely used view components in Cocoa and elsewhere: windows, menus,
    and sheets.


    For the past several chapters, we’ve been focusing on what could be considered
    the “back end” of Cocoa programming, the model and controller classes that provide
    functionality to help take care of our application’s infrastructure. Now it’s
    time to turn our attention to the “front end” of Cocoa and pay more attention
    to the view part of the MVC architecture.


    In this chapter, we’re going to focus on windows (not the Microsoft kind), menus
    (not the restaurant kind), panels (not the solar kind), and sheets (not the bed
    kind), all of which are high-level GUI objects that practically no Cocoa application
    can do without. Windows provide the foundation for view objects to do their drawing.
    In Cocoa, these are represented by `NSWindow`, its direct subclass `NSPanel`,
    and several specialized subclasses. Menus provide the familiar top-of-the-screen
    access to system-wide and application-specific user actions that most Mac applications
    have, and are represented by a hierarchy of `NSMenu` and `NSMenuItem` objects.
    Sheets provide an alternative to the classic free-floating modal window by letting
    us attach a modal window as an overlay on an existing window, giving the user
    a more coherent interface.


    We’re going to explore each of these three areas in a “lab,” a toy application
    that has no real use and is only created for demonstrating some functionality
    and letting us see how these things work.


    ## NSWindow and NSPanel


    Start by creating a new Xcode project using the Cocoa Application template, and
    name it `WindowLab`. We’ll use this project as a testbed for demonstrating a variety
    of window features.


    In Mac OS X, nearly everything seen on-screen is presented using windows. Many
    windows are easily recognizable, having the standard controls along the top and
    a drop-shadow behind.


    But some windows aren’t so obvious. For example, if we launch a game that takes
    over the whole screen for its display, even if it’s presenting custom controls
    of its own that have nothing to do with Cocoa, that’s all occurring in a window.
    The Dock at the bottom of the screen is surely a window. And if we drag a file
    icon from one Finder window to another, the icon we’re dragging is actually being
    “carried” inside a small, transparent window!


    In all of these cases, we’re seeing and interacting with instances of `NSWindow`
    and its subclasses. `NSWindow` is a very versatile class that lets us configure
    several behaviors right out of the box and lets us do even more by subclassing.
    In general, if we want to change the appearance of the window itself, either its
    “chrome” (the title bar and upper-left corner controls), its transparency, or
    its shape, we’ll probably need to subclass `NSWindow`, but otherwise, we almost
    never will. In this book, we’re going to stick to the kinds of windows that are
    ready to use directly and conform to Apple’s Human Interface Guidelines, and we
    won’t be subclassing `NSWindow` to change their appearance.


    **Tip** The Human Interface Guidelines (often shortened to “HIG”) are a set of
    recommendations that Apple provides for application developers. The HIG acts as
    a sort of style guide that you can refer to when you’re concerned that your application
    looks a little “off.” It’s not a strict set of rules, and no one is going to stop
    you from violating the HIG. In fact, many applications, including Apple’s own,
    stray from the guidelines in all kinds of ways. However, it provides a good baseline,
    describing how the various components are meant to be used.


    We mentioned the HIG in Chapter 2 already, but it’s worth pointing out again.
    You can find the HIG online at `http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`.


    Figure 11-1 shows the main kinds of windows that are prevalent in most Cocoa applications
    today. There are two drawing styles included for `NSWindow`, the “normal” appearance
    and the “textured” appearance, which somewhat resembles a shiny piece of metal.
    Either style of `NSWindow` can be configured to support full-screen mode, which
    adds arrows to the right end of the title bar. `NSPanel`s can be configured to
    be in utility mode (in which case they have a smaller title bar, cast a smaller
    shadow, and float above the application’s other windows) or to look like a normal
    window, and in either case the choice of normal vs. textured also applies, just
    like `NSWindow`. One additional option for `NSPanel` is to run in HUD (short for
    heads-up display) mode, in which case the panel’s color scheme is inverted, its
    title bar and bottom edge are modified, and the whole window is made slightly
    transparent. This mode (which has no textured option) is intended to allow the
    user to see through a part of the interface to what’s behind it and is put to
    good use in applications like iPhoto, where you can bring up a HUD panel containing
    adjustable color settings, through which the photo you’re looking at can still
    be seen.


    ![9781430245421_Fig11-01.jpg](images/9781430245421_Fig11-01.jpg)


    Figure 11-1. A sampling of the main types of windows readily available in Cocoa


    Unlike some other GUI toolkits, where one of the first things you do when creating
    a new application is to subclass some sort of Application class and some sort
    of Window class, Cocoa allows for true separation of the model, view, and controller
    portions of your application. The window only needs to know how to display itself
    and provide a graphics context for its views, so that’s all it does. Any code
    that deals with what happens to a window while the application is running (e.g.,
    it gets loaded from a nib file, or gets dragged across the screen, or gets closed
    by the user) can typically be dealt with by the window’s delegate object (i.e.,
    its controller).


    ## Handling Input


    In addition to providing a frame for views to display their stuff, `NSWindow`
    also handles user input from the mouse and keyboard. Any mousing action (clicking,
    dragging, moving, releasing, and so on) in an `NSWindow` will trigger a method
    in `NSWindow` that finds the appropriate view object in its contents and calls
    the same method in the view. This symmetry works because `NSWindow` and `NSView`
    both inherit from `NSResponder`, where the methods for handling these events are
    defined. Likewise, when the user presses or releases a key on the keyboard, the
    application calls a method in the application’s “key window” (i.e. the window
    that currently has keyboard focus; usually the last window the user clicked in),
    which in turn determines which view currently has keyboard focus and passes off
    responsibility, calling the same method in the focused view.'
