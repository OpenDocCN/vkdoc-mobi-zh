    从表格视图（Table View）按住 Control 键拖拽至 `VillainTrackerAppDelegate`，然后从选项列表中选择 `dataSource`。接着重复操作，这次选择
    `Delegate`。如此一来，连接便已就绪！


    现在来看看它在运行时的表现如何。点击 Xcode 窗口左上角的“运行”按钮。试着拖动窗口的右下角来调整大小，看看会发生什么。小心，因为接下来是……


    ## 糟糕的调整大小意外，或者说，约束来救场！


    第一次运行重新布局后的程序时，你很可能看到像图 6-5 那样相当难看的画面。这是通过调整大小手柄垂直拉伸窗口并水平缩小的结果。观察图片中的窗口，表格视图状态良好，“能力与属性”框和“主要动机”框也是如此。“外观”框向下扩展了。“备注”框水平缩小了，“基本信息”框也一样。实际上，“基本信息”框简直一团糟。你的布局可能会以不同于图示的方式崩溃，但很可能无法完全按你预期的方式工作。你可能希望使用本章提供的源代码来进行试验。


    ![9781430245421_Fig06-05.jpg](img/9781430245421_Fig06-05.jpg)


    图 6-5。唉！这可不美观


    在修复这个问题之前，让我们先想想我们希望达到的效果。对于这个程序，我们希望上一章的所有原始 UI 元素（`NSBoxes` 中的所有项目）保持相同大小，并固定在窗口右侧。两个新按钮应保持相同大小，彼此间距不变，并固定在窗口左侧表格视图的下方。新表格视图应在窗口扩展时同时垂直和水平扩展，它应紧贴窗口左侧，并且在任何方向上都不能缩小到当前尺寸以下。表格视图右侧的几个框应与表格视图保持距离。


    为了实现这一切，我们必须了解 Cocoa 如何处理大小调整。从 Mac OS X Lion 开始，大小调整通过一个名为 Cocoa 自动布局（Cocoa Auto
    Layout）的系统进行。自动布局中的调整行为使用带优先级的约束来指定，这意味着你可以声明视图的最小或最大尺寸、需要保留的子视图之间的关系、视图与其父视图之间的关系等等。当用户调整窗口大小时，约束满足引擎会根据优先级顺序动态尝试确定最佳布局，以尽可能保留约束。这些约束还处理用户界面在从右到左书写系统（如阿拉伯语和希伯来语）中的行为。


    每个约束都表达一种关系，例如“等于”、“小于”或“大于”，以及一对视图或一个视图与一个常量。一个非常简单的约束是“`myButton` 的宽度 = 87”。显然，这会将按钮宽度固定为
    87 点。约束不必是等式；一个有效的约束可以是“`myButton` 的高度 >= 32”，这表示按钮的高度不能小于 32。系统会更倾向于较小尺寸而非较大尺寸；一个宽度必须大于或等于
    32 的按钮通常会是 32（满足不等式的最小值）。


    更复杂的一对约束如下：“`myButton` 的前边缘与窗口前边缘之间的水平间距 = 10”和“`myButton` 的后边缘与窗口后边缘之间的水平间距 =
    15”。为了在调整大小时保持这两个约束成立，按钮需要随窗口一起放大和缩小。注意，我们使用了“前”和“后”而非“左”和“右”。在从左到右的书写系统中，前边缘是左侧。然而，在从右到左的书写系统中，前边缘是右侧。


    每个约束还有一个优先级，范围从 1 到 1000。优先级高的约束会在优先级低的约束之前被满足，如果两个冲突的约束无法同时满足，优先级高的胜出，优先级低的会被违反。例如：“`myButton`
    的宽度 >= 32，优先级 1000”和“`myButton` 的宽度 = `someField` 的宽度 - 40，优先级 750”。只要 `someField`
    的宽度大于 72，这两个约束都能得到满足，`myButton` 将比 `someField` 小 40 点。然而，如果 `someField` 缩小到低于
    72 点，优先级高的约束将胜出，`myButton` 将不再缩小。


    每个视图还具有内容拥抱优先级（Content Hugging Priority）和内容压缩阻力优先级（Content Compression Resistance
    Priority）。这些属性描述了视图如何相对于最合适的尺寸（即其固有尺寸）进行大小调整。对于按钮而言，固有尺寸是显示其标签（以及图标，如果适用）而不发生裁剪所需的尺寸。内容拥抱控制视图在被要求大于其固有尺寸时如何调整大小。压缩阻力控制视图在被要求小于其固有尺寸时如何调整大小。通常，这些优先级的默认值是不错的选择，在本章中，我们将保持它们不变。


    ## 创建和编辑约束


    Interface Builder 允许我们指定控制每个视图调整大小行为的约束。事实上，我们一直通过 Interface Builder 在我们拖动新控件到窗口时显示的蓝色虚线引导线来做到这一点。约束最初是在
    Interface Builder 中根据控件定位时高亮显示的蓝色引导线创建的，并且如果控件被重新定位，约束可能会改变。例如，当我们把表格视图拖到窗口右上角时，当我们靠近边缘时会出现一条垂直和水平的蓝色虚线。这表明表格视图应固定在该角落，并创建一对约束，指示表格视图应与窗口顶部和左边缘保持恒定距离。像我们这样的复杂窗口，可能包含几十个约束。


    为了确定哪些约束合适，我们首先需要决定窗口的适当调整行为。针对我们的窗口，假设我们希望新的表格视图在窗口放大时同时水平和垂直调整大小。我们希望所有框保持大小不变，并在用户调整窗口时向右侧弹性移动。最后，我们希望按钮保持彼此相同大小，并固定在窗口底部。我们需要设置新的约束来实现这一点，并可能移除一些非预期的约束。顺便提一下，处理调整大小是一个迭代过程。结合在
    Interface Builder 模式下试验窗口调整大小以及使用 Xcode 中的“模拟文档”功能进行试错，通常是打磨它的方法。花时间试验调整大小并观察约束如何交互，将比你从书本中读到的任何内容都更能加深你的理解。


    这些约束可以在 Xcode 内部进行编辑；我们可以在屏幕上、实用工具区域（Utility area）的“大小检查器”（Size Inspector）中以及
    Interface Builder 窗格左侧边缘的图标停靠栏中看到它们。选择隐藏在 Interface Builder 窗格左下角的小展开三角形，图标停靠栏将展开，显示窗口中视图的完整层次结构。每个视图都有一组关联的约束，而我们的窗口有很多视图。在实用工具区域中，选择“大小检查器”（![image](images/arrow2.

    '
- fmt: '5. 选中“外观”框，然后选择标记为**外观**的框，展开左侧的**约束**项。当该框被选中时，Interface Builder 窗格应如图 6-6
    所示。


    ![9781430245421_Fig06-06.jpg](images/9781430245421_Fig06-06.jpg)


    图 6-6. 外观框的调整大小约束


    在**尺寸检查器**中，我们可以看到影响外观框的九个约束，至少到目前为止我们是这样布局的。（根据你布局窗口的方式，你的约束可能顺序不同或常量略有不同。）每条从该框延伸出的蓝线也代表一个与另一个视图相关联的调整大小约束。并非所有约束都与另一个视图相关，因此实际激活的约束比蓝线可视化的要多。


    外观框的问题在于，当窗口在调整大小过程中被拉长时，它会向下扩展，同时拉长图像视图。查看**尺寸检查器**中的约束列表，其中一条显示为“与父视图的底部间距等于：29”。此约束意味着外观框的底部应保持在窗口底部上方
    29 点处。另一个与垂直大小相关的约束显示为“与框的顶部间距 – 基本信息等于：默认”。这意味着该框的上边缘应保持与基本信息框底部的系统默认距离。约束左侧的紫色图标表示这些是系统创建的约束——即我们之前在
    Interface Builder 中定位该框时设置的约束。当我们之前将外观框对齐到窗口底部附近出现的蓝色参考线时，我们隐式地创建了那个底部间距约束。然而，如果我们点击底部间距约束旁的齿轮图标，会发现**删除**菜单项是禁用的。要删除它，我们需要换个思路。


    让我们稍微试验一下。在 Interface Builder 中，抓住窗口底部并向下拖动以放大它。外观框确实在垂直方向上变大了。底部间距约束导致该框增长，以保持距离窗口底部
    29 点。将窗口重新调整回 364 点高度以恢复所有内容（或者松开鼠标然后按撤销（![images](images/arrow3.jpg)Z）来撤销调整大小操作）。


    既然我们不能直接删除外观框上的约束，我们将改变导致系统最初创建它的条件，我们通过利用（或避免使用）蓝色参考线来实现这一点。最简单的方法是将外观框从窗口底部边缘移开。请按照以下步骤操作：


    1.  创建一个新的约束来保持外观框的当前大小。为此，选择该框，然后从菜单栏中选择**编辑器** ![image](images/arrow.jpg) **固定**
    ![image](images/arrow.jpg) **高度**。

    2.  将外观框移至窗口顶部附近，远离底部。这将移除将框底部固定在窗口底部的约束。

    3.  向下缩小窗口以腾出更多空间。

    4.  将外观框放回原位，使其框标题与窗口底部区域的其他两个框对齐，并在它们之间均匀间隔。由于窗口底部更远了，我们应该避免创建该约束。窗口应该看起来像图 6-7。

    5.  将窗口调整回原来的大小。


    ![9781430245421_Fig06-07.jpg](images/9781430245421_Fig06-07.jpg)


    图 6-7. 重新布置外观框的约束


    当垂直调整大小时，窗口的行为符合我们的预期。


    现在，在水平调整大小方面，我们有两个问题需要处理：表格视图没有伸缩，但最右边的两个框（备注，以及能力和特性）却在伸缩。我们可以通过选择**编辑器** ![image](images/arrow.jpg)
    **模拟文档**来检查是否出现这种情况。


    我们先检查表格视图。在 Interface Builder 中选择表格视图，查看其约束。没有前导或尾随间距约束会固定其大小，所以问题一定出在右边的两个框上。因为我们希望它们保持大小，而不是在窗口调整大小时扩大，所以选择能力和特性框，然后选择**编辑器**
    ![image](images/arrow.jpg) **固定** ![image](images/arrow.jpg) **宽度**。对所有其他框执行相同操作。


    选择**编辑器** ![image](images/arrow.jpg) **模拟文档**并尝试水平调整大小。窗口完全不动了。我们有一些约束固定了布局，需要找出并移除它们。对于每个框，查看**尺寸检查器**中列出的约束，找到那些说“到父视图的前导间距”且值为任意值的约束。你可以通过选择该框并查看是否有从左边缘延伸到窗口边缘的蓝线来判断这些约束是否存在。删除那些可删除的约束，可以通过从框的**尺寸检查器**中该约束条目的齿轮图标下的菜单选择**删除**，或者选择蓝线并按**删除**键。


    移除所有约束后，再次选择**编辑器** ![image](images/arrow.jpg) **模拟文档**并尝试水平调整大小。这次窗口应该按我们期望的方式调整大小，如图
    6-8 所示。


    ![9781430245421_Fig06-08.jpg](images/9781430245421_Fig06-08.jpg)


    图 6-8. 终于，调整大小成功了！


    在继续实现代码之前，这里还有几点关于调整大小的补充说明。调试调整大小问题几乎总是一个迭代、试错的过程。我们在这里已经触及了一些可行的方法：


    *   在 Interface Builder 中调整窗口大小，观察各元素相对于窗口如何调整。

    *   如果窗口设计已经演变，尝试移动用户界面元素以重置约束。

    *   尝试使用“模拟文档”功能并进行实验。

    *   通过蓝线和尺寸检查器，查看 Interface Builder 中约束的可视化表示。


    关于约束和 Cocoa Auto Layout 还有很多要学习的内容；这些只是基础。更多详情和调试技巧，请查阅 Apple Developer Connection
    网站和 Xcode 文档中的 *Cocoa Auto Layout 指南*。


    **注意**：Cocoa Auto Layout 是在 Mac OS X 10.7 中引入的。在此之前，调整大小是通过一种称为“弹簧和支柱”的机制来控制的，该机制控制视图相对于包含它们的窗口如何调整大小。在
    10.7 及更高版本中，旧的弹簧和支柱调整大小行为会在后台转换为约束；应用程序可以同时包含使用约束的 nib 文件和使用弹簧和支柱的 nib 文件。但是，如果你遇到
    2011 年之前的 Cocoa 代码，你几乎肯定会遇到不使用约束的 nib 文件。


    ## 为表格视图腾出空间：代码篇


    连接建立完毕且调整大小问题已得到控制，我们现在可以将注意力转向驱动表格视图并响应“添加”和“移除”按钮点击所需的代码。为此，我们需要离开 Interface
    Builder 模式并回到我们的代码中。打开**项目导航器**（![images](images/arrow3.jpg)1），如果它尚未打开的话。单击`VillainTrackerAppDelegate.m`文件的条目，编辑器区域应从
    Interface Builder 更改为一个显示我们对象代码的代码窗口。'
  raw: 'jpg)5), and then select the box that’s labeled *Appearance*, and expand the
    *Constraints* item on the left. When the box is selected, the Interface Builder
    pane should look like [Figure 6-6](#9781430245421_Ch06.xhtml#Fig6).    ![9781430245421_Fig06-06.jpg](images/9781430245421_Fig06-06.jpg)    [Figure
    6-6](#9781430245421_Ch06.xhtml#_Fig6). Resizing constraints for the Appearance
    box    In the *Size Inspector*, we can see nine constraints that affect the Appearance
    box, at least as we’ve laid it out so far. (Depending on how you laid out the
    window, your constraints may be in a different order or with slightly different
    constants.) Each of the blue lines extending off the box also represents a resizing
    constraint that is in relationship with another view. Not all the constraints
    are in relation to another view, so there are more constraints active than are
    visualized in the blue lines.    The problem with the Appearance box is that it
    expanded downward as the window was lengthened during resizing, expanding the
    Image view along with it. Looking at the list of constraints in the *Size Inspector*,
    one of them says “Bottom Space to: Superview equals: 29.” This constraint means
    that the bottom of the Appearance box should stay 29 points above the bottom of
    the window. Another constraint that deals with vertical size says “Top Space to:
    Box – Basic Information Equals: Default.” This means that the top edge of the
    box should maintain the system-default distance from the bottom of the Basic Information
    box. The purple icon on the left of the constraints indicates that these are system-created
    constraints—ones that were set up when we positioned the box in Interface Builder.
    When we previously positioned the Appearance box to snap to the blue guidelines
    that appear near the bottom of the window, we implicitly created that Bottom Space
    constraint. However, if we click the gear icon by the Bottom Space constraint,
    we can see that the Delete menu item is disabled. In order to remove it, we’ll
    need to think differently.    Let’s play with this a bit. In Interface Builder,
    grab the bottom of the window and enlarge it by dragging downward. The Appearance
    box does indeed flex to be larger in the vertical direction. The Bottom Space
    constraint is causing the box to grow to maintain a distance of 29 points from
    the bottom of the window. Resize the window back to 364 points high to put everything
    back (or release the mouse and then hit Undo (![images](images/arrow3.jpg)Z) to
    undo the resize operation).    Since we can’t delete the constraint on the Appearance
    box outright, we’ll change the circumstances that caused the system to create
    it in the first place, and we’ll do that by making use of the blue guidelines
    (or lack thereof). The easiest way to do this is move the Appearance box away
    from the bottom edge of the window. Follow these steps.    1.  Create a new constraint
    to hold the Appearance box to its current size. To do this, select the box, and
    then select **Editor** ![image](images/arrow.jpg) **Pin** ![image](images/arrow.jpg)
    **Height** from the menu bar. 2.  Move the Appearance box near the top of the
    window, away from the bottom. This will remove the constraint holding the bottom
    of the box to the bottom of the window. 3.  Resize the window downward to make
    more room. 4.  Put the Appearance box back, with the box title aligned with two
    other boxes in the bottom area of the window and spaced evenly between them. Since
    the bottom of the window is further away, we should avoid creating the constraint.
    The window should look something like [Figure 6-7](#9781430245421_Ch06.xhtml#Fig7).
    5.  Resize the window back.    ![9781430245421_Fig06-07.jpg](images/9781430245421_Fig06-07.jpg)    [Figure
    6-7](#9781430245421_Ch06.xhtml#_Fig7). The Appearance box constraints rearranged    When
    resizing vertically, the window behaves the way that we want.


    We now have two things to address in terms of horizontal resizing: the table view
    isn’t flexing but the two rightmost boxes (Notes, and Powers and Abilities) are.
    We can check that this is occurring by selecting **Editor** ![image](images/arrow.jpg)
    **Simulate Document** and seeing what happens.    Let’s check the table view first.
    Select the table view in Interface Builder, and look at the constraints. There
    are no leading- or trailing-space constraints that will hold the size fixed, so
    the problem must lie with the two boxes on the right. Since we want them to hold
    their size, rather than enlarging as the window is resized, select the Powers
    and Abilities box and then select **Editor** ![image](images/arrow.jpg) **Pin**
    ![image](images/arrow.jpg) **Width**. Do the same for all the other boxes.    Select
    **Editor** ![image](images/arrow.jpg) **Simulate Document** and try to resize
    horizontally. The window won’t budge at all. We’ve got some constraints holding
    things in place that we need to identify and remove. For each box, look at the
    constraints listed in the *Size Inspector* and find ones that say “Leading Space
    to: Superview” with anything as the value. You can tell if these constraints exist
    by selecting the box and looking for a blue bar extending from the left edge of
    the box out to the edge of the window. Delete the ones that are deleteable, either
    by selecting Delete from the menu hiding under the gear icon in the Constraint’s
    entry in the *Size Inspector* for the box, or by selecting the blue bar and pressing
    the Delete key.    After removing them all, again select **Editor** ![image](images/arrow.jpg)
    **Simulate Document** and try to resize horizontally. This time the window should
    resize the way we want it to, as shown in [Figure 6-8](#9781430245421_Ch06.xhtml#Fig8).    ![9781430245421_Fig06-08.jpg](images/9781430245421_Fig06-08.jpg)    [Figure
    6-8](#9781430245421_Ch06.xhtml#_Fig8). Finally, resizing works!    Before we move
    on to implementing code, here are a few more words about resizing. Debugging resizing
    problems is almost always an iterative, trial-and-error process. We’ve touched
    on a few ways to make it work here:    *   Resize the window in Interface Builder,
    and see how things resize in relation to the window. *   If the window design
    has evolved, try moving user-interface elements around to reset the constraints.
    *   Play with the Simulate Document feature and experiment. *   Look at how constraints
    are visualized in Interface Builder, via the blue bars and the Size Inspector.    There’s
    more to learn about constraints and Cocoa Auto Layout; these are just the basics.
    Check out the Cocoa Auto Layout Guide on the Apple Developer Connection web site
    and in the Xcode documentation for more details and debugging tips.    **Note**  Cocoa
    Auto Layout was introduced in Mac OS X 10.7\. Prior to that, resizing was controlled
    using a mechanism called “springs and struts,” which controlled how views resized
    relative to the window that contained them. In 10.7 and beyond, the old springs
    and struts resizing behavior is translated into constraints behind the scenes;
    applications can have nib files using constraints and nib files using springs
    and struts that co-exist. However, if you come across pre-2011 Cocoa code, you’ll
    almost surely encounter nib files that don’t use constraints.    Making Way for
    the Table View: Code Edition    With the connections in place and resizing now
    under control, we can turn our attention to the code necessary to drive the table
    view and respond to clicks on the Add and Remove buttons. To do this, we need
    to leave Interface Builder mode and get back to our code. Open the *Project Navigator*
    (![images](images/arrow3.jpg)1), if it isn’t already open. Single-click the entry
    for the `VillainTrackerAppDelegate.m` file and the Editor area should change from
    Interface Builder to a code window showing the code for our object.'
