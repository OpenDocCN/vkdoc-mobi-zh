    这正是我们在`NSError`类中拥有的内容，它基本上将系统级错误代码封装在一个 Objective-C 对象中。每个`NSError`实例都有一个`NSString`来指定其“域”的名称（通常，它来自哪个库或框架），一个整数来指定相关的错误代码，以及一个可选的`NSDictionary`，其中可以包含关于该错误的附加信息。由于这些是普通的
    Objective-C 对象，它们可以像任何其他对象一样被处理：传递、放入`NSArray`等。


    Cocoa 包含一些预定义的字符串常量，用于对 Cocoa 框架中`NSError`对象的主要来源进行分类。作为 Cocoa 程序员，您最可能遇到的域如下：


    * `NSPOSIXErrorDomain`：UNIX 错误（属于 POSIX 标准一部分的错误）。

    * `NSOSStatusErrorDomain`：来自 Carbon 函数的错误（这些函数通常返回`OSStatus`）。

    * `NSCocoaErrorDomain`：直接来自 Cocoa 自身类的错误。


    每当一个 Cocoa 方法给我们一个`NSError`时，它的域很可能是这些之一。如果您开始在代码中创建自己的`NSError`实例，您可能希望定义自己的域和错误代码，以便在应用程序中更容易处理它们。


    每个预定义的错误域都有一个相关的错误代码列表，定义在一个或多个头文件中。适用于`NSPOSIXErrorDomain`的错误代码在`errno.h`中。`NSOSStatusErrorDomain`的错误代码在`MacErrors.h`中；`NSCocoaErrorDomain`使用的错误代码包含在`FoundationErrors.h`、`AppKitErrors.h`和`CoreDataErrors.h`中。在
    Xcode 中，通过调出“快速打开”窗口（![images](img/arrow7.jpg) O）并输入文件名，可以轻松找到这些头文件。


    ### 识别错误


    现在我们了解了`NSError`类的一些知识。但是，`NSError`实例从哪里来，以及它们在应用程序运行时如何影响应用程序？与异常不同，`NSError`对象不会对代码流程做出任何改变。通常，`NSError`实例通过方法调用返回给我们，不是作为返回值，而是通过引用我们传入的一个指针。这种参数弄巧成拙的方式在
    C 中并不罕见，但在 Objective-C 中相当不常见。其理念是，一个容易出错的方法应该接收一个指向`NSError`指针的指针作为参数。这意味着我们不传入一个指向`NSError`的指针，而是一个指向指针的指针（我们指针的地址），以便接收方法可以创建一个`NSError`实例并将我们的指针指向它！（这听起来可能令人困惑，但一旦您看到这个模式，事情就会变得清晰。）

    '
- fmt: "以`NSFileManager`类为例。文件管理器允许我们执行某些磁盘操作，例如创建目录、访问文件属性等。它有一个方法，其签名如下所示：\n\n```\n\
    - (NSDictionary *)attributesOfItemAtPath:(NSString *)path error:(NSError **)error\n\
    ```\n\n我们可以使用此方法获取一个字典，该字典包含`path`参数指定的文件或目录的大量相关文件系统信息。注意第二个参数`error`的类型是`NSError**`，这意味着我们传入一个指向可以指向`NSError`对象的变量的指针。如果该方法确实遇到错误情况，它将创建一个`NSError`对象，并将其地址存储在`error`指定的位置。如果我们想忽略此类方法产生的任何错误，可以传入特殊的`NULL`指针作为最后一个参数。\n\
    \n下面的方法展示了从调用者角度看这看起来是什么样的。我们创建一个用于指向`NSError`对象的变量，并将其初始化为指向`nil`。然后，我们将该变量的地址传递给一个可能产生错误的方法，之后检查该变量，看它是否仍然指向`nil`。如果不是，我们知道该方法遇到了错误，并请求应用程序向用户呈现该错误。\n\
    \n```\n- (void)fileError {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
    \    \n    // 声明一个变量并将其指向 nil\n    NSError *fileError = nil;\n    \n    // 将 fileError\
    \ 变量的地址传递给该方法\n    NSDictionary *attributes = [fileManager\n                 \
    \               attributesOfItemAtPath:@\"/tmp\" error:&fileError];\n    \n  \
    \  // 检查前一个方法调用是否给了我们一个 NSError\n    if (fileError == nil) {\n        // 显示属性\n\
    \        NSRunAlertPanel(@\"Found file attributes\",\n                       \
    \ [attributes description], nil, nil, nil);\n    } else {\n        // 报告错误\n \
    \       [NSApp presentError:fileError];\n    }\n}\n```\n\n为简单起见，在探索`NSError`时，我们将继续构建我们正在使用的项目。将前面显示的`fileError`方法添加到应用程序委托类中，并在`applicationDidFinishLaunching:`方法中添加一行`[self\
    \ fileError];`。运行应用程序，我们将看到类似[Figure 13-8](#9781430245421_Ch13.xhtml#Fig8)中所示的警告面板。\n\
    \n![9781430245421_Fig13-08.jpg](images/9781430245421_Fig13-08.jpg)\n\n[Figure\
    \ 13-8](#9781430245421_Ch13.xhtml#_Fig8) . 没有错误！\n\n现在返回并编辑`fileManager`调用，将字符串参数从`@\"\
    /tmp\"`更改为`@\"/tmpfoo\"`或某个其他不存在的路径。这将导致`fileManager`遇到错误并将其返回给我们，存储在传入地址的`fileError`变量中。它将注意到此错误并将其传递给`NSApp`，从而产生[Figure\
    \ 12-5](#9781430245421_Ch12.xhtml#Fig5)中所示的警告面板。\n\n![9781430245421_Fig13-09.jpg](images/9781430245421_Fig13-09.jpg)\n\
    \nFigure 13-9 . 出现错误了\n\n这没问题，但看看那个警告面板中的文字：“*文件“tmpfoo”无法打开，因为没有这样的文件。*”这是否看起来有点……不够技术性？我们不是习惯于在计算机系统中使用更专业、更行话的语言吗？毕竟，这个错误是由一个低级系统例程触发的，它只报告了一个错误号，没有其他信息。那段文字是从哪里来的？\n\
    \n事实证明，`NSError`有一个名为`localizedDescription`的方法，它为我们提供了对错误的一个很好的、人类可读的解释。这个描述最终由`reportError:`方法显示出来。\n\
    \n让我们通过使用调试器来进一步探索一下。\n\n在 Xcode 中，通过单击文本编辑器中该行左侧的装订线（显示行号的空间），在包含`[NSApp presentError:fileError]`的行上设置一个断点。这是在我们的代码中设置断点的最直接方法。然后再次运行应用程序。应用程序将在选定行处暂停，在输出控制台中留下`lldb`提示符。让我们深入挖掘一下，通过在`lldb`提示符下执行命令来询问错误的域和错误代码：\n\
    \n```\n (lldb) po [fileError domain]\n $0 = 0x00007fff7cdab110 NSCocoaErrorDomain\n\
    \ (lldb) p (int)[fileError code]\n (int) $1 = 260\n (lldb) po [fileError localizedDescription]\n\
    \ $2 = 0x0000000102327470 The file \"tmpfoo\" couldn't be opened because there\
    \ is no such file.\n```\n\n注意我们可以使用`po`命令打印`NSString`的值，使用`p`命令打印任何基本C类型的值。通常在使用`p`命令时，`lldb`会抱怨它不知道我们试图显示的值的类型，所以我们在方法调用前放一个小的`(int)`，告诉`lldb`期望什么。\n\
    \n现在我们知道了错误代码和域。快速查看`FoundationErrors.h`会发现以下信息：\n\n```\nNSFileReadNoSuchFileError\
    \ = 260,    // Read error (no such file)\n```\n\n这仍然可能让你想知道这一切是如何结合在一起的。回想一下，当你创建一个`NSError`时，你需要指定一个域、一个代码，以及一个可选地包含附加信息的字典。这个字典是谜题的关键部分。如果你传递给这个方法的字典对于键`@\"\
    NSLocalizedDescriptionKey\"`有一个值，那么无论何时调用`localizedDescription`，都会返回该值。\n\n那么，让我们看看`userInfo`字典包含什么。\n\
    \n```\n(lldb) po [fileError userInfo]\n$3 = 0x0000000102118850 {\n    NSFilePath\
    \ = \"/tmpfoo\";\n    NSUnderlyingError = \"Error Domain=NSPOSIXErrorDomain Code=2\
    \ \\\"The operation couldn\\U2019t be completed. No such file or directory\\\"\
    \";\n}\n```\n\n嗯，显然这不是答案。`userInfo`字典没有指定本地化的描述，但它确实包含了一些其他东西：我们试图访问的文件的路径，以及看起来像是另一个`NSError`的内容。一个错误包裹在另一个错误里面！让我们看看内部那个错误的`domain`、`code`、`userInfo`和`localizedError`是什么样的。我们从另一个`lldb`命令`expression`开始，它只是执行行上的其余语句，就像它们是源代码一样，但不像`po`或`p`命令那样打印结果。在这种情况下，我们将内部错误对象的地址分配给一个我们称为`$inner`的新变量。这是`lldb`的一个很好的特性，允许我们保留执行的查询结果，让值保留下来，并在以后节省一些输入工作。我们将从`fileError`中获取`userInfo`字典，然后立即使用\
    \ Objective-C 的新字典查找语法来访问底层错误。\n\n```\n(lldb) expression id $inner = [fileError\
    \ userInfo][@\"NSUnderlyingError\"]\n(lldb) po $inner\n$inner = 0x000000010210a9e0\
    \ Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn't be completed.\
    \ No such file or directory\"\n```\n\n将对象的地址分配给新变量后，使用`po`命令查看新变量的地址及其内容，即它指向的对象。从现在开始，我们可以将那个内部错误简称为`$inner`，就像这样：\n\
    \n```\n (lldb) po [$inner domain]\n $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain\n\
    \ (lldb) p (int)[$inner code]\n (int) $10 = 2\n (lldb) po [$inner userInfo]\n\
    \ $11 = 0x00000001001039d0 { }\n (lldb) po [$inner localizedDescription]\n $12\
    \ = 0x000000010011d2c0 The operation couldn't be completed. No such file or directory\n\
    ```\n\n这给我们带来了又一个谜题。"
  raw: ')    As an example, consider the `NSFileManager` class. The file manager lets
    us perform certain disk operations such as creating directories, accessing file
    attributes, and so on. It has a method whose signature looks like this:    ```
    - (NSDictionary *)attributesOfItemAtPath:(NSString *)path     error:(NSError **)error
    ```    We can use this method to access a dictionary containing a whole lot of
    relevant file system information about the file or directory specified in the
    `path` parameter. Note that the second parameter, `error`, is of type `NSError**`,
    which means that we pass in a pointer to a variable that can point at an `NSError`.
    If the method actually encounters an error situation, it will create an `NSError`
    and stick its address in the location specified by `error`. If we want to ignore
    any error that a method like this produces, we can pass in the special `NULL`
    pointer as the last parameter.    The following method shows what this looks like
    from the caller’s perspective. We create a variable for pointing at an `NSError`
    and initialize it to point at `nil`. Then we pass the address of that variable
    to a potentially error-generating method and afterwards check the variable to
    see whether or not it’s still pointing at `nil`. If not, we know that the method
    encountered an error, and we ask the application to present the error to the user.    ```
    - (void)fileError {     NSFileManager *fileManager = [NSFileManager defaultManager];
               // Declare a variable and point it at nil     NSError *fileError =
    nil;            // Pass the address of the fileError variable to the method     NSDictionary
    *attributes = [fileManager                                 attributesOfItemAtPath:@"/tmp"
    error:&fileError];            // Check to see if the previous method call gave
    us an NSError     if (fileError == nil) {         // Show the attributes         NSRunAlertPanel(@"Found
    file attributes",                         [attributes description], nil, nil,
    nil);     } else {         // Report the error         [NSApp presentError:fileError];
        } } ```    For simplicity’s sake, while exploring `NSError` we’ll continue
    building onto the project we’re already playing with. Add the `fileError` method
    shown previously to the app delegate class, and add a `[self fileError];` line
    to the `applicationDidFinishLaunching:` method. Run the app, and we’ll see something
    like the alert panel shown in [Figure 13-8](#9781430245421_Ch13.xhtml#Fig8).    ![9781430245421_Fig13-08.jpg](images/9781430245421_Fig13-08.jpg)    [Figure
    13-8](#9781430245421_Ch13.xhtml#_Fig8) .  No error here!    Now go back and edit
    the `fileManager` call, changing the string parameter from `@`“`/tmp`” to `@`“`/tmpfoo`”
    or some other non-existent path. This will cause `fileManager` to encounter an
    error and give it back to us, in the `fileError` variable whose address we passed
    in. It will notice this error and pass it off to `NSApp`, resulting in the alert
    panel shown in [Figure 12-5](#9781430245421_Ch12.xhtml#Fig5).    ![9781430245421_Fig13-09.jpg](images/9781430245421_Fig13-09.jpg)    Figure
    13-9 .  There’s the error    That’s fine, but look at the text in that alert panel:
    “*The file “tmpfoo” couldn’t be opened because there is no such file.”* Doesn’t
    that seem a little… non-technical? Aren’t we used to a bit more jargony language
    in our computer systems? After all, the error was triggered by a low-level system
    routine that reported just an error number and nothing else. Where did that text
    come from?    It turns out that `NSError` has a method called `localizedDescription`,
    which gives us a nice, human-readable explanation of the error. This description
    is what’s eventually displayed by the `reportError:` method.    Let’s explore
    this a bit by using the debugger.


    In Xcode, set a breakpoint on the line containing `[NSApp presentError:fileError]`
    by clicking in the gutter to the left of the line in the text editor (the gutter
    is the space where the line numbers are shown). This is the most straightforward
    way to set a breakpoint in our code. Then run the app again. The app will halt
    at the chosen line, leaving us with the lldb prompt in the output console. Let’s
    dig in a bit, asking the error about its domain and error code by executing commands
    at the lldb prompt:    ```  (lldb) po [fileError domain] $0 = 0x00007fff7cdab110
    NSCocoaErrorDomain (lldb) p (int)[fileError code] (int) $1 = 260 (lldb) po [fileError
    localizedDescription] $2 = 0x0000000102327470 The file "tmpfoo" couldn''t be opened
    because there is no such file. ```    Note that we can print the value of an `NSString`
    using the `po` command and the value of any basic C type using the `p` command.
    Often when using the `p` command, lldb will complain that it doesn’t know the
    type of the value we’re trying to display, so we put a little `(int)` just before
    the method call, which tells lldb what to expect.    Now we know the error code
    and domain. A quick look in `FoundationErrors.h` turns up this info:    ``` NSFileReadNoSuchFileError
    = 260,    // Read error (no such file) ```    That still might leave you wondering
    how this hangs together. As you recall, when you create an `NSError`, you specify
    a domain, a code, and optionally a dictionary containing additional info. This
    dictionary is a key piece of the puzzle. If the dictionary you pass into this
    method has a value for a key called `@`“`NSLocalizedDescriptionKey`”, then that
    value will be returned whenever `localizedDescription` is called.    So, let’s
    see what the `userInfo` dictionary contains.    ``` (lldb) po [fileError userInfo]
    $3 = 0x0000000102118850 {     NSFilePath = "/tmpfoo";     NSUnderlyingError =
    "Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn\U2019t be completed.
    No such file or directory\""; } ```    Um, apparently that’s not the answer. The
    `userInfo` dictionary doesn’t specify a localized description, but it does include
    a couple of other things: the path to the file we were trying to access, and what
    looks like another `NSError`. An error wrapped inside an error! Let’s see what
    that inner error’s `domain`, `code`, `userInfo`, and `localizedError` look like.
    We start off with another lldb command called `expression`, which simply executes
    the statements on the rest of the line just as if it were source code, but without
    printing a result like the `po` or `p` commands do. In this case, we’re assigning
    the address of the inner error object to a new variable we’re calling `$inner`.
    This is a nice feature of lldb that lets us hang on to the results of queries
    we execute, letting values stick around, and saving us some typing later on. We’ll
    grab the `userInfo` dictionary from the `fileError`, then immediately use Objective-C’s
    new dictionary look-up syntax to access the underlying error.    ``` (lldb) expression
    id $inner = [fileError userInfo][@"NSUnderlyingError"] (lldb) po $inner $inner
    = 0x000000010210a9e0 Error Domain=NSPOSIXErrorDomain Code=2 "The operation couldn''t
    be completed. No such file or directory" ```    After assigning the object’s address
    to the new variable, use the `po` command to see the address of our new variable
    and its content, the object it’s pointing at. From here on out, we can refer to
    that inner error as just `$inner`, like this:    ```  (lldb) po [$inner domain]
    $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain (lldb) p (int)[$inner code] (int) $10
    = 2 (lldb) po [$inner userInfo] $11 = 0x00000001001039d0 { } (lldb) po [$inner
    localizedDescription] $12 = 0x000000010011d2c0 The operation couldn''t be completed.
    No such file or directory ```    This presents us with yet another riddle.'
