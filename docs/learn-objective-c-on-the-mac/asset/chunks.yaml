    move to the nib file. We’ll create some table views, add some array controller
    objects, and set up their bindings to the new arrays we added to `DungeonThingAppDelegate`.
    We’ll also configure the existing text fields to get their data through bindings.
    Single-click the `MainMenu.xib` file in Xcode to get back to the Interface Builder
    canvas.    We’re going to start by making changes to the main application window.
    The first step is to make some room in the window for our new table views. We’re
    going to create three “history” table views, one below each of the existing sets
    of views, so we need to make the window taller (but we can keep the current width).'
  trans: "\n`DungeonThing` 如果你输入 `defaults domains`，就会列出所有在 `NSUserDefaults` 系统中存储默认设置的应用，你可以查看其中任意应用的存储设置。祝你好运！\n\
    \n## 绑定到表视图\n\n`DungeonThing` 就其功能而言是没问题的（当然，它不会真正生成游戏对象），但如果你“在实际生产环境”中使用这样的系统（比如在玩《龙与地下城》或类似游戏时），你很快就会遇到一个主要问题：随机生成的游戏对象根本无法持久保存！例如，一旦你点击按钮创建一个新的随机角色，上一个角色就会直接被抹去，并且你再也无法看到它。\n\
    \n对于 `DungeonThing` 的下一个迭代版本，我们将添加一些表视图来显示所有已创建游戏对象的列表。在表视图中点击某个游戏对象，将在相应的文本字段中显示其值。与第\
    \ 6 章 中我们演示如何在自己的代码中处理表视图不同，这里我们将演示如何使用 `NSArrayController` 类，这是 Cocoa 自带的一个通用控制器类，借助\
    \ Cocoa 绑定，无需编写自定义代码即可管理这些表视图的显示。我们需要为 `DungeonThingAppDelegate` 类添加一些出口和其他实例变量，用于管理三个\
    \ `NSArrayController` 实例和三个数组（每种游戏对象类型一个数组）。我们还将移除刚刚添加的 `NSTextField` 出口，因为这些也将通过绑定来配置，以显示其内容。最后，我们稍微修改动作方法，将每个创建的对象插入到相应的数组中。完成后，源代码的大小几乎相同，因为表视图的所有配置都是在\
    \ nib 文件中完成的。\n\n我们将首先为 `DungeonThingAppDelegate` 添加一些属性，并修改我们的 `create:` 方法，以便使用这些新属性。在\
    \ Interface Builder 中使用绑定之前，我们需要先在代码中进行设置。然后，我们将切换到 Interface Builder 来连接绑定，再回到代码进行一些清理工作。\n\
    \n## 使代码支持绑定\n\n首先，让我们在头文件中进行必要的修改。为了维护生成对象的列表，我们的 `DungeonThingAppDelegate` 需要三个新的\
    \ `NSMutableArray` 实例变量，每种游戏对象一个。这些变量无法从 Interface Builder 内部创建；我们需要显式声明它们。每个数组将由\
    \ nib 文件中的一个 `NSArrayController` 管理，稍后我们将在 Interface Builder 中创建和配置它们。我们将这三个 `NSMutableArray`\
    \ 声明为属性，以便 `NSArrayControllers` 可以随时访问它们。我们需要在 `DungeonThingAppDelegate.h` 中进行的修改如下：\n\
    \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface DungeonThingAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n// 添加以下三个：\n@property (strong) NSMutableDictionary\
    \ *characters;\n@property (strong) NSMutableDictionary *monsters;\n@property (strong)\
    \ NSMutableDictionary *dungeons;\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet NSTextField *characterLabel;\n@property (weak) IBOutlet\
    \ NSTextField *monsterLabel;\n@property (weak) IBOutlet NSTextField *dungeonLabel;\n\
    \n- (IBAction)createCharacter:(id)sender;\n- (IBAction)createMonster:(id)sender;\n\
    - (IBAction)createDungeon:(id)sender;\n\n@end\n```\n\n添加完这三个属性声明后，我们需要在 `DungeonThingAppDelegate.m`\
    \ 文件中完成 `NSMutableArray` 实例的设置。我们将初始化 `NSMutableArray` 实例本身，并修改动作方法，将创建的值推送到我们的数组中，而不是直接在文本字段中显示值。\n\
    \n首先，让我们实现一个新的 `init` 方法来包含数组的初始化。\n\n将以下代码放在 `.m` 文件中 `@implementation DungeonThingAppDelegate`\
    \ 部分的顶部附近：\n\n```objectivec\n- (id)init {\n    if ((self = [super init])) {\n\
    \        self.characters = [NSMutableArray array];\n        self.monsters = [NSMutableArray\
    \ array];\n        self.dungeons = [NSMutableArray array];\n    }\n    return\
    \ self;\n}\n```\n\n### 标准 INIT 方法\n\n上面的代码片段展示了一个为类的实例变量创建值的 `init` 方法示例。这种 `init`\
    \ 方法的形式相当标准，你可能在你看到的大多数 Objective-C 类中都会看到类似的写法，但它做了一些乍一看很奇怪的事情，因此值得稍作解释。这个方法以这样一个奇特的\
    \ `if` 语句开头：\n\n`if ((self = [super init])) {`\n\n这个 `if` 语句实际上是一举两得（甚至多得）。首先，它调用了超类的\
    \ `init` 实现，并将其返回值赋给特殊变量 `self`。然后，它检查赋值本身的值（即赋值后 `self` 的值），并且仅在该值不为假值（例如空指针\
    \ nil）时才执行后面的代码块。\n\n这种使用 `self` 并为其赋值的方式确实很特殊。事实上，我们唯一可能看到为 `self` 赋值的代码地方，就是像这样的\
    \ `init` 方法中。这样做是为了应对一种可能性，尽管可能性很小，即超类的 `init` 方法可能会返回一个与最初 `self` 指向的不同值。一方面，超类可能发现由于某种原因无法正确初始化自身，并通过从\
    \ `init` 方法返回 nil 来表示这一点，这是处理对象初始化失败的“标准”方式（而不是抛出异常）。在这种情况下，子类会注意到 nil 值并跳过 `if`\
    \ 语句后面的块，直接跳到最后，返回 `self` 指向的值，现在这个值是 nil。\n\n超类 `init` 方法返回另一个值的另一种可能性是返回一个完全不同的实例。其思想是超类可能有一个智能方案，用于在私有池中回收对象，而不是不断地释放和创建新对象，该方案的一部分是，`init`\
    \ 方法有时会返回一个旧的、二手对象，而不是我们刚刚尝试创建的崭新对象。这种情况是否现实，是 Cocoa 程序员之间偶尔争论的话题。在这里，我们通过编写允许这种可能性的\
    \ `init` 方法，采取了谨慎的态度。\n\n就是这样——所有需要在 Interface Builder 中连接对象的代码修改已完成！请注意，与第 6\
    \ 章中的示例不同，这里的代码完全不需要操作表视图。无需实现 `delegate` 或 `dataSource` 方法，无需指向表视图的出口，什么都不需要。得益于绑定和\
    \ `NSArrayController`，表视图将自行管理一切。\n\n## 配置表视图和文本视图\n\n现在，我们准备转到 nib 文件。我们将创建一些表视图，添加一些数组控制器对象，并将它们的绑定设置到我们添加到\
    \ `DungeonThingAppDelegate` 的新数组上。我们还将配置现有的文本字段，使其通过绑定获取数据。在 Xcode 中单击 `MainMenu.xib`\
    \ 文件，返回 Interface Builder 画布。\n\n我们将从修改主应用程序窗口开始。第一步是在窗口中为新的表视图腾出空间。我们将创建三个“历史记录”表视图，分别放在每组现有视图的下方，因此我们需要使窗口更高（但可以保持当前宽度不变）。\n"
- fmt: '使用窗口右下角的调整控件，将窗口高度增加约一倍。蓝色辅助线将帮助我们保持当前宽度。


    在*对象库*面板中搜索“table”，将出现的表格视图拖入窗口。将其放置在最左侧方框左下角下方，然后抓住表格视图右下角的调整手柄，向下拖动，直到表格填满窗口底部的大部分可用空间，其左右边缘与上方方框的边缘对齐，如图
    7-11 所示。


    ![9781430245421_Fig07-11.jpg](images/9781430245421_Fig07-11.jpg)


    [图 7-11](#9781430245421_Ch07.xhtml#_Fig11). 向窗口中添加表格


    在我们的历史记录表格中，我们只打算显示对象创建的时间。用户随后可以点击某一行，在表格上方的文本字段中查看相关对象。这意味着我们只需要表格中有一列。因此，打开*属性检查器*（![image](images/arrow2.jpg)4）。选择表格视图（它位于滚动视图内部，因此需要点击两次才能选中表格视图本身）。在检查器中，将列数改为
    1，并将*内容模式*设置为基于视图而非基于单元格。


    接下来，调整剩余的列，使其填满表格的宽度。为此，点击表格标题，直到整个表格标题被选中。然后将鼠标悬停在标记表格列标题边缘的垂直线上，向右拖动，直到该列填满整个表格。


    最后，禁用剩余列的编辑功能，因为我们不希望用户更改已创建对象的时间戳。点击表格列直到其被选中，然后打开*属性检查器*（![image](images/arrow2.jpg)4），点击取消*可编辑*复选框的勾选。接下来，将调整大小方式从“两者”改为“随表格自动调整大小”，因为没理由让用户调整表格视图的唯一列。


    此时，表格视图及其列已按图形方式布局完毕，除了绑定之外的所有配置已完成。这是复制我们刚刚为显示角色而制作的表格的好时机，这样我们就可以为怪物和地牢使用完全相同的配置。点击窗口背景，然后点击一次表格视图以选中它（以及其包含的`NSScrollView`）。现在按下![images](images/arrow3.jpg)D
    复制表格视图，并将新复制的表格视图拖动到中间视图组底部的适当位置。然后再次按下![images](images/arrow3.jpg)D，并将最后一个表格视图拖到窗口右下角的适当位置。对于这两个表格视图，我们当然会使用蓝色辅助线来帮助正确对齐。[图
    7-12](#9781430245421_Ch07.xhtml#Fig12) 显示了最终布局。


    ![9781430245421_Fig07-12.jpg](images/9781430245421_Fig07-12.jpg)


    [图 7-12](#9781430245421_Ch07.xhtml#_Fig12). DungeonThing 窗口的最终布局


    ### 创建并配置数组控制器


    现在是时候添加一个`NSArrayController`，以便为第一组对象（角色）配置一些绑定。在*对象库*面板中搜索“array”。注意搜索结果中出现的“Array
    Controller”；这是`NSArrayController`对象的一个实例。将其中的一个拖到 Interface Builder 画布最左侧的对象停靠区域。如果该停靠区域尚未展开，请单击
    Interface Builder 画布左下角的展开三角形以展开它。`NSArrayController`需要一个更有意义的名称，因此缓慢点击“Array
    Controller”文本两次（就像在 Finder 中重命名文件一样）来编辑名称。我们将使用此控制器来提供对角色数组的访问，因此将其命名为“characters”。


    为此顶级 nib 对象指定一个唯一的名称，将有助于稍后我们在此 nib 中添加另外两个数组控制器时使用。（请注意，在 Xcode 4.5 的初始版本中，更改名称后，对象停靠区域中的名称可能不会刷新。如果是这样，我们可以通过单击对象停靠区域的展开三角形两次来使新名称显示出来。）


    为了让我们的`DungeonThingAppDelegate`能够使用这些`NSArrayController`实例，我们需要向应用程序委托添加输出口。像之前一样，打开一个助理编辑器窗格，并显示`DungeonThingAppDelegate.h`文件。按住
    Control 键，从新的角色数组控制器拖到`DungeonThingAppDelegate.h`文件中，并创建一个名为`characterArrayController`的新输出口。


    接下来，再次点击数组控制器，打开*属性检查器*（![image](images/arrow2.jpg)4）。我们将在顶部看到一些选项，可以微调数组控制器的行为，但现在我们保持它们不变。我们需要配置的是检查器下半部分的*对象控制器*部分。确保*模式*设置为
    Class，并且*类名*为“NSMutableDictionary”。此配置告诉控制器，它正在处理的模型对象是`NSMutableDictionary`的实例，这是一个“普通”类（而不是实体，我们将在[第
    7 章](#9781430245421_Ch07.xhtml)中作为 Core Data 的一部分进行介绍）。在其下方，我们将看到一个列出数组控制器应能在模型对象中访问的属性的表格视图。点击表格视图下方的
    + 按钮，输入“createdObject”，然后再次点击 +，输入“timestamp”。[图 7-13](#9781430245421_Ch07.xhtml#Fig13)
    显示了数组控制器的完整属性配置。


    ![9781430245421_Fig07-13.jpg](images/9781430245421_Fig07-13.jpg)


    [图 7-13](#9781430245421_Ch07.xhtml#_Fig13). 第一个 NSArrayController 的已配置属性


    是的，这些就是我们在每次用户点击按钮时，用于创建`NSMutableDictionary`的代码中使用的键。我们现在将使用这些键为 GUI 对象创建绑定。


    接下来，我们需要配置一个绑定，但不是针对 GUI 对象，而是针对数组控制器本身！实际上，`NSArrayController`不仅仅是提供对模型对象的、支持绑定的访问的提供者。它本身也是一个消费者，通过
    Cocoa 绑定从另一个对象获取其内容数组。在我们的例子中，它将从`DungeonThingAppDelegate`的角色数组中获取内容。保持数组控制器被选中，打开*绑定检查器*（![image](images/arrow2.jpg)7）。点击*Content
    Array*旁边的展开三角形以打开它，并通过从弹出列表中选择“Dungeon Thing App Delegate”，在*模型键路径*字段中输入“characters”，然后按回车键，来设置所需的绑定。请注意，我们的`DungeonThingAppDelegate`不需要任何特殊准备就能支持绑定。我们所需要做的只是将一个实例变量作为属性暴露出来（就像我们为三个内容数组所做的那样），然后我们就可以立即使用它来绑定其他对象了！


    现在，我们已经添加了一个`NSArrayController`，并将其配置为从`DungeonThingAppDelegate`访问正确的数据。是时候将一些
    GUI 对象绑定到这个新控制器了。


    ### 通过数组控制器绑定表格显示


    首先，我们将为表格视图设置一个单一的绑定。我们将表格视图的 Content 绑定绑定到角色数组（通过数组控制器），然后让表格视图单元格从每个模型对象中获取时间戳属性。


    方法如下：通过 Interface Builder 画布左侧的对象停靠区域向下钻取，点击表格视图，然后在*绑定检查器*（![image](images/arrow2.jpg)7）中打开*Value*绑定配置部分。'
  raw: 'Use the window’s resize control in the lower right to make the window about
    twice its current height. The blue guidelines will help us maintain the current
    width.    In the *Object Library* pane, search for “table” and drag the resulting
    table view out into the window. Position it so that its upper left corner is just
    below the lower left corner of the left-most box, then grab the table view’s lower
    right resize handle, and drag it down until the table fills most of the available
    space down to the bottom of the window, with its left and right edges lined up
    with the edges of the box above it, as shown in [Figure 7-11](#9781430245421_Ch07.xhtml#Fig11).    ![9781430245421_Fig07-11.jpg](images/9781430245421_Fig07-11.jpg)    [Figure
    7-11](#9781430245421_Ch07.xhtml#_Fig11). Adding tables to the window    In our
    history tables, we’re only going to display the time that the object was created.
    The user can then click on a row to see the relevant object displayed in the text
    field above the table. This means that we only want to have one column in the
    table, so open the *Attributes Inspector* (![image](images/arrow2.jpg)4). Select
    the table view (which is inside a scroll view, so click twice to get to the table
    view itself). In the Inspector, change the number of columns to 1 and set the
    *Content Mode* to be view-based rather than cell-based.    Next, resize the remaining
    column so that it fills the width of the table. Do this by clicking in the table
    header until the entire table header is selected. Then mouse over the vertical
    line marking the edge of the table column header, and drag it to the right until
    the column fills the whole table.    Finally, disable editing in the remaining
    column since we don’t want to let the user change the timestamp of a created object.
    Click the table column until it’s selected, then bring up the *Attributes Inspector*
    (![image](images/arrow2.jpg)4) and click to turn off the *Editable* checkbox.
    Next, change resizing from Both to Autoresizes with Table, as there’s no reason
    to let the user resize the table view’s only column.    At this point, the table
    view and its column are graphically laid out and everything is configured except
    its bindings. This is a perfect time to duplicate the table we’ve just made for
    displaying characters so that we can use the exact same configuration for monsters
    and dungeons. Click the window background, then click once on the table view to
    select it (along with its enclosing `NSScrollView`). Now press ![images](images/arrow3.jpg)D
    to duplicate the table view, and drag it the new one into place at the bottom
    of the center view group. Then press ![images](images/arrow3.jpg)D once again,
    and drag the final table view into place in the window’s bottom right corner.
    For both of those, we’ll of course use the blue guidelines to help us line them
    up properly. [Figure 7-12](#9781430245421_Ch07.xhtml#Fig12) shows the final layout.    ![9781430245421_Fig07-12.jpg](images/9781430245421_Fig07-12.jpg)    [Figure
    7-12](#9781430245421_Ch07.xhtml#_Fig12). The final DungeonThing window layout    Creating
    and Configuring an Array Controller    Now it’s time to add an `NSArrayController`
    so that we can configure some bindings for the first set of objects, the characters.
    In the *Object Library* pane, search for “array.” Note the Array Controller that
    appears in the results; this is an instance of the `NSArrayController` object.
    Drag one of these out to the object dock on the far left of the Interface Builder
    canvas. If the dock area isn’t already expanded, click the disclosure triangle
    in the lower-left corner of the Interface Builder canvas to expand it. The `NSArrayController`
    will need a more meaningful name, so click the “Array Controller” text twice slowly
    (just like renaming a file in Finder) to edit the name. We’ll be using this controller
    to provide access to the characters array, so name it “characters.


    ” Giving this top-level nib object a unique name of its own will help a bit later
    on when we’ll be adding two more array controllers to this nib. (Note that in
    the initial release of Xcode 4.5, the name may not refresh in the Object Dock
    after we change it. If so, we can get the new name to appear by clicking on the
    Object Dock’s disclosure triangle twice.)    In order for our `DungeonThingAppDelegate`
    to make use of the `NSArrayController` instances, we’ll need to add outlets to
    the app delegate. Open an Assistant Editor pane, as we did above, with the `DungeonThingAppDelegate.h`
    file displayed. Control-drag from the new characters array controller into the
    `DungeonthingAppDelegate.h` file, and create a new outlet named `characterArrayController`.    Next,
    click the array controller again and bring up the *Attributes Inspector* (![image](images/arrow2.jpg)4).
    We’ll see some options at the top that let us fine-tune the behavior of the array
    controller, but for now we’ll leave them all as they are. What we need to configure
    is the lower portion of the Inspector, in the *Object Controller* section. Make
    sure that *Mode* is set to Class, and that *Class Name* is “NSMutableDictionary.”
    This configuration tells the controller that the model objects it’s dealing with
    are instances of `NSMutableDictionary`, a “normal” class (rather than an Entity,
    which we’ll cover as a part of Core Data in [Chapter 7](#9781430245421_Ch07.xhtml)).
    Below that we’ll see a table view that lists the attributes that the array controller
    should be able to access in the model objects. Click the + button below the table
    view, and type in “createdObject,” then click + again, and type in “timestamp.”
    [Figure 7-13](#9781430245421_Ch07.xhtml#Fig13) shows the completed attributes
    configuration for the array controller.    ![9781430245421_Fig07-13.jpg](images/9781430245421_Fig07-13.jpg)    [Figure
    7-13](#9781430245421_Ch07.xhtml#_Fig13). The configured attributes for your first
    NSArrayController    Yes, these are the keys that we used in the code for creating
    an `NSMutableDictionary` each time the user clicks a button. These keys are what
    we’ll now use to creating bindings for our GUI objects.    The next thing we have
    to do is configure a binding, not for a GUI object, but for the array controller
    itself! It just so happens that `NSArrayController` is not only a provider of
    bindings-ready access to model objects. It’s a consumer as well, retrieving its
    content array from another object via Cocoa Bindings. In our case, it will get
    its content from `DungeonThingAppDelegate`’s characters array. With the array
    controller still selected, bring up the *Bindings Inspector* (![image](images/arrow2.jpg)7).
    Click the disclosure triangle next to *Content Array* to open it up, and set up
    the desired binding by choosing Dungeon Thing App Delegate from the pop-up list,
    typing “characters” into the *Model Key Path* field, and pressing Enter. Note
    that our `DungeonThingAppDelegate` requires no special preparation in order to
    be bindings-friendly. All we have to do is expose an instance variable as a property
    (as we’ve done for our three content arrays), and we can immediately use it to
    bind other objects to!    Now we’ve added an `NSArrayController` and configured
    it to access the right data from our `DungeonThingAppDelegate`. It’s time to bind
    some GUI objects to this new controller.    Binding the Table Display via the
    Array Controller    First, we’ll set up a single binding for the table view. We’re
    going to bind the table view’s Content binding to the characters array (through
    the array controller), and then have the table view cell grab the timestamp attribute
    from each model object.    Here’s how: click the table view by drilling down through
    the Object Dock on the left side of the Interface Builder canvas, then open the
    *Value* binding configuration section in the *Bindings Inspector* (![image](images/arrow2.jpg)7).'
  trans: '

    使用窗口右下角的调整控件，将窗口高度增加约一倍。蓝色辅助线将帮助我们保持当前宽度。


    在*对象库*面板中搜索“table”，将出现的表格视图拖入窗口。将其放置在最左侧方框左下角下方，然后抓住表格视图右下角的调整手柄，向下拖动，直到表格填满窗口底部的大部分可用空间，其左右边缘与上方方框的边缘对齐，如图
    7-11 所示。


    ![9781430245421_Fig07-11.jpg](img/9781430245421_Fig07-11.jpg)


    图 7-11. 向窗口中添加表格


    在我们的历史记录表格中，我们只打算显示对象创建的时间。用户随后可以点击某一行，在表格上方的文本字段中查看相关对象。这意味着我们只需要表格中有一列。因此，打开*属性检查器*（![image](img/arrow2.jpg)4）。选择表格视图（它位于滚动视图内部，因此需要点击两次才能选中表格视图本身）。在检查器中，将列数改为
    1，并将*内容模式*设置为基于视图而非基于单元格。


    接下来，调整剩余的列，使其填满表格的宽度。为此，点击表格标题，直到整个表格标题被选中。然后将鼠标悬停在标记表格列标题边缘的垂直线上，向右拖动，直到该列填满整个表格。


    最后，禁用剩余列的编辑功能，因为我们不希望用户更改已创建对象的时间戳。点击表格列直到其被选中，然后打开*属性检查器*（![image](img/arrow2.jpg)4），点击取消*可编辑*复选框的勾选。接下来，将调整大小方式从“两者”改为“随表格自动调整大小”，因为没理由让用户调整表格视图的唯一列。


    此时，表格视图及其列已按图形方式布局完毕，除了绑定之外的所有配置已完成。这是复制我们刚刚为显示角色而制作的表格的好时机，这样我们就可以为怪物和地牢使用完全相同的配置。点击窗口背景，然后点击一次表格视图以选中它（以及其包含的`NSScrollView`）。现在按下![images](img/arrow3.jpg)D
    复制表格视图，并将新复制的表格视图拖动到中间视图组底部的适当位置。然后再次按下![images](img/arrow3.jpg)D，并将最后一个表格视图拖到窗口右下角的适当位置。对于这两个表格视图，我们当然会使用蓝色辅助线来帮助正确对齐。图
    7-12 显示了最终布局。


    ![9781430245421_Fig07-12.jpg](img/9781430245421_Fig07-12.jpg)


    图 7-12. DungeonThing 窗口的最终布局


    ### 创建并配置数组控制器


    现在是时候添加一个`NSArrayController`，以便为第一组对象（角色）配置一些绑定。在*对象库*面板中搜索“array”。注意搜索结果中出现的“Array
    Controller”；这是`NSArrayController`对象的一个实例。将其中的一个拖到 Interface Builder 画布最左侧的对象停靠区域。如果该停靠区域尚未展开，请单击
    Interface Builder 画布左下角的展开三角形以展开它。`NSArrayController`需要一个更有意义的名称，因此缓慢点击“Array
    Controller”文本两次（就像在 Finder 中重命名文件一样）来编辑名称。我们将使用此控制器来提供对角色数组的访问，因此将其命名为“characters”。


    为此顶级 nib 对象指定一个唯一的名称，将有助于稍后我们在此 nib 中添加另外两个数组控制器时使用。（请注意，在 Xcode 4.5 的初始版本中，更改名称后，对象停靠区域中的名称可能不会刷新。如果是这样，我们可以通过单击对象停靠区域的展开三角形两次来使新名称显示出来。）


    为了让我们的`DungeonThingAppDelegate`能够使用这些`NSArrayController`实例，我们需要向应用程序委托添加输出口。像之前一样，打开一个助理编辑器窗格，并显示`DungeonThingAppDelegate.h`文件。按住
    Control 键，从新的角色数组控制器拖到`DungeonThingAppDelegate.h`文件中，并创建一个名为`characterArrayController`的新输出口。


    接下来，再次点击数组控制器，打开*属性检查器*（![image](img/arrow2.jpg)4）。我们将在顶部看到一些选项，可以微调数组控制器的行为，但现在我们保持它们不变。我们需要配置的是检查器下半部分的*对象控制器*部分。确保*模式*设置为
    Class，并且*类名*为“NSMutableDictionary”。此配置告诉控制器，它正在处理的模型对象是`NSMutableDictionary`的实例，这是一个“普通”类（而不是实体，我们将在第
    7 章中作为 Core Data 的一部分进行介绍）。在其下方，我们将看到一个列出数组控制器应能在模型对象中访问的属性的表格视图。点击表格视图下方的 + 按钮，输入“createdObject”，然后再次点击
    +，输入“timestamp”。图 7-13 显示了数组控制器的完整属性配置。


    ![9781430245421_Fig07-13.jpg](img/9781430245421_Fig07-13.jpg)


    图 7-13. 第一个 NSArrayController 的已配置属性


    是的，这些就是我们在每次用户点击按钮时，用于创建`NSMutableDictionary`的代码中使用的键。我们现在将使用这些键为 GUI 对象创建绑定。


    接下来，我们需要配置一个绑定，但不是针对 GUI 对象，而是针对数组控制器本身！实际上，`NSArrayController`不仅仅是提供对模型对象的、支持绑定的访问的提供者。它本身也是一个消费者，通过
    Cocoa 绑定从另一个对象获取其内容数组。在我们的例子中，它将从`DungeonThingAppDelegate`的角色数组中获取内容。保持数组控制器被选中，打开*绑定检查器*（![image](img/arrow2.jpg)7）。点击*Content
    Array*旁边的展开三角形以打开它，并通过从弹出列表中选择“Dungeon Thing App Delegate”，在*模型键路径*字段中输入“characters”，然后按回车键，来设置所需的绑定。请注意，我们的`DungeonThingAppDelegate`不需要任何特殊准备就能支持绑定。我们所需要做的只是将一个实例变量作为属性暴露出来（就像我们为三个内容数组所做的那样），然后我们就可以立即使用它来绑定其他对象了！


    现在，我们已经添加了一个`NSArrayController`，并将其配置为从`DungeonThingAppDelegate`访问正确的数据。是时候将一些
    GUI 对象绑定到这个新控制器了。


    ### 通过数组控制器绑定表格显示


    首先，我们将为表格视图设置一个单一的绑定。我们将表格视图的 Content 绑定绑定到角色数组（通过数组控制器），然后让表格视图单元格从每个模型对象中获取时间戳属性。


    方法如下：通过 Interface Builder 画布左侧的对象停靠区域向下钻取，点击表格视图，然后在*绑定检查器*（![image](img/arrow2.jpg)7）中打开*Value*绑定配置部分。

