    also change the file extension to something that suggests the use of your app,
    instead of the default extension. All of these options are configured in Xcode’s
    Target settings. Go back to Xcode, select the top-most ColorMix group in the navigation
    pane, click the *ColorMix* target, and click the Info tab at the top of the view
    to see the target settings. Expand the *Document Types* group, and there will
