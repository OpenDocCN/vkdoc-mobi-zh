    \  \n![9781430245421_Fig08-08.jpg](img/9781430245421_Fig08-08.jpg)  \n图 8-8 在对象停靠栏中选择\
    \ Depiction 文本字段  \n\n至此，GUI 布局完成。它很美观，不是吗？现在我们需要将其连接到数据源以填充内容。我们将使用上一章讨论的 Cocoa\
    \ 绑定来实现。  \n\n**设置 Cocoa 绑定**  \n当我们告诉 Xcode 要创建一个 Core Data 应用程序时，它生成了一个应用程序委托类（名为`MBAppDelegate`），其中包含用于处理\
    \ Core Data 的特殊支持。这种支持的一部分是，生成的`MBAppDelegate`类现在有一个`managedObjectContext`属性。Managed\
    \ Object Context 是一个对象，它允许数组控制器（或您自己的代码）通过 Core Data 访问模型对象（`NSManagedObject`或其子类的实例）的源。我们稍后检查创建项目时自动放置的控制器代码时，将看到应用程序控制器如何提供此功能。与上一章一样，我们将使用`NSArrayController`来管理数据，但此处创建的`NSArrayController`将通过\
    \ Core Data（而不是`NSMutableDictionary`）访问其数据。并且，像上一章一样，我们将使用 Cocoa 绑定将其连接到用户界面。\n"
- fmt: '# Binding with an Array Controller


    To get started, we need to get an Array Controller into the app. In the *Object
    Library* search field, search for “array.” The results should show an Array Controller.
    Drag one of those out onto the Interface Builder canvas; it can get dropped anywhere
    in the editor pane. No matter where we drop it, it will show up in the Object
    Dock to the left side of the Interface Builder canvas. Select it in the Object
    Dock and rename it to be Mythical Person Array Controller. Open up the *Attributes
    Inspector*, and change its mode from Class to Entity Name. Enter an *Entity Name*
    of “MythicalPerson”, which is the same name we used in the Model Editor. Lastly,
    check the *Prepares Content* checkbox. This will trigger the array controller
    to load data when the app is launched.


    We’re going to link the array controller to the `managedObjectContext` now. With
    the array controller still selected in the Object Dock, select the *Bindings Inspector*.
    Expand the *Parameters* section, and select *App Delegate* from the pop-up list.
    After that, check the *Bind to* checkbox that’s just next to the pop-up list.
    Next, type “managedObjectContext” into the *Model Key Path* field. This connects
    the array controller to the Core Data plumbing present in the App Delegate.


    Now that we’ve got the array controller connected, we need to start setting up
    bindings with the UI controls. We’ll start with the basic controls (the text fields
    and sliders), and then deal with the more complex controls (the depiction and
    the table view), and then finish up by wiring up the buttons.


    The first binding will be for the Name textfield. Select the Name text box and
    then open the *Bindings Inspector*. Expand the *Value* section, check the *Bind
    to* checkbox, and then select Mythical Person Array Controller from the pulldown.
    Make sure that the *Controller Key* box shows “selection,” and enter “name” in
    the *Model Key Path* field, as shown in [Figure 8-9](#9781430245421_Ch08.xhtml#Fig9).
    This connects the textfield to the name property of the array controller’s selected
    object.


    ![9781430245421_Fig08-09.jpg](images/9781430245421_Fig08-09.jpg)


    [Figure 8-9](#9781430245421_Ch08.xhtml#_Fig9). The Bindings Inspector for connecting
    the Name textfield to the Mythical Person Array Controller


    Setting up bindings for the sliders will be similar; we’ll establish a binding
    to the Mythical Person Array Controller’s selection, with a different *Model Key
    Path* depending on the appropriate property for the control. For each of the three
    sliders, this will be the `divinity`, `power`, and `goodness` attributes that
    we created in the model file. To make these bindings, select the Divinity slider
    and look at the *Bindings Inspector*. Expand the *Value* section, check the *Bind
    to* checkbox, and then select Mythical Person Array Controller from the pulldown.
    Make sure that the *Controller Key* box shows “selection,” and enter “divinity”
    in the *Model Key Path* field. Repeat this for the Power and Goodness sliders,
    changing the *Model Key Path* as appropriate.


    Setting up bindings for the Depiction and Details areas will be just slightly
    more complex. We’ll do the Details first. Select the Text view (remember that
    the Text view is embedded in an `NSScrollView`; you’ll need to click through the
    scroll view to get to the Text view itself). In the *Bindings Inspector*, there
    are different choices than with the Name text field and the sliders. However,
    there’s still a *Value* section, which is what we’ll be using. Expand the *Value*
    section, check the *Bind to* checkbox, and use “details” as the *Model Key Path*.


    For the Depiction, we need to get an `NSImage` for the image well to display.
    Core Data doesn’t know about `NSImages`, but this isn’t a problem. Remember the
    earlier discussion about transformers and the Transformable type used by Core
    Data?


    Because depiction is a transformable attribute, its value needs to be converted
    between what we see in the GUI (an `NSImage`) and something that Core Data is
    capable of storing (`NSData`). We’ll do this by adding `NSKeyedUnarchiveFromData`
    to the Cocoa bindings configuration for this control. Select the image well and
    bring up the *Bindings Inspector*. As with the other fields, open the *Value*
    section. Check the *Bind to* checkbox, ensure that the *Controller Key* shows
    “selection,” and set the *Model Key Path* to be “depiction”. To make the conversion
    from `NSData` to `NSImage`, click on the Value Transformer pop-up list, and choose
    `NSKeyedUnarchiveFromData`.


    ## Configuring Bindings for the Table View


    It’s time to do the bindings for the table view. Setting up Cocoa bindings for
    a view-based table view is a two-step process. First, we have to set up a binding
    for the table view itself. Next, we’ll set up bindings for each view in the row.
    The table view works some magic to expose a bindings source to its subviews, titled
    Table Cell View. Within that binding is a `Model Key Path` of “objectValue” that
    represents the object for that row.


    To start, select the table view itself. This is most easily done from the Object
    Dock on the left. In the *Bindings Inspector*, expand the *Content* section, and
    check the *Bind to* checkbox, ensure that the pulldown menu shows Mythical Person
    Array Controller and *Controller Key* shows “arrangedObjects.” For the table view
    itself, we don’t have a *Model Key Path* setting. We also want to have the selected
    row in the table view get passed back to the array controller. To set this, expand
    the Selection Indices section of the *Bindings Inspector*. Check the *Bind to*
    checkbox here, set the pulldown menu to Mythical Person Array Controller, and
    set the *Controller Key* to “selectionIndexes.” Your binding should look like
    [Figure 8-10](#9781430245421_Ch08.xhtml#Fig10).


    ![9781430245421_Fig08-10.jpg](images/9781430245421_Fig08-10.jpg)


    [Figure 8-10](#9781430245421_Ch08.xhtml#_Fig10). Setting bindings for the table
    view


    We’ve got five columns in the table: Name, Divinity, Power, Goodness, and Depiction.
    We don’t set bindings on the columns directly; instead, we’ll set up bindings
    to the views contained within each column. For the first four columns, the view
    is an `NSTextField` contained within an `NSTableCellView`. For the `Depiction`
    column, the view is an `NSImageWell` contained within an `NSTableCellView`. Unfortunately,
    Xcode sets the default value of the text field contained within an `NSTableCellView`
    to be “Table View Cell,” which seems almost designed to create confusion. The
    views in the table view are instances of `NSTableCellView`, despite their default
    text. The text field and image well will be bound to the `objectValue` property
    of the Table Cell View.


    We’ll start with the Name column. Select the Table View Cell in the `Name` column,
    which may take two clicks if you’re clicking in the UI itself, or by expanding
    the Table Column - Name entry in the Object Dock on the left and drilling down
    to the Static Text - Table View Cell entry within. In the *Bindings Inspector*,
    expand the *Value* section. Check the *Bind to* checkbox, ensure that the pulldown
    menu shows Table Cell View, and set the *Model Key Path* to be “objectValue.name.”
    The *Controller Key* should be blank.


    The Divinity, Power, and Goodness bindings will all be similar. Select each column
    in turn and drill down to the Static Text field within. Set the Value binding
    as we did for the `Name` column: open the *Value* section, check the *Bind to*
    checkbox, ensure that the pulldown menu shows Table Cell View, and set the *Model
    Key Path* to be “objectValue.divinity,” “objectValue.power,” or “objectValue.goodness”
    as appropriate.


    Now for the Depiction column. Select the image well inside the Table Cell View
    in the Depiction column. In the *Bindings Inspector*, open the *Value* section.'
