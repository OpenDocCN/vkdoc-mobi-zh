    此外，还需将“缩放”弹出菜单改为“按比例放大或缩小”，这样一来，无论系统提供的是小图标还是大图标，它都会缩放以适应当前可用空间。此时的 GUI 应如图 16-3
    所示。


    ![9781430245421_Fig16-03.jpg](img/9781430245421_Fig16-03.jpg) 图 16-3. 用于显示所选文件图标和路径的
    GUI。此截图已选中图像视图；否则它将不可见。


    现在，是时候为图像视图和右侧标签设置绑定了。选中图像视图，打开*绑定检查器*，使用 `self.fileIcon` 键路径将其*值*绑定到应用委托。然后选中右侧的标签，使用
    `self.filename` 键路径将其*值*绑定到应用委托。


    窗口的下一个部分看起来就像我们之前创建的一样。实际上，添加这些对象最快的方法是通过拖拽一个框选中上述三个对象，按下 ![images](img/arrow3.jpg)*D*
    复制选中的对象，然后将新对象拖到下方，与之前的对象对齐。将新左侧标签的标题改为“打开应用：”，并在必要时调整其位置。图 16-4 展示了此效果。


    ![9781430245421_Fig16-04.jpg](img/9781430245421_Fig16-04.jpg) 图 16-4. GUI 的这一部分将让我们看到文件将使用哪个应用打开。此处两个图像视图都显示出来了，否则，就像之前一样，它们会不可见。


    重新配置新图像视图的绑定，使用 `self.opensAppIcon` 键路径将其*值*连接到应用委托，然后将右侧标签的*值*使用 `self.opensAppName`
    键路径连接到应用委托。


    接下来，我们继续处理表格视图。从库中拖出一个表格视图，并将其加宽以匹配图 16-5。


    ![9781430245421_Fig16-05.jpg](img/9781430245421_Fig16-05.jpg) 图 16-5. 这里我们将显示文件的所有属性。


    这个表格视图将包含系统提供给我们的所有文件属性。这些属性以字典形式提供，这正好是 Apple 的 `NSDictionaryController` 类的理想用途。使用
    `NSDictionaryController`，我们只需通过 Cocoa 绑定进行连接，就能在表格视图中将所选文件的所有属性以键值对的形式显示出来。


    在*库*中搜索 `NSDictionaryController`，并拖一个到 Interface Builder 的停靠栏中，以将其添加到 nib 文件中。然后点击停靠栏中其图标旁边的文本，将其重命名为
    `attrDict`，以便稍后绑定时能轻松识别。与其他包含的控制器类一样，字典控制器类能够通过绑定获取其内容。使用*绑定检查器*将其*内容字典*（位于*控制器内容*组中）绑定到应用委托的
    `self.fileAttributes` 键路径。


    现在，我们只需将表格视图的列绑定到新的控制器。选中左列，使用*绑定检查器*将其*值*列绑定到 `attrDict`，使用 `arrangedObjects`
    作为控制器键，`key` 作为键路径。这将使左列显示字典中每个键值对的键。现在选中右列，将其*值*列绑定到 `attrDict`，使用 `arrangedObjects`
    作为*控制器键*，`value` 作为*模型键路径*。


    接下来，从*库*中抓取一个 `NSTextView` 并将其拖入我们正在创建的窗口中，放置在靠近底部的位置。我们的窗口开始显得有些拥挤了！减小表格视图和文本视图的高度，使它们能够舒适地上下排列，并在下方留出相当大的空间，因为我们后面会用到。


    然后调整文本视图的大小，使其宽度与表格视图相同。所有这些都显示在图 16-6 中。


    ![9781430245421_Fig16-06.jpg](img/9781430245421_Fig16-06.jpg) 图 16-6. 将文本视图正确放置在表格视图下方后，窗口应呈现的样子。


    当我们从*库*中拖出一个文本视图时，它实际上包含在一个滚动视图中，因此需要额外点击一次以选中滚动视图内部的文本视图。然后使用*属性检查器*取消选中*可编辑*复选框（我们只想在此处显示文件内容，而非编辑它）以及*富文本*复选框。现在是引入
    `NSSplitView` 的好时机，正如之前所暗示的那样。确保表格视图和文本视图（实际上是包含它的滚动视图）大小大致相同，并上下对齐。然后同时选中它们，从菜单中选择**编辑器**
    ![image](img/arrow.jpg) **嵌入于** ![image](img/arrow.jpg) **分割视图**。这样做会将它们紧密排列，并在它们之间绘制一个小小的凹痕。


    现在再次仅选中文本视图。请记住，我们可以通过按住 Shift-Ctrl 点击文本视图，然后从显示的对象堆栈中选择文本视图，来避免在视图层次结构中选中正确对象时的歧义和额外步骤。切换到*绑定检查器*，将文本视图的*值*绑定到应用委托的
    `self.fileStringValue` 键路径。


    最后，我们为字符串编码列表提供一个 GUI，用于重新解释所选文件的内容。为此，我们需要从库中获取一个标签和一个弹出按钮。按照显示的方式布局它们，包括超宽的弹出按钮，因为列表中的一些条目会非常长（参见图
    16-7）。


    ![9781430245421_Fig16-07.jpg](img/9781430245421_Fig16-07.jpg) 图 16-7. 说真的，谁不希望自己的弹出按钮足够宽，能完整显示“NSUTF32LittleEndianStringEncoding”呢？


    弹出按钮列表的值将从应用委托的 `encodingNames` 方法中获取，因此我们无需在 Interface Builder 中输入它们。这里我们将再次使用
    `NSDictionaryController`，这次只显示 `encodingNames` 字典中的值。为此，我们需要先从*库*中拖拽另一个 `NSDictionaryController`
    到 nib 窗口，同时将其重命名为 `strEncs`，并将其*内容字典*绑定到应用委托的 `self.encodingNames` 键路径。然后，将弹出按钮的*内容*绑定到
    `strEncs`，使用 `arrangedObjects` 作为*控制器键*，`value` 作为*模型键路径*。


    最后，我们需要建立一个绑定，以便应用委托能够感知用户在弹出按钮中设置的值，从而让应用委托使用所选编码重新显示文本。通过将弹出按钮的“选定对象”绑定到应用委托，并使用
    `self.stringEncodingName` 作为键路径来实现这一点。


    现在保存所有更改，并**构建并运行**应用程序。我们应该能看到我们构建的 GUI，包括一个**文件** ![image](img/arrow.jpg) **打开**菜单项，它允许我们选择一个文件，并显示文件的属性及其内容。从弹出列表中选择另一种编码将使应用使用所选编码在文本视图中重新显示数据。


    ## 总结


    在本章中，我们了解了如何使用 Cocoa 访问文件及其元数据。我们还学习了一些关于字符串编码的知识，以及 Cocoa 如何处理它们。更重要的是，我们看到了另一个由
    Cocoa 绑定驱动的 GUI 示例。除了打开文件的菜单项外，这里发生的一切都通过绑定完成，包括在弹出列表中设置一个值，这最终会导致文本字段重新加载内容。

