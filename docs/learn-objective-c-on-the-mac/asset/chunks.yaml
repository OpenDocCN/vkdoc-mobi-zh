    and *XML* options (by using the “x” button at the upper right-hand corner of each
    of those sections), leaving only the *SQLite* option. Give this remaining format
    a decent filename extension by editing the value shown in the *Extensions* column,
    changing it to *ColorMix*. Now save the work, Build & Run, and save a color set,
    verifying that we now have no choice about what kind of file format to save it
    as.    Adding Color    Now the document stuff is all working as it should, but
    we’ve got a really boring application that doesn’t do anything interesting at
    all. Let’s make our app do what we promised in the beginning of this chapter:
    display a bunch of colors made by blending the two chosen colors using all of
    Core Graphics’ predefined blending modes.    To do this, we’re going to create
    a new class called `CMColorBlendView`, which will be a direct subclass of `NSView`.
