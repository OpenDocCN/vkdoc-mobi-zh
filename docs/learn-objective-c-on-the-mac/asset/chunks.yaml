    从`Object Library`中拖拽一个按钮到 GUI 空白窗口的底部。然后复制该按钮，并将两个按钮分别命名为`Previous`和`Next`。将它们并排放置在窗口底部中央。在`FIAppDelegate.h`文件中打开一个`Assistant
    Editor`窗格。在接下来的步骤中，我们将使用此`Assistant Editor`进行连接。首先，从每个按钮按住 Control 键拖拽到`Assistant
    Editor`窗口，并创建名为`next`和`previous`的新操作，以匹配这两个按钮。最终结果应如图 Figure 15-6 所示。


    ![9781430245421_Fig15-06.jpg](img/9781430245421_Fig15-06.jpg)


    Figure 15-6. 准备窗口


    现在从`Object Library`中找到一个`NSBox`，将其拖拽到空白窗口中，放置在按钮上方，并调整其大小以填充屏幕大部分区域。使用`Attributes
    Inspector`，通过将`Title Position`弹出菜单设置为`None`来移除盒子的标题（见图 Figure 15-7）。然后从盒子按住 Control
    键拖拽到`Assistant Editor`中的`FIAppDelegate.h`代码，并创建一个名为`box`的新输出口，以便我们可以从类中访问该盒子。


    ![9781430245421_Fig15-07.jpg](img/9781430245421_Fig15-07.jpg)


    Figure 15-7. 显示窗口现已准备就绪


    我们的下一步操作是设置一组视图，用于在主视图中切换进出。我们将为此使用`NSTabView`，因为它可以方便地在 Xcode 中构建一系列视图，并在应用程序运行时作为离屏视图列表进行维护。在`Object
    Library`中找到一个`NSTabView`，但将其一直拖拽到左侧，并放入`Object Dock`中，位于`App Delegate`和`Font Manager`对象下方。注意，选项卡视图会作为顶级图标出现在
    nib 窗口中，与应用程序委托、窗口及其他项目并列（见图 Figure 15-8）。


    ![9781430245421_Fig15-08.jpg](img/9781430245421_Fig15-08.jpg)


    Figure 15-8. 这是一个不寻常的地方，但选项卡视图就在那里


    放置在 nib 文件顶层的选项卡视图（或任何其他`NSView`子类）在加载 nib 时不会显示，但只要我们有一个指向它的输出口，就可以以任何方式访问和使用它，包括将其放入窗口的视图层级中。在我们的例子中，我们永远不会将选项卡视图本身显示出来，只显示它包含的内容视图。为了获取内容视图，我们需要将其连接到
    App Delegate 类。从`Object Dock`中的选项卡视图按住 Control 键拖拽到`Assistant Editor`中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便以后可以访问它。


    双击`Object Dock`中的选项卡视图条目，可以看到选项卡视图在没有窗口的情况下显示，如 Figure 15-8 中 Interface Builder
    画布的底部所示。它仍然带有调整大小的框架，我们可以像调整窗口大小一样在 Interface Builder 中调整其大小。现在调整它的大小，使其与之前放入主窗口的`NSBox`大小大致相同。


    现在让我们向这个选项卡视图中放入一些内容，即我们可以翻动的“页面”。默认情况下，选项卡视图只包含两个内容视图，但让我们增加这个数量（使用`Attributes
    Inspector`），以便有更多视图可供切换。实际内容并不重要，只要每个页面有独特的元素，以便我们能够轻松看到内容从一页切换到下一页。一个好的开始是从`Object
    Library`中抓取一个标签，给它一个漂亮的大号字体，并将其文本更改为单词“One”。然后复制此标签并粘贴到每个其他视图中（我们可以像往常一样使用顶部的选项卡在这些视图之间切换），每次相应地更改文本。为了增加趣味性，还可以为每个页面添加一些独特的项目（此处为一个表格视图，彼处为一组按钮），这样应用程序完成后，在页面间切换时我们将看到更多动态效果。


    现在是完善控制器类界面的时候了，因此我们将注意力转向`FIAppDelegate.h`文件。它当前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们将要显示的视图的对象）和`box`（屏幕上用于显示这些视图的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用包含所有可用视图的选项卡视图数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。


    将以下加粗的行添加到`FIAppDelegate.h`中以添加所有这些内容。


    ```objectivec

    @interface FIAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSBox *box;

    @property (weak) IBOutlet NSTabView *tabView;


    @property (weak) NSView *leftView;

    @property (weak) NSView *rightView;

    @property (weak) NSView *middleView;

    @property (strong) NSArray *items;

    @property NSInteger currentTabIndex;


    - (IBAction)previous:(id)sender;

    - (IBAction)next:(id)sender;


    @end

    ```


    现在让我们开始在`FIAppDelegate.m`中实现我们的应用程序委托类。这个类将包含许多方法，用于准备过渡：通过设置下一个视图显示在盒子的一侧、将新视图过渡到位置以及将当前视图过渡到另一侧。由于我们希望能够根据是向右还是向左翻转来进行双向过渡，因此每个方法都有两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动过渡的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果您仍然同时打开了
    Interface Builder 画布和 Assistant Editor，您可能希望关闭它们，并将`FIAppDelegate.m`作为 Xcode 中的主视图。


    让我们首先创建一个预处理定义`ANIM_DURATION`，用于定义我们将要创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整此设置直到找到我们喜欢的速度。定义如下：


    ```objectivec

    #define ANIM_DURATION 1.0

    ```


    现在让我们继续实现`applicationDidFinishLaunching:`方法。在此方法中，我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是数组本身的引用。这意味着我们的代码现在拥有`tabViewItems`调用返回的`NSArray`的所有权。如果我们不将其放入`strong`引用中，则数组副本将没有任何强引用，并且在自动引用计数清理时会被释放。


    我们还设置`currentTabIndex`指向数组的末尾，以便第一个项目能够对齐（稍后会详细介绍）。然后我们调用第一个内部方法`prepareRightSide`，该方法将设置下一个视图以显示在盒子的右侧。然后我们使用`ANIM_DURATION`值，用它来指定我们在当前动画上下文中创建的任何动画的持续时间。

