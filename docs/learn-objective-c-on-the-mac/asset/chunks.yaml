- fmt: '单击顶部和底部的 I 形梁，窗口将在屏幕上垂直居中。我们需要设置一个 y 值，将窗口放置在菜单栏附近，但不要紧贴菜单栏。最简单的方法是使用“大小检查器”中的屏幕表示，将应用程序的主窗口移动到我们想要的位置。如有必要，我们还可以通过数字方式微调大小和位置。一旦窗口的初始位置符合要求，单击底部的
    I 形梁，使其变为条纹状。我们也可以通过选择“初始位置”部分底部的弹出菜单，并将其从“垂直比例”更改为“距顶部固定”来进行此更改。


    ## 设计窗口的界面


    在“对象库”中，选择“对象库”弹出菜单，然后选择“控件”。这将显示许多我们可以使用的不同按钮和文本字段（[图 4-6](#9781430245421_Ch04.xhtml#Fig6)）。底部列表中的第一个项目应该是“下压按钮”（`Push
    Button`），这是标准的 OS X 按钮。


    ![9781430245421_Fig04-06.jpg](images/9781430245421_Fig04-06.jpg)


    [图 4-6](#9781430245421_Ch04.xhtml#_Fig6). Xcode 实用工具区域中的对象库视图


    抓取其中一个并将其拖到窗口的界面上。将出现蓝色辅助线，指示按钮位于左边缘、右边缘或中心的最佳位置。使用蓝色辅助线将按钮放置在窗口的右下部分（[图 4-7](#9781430245421_Ch04.xhtml#Fig7)）。一旦按钮位于正确位置，松开鼠标，我们就在窗口上获得了一个按钮。现在双击该按钮，这将允许我们编辑按钮的标题。将其标题从“`Button`”更改为“`Right`”。


    ![9781430245421_Fig04-07.jpg](images/9781430245421_Fig04-07.jpg)


    [图 4-7](#9781430245421_Ch04.xhtml#_Fig7). 向主窗口添加按钮


    从库中拖出第二个按钮，并使用蓝色辅助线将其放置在窗口的左下方。放置此按钮后，双击它，并将此按钮的标题更改为“`Left`”。


    再拖入一个按钮，并使用底部蓝色辅助线将按钮放置在距窗口底部正确距离的位置。将其放置在窗口的水平中心，同样，会出现一条蓝色辅助线来帮助我们正确定位。放置好后，双击第三个按钮，并将其标签更改为“`Center`”。窗口现在应该如[图
    4-8](#9781430245421_Ch04.xhtml#Fig8) 所示。


    ![9781430245421_Fig04-08.jpg](images/9781430245421_Fig04-08.jpg)


    [图 4-8](#9781430245421_Ch04.xhtml#_Fig8). 窗口应如图所示，三个按钮均已布局


    请注意，当我们向窗口添加控件时，Interface Builder 窗格左侧的“对象”显示区域会展开，以显示控件的添加以及视图的约束集，这在[图 4-8](#9781430245421_Ch04.xhtml#Fig8)
    中也可见。约束部分控制了控件布局在窗口调整大小时如何响应。


    接下来，我们需要一个标签，以便告知用户单击了哪个按钮。标签是一个 GUI 对象，可以以我们选择的字体和大小显示一段文本。在我们的应用程序代码中，我们可以随时以编程方式更改标签的文本。从库中抓取一个标签。您可能需要向下滚动控件列表，或者直接使用搜索框。将标签拖到窗口的左上角，并使用辅助线将其正确放置在上边距和左边距处。


    单击标签右侧的调整大小手柄，向右拖动，直到到达窗口右侧的蓝色辅助线，然后松开。在选中标签的情况下，按 ![image](images/arrow2.jpg)`4`
    调出“实用工具”窗格中的“属性检查器”，并使用“文本对齐”按钮将文本居中。


    然后，单击“字体”设置右侧的小 T 图标。这将调出一个特殊的字体面板，如[图 4-9](#9781430245421_Ch04.xhtml#Fig9) 所示。将字体大小更改为
    36，可以直接输入数字，也可以使用“大小”字段右侧的小箭头按钮。完成此操作后，剩下的就是双击标签，使其进入编辑模式，然后按 Delete 键删除文本。我们希望在按下按钮之前，此标签不显示任何内容。


    ![9781430245421_Fig04-09.jpg](images/9781430245421_Fig04-09.jpg)


    [图 4-9](#9781430245421_Ch04.xhtml#_Fig9). 更改标签的字体


    至此，用户界面部分完成，所以现在我们需要编写一些代码，以便在按下三个按钮中的任何一个时更新标签中的文本。


    ## 创建控制器类


    我们将向 `ButtonAppDelegate` 类添加一些代码。这个类将作为控制器，处理我们所有三个按钮的点击动作。在我们刚刚布局的窗口中，我们设置了三个按钮和一个文本字段。当用户按下其中一个按钮时，文本字段的值应该被更新。因为我们需要更改文本字段显示的文本，所以需要一个指向它的输出口（`outlet`）。此外，我们还需要一个供按钮触发的操作方法（`action`）。因为操作方法会接收触发它的对象的指针，所以我们可以为所有三个按钮使用一个单一的操作方法。现在让我们来设置输出口和操作方法。


    为此，我们需要在用户界面元素和我们的代码之间建立一些连接。在上一章中，我们讨论了如何从一个 UI 元素按住 Control 键拖到另一个 UI 元素。这里我们将做类似的事情。


    在 nib 文件编辑器仍然打开的情况下，我们还需要打开一个显示代码的窗格。单击主 Xcode 窗口工具栏右侧“编辑器”组中的“助理”按钮（看起来像一个管家的躯干）。我们也可以通过输入
    ![image](images/arrow5.jpg) 来打开助理编辑器。通过选择**视图** ![image](images/arrow.jpg) **助理编辑器**下的不同选项，可以将该窗格并排或放置在
    nib 编辑器窗格下方。


    “助理编辑器”窗格会在编辑器区域上方的跳转栏中显示当前文件的名称。选择文件名，一个弹出菜单将显示名称 `ButtonsAppDelegate.h` 和 `ButtonsAppDelegate.m`。如果尚未选中，请选择
    `ButtonAppDelegate.h`。我们将看到 Xcode 为我们生成的类接口。生成的代码如下所示（忽略文件顶部的注释块）：


    ```objectivec

    #import <Cocoa/Cocoa.h>


    @interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;


    @end

    ```


    在上一章中，我们从一个用户界面对象按住 Control 键拖到另一个对象。这次，我们将从 nib 文件按住 Control 键拖到我们的代码中。在 nib
    编辑器窗格中，单击我们添加到窗口的标签。现在，从标签按住 Control 键拖到 `.h` 文件中，向下拖到 `@property` 行下方的空行处，文本编辑器中会延伸出一条蓝线，指示“插入输出口或操作”（`Insert
    Outlet or Action`），如[图 4-10](#9781430245421_Ch04.xhtml#Fig10) 所示。松开鼠标按钮，会出现一个小弹出窗口，我们可以在其中配置这个新连接。


    ![9781430245421_Fig04-10.jpg](images/9781430245421_Fig04-10.jpg)


    [图 4-10](#9781430245421_Ch04.xhtml#_Fig10). 从 nib 对象按住 Control 键拖到代码编辑器以连接输出口或操作


    在此弹出窗口中，将连接标记为“输出口”（`Outlet`），并将名称设置为“`label`”。将其他字段保留为默认设置，然后单击“连接”（`Connect`）。Xcode
    将在 `.h` 文件中添加一行新代码，内容如下：


    ```objectivec

    @property (weak) IBOutlet NSTextField *label;

    ```


    该属性声明在我们的类中创建了一个名为 `label` 的新属性。'
  raw: 'Clicking both the top and bottom I-beams will cause the window to be centered
    vertically on our screen.    We need to set a y value that places the window near
    the menu bar, without abutting it. The easiest way to do this is to simply move
    the application’s main window to where we want it, using the representation of
    the display in the Size Inspector. We can then tweak the size and position numerically
    if necessary. Once we have the initial position of the window where we want it,
    click the I-beam on the bottom so that it turns striped. We can also make this
    change by selecting the bottom pop-up menu in the Initial Position section and
    changing it from Proportional Vertical to Fixed from Top.    Designing the Window’s
    Interface    In the *Object Library*, select the *Object Library* pull-down menu
    and select Controls. This will present us with a bunch of different buttons and
    text fields that we can use ([Figure 4-6](#9781430245421_Ch04.xhtml#Fig6)). The
    first item in the bottom list should now be Push Button, which is a standard OS
    X button.    ![9781430245421_Fig04-06.jpg](images/9781430245421_Fig04-06.jpg)    [Figure
    4-6](#9781430245421_Ch04.xhtml#_Fig6). Object Library view in the Utility area
    of Xcode    Grab one of those and drag it over to the window’s interface. Blue
    guidelines will appear to show when the button is positioned in a good spot on
    the left edge, the right edge, or in the center. Use the blue guidelines to place
    the button in the lower right part of the window ([Figure 4-7](#9781430245421_Ch04.xhtml#Fig7)).
    Once the button is in the right location, release the mouse, and we’ll have a
    button on our window. Double-click the button now, which will allow us to edit
    the button’s title. Change its title from “Button” to “Right.”    ![9781430245421_Fig04-07.jpg](images/9781430245421_Fig04-07.jpg)    [Figure
    4-7](#9781430245421_Ch04.xhtml#_Fig7). Adding a button to the main window    Drag
    a second button over from the library and place it on the lower left of the window,
    again using the blue guidelines. After placing this button, double-click it and
    change this button’s title to “Left.”    Bring one more button over, and use the
    bottom blue guideline to place the button the correct distance from the bottom
    of the window. Place it in the horizontal center of the window, and again, there
    will be a blue guideline that appears to help us position it properly. Once it’s
    placed, double-click the third button and change its label to “Center.” The window
    should now look like [Figure 4-8](#9781430245421_Ch04.xhtml#Fig8).    ![9781430245421_Fig04-08.jpg](images/9781430245421_Fig04-08.jpg)    [Figure
    4-8](#9781430245421_Ch04.xhtml#_Fig8). The window should look like this, with
    all three buttons laid out    Note that as we added controls to the window, the
    *Objects* display on the left of the Interface Builder pane expanded to show the
    addition of the controls and the set of constraints for the view, also visible
    in [Figure 4-8](#9781430245421_Ch04.xhtml#Fig8). The constraints section governs
    how the layout of the controls responds to the window being resized.    Next,
    we need a label so that we can tell the user which button was clicked. A label
    is a GUI object that can display a piece of text in the font and size of our choosing.
    From within our application code, we can programmatically change the label’s text
    any time we want. Grab a label from the library. You may need to scroll down a
    bit in the list of controls, or you can just use the search box. Drag the label
    to the upper left of the window, and use the guides to place it properly against
    the top and left margins.    Click the resize handle on the right of the label,
    drag it to the right until you get to the blue guidelines on the right side of
    the window, and let go. With the label still selected, press ![image](images/arrow2.jpg)4
    to bring up the *Attribute Inspector* in the *Utility* pane, and center the text
    using the Text Alignment button.


    Then click the small T icon on the right side of the Font setting. This will bring
    up a special font panel, as shown in [Figure 4-9](#9781430245421_Ch04.xhtml#Fig9).
    Change the font size to 36, either by typing in the number directly or using the
    small arrow buttons to the right of the Size field. With that complete, all that’s
    left is to double-click the label, which will put it in editing mode, then hit
    the Delete key to delete the text. We don’t want this label to say anything until
    a button has been pressed.    ![9781430245421_Fig04-09.jpg](images/9781430245421_Fig04-09.jpg)    [Figure
    4-9](#9781430245421_Ch04.xhtml#_Fig9). Changing the font for the label    That
    winds up the user interface, so now we’re going to need to write some code to
    update the text in the label when one of the three buttons is pressed.    Creating
    the Controller Class    We’re going to add some code to the `ButtonAppDelegate`
    class. This class will be the controller that handles the click action for all
    three of our buttons. In the window we just laid out, we set up three buttons
    and one text field. When the user presses one of the buttons, the value of the
    text field should be updated. Because we need to change the text displayed by
    the text field, we’ll need an outlet to it. We’ll also need an action method for
    the buttons to trigger. Because action methods receive a pointer to the object
    that triggered them, we can use a single action method for all three buttons.
    Let’s set up the outlet and action now.    To do this, we need to make some connections
    from the user interface elements to our code. In the last chapter, we discussed
    how to control-drag from one UI element to another. We’re going to do something
    similar here.    With the nib file editor still open, we also need to get a pane
    up that has your code. Click the *Assistant* button (which looks like a butler’s
    torso) in the *Editor* group in the right side of the toolbar in the main Xcode
    window. We can also get an Assistant Editor by typing ![image](images/arrow5.jpg).
    The pane can be positioned side-by-side or below the nib Editor pane by selecting
    a different option under **View** ![image](images/arrow.jpg) **Assistant Editor**.    The
    *Assistant Editor* pane will show the name of the current file in a jump bar above
    the Editor area. Select the file name and a pop-up menu will show the names `ButtonsAppDelegate.h`
    and `ButtonsAppDelegate.m`. Select `ButtonAppDelegate.h` if it isn’t already selected.
    We’ll see the class interface that Xcode generated for us. The generated code
    will look like this (ignoring the comment block at the top of the file):    ```
    #import <Cocoa/Cocoa.h>  @interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>  @property
    (assign) IBOutlet NSWindow *window;  @end ```    In the last chapter, we control-dragged
    from one user interface object to another. This time, we’re going to control-drag
    from the nib to our code. In the nib Editor pane, click the label that we added
    to our window. Now, control-drag from the label to the `.h` file, dragging down
    to the blank line below the `@property` line, where a blue line will extend out
    in the text editor indicating Insert Outlet or Action, as shown in [Figure 4-10](#9781430245421_Ch04.xhtml#Fig10)*.*
    Let go of the mouse button, and a small pop-up window will appear where we can
    configure this new connection.    ![9781430245421_Fig04-10.jpg](images/9781430245421_Fig04-10.jpg)    [Figure
    4-10](#9781430245421_Ch04.xhtml#_Fig10). Control-dragging from a nib object into
    a code editor to connect an outlet or action    In this pop-up window, mark the
    connection as an Outlet, and set the name to be “label.” Leave the other fields
    at the default settings, and click Connect. Xcode will add a new line to the `.h`
    file that reads    ``` @property (weak) IBOutlet NSTextField *label; ```    The
    property declaration creates a new property named `label` as part of our class.'
