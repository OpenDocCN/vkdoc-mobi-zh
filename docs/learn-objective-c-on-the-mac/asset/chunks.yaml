  trans: '

    接下来，我们对 `NSTextView` 稍作配置，从视图中删除示例文本，并在*属性检查器*中取消勾选*可编辑*复选框。现在保存工作，然后在 Xcode 中点击**运行**。应用程序应该会启动，点击按钮后，它大约会运行十秒钟（所有睡眠时间的总和），然后显示结果。大约五六秒后，鼠标光标会变成旋转磁盘光标，并一直保持这种状态，直到工作完成。我们放在窗口中的
    `NSTextView` 会一直保持空白直到最后，尽管我们的代码偶尔会尝试更新其内容，因为需要重新绘制显示的主线程 “卡住” 了，正在执行我们所有的后台处理。此外，在整个过程中，应用程序的菜单以及窗口控件都毫无响应。实际上，除了通过
    Mac OS X 的*强制退出*窗口来杀死它之外，我们唯一能与应用程序交互的方式就是移动它的窗口，因为操作系统本身会处理这个操作。这正是我们想要避免的状况！在这个特定例子中，情况还不算太糟，因为应用程序似乎只挂起了几秒钟。然而，如果你的应用经常以这种方式出现“沙滩球”现象且持续时间更长，那么你将面临一些不满的用户——甚至可能成为前用户！


    ## 线程基础


    在我们开始实现解决方案之前，先来回顾一下并发处理中的一些基础知识。这远非对 OS X 线程或一般线程的完整描述。要了解完整信息，你需要查阅其他资料。我们只想解释足够的内容，让你理解本章中我们将要做的事情。


    在大多数现代操作系统中（当然包括 OS X），除了包含存储在磁盘上的程序运行实例的“进程”这个概念之外，还有“执行线程”这个概念。每个进程可以包含多个同时运行的线程。如果只有一个处理器核心，操作系统会在执行多个线程之间进行切换，就像它在执行多个进程之间进行切换一样。如果有多个可用核心，线程会像进程一样被分配到各个核心上。


    一个进程中的所有线程共享相同的可执行程序代码和相同的全局数据。每个线程也可以拥有一些专属于该线程的数据。线程可以利用一种称为 *mutex*（互斥锁的简称）或锁的特殊结构，它可以确保特定的代码块不会被多个线程同时运行。当多个线程同时访问同一数据时，这在确保正确结果方面非常有用：当一个线程正在更新某个值（在所谓的代码“临界区”内）时，它会锁定其他线程。例如，假设我们的应用程序实现了一个银行系统，其中账户余额可以作为交易的一部分进行修改。在多线程系统中，我们需要保护对账户余额进行加减操作的代码段，以消除两个线程同时修改它的可能性。否则，两个线程可能会几乎同时读取旧余额，然后两个线程又各自写回它们自己计算出的新余额，对另一个线程试图做出的更改毫不知情，从而导致最终状态不正确；最后设置值的线程是“赢家”，而另一个线程对余额的更改就这样丢失了。


    处理线程时的一个常见问题就是代码的*线程安全性*。有些软件库在编写时就考虑了并发性，它们的所有临界区都用互斥锁进行了恰当的保护。而有些代码库则没有。例如，在
    Cocoa 中，AppKit 框架（包含专门用于构建 GUI 应用程序的类，如 `NSApplication`、`NSView` 及其所有子类等）在很大程度上就*不是*线程安全的。


    这意味着，在运行中的 Cocoa 应用程序里，所有涉及任何 AppKit 对象的方法调用都应该在同一个线程内执行，这个线程通常被称为主线程。如果我们从另一个线程访问
    AppKit 对象，一切都无法保证；我们很可能会遇到看似无法解释的 bug。默认情况下，我们 Cocoa 应用程序的所有操作（例如处理由用户事件触发的操作）都发生在主线程上，因此对于简单的应用程序，我们无需担心这一点。用户触发的操作方法已经在主线程中运行。到本书目前这个阶段，我们的代码一直在主线程上运行，但这种状况即将改变。


    ## 工作单元


    刚才描述的线程模型的问题在于，对于普通程序员来说，编写无错误的多线程代码几乎是不可能的。这并非是对我们行业或普通程序员能力的批评；这只是一种观察结果。在跨多个线程同步数据和操作时，我们必须在代码中考虑到的复杂交互对于大多数人来说实在是难以应付。想象一下，只有
    5% 的人有能力编写软件。而这 5% 中只有一小部分人真正有能力承担编写重量级多线程应用程序的任务。即使是成功做到过的人，也常常会建议其他人不要效仿他们的做法！


    幸运的是，希望并未完全破灭。我们可以在不进行太多底层线程操作的情况下实现一些并发处理。就像我们能够不直接往显存中写入比特位就在屏幕上显示数据，以及不直接与磁盘控制器交互就能从磁盘读取数据一样，存在一些软件抽象，可以让我们在多个线程上运行代码，而无需我们直接对线程做太多工作。Apple
    鼓励我们使用的解决方案，其核心思想是将长时间运行的任务拆分成工作单元，并将这些单元放入队列中执行。系统为我们管理这些队列，并在多个线程上执行工作单元。我们不需要直接启动和管理后台线程，并且从通常涉及实现并发应用程序的许多“簿记”工作中解放出来。系统会为我们处理这些。


    ## 操作队列


    自 OS X 10.5 发布以来，Apple 为我们提供了两个类：`NSOperation` 和 `NSOperationQueue`，它们协同工作以提供操作队列。其思路是将我们的计算任务分解成块或工作单元，将每个单元封装到一个
    `NSOperation` 中，然后将每个操作放入一个 `NSOperationQueue`。我们还可以建立操作间的依赖关系，指定一个操作在另一个操作完成之前不会开始执行。然后
    `NSOperationQueue` 会尽其所能地处理这些单元，它会使用操作添加到队列的顺序以及我们指定的依赖关系来决定其执行计划。如果我们指定的依赖关系允许某些操作同时执行，并且有足够多的可用核心来运行它们，那么操作队列将使用多个线程来同时执行多个操作。


    ## 成为块专家


    使用 Apple 的并发 API（无论是通过 `NSOperationQueue` 还是 GCD）最直接的方法之一就是使用块（blocks）。块最初随 GCD
    一起发布，是 Apple 添加到 C 语言本身（并由此扩展到 Objective-C 和 C++）的一些新语法。这种新的语言特性，在其他一些语言中也被称为*闭包*，对于充分利用
    GCD 至关重要。块背后的思想是让特定的代码块能够像任何其他 C 语言类型一样被处理。

