- fmt: 'Frameworks can contain images, sounds, and movies. They can even contain other
    frameworks. Although OS X supports traditional Unix libraries, much of the functionality
    of the operating system, and nearly all of the functionality that makes OS X unique,
    is contained in these frameworks. There are literally dozens of frameworks that
    make up the core operating system, and these are generally grouped by function.


    **Tip** You can see the frameworks that make up Mac OS X by looking in the folder
    `/System/Library/Frameworks`. These frameworks should never, ever be touched,
    so look only, and then quietly back out of the folder so they don’t hear you.
    Frameworks can be nasty little buggers if you touch them. You can also see what
    third-party and optional frameworks have been installed in your system by looking
    in `/Library/Frameworks`. This is where the frameworks that are needed by programs
    you have installed on your Mac typically reside. Again, look, but don’t touch,
    or you could mess up something important. In fact, if you’re running Mountain
    Lion, the `/Library` directory is hidden by default in Finder.


    Although there are many frameworks, you’ll spend the vast majority of your programming
    time in Cocoa using objects from just a handful. In fact, most of the objects
    you’ll use come from a single framework called (surprise!) the Cocoa framework.


    Remember how we told you that frameworks can contain other frameworks? Well, the
    Cocoa framework is, in fact, just a wrapper around three other frameworks that
    hold the bulk of the functionality you will use when writing Cocoa applications:
    the Foundation framework, the AppKit framework, and the Core Data framework.


    You will periodically use functionality from other frameworks. For example, you
    might use the Core Animation framework to do some spiffy animation with your user
    interface, or you might use the Core Image framework to do some heavy-duty image
    manipulation. But the vast majority of the objects you will be using will be from
    the three frameworks that make up Cocoa. We’ll talk about the Core Data framework
    starting in [Chapter 7](#9781430245421_Ch07.xhtml), but let’s take a second to
    briefly look at the other two, which we’ll be working with in this chapter.


    ## The Foundation Framework


    The Foundation framework is aptly named. It holds the objects that pretty much
    everything else is built upon. The Foundation framework is shared between Cocoa
    and Cocoa Touch. Although the Foundation framework has evolved, many of the objects
    it contains have been around since the early days of NeXTStep, and their basic
    usage hasn’t changed all that much. Foundation contains objects such as `NSString`,
    which is the class used to represent text in Cocoa, as well as collection classes
    like `NSArray` and `NSDictionary`. You should already have some familiarity with
    the Foundation framework from having learned Objective-C.


    ## The AppKit Framework


    Look at your Mac’s screen. Pretty much everything you see there is the domain
    of AppKit, which is an abbreviation of “application kit.” This framework contains
    all the objects used to create or manage a user interface. There are objects that
    create buttons, windows, text fields, tab bars, and more. Any user-interface element
    that you’ve seen in more than one application is probably part of the AppKit framework.
    All that cool stuff you got for free in the last chapter? Yep, all AppKit. The
    app we’ll be building in this chapter is all AppKit, too.


    ## The Cocoa Way: Model–View–Controller


    Before diving in and seeing how to use these frameworks, we need to discuss a
    very important bit of theory. The designers of Cocoa were guided by a concept
    called model–view–controller (MVC), which is a very logical way of dividing the
    code that makes up a GUI application.


    These days, almost all object-oriented application frameworks pay a certain amount
    of homage to MVC, but there are few that are as true to the MVC model as Cocoa,
    or that have been using it as long.


    The MVC model divides up all functionality into the following three distinct categories:


    - *Model*: The classes that hold your application’s data.

    - *View*: The windows, controls, and other elements that the user can see and
    interact with.

    - *Controller*: The part that binds the model and view together and contains the
    application logic that determines how to handle the user’s inputs.


    The goal of MVC is to make the objects that implement these three types of code
    as distinct from one another as possible. Any object you write should be readily
    identifiable as belonging to one of the three categories, with little or no functionality
    within it that could be classified within either of the other two. An object that
    implements a button, for example, shouldn’t contain code to process data when
    that button is clicked, and code that implements a bank account shouldn’t contain
    code to draw a table to display its transactions.


    MVC helps ensure maximum reusability. A class that implements a generic button
    can be used in any application. A class that implements a button that does some
    particular calculation when it is clicked can only be used in the application
    for which it was originally written.


    When you write Cocoa applications, you will primarily create your view components
    using Interface Builder, although you will sometimes also modify your interface
    from code, or you might subclass existing view and control classes to create new
    ones.


    The model will be created using something called Core Data or crafting Objective-C
    classes to hold your application’s data. We won’t be creating any model objects
    in this chapter’s application because we’re not going to store any data yet, but
    we will introduce very simple model objects starting in the next chapter and will
    move on to full-fledged model objects when we start using Core Data in [Chapter
    8](#9781430245421_Ch08.xhtml).


    The controller component will typically comprise classes that we create and that
    are specific to our application. Controllers can be completely custom classes
    (`NSObject` subclasses), which was the traditional way of doing things in Cocoa.
    A few years ago, Apple began to introduce generic controller classes into the
    AppKit framework that handle certain basic tasks for us, such as handling an array
    of objects to be displayed in a list. These can be useful for minimizing boilerplate
    code.


    As we get deeper into Cocoa, you will quickly start to see how the classes of
    the AppKit framework follow the principles of MVC. If you keep this concept in
    the back of your head as you develop, you will create cleaner, more easily maintained
    code.


    ## Outlets, Actions, and Controllers


    Obviously, a user interface isn’t much use if you can’t get data in and out of
    it or change its appearance from code. In Cocoa, we use things called *outlets*
    and *actions* to interact with the user interfaces we design in Interface Builder.


    - Outlets are pointers to objects in our nib file. Outlets allow us to access
    objects in the nib from our code.

    - Actions are methods that can be executed directly as a result of user interaction,
    such as at the click of a button. They are the way the application objects respond
    to user input, regardless of whether the objects are framework classes or our
    own code.


    Outlets and actions are typically contained in the controller classes (although
    they are sometimes used elsewhere). In this chapter, we’ll be using outlets and
    actions that are exposed by two AppKit classes – `NSSlider` and `NSTextField`
    – to show how it’s done. In the next chapter, we’ll be writing our own.


    ### Outlets


    Outlets are Objective-C instance variables that are declared using a special keyword:
    `IBOutlet`.'
