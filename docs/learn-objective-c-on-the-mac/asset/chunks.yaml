  trans: "\n# Cocotron\n\nCocotron 的关注点略有不同（它试图紧跟苹果所有最新的类和 API 变更），其部署目标也不同（它主要关注\
    \ Windows 而非 Unix）。不过，如果你想把应用移植到 Windows 上，它也值得考虑。此外，它的许可证比 GNUstep 更为宽松，这意味着你可以自由地将\
    \ Cocotron 集成到你自己的闭源应用中。Cocotron 的官方网站 `www.cocotron.org` 似乎已近乎停摆，但一些开发工作仍在进行，这从该项目\
    \ Google 群组 (`http://groups.google.com/group/cocotron-dev/`) 的讨论中可见一斑。\n\n# Cappuccino/Objective-J\n\
    \n过去几年中另一个有趣的发展是 Cappuccino 开发环境。与我们提到的其他环境不同，Cappuccino 专注于开发 Web 应用，而非桌面应用。因此，Cappuccino\
    \ 应用不是在桌面上运行，而是托管在 Web 服务器上，在 Web 浏览器中运行。Cappuccino 开发的核心是让软件在客户端运行，使用在单个 HTML\
    \ 页面上下文中执行的 JavaScript，而不是像传统 Web 开发框架那样，逐页地提供内容。\n\nCappuccino 包含的类库在名称和功能上模仿了\
    \ Foundation 和 AppKit 的许多特性，甚至还能神奇地在 JavaScript 中实现 Objective-C 的大部分语法，正如我们在提到\
    \ JSCocoa 时描述的那样。使用 Cappuccino 创建的应用可以发布到任何 Web 服务器上，并在任何现代浏览器中运行，就像其他任何 Web 应用一样。这种在\
    \ JavaScript 中实现 Objective-C 的方式被称为 Objective-J，它是使 Cappuccino 运转起来的关键部分。\n\n\
    Cappuccino 最初是一个奇怪的混合体，其核心是包含 JavaScript 框架的开源代码，以及一个原本打算作为商业 IDE 的名为 Atlas 的工具（它本身就是一个\
    \ Cappuccino 应用）。然而，这个创意背后的公司在其 Atlas 发布之前就被收购了。如今，这个开源项目已经扩展，包含了让你可以直接在 Xcode\
    \ 的 Interface Builder 中为你的 Cappuccino 应用构建 GUI 的工具。请访问 `www.cappuccino-project.org`\
    \ 了解最新动态。\n\n# 一切终章\n\n至此，我们结束了对你在提升 Cocoa 技能时可以采取的后续路径的讨论；同时也结束了本书。我们希望本书带你到达了你想要去的地方，但请不要认为这个终点就是最终目的地！请访问\
    \ *Learn Cocoa on the Mac* 网站，在那里你会找到与其他 Cocoa 开发者讨论的论坛、本书所有示例的源代码等等。另外，请务必访问我们的网站\
    \ `http://learncocoa.org`，我们将竭尽全力帮助你学到更多知识！\n\n# 索引\n\n![image](img/square1.jpg)\
