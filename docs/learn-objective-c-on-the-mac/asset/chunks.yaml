    10-6](#9781430245421_Ch10.xhtml#_Fig6). QuoteMonger’s predicate editor in action    Both
    `NSPredicateEditor` and `NSArrayController` can set and retrieve the value of
    their `NSPredicate` via a binding, so what we’ll do is add an `NSPredicate` as
    a property of the app delegate and make the appropriate bindings. Then, when the
    user makes any changes in the predicate editor, the updated predicate will automatically
    be passed along to the array controller.    Adding a Predicate to the App Delegate    Start
    by adding a new property to the app delegate. Open the `QMAppDelegate.h` file,
    which looks just like the default app delegate header that was generated for MythBase.
    Add a new property called `searchPredicate`. The interface declaration should
    now look something like this (new lines are in bold):    ``` @interface QMAppDelegate
    : NSObject <NSApplicationDelegate>  @property (assign) IBOutlet NSWindow *window;  @property
    (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;
    @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;
    @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;  @property
    (strong) NSPredicate *searchPredicate;  - (IBAction)saveAction:(id)sender;  @end
    ```    Now switch over to `QMAppDelegate.m` and add the following code near the
    top, just after the `@synthesize` directives generated by Xcode. The new lines
    are in bold.    ``` @implementation QMAppDelegate  @synthesize persistentStoreCoordinator
    = _persistentStoreCoordinator; @synthesize managedObjectModel = _managedObjectModel;
    @synthesize managedObjectContext = _managedObjectContext;  #define DEFAULT_PREDICATE
    @"(quoteText CONTAINS[cd] ''space'') OR " \                            "(character
    CONTAINS[cd] ''Knight'')"  - (id)init {     if ((self = [super init])) {         self.searchPredicate
    = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];     }     return self;
    } ```    The `init` method simply creates a default value for the `searchPredicate`
    property. Now let’s hook up our controller to use this new predicate. Go back
    to the Interface Builder canvas, select the FoundQuotes controller, and bring
    up the *Attributes Inspector*. Select all the text in the *Fetch Predicate* text
    view and delete it, then switch to the *Bindings Inspector*. In the *Controller
    Content Parameters* section, open the *Filter Predicate* binding info. Select
    App Delegate in the pop-up, type “searchPredicate” into the *Model Key Path* combo
    box, and press Return to turn on the binding.    Save the work, go back to Xcode,
    and click Run. You should now see a different set of results: quotes spoken by
    a character named “Knight” or containing the word “space.” If nothing is matching,
    add a quote with one of these characteristics in order to test out the search
    window.'
  trans: "\n```objectivec\n在最基本的形式中，我们可以这样定义一个 `NSPredicate`：\n```\nNSPredicate *p\
    \ = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd] 'missed')\
    \ OR \"\n     \"(character CONTAINS[cd] 'kramer') OR \"\n     \"(show.name CONTAINS[cd]\
    \ 'trek')\"];\n```\n\n**注意：** 在 C 语言中，如果代码中有多个内联字符串常量且它们之间仅由空格（包括回车符）分隔，这些常量会被拼接成一个字符数组，这有助于在代码中格式化长字符串。这一技巧同样适用于内联的\
    \ `NSString` 常量——只需在第一个字符串前加上一个 `@` 符号即可，如前所示。\n\n在这个示例中，我们实际上是通过 `OR` 连接了三个条件，并用括号将它们包裹起来，就像在应用程序代码中那样。每个条件都使用了\
    \ `CONTAINS` 比较器（其功能正如你所想），并带有所述的 `[cd]` 选项。其中 `c` 使比较不区分大小写，而 `d` 使比较不区分变音符号。例如，指定了这两个选项的相等比较会将\
    \ “ramon” 和 “Ramón” 视为相等。\n\n`CONTAINS` 只是谓词中可用的几个比较器之一。所有属性都可以使用 `=`、`<`、`>`、`>=`、`<=`、`!=`\
    \ 和 `BETWEEN` 比较器。（注意，`==`、`=>`、`=<` 和 `<>` 分别等同于 `=`、`>=`、`<=` 和 `!=`。）字符串属性可以使用\
    \ `BEGINSWITH`、`CONTAINS`、`ENDSWITH`、`LIKE` 和 `MATCHES` 比较器。\n\n**注意：** 这些比较器大多不言自明，但有几点需要特别说明：`BETWEEN`\
    \ 允许我们指定一对上下限，因此其右侧的值应通过一个包含两个元素的 `NSArray` 来替换；`LIKE` 允许我们进行通配符匹配；`MATCHES` 允许我们使用正则表达式进行高级比较。然而，`MATCHES`\
    \ 不能与 SQLite 后端一起使用，因此在从 Core Data 存储中获取数据时作用不大。\n\n如果我们在应用程序中确实需要针对某些特殊目的进行固定查询，硬编码选项是可以的，但有时我们需要根据用户输入或其他当前数据创建查询。幸运的是，`NSPredicate`\
    \ 类提供了一种简单的方法，使用我们刚才看到的同一个 `predicateWithFormat:` 方法来插入值。例如，\n\n```\n// 假设这些变量已存在，并指向有效对象\n\
    NSString *quoteInput;\nNSString *characterInput;\nNSString *showNameInput;\nNSPredicate\
    \ *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd] %@) OR\
    \ \"\n     \"(character CONTAINS[cd] %@) OR \"\n     \"(show.name CONTAINS[cd]\
    \ %@)\",\n    quoteInput, characterInput, showNameInput];\n```\n\n当这段代码运行时，三个变量的值将被放入最终的谓词中。请注意，格式字符串中的\
    \ `%@` 占位符没有用单引号括起来，而之前的示例中直接的值是用了单引号的。\n\n**在 Xcode 中为 `NSAppController` 指定谓词**\n\
    \n让我们尝试一种最基本的使用谓词的方法：在 Xcode 中将其直接附加到一个控制器。回到 Xcode 中的 `MainMenu.xib` 文件，在主要 Nib\
    \ 窗口中选择 FoundQuotes 控制器，并打开*属性检查器*。底部有一个标记为“获取谓词”的文本视图，我们可以在其中添加一些文本来定义谓词。尝试输入以下内容：\n\
    \n```\nshow.name CONTAINS[cd] 'trek'\n```\n\n然后保存更改，切换回 Xcode，并点击运行。现在搜索窗口不一定显示您输入的所有引用。如果您输入了一些《星际迷航》的引用，它将只显示那些引用；但如果您没有输入任何《星际迷航》的引用，那么现在搜索窗口中什么都不会显示。当然，您可能只输入了《星际迷航》的引用，这种情况下，这个视图看起来和之前一样。\n\
    \n如果是这种情况，请从另一个节目输入一些引用来验证谓词是否正在过滤它们（同时，也确实，电视节目不止《星际迷航》）。\n\n**用户定义的谓词**\n\n\
    在 Nib 中定义的谓词适用于特殊用途，例如 GUI 的某个部分应始终显示数据的特定子集，但我们追求的是让用户自己定义搜索参数的能力。理想情况下，他们应该能够选择多个搜索参数，编辑要比较的值，甚至更改比较器本身（而不是一直只使用\
    \ `CONTAINS`）。幸运的是，Cocoa 提供了一个名为 `NSPredicateEditor` 的 GUI 控件，正好能实现这一点！\n\n正如我们之前暗示的，通过\
    \ `NSPredicateEditor`，我们可以制作一个类似于 iTunes 中的智能播放列表或 Mail 中的智能邮箱功能的 GUI。用户可以添加和删除搜索条件，结果将实时更新。参见图\
    \ 10-6。\n\n![9781430245421_Fig10-06.jpg](img/9781430245421_Fig10-06.jpg)\n\n图\
    \ 10-6. QuoteMonger 的谓词编辑器运行中\n\n`NSPredicateEditor` 和 `NSArrayController` 都可以通过绑定来设置和检索其\
    \ `NSPredicate` 的值，因此我们要做的是将一个 `NSPredicate` 作为应用代理的一个属性，并进行适当的绑定。这样，当用户在谓词编辑器中进行任何更改时，更新后的谓词会自动传递给数组控制器。\n\
    \n**向应用代理添加谓词**\n\n首先，向应用代理添加一个新属性。打开 `QMAppDelegate.h` 文件，该文件看起来就像为 MythBase\
    \ 生成的默认应用代理头文件。添加一个名为 `searchPredicate` 的新属性。接口声明现在应如下所示（新行以粗体显示）：\n\n```\n@interface\
    \ QMAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n\n@property (strong) NSPredicate *searchPredicate;\n\
    \n- (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n现在切换到 `QMAppDelegate.m`，并在靠近顶部、紧跟在\
    \ Xcode 生成的 `@synthesize` 指令之后添加以下代码。新行以粗体显示。\n\n```\n@implementation QMAppDelegate\n\
    \n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize\
    \ managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd]\
    \ 'space') OR \" \\\n                           \"(character CONTAINS[cd] 'Knight')\"\
    \n\n- (id)init {\n    if ((self = [super init])) {\n        self.searchPredicate\
    \ = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];\n    }\n    return self;\n\
    }\n```\n\n`init` 方法仅为 `searchPredicate` 属性创建了一个默认值。现在让我们连接我们的控制器以使用这个新的谓词。回到 Interface\
    \ Builder 画布，选择 FoundQuotes 控制器，并打开*属性检查器*。选中*获取谓词*文本视图中的所有文本并删除，然后切换到*绑定检查器*。在*控制器内容参数*部分，打开*过滤谓词*绑定信息。在弹出的菜单中选择\
    \ App Delegate，在*模型键路径*组合框中输入 “searchPredicate”，然后按 Return 键来启用绑定。\n\n保存工作，回到\
    \ Xcode，并点击运行。您现在应该会看到一组不同的结果：由名为 “Knight” 的角色说出的引用，或包含单词 “space” 的引用。如果没有匹配项，则添加一个具有这些特征之一的引用来测试搜索窗口。\n\
    ```"
- fmt: "# Add a Predicate Editor to the Search Window\n\nWe now have the `FoundQuotes`\
    \ controller fetching values based on the contents of a predicate that is “owned”\
    \ by the app delegate. The next step is to add an `NSPredicateEditor` to the search\
    \ window and configure it to let the user edit the predicate.\n\nIn Xcode, bring\
    \ up the Quote Finder window. Make the whole window a bit taller, and drag the\
    \ existing table view and text view down to the bottom. Then find an `NSPredicateEditor`\
    \ in the *Object Library*, drag it into the empty space at the top of the window,\
    \ and resize it to make it fill the available space. [Figure 10-7](#9781430245421_Ch10.xhtml#Fig7)\
    \ shows the idea.\n\n![9781430245421_Fig10-07.jpg](images/9781430245421_Fig10-07.jpg)\n\
    \n[Figure 10-7](#9781430245421_Ch10.xhtml#_Fig7). The predicate editor is in place\
    \ in our Search window\n\n## Configuring the Predicate Editor\n\nNow it’s time\
    \ to bind the editor to the app delegate’s predicate instance. Select the `NSPredicateEditor`\
    \ (don’t forget the extra click to select the editor itself, not the scroll view\
    \ that contains it), open the *Bindings Inspector*, and then examine the *Value*\
    \ binding info. Select App Delegate in the pop-up, then type in “searchPredicate”\
    \ in the *Model Key Path* combo box, and press Return to activate this binding.\n\
    \nAt this point, there’s only one more thing we need to do in order to enable\
    \ searching with this predicate editor: we have to tailor it to the attributes\
    \ we want to search on. `NSPredicateEditor` is a quite complex control, and fortunately\
    \ most of its interesting features can be configured directly in Xcode. The predicate\
    \ editor displays one or more `NSPredicateEditorRowTemplate` objects, which can\
    \ each be configured to do searching in a variety of ways. We can make row templates\
    \ that allow us to specify numbers or dates to compare against object values,\
    \ or to pick from a list of predefined strings. In our case, we’re going to configure\
    \ a row template that lets the user type a string in a text field to search by\
    \ character names, show names, and quote contents. This row template can be reused,\
    \ allowing the user to specify multiple search criteria simultaneously. In addition,\
    \ another row template will let the user choose whether the search criteria must\
    \ all be met (Boolean `AND`) or whether it’s enough that any match succeeds (Boolean\
    \ `OR`) for a quote to appear in the results.\n\nIn the Interface Builder canvas,\
    \ drill down into the predicate editor by clicking on the lower of the two visible\
    \ rows (the one containing pop-up buttons showing name and contains). With that\
    \ row template selected, bring up the *Attributes Inspector*. Note the checkboxes\
    \ that let us choose which comparators we’ll allow the user to use, plus the pop-up\
    \ buttons that let us choose the nature of the expressions used on either side\
    \ of the comparator (key paths, strings, constant values, and the like). The default\
    \ setup, with key paths on the left and strings on the right, is perfect for our\
    \ purposes, but we do need to adjust the key paths for our searching needs.\n\n\
    Edit the three default values that are listed below *Left Exprs* key paths, changing\
    \ them to `quoteText`, `character`, and `show.name`. Next, click to turn on the\
    \ *Case Insensitive* and *Diacritical Mark Insensitive* checkboxes (see [Figure\
    \ 10-8](#9781430245421_Ch10.xhtml#Fig8)).\n\n![9781430245421_Fig10-08.jpg](images/9781430245421_Fig10-08.jpg)\n\
    \n[Figure 10-8](#9781430245421_Ch10.xhtml#_Fig8). Configuring an `NSPredicateEditorRowTemplate`\n\
    \nThen, examine the pop-up button in the row template itself. This will show three\
    \ entries with names the same as what we just entered for key paths. Change these\
    \ to more human-readable names: “Quotation,” “Character Name,” and “Show Name.”\n\
    \nNow click the upper row template, the one showing “Any of the following are\
    \ true.” The configuration for this is very simple. Checkboxes let us choose to\
    \ allow Boolean `AND`, `OR`, and `NOT` for the user to search on.\n\nEnable all\
    \ of those to allow the most utility.\n\nNow there’s just one more piece of configuration\
    \ that we need to do. By default, `NSPredicateEditor` lets the user delete all\
    \ the rows, right down to the last one, at which point there is no longer a +\
    \ button to add any back in. Change this by selecting the predicate editor itself\
    \ (not one of the row templates) and clicking to turn off the *Can Remove All\
    \ Rows* checkbox in the *Attributes Inspector*.\n\nSave the work, hit Run in Xcode,\
    \ and bask in the glory of QuoteMonger! We can now easily search through all saved\
    \ quotes, using the three criteria we configured in the predicate editor.\n\n\
    ## Saving a Predicate\n\nBefore we call it a day, let’s add one final bit of polish\
    \ that will make using QuoteMonger a friendly experience for our users. Right\
    \ now, each time a user launches the app, it starts up with our silly default\
    \ query. Wouldn’t it be nice if it instead showed the last query from the previous\
    \ time it was running? It turns out that this is a piece of cake. `NSPredicate`\
    \ has a handy method called `predicateFormat` that returns the predicate’s value\
    \ in the form of a string. So, we can save the current `searchPredicate`’s string\
    \ representation using `NSUserDefaults` when the user quits the app and check\
    \ for a saved string when the app launches. Open up `QMAppDelegate.m`, and make\
    \ the following changes to the first part of its implementation (just add all\
    \ the lines that appear in bold):\n\n```\n#import \"QMAppDelegate.h\"\n\n@implementation\
    \ QMAppDelegate\n\n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n\
    @synthesize managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd]\
    \ 'missed') OR \" \\\n                           \"(character CONTAINS[cd] 'kramer')\"\
    \n#define STORED_PREDICATE_KEY @\"storedPredicateFormat\"\n\n- init {\n  if ((self\
    \ = [super init])) {\n    NSString *format = [[NSUserDefaults standardUserDefaults]\n\
    \        objectForKey:STORED_PREDICATE_KEY];\n    if (format)\n      self.searchPredicate\
    \ = [NSPredicate predicateWithFormat: format];\n    else\n      self.searchPredicate\
    \ = [NSPredicate predicateWithFormat: DEFAULT_PREDICATE];\n  }\n  return self;\n\
    }\n\n- (void)applicationWillTerminate:(NSNotification *)aNotification {\n  NSString\
    \ *format = [self.searchPredicate predicateFormat];\n  [[NSUserDefaults standardUserDefaults]\
    \ setObject:format forKey:STORED_PREDICATE_KEY];\n}\n```\n\nWe start by defining\
    \ a string, which will be used as a key to store and retrieve the predicate from\
    \ the user’s preferences using `NSUserDefaults`. Then, we enhance the `init` method\
    \ to look for a stored predicate. It first checks to see if a stored predicate\
    \ string exists, and if it does, it populates the `searchPredicate` instance variable\
    \ with a new predicate created from the format string. If there is no stored predicate,\
    \ the default predicate is created instead.\n\nFinally, we implement the `applicationWillTerminate:`\
    \ method. This method is called automatically when the user quits the application,\
    \ giving us a chance to do some final cleanup. Here, we convert the current search\
    \ parameters (maintained in the `searchPredicate` instance variable) into a string,\
    \ and save that string into the user’s preferences so that the same search will\
    \ pop up the next time the user runs the app.\n\nSave, run, and then modify the\
    \ search terms. Quit the app and run it again, and the previous search terms show\
    \ up again.\n\n## Wrap Up\n\nThis chapter showed the basics of how to use `NSPredicate`\
    \ to narrow down a Core Data result set. We saw how an `NSPredicate` can be constructed\
    \ in code, or in Xcode, or by user interaction with `NSPredicateEditor`. We even\
    \ got a hint of how these predicates can be saved for later use, much like iTunes\
    \ and Mail do with smart playlists and smart folders. These techniques can help\
    \ you easily bring new levels of functionality to your own apps.\n\n[Chapters\
    \ 8](#9781430245421_Ch08."
