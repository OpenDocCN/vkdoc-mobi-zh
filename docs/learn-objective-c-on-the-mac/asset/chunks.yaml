    this in your travels:    ``` [self.label setStringValue:[NSString stringWithFormat:@"%@
    button pressed.",   [sender title]]]; ```    This one line of code will function
    exactly the same as the three lines of code that make up our `buttonPressed:`
    method. For the sake of clarity, we won’t generally nest Objective-C messages
    so deeply in the code examples in this book, with the exception of calls to `alloc`
    and `init`, which, by longstanding convention, are almost always nested.    In
    the previous chapter, we used the Simulate Document command to work with the controls
    and connections that we’d set up. It worked in that chapter because we had no
    code. This time, we’ve got some code, so we need to actually compile and link
    the app. Click the Run button in the upper left-hand corner of the Xcode window,
    or press ![images](images/arrow3.jpg)R.


    If this is the first time you’ve tried to run custom code, you may get a window
    asking if you want to enable developer mode on this Mac. Go ahead and click that
    you want to enable it; you’ll be prompted for your password as a security measure.
    Your code should compile cleanly, and then you’ll see the Press a Button window.
    If you click the Left button, the label should update to read “Left button pressed.”
    If you click the center or right buttons, nothing will happen, because you haven’t
    wired those buttons up yet. We’ll do that in a moment, but for now, note that
    you’ve got a live Cocoa app running with your own code in it!    Quit the app
    and you should be returned to Xcode, right where you left it. You should still
    have the nib Editor pane open on one side of the window, and the Assistant Editor
    open to your `.m` file. We’re going to set up the connections between the Center
    and Right buttons and the `buttonPressed:` action. As it happens, we can make
    the connection to an existing action either the `.h` or the `.m` file.    Select
    the Center button in the nib, and control-drag to the `buttonPressed:` method
    in either the `.h` or the `.m` file. When the pointer reaches a valid action,
    the action will highlight in a blue outline and a small window will appear saying
    “Connect Action.” Let go, and the connection is in place. Do the same with the
    Right button.    As before, click the Run button in the upper left-hand corner
    of the Xcode window, and the app will compile and launch. This time, clicking
    any of the three buttons will update the label. The one action method handles
    all three buttons appropriately. Move the window to a new location and quit the
    application. Press ![images](images/arrow3.jpg)R to launch the program again,
    and the window should come up in exactly the same position it was in when we quit
    the program. If we click the yellow Minimize button in the title, the window will
    shrink down into our dock (click it in the dock to maximize it), and if we click
    ![images](images/arrow3.jpg)W or click the red close button in the window, the
    window will close. Unfortunately, the application is still running, but there’s
    no way to get the window back open. Let’s address that now by configuring our
    application to quit when the window is closed. To do this, we’ll have to use something
    called the *application delegate*.    The Application Delegate    Every Cocoa
    application has one and only one instance of a class called `NSApplication`. We
    don’t need to interact with `NSApplication` directly very much. It’s created for
    us and handles the event loop (the part of our application that notices user input
    from the mouse and keyboard, and handles the input by sending messages to the
    appropriate objects) and most of the lower-level stuff without us having to give
    it much thought.    Expand the Supporting Files folder in the Project Navigator
    pane, and single-click `main.m`. In that file is our application’s `main()` function,  which
    is the function that gets called when our application is launched. This function
    contains only one line of code, which calls a function named `NSApplicationMain()`.
    That function, which is part of Cocoa, automatically creates an instance of `NSApplication`
    for us. That instance of `NSApplication` goes into a loop and continuously polls
    for events from the keyboard, mouse, operating system, and other applications,
    and then responds to those events (don’t worry about the specifics for now; we’ll
    learn more about events later in the book). When it detects an event that signifies
    that the application should quit, the event loop stops and the application’s execution
    ends.    `NSApplication` allows us to specify an optional object to act as its
    delegate. Simply put, a delegate is a class that handles certain tasks on behalf
    of another class.'
  trans: "\n# 声明中包含 `IBOutlet` 关键字\n\n该声明还包含 `IBOutlet` 关键字，这将使 Xcode 能够找到我们的插座，并使其在\
    \ Interface Builder 中可用。Xcode 还在类实现中添加了一行代码，我们可以通过点击跳转栏中的文件名并选择 `ButtonsAppDelegate.m`\
    \ 来查看。此文件现在看起来如下：\n\n```objc\n#import \"ButtonsAppDelegate.h\"\n\n@implementation\
    \ ButtonsAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // Insert code here to initialize your application\n\
    }\n\n@end\n```\n\n根据你的 Xcode 版本，你可能还会看到一行代码为 `@synthesize label`。如果你确实看到了，它指示编译器为\
    \ `label` 属性生成 getter 和 setter 方法。最新版本的 Xcode 不会生成这一行，因为编译器现在可以自动推断何时需要生成属性的 getter\
    \ 和 setter 方法，但你会在此前的代码中看到它，包括苹果的许多示例代码项目中。无论你是否看到它，由于我们将这个插座连接到了窗口中的标签上，当 nib\
    \ 文件被加载时，`label` 属性将自动连接到标签 `NSTextField` 对象。\n\n## 实现动作方法\n\n我们将执行相同的操作来在我们的类中创建一个动作。在可以尝试运行程序之前，剩下的唯一任务是实际编写当按钮被点击时将被调用的代码，我们现在就来完成它。这段代码将检查\
    \ sender 参数以确定被点击按钮的标题，使用该标题创建一个字符串，然后使用我们的标签插座来显示该字符串。\n\n在跳转栏中，选择显示 `ButtonsAppDelegate.h`。接着，选择我们命名为“Left”的按钮。按住\
    \ Control 键从 Left 按钮拖拽到代码中，拖到我们之前创建的 `@property` 那一行下方。这次，选择连接类型为 Action。将动作命名为\
    \ `buttonPressed:`，其余字段保留默认值。当我们点击 Connect 时，Xcode 将为我们创建一个遵循动作约定的新实例方法。与我们添加的属性一样，当\
    \ nib 文件被加载时，它也将自动连接。\n\n如果我们切换回 `.m` 文件，会看到一个看起来如下的新空方法：\n\n```objc\n- (IBAction)buttonPressed:(id)sender\
    \ { }\n```\n\n我们将用代码填充这个方法，以在标签中显示按下了哪个按钮。将以下代码输入到方法体中：\n\n```objc\n- (IBAction)buttonPressed:(id)sender\
    \ {\n    NSString *title = [sender title];\n    NSString *labelText = [NSString\
    \ stringWithFormat:@\"%@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n\
    }\n```\n\n该方法首先获取调用它的按钮的标题。然后它使用该标题创建一个新字符串，接着使用该字符串来更新标签。该方法使用*点表示法*来访问属性，这只是表示\
    \ `[self label]` 的简写形式。\n\n### 嵌套消息\n\n一些 Objective-C 开发者会深度嵌套他们的消息调用。你在编程过程中可能会遇到如下代码：\n\
    \n```objc\n[self.label setStringValue:[NSString stringWithFormat:@\"%@ button\
    \ pressed.\",\n  [sender title]]];\n```\n\n这一行代码的功能与我们 `buttonPressed:` 方法中的三行代码完全相同。为了清晰起见，在本书的代码示例中，我们通常不会将\
    \ Objective-C 消息嵌套得这么深，但 `alloc` 和 `init` 的调用除外，按照长期以来的惯例，它们几乎总是被嵌套使用。\n\n## 运行应用\n\
    \n在上一章中，我们使用了“模拟文档”命令来操作我们设置好的控件和连接。那一章之所以能成功，是因为我们没有代码。这次我们有一些代码，所以需要实际编译和链接应用。点击\
    \ Xcode 窗口左上角的 Run 按钮，或按下![images](img/arrow3.jpg)R。\n\n如果这是你第一次尝试运行自定义代码，可能会弹出一个窗口，询问你是否要在本\
    \ Mac 上启用开发者模式。继续点击确认启用；出于安全考虑，系统会提示你输入密码。你的代码应该能干净地编译，然后你会看到“按下一个按钮”窗口。如果你点击\
    \ Left 按钮，标签应更新显示“Left button pressed.”。如果你点击中间或右边的按钮，什么都不会发生，因为你还没有连接这些按钮。我们稍后会处理，但现在请注意，你已经让一个包含你自定义代码的\
    \ Cocoa 应用运行起来了！\n\n退出应用，你应该会回到 Xcode，保持原样。你应该仍能在窗口一侧看到 nib 编辑器面板，另一侧是 Assistant\
    \ 编辑器并打开 `.m` 文件。我们将设置 Center 和 Right 按钮与 `buttonPressed:` 动作之间的连接。实际上，我们可以通过\
    \ `.h` 或 `.m` 文件将连接建立到现有动作上。\n\n在 nib 中选择 Center 按钮，然后按住 Control 键拖拽到 `.h` 或 `.m`\
    \ 文件中的 `buttonPressed:` 方法上。当指针到达有效动作时，动作会以蓝色轮廓高亮显示，并出现一个小窗口显示“Connect Action”。松开鼠标，连接就建立好了。对\
    \ Right 按钮执行相同操作。\n\n和之前一样，点击 Xcode 窗口左上角的 Run 按钮，应用将编译并启动。这次，点击三个按钮中的任何一个都会更新标签。这一个动作方法就能妥善处理所有三个按钮。将窗口移动到新位置，然后退出应用。按下![images](img/arrow3.jpg)R\
    \ 再次启动程序，窗口应该会出现在我们退出程序时完全相同的位置。如果我们点击标题栏中的黄色最小化按钮，窗口将缩小到我们的 Dock 中（在 Dock 中点击它以最大化窗口），如果我们按下![images](img/arrow3.jpg)W\
    \ 或点击窗口中的红色关闭按钮，窗口将关闭。遗憾的是，应用仍在运行，但无法重新打开窗口。现在让我们通过配置应用在窗口关闭时退出来解决这个问题。为此，我们将需要使用一个名为*应用委托*的对象。\n\
    \n## 应用委托\n\n每个 Cocoa 应用有且只有一个 `NSApplication` 类的实例。我们不需要过多地与 `NSApplication`\
    \ 直接交互。它是由系统为我们创建的，并处理事件循环（应用中负责监听来自鼠标和键盘的用户输入，并通过发送消息将输入传递给适当对象的部分）以及大部分底层细节，我们无需过多操心。\n\
    \n展开项目导航器窗格中的 Supporting Files 文件夹，单击 `main.m`。在该文件中是我们的应用的 `main()` 函数，这是应用启动时被调用的函数。该函数只包含一行代码，它调用了一个名为\
    \ `NSApplicationMain()` 的函数。这个 Cocoa 框架中的函数会自动为我们创建一个 `NSApplication` 的实例。该 `NSApplication`\
    \ 实例进入一个循环，持续轮询来自键盘、鼠标、操作系统和其他应用的事件，然后响应这些事件（现在不必担心具体细节；我们将在本书后面学习更多关于事件的知识）。当它检测到表示应用应退出的事件时，事件循环停止，应用的执行结束。\n\
    \n`NSApplication` 允许我们指定一个可选对象作为其委托。简而言之，委托是一个代表另一个类处理特定任务的类。\n"
- fmt: "# Application Delegate and GUI Components\n\n## The Application Delegate\n\
    \nThe application delegate allows our application to take actions at certain points\
    \ in the lifecycle of the application so that we can avoid the messiness of having\
    \ to subclass `NSApplication`. The application delegate can be any instance of\
    \ any class, but only one object can be the application delegate. Nearly every\
    \ application will need an application delegate object. Because this is a common\
    \ pattern, the `ButtonsAppDelegate` class that was created for us is already configured\
    \ in the nib file to be the application delegate. The `ButtonsAppDelegate` class\
    \ declaration in the `ButtonsAppDelegate.h` file declares that the class implements\
    \ the `NSApplicationDelegate` protocol.\n\n### Configuring the Application to\
    \ Quit on Window Close\n\nSingle-click `ButtonsAppDelegate.m` and add a method\
    \ named `applicationShouldTerminateAfterLastWindowClosed:`, as shown in bold below:\n\
    \n```objc\n#import \"ButtonsAppDelegate.h\"\n\n@implementation ButtonsAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n  \
    \  // Insert code here to initialize your application\n}\n\n- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication\
    \ *)sender {\n    return YES;\n}\n\n- (IBAction)buttonPressed:(id)sender {\n \
    \   NSString *title = [sender title];\n    NSString *labelText = [NSString stringWithFormat:@\"\
    %@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n}\n\
    @end\n```\n\nThis new method is one of those special application delegate methods.\
    \ At certain predefined times during the application’s run, `NSApplication` will\
    \ look to see if its delegate has implemented a particular method. If the delegate\
    \ has, `NSApplication` will call that method. This method we just implemented\
    \ exists to let us change the behavior of `NSApplication` without subclassing\
    \ it. The default behavior is for `NSApplication` to keep running until it is\
    \ specifically told to quit, even if there are no windows open. It is acceptable\
    \ for applications to quit when their last (or only) window is closed, however,\
    \ and this method is provided specifically to let the delegate alter this behavior.\n\
    \nRun the application again, and close the application’s main window when it comes\
    \ up. The application should now quit because the application’s only window has\
    \ been closed.\n\n### Using the Documentation Browser\n\nSo how do we know what\
    \ these application delegate methods are? It’s hard to implement methods if we\
    \ don’t know what they are. Fortunately, they’re generally easy to find. If you\
    \ look at the method we just added, it takes one argument, which is a pointer\
    \ to the `NSApplication` instance that called the method. Hold down the Option\
    \ key and double-click the word `NSApplication` in the Editing pane. This will\
    \ open up the Documentation Browser to the definition of the word we just clicked,\
    \ which is `NSApplication` ([Figure 4-11](#9781430245421_Ch04.xhtml#Fig11)).\n\
    \n![9781430245421_Fig04-11.jpg](images/9781430245421_Fig04-11.jpg)\n\n[Figure\
    \ 4-11](#9781430245421_Ch04.xhtml#_Fig11). The Documentation Browser in Xcode,\
    \ showing the NSApplication Class Reference\n\nHowever, in this case, we won’t\
    \ find the delegate methods for `NSApplication` documented in this file. Beginning\
    \ in OS X 10.6, Apple began refactoring delegate methods into separate protocols\
    \ and moved the documentation about these methods into the documentation about\
    \ the protocol. Many Cocoa classes have associated delegate protocols—`NSApplication`,\
    \ `NSBrowser`, `NSToolbar`, `NSWindow`, to name a few. When reading the documentation\
    \ on a class, it’s important to also look for an associated delegate protocol\
    \ with the same name: the delegate protocol for `NSApplication` is named `NSApplicationDelegate`.\n\
    \nTo browse the documentation tree, right-click in the NSApplication Class Reference\
    \ document, and select Reveal in Library. This will show the documentation tree,\
    \ with `NSApplication` selected.\n\nBelow the NSApplication Class Reference is\
    \ the NSApplicationDelegate Protocol Reference, which has the documentation we’re\
    \ looking for.\n\nIt’s worth your time to spend a few minutes looking over the\
    \ application delegate methods so you’ll know what’s there. The Documentation\
    \ Browser is your friend. You’re going to spend a lot of time in here as you learn\
    \ Cocoa, so get comfortable with it. There’s also a more compact way to view documentation.\
    \ Option-clicking a class or method name will bring up a small documentation pop-up\
    \ that gives you a brief summary of what you clicked on plus links to related\
    \ documentation. Altogether, the documentation contained within Xcode is the ultimate\
    \ encyclopedic reference to Cocoa, Xcode, and all other Apple development technologies.\
    \ RTFM! You’ll be glad you did.\n\n### Wrap Up\n\nThis chapter built on what we\
    \ covered in the previous two chapters. We saw how to make outlet and target/action\
    \ connections between user interface elements in Interface Builder by control-dragging\
    \ and how to implement actions in your own code. We built a full GUI application\
    \ with less than a dozen lines of code. Admittedly, this app doesn’t do all that\
    \ much, but these basic ideas underlie a lot of what Cocoa has to offer and what\
    \ makes Cocoa such a productive development environment. In the next chapter,\
    \ we’ll work with several additional user-interface elements beyond buttons and\
    \ text fields, and we’ll see that we can configure and use them in exactly the\
    \ same ways we used the buttons and text fields here.\n\n## Chapter 5: GUI Components\n\
    \nIn [Chapters 3](#9781430245421_Ch03.xhtml) and [4](#9781430245421_Ch04.xhtml),\
    \ we covered some of the basics involved in creating a user interface in Interface\
    \ Builder and using a target/action to connect it to application code written\
    \ in Xcode. We’ve really only scratched the surface so far, but you should be\
    \ happy to know that the target/action system you learned to use in the last two\
    \ chapters is used by almost all of the user interface objects in Cocoa. If you’re\
    \ not quite sure what’s so great about that, you might want to review [Chapter\
    \ 3](#9781430245421_Ch03.xhtml) just one more time to be sure you’ve grasped the\
    \ target/action concept.\n\nBy now, you’ve surely noticed the wide variety of\
    \ user interface objects listed in Interface Builder’s Object Library pane. Now\
    \ it’s time to dig deeper into Cocoa’s bag of tricks and explore some of these\
    \ classes. The user interface classes available in Cocoa cover a wide range of\
    \ uses and wherever possible provide consistent APIs for their functionality,\
    \ so once you’ve learned how to do something with one class, you’ll often be able\
    \ to quickly guess how to achieve similar results with another class. In particular,\
    \ many of the classes that you’ll be using most often are subclasses of `NSControl`,\
    \ and you’ll mostly work with methods that are declared there. The different subclasses\
    \ interact with the user in different ways, but mostly interact with your own\
    \ code the same way.\n\nThis chapter will cover some of the most common user interface\
    \ classes that Cocoa provides, showing their basic usage and how to tailor them\
    \ to our needs where appropriate. Along the way, we’ll also learn about some of\
    \ the auxiliary Cocoa classes that may not always have a tangible screen presence,\
    \ but that still provide important services for our applications. We’ll be focusing\
    \ on the following classes (see [Figure 5-1](#9781430245421_Ch05.xhtml#Fig1) for\
    \ a sampling of what these objects can look like onscreen):\n\n- `NSTextField`:\
    \ The basic text input method for many applications. Responds to key-presses and\
    \ renders text. Allows a great deal of editing flexibility for the user.\n- `NSButton`:\
    \ The basic mouse-triggered GUI component. Despite their differences in operation\
    \ and appearance, radio-buttons, checkboxes, and plain old buttons are all instances\
    \ of `NSButton`."
