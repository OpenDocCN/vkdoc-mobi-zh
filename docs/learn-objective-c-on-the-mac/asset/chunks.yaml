    # 文本字段的属性检查器


    让我们把包含神奇数字的窗口调小一点；在不必要时，我们不想占用太多屏幕空间。窗口可通过其外围透明边框上的调整手柄进行缩放，如图 3-9 所示。点击其中一个调整手柄并将窗口缩小；我们将看到窗口宽度和高度的指示器，并且在缩放过程中窗口会实时重绘，以便观察缩放对内容的影响。


    ![9781430245421_Fig03-09.jpg](img/9781430245421_Fig03-09.jpg)


    图 3-9. 在 Xcode 中缩放应用程序主窗口


    当窗口缩小到一定程度后，我们可以继续布局。接下来要添加一个水平滑块。在**对象库**中查找它；我们可以向下滚动对象列表直到找到它，或者在**对象库**下方的搜索框中输入几个字符。输入“hor”或“sli”可以快速缩小范围，方便找到该控件。当列表中出现“水平滑块”后，将其拖拽到窗口左侧中部（图
    3-10）。蓝色参考线会指示放置位置。


    ![9781430245421_Fig03-10.jpg](img/9781430245421_Fig03-10.jpg)


    图 3-10. 向应用程序窗口添加滑块


    由于滑块并未填满窗口，请单击滑块一次，以显示其两侧的调整手柄。从滑块右侧拖拽，将其拉伸至窗口右侧边界的蓝色参考线处（图 3-11）。


    ![9781430245421_Fig03-11.jpg](img/9781430245421_Fig03-11.jpg)


    图 3-11. 调整滑块大小以填满窗口


    在**实用工具**区域中查看滑块的**属性检查器**（参见图 3-12）。默认情况下，滑块的值范围是 0 到 100，但我们可以根据需要将其更改为任何整数值。在**控件**部分下，勾选标有**连续**的复选框。


    ![9781430245421_Fig03-12.jpg](img/9781430245421_Fig03-12.jpg)


    图 3-12. 滑块的属性检查器


    现在我们即将施展一些魔法。我们将把滑块连接到文本字段。按住 Control 键，同时点击滑块。继续按住 Control 键和鼠标按钮，将光标向上移动到文本字段。此时会有一条蓝线从滑块延伸到鼠标位置。将这条线拖拽到文本字段上。当鼠标悬停在文本字段上时，该字段会高亮显示为蓝色（图
    3-13）。


    ![9781430245421_Fig03-13.jpg](img/9781430245421_Fig03-13.jpg)


    图 3-13. 从滑块按住 Control 键拖拽到文本字段以建立连接


    文本字段高亮后，松开鼠标。将出现一个小灰色窗口，列出“插座”、“辅助功能”和“已接收操作”（图 3-14）。选择 `takeDoubleValueFrom:`，文本字段会闪烁几次以确认连接。随后蓝线消失。毫不意外，这种操作被称为**按住
    Control 键拖拽**，它是我们在 Interface Builder 中连接插座和操作的主要机制。


    ![9781430245421_Fig03-14.jpg](img/9781430245421_Fig03-14.jpg)


    图 3-14. 设置滑块与文本字段之间的连接操作


    要查看我们刚刚建立的连接，请在**实用工具**区域选择**连接检查器**。


    在**已发送操作**下会有一个条目，显示 `takeDoubleValueFrom:` 已连接到文本字段（图 3-15）。


    ![9781430245421_Fig03-15.jpg](img/9781430245421_Fig03-15.jpg)


    图 3-15. 滑块的连接检查器，显示在文本字段上调用的操作


    我们刚才做了什么？我们做的是在滑块和文本字段之间建立了一个连接。现在文本字段是滑块的“目标”。当滑块值改变时，它会调用我们设置在其目标上的方法。在这个例子中，我们选择了
    `takeDoubleValueFrom:`。这个方法指示文本字段向滑块请求其值（类型为 double），然后文本字段将自身的值设置为从滑块获取的值并重新绘制。为滑块勾选“连续”复选框意味着，当滑块被来回拖拽时，它将反复调用其目标上的操作方法。


    至此已经做了大量设置。现在，让我们看看我们的操作实际运行的效果！在 Xcode 的“编辑器”菜单（不是“编辑”菜单，而是“编辑器”）中，从底部选择“模拟文档”。Xcode
    将运行一个名为 Cocoa Simulator 的程序，该程序会加载我们程序的 `.xib` 文件，让我们可以与之交互。点击滑块，并来回拖拽。随着拖拽，文本字段中的值应当会改变，以反映滑块的位置，如图
    3-16 所示。由于我们指示文本字段使用来自滑块的 double 值，因此显示的值将带有一位小数。注意，我们仍然没有编写任何代码；我们所做的只是将两个 Cocoa
    控件连接在一起。


    ![9781430245421_Fig03-16.jpg](img/9781430245421_Fig03-16.jpg)


    图 3-16. 当滑块移动时，文本字段自动更新


    操作完滑块后，退出 Cocoa Simulator 并返回 Xcode。再次从滑块按住 Control 键拖拽到文本字段，这次从灰色窗口中选择 `takeIntValueFrom:`
    操作（图 3-17）。注意，实际上有两个名称相似的操作：`takeIntValueFrom:` 和 `takeIntegerValueFrom:`。它们的区别在于文本字段是以
    `int` 还是 `NSInteger` 类型向滑块请求其值。任选一个都能满足我们的需求。这将替换我们之前建立的连接，因为滑块一次只能有一个目标。


    ![9781430245421_Fig03-17.jpg](img/9781430245421_Fig03-17.jpg)


    图 3-17. 将操作从 `takeDoubleValueFrom:` 更改为 `takeIntValueFrom:`


    再次运行“模拟文档”，并再次拖拽滑块。这次，文本字段中显示的数字应该是一个整数，不带小数点，如图 3-18 所示。退出 Cocoa Simulator，因为我们已经完成了！


    ![9781430245421_Fig03-18.jpg](img/9781430245421_Fig03-18.jpg)


    图 3-18. 滑块更新文本字段，但现在只显示整数值


    ## 总结


    在本章中，我们学习了如何使用插座和操作将对象相互连接，了解了一些关于 OS X 框架的背景知识，并获得了在 Xcode 中布局用户界面的更多实践。插座和操作是构建
    Cocoa 应用程序的基本概念，在接下来的章节中我们将进行大量按住 Control 键拖拽的操作。然而，这可能还不太像编程。你的耐心即将得到回报，因为在下一章中，我们将实际编写一些代码，实现我们自己的操作方法，并了解如何将
    Cocoa 界面对象连接到我们自己的代码，而不仅仅是相互连接。


