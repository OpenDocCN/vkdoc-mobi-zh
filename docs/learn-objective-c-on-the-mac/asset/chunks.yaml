- fmt: '# Attribute Inspector for Text Fields


    Let’s make the window containing the magic number a bit smaller; we don’t want
    to take up too much screen real estate when it’s not necessary. The window is
    resizable via the resize handles in the transparent border just beyond the perimeter
    of the window itself, as seen in [Figure 3-9](#9781430245421_Ch03.xhtml#Fig9).
    Click one of the resize handles and make the window smaller; we’ll see an indicator
    of the width and height of the window, and we’ll also see the window redraw as
    we resize it so we can see how the resizing affects the contents.


    ![9781430245421_Fig03-09.jpg](images/9781430245421_Fig03-09.jpg)


    [Figure 3-9](#9781430245421_Ch03.xhtml#_Fig9). Resizing the application’s main
    window in Xcode


    Once the window is somewhat smaller, we can continue laying it out. The next item
    to add is a horizontal slider. Look in the *Object Library* for this; we can scroll
    down in the list of objects until we find it, or we can type a few characters
    into the search field below the *Object Library*. Typing “hor” or “sli” will narrow
    it down nicely to make it easy to find the control. Once we’ve got Horizontal
    Slider in the list, drag the slider out onto the left middle of the window ([Figure
    3-10](#9781430245421_Ch03.xhtml#Fig10)). The blue guidelines will show us where
    to put it.


    ![9781430245421_Fig03-10.jpg](images/9781430245421_Fig03-10.jpg)


    [Figure 3-10](#9781430245421_Ch03.xhtml#_Fig10). Adding a slider to the application’s
    window


    Since the slider doesn’t fill out the window, click once on the slider to reveal
    resize handles on each side of the slider. Drag out the slider from its right
    side, stretching it out to the blue guideline on the right margin of the window
    ([Figure 3-11](#9781430245421_Ch03.xhtml#Fig11)).


    ![9781430245421_Fig03-11.jpg](images/9781430245421_Fig03-11.jpg)


    [Figure 3-11](#9781430245421_Ch03.xhtml#_Fig11). Resizing the slider to fill up
    the window


    Take a look at the *Attributes Inspector* for the Slider in the *Utility* area
    (see [Figure 3-12](#9781430245421_Ch03.xhtml#Fig12)). By default, the slider values
    range from 0 to 100, but we can change these, if we wish, to any integer values.
    Under the *Control* section, check the checkbox labeled *Continuous*.


    ![9781430245421_Fig03-12.jpg](images/9781430245421_Fig03-12.jpg)


    [Figure 3-12](#9781430245421_Ch03.xhtml#_Fig12). Attribute Inspector for a slider


    Now we’re about to work some magic. We’re going to connect the slider to the text
    field. While holding down the Control key, click the slider. Hold down both the
    Control key and the mouse button, and move the cursor up towards the text field.
    A blue line will extend out from the slider to our mouse. Drag this line out to
    the text field. When we drag the mouse over the text field, the text field will
    highlight in blue ([Figure 3-13](#9781430245421_Ch03.xhtml#Fig13)).


    ![9781430245421_Fig03-13.jpg](images/9781430245421_Fig03-13.jpg)


    [Figure 3-13](#9781430245421_Ch03.xhtml#_Fig13). Control-dragging from the slider
    to the text field to establish a connection


    With the text field highlighted, let go. A small gray window will appear, listing
    Outlets, Accessibility, and Received Actions ([Figure 3-14](#9781430245421_Ch03.xhtml#Fig14)).
    Select `takeDoubleValueFrom:` and the text field will blink a couple times to
    confirm the connection. Then the blue line will disappear. Not surprisingly, this
    maneuver is called *control-dragging*, and it is the primary mechanism we use
    to connect outlets and actions in Interface Builder.


    ![9781430245421_Fig03-14.jpg](images/9781430245421_Fig03-14.jpg)


    [Figure 3-14](#9781430245421_Ch03.xhtml#_Fig14). Setting the action for the connection
    between the slider and the text field


    To see the connection that we just made, select the *Connections Inspector* in
    the *Utility* area.


    There will be an entry under *Sent Actions* showing that `takeDoubleValueFrom:`
    is connected to Text Field ([Figure 3-15](#9781430245421_Ch03.xhtml#Fig15)).


    ![9781430245421_Fig03-15.jpg](images/9781430245421_Fig03-15.jpg)


    [Figure 3-15](#9781430245421_Ch03.xhtml#_Fig15). Connections Inspector for the
    slider, showing the action being called on the text field


    What did we just do? What we just did was to establish a connection between the
    slider and the text field. The text field is now the “target” of the slider. When
    the slider value changes, it calls the method on its target that we set. In this
    case, we had picked `takeDoubleValueFrom:`. This method tells the text field to
    ask the slider for its value (typed to a double), and then the text field sets
    its own value to the value it got from the slider and redraws itself. Selecting
    the Continuous checkbox for the slider means that the slider will repeatedly call
    the action method on its target as the slider gets dragged back and forth.


    It’s been a lot of setup to get here. Now, let’s see our action in action! Under
    the Editor menu in Xcode (not Edit, but Editor), select Simulate Document from
    the bottom. Xcode will run a program called Cocoa Simulator that loads the `.xib`
    file for our program and lets us play with it. Click the slider, and drag it back
    and forth. As we drag, the value in the text field should change to reflect the
    position of the slider, as shown in [Figure 3-16](#9781430245421_Ch03.xhtml#Fig16).
    Since we told the text field to use the double value from the slider, the value
    displayed will have a decimal point. Note that we still haven’t written any code;
    all we’ve done is to wire two Cocoa controls together.


    ![9781430245421_Fig03-16.jpg](images/9781430245421_Fig03-16.jpg)


    [Figure 3-16](#9781430245421_Ch03.xhtml#_Fig16). When the slider moves, the text
    field updates automatically


    After playing with the slider, quit the Cocoa Simulator and go back to Xcode.
    Control-drag again from the slider up to the text field, and this time pick the
    `takeIntValueFrom:` action from the gray window ([Figure 3-17](#9781430245421_Ch03.xhtml#Fig17)).
    Note that there are actually two actions with similar names, `takeIntValueFrom:`
    and `takeIntegerValueFrom:`. They differ in whether the text field asks the slider
    for its value as an `int`, or as an `NSInteger`. Either one will do for our purposes.
    This will replace the connection we made previously, as the slider can have only
    one target at a time.


    ![9781430245421_Fig03-17.jpg](images/9781430245421_Fig03-17.jpg)


    [Figure 3-17](#9781430245421_Ch03.xhtml#_Fig17). Changing the action from `takeDoubleValueFrom:`
    to `takeIntValueFrom:`


    Run Simulate Document again, and drag the slider around again. This time, the
    number displayed in the text field should just be an integer, with no decimal
    point, as shown in [Figure 3-18](#9781430245421_Ch03.xhtml#Fig18). Quit the Cocoa
    Simulator, for we’re done!


    ![9781430245421_Fig03-18.jpg](images/9781430245421_Fig03-18.jpg)


    [Figure 3-18](#9781430245421_Ch03.xhtml#_Fig18). The slider updates the text field
    but now with only integral values


    ## Wrap Up


    In this chapter, we learned how to connect objects to each other using outlets
    and actions, some background about frameworks in OS X, and acquired more practice
    in laying out a user interface in Xcode. Outlets and actions are fundamental concepts
    for building Cocoa applications, and we’ll be doing a lot of control-dragging
    in the coming chapters. However, this probably doesn’t yet feel much like programming.
    Your patience is about to be rewarded because in the next chapter we’ll actually
    write some code, implementing our own action methods, and see how to connect Cocoa
    interface objects to our own code instead of just to each other.


    ## Chapter 4


    # The First Call to Action


    It really is amazing all the stuff we get free with Cocoa, as we saw in the last
    two chapters.'
