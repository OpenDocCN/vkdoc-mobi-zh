    ## 使用`NSPredicate`限制结果


    如前所述，我们可以通过使用`NSPredicate`来限制`NSArrayController`为显示准备哪些记录。我们可以直接在Interface Builder中为数组控制器分配一个谓词；在初始化或条件发生变化需要重新获取时，通过应用程序代码进行分配；或者通过Cocoa绑定来实现，这意味着对谓词的更改可以自动传播到控制器。我们将在本章中探讨所有这些选项。


    ### 创建谓词


    创建`NSPredicate`最简单的方法是使用一个包含属性名称、比较符和要比较的值的格式字符串。谓词的定义看起来很像SQL中的`WHERE`子句，并且服务于大致相同的目的。谓词不仅限于Core
    Data的使用，还可以应用于Mac OS X的其他领域，例如Spotlight。'
