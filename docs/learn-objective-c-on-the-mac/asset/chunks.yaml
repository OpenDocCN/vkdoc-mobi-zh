- fmt: '请注意，属性列表中的图标文件条目已自动设置为我们导入的`iconset`目录。准备好编写代码了吗？猜猜看？其实不需要写任何代码。我们的应用已经完成了。


    运行应用


    点击Xcode窗口左上角的“运行”按钮来构建并运行应用。Xcode将构建我们的应用（可能需要一点时间），然后运行它。一个包含居中着色标签的窗口应该会出现。如果我们查看Mac主屏幕底部的程序坞，会看到我们的应用由导入项目中的图标表示。但等等，还有更多！


    从Chapter2菜单中选择“关于Chapter2”，关于对话框将出现（[图2-17](#9781430245421_Ch02.xhtml#Fig17)）。我们不仅免费获得了一个关于对话框，而且它还包含我们的图标。


    ![9781430245421_Fig02-17.jpg](images/9781430245421_Fig02-17.jpg)


    [图2-17](#9781430245421_Ch02.xhtml#_Fig17). 我们的应用在多个位置使用我们的图标，包括关于对话框


    我们还没结束。将鼠标移到应用主窗口中的“Hello, World!”文字上。光标应该从箭头变为文本光标。因为我们使标签可选中，Cocoa会自动更改光标，作为提示用户可以选择此文本。请继续双击“Hello”一词，它会被高亮。现在如果我们选择“编辑”菜单，会看到“复制”菜单项并未变灰。如果选择它，我们的程序会将“Hello”一词复制到剪贴板，然后我们可以将其粘贴到任何其他接受文本的应用程序中。当“Hello”仍处于选中状态时，选择“编辑”菜单，然后选择“语音”子菜单，再选择“开始朗读”。应用将使用Mac的文本转语音功能读出“Hello”。


    无需编写一行代码，我们的应用就支持将文本复制到剪贴板以及文本转语音。几乎零工作，我们的应用就表现得像真正的Mac应用，带有窗口和菜单栏，并响应常用键盘命令，比如`⌘Q`退出。应用的主窗口可以移动、最小化到程序坞，甚至可以关闭。我们可以隐藏应用，或隐藏所有其他应用。所有这些功能都是免费获得的，无需任何代价。这就是Cocoa的力量。如果你的计算机已经知道如何做某事，你很可能不需要编写太多代码来实现它，有时甚至根本不需要编写任何代码。


    与世界分享我们的创作


    退出Hello, World。还有最后一件事要介绍。我们现在已经创建了应用，但它在哪里？如果我们想将应用赠予（或出售）给他人，以便他们能在自己的机器上运行，该怎么做？


    首先，如果我们希望他人使用我们的应用，我们需要以略有不同的方式编译它。在Xcode中，如果我们点击“产品”菜单，会看到Xcode构建应用的五种不同方式：运行、测试、分析、性能分析和归档。要分发应用，我们需要进行归档构建。现在选择“归档”，让Xcode再次编译应用。但这次，构建完成后，我们将看到管理器的*归档*标签页（[图2-18](#9781430245421_Ch02.xhtml#Fig18)）。


    ![9781430245421_Fig02-18.jpg](images/9781430245421_Fig02-18.jpg)


    [图2-18](#9781430245421_Ch02.xhtml#_Fig18). Xcode的归档窗口


    要准备分发应用，点击“分发”按钮，并选择导出为“应用”。其他选项（提交到App Store和导出为开发者ID签名的应用）现在可以忽略。点击“下一步”，Xcode会提示我们选择代码签名身份。选择“不要重新签名”，再次点击“下一步”。Xcore会询问我们想要保存应用的位置。


    在Finder中打开该文件夹，我们会看到我们的程序。


    但这还不是全部。每次我们进行归档构建时，Xcode都会保留该构建的副本以供将来参考。它不会保留源码在归档中（源码由源码控制系统保管），但如果我们需要支持程序的多个版本，保留确切分发包的副本非常有用。当然，当旧版本不再有用时，我们可以清理它们。


    在离开这个话题之前，我们应该对构建配置有所了解。“产品”菜单下的每个不同选项都与一个构建配置相关联。Xcode为新建项目提供了两种配置：调试和发布。默认情况下，当我们在Xcode中工作时，我们使用的是调试配置。以这种方式构建应用时，Xcode会添加额外内容，以便更容易地排除应用故障。例如，这些调试符号允许我们在程序运行时检查和更改不同变量的值，或者使用调试器逐行逐步执行源代码。当我们点击运行按钮时，我们使用的是调试配置。


    另一方面，归档构建过程使用发布配置。发布配置不包含调试信息，并且会对最终程序进行更多优化。它还可以配置为进行多架构构建，以生成32位和64位的x86二进制文件，这也会减慢构建过程。在为他人运行准备应用时，我们通常希望这样做，但在积极开发时则不然。必要时我们可以定义其他配置，但本应用无需这样做。


    恭喜！你现在是一名开发者了。你正在查看的是一款完整的应用，就像“应用程序”文件夹中的所有应用一样。你可以通过电子邮件将其发送给你的阿姨贝西或最好的朋友，以此炫耀你现在已经成为一名真正的Mac
    OS X应用开发者。


    再见，Hello World


    在本章中，我们介绍了Xcode——Cocoa软件创作工具的强力核心。我们在没有编写一行代码的情况下设计了一款完整的应用。我们学习了如何向应用的主窗口添加文本标签、更改标签属性、为应用设置图标，甚至还看到了如何构建应用的分发版本。


    在本章中，我们通过了解无需编写任何代码就能实现的功能，初次体验了Cocoa的强大。在接下来的章节中，我们将看到当我们真正开始编写代码时，事情会变得多么强大。


    第3章    灯光、相机……动作！（以及输出口，也是）


    在了解一些理论之后，我们将构建一个应用。我们的应用将有一个包含标签、文本字段和滑块的单一窗口。当用户移动滑块时，文本字段会自动更新以反映滑块的值。在本章中，我们仍然不会编写任何代码；所有操作都将使用Interface
    Builder完成——但请耐心等待，因为我们将在下一章启用Objective-C编译器。Cocoa用户界面与应用程序代码交互的方式，正是Cocoa控件相互交互的方式。我们将从将Cocoa控件连接在一起开始，以了解其工作原理，然后在下一章开始将它们连接到我们自己的代码。


    这个应用很简单，但创建它所使用的机制与您几乎在Cocoa中所有用户交互中使用的机制相同，因此理解本章内容非常重要。


    框架，无处不在


    在Mac OS X中，Apple将代码和支持文件分组到称为框架的特殊文件夹（或称*包*）中。框架类似于大多数平台上使用的库，但它们更灵活，因为它们是文件夹而非平面文件。'
  raw: 'Note that the Icon file entry in the Property List has been automatically
    set to the `iconset` directory that we imported.    Are you ready to write some
    code? Well, guess what? There’s none to write. We’re done with our application.    Running
    the Application    Build and run your application by clicking Run in the upper
    left-hand corner of the Xcode window. Xcode will build our application, which
    may take a bit, then run our application. A window should appear containing our
    centered, colored label. If we look in the dock at the bottom of our Mac’s main
    screen, we’ll see our application represented by the icon we imported into our
    project. But wait: there’s more!    Select About Chapter2 from the Chapter2 menu,
    and the About box will appear ([Figure 2-17](#9781430245421_Ch02.xhtml#Fig17)).
    Not only do we get an About box for free, but it includes our icon.    ![9781430245421_Fig02-17.jpg](images/9781430245421_Fig02-17.jpg)    [Figure
    2-17](#9781430245421_Ch02.xhtml#_Fig17). Our application uses our icon in a variety
    of places, including the About box    We’re still not done. Move the mouse over
    the words “Hello, World!” in the application’s main window. The cursor should
    change from an arrow to a text cursor. Because we made the label selectable, Cocoa
    automatically changes the cursor as a hint to the user that they can select this
    text. Go ahead and double-click the word “Hello” and it will highlight. Now if
    we select the Edit menu, we’ll see that the Copy menu item is not grayed out.
    If we choose it, our program will copy the word “Hello” to the pasteboard and
    we can then paste it into any other application that accepts text. With “Hello”
    still selected, select the Edit menu, then select the Speech submenu, and select
    Start Speaking. The application will say “Hello” using your Mac’s text-to-speech
    capabilities.    Without writing a single line of code, our application supports
    copying text to the pasteboard and text-to-speech. With almost no work, our application
    behaves like a real Mac application, with windows and a menu bar, and it responds
    to the common key commands, like ![images](images/arrow3.jpg)Q to quit. Our application’s
    main window can be moved around, minimized to the dock, and even closed. We can
    hide our application, or hide all the other applications. All of this functionality
    is ours for three easy payments of nothing, including shipping and handling. That
    is the power of Cocoa. If your computer already knows how to do something, you
    probably won’t have to write very much code to do that thing, and sometimes you
    won’t have to write any code at all.    Sharing Our Creation With the World    Quit
    Hello, World. There’s one last thing we want to cover. We’ve now created the application,
    but where is it? What if we want to give (or sell) our application to others so
    they can run it on their machine?    First of all, we need to compile our application
    a little differently if we want to let others use it. In Xcode, if we click the
    Product menu, we’ll see the five different ways that Xcode will build our app:
    Run, Test, Profile, Analyze, and Archive. To distribute the app, we’ll need to
    do an Archive build. Select Archive now, and we’ll let Xcode compile the app again.
    This time, however, instead of running the app, we’ll see the *Archives* tab of
    the *Organizer* window after the build is complete ([Figure 2-18](#9781430245421_Ch02.xhtml#Fig18)).    ![9781430245421_Fig02-18.jpg](images/9781430245421_Fig02-18.jpg)    [Figure
    2-18](#9781430245421_Ch02.xhtml#_Fig18). Xcode’s Archives window    To prepare
    the application for distribution, click the Distribute button and indicate that
    we want to export as an Application. The other options, submitting to the App
    Store and exporting as a Developer ID-signed application, can be ignored for now.
    Click Next and Xcode will prompt us for a Code Signing Identity. Indicate Don’t
    Re-sign and hit Next again. Xcode will ask where we want to save the application.


    Open up that folder in Finder, and we’ll see our program.    But that’s not all.
    Every time we do an archive build, Xcode will keep a copy of that build around
    for our future reference. It doesn’t keep the source in the archive (our source
    code control system does that), but if we have multiple releases of a program
    to support, it’s useful to have a copy of the exact bits that were distributed.
    We can, of course, clean this up when old builds are no longer useful.    Before
    we leave this topic, you should understand a little bit about build configurations.
    Each of the different options under the Product menu is tied to a build configuration.
    Xcode starts with two configurations for new projects: Debug and Release. By default,
    when we’re working in Xcode, we’re working in the Debug configuration. When we
    build an application this way, Xcode builds it with extra stuff to make it easier
    to troubleshoot our application. These debug symbols allow us, for example, to
    examine and change the values of different variables while the program is running,
    or to step through the source code line by line using the debugger. When we click
    the Run button, we’re getting the Debug configuration.    The Archive build process,
    on the other hand, uses the Release configuration. The Release configuration doesn’t
    include debugging information, and it does more optimization of the resulting
    program. It can also be configured to do multi-architecture builds for generating
    both 32-bit and 64-bit x86 binaries, which also slows down the build process.
    We’ll generally want to do this when preparing the app for someone else to run,
    but not when actively developing it. We can define additional configurations when
    necessary, but we don’t need to do that for this application.    Congratulations!
    You’re a developer. That’s a full-fledged application you’re looking at, just
    like all the ones in your Applications folder. You can e-mail it to your Aunt
    Bessie or your best friend to show off the fact that you are now a bona fide Mac
    OS X application developer.    Goodbye, Hello World    In this chapter, we introduced
    to Xcode, the powerhouse of Cocoa software creation tools. We designed a full-fledged
    application without writing a single line of code. We learned how to add a text
    label to our application’s main window, changed the label attributes, gave our
    application an icon, and even saw how to build a distributable version of our
    application.    In this chapter, we got our first taste of the power of Cocoa
    by seeing what we can do without writing any code. In the next chapters, we’ll
    see how powerful things start to get when we actually do write some code.    Chapter    3    Lights,
    Camera … Actions! (and Outlets, too)    After we get through a bit of theory,
    we’re going to build an application. Our application will have a single window
    with a label, a text field, and a slider. When the user moves the slider, the
    text field will automatically update itself to reflect the value of the slider.
    In this chapter, we still won’t be writing any code; everything will be done using
    Interface Builder—but sit tight because we’ll be breaking out the Objective-C
    compiler in the next chapter. The way that Cocoa user interfaces interact with
    application code is the way that Cocoa controls interact with each other. We’ll
    start by wiring Cocoa controls to each other in order to see how it’s done, and
    in the next chapter we’ll start wiring them to our own code.    The application
    is simple, but the mechanisms used to create it are the same ones that you will
    use in nearly all user interaction in Cocoa, so it’s important that you understand
    what we’re doing in this chapter.    Frameworks, Frameworks Everywhere    In Mac
    OS X, Apple has grouped code and supporting files together in special folders
    (or *bundles*) called *frameworks*. Frameworks are like the libraries used on
    most platforms, but they are more flexible because they are folders rather than
    flat files.'
