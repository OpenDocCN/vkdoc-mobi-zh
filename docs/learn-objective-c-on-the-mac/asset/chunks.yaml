    \ Xcode 中，在 Interface Builder 面板旁边打开一个辅助编辑器窗格（我们在第 5 章中讨论过辅助编辑器窗格；点击 Xcode 工具栏中*编辑器*标签图标块中看起来像管家背心和领结的图标）。很可能打开此窗格时会预加载`WLAppDelegate.h`文件，但如果未加载，请使用窗格顶部的导航栏打开它。我们将添加一个名为`title`的\
    \ outlet 和一个名为`showColorPanel:`的 action。为此，从*多行标签*拖拽到`WLAppDelegate.h`文件，目标指向现有`@property`声明的正下方。添加一个新的\
    \ Outlet 并将其命名为`title`。然后，从*显示颜色面板*按钮拖拽到新添加的 outlet 正下方，并添加一个名为`showColorPanel:`的\
    \ Action（我们需要将连接类型更改为*Action*）。\n\n完成后，`WLAppDelegate.h`文件应如下所示：\n\n```objc\n\
    #import <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *title;\n- (IBAction)showColorPanel:(id)sender;\n\n@end\n```\n\n现在切换到`.m`文件，并添加以下`showColorPanel:`方法的实现，以及一个名为`changeColor:`的方法，如下所示：\n\
    \n```objc\n#import \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // Insert code here to initialize your application\n\
    }\n\n- (IBAction)showColorPanel:(id)sender {\n    // create the color panel\n\
    \    NSColorPanel *panel = [NSColorPanel sharedColorPanel];\n    // bring the\
    \ color panel to the front of the screen\n    [panel orderFront:nil];\n}\n\n-\
    \ (void)changeColor:(id)sender {\n    // in this method, the \"sender\" parameter\
    \ is the NSColorPanel\n    // itself.  We just ask it for its color, and pass\
    \ it along to\n    // the \"title\" object.\n    [self.title setTextColor:[sender\
    \ color]];\n}\n\n@end\n```\n\n**注意**：尽管我们之前见过，但请仔细查看`WLAppDelegate.h`文件中的`@property`声明。大多数情况下，当添加一个连接到用户界面元素的属性时，该属性包含`weak`注释。但对于指向窗口的引用，情况并非如此。该属性被标记为`assign`。这有一个很好的理由：注释控制着自动引用计数（ARC）如何处理引用。标记为`strong`的引用表示对对象的所有权。\n\
    \n标记为`weak`的引用不表示所有权，并且当指向某对象的所有强引用被释放且该对象被回收时，弱引用将被清零。但是，ARC 不能与重写`release`和`retain`的类一起工作，这包括`NSWindow`。由于`NSWindow`不支持\
    \ ARC，该属性被赋予了`assign`注释。这实际上意味着与`weak`相同，但适用于非 ARC 启用的类。应用代理并不拥有该窗口，因此应用代理与窗口的连接不应阻止窗口在适当时被释放和回收。\n\
    \n`showColorPanel:`方法将由 GUI 中的简单按钮点击调用，而当我们从按钮拖拽时 Xcode 已经为我们连接好了。但是，`changeColor:`方法将在用户点击颜色面板中的颜色时被调用，即使颜色面板和我们的代码之间没有任何直接连接。这种“魔法”之所以有效，归功于一个名为响应者链的\
    \ Cocoa 概念（参见侧边栏）。\n\n**响应者链**\n\n响应者链是一个特别的对象集合，在应用程序生命周期中按需动态收集，可以查询它们是否实现了特定的\
    \ action。这使得某些 action 可以以通用方式配置，以便在运行时，它们将被调用到在当时最有意义的对象上。该链按特定性顺序排列，从“最接近” action\
    \ 的对象开始，一直延续到最通用的对象。在 Interface Builder 中，通过将操作连接到 nib 的*第一响应者*图标上的 action 来配置使用响应者链的对象，该图标只不过是响应者链中第一个对象的代理，当被询问是否实现了特定方法时，该对象在运行时说“是的，我可以”。\n\
    \n由于每个窗口都有自己的“第一响应者”概念（通常是用户最后交互的控件或视图，从而使其成为接收按键等操作的可能候选者），这使得这一切变得更加令人困惑。\n\n\
    让我们尝试通过一个例子来澄清这一点。考虑一个按钮的情况，其目标/操作被配置为调用*第一响应者*上一个名为`showThing:`的方法。当用户点击按钮时，会按顺序询问列表中的每个对象是否实现了`showThing:`方法，直到其中一个回答`YES`，此时将调用该对象的`showThing:`方法，响应者链的工作就完成了。以下是响应者链可能的样子示例：\n\
    \n1.  窗口的“第一响应者”（当前聚焦并接受键盘输入的视图）、其父视图、父视图的父视图，依此类推，一直向上到窗口内的视图层次结构\n2.  窗口本身\n\
    3.  窗口的代理\n4.  应用程序对象，`NSApp`\n5.  应用程序对象的代理\n\n响应者链可能还包含其他对象，特别是如果我们在处理基于文档的应用程序，那么打开的文档及其控制器也会在链中占有一席之地。更多内容请参见第\
    \ 12 章。\n\n一旦这些对象中的任何一个表示实现了`showThing:`，那么就会在该对象上调用该方法，搜索结束。\n\n现在保存工作并点击**运行**。我们的新应用将出现，点击按钮将调出颜色面板。点击一些不同的颜色，所选文本的颜色将立即更改以反映新的选择。\n\
    \n那么，考虑到颜色面板与我们的应用代理没有直接连接，有理由怀疑：这是如何工作的？我们应用代理中的`changeColor:`方法是如何被调用的？关键在于使用如前所述的响应者链。\n"
- fmt: "`NSColorPanel`使用响应者链来查找实现了`changeColor:`方法的对象。作为应用程序的委托，我们的小控制器对象是被查询是否实现了该方法的最后一个对象之一，由于它实现了，所以该方法会被调用。请注意，如果窗口本身实现了该方法，或者窗口的委托实现了该方法，那么这些方法之一会被优先调用。\n\
    \n现在我们需要以一个现实检验来结束本节。实际上，我们刚才所做的事情可以通过使用`NSColorWell`更轻松（也更美观）地完成，这是一个特殊的控件，点击时会启动`NSColorPanel`。我们只需要编写代码在控制器类中声明一个属性来包含`NSColor`，然后使用Cocoa绑定将`NSColorWell`的*Value*属性和`NSTextField`的*Text\
    \ Color*属性绑定到控制器中的这个属性。此示例在此处原样保留，主要是为了向您展示如何从自己的代码中使用颜色面板，并让您初步了解响应者链的概念。\n\n\
    ## 字体面板\n\n接下来要介绍的特殊面板是`NSFontPanel`。与颜色面板不同，字体面板没有匹配的控件来启动它。不过，它可以相当容易地与系统“格式”菜单的内容集成，我们稍后会看到这一点。\n\
    \n我们在这里要做的是向`WindowLab`窗口添加一个按钮，该按钮将触发一个打开字体面板的操作方法，以及另一个将更新文本字段的方法。首先，让`WindowLab`窗口变得更高一些。然后，选择打开颜色面板的按钮，并复制它。将新按钮标题设为“Show\
    \ Font Panel”。打开一个助理编辑器窗格，显示`WLAppDelegate.h`文件，并从按钮按住Control键拖动到助理编辑器窗格，目标位置在现有操作方法下方。插入一个新的操作，并将其命名为`showFontPanel`。\n\
    \n添加该操作将导致以下方法声明被添加到类的`@interface`块中，位于`WLAppDelegate.h`文件内：\n\n```\n- (IBAction)showFontPanel:(id)sender;\n\
    ```\n\n以下存根将被添加到`WLAppDelegate.m`文件中的`@implementation`部分：\n\n```\n- (IBAction)showFontPanel:(id)sender\
    \ { }\n```\n\n切换到`.m`文件，并在`@implementation`部分填写以下代码：\n\n```\n- (IBAction)showFontPanel:(id)sender\
    \ {\n    NSFontPanel *panel = [NSFontPanel sharedFontPanel];\n    NSFontManager\
    \ *manager = [NSFontManager sharedFontManager];\n    [manager setSelectedFont:[self.title\
    \ font] isMultiple:NO];\n    [panel orderFront:nil];\n}\n\n- (void)changeFont:(id)sender\
    \ {\n    // 这里，'sender' 是共享的 NSFontManager 实例\n    NSFont *oldFont = [self.title\
    \ font];\n    NSFont *newFont = [sender convertFont:oldFont];\n    [self.title\
    \ setFont:newFont];\n}\n```\n\n这遵循与颜色面板相同的使用模式。当用户点击字体时，字体面板使用响应者链查找实现了`changeFont:`操作方法的对象，并且它成功在我们的应用程序委托中找到了它。这里的情况稍微复杂一些，因为在这两个方法中，我们都使用了`NSFontManager`类的共享实例。运行中的应用程序对所选或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它，间接告诉`NSFontPanel`它应该开始显示哪个字体，然后在`changeFont:`中再次使用它来获取新的所选字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态结合起来（例如，如果旧字体是Lucida\
    \ Grande/Bold/36，而用户选择了Times New Roman，其他保持不变，转换后的字体将是Times New Roman/Bold/36）。\n\
    \n现在，保存工作，返回Xcode，然后点击**Run**。\n\n我们现在可以更改显示文本的颜色和字体（参见[图11-4](#9781430245421_Ch11.xhtml#Fig4)）。\n\
    \n![9781430245421_Fig11-04.jpg](images/9781430245421_Fig11-04.jpg)\n\n[图11-4](#9781430245421_Ch11.xhtml#_Fig4)\
    \ 设置标签的颜色和字体\n\n## 拥有独立Nib文件的控制器\n\n接下来，我们将演示一个在Cocoa开发中经常出现的简单模式：创建一个加载自己nib文件的控制器类，成为文件中所有对象的“所有者”。在我们迄今为止创建的所有应用程序中，所有GUI元素都包含在应用程序的单个`.xib`文件中。这对于简单应用程序来说效果很好，但有其局限性。首先，我们在nib文件中只有一个窗口实例和一个控制器实例。其次，整个主nib文件在应用程序启动时一次性加载，nib文件中的内容越多，启动阶段就会越慢且占用更多内存。诚然，在拥有数GB\
    \ RAM的现代计算机上，这可能不是一个大问题，但作为程序员，总是应该尽量避免随意浪费CPU和RAM。最后，将太多顶级对象（如窗口、控制器等）放入单个nib文件会给程序员带来困难，因为更难看出哪些控制器和窗口属于一起。\n\
    \n这两个问题的解决方案是将部分GUI对象分发到其他nib文件中，并通过加载这些nib文件的控制器类来管理它们的使用。许多Cocoa应用程序使用此技术，通常将偏好设置、文档、工具等窗口拆分为单独的nib文件。以下部分将演示两种不同的实现方式，复杂度递增。\n\
    \n### 使用NSWindowController加载Nib文件\n\n第一种也是最简单的方法是使用Cocoa的`NSWindowController`类加载nib文件并成为其所有者。我们将向主窗口添加一个按钮来触发加载新的nib文件，并向`WLAppDelegate`添加一个`NSMutableArray`来持有对新加载nib文件的引用。如果没有东西持有对新加载nib的引用，ARC系统会导致它们被立即释放。\n\
    \n首先，打开`WLAppDelegate.h`文件，并添加以下属性（以粗体显示）：\n\n```\n@interface WLAppDelegate :\
    \ NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet NSTextField *title;\n@property (strong) NSMutableArray\
    \ *subWindows;\n```\n\n然后，在`.m`文件的`applicationDidFinishLaunching:`方法中添加这一行：\n\n\
    ```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
    \    self.subWindows = [[NSMutableArray alloc] init];\n}\n```\n\n接下来，打开`MainMenu.xib`文件，并在主窗口中已有的两个按钮下方添加一个新按钮。将其标签设为“Load\
    \ Easy Window”。打开一个*Assistant Editor*窗格（如果尚未打开），并在其中打开`WLAppDelegate.h`文件。从新按钮按住Control键拖动到`.h`文件，并添加一个名为`loadEasyWindow`的新操作。然后，在`WLAppDelegate`的`.m`文件中为存根填写以下实现：\n\
    \n```\n- (IBAction)loadEasyWindow:(id)sender {\n    NSWindowController *easyController\
    \ = [[NSWindowController alloc]\n        initWithWindowNibName:@\"EasyWindow\"\
    ];\n    // 需要持有对该对象的引用。\n    [self.subWindows addObject:easyController];\n   \
    \ [easyController window];\n}\n```\n\n在该方法中，我们首先初始化一个新的控制器，并告诉它要使用的nib文件名。然后，我们将对该控制器的引用存储到在`applicationDidFinishLaunching:`方法中创建的`subWindows\
    \ NSMutableArray`中，这样新的控制器就不会在方法结束时被释放。"
  raw: '`NSColorPanel` uses the responder chain to find an object that implements
    the `changeColor:` method. As the application’s delegate, our little controller
    object is one of the last objects queried to see if it implements the method,
    and since it does, it gets called. Note that if the window implemented the method
    itself, or if it had a delegate that implemented the method, one of those methods
    would have been called instead.    Now we need to end this section with a reality
    check. In reality, what we just did can be more easily (and more handsomely) accomplished
    by using an `NSColorWell`, a special control that launches the `NSColorPanel`
    when clicked. We’d only need to write code to declare a property in a controller
    class to contain an `NSColor`, and then use Cocoa Bindings to bind the `NSColorWell`’s
    *Value* attribute and the `NSTextField`’s *Text Color* attribute to the property
    in our controller. This example is included here, as-is, mainly to show you how
    to use the color panel from your own code, as well as give you a first look at
    the responder chain concept.    The Font Panel    The next special panel we’re
    going to look at is `NSFontPanel`. Unlike the color panel, the font panel does
    not have a matching control that launches it. However, it can be integrated fairly
    easily with the contents of the system’s Format menu, as we’ll see a little later.    What
    we’re going to do here is add a button to our WindowLab window that will trigger
    an action method that opens the font panel and another method that will update
    the text field. Start by making the WindowLab window a little taller. Then select
    the button that opens up the Color panel, and duplicate it. Title the new button
    Show Font Panel. Open up an Assistant Editor pane showing the `WLAppDelegate.h`
    file, and Control-drag from the button to the Assistant Editor pane, aiming just
    below the existing action methods. Insert a new action, and name it `showFontPanel`.    Adding
    the action will cause the following method declaration to be added inside the
    class’s `@interface` block, in the `WLAppDelegate.h` file:    ``` - (IBAction)showFontPanel:(id)sender;
    ```    The following stub will be added to the `@implementation` in the `WLAppDelegate.m`
    file:    ``` - (IBAction)showFontPanel:(id)sender { } ```    Switch to the `.m`
    file and fill in the following code in the `@implementation` section    ``` -
    (IBAction)showFontPanel:(id)sender {   NSFontPanel *panel = [NSFontPanel sharedFontPanel];
      NSFontManager *manager = [NSFontManager sharedFontManager];   [manager setSelectedFont:[self.title
    font] isMultiple:NO];   [panel orderFront:nil]; }  - (void)changeFont:(id)sender
    {   // here, ''sender'' is the shared NSFontManager instance   NSFont *oldFont
    = [self.title font];   NSFont *newFont = [sender convertFont:oldFont];   [self.title
    setFont:newFont]; } ```    This follows the same usage pattern as the color panel.
    When the user clicks on a font, the font panel uses the responder chain to look
    for an object that implements the `changeFont:` action method, and it manages
    to find it in our app delegate. Here, things are slightly more complicated because
    in both of these methods we make use of a shared instance of the `NSFontManager`
    class. A running application’s notion of the selected or current font is held
    within this shared instance, which we use first in `showFontPanel:` to indirectly
    tell the `NSFontPanel` which font it should begin displaying, and then again in
    `changeFont:` to get the new selected font. We get the new font by passing the
    old font to the font manager’s `convertFont:` method, which combines characteristics
    of the old font with the state of the user’s selection in the font panel (for
    example, if the old font is Lucida Grande/Bold/36, and the user selects Times
    New Roman, leaving the rest alone, the converted font will be Times New Roman/Bold/36).    Now,
    save the work, go back to Xcode, and hit **Run**.


    We can now change both the color and the font for the displayed text (see [Figure
    11-4](#9781430245421_Ch11.xhtml#Fig4)).    ![9781430245421_Fig11-04.jpg](images/9781430245421_Fig11-04.jpg)    [Figure
    11-4](#9781430245421_Ch11.xhtml#_Fig4). Setting a label’s color and font    A
    Controller With a Nib of Its Own    Next, we’re going to demonstrate a simple
    pattern that occurs often in Cocoa development: making a controller class that
    loads its own nib file, becoming the “owner” of all the objects in the file. In
    every application we’ve created so far, all the GUI elements are contained inside
    the application’s single .xib file. This works well enough for simple applications,
    but it has its limits. For one thing, we only have one instance of each window
    and each controller in the nib. For another thing, the entire main nib file is
    loaded at once, when the application is starting up, and the more stuff you have
    in that nib, the slower and more memory-intensive the startup phase will be. Granted,
    on modern computers with several gigabytes of RAM, this may not be such a huge
    problem, but as a programmer it’s always good to try to not waste CPU and RAM
    recklessly. Finally, putting too many top-level objects (windows, controllers,
    and the like) into a single nib file makes life more difficult for you, the programmer,
    because it’s harder to see which controllers and windows belong together.    The
    solution to both of these problems is to distribute some of the GUI objects into
    other nib files, and mediate their use with controller classes that load the nibs.
    This technique is used by many Cocoa applications, which commonly split windows
    for preferences, documents, tools, and so on into separate nib files. The following
    sections will demonstrate two different ways of doing this, with increasing complexity.    Loading
    a Nib With NSWindowController    The first and easiest way is to use Cocoa’s `NSWindowController`
    class to load the nib file and be its owner. We’ll add a button to our main window
    to trigger loading a new nib file and an `NSMutableArray` to our `WLAppDelegate`
    to hold onto references to the newly-loaded nibs. Without something to hold a
    reference to the newly-loaded nib, the ARC system will cause them to be freed
    immediately.    Start by opening up the `WLAppDelegate.h` file, and add the following
    property (given in bold):    ``` @interface WLAppDelegate : NSObject <NSApplicationDelegate>  @property
    (assign) IBOutlet NSWindow *window; @property (weak) IBOutlet NSTextField *title;
    @property (strong) NSMutableArray *subWindows; ```    Then add this line to the
    `applicationDidFinishLaunching:` method in the `.m` file:    ``` - (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification {     self.subWindows = [[NSMutableArray alloc] init]; } ```    Next,
    open up the `MainMenu.xib` file, and add a new button to the main window below
    the two that are already there. Label it “Load Easy Window.” Open up an *Assistant
    Editor* pane (if there isn’t one already open) and open the `WLAppDelegate.h`
    file there. Control-drag out from the new button to the `.h` file, and add a new
    action called `loadEasyWindow`. Then, fill out the stub in the `.m` file for `WLAppDelegate`
    with the following implementation:    ``` - (IBAction)loadEasyWindow:(id)sender
    {   NSWindowController *easyController = [[NSWindowController alloc]       initWithWindowNibName:@"EasyWindow"];
      // need to hold onto a reference to this object.   [self.subWindows addObject:easyController];
      [easyController window]; } ```    In that method, we first initialize a new
    controller, telling it the name of the nib file to use. Then, we store a reference
    to that controller in the `subWindows NSMutableArray` that we created in the `applicationDidFinishLaunching:`
    method, so that the new controller doesn’t get released at the end of the method.'
  trans: "\n`NSColorPanel`使用响应者链来查找实现了`changeColor:`方法的对象。作为应用程序的委托，我们的小控制器对象是被查询是否实现了该方法的最后一个对象之一，由于它实现了，所以该方法会被调用。请注意，如果窗口本身实现了该方法，或者窗口的委托实现了该方法，那么这些方法之一会被优先调用。\n\
    \n现在我们需要以一个现实检验来结束本节。实际上，我们刚才所做的事情可以通过使用`NSColorWell`更轻松（也更美观）地完成，这是一个特殊的控件，点击时会启动`NSColorPanel`。我们只需要编写代码在控制器类中声明一个属性来包含`NSColor`，然后使用\
    \ Cocoa 绑定将`NSColorWell`的*Value*属性和`NSTextField`的*Text Color*属性绑定到控制器中的这个属性。此示例在此处原样保留，主要是为了向您展示如何从自己的代码中使用颜色面板，并让您初步了解响应者链的概念。\n\
    \n## 字体面板\n\n接下来要介绍的特殊面板是`NSFontPanel`。与颜色面板不同，字体面板没有匹配的控件来启动它。不过，它可以相当容易地与系统“格式”菜单的内容集成，我们稍后会看到这一点。\n\
    \n我们在这里要做的是向`WindowLab`窗口添加一个按钮，该按钮将触发一个打开字体面板的操作方法，以及另一个将更新文本字段的方法。首先，让`WindowLab`窗口变得更高一些。然后，选择打开颜色面板的按钮，并复制它。将新按钮标题设为“Show\
    \ Font Panel”。打开一个助理编辑器窗格，显示`WLAppDelegate.h`文件，并从按钮按住 Control 键拖动到助理编辑器窗格，目标位置在现有操作方法下方。插入一个新的操作，并将其命名为`showFontPanel`。\n\
    \n添加该操作将导致以下方法声明被添加到类的`@interface`块中，位于`WLAppDelegate.h`文件内：\n\n```\n- (IBAction)showFontPanel:(id)sender;\n\
    ```\n\n以下存根将被添加到`WLAppDelegate.m`文件中的`@implementation`部分：\n\n```\n- (IBAction)showFontPanel:(id)sender\
    \ { }\n```\n\n切换到`.m`文件，并在`@implementation`部分填写以下代码：\n\n```\n- (IBAction)showFontPanel:(id)sender\
    \ {\n    NSFontPanel *panel = [NSFontPanel sharedFontPanel];\n    NSFontManager\
    \ *manager = [NSFontManager sharedFontManager];\n    [manager setSelectedFont:[self.title\
    \ font] isMultiple:NO];\n    [panel orderFront:nil];\n}\n\n- (void)changeFont:(id)sender\
    \ {\n    // 这里，'sender' 是共享的 NSFontManager 实例\n    NSFont *oldFont = [self.title\
    \ font];\n    NSFont *newFont = [sender convertFont:oldFont];\n    [self.title\
    \ setFont:newFont];\n}\n```\n\n这遵循与颜色面板相同的使用模式。当用户点击字体时，字体面板使用响应者链查找实现了`changeFont:`操作方法的对象，并且它成功在我们的应用程序委托中找到了它。这里的情况稍微复杂一些，因为在这两个方法中，我们都使用了`NSFontManager`类的共享实例。运行中的应用程序对所选或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它，间接告诉`NSFontPanel`它应该开始显示哪个字体，然后在`changeFont:`中再次使用它来获取新的所选字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态结合起来（例如，如果旧字体是\
    \ Lucida Grande/Bold/36，而用户选择了 Times New Roman，其他保持不变，转换后的字体将是 Times New Roman/Bold/36）。\n\
    \n现在，保存工作，返回 Xcode，然后点击**Run**。\n\n我们现在可以更改显示文本的颜色和字体（参见图 11-4）。\n\n![9781430245421_Fig11-04.jpg](img/9781430245421_Fig11-04.jpg)\n\
    \n图 11-4 设置标签的颜色和字体\n\n## 拥有独立 Nib 文件的控制器\n\n接下来，我们将演示一个在 Cocoa 开发中经常出现的简单模式：创建一个加载自己\
    \ nib 文件的控制器类，成为文件中所有对象的“所有者”。在我们迄今为止创建的所有应用程序中，所有 GUI 元素都包含在应用程序的单个`.xib`文件中。这对于简单应用程序来说效果很好，但有其局限性。首先，我们在\
    \ nib 文件中只有一个窗口实例和一个控制器实例。其次，整个主 nib 文件在应用程序启动时一次性加载，nib 文件中的内容越多，启动阶段就会越慢且占用更多内存。诚然，在拥有数\
    \ GB RAM 的现代计算机上，这可能不是一个大问题，但作为程序员，总是应该尽量避免随意浪费 CPU 和 RAM。最后，将太多顶级对象（如窗口、控制器等）放入单个\
    \ nib 文件会给程序员带来困难，因为更难看出哪些控制器和窗口属于一起。\n\n这两个问题的解决方案是将部分 GUI 对象分发到其他 nib 文件中，并通过加载这些\
    \ nib 文件的控制器类来管理它们的使用。许多 Cocoa 应用程序使用此技术，通常将偏好设置、文档、工具等窗口拆分为单独的 nib 文件。以下部分将演示两种不同的实现方式，复杂度递增。\n\
    \n### 使用 NSWindowController 加载 Nib 文件\n\n第一种也是最简单的方法是使用 Cocoa 的`NSWindowController`类加载\
    \ nib 文件并成为其所有者。我们将向主窗口添加一个按钮来触发加载新的 nib 文件，并向`WLAppDelegate`添加一个`NSMutableArray`来持有对新加载\
    \ nib 文件的引用。如果没有东西持有对新加载 nib 的引用，ARC 系统会导致它们被立即释放。\n\n首先，打开`WLAppDelegate.h`文件，并添加以下属性（以粗体显示）：\n\
    \n```\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property\
    \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField *title;\n\
    @property (strong) NSMutableArray *subWindows;\n```\n\n然后，在`.m`文件的`applicationDidFinishLaunching:`方法中添加这一行：\n\
    \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
    \    self.subWindows = [[NSMutableArray alloc] init];\n}\n```\n\n接下来，打开`MainMenu.xib`文件，并在主窗口中已有的两个按钮下方添加一个新按钮。将其标签设为“Load\
    \ Easy Window”。打开一个*Assistant Editor*窗格（如果尚未打开），并在其中打开`WLAppDelegate.h`文件。从新按钮按住\
    \ Control 键拖动到`.h`文件，并添加一个名为`loadEasyWindow`的新操作。然后，在`WLAppDelegate`的`.m`文件中为存根填写以下实现：\n\
    \n```\n- (IBAction)loadEasyWindow:(id)sender {\n    NSWindowController *easyController\
    \ = [[NSWindowController alloc]\n        initWithWindowNibName:@\"EasyWindow\"\
    ];\n    // 需要持有对该对象的引用。\n    [self.subWindows addObject:easyController];\n   \
    \ [easyController window];\n}\n```\n\n在该方法中，我们首先初始化一个新的控制器，并告诉它要使用的 nib 文件名。然后，我们将对该控制器的引用存储到在`applicationDidFinishLaunching:`方法中创建的`subWindows\
    \ NSMutableArray`中，这样新的控制器就不会在方法结束时被释放。\n"
- fmt: "If we didn’t keep a reference to it, it would be released when it went out\
    \ of scope and the newly-loaded nib file would get released along with it. Of\
    \ course, in a real application, we’d need to have a mechanism to remove objects\
    \ from this list as appropriate, but we’ll ignore that for the moment. Then we\
    \ call its `window` method, which is what actually loads the nib file and displays\
    \ the window. Of course, we haven’t created the EasyWindow nib file yet, so we’ll\
    \ do that now.\n\nMake a brand new nib file in Xcode by selecting **File** ![image](images/arrow.jpg)\
    \ **New** ![image](images/arrow.jpg) **New File**. Select *User Interface* under\
    \ OS X in the template chooser, and then choose the *Window* template, which contains\
    \ a single `NSWindow` ready for us to use. Give the new file the name EasyWindow,\
    \ and select the WindowLab folder under the *Group* pop-up menu. The *Group* pop-up\
    \ menu will show five items, the top three of which are WindowLab with an Xcode\
    \ Project icon, WindowLab with a Folder icon, and Supporting Files with a Folder\
    \ icon. These correspond to the file groups in the Xcode Navigator area. Select\
    \ the *WindowLab* entry with the folder icon, and click *Create*.\n\nOur newly-created\
    \ xib file will show up as a new file in the *Navigator* area in Xcode, so open\
    \ the file from there. Select the Window in the nib file, and open the *Attributes\
    \ Inspector*. Give the window the title “Easy Window.”\n\nIn previous chapters,\
    \ every controller we’ve created has been added to a nib file as a top-level object,\
    \ but when you’re loading a nib file yourself, you can specify an object to be\
    \ its “owner,” which in Interface Builder is represented by the *File’s Owner*\
    \ object in the main nib window. `NSWindowController`, our controller’s class,\
    \ already sets itself up as the owner of the nib file when it loads the file,\
    \ but we still have to manually configure that in Interface Builder so that we\
    \ can make use of it. To do this, select the *File’s Owner* icon and open the\
    \ *Identity Inspector*. At the top of this Inspector, we can set the class of\
    \ the object that we want to be the file’s owner. By default it’s set to `NSObject`,\
    \ but we’ll usually want it to be `NSWindowController` itself or a custom subclass\
    \ of `NSWindowController`. For now, set its *Custom Class* to `NSWindowController`,\
    \ as shown in [Figure 11-5](#9781430245421_Ch11.xhtml#Fig5). Lastly, Control-drag\
    \ from the *File’s Owner* icon to the window, and assign that to the `window`\
    \ outlet of *File’s Owner*. We need to do this so that the `NSWindowController`\
    \ knows which of potentially many `NSWindow` objects is the “main” window for\
    \ the nib.\n\n![9781430245421_Fig11-05.jpg](images/9781430245421_Fig11-05.jpg)\n\
    \n[Figure 11-5](#9781430245421_Ch11.xhtml#_Fig5). Setting the class for File’s\
    \ Owner\n\nSave and then click **Run**. The app’s new button will let us create\
    \ new windows with each press of the button (see [Figure 11-6](#9781430245421_Ch11.xhtml#Fig6)).\n\
    \n![9781430245421_Fig11-06.jpg](images/9781430245421_Fig11-06.jpg)\n\n[Figure\
    \ 11-6](#9781430245421_Ch11.xhtml#_Fig6). Some easy windows\n\nEach time it’s\
    \ actually creating a new `NSWindowController` instance, which loads a fresh copy\
    \ of the nib file, including all objects inside of it. In this case all we have\
    \ is a window, but you can put anything you like inside those nib files, including\
    \ for example controller objects for accessing Core Data.\n\n## Subclassing NSWindowController\n\
    \nOf course, often you’ll need a bit of your own code in your controller class.\
    \ You can easily subclass `NSWindowController` to suit your needs here as well.\
    \ Our next steps will be to create a subclass and create a new nib file for it\
    \ to load, and set up a way to call it from our main window and controller.\n\n\
    In Xcode, make a new class in the WindowLab project called `NotSoEasyWindowController`\
    \ by selecting **File** ![image](images/arrow.jpg) **New File** from the menu\
    \ and choosing *Cocoa* from the OS X section in the template selector.\n\nChoose\
    \ *Objective-C class*, and then specify that we want to make a subclass of *NSWindowController*.\
    \ Xcode will suggest `WLWindowController` as the name, but you should change it\
    \ to `WLNotSoEasyWindowController`. Check the *With XIB for user interface* checkbox,\
    \ and Xcode will also generate a `WLNotSoEasyWindowController.xib` file for us,\
    \ with the *File’s Owner* set to our new subclass, and with the *window* outlet\
    \ pre-connected. Xcode will prompt you to save the nib file, and ask which group\
    \ to add it to. Use the same group that we used with the Easy Window nib file\
    \ above, the WindowLab folder. Xcode generates `WLNotSoEasyWindowController.h`\
    \ and `WLNotSoEasyWindowController.m` files with some methods for us, but we’re\
    \ going to need to do some work on these files.\n\nWe’re making our own class\
    \ here, and there’s only one nib file that it’s intended to manage. Accordingly,\
    \ we can build in the name of the nib file so that anyone using this class only\
    \ needs to know about the class, not the name of the nib file itself. We can also\
    \ make things even easier for callers: assuming that anyone who creates an instance\
    \ of this class wants to load the nib file, let’s build the call to `window` right\
    \ into the `init` method. Do this by creating the following `init` method:\n\n\
    ```\n- init {\n\tif ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"\
    ])) {\n\t\t[self window];\n\t}\n\treturn self;\n}\n```\n\nThat’s the recommended\
    \ form of the standard `init` method, in which we call another `init` method in\
    \ the superclass, do work specific to our instance if it succeeds, and finish\
    \ up by returning a pointer to `self`. While we’re in here, let’s remove the `initWithWindow:`\
    \ method that Xcode generated for us because there’s no need for it to ever be\
    \ called.\n\nNow switch over to `MainMenu.xib`. Once again, make the window a\
    \ bit taller, duplicate the last button, and name it “Not So Easy.” Then open\
    \ `WLAppDelegate.h` in the Assistant Editor, and Control-drag from the button\
    \ over to `WLAppDelegate.h`, and add a new action called `loadNotSoEasyWindow`.\
    \ Open up the `WLAppDelegate.m` file, and add the following implementation for\
    \ that action:\n\n```\n// add this to WLAppDelegate.m:\n- (IBAction)loadNotSoEasyWindow:(id)sender\
    \ {\n    WLNotSoEasyWindowController *notSoEasyController = [[WLNotSoEasyWindowController\
    \ alloc] init];\n    [self.subWindows addObject:notSoEasyController];\n}\n```\n\
    \nWe’ll also need to add the following `#import` directive at the top of `WLAppDelegate.m`\
    \ so that the compiler knows about the new class when it’s compiling the app delegate:\n\
    \n```\n#import \"WLNotSoEasyWindowController.h\"\n```\n\nWith that in place, let’s\
    \ add a small bit of functionality to our window controller class, so that after\
    \ our nib file is created, we can make sure that our window is connecting up with\
    \ it as it should: a simple method that makes the computer beep when it’s called.\
    \ Unfortunately, we’ll need to add it by hand, but that’s easy to do.\n\nAdd the\
    \ following method declaration to `WLNotSoEasyWindowController.h`:\n\n```\n- (IBAction)beep:(id)sender;\n\
    ```\n\nThe whole contents of `WLNotSoEasyWindowController.m` should look like\
    \ this, with the new `beep:` action method added:\n\n```\n#import \"WLNotSoEasyWindowController.h\"\
    \n\n@interface WLNotSoEasyWindowController ()\n@end\n\n@implementation WLNotSoEasyWindowController\n\
    \n- init {\n    if ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"\
    ])) {\n        [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad\
    \ {\n    [super windowDidLoad];\n    \n    // Implement this method to handle\
    \ any initialization after your window controller's window has been loaded from\
    \ its nib file.\n}\n\n- (IBAction)beep:(id)sender {\n    NSBeep();\n}\n\n@end\n\
    ```\n\nOpen the `WLNotSoEasyWindowController.nib` file in an Interface Builder\
    \ canvas, and drag out a button from the *Object Library*, and title it “Beep!”\
    \ Control-drag from the Beep! button to the *File’s Owner* icon in the Object\
    \ Dock, and select the `beep:` action that we just added."
