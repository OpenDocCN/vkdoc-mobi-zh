    look like [Figure 9-8](#9781430245421_Ch09.xhtml#Fig8). Then, switch to the *Attributes
    Inspector*, and change the Behavior pop-up menu from None to Editable. If we don’t
    make this change, we won’t be able to actually enter the name of a new band in
    the table view.    ![9781430245421_Fig09-08.jpg](images/9781430245421_Fig09-08.jpg)    [Figure
    9-8](#9781430245421_Ch09.xhtml#_Fig8) .  Setting bindings for the Mythical Bands
    table view    Lastly, we’ll deal with the Search box. Select the Search field
    at the upper right corner of the screen, and open the *Bindings Inspector*. Near
    the bottom of the *Bindings Inspector* is a section titled Predicate. Open it
    up and check the *Bind to* checkbox, binding it to Mythical Bands.


    The *Controller Key* should say “filterPredicate.” Set the *Display Name* to “Name”
    and the predicate format to “name contains[c] $value” where $value indicates the
    contents of the search box, and name indicates the `MythicalBand` entity attribute
