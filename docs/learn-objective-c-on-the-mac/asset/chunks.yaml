    **第 3 章 灯光、相机……动作！（以及输出口，也是）**


    在了解一些理论之后，我们将构建一个应用。我们的应用将有一个包含标签、文本字段和滑块的单一窗口。当用户移动滑块时，文本字段会自动更新以反映滑块的值。在本章中，我们仍然不会编写任何代码；所有操作都将使用
    Interface Builder 完成——但请耐心等待，因为我们将在下一章启用 Objective-C 编译器。Cocoa 用户界面与应用程序代码交互的方式，正是
    Cocoa 控件相互交互的方式。我们将从将 Cocoa 控件连接在一起开始，以了解其工作原理，然后在下一章开始将它们连接到我们自己的代码。


    这个应用很简单，但创建它所使用的机制与您几乎在 Cocoa 中所有用户交互中使用的机制相同，因此理解本章内容非常重要。


    **框架，无处不在**


    在 Mac OS X 中，Apple 将代码和支持文件分组到称为框架的特殊文件夹（或称*包*）中。框架类似于大多数平台上使用的库，但它们更灵活，因为它们是文件夹而非平面文件。

