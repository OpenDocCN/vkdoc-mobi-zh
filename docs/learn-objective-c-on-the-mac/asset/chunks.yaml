- fmt: '# To Use a Panel, or Not to Use a Panel


    Since we’re not going to modify the basic appearance of windows, we’ll be using
    either `NSWindow` or its subclass `NSPanel` to display the controls and other
    views in our application. The core elements of our application will usually be
    in an `NSWindow`, while `NSPanel` is used for auxiliary windows, such as the Show
    View Options panel in Finder. From a user’s standpoint, there are just a few critical
    differences between `NSWindow` and `NSPanel`:


    - `NSPanel` instances normally become invisible when another application becomes
    the active application and reappears when its own application becomes active again.

    - An `NSPanel` can be made to “float” in front of all the other windows in its
    application, including the main window.

    - An `NSPanel` can be easily configured to not become the key window unnecessarily,
    so a user can click a button in an auxiliary panel and then continue typing in
    the main window.


    # Window Attributes


    In the WindowLab project in Xcode, navigate to the *MainMenu.xib* file and single-click
    to open it in an Interface Builder canvas. One of the objects included in the
    application nib file is, as always, a window. Click to select it in the main nib
    window, then open the *Attributes Inspector* so that we can explore it a bit (see
    [Figure 11-2](#9781430245421_Ch11.xhtml#Fig2)). In earlier chapters, we used this
    Inspector for setting a window’s title, but of course there’s more we can do here.


    ![9781430245421_Fig11-02.jpg](images/9781430245421_Fig11-02.jpg)


    [Figure 11-2](#9781430245421_Ch11.xhtml#_Fig2). The Attributes Inspector for an
    NSWindow


    We’re already familiar with the *Title* text field. Just below that is the *Autosave*
    field, which provides a very nice bit of functionality: enter a text string in
    this field, and the window will use that string as a key in the `NSUserDefaults`
    system, storing and retrieving its position and location based on that key. That
    means that as a user rearranges the windows in our application, the window positions
    are saved in the user’s preferences, and the windows will appear in the same locations
    the next time they run our app. And all we have to do to make it happen is fill
    in this text field for each window in our app, entering a unique value for each
    window.


    Next, there are some checkboxes that let us turn off some of the standard window
    controls. Note that turning off these checkboxes won’t remove the corresponding
    buttons from the window’s title bar; it will just make them permanently grey and
    inactive while our app is running. Below that are some checkboxes that for tweaking
    a window’s appearance, including enabling textured mode, disabling the drop-shadow
    behind the window, and more. The options that mention *Toolbar* here are referring
    to the optional `NSToolbar` that can be attached to a window, which we’ll explain
    a little later in this chapter. We can also remove a window’s title bar. This
    is generally a bad idea, since the user won’t be able to reposition the window,
    but might be useful for an application like a game that takes over the whole screen.


    The next chunk of checkboxes lets us fine-tune the window’s behavior in a number
    of ways, most of them self-explanatory. One exception is the *Auto Recalculates
    View Loop* checkbox, whose name is puzzling at best. Here’s the idea: each window
    maintains a list of all the view objects it contains, which the user can shuffle
    between by using the Tab key. If we turn this checkbox on, then any views that
    are added to the window while the app is running will automatically be inserted
    somewhere into this “loop.” Another exception is the *Restorable* checkbox. Turning
    on *Restorable* tells Cocoa that our window should attempt to be restored to the
    same state between application launches.


    With some help from us, our app can reopen the windows that were open when the
    user quit, and even restore them to the same scroll position and selections that
    were in place when the user quit.


    Below that you’ll find a series of menus that deal with how the window interacts
    with the desktop. The Mac desktop environment has a feature called *Mission Control*
    (located in the System Preferences app) that allows users to have more than one
    desktop (or space) and move windows between them, and to reveal all the windows
    or all the windows for a single application. In prior versions of Mac OS/X, Mission
    Control was two separate features called Spaces and Exposé, and that’s still how
    they’re referred to in the Attributes Inspector.


    In general, we’ll want to leave these as *Inferred Behavior*, which means that
    the window behaves normally. For Spaces, the other choices are *Can Join All Spaces*,
    which means that the window will always be visible, or *Move To Active Space,*
    which means that the window will move to the current space on becoming active
    rather than shifting the active desktop to the one where the window is. For Exposé,
    *Inferred Behavior* is the same as *Managed Behavior*, which means that the window
    responds normally to Exposé actions. The other choices are *Transient*, which
    causes the window to be hidden when Exposé is activated (which is the default
    for panels), and *Stationary*, which means that the window ignores Exposé entirely.
    The next option deals with whether this window should be included in the set of
    windows that the user can rotate through using the **Window** ![image](images/arrow.jpg)
    **Cycle Through Windows** (![images](images/arrow3.jpg)-``) command. Next up is
    whether the window supports a Full Screen option, where the window expands into
    its own space and takes up the whole display, like an iOS application, including
    hiding the menu bar. If this is set to *Primary Window*, a special control is
    shown in the right-hand side of the title bar to activate full screen mode.


    Finally, there are options related to a window’s memory usage. It’s best to leave
    *Deferred* on because this skips the allocation of some internal memory for the
    window until it’s about to actually display the window. Also, we should leave
    *One Shot* turned off. If it’s on, that same internal memory is freed as soon
    as the window is closed, so this should only be turned on in case the window in
    question is a temporary window that can only be shown once per session, such as
    a splash screen. Finally, a pop-up window offers us the ability to switch the
    window’s “backing store” from *Buffered* to *Retained* or *Unretained*. Never
    do that! The *Retained* and *Unretained* options are only there to support specific
    sorts of legacy code, and all new Cocoa applications should leave this set to
    *Buffered* for every window.


    Now pull an `NSPanel` out from the *Object Library* window, and look again at
    the *Attributes Inspector*; note the Style pop-up menu and a couple of added checkboxes
    in addition to the options we saw when inspecting an `NSWindow`. The style options
    here are *Utility*, which if chosen gives the panel a distinctive appearance,
    as well as making it float above the application’s other windows; and *HUD*, which
    gives the window the even more distinctive “heads-up” appearance. Try out some
    of these styles and see how they affect the panel’s appearance. The behavior of
    a panel can vary from a window, as well. A panel can be marked as an Auxiliary
    Window in the *Full Screen* pull-down, which means that it will float over a window
    in Full Screen mode in the same space. This is useful for things like Find or
    Info panels that affect a document in another window. After exploring, delete
    the panel from the nib file.


    # Standard System Panels


    In addition to the generic window classes that are meant for us to fill with our
    own views and controls, Cocoa includes some specialized window subclasses for
    use in our applications.'
