    \ bug 引起的意外结果。\n\n由于异常在 Cocoa 中的作用相当有限，你通常不会在 Cocoa 应用中看到大量的异常处理代码。与 Java 不同，Objective-C\
    \ 不要求（甚至不允许）其方法指定它们可能抛出哪些类型的异常，理论上你根本*不必*处理它们。默认情况下，你创建的每个 Cocoa 应用都会有一个顶层的异常处理器，它只是简单地将有关异常的一些信息输出到系统日志，然后让应用尽力继续运行。不幸的是，这算不上什么好策略，因为发生异常时应用正在做的事情很可能是在响应用户的上一个操作（点击按钮、按键等），而该操作在此之后本应执行的其他操作都被直接跳过了，这可能会使应用程序处于未定义或不一致的状态！\n\
    \n有些应用程序会安装自己的特殊顶层异常处理器来处理这些情况。例如，Xcode 偶尔会遇到异常（是的，即使是 Xcode 也有 bug！），这时它通常会为用户提供退出应用的机会，并意识到可能有些事情搞砸了。\n\
    \n## 创建一个测试平台\n\n让我们构建一个小的应用程序，演示 Cocoa 程序员可能遇到的几种常见异常。在 Xcode 中，创建一个新的 Cocoa\
    \ 应用程序（这次不涉及 Core Data 或文档），命名为 “ExceptionCity”，并指定 “EC” 作为类前缀。我们创建的应用程序将自动包含一个名为\
    \ `ECAppDelegate` 的类。\n\n我们的应用委托将是一个非常简单的类，包含 `applicationDidFinishLaunching:`\
    \ 委托方法，该方法会调用三个不同的“工具”方法，每个方法都演示一个可能导致运行时抛出异常的常见 Cocoa 陷阱。\n"
- fmt: "### 排版后内容\n\n如果所有三个方法都成功完成并返回，我们将看到一个祝贺性的警告面板（这正是我们一直想要的）。然而，每个实用方法都存在一个问题，会引发异常。我们的目标是找到并修复每个问题。以下是`ECAppDelegate.m`文件的完整内容：\n\
    \n```objc\n#import \"ECAppDelegate.h\"\n\n@implementation ECAppDelegate\n\n- (void)invalidArgumentException_unrecognizedSelector\
    \ {\n    // The downside of dynamism is the occasional type mismatch.\n    //\
    \ For instance, it's sometimes hard to be sure what's coming\n    // out of an\
    \ array.  Imagine this array is created somewhere...\n    NSArray *nameComponents\
    \ = @[@\"Thurston\",\n                                @\"Howell\",\n         \
    \                       [NSNumber numberWithInt:3]];\n\n    // ... and accessed\
    \ later on, by code that just assumes all the\n    // array's items are strings:\n\
    \    NSInteger nameComponentLength = 0;\n    for (NSString *component in nameComponents)\
    \ {\n        nameComponentLength += [component length];\n    }\n    NSLog(@\"\
    Total length of all name components: %ld\",\n          (long)nameComponentLength);\n\
    }\n\n- (void)invalidArgumentException_insertNil {\n    // Assuming we have an\
    \ array to put things into...\n    NSMutableArray *array = [NSMutableArray array];\n\
    \n    // ... we can add an object to it.\n    id object1 = @\"hello\";\n    [array\
    \ addObject:object1];\n\n    // But suppose we take a method parameter or instance\
    \ variable\n    // whose value we haven't checked to make sure it wasn't nil...\n\
    \    id object2 = nil;\n\n    // ... and try to add it to the array?\n    [array\
    \ addObject:object2];\n    NSLog(@\"inserted all the objects I could!\");\n}\n\
    \n- (void)rangeException {\n    // Assuming we have an array of things...\n  \
    \  NSArray *array = @[@\"one\", @\"two\", @\"three\"];\n\n    // ... we can ask\
    \ for the index of an item...\n    NSUInteger indexOfTwo = [array indexOfObject:@\"\
    two\"];\n\n    // ... and we can later retrieve that value using the same index.\n\
    \    NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\n    // But, what\
    \ if we try to find the index for something that's not\n    // there?\n    NSUInteger\
    \ indexOfFive = [array indexOfObject:@\"five\"];\n\n    // And we forget to check\
    \ the return value to make sure it's not\n    // NSNotFound?\n    NSLog(@\"found\
    \ indexed item %@\", array[indexOfFive]);\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    [self invalidArgumentException_unrecognizedSelector];\n\
    \    [self invalidArgumentException_insertNil];\n    [self rangeException];\n\
    \    NSRunAlertPanel(@\"Success\", @\"Hooray, you fixed everything!\",\n     \
    \               nil, nil, nil);\n}\n\n@end\n```\n\n运行这段代码。承诺的警告面板不会出现（但默认 nib\
    \ 文件中包含的空窗口会出现）。然而，会发生的是，类似下面的内容将出现在 Xcode 的调试输出中：\n\n```\n2013-02-07 00:25:12.756\
    \ ExceptionCity[43532:303] -[__NSCFNumber length]: unrecognized selector sent\
    \ to instance 0x387\n```\n\n如果你回顾一下`invalidArgumentException_unrecognizedSelector`方法及其注释，你大概能看出问题出在哪里：我们的数组包含一个`NSNumber`，它没有`length`方法，因此引发了一个异常。我们没有做任何事情来显式处理异常，它最终沿着调用栈一直往下，没有得到处理，这导致了之前提到的默认行为：关于异常的一些信息（具体是它的`reason`）被记录，应用程序跳过当前事件的剩余部分。在此例中，正在处理的事件是应用程序启动，此时启动已经完成。\n\
    \n如果我们没有为你指出那个方法，情况就不会那么清楚。\n\n记录的异常信息没有告诉我们异常来自哪里、异常的名称，或者其他任何可能帮助我们找到触发异常的代码部分的信息。这时，我们的新朋友——Xcode\
    \ 调试器——就派上用场了。调试器允许我们在所有异常上设置断点，这样我们就可以在异常被抛出的那一刻暂停程序并尝试定位问题。\n\n### 调试器\n\n大多数开发者可能都熟悉调试器的概念，它允许你在应用程序运行时检查其状态，以便诊断问题。如果你之前没有接触过调试器，这里快速介绍一些关键概念：\n\
    \n- **断点** (*breakpoint*) 允许你指定程序应暂停的位置，可以是源代码中的行号，也可以是方法或函数的名称。你当前设置的所有断点都会显示在项目窗口左侧的“断点导航器”（Breakpoint\
    \ Navigator）中。当程序在断点处停止时，你可以检查程序执行到该位置时的所有 CPU 寄存器。如果你有程序的源代码，你还可以访问在该位置相关的任何变量（局部变量、实例变量或其他）。所有\
    \ CPU 寄存器和可用变量都显示在项目窗口底部 Xcode 调试区（Debug Area）的表格视图中。\n- **调用栈** (*call stack*)\
    \ 是任何时刻正在运行的所有嵌套方法和函数的列表。它显示在项目窗口左侧 Xcode 调试导航器（Debug Navigator）的表格视图中。当程序暂停时，当前方法或函数位于调用栈的顶部，调用它的方法或函数位于其下方，以此类推。你可以选择调用栈中的特定条目或“帧”来切换焦点，此时调试区将显示当该方法或函数调用调用栈中其上方的函数时的\
    \ CPU 寄存器和变量。\n- 调试器包含一些按钮，允许你对当前高亮的代码行执行某些操作。你可以**单步跳过**当前行（执行当前行剩余部分，然后在下一行暂停）、**单步进入**下一个方法或函数（将在被调用的下一个方法或函数的开头暂停）、**单步跳出**当前方法或函数（在调用者中返回后暂停），或者**继续**或**停止**程序。\n\
    - 调试器包含一个名为`lldb`的命令行界面（它是`gdb`命令的现代分支/重写版，`gdb`历史上是大多数基于 UNIX 的操作系统的标准命令），它允许你使用之前提到的所有功能，以及执行任意代码并检查结果。你可以通过像在源代码中那样输入\
    \ C 函数和 Objective-C 方法的名称来调用它们，并使用正在运行的程序的变量值作为消息接收者和参数。\n\n有关使用 Xcode 调试器的更多详细信息，请参阅\
    \ Xcode 文档中包含的“调试和优化你的应用”文档。\n\n在 Xcode 中，通过选择 **View** ![image](images/arrow.jpg)\
    \ **Navigators** ![image](images/arrow.jpg) **Show Breakpoint Navigator** 或按下\
    \ ![images](images/arrow3.jpg)**6** 来打开断点导航器视图。这会使得导航面板显示所有当前的断点（参见[图 13-1](#9781430245421_Ch13.xhtml#Fig1)）。\n\
    \n![9781430245421_Fig13-01.jpg](images/9781430245421_Fig13-01.jpg)\n\n[图 13-1](#9781430245421_Ch13.xhtml#_Fig1)\
    \ .  Xcode 的断点导航器，显示了一些断点。第一次使用时，左侧会有一个空列表\n\n断点导航器显示了 Xcode 当前为我们的项目配置的所有断点。由于我们刚刚创建了一个全新的项目，这个列表应该是空的！我们将通过添加一个异常断点来捕获应用程序中抛出的任何异常，从而改变这一状况。"
  raw: 'If all three methods manage to do their work and return, we’ll be rewarded
    by the appearance of a congratulatory alert panel (just what we always wanted).
    However, each utility method has a problem that will raise an exception. Our goal
    is to find and fix each problem. Here’s the complete content of the *ECAppDelegate.m*
    file:    ``` #import "ECAppDelegate.h"    @implementation ECAppDelegate    - (void)invalidArgumentException_unrecognizedSelector
    {     // The downside of dynamism is the occasional type mismatch.     // For
    instance, it''s sometimes hard to be sure what''s coming     // out of an array.  Imagine
    this array is created somewhere...     NSArray *nameComponents = @[@"Thurston",
                                    @"Howell",                                 [NSNumber
    numberWithInt:3]];            // ... and accessed later on, by code that just
    assumes all the     // array''s items are strings:     NSInteger nameComponentLength
    = 0;     for (NSString *component in nameComponents) {         nameComponentLength
    += [component length];     }     NSLog(@"Total length of all name components:
    %ld",           (long)nameComponentLength); }    - (void)invalidArgumentException_insertNil
    {     // Assuming we have an array to put things into...     NSMutableArray *array
    = [NSMutableArray array];            // ... we can add an object to it.     id
    object1 = @"hello";     [array addObject:object1];            // But suppose we
    take a method parameter or instance variable     // whose value we haven''t checked
    to make sure it wasn''t nil...     id object2 = nil;            // ... and try
    to add it to the array?     [array addObject:object2];     NSLog(@"inserted all
    the objects I could!"); }    - (void)rangeException {     // Assuming we have
    an array of things...     NSArray *array = @[@"one", @"two", @"three"];            //
    ... we can ask for the index of an item...     NSUInteger indexOfTwo = [array
    indexOfObject:@"two"];            // ... and we can later retrieve that value
    using the same index.     NSLog(@"found indexed item %@", array[indexOfTwo]);
               // But, what if we try to find the index for something that''s not
        // there?     NSUInteger indexOfFive = [array indexOfObject:@"five"];            //
    And we forget to check the return value to make sure it''s not     // NSNotFound?
        NSLog(@"found indexed item %@", array[indexOfFive]); }    - (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification {     [self invalidArgumentException_unrecognizedSelector];     [self
    invalidArgumentException_insertNil];     [self rangeException];     NSRunAlertPanel(@"Success",
    @"Hooray, you fixed everything!",                     nil, nil, nil); }    @end
    ```    Run this code. The promised alert panel won’t appear (but the empty window
    included in the default nib file will). What will happen, though, is that something
    like the following will appear in Xcode’s debug output:    ``` 2013-02-07 00:25:12.756
    ExceptionCity[43532:303] -[__NSCFNumber length]: unrecognized selector sent to
    instance 0x387 ```    If you look back at the `invalidArgumentException_unrecognizedSelector`
    method and its comments, you can probably see where this is coming from: our array
    contains an `NSNumber`, which doesn’t have a `length` method, and as a result
    an exception is raised. We’re not doing anything to explicitly deal with the exception,
    and it ends up going all the way down the call stack without being handled, which
    leads to the default behavior mentioned earlier: some info about the exception
    (specifically, its `reason`) is logged, and the application skips the rest of
    the current event. In this case, the event being processed is the application
    launch, which is already done at this point.    If we hadn’t just pointed out
    that method for you, things wouldn’t be so clear.


    The logged exception info doesn’t tell us anything about where it came from, the
    name of the exception, or anything else that might help us find what part of our
    code triggered the exception. This is where our new friend, the Xcode debugger,
    comes in. The debugger lets us set a breakpoint on all exceptions, so we can pause
    the program the moment an exception is raised and try to spot the problem.    THE
    DEBUGGER    Most developers are probably familiar with the concept of a debugger,
    which lets you inspect the state of your application while it’s running in order
    to diagnose problems. If you haven’t encountered a debugger before, here’s a quick
    rundown of some of the key concepts:    *   A *breakpoint* lets you specify, either
    with a line number in your source code or the name of a method or function, a
    spot where the program should halt. All the breakpoints you’ve currently set up
    are shown in the Breakpoint Navigator on the left side of the project window.
    When your program stops at a breakpoint, you can examine all CPU registers at
    that spot in the program’s execution. If you have the source code for the program,
    you can also access any variables (local, instance, or otherwise) that are relevant
    at that spot. All CPU registers and available variables are shown in a table view
    in Xcode’s Debug Area at the bottom of the project window. *   The *call stack*
    is the list of all the nested methods and functions that are in operation at any
    point in time. This appears in a table view in Xcode’s Debug Navigator on the
    left side of the project window. When your program is halted, the current method
    or function appears at the top of the call stack, the method or function that
    called it appears below it, and so on. You can choose a particular item or “frame”
    in the call stack in order to switch focus, at which point the Debug Area will
    display the CPU registers and variables as they were when that method or function
    called the method or function above it in the call stack. *   The debugger contains
    buttons that let you perform some actions relative to the currently highlighted
    code line. You can step over the current line (which executes the rest of what’s
    on the current line and then halts at the next line), step into the next method
    or function (which will halt at the beginning of the next method or function that’s
    called), step out of the current method or function, halting in the caller just
    after returning, or continue or stop the program. *   The debugger contains a
    command-line interface called `lldb` (a modern offshoot/rewrite of the `gdb` command
    that has historically been standard on most UNIX-based operating systems) which
    lets you use all the functionality mentioned before, as well as execute arbitrary
    code and examine the results. You can call C functions and Objective-C methods
    by typing their names just as you would in our source code, and use values from
    the running program’s variables as message recipients and parameters.    For more
    detailed information on using the Xcode debugger, see the Debug and Tune Your
    App document included with the Xcode documentation.    In Xcode, open the Breakpoint
    Navigator view by selecting **View** ![image](images/arrow.jpg) **Navigators**
    ![image](images/arrow.jpg) **Show Breakpoint Navigator** or by pressing ![images](images/arrow3.jpg)**6**.
    This makes the navigation panel show all the current breakpoints (see [Figure
    13-1](#9781430245421_Ch13.xhtml#Fig1)).    ![9781430245421_Fig13-01.jpg](images/9781430245421_Fig13-01.jpg)    [Figure
    13-1](#9781430245421_Ch13.xhtml#_Fig1) .  Xcode’s Breakpoint Navigator, showing
    a couple of breakpoints. Your first time here, you’ll have an empty list on the
    left    The Breakpoint Navigator shows all the breakpoints that Xcode currently
    has configured for our project. Since we’ve just created a brand-new project,
    this list should be empty! We’ll change that by adding an exception breakpoint
    to catch any exception that is raised in our app.'
