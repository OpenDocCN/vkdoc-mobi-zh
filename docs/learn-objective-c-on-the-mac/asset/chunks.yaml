    Total length of all name components: 15 2013-02-10 23:57:55.576 ExceptionCity[71731:303]
    inserted all the objects I could! 2013-02-10 23:57:55.576 ExceptionCity[71731:303]
    found indexed item two (lldb) ```    We’ve halted once again, due to another exception.
    Just like before, click the `objc_exception_throw` line in the Debug Navigator,
    and examine the exception to find the problem.    ``` (lldb) po $rax $0 = 4300330528
    *** -[__NSArrayI objectAtIndex:]: index 9223372036854775807 beyond bounds [0 ..
    2] (lldb) po [$rax name] $1 = 0x00007fff783e0a10 NSRangeException ```    Crikey!
    That’s one big index value. Now look at the call stack again, and click on the
    uppermost item within our code: `-[ECAppDelegate rangeException]`. This will highlight
    the following line in the text editor:    ``` NSLog(@"found indexed item %@",
    array[indexOfFive]); ```    This line actually makes two calls: first to the `objectAtIndex:`
    method (implicit in the new Objective-C array accessor syntax that Apple includes
    starting with Xcode 4.5), then to the `NSLog` function. A glance at the call stack
    shows that the `objectAtIndex:` method is the one complaining. Apparently it doesn’t
    like the value contained in `indexOfFive`. If we look in the variable view, or
    type `p indexOfFive` (note the use of `p` for standard C types, as opposed to
    `po` for Objective-C objects), we’ll see `9223372036854775807`. That does seem
    a bit high! If we look at the code where it’s set, just two lines earlier, we’ll
    see this:    ``` NSUInteger indexOfFive = [array indexOfObject:@"five"]; ```    That
    line is asking `array` for the index of an object that it doesn’t actually contain.
    In this case, `NSArray` returns a special integer value called `NSNotFound`, which
    is defined to be the maximum possible integer value. On Mac OS X running in 64-bit
    mode, that turns out to be `9223372036854775807`. This value is used to tell the
    caller that, “Hey, that object you want the index of? I don’t have it.” This is
    pretty useful to know! A consequence of this is that whenever we get a value from
    `indexOfObject:`, we really have to check to make sure that it’s not `NSNotFound`.
    In our case we know exactly where the problem is, so we could just check that
    second time, but it’s good to make a habit of always checking that return value,
    so we’ll update the entire method like this:    ``` - (void)rangeException {     //
    Assuming we have an array of things...     NSArray *array = @[@"one", @"two",
    @"three"];            // ... we can ask for the index of an item...     NSUInteger
    indexOfTwo = [array indexOfObject:@"two"];            if (indexOfTwo != NSNotFound)
