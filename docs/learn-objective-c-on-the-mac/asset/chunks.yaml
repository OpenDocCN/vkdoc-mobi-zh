    ![9781430245421_Fig02-13.jpg](images/9781430245421_Fig02-13.jpg)


    [Figure 2-13](#9781430245421_Ch02.xhtml#_Fig13). The standard Mac OS X color picker
    is used to select colors in Cocoa applications. Here, we’re using it in Interface
    Builder to set the color of our text.


    Xcode itself is built using Cocoa and leverages a lot of built-in Cocoa functionality,
    such as the standard color picker. The Apple engineers do not want to reinvent
    the wheel any more than you do. When you write your own applications, you’ll be
    able to use this exact same color picker with just a few lines of code or, in
    some situations, without writing any code at all.


    Another piece of built-in Mac OS X functionality that you’ll be able to use in
    your applications is the standard font window, which allows you to change the
    font, size, and attributes of selected text. When creating applications that will
    be distributed to others, it is important to realize that you could select fonts
    that your user won’t have installed. In general, for standard GUI components,
    you’re probably better not changing the fonts at all. Consistent font usage is
    an important part of the GUI consistency that the Mac is known for. Most labels,
    buttons, and other controls use the Lucida Grande font by default. You can change
    the size of some labels, and switch them between bold and regular to highlight
    different things, but leave the font itself as it is.


    Xcode provides guidance in the Font field of the *Attributes Inspector*, as shown
    in [Figure 2-14](#9781430245421_Ch02.xhtml#Fig14). Although the Font panel is
    available, Xcode also offers a callout window with quick access to the system-default
    fonts. If you know that you want the bold version of whatever is currently the
    system font, you can get it easily from the Font pull-down menu in this callout.
    Generally, this is what you’ll want to use for common user-interface elements,
    rather than explicitly setting the font.


    ![9781430245421_Fig02-14.jpg](images/9781430245421_Fig02-14.jpg)


    [Figure 2-14](#9781430245421_Ch02.xhtml#_Fig14). Xcode has a special font-selector
    callout to give easy access to the default fonts.


    Press `NT` to bring up the font window in Xcode. Make sure that our label is still
    selected (look for the resize handles), and also make sure that our application’s
    main window is still the front-most window.


    Once we have our label looking just the way we like, we’ll put some finishing
    touches to our application, then run it. We’re almost there!


    ## Creating the Application Icon


    One thing that all applications need is an icon. Mac OS X uses a special format
    for icons that bundles multiple images together in order to provide images in
    multiple sizes and resolutions for use when zooming and for devices with Retina
    displays. However, Xcode will prepare this format for us. We just need to name
    our images appropriately and put them into a folder with a `.iconset` extension.


    The naming convention is pretty straightforward. An example image name is `icon_128x128@2x.png`.
    Each image’s name starts with `icon_`, followed by the resolution, followed by
    an optional marker to indicate high-resolution artwork, followed by the file extension,
    such as `.png`. The full set of sizes utilized by Cocoa is 16 × 16, 32 × 32, 128
    × 128, 256 × 256, and 512 × 512. Each of these can optionally have a high-resolution
    marker of `@2x`. Note that the sizes are in screen points, not pixels; a 512 ×
    512 `@2x` file has a size of 1024 × 1024 pixels. Cocoa knows whether our app is
    running on a machine with a Retina or other high-resolution display and will choose
    the best bitmap to use given the screen’s pixel density and the needed size.


    If we don’t provide the image that Cocoa wants, it will scale one of the images
    that we did provide. We can provide a big image with incredible detail for when
    running on a Mac with a Retina display, but that might not look exactly the way
    we want. Support for multiple images means that we can tailor how the icon appears
    at smaller sizes.


    We need to start our icon in an image-editing program such as Photoshop, Pixelmator,
    or GIMP. The original file should be a size of 1024 × 1024 pixels and saved in
    a standard image format that supports alpha channels (transparency), such as TIFF,
    PSD, or PNG. For this example, we’re working with `.png` files. We’ll save it
    as `icon_512x512@2x.png`. We can then scale down the image in whatever method
    works best. This would typically be done by using our image editor’s resize functions
    and then cleaning it up by hand as necessary.


    To save you the trouble of creating your own icon, we’ve provided a `hello world.iconset`
    folder with images that you can add to your project. You’ll find this folder in
    the downloaded project files for [Chapter 2](#9781430245421_Ch02.xhtml). If you’d
    rather roll your own, go right ahead, using the same naming conventions in the
    `hello world.iconset` folder for your images.


    ## Adding an Icon to our Project


    Whether you created an icon yourself or you are using ours, it’s time to add the
    icon to the project in Xcode. To do this, select the Project in the *Navigator*
    area on the left side of the screen. It’ll be the top item in the *Project Navigator*
    view; in our case, it’s labeled “Chapter2.” The project summary info will show
    up in the *Editor* area in the middle of the window, and the Chapter2 Target should
    be selected. Drag the `hello world.iconset` folder from the Finder to Xcode’s
    App Icon well in the middle of the window, as shown in [Figure 2-15](#9781430245421_Ch02.xhtml#Fig15).
    This tells Xcode that we want to import this file into our project.


    ![9781430245421_Fig02-15.jpg](images/9781430245421_Fig02-15.jpg)


    [Figure 2-15](#9781430245421_Ch02.xhtml#_Fig15). Dragging a file to the App Icon
    well to add the icon to the Xcode project.


    When we let go of the mouse button, the `.iconset` file will be copied into the
    project directory and added to the list of files. We can also have Xcode utilize
    a file that lives outside the project directory, but for now we want to have everything
    in one place.


    ## Property Lists


    `Info.plist` is a special kind of file known as a *property list*. Property lists
    are used extensively throughout OS X. Although end users rarely see them, they
    are used in many parts of Cocoa development, so you will see them a lot.


    Property list files are made up of a list of entries. Each entry is made up of
    a key and a value. [Figure 2-16](#9781430245421_Ch02.xhtml#Fig16) shows Xcode’s
    built-in Property List Editor, editing the file `Chapter2-Info.plist`. Each row
    represents a single entry. As you can see, the Property List consists of three
    columns. The left column is labeled *Key* and the right column is labeled *Value*.
    The middle column, labeled *Type*, indicates the data type; most property list
    values are Strings, but other types may be seen from time to time.


    ![9781430245421_Fig02-16.jpg](images/9781430245421_Fig02-16.jpg)


    [Figure 2-16](#9781430245421_Ch02.xhtml#_Fig16). `Chapter2-Info.plist` opened
    in the editing pane so we can see the name of this application’s icon file.


    **Note** Property lists also have the ability to store multiple values under a
    single key. It is possible to store either an array (or list) of items under a
    single key, or even to store another whole set of keys and values under one key.
    It’ll be a while before you need that functionality, but we figured you should
    know it was possible.


    In [Figure 2-16](#9781430245421_Ch02.xhtml#Fig16), the entry with the key `Icon
    file` is highlighted.'
