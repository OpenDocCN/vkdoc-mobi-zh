    # 排版后的文本


    在 Xcode 和文档中，属性和关系统称为**属性**，Objective-C 2.0 中对同一术语的这种复用并非巧合。在模型对象内部，每个属性和每个关系都可以通过一个
    Objective-C 属性访问，该属性的名称与模型文件中定义的属性名称相同。在我们将要为 MythBase 构建的模型中，我们将创建一个包含多个属性的单一实体。我们将在第
    9 章中介绍关系。


    ## 使用 Xcode 的模型编辑器


    首先，在 Xcode 的导航面板中单击 `MythBase.xcdatamodeld` 文件。这将在 Xcode 内置的模型编辑器中打开模型文件，该编辑器列出了三个表格视图：*属性*、*关系*和*获取属性*，以及左侧的*实体*、*获取请求*和*配置*的大纲视图。按
    ![image](img/arrow2.jpg)3 打开*数据模型检查器*；由于我们尚未为实体定义任何结构，它将初始显示为“未选择”，如图 8-3 所示。模型编辑器有两种不同的视图样式：一种是最初包含三个表格视图的视图，另一种是类似于一张空白方格纸的视图。我们将使用默认的表格视图样式，如图
    8-3 所示，因为我们只有一个模型类。当处理复杂模型时，方格纸视图对于概览所有不同的实体及其相互关系非常有用。


    ![9781430245421_Fig08-03.jpg](img/9781430245421_Fig08-03.jpg)


    图 8-3. 创建任何实体之前的新模型文件


    ## 创建实体


    对于 MythBase，我们将创建一个名为 `MythicalPerson` 的单一实体，并包含少量属性。首先，通过单击窗口底部附近的“添加实体”按钮来创建一个新实体。正如您所料，这将在左侧的实体列表中创建一个名为
    Entity 的新实体。选中新实体后，其详细信息将在右侧的表格视图中可见。将新实体的名称更改为“MythicalPerson”，其余控件保持默认状态。我们的实体是一个名为
    `NSManagedObject` 的类的实例，这是 Core Data 中包含的一个通用类，为 Core Data 的模型对象提供了所有基本功能。稍后，我们将需要为该实体编写一些代码，届时我们将创建
    `NSManagedObject` 的自定义子类，但目前这个通用类就足够了。


    现在让我们创建我们的实体。我们已经做了一些对象建模，并提出了一个神话人物可能具备的几个特征。


    `MythicalPerson` 实体将包含六个属性。这些属性见表 8-1，其中包含每个属性类型的一般描述以及相应的 Core Data 存储类型。


    表 8-1. MythicalPerson 属性


    | 属性名称 | 通用类型 | Core Data 类型 |

    | --- | --- | --- |

    | 姓名 | 字符串 | String |

    | 详情 | 字符串 | String |

    | 神性 | 整数 (0-100) | Integer 16 |

    | 善良度 | 整数 (0-100) | Integer 16 |

    | 力量值 | 整数 (0-100) | Integer 16 |

    | 图像 | 图片 | Transformable |


    Core Data 包含 `String` 和 `Date` 类型，以及一系列数字类型：`Integer 16`、`Integer 32`、`Integer
    64`、`Float`、`Double`、`Decimal` 和 `Bool`。此外，它还包含一种 `Binary` 类型，允许通用存储我们可能想要附加到实体的任何数据（我们自行将其打包成二进制块），以及一种特殊的
    `Transformable` 类型，允许许多原本不受支持的 Cocoa 类（例如 `NSImage`）与 Core Data 一起存储（稍后会详细介绍）。请注意，Core
    Data 存储类型与 Cocoa 中的值类（如 `NSString`、`NSNumber` 等）名称不同。


    当 Core Data 属性被读入正在运行的应用程序时，它们会被转换为最接近的 Cocoa 等价物，这意味着，例如，所有数字类型在应用程序中最终都会变成 `NSNumber`，并在保存时转换回底层的存储格式。


    ## 创建属性


    让我们开始创建 `MythicalPerson` 的属性。在 Xcode 中打开 `MythBase.xcdatamodeld` 文件，单击以选中 `MythicalPerson`
    实体，然后单击窗口顶部属性表格视图左下角的小 + 号。一个新建属性将出现在表格视图中。将其名称设置为“name”，类型设置为 String，然后按下回车键。


    现在查看右侧检查器中的复选框，分别标有*可选*、*瞬态*和*已索引*。默认情况下，*可选*处于选中状态，其他则未选中。*可选*的含义很明确。选中它意味着用户在创建或编辑对象时可以选择不为该属性输入值。至于其他复选框，选中*瞬态*可配置该属性不随其他数据一起保存（尽管
    Core Data 仍会跟踪对该属性的更改以提供撤销/重做支持），而选中*已索引*则为该属性启用索引，从而允许基于该属性快速搜索 Core Data 存储后端。对于
    `name` 属性，请确保*已索引*被选中，而其他选项未被选中。


    在复选框下方，您可以使用弹出列表指定属性的类型（这与表格视图中的弹出列表设置相同）。如果我们在主表格视图中将“name”指定为 String，那么在其正下方的空间中将出现一些附加选项。在这里，我们可以指定简单的验证规则，例如字符串的长度。我们还可以指定默认值，该值将在每次创建新的
    `MythicalPerson` 实例时出现。为默认值输入“Name”，其他字段留空。


    现在我们来处理 `details` 属性，它旨在保存所讨论的 `MythicalPerson` 的文本描述。单击*属性*表格视图下方的 + 按钮以添加一个新属性，并将新属性的名称更改为“details”。我们将以与
    name 属性略有不同的方式来配置此属性。它应该是 String 类型（从弹出列表中选择），并且*已索引*复选框应被选中，但在此情况下，*可选*复选框也应被选中，以便用户可以选择根据需要将此字段留空。此外，我们将默认值留空。


    接下来，我们将处理 `MythicalPerson` 的数字属性：`divinity`、`goodness` 和 `power`。创建一个新属性并将其命名为“divinity”，并将其类型设置为
    `Integer 16`，这是 Core Data 支持的最小整数类型。这次配置复选框，使其为可选，但既不是瞬态也不是已索引（因为我们预计没有实际需要使用神性值作为搜索参数来搜索
    MythicalPerson）。显示界面将发生变化，显示一些适用于所选类型的附加配置。在这里，我们可以通过指定最小值和最大值来设置一些自动验证规则，还可以指定此属性的默认值。


    在表 8-1 中，我们将神性定义为 0 到 100 之间的整数值，其理念是将角色定位在从人类到神祇的某个尺度上。例如，希腊神祇宙斯的神性值为 100，他的儿子赫拉克勒斯（其母阿尔克墨涅是普通人类）的神性值为
    50，而普通人类（例如赫拉克勒斯的母亲）的神性值为 0。通过为属性指定最小值和最大值，我们让 Core Data 帮助我们确保无法保存这些属性的无效值。输入
    0 作为最小值，100 作为最大值，50 作为默认值。参见图 8-4。'
- fmt: "## 排版后内容\n\n图 8-4 展示了正在编辑的实体/属性。  \n![9781430245421_Fig08-04.jpg](images/9781430245421_Fig08-04.jpg)\
    \  \n[图 8-4](#9781430245421_Ch08.xhtml#_Fig4)：这是在 Core Data 模型文件中编辑实体时的外观。\n\n\
    接下来我们将创建另外两个数值属性：`goodness` 和 `power`。它们同样以 0 到 100 的范围表示每个 `MythicalPerson` 的特性，并且其配置与\
    \ `divinity` 完全相同（当然，属性名称除外）。创建这些属性最简便的方法是：在表格视图中点击选中 `divinity` 属性，然后复制（![images](images/arrow3.jpg)\
    \ `C`），再粘贴两次（![images](images/arrow3.jpg) `V`），得到两个名为 \"divinity1\" 和 \"divinity2\"\
    \ 的新属性。将它们分别重命名为 \"goodness\" 和 \"power\" 即可 – 这两个新属性将具有与原始属性相同的最小值和最大值。\n\n###\
    \ 不支持类型的属性\n\n最后一个需要配置的属性是 `depiction`。如前所述，`depiction` 属性用于存储图像，而 Core Data 并不了解\
    \ Cocoa 中通常使用的 `NSImage` 类。幸运的是，Core Data 的 Transformable 类型提供了一种简单的方式来存储图像。创建一个新属性，命名为\
    \ \"depiction\"，然后将类型选择为 Transformable。注意，检查器（Inspector）会随之变化，显示 Transformable\
    \ 的配置选项。在检查器中，勾选 *Optional* 复选框（并取消其他选项）。Transformable 的配置选项非常简单：只有一个标签为 *Value\
    \ Transformer Name* 的文本字段。但实际上这里比表面上看起来更复杂。其原理是：Transformable 属性保存的是 Core Data\
    \ 并不真正理解的数据块；当 Core Data 从存储中读取这块数据时，会将其放入一个 `NSData` 对象（一个可以容纳任意数据块、充当 Objective-C\
    \ “包装器”的对象），然后通过一个转换器（transformer）—— 一个知道如何将一种对象转换为另一种对象的特殊类。在相反的方向，当对象即将被保存到存储中时，Core\
    \ Data 会获取新值并通过同一个转换器，只不过这次进行反向转换。\n\n在本例中，我们将使用一个名为 `NSKeyedUnarchiveFromData`\
    \ 的转换器。它能够根据包含对象键归档版本的 `NSData` 对象，生成任何类型的对象。什么是键归档？这里不做详细说明，但本质上键归档是一种以类字典格式归档或序列化对象所有实例变量的方式，以便日后重构该对象。这项技术在\
    \ Cocoa 中有多种应用，Cocoa 的所有类都内置了此功能。这意味着我们可以获取一个 `NSImage` 或任何其他 Cocoa 类的实例，并利用 `NSKeyedUnarchiveFromData`\
    \ 的反向转换将其塞入一个 `NSData` 对象中。如果我们通过实现 `NSCoding` 协议来以键值方式保存和加载我们自己的类的实例变量，我们也可以以相同方式归档自己的对象。\n\
    \n回到 `depiction` 字段，其思路是将转换器类的名称写入 *Value Transformer Name* 文本字段中。事实证明，键归档非常普遍，以至于在这种情况下（在\
    \ Xcode 的建模工具中为属性指定转换器），它被用作默认值。如果我们将该字段留空，实体将被配置为使用 `NSKeyedUnarchiveFromData`\
    \ 来将模型属性值与 `NSData` 相互转换以便存储。\n\n至此，我们已经为本章的 MythBase 应用程序定义了完整的模型，接下来让我们继续创建\
    \ GUI。\n\n---\n\n## 设计 GUI\n\n由于我们已经使用 Interface Builder 设计过几个用户界面，这里将快速讲解基本操作，并且不再提供每个检查器的快捷键。这个应用程序与\
    \ [第 6 章](#9781430245421_Ch06.xhtml) 中的 VillainTracker 应用程序类似。我们的用户界面将允许用户搜索神话人物数据库、添加和删除人物，以及更改他们的特性。此外，我们将使用\
    \ Cocoa 绑定来完成连接。\n\n### 自动生成 GUI\n\nXcode 3 包含一个名为 Core Data Entity Interface\
    \ Assistant 的功能，可以根据 Core Data 模型自动生成带有基本 CRUD（增删改查）功能的 GUI。这个功能在 Xcode 4 中被移除了，因此我们必须手动完成。事实证明这非常简单，而且通过前面章节的学习，这个过程应该感觉熟悉。不仅如此，Xcode\
    \ 生成的 UI 通常也需要大量清理工作。\n\n### 创建 MythBase 显示界面\n\n首先，在 Xcode 中单击 `MainMenu.xib`\
    \ 文件。在左侧的对象停靠栏中，打开名为 \"Window - MythBase\" 的主窗口。我们将拖拽出一个表格视图和一组字段，以便创建和编辑数据库中管理的神话人物的属性，因此我们首先将窗口拉高。将其拖拽至\
    \ 500 像素高。接着，在对象库中，于检查器底部的搜索字段中输入 \"search\"。对象库应显示一个对象：搜索字段。将搜索字段拖出对象库，放置到 MythBase\
    \ 主窗口的右上角，让蓝色参考线指示其位置。接下来，在对象库搜索字段中输入 \"table\"。将一个表格视图拖拽到 MythBase 窗口，将其放置在窗口的左边缘。将其拉宽以填充窗口宽度，直到它与右侧的垂直蓝色参考线连接。将表格视图放置在搜索字段下方，它将自动吸附在搜索字段下方几个像素的位置。\n\
    \n打开 *Attributes Inspector*（属性检查器），将表格视图的 *Content Mode*（内容模式）设置为基于视图（view-based）。将\
    \ *Column Sizing*（列大小调整）设置为 \"First Column Only\"（仅第一列）。在 *Content Mode* 下方，将表格视图设置为\
    \ 5 列。在设置表格视图为 5 列时，您可能会注意到表格视图下方闪过一个水平滚动条。新增加的列将位于表格视图的右侧之外，因此点击第二列并将其调整得更窄，直到所有五列都可见，如图\
    \ 8-5 所示。\n\n![9781430245421_Fig08-05.jpg](images/9781430245421_Fig08-05.jpg)\
    \  \n[图 8-5](#9781430245421_Ch08.xhtml#_Fig5)：为 MythBase 布局表格视图\n\n表格视图将显示我们为\
    \ `MythicalPerson` 实体定义的所有属性（`details` 除外），因此我们需要设置列标题的标签。在表格视图中，点击第一列的标题，直到它变为可编辑的文本字段。在该文本字段中输入\
    \ \"Name\" 以设置列标题。点击下一列，将其名称设置为 \"Divinity\"。将接下来三列的标题分别设置为 \"Power\"、\"Goodness\"\
    \ 和 \"Depiction\"。\n\n接下来，我们将添加一个指示器，用于显示搜索时找到的结果数量。在对象库搜索字段中输入 \"Label\"，然后将一个标签字段拖拽到窗口左侧、表格视图下方。一如既往，蓝色参考线会指示放置位置。将标签的标题设置为\
    \ \"# out of #\"，并调整其大小以使所有文本可见。\n\n我们下一组控件将是用于搜索、添加和删除记录的按钮。在对象库搜索字段中输入 \"Button\"\
    。Cocoa 有多种按钮样式，我们将得到一系列选择。对于这个应用，我们使用渐变按钮。"
  raw: 'xhtml#Fig4) to see some entity/attribute editing in progress.    ![9781430245421_Fig08-04.jpg](images/9781430245421_Fig08-04.jpg)    [Figure
    8-4](#9781430245421_Ch08.xhtml#_Fig4). This is what editing an entity in a Core
    Data model file looks like    Now we’re going to create the other two numeric
    values, `goodness` and `power`. These also express characteristics of each `MythicalPerson`
    on a scale from 0 to 100 and will have the exact same configuration as `divinity`
    (except, of course, for the name of the attribute itself). The easiest way to
    make these, giving them the exact same options, is to select the `divinity` attribute
    by clicking on it in the table view, then copy it (![images](images/arrow3.jpg)C),
    then paste it (![images](images/arrow3.jpg)V) twice, resulting in two new attributes
    named “divinity1” and “divinity2.” Rename those “goodness” and “power,” and that’s
    it; those two new attributes will have the same min and max values as the original.    Attributes
    for Unsupported Types    The last attribute left to configure is the `depiction`
    attribute. As mentioned earlier, the `depiction` attribute is meant to store an
    image, and Core Data doesn’t know anything about the `NSImage` class normally
    used in Cocoa. Fortunately, Core Data’s Transformable type provides a simple way
    to store an image anyway. Create a new attribute, naming it “depiction,” and then
    select Transformable as the type. Note that the Inspector changes to show the
    configuration options for Transformable. In the Inspector, turn the *Optional*
    checkbox on (and the others off). The configuration options for *Transformable*
    are pretty simple: a single text field labeled *Value Transformer Name*. However,
    there’s more here than meets the eye. The idea is that a *Transformable* attribute
    holds a chunk of data that Core Data doesn’t really understand; when Core Data
    reads this chunk of data from storage, it puts it into an `NSData` object (an
    object that can hang onto any old chunk of data, acting as an Objective-C “wrapper”
    for it), which it then passes through a transformer, a special class that knows
    how to take an object of one kind and transform it into something else. In the
    other direction, when an object is going to be saved to storage, Core Data takes
    the new value and passes it through the same transformer, however this time doing
    the transformation in the reverse direction.    In this case, we’re going to use
    a transformer called `NSKeyedUnarchiveFromData`, which knows how to produce an
    object of any kind, given an `NSData` object containing a key-archived version
    of the object. What is keyed archiving? We won’t go into it in detail here, but
    basically keyed archiving is a way of archiving or serializing all of an object’s
    instance variables in a dictionary-like format, making it possible to reconstruct
    the object later. This technology is used in a variety of ways in Cocoa, and all
    of Cocoa’s classes have this functionality built in. This means that we can take
    an `NSImage`, or an instance of any other Cocoa class, and stuff it into an `NSData`
    object using `NSKeyedUnarchiveFromData`’s reverse transformation. And if we implement
    the `NSCoding` protocol in our own classes, saving and loading their instance
    variables in a keyed fashion, we can archive our own objects in the same way.    Getting
    back to the depiction field, the idea is to write the name of the transformer
    class into the *Value Transformer Name* text field. As it turns out, keyed archiving
    is so widespread that in this situation, specifying a transformer for an attribute
    in Xcode’s modeling tool, it’s used as a default. If we just leave the field blank,
    the entity will be configured to use `NSKeyedUnarchiveFromData` to transform model
    attribute values to and from `NSData` for storage.    We’ve now defined the entire
    model for this chapter’s MythBase application, so let’s move on to creating the
    GUI.


    Designing the GUI    Since we’ve laid out several user interfaces using Interface
    Builder already, we’re going to go through the basics pretty quickly, and we won’t
    give the keyboard shortcuts for each inspector. This app will be similar to the
    VillainTracker app from [Chapter 6](#9781430245421_Ch06.xhtml). Our user interface
    will allow a user to search the database of mythical people, add and delete them,
    and change their characteristics. What’s more, we’ll be using Cocoa bindings to
    make the connections.    AUTOMATIC GUI    Xcode 3 included a feature called the
    Core Data Entity Interface Assistant for automatically laying out a GUI with basic
    CRUD features based on a Core Data model. This feature was removed in Xcode 4,
    so we have to do it by hand. As it turns out, this is really easy, and the process
    should feel familiar having worked through the previous chapters. Not only that,
    the UI generated by Xcode usually needed a bunch of cleanup anyway.    Creating
    the MythBase display    To start, in Xcode, single-click on the `MainMenu.xib`
    file. In the *Object Dock* on the left, open up the main window called “Window
    - MythBase.” We’re going to drag out a table view and a bunch of fields to allow
    us to create and edit the attributes of the mythical people managed by our database,
    so we’ll start by making the window taller. Drag it out to be 500 pixels high.
    Next, in the *Object Library*, type “search” in the search field in the bottom
    of the Inspector. The *Object Library* should show a single object, a Search Field.
    Drag the Search Field out of the *Object Library* and onto the main MythBase window,
    positioning it in the upper right-hand corner of the window, letting the blue
    guidelines indicate where to position it. Next, type “table” in the *Object Library*
    search field. Drag a Table View out to MythBase window, positioning it to the
    left edge of the window. Stretch it out to fill the width of the window, until
    it connects with the vertical blue guideline in the right. Position the table
    view below the search field; it will snap into place a few pixels below the search
    field.    Open the *Attributes Inspector*, and set the table view’s *Content Mode*
    to be view-based. Set the *Column Sizing* to be “First Column Only.” Below the
    *Content Mode*, set the table view to have five columns. While setting the table
    view to five columns, you may note a horizontal scroll bar flashing underneath
    the table view. The added columns will be off the right side of the table view,
    so click on the second column and resize it to be narrower until all five columns
    are visible, as shown on [Figure 8-5](#9781430245421_Ch08.xhtml#Fig5).    ![9781430245421_Fig08-05.jpg](images/9781430245421_Fig08-05.jpg)    [Figure
    8-5](#9781430245421_Ch08.xhtml#_Fig5). Laying out the table view for MythBase    The
    table view will show all of the attributes we’ve defined for the `MythicalPerson`
    entity except for `details`, so we’ll want to set labels in the column header.
    In the table view, click on the header of the first column until it turns into
    an editable text field. Type “Name” in the textfield to set the column title.
    Click in the next column, and set its name to “Divinity.” Set the titles of the
    next three columns to “Power,” “Goodness,” and “Depiction.”    Next, we’ll set
    up an indicator to show how many results are found when doing a search. In the
    *Object Library* search field, type “Label” and drag out a Label field to the
    left of the window, just below the table view. As always, the blue guidelines
    will indicate where to put it. Set the title of the label to “# out of #” and
    resize it so that all the text is visible.    Our next set of controls will be
    buttons to search, add, and delete records. In the *Object Library* search field,
    type “Button.” Cocoa has a variety of button styles, so we’ll get a healthy set
    of choices. For this app, let’s use Gradient buttons.'
