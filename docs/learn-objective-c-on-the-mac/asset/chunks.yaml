- fmt: '# Configuring an NSLevelIndicator to Show a Star Rating


    We also need to specify the maximum and minimum values that are valid for this
    control so that it knows how to display the value it’s given. Still in the *Attributes
    Inspector*, find the section labeled *Value* containing controls to set the minimum
    and maximum values. Set the minimum to 0 and the maximum to 10, either by typing
    numbers into these fields or using the small up/down buttons. A bit below those
    text fields is another labeled *Current*. Set that to 10 so that we can see the
    full range of stars in our control, and click the *Editable* checkbox so that
    the user can actually edit this value themselves, not just look at the pretty
    stars.


    Perhaps the control isn’t showing all 10 stars. As of this writing, the default
    size of a new `NSLevelIndicator` dragged from the Library is wide enough to show
    just over 7 stars, and no more. Fortunately, Xcode provides a handy shortcut that
    can help us rightsize a view to make it snugly fit around its content. Select
    **Editor** ![image](images/arrow.jpg) **Size To Fit Content** from the menu or
    press ![images](images/arrow3.jpg)= to make the level indicator expand to just
    the right size to show all 10 stars. Depending on how we laid out the `NSLevelIndicator`
    relative to the other fields, we may have created constraints that set up relationships
    between the sizes of the `NSLevelIndicator` and the other fields. If the other
    fields also resize when we resize the `NSLevelIndicator`, that’s OK. We can hit
    Undo (![images](images/arrow3.jpg)Z) and reposition the `NSLevelIndicator` away
    from the other fields to break the constraints, resize it as above, and then reposition
    it aligned with the left edges of the other fields.


    **Note**  For this app, we can ignore the Warning and Critical values, as they
    don’t have any effect on the Rating style of `NSLevelIndicator`. These values
    do have an effect on how the `NSLevelIndicator` is drawn in the Discrete and Continuous
    styles; we can also change the `NSLevelIndicator` back to Discrete or Continuous
    and then use Simulate Document to see what happens, but we need to set it back
    to Rating before we continue.


    Finally, it’s time once again to duplicate one of the existing labels in your
    window. Drag it into place to the left of the level indicator, and change the
    text to “Evilness:”.


    This might be a good time to once again test the interface by selecting **Simulate
    Document**. We should be able to click anywhere along the line of stars and cause
    the control to highlight just that amount.


    # Adding Radio Buttons in a Matrix


    Next, we’ll create the GUI for the `Primary Motivation` attribute. Years of careful
    study of comic books have taught us that every villain has a primary motivating
    factor that causes them to do their evil deeds, and this motivation can always
    be reduced to one of these five things: greed, revenge, bloodlust, nihilism, or
    insanity. Of course, some villains may have several of these evil-making forces
    at work, but we’ll settle for picking the main one for each villain we’re tracking.


    We’re going to use a set of *radio buttons* to let the user pick the primary motivation.
    Radio buttons are generally grouped in a set that works together, so that selecting
    one button simultaneously deselects all the other buttons. If “radio button” seems
    like a terribly obscure name for this, then perhaps you’re too young to remember
    the old car-radio tuner controls, prevalent up until the 1980s, that would let
    you select a radio station by pushing a mechanical button that would adjust the
    tuner to a particular station and at the same time cause the previously-pushed
    button to pop back to the “out” position. In any case, the term “radio buttons”
    is here to stay, and this control is a good choice when we have a small, predefined
    list of things to choose from and we’d like to keep the whole list onscreen at
    all times.


    In Cocoa, radio buttons are normally a group of `NSButtonCell` instances aligned
    inside an `NSMatrix`. We can find these preconfigured in the *Object Library*
    pane by typing “radio” into the Search field. It will bring up a *Radio Group*.
    Drag this out and drop it in the window, below the other controls. The default
    radio button matrix contains just two radio buttons but for this example we want
    five. Simply resizing the matrix by dragging one of the resize handles won’t help
    us here; that just stretches the existing buttons. Instead, try holding down the
    Option key while dragging the bottom-center resize handle downward. This will
    simultaneously resize the matrix and add new buttons inside to fill the empty
    space. Drag down until there are five buttons, then release the mouse button.


    **Tip**  Note that many of Cocoa’s GUI classes seem to have a “shadow” in the
    form of a *cell class* : `NSButton` has `NSButtonCell`, and so on. This division
    stems from performance issues in the past. In order to speed up drawing, some
    of the drawing duty was taken out of view classes and put into special cell classes
    instead. So in an `NSMatrix` full of buttons, instead of having a bunch of full-fledged
    `NSButton` instances, there are a bunch of simpler `NSButtonCell` instances.


    Now it’s time to fill in the values that will be displayed in each button’s title.
    Start with the top-most button; double-click to select the word “Radio,” then
    type in “Greed.” Do the same for the rest of the buttons, typing in “Revenge,”
    “Bloodlust,” “Nihilism,” and “Insanity,” as shown in [Figure 5-7](#9781430245421_Ch05.xhtml#Fig7).
    Note that this view doesn’t expand horizontally to contain the text we typed,
    so we need to do it ourselves by dragging the center-right resize handle and dragging
    to the right until all the text we entered is visible. This is also a case where
    the **Size to Fit Content** command can come in handy.


    ![9781430245421_Fig05-07.jpg](images/9781430245421_Fig05-07.jpg)


    [Figure 5-7](#9781430245421_Ch05.xhtml#_Fig7). What’s your primary motivation
    in life?


    Before we’re done, we need to assign a tag to each cell. We can use any integer
    as a tag for each cell, giving us a way to reference a cell through the matrix
    that contains it without needing to have an outlet for each individual cell. We
    want to give a unique tag to each cell in the matrix we just created, and for
    the sake of convenience let’s make them to start at zero for the uppermost cell
    and increment by one each step of the way down. Besides being a simple pattern
    to follow, this will also allow us to create an array of strings later on whose
    indexes in the array perfectly match their respective cell tags (since an `NSArray`
    uses zero-based indexing, where the first item is at index 0, the second at index
    1, and so on).


    Start with the first button, Greed. Selecting a cell in a matrix generally requires
    multiple clicks. The first click selects the matrix, then a second click tells
    the matrix that we want to focus on its insides, and the third click actually
    selects the cell. Once the cell is finally selected (you can tell by the highlighting),
    open the *Attributes Inspector* in the Utility area (![image](images/arrow2.jpg)4)
    and look for the *Tag* field at the very bottom in the *Cell* attributes. Set
    this to 0. Now select the Revenge button and set its tag to 1. Continue down the
    length of the matrix, ending with setting the tag for Insanity to 4.


    Now the radio buttons for letting the user specify a villain’s primary motivation
    are done! As we’ve done before, duplicate one of the labels, drag it down, place
    it above and slightly to the left of the radio button group, and change its title
    to “Primary Motivation:”. We should now have something similar to [Figure 5-8](#9781430245421_Ch05.xhtml#Fig8).


    ![9781430245421_Fig05-08.jpg](images/9781430245421_Fig05-08.jpg)


    [Figure 5-8](#9781430245421_Ch05.xhtml#_Fig8). More villain attributes than we
    can shake a stick at!'
