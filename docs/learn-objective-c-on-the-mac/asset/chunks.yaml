  trans: "\n切记，从后台线程向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息是不允许的。幸运的是，GCD 也为我们提供了处理这个问题的方法。在块内部，我们可以调用另一个调度函数，将任务传回主线程！为此，我们再次调用\
    \ `dispatch_async()`，这次传入的是由 `dispatch_get_main_queue()` 函数返回的队列。该函数始终为我们提供驻留在主线程上的特殊队列，随时准备执行那些需要用到主线程的块。添加此处所示的粗体代码行，将使所有\
    \ AppKit 调用都在主线程上执行：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
    \ = [NSDate date];\n    \n    __block NSString *fetchedData;\n    __block NSString\
    \ *processed;\n    __block NSString *firstResult;\n    __block NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n        fetchedData = [self fetchSomethingFromServer];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"Fetched: %@\\n\", fetchedData];\n \
    \       });\n        \n        processed = [self processData:fetchedData];\n \
    \       dispatch_async(dispatch_get_main_queue(), ^{\n            _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \                 @\"Processed: %@\\n\", processed];\n        });\n        \n\
    \        firstResult = [self calculateFirstResult:processed];\n        secondResult\
    \ = [self calculateSecondResult:processed];\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"First Result: [%@]\\nSecond Result:\
    \ [%@]\\n\\n\",\n                                       firstResult, secondResult];\n\
    \        });\n        \n        NSDate *endTime = [NSDate date];\n        NSLog(@\"\
    Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
    \        self.isWorking = NO;\n    });\n}\n```\n\n## GCD 中的并发块\n\n为了使这个程序的行为与之前使用\
    \ `NSOperationQueue` 的版本保持一致，且运行速度至少不慢于它，我们还需要再做一处修改。还记得吗？当我们设置队列中的操作时，我们通过依赖关系让\
    \ `calculateFirstResult` 和 `calculateSecondResult` 能够同时运行。我们声明了它们各自依赖于对 `processData`\
    \ 的前一个调用，而随后的 `finishWorking` 调用则依赖于它们两个。这样一来，操作队列就能够在可能的情况下同时运行这两个操作。但目前在我们的\
    \ GCD 版本中，情况并非如此。代码完全按顺序依次执行，总是在 `calculateFirstResult:` 完成之后才调用 `calculateSecondResult:`。\n\
    \n幸运的是，GCD 又一次提供了实现相同目标的方法，即使用所谓的*调度组*。在组上下文中异步调度的所有块都会尽可能快地执行，包括在可能的情况下分发到多个线程以进行并发执行。我们还可以使用\
    \ `dispatch_group_notify()` 来指定一个额外的块，该块将在组中的所有块都执行完毕后运行。\n\n如下所示：\n\n```\n- (IBAction)doWork:(id)sender\
    \ {\n  NSDate *startTime = [NSDate date];\n  dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString\
    \ *processed = [self processData:fetchedData];\n    __block NSString *firstResult;\n\
    \    __block NSString *secondResult;\n    dispatch_group_t group = dispatch_group_create();\n\
    \    dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{\n      firstResult\
    \ = [self calculateFirstResult:processed];\n    });\n    dispatch_group_async(group,\
    \ dispatch_get_global_queue(0, 0), ^{\n      secondResult = [self calculateSecondResult:processed];\n\
    \    });\n    dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{\n\
    \      NSString *resultsSummary = [NSString stringWithFormat:\n        @\"First:\
    \ [%@]\\nSecond: [%@]\", firstResult, secondResult];\n      dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n        [_resultsTextView setString:resultsSummary];\n      });\n      NSDate\
    \ *endTime = [NSDate date];\n      NSLog(@\"Completed in %f seconds\",\n     \
    \   [endTime timeIntervalSinceDate:startTime]);\n    });\n  });\n}\n```\n\n完成所有这些设置后，我们应该能够**运行**我们的应用程序，并看到与第一组改进后相同的运行表现和性能，但看不到我们使用\
    \ Cocoa Bindings 在工作执行期间改善 GUI 行为所做的额外改动。将相关改动应用到 GCD 增强版的 SlowWorker 这一任务，留给读者作为练习。\n\
    \n## 小并发，大不同\n\n现在，我们已经看到了一些具体的例子，展示了如何使用 `NSOperationQueue` 和 GCD 在应用程序中提供基本的并发支持。我们简单的示例项目并没有做什么有趣的事，但这些技术可以应用于任何涉及长时间活动、且我们不想让用户看到旋转的忙碌光标的情况。我们还学习了一些关于新块语法，以及如何利用它来创建准备在后台线程运行的工作单元的知识。\n\
    \n使用这些技术可以对您应用的**用户体验**产生巨大影响。当您的用户正在等待应用执行某些任务时，您都应该使用它们！选择使用 `NSOperationQueue`\
    \ 还是 GCD，由您自己决定。请记住，自 OS X 10.6 起，每一版发布中 `NSOperationQueue` 都是基于 GCD 实现的，因此无论选择哪种方式，您的应用都会拥有相似的性能特征。最终使用哪种方式，由您自行决定。\n\
    \n# 第 18 章\n\n# 未来之路\n\n现在，你已经到达了《在 Mac 上学习 Cocoa》的最后一章！希望你已对 Cocoa 的工作原理，以及如何使用其各个部分编写各种有趣的桌面应用程序有了很好的理解。然而，Cocoa\
    \ 框架确实非常庞大，我们对于所涉及的大多数类和概念的介绍，仅仅是蜻蜓点水。本书从不是一本包罗万象的 Cocoa 参考手册（你的电脑上已经随 Xcode 安装了一份），而是一本旨在引导你找到入门之路的指南。秉承这一精神，我们将以介绍其他技巧和资源作为本书的结尾，这些内容将帮助你在我们已学的基础上，更进一步地拓展你的\
    \ Cocoa 开发能力。\n\n我们将首先对之前提过但值得更多关注的一些设计模式稍作展开。接着，我们来看看如何使用 Objective-C 以外的语言进行\
    \ Cocoa 编程。最后，我们将探讨一些方法，将你辛苦学到的 Cocoa 技能应用到 Mac OS X 桌面以外的领域。\n\n## 更多 Cocoa 特性\n\
    \n本书中，我们花了大量篇幅讨论 MVC 模式，它帮助我们**将**应用程序**划分**为逻辑层；以及委托模式，它允许我们在控制器层中定义某些 GUI 对象的行为，而无需对\
    \ GUI 对象本身进行子类化。\n"
- fmt: "这些技术利用语言特性和约定来定义使用模式。沿着这条思路，Cocoa 还有更多妙招。其中之一是通知的概念（在某些圈子里被称为**观察者模式**），它允许一个对象在事件发生时通知一组其他对象。另一个是使用`block`来简化代码，避免使用完整的\
    \ delegate 甚至单个方法造成过度设计。我们在本书的其他地方已经看到了`block`的应用，但这里我们还会介绍一些其他有趣的用途。\n\n### 通知\n\
    \nCocoa 的`NSNotification`和`NSNotificationCenter`类提供了一种方式，让一个对象可以向一组其他对象发送消息，而这些对象之间无需互相了解。它们真正需要知道的只是通知的名称，这个名称可以是任何我们喜欢的内容。想要被通知的对象会提前注册为特定通知名称的观察者，而想要广播通知的对象则使用该名称向任何正在监听的观察者发送其消息。\n\
    \n例如，假设我们应用的多个部分需要在某个特定事件发生时进行更新，比如网络代码从 Web 服务器读取响应。使用通知，我们的网络代码无需知道每个想要获取信息的其他对象。相反，我们可以为网络代码和观察者定义一个共用的通知名称，最好放在一个所有相关类都能包含的头文件中，如下所示：\n\
    \n```objectivec\n#define DATA_RECEIVED @\"dataReceived\"\n```\n\n观察者可以在任何时候注册接收通知，但通常这发生在对象的初始化过程中。\n\
    \n```objectivec\n- (id)init {\n    if ((self = [super init])) {\n        [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \       selector:@selector(receiveNetworkData:)\n                            \
    \                         name:DATA_RECEIVED\n                               \
    \                    object:nil];\n    }\n    return self;\n}\n```\n\n这会告诉应用中唯一的`NSNotificationCenter`实例，当有人发布`DATA_RECEIVED`通知时，它应该通过调用调用者的`receiveNetworkData:`方法来通知它。注意最后一个参数我们传入了`nil`：如果我们在这里指定了一个对象，那么通知观察将仅限于该特定对象。其他任何对象发布相同的通知都不会产生任何效果。\n\
    \n为了使这项工作生效，观察者还需要实现注册时指定的方法。该方法始终接收`NSNotification`本身作为参数。\n\n```objectivec\n\
    - (void)receiveNetworkData:(NSNotification *)notification {\n    NSLog(@\"received\
    \ notification: %@\", notification);\n}\n```\n\n最后，任何将自己设为观察者的对象通常应该在稍后将其从观察者列表中移除。一种常见的惯用法是在任何曾经注册为观察者的类的`dealloc`方法中执行如下操作：\n\
    \n```objectivec\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter]\
    \ removeObserver:self];\n}\n```\n\n现在，回到通知的发送者本身，在我们的例子中，就是将要广播其状态的网络读取对象。这一过程非常简单：\n\
    \n```objectivec\nif (some condition is met) {\n    [[NSNotificationCenter defaultCenter]\n\
    \        postNotificationName:DATA_RECEIVED\n                      object:self];\n\
    }\n```\n\n其思想是，发送者可以像这样抛出一个通知，而通知中心负责实际的投递。\n\n发送者还可以通过一个字典的形式传递附加信息，供观察者检索，如下所示：\n\
    \n```objectivec\n// 在发送者中\nNSDictionary *info = @{@\"data\" : someData};\n[[NSNotificationCenter\
    \ defaultCenter]\n    postNotificationName:DATA_RECEIVED\n                  object:self\n\
    \                userInfo:info];\n\n// 在观察者中\nNSLog(@\"received data %@\", [[notification\
    \ userInfo] objectForKey:@\"data\"]);\n```\n\n通知是一种非常实用的方式，让应用的各个独立部分无需使用正式的 API\
    \ 就能相互通信。我们只需要决定几个代表各种事件的字符串，然后开始观察和发布即可。\n\n### Blocks\n\n[第11章](#9781430245421_Ch11.xhtml)和[第17章](#9781430245421_Ch17.xhtml)介绍了`block`，这是苹果几年前为\
    \ C 语言增加的一项特性。我们主要将`block`与 Grand Central Dispatch 提供的并发特性一起使用，`block`在这方面非常契合，但`block`还有更多用途。似乎每当\
    \ OS X 发布一个重要的新版本时，苹果都会扩展几个 Cocoa 类，添加一些以`block`作为参数的新方法。让我们来看看其中的一些。\n\n####\
    \ 枚举\n\n让我们从简单的东西开始：枚举。你可能已经熟悉了基于 C 的标准列表遍历方式，也许使用过`NSEnumerator`，甚至是从 OS X 10.5\
    \ 开始提供的快速枚举（“for-in”循环）。现在，`block`提供了另一种实现相同功能的方式。\n\n```objectivec\nNSArray *array\
    \ = @[@\"zero\", @\"one\", @\"two\", @\"three\"];\n\n// C风格枚举\nint i;\nfor (i\
    \ = 0; i < [array count]; i++) {\n    NSLog(@\"C enumeration accessing object:\
    \ %@\", array[i]);\n}\n\n// NSEnumerator，经典的Cocoa枚举方式\nNSEnumerator *aEnum = [array\
    \ objectEnumerator];\nid classicEnumerated;\nwhile ((classicEnumerated = [aEnum\
    \ nextObject])) {\n    NSLog(@\"NSEnumerator accessing object: %@\", classicEnumerated\
    \ );\n}\n\n// \"快速枚举\"，随 OS X 10.5 发布\nid fastEnumerated;\nfor (fastEnumerated\
    \ in array) {\n    NSLog(@\"Fast enumeration accessing object: %@\", fastEnumerated\
    \ );\n}\n\n// \"Block枚举\"，随 OS X 10.6 发布\n[array enumerateObjectsUsingBlock:^(id\
    \ blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration\
    \ accessing object: %@\", blockEnumerated);\n}];\n```\n\n我们传递给`enumerateObjectsUsingBlock:`的`block`接受三个参数并返回空值。这是该方法声明的`block`签名，我们必须遵循它。传入`block`的三个参数分别是：来自数组的一个对象、一个包含该对象在数组中索引的整数，以及一个通过引用传递的`BOOL`，我们可以通过将其值设置为`YES`来停止枚举。\n\
    \n这样看来，一开始可能不明显为什么`block`版本比其他版本更好，但事实上它确实结合了其他所有枚举方式的最佳特性。首先，它提供了当前对象的索引，这是之前基于\
    \ Objective-C 的两种方式都没有的。如果我们想要做一些事情，比如打印出数组中项目的编号列表，这将非常方便。我们无法告诉你为了轻松访问每个对象的索引值，我们有多少次又回到了\
    \ C 风格的迭代！此外，该方法还有一个变体，允许我们指定选项来定义枚举的运行方式，例如使其并发运行，如下所示：\n\n```objectivec\n[array\
    \ enumerateObjectsWithOptions:NSEnumerationConcurrent\n    usingBlock:^(id blockEnumerated,\
    \ NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration accessing object:\
    \ %@\", blockEnumerated);\n}];\n```\n\n这个方法实际上使用了 GCD 将工作分布到所有可用的处理器核心上，这将使我们的应用运行得更快，并更好地利用系统资源。而且，我们无需额外付出就能得到这一切！"
  raw: 'These techniques use language features and conventions to define patterns
    of usage. Along those lines, Cocoa has more tricks up its sleeve. One of them
    is the concept of notifications (referred to as the *observer pattern* in some
    circles), which let an object notify a collection of other objects when something
    happens. Another is the use of blocks to simplify our code in spots where a full-blown
    delegate, or even a single method, might be overkill. We’ve already seen blocks
    in use elsewhere in the book, but we’ll touch on some other interesting uses here
    as well.    Notifications    Cocoa’s `NSNotification` and `NSNotificationCenter`
    classes provide a way to let one object send a message to a bunch of other objects
    without any of the objects needing to know anything about the others. All they
    really need to know is the name of the notification, which can be anything we
    like. An object that wants to be notified signs up as an observer of a particular
    notification name in advance, and the object that wants to broadcast a notification
    uses that name to send its message out to any observers that are listening.    For
    example, let’s say we have several parts of our application that need to be updated
    whenever a particular event occurs, such as a piece of networking code reading
    a response from a web server. Using notifications, our networking code doesn’t
    need to know about every other object that wants the information. Instead, we
    can define a notification name for both the networking code and the observers
    to use, preferably in a header file that can be included by all classes involved,
    like so:    ``` #define DATA_RECEIVED @"dataReceived" ```    Observers can sign
    up to receive notifications at any time, but typically this happens during an
    object’s initialization.    ``` - (id)init {     if ((self = [super init])) {
            [[NSNotificationCenter defaultCenter] addObserver:self                                                 
    selector:@selector(receiveNetworkData:)                                                     
    name:DATA_RECEIVED                                                    object:nil];
        }     return self; } ```    This tells the application’s one and only instance
    of `NSNotificationCenter` that it should notify the caller by calling its `receiveNetworkData:`
    method whenever anyone posts a `DATA_RECEIVED` notification. Note the final parameter
    where we’re passing a `nil`: if we instead specified an object there, that would
    limit the notification-observing to only apply to that particular object. Any
    other object posting the same notification wouldn’t have any effect. To make this
    work, the observer also needs to implement the method it specified when registering.
    This method always receives the `NSNotification` itself as a parameter.    ```
    - (void)receiveNetworkData:(NSNotification *)notification {   NSLog(@"received
    notification: %@", notification); } ```    Finally, any object that sets itself
    up as observer should usually remove itself from the observer list later on. A
    common idiom is to do something like the following in the `dealloc` method of
    any class that ever registers as an observer:    ``` - (void)dealloc {     [[NSNotificationCenter
    defaultCenter] removeObserver:self]; } ```    Now, what about the notifier itself,
    in our case the network-reading object that’s going to broadcast its status? That’s
    taken care of as simply as this:    ``` if (some condition is met) {     [[NSNotificationCenter
    defaultCenter]         postNotificationName:DATA_RECEIVED                       object:self];
    } ```    The idea is that the notifier can fling out a notification like this,
    and the notification center takes care of the actual delivery.


    The notifier can also pass along additional information in the form of a dictionary
    that can be retrieved by an observer, like this:    ``` // in the notifier NSDictionary
    *info = @{@"data" : someData}; [[NSNotificationCenter defaultCenter]     postNotificationName:DATA_RECEIVED
                      object:self                 userInfo:info];  // in the observer
    NSLog(@"received data %@", [[notification userInfo] objectForKey:@"data"]); ```    Notifications
    can be a really useful way to let separate parts of our application talk to each
    other without using formal APIs. All we need to do is decide on some strings to
    represent various events, and start observing and posting.    Blocks    [Chapters
    11](#9781430245421_Ch11.xhtml) and [17](#9781430245421_Ch17.xhtml) introduced
    *blocks*, an addition to C that Apple came up with a few years ago. We mostly
    used blocks with the concurrency features provided by Grand Central Dispatch,
    where blocks fit in really well, but there are many more uses for blocks. It seems
    that in each new major version of OS X, Apple extends several Cocoa classes, adding
    new methods that take blocks as parameters. Let’s take a look at some of them.    Enumeration    Let’s
    start with something simple: enumeration. You’re probably familiar with the standard
    C-based ways of stepping through a list, and perhaps the use of `NSEnumerator`,
    and even the new fast enumeration (“for – in” loops) that’s been available since
    the release of OS X 10.5\. Now, blocks provide yet another way to do the same
    thing.    ``` NSArray *array = @[@"zero", @"one", @"two", @"three"];  // C-style
    enumeration int i; for (i = 0; i < [array count]; i++) {     NSLog(@"C enumeration
    accessing object: %@", array[i]); }  // NSEnumerator, the "classic" Cocoa way
    to enumerate NSEnumerator *aEnum = [array objectEnumerator]; id classicEnumerated;
    while ((classicEnumerated = [aEnum nextObject])) {     NSLog(@"NSEnumerator accessing
    object: %@", classicEnumerated ); }  // "Fast enumeration", released with OS X
    10.5 id fastEnumerated; for (fastEnumerated in array) {     NSLog(@"Fast enumeration
    accessing object: %@", fastEnumerated ); }  // "Block enumeration", released with
    OS X 10.6 [array enumerateObjectsUsingBlock:^(id blockEnumerated, NSUInteger i,
    BOOL *stop) {     NSLog(@"Block enumeration accessing object: %@", blockEnumerated);
    }]; ```    The block we pass in to `enumerateObjectsUsingBlock:` takes three arguments
    and returns nothing. That’s the block signature declared by the method, and that’s
    what we have to follow. The three arguments sent into our block are an object
    from the array, an integer containing that object’s index in the array, and a
    `BOOL` passed by reference that lets us halt the enumeration by setting its value
    to `YES`.    Looking at it that way, it may not be obvious at first why the block
    version is any better than the others, but the fact is that it really combines
    the best of all the other ways of enumerating. For one thing, it gives us the
    index of the current object, which neither of the previous Objective-C-based alternatives
    did. This comes in handy if we want to do something like print out a numbered
    list of the items in an array. We can’t tell you how many times we’ve dropped
    down to C-style iteration just for easy access to each object’s index value! Also,
    there’s a variant of this method that lets us specify options defining how the
    enumeration runs, such as make it run concurrently, like so:    ``` [array enumerateObjectsWithOptions:NSEnumerationConcurrent
        usingBlock:^(id blockEnumerated, NSUInteger i, BOOL *stop) {     NSLog(@"Block
    enumeration accessing object: %@", blockEnumerated); }]; ```    This method actually
    uses GCD to spread the work around to all available processor cores, which will
    make our app run more quickly and better utilize system resources. And we get
    it for free!'
