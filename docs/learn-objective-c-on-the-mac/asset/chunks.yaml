    Path*设置为“objectValue.character”。


    最后，我们需要连接按钮。从每个按钮按住`Control`拖拽到`Quotes`控制器，根据情况将动作设置为`add:`或`remove:`。根据情况，将每个按钮的`enabled`绑定到`Quotes`控制器上的`canAdd`或`canRemove`的`Controller
