    Data Entry Window    With the data model in place, it’s time to start building
    the GUI. The interesting part, which this chapter is mostly about, is the search
    window. But we can’t do any searching until we have some data to search, so we’ll
    start by creating the portion of the GUI that lets us do data entry. We’re going
