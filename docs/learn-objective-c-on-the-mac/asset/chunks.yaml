  trans: '

    出口（Outlet）本质上不过是一个对象指针，用于指向用户界面中的某个对象。由于 Cocoa 对象是 Objective-C 对象，它们拥有实例变量和方法。`IBOutlet`
    关键字用于向 Xcode 的 Interface Builder 指明哪些实例变量将用于构建用户界面。


    ### 动作（Actions）


    动作是可直接从应用程序用户界面调用的 Objective-C 方法。它们与我们编写过的其他 Objective-C 方法一样，都是方法，但在用户界面元素被操作时才会执行。例如，如果我们将一个按钮链接到一个动作方法，那么每当该按钮被点击时，动作方法中的代码就会被触发。如果我们将一个文本字段链接到一个动作，那么每当用户通过
    Tab 键离开该文本字段，或移动到其他控件时，其动作方法就会被触发。具体什么操作会导致方法触发，取决于链接到该方法的对象类型，有时也取决于该对象属性的设置方式。例如，一个滑块可能只在用户释放鼠标按钮后触发一次动作方法，也可能在滑块被拖动的过程中反复触发动作方法，具体取决于我们在
    Interface Builder 中如何设置滑块实例。本章我们将尝试这两种操作模式。


    动作的创建方式与其他 Objective-C 方法完全相同，但必须使用特殊的返回类型进行声明：`IBAction`。动作必须接受一个参数（通常声明为 `id`
    类型）。这个参数用于告知方法是由哪个界面元素调用了它。


    ### 出口与动作的实践


    理论已经足够，让我们通过编写另一个 Cocoa 应用来亲自动手实践。搭建新项目的步骤将与上一章相同，因此这应该会让人感到熟悉。如果你尚未打开 Xcode，请重新打开它。现在，按下
    `![images](img/arrow1.jpg)N` 或从“文件”菜单中选择“新建项目”。再次选择“Cocoa 应用程序”模板。确保“Core Data”和“基于文档的应用程序”复选框已关闭，“使用自动引用计数”复选框已打开，然后在提示输入项目名称时，输入“Chapter3”（请参见图
    3-1）。在这个示例中，我们使用“Book”作为类前缀设置。


    ![9781430245421_Fig03-01.jpg](img/9781430245421_Fig03-01.jpg)


    图 3-1. 在 Xcode 中为新 Cocoa 应用设置初始属性


    Xcode 将为你生成一个名为 `BookAppDelegate` 的应用代理类，以及一个 `MainMenu.xib` 文件，并会将你置于项目设置视图（图
    3-2）。


    ![9781430245421_Fig03-02.jpg](img/9781430245421_Fig03-02.jpg)


    图 3-2. 配置项目设置


    我们所有的工作都将在 `MainMenu.xib` 文件中进行，因此请在窗口左侧的导航区域单击它，它应该会在 Interface Builder 模式下打开（图
    3-3）。如果双击，它会在一个新窗口中打开，这不是我们想要的。如果发生这种情况，请关闭它，然后再次单击 `MainMenu.xib`。


    ![9781430245421_Fig03-03.jpg](img/9781430245421_Fig03-03.jpg)


    图 3-3. Xcode 中的 Interface Builder 模式


    单击 Interface Builder 编辑器窗格左侧的“主窗口”图标。这会打开一个已命名为 Chapter3 的空窗口。由于本章不需要导航区域，请通过单击标记为“视图”的组中最左侧的图标将其隐藏。这样可以提供更多的屏幕空间用于工作，并且界面也更简洁。我们可以通过单击工具栏中“视图”部分最左侧的图标随时取消隐藏。


    我们将重点放在右侧的实用工具区域。


    首先，查看 Xcode 窗口右侧底部的对象库窗格。滚动对象列表找到“标签”；它应该位于列表顶部向下大约十几个对象的位置。在对象库中单击“标签”，然后将其拖到窗口的左上角。当我们靠近左上角时，会出现蓝色参考线，当我们释放鼠标按钮时，标签应自动吸附到位（图
    3-4）。


    ![9781430245421_Fig03-04.jpg](img/9781430245421_Fig03-04.jpg)


    图 3-4. 向 第 3 章 的窗口添加标签


    通过按下 `![images](img/arrow2.jpg)4` 或单击实用工具区域顶部的相应按钮，将检查器窗格切换到“属性检查器”。然后，双击我们刚刚拖入的标签，它应该变为可编辑状态。将标签的文本更改为“神奇数字是：”（图
    3-5）。


    ![9781430245421_Fig03-05.jpg](img/9781430245421_Fig03-05.jpg)


    图 3-5. 编辑标签文本


    由于目前还没有显示神奇的数字，这个标签显得有些名不副实，因此我们需要添加一个用户界面组件来显示它。在对象库窗格中，再向下滚动一点找到“文本字段”；它应该直接在“标签”对象下方。如果在库中单击某个对象并悬停在它上面，将会看到一个有用的弹出窗口，其中显示有关该控件的更多信息，包括该控件底层对应的
    AppKit 类（参见图 3-6）。对于文本字段来说，这个类是 `NSTextField`。在此弹出窗口处于激活状态时，我们可以单击对象库中的其他组件来查看每个组件的信息。如果单击“标签”，我们会发现标签也是
    `NSTextField` 实例，只是初始显示和可编辑性设置不同。在您学习 AppKit 类时，了解对象库中给定组件对应哪个类是很有用的；许多类身兼数职。


    ![9781430245421_Fig03-06.jpg](img/9781430245421_Fig03-06.jpg)


    图 3-6. Xcode 可以显示对象库中对象的弹出信息


    单击回“文本字段”，然后将一个文本字段实例拖到我们的窗口上。将其放置在标签右侧相对的位置，让蓝色参考线引导您，并在参考线指示的位置让其吸附到位（图 3-7）。


    ![9781430245421_Fig03-07.jpg](img/9781430245421_Fig03-07.jpg)


    图 3-7. Xcode 参考线有助于布局用户界面控件


    查看实用工具区域中此文本字段的属性检查器（图 3-8）。它显示与我们之前拖入的标签检查器相同的控件——这很合理，因为实际上它们是同一个 Cocoa 对象。不可编辑的标签和可编辑的文本字段都是
    `NSTextField` 对象的实例，只是对象绘制方式的参数不同。我们可以根据应用需求来调整对象的行为方式。对于这个应用，我们希望阻止用户通过在字段中输入来更改神奇数字，因为那样它就不再神奇了。要进行此更改，请单击“行为”下拉菜单，将其从“可编辑”更改为“可选取”。这样用户将无法更改它，但可以用鼠标选中并复制它。


    ![9781430245421_Fig03-08.jpg](img/9781430245421_Fig03-08.jpg)


    图 3-8.

