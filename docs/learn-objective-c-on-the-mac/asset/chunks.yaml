    in the *Navigator* pane. This will open up the nib file in the Interface Builder
    Editor pane ([Figure 4-2](#9781430245421_Ch04.xhtml#Fig2)).


    ![9781430245421_Fig04-02.jpg](images/9781430245421_Fig04-02.jpg)


    [Figure 4-2](#9781430245421_Ch04.xhtml#_Fig2). Initial view of the window in MainMenu.xib
    in Xcode’s Interface Builder Editor


    In the lower left part of the Interface Builder pane is a small grey triangle,
