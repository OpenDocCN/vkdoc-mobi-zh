    and add a new relationship. Name it “memberOf,” set its destination entity to
    MythicalBand, and then set its inverse to members. The rest of the default values
    can be left as they are. There’s now a bidirectional arrow between `MythicalPerson`
    and `MythicalBand` with a single head at the band end.    Let’s move on to the
    one-to-many relationship between `MythicalBand` and `MythicalGig`. Select `MythicalBand`,
    create a new relationship named “gigs,” with `MythicalGig` as its destination
    and the *To-Many Relationship* checked. Because a gig without a band doesn’t do
    us any good, set the *Delete Rule* to Cascade. That way, if a band is deleted,
    all its gigs will be deleted, too. Now select `MythicalGig` and make a new relationship
    called “band,” with `MythicalBand` as its destination and select gigs as its inverse
    relationship. Here, we can leave the *Delete Rule* set to its default value, Nullify.
    This simply means that if a gig is deleted, any trace of the gig on the remaining
    end of the relationship to the band will be wiped out, but the band itself will
    be left intact.    Finally, it’s time for the one-to-many relationship between
    `MythicalVenue` and `MythicalGigs`. Select `MythicalVenue`, and create a new relationship
    named “gigs,” with `MythicalGig` as its destination and the *To-Many Relationship*
    checked. Because a gig without a venue is just as meaningless as a gig without
    a band, here we’ll also set the *Delete Rule* to Cascade, so deleting a venue
    will also delete all its gigs. Now select `MythicalGig` and make a new relationship
    called “venue,” with `MythicalVenue` as its destination and gigs as its inverse
    relationship.    We’ve now created all the relationships we’re going to need for
    the new version of MythBase, and our model should look similar to what we saw
    previously in [Figure 9-4](#9781430245421_Ch09.xhtml#Fig4).    Creating a Simple
    Migration    Assuming that you’ve previously gone through [Chapter 8](#9781430245421_Ch08.xhtml)
    and used that version of MythBase to save some data, running the new version at
    this stage will give you some problems. You’ll see some error messages about mismatched
    data store versions when you start up, and you’ll get nothing but an empty table
    view where the `MythicalPerson` objects you created previously should be. And
    if you add some new objects and try to save them, you’ll just get more errors!
    The reason for this is that the current version of the app’s data model differs
    quite a bit from the version that was used to save the data previously; Core Data
    is smart enough to detect this, let the app delegate know about it, and prevent
    you from overwriting the old version with new data.'
  trans: '

    下面是我们将定义的所有实体及其属性。确保已选中新的模型文件，然后创建一个新实体并将其命名为 `MythicalBand`。为该实体添加一个名为 `name`
    的新属性，将其类型设置为 `String`，然后点击关闭*可选*复选框，并打开*已索引*复选框。现在创建另一个名为 `MythicalVenue` 的新实体，同样为其添加一个名为
    `name` 的 String 类型单一属性，该属性同样应设为*已索引*且非*可选*。最后，创建一个名为 `MythicalGig` 的实体。与我们添加的其他实体不同，演出没有名称。`MythicalGig`
    的唯一区别特征在于它与乐队和演出场地的关系（我们稍后会讲到）以及演出的日期。添加一个新属性，将其命名为 `performanceDate`，并将其类型更改为
    `Date`。我们可以将 `performanceDate` 保留为*可选*（因为某些古老演出的确切日期可能已从记忆中消失），并且也无需为其开启索引。


    ## 添加关系


    现在是时候添加关系了，这样每个对象就可以关联到其他相关对象。我们将定义从 `MythicalBand` 到 `MythicalPerson` 的一对多关系，从
    `MythicalBand` 到 `MythicalGig` 的一对多关系，以及从 `MythicalVenue` 到 `MythicalGig` 的另一个一对多关系。概览请参见图
    9-5。


    ![9781430245421_Fig09-05.jpg](img/9781430245421_Fig09-05.jpg)


    图 9-5。添加关系后，模型将如下所示。


    在这一点上，我们应该稍微澄清一下我们的术语。在 Core Data 中，每个关系实际上都是单向的，并且它们不是用“一对多”、“一对一”、“多对多”等术语来定义的。相反，每个
    Core Data 关系要么是**对一**，要么是**对多**。为了在 Core Data 中创建通常用法中（如果你接受任何形式的计算机程序员行话都是“正常”的这种说法）所谓的一对多关系，我们实际上必须创建两个关系：一个根植于第一个实体并终止于第二个实体的对多关系，以及一个根植于第二个实体并终止于第一个实体的对一关系。然后，我们在模型中指定这两个关系互为逆向关系，Core
    Data 就会理解我们所配置的这种双向性质。如果需要，这种设置允许我们创建一个真正单向的关系，尽管在实践中是否真的可取值得怀疑。本书中的示例都使用双向关系。


    那么，让我们创建这些关系，从 `MythicalBand` 到 `MythicalPerson` 的一对多关系开始。选中 `MythicalBand`，然后点击*关系*表视图左下角的小
    `+` 按钮。这将创建一个新关系，其配置选项（参见图 9-6）看起来与我们创建属性时见到的略有不同。


    ![9781430245421_Fig09-06.jpg](img/9781430245421_Fig09-06.jpg)


    图 9-6。新关系的配置选项。


    这里有一个*名称*字段以及*可选*和*瞬态*复选框，但除此之外都完全不同。*目标*弹出菜单让我们可以选择关系的另一端指向何处，设置后，*逆向*弹出菜单让我们可以选择使用哪个其他关系（如果有的话）来创建双向关系。一个复选框允许我们指定这是一个对多关系，如果选中该复选框，则会启用两个字段，让我们可以方便地约束关系另一端可以关联的对象的最小和最大数量。最后，*删除规则*弹出菜单让我们决定如果关系的“源端”被删除，关系另一端的对象应发生什么情况。


    最常见的选项是 `Nullify`（这意味着源端会从目标元素中的任何逆向关系中移除）、`Cascade`（这意味着目标对象也会被删除）和 `Deny`（这意味着如果存在此关系，源对象将完全拒绝被删除）。第四种选择
    `No Action` 会保持逆向关系不变，将处理它的任务留给开发者（否则可能导致数据完整性问题）。我们不会使用这个选项。


    将我们刚刚创建的关系命名为 `members`，并将其目标实体设置为 `MythicalPerson`。点击打开*对多关系*复选框，并将*删除规则*保持为
    `Nullify`（这是默认值）。太好了，我们刚刚创建了第一个单向关系！完成这个简单的步骤后，`MythicalBand` 实体获得了一个新的 `members`
    属性，并附带一整套新特性。每个乐队现在都可以提供一个 `MythicalPerson` 对象数组，并且该数组将根据我们配置的选项自动维护。在图表纸视图中，有一条从
    `MythicalBand` 指向 `MythicalPerson` 的、带有双箭头的单向箭头。


    现在让我们创建这个关系的逆向关系。选中 `MythicalPerson` 实体，并添加一个新关系。将其命名为 `memberOf`，目标实体设置为 `MythicalBand`，然后将其逆向关系设置为
    `members`。其余默认值可以保持不变。现在，`MythicalPerson` 和 `MythicalBand` 之间出现了一个双向箭头，在乐队一端是单箭头。


    接下来是 `MythicalBand` 和 `MythicalGig` 之间的一对多关系。选中 `MythicalBand`，创建一个名为 `gigs` 的新关系，目标为
    `MythicalGig`，并选中*对多关系*复选框。由于一场没有乐队的演出对我们毫无用处，因此将*删除规则*设置为 `Cascade`。这样，如果一个乐队被删除，其所有演出也会被删除。现在选中
    `MythicalGig` 并创建一个名为 `band` 的新关系，目标为 `MythicalBand`，并选择 `gigs` 作为其逆向关系。这里，我们可以将*删除规则*保留为其默认值
    `Nullify`。这仅仅意味着如果一场演出被删除，该演出在关联乐队的关系另一端的所有痕迹都会被清除，但乐队本身将保持不变。


    最后，是 `MythicalVenue` 和 `MythicalGig` 之间的一对多关系。选中 `MythicalVenue`，创建一个名为 `gigs`
    的新关系，目标为 `MythicalGig`，并选中*对多关系*复选框。因为没有场地的演出和没有乐队的演出一样毫无意义，因此我们在此也将*删除规则*设置为
    `Cascade`，这样删除一个场地也会删除其所有演出。现在选中 `MythicalGig` 并创建一个名为 `venue` 的新关系，目标为 `MythicalVenue`，并选择
    `gigs` 作为其逆向关系。


    现在，我们已经为 MythBase 的新版本创建了所有需要的关系，我们的模型应该看起来类似于我们之前在图 9-4 中看到的。


    ## 创建简单迁移


    假设您之前已经完成了第 8 章的内容，并使用该版本的 MythBase 保存了一些数据，那么在此阶段运行新版本会遇到一些问题。启动时您会看到一些关于数据存储版本不匹配的错误消息，并且在原本应该显示您之前创建的
    `MythicalPerson` 对象的地方，您只会得到一个空的表视图。如果您添加一些新对象并尝试保存，您只会遇到更多的错误！原因是当前版本的应用程序数据模型与之前用于保存数据的版本有相当大的差异；Core
    Data 足够智能，可以检测到这一点，通知应用程序委托，并阻止您用新数据覆盖旧版本。

    '
- fmt: "不仅如此，它还足够智能，可以自动“升级”现有的数据存储，以与你新的模型版本配合使用。这被称为*迁移*。Core Data 提供了两种迁移方式。第一种是*轻量级迁移*，由\
    \ Core Data 自动推断完成。Core Data 能够识别数据模型版本之间的许多常见变化（例如添加、删除或重命名属性、实体和关系），并能够自动计算出如何进行前向迁移。如果你使用\
    \ iCloud 存储数据，这是唯一可用的迁移方式。对于更复杂的数据模型演变，Core Data 可能无法推断出变化之间的映射关系，你就需要创建一个*映射模型*，或许还需要编写一些\
    \ Objective-C 代码来处理迁移。映射模型描述了旧模型中的实体和属性在新模型中的表示方式，但如果你做出了大幅度的更改，可能还需要编写代码。在本例中，我们将使用轻量级迁移策略，无需任何额外配置即可完成。\n\
    \n### 运行时机\n\n在迁移发生之前，我们需要对应用程序的源代码做一个小改动。在当前版本中，应用尝试从其数据存储中加载数据，如果存储数据的结构与数据模型最新版本描述的结构不匹配，就会出现问题，应用会向用户显示一个错误。要修复此问题并使应用程序升级数据存储，我们只需在加载数据存储的方法中传入一个配置选项即可。打开`MBAppDelegate.m`，找到`persistentStoreCoordinator`方法。在该方法的末尾附近，有一组代码行类似这样：\n\
    \n```\nif (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
    \    URL:url\n    options:nil\n    error:&error]){\n```\n\n接下来我们要创建一个选项字典，并将其传递到该方法调用中。这个字典包含两对键值，它们告诉存储协调器应尝试更新现有数据以匹配当前数据模型，并且应尝试自动推断映射关系。将上面显示的代码行替换为以下内容：\n\
    \n```\nNSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \  [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n\
    \  [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\
    if (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
    \    URL:url\n    options:optionsDictionary\n    error:&error]){\n```\n\n现在，有了这段代码，我们应该能够构建并运行我们的应用程序，它会正常运行！我们会看到之前用\
    \ MythBase 第 8 章版本存储的旧数据，现在已经转换为我们应用的最新数据模型。当然，我们不会看到模型中创建的任何新实体——事实上，如果一切按计划进行，我们根本不会看到与第\
    \ 8 章有任何不同的地方，但底层结构现在已经被修改，包含了新的实体和关系。\n\n那么，这是如何发生的呢？你可能还记得在第 8 章中，`MBAppDelegate`的`persistentStoreCoordinator`方法里有一个方法调用：\n\
    \n```\n[persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType\n\
    \                            configuration:nil\n                            URL:url\n\
    \                            options:optionsDictionary\n                     \
    \       error:&error]\n```\n\n这可能不太明显，但正是这个方法调用触发了数据迁移。当上述代码被执行时，通常会发生的情况是数据存储被打开并准备使用。\n\
    \n然而，如果数据存储的结构与协调器的数据模型（即你在 Xcode 中指定的当前版本）的结构不匹配，就会触发一个完全不同的事件链。Core Data 首先会查找一个与磁盘上数据存储中编码的版本信息相匹配的模型。如果找到了，Core\
    \ Data 会查找应用包中是否存在一个映射模型，该模型可以将数据存储从旧结构转换为新结构。如果找不到，它会尝试通过推断映射关系来进行轻量级迁移。如果无法推断出映射关系，该过程将停止，方法会返回`nil`，并在`error`参数中返回一个错误。如果发生这种情况，下一行代码是`[[NSApplication\
    \ sharedApplication] presentError:error]`，这会导致应用程序显示一个错误，内容为“用于打开持久化存储的受管对象模型版本与创建该持久化存储时使用的版本不兼容。”但在我们的例子中，MythBase\
    \ 确实有两个可用的模型，并且映射关系可以推断，因此轻量级迁移会自动执行，旧数据文件会先被备份，以防出现严重问题。得益于这一自动过程，我们的用户无需担心导入或转换数据。当他们运行我们应用的新版本时，以前存储的数据会自动转换，并且除非数据存储非常庞大，否则转换速度很快。\n\
    \n### 更新用户界面\n\n现在，我们已经有了更新后的数据模型，接下来要创建用户界面。我们将保持现有窗口基本不变，并添加几个新窗口，一个专注于`MythicalBands`，另一个专注于`MythicalVenues`。\n\
    \n#### 创建乐队窗口\n\n首先，我们将创建一个新窗口来显示`MythicalBands`的列表。与第 8 章中展示的过程类似，我们将使用一些`NSTableView`、一个`NSArrayController`和\
    \ Cocoa 绑定来连接所有元素。我们首先将表格视图连接到乐队列表，确保它能正常工作，然后再考虑将一些`MythicalPersons`连接到乐队。\n\n\
    要开始，请在 Xcode 中打开`MainMenu.xib`。从*对象库*中拖出一个新的`NSWindow`。使用*属性检查器*将这个窗口命名为“Mythical\
    \ Bands”。从*对象库*中拖出一个`NSTableView`，将其放入窗口的左上角，让蓝色参考线指示放置位置。在*属性检查器*中，将其设置为基于视图的，并且只有一列，而不是两列。将其向右扩展，直到到达窗口右侧边缘附近的蓝色参考线，这样表格视图就几乎填满了窗口的宽度。将其向下移动一点，以便为搜索字段留出空间，这是接下来要添加的。\n\
    \n现在，将一个搜索字段拖到表格视图上方的空间，靠近窗口的右边缘。将其定位，使得字段的底部边缘和右侧边缘都有蓝色参考线。这样设置后，搜索字段会紧贴在窗口顶部，而表格视图则在其下方调整大小。\n\
    \n接下来，我们需要两个按钮，用于“移除”和“添加”。保持外观一致性很重要，因此使用与主窗口中相同的渐变按钮。将一个渐变按钮拖到表格视图下方的空间。将按钮的右边缘与表格视图的右边缘对齐。蓝色参考线会将其定位到表格视图下方适当距离，并与右边缘对齐。双击按钮中的文本，将标签更改为“Add”。在“Add”按钮左侧再拖出另一个按钮。"
  raw: 'Not only that, but it’s also smart enough to automatically “upgrade” an existing
    data store to work with your new model version. This is called a *migration*.    Core
    Data offers two kinds of migrations. The first, *lightweight migrations*, are
    inferred by Core Data automatically. Core Data is able to recognize many common
    changes between versions of data models (such as adding, removing, or renaming
    attributes, entities, and relationships) and is able to automatically figure out
    how to roll forward. If you’re using iCloud to store your data, this is the only
    kind of migration available to you. For more complex evolutions of data models,
    Core Data may not be able to infer the mapping between the changes, and you’ll
    need to create a *mapping model* and perhaps write some Objective-C to handle
    the migration. The mapping model describes how entities and attributes in the
    old model are represented in the new one, but you might also need code if you’ve
    made drastic changes. In this example, we’ll get by with the lightweight migration
    strategy without any extra configuration at all.    Time to Run    Before we can
    have the migration happen, we need to make one small change to the application’s
    source code. In the current version, the app tries to load data from its data
    store, and if the structure of the stored data doesn’t match the structure described
    in the latest version of the data model, problems will occur, and the app will
    show the user an error. To fix this and make the application upgrade the data
    store, all we need to do is pass in a configuration option to the method that
    loads the data store. Open up `MBAppDelegate.m`, and locate the `persistentStoreCoordinator`
    method. Toward the end of that method are a group of lines that look like this:    ```
    if (![coordinator addPersistentStoreWithType:NSXMLStoreType     configuration:nil
        URL:url     options:nil     error:&error]){ ```    What we’re going to do
    is create a dictionary of options to pass along in that method call. This dictionary
    contains two key-value pairs that tell the store coordinator that it should try
    to update existing data to match the current data model and that it should try
    to infer the mapping automatically. Replace the lines shown above with the following:    ```
    NSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:
      [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,
      [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];
    if (![coordinator addPersistentStoreWithType:NSXMLStoreType     configuration:nil
        URL:url     options:optionsDictionary     error:&error]){ ```    With this
    code now in place, we should be able to build and run our application, and it
    will just work! We’ll see the old data that we had previously stored with the
    [Chapter 8](#9781430245421_Ch08.xhtml) version of MythBase now converted to our
    app’s newest data model. Of course, we won’t see any of the new entities we’ve
    created in the model—in fact, if all goes according to plan, we won’t see anything
    different from [Chapter 8](#9781430245421_Ch08.xhtml) at all, but the underlying
    structure has now been modified to include the new entities and relationships.    So
    how did that happen? You may recall from [Chapter 8](#9781430245421_Ch08.xhtml)
    the following method call in `MBAppDelegate`’s `persistentStoreCoordinator` method:    ```
    [persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType                             configuration:nil
                                URL:url                             options:optionsDictionary
                                error:&error] ```    It may not be obvious, but that
    method call is what triggers the data migration to occur. When the code shown
    previously is executed, what normally happens is that the data store is opened
    up and prepared for use.


    However, if the structure of the data store doesn’t match the structure of the
    coordinator’s data model (which is the current version you specified in Xcode),
    then a whole different chain of events takes place.    Core Data will first look
    for a model that matches the version info encoded in the data store on disk. If
    it finds that, then Core Data will look for the existence (within the app’s bundle)
    of a mapping model that can convert the data store from the old structure to the
    new structure. If it can’t find one, it will attempt to do a lightweight migration
    by inferring the mapping. If a mapping can’t be inferred, the process will stop
    and the method will return `nil` with an error returned in the `error` parameter.
    If this happens, the next line of code is `[[NSApplication sharedApplication]
    presentError:error]`, which will cause the application to present an error that
    reads “The managed object model version used to open the persistent store is incompatible
    with the one that was used to create the persistent store.” In our case, however,
    MythBase does have two models available and the mapping can be inferred, so the
    lightweight migration is performed automatically, with the old data file first
    being backed up in case something goes terribly wrong. Thanks to this automatic
    procedure, our users don’t need to worry about importing or converting data. When
    they run a new version of our app, their previously stored data is converted automatically
    and, except in the case of a really huge data store, quickly.    Updating the
    GUI    Now that we have our updated data model ready to go, it’s time to create
    the GUI. We’re going to leave the existing window almost intact and add a couple
    of new windows, one focused on `MythicalBands` and one focused on `MythicalVenues`.    Creating
    the Band Window    First, we’ll create a new window to show a list of `MythicalBands`.
    Much like the process shown in [Chapter 8](#9781430245421_Ch08.xhtml), we’re going
    to use some `NSTableViews`, an `NSArrayController`, and Cocoa bindings to connect
    everything. We’re going to first connect a table view to the list of bands, make
    sure that that works, and then we’ll worry about connecting some `MythicalPersons`
    to the bands.    To get started, open up `MainMenu.xib` in Xcode. Drag a new NSWindow
    out from the *Object Library*. Use the *Attributes Inspector* to name this window
    “Mythical Bands.” Drag an NSTableView out from the *Object Library* and drop it
    into the upper left-hand corner of the window, letting the blue guidelines indicate
    where to put it. In the *Attributes Inspector*, set it to be view-based and with
    one column instead of two. Resize it by expanding it to the right until we reach
    the blue guideline near the right edge of the window, so that the table view fills
    out nearly the width of the window. Move it down a bit so that there’ll be room
    for a search field, which is what we’re about to add.    Now, drag a Search field
    out to the space above the table view, along the right edge of the window. Position
    it so that there’s a blue guideline along the bottom edge and the right edge of
    the field. This will set up resizing behavior such that the Search field stays
    tucked against the top of the window and the table view resizes below it.    Next,
    we’ll need two buttons for Remove and Add. It’s important to be consistent with
    appearance, so use the same gradient buttons as in the main window. Drag out a
    gradient buttons to the space just below the table view. Position the right edge
    of the button so that it’s aligned with the right edge of the table view. Blue
    guidelines will appear to position it at the appropriate distance below the table
    view and aligned with the right edge. Double-click the text inside the button,
    and change the label to “Add.” Drag out another button to the left of the Add
    button.'
  trans: "\n不仅如此，它还足够智能，可以自动“升级”现有的数据存储，以与你新的模型版本配合使用。这被称为*迁移*。Core Data 提供了两种迁移方式。第一种是*轻量级迁移*，由\
    \ Core Data 自动推断完成。Core Data 能够识别数据模型版本之间的许多常见变化（例如添加、删除或重命名属性、实体和关系），并能够自动计算出如何进行前向迁移。如果你使用\
    \ iCloud 存储数据，这是唯一可用的迁移方式。对于更复杂的数据模型演变，Core Data 可能无法推断出变化之间的映射关系，你就需要创建一个*映射模型*，或许还需要编写一些\
    \ Objective-C 代码来处理迁移。映射模型描述了旧模型中的实体和属性在新模型中的表示方式，但如果你做出了大幅度的更改，可能还需要编写代码。在本例中，我们将使用轻量级迁移策略，无需任何额外配置即可完成。\n\
    \n### 运行时机\n\n在迁移发生之前，我们需要对应用程序的源代码做一个小改动。在当前版本中，应用尝试从其数据存储中加载数据，如果存储数据的结构与数据模型最新版本描述的结构不匹配，就会出现问题，应用会向用户显示一个错误。要修复此问题并使应用程序升级数据存储，我们只需在加载数据存储的方法中传入一个配置选项即可。打开`MBAppDelegate.m`，找到`persistentStoreCoordinator`方法。在该方法的末尾附近，有一组代码行类似这样：\n\
    \n```\nif (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
    \    URL:url\n    options:nil\n    error:&error]){\n```\n\n接下来我们要创建一个选项字典，并将其传递到该方法调用中。这个字典包含两对键值，它们告诉存储协调器应尝试更新现有数据以匹配当前数据模型，并且应尝试自动推断映射关系。将上面显示的代码行替换为以下内容：\n\
    \n```\nNSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \  [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n\
    \  [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\
    if (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
    \    URL:url\n    options:optionsDictionary\n    error:&error]){\n```\n\n现在，有了这段代码，我们应该能够构建并运行我们的应用程序，它会正常运行！我们会看到之前用\
    \ MythBase 第 8 章版本存储的旧数据，现在已经转换为我们应用的最新数据模型。当然，我们不会看到模型中创建的任何新实体——事实上，如果一切按计划进行，我们根本不会看到与第\
    \ 8 章有任何不同的地方，但底层结构现在已经被修改，包含了新的实体和关系。\n\n那么，这是如何发生的呢？你可能还记得在第 8 章中，`MBAppDelegate`的`persistentStoreCoordinator`方法里有一个方法调用：\n\
    \n```\n[persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType\n\
    \                            configuration:nil\n                            URL:url\n\
    \                            options:optionsDictionary\n                     \
    \       error:&error]\n```\n\n这可能不太明显，但正是这个方法调用触发了数据迁移。当上述代码被执行时，通常会发生的情况是数据存储被打开并准备使用。\n\
    \n然而，如果数据存储的结构与协调器的数据模型（即你在 Xcode 中指定的当前版本）的结构不匹配，就会触发一个完全不同的事件链。Core Data 首先会查找一个与磁盘上数据存储中编码的版本信息相匹配的模型。如果找到了，Core\
    \ Data 会查找应用包中是否存在一个映射模型，该模型可以将数据存储从旧结构转换为新结构。如果找不到，它会尝试通过推断映射关系来进行轻量级迁移。如果无法推断出映射关系，该过程将停止，方法会返回`nil`，并在`error`参数中返回一个错误。如果发生这种情况，下一行代码是`[[NSApplication\
    \ sharedApplication] presentError:error]`，这会导致应用程序显示一个错误，内容为“用于打开持久化存储的受管对象模型版本与创建该持久化存储时使用的版本不兼容。”但在我们的例子中，MythBase\
    \ 确实有两个可用的模型，并且映射关系可以推断，因此轻量级迁移会自动执行，旧数据文件会先被备份，以防出现严重问题。得益于这一自动过程，我们的用户无需担心导入或转换数据。当他们运行我们应用的新版本时，以前存储的数据会自动转换，并且除非数据存储非常庞大，否则转换速度很快。\n\
    \n### 更新用户界面\n\n现在，我们已经有了更新后的数据模型，接下来要创建用户界面。我们将保持现有窗口基本不变，并添加几个新窗口，一个专注于`MythicalBands`，另一个专注于`MythicalVenues`。\n\
    \n#### 创建乐队窗口\n\n首先，我们将创建一个新窗口来显示`MythicalBands`的列表。与第 8 章中展示的过程类似，我们将使用一些`NSTableView`、一个`NSArrayController`和\
    \ Cocoa 绑定来连接所有元素。我们首先将表格视图连接到乐队列表，确保它能正常工作，然后再考虑将一些`MythicalPersons`连接到乐队。\n\n\
    要开始，请在 Xcode 中打开`MainMenu.xib`。从*对象库*中拖出一个新的`NSWindow`。使用*属性检查器*将这个窗口命名为“Mythical\
    \ Bands”。从*对象库*中拖出一个`NSTableView`，将其放入窗口的左上角，让蓝色参考线指示放置位置。在*属性检查器*中，将其设置为基于视图的，并且只有一列，而不是两列。将其向右扩展，直到到达窗口右侧边缘附近的蓝色参考线，这样表格视图就几乎填满了窗口的宽度。将其向下移动一点，以便为搜索字段留出空间，这是接下来要添加的。\n\
    \n现在，将一个搜索字段拖到表格视图上方的空间，靠近窗口的右边缘。将其定位，使得字段的底部边缘和右侧边缘都有蓝色参考线。这样设置后，搜索字段会紧贴在窗口顶部，而表格视图则在其下方调整大小。\n\
    \n接下来，我们需要两个按钮，用于“移除”和“添加”。保持外观一致性很重要，因此使用与主窗口中相同的渐变按钮。将一个渐变按钮拖到表格视图下方的空间。将按钮的右边缘与表格视图的右边缘对齐。蓝色参考线会将其定位到表格视图下方适当距离，并与右边缘对齐。双击按钮中的文本，将标签更改为“Add”。在“Add”按钮左侧再拖出另一个按钮。\n"
- fmt: "很多蓝色参考线会在垂直对齐“添加”按钮时亮起，然后它会自动吸附到左侧的正确距离上。双击按钮内的文本，将其重新标记为“Remove”。这让我们获得了足够用于处理乐队列表的用户界面，但我们还需要一个对象来将所有内容整合在一起，那就是一个`NSArrayController`。从*对象库*中拖出一个数组控制器（在搜索框中输入“array”以缩小列表范围），并将其拖放到“乐队\
    \ (Band)”窗口下方的图谱画布上。它会消失，并出现在界面构建器窗格左侧的对象停靠区中。缓慢双击新的数组控制器，将其重命名为“Mythical Bands”。选中“Mythical\
    \ Bands”对象，打开*属性检查器*。在*对象控制器*部分，将*模式*从“类 (Class)”更改为“实体名称 (Entity Name)”。在*实体名称*字段中输入字符串`MythicalBand`，并勾选*准备内容\
    \ (Prepares Content)*复选框。完成后，我们的Xcode窗口应看起来像[图 9-7](#9781430245421_Ch09.xhtml#Fig7)所示。![9781430245421_Fig09-07.jpg](images/9781430245421_Fig09-07.jpg)\
    \ [图 9-7](#9781430245421_Ch09.xhtml#_Fig7) M* M* M* Mythical Band窗口的开端  \n\n###\
    \ 设置Cocoa绑定\n\n现在我们已经布置好了对象，需要设置合适的Cocoa绑定，以便将UI控件与Core Data管理的乐队列表真正连接起来。我们从数组控制器开始，因为它已经被选中。切换到*绑定检查器*，展开*参数\
    \ (Parameters)*部分。勾选*绑定到 (Bind to)*复选框，然后从下拉菜单中选择 App Delegate。接着，在*模型键路径 (Model\
    \ Key Path)*字段中输入“`managedObjectContext`”。这将数组控制器连接到App Delegate中的Core Data机制。\n\
    \n现在来处理表格视图的绑定。由于这个表格视图只有一列，所以会比“Mythical Persons”窗口中的那个省事一些。首先选中表格视图本身。这最好在左侧对象停靠区的大纲视图中完成。选中后，转到*绑定检查器*（应该还开着），展开*表格内容\
    \ (Table Content)*标题下的*内容 (Content)*部分。勾选*绑定到*复选框，并确保下拉菜单显示`Mythical Bands`，且*控制器键\
    \ (Controller Key)*显示`arrangedObjects`。和之前一样，我们也希望表格视图中选中的行能传回给数组控制器。为此，展开*绑定检查器*的*选择索引\
    \ (Selection Indices)*部分。在此处勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*设置为`selectionIndexes`。这看起来很像前一章节中的图\
    \ 8-10。\n\n表格视图本身的绑定设置好之后，我们可以为列设置绑定。在对象停靠区中，展开表格视图的子视图，直到显示出一个标有“Static Text\
    \ – Table View Cell”的视图。在*绑定检查器*中，展开*值 (Value)*部分，勾选*绑定到*复选框，将下拉菜单设置为`Table Cell\
    \ View`，并将*模型键路径*设置为`objectValue.name`。这应该看起来像[图 9-8](#9781430245421_Ch09.xhtml#Fig8)所示。然后，切换到*属性检查器*，将“行为\
    \ (Behavior)”弹出菜单从“无 (None)”更改为“可编辑 (Editable)”。如果不做此更改，我们将无法在表格视图中实际输入新乐队的名称。\n\
    \n![9781430245421_Fig09-08.jpg](images/9781430245421_Fig09-08.jpg) [图 9-8](#9781430245421_Ch09.xhtml#_Fig8)\
    \ M* M* M* 为Mythical Bands表格视图设置绑定  \n\n最后，我们来处理搜索框。选择屏幕右上角的搜索字段，打开*绑定检查器*。在*绑定检查器*的底部附近有一个名为“谓词\
    \ (Predicate)”的章节。展开它，勾选*绑定到*复选框，将其绑定到`Mythical Bands`。*控制器键*应为`filterPredicate`。将*显示名\
    \ (Display Name)*设置为“`Name`”，并将谓词格式设置为`name contains[c] $value`，其中`$value`表示搜索框的内容，`name`表示应被搜索的`MythicalBand`实体属性。这就像我们在[第8章](#9781430245421_Ch08.xhtml)中对搜索字段所做的绑定一样。\n\
    \n对于按钮，我们将使用与上一章节相同的过程，结合target-action和Cocoa绑定。我们会用target-action来处理按钮按下事件，用Cocoa绑定来根据需要启用或禁用按钮。先从操作开始。选中“添加\
    \ (Add)”按钮，按住Control键拖拽到`Mythical Bands`数组控制器。从弹出菜单中选择`add:`操作。然后，选中“移除 (Remove)”按钮，按住Control键拖拽到同一位置。这次，选择`remove:`操作。为了根据表格视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。选中“添加”按钮，打开*绑定检查器*，展开*可用性\
    \ (Availability)*下的*已启用 (Enabled)*部分。勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*字段修改为`canAdd`。对于“移除”按钮，执行同样的操作，但在*控制器键*字段中使用`canRemove`。\n\
    \n现在保存更改，并运行应用程序。新窗口出现了，我们可以添加一些乐队，直接在表格视图中编辑它们的名称，并保存更改。\n\n### 为数组控制器指定有用的名称\n\
    \n我们建议您在nib文件中做一个更改，这在配置我们即将创建的新绑定时会很有帮助。它不会影响应用程序的行为，但您很可能会因为做了这个更改而感到高兴，并且后续的文本也假定您已进行此更新。\n\
    \nCore Data基础设施与用户界面之间的连接都是通过一个`NSArrayController`来运行的。我们在上一章节中设置的`NSArrayController`被命名为`Mythical\
    \ Person Array Controller`。这个名字很长，超出了Xcode中绑定检查器（Binding Inspector）实际设计的显示长度。事实上，它勉强能挤进绑定检查器的弹出按钮中，并且这导致每个绑定属性的摘要信息溢出，部分文本被省略号代替。对于`Mythical\
    \ Bands`数组控制器，我们并没有在其名称中包含“Array Controller”，这使得它更容易操作。\n\n您可以通过更改控制器的名称来改善这种情况。更改名称不会修改您已配置的任何绑定，也不会对应用程序的用户产生任何影响。能看到这个变化的只有您自己，但请记住，您也很重要。就像以易于浏览和查找所需内容的方式格式化源代码很重要一样，尽您所能简化在Interface\
    \ Builder中的编辑体验将为您节省时间和减少挫折。\n\n因此，如果您想进行此更改，请转到主nib窗口，确保您查看的是左侧的对象停靠区，找到您的`Mythical\
    \ Person Array Controller`。点击它的名称，将其改为`Mythical Person`。这样做可以删除一些没有实际价值的词语（例如“Array”和“Controller”），这些词语可能会广泛分布在您的nib文件和代码中，最终留下的显示内容希望能让您的大脑和眼睛更快速扫描和理解。\n\
    \n### 将人员放入乐队\n\n现在，让我们通过向`MythicalPerson`显示界面添加一个简单的弹出按钮，实现将人员关联到乐队的功能，这将允许我们为选定的`MythicalPerson`选择一个`MythicalBand`。"
