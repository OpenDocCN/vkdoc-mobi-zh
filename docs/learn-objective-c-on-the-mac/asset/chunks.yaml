  trans: '

    下面的代码展示了进行这些更改后`VillainTrackerAppDelegate.h`的状态（新增的行以**粗体**显示）：


    ```objectivec

    #import <Cocoa/Cocoa.h>


    @interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *nameView;

    @property (weak) IBOutlet NSTextField *lastKnownLocationView;

    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;

    @property (weak) IBOutlet NSComboBox *swornEnemyView;

    @property (weak) IBOutlet NSLevelIndicator *evilnessView;

    @property (weak) IBOutlet NSMatrix *powersView;

    @property (weak) IBOutlet NSPopUpButton *powerSourceView;

    @property (weak) IBOutlet NSMatrix *primaryMotivationView;

    @property (weak) IBOutlet NSImageView *mugshotView;

    @property (unsafe_unretained) IBOutlet NSTextView *notesView;

    @property (weak) IBOutlet NSTableView *villainsTableView;


    @property (strong) NSMutableDictionary *villain;

    @property (strong) NSMutableArray *villains;


    - (IBAction)takeName:(id)sender;

    - (IBAction)takeLastKnownLocation:(id)sender;

    - (IBAction)takeLastSeenDate:(id)sender;

    - (IBAction)takeSwornEnemy:(id)sender;

    - (IBAction)takeEvilness:(id)sender;

    - (IBAction)takePowers:(id)sender;

    - (IBAction)takePowerSource:(id)sender;

    - (IBAction)takePrimaryMotivation:(id)sender;

    - (IBAction)takeMugshot:(id)sender;


    - (IBAction)newVillain:(id)sender;

    - (IBAction)deleteVillain:(id)sender;


    @end

    ```


    这些新声明的结构与上一章中我们通过控制拖拽到`VillainTrackerAppDelegate`类时，Xcode 生成的属性和方法相同。Xcode 会注意到这些代码已被添加，并且这些输出口和操作方法与
    Xcode 生成的同样有效。实际上，请注意代码编辑器窗格左边距中出现的小圆圈。这些圆圈是我们可以通过控制拖拽连接到的端点，这表明 Xcode 识别了我们所做的事情，即创建了一个输出口或操作方法。在布局用户界面时，通过控制拖拽来创建它们非常方便，因为我们可以同时建立连接并创建存根。然而，在调整现有代码时，手动操作可能更快。


    现在，我们将在`VillainTrackerAppDelegate.m`中为新的操作方法添加两个方法实现（目前只是空壳）。将这些行添加到`@implementation
    VillainTrackerAppDelegate`部分：


    ```objectivec

    - (IBAction)newVillain:(id)sender {}

    - (IBAction)deleteVillain:(id)sender {}

    ```


    现在，我们已经向`VillainTrackerAppDelegate`的接口添加了所需内容，并向实现添加了一些空的存根方法。点击“运行”按钮以确保编译无误，然后我们将继续调整
    GUI，为表格腾出空间。


    ## 为表格视图腾出空间


    在 Xcode 的*项目导航器*面板中，单击`MainMenu.xib`以在 Interface Builder 模式下打开它（我们也可以双击`MainMenu.xib`文件在新窗口中打开它）。我们将放大窗口，添加一个表格视图和几个按钮，重新组织布局，并调整所有`NSBoxes`的调整大小特性，以便表格视图可以在两个维度上完全调整大小，而其他盒子将相应地移动。


    首先调整窗口大小，使其宽度增加约 300 像素（大约是原来宽度的一半），但高度保持不变。我们将遵循西方从左到右的阅读习惯来安排布局，使得左侧的选项（在表格视图中）决定右侧显示的内容（所有其他视图），因此您还应该将所有现有视图拖到窗口的右侧。请参见图
    6-2 了解目标布局。在选中窗口的情况下，打开*属性检查器*（![image](img/arrow2.jpg)4），并勾选“调整大小”复选框。


    ![9781430245421_Fig06-02.jpg](img/9781430245421_Fig06-02.jpg)


    图 6-2. 使您的窗口看起来像这样，为表格视图做准备


    现在，在*实用工具*区域（它可能折叠在*检查器*窗格下方）中打开*对象库*窗格（![images](img/arrow6.jpg)4），然后在搜索字段中输入“table”。搜索结果之一应该是“表格视图”，它是包含在`NSScrollView`中的`NSTableView`类的一个实例。将“表格视图”拖到窗口左上方空间，让蓝色参考线出现，将其定位到距离窗口边框的推荐距离。表格视图的默认大小比我们放置它的空间小得多，但暂时不要调整它来填充可用空间，我们稍后会处理。


    我们要对这个表格视图做的第一件事是配置其列。默认情况下，新的表格视图有两列，但我们希望它有**三列**，以便在列表中显示每个反派的名字、最后一次出现日期和头像。要添加一列，我们必须“深入”浏览几层视图。打开*属性检查器*（![image](img/arrow2.jpg)4）以帮助导航；它总是显示关于所选对象的一些信息，最关键的是类名。第一次单击窗口中的表格视图时，我们会看到*属性检查器*顶部显示“滚动视图”。这是因为我们从库中拖出的表格视图实际包含在`NSScrollView`中。再次单击，检查器将显示“表格视图”。


    检查器中可见的属性之一是列数。将其从 2 改为 3。当列数更改时，表格视图中会短暂闪过一个水平滚动条，但很容易错过。除了那个闪烁和表格标题边缘的调整大小栏提示外，表格视图在视觉上并不会真正反映现在有三列；我们稍后会处理这个问题。同时，还需要对表格视图进行另外两项更改。第一项是将*列调整大小*行为从“仅调整最后一列大小”更改为“仅调整第一列大小”。我们的第一列将存放反派的名字，而反派名字的宽度比日期或头像变化更大，因此我们希望调整大小时扩展该列。默认情况下，用户将能够随意调整列宽。


    第二项是使用列数上方的弹出菜单，将表格视图的*内容模式*从基于单元格更改为基于视图。请注意，表格中占位符的名称已从“文本单元格”变为“表格视图单元格”。不幸的是，`NSTableView`中最初显示的对象的命名有点令人困惑。文本单元格是`NSTextFieldCell`，它是`NSCell`的子类。然而，表格视图单元格是`NSTableCellView`的实例，它是`NSView`的子类，而不是`NSCell`，尽管默认标题中使用了“cell”一词。在本书中，我们使用表格视图所做的一切都将基于视图的表格视图。


    **注意** 我们在上一章中简要介绍了单元格。这里提供更多背景信息。在 33Mhz 处理器被视为快速的时代，AppKit 的设计者发现为矩阵或表格中的每个单元格使用单独的视图对象开销太大。为了解决这个问题，他们为这些用户界面部分发明了“单元格”对象的概念。单元格只是表示控件状态的数据承载对象，具有自己的目标和操作输出口，但没有绘图、文本管理和事件管理的开销。单元格不是`NSView`的子类，这使它们成为更轻量级的对象。这意味着基于单元格的用户界面控件必须处理视图（实际可以在屏幕上绘制并响应用户操作）与单元格（不能）之间的状态协调。

    '
- fmt: '在 iOS 中，这种分离已不复存在，苹果似乎也在将 Cocoa 推向这个方向；`NSTableView` 现在支持使用单元格（像传统 Cocoa 一样）或视图（像
    iOS 一样）作为其子视图。`NSMatrix` 目前尚未支持此功能，但未来版本可能会实现。让我们看看能否找到第三列。在窗口中的表格视图外单击以取消选中它，然后再次单击表格视图以选中包含它的滚动视图。你的
    Xcode 中的 Interface Builder 窗格应类似于[图 6-3](#9781430245421_Ch06.xhtml#Fig3)。单击表格视图的右边缘并稍稍展开，使所有三列都可见。继续展开，直到它卡入到旁边显示反派基本信息的信息框位置。出现蓝色参考线，其向下延伸的范围仅与基本信息框大小一致。


    ![9781430245421_Fig06-03.jpg](images/9781430245421_Fig06-03.jpg)


    [图 6-3](#9781430245421_Ch06.xhtml#_Fig3)：我们选中了滚动视图


    最后一列需要进行一些额外配置，因为它将显示图像而非文本。幸运的是，Cocoa 提供了一个类来简化此操作。在实用工具区域中，打开*标识检查器*（![image](images/arrow2.jpg)3），以便我们看清当前位置。单击最后一列，直到选中表格视图单元格。可能需要点击四次才能到达——依次穿过滚动视图、表格视图、表格列和表格单元格视图。到达后，我们会在*标识检查器*中看到
    `NSTableCellView` 作为类名。然而，在费尽周折选中它之后，是时候删除它了。按下 Delete 键将其删除。我们将用一个图像井来替换它。在*对象库*搜索框中输入
    Image，顶部项应是一个图像井。将其从*对象库*拖拽到表格视图的第三列。当鼠标移到一个可放置的位置时，光标应变为绿色加号，并且该列会以蓝色边框高亮显示。松开鼠标按钮，搞定！该表格列现在已准备好显示图像。


    由于图像井比其他两列的表格视图单元格视图更高，请将每个表格视图单元格的大小调整为与图像井相同的高度。它们的高度都应设置为 48 点。要调整大小，请单击每列中显示“Table
    View Cell”的文本，直到表格视图单元格本身变为蓝色，并在底部显示一个调整手柄。向下拖拽调整手柄，会弹出一个实用工具窗口，显示当前尺寸。


    在完成表格视图的处理之前，我们需要配置这些表格列的标识符，使其与反派对象中的 `name`、`lastSeenDate` 和 `mugshot` 值相对应。具体做法是为每一列提供一个与要显示的属性键名相同的标识符。稍后，我们将在代码中看到如何利用此标识符轻松准备要显示的值。通过单击表格视图中“Table
    View Cell”文本下方的空白区域，选中第一列。在*标识检查器*（![image](images/arrow2.jpg)3）中，`NSTableColumn`
    应为类名。在 Identifier 字段中输入“name”。切换到*属性检查器*（![image](images/arrow2.jpg)4），在 Title
    字段中输入“Name”；这将决定列标题中显示的文字。对第二列重复此过程，输入“lastSeenDate”作为标识符，“Last Seen”作为标题。再对第三列重复，输入“mugshot”作为标识符，“Mugshot”作为标题。


    现在，我们要添加两个按钮，一个用于在列表中添加新反派，另一个用于删除选中的反派。回到*对象库*窗格，在搜索字段中输入“button”；结果中会显示数量惊人的按钮列表。苹果公司里一定有非常喜欢设计按钮的人！


    尽管外观各不相同，但此列表中的几乎每个按钮本质上都是一个 `NSButton`，其核心功能始终相同。其中一些按钮被预配置为不同的模式，以用作复选框或展开三角形，但除此之外，它们的基本功能都一样：在被点击时，调用目标对象中的操作方法。从列表中选择前几个按钮之一（例如“Push
    Button”或“Rounded Rect Button”），将其拖拽到我们的窗口中，放在表格视图的正下方。这将作为我们的“添加反派”按钮。我们不直接用文本“Add
    Villain”作为按钮标题，而是使用 Cocoa 内置的图形图像，使其外观类似于其他应用程序中的添加按钮。在按钮仍处于选中状态时，调出*属性检查器*，找到*图像*组合框。单击组合框右侧的小三角形，开始输入“nsaddtemplate”。当你看到它自动补全为“NSAddTemplate”时，按回车键，你会看到新按钮上现在显示一个
    + 图标，叠加在“Add Villain”标签上。在*图像*组合框下方是另一个标注为*替代*的组合框。将其也设置为“NSAddTemplate”。再下方是一组标注为*位置*的按钮，用于指示图像（显示为正方形）相对于按钮标题（显示为一条线）的位置。选择一个只显示正方形而不带文字的项目，按钮标题将消失。水平调整按钮大小，使其刚好能容纳图像，然后复制该按钮（按
    ![images](images/arrow3.jpg)D）以创建另一个按钮。选中这第二个按钮，再次转到*属性检查器*中的*图像*组合框，开始输入“nsremovetemplate”，这将在按钮中提供一个减号（-）图标。同样地，也将*替代*图像设置为“NSRemoveTemplate”。


    现在，选中添加按钮，将其拖拽到窗口底部边缘的正上方，利用蓝色参考线使其左边缘与表格视图的左边缘对齐，底部边缘与窗口底部保持建议的距离。将删除按钮拖放到添加按钮的右侧——它会自动吸附到与添加按钮合适的间距位置。调整表格视图的大小，使其填满窗口中剩余的空间。此时窗口应类似于[图
    6-4](#9781430245421_Ch06.xhtml#Fig4)。


    ![9781430245421_Fig06-04.jpg](images/9781430245421_Fig06-04.jpg)


    [图 6-4](#9781430245421_Ch06.xhtml#_Fig4)：表格视图已放置在我们期望的位置


    我们需要在刚添加的按钮与 `VillainTrackerAppDelegate` 对象之间建立一些连接，以便当用户点击按钮时，`VillainTrackerAppDelegate`
    对象能收到通知。经过最近几章的学习，你可能已经猜到该如何操作了。选中带加号的按钮，按住 Control 键从该按钮拖出一条连接线，连接到 Interface
    Builder 区域左侧 dock 中的 `VillainTrackerAppDelegate` 对象。将出现一个实用工具窗口，其中列出了 `VillainTrackerAppDelegate`
    暴露的所有可用操作。选择我们之前添加的 `newVillain:` 操作。接下来，选中带减号的按钮，按住 Control 键拖出一条连接线到 `VillainTrackerAppDelegate`。这次，选择
    `deleteVillain:` 操作。


    我们还需要在 `VillainTrackerAppDelegate` 和表格视图之间建立连接。选中左侧 dock 中的 `VillainTrackerAppDelegate`，按住
    Control 键从它拖出一条连接线到表格视图。当鼠标经过表格视图时，它会高亮显示。松开鼠标，会显示一个可用输出口的列表。选择 `villainsTableView`。现在，我们需要从反方向建立两个连接，即从表格视图连接到
    `VillainTrackerAppDelegate`。选中窗口中的表格视图（需要点击两次，才能从滚动视图向下深入到表格视图）。'
  raw: 'In iOS, this split is gone, and Apple appears to be moving Cocoa in this direction
    as well; `NSTableView` now supports using cells (like traditional Cocoa) or using
    views (like iOS) for its subviews.  `NSMatrix` doesn’t do this yet, but perhaps
    it will in a future release.    Let’s see if we can find that third column. Click
    in the window away from the table view to deselect it, and then click once on
    the table view to select the containing scroll view. Your Interface Builder pane
    in Xcode should look something like [Figure 6-3](#9781430245421_Ch06.xhtml#Fig3).
    Click on the right edge of the table view and expand it a bit so that all three
    columns are visible. Expand it further until it snaps into place next to the adjoining
    box holding the basic information on our villains. The blue guideline will appear,
    extending down only as far as the size of the Basic Information box.    ![9781430245421_Fig06-03.jpg](images/9781430245421_Fig06-03.jpg)    [Figure
    6-3](#9781430245421_Ch06.xhtml#_Fig3). We’ve got the scrollview selected    That
    final column needs a little extra configuration because it’s going to display
    an image instead of text. Fortunately, Cocoa provides a class that makes this
    easy. Open the *Identity* *Inspector* (![image](images/arrow2.jpg)3) in the Utility
    area, so we can see where we are. Click the last column until the table view cell
    is selected. It might take four clicks to get there—through the Scroll view, the
    table view, the Table column, and then the table cell view. Once there, we’ll
    see `NSTableCellView` as the class name in the *Identity Inspector*. However,
    after all that work to click through to it, it’s time for it to go. Press the
    Delete key to delete it. We’re going to replace it with an image well. In the
    *Object Library* Search box, type Image and the top item should be an Image Well.
    Drag it out from the *Object Library* into the third column of the table view.
    The cursor should turn into a green plus sign and the column should highlight
    with a blue border when we’re over a drop-ready spot. Release the button, and
    voila! That table column is now ready to display an image.    Since the image
    well is taller than the two table view cell views in the other two columns, resize
    each of the table view cells to be the same height as the image well. They should
    all have a height of 48 points. To resize them, click on the text that reads “Table
    View Cell” in each column until the table view cell itself is blue, with a resize
    handle at the bottom. Drag down on the resize handle and a Utility window will
    appear indicating the current size.    Before we’re done with the table view,
    we need to configure these table columns to correspond to the name, lastSeenDate,
    and mugshot values in our villain objects, and we’ll do that by supplying each
    of them with an identifier that is the same as the key-name for the attribute
    we want to show. Later on, we’ll see how to use this identifier in our code to
    easily prepare values for display. Select the first column by clicking in the
    table view below the “Table View Cell” text. In the *Identity Inspector* (![image](images/arrow2.jpg)3),
    `NSTableColumn` should be the class name. Type “name” into the Identifier field.
    Switch to the *Attributes Inspector* (![image](images/arrow2.jpg)4), and type
    “Name” into the Title field; this determines what will appear in the text of the
    column’s header. Repeat this process for the second column, entering “lastSeenDate”
    as the identifier and “Last Seen” as the title, and again for the third title,
    entering “mugshot” for the identifier and “Mugshot” for the title.    Now we’re
    going to add a pair of buttons, one for adding a new villain to the list and one
    for deleting the selected villain. Back in the *Object Library* pane, type “button”
    into the Search field; a surprisingly large list of buttons will show up in the
    results. Someone at Apple really likes to design buttons!


    Despite their differences in appearance, just about everything in this list is
    just an `NSButton`, which at its core always does the same basic thing. Some of
    them are preconfigured in different modes to work as a checkbox or disclosure
    triangle, but otherwise they all do the same basic thing: call an action method
    in a target object when clicked.    Pick one of the first few buttons in the list
    (maybe Push Button or Rounded Rect Button) and drag it to our window, dropping
    it just below the Table View. This will be our “Add Villain” button. Instead of
    just titling the button with the text “Add Villain”, we’ll use one of Cocoa’s
    built-in graphic images to make it resemble Add buttons in other applications.
    While the button is still selected, bring up the *Attributes Inspector*, and locate
    the *Image* combo box. Click the small triangle at the right end of the combo
    box, and start typing “nsaddtemplate”. When you see that it’s filled in the full
    text as “NSAddTemplate”, press Enter and you’ll see that your new button now has
    a + image, overlaid on the “Add Villain” label. Underneath the *Image* combo box
    is another combo box labeled *Alternate*. Set that to NSAddTemplate also. Below
    that is a set of buttons labeled *Position*, indicating the position of the image
    (shown as a square) relative to the button title (shown as a line). Select the
    item that just shows a square with no text, and the Button title will disappear.
    Resize the button horizontally so that it is just wide enough to contain the image,
    then duplicate the button (with ![images](images/arrow3.jpg)D) to make another
    one. Select this second button, go back to the *Image* combo box in the *Attributes
    Inspector* again, and begin typing “nsremovetemplate”, which will provide you
    with a – image in your button. As before, also set the *Alternate* image to be
    NSRemoveTemplate.    Now, take the Add button, and drag it to a point just above
    the bottom edge of the window, using the blue guidelines to make its left edge
    line up with the left edge of the Table View and its bottom edge the recommended
    distance from the bottom of the window. Drag the Remove button into location just
    to the right of the Add button—it will snap to a comfortable distance from the
    Add button. Resize the Table View to fill the remaining space in the window. The
    window should resemble [Figure 6-4](#9781430245421_Ch06.xhtml#Fig4) at this point.    ![9781430245421_Fig06-04.jpg](images/9781430245421_Fig06-04.jpg)    [Figure
    6-4](#9781430245421_Ch06.xhtml#_Fig4). The Table View is just where we want it    We
    need to set up some connections between the buttons that we just added and the
    `VillainTrackerAppDelegate` object so that the `VillainTrackerAppDelegate` object
    gets notified when the user clicks on a button. After the last few chapters, you
    can probably guess how we’ll do it. Select the button with the plus sign, and
    control-drag a connection from the button to the `VillainTrackerAppDelegate` object
    in the dock on the left side of the Interface Builder area. A utility window will
    appear with the list of available actions exposed by `VillainTrackerAppDelegate`.
    Select the `newVillain:` action that we added earlier. Next, select the button
    with the minus sign, and control-drag a connection out to `VillainTrackerAppDelegate`.
    This time, select the `deleteVillain:` action.    We also need to set up connections
    between the `VillainTrackerAppDelegate` and the table view. Select the `VillainTrackerAppDelegat``e`
    in the dock on the left, and control-drag a connection out to the Table View.
    The Table View will highlight when the mouse is over it. Release the mouse, and
    a list of available outlets will appear. Choose `villainsTableView`. Now we need
    to make two connections in the other direction, from the Table View to the `VillainTrackerAppDelegate`.
    Select the Table View in the window (which will take two clicks to drill down
    through the Scroll view).'
