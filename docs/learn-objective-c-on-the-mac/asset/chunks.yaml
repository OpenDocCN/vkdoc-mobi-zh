    the lines in bold to `FIAppDelegate.h` to add all of these.    ``` @interface
    FIAppDelegate : NSObject <NSApplicationDelegate>  @property (assign) IBOutlet
    NSWindow *window; @property (weak) IBOutlet NSBox *box; @property (weak) IBOutlet
    NSTabView *tabView;  @property (weak) NSView *leftView; @property (weak) NSView
    *rightView; @property (weak) NSView *middleView; @property (strong) NSArray *items;
    @property NSInteger currentTabIndex;  - (IBAction)previous:(id)sender; - (IBAction)next:(id)sender;  @end
    ```    Now let’s start implementing our app delegate class in `FIAppDelegate.m`.
    This class will have a number of methods for preparing a transition by setting
    up the next view to be displayed out to the side of the box, transitioning the
    new view into position, and transitioning the current view out to the other side.
    Because we want to be able to do transitions in two directions, depending on whether
    we’re flipping to the right or the left, each of those methods exists in two forms,
