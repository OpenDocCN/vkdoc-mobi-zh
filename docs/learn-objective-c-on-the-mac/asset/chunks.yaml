    点击后，将弹出标准的 Mac OS X 颜色选择器（图 2-13），然后我们可以为文本选择所需的颜色。现在就去操作一下，挑选你喜欢的任何颜色。


    ![9781430245421_Fig02-13.jpg](img/9781430245421_Fig02-13.jpg)


    图 2-13. 标准的 Mac OS X 颜色选择器，用于在 Cocoa 应用程序中选择颜色。这里，我们在 Interface Builder 中使用它来设置文本的颜色。


    Xcode 本身是使用 Cocoa 构建的，并利用了 Cocoa 的大量内置功能，例如标准颜色选择器。Apple 的工程师和您一样不想重复造轮子。在编写自己的应用程序时，您只需几行代码，或者在某些情况下完全不用编写代码，就能使用这个完全相同的颜色选择器。


    另一个您可以在应用程序中使用的 Mac OS X 内置功能是标准字体窗口，它允许您更改所选文本的字体、大小和属性。在创建要分发给其他人的应用程序时，务必要意识到您可能会选择用户未安装的字体。通常，对于标准的
    GUI 组件，最好根本不要更改字体。一致的字体使用是 Mac 著名的 GUI 一致性的重要组成部分。大多数标签、按钮和其他控件默认使用 Lucida Grande
    字体。您可以更改某些标签的大小，并在粗体和常规之间切换以突出显示不同内容，但请保持字体本身不变。


    Xcode 在*属性检查器*的字体字段中提供了指导，如图 2-14 所示。尽管字体面板可用，但 Xcode 还提供了一个带有快速访问系统默认字体的标注窗口。如果您确定需要当前系统字体的粗体版本，可以轻松地从该标注窗口的字体下拉菜单中获取。通常，对于常见的用户界面元素，您会希望使用这种方法，而不是显式设置字体。


    ![9781430245421_Fig02-14.jpg](img/9781430245421_Fig02-14.jpg)


    图 2-14. Xcode 有一个特殊的字体选择器标注，用于轻松访问默认字体。


    在 Xcode 中按下 `NT` 可调出字体窗口。确保我们的标签仍然被选中（寻找调整大小的手柄），并且确保我们应用程序的主窗口仍然是最前面的窗口。


    一旦我们将标签调整到满意的样子，我们将为应用程序进行最后的润色，然后运行它。我们快完成了！


    ## 创建应用程序图标


    所有应用程序都需要一个图标。Mac OS X 为图标使用了一种特殊格式，该格式将多个图像打包在一起，以便在缩放时和为配备 Retina 显示屏的设备提供多种尺寸和分辨率的图像。不过，Xcode
    会为我们准备这种格式。我们只需要恰当地命名图像，并将它们放入一个扩展名为 `.iconset` 的文件夹中。


    命名约定相当简单直接。一个示例图像名称是 `icon_128x128@2x.png`。每个图像的名称以 `icon_` 开头，后跟分辨率，再后跟一个可选的标记以指示高分辨率素材，最后是文件扩展名，例如
    `.png`。Cocoa 使用的全套尺寸是 16 × 16、32 × 32、128 × 128、256 × 256 和 512 × 512。每一个都可以选择加上
    `@2x` 的高分辨率标记。请注意，尺寸是以屏幕点为单位，而不是像素；一个 512 × 512 的 `@2x` 文件的实际像素尺寸是 1024 × 1024
    像素。Cocoa 知道我们的应用是否运行在配备 Retina 或其他高分辨率显示屏的机器上，并将根据屏幕像素密度和所需尺寸选择最佳的位图。


    如果我们没有提供 Cocoa 所需的图像，它会缩放我们提供的某个图像。我们可以提供一个细节丰富的超大图像，用于在配备 Retina 显示屏的 Mac 上运行，但这可能看起来不完全是我们想要的样子。对多个图像的支持意味着我们可以定制图标在较小尺寸下的显示效果。


    我们需要在图像编辑程序（如 Photoshop、Pixelmator 或 GIMP）中创建我们的图标。原始文件尺寸应为 1024 × 1024 像素，并保存为支持
    Alpha 通道（透明度）的标准图像格式，例如 TIFF、PSD 或 PNG。在本示例中，我们使用的是 `.png` 文件。我们将其保存为 `icon_512x512@2x.png`。然后，我们可以使用任何最有效的方法来缩小图像。通常的做法是使用图像编辑器的调整大小功能，然后根据需要进行手动清理。


    为免去您自行创建图标的麻烦，我们提供了一个包含图像的 `hello world.iconset` 文件夹，您可以将它添加到您的项目中。您可以在第 2 章的下载项目文件中找到这个文件夹。如果您想自己创建，请继续，使用
    `hello world.iconset` 文件夹中相同的命名约定来命名您的图像。


    ## 将图标添加到项目


    无论您是自己创建了图标还是使用我们的图标，是时候将图标添加到 Xcode 项目中了。为此，请在屏幕左侧的*导航器*区域中选择项目。它将是*项目导航器*视图中的最顶层项目；在我们的例子中，它标记为“Chapter2”。项目摘要信息将显示在窗口中间的*编辑器*区域中，并且应已选中
    Chapter2 目标。将 `hello world.iconset` 文件夹从 Finder 拖放到窗口中间的 Xcode 的 App 图标放置区，如图
    2-15 所示。这告诉 Xcode 我们要将此文件导入到项目中。


    ![9781430245421_Fig02-15.jpg](img/9781430245421_Fig02-15.jpg)


    图 2-15. 将文件拖放到 App 图标放置区以将图标添加到 Xcode 项目。


    松开鼠标按钮后，`.iconset` 文件将被复制到项目目录中，并添加到文件列表中。我们也可以让 Xcode 使用项目目录之外的文件，但现在我们希望将所有内容放在一个地方。


    ## 属性列表


    `Info.plist` 是一种特殊类型的文件，称为*属性列表*。属性列表在整个 OS X 中被广泛使用。虽然最终用户很少看到它们，但它们在 Cocoa 开发的许多部分中都会用到，所以您会经常见到它们。


    属性列表文件由一系列条目组成。每个条目由一个键和一个值组成。图 2-16 显示了 Xcode 内置的属性列表编辑器正在编辑 `Chapter2-Info.plist`
    文件。每一行代表一个单独的条目。如您所见，属性列表由三列组成。左列标记为*键*，右列标记为*值*。中间的列标记为*类型*，表示数据类型；大多数属性列表的值是字符串，但有时也可能看到其他类型。


    ![9781430245421_Fig02-16.jpg](img/9781430245421_Fig02-16.jpg)


    图 2-16. 在编辑窗格中打开的 `Chapter2-Info.plist`，以便我们查看此应用程序图标文件的名称。


    **注意** 属性列表还能够在单个键下存储多个值。可以在单个键下存储一个项目数组（或列表），甚至可以在一个键下存储另一整套键值对。您可能还需要一段时间才需要用到这个功能，但我们认为您应该知道它是可行的。


    在图 2-16 中，键为 `Icon file` 的条目被高亮显示。

