- fmt: "A block can be assigned to a variable, passed as an argument to a function\
    \ or method, and in general treated like any other Objective-C object. Unlike\
    \ other most other types available in C, blocks can also be executed. We can create\
    \ a block in one object and pass it off to another object that can execute it\
    \ later. In this way, blocks can be used as an alternative to the delegate pattern\
    \ in Objective-C or to callback functions in C.\n\nMuch like a method or function,\
    \ a block can take one or more parameters and specify a return value. In order\
    \ to declare a block variable, we make use of the caret (`^`) symbol along with\
    \ some additional parenthesized bits to declare parameters and return types. To\
    \ define the block itself, we do roughly the same, but follow it up with the actual\
    \ code defining the block wrapped in curly braces. Here are some examples of what\
    \ we’re talking about:\n\n```\n// Declare a block variable \"loggerBlock\" with\
    \ no parameters and no return value.\nvoid (^loggerBlock)(void);\n\n// Assign\
    \ a block to the variable declared above.  A block without parameters\n// and\
    \ with no return value, like this one, needs no \"decorations\" like the use\n\
    // of void in the preceeding variable declaration.\nloggerBlock = ^{\n    NSLog(@\"\
    I'm just glad they didn't call it a closure\");\n};\n\n// Execute the block, just\
    \ like calling a function.\nloggerBlock();  // this produces some output in the\
    \ console\n```\n\nIf you’ve done much C programming, you may recognize that this\
    \ is similar to the concept of a function pointer in C. However, there are a few\
    \ critical differences. Perhaps the biggest difference is that a block can be\
    \ defined inline, inside the body of a function or method. We can define a block\
    \ right at the point where it’s going to be assigned to a variable, or passed\
    \ to another method or function.\n\nAnother big difference is that a block can\
    \ access variables available in the scope where it’s created. By default, the\
    \ block makes ready-only copies of any variables we access this way, leaving the\
    \ originals intact. At the same time, it automatically increases the reference\
    \ count of any Objective-C object used from the surrounding scope and decreases\
    \ the reference count again when the block has executed. However, we can make\
    \ any outside variable read/write by prepending `__block` before its declaration.\n\
    \n```\n// define a variable which can be changed by a block\n__block int a = 0;\n\
    \n// define a block that tries to modify a variable in its scope\nvoid (^sillyBlock)(void)\
    \ = ^{\n    a = 47;\n};\n\n// check the value of our variable before calling the\
    \ block\nNSLog(@\"a == %d\", a); // outputs \"a == 0\"\n\n// execute the block\n\
    sillyBlock();\n\n// check the values of our variable again, after calling the\
    \ block\nNSLog(@\"a == %d\", a); // outputs \"a == 47\"\n```\n\nAs mentioned,\
    \ blocks really shine when used with GCD. GCD includes a set of functions that\
    \ accomplish the same sorts of things that `NSOperation` and `NSOperationQueue`\
    \ do, but with a different spin. The main difference is that, instead of explicitly\
    \ creating a bunch of operations, optionally declaring inter-operation dependencies,\
    \ and then assigning adding the operations to queues, with GCD we call a function\
    \ that takes a block and adds it to a queue in a single step. We’ll get to that\
    \ a little later, but first we’ll show how to tackle concurrency with operation\
    \ queues.\n\n## Vitalizing SlowWorker\n\nTo see how operation queues work, let’s\
    \ put them to the test in SlowWorker. Before we start, make a copy of the entire\
    \ folder containing the SlowWorker project. Later on in this chapter we’re going\
    \ to use the original version of SlowWorker as a starting point for another way\
    \ to implement concurrency, so keep a copy of it lying around.\n\nRecall that\
    \ the problem with this app is that the single action method calls several other\
    \ methods in sequence, the total length of which is enough to make the app feel\
    \ unresponsive.\n\nWhat we’re going to do is put each of those other methods into\
    \ an operation, put all the operations into a queue, and let the queue do its\
    \ thing.\n\nThe `doWork:` method is the place where we’re going to make all our\
    \ changes. We start off by giving all of our local `NSString` variables the `__block`\
    \ storage qualifier. Then we wrap each little chunk of work inside a block, declare\
    \ some dependencies so that they run in the right order, and then pass them off\
    \ to a new queue for execution. Take a look at the bold lines shown here (and\
    \ add them to our method as well, of course) and then we’ll discuss the details\
    \ a little more:\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
    \ = [NSDate date];\n    \n    __block NSString *fetchedData;\n    __block NSString\
    \ *processed;\n    __block NSString *firstResult;\n    __block NSString *secondResult;\n\
    \    \n    self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n        fetchedData = [self fetchSomethingFromServer];\n\
    \        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                   @\"Fetched: %@\\n\", fetchedData];\n    }];\n\
    \    \n    NSBlockOperation *process = [NSBlockOperation blockOperationWithBlock:^{\n\
    \        processed = [self processData:fetchedData];\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"Processed: %@\\n\", processed];\n    }];\n    \n    NSBlockOperation\
    \ *calcFirst = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult\
    \ = [self calculateFirstResult:processed];\n    }];\n    \n    NSBlockOperation\
    \ *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult\
    \ = [self calculateSecondResult:processed];\n    }];\n    NSBlockOperation *showResults\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n         \
    \                          firstResult, secondResult];\n\n        NSDate *endTime\
    \ = [NSDate date];\n        NSLog(@\"Completed in %f seconds\",\n            \
    \  [endTime timeIntervalSinceDate:startTime]);\n              self.isWorking =\
    \ YES;\n\n    }];\n    \n    [process addDependency:fetch];\n    [calcFirst addDependency:process];\n\
    \    [calcSecond addDependency:process];\n    [showResults addDependency:calcFirst];\n\
    \    [showResults addDependency:calcSecond];\n    \n    NSOperationQueue *queue\
    \ = [[NSOperationQueue alloc] init];\n\n    [queue addOperations:@[fetch, process,\
    \ calcFirst, calcSecond, showResults]\n       waitUntilFinished:NO];\n}\n```\n\
    \nThe first thing we did was add the `__block` storage qualifier to some local\
    \ variables. That way, each of those `NSString` pointers remains a single, unique\
    \ pointer that can be both read from and written to by each block. In this context,\
    \ “writing” means assigning to the pointer to point at a different object. Without\
    \ `__block`, each block would get a new pointer of its own, all pointing at the\
    \ same initial object, and none of them writable at all! So `__block` gives us\
    \ a way of sharing some data between blocks.\n\nNext, we create some operations.\
    \ Instead of simply executing each worker method directly, it now creates an `NSBlockOperation`\
    \ for each. `NSBlockOperation` is simply a class of `NSOperation` that is designed\
    \ to be created from a block.\n\nThen we define a set of dependencies between\
    \ these operations, so that `process` is only executed after `fetch` is done,\
    \ `calcFirst` and `calcSecond` are only executed after `process` is done, and\
    \ `showResults` is only executed after all the others are done.\n\nFinally, we\
    \ create a new `NSOperationQueue` and pass it an array containing all our operations.\
    \ The queue will look at all the dependencies between these operations and figure\
    \ out how to execute them in the correct order.\n\n## Demanding the Main Thread\n\
    \nHowever, we’re still not quite ready to roll."
