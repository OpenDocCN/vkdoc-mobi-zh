    ## 总结 (Wrap Up)


    在本章中，我们扩展了旧的数据模型，将其从一个单独的实体发展为一组通过关系相互关联的完整实体。我们还看到了如何将这些关系中的每一个在 GUI 中表达出来（例如，使用弹出列表来选择对一关系的远端，并使用表格视图来展示对多关系的所有内容），并通过
    Cocoa 绑定进行配置和管理。


    关于这种可视化编程的方式，我们并非老生常谈，但值得重复的是，本章中的所有操作都是在没有编写一行代码的情况下完成的。请注意，我们使用的术语“可视化编程”与微软在其开发工具中所使用的“Visual”一词无关。可视化编程背后的理念是允许程序或其部分使用图形化组件来构建，这些组件不需要传统用于编写软件的文本式、过程式编程。Cocoa
    在一定程度上支持可视化编程，允许您仅使用 Xcode 数据建模器和 Interface Builder 来构建应用程序原型甚至整个应用程序。然而，它并非旨在构成一个完整的可视化编程系统，因此，对于您构建的每个
    Cocoa 应用程序，您将不可避免地需要沉下心来编写一些代码！


    此外，这些使用模式同样可以很好地应用于您自己的应用程序。仅仅是建模您的问题域、定义实体和关系，往往就能开始让您了解如何构建 GUI。


    随着您在应用程序开发过程中取得进展，您肯定会找到更多使用 Cocoa 绑定将不同类型的控件连接到数据的方法，并且有时您也会发现需要通过编写代码来连接事物和在对象之间传输数据。


    在您学习本书剩余部分的过程中，您将看到更多将 Core Data 和 Cocoa 绑定作为其架构核心部分的应用程序示例，因此您将看到更多使用这些技术的方法。下一章是专门讨论
    Core Data 的最后一章，将向您展示如何限制在 GUI 中显示内容的范围，这对于处理大量数据的任何应用程序来说都是绝对必要的。


    ## 第 10 章 使用条件进行搜索和检索 Core Data


    第 8 章和第 9 章中的 MythBase 示例演示了 Core Data 的基本工作原理，让我们能够轻松地从后端存储中创建、检索、更新和删除对象。到目前为止，我们在
    MythBase 中主要处理完整的数据集。对于使用的大部分实体（`MythicalPerson`、`MythicalBand`和`MythicalVenue`），每个实体的所有对象都在应用程序启动期间加载，并在应用程序的整个生命周期内保持在内存中。对于像
    MythBase 这样维护小型数据库的应用程序来说，这没问题，但如果我们的某个主要实体在后端存储中包含成千上万个实例呢？我们的应用程序会在启动时加载所有数据，这很可能导致应用程序耗尽所有可用内存、转而使用磁盘交换等问题。除了这个问题，我们还可能最终导致糟糕的用户体验，因为一个显示
    20 个对象时易于导航的 GUI，在有数千个条目时可能会变得难以有效使用。


    这个问题的解决方案涉及一个重要的功能：一种提供搜索条件的方法，以便我们能够限制控制器从存储中读取的对象。本章将介绍使用`NSPredicate`来将搜索限制为给定`Entity`所有对象的一个子集。我们将在
    Interface Builder 和源代码中指定一个硬编码的`NSPredicate`，并让用户使用`NSPredicateEditor`为条件定义值。


    ### 创建 QuoteMonger


    我们将通过创建一个名为 QuoteMonger 的应用程序来演示`NSPredicate`的使用，该应用程序允许我们跟踪所有最喜欢的节目及其中的著名台词。它将是一个包含两个实体的
    Core Data 应用程序，外加一个支持数据输入和灵活查询的 GUI。图 10-1 显示了完成后的应用程序视图。


    ![9781430245421_Fig10-01.jpg](img/9781430245421_Fig10-01.jpg)


    图 10-1. QuoteMonger 的数据输入和搜索窗口


    **注意** 到现在为止，您已经掌握了创建 Xcode 项目和文件的基础知识，因此对于某些您已经做过多次的操作，我们不会再给出逐一点击的详细说明，而是将最详细的描述保留给每章涵盖的新主题。


    ### 创建项目及其数据模型


    首先在 Xcode 中创建一个新的 Core Data 项目，并将其命名为`QuoteMonger`。然后编辑`QuoteMonger.xcdatamodel`文件，并添加两个实体，分别命名为`Show`和`Quote`。我们在前两章中已经介绍过这个步骤，所以如果遇到困难，请翻阅回前几页进行回顾。


    为`Show`添加一个名为`name`的属性，类型为`String`。关闭`Optional`复选框，并打开`Indexed`复选框。然后为`Quote`添加两个`String`类型的属性，分别命名为`quoteText`和`character`。


