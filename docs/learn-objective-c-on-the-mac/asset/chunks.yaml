    \ by clicking a row, and how to edit values right in the table.  \n\nWe’ll learn\
    \ how to use a table view by extending the VillainTracker application from [Chapter\
    \ 5](#9781430245421_Ch05.xhtml). The new version of VillainTracker we create in\
    \ this chapter will maintain an array of villains, display them all in a table,\
    \ and let the user edit all the attributes of the selected villain when they click\
