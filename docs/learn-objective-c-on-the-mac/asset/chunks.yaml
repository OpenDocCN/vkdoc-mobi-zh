  raw: 'But there was something very important missing in the first two applications
    that most applications will need: the ability to interact with the user. When
    we were in Interface Builder in the last chapter, we saw that there was a whole
    library filled with objects like text fields and buttons that we can use to assemble
    our interface, but those user-interface objects are no good if we can’t tell when
    they’re used or change the data they contain. In this chapter, we’ll see how those
    objects can be used to let users interact with our application—via the object’s
    outlets and actions.    Declaring Outlets and Actions    To review from the last
    chapter, Cocoa uses things called *outlets* and *actions* to connect the objects
    in the user interface with the objects in our code. Outlets are pointers to objects
    in our nib file, which allow our code to access and manipulate objects in the
    nib. Actions are methods we write that can be executed directly as a result of
    user interaction, such as at the click of a button or a user selecting a menu
    item. Outlets and actions are typically contained in our controller classes (although
    they are sometimes used elsewhere).    Declaring Outlets    Outlets are Objective-C
    instance variables that are declared using a special keyword: `IBOutlet`. An outlet
    is a pointer that can be linked to an object in our user interface. So, for example,
    our controller class might declare an outlet to an editable text field like this:    ```
    @property (weak) IBOutlet NSTextField *nameField; ```    In this example, as far
    as our code is concerned, `nameField` is a pointer to whatever text field we link
    it to in Interface Builder. It will behave exactly the same way as a pointer to
    an object that we allocated and initialized ourselves. Once an outlet is linked
    to an object, we can retrieve or set its value, hide it, disable it, or do anything
    else that the object supports. We’ll see how to make the link between an outlet
    and an object in a nib file in a moment.    The attribute `(weak)` is included
    in the code that Xcode generates outlets in our `.h` file. It means that the controller
    doesn’t “own” the `nameField`; the `nameField` could be deallocated and, if so,
    the property will be set to nil. There are other attributes that can be set on
    properties, dealing with memory semantics and with naming. When we add properties
    by hand, we need to be familiar with the various attributes that can be used to
    annotate them. For now, just leave this the way that Xcode generated it.    You
    can read more about the new Objective-C properties in the second edition of *Learn
    Objective-C on the Mac*, by Mark Dalrymple and Scott Knaster (Apress, 2012), and
    in *The Objective-C Programming Language* book, available both in Xcode and from
    Apple’s developer site at `https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/ObjectiveC/ObjC.pdf`.    Declaring
    Actions    As noted in the previous chapter, actions are Objective-C methods that
    can be invoked directly from the application’s user interface. Actions in our
    objects get connected to the user interface by control-dragging in Interface Builder
    from a user-interface control to a method in our code.    Actions are created
    in exactly the same way as other Objective-C methods, but they have to conform
    to a specific structure. In particular, action method declarations have to look
    like this:    ``` -(IBAction)doSomething:(id)sender; ```    The name of the method
    can be anything we want, but the return type has to be `IBAction`, and the method
    has to take one argument of type `id`, which will be a pointer to the object that
    triggered the action. If this method gets called as the result of the user clicking
    a button, then sender will be a pointer to the button pressed. An action can be
    the target of more than one user-interface object, and the sender argument lets
    us know which control was in use.    **Caution**  Action methods are one area
    where Cocoa and Cocoa Touch are different.


    In Cocoa Touch, action methods can have one of three different method signatures,
    taking either zero, one, or two arguments. This is not the case for actions in
    Cocoa, which must take one and only one argument.    **BUT WHAT ARE THEY?**    Just
    what are `IBAction` and `IBOutlet`? Are they part of the Objective-C language?    Nope.
    They’re good old-fashioned C pre-processor macros. If we go into the `AppKit.framework`
    and look at the `NSNibDeclarations.h` header file, we’ll see that they’re defined
    like this:    `#ifndef IBOutlet`    `#define IBOutlet`    `#endif`    `#ifndef
    IBAction`    `#define IBAction void`    `#endif`    Confused? These two keywords
    do absolutely nothing as far as the compiler is concerned. `IBOutlet` gets entirely
    removed from the code before the compiler ever sees it. `IBAction` resolves to
    a void return type, which just means that action methods do not return a value.
    So, what’s going on here?    The answer is simple, really: `IBOutlet` and `IBAction`
    are not used by the compiler. They are used by Interface Builder. Interface Builder
    uses these keywords to parse out the outlets and actions available to it. Interface
    Builder can only see methods that are prefaced with `IBAction` and can only see
    variables or properties that are prefaced with `IBOutlet`. Also, the presence
    of these keywords tells other programmers looking at our code in the future that
    the variables and methods in question aren’t dealt with entirely in code. They’ll
    need to delve into the relevant nib file to see how things are hooked up and used.    Outlets
    and Actions in Action, Act 2    There’s no substitute for actually playing with
    these concepts, so we’re going to write another Cocoa application. In this one,
    we’ll be writing some code of our own. Setting up the new project will follow
    the same sequence of events that we used in the previous chapter, so this should
    feel familiar. In fact, we’ll repeat these steps every time we create a new project.    If
    you’re not still in Xcode, open it back up. Now, press ![image](images/arrow1.jpg)N
    or select **New Project** from the **File** menu. Select the *Cocoa Application*
    template again. Make sure the checkboxes for *Core Data* and *Document-Based Application*
    are turned off, the checkbox for *Use Automatic Reference Counting* is turned
    on, and when prompted for a project name, enter “Chapter4” ([Figure 4-1](#9781430245421_Ch04.xhtml#Fig1)).
    For this example, we’ll use `Buttons` as the class prefix setting. Click Next
    again and select a folder for our project. Press Create, and Xcode will drop us
    into the Project Settings panel. Xcode also generated a class for us called `ButtonAppDelegate`
    and a nib file named `MainMenu.xib`.    ![9781430245421_Fig04-01.jpg](images/9781430245421_Fig04-01.jpg)    [Figure
    4-1](#9781430245421_Ch04.xhtml#_Fig1). Setting initial properties for a new Cocoa
    application in Xcode    We’re going to start by laying out the interface, so single-click
    `MainMenu.xib` in the *Navigator* pane. This will open up the nib file in the
    Interface Builder Editor pane ([Figure 4-2](#9781430245421_Ch04.xhtml#Fig2)).    ![9781430245421_Fig04-02.jpg](images/9781430245421_Fig04-02.jpg)    [Figure
    4-2](#9781430245421_Ch04.xhtml#_Fig2). Initial view of the window in MainMenu.xib
    in Xcode’s Interface Builder Editor    In the lower left part of the Interface
    Builder pane is a small grey triangle, like a Play button. Click it, and the set
    of icons on the left border of the Interface Builder pane will expand into a set
    of *Placeholders* and a set of *Objects* ([Figure 4-3](#9781430245421_Ch04.xhtml#Fig3)).
    We’re going to be working with the object named `Window - Chapter4` in the *Objects*
    section.    ![9781430245421_Fig04-03.jpg](images/9781430245421_Fig04-03.jpg)    [Figure
    4-3](#9781430245421_Ch04.xhtml#_Fig3). Expanding the nib’s contents into Placeholders
    and Objects    Placeholder Objects    Before we do that, though, take a moment
    to look at the first three objects in the nib.'
