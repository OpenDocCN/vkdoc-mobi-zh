- fmt: "# Cocotron\n\nCocotron has a slightly different focus (trying to keep on top\
    \ of all of Apple’s latest classes and API changes) and a different deployment\
    \ target (it’s focused primarily on Windows instead of Unix), but it may also\
    \ be worth thinking about if you want to port your app to Windows. It also has\
    \ a less stringent license than GNUstep, which means you’re free to build Cocotron\
    \ into your own closed-source applications. The official Cocotron web site at\
    \ `www.cocotron.org` seems to be nearly dead, but some development is still happening,\
    \ as evidenced by the discussions at the project’s Google group at `http://groups.google.com/group/cocotron-dev/`.\n\
    \n# Cappuccino/Objective-J\n\nAnother interesting development from the past few\
    \ years is the Cappuccino development environment. Unlike the other environments\
    \ we’ve mentioned, Cappuccino is all about making web apps, not desktop apps.\
    \ So instead of running Cappuccino apps on the desktop, they’re hosted on a web\
    \ server and run in a web browser. Cappuccino development is all about running\
    \ software on the client side, using JavaScript running in the context of a single\
    \ HTML page, rather serving up page after page of content like a traditional web\
    \ development framework does.\n\nCappuccino contains class libraries that mimic\
    \ much of Foundation and AppKit in name and functionality, and even manages to\
    \ pull off the amazing trick of implementing much of Objective-C’s syntax in JavaScript,\
    \ as we described when we mentioned JSCocoa. The applications created using Cappuccino\
    \ can then be published on any web server and run in any modern browser, just\
    \ like any other web application. This implementing of Objective-C in JavaScript\
    \ is called Objective-J and is a crucial part of what makes Cappuccino tick.\n\
    \nCappuccino started off as a strange hybrid, consisting of an open source core\
    \ containing the JavaScript frameworks and what was meant to be a commercial IDE\
    \ called Atlas, which was itself a Cappuccino app. The company behind this idea\
    \ was bought out before Atlas was ever released, though. Nowadays, the open source\
    \ project has expanded to include tools that let you build the GUI for your Cappuccino\
    \ app directly in Xcode’s Interface Builder instead. Go to `www.cappuccino-project.org`\
    \ to follow the action.\n\n# Here at the End of All Things\n\nThat wraps up the\
    \ discussion of future paths for you to take as you develop your Cocoa skills;\
    \ this also concludes this book. We hope this book has taken you to a place you\
    \ wanted to get to, but let’s not assume that this stopping place is the final\
    \ destination! Visit the *Learn Cocoa on the Mac* web site, where you’ll find\
    \ forums for discussing with other Cocoa developers, source code for all the examples\
    \ in this book, and more. And be sure to visit us at `http://learncocoa.org` where\
    \ we’ll do our best to help you learn even more!\n\n# Index\n\n![image](images/square1.jpg)\
