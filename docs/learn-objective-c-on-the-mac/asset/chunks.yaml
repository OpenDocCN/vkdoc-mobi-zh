    ### 属性检查器


    让我们先来看看*属性检查器*。（如果你看不到它，请按![image](images/arrow2.jpg)4 在*实用*区域显示该窗格，然后单击你的标签。）*检查器*应该看起来像[Figure
    2-10](#9781430245421_Ch02.xhtml#Fig10)。


    ![9781430245421_Fig02-10.jpg](images/9781430245421_Fig02-10.jpg)


    [Figure 2-10](#9781430245421_Ch02.xhtml#_Fig10)。显示可以在界面构建器中编辑的标签所有属性的属性检查器


    我们可以使用*属性检查器*来更改标签的外观。我们可以更改文本对齐、边框和滚动行为等属性。有趣的是，其中几个字段实际上不会产生任何效果。请继续在占位符字段中输入一些内容。标签的外观一点也没变，对吧？


    这是怎么回事？当我们从库中拖出一个标签时，我们获取的是`NSTextField`类的一个实例。`NSTextField`类用于静态文本字段和可编辑文本字段。在可编辑文本字段中，占位符是我们在某些空文本字段中看到的灰色文本，它告诉我们该字段是做什么用的。


    当一个文本字段被配置为标签时，就不需要占位符了。提供一个占位符没有坏处，但也没有好处。


    本书中无法枚举所有特定于上下文的属性，但我们会讲解那些不太明显的属性。随着你阅读本书的深入，你将逐渐熟悉自己常用的那些大多数属性。


    让我们更改标签的大小。如果标签未被选中，单击它以将其选中。标签两侧应该会出现一个点。这些点是尺寸调整手柄，允许我们更改选中项目的大小。界面构建器中的大多数对象都有四个尺寸调整手柄，每个角落一个，这允许我们在所有四个方向上调整大小。某些项目，如标签，只有两个尺寸调整手柄。标签的属性（特别是其字体大小）决定了标签的垂直尺寸。我们不会通过调整大小来改变标签的高度。我们只使用尺寸调整手柄来更改标签的宽度。


    让我们居中标签。确保标签左侧与窗口左边缘附近的蓝色参考线对齐。然后，抓住右侧尺寸调整手柄并向外拖动标签，直到到达窗口右边缘附近的蓝色参考线。完成后，标签应该看起来像[Figure
    2-11](#9781430245421_Ch02.xhtml#Fig11)。


    ![9781430245421_Fig02-11.jpg](images/9781430245421_Fig02-11.jpg)


    [Figure 2-11](#9781430245421_Ch02.xhtml#_Fig11)。调整大小后，我们在界面构建器中的应用窗口


    现在，在标签仍处于选中状态的情况下，在*属性检查器*中寻找一行标有“对齐”的按钮，然后选择“居中文本”按钮（[Figure 2-12](#9781430245421_Ch02.xhtml#Fig12)）。另外，找一个标有*行为*的弹出菜单，并将其设置为“可选择”，这告诉
    Cocoa 我们允许用户根据需要将此标签复制到剪贴板。默认情况下，标签是不可选择的，但我们刚刚更改了这一点。


    ![9781430245421_Fig02-12.jpg](images/9781430245421_Fig02-12.jpg)


    [Figure 2-12](#9781430245421_Ch02.xhtml#_Fig12)。标签的属性检查器中的对齐按钮，设置为居中文本


