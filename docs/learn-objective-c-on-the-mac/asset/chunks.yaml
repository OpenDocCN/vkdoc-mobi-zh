- fmt: "# Chapter Title: Adding Support for an Array of Villains\n\nWith the groundwork\
    \ already laid in the last chapter, adding support for an array of villains is\
    \ surprisingly simple. Basically, we have to create an array, tell the table view\
    \ when we want it to display its content (whenever its content has changed), implement\
    \ a few `dataSource` methods to give the table view its content, and implement\
    \ a `delegate` method that will be called when the table view’s selection changes\
    \ (so that we can update all the other views to match the selected villain). Then\
    \ we’ll add a pair of methods to add and delete villains from the array, and we’ll\
    \ be done!\n\nLet’s start off by initializing an array to hold our villains and\
    \ telling the table view that it should load its content. We do this by adding\
    \ just a few lines to `applicationDidFinishLaunching:`, as seen in bold in the\
    \ following code. First we create an array to hold all villains (which initially\
    \ contains just the first villain we created in code earlier) and assign it to\
    \ our villains instance variable. Then we tell the table view to load its content,\
    \ and then to select its first row.\n\nTelling the table view which row to select\
    \ is more complicated than it might seem at first. The `NSTableView` method that\
    \ we use is called `selectRowIndices:byExtendingSelection:`. Since a table view\
    \ can have more than one selected row, and the selected rows need not be contiguous,\
    \ the table view expects a set of indices to select in the `selectRowIndices:byExtendingSelection:`\
    \ method. In our case, we want only one row selected, so we construct a set with\
    \ just one element on the fly.\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n\
    \                    @\"Lex Luthor\", kName,\n                    @\"Smallville\"\
    , kLastKnownLocation,\n                    [NSDate date], kLastSeenDate,\n   \
    \                 @\"Superman\", kSwornEnemy,\n                    @\"Revenge\"\
    , kPrimaryMotivation,\n                    [NSArray arrayWithObjects:@\"Evil Genius\"\
    , nil], kPowers,\n                    @\"Superhero action\", kPowerSource,\n \
    \                   @9, kEvilness,\n                    [NSImage imageNamed:@\"\
    NSUser\"], kMugshot,\n                    @\"\", kNotes,\n                   \
    \ nil];\n    /* new code is here */\n    self.villains = [NSMutableArray arrayWithObject:self.villain];\n\
    \    [self.villainsTableView reloadData];\n    [self.villainsTableView selectRowIndexes:[NSIndexSet\
    \ indexSetWithIndex:0] byExtendingSelection:NO];\n    /* end of new code */\n\n\
    \    [self updateDetailViews];\n}\n```\n\nWe’ll also need to add the `[villainsTableView\
    \ reloadData]` call to the end of each of the `takeName:`, `takeLastSeenDate:`,\
    \ and `takeMugshot:` methods, so that when the user edits the controls for those\
    \ attributes, the table view will be updated accordingly. Just copy that line\
    \ and paste it into the end of each of those methods. It may seem like overkill\
    \ to call a method that looks like it’s going to reload the entire table of data\
    \ just because a single value has been changed, but don’t worry: `NSTableView`\
    \ uses *lazy loading*, and normally only requests content for a given row when\
    \ that row is about to be displayed. You might have a million rows of content,\
    \ but if you never scroll past the first 30, no more than the first 30 are likely\
    \ to be loaded by the table view. Likewise, telling a table view to reload its\
    \ data will only make it load the visible rows immediately; the rest will only\
    \ be reloaded when they scroll into display.\n\nAt this point, we should be able\
    \ to compile and run our app, and we should see roughly the same thing we saw\
    \ at the end of the last chapter, plus a big empty table view and a couple of\
    \ buttons that have no effect. Time to fill that table view with villains!\n\n\
    ## The Table View Needs Help\n\nWe’ve told the table view to load its content,\
    \ but it can’t do anything until we implement some methods from the `NSTableDataSource`\
    \ and `NSTableViewDelegate` protocols in the object we connected to the table\
    \ view’s `dataSource` and `delegate` outlets: our `VillainTrackerAppDelegate`.\
    \ `NSTableDataSource` and `NSTableViewDelegate` are informal protocols, similar\
    \ to most delegate protocols, which means that we don’t have to declare that our\
    \ class conforms to the protocol. As a result, implementing the `NSTableDataSource`\
    \ and `NSTableViewDelegate` methods are, as far as Objective-C is concerned, optional.\
    \ In spite of that, there are a few methods that are in fact required for the\
    \ table view to display anything: `numberOfRowsInTableView:` from `NSTableViewDataSource`\
    \ and `tableView:viewForTableColumn:row:` from `NSTableViewDelegate`, both of\
    \ which are used by the table view to prepare content for display. Here’s how\
    \ these should be implemented in `VillainTrackerAppDelegate.m`:\n\n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView\
    \ *)aTableView {\n    return [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView\
    \ *)aTableView\n    viewForTableColumn:(NSTableColumn *)tableColumn\n        \
    \           row:(NSInteger)row {\n\n    NSMutableDictionary *thisVillain = [self.villains\
    \ objectAtIndex:row];\n    NSString *thisColName = [tableColumn identifier];\n\
    \n    NSView *result = nil;\n\n    // Depending on which column we’re using, we\
    \ need to do different things.\n    // Passing [tableColumn identifier] to makeViewWithIdentifier\
    \ ensures that we get\n    // the view that’s already been configured for the\
    \ column in IB, and AppKit manages this for us.\n    if ([thisColName isEqualToString:kName])\
    \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kName];\n\
    \        result = thisCell;\n    } else if ([thisColName isEqualToString:kLastSeenDate])\
    \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
    \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
    \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
    \        result = thisCell;\n    }\n\n    // return the result.\n    return result;\n\
    }\n```\n\nThe first method should be self-explanatory: we just return the size\
    \ of the array so that the table view knows how many rows it needs to display.\
    \ The second method is called by the table view each time a cell is going to be\
    \ displayed in the table. The table view tells us the column and row index number\
    \ that it wants to display. The row index number is the same as the index number\
    \ for the relevant object in our content array, so calling `[villains objectAtIndex:rowIndex]`\
    \ returns the relevant model object from villains. As you may recall, the model\
    \ objects we’re using are in fact just `NSMutableDictionary` instances, with all\
    \ their values accessible by keys. When we configured the identifier attribute\
    \ of each column in our table view, we used the same key names that our model\
    \ objects use. Based on the identifier of the column, we ask the table view to\
    \ make an instance of the appropriate `NSView` subclass for the column using `makeViewWithIdentifier:owner:`.\
    \ We then configure the view based on the relevant value from the model object\
    \ and return the view to the table view.\n\nFor example, when the cell in the\
    \ top row under the `Name` column is about to be displayed, this method will be\
    \ called with a `rowIndex` of 0 and a `TableColumn` pointing to the `Name NSTableColumn`."
  raw: 'With the groundwork already laid in the last chapter, adding support for an
    array of villains is surprisingly simple. Basically, we have to create an array,
    tell the table view when we want it to display its content (whenever its content
    has changed), implement a few `dataSource` methods to give the table view its
    content, and implement a `delegate` method that will be called when the table
    view’s selection changes (so that we can update all the other views to match the
    selected villain). Then we’ll add a pair of methods to add and delete villains
    from the array, and we’ll be done!    Let’s start off by initializing an array
    to hold our villains and telling the table view that it should load its content.
    We do this by adding just a few lines to `applicationDidFinishLaunching`:, as
    seen in bold in the following code. First we create an array to hold all villains
    (which initially contains just the first villain we created in code earlier) and
    assign it to our villains instance variable. Then we tell the table view to load
    its content, and then to select its first row.    Telling the table view which
    row to select is more complicated than it might seem at first. The `NSTableView`
    method that we use is called `selectRowIndices``:byExtendingSelection:`. Since
    a table view can have more than one selected row, and the selected rows need not
    be contiguous, the table view expects a set of indices to select in the `selectRowIndices:byExtendingSelection:`
    method. In our case, we want only one row selected, so we construct a set with
    just one element on the fly.    ``` - (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification {   self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:
                      @"Lex Luthor", kName,                   @"Smallville", kLastKnownLocation,
                      [NSDate date], kLastSeenDate,                   @"Superman",
    kSwornEnemy,                   @"Revenge", kPrimaryMotivation,                   [NSArray
    arrayWithObjects:@"Evil Genius", nil], kPowers,                   @"Superhero
    action", kPowerSource,                   @9, kEvilness,                   [NSImage
    imageNamed:@"NSUser"], kMugshot,                   @"", kNotes,                   nil];
      /* new code is here */   self.villains = [NSMutableArray arrayWithObject:self.villain];
      [self.villainsTableView reloadData];   [self.villainsTableView selectRowIndexes:[NSIndexSet
    indexSetWithIndex:0] byExtendingSelection:NO];   /* end of new code */    [self
    updateDetailViews]; } ```    We’ll also need to add the `[villainsTableView reloadData]`
    call to the end of each of the `takeName:`, `takeLastSeenDate:`, and `takeMugshot:`
    methods, so that when the user edits the controls for those attributes, the table
    view will be updated accordingly. Just copy that line and paste it into the end
    of each of those methods. It may seem like overkill to call a method that looks
    like it’s going to reload the entire table of data just because a single value
    has been changed, but don’t worry: `NSTableView` uses *lazy loading*, and normally
    only requests content for a given row when that row is about to be displayed.
    You might have a million rows of content, but if you never scroll past the first
    30, no more than the first 30 are likely to be loaded by the table view. Likewise,
    telling a table view to reload its data will only make it load the visible rows
    immediately; the rest will only be reloaded when they scroll into display.    At
    this point, we should be able to compile and run our app, and we should see roughly
    the same thing we saw at the end of the last chapter, plus a big empty table view
    and a couple of buttons that have no effect. Time to fill that table view with
    villains!


    The Table View Needs Help    We’ve told the table view to load its content, but
    it can’t do anything until we implement some methods from the `NSTableDataSource`
    and `NSTableViewDelegate` protocols in the object we connected to the table view’s
    `dataSource` and `delegate` outlets: our `VillainTrackerAppDelegate`. `NSTableDataSource`
    and `NSTableViewDelegate` are informal protocols, similar to most delegate protocols,
    which means that we don’t have to declare that our class conforms to the protocol.
    As a result, implementing the `NSTableDataSource` and `NSTableViewDelegate` methods
    are, as far as Objective-C is concerned, optional. In spite of that, there are
    a few methods that are in fact required for the table view to display anything:
    `numberOfRowsInTableView:` from `NSTableViewDataSource` and `tableView:viewForTableColumn:row:`
    from `NSTableViewDelegate`, both of which are used by the table view to prepare
    content for display. Here’s how these should be implemented in `VillainTrackerAppDelegate.m`:    ```
    - (NSInteger)numberOfRowsInTableView:(NSTableView *)aTableView {   return [self.villains
    count]; }  - (NSView *)tableView:(NSTableView *)aTableView    viewForTableColumn:(NSTableColumn
    *)tableColumn                   row:(NSInteger)row {            NSMutableDictionary
    *thisVillain = [self.villains objectAtIndex:row];     NSString *thisColName =
    [tableColumn identifier];            NSView *result = nil;            // Depending
    on which column we’re using, we need to do different things.     // Passing [tableColumn
    identifier] to makeViewWithIdentifier ensures that we get     // the view that’s
    already been configured for the column in IB, and AppKit manages this for us.
        if ([thisColName isEqualToString:kName]) {         NSTableCellView *thisCell
    = [aTableView makeViewWithIdentifier:thisColName owner:self];         thisCell.textField.stringValue
    = [thisVillain objectForKey:kName];         result = thisCell;     } else if ([thisColName
    isEqualToString:kLastSeenDate]) {         NSTableCellView *thisCell = [aTableView
    makeViewWithIdentifier:thisColName owner:self];         thisCell.textField.stringValue
    = [thisVillain objectForKey:kLastSeenDate];         result = thisCell;     } else
    if ([thisColName isEqualToString:kMugshot]) {         NSImageView *thisCell =
    [aTableView makeViewWithIdentifier:thisColName owner:self];         [thisCell
    setImage:[thisVillain objectForKey:kMugshot]];         result = thisCell;     }      //
    return the result.     return result; } ```    The first method should be self-explanatory:
    we just return the size of the array so that the table view knows how many rows
    it needs to display. The second method is called by the table view each time a
    cell is going to be displayed in the table. The table view tells us the column
    and row index number that it wants to display. The row index number is the same
    as the index number for the relevant object in our content array, so calling `[villains
    objectAtIndex:rowIndex]` returns the relevant model object from villains. As you
    may recall, the model objects we’re using are in fact just `NSMutableDictionary`
    instances, with all their values accessible by keys. When we configured the identifier
    attribute of each column in our table view, we used the same key names that our
    model objects use. Based on the identifier of the column, we ask the table view
    to make an instance of the appropriate `NSView` subclass for the column using
    `makeViewWithIdentifier:owner:`. We then configure the view based on the relevant
    value from the model object and return the view to the table view.    For example,
    when the cell in the top row under the `Name` column is about to be displayed,
    this method will be called with a `rowIndex` of 0 and a `TableColumn` pointing
    to the `Name NSTableColumn`.'
  trans: "\n# 章节标题：为反派数组添加支持\n\n上一章的基础工作已经就绪，为反派数组添加支持的过程出奇地简单。基本流程是：我们先创建一个数组，在需要显示内容时告知表格视图（当内容发生变化时），实现几个\
    \ `dataSource` 方法来向表格视图提供数据，再实现一个 `delegate` 方法用于在表格视图选择项发生变化时被调用（这样我们就能更新所有其他视图以匹配所选反派）。最后，我们还会添加一对方法来实现向数组中添加和删除反派。大功告成！\n\
    \n首先，我们初始化一个用于存储反派的数组，并通知表格视图加载其内容。通过向 `applicationDidFinishLaunching:` 方法中添加如下代码（加粗部分）即可实现。首先创建一个包含所有反派的数组（初始时仅包含我们之前在代码中创建的第一个反派），并将其赋值给我们的反派实例变量。然后通知表格视图加载内容，并选中其第一行。\n\
    \n通知表格视图选择哪一行其实比表面看起来要复杂。我们使用的 `NSTableView` 方法名为 `selectRowIndices:byExtendingSelection:`。由于表格视图可以同时选中多行，且选中的行不必连续，因此该方法需要传入一个索引集合来指定要选中的行。在我们的场景中，只需要选中一行，因此我们动态构建一个仅包含单个元素的集合。\n\
    \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
    \    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n   \
    \                 @\"莱克斯·卢瑟\", kName,\n                    @\"斯莫维尔\", kLastKnownLocation,\n\
    \                    [NSDate date], kLastSeenDate,\n                    @\"超人\"\
    , kSwornEnemy,\n                    @\"复仇\", kPrimaryMotivation,\n           \
    \         [NSArray arrayWithObjects:@\"邪恶天才\", nil], kPowers,\n              \
    \      @\"超级英雄行动\", kPowerSource,\n                    @9, kEvilness,\n      \
    \              [NSImage imageNamed:@\"NSUser\"], kMugshot,\n                 \
    \   @\"\", kNotes,\n                    nil];\n    /* 新增代码开始 */\n    self.villains\
    \ = [NSMutableArray arrayWithObject:self.villain];\n    [self.villainsTableView\
    \ reloadData];\n    [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:0]\
    \ byExtendingSelection:NO];\n    /* 新增代码结束 */\n\n    [self updateDetailViews];\n\
    }\n```\n\n我们还需要在 `takeName:`、`takeLastSeenDate:` 和 `takeMugshot:` 方法的末尾添加 `[villainsTableView\
    \ reloadData]` 调用，这样当用户编辑这些属性的控件时，表格视图会相应更新。只需复制该行代码并粘贴到每个方法的末尾即可。仅仅因为单个值发生变化就去调用一个看起来会重新加载整个数据表的方法，似乎有些过度，但请放心：`NSTableView`\
    \ 采用*懒加载*机制，通常只在某行即将显示时才会请求该行的内容。即使你有上百万行数据，但只要不滚动到前 30 行之后，表格视图最多只会加载前 30 行。同理，通知表格视图重新加载数据只会立即加载可见行，其余行仅在滚动显示时才会重新加载。\n\
    \n至此，我们应该能够编译并运行应用，看到与上一章结束时大致相同的界面，只是多了一个空的表格视图和两个不起作用的按钮。是时候用反派来填充这个表格视图了！\n\
    \n## 表格视图需要辅助\n\n我们已经通知表格视图加载内容，但在连接了表格视图 `dataSource` 和 `delegate` 输出的对象（即我们的\
    \ `VillainTrackerAppDelegate`）中，必须实现 `NSTableDataSource` 和 `NSTableViewDelegate`\
    \ 协议中的某些方法，表格视图才能正常工作。`NSTableDataSource` 和 `NSTableViewDelegate` 是非正式协议，与大多数委托协议类似，这意味着我们无需声明类遵循这些协议。因此，在\
    \ Objective-C 中实现这些方法是可选的。尽管如此，表格视图要显示内容，实际上有几个方法是必需的：`NSTableViewDataSource`\
    \ 中的 `numberOfRowsInTableView:` 和 `NSTableViewDelegate` 中的 `tableView:viewForTableColumn:row:`，这两个方法用于表格视图准备显示内容。以下是它们在\
    \ `VillainTrackerAppDelegate.m` 中的实现方式：\n\n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView\
    \ *)aTableView {\n    return [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView\
    \ *)aTableView\n    viewForTableColumn:(NSTableColumn *)tableColumn\n        \
    \           row:(NSInteger)row {\n\n    NSMutableDictionary *thisVillain = [self.villains\
    \ objectAtIndex:row];\n    NSString *thisColName = [tableColumn identifier];\n\
    \n    NSView *result = nil;\n\n    // 根据当前使用的列，我们需要执行不同的操作。\n    // 通过 [tableColumn\
    \ identifier] 调用 makeViewWithIdentifier 可以确保\n    // 获取到已在 IB 中为该列配置好的视图，AppKit\
    \ 会为我们管理这些。\n    if ([thisColName isEqualToString:kName]) {\n        NSTableCellView\
    \ *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];\n  \
    \      thisCell.textField.stringValue = [thisVillain objectForKey:kName];\n  \
    \      result = thisCell;\n    } else if ([thisColName isEqualToString:kLastSeenDate])\
    \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
    \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
    \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
    \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
    \        result = thisCell;\n    }\n\n    // 返回结果。\n    return result;\n}\n```\n\
    \n第一个方法不言自明：我们只需返回数组的大小，这样表格视图就知道需要显示多少行。第二个方法会在表格中每个单元格即将显示时被调用。表格视图会告诉我们它想显示哪个列和行索引。行索引与内容数组中相关对象的索引相同，因此调用\
    \ `[villains objectAtIndex:rowIndex]` 可以从反派数组中返回相应的模型对象。你可能还记得，我们使用的模型对象实际上是 `NSMutableDictionary`\
    \ 实例，所有值都可通过键访问。在配置表格视图中每列的标识符属性时，我们使用了与模型对象相同的键名。根据列的标识符，我们通过 `makeViewWithIdentifier:owner:`\
    \ 方法向表格视图请求创建该列对应的 `NSView` 子类实例。然后根据模型对象中的相应值配置该视图，最后将视图返回给表格视图。\n\n例如，当 `名称`\
    \ 列顶部单元格即将显示时，该方法会以 `rowIndex` 为 0 且 `TableColumn` 指向 `名称 NSTableColumn` 的参数被调用。\n"
- fmt: "我们使用`0`来从`villains`数组中获取指定的反派，然后利用表格列标识方法的返回值`@\"name\"`，从选中的反派中检索对应的值。我们请求表格视图获取该列（该列已在Interface\
    \ Builder中配置）的适当`NSView`实例，然后以该`NSView`支持的任何方式填充它。最后，返回该视图，表格视图会将其绘制出来。现在我们应该能够编译并运行VillainTracker，并看到默认反派既显示在控件中，也作为表格视图的唯一一行显示。此外，如果我们编辑反派的名字、最后出现日期或头像，这些新值应能反映在表格视图中。然而，我们目前仍然只有一个反派，也无法追踪更多反派。让我们立即改变这一点。\n\
    \n## 添加更多反派\n\n我们之前已存根了`newVillain:`方法。现在来实现它。`newVillain:`方法向反派数组添加一个新的“空”反派对象，通知表格重新加载，并告知表格视图选择哪一行（最后一行，因为这是我们刚刚添加的）。\n\
    \n```objectivec\n- (IBAction)newVillain:(id)sender {\n    [_window endEditingFor:nil];\n\
    \    [self.villains addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \        @\"\", kName,\n        @\"\", kLastKnownLocation,\n        [NSDate date],\
    \ kLastSeenDate,\n        @\"\", kSwornEnemy,\n        @\"Greed\", kPrimaryMotivation,\n\
    \        [NSArray array], kPowers,\n        @\"\", kPowerSource,\n        [NSNumber\
    \ numberWithInt:0], kEvilness,\n        [NSImage imageNamed:@\"NSUser\"], kMugshot,\n\
    \        @\"\" , kNotes,\n        nil]];\n\n    [self.villainsTableView reloadData];\n\
    \n    [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains\
    \ count]-1]\n                      byExtendingSelection:NO];\n}\n```\n\n这里唯一可能不熟悉的代码是第一个方法调用`[_window\
    \ endEditingFor:nil]`。让我们看看它的两个部分。首先，`_window`实例变量从何而来？Xcode通过一个声明的属性（在`VillainTrackerAppDelegate.h`文件中生成）为我们构建了它，并自动连接到窗口：\n\
    \n```objectivec\n@property (assign) IBOutlet NSWindow *window;\n```\n\n由于我们没有通过`@synthesize`声明给出显式名称，Xcode默认创建了一个带下划线前缀的实例变量。其次，我们在窗口上调用的方法是`endEditingFor:`。这简单地告诉窗口：是时候结束用户当前正在进行的任何其他编辑行为（例如在文本字段中打字）了。我们需要调用此方法，以便将编辑后的值“保存”到其底层反派对象中，因为稍后在`newVillain:`中，我们将更改表格视图的选择，这反过来可能会清空各个控件中显示的值！\n\
    \n## 选择一个反派\n\n我们应用的详情部分仍然只显示列表中的第一个反派。为了更新详情视图，我们需要实现一个委托方法，该方法在表格视图选择发生变化时被调用。这让我们能注意到用户选择了哪一行，将我们的反派实例变量指向反派数组中的相应行，并重新显示所有其他控件以匹配新的选择。将以下方法添加到`VillianTrackerAppDelegate.m`的`@implementation`部分：\n\
    \n```objectivec\n- (void)tableViewSelectionDidChange:(NSNotification *)aNotification\
    \ {\n    if ([self.villainsTableView selectedRow] > -1) {\n        self.villain\
    \ = [self.villains objectAtIndex:[self.villainsTableView selectedRow]];\n    \
    \    [self updateDetailViews];\n        NSLog(@\"current villain properties: %@\"\
    , self.villain);\n    }\n}\n```\n\n请注意，该方法的核心部分被包裹在一个`if`子句中。这是必要的，因为表格视图可能告诉我们它当前没有任何选中的行，这通过从其`selectedRow`方法返回`–1`来表示。除此之外，你现在应该能理解其中的逻辑了。\n\
    \n现在编译并运行应用，会发现+按钮现在确实能产生效果，如图[Figure 6-9](#9781430245421_Ch06.xhtml#Fig9)所示。此外，我们应该能够点击表格视图中的不同反派，并看到其他控件中的值随之变化。\n\
    \n![9781430245421_Fig06-09.jpg](images/9781430245421_Fig06-09.jpg)\n\n[Figure\
    \ 6-9](#9781430245421_Ch06.xhtml#_Fig9). +按钮现在可以添加反派了\n\n## 阻止你的邪恶行径！\n\n能够删除反派会很不错。一旦我们的英雄说服某个反派停止作恶，我们可能想将其从数据库中移除。或者可能只是我们打错了字。无论如何，让我们添加删除反派的功能。我们已经存根了`deleteVillain:`方法，下面是该方法应实现的功能。（我们添加了注释来展示不同的部分，代码后将进行描述。）\n\
    \n```objectivec\n- (IBAction)deleteVillain:(id)sender {\n\n    // Section 1:\n\
    \    //\n    [_window endEditingFor:nil];\n    NSInteger selectedRow = [self.villainsTableView\
    \ selectedRow];\n\n    // Section 2:\n    //\n    [self.villains removeObjectIdenticalTo:self.villain];\n\
    \    [self.villainsTableView reloadData];\n\n    // Section 3:\n    //\n    if\
    \ (selectedRow >= [self.villains count]) {\n        selectedRow = [self.villains\
    \ count]-1;\n    }\n\n    // Section 4:\n    //\n    if (selectedRow > -1) {\n\
    \        // deselect all rows to ensure that the tableview sees the\n        //\
    \ selection as \"changed\", even though it might still have\n        // the same\
    \ row index.\n\n        // Section 5:\n        //\n        [self.villainsTableView\
    \ deselectAll:nil];\n        [self.villainsTableView selectRowIndexes:[NSIndexSet\
    \ indexSetWithIndex:selectedRow]\n                          byExtendingSelection:NO];\n\
    \n        [self updateDetailViews];\n    }\n}\n```\n\n这个方法比本书到目前为止展示的大部分代码都要复杂一些，因此需要稍作额外解释。\n\
    \n在第1部分，我们告诉窗口完成任何正在进行的编辑，然后获取表格当前选中行的索引——即将要被删除的行。注意，我们已经知道选中了哪个反派（因为它存储在一个实例变量中），但拥有行索引对于确保删除后选择的合理性至关重要（我们将在第4部分处理）。\n\
    \n在第2部分，我们从`villains`数组中删除选中的对象（由`villain`属性指向），然后通知表格视图重新加载。请注意从数组中移除反派的方法`removeObjectIdenticalTo:`。此方法让`NSMutableArray`通过比较对象的实际内存地址与它所包含对象的地址来扫描自身，从而找到并只移除我们传入的精确对象。否则，如果我们使用更常用的`removeObject:`方法，它会通过发送`isEqual:`方法来比较对象，后者则比较值。在这种情况下，任何属性与选中反派相同的其他反派对象也存在被删除的风险。\n\
    \n在第3部分，我们做一个小调整。如果之前的选中行索引是数组中的最后一行，那么现在我们已经从数组中移除了一个对象，该索引就已越界。"
  raw: 'We use the 0 to specify which villain to grab from our villains array, then
    we use the value returned by the table column’s identifier method, `@"name"`,
    to retrieve a value from the chosen villain. We ask the table view to get an instance
    of the appropriate `NSView` for that column (which we configured in Interface
    Builder), and then populate it in whatever manner works for that `NSView`. Lastly,
    we return that view, and the table view draws it.    Now we should be able to
    compile and run VillainTracker, and see that the default villain is displayed
    both in the controls and as the only row in the table view. Furthermore, if we
    edit the villain’s name, last seen date, or mugshot in the controls, we should
    see those new values reflected in the table view. However, we still only have
    one villain, and no way to track more. Let’s change that right now.    Adding
    More Villains    We stubbed out the `newVillain:` method earlier. Let’s fill in
    the implementation now. The `newVillain:` method adds a new “empty” villain object
    to our array of villains, tells the table to reload, and tells the table view
    which row to select (the last one, since that’s the one we just added).    ```
    - (IBAction)newVillain:(id)sender {  [_window endEditingFor:nil];  [self.villains
    addObject:[NSMutableDictionary   dictionaryWithObjectsAndKeys:             @"",
    kName,             @"", kLastKnownLocation,             [NSDate date], kLastSeenDate,
                @"", kSwornEnemy,             @"Greed", kPrimaryMotivation,             [NSArray
    array], kPowers,             @"", kPowerSource,             [NSNumber numberWithInt:0],
    kEvilness,             [NSImage imageNamed:@"NSUser"], kMugshot,             @""
    , kNotes,             nil]];                                                [self.villainsTableView
    reloadData];      [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains
    count]-1]   byExtendingSelection:NO]; } ```    The only new thing we might see
    in here is the very first method call, `[_window endEditingFor:nil]`. Let’s look
    at both parts of that. First, where did the `_window` instance variable come from?
    Xcode constructed this for us from a declared property that it generated in the
    `VillainTrackerAppDelegate.h` file, and automatically connected to the window:    ```
    @property (assign) IBOutlet NSWindow *window; ```    Since we didn’t give an explicit
    name via a `@synthesize` declaration, Xcode defaulted to creating a new instance
    variable with a leading underscore. Second is the method that we’re calling on
    the window, `endEditingFor:`. This simply tells the window that it’s time to end
    whatever other editing behavior the user is currently engaged in, such as typing
    in a text field. We need to call this method so that the edited value can be “saved”
    to its underlying villain object because later in `newVillain:` we’re going to
    change the table view’s selection, which would in turn wipe out the values shown
    in the various controls!    Selecting A Villain    The details part of our application
    still shows only the first villain in our list. In order to update the detail
    views, we need to implement a delegate method that is called whenever the table
    view’s selection changes. This lets us notice which row the user has selected,
    change our villain instance variable to point at the relevant row in the villains
    array, and redisplay all the other controls to match the new selection. Add this
    method to the `@implementation` section in `VillianTrackerAppDelegate.m`:    ```
    - (void)tableViewSelectionDidChange:(NSNotification *)aNotification {  if ([self.villainsTableView
    selectedRow] > -1) {   self.villain = [self.villains            objectAtIndex:[self.villainsTableView
    selectedRow]];   [self updateDetailViews];   NSLog(@"current villain properties:
    %@", self.villain);  } } ```    Note that the meat of this method is wrapped inside
    an `if` clause.


    That’s necessary because it’s possible for a table view to tell us that it currently
    has no selected row at all, which it does by returning –1 from its `selectedRow`
    method. Beyond that, you should be able to understand what’s happening in there
    by now.    Now compile and run the app, and see that the + button now actually
    makes something happen, as shown in [Figure 6-9](#9781430245421_Ch06.xhtml#Fig9).
    Furthermore, we should be able to click back and forth between all of the villains
    in the table view and see the values in the other controls change accordingly.    ![9781430245421_Fig06-09.jpg](images/9781430245421_Fig06-09.jpg)    [Figure
    6-9](#9781430245421_Ch06.xhtml#_Fig9). The + button now works to add villains    Stop
    Your Evil Ways!    It’d be nice to be able to delete a villain. Once our hero
    has convinced a villain to stop their evil ways, we might want to drop them from
    the database. Or maybe we just made a typo. Either way, let’s add the ability
    to delete a bad guy. We’ve got the `deleteVillain``:` method stubbed out, and
    here’s what that method should do. (We’ve added comments to show the different
    sections, which will be described after the code.)    ``` - (IBAction)deleteVillain:(id)sender
    {           //           // Section 1:           //           [_window endEditingFor:nil];
              NSInteger selectedRow = [self.villainsTableView selectedRow];                        //
              // Section 2:           //           [self.villains removeObjectIdenticalTo:self.villain];
              [self.villainsTableView reloadData];                            //           //
    Section 3:           //           if (selectedRow >= [self.villains count]) {
                        selectedRow = [self.villains count]-1;           }                        //
              // Section 4:           //           if (selectedRow > -1) {                     //
    deselect all rows to ensure that the tableview sees the                     //
    selection as "changed", even though it might still have                     //
    the same row index.                                      //                     //
    Section 5:                     //                     [self.villainsTableView
    deselectAll:nil];                     [self.villainsTableView selectRowIndexes:[NSIndexSet
    indexSetWithIndex:selectedRow] byExtendingSelection:NO];                                      [self
    updateDetailViews];            } } ```    This method is a bit more complicated
    than most of the code we’ve shown you in this book so far, so a little additional
    explanation is in order.    In Section 1, we tell the window to finish up any
    editing that’s going on, then we grab the index of the table’s currently selected
    row—that is, the row that’s going to be deleted. Note that we already know which
    villain is selected because it’s stored in an instance variable, but having the
    row index is important for making sure the post-delete selection makes sense (which
    we’ll tackle in Section 4).    In Section 2, we delete the selected object (pointed
    at by the villain property) from the villains array, then we tell the table view
    to reload. Note the method for removing the villain from the array, `removeObjectIdenticalTo:`.
    This method makes the `NSMutableArray` scan itself for the object by comparing
    its actual memory address with the memory addresses of the objects it contains,
    so that it finds and removes only the exact object we pass in. Otherwise, if we
    had gone with the more commonly used `removeObject:` method, it would be comparing
    objects by sending the `isEqual:` method, which in turn compares values. In that
    case, any other villain objects we had entered with attributes identical to those
    of the selected villain would run the risk of being deleted as well.    In Section
    3, we make a small adjustment. If the previous selected row index was the last
    in the array, now that we’ve removed an object from the array, that index is now
    out of bounds.'
  trans: "\n我们使用`0`来从`villains`数组中获取指定的反派，然后利用表格列标识方法的返回值`@\"name\"`，从选中的反派中检索对应的值。我们请求表格视图获取该列（该列已在\
    \ Interface Builder 中配置）的适当`NSView`实例，然后以该`NSView`支持的任何方式填充它。最后，返回该视图，表格视图会将其绘制出来。现在我们应该能够编译并运行\
    \ VillainTracker，并看到默认反派既显示在控件中，也作为表格视图的唯一一行显示。此外，如果我们编辑反派的名字、最后出现日期或头像，这些新值应能反映在表格视图中。然而，我们目前仍然只有一个反派，也无法追踪更多反派。让我们立即改变这一点。\n\
    \n## 添加更多反派\n\n我们之前已存根了`newVillain:`方法。现在来实现它。`newVillain:`方法向反派数组添加一个新的“空”反派对象，通知表格重新加载，并告知表格视图选择哪一行（最后一行，因为这是我们刚刚添加的）。\n\
