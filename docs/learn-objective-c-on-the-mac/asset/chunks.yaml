  trans: "\n代码块（block）可以赋值给变量、作为参数传递给函数或方法，并且通常可以像其他 Objective-C 对象一样被处理。与 C 语言中其他大多数类型不同，代码块还可以被执行。我们可以在一个对象中创建代码块，然后将其传递给另一个对象，让它在之后执行。通过这种方式，代码块可以作为\
    \ Objective-C 中委托模式或 C 语言中回调函数的替代方案。\n\n与方法或函数非常相似，代码块可以接受一个或多个参数，并指定一个返回值。为了声明一个代码块变量，我们使用脱字符（`^`）符号，并配合一些额外的括号来声明参数和返回类型。定义代码块本身时，做法大致相同，但随后需要用花括号包裹定义代码块的实际代码。以下是一些相关的示例：\n\
    \n```\n// 声明一个名为 \"loggerBlock\" 的代码块变量，无参数，无返回值。\nvoid (^loggerBlock)(void);\n\
    \n// 将代码块赋值给上面声明的变量。像这样无参数且无返回值的代码块，\n// 不需要像前面变量声明中使用 void 那样的“修饰”。\nloggerBlock\
    \ = ^{\n    NSLog(@\"我很庆幸他们没有把它叫做闭包\");\n};\n\n// 执行代码块，就像调用函数一样。\nloggerBlock();\
    \  // 这会在控制台产生一些输出\n```\n\n如果你做过很多 C 语言编程，可能会认识到这类似于 C 语言中的函数指针概念。然而，两者有几个关键的区别。也许最大的区别在于，代码块可以在函数或方法体内内联定义。我们可以在代码块将要赋值给变量、或者传递给另一个方法或函数的地方直接定义它。\n\
    \n另一个重要区别是，代码块可以访问其创建所在作用域内的变量。默认情况下，代码块会以只读方式复制我们以这种方式访问的任何变量，保持原始变量不变。同时，它会自动增加从周围作用域使用的任何\
    \ Objective-C 对象的引用计数，并在代码块执行完毕后再次减少引用计数。但是，我们可以通过在任何外部变量的声明前加上 `__block`，使其变成可读写的。\n\
    \n```\n// 定义一个可以被代码块修改的变量\n__block int a = 0;\n\n// 定义一个试图修改其作用域中变量的代码块\nvoid\
    \ (^sillyBlock)(void) = ^{\n    a = 47;\n};\n\n// 在调用代码块前检查我们的变量值\nNSLog(@\"a\
    \ == %d\", a); // 输出 \"a == 0\"\n\n// 执行代码块\nsillyBlock();\n\n// 在调用代码块后再次检查我们的变量值\n\
    NSLog(@\"a == %d\", a); // 输出 \"a == 47\"\n```\n\n如前所述，代码块在与 GCD 一起使用时才能真正大放异彩。GCD\
    \ 包含一组函数，这些函数可以完成与 `NSOperation` 和 `NSOperationQueue` 类似的事情，但采取了不同的方式。主要区别在于，我们不是显式创建一堆操作、可选地声明操作间依赖关系、然后将操作添加到队列中，而是使用\
    \ GCD 调用一个函数，该函数接收一个代码块并将其添加到队列中，一步到位。我们稍后会讨论这个，但首先，我们将展示如何使用操作队列来处理并发。\n\n##\
    \ 激活 SlowWorker\n\n为了了解操作队列的工作原理，让我们在 SlowWorker 中对它们进行测试。在开始之前，先复制包含 SlowWorker\
    \ 项目的整个文件夹。在本章后面，我们将使用原始版本的 SlowWorker 作为另一种实现并发方式的起点，所以请保留一份副本。\n\n回想一下，这个应用的问题在于，单一的\
    \ action 方法顺序调用了几个其他方法，这导致的总耗时足以让应用感觉停止响应。\n\n我们要做的是，将其他每个方法放入一个操作中，将所有操作放入一个队列，然后让队列自行处理。\n\
    \n`doWork:` 方法是我们将要进行所有修改的地方。首先，我们给所有本地的 `NSString` 变量加上 `__block` 存储限定符。然后，我们将每一小段工作封装在一个代码块内，声明一些依赖关系以确保它们按正确顺序执行，然后将它们交给一个新的队列去执行。请看一下此处加粗的行（当然，也请将它们添加到我们的方法中），然后我们再稍微详细地讨论细节：\n\
    \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
    \    \n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
    \    __block NSString *firstResult;\n    __block NSString *secondResult;\n   \
    \ \n    self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n        fetchedData = [self fetchSomethingFromServer];\n\
    \        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                   @\"已获取: %@\\n\", fetchedData];\n    }];\n\
    \    \n    NSBlockOperation *process = [NSBlockOperation blockOperationWithBlock:^{\n\
    \        processed = [self processData:fetchedData];\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"已处理: %@\\n\", processed];\n    }];\n    \n    NSBlockOperation\
    \ *calcFirst = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult\
    \ = [self calculateFirstResult:processed];\n    }];\n    \n    NSBlockOperation\
    \ *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult\
    \ = [self calculateSecondResult:processed];\n    }];\n    NSBlockOperation *showResults\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"第一个结果: [%@]\\n 第二个结果: [%@]\\n\\n\",\n                       \
    \            firstResult, secondResult];\n\n        NSDate *endTime = [NSDate\
    \ date];\n        NSLog(@\"在 %f 秒内完成\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
    \              self.isWorking = YES;\n\n    }];\n    \n    [process addDependency:fetch];\n\
    \    [calcFirst addDependency:process];\n    [calcSecond addDependency:process];\n\
    \    [showResults addDependency:calcFirst];\n    [showResults addDependency:calcSecond];\n\
    \    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
    \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n      \
    \ waitUntilFinished:NO];\n}\n```\n\n我们做的第一件事是给一些局部变量添加 `__block` 存储限定符。这样，每个 `NSString`\
    \ 指针仍然是单一的、唯一的指针，每个代码块都可以对其进行读取和写入。在此上下文中，“写入”意味着将指针赋值以指向一个不同的对象。没有 `__block`，每个代码块都会获得自己的新指针，并且所有指针都指向同一个初始对象，而且没有一个是可写的！所以\
    \ `__block` 为我们提供了一种在代码块之间共享数据的方式。\n\n接下来，我们创建一些操作。现在不是简单地直接执行每个工作方法，而是为每个方法创建一个\
    \ `NSBlockOperation`。`NSBlockOperation` 只是 `NSOperation` 的一个类，设计用于从一个代码块创建。\n\n\
    然后我们定义这些操作之间的一组依赖关系，这样 `process` 仅在 `fetch` 完成后才执行，`calcFirst` 和 `calcSecond`\
    \ 仅在 `process` 完成后才执行，而 `showResults` 仅在所有其他操作完成后才执行。\n\n最后，我们创建一个新的 `NSOperationQueue`，并将包含我们所有操作的数组传递给它。队列会查看这些操作之间的所有依赖关系，并确定如何以正确的顺序执行它们。\n\
    \n## 要求主线程\n\n然而，我们还没有完全准备好。\n"
- fmt: "# 排版后的文档\n\nRemember that the AppKit classes (such as all the window and view\
    \ classes) are generally not thread-safe. All access to them should be performed\
    \ exclusively on the main thread. But right now we are accessing the `NSTextView`\
    \ from several of our operations. In all likelihood, some of those operations\
    \ will run on some other thread when its time comes! Even though this may “work”\
    \ in this simple test app, it’s not a really a safe foundation to build upon.\
    \ We need to adjust each of those operations so that all access to the `NSTextView`\
    \ happens on the main thread.\n\nTo do this, we’ll wrap each such access inside\
    \ yet another block, which will be passed directly to a special queue that always\
    \ runs its operations on the main thread. The bold code here shows the final changes\
    \ we need to make to the `doWork:` method:\n\n```\n- (IBAction)doWork:(id)sender\
    \ {\n    NSDate *startTime = [NSDate date];\n\n    __block NSString *fetchedData;\n\
    \    __block NSString *processed;\n    __block NSString *firstResult;\n    __block\
    \ NSString *secondResult;\n\n    self.isWorking = YES;\n\n    NSBlockOperation\
    \ *fetch = [NSBlockOperation blockOperationWithBlock:^{\n        fetchedData =\
    \ [self fetchSomethingFromServer];\n        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n\
    \            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                                       @\"Fetched: %@\\n\", fetchedData];\n \
    \       }];\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation blockOperationWithBlock:^{\n\
    \        processed = [self processData:fetchedData];\n        [[NSOperationQueue\
    \ mainQueue] addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                                       @\"Processed:\
    \ %@\\n\", processed];\n        }];\n    }];\n\n    NSBlockOperation *calcFirst\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult = [self\
    \ calculateFirstResult:processed];\n    }];\n\n    NSBlockOperation *calcSecond\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult = [self\
    \ calculateSecondResult:processed];\n    }];\n\n    NSBlockOperation *showResults\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        [[NSOperationQueue mainQueue]\
    \ addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                                       @\"First Result:\
    \ [%@]\\nSecond Result: [%@]\\n\\n\",\n                                      \
    \ firstResult, secondResult];\n\n            NSDate *endTime = [NSDate date];\n\
    \            NSLog(@\"Completed in %f seconds\",\n                  [endTime timeIntervalSinceDate:startTime]);\n\
    \            self.isWorking = NO;\n        }];\n    }];\n\n    [process addDependency:fetch];\n\
    \    [calcFirst addDependency:process];\n    [calcSecond addDependency:process];\n\
    \    [showResults addDependency:calcFirst];\n    [showResults addDependency:calcSecond];\n\
    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
    \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n      \
    \ waitUntilFinished:NO];\n}\n```\n\nNow we should be able to run our app, and\
    \ we’ll notice something perhaps a little different after pressing the *Start*\
    \ button: the button immediately reverts back to its non-clicked state, and the\
    \ menus still work. The first two operations put some text into the `NSTextView`\
    \ as they finish. After about seven seconds (down from the ten seconds the first\
    \ version used, since some of our work methods are running at the same time now),\
    \ the final output appears in the text view. That’s all well and good, but we\
    \ can easily make things even more responsive by using Cocoa Bindings and the\
    \ `isWorking` property, which we created back at the start. Open up *MainMenu.xib*\
    \ again, and use the Object Library to find a circular progress indicator. Then\
    \ add it to our window as shown in [Figure 17-2](#9781430245421_Ch17.xhtml#Fig2).\n\
    \n![9781430245421_Fig17-02.jpg](images/9781430245421_Fig17-02.jpg)\n\n[Figure\
    \ 17-2](#9781430245421_Ch17.xhtml#_Fig2) . Adding a progress indicator\n\nWith\
    \ the progress indicator selected, use the *Attributes Inspector* to make sure\
    \ that its *Display When Stopped* checkbox is turned off. Then switch to the *Bindings\
    \ Inspector*, expand the view for its *Animate* parameter, and bind it to the\
    \ App Delegate after typing `isWorking` as the Model Key Path. Then select the\
    \ *Start* button in the window, where we’ll make a similar configuration. Bind\
    \ the button’s *Enabled* attribute to the app delegate with the `isWorking` key\
    \ path, and this time add an `NSNegateBoolean` as a *Value Transformer*.\n\nSave\
    \ the changes, and click **Run**; when we click the *Start* button, it becomes\
    \ disabled, and the circular progress indicator appears and starts spinning. When\
    \ the work is done, the progress indicator disappears, and the button goes back\
    \ to normal.\n\nNow let’s take this just one step farther: add a horizontal progress\
    \ indicator (a horizontal movement that tells us that things are happening, such\
    \ as in a software installer). The progress view will go from 0 to 4, each work\
    \ method upping the number a bit. Like the circular progress indicator, this will\
    \ be configured entirely with Cocoa Bindings.\n\nStart off by adding a new property\
    \ called `completed` to *SWAppDelegate.h*:\n\n```\n//  SWAppDelegate.h\n//  Insert\
    \ this after the @interface line\n@property (assign) NSInteger completed;\n```\n\
    \nNext, switch over to *SWAppDelegate.m*. Add the following near the top of the\
    \ `doWork:` method to reset this counter as soon as the user hits the Start button:\n\
    \n```\nself.completed = 0;\n```\n\nEach work method now needs to increment this\
    \ variable when they’re done. We could add the following line to each work method:\n\
    \n```\nself.completed = self.completed + 1;\n```\n\nHowever, this is where one\
    \ of those sticky multi-threaded problems turns up. In this line of code, what\
    \ really happens is that it first grabs the current value of the `completed` property\
    \ by calling `[self completed]`, then adds one to it, and then stores the result\
    \ back into the completed property by calling `[self setCompleted:]`. In a multi-threaded\
    \ environment, this can lead to incorrect behavior. What if, for instance, two\
    \ threads execute a line like this at about the same time? Suppose the starting\
    \ value of `completed` is 2. If both threads read the current value before either\
    \ of them writes out their own result, each will add 1 to their own copy of the\
    \ value, then each of them will write their local sum (3) back into the completed\
    \ property, which ends up containing the value 3 instead of the correct value,\
    \ 4.\n\nA way around this is to use Objective-C’s `@synchronized` keyword, which\
    \ lets us specify that a piece of code can only be run by one thread at a time.\
    \ Enter the following method somewhere in the app delegate’s `@implementation`\
    \ section:\n\n```\n- (void)incrementCompleted {\n  @synchronized(self) {\n   \
    \ self.completed = self.completed + 1;\n  }\n}\n```\n\nWhat we’re doing there\
    \ is taking the same code we thought about earlier and wrapping it in a sort of\
    \ a safe zone. The `@synchronized` keyword takes as its one argument an object\
    \ that will be used to determine the scope of the synchronization limiting. Basically,\
    \ any calls using the same value will each try to grab the same lock. If some\
    \ other thread has already claimed it, the current thread has to wait until the\
    \ other thread is done. In this case, because we’re using `self`, any calls made\
    \ to this method on the same instance will all try to acquire the same lock. We\
    \ only have one instance of our app delegate, so this is in practice a global\
    \ lock, but for our purposes that’s okay.\n\nThe coding we need to do in order\
    \ for this to work is to just add this line to each of the work methods, just\
    \ before the `return` in each of them:\n\n```\n[self incrementCompleted];\n```\n\
    \nAnd finally, we need to configure the GUI. Go back to the *MainMenu.*"
