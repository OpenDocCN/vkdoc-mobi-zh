- fmt: 'An outlet is really nothing more than an object pointer that can be linked
    to an object in the user interface. Since Cocoa objects are Objective-C objects,
    they have instance variables and methods. The `IBOutlet` keyword indicates to
    Xcode’s Interface Builder which instance variables are meant for use in constructing
    the user interface.


    ### Actions


    Actions are Objective-C methods that can be invoked directly from the application’s
    user interface. They are methods, just like any other Objective-C methods we’ve
    written, but they get executed when a user-interface item is utilized. If we link
    a button to an action method, for example, the code in our action method will
    fire any time that button is clicked. If we link a text field to an action, its
    action method will fire any time the user tabs out of that text field or otherwise
    moves to another control. Exactly what will cause the method to fire depends on
    the type of object that is linked to it and, sometimes, how the attributes of
    that object are set. A slider, for example, may cause our action method to fire
    once after the user releases the mouse button, or it may repeatedly cause our
    method to fire as the slider is used, depending on how we set up the slider instance
    in Interface Builder. We’ll be trying out both of these modes of operation in
    this chapter.


    Actions are created in exactly the same way as other Objective-C methods, except
    that they must be declared using a special return type: `IBAction`. Actions must
    take a single argument (typically declared as type `id`). This argument is used
    to tell the method which interface item is calling it.


    ### Outlets and Actions in Action


    That’s enough theory; let’s get our hands dirty by writing another Cocoa application.
    Setting up the new project will follow the same sequence of events as in the previous
    chapter, so this should feel familiar. If you’re not still in Xcode, open it back
    up. Now, press `![images](images/arrow1.jpg)N` or select New Project from the
    File menu. Select the Cocoa Application template again. Make sure the checkboxes
    for Core Data and Document-Based Application are turned off, the checkbox for
    Use Automatic Reference Counting is turned on, and when prompted for a project
    name, enter “Chapter3” (see [Figure 3-1](#9781430245421_Ch03.xhtml#Fig1)). For
    this example, we’re using “Book” as the class prefix setting.


    ![9781430245421_Fig03-01.jpg](images/9781430245421_Fig03-01.jpg)


    [Figure 3-1](#9781430245421_Ch03.xhtml#_Fig1). Setting initial properties for
    a new Cocoa application in Xcode


    Xcode will generate an application delegate class for you, called `BookAppDelegate`,
    as well as a `MainMenu.xib` file, and will land you in the Project Settings view
    ([Figure 3-2](#9781430245421_Ch03.xhtml#Fig2)).


    ![9781430245421_Fig03-02.jpg](images/9781430245421_Fig03-02.jpg)


    [Figure 3-2](#9781430245421_Ch03.xhtml#_Fig2). Configuring project settings


    All of our work will take place in the `MainMenu.xib` file, so single-click it
    in the Navigator area in the left side of the window, and it should open up in
    Interface Builder mode ([Figure 3-3](#9781430245421_Ch03.xhtml#Fig3)). If we double-click,
    it will open up in a new window, which isn’t what we want now. If that happens,
    close it and single-click `MainMenu.xib` again.


    ![9781430245421_Fig03-03.jpg](images/9781430245421_Fig03-03.jpg)


    [Figure 3-3](#9781430245421_Ch03.xhtml#_Fig3). Interface Builder mode in Xcode


    Single-click the Main Window icon on the left side of the Interface Builder Editor
    pane. This opens up an empty window already named Chapter3. Since the Navigator
    area is unnecessary for this chapter, hide it by clicking the leftmost icon in
    the group labeled View. This provides some more screen real estate in which to
    work—and a bit less clutter. We can always unhide it by clicking the leftmost
    icon in the View section of the toolbar.


    We’re going to be focusing on the Utility area on the right.


    To start with, look at the Object Library pane at the bottom of the right side
    of the Xcode window. Scroll through the list of objects to find Label; it should
    be about a dozen objects down from the top of the list. Click Label in the Object
    Library and then drag it out to the upper left-hand corner of the window. When
    we get close to the upper left-hand corner, the blue guidelines will appear and
    the label should snap into place when we let go of the mouse button ([Figure 3-4](#9781430245421_Ch03.xhtml#Fig4)).


    ![9781430245421_Fig03-04.jpg](images/9781430245421_Fig03-04.jpg)


    [Figure 3-4](#9781430245421_Ch03.xhtml#_Fig4). Adding a label to the [Chapter
    3](#9781430245421_Ch03.xhtml) window


    Change the Inspector pane to show the Attributes Inspector by pressing `![images](images/arrow2.jpg)4`
    or by clicking the appropriate button at the top of the Utility area. Then, double-click
    the label that we just dragged, and it should become editable. Change the label’s
    text to read “The Magic Number is:” ([Figure 3-5](#9781430245421_Ch03.xhtml#Fig5)).


    ![9781430245421_Fig03-05.jpg](images/9781430245421_Fig03-05.jpg)


    [Figure 3-5](#9781430245421_Ch03.xhtml#_Fig5). Editing the label’s text


    This label is somewhat misleading since there’s no magic number on display yet,
    so we’ll need to add a user-interface component to show it. In the Object Library
    pane, scroll down a bit further to find Text Field; it should be directly below
    the Label object. If we single-click an object in the Library and hover over it,
    we’ll get a useful little pop-up window with more information about the control,
    including the AppKit class that underlies the control (see [Figure 3-6](#9781430245421_Ch03.xhtml#Fig6)).
    For a Text Field, that class is `NSTextField`. With that little pop-up active,
    we can single-click other components in the Object Library to see information
    on each of them. If we click Label, we’ll see that a Label is also an `NSTextField`
    instance, but with different initial display and editability settings. As you’re
    learning the AppKit classes, it can be useful to see which class corresponds to
    a given component in the Object Library; many classes serve double duty.


    ![9781430245421_Fig03-06.jpg](images/9781430245421_Fig03-06.jpg)


    [Figure 3-6](#9781430245421_Ch03.xhtml#_Fig6). Xcode can show pop-up info about
    objects in the Object Library


    Click back on the Text Field, and drag out a Text Field instance onto our window.
    Position it on the right side across from the label, letting the blue lines guide
    you, and let it snap in place where the guides want it to go ([Figure 3-7](#9781430245421_Ch03.xhtml#Fig7)).


    ![9781430245421_Fig03-07.jpg](images/9781430245421_Fig03-07.jpg)


    [Figure 3-7](#9781430245421_Ch03.xhtml#_Fig7). Xcode guidelines assist in laying
    out User Interface controls


    Take a look at the Attributes Inspector for this text field, in the Utility area
    ([Figure 3-8](#9781430245421_Ch03.xhtml#Fig8)). It shows the same controls as
    the Inspector for the label that we dragged out previously—which makes sense,
    because it’s actually the same Cocoa object. Uneditable labels and editable text
    fields are both instances of the `NSTextField` object, just with different parameters
    for how the object is drawn. We can tune how the object behaves based on what
    our application needs. For this app, we’ll want to prevent the user from changing
    the magic number by typing in the field, because then it wouldn’t be magic anymore.
    To make this change, click the Behavior pull-down menu, and change it from Editable
    to Selectable. Now the user won’t be able to change it, but they’ll be able to
    select it with the mouse and copy it.


    ![9781430245421_Fig03-08.jpg](images/9781430245421_Fig03-08.jpg)


    [Figure 3-8](#9781430245421_Ch03.xhtml#_Fig8).'
  raw: 'An outlet is really nothing more than an object pointer that can be linked
    to an object in the user interface. Since Cocoa objects are Objective-C objects,
    they have instance variables and methods. The `IBOutlet` keyword indicates to
    Xcode’s Interface Builder which instance variables are meant for use in constructing
    the user interface.    Actions    Actions are Objective-C methods that can be
    invoked directly from the application’s user interface. They are methods, just
    like any other Objective-C methods we’ve written, but they get executed when a
    user-interface item is utilized. If we link a button to an action method, for
    example, the code in our action method will fire any time that button is clicked.
    If we link a text field to an action, its action method will fire any time the
    user tabs out of that text field or otherwise moves to another control. Exactly
    what will cause the method to fire depends on the type of object that is linked
    to it and, sometimes, how the attributes of that object are set. A slider, for
    example, may cause our action method to fire once after the user releases the
    mouse button, or it may repeatedly cause our method to fire as the slider is used,
    depending on how we set up the slider instance in Interface Builder. We’ll be
    trying out both of these modes of operation in this chapter.    Actions are created
    in exactly the same way as other Objective-C methods, except that they must be
    declared using a special return type: `IBAction`. Actions must take a single argument
    (typically declared as type `id`). This argument is used to tell the method which
    interface item is calling it.    Outlets and Actions in Action    That’s enough
    theory; let’s get our hands dirty by writing another Cocoa application. Setting
    up the new project will follow the same sequence of events as in the previous
    chapter, so this should feel familiar. If you’re not still in Xcode, open it back
    up. Now, press ![images](images/arrow1.jpg)N or select New Project from the File
    menu. Select the *Cocoa Application* template again. Make sure the checkboxes
    for *Core Data* and *Document-Based Application* are turned off, the checkbox
    for *Use Automatic Reference Counting* is turned on, and when prompted for a project
    name, enter “Chapter3” (see [Figure 3-1](#9781430245421_Ch03.xhtml#Fig1)). For
    this example, we’re using “Book” as the class prefix setting.    ![9781430245421_Fig03-01.jpg](images/9781430245421_Fig03-01.jpg)    [Figure
    3-1](#9781430245421_Ch03.xhtml#_Fig1). Setting initial properties for a new Cocoa
    application in Xcode    Xcode will generate an application delegate class for
    you, called `BookAppDelegate`, as well as a `MainMenu.xib` file, and will land
    you in the *Project Settings* view ([Figure 3-2](#9781430245421_Ch03.xhtml#Fig2)).    ![9781430245421_Fig03-02.jpg](images/9781430245421_Fig03-02.jpg)    [Figure
    3-2](#9781430245421_Ch03.xhtml#_Fig2). Configuring project settings    All of
    our work will take place in the `MainMenu.xib` file, so single-click it in the
    *Navigator* area in the left side of the window, and it should open up in Interface
    Builder mode ([Figure 3-3](#9781430245421_Ch03.xhtml#Fig3)). If we double-click,
    it will open up in a new window, which isn’t what we want now. If that happens,
    close it and single-click `MainMenu.xib` again.    ![9781430245421_Fig03-03.jpg](images/9781430245421_Fig03-03.jpg)    [Figure
    3-3](#9781430245421_Ch03.xhtml#_Fig3). Interface Builder mode in Xcode    Single-click
    the Main Window icon on the left side of the Interface Builder *Editor* pane.
    This opens up an empty window already named Chapter3\. Since the *Navigator* area
    is unnecessary for this chapter, hide it by clicking the leftmost icon in the
    group labeled View. This provides some more screen real estate in which to work—and
    a bit less clutter. We can always unhide it by clicking the leftmost icon in the
    *View* section of the toolbar.    We’re going to be focusing on the *Utility*
    area on the right.


    To start with, look at the *Object Library* pane at the bottom of the right side
    of the Xcode window. Scroll through the list of objects to find Label; it should
    be about a dozen objects down from the top of the list. Click Label in the *Object
    Library* and then drag it out to the upper left-hand corner of the window. When
    we get close to the upper left-hand corner, the blue guidelines will appear and
    the label should snap into place when we let go of the mouse button ([Figure 3-4](#9781430245421_Ch03.xhtml#Fig4)).    ![9781430245421_Fig03-04.jpg](images/9781430245421_Fig03-04.jpg)    [Figure
    3-4](#9781430245421_Ch03.xhtml#_Fig4). Adding a label to the [Chapter 3](#9781430245421_Ch03.xhtml)
    window    Change the *Inspector* pane to show the *Attributes Inspector* by pressing
    ![images](images/arrow2.jpg)4 or by clicking the appropriate button at the top
    of the *Utility* area. Then, double-click the label that we just dragged, and
    it should become editable. Change the label’s text to read “The Magic Number is:”
    ([Figure 3-5](#9781430245421_Ch03.xhtml#Fig5)).    ![9781430245421_Fig03-05.jpg](images/9781430245421_Fig03-05.jpg)    [Figure
    3-5](#9781430245421_Ch03.xhtml#_Fig5). Editing the label’s text    This label
    is somewhat misleading since there’s no magic number on display yet, so we’ll
