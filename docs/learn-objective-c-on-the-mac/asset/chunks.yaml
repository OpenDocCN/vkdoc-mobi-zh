    \ \"# out of #\"，并调整其大小以使所有文本可见。\n\n我们下一组控件将是用于搜索、添加和删除记录的按钮。在对象库搜索字段中输入 \"Button\"\
    。Cocoa 有多种按钮样式，我们将得到一系列选择。对于这个应用，我们使用渐变按钮。\n"
- fmt: "拖出一个并将其放置在表格视图下方，与上一步中的文本字段平行。将其标题命名为“Fetch”。再拖出两个按钮，放置在 Fetch 按钮右侧。将这些新按钮分别命名为“Delete”和“Add”。命名后，将它们放置在表格视图下方，并与窗口右侧边缘对齐。布局应与[图\
    \ 8-6](#9781430245421_Ch08.xhtml#Fig6) 一致。  \n![9781430245421_Fig08-06.jpg](images/9781430245421_Fig08-06.jpg)\
    \  \n[图 8-6](#9781430245421_Ch08.xhtml#_Fig6) 添加结果计数器和按钮  \n\n**显示详细信息**  \n我们现在需要布局用于显示所选神话人物详细信息的控件。Core\
    \ Data 实体具有`name`、`divinity`、`power`、`goodness`、`depiction`和`details`属性，这些属性将显示在用户界面中。首先，在按钮下方靠近窗口中心线处找到并拖出一个标签。双击它，将其标题设置为“Name:”。在\
    \ *对象库* 中，找到并拖出一个文本字段（在搜索框中输入“field”），放置在 Name: 标签旁边。将其拉伸至大约窗口宽度的三分之一，即约200像素。将其拖至按钮下方并与屏幕右侧边缘对齐。蓝色参考线会帮助您将其对齐。将\
    \ Name: 标签拖到文本字段左侧，使其对齐。  \n\n单击标签一次，按 ![images](images/arrow3.jpg)C 复制，再按 ![images](images/arrow3.jpg)V\
    \ 在其下方粘贴一个新标签。粘贴的标签将出现在第一个标签的右下方。将其拖至第一个标签正下方；它会在适当距离处对齐。重复此操作两次，使第一个标签下方有四个标签排列成一列。选中全部四个标签，选择\
    \ Editor ![image](images/arrow.jpg) Align ![image](images/arrow.jpg) Right Edges（![images](images/arrow3.jpg)）。最后，将这些标签的标题分别设置为“Divinity:”、“Power:”和“Goodness:”。标签会自动调整大小以显示完整标题，同时保持右边缘对齐。\
    \  \n\n`divinity`、`power`和`goodness`属性都是数值类型，因此我们将使用滑块来设置它们。在 *对象库* 中搜索“slider”，然后在\
    \ Divinity: 标签旁边、Name 文本字段下方拖出一个水平滑块。将其拉伸至与文本字段相同的宽度。蓝色参考线会指示位置。在 *属性检查器* 中，确保滑块的最小值为0，最大值为100，默认值为50，这与我们在\
    \ Mythical Person Core Data 实体上创建的`divinity`属性一致。同时勾选 *属性检查器* 中的 *Continuous*\
    \ 复选框。与处理标签类似，选中此滑块并按 ![images](images/arrow3.jpg)C 复制，然后按 ![images](images/arrow3.jpg)V\
    \ 在其下方粘贴一个新滑块。将新滑块重新定位，使其与 Divinity 滑块对齐，并与 Power: 标签对齐。再次按 ![images](images/arrow3.jpg)V\
    \ 粘贴另一个滑块，将其放置在前两个滑块下方，并与 Goodness: 标签对齐。窗口应如图 8-7 所示。  \n![9781430245421_Fig08-07.jpg](images/9781430245421_Fig08-07.jpg)\
    \  \n[图 8-7](#9781430245421_Ch08.xhtml#_Fig7) 添加用于管理神话细节的控件  \n\n尚未显示控件的两个属性是`depiction`和`details`。我们将为它们使用图像框和文本框。在\
    \ *对象库* 的搜索框中输入“image”，然后将一个 Image Well 拖出到屏幕左下角，让它吸附到角落的蓝色参考线上。将其大小调整为150像素高、200像素宽。在\
    \ *属性检查器* 中，将图像框设置为可编辑。这将允许用户将图像拖入图像框。  \n\n接下来，在 *对象库* 的搜索框中输入“text”，然后将一个 Text\
    \ View 拖出到右下角。将其大小调整为150像素高、250像素宽，这个宽度应足够填充窗口边缘与图像框之间的空间，并留出美观的间隙。当接近正确位置时，您会看到蓝色参考线，文本视图会自动对齐。我们需要对其属性进行一项重要更改。`NSTextView`默认能够显示富文本，这是一个很强大的功能，但代价是：在\
    \ Cocoa 中，富文本由`NSAttributedString`实例表示，这个类比`NSString`复杂得多，我们在这里不想深入讨论。为了使文本视图能够将其显示值绑定到普通字符串，我们必须关闭富文本处理。因此，在\
    \ *属性检查器* 中，单击取消选中 *Rich Text* 复选框（如果看不到，您可能选中了文本视图的父视图，即`NSScrollView`。再单击一次文本视图以选择内部的`NSTextView`）。您还可以将\
    \ *Find* 设置更改为 *Uses Bar*，并勾选 *Incremental Search*，以便文本搜索利用 OS × 10.7 中引入的 Find\
    \ Bar 功能。  \n\n这些控件需要标签，因此在 *对象库* 搜索框中输入“label”，然后将一个标签拖出到图像框上方，与图像框左边缘对齐。将其文本更改为“Depiction”。再拖出另一个标签放在文本视图上方，并将其标题设置为“Details”。将\
    \ Details 标签对齐，使其右边缘与滑块标签的右边缘对齐。  \n\n最后要做的任务是配置表格视图的列。五列中有四列将显示文本或数字，因此默认配置即可。然而，对于\
    \ Depiction 列，我们想要显示图像，因此需要将该列中当前的`NSTextField`替换为图像框。使用左侧的对象停靠栏选择 Depiction 列表格视图单元格中包含的“Static\
    \ Text”对象，如图 8-8 所示。选中后，按 Delete 键将其删除。在 *对象库* 的搜索框中输入“image”，然后将一个 Image Well\
    \ 拖入表格视图 Depiction 列的空表格单元格视图中。图像框会被裁剪为表格单元格视图的高度，因此将表格视图单元格的高度扩展为48像素，使其足以显示整个图像。\
    \  \n![9781430245421_Fig08-08.jpg](images/9781430245421_Fig08-08.jpg)  \n[图 8-8](#9781430245421_Ch08.xhtml#_Fig8)\
    \ 在对象停靠栏中选择 Depiction 文本字段  \n\n至此，GUI 布局完成。它很美观，不是吗？现在我们需要将其连接到数据源以填充内容。我们将使用上一章讨论的\
    \ Cocoa 绑定来实现。  \n\n**设置 Cocoa 绑定**  \n当我们告诉 Xcode 要创建一个 Core Data 应用程序时，它生成了一个应用程序委托类（名为`MBAppDelegate`），其中包含用于处理\
    \ Core Data 的特殊支持。这种支持的一部分是，生成的`MBAppDelegate`类现在有一个`managedObjectContext`属性。Managed\
    \ Object Context 是一个对象，它允许数组控制器（或您自己的代码）通过 Core Data 访问模型对象（`NSManagedObject`或其子类的实例）的源。我们稍后检查创建项目时自动放置的控制器代码时，将看到应用程序控制器如何提供此功能。与上一章一样，我们将使用`NSArrayController`来管理数据，但此处创建的`NSArrayController`将通过\
    \ Core Data（而不是`NSMutableDictionary`）访问其数据。并且，像上一章一样，我们将使用 Cocoa 绑定将其连接到用户界面。"
  raw: 'Drag out one and position it underneath the table view, and parallel with
    the text field from the previous step. Title it “Fetch.” Drag out two more, positioning
    them to the right of the Fetch button. Title these new buttons “Delete” and “Add.”
    After titling them, position them underneath the table view and aligned with the
    right edge of the window. The layout should match that of [Figure 8-6](#9781430245421_Ch08.xhtml#Fig6).    ![9781430245421_Fig08-06.jpg](images/9781430245421_Fig08-06.jpg)    [Figure
    8-6](#9781430245421_Ch08.xhtml#_Fig6). Adding a result counter and buttons    Displaying
    Details    We now need to lay out controls to display the details of a selected
    Mythical Person. Our Core Data entity’s attributes are `name`, `divinity`, `power`,
    `goodness`, `depiction`, and `details`, and that’s what our user interface will
    show. Start by finding and dragging out a Label below the buttons and near the
    centerline of the window. Double-click in it to set its title to “Name:.” In the
    *Object Library*, find and drag out a Text Field (enter “field” in the search
    field) next to the Name: label. Stretch it out until it’s about a third of the
    width of the window, 200 pixels or so. Drag it to be below the buttons and aligned
    with the right edge of the screen. The blue guidelines show to snap it into place.
    Drag the Name: label to have it snap into place to the left of the text field.    Click
    the Label once to select it, hit ![images](images/arrow3.jpg)C to copy it, and
    then ![images](images/arrow3.jpg)V to paste a new one below it. The pasted label
    will appear below and to the right of the first one. Drag it into position directly
    below the first label; it will snap into place at the right distance below the
    first label. Do this two more times so that there are three labels lined up below
    the first one. Select all four of them and select Editor ![image](images/arrow.jpg)
    Align ![image](images/arrow.jpg) Right Edges (![images](images/arrow3.jpg)]).
    Lastly, set the titles of these labels to be “Divinity:,” “Power:,” and “Goodness:.”
    The labels should automatically resize to show the whole title, but keeping the
    right edges aligned.    The `divinity`, `power`, and `goodness` attributes are
    all numeric, so we’ll use a slider to set them. In the *Object Library*, search
    for slider, and then drag out a Horizontal Slider next to the Divinity: label
    and below the text field for Name. Stretch it out to be the same width as the
    text field. As always, the blue guidelines will show the way. In the *Attributes
    Inspector*, make sure that the slider has a min value of 0, a max value of 100,
    and a default value of 50, just like the `divinity` attribute that we created
    on the Mythical Person Core Data entity. Check the *Continuous* checkbox in the
    *Attributes Inspector* as well. As we did with the labels, select this slider
    and hit ![images](images/arrow3.jpg)C to copy it, and then ![images](images/arrow3.jpg)V
    to paste a new one below it. Reposition the new slider to line up with the Divinity
    slider and be aligned with the Power: label. Press ![images](images/arrow3.jpg)V
    again to paste another slider, and position that one below the first two and aligned
    with the Goodness: label. The window should look like [Figure 8-7](#9781430245421_Ch08.xhtml#Fig7).    ![9781430245421_Fig08-07.jpg](images/9781430245421_Fig08-07.jpg)    [Figure
    8-7](#9781430245421_Ch08.xhtml#_Fig7). Adding controls to manage Mythical Details    The
    two attributes that don’t yet have a display control are `depiction` and `details`.
    We’ll use an image well and a text box for these. In the search field in the *Object
    Library*, type in “image,” and then drag an Image Well out to the lower left corner
    of the screen and let it snap to the blue guidelines in the corner. Resize it
    to be 150 pixels high and 200 pixels wide. In the *Attributes Inspector*, set
    the image well to be editable. This will allow a user to drag an image into the
    image well.


    Next, type “text” in the search field in the *Object Library*, and drag a Text
    View out to the lower right corner. Resize it to be 150 pixels high and 250 pixels
    wide, which should be wide enough to fill in the space between the edge of the
    window and the image well, with a visually pleasing gap. You should see blue guidelines
    when you’re close to the right position, and the text view should snap into place.
    We have one important change to make to its attributes. `NSTextView` is able,
    by default, to display rich text, which is a great feature but it comes at a price:
    In Cocoa, rich text is represented by instances of `NSAttributedString`, a class
    that’s a lot more complicated than `NSString`, and not something we want to get
    into here and now. In order for the text view to be able to bind its display value
    to a plain old string, we have to turn off rich text handling. So, in the *Attributes
    Inspector*, click to turn off the *Rich Text* checkbox (if you don’t see it, you’ve
    probably selected the text view’s superview, an `NSScrollView`. Click the text
    view once more to select the `NSTextView` inside). You can also change the *Find*
    settings to *Uses Bar* and check *Incremental Search* to have text searching utilize
    the Find Bar feature introduced in OS × 10.7.    These controls will need labels,
    so enter “label” in the *Object Library* search field, and drag a Label out above
    the image well, in line with the image well’s left edge. Change its text to “Depiction”.
    Drag out another label above the text view, and title it “Details.” Line the Details
    label up so that the right edge is aligned with the labels for the sliders.    The
    last thing to do is to configure the table view’s columns. Four of the five columns
    will display text or numbers, so the default configuration is fine. For the Depiction
    column, however, we want to display an image, so the `NSTextField` currently in
    that column needs to be replaced with an image well. Select the “Static Text”
    object contained within the table view cell for the Depiction column by using
    the object dock on the left, as shown in [Figure 8-8](#9781430245421_Ch08.xhtml#Fig8).
    Once you’ve got it, press the Delete key to remove it. Enter “image” into the
    search field in the *Object Library*, and drag an Image Well into the empty table
    cell view in the Depiction column of the table view. The image well will get clipped
    to the height of the table cell view, so expand the height of the table view cell
    to be 48 pixels high, tall enough to show the whole image.    ![9781430245421_Fig08-08.jpg](images/9781430245421_Fig08-08.jpg)    [Figure
    8-8](#9781430245421_Ch08.xhtml#_Fig8). Selecting the Depiction textfield in the
    Object Dock    That completes the GUI layout. It’s a thing of beauty, isn’t it?
    Now we need to connect it to a data source to populate it. We’ll do that using
    Cocoa bindings, discussed in the previous chapter.    Setting up Cocoa Bindings    When
    we told Xcode that we wanted to make a Core Data application, it generated an
    application delegate class (called `MBAppDelegate`) that includes special support
    for working with Core Data. Part of this support is that the generated `MBAppDelegate`
    class now has a `managedObjectContext` property. The Managed Object Context is
    an object that lets an array controller (or, for that matter, your own code) tap
    into a source of model objects (instances of `NSManagedObject` or a subclass)
    through Core Data. We’ll see how the app controller provides this a little later
    when we examine the controller code that was put in place automatically when we
    created this project. Just like in the previous chapter, we’ll use an `NSArrayController`
    to manage the data, but the `NSArrayController` created here will access its data
    through Core Data instead of through an `NSMutableDictionary`. And as we did in
    the last chapter, we’ll connect it to the user interface using Cocoa bindings.'
