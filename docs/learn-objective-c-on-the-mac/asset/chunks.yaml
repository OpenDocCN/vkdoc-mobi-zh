    setDuration:ANIM_DURATION];     [self transitionInFromRight];     self.currentTabIndex
    = 0;     self.middleView = self.rightView; } ```    As you enter this code, Xcode
    will complain that it can’t find methods named `prepareRightSide` and `transitionInFromRight`.
    So, let’s write the code for these two internal methods now. We won’t bother putting
    these methods into a separate protocol or anything. In Objective-C, code can freely
