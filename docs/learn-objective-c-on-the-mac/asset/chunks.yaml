    \               @\"3\" : @\"NSJapaneseEUCStringEncoding\",  \n               \
    \       @\"4\" : @\"NSUTF8StringEncoding\",  \n                      @\"5\" :\
    \ @\"NSISOLatin1StringEncoding\",  \n                      @\"6\" : @\"NSSymbolStringEncoding\"\
    ,  \n                      @\"7\" : @\"NSNonLossyASCIIStringEncoding\",  \n  \
    \                    @\"8\" : @\"NSShiftJISStringEncoding\",  \n             \
    \         @\"9\" : @\"NSISOLatin2StringEncoding\",  \n                      @\"\
    10\" : @\"NSUnicodeStringEncoding\",  \n                      @\"11\" : @\"NSWindowsCP1251StringEncoding\"\
    ,  \n                      @\"12\" : @\"NSWindowsCP1252StringEncoding\",  \n \
    \                     @\"13\" : @\"NSWindowsCP1253StringEncoding\",  \n      \
    \                @\"14\" : @\"NSWindowsCP1254StringEncoding\",  \n           \
    \           @\"15\" : @\"NSWindowsCP1250StringEncoding\",  \n                \
    \      @\"21\" : @\"NSISO2022JPStringEncoding\",  \n                      @\"\
    30\" : @\"NSMacOSRomanStringEncoding\",  \n                      @\"2415919360\"\
    \ : @\"NSUTF16BigEndianStringEncoding\",  \n                      @\"2483028224\"\
    \ : @\"NSUTF16LittleEndianStringEncoding\",  \n                      @\"2348810496\"\
    \ : @\"NSUTF32StringEncoding\",  \n                      @\"2550137088\" : @\"\
    NSUTF32BigEndianStringEncoding\",  \n                      @\"2617245952\" : @\"\
    NSUTF32LittleEndianStringEncoding\"};  \n    }  \n    return encodingNames;  \n\
    }\n```\n\n接下来，我们继续处理字符串编码相关的工作，定义 `stringEncodingName` 的访问器，这次还会添加一个设置器（因为该值可通过弹出按钮进行设置）。和之前一样，我们实现\
    \ `keyPathsForValuesAffectingStringEncodingName`，并将 `chosenEncoding` 添加为需要监听的键之一。\n\
    \n`stringEncodingName` 方法有两条主要执行路径。如果 `chosenEncoding` 已经设置（即用户从弹出列表中选择了编码），我们就简单地从之前定义的字典中查找所选编码的名称。否则，就需要使用\
    \ `stringWithContentsOfFile:usedEncoding:error:` 实际读取文件内容，并利用得到的编码在字典中查找该编码的名称（如果未能发现任何编码，则返回简要的问题描述）。\n\
    \n`setStringEncodingName:` 方法相当简单。我们在字典中进行反向查找，找到与所选编码对应的键（一个包含编码整数值的字符串）。当用户在弹出菜单中选择编码名称时，会调用此方法。\n\
    \n```\n+ (NSSet *)keyPathsForValuesAffectingStringEncodingName {  \n    return\
    \ [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\",  \n            @\"chosenEncoding\"\
    , nil];  \n}  \n\n- (NSString *)stringEncodingName {  \n    if (!self.fileURL)\
    \ return nil;  \n    if (self.chosenEncoding != 0) {  \n        return [[self\
    \ encodingNames] objectForKey:  \n                @(self.chosenEncoding).stringValue];\
    \  \n    } else {  \n        NSStringEncoding encoding = 0;  \n        NSError\
    \ *err = nil;  \n        [NSString stringWithContentsOfFile:self.fileURL.path\
    \  \n                              usedEncoding:&encoding error:&err];  \n   \
    \     if (encoding==0) {  \n            return @\"No encoding detected.  Perhaps\
    \ a binary file?\";  \n        }  \n        return [[self encodingNames] objectForKey:\
    \  \n                @(self.chosenEncoding).stringValue];  \n    }  \n}  \n\n\
    - (void)setStringEncodingName:(NSString *)name {  \n    NSString *key = [[[self\
    \ encodingNames] allKeysForObject:name]  \n                     lastObject]; \
    \ \n    self.chosenEncoding = [key longLongValue];  \n}\n```\n\n最后，是 `fileStringValue`\
    \ 及其对应的 `keyPathsForValuesAffectingFileStringValue` 方法。这里同样有两条主要代码路径。第一种情况，当 `chosenEncoding`\
    \ 已设置时，我们会尝试使用所选编码从指定文件中读取字符串值。\n\n另一种情况，当未选择编码时，会尝试读取字符串值，但让系统自行判断使用哪种编码。无论哪种情况，我们都会进行一些错误检查，并在遇到特定字符串编码错误时显示一个警告面板。\n\
    \n```\n+ (NSSet *)keyPathsForValuesAffectingFileStringValue {  \n    return [NSSet\
    \ setWithObjects:@\"fileURL\", @\"fileWrapper\",  \n            @\"chosenEncoding\"\
    , nil];  \n}  \n\n- (NSString *)fileStringValue {  \n    if (!self.fileURL) return\
    \ nil;  \n    NSError *err = nil;  \n    NSString *value = nil;  \n    if (self.chosenEncoding\
    \ != 0) {  \n        value = [NSString stringWithContentsOfFile:self.fileURL.path\
    \  \n                                          encoding:self.chosenEncoding error:&err];\
    \  \n    } else {  \n        NSStringEncoding encoding = 0;  \n        value =\
    \ [NSString stringWithContentsOfFile:self.fileURL.path  \n                   \
    \                   usedEncoding:&encoding error:&err];  \n    }  \n    if (err)\
    \  {  \n        if ([err code]==NSFileReadInapplicableStringEncodingError && \
    \ \n            [[err domain] isEqual:NSCocoaErrorDomain]) {  \n            NSRunAlertPanel(@\"\
    Invalid string encoding\",  \n                            [err localizedDescription],\
    \ nil, nil, nil);  \n        }  \n        NSLog(@\"encountered error: %@\", err);\
    \  \n    }  \n    return value;  \n}\n```\n\n## 文件部分呢：GUI\n\n代码部分就这些了。现在让我们设置图形用户界面（GUI）。打开\
    \ `MainMenu.xib`，我们需要先建立连接，以便菜单项可以调用我们应用程序委托的 `chooseFile:` 方法。打开主 Nib 编辑区域内的菜单，进入\
    \ *文件* 菜单，按住 Ctrl 键从 *打开* 项拖一条连接线到主 Nib 窗口中代表应用程序委托的图标上。然后从弹出的小菜单中选择 `chooseFile:`。\n\
    \n现在可以开始构建窗口本身了，双击坞中的窗口图标，使其显示在编辑区域中。这个 GUI 完全由 Cocoa 绑定（Cocoa Bindings）驱动。我们的控制器没有任何输出口指向此窗口中的任何对象，该窗口中的任何内容也不会调用我们控制器中的任何操作方法。我们将逐个介绍所有绑定，但首先，请查看\
    \ 图 16-2，它展示了在 Interface Builder 中看到的完整窗口视图，所有对象均已选中。\n\n![9781430245421_Fig16-02.jpg](img/9781430245421_Fig16-02.jpg)\n\
    \n图 16-2 .  我们所有的窗口组件，已高亮显示以便查看\n\n请注意，在表格视图和大文本视图之间有一个小的“凹陷”。这实际上是 `NSSplitView`\
    \ 的可拖拽控件，它允许我们将两个视图垂直或水平堆叠，并通过一次拖拽同时调整两者大小。这种控件在 Xcode 和其他地方经常使用，稍后我们将看到如何在此处进行设置。\n\
    \n现在，让我们开始一个部分、一个部分地创建这个窗口，并一路连接好所有绑定。前几个对象最终应该看起来像 图 16-3 所示，所以可以先往前看一下以获取一些指导。在窗口顶部附近，放置几个标签，并将左侧标签的标题改为“已选文件:”。然后在它们之间放置一个\
    \ `NSImageView`。要找到这个类，请在 *库* 中搜索“NSImageView”、“image well”或“image view”。通过选中左侧标签，然后从菜单中选择\
    \ **编辑** ![image](img/arrow.jpg) **格式** ![image](img/arrow.jpg) **字体** ![image](img/arrow.jpg)\
    \ **粗体**，使其文字以粗体显示，并将右侧的标签拉伸，使其几乎延伸到窗口的右边缘。我们希望由图像视图显示的文件图标看起来像是悬浮在窗口背景之上，因此选中该图像视图，并使用\
    \ *属性检查器*，在 *边框* 弹出菜单中选择 *无* 来移除其边框。\n"
- fmt: 'Also, change the `Scaling` pop-up to `Proportionally Up or Down` as well,
    so that whether the system gives us a tiny icon or a huge one, it will be scaled
    to fit the available space. The GUI should look like [Figure 16-3](#9781430245421_Ch16.xhtml#Fig3)
    at this point.


    ![9781430245421_Fig16-03.jpg](images/9781430245421_Fig16-03.jpg) [Figure 16-3](#9781430245421_Ch16.xhtml#_Fig3).
    GUI for displaying the selected file’s icon and path. The image view is selected
    for this screenshot; otherwise it would be invisible.


    Now it’s time to set up the bindings for the image view and the right-hand label.
    Select the image view, open the *Bindings Inspector*, and bind its *Value* to
    the app delegate using the `self.fileIcon` key path. Then select the label on
    the right, and bind its *Value* to the app delegate using the `self.filename`
    key path.


    The next portion of the window looks just like what we created previously. In
    fact, the quickest way to add these objects is to select the three shown above
    by dragging a box over them, pressing ![images](images/arrow3.jpg)*D* to duplicate
    the selected object, and then dragging the new ones down, lining them up below
    the others. Change the title of the new left-side label to “Opens Application:”
    and adjust its position if necessary. [Figure 16-4](#9781430245421_Ch16.xhtml#Fig4)
    shows what this looks like.


    ![9781430245421_Fig16-04.jpg](images/9781430245421_Fig16-04.jpg) [Figure 16-4](#9781430245421_Ch16.xhtml#_Fig4).
    This portion of the GUI will let us see with which app the file will launch. Here
    both image views are shown because otherwise, just like before, they’d be invisible.


    Reconfigure the new image view’s binding, connecting its *Value* to the app delegate
    with the `self.opensAppIcon` key path, and then the right-side label’s *Value*
    to the app delegate using the `self.opensAppName` key path.


    Next, let’s move on to the table view. Drag one out from the Library, and widen
    it to match [Figure 16-5](#9781430245421_Ch16.xhtml#Fig5).


    ![9781430245421_Fig16-05.jpg](images/9781430245421_Fig16-05.jpg) [Figure 16-5](#9781430245421_Ch16.xhtml#_Fig5).
    Here we’ll display all the file’s attributes.


    This table view is going to contain all the file attributes that the system gives
    us. Those attributes come to us in the form of a dictionary, which is a perfect
    use of Apple’s `NSDictionaryController` class. Using `NSDictionaryController`,
    we’ll be able to display all of the selected file’s attributes as key-value pairs
    in the table view just by hooking them up with Cocoa bindings.


    Search for `NSDictionaryController` in the *Library*, and drag one to the Interface
    Builder dock in order to add it to the nib. Then click the text next to its icon
    in the dock, and rename it `attrDict` so that we can easily identify it when binding
    to it later on. Like the other included controller classes, the dictionary controller
    class is able to get its content via a binding. Use the *Bindings Inspector* to
    bind its *Content Dictionary* (in the *Controller Content* group) to the app delegate’s
    `self.fileAttributes` key path.


    Now we just have to bind the table view’s columns to the new controller. Select
    the left column, and use the *Bindings Inspector* to bind its *Value* column to
    `attrDict`, using `arrangedObjects` as the controller key and `key` as the key
    path. That will make the left column show the keys for each key-value pair in
    the dictionary. Now select the right column, and bind its *Value* column to `attrDict`,
    using `arrangedObjects` as the *Controller Key* and `value` as the *Model Key
    Path*.


    Next, grab an `NSTextView` from the *Library* and drag it into the window we’ve
    been creating, placing it near the bottom. Our window is starting to get a little
    cramped now! Reduce the height of both the table view and the text view so that
    they fit comfortably on top of one another, leaving a fair chunk of space beneath
    as well since we’re going to need it.


    Then resize the text view so that it’s the same width as the table view. All this
    is shown in [Figure 16-6](#9781430245421_Ch16.xhtml#Fig6).


    ![9781430245421_Fig16-06.jpg](images/9781430245421_Fig16-06.jpg) [Figure 16-6](#9781430245421_Ch16.xhtml#_Fig6).
    This is what the window should look like after we position the text view properly
    beneath the table view.


    When we drag a text view from the *Library*, it’s actually contained within a
    scroll view, so give it an extra click to select the text view inside the scroll
    view. Then use the *Attributes Inspector* to turn off the *Editable* checkbox
    (we just want to display a file here, not edit it) as well as the *Rich Text*
    checkbox. Now is as good a time as any to bring the `NSSplitView` into play, as
    hinted at earlier. Make sure the table view and the text view (actually, the scroll
    view that contains it) are about the same size, and line them up one above the
    other. Then select both of them, and choose **Editor** ![image](images/arrow.jpg)
    **Embed In** ![image](images/arrow.jpg) **Split View** from the menu. Doing so
    will line them up tightly and draw the little dimple between them.


    Now select just the text view again. Remember, we can avoid the ambiguity and
    extra steps involved to select the correct object in the view hierarchy by Shift-Ctrl-clicking
    the text view and selecting the text view from the stack of objects that’s displayed.
    Switch to the *Bindings Inspector*, and bind the text view’s *Value* to the app
    delegate’s `self.fileStringValue` key path.


    Finally, let’s provide a GUI for the list of string encodings that will be used
    to let us reinterpret the contents of the selected file. For this, we’ll need
    a label and a pop-up button from the Library. Lay them out as shown, including
    the extra-wide pop-up button, since some of the entries in the list will be quite
    long (see [Figure 16-7](#9781430245421_Ch16.xhtml#Fig7)).


    ![9781430245421_Fig16-07.jpg](images/9781430245421_Fig16-07.jpg) [Figure 16-7](#9781430245421_Ch16.xhtml#_Fig7).
    Really, who wouldn’t want their pop-up button wide enough to fully display “NSUTF32LittleEndianStringEncoding”?


    The values for the pop-up list will be retrieved from the app delegate’s `encodingNames`
    method, so we don’t need to enter them in Interface Builder. Here we’ll use `NSDictionaryController`
    again, this time to display just the values from the `encodingNames` dictionary.
    In order to do that, we need to first drag another `NSDictionaryController` from
    the *Library* to the nib window, renaming it `strEncs` while we’re at it, and
    bind its *Content Dictionary* to the app delegate’s `self.encodingNames` key path.
    Then, bind the pop-up button’s *Content* to `strEncs`, using `arrangedObjects`
    as the *Controller Key* and `value` as the *Model Key Path*.


    Finally, we need to establish a binding so that the value the user sets in the
    pop-up is noticed by the app delegate, making the app delegate redisplay the text
    using the selected encoding. Do this by binding the pop-up button’s Selected Object
    to the app delegate, using `self.stringEncodingName` as the key path.


    Now save all the changes, and **Build & Run** the app. We should see the GUI we’ve
    built, including a **File** ![image](images/arrow.jpg) **Open** menu item that
    lets us choose a file and will show us the file’s attributes as well as its content.
    Choosing another encoding from the pop-up list will make the app redisplay the
    data in the text view using the chosen encoding.


    ## Wrap Up


    In this chapter, we’ve seen how to use Cocoa to access files and their metadata.
    We’ve also learned a bit about string encodings, and how Cocoa deals with them.
    What’s more, we’ve seen another example of a GUI powered by Cocoa bindings. Except
    for the menu item that opens a file, everything that happens here does so through
    bindings, including setting a value in a pop-up list, which ends up causing the
    text field to reload.'
