  trans: '

    # 第 11 章：窗口、菜单与面板


    第 1 章到第 10 章涵盖了开始使用 Core Data 所需的主要概念。现在让我们转向其他主题。不过我们不会完全抛开 Core Data，它仍会在后续的一些练习中发挥作用，虽然程度不同。本书篇幅有限，无法将每个示例都变成完整的应用程序。然而，即使在没有使用
    Core Data 的情况下，您也可以思考它如何融入我们接下来章节演示的内容。既然您已经熟练掌握了 Core Data，那么对于应用开发的某些方面，您可能会产生全新的见解，而这些方面您以前可能会用不同的方式解决。说到视图，这正是第
    11 章的主题——我们将探讨 Cocoa 及其他框架中最突出、最常用的视图组件：窗口、菜单和面板。


    在过去的几章中，我们一直专注于可视为 Cocoa 编程“后端”的内容——即提供功能来维护应用基础设施的模型和控制器类。现在该把注意力转向 Cocoa 的“前端”，更多地关注
    MVC 架构中的视图部分了。


    在本章中，我们将重点讨论窗口（不是微软那种）、菜单（不是餐厅那种）、面板（不是太阳能那种）和表单（不是床单那种），这些都是高级 GUI 对象，几乎没有哪个
    Cocoa 应用能离开它们。窗口为视图对象的绘制提供了基础。在 Cocoa 中，这些由`NSWindow`、其直接子类`NSPanel`以及几个专用子类表示。菜单提供了熟悉的屏幕顶部访问系统范围和特定应用用户操作的途径，这是大多数
    Mac 应用都有的功能，由`NSMenu`和`NSMenuItem`对象的层级结构表示。表单提供了一种替代经典自由浮动模态窗口的方式——它将模态窗口作为覆盖层附着在现有窗口上，为用户提供更连贯的界面。


    我们将通过一个“实验室”来探索这三个领域，这是一个没有实际用途的玩具应用，仅用于演示某些功能并让我们了解这些组件的工作原理。


    ## NSWindow 与 NSPanel


    首先，使用 Cocoa 应用模板创建一个新的 Xcode 项目，并将其命名为`WindowLab`。我们将用这个项目作为测试平台来演示各种窗口功能。


    在 Mac OS X 中，屏幕上几乎所有的显示内容都是通过窗口呈现的。许多窗口很容易识别，顶部有标准控件，背后有投影。


    但有些窗口并不那么明显。例如，如果启动一个全屏显示的游戏，即使它呈现的是与 Cocoa 无关的自定义控件，这一切也都发生在一个窗口中。屏幕底部的 Dock
    显然是一个窗口。如果将一个文件图标从一个 Finder 窗口拖到另一个窗口，拖动的图标实际上是被一个透明的小窗口“携带”着！


    在所有这些情况下，我们看到并与交互的都是`NSWindow`及其子类的实例。`NSWindow`是一个非常通用的类，它允许我们直接配置多种行为，并通过子类化实现更多功能。通常，如果我们想改变窗口本身的外观——无论是其“镀铬装饰”（标题栏和左上角控件）、透明度还是形状——我们可能需要子类化`NSWindow`，但在其他情况下几乎不需要这样做。在本书中，我们将坚持使用可直接使用的窗口类型，并遵循苹果的人机界面指南，不会通过子类化`NSWindow`来改变它们的外观。


    **提示** 人机界面指南（常简称为“HIG”）是苹果为应用开发者提供的一系列建议。HIG 就像一种风格指南，当你担心应用看起来有点“不对劲”时可以查阅。它并非严格的规定，也没有人会阻止你违反
    HIG。实际上，包括苹果自家应用在内的许多应用，都会以各种方式偏离指南。然而，它提供了一个良好的基准，描述了各种组件应如何使用。


    我们在第 2 章已经提到过 HIG，但值得再次指出。你可以在`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`在线找到
    HIG。


    图 11-1 展示了当今大多数 Cocoa 应用中常见的主要窗口类型。`NSWindow`包含两种绘制风格：“普通”外观和“纹理”外观（后者有点像闪亮的金属片）。`NSWindow`的任一风格都可以配置为支持全屏模式，这会在标题栏右端添加箭头。`NSPanel`可以配置为工具模式（此时标题栏更小、阴影更小，并浮动在应用的其他窗口之上），也可以看起来像普通窗口。在这两种情况下，普通外观与纹理外观的选择也同样适用，与`NSWindow`类似。`NSPanel`的另一个选项是
    HUD（平视显示器）模式，此时面板的配色方案反转，标题栏和底部边缘被修改，整个窗口变得略微透明。这种模式（没有纹理选项）旨在让用户透过界面的部分区域看到背后的内容，并在像
    iPhoto 这样的应用中得到了很好的应用——你可以调出一个包含可调颜色设置的 HUD 面板，透过它仍然可以看到正在查看的照片。


    ![9781430245421_Fig11-01.jpg](img/9781430245421_Fig11-01.jpg)


    图 11-1. Cocoa 中可直接使用的主要窗口类型示例


    与某些其他 GUI 工具包不同——它们创建新应用时首先要做的就是子类化某种应用类和某种窗口类——Cocoa 允许模型、视图和控制器部分真正分离。窗口只需要知道如何显示自身并为视图提供图形上下文，仅此而已。任何处理应用运行时窗口状态变化的代码（例如从
    nib 文件加载、被拖过屏幕或被用户关闭）通常都可以由窗口的委托对象（即其控制器）来处理。


    ## 处理输入


    除了为视图提供显示内容的框架外，`NSWindow`还处理来自鼠标和键盘的用户输入。`NSWindow`中的任何鼠标操作（点击、拖动、移动、释放等）都会触发`NSWindow`中的一个方法，该方法在其内容中查找适当的视图对象，并在视图上调用相同的方法。这种对称性之所以有效，是因为`NSWindow`和`NSView`都继承自`NSResponder`，而处理这些事件的方法正是在该类中定义的。同样，当用户按下或释放键盘上的某个键时，应用程序会调用应用“关键窗口”（即当前拥有键盘焦点的窗口；通常是用户最后点击的窗口）中的方法，该方法进而确定哪个视图当前拥有键盘焦点，并将责任移交出去，在焦点视图中调用相同的方法。

