    **Embed In** ![image](images/arrow.jpg) **Box**). Set the title of the Box to
    be “Show.” Now we can adjust the size of the Box relative to the window, and then
    adjust the table view inside the Box to get a pleasing arrangement.    Now that
    we’ve got a place to list the shows, we need to connect them to the core data
    model, and we’ll use Cocoa bindings and an `NSArrayController` as the glue. Drag
    out an Array Controller from the *Object Library*, and title it “Shows.” In the
    *Attribute Inspector*, set the *Mode* to be “Entity Name” in the pop-up menu,
    and then enter “Show” in the *Entity Name* field to connect it to the `Show` entity
    in the Model Editor. Check the checkbox for *Prepares Content*, which will instruct
    the Array Controller to load all the `Shows` at launch time. Switch to the *Bindings
    Inspector*. Bind the *Managed Object Context* (at the bottom of the bindings list)
    to App Delegate, and set the *Model Key Path* to “managedObjectContext.”    For
