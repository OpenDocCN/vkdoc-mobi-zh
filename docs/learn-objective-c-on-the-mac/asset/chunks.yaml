  trans: '

    # 系统菜单


    我们已经了解了 Cocoa 中窗口的一些基本用法，接下来让我们花点时间探讨 Mac OS X 的另一个无处不在的特性——应用程序菜单。与大多数其他现代操作系统不同，Mac
    OS X 将菜单放置在屏幕顶部而非每个窗口顶部。这种布局有一些显著的优点：由于无需在每个打开窗口的顶部预留横向条幅，仅需屏幕顶部的一条横向菜单即可显示当前活动应用的菜单，从而节省了屏幕空间。此外，鼠标操作菜单更加轻松快捷——我们只需将鼠标向上甩动即可定位菜单，随后只需左右微调就能找到想要选择的顶层菜单项。


    然而，这种布局并非没有复杂性。在典型的 Windows 应用程序中，可能会有多个不同的窗口，每个窗口都有自己的菜单，菜单项仅与当前窗口内容相关。虽然在 Mac
    OS X 应用程序中技术上可以实现类似功能（在不同窗口被选中时改变菜单结构），但这种做法并不被提倡，并且可能会打扰那些早已习惯 Mac 上应用行为一致性的用户。相反，我们可以实现一种完全受支持且推荐的行为：根据当前选中的窗口（或者更确切地说，窗口内当前选中的对象）来启用或禁用菜单项。在本节中，我们将演示如何实现这一点，但首先，我们将简要介绍
    Cocoa 自带且大多数应用程序通用的系统菜单。


    ## 标准应用程序菜单项


    苹果的指南定义了一组大多数应用程序都应包含的菜单和菜单项。在 Xcode 中创建一个新应用程序，命名为 `MenuLab`，并使用 `ML` 作为类前缀。我们将在此进行一些菜单项实验。打开刚创建的
    `MainMenu.xib` 文件，Interface Builder 画布将显示顶部预定义的菜单集合。该集合包含应用程序自身的顶层条目，其后依次是"文件"、"编辑"、"格式"、"显示"、"窗口"和"帮助"菜单，每个菜单都包含各自的项目。打开*连接检查器*检查这些项目，查看它们连接到何处。只需依次点击各个菜单项，每次点击后观察检查器。其中有一些例外，例如*显示字体*菜单项，但大多数项目都连接到了我们之前讨论过的*第一响应者*代理。请注意，将菜单项连接到*第一响应者*不仅会让该菜单项在最相关的对象中调用其操作方法，还会根据响应者链中的内容自动启用或禁用该菜单项。


    ## 自定义菜单


    标准菜单包含了大量功能：从调出应用程序的"关于"窗口，到编辑和格式化文本，再到处理窗口，所有功能都已配置完毕。然而，许多应用程序需要一些额外的功能——某些功能不适合附加到窗口，或者会占用窗口过多空间。解决这个问题的常见方法是在"显示"和"窗口"菜单之间添加一个或多个额外的顶层菜单项。例如，Finder
    中有一个"前往"菜单，Xcode 有三个额外的顶层菜单："导航"、"编辑器"和"产品"。在我们的应用中，只需添加一个额外的菜单即可，我们将把它添加到 MenuLab
    项目中。


    ## 使用绑定启用/禁用


    我们要做的第一件事是设置一对菜单项，用于控制应用委托中的布尔属性。我们可以用它们来控制某种影响应用全局设置的开关。


    在此，我们将创建一个名为 `turbo` 的属性，它假定能让一切运行得更快（在 MenuLab 中这很容易实现，因为它实际上并不执行任何操作）。我们将创建两个菜单项，分别标记为"Turbo
    On"和"Turbo Off"，并将它们连接到应用委托中的操作方法，以执行实际的切换。然后，我们将使用绑定来适当地启用和禁用它们，这样当 `turbo` 为
    `YES` 时，只有"Turbo Off"项可点击；当 `turbo` 为 `NO` 时，只有"Turbo On"项可点击。


    首先在 Xcode 中向应用委托添加 `turbo` 属性，以及一个用于切换属性值的操作方法。我们需要对 `MLAppDelegate.h` 和 `MLAppDelegate.m`
    两个文件进行的修改如下所示（格式稍作精简，删除了空行）。我们只需添加以粗体显示的行。


    ```

    #import <Cocoa/Cocoa.h>


    @interface MLAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (assign) BOOL turbo;

    - (IBAction)toggleTurbo:(id)sender;


    @end

    ```


    对于 `MLAppDelegate.m`：


    ```

    #import "MLAppDelegate.h"


    @implementation MLAppDelegate


    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification {

        // 在此插入代码以初始化你的应用程序

    }


    - (IBAction)toggleTurbo:(id)sender {

        self.turbo = !self.turbo;

    }


    @end

    ```


    现在切换回 Interface Builder 画布中的 `MainMenu.xib`。打开 nib 文件的空白窗口，将其标题更改为"Turbo Switch"，然后从*对象库*中拖入一个复选框，放置好后将其标题更改为"Turbo!"。我们放置此复选框是为了直接查看应用委托的
    `turbo` 属性中存储的值，从而轻松检查并确认菜单项行为正确。打开*绑定检查器*，配置复选框的*值*绑定，使用 `turbo` 键路径将其连接到 `MLAppDelegate`。


    接下来，是时候创建一些菜单项了（图 11-8 展示了完成后的效果）。首先，在*对象库*中搜索"Menu"以缩小范围。将一个子菜单项拖入菜单，将其放置在"显示"和"窗口"菜单之间。双击我们刚刚添加的新顶层菜单项，将其标题更改为"工具"。再次点击它会发现其中已包含一个项目（标题为"Item"）。点击选中它，然后按
    `⌘D` 复制，会在其下方放置一个相同的项目。


    ![9781430245421_Fig11-08.jpg](img/9781430245421_Fig11-08.jpg)


    图 11-8. 设置用于切换布尔属性的菜单项


    此时，应该选中了两个新菜单项中下方的那个。双击选中标题文本，将其重命名为"Turbo Off"。按住 Control 键从中拖拽到主窗口中的应用委托图标，连接到
    `toggleTurbo:` 操作。现在打开*绑定检查器*，配置菜单项的*已启用*绑定，使用 `turbo` 键路径连接到应用委托。这确保了只有应用委托的
    `turbo` 属性值为 `YES` 时，该菜单项才会被启用。


    现在回到上方的菜单项，将其重命名为"Turbo On"，并像处理"Turbo Off"一样将其连接到应用委托的 `toggleTurbo:` 操作。由于此菜单项启用或禁用的条件与"Turbo
    Off"菜单项相反，因此绑定会稍有不同。它也应该使用应用委托和 `turbo` 键路径配置*已启用*绑定，但在下方还需要指定 `NSNegateBoolean`
    作为*值转换器*。


    保存更改并点击**运行**。应会出现包含一个复选框的"Turbo Switch"窗口。

