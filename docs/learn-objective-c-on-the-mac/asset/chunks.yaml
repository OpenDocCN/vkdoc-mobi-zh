    ### 检查器


    *库*区域占据了 Xcode 窗口右侧实用区域的下部大约三分之一。另一个重要的界面构建器工具位于*库*的正上方，占据了右侧实用区域的上部三分之二。这被称为*检查器*。*检查器*是一个上下文相关的窗格，用于显示当前选中对象的信息。点击窗口，检查器会显示该窗口的信息（[Figure
    2-9](#9781430245421_Ch02.xhtml#Fig9)）。点击标签，*检查器*会显示该标签的信息。你明白了吧。


