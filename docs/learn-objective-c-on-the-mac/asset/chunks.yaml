  trans: "\n# 排版后的文档\n\n请记住，AppKit 类（例如所有窗口和视图类）通常不是线程安全的。对它们的所有访问应仅在主线程上执行。但目前，我们正在从多个操作中访问\
    \ `NSTextView`。很可能，其中一些操作在时机成熟时会在其他线程上运行！即使在这个简单的测试应用中可能“可行”，但这并不是一个真正安全的基础。我们需要调整每个操作，以确保对\
    \ `NSTextView` 的所有访问都发生在主线程上。\n\n为此，我们将把每次这样的访问包裹在另一个 block 中，这个 block 将直接传递给一个特殊的队列，该队列始终在主线程上运行其操作。这里的粗体代码显示了我们需对\
    \ `doWork:` 方法所做的最终修改：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
    \ = [NSDate date];\n\n    __block NSString *fetchedData;\n    __block NSString\
    \ *processed;\n    __block NSString *firstResult;\n    __block NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation\
    \ blockOperationWithBlock:^{\n        fetchedData = [self fetchSomethingFromServer];\n\
    \        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n            _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \                 @\"Fetched: %@\\n\", fetchedData];\n        }];\n    }];\n\n\
    \    NSBlockOperation *process = [NSBlockOperation blockOperationWithBlock:^{\n\
    \        processed = [self processData:fetchedData];\n        [[NSOperationQueue\
    \ mainQueue] addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                                       @\"Processed:\
    \ %@\\n\", processed];\n        }];\n    }];\n\n    NSBlockOperation *calcFirst\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        firstResult = [self\
    \ calculateFirstResult:processed];\n    }];\n\n    NSBlockOperation *calcSecond\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult = [self\
    \ calculateSecondResult:processed];\n    }];\n\n    NSBlockOperation *showResults\
    \ = [NSBlockOperation blockOperationWithBlock:^{\n        [[NSOperationQueue mainQueue]\
    \ addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                                       @\"First Result:\
    \ [%@]\\nSecond Result: [%@]\\n\\n\",\n                                      \
    \ firstResult, secondResult];\n\n            NSDate *endTime = [NSDate date];\n\
    \            NSLog(@\"Completed in %f seconds\",\n                  [endTime timeIntervalSinceDate:startTime]);\n\
    \            self.isWorking = NO;\n        }];\n    }];\n\n    [process addDependency:fetch];\n\
    \    [calcFirst addDependency:process];\n    [calcSecond addDependency:process];\n\
    \    [showResults addDependency:calcFirst];\n    [showResults addDependency:calcSecond];\n\
    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
    \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n      \
    \ waitUntilFinished:NO];\n}\n```\n\n现在我们应该能够运行我们的应用了，并且按下 *Start* 按钮后，我们可能会注意到一些不同之处：按钮会立即恢复到非点击状态，菜单仍然有效。前两个操作在完成时会向\
    \ `NSTextView` 中写入一些文本。大约七秒后（相对于第一个版本所用的十秒有所缩短，因为现在某些工作方法同时运行），最终输出会出现在文本视图中。这一切都很好，但我们还可以通过使用\
    \ Cocoa Bindings 和我们一开始创建的 `isWorking` 属性来轻松地让应用响应更快。再次打开 *MainMenu.xib*，并使用对象库找到循环进度指示器。然后将其添加到我们的窗口中，如\
    \ 图 17-2 所示。\n\n![9781430245421_Fig17-02.jpg](img/9781430245421_Fig17-02.jpg)\n\
    \n图 17-2 . 添加进度指示器\n\n选中进度指示器后，使用*属性检查器*确保其*停止时显示*复选框处于关闭状态。然后切换到*绑定检查器*，展开其 *Animate*\
    \ 参数的视图，并将其绑定到 App Delegate，在模型键路径（Model Key Path）中输入 `isWorking`。接着选择窗口中的 *Start*\
    \ 按钮，我们将进行类似的配置。将按钮的 *Enabled* 属性绑定到应用委托，键路径为 `isWorking`，并这次添加一个 `NSNegateBoolean`\
    \ 作为*值转换器*。\n\n保存更改，然后点击 **Run**；当我们点击 *Start* 按钮时，它变为禁用状态，循环进度指示器出现并开始旋转。当工作完成时，进度指示器消失，按钮恢复正常。\n\
    \n现在让我们更进一步：添加一个水平进度指示器（一种水平移动，告诉我们事情正在发生，例如在软件安装程序中）。进度视图将从 0 到 4，每个工作方法都会增加一点数值。与循环进度指示器一样，这将完全使用\
    \ Cocoa Bindings 进行配置。\n\n首先，在 *SWAppDelegate.h* 中添加一个名为 `completed` 的新属性：\n\n\
    ```\n//  SWAppDelegate.h\n//  Insert this after the @interface line\n@property\
    \ (assign) NSInteger completed;\n```\n\n接下来，切换到 *SWAppDelegate.m*。在 `doWork:`\
    \ 方法顶部附近添加以下代码，以便在用户点击 Start 按钮时立即重置此计数器：\n\n```\nself.completed = 0;\n```\n\n\
    现在，每个工作方法在完成后都需要递增这个变量。我们可以将以下代码行添加到每个工作方法中：\n\n```\nself.completed = self.completed\
    \ + 1;\n```\n\n然而，这正是那些棘手的多线程问题出现的地方。在这行代码中，实际发生的是：它首先通过调用 `[self completed]`\
    \ 获取 `completed` 属性的当前值，然后加 1，再通过调用 `[self setCompleted:]` 将结果存储回 completed 属性。在多线程环境中，这可能导致不正确的行为。例如，假设两个线程大约同时执行这样一行代码会怎样？假设\
    \ `completed` 的初始值为 2。如果两个线程都在它们写入自己的结果之前读取了当前值，那么每个线程都会将自己的值副本加 1，然后每个线程都会将本地的和（3）写回\
    \ completed 属性，结果该属性包含的是值 3，而不是正确的值 4。\n\n解决这个问题的方法之一是使用 Objective-C 的 `@synchronized`\
    \ 关键字，它允许我们指定一段代码一次只能由一个线程运行。在应用委托的 `@implementation` 部分的某处输入以下方法：\n\n```\n- (void)incrementCompleted\
    \ {\n  @synchronized(self) {\n    self.completed = self.completed + 1;\n  }\n\
    }\n```\n\n我们在这里所做的是将之前考虑的相同代码包裹在一个安全区域内。`@synchronized` 关键字将其唯一参数作为一个对象，用于确定同步限制的范围。基本上，任何使用相同值的调用都会尝试获取相同的锁。如果其他线程已经占用了该锁，当前线程必须等待，直到其他线程完成。在这种情况下，由于我们使用了\
    \ `self`，对同一实例上的此方法的任何调用都会尝试获取相同的锁。我们只有一个应用委托实例，所以这实际上是一个全局锁，但就我们的目的而言，这没问题。\n\
    \n要使此功能生效，需要做的编码工作就是将以下代码行添加到每个工作方法中，位于每个方法中的 `return` 之前：\n\n```\n[self incrementCompleted];\n\
    ```\n\n最后，我们需要配置 GUI。回到 *MainMenu.*\n"
- fmt: "在 Interface Builder 中打开`xib`文件，并在*Library*中搜索进度指示器。除了我们已经使用的圆形进度指示器外，还有一个标记为*Indeterminate\
    \ Progress Indicator*的水平进度指示器。将其拖到窗口中，并按[图 17-3](#9781430245421_Ch17.xhtml#Fig3)所示进行布局。\n\
    \n![9781430245421_Fig17-03.jpg](images/9781430245421_Fig17-03.jpg)\n\n[图 17-3](#9781430245421_Ch17.xhtml#_Fig3)\
    \ .  The final GUI touch-up\n\n现在打开*Attributes Inspector*。点击关闭*Display When Stopped*和*Indeterminate*复选框，然后将*Minimum*和*Current*值设为\
    \ 0，将*Maximum*值设为 4。接下来切换到*Bindings Inspector*，我们将配置两个绑定。首先，将其*Animate*属性绑定到 App\
    \ delegate 的`isWorking`键，就像我们对圆形进度指示器所做的那样。然后，将其*Value*属性绑定到 App delegate 的`completed`键。\n\
    \n保存工作，**Run**，然后点击*Start*按钮。在圆形进度指示器旁边，会同时出现一个水平进度指示器，随着每个工作方法的完成，会有一个进度条移动。\n\
    \n就是这样：相对无痛的并发。诚然，这个人为构造的示例与大型应用程序相比不算什么，但这些概念可以扩展以处理更复杂的情况。我们展示的内容在当今的 OS X 和\
    \ iOS 应用程序中运行良好，但苹果并没有止步于此。从 Snow Leopard 开始，`NSOperation`和`NSOperationQueue`的大部分设计已在操作系统底层重新实现，形成了一项名为\
    \ Grand Central Dispatch 的出色技术。\n\n## GCD：底层队列\n\n将工作单元放入可以在后台执行的队列中，由系统为我们管理线程，这种想法非常强大，并且极大地简化了许多需要并发的开发场景。似乎一旦这项技术以`NSOperationQueue`的形式在\
    \ Leopard 中启动并运行，苹果就决定构建一个更通用的解决方案，使其不仅可以从 Objective-C 使用，还可以从 C 和 C++ 使用。从 Snow\
    \ Leopard 开始，这个名为 Grand Central Dispatch（以下简称 GCD）的解决方案已准备就绪。GCD 将`NSOperationQueue`的大多数核心概念——工作单元、无痛后台处理、自动线程管理——放入一个可以从所有基于\
    \ C 的语言中使用的 C 接口。这意味着它不仅仅适用于 Cocoa 程序员。现在，即使是使用 C 编写的低级命令行实用程序也可以利用这些特性。`NSOperationQueue`本身在\
    \ Snow Leopard 中使用 GCD 重写，更棒的是，苹果已经使其 GCD 的实现开源，以便它也可以移植到其他类 Unix 操作系统上。\n\n`NSOperationQueue`与\
    \ GCD 中队列的设计之间的主要区别在于，`NSOperationQueue`可以处理其`NSOperation`之间任意复杂的依赖关系以确定执行顺序，而\
    \ GCD 队列是严格的 FIFO（先进先出）。添加到 GCD 队列的工作单元将始终按照它们放入队列的顺序启动。话虽如此，但它们可能不会总是以相同的顺序完成，因为\
    \ GCD 队列会自动将其工作分配到多个线程中。\n\n使用 GCD，每个队列都可以访问一个在应用程序生命周期内可重用的线程池。GCD 将始终尝试维护一个适合机器架构的线程池，当有工作要做时，通过利用更多的处理器核心自动利用更强大的机器。\n\
    \n## 第二次改进 SlowWorker\n\n为了了解其工作原理，让我们来看看 SlowWorker 的`doWork:`方法的原始形式。要查看它，请打开我们之前制作的原始\
    \ SlowWorker 项目目录的副本，并用于我们将要展示的其余更改。\n\n这是原始方法：\n\n```objective-c\n- (IBAction)doWork:(id)sender\
    \ {\n    NSDate *startTime = [NSDate date];\n    \n    NSString *fetchedData;\n\
    \    NSString *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\
    \    \n    self.isWorking = YES;\n    \n    fetchedData = [self fetchSomethingFromServer];\n\
    \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                               @\"Fetched: %@\\n\", fetchedData];\n    \n   \
    \ processed = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                               @\"Processed: %@\\\
    n\", processed];\n    \n    firstResult = [self calculateFirstResult:processed];\n\
    \    secondResult = [self calculateSecondResult:processed];\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \         @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n             \
    \                  firstResult, secondResult];\n    \n    NSDate *endTime = [NSDate\
    \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
    \    self.isWorking = NO;\n}\n```\n\n我们可以通过将所有代码包装在一个块中并将其传递给一个名为`dispatch_async`的\
    \ GCD 函数，来使这个方法完全在后台运行。该函数接受两个参数：一个 GCD 调度队列（概念上类似于`NSOperationQueue`）和一个要分配给该队列的块。与另一种方法一样，我们也会为我们的局部变量添加`__block`存储限定符。请看：\n\
    \n```objective-c\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate\
    \ date];\n    \n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
    \    __block NSString *firstResult;\n    __block NSString *secondResult;\n   \
    \ \n    self.isWorking = YES;\n    \n    dispatch_async(dispatch_get_global_queue(0,\
    \ 0), ^{\n        fetchedData = [self fetchSomethingFromServer];\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"Fetched: %@\\n\", fetchedData];\n        \n        processed\
    \ = [self processData:fetchedData];\n        _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                                   @\"Processed: %@\\\
    n\", processed];\n        \n        firstResult = [self calculateFirstResult:processed];\n\
    \        secondResult = [self calculateSecondResult:processed];\n        _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \             @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n         \
    \                          firstResult, secondResult];\n        \n        NSDate\
    \ *endTime = [NSDate date];\n        NSLog(@\"Completed in %f seconds\",\n   \
    \           [endTime timeIntervalSinceDate:startTime]);\n        self.isWorking\
    \ = NO;\n    });\n}\n```\n\n这种方法首先使用`dispatch_get_global_queue()`函数获取一个始终可用的预存在全局队列（与`NSOperationQueue`不同，使用\
    \ GCD 时总有一个全局队列可用，随时准备将工作分派到后台线程）。该函数接受两个参数：第一个参数允许我们指定优先级，第二个参数当前未使用，应始终为 0。如果我们在第一个参数中指定不同的优先级，例如`DISPATCH_QUEUE_PRIORITY_HIGH`或`DISPATCH_QUEUE_PRIORITY_LOW`（传递\
    \ 0 等同于传递`DISPATCH_QUEUE_PRIORITY_DEFAULT`），我们实际上会获得一个不同的全局队列，系统将对其进行不同的优先级排序。现在，我们继续使用默认的全局队列。\n\
    \n然后将该队列与后面的代码块一起传递给`dispatch_async()`函数。GCD 随后将整个块传递到后台线程，在那里它将一步接一步地执行，就像它在主线程中运行时一样。\n\
    \n## 不要忘记那个主线程\n\n这里有一个问题：AppKit 的线程安全性。"
  raw: 'xib* file in Interface Builder, and search the *Library* for a progress indicator.
    In addition to the circular one we’ve already used, there’s a horizontal one labeled
    *Indeterminate Progress Indicator*. Drag that to the window, and lay it out as
    shown in [Figure 17-3](#9781430245421_Ch17.xhtml#Fig3).    ![9781430245421_Fig17-03.jpg](images/9781430245421_Fig17-03.jpg)    [Figure
    17-3](#9781430245421_Ch17.xhtml#_Fig3) .  The final GUI touch-up    Now bring
    up the *Attributes Inspector*. Click to turn off both the *Display When Stopped*
    and *Indeterminate* checkboxes, then set its *Minimum* and *Current* values to
    0 and its *Maximum* value to 4\. Now switch to the *Bindings Inspector* where
    we’ll configure two bindings. First, bind its *Animate* attribute to the app delegate’s
    `isWorking` key, just like we did for the circular progress indicator. Then, bind
    its *Value* attribute to the app delegate’s `completed` key.    Save the work,
    **Run**, and click the *Start* button. Beside the circular progress indicator,
    a horizontal progress indicator also appears, with a bar moving across as each
    of the work methods completes.    And there it is: relatively painless concurrency.
    Granted, this contrived example isn’t much compared to a large application, but
    these concepts can scale up to handle more complex situations as well. What we’ve
    shown works well in today’s OS X and iOS applications, but Apple didn’t stop there.
    Starting with Snow Leopard, most of the design of `NSOperation` and `NSOperationQueue`
    has been reimplemented at a lower level in the OS, resulting in a nice piece of
    technology called Grand Central Dispatch.    GCD: Low-Level Queuing    This idea
    of putting units of work into queues that can be executed in the background, with
    the system managing the threads for us, is really powerful and greatly simplifies
    many development situations where concurrency is needed. It seems that once this
    technology was up and running in the form of `NSOperationQueue` in Leopard, Apple
    decided to make a more general solution that could work not only from Objective-C,
    but also C and C++. Starting with Snow Leopard, this solution, called Grand Central
    Dispatch (which we’ll call GCD from now on), is ready for use. GCD puts most of
    the core concepts of `NSOperationQueue`—units of work, painless background processing,
    automatic thread management—into a C interface that can be used from all of the
    C-based languages. This means that it’s not just for Cocoa programmers. Now even
    low-level command-line utilities written in C can take advantage of these features.
    `NSOperationQueue` itself was rewritten for Snow Leopard using GCD, and to top
    things off, Apple has made its implementation of GCD open source so that it can
    be ported to other Unix-like operating systems as well.    The main difference
    between the design of `NSOperationQueue` and the queues in GCD is that while `NSOperationQueue`
    can deal with arbitrarily complex dependency relationships between its `NSOperation`s
    to determine in what order they should be executed, the GCD queues are strictly
    FIFO (first-in, first-out). Units of work added to a GCD queue will always be
    started in the order they were placed in the queue. That being said, they may
    not always finish in the same order because a GCD queue will automatically distribute
    its work among multiple threads.    With GCD, each queue has access to a pool
    of threads that are reused throughout the lifetime of the application. GCD will
    always try to maintain a pool of threads that is appropriate for the machine’s
    architecture, automatically taking advantage of a more powerful machine by utilizing
    more processor cores when it has work to do.    Improving SlowWorker a Second
    Time    To see how this works, let’s take a look at the original form of SlowWorker’s
    `doWork:` method. To get to it, open up the copy of the original SlowWorker project
    directory we made earlier and use that for the rest of the changes we’re going
    to show.


    Here’s the original method:    ``` - (IBAction)doWork:(id)sender {     NSDate
    *startTime = [NSDate date];            NSString *fetchedData;     NSString *processed;
        NSString *firstResult;     NSString *secondResult;      self.isWorking = YES;
               fetchedData = [self fetchSomethingFromServer];     _resultsTextView.string
    = [_resultsTextView.string stringByAppendingFormat:                               
    @"Fetched: %@\n", fetchedData];            processed = [self processData:fetchedData];
        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:
                                   @"Processed: %@\n", processed];            firstResult
    = [self calculateFirstResult:processed];     secondResult = [self calculateSecondResult:processed];
        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:
                                   @"First Result: [%@]\nSecond Result: [%@]\n\n",
                                   firstResult, secondResult];      NSDate *endTime
    = [NSDate date];     NSLog(@"Completed in %f seconds",           [endTime timeIntervalSinceDate:startTime]);
        self.isWorking = NO; } ```    We can make this method run entirely in the
    background by wrapping all the code in a block and passing it to a GCD function
    called `dispatch_async`. This function takes two parameters: a GCD dispatch queue
    (conceptually similar to an `NSOperationQueue`) and a block to assign to the queue.
    As with the other approach, we’ll give our local variables the `__block` storage
    qualifier as well. Take a look:    ``` - (IBAction)doWork:(id)sender {     NSDate
    *startTime = [NSDate date];            __blockNSString *fetchedData;     __blockNSString
    *processed;     __blockNSString *firstResult;     __blockNSString *secondResult;      self.isWorking
    = YES;      dispatch_async(dispatch_get_global_queue(0, 0), ^{         fetchedData
    = [self fetchSomethingFromServer];         _resultsTextView.string = [_resultsTextView.string
    stringByAppendingFormat:                                    @"Fetched: %@\n",
    fetchedData];                    processed = [self processData:fetchedData];         _resultsTextView.string
    = [_resultsTextView.string stringByAppendingFormat:                                   
    @"Processed: %@\n", processed];                    firstResult = [self calculateFirstResult:processed];
            secondResult = [self calculateSecondResult:processed];         _resultsTextView.string
    = [_resultsTextView.string stringByAppendingFormat:                                   
    @"First Result: [%@]\nSecond Result: [%@]\n\n",                                   
    firstResult, secondResult];                    NSDate *endTime = [NSDate date];
            NSLog(@"Completed in %f seconds",               [endTime timeIntervalSinceDate:startTime]);
            self.isWorking = NO;     }); } ```    This approach starts off by grabbing
    a pre-existing global queue that’s always available, using the `dispatch_get_global_queue()`
    function (unlike `NSOperationQueue`, with GCD there’s always a global queue available,
    ready to dispatch work to the background threads). That function takes two arguments:
    the first lets us specify a priority, and the second is currently unused and should
    always be 0\. If we specify a different priority in the first argument, such as
    `DISPATCH_QUEUE_PRIORITY_HIGH` or `DISPATCH_QUEUE_PRIORITY_LOW` (passing a 0 is
    the same as passing `DISPATCH_QUEUE_PRIORITY_DEFAULT`), we will actually get a
    different global queue, which the system will prioritize differently. For now,
    we’ll stick with the default global queue.    The queue is then passed to the
    `dispatch_async()` function, along with the block of code that comes after. GCD
    then takes that entire block and passes it off to a background thread, where it
    will be executed one step at a time, just like it when it was running in the main
    thread.    Don’t Forget That Main Thread    There’s one problem here: AppKit thread
    safety.'
