  trans: '

    # 第 8 章 Core Data 基础


    在之前的章节中，我们展示了 Cocoa 在视图对象中显示数据的多种方式：从根据模型对象内容手动获取和设置值，到使用 Cocoa 绑定自动同步模型与视图对象之间的数据（从而省去大量枯燥的控制器代码）。现在，是时候学习
    Core Data 了——这个强大的框架为我们的模型对象提供了一整套内置功能。


    我们将首先探讨 Core Data 是什么，以及它如何与 Cocoa 的其他部分协同工作。接着，我们将使用 Core Data 创建一个名为 MythBase
    的全功能数据库应用程序，其中包含一个允许我们创建、搜索、编辑和删除条目的图形用户界面（GUI），全程无需编写一行代码（运行中的 MythBase 截图见图
    8-1）。然后，我们将探索创建 Core Data 项目时自动生成的代码资源，最后演示如何为模型对象添加功能（"业务逻辑"）。


    ## 我们一直缺失的能力


    前几章的所有示例中，我们都使用了`NSMutableDictionary`的实例来替代真正的模型对象。什么是"真正的模型对象"？除了能够保存数据（这正是`NSMutableDictionary`擅长的工作——通过字段名或键访问数据）之外，真正的模型对象还应包含以下特性：


    - **归档**：模型对象应具备内置的保存到磁盘及后续重新加载的机制。

    - **业务逻辑**：应能为模型对象提供响应输入值的自定义行为。

    - **验证**：每个模型对象应能自动验证输入值。


    ![9781430245421_Fig08-01.jpg](img/9781430245421_Fig08-01.jpg)


    图 8-1. MythBase 应用程序的全貌


    过去，遵循 MVC 原则的 Mac 应用程序开发者通常需要为这些常见需求自行设计解决方案。但 Core Data 不仅提供了上述所有功能，还额外提供了以下关键特性：


    - **撤销/重做支持**：Core Data 处理值的机制已与 Mac OS X 的标准撤销功能集成。这一内建特性免去了我们自行实现该通用功能的大量额外工作。

    - **与 Cocoa 绑定集成**：结合 Cocoa 绑定，Core Data 提供了一种通过通用控制器对象连接视图与模型的机制，从而消除了大量乏味的粘合代码。

    - **持久化**：Core Data 提供了多种将对象持久化到磁盘的方式，允许我们在程序运行之间保存和加载对象状态。


    总而言之，这些特性为应用程序核心提供了坚实的基础架构。我们可以使用 Core Data 构建图形界面应用（无论是否使用 Cocoa 绑定）、命令行工具、游戏，或任何其他能通过传统对象建模技术定义的软件系统。换句话说，几乎适用于所有类型的应用程序。


    ## 创建 MythBase


    现在，让我们开始创建 MythBase——一个用于维护神话人物数据库的 GUI 应用程序。我们将使用 Core Data 作为模型层，并借助 Cocoa 绑定处理大部分控制器功能。过程中会遇到一些新概念和术语，我们会在涉及每个部分时逐一解释。


    在第一轮迭代中，我们将使用 Xcode 内的专用工具定义应用程序的模型，并通过 Xcode 的助手创建一个简单的 GUI。在第二轮迭代中，我们将优化 GUI
    以改善用户体验。随后，在解释应用程序的其他方面之后，我们将进行第三轮功能迭代，为应用程序的模型层添加业务逻辑。


    首先，创建一个新的应用程序项目。在 Xcode 中，选择 File ![image](img/arrow.jpg) New Project，在窗口左侧选择
    OS X/Application，从项目模板列表中选取**Cocoa Application**，然后点击 Next。将产品名称设为 MythBase，类前缀设为
    MB，勾选**Use Core Data**和**Use Automatic Reference Counting**复选框（见图 8-2），然后点击 Next。导航到合适的目录保存项目，点击
    Create。


    ![9781430245421_Fig08-02.jpg](img/9781430245421_Fig08-02.jpg)


    图 8-2. 创建新应用程序项目，并启用 Core Data 选项


    ## 定义模型


    此时，我们拥有一个全新的项目，与之前创建的项目类似。选择使用 Core Data 会使 Xcode 采用略有不同的项目模板，因此这个项目会包含一些旧项目中未曾见过的内容。Xcode
    的导航面板中新增了一个名为`MythBase.xcdatamodeld`的文件，这就是空的 Core Data 模型文件。模型文件包含应用程序模型层的元数据。我们使用
    Xcode 内置的图形工具创建模型文件，应用程序在运行时读取该文件。另外，若我们在项目导航区中搜索，会发现`CoreData.framework`已被添加至
    Frameworks/Other Frameworks 下。


    ### 建模：是什么？


    接下来，我们假设您对对象建模或数据库建模有一定了解。但如果您对此完全困惑，这里提供一个非常简短的总结。其核心思想是：应用程序所处理的"内容"——即应用程序"关乎"的数据——可以通过建模技术拆分为独立的块，并组织成合理的结构。使用
    Core Data 时，您需要按以下思路组织数据：


    - **实体（Entity）**：实体用于描述应用程序中可唯一标识的"事物"，即能够独立存在、描述和识别的事物。实体通常是系统中的主要"名词"。例如：人、公司、货币交易都是实体。而眼睛颜色、市值、交易金额则不是实体。

    - **属性（Attribute）**：任何看似实体描述性特征、且不涉及其他事物的内容，很可能就是该实体的属性。眼睛颜色、市值、交易金额很可能分别是上述人、公司、货币交易的属性。而一个人的当前账户余额、公司
    CEO 的电话号码、收款人的电子邮件地址**不是**我们所述实体的属性。这些内容更适合通过遍历指向其他实体的**关系**来访问其属性。

    - **关系（Relationship）**：使用关系建立实体之间的关联。关系可以是一对多（一个人可以是多笔交易的收款人）、多对一（多人可受雇于同一家公司）、一对一（每人只能有一个配偶），或多对多（一家公司可以有多个客户，同时一个人也可以是多家公司的客户）。


    模型文件包含的信息对于任何从事过对象建模、数据库建模或实体关系建模的人来说都不陌生。首先，**实体**的概念大致对应于对象建模中的类或数据库建模中的表。每个实体由多个**属性**组成，实体之间可以通过**关系**相互连接。

    '
- fmt: '# 排版后的文本


    Within Xcode and the documentation, attributes and relationships are referred
    to collectively as properties, and this reuse of the same term in Objective-C
    2.0 is no coincidence. Within a model object, each attribute and each relationship
    can be accessed through an Objective-C property, named the same as the property
    defined in the model file. In the model we’re going to build for MythBase, we’ll
    create a single entity with several attributes. We’ll cover relationships in [Chapter
    9](#9781430245421_Ch09.xhtml).


    ## Using Xcode’s Model Editor


    Start by single-clicking the `MythBase.xcdatamodeld` file in Xcode’s navigation
    pane. This opens up the model file in Xcode’s built-in model editor, which lists
    three table views: *Attributes*, *Relationships*, and *Fetched Properties*, along
    with an outline view of *Entities*, *Fetch Requests*, and *Configurations* along
    the left. Press ![image](images/arrow2.jpg)3 to open the *Data Model Inspector*
    as well; since we haven’t yet defined any structure for our entity, it will initially
    show “No Selection,” as shown in [Figure 8-3](#9781430245421_Ch08.xhtml#Fig3).
    The model editor has two different view styles: the initial view with three table
    views, and one that resembles a blank sheet of graph paper. We’ll be working with
    the default table-view style as seen in [Figure 8-3](#9781430245421_Ch08.xhtml#Fig3)
    since we’ll only have one model class. When working with a complex model, the
    graph-paper view can be very useful for giving an overview of all the different
    entities and their interrelationships.


    ![9781430245421_Fig08-03.jpg](images/9781430245421_Fig08-03.jpg)


    [Figure 8-3](#9781430245421_Ch08.xhtml#_Fig3). A new model file, before creating
    any entities


    ## Creating an Entity


    For MythBase, we’re going to create a single entity called `MythicalPerson` with
    a handful of attributes. To start, create a new entity by clicking the Add Entity
    button that appears near the bottom of the window. As you would expect, this creates
    a new entity, called simply Entity, in the Entities list on the left. With the
    new entity selected, its details are visible in the table views to the right.
    Go change the new entity’s name to “MythicalPerson,” and leave the rest of the
    controls in their default states. Our entity is an instance of a class named `NSManagedObject`,
    a generic class included in Core Data that provides all the basic functionality
    for Core Data’s model objects. Later we’ll need to write some code for this entity,
    at which point we’ll create a custom subclass of `NSManagedObject`, but for now
    the generic class will do just fine.


    Now let’s create our entity. We’ve done some object modeling and have come up
    with a few characteristics that a mythical person may have.


    The `MythicalPerson` entity will have six attributes. These are shown in [Table
    8-1](#9781430245421_Ch08.xhtml#Tab1), which includes a general description of
    the type of each attribute and the corresponding Core Data storage type.


    [Table 8-1](#9781430245421_Ch08.xhtml#_Tab1). MythicalPerson Attributes


    | Attribute Name | General Type | Core Data Type |

    | --- | --- | --- |

    | Name | String | String |

    | Details | String | String |

    | Divinity | Integer (0-100) | Integer 16 |

    | Goodness | Integer (0-100) | Integer 16 |

    | Power | Integer (0-100) | Integer 16 |

    | Depiction | Image | Transformable |


    Core Data includes `String` and `Date` types, as well as a selection of numeric
    types: `Integer 16`, `Integer 32`, `Integer 64`, `Float`, `Double`, `Decimal`,
    and `Bool`. In addition, it includes a `Binary` type that allows generic storage
    of any sort of data we may want to attach to an entity (which we pack into a binary
    chunk on our own), and a special `Transformable` type that allows many otherwise
    unsupported Cocoa classes, such as `NSImage`, to be stored with Core Data (more
    on that later). Note that the Core Data storage types have different names from
    the value classes in Cocoa (`NSString`, `NSNumber`, and the like).


    When Core Data attributes are read into a running application, they are converted
    into the nearest Cocoa equivalent, which means, for example, that all the numeric
    types end up as `NSNumber` in an application and are converted back into the underlying
    storage format for saving.


    ## Creating Attributes


    Let’s start creating `MythicalPerson`’s attributes. With the `MythBase.xcdatamodeld`
    file open in Xcode, click to select the `MythicalPerson` entity, then click the
    small + sign in the lower-left-hand-corner of the Attributes table view at the
    top of the window. A new attribute will appear in the table view. Set its name
    to “name” and its type to String, then press Enter.


    Now look at the checkboxes in the inspector on the right, labeled *Optional*,
    *Transient*, and *Indexed*. By default, *Optional* is checked and the others are
    not. The meaning of *Optional* is clear enough. Having it checked means that users
    can choose to not enter a value for that attribute when creating or editing an
    object. As for the others, checking *Transient* configures things so that this
    attribute isn’t saved along with the other data (although Core Data will still
    track changes to the attribute to provide undo/redo support), while checking *Indexed*
    turns on indexing for the attribute, enabling speedy search of a Core Data storage
    back-end based on this attribute. For the `name` attribute, make sure that *Indexed*
    is checked and that the others are not.


    Below the checkboxes, you can specify the attribute’s type using a pop-up list
    (this is the same setting as the pop-up in the table view). If we specify “name”
    as a String in the main table view, then we’ll see some additional options appear
    in the space just below it. Here we can specify simple validation rules such as
    the string’s length. We can also specify the default value, which will appear
    whenever a new `MythicalPerson` instance is created. Enter “Name” for the default
    value, leaving the other fields blank.


    Now let’s move on to the `details` attribute, which is meant to hold a textual
    description of the `MythicalPerson` in question. Click the + button below the
    *Attributes* table view to add a new attribute and change the new attribute’s
    name to “details.” We’re going to configure this one a little differently than
    the name attribute. It should be a String (chosen from the pop-up list), and the
    *Indexed* checkbox should be checked, but in this case the *Optional* checkbox
    should also be checked so that users can choose to leave this field empty if they
    want. Also, we’ll leave the default value blank.


    Now we’ll tackle `MythicalPerson`’s numeric attributes: `divinity`, `goodness`,
    and `power`. Make a new attribute and name it “divinity,” and set its type to
    `Integer 16`, the smallest integer type supported by Core Data. This time configure
    the checkboxes so that it’s optional, but neither transient nor indexed (because
    we don’t anticipate any real need to search for MythicalPersons using the divinity
    value as a search parameter). The display will change to show some additional
    configuration that applies to the chosen type. Here we can set up some automatic
    validation rules by specifying min and max values, and also specifying the default
    value for this attribute.


    In [Table 8-1](#9781430245421_Ch08.xhtml#Tab1), we defined divinity as an integer
    value from 0 to 100, the idea being to place the character somewhere on a scale
    between human and godlike. For example, the Greek god Zeus would have a divinity
    value of 100, his son Heracles (whose mother Alcmene was a normal human) would
    have 50, and a normal human (like, again, Heracles’ mother) would have 0 divinity.
    By specifying min and max values for the attribute, we let Core Data help us out,
    ensuring that no invalid values for these attributes can be saved. Enter 0 for
    the min value, 100 for the max value, and 50 for the default value. See [Figure
    8-4](#9781430245421_Ch08.'
