    # 开始前须知


    本书假定您已具备一些基本的编程知识。您应熟练运用循环、变量、指针和链表等概念。同时，本书也假定您理解面向对象编程的基础知识，并熟悉 Objective-C
    编程语言。从 Mac OS X Leopard 10.5 开始，该语言推出了一个名为 Objective-C 2.0 的新版本。如果您不熟悉 Objective-C
    语言的最新特性，也不必担心。我们会着重突出所使用到的 2.0 语言特性，并解释其工作原理及使用原因。


    ## 初次接触 Objective-C？


    以下资源可帮助您快速入门。


    - 编程新手？请查阅我们好友 Dave Mark 编写的 *Learn C on the Mac，第 4 版*（`www.apress.com/9781430218098`）。

    - Objective-C 新手？请查阅由 Mac 编程专家 Scott Knaster、Waqar Malik 和 Mark Dalrymple 编写的
    *Learn Objective-C on the Mac，第 2 版*，这是一本出色且易于入门的 Objective-C 书籍（`www.apress.com/9781430241881`）。

    - 接下来，前往 Apple 的 Mac 开发者库，下载一份 *Programming with Objective-C*，这是一份对该语言非常详细且全面的描述，也是一本绝佳的参考指南（`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ProgrammingWithObjectiveC`）。


    ## 准备好了吗？


    Mac 是一个卓越的计算平台，而 Cocoa 是构建 Mac 应用的最佳工具。如果您是从其他平台转投 Mac，可能会觉得使用 Cocoa 和 Objective-C
    有些令人困惑。即使一开始您可能难以找准方向，但随着您阅读本书的深入，我们相信您很快就会开始理解“Cocoa 之道”。只要稍加坚持，一切都会变得有意义。


    请您记住，本书中的练习并非一个简单的清单，完成它们并不能让您立即成为 Cocoa 开发大师。在每一步中，请确保您在进入下一个项目之前理解刚刚完成的操作。不要害怕修改代码。大胆实验并观察结果。这是在
    Cocoa 这样的环境中理解编码复杂性的最佳方法之一。


    另外，请记住，我们为读者设立了一个讨论本书练习和内容的留言论坛。因此，如果您遇到困难，或者想与我们及其他 Cocoa 开发者讨论任何 Cocoa 编程主题，请前往
    `http://learncocoa.org` 注册论坛。


    话虽如此，如果您已经安装了 Xcode，请翻到下一页。如果没有，那就去安装吧！然后我们开始！


    ## 第 2 章：Hello, World


    您可能很清楚，将任何编程书籍的第一个项目命名为“Hello, World”已成为一种传统。遵循“如果没坏，就别修”的准则，我们将延续这一传统。


    ### 构建“Hello, World”


    现在，您应该已经在机器上安装了 Xcode。您还应该已将 `Learn Cocoa Projects` 文件夹安全地存放在硬盘的某个位置。如果由于某些原因您没有这么做，请直接返回第
    1 章（不要经过起点，不要领取 200 美元）并重新阅读相关章节。


    我们将要处理的第一个项目位于 `Chapter02/Chapter2` 文件夹中。启动位于 `Applications` 文件夹中的 Xcode。以防您从未使用过
    Xcode，我们将引导您完成创建新项目的流程。


    首先，从“文件”菜单中选择“新建项目”，或者键入 `N`。当“新建项目助理”弹出时（图 2-1），在左列“Mac OS X”标题下选择 *Application*，然后在右上方面板中选择
    *Cocoa Application* 图标，并点击“下一步”。


    ![9781430245421_Fig02-01.jpg](img/9781430245421_Fig02-01.jpg)


    图 2-1。从 Xcode 的“新建项目助理”中选择 Cocoa Application 项目模板


    一个 *Project Options* 窗口提供了多个选项（图 2-2）。我们需要为应用程序指定一个名称。“Chapter2”是个不错的选择。我们还需要提供一个公司标识符，其格式类似于反向域名（很像
    Java 包名或 C# 命名空间）。如果我们使用 `megacorp.com` 域名，那么这里可以填写 `com.megacorp`。Mac OS X 会使用产品名称和公司标识符的组合，作为我们程序在整个系统以及
    Mac App Store 中的唯一名称。不过，由于我们不会将本应用分发到自己的电脑之外，所以我们可以任意选择。这里最后一个重要的字段是类前缀。我们会看到，许多
    Cocoa 类都以 `NS` 或 `CF` 作为前缀。在这些类中，Xcode 会为我们生成一些文件，作为创建新项目的一部分，它将使用我们在此处提供的前缀。现在，请输入“Book”。本章中我们不会用到其他字段，因此可以保留默认值。点击“下一步”。


    ![9781430245421_Fig02-02.jpg](img/9781430245421_Fig02-02.jpg)


    图 2-2。从 Xcode 的“新建项目助理”中为新 Cocoa 应用指定选项


    接下来，会弹出标准的“保存”窗口，用于设置项目的位置（图 2-3）。Xcode 会在我们选择的位置创建一个以项目名称命名的新文件夹：可以是我们的“文档”文件夹，也可以是我们自己创建的一个用于存放
    Xcode 项目的新独立文件夹。Xcode 项目保存在哪里其实并不重要，但如果我们始终将所有项目保存在一个地方，以后会更容易找到它们。我们还可以选择让 Xcode
    使用 Git（一个强大的开源分布式版本控制系统）为项目配置版本控制。现在，我们也可以保留默认设置。


    ![9781430245421_Fig02-03.jpg](img/9781430245421_Fig02-03.jpg)


    图 2-3。为项目命名并选择保存位置


    一旦我们选择了位置，一个新项目窗口就会出现（如图 2-4 所示）。虽然您可能已经熟悉了 Xcode，但请花点时间看看这个项目窗口。这是我们即将长时间面对的环境，所以确保我们达成共识。与许多为
    Mac OS X 10.7 Lion 及更新版本构建的应用程序一样，Xcode 包含一个全屏选项。由于 Xcode 是一个复杂的应用程序，因此它需要较大的屏幕空间才能达到最佳效果。我们应该立即点击窗口右上角的箭头使其全屏显示。


    ![9781430245421_Fig02-04.jpg](img/9781430245421_Fig02-04.jpg)


    图 2-4。我们在 Xcode 中的项目主窗口


    我们的项目窗口顶部有一个工具栏，让我们可以快速访问一组常用命令。在工具栏下方，窗口被划分为三个主要部分，即窗格。


    沿着窗口左侧向下延伸的窗格称为 *Navigator*（导航器）区域。构成我们项目的所有资源以及许多相关的项目设置都分组在此处。点击项目左侧的小三角可以展开该项目，显示其所有可用的子项。再次点击已展开项目左侧的小三角则会隐藏其子项。


    右侧窗格称为 *Utility*（实用工具）区域，它显示在 *Navigator* 区域中选中项目的详细信息。

    '
- fmt: '对于源代码文件，此区域会显示标识和类型信息、文件在文件系统中的完整路径、本地化信息、使用所选文件的构建目标、编码信息以及版本控制信息。其他类型的文件会显示与其类型相符的信息。根据在`Navigator`窗格中选择的文件类型，此区域顶部可能会有一行小图标，允许我们选择要在此处显示的几种不同信息视图。信息窗格下方是`Library`库。稍后我们将在此处进行更多探索。中央窗格称为`Editor`编辑器窗格。如果我们在`Navigator`窗格中选择了一个文件，并且`Xcode`知道如何显示或编辑该类型的文件，则该文件的内容将显示在`Editor`窗格中。我们将在此处编写和编辑应用程序的所有源代码。


    **注意** 许多开发人员喜欢在使用编辑器时隐藏`Utility`工具区域，以便将更多屏幕空间用于代码编辑；我们可以通过按下![图片](images/arrow2.jpg)0
    来切换`Utility`工具区域的显示。


    现在，让我们看看`Xcode`窗口左侧的`Project Navigator`项目导航器区域。其中有几个文件夹和三个自动为我们创建的文件。我们暂时忽略这些文件夹和前两个文件（稍后会重新介绍它们）。第三个文件名为`MainMenu.xib`。


    点击`MainMenu.xib`。`Editor`编辑器窗格将切换到`Interface Builder`界面生成器模式，这是专门为编辑`.xib`文件而设计的编辑器（[图
    2-5](#9781430245421_Ch02.xhtml#Fig5)）。在`Xcode 4`之前，`Interface Builder`是一个独立的应用程序，但现在它已集成到`Xcode`中，这为将用户界面连接到底层代码带来了很多好处。`MainMenu.xib`文件被称为“`nib`文件”。嗯？一个`nib`文件？为什么不是`xib`文件？首先，“`xib`”很难发音。但更重要的是，“`nib`”这个术语是早期更简单时代的遗留物。`Cocoa`和现代`Xcode`开发工具的前身是由`NeXT`公司开发的，这是一家由`Steve
    Jobs`在1985年创立的公司。“`nib`”这个名字最初代表`NeXT Interface Builder`。随着时间的推移，`NeXT`被`Apple`收购，`nib`格式演变为一种更新的、基于`XML`的格式。这种`XML`和`Interface
    Builder`的结合产生了新的`.xib`扩展名。尽管如此，“`nib`文件”这个名字还是保留了下来，大多数开发人员仍然称他们的`xib`文件为“`nib`文件”。


    **警告** 你会在`Xcode`中创建的每个`Cocoa`项目中找到`MainMenu.xib`文件。这是一个特殊文件。请如此对待它。除非我们告诉你，否则不要移动、重命名或以其他方式骚扰该文件。当你的应用程序启动时，它会自动将`MainMenu.xib`的内容加载到内存中。`MainMenu.xib`包含关键信息，包括应用程序的菜单栏和主窗口（如果有的话）。随着时间的推移，你将了解关于`nib`文件的所有信息，并能自己创建它们。目前，请保持耐心——并且不要动手。


    ### 探索 Nib 文件


    `Interface Builder`模式提供了强大的功能，所以让我们花点时间看看事情的布局。`Interface Builder`的`Editor`编辑区域看起来像一张方格纸，我们的应用程序的菜单栏横跨其顶部（[图
    2-5](#9781430245421_Ch02.xhtml#Fig5)）。沿着左侧，方格纸的边缘外侧，有一系列图标停靠在边栏中。这些是构成我们`Cocoa`应用程序用户界面的对象。靠近底部是一个“播放”按钮，可以将停靠栏展开为大纲模式，以便我们获取有关这些对象的更多信息。


    ![9781430245421_Fig02-05.jpg](images/9781430245421_Fig02-05.jpg)


    [图 2-5](#9781430245421_Ch02.xhtml#_Fig5). 准备编辑的`MainMenu.xib`


    请注意，沿着`Xcode`窗口右侧`Utility`工具区域顶部的一行图标已从两个扩展到八个；这些对象比文件更具可配置性。


    这些图标中的每一个都代表`Inspector`检查器的一种不同模式。我们稍后将详细介绍此处显示的不同类型的信息。在其下方是`Library`库，有一行四个小图标，可将视图切换到不同类型的项目。将鼠标悬停在每个图标上会显示一个工具提示，描述每种视图显示的项目类型。`Inspector`检查器用于设置构成用户界面的对象的参数，而`Library`库是我们添加新对象以布局界面的地方。


    `Editor`编辑器顶部的菜单栏属于我们的应用程序，在此处的更改将反映在应用程序启动时出现的菜单栏中。我们可以点击菜单标题，它们会展开以显示下面的菜单项；新的`nib`文件免费提供了`Mac`标准的“文件”、“编辑”、“格式”、“视图”、“窗口”和“帮助”菜单，但如有必要，我们可以添加更多并修改默认值。停靠栏中看起来像下拉菜单的图标（从上数第四个）是代表主菜单的对象。在[图
    2-5](#9781430245421_Ch02.xhtml#Fig5)中，它有一个高亮边框，表示它已被选中。


    在停靠栏的主菜单图标下方，是一个看起来像窗口的图标，事实上它就是一个窗口。我们用来创建此项目的`Cocoa Application`项目模板假设我们的应用程序至少有一个窗口，并且它为我们创建了该窗口。我们将使用此窗口来布置程序启动时将显示的窗口内容。选择窗口图标，我们应用程序新的、空的主窗口将出现在方格纸上。


    ### 库（Library）


    右下角的`Library`库窗格充当一个调色板，其中包含可用于构建应用程序界面的对象集合。在`Mountain Lion`中，这里有134种不同的对象类型可供使用。`Library`库最初显示“文件模板”库，但这里有四种可以显示的资源类型：文件模板、代码片段、对象和媒体。我们想要使用的所有用户界面元素都在`Objects`对象视图中。我们滚动浏览库，找到要使用的项目，然后将该项目拖入相应的`Xcode`窗格。选择代表`Object
    Library`对象库视图的图标，或按![图片](images/arrow4.jpg)3。屏幕应看起来像[图 2-6](#9781430245421_Ch02.xhtml#Fig6)。


    ![9781430245421_Fig02-06.jpg](images/9781430245421_Fig02-06.jpg)


    [图 2-6](#9781430245421_Ch02.xhtml#_Fig6). 显示我们新的空窗口和对象库的`MainMenu.xib`


    花一分钟时间滚动浏览库中的不同`UI`对象：按钮、滑块、文本字段、标签、浏览器，甚至还有`OpenGL`视图！


    ### 拖出一个标签


    `Object Library`对象库窗格将显示一个项目列表，这些项目可以拖到我们的应用程序窗口中以构建应用程序的界面。我们现在拖一个过去。我们将使用一个名为`Label`标签的对象，它用于显示静态文本——用户无法编辑的文本。将一个标签拖到窗口上。


    在`Object Library`对象库视图中，向下滚动大约十二个项目，找到一个名为`Label`的标签。直接点击库中的`Label`并将其拖到应用程序的主窗口（标记为`Chapter2`的窗口）上。这样做会将一个新标签添加到我们的应用程序窗口中（[图
    2-7](#9781430245421_Ch02.xhtml#Fig7)）。


    ![9781430245421_Fig02-07.jpg](images/9781430245421_Fig02-07.jpg)


    [图 2-7](#9781430245421_Ch02.xhtml#_Fig7). 将一个标签拖到窗口上


    **提示** 与其像我们刚才那样向下滚动列表，我们只需在`Library`库窗格底部的搜索字段中输入单词“`label`”。这将过滤列表，只显示库中名称或描述中包含单词“`label`”的对象。


    现在我们已经有了一个标签，让我们更改它。双击该标签。'
  raw: 'For a source code file, for example, this area shows identity and type information,
    the full path to the file in the file system, localization information, plus the
    build targets that use the selected file, encoding information, and version control
    info. Other files show information appropriate to the file type. Depending on
    the type of file selected in the *Navigator* pane, there may be a row of small
    icons atop this area that allow us to select several different views of information
    to be shown here. Below the information pane is the *Library*. We’ll be exploring
    more here in a moment.    The center pane is called the *Editor* pane. If we select
    a file in the *Navigator* pane, and Xcode knows how to display or edit that kind
    of file, the contents of the file will be displayed in the *Editor* pane. This
    is where we will be writing and editing all of the application’s source code.    **Note**  Many
    developers like to get rid of the Utility area when they are working in the Editor
    in order to have more screen space devoted to editing code; we can toggle the
    Utility area by pressing ![image](images/arrow2.jpg)0.    Let’s now look at the
    *Project Navigator* area on the left side of the Xcode window. There are a number
    of folders and three files that were created automatically for us. We’ll ignore
    the folders and the first two files for the moment (we’ll revisit them later).
    The third file is named `MainMenu.xib`.    Click `MainMenu.xib`. The *Editor*
    pane will change to Interface Builder mode, the editor specifically designed to
    edit `.xib` files ([Figure 2-5](#9781430245421_Ch02.xhtml#Fig5)). Prior to Xcode
    4, Interface Builder was a separate application, but it’s been merged into Xcode,
    and this brings a lot of benefits in wiring up the user interface to the underlying
    code. The file `MainMenu.xib` is known as a “nib file.” Huh? A nib file? Why not
    a xib file? Well, for starters, “xib” is awfully hard to pronounce. But more importantly,
    the term “nib” is a holdover from an earlier, simpler time. The precursors to
    Cocoa and the modern Xcode development tools were developed by NeXT, Inc., a company
    started by Steve Jobs in 1985\. The name “nib” originally stood for NeXT Interface
    Builder. Over time, NeXT was acquired by Apple, and the nib format evolved into
    a newer, XML-based format. This combination of XML and Interface Builder yielded
    the new `.xib` extension. Nonetheless, the name “nib file” stuck, and most developers
    still call their xib files “nib files.”    **Warning**  You’ll find the file `MainMenu.xib`
    in every Cocoa project you create in Xcode. This is a special file. Treat it as
    such. Do not move, rename, or otherwise annoy the file. Unless we tell you to.
    When your application gets launched, it will automatically load the contents of
    `MainMenu.xib` into memory. `MainMenu.xib` contains critical information, including
    your application’s menu bar and main window (if it has one). Over time, you’ll
    learn all there is to know about nib files and will be rolling your very own.
    For the moment, patience—and hands off.    Exploring the Nib File    Interface
    Builder mode offers a lot of power, so let’s take a moment to see how things are
    laid out. The Interface Builder *Editor* area looks like a piece of graph paper,
    with the menu bar of our application across the top ([Figure 2-5](#9781430245421_Ch02.xhtml#Fig5)).
    Along the left, off the edge of the graph paper are a series of icons in a dock.
    These are the objects that make up our Cocoa application’s user interface. Near
    the bottom is a Play button that expands the dock into an outline mode where we
    can get more info about these objects.    ![9781430245421_Fig02-05.jpg](images/9781430245421_Fig02-05.jpg)    [Figure
    2-5](#9781430245421_Ch02.xhtml#_Fig5). MainMenu.xib ready for editing    Note
    that the row of icons across the top of the *Utility* area, along the right side
    of the Xcode window, has expanded from two to eight; these objects are more configurable
    than files are.


    Each of these icons represents a different mode for the *Inspector*. We’ll have
    more to say about the different types of information on display here shortly.
    Underneath this is the *Library*, with a row of four small icons that shift the
    view to different types of items. Hovering our mouse over each icon will display
    a tooltip describing the kind of items that each view shows. The *Inspector* is
    used to set parameters on the objects that make up our user interface, and the
    Library is where we’ll go to add new objects to lay out the interface.    The
    menu bar across the top of the *Editor* is for our application, and changes here
    will be reflected in the menu bar that appears when our application is launched.
    We can click the menu headings, and they’ll open up to show the menu items underneath;
    we get the Mac-standard File, Edit, Format, View, Window, and Help menus for free
    with the new nib file, but we can add more and modify the defaults if necessary.
    The icon in the dock area that looks like a pull-down menu (the fourth one down)
    is the object that represents the main menu. In [Figure 2-5](#9781430245421_Ch02.xhtml#Fig5),
    it has a highlighted border to indicate that it’s selected.    Below the main
    menu icon in the dock is an icon that looks like a window, which is in fact what
    it is. The Cocoa Application project template we used to create this project assumed
    that we would have at least one window in our application, and it created that
    window for us. We’ll use this window to lay out the contents of the window that
    will be displayed when our program is launched. Select the window icon and our
    application’s new, empty, main window will appear on the graph paper.    The Library    The
    *Library* pane in the lower right-hand corner acts as a palette, a collection
    of objects we can use to build our application’s interface. In Mountain Lion,
    there are 134 different object types to play with here. The *Library* starts off
    showing a File Template Library, but there are four kinds of resources that can
    be shown here: File Templates, Code Snippets, Objects, and Media. All the user-interface
    elements that we’ll want to use are under the *Objects* view. We scroll through
    the library looking for the item we want to use, then drag that item into the
    appropriate Xcode pane. Select the icon that represents the *Object Library* view,
    or press ![image](images/arrow4.jpg)3\. The screen should look like [Figure 2-6](#9781430245421_Ch02.xhtml#Fig6).    ![9781430245421_Fig02-06.jpg](images/9781430245421_Fig02-06.jpg)    [Figure
    2-6](#9781430245421_Ch02.xhtml#_Fig6). MainMenu.xib showing our new, empty window
    and the Object Library    Take a minute to scroll through the different UI objects
    in the library: buttons, sliders, text fields, labels, browsers, even an OpenGL
    view!    Dragging Out a Label    The *Object Library* pane will show a list of
    items that can be dragged to our application window to build our application’s
    interface. Let’s drag one over now. We’re going to use an object called Label,
    which is used to display static text—text that the user can’t edit. Drag a label
    over to the window.    In the *Object Library* view, scroll down about a dozen
    items to one called Label. Click directly on the Label in the library and drag
    it over to the application’s main window (the window labeled Chapter2). Doing
    this will add a new label to our application’s window ([Figure 2-7](#9781430245421_Ch02.xhtml#Fig7)).    ![9781430245421_Fig02-07.jpg](images/9781430245421_Fig02-07.jpg)    [Figure
    2-7](#9781430245421_Ch02.xhtml#_Fig7). Dragging a label out to the window    **Tip**  Instead
    of scrolling down through the list as we did, we could have just typed the word
    “label” into the search field at the bottom of the Library pane. This would have
    filtered down the list to show only those objects in the library with the word
    “label” in their name or description.    Now that we’ve got a label, let’s change
    it. Double-click the label.'
