    \n### 为处理多个反派准备 VillainTrackerAppDelegate\n\n在 Xcode 中，打开我们在第 4 章创建的项目，导航到 `VillainTrackerAppDelegate.h`，以便更新类的接口以适应即将进行的更改。首先，我们将添加所需的新实例变量。因为我们要维护一个反派列表，所以我们将创建一个名为\
    \ `villains` 的 `NSMutableArray` 来包含所有反派。我们还将添加一个名为 `villainsTableView` 的出口，以便访问我们即将用来展示反派列表的\
    \ `NSTableView`。\n\n我们还将添加 `newVillain:` 和 `deleteVillain:` 的声明，这是我们两个新的操作方法。\n"
