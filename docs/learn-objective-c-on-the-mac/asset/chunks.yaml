    nib 文件已经包含了一个主窗口，我们稍后会处理它，但首先，我们将通过创建一个偏好设置窗口来进入正题，该窗口的图形用户界面控件将完全使用 Cocoa bindings
    进行配置。


    在 *Object Library* 窗格中（![image](images/arrow4.jpg)4），在底部的搜索框中输入 "window"，然后将结果列表中的
    Window 对象拖到 Interface Builder 画布上（我们不能将其拖到Interface Builder 中另一个窗口的上面，因此如果 nib
    文件中已有的窗口在画布上处于打开状态，请先将其关闭）。这个窗口将是我们的偏好设置窗口。使用 *Attributes Inspector* （![image](images/arrow2.jpg)4）将窗口标题设置为
    "DungeonThing Preferences"，并注意 nib 窗口中相应图标下方的标签也会发生变化。在同一检查器窗格中，点击取消选中 *Resize*
    复选框，因为没有理由允许用户调整此窗口的大小。同时，点击取消选中 *Visible at Launch* 复选框，以便在 nib 加载时窗口不会立即出现在屏幕上，并点击选中
    *Hide on Deactivate* 复选框，以便在用户点击离开应用程序时窗口消失。我们只希望当用户选择合适的菜单项时偏好设置窗口才出现，并且只有当 DungeonThing
    是前台应用程序时才可见。


    将窗口宽度调整得比默认宽度稍宽，以容纳我们将要添加的控件。按下![image](images/arrow2.jpg)3 调出 *Size Inspector*，通过点击其标题栏确保新窗口已被选中，然后在
    *Width* 字段中输入 530。


    最后一步是针对窗口本身，设置连接以便用户可以通过访问菜单中的 Preferences 项来打开此窗口。点击 Interface Builder 画布顶部的
    DungeonThing 菜单项，然后单次点击 Preferences 项。此对象将通过 target/action 连接到偏好设置窗口，因此按住 Control
    键从菜单项拖拽到偏好设置窗口（要么拖拽到 Interface Builder 画布左侧对象停靠区中代表窗口的图标，要么拖拽到实际窗口的标题栏），然后选择 `makeKeyAndOrderFront:`
    行为。这是一个方法，它会使任何窗口成为其应用程序中最前面的窗口，并且成为“关键”窗口，准备好接收用户按下键盘按键时产生的事件（因此方法名中包含 "makeKey"）。


    ### 添加标签视图


    我们将把应用程序的偏好设置分成三组，分别对应三个用户可以创建的游戏对象。我们将通过把控件放置在一个 `NSTabView` 中来分隔这些组，这允许用户通过选择顶部的标签列表在不同视图之间切换。在
    *Object Library* 窗格中，输入 "tab"，然后将结果中的 Tab view 拖入我们空白的窗口中。调整其大小，使其几乎填满窗口（如图 7-1
    所示），保留蓝色线条会愉快地为我们显示的标准边距。


    ![9781430245421_Fig07-01.jpg](images/9781430245421_Fig07-01.jpg)


    图 7-1. 添加并命名标签后，DungeonThing 的偏好设置窗口看起来像这样


    当我们从 *Object Library* 中拖出一个新的标签视图时，默认情况下它有两个标签，但我们希望有三个。点击 Tab view，并打开 *Attributes
    Inspector*（![image](images/arrow2.jpg)4）。注意 Tabs 字段。点击微小的向上箭头，将其值从 2 改为 3，然后就看到三个标签了。'
  raw: 'In our examples, we typically had one small action method for each view (triggered
    when the user edited the value displayed in the view), plus one large `updateDetailViews`
    method that updated the contents of all the views at once (called whenever the
    selection changed). That’s fine for a simple project, but there are some problems
    with that approach. First of all, there’s a scalability issue. Imagine having
    not ten but a hundred views. Following this approach, we’d end up with a controller
    having a hundred small action methods and one *huge* method to push values into
    all of the views!    Plus, we really have some tight coupling between our controller
    and its associated views. For example, what if we start off with an `NSDatePicker`
    for displaying and editing a date, but later decide we want to use an `NSTextField`?
    Besides modifying the GUI, we’d also have to change the outlet, the corresponding
    action method, and the `updateDetailViews` method.    Fortunately for us, Apple
    recognized this problem some time ago, and since Mac OS × 10.3 it has included
    a technology called *Cocoa bindings* that solves many of these problems. Cocoa
    bindings lets us use Interface Builder to configure a view so that it retrieves
    its value and passes changes back to a model object more or less automatically.
    All we do is tell it which controller object to deal with and which string it
    should use as a key for getting and setting a value. We can access model objects
    through our own controller classes or by using generic controller classes provided
    in Cocoa.    This results in an architecture where our own controller class often
    doesn’t need to know anything specific about any of the view objects in use. We
    don’t need to have instance variables pointing at them, and we don’t need to implement
    action methods to get their input! Our controller ends up as little more than
    a simple channel between a model object and a bunch of view objects, and from
    the controller’s point of view it doesn’t make a difference if there are ten views
    or a hundred.    In this chapter, we’ll learn how to use Cocoa bindings with simple
    controls such as checkboxes, sliders, and text fields, as well as with complex
    controls such as table views. We’ll create bindings that connect to model objects
    through a couple of Apple’s included controller classes. We’ll also get an introduction
    to using `NSUserDefaults` and its bindings-ready friend `NSUserDefaultsController`
    to deal with preferences in our application.    Binding to Simple Controls    The
    example application for this chapter is something that could be used by a Game
    Master in a role-playing game to randomly create characters, monsters, and dungeons.
    The main window will contain buttons that create random game objects when the
    user clicks them and text fields to display the result. We’ll also make a Preferences
    window where the user can specify some parameters for the creation of the game
    objects. We won’t do the actual “rolling” of these random objects. We’ll just
    display a summary of the parameters used each time the user clicks one of the
    buttons. The random game object creation is a bit too far afield for this book,
    but it could be a fun exercise for the reader if you are so inclined!    Creating
    the DungeonThing Project and Preferences Window    Launch Xcode, and select File
    ![image](images/arrow.jpg) New Project from the menu. Choose *Cocoa Application*,
    and name it “DungeonThing” on the New Project pane. For this example application,
    we’re also using DungeonThing as the class prefix. (If that’s too much to type,
    you can use DT, in which case all the references to `DungeonThingAppDelegate`
    that you’ll encounter later in the chapter will show up as `DTAppDelegate` in
    Xcode.) As before, leave the checkboxes in their default settings: *Use Automatic
    Reference Counting* should be checked, and the other checkboxes (Create Document-based
    Application, Use Core Data, and Include Unit Tests) should be unchecked.


    Now find `MainMenu.xib` in Xcode (it’s in the Project Navigator in the navigation
    area, on the far left) and single-click to open it in an Interface Builder canvas.
    This starts off as a standard empty application GUI, which should look pretty
    familiar by now. This nib file already contains a main window, which we’ll get
    to a little later on, but first we’ll get to the heart of the matter by creating
    a Preferences window whose GUI controls will be configured exclusively with Cocoa
    bindings.    In the *Object Library* pane (![image](images/arrow4.jpg)4), type
    “window” into the Search box at the bottom, and drag out the Window object from
    the result list onto the Interface Builder canvas (we can’t drag it out on top
    of another window in Interface Builder, so if the pre-existing window in the nib
    file is open on the canvas, close it first). This window will be our Preferences
    window. Use the *Attributes Inspector* (![image](images/arrow2.jpg)4) to set the
    window’s title to “DungeonThing Preferences,” and note that the label under the
    corresponding icon in the nib window also changes. In the same Inspector pane,
    click to turn off the *Resize* checkbox because there’s no reason to allow the
    user to resize this window. Also, click to turn off the *Visible at Launch* checkbox
    so that the window doesn’t appear on-screen as soon as the nib loads, and click
    to turn on the *Hide on Deactivate* checkbox so that the window disappears when
    a user clicks away from the application. We only want the Preferences window to
    appear when the user selects the appropriate menu item, and it should only be
    visible when DungeonThing is the foreground application.    Make the window a
    bit wider than its default size in order to accommodate the controls we’re about
    to add. Press ![image](images/arrow2.jpg)3 to bring up the *Size Inspector*, and
    make sure that the new window is selected by clicking its title bar, then type
    530 into the *Width* field.    The final step for the window itself is to hook
    things up so that a user can open this window by accessing the Preferences item
    in the menu. Click the DungeonThing menu item at the top of the Interface Builder
    canvas, and then single-click the Preferences item. This object will connect to
    the Preferences window with target/action, so Control-drag from the menu item
    to the Preferences window (either drag to the icon representing the window in
    the object dock on the left of the Interface Builder canvas, or to the title bar
    of the real window), and select the `makeKeyAndOrderFront:` action. That’s a method
    that will make any window become the front-most window in its application and
    also become the “key” window, ready to receive events in response to the user
    pressing keys on the keyboard (hence the “makeKey” in the method name).    Adding
    a Tab View    We’re going to split up the application preferences into three different
    groups, one for each of the three game objects the user can create. We’ll separate
    the groups by placing the controls in an `NSTabView`, which lets the user switch
    between different views by selecting from a list of tabs along the top. In the
    *Object Library* pane, type in “tab,” then drag the resulting Tab view into our
    empty window. Resize it so that it nearly fills the window (as shown in [Figure
    7-1](#9781430245421_Ch07.xhtml#Fig1)), leaving the standard margin that the blue
    lines will happily show us.    ![9781430245421_Fig07-01.jpg](images/9781430245421_Fig07-01.jpg)    [Figure
    7-1](#9781430245421_Ch07.xhtml#_Fig1). The preferences window for DungeonThing
    looks like this after adding and naming the tabs    When we drag out a new tab
    view from the *Object Library*, by default it has two tabs, but we want ours to
    have three. Click the Tab view, and open the *Attributes Inspector* (![image](images/arrow2.jpg)4).
    Note the Tabs field. Click the tiny up-arrow to change its value from 2 to 3,
    and see three tabs.'
  trans: '```markdown


    在我们的示例中，通常每个视图有一个小的操作方法（当用户编辑视图中显示的值时触发），外加一个庞大的`updateDetailViews`方法来一次性更新所有视图的内容（每当选择发生变化时调用）。这对于简单的项目来说没问题，但这种方法存在一些问题。首先，存在可扩展性问题。假设不是十个视图，而是有一百个视图。按照这种方法，我们最终会得到一个控制器，它有一百个小的操作方法，以及一个*庞大的*方法，用于将值推送到所有视图中！此外，我们的控制器与其关联视图之间确实存在紧密耦合。例如，如果我们最初使用`NSDatePicker`来显示和编辑日期，但后来决定改用`NSTextField`，该怎么办？除了修改图形用户界面，我们还必须更改输出口、相应的操作方法以及`updateDetailViews`方法。


    幸运的是，Apple 早已认识到这个问题，自 Mac OS X 10.3 起，它加入了一项名为 *Cocoa bindings* 的技术，解决了其中的许多问题。Cocoa
    bindings 让我们可以使用 Interface Builder 来配置视图，使其或多或少自动地检索其值并将更改传回模型对象。我们所要做的就是告诉它要处理哪个控制器对象，以及它应该使用哪个字符串作为键来获取和设置值。我们可以通过自己的控制器类或使用
    Cocoa 提供的通用控制器类来访问模型对象。


    这导致了一种架构，其中我们自己的控制器类通常不需要知道任何关于正在使用的视图对象的具体信息。我们不需要拥有指向它们的实例变量，也不需要实现操作方法以获取它们的输入！我们的控制器最终只不过是模型对象和一堆视图对象之间的一个简单通道，并且从控制器的角度来看，有十个视图还是一百个视图都没有区别。


    在本章中，我们将学习如何将 Cocoa bindings 用于简单的控件，例如复选框、滑块和文本字段，以及复杂的控件（如表视图）。我们将创建绑定，通过几个
    Apple 自带的控制器类连接到模型对象。我们还将介绍如何使用`NSUserDefaults`及其支持绑定的同伴`NSUserDefaultsController`来处理应用程序中的偏好设置。


    ## 绑定到简单控件


    本章的示例应用程序可供角色扮演游戏中的游戏主持人在随机创建角色、怪物和地牢时使用。主窗口将包含一些按钮，当用户点击时，这些按钮会创建随机游戏对象，以及一些文本字段来显示结果。我们还将创建一个偏好设置窗口，用户可以在其中指定一些用于创建游戏对象的参数。我们不会实际进行这些随机对象的“投掷”操作。我们只会在用户点击某个按钮时显示所用参数的摘要。随机游戏对象的创建对于本书来说有点偏离主题，但如果您有兴趣，这对读者来说可能是一个有趣的练习！


    ### 创建 DungeonThing 项目与偏好设置窗口


    启动 Xcode，然后从菜单中选择 File ![image](img/arrow.jpg) New Project。选择 *Cocoa Application*，并在
    New Project 窗格中将其命名为 "DungeonThing"。对于这个示例应用程序，我们也使用 DungeonThing 作为类前缀。（如果输入太麻烦，您可以使用
    DT，在这种情况下，您稍后在本章中遇到的所有对`DungeonThingAppDelegate`的引用，在 Xcode 中将显示为`DTAppDelegate`。）和之前一样，保持复选框的默认设置：*Use
    Automatic Reference Counting* 应被选中，而其他复选框（Create Document-based Application、Use
    Core Data 和 Include Unit Tests）应取消选中。


    现在在 Xcode 中找到 `MainMenu.xib`（它位于导航区域最左侧的项目导航器中），然后单次点击以在 Interface Builder 画布中打开它。这最初是一个标准的空应用程序图形用户界面，现在看起来应该已经很熟悉了。这个
    nib 文件已经包含了一个主窗口，我们稍后会处理它，但首先，我们将通过创建一个偏好设置窗口来进入正题，该窗口的图形用户界面控件将完全使用 Cocoa bindings
    进行配置。


    在 *Object Library* 窗格中（![image](img/arrow4.jpg)4），在底部的搜索框中输入 "window"，然后将结果列表中的
    Window 对象拖到 Interface Builder 画布上（我们不能将其拖到 Interface Builder 中另一个窗口的上面，因此如果 nib
    文件中已有的窗口在画布上处于打开状态，请先将其关闭）。这个窗口将是我们的偏好设置窗口。使用 *Attributes Inspector* （![image](img/arrow2.jpg)4）将窗口标题设置为
    "DungeonThing Preferences"，并注意 nib 窗口中相应图标下方的标签也会发生变化。在同一检查器窗格中，点击取消选中 *Resize*
    复选框，因为没有理由允许用户调整此窗口的大小。同时，点击取消选中 *Visible at Launch* 复选框，以便在 nib 加载时窗口不会立即出现在屏幕上，并点击选中
    *Hide on Deactivate* 复选框，以便在用户点击离开应用程序时窗口消失。我们只希望当用户选择合适的菜单项时偏好设置窗口才出现，并且只有当 DungeonThing
    是前台应用程序时才可见。


    将窗口宽度调整得比默认宽度稍宽，以容纳我们将要添加的控件。按下![image](img/arrow2.jpg)3 调出 *Size Inspector*，通过点击其标题栏确保新窗口已被选中，然后在
    *Width* 字段中输入 530。


    最后一步是针对窗口本身，设置连接以便用户可以通过访问菜单中的 Preferences 项来打开此窗口。点击 Interface Builder 画布顶部的
    DungeonThing 菜单项，然后单次点击 Preferences 项。此对象将通过 target/action 连接到偏好设置窗口，因此按住 Control
    键从菜单项拖拽到偏好设置窗口（要么拖拽到 Interface Builder 画布左侧对象停靠区中代表窗口的图标，要么拖拽到实际窗口的标题栏），然后选择 `makeKeyAndOrderFront:`
    行为。这是一个方法，它会使任何窗口成为其应用程序中最前面的窗口，并且成为“关键”窗口，准备好接收用户按下键盘按键时产生的事件（因此方法名中包含 "makeKey"）。


    ### 添加标签视图


    我们将把应用程序的偏好设置分成三组，分别对应三个用户可以创建的游戏对象。我们将通过把控件放置在一个 `NSTabView` 中来分隔这些组，这允许用户通过选择顶部的标签列表在不同视图之间切换。在
    *Object Library* 窗格中，输入 "tab"，然后将结果中的 Tab view 拖入我们空白的窗口中。调整其大小，使其几乎填满窗口（如图 7-1
    所示），保留蓝色线条会愉快地为我们显示的标准边距。


    ![9781430245421_Fig07-01.jpg](img/9781430245421_Fig07-01.jpg)


    图 7-1. 添加并命名标签后，DungeonThing 的偏好设置窗口看起来像这样


    当我们从 *Object Library* 中拖出一个新的标签视图时，默认情况下它有两个标签，但我们希望有三个。点击 Tab view，并打开 *Attributes
    Inspector*（![image](img/arrow2.jpg)4）。注意 Tabs 字段。点击微小的向上箭头，将其值从 2 改为 3，然后就看到三个标签了。


