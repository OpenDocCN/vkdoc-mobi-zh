  trans: '

    # 绑定数组控制器


    首先，我们需要在应用中添加一个数组控制器。在*对象库*的搜索框中搜索“array”，结果中会出现一个数组控制器。将其拖拽到界面构建器画布上，可以放置在编辑器面板的任意位置。无论在何处放置，它都会显示在界面构建器画布左侧的对象停靠区中。在对象停靠区中选中它，并将其重命名为“神话人物数组控制器”。打开*属性检视器*，将其模式从“类”（Class）改为“实体名称”（Entity
    Name）。在*实体名称*字段中输入“MythicalPerson”，这与我们在模型编辑器中使用的名称一致。最后，勾选*准备内容*（Prepares Content）复选框。这会在应用启动时触发数组控制器加载数据。


    接下来，我们将把数组控制器链接到 `managedObjectContext`。在对象停靠区中仍选中数组控制器的状态下，选择*绑定检视器*。展开*参数*（Parameters）部分，然后从弹出列表中选择*应用代理*（App
    Delegate）。之后，勾选弹出列表旁边的*绑定到*（Bind to）复选框。接着，在*模型键路径*（Model Key Path）字段中输入“managedObjectContext”。这将把数组控制器连接到应用代理中的
    Core Data 管道。


    现在我们已经连接好数组控制器，接下来需要设置与 UI 控件的绑定。我们将从基本控件（文本字段和滑块）开始，然后处理更复杂的控件（图像显示区域和表格视图），最后完成按钮的连线。


    第一个绑定是针对“名称”（Name）文本字段的。选择名称文本框，然后打开*绑定检视器*。展开*值*（Value）部分，勾选*绑定到*复选框，然后从下拉菜单中选择“神话人物数组控制器”。确保*控制器键*（Controller
    Key）框显示为“selection”，并在*模型键路径*字段中输入“name”，如图 8-9 所示。这将把文本字段连接到数组控制器所选对象的 name 属性。


    ![9781430245421_Fig08-09.jpg](img/9781430245421_Fig08-09.jpg)


    图 8-9. 用于将名称文本字段连接到神话人物数组控制器的绑定检视器


    滑块的绑定设置类似；我们将建立到神话人物数组控制器所选项的绑定，并根据控件的相应属性设置不同的*模型键路径*。对于三个滑块，这分别对应我们在模型文件中创建的
    `divinity`、`power` 和 `goodness` 属性。要设置这些绑定，请选择“神性”（Divinity）滑块并查看*绑定检视器*。展开*值*部分，勾选*绑定到*复选框，然后从下拉菜单中选择“神话人物数组控制器”。确保*控制器键*框显示为“selection”，并在*模型键路径*字段中输入“divinity”。对“力量”（Power）和“善良”（Goodness）滑块重复此操作，并相应更改*模型键路径*。


    设置“图像显示区域”（Depiction）和“详情”（Details）区域的绑定会稍微复杂一些。我们先处理“详情”。选择文本视图（请记住文本视图嵌入在 `NSScrollView`
    中；您需要点击滚动视图才能进入文本视图本身）。在*绑定检视器*中，与名称文本字段和滑块相比，会有不同的选项。不过，仍然有一个*值*部分，我们将使用它。展开*值*部分，勾选*绑定到*复选框，并使用“details”作为*模型键路径*。


    对于“图像显示区域”，我们需要获取一个 `NSImage` 供图像井显示。Core Data 并不知道 `NSImage`，但这并不是问题。还记得我们之前讨论过的转换器和
    Core Data 使用的可转换类型吗？


    由于 depiction 是一个可转换属性，其值需要在 GUI 中看到的内容（一个 `NSImage`）和 Core Data 能够存储的内容（`NSData`）之间进行转换。我们将通过为此控件添加
    `NSKeyedUnarchiveFromData` 到 Cocoa 绑定配置来实现这一点。选择图像井并调出*绑定检视器*。与其他字段一样，打开*值*部分。勾选*绑定到*复选框，确保*控制器键*显示为“selection”，并将*模型键路径*设置为“depiction”。为了完成从
    `NSData` 到 `NSImage` 的转换，点击值转换器（Value Transformer）弹出列表，并选择 `NSKeyedUnarchiveFromData`。


    ## 配置表格视图的绑定


    现在来处理表格视图的绑定。为基于视图的表格视图设置 Cocoa 绑定分为两步。首先，我们必须为表格视图本身设置绑定。然后，为行中的每个视图设置绑定。表格视图会施展一些“魔法”，将其绑定源暴露给其子视图，该子视图名为“表格单元格视图”（Table
    Cell View）。在该绑定中，有一个“objectValue”的*模型键路径*，它代表该行的对象。


    首先，选择表格视图本身。在左侧的对象停靠区中选择最为方便。在*绑定检视器*中，展开*内容*（Content）部分，勾选*绑定到*复选框，确保下拉菜单显示为“神话人物数组控制器”，并且*控制器键*显示为“arrangedObjects”。对于表格视图本身，我们不需要设置*模型键路径*。我们还希望表格视图中选中的行能够传回给数组控制器。为此，请展开*绑定检视器*的*选择索引*（Selection
    Indices）部分。在此处勾选*绑定到*复选框，将下拉菜单设置为“神话人物数组控制器”，并将*控制器键*设置为“selectionIndexes”。您的绑定应如
    图 8-10 所示。


    ![9781430245421_Fig08-10.jpg](img/9781430245421_Fig08-10.jpg)


    图 8-10. 设置表格视图的绑定


    表格中有五列：名称、神性、力量、善良和图像显示区域。我们不直接在列上设置绑定；相反，我们将为每列中包含的视图设置绑定。对于前四列，视图是包含在 `NSTableCellView`
    内的一个 `NSTextField`。对于“图像显示区域”列，视图是包含在 `NSTableCellView` 内的一个 `NSImageWell`。不幸的是，Xcode
    将 `NSTableCellView` 内文本字段的默认值设置为“Table View Cell”，这似乎有意制造混淆。表格视图中的视图是 `NSTableCellView`
    的实例，尽管它们的默认文本如此。文本字段和图像井将绑定到表格单元格视图的 `objectValue` 属性。


    我们从“名称”列开始。在“名称”列中选择表格单元格视图，如果您在 UI 界面中点击，可能需要双击；或者通过在左侧的对象停靠区展开“表格列 - 名称”（Table
    Column - Name）条目，并逐级深入其中的“静态文本 - 表格单元格视图”（Static Text - Table View Cell）条目。在*绑定检视器*中，展开*值*部分。勾选*绑定到*复选框，确保下拉菜单显示为“表格单元格视图”（Table
    Cell View），并将*模型键路径*设置为“objectValue.name”。*控制器键*应为空。


    “神性”、“力量”和“善良”的绑定设置类似。依次选择每列并逐级深入其中的静态文本字段。像设置“名称”列一样设置值绑定：打开*值*部分，勾选*绑定到*复选框，确保下拉菜单显示为“表格单元格视图”，并根据情况将*模型键路径*设置为“objectValue.divinity”、“objectValue.power”或“objectValue.goodness”。


    接下来处理“图像显示区域”列。在“图像显示区域”列中选择表格单元格视图内的图像井。在*绑定检视器*中，打开*值*部分。

    '
- fmt: "As before, check the `Bind to` checkbox, ensure that the pulldown menu shows\
    \ Table Cell View. Set the `Model Key Path` to “objectValue.depiction”. As we\
    \ did with the Depiction view above, click on the Value Transformer pop-up list,\
    \ and choose `NSKeyedUnarchiveFromData`, as shown in [Figure 8-11](#9781430245421_Ch08.xhtml#Fig11).\
    \ That wraps up the table view!  \n![9781430245421_Fig08-11.jpg](images/9781430245421_Fig08-11.jpg)\
    \  \n[Figure 8-11](#9781430245421_Ch08.xhtml#_Fig11). Setting up bindings for\
    \ the Depiction column  \n\nFor the text field below and to the left of the table\
    \ view showing the number of matches, we’ll use a different binding method that\
    \ will let us use a format string to build the contents of the text field. In\
    \ this case, we’ll use `Display Pattern Value1` rather than `Value`. Expand the\
    \ `Display Pattern Value1` section, and check the `Bind to` checkbox and set the\
    \ pulldown menu to Mythical Person Array Controller as before. Enter “selection”\
    \ as the `Controller Key`. This time, we’re going to use a different key path.\
    \ Set the `Model Key Path` to “@count,” and the `Display Pattern` to “%{value1}@\
    \ out of %{value2}@.” There’s another binding available below `Display Pattern\
    \ Value1` now, titled `Display Pattern Value2`. Expand the `Display Pattern Value2`\
    \ section, and check the `Bind to` checkbox and set the pulldown menu to Mythical\
    \ Person Array Controller as before. This time, enter “@count” as the `Model Key\
    \ Path`, and enter “arrangedObjects” as the `Controller Key` instead of “selection.”\
    \ The `Display Pattern` will auto-fill with the same value that we entered in\
    \ the `Display Pattern Value1` binding.  \n\nNow, we need to wire up the Fetch,\
    \ Delete, and Add buttons. For this, we’ll use a combination of target-action\
    \ connections for responding to clicks and Cocoa bindings to enable or disable\
    \ the buttons as appropriate. Let’s start with the target-action connections.\
    \ Select the Fetch button and control-drag a connection out to the Mythical Person\
    \ Array Controller. The array controller will be at the bottom of the list of\
    \ objects in the Object Dock; if you can’t see it, hover your mouse at the bottom\
    \ of the Object Dock and it will scroll down to reveal the array controller. Select\
    \ the `fetch:` action. Do the same thing with the Delete and Add buttons, selecting\
    \ the `remove:` and `add:` actions respectively.  \n\nNext, we’ll establish bindings\
    \ for the Enabled property of the Add and Remove buttons. Select the Add button\
    \ and open the `Bindings Inspector`. Expand the `Enabled` section, shown under\
    \ `Availability`. Can you guess the next step? That’s right; check the `Bind to`\
    \ checkbox, ensure that the pulldown menu shows Mythical Person Array Controller.\
    \ This time, however, change the `Controller Key` field to be “canAdd.” When you\
    \ start typing in the `Controller Key` field, you’ll get a list of potential completions.\
    \ Do the same thing for the Remove button, changing the `Controller Key` to “canRemove.”\
    \  \n\nWe’ve now built enough of the UI that we should try it out before going\
    \ any further. Let’s try it out. Save the nib file and click Run. You should be\
    \ able to click the Add button and get blank rows in the table view. You should\
    \ also be able to edit the name and move the sliders, and have the changes reflected\
    \ in the selected row in the table view. If that’s not the case, then check the\
    \ bindings and connections in the nib file and see whether they match the instructions.\
    \  \n\n## Finishing the Bindings: Save and Search  \nOur application should be\
    \ able to handle multiple records and allow creating and removing of mythical\
    \ people. But we can’t save or search it, which makes it a pretty poor database.\
    \ Let’s fix that now.  \n\nSaving is easy. The Application Delegate class generated\
    \ by Xcode manages that for us; we just need to tell it when to do so. In the\
    \ Main Menu, there’s a File menu with a Save menu item. The Save menu item comes\
    \ pre-bound to the ![images](images/arrow3.jpg) S key equivalent. We’ll use this\
    \ for our app as well.  \n\nIn the Object Dock in Interface Builder, expand the\
    \ Main Menu object, then expand the File menu and then the Menu Item – Save item.\
    \ Note that we’re talking about objects in the Object Dock, not Xcode’s own menu!\
    \ Control-drag a connection to the App Delegate in the Object Dock, and select\
    \ the `saveAction:` action from the list. Done!  \n\nSearch isn’t quite as straightforward,\
    \ and there’s a bit of terminology to cover first. Core Data search support is\
    \ based on *predicates*. A predicate is made up of an attribute name, an operator,\
    \ and a search value; and a search field can support many predicates. Two examples\
    \ of predicates are `name contains Heracles` or `goodness greater than 75`. If\
    \ you’re familiar with SQL, the `WHERE` clause of a SQL command is built up of\
    \ predicates. For MythBase, all of the attributes of the MythicalPerson entity\
    \ should be searchable with the exception of depiction, so we’ll need to define\
    \ several predicates. We can’t search depiction, as binary and transformable attribute\
    \ are inherently not searchable. The predicates can be defined in the `Bindings\
    \ Inspector`, and that’s where we’re heading to next.  \n\nWe’ll start by defining\
    \ a predicate to search on the name attribute. Select the Search field at the\
    \ upper right corner of the screen, and open the `Bindings Inspector`. Near the\
    \ bottom of the `Bindings Inspector` is a section titled `Predicate`. Open it\
    \ up and check the `Bind to` checkbox, binding it to Mythical Person Array Controller.\
    \ The `Controller Key` should say “filterPredicate”. Set the `Display Name` to\
    \ “Name,” and the predicate format to “name contains[c] $value” where `$value`\
    \ indicates the contents of the search box, and name indicates the MythicalPerson\
    \ entity attribute that should be searched. The operator, `contains[c]`, indicates\
    \ that we want to return any records where the name attribute contains the value\
    \ represented in `$value`, using a case insensitive search—that’s what the `[c]`\
    \ at the end means. Without the `[c]`, the search is case-sensitive.  \n\nNote\
    \ that a new binding has been created titled `Predicate2`. We’ll use that one\
    \ to define a predicate to search on all the searchable fields in the entity.\
    \ Open up `Predicate2` and, just like the first one, check the `Bind to` checkbox,\
    \ binding it to Mythical Person Array Controller. The `Controller Key` should\
    \ say “filterPredicate.” For `Predicate2`, set the `Display Name` to “All,” and\
    \ the predicate format to the following mouthful: “(name contains $value) or (divinity.description\
    \ contains $value) or (power.description contains $value) or (goodness.description\
    \ contains $value) or (details contains[c] $value).” Note that there’s now a new\
    \ binding available called `Predicate3`.  \n\nWe’ve shown how to search on one\
    \ attribute or many. If you’d like to be able to search on other specific fields,\
    \ such as name or details, feel free to add more predicates by following the same\
    \ pattern as described above, changing the field name in the predicate format\
    \ value as appropriate. There are many more possibilities for constructing search\
    \ predicates than we’ve discussed here, and Apple offers a Predicate Programming\
    \ Guide section in the Xcode documentation that covers it in detail.  \n\nWell,\
    \ with all that behind us, it’s time to run the app. Press the Run button in the\
    \ upper-left-hand corner of the Xcode window, and you should be able to create\
    \ some Mythical Person records, drag an image into the large image well to show\
    \ a picture, use the File ![image](images/arrow.jpg) Save menu item to save the\
    \ records, and search the database. The question mark icon on the left edge of\
    \ the search field should let you select which search predicate is operative.\
    \ When you quit and rerun the app, the records should be preserved and reloaded\
    \ on launch.  \n\nWe’ve now made a pretty cool-looking app entirely by defining\
    \ a model and building a GUI. Notably, we haven’t written any code!"
