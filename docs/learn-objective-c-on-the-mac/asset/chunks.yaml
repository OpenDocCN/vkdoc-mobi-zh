    \ (lldb) p (int)[fileError code]\n (int) $1 = 260\n (lldb) po [fileError localizedDescription]\n\
    \ $2 = 0x0000000102327470 The file \"tmpfoo\" couldn't be opened because there\
    \ is no such file.\n```\n\n注意我们可以使用`po`命令打印`NSString`的值，使用`p`命令打印任何基本 C 类型的值。通常在使用`p`命令时，`lldb`会抱怨它不知道我们试图显示的值的类型，所以我们在方法调用前放一个小的`(int)`，告诉`lldb`期望什么。\n\
    \n现在我们知道了错误代码和域。快速查看`FoundationErrors.h`会发现以下信息：\n\n```\nNSFileReadNoSuchFileError\
    \ = 260,    // Read error (no such file)\n```\n\n这仍然可能让你想知道这一切是如何结合在一起的。回想一下，当你创建一个`NSError`时，你需要指定一个域、一个代码，以及一个可选地包含附加信息的字典。这个字典是谜题的关键部分。如果你传递给这个方法的字典对于键`@\"\
    NSLocalizedDescriptionKey\"`有一个值，那么无论何时调用`localizedDescription`，都会返回该值。\n\n那么，让我们看看`userInfo`字典包含什么。\n\
    \n```\n(lldb) po [fileError userInfo]\n$3 = 0x0000000102118850 {\n    NSFilePath\
    \ = \"/tmpfoo\";\n    NSUnderlyingError = \"Error Domain=NSPOSIXErrorDomain Code=2\
    \ \\\"The operation couldn\\U2019t be completed. No such file or directory\\\"\
    \";\n}\n```\n\n嗯，显然这不是答案。`userInfo`字典没有指定本地化的描述，但它确实包含了一些其他东西：我们试图访问的文件的路径，以及看起来像是另一个`NSError`的内容。一个错误包裹在另一个错误里面！让我们看看内部那个错误的`domain`、`code`、`userInfo`和`localizedError`是什么样的。我们从另一个`lldb`命令`expression`开始，它只是执行行上的其余语句，就像它们是源代码一样，但不像`po`或`p`命令那样打印结果。在这种情况下，我们将内部错误对象的地址分配给一个我们称为`$inner`的新变量。这是`lldb`的一个很好的特性，允许我们保留执行的查询结果，让值保留下来，并在以后节省一些输入工作。我们将从`fileError`中获取`userInfo`字典，然后立即使用\
    \ Objective-C 的新字典查找语法来访问底层错误。\n\n```\n(lldb) expression id $inner = [fileError\
    \ userInfo][@\"NSUnderlyingError\"]\n(lldb) po $inner\n$inner = 0x000000010210a9e0\
    \ Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn't be completed.\
    \ No such file or directory\"\n```\n\n将对象的地址分配给新变量后，使用`po`命令查看新变量的地址及其内容，即它指向的对象。从现在开始，我们可以将那个内部错误简称为`$inner`，就像这样：\n\
    \n```\n (lldb) po [$inner domain]\n $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain\n\
    \ (lldb) p (int)[$inner code]\n (int) $10 = 2\n (lldb) po [$inner userInfo]\n\
    \ $11 = 0x00000001001039d0 { }\n (lldb) po [$inner localizedDescription]\n $12\
    \ = 0x000000010011d2c0 The operation couldn't be completed. No such file or directory\n\
    ```\n\n这给我们带来了又一个谜题。\n"
- fmt: "# When we look at the underlying error, which has no `userInfo` dictionary\
    \ at all, it still presents a human-readable `localizedDescription` that doesn’t\
    \ seem immediately apparent just by looking at the domain and code. In fact, we\
    \ could make our own inner and outer errors like this:\n\n```\nNSError *innerError\
    \ = [NSError errorWithDomain:NSPOSIXErrorDomain\n                            \
    \              code:2 userInfo:nil];\nNSDictionary *outerInfo = @{NSUnderlyingErrorKey:\
    \ innerError,\n                            NSFilePathErrorKey: @\"/tmpfoo\"};\n\
    NSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain\n          \
    \                                code:260 userInfo:outerInfo];\n```\n\nThose errors\
    \ will behave *exactly* like the ones generated by `NSFileManager`, including\
    \ displaying human-readable text that we’re not specifying anywhere! As it turns\
    \ out, the source of this magic seems to be the `NSError` class itself. It apparently\
    \ has enough built-in specific knowledge about Cocoa’s error domains and error\
    \ codes to generate meaningful sentences about many of the errors that a program\
    \ is likely to encounter. This means that, in general, the errors provided to\
    \ us by Cocoa method calls won’t need to be prettied up in order to be shown to\
    \ users.\n\n## Presenting an Error\n\nAnd how about showing errors to users, while\
    \ we’re at it? Here we’ve been calling `[NSApp presentError:e]` to make the application\
    \ display a modal window, but there are some other choices. In truth, the `presentError:`\
    \ method is implemented in `NSResponder`, `NSDocument`, and `NSDocumentController`,\
    \ which means that whenever an error occurs, we can pass it along to the nearest\
    \ or most relevant object around, at which point it is passed along a chain of\
    \ responsibility, similar to the responder chain, until some object actually displays\
    \ the error. This opens up possibilities for displaying error messages in a different\
    \ fashion, such as with a document-modal sheet alert.\n\n## Wrap Up\n\nWe’ve now\
    \ seen the primary ways that a Cocoa app can deal with various kinds of unpleasantness,\
    \ how to avoid some common mistakes, and how to use `lldb` to help track down\
    \ problems. We’ve also seen how methods can use `NSError` instances to deal with\
    \ problems in a controlled manner. All of this will come in handy as we delve\
    \ further into Cocoa programming.\n\n## Chapter 14: Drawing in Cocoa\n\nBy now\
    \ we’ve learned lots of powerful Cocoa techniques for dealing with data, optimally\
    \ arranging our application’s classes, and using the wide range of on-screen controls\
    \ and other views that are included with Cocoa. Now it’s time to start learning\
    \ how to use Cocoa to make our own view classes, gaining complete control over\
    \ the display of text and graphics. Mac applications are commonly known for including\
    \ “eye candy”—not just for drawing needless graphical flourishes, but also for\
    \ creating a more immersive interactive experience for the user. The graphics\
    \ technologies available to us as Cocoa programmers can help us achieve some of\
    \ the same kinds of effects with a surprisingly small amount of effort on our\
    \ part.\n\n`Core Graphics` provides rich functionality for rendering paths, manipulating\
    \ coordinate systems, and more. One major part of `Core Graphics` is a set of\
    \ APIs known as `Quartz`. `Quartz`, in fact, makes up such a huge part of `Core\
    \ Graphics` that the two terms are sometimes used interchangeably. `Core Animation`\
    \ takes things even further, letting us animate our views in a remarkably simple\
    \ way.\n\nThis chapter will cover some of the basics of coordinate systems and\
    \ drawing into an `NSView` instance, and demonstrate how to display a view larger\
    \ than the space available to it in the window by putting it in a scrolling view.\
    \ It will also touch on how to easily add basic printing support to our applications.\n\
    \n## Fundamentals\n\nIn this section, we’ll go through some of the basic concepts\
    \ used in Cocoa’s drawing APIs.\n\nIf you’ve done any sort of graphics programming,\
    \ some of what’s available for drawing in Cocoa will be pretty familiar. After\
    \ all, most of the basic concepts of computer graphics were hammered out decades\
    \ ago. Where Cocoa stands out is both in the quality of its rendering, including\
    \ anti-aliasing for both text and graphics primitives, and the availability of\
    \ high-level abstractions for more complex concepts.\n\nThroughout this chapter,\
    \ we’ll be referring to points, not pixels. Drawing in Cocoa is generally vector-based\
    \ and resolution-independent. With the introduction of high-pixel-density displays\
    \ (also called HiDPI or Retina displays), a point in the drawing model might actually\
    \ be represented by one or four pixels on the display. It’s best, where possible,\
    \ to let the underlying operating system figure out how to convert from the drawing\
    \ primitives to actual pixels. By doing so, it’ll automatically look great on\
    \ a high-resolution display. If you’re dealing with pixel-specific code, then\
    \ you don’t get off so easy and you’ll need to worry about the differences between\
    \ points and pixels, and how to scale bitmaps appropriately. For now, though,\
    \ we’ll only be talking about points.\n\n## The View Coordinate System\n\nCocoa’s\
    \ drawing systems work with an x-y coordinate system where, by default, the origin\
    \ point (0,0) is at the lower left, the x-axis points to the right (increasing\
    \ values take us further to the right), and the y-axis points up (increasing values\
    \ take us further up on the screen). This is similar to the way graphs are traditionally\
    \ done in mathematics, but flipped from many other computer graphics systems where\
    \ the y-axis points down (increasing values take us further down on the screen).\
    \ Although it’s possible and sometimes desirable to flip the y-axis in Cocoa,\
    \ we won’t be doing so in our examples.\n\nDrawing is normally done by instances\
    \ of `NSView` subclasses. Views exist in a hierarchy. If the top-most view in\
    \ the hierarchy is set to be the *contentView* of an `NSWindow`, then all the\
    \ views in that hierarchy are displayed within that window. The top-level view\
    \ in a window, the *contentView*, can draw across the entire area of the window.\
    \ For every other view in the hierarchy, the drawing area is limited to its frame,\
    \ a space within the coordinates of its parent view (see [Figure 14-1](#9781430245421_Ch14.xhtml#Fig1)).\n\
    \n![9781430245421_Fig14-01.jpg](images/9781430245421_Fig14-01.jpg)\n\n[Figure\
    \ 14-1](#9781430245421_Ch14.xhtml#_Fig1). A simple hierarchy of views. The window’s\
    \ contentView contains an NSBox, which in turn contains an NSMatrix containing\
    \ radio buttons\n\n## Frame Rectangle vs. Bounds Rectangle\n\nFor each view in\
    \ a window, there are a couple of important rectangles (or *rects*, as they are\
    \ commonly called) that define a lot about its drawing characteristics: its frame\
    \ rect and its bounds rect. The frame rect simply specifies the view’s location\
    \ and size within its parent view’s coordinate space. For example, imagine the\
    \ top-level view in a window. Let’s call it A. If A has a subview called B that\
    \ extends from point (10,20) to point (40,60), then B’s frame rect has (10,20)\
    \ as its origin and (30,40) as its size.\n\nApart from its frame, which determines\
    \ where and to what extent it appears in its superview, each view has a bounds\
    \ rect, which defines its own inner coordinate space. For example, view B described\
    \ previously will by default have a bounds rect whose origin is (0,0) and whose\
    \ size is (30,40). We can easily change this if we want. For example, say we’ve\
    \ got a bunch of points to plot with x and y values of between 0.0 and 10.0. By\
    \ changing the bounds rect of B, setting its size to (10,10), the points will\
    \ exactly fill the space occupied by B, no matter how much space B actually takes\
    \ on-screen (see [Figure 14-2](#9781430245421_Ch14.xhtml#Fig2)).\n\n![9781430245421_Fig14-02.jpg](images/9781430245421_Fig14-02.jpg)\n\
    \n[Figure 14-2](#9781430245421_Ch14.xhtml#_Fig2)."
