    \ 带来的混乱。应用委托可以是任何类的任何实例，但只有一个对象能成为应用委托。几乎每个应用程序都需要一个应用委托对象。由于这是一种常见模式，为我们创建的 `ButtonsAppDelegate`\
    \ 类已经在 nib 文件中被配置为应用委托。`ButtonsAppDelegate.h` 文件中的 `ButtonsAppDelegate` 类声明指出，该类实现了\
    \ `NSApplicationDelegate` 协议。\n\n### 配置应用程序在窗口关闭时退出\n\n单击 `ButtonsAppDelegate.m`\
    \ 文件，添加一个名为 `applicationShouldTerminateAfterLastWindowClosed:` 的方法，如下文加粗所示：\n\n\
    ```objc\n#import \"ButtonsAppDelegate.h\"\n\n@implementation ButtonsAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n  \
    \  // 在此处插入代码以初始化应用程序\n}\n\n- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication\
    \ *)sender {\n    return YES;\n}\n\n- (IBAction)buttonPressed:(id)sender {\n \
    \   NSString *title = [sender title];\n    NSString *labelText = [NSString stringWithFormat:@\"\
    %@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n}\n\
    @end\n```\n\n这个新方法是那些特殊的应用委托方法之一。在应用程序运行期间的某些预设时刻，`NSApplication` 会检查其委托是否实现了某个特定方法。如果委托实现了，`NSApplication`\
    \ 就会调用该方法。我们刚刚实现的这个方法允许我们改变 `NSApplication` 的行为，而无需对其进行子类化。默认行为是 `NSApplication`\
    \ 持续运行，直到被明确告知退出，即使没有窗口打开也是如此。不过，应用程序在最后一个（或唯一）窗口关闭时退出也是可以接受的，而此方法正是专门为了让委托修改这种默认行为而提供的。\n\
    \n再次运行应用程序，当主窗口出现后将其关闭。由于应用程序的唯一窗口已被关闭，应用程序现在应该会退出。\n\n### 使用文档浏览器\n\n那么，我们如何知道这些应用委托方法是什么？如果我们不知道这些方法，就难以实现它们。幸运的是，它们通常很容易找到。查看我们刚刚添加的方法，它接受一个参数，该参数是一个指向调用该方法的\
    \ `NSApplication` 实例的指针。按住 Option 键，然后在编辑窗格中双击 `NSApplication` 一词。这将打开文档浏览器，定位到我们刚点击的词的定义，即\
    \ `NSApplication`（图 4-11）。\n\n![9781430245421_Fig04-11.jpg](img/9781430245421_Fig04-11.jpg)\n\
    \n图 4-11。Xcode 中的文档浏览器，显示 NSApplication 类参考\n\n然而，在本例中，我们不会在这个文件中找到 `NSApplication`\
    \ 的委托方法文档。从 OS X 10.6 开始，苹果开始将委托方法重构到独立的协议中，并将这些方法的文档迁移到该协议的文档中。许多 Cocoa 类都有相关联的委托协议——例如\
    \ `NSApplication`、`NSBrowser`、`NSToolbar`、`NSWindow` 等。在阅读某个类的文档时，务必同时查找同名的关联委托协议：`NSApplication`\
    \ 的委托协议名为 `NSApplicationDelegate`。\n\n要浏览文档树，请在 NSApplication 类参考文档中右键单击，然后选择“在库中显示”。这将显示文档树，其中\
    \ `NSApplication` 处于选中状态。\n\n在 NSApplication 类参考下方是 NSApplicationDelegate 协议参考，其中包含我们正在寻找的文档。\n\
    \n花几分钟浏览一下应用委托方法是值得的，这样你就会了解有哪些方法可用。文档浏览器是你的好帮手。在学习 Cocoa 的过程中，你会经常使用它，所以请熟悉它。还有一种更简洁的查看文档的方式：按住\
    \ Option 键单击一个类或方法名，会弹出一个小型文档窗口，显示你点击内容的简短摘要以及相关文档的链接。总的来说，Xcode 中包含的文档是 Cocoa、Xcode\
    \ 以及所有其他苹果开发技术的终极百科全书。**务必查阅文档**（RTFM）！你以后会庆幸自己这么做的。\n\n### 小结\n\n本章在前两章内容的基础上进行了扩展。我们了解了如何通过\
    \ Control 拖拽在 Interface Builder 中建立用户界面元素之间的输出口和目标/动作连接，以及如何在自己的代码中实现动作。我们用不到十行代码构建了一个完整的\
    \ GUI 应用程序。诚然，这个应用程序功能有限，但这些基本理念是 Cocoa 所提供功能的基础，也是 Cocoa 成为如此高效开发环境的原因所在。在下一章中，我们将使用按钮和文本字段之外的更多用户界面元素，并会发现配置和使用它们的方式与本章中按钮和文本字段的使用方式完全相同。\n\
    \n## 第 5 章：GUI 组件\n\n在第 3 章和第 4 章中，我们介绍了在 Interface Builder 中创建用户界面以及使用目标/动作将其连接到\
    \ Xcode 中编写的应用程序代码的一些基础知识。到目前为止，我们仅仅触及了表面，但你应该很高兴地知道，你在前两章中学到的目标/动作系统几乎被 Cocoa\
    \ 中所有的用户界面对象所使用。如果你不太清楚这有什么了不起，你可能想再复习一遍第 3 章，以确保你掌握了目标/动作的概念。\n\n到现在为止，你一定已经注意到了\
    \ Interface Builder 的“对象库”面板中列出的丰富多样的用户界面对象。现在是时候深入挖掘 Cocoa 的锦囊妙计，探索其中的一些类了。Cocoa\
    \ 中可用的用户界面类涵盖了广泛的使用场景，并尽可能为其功能提供一致的 API，因此一旦你学会了如何对一个类进行某种操作，通常就能迅速推测出如何用另一个类实现类似的结果。特别是，你经常使用的许多类都是\
    \ `NSControl` 的子类，而大部分工作都会用到在该类中声明的方法。不同的子类与用户交互的方式不同，但与你自己代码交互的方式基本相同。\n\n本章将介绍\
    \ Cocoa 提供的一些最常见的用户界面类，展示它们的基本用法以及如何在适当的情况下对其进行定制以满足我们的需求。在此过程中，我们还将了解一些辅助性的 Cocoa\
    \ 类，它们可能没有明显的屏幕表现形式，但仍为我们的应用程序提供重要的服务。我们将重点介绍以下类（参见图 5-1，了解这些对象在屏幕上的样式示例）：\n\n\
    - `NSTextField`：许多应用程序的基本文本输入方法。响应按键并渲染文本，为用户提供很大的编辑灵活性。\n- `NSButton`：基本的鼠标触发的\
    \ GUI 组件。尽管在操作和外观上存在差异，但单选按钮、复选框和普通的旧按钮都是 `NSButton` 的实例。\n"
- fmt: '*   `NSPopUpButton`: When we have a set of strings we want the user to choose
    from, an `NSPopUpButton` is often the way to go.

    *   `NSComboBox`: Similar to an `NSPopUpButton`, but with the added advantage
    of allowing the user to enter a value that wasn’t already in the list.

    *   `NSMatrix`: An object that groups a series of similar controls into a single
    unit.

    *   `NSLevelIndicator`: Normally used for displaying a numeric value from a predefined
    range, but they are just as useful for entering data.

    *   `NSImageView`: Users can easily bring an image into the application by dragging
    any image from the Finder or another application and dropping it onto one of these.

    *   `NSTextView`: This is nearly a complete text editor rolled into a single object,
    letting the user edit text with multiple fonts, formatting, rulers, and more.


    ![9781430245421_Fig05-01.jpg](images/9781430245421_Fig05-01.jpg)


    [Figure 5-1](#9781430245421_Ch05.xhtml#_Fig1). A sampling of Cocoa UI elements


    **Note** Throughout this book, we will sometimes use Cocoa class names (e.g. `NSButton`)
    and other times their casual, common names (e.g. button). Normally we’ll use the
    class names when discussing the code and their casual names for most other situations,
    but in both cases we’re really talking about the same things.


    We’ll use these classes to create a simple application that pretends to be a sort
    of database application. The user will be able to edit and create some objects
    by using some simple GUI controls, but the results of the editing won’t be saved
    in any way (that’s where the *pretending* comes in). In later chapters, we’ll
    learn how to use Core Data to save our objects to disk, but for now we’re going
    to focus on the GUI.


    ## Creating the VillainTracker Application


    The application we’ll be creating in this chapter is called `VillainTracker`.
    It’s a simple application for keeping track of super-villains, their last known
    whereabouts, special abilities, and so on. This is the sort of application that
    any superhero team worth its salt will have installed on their computer systems
    and is therefore an obvious first app for a heroes such as ourselves. We’ll split
    the development of `VillainTracker` into two iterations: in the first iteration,
    we’ll create a simple app that enables us to edit information for a single villain,
    and in the second (in [Chapter 6](#9781430245421_Ch06.xhtml)), we’ll add the ability
    to manage a whole list of villains. This will demonstrate the basics of developing
    an application based on the model–view–controller (MVC) design pattern, one that
    developers have been using for years. Whether you have experience with this pattern
    or it’s new to you, it’s important that you get a sense of how MVC is typically
    implemented in Cocoa applications because it’s really a cornerstone of good application
    design in Cocoa.


    As with the previous applications, we’ll start by creating a new application project
    in Xcode. We’ll create the GUI in Interface Builder mode, and then connect it
    to the generated code by creating outlets and actions in the generated class using
    the power of control-drag. Then we’ll go back to Xcode where we’ll learn how to
    write the code to set and retrieve values—the values shown in our GUI controls—one
    class at a time, so we can get a feel for how each of them works. Usually, when
    building Cocoa apps, we’ll move back and forth between constructing and modifying
    the GUI and implementing the code: lay out some UI, implement code behind it,
    see if it does what we expect, and iterate. Since this app is relatively simple,
    we’ll lay out the GUI first and then implement the functionality behind it.


    **Note** Often, when discussing GUI issues, the terms “views” and “controls” will
    be used almost interchangeably. Most of the Cocoa user interface classes are,
    technically, both views and controls, at least in the Cocoa sense.


    `NSView` is a class that allows drawing on the screen; `NSControl` is a subclass
    of `NSView` that extends it by responding to user events, triggering an action
    in a target, and so on. So, a large part of the view layer in our application
    will consist of objects that are “controls,” which of course we don’t want to
    confuse with the controller layer. If this seems puzzling, just try to remember
    that a “control” is a particular kind of view, whereas a “controller” is an object
    in the controller layer that coordinates between view and model objects. After
    a while, it will all make perfect sense, we promise.


    So, let’s create a new application project. As in previous chapters, launch Xcode,
    or switch to it if it’s already running, and press `![image](images/arrow1.jpg)N`,
    or select **New Project** from the **File** menu. In the New Project assistant,
    under OS X on the left, click *Application*; then in the large pane on the right,
    click *Cocoa Application*, then click Next.


    The standard Xcode new project Options panel will prompt us for identifying information
    for our application. Enter “VillainTracker” in the Product Name, and an organization
    name and company identifier of your choice in those two boxes. For the class prefix
    this time, our example will also use the string “VillainTracker.” Ensure that
    *Use Automatic Reference Counting* is checked, and that the other checkboxes are
    left unchecked. Click Next.


    The standard Save panel that we see next lets us navigate to a directory of our
    choice and create a new project there. Use the controls to navigate to a suitable
    spot in your home directory or your desktop, then click Create. Now Xcode creates
    a new folder called `VillainTracker` in the location specified, with some default
    content including the `VillainTracker.xcodeproj` project file, and opens a new
    window showing the settings for our project.


    ## Building the Interface


    We’ll start by creating the GUI for `VillainTracker`, using Interface Builder
    to edit the project’s main nib file. We’ll add GUI controls to capture what we
    need to know about each nemesis and see how to organize the controls into logical
    groupings and make them reposition themselves correctly when their window is resized.
    We’ll also connect them to the controller class, creating outlets in the controller
    and connecting everything together.


    Start by locating the `MainMenu.xib` in Xcode’s Navigator pane (it’ll be on the
    left side of the screen in the Project Navigator pane). Single-click `MainMenu.xib`,
    and it will open up in the central pane of Xcode in Interface Builder mode. We’ll
    see the default set of menus for our new application and several icons in a dock
    to the left of the Interface Builder Editor area—three placeholder objects (File’s
    Owner, First Responder, and Application) and four other objects (Main Menu, Window
    - VillainTracker, VillainTrackerAppDelegate, and Font Manager). Single-click the
    Window - VillainTracker object, and an empty window will open up in the Editor
    area.


    ### Bringing Out the Text Fields


    Now it’s time to start building the GUI. We’ll do this one little piece at a time,
    but refer to [Figure 5-2](#9781430245421_Ch05.xhtml#Fig2) for the completed version
    of the window to get an idea of the layout.


    ![9781430245421_Fig05-02.jpg](images/9781430245421_Fig05-02.jpg)


    [Figure 5-2](#9781430245421_Ch05.xhtml#_Fig2). This is how the complete `VillainTracker`
    window will look


    The first controls we’re going to set up are a couple of `NSTextField`s. `NSTextField`
    is a marvelously useful class that provides text-editing capabilities worthy of
    a full-fledged text editor, even in spots where we are entering just a few characters.
    In the *Object Library* area in the Utility pane on the right side of the Xcode
    window, make sure the *Objects* tab is selected at the top, and inside that select
    either *Object Library* or its child, Cocoa. Then click in the Search field at
    the bottom of the window and type in “text field.”'
