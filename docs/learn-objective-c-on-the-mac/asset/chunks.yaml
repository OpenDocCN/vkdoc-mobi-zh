    seen the two most frequent situations that trigger it: calling a method on a class
    that doesn’t implement that method, and trying to insert `nil` into an array.    Run
    the app again, and get ready for the next problem.    NSRangeException    The
    previous exceptions have been cleared up, but look what happens now:    ``` 2009-09-16
    23:44:33.


    038 ExceptionCity[8881:10b] Total length of all name components: 15 2009-09-16
    23:44:33.065 ExceptionCity[8881:10b] inserted all the objects I could! 2009-09-16
    23:44:33.066 ExceptionCity[8881:10b] found indexed item two 2009-09-16 23:44:33.066
    ExceptionCity[8881:10b] *** -[NSCFArray objectAtIndex:]: index (2137483647( or
