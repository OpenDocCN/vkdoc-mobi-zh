    15-8](#9781430245421_Ch15.xhtml#_Fig8). It’s an unusual place to find a tab view,
    but there it is    A tab view (or any other `NSView` subclass) placed at the top
    level of a nib file won’t be displayed when the nib is loaded, but as long as
    we have an outlet pointing at it, we’ll be able to access it and make use of it
