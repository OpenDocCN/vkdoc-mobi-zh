    have built-in functionality for reading and writing files. This chapter will provide
    an overview of how these mechanisms work.    Implicit File Access    Several classes
    in Cocoa, such as `NSString`, `NSData`, `NSArray`, and `NSDictionary`, provide
    methods for reading data directly from a file, or writing their contents directly
    to a file, using just a string containing the full path to the relevant file.
    For instance, if we want to read the entire contents of a file into a string,
    we can do something as simple as this:    ``` NSError *myError; NSStringEncoding
    encoding; NSString *myString = [NSString stringWithContentsOfFile:@"/path/to/something"
     usedEncoding:&encoding error:&myError]; ```    This code will take care of all
    the busy work of opening the file and reading its contents. It will even tell
    us what text encoding it used to interpret the contents of the file as a character
    string and tell us any errors that occur. But only if we pass in non-`NULL` values
    for the second and third parameters. Apart from file-related errors, such as insufficient
    permissions to access the file, this method can also report back errors related
    to dealing with data as a character string, such as text encoding errors if the
    file contains binary data. Later in this chapter we’ll see this in action.    `NSArray`
    and `NSDictionary` have similar methods, which for some reason don’t include the
    sort of error reporting that `NSString` does, so if they fail, they simply return
    a `nil` pointer and leave you wondering. Those methods are also much more special-purpose,
    since they are designed to read values from files stored in Apple’s special property-list
    format. One common use of `NSDictionary`’s `dictionaryWithContentsOfFile:` class
    method is to read data from a configuration file created in a text editor or in
    Xcode’s plist editor. Cocoa also includes a special-purpose class called `NSPropertyListSerialization`
    for dealing with the property-list format. If we really need to parse a property-list
    in a general way, with complete error reporting and more control, we can use its
    class method `propertyListWithData:options:format:error:` (try saying that five
    times in a row).    Of the classes mentioned at the start of this section, `NSData`
    provides the most general file access. It can read any sort of data from disk
    and represent it as an array of bytes for us to use as we will. This is the ideal
    way of dealing with binary data.


    `NSData` even provides an option for hinting that the file should be mapped into
    virtual memory (in case we know it’s such a large file, we don’t want it all in
    memory at once), like this:    ``` NSData *myData = [NSData dataWithContentsOfFile:@"/path/to/something"
     options:NSDataReadingMappedIfSafe error: &myError]; ```    Each of the classes
    mentioned here also contains a method called `writeToFile``:atomically:` whose
    second parameter is a `BOOL` specifying whether the data should first be written
    to an auxiliary file, which then replaces the original after all data is written.
    The `NSString` version of this method is actually deprecated, so we should use
    `writeToFile:atomically:encoding:error:` instead, which forces us to specify which
    text encoding to use and gives us the chance to inspect any errors that may occur.
    `NSData` provides the similar `writeToFile:options:error:`, which also gives us
    a chance to see any errors that occur when writing to a file.    High-Level File
    Operations    Besides the basics of reading and writing files, Cocoa provides
    a number of classes that let us deal with files in ways similar to how the Finder
    deals with files. We can get access to file-system attributes, get the file’s
    icon, see which application will open this file by default, and more. The rest
    of this chapter will explore some of these capabilities in the context of a new
    application called “What About That File?” (see [Figure 16-1](#9781430245421_Ch16.xhtml#Fig1)).    ![9781430245421_Fig16-01.jpg](images/9781430245421_Fig16-01.jpg)    [Figure
    16-1](#9781430245421_Ch16.xhtml#_Fig1) .  The completed “What About That File?”
    application    This application lets the user choose a file, at which point some
    information about the file is shown, as well as the file’s contents in the form
    of a string. If the file contains data that can’t be represented as a character
    string, it will tell the user so. Otherwise, the user can use an included pop-up
    list to change the text encoding that is used when reading the file from disk
    and show the resulting string.    What About That File: The Code    Use Xcode
    to make a new Cocoa application (no Document support or Core Data this time) named
    *WhatAboutThatFile*, and do the usual steps of making sure ARC is enabled and
    assigning a class prefix to the project, in this case WAT. This creates a simple
    project with nothing more than a `WATAppDelegate` class and a xib file called
    *MainMenu.xib*. In previous chapters, we’ve assembled applications one step at
    a time, but now that we’re this far along, let’s take on bigger chunks of application
    code. We’ll present the complete code of the application, with some commentary
    interspersed, and then describe how to wire up everything in Interface Builder
    using Cocoa bindings. For starters, here’s the header file of the app delegate,
    which declares a large number of properties used for accessing values through
    Cocoa bindings. It also declares an action method that will let the user open
    a file from the menu.    ``` // //  WATAppDelegate.h //  #import <Cocoa/Cocoa.h>  @interface
    WATAppDelegate : NSObject <NSApplicationDelegate>  @property (assign) IBOutlet
    NSWindow *window;  @property (strong) NSFileWrapper *fileWrapper; @property (strong)
    NSURL *fileURL; @property (assign) NSStringEncoding chosenEncoding;  @property
    (readonly) NSDictionary *fileAttributes; @property (readonly) NSString *filename;
    @property (readonly) NSImage *fileIcon; @property (readonly) NSImage *opensAppIcon;
    @property (readonly) NSString *opensAppName; @property (weak) NSString *stringEncodingName;
    @property (readonly) NSString *fileStringValue; @property (readonly) NSDictionary
    *encodingNames;  - (IBAction)chooseFile:(id)sender;  @end ```    Now let’s move
    on to the `.m` file. By default, this contains the `applicationDidFinishLaunching:`
    method, but we don’t need to configure anything when the app runs, so we can just
    ignore that and go on with our own business.'
