    object value will get us a nil.    It’s common practice to set up these values
    in a method that is called early in the application’s startup phase, typically
    in a class that is included in the main nib. The initialize class method is a
    good place for this since it’s called exactly once for each class, the first time
    a class is accessed. It’s bad form to try to access other application objects
    at initialize time since we don’t know how far the startup process has progressed,
    but we don’t need to do that here. Create such a method in our `DungeonThingAppDelegate.'
  trans: "\n![9781430245421_Fig07-08.jpg](img/9781430245421_Fig07-08.jpg)  \n图 7-8。我们已为主窗口创建了三组视图中的第一组。框内的文本字段被高亮显示，只是为了让我们能看到它的位置。\n\
    \n现在，点击窗口任意位置，然后按 `![images](img/arrow3.jpg)A` 选择窗口中的所有对象，从而选中我们刚刚创建的所有视图。按 `![images](img/arrow3.jpg)D`\
    \ 复制它们，这会显示一组与原始对象完全相同、重叠且位置略有偏移的新对象。将这组对象拖动到窗口中央，使用蓝色参考线确保它们与原始对象保持相同的垂直位置，并且框之间有合适的水平间距。然后再次按\
    \ `![images](img/arrow3.jpg)D`，并将第三组对象拖动到窗口右侧，再次使用蓝色参考线帮助正确放置它们。最后，双击两个新按钮，分别将其标题更改为“生成怪物”和“生成地牢”。同样，根据大小限制条件的设置方式，我们可能需要将框的大小重新设为\
    \ 227 x 247。图 7-9 显示了窗口现在应有的样子。\n\n![9781430245421_Fig07-09.jpg](img/9781430245421_Fig07-09.jpg)\
    \  \n图 7-9。DungeonThing 的完整主窗口\n\n## 设置 DungeonThingAppDelegate\n\n既然初始绑定已完成，主窗口也已设置好，我们可以将各个部分连接到\
    \ `DungeonThingAppDelegate`。通过点击工具栏中标记为“Editor”的图标组里那个类似管家的小图标（或使用键盘快捷键），打开一个辅助编辑器（`![image](img/arrow2.jpg)↵`）窗格，然后从跳转栏中选择\
    \ `DungeonThingAppDelegate.h`。一次一个地，按住 Control 键从“生成角色”按钮下方的框中的标签拖动到辅助编辑器中的 `DungeonThingAppDelegate.h`\
    \ 文件，拖到预定义的窗口 `@property` 下方。到达时，会出现一个小窗口，提示可以创建新的输出口或操作。释放鼠标，创建一个名为 `characterLabel`\
    \ 的新输出口。对窗口中其他两个框中的标签执行相同操作，分别创建名为 `monsterLabel` 和 `dungeonLabel` 的新输出口。\n\n\
    然后，按住 Control 键分别从三个按钮拖动到辅助编辑器中的 `DungeonThingAppDelegate.h` 文件，并创建名为 `createCharacter:`、`createMonster:`\
    \ 和 `createDungeon:` 的新操作。此时，应该清楚哪个操作对应哪个按钮。除了将输出口和操作添加到 `DungeonThingAppDelegate.h`\
    \ 文件外，这还会在 `DungeonThingAppDelegate.m` 文件中为这些操作添加方法存根。\n\n## 定义常量\n\n至此，GUI 已完成，相关的绑定都已配置好，这样“偏好设置”窗口中的控件都能将其值保存到用户的应用程序偏好设置中。剩下的工作就是编写操作方法，这些方法将使用\
    \ `NSUserPreferences` 来检索偏好设置值并显示它们。如前所述，我们不会真正使用这些值来生成游戏物品描述，但如果愿意，以后可以自行添加这一增强功能。\n\
    \n让我们从定义一些常量开始，就像我们在之前的示例中所做的那样（如果你忘记了，请参阅第 4 章中对这样做好处的讨论）。以下是与我们在 nib 文件中已设置的偏好设置键名相对应的所有常量。将这些代码插入到\
    \ `DungeonThingAppDelegate.m` 的顶部某处：\n\n```\n#define kCharacterMaxNameLength @\"\
    characterMaxNameLength\"\n#define kCharacterStatsGenerationPolicy \\\n  @\"characterStatsGenerationPolicy\"\
    \n#define kCharacterClassAllowedPaladin @\"characterClassAllowedPaladin\"\n#define\
    \ kCharacterClassAllowedBard @\"characterClassAllowedBard\"\n#define kCharacterClassAllowedFighter\
    \ @\"characterClassAllowedFighter\"\n#define kCharacterClassAllowedCleric @\"\
    characterClassAllowedCleric\"\n#define kCharacterClassAllowedRogue @\"characterClassAllowedRogue\"\
    \n#define kCharacterClassAllowedMonk @\"characterClassAllowedMonk\"\n#define kCharacterClassAllowedMagicUser\
    \ \\\n  @\"characterClassAllowedMagicUser\"\n#define kCharacterClassAllowedThief\
    \ @\"characterClassAllowedThief\"\n\n#define kMonsterBootyFrequency @\"monsterBootyFrequency\"\
    \n#define kMonsterTypeAllowedOrc @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin\
    \ @\"monsterTypeAllowedGoblin\"\n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\
    \n#define kMonsterTypeAllowedSkeleton @\"monsterTypeAllowedSkeleton\"\n#define\
    \ kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\n#define kMonsterTypeAllowedVampire\
    \ @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus @\"monsterTypeAllowedSuccubus\"\
    \n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\n\n#define\
    \ kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
    \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
    \n```\n\n**注意**  *为适应图书版式限制，同时仍展示有效代码，我们通过将反斜杠作为行末最后一个字符的方式对其中一些行进行了换行，这使得 C 预处理器将下一行的内容拼接过来，就好像它们原本就在同一行一样。你可以在自己的代码中省略这种手动换行，将每个\
    \ `#define` 都写成一行声明。*\n\n## 指定默认偏好设置值\n\n常量定义完成后，我们就可以开始编码了。在实现操作方法之前，我们需要先了解一下\
    \ `NSUserDefaults`。如前所述，这个类让我们可以像操作哈希表或字典一样存储和检索用户的应用程序偏好设置，键是我们自己选择的字符串。每个应用程序都应该做的一件事情是为\
    \ `NSUserDefaults` 创建一组默认值，这样在用户尚未为某个给定键设置值时，系统会使用这些默认值作为后备。例如，假设我们想存储一个值范围在 1\
    \ 到 10 之间的整数，使用的键是 `@\"greatness\"`。为 `@\"greatness\"` 键设置默认值 1，可以确保用户首次运行应用程序时，当\
    \ `NSUserDefaults` 试图检索 `@\"greatness\"` 值时，它会找到我们在代码中指定的默认值（1）。如果不这样做，检索任何尚未被用户设置过的数值都会返回\
    \ 0，而检索任何未设置过的对象值则会返回 nil。\n\n常见的做法是在应用程序启动阶段早期调用的方法中设置这些值，通常是在包含在主 nib 文件中的类里进行。类方法\
    \ `initialize` 是一个适合做这件事的地方，因为它对每个类只调用一次，且是在该类首次被访问时。在 `initialize` 方法中尝试访问其他应用程序对象是不好的做法，因为我们不知道启动过程进展到了哪一步，但在这里我们不需要这样做。在我们的\
    \ `DungeonThingAppDelegate` 中创建这样一个方法。\n"
