    ## Preface


    I first encountered Cocoa as a college student in about 1989. Of course, that
    was before the iPhone, before Mac OS X, and before it was even called Cocoa. Back
    then, the seed of today’s Cocoa was a part of NeXTStep, the OS that was the core
    of the NeXT computers. NeXTStep was years ahead of its time, and while the lab
    full of NeXT workstations was woefully underused in the computer science courses,
    my student sysadmin job had me using them daily. As a user, I was hooked. I won’t
    dwell on the NeXT user experience here, but I’ll just state that many of the best
    features of Mac OS X come not so much from the Mac of old as from NeXTStep.


    At that time, there was no www, not much of a NeXTStep developer community, and
    very little written about the development environment apart from the impenetrable
    tomes that NeXT shipped with its earliest machines. I tried to wrap my head around
    Objective-C and the AppKit from time to time, but without any nearby experts or
    much example code to look at (not to mention my actual studies, which sometimes
    distracted me from playing with fun projects), I was basically stumped.


    After college, something completely unexpected happened. A friend pointed me in
    the direction of a consulting firm in my city that was building custom NeXTStep
    apps for some pretty big customers, and I had the good fortune to come onboard.
    Suddenly, I had a group of colleagues who had not only been programming in NeXTStep
    for a while, some of them had even worked at NeXT! And one of them was Peter Clark.
    All it took was a bit of their expert help to get me started, and the things that
    had seemed so mysterious for years suddenly made sense. Within a few weeks I learned
    so much that I was able to start leading some training and mentoring efforts in
    NeXTStep development.


    The point here isn’t that I’m a genius or a quick study. It’s that the set of
    technologies we now call Cocoa is really powerful—and quite easy to learn and
    put to good use—but you’re likely to need some help along the way. I’m hoping
    that this book will help nudge you in the right direction and help you learn the
    essence of Cocoa programming, so that by the time you’re finished reading it,
    you’ll have enough knowledge of Cocoa to be able to propel yourself forward and
    write the Mac applications of your dreams. In short, the kind of book I wish I’d
    been able to find 20 years ago.


    —Jack Nutting


    ---


    ## About the Authors


    **Jack Nutting** has been using Cocoa since the olden days, long before it was
    even called Cocoa. He’s used Cocoa and its predecessors to develop software for
    a wide range of industries and applications including gaming, graphic design,
    online digital distribution, telecommunications, finance, publishing, and travel.
    When he’s not working on Mac or iOS projects, making killer games with Unity3D,
    or rocking out in his punk rock band, he’s usually spending time with his family.
    Jack is `@jacknutting` on Twitter and blogs from time to time at `www.nuthole.com`.
    (Photograph courtesy of Alison De Mars von Blixen.)


    **Peter Clark** started with NeXTStep in college, circa 1990. That experience
    set the tone for the first half of his career when he worked with Jack at a consulting
    company in the Twin Cities. He worked with companies in the Bay Area, Chicago,
    and Twin Cities on NeXTStep and WebObjects projects, wrote a book on OpenStep
    development, and then moved on to Java, .NET, Ruby, and Scala development and
    managing engineering teams. He’s pleased that so many of the design patterns from
    NeXTStep are still useful today and finds that Cocoa development is a mix of comfort
    and pleasant surprises. Peter is currently the Director of Software Development
    for a research project at the University of Minnesota. He blogs occasionally at
    `http://blog.pclark.net` and can be found on Twitter as `@pclark`. Peter wants
    you to know that he started using NeXTStep at least a month or two before Jack
    did. (Photograph courtesy of Wade Stebbings.)


    ---


    ## About the Technical Reviewer


    **Nick Waynik** has been working in the IT field for over thirteen years and has
    done everything from network administration to web development. He started writing
    iOS apps when the SDK was first released. Since then he has gone on to start his
    own business, focusing on iOS development. He loves spending his free time with
    his wife, Allison, and son, Preston, and sometimes playing golf. He blogs at `nickwaynik.com`
    and can be found on Twitter as `@n_dubbs`.


    ---


    ## Acknowledgments


    There are many people to thank when getting a book from concept to the paper (or
    e-book) that you’re reading. There’s a lot to be done besides just getting words
    and code snippets into a text editor. Douglas Pundick and Jill Balzano at Apress
    have helped keep many of those things on track, out of sight from the authors.
    Of course, keeping the authors on track is also important, and we kept them busy
    at that too. Nick Waynik, our technical reviewer, caught many small (and some
    not-so-small) details with both the code and the prose, and always had a good
    reason for suggesting a change. Mary Behr, our copyeditor, did a wonderful job
    of tightening our prose, polishing our grammar, and making sure that what you’re
    reading hangs together cleanly. In her hands, many an awkward sentence got refactored
    into something better.


    We’d like to thank the developers at Apple for producing tools worth writing about.
    The writer at `www.swampfoetus.net` did a great writeup for readers of the first
    edition about the changes in Xcode 4 dealing with Core Data using the MythicalPerson
    sample app from the first edition, and I want to thank him for caring enough to
    write that and make it public. The other authors of the first edition, David Mark
    and Jeff LaMarche, left us with a solid foundation upon which to build. Thanks,
    gentlemen! We’re sure we’re missing plenty of people who richly deserve to be
    thanked for making this book good. The blame for the remaining bad parts rests
    solely with the authors.'
