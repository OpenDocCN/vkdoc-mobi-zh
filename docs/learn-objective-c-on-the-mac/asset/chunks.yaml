    indexed item %@", array[indexOfTwo]);     }            // But, what if we try
    to find the index for something that''s not     // there?     NSUInteger indexOfFive
    = [array indexOfObject:@"five"];            if (indexOfFive != NSNotFound) {         //
    And we forget to check the return value to make sure it''s not         // NSNotFound?
            NSLog(@"found indexed item %@", array[indexOfFive]);     } } ```    Make
    those changes, run the app, and note the reward of the congratulatory alert panel.
    Oh, sweet success!    Having tackled those, we’ve now experienced and fixed the
    main types of runtime exceptions that every Cocoa programmer gets at some point.
    That’s it!'
  trans: "\n我们还可以利用左下角的变量视图来查看当前可用的变量。例如，点击 `nameComponents` 变量旁的展开三角形，查看其内容。在本例中，结构非常简单：我们的数组包含一个\
    \ `NSNumber`，而它没有 `length` 方法。\n\n此时，我们需要决定如何修复这个问题。我们仍希望实现同一个基本算法：累加每个组件中字符串的长度；我们只需确保将\
    \ `NSNumber` 的值（此处为 `3`）转换为字符串（`@\"3\"`）。这时可以使用 `description` 方法，该方法定义在 `NSObject`\
    \ 上，因此所有 Cocoa 对象都可使用。顺便提一下，当你使用 `po` 命令查看对象值时，lldb 调用的正是 `description` 方法。对于大多数类，调用\
    \ `description` 会得到由 `NSObject` 实现定义的结果（通常类似 `<NameOfObjectClass: 0x10cdb0>`），但某些类（如\
    \ `NSString` 和 `NSNumber`）会重写该方法以返回其他内容。`NSString` 的实现直接返回自身，而 `NSNumber` 的实现则将数值转换为\
    \ `NSString` 并返回。\n\n因此，为了让程序正常工作，请修改 `invalidArgumentException_unrecognizedSelector`\
    \ 方法，将 `for` 循环内的那一行改为以下内容：\n\n```\nnameComponentLength += [[component description]\
    \ length];\n```\n\n由于我们知道 `NSObject`（以及所有对象）都实现了 `description` 方法并返回一个字符串，因此这个调用现在总能成功。即使有人混入了其他类型的对象，无法像\
    \ `NSString` 和 `NSNumber` 那样返回简洁紧凑的结果，至少我们知道这个方法是存在的，并且会被调用！\n\n完成修改后，重新运行应用，查看\
    \ Xcode 输出控制台显示的内容。\n\n```\n2013-02-10 23:51:08.291 ExceptionCity[71675:303] Total\
    \ length of all name components: 15\n(lldb)\n```\n\n哎呀，又出错了！我们的应用执行了一些代码，触发了另一个异常。由于我们已经设置了异常断点，程序就此暂停，并返回到\
    \ lldb 提示符。和之前一样，在调试导航器中选择顶层栈帧（`objc_exception_throw`），然后再次在 lldb 提示符下输入一些命令，获取异常的相关信息：\n\
    \n```\n(lldb) po $rax\n$0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]:\
    \ object cannot be nil\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a30 NSInvalidArgumentException\n\
    ```\n\n如果我们沿着调用栈向下查看，寻找第一个显示为黑色而非灰色的位置，会发现 `-[ECAppDelegate invalidArgumentException_insertNil]`，这正是触发异常的那段代码所在位置。点击该行，代码编辑器窗口会高亮显示\
    \ `invalidArgumentException_insertNil` 中的这一行：\n\n```\n[array addObject:object2];\n\
    ```\n\n查看该行上方的代码，问题出现了：`object2` 是一个指向 `nil` 的指针，而 `NSMutableArray` 不允许我们向其中插入\
    \ `nil`。在复杂的应用中，你可能需要追踪根本原因（空指针从何而来？`nil` 对该变量而言是否是有效值？），但在本例中，我们只需在添加对象前添加一项安全检查即可解决该问题，如下所示：\n\
    \n```\nif (object2 != nil) {\n    [array addObject:object2];\n}\n```\n\n这样就解决了问题。`NSInvalidArgumentException`\
    \ 是 Cocoa 中最常遇到的异常之一，而刚才我们见到的正是触发它的两种最常见情况：对未实现该方法的类调用方法，以及试图向数组中插入 `nil`。\n\n\
    再次运行应用，准备迎接下一个问题。\n\n### NSRangeException\n\n之前的异常已经解决，但看看现在发生了什么：\n\n```\n2009-09-16\
    \ 23:44:33.038 ExceptionCity[8881:10b] Total length of all name components: 15\n\
    2009-09-16 23:44:33.065 ExceptionCity[8881:10b] inserted all the objects I could!\n\
    2009-09-16 23:44:33.066 ExceptionCity[8881:10b] found indexed item two\n2009-09-16\
    \ 23:44:33.066 ExceptionCity[8881:10b] *** -[NSCFArray objectAtIndex:]: index\
    \ (2137483647( or possibly larger)) beyond bounds (3)\n2013-02-10 23:57:55.575\
    \ ExceptionCity[71731:303] Total length of all name components: 15\n2013-02-10\
    \ 23:57:55.576 ExceptionCity[71731:303] inserted all the objects I could!\n2013-02-10\
    \ 23:57:55.576 ExceptionCity[71731:303] found indexed item two\n(lldb)\n```\n\n\
    由于又一个异常，程序再次暂停。和之前一样，在调试导航器中点击 `objc_exception_throw` 行，检查异常以找出问题。\n\n```\n(lldb)\
    \ po $rax\n$0 = 4300330528 *** -[__NSArrayI objectAtIndex:]: index 9223372036854775807\
    \ beyond bounds [0 .. 2]\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a10 NSRangeException\n\
    ```\n\n天哪！这个索引值可真大。现在查看调用栈，点击我们代码中最高层的项目：`-[ECAppDelegate rangeException]`。这将高亮显示文本编辑器中的以下行：\n\
    \n```\nNSLog(@\"found indexed item %@\", array[indexOfFive]);\n```\n\n这一行实际上调用了两个方法：首先是\
    \ `objectAtIndex:` 方法（内含于 Apple 从 Xcode 4.5 开始引入的新 Objective-C 数组访问器语法中），然后调用\
    \ `NSLog` 函数。快速查看调用栈可以发现，`objectAtIndex:` 方法正在报错。显然，它不喜欢 `indexOfFive` 中包含的值。如果我们在变量视图中查看，或者输入\
    \ `p indexOfFive`（注意对标准 C 类型使用 `p`，而对 Objective-C 对象使用 `po`），将会看到 `9223372036854775807`。这个值确实有点大！如果查看设置该值的代码（就在上面两行），我们会看到这样一行：\n\
    \n```\nNSUInteger indexOfFive = [array indexOfObject:@\"five\"];\n```\n\n这行代码向\
    \ `array` 询问一个它实际上并不包含的对象的索引。在这种情况下，`NSArray` 会返回一个名为 `NSNotFound` 的特殊整数值，它被定义为可能的最大整数值。在\
    \ 64 位模式下运行的 Mac OS X 上，该值就是 `9223372036854775807`。这个值用于告知调用者：“嘿，你想查找索引的那个对象？我这里没有。”了解这一点非常有用！这意味着，每当我们从\
    \ `indexOfObject:` 获取结果时，都必须检查它是否是 `NSNotFound`。在本例中，我们确切地知道问题出在哪里，因此可以直接检查第二次调用，但养成始终检查返回值的习惯是件好事，所以我们将整个方法更新如下：\n\
    \n```\n- (void)rangeException {\n    // 假设我们有一个数组...\n    NSArray *array = @[@\"\
    one\", @\"two\", @\"three\"];\n\n    // ... 我们可以询问某个项目的索引...\n    NSUInteger indexOfTwo\
    \ = [array indexOfObject:@\"two\"];\n\n    if (indexOfTwo != NSNotFound) {\n \
    \       // ... 之后我们可以使用相同的索引检索该值。\n        NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
    \    }\n\n    // 但是，如果我们尝试查找不存在的对象的索引会怎样？\n    NSUInteger indexOfFive = [array\
    \ indexOfObject:@\"five\"];\n\n    if (indexOfFive != NSNotFound) {\n        //\
    \ 并且我们忘记检查返回值以确保它不是 NSNotFound？\n        NSLog(@\"found indexed item %@\", array[indexOfFive]);\n\
    \    }\n}\n```\n\n完成这些修改，运行应用，然后注意到祝贺弹窗的奖励。哦，甜蜜的成功！\n\n解决了这些问题后，我们已经经历并修复了每个 Cocoa\
    \ 程序员在某个阶段都会遇到的主要运行时异常类型。仅此而已！\n"
- fmt: "This may come as a surprise to people come from other, more exception-heavy\
    \ environments, but like we said, in Cocoa exceptions are used sparingly and almost\
    \ always to signal that the programmer has made an error. `NSRangeException` and\
    \ `NSInvalidArgumentException` (for both of the causes shown above) really make\
    \ up the bulk of all exceptions you’re likely to deal with.\n\n## And the Rest\n\
    \nOkay, there are more exceptions that can be raised in a Cocoa app. There are\
    \ more predefined exception names in `NSException.h`, for example, but chances\
    \ are you won’t encounter any of them. `NSGenericException` seems to arise sometimes\
    \ when working with SQLite or Apple Events, and on rare occasions `NSInternalInconsistencyException`\
    \ can rear its ugly head if you override a method that you shouldn’t (such as\
    \ when the documentation warns you not to), but real-world examples of those are\
    \ pretty hard to come by.\n\nThe one instance where you’re likely to see any exceptions\
    \ occur is if you’re using Apple’s Distributed Objects (DO) technology, which\
    \ uses exceptions in a much more liberal fashion than the rest of Cocoa. For example,\
    \ DO will raise exceptions to warn you if it loses a connection to the process\
    \ you’re connected to. Most of the predefined exception names defined by Cocoa,\
    \ in fact, are specifically for DO’s use. We’re not describing the use of DO in\
    \ this book, so we won’t say anything more about these exceptions, but it’s good\
    \ to be aware of in case you go down that path at some point.\n\n## Worse than\
    \ Exceptions: Death by Signal\n\nNow that we’ve seen how some bugs can be handled\
    \ by code-level operations like catching an exception, it’s time to look at another\
    \ kind of problem that arises when object pointers are misused. In Cocoa, every\
    \ Objective-C object is referenced through a pointer to a specific sort of C struct\
    \ that defines the basic structure of an Objective-C object. If the pointer isn’t\
    \ pointing either at a chunk of memory containing a valid object, or at nil, then\
    \ some form of memory access error is almost certain to occur, leading to the\
    \ creation of a *signal* that ultimately kills our app.\n\nThere are two ways\
    \ that Cocoa programmers inadvertently cause a signal to kill their app. The first\
    \ way is to try to send a message to an uninitialized object pointer. By default,\
    \ when we declare a new pointer as a local variable in an Objective-C method,\
    \ we can’t count on it to automatically point at nil or some other harmless thing.\
    \ In fact, we can often count on it pointing at something completely inappropriate,\
    \ like a memory address that is not even mapped into the system (the situation\
    \ is different for instance variables, static local variables, and global variables,\
    \ which are in fact initialized with nil values).\n\nIt’s hard to trigger this\
    \ behavior intentionally with an uninitialized pointer, since it’s always possible\
    \ that such a pointer just happens to contain a zero, which evaluates to nil,\
    \ which is of course a valid message recipient. We can set up the situation artificially,\
    \ however, by adding the following method to the app delegate:\n```\n- (void)uninitializedObject\
    \ {\n    NSMutableString *string = (__bridge NSMutableString *)(void *)0xdeadbeef;\n\
    \    [string appendFormat:@\"foo\"];\n}\n```\nBecause we’re using ARC, which is\
    \ very smart about these things, we have to jump through some hoops to actually\
    \ insert garbage into our pointer, first casting it to `void*` and then to `NSMutableString*`.\
    \ The addition of the `__bridge` qualifier tells the compiler to ignore the memory-management\
    \ implications of this assignment.\n\nNow we have an `NSMutableString` pointer\
    \ that is pointing at a garbage memory location. So when it tries to call the\
    \ `appendFormat:` method, the receiver isn’t a valid object, which will lead to\
    \ trouble. To see the effect of this, add this line to the `applicationDidFinishLaunching:`\
    \ method:\n```\n[self uninitializedObject];\n```\nRun the app, and watch.\n\n\
    The program will halt, displaying something similar to [Figure 13-5](#9781430245421_Ch13.xhtml#Fig5).\n\
    \n![9781430245421_Fig13-05.jpg](images/9781430245421_Fig13-05.jpg)\n\n[Figure\
    \ 13-5](#9781430245421_Ch13.xhtml#_Fig5) . The program stops upon receiving a\
    \ signal\n\nDepending on exactly what this garbage pointer is pointing at, you\
    \ may see a different signal name, such as `SIGSEGV` or `SIGILL`. As a bonus bit\
    \ of wrongness, it’s even possible that it could be pointing at some other, valid\
    \ object in our program, perhaps even an `NSMutableString`, making it extra-insidious\
    \ to track down. The specifics don’t really matter; the point is that we’ve got\
    \ an uninitialized pointer (or in this specific case, just for demonstration purposes,\
    \ a pointer to a bad memory location). This problem is easily solved by applying\
    \ a general rule: whenever you declare an Objective-C object pointer inside a\
    \ method, immediately assign it a value, even if it’s just nil.\n\nSo, fix this\
    \ by changing the string declaration line to this:\n```\nNSMutableString *string\
    \ = nil;\n```\nBuild and run the app, and off we go. It’s perfectly okay to send\
    \ a message to a nil pointer in Objective-C (it’s basically a non-operation, and\
    \ the return value from a nil message is typically nil, 0, or NO), so, although\
    \ the fixed version of the method won’t actually *do* anything, it won’t cause\
    \ a crash either.\n\nNow, there’s one more source of memory problems that we should\
    \ mention here: sending a message to an object that’s already been freed. Throughout\
    \ this book, we’ve been using ARC for every app we’ve created, which virtually\
    \ eliminates this kind of bug entirely, but in case you’re working at some point\
    \ on a project with manual reference counting (using retain and release) it’s\
    \ good to know what causes this type of problem.\n\nWithout ARC, memory management\
    \ for Objective-C objects is handled with manual reference counting. To make a\
    \ long story short: any time we create an object with an `alloc` or `copy` method,\
    \ or mark an object as being “in use” by sending it a `retain`, its retain count\
    \ is increased. We must at some point (when we’re done with the object) send the\
    \ object a `release` or `autorelease` message, either of which will decrease its\
    \ retain count. When the retain count hits zero, the object is freed.\n\nWhen\
    \ we’re using ARC, the same `retain` and `release` calls are built into our app,\
    \ but instead of us putting it into our source code, the compiler does it for\
    \ us. It turns out that computers are better than we are at consistently following\
    \ the `retain`/`release` rules!\n\nIf we’re not using ARC, the problem that can\
    \ arise is that if we don’t do this quite right, we may end up in a situation\
    \ where a variable contains a pointer to a space in memory that was formerly occupied\
    \ by a “live” object, but now may contain a freed object, or may have been reused\
    \ for some other purpose. ARC is so good at dealing with this issue that it’s\
    \ really quite difficult to construct a situation where it occurs with ARC enabled.\
    \ So for the next demonstration, let’s switch ARC off temporarily. To do this,\
    \ select the top-level *ExceptionCity* item in the project navigator, then select\
    \ the Build Settings tab. Use the search field at the top to search for “automatic,”\
    \ and then turn off *Objective-C Automatic Reference Counting*. [Figure 13-6](#9781430245421_Ch13.xhtml#Fig6)\
    \ shows what this looks like.\n\n![9781430245421_Fig13-06.jpg](images/9781430245421_Fig13-06.jpg)\n\
    \n[Figure 13-6](#9781430245421_Ch13.xhtml#_Fig6) . Messing with the build settings.\
    \ You know you want to\n\nNow add the following method to the app delegate class.\
    \ This exhibits a simplified version of some bad behavior that could have gotten\
    \ us into trouble pre-ARC.\n```\n- (void)freedObject {\n    NSString *object =\
    \ [[NSString alloc] initWithCString:\"hi there\"\n                           \
    \                     encoding:NSUTF8StringEncoding];\n    [object release];\n\
    \    NSLog(@\"Where is my object?"
