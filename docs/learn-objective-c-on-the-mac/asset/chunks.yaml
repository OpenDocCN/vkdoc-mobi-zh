  trans: '

    通过将相关控件分组到*方框视图*中，我们可以对界面进行一些改进；Cocoa 提供了一个名为 `NSBox` 的类，它可以包含多个其他对象，并在它们周围绘制一个漂亮的边框。Xcode
    包含一个便捷的快捷方式，可以让我们将现有视图放入一个大小恰好能容纳所有视图且边框精确匹配的方框中，因此为界面添加这一增强功能非常容易。


    首先，选中前五个控件（位于窗口左上角）及其所有标签。最简单的操作方式是：点击窗口左上角（就在窗口的关闭/最小化/最大化控件下方），然后拖出一个选择框，框选我们想要选择的所有视图。接着从菜单中选择
    **Editor** ![image](img/arrow.jpg) **Embed In** ![image](img/arrow.jpg) **Box**——一个漂亮的方框会环绕它们，带有深灰色背景和圆角。方框顶部有一个文本标签（显示为“Box”），可以编辑成描述方框内容的文字。双击该文本，将其改为“Basic
    Information”。


    接下来对“Primary Motivation”部分执行相同的操作。首先，选中标签并按下 Backspace 或 Delete 键将其删除。由于我们即将创建的方框中只有一组控件，我们可以直接使用方框的标题。现在选中单选按钮矩阵，再次从菜单中选择
    **Editor** ![image](img/arrow.jpg) **Embed In** ![image](img/arrow.jpg) **Box**。我们的单选按钮现在被包含在一个方框中。将方框的标签改为“Primary
    Motivation”。


    对 mugshot 部分重复这些步骤：先删除现有标签，然后通过菜单创建方框，最后将方框的标签设置为“Appearance”。


    接下来处理 powers and abilities。选中“Source of Powers”弹出按钮及其标签，以及能力（Abilities）部分的复选框矩阵。同样，最简单的方法可能是“画一个框”：在窗口右上角附近的背景处点击，然后向左下方拖动，直到所有相关项目都被选中。使用菜单将这些视图放入一个方框中，并将方框标题设为“Powers
    and Abilities”。


    最后，选中为 villain 的 notes 属性创建的文本视图，将它放入一个单独的方框中，标题设为“Notes”。


    现在我们已经创建了一堆方框，但它们可能彼此重叠，并且相对位置通常不太理想（如图 5-12 所示）。


    ![9781430245421_Fig05-12.jpg](img/9781430245421_Fig05-12.jpg)


    图 5-12. 并非我们见过的最佳方框布局


    别担心；Xcode 的蓝色辅助线会帮助我们迅速将其整理整齐。从左上角的第一个方框开始。点击方框深色背景的任意位置（但不要点击控件或标签），然后拖动整个方框。当我们稍微移动它时，蓝色辅助线就会出现。这些辅助线可以帮助我们相对于彼此或相对于窗口本身来定位方框或任何视图。我们总可以通过沿着辅助线追踪到其末端，看它与什么相连，来判断辅助线正在对齐什么。当辅助线一直延伸到窗口边缘时，我们就知道它正在帮助我们设置距窗口边缘的推荐距离。


    接着处理“Primary Motivation”方框，将其与上方方框的左边缘对齐，并保持在其下方几个像素的位置，同样利用辅助线来精确调整。然后处理“Appearance”方框，使其在垂直方向上与“Primary
    Motivation”方框对齐，在水平方向上与“Basic Information”方框的右边缘对齐。


    继续处理其他方框，将“Powers and Abilities”方框对齐到已排好方框的右侧，然后将“Notes”方框放在所有方框的下方。


    如果在移动过程中空间不足，或者你的窗口远大于所有其他视图的总尺寸，请适当调整窗口大小以容纳所有内容。


    通过将“Notes”方框移入右下角留下的空隙中来完成此步骤，并调整其内部的 `NSTextView` 大小以适应新的边界和边距，同时也许还需要微调其他一些方框的尺寸，使它们能够整齐地排列在一起。图
    5-13 展示了理想效果。如果尚未保存，请务必保存 nib 文件！


    ![9781430245421_Fig05-13.jpg](img/9781430245421_Fig05-13.jpg)


    图 5-13. 终于，一个值得骄傲的窗口布局！


    ## 调整大小


    现在我们已经有了一个漂亮的窗口，但还需要做一些额外工作来确保一切行为正常：我们需要能够处理用户调整窗口大小的情况。要理解为什么这甚至是有必要的，可以通过从
    **Editor** 菜单中选择 **Simulate Document** 来测试界面。现在调整窗口大小，看看会发生什么。按照我们目前的布局，当垂直调整窗口大小时，所有控件都会保持原位，但我们可以将窗口垂直缩小到某些控件不可见的地步，并且我们根本无法水平调整窗口大小。（根据你跟随操作时布局控件的方式，调整大小的行为可能会有所不同。）我们将在下一章更深入地探讨调整大小。现在，我们将通过将窗口的最小和最大尺寸设为相同值，使窗口不可调整大小，然后继续编写代码。


    Xcode 使这变得很容易。在 Interface Builder Editor 画布中选中 VillainTracker 窗口后，选择 *尺寸检查器* (![image](img/arrow2.jpg)5)。当前尺寸、最小尺寸和最大尺寸所给出的宽度和高度值应全部相同。勾选
    *最小尺寸* 和 *最大尺寸* 约束对应的复选框，如图 5-14 所示。


    ![9781430245421_Fig05-14.jpg](img/9781430245421_Fig05-14.jpg)


    图 5-14. 设置窗口的尺寸约束


    ## 连接 VillainTrackerAppDelegate 类


    当我们创建 VillainTracker 项目时，Xcode 创建了一个名为 `VillainTrackerAppDelegate` 的类。我们将向这个类中添加代码，使其与用户界面控件连接起来，从而在模型-视图-控制器（MVC）的意义上成为一个“控制器”。更复杂的应用程序很可能会有多个控制器类，但对于像这样与单个窗口及应用程序本身交互的简单应用来说，一个控制器就足够了。我们将要添加的大部分代码都将采用输出口（outlets）和动作（actions）的形式，正如上一章所讨论的。这个控制器将拥有指向
    GUI 中所有对象的输出口（以便它可以在需要时设置和检索视图对象中的值），以及用于这些对象的动作方法，以便用户在编辑某个值时通知控制器。


    请记住，输出口不过是一个经过特殊标记的属性或实例变量，而动作则是任何符合特定签名的方法，它接受一个类型为 `id` 的单个参数并返回 void。注意，在源代码中，动作的返回类型通常被标记为
    `IBAction` 而不是 void。`IBAction` 实际上被定义为与 void 相同，因此对于编译器来说没有任何区别。现在，假设我们有某种设计文档，其中指定了几个
    villain 属性及其类型。根据它们的类型和用法，我们可以将每个属性映射到一个合适的 GUI 类（参见表 5-1）。


    表 5-1.

    '
- fmt: '# Villain Attributes Mapped to GUI Classes


    | Attribute Name | Type | View Class |

    | --- | --- | --- |

    | Name | string (freeform) | `NSTextField` |

    | lastKnownLocation | string (freeform) | `NSTextField` |

    | lastSeenDate | date | `NSDatePicker` |

    | swornEnemy | string (freeform, but with list to choose from existing) | `NSComboBox`
    |

    | primaryMotivation | string (from predefined list) | `NSMatrix` (containing radio
    buttons) |

    | Powers | array of strings (from predefined list) | `NSMatrix` (containing checkboxes)
    |

    | powerSource | string (from predefined list) | `NSPopUpButton` |

    | Evilness | number (0–10) | `NSLevelIndicator` |

    | Mugshot | image | `NSImageView` |

    | Notes | string (perhaps lengthy) | `NSTextView` |


    Based on this specification, we''ll add one outlet and one action in `VillainTrackerAppDelegate`
    for each GUI control. The outlet will let us access the control to set and retrieve
    its value whenever necessary, and each control will call the appropriate action
    method to inform us when its contents have changed. So that the code is easy to
    follow, we''ll use a specific naming convention for our outlets: the name of the
    attribute, with the string "View" as a suffix. For example, for the attribute
    named `lastSeenDate` we''ll have an outlet named `lastSeenDateView`. Similarly,
    for the actions, we''ll use the verb "take" as a prefix. For the attribute `lastSeenDate`,
    our action will be named `takeLastSeenDate`.


    Adding the outlets to our code could be done by manually creating properties or
    instance variables, but it''s easier to do it by control-dragging from the nib
    to the code window. To do this, we''ll first need a pane with our code in it.
    Click the *Assistant* button (which looks like a butler''s torso) in the Editor
    icon group in the right side of the toolbar in the main Xcode window. For this
    work, have the nib open on the left side of Xcode and the Code Editor open on
    the right, as shown in [Figure 5-15](#9781430245421_Ch05.xhtml#Fig15). We can
    position the Assistant window in either location by selecting our preferred location
    under **View** ![image](images/arrow.jpg) **Assistant Editor**. If it isn''t already
    open, open the `VillainTrackerAppDelegate.h` file in the Assistant Editor pane.
    To do this, click the little butler icon at the top of the pane, and it should
    be one of the choices under Automatic.


