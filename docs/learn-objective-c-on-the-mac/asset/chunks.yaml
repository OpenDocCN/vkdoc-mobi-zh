    for the selected row, and finally updates all the views based on the current selection.
    It may not seem obvious, but it’s important to first deselect all rows in the
    table view, otherwise the `tableViewSelectionDidChange:` delegate method may not
    always be called (because often, after deleting a row, the selected row index
    itself will be the same number, and the table view has no way of knowing that
    we’ve deleted an object from our content array, making the row index number now
    refer to a different object).    Now compile and run the app; we can now delete
    the selected villain and the values in the controls will change to match the new
    selection.    There’s just one last feature we want to implement. Our users can’t
    yet edit values directly in the table view. Let’s fix that now.    Editing in
    the Table View    A user should be able to edit the name of a villain or drag
    in a new mugshot to any row in the table view and update the appropriate villain.
    Since the columns of the table view are `NSViews`, each cell in the table view
    can have a target and action specified in Interface Builder; user-interface elements
    inside of a table view work just like any other view. When the user edits a value
    inside the table view, the action can connect back to our code to inform us of
    the change. We’re limited in that the target must be the delegate of the table
    view, but that’s not a problem for this application. In addition, our existing
    `takeName:` and `takeMugshot:` methods are available, but they’ll need some minor
    changes. These methods work on the selected villain, but the user can’t edit a
    value inside the table view without selecting the row, which selects the villain.
    However, these methods currently expect to only be called from the control in
    the Details view, but now we’re adding the ability to set it from more than one
    place. For this app, we’ll only allow in-row editing of the name and the mugshot,
    and we’ll prohibit editing of the date last seen.    There’s another small barrier
    that we’ll need to resolve. The table view cells are, by default, not editable.
    This is easy to change from within Xcode.    To wire this up, we need to control-drag
    a connection from the view in each column into the `VillianTrackerAppDelegate`
    instance. However, the table view cells are buried pretty deep in the window’s
    view hierarchy, so we’ll look at a different way to set up the connection that
    makes it easier to get to the right user-interface component.    Back in Xcode,
    open up the `MainMenu.xib` file, which will open up in an Interface Builder canvas.
    Click the small expansion triangle in the lower left-hand corner of the screen,
    which will expand the object dock along the left edge of the screen into an outline
    of the window’s view hierarchy. Also, open up the *Attributes Inspector* in the
    Utility area.    Drill down into the outline to the `Name` column’s text field;
    from the outside in, the path is Window – Villain Tracker ![image](images/arrow.jpg)
    View ![image](images/arrow.jpg) Scroll View – Table View ![image](images/arrow.jpg)
    Table View ![image](images/arrow.jpg) Table Column – Name ![image](images/arrow.jpg)
    Table Cell View ![image](images/arrow.jpg) Static Text – Table View Cell ![image](images/arrow.jpg)
    Text Field Cell – Table View Cell. As you drill in, you’ll also see this path
    laid out in the jump bar above the Editor canvas.


    Click the Text Field Cell – Table View Cell and control-drag to the Villain Tracker
    App Delegate instance further down in the dock, as shown in [Figure 6-10](#9781430245421_Ch06.xhtml#Fig10).
    When the Utility window appears, select `takeName:` from the list of actions.
    Before moving on, look in the *Attributes Inspector*, also shown in [Figure 6-10](#9781430245421_Ch06.xhtml#Fig10).
    There’s a pop-up menu labeled Behavior, with a current value of None. Select that
