    6-10](#9781430245421_Ch06.xhtml#_Fig10). Control-dragging using the dock    Lastly,
    do the same thing from the Image Well. The path to the Image Well is Window –
    Villain Tracker ![image](images/arrow.jpg) View ![image](images/arrow.jpg) Scroll
    View – Table View ![image](images/arrow.jpg) Table View ![image](images/arrow.jpg)
    Table Column – Mugshot ![image](images/arrow.jpg) Image Well ![image](images/arrow.jpg)
    Image Cell. Control-drag from the `Image Well` row (not the `Image Cell` row,
    but the one above it) down to the Villain Tracker App Delegate, and select `takeMugshot:`.
    To make the Image Well editable, there’s a checkbox near the top of the *Attributes
    Inspector*. If you like, you can also enable Animates. If your villain’s mugshot
    includes animation information or multiple frames, for instance, an animated GIF
    from the villain’s MySpace page, then this will play the animation on display.    As
    mentioned, the `takeName:` and `takeMugshot:` methods all expect to be called
    from the control doing the update in the Details view. Earlier, we added a call
    to `[villainsTableView reloadData]` to the end of each of these methods. We now
    need to add another call after that one. In both `takeName:` and `takeMugshot:`,
    add a call to `[self updateDetailViews]` at the end. This ensures that regardless
    of where a user makes an edit (in the table view or in the Details view) it’ll
    be reflected in both places.    It’s time to compile and run the app again to
    see if we can edit within the table view. At this point, we should be able to
