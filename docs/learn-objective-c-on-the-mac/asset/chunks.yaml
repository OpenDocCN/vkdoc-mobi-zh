  trans: "\n如果我们不保留对它的引用，当它超出作用域时就会被释放，新加载的 nib 文件也会随之释放。当然，在实际应用中，我们需要一种机制来适时地从该列表中移除对象，但我们暂时先忽略这一点。然后我们调用它的\
    \ `window` 方法，该方法实际加载 nib 文件并显示窗口。当然，我们还没有创建 EasyWindow nib 文件，所以现在就来创建它。\n\n\
    在 Xcode 中通过选择 **File** ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg)\
    \ **New File** 创建一个全新的 nib 文件。在模板选择器中，选择 OS X 下的 *User Interface*，然后选择 *Window*\
    \ 模板，该模板包含一个可供我们使用的 `NSWindow`。将新文件命名为 EasyWindow，并在 *Group* 弹出菜单中选择 WindowLab\
    \ 文件夹。*Group* 弹出菜单会显示五个项目，前三个分别是带 Xcode 项目图标的 WindowLab、带文件夹图标的 WindowLab 以及带文件夹图标的\
    \ Supporting Files。这些对应着 Xcode 导航区域中的文件分组。选择带文件夹图标的 *WindowLab* 条目，然后点击 *Create*。\n\
    \n我们新建的 xib 文件会作为新文件出现在 Xcode 的 *Navigator* 区域中，因此从那里打开该文件。在 nib 文件中选中 Window，然后打开\
    \ *Attributes Inspector*。给窗口设置标题为“Easy Window”。\n\n在前面的章节中，我们创建的每个控制器都已作为顶层对象添加到\
    \ nib 文件中，但当你自己加载 nib 文件时，可以指定一个对象作为其“所有者”，在 Interface Builder 中，这通过主 nib 窗口中的\
    \ *File’s Owner* 对象来表示。`NSWindowController`（我们控制器的类）在加载文件时已经自动将自己设置为 nib 文件的所有者，但我们仍需要在\
    \ Interface Builder 中手动配置，以便能够利用它。为此，选中 *File’s Owner* 图标并打开 *Identity Inspector*。在该检查器的顶部，我们可以设置希望成为文件所有者的对象的类。默认情况下它设置为\
    \ `NSObject`，但我们通常希望它设置为 `NSWindowController` 本身或 `NSWindowController` 的自定义子类。现在，将其\
    \ *Custom Class* 设置为 `NSWindowController`，如图 11-5 所示。最后，从 *File’s Owner* 图标按住\
    \ Control 键拖拽到窗口上，并将其分配给 *File’s Owner* 的 `window` 输出口。我们需要这样做，以便 `NSWindowController`\
    \ 知道众多 `NSWindow` 对象中哪个是 nib 的“主”窗口。\n\n![9781430245421_Fig11-05.jpg](img/9781430245421_Fig11-05.jpg)\n\
    \n图 11-5. 设置 File’s Owner 的类\n\n保存然后点击 **Run**。应用的新按钮将允许我们每次按下按钮时创建新窗口（参见图 11-6）。\n\
    \n![9781430245421_Fig11-06.jpg](img/9781430245421_Fig11-06.jpg)\n\n图 11-6. 一些简易窗口\n\
    \n每次它实际创建一个新的 `NSWindowController` 实例，该实例会加载一份全新的 nib 文件副本，包括其中的所有对象。在这个例子中，我们只拥有一个窗口，但你可以将任何你喜欢的内容放入这些\
    \ nib 文件中，例如用于访问 Core Data 的控制器对象。\n\n## Subclassing NSWindowController\n\n当然，你通常需要在控制器类中添加一些自己的代码。你也可以通过子类化\
    \ `NSWindowController` 来轻松满足需求。下一步，我们将创建一个子类，并为其创建一个新的 nib 文件来加载，然后设置一种从主窗口和控制器调用它的方式。\n\
    \n在 Xcode 中，通过从菜单中选择 **File** ![image](img/arrow.jpg) **New File** 并在模板选择器的 OS\
    \ X 部分选择 *Cocoa*，在 WindowLab 项目中创建一个名为 `NotSoEasyWindowController` 的新类。\n\n选择\
    \ *Objective-C class*，然后指定我们要创建 *NSWindowController* 的子类。Xcode 会建议使用 `WLWindowController`\
    \ 作为名称，但你应该将其改为 `WLNotSoEasyWindowController`。勾选 *With XIB for user interface*\
    \ 复选框，Xcode 还会为我们生成一个 `WLNotSoEasyWindowController.xib` 文件，其中 *File’s Owner* 设置为我们的新子类，并且\
    \ *window* 输出口已预先连接好。Xcode 会提示你保存 nib 文件，并询问将其添加到哪个分组。使用我们之前用于 Easy Window nib\
    \ 文件的同一分组，即 WindowLab 文件夹。Xcode 会为我们生成包含一些方法的 `WLNotSoEasyWindowController.h`\
    \ 和 `WLNotSoEasyWindowController.m` 文件，但我们需要在这些文件上做一些工作。\n\n我们在这里创建自己的类，并且它只负责管理一个\
    \ nib 文件。因此，我们可以将 nib 文件的名称内置到类中，这样任何使用该类的用户只需了解该类，而无需知道 nib 文件本身的名称。我们还可以让调用者更轻松：假设任何创建此类实例的人都希望加载\
    \ nib 文件，我们就把对 `window` 的调用直接构建到 `init` 方法中。通过创建以下 `init` 方法来实现这一点：\n\n```\n-\
    \ init {\n\tif ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"\
    ])) {\n\t\t[self window];\n\t}\n\treturn self;\n}\n```\n\n这是标准 `init` 方法的推荐形式，我们调用超类中的另一个\
    \ `init` 方法，如果成功则执行特定于我们实例的工作，最后返回指向 `self` 的指针。趁现在，让我们删除 Xcode 为我们生成的 `initWithWindow:`\
    \ 方法，因为永远不需要调用它。\n\n现在切换到 `MainMenu.xib`。再次将窗口调高一些，复制最后一个按钮，并将其命名为“Not So Easy”。然后在\
    \ Assistant Editor 中打开 `WLAppDelegate.h`，从按钮按住 Control 键拖拽到 `WLAppDelegate.h`\
    \ 上，并添加一个名为 `loadNotSoEasyWindow` 的新操作。打开 `WLAppDelegate.m` 文件，为该操作添加以下实现：\n\n\
    ```\n// 添加到 WLAppDelegate.m 中：\n- (IBAction)loadNotSoEasyWindow:(id)sender {\n\
    \    WLNotSoEasyWindowController *notSoEasyController = [[WLNotSoEasyWindowController\
    \ alloc] init];\n    [self.subWindows addObject:notSoEasyController];\n}\n```\n\
    \n我们还需要在 `WLAppDelegate.m` 顶部添加以下 `#import` 指令，以便编译器在编译应用委托时知道这个新类：\n\n```\n#import\
    \ \"WLNotSoEasyWindowController.h\"\n```\n\n完成这些后，让我们为窗口控制器类添加一点功能，以便在创建 nib 文件后，我们可以确保窗口按预期与其正确连接：一个简单的方法，当被调用时让电脑发出蜂鸣声。不幸的是，我们需要手动添加它，但这很容易做到。\n\
    \n在 `WLNotSoEasyWindowController.h` 中添加以下方法声明：\n\n```\n- (IBAction)beep:(id)sender;\n\
    ```\n\n`WLNotSoEasyWindowController.m` 的整个内容应如下所示，其中添加了新的 `beep:` 操作方法：\n\n```\n\
    #import \"WLNotSoEasyWindowController.h\"\n\n@interface WLNotSoEasyWindowController\
    \ ()\n@end\n\n@implementation WLNotSoEasyWindowController\n\n- init {\n    if\
    \ ((self = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"])) {\n\
    \        [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad {\n\
    \    [super windowDidLoad];\n    \n    // 实现此方法以处理窗口控制器的窗口从其 nib 文件加载后的任何初始化。\n\
    }\n\n- (IBAction)beep:(id)sender {\n    NSBeep();\n}\n\n@end\n```\n\n在 Interface\
    \ Builder 画布中打开 `WLNotSoEasyWindowController.nib` 文件，从 *Object Library* 中拖出一个按钮，并将其标题设置为“Beep!”。从\
    \ Beep! 按钮按住 Control 键拖拽到 Object Dock 中的 *File’s Owner* 图标上，然后选择我们刚刚添加的 `beep:`\
    \ 操作。\n"
- fmt: "Xcode will automatically note that we’ve added a new action and make it available\
    \ for use. Save the changes and select **Run**; the newest button will let us\
    \ create windows that beep when we press their buttons, as seen in [Figure 11-7](#9781430245421_Ch11.xhtml#Fig7).\n\
    \n![9781430245421_Fig11-07.jpg](images/9781430245421_Fig11-07.jpg)\n\n[Figure\
    \ 11-7](#9781430245421_Ch11.xhtml#_Fig7). These windows’ buttons will beep at\
    \ us.\n\n## Modal Windows\n\nNow we’re going to move on to a special kind of GUI\
    \ item, the *modal window*. Everyone has used modal windows at one time or another,\
    \ but if you’re new to desktop GUI programming, the term may be new to you. Basically,\
    \ a modal window is one that puts our application in a particular “mode.” Specifically,\
    \ a mode where it will only accept input through the controls on the modal window\
    \ itself, and clicking anywhere else in the application will just make it beep\
    \ at us. Because of their disruptive nature, modal windows should be used sparingly—in\
    \ cases where the application can’t really move forward on its own without the\
    \ user answering a question of some kinds (such as, “There are five open documents\
    \ with unsaved changes. Are you sure you want to quit?”). In cases where the information\
    \ the app needs from the user is related to just a single window or document,\
    \ it’s better to use a sheet, described later in this chapter, which locks down\
    \ a single window instead of the entire application.\n\n### The NSAlert Functions\n\
    \nThe simplest modal windows available in Cocoa are the alert panels, which are\
    \ created and run with a single function call. The function returns when the user\
    \ clicks one of the buttons, and we can then check the return value to determine\
    \ which of the buttons they clicked. Depending on how we call the function, there\
    \ may be one, two, or three buttons presented for the user.\n\nThe most commonly\
    \ used modal alert function is `NSRunAlertPanel`. It has a few variants called\
    \ `NSRunCriticalAlertPanel` and `NSRunInformationalAlertPanel`, which are used\
    \ for specific purposes outlined in Apple’s user interface guidelines, but we\
    \ can safely stick with `NSRunAlertPanel`. Each of these functions takes five\
    \ or more parameters: first the title that appears at the top of the panel, then\
    \ the full text to display (which presents some information or asks the user a\
    \ question), then three strings (which may be `nil`) containing the button titles.\
    \ Button titles left as `nil` will simply won’t be displayed, except for the case\
    \ where they’re all `nil`, in which case a single OK button is included on the\
    \ panel.\n\nTo see some alert panels in action, open up `MainMenu.xib` in an Interface\
    \ Builder pane, and then open `WLAppDelegate.h` in an Assistant Editor pane. Add\
    \ a new button to the WindowLab window, and title it “Run Modal Alerts.” Control-drag\
    \ from the new button to the Assistant Editor to add a new action. Call the new\
    \ action `runModalAlerts`. Then, implement the following method in `WLAppDelegate.m`\
    \ inside the stub generated by Xcode:\n\n```objc\n- (IBAction)runModalAlerts:(id)sender\
    \ {\n   NSRunCriticalAlertPanel(@\"Basic Usage\", @\"This is a plain alert panel.\"\
    , nil, nil, nil);\n   NSRunAlertPanel(@\"Three Buttons\", @\"We can set button\
    \ titles:\",\n     @\"Really?\", @\"Oh, how delightful!\", @\"Whatever.\");\n\
    \   NSRunAlertPanel(@\"Formatting Strings\", @\"We can also do some formatting,\
    \ %@ %@\",\n     nil, nil, nil, @\"putting values for insertion at the end,\"\
    , @\"after the three button values.\");\n   switch (NSRunAlertPanel(@\"Noticing\
    \ The Selection\",\n             @\"And of course, we can detect which button\
    \ is clicked.\n\",\n             @\"Default\", @\"Alternate\", @\"Other\")) {\n\
    \     case NSAlertDefaultReturn:\n       NSRunInformationalAlertPanel(@\"Result:\"\
    , @\"You pressed the default button\",\n          nil, nil, nil);\n       break;\n\
    \     case NSAlertAlternateReturn:\n       NSRunInformationalAlertPanel(@\"Result:\"\
    , @\"You pressed the alternate button\",\n         nil, nil, nil);\n       break;\n\
    \     case NSAlertOtherReturn:\n       NSRunInformationalAlertPanel(@\"Result:\"\
    , @\"You pressed the other button\",\n         nil, nil, nil);\n       break;\n\
    \     default:\n       break;\n   }\n}\n```\n\nTry these out! Save, click **Run**,\
    \ and give it a whirl.\n\n### Open Panels and Save Panels\n\nThe other most commonly\
    \ used modal panels in Cocoa are probably the ones for opening and saving files,\
    \ `NSOpenPanel` and `NSSavePanel`. Using these panels is typically more than just\
    \ a one-liner. We first need to configure various options on the panel (for instance,\
    \ whether it should allow the user to select multiple files for opening, or just\
    \ one), then run the panel, check the return value (which indicates whether the\
    \ user eventually clicked the Open or Save button, or canceled out), and then\
    \ grab the resulting filenames from the panel. Note that these panels don’t actually\
    \ do any file I/O; they just prompt the user for filenames and return the results.\
    \ Cocoa uses `NSURL`s for file paths instead of `NSStrings`, which allows Open\
    \ and Save dialogs to refer to things beyond just on the local file system (such\
    \ as iCloud).\n\nTo see an example of how this can work, consider the following\
    \ method, which pretends to copy a file. This method uses an `NSOpenPanel` to\
    \ prompt the user for the file to copy, and then uses an `NSSavePanel` to let\
    \ the user specify where the file should go:\n\n```objc\n- (IBAction)copyFile:(id)sender\
    \ {\n     NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n     [openPanel setTitle:@\"\
    Select file to copy:\"];\n     \n     if ([openPanel runModal] == NSOKButton)\
    \ {\n         // get the first (and only) selected filename\n         NSURL *openPath\
    \ = [[openPanel URLs] objectAtIndex:0];\n         // pull out just the filename,\
    \ without directory path\n         NSString *openFilename = [openPath lastPathComponent];\n\
    \         \n         NSSavePanel *savePanel = [NSSavePanel savePanel];\n         \n\
    \         [savePanel setTitle:@\"Enter destination filename:\"];\n         [savePanel\
    \ setNameFieldStringValue:openFilename];\n         \n         // run the save\
    \ panel in its default directory, with the opened filename\n         // as a suggestion.\n\
    \         if ([savePanel runModal] == NSOKButton) {\n             NSURL *savePath\
    \ = [savePanel URL];\n             NSString *message = [NSString stringWithFormat:\n\
    \                                  @\"You've opened this file:\\n\\n%@\\n\\nand\
    \ saved it here:\\n\\n%@\\n\\n\",\n                                  openPath,\
    \ savePath];\n             NSRunAlertPanel(@\"Copying file (not really)\", message,\
    \ nil, nil, nil);\n         }\n     }\n}\n```\n\nAs before, add a button to the\
    \ main window (call this one “Copy File”) and then Control-drag to the `WLAppDelegate.h`\
    \ file to add an action. Name the action `copyFile`. Then copy the code above\
    \ into `WLAppDelegate.m` in place of the action stub generated by Xcode. Save\
    \ the changes, click **Run**, and try out the new button. The standard Open panel\
    \ will appear, followed by a standard Save panel. Note that the Save panel even\
    \ has built-in functionality to warn us when we’re selecting an existing file\
    \ and ask us if we really want to overwrite it (remember, it’s perfectly safe\
    \ to confirm overwriting the file in this example, since we’re not actually copying\
    \ anything).\n\nIt’s probably worth mentioning here the not-so-obvious fact that\
    \ `NSOpenPanel` is actually a subclass of `NSSavePanel`. That means that if you\
    \ can’t seem to find the functionality you’re expecting in `NSOpenPanel`’s documentation\
    \ or header file, you may need to check out `NSSavePanel` as well."
