    \n        [self updateDetailViews];\n    }\n}\n```\n\n这个方法比本书到目前为止展示的大部分代码都要复杂一些，因此需要稍作额外解释。\n\
    \n在第 1 部分，我们告诉窗口完成任何正在进行的编辑，然后获取表格当前选中行的索引——即将要被删除的行。注意，我们已经知道选中了哪个反派（因为它存储在一个实例变量中），但拥有行索引对于确保删除后选择的合理性至关重要（我们将在第\
