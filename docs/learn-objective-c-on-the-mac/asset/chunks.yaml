    单击顶部和底部的 I 形梁，窗口将在屏幕上垂直居中。我们需要设置一个 y 值，将窗口放置在菜单栏附近，但不要紧贴菜单栏。最简单的方法是使用“大小检查器”中的屏幕表示，将应用程序的主窗口移动到我们想要的位置。如有必要，我们还可以通过数字方式微调大小和位置。一旦窗口的初始位置符合要求，单击底部的
    I 形梁，使其变为条纹状。我们也可以通过选择“初始位置”部分底部的弹出菜单，并将其从“垂直比例”更改为“距顶部固定”来进行此更改。


    ## 设计窗口的界面


    在“对象库”中，选择“对象库”弹出菜单，然后选择“控件”。这将显示许多我们可以使用的不同按钮和文本字段（图 4-6）。底部列表中的第一个项目应该是“下压按钮”（`Push
    Button`），这是标准的 OS X 按钮。


    ![9781430245421_Fig04-06.jpg](img/9781430245421_Fig04-06.jpg)


    图 4-6. Xcode 实用工具区域中的对象库视图


    抓取其中一个并将其拖到窗口的界面上。将出现蓝色辅助线，指示按钮位于左边缘、右边缘或中心的最佳位置。使用蓝色辅助线将按钮放置在窗口的右下部分（图 4-7）。一旦按钮位于正确位置，松开鼠标，我们就在窗口上获得了一个按钮。现在双击该按钮，这将允许我们编辑按钮的标题。将其标题从“`Button`”更改为“`Right`”。


    ![9781430245421_Fig04-07.jpg](img/9781430245421_Fig04-07.jpg)


    图 4-7. 向主窗口添加按钮


    从库中拖出第二个按钮，并使用蓝色辅助线将其放置在窗口的左下方。放置此按钮后，双击它，并将此按钮的标题更改为“`Left`”。


    再拖入一个按钮，并使用底部蓝色辅助线将按钮放置在距窗口底部正确距离的位置。将其放置在窗口的水平中心，同样，会出现一条蓝色辅助线来帮助我们正确定位。放置好后，双击第三个按钮，并将其标签更改为“`Center`”。窗口现在应该如图
    4-8 所示。


    ![9781430245421_Fig04-08.jpg](img/9781430245421_Fig04-08.jpg)


    图 4-8. 窗口应如图所示，三个按钮均已布局


    请注意，当我们向窗口添加控件时，Interface Builder 窗格左侧的“对象”显示区域会展开，以显示控件的添加以及视图的约束集，这在图 4-8 中也可见。约束部分控制了控件布局在窗口调整大小时如何响应。


    接下来，我们需要一个标签，以便告知用户单击了哪个按钮。标签是一个 GUI 对象，可以以我们选择的字体和大小显示一段文本。在我们的应用程序代码中，我们可以随时以编程方式更改标签的文本。从库中抓取一个标签。您可能需要向下滚动控件列表，或者直接使用搜索框。将标签拖到窗口的左上角，并使用辅助线将其正确放置在上边距和左边距处。


    单击标签右侧的调整大小手柄，向右拖动，直到到达窗口右侧的蓝色辅助线，然后松开。在选中标签的情况下，按 ![image](img/arrow2.jpg)`4`
    调出“实用工具”窗格中的“属性检查器”，并使用“文本对齐”按钮将文本居中。


    然后，单击“字体”设置右侧的小 T 图标。这将调出一个特殊的字体面板，如图 4-9 所示。将字体大小更改为 36，可以直接输入数字，也可以使用“大小”字段右侧的小箭头按钮。完成此操作后，剩下的就是双击标签，使其进入编辑模式，然后按
    Delete 键删除文本。我们希望在按下按钮之前，此标签不显示任何内容。


    ![9781430245421_Fig04-09.jpg](img/9781430245421_Fig04-09.jpg)


    图 4-9. 更改标签的字体


    至此，用户界面部分完成，所以现在我们需要编写一些代码，以便在按下三个按钮中的任何一个时更新标签中的文本。


    ## 创建控制器类


    我们将向 `ButtonAppDelegate` 类添加一些代码。这个类将作为控制器，处理我们所有三个按钮的点击动作。在我们刚刚布局的窗口中，我们设置了三个按钮和一个文本字段。当用户按下其中一个按钮时，文本字段的值应该被更新。因为我们需要更改文本字段显示的文本，所以需要一个指向它的输出口（`outlet`）。此外，我们还需要一个供按钮触发的操作方法（`action`）。因为操作方法会接收触发它的对象的指针，所以我们可以为所有三个按钮使用一个单一的操作方法。现在让我们来设置输出口和操作方法。


    为此，我们需要在用户界面元素和我们的代码之间建立一些连接。在上一章中，我们讨论了如何从一个 UI 元素按住 Control 键拖到另一个 UI 元素。这里我们将做类似的事情。


    在 nib 文件编辑器仍然打开的情况下，我们还需要打开一个显示代码的窗格。单击主 Xcode 窗口工具栏右侧“编辑器”组中的“助理”按钮（看起来像一个管家的躯干）。我们也可以通过输入
    ![image](img/arrow5.jpg) 来打开助理编辑器。通过选择**视图** ![image](img/arrow.jpg) **助理编辑器**下的不同选项，可以将该窗格并排或放置在
    nib 编辑器窗格下方。


    “助理编辑器”窗格会在编辑器区域上方的跳转栏中显示当前文件的名称。选择文件名，一个弹出菜单将显示名称 `ButtonsAppDelegate.h` 和 `ButtonsAppDelegate.m`。如果尚未选中，请选择
    `ButtonAppDelegate.h`。我们将看到 Xcode 为我们生成的类接口。生成的代码如下所示（忽略文件顶部的注释块）：


    ```objectivec

    #import <Cocoa/Cocoa.h>


    @interface ButtonsAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;


    @end

    ```


    在上一章中，我们从一个用户界面对象按住 Control 键拖到另一个对象。这次，我们将从 nib 文件按住 Control 键拖到我们的代码中。在 nib
    编辑器窗格中，单击我们添加到窗口的标签。现在，从标签按住 Control 键拖到 `.h` 文件中，向下拖到 `@property` 行下方的空行处，文本编辑器中会延伸出一条蓝线，指示“插入输出口或操作”（`Insert
    Outlet or Action`），如图 4-10 所示。松开鼠标按钮，会出现一个小弹出窗口，我们可以在其中配置这个新连接。


    ![9781430245421_Fig04-10.jpg](img/9781430245421_Fig04-10.jpg)


    图 4-10. 从 nib 对象按住 Control 键拖到代码编辑器以连接输出口或操作


    在此弹出窗口中，将连接标记为“输出口”（`Outlet`），并将名称设置为“`label`”。将其他字段保留为默认设置，然后单击“连接”（`Connect`）。Xcode
    将在 `.h` 文件中添加一行新代码，内容如下：


    ```objectivec

    @property (weak) IBOutlet NSTextField *label;

    ```


    该属性声明在我们的类中创建了一个名为 `label` 的新属性。

