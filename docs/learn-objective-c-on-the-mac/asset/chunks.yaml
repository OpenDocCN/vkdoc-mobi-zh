    to exactly the same thing. The application placeholder gives us access to our
    application’s `NSApplication` instance from any nib file, even ones whose File’s
    Owner is not `NSApplication`. For this chapter, we can forget about the application
    placeholder, because this nib’s File’s Owner already gives us access to that object.    Setting
    Up The Window    Now we can start working on laying out the window. In the *Objects*
    section, select the icon labeled Window - Chapter4, and the window will display
    on the Interface Builder pane with a blue box around it to show that it’s selected.
    The *Inspector* pane in the *Utility* area will show the settings that are tunable
    for the window ([Figure 4-4](#9781430245421_Ch04.xhtml#Fig4)). We’re going to
    make some changes to the defaults.    ![9781430245421_Fig04-04.jpg](images/9781430245421_Fig04-04.jpg)    [Figure
    4-4](#9781430245421_Ch04.xhtml#_Fig4). The Attributes Inspector showing options
    available for a window    Change the window’s title from “Chapter4” to “Press
    a Button.” The field below *Title* is labeled *Autosave*. If we provide a value
    in this field, our application will automatically save the location, size, and
    other information about the window in our user preferences so that when the user
    launches the application again, he or she will find the window exactly where it
    was left. It doesn’t matter what value we put here, as long as it is unique for
    each window in our application. If we use the same autosave name for any two objects,
    one of them will fail to save. Type “mainWindow” here.    Right under the *Autosave*
    field are three checkboxes that control some of the fundamental behavior of the
    window. The *Close* checkbox enables or disables the ability to close the window.
    In a utility application with only one window, we could uncheck this box so that
    the window can’t be closed. If this box is unchecked, both the red Close button
    in the window’s title bar and the **Close** menu item will be disabled. If we
    allow the window to be closed, we should provide a way to make the window visible
    again.


    Alternatively, if our application is a utility that consists of only one window,
    it is acceptable to have the application quit when the window is closed. Later
    on in this chapter, we’ll configure our application to quit when this window is
    closed, so leave the *Close* checkbox as it is. In later chapters, we’ll learn
    how to make closed windows visible again.    The *Minimize* checkbox controls
    whether the window can be minimized to the dock using the yellow button in the
    window’s title bar or from selecting *Minimize* from the **Window** menu. As a
    general rule, windows should be able to be minimized. There are exceptions to
    this, such as utility windows that are visible only when our application is front-most,
    but the vast majority of the time we should leave this checked.    The third box
    is called *Resize*, and it controls whether the user can change the size of the
    window by dragging the lower right corner. For this application, we’re going to
    disable resizing of this window, so uncheck *Resize*. We’ll learn how to handle
    controls in windows that resize later in the book.    Leave the rest of the attributes
    unchanged for now. The class that represents windows is a very flexible class,
    and the other attributes give us a tremendous amount of control over the appearance
    of our application and how it reacts to some of the more advanced user features
    in OS X such as Expose, Spaces, and Full Screen mode, but for most windows, the
    default settings are what we want.    Now, press ![image](images/arrow2.jpg)5
    to bring up the *Size Inspector* ([Figure 4-5](#9781430245421_Ch04.xhtml#Fig5)).
    This is where we can set the size and size-related attributes of the selected
    object. As we saw in the last chapter, objects can be moved and resized using
    the mouse, but this Inspector gives us more precise control over the size and
    position of an object.    ![9781430245421_Fig04-05.jpg](images/9781430245421_Fig04-05.jpg)    [Figure
    4-5](#9781430245421_Ch04.xhtml#_Fig5). Size Inspector for the application’s window    Set
    the width of our window to 480 pixels and the height to 130 pixels. Set the x
    value of the window to 100, which indicates that we want the window’s initial
    position to be on the left side of the screen. The y value can be a little more
    problematic because of the geometry of the Mac’s display. The coordinate system
    on the Mac’s screen has 0 at the lower-left corner of the screen, with the y value
    getting higher as we move up toward the top of the screen. The problem here is
    that not everybody has the same size monitor, so any given y value will be different
    relative to the top of the screen on different size monitors.    Fortunately,
    Cocoa will automatically adjust the window’s position so that the window always
    starts on the screen, even if the location we specify would otherwise place it
    off-screen somewhere, and because we gave the window an autosave name, every time
    the user launches the application after the first, the window will be where it
    was the last time we quit the application. But sometimes it’s important that a
    window start in a particular position relative to the top of the screen.    Note
    the little diagram at the bottom of the Size Inspector; it gives us a visual representation
    of the window’s initial position based on our own screen’s size. The little white
    box represents the window, and the big box represents the screen minus the menu
    bar. The little red I-beams on all four sides of the white box let us control
    the relative positioning of the window relative to the sides of the screen. We
    can place the window where we want it on our screen, then use the I-beams to lock
    the position relative to the left and top of the screen. Clicking an I-beam will
    allow the window to move proportionally relative to that side of the screen. Clicking
    the bottom I-beam will let the window float from the bottom but maintain a fixed
    distance from the top of the screen.'
  trans: '

    这些图标将始终存在于 Cocoa nib 文件中。我们无法删除它们，并且与其他图标不同，它们在加载 nib 时不会导致创建对象实例。这三个图标被称为*占位符对象*，它们允许此
    nib 中的对象与某些已存在的对象建立连接。


    任何 nib 文件中的第一个图标称为 `File’s Owner`。此图标是一个占位符，指向从磁盘加载 nib 的对象实例，换句话说，就是“拥有”该 nib
    的对象实例。在应用程序的 `MainMenu.xib` 文件中（就像我们这里一样），`File’s Owner` 图标始终指向 `NSApplication`
    的一个实例，该类代表整个应用程序，接收输入并确保根据该输入调用相应的代码。对于其他 nib 文件，`File’s Owner` 可能是不同的类，例如文档类的实例，或代表插件的类。


    此文件以及任何其他 nib 文件中的第二个图标称为 `First Responder`。我们将在第 10 章中更详细地讨论响应者，但第一响应者是用户当前正在交互的对象。例如，如果光标正在文本字段中键入，则该文本字段就是当前的第一响应者。第一响应者会随着用户与界面的交互而改变，而
    `First Responder` 图标为我们提供了一种便捷的方式，可以与当前具有焦点的任何控件或视图进行交互，而无需编写代码来确定是哪个控件或视图。


    第三个图标称为 `Application`（或应用程序占位符），是 Cocoa nib 文件中相对较新的添加项。此对象指向此应用程序的唯一一个 `NSApplication`
    实例。在 `MainMenu.xib` 文件中，应用程序代理和 `File’s Owner` 占位符始终指向完全相同的对象。应用程序占位符使我们能够从任何
    nib 文件访问应用程序的 `NSApplication` 实例，即使是那些 `File’s Owner` 不是 `NSApplication` 的 nib
    文件。对于本章，我们可以暂时忽略应用程序占位符，因为这个 nib 的 `File’s Owner` 已经提供了对该对象的访问。


    ## 设置窗口


    现在我们可以开始布局窗口了。在 *Objects* 部分，选择标记为 `Window - Chapter4` 的图标，该窗口将显示在 Interface Builder
    窗格中，并带有一个蓝色框，表示它已被选中。*Utility* 区域中的 *Inspector* 窗格将显示可以为窗口调整的设置（图 4-4）。我们将对默认设置进行一些更改。


    ![9781430245421_Fig04-04.jpg](img/9781430245421_Fig04-04.jpg)


    图 4-4. 显示窗口可用选项的属性检查器


    将窗口的标题从“Chapter4”更改为“Press a Button”。*Title* 下方的字段标记为 *Autosave*。如果我们在此字段中提供一个值，我们的应用程序将自动在用户偏好设置中保存窗口的位置、大小和其他信息，这样当用户再次启动应用程序时，他将发现窗口正好位于上次关闭时的位置。我们在此处输入什么值并不重要，只要它对应用程序中的每个窗口都是唯一的即可。如果我们对任何两个对象使用相同的自动保存名称，其中一个将无法保存。在此处输入
    `mainWindow`。


    在 *Autosave* 字段正下方，有三个复选框，用于控制窗口的一些基本行为。*Close* 复选框用于启用或禁用关闭窗口的功能。在只有一个窗口的实用程序应用程序中，我们可以取消选中此框，这样窗口就无法关闭。如果此框未选中，则窗口标题栏中的红色关闭按钮和
    **Close** 菜单项都将被禁用。如果我们允许关闭窗口，我们应该提供一种使窗口再次可见的方法。


    或者，如果我们的应用程序是一个仅包含一个窗口的实用程序，那么允许在窗口关闭时退出应用程序也是可以接受的。在本章稍后部分，我们将配置我们的应用程序在关闭此窗口时退出，因此保持
    *Close* 复选框的当前状态。在后面的章节中，我们将学习如何使关闭的窗口重新可见。


    *Minimize* 复选框控制是否可以使用窗口标题栏中的黄色按钮或从 **Window** 菜单中选择 *Minimize* 来将窗口最小化到 Dock。通常，窗口应该能够最小化。但也有一些例外，例如仅在我们的应用程序处于最前面时才可见的实用程序窗口，但绝大多数情况下我们应该保持此复选框选中。


    第三个框称为 *Resize*，它控制用户是否可以通过拖动右下角来更改窗口的大小。对于此应用程序，我们将禁用此窗口的调整大小功能，因此取消选中 *Resize*。我们将在本书后面学习如何处理可调整大小的窗口中的控件。


    现在保持其余属性不变。表示窗口的类是一个非常灵活的类，其他属性为我们提供了对应用程序外观以及它如何响应 OS X 中一些更高级的用户功能（如 Exposé、Spaces
    和全屏模式）的巨大控制能力，但对于大多数窗口来说，默认设置就是我们想要的。


    现在，按 ![image](img/arrow2.jpg)5 调出 *Size Inspector*（图 4-5）。在这里我们可以设置选定对象的尺寸以及与尺寸相关的属性。正如我们在上一章中看到的，可以使用鼠标移动和调整对象大小，但此检查器为我们提供了对对象大小和位置更精确的控制。


    ![9781430245421_Fig04-05.jpg](img/9781430245421_Fig04-05.jpg)


    图 4-5. 应用程序窗口的尺寸检查器


    将我们窗口的宽度设置为 480 像素，高度设置为 130 像素。将窗口的 x 值设置为 100，这表明我们希望窗口的初始位置位于屏幕的左侧。由于 Mac 显示器的几何特性，y
    值可能有点棘手。Mac 屏幕上的坐标系以屏幕左下角为 0，随着我们向屏幕顶部移动，y 值会增大。这里的问题是，并非每个人都有相同尺寸的显示器，因此任何给定的
    y 值在不同尺寸的显示器上相对于屏幕顶部的位置都会不同。


    幸运的是，Cocoa 会自动调整窗口的位置，以便窗口始终在屏幕上启动，即使我们指定的位置可能导致窗口位于屏幕之外，并且因为我们为窗口指定了自动保存名称，每当用户在第一次之后启动应用程序时，窗口将位于我们上次退出应用程序时的位置。但有时窗口相对于屏幕顶部从特定位置启动非常重要。


    请注意尺寸检查器底部的小图表；它根据我们自己的屏幕尺寸，以可视方式呈现窗口的初始位置。小白框代表窗口，大框代表屏幕减去菜单栏。白框四边的小红工字形标记让我们可以控制窗口相对于屏幕边缘的相对位置。我们可以将窗口放在屏幕上的所需位置，然后使用工字形标记将位置锁定在屏幕的左侧和顶部。点击工字形标记将允许窗口相对于屏幕的那一侧成比例移动。点击底部的工字形标记将使窗口从底部浮动，但保持与屏幕顶部的固定距离。

