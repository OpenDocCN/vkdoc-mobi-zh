    In the *Object Controller* section, change the *Mode* from Class to Entity Name.
    Enter the string “MythicalBand” into the *Entity Name* field, and check the *Prepares
    Content* box. When done, our Xcode window should look something like [Figure 9-7](#9781430245421_Ch09.xhtml#Fig7).    ![9781430245421_Fig09-07.jpg](images/9781430245421_Fig09-07.jpg)    [Figure
    9-7](#9781430245421_Ch09.xhtml#_Fig7) .  The beginnings of the Mythical Band window    Setting
    Up Cocoa Bindings    Now that we’ve got the objects laid out, we need to set up
    the appropriate Cocoa bindings to actually connect the UI controls with the Core
    Data-managed list of bands. We’ll start with the array controller because it’s
    already selected. Switch to the *Bindings Inspector*, and expand the *Parameters*
    section. Check the *Bind to* checkbox, and then select App Delegate from the pull-down
    menu. Then, enter “managedObjectContext” in the *Model Key Path* field. This connects
    the array controller to the Core Data machinery in the App Delegate.    Now it’s
    time to tackle the bindings for the table view. Since this table view only has
    one column, it’ll be less hassle than the one in the Mythical Persons window.
    Start by selecting the table view itself. This is most easily done in the outline
    view of the Object Dock on the left. Once it’s selected, go over to the *Bindings
    Inspector* (which should still be open from the last paragraph) and expand the
    *Content* section within the *Table Content* heading. Check the *Bind to* checkbox,
    and ensure that the pull-down menu shows Mythical Bands and that *Controller Key*
    shows arrangedObjects. As before, we also want to have the selected row in the
    table view get passed back to the array controller. To set this, expand the *Selection
    Indices* section of the *Bindings Inspector*. Check the *Bind to* checkbox here,
    set the pull-down menu to Mythical Bands, and set the *Controller Key* to selectionIndexes.
    This will look a lot like Figure 8-10 in the previous chapter.    With the binding
    for the table view itself in place, we can set up the binding for the column.
    In the Object Dock, expand the table view’s subviews until it shows the one labeled
    “Static Text – Table View Cell.” In the *Bindings Inspector*, expand the *Value*
    section and select the *Bind to* checkbox, set the pull-down menu to read Table
