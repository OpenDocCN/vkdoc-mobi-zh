    same size as the `NSBox` we put into the main window a little while ago.    Now
    let’s put some content into this tab view, the “pages” that we’ll be able to flip
    between. By default, the tab view contains just two content views, but let’s increase
    that number (using the *Attributes Inspector* ) so that we have even more views
    to switch between. The actual content isn’t that important as long as something
    is unique on each page so that we can easily see the content change from one page
    to the next. A good start is just to grab a Label from the *Object Library*, give
    it a nice big font, and change its text to the word “One.


    ” Then copy this label and paste it into each of the other views (which we can
    switch between using the tabs at the top, just like otherwise), changing the text
    accordingly each time. Just for fun, add some unique items to each page as well
    (a table view here, a set of buttons there) so that when the app is done, we’ll
    see more things in motion while flipping between pages.    It’s time to round
    out the interface for our controller class, so we’ll turn our attention to the
    `FIAppDelegate.h` file. It currently declares three properties. The first is connected
    to the main window. The other two are the ones we added for the two views we need
    to manage: `tabView`, the object containing the views we’re going to display,
    and `box`, the on-screen view where we’ll be displaying them. We need to add five
    additional properties. Three of these are `weak` properties for pointing at the
    views that are actively transitioning in and out of focus. We’ll also need to
    add a `strong` property to reference the tab view’s array containing all the available
