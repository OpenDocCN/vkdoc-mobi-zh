    打开连接检查器（Connections Inspector），花点时间点击一些菜单项，看看它们是如何连接起来的。*File* 菜单中的许多项都连接到 *First
    Responder*，调用的动作名称中包含单词“document”（例如`newDocument:`、`openDocument:`等）。事实证明，其中几个动作是在`NSDocumentController`类中实现的。这是一个特殊的类，在运行时有一个共享实例，用于管理应用程序的所有打开的文档。我们不会在这个
    nib 文件或任何其他地方看到这个共享实例，甚至看不到它的代理。`NSApplication`在应用程序启动期间创建此对象，并将其添加到响应者链中，以便它可以处理这些动作。


    查看一番之后，我们可以基本上忽略这个应用程序的 *MainMenu.xib*，因为我们再也不需要打开它了。请记住，里面唯一真正的内容是菜单，并且大多数菜单项都连接到
    *First Responder* 上的动作，这意味着它们会在适当的时候找到通往相关窗口控制器或共享的`NSDocumentController`的路径。


    现在打开 *CMDocument.xib*，看看它提供了什么。一个`NSWindow`等着我们去填充一些内容，如果我们打开身份检查器（Identity Inspector），我们会看到
    *File’s Owner* 是`CMDocument`的一个实例。除此之外，它是一张空白画布，我们稍后将在这上面留下我们的印记。


    ## 定义模型


    在我们开始构建任何类型的图形用户界面之前，让我们先创建用于表示文档的数据模型。这是一个极其简单的模型，包含一个具有两个属性的单一实体。我们将在每个文档中只创建该实体的一份实例，但你在本章中学到的关于文档的所有内容同样适用于大型、复杂的数据模型。


    打开 *CMDocument.xcdatamodeld*。创建一个实体并将其命名为 *ColorSet*。保持新实体处于选中状态，创建一个属性，将其命名为
    *color1*，将其类型设置为 *Transformable*，然后点击取消选中 *Optional* 复选框。

    '
- fmt: "Then create a second attribute, name it `color 2`, and configure it just like\
    \ the first: the type is `Transformable`, and `Optional` should be turned off.\
    \ These attributes represent the two colors that the user will choose for each\
    \ document. Each of them contains an instance of `NSColor`, which is not one of\
    \ the supported Core Data types, hence the use of `Transformable` as described\
    \ in [Chapter 8](#9781430245421_Ch08.xhtml). Save the model, and we’re done with\
    \ it. That was an extremely simple model, wasn’t it!\n\n## Setting Two Colors\n\
    \nNow it’s time to start putting the GUI together. Remember that this occurs in\
    \ the document window, so switch back to `CMDocument.xib` in Interface Builder.\
    \ The default window contains an `NSTextField` (“Your document contents here”),\
    \ which we should delete before going on. Next we’re going to add an `NSObjectController`\
    \ to the nib file, which we’ll use to connect some GUI objects to the underlying\
    \ document. Follow these steps to set this up.\n\nUse the Library panel to find\
    \ an `NSObjectController`, and drag one over to the dock, where it will join the\
    \ `File’s Owner`, the `Window`, and other top-level objects. While this new object\
    \ (which is now labeled ”Object Controller”) is selected, open the `Attributes\
    \ Inspector`. At the very top of the Inspector is the `Mode` pop-up. Change it\
    \ from `Class` to `Entity Name`, then enter ”ColorSet” in the `Entity Name` field\
    \ just below it.\n\nWith the new `Object Controller` still selected, switch to\
    \ the `Bindings Inspector`. We need to tell this controller where it should get\
    \ its data by binding its `managedObjectContext` to a reasonable value, so find\
    \ the `Managed Object Context` item under the `Parameters` heading. If the details\
    \ for this binding aren’t visible, click its disclosure triangle to expose them.\
    \ Use the `Bind To` pop-up to select `File’s Owner`, then enter ”managedObjectContext”\
    \ into the `Model Key Path` text field, and press the `Enter` key to create the\
    \ binding. As a final bonus step for this object controller, select it in the\
    \ dock and change its name to ”colorset.” That won’t change anything in the application\
    \ when it runs, but it adds some clarity to the nib for some programmer in the\
    \ future (probably you; you’ll thank yourself later for documenting things as\
    \ you go now).\n\n## The Simplest of GUIs\n\nIt’s time to build a simple GUI that\
    \ lets us view the core details of our `ColorSet` object, the two colors it contains.\
    \ Use the `Library` to find the `UILabel` object, and drag it into our `Window`.\
    \ Select its text, and change it to `Mix Color 1`. Then press `![images](images/arrow3.jpg)D`\
    \ to duplicate the label, move it aside a bit, and change its text to `Mix Color\
    \ 2`. Now find an `NSColorWell` in the `Library`, and drag it to the document\
    \ window we’re building. Once it’s in place, duplicate it with `![images](images/arrow3.jpg)D`,\
    \ and then rearrange the labels and color wells to look something like [Figure\
    \ 12-2](#9781430245421_Ch12.xhtml#Fig2).\n\n![9781430245421_Fig12-02.jpg](images/9781430245421_Fig12-02.jpg)\n\
    \n[Figure 12-2](#9781430245421_Ch12.xhtml#_Fig2) .  The bare minimum GUI for selecting\
    \ two colors\n\nNow select the color well on the left, open the `Bindings Inspector`,\
    \ and configure its Value binding to use the `colorset` controller with the `selection`\
    \ controller key and the `color1` model key path. Select the color well on the\
    \ right, and configure its Value binding to use the `colorset` controller with\
    \ the `selection` controller key, this time with the `color2` model key path.\
    \ Save the work, then click the **Run** button. The app launches, and a new, empty\
    \ “Untitled” document window appears, but the color wells are unclickable! In\
    \ our haste to get something onscreen, we neglected to create something pretty\
    \ important: a model object!\n\n## Creating a Default ColorSet\n\nWhat we need\
    \ to do is write some code that will insert a new `ColorSet` object into the object\
    \ controller whenever a new document is created.\n\nWe’ll do this in the `CMDocument`\
    \ class by adding some facilities there for accessing the object controller we\
    \ added to the nib file and for keeping track of whether the document was created\
    \ from scratch or loaded from a file. Select the `CMDocument.m` file where this\
    \ new code will be added. For starters, we’re going to add one property, an outlet\
    \ called `objectController` for pointing to the `NSObjectController` that we put\
    \ into our nib file a page or two ago. Instead of adding this to the header file,\
    \ we can use a *class extension* to declare this property in the `.m` file. A\
    \ class extension looks just like a category declaration, but with no category\
    \ name in the parentheses. Add this code just before the `@implementation` block:\n\
    \n``` \n@interface CMDocument () \n@property (weak) IBOutlet NSObjectController\
    \ *objectController; \n@end \n```\n\nAnything that we can declare in a class’s\
    \ `@interface` block—instance variables, properties, methods, etc.—can be declared\
    \ in a class extension instead. The advantage of doing so is that it keeps our\
    \ class’s interface cleaner. We can choose to only expose pieces of our class\
    \ that are really needed by other classes and let the rest be a sort of private\
    \ API that is only usable within the class.\n\nWe’re also going to add an instance\
    \ variable, a `BOOL` called `isNew` that we’ll use to keep track of whether each\
    \ document has just been created or was loaded from a file. Following the information-hiding\
    \ trail we just followed with the class extension, we’re going to reveal another\
    \ nice trick: instance variables can be declared in a class’s `@implementation`\
    \ block instead of the `@interface` in the header file. Do this by adding the\
    \ bold code shown below:\n\n``` \n@implementation CMDocument { \n    BOOL isNew;\
    \ \n} \n```\n\nNow take a glance at the rest of this `.m` file. This file contains\
    \ some ready-made methods, with comments showing where we can extend their behaviors.\
    \ We’re going to implement a bit of functionality in the `init` and `windowControllerDidLoadNib:`\
    \ methods, as well as implement the `initWithType:error:` method, which we’ll\
    \ explain in a bit. The predefined methods in here all come from `NSDocument`,\
    \ which handles most of the document-related functionality for us. `CMDocument`’s\
    \ direct superclass, however, is `NSPersistentDocument`, which implements additional\
    \ functionality for storing documents as Core Data storage backends. Start off\
    \ by adding this method:\n\n``` \n- (id)initWithType:(NSString *)typeName error:(NSError\
    \ **)outError { \n  if (self = [super initWithType:typeName error:outError]) {\
    \ \n    isNew = YES; \n  } \n  return self; \n} \n\n- (NSString *)windowNibName\
    \ { \n    return @\"CMDocument\"; \n} \n```\n\nThen, add the bold lines shown\
    \ here to the `windowControllerDidLoadNib:` method:\n\n``` \n- (void)windowControllerDidLoadNib:(NSWindowController\
    \ *)windowController { \n    [super windowControllerDidLoadNib:windowController];\
    \ \n    // Add any code here that needs to be executed once the windowController\
    \ has loaded \n    // the document's window. \n    if (isNew) { \n        id newObj\
    \ = [_objectController newObject]; \n        [newObj setValue:[NSColor redColor]\
    \ forKey:@\"color1\"]; \n        [newObj setValue:[NSColor yellowColor] forKey:@\"\
    color2\"]; \n        [_objectController addObject:newObj]; \n    } \n} \n```\n\
    \nThe bits of bold code are executed when a new document is being created. The\
    \ first, `initWithType:error:`, is only called when a new document is being created\
    \ from scratch. This is where we’d ideally want to initialize our model objects,\
    \ but all access to the model objects is mediated through the `NSObjectController`,\
    \ which is in the nib file, which at this point hasn’t been loaded yet. So we\
    \ just set the `isNew` flag to `YES`, and move along. A little later, `windowControllerDidLoadNib:`\
    \ is called in `CMDocument` after its nib has been loaded. Here we use the `objectController`\
    \ to create a new model object, set values for its two attributes, and add the\
    \ new object to the controller."
