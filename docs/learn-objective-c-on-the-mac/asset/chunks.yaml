- fmt: "# The Declaration Includes the `IBOutlet` Keyword\n\nThe declaration also\
    \ includes the `IBOutlet` keyword, which will allow Xcode to find our outlet and\
    \ make it available to us in Interface Builder. Xcode also added a line to the\
    \ class implementation, which we can see by clicking the file name in the jump\
    \ bar and selecting `ButtonsAppDelegate.m`. This file now looks like this:\n\n\
    ```objc\n#import \"ButtonsAppDelegate.h\"\n\n@implementation ButtonsAppDelegate\n\
    \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n  \
    \  // Insert code here to initialize your application\n}\n\n@end\n```\n\nDepending\
    \ on your version of Xcode, you might also see a line here that reads `@synthesize\
    \ label`. If you do see it, it instructs the compiler to create getter and setter\
    \ methods for the `label` property. The newest versions of Xcode don’t generate\
    \ this line at all because the compiler can now automatically infer when a property\
    \ needs to have getter and setter methods generated, but you’ll see it in older\
    \ code, including in many of Apple’s sample code projects. Whether you see it\
    \ or not, since we connected this outlet to the label in the window, the `label`\
    \ property will automatically be connected to the label `NSTextField` object when\
    \ the nib file is loaded.\n\n## Implementing the Action Method\n\nWe’re going\
    \ to do the same thing to create an action in our class. The only task remaining\
    \ before we can try out our program is to actually write the code that will get\
    \ called when a button is clicked, and we’ll do that now. This code will look\
    \ at the sender argument to determine the title of the button that was called,\
    \ use that title to create a string, and then use our label outlet to display\
    \ that string.\n\nIn the jump bar, select `ButtonsAppDelegate.h` to be displayed.\
    \ Next, select the button that we titled “Left.” Control-drag from the Left button\
    \ to the code, to the line below the `@property` that we created before. This\
    \ time, choose a connection type of Action. Name the action `buttonPressed:` and\
    \ leave the other fields as the default. When we click Connect, Xcode will create\
    \ a new instance method for us, which follows the conventions for actions. Like\
    \ the property we added, this will also be automatically connected when the nib\
    \ file is loaded.\n\nIf we switch back to the `.m` file, we’ll see a new empty\
    \ method that looks like this:\n\n```objc\n- (IBAction)buttonPressed:(id)sender\
    \ { }\n```\n\nWe’re going to fill this in with code to show which button was pressed\
    \ in the label. Type the following code into the body of the method:\n\n```objc\n\
    - (IBAction)buttonPressed:(id)sender {\n    NSString *title = [sender title];\n\
    \    NSString *labelText = [NSString stringWithFormat:@\"%@ button pressed.\"\
    , title];\n    [self.label setStringValue:labelText];\n}\n```\n\nThis method first\
    \ grabs the title of the button that called it. It then uses that button to create\
    \ a new string, and then uses that string to update the label. The method refers\
    \ to the property using *dot notation* for property access, which is just shorthand\
    \ for saying `[self label]`.\n\n### Nesting Messages\n\nSome Objective-C developers\
    \ nest their message calls pretty deeply. You may come across code like this in\
    \ your travels:\n\n```objc\n[self.label setStringValue:[NSString stringWithFormat:@\"\
    %@ button pressed.\",\n  [sender title]]];\n```\n\nThis one line of code will\
    \ function exactly the same as the three lines of code that make up our `buttonPressed:`\
    \ method. For the sake of clarity, we won’t generally nest Objective-C messages\
    \ so deeply in the code examples in this book, with the exception of calls to\
    \ `alloc` and `init`, which, by longstanding convention, are almost always nested.\n\
    \n## Running the App\n\nIn the previous chapter, we used the Simulate Document\
    \ command to work with the controls and connections that we’d set up. It worked\
    \ in that chapter because we had no code. This time, we’ve got some code, so we\
    \ need to actually compile and link the app. Click the Run button in the upper\
    \ left-hand corner of the Xcode window, or press ![images](images/arrow3.jpg)R.\n\
    \nIf this is the first time you’ve tried to run custom code, you may get a window\
    \ asking if you want to enable developer mode on this Mac. Go ahead and click\
    \ that you want to enable it; you’ll be prompted for your password as a security\
    \ measure. Your code should compile cleanly, and then you’ll see the Press a Button\
    \ window. If you click the Left button, the label should update to read “Left\
    \ button pressed.” If you click the center or right buttons, nothing will happen,\
    \ because you haven’t wired those buttons up yet. We’ll do that in a moment, but\
    \ for now, note that you’ve got a live Cocoa app running with your own code in\
    \ it!\n\nQuit the app and you should be returned to Xcode, right where you left\
    \ it. You should still have the nib Editor pane open on one side of the window,\
    \ and the Assistant Editor open to your `.m` file. We’re going to set up the connections\
    \ between the Center and Right buttons and the `buttonPressed:` action. As it\
    \ happens, we can make the connection to an existing action either the `.h` or\
    \ the `.m` file.\n\nSelect the Center button in the nib, and control-drag to the\
    \ `buttonPressed:` method in either the `.h` or the `.m` file. When the pointer\
    \ reaches a valid action, the action will highlight in a blue outline and a small\
    \ window will appear saying “Connect Action.” Let go, and the connection is in\
    \ place. Do the same with the Right button.\n\nAs before, click the Run button\
    \ in the upper left-hand corner of the Xcode window, and the app will compile\
    \ and launch. This time, clicking any of the three buttons will update the label.\
    \ The one action method handles all three buttons appropriately. Move the window\
    \ to a new location and quit the application. Press ![images](images/arrow3.jpg)R\
    \ to launch the program again, and the window should come up in exactly the same\
    \ position it was in when we quit the program. If we click the yellow Minimize\
    \ button in the title, the window will shrink down into our dock (click it in\
    \ the dock to maximize it), and if we click ![images](images/arrow3.jpg)W or click\
    \ the red close button in the window, the window will close. Unfortunately, the\
    \ application is still running, but there’s no way to get the window back open.\
    \ Let’s address that now by configuring our application to quit when the window\
    \ is closed. To do this, we’ll have to use something called the *application delegate*.\n\
    \n## The Application Delegate\n\nEvery Cocoa application has one and only one\
    \ instance of a class called `NSApplication`. We don’t need to interact with `NSApplication`\
    \ directly very much. It’s created for us and handles the event loop (the part\
    \ of our application that notices user input from the mouse and keyboard, and\
    \ handles the input by sending messages to the appropriate objects) and most of\
    \ the lower-level stuff without us having to give it much thought.\n\nExpand the\
    \ Supporting Files folder in the Project Navigator pane, and single-click `main.m`.\
    \ In that file is our application’s `main()` function, which is the function that\
    \ gets called when our application is launched. This function contains only one\
    \ line of code, which calls a function named `NSApplicationMain()`. That function,\
    \ which is part of Cocoa, automatically creates an instance of `NSApplication`\
    \ for us. That instance of `NSApplication` goes into a loop and continuously polls\
    \ for events from the keyboard, mouse, operating system, and other applications,\
    \ and then responds to those events (don’t worry about the specifics for now;\
    \ we’ll learn more about events later in the book). When it detects an event that\
    \ signifies that the application should quit, the event loop stops and the application’s\
    \ execution ends.\n\n`NSApplication` allows us to specify an optional object to\
    \ act as its delegate. Simply put, a delegate is a class that handles certain\
    \ tasks on behalf of another class."
