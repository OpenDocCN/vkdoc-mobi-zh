    # 输出口与操作


    但在前两个应用中，缺少了一个大多数应用都需要的非常重要的功能：与用户交互的能力。上一章我们在 Interface Builder 中看到，有一个完整的库，里面装满了文本字段和按钮之类的对象，我们可以用它们来组装界面，但如果无法得知这些界面对象何时被使用或更改它们包含的数据，它们就毫无用处。在本章中，我们将了解如何通过这些对象的输出口和操作，让用户与我们的应用进行交互。


    ## 声明输出口与操作


    回顾上一章的内容，Cocoa 使用所谓的*输出口*和*操作*来连接用户界面中的对象和我们代码中的对象。输出口是我们 nib 文件中指向对象的指针，它允许我们的代码访问和操作
    nib 中的对象。操作是我们编写的方法，可以直接响应用户交互而执行，例如点击按钮或用户选择菜单项。输出口和操作通常包含在我们的控制器类中（尽管有时也会在其他地方使用）。


    ### 声明输出口


    输出口是 Objective-C 的实例变量，使用一个特殊关键字 `IBOutlet` 声明。输出口是一个指针，可以链接到用户界面中的对象。因此，例如，我们的控制器类可以像这样声明一个指向可编辑文本字段的输出口：


    ```objc

    @property (weak) IBOutlet NSTextField *nameField;

    ```


    在这个例子中，就我们的代码而言，`nameField` 是一个指针，指向我们在 Interface Builder 中链接到的任何文本字段。它的行为与我们自己分配和初始化的对象指针完全相同。一旦输出口链接到一个对象，我们就可以检索或设置其值、隐藏它、禁用它，或者执行该对象支持的任何其他操作。稍后我们将看到如何在
    nib 文件中建立输出口和对象之间的链接。


    属性 `(weak)` 包含在 Xcode 在 `.h` 文件中生成输出口代码中。它意味着控制器不“拥有” `nameField`；该 `nameField`
    可能会被释放，如果发生这种情况，该属性将设置为 `nil`。属性上还可以设置其他属性，涉及内存语义和命名。当我们手动添加属性时，我们需要熟悉可用于注释它们的各种属性。目前，只需保留
    Xcode 生成的方式即可。


    你可以在 Mark Dalrymple 和 Scott Knaster 合著的第二版 *Learn Objective-C on the Mac*（Apress,
    2012）以及 *The Objective-C Programming Language* 一书中了解更多关于新的 Objective-C 属性的信息，后者可在
    Xcode 和 Apple 开发者网站 `https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/ObjectiveC/ObjC.pdf`
    上找到。


    ### 声明操作


    如前一章所述，操作是可以直接从应用用户界面调用的 Objective-C 方法。我们的对象中的操作通过在 Interface Builder 中从用户界面控件拖拽到我们代码中的方法来连接到用户界面。


    操作的创建方式与其他 Objective-C 方法完全相同，但它们必须符合特定的结构。特别是，操作方法声明必须如下所示：


    ```objc

    -(IBAction)doSomething:(id)sender;

    ```


    方法的名称可以是任何我们想要的，但返回类型必须是 `IBAction`，并且该方法必须接受一个类型为 `id` 的参数，它将是指向触发该操作的对象的指针。如果此方法因用户点击按钮而被调用，那么
    `sender` 将是指向所按下按钮的指针。一个操作可以是多个用户界面对象的目标，并且 `sender` 参数让我们知道使用了哪个控件。


    **注意** 操作方法是一个 Cocoa 和 Cocoa Touch 存在差异的领域。


    在 Cocoa Touch 中，操作方法可以具有三种不同的方法签名之一，分别接受零个、一个或两个参数。但这不适用于 Cocoa 中的操作，后者必须且只能接受一个参数。


    ## 但它们到底是什么？


    `IBAction` 和 `IBOutlet` 到底是什么？它们是 Objective-C 语言的一部分吗？


    不，它们只是老式的 C 预处理器宏。如果我们进入 `AppKit.framework` 并查看 `NSNibDeclarations.h` 头文件，我们会发现它们是这样定义的：


    ```c

    #ifndef IBOutlet

    #define IBOutlet

    #endif

    #ifndef IBAction

    #define IBAction void

    #endif

    ```


    困惑吗？这两个关键字对编译器来说绝对没有任何作用。`IBOutlet` 在编译器看到它们之前就被完全从代码中删除了。`IBAction` 解析为一个 `void`
    返回类型，这只是意味着操作不返回值。那么，这是怎么回事？


    答案其实很简单：`IBOutlet` 和 `IBAction` 不是给编译器用的。它们是给 Interface Builder 用的。Interface Builder
    使用这些关键字来解析可用的输出口和操作。Interface Builder 只能看到以 `IBAction` 开头的方法，以及以 `IBOutlet` 开头的变量或属性。此外，这些关键字的存在告诉将来查看我们代码的其他程序员，所涉及的变量和方法并非完全通过代码处理。他们需要深入研究相关的
    nib 文件，才能了解事物是如何连接和使用的。


    ## 输出口与操作实际运用，第二幕


    没有什么比实际操作更能理解这些概念了，因此我们将编写另一个 Cocoa 应用。在这个应用中，我们将自己编写一些代码。设置新项目的步骤与上一章中使用的步骤相同，所以应该会感觉很熟悉。实际上，我们每次创建新项目时都会重复这些步骤。


    如果你不在 Xcode 中，请重新打开它。现在，按下 `![image](img/arrow1.jpg)N` 或从**文件**菜单中选择**新建项目**。再次选择*Cocoa
    应用*模板。确保*Core Data* 和*基于文档的应用*复选框已关闭，*使用自动引用计数*复选框已打开，并在提示输入项目名称时，输入"Chapter4"（图
    4-1）。对于此示例，我们将使用 `Buttons` 作为类前缀设置。再次点击下一步，并为项目选择一个文件夹。点击创建，Xcode 会带我们进入项目设置面板。Xcode
    还为我们生成了一个名为 `ButtonAppDelegate` 的类和一个名为 `MainMenu.xib` 的 nib 文件。


    ![9781430245421_Fig04-01.jpg](img/9781430245421_Fig04-01.jpg)


    图 4-1. 在 Xcode 中设置新 Cocoa 应用的初始属性


    我们将从布局界面开始，因此在*导航器*窗格中单击 `MainMenu.xib`。这将在 Interface Builder 编辑窗格中打开 nib 文件（图
    4-2）。


    ![9781430245421_Fig04-02.jpg](img/9781430245421_Fig04-02.jpg)


    图 4-2. Xcode 的 Interface Builder 编辑器中 MainMenu.xib 窗口的初始视图


    在 Interface Builder 窗格的左下方有一个小的灰色三角形，像一个播放按钮。点击它，Interface Builder 窗格左边界上的一组图标将展开为一组*占位符*和一组*对象*（图
    4-3）。我们将处理*对象*部分中名为 `Window - Chapter4` 的对象。


    ![9781430245421_Fig04-03.jpg](img/9781430245421_Fig04-03.jpg)


    图 4-3. 将 nib 内容展开为占位符和对象


    ### 占位符对象


    不过，在此之前，请花点时间看一下 nib 中的前三个对象。

