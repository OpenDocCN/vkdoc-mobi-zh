  trans: '

    框架可以包含图像、声音和影片，甚至还能包含其他框架。尽管 OS X 支持传统的 Unix 库，但操作系统的绝大部分功能，以及几乎所有让 OS X 独具特色的功能，都包含在这些框架中。构成核心操作系统的框架足有数十个之多，它们通常按功能进行分组。


    **提示** 你可以通过查看 `/System/Library/Frameworks` 文件夹来了解构成 Mac OS X 的框架。这些框架绝对、永远都不能碰，所以只管看，然后悄悄退出文件夹，别让它们察觉到你的存在。如果你触碰了它们，框架可能会变成麻烦的小捣蛋鬼。你也可以通过查看
    `/Library/Frameworks` 来了解系统中已安装的第三方和可选框架。你 Mac 上安装的程序所需的框架通常都存放在这里。再次提醒，看看就好，不要触碰，否则可能会搞乱某些重要的东西。事实上，如果你运行的是
    Mountain Lion 系统，那么 ` /Library` 目录在 Finder 中默认是隐藏的。


    尽管框架数量众多，但在 Cocoa 中编程时，你绝大部分时间都只使用其中少数几个框架的对象。实际上，你将用到的大部分对象都来自于一个名为（猜对了！）Cocoa
    框架的单一框架。


    还记得我们说过框架可以包含其他框架吗？没错，Cocoa 框架实际上只是另外三个框架的包装器，这三个框架承载了编写 Cocoa 应用程序时你将用到的大部分功能，它们是：Foundation
    框架、AppKit 框架和 Core Data 框架。


    你偶尔会用到其他框架的功能。例如，你可能使用 Core Animation 框架为用户界面添加一些炫酷的动画，或者使用 Core Image 框架进行一些高强度图像处理。但你使用的大部分对象仍将来自构成
    Cocoa 的那三个框架。我们将在第 7 章开始讨论 Core Data 框架，现在先花点时间简要了解另外两个框架，我们将在本章中用到它们。


    ## Foundation 框架


    Foundation 框架名副其实。它包含了几乎所有其他功能所依赖的对象。Foundation 框架在 Cocoa 和 Cocoa Touch 之间是共享的。尽管
    Foundation 框架不断发展，但它包含的许多对象自 NeXTStep 早期就已存在，并且它们的基本用法并未发生太大变化。Foundation 包含诸如
    ` NSString` （用于在 Cocoa 中表示文本的类）以及像 ` NSArray` 和 ` NSDictionary` 这样的集合类。通过学习了 Objective-C，你应该已经对
    Foundation 框架有一定了解。


    ## AppKit 框架


    看看你 Mac 的屏幕。你看到的几乎所有东西都属于 AppKit 的领域，AppKit 是“应用程序工具包”的缩写。这个框架包含了用于创建或管理用户界面的所有对象。这里有创建按钮、窗口、文本字段、标签栏等对象。你在多个应用程序中都见过的任何用户界面元素，很可能都是
    AppKit 框架的一部分。上一章中你免费获得的所有那些酷炫功能？没错，都是 AppKit 的。我们将在本章中构建的应用程序，也全是基于 AppKit 的。


    ## Cocoa 之道：模型-视图-控制器


    在深入探讨如何使用这些框架之前，我们需要讨论一个非常重要的理论基础。Cocoa 的设计者们遵循了一个名为“模型-视图-控制器”（MVC）的概念，这是一种将构成
    GUI 应用程序的代码进行逻辑划分的非常合理的方式。


    如今，几乎所有面向对象的应用程序框架都在某种程度上遵循 MVC 模式，但很少有像 Cocoa 这样如此忠实地遵循 MVC 模型，或者像它一样运用该模型如此之久。


    MVC 模型将所有功能划分为以下三个不同的类别：


    -   *模型*：持有应用程序数据的类。

    -   *视图*：用户可以看到并与之交互的窗口、控件和其他元素。

    -   *控制器*：将模型和视图绑定在一起的部分，包含决定如何处理用户输入的应用程序逻辑。


    MVC 的目标是让实现这三种代码类型的对象彼此尽可能区分开来。你编写的任何对象都应当能够清晰地识别为属于这三个类别之一，并且其内部很少或根本没有可归入其他两个类别的功能。例如，实现按钮的对象不应包含用于在点击按钮时处理数据的代码，而实现银行账户的代码不应包含用于绘制表格以显示其交易记录的代码。


    MVC 有助于确保最大限度的可重用性。一个实现通用按钮的类可以在任何应用程序中使用。而一个实现点击后执行特定计算的按钮类，则只能在其最初编写的应用程序中使用。


    当你编写 Cocoa 应用程序时，你将主要使用 Interface Builder 创建视图组件，尽管有时你也会通过代码修改界面，或者你可能继承现有的视图和控件类来创建新的类。


    模型将使用名为 Core Data 的东西来创建，或者通过编写 Objective-C 类来持有应用程序的数据。我们不会在本章的应用程序中创建任何模型对象，因为我们还不打算存储任何数据，但从下一章开始，我们将介绍非常简单的模型对象，并在第
    8 章开始使用 Core Data 时，过渡到功能完善的模型对象。


    控制器组件通常包含我们创建且特定于应用程序的类。控制器可以是完全自定义的类（ ` NSObject` 的子类），这是 Cocoa 中的传统做法。几年前，Apple
    开始在 AppKit 框架中引入一些通用控制器类，用于为我们处理某些基本任务，例如处理要在列表中显示的对象数组。这些对于最小化样板代码非常有用。


    随着我们对 Cocoa 的深入了解，你会很快看到 AppKit 框架的类是如何遵循 MVC 原则的。如果在开发时你始终将这一概念铭记在心，你将创建出更干净、更易于维护的代码。


    ## 插座变量、动作和方法、控制器


    显然，如果你无法将数据传入或传出用户界面，或者无法通过代码更改其外观，那么用户界面就没有多大用处。在 Cocoa 中，我们使用称为*插座变量*和*动作*的东西与我们在
    Interface Builder 中设计的用户界面进行交互。


    -   插座变量是指向 nib 文件中对象的指针。插座变量允许我们从代码中访问 nib 中的对象。

    -   动作是可以直接响应用户交互（例如点击按钮）而执行的方法。无论这些对象是框架类还是我们自己的代码，它们都是应用程序对象响应用户输入的方式。


    插座变量和动作通常包含在控制器类中（尽管它们有时也用于其他地方）。在本章中，我们将使用两个 AppKit 类—— ` NSSlider` 和 ` NSTextField`
    暴露的插座变量和动作——来演示如何操作。在下一章中，我们将自己编写它们。


    ### 插座变量


    插座变量是使用特殊关键字 ` IBOutlet` 进行声明的 Objective-C 实例变量。

