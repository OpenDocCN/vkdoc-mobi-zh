  trans: "\n让我们先从图像开始。通过在我们创建类时预置的 `drawRect:` 方法中添加几行代码，我们可以快速将图像复制到位：\n\n```\n-\
    \ (void)drawRect:(NSRect)dirtyRect {\n  NSRect srcImageRect = NSMakeRect(0, 0,\
    \ [self.image size].width,\n    [self.image size].height);\n  [self.image drawAtPoint:[self\
    \ bounds].origin fromRect:srcImageRect\n    operation:NSCompositeCopy fraction:1.0];\n\
    }\n```\n\n我们在这里做的第一件事是创建一个名为 `srcImageRect` 的矩形，其原点为 (0,0)，大小与图像尺寸相等。然后，我们向图像本身发送一条消息，告诉它将\
    \ `srcImageRect` 指定的图像部分（此处为整张图像）绘制到当前图形上下文中，该上下文位于视图边界矩形的原点位置。简而言之，整张图像被复制，其左下角将精确地位于视图的左下角。我们在此使用的绘制方法还允许我们指定一个操作，该操作决定源图像和目标图像中透明度的合并方式，以及一个介于\
    \ 0.0 和 1.0 之间的整数，作为整张图像的整体 alpha 级别。任何低于 1.0 的值都会使图像变得部分透明；一直降到 0.0 会使图像完全不可见。\n\
    \n现在，*运行*应用程序，看看我们目前做到了什么程度。应用程序打开后，显示一个几乎空白的窗口，底部是图像拖放区和文本字段。找一张好看的 LOLcat 风格的图片（我们使用的是通过\
    \ Flickr 找到的美国国家档案馆的非版权图片），并将其拖入图像拖放区，效果应类似于图 14-11。\n\n![9781430245421_Fig14-11.jpg](img/9781430245421_Fig14-11.jpg)\n\
    \n图 14-11。这里可没什么好笑的\n\n嘿，这可不是很令人满意！我们只看到了拖入图片的左下角！要是能有办法看到整张图片就好了……\n\n## 让它滚动起来\n\
    \n当然，是有办法的。Cocoa 包含一个名为 `NSScrollView` 的类，在这里可以提供帮助。通过将视图放入 `NSScrollView` 内部，我们可以获得水平和垂直滚动条，用户可以使用它们来滑动视图。滚动视图负责处理所有繁重的工作。我们放入其中的任何视图的绘制代码都不需要更改！将\
    \ `LOLView` 放入 `NSScrollView` 出奇地简单。我们只需要添加一点代码，并在 Interface Builder 中做一些调整。\n\
    \n首先，在 Xcode 中打开 nib 文件以准备滚动视图本身。选择 `LOLView`，然后从菜单中选择 **Editor** ![image](img/arrow.jpg)\
    \ **Embed in** ![image](img/arrow.jpg) **Scroll View**。我们的 `LOLView` 现在被包裹在一个滚动视图中，但定位和大小有些偏差。移动滚动视图，直到蓝色参考线在窗口左上角闪烁，然后使用右下角的调整控件稍微调整大小，直到该侧的蓝色参考线闪烁。该视图应几乎填满窗口的宽度，并带有通常的边框，并且向下延伸足够的距离，以便在其他控件上方留出合适的边距（参见图\
    \ 14-12）。\n\n![9781430245421_Fig14-12.jpg](img/9781430245421_Fig14-12.jpg)\n\n\
    图 14-12。为滚动调整后的 LOLmaker 窗口\n\n我们还可以免费获得滚动视图的一些有用的缩放行为，这对于支持用户双指捏合缩放的多点触控触控板非常有用。既然它是免费的，我们就利用一下。选中滚动视图，打开*属性检查器*。其中一个选项是“放大”。勾选*允许*旁边的复选框，代码部分我们就完成了。\n\
    \n我们需要添加的代码实际上是 `setImage:` 方法的另一部分。\n\n我们要做的是在每次设置新图像时调整 `LOLView` 的大小，使视图的大小与图像大小匹配。之后，当\
    \ `LOLView` 被包含在 `NSScrollView` 中时，滚动视图会注意到新的视图大小，并自动重新渲染包括滚动条在内的所有内容。新代码如下所示：\n\
    \n```\n- (void)setImage:(NSImage *)i {\n  if (![i isEqual:_image]) {\n    if (i)\
    \ {\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n        [i\
    \ size].height);\n      [self setFrame:newImageFrame];\n    }\n    _image = i;\n\
    \    [self setNeedsDisplay:YES];\n  }\n}\n```\n\n保存所有工作，点击*运行*，滚动视图就完成啦！拖入一张大图片，注意它起始于左下角，但滚动条已经出现，我们可以拖动到任何想要的位置，如果硬件支持，我们还可以双指捏合缩放！在图\
    \ 14-13 中查看实际效果。\n\n![9781430245421_Fig14-13.jpg](img/9781430245421_Fig14-13.jpg)\n\
    \n图 14-13。滚动条：如此简单，连猫都会\n\n## 绘制文字\n\n好了，让我们进入最后一步，绘制文字。在 LOLcats 社区中，传统上使用 Impact\
    \ 字体并以黑色阴影的白色文字作为标题。这种字体随 Mountain Lion 系统安装，因此我们所有的用户都应该拥有它。这应该轻而易举。唯一稍微棘手的一点是选择字号。由于图像可能有各种尺寸，我们需要动态选择字号，以便标题在视图内占据合适的位置，而不会延伸到侧面。我们将通过测试几种字号来实现这一点，从\
    \ 1 开始，每次将大小加倍，直到达到文本宽度会超过视图本身的程度。然后我们将字号稍稍调小一些，再绘制文本。所有这些都通过添加下面显示的加粗行来完成：\n\n\
    ```\n- (void)drawRect:(NSRect)dirtyRect {\n  // 此处的绘制代码。\n  NSRect srcImageRect\
    \ = NSMakeRect(0, 0, [self.image size].width,\n    [self.image size].height);\n\
    \  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n    operation:NSCompositeCopy\
    \ fraction:1.0];\n\n  if (self.text != nil && [self.text length] > 0) {\n    NSPoint\
    \ textLocation = NSMakePoint(0,0);\n    NSShadow *textShadow = [[NSShadow alloc]\
    \ init];\n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n    [textShadow setShadowColor:[NSColor\
    \ blackColor]];\n    [textShadow setShadowBlurRadius:10];\n    NSMutableDictionary\
    \ *textAttributes =\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n   \
    \     [NSColor whiteColor], NSForegroundColorAttributeName,\n        textShadow,\
    \ NSShadowAttributeName,\n        nil];\n\n    // 找到最佳字号\n    CGFloat fontSize;\n\
    \    NSSize testSize = NSMakeSize(0, 0);\n    for(fontSize=1; testSize.width <\
    \ [self.image size].width; fontSize*=2)\n    {\n      [textAttributes setObject:[NSFont\
    \ fontWithName:@\"Impact\"\n        size:fontSize]\n        forKey:NSFontAttributeName];\n\
    \      testSize = [self.text sizeWithAttributes:textAttributes];\n    }\n    [textAttributes\
    \ setObject:[NSFont fontWithName:@\"Impact\"\n      size:fontSize/4]\n      forKey:NSFontAttributeName];\n\
    \n    // 然后绘制文本\n    [self.text drawAtPoint:textLocation\n      withAttributes:textAttributes];\n\
    \  }\n}\n```\n\n现在点击*运行*，将一张图片拖入图像拖放区，并写入一些文字。瞧！它应该看起来像图 14-14。\n\n![9781430245421_Fig14-14.jpg](img/9781430245421_Fig14-14.jpg)\n\
    \n图 14-14。我能搞个新闻发布会吗？\n\n## 总结\n\n在本章中，我们深入了解了 `NSView`、`NSBezierPath` 以及一些其他处理绘图的类和数据结构的工作原理。\n"
- fmt: "# Advanced Drawing Topics\n\nHowever, there’s still lots more we can do with\
    \ Cocoa’s drawing facilities, including drawing more interesting curves, modifying\
    \ our drawing in response to mouse events, and animating our views, all of which\
    \ will be covered in the next chapter.\n\n[Chapter 14](#9781430245421_Ch14.xhtml)\
    \ provided some basic knowledge of Cocoa’s key drawing concepts, such as using\
    \ paths to describe shapes, copying images to the screen, and rendering text.\
    \ This chapter will expand upon this, demonstrating a few techniques that will\
    \ bring our graphics to life. The first section will cover how to make a view\
    \ respond to mouse events, letting users interact with our customized views. The\
    \ second section will provide a brief introduction to Core Animation, an exciting\
    \ technology that lets us create smooth animations with just a few lines of code.\n\
    \n## Editing a Curve\n\n[Chapter 14](#9781430245421_Ch14.xhtml) introduced the\
    \ `NSBezierPath` class for drawing rounded rectangles, ovals, straight lines,\
    \ and points. If you’ve used a Bezier drawing tool in Photoshop or other applications,\
    \ you may have wondered what those shapes have to do with Bezier curves at all!\
    \ A Bezier curve is essentially a series of points describing a path and control\
    \ points describing the curves between the points. As such, basically any shape\
    \ that can be drawn with a pen (in the real world, or virtually in a computer\
    \ graphics system) can be described as a Bezier curve, including straight lines\
    \ and jagged angles.\n\nHowever, as a layman’s term, Bezier curve usually means\
    \ something more along the lines of what’s shown in [Figure 15-1](#9781430245421_Ch15.xhtml#Fig1).\
    \ In it, the black curve is a Bezier curve, defined by two endpoints (the lower-left\
    \ and upper-right corners) and two control points depicted by rather gigantic\
    \ circles at the end of sticks. By dragging the control points around, the user\
    \ can change the shape of the curve. A view like this can be useful as a pacing\
    \ control, determining the rate of change of some value over time, such as the\
    \ movement of object from one point to another. Make the curve into a straight\
    \ line to specify a perfectly linear transition, or make a sort of S-shape to\
    \ make a value start changing slowly, quickly ramp up halfway through, and then\
    \ slow down as it approaches the target value (sometimes known as an “ease-in/ease-out”\
    \ transition). This control is what we’re going to be implementing in this section.\n\
    \n![9781430245421_Fig15-01.jpg](images/9781430245421_Fig15-01.jpg)\n\n[Figure\
    \ 15-1](#9781430245421_Ch15.xhtml#_Fig1). A Bezier curve\n\n## Preparations\n\n\
    Create a new Cocoa project in Xcode and name it `CurveEdit`. Ensure that *Automatic\
    \ Reference Counting* is checked, and use `CE` as the class prefix for this application.\n\
    \nThe interesting part of this application will all be in the view object, but\
    \ first let’s take care of the infrastructure surrounding the view. We’re going\
    \ to stick with the MVC architecture for this project, which will help us make\
    \ sure that the view we create will be usable as a standalone component. The text\
    \ fields for displaying each control point’s x and y values will be connected\
    \ to our controller object with Cocoa Bindings, as will the custom view itself.\
    \ The model in this app will just be a set of instance variables in our controller\
    \ class, but all the views could just as easily be bound to a real model object\
    \ if we chose to use or create one.\n\nMake a new `NSView` subclass called `CECurveView`,\
    \ and leave its implementation as-is for now. We’ll get back to it soon enough.\
    \ Open `MainMenu.xib`. From the *Object Library*, drag out a *Custom View*, and\
    \ use the *Identity Inspector* to set its class to `CECurveView`. Resize it to\
    \ about 240 x 240. Next, we need to connect the app delegate and the view that\
    \ we just dropped into the window. To do this, open up the `CEAppDelegate.h` file\
    \ in an Assistant Editor, and control-drag from the `CECurveView` custom view\
    \ over to the `CEAppDelegate.h` code in the Assistant Editor window. Drag to just\
    \ under the existing `@property` declaration, and an “Insert Outlet” message should\
    \ appear. Title the new outlet `curveView`.\n\nWe’ve got a few more changes to\
    \ make. We’re going to add an import statement to pull in the `CECurveView` header\
    \ file and some additional properties that we’ll soon be using through Cocoa Bindings.\
    \ Put the following in the `.h` file:\n\n```objc\n#import <Cocoa/Cocoa.h>\n#import\
    \ \"CECurveView.h\"\n\n@interface CEAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet CECurveView\
    \ *curveView;\n\n@property (assign) CGFloat cp1X;\n@property (assign) CGFloat\
    \ cp1Y;\n@property (assign) CGFloat cp2X;\n@property (assign) CGFloat cp2Y;\n\n\
    @end\n```\n\nThen switch to the `.m` file, and add the following lines:\n\n```objc\n\
    #import \"CEAppDelegate.h\"\n\n@implementation CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // make the CECurveView notice my changes\n    [self.curveView\
    \ bind:@\"cp1X\" toObject:self withKeyPath:@\"cp1X\"\n        options:nil];\n\
    \    [self.curveView bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n    \
    \    options:nil];\n    [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"\
    cp2X\"\n        options:nil];\n    [self.curveView bind:@\"cp2Y\" toObject:self\
    \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    // make me notice the CECurveView's\
    \ changes\n    [self bind:@\"cp1X\" toObject:self.curveView withKeyPath:@\"cp1X\"\
    \n        options:nil];\n    [self bind:@\"cp1Y\" toObject:self.curveView withKeyPath:@\"\
    cp1Y\"\n        options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView\
    \ withKeyPath:@\"cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
    \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    // set initial values\n  \
    \  self.cp1X = 0.5;\n    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y\
    \ = 1.0;\n}\n\n@end\n```\n\nAs you can see, the controller class is very simple.\
    \ All it does is declare properties for accessing the control points’ x and y\
    \ values and an `IBOutlet` to connect to the `CECurveView` itself, establish some\
    \ bindings on behalf of our `curveView` (because we can’t do those in Interface\
    \ Builder), and set some default starting values for the control points. Because\
    \ we’re setting this object’s bindings in code, the `CECurveView` instance is\
    \ now all set (as far as our nib is concerned). With that, we can close the Assistant\
    \ Editor.\n\nGo back to the *Object Library* and pull out a Label, dropping it\
    \ below the `CECurveView`. Change the title of the label to be `X1:`. Drag out\
    \ a Text Field as well, and drop it next to the label so that the blue guidelines\
    \ indicate good alignment. Select the label and the text field together, and then\
    \ hit `⌘D` to duplicate them. Position the new set below the first one, and change\
    \ the label’s title to read `Y1:`. This form will show us the x and y values for\
    \ the first control point in a Bezier curve. Create bindings for each of the two\
    \ text fields. For each, we want to bind its Value attribute to the `CEAppDelegate`\
    \ object using the model key paths `cp1X` and `cp1Y`, respectively.\n\nSelect\
    \ both labels and both text fields, duplicate them (`⌘D`), and position the new\
    \ copies to the right of the first set. These fields will show us the values for\
    \ the second control point, so rename the labels as `X2:` and `Y2:`, and set up\
    \ bindings similar to the first set, but using `cp2X` and `cp2Y` as the key paths\
    \ instead.\n\nRefer to [Figure 15-1](#9781430245421_Ch15.xhtml#Fig1) to see what\
    \ it should look like, lay things out nicely, and resize the window to match the\
    \ added content. Save the files, and *Run* the project just to make sure there\
    \ are no errors at this point. The resulting app will only let us edit the contents\
    \ of the four text fields."
