- fmt: 'These icons will always exist in Cocoa nib files. We can’t delete them and,
    unlike the other icons, they don’t cause object instances to get created when
    the nib is loaded. These three are called *placeholder objects*, and they allow
    connections from objects in this nib to certain objects that already exist.


    The first icon in any nib file is called `File’s Owner`. This icon is a placeholder
    that points to the object instance that loaded the nib from disk or, in other
    words, the object instance that “owns” the nib. In an application’s `MainMenu.xib`
    file, such as we have here, the `File’s Owner` icon will always point to an instance
    of `NSApplication`, which is the class that represents the entire application,
    and receives input and makes sure the appropriate code gets called as a result
    of that input. For other nib files, `File’s Owner` could be a different class,
    such as an instance of a document class, or the class that represents a plug-in.


    The second icon in this and any other nib file is called `First Responder`. We’ll
    talk more about responders in [Chapter 10](#9781430245421_Ch10.xhtml), but the
    first responder is the object with which the user is currently interacting. If,
    for example, the cursor is typing in a text field, that text field is the current
    first responder. The first responder changes as the user interacts with the interface,
    and the `First Responder` icon gives us a convenient way to interact with whatever
    control or view currently has the focus without having to write code to determine
    which control or view that is.


    The third icon, called `Application` (or the application placeholder), is a relatively
    new addition to Cocoa nib files. This object points to this application’s one
    and only instance of `NSApplication`. In a `MainMenu.xib` file, the application
    proxy and the `File’s Owner` placeholder will always point to exactly the same
    thing. The application placeholder gives us access to our application’s `NSApplication`
    instance from any nib file, even ones whose `File’s Owner` is not `NSApplication`.
    For this chapter, we can forget about the application placeholder, because this
    nib’s `File’s Owner` already gives us access to that object.


    ## Setting Up The Window


    Now we can start working on laying out the window. In the *Objects* section, select
    the icon labeled `Window - Chapter4`, and the window will display on the Interface
    Builder pane with a blue box around it to show that it’s selected. The *Inspector*
    pane in the *Utility* area will show the settings that are tunable for the window
    ([Figure 4-4](#9781430245421_Ch04.xhtml#Fig4)). We’re going to make some changes
    to the defaults.


    ![9781430245421_Fig04-04.jpg](images/9781430245421_Fig04-04.jpg)


    [Figure 4-4](#9781430245421_Ch04.xhtml#_Fig4). The Attributes Inspector showing
    options available for a window


    Change the window’s title from “Chapter4” to “Press a Button.” The field below
    *Title* is labeled *Autosave*. If we provide a value in this field, our application
    will automatically save the location, size, and other information about the window
    in our user preferences so that when the user launches the application again,
    he or she will find the window exactly where it was left. It doesn’t matter what
    value we put here, as long as it is unique for each window in our application.
    If we use the same autosave name for any two objects, one of them will fail to
    save. Type `mainWindow` here.


    Right under the *Autosave* field are three checkboxes that control some of the
    fundamental behavior of the window. The *Close* checkbox enables or disables the
    ability to close the window. In a utility application with only one window, we
    could uncheck this box so that the window can’t be closed. If this box is unchecked,
    both the red Close button in the window’s title bar and the **Close** menu item
    will be disabled. If we allow the window to be closed, we should provide a way
    to make the window visible again.


    Alternatively, if our application is a utility that consists of only one window,
    it is acceptable to have the application quit when the window is closed. Later
    on in this chapter, we’ll configure our application to quit when this window is
    closed, so leave the *Close* checkbox as it is. In later chapters, we’ll learn
    how to make closed windows visible again.


    The *Minimize* checkbox controls whether the window can be minimized to the dock
    using the yellow button in the window’s title bar or from selecting *Minimize*
    from the **Window** menu. As a general rule, windows should be able to be minimized.
    There are exceptions to this, such as utility windows that are visible only when
    our application is front-most, but the vast majority of the time we should leave
    this checked.


    The third box is called *Resize*, and it controls whether the user can change
    the size of the window by dragging the lower right corner. For this application,
    we’re going to disable resizing of this window, so uncheck *Resize*. We’ll learn
    how to handle controls in windows that resize later in the book.


    Leave the rest of the attributes unchanged for now. The class that represents
    windows is a very flexible class, and the other attributes give us a tremendous
    amount of control over the appearance of our application and how it reacts to
    some of the more advanced user features in OS X such as Expose, Spaces, and Full
    Screen mode, but for most windows, the default settings are what we want.


    Now, press ![image](images/arrow2.jpg)5 to bring up the *Size Inspector* ([Figure
    4-5](#9781430245421_Ch04.xhtml#Fig5)). This is where we can set the size and size-related
    attributes of the selected object. As we saw in the last chapter, objects can
    be moved and resized using the mouse, but this Inspector gives us more precise
    control over the size and position of an object.


    ![9781430245421_Fig04-05.jpg](images/9781430245421_Fig04-05.jpg)


    [Figure 4-5](#9781430245421_Ch04.xhtml#_Fig5). Size Inspector for the application’s
    window


    Set the width of our window to 480 pixels and the height to 130 pixels. Set the
    x value of the window to 100, which indicates that we want the window’s initial
    position to be on the left side of the screen. The y value can be a little more
    problematic because of the geometry of the Mac’s display. The coordinate system
    on the Mac’s screen has 0 at the lower-left corner of the screen, with the y value
    getting higher as we move up toward the top of the screen. The problem here is
    that not everybody has the same size monitor, so any given y value will be different
    relative to the top of the screen on different size monitors.


    Fortunately, Cocoa will automatically adjust the window’s position so that the
    window always starts on the screen, even if the location we specify would otherwise
    place it off-screen somewhere, and because we gave the window an autosave name,
    every time the user launches the application after the first, the window will
    be where it was the last time we quit the application. But sometimes it’s important
    that a window start in a particular position relative to the top of the screen.


    Note the little diagram at the bottom of the Size Inspector; it gives us a visual
    representation of the window’s initial position based on our own screen’s size.
    The little white box represents the window, and the big box represents the screen
    minus the menu bar. The little red I-beams on all four sides of the white box
    let us control the relative positioning of the window relative to the sides of
    the screen. We can place the window where we want it on our screen, then use the
    I-beams to lock the position relative to the left and top of the screen. Clicking
    an I-beam will allow the window to move proportionally relative to that side of
    the screen. Clicking the bottom I-beam will let the window float from the bottom
    but maintain a fixed distance from the top of the screen.'
