    allow us to insert a `nil` into it. In a complex application, you may want to
    track down the root cause (where did the nil pointer come from, and is nil a valid
    value for that variable?), but in this case we’ll work around the problem by putting
    a safety check before adding the object, like this:    ``` if (object2 != nil)
    {     [array addObject:object2]; } ```    This takes care of that. `NSInvalidArgumentException`
