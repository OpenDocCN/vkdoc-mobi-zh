    \ 是任何时刻正在运行的所有嵌套方法和函数的列表。它显示在项目窗口左侧 Xcode 调试导航器（Debug Navigator）的表格视图中。当程序暂停时，当前方法或函数位于调用栈的顶部，调用它的方法或函数位于其下方，以此类推。你可以选择调用栈中的特定条目或“帧”来切换焦点，此时调试区将显示当该方法或函数调用调用栈中其上方的函数时的\
    \ CPU 寄存器和变量。\n- 调试器包含一些按钮，允许你对当前高亮的代码行执行某些操作。你可以**单步跳过**当前行（执行当前行剩余部分，然后在下一行暂停）、**单步进入**下一个方法或函数（将在被调用的下一个方法或函数的开头暂停）、**单步跳出**当前方法或函数（在调用者中返回后暂停），或者**继续**或**停止**程序。\n\
    - 调试器包含一个名为`lldb`的命令行界面（它是`gdb`命令的现代分支/重写版，`gdb`历史上是大多数基于 UNIX 的操作系统的标准命令），它允许你使用之前提到的所有功能，以及执行任意代码并检查结果。你可以通过像在源代码中那样输入\
    \ C 函数和 Objective-C 方法的名称来调用它们，并使用正在运行的程序的变量值作为消息接收者和参数。\n\n有关使用 Xcode 调试器的更多详细信息，请参阅\
    \ Xcode 文档中包含的“调试和优化你的应用”文档。\n\n在 Xcode 中，通过选择 **View** ![image](img/arrow.jpg)\
    \ **Navigators** ![image](img/arrow.jpg) **Show Breakpoint Navigator** 或按下 ![images](img/arrow3.jpg)**6**\
    \ 来打开断点导航器视图。这会使得导航面板显示所有当前的断点（参见图 13-1）。\n\n![9781430245421_Fig13-01.jpg](img/9781430245421_Fig13-01.jpg)\n\
    \n图 13-1 .  Xcode 的断点导航器，显示了一些断点。第一次使用时，左侧会有一个空列表\n\n断点导航器显示了 Xcode 当前为我们的项目配置的所有断点。由于我们刚刚创建了一个全新的项目，这个列表应该是空的！我们将通过添加一个异常断点来捕获应用程序中抛出的任何异常，从而改变这一状况。\n"
- fmt: "请记住，每一次引发的异常都是某个 bug 的结果，很可能就是我们自己的 bug，并且我们想要抓住每一个机会停下来，看看它来自哪里。  \n点击断点导航器（Breakpoint\
    \ Navigator）最左下角的 `+` 符号来创建一个新的断点。会弹出一个小菜单，询问要创建哪种类型的断点。选择“添加异常断点”（Add Exception\
    \ Breakpoint），然后会弹出一个更大的视图，其中包含新断点的选项。将异常（Exception）弹出菜单设置为 `Objective-C`，并确保中断（Break）弹出菜单设置为抛出时（On\
    \ Throw），然后点击完成（Done）。  \n\n现在，我们有了一个断点，它会在任何抛出的 Objective-C 异常处停止 Xcode。完美！通过从菜单中选择\
    \ **Product** ![image](images/arrow.jpg) **Run** 重新启动 `ExceptionCity` 应用程序，如果它还在运行，先将其退出。这次，当应用程序遇到有问题的代码时，它会在异常抛出的地方暂停执行。[图\
    \ 13-2](#9781430245421_Ch13.xhtml#Fig2) 大致展示了此时 Xcode 的样子。  \n\n![9781430245421_Fig13-02.jpg](images/9781430245421_Fig13-02.jpg)\
    \  \n\n[图 13-2](#9781430245421_Ch13.xhtml#_Fig2).  Xcode 在断点处停止  \n\n左侧的导航面板切换为调试导航器（Debug\
    \ Navigator），并显示调用堆栈，顶部是我们断点的位置（一个名为 `objc_exception_throw` 的函数，这是 Xcode 实际放置异常断点的地方），下方是所有调用者。注意，我们有源代码可用的帧以黑色文本呈现，而那些停留在闭源库中的帧则以灰色文本显示。灰色的帧仍然可以访问，但只能以汇编语言的形式。我们还可以通过查看左侧的帧编号序列发现，并非所有帧都显示出来。默认情况下，Xcode\
    \ 仅显示我们有源代码的帧，而其他帧被压缩成水平虚线。我们可以使用调试导航器底部的水平滑块来改变这一点，根据需要让 Xcode 显示更多或更少的帧。  \n\
    \n项目窗口底部是调试区（Debug Area），分为两部分。左侧显示所有可用的变量和寄存器值，我们可以立即看到一些简单的值。右侧显示 `lldb` 控制台界面，我们可以在那里查看程序的输出（由\
    \ `NSLog` 等生成），并在 `lldb` 提示符下输入命令。如果你看不到底部视图，可以通过从菜单中选择 **View** ![image](images/arrow.jpg)\
    \ **Debug Area** ![image](images/arrow.jpg) **Activate Console** 来使其显示。  \n\n\
    主编辑器视图显示所选堆栈帧的源代码或编译后的汇编代码，并用一个箭头和高亮标出其停止的行。  \n\n此时，在异常被抛出的那一刻暂停下来，看看这个异常是什么会很有趣。但怎么做呢？当\
    \ Xcode 暂停时，它会指向包含我们源代码的最顶层堆栈帧。那是我们程序中问题所在的位置，但我们无法在那里“看到”异常。也就是说，从那里我们无法通过局部变量或任何全局可用的结构来查看异常本身。\
    \  \n\n相反，我们需要关注程序真正停止的最顶层堆栈帧，即 `objc_exception_throw` 函数。点击它来看看情况。它应该看起来像[图 13-3](#9781430245421_Ch13.xhtml#Fig3)。\
    \  \n\n![9781430245421_Fig13-03.jpg](images/9781430245421_Fig13-03.jpg)  \n\n\
    [图 13-3](#9781430245421_Ch13.xhtml#_Fig3).  源代码？谁需要它！  \n\n我们看到的只是一堆汇编代码，没有任何变量名或其他东西来指引我们。幸运的是，有一种调用约定我们可以利用。\
    \  \n\n在针对 Mac OS X（在 64 位 Intel 硬件上）编译的代码中，任何函数的返回值都临时存储在一个名为 `rax` 的 CPU 寄存器中，在\
    \ `lldb` 中可以通过一个名为 `$rax` 的特殊变量访问。当我们的程序在 `objc_exception_throw` 函数中暂停时，`$rax`\
    \ 寄存器恰好包含了新的异常，所以我们都准备好了！`lldb` 调试器包含 `po` 命令，用于以可读格式打印对象的值（它实际做的是调用该对象的 `description`\
    \ 方法，该方法返回一个 `NSString`，然后打印该字符串值）。在 `lldb` 提示符下试试这个：  \n\n```  \n(lldb) po $rax\
    \  \n$1 = 4296302928 -[__NSCFNumber length]: unrecognized selector sent to instance\
    \ 0x387  \n```  \n\n看起来眼熟吗？这基本上就是我们在之前输出中看到的相同文本。知道我们在这里可以访问到 `NSException` 后，我们可以利用\
    \ `lldb` 的实时 Objective-C 方法执行来询问更多信息：  \n\n```  \n(lldb) po [$rax name]  \n$2\
    \ = 0x00007fff783e0a30 NSInvalidArgumentException  \n(lldb) po [$rax reason] \
    \ \n$3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized selector sent\
    \ to instance 0x387  \n```  \n\n这里我们看到 `reason` 方法的返回值与 `description` 的返回值相同，但\
    \ `name` 方法返回了名称，你可能记得它通常被用作异常的类型或类别。在这个例子中，我们正在查看 Cocoa 中最常遇到的异常类型之一：`NSInvalidArgumentException`。\
    \  \n\n`NSInvalidArgumentException`  \n\n理论上，任何判断其参数在某些方面无效的方法都可能引发此异常。实际上，大多数\
    \ Cocoa 开发者在某个时候会遇到两种典型情况，而我们刚刚遇到了第一种。回想一下，我们的代码遍历数组中的所有元素，并尝试对每个元素调用 `length`\
    \ 方法，如下所示：  \n\n```  \nfor (NSString *component in nameComponents) {  \n    nameComponentLength\
    \ += [component length];  \n}  \n```  \n\n在这种情况下，问题出现在尝试对一个没有 `length` 方法的对象调用\
    \ `length` 时。我们的代码尝试对 `NSCFNumber`（`NSNumber` 的一个具体子类，当我们以通常方式创建 `NSNumber` 时会用到它）调用\
    \ `length` 方法，而该类没有实现该方法，所有这些我们都可以从异常的 `reason` 中合理推断出来。我们可以现在吹毛求疵地抱怨苹果确实应该在这里使用一个不同的异常名称，以便清楚地告诉我们异常与某个方法名称有关，但这似乎是我们目前只能接受的现实。\
    \  \n\n无论如何，我们可以通过使用 Xcode 中的图形调试器进一步探索。在显示调用堆栈的表格中，点击标记为“*-[ECAppDelegate invalidArgumentException_unrecognizedSelector]*”的行，切换回异常抛出之前执行的最后一段代码。编辑器面板切换回相关的源代码文件，变量视图现在显示了在程序该点上我们可以访问的变量（参见[图\
    \ 13-4](#9781430245421_Ch13.xhtml#Fig4)）。  \n\n![9781430245421_Fig13-04.jpg](images/9781430245421_Fig13-04.jpg)\
    \  \n\n[图 13-4](#9781430245421_Ch13.xhtml#_Fig4).  在调用堆栈中选择不同的条目，可以让我们访问正在运行程序的不同部分。注意，底部的命令行界面显示了在调用堆栈顶层（`objc_exception_throw`\
    \ 内部）执行的命令。如果我们在当前堆栈帧聚焦时输入相同的命令，`$rax` 将有不同的值  \n\n根据我们获得的关于异常以及触发异常的代码部分的信息，我们应该能够找出问题所在。我们甚至可以通过输入\
    \ `po component` 来打印 `for` 循环当前正在查看的对象的摘要信息，从而进一步检查程序的当前状态。"
  raw: 'Remember, every raised exception is the result of a bug, probably ours, and
    we’ll want to take every chance we get to stop and see where it’s coming from.    Click
    the + symbol at the absolute bottom-left of the Breakpoint Navigator to create
    a new breakpoint. A small pop-up menu will appear and ask what kind of breakpoint
    to create. Choose “Add Exception Breakpoint”, and a larger pop-up view will appear
    above with some options for a new breakpoint. Set the Exception pop-up to Objective-C,
    and make sure the Break pop-up is set to On Throw, then click Done.    Now we
    have a breakpoint that will stop Xcode for any Objective-C exception that is raised.
    Perfect! Restart the ExceptionCity application by choosing **Product** ![image](images/arrow.jpg)
    **Run** from the menu, first quitting it if it’s still running. This time, when
    the application hits the problematic code, it will halt execution where the exception
    is raised. [Figure 13-2](#9781430245421_Ch13.xhtml#Fig2) shows roughly what Xcode
    looks like at this point.    ![9781430245421_Fig13-02.jpg](images/9781430245421_Fig13-02.jpg)    [Figure
    13-2](#9781430245421_Ch13.xhtml#_Fig2) .  Xcode stops at a breakpoint    The navigation
    panel on the left changes to the Debug Navigator and shows the call stack with
    the location of our breakpoint (a function called `objc_exception_throw`, which
    is where Xcode really places its exception breakpoints) at the top and all callers
    below. Note that the frames for which we have source code available are rendered
    with black text, while the frames that are stuck in closed-source libraries are
    shown with gray text. The grayed-out frames are still accessible, but only in
    the form of assembly language. We can also see, by looking at the sequence of
    frame numbers at the left, that not all frames are displayed. By default, Xcode
    shows the frames that we have the source code for, and little else—the rest being
    compacted into horizontal dotted lines. We can use the horizontal slider at the
    bottom of the Debug Navigator to change this, making Xcode show more or fewer
    frames if we wish.    At the bottom of the project window is the Debug Area, which
    is divided into two parts. The left side shows all available variables and register
    values where we can see some simple values immediately. The right side shows the
    lldb console interface where we can both view our program’s output (generated
    by `NSLog`, etc.) and enter commands at the lldb prompt. If you’re not seeing
    that bottom view, you can make it appear by selecting **View** ![image](images/arrow.jpg)
    **Debug Area** ![image](images/arrow.jpg) **Activate** Console from the menu.    The
    main editor view shows the source code or compiled assembly code for the chosen
    stack frame, with an arrow and a highlight pointing out the row where it’s halted.    At
    this point, having halted right at the moment that an exception was raised, it
    would be interesting to see what the exception is. But how? When Xcode pauses,
    it points at the uppermost stack frame containing our source code. That’s the
    place in our program where the problem is, but we can’t “see” the exception there.
    That is, there’s no local variable or any globally available structure we can
    access from there that will show us the exception itself.    Instead, we need
    to focus on the uppermost stack frame where the program is truly halted, in the
    `objc_exception_throw` function. Click on it to take a peek at things. It should
    look like [Figure 13-3](#9781430245421_Ch13.xhtml#Fig3).    ![9781430245421_Fig13-03.jpg](images/9781430245421_Fig13-03.jpg)    [Figure
    13-3](#9781430245421_Ch13.xhtml#_Fig3) .  Source code? Who needs it!    All we
    see is a pile of assembly code, no variable names or anything else to guide our
    way. Fortunately, there is a calling convention that we can make use of.


    In code compiled for Mac OS X (on 64-bit Intel hardware), the return value of
    any function is stored temporarily in a CPU register called `rax`, which in lldb
    can be accessed with a special variable called `$rax`. When our program halts
    in the `objc_exception_throw` function, the `$rax` register happens to contain
    the new exception, so we are all set! The lldb debugger includes the `po` command
    for printing an object’s value in a readable format (what it actually does is
    call the object’s `description` method, which returns an `NSString`, and prints
    that string value). Try this at the lldb prompt:    ```  (lldb) po $rax $1 = 4296302928
    -[__NSCFNumber length]: unrecognized selector sent to instance 0x387 ```    Look
    familiar? That is basically the same text we saw in the output earlier. Knowing
    that we have access to the `NSException` here, we can make use of lldb’s live
    Objective-C method execution to ask it some more things:    ```  (lldb) po [$rax
    name] $2 = 0x00007fff783e0a30 NSInvalidArgumentException (lldb) po [$rax reason]
    $3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized selector sent to
    instance 0x387 ```    Here we see that the `reason` method’s return value is the
    same as the description return value, but the name method returns the name, which
    you may recall is typically used as a sort of type or category for the exception.
    In this case, we’re looking at one of the most frequently encountered exception
    types in Cocoa: `NSInvalidArgumentException`.    NSInvalidArgumentException    This
    exception can, in theory, be raised by any method that determines that its parameters
    are invalid in some way. In practice, there are two typical situations where most
    Cocoa developers will encounter this at some point, and we’ve just hit the first.
    Remember that our code loops through all the elements in an array, and tries to
    call the `length` method on each, like so:    ``` for (NSString *component in
    nameComponents) {     nameComponentLength += [component length]; } ```    In this
    case, the problem arises when trying to call `length` on an object that doesn’t
    have such a method. Our code tries calling the `length` method on `NSCFNumber`
    (the concrete subclass of `NSNumber` that happens to be used when we create an
    `NSNumber` in the usual way), and that class doesn’t implement that method, all
    of which we can reasonably deduce from the exception’s `reason`. We could split
    hairs now and complain that Apple really should use a different exception name
    here that would clearly tell us that the exception is related to a method name,
    but this seems to be what we’re stuck with.    In any case, we can explore further
    by using the graphical debugger in Xcode. In the table showing the call stack,
    click on the line labeled “*-[ECAppDelegate invalidArgumentException_unrecognizedSelector]*”
    to switch back to the last piece of code that was being executed before the exception
    was raised. The Editor pane switches back to the relevant source code file, and
    the variable view now shows the variables available to us at that point in the
    program (see [Figure 13-4](#9781430245421_Ch13.xhtml#Fig4)).    ![9781430245421_Fig13-04.jpg](images/9781430245421_Fig13-04.jpg)    [Figure
    13-4](#9781430245421_Ch13.xhtml#_Fig4) .  Choosing a different entry in the call
    stack gives us access to a different part of our running program. Note that the
    command-line interface at the bottom shows commands that were executed at the
    top level of the call stack, inside objc_exception_throw. If we entered the same
    commands with the current stack frame in focus, $rax would have a different value    Based
    on the information we’ve gotten about the exception and what part of our code
    triggered it, we should be able to figure out the problem. We can even take additional
    steps here to examine the current state of our program, such as printing out summary
    information for the object that the `for` loop is currently looking at, by typing
    `po component`.'
