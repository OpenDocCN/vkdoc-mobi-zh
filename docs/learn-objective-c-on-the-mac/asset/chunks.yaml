    make the `NSSlider` look and act like the one seen in the image, select it and
    open the *Attributes Inspector* (![image](images/arrow2.jpg)4). Give it 19 tick
    marks, check the box to make it stop only on tick marks, and then set its minimum
    and maximum values to 2 and 20, and its current value to 10\. A bit further down,
    click to turn on the *Continuous* checkbox (so the slider will report its value
    continuously while the user is dragging it), and we’re all set. [Figure 7-3](#9781430245421_Ch07.xhtml#Fig3)
    shows how it’s done.    ![9781430245421_Fig07-03.jpg](images/9781430245421_Fig07-03.jpg)    [Figure
    7-3](#9781430245421_Ch07.xhtml#_Fig3). Configuration of an NSSlider for selecting
    an integer between 2 and 20    One other adjustment that needs to be made (but
    can’t be seen from the screenshot) is to make the matrix containing the checkboxes
    behave appropriately in response to mouse clicks. Because `NSMatrix` is designed
    to contain a variety of controls, it has multiple ways of interacting with its
    cells when the user clicks one of them. Select the matrix of checkboxes, and in
    the *Attributes Inspector*, set the *Mode* pop-up to Highlight if it isn’t already
    set to that. This mode makes the matrix respond to a click in a cell by toggling
    the clicked cell’s selected state between zero and one, which switches the checkbox
    on and off.    The last configuration required for this tab is to set the tags
    for the two radio buttons so we can tell them apart later (the checkboxes don’t
    need to have their tags set because they will be dealt with a little differently
    when we get to the bindings). Do this by keeping the *Attributes Inspector* up,
    then click one radio button and then the other, typing in new tag values for each
    of them in the Inspector. Set the tag for the first radio button cell to 1, and
    set the second to 2.    Monster Generation Preferences    The next tab contains
    controls that let the user specify preferences for random monster generation,
    which is depicted in [Figure 7-4](#9781430245421_Ch07.xhtml#Fig4).    ![9781430245421_Fig07-04.jpg](images/9781430245421_Fig07-04.jpg)    [Figure
    7-4](#9781430245421_Ch07.xhtml#_Fig4). Monster Generation preferences    Here
    we have a slider, a matrix of checkboxes, and a couple of text fields as labels.
    The slider should be configured similarly to the one used in the Character Generation
    tab, but with a few different attributes: minimum value of 1, maximum value of
    10, and showing 10 tick marks.


    Dungeon Generation Preferences    Finally, we’ll create the GUI for the Dungeon
    Generation preferences. This is a simple one—just sliders and text fields, as
    seen in [Figure 7-5](#9781430245421_Ch07.xhtml#Fig5). These sliders should be
    configured just like the one in the Monster Generation tab, with a range from
    1 to 10 and showing 10 ticks.    ![9781430245421_Fig07-05.jpg](images/9781430245421_Fig07-05.jpg)    [Figure
    7-5](#9781430245421_Ch07.xhtml#_Fig5). Dungeon Generation preferences tab    Binding
    to NSUserDefaultsController    At this point, we have all these GUI controls in
    a window, but we have no outlets to connect to them and no action methods for
    them to call when the user clicks on them. So, now what? Now it’s time to create
    our first bindings! We’re going to use a class called `NSUserDefaultsController`,
    which is a bindings-ready generic controller class that is included in Cocoa.
    A bindings-ready controller like this lets us bind view objects to an underlying
    model object right within Interface Builder. One nice thing about this class is
    that it maintains its own storage in the form of `NSUserDefaults`, which is the
    standard class used in Cocoa applications for saving and retrieving a user’s application
    preferences. This will let us bind each view object’s value to a uniquely keyed
    value in the application’s preferences. These preferences are automatically saved
    before a user exits the application and reloaded the next time the user launches
    the application.    Bindings for Character Generation    Go to the Preferences
    window we’re building, and switch back to the Character Generation pane. Click
    on the slider, and then bring up the *Bindings Inspector* (![image](images/arrow2.jpg)7).
    In this Inspector, we can see all the attributes of a view object that can be
    bound to a value in a model object. Most often, we’ll be binding the `Value` to
    something, but each view class offers its own set of attributes available for
    binding. The slider, for instance, can have its `Max Value` and `Min Value` attributes
    bound to something, which would allow us to vary those extremities based on values
    in a model object. Some other view objects can bind text colors and fonts to model
    values, and most of them can have their Hidden and Enabled states bound to model
    values. For now, we’re going to bind this slider’s `Value` attribute, so click
    the *Value* disclosure triangle to see its configuration options. [Figure 7-6](#9781430245421_Ch07.xhtml#Fig6)
    shows the default settings.    ![9781430245421_Fig07-06.jpg](images/9781430245421_Fig07-06.jpg)    [Figure
    7-6](#9781430245421_Ch07.xhtml#_Fig6). The default “unbound” state for an NSSlider’s
    Value binding options    To establish a binding, we need to configure at least
    three things: the controller object to bind to, the controller key, and model
    key path (all the rest are optional settings that allow us to refine the binding’s
    behavior in special situations, some of which we’ll cover later). Pick the controller
    object from the *Bind to* pop-up list, which contains all controller objects that
    are present in our nib file, including any controllers of our own, any generic
    controllers we’ve dragged over from the Library, and special controllers like
    `NSUserDefaultsController`, which is available automatically in every nib file
    (and shows up as Shared User Defaults Controller in the pop-up list). The controller
    key lets us choose different “aspects” of the model object or objects that a controller
    provides. For example, `NSArrayController`, which provides binding access to an
    array of objects, has different controller keys to provide access to the entire
    sorted array or just the current selection. The model key path is a string that
    is used as a key to get and set a value in the model object.    So, for our first
    binding, start off by picking the Shared User Defaults Controller from the pop-up
    list.'
  trans: '

    双击每个标签页的标题，将其分别改为“Character Generation”、“Monster Generation”和“Dungeon Generation”。图
    7-1 显示了此时窗口应有的外观。


    ## Character Generation Preferences


    现在，我们开始向这些标签页中添加控件。首先是 Character Generation 标签页，请点击该标签页将其选中。到目前为止，你应该已经熟悉如何在 *Object
    Library* 中找到视图和控件，因此我们不再手把手地指导你每一步如何抓取这些对象并将其拖入窗口。对于你来说，只需查看图 7-2，就应该知道需要使用一个滑块、一个单选按钮矩阵、一个复选框矩阵，以及几个标签（包括滑块右侧的小标签）。（提醒一下，要获得复选框矩阵，请拖出一个复选框，然后选择
    Editor ![image](img/arrow.jpg) Embed In ![image](img/arrow.jpg) Matrix。要增加矩阵的行数和列数，请按住
    Option 键并拖动调整大小的手柄。）


    ![9781430245421_Fig07-02.jpg](img/9781430245421_Fig07-02.jpg)


    图 7-2. DungeonThing 中角色生成的首选项


    从 *Object Library* 中拖出这些对象，并大致按照图 7-2 所示对齐。要使`NSSlider`的外观和行为与图中一致，请选中它并打开 *Attributes
    Inspector*（![image](img/arrow2.jpg)4）。为其设置 19 个刻度线，勾选“仅在刻度线上停止”复选框，然后将最小值设为 2，最大值设为
    20，当前值设为 10。再往下一点，点击打开 *Continuous* 复选框（这样滑块将在用户拖动时持续报告其值），然后就可以了。图 7-3 显示了具体操作。


    ![9781430245421_Fig07-03.jpg](img/9781430245421_Fig07-03.jpg)


    图 7-3. 用于选择 2 到 20 之间整数的 `NSSlider` 配置


    另一个需要做的调整（但在截图中看不到）是使包含复选框的矩阵能够响应鼠标点击并正确行为。由于`NSMatrix`被设计为包含多种控件，当用户点击某个单元格时，它有多种与单元格交互的方式。选中复选框矩阵，然后在
    *Attributes Inspector* 中，将 *Mode* 弹出菜单设置为 *Highlight*（如果尚未设置）。此模式使矩阵在点击单元格时，将该单元格的选中状态在
    0 和 1 之间切换，从而打开或关闭复选框。


    该标签页的最后一项配置是为两个单选按钮设置标签，以便我们稍后区分它们（复选框不需要设置标签，因为在处理绑定时会以不同的方式处理它们）。保持 *Attributes
    Inspector* 打开，然后依次点击两个单选按钮，在检查器中为每个按钮输入新的标签值。将第一个单选按钮单元格的标签设为 1，将第二个设为 2。


    ## Monster Generation Preferences


    下一个标签页包含允许用户指定随机怪物生成首选项的控件，如图 7-4 所示。


    ![9781430245421_Fig07-04.jpg](img/9781430245421_Fig07-04.jpg)


    图 7-4. 怪物生成首选项


    这里我们有一个滑块、一个复选框矩阵，以及几个作为标签的文本字段。滑块的配置应与 Character Generation 标签页中的滑块类似，但有几个不同的属性：最小值为
    1，最大值为 10，并显示 10 个刻度线。


    ## Dungeon Generation Preferences


    最后，我们将创建 Dungeon Generation 首选项的 GUI。这个比较简单——只有滑块和文本字段，如图 7-5 所示。这些滑块的配置应与 Monster
    Generation 标签页中的滑块一样，范围从 1 到 10，并显示 10 个刻度线。


    ![9781430245421_Fig07-05.jpg](img/9781430245421_Fig07-05.jpg)


    图 7-5. 地牢生成首选项标签页


    ## 绑定到 NSUserDefaultsController


    至此，我们已经在窗口中拥有了所有这些 GUI 控件，但还没有输出口（outlets）连接它们，也没有当用户点击它们时可以调用的操作方法。那么，现在该怎么办？现在是时候创建我们的第一个绑定了！我们将使用一个名为`NSUserDefaultsController`的类，这是一个绑定就绪的通用控制器类，包含在
    Cocoa 中。像这样的绑定就绪控制器让我们可以在 Interface Builder 中直接将视图对象绑定到底层模型对象。这个类的一个优点是，它以`NSUserDefaults`的形式维护自己的存储，`NSUserDefaults`是
    Cocoa 应用中用于保存和检索用户应用首选项的标准类。这将允许我们将每个视图对象的值绑定到应用首选项中一个唯一键控的值。这些首选项会在用户退出应用前自动保存，并在用户下次启动应用时重新加载。


    ### Character Generation 的绑定


    转到我们正在构建的首选项窗口，并切换回 Character Generation 窗格。点击滑块，然后打开 *Bindings Inspector*（![image](img/arrow2.jpg)7）。在此检查器中，我们可以看到视图对象所有可以绑定到模型对象值的属性。大多数情况下，我们会将`Value`绑定到某个东西，但每个视图类都提供自己的一组可供绑定的属性。例如，滑块可以将其`Max
    Value`和`Min Value`属性绑定到某些值，这允许我们根据模型对象中的值来改变这些极值。其他一些视图对象可以将文本颜色和字体绑定到模型值，并且大多数视图对象可以将其
    Hidden 和 Enabled 状态绑定到模型值。目前，我们将绑定此滑块的`Value`属性，因此点击 *Value* 展开三角形以查看其配置选项。图 7-6
    显示了默认设置。


    ![9781430245421_Fig07-06.jpg](img/9781430245421_Fig07-06.jpg)


    图 7-6. `NSSlider`的 Value 绑定选项的默认“未绑定”状态


    要建立绑定，我们至少需要配置三个东西：要绑定到的控制器对象、控制器键（controller key）和模型键路径（model key path）（其余都是可选设置，允许我们在特殊情况下优化绑定的行为，我们稍后会介绍其中一些）。从
    *Bind to* 弹出列表中选择控制器对象，该列表包含我们 nib 文件中存在的所有控制器对象，包括我们自己的任何控制器、我们从库中拖入的任何通用控制器，以及像`NSUserDefaultsController`这样的特殊控制器（它在每个
    nib 文件中都自动可用，并在弹出列表中显示为 Shared User Defaults Controller）。控制器键允许我们选择控制器提供的模型对象的不同“方面”。例如，`NSArrayController`（提供对对象数组的绑定访问）有不同的控制器键来提供对整个排序数组或仅当前选择的访问。模型键路径是一个字符串，用作在模型对象中获取和设置值的键。


    因此，对于我们的第一个绑定，首先从弹出列表中选择 Shared User Defaults Controller。

    '
- fmt: 'This controller is automatically available in any nib file, though we can’t
    see it anywhere until we use it in a binding, at which point it appears in the
    main nib window. Now check the *Controller Key* combo box, and make sure it’s
    set to `values`. Then click on the *Model Key Path* combo box, and type `characterMaxNameLength`
    into the combo box. This string defines the key that will be used to store the
    slider’s value in `NSUserDefaults`—the user’s application preferences. Press Enter
    or tab out of the field, and note that the *Bind to* checkbox at the top of the
    Inspector gets checked. That’s it! We don’t need to worry about any of the remaining
    controls for now; their default values are fine for our purposes. [Figure 7-7](#9781430245421_Ch07.xhtml#Fig7)
    shows what the relevant configured bits in the Inspector should look like when
    this binding is configured.


    ![9781430245421_Fig07-07.jpg](images/9781430245421_Fig07-07.jpg)[Figure 7-7](#9781430245421_Ch07.xhtml#_Fig7).
    The completed binding for the first slider


    Now select the small text field to the right of the slider, and configure the
    exact same binding we did for the slider: Shared User Defaults Controller, `values`,
    and `characterMaxNameLength`. That will make it pull its display value from the
    same place (the value for `characterMaxNameLength`) in the same model object (the
    user’s application preferences). To see a little Cocoa bindings magic in action
    now, select Editor ![image](images/arrow.jpg) Simulate Interface from the menu,
    click and drag the slider, and watch the value in the small text field update
    simultaneously. Note that this is the same feature we built in [Chapter 2](#9781430245421_Ch02.xhtml)
    but with a different mechanism: while we’re dragging the slider, its value is
    being pushed into our application preferences by the `NSUserDefaultsController`,
    which also passes the value along to the other object that’s bound to the same
    key, the little text field. Pretty neat trick! But it’s not a trick at all. It’s
    a simple example of the dynamic nature of Cocoa bindings. Using this technology,
    we can eliminate a lot of boring code from our controller classes and sometimes
    get rid of our controller classes entirely—using only Cocoa’s included controller
    classes instead.


    Let’s move on to the next GUI control, the matrix of radio buttons in the middle.
    Click the matrix, and then look at the *Bindings Inspector* where we’ll see that
    there is no Value option. For this control, instead of binding a Value, we’ll
    be binding the `Selected Tag` attribute, which means that when a user selects
    a cell, that cell’s tag will be pushed down to the model, and when the Preferences
    window is brought up next time, that saved tag will determine which radio button
    is selected. Open up the *Selected Tag* section of the *Bindings Inspector*, and
    again make sure that Shared User Defaults Controller is selected and that the
    *Controller Key* is `values`, but this time type `characterStatsGenerationPolicy`
    into the *Model Key Path* and press Enter.


    Next, let’s tackle the Allowed Character Classes checkboxes. For each of these,
    we’ll make up a new key name and use it to bind the Selected status to a value
    in the user’s application preferences. Click the first cell, Paladin. The Inspector
    title should change to Button Cell Bindings. If not, click the button again until
    it does. Now bind this button cell’s `Value` attribute to the `characterClassAllowedPaladin`
    key. Repeat these steps for each of the remaining button cells, binding each of
    them via Shared User Defaults Controller with the appropriate key name. `Bard`
    should be bound with `characterClassAllowedBard`, `Fighter` with `characterClassAllowedFighter`,
    and so on. When we get to `Magic-User`, for the sake of consistency, use the key
    name `characterClassAllowedMagicUser`, leaving out the `-` symbol.


    ## Bindings for Monster Generation


    Now switch over to the Monster Generation tab.


    Bind the *Value* of the slider to `monsterBootyFrequency`, and do the same for
    the small text field to the right. Then configure the checkboxes the same way
    we did on the Character Generation tab. Click the Orc checkbox until the checkbox
    itself is selected, and bind its Value to `monsterTypeAllowedOrc`. Continue through
    the rest of the checkboxes, binding the Value for each of them to the appropriate
    key name: `monsterTypeAllowedGoblin`, `monsterTypeAllowedOgre`, and so on.


    ## Bindings for Dungeon Generation


    Finally, switch to the Dungeon Generation tab, which contains just three slider
    and text field pairs. To the right of the Tunnel Twistiness label, configure the
    *Value* bindings for both the slider and the text field to `dungeonTunnelTwistiness`.
    Bind both of the Monster Frequency controls’ Values to `dungeonMonsterFrequency`
    and both of the Treasure Frequency controls’ Values to `dungeonTreasureFrequency`.


    ## Creating the Main Window


    Now it’s time to pay some attention to our main window, which will contain buttons
    the user can click to generate the characters, monsters, and dungeons, plus text
    fields to display the results. Click the main window’s title bar (or double-click
    its icon in the main window if it’s not already visible) and bring up the *Size
    Inspector* (![image](images/arrow2.jpg)5). Change the window size to 731 by 321,
    then switch to the *Attributes Inspector* (![image](images/arrow2.jpg)4) and click
    to turn off the *Resize* checkbox, which will give us one less thing to worry
    about. This application displays a limited data set, so there’s no reason for
    the user to make the window any bigger. We’re now going to create three sets of
    GUI components, one set for each of the three types of data we’re dealing with.
    We’ll manually lay out the first set, and then duplicate it for the other two.


    First, we’ll create a text field inside a box for displaying results. Go to the
    *Object Library* pane and enter `nsbox` into the Search field. Look for the box
    in the results, and drag one of these out to our window. While the new box is
    selected, switch back to the *Size Inspector*, and set the box’s size to width
    227 by height 247. While we’re at it, go ahead and set each of its X and Y values
    to 20. This puts the box in the lower-left corner of the window, about in the
    position it would be in if we dragged it to the lower left and let it sit where
    the blue guidelines recommend. Then switch back to the *Attributes Inspector*,
    and set the *Title Position* to None so that the title won’t be shown.


    Now, go back to the *Object Library* pane and enter `label` in the Search box.
    One of the results is Wrapping Label; grab that, drag it so that it is directly
    overlapping the box we created, and let go. Doing this puts it inside the box.
    Once it’s there, expand the label to fill the box, by first dragging its bottom
    left corner down to the lower left, then dragging its top right corner to the
    upper right. In both cases, the blue guidelines will show up when we’re just the
    right distance from the edge of the box. Finally, triple-click to select the text
    (`Multiline Label`) in the text field, and press Backspace or Delete to clear
    out the text.


    Let’s top this box off by adding the button that will eventually put some text
    into the text field we just created. Find a button in the *Object Library* (a
    push button will do nicely), and drag it out to a spot just above the box. During
    the drag, the blue lines will appear, showing us the correct distance from the
    top of the window, and also showing us when the button is lined up directly above
    the center of the box. That’s where we want to drop it! Double-click the button
    to edit its title, and change it to `Generate Character`. Depending on how the
    resizing constraints have been set up, we may need to reset the size of the box
    afterwards. [Figure 7-8](#9781430245421_Ch07.xhtml#Fig8) shows what we should
    be seeing at this point.


    ![9781430245421_Fig07-08.jpg](images/9781430245421_Fig07-08.jpg)'
