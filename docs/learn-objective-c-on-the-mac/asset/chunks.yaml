    \ <Cocoa/Cocoa.h>`，然后定义一个名为`selectedTag`的整数属性，我们稍后会将其绑定到一个 GUI 对象（添加用粗体显示的行）：\n\
    \n```\n// MLListWindowDelegate.h\n#import <Foundation/Foundation.h>\n#import <Cocoa/Cocoa.h>\n\
    \n@interface MLListWindowDelegate : NSObject\n@property (assign) NSInteger selectedTag;\n\
    @end\n```\n\n在匹配的`MLListWindowDelegate.m`文件中，我们将实现一个`specialAction:`方法（菜单项将通过\
    \ First Responder 代理以 target/action 方式连接到该方法），并实现`validateUserInterfaceItem:`方法。Xcode\
    \ 会自动为我们合成`selectedTag`属性的 getter 和 setter。\n\n```\n// MLListWindowDelegate.m\n\
    #import \"MLListWindowDelegate.h\"\n@implementation MLListWindowDelegate\n\n-\
    \ (BOOL)validateUserInterfaceItem:\n  (id <NSValidatedUserInterfaceItem>)anItem\
    \ {\n    // set the default response to YES, in case it's not the action we care\
    \ about\n    BOOL result = YES;\n    SEL theAction = [anItem action];\n    if\
    \ (theAction == @selector(specialAction:) ) {\n        if (self.selectedTag !=\
    \ 13013) {\n            result = NO;\n        }\n    }\n    return result;\n}\n\
    \n- (void)specialAction:(id)sender {\n    NSRunAlertPanel(@\"Boy Howdy!\",\n \
    \                   @\"That's some mighty special action you got there!\",\n \
    \                   nil, nil, nil);\n}\n@end\n```\n\n关于`validateUserInterfaceItem:`方法，我们需要指出几点。首先，请注意我们使用该项的操作（action）来确定它被点击时会调用哪个方法。在代码中，一个操作（或任何方法）可以通过\
    \ Objective-C 的`SEL`类型来引用。从技术上讲，`SEL`不是方法，而是一个“选择器”，它是方法名称的一种哈希，为了性能考虑而有所修改，Objective-C\
    \ 运行时可以用它来查找方法的实际实现。除了查找方法之外，一个`SEL`可以与另一个`SEL`进行比较，比如代码中`@selector(specialAction:)`构造返回的选择器。在我们的方法中，我们测试相关菜单项是否指向我们关心的操作方法，如果是，则进行深入检查。如果操作匹配，我们接着根据某些内部状态（以`selectedTag`属性的形式）进行简单检查，以确定是否允许启用此菜单项。如果选择器不匹配，则默认返回`YES`。\n\
    \n现在，让我们创建一个 GUI 来让这段代码工作起来。在 Interface Builder 画布中打开`MainMenu.xib`文件，然后从*对象库*中拖拽一个普通的`NSObject`到\
    \ nib 窗口（在*对象库*搜索框中搜索`NSObject`）。它将出现在屏幕左侧的对象停靠栏中。使用*身份检查器*将其类更改为`MLListWindowDelegate`。\n"
- fmt: "Then drag out a new window from the *Object Library*, and connect its `delegate`\
    \ outlet to the `MLListWindowDelegate` object we just set up. Now find a Radio\
    \ Group in the *Object Library*, and drag it into the new window. Including this\
    \ in the window gives us a rudimentary way to provide a sort of selection for\
    \ the window and its delegate. Bind the group’s *Selected Tag* to the `ListWindowDelegate's`\
    \ *selectedTag* property. That way, the delegate is informed whenever someone\
    \ clicks one of the radio buttons. Now expand the radio group to contain more\
    \ radio buttons by option-dragging the lower resize handle until there are seven\
    \ or eight buttons. Then, click one of the buttons near the middle, and use the\
    \ *Attributes Inspector* to change its title to “Special Selection,” and its tag\
    \ to 13013, the “magic number” that we’ll look for in the code.\n\nAll that’s\
    \ left is configuring a new menu item to call the `specialAction:` method via\
    \ the First Responder. Start by selecting the First Responder item in the nib\
    \ window and bringing up the *Attributes Inspector*. Here is where we can manually\
    \ add any action methods that we want this proxy object to know about. We’ll see\
    \ a list of user-defined actions, which starts out empty. Add one of our own by\
    \ clicking the + button, and changing its name to `specialAction:` (don’t forget\
    \ the colon!). Now for the menu item: find a plain Menu Item in the *Object Library*,\
    \ and drag it into the Tools menu we created earlier. Set its title to “Special\
    \ Action,” and configure its target/action by Control-dragging to the First Responder\
    \ item in the nib window and selecting `specialAction:` from the resulting list.\n\
    \nNow it’s time to see this in action. Save the work and click **Run**. The app\
    \ now has a new window where we can select one of the radio buttons. Click around\
    \ on some of the radio buttons, each time clicking the Tools top-level menu item\
    \ to see if the Special Action item is enabled. It should only be enabled if the\
    \ *Special Selection* button is selected. If another radio button is selected,\
    \ or if the app’s other window (the old window with the Turbo checkbox) is selected,\
    \ the menu item should be disabled.\n\nThis basic concept can be extended as far\
    \ as you want. The point is that enabling and disabling menu items is really quite\
    \ simple. You never have to manually enable or disable individual menu items as\
    \ things happen in your app; you just write code that is called automatically\
    \ when a menu item is about to be displayed, and deal with it then.\n\n## Sheets\n\
    \nThe final topic we’re going to cover in this chapter is the concept of sheets.\
    \ A sheet is simply a window that is temporarily attached to another window and\
    \ run in a semi-modal way, such that the “other window” doesn’t receive any events.\
    \ The idea is that an application can have several windows that aren’t impacted\
    \ by each other’s demands for user attention. For example, in the TextEdit application\
    \ included with Mac OS X, you can have the Save As panel appearing as a sheet\
    \ on one document, the Print panel appearing as a sheet on another, and continue\
    \ typing in a third.\n\nChances are you won’t use sheets in every Cocoa app you\
    \ ever build, but they are useful in situations where your application needs some\
    \ sort of user input related to a particular window, and you’d rather not use\
    \ a modal panel that stops input to the rest of your application. In the example\
    \ just shown, for instance, without the use of sheets, that Save panel would probably\
    \ run in a modal fashion, blocking input to all other windows until the user dismissed\
    \ it. With the use of sheets, the user can temporarily leave the ongoing Save\
    \ operation and do some other interaction with the application before committing\
    \ the Save.\n\nSheets aren’t represented by a particular class in Cocoa. Rather,\
    \ they are normal windows used in a special way. Every `NSWindow` can have a sheet\
    \ attached to it, and every window or panel that’s normally used in a modal way\
    \ can be used as a sheet as well.\n\nLet’s see the basics of how to use a sheet\
    \ by attaching an `NSOpenPanel` to a normal window in a new application that we’ll\
    \ call SheetLab. Create a new Cocoa application project in Xcode, using SL as\
    \ the class prefix, and save it as *SheetLab*. Now, edit `SLAppDelegate.h`, adding\
    \ an `openDocument:` action method:\n\n```\n#import <Cocoa/Cocoa.h>\n@interface\
    \ SLAppDelegate : NSObject <NSApplicationDelegate>\n@property (assign) IBOutlet\
    \ NSWindow *window;\n- (IBAction)openDocument:(id)sender;\n@end\n```\n\nThen edit\
    \ `SLAppDelegate.m`, adding the following method implementations:\n\n```\n#import\
    \ \"SLAppDelegate.h\"\n@implementation SLAppDelegate\n- (IBAction)openDocument:(id)sender\
    \ {\n    NSOpenPanel *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n\
    \    [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"Please pick\
    \ one file to import.\"];\n\n    // Display the panel attached to the document's\
    \ window.\n    [panel beginSheetModalForWindow:self.window completionHandler:^(NSInteger\
    \ result){\n        if (result == NSFileHandlingPanelOKButton) {\n           \
    \ // Set the window title to the filename of the selected file.\n            NSArray*\
    \ urls = [panel URLs];\n            NSString *selectedFile = [[urls lastObject]\
    \ lastPathComponent];\n            [self.window setTitle:selectedFile];\n    \
    \    }\n    }];\n}\n@end\n```\n\nWe declare a method called `openDocument:` in\
    \ this class. `openDocument:` is the action used by the **File** ![image](images/arrow.jpg)\
    \ **Open** menu item. When the user hits **File** ![image](images/arrow.jpg) **Open**\
    \ (or ![images](images/arrow3.jpg)-O), the responder chain gets followed until\
    \ an object is found that responds to `openDocument:`. Since the App Delegate\
    \ is in the responder chain and there’s nothing else in the app that responds\
    \ to `openDocument:`, our code will get called. The `openDocument:` method grabs\
    \ the standard open panel, sets it to only allow selection of one file (not directories,\
    \ and not multiple files), and adds a message to the panel. It then tells it to\
    \ run modally attached to a window (using the `window` property), using the `beginSheetModalForWindow:completionHandler:`\
    \ method. The second argument to this method is an Objective-C *block*, a new\
    \ concept that we haven’t seen before. It specifies the actions that should be\
    \ taken when the panel is finished running. In this case, if the user has selected\
    \ a file and hit OK, we get the URL of the selected file, and then set the `title`\
    \ of the window to the last part of the path, which should be the filename itself.\n\
    \n**Note**  A *block* represents a piece of code that (among other things) can\
    \ be passed as an argument to a method. In other languages, it’s called a *closure*\
    \ or a *lambda*. The use of blocks is becoming more prevalent in Cocoa, rather\
    \ than passing pointers to callback functions. A block has access to all of the\
    \ variables that are in-scope at the point of declaration and has the benefit\
    \ of being declared at the point of use. Blocks were introduced in OS X 10.6 and\
    \ iOS 4\\. You can read much more about blocks in the Apple Developer Documentation\
    \ in Xcode, or at `https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`.\n\
    \nSave the changes, click **Run**, and the app will launch. Hitting ![images](images/arrow3.jpg)-O\
    \ brings up the modal open panel, attached as a sheet on top of the app’s window.\
    \ When we select a file, the name of the window gets set to the name of the file!\n\
    \n## Wrap Up\n\nThis chapter provided an introduction to several key parts of\
    \ the Cocoa GUI experience, as well as a few examples of how the responder chain\
    \ is used. These features are crucial to making a professional-quality Mac application.\
    \ Mac users tend to be pretty unforgiving when applications use non-standard behaviors\
    \ without a good reason, so it’s important to know how to deal with windows and\
    \ menus in ways that users will recognize."
