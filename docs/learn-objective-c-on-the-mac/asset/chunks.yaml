    To start, click the text field next to the label that reads Name:. Control-drag
    over to the code in the Assistant Editor pane, dragging out a blue line to just
    underneath the existing property named `window`. As we drag, anything that could
    be a valid connection endpoint will highlight under our mouse. When we get to
    the right spot in the Assistant Editor pane, a small flag should appear indicating
    *Insert Outlet or Action* as shown in [Figure 5-16](#9781430245421_Ch05.xhtml#Fig16).
    Release the mouse button and a small contextual window appears over that point
    in the code where we can name the outlet and modify some of the default parameters
    if necessary. We won''t need to change the defaults for the outlets for this app.
    Name the outlets using the naming convention above: for the field holding the
    name, name the outlet `nameView`.


    ![9781430245421_Fig05-16.jpg](images/9781430245421_Fig05-16.jpg)


    [Figure 5-16](#9781430245421_Ch05.xhtml#_Fig16). Adding the first outlet to VillainTracker


    Some of the UI components are made up of several elements: the matrix of checkboxes,
    the radio buttons, and the text view. For the matrices, make sure the whole matrix
    is selected and not one of the cells within the matrix. For the text view, we
    have the opposite problem. The text view is contained within a scroll view. Click
    inside the text area until just the text part is highlighted, and not the scroll
    bar on the edge.


    The pop-up window for creating the outlet should indicate a type of `NSTextView`.
    If it says `NSScrollView`, hit Cancel and click one more time on the `NSTextView`
    in the Notes box


    When done, the code in the Assistant Editor should look like this:


    ```objc

    #import <Cocoa/Cocoa.h>


    @interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>

    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSTextField *nameView;

    @property (weak) IBOutlet NSTextField *lastKnownLocationView;

    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;

    @property (weak) IBOutlet NSComboBox *swornEnemyView;

    @property (weak) IBOutlet NSLevelIndicator *evilnessView;

