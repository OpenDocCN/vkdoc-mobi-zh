    ## 数据录入窗口


    数据模型就位后，就该开始构建 GUI 了。其中有趣的部分（也是本章的主要内容）是搜索窗口。但在有数据可搜索之前，我们无法进行任何搜索，因此我们将从创建 GUI
    中允许我们进行数据录入的部分开始。我们将为此构建一个非常基本的 GUI——在单个窗口中显示节目和引文，并且只显示与当前选中节目相关联的引文。


    ### 两部分的窗口


    在 Xcode 项目中双击 `MainMenu.xib`，在 Interface Builder 窗格中打开它。这会调出我们之前使用过的标准空应用程序 nib。在主
    nib 窗口中选择 `NSWindow` 实例，然后使用调整大小控件使其更高（大约为初始高度的两倍）。我们需要这个空间，因为我们要在这里放置两组视图，一组用于
    `Show` 实体，另一组用于 `Quote` 实体。


    #### 显示节目


    我们将从 `Show` 的视图开始。从*对象库*中拖出一个 `NSTableView`，并将其放置在窗口顶部附近。调整其大小以占据大部分空间。这次不要担心蓝色辅助线；实际上，使其比辅助线建议的尺寸略小一些。我们将把它与一些其他控件一起分组到一个盒子中，因此尺寸调整目前还不关键。打开*属性检查器*，将表格视图设置为基于视图，并带有一列。调整列本身的大小以占据表格视图的宽度，并将列的名称设置为“Name”。拖出一个按钮，将其放置在表格视图的右下角下方，并将其标签设置为“Add”。再拖出一个相同类型的按钮，将其放置在
    Add 按钮的左侧，并将该按钮标签设置为“Remove”。选择所有这三个控件，并将它们分组到一个盒子中（选择 **Editor** ![image](images/arrow.jpg)
    **Embed In** ![image](images/arrow.jpg) **Box**）。将盒子的标题设置为“Show”。现在我们可以相对于窗口调整盒子的大小，然后调整盒子内部的表格视图，以获得一个令人满意的布局。


    既然我们有了一个列出节目的位置，我们需要将它们连接到核心数据模型，我们将使用 Cocoa 绑定和一个 `NSArrayController` 作为粘合剂。从*对象库*中拖出一个数组控制器，并将其命名为“Shows”。在*属性检查器*中，将*模式*下拉菜单设置为“Entity
    Name”，然后在*实体名称*字段中输入“Show”，以将其连接到模型编辑器中的 `Show` 实体。勾选*准备内容*复选框，这将指示数组控制器在启动时加载所有
    `Show`。切换到*绑定检查器*。将*托管对象上下文*（位于绑定列表底部）绑定到 App Delegate，并将*模型键路径*设置为 `managedObjectContext`。


    对于绑定，我们从表格视图开始。选择表格视图，然后打开*绑定检查器*。展开*表内容*下的*内容*部分，并勾选*绑定到*旁边的复选框。下拉菜单应显示“Shows”。默认的*控制器键*
    `arrangedObjects` 就是我们想要的，*模型键路径*中无需输入内容。


    我们还希望数组控制器知道选中的行，因此将*选择索引*绑定绑定到 Shows，并将此处的*控制器键*设置为 `selectionIndexes`。然后，在表格视图内的视图层次结构中，使用对象停靠区向下深入到“静态文本
    - 表格视图单元格”。在*属性检查器*中，将*行为*更改为可编辑。然后，在*绑定检查器*中，将“值”绑定到表格单元格视图，并将其*模型键路径*设置为 `objectValue.name`。


    这样就完成了表格视图的设置。为了完成窗口中处理 `Show` 的部分，我们需要连接按钮。这就像上一章一样完成——结合使用目标-动作来处理点击，以及使用 Cocoa
    绑定来适当地启用或禁用按钮。我们先做目标-动作部分。按住 Control 键从 Add 按钮拖动到 Shows 数组控制器，并选择 `add:` 作为接收的动作。对
    Remove 按钮执行相同操作，这次选择 `remove:` 作为接收的动作。再次选择 Add 按钮，然后转到*绑定检查器*。勾选*绑定到*复选框，将按钮连接到
    Shows 控制器，并输入 `canAdd` 作为*控制器键*。对 Remove 按钮重复此操作，将其绑定到 `canRemove` *控制器键*。


    窗口应类似于[图 10-3](#9781430245421_Ch10.xhtml#Fig3)。请注意实用区域中的 Outlets Inspector 视图，它显示了数组控制器的绑定和目标-动作连接。当事情没有按预期工作时，此视图对于故障排除非常有用！


    ![9781430245421_Fig10-03.jpg](images/9781430245421_Fig10-03.jpg)


    [图 10-3](#9781430245421_Ch10.xhtml#_Fig3). 数据录入窗口的部分布局


    #### 录入引文


    现在我们将在 Show 框的下方重复大部分相同设置，用于引文。和之前一样，拖出一个表格视图和两个按钮，将它们放置在窗口的下半部分，并按之前的方式给按钮设置标签。然而，对于这个表格视图，我们将保留两列。像之前一样将其更改为基于视图，并勾选标签为“交替行颜色”的复选框，这将使内容更易于阅读。将左列标题设置为“Quote
    Text”，右列标题设置为“Character”，并调整大小以为 Quote Text 列提供更多空间。在 Quote Text 列中，双击列内的“Table
    View Cell”文本，并将其更改为“Quote”。对 Character 列中的“Table View Cell”文本执行相同操作，将其更改为“Character”。这将在稍后帮助我们区分这两列。像之前一样将这些三个控件分组到一个盒子中，并将盒子标题设置为“Quote”。


    窗口的这一部分也将使用一个 `NSArrayController`，但其配置将与 Shows 数组控制器略有不同。拖出一个控制器，并将其命名为“Quotes”。在*属性检查器*中，将其*模式*设置为
    Entity Name，然后将*实体名称*字段设置为 Quote（与我们在模型编辑器中定义的实体名称相同）。然后，切换到*绑定检查器*。默认情况下，每个数组控制器将获取对应实体的所有对象。我们将更改此设置，使其仅根据选中的
    Show 获取引文。打开*内容集*绑定，在下拉列表中选择“Shows”，在*控制器键*组合框中选择“selection”，并在*模型键路径*组合框中输入“quotes”。最后，按回车键以启用绑定。我们还需要将其连接到由
    App Delegate 提供的托管对象上下文。将*托管对象上下文*（位于绑定列表底部）绑定到 App Delegate，并将*模型键路径*设置为 `managedObjectContext`。


    现在我们可以将这个表格视图绑定到 Quotes 控制器。选择表格视图，然后打开*绑定检查器*。展开*表内容*下的*内容*部分，并勾选*绑定到*旁边的复选框。下拉菜单应显示“Quotes”。'
