  trans: '

    # 添加图像视图


    没有反派追踪应用能缺少显示反派冷酷面容的功能。在 VillainTracker 中，我们将使用 `NSImageView` 类的实例来显示反派图片，并通过
    Mac 的拖放机制接收图片作为输入。


    返回对象库面板，在搜索字段中输入“image”。搜索结果中有一项是图像井（Image Well），它实际上就是 `NSImageView` 的一个实例。将其中一个拖拽到我们的窗口中，并放置在上节单选按钮矩阵的右侧稍远位置。


    现在，这个图像井非常小，我们来把它放大。打开尺寸检查器（![image](img/arrow2.jpg)5）；注意图像井的宽度和高度都是 48。分别将这两个值编辑修改为
    96，控件在窗口中的大小就会改变。我们希望用户能将图像拖入此视图，因此还需要打开属性检查器（![image](img/arrow2.jpg)4），并点击启用“可编辑”复选框。


    现在，通过在窗口内稍微拖拽来调整图像井的位置。蓝色的对齐参考线会弹出；请注意，此控件现在与左侧的单选按钮矩阵处于同一垂直高度。将它们并排放置，然后复制另一个标签，将其放在图像视图的左上侧稍远位置，并将其标题改为“外观：”。请参考图
    5-9 了解此时的粗略布局。


    ![9781430245421_Fig05-09.jpg](img/9781430245421_Fig05-09.jpg)


    图 5-9. 图像井已就位


    # 在矩阵中添加复选框


    现在我们将添加一系列复选框，让用户标记每个反派的能力。与反派的主要动机类似，我们将创建一个分类系统，将所有超级反派的能力归纳到相应的类别中。我们再次使用矩阵，但这次填充的是复选框，而不是单选按钮。


    再次前往*对象库*，在搜索字段中输入“check”。其中一个搜索结果将标记为*复选框*（Check Box）。抓取一个并将其拖入窗口。这会在窗口中放置一个配置为复选框工作的
    `NSButton`。我们打算并排排列四个这样的复选框，但目前只有一个。现在是时候学习 Interface Builder 模式中的一个便捷技巧了：它允许我们自动选取任何可以出现在
    `NSMatrix` 中的对象（例如 `NSButton`），并将其替换为一个新的 `NSMatrix`，该矩阵包含一个与原始对象配置相同的单元格。只需选中该对象（即复选框），然后在菜单中选择**编辑器**
    ![image](img/arrow.jpg)**嵌入到** ![image](img/arrow.jpg)**矩阵**。这个复选框现在就被包裹在一个矩阵中了，我们可以使用之前学习过的调整包含单选按钮的矩阵大小的技巧：按住
    Option 键，点击底部居中的调整手柄，然后向下拖拽，直到出现四个复选框。


    接下来，我们来配置这个新矩阵，使其能与一组复选框正确配合。选中矩阵本身（而不是其内部的某个复选框），然后打开实用工具区域中的*属性检查器*（![image](img/arrow2.jpg)4）。通过检查检查器顶部显示的名称来确认我们选中的是矩阵——它应该显示为
    Matrix（矩阵），而不是 Button Cell（按钮单元格）。在检查器窗口的顶部是一个标记为“模式”（Mode）的弹出按钮。如果它没有设置为“高亮”（Highlight），我们就将其改为该模式，以获得正确的行为。


    现在，为复选框填充以下（诚然不完整）能力列表的标题：“邪恶天才”、“读心者”、“近乎无敌”、“天气控制”。在点击设置这些值时，我们可能会无意中打开或关闭复选框。对此不必担心；所有这些复选框的状态最终都将由代码本身设定。


    与单选按钮矩阵一样，我们需要将矩阵稍微加宽，以便按钮的完整文本都能显示出来。将中心右侧的调整手柄向外拖拽，直到所有文本都可见。


    现在，我们需要为所有这些复选框设置标签，就像我们为选择主要动机的单选按钮设置标签一样。点击选中“邪恶天才”单元格，然后打开*属性检查器*（![image](img/arrow2.jpg)4），将标签设置为
    0。接着点击“读心者”单元格，将其标签设置为 1。继续设置其余复选框，最后将“天气控制”复选框的标签设置为 3。此时，我们应该得到与图 5-10 类似的效果。


    ![9781430245421_Fig05-10.jpg](img/9781430245421_Fig05-10.jpg)


    图 5-10. 为最坏的情况做准备


    # 配置弹出按钮


    现在我们来处理反派的能量来源，使用一个弹出按钮让用户从预定义列表中选择，以指定反派是如何获得能力的。我们再次提供几个选项：“天生”（反派天生就具备）、“意外事故”（某种“天灾”，如实验室爆炸、陨石撞击或类似事件导致变异）、“超级英雄行为”（某位超级英雄在执行任务时意外赋予了他人能力）以及“其他”。


    再次前往*对象库*窗口，在搜索字段中输入“popup”。从搜索结果中抓取一个弹出按钮（Pop Up Button），将其拖入窗口，并放置在上节复选框矩阵的下方稍远位置。通过点击然后双击这个新的弹出按钮，我们可以看到默认的可选值列表。双击第一个值以编辑其文本，将其改为“天生”。继续编辑其余标题，输入上面提到的名称。输入第三个后，按钮的值就用完了；默认的弹出按钮只有三个值。点击这三个值中的某一个，按
    ![images](img/arrow3.jpg)D 键复制它，然后输入最后一个值。现在再抓取一个标签，将其放置在这个弹出按钮的左侧，并将标题改为“能力来源：”。


    # 插入文本视图


    现在是时候添加最后一个控件了，一个用于编辑有关当前反派自由格式笔记的文本视图。我们将使用 `NSTextView`，这是一个功能强大的文本显示和编辑类，广泛应用于
    Mac OS X 界面。在 Interface Builder 画布中，抓住窗口轮廓上的调整手柄，向下拖拽以放大窗口。一些字段可能会随之移动；调整大小后，将它们重新放回应有的位置。我们可以通过按住
    Shift 键单击，或者拖出选择矩形框选要移动的多个元素来同时选择它们。


    腾出一些空间后，在*对象库*面板的搜索字段中输入“text view”，然后将搜索结果中的文本视图拖拽到我们窗口中的其他元素下方。调整其大小，使其填满大部分可用空间。此时的窗口布局应类似于图
    5-11。


    ![9781430245421_Fig05-11.jpg](img/9781430245421_Fig05-11.jpg)


    图 5-11. 所有控件都已放入窗口


    # 进行逻辑分组


    现在，我们所需的所有控件都已布局在窗口中，让我们退后一步，看看当前的情况。图 5-11 可能与我们现在拥有的界面看起来很相似。


    这个界面可能功能齐全，标签清晰，但肯定不会赢得任何设计奖项，这一点是肯定的。我们的界面展示了大量功能，但所有控件都挤在一起，很难看出所有这些可编辑属性之间有什么逻辑分组。

    '
- fmt: 'We can improve things a bit by grouping related controls inside of *box views*;
    Cocoa provides us with a class called `NSBox` that can contain several other objects
    and draws a nice border around them. Xcode contains a helpful shortcut that lets
    us put existing views into a box perfectly sized to contain them all precisely
    within its borders, so it’s really easy to add this enhancement to our interface.


    To start, select the first five controls (in the upper left-hand of the window)
    and all of their labels. The easiest way to do this is to click in the upper left
    corner of the window, just below the window’s close/minimize/maximize controls,
    and drag a selection box around all the views we want to select. Then choose **Editor**
    ![image](images/arrow.jpg) **Embed In** ![image](images/arrow.jpg) **Box** from
    the menu—a nice box will surround them, with a darker gray background color and
    rounded corners. At the top of the box is a text label (“Box”) that can be edited
    to something descriptive of the box’s contents. Double-click that text, and change
    it to “Basic Information.”


    Go on and do the same thing for the Primary Motivation section. First, delete
    the label by selecting it and pressing Backspace or Delete. Because there’s only
    one set of controls in the box we’re going to create, we can just use the box’s
    title instead. Now select the matrix of radio buttons, and once again select **Editor**
    ![image](images/arrow.jpg) **Embed In** ![image](images/arrow.jpg) **Box** from
    the menu. Our radio buttons are now contained within a box. Change the box’s label
    to “Primary Motivation.”


    Repeat those steps for the mugshot, once again deleting the existing label first,
    then creating the box via the menu, and finishing up by setting the box’s label
    to “Appearance.”


    Now move on to the powers and abilities. Select the Source of Powers pop-up button
    and its label, along with the matrix of checkboxes for Abilities. Once again,
    the easiest way to do this is probably to “draw a box” by clicking in the background
    near the window’s top-right corner, and dragging down and to the left until all
    the relevant items are selected. Use the menu to put these views in a box, and
    title the box “Powers and Abilities.”


    Finally, select the text view created for the villain’s notes property, and put
    that into a box of its own, entitled “Notes.”


    Now we’ve got a bunch of boxes created, but they’re probably overlapping and generally
    not very well positioned relative to each other (as shown in [Figure 5-12](#9781430245421_Ch05.xhtml#Fig12)).


    ![9781430245421_Fig05-12.jpg](images/9781430245421_Fig05-12.jpg)


    [Figure 5-12](#9781430245421_Ch05.xhtml#_Fig12). Not the prettiest box layout
    we’ve ever seen


    Don’t worry; Xcode’s blue guidelines will help us get this straightened out in
    no time. Start with the first box in the upper left-hand corner. Click anywhere
    in the dark background of the box (but not on a control or label) to start dragging
    the entire box. As we move it around a bit, the blue guidelines will appear. The
    guidelines can help us position the boxes, or any views, relative to one another
    or relative to the window itself. We can always tell what a guideline is lining
    up with by following it to its end and seeing what it connects with. When it runs
    all the way to the edge of the window, we know it’s setting us up for the recommended
    distance from the window’s edge.


    Now move on to the Primary Motivation box, lining it up with the left edge of
    the box above it and a few pixels below it, again using the guidelines to help
    get it just right. Then take the Appearance box and line it up vertically with
    the Primary Motivation box and horizontally with the right edge of the Basic Information
    box.


    Continue with the other boxes, lining up the Powers and Abilities box to the right
    of the ones we’ve already done, then the Notes box below everything else.


    If you run out of space during all this movement, or if your window is much larger
    than the combined size of all your other views, resize your window a bit in order
    to fit everything.


    Finish this step by moving the Notes box into the gap left in the lower right,
    and resizing the `NSTextView` inside of it to fit its new boundaries and margins,
    and perhaps tweaking the sizes of some of the other boxes to make them all fit
    together in a uniform way. [Figure 5-13](#9781430245421_Ch05.xhtml#Fig13) shows
    the ideal result. If you haven’t done so already, be sure to save the nib file!


    ![9781430245421_Fig05-13.jpg](images/9781430245421_Fig05-13.jpg)


    [Figure 5-13](#9781430245421_Ch05.xhtml#_Fig13). Finally, a window layout to be
    proud of!


    ## Resizing


    We’ve got a nice-looking window now, but there’s a bit more work to be done here
    to make everything behave properly: we need to be able to handle when the user
    resizes a window. To understand why that’s even necessary, test the interface
    by selecting **Simulate Document** from the **Editor** menu. Now resize the window
    and see what happens. As we’ve laid out the window, all the controls will stay
    put as we resize the window vertically, but we can shrink the window vertically
    to the point where some controls aren’t visible, and we can’t resize the window
    horizontally at all. (Depending on how you laid out the controls as you’ve been
    following along, your resize behavior may vary from this.) We’ll explore resizing
    in more depth in the next chapter. For now, we’re going to make the window non-resizable
    by setting the minimum and maximum dimensions of the window to be the same size,
    and then we’re going to move on to coding.


    Xcode makes this easy. With the VillainTracker window highlighted in the Interface
    Builder Editor canvas, select the *Size Inspector* (![image](images/arrow2.jpg)5).
    The values given for the width and height for the current size, minimum size,
    and maximum size should all be the same. Check the checkboxes for both *Minimum
    Size* and *Maximum Size* constraints, as shown in [Figure 5-14](#9781430245421_Ch05.xhtml#Fig14).


    ![9781430245421_Fig05-14.jpg](images/9781430245421_Fig05-14.jpg)


    [Figure 5-14](#9781430245421_Ch05.xhtml#_Fig14). Setting the window’s size constraints


    ## Wiring Up the VillainTrackerAppDelegate Class


    When we created the VillainTracker project, Xcode created a class called `VillainTrackerAppDelegate`.
    We’re going to add code into this class to connect it to the user interface controls,
    making it a “controller” in the model–view–controller sense. More intricate applications
    will likely have several controller classes, but for a simple app like this, which
    interacts with a single window and the application itself, one controller is all
    we need. Much of the code that we’ll be adding will take the form of outlets and
    actions, as discussed in the last chapter. This controller will have outlets to
    all the objects in our GUI (so that it can set and retrieve values in the view
    objects any time it needs to) and action methods for those objects to inform the
    controller every time a user edits a value.


    Remember, an outlet is nothing more than a specially-marked property or instance
    variable, and an action is simply any method that matches a specific signature,
    taking a single parameter of type `id` and returning void. Note that in the source
    code, the return type for an action is typically marked as `IBAction` instead
    of void. `IBAction` is actually defined to be the same as void, so as far as the
    compiler’s concerned it makes no difference. Now, let’s say we have some sort
    of design document that specifies several villain attributes and their types.
    Based on their types and usages, we could map each attribute to a suitable GUI
    class (see [Table 5-1](#9781430245421_Ch05.xhtml#Tab1)).


    [Table 5-1](#9781430245421_Ch05.xhtml#_Tab1).'
