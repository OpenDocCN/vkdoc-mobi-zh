- fmt: "```objectivec\nIn its most basic form, we can define an `NSPredicate` like\
    \ this:\n\n```\nNSPredicate *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText\
    \ CONTAINS[cd] 'missed') OR \"\n     \"(character CONTAINS[cd] 'kramer') OR \"\
    \n     \"(show.name CONTAINS[cd] 'trek')\"];\n```\n\n**Note:** In C, if you have\
    \ multiple inline string constants in your code separated only by whitespace (including\
    \ carriage returns) they will all be concatenated together into a single character\
    \ array, which can help format long strings in your code. This trick works equally\
    \ well for inline `NSString` constants—just put a single `@` symbol before the\
    \ first string, as shown previously.\n\nIn this example, we actually have three\
    \ conditions, joined together by `OR`s and wrapped in parentheses just like we\
    \ might do in application code. Each of these conditions uses the `CONTAINS` comparator\
    \ (which does exactly what you might guess), with some options specified inside\
    \ square brackets. The `c` makes the comparison case-insensitive, while the `d`\
    \ makes the comparison diacritic-insensitive. An equality comparison specifying\
    \ both, for example, will consider “ramon” and “Ramón” to be equal.\n\n`CONTAINS`\
    \ is just one of several comparators available within the predicate. All attributes\
    \ can use the `=`, `<`, `>`, `>=`, `<=`, `!=`, and `BETWEEN` comparators. (Note\
    \ that `==`, `=>`, `=<`, and `<>` are equivalent to `=`, `>=`, `<=`, and `!=`,\
    \ respectively.) String attributes can use the `BEGINSWITH`, `CONTAINS`, `ENDSWITH`,\
    \ `LIKE`, and `MATCHES` comparators.\n\n**Note:** These should mostly be self-explanatory,\
    \ with a couple of notable exceptions: `BETWEEN` lets us specify a pair of lower\
    \ and upper bounds, so the value to the right of it should be substituted in with\
    \ a two-item `NSArray`; `LIKE` lets us do wildcard matching; and `MATCHES` lets\
    \ us use regular expressions to do advanced comparisons. However, `MATCHES` doesn’t\
    \ work with an SQLite backend, so it’s not much use when fetching values from\
    \ a Core Data store.\n\nThe hard-coded option is fine if we really need a fixed\
    \ query for some special purpose in our application, but sometimes we’ll want\
    \ to create a query based on user input or other current data. Fortunately, the\
    \ `NSPredicate` class provides an easy way to interpolate values using the same\
    \ `predicateWithFormat:` method we just saw. For example,\n\n```\n// Assume these\
    \ variables exist and point at valid objects\nNSString *quoteInput;\nNSString\
    \ *characterInput;\nNSString *showNameInput;\nNSPredicate *p = [NSPredicate predicateWithFormat:\n\
    \    @\"(quoteText CONTAINS[cd] %@) OR \"\n     \"(character CONTAINS[cd] %@)\
    \ OR \"\n     \"(show.name CONTAINS[cd] %@)\",\n    quoteInput, characterInput,\
    \ showNameInput];\n```\n\nWhen that code runs, the values of the three variables\
    \ will be put into the resulting predicate. Note that the `%@` markers in the\
    \ format string are not surrounded by single-quotes, as the bare values were in\
    \ the previous example.\n\n**Specifying an `NSAppController`’s Predicate in Xcode**\n\
    \nLet’s try one of the most basic ways to put a predicate to use: attaching it\
    \ directly to a controller in Xcode. Go back to the `MainMenu.xib` file in Xcode,\
    \ select the FoundQuotes controller in the main nib window, and bring up the *Attributes\
    \ Inspector*. At the bottom is a text view labeled Fetch Predicate, where we can\
    \ simply add some text to define a predicate. Try entering this:\n\n```\nshow.name\
    \ CONTAINS[cd] 'trek'\n```\n\nThen save the changes, switch back to Xcode, and\
    \ click Run. Now the search window won’t necessarily show all the quotes you’ve\
    \ entered. If you’ve entered some Star Trek quotes, it will show only those, but\
    \ if you haven’t entered any Star Trek quotes, you’ll now see nothing in the search\
    \ window. Of course, it’s possible you’ve only entered Star Trek quotes, in which\
    \ case this view will be just the same as it was before.\n\nIn that case, enter\
    \ some quotes from another show to verify that the predicate is filtering them\
    \ out (and also because, really, there’s more to television than just Star Trek).\n\
    \n**User-Defined Predicates**\n\nThe nib-defined predicate is fine for special\
    \ uses, where some part of the GUI should always show a particular subset of the\
    \ data, but what we’re after is the ability to let the user define the search\
    \ parameters themselves. Ideally, they should be able to choose multiple parameters\
    \ to search on, edit the values to compare against, and even change the comparator\
    \ itself (instead of just using `CONTAINS` all the time). Fortunately, Cocoa provides\
    \ a GUI control called `NSPredicateEditor` that does just that!\n\nAs we hinted\
    \ at earlier, with `NSPredicateEditor`, we can make a GUI that works a lot like\
    \ the Smart Playlist feature in iTunes or the Smart Mailbox feature in Mail. Users\
    \ can add and remove search criteria, and the results will update on the fly.\
    \ See [Figure 10-6](#9781430245421_Ch10.xhtml#Fig6).\n\n![9781430245421_Fig10-06.jpg](images/9781430245421_Fig10-06.jpg)\n\
    \n[Figure 10-6](#9781430245421_Ch10.xhtml#_Fig6). QuoteMonger’s predicate editor\
    \ in action\n\nBoth `NSPredicateEditor` and `NSArrayController` can set and retrieve\
    \ the value of their `NSPredicate` via a binding, so what we’ll do is add an `NSPredicate`\
    \ as a property of the app delegate and make the appropriate bindings. Then, when\
    \ the user makes any changes in the predicate editor, the updated predicate will\
    \ automatically be passed along to the array controller.\n\n**Adding a Predicate\
    \ to the App Delegate**\n\nStart by adding a new property to the app delegate.\
    \ Open the `QMAppDelegate.h` file, which looks just like the default app delegate\
    \ header that was generated for MythBase. Add a new property called `searchPredicate`.\
    \ The interface declaration should now look something like this (new lines are\
    \ in bold):\n\n```\n@interface QMAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n\n@property (readonly, strong,\
    \ nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    \n@property (strong) NSPredicate *searchPredicate;\n\n- (IBAction)saveAction:(id)sender;\n\
    \n@end\n```\n\nNow switch over to `QMAppDelegate.m` and add the following code\
    \ near the top, just after the `@synthesize` directives generated by Xcode. The\
    \ new lines are in bold.\n\n```\n@implementation QMAppDelegate\n\n@synthesize\
    \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
    \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
    \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'space') OR \" \\\n   \
    \                        \"(character CONTAINS[cd] 'Knight')\"\n\n- (id)init {\n\
    \    if ((self = [super init])) {\n        self.searchPredicate = [NSPredicate\
    \ predicateWithFormat:DEFAULT_PREDICATE];\n    }\n    return self;\n}\n```\n\n\
    The `init` method simply creates a default value for the `searchPredicate` property.\
    \ Now let’s hook up our controller to use this new predicate. Go back to the Interface\
    \ Builder canvas, select the FoundQuotes controller, and bring up the *Attributes\
    \ Inspector*. Select all the text in the *Fetch Predicate* text view and delete\
    \ it, then switch to the *Bindings Inspector*. In the *Controller Content Parameters*\
    \ section, open the *Filter Predicate* binding info. Select App Delegate in the\
    \ pop-up, type “searchPredicate” into the *Model Key Path* combo box, and press\
    \ Return to turn on the binding.\n\nSave the work, go back to Xcode, and click\
    \ Run. You should now see a different set of results: quotes spoken by a character\
    \ named “Knight” or containing the word “space.” If nothing is matching, add a\
    \ quote with one of these characteristics in order to test out the search window.\n\
    ```"
