    \ 7-8](#9781430245421_Ch07.xhtml#_Fig8). We’ve created the first of three sets\
    \ of views for the main window. The text field inside the box is highlighted just\
    \ so we can see where it is.\n\nNow select all the views we just created by clicking\
    \ anywhere in the window and then pressing `![images](images/arrow3.jpg)A` to\
    \ select all objects in the window. Duplicate them by pressing `![images](images/arrow3.jpg)D`,\
    \ which will show us a new set of identical objects, overlapping and slightly\
    \ position-shifted from the originals. Drag this cluster to the center of the\
    \ window, using the blue guidelines to make sure that they are at the same vertical\
    \ position at the originals, and with just the right horizontal spacing between\
    \ the boxes. Then press `![images](images/arrow3.jpg)D` again, and drag the third\
    \ cluster of objects to the right side of the window, again using the blue guidelines\
    \ to help position them properly. Finally, double-click on the two new buttons,\
    \ changing their titles to \"Generate Monster\" and \"Generate Dungeon,\" respectively.\
    \ Again, depending on how the resizing constraints have been set up, we may need\
    \ to reset the size of the boxes back to 227 x 247\\. [Figure 7-9](#9781430245421_Ch07.xhtml#Fig9)\
    \ shows what the window should look like now.\n\n![9781430245421_Fig07-09.jpg](images/9781430245421_Fig07-09.jpg)\
    \  \n[Figure 7-9](#9781430245421_Ch07.xhtml#_Fig9). The completed main window\
    \ for DungeonThing\n\n## Setting Up the DungeonThingAppDelegate\n\nNow that the\
    \ initial set of bindings are out of the way and the main window is all set up,\
    \ we can connect things to the `DungeonThingAppDelegate`. Open an Assistant Editor\
    \ (`![image](images/arrow2.jpg)↵`) pane by clicking the small butler-like icon\
    \ in the group of icons labeled Editor in the toolbar (or using the keyboard shortcut),\
    \ and select `DungeonThingAppDelegate.h` from the Jump Bar. One at a time, Control-drag\
    \ from the label in the box under the Generate Character button, and drag out\
    \ to the `DungeonThingAppDelegate.h` file in the Assistant Editor, to just below\
    \ the predefined `@property` for the window. When we get there, a small window\
    \ should appear indicating the possibility to create a new outlet or action. Release\
    \ the mouse and create a new outlet titled `characterLabel`. Do the same from\
    \ the other two labels in boxes in the window, creating new outlets titled `monsterLabel`\
    \ and `dungeonLabel`.\n\nThen Control-drag from each of the three buttons back\
    \ to `DungeonThingAppDelegate.h` file in the Assistant Editor, and create new\
    \ actions titled `createCharacter:`, `createMonster:`, and `createDungeon:`. At\
    \ this point, it should be clear which action goes with which button. In addition\
    \ to adding the outlets and actions to the `DungeonThingAppDelegate.h` file, this\
    \ will also add method stubs for the actions in the `DungeonThingAppDelegate.m`\
    \ file.\n\n## Defining Your Constants\n\nAt this point, the GUI is completed,\
    \ and the relevant bindings are all configured so that the controls in the Preferences\
    \ window will all have their values saved in the user’s application preferences.\
    \ All that’s left is for us to write the action methods that will use `NSUserPreferences`\
    \ to retrieve the preferences values and display them. As mentioned, we’re stopping\
    \ short of actually using the values to generate game item descriptions, but feel\
    \ free to make that enhancement later on if you’d like.\n\nLet’s start off by\
    \ defining some constants, just like we’ve done in previous examples (if it’s\
    \ slipped your mind, see [Chapter 4](#9781430245421_Ch04.xhtml) for a discussion\
    \ of the benefits of doing this). Here are the constants to match all the values\
    \ we’ve already set in for the preferences’ key names in the nib file. Insert\
    \ these somewhere at the top of `DungeonThingAppDelegate.m`:\n\n```\n#define kCharacterMaxNameLength\
    \ @\"characterMaxNameLength\"\n#define kCharacterStatsGenerationPolicy \\\n  @\"\
    characterStatsGenerationPolicy\"\n#define kCharacterClassAllowedPaladin @\"characterClassAllowedPaladin\"\
    \n#define kCharacterClassAllowedBard @\"characterClassAllowedBard\"\n#define kCharacterClassAllowedFighter\
    \ @\"characterClassAllowedFighter\"\n#define kCharacterClassAllowedCleric @\"\
    characterClassAllowedCleric\"\n#define kCharacterClassAllowedRogue @\"characterClassAllowedRogue\"\
    \n#define kCharacterClassAllowedMonk @\"characterClassAllowedMonk\"\n#define kCharacterClassAllowedMagicUser\
    \ \\\n  @\"characterClassAllowedMagicUser\"\n#define kCharacterClassAllowedThief\
    \ @\"characterClassAllowedThief\"\n\n#define kMonsterBootyFrequency @\"monsterBootyFrequency\"\
    \n#define kMonsterTypeAllowedOrc @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin\
    \ @\"monsterTypeAllowedGoblin\"\n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\
    \n#define kMonsterTypeAllowedSkeleton @\"monsterTypeAllowedSkeleton\"\n#define\
    \ kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\n#define kMonsterTypeAllowedVampire\
    \ @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus @\"monsterTypeAllowedSuccubus\"\
    \n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\n\n#define\
    \ kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
    \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
    \n```\n\n**Note**  In order to fit the confines of the book format while still\
    \ showing valid code, we’ve wrapped some of these lines by putting a backslash\
    \ as the very last character of a line, which makes the C preprocessor just tack\
    \ on the content of the next line as if it were all on the same line to begin\
    \ with. Feel free to omit this manual wrapping in your own code, making each of\
    \ those `#define`s into a one-line declaration.\n\n## Specifying Default Preferences\
    \ Values\n\nWith the constant definitions in place, we’re ready start coding.\
    \ Before we implement our action methods, we need to learn a bit about `NSUserDefaults`.\
    \ As mentioned, this class lets us store and retrieve a user’s application preferences\
    \ as a sort of hash or dictionary, keyed off strings of our choosing. One thing\
    \ that every application should do is create a set of default values for `NSUserDefaults`,\
    \ which it will use as a fallback position in case the user hasn’t set a value\
    \ for a given key. For example, say we want to store an integer whose relevant\
    \ range is a number between 1 and 10, using the key `@\"greatness\"`. Setting\
    \ a default value of 1 for the `@\"greatness\"` key ensures that the first time\
    \ a user runs the application, and `NSUserDefaults` tries to retrieve the `@\"\
    greatness\"` value, it finds the default value (1) that we specified in code.\
    \ Without taking this step, retrieving any numeric value that hasn’t already been\
    \ set by the user will get us a zero, and retrieving any unset object value will\
    \ get us a nil.\n\nIt’s common practice to set up these values in a method that\
    \ is called early in the application’s startup phase, typically in a class that\
    \ is included in the main nib. The `initialize` class method is a good place for\
    \ this since it’s called exactly once for each class, the first time a class is\
    \ accessed. It’s bad form to try to access other application objects at `initialize`\
    \ time since we don’t know how far the startup process has progressed, but we\
    \ don’t need to do that here. Create such a method in our `DungeonThingAppDelegate`."
