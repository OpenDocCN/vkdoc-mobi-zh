  trans: "\nXcode 会自动注意到我们添加了一个新操作，并使其可供使用。保存更改并选择**运行**；新的按钮将让我们能够创建窗口，当按下其中的按钮时会发出哔哔声，如图\
    \ Figure 11-7 所示。\n\n![9781430245421_Fig11-07.jpg](img/9781430245421_Fig11-07.jpg)\n\
    \n图 11-7. 这些窗口的按钮会向我们发出哔哔声。\n\n## 模态窗口\n\n现在我们将继续讨论一种特殊的 GUI 元素，即*模态窗口*。每个人都曾使用过模态窗口，但如果你对桌面\
    \ GUI 编程不熟悉，这个术语可能对你是新的。基本上，模态窗口是一种使应用程序进入特定“模式”的窗口。具体来说，在这种模式下，应用程序只能通过模态窗口本身的控件接受输入，而在应用程序中的任何其他位置点击都只会使其发出哔哔声。由于其干扰性，模态窗口应谨慎使用——仅在应用程序在没有用户回答某种问题（例如，“有五个打开的文档带有未保存的更改。您确定要退出吗？”）的情况下无法自行推进时使用。如果应用程序需要用户提供的信息仅与单个窗口或文档相关，则最好使用工作表（本章后面会介绍），它锁定的是单个窗口而不是整个应用程序。\n\
    \n### NSAlert 函数\n\nCocoa 中最简单的模态窗口是警报面板，只需一次函数调用即可创建和运行。当用户点击其中一个按钮时，该函数返回，然后我们可以检查返回值以确定他们点击了哪个按钮。根据我们调用函数的方式，可能会显示一个、两个或三个按钮供用户选择。\n\
    \n最常用的模态警报函数是 `NSRunAlertPanel`。它有几个变体，称为 `NSRunCriticalAlertPanel` 和 `NSRunInformationalAlertPanel`，它们用于\
    \ Apple 用户界面指南中概述的特定目的，但我们可以放心地使用 `NSRunAlertPanel`。这些函数中的每一个都需要五个或更多参数：首先是显示在面板顶部的标题，然后是要显示的完整文本（它提供一些信息或向用户提问），然后是三个包含按钮标题的字符串（可能为\
    \ `nil`）。设为 `nil` 的按钮标题将不会显示，除非它们全部为 `nil`，在这种情况下，面板上会包含一个“确定”按钮。\n\n要查看一些警报面板的实际效果，请在\
    \ Interface Builder 窗格中打开 `MainMenu.xib`，然后在 Assistant Editor 窗格中打开 `WLAppDelegate.h`。向\
    \ WindowLab 窗口添加一个新按钮，并将其标题设置为“运行模态警报”。按住 Control 键从新按钮拖动到 Assistant Editor 以添加一个新操作。将新操作命名为\
    \ `runModalAlerts`。然后，在 Xcode 生成的存根内的 `WLAppDelegate.m` 中实现以下方法：\n\n```objc\n\
    - (IBAction)runModalAlerts:(id)sender {\n   NSRunCriticalAlertPanel(@\"基本用法\"\
    , @\"这是一个简单的警报面板。\", nil, nil, nil);\n   NSRunAlertPanel(@\"三个按钮\", @\"我们可以设置按钮标题：\"\
    ,\n     @\"真的吗？\", @\"哦，多么令人愉快！\", @\"随便吧。\");\n   NSRunAlertPanel(@\"格式化字符串\"\
    , @\"我们也可以进行一些格式化，%@ %@\",\n     nil, nil, nil, @\"将值放在末尾进行插入，\", @\"在三个按钮值之后。\"\
    );\n   switch (NSRunAlertPanel(@\"注意选择\",\n             @\"当然，我们可以检测到点击了哪个按钮。\"\
    ,\n             @\"默认\", @\"备用\", @\"其他\")) {\n     case NSAlertDefaultReturn:\n\
    \       NSRunInformationalAlertPanel(@\"结果：\", @\"您按下了默认按钮\",\n          nil,\
    \ nil, nil);\n       break;\n     case NSAlertAlternateReturn:\n       NSRunInformationalAlertPanel(@\"\
    结果：\", @\"您按下了备用按钮\",\n         nil, nil, nil);\n       break;\n     case NSAlertOtherReturn:\n\
    \       NSRunInformationalAlertPanel(@\"结果：\", @\"您按下了其他按钮\",\n         nil, nil,\
    \ nil);\n       break;\n     default:\n       break;\n   }\n}\n```\n\n试试看！保存，点击**运行**，然后试一试。\n\
    \n### 打开面板和保存面板\n\nCocoa 中另一个最常用的模态面板可能是用于打开和保存文件的面板，即 `NSOpenPanel` 和 `NSSavePanel`。使用这些面板通常不仅仅是一行代码。我们首先需要配置面板上的各种选项（例如，它是否允许用户选择多个文件进行打开，还是只允许选择一个），然后运行面板，检查返回值（它指示用户最终是点击了“打开”或“保存”按钮，还是取消了），然后从面板中获取结果文件名。请注意，这些面板实际上并不执行任何文件\
    \ I/O；它们只是提示用户输入文件名并返回结果。Cocoa 使用 `NSURL` 而不是 `NSString` 来表示文件路径，这使得打开和保存对话框可以引用本地文件系统之外的内容（例如\
    \ iCloud）。\n\n要查看其工作原理的示例，请考虑以下方法，该方法模拟复制文件。此方法使用 `NSOpenPanel` 提示用户选择要复制的文件，然后使用\
    \ `NSSavePanel` 让用户指定文件的目标位置：\n\n```objc\n- (IBAction)copyFile:(id)sender {\n\
    \     NSOpenPanel *openPanel = [NSOpenPanel openPanel];\n     [openPanel setTitle:@\"\
    选择要复制的文件：\"];\n     \n     if ([openPanel runModal] == NSOKButton) {\n         //\
    \ 获取第一个（也是唯一一个）选定的文件名\n         NSURL *openPath = [[openPanel URLs] objectAtIndex:0];\n\
    \         // 仅提取文件名，不包括目录路径\n         NSString *openFilename = [openPath lastPathComponent];\n\
    \         \n         NSSavePanel *savePanel = [NSSavePanel savePanel];\n         \n\
    \         [savePanel setTitle:@\"输入目标文件名：\"];\n         [savePanel setNameFieldStringValue:openFilename];\n\
    \         \n         // 在其默认目录中运行保存面板，并将打开的文件名作为建议。\n         if ([savePanel runModal]\
    \ == NSOKButton) {\n             NSURL *savePath = [savePanel URL];\n             NSString\
    \ *message = [NSString stringWithFormat:\n                                  @\"\
    您已经打开了该文件：\\n\\n%@\\n\\n 并将其保存到此处：\\n\\n%@\\n\\n\",\n                                 \
    \ openPath, savePath];\n             NSRunAlertPanel(@\"复制文件（并非真的复制）\", message,\
    \ nil, nil, nil);\n         }\n     }\n}\n```\n\n和之前一样，在主窗口中添加一个按钮（将这个称为“复制文件”），然后按住\
    \ Control 键拖动到 `WLAppDelegate.h` 文件以添加一个操作。将操作命名为 `copyFile`。然后将上面的代码复制到 `WLAppDelegate.m`\
    \ 中，替换 Xcode 生成的操作存根。保存更改，点击**运行**，然后尝试新按钮。标准的打开面板会出现，接着是一个标准的保存面板。请注意，保存面板甚至具有内置功能，可以在我们选择现有文件时发出警告，并询问我们是否确实要覆盖它（请记住，在此示例中确认覆盖文件是完全安全的，因为我们实际上并没有复制任何内容）。\n\
    \n这里可能值得提一下一个不那么明显的事实：`NSOpenPanel` 实际上是 `NSSavePanel` 的子类。这意味着如果你在 `NSOpenPanel`\
    \ 的文档或头文件中找不到预期的功能，你可能也需要查看 `NSSavePanel`。\n"
- fmt: '# System Menus


    Now that we’ve seen some of the basics of how windows are used in Cocoa, let’s
    spend some time dealing with another ever-present feature of Mac OS X, the application
    menu. Unlike most other current operating systems, Mac OS X presents its menu
    at the top of the screen instead of at the top of each window. This arrangement
    has some nice upsides: screen real estate is saved because instead of a horizontal
    strip taking space at the top of every open window, there’s just a single horizontal
    strip at the top showing the menu for the active application. Also, the menu is
    easier and quicker to “hit” with the mouse because we can just flick the mouse
    upwards and we know we’ll hit the menu, leaving us with just fine-tuning left
    and right to find the top item we want to select.


    This arrangement isn’t without complications, however. In a typical Windows application,
    there might be a number of different windows, each with its own menu, containing
    items that are only relevant to that window’s contents. While it’s technically
    possible to do something similar in a Mac OS X application, changing the structure
    of the menu as different windows are selected, this usage is frowned upon and
    will probably bother some users, who on the Mac are quite accustomed to applications
    that behave in a consistent manner. Instead, we can implement a behavior that
    is fully supported and recommended: enabling and disabling menu items based on
    the currently selected window (or, indeed, the currently selected object inside
    a window). In this section, we’re going to demonstrate how to do this, but first
    we’re going to talk a bit about the system menus that are included with Cocoa
    and standard across most applications.


    ## Standard Application Menu Items


    Apple’s guidelines define a set of menus and menu items that should appear in
    most applications. Create a new application in Xcode, and name it MenuLab, and
    use `ML` as the class prefix. This is where we’ll do some experimenting with menu
    items. Open the freshly created `MainMenu.xib` file, and the Interface Builder
    canvas will show the predefined set of menus at the top. This set contains top-level
    entries for the application itself, followed by File, Edit, Format, View, Window,
    and Help, each of which contains menu items of its own. Open up the *Connections
    Inspector* so that we can examine some of these items and see what they’re connected
    to. Just click around on each of the various menu items, and keep your eye on
    the Inspector after each click. There are a few exceptions, such as the *Show
    Fonts* menu item, but most of the items are connected to the *First Responder*
    proxy that we talked about earlier. Note that by connecting a menu item to the
    *First Responder*, not only will the item call its action method in the most relevant
    object, it will also be automatically enabled and disabled based on the contents
    of the responder chain.


    ## Our Own Menus


    The standard menus contain a lot of functionality; everything from bringing up
    the app’s About Box, to editing and formatting text, to dealing with windows is
    all set up. However, many applications need some extra functionality—something
    that doesn’t seem right to attach to a window, or just takes up too much space
    in a window. One common way to address this is to add one or more additional top-level
    menu items, usually between the View and Window menus. For instance, the Finder
    has a Go menu in there, and Xcode has three additional top-level menus: Navigate,
    Editor, and Product. In our application, we’ll get by with just one additional
    menu, which we’ll add to our MenuLab project.


    ## Enabling/Disabling With Bindings


    The first thing we’re going to do is set up a pair of menu items to control a
    Boolean attribute in our app delegate. We could use these to control some sort
    of switch that affects an application-wide setting.


    Here, we’ll create a property called `turbo`, which presumably makes everything
    happen faster (easy enough in MenuLab because it doesn’t actually do anything).
    We’ll have two menu items labeled “Turbo On” and “Turbo Off,” and connect each
    of them to an action method in our app delegate to do the actual toggling. Then
    we’ll use bindings to enable and disable them as appropriate, so that when `turbo`
    is `YES`, only the “Turbo Off” item is clickable, and when `turbo` is `NO`, only
    the “Turbo On” item is clickable.


    Start off in Xcode by adding the `turbo` property to the app delegate, along with
    an action method to toggle the value of the property. The changes we need to make
    to both `MLAppDelegate.h` and `MLAppDelegate.m` are shown here, in a somewhat
    compacted form, with blank lines removed. All we need to add are the lines shown
    in bold.


    ```

    #import <Cocoa/Cocoa.h>


    @interface MLAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (assign) BOOL turbo;

    - (IBAction)toggleTurbo:(id)sender;


    @end

    ```


    And for `MLAppDelegate.m`:


    ```

    #import "MLAppDelegate.h"


    @implementation MLAppDelegate


    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification {

        // Insert code here to initialize your application

    }


    - (IBAction)toggleTurbo:(id)sender {

        self.turbo = !self.turbo;

    }


    @end

    ```


    Now switch back to `MainMenu.xib` in an Interface Builder canvas. Open up the
    nib file’s empty window, change its title to “Turbo Switch,” and drag in a checkbox
    from the *Object Library*, changing its title to “Turbo!” once it’s in place.
    We put this checkbox there to give us a direct view of the value stored in the
    app delegate’s `turbo` property, so we can easily check and see that our menu
    items are doing the right thing. Open the *Bindings Inspector*, and configure
    the checkbox’s *Value* binding, connecting it to `MLAppDelegate` using the `turbo`
    key path.


    Next, it’s time to create some menu items ([Figure 11-8](#9781430245421_Ch11.xhtml#Fig8)
    shows what it should look like when we’re done). To do this, first search for
    Menu in the *Object Library*, which will limit the contents. Drag a Submenu Menu
    Item up into the menu, placing it between the View and Window menus. Double-click
    the new top-level menu item that we just added, and change its title to “Tools.”
    Clicking it again will reveal that it already contains a single item (titled “Item”).
    Click to select it, then press `⌘D` to duplicate it, which places an identical
    item just below it.


    ![9781430245421_Fig11-08.jpg](images/9781430245421_Fig11-08.jpg)


    [Figure 11-8](#9781430245421_Ch11.xhtml#_Fig8). Setting up menu items for toggling
    a Boolean attribute


    At this point, the lower of the two new menu items should be selected. Double-click
    to select the title text, and rename it “Turbo Off.” Control-drag from it to the
    App Delegate icon in the main window, and connect to the `toggleTurbo:` action.
    Now bring up the *Bindings Inspector*, and configure the menu item’s *Enabled*
    binding, connecting to the App Delegate using the `turbo` key path. This ensures
    that the menu will only be enabled if the value of app delegate’s `turbo` property
    is `YES`.


    Now go back to the upper menu item, renaming it “Turbo On,” and connecting it
    to the app delegate’s `toggleTurbo:` action just like you did for Turbo Off. Because
    the condition for whether this menu item should be enabled or disabled is the
    opposite of the condition for the Turbo Off menu item, the binding is going to
    be a little different. It should also have its *Enabled* binding configured with
    App Delegate and the `turbo` key path, but below that you also need to specify
    `NSNegateBoolean` as the *Value Transformer*.


    Save the changes and click **Run**. The Turbo Switch window should appear, containing
    a checkbox.'
