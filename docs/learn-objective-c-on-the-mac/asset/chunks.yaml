    \    [self.dungeonLabel setStringValue:result];\n}\n```\n\nWith those methods\
    \ in place, we should be able to compile and run DungeonThing, modify all the\
    \ values under every tab in the Preferences window, and see the modified values\
    \ reflected in the output text fields. The first version of DungeonThing is now\
    \ complete!\n\n**Note** We used the `NSUserDefaults` object to hold the settings\
