    这个控制器在任何 nib 文件中都自动可用，不过在绑定中使用之前，我们无法在任何地方看到它，一旦使用它就会出现在主 nib 窗口中。现在检查*控制器键*组合框，确保它设置为`values`。然后点击*模型键路径*组合框，并在其中输入`characterMaxNameLength`。这个字符串定义了用于将滑块值存储到`NSUserDefaults`（用户的应用程序偏好设置）中的键。按下回车键或点击离开该字段，注意检查器顶部的*绑定到*复选框会被勾选。这样就搞定了！我们暂时不需要担心其余控件；它们的默认值对我们的需求来说已经足够了。图
    7-7 展示了当这个绑定配置完成后，检查器中相关配置项应该呈现的样子。


    ![9781430245421_Fig07-07.jpg](img/9781430245421_Fig07-07.jpg)图 7-7。第一个滑块的已完成绑定


    现在选择滑块右侧的小文本字段，并为其配置与滑块完全相同的绑定：共享用户默认值控制器，`values`，以及`characterMaxNameLength`。这将使其从同一个模型对象（用户的应用程序偏好设置）中的同一个位置（`characterMaxNameLength`
    的值）拉取显示值。现在来感受一下 Cocoa 绑定的魔力，选择菜单中的编辑器![image](img/arrow.jpg)模拟界面，点击并拖动滑块，观察右侧小文本字段中的值是否同步更新。请注意，这与我们在第
    2 章中构建的功能相同，但机制不同：当我们拖动滑块时，它的值正被`NSUserDefaultsController`推送到我们的应用程序偏好设置中，该控制器同时也会将该值传递给绑定到同一键的其他对象（即这个小文本字段）。相当巧妙的技巧！但这并非什么把戏。它是
    Cocoa 绑定动态特性的一个简单示例。利用这项技术，我们可以从控制器类中消除大量枯燥的代码，有时甚至能完全摒弃控制器类——仅使用 Cocoa 内置的控制器类来代替。


    接下来我们处理下一个 GUI 控件，即中间的单选按钮矩阵。点击该矩阵，然后查看*绑定检查器*，我们会发现这里没有“值”选项。对于这个控件，我们将不绑定“值”，而是绑定`选定标签`属性，这意味着当用户选择一个单元格时，该单元格的标签将被推送到模型中，并且下次打开偏好设置窗口时，保存的标签将决定哪个单选按钮被选中。打开*绑定检查器*中的*选定标签*部分，再次确保选中了共享用户默认值控制器，且*控制器键*为`values`，但这次在*模型键路径*中输入`characterStatsGenerationPolicy`，然后按回车。


    接下来，我们来处理“允许的角色类别”复选框。对于每一个复选框，我们将创建一个新的键名，并将其“选择”状态绑定到用户应用程序偏好设置中的一个值。点击第一个单元格“圣骑士”。检查器的标题应变为“按钮单元格绑定”。如果没有变化，就再次点击按钮直到标题改变。现在将该按钮单元格的`值`属性绑定到`characterClassAllowedPaladin`键。对其余的按钮单元格重复这些步骤，通过共享用户默认值控制器将它们每一个绑定到相应的键名上。`吟游诗人`应绑定到`characterClassAllowedBard`，`战士`应绑定到`characterClassAllowedFighter`，以此类推。当处理到`魔法师`时，为了保持一致性，请使用键名`characterClassAllowedMagicUser`，省略其中的`-`符号。


    ## 怪物生成器的绑定


    现在切换到“怪物生成”标签页。


    将滑块的*值*绑定到`monsterBootyFrequency`，并对右侧的小文本字段执行相同操作。然后按照我们在“角色生成”标签页中使用的方法配置复选框。点击“兽人”复选框，直到复选框本身被选中，并将其值绑定到`monsterTypeAllowedOrc`。继续处理其余的复选框，将每个复选框的值绑定到相应的键名：`monsterTypeAllowedGoblin`，`monsterTypeAllowedOgre`，以此类推。


    ## 地下城生成器的绑定


    最后，切换到“地下城生成”标签页，该页面仅包含三对滑块和文本字段。在“隧道蜿蜒度”标签的右侧，将滑块和文本字段的*值*绑定都配置为`dungeonTunnelTwistiness`。将两个“怪物频率”控件的值都绑定到`dungeonMonsterFrequency`，并将两个“宝藏频率”控件的值都绑定到`dungeonTreasureFrequency`。


    ## 创建主窗口


    现在该关注我们的主窗口了，它将包含用户点击以生成角色、怪物和地下城的按钮，以及用于显示结果的文本字段。点击主窗口的标题栏（如果主窗口尚未可见，则双击其在主窗口中的图标），然后调出*大小检查器*（![image](img/arrow2.jpg)5）。将窗口大小更改为
    731 x 321，然后切换到*属性检查器*（![image](img/arrow2.jpg)4）并点击关闭*调整大小*复选框，这样我们就少了一件需要操心的事。此应用程序显示的数据集有限，因此没有理由让用户将窗口调得更大。我们现在将创建三组
    GUI 组件，每组对应我们处理的三种数据类型。我们将手动布局第一组，然后复制它来完成另外两组。


    首先，我们在一个框内创建一个用于显示结果的文本字段。转到*对象库*面板，在搜索字段中输入 `nsbox`。在结果中找到“框”，并将一个框拖到我们的窗口中。选中新框后，切换回*大小检查器*，将框的尺寸设置为宽
    227、高 247。趁此机会，将它的 X 和 Y 值都设置为 20。这将框置于窗口的左下角，大致相当于我们将其拖到左下角并根据蓝色对齐线放置的位置。然后切换回*属性检查器*，将*标题位置*设置为“无”，这样标题就不会显示出来。


    现在，回到*对象库*面板，在搜索框中输入 `label`。搜索结果中有一个“多行标签”；选中它，将其拖到与我们刚刚创建的框完全重叠的位置，然后松开鼠标。这样操作会将其放入框内。放入后，通过先将标签的左下角拖到框的左下角，再将标签的右上角拖到框的右上角，将标签拉伸以填满整个框。在这两种情况下，当拖拽到距框边缘合适的距离时，蓝色对齐线就会出现。最后，三击文本字段以选中其中的文本（`多行标签`），然后按退格键或删除键清除文本。


    让我们为这个框收尾，添加一个最终能向刚创建的文本字段中填入文本的按钮。在*对象库*中找到一个按钮（标准推送按钮就很合适），并将其拖到框正上方的一个位置。拖拽时，蓝色线条会出现，显示距窗口顶部的正确距离，同时也会在按钮与框的中心垂直对齐时进行提示。这就是我们要放置的位置！双击按钮以编辑其标题，将其改为`生成角色`。根据调整大小约束的设置方式，我们之后可能需要重设框的尺寸。图
    7-8 展示了此时我们应看到的效果。


    ![9781430245421_Fig07-08.jpg](img/9781430245421_Fig07-08.jpg)

