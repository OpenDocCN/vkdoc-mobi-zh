    draw the lines leading to the control points   NSBezierPath *cpLines = [NSBezierPath
    bezierPath];   [cpLines moveToPoint:NSMakePoint(0.0, 0.0)];   [cpLines lineToPoint:NSMakePoint(self.cp1X,
    self.cp1Y)];   [cpLines moveToPoint:NSMakePoint(1.0, 1.0)];   [cpLines lineToPoint:NSMakePoint(self.cp2X,
    self.cp2Y)];   [LINE_TO_CP_COLOR set];   [cpLines setLineWidth:0.01];   [cpLines
    stroke];    // draw the curve itself   NSBezierPath *bp = [NSBezierPath bezierPath];
      [bp moveToPoint:NSMakePoint(0.0, 0.0)];   [bp curveToPoint:NSMakePoint(1.0,
    1.0)     controlPoint1:NSMakePoint(self.cp1X, self.cp1Y)     controlPoint2:NSMakePoint(self.cp2X,
    self.cp2Y)];   [CURVE_COLOR set];   [bp setLineWidth:0.01];   [bp stroke];    //
    draw the control points   [self drawControlPointAtX:self.cp1X y:self.cp1Y];   [self
    drawControlPointAtX:self.cp2X y:self.cp2Y];       [NSGraphicsContext restoreGraphicsState];
    } ```    This sort of drawing code can make for some pretty long methods, but
    it’s often pretty straightforward, as in `drawRect:` shown previously. Not a single
    loop or `if` construct in the whole method! Note that unlike the Mr. Smiley code
    in [Chapter 14](#9781430245421_Ch14.xhtml), this drawing code doesn’t refer to
    our view’s bounds rect at all. Because we know that the bounds are always adjusted
    to contain a square from (0,0) to (1,1), we make use of simple hardcoded values
    to draw our graphics in and around this unit square.    Click *Run* to run the
    app; it should look something like [Figure 15-1](#9781430245421_Ch15.xhtml#Fig1).
    We should be able to edit the values in the text fields (any values between 0.0
    and 1.0 work well) and see the control points and curve change accordingly.    Watching
    the Mouse    But entering numeric values into text fields isn’t the point of this
    exercise; we want to drag those control points around. As it turns out, this is
    pretty simple to do. `NSView` contains methods that are automatically called whenever
    a user interacts with the view by clicking, dragging, and so on. All we have to
    do is override a few methods, and we can respond to every click, drag, and release
    of the mouse.    Let’s start by adding a pair of `BOOL` properties to our view
    to keep track of whether one of the control points is currently being dragged.
    Add the following two lines to the `@interface` declaration in `CECurveView.h`:    ```
    @property (assign) BOOL draggingCp1; @property (assign) BOOL draggingCp2; ```    Now
    let’s add some methods to the `@implementation` section of `CECurveView.m` in
    order to start intercepting the mouse activity we want to watch. The first method,
    `mouseDown:`, will be called whenever a user clicks in our view.'
  trans: "\n系统还会提示错误：`CECurveView` 对于键 `cp1X` 不符合键值编码规范，确实如此——我们还没有将其添加到 `CECurveView`\
    \ 类中，但马上就会修改！\n\n**贝塞尔曲线的底层架构**\n\n现在开始为 `CECurveView` 类建立基础设施。`CECurveView` 需要跟踪两个控制点，我们将其设置为四个浮点数，每个浮点数都通过属性访问，这与控制器类的做法类似。我们还要采用一种与第\
    \ 14 章中 `MrSmiley` 类似的技术，使 GUI 能够按比例缩放，以适应其渲染尺寸。这一次，我们将设置固定的边界，以便始终能在平面上 (0,0)\
    \ 到 (1,1) 之间的正方形区域内绘制曲线，并留出一点额外的周边空间。为此，我们将添加一些代码，将边界设置为 (-0.1,-0.1) 到 (1.1,1.1)\
    \ 之间的正方形区域，并且无论视图如何调整大小，都保持这些边界不变。通过添加以下粗体行来实现这一切：\n\n```objectivec\n// CECurveView.h:\n\
    #import <Cocoa/Cocoa.h>\n@interface CECurveView : NSView {\n    NSRect myBounds;\n\
    }\n@property (assign, nonatomic) CGFloat cp1X;\n@property (assign, nonatomic)\
    \ CGFloat cp1Y;\n@property (assign, nonatomic) CGFloat cp2X;\n@property (assign,\
    \ nonatomic) CGFloat cp2Y;\n@end\n```\n\n然后将这些行添加到 `.m` 文件中：\n\n```objectivec\n\
    // CECurveView.m:\n#import \"CECurveView.h\"\n@implementation CECurveView\n\n\
    - (void)setCp1X:(CGFloat)f {\n    self.cp1X = MAX(MIN(f, 1.0), 0.0);\n    [self\
    \ setNeedsDisplay:YES];\n}\n- (void)setCp1Y:(CGFloat)f {\n    self.cp1Y = MAX(MIN(f,\
    \ 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n}\n- (void)setCp2X:(CGFloat)f\
    \ {\n    self.cp2X = MAX(MIN(f, 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n\
    }\n- (void)setCp2Y:(CGFloat)f {\n    self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n    [self\
    \ setNeedsDisplay:YES];\n}\n\n- (id)initWithFrame:(NSRect)frame {\n    self =\
    \ [super initWithFrame:frame];\n    if (self) {\n        // 初始化代码写在这里。\n     \
    \   myBounds = NSMakeRect(-0.1, -0.1, 1.2, 1.2);\n        [self setBounds:myBounds];\n\
    \    }\n    return self;\n}\n- (void)setFrameSize:(NSSize)newSize {\n    [super\
    \ setFrameSize:newSize];\n    [self setBounds:myBounds];\n}\n- (void)drawRect:(NSRect)rect\
    \ {\n    // 绘制代码写在这里。\n}\n@end\n```\n\n请注意，我们正在为这些属性实现自己的设置方法，因此需要将属性标记为 `nonatomic`。编译器会注意到我们没有实现自己的获取方法，所以编译器仍会为我们生成这些方法。在设置方法中，我们将对输入值实施范围限制，使其保持在\
    \ 0.0 到 1.0 之间。我们还会使用 `setNeedsDisplay:` 将窗口标记为“脏”（需重绘），从而在属性发生变化时强制系统重绘窗口。\n\n\
    **绘制曲线**\n\n现在进入有趣的部分：绘制曲线本身。我们将使用预处理器的 `#define` 来定义颜色和线宽的值，这样便于查找和调整这些值以优化外观。在\
    \ `CECurveView.m` 中靠近顶部的位置添加以下行：\n\n```objectivec\n#define CP_RADIUS 0.1\n#define\
    \ CP_DIAMETER (CP_RADIUS*2)\n#define BACKGROUND_COLOR [NSColor whiteColor]\n#define\
    \ GRID_STROKE_COLOR [NSColor lightGrayColor]\n#define GRID_FILL_COLOR [NSColor\
    \ colorWithCalibratedWhite:0.9 alpha:1.0]\n#define CURVE_COLOR [NSColor blackColor]\n\
    #define LINE_TO_CP_COLOR [NSColor darkGrayColor]\n#define CP_GRADIENT_COLOR1 [NSColor\
    \ lightGrayColor]\n#define CP_GRADIENT_COLOR2 [NSColor darkGrayColor]\n```\n\n\
    我们将按照以下示例实现 `drawControlPointAtX:y:` 和 `drawRect:` 方法。绘制控制点的代码演示了 `NSGradient`\
    \ 类的使用，该类可以用于填充贝塞尔路径的内部，而不仅仅是进行纯色填充。\n\n```objectivec\n- (void)drawControlPointAtX:(CGFloat)x\
    \ y:(CGFloat)y {\n    NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n\
    \        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS,\n                   CP_DIAMETER,\
    \ CP_DIAMETER)];\n    NSGradient *g;\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n\
    \                             endingColor:CP_GRADIENT_COLOR2];\n    [g drawInBezierPath:cp\n\
    \       relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n\n- (void)drawRect:(NSRect)rect\
    \ {\n    [NSGraphicsContext saveGraphicsState];\n\n    // 绘制背景\n    NSBezierPath\
    \ *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n                   \
    \                 xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR set];\n   \
    \ [bg fill];\n\n    // 绘制网格\n    NSBezierPath *grid1 = [NSBezierPath bezierPath];\n\
    \    [grid1 moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
    \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n\n    [grid1 moveToPoint:NSMakePoint(0.5,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
    \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR\
    \ set];\n    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
    \    [grid1 stroke];\n\n    // 绘制指向控制点的连线\n    NSBezierPath *cpLines = [NSBezierPath\
    \ bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0, 0.0)];\n    [cpLines\
    \ lineToPoint:NSMakePoint(self.cp1X, self.cp1Y)];\n    [cpLines moveToPoint:NSMakePoint(1.0,\
    \ 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X, self.cp2Y)];\n    [LINE_TO_CP_COLOR\
    \ set];\n    [cpLines setLineWidth:0.01];\n    [cpLines stroke];\n\n    // 绘制曲线本身\n\
    \    NSBezierPath *bp = [NSBezierPath bezierPath];\n    [bp moveToPoint:NSMakePoint(0.0,\
    \ 0.0)];\n    [bp curveToPoint:NSMakePoint(1.0, 1.0)\n      controlPoint1:NSMakePoint(self.cp1X,\
    \ self.cp1Y)\n      controlPoint2:NSMakePoint(self.cp2X, self.cp2Y)];\n    [CURVE_COLOR\
    \ set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\n    // 绘制控制点\n    [self\
    \ drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n这种绘制代码可能会导致方法非常长，但通常它非常简单，就像前面展示的\
    \ `drawRect:` 方法一样。整个方法中没有循环或 `if` 结构！请注意，与第 14 章中的 Mr. Smiley 代码不同，这个绘制代码完全没有引用我们视图的边界矩形。因为我们知道边界总是被调整为包含一个从\
    \ (0,0) 到 (1,1) 的正方形，所以我们使用简单的硬编码值在这个单位正方形内及其周围绘制图形。\n\n点击 *运行* 来运行应用；它看起来应该类似于图\
    \ 15-1。我们应该能够编辑文本字段中的值（0.0 到 1.0 之间的任何值都适用），并看到控制点和曲线随之变化。\n\n**监听鼠标操作**\n\n但通过文本字段输入数值并不是本练习的目的；我们希望可以拖动这些控制点。事实证明，这非常简单。`NSView`\
    \ 包含一些方法，当用户通过点击、拖动等方式与视图交互时，这些方法会被自动调用。我们只需要重写几个方法，就可以对鼠标的每一次点击、拖动和释放做出响应。\n\n\
    首先，让我们在视图中添加一对 `BOOL` 类型的属性，用于跟踪其中一个控制点是否正在被拖动。在 `CECurveView.h` 的 `@interface`\
    \ 声明中添加以下两行：\n\n```objectivec\n@property (assign) BOOL draggingCp1;\n@property\
    \ (assign) BOOL draggingCp2;\n```\n\n现在，让我们在 `CECurveView.m` 的 `@implementation`\
    \ 部分添加一些方法，以便开始拦截我们希望监听的鼠标活动。第一个方法 `mouseDown:` 将在用户点击我们的视图时被调用。\n"
- fmt: "```objc\n- (void)mouseDown:(NSEvent *)theEvent {\n  // get current mouse location,\
    \ convert to our coordinate space\n  // (the one expresed by our bounds)\n  NSPoint\
    \ mouseLocation = [theEvent locationInWindow];\n  NSPoint convertedLocation =\
    \ [self convertPoint:mouseLocation\n    fromView:nil];\n  // see if the click\
    \ was on one of our control knobs\n  NSPoint cp1 = NSMakePoint(self.cp1X, self.cp1Y);\n\
    \  NSPoint cp2 = NSMakePoint(self.cp2X, self.cp2Y);\n  if (pointsWithinDistance(self.cp1,\
    \ convertedLocation, CP_RADIUS)) {\n    self.draggingCp1 = YES;\n  } else if (pointsWithinDistance(cp2,\
    \ convertedLocation, CP_RADIUS)){\n    self.draggingCp2 = YES;\n  }\n  [self setNeedsDisplay:YES];\n\
    }\n```\n\n在`mouseDown:`方法中，我们首先向窗口请求当前鼠标位置，然后使用一个内置的`NSView`方法，将坐标从窗口的坐标系转换到我们自己的坐标系。这意味着，例如，我们单位方块右上角的一次点击，起初是距窗口左下角的水平和垂直像素数，最终将被转换为(1,1)或附近的值。然后我们执行两次测试，以查看是否点击了其中一个控制点。该测试使用以下函数完成，我们应将此函数添加到`CurveEdit.m`顶部，位于`#defines`组和`@implementation`部分之间：\n\
    \n```objc\nstatic BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d)\
    \ {\n  return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y), 2) <= pow(d, 2);\n}\n```\n\
    \n`pointsWithinDistance`函数利用勾股定理来确定两点之间的距离（在我们的场景中，是控制点的中心和鼠标位置的距离）是否小于我们传入的距离（控制点半径）。利用这一点，我们能够检查用户是否点击了某个控制点；如果是，我们将相应的标志（`draggingCp1`或`draggingCp2`）设置为`YES`。\n\
    \n接下来要实现的方法是`mouseDragged:`，它在按住鼠标按钮并移动时被调用。请注意，此方法并非在鼠标拖过的每个视图中都被调用；它始终在最初发生鼠标点击的视图中被调用。从某种意义上说，接收点击的视图“拥有”之后所有的拖动操作。在此方法中，我们再次从事件中获取鼠标位置，将其转换为我们视图自己的坐标系，然后更新当前正在拖动的控制点的坐标。如果当前没有控制点被拖动，则什么也不会发生。\n\
    \n```objc\n- (void)mouseDragged:(NSEvent *)theEvent {\n  NSPoint mouseLocation\
    \ = [theEvent locationInWindow];\n  NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
    \    fromView:nil];\n  if (self.draggingCp1) {\n    self.cp1X = convertedLocation.x;\n\
    \    self.cp1Y = convertedLocation.y;\n  } else if (self.draggingCp2) {\n    self.cp2X\
    \ = convertedLocation.x;\n    self.cp2Y = convertedLocation.y;\n  }\n  [self setNeedsDisplay:YES];\n\
    }\n```\n\n处理鼠标所需的最后一个方法是`mouseUp:`，它让我们处理按钮的释放。与`mouseDragged:`一样，`mouseUp:`始终在发起拖动的视图上被调用。这意味着当用户在我们的视图中点击后，无论用户在何处松开鼠标按钮，我们都会收到此消息。这里我们只需将标志设置为`NO`以指示没有东西正在被拖动。\n\
    \n```objc\n- (void)mouseUp:(NSEvent *)theEvent {\n  self.draggingCp1 = NO;\n \
    \ self.draggingCp2 = NO;\n}\n```\n\n完成所有这些后，*Run* 这个应用。我们应该能够拖动控制点，曲线会跟随每一次移动，文本框中的数字也会随拖动而改变。\n\
    \n## 一点优化\n\n这已经很不错了，但正如我们在尝试新GUI设计时经常注意到的，一些小的使用体验会提示我们进行增强。\n\n一方面，我们总是以相同的顺序绘制控制点，因此控制点2始终位于最上方，即使我们将控制点1直接拖到它上面也是如此。这感觉很不自然。幸运的是，修复方法非常简单，这也是我们将控制点绘制拆分为两个独立方法的真正、实际的原因。在`drawRect:`方法的末尾，添加如下粗体显示的行：\n\
    \n```objc\n// draw the control points\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n} else {\n\
    \  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n}\n```\n\n就这样！点击 *Run*。注意，无论何时我们拖动第一个控制点，它都会显示在第二个控制点的前面。\n\n\
    另外，高亮显示当前正在被拖动的控制点也会是不错的功能，比如用不同的颜色绘制它。这也是一个非常简单的改动，能为用户提供一些有用的反馈。首先，为新的渐变定义一些高亮颜色，在文件顶部的其他`#defines`中添加这几行：\n\
    \n```objc\n#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]\n#define\
    \ CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]\n```\n\n现在，修改`drawControlPointAtX:y:`方法，添加一个额外的参数来指定是否绘制高亮变体，添加以下粗体显示的行：\n\
    \n```objc\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y dragging:(BOOL)dragging\
    \ {\n  NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n    NSMakeRect(x\
    \ - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];\n  NSGradient *g;\n\
    \  if (dragging) {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
    \                            endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n  } else\
    \ {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n  \
    \                          endingColor:CP_GRADIENT_COLOR2];\n  }\n  [g drawInBezierPath:cp\n\
    \     relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n```\n\n因为我们已经为控制点绘制方法添加了一个参数，所以还需要更改它在`drawRect:`末尾的调用方式，如下所示：\n\
    \n```objc\n// draw the control points\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y dragging:self.draggingCp2];\n  [self drawControlPointAtX:self.cp1X\
    \ y:self.cp1Y dragging:self.draggingCp1];\n} else {\n  [self drawControlPointAtX:self.cp1X\
    \ y:cp1Y dragging:self.draggingCp1];\n  [self drawControlPointAtX:self.cp2X y:self.cp2Y\
    \ dragging:self.draggingCp2];\n}\n```\n\n现在点击 *Run*，会看到原本灰色的控制点在拖动时会亮起红色，给用户一个很好的视觉提示。还要注意，当我们松开时，最近被拖动的控制点会保持红色。要修复这个问题，在`mouseUp:`方法的末尾添加：\n\
    \n```objc\n[self setNeedsDisplay:YES];\n```\n\n## Core Animation 入门\n\nApple 在\
    \ Mac OS X 中包含的最激动人心的技术之一是一个名为 Core Animation 的图形系统，它让我们能够轻松地在应用程序中创建动画效果。我们可以让视图平滑、轻松地滑动、淡入淡出、旋转和缩放，通常只需几行代码。实际上，Core\
    \ Animation 允许我们指定对象的一种变化——例如将其位置更改到窗口中的另一个点——这样，变化不会瞬间发生，而是被自动分割成几个由 Core Animation\
    \ 随时间渲染的小动作。我们可以指定过渡的时长（以秒为单位），以及变化的定时或节奏。我们还可以将动画分组，使它们完美同步执行。\n\n### Core Animation\
    \ 基础\n\n从技术角度来看，这一切的核心基本单元是一个名为`CALayer`的类（Core Animation 的预发布版本甚至被称为 Layer Kit）。"
  raw: '``` - (void)mouseDown:(NSEvent *)theEvent {   // get current mouse location,
    convert to our coordinate space   // (the one expresed by our bounds)   NSPoint
    mouseLocation = [theEvent locationInWindow];   NSPoint convertedLocation = [self
    convertPoint:mouseLocation     fromView:nil];   // see if the click was on one
    of our control knobs   NSPoint cp1 = NSMakePoint(self.cp1X, self.cp1Y);   NSPoint
    cp2 = NSMakePoint(self.cp2X, self.cp2Y);   if (pointsWithinDistance(self.cp1,
    convertedLocation, CP_RADIUS)) {     self.draggingCp1 = YES;   } else if (pointsWithinDistance(cp2,
    convertedLocation, CP_RADIUS)){     self.draggingCp2 = YES;   }   [self setNeedsDisplay:YES];
    } ```    In the `mouseDown:` method, we first ask the window for the current mouse
    location, then use a built-in `NSView` method to convert the coordinates from
    the window’s coordinate system to our own. This means that a click in the upper
    right-hand corner of our unit square, for instance, which starts off being the
    number of horizontal and vertical pixels from the window’s lower left-hand corner,
    will end up being converted to (1,1) or somewhere nearby. Then we do a pair of
    tests to see if one of our control points is being clicked. This test is done
    using the following function, which we should add to the top of `CurveEdit.m`,
    between the group of `#defines` and the `@implementation` section:    ``` static
    BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d) {   return pow((p1.x-p2.x),
    2) + pow((p1.y - p2.y), 2) <= pow(d, 2); } ```    The `pointsWithinDistance` function
    makes use of the Pythagorean formula to determine whether the distance between
    the two points (in our case, the center of a control point and the location of
    the mouse) is less than the distance we pass in (the control point radius). Using
    this, we are able to check to see whether the user clicked on a control point,
    and if so, we set the corresponding flag (`draggingCp1` or `draggingCp2`) to `YES`.    The
    next method to implement is `mouseDragged:`, which is called every time the mouse
    is moved while the button is held down. Note that this method is not called in
    every view the mouse is dragged over. It’s always called in the view where the
    original mouse click occurred; in a sense, whichever view receives the click “owns”
    all subsequent dragging. In this method, we once again grab the mouse location
    from the event, transform it into our view’s own coordinate system, and then update
    the coordinates for the control point that’s currently being dragged. If none
    of them are currently being dragged, then nothing happens.    ``` - (void)mouseDragged:(NSEvent
    *)theEvent {   NSPoint mouseLocation = [theEvent locationInWindow];   NSPoint
    convertedLocation = [self convertPoint:mouseLocation     fromView:nil];   if (self.draggingCp1)
    {     self.cp1X = convertedLocation.x;     self.cp1Y = convertedLocation.y;   }
    else if (self.draggingCp2) {     self.cp2X = convertedLocation.x;     self.cp2Y
    = convertedLocation.y;   }   [self setNeedsDisplay:YES]; } ```    The final method
    we need for dealing with the mouse is `mouseUp:`, which lets us handle the release
    of the button. Like `mouseDragged:`, `mouseUp:` is always called on the view that
    originated the drag, which means that after the user clicks in our view, no matter
    where the user lets go of the mouse button, we will receive this message. All
    we do here is simply set the flags to indicate that nothing is being dragged.    ```
    - (void)mouseUp:(NSEvent *)theEvent {   self.draggingCp1 = NO;   self.draggingCp2
    = NO; } ```    With all that in place, *Run* the app. We should be able to drag
    the controls around, with the curve following every move, and the numbers in the
    text fields will change as we drag.    A Little Polish    That’s pretty cool,
    but as we’ve often noticed when toying around with a new GUI design, some enhancements
    become self-evident with a little use.


    For one thing, we’re always drawing the control points in the same order, so control
    point 2 is always on top, even if we’re dragging control point 1 right over it.
    This feels pretty unnatural. Fortunately, the fix for this is extremely simple,
    and this is the real, practical reason we split out the control point drawing
    into two separate methods. At the end of the `drawRect:` method, add the bold
    lines shown here:    ``` // draw the control points if (self.draggingCp1) {   [self
    drawControlPointAtX:self.cp2X y:self.cp2Y];   [self drawControlPointAtX:self.cp1X
    y:self.cp1Y]; } else {   [self drawControlPointAtX:self.cp1X y:self.cp1Y];   [self
    drawControlPointAtX:self.cp2X y:self.cp2Y]; } ```    That’s it! Click *Run*. Note
    that whenever we’re dragging the first control point, it appears in front of the
    second.    It would also be nice to highlight the control point that’s currently
    being dragged, maybe by drawing it with a different color. This is also a pretty
    easy change that gives the user some useful feedback. Start by defining some highlight
    colors for a new gradient, adding these lines among the other `#defines` at the
    top of the file:    ``` #define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]
    #define CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor] ```    Now, modify the
    `drawControlPointAtX:y:` methods, adding an additional parameter to specify whether
    or not do draw the highlighted variant, by adding the following bold lines:    ```
    - (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y dragging:(BOOL)dragging {
      NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:     NSMakeRect(x
    - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];   NSGradient *g;   if
    (dragging) {     g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1
                                endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];   } else
    {     g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1                             endingColor:CP_GRADIENT_COLOR2];
      }   [g drawInBezierPath:cp      relativeCenterPosition:NSMakePoint(0.0, 0.0)];
    } ```    Because we added a parameter to the control-point drawing method, we
    need to also change the way it’s called at the end of `drawRect:`, like this:    ```
    // draw the control points if (self.draggingCp1) {   [self drawControlPointAtX:self.cp2X
    y:self.cp2Y dragging:self.draggingCp2];   [self drawControlPointAtX:self.cp1X
    y:self.cp1Y dragging:self.draggingCp1]; } else {   [self drawControlPointAtX:self.cp1X
    y:cp1Y dragging:self.draggingCp1];   [self drawControlPointAtX:self.cp2X y:self.cp2Y
    dragging:self.draggingCp2]; } ```    Now click *Run*, and see that the otherwise
    gray control points now light up red while dragging, giving the user a nice visual
    cue. Also note that the control point that was most recently dragged stays red
    when we release. To fix this, add    ``` [self setNeedsDisplay:YES]; ```    to
    the end of the `mouseUp:` method.    Core Animation: A Primer    One of the most
    exciting technologies Apple includes with Mac OS X is a graphics system called
    Core Animation, which lets us easily create animated effects in our applications.
    We can make our views slide, fade, rotate, and scale smoothly and easily, often
    with just a few lines of code. In essence, Core Animation lets us specify a change
    in an object—such as changing its location to a different spot in the window—in
    such a way that, instead of the change happening instantaneously, it’s automatically
    split up into several small movements that are rendered over time by Core Animation.
    We can specify a transition’s length in seconds, as well as the timing or pacing
    of the change. We can also group animations together so that they all execute
    in perfect synchrony.    Core Animation Basics    From a technical standpoint,
    the basic unit at the heart of all this is a class called `CALayer` (a pre-release
    version of Core Animation was even called Layer Kit).'
  trans: "```objc\n- (void)mouseDown:(NSEvent *)theEvent {\n  // 获取当前鼠标位置，转换到我们的坐标空间\n\
    \  // (即我们的 bounds 所表示的空间)\n  NSPoint mouseLocation = [theEvent locationInWindow];\n\
    \  NSPoint convertedLocation = [self convertPoint:mouseLocation\n    fromView:nil];\n\
    \  // 检查点击是否落入了某个控制点\n  NSPoint cp1 = NSMakePoint(self.cp1X, self.cp1Y);\n  NSPoint\
    \ cp2 = NSMakePoint(self.cp2X, self.cp2Y);\n  if (pointsWithinDistance(self.cp1,\
    \ convertedLocation, CP_RADIUS)) {\n    self.draggingCp1 = YES;\n  } else if (pointsWithinDistance(cp2,\
    \ convertedLocation, CP_RADIUS)){\n    self.draggingCp2 = YES;\n  }\n  [self setNeedsDisplay:YES];\n\
    }\n```\n\n在`mouseDown:`方法中，我们首先向窗口请求当前鼠标位置，然后使用一个内置的`NSView`方法，将坐标从窗口的坐标系转换到我们自己的坐标系。这意味着，例如，我们单位方块右上角的一次点击，起初是距窗口左下角的水平和垂直像素数，最终将被转换为(1,1)或附近的值。然后我们执行两次测试，以查看是否点击了其中一个控制点。该测试使用以下函数完成，我们应将此函数添加到`CurveEdit.m`顶部，位于`#defines`组和`@implementation`部分之间：\n\
    \n```objc\nstatic BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d)\
    \ {\n  return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y), 2) <= pow(d, 2);\n}\n```\n\
    \n`pointsWithinDistance`函数利用勾股定理来确定两点之间的距离（在我们的场景中，是控制点的中心和鼠标位置的距离）是否小于我们传入的距离（控制点半径）。利用这一点，我们能够检查用户是否点击了某个控制点；如果是，我们将相应的标志（`draggingCp1`或`draggingCp2`）设置为`YES`。\n\
    \n接下来要实现的方法是`mouseDragged:`，它在按住鼠标按钮并移动时被调用。请注意，此方法并非在鼠标拖过的每个视图中都被调用；它始终在最初发生鼠标点击的视图中被调用。从某种意义上说，接收点击的视图“拥有”之后所有的拖动操作。在此方法中，我们再次从事件中获取鼠标位置，将其转换为我们视图自己的坐标系，然后更新当前正在拖动的控制点的坐标。如果当前没有控制点被拖动，则什么也不会发生。\n\
    \n```objc\n- (void)mouseDragged:(NSEvent *)theEvent {\n  NSPoint mouseLocation\
    \ = [theEvent locationInWindow];\n  NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
    \    fromView:nil];\n  if (self.draggingCp1) {\n    self.cp1X = convertedLocation.x;\n\
    \    self.cp1Y = convertedLocation.y;\n  } else if (self.draggingCp2) {\n    self.cp2X\
    \ = convertedLocation.x;\n    self.cp2Y = convertedLocation.y;\n  }\n  [self setNeedsDisplay:YES];\n\
    }\n```\n\n处理鼠标所需的最后一个方法是`mouseUp:`，它让我们处理按钮的释放。与`mouseDragged:`一样，`mouseUp:`始终在发起拖动的视图上被调用。这意味着当用户在我们的视图中点击后，无论用户在何处松开鼠标按钮，我们都会收到此消息。这里我们只需将标志设置为`NO`以指示没有东西正在被拖动。\n\
    \n```objc\n- (void)mouseUp:(NSEvent *)theEvent {\n  self.draggingCp1 = NO;\n \
    \ self.draggingCp2 = NO;\n}\n```\n\n完成所有这些后，*运行* 这个应用。我们应该能够拖动控制点，曲线会跟随每一次移动，文本框中的数字也会随拖动而改变。\n\
    \n## 一点优化\n\n这已经很不错了，但正如我们在尝试新 GUI 设计时经常注意到的，一些小的使用体验会提示我们进行增强。\n\n一方面，我们总是以相同的顺序绘制控制点，因此控制点\
    \ 2 始终位于最上方，即使我们将控制点 1 直接拖到它上面也是如此。这感觉很不自然。幸运的是，修复方法非常简单，这也是我们将控制点绘制拆分为两个独立方法的真正、实际的原因。在`drawRect:`方法的末尾，添加如下粗体显示的行：\n\
    \n```objc\n// 绘制控制点\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n} else {\n\
    \  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n}\n```\n\n就这样！点击 *运行*。注意，无论何时我们拖动第一个控制点，它都会显示在第二个控制点的前面。\n\n\
    另外，高亮显示当前正在被拖动的控制点也会是不错的功能，比如用不同的颜色绘制它。这也是一个非常简单的改动，能为用户提供一些有用的反馈。首先，为新的渐变定义一些高亮颜色，在文件顶部的其他`#defines`中添加这几行：\n\
    \n```objc\n#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]\n#define\
    \ CP_GRADIENT_HIGHLIGHT_COLOR2 [NSColor redColor]\n```\n\n现在，修改`drawControlPointAtX:y:`方法，添加一个额外的参数来指定是否绘制高亮变体，添加以下粗体显示的行：\n\
    \n```objc\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y dragging:(BOOL)dragging\
    \ {\n  NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n    NSMakeRect(x\
    \ - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];\n  NSGradient *g;\n\
    \  if (dragging) {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
    \                            endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n  } else\
    \ {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n  \
    \                          endingColor:CP_GRADIENT_COLOR2];\n  }\n  [g drawInBezierPath:cp\n\
    \     relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n```\n\n因为我们已经为控制点绘制方法添加了一个参数，所以还需要更改它在`drawRect:`末尾的调用方式，如下所示：\n\
    \n```objc\n// 绘制控制点\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y dragging:self.draggingCp2];\n  [self drawControlPointAtX:self.cp1X\
    \ y:self.cp1Y dragging:self.draggingCp1];\n} else {\n  [self drawControlPointAtX:self.cp1X\
    \ y:cp1Y dragging:self.draggingCp1];\n  [self drawControlPointAtX:self.cp2X y:self.cp2Y\
    \ dragging:self.draggingCp2];\n}\n```\n\n现在点击 *运行*，会看到原本灰色的控制点在拖动时会亮起红色，给用户一个很好的视觉提示。还要注意，当我们松开时，最近被拖动的控制点会保持红色。要修复这个问题，在`mouseUp:`方法的末尾添加：\n\
    \n```objc\n[self setNeedsDisplay:YES];\n```\n\n## Core Animation 入门\n\nApple 在\
    \ Mac OS X 中包含的最激动人心的技术之一是一个名为 Core Animation 的图形系统，它让我们能够轻松地在应用程序中创建动画效果。我们可以让视图平滑、轻松地滑动、淡入淡出、旋转和缩放，通常只需几行代码。实际上，Core\
    \ Animation 允许我们指定对象的一种变化——例如将其位置更改到窗口中的另一个点——这样，变化不会瞬间发生，而是被自动分割成几个由 Core Animation\
    \ 随时间渲染的小动作。我们可以指定过渡的时长（以秒为单位），以及变化的定时或节奏。我们还可以将动画分组，使它们完美同步执行。\n\n### Core Animation\
    \ 基础\n\n从技术角度来看，这一切的核心基本单元是一个名为`CALayer`的类（Core Animation 的预发布版本甚至被称为 Layer Kit）。"
- fmt: "每个`NSView`都可以选择性地附加一个`CALayer`，这可以通过在Interface Builder中切换开关或在代码中设置来实现。为视图分配图层的实际过程是通过所有视图的子视图启动递归过程，因此当一个视图有图层时，其所有子视图（以及它们的子视图，以此类推）也会获得图层。一旦图层就位，我们就可以开始为视图设置动画。在底层，每个`CALayer`都与一些用于渲染图形的OpenGL结构相关联。OpenGL在快速将矩形绘制到屏幕方面做得非常出色，即使是调整大小、旋转等操作，因此使用`CALayer`可以让我们的视图执行各种屏幕上的技巧，而不会降低应用程序的速度。Core\
    \ Animation API完全将我们从OpenGL中屏蔽，因此它将安静地工作，我们无需过多考虑。唯一需要记住的是，每个图层都会消耗计算机图形硬件中的部分内存，因此我们最好仅在实际需要执行动画的应用程序部分使用图层，而不是将它们应用于每个窗口中的每个视图。\n\
    \n## 隐式动画\n\n任何支持图层的视图都可以通过其**动画代理**（*animator proxy*）来设置动画。这是一个特殊的对象，它充当视图本身的替身，不是立即进行更改，而是根据发送给它方法设置相应的动画。例如，如果我们希望动画显示视图的移动，那么可以不这样设置其`frame`：\n\
    \n```objc\n[myView setFrame:newFrame];\n```\n\n而是这样设置：\n\n```objc\n[[myView animator]\
    \ setFrame:newFrame];\n```\n\n要查看实际效果，请创建一个新的Cocoa项目，将其命名为`MovingButton`，并使用`MB`作为类前缀。首先，我们将设置用户界面。在Interface\
    \ Builder画布中打开`MainMenu.xib`，打开MovingButton窗口，并在空窗口中放置一个名为Move的按钮。接下来，打开助手编辑器，并在其中打开`MBAppDelegate.h`文件。从按钮按住Control键拖动到`MBAppDelegate.h`文件，在窗口的`@property`声明正下方添加一个操作。将新操作命名为`move`。\n\
    \n现在，让我们填充`move:`操作的实现，如下所示：\n\n```objc\n- (IBAction)move:(id)sender {\n    NSRect\
    \ senderFrame = [sender frame];\n    NSRect superBounds = [[sender superview]\
    \ bounds];\n    senderFrame.origin.x = (superBounds.size.width -\n        senderFrame.size.width)\
    \ * drand48();\n    senderFrame.origin.y = (superBounds.size.height -\n      \
    \  senderFrame.size.height) * drand48();\n    [sender setFrame:senderFrame];\n\
    }\n```\n\n这个简单的操作方法只是为`sender`在其父视图中计算一个新的随机位置，并将其移动到那里。保存更改，*运行*项目，可以看到每次点击Move按钮时，它都会跳到窗口中的另一个位置。\n\
    \n现在，让我们为移动添加动画效果。我们只需要编辑一行，将：\n\n```objc\n[sender setFrame:senderFrame];\n```\n\
    \n改为：\n\n```objc\n[[sender animator] setFrame:senderFrame];\n```\n\n再次点击*运行*，点击Move按钮，看看会发生什么。现在，每次我们点击按钮时，它都会平滑地滑到新位置，而不是瞬间切换。由`animator`方法返回的对象是一个代理，它响应`NSView`的每个setter方法，并调度动画以逐步应用更改。在幕后，Core\
    \ Animation会按照setter调用中指定的目标值，一点一点地修改相关值，直到达到该目标值。\n\n每个线程都维护一个动画上下文，其形式为`NSAnimationContext`实例。除其他功能外，它还允许我们通过首先设置如下值来设置隐式动画所需的时间长度（以秒为单位）：\n\
    \n```objc\n[[NSAnimationContext currentContext] setDuration:1.0];\n```\n\n如果这就是我们对动画所需的全部控制，那么可以使用隐式动画走得很远。如果需要更精细的调整，例如能够确保多个动画以同步方式发生或在动画完成时触发某些活动，那么我们需要更强大的工具，例如……\n\
    \n## 显式动画\n\nCore Animation提供了一种在代码中显式设置动画的技术，而不是使用`NSView`的`animator`方法的“魔法”。我们显式创建的每个动画都由开始和结束动画代码部分的方法来界定，这使得一切更加清晰。结合显式动画所拥有的额外功能，很明显，除了最简单的动画之外，这是所有情况下的正确方法。\n\
    \n为了使用Core Animation，我们首先必须将`QuartzCore`框架添加到我们的Xcode项目中。在Xcode中，在项目导航器窗格中选择`MovingButton`项目本身：这是项目导航器中最顶部的项目。在*Targets*部分下选择`MovingButton`，如[图15-2](#9781430245421_Ch15.xhtml#Fig2)所示。在*Linked\
    \ Frameworks and Libraries*部分中，点击表格视图底部的+按钮以添加新框架。在列表中找到`QuartzCore.framework`（使用顶部的搜索字段），并将其添加。\n\
    \n![9781430245421_Fig15-02.jpg](images/9781430245421_Fig15-02.jpg)\n\n[图15-2](#9781430245421_Ch15.xhtml#_Fig2).\
    \ 向项目添加新框架\n\n然后，在`MBAppDelegate.m`的顶部添加以下行：\n\n```objc\n#import <QuartzCore/QuartzCore.h>\n\
    ```\n\n现在，我们准备好了在我们自己的代码中引用Core Animation类。让我们从修改前面的示例开始，使用显式动画而不是隐式动画。为此，我们必须创建一个名为`CABasicAnimation`的Core\
    \ Animation类实例，它可以动画显示任何可以动画化的`CALayer`属性之间的值。在我们的例子中，我们不是对`frame`进行动画处理，而是对图层的`position`属性进行动画处理。我们使用动画的`toValue`和`fromValue`属性显式设置位置的开始和结束位置。请注意，这些属性期望一个适当的对象，而不仅仅是像`NSPoint`这样的结构，因此我们必须将每个`NSPoint`值包装在一个`NSValue`实例中。创建动画后，我们将其与一个键一起添加到视图的图层中。这个键与我们正在动画化的属性无关，它仅用于以后可能需要标识此动画时提供帮助。最后，我们在视图对象本身上更改`frame`，因为动画仅影响视图图层的绘制。我们希望视图实际上也移动，因此我们必须手动设置其目标`frame`。以下是完成所有这些操作的代码：\n\
    \n```objc\n- (IBAction)move:(id)sender {\n    NSRect senderFrame = [sender frame];\n\
    \    NSRect superBounds = [[sender superview] bounds];\n    CABasicAnimation *a\
    \ = [CABasicAnimation\n                           animationWithKeyPath:@\"position\"\
    ];\n    a.fromValue = [NSValue valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x\
    \ = (superBounds.size.width -\n        senderFrame.size.width)*drand48();\n  \
    \  senderFrame.origin.y = (superBounds.size.height -\n        senderFrame.size.height)*drand48();\n\
    \    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    [[sender layer]\
    \ addAnimation:a forKey:@\"position\"];\n    [[sender animator] setFrame:senderFrame];\n\
    \    [sender setFrame:senderFrame];\n}\n```\n\n请注意，我们还从此方法中删除了`[[sender animator]\
    \ setFrame:senderFrame];`行，因为我们这次不希望触发隐式动画。在这一切生效之前，我们需要额外完成一步，而之前的隐式动画已经替我们完成了：为需要动画化的视图建立图层。"
  raw: 'Each `NSView` can optionally have a `CALayer` attached to it, either by flicking
    a switch in Interface Builder or setting it up in code. The process of assigning
    a layer to a view actually begins a recursive process through all the view’s subviews,
    so that when a view has a layer, all its subviews (and all their subviews, and
    so on) also acquire layers. Once a layer is in place, we can start animating the
    view.    Under the hood, each `CALayer` is associated with some OpenGL structures
    for rendering its graphics. OpenGL does a really great job of quickly drawing
    rectangles to the screen, even rectangles that are resized, rotated, and the like,
    so using `CALayer` lets us have views that do all sorts of on-screen tricks without
    slowing our application down. The Core Animation APIs shield us completely from
    OpenGL itself, so it will work away quietly without us having to think about it
    too much. The only thing to bear in mind is that each layer uses some amount of
    the memory available to the computer’s graphics hardware, so we’re better off
    using layers only for those parts of our application where we actually want to
    do some animation, instead of applying them to every view in every window.    Implicit
    Animations    Any layer-backed view can be animated by using its *animator proxy*.
    This is a special object that acts as a substitute for the view itself, setting
    up an animation corresponding to the method it’s sent instead of making an immediate
    change. For instance, if we want to animate the movement of a view, then instead
    of setting its frame like    ``` [myView setFrame:newFrame]; ```    we can set
    it like this:    ``` [[myView animator] setFrame:newFrame]; ```    To see this
    in action, create a new Cocoa project, name it *MovingButton*, and use MB as the
    class prefix. First we’ll set up the user interface. Open `MainMenu.xib` in an
    Interface Builder canvas, open up the MovingButton window, and put a button called
    Move in the empty window. Next, open up an Assistant Editor, and open up the `MBAppDelegate.h`
    file in the it. Control-drag from the button to the `MBAppDelegate.h` file, adding
    an action right below the `@property` declaration for the window. Call the new
    action `move`.    Now, let’s fill in the implementation of the `move:` action,
    as shown here:    ``` - (IBAction)move:(id)sender {   NSRect senderFrame = [sender
    frame];   NSRect superBounds = [[sender superview] bounds];   senderFrame.origin.x
    = (superBounds.size.width -     senderFrame.size.width) * drand48();   senderFrame.origin.y
    = (superBounds.size.height -     senderFrame.size.height) * drand48();   [sender
    setFrame:senderFrame]; } ```    This simple action method just calculates a new
    random location for sender within its superview and moves it there. Save the changes,
    *Run* the project, and see that each time we click the Move button, it hops to
    another location in the window.    Now, let’s animate the movement. We just need
    to edit a single line, changing    ``` [sender setFrame:senderFrame]; ```    to    ```
    [[sender animator] setFrame:senderFrame]; ```    Click *Run* again, click the
    Move button, and see what happens. Now, each time we click the button, it slides
    smoothly into the new location instead of just switching instantaneously. The
    object returned by the animator method is a proxy that responds to each of `NSView`’s
    setter methods and schedules animations to apply the change gradually. Behind
    the scenes, Core Animation does all the work of modifying the relevant value bit
    by bit until it reaches the target value specified in the call to the setter.    Each
    thread maintains an animation context in the form of an instance of `NSAnimationContext`,
    which among other things lets us set the length of time (in seconds) that an implicit
    animation will take by first setting a value like this:    ``` [[NSAnimationContext
    currentContext] setDuration:1.


    0]; ```    If that’s all the control we need over our animations, then we can
    get pretty far using implicit animations. If we need more fine-tuning, such as
    being able to ensure that several animations occur in a synchronized manner or
    trigger some activity when an animation completes, then we’ll need something more,
    such as…    Explicit Animations    Core Animation provides a technique for setting
    up animations explicitly in our code, instead of using the “magic” of `NSView`’s
    animator method. Each animation we create explicitly is framed by methods that
    start and stop a section of animation code, making everything a little clearer.
    Combined with the added capabilities that explicit animations have, it’s clear
    that this is the right approach for all but the simplest of animations.    In
    order to use Core Animation, we first have to add the `QuartzCore` framework to
    our Xcode project. In Xcode, select the MovingButton project itself in the Project
    Navigator pane: this is the very top item in the Project Navigator. Select MovingButton
    under the *Targets* section, as shown in [Figure 15-2](#9781430245421_Ch15.xhtml#Fig2).
    In the *Linked Frameworks and Libraries* section, hit the + button at the bottom
    of the table view to add a new framework. Find `QuartzCore.framework` in the list
    (use the search field at the top), and add it.    ![9781430245421_Fig15-02.jpg](images/9781430245421_Fig15-02.jpg)    [Figure
    15-2](#9781430245421_Ch15.xhtml#_Fig2). Adding a new framework to the project    Then,
    at the top of `MBAppDelegate.m`, add the following line:    ``` #import <QuartzCore/QuartzCore.h>
    ```    Now we’re ready to refer to Core Animation classes in our own code. Let’s
    start by modifying the previous example to use explicit animation instead of implicit.
    To do this, we have to create an instance of a Core Animation class called `CABasicAnimation`,
    which is capable of animating between values for any `CALayer` property that can
    be animated. In our case, rather than animating the frame, we’ll animate the layer’s
    position property. We explicitly set start and end locations for the position
    using the animation’s `toValue` and `fromValue` properties. Note that these properties
    expect a proper object, not just a struct like `NSPoint`, so we have to wrap each
    `NSPoint` value inside an `NSValue` instance. After creating the animation, we
    add it to the view’s layer, along with a key. This key doesn’t have anything to
    do with the property we’re animating, it’s only there to help us in case we later
    want to identify this animation. Finally, we change the frame on the view object
    itself since the animation only affects the drawing of the view’s layer. We want
    the view to actually move as well, so we have to set its target frame manually.
    Here’s the code to do all of this:    ``` - (IBAction)move:(id)sender {   NSRect
    senderFrame = [sender frame];   NSRect superBounds = [[sender superview] bounds];
      CABasicAnimation *a = [CABasicAnimation                          animationWithKeyPath:@"position"];
      a.fromValue = [NSValue valueWithPoint:senderFrame.origin];   senderFrame.origin.x
    = (superBounds.size.width -     senderFrame.size.width)*drand48();   senderFrame.origin.y
    = (superBounds.size.height -     senderFrame.size.height)*drand48();   a.toValue
    = [NSValue valueWithPoint:senderFrame.origin];   [[sender layer] addAnimation:a
    forKey:@"position"];   [[sender animator] setFrame:senderFrame];   [sender setFrame:senderFrame];
    } ```    Note that we also removed the `[[sender animator] setFrame:senderFrame];`
    line from this method because we don’t want to trigger an implicit animation this
    time. Before this will work, we need to do one more step that the implicit animations
    took care of for us: establish layers for the views that need to be animated.'
  trans: "```markdown\n每个`NSView`都可以选择性地附加一个`CALayer`，这可以通过在 Interface Builder 中切换开关或在代码中设置来实现。为视图分配图层的实际过程是通过所有视图的子视图启动递归过程，因此当一个视图有图层时，其所有子视图（以及它们的子视图，以此类推）也会获得图层。一旦图层就位，我们就可以开始为视图设置动画。在底层，每个`CALayer`都与一些用于渲染图形的\
    \ OpenGL 结构相关联。OpenGL 在快速将矩形绘制到屏幕方面做得非常出色，即使是调整大小、旋转等操作，因此使用`CALayer`可以让我们的视图执行各种屏幕上的技巧，而不会降低应用程序的速度。Core\
    \ Animation API 完全将我们从 OpenGL 中屏蔽，因此它将安静地工作，我们无需过多考虑。唯一需要记住的是，每个图层都会消耗计算机图形硬件中的部分内存，因此我们最好仅在实际需要执行动画的应用程序部分使用图层，而不是将它们应用于每个窗口中的每个视图。\n\
    \n## 隐式动画\n\n任何支持图层的视图都可以通过其**动画代理**（*animator proxy*）来设置动画。这是一个特殊的对象，它充当视图本身的替身，不是立即进行更改，而是根据发送给它方法设置相应的动画。例如，如果我们希望动画显示视图的移动，那么可以不这样设置其`frame`：\n\
    \n```objc\n[myView setFrame:newFrame];\n```\n\n而是这样设置：\n\n```objc\n[[myView animator]\
    \ setFrame:newFrame];\n```\n\n要查看实际效果，请创建一个新的 Cocoa 项目，将其命名为`MovingButton`，并使用`MB`作为类前缀。首先，我们将设置用户界面。在\
    \ Interface Builder 画布中打开`MainMenu.xib`，打开 MovingButton 窗口，并在空窗口中放置一个名为 Move 的按钮。接下来，打开助手编辑器，并在其中打开`MBAppDelegate.h`文件。从按钮按住\
    \ Control 键拖动到`MBAppDelegate.h`文件，在窗口的`@property`声明正下方添加一个操作。将新操作命名为`move`。\n\n\
    现在，让我们填充`move:`操作的实现，如下所示：\n\n```objc\n- (IBAction)move:(id)sender {\n    NSRect\
    \ senderFrame = [sender frame];\n    NSRect superBounds = [[sender superview]\
    \ bounds];\n    senderFrame.origin.x = (superBounds.size.width -\n        senderFrame.size.width)\
    \ * drand48();\n    senderFrame.origin.y = (superBounds.size.height -\n      \
    \  senderFrame.size.height) * drand48();\n    [sender setFrame:senderFrame];\n\
    }\n```\n\n这个简单的操作方法只是为`sender`在其父视图中计算一个新的随机位置，并将其移动到那里。保存更改，*运行*项目，可以看到每次点击 Move\
    \ 按钮时，它都会跳到窗口中的另一个位置。\n\n现在，让我们为移动添加动画效果。我们只需要编辑一行，将：\n\n```objc\n[sender setFrame:senderFrame];\n\
    ```\n\n改为：\n\n```objc\n[[sender animator] setFrame:senderFrame];\n```\n\n再次点击*运行*，点击\
    \ Move 按钮，看看会发生什么。现在，每次我们点击按钮时，它都会平滑地滑到新位置，而不是瞬间切换。由`animator`方法返回的对象是一个代理，它响应`NSView`的每个\
    \ setter 方法，并调度动画以逐步应用更改。在幕后，Core Animation 会按照 setter 调用中指定的目标值，一点一点地修改相关值，直到达到该目标值。\n\
    \n每个线程都维护一个动画上下文，其形式为`NSAnimationContext`实例。除其他功能外，它还允许我们通过首先设置如下值来设置隐式动画所需的时间长度（以秒为单位）：\n\
    \n```objc\n[[NSAnimationContext currentContext] setDuration:1.0];\n```\n\n如果这就是我们对动画所需的全部控制，那么可以使用隐式动画走得很远。如果需要更精细的调整，例如能够确保多个动画以同步方式发生或在动画完成时触发某些活动，那么我们需要更强大的工具，例如……\n\
    \n## 显式动画\n\nCore Animation 提供了一种在代码中显式设置动画的技术，而不是使用`NSView`的`animator`方法的“魔法”。我们显式创建的每个动画都由开始和结束动画代码部分的方法来界定，这使得一切更加清晰。结合显式动画所拥有的额外功能，很明显，除了最简单的动画之外，这是所有情况下的正确方法。\n\
    \n为了使用 Core Animation，我们首先必须将`QuartzCore`框架添加到我们的 Xcode 项目中。在 Xcode 中，在项目导航器窗格中选择`MovingButton`项目本身：这是项目导航器中最顶部的项目。在*Targets*部分下选择`MovingButton`，如图\
    \ 15-2 所示。在*Linked Frameworks and Libraries*部分中，点击表格视图底部的+按钮以添加新框架。在列表中找到`QuartzCore.framework`（使用顶部的搜索字段），并将其添加。\n\
    \n![9781430245421_Fig15-02.jpg](img/9781430245421_Fig15-02.jpg)\n\n图 15-2. 向项目添加新框架\n\
    \n然后，在`MBAppDelegate.m`的顶部添加以下行：\n\n```objc\n#import <QuartzCore/QuartzCore.h>\n\
    ```\n\n现在，我们准备好了在我们自己的代码中引用 Core Animation 类。让我们从修改前面的示例开始，使用显式动画而不是隐式动画。为此，我们必须创建一个名为`CABasicAnimation`的\
    \ Core Animation 类实例，它可以动画显示任何可以动画化的`CALayer`属性之间的值。在我们的例子中，我们不是对`frame`进行动画处理，而是对图层的`position`属性进行动画处理。我们使用动画的`toValue`和`fromValue`属性显式设置位置的开始和结束位置。请注意，这些属性期望一个适当的对象，而不仅仅是像`NSPoint`这样的结构，因此我们必须将每个`NSPoint`值包装在一个`NSValue`实例中。创建动画后，我们将其与一个键一起添加到视图的图层中。这个键与我们正在动画化的属性无关，它仅用于以后可能需要标识此动画时提供帮助。最后，我们在视图对象本身上更改`frame`，因为动画仅影响视图图层的绘制。我们希望视图实际上也移动，因此我们必须手动设置其目标`frame`。以下是完成所有这些操作的代码：\n\
    \n```objc\n- (IBAction)move:(id)sender {\n    NSRect senderFrame = [sender frame];\n\
    \    NSRect superBounds = [[sender superview] bounds];\n    CABasicAnimation *a\
    \ = [CABasicAnimation\n                           animationWithKeyPath:@\"position\"\
    ];\n    a.fromValue = [NSValue valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x\
    \ = (superBounds.size.width -\n        senderFrame.size.width)*drand48();\n  \
    \  senderFrame.origin.y = (superBounds.size.height -\n        senderFrame.size.height)*drand48();\n\
    \    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    [[sender layer]\
    \ addAnimation:a forKey:@\"position\"];\n    [[sender animator] setFrame:senderFrame];\n\
    \    [sender setFrame:senderFrame];\n}\n```\n\n请注意，我们还从此方法中删除了`[[sender animator]\
    \ setFrame:senderFrame];`行，因为我们这次不希望触发隐式动画。在这一切生效之前，我们需要额外完成一步，而之前的隐式动画已经替我们完成了：为需要动画化的视图建立图层。\n\
    ```"
- fmt: "使用动画代理器自动实现了这一点，但现在我们必须为任何将要进行动画的视图（包括任何将要移动的视图的父视图）手动开启该功能。在我们的例子中，这意味着按钮的父视图（窗口的内容视图）需要被赋予一个图层，而该图层又会为其子视图层级（即按钮本身）建立图层。最简单的方法是回到`MainMenu.xib`，在窗口中选择按钮，然后打开*视图效果检查器*（![image](images/arrow2.jpg)8）。该检查器顶部有一个名为*核心动画图层*的章节，其中显示了一个视图对象列表（参见[图\
    \ 15-3](#9781430245421_Ch15.xhtml#Fig3)）。\n\n![9781430245421_Fig15-03.jpg](images/9781430245421_Fig15-03.jpg)\n\
    [图 15-3](#9781430245421_Ch15.xhtml#_Fig3). 建立动画图层\n\n选中的对象（按钮）位于列表底部，而其所有父视图（本例中只有一个视图，即窗口的内容视图）则堆叠在其上方。点击复选框为该视图开启图层。我们可以让按钮的复选框保持未选中状态，因为其父视图会为它建立图层。\n\
    \n现在保存所有内容，运行应用程序，我们将看到与之前完全相同的行为。因此，这个新版本以增加几行代码为代价实现了相同的结果。目前看来这似乎算不上什么优势。但别急，还有更多功能！通过动画类（如`CABasicAnimation`）进行的显式动画，让我们能够完成几项隐式动画无法实现的关键操作。\n\
    \n首先，我们可以设置动画的持续时间。在将动画添加到图层（使用`[[sender layer] addAnimation:a forKey:@\"position\"\
    ]`）之前，添加以下代码行，以使此动画运行得稍慢一些：\n\n```\na.duration = 1.0;\n```\n\n在代码就位的情况下*运行*，我们会看到按钮的过渡速度变慢了。我们还可以更改动画的节奏，使其不再严格按线性方式从一个点移动到下一个点。让我们将其设置为“缓入、缓出”运动，如下所示：\n\
    \n```\na.timingFunction = [CAMediaTimingFunction functionWithName:\n         \
    \           kCAMediaTimingFunctionEaseInEaseOut];\n```\n\n*现在运行*，我们会看到，当我们点击按钮时，它开始缓慢移动，然后逐渐加速并移动得更快，最终在接近目标时减速。在底层，这些时序函数通过提供一个从0.0到1.0的值的简单映射来工作，使用一对控制点来描述两者之间的曲线。这听起来是不是很熟悉？这似乎正是我们在本章前半部分实现的曲线编辑控件的完美用途！我们可以使用曲线编辑器来定义每次点击按钮时将应用于按钮移动的时序。\n\
    \n首先，从之前的项目中添加`CECurveView`类文件。在*MovingButton*项目中，右键单击`MovingButton`文件夹，然后从上下文菜单中选择“将文件添加到“MovingButton””。导航到`CECurveView.h`和`CECurveView.m`的位置，选中它们，然后点击*添加*按钮。在出现的表单中，点击以打开“将项目复制到目标组的文件夹中”复选框，并确保在表单下部选中了*MovingButton*目标（参见[图\
    \ 15-4](#9781430245421_Ch15.xhtml#Fig4)）。\n\n![9781430245421_Fig15-04.jpg](images/9781430245421_Fig15-04.jpg)\n\
    [图 15-4](#9781430245421_Ch15.xhtml#_Fig4). 将现有文件添加到项目\n\n这次，我们不为该控件设置绑定，而是在控制器定义中添加一个出口，以便能够访问我们将要设置的`CECurveView`。修改`MBAppDelegate.h`，在此添加粗体行：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n@class CECurveView;\n\n@interface MBAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet CECurveView *curveView;\n- (IBAction)move:(id)sender;\n\
    @end\n```\n\n现在在 Interface Builder 画布中重新打开`MainMenu.xib`。我们将添加一个小的`NSPanel`，作为按钮动画的检查器。从*对象库*中拖出一个`NSPanel`，然后向新面板中拖入一个自定义视图。将自定义视图的大小调整为100×100，并将其类更改为`CECurveView`。Interface\
    \ Builder 中的 GUI 现在应该类似于[图 15-5](#9781430245421_Ch15.xhtml#Fig5)所示。\n\n![9781430245421_Fig15-05.jpg](images/9781430245421_Fig15-05.jpg)\n\
    [图 15-5](#9781430245421_Ch15.xhtml#Fig5). 添加一个`CECurveView`以配置我们的动画\n\n现在，将应用程序委托的`curveView`出口连接到我们刚刚创建的`CECurveView`实例，然后切换回`MBAppDelegate.m`文件。在应用程序委托实现文件的顶部某处导入`CECurveView`头文件，添加以下代码行：\n\
    \n```\n#import \"CECurveView.h\"\n```\n\n按如下方式更新`move:`方法：\n\n```\n- (IBAction)move:(id)sender\
    \ {\n    NSRect senderFrame = [sender frame];\n    NSRect superBounds = [[sender\
    \ superview] bounds];\n    CABasicAnimation *a = [CABasicAnimation\n         \
    \                 animationWithKeyPath:@\"position\"];\n    a.fromValue = [NSValue\
    \ valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x = (superBounds.size.width\
    \ -\n                            senderFrame.size.width)*drand48();\n    senderFrame.origin.y\
    \ = (superBounds.size.height -\n                            senderFrame.size.height)*drand48();\n\
    \n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    a.duration\
    \ = 1.0;\n    a.timingFunction = [CAMediaTimingFunction\n                    \
    \    functionWithControlPoints:self.curveView.cp1X\n                        :self.curveView.cp1Y\n\
    \                        :self.curveView.cp2X\n                        :self.curveView.cp2Y];\n\
    \n    // add it to the layer\n    [[sender layer] addAnimation:a forKey:@\"position\"\
    ];\n    [sender setFrame:senderFrame];\n}\n```\n\n现在，每次用户点击*Move*按钮时，生成的动画的时序函数将由`CECurveView`控件中的值决定。保存文件，运行应用程序，我们应该会看到这种情况发生。拖动控制柄以创建不同的曲线形状，点击*Move*按钮，看看它如何移动。\n\
    \n## 动画分组\n\n我们现在已经初步了解了 Core Animation 的工作原理，但这是在一个让按钮在屏幕上随机移动的略显滑稽的背景下。这可不是我们推荐的\
    \ GUI 设计！在现实世界中，Core Animation 最常用于在不同视图之间制作过渡动画。你可能已经在 iPhone（Core Animation\
    \ 最初为之构建的平台，之后才被“反向移植”到 Mac OS X）上反复看到过这种用法。iPhone 界面中所有平滑的滑动、缩放和淡入淡出效果都是通过 Core\
    \ Animation 实现的。在 Mac OS X 中，Core Animation 虽然不那么无处不在，但在诸如日历的周过渡以及 Mission Control\
    \ 中的屏幕过渡等地方得到了很好的应用。在本节中，我们将通过将动画组合在一起以使其同时运行，来了解如何实现一些不错的过渡效果。\n\n在 Xcode 中，创建一个名为*FlipIt*的新\
    \ Cocoa 项目，类前缀为`FI`。我们要做的是呈现一个 GUI，用户可以在其中切换多个“页面”，而 Core Animation 将在它们之间进行流畅的动画。我们将在\
    \ nib 文件的空窗口中使用一个框来显示内容页面，这些页面本身将保存在一个`NSTabView`中。我们不会显示选项卡视图本身，只是将其用作内容页面的便捷容器。\n\
    \n我们首先在`MainMenu.xib`中布局视图，因此在 Interface Builder 画布中打开该文件。"
  raw: 'Using the animator proxy made this happen automatically, but now we have to
    turn it on ourselves for any views that are going to be animated, including the
    superview of any view that’s going to be moving. In our case, this means that
    the button’s superview (the window’s content view) needs to be given a layer,
    and it in turn will establish layers for its subview hierarchy, which is just
    the button itself. The easiest way to do this is to go back to `MainMenu.xib`,
    select the button in our window, and open the *View Effects Inspector* (![image](images/arrow2.jpg)8).
    At the top of this Inspector is a section titled *Core Animation Layer*, which
    shows a list of view objects (see [Figure 15-3](#9781430245421_Ch15.xhtml#Fig3)).    ![9781430245421_Fig15-03.jpg](images/9781430245421_Fig15-03.jpg)    [Figure
    15-3](#9781430245421_Ch15.xhtml#_Fig3). Establishing animation layers    The selected
    object (the button) is at the bottom, and all its superviews (in this case just
    one view, the window’s content view) are stacked up above it. Click the checkbox
    to turn on a layer for the view. We can leave the checkbox for the button unchecked,
    since the superview will establish a layer for it.    Now save everything, run
    the app, and we’ll see the exact same behavior as we had before. So, this new
    version achieves the same result at the expense of a few additional lines of code.
    So far it doesn’t seem like much of a win. But wait, there’s more! Explicit animation
    via the animation classes, such as `CABasicAnimation`, lets us do several more
    key things that we couldn’t do with implicit animation.    For starters, we can
    set the animation’s duration. Add the following line just before adding the animation
    to the layer (with `[[sender layer] addAnimation:a forKey:@"position"]`) to make
    this animation run a little more slowly:    ``` a.duration = 1.0; ```    *Run*
    with that in place, and we’ll see that the button transitions more slowly. We
    can also change the pacing of the animation so that it doesn’t go from one point
    to the next in a strictly linear fashion. Let’s set it to an “ease-in, ease-out”
    motion like this:    ``` a.timingFunction = [CAMediaTimingFunction functionWithName:
                          kCAMediaTimingFunctionEaseInEaseOut]; ```    *Run* now,
    and we’ll see that when we click the button, it starts moving slowly, then gradually
    builds up steam and moves more quickly, only to taper off its speed as it reaches
    its target. Under the hood, these timing functions work by providing a simple
    mapping for a value shifting from 0.0 to 1.0, using a pair of control points to
    describe a curve between the two. Does that ring a bell? This seems like the perfect
    use for the curve editing control we implemented in the first half of this chapter!
    We can use the curve editor to define the timing that will be applied to the button’s
    movement each time we click it.    Start by adding the `CECurveView` class files
    from the previous project. In the *MovingButton* project, right-click the MovingButton
    folder, then select Add Files to “MovingButton” from the context menu. Navigate
    to the location of `CECurveView.h` and `CECurveView.m`, select them both, and
    click the *Add* button. In the sheet that appears, click to turn on the *Copy
    items into destination group’s folder* checkbox, and make sure the *MovingButton*
    target is checked in the lower part of the sheet (see [Figure 15-4](#9781430245421_Ch15.xhtml#Fig4)).    ![9781430245421_Fig15-04.jpg](images/9781430245421_Fig15-04.jpg)    [Figure
    15-4](#9781430245421_Ch15.xhtml#_Fig4). Adding existing files to a project    This
    time, rather than setting up bindings to this control, let’s just add an outlet
    in our controller definition so that we can access the `CECurveView` we’re going
    to set up. Modify `MBAppDelegate.h`, adding the bold lines here:    ``` #import
    <Cocoa/Cocoa.


    h> @class CECurveView;  @interface MBAppDelegate : NSObject <NSApplicationDelegate>
    @property (assign) IBOutlet NSWindow *window; @property (weak) IBOutlet CECurveView
    *curveView; - (IBAction)move:(id)sender; @end ```    Now reopen `MainMenu.xib`
    in an Interface Builder canvas. We’re going to add a small `NSPanel` that will
    work as a sort of inspector for our button animation. From the *Object Library*,
    drag out an NSPanel, then drag a Custom View into the new panel. Resize the Custom
    View to 100×100, and change its class to `CECurveView`. The GUI in Interface Builder
    should now look something like [Figure 15-5](#9781430245421_Ch15.xhtml#Fig5).    ![9781430245421_Fig15-05.jpg](images/9781430245421_Fig15-05.jpg)    [Figure
    15-5](#9781430245421_Ch15.xhtml#_Fig5). Adding a CECurveView for configuring our
    animation    Now connect the app delegate’s `curveView` outlet to the `CECurveView`
    instance we just created and then switch back to the `MBAppDelegate.m` file. Import
    the `CECurveView` header somewhere at the top of the app delegate’s implementation
    file by adding the following line:    ``` #import "CECurveView.h" ```    Update
    the `move:` method as follows:    ``` - (IBAction)move:(id)sender {     NSRect
    senderFrame = [sender frame];     NSRect superBounds = [[sender superview] bounds];
        CABasicAnimation *a = [CABasicAnimation                            animationWithKeyPath:@"position"];
        a.fromValue = [NSValue valueWithPoint:senderFrame.origin];     senderFrame.origin.x
    = (superBounds.size.width -                             senderFrame.size.width)*drand48();
        senderFrame.origin.y = (superBounds.size.height -                             senderFrame.size.height)*drand48();
               a.toValue = [NSValue valueWithPoint:senderFrame.origin];     a.duration
    = 1.0;     a.timingFunction = [CAMediaTimingFunction                         functionWithControlPoints:self.curveView.cp1X
                            :self.curveView.cp1Y                         :self.curveView.cp2X
                            :self.curveView.cp2Y];            // add it to the layer
        [[sender layer] addAnimation:a forKey:@"position"];     [sender setFrame:senderFrame];
    } ```    Now, every time the user clicks the *Move* button, the resulting animation’s
    timing function will be determined by the values in the `CECurveView` control.
    Save the files, run the app, and we should see this happening. Drag the handles
    around to create different curve shapes, click the *Move* button, and see how
    it moves.    Grouping Animations    We’ve now gotten a taste of how Core Animation
    works, but in the somewhat silly context of randomly moving a button around the
    screen. Not really a GUI design that we’d recommend! In the real world, Core Animation
    is most often used to animate transitions between different views. Chances are
    you’ve seen this used again and again on the iPhone (the platform that Core Animation
    was really built for, before being “backported” to Mac OS X). All the smooth slides,
    scales, and fades that occur throughout the iPhone interface are implemented with
    Core Animation. In Mac OS X, Core Animation isn’t quite so omnipresent, but it’s
    put to good use in places like Calendar’s week transitions and the transitions
    between screens in Mission Control. In this section, we’ll see how to implement
    some nice transitions by grouping animations together so that they run simultaneously.    In
    Xcode, create a new Cocoa project called *FlipIt*, with FI as the class prefix.
    What we’re going to do is present a GUI where the user can flip between several
    “pages,” and Core Animation will animate nicely between them. We’ll use a box
    in the nib’s empty window to show the content pages, which themselves will be
    held in an `NSTabView`. We won’t display the tab view itself, we’re just using
    it as a handy container for our content pages.    We’ll start by laying out the
    views in `MainMenu.xib`, so open that file up in an Interface Builder canvas.'
  trans: "\n使用动画代理器自动实现了这一点，但现在我们必须为任何将要进行动画的视图（包括任何将要移动的视图的父视图）手动开启该功能。在我们的例子中，这意味着按钮的父视图（窗口的内容视图）需要被赋予一个图层，而该图层又会为其子视图层级（即按钮本身）建立图层。最简单的方法是回到`MainMenu.xib`，在窗口中选择按钮，然后打开*视图效果检查器*（![image](img/arrow2.jpg)8）。该检查器顶部有一个名为*核心动画图层*的章节，其中显示了一个视图对象列表（参见图\
    \ 15-3）。\n\n![9781430245421_Fig15-03.jpg](img/9781430245421_Fig15-03.jpg)\n图 15-3.\
    \ 建立动画图层\n\n选中的对象（按钮）位于列表底部，而其所有父视图（本例中只有一个视图，即窗口的内容视图）则堆叠在其上方。点击复选框为该视图开启图层。我们可以让按钮的复选框保持未选中状态，因为其父视图会为它建立图层。\n\
    \n现在保存所有内容，运行应用程序，我们将看到与之前完全相同的行为。因此，这个新版本以增加几行代码为代价实现了相同的结果。目前看来这似乎算不上什么优势。但别急，还有更多功能！通过动画类（如`CABasicAnimation`）进行的显式动画，让我们能够完成几项隐式动画无法实现的关键操作。\n\
    \n首先，我们可以设置动画的持续时间。在将动画添加到图层（使用`[[sender layer] addAnimation:a forKey:@\"position\"\
    ]`）之前，添加以下代码行，以使此动画运行得稍慢一些：\n\n```\na.duration = 1.0;\n```\n\n在代码就位的情况下*运行*，我们会看到按钮的过渡速度变慢了。我们还可以更改动画的节奏，使其不再严格按线性方式从一个点移动到下一个点。让我们将其设置为“缓入、缓出”运动，如下所示：\n\
    \n```\na.timingFunction = [CAMediaTimingFunction functionWithName:\n         \
    \           kCAMediaTimingFunctionEaseInEaseOut];\n```\n\n*现在运行*，我们会看到，当我们点击按钮时，它开始缓慢移动，然后逐渐加速并移动得更快，最终在接近目标时减速。在底层，这些时序函数通过提供一个从\
    \ 0.0 到 1.0 的值的简单映射来工作，使用一对控制点来描述两者之间的曲线。这听起来是不是很熟悉？这似乎正是我们在本章前半部分实现的曲线编辑控件的完美用途！我们可以使用曲线编辑器来定义每次点击按钮时将应用于按钮移动的时序。\n\
    \n首先，从之前的项目中添加`CECurveView`类文件。在*MovingButton*项目中，右键单击`MovingButton`文件夹，然后从上下文菜单中选择“将文件添加到“MovingButton””。导航到`CECurveView.h`和`CECurveView.m`的位置，选中它们，然后点击*添加*按钮。在出现的表单中，点击以打开“将项目复制到目标组的文件夹中”复选框，并确保在表单下部选中了*MovingButton*目标（参见图\
    \ 15-4）。\n\n![9781430245421_Fig15-04.jpg](img/9781430245421_Fig15-04.jpg)\n图 15-4.\
    \ 将现有文件添加到项目\n\n这次，我们不为该控件设置绑定，而是在控制器定义中添加一个出口，以便能够访问我们将要设置的`CECurveView`。修改`MBAppDelegate.h`，在此添加粗体行：\n\
    \n```\n#import <Cocoa/Cocoa.h>\n@class CECurveView;\n\n@interface MBAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet CECurveView *curveView;\n- (IBAction)move:(id)sender;\n\
    @end\n```\n\n现在在 Interface Builder 画布中重新打开`MainMenu.xib`。我们将添加一个小的`NSPanel`，作为按钮动画的检查器。从*对象库*中拖出一个`NSPanel`，然后向新面板中拖入一个自定义视图。将自定义视图的大小调整为\
    \ 100×100，并将其类更改为`CECurveView`。Interface Builder 中的 GUI 现在应该类似于图 15-5 所示。\n\n\
    ![9781430245421_Fig15-05.jpg](img/9781430245421_Fig15-05.jpg)\n图 15-5. 添加一个`CECurveView`以配置我们的动画\n\
    \n现在，将应用程序委托的`curveView`出口连接到我们刚刚创建的`CECurveView`实例，然后切换回`MBAppDelegate.m`文件。在应用程序委托实现文件的顶部某处导入`CECurveView`头文件，添加以下代码行：\n\
    \n```\n#import \"CECurveView.h\"\n```\n\n按如下方式更新`move:`方法：\n\n```\n- (IBAction)move:(id)sender\
    \ {\n    NSRect senderFrame = [sender frame];\n    NSRect superBounds = [[sender\
    \ superview] bounds];\n    CABasicAnimation *a = [CABasicAnimation\n         \
    \                 animationWithKeyPath:@\"position\"];\n    a.fromValue = [NSValue\
    \ valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x = (superBounds.size.width\
    \ -\n                            senderFrame.size.width)*drand48();\n    senderFrame.origin.y\
    \ = (superBounds.size.height -\n                            senderFrame.size.height)*drand48();\n\
    \n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    a.duration\
    \ = 1.0;\n    a.timingFunction = [CAMediaTimingFunction\n                    \
    \    functionWithControlPoints:self.curveView.cp1X\n                        :self.curveView.cp1Y\n\
    \                        :self.curveView.cp2X\n                        :self.curveView.cp2Y];\n\
    \n    // add it to the layer\n    [[sender layer] addAnimation:a forKey:@\"position\"\
    ];\n    [sender setFrame:senderFrame];\n}\n```\n\n现在，每次用户点击*Move*按钮时，生成的动画的时序函数将由`CECurveView`控件中的值决定。保存文件，运行应用程序，我们应该会看到这种情况发生。拖动控制柄以创建不同的曲线形状，点击*Move*按钮，看看它如何移动。\n\
    \n## 动画分组\n\n我们现在已经初步了解了 Core Animation 的工作原理，但这是在一个让按钮在屏幕上随机移动的略显滑稽的背景下。这可不是我们推荐的\
    \ GUI 设计！在现实世界中，Core Animation 最常用于在不同视图之间制作过渡动画。你可能已经在 iPhone（Core Animation\
    \ 最初为之构建的平台，之后才被“反向移植”到 Mac OS X）上反复看到过这种用法。iPhone 界面中所有平滑的滑动、缩放和淡入淡出效果都是通过 Core\
    \ Animation 实现的。在 Mac OS X 中，Core Animation 虽然不那么无处不在，但在诸如日历的周过渡以及 Mission Control\
    \ 中的屏幕过渡等地方得到了很好的应用。在本节中，我们将通过将动画组合在一起以使其同时运行，来了解如何实现一些不错的过渡效果。\n\n在 Xcode 中，创建一个名为*FlipIt*的新\
    \ Cocoa 项目，类前缀为`FI`。我们要做的是呈现一个 GUI，用户可以在其中切换多个“页面”，而 Core Animation 将在它们之间进行流畅的动画。我们将在\
    \ nib 文件的空窗口中使用一个框来显示内容页面，这些页面本身将保存在一个`NSTabView`中。我们不会显示选项卡视图本身，只是将其用作内容页面的便捷容器。\n\
    \n我们首先在`MainMenu.xib`中布局视图，因此在 Interface Builder 画布中打开该文件。\n"
- fmt: '从`Object Library`中拖拽一个按钮到GUI空白窗口的底部。然后复制该按钮，并将两个按钮分别命名为`Previous`和`Next`。将它们并排放置在窗口底部中央。在`FIAppDelegate.h`文件中打开一个`Assistant
    Editor`窗格。在接下来的步骤中，我们将使用此`Assistant Editor`进行连接。首先，从每个按钮按住Control键拖拽到`Assistant
    Editor`窗口，并创建名为`next`和`previous`的新操作，以匹配这两个按钮。最终结果应如图[Figure 15-6](#9781430245421_Ch15.xhtml#Fig6)所示。


    ![9781430245421_Fig15-06.jpg](images/9781430245421_Fig15-06.jpg)


    [Figure 15-6](#9781430245421_Ch15.xhtml#_Fig6). 准备窗口


    现在从`Object Library`中找到一个`NSBox`，将其拖拽到空白窗口中，放置在按钮上方，并调整其大小以填充屏幕大部分区域。使用`Attributes
    Inspector`，通过将`Title Position`弹出菜单设置为`None`来移除盒子的标题（见图[Figure 15-7](#9781430245421_Ch15.xhtml#Fig7)）。然后从盒子按住Control键拖拽到`Assistant
    Editor`中的`FIAppDelegate.h`代码，并创建一个名为`box`的新输出口，以便我们可以从类中访问该盒子。


    ![9781430245421_Fig15-07.jpg](images/9781430245421_Fig15-07.jpg)


    [Figure 15-7](#9781430245421_Ch15.xhtml#_Fig7). 显示窗口现已准备就绪


    我们的下一步操作是设置一组视图，用于在主视图中切换进出。我们将为此使用`NSTabView`，因为它可以方便地在Xcode中构建一系列视图，并在应用程序运行时作为离屏视图列表进行维护。在`Object
    Library`中找到一个`NSTabView`，但将其一直拖拽到左侧，并放入`Object Dock`中，位于`App Delegate`和`Font Manager`对象下方。注意，选项卡视图会作为顶级图标出现在nib窗口中，与应用程序委托、窗口及其他项目并列（见图[Figure
    15-8](#9781430245421_Ch15.xhtml#Fig8)）。


    ![9781430245421_Fig15-08.jpg](images/9781430245421_Fig15-08.jpg)


    [Figure 15-8](#9781430245421_Ch15.xhtml#_Fig8). 这是一个不寻常的地方，但选项卡视图就在那里


    放置在nib文件顶层的选项卡视图（或任何其他`NSView`子类）在加载nib时不会显示，但只要我们有一个指向它的输出口，就可以以任何方式访问和使用它，包括将其放入窗口的视图层级中。在我们的例子中，我们永远不会将选项卡视图本身显示出来，只显示它包含的内容视图。为了获取内容视图，我们需要将其连接到App
    Delegate类。从`Object Dock`中的选项卡视图按住Control键拖拽到`Assistant Editor`中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便以后可以访问它。


    双击`Object Dock`中的选项卡视图条目，可以看到选项卡视图在没有窗口的情况下显示，如[Figure 15-8](#9781430245421_Ch15.xhtml#Fig8)中Interface
    Builder画布的底部所示。它仍然带有调整大小的框架，我们可以像调整窗口大小一样在Interface Builder中调整其大小。现在调整它的大小，使其与之前放入主窗口的`NSBox`大小大致相同。


    现在让我们向这个选项卡视图中放入一些内容，即我们可以翻动的“页面”。默认情况下，选项卡视图只包含两个内容视图，但让我们增加这个数量（使用`Attributes
    Inspector`），以便有更多视图可供切换。实际内容并不重要，只要每个页面有独特的元素，以便我们能够轻松看到内容从一页切换到下一页。一个好的开始是从`Object
    Library`中抓取一个标签，给它一个漂亮的大号字体，并将其文本更改为单词“One”。然后复制此标签并粘贴到每个其他视图中（我们可以像往常一样使用顶部的选项卡在这些视图之间切换），每次相应地更改文本。为了增加趣味性，还可以为每个页面添加一些独特的项目（此处为一个表格视图，彼处为一组按钮），这样应用程序完成后，在页面间切换时我们将看到更多动态效果。


    现在是完善控制器类界面的时候了，因此我们将注意力转向`FIAppDelegate.h`文件。它当前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们将要显示的视图的对象）和`box`（屏幕上用于显示这些视图的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用包含所有可用视图的选项卡视图数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。


    将以下加粗的行添加到`FIAppDelegate.h`中以添加所有这些内容。


    ```objectivec

    @interface FIAppDelegate : NSObject <NSApplicationDelegate>


    @property (assign) IBOutlet NSWindow *window;

    @property (weak) IBOutlet NSBox *box;

    @property (weak) IBOutlet NSTabView *tabView;


    @property (weak) NSView *leftView;

    @property (weak) NSView *rightView;

    @property (weak) NSView *middleView;

    @property (strong) NSArray *items;

    @property NSInteger currentTabIndex;


    - (IBAction)previous:(id)sender;

    - (IBAction)next:(id)sender;


    @end

    ```


    现在让我们开始在`FIAppDelegate.m`中实现我们的应用程序委托类。这个类将包含许多方法，用于准备过渡：通过设置下一个视图显示在盒子的一侧、将新视图过渡到位置以及将当前视图过渡到另一侧。由于我们希望能够根据是向右还是向左翻转来进行双向过渡，因此每个方法都有两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动过渡的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果您仍然同时打开了Interface
    Builder画布和Assistant Editor，您可能希望关闭它们，并将`FIAppDelegate.m`作为Xcode中的主视图。


    让我们首先创建一个预处理定义`ANIM_DURATION`，用于定义我们将要创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整此设置直到找到我们喜欢的速度。定义如下：


    ```objectivec

    #define ANIM_DURATION 1.0

    ```


    现在让我们继续实现`applicationDidFinishLaunching:`方法。在此方法中，我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是数组本身的引用。这意味着我们的代码现在拥有`tabViewItems`调用返回的`NSArray`的所有权。如果我们不将其放入`strong`引用中，则数组副本将没有任何强引用，并且在自动引用计数清理时会被释放。


