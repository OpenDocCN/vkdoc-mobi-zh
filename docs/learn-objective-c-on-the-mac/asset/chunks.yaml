    \ 文件包含一个空的 `drawRect:` 方法，我们将在此方法中开始编写代码。`drawRect:` 方法通常不会直接调用，除非我们在实现现有视图的子类时调用\
    \ `[super drawRect:rect]` 让父类完成其绘制工作。相反，当应用的主运行循环确定视图需要重绘时（通常在视图被创建或调整大小后，或者我们自己的代码在视图上调用了\
    \ `setNeedsDisplay:` 并传递 `YES` 作为参数），`drawRect:` 方法会被自动调用。\n\n`drawRect:` 方法接受一个参数，即表示视图哪部分“脏”并需要重绘的矩形。这可用于优化复杂视图的绘制，但在我们的示例中，我们将忽略这一点，而是使用视图的边界矩形进行绘制。\n\
    \n## 图形状态\n\nCocoa 中的所有绘制都发生在特定的上下文中，该上下文由 `NSGraphicsContext` 类表示。根据上下文的不同，我们可能直接绘制到窗口缓冲区，或绘制到一块离屏内存中以供后续使用。除此之外，上下文还有一些自身的状态信息，这些信息会随时间变化，例如当前用于任何绘制命令的颜色。当视图需要绘制自身时，它应该以将图形状态恢复到绘制开始时的状态的方式进行绘制。\n\
    \n幸运的是，`NSGraphicsContext` 为我们提供了一种简单的方法来实现这一点。它的 `saveGraphicsState` 方法会将所有相关的状态信息推入栈中，而\
    \ `restoreGraphicsState` 方法会将状态从栈中弹出。我们可以像下面的代码片段那样，使用这两个方法调用来“包围”实际的绘制代码，从而确保我们不会让图形上下文处于意外状态。\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \    // 绘制代码放在这里。\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n##\
    \ 路径辅助工具\n\n要绘制本节开头所示的视图，我们将首先绘制背景，然后绘制脸部本身。对于这两个元素中的每一个，我们将先填充背景，然后绘制边缘。所有这些都使用\
    \ `NSBezierPath` 类完成。贝塞尔路径允许我们定义任意复杂度的路径，包括直线、点、曲线等。`NSBezierPath` 类的一个便利之处在于，它提供了用于创建表示常见形状（如矩形、椭圆等）的贝塞尔路径的便捷快捷方式。\n\
    \n让我们从创建一个定义视图可见边缘的路径开始，使用 `NSBezierPath` 上的一个类方法来获取一个圆角矩形。下面以粗体显示的行创建了一个路径，用白色填充它，然后“勾勒”路径（以黑色绘制其边缘）：\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \n    NSRect bRect = CGRectInset([self bounds], 5, 5);\n    NSBezierPath *border\
    \ = [NSBezierPath bezierPathWithRoundedRect:bRect\n        xRadius:5 yRadius:5];\n\
    \    [[NSColor whiteColor] set];\n    [border fill];\n\n    [border setLineWidth:3];\n\
    \    [[NSColor blackColor] set];\n    [border stroke];\n\n    [NSGraphicsContext\
    \ restoreGraphicsState];\n}\n```\n\n第一步使用 `CGRectInset` 函数缩小我们的边界矩形，为其留出一些余量，以便我们可以绘制带有粗线的圆角矩形，而不会被边缘裁剪。然后，我们创建一个表示圆角矩形的路径，指定矩形的基本几何形状以及用于定义圆角椭圆曲线大小的两个数字。之后，我们发出简单的命令来设置颜色、线宽并执行一些绘制。\n\
    \n## 颜色与图形上下文\n\n请注意，指定用于绘制操作的颜色是与绘制操作本身分开的步骤，设置线宽也是如此。此外，虽然设置线宽是通过路径上的方法完成的，但设置颜色看起来像是一种自由浮动操作。我们只需向任何颜色发送\
    \ `set` 消息，它就会立即成为当前颜色！实际上发生的是，`NSColor` 的 `set` 方法与底层图形上下文交互，设置将用于后续绘制操作的颜色。其一个后果是，只有当存在当前图形上下文时（例如在\
    \ `drawRect:` 方法内），`NSColor` 的 `set` 方法才会执行有用的操作。\n"
- fmt: "# 图形上下文中的颜色管理与路径绘制\n\n另一个结果是，当前颜色是图形上下文的一个属性（在一般意义上，如果不是在 Objective-C 语言意义上），因此，在我们方法开始时调用`[NSGraphicsContext\
    \ saveGraphicsState]`会保存之前设置的颜色，并在方法结束时调用`[NSGraphicsContext restoreGraphicsState]`恢复，从而将一切恢复原状。\n\
    \n此时，如果在 Xcode 中*运行*该应用，我们会看到它绘制了一个带有黑色轮廓的白色矩形（[Figure 14-4](#9781430245421_Ch14.xhtml#Fig4)）。\n\
    \n![9781430245421_Fig14-04.jpg](images/9781430245421_Fig14-04.jpg)\n\n[Figure\
    \ 14-4](#9781430245421_Ch14.xhtml#_Fig4). 事物的形状\n\n## 超越颜色\n\n现在让我们开始绘制头部。在`drawRect:`方法中，靠近末尾但仍位于`[NSGraphicsContext\
    \ restoreGraphicsState]`调用之前，添加以下代码行：\n\n```objectivec\nNSRect hRect = CGRectInset([self\
    \ bounds],20,20);\nNSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];\n\
    NSGradient *faceGradient = [[NSGradient alloc]\n  initWithStartingColor:[NSColor\
    \ whiteColor]\n  endingColor:[NSColor lightGrayColor]];\n[faceGradient drawInBezierPath:head\
    \ angle:45];\n[head setLineWidth:3];\n[head stroke];\n```\n\n在这里，我们再次使用`CGRectInset`创建一个比边界矩形更小的新矩形，这次是为了给笑脸先生的头部创建一个椭圆形。在创建贝塞尔路径后，我们创建了一些新的东西：`NSGradient`的一个实例，它知道如何获取两种或多种颜色并在它们之间绘制平滑渐变。在这个示例中，它可以在贝塞尔路径的内表面绘制自身。*运行*这段代码；视图现在包含一个带有渐变阴影的圆形“头部”（[Figure\
    \ 14-5](#9781430245421_Ch14.xhtml#Fig5)）。\n\n![9781430245421_Fig14-05.jpg](images/9781430245421_Fig14-05.jpg)\n\
    \n[Figure 14-5](#9781430245421_Ch14.xhtml#_Fig5). 基本头部特写\n\n## 手动路径构建\n\n现在剩下的就是绘制面部特征（一个简单的嘴巴和眼睛）。在`drawRect:`的末尾（但在最终的`[NSGraphicsContext\
    \ restoreGraphicsState]`调用之前）添加以下代码行：\n\n```objectivec\nNSBezierPath *features\
    \ = [NSBezierPath bezierPath];\n[features moveToPoint:NSMakePoint(35, 30)];\n\
    [features lineToPoint:NSMakePoint(65, 30)];\n[features moveToPoint:NSMakePoint(40,\
    \ 40)];\n[features lineToPoint:NSMakePoint(40, 40)];\n[features moveToPoint:NSMakePoint(60,\
    \ 40)];\n[features lineToPoint:NSMakePoint(60, 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n\
    [features setLineWidth:3];\n[features stroke];\n```\n\n这里，我们没有使用`NSBezierPath`上的便捷类方法来直接获取完整形状，而是使用了一些更基本的方法，从零开始构建路径。`moveToPoint:`方法将虚拟的“笔”定位在指定点，而不绘制线条到该点。而`lineToPoint:`方法则从路径的当前点绘制一条线到新点。实际上，这些方法并不执行任何绘制；它们只是构建了贝塞尔路径结构，稍后由`stroke`方法进行绘制。\n\
    \n这里的一个额外技巧是我们设置了线条端点样式。此设置定义了线条末端会发生什么。这对于眼睛尤其重要，因为眼睛被绘制为单个点。使用默认设置（在线段末端精确切断所有内容）时，眼睛完全不可见，但使用`NSRoundLineCapStyle`为每只眼睛提供了完美的小圆圈。点击*运行*查看最终结果（[Figure\
    \ 14-6](#9781430245421_Ch14.xhtml#Fig6)）。\n\n![9781430245421_Fig14-06.jpg](images/9781430245421_Fig14-06.jpg)\n\
    \n[Figure 14-6](#9781430245421_Ch14.xhtml#_Fig6). 笑脸先生。他真的很开心！\n\n## 边界问题\n\n\
    既然`MSSmileyView`绘制了一个完美的笑脸，我们自然会希望能够调整其大小以适应不同的位置。\n\n当我们将窗口适配内容时，`MSSmileyView`自定义视图应该会自动设置约束，使视图随窗口改变大小。通过查看从自定义视图边缘延伸到窗口的蓝色线条，我们可以判断出这种情况，如[Figure\
    \ 14-7](#9781430245421_Ch14.xhtml#Fig7)所示。如果不是这种情况，我们可以使用边缘的调整手柄调整`MSSmileyView`的大小，直到蓝色引导线出现在所有四个边上。这将自定义视图定位在距窗口边框四周内嵌20点的位置。\n\
    \n![9781430245421_Fig14-07.jpg](images/9781430245421_Fig14-07.jpg)\n\n[Figure\
    \ 14-7](#9781430245421_Ch14.xhtml#_Fig7). 调整大小约束已就位\n\n保存工作，点击*运行*，并调整视图大小。它应该看起来像[Figure\
    \ 14-8](#9781430245421_Ch14.xhtml#Fig8)。\n\n![9781430245421_Fig14-08.jpg](images/9781430245421_Fig14-08.jpg)\n\
    \n[Figure 14-8](#9781430245421_Ch14.xhtml#_Fig8). 哎呀，你的头倒过来了！\n\n这看起来不对劲，对吧？问题在于，在`drawRect:`方法中，我们在指定路径几何时采用了一种混合匹配的方法。对于轮廓和头部形状，我们一切基于边界矩形，但对于面部特征，我们硬编码了数字像素宽度。当视图调整大小时，我们的边界矩形会自动随之调整大小。这使得轮廓和头部拉伸以适应新的边界，而面部特征仍然困在它们僵硬的微小世界里。\n\
    \n另外，请注意，调整大小后线条的粗细完全相同，这意味着它们相对于视图整体大小的相对粗细已经改变。如果我们把这个视图做得非常大，线条会显得异常细。\n\n\
    幸运的是，有一个简单的方法可以解决所有这些问题。回想一下本章前面提到的视图的`frame`和`bounds`矩形之间的区别？`frame`定义了视图在其父视图中的位置和大小。而`bounds`则决定了视图内坐标系的范围和位置。如果我们能配置使得视图的`bounds`矩形永远不变，那么它就会始终绘制完全相同的内容，但完美地拉伸以匹配它实际绘制的`frame`！\n\
    \n为此，我们只需要在每次视图调整大小时手动将`bounds`设置回原始矩形。因此，让我们向`MSSmileyView.h`添加一个属性（用于保存我们想要的边界），完善`initWithFrame:`方法，并实现`setFrameSize:`方法，如下所示：\n\
    \n```objectivec\n// A portion of MSSmileyView.h:\n#import <Cocoa/Cocoa.h>\n@interface\
    \ MSSmileyView : NSView\n@property NSRect preferredBounds;\n@end\n\n// A portion\
    \ of MSSmileyView.m:\n- (id)initWithFrame:(NSRect)frame {\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        self.preferredBounds = NSMakeRect(0, 0, 100, 100);\n\
    \    }\n\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize {\n    [super\
    \ setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n}\n```\n\
    \n`setFrameSize:`方法是在用户调整窗口大小期间进行实时拖拽时被调用的。我们在这里做的是每一步都重置视图的`bounds`矩形，这样当需要绘制时，所有绘制都将基于原始的`bounds`进行。现在点击*运行*，调整窗口大小，见证奇迹（[Figure\
    \ 14-9](#9781430245421_Ch14.xhtml#Fig9)）。\n\n![9781430245421_Fig14-09.jpg](images/9781430245421_Fig14-09.jpg)\n\
    \n[Figure 14-9](#9781430245421_Ch14.xhtml#_Fig9). 真正的拉伸\n\n如您所见，一切都能完美地按比例拉伸，包括线条的宽度。此外，所有内容都会根据实际显示分辨率进行渲染。我们可以任意拉伸它，并且始终能看到完美抗锯齿的曲线。我们为`bounds`指定的任何几何图形都将被调整以匹配我们所处的`frame`。我们在这里看到的，实际上是一个二维变换。"
  raw: 'Another consequence is that the current color is a property (in a general
    sense, if not an Objective-C language sense) of the graphics context, so whatever
    color was set before our method is saved at the beginning of our method when `[NSGraphicsContext
    saveGraphicsState]` is called and is restored at the end when `[NSGraphicsContext
    restoreGraphicsState]` is called, putting everything back in order again.    At
    this point, if we *Run* the application in Xcode, we’ll see that it draws a white
    rect with a black outline ([Figure 14-4](#9781430245421_Ch14.xhtml#Fig4)).    ![9781430245421_Fig14-04.jpg](images/9781430245421_Fig14-04.jpg)    [Figure
    14-4](#9781430245421_Ch14.xhtml#_Fig4). The shape of things to come    Beyond
    Color    Now let’s start drawing the head. Add these lines to the `drawRect:`
    method, toward the end but still before the `[NSGraphicsContext restoreGraphicsState]`
    call:    ``` NSRect hRect = CGRectInset([self bounds],20,20); NSBezierPath *head
    = [NSBezierPath bezierPathWithOvalInRect:hRect]; NSGradient *faceGradient = [[NSGradient
    alloc]   initWithStartingColor:[NSColor whiteColor]   endingColor:[NSColor lightGrayColor]];
    [faceGradient drawInBezierPath:head angle:45]; [head setLineWidth:3]; [head stroke];
    ```    Here we are once again using `CGRectInset` to make a new rect that is smaller
    than our bounds, this time to create an oval shape for Mr Smiley’s head. After
    creating a Bezier path, we create something new, an instance of `NSGradient`,
    which knows how to take two or more colors and draw a smooth gradient between
    them. In this example, it can draw itself across the inner surface of a Bezier
    path. *Run* this code; the view now contains a round “head” with a shaded gradient
    ([Figure 14-5](#9781430245421_Ch14.xhtml#Fig5)).    ![9781430245421_Fig14-05.jpg](images/9781430245421_Fig14-05.jpg)    [Figure
    14-5](#9781430245421_Ch14.xhtml#_Fig5). The basic head shot    Manual Path Construction    Now
    all that’s left is to draw the facial features (a simple mouth and eyes). Add
    these lines to the end of `drawRect:` (but before the final `[NSGraphicsContext
    restoreGraphicsState]` call):    ``` NSBezierPath *features = [NSBezierPath bezierPath];
    [features moveToPoint:NSMakePoint(35, 30)]; [features lineToPoint:NSMakePoint(65,
    30)]; [features moveToPoint:NSMakePoint(40, 40)]; [features lineToPoint:NSMakePoint(40,
    40)]; [features moveToPoint:NSMakePoint(60, 40)]; [features lineToPoint:NSMakePoint(60,
    40)]; [features setLineCapStyle:NSRoundLineCapStyle]; [features setLineWidth:3];
    [features stroke]; ```    Here, instead of using one of the convenient class methods
    on `NSBezierPath` to get a complete shape right away, we are using some more basic
    methods to construct a path out of nothing. The `moveToPoint:` method positions
    a virtual “pen” at the specified point, without drawing a line to it. And `lineToPoint:`
    draws a line from the path’s current point to the new point. In reality, these
    methods don’t do any drawing; they simply build up the Bezier path structure that
    is later drawn by the stroke method.    One additional finesse here is that we
    set the line cap style. This setting defines what happens at the ends of lines.
    This is especially important for the eyes, which are drawn as a single point.
    Using the default setting, which lops off everything precisely where the line
    segment ends, the eyes were completely invisible, but using `NSRoundLineCapStyle`
    gives us a perfect tiny circle for each eye. Click *Run* to see the final result
    ([Figure 14-6](#9781430245421_Ch14.xhtml#Fig6)).    ![9781430245421_Fig14-06.jpg](images/9781430245421_Fig14-06.jpg)    [Figure
    14-6](#9781430245421_Ch14.xhtml#_Fig6). Mr Smiley. He really is happy!    Pushing
    Boundaries    Now that `MSSmileyView` is drawing a perfect happy face, naturally
    we’ll want to be able to resize this to fit it into different spots.


    When we fit the window to the contents, the `MSSmileyView` custom view should
    have automatically set constraints to have the view change size with the window.
    We can tell that this is the case by seeing blue lines extending from the edges
    of the custom view out to the window, as shown in [Figure 14-7](#9781430245421_Ch14.xhtml#Fig7).
    If that isn’t the case, we can resize the `MSSmileyView` using the resize handles
    on the edges until the blue guidelines appear on all four sides. This positions
    the custom view at an inset of 20 points from the window borders all around.    ![9781430245421_Fig14-07.jpg](images/9781430245421_Fig14-07.jpg)    [Figure
    14-7](#9781430245421_Ch14.xhtml#_Fig7). Resize constraints in place    Save the
    work, click *Run*, and resize the view. It should look like [Figure 14-8](#9781430245421_Ch14.xhtml#Fig8).    ![9781430245421_Fig14-08.jpg](images/9781430245421_Fig14-08.jpg)    [Figure
    14-8](#9781430245421_Ch14.xhtml#_Fig8). Oops upside your head!    Now that doesn’t
    seem right, does it? The problem is that in the `drawRect:` method, we have a
    bit of a mix ‘n’ match approach when specifying path geometry. For the outline
    and the head shape, we base everything on the bounds rect, but for the facial
    features we’re hard-coding numeric pixel widths. When the view resizes, our bounds
    rect automatically resizes along with it. This makes the outline and head stretch
    out to accommodate the new bounds, while the facial features are still stuck in
    their rigid little world.    Also, notice that the lines are the exact same thickness
    after resizing, which means that their relative thickness, compared to the overall
    size of the view, has changed. If we made this view really huge, the lines would
    seem extraordinarily thin.    Fortunately, there’s an easy way to remedy all of
    this. Remember earlier in this chapter when we mentioned the distinction between
    a view’s frame and bounds rects? The frame defines the view’s position and size
    within its superview. The bounds, however, determine the extent and position of
    the coordinate system within the view. If we can configure things so that the
    view’s bounds rect never changes, then it will always draw the exact same content,
    but perfectly stretched to match the actual frame it’s drawing in!    To do this,
    we simply need to manually set the bounds to that original rect every time the
    view is resized. So, let’s add a property (for holding the bounds that we want)
    to `MSSmileyView.h`, complete the `initWithFrame:` method and implement the `setFrameSize:`
    method as shown here:    ``` // A portion of MSSmileyView.h: #import <Cocoa/Cocoa.h>
    @interface MSSmileyView : NSView @property NSRect preferredBounds; @end  // A
    portion of MSSmileyView.m: - (id)initWithFrame:(NSRect)frame {     self = [super
    initWithFrame:frame];     if (self) {         self.preferredBounds = NSMakeRect(0,
    0, 100, 100);     }            return self; }  - (void)setFrameSize:(NSSize)newSize
    {     [super setFrameSize:newSize];     [self setBounds:self.preferredBounds];
    } ```    The `setFrameSize:` method is one that gets called during live dragging
    while the user is resizing a window. What we’re doing here is resetting the view’s
    bounds rect every step of the way, so that when it comes time to draw, all the
    drawing will occur based on the original bounds. Now click *Run*, resize the window,
    and witness the magic ([Figure 14-9](#9781430245421_Ch14.xhtml#Fig9)).    ![9781430245421_Fig14-09.jpg](images/9781430245421_Fig14-09.jpg)    [Figure
    14-9](#9781430245421_Ch14.xhtml#_Fig9). A real stretch    As you can see, everything
    stretches perfectly faithfully, including the widths of the lines. Also, everything
    is rendered to match the actual display resolution. We can stretch that out as
    big as we want, and we’ll always see perfectly anti-aliased curves. Whatever geometry
    we specify for our bounds will be adjusted to match the frame we’re sitting in.
    What we’re seeing here is, in fact, a two-dimensional transformation.'
  trans: "\n# 图形上下文中的颜色管理与路径绘制\n\n另一个结果是，当前颜色是图形上下文的一个属性（在一般意义上，如果不是在 Objective-C\
    \ 语言意义上），因此，在我们方法开始时调用`[NSGraphicsContext saveGraphicsState]`会保存之前设置的颜色，并在方法结束时调用`[NSGraphicsContext\
    \ restoreGraphicsState]`恢复，从而将一切恢复原状。\n\n此时，如果在 Xcode 中*运行*该应用，我们会看到它绘制了一个带有黑色轮廓的白色矩形（Figure\
    \ 14-4）。\n\n![9781430245421_Fig14-04.jpg](img/9781430245421_Fig14-04.jpg)\n\n\
    Figure 14-4. 事物的形状\n\n## 超越颜色\n\n现在让我们开始绘制头部。在`drawRect:`方法中，靠近末尾但仍位于`[NSGraphicsContext\
    \ restoreGraphicsState]`调用之前，添加以下代码行：\n\n```objectivec\nNSRect hRect = CGRectInset([self\
    \ bounds],20,20);\nNSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];\n\
    NSGradient *faceGradient = [[NSGradient alloc]\n  initWithStartingColor:[NSColor\
    \ whiteColor]\n  endingColor:[NSColor lightGrayColor]];\n[faceGradient drawInBezierPath:head\
    \ angle:45];\n[head setLineWidth:3];\n[head stroke];\n```\n\n在这里，我们再次使用`CGRectInset`创建一个比边界矩形更小的新矩形，这次是为了给笑脸先生的头部创建一个椭圆形。在创建贝塞尔路径后，我们创建了一些新的东西：`NSGradient`的一个实例，它知道如何获取两种或多种颜色并在它们之间绘制平滑渐变。在这个示例中，它可以在贝塞尔路径的内表面绘制自身。*运行*这段代码；视图现在包含一个带有渐变阴影的圆形“头部”（Figure\
    \ 14-5）。\n\n![9781430245421_Fig14-05.jpg](img/9781430245421_Fig14-05.jpg)\n\n\
    Figure 14-5. 基本头部特写\n\n## 手动路径构建\n\n现在剩下的就是绘制面部特征（一个简单的嘴巴和眼睛）。在`drawRect:`的末尾（但在最终的`[NSGraphicsContext\
    \ restoreGraphicsState]`调用之前）添加以下代码行：\n\n```objectivec\nNSBezierPath *features\
    \ = [NSBezierPath bezierPath];\n[features moveToPoint:NSMakePoint(35, 30)];\n\
    [features lineToPoint:NSMakePoint(65, 30)];\n[features moveToPoint:NSMakePoint(40,\
    \ 40)];\n[features lineToPoint:NSMakePoint(40, 40)];\n[features moveToPoint:NSMakePoint(60,\
    \ 40)];\n[features lineToPoint:NSMakePoint(60, 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n\
    [features setLineWidth:3];\n[features stroke];\n```\n\n这里，我们没有使用`NSBezierPath`上的便捷类方法来直接获取完整形状，而是使用了一些更基本的方法，从零开始构建路径。`moveToPoint:`方法将虚拟的“笔”定位在指定点，而不绘制线条到该点。而`lineToPoint:`方法则从路径的当前点绘制一条线到新点。实际上，这些方法并不执行任何绘制；它们只是构建了贝塞尔路径结构，稍后由`stroke`方法进行绘制。\n\
    \n这里的一个额外技巧是我们设置了线条端点样式。此设置定义了线条末端会发生什么。这对于眼睛尤其重要，因为眼睛被绘制为单个点。使用默认设置（在线段末端精确切断所有内容）时，眼睛完全不可见，但使用`NSRoundLineCapStyle`为每只眼睛提供了完美的小圆圈。点击*运行*查看最终结果（Figure\
    \ 14-6）。\n\n![9781430245421_Fig14-06.jpg](img/9781430245421_Fig14-06.jpg)\n\n\
    Figure 14-6. 笑脸先生。他真的很开心！\n\n## 边界问题\n\n既然`MSSmileyView`绘制了一个完美的笑脸，我们自然会希望能够调整其大小以适应不同的位置。\n\
    \n当我们将窗口适配内容时，`MSSmileyView`自定义视图应该会自动设置约束，使视图随窗口改变大小。通过查看从自定义视图边缘延伸到窗口的蓝色线条，我们可以判断出这种情况，如\
    \ Figure 14-7 所示。如果不是这种情况，我们可以使用边缘的调整手柄调整`MSSmileyView`的大小，直到蓝色引导线出现在所有四个边上。这将自定义视图定位在距窗口边框四周内嵌\
    \ 20 点的位置。\n\n![9781430245421_Fig14-07.jpg](img/9781430245421_Fig14-07.jpg)\n\n\
    Figure 14-7. 调整大小约束已就位\n\n保存工作，点击*运行*，并调整视图大小。它应该看起来像 Figure 14-8。\n\n![9781430245421_Fig14-08.jpg](img/9781430245421_Fig14-08.jpg)\n\
    \nFigure 14-8. 哎呀，你的头倒过来了！\n\n这看起来不对劲，对吧？问题在于，在`drawRect:`方法中，我们在指定路径几何时采用了一种混合匹配的方法。对于轮廓和头部形状，我们一切基于边界矩形，但对于面部特征，我们硬编码了数字像素宽度。当视图调整大小时，我们的边界矩形会自动随之调整大小。这使得轮廓和头部拉伸以适应新的边界，而面部特征仍然困在它们僵硬的微小世界里。\n\
    \n另外，请注意，调整大小后线条的粗细完全相同，这意味着它们相对于视图整体大小的相对粗细已经改变。如果我们把这个视图做得非常大，线条会显得异常细。\n\n\
    幸运的是，有一个简单的方法可以解决所有这些问题。回想一下本章前面提到的视图的`frame`和`bounds`矩形之间的区别？`frame`定义了视图在其父视图中的位置和大小。而`bounds`则决定了视图内坐标系的范围和位置。如果我们能配置使得视图的`bounds`矩形永远不变，那么它就会始终绘制完全相同的内容，但完美地拉伸以匹配它实际绘制的`frame`！\n\
    \n为此，我们只需要在每次视图调整大小时手动将`bounds`设置回原始矩形。因此，让我们向`MSSmileyView.h`添加一个属性（用于保存我们想要的边界），完善`initWithFrame:`方法，并实现`setFrameSize:`方法，如下所示：\n\
    \n```objectivec\n// A portion of MSSmileyView.h:\n#import <Cocoa/Cocoa.h>\n@interface\
    \ MSSmileyView : NSView\n@property NSRect preferredBounds;\n@end\n\n// A portion\
    \ of MSSmileyView.m:\n- (id)initWithFrame:(NSRect)frame {\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        self.preferredBounds = NSMakeRect(0, 0, 100, 100);\n\
    \    }\n\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize {\n    [super\
    \ setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n}\n```\n\
    \n`setFrameSize:`方法是在用户调整窗口大小期间进行实时拖拽时被调用的。我们在这里做的是每一步都重置视图的`bounds`矩形，这样当需要绘制时，所有绘制都将基于原始的`bounds`进行。现在点击*运行*，调整窗口大小，见证奇迹（Figure\
    \ 14-9）。\n\n![9781430245421_Fig14-09.jpg](img/9781430245421_Fig14-09.jpg)\n\n\
    Figure 14-9. 真正的拉伸\n\n如您所见，一切都能完美地按比例拉伸，包括线条的宽度。此外，所有内容都会根据实际显示分辨率进行渲染。我们可以任意拉伸它，并且始终能看到完美抗锯齿的曲线。我们为`bounds`指定的任何几何图形都将被调整以匹配我们所处的`frame`。我们在这里看到的，实际上是一个二维变换。\n"
- fmt: "# 排版后\n\nApart from being a nice way to deal with resizing, this built-in\
    \ transformation possibility means that we can do our drawing at whatever scale\
    \ we're comfortable with just by setting the bounds rect. If we want to do our\
    \ graphics at pixel resolution, we can do so, but if we're plotting details of\
    \ a mathematical curve ranging from 0.0 to 0.1, we can set our bounds accordingly\
    \ and don't have to multiply all our display values to make them match the screen\
    \ coordinates.\n\n## LOLmaker\n\nNow that we've got a basic understanding of drawing\
    \ in an `NSView` and manipulating its geometry, let's move on to a new project:\
    \ LOLmaker. LOLmaker is a simple application that lets us create our own LOLcat-style\
    \ imagery by just dragging in an image and typing the text we want it to contain.\
    \ It's not rocket science, but it will introduce us to a few more issues around\
    \ drawing in an `NSView`.\n\n### A Few Words About LOLcats\n\nIn case you've missed\
    \ out on the whole LOLcat meme or are reading this book in a future world where\
    \ LOLcats have been forgotten, a LOLcat is basically a picture of a cat (or other\
    \ animal) with a humorous caption, typically written in a style mocking the Internet\
    \ slang of the early 21st century.\n\nWe like LOLcats simply because they are\
    \ pictures of cats that make us laugh out loud. Please don't think that we'd stoop\
    \ to the level of including LOLcats content in our book just to sell more copies!\
    \ It's a well-known fact that most LOLcats fans are also pirates and will only\
    \ read this book in the form of a stolen PDF.\n\n### First Steps to LOL\n\nStart\
    \ by creating a new basic Cocoa project in Xcode, with Automatic Reference Counting\
    \ turned on, but there's no need for Document or Core Data support this time.\
    \ Although both of those could be put to good use in this project, for now we're\
    \ going to focus on just the drawing aspects. This project won't actually save\
    \ anything. Name the project LOLmaker, and use LOL as the class prefix.\n\nNow,\
    \ edit the `LOLAppDelegate.h` file to add the following lines in bold:\n\n```objectivec\n\
    #import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\n\n@interface LOLAppDelegate :\
    \ NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet LOLView *lolView;\n@property (strong) NSImage *image;\n\
    @property (copy) NSString *text;\n\n@end\n```\n\nThese properties will be used\
    \ with Cocoa Bindings to let the user drag in an image and type in some text that\
    \ will be automatically attached to our controller object, which in turn will\
    \ update the view. Notice (as will Xcode) that we're importing a `LOLView.h` header\
    \ file and declaring a property of type `LOLView*`, even though the `LOLView`\
    \ class hasn't been completed yet. Solve that problem right away by creating another\
    \ new set of class files, this time for `LOLView`, an `NSView` subclass.\n\nWe'll\
    \ implement `LOLView` in just a few minutes, but for now let's go configure the\
    \ GUI. Click `MainMenu.xib` to bring it up in an Interface Builder canvas, and\
    \ use the Library to drag a custom view, an image well, and a text field into\
    \ the empty window. Use the Identity Inspector to set the class of the custom\
    \ view to LOLView, and use the Attributes Inspector to turn on the Editable checkbox\
    \ for the image well. Finally, connect the app delegate's *lolView* outlet to\
    \ the `LOLView` in the window. When everything is laid out, the window should\
    \ resemble [Figure 14-10](#9781430245421_Ch14.xhtml#Fig10).\n\n![9781430245421_Fig14-10.jpg](images/9781430245421_Fig14-10.jpg)\n\
    \n[Figure 14-10](#9781430245421_Ch14.xhtml#_Fig10). The layout of our LOLmaker\
    \ window\n\nThis window will let the user drag in an image (to the drag well)\
    \ and type in a message that will be displayed over the image. The `LOLView` will\
    \ notice the dragged-in image and edited text, and will trigger a redisplay of\
    \ itself through the use of Cocoa Bindings. The first half of the bindings will\
    \ be configured in Interface Builder, the second half in code.\n\nFirst, select\
    \ the image well and switch to the Bindings Inspector. Create a binding for the\
    \ Value attribute, selecting the app delegate in the pop-up list and typing `self.image`\
    \ into the Model Key Path field. Then select the text field, and create a binding\
    \ for its Value attribute, again selecting the app delegate in the pop-up list\
    \ and this time typing `self.text` into the Model Key Path field.\n\nThat takes\
    \ care of the bindings for the controls, but because Interface Builder doesn't\
    \ know about `LOLView` and what its bindable values are, we have to set up its\
    \ bindings in code. Go back to Xcode, and edit `LOLAppDelegate.m`, adding the\
    \ following method to the `@implementation` section:\n\n```objectivec\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    [self.lolView bind:@\"image\" toObject:self withKeyPath:@\"\
    image\"\n               options:nil];\n    [self.lolView bind:@\"text\" toObject:self\
    \ withKeyPath:@\"text\"\n               options:nil];\n}\n```\n\nThat takes care\
    \ of the basic communications between all the objects in this application. User\
    \ edits to the controls in the window are passed along to the app delegate, and\
    \ from there they'll be passed along to the `LOLView`, all through Cocoa Bindings.\
    \ The \"plumbing\" of our app is now complete!\n\n## LOLView\n\nSo, how about\
    \ the `LOLView` itself? For starters, it's going to have a couple of properties,\
    \ just like the properties of the app delegate, to contain the values that are\
    \ coming from the user. In this case, however, we want to trigger a redisplay\
    \ every time one of the values changes so that the `LOLView` will be redrawn.\
    \ Therefore, we implement the setter methods ourselves, instead of just using\
    \ the default setters generated by the compiler. Because we're using our own setters\
    \ but allowing the compiler to generate the getters, we have to mark the properties\
    \ as `nonatomic`. The compiler-generated getters and setters include synchronization\
    \ code to ensure that half-constructed objects are never returned by these methods.\
    \ Since we're building our own setter, the compiler can't provide that guarantee,\
    \ but we don't need to care for this application. Add the following to `LOLView.h`\
    \ and `LOLView.m`, as indicated:\n\n```objectivec\n// LOLView.h:\n#import <Cocoa/Cocoa.h>\n\
    @interface LOLView : NSView\n@property (strong, nonatomic) NSImage *image;\n@property\
    \ (copy, nonatomic) NSString *text;\n@end\n\n// LOLView.m:\n#import \"LOLView.h\"\
    \n@implementation LOLView\n- (id)initWithFrame:(NSRect)frame {\n    self = [super\
    \ initWithFrame:frame];\n    if (self) {\n        // Initialization code here.\n\
    \    }\n    return self;\n}\n\n- (void)drawRect:(NSRect)dirtyRect {\n    // Drawing\
    \ code here.\n}\n\n- (void)setImage:(NSImage *)i {\n    if (![i isEqual:_image])\
    \ {\n        _image = i;\n        [self setNeedsDisplay:YES];\n    }\n}\n\n- (void)setText:(NSString\
    \ *)t {\n    if (![t isEqual:_text]) {\n        _text = [t copy];\n        [self\
    \ setNeedsDisplay:YES];\n    }\n}\n```\n\nIn the two setters, we're making direct\
    \ use of the instance variable generated by the property. By default, the instance\
    \ variable's name is the name of the property with a leading underscore, but you\
    \ can control the name if you need to, and you can control whether an instance\
    \ variable is synthesized at all. In the `setText:` method, we're making an explicit\
    \ copy of the `NSString` that's passed in to our code. We have to do this because\
    \ we said we would in the property declaration (note that it's marked as `copy`\
    \ rather than as `strong` or `weak`). In general, this is a good idea when receiving\
    \ an object such as `NSString` because the caller may actually be passing you\
    \ a mutable string that can be changed by some other piece of code.\n\n### Drawing\
    \ a Bitmap\n\nNow let's move on to the \"meat\" of the `LOLView` class: drawing\
    \ the image and superimposing some text."
