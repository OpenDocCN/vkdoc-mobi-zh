    we’ll get a useful little pop-up window with more information about the control,
    including the AppKit class that underlies the control (see [Figure 3-6](#9781430245421_Ch03.xhtml#Fig6)).
    For a Text Field, that class is `NSTextField`. With that little pop-up active,
