  trans: "\n# 排版后\n\n除了作为处理尺寸调整的一种便捷方式外，这种内置的变换能力意味着我们只需设置边界矩形，就能以自己舒适的任何比例进行绘图。如果我们想以像素分辨率绘制图形，完全可以这样做；但如果我们要绘制一条取值范围在\
    \ 0.0 到 0.1 之间的数学曲线细节，就可以相应地设置边界，而无需将所有显示值乘以某个系数来匹配屏幕坐标。\n\n## LOLmaker\n\n现在，我们对如何在\
    \ `NSView` 中绘图以及操纵其几何属性有了基本了解，接下来进入一个新项目：LOLmaker。LOLmaker 是一个简单的应用程序，只需拖入一张图片并输入想要显示的文本，就能创建属于自己的\
    \ LOLcat 风格图像。这并非什么高深的技术，但它会引导我们了解在 `NSView` 中绘图时涉及的更多问题。\n\n### 关于 LOLcats 的一点说明\n\
    \n如果你完全错过了 LOLcat 这个网络迷因，或者是在 LOLcat 已被遗忘的未来世界中阅读本书，那么这里简单介绍一下：LOLcat 基本上就是一张带有幽默字幕的猫（或其他动物）图片，其文字风格通常模仿\
    \ 21 世纪初的网络俚语。\n\n我们喜欢 LOLcat 仅仅因为它们是我们看了会大笑的猫咪图片。请千万别以为我们会堕落到为了多卖几本书而在书中加入 LOLcat\
    \ 的内容！众所周知，大多数 LOLcat 粉丝同时也是盗版者，他们只会通过偷来的 PDF 文件阅读本书。\n\n### LOL 第一步\n\n首先在 Xcode\
    \ 中创建一个新的基础 Cocoa 项目，开启自动引用计数，但这次不需要文档或 Core Data 支持。虽然这两项功能在这个项目中也能派上用场，但我们目前只专注于绘图方面。这个项目实际上不会保存任何内容。将项目命名为\
    \ LOLmaker，并使用 LOL 作为类前缀。\n\n现在，编辑 `LOLAppDelegate.h` 文件，添加以下加粗的行：\n\n```objectivec\n\
    #import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\n\n@interface LOLAppDelegate :\
    \ NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet LOLView *lolView;\n@property (strong) NSImage *image;\n\
    @property (copy) NSString *text;\n\n@end\n```\n\n这些属性将与 Cocoa 绑定配合使用，让用户可以拖入图片并输入文本，文本会自动关联到我们的控制器对象，而控制器对象又会更新视图。请注意（Xcode\
    \ 也会注意到），我们导入了一个 `LOLView.h` 头文件，并声明了一个 `LOLView*` 类型的属性，尽管 `LOLView` 类尚未完成。立即解决这个问题：再创建一组新的类文件，这次为\
    \ `LOLView` 创建一个 `NSView` 子类。\n\n我们稍后就会实现 `LOLView`，但现在先配置图形界面。点击 `MainMenu.xib`\
    \ 在 Interface Builder 画布中打开它，使用资源库将一个自定义视图、一个图像框和一个文本字段拖入空白窗口。使用身份检查器将自定义视图的类设置为\
    \ LOLView，并使用属性检查器打开图像框的“可编辑”复选框。最后，将应用程序代理的 *lolView* 出口连接到窗口中的 `LOLView`。布局完成后，窗口应类似于图\
    \ 14-10。\n\n![9781430245421_Fig14-10.jpg](img/9781430245421_Fig14-10.jpg)\n\n\
    图 14-10。我们的 LOLmaker 窗口布局\n\n这个窗口允许用户拖入一张图片（到拖放区域）并输入一条消息，消息将显示在图片之上。`LOLView`\
    \ 会检测到拖入的图片和编辑后的文本，并通过 Cocoa 绑定触发自身的重绘。绑定的一半将在 Interface Builder 中配置，另一半通过代码完成。\n\
    \n首先，选择图像框并切换到绑定检查器。为“值”属性创建一个绑定，在弹出的列表中选择应用程序代理，并在“模型键路径”字段中输入 `self.image`。然后选择文本字段，为其“值”属性创建一个绑定，同样在弹出的列表中选择应用程序代理，这次在“模型键路径”字段中输入\
    \ `self.text`。\n\n这样就完成了控件的绑定设置，但由于 Interface Builder 不知道 `LOLView` 及其可绑定的值，因此我们需要在代码中为其设置绑定。回到\
    \ Xcode，编辑 `LOLAppDelegate.m`，在 `@implementation` 部分添加以下方法：\n\n```objectivec\n\
    - (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n    [self.lolView\
    \ bind:@\"image\" toObject:self withKeyPath:@\"image\"\n               options:nil];\n\
    \    [self.lolView bind:@\"text\" toObject:self withKeyPath:@\"text\"\n      \
    \         options:nil];\n}\n```\n\n至此，应用程序中所有对象之间的基本通信就完成了。用户对窗口中控件的编辑会通过 Cocoa\
    \ 绑定传递给应用程序代理，再从那里传递到 `LOLView`。我们应用的“管道”现已搭建完成！\n\n## LOLView\n\n那么，`LOLView`\
    \ 本身呢？首先，它会有几个属性，就像应用程序代理的属性一样，用于存放来自用户的值。不过，在这种情况下，我们希望每次某个值发生变化时都触发重绘，以便 `LOLView`\
    \ 能够重新绘制。因此，我们自行实现 setter 方法，而不是使用编译器生成的默认 setter。由于我们使用自定义 setter，但允许编译器生成 getter，因此必须将属性标记为\
    \ `nonatomic`。编译器生成的 getter 和 setter 包含同步代码，以确保这些方法永远不会返回构造了一半的对象。由于我们构建了自己的 setter，编译器无法提供这种保证，但这个应用程序中我们无需关心。按指示将以下代码分别添加到\
    \ `LOLView.h` 和 `LOLView.m` 中：\n\n```objectivec\n// LOLView.h:\n#import <Cocoa/Cocoa.h>\n\
    @interface LOLView : NSView\n@property (strong, nonatomic) NSImage *image;\n@property\
    \ (copy, nonatomic) NSString *text;\n@end\n\n// LOLView.m:\n#import \"LOLView.h\"\
    \n@implementation LOLView\n- (id)initWithFrame:(NSRect)frame {\n    self = [super\
    \ initWithFrame:frame];\n    if (self) {\n        // 初始化代码写在这里。\n    }\n    return\
    \ self;\n}\n\n- (void)drawRect:(NSRect)dirtyRect {\n    // 绘图代码写在这里。\n}\n\n- (void)setImage:(NSImage\
    \ *)i {\n    if (![i isEqual:_image]) {\n        _image = i;\n        [self setNeedsDisplay:YES];\n\
    \    }\n}\n\n- (void)setText:(NSString *)t {\n    if (![t isEqual:_text]) {\n\
    \        _text = [t copy];\n        [self setNeedsDisplay:YES];\n    }\n}\n```\n\
    \n在两个 setter 中，我们直接使用了属性生成的实例变量。默认情况下，实例变量的名称是属性名加下划线前缀，但你可以根据需要控制名称，并且可以控制是否合成实例变量。在\
    \ `setText:` 方法中，我们对传入代码的 `NSString` 进行了显式复制。我们必须这样做，因为我们在属性声明中已经声明（注意它标记为 `copy`\
    \ 而非 `strong` 或 `weak`）。一般来说，在接收 `NSString` 这样的对象时这是一个好做法，因为调用者实际传递给你的可能是一个可变字符串，可能会被其他代码修改。\n\
    \n### 绘制位图\n\n现在，我们来进入 `LOLView` 类的“核心”：绘制图片并在其上叠加文本。\n"
- fmt: "Let’s start with the image, which we can copy into place quite quickly by\
    \ adding a few lines to the `drawRect:` method that was put in place when we created\
    \ the class:\n\n```\n- (void)drawRect:(NSRect)dirtyRect {\n  NSRect srcImageRect\
    \ = NSMakeRect(0, 0, [self.image size].width,\n    [self.image size].height);\n\
    \  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n    operation:NSCompositeCopy\
    \ fraction:1.0];\n}\n```\n\nThe first thing we’re doing here is creating a rect\
    \ called `srcImageRect` with origin (0,0) and size equal to the image’s size.\
    \ Then we send a message to the image itself, telling it to draw the portion of\
    \ the image specified by `srcImageRect` (in this case, the entire image) into\
    \ the current graphics context, located at the origin of our view’s bounds rect.\
    \ In short, the entire image is copied, and its lower left-hand corner will be\
    \ located precisely at the view’s lower left-hand corner. The drawing method we’re\
    \ using here also lets us specify an operation, which determines how transparencies\
    \ in the source and destination images are merged, as well as an integer between\
    \ 0.0 and 1.0 that acts as an overall alpha level for the entire image. Any value\
    \ below 1.0 makes the image somewhat transparent; all the way down to 0.0 makes\
    \ the image completely invisible.\n\nNow, *Run* the app, and take a look at what\
    \ we’ve got so far. The app opens, showing a mostly blank window with the image\
    \ well and text field at the bottom. Find a nice LOLcat-friendly image somewhere\
    \ (we’re using a non-copyright image from the US National Archives, found via\
    \ Flickr), and drag it into the image well, which will look something like [Figure\
    \ 14-11](#9781430245421_Ch14.xhtml#Fig11).\n\n![9781430245421_Fig14-11.jpg](images/9781430245421_Fig14-11.jpg)\n\
    \n[Figure 14-11](#9781430245421_Ch14.xhtml#_Fig11). Not much LOL here\n\nHey,\
    \ that’s not very satisfying! All we’re seeing is the lower left-hand corner of\
    \ the picture we dragged in! If only there were some way we could see the whole\
    \ image . . .\n\n## Let It Scroll\n\nWell, of course there is. Cocoa includes\
    \ a class called `NSScrollView` that will help here. By putting a view inside\
    \ of an `NSScrollView`, we get access to horizontal and vertical scrollbars that\
    \ the user can use to slide the view around. The scroll view takes care of all\
    \ the hard work. The drawing code for any views we put in there doesn’t need to\
    \ change at all! Putting the `LOLView` into an `NSScrollView` is surprisingly\
    \ simple. We just need to add a bit of code and make a couple of adjustments in\
    \ Interface Builder.\n\nFirst, open up the nib file in Xcode to prepare the scroll\
    \ view itself. Select the `LOLView`, then select **Editor** ![image](images/arrow.jpg)\
    \ **Embed in** ![image](images/arrow.jpg) **Scroll View** from the menu. Our `LOLView`\
    \ is now wrapped in a scroll view, but the positioning and sizing are a little\
    \ off. Move the scroll view until the blue guidelines flash in the upper left-hand\
    \ corner of the window, then resize a little with the lower-right resizing control\
    \ until the blue guidelines flash on that side. The view should nearly fill the\
    \ width of the window with the usual border around the edge, and extend it just\
    \ far enough down to leave a decent margin above the other controls (see [Figure\
    \ 14-12](#9781430245421_Ch14.xhtml#Fig12)).\n\n![9781430245421_Fig14-12.jpg](images/9781430245421_Fig14-12.jpg)\n\
    \n[Figure 14-12](#9781430245421_Ch14.xhtml#_Fig12). The LOLmaker window, adjusted\
    \ for scrolling\n\nWe also can get some helpful zooming behavior for free with\
    \ the scroll view, which is useful with multi-touch trackpads where the user can\
    \ pinch to zoom. Let’s make use of that, since it’s free. With the Scroll View\
    \ selected, open the *Attributes Inspector*. One of the options is \"Magnification.\"\
    \ Check the checkbox next to *Allow*, and we’re done, except for the code.\n\n\
    The code we need to add is actually one more piece of the `setImage:` method.\n\
    \nWhat we’re going to do is resize the `LOLView` each time a new image is set\
    \ so that the view’s size matches the image’s size. Later, when the `LOLView`\
    \ is enclosed in an `NSScrollView`, the scroll view will notice the new view size\
    \ and automatically rerender everything including the scrollbars. The new code\
    \ looks like this:\n\n```\n- (void)setImage:(NSImage *)i {\n  if (![i isEqual:_image])\
    \ {\n    if (i) {\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n\
    \        [i size].height);\n      [self setFrame:newImageFrame];\n    }\n    _image\
    \ = i;\n    [self setNeedsDisplay:YES];\n  }\n}\n```\n\nSave all the work, click\
    \ *Run*, and we are done with the scroll view! Drag in a large image, and note\
    \ that it starts off in the lower left, but scrollbars are present, and we can\
    \ drag around to wherever we want, and we can pinch and zoom if our hardware supports\
    \ it! See this in action in [Figure 14-13](#9781430245421_Ch14.xhtml#Fig13).\n\
    \n![9781430245421_Fig14-13.jpg](images/9781430245421_Fig14-13.jpg)\n\n[Figure\
    \ 14-13](#9781430245421_Ch14.xhtml#_Fig13). Scrollbars: so simple, even a cat\
    \ can do it\n\n## Drawing Text\n\nOkay, so let’s get to the final step, drawing\
    \ the text. It is traditional in the LOLcats community to use a text caption in\
    \ the Impact font, using white text with a black shadow. This font is installed\
    \ with Mountain Lion, so all our users should have it. This should be a piece\
    \ of cake. The only mildly tricky part is choosing a font size. Because images\
    \ can be all sorts of sizes, we need to dynamically choose the font size so that\
    \ the caption fills up a decent portion of the view without extending off the\
    \ side. We’ll do this by testing several font sizes, starting with 1 and working\
    \ our way upwards by doubling the size each time until we hit a point where the\
    \ size of the text would be wider than the view itself. That we ratchet the font\
    \ size back down a bit, and draw the text. This is all done by adding the bold\
    \ lines shown below:\n\n```\n- (void)drawRect:(NSRect)dirtyRect {\n  // Drawing\
    \ code here.\n  NSRect srcImageRect = NSMakeRect(0, 0, [self.image size].width,\n\
    \    [self.image size].height);\n  [self.image drawAtPoint:[self bounds].origin\
    \ fromRect:srcImageRect\n    operation:NSCompositeCopy fraction:1.0];\n\n  if\
    \ (self.text != nil && [self.text length] > 0) {\n    NSPoint textLocation = NSMakePoint(0,0);\n\
    \    NSShadow *textShadow = [[NSShadow alloc] init];\n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n\
    \    [textShadow setShadowColor:[NSColor blackColor]];\n    [textShadow setShadowBlurRadius:10];\n\
    \    NSMutableDictionary *textAttributes =\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n   \
    \     [NSColor whiteColor], NSForegroundColorAttributeName,\n        textShadow,\
    \ NSShadowAttributeName,\n        nil];\n\n    // find the optimal size\n    CGFloat\
    \ fontSize;\n    NSSize testSize = NSMakeSize(0, 0);\n    for(fontSize=1; testSize.width\
    \ < [self.image size].width; fontSize*=2)\n    {\n      [textAttributes setObject:[NSFont\
    \ fontWithName:@\"Impact\"\n        size:fontSize]\n        forKey:NSFontAttributeName];\n\
    \      testSize = [self.text sizeWithAttributes:textAttributes];\n    }\n    [textAttributes\
    \ setObject:[NSFont fontWithName:@\"Impact\"\n      size:fontSize/4]\n      forKey:NSFontAttributeName];\n\
    \n    // and draw the text\n    [self.text drawAtPoint:textLocation\n      withAttributes:textAttributes];\n\
    \  }\n}\n```\n\nNow click *Run*, drag in an image to the image well, and write\
    \ some text. Voila! It should look something like [Figure 14-14](#9781430245421_Ch14.xhtml#Fig14).\n\
    \n![9781430245421_Fig14-14.jpg](images/9781430245421_Fig14-14.jpg)\n\n[Figure\
    \ 14-14](#9781430245421_Ch14.xhtml#_Fig14). I can haz press conference?\n\n##\
    \ Wrap Up\n\nIn this chapter, we gained a lot of understanding of the workings\
    \ of `NSView`, `NSBezierPath`, and some other classes and data structures that\
    \ deal with drawing."
