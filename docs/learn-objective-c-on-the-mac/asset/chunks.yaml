- fmt: "Then we call another internal method, `transitionInFromRight`, which will\
    \ start up the animations to move the next view into the right position. Finally,\
    \ we set `currentTabIndex` to point at item zero (the first object in the `items`\
    \ array).  \n\n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n    self.items = [self.tabView tabViewItems];\n    self.currentTabIndex =\
    \ [self.items count]-1;\n    [self prepareRightSide];\n    [[NSAnimationContext\
    \ currentContext] setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n\
    \    self.currentTabIndex = 0;\n    self.middleView = self.rightView;\n}\n```\n\
    \nAs you enter this code, Xcode will complain that it can’t find methods named\
    \ `prepareRightSide` and `transitionInFromRight`. So, let’s write the code for\
    \ these two internal methods now. We won’t bother putting these methods into a\
    \ separate protocol or anything. In Objective-C, code can freely call any other\
    \ methods declared in the same `@implementation` block, even if those methods\
    \ aren’t declared in any `@interface`, so all we have to do is put these internal\
    \ methods somewhere in the `@implementation` block—below the implementation of\
    \ `applicationDidFinishLaunching:` is a good spot.  \n\nThe first of these, `prepareRightSide`,\
    \ starts off by determining the index of the next view to display. We compute\
    \ this index by adding one to `currentTabIndex` and then doing a simple bounds\
    \ check on the new index, resetting it to zero if it’s gotten too high. Then we\
    \ use that index to grab the next view and set its frame to be the same size as\
    \ `box`, shifted off to the right by exactly the width of `box` so that it’s just\
    \ out of sight. We set its alpha value to `0.0`, making it effectively invisible,\
    \ and finally we add the view as a subview of `box`, so that it will actually\
    \ be displayed.  \n\n```\n- (void)prepareRightSide {\n    NSInteger nextTabIndex\
    \ = self.currentTabIndex + 1;\n    if (nextTabIndex >= [self.items count])\n \
    \       nextTabIndex = 0;\n\n    self.rightView = [[self.items objectAtIndex:nextTabIndex]\
    \ view];\n\n    NSRect viewFrame = [self.box bounds];\n    viewFrame.origin.x\
    \ += viewFrame.size.width;\n\n    [self.rightView setFrame:viewFrame];\n    [self.rightView\
    \ setAlphaValue:0.0];\n    [self.box addSubview:self.rightView];\n}\n```\n\nThe\
    \ next method, `transitionInFromRight`, takes `rightView` and slides it into place\
    \ so that it fits perfectly into the space provided by `box`. It also sets the\
    \ alpha value to `1.0`, making it fully opaque. Note that unlike the previous\
    \ method, this uses `rightView`’s `animator` method to access the view’s animation\
    \ proxy so that setting these values actually creates implicit animations for\
    \ us.  \n\n```\n- (void)transitionInFromRight {\n    [[self.rightView animator]\
    \ setFrame:[self.box bounds]];\n    [[self.rightView animator] setAlphaValue:1.0];\n\
    }\n```\n\nBefore we go any further, let’s check our work. Run the app, and see\
    \ the first item from the tab view slide into place and fade in from invisibility\
    \ to full opacity at the same time, as shown in Figure 15-9.  \n\n![9781430245421_Fig15-09.jpg](images/9781430245421_Fig15-09.jpg)\
    \  \n\nFigure 15-9. The first “page” is sliding into view. Note the slightly grayed-out\
    \ appearance of the objects in the box, which are all at about 50 percent opacity\
    \ at this point  \n\nThat’s a start! Now let’s move on to the next item in the\
    \ list: providing an implementation for the `next:` method. Some of this code\
    \ is similar to what we had in the `applicationDidFinishLaunching:` method. We\
    \ prepare the right side, start some transitions (including a call to another\
    \ new internal method, `transitionOutToLeft`, which we’ll get to soon), and update\
    \ an index (including another bounds check) and some pointers at the end.  \n\n\
    The biggest difference here is that the methods that are going to do animation\
    \ are all sandwiched between calls to `[NSAnimationContext beginGrouping]` and\
    \ `[NSAnimationContext endGrouping]`, which work together to form a sort of transaction.\
    \ Between those two calls, any animations that are added to the default animation\
    \ context, including all implicit animations, will be set up to run simultaneously.\
    \ This means that as we create implicit animations in our internal methods, they\
    \ will all be set up to fire off simultaneously. Without this step, the animations\
    \ we create would all start running in sequence, one after another as they’re\
    \ created. Normally this won’t make much of a difference, but it’s entirely possible\
    \ that some unexpected event could occur just as those animations are being created,\
    \ such as another process suddenly hogging the CPU, which could lead to these\
    \ animations running in a slightly staggered manner, starting and ending at different\
    \ times. By wrapping them in a grouping as shown here, that potential problem\
    \ is eliminated.  \n\n```\n- (IBAction)next:(id)sender {\n    [self prepareRightSide];\n\
    \n    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext currentContext]\
    \ setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n    [self transitionOutToLeft];\n\
    \    [NSAnimationContext endGrouping];\n\n    self.currentTabIndex++;\n    if\
    \ (self.currentTabIndex >= [self.items count])\n        self.currentTabIndex =\
    \ 0;\n    self.leftView = self.middleView;\n    self.middleView = self.rightView;\n\
    }\n```\n\nThe `next:` method also calls another internal method, `transitionOutToLeft`,\
    \ which will take the current view and shuffle it off to the left. Its implementation\
    \ looks like this:  \n\n```\n- (void)transitionOutToLeft {\n    NSRect newFrame\
    \ = [self.middleView frame];\n    newFrame.origin.x -= newFrame.size.width;\n\
    \    [[self.middleView animator] setFrame:newFrame];\n    [[self.middleView animator]\
    \ setAlphaValue:0.0];\n}\n```\n\nWith that in place, we’re now ready to Run once\
    \ again. This time we’ll see that not only does the initial view setup work, but\
    \ now we can also hit the Next button to transition to the next view! Smooth.\
    \ See Figure 15-10.  \n\n![9781430245421_Fig15-10.jpg](images/9781430245421_Fig15-10.jpg)\
    \  \n\nFigure 15-10. View Three is on its way out, View Four is almost halfway\
    \ in  \n\nNow all that’s left is to implement matching methods for rightward transitions.\
    \ These methods are all pretty similar to the others and are presented here without\
    \ further comment, except one: you may be tempted to copy and paste the existing\
    \ methods and make whatever changes you can spot, but be careful! Some of the\
    \ differences are subtle but important.  \n\n```\n- (void)prepareLeftSide {\n\
    \    NSInteger previousTabIndex = self.currentTabIndex-1;\n    if (previousTabIndex\
    \ < 0)\n        previousTabIndex = [self.items count]-1;\n\n    self.leftView\
    \ = [[self.items objectAtIndex:previousTabIndex] view];\n\n    NSRect viewFrame\
    \ = [self.box bounds];\n    viewFrame.origin.x -= viewFrame.size.width;\n\n  \
    \  [self.leftView setFrame:viewFrame];\n    [self.leftView setAlphaValue:0.0];\n\
    \    [self.box addSubview:self.leftView];\n}\n\n- (void)transitionInFromLeft {\n\
    \    [[self.leftView animator] setFrame:[self.box bounds]];\n    [[self.leftView\
    \ animator] setAlphaValue:1.0];\n}\n\n- (void)transitionOutToRight {\n    NSRect\
    \ newFrame = [self.middleView frame];\n    newFrame.origin.x += [self.box bounds].size.width;\n\
    \    [[self.middleView animator] setFrame:newFrame];\n    [[self.middleView animator]\
    \ setAlphaValue:0.0];\n}\n\n- (IBAction)previous:(id)sender {\n    [self prepareLeftSide];\n\
    \n    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext currentContext]\
    \ setDuration:ANIM_DURATION];\n    [self transitionInFromLeft];\n    [self transitionOutToRight];\n\
    \    [NSAnimationContext endGrouping];\n\n    self.currentTabIndex--;\n    if\
    \ (self.currentTabIndex < 0)\n        self.currentTabIndex = [self.items count]-1;\n\
    \    self.rightView = self.middleView;\n    self.middleView = self.leftView;\n\
    }\n```"
  raw: 'Then we call another internal method, `transitionInFromRight`, which will
    start up the animations to move the next view into the right position. Finally,
    we set `currentTabIndex` to point at item zero (the first object in the `items`
