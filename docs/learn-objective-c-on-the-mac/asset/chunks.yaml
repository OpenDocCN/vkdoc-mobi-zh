  trans: "\n这是`Cocoa`一直以来所支持的视觉编程模型的一个绝佳示例，并且随着过去几年`Cocoa bindings`和`Core Data`的加入，它变得更加完整。当然，这一切的基础是那些让这些“魔法”在`Xcode`中得以实现的框架和\
    \ API，而有时你也会希望或需要从代码中访问`Core Data`的功能。本章的其余部分将介绍使用`Core Data`进行编程（在传统的、基于代码的意义上）的一些方面，首先从浏览`Application\
    \ Delegate`类中生成的代码开始。\n\n## 探究模板代码\n\n当我们创建`MythBase`项目时，系统为我们创建了一个名为`MBAppDelegate`的应用程序委托类。这个类包含加载我们应用程序中包含的`Core\
    \ Data`模型文件中的模型信息的代码。它还打开了磁盘上的存储空间，`Core Data`在此读取和写入其模型对象，如果该存储空间不存在，则创建它。最后，它通过一个`NSManagedObjectContext`提供对数据存储的访问，其他对象可以依次绑定到该上下文（例如我们\
    \ nib 文件中的数组控制器），以便从存储中读取和写入数据。\n\n此处显示的所有代码都已重新格式化，以更好地适应本书的版式，因此您的版本可能略有不同，但语法上应该是相同的。\n\
    \n### 应用程序委托接口\n\n让我们直接开始，查看头文件`MBAppDelegate.h`，如下清单所示。这是由`Xcode 4.5`为 Mountain\
    \ Lion 自动生成的代码。不同版本的`Xcode`生成的代码可能略有不同，如果您愿意，可以将其修改为与此处显示的版本一致：\n\n```\n#import\
    \ <Cocoa/Cocoa.h>\n\n@interface MBAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n\n@property (readonly, strong,\
    \ nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property\
    \ (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
    \n- (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n这段代码声明了一个包含四个属性和一个方法的简单类。`window`变量的属性声明中也包含了`IBOutlet`，使其成为一个可用于连接到`Interface\
    \ Builder`中窗口的出口。另外三个属性是一些重要的`Core Data`类的实例：\n\n- `NSPersistentStoreCoordinator`管理后端存储，提供对一个或多个`NSPersistentStore`实例的访问，每个实例代表一个存储位置（在文件中或内存中）。协调器的目的是让应用程序可以访问多个持久化存储，就好像它们是一个整体一样。某些应用程序可能希望使用它来将应用程序数据分区到多个存储中。例如，你可能希望区分常规实体（其对象保存到磁盘）和临时实体（其对象仅保存在内存中，用户退出应用程序时就会消失）。即使没有保存到磁盘，临时对象仍然可以受益于`Core\
    \ Data`的其他功能（简单的`Undo`支持、与`Cocoa bindings`的集成等）。\n- `NSManagedObjectModel`从一个或多个模型文件（通常包含在您的应用程序包中）加载关于实体及其属性的信息，并充当一种元数据仓库，包含应用程序托管对象的结构。许多应用程序永远不需要直接与之交互。\n\
    - `NSManagedObjectContext`负责管理所有托管对象（我们通过`Core Data`存储的模型对象）的生命周期。它通过`NSPersistentStoreCoordinator`访问对象本身，并提供用于创建、读取、更新和删除对象的高级功能。\n\
    \n大多数应用程序都会在某个时候使用`NSManagedObjectContext`来创建对象、保存更改等。\n\n当我们查看实现文件时，我们将看到每个对象是如何被使用的。头文件中的最后一个声明是`saveAction:`方法，当用户从`MythBase`菜单中选择文件![image](img/arrow.jpg)保存时，会调用该方法。我们将在下一节了解其工作方式。\n\
    \n### 应用程序委托实现\n\n现在让我们切换到`MythBase_AppDelegate.m`，看看它做了什么。除了实现接口中声明的`saveAction:`方法外，它还需要确保为其声明的属性实现了适当的访问器。这包括`window`的\
    \ getter 和 setter，以及其他属性（被声明为只读）的 getter。与头文件一样，这段代码是使用 Mountain Lion 上的`Xcode\
    \ 4.5`自动生成的。如果您使用的是其他版本，您看到的代码可能会略有不同。\n\n#### `applicationSupportDirectory` 方法\n\
    \n文件开头如下所示：\n\n```\n#import \"MBAppDelegate.h\"\n\n@implementation MBAppDelegate\n\
    \n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize\
    \ managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // 在此处插入代码以初始化您的应用程序\n}\n\n// 返回应用程序用于存储 Core Data 存储文件的目录。此代码使用用户\
    \ Application Support 目录中名为 \"com.learncocoa.MythBase\" 的目录。\n- (NSURL *)applicationFilesDirectory\
    \ {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSURL\
    \ *appSupportURL = [[fileManager URLsForDirectory:NSApplicationSupportDirectory\
    \ inDomains:NSUserDomainMask] lastObject];\n    return [appSupportURL URLByAppendingPathComponent:@\"\
    com.learncocoa.MythBase\"];\n}\n```\n\n类实现中首先展示的是一些`@synthesize`指令，它们负责处理头文件中声明的属性的\
    \ getter 和 setter。接下来是`applicationDidFinishLaunching:`方法的存根，我们之前见过，这对于任何应用程序委托类都是标准的。之后是一个名为`applicationFilesDirectory`的方法的实现，它返回一个包含目录名称的`NSURL`，应用程序可以将数据保存到该目录中（在我们的例子中，是`Core\
    \ Data`保存其持久化存储的位置）。通常，此方法返回`Application Support`目录子目录的完整路径，该子目录位于用户主目录下的`Library`目录中（`/Users/somebody/Library/Application\
    \ Support/MythBase`）。\n\n`applicationFilesDirectory:`方法是一个“辅助”方法，在类实现的其他地方被调用。请注意，该方法既未在头文件中声明，也未在私有类别或类似结构中声明。在`Objective-C`实现代码块中，代码可以调用同一实现代码块中之前出现的任何方法，即使它们没有在任何地方声明。当你想要稍微重构代码，将一些功能提取到自己的方法中，但又不需要在当前类实现之外的任何地方访问它时，这有时是一个便捷的捷径。\n\
    \n#### `managedObjectModel` 访问器方法\n\n接下来是`managedObjectModel`方法。该方法作为`managedObjectModel`属性的\
    \ getter。\n\n```\n// 如有必要则创建，并返回应用程序的托管对象模型。\n```\n"
- fmt: "- (NSManagedObjectModel *)managedObjectModel {\n    if (_managedObjectModel)\
    \ {\n        return _managedObjectModel;\n    }\n\n    NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"MythBase\" withExtension:@\"momd\"];\n    _managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n    return\
    \ _managedObjectModel;\n}\n\n该方法简单地检查`managedObjectModel`是否已经创建。如果是，则返回它；如果不是，则通过读取应用程序包中的`MythBase.momd`资源文件来创建它。这个文件是由\
    \ Xcode 根据我们在本章开头创建的模型文件生成的。任何需要访问模型元数据的代码都可能调用`managedObjectModel:`方法。特别是，在创建`NSPersistentStoreCoordinator`时会被调用，该协调器需要读取或为我们的模型创建存储，因此它需要这些详细信息。\n\
    \n## 使用 NSError 进行错误处理\n\n这里展示的一些代码使用了`NSError`对象来处理可能发生的错误。我们还没有介绍`NSError`，所以这里提供一个简要的说明。\n\
    \n`NSError`的基本思想是：某些方法需要在不使用返回值的情况下，告知调用方可能发生的潜在错误。为了实现这一点，您传入一个指向`NSError`指针的指针（在\
    \ C 语言中有时称为“句柄”），以便该方法可以创建一个`NSError`对象并将指针指向它，大致如下：\n\n```\nNSError *error =\
    \ nil;\n[someObject doSomething:&error];\nif (error) {\n    // handle the error\
    \ somehow!\n}\n```\n\n关于`NSError`的更多细节，请参见[第14章](#9781430245421_Ch14.xhtml)。\n\
    \n## persistentStoreCoordinator 访问器方法\n\n接下来是相当长的`persistentStoreCoordinator`方法：\n\
    \n```objective-c\n// Returns the persistent store coordinator for the application.\n\
    // This implementation creates and returns a coordinator, having added the store\
    \ for the application to it.\n// (The directory for the store is created, if necessary.)\n\
    \n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator)\
    \ {\n        return _persistentStoreCoordinator;\n    }\n\n    NSManagedObjectModel\
    \ *mom = [self managedObjectModel];\n    if (!mom) {\n        NSLog(@\"%@:%@ No\
    \ model to generate a store from\", [self class], NSStringFromSelector(_cmd));\n\
    \        return nil;\n    }\n\n    NSFileManager *fileManager = [NSFileManager\
    \ defaultManager];\n    NSURL *applicationFilesDirectory = [self applicationFilesDirectory];\n\
    \    NSError *error = nil;\n\n    NSDictionary *properties = [applicationFilesDirectory\
    \ resourceValuesForKeys:@[NSURLIsDirectoryKey] error:&error];\n\n    if (!properties)\
    \ {\n        BOOL ok = NO;\n        if ([error code] == NSFileReadNoSuchFileError)\
    \ {\n            ok = [fileManager createDirectoryAtPath:[applicationFilesDirectory\
    \ path] withIntermediateDirectories:YES attributes:nil error:&error];\n      \
    \  }\n        if (!ok) {\n            [[NSApplication sharedApplication] presentError:error];\n\
    \            return nil;\n        }\n    } else {\n        if (![properties[NSURLIsDirectoryKey]\
    \ boolValue]) {\n            // Customize and localize this error.\n         \
    \   NSString *failureDescription = [NSString stringWithFormat:@\"Expected a folder\
    \ to store application data, found a file (%@).\", [applicationFilesDirectory\
    \ path]];\n\n            NSMutableDictionary *dict = [NSMutableDictionary dictionary];\n\
    \            [dict setValue:failureDescription forKey:NSLocalizedDescriptionKey];\n\
    \            error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:101\
    \ userInfo:dict];\n\n            [[NSApplication sharedApplication] presentError:error];\n\
    \            return nil;\n        }\n    }\n\n    NSURL *url = [applicationFilesDirectory\
    \ URLByAppendingPathComponent:@\"MythBase.storedata\"];\n    NSPersistentStoreCoordinator\
    \ *coordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:mom];\n\
    \    if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil\
    \ URL:url options:nil error:&error]) {\n        [[NSApplication sharedApplication]\
    \ presentError:error];\n        return nil;\n    }\n    _persistentStoreCoordinator\
    \ = coordinator;\n\n    return _persistentStoreCoordinator;\n}\n```\n\n这个方法看起来有点吓人，但我们将逐步分析它。它首先检查`persistentStoreCoordinator`实例变量中是否已存在对象，如果存在则返回它。否则，它需要自己初始化协调器，因此继续调用同名方法来获取`managedObjectModel`。如果该模型不存在，则应用程序不包含模型，此方法会记录错误，实际上放弃并返回`nil`。\n\
    \n否则，它会继续检查由`applicationFilesDirectory`方法返回的路径所指定的目录是否存在，该目录用于存放应用的 Core Data\
    \ 存储。它通过调用`applicationFilesDirectory`返回的`NSURL`上的`resourceValuesForKeys:error:`方法来实现这一点，该方法返回一个包含所请求属性信息的`NSDictionary`。在这个例子中，我们请求`NSURLIsDirectoryKey`键的资源值，询问该\
    \ URL 是否代表一个目录（而不是文件）。\n\n如果目录根本不存在（例如应用程序首次运行时），`resourceValuesForKeys:error:`方法可能返回`nil`。如果是这种情况，代码会检查`NSError`的内容，看路径是否不存在。如果路径不存在，它会尝试创建目录，然后检查目录创建是否成功。如果创建失败，则报告错误并返回`nil`。另一方面，如果`resourceValuesForKeys:error:`确实返回了一个属性对象，那么它会检查该对象的内容，看路径是否存在但不代表一个目录。如果存在一个同名的文件，就可能出现这种情况。如果这样，该方法会（在查找本地化错误消息后）报告错误并返回`nil`。\n\
    \n如果通过了所有这些边界情况（通常都会），那么该方法会构建一个指向存储文件应存放位置的 URL，创建一个`NSPersistentStoreCoordinator`，并告诉协调器根据该\
    \ URL 添加一个新存储。协调器足够智能，可以检查该 URL 是否已经存在持久化存储，如果不存在，则为我们创建一个。如果在过程中遇到任何错误，它会告诉我们，应用程序会向用户报告错误。\n\
    \n关于这个方法有几个值得关注的点：首先，这里是应用程序数据存储的实际文件名（当前为`MythBase.storedata`，不过在早期版本的 Mac OS/X\
    \ 中默认是`MythBase.xml`）被指定的地方。如果您想将文件命名为其他名称，就需要在这里更改。\n\n此外，这里还指定了后端存储的类型，就是在调用`addPersistentStoreWithType:configuration:URL:options:error:`方法时设置的。当前设置为`NSXMLStoreType`，这意味着存储的数据将以\
    \ XML 格式的文件存在。在开发应用程序时，这种存储方式很方便，因为生成的文件易于使用其他工具解析，或者直接用肉眼查看。然而，在交付最终应用程序之前，考虑到文件大小、速度和其他因素，您可能需要考虑将数据存储改为其他类型。"
  raw: '- (NSManagedObjectModel *)managedObjectModel {     if (_managedObjectModel)
    {         return _managedObjectModel;     }      NSURL *modelURL = [[NSBundle
    mainBundle] URLForResource:@"MythBase" withExtension:@"momd"];     _managedObjectModel
    = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];     return _managedObjectModel;
    } ```    The method simply checks to see if the `managedObjectModel` has already
    been created. If so, it returns it, and if not, it creates it by reading the `MythBase.momd`
    resource file contained within the application bundle. This file is created by
    Xcode from the model file we created at the beginning of the chapter. The `managedObjectModel:`
    method may be called by any piece of code that needs access to metadata about
    the model. In particular, it’s called when we create the `NSPersistentStoreCoordinator`,
    which will need to either read from, or create storage for our model, so it needs
    the gritty details.    ERROR HANDLING WITH NSERROR    Some of the code shown here
    makes use of `NSError` objects to handle errors that may occur. We haven’t yet
    covered `NSError`,  so we’ll offer a brief explanation here.    The basic idea
    behind `NSError` is that some methods need to be able to inform the caller about
    potential errors that may occur, without using the return value for this purpose.
    To make this work, you pass in a pointer to a pointer (sometimes called a “handle”
    in C parlance) to an `NSError`, so that the method may create an `NSError` object
    and point a pointer at it, something like this:    `NSError *error = nil;`    `[someObject
    doSomething:&error];`    `if (error) {`      `// handle the error somehow!`    `}`    For
    more details about `NSError`, see [Chapter 14](#9781430245421_Ch14.xhtml).    The
    persistentStoreCoordinator Accessor Method    Next up is the considerably longer
    `persistentStoreCoordinator` method:    ``` // Returns the persistent store coordinator
    for the application. This implementation creates and returns a coordinator, having
    added the store for the application to it. (The directory for the store is created,
    if necessary.)  - (NSPersistentStoreCoordinator *)persistentStoreCoordinator {
        if (_persistentStoreCoordinator) {         return _persistentStoreCoordinator;
        }      NSManagedObjectModel *mom = [self managedObjectModel];     if (!mom)
    {         NSLog(@"%@:%@ No model to generate a store from", [self class], NSStringFromSelector(_cmd));
            return nil;     }      NSFileManager *fileManager = [NSFileManager defaultManager];
        NSURL *applicationFilesDirectory = [self applicationFilesDirectory];     NSError
    *error = nil;      NSDictionary *properties = [applicationFilesDirectory resourceValuesForKeys:@[NSURLIsDirectoryKey]
    error:&error];      if (!properties) {         BOOL ok = NO;         if ([error
    code] == NSFileReadNoSuchFileError) {             ok = [fileManager createDirectoryAtPath:[applicationFilesDirectory
    path] withIntermediateDirectories:YES attributes:nil error:&error];         }
            if (!ok) {             [[NSApplication sharedApplication] presentError:error];
                return nil;         }     } else {         if (![properties[NSURLIsDirectoryKey]
    boolValue]) {             // Customize and localize this error.             NSString
    *failureDescription = [NSString stringWithFormat:@"Expected a folder to store
    application data, found a file (%@).", [applicationFilesDirectory path]];              NSMutableDictionary
    *dict = [NSMutableDictionary dictionary];             [dict setValue:failureDescription
    forKey:NSLocalizedDescriptionKey];             error = [NSError errorWithDomain:@"YOUR_ERROR_DOMAIN"
    code:101 userInfo:dict];              [[NSApplication sharedApplication] presentError:error];
                return nil;         }     }      NSURL *url = [applicationFilesDirectory
    URLByAppendingPathComponent:@"MythBase.


    storedata"];     NSPersistentStoreCoordinator *coordinator = [[NSPersistentStoreCoordinator
    alloc] initWithManagedObjectModel:mom];     if (![coordinator addPersistentStoreWithType:NSXMLStoreType
    configuration:nil URL:url options:nil error:&error]) {         [[NSApplication
    sharedApplication] presentError:error];         return nil;     }     _persistentStoreCoordinator
    = coordinator;      return _persistentStoreCoordinator; } ```    This method looks
    a little intimidating, but we’ll go through it piece by piece. It starts by looking
    for an existing object in the `persistentStoreCoordinator` instance variable,
    returning it if there is one. Otherwise, it needs to initialize the coordinator
    itself, so it goes on to look for a `managedObjectModel` by calling the method
    of the same name. If it doesn’t exist, then the application contains no model,
    and this method logs an error, effectively giving up, and returns nil.    Otherwise,
    it goes on to check for the existence of a directory (specified by the value returned
    by the `applicationFilesDirectory` method) where the app’s Core Data storage should
    be loaded. It does this by calling `resourceValuesForKeys:error:` on the `NSURL`
    returned by `applicationFilesDirectory`, which returns a `NSDictionary` containing
    information about the properties requested. In this case, we’re requesting the
    resource value for the `NSURLIsDirectoryKey` key, which asks the URL if it represents
    a directory (as opposed to a file).    The `resourceValuesForKeys:error:` method
    might return nil if the directory isn’t there at all—such as the first time the
    application is run. If this is the case, the code checks the contents of the `NSError`
    to see if the path isn’t there. If it’s not there, it tries to create the directory
    and then checks to see whether the directory creation succeeded. If not, it reports
    the error and returns nil. On the other hand, if `resourceValuesForKeys:error:`
    did return a properties object, then it checks the contents of the properties
    object to see if the path exists but doesn’t represent a directory. This might
    be the case if there’s a file with the same name already present. If this is the
    case, the method reports the error (after looking up a localized error message)
    and returns nil.    If we get past all those edge cases (and we usually will),
    then the method builds a URL pointing at where the storage file should be located,
    creates an `NSPersistentStoreCoordinator`, and tells the coordinator to add a
    new store, given the URL. The coordinator is smart enough to look at the URL,
    figure out if there’s already a persistent store there, and if not, create one
    for us. If it encounters any error along the way, it tells us so, and the application
    reports an error to the user.    A few points of interest about this method: for
    one thing, this is where the actual filename for our app’s data store (currently
    `MythBase.storedata`, though in an earlier version of Mac OS/X it defaulted to
    `MythBase.xml`) is specified. If you wanted to name your file something else,
    this is where you’d change it.    Also, this is where the type of the backing
    store is specified, in the call to the `addPersistentStoreWithType:configuration:URL:options:error:`
    method. It’s currently set to `NSXMLStoreType`, which means that the stored data
    will be in an XML-formatted file. This sort of storage is nice while you’re developing
    your app, since the resulting file is easy to parse with other tools, or for that
    matter read with your own eyes. However, before delivering a final application,
    you may want to consider changing your data store to another type for the sake
    of size, speed, and other considerations.'
  trans: "\n- (NSManagedObjectModel *)managedObjectModel {\n    if (_managedObjectModel)\
    \ {\n        return _managedObjectModel;\n    }\n\n    NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"MythBase\" withExtension:@\"momd\"];\n    _managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n    return\
    \ _managedObjectModel;\n}\n\n该方法简单地检查`managedObjectModel`是否已经创建。如果是，则返回它；如果不是，则通过读取应用程序包中的`MythBase.momd`资源文件来创建它。这个文件是由\
    \ Xcode 根据我们在本章开头创建的模型文件生成的。任何需要访问模型元数据的代码都可能调用`managedObjectModel:`方法。特别是，在创建`NSPersistentStoreCoordinator`时会被调用，该协调器需要读取或为我们的模型创建存储，因此它需要这些详细信息。\n\
    \n## 使用 NSError 进行错误处理\n\n这里展示的一些代码使用了`NSError`对象来处理可能发生的错误。我们还没有介绍`NSError`，所以这里提供一个简要的说明。\n\
    \n`NSError`的基本思想是：某些方法需要在不使用返回值的情况下，告知调用方可能发生的潜在错误。为了实现这一点，您传入一个指向`NSError`指针的指针（在\
    \ C 语言中有时称为“句柄”），以便该方法可以创建一个`NSError`对象并将指针指向它，大致如下：\n\n```\nNSError *error =\
    \ nil;\n[someObject doSomething:&error];\nif (error) {\n    // handle the error\
    \ somehow!\n}\n```\n\n关于`NSError`的更多细节，请参见第 14 章。\n\n## persistentStoreCoordinator\
    \ 访问器方法\n\n接下来是相当长的`persistentStoreCoordinator`方法：\n\n```objective-c\n// Returns\
    \ the persistent store coordinator for the application.\n// This implementation\
    \ creates and returns a coordinator, having added the store for the application\
    \ to it.\n// (The directory for the store is created, if necessary.)\n\n- (NSPersistentStoreCoordinator\
    \ *)persistentStoreCoordinator {\n    if (_persistentStoreCoordinator) {\n   \
    \     return _persistentStoreCoordinator;\n    }\n\n    NSManagedObjectModel *mom\
    \ = [self managedObjectModel];\n    if (!mom) {\n        NSLog(@\"%@:%@ No model\
    \ to generate a store from\", [self class], NSStringFromSelector(_cmd));\n   \
    \     return nil;\n    }\n\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
    \    NSURL *applicationFilesDirectory = [self applicationFilesDirectory];\n  \
    \  NSError *error = nil;\n\n    NSDictionary *properties = [applicationFilesDirectory\
    \ resourceValuesForKeys:@[NSURLIsDirectoryKey] error:&error];\n\n    if (!properties)\
    \ {\n        BOOL ok = NO;\n        if ([error code] == NSFileReadNoSuchFileError)\
    \ {\n            ok = [fileManager createDirectoryAtPath:[applicationFilesDirectory\
    \ path] withIntermediateDirectories:YES attributes:nil error:&error];\n      \
    \  }\n        if (!ok) {\n            [[NSApplication sharedApplication] presentError:error];\n\
    \            return nil;\n        }\n    } else {\n        if (![properties[NSURLIsDirectoryKey]\
    \ boolValue]) {\n            // Customize and localize this error.\n         \
    \   NSString *failureDescription = [NSString stringWithFormat:@\"Expected a folder\
    \ to store application data, found a file (%@).\", [applicationFilesDirectory\
    \ path]];\n\n            NSMutableDictionary *dict = [NSMutableDictionary dictionary];\n\
    \            [dict setValue:failureDescription forKey:NSLocalizedDescriptionKey];\n\
    \            error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:101\
    \ userInfo:dict];\n\n            [[NSApplication sharedApplication] presentError:error];\n\
    \            return nil;\n        }\n    }\n\n    NSURL *url = [applicationFilesDirectory\
    \ URLByAppendingPathComponent:@\"MythBase.storedata\"];\n    NSPersistentStoreCoordinator\
    \ *coordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:mom];\n\
    \    if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil\
    \ URL:url options:nil error:&error]) {\n        [[NSApplication sharedApplication]\
    \ presentError:error];\n        return nil;\n    }\n    _persistentStoreCoordinator\
    \ = coordinator;\n\n    return _persistentStoreCoordinator;\n}\n```\n\n这个方法看起来有点吓人，但我们将逐步分析它。它首先检查`persistentStoreCoordinator`实例变量中是否已存在对象，如果存在则返回它。否则，它需要自己初始化协调器，因此继续调用同名方法来获取`managedObjectModel`。如果该模型不存在，则应用程序不包含模型，此方法会记录错误，实际上放弃并返回`nil`。\n\
    \n否则，它会继续检查由`applicationFilesDirectory`方法返回的路径所指定的目录是否存在，该目录用于存放应用的 Core Data\
    \ 存储。它通过调用`applicationFilesDirectory`返回的`NSURL`上的`resourceValuesForKeys:error:`方法来实现这一点，该方法返回一个包含所请求属性信息的`NSDictionary`。在这个例子中，我们请求`NSURLIsDirectoryKey`键的资源值，询问该\
    \ URL 是否代表一个目录（而不是文件）。\n\n如果目录根本不存在（例如应用程序首次运行时），`resourceValuesForKeys:error:`方法可能返回`nil`。如果是这种情况，代码会检查`NSError`的内容，看路径是否不存在。如果路径不存在，它会尝试创建目录，然后检查目录创建是否成功。如果创建失败，则报告错误并返回`nil`。另一方面，如果`resourceValuesForKeys:error:`确实返回了一个属性对象，那么它会检查该对象的内容，看路径是否存在但不代表一个目录。如果存在一个同名的文件，就可能出现这种情况。如果这样，该方法会（在查找本地化错误消息后）报告错误并返回`nil`。\n\
    \n如果通过了所有这些边界情况（通常都会），那么该方法会构建一个指向存储文件应存放位置的 URL，创建一个`NSPersistentStoreCoordinator`，并告诉协调器根据该\
    \ URL 添加一个新存储。协调器足够智能，可以检查该 URL 是否已经存在持久化存储，如果不存在，则为我们创建一个。如果在过程中遇到任何错误，它会告诉我们，应用程序会向用户报告错误。\n\
    \n关于这个方法有几个值得关注的点：首先，这里是应用程序数据存储的实际文件名（当前为`MythBase.storedata`，不过在早期版本的 Mac OS/X\
    \ 中默认是`MythBase.xml`）被指定的地方。如果您想将文件命名为其他名称，就需要在这里更改。\n\n此外，这里还指定了后端存储的类型，就是在调用`addPersistentStoreWithType:configuration:URL:options:error:`方法时设置的。当前设置为`NSXMLStoreType`，这意味着存储的数据将以\
    \ XML 格式的文件存在。在开发应用程序时，这种存储方式很方便，因为生成的文件易于使用其他工具解析，或者直接用肉眼查看。然而，在交付最终应用程序之前，考虑到文件大小、速度和其他因素，您可能需要考虑将数据存储改为其他类型。\n"
- fmt: "# Core Data Store Types and Related Delegates\n\nThe other choices we have\
    \ are `NSBinaryStoreType`, which saves its data in a binary format that takes\
    \ less disk space and is faster to read and write, and `NSSQLiteStoreType`, which\
    \ in addition to the advantages of `NSBinaryStoreType` also frees the persistent\
    \ store from the burden of holding the entire object graph in memory at once;\
    \ it only loads objects as they’re accessed. That difference becomes crucial when\
    \ dealing with a large data set. Because of this advantage, we recommend changing\
    \ from `NSXMLStoreType` to `NSSQLiteStoreType` before releasing your application.\
    \ There’s an additional store type, `NSInMemoryStoreType`, which can be used for\
    \ maintaining an in-memory object graph that’s never saved to disk.\n\nThe default\
    \ Core Data application template does a pretty good job of tucking away the data\
    \ storage for you so that you don’t have to give it too much thought, but at some\
    \ point before shipping your app you will have to decide which of these formats\
    \ to use for your app’s storage. We’ve given our recommendations, but you might\
    \ want to consult the documentation in Xcode (search for “core data programming\
    \ guide”) to gain more understanding before deciding how to tackle this issue.\n\
    \nThe final thing to point out about `persistentStoreCoordinator` is that if you\
    \ want to partition your data into different stores (for example one that’s on\
    \ disk and one that’s only in memory, disappearing when the app terminates) this\
    \ is where you’d need to make the changes, adding each of your persistent stores\
    \ to the coordinator.\n\n## The managedObjectContext Accessor Method\n\nNow let’s\
    \ look at the `managedObjectContext` method, which is the getter for the read-only\
    \ property of the same name:\n\n```\n// Returns the managed object context for\
    \ the application (which is already bound to the persistent store coordinator\
    \ for the application.)\n- (NSManagedObjectContext *)managedObjectContext {\n\
    \    if (_managedObjectContext) {\n        return _managedObjectContext;\n   \
    \ }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (!coordinator) {\n        NSMutableDictionary *dict = [NSMutableDictionary\
    \ dictionary];\n        [dict setValue:@\"Failed to initialize the store\" forKey:NSLocalizedDescriptionKey];\n\
    \        [dict setValue:@\"There was an error building up the data file.\" forKey:NSLocalizedFailureReasonErrorKey];\n\
    \        NSError *error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999\
    \ userInfo:dict];\n        [[NSApplication sharedApplication] presentError:error];\n\
    \        return nil;\n    }\n    _managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \n    return _managedObjectContext;\n}\n```\n\nLike the other methods we’ve seen\
    \ acting as a getter for a property, this method first checks to see if the instance\
    \ variable has been set, and if so, returns it. Otherwise, it checks for the existence\
    \ of a persistent store coordinator by calling the `persistentStoreCoordinator`\
    \ method. If that returns nil, then the method reports an error and returns nil\
    \ itself. If not, it simply creates a managed object context, sets its persistent\
    \ store coordinator, and returns the context.\n\nThis code is pretty straightforward\
    \ and is probably nothing you’ll ever pay much attention to, except perhaps to\
    \ customize the error reporting.\n\n## An NSWindow Delegate Method\n\nNext up\
    \ is an `NSWindow` delegate method called `windowWillReturnUndoManager`.\n\n```\n\
    // Returns the NSUndoManager for the application. In this case, the manager returned\
    \ is that of the managed object context for the application.\n- (NSUndoManager\
    \ *)windowWillReturnUndoManager:(NSWindow *)window {\n    return [[self managedObjectContext]\
    \ undoManager];\n}\n```\n\nThis method lets us specify the object that handles\
    \ undo/redo actions for the window containing our GUI.\n\nWe’ll discuss the undo/redo\
    \ system in a later chapter, but for now what you need to know is that this method\
    \ tells the system to use Core Data’s undo manager, which is accessed through\
    \ the managed object context.\n\n## The saveAction: Action Method\n\nNext up,\
    \ the `saveAction:` method, which is called when the user clicks the relevant\
    \ menu item.\n\n```\n// Performs the save action for the application, which is\
    \ to send the save: message to the application's managed object context. Any encountered\
    \ errors are presented to the user.\n- (IBAction)saveAction:(id)sender {\n   \
    \ NSError *error = nil;\n\n    if (![[self managedObjectContext] commitEditing])\
    \ {\n        NSLog(@\"%@:%@ unable to commit editing before saving\", [self class],\
    \ NSStringFromSelector(_cmd));\n    }\n\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n        [[NSApplication sharedApplication] presentError:error];\n\
    \    }\n}\n```\n\nThis method is pretty straightforward. It first tells the context\
    \ to ensure that any pending edits are committed to the underlying model objects\
    \ and prints a warning in case the commit fails. Whether the commit succeeds or\
    \ fails, it then proceeds to tell the context to save all model objects to storage.\
    \ If that fails, it shows the user an error.\n\n## An NSApplication Delegate Method\n\
    \nNow we come to this class’s last method, the `NSApplication` delegate method\
    \ `applicationShouldTerminate:`. This method is called by the application when\
    \ the user selects Quit from the menu, and gives the delegate a chance to save\
    \ changes, inspect its state, ask the user if they really want to quit, and so\
    \ on. The value returned by this method determines whether the application will\
    \ really terminate or not. Here’s the code:\n\n```\n- (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication\
    \ *)sender {\n    // Save changes in the application's managed object context\
    \ before the application terminates.\n\n    if (!_managedObjectContext) {\n  \
    \      return NSTerminateNow;\n    }\n\n    if (![[self managedObjectContext]\
    \ commitEditing]) {\n        NSLog(@\"%@:%@ unable to commit editing to terminate\"\
    , [self class], NSStringFromSelector(_cmd));\n        return NSTerminateCancel;\n\
    \    }\n\n    if (![[self managedObjectContext] hasChanges]) {\n        return\
    \ NSTerminateNow;\n    }\n\n    NSError *error = nil;\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n\n        // Customize this code block to include application-specific\
    \ recovery steps.\n        BOOL result = [sender presentError:error];\n      \
    \  if (result) {\n            return NSTerminateCancel;\n        }\n\n       \
    \ NSString *question = NSLocalizedString(@\"Could not save changes while quitting.\
    \ Quit anyway?\", @\"Quit without saves error question message\");\n        NSString\
    \ *info = NSLocalizedString(@\"Quitting now will lose any changes you have made\
    \ since the last successful save\", @\"Quit without saves error question info\"\
    );\n        NSString *quitButton = NSLocalizedString(@\"Quit anyway\", @\"Quit\
    \ anyway button title\");\n        NSString *cancelButton = NSLocalizedString(@\"\
    Cancel\", @\"Cancel button title\");\n        NSAlert *alert = [[NSAlert alloc]\
    \ init];\n        [alert setMessageText:question];\n        [alert setInformativeText:info];\n\
    \        [alert addButtonWithTitle:quitButton];\n        [alert addButtonWithTitle:cancelButton];\n\
    \n        NSInteger answer = [alert runModal];\n\n        if (answer == NSAlertAlternateReturn)\
    \ {\n            return NSTerminateCancel;\n        }\n    }\n\n    return NSTerminateNow;\n\
    }\n```\n\nAs with the `persistentStoreCoordinator` method, we’ll go through this\
    \ one piece by piece. First, it checks to see whether there really is a `managedObjectContext`\
    \ to worry about. If not, it just returns `NSTerminateNow` immediately, and the\
    \ application terminates. If there is a `managedObjectContext`, it tells the context\
    \ to commit any pending changes."
  raw: 'The other choices we have are `NSBinaryStoreType`, which saves its data in
    a binary format that takes less disk space and is faster to read and write, and
    `NSSQLiteStoreType`, which in addition to the advantages of `NSBinaryStoreType`
    also frees the persistent store from the burden of holding the entire object graph
    in memory at once; it only loads objects as they’re accessed. That difference
    becomes crucial when dealing with a large data set. Because of this advantage,
    we recommend changing from `NSXMLStoreType` to `NSSQLiteStoreType` before releasing
    your application. There’s an additional store type, `NSInMemoryStoreType`, which
    can be used for maintaining an in-memory object graph that’s never saved to disk.    The
    default Core Data application template does a pretty good job of tucking away
    the data storage for you so that you don’t have to give it too much thought, but
    at some point before shipping your app you will have to decide which of these
    formats to use for your app’s storage. We’ve given our recommendations, but you
    might want to consult the documentation in Xcode (search for “core data programming
    guide” to gain more understanding before deciding how to tackle this issue.    The
    final thing to point out about `persistentStoreCoordinator` is that if you want
    to partition your data into different stores (for example one that’s on disk and
    one that’s only in memory, disappearing when the app terminates) this is where
    you’d need to make the changes, adding each of your persistent stores to the coordinator.    The
    managedObjectContext Accessor Method    Now let’s look at the `managedObjectContext`
    method, which is the getter for the read-only property of the same name:    ```
    // Returns the managed object context for the application (which is already bound
    to the persistent store coordinator for the application.) - (NSManagedObjectContext
    *)managedObjectContext {     if (_managedObjectContext) {         return _managedObjectContext;
        }      NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];
        if (!coordinator) {         NSMutableDictionary *dict = [NSMutableDictionary
    dictionary];         [dict setValue:@"Failed to initialize the store" forKey:NSLocalizedDescriptionKey];
            [dict setValue:@"There was an error building up the data file." forKey:NSLocalizedFailureReasonErrorKey];
            NSError *error = [NSError errorWithDomain:@"YOUR_ERROR_DOMAIN" code:9999
    userInfo:dict];         [[NSApplication sharedApplication] presentError:error];
            return nil;     }     _managedObjectContext = [[NSManagedObjectContext
    alloc] init];     [_managedObjectContext setPersistentStoreCoordinator:coordinator];      return
    _managedObjectContext; } ```    Like the other methods we’ve seen acting as a
    getter for a property, this method first checks to see if the instance variable
    has been set, and if so, returns it. Otherwise, it checks for the existence of
    a persistent store coordinator by calling the `persistentStoreCoordinator` method.
    If that returns nil, then the method reports an error and returns nil itself.
    If not, it simply creates a managed object context, sets its persistent store
    coordinator, and returns the context.    This code is pretty straightforward and
    is probably nothing you’ll ever pay much attention to, except perhaps to customize
    the error reporting.    An NSWindow Delegate Method    Next up is an `NSWindow`
    delegate method called `windowWillReturnUndoManager`.    ``` // Returns the NSUndoManager
    for the application. In this case, the manager returned is that of the managed
    object context for the application. - (NSUndoManager *)windowWillReturnUndoManager:(NSWindow
    *)window {     return [[self managedObjectContext] undoManager]; } ```    This
    method lets us specify the object that handles undo/redo actions for the window
    containing our GUI.


    We’ll discuss the undo/redo system in a later chapter, but for now what you need
    to know is that this method tells the system to use Core Data’s undo manager,
    which is accessed through the managed object context.    The saveAction: Action
    Method    Next up, the `saveAction:` method, which is called when the user clicks
    the relevant menu item.    ``` // Performs the save action for the application,
    which is to send the save: message to the application''s managed object context.
    Any encountered errors are presented to the user. - (IBAction)saveAction:(id)sender
    {     NSError *error = nil;      if (![[self managedObjectContext] commitEditing])
    {         NSLog(@"%@:%@ unable to commit editing before saving", [self class],
    NSStringFromSelector(_cmd));     }      if (![[self managedObjectContext] save:&error])
    {         [[NSApplication sharedApplication] presentError:error];     } } ```    This
    method is pretty straightforward. It first tells the context to ensure that any
    pending edits are committed to the underlying model objects and prints a warning
    in case the commit fails. Whether the commit succeeds or fails, it then proceeds
    to tell the context to save all model objects to storage. If that fails, it shows
    the user an error.    An NSApplication Delegate Method    Now we come to this
    class’s last method, the `NSApplication` delegate method `applicationShouldTerminate:`.
    This method is called by the application when the user selects Quit from the menu,
    and gives the delegate a chance to save changes, inspect its state, ask the user
    if they really want to quit, and so on. The value returned by this method determines
    whether the application will really terminate or not. Here’s the code:    ```
    - (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication *)sender
    {     // Save changes in the application''s managed object context before the
    application terminates.      if (!_managedObjectContext) {         return NSTerminateNow;
        }      if (![[self managedObjectContext] commitEditing]) {         NSLog(@"%@:%@
    unable to commit editing to terminate", [self class], NSStringFromSelector(_cmd));
            return NSTerminateCancel;     }      if (![[self managedObjectContext]
    hasChanges]) {         return NSTerminateNow;     }      NSError *error = nil;
        if (![[self managedObjectContext] save:&error]) {          // Customize this
    code block to include application-specific recovery steps.         BOOL result
    = [sender presentError:error];         if (result) {             return NSTerminateCancel;
            }          NSString *question = NSLocalizedString(@"Could not save changes
    while quitting. Quit anyway?", @"Quit without saves error question message");
            NSString *info = NSLocalizedString(@"Quitting now will lose any changes
    you have made since the last successful save", @"Quit without saves error question
    info");         NSString *quitButton = NSLocalizedString(@"Quit anyway", @"Quit
    anyway button title");         NSString *cancelButton = NSLocalizedString(@"Cancel",
    @"Cancel button title");         NSAlert *alert = [[NSAlert alloc] init];         [alert
    setMessageText:question];         [alert setInformativeText:info];         [alert
    addButtonWithTitle:quitButton];         [alert addButtonWithTitle:cancelButton];          NSInteger
    answer = [alert runModal];          if (answer == NSAlertAlternateReturn) {             return
    NSTerminateCancel;         }     }      return NSTerminateNow; } ```    As with
    the `persistentStoreCoordinator` method, we’ll go through this one piece by piece.
    First, it checks to see whether there really is a `managedObjectContext` to worry
    about. If not, it just returns `NSTerminateNow` immediately, and the application
    terminates. If there is a `managedObjectContext`, it tells the context to commit
    any pending changes.'
  trans: "\n# 核心数据存储类型及相关委托\n\n我们还有其他选择：`NSBinaryStoreType`（以二进制格式保存数据，占用更少的磁盘空间且读写速度更快）和`NSSQLiteStoreType`（除具备`NSBinaryStoreType`的优势外，还免去了持久化存储一次性将整个对象图加载到内存的负担；它仅在访问对象时进行加载）。在处理大型数据集时，这一差异变得至关重要。鉴于这一优势，我们建议在发布应用程序前，将存储类型从`NSXMLStoreType`切换为`NSSQLiteStoreType`。还有一种存储类型是`NSInMemoryStoreType`，可用于维护一个永不保存到磁盘的内存对象图。\n\
    \n默认的 Core Data 应用程序模板在隐藏数据存储方面做得相当出色，让你无需过多操心，但在发布应用前的某个时刻，你必须决定使用哪种格式来存储应用数据。我们已给出了推荐，但建议你在决定如何处理此问题前，查阅\
    \ Xcode 中的文档（搜索“core data programming guide”）以加深理解。\n\n关于`persistentStoreCoordinator`，最后需要指出的是：如果你想将数据划分到不同的存储中（例如，一个存储在磁盘上，另一个仅保存在内存中，应用终止时数据消失），那么你需要在此处进行修改，将每个持久化存储添加到协调器中。\n\
    \n## managedObjectContext 访问器方法\n\n现在我们来查看`managedObjectContext`方法，它是同名只读属性的 getter\
    \ 方法：\n\n```\n// 返回应用程序的托管对象上下文（该上下文已绑定到应用程序的持久化存储协调器）。\n- (NSManagedObjectContext\
    \ *)managedObjectContext {\n    if (_managedObjectContext) {\n        return _managedObjectContext;\n\
    \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
    \    if (!coordinator) {\n        NSMutableDictionary *dict = [NSMutableDictionary\
    \ dictionary];\n        [dict setValue:@\"Failed to initialize the store\" forKey:NSLocalizedDescriptionKey];\n\
    \        [dict setValue:@\"There was an error building up the data file.\" forKey:NSLocalizedFailureReasonErrorKey];\n\
    \        NSError *error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999\
    \ userInfo:dict];\n        [[NSApplication sharedApplication] presentError:error];\n\
    \        return nil;\n    }\n    _managedObjectContext = [[NSManagedObjectContext\
    \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
    \n    return _managedObjectContext;\n}\n```\n\n与我们看到的其他作为属性 getter 的方法类似，此方法首先检查实例变量是否已设置，若已设置则直接返回。否则，它会通过调用`persistentStoreCoordinator`方法来检查持久化存储协调器的存在性。如果该方法返回\
    \ nil，则本方法报告错误并返回 nil。如果协调器存在，则只需创建一个托管对象上下文，设置其持久化存储协调器，然后返回该上下文。\n\n这段代码非常直接，除了可能自定义错误报告之外，你可能不会过多关注它。\n\
    \n## NSWindow 委托方法\n\n接下来是一个名为`windowWillReturnUndoManager`的`NSWindow`委托方法。\n\n\
    ```\n// 返回应用程序的 NSUndoManager。在此情况下，返回的管理器是应用程序托管对象上下文的管理器。\n- (NSUndoManager\
    \ *)windowWillReturnUndoManager:(NSWindow *)window {\n    return [[self managedObjectContext]\
    \ undoManager];\n}\n```\n\n此方法允许我们指定负责处理包含 GUI 的窗口的撤销/重做操作的对象。\n\n我们将在后续章节讨论撤销/重做系统，但目前你需要知道的是，此方法会告知系统使用\
    \ Core Data 的撤销管理器，该管理器通过托管对象上下文进行访问。\n\n## saveAction: 操作方法\n\n接下来是`saveAction:`方法，当用户点击相关菜单项时调用。\n\
    \n```\n// 执行应用程序的保存操作，即向应用程序的托管对象上下文发送 save: 消息。任何遇到的错误都会呈现给用户。\n- (IBAction)saveAction:(id)sender\
    \ {\n    NSError *error = nil;\n\n    if (![[self managedObjectContext] commitEditing])\
    \ {\n        NSLog(@\"%@:%@ unable to commit editing before saving\", [self class],\
    \ NSStringFromSelector(_cmd));\n    }\n\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n        [[NSApplication sharedApplication] presentError:error];\n\
    \    }\n}\n```\n\n此方法非常简单。它首先通知上下文确保所有待处理的编辑都已提交到底层模型对象，并在提交失败时打印警告。无论提交成功还是失败，它接着会通知上下文将所有模型对象保存到存储中。如果保存失败，则会向用户显示错误信息。\n\
    \n## NSApplication 委托方法\n\n现在我们来看这个类的最后一个方法，即`NSApplication`委托方法`applicationShouldTerminate:`。当用户从菜单中选择“退出”时，应用程序会调用此方法，它为委托提供了保存更改、检查自身状态、询问用户是否真的想退出等机会。此方法的返回值决定了应用程序是否真正终止。代码如下：\n\
    \n```\n- (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication\
    \ *)sender {\n    // 在应用程序终止前，保存应用程序托管对象上下文中的更改。\n\n    if (!_managedObjectContext)\
    \ {\n        return NSTerminateNow;\n    }\n\n    if (![[self managedObjectContext]\
    \ commitEditing]) {\n        NSLog(@\"%@:%@ unable to commit editing to terminate\"\
    , [self class], NSStringFromSelector(_cmd));\n        return NSTerminateCancel;\n\
    \    }\n\n    if (![[self managedObjectContext] hasChanges]) {\n        return\
    \ NSTerminateNow;\n    }\n\n    NSError *error = nil;\n    if (![[self managedObjectContext]\
    \ save:&error]) {\n\n        // 自定义此代码块以包含特定于应用程序的恢复步骤。\n        BOOL result =\
    \ [sender presentError:error];\n        if (result) {\n            return NSTerminateCancel;\n\
    \        }\n\n        NSString *question = NSLocalizedString(@\"Could not save\
    \ changes while quitting. Quit anyway?\", @\"Quit without saves error question\
    \ message\");\n        NSString *info = NSLocalizedString(@\"Quitting now will\
    \ lose any changes you have made since the last successful save\", @\"Quit without\
    \ saves error question info\");\n        NSString *quitButton = NSLocalizedString(@\"\
    Quit anyway\", @\"Quit anyway button title\");\n        NSString *cancelButton\
    \ = NSLocalizedString(@\"Cancel\", @\"Cancel button title\");\n        NSAlert\
    \ *alert = [[NSAlert alloc] init];\n        [alert setMessageText:question];\n\
    \        [alert setInformativeText:info];\n        [alert addButtonWithTitle:quitButton];\n\
    \        [alert addButtonWithTitle:cancelButton];\n\n        NSInteger answer\
    \ = [alert runModal];\n\n        if (answer == NSAlertAlternateReturn) {\n   \
    \         return NSTerminateCancel;\n        }\n    }\n\n    return NSTerminateNow;\n\
    }\n```\n\n与`persistentStoreCoordinator`方法类似，我们将逐段分析这段代码。首先，它检查是否确实存在需要处理的`managedObjectContext`。如果不存在，则立即返回`NSTerminateNow`，应用程序终止。如果存在`managedObjectContext`，则通知上下文提交所有待处理的更改。\n"
- fmt: "如果失败，它会记录一条错误消息并返回`NSTerminateCancel`，这会使应用程序中止当前的终止过程并继续其正常操作。然后，它会检查`managedObjectContext`是否实际有任何待处理的更改，如果没有，则返回`NSTerminateNow`。最后，它会执行关键步骤，指示上下文保存其更改。如果保存失败，则会触发最终的大的条件块。该块会构造一个`NSAlert`，它是一种特殊的窗口类型，会出现在所有其他应用程序窗口的前面，并强制您通过点击按钮做出选择（您将在[第11章](#9781430245421_Ch11.xhtml)中了解更多关于`NSAlert`和其他窗口的信息）。在这种情况下，它会告知用户他们的更改未被保存，并询问他们是选择“无论如何退出应用程序”还是“取消终止并返回正常状态”。根据此请求的返回值，它要么返回`NSTerminateCancel`，要么“直接通过”并返回`NSTerminateNow`。\n\
    \n是时候指出此方法中的一个小错误了：在接近末尾处，当方法检查“取消”按钮是否被按下时，它实际上是将`answer`与错误的值进行比较。它应该是`NSAlertSecondButtonReturn`，而不是`NSAlertAlternateReturn`。这可能不是什么大问题，并且我们不会为示例应用程序费心去修复它，但逻辑中的这个错误使得当应用程序处于特定的无效状态时无法避免退出。哎呀！\n\
    \n一个值得注意的有趣之处是此方法中使用了`NSLocalizedString`。`NSLocalizedString`是一种让我们的代码在可用时使用本地化资源的简单方式。它是一个C函数，接受两个参数：一个默认字符串和一个用于查找本地化字符串的键。例如，在`NSLocalizedString(@\"\
    Cancel\", @\"Cancel button title\")`这样的调用中，`NSLocalizedString`会首先检查用户偏好的语言，然后检查是否存在以`@\"\
    Cancel button title\"`为键的该语言的本地化字符串，如果存在则返回它。否则，它只会返回第一个参数`@\"Cancel\"`。\n\n##\
    \ 添加业务逻辑\n\n既然我们已经了解了使用Core Data构建应用程序的基本思路，包括定义模型、配置GUI以及了解项目中模板提供的代码，现在是时候学习如何使用Core\
    \ Data在我们的模型对象中实际实现一些“有趣”的功能了：即我们应用程序的“业务逻辑”。\n\n部分业务逻辑直接在模型文件中指定，例如整数的`min`和`max`大小，而有些功能则需要一些代码。幸运的是，`NSManagedObject`提供了一些“钩子”，让我们可以测试对象的属性以验证它们并确保它们没问题。然而，为了使用这些钩子，我们首先需要创建一个`NSManagedObject`的子类来表示我们的`MythicalPerson`实体。到目前为止，我们一直使用的是`NSManagedObject`本身，但要添加代码，我们需要创建一个子类。\n\
    \n### 创建MythicalPerson类\n\nXcode会愉快地为我们创建`NSManagedObject`的子类。为此，请点击 File ![image](images/arrow.jpg)\
    \ New ![image](images/arrow.jpg) File（或按 ![images](images/arrow3.jpg)N）。在模板选择器中，从左侧的\
    \ OS X 部分选择 *Core Data*。然后，在主窗口中选择 *NSManagedObject subclass*。点击 Next。在出现的表格视图中，勾选`MythBase`的复选框，这表示我们将创建一个与`MythBase`数据模型中描述的实体一起工作的`NSManagedObject`子类。点击\
    \ Next。下一个选择是指定要为哪个实体创建`NSManagedObject`类。由于我们只定义了一个实体，这里只有一个选择：`MythicalPerson`。勾选它，然后点击\
    \ Next。最后，系统会询问我们将文件保存到哪里。文件面板应默认指向`MythBase`的主目录，这正是我们想要的位置。\n\n保持其他选项为默认值，并点击\
    \ Create。现在我们有了一个`MythicalPerson.h`和一个`MythicalPerson.m`文件可供使用。\n\n`MythicalPerson.h`文件内容如下：\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
    @interface MythicalPerson : NSManagedObject\n\n@property (nonatomic, retain) id\
    \ depiction;\n@property (nonatomic, retain) NSString * details;\n@property (nonatomic,\
    \ retain) NSNumber * divinity;\n@property (nonatomic, retain) NSNumber * goodness;\n\
    @property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
    \ NSNumber * power;\n\n@end\n```\n\n我们为模型中定义的每个实体属性都提供了属性，并为其内容指定了合适的类。\n\n在`MythicalPerson.m`文件中，我们看到以下内容：\n\
    \n```objc\n#import \"MythicalPerson.h\"\n\n@implementation MythicalPerson\n\n\
    @dynamic depiction;\n@dynamic details;\n@dynamic divinity;\n@dynamic goodness;\n\
    @dynamic name;\n@dynamic power;\n\n@end\n```\n\n我们之前没有见过`@dynamic`指令。这告诉Xcode，即使我们没有包含`@synthesize`指令，也不要自动合成它们，并且当它找不到访问器方法的实现时，不要产生警告。Core\
    \ Data 会在运行时生成相应的访问器。\n\n## 验证单个属性\n\n假设我们想为`MythBase`添加一个特殊约束，以确保任何`MythicalPerson`都不能被命名为“Bob”。为此，我们只需将此处显示的方法添加到`MythicalPerson.m`的`@implementation`部分：\n\
    \n```objc\n- (BOOL)validateName:(id *)ioValue error:(NSError **)outError {\n \
    \ if (*ioValue == nil) {\n    return YES;\n  }\n  if ([*ioValue isEqualToString:@\"\
    Bob\"]) {\n    if (outError != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
    \        @\"You're not allowed to name a mythical person 'Bob'.  \"\n        \
    \  \" 'Bob' is a real person, just like you and me.\",\n        @\"validation:\
    \ invalid name error\");\n      NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \        forKey:NSLocalizedDescriptionKey];\n      NSError *error = [[NSError\
    \ alloc] initWithDomain:@\"MythicalPersonErrorDomain\"\n        code:13013 userInfo:userInfoDict];\n\
    \      *outError = error;\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\
    \n请注意此方法的名字`validateName:error:`。这个命名约定来自于在Cocoa中无处不在的键值编码模型。Core Data中的属性验证是通过使用名为`validate<Key>:error:`的方法来实现的。在将更改保存到数据存储时，会（如果存在的话）在每个托管对象上调用这些方法。在此方法中，我们应检查建议的值，如果没问题则返回`YES`。如果不是，则返回`NO`，并且还应该创建一个描述错误的`NSError`对象，并将传入的`NSError\
    \ **`指向它。请注意，在创建错误时，我们需要指定一个标识错误名称的字符串和一个指明具体是哪个错误的整数。在一个更大的应用程序中，最好以某种方式标准化这些值。这样做可以帮助我们追踪用户可能报告的错误，还可以让我们捕获一些重复出现的错误并单独处理它们（例如，在应用控制器的`saveAction:`方法中）。我们将在[第12章](#9781430245421_Ch12.xhtml)中进一步讨论这一点。\n\
    \n至此，我们可以编译并运行`MythBase`，一切应该和之前一样……直到我们将某个`MythicalPerson`的名字改为“Bob”并尝试保存更改，此时我们会被告知这是一个无效值。\n\
    \n## 验证多个属性\n\n有时，我们需要能够同时验证多个属性，确保它们的组合有意义。"
  raw: 'If that fails, it logs an error message and returns `NSTerminateCancel`, which
    makes the application abort the current termination procedure and just continue
    about its business. Then it checks to see whether the `managedObjectContext` actually
    has any pending changes, and if it doesn’t, it returns `NSTerminateNow`.    Finally,
    it does the big step of telling the context to save its changes. If the save fails,
    then the final big conditional block is triggered. That block constructs an `NSAlert`,
    a special type of window that appears in front of all other application windows
    and forces you to make a choice by clicking a button (you’ll learn more about
    `NSAlert` and other windows in [Chapter 11](#9781430245421_Ch11.xhtml)). In this
    case, it tells the user that their changes were not saved, and asks them to choose
    whether to quit the app anyway or cancel the termination and go back to normal.
    Depending on the return value from this request, it either returns `NSTerminateCancel`
    or “falls through” and returns `NSTerminateNow`.    Time to point out a small
    bug in this method: near the end, when the method checks to see if the Cancel
    button was pressed, it’s actually comparing answer to the wrong value. It should
    be `NSAlertSecondButtonReturn` instead of `NSAlertAlternateReturn`. Not such a
    big deal perhaps, and we won’t bother to fix it for our sample app, but this error
    in the logic makes it impossible to avoid quitting when the app is in a particular
    invalid state. Oops!    One interesting thing to note is the use of `NSLocalizedString`
    in this method. `NSLocalizedString` is a simple way to let our code use localized
    resources if present. It’s a C function that takes two arguments: a default string
    and a key used for looking up a localized string. For instance, in a call like
    `NSLocalizedString(@"Cancel", @"Cancel button title")`, `NSLocalizedString` will
    first check to see which language the user prefers, then check to see if there
    exists a localized string for that language, keyed off @“Cancel button title”,
    and if so, returns it. Otherwise, it will just return the first parameter, @”Cancel”.    Adding
    Business Logic    Now that we’ve seen the basic idea of constructing an application
    with Core Data, including defining the model, configuring the GUI, and knowing
    our way around the template-provided code in our project, it’s time to learn a
    bit about how to use Core Data to actually implement something “interesting” in
    our model objects: our application’s “business logic.”    Some amount of business
    logic is specified right in the model file, such as an integer’s `min` and `max`
    size, while some things require a bit of code. Fortunately, `NSManagedObject`
    provides several “hooks” into spots where we can test our objects’ attributes
    to validate them and make sure they’re okay. In order for us to make use of these,
    however, we first need to make a subclass of `NSManagedObject` to represent our
    MythicalPerson entity. Up until now, we’ve used `NSManagedObject` itself, but
    to add code we need to make a subclass.    Making The MythicalPerson Class    Xcode
    will merrily make a subclass of `NSManagedObject` for us. To do so, click on File
    ![image](images/arrow.jpg) New ![image](images/arrow.jpg) File (or press ![images](images/arrow3.jpg)N).
    In the template selector, choose *Core Data* from the OS X section on the left.
    Then, select *NSManagedObject subclass* from the main window. Click Next. In the
    table view that appears, check the checkbox for MythBase, which indicates that
    we’re making an `NSManagedObject` subclass that will work with the entities described
    in the MythBase data model. Click Next. The next choice is to indicate for which
    entity we’re making an `NSManagedObject` class. Since we’ve only defined one entity,
    there’s only one choice here, MythicalPerson. Check that, and click Next. Lastly,
    we’re asked where to save the file. The file panel should default to the main
    directory for MythBase, which is just where we want it.


    Leave the other options at their default values, and click Create. We now have
    a `MythicalPerson.h` and `MythicalPerson.m` file to work with.    The `MythicalPerson.h`
    file looks like this:    ``` #import <Foundation/Foundation.h> #import <CoreData/CoreData.h>   @interface
    MythicalPerson : NSManagedObject  @property (nonatomic, retain) id depiction;
    @property (nonatomic, retain) NSString * details; @property (nonatomic, retain)
    NSNumber * divinity; @property (nonatomic, retain) NSNumber * goodness; @property
    (nonatomic, retain) NSString * name; @property (nonatomic, retain) NSNumber *
    power;  @end ```    We’ve got properties for each of the entity attributes we
    defined in the model, which appropriate classes for their contents.    In the
    `MythicalPerson.m` file, we find the following:    ``` #import "MythicalPerson.h"  @implementation
    MythicalPerson  @dynamic depiction; @dynamic details; @dynamic divinity; @dynamic
    goodness; @dynamic name; @dynamic power;  @end ```    We haven’t seen the `@dynamic`
    directive before. This tells Xcode to suppress warnings if it can’t find implementations
    of accessor methods, even though we didn’t include a `@synthesize` directive,
    and not to synthesize them automatically. Core Data will generate the appropriate
    accessors at runtime.    Validating Single Attributes    Let’s say we want to
    add a special constraint to MythBase to ensure that no MythicalPerson can be named
    “Bob.” To do this, we just have to add the method shown here to the `@implementation`
    section of `MythicalPerson.m`:    ``` - (BOOL)validateName:(id *)ioValue error:(NSError
    **)outError {   if (*ioValue == nil) {     return YES;   }   if ([*ioValue isEqualToString:@"Bob"])
    {     if (outError != NULL) {       NSString *errorStr = NSLocalizedString(         @"You''re
    not allowed to name a mythical person ''Bob''.  "           " ''Bob'' is a real
    person, just like you and me.",         @"validation: invalid name error");       NSDictionary
    *userInfoDict = [NSDictionary dictionaryWithObject:errorStr         forKey:NSLocalizedDescriptionKey];
          NSError *error = [[NSError alloc] initWithDomain:@"MythicalPersonErrorDomain"
            code:13013 userInfo:userInfoDict];       *outError = error;     }     return
    NO;   }   return YES; } ```    Note the name of this method, `validateName:error:`.
    This naming convention comes from the key-value coding model that’s pervasive
    in Cocoa. Attribute validation in Core Data works through the use of methods named
    `validate``>:error:`, which are called (if they exist) on each managed object
    when it’s time to save changes to the data store. Within this method, we should
    check the proposed value and return `YES` if it’s okay. If not, it returns `NO`
    and should also create an `NSError` object describing the error, setting the passed-in
    `NSError`** to point at it. Note that when creating the error we need to specify
    a string identifying the error name and an integer specifying just which error
    it was. In a larger application, it’s a good idea to standardize these values
    in some way. Doing so can help us track down errors that users may report and
    can also give us a way to catch some recurring errors and handle them individually
    (for instance, in the app controller’s `saveAction:` method). We’ll talk about
    this more in [Chapter 12](#9781430245421_Ch12.xhtml).    At this point, we can
    compile and run MythBase, and everything should work the same as before… up until
    when we change a MythicalPerson’s name to “Bob” and try to save our changes, at
    which point we’ll be warned that it’s an invalid value.    Validating Multiple
    Attributes    Sometimes we’ll need to be able to validate several attributes at
    once, making sure that they make sense together.'
  trans: "\n如果失败，它会记录一条错误消息并返回`NSTerminateCancel`，这会使应用程序中止当前的终止过程并继续其正常操作。然后，它会检查`managedObjectContext`是否实际有任何待处理的更改，如果没有，则返回`NSTerminateNow`。最后，它会执行关键步骤，指示上下文保存其更改。如果保存失败，则会触发最终的大的条件块。该块会构造一个`NSAlert`，它是一种特殊的窗口类型，会出现在所有其他应用程序窗口的前面，并强制您通过点击按钮做出选择（您将在第\
    \ 11 章中了解更多关于`NSAlert`和其他窗口的信息）。在这种情况下，它会告知用户他们的更改未被保存，并询问他们是选择“无论如何退出应用程序”还是“取消终止并返回正常状态”。根据此请求的返回值，它要么返回`NSTerminateCancel`，要么“直接通过”并返回`NSTerminateNow`。\n\
    \n是时候指出此方法中的一个小错误了：在接近末尾处，当方法检查“取消”按钮是否被按下时，它实际上是将`answer`与错误的值进行比较。它应该是`NSAlertSecondButtonReturn`，而不是`NSAlertAlternateReturn`。这可能不是什么大问题，并且我们不会为示例应用程序费心去修复它，但逻辑中的这个错误使得当应用程序处于特定的无效状态时无法避免退出。哎呀！\n\
    \n一个值得注意的有趣之处是此方法中使用了`NSLocalizedString`。`NSLocalizedString`是一种让我们的代码在可用时使用本地化资源的简单方式。它是一个\
    \ C 函数，接受两个参数：一个默认字符串和一个用于查找本地化字符串的键。例如，在`NSLocalizedString(@\"Cancel\", @\"Cancel\
    \ button title\")`这样的调用中，`NSLocalizedString`会首先检查用户偏好的语言，然后检查是否存在以`@\"Cancel button\
    \ title\"`为键的该语言的本地化字符串，如果存在则返回它。否则，它只会返回第一个参数`@\"Cancel\"`。\n\n## 添加业务逻辑\n\n\
    既然我们已经了解了使用 Core Data 构建应用程序的基本思路，包括定义模型、配置 GUI 以及了解项目中模板提供的代码，现在是时候学习如何使用 Core\
    \ Data 在我们的模型对象中实际实现一些“有趣”的功能了：即我们应用程序的“业务逻辑”。\n\n部分业务逻辑直接在模型文件中指定，例如整数的`min`和`max`大小，而有些功能则需要一些代码。幸运的是，`NSManagedObject`提供了一些“钩子”，让我们可以测试对象的属性以验证它们并确保它们没问题。然而，为了使用这些钩子，我们首先需要创建一个`NSManagedObject`的子类来表示我们的`MythicalPerson`实体。到目前为止，我们一直使用的是`NSManagedObject`本身，但要添加代码，我们需要创建一个子类。\n\
    \n### 创建 MythicalPerson 类\n\nXcode 会愉快地为我们创建`NSManagedObject`的子类。为此，请点击 File ![image](img/arrow.jpg)\
    \ New ![image](img/arrow.jpg) File（或按 ![images](img/arrow3.jpg)N）。在模板选择器中，从左侧的\
    \ OS X 部分选择 *Core Data*。然后，在主窗口中选择 *NSManagedObject subclass*。点击 Next。在出现的表格视图中，勾选`MythBase`的复选框，这表示我们将创建一个与`MythBase`数据模型中描述的实体一起工作的`NSManagedObject`子类。点击\
    \ Next。下一个选择是指定要为哪个实体创建`NSManagedObject`类。由于我们只定义了一个实体，这里只有一个选择：`MythicalPerson`。勾选它，然后点击\
    \ Next。最后，系统会询问我们将文件保存到哪里。文件面板应默认指向`MythBase`的主目录，这正是我们想要的位置。\n\n保持其他选项为默认值，并点击\
    \ Create。现在我们有了一个`MythicalPerson.h`和一个`MythicalPerson.m`文件可供使用。\n\n`MythicalPerson.h`文件内容如下：\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
    @interface MythicalPerson : NSManagedObject\n\n@property (nonatomic, retain) id\
    \ depiction;\n@property (nonatomic, retain) NSString * details;\n@property (nonatomic,\
    \ retain) NSNumber * divinity;\n@property (nonatomic, retain) NSNumber * goodness;\n\
    @property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain)\
    \ NSNumber * power;\n\n@end\n```\n\n我们为模型中定义的每个实体属性都提供了属性，并为其内容指定了合适的类。\n\n在`MythicalPerson.m`文件中，我们看到以下内容：\n\
    \n```objc\n#import \"MythicalPerson.h\"\n\n@implementation MythicalPerson\n\n\
    @dynamic depiction;\n@dynamic details;\n@dynamic divinity;\n@dynamic goodness;\n\
    @dynamic name;\n@dynamic power;\n\n@end\n```\n\n我们之前没有见过`@dynamic`指令。这告诉 Xcode，即使我们没有包含`@synthesize`指令，也不要自动合成它们，并且当它找不到访问器方法的实现时，不要产生警告。Core\
    \ Data 会在运行时生成相应的访问器。\n\n## 验证单个属性\n\n假设我们想为`MythBase`添加一个特殊约束，以确保任何`MythicalPerson`都不能被命名为“Bob”。为此，我们只需将此处显示的方法添加到`MythicalPerson.m`的`@implementation`部分：\n\
    \n```objc\n- (BOOL)validateName:(id *)ioValue error:(NSError **)outError {\n \
    \ if (*ioValue == nil) {\n    return YES;\n  }\n  if ([*ioValue isEqualToString:@\"\
    Bob\"]) {\n    if (outError != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
    \        @\"You're not allowed to name a mythical person 'Bob'.  \"\n        \
    \  \" 'Bob' is a real person, just like you and me.\",\n        @\"validation:\
    \ invalid name error\");\n      NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \        forKey:NSLocalizedDescriptionKey];\n      NSError *error = [[NSError\
    \ alloc] initWithDomain:@\"MythicalPersonErrorDomain\"\n        code:13013 userInfo:userInfoDict];\n\
    \      *outError = error;\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\
    \n请注意此方法的名字`validateName:error:`。这个命名约定来自于在 Cocoa 中无处不在的键值编码模型。Core Data 中的属性验证是通过使用名为`validate<Key>:error:`的方法来实现的。在将更改保存到数据存储时，会（如果存在的话）在每个托管对象上调用这些方法。在此方法中，我们应检查建议的值，如果没问题则返回`YES`。如果不是，则返回`NO`，并且还应该创建一个描述错误的`NSError`对象，并将传入的`NSError\
    \ **`指向它。请注意，在创建错误时，我们需要指定一个标识错误名称的字符串和一个指明具体是哪个错误的整数。在一个更大的应用程序中，最好以某种方式标准化这些值。这样做可以帮助我们追踪用户可能报告的错误，还可以让我们捕获一些重复出现的错误并单独处理它们（例如，在应用控制器的`saveAction:`方法中）。我们将在第\
    \ 12 章中进一步讨论这一点。\n\n至此，我们可以编译并运行`MythBase`，一切应该和之前一样……直到我们将某个`MythicalPerson`的名字改为“Bob”并尝试保存更改，此时我们会被告知这是一个无效值。\n\
    \n## 验证多个属性\n\n有时，我们需要能够同时验证多个属性，确保它们的组合有意义。\n"
- fmt: "For example, let’s say that we decide on a new constraint for each `MythicalPerson`:\
    \ the value of the `power` attribute can only exceed 50 if the value of the `divinity`\
    \ attribute is 100 (meaning that only a person operating in full “god mode” can\
    \ have a `power` level above 50). Rather than check for this condition in `validatePower:error:`\
    \ or `validateDivinity:error:`, the recommended procedure is to check for this\
    \ in two other validation methods that are called whenever a new managed object\
    \ is created, or edited: `validateForInsert:`, and `validateForUpdate:`. Because\
    \ we’re going to check for the same internal consistency problem (where `power\
    \ > 50` and `divinity < 100`) in both spots, we’ll put that check into a method\
    \ of our own, `validateConsistency:`, which is called by the other two.\n\nFirst,\
    \ let’s implement the two Core Data validation methods in `MythicalPerson.m`:\n\
    \n```\n- (BOOL)validateForInsert:(NSError **)error {\n  BOOL propertiesValid =\
    \ [super validateForInsert:error];\n  BOOL consistencyValid = [self validateConsistency:error];\n\
    \  return (propertiesValid && consistencyValid);\n}\n\n- (BOOL)validateForUpdate:(NSError\
    \ **)error {\n  BOOL propertiesValid = [super validateForUpdate:error];\n  BOOL\
    \ consistencyValid = [self validateConsistency:error];\n  return (propertiesValid\
    \ && consistencyValid);\n}\n```\n\nThese methods both work in the same way. First,\
    \ they call the superclass’s version of the same method; that’s very important\
    \ because that’s the method that actually calls all of the `validate:error:` methods\
    \ for each changed attribute. Then our own `validateConsistency:` method is called.\
    \ If the return values for both of these calls return `YES`, then the method itself\
    \ returns `YES`; otherwise it returns `NO`.\n\nNow let’s see what `validateConsistency:`\
    \ looks like.\n\n```\n- (BOOL)validateConsistency:(NSError **)error {\n  int divinity\
    \ = [[self valueForKey:@\"divinity\"] intValue];\n  int power = [[self valueForKey:@\"\
    power\"] intValue];\n  if (divinity < 100 && power > 50) {\n    if (error != NULL)\
    \ {\n      NSString *errorStr = NSLocalizedString(\n        @\"Power cannot exceed\
    \ 50 unless divinity is 100\",\n        @\"validation: divinity / power error\"\
    );\n      NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \        forKey:NSLocalizedDescriptionKey];\n      NSError *divinityPowerError\
    \ = [[NSError alloc]\n        initWithDomain:@\"MythicalPersonErrorDomain\" code:182\n\
    \        userInfo:userInfoDict];\n      if (*error == nil) {\n        // there\
    \ was no previous error, return the new error\n        *error = divinityPowerError;\n\
    \      }\n      else {\n        // combine previous error with the new one\n \
    \       *error = [self errorFromOriginalError:*error\n          error:divinityPowerError];\n\
    \      }\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\nThis method is\
    \ a little more complicated than the single attribute validation method. We do\
    \ the same sort of checking for a problem, returning `YES` if it’s okay, and otherwise\
    \ constructing an `NSError`, setting the error parameter to point at it, and returning\
    \ `NO`. However, in order to “play nice” with Core Data, we have to check for\
    \ the existence of a pre-existing error, and if there is one, combine it with\
    \ our own into a special kind of error. This lets Core Data eventually report\
    \ back all the errors it finds when it tries to save. This error combining is\
    \ done using another method of our own, `errorFromOriginalError:error:`, which\
    \ we should add to our class.\n\n```\n- (NSError *)errorFromOriginalError:(NSError\
    \ *)originalError\n    error:(NSError *)secondError {\n  NSMutableDictionary *userInfo\
    \ = [NSMutableDictionary dictionary];\n  NSMutableArray *errors = [NSMutableArray\n\
    \    arrayWithObject:secondError];\n\n  if ([originalError code] == NSValidationMultipleErrorsError)\
    \ {\n    [userInfo addEntriesFromDictionary:[originalError userInfo]];\n    [errors\
    \ addObjectsFromArray:[userInfo\n      objectForKey:NSDetailedErrorsKey]];\n \
    \ }\n  else {\n    [errors addObject:originalError];\n  }\n  [userInfo setObject:errors\
    \ forKey:NSDetailedErrorsKey];\n  return [NSError errorWithDomain:NSCocoaErrorDomain\n\
    \                             code:NSValidationMultipleErrorsError\n         \
    \                userInfo:userInfo];\n}\n```\n\nBasically, this method checks\
    \ the `originalError` parameter to see if it already contains multiple errors,\
    \ and if so, just adds the new one to the list. Otherwise, it combines the two\
    \ single errors into a new multiple error object.\n\nWith all that in place, we\
    \ should now be able to compile and run, select a `MythicalPerson`, set their\
    \ `power` above 50, their `divinity` below 100, and try to save. We’ll see an\
    \ error telling us about the problem. We can also make sure that reporting of\
    \ multiple problems works by leaving this power/divinity inconsistency in place,\
    \ changing the name to “Bob,” and trying to save. We should see a warning panel\
    \ telling us that multiple validation errors occurred, but we won’t see details\
    \ about any of them. This suggests a good idea for a future expansion of the app\
    \ delegate’s `saveAction:` and `applicationShouldTerminate:` methods: come up\
    \ with a way to display multiple errors instead of just calling `presentError:`\
    \ as is currently done. There’s something to tackle on a rainy day!\n\n## Creating\
    \ a Custom Attribute\n\nAnother common sort of simple “business logic” calls for\
    \ the creation of custom attributes that are based on the values contained in\
    \ an object’s attributes. For example, if we have an entity with `firstName` and\
    \ `lastName` attributes, we might want to make a custom attribute called `fullName`\
    \ that combines the two together.\n\nThis sort of thing is a piece of cake with\
    \ Core Data. In our case, let’s say we want to add an attribute to `MythicalPerson`\
    \ called `awesomeness`, which will be calculated from the `MythicalPerson`’s `power`,\
    \ `divinity`, and `goodness`. We start off by defining a method called `awesomeness`\
    \ in `MythicalPerson`’s implementation:\n\n```\n- (int)awesomeness {\n  int awesomeness\
    \ = [[self valueForKey:@\"divinity\"] intValue] * 10 +\n    [[self valueForKey:@\"\
    power\"] intValue] * 5 +\n    [[self valueForKey:@\"goodness\"] intValue];\n \
    \ return awesomeness;\n}\n```\n\nWith that in place, we can call the `awesomeness`\
    \ method on any `MythicalPerson` and get the result. This also works with Cocoa\
    \ bindings, of course, so we can easily bind a GUI control’s value to this new\
    \ property. Go back to Xcode, make the window and box a little bigger, and add\
    \ a label and a level indicator from the Library window, something similar to\
    \ [Figure 8-12](#9781430245421_Ch08.xhtml#Fig12).\n\n![9781430245421_Fig08-12.jpg](images/9781430245421_Fig08-12.jpg)\n\
    \n[Figure 8-12](#9781430245421_Ch08.xhtml#_Fig12). MythBase, now with added Awesomeness\n\
    \nNow select the Awesomeness control, and bring up the *Attributes Inspector*.\
    \ Set the *Style* to Continuous, and the *Minimum* and *Maximum* to 0 and 1600,\
    \ respectively. Now switch to the *Bindings Inspector*, and bind the level indicator’s\
    \ Value via the Mythical Person Array Controller, with the controller key “selection”\
    \ and the model key “awesomeness”. Xcode doesn’t know anything about Awesomeness,\
    \ so we’ll have to type it in ourselves instead of just picking it from the combo\
    \ box; we’re sure you’ll agree that’s a small price to pay for awesomeness.\n\n\
    Save the changes, switch back to Xcode, click Run, and off we go. Switch between\
    \ different rows in the table view and see the bar of awesomeness change."
