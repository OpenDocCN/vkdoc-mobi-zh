    the same time, as shown in [Figure 15-9](#9781430245421_Ch15.xhtml#Fig9).    ![9781430245421_Fig15-09.jpg](images/9781430245421_Fig15-09.jpg)    [Figure
    15-9](#9781430245421_Ch15.xhtml#_Fig9). The first “page” is sliding into view.
    Note the slightly grayed-out appearance of the objects in the box, which are all
    at about 50 percent opacity at this point    That’s a start! Now let’s move on
    to the next item in the list: providing an implementation for the `next:` method.
    Some of this code is similar to what we had in the `applicationDidFinishLaunching:`
    method. We prepare the right side, start some transitions (including a call to
    another new internal method, `transitionOutToLeft`, which we’ll get to soon),
    and update an index (including another bounds check) and some pointers at the
    end.


    The biggest difference here is that the methods that are going to do animation
    are all sandwiched between calls to `[NSAnimationContext beginGrouping]` and `[NSAnimationContext
    endGrouping]`, which work together to form a sort of transaction. Between those
    two calls, any animations that are added to the default animation context, including
    all implicit animations, will be set up to run simultaneously. This means that
    as we create implicit animations in our internal methods, they will all be set
    up to fire off simultaneously. Without this step, the animations we create would
    all start running in sequence, one after another as they’re created. Normally
    this won’t make much of a difference, but it’s entirely possible that some unexpected
    event could occur just as those animations are being created, such as another
    process suddenly hogging the CPU, which could lead to these animations running
    in a slightly staggered manner, starting and ending at different times. By wrapping
    them in a grouping as shown here, that potential problem is eliminated.    ```
    - (IBAction)next:(id)sender {     [self prepareRightSide];            [NSAnimationContext
    beginGrouping];     [[NSAnimationContext currentContext] setDuration:ANIM_DURATION];
        [self transitionInFromRight];     [self transitionOutToLeft];     [NSAnimationContext
    endGrouping];            self.currentTabIndex++;     if (self.currentTabIndex
