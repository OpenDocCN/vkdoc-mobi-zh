- fmt: '# Adding an Image View


    No villain-tracking application would be complete without a way to display the
    villain’s cruel visage. In VillainTracker, we’ll use an instance of the `NSImageView`
    class both to display a picture of the villain and to receive a picture as input
    via the Mac’s drag-and-drop mechanism.


    Go back to the Object Library pane, and type “image” in the Search field. One
    of the results is listed as an Image Well, and this is in fact an instance of
    `NSImageView`. Drag one of these over to our window, and place it a bit to the
    right of the matrix of radio buttons from the last section.


    Now, that image well is pretty tiny, so let’s make it bigger. Bring up the *Size
    Inspector* (![image](images/arrow2.jpg)5); note that the image well’s width and
    height are both 48. Edit each of those, changing them to 96, and the control’s
    size will change in the window. We want to let the user drag an image into this
    view, so we also need to bring up the *Attributes Inspector* (![image](images/arrow2.jpg)4)
    and click to enable the *Editable* checkbox.


    Now adjust the position of the image well by dragging it a little within its window.
    The blue guidelines will pop up; note that this control is now the same vertical
    height as the matrix of radio buttons to its left. Put them side by side, then
    duplicate another label, put it a bit above and to the left of the image view,
    and change its title to “Appearance:”. See [Figure 5-9](#9781430245421_Ch05.xhtml#Fig9)
    for a rough idea of the layout at this point.


    ![9781430245421_Fig05-09.jpg](images/9781430245421_Fig05-09.jpg)


    [Figure 5-9](#9781430245421_Ch05.xhtml#_Fig9). An image well is now in place


    # Adding Checkboxes in a Matrix


    Now we’ll add a series of checkboxes to let the user check off each villain’s
    powers and abilities. As in the case of the villain’s primary motivation, we’ll
    create a classification system in which all types of supervillain powers can be
    pigeonholed into a category. Once again we will use a matrix, but this time filled
    with checkboxes instead of radio buttons.


    Go the *Object Library* again, and type “check” into the Search field. One of
    the results will be labeled *Check Box*. Grab one of those and pull it into the
    window. This places an `NSButton` configured to work as a checkbox into the window.
    We’re going to want four of these, lined up in a matrix, but right now we’ve only
    got this single one. Time to learn about a handy shortcut in Interface Builder
    mode that lets us automatically take any object that can appear in an `NSMatrix`,
    such as an `NSButton`, and replace it with a new `NSMatrix` containing a cell
    configured the same as the original object. Simply select the object (the checkbox),
    then in the menu choose **Editor** ![image](images/arrow.jpg) **Embed In** ![image](images/arrow.jpg)
    **Matrix**. The checkbox is now wrapped up in a matrix, and we can use the same
    resizing trick we learned for the matrix containing the radio buttons: hold down
    Option, click on the bottom-center resize handle, and drag downwards until there
    are four checkboxes.


    Next, let’s configure this new matrix to work correctly with a group of checkboxes.
    Select the matrix itself (not one of the checkboxes inside of it), and bring up
    the *Attributes Inspector* (![image](images/arrow2.jpg)4) in the Utility area.
    Verify that we’ve got the matrix selected by noting the name displayed at the
    top of the inspector—it should say Matrix, not Button Cell. At the top of the
    Inspector window is a pop-up button labeled *Mode*. If it isn’t already set to
    *Highlight*, we’ll change it to that so we get the correct behavior.


    Now fill the checkbox titles with the following (admittedly incomplete) list of
    abilities: “Evil Genius,” “Mind Reader,” “Nigh-invulnerable,” “Weather Control.”
    While clicking around to set these values, we may inadvertently turn checkboxes
    on and off. We don’t need to worry about that; the states of all those checkboxes
    will be set from the code itself.


    Just like with the matrix of radio buttons, we’ll need to make the matrix a little
    wider so that the full text of the buttons can be seen. Drag the center-right
    resize handle out until all the text is visible.


    Now it’s time to set tags for all of these checkboxes, just like we set tags for
    all the radio buttons for choosing the primary motivation. Click to select the
    Evil Genius cell, then open the *Attributes Inspector* (![image](images/arrow2.jpg)4),
    and set the tag to 0. Then click the Mind Reader cell, and set its tag to 1. Continue
    through the rest of the checkboxes, ending by giving the Weather Control checkbox
    a tag of 3. At this point, we should now have something similar to [Figure 5-10](#9781430245421_Ch05.xhtml#Fig10).


    ![9781430245421_Fig05-10.jpg](images/9781430245421_Fig05-10.jpg)


    [Figure 5-10](#9781430245421_Ch05.xhtml#_Fig10). Preparing for the worst of the
    worst


    # Configuring a Pop-up Button


    Now we’ll deal with the villain’s power source, using a pop-up button to let the
    user select from a predefined list in order to specify how the villain got his
    powers. Once again, we’ll supply a few choices: “Innate” (the villain was born
    with it), “Freak Accident” (some “act of God” such as a lab explosion, meteor
    strike, or similar caused a transformation), “Superhero Action” (a superhero in
    the course of their heroics accidentally empowers someone else), and “Other.”


    Go to the *Object Library* window again, and enter “popup” into the Search field.
    Grab a Pop Up Button from the Search results, and drag it into the window, placing
    it a bit below the checkbox matrix from the previous section. By clicking and
    then double-clicking the new pop-up button, we can see the default list of values
    that can be selected. Double-click the first one to edit its text, changing it
    to “Innate.” Continue for the rest of the titles, entering the names mentioned
    above. After entering the third one, we’re out of button values; the default pop-up
    button has only three values. Click one of the three values, duplicate it by pressing
    ![images](images/arrow3.jpg)D, and then enter the final value. Now grab another
    label, put it in place to the left of this pop-up button, and change its title
    to “Source of Powers:”.


    # Inserting a Text View


    Now it’s time for the final control, a text view for editing free-form notes about
    the villain in question. We’ll be using `NSTextView`, a powerful class for text
    display and editing that is used throughout the Mac OS X interface. Grab the resize
    handle on the outline of the window in the Interface Builder canvas, and drag
    down to make the window larger. Some of the fields might go with it; reposition
    them back where they should be after resizing. We can select multiple elements
    by shift-clicking or by dragging out a selection rectangle across the ones that
    we want to move.


    Once we’ve got some space, enter “text view” in the *Object Library* pane’s Search
    field, and drag the resulting text view into our window, below all the other elements.
    Resize it to fill most of the available space. The window layout should now look
    something like [Figure 5-11](#9781430245421_Ch05.xhtml#Fig11).


    ![9781430245421_Fig05-11.jpg](images/9781430245421_Fig05-11.jpg)


    [Figure 5-11](#9781430245421_Ch05.xhtml#_Fig11). All the controls are now in the
    window


    # Making Logical Groupings


    Now that all the controls we need are laid out in the window, let’s take a step
    back and see where we stand. [Figure 5-11](#9781430245421_Ch05.xhtml#Fig11) probably
    looks similar to the interface we have right now.


    It may be functional, and clearly labeled, but it’s not going to win any design
    awards, that’s for sure. Our interface exposes a lot of functionality, but the
    controls are all sort of jammed together, and it’s hard to see any logical groupings
    of all these editable attributes.'
