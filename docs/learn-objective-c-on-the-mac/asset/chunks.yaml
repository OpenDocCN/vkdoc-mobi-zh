    in the main window if it’s not already visible) and bring up the *Size Inspector*
    (![image](images/arrow2.jpg)5). Change the window size to 731 by 321, then switch
    to the *Attributes Inspector* (![image](images/arrow2.jpg)4) and click to turn
    off the *Resize* checkbox, which will give us one less thing to worry about. This
    application displays a limited data set, so there’s no reason for the user to
    make the window any bigger. We’re now going to create three sets of GUI components,
    one set for each of the three types of data we’re dealing with. We’ll manually
    lay out the first set, and then duplicate it for the other two.    First, we’ll
    create a text field inside a box for displaying results. Go to the *Object Library*
    pane and enter “nsbox” into the Search field. Look for the box in the results,
    and drag one of these out to our window. While the new box is selected, switch
    back to the *Size Inspector*, and set the box’s size to width 227 by height 247\.
    While we’re at it, go ahead and set each of its X and Y values to 20\. This puts
    the box in the lower-left corner of the window, about in the position it would
    be in if we dragged it to the lower left and let it sit where the blue guidelines
    recommend. Then switch back to the *Attributes Inspector*, and set the *Title
    Position* to None so that the title won’t be shown.    Now, go back to the *Object
    Library* pane and enter “label” in the Search box. One of the results is Wrapping
    Label; grab that, drag it so that it is directly overlapping the box we created,
    and let go. Doing this puts it inside the box. Once it’s there, expand the label
    to fill the box, by first dragging its bottom left corner down to the lower left,
    then dragging its top right corner to the upper right. In both cases, the blue
    guidelines will show up when we’re just the right distance from the edge of the
    box. Finally, triple-click to select the text (“Multiline Label”) in the text
    field, and press Backspace or Delete to clear out the text.    Let’s top this
    box off by adding the button that will eventually put some text into the text
    field we just created. Find a button in the *Object Library* (a push button will
    do nicely), and drag it out to a spot just above the box. During the drag, the
    blue lines will appear, showing us the correct distance from the top of the window,
    and also showing us when the button is lined up directly above the center of the
    box. That’s where we want to drop it! Double-click the button to edit its title,
    and change it to “Generate Character.” Depending on how the resizing constraints
    have been set up, we may need to reset the size of the box afterwards. [Figure
    7-8](#9781430245421_Ch07.xhtml#Fig8) shows what we should be seeing at this point.    ![9781430245421_Fig07-08.'
