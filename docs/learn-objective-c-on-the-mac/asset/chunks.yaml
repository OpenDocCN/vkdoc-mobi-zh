    **)error {   int divinity = [[self valueForKey:@"divinity"] intValue];   int power
    = [[self valueForKey:@"power"] intValue];   if (divinity < 100 && power > 50)
    {     if (error != NULL) {       NSString *errorStr = NSLocalizedString(         @"Power
    cannot exceed 50 unless divinity is 100",         @"validation: divinity / power
    error");       NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr
            forKey:NSLocalizedDescriptionKey];       NSError *divinityPowerError =
    [[NSError alloc]         initWithDomain:@"MythicalPersonErrorDomain" code:182
            userInfo:userInfoDict];       if (*error == nil) {         // there was
    no previous error, return the new error         *error = divinityPowerError;       }
          else {         // combine previous error with the new one         *error
    = [self errorFromOriginalError:*error           error:divinityPowerError];       }
        }     return NO;   }   return YES; } ```    This method is a little more complicated
    than the single attribute validation method. We do the same sort of checking for
    a problem, returning `YES` if it’s okay, and otherwise constructing an `NSError`,
    setting the error parameter to point at it, and returning `NO`. However, in order
    to “play nice” with Core Data, we have to check for the existence of a pre-existing
    error, and if there is one, combine it with our own into a special kind of error.
    This lets Core Data eventually report back all the errors it finds when it tries
    to save. This error combining is done using another method of our own, `errorFromOriginalError:error:`,
    which we should add to our class.


    ``` - (NSError *)errorFromOriginalError:(NSError *)originalError    error:(NSError
    *)secondError {   NSMutableDictionary *userInfo = [NSMutableDictionary dictionary];
      NSMutableArray *errors = [NSMutableArray     arrayWithObject:secondError];    if
    ([originalError code] == NSValidationMultipleErrorsError) {     [userInfo addEntriesFromDictionary:[originalError
    userInfo]];     [errors addObjectsFromArray:[userInfo       objectForKey:NSDetailedErrorsKey]];
      }   else {     [errors addObject:originalError];   }   [userInfo setObject:errors
    forKey:NSDetailedErrorsKey];   return [NSError errorWithDomain:NSCocoaErrorDomain
                                 code:NSValidationMultipleErrorsError                         
    userInfo:userInfo]; } ```    Basically, this method checks the `originalError`
    parameter to see if it already contains multiple errors, and if so, just adds
    the new one to the list. Otherwise, it combines the two single errors into a new
    multiple error object.    With all that in place, we should now be able to compile
    and run, select a MythicalPerson, set their `power` above 50, their `divinity`
    below 100, and try to save. We’ll see an error telling us about the problem. We
    can also make sure that reporting of multiple problems works by leaving this power/divinity
    inconsistency in place, changing the name to “Bob,” and trying to save. We should
    see a warning panel telling us that multiple validation errors occurred, but we
    won’t see details about any of them. This suggests a good idea for a future expansion
    of the app delegate’s `saveAction:` and `applicationShouldTerminate:` methods:
    come up with a way to display multiple errors instead of just calling `presentError:`
    as is currently done. There’s something to tackle on a rainy day!    Creating
    a Custom Attribute    Another common sort of simple “business logic” calls for
    the creation of custom attributes that are based on the values contained in an
    object’s attributes. For example, if we have an entity with `firstName` and `lastName`
    attributes, we might want to make a custom attribute called `fullName` that combines
    the two together.    This sort of thing is a piece of cake with Core Data. In
    our case, let’s say we want to add an attribute to MythicalPerson called `awesomeness`,
    which will be calculated from the MythicalPerson’s `power`, `divinity`, and `goodness`.
    We start off by defining a method called `awesomeness` in MythicalPerson’s implementation:    ```
    - (int)awesomeness {   int awesomeness = [[self valueForKey:@"divinity"] intValue]
    * 10 +     [[self valueForKey:@"power"] intValue] * 5 +     [[self valueForKey:@"goodness"]
    intValue];   return awesomeness; } ```    With that in place, we can call the
    `awesomeness` method on any MythicalPerson and get the result. This also works
    with Cocoa bindings, of course, so we can easily bind a GUI control’s value to
    this new property. Go back to Xcode, make the window and box a little bigger,
    and add a label and a level indicator from the Library window, something similar
    to [Figure 8-12](#9781430245421_Ch08.xhtml#Fig12).    ![9781430245421_Fig08-12.jpg](images/9781430245421_Fig08-12.jpg)    [Figure
    8-12](#9781430245421_Ch08.xhtml#_Fig12). MythBase, now with added Awesomeness    Now
    select the Awesomeness control, and bring up the *Attributes Inspector*. Set the
    *Style* to Continuous, and the *Minimum* and *Maximum* to 0 and 1600, respectively.
    Now switch to the *Bindings Inspector*, and bind the level indicator’s Value via
    the Mythical Person Array Controller, with the controller key “selection” and
    the model key “awesomeness”. Xcode doesn’t know anything about Awesomeness, so
    we’ll have to type it in ourselves instead of just picking it from the combo box;
    we’re sure you’ll agree that’s a small price to pay for awesomeness.    Save the
    changes, switch back to Xcode, click Run, and off we go. Switch between different
    rows in the table view and see the bar of awesomeness change.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n例如，假设我们为每个 `MythicalPerson`\
    \ 设定了一个新约束：只有当 `divinity` 属性的值为 100（意味着只有处于完全“上帝模式”的人才能拥有高于 50 的 `power` 等级）时，`power`\
    \ 属性的值才能超过 50。推荐的做法不是在 `validatePower:error:` 或 `validateDivinity:error:` 中检查此条件，而是在创建或编辑新托管对象时调用的另外两个验证方法中检查：`validateForInsert:`\
    \ 和 `validateForUpdate:`。由于我们要在两个地方检查相同的内部一致性问题（即 `power > 50` 且 `divinity < 100`），我们将把该项检查放到我们自己的方法\
    \ `validateConsistency:` 中，并由另外两个方法调用它。\n\n首先，让我们在 `MythicalPerson.m` 中实现这两个 Core\
    \ Data 验证方法：\n\n```\n- (BOOL)validateForInsert:(NSError **)error {\n  BOOL propertiesValid\
    \ = [super validateForInsert:error];\n  BOOL consistencyValid = [self validateConsistency:error];\n\
    \  return (propertiesValid && consistencyValid);\n}\n\n- (BOOL)validateForUpdate:(NSError\
    \ **)error {\n  BOOL propertiesValid = [super validateForUpdate:error];\n  BOOL\
    \ consistencyValid = [self validateConsistency:error];\n  return (propertiesValid\
    \ && consistencyValid);\n}\n```\n\n这两种方法的工作方式相同。首先，它们调用父类的同名方法；这非常重要，因为该方法会实际调用每个被更改属性的所有\
    \ `validate:error:` 方法。然后，会调用我们自己的 `validateConsistency:` 方法。如果这两个调用的返回值都是 `YES`，那么该方法本身返回\
    \ `YES`；否则返回 `NO`。\n\n现在让我们看看 `validateConsistency:` 是什么样的。\n\n```\n- (BOOL)validateConsistency:(NSError\
    \ **)error {\n  int divinity = [[self valueForKey:@\"divinity\"] intValue];\n\
    \  int power = [[self valueForKey:@\"power\"] intValue];\n  if (divinity < 100\
    \ && power > 50) {\n    if (error != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
    \        @\"Power cannot exceed 50 unless divinity is 100\",\n        @\"validation:\
    \ divinity / power error\");\n      NSDictionary *userInfoDict = [NSDictionary\
    \ dictionaryWithObject:errorStr\n        forKey:NSLocalizedDescriptionKey];\n\
    \      NSError *divinityPowerError = [[NSError alloc]\n        initWithDomain:@\"\
    MythicalPersonErrorDomain\" code:182\n        userInfo:userInfoDict];\n      if\
    \ (*error == nil) {\n        // 没有之前的错误，返回新错误\n        *error = divinityPowerError;\n\
    \      }\n      else {\n        // 将之前的错误与新错误合并\n        *error = [self errorFromOriginalError:*error\n\
    \          error:divinityPowerError];\n      }\n    }\n    return NO;\n  }\n \
    \ return YES;\n}\n```\n\n这个方法比单属性的验证方法稍微复杂一些。我们以同样的方式检查问题，如果一切正常则返回 `YES`，否则构造一个\
    \ `NSError`，将错误参数指向它，然后返回 `NO`。然而，为了与 Core Data“友好相处”，我们必须检查是否已存在错误，如果存在，则将其与我们自己的错误合并成一种特殊类型的错误。这使得\
    \ Core Data 最终能够在尝试保存时报告它发现的所有错误。这种错误合并是通过我们自己的另一个方法 `errorFromOriginalError:error:`\
    \ 完成的，我们应该将其添加到我们的类中。\n\n```\n- (NSError *)errorFromOriginalError:(NSError *)originalError\n\
    \    error:(NSError *)secondError {\n  NSMutableDictionary *userInfo = [NSMutableDictionary\
    \ dictionary];\n  NSMutableArray *errors = [NSMutableArray\n    arrayWithObject:secondError];\n\
    \n  if ([originalError code] == NSValidationMultipleErrorsError) {\n    [userInfo\
    \ addEntriesFromDictionary:[originalError userInfo]];\n    [errors addObjectsFromArray:[userInfo\n\
    \      objectForKey:NSDetailedErrorsKey]];\n  }\n  else {\n    [errors addObject:originalError];\n\
    \  }\n  [userInfo setObject:errors forKey:NSDetailedErrorsKey];\n  return [NSError\
    \ errorWithDomain:NSCocoaErrorDomain\n                             code:NSValidationMultipleErrorsError\n\
    \                         userInfo:userInfo];\n}\n```\n\n基本上，此方法检查 `originalError`\
    \ 参数是否已包含多个错误，如果是，则只需将新错误添加到列表中。否则，它将两个单个错误合并到一个新的多错误对象中。\n\n完成所有这些之后，我们现在应该能够编译并运行，选择一个\
    \ `MythicalPerson`，将其 `power` 设置为高于 50，`divinity` 设置为低于 100，然后尝试保存。我们会看到一个错误，告知我们问题所在。我们还可以通过保持\
    \ power/divinity 的不一致性，将名称更改为“Bob”，然后尝试保存，来确保多问题的报告功能正常工作。我们应该会看到一个警告面板，告知我们发生了多个验证错误，但不会看到其中任何一个的详细信息。这为将来扩展应用委托的\
    \ `saveAction:` 和 `applicationShouldTerminate:` 方法提供了一个好思路：想出一种显示多个错误的方法，而不是像当前这样只调用\
    \ `presentError:`。这是一个可以在空闲时处理的问题！\n\n## 创建自定义属性\n\n另一种常见的简单“业务逻辑”是基于对象属性中包含的值来创建自定义属性。例如，如果我们有一个具有\
    \ `firstName` 和 `lastName` 属性的实体，我们可能想要创建一个名为 `fullName` 的自定义属性，将两者组合在一起。\n\n\
    这种事情对于 Core Data 来说是小菜一碟。在我们的例子中，假设我们想为 `MythicalPerson` 添加一个名为 `awesomeness`\
    \ 的属性，它将根据 `MythicalPerson` 的 `power`、`divinity` 和 `goodness` 计算得出。首先，我们在 `MythicalPerson`\
    \ 的实现中定义一个名为 `awesomeness` 的方法：\n\n```\n- (int)awesomeness {\n  int awesomeness\
    \ = [[self valueForKey:@\"divinity\"] intValue] * 10 +\n    [[self valueForKey:@\"\
    power\"] intValue] * 5 +\n    [[self valueForKey:@\"goodness\"] intValue];\n \
    \ return awesomeness;\n}\n```\n\n完成此操作后，我们可以对任何 `MythicalPerson` 调用 `awesomeness`\
    \ 方法并获取结果。当然，这同样适用于 Cocoa 绑定，因此我们可以轻松地将 GUI 控件的值绑定到此新属性。返回到 Xcode，将窗口和框稍微放大一些，然后从库窗口中添加一个标签和一个级别指示器，类似于图\
    \ 8-12。\n\n![9781430245421_Fig08-12.jpg](img/9781430245421_Fig08-12.jpg)\n\n图\
    \ 8-12. MythBase，现已添加神威值\n\n现在选择“神威值”控件，并打开*属性检查器*。将*样式*设置为“连续”，将*最小值*和*最大值*分别设置为\
    \ 0 和 1600。现在切换到*绑定检查器*，通过神话人物数组控制器绑定级别指示器的值，控制器键为“selection”，模型键为“awesomeness”。Xcode\
    \ 不知道神威值是什么，所以我们必须自己输入，而不是从组合框中选取；我们相信您会同意，为了神威值，这点小代价是值得的。\n\n保存更改，切换回 Xcode，单击“运行”，然后出发。在表格视图的不同行之间切换，查看神威值柱状图的变化。\n"
- fmt: "# Core Data Relationships and Migrations\n\n## Understanding Dependencies\
    \ in Core Data\n\nDrag a slider and, now wait a minute; the `Awesomeness` value\
    \ doesn’t change! The reason for this is that no part of Core Data—not our model\
    \ file, not our `MythicalPerson` class, not the controller we’re using—knows that\
    \ `Awesomeness` depends on other values and needs to be recalculated if they change.\
    \ This is fixed by implementing one more small method in `MythicalPerson`:\n\n\
    ```\n+ (NSSet *)keyPathsForValuesAffectingAwesomeness {\n    return [NSSet setWithObjects:@\"\
    divinity\", @\"power\", @\"goodness\",\n        nil];\n}\n```\n\nThis is another\
    \ method name that’s constructed dynamically based on an accessor name. We saw\
    \ this pattern when validating a single attribute as well. In this method, we\
    \ return a set of attribute names that our `awesomeness` attribute is dependent\
    \ on. With this in place, Core Data will automatically call this method at some\
    \ point early on in the application’s lifecycle and sort things out so that changes\
    \ made to any attributes in the set will also trigger controllers to update any\
    \ objects with bindings to the `awesomeness` attribute. Note the plus sign rather\
    \ than minus sign in the method signature—this indicates that `keyPathsForValuesAffectingAwesomeness`\
    \ is a class method, not an instance method. This is part of the Cocoa key-value\
    \ observing system. Cocoa KVO looks for methods of this structure and calls them\
    \ if present.\n\nBuild and run the app, and now the green bar changes when we\
    \ drag one of the other sliders. Awesome!\n\n## Wrap Up\n\nIn this chapter, we\
    \ covered a pretty wide range of material about Core Data. We learned about creating\
    \ a model file in Xcode and about using the combo of Core Data and Cocoa bindings\
    \ to quickly put together a decent GUI. We also got some idea of the underpinnings\
    \ of how Core Data stores its data and learned some basics about implementing\
    \ our own business logic. In [Chapter 9](#9781430245421_Ch09.xhtml), we’ll build\
    \ on this knowledge, learning how to complete our data models by adding relationships.\n\
    \n## Chapter 9: Core Data Relationships\n\nThe last chapter covered a lot of the\
    \ basics about how Core Data works, but we worked with an extremely simple data\
    \ model that contained just a single entity. In this chapter, we’re going to extend\
    \ our data model to contain multiple entities and define relationships between\
    \ those entities. We’ll also create a GUI that shows these relationships and lets\
    \ us edit them. Along the way, we’ll catch our first glimpse of how Core Data\
    \ deals with multiple, incompatible versions of our data model and how it can\
    \ migrate a data store from one model version to the next.\n\nWe’ll do all of\
    \ this while extending the MythBase project from [Chapter 7](#9781430245421_Ch07.xhtml)\
    \ to include some data that’s often overlooked when discussing mythical heroes\
    \ and gods: the legendary bands they performed in! The night that Achilles and\
    \ the Grecian Formula shook the Old Parthenon Ballroom to the ground is the stuff\
    \ of legends, and who could forget The Four Norsemen’s farewell concert at the\
    \ Clontarf Supper Club? The enhancements we’ll make to MythBase in this chapter\
    \ (see [Figure 9-1](#9781430245421_Ch09.xhtml#Fig1)) will help us keep track of\
    \ this crucial information.\n\n![9781430245421_Fig09-01.jpg](images/9781430245421_Fig09-01.jpg)\n\
    \n[Figure 9-1](#9781430245421_Ch09.xhtml#_Fig1) . The new and improved MythBase\
    \ application we’ll create in this chapter\n\nWe’ll start out by adding all the\
    \ new entities and relationships we want to our data model, then go on to setting\
    \ up the GUI that will let us edit everything. To prepare for the rest of this\
    \ chapter, go to the Finder and make a copy of the last chapter’s final MythBase\
    \ project directory, then go into the new directory and double-click `MythBase.xcodeproj`\
    \ to open it in Xcode.\n\n## Modeling New Entities and Relationships\n\nWe’re\
    \ going to be adding three new entities to MythBase: `MythicalBand`, `MythicalGig`,\
    \ and `MythicalVenue`. We’ll also add relationships between several of them.\n\
    \nWhen we’re done, our data model will look like [Figure 9-2](#9781430245421_Ch09.xhtml#Fig2).\n\
    \n![9781430245421_Fig09-02.jpg](images/9781430245421_Fig09-02.jpg)\n\n[Figure\
    \ 9-2](#9781430245421_Ch09.xhtml#_Fig2) . The new data model\n\n## Model Versioning\
    \ and Migrations\n\nBefore we start making changes to the data model, there’s\
    \ one important issue that needs to be addressed: migration. We’re not talking\
    \ about people moving from one country to the next or birds flying south for the\
    \ winter; we’re talking about our data. If you’ve ever developed a database application,\
    \ you’re familiar with the concept of “migrating” data from one deployment version\
    \ to the next. This typically involves writing some sort of script that makes\
    \ changes to the database structure itself (adding, deleting, or altering tables\
    \ and columns) and populates new fields with appropriate values. With Core Data,\
    \ you don’t exactly write a script, but the same idea is in use. In your data\
    \ store, Core Data saves some metadata about the structure of the data model.\
    \ When your app runs, Core Data tries to read from the data store. If it determines\
    \ that the app has a new version of the data model with a different structure,\
    \ it will automatically update the data store to match the latest data model.\
    \ Let’s see how this works.\n\n### Preparing for Multiple Model Versions\n\nThe\
    \ first thing we need to do is convert our current model to a special multi-versioned\
    \ format. This will allow us to store multiple versions of our data model within\
    \ the Xcode project as well as within MythBase itself. In Xcode’s navigation pane,\
    \ open the `Models` group and select `MythBase.xcdatamodeld`. Now select `Editor`\
    \ ![image](images/arrow.jpg) `Add Model Version` from the menu. A dialog box will\
    \ appear asking for the name of the new version, defaulting to `MythBase 2`. This\
    \ default name is just fine, so press Finish. Xcode just made us a copy of the\
    \ data model, so we can extend it while keeping the old one around as well. In\
    \ the navigation pane, `MythBase.xcdatamodeld` has acquired a small disclosure\
    \ triangle to the left of the name.\n\nClick the triangle to open the contents,\
    \ and note that it contains two versions of our model file: `MythBase.xcdatamodel`\
    \ and `MythBase 2.xcdatamodel`. `MythBase.xcdatamodel` is the original data model,\
    \ and it has a small green checkbox next to it in the navigation pane showing\
    \ that it’s the one that Xcode considers to be current. The one with a “2” tacked\
    \ onto the end of the filename is the new one where we’ll make some changes. First,\
    \ we need to set MythBase 2 as the current version of the model. Select the `MythBase.xcdatamodeld`\
    \ file (the parent row containing the disclosure triangle, not either of the two\
    \ data models underneath). In the *File Inspector*, there’s a section titled *Versioned\
    \ Core Data Model*, as shown in [Figure 9-3](#9781430245421_Ch09.xhtml#Fig3).\
    \ Set the *Current Version* to be MythBase 2. When we do this, the green checkbox\
    \ will move to the `MythBase 2.xcdatamodel` file in the navigation pane. The next\
    \ time we build MythBase, this new compound model containing multiple versions\
    \ of the model will be copied into the app, and the app will try to use what we’ve\
    \ set as the current version.\n\n![9781430245421_Fig09-03.jpg](images/9781430245421_Fig09-03.jpg)\n\
    \n[Figure 9-3](#9781430245421_Ch09.xhtml#_Fig3) . The Versioned Core Data Model\
    \ controls in the File Inspector\n\n### Adding New Entities\n\nWe want to be able\
    \ to keep track of not just the bands that some of our mythical people played\
    \ in, but also the venues they played at, and even dates of specific gigs, so\
    \ we’re going to add three new entities: `MythicalBand`, `MythicalVenue`, and\
    \ `MythicalGig`. See [Figure 9-4](#9781430245421_Ch09.xhtml#Fig4) for an overview.\n\
    \n![9781430245421_Fig09-04.jpg](images/9781430245421_Fig09-04.jpg)\n\n[Figure\
    \ 9-4](#9781430245421_Ch09.xhtml#_Fig4) ."
