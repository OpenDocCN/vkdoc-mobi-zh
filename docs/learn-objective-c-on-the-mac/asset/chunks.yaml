  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n# 当我们查看一个根本没有 `userInfo`\
    \ 字典的根本性错误时，它仍然会提供一个人类可读的 `localizedDescription`，而这仅通过查看域和代码是无法直接看出的。实际上，我们可以像这样创建自己的内部和外部错误：\n\
    \n```\nNSError *innerError = [NSError errorWithDomain:NSPOSIXErrorDomain\n   \
    \                                       code:2 userInfo:nil];\nNSDictionary *outerInfo\
    \ = @{NSUnderlyingErrorKey: innerError,\n                            NSFilePathErrorKey:\
    \ @\"/tmpfoo\"};\nNSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain\n\
    \                                          code:260 userInfo:outerInfo];\n```\n\
    \n这些错误的行为将*完全*类似于由 `NSFileManager` 生成的错误，包括显示我们未在任何地方指定的人类可读文本！事实证明，这种魔法似乎源自 `NSError`\
    \ 类本身。它显然内置了足够多的关于 Cocoa 错误域和错误代码的具体知识，能够为程序可能遇到的许多错误生成有意义的句子。这意味着，通常情况下，由 Cocoa\
    \ 方法调用提供给我们的错误，无需经过美化即可直接展示给用户。\n\n## 展示错误\n\n既然如此，我们顺便来看看如何向用户展示错误？在这里，我们一直通过调用\
    \ `[NSApp presentError:e]` 来让应用程序显示一个模态窗口，但还有其他一些选择。实际上，`presentError:` 方法是在 `NSResponder`、`NSDocument`\
    \ 和 `NSDocumentController` 中实现的，这意味着只要发生错误，我们就可以将其传递给附近或最相关的对象，然后它会沿着一个类似于响应者链的责任链向上传递，直到某个对象实际显示该错误。这为以不同方式显示错误信息（例如使用文档模态工作表警告）提供了可能性。\n\
    \n## 总结\n\n我们现在已经了解了 Cocoa 应用程序处理各种“不愉快情况”的主要方式、如何避免一些常见错误，以及如何使用 `lldb` 来帮助追踪问题。我们还看到了方法如何利用\
    \ `NSError` 实例，以可控的方式处理问题。随着我们更深入地学习 Cocoa 编程，所有这些都将派上用场。\n\n## 第 14 章：Cocoa 中的绘图\n\
    \n到目前为止，我们已经学习了许多强大的 Cocoa 技术，用于处理数据、优化布局应用程序的类，以及使用 Cocoa 提供的各种屏幕控件和其他视图。现在是时候开始学习如何使用\
    \ Cocoa 来创建我们自己的视图类，从而完全控制文本和图形的显示了。Mac 应用程序通常以包含“视觉糖果”而闻名——这不仅是为了绘制不必要的图形装饰，也是为了为用户创造更沉浸式的交互体验。作为\
    \ Cocoa 程序员，我们可以使用的图形技术能够帮助我们以惊人的少量努力实现一些同样的效果。\n\n`Core Graphics` 提供了丰富的功能，用于渲染路径、操纵坐标系等等。`Core\
    \ Graphics` 的一个主要部分是一组名为 `Quartz` 的 API。事实上，`Quartz` 在 `Core Graphics` 中占据了如此重要的地位，以至于这两个术语有时可以互换使用。`Core\
    \ Animation` 则更进一步，让我们能够以极其简单的方式为视图添加动画。\n\n本章将介绍坐标系和向 `NSView` 实例绘图的一些基础知识，并演示如何通过将视图放入滚动视图中，来显示一个比窗口中可用空间更大的视图。它还将触及如何轻松地为我们的应用程序添加基本的打印支持。\n\
    \n## 基础概念\n\n在本节中，我们将介绍 Cocoa 绘图 API 中使用的一些基本概念。\n\n如果你有过任何类型的图形编程经验，那么对 Cocoa\
    \ 中可用的绘图方式可能会相当熟悉。毕竟，计算机图形学的大部分基本概念在几十年前就已经定型了。Cocoa 的突出之处在于其渲染的质量（包括文本和图形基元的抗锯齿功能）以及为更复杂概念提供的高级抽象能力。\n\
    \n在本章中，我们将始终使用点（point）而不是像素（pixel）。Cocoa 中的绘图通常是基于矢量且与分辨率无关的。随着高像素密度显示器（也称为 HiDPI\
    \ 或 Retina 显示器）的出现，绘图模型中的一个点实际上可能由显示器上的一个或四个像素表示。在可能的情况下，最好让底层操作系统自行决定如何从绘图基元转换为实际像素。这样做的话，图像在高分辨率显示器上会自动看起来很棒。如果你在编写与像素相关的代码，那就不那么容易了，你需要担心点和像素之间的区别，以及如何适当地缩放位图。不过，现在我们只讨论点。\n\
    \n## 视图坐标系\n\nCocoa 的绘图系统使用 x-y 坐标系，默认情况下，原点 (0,0) 位于左下角，x 轴指向右方（值增大表示向右移动），y\
    \ 轴指向上方（值增大表示在屏幕上向上移动）。这与数学中传统的图形绘制方式类似，但与许多其他计算机图形系统相反，在那些系统中 y 轴指向下方（值增大表示在屏幕上向下移动）。虽然在\
    \ Cocoa 中翻转 y 轴是可行的，有时也是可取的，但在我们的示例中不会这样做。\n\n绘图通常由 `NSView` 子类的实例完成。视图存在于一个层次结构中。如果层次结构中最顶层的视图被设置为\
    \ `NSWindow` 的 *contentView*，那么该层次结构中的所有视图都会在该窗口内显示。窗口中的顶层视图（即 *contentView*）可以跨越窗口的整个区域进行绘制。对于层次结构中的其他所有视图，其绘图区域仅限于其框架（frame），即其父视图坐标系内的一个空间（参见\
    \ 图 14-1）。\n\n![9781430245421_Fig14-01.jpg](img/9781430245421_Fig14-01.jpg)\n\n\
    图 14-1. 一个简单的视图层次结构。窗口的 contentView 包含一个 NSBox，该 NSBox 又包含一个包含单选按钮的 NSMatrix\n\
    \n## 框架矩形 vs. 边界矩形\n\n对于窗口中的每个视图，都有几个重要的矩形（通常称为 *rect*）定义了大量关于其绘图特性的信息：框架矩形和边界矩形。框架矩形简单地指定了视图在其父视图坐标系中的位置和大小。例如，想象一下窗口中的顶层视图。我们称它为\
    \ A。如果 A 有一个名为 B 的子视图，该子视图从点 (10,20) 延伸到点 (40,60)，那么 B 的框架矩形的原点为 (10,20)，大小为 (30,40)。\n\
    \n除了决定视图在其父视图中出现的位置和范围的框架外，每个视图还有一个边界矩形，它定义了其自身的内部坐标空间。例如，前面描述的视图 B 默认情况下会有一个边界矩形，其原点为\
    \ (0,0)，大小为 (30,40)。如果需要，我们可以轻松更改这一点。例如，假设我们有一堆点要绘制，其 x 和 y 值都在 0.0 到 10.0 之间。通过更改\
    \ B 的边界矩形，将其大小设置为 (10,10)，这些点将精确地填充 B 所占用的空间，无论 B 在屏幕上实际占用多大空间（参见 图 14-2）。\n\n\
    ![9781430245421_Fig14-02.jpg](img/9781430245421_Fig14-02.jpg)\n\n图 14-2.\n"
- fmt: "# 图形绘制基础\n\n## 视图边界与坐标点\n\n在左侧，使用默认边界的视图绘制来自较窄范围的点。在右侧，相同点绘制在边界较小的视图中。\n\n\
    ## 矩形、点和尺寸\n\n在 Cocoa 中，矩形由名为 `NSRect` 的 C 结构体表示，该结构体包含一个表示原点的 `NSPoint` 和一个表示大小的\
    \ `NSSize`。原点和大小各自包含两个 `CGFloat` 类型的值，`CGFloat` 是 Cocoa 绘图 API 中广泛使用的基本 C 类型；原点包含\
    \ `x` 和 `y`，大小包含 `width` 和 `height`。\n\n更令人困惑的是，Core Graphics 中的许多函数使用等效的结构体 `CGRect`、`CGPoint`\
    \ 和 `CGSize`，它们具有相同的结构布局，并且都由 `CGFloat` 元素组成。这种划分的历史原因并不特别有趣，只要我们不是在处理 32 位遗留应用程序，这些\
    \ C 结构体具有相同的布局，并可以通过内联函数（例如 `NSRectToCGRect`、`NSSizeFromCGSize` 等）来回转换，这些函数实际上不过是类型转换。在本章中，我们将主要使用\
    \ `NS` 前缀的版本。\n\n## 路径基础\n\nCocoa 的绘图机制包含路径的概念，路径可以包含任意数量的直线或曲线段。每个路径不必是连续的。我们可以在一个点“拿起笔”，然后在另一个点重新开始绘制。在实际绘制路径之前，我们可以指定线宽、颜色等值。这些设置将应用于路径的每个部分。由路径各部分勾勒出的任何形状也可以用单独的颜色或图案进行填充。\n\
    \n## 创建 `NSView` 子类\n\n让我们通过创建一个能够绘制非常开心的笑脸的应用程序来开始探索（参见[图 14-3](#9781430245421_Ch14.xhtml#Fig3)）。在\
    \ Xcode 中，创建一个名为 *MrSmiley* 的新 Cocoa 项目。我们将为 Mr Smiley 应用使用 `MS` 作为类前缀，并保持启用*自动引用计数*。\n\
    \n![9781430245421_Fig14-03.jpg](images/9781430245421_Fig14-03.jpg)\n\n[图 14-3](#9781430245421_Ch14.xhtml#_Fig3).\
    \ Mr Smiley 非常非常开心\n\n现在创建一个新的 Objective-C 类，作为 `NSView` 的子类，并将其命名为 `MSSmileyView`。通过选择\
    \ **文件** ![image](images/arrow.jpg) **新建** ![image](images/arrow.jpg) **文件...**（**![images](images/arrow3.jpg)**-N），或右键单击\
    \ Xcode 窗口左侧的项目导航器窗格并选择弹出菜单中的 **新建文件...** 来完成此操作。Xcode 将为我们创建类的文件，包括 `MSSmileyView.m`，本节所有工作将在此文件中进行。\n\
    \n在开始编码之前，打开项目的 `MainMenu.xib` 文件。从*库*窗口中抓取一个自定义视图，并将其拖入默认创建的空白窗口中。使用*身份检查器*将视图的类更改为\
    \ *MSSmileyView*（在*自定义类*标题下），然后使用*大小检查器*将其宽度和高度更改为 100×100。最后，选择窗口并按 **![images](images/arrow3.jpg)-=**\
    \ 使窗口自动调整大小以完美适应视图。然后保存更改。\n\n## 基本绘制方法：`drawRect:`\n\n现在开始编写代码。Xcode 创建的 `MSSmileyView.m`\
    \ 文件包含一个空的 `drawRect:` 方法，我们将在此方法中开始编写代码。`drawRect:` 方法通常不会直接调用，除非我们在实现现有视图的子类时调用\
    \ `[super drawRect:rect]` 让父类完成其绘制工作。相反，当应用的主运行循环确定视图需要重绘时（通常在视图被创建或调整大小后，或者我们自己的代码在视图上调用了\
    \ `setNeedsDisplay:` 并传递 `YES` 作为参数），`drawRect:` 方法会被自动调用。\n\n`drawRect:` 方法接受一个参数，即表示视图哪部分“脏”并需要重绘的矩形。这可用于优化复杂视图的绘制，但在我们的示例中，我们将忽略这一点，而是使用视图的边界矩形进行绘制。\n\
    \n## 图形状态\n\nCocoa 中的所有绘制都发生在特定的上下文中，该上下文由 `NSGraphicsContext` 类表示。根据上下文的不同，我们可能直接绘制到窗口缓冲区，或绘制到一块离屏内存中以供后续使用。除此之外，上下文还有一些自身的状态信息，这些信息会随时间变化，例如当前用于任何绘制命令的颜色。当视图需要绘制自身时，它应该以将图形状态恢复到绘制开始时的状态的方式进行绘制。\n\
    \n幸运的是，`NSGraphicsContext` 为我们提供了一种简单的方法来实现这一点。它的 `saveGraphicsState` 方法会将所有相关的状态信息推入栈中，而\
    \ `restoreGraphicsState` 方法会将状态从栈中弹出。我们可以像下面的代码片段那样，使用这两个方法调用来“包围”实际的绘制代码，从而确保我们不会让图形上下文处于意外状态。\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \    // 绘制代码放在这里。\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n##\
    \ 路径辅助工具\n\n要绘制本节开头所示的视图，我们将首先绘制背景，然后绘制脸部本身。对于这两个元素中的每一个，我们将先填充背景，然后绘制边缘。所有这些都使用\
    \ `NSBezierPath` 类完成。贝塞尔路径允许我们定义任意复杂度的路径，包括直线、点、曲线等。`NSBezierPath` 类的一个便利之处在于，它提供了用于创建表示常见形状（如矩形、椭圆等）的贝塞尔路径的便捷快捷方式。\n\
    \n让我们从创建一个定义视图可见边缘的路径开始，使用 `NSBezierPath` 上的一个类方法来获取一个圆角矩形。下面以粗体显示的行创建了一个路径，用白色填充它，然后“勾勒”路径（以黑色绘制其边缘）：\n\
    \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
    \n    NSRect bRect = CGRectInset([self bounds], 5, 5);\n    NSBezierPath *border\
    \ = [NSBezierPath bezierPathWithRoundedRect:bRect\n        xRadius:5 yRadius:5];\n\
    \    [[NSColor whiteColor] set];\n    [border fill];\n\n    [border setLineWidth:3];\n\
    \    [[NSColor blackColor] set];\n    [border stroke];\n\n    [NSGraphicsContext\
    \ restoreGraphicsState];\n}\n```\n\n第一步使用 `CGRectInset` 函数缩小我们的边界矩形，为其留出一些余量，以便我们可以绘制带有粗线的圆角矩形，而不会被边缘裁剪。然后，我们创建一个表示圆角矩形的路径，指定矩形的基本几何形状以及用于定义圆角椭圆曲线大小的两个数字。之后，我们发出简单的命令来设置颜色、线宽并执行一些绘制。\n\
    \n## 颜色与图形上下文\n\n请注意，指定用于绘制操作的颜色是与绘制操作本身分开的步骤，设置线宽也是如此。此外，虽然设置线宽是通过路径上的方法完成的，但设置颜色看起来像是一种自由浮动操作。我们只需向任何颜色发送\
    \ `set` 消息，它就会立即成为当前颜色！实际上发生的是，`NSColor` 的 `set` 方法与底层图形上下文交互，设置将用于后续绘制操作的颜色。其一个后果是，只有当存在当前图形上下文时（例如在\
    \ `drawRect:` 方法内），`NSColor` 的 `set` 方法才会执行有用的操作。"
  raw: 'On the left, plotting points from a narrow range in a view with default bounds.
    On the right, the same points plotted in a view with smaller bounds    Rects,
    Points, and Sizes    In Cocoa, rectangles are represented by a C struct called
    `NSRect`, which is composed of an `NSPoint` containing the origin and an `NSSize`
    containing the size. Both the origin and size each contain two values of type
    `CGFloat`, a basic C type used throughout Cocoa’s drawing APIs; origin has x and
    y, size has width and height.    To confuse matters somewhat, many functions in
    Core Graphics make use of equivalent structures `CGRect`, `CGPoint`, and `CGSize`,
    which have the same structural layout and are all composed of `CGFloat` elements.
    The historical reasons for this divide aren’t terribly interesting, and as long
    as we’re not working with a 32-bit legacy application, these C structs have identical
    layouts and can be converted back and forth with inline functions (for example,
    `NSRectToCGRect`, `NSSizeFromCGSize`, and so on) that are really little more than
    typecasts. In this chapter, we’ll mostly be using the NS-prefixed versions.    Path
    Basics    Cocoa’s drawing mechanism includes the concept of paths, which can contain
    any number of straight or curved-line segments. Each path doesn’t need to be contiguous.
    We can “pick up the pen” at one point and start drawing again at another. Before
    a path is actually drawn, we can specify values such as line thickness, color,
    and the like. Those settings will be applied to every part of the path. Any shapes
    outlined by parts of the path can also be filled with a separate color or pattern.    Creating
    an NSView Subclass    Let’s start exploring a bit by creating an application that’s
    able to draw a very happy smiley face (see [Figure 14-3](#9781430245421_Ch14.xhtml#Fig3)).
    In Xcode, create a new Cocoa project named *MrSmiley*. We’ll be using a class
    prefix of MS for our Mr Smiley app, and we’ll want to leave *Automatic Reference
    Counting* turned on.    ![9781430245421_Fig14-03.jpg](images/9781430245421_Fig14-03.jpg)    [Figure
    14-3](#9781430245421_Ch14.xhtml#_Fig3). Mr Smiley is very, very happy    Now create
    a new Objective-C class, a subclass of `NSView`, and name it `MSSmileyView`. Do
    this by selecting **File** ![image](images/arrow.jpg) **New** ![image](images/arrow.jpg)
    **File . . .** (**![images](images/arrow3.jpg)**-N), or by right-clicking in the
    Project Navigator pane on the left side of the Xcode window and selecting **New
    File . . .** from the pop-up menu. Xcode will create the class’s files for us,
    including `MSSmileyView.m`, where all this section’s work will take place.    Before
    getting started on the code, open the project’s `MainMenu.xib` file. Grab a custom
    view from the *Library* window, and drag it into the blank window that is created
    by default. Use the *Identity Inspector* to change the view’s class to *MSSmileyView*
    (under the *Custom Class* heading), then use the *Size Inspector* to change its
    width and height to 100×100\. Finally, select the window and press **![images](images/arrow3.jpg)-=**
    to make the window resize itself to perfectly fit the view. Then save the changes.    The
    Basic Drawing Method, drawRect:    Now let’s get into the code. The `MSSmileyView.m`
    file created by Xcode contains an empty `drawRect:` method, which is where we’ll
    start writing our code. The `drawRect:` method is something we usually won’t call
    directly, except for cases where we’re implementing a subclass of an existing
    view and calling `[super drawRect:rect]` to let the superclass do its part of
    the drawing. Instead, the `drawRect:` method is called automatically whenever
    the application’s main run loop determines that the view needs to be redrawn (typically
    after a view has been created or resized, or our own code has called `setNeedsDisplay:`
    on our view, passing YES as the argument).


    The `drawRect:` method takes one argument, a rectangle that indicates which portion
    of the view is considered “dirty” and needs to be redrawn. This can be used to
    optimize drawing of complex views, but in our examples we’ll just ignore that,
    and instead make use of the view’s bounds rectangle for drawing.    Graphics States    All
    drawing in Cocoa occurs within a particular context, which is represented by the
    `NSGraphicsContext` class. Depending on the context, we may be drawing directly
    into a window buffer or drawing into a chunk of off-screen memory for later use.
    But apart from that, the context has some state information of its own that can
    change over time, such as the current color to be used for any drawing commands.
    When it’s time for our view to draw itself, it should do so in such a way that
    the graphics state is put back into the state it was in when drawing started.    Fortunately,
    `NSGraphicsContext` provides us with an easy way to do just that. Its `saveGraphicsState`
    method will push all relevant state info onto a stack, and the `restoreGraphicsState`
    method will pop the state back off the stack. We can use these two method calls
    to “bracket” our actual drawing code like the following excerpt shows, so we know
    we aren’t leaving the graphics context in an unexpected state.    ``` - (void)drawRect:(NSRect)dirtyRect
    {   [NSGraphicsContext saveGraphicsState];   // Drawing code here.   [NSGraphicsContext
    restoreGraphicsState]; } ```    Path Helpers    To draw the view shown at the
    beginning of this section, we’ll first draw the background, then the face itself.
    For each of those two elements, we’ll first fill in the background, then draw
    the edge. All of this is done using the `NSBezierPath` class. A Bezier path allows
    us to define paths of arbitrary complexity, including straight lines, points,
    curves, and so on. One of the niceties of the `NSBezierPath` class is that it
    provides nice shortcuts for creating a Bezier path representing common shapes
    such as rectangles, ovals, and the like.    Let’s start by creating a path that
    defines the visible edge of the view, using a class method on `NSBezierPath` that
    gives us a rounded rect. The lines shown in bold below create a path, fill it
    with white, and then “stroke” the path (draw its edge) in black:    ``` - (void)drawRect:(NSRect)dirtyRect
    {   [NSGraphicsContext saveGraphicsState];    NSRect bRect = CGRectInset([self
    bounds], 5, 5);   NSBezierPath *border = [NSBezierPath bezierPathWithRoundedRect:bRect
        xRadius:5 yRadius:5];   [[NSColor whiteColor] set];   [border fill];    [border
    setLineWidth:3];   [[NSColor blackColor] set];   [border stroke];    [NSGraphicsContext
    restoreGraphicsState]; } ```    The first step uses the `CGRectInset` function
    to shrink our bounds rect a bit, giving us a little wiggle room so that we can
    draw a rounded rect with thick lines without having them clipped by our edges.
    Then we create a path representing a rounded rect, specifying the basic geometry
    of the rect as well as two numbers defining the size of the elliptical curves
    used for the rounded corners. After that, we issue simple commands to set colors,
    a line width, and do some drawing.    Colors and the Graphics Context    Note
    that specifying which color to use for a drawing operation is a separate step
    from the drawing operation itself, as is setting the line width. Also, although
    setting the line width is done through a method on the path itself, setting the
    color looks like a sort of free-floating operation. We just send any color the
    set message, and suddenly it’s the current color! What’s happening is that `NSColor`’s
    set method interacts with the underlying graphics context, setting the color that
    will be used for subsequent drawing operations. One consequence of this is that
    `NSColor`’s set method will only do something useful while there is a current
    graphics context, such as within a `drawRect:` method.'
