  trans: "\n和之前一样，勾选 `Bind to` 复选框，确保下拉菜单显示的是 Table Cell View。将 `Model Key Path` 设置为\
    \ “objectValue.depiction”。正如我们对上面的 Depiction 视图所做的那样，点击 Value Transformer 弹出列表，然后选择\
    \ `NSKeyedUnarchiveFromData`，如 图 8-11 所示。至此，表格视图的配置就完成了！  \n![9781430245421_Fig08-11.jpg](img/9781430245421_Fig08-11.jpg)\
    \  \n图 8-11. 为 Depiction 列建立绑定  \n\n对于表格视图左下方显示匹配数量的文本字段，我们将使用一种不同的绑定方法，这样我们就可以使用格式字符串来构建文本字段的内容。在这种情况下，我们将使用\
    \ `Display Pattern Value1` 而不是 `Value`。展开 `Display Pattern Value1` 部分，勾选 `Bind\
    \ to` 复选框，并将下拉菜单设置为 Mythical Person Array Controller，和之前一样。在 `Controller Key`\
    \ 中输入 “selection”。这次，我们将使用一个不同的键路径（key path）。将 `Model Key Path` 设置为 “@count”，`Display\
    \ Pattern` 设置为 “%{value1}@ out of %{value2}@。” 现在，在 `Display Pattern Value1` 下面出现了另一个名为\
    \ `Display Pattern Value2` 的绑定选项。展开 `Display Pattern Value2` 部分，勾选 `Bind to` 复选框，并将下拉菜单设置为\
    \ Mythical Person Array Controller，和之前一样。这次，在 `Model Key Path` 中输入 “@count”，并在\
    \ `Controller Key` 中输入 “arrangedObjects” 来替代 “selection”。`Display Pattern` 将自动填入我们在\
    \ `Display Pattern Value1` 绑定中输入的值。  \n\n现在，我们需要连接 Fetch、Delete 和 Add 按钮。为此，我们将结合使用目标-动作连接（用于响应点击）和\
    \ Cocoa 绑定（用于适时启用或禁用按钮）。让我们从目标-动作连接开始。选择 Fetch 按钮，按住 Control 键拖出一条连接线到 Mythical\
    \ Person Array Controller。数组控制器将位于对象停靠栏（Object Dock）中对象列表的底部；如果您看不到它，请将鼠标悬停在对象停靠栏底部，它会向下滚动以显示数组控制器。选择\
    \ `fetch:` 动作。对 Delete 和 Add 按钮执行相同操作，分别选择 `remove:` 和 `add:` 动作。  \n\n接下来，我们将为\
    \ Add 和 Remove 按钮的 Enabled 属性建立绑定。选择 Add 按钮并打开`绑定检查器`（Bindings Inspector）。展开`可用性`（Availability）下的`已启用`（Enabled）部分。您能猜到下一步是什么吗？没错，勾选\
    \ `Bind to` 复选框，确保下拉菜单显示为 Mythical Person Array Controller。但是，这次将 `Controller\
    \ Key` 字段改为 “canAdd”。当您在 `Controller Key` 字段中开始输入时，将会看到一个可能的补全列表。对 Remove 按钮执行相同操作，将\
    \ `Controller Key` 改为 “canRemove”。  \n\n我们现在已经构建了足够多的用户界面，在继续之前应该先测试一下。让我们来试试。保存\
    \ nib 文件并点击 Run。您应该能够点击 Add 按钮，并在表格视图中看到空白行。您还应该能够编辑名称并移动滑块，这些更改会反映在表格视图的选定行中。如果不是这样，请检查\
    \ nib 文件中的绑定和连接，确认它们是否与说明相符。  \n\n## 完成绑定：保存和搜索  \n我们的应用程序应该能够处理多条记录，并允许创建和删除神话人物。但我们还不能保存或搜索，这使得它成为一个相当糟糕的数据库。现在让我们来解决这个问题。\
    \  \n\n保存很简单。Xcode 生成的应用程序委托（Application Delegate）类为我们处理了这件事；我们只需要告诉它何时保存。在主菜单（Main\
    \ Menu）中，有一个包含保存菜单项（Save menu item）的文件菜单（File menu）。保存菜单项已经预先绑定到了 ![images](img/arrow3.jpg)\
    \ S 键快捷键上。我们的应用也将使用这个快捷键。  \n\n在 Interface Builder 的对象停靠栏中，展开 Main Menu 对象，然后展开\
    \ File 菜单，再展开 Menu Item – Save 项目。注意，我们讨论的是对象停靠栏中的对象，而不是 Xcode 自己的菜单！按住 Control\
    \ 键拖出一条连接线到对象停靠栏中的 App Delegate，然后从列表中选择 `saveAction:` 动作。完成！  \n\n搜索就没那么直接了，首先需要介绍一些术语。Core\
    \ Data 的搜索支持基于*谓词*（predicates）。一个谓词由属性名称、运算符和一个搜索值组成；一个搜索字段可以支持多个谓词。谓词的两个例子是 `name\
    \ contains Heracles` 或 `goodness greater than 75`。如果您熟悉 SQL，SQL 命令的 `WHERE` 子句就是由谓词构成的。对于\
    \ MythBase 来说，MythicalPerson 实体的所有属性（depiction 除外）都应该可搜索，因此我们需要定义几个谓词。我们不能搜索 depiction，因为二进制和可转换属性本质上是不可搜索的。谓词可以在`绑定检查器`中定义，我们接下来就要去那里操作。\
    \  \n\n我们将从定义一个用于搜索 name 属性的谓词开始。选择屏幕右上角的搜索字段，然后打开`绑定检查器`。在`绑定检查器`底部附近有一个名为`谓词`（Predicate）的部分。展开它并勾选\
    \ `Bind to` 复选框，将其绑定到 Mythical Person Array Controller。`Controller Key` 应该显示为\
    \ “filterPredicate”。将`显示名称`（Display Name）设置为 “Name”，谓词格式（predicate format）设置为\
    \ “name contains[c] $value”，其中 `$value` 表示搜索框的内容，name 表示应该被搜索的 MythicalPerson\
    \ 实体属性。运算符 `contains[c]` 表示我们想要返回任何 name 属性包含 `$value` 所代表值的记录，并且使用不区分大小写的搜索——这就是末尾的\
    \ `[c]` 的含义。如果没有 `[c]`，搜索就是区分大小写的。  \n\n请注意，现在创建了一个新的名为 `Predicate2` 的绑定。我们将用它来定义一个谓词，以搜索实体中所有可搜索的字段。打开\
    \ `Predicate2`，和第一个一样，勾选 `Bind to` 复选框，将其绑定到 Mythical Person Array Controller。`Controller\
    \ Key` 应该显示为 “filterPredicate”。对于 `Predicate2`，将`显示名称`设置为 “All”，并将谓词格式设置为以下冗长的字符串：“(name\
    \ contains $value) or (divinity.description contains $value) or (power.description\
    \ contains $value) or (goodness.description contains $value) or (details contains[c]\
    \ $value)。” 请注意，现在出现了一个名为 `Predicate3` 的新绑定。  \n\n我们已经展示了如何搜索一个或多个属性。如果您希望能够搜索其他特定字段，例如\
    \ name 或 details，请随意按照上述相同模式添加更多谓词，并相应更改谓词格式值中的字段名称。构建搜索谓词的可能性比我们在这里讨论的要多得多，Apple\
    \ 在 Xcode 文档中提供了一个谓词编程指南（Predicate Programming Guide）章节，对此进行了详细介绍。  \n\n好了，完成所有这些之后，是时候运行应用程序了。按下\
    \ Xcode 窗口左上角的 Run 按钮，您应该能够创建一些 Mythical Person 记录，将图片拖入大的图片框以显示图片，使用文件（File）![image](img/arrow.jpg)\
    \ 保存（Save）菜单项来保存记录，以及搜索数据库。搜索字段左侧边缘的问号图标应该能让您选择哪个搜索谓词处于活动状态。当您退出并重新运行应用程序时，记录应该会被保留并在启动时重新加载。\
    \  \n\n我们仅仅通过定义模型和构建图形用户界面（GUI）就制作出了一个看起来相当酷的应用程序。值得注意的是，我们一行代码也没有写！\n"
- fmt: "This is a great example of the kind of visual programming model that `Cocoa`\
    \ has always enabled, and with the addition of `Cocoa bindings` and `Core Data`\
    \ in the past few years it’s become even more complete. Of course, underlying\
    \ all this stuff are frameworks and APIs that enable all this “magic” to happen\
    \ in `Xcode`, and there are times when you will want or need to access `Core Data`\
    \ functionality from code. The rest of this chapter will introduce some aspects\
    \ of programming (in the traditional, code-based sense) with `Core Data`, starting\
    \ with a tour of the generated code in the `Application Delegate` class.\n\n##\
    \ Exploring the Template Code\n\nWhen we created the `MythBase` project, an application\
    \ delegate class called `MBAppDelegate` was created for us. This class contains\
    \ code to load the model information from the `Core Data` model files contained\
    \ within our application. It also opens up the on-disk storage where `Core Data`\
    \ reads and writes its model objects, or creates this storage if it doesn’t already\
    \ exist. And finally, it provides access to the data storage via an `NSManagedObjectContext`,\
    \ which other objects can in turn bind to (such as the array controller in our\
    \ nib file) in order to read from and write to storage.\n\nAll the code shown\
    \ here has been reformatted to better fit the format of this book, so your version\
    \ may look slightly different, but it should be syntactically identical.\n\n###\
    \ The App Delegate Interface\n\nLet’s jump right in and take a look at the header\
    \ file, `MBAppDelegate.h`, shown in the following listing. This is the autogenerated\
    \ code created by `Xcode 4.5` for Mountain Lion. The version created by different\
    \ versions of `Xcode` may be slightly different, and if you like you can change\
    \ it to match the version shown here:\n\n```\n#import <Cocoa/Cocoa.h>\n\n@interface\
    \ MBAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet\
    \ NSWindow *window;\n\n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator\
    \ *persistentStoreCoordinator;\n@property (readonly, strong, nonatomic) NSManagedObjectModel\
    \ *managedObjectModel;\n@property (readonly, strong, nonatomic) NSManagedObjectContext\
    \ *managedObjectContext;\n\n- (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n\
    This code declares a simple class with four properties and one method. The `window`\
    \ variable also features `IBOutlet` in its property declaration, which makes it\
    \ into an outlet available for connecting to a window in `Interface Builder`.\
    \ The other three properties are instances of some important `Core Data` classes:\n\
    \n- `NSPersistentStoreCoordinator` manages the back-storage, giving access to\
    \ one or more instances of `NSPersistentStore`, each of which represents a storage\
    \ location (in a file or in memory). The purpose of the coordinator is to let\
    \ the application access several persistent stores as if they were one. Some applications\
    \ may want to use this to partition application data across multiple stores. For\
    \ example, you may want to distinguish between normal entities, whose objects\
    \ that are saved to disk, and transient entities, whose objects that are only\
    \ held in memory and will disappear when the user quits the app. Even though they’re\
    \ not saved to disk, the transient objects will still benefit from the other features\
    \ of `Core Data` (simple `Undo` support, integration with `Cocoa bindings`, and\
    \ the like).\n- `NSManagedObjectModel` loads information about entities and their\
    \ properties from one or more model files (normally contained inside your application\
    \ bundle), and acts as a sort of metadata repository containing the structure\
    \ of the application’s managed objects. Many applications will never need to interact\
    \ with this directly.\n- `NSManagedObjectContext` is responsible for dealing with\
    \ the lifecycle of all managed objects (the model objects that we’re storing via\
    \ `Core Data`). It accesses the objects themselves through an `NSPersistentStoreCoordinator`\
    \ and provides high-level functionality for creating, reading, updating, and deleting\
    \ objects.\n\nMost applications will use an `NSManagedObjectContext` at some time\
    \ or another for creating objects, saving changes, and so on.\n\nWe’ll see how\
    \ each of those objects is used when we look at the implementation file. The final\
    \ declaration in the header file is for the `saveAction:` method, which is called\
    \ when the user selects File ![image](images/arrow.jpg) Save from the `MythBase`\
    \ menu. We’ll see how that works in the next section.\n\n### The App Delegate\
    \ Implementation\n\nNow let’s switch over to `MythBase_AppDelegate.m`, and see\
    \ what it does. Besides implementing the `saveAction:` method declared in the\
    \ interface, it also needs to make sure that the appropriate accessors for its\
    \ declared properties are all implemented. That includes both a getter and a setter\
    \ for `window`, and just a getter for the others (which were declared read-only).\
    \ As with the header file, this code was auto-generated using `Xcode 4.5` running\
    \ on Mountain Lion. If you’re using something else, you might see slightly different\
    \ code.\n\n#### The `applicationSupportDirectory` Method\n\nThe file starts out\
    \ like this:\n\n```\n#import \"MBAppDelegate.h\"\n\n@implementation MBAppDelegate\n\
    \n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize\
    \ managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
    \ = _managedObjectContext;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // Insert code here to initialize your application\n\
    }\n\n// Returns the directory the application uses to store the Core Data store\
    \ file. This code uses a directory named \"com.learncocoa.MythBase\" in the user's\
    \ Application Support directory.\n- (NSURL *)applicationFilesDirectory {\n   \
    \ NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSURL *appSupportURL\
    \ = [[fileManager URLsForDirectory:NSApplicationSupportDirectory inDomains:NSUserDomainMask]\
    \ lastObject];\n    return [appSupportURL URLByAppendingPathComponent:@\"com.learncocoa.MythBase\"\
    ];\n}\n```\n\nThe first things shown in the class’s implementation are some `@synthesize`\
    \ directives, which take care of the getters and setters for the properties declared\
    \ in the header file. Next is the stub for the `applicationDidFinishLaunching:`\
    \ method, which we’ve seen before and is standard for any application delegate\
    \ class. After that comes the implementation of a method called `applicationFilesDirectory`,\
    \ which returns an `NSURL` containing the name of a directory where the application\
    \ can save its data (in our case, the location where `Core Data` should save its\
    \ persistent store). Normally this method returns the full path of a subdirectory\
    \ of the `Application Support` directory, which is located inside the `Library`\
    \ directory in the user’s home directory (`/Users/somebody/Library/Application\
    \ Support/MythBase`).\n\nThe `applicationFilesDirectory:` method is a “helper”\
    \ method, called elsewhere in the class’s implementation. Note that this method\
    \ is neither declared in the header file nor in a private category or anything\
    \ of the sort. In an `Objective-C` implementation block, code can call any methods\
    \ that appear earlier in the same implementation block, even if they’re not declared\
    \ anywhere. This is sometimes a handy shortcut when you want to refactor your\
    \ code a bit, extracting some functionality into a method of its own, but don’t\
    \ need to make it accessible anywhere outside the current class implementation.\n\
    \n#### The `managedObjectModel` Accessor Method\n\nNext is the `managedObjectModel`\
    \ method. This method serves as the getter for the `managedObjectModel` property.\n\
    \n```\n// Creates if necessary and returns the managed object model for the application.\n\
    ```"
