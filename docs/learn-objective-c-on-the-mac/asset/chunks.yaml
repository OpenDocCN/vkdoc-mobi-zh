    右下角的`Library`库窗格充当一个调色板，其中包含可用于构建应用程序界面的对象集合。在`Mountain Lion`中，这里有 134 种不同的对象类型可供使用。`Library`库最初显示“文件模板”库，但这里有四种可以显示的资源类型：文件模板、代码片段、对象和媒体。我们想要使用的所有用户界面元素都在`Objects`对象视图中。我们滚动浏览库，找到要使用的项目，然后将该项目拖入相应的`Xcode`窗格。选择代表`Object
    Library`对象库视图的图标，或按![图片](img/arrow4.jpg)3。屏幕应看起来像图 2-6。


    ![9781430245421_Fig02-06.jpg](img/9781430245421_Fig02-06.jpg)


    图 2-6. 显示我们新的空窗口和对象库的`MainMenu.xib`


    花一分钟时间滚动浏览库中的不同`UI`对象：按钮、滑块、文本字段、标签、浏览器，甚至还有`OpenGL`视图！


    ### 拖出一个标签


    `Object Library`对象库窗格将显示一个项目列表，这些项目可以拖到我们的应用程序窗口中以构建应用程序的界面。我们现在拖一个过去。我们将使用一个名为`Label`标签的对象，它用于显示静态文本——用户无法编辑的文本。将一个标签拖到窗口上。


    在`Object Library`对象库视图中，向下滚动大约十二个项目，找到一个名为`Label`的标签。直接点击库中的`Label`并将其拖到应用程序的主窗口（标记为`Chapter2`的窗口）上。这样做会将一个新标签添加到我们的应用程序窗口中（图
    2-7）。


    ![9781430245421_Fig02-07.jpg](img/9781430245421_Fig02-07.jpg)


    图 2-7. 将一个标签拖到窗口上


    **提示** 与其像我们刚才那样向下滚动列表，我们只需在`Library`库窗格底部的搜索字段中输入单词“`label`”。这将过滤列表，只显示库中名称或描述中包含单词“`label`”的对象。


    现在我们已经有了一个标签，让我们更改它。双击该标签。

