    DT，在这种情况下，您稍后在本章中遇到的所有对`DungeonThingAppDelegate`的引用，在 Xcode 中将显示为`DTAppDelegate`。）和之前一样，保持复选框的默认设置：*Use
    Automatic Reference Counting* 应被选中，而其他复选框（Create Document-based Application、Use
    Core Data 和 Include Unit Tests）应取消选中。


