    method to return something else. `NSString`’s implementation just returns the
    `NSString` itself, while `NSNumber`’s implementation converts the numeric value
    into an `NSString` and returns it.    So, to make this work, edit the `invalidArgumentException_unrecognizedSelector`
    method, changing the line inside the `for` loop to the following:    ``` nameComponentLength
    += [[component description] length]; ```    Because we know that `NSObject`, and
    therefore every object, implements the `description` method and returns a string,
    we know that this call will now always work. Even if someone slips another kind
    of object in there that doesn’t give us a nice, compact result like `NSString`
    and `NSNumber` do, at least we know the method is there and will be called!    So
    do the fix, run the app again, and see what shows up in the Xcode output console.    ```
