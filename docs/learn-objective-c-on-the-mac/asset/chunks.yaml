  trans: "\n接下来，创建第二个属性，命名为 `color 2`，并像第一个属性一样配置它：类型为 `Transformable`，且取消勾选 `Optional`。这两个属性代表用户将为每个文档选择的两种颜色。它们各自包含一个\
    \ `NSColor` 实例，而 `NSColor` 不属于 Core Data 支持的数据类型，因此需要按照第 8 章所述，使用 `Transformable`\
    \ 类型。保存模型，这部分工作就完成了。这真是个极其简单的模型，不是吗？\n\n## 设置两种颜色\n\n现在该开始构建图形用户界面了。记住，这发生在文档窗口中，因此请切换回\
    \ Interface Builder 中的 `CMDocument.xib`。默认窗口包含一个 `NSTextField`（内容为“Your document\
    \ contents here”），在继续之前，我们应该将其删除。接下来，我们要向 nib 文件中添加一个 `NSObjectController`，用它来连接一些\
    \ GUI 对象与底层文档。请按照以下步骤进行设置。\n\n使用库面板找到 `NSObjectController`，将其拖拽到 Dock 区，它会和 `File’s\
    \ Owner`、`Window` 以及其他顶层对象并列。选中这个新对象（现在标签名为“Object Controller”），打开**属性检查器**。检查器最顶部是\
    \ `Mode` 下拉菜单，将其从 `Class` 改为 `Entity Name`，然后在下方出现的 `Entity Name` 字段中输入“ColorSet”。\n\
    \n保持新添加的 `Object Controller` 处于选中状态，切换到**绑定检查器**。我们需要告诉这个控制器从哪里获取数据，方法是将其 `managedObjectContext`\
    \ 绑定到一个合适的值。因此，请在 `Parameters` 标题下找到 `Managed Object Context` 项。如果该绑定的详情不可见，请点击其展开三角形以显示它们。使用\
    \ `Bind To` 下拉菜单选择 `File’s Owner`，然后在 `Model Key Path` 文本字段中输入“managedObjectContext”，并按\
    \ `Enter` 键创建绑定。对这个对象控制器的最后一步操作是：在 Dock 区选中它，并将其名称改为“colorset”。这不会改变应用运行时的任何内容，但能为将来查看此\
    \ nib 的程序员（很可能就是你自己；从现在开始记录文档，你以后会感谢自己的）增加一些清晰度。\n\n## 最简单的图形用户界面\n\n现在该构建一个简单的\
    \ GUI 了，它让我们能够查看 `ColorSet` 对象的核心细节，也就是它包含的两种颜色。使用**库**找到 `UILabel` 对象，将其拖入我们的\
    \ `Window`。选中它的文本，将其改为 `Mix Color 1`。然后按 `![images](img/arrow3.jpg)D` 复制该标签，将其稍微移开一点，并将其文本改为\
    \ `Mix Color 2`。现在，在**库**中找到一个 `NSColorWell`，将其拖拽到我们正在构建的文档窗口中。放置好后，按 `![images](img/arrow3.jpg)D`\
    \ 复制它，然后重新排列标签和颜色选择器，使其看起来像图 12-2 所示。\n\n![9781430245421_Fig12-02.jpg](img/9781430245421_Fig12-02.jpg)\n\
    \n图 12-2 .  用于选择两种颜色的最低限度 GUI\n\n现在选中左侧的颜色选择器，打开**绑定检查器**，配置其 Value 绑定，使其使用 `colorset`\
    \ 控制器，控制器键为 `selection`，模型键路径为 `color1`。选中右侧的颜色选择器，配置其 Value 绑定，使其也使用 `colorset`\
    \ 控制器，控制器键为 `selection`，但这次模型键路径为 `color2`。保存工作，然后点击**运行**按钮。应用启动了，一个新且空白的“Untitled”文档窗口出现了，但颜色选择器竟然不可点击！我们急于让某些内容显示在屏幕上，却忽略了创建一个非常重要的东西：一个模型对象！\n\
    \n## 创建默认的 ColorSet\n\n我们需要做的是编写一些代码，使得每当创建新文档时，都能向对象控制器中插入一个新的 `ColorSet` 对象。\n\
    \n我们将在 `CMDocument` 类中实现此功能，通过添加一些方法来访问我们添加到 nib 文件中的对象控制器，并跟踪文档是从头创建还是从文件加载的。选择将要添加这些新代码的\
    \ `CMDocument.m` 文件。首先，我们要添加一个属性，一个名为 `objectController` 的出口，用于指向我们一两页前放入 nib\
    \ 文件中的 `NSObjectController`。我们不将其添加到头文件中，而是可以使用 *类扩展* 在 `.m` 文件中声明此属性。类扩展看起来就像类目声明，但括号内没有类目名称。在\
    \ `@implementation` 块之前添加以下代码：\n\n``` \n@interface CMDocument () \n@property (weak)\
    \ IBOutlet NSObjectController *objectController; \n@end \n```\n\n任何我们可以在类的 `@interface`\
    \ 块中声明的内容（实例变量、属性、方法等），都可以改为在类扩展中声明。这样做的好处是保持类接口的整洁。我们可以选择只公开其他类真正需要的部分，而将剩余部分作为仅在类内部使用的私有\
    \ API。\n\n我们还将添加一个实例变量，一个名为 `isNew` 的 `BOOL` 类型变量，用来跟踪每个文档是刚刚创建的，还是从文件加载的。遵循刚才使用类扩展时信息隐藏的思路，我们将揭示另一个巧妙的技巧：实例变量可以在类的\
    \ `@implementation` 块中声明，而不是在头文件的 `@interface` 中。通过添加下面加粗的代码来实现这一点：\n\n``` \n\
    @implementation CMDocument { \n    BOOL isNew; \n} \n```\n\n现在，快速浏览这个 `.m` 文件的其余部分。该文件包含一些现成的方法，并附有注释说明我们可以在哪里扩展它们的行为。我们将在\
    \ `init` 和 `windowControllerDidLoadNib:` 方法中实现一些功能，同时还将实现 `initWithType:error:`\
    \ 方法，稍后我们会解释这个方法。这里预定义的方法都来自 `NSDocument`，它为我们处理了大部分与文档相关的功能。然而，`CMDocument` 的直接父类是\
    \ `NSPersistentDocument`，它实现了额外的功能，用于将文档存储为 Core Data 存储后端。首先，添加这个方法：\n\n``` \n\
    - (id)initWithType:(NSString *)typeName error:(NSError **)outError { \n  if (self\
    \ = [super initWithType:typeName error:outError]) { \n    isNew = YES; \n  } \n\
    \  return self; \n} \n\n- (NSString *)windowNibName { \n    return @\"CMDocument\"\
    ; \n} \n```\n\n然后，将下面加粗的行添加到 `windowControllerDidLoadNib:` 方法中：\n\n``` \n- (void)windowControllerDidLoadNib:(NSWindowController\
    \ *)windowController { \n    [super windowControllerDidLoadNib:windowController];\
    \ \n    // 在此处添加任何需要在 windowController 加载了文档窗口之后执行的代码。\n    if (isNew) { \n  \
    \      id newObj = [_objectController newObject]; \n        [newObj setValue:[NSColor\
    \ redColor] forKey:@\"color1\"]; \n        [newObj setValue:[NSColor yellowColor]\
    \ forKey:@\"color2\"]; \n        [_objectController addObject:newObj]; \n    }\
    \ \n} \n```\n\n这些加粗的代码片段在创建新文档时执行。第一个方法 `initWithType:error:` 仅当从头开始创建新文档时才会被调用。这是理想情况下我们想要初始化模型对象的地方，但所有对模型对象的访问都通过\
    \ `NSObjectController` 来中介，而这个控制器在 nib 文件中，此时 nib 文件尚未加载。因此，我们只需将 `isNew` 标志设置为\
    \ `YES`，然后继续。稍后，在 `CMDocument` 的 nib 文件加载完成后，会调用 `windowControllerDidLoadNib:`\
    \ 方法。在这里，我们使用 `objectController` 创建一个新的模型对象，为其两个属性设置值，然后将这个新对象添加到控制器中。\n"
- fmt: "With that in place, all that’s left to do is to connect `CMDocument`’s `objectController`\
    \ outlet within *CMDocument.xib*. So switch back over there, Ctrl-drag from the\
    \ *File*’*s Owner* to the colorset object controller, and select the `objectController`\
    \ outlet. Save the work, then click the **Run** button. The red and yellow colors\
    \ in the two color wells should be visible, and clicking on one of them should\
    \ bring up the color panel and let us change the color. Not only that, but a full\
    \ complement of document functionality is now available through the menu. We can\
    \ save our documents, close them, access recent documents, open documents, and\
    \ so on.\n\n## Settling on a File Format\n\nHaving gotten to this point, you’ve\
    \ probably noticed that when you save a document, a pop-up list lets you choose\
    \ to save the file as *Binary*, *SQLite*, or *XML*, and the file extension is\
    \ set accordingly. While this level of flexibility may be of some use during development,\
    \ for a shipping product you should really just pick a format and stick with it\
    \ to avoid confusing your users. In general, SQLite is probably the best choice\
    \ for most applications. You should also change the file extension to something\
    \ that suggests the use of your app, instead of the default extension. All of\
    \ these options are configured in Xcode’s Target settings. Go back to Xcode, select\
    \ the top-most `ColorMix` group in the navigation pane, click the `ColorMix` target,\
    \ and click the Info tab at the top of the view to see the target settings. Expand\
    \ the *Document Types* group, and there will be a view containing all three pre-configured\
    \ file formats. Delete the *Binary* and *XML* options (by using the “x” button\
    \ at the upper right-hand corner of each of those sections), leaving only the\
    \ *SQLite* option. Give this remaining format a decent filename extension by editing\
    \ the value shown in the *Extensions* column, changing it to `ColorMix`. Now save\
    \ the work, Build & Run, and save a color set, verifying that we now have no choice\
    \ about what kind of file format to save it as.\n\n## Adding Color\n\nNow the\
    \ document stuff is all working as it should, but we’ve got a really boring application\
    \ that doesn’t do anything interesting at all. Let’s make our app do what we promised\
    \ in the beginning of this chapter: display a bunch of colors made by blending\
    \ the two chosen colors using all of Core Graphics’ predefined blending modes.\n\
    \nTo do this, we’re going to create a new class called `CMColorBlendView`, which\
    \ will be a direct subclass of `NSView`. One of the primary things you typically\
    \ do in an `NSView` subclass is override the `drawRect:` mode to specify exactly\
    \ what should be drawn. We’re going to do just that and fill each view with a\
    \ blended color. In order to do the blending, each instance of `CMColorBlendView`\
    \ needs to know which blending mode to use and which two colors to blend. We’ll\
    \ set up the blending mode for each `CMColorBlendView` by hand, but the values\
    \ for the two colors will be populated using Cocoa Bindings, so that as soon as\
    \ the user changes one of the chosen colors, all of the `CMColorBlendView` objects\
    \ in our window will be instantly redrawn.\n\n## The `CMColorBlendView` Class\n\
    \nStart by creating a new class in our project. In the *New File* assistant, choose\
    \ *Objective-C class* from the OS X - *Cocoa* section, then click Next. Name our\
    \ new class `CMColorBlendView.m`, and make it a subclass of `NSView`.\n\nNow edit\
    \ `CMColorBlendView.h`, adding the bold lines shown in the following:\n\n```objective-c\n\
    #import <Cocoa/Cocoa.h>\n\n@interface CMColorBlendView : NSView\n\n@property (strong,\
    \ nonatomic) NSColor *color1;\n@property (strong, nonatomic) NSColor *color2;\n\
    @property (assign, nonatomic) CGBlendMode blendMode;\n\n@end\n```\n\nThis gives\
    \ our class two `NSColor` objects, which will be populated by Cocoa Bindings,\
    \ and a `CGBlendMode`, which will be set by the `MyController` class when it’s\
    \ loading a nib file.\n\nWe used the `nonatomic` keyword for all of these properties,\
    \ which is a way of declaring that the getters and setters for these properties\
    \ won’t take extra precautions to be thread-safe. Since we know that our code\
    \ in this simple app is all being used solely on the main thread, using `nonatomic`\
    \ is safe enough and gives slightly better performance.\n\nNow switch over to\
    \ `CMColorBlendView.m`, where the first thing we’ll do is define the methods for\
    \ the properties we’ve declared. Most of the properties we’ve declared previously\
    \ in this book have their methods created by an explicit `@synthesize` line, but\
    \ here we have a bit of a special case because we want our view to redraw itself\
    \ each time any of the property values changes. So we’ll provide explicit setter\
    \ methods for each of our properties. Explicit methods, if present, always take\
    \ the place of any synthesized methods. And actually, this brings us to one more\
    \ reason we used `nonatomic` in our property declarations: without it, the compiler\
    \ doesn’t really like letting us mix a synthesized getter with an explicit setter\
    \ and so would generate a warning.\n\nWhile we’re doing all this new stuff anyway,\
    \ we’re going to introduce a pretty new piece of functionality in the LLVM compiler.\
    \ Any time we declare a property in the interface, we can actually leave out the\
    \ `@synthesize` row entirely! If we do so, the compiler will still create an instance\
    \ variable for us, whose name will be the name of the property prefixed by an\
    \ underscore. We can see this in the following code, which should be added to\
    \ our class’s `@implementation` section:\n\n```objective-c\n// put these at the\
    \ beginning of the @implementation block\n- (void)setBlendMode:(CGBlendMode)bm\
    \ {\n    if (_blendMode != bm) {\n        _blendMode = bm;\n        [self setNeedsDisplay:YES];\n\
    \    }\n}\n- (void)setColor1:(NSColor *)c {\n    if (![c isEqual:_color1]) {\n\
    \        _color1 = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n- (void)setColor2:(NSColor\
    \ *)c {\n    if (![c isEqual:_color2]) {\n        _color2 = c;\n        [self\
    \ setNeedsDisplay:YES];\n    }\n}\n```\n\nOne thing to note is the `[self setNeedsDisplay:YES]`\
    \ call. We’ll get into this more in later chapters covering drawing in Cocoa,\
    \ but the basic idea is that when we want to draw some content in an `NSView`,\
    \ we call this method, which sets a flag, and when our application is done processing\
    \ whatever event it’s currently handling, it will look through the open windows\
    \ to see if anyone has been flagged for redrawing, which leads to the eventual\
    \ calling of the `drawRect:` method.\n\nSpeaking of which, the only other method\
    \ we need to implement in this class is the `drawRect:` method itself.\n\n```objective-c\n\
    - (void)drawRect:(NSRect)dirtyRect {\n  // don't draw anything if we don't have\
    \ two valid colors.\n  if (!self.color1 || !self.color2) return;\n\n  CGColorRef\
    \ cgColor1 = genericRGBWithNSColor(self.color1);\n  CGColorRef cgColor2 = genericRGBWithNSColor(self.color2);\n\
    \n  CGContextRef myContext = [[NSGraphicsContext currentContext] graphicsPort];\n\
    \  CGContextSaveGState(myContext);\n\n  CGContextSetFillColorWithColor(myContext,\
    \ cgColor1);\n  CGContextSetBlendMode(myContext, kCGBlendModeNormal);\n  CGContextFillRect(myContext,\
    \ NSRectToCGRect(dirtyRect));\n\n  CGContextSetFillColorWithColor(myContext, cgColor2);\n\
    \  CGContextSetBlendMode(myContext, self.blendMode);\n  CGContextFillRect(myContext,\
    \ NSRectToCGRect(dirtyRect));\n\n  CGContextRestoreGState(myContext);\n\n  CGColorRelease(cgColor1);\n\
    \  CGColorRelease(cgColor2);\n}\n```\n\nTry not to get too caught up in the details\
    \ here. It’s enough if you read the comments and trust that the code is doing\
    \ what the comments claim it’s doing. After going through some of the later chapters\
    \ where we’ll be dealing with graphics, this will start to make more sense. For\
    \ now, note that this code produces some compiler errors until we complete the\
    \ next step."
