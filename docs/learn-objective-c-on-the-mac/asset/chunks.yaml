    \n好吧，我们意识到如果你不习惯这种写法，它看起来有点乱；甚至可能让一些人回想起在计算机科学教育中不得不学习，并且多年来一直试图忘记的 Lisp 或 Scheme（这些感觉是正常的，并且会随着时间的推移而消退）。为了清晰起见，我们将稍微拆解一下，并展示上述代码的另一种版本，其中一些中间值被赋值给了变量。\n\
    \n```\nNSArray *motivations = [[self class] motivations];\nid primaryMotivation\
    \ = [self.villain objectForKey:kPrimaryMotivation];\nint motivationIndex = [motivations\
    \ indexOfObject:primaryMotivation];\n[self.primaryMotivationView selectCellWithTag:motivationIndex];\n\
    ```\n\n这非常直接了当，所以你可能想知道我们为什么要先给你看那个所有代码都挤在一起的第一版。\n"
- fmt: "Basically, the first version is a kind of Objective-C style that you’re likely\
    \ to encounter in the wild at some point, so it’s good to be able to try to eyeball\
    \ it a little. Not because it’s technically superior in some way (it’s not), but\
    \ simply because some people consider the highly nested version to be more readable\
    \ in some ways and just prefer to write their code that way. The position of the\
    \ brackets, combined with features of Xcode’s text editor, lets you easily do\
    \ some things with the former version that take a bit more time with the latter.\
    \ For example, double-clicking on a bracket in Xcode selects the entire bracketed\
    \ expression, including the brackets themselves, which means you can easily select\
    \ an entire method invocation, including the receiver, the method name, and all\
    \ arguments, in a single double-click. This can be a huge help both when editing\
    \ code and also browsing or reading code.\n\nOn the other hand, the second form\
    \ we showed you can be helpful when debugging your application. Just set a breakpoint\
    \ and you’ve got a full complement of intermediate variables ready to divulge\
    \ their contents to you. Ultimately, which style you lean toward is a matter of\
    \ personal taste and practicality. Use whatever works best for you in the situation\
    \ at hand. Until you’ve gotten a bit more Cocoa experience under your belt, you’re\
    \ probably better off sticking with the latter style, which shows more clearly\
    \ the sequence of execution. For now, either of the alternatives shown above should\
    \ work at the end of the `updateDetailViews` method. Compile and run, and verify\
    \ that the correct primary motivation, Revenge, is shown in the GUI.\n\nFinally,\
    \ it’s time to display the powers attribute. Like the `primaryMotivation`, the\
    \ villain’s powers are shown in a matrix of button cells. This time, however,\
    \ the button cells are checkboxes, and any number of them can be selected (or\
    \ “checked”). Instead of a single string, the powers attribute is an `NSArray`\
    \ containing all the relevant strings for the villain you’re looking at.\n\nWe’ll\
    \ start off with something very similar to what we added for the `primaryMotivation`\
    \ attribute: a new class method called `powers`:\n\n```objectivec\n+ (NSArray\
    \ *)powers {\n    static NSArray *powers = nil;\n    if (!powers) {\n        powers\
    \ = [[NSArray alloc] initWithObjects:@\"Evil Genius\",\n                  @\"\
    Mind Reader\", @\"Nigh-invulnerable\", @\"Weather Control\", nil];\n    }\n  \
    \  return powers;\n}\n```\n\nLike the `motivations` method, this method creates\
    \ an array of strings whose indexes in the array correspond to the tags defined\
    \ in a matrix in the nib file. Now we just have to add a bit of code to selectively\
    \ “check” all the appropriate checkboxes. Add this code to the end of the `updateDetailViews`\
    \ method:\n\n```objectivec\n[self.powersView deselectAllCells];\n\nfor (NSString\
    \ *power in [[self class] powers]) {\n    if ([[self.villain objectForKey:kPowers]\
    \ containsObject:power]) {\n        [[self.powersView cellWithTag:\n         \
    \ [[[self class] powers] indexOfObject:power]]\n          setState:NSOnState];\n\
    \    }\n}\n```\n\nThis bit of code should be pretty easy to grasp by now. First\
    \ it deselects all the cells, so we start off with a clean slate of unchecked\
    \ checkboxes. Then it goes through each named power from our master list of powers,\
    \ checks to see if our villain’s powers attribute contains a matching string,\
    \ and if so, sets that cell’s state to `NSOnState`, which means the checkbox is\
    \ checked. The one new thing to notice here is the special `for` construct. This\
    \ is something called *fast enumeration*, an addition to the latest version of\
    \ Objective-C that works unlike any form of `for` in C, but you may be familiar\
    \ with it as a `foreach` loop in Java or C#. It basically takes a collection (typically\
    \ an `NSArray`) on the right side of the `in`, and iterates through it, assigning\
    \ each object in the collection to the variable specified on the left side of\
    \ the `in`, one at a time, then executing the subsequent curly-brace-wrapped code.\n\
    \nNow compile and run the application, and the relevant checkbox should be selected\
    \ in the display (Evil Genius in the case of Lex Luthor).\n\n## Responding to\
    \ Input\n\nNow that we’re able to display all these villain attributes, it’s time\
    \ to turn things around and write the code that will let us notice changes the\
    \ user makes to these fields. We previously created empty action methods that\
    \ are triggered by the various GUI controls; now it’s time for us to fill up those\
    \ methods and make them do something useful! Also, we’ll implement a delegate\
    \ method to let us get the edited value for the one view in our window that doesn’t\
    \ work with target/action, the `NSTextView`.\n\nLet’s start off with the `NSTextField`\
    \ for displaying and editing the villain’s name, which triggers the `takeName:`\
    \ method. Change the method to look like this:\n\n```objectivec\n- (IBAction)takeName:(id)sender\
    \ {\n    [self.villain setObject:[sender stringValue] forKey:kName];\n    NSLog(@\"\
    current villain properties: %@\", self.villain);\n}\n```\n\nThis method starts\
    \ off by grabbing the string value from the sender, which is the text field itself,\
    \ and passing it along to the villain object to set its name. Because we included\
    \ the `@synthesize villain` directive, we can refer to `villain` directly, rather\
    \ than needing to type `self.villain`. We end up by doing a bit of logging to\
    \ show all the villain’s current attributes. This can help in debugging and also\
    \ serves as a bit of a test for our code at runtime so we can see that it’s actually\
    \ doing what it’s supposed to do. The `NSLog` function takes as its first parameter\
    \ an `NSString` used to define an output format, and one additional parameter\
    \ for each formatting tag (a special sequence starting with a `%` sign) in the\
    \ string. This is very similar to the standard `printf` function in C, with the\
    \ addition of the `%@` tag that prints a description of any Objective-C object.\
    \ The output from `NSLog` shows up in Xcode’s Console window, which normally appears\
    \ automatically when we launch an application from within Xcode.\n\n**Tip** Action\
    \ methods always pass along a sender object, which is normally the object that\
    \ the user clicked or edited, triggering the method call. If our action method\
    \ may be triggered by more than one GUI object, we can determine which object\
    \ it came from by examining `sender`, comparing it to our instance variables,\
    \ and so on.\n\nCompile and run the app, and then select the text field containing\
    \ Lex Luthor’s name. Change the name in some way, press tab (or click on another\
    \ control in the window), and the output specified in the code should be printed\
    \ to the output pane in Xcode. If you don’t see any output window in Xcode when\
    \ you run your app, switch to Xcode and open the Console window by pressing ![image](images/arrow1.jpg)NC\
    \ (or selecting **View** ![image](images/arrow.jpg) **Debug Area** ![image](images/arrow.jpg)\
    \ **Activate Console**). The villain dictionary output is formatted so that you\
    \ can see each key alongside its associated value. You should be able to find\
    \ the Name key and see that its value has changed to the new value you entered.\n\
    \nMost of the rest of our action methods are similar to the `takeName:` method\
    \ and should be self-explanatory. Each of them simply does the inverse of the\
    \ work we did in the `updateDetailViews` method, taking values from the GUI and\
    \ applying them to our model object. Here’s the code for all the “simple” action\
    \ methods:\n\n```objectivec\n- (IBAction)takeLastKnownLocation:(id)sender {\n\
    \    [self.villain setObject:[sender stringValue] forKey:kLastKnownLocation];\n\
    \    NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeLastSeenDate:(id)sender\
    \ {\n    [self.villain setObject:[sender dateValue] forKey:kLastSeenDate];\n \
    \   NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeSwornEnemy:(id)sender\
    \ {\n    [self.villain setObject:[sender stringValue] forKey:kSwornEnemy];\n \
    \   NSLog(@\"current villain properties: %@\", self.villain);\n}\n```"
