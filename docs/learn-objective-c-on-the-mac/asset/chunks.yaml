  trans: "\n对于来自其他异常处理更频繁的开发环境的人来说，这可能令人惊讶，但正如我们所说，在 Cocoa 中，异常很少使用，而且几乎总是用于表示程序员犯了错误。`NSRangeException`\
    \ 和 `NSInvalidArgumentException`（针对上述两种原因）实际上构成了你可能遇到的大部分异常。\n\n## 其余异常\n\n好吧，Cocoa\
    \ 应用中可能引发的异常不止这些。例如，`NSException.h` 中定义了更多预定义的异常名称，但你很可能不会遇到它们。`NSGenericException`\
    \ 有时会在使用 SQLite 或 Apple Events 时出现，而如果你重写了本不该重写的方法（例如文档警告你不要这样做的时候），`NSInternalInconsistencyException`\
    \ 极少情况下会露出其狰狞面目，但在实际开发中，这些情况确实很难遇到。\n\n你可能会看到异常发生的一个场景是使用 Apple 的分布式对象技术，该技术使用异常的方式比\
    \ Cocoa 的其他部分要宽松得多。例如，如果 DO 失去了与它所连接的进程的连接，它会引发异常来警告你。事实上，Cocoa 定义的大多数预定义异常名称都是专门给\
    \ DO 使用的。本书中不介绍 DO 的使用，所以我们不会对这些异常多做阐述，但了解一下是有好处的，以防你将来某天用到它。\n\n## 比异常更糟：信号致死\n\
    \n现在我们已经了解了如何通过代码级操作（如捕获异常）来处理一些错误，接下来我们来看看由于对象指针使用不当而引发的另一种问题。在 Cocoa 中，每个 Objective-C\
    \ 对象都是通过一个指向特定 C 结构体的指针来引用的，该结构体定义了 Objective-C 对象的基本结构。如果该指针指向的要么不是包含有效对象的一块内存，要么不是\
    \ nil，那么几乎必然会发生某种形式的内存访问错误，导致产生一个*信号*，最终杀死我们的应用。\n\nCocoa 程序员无意中导致信号杀死应用的方式有两种。第一种是尝试向一个未初始化的对象指针发送消息。默认情况下，当我们在\
    \ Objective-C 方法中将一个新指针声明为局部变量时，我们不能指望它会自动指向 nil 或其他无害的东西。实际上，我们常常发现它指向的完全是些不合适的东西，比如一个甚至没有映射到系统中的内存地址（实例变量、静态局部变量和全局变量则不同，它们实际上会被初始化为\
    \ nil 值）。\n\n很难故意用一个未初始化的指针来触发这种行为，因为这种指针有可能恰好包含一个零值，而零值就是 nil，nil 当然是一个有效的消息接收者。不过，我们可以人为地模拟这种情况，通过在应用委托中添加以下方法：\n\
    ```\n- (void)uninitializedObject {\n    NSMutableString *string = (__bridge NSMutableString\
    \ *)(void *)0xdeadbeef;\n    [string appendFormat:@\"foo\"];\n}\n```\n因为我们使用的是\
    \ ARC，它对这些事情非常敏感，我们必须绕一些弯路才能把垃圾数据真正放入我们的指针中，先将其强制转换为 `void*`，然后再转换为 `NSMutableString*`。添加\
    \ `__bridge` 限定符告诉编译器忽略此赋值的内存管理含义。\n\n现在我们有了一个指向垃圾内存位置的 `NSMutableString` 指针。所以当它尝试调用\
    \ `appendFormat:` 方法时，接收者不是一个有效的对象，这会导致问题。要查看效果，请在 `applicationDidFinishLaunching:`\
    \ 方法中添加这行代码：\n```\n[self uninitializedObject];\n```\n运行应用，然后观察。\n\n程序将停止，并显示类似于\
    \ 图 13-5 的内容。\n\n![9781430245421_Fig13-05.jpg](img/9781430245421_Fig13-05.jpg)\n\
    \n图 13-5 . 程序在收到信号时停止\n\n根据这个垃圾指针具体指向什么，你可能会看到不同的信号名称，例如 `SIGSEGV` 或 `SIGILL`。更糟糕的是，它甚至可能指向我们程序中的其他有效对象，也许恰好是一个\
    \ `NSMutableString`，这使得追踪变得异常困难。具体细节其实并不重要；关键在于我们遇到了一个未初始化的指针（或者在此特定演示案例中，是一个指向错误内存位置的指针）。这个问题可以通过应用一条通用规则轻松解决：无论何时你在一个方法内部声明一个\
    \ Objective-C 对象指针，都要立刻给它赋值，即使只是 nil 也行。\n\n所以，通过将字符串声明行修改为以下内容来修复此问题：\n```\n\
    NSMutableString *string = nil;\n```\n构建并运行应用，一切顺利。在 Objective-C 中向 nil 指针发送消息是完全安全的（这基本上是一个空操作，并且向\
    \ nil 发送消息的返回值通常是 nil、0 或 NO），所以，虽然修复后的方法实际上不会*做*任何事情，但也不会导致崩溃。\n\n现在，还有一个需要在这里提及的内存问题来源：向一个已经被释放的对象发送消息。在本书中，我们为创建的每个应用都使用了\
    \ ARC，这几乎完全消除了这种类型的错误，但如果你将来某个时候在一个使用手动引用计数（使用 retain 和 release）的项目中工作，了解是什么导致了这类问题是很有好处的。\n\
