- fmt: "从弹出列表中选择`characters`，然后在*Controller Key*组合框中选择`arrangedObjects`。这将把表格视图连接到数组控制器，并为数组控制器管理的每个对象在表格视图中创建一行，并设置该行的`objectValue`属性。我们之前提到过，*Controller\
    \ Key*组合框允许我们选择所绑定控制器对象的不同方面。在这种情况下，通过`arrangedObjects`进行绑定意味着我们绑定到整个已排序的对象数组。这种绑定通常只适用于能够显示整个内容数组的视图对象，例如表格。\n\
    \n接下来，展开*Selection Indices*绑定配置部分（就在*Value*部分下方）。再次从弹出列表中选择`characters`，这次在*Controller\
    \ Key*组合框中输入`selectionIndices`。这会告诉数组控制器表格视图中选择了哪一行（或多行），并将选择状态传递给绑定到该数组控制器的任何其他对象。特别是，当选择发生变化时，文本字段将通过这种方式更新。\n\
    \n现在，我们需要为表格视图中包含的每个子视图建立绑定，以便从`objectValue`中提取适当的信息。由于我们只有一个列且其中只有一个视图（一个`NSTableCellView`），这很简单。`NSTableCellView`内嵌了一个`NSTextField`，这正是我们需要绑定的对象。在表格视图内的表格单元格视图中选择“Static\
    \ Text - Table View Cell”条目（从左侧展开的对象停靠栏中选择最方便）。在*Bindings Inspector*中，选择*Bind\
    \ to*为`Table Cell View`，然后在*Model Key Path*中输入`objectValue.timestamp`。这告诉`NSTextField`使用嵌入该文本字段的`NSTableCellView`所绑定对象的`timestamp`属性。\n\
    \n### 通过数组控制器的选择绑定文本字段\n\n对于`characters`部分需要完成的最后一个绑定是显示值的文本字段。此绑定也将通过数组控制器完成，从控制器的选定对象中获取`createdObject`属性。\n\
    \n单击选择左侧框中的文本字段。第一次单击可能会选择框本身，再次单击将选择文本字段。现在再次查看*Bindings Inspector*，找到*Value*绑定配置。从弹出列表中选择`characters`，从*Controller\
    \ Key*组合框中选择`selection`，从*Model Key Path*组合框中选择`createdObject`，然后勾选*Bind*复选框。请注意，通过选择`selection`作为*Controller\
    \ Key*，我们指定数组控制器仅将选定的对象提供给此控件，而不是像表格列那样提供整个对象数组。\n\n### 填充数组\n\n现在我们需要回到代码中。在编辑窗格中打开`DungeonThingAppDelegate.m`。为了让表格视图显示内容，我们需要向`NSArrayController`中放入一些数据。为此，我们将修改`createCharacter:`操作方法末尾的一行代码。我们不直接将方法生成的摘要文本放入文本字段，而是将每个摘要添加到一个数组中，并使用`NSArrayController`来完成此操作，这样所有依赖视图（任何通过同一个`NSArrayController`进行绑定的视图）也会自动更新。我们不是将裸字符串插入数组，而是创建一个包含创建对象和当前时间的`NSMutableDictionary`，将该字典作为最简单的模型对象，包含两个键值。在`createCharacter:`末尾实施此更改，将\n\
    \n```\n[self.characterLabel setStringValue:result];\n```\n\n更改为\n\n```\n[self.\n\
    characterArrayController addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\
    \  \n    result, @\"createdObject\",  \n    [NSDate date], @\"timestamp\",  \n\
    \    nil]];\n```\n\n回想一下，我们在Interface Builder中设置的`NSArrayController`中使用了`createdObject`和`timestamp`作为键，并且用于表格视图中文本字段的绑定。通过使用这些键名将对象放入数组，我们可以让绑定将其提取出来。\n\
    \n实际上，在修改代码的同时，我们还可以在`DungeonThingAppDelegate.h`文件中移除`characterLabel`的`@property`声明。代码中已不再有任何对该属性的引用，保持代码整洁是一个好习惯。\n\
    \n### 确保一切正常\n\n好了，准备工作很多。启动应用程序看看效果吧；继续构建并运行应用程序。我们应该能够创建新角色，并看到它出现在文本字段中，同时表格下方会有一条时间戳记录。修改一些偏好设置，再创建另一个角色，查看文本字段中新的参数摘要以及表格视图中新的时间戳。通过点击行来切换选择，观察文本字段中的值相应变化。\n\
    \n如果上述任何功能无法正常工作，请返回nib文件并仔细检查绑定的配置，以及`DungeonThingAppDelegate`与数组控制器的连接。\n\n\
    ### 重复实践\n\n既然我们已经完全通过绑定来处理角色，我们可以回过头来对怪物和地牢做同样的事情。通过复制`characters`数组控制器（从而保留其现有配置，包括我们已经输入的键名）创建一个新的`NSArrayController`，并将其命名为`monsters`以保持一致性。与我们之前对`characters`数组控制器的操作类似，通过创建一个名为`monsterArrayController`的新插口将`monsters`连接到`DungeonThingAppDelegate`，将其*Content\
    \ Array*和*Selected Indices*绑定配置为连接到`DungeonThingAppDelegate`中的`monsters`属性，并通过`monsters`数组控制器配置两个相关的GUI对象（表格列和文本字段），所有操作如前所述。最后，通过将`createMonster:`操作方法中的最后一行从\n\
    \n```\n[self.monsterLabel setStringValue:result];\n```\n\n更改为\n\n```\n[self.monsterArrayController\
    \ addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:  \n    result,\
    \ @\"createdObject\",  \n    [NSDate date], @\"timestamp\",  \n    nil]];\n```\n\
    \n构建并运行应用程序，确保一切正常，然后对地牢再重复一次整个过程。\n\n一旦创建了所有三个`NSArrayController`并设置了绑定，我们就可以移除`DungeonThingAppDelegate.h`中引用了文本字段的`monsterLabel`和`dungeonLabel`的`@property`声明，因为这些现在已通过绑定进行填充。\n\
    \n### 好吧，但这到底是如何工作的？\n\n既然你已经初步接触了Cocoa绑定，你可能会觉得自己刚刚目睹了一场魔术表演——并且想知道这些技巧究竟是如何运作的！这是一种完全可以理解的感觉。我们程序员习惯于必须详细说明数据的每一次移动以及屏幕的每一次更新，但突然发现仅仅在某处设置一个值，就会有一些看不见的力量将该值传播到屏幕上的其他视图。本节将通过解释键值编码和键值观察的Cocoa概念，以及Cocoa绑定如何利用它们实现其魔法，来帮助你澄清这个过程。\n\
    \n### 键值编码\n\n首先，让我们谈谈键值编码（KVC）。KVC背后的思想是允许我们通过使用与属性名或某些getter和setter方法名相匹配的字符串来引用对象的属性。"
  raw: 'Choose characters from the pop-up list, then arrangedObjects in the *Controller
    Key* combo box. This connects the table view to the array controller, and for
    each object managed by the array controller, it creates a row in the table view
    and sets the `objectValue` property of that row. We mentioned earlier that the
    *Controller Key* combo box lets us choose different aspects of the controller
    object we’re binding through. In this case, binding through arrangedObjects means
    that we’re binding to the entire sorted array of objects. This sort of binding
    is usually only appropriate for view objects that can display an entire array
    of content, such as a table.    Next, expand the *Selection Indices* binding configuration
    section (just below the *Value* section). Again, choose characters from the pop-up
    list, and this time enter selection Indices in the *Controller Key* combo box.
    This tells the array controller which row (or rows) are selected in the table
    view and passes the selection status along to any other objects that are bound
    to the array controller. In particular, this is how the text field will get updated
    when the selection changes.    Now we need to establish a binding for each subview
    contained in the table view so we can pull out the appropriate information from
    the `objectValue`. Since we only have one column with one view—an `NSTableCellView`—this
    is straightforward. The `NSTableCellView` has an embedded `NSTextField`, and that’s
    what we need to bind. Select the “Static Text - Table View Cell” entry within
    the Table Cell View within the table view (this is easiest from the expanded Object
    Dock on the left). In the *Bindings Inspector*, select *Bind to* the Table Cell
    View, and then enter `objectValue.timestamp` in the *Model Key Path*. This tells
    the `NSTextField` to use the `timestamp` property of the object bound to the `NSTableCellView`
    in which the text field is embedded.    Binding a Text Field via the Array Controller’s
    Selection    The final binding that needs to be done for the characters section
    is for the text field that displays the value. This binding will also be done
    through the array controller, grabbing the `createdObject` attribute from the
    controller’s selected object.    Click to select the text field in the box on
    the left. The first click probably selects the box itself, and clicking again
    will then select the text field. Now look again at the *Bindings Inspector*, and
    find the *Value* binding configuration. Select characters from the pop-up list,
    selection from the *Controller Key* combo box, and createdObject from the *Model
    Key Path* combo box, and then click to turn on the *Bind* checkbox. Note that
    by choosing selection for the *Controller Key*, we specify that the array controller
    will only make the selected object available to this control, rather than a whole
    array of them as it does with the table column.    Populating the Array    We
    now need to go back to the code. Open up `DungeonThingAppDelegate.m` in an editor
    pane. In order for the table view to display anything, we need to put some data
    into the `NSArrayController`. To do this, we’re going to change a single line
    at the end of the `createCharacter:` action method. Instead of putting the summary
    text created by the method directly into a text field, we’ll add each summary
    to an array, using `NSArrayController` to do this so that all dependent views
    (any views that have bindings through the same `NSArrayController`) will be automatically
    updated as well. Rather than inserting the bare string into the array, we’re creating
    an `NSMutableDictionary` containing the created object and the current time, using
    the dictionary as the simplest sort of model object, containing two keyed values.
    Implement this change at the end of `createCharacter:` by changing    ``` [self.characterLabel
    setStringValue:result]; ```    to    ``` [self.


    characterArrayController addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:
      result, @"createdObject",   [NSDate date], @"timestamp",   nil]]; ```    Recall
    that we used `createdObject` and `timestamp` as keys in the `NSArrayController`
    that we set up in Interface Builder, and for the binding for the text field within
    the table view. By putting objects into the array using these key names, we’re
    enabling the bindings to pull them back out.    In fact, while we’re in the code,
    we can also remove the `@property` declaration for `characterLabel` in the `DungeonThingAppDelegate.h`
    file. We don’t have any references to this property anywhere in the code anymore,
    and keeping the code clean is a good habit.    Making Sure it Works    OK, that’s
    been a lot of prep work. Fire it up and see what happens; go ahead and build and
    run the application. We should be able to create a new character and see it appear
    in the text field along with a timestamp entry in the table below. Modify some
    preferences, then make another character, and see the new parameter summary in
    the text field and a new timestamp in the table view. Switch between the rows
    by clicking on them and watch the value in the text field change accordingly.    If
    any of those things don’t work, go back to the nib and double-check the configuration
    of our bindings, as well as `DungeonThingAppDelegate''s` connection to the array
    controller.    Rinse, Repeat, Rinse, Repeat    Now that we’re dealing with characters
    entirely via bindings, we can go back and do the same things for monsters and
    dungeons. Create a new `NSArrayController` by duplicating the characters array
    controller (thereby keeping its existing configuration, including the key names
    we already entered) and name it “monsters” to keep it consistent. As we did with
    the characters array controller before, connect monsters to the `DungeonThingAppDelegate`
    by creating a new outlet called `monsterArrayController`, configure its *Content
    Array* and *Selected Indices* bindings to connect to the `monsters` attribute
    in `DungeonThingAppDelegate`, and configure the two relevant GUI objects (the
    table column and the text field) through the monsters array controller, all as
    described previously. Lastly, update the `createMonster:` action method by changing
    the last line from    ``` [self.monsterLabel setStringValue:result]; ```    to    ```
    [self.monsterArrayController addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:
      result, @"createdObject",   [NSDate date], @"timestamp",   nil]]; ```    Build
    and run the app and make sure it’s all working, then repeat all this once more
    for dungeons.    Once all three `NSArrayControllers` are created and the bindings
    are set up, we can remove the `monsterLabel` and `dungeonLabel @property` declarations
    in `DungeonThingAppDelegate.h` that referred to the text fields since these are
    now being populated through the bindings.    Okay, But How Did That Work?    Now
    that you’ve gotten your feet wet with Cocoa bindings, you may have the distinct
    feeling that you’ve just witnessed some sort of magic show—and you’re wondering
    how the tricks actually work! That’s a completely understandable feeling. We programmers
    are accustomed to being required to spell out every movement of a chunk of data
    and every update to the screen in excruciating detail, and suddenly we find that
    simply setting a value somewhere causes some unseen forces to propagate the value
    to other views on the screen. This section will attempt to clarify the process
    for you by explaining the Cocoa concepts of key-value coding and key-value observing,
    and how Cocoa bindings uses them to do its magic.    Key-Value Coding    First
    let’s talk about key-value coding (KVC). The idea behind KVC is to allow us to
    refer to an object’s attributes by using strings that match attribute names or
    that match the names of some getter and setter methods.'
  trans: "\n从弹出列表中选择`characters`，然后在*Controller Key*组合框中选择`arrangedObjects`。这将把表格视图连接到数组控制器，并为数组控制器管理的每个对象在表格视图中创建一行，并设置该行的`objectValue`属性。我们之前提到过，*Controller\
    \ Key*组合框允许我们选择所绑定控制器对象的不同方面。在这种情况下，通过`arrangedObjects`进行绑定意味着我们绑定到整个已排序的对象数组。这种绑定通常只适用于能够显示整个内容数组的视图对象，例如表格。\n\
    \n接下来，展开*Selection Indices*绑定配置部分（就在*Value*部分下方）。再次从弹出列表中选择`characters`，这次在*Controller\
    \ Key*组合框中输入`selectionIndices`。这会告诉数组控制器表格视图中选择了哪一行（或多行），并将选择状态传递给绑定到该数组控制器的任何其他对象。特别是，当选择发生变化时，文本字段将通过这种方式更新。\n\
    \n现在，我们需要为表格视图中包含的每个子视图建立绑定，以便从`objectValue`中提取适当的信息。由于我们只有一个列且其中只有一个视图（一个`NSTableCellView`），这很简单。`NSTableCellView`内嵌了一个`NSTextField`，这正是我们需要绑定的对象。在表格视图内的表格单元格视图中选择“Static\
    \ Text - Table View Cell”条目（从左侧展开的对象停靠栏中选择最方便）。在*Bindings Inspector*中，选择*Bind\
    \ to*为`Table Cell View`，然后在*Model Key Path*中输入`objectValue.timestamp`。这告诉`NSTextField`使用嵌入该文本字段的`NSTableCellView`所绑定对象的`timestamp`属性。\n\
    \n### 通过数组控制器的选择绑定文本字段\n\n对于`characters`部分需要完成的最后一个绑定是显示值的文本字段。此绑定也将通过数组控制器完成，从控制器的选定对象中获取`createdObject`属性。\n\
    \n单击选择左侧框中的文本字段。第一次单击可能会选择框本身，再次单击将选择文本字段。现在再次查看*Bindings Inspector*，找到*Value*绑定配置。从弹出列表中选择`characters`，从*Controller\
    \ Key*组合框中选择`selection`，从*Model Key Path*组合框中选择`createdObject`，然后勾选*Bind*复选框。请注意，通过选择`selection`作为*Controller\
    \ Key*，我们指定数组控制器仅将选定的对象提供给此控件，而不是像表格列那样提供整个对象数组。\n\n### 填充数组\n\n现在我们需要回到代码中。在编辑窗格中打开`DungeonThingAppDelegate.m`。为了让表格视图显示内容，我们需要向`NSArrayController`中放入一些数据。为此，我们将修改`createCharacter:`操作方法末尾的一行代码。我们不直接将方法生成的摘要文本放入文本字段，而是将每个摘要添加到一个数组中，并使用`NSArrayController`来完成此操作，这样所有依赖视图（任何通过同一个`NSArrayController`进行绑定的视图）也会自动更新。我们不是将裸字符串插入数组，而是创建一个包含创建对象和当前时间的`NSMutableDictionary`，将该字典作为最简单的模型对象，包含两个键值。在`createCharacter:`末尾实施此更改，将\n\
    \n```\n[self.characterLabel setStringValue:result];\n```\n\n更改为\n\n```\n[self.characterArrayController\
    \ addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:  \n    result,\
    \ @\"createdObject\",  \n    [NSDate date], @\"timestamp\",  \n    nil]];\n```\n\
    \n回想一下，我们在 Interface Builder 中设置的`NSArrayController`中使用了`createdObject`和`timestamp`作为键，并且用于表格视图中文本字段的绑定。通过使用这些键名将对象放入数组，我们可以让绑定将其提取出来。\n\
    \n实际上，在修改代码的同时，我们还可以在`DungeonThingAppDelegate.h`文件中移除`characterLabel`的`@property`声明。代码中已不再有任何对该属性的引用，保持代码整洁是一个好习惯。\n\
    \n### 确保一切正常\n\n好了，准备工作很多。启动应用程序看看效果吧；继续构建并运行应用程序。我们应该能够创建新角色，并看到它出现在文本字段中，同时表格下方会有一条时间戳记录。修改一些偏好设置，再创建另一个角色，查看文本字段中新的参数摘要以及表格视图中新的时间戳。通过点击行来切换选择，观察文本字段中的值相应变化。\n\
    \n如果上述任何功能无法正常工作，请返回 nib 文件并仔细检查绑定的配置，以及`DungeonThingAppDelegate`与数组控制器的连接。\n\n\
    ### 重复实践\n\n既然我们已经完全通过绑定来处理角色，我们可以回过头来对怪物和地牢做同样的事情。通过复制`characters`数组控制器（从而保留其现有配置，包括我们已经输入的键名）创建一个新的`NSArrayController`，并将其命名为`monsters`以保持一致性。与我们之前对`characters`数组控制器的操作类似，通过创建一个名为`monsterArrayController`的新插口将`monsters`连接到`DungeonThingAppDelegate`，将其*Content\
    \ Array*和*Selected Indices*绑定配置为连接到`DungeonThingAppDelegate`中的`monsters`属性，并通过`monsters`数组控制器配置两个相关的\
    \ GUI 对象（表格列和文本字段），所有操作如前所述。最后，通过将`createMonster:`操作方法中的最后一行从\n\n```\n[self.monsterLabel\
    \ setStringValue:result];\n```\n\n更改为\n\n```\n[self.monsterArrayController addObject:[NSMutableDictionary\
    \ dictionaryWithObjectsAndKeys:  \n    result, @\"createdObject\",  \n    [NSDate\
    \ date], @\"timestamp\",  \n    nil]];\n```\n\n构建并运行应用程序，确保一切正常，然后对地牢再重复一次整个过程。\n\
    \n一旦创建了所有三个`NSArrayController`并设置了绑定，我们就可以移除`DungeonThingAppDelegate.h`中引用了文本字段的`monsterLabel`和`dungeonLabel`的`@property`声明，因为这些现在已通过绑定进行填充。\n\
    \n### 好吧，但这到底是如何工作的？\n\n既然你已经初步接触了 Cocoa 绑定，你可能会觉得自己刚刚目睹了一场魔术表演——并且想知道这些技巧究竟是如何运作的！这是一种完全可以理解的感觉。我们程序员习惯于必须详细说明数据的每一次移动以及屏幕的每一次更新，但突然发现仅仅在某处设置一个值，就会有一些看不见的力量将该值传播到屏幕上的其他视图。本节将通过解释键值编码和键值观察的\
    \ Cocoa 概念，以及 Cocoa 绑定如何利用它们实现其魔法，来帮助你澄清这个过程。\n\n### 键值编码\n\n首先，让我们谈谈键值编码（KVC）。KVC\
    \ 背后的思想是允许我们通过使用与属性名或某些 getter 和 setter 方法名相匹配的字符串来引用对象的属性。\n"
- fmt: "Say, for instance, that we have a class called `Person`, which has the concept\
    \ of a `firstName`, either in the form of an instance variable called `firstName`,\
    \ or a pair of methods called `firstName` and `setFirstName:`. Using KVC, we can\
    \ access a person’s `firstName` attribute using the following incantation:\n\n\
    ```\n[myPerson setValue:@\"Frodo\" forKey:@\"firstName\"];\n```\n\nGiven the key\
    \ name `firstName`, this method call first checks to see whether the object has\
    \ a method called `setFirstName:`, and if so, invokes it to set the value. If\
    \ that doesn’t work, it checks to see if there’s an instance variable called `firstName`\
    \ and tries to set it directly.\n\nWe can also retrieve a value in a similar manner:\n\
    \n```\nmyNameString = [myPerson valueForKey:@\"firstName\"];\n```\n\nA similar\
    \ sequence occurs in this case. It first looks for a method called `firstName`,\
    \ and if there isn’t one, it tries to find an instance variable with the same\
    \ name.\n\nThe result of all this is that KVC gives us a way to talk about an\
    \ object’s attributes in an extremely generic fashion. Not only is the object’s\
    \ storage of its attributes transparent to us, even the way to access an attribute\
    \ from the outside is something that we don’t need to worry about. It could change,\
    \ perhaps even inside a running a program, and we wouldn’t notice the difference.\n\
    \nThe `setValue:forKey:` and `valueForKey:` methods are defined in `NSObject`\
    \ (with some additional extensions for collection classes like `NSArray` and `NSSet`)\
    \ to try to determine, on the fly, the best way to access the value based on the\
    \ name of the key. This means that they are ready to use on every class in Cocoa.\n\
    \nOne additional point to make about KVC is that the strings used as keys can\
    \ actually be used as a sort of path to traverse relationships between objects.\
    \ For example, let’s imagine that our `Person` class also contains a property\
    \ called `mother`, which is a pointer to another `Person`. If we want to set the\
    \ `firstName` of `myPerson's` mother, in normal code we would likely do it one\
    \ of these ways:\n\n```\nmyPerson.mother.firstName = @\"Anne\"; \n[myPerson.mother\
    \ setFirstName:@\"Anne\"]; \n[[myPerson mother] setFirstName:@\"Anne\"];\n```\n\
    \nUsing KVC, we have an additional way to accomplish this:\n\n```\n[myPerson setValue:@\"\
    Anne\" forKeyPath:@\"mother.firstName\"];\n```\n\nThe KVC methods are smart enough\
    \ to look at the key string, split it apart by paths, and traverse any object\
    \ relationships mentioned in the path, so the previous line ends up calling something\
    \ like this:\n\n```\n[[myPerson valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"\
    firstName\"];\n```\n\nWhile neither of the KVC options are really appealing for\
    \ regular use in our own code (because the “normal” versions all read a bit more\
    \ nicely), they can be used to great advantage in situations requiring more flexibility,\
    \ such as, say, an interface that lets us configure which values will be displayed\
    \ in a view object just by typing in the name of the path to the attribute, without\
    \ requiring compilation of any source code or anything. Sound familiar?\n\n##\
    \ Key-Value Observing\n\nThe next piece of the puzzle is key-value observing (KVO).\
    \ With KVO, an object can register with another object to be informed of changes\
    \ as they occur. For instance, continuing with the last example, we can tell `myPerson`\
    \ to notify us whenever the value of its `firstName` attribute changes, like this:\n\
    \n```\n[myPerson addObserver:self forKeyPath:@\"firstName\" options:nil context:NULL];\n\
    ```\n\nIn return, `myPerson` will call a method called `observeValueForKeyPath:ofObject:change:context:`\
    \ in the observer whenever the `firstName` attribute changes, whether that change\
    \ occurs via the `setValue:forKey:` method or by someone calling the `setFirstName:`\
    \ method.\n\nThe way this is implemented is quite clever and involves some meta-programming\
    \ deep inside Cocoa, creating a subclass of `Person` at runtime that overrides\
    \ the `setFirstName:` method, and passing along a message to all observers after\
    \ the value changes. This is done so smoothly that we would never suspect the\
    \ existence of the hidden `Person` subclass unless we went looking for it—and\
    \ really dug deep in just the right places. As a result, we don’t really need\
    \ to know about these implementation details. Just be glad we’re entering into\
    \ the world of Cocoa programming at a time when this particular technology has\
    \ matured as much as it has, because it was a little rough around the edges when\
    \ it first came out!\n\nAt the end of the day, we probably won’t need to deal\
    \ with KVO directly at all. Almost everything we’d ever want to do with KVO can\
    \ be done more cleanly and easily with Cocoa bindings, which is built on top of\
    \ it and provides a higher-level interface. That’s why we’ve focused on the functionality\
    \ of Cocoa bindings and aren’t doing any direct programming with KVO.\n\n## Cocoa\
    \ Bindings: How It Works\n\nWhile a complete and accurate description of the implementation\
    \ of Cocoa bindings is outside the scope of this book, it may be useful to get\
    \ a fuller picture of how it uses KVC and KVO to do its work. Now that we’ve gotten\
    \ a brief intro into KVC and KVO, let’s take a look at how these bits fit together.\n\
    \nWhen we establish a binding in Interface Builder, like we’ve done numerous times\
    \ in this chapter already, we’re actually defining a sort of contract. We’re declaring\
    \ that when this nib is loaded and these objects are set up, a sequence of events\
    \ will occur to establish some KVO relationships between the objects, using a\
    \ key path string (using KVC) to define which attribute is in focus for each binding,\
    \ along with other information to identify which aspect (such as the displayed\
    \ value, the enabled state, and the like) of the “receiving end” (typically a\
    \ GUI control) should be affected by changes in the underlying value. At runtime,\
    \ Cocoa will set things up so that the control (or any other object we’ve established\
    \ a binding on) will be set up to observe changes in the controller based on the\
    \ relevant key and the controller will be set up to observe changes in the control’s\
    \ chosen aspect.\n\n## Wrap Up\n\nBindings are a really powerful technology. In\
    \ retrospect, you can probably see that’s it’s possible to implement nearly everything\
    \ shown in the previous chapters using Cocoa bindings, creating an app with almost\
    \ no custom code whatsoever! This doesn’t in any way diminish the usefulness of\
    \ the techniques shown in previous chapters, however. The fact is that sometimes\
    \ you will want to access values in the GUI manually in methods called by target-action.\
    \ A general rule of thumb is that if you’re in a situation (a simple app or a\
    \ subcomponent of a larger app) where you don’t have any apparent model objects\
    \ to work with, you may be best served by doing things “the old way” with outlets\
    \ and target/action connections, but, in general, Cocoa bindings are the preferred\
    \ method for developing Mac apps from here on out.\n\nThe next few chapters will\
    \ demonstrate how to do even more with bindings using Core Data. Core Data’s functionality\
    \ is orthogonal to Cocoa Binding’s; whereas Cocoa bindings lets you eliminate\
    \ some boring controller code, Core Data takes care of a lot of the plumbing that\
    \ you’d otherwise have to write for your model classes, giving you a storage back-end,\
    \ built-in Undo/Redo support, and much more. Together, Cocoa bindings and Core\
    \ Data can get you building so much software so effectively that you’ll be making\
    \ other people’s heads spin!"
  raw: 'Say, for instance, that we have a class called `Person`, which has the concept
    of a `firstName`, either in the form of an instance variable called `firstName`,
    or a pair of methods called `firstName` and `setFirstName:`. Using KVC, we can
    access a person’s `firstName` attribute using the following incantation:    ```
    [myPerson setValue:@"Frodo" forKey:@"firstName"]; ```    Given the key name `firstName`,
    this method call first checks to see whether the object has a method called `setFirstName:`,
    and if so, invokes it to set the value. If that doesn’t work, it checks to see
    if there’s an instance variable called `firstName` and tries to set it directly.    We
    can also retrieve a value in a similar manner:    ``` myNameString = [myPerson
    valueForKey:@"firstName"]; ```    A similar sequence occurs in this case. It first
    looks for a method called `firstName`, and if there isn’t one, it tries to find
    an instance variable with the same name.    The result of all this is that KVC
    gives us a way to talk about an object’s attributes in an extremely generic fashion.
    Not only is the object’s storage of its attributes transparent to us, even the
    way to access an attribute from the outside is something that we don’t need to
    worry about. It could change, perhaps even inside a running a program, and we
    wouldn’t notice the difference.    The `setValue:forKey:` and `valueForKey:` methods
    are defined in `NSObject` (with some additional extensions for collection classes
    like `NSArray` and `NSSet`) to try to determine, on the fly, the best way to access
    the value based on the name of the key. This means that they are ready to use
    on every class in Cocoa.    One additional point to make about KVC is that the
    strings used as keys can actually be used as a sort of path to traverse relationships
    between objects. For example, let’s imagine that our `Person` class also contains
    a property called `mother`, which is a pointer to another `Person`. If we want
    to set the `firstName` of `myPerson''s` mother, in normal code we would likely
    do it one of these ways:    ``` myPerson.mother.firstName = @"Anne"; [myPerson.mother
    setFirstName:@"Anne"]; [[myPerson mother] setFirstName:@"Anne"]; ```    Using
    KVC, we have an additional way to accomplish this:    ``` [myPerson setValue:@"Anne"
    forKeyPath:@"mother.firstName"]; ```    The KVC methods are smart enough to look
    at the key string, split it apart by paths, and traverse any object relationships
    mentioned in the path, so the previous line ends up calling something like this:    ```
    [[myPerson valueForKey:@"mother"] setValue:@"Anne" forKey:@"firstName"]; ```    While
    neither of the KVC options are really appealing for regular use in our own code
    (because the “normal” versions all read a bit more nicely), they can be used to
    great advantage in situations requiring more flexibility, such as, say, an interface
    that lets us configure which values will be displayed in a view object just by
    typing in the name of the path to the attribute, without requiring compilation
    of any source code or anything. Sound familiar?    Key-Value Observing    The
    next piece of the puzzle is key-value observing (KVO). With KVO, an object can
    register with another object to be informed of changes as they occur. For instance,
    continuing with the last example, we can tell `myPerson` to notify us whenever
    the value of its `firstName` attribute changes, like this:    ``` [myPerson addObserver:self
    forKeyPath:@"firstName" options:nil context:NULL]; ```    In return, `myPerson`
    will call a method called `observeValueForKeyPath:ofObject:change:context:` in
    the observer whenever the `firstName` attribute changes, whether that change occurs
    via the `setValue:forKey:` method or by someone calling the `setFirstName:` method.


    The way this is implemented is quite clever and involves some meta-programming
    deep inside Cocoa, creating a subclass of `Person` at runtime that overrides the
    `setFirstName:` method, and passing along a message to all observers after the
    value changes. This is done so smoothly that we would never suspect the existence
    of the hidden `Person` subclass unless we went looking for it—and really dug deep
    in just the right places. As a result, we don’t really need to know about these
    implementation details. Just be glad we’re entering into the world of Cocoa programming
    at a time when this particular technology has matured as much as it has, because
    it was a little rough around the edges when it first came out!    At the end of
    the day, we probably won’t need to deal with KVO directly at all. Almost everything
    we’d ever want to do with KVO can be done more cleanly and easily with Cocoa bindings,
    which is built on top of it and provides a higher-level interface. That’s why
    we’ve focused on the functionality of Cocoa bindings and aren’t doing any direct
    programming with KVO.    Cocoa Bindings: How It Works    While a complete and
    accurate description of the implementation of Cocoa bindings is outside the scope
    of this book, it may be useful to get a fuller picture of how it uses KVC and
    KVO to do its work. Now that we’ve gotten a brief intro into KVC and KVO, let’s
    take a look at how these bits fit together.    When we establish a binding in
    Interface Builder, like we’ve done numerous times in this chapter already, we’re
    actually defining a sort of contract. We’re declaring that when this nib is loaded
    and these objects are set up, a sequence of events will occur to establish some
    KVO relationships between the objects, using a key path string (using KVC) to
    define which attribute is in focus for each binding, along with other information
    to identify which aspect (such as the displayed value, the enabled state, and
    the like) of the “receiving end” (typically a GUI control) should be affected
    by changes in the underlying value. At runtime, Cocoa will set things up so that
    the control (or any other object we’ve established a binding on) will be set up
    to observe changes in the controller based on the relevant key and the controller
    will be set up to observe changes in the control’s chosen aspect.    Wrap Up    Bindings
    are a really powerful technology. In retrospect, you can probably see that’s it’s
    possible to implement nearly everything shown in the previous chapters using Cocoa
    bindings, creating an app with almost no custom code whatsoever! This doesn’t
    in any way diminish the usefulness of the techniques shown in previous chapters,
    however. The fact is that sometimes you will want to access values in the GUI
    manually in methods called by target-action. A general rule of thumb is that if
    you’re in a situation (a simple app or a subcomponent of a larger app) where you
    don’t have any apparent model objects to work with, you may be best served by
    doing things “the old way” with outlets and target/action connections, but, in
    general, Cocoa bindings are the preferred method for developing Mac apps from
    here on out.    The next few chapters will demonstrate how to do even more with
    bindings using Core Data. Core Data’s functionality is orthogonal to Cocoa Binding’s;
    whereas Cocoa bindings lets you eliminate some boring controller code, Core Data
    takes care of a lot of the plumbing that you’d otherwise have to write for your
    model classes, giving you a storage back-end, built-in Undo/Redo support, and
    much more. Together, Cocoa bindings and Core Data can get you building so much
    software so effectively that you’ll be making other people’s heads spin!'
  trans: "\n假设我们有一个名为 `Person` 的类，它包含 `firstName` 的概念，可能以名为 `firstName` 的实例变量形式存在，也可能以名为\
    \ `firstName` 和 `setFirstName:` 的一对方法形式存在。使用 KVC，我们可以通过以下咒语来访问一个人的 `firstName`\
    \ 属性：\n\n```\n[myPerson setValue:@\"Frodo\" forKey:@\"firstName\"];\n```\n\n给定键名\
    \ `firstName`，这个方法调用首先会检查该对象是否有一个名为 `setFirstName:` 的方法，如果有，则调用它来设置值。如果找不到该方法，它会检查是否存在名为\
    \ `firstName` 的实例变量，并尝试直接设置它。\n\n我们也可以用类似的方式检索值：\n\n```\nmyNameString = [myPerson\
    \ valueForKey:@\"firstName\"];\n```\n\n这种情况下也会发生类似的查找顺序。它首先查找名为 `firstName` 的方法，如果没有，则尝试查找同名的实例变量。\n\
    \n这一切的结果是，KVC 为我们提供了一种以极其通用的方式来谈论对象属性的途径。对象的属性存储方式对我们来说是透明的，甚至连从外部访问属性的方式我们也不必担心。它可能会发生变化，甚至在程序运行期间改变，而我们也察觉不到差别。\n\
    \n`setValue:forKey:` 和 `valueForKey:` 方法定义在 `NSObject` 中（并为 `NSArray` 和 `NSSet`\
    \ 等集合类提供了额外的扩展），它们会尝试根据键的名称动态确定访问值的最佳方式。这意味着它们在 Cocoa 的每一个类中都可以直接使用。\n\n关于 KVC\
    \ 还需补充的一点是，用作键的字符串实际上可以作为一种路径，用来遍历对象之间的关系。例如，假设我们的 `Person` 类还包含一个名为 `mother`\
    \ 的属性，它是一个指向另一个 `Person` 对象的指针。如果我们想设置 `myPerson` 的母亲的 `firstName`，在常规代码中，我们可能会这样做：\n\
    \n```\nmyPerson.mother.firstName = @\"Anne\"; \n[myPerson.mother setFirstName:@\"\
    Anne\"]; \n[[myPerson mother] setFirstName:@\"Anne\"];\n```\n\n使用 KVC，我们还有另一种方式来实现：\n\
    \n```\n[myPerson setValue:@\"Anne\" forKeyPath:@\"mother.firstName\"];\n```\n\n\
    KVC 方法足够智能，能够解析键字符串，按路径将其拆分，并遍历路径中提到的所有对象关系。因此，上面这行代码最终会执行类似这样的操作：\n\n```\n[[myPerson\
    \ valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"firstName\"];\n```\n\n\
    虽然 KVC 的这两种方式在我们自己的代码中常规使用时都不太有吸引力（因为“常规”版本读起来更顺眼），但在需要更高灵活性的场景下，它们却能发挥巨大优势。例如，想象一个界面，它允许我们仅仅通过输入属性路径的名称，就能配置视图中要显示哪些值，而无需编译任何源代码或其他东西。听起来是不是很熟悉？\n\
    \n## 键值观察\n\n问题的下一个部分是键值观察（KVO）。通过 KVO，一个对象可以向另一个对象注册，以便在值发生变化时得到通知。例如，接续上一个例子，我们可以让\
    \ `myPerson` 在其 `firstName` 属性值发生变化时通知我们，就像这样：\n\n```\n[myPerson addObserver:self\
    \ forKeyPath:@\"firstName\" options:nil context:NULL];\n```\n\n相应地，每当 `firstName`\
    \ 属性发生变化时，无论这种变化是通过 `setValue:forKey:` 方法还是通过调用 `setFirstName:` 方法引起的，`myPerson`\
    \ 都会在观察者中调用一个名为 `observeValueForKeyPath:ofObject:change:context:` 的方法。\n\n这种实现方式非常巧妙，涉及到\
    \ Cocoa 内部的一些元编程：在运行时创建一个 `Person` 的子类，重写 `setFirstName:` 方法，并在值发生变化后向所有观察者传递消息。这一过程如此顺畅，以至于我们永远也不会怀疑存在一个隐藏的\
    \ `Person` 子类——除非我们特意去寻找它，并且要相当深入地在恰当地点挖掘。因此，我们实际上不需要了解这些实现细节。只需庆幸我们进入 Cocoa 编程世界时，这项技术已经相当成熟即可，因为它在刚出现时还是有些粗糙之处的！\n\
    \n归根结底，我们可能根本不需要直接处理 KVO。几乎所有我们想用 KVO 做的事情，都可以通过构建在其之上并提供更高层接口的 Cocoa 绑定更干净、更轻松地完成。这正是我们专注于\
    \ Cocoa 绑定的功能，而不直接使用 KVO 进行编程的原因。\n\n## Cocoa 绑定：它是如何工作的\n\n虽然对 Cocoa 绑定的实现进行完整而准确的描述超出了本书的范围，但更全面地了解它如何利用\
    \ KVC 和 KVO 来完成工作，可能会对理解很有帮助。既然我们已经对 KVC 和 KVO 有了初步了解，接下来就看看这些部分是如何结合在一起的。\n\n\
    当我们在 Interface Builder 中建立绑定时（就像本章中我们已经多次做的那样），实际上是在定义一个契约。我们声明的是：当这个 nib 文件被加载并且这些对象被设置好时，会触发一系列事件，在对象之间建立一些\
    \ KVO 关系。这个过程使用键路径字符串（通过 KVC）来定义每个绑定关注的是哪个属性，同时还会附带其他信息，以标识“接收端”（通常是一个 GUI 控件）的哪个方面（例如显示的值、启用状态等）应受底层值变化的影响。在运行时，Cocoa\
    \ 会进行设置，使得控件（或我们已建立绑定的任何其他对象）能够根据相关键来观察控制器中的变化，同时控制器也会被设置为观察控件选定方面的变化。\n\n## 总结\n\
    \n绑定是一项非常强大的技术。回顾一下，你可能已经发现，使用 Cocoa 绑定几乎可以实现前面章节中展示的所有内容，从而创建出一个几乎无需任何自定义代码的应用！然而，这丝毫不会削弱前面章节所展示技巧的实用性。事实是，有时候你仍然希望在由目标-动作调用的方法中手动访问\
    \ GUI 中的值。一个通用的经验法则是：如果你处于一个没有明显的模型对象可供使用的情况（无论是简单的应用还是大型应用的子组件），那么使用带有输出口和目标/动作连接的“老方法”可能是最佳选择。但总的来说，从现在开始，Cocoa\
    \ 绑定是开发 Mac 应用的首选方法。\n\n接下来的几章将演示如何结合 Core Data 来做更多与绑定相关的事情。Core Data 的功能与 Cocoa\
    \ 绑定是正交互补的：Cocoa 绑定让你省去一些枯燥的控制器代码，而 Core Data 则负责处理你原本需要为模型类编写的许多基础架构代码，为你提供存储后端、内置的撤销/重做支持，以及更多功能。Cocoa\
    \ 绑定和 Core Data 结合在一起，可以让你如此高效地构建大量软件，以至于让其他人眼花缭乱！\n"
- fmt: '# Chapter 8 Core Data Basics


    In earlier chapters, we showed you various ways that Cocoa lets you display data
    in view objects, from manually getting and setting values based on the contents
    of model objects to having the data automatically synchronized between model and
    view objects using Cocoa Bindings, which eliminates the need for a lot of boring
    controller code. Now it’s time to learn about Core Data, a powerful framework
    that gives our model objects a complete set of built-in capabilities.


    We’ll start by talking about what Core Data is and how it fits in with the other
    parts of Cocoa. Then we’ll use Core Data to create a full-featured database application
    called MythBase, including a GUI that allows us to create, search, edit, and delete
    entries, all without writing a single line of code (see [Figure 8-1](#9781430245421_Ch08.xhtml#Fig1)
    for a shot of MythBase in action). Then we’ll explore some of the code resources
    that are created for us automatically when we create a Core Data project, and
    finally we’ll demonstrate how to add functionality ("business logic") to our model
    objects.


    ## What We’ve Been Missing


    All of our examples in previous chapters used instances of `NSMutableDictionary`
    in the place of real model objects. What do we mean by "real model objects?" Well,
    besides just being able to hold onto pieces of data, which are accessible using
    field names or keys (something that `NSMutableDictionary` does well enough), real
    model objects should include some of the following features:


    - **Archiving**: Model objects should have access to a built-in mechanism for
    being saved to disk and later reloaded.

    - **Business Logic**: There should be a way to give a model object custom behavior
    that operates in response to input values.

    - **Validation**: Each model object should be able to automatically validate input
    values.


    ![9781430245421_Fig08-01.jpg](images/9781430245421_Fig08-01.jpg)


    [Figure 8-1](#9781430245421_Ch08.xhtml#_Fig1). The MythBase application, in all
    its glory


    In the past, Mac application developers following MVC principles would typically
    have to roll their own solutions for these common needs, but Core Data provides
    all of this and more. Besides the features listed previously, Core Data also provides
    the following additional key features:


    - **Undo/Redo Support**: Core Data’s mechanisms for handling values are tied into
    the standard undo facility in Mac OS X. Having this built in to our model classes
    saves us the additional effort of implementing this common functionality ourselves.

    - **Integration with Cocoa Bindings**: Together with Cocoa bindings, Core Data
    provides us with a mechanism for connecting views to models using generic controller
    objects, thereby eliminating a lot of boring glue code.

    - **Persistence**: Core Data offers a variety of ways to persist objects to disk,
    allowing us to save and load object state from one run to the next.


    Taken together, all of these features provide the core of our application with
    some sturdy infrastructure. We can use Core Data to build GUI apps (with or without
    Cocoa bindings), command-line tools, games, or any other sort of software system
    that can be specified using traditional object modeling techniques. In other words,
    almost any application at all.


    ## Creating MythBase


    Now, let’s get started creating MythBase, a GUI application that lets us maintain
    a database of mythological figures. We’ll use Core Data for the model layer and
    Cocoa bindings to handle most of the controller functionality. There will be some
    new concepts and terminology to tackle, and we’ll cover each piece as we get to
    it.


    In the first iteration, we’ll define a model for our application using a special
    tool inside Xcode, and create a simple GUI using an assistant in Xcode. In the
    second iteration, we’ll refine the GUI to improve the user experience a bit. Then,
    after explaining some other aspects of the application, we’ll take a third pass
    at the functionality, adding some business logic to the application’s model layer.


    Start by creating a new application project. In Xcode, choose File ![image](images/arrow.jpg)
    New Project, select OS X/Application on the left side of the window, pick *Cocoa
    Application* from the list of project templates, and then click Next. Enter MythBase
    as the Product Name, MB for the *Class Prefix*, click to turn on the *Use Core
    Data* and *Use Automatic Reference Counting* checkboxes (see [Figure 8-2](#9781430245421_Ch08.xhtml#Fig2)),
    and then click Next. To save our project, navigate to an appropriate directory
    and click Create.


    ![9781430245421_Fig08-02.jpg](images/9781430245421_Fig08-02.jpg)


    [Figure 8-2](#9781430245421_Ch08.xhtml#_Fig2). Creating a new application project,
    and turning on the Core Data option


    ## Defining the Model


    At this point, we’ll have a brand-new project, similar to the ones we’ve created
    before. Choosing to use Core Data causes Xcode to use a slightly different project
    template, so this project will have a thing or two you haven’t seen in the old
    projects. Xcode’s navigator pane contains a new file named `MythBase.xcdatamodeld`,
    which is the empty Core Data model file. A model file contains metadata about
    our application’s model layer. We create the model file using a graphical tool
    built into Xcode, and our application reads the model file at runtime. We’ll also
    find, if we go digging for it in the project navigator area, that `CoreData.framework`
    was added under Frameworks/Other Frameworks.


    ### Modeling: What?


    From this point, we’re going to assume that you have some understanding of object
    modeling or database modeling. But on the off chance that you’re totally perplexed
    by this, here’s a very brief summary. The idea is that the things your application
    is dealing with, the content that your application is "about," can be split into
    independent chunks and organized into a reasonable structure through modeling
    techniques. Using Core Data, you’ll want to figure out how to organize your data
    along the following lines:


    - **Entities**: An entity is used to describe a uniquely identifiable "thing"
    in your application, something that can exist and be described and identified
    on its own terms. Entities are usually the big "nouns" of your system. People,
    companies, and monetary transactions are all entities. Eye color, market capitalization,
    and transaction amounts are not.

    - **Attributes**: Anything that seems like a descriptive feature of an entity,
    without referring to anything else, is probably an attribute of that entity. Eye
    color, market capitalization, and transaction amounts are all likely to be attributes
    of the aforementioned people, companies, and monetary transactions. A person’s
    current account balance, the phone number of a company’s CEO, and a transaction
    recipient’s email address are *not* attributes of the entities we mentioned. Each
    of these is better modeled by traversing a *relationship* to another entity and
    accessing an attribute found there.

    - **Relationships**: Use relationships to establish linkages between entities.
    Relationships can be one-to-many (one person may be the recipient of many transactions),
    many-to-one (many people can be employed by the same company), one-to-one (each
    person can have exactly one spouse), or many-to-many (a company can have many
    people as customers, and at the same time a person can be a customer of many companies).


    The model file contains information that should be familiar to anyone who’s ever
    done any sort of object modeling, database modeling, or really any sort of entity-relationship
    modeling at all. First, there’s the concept of an *entity*, which corresponds
    roughly to a class in object modeling or a table in database modeling. Each entity
    consists of several *attributes*, and entities can be joined together with *relationships*.'
