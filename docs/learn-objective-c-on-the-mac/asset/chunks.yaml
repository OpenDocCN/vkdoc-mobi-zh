    \ {\n    NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];\n    NSMutableString\
    \ *result = [NSMutableString stringWithCapacity:1024];\n    [result appendString:@\"\
    Generating a dungeon within these parameters:\\n-----------------\\n\"];\n   \
    \ [result appendFormat:\n     @\"Tunnel twistiness: %ld\\n\",\n     [ud integerForKey:kDungeonTunnelTwistiness]];\n\
    \    [result appendFormat:\n     @\"Monster frequency: %ld\\n\",\n     [ud integerForKey:kDungeonMonsterFrequency]];\n\
