    ### 创建一个“Venue”窗口


    现在，是时候再创建一个用于显示和编辑 `MythicalVenues` 的窗口了。制作这个窗口的过程与我们制作“Mythical Bands”窗口时非常相似：需要一个窗口、一个表视图、几个按钮以及一个
    `NSArrayController`。由于真正的神话级场地并不多，我们省去了这个窗口上的搜索框。而且，由于我们已经做过一次，所以会加快速度。


    首先，从*对象库*中拖出一个窗口到 Interface Builder 画布上。在*属性检查器*中，将其标题设置为“Mythical Venues”。这个窗口比我们需要的要大一点，所以我们可以在垂直方向上将其缩小到大约三分之二的高度，并稍微收窄一些。拖出一个表视图，将其放置在屏幕的左上角，让蓝色参考线告诉我们放置的位置。将表视图展开以填满窗口，如图
    9-1 所示。在表视图的*属性检查器*中，将其*内容模式*更改为基于视图，并将其设置为一列。展开这一列以填满表视图的宽度。


    拖出一个渐变按钮到窗口上，将其放置在表视图的右下边缘下方。这将是我们的“添加”按钮，所以双击它并将标题改为“Add”。再拖出另一个按钮，将其放置在“添加”按钮的左侧，并将此按钮标题设置为“Remove”。和往常一样，蓝色参考线是我们正确定位的帮手。


    接下来我们需要一个 `NSArrayController`。从*对象库*中抓取一个，并将其拖到 Interface Builder 画布上。在左侧的对象停靠区中，将其标题设置为“Mythical
    Venues”。在*属性检查器*中，将其*模式*设置为“Entity Name”，将实体名称设置为“MythicalVenue”，并勾选*Prepares
    Content*复选框，以便在加载 nib 文件时获取所有场地。我们还需要将“Mythical Venues”数组控制器连接到 App Delegate 提供的托管对象上下文。在*绑定检查器*中，展开底部的*参数*部分。勾选*Bind
    to*复选框，将下拉菜单设置为“App Delegate”，并将*模型键路径*设置为“managedObjectContext”。


    现在我们需要将所有内容连接起来。让我们从表视图开始。选中表视图（记住它嵌入在一个滚动视图中）。在*绑定检查器*中，展开*表内容*下的*内容*部分。然后，勾选*Bind
    to*复选框并将下拉菜单设置为“Mythical Venues”。默认的控制器键 `arrangedObjects` 就很好。现在处理列。正如我们之前对“Band
    Members”表视图所做的那样，深入到表视图内部的“Static Text – Table View Cell”。在*绑定检查器*中，展开*值*部分。下拉菜单应该显示“Table
    Cell View”。勾选*Bind to*复选框，将*模型键路径*设置为“objectValue.name”，同时将*控制器键*字段留空。在这里，我们切换到*属性检查器*，将*行为*设置从“None”更改为“Editable”，这样当我们创建新场地时，就可以在表视图内设置名称。


    接下来，我们将处理按钮。选中“添加”按钮，按住 Control 键并拖拽到“Mythical Venues”数组控制器上。从弹出菜单中选择 `add:` 操作。然后，选中“移除”按钮，按住
    Control 键并拖拽到同一个位置。这次，选择 `remove:` 操作。为了根据表视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。


    选中“添加”按钮，打开*绑定检查器*，展开*可用性*下的*已启用*部分。勾选*Bind to*复选框，将下拉菜单设置为“Mythical Venues”，并将*控制器键*字段改为“canAdd”。对于“移除”按钮，执行相同操作，但在*控制器键*字段中使用“canRemove”。


    再次，保存我们的工作，在 Xcode 中点击“运行”，然后查看新功能：我们可以添加和删除新的神话级场地。


    ### 向“Band”窗口添加“Gig”列表


    我们需要添加的最后一项功能是能够创建 `MythicalGigs`。`MythicalGigs` 位于 `MythicalBands` 和 `MythicalVenues`
