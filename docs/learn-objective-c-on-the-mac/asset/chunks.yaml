    that will let us edit everything. To prepare for the rest of this chapter, go
    to the Finder and make a copy of the last chapter’s final MythBase project directory,
    then go into the new directory and double-click `MythBase.xcodeproj` to open it
    in Xcode.    Modeling New Entities and Relationships    We’re going to be adding
    three new entities to MythBase: `MythicalBand`, `MythicalGig`, and `MythicalVenue`.
    We’ll also add relationships between several of them.


    When we’re done, our data model will look like [Figure 9-2](#9781430245421_Ch09.xhtml#Fig2).    ![9781430245421_Fig09-02.jpg](images/9781430245421_Fig09-02.jpg)    [Figure
    9-2](#9781430245421_Ch09.xhtml#_Fig2) .  The new data model    Model Versioning
    and Migrations    Before we start making changes to the data model, there’s one
    important issue that needs to be addressed: migration. We’re not talking about
    people moving from one country to the next or birds flying south for the winter;
    we’re talking about our data. If you’ve ever developed a database application,
    you’re familiar with the concept of “migrating” data from one deployment version
    to the next. This typically involves writing some sort of script that makes changes
    to the database structure itself (adding, deleting, or altering tables and columns)
    and populates new fields with appropriate values. With Core Data, you don’t exactly
    write a script, but the same idea is in use. In your data store, Core Data saves
    some metadata about the structure of the data model. When your app runs, Core
    Data tries to read from the data store. If it determines that the app has a new
    version of the data model with a different structure, it will automatically update
    the data store to match the latest data model. Let’s see how this works.    Preparing
    for Multiple Model Versions    The first thing we need to do is convert our current
    model to a special multi-versioned format. This will allow us to store multiple
    versions of our data model within the Xcode project as well as within MythBase
    itself. In Xcode’s navigation pane, open the `Models` group and select `MythBase.xcdatamodeld`.
    Now select `Editor` ![image](images/arrow.jpg) `Add Model Version` from the menu.
    A dialog box will appear asking for the name of the new version, defaulting to
    `MythBase 2`. This default name is just fine, so press Finish. Xcode just made
    us a copy of the data model, so we can extend it while keeping the old one around
    as well. In the navigation pane, `MythBase.xcdatamodeld` has acquired a small
    disclosure triangle to the left of the name.    Click the triangle to open the
    contents, and note that it contains two versions of our model file: `MythBase.xcdatamodel`
    and `MythBase 2.xcdatamodel`. `MythBase.xcdatamodel` is the original data model,
    and it has a small green checkbox next to it in the navigation pane showing that
    it’s the one that Xcode considers to be current. The one with a “2” tacked onto
    the end of the filename is the new one where we’ll make some changes. First, we
    need to set MythBase 2 as the current version of the model. Select the `MythBase.xcdatamodeld`
    file (the parent row containing the disclosure triangle, not either of the two
    data models underneath). In the *File Inspector*, there’s a section titled *Versioned
    Core Data Model*, as shown in [Figure 9-3](#9781430245421_Ch09.xhtml#Fig3). Set
    the *Current Version* to be MythBase 2\. When we do this, the green checkbox will
    move to the `MythBase 2.xcdatamodel` file in the navigation pane. The next time
    we build MythBase, this new compound model containing multiple versions of the
    model will be copied into the app, and the app will try to use what we’ve set
    as the current version.    ![9781430245421_Fig09-03.jpg](images/9781430245421_Fig09-03.jpg)    [Figure
    9-3](#9781430245421_Ch09.xhtml#_Fig3) .  The Versioned Core Data Model controls
    in the File Inspector    Adding New Entities    We want to be able to keep track
    of not just the bands that some of our mythical people played in, but also the
    venues they played at, and even dates of specific gigs, so we’re going to add
    three new entities: `MythicalBand`, `MythicalVenue`, and `MythicalGig`. See [Figure
    9-4](#9781430245421_Ch09.xhtml#Fig4) for an overview.    ![9781430245421_Fig09-04.jpg](images/9781430245421_Fig09-04.jpg)    [Figure
    9-4](#9781430245421_Ch09.xhtml#_Fig4) .'
  trans: "\n# Core Data 关系与迁移\n\n## 理解 Core Data 中的依赖关系\n\n拖动滑块，现在稍等片刻：`Awesomeness`\
    \ 值竟然没有变化！原因是 Core Data 中的任何部分——无论是我们的模型文件、`MythicalPerson` 类，还是使用的控制器——都不知道 `Awesomeness`\
    \ 依赖于其他值，并且在它们发生变化时需要重新计算。通过在 `MythicalPerson` 中实现一个额外的小方法即可解决这个问题：\n\n```\n+\
    \ (NSSet *)keyPathsForValuesAffectingAwesomeness {\n    return [NSSet setWithObjects:@\"\
    divinity\", @\"power\", @\"goodness\",\n        nil];\n}\n```\n\n这是另一个根据访问器名称动态构建的方法名称。我们在验证单个属性时也见过这种模式。在这个方法中，我们返回一组属性名称，这些属性是\
    \ `awesomeness` 属性所依赖的。有了这个设置，Core Data 会在应用生命周期的某个早期阶段自动调用此方法，并妥善处理，使得对该集合中任何属性的更改也会触发控制器更新所有绑定到\
    \ `awesomeness` 属性的对象。注意方法签名中用的是加号而非减号——这表明 `keyPathsForValuesAffectingAwesomeness`\
    \ 是一个类方法，而非实例方法。这是 Cocoa 键值观察系统的一部分。Cocoa KVO 会查找这种结构的方法，如果存在，则进行调用。\n\n构建并运行应用，现在当我们拖动其他滑块时，绿色条会随之变化。太棒了！\n\
    \n## 总结\n\n在本章中，我们涵盖了关于 Core Data 的相当广泛的内容。我们学习了如何在 Xcode 中创建模型文件，以及如何使用 Core\
    \ Data 和 Cocoa 绑定的组合快速构建一个像样的图形用户界面。我们还了解了 Core Data 存储数据的一些底层原理，并学习了实现自定义业务逻辑的一些基础知识。在第\
    \ 9 章中，我们将在此基础上进一步学习如何通过添加关系来完善数据模型。\n\n## 第 9 章：Core Data 关系\n\n上一章介绍了 Core Data\
    \ 工作原理的许多基础知识，但我们使用的数据模型极其简单，只包含单个实体。在本章中，我们将扩展数据模型以包含多个实体，并定义这些实体之间的关系。我们还将创建一个图形用户界面来显示这些关系，并允许我们进行编辑。在这个过程中，我们将初步了解\
    \ Core Data 如何处理多个不兼容版本的数据模型，以及如何将数据存储从一个模型版本迁移到下一个版本。\n\n所有这些工作将在扩展第 7 章的 MythBase\
    \ 项目时完成，我们将在其中添加一些讨论神话英雄和神灵时经常被忽视的数据：他们曾经演出的传奇乐队！阿喀琉斯和希腊配方乐队在旧帕特农舞厅那晚的震撼演出堪称传奇，谁又能忘记四诺斯曼人在克朗塔夫晚餐俱乐部的告别音乐会呢？我们在本章中对\
    \ MythBase 所做的改进（见图 9-1）将帮助我们记录这些关键信息。\n\n![9781430245421_Fig09-01.jpg](img/9781430245421_Fig09-01.jpg)\n\
    \n图 9-1 . 本章将要创建的全新改进版 MythBase 应用\n\n我们将首先在数据模型中添加所有想要的新实体和关系，然后继续设置图形用户界面以允许编辑所有内容。为了准备本章后续内容，请前往\
    \ Finder，复制上一章最终的 MythBase 项目目录，然后进入新目录，双击 `MythBase.xcodeproj` 在 Xcode 中打开。\n\
    \n## 建模新实体与关系\n\n我们将向 MythBase 添加三个新实体：`MythicalBand`、`MythicalGig` 和 `MythicalVenue`。我们还将为其中几个实体定义关系。\n\
    \n完成后，我们的数据模型将如图 9-2 所示。\n\n![9781430245421_Fig09-02.jpg](img/9781430245421_Fig09-02.jpg)\n\
    \n图 9-2 . 新的数据模型\n\n## 模型版本控制与迁移\n\n在我们开始对数据模型进行更改之前，有一个重要问题需要解决：迁移。我们这里讨论的不是人们从一个国家迁移到另一个国家，也不是鸟儿南飞过冬；而是关于我们的数据。如果你曾经开发过数据库应用程序，你会熟悉将数据从一个部署版本“迁移”到下一个版本的概念。这通常需要编写某种脚本来更改数据库结构本身（添加、删除或修改表和列），并用适当的值填充新字段。使用\
    \ Core Data 时，你不需要真正编写脚本，但思路是相同的。在数据存储中，Core Data 保存了一些关于数据模型结构的元数据。当你的应用运行时，Core\
    \ Data 会尝试从数据存储中读取数据。如果它发现应用拥有结构不同的新版本数据模型，它会自动更新数据存储以匹配最新的数据模型。让我们看看这是如何工作的。\n\
    \n### 准备多模型版本\n\n我们首先需要做的是将当前模型转换为一种特殊的多版本格式。这将允许我们在 Xcode 项目中以及在 MythBase 自身中存储多个版本的数据模型。在\
    \ Xcode 的导航面板中，打开 `Models` 组并选择 `MythBase.xcdatamodeld`。然后从菜单中选择 `Editor` ![image](img/arrow.jpg)\
    \ `Add Model Version`。会出现一个对话框，询问新版本的名称，默认名为 `MythBase 2`。这个默认名称没问题，所以点击“完成”。Xcode\
    \ 刚刚为我们创建了一个数据模型的副本，这样我们就可以在保留旧版本的同时扩展它。在导航面板中，`MythBase.xcdatamodeld` 的名称左侧出现了一个小的展开三角形。\n\
    \n点击三角形展开内容，注意它包含了我们模型文件的两个版本：`MythBase.xcdatamodel` 和 `MythBase 2.xcdatamodel`。`MythBase.xcdatamodel`\
    \ 是原始数据模型，它在导航面板中旁边有一个绿色的小复选框，表示这是 Xcode 当前使用的版本。文件名末尾带有“2”的是我们将在其中进行一些更改的新版本。首先，我们需要将\
    \ MythBase 2 设置为模型的当前版本。选择 `MythBase.xcdatamodeld` 文件（包含展开三角形的父行，而不是下面的两个数据模型之一）。在*文件检查器*中，有一个名为*版本化\
    \ Core Data 模型*的部分，如图 9-3 所示。将*当前版本*设置为 MythBase 2。当我们这样做时，绿色复选框将移动到导航面板中的 `MythBase\
    \ 2.xcdatamodel` 文件。下次我们构建 MythBase 时，这个包含模型多个版本的新复合模型将被复制到应用中，并且应用将尝试使用我们设置为当前版本的模型。\n\
    \n![9781430245421_Fig09-03.jpg](img/9781430245421_Fig09-03.jpg)\n\n图 9-3 . 文件检查器中的版本化\
    \ Core Data 模型控件\n\n### 添加新实体\n\n我们不仅希望能够记录某些神话人物曾经演奏过的乐队，还想记录他们演出的场馆，甚至具体演出的日期，因此我们将添加三个新实体：`MythicalBand`、`MythicalVenue`\
    \ 和 `MythicalGig`。概览请参见图 9-4。\n\n![9781430245421_Fig09-04.jpg](img/9781430245421_Fig09-04.jpg)\n\
    \n图 9-4 .\n"
- fmt: 'Here are all the entities we’ll define, along with their attributes. Make
    sure that the new model file is selected, then create a new entity and name it
    `MythicalBand`. Give this entity a new attribute called `name`, set its type to
    `String`, and click to turn off the *Optional* checkbox and to turn on the *Indexed*
    checkbox. Now create another new entity named `MythicalVenue`, also with a single
    String attribute called `name`, which should also be *Indexed* but not *Optional*.
    Finally, create an entity called `MythicalGig`. Unlike the other entities we’ve
    added, gigs don’t have names. The only distinguishing characteristics of a `MythicalGig`
    are its relationships to a band and a venue (which we’ll get to in a bit) and
    the date of the performance. Add a new attribute, name it `performanceDate`, and
    change its type to `Date`. We can leave the `performanceDate` set to *Optional*
    (since the exact dates of some ancient gigs may have gone down the memory hole),
    and there’s no need to turn on Indexing for it either.


    ## Adding Relationships


    Now it’s time to add relationships so that each object can be attached to other
    relevant objects. We’re going to define a one-to-many relationship from `MythicalBand`
    to `MythicalPerson`, a one-to-many relationship from `MythicalBand` to `MythicalGig`,
    and finally another one-to-many relationship from `MythicalVenue` to `MythicalGig`.
    See [Figure 9-5](#9781430245421_Ch09.xhtml#Fig5) for an overview.


    ![9781430245421_Fig09-05.jpg](images/9781430245421_Fig09-05.jpg)


    [Figure 9-5](#9781430245421_Ch09.xhtml#_Fig5). The model will look like this after
    we add the relationships.


    At this point we should clarify our terminology a bit. In Core Data, each relationship
    is actually a one-way affair, and they’re not defined in terms like “one-to-many,”
    “one-to-one,” “many-to-many,” and so on. Instead, each Core Data relationship
    is either to-one or to-many. In order to create what in normal usage (if you accept
    the notion that any form of computer programmer jargon is “normal”) is called
    a one-to-many relationship in Core Data, we actually have to create two relationships:
    a to-many relationship rooted at the first entity and ending at the second, and
    a to-one relationship rooted at the second entity and ending at the first. We
    then specify in our model that these two are inverse relationships, and Core Data
    then understands the bidirectional nature of what we’ve configured. This setup
    allows us, if we wish, to create a relationship that is truly unidirectional,
    though in practice it’s questionable whether that’s ever really desirable. The
    examples in this book all use bidirectional relationships.


    So, let’s create these relationships, starting with a one-to-many relationship
    from `MythicalBand` to `MythicalPerson`. Select `MythicalBand`, and click the
    small `+` button at the lower-left-hand corner of the *Relationships* table view.
    This creates a new relationship whose configuration options (see [Figure 9-6](#9781430245421_Ch09.xhtml#Fig6))
    look a little different than what we’ve seen when creating attributes.


    ![9781430245421_Fig09-06.jpg](images/9781430245421_Fig09-06.jpg)


    [Figure 9-6](#9781430245421_Ch09.xhtml#_Fig6). Configuration options for a new
    relationship.


    There’s a *Name* field and checkboxes for *Optional* and *Transient*, but otherwise
    it’s all different. The *Destination* pop-up lets us choose where the other end
    of the relationship goes, and after setting it, the *Inverse* pop-up lets us choose
    which other relationship (if any) should be used to create a bidirectional relationship.
    A checkbox lets us specify that this is a to-many relationship, and if that’s
    checked, two fields are enabled that let us put handy constraints and the minimum
    and maximum number of objects may be attached on the other end. Finally, the *Delete
    Rule* pop-up lets us decide what should happen to objects at the other end of
    the relationship if the “source” of the relationship is deleted.


    The most common choices are `Nullify` (which means that the source is removed
    from any inverse relationship in the destination element), `Cascade` (which means
    that the destination object or objects are also deleted), and `Deny` (which means
    that if this relationship is present, the source object will refuse to be deleted
    at all). A fourth alternative, `No Action`, leaves the inverse relationship intact,
    leaving the developer with the task of taking care of it (or risk ending up with
    data integrity problems). We won’t use that option at all.


    Name the relationship we’ve just created `members`, and set its destination entity
    to `MythicalPerson`. Click to turn on the *To-Many Relationship* checkbox, and
    leave the *Delete Rule* set to `Nullify` (which is the default value). Hooray,
    we’ve just made our first unidirectional relationship! Doing this simple step
    gives the `MythicalBand` entity a new `members` property with a whole set of new
    features. Each band can now provide an array of `MythicalPerson` objects, and
    that array will be automatically maintained in line with the options we configured.
    In the graph paper view, there’s a unidirectional arrow with a sort of double
    head from `MythicalBand` to `MythicalPerson`.


    Now let’s create the inverse of this relationship. Select the `MythicalPerson`
    entity, and add a new relationship. Name it `memberOf`, set its destination entity
    to `MythicalBand`, and then set its inverse to `members`. The rest of the default
    values can be left as they are. There’s now a bidirectional arrow between `MythicalPerson`
    and `MythicalBand` with a single head at the band end.


    Let’s move on to the one-to-many relationship between `MythicalBand` and `MythicalGig`.
    Select `MythicalBand`, create a new relationship named `gigs`, with `MythicalGig`
    as its destination and the *To-Many Relationship* checked. Because a gig without
    a band doesn’t do us any good, set the *Delete Rule* to `Cascade`. That way, if
    a band is deleted, all its gigs will be deleted, too. Now select `MythicalGig`
    and make a new relationship called `band`, with `MythicalBand` as its destination
    and select `gigs` as its inverse relationship. Here, we can leave the *Delete
    Rule* set to its default value, `Nullify`. This simply means that if a gig is
    deleted, any trace of the gig on the remaining end of the relationship to the
    band will be wiped out, but the band itself will be left intact.


    Finally, it’s time for the one-to-many relationship between `MythicalVenue` and
    `MythicalGigs`. Select `MythicalVenue`, and create a new relationship named `gigs`,
    with `MythicalGig` as its destination and the *To-Many Relationship* checked.
    Because a gig without a venue is just as meaningless as a gig without a band,
    here we’ll also set the *Delete Rule* to `Cascade`, so deleting a venue will also
    delete all its gigs. Now select `MythicalGig` and make a new relationship called
    `venue`, with `MythicalVenue` as its destination and `gigs` as its inverse relationship.


    We’ve now created all the relationships we’re going to need for the new version
    of MythBase, and our model should look similar to what we saw previously in [Figure
    9-4](#9781430245421_Ch09.xhtml#Fig4).


    ## Creating a Simple Migration


    Assuming that you’ve previously gone through [Chapter 8](#9781430245421_Ch08.xhtml)
    and used that version of MythBase to save some data, running the new version at
    this stage will give you some problems. You’ll see some error messages about mismatched
    data store versions when you start up, and you’ll get nothing but an empty table
    view where the `MythicalPerson` objects you created previously should be. And
    if you add some new objects and try to save them, you’ll just get more errors!
    The reason for this is that the current version of the app’s data model differs
    quite a bit from the version that was used to save the data previously; Core Data
    is smart enough to detect this, let the app delegate know about it, and prevent
    you from overwriting the old version with new data.'
