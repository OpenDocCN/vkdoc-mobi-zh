    is used by almost all of the user interface objects in Cocoa. If you’re not quite
    sure what’s so great about that, you might want to review [Chapter 3](#9781430245421_Ch03.xhtml)
    just one more time to be sure you’ve grasped the target/action concept.    By
    now, you’ve surely noticed the wide variety of user interface objects listed in
    Interface Builder’s Object Library pane. Now it’s time to dig deeper into Cocoa’s
    bag of tricks and explore some of these classes. The user interface classes available
    in Cocoa cover a wide range of uses and wherever possible provide consistent APIs
    for their functionality, so once you’ve learned how to do something with one class,
    you’ll often be able to quickly guess how to achieve similar results with another
    class. In particular, many of the classes that you’ll be using most often are
    subclasses of `NSControl`, and you’ll mostly work with methods that are declared
    there. The different subclasses interact with the user in different ways, but
    mostly interact with your own code the same way.    This chapter will cover some
    of the most common user interface classes that Cocoa provides, showing their basic
    usage and how to tailor them to our needs where appropriate. Along the way, we’ll
    also learn about some of the auxiliary Cocoa classes that may not always have
    a tangible screen presence, but that still provide important services for our
    applications. We’ll be focusing on the following classes (see [Figure 5-1](#9781430245421_Ch05.xhtml#Fig1)
    for a sampling of what these objects can look like onscreen):    *   `NSTextField`:
    The basic text input method for many applications. Responds to key-presses and
    renders text. Allows a great deal of editing flexibility for the user. *   `NSButton`:
    The basic mouse-triggered GUI component. Despite their differences in operation
    and appearance, radio-buttons, checkboxes, and plain old buttons are all instances
    of `NSButton`.'
