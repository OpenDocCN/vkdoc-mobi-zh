  trans: '

    # 使用面板还是不用面板？


    由于我们不会修改窗口的基本外观，因此将使用 `NSWindow` 或其子类 `NSPanel` 来显示应用程序中的控件和其他视图。我们应用程序的核心元素通常位于
    `NSWindow` 中，而 `NSPanel` 则用于辅助窗口，例如 Finder 中的“显示查看选项”面板。从用户的角度来看，`NSWindow` 和
    `NSPanel` 之间只有几个关键区别：


    - `NSPanel` 实例通常在其他应用程序成为活动应用程序时变为不可见，并在其自身应用程序再次成为活动状态时重新出现。

    - `NSPanel` 可以设置为“浮动”在其应用程序的所有其他窗口（包括主窗口）之前。

    - `NSPanel` 可以轻松配置为不会不必要地成为关键窗口，这样用户就可以点击辅助面板中的按钮，然后继续在主窗口中输入。


    # 窗口属性


    在 Xcode 的 WindowLab 项目中，导航到 *MainMenu.xib* 文件并单击以在 Interface Builder 画布中打开它。与往常一样，应用程序
    nib 文件中包含的对象之一是一个窗口。单击以在主 nib 窗口中选择它，然后打开 *属性检查器*，以便我们能够对其进行一些探索（参见图 11-2）。在之前的章节中，我们使用此检查器来设置窗口的标题，但当然我们还可以在这里做更多事情。


    ![9781430245421_Fig11-02.jpg](img/9781430245421_Fig11-02.jpg)


    图 11-2. NSWindow 的属性检查器


    我们已经熟悉了 *标题* 文本字段。其正下方是 *自动保存* 字段，它提供了非常不错的功能：在此字段中输入一个文本字符串，窗口将使用该字符串作为 `NSUserDefaults`
    系统中的键，并基于该键存储和检索其位置。这意味着当用户重新排列我们应用程序中的窗口时，窗口位置会保存在用户的偏好设置中，并且下次运行我们的应用程序时，窗口将出现在相同的位置。而我们要做的就是为应用中的每个窗口填写此文本字段，并为每个窗口输入一个唯一的值。


    接下来，有一些复选框允许我们关闭某些标准窗口控件。请注意，关闭这些复选框不会从窗口的标题栏中移除相应的按钮；它只会在我们的应用程序运行时使它们永久显示为灰色且不可用。其下方是一些用于调整窗口外观的复选框，包括启用纹理模式、禁用窗口后的投影等。这里提到
    *工具栏* 的选项指的是可附加到窗口的可选 `NSToolbar`，我们将在本章稍后部分进行解释。我们还可以移除窗口的标题栏。这通常是一个坏主意，因为用户将无法重新定位窗口，但对于像全屏游戏这样的应用程序可能有用。


    下一组复选框允许我们以多种方式微调窗口的行为，其中大部分不言自明。一个例外是 *自动重新计算视图循环* 复选框，它的名称令人费解。其概念是：每个窗口都维护一个包含所有视图对象的列表，用户可以通过
    Tab 键在这些视图之间切换。如果选中此复选框，则在应用程序运行时添加到窗口的任何视图都将自动插入到这个“循环”中的某个位置。另一个例外是 *可恢复* 复选框。启用
    *可恢复* 会告诉 Cocoa，我们的窗口应尝试在应用程序启动之间恢复到相同的状态。


    在我们的帮助下，我们的应用程序可以重新打开用户退出时处于打开状态的窗口，甚至可以将它们恢复到用户退出时的相同滚动位置和选择状态。


    在其下方，您会找到一系列处理窗口如何与桌面交互的菜单。Mac 桌面环境有一个叫做 *Mission Control* 的功能（位于“系统偏好设置”应用中），它允许用户拥有多个桌面（或空间）并在它们之间移动窗口，以及显示所有窗口或单个应用程序的所有窗口。在先前版本的
    Mac OS/X 中，Mission Control 是两个独立的功能，分别称为 Spaces 和 Exposé，属性检查器中仍然沿用这些名称。


    通常，我们应将这些设置为 *推断行为*，这意味着窗口行为正常。对于 Spaces，其他选项是 *可以加入所有空间*，这意味着窗口将始终可见，或 *移动到活动空间*，这意味着窗口在变为活动状态时将移动到当前空间，而不是将活动桌面切换到窗口所在的桌面。对于
    Exposé，*推断行为* 等同于 *托管行为*，这意味着窗口对 Exposé 操作正常响应。其他选项是 *瞬态*，这会导致在激活 Exposé 时隐藏窗口（这是面板的默认设置），以及
    *固定*，这意味着窗口完全忽略 Exposé。下一个选项涉及此窗口是否应包含在用户可以使用 **窗口** ![image](img/arrow.jpg) **循环浏览窗口**
    (![images](img/arrow3.jpg)-``) 命令旋转浏览的窗口集合中。接下来是窗口是否支持全屏选项，窗口会扩展到自己独立的空间并占据整个显示屏，就像
    iOS 应用程序一样，包括隐藏菜单栏。如果此项设置为 *主窗口*，则标题栏右侧会显示一个特殊控件以激活全屏模式。


    最后，有一些与窗口内存使用相关的选项。最好保持 *延迟* 开启，因为这会跳过为窗口分配一些内部内存，直到它即将实际显示窗口为止。此外，我们应该保持 *一次性*
    关闭。如果打开，则该内部内存在窗口关闭后会立即释放，因此只有在涉及的窗口是临时窗口（如启动画面）且每个会话只能显示一次时，才应打开此选项。最后，一个弹出式窗口提供了将窗口的“后备存储”从
    *缓冲* 切换到 *保留* 或 *非保留* 的功能。永远不要这样做！*保留* 和 *非保留* 选项仅用于支持特定类型的遗留代码，所有新的 Cocoa 应用程序都应该为每个窗口将此设置保留为
    *缓冲*。


    现在，从 *对象库* 窗口中拉出一个 `NSPanel`，再次查看 *属性检查器*；注意除了我们检查 `NSWindow` 时看到的选项外，还有一个样式弹出式菜单和几个新增的复选框。此处的样式选项是
    *实用工具*，如果选择它，会使面板具有独特的外观，并使其浮动在应用程序的其他窗口之上；以及 *HUD*，它会给窗口带来更加独特的“平视”外观。尝试一些这些样式，看看它们如何影响面板的外观。面板的行为也可能与窗口不同。面板可以在
    *全屏* 下拉菜单中标记为辅助窗口，这意味着它将在同一空间中浮动在全屏模式窗口之上。这对于影响另一个窗口中文档的“查找”或“信息”面板之类的东西非常有用。探索后，从
    nib 文件中删除该面板。


    # 标准系统面板


    除了为我们填充自己的视图和控件而设计的通用窗口类之外，Cocoa 还包含一些专门的窗口子类，供我们在应用程序中使用。

    '
- fmt: "这些旨在满足各种应用的需求，因此使用它们可以免费获得大量功能，同时为我们的用户提供可能在其他应用程序中使用过的熟悉界面。\n\n**颜色面板**\n\
    \n首先，让我们看看`NSColorPanel`。这个面板提供了一个界面，允许用户选择一种颜色。我们将通过在我们的控制器类中实现一个方法来使用颜色面板设置屏幕文本的颜色，该方法在用户在颜色面板中选择一种颜色时被调用。\n\
    \n假设我们在 Xcode 中创建的`WindowLab`项目中，`MainMenu.xib`文件仍然打开，让我们看看 nib 文件中的主窗口对象。从*对象库*中拖出一个换行标签（也称为多行标签），并将其放到窗口上。再拖出一个按钮，并将其放置在标签下方。使用`Show\
    \ Color Panel`作为标题。布局应如图 11-3 所示。\n\n![9781430245421_Fig11-03.jpg](images/9781430245421_Fig11-03.jpg)\n\
    \n[图 11-3](#9781430245421_Ch11.xhtml#_Fig3)。一个非常简单的窗口布局\n\nXcode 也会为我们创建一个 App\
    \ Delegate 类。如果我们使用`WL`作为类前缀，那么它将被命名为`WLAppDelegate`。在 Xcode 中，在 Interface Builder\
    \ 面板旁边打开一个辅助编辑器窗格（我们在第 5 章中讨论过辅助编辑器窗格；点击 Xcode 工具栏中*编辑器*标签图标块中看起来像管家背心和领结的图标）。很可能打开此窗格时会预加载`WLAppDelegate.h`文件，但如果未加载，请使用窗格顶部的导航栏打开它。我们将添加一个名为`title`的\
    \ outlet 和一个名为`showColorPanel:`的 action。为此，从*多行标签*拖拽到`WLAppDelegate.h`文件，目标指向现有`@property`声明的正下方。添加一个新的\
    \ Outlet 并将其命名为`title`。然后，从*显示颜色面板*按钮拖拽到新添加的 outlet 正下方，并添加一个名为`showColorPanel:`的\
    \ Action（我们需要将连接类型更改为*Action*）。\n\n完成后，`WLAppDelegate.h`文件应如下所示：\n\n```objc\n\
    #import <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *title;\n- (IBAction)showColorPanel:(id)sender;\n\n@end\n```\n\n现在切换到`.m`文件，并添加以下`showColorPanel:`方法的实现，以及一个名为`changeColor:`的方法，如下所示：\n\
    \n```objc\n#import \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // Insert code here to initialize your application\n\
    }\n\n- (IBAction)showColorPanel:(id)sender {\n    // create the color panel\n\
    \    NSColorPanel *panel = [NSColorPanel sharedColorPanel];\n    // bring the\
    \ color panel to the front of the screen\n    [panel orderFront:nil];\n}\n\n-\
    \ (void)changeColor:(id)sender {\n    // in this method, the \"sender\" parameter\
    \ is the NSColorPanel\n    // itself.  We just ask it for its color, and pass\
    \ it along to\n    // the \"title\" object.\n    [self.title setTextColor:[sender\
    \ color]];\n}\n\n@end\n```\n\n**注意**：尽管我们之前见过，但请仔细查看`WLAppDelegate.h`文件中的`@property`声明。大多数情况下，当添加一个连接到用户界面元素的属性时，该属性包含`weak`注释。但对于指向窗口的引用，情况并非如此。该属性被标记为`assign`。这有一个很好的理由：注释控制着自动引用计数（ARC）如何处理引用。标记为`strong`的引用表示对对象的所有权。\n\
    \n标记为`weak`的引用不表示所有权，并且当指向某对象的所有强引用被释放且该对象被回收时，弱引用将被清零。但是，ARC 不能与重写`release`和`retain`的类一起工作，这包括`NSWindow`。由于`NSWindow`不支持\
    \ ARC，该属性被赋予了`assign`注释。这实际上意味着与`weak`相同，但适用于非 ARC 启用的类。应用代理并不拥有该窗口，因此应用代理与窗口的连接不应阻止窗口在适当时被释放和回收。\n\
    \n`showColorPanel:`方法将由 GUI 中的简单按钮点击调用，而当我们从按钮拖拽时 Xcode 已经为我们连接好了。但是，`changeColor:`方法将在用户点击颜色面板中的颜色时被调用，即使颜色面板和我们的代码之间没有任何直接连接。这种“魔法”之所以有效，归功于一个名为响应者链的\
    \ Cocoa 概念（参见侧边栏）。\n\n**响应者链**\n\n响应者链是一个特别的对象集合，在应用程序生命周期中按需动态收集，可以查询它们是否实现了特定的\
    \ action。这使得某些 action 可以以通用方式配置，以便在运行时，它们将被调用到在当时最有意义的对象上。该链按特定性顺序排列，从“最接近” action\
    \ 的对象开始，一直延续到最通用的对象。在 Interface Builder 中，通过将操作连接到 nib 的*第一响应者*图标上的 action 来配置使用响应者链的对象，该图标只不过是响应者链中第一个对象的代理，当被询问是否实现了特定方法时，该对象在运行时说“是的，我可以”。\n\
    \n由于每个窗口都有自己的“第一响应者”概念（通常是用户最后交互的控件或视图，从而使其成为接收按键等操作的可能候选者），这使得这一切变得更加令人困惑。\n\n\
    让我们尝试通过一个例子来澄清这一点。考虑一个按钮的情况，其目标/操作被配置为调用*第一响应者*上一个名为`showThing:`的方法。当用户点击按钮时，会按顺序询问列表中的每个对象是否实现了`showThing:`方法，直到其中一个回答`YES`，此时将调用该对象的`showThing:`方法，响应者链的工作就完成了。以下是响应者链可能的样子示例：\n\
    \n1.  窗口的“第一响应者”（当前聚焦并接受键盘输入的视图）、其父视图、父视图的父视图，依此类推，一直向上到窗口内的视图层次结构\n2.  窗口本身\n\
    3.  窗口的代理\n4.  应用程序对象，`NSApp`\n5.  应用程序对象的代理\n\n响应者链可能还包含其他对象，特别是如果我们在处理基于文档的应用程序，那么打开的文档及其控制器也会在链中占有一席之地。更多内容请参见第\
    \ 12 章。\n\n一旦这些对象中的任何一个表示实现了`showThing:`，那么就会在该对象上调用该方法，搜索结束。\n\n现在保存工作并点击**运行**。我们的新应用将出现，点击按钮将调出颜色面板。点击一些不同的颜色，所选文本的颜色将立即更改以反映新的选择。\n\
    \n那么，考虑到颜色面板与我们的应用代理没有直接连接，有理由怀疑：这是如何工作的？我们应用代理中的`changeColor:`方法是如何被调用的？关键在于使用如前所述的响应者链。"
  raw: 'These are meant to meet the needs of a wide variety of applications, so using
    them provides a lot of functionality for free, and at the same time provides our
    users with familiar interfaces that they’ve probably used in other applications.    The
    Color Panel    First, let’s take a look at `NSColorPanel`. This panel provides
    an interface that allows the user to select a color. We’re going to use the color
    panel to set the color of a piece of on-screen text by implementing a method in
    our controller class that’s called whenever the user selects a color in the color
    panel.    Assuming the `MainMenu.xib` file is still open in the *WindowLab* project
    we created in Xcode, let’s look at the main Window object in the nib file. Drag
    out a Wrapping Label (a.k.a. a Multiline Label) from the *Object Library*, and
    drop it onto the window. Drag out a button as well, and position it below the
    label. Use “Show Color Panel” as the title. The layout should look like [Figure
    11-3](#9781430245421_Ch11.xhtml#Fig3).    ![9781430245421_Fig11-03.jpg](images/9781430245421_Fig11-03.jpg)    [Figure
    11-3](#9781430245421_Ch11.xhtml#_Fig3). A very simple window layout    Xcode will
    also have created an App Delegate class for us. If we used WL as the class prefix,
    then it will be named `WLAppDelegate`. In Xcode, open up an Assistant Editor pane
    next to the Interface Builder pane (we talked about the Assistant Editor panes
    back in [Chapter 5](#9781430245421_Ch05.xhtml); click the icon that looks like
    a butler’s vest and bowtie in the block of icons labeled *Editor* in the Xcode
    toolbar.) Odds are that the `WLAppDelegate.h` file will be pre-loaded when we
    open this pane, but if not, use the nav bar in the top of the pane to open it.
    We’re going to add an outlet called `title` and an action called `showColorPanel:`.
    To do so, Control-drag from the *Multiline Label* to the `WLAppDelegate.h` file,
    aiming for just below the existing `@property` declaration. Add a new Outlet and
    title it `title`. Then, Control-drag from the *Show Color Panel* Button to just
    below the newly-added outlet, and add an Action named `showColorPanel:` (we’ll
    need to change the Connection type to *Action*).    When done, the `WLAppDelegate.h`
    file should read like this:    ``` #import <Cocoa/Cocoa.h>  @interface WLAppDelegate
    : NSObject <NSApplicationDelegate>  @property (assign) IBOutlet NSWindow *window;
    @property (weak) IBOutlet NSTextField *title; - (IBAction)showColorPanel:(id)sender;  @end
    ```    Now switch to the `.m` file, and add the following implementation for the
    `showColorPanel:` method, along with a method called `changeColor:`, like this:    ```
    #import "WLAppDelegate.h"  @implementation WLAppDelegate  - (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification {     // Insert code here to initialize your application }  -
    (IBAction)showColorPanel:(id)sender {     // create the color panel     NSColorPanel
    *panel = [NSColorPanel sharedColorPanel];     // bring the color panel to the
    front of the screen     [panel orderFront:nil]; }  - (void)changeColor:(id)sender
    {     // in this method, the "sender" parameter is the NSColorPanel     // itself.  We
    just ask it for its color, and pass it along to     // the "title" object.     [self.title
    setTextColor:[sender color]]; }  @end ```    **Note**  Although we’ve seen it
    before, take a close look at the `@property` declarations inside the `WLAppDelegate.h`
    file. Most of the time, when adding a property connected to a user interface element,
    the property includes the annotation `weak`. But that’s not the case for the reference
    to the window. That one is marked `assign`. There’s a good reason for this: the
    annotations control how Automatic Reference Counting  (ARC) deals with the references.
    A reference marked as `strong` indicates ownership of the object.


    A reference marked as `weak` does not indicate ownership, and a weak reference
    will be zeroed out when all of the strong references to an object are released
    and the object is deallocated. However, ARC doesn’t work with classes that override
    `release` and `retain`, which includes `NSWindow`. Since `NSWindow` doesn’t support
    ARC, the property gets an `assign` annotation. This effectively means the same
    thing as `weak` but for non-ARC-enabled classes. The app delegate doesn’t own
    the window, and so the app delegate’s connection to the window shouldn’t prevent
    the window from being released and deallocated when appropriate.    The `showColorPanel:`
    method will be called by a simple button click in our GUI, and Xcode already wired
    that up for us when we Control-dragged from the button. But the `changeColor:`
    method will be called whenever the user clicks on a color in the color panel,
    even though there won’t be any direct connection between the color panel and our
    code. This bit of “magic” works thanks to a Cocoa concept called the responder
    chain (see sidebar).    THE RESPONDER CHAIN    The responder chain is an ad hoc
    collection of objects, gathered on the fly when necessary during the life of an
    application, that can be queried to see if they implement a particular action.
    This lets certain actions be configured in a generic way, so that at runtime they
    will be invoked on the object that makes the most sense at the time. The chain
    is arranged in order of specificity, starting with the object that is “nearest”
    to the action and continuing along toward the most generic. Configuring an object
    to use the responder chain is done in Interface Builder by connecting to an action
    on the nib’s *First Responder* icon, which is nothing more than a proxy for the
    first object in the responder chain that says, at runtime, “Yes I can” when asked
    if it implements a particular method.    This is all made somewhat more confusing
    by the fact that each window has its own notion of a “first responder,” which
    is typically the control or view that the user last interacted with (thereby making
    it a likely candidate for receiving key-presses and the like).    Let’s try to
    clarify this with an example. Consider the case of a button whose target/action
    is configured to call a method called `showThing:` on the *First Responder*. When
    a user clicks the button, each of a list of objects will be asked, in order, if
    they implement a `showThing:` method, right up until one of them answers `YES`,
    at which point that object’s `showThing:` method is called, and the responder
    chain’s work is done. Here’s an example of what the responder chain can look like:    1.  The
    window’s “first responder” (the view that’s currently in focus and accepting keyboard
    input), its superview, the superview’s superview, and so on, all the way up the
    view hierarchy within the window 2.  The window itself 3.  The window’s delegate
    4.  The application object, `NSApp` 5.  The application object’s delegate    The
    responder chain may contain additional objects as well, especially if we’re working
    on a document-based application, in which case open documents and their controller’s
    will have a spot in the chain as well. More on that in [Chapter 12](#9781430245421_Ch12.xhtml).    As
    soon as any one of those objects says it implements `showThing:`, then the method
    is called on that object, and the search is over.    Now save the work and hit
    **Run**. Our new app will appear, and clicking the button will bring up the color
    panel. Click around on some different colors, and the color of the selected text
    will immediately change to reflect the new selection.    So, considering that
    the color panel has no direct connection to our app delegate, it’s fair to wonder:
    how does that work? How does the `changeColor:` method in our app delegate get
    called? The key is the use of the responder chain, as described earlier.'
  trans: "\n这些旨在满足各种应用的需求，因此使用它们可以免费获得大量功能，同时为我们的用户提供可能在其他应用程序中使用过的熟悉界面。\n\n**颜色面板**\n\
    \n首先，让我们看看`NSColorPanel`。这个面板提供了一个界面，允许用户选择一种颜色。我们将通过在我们的控制器类中实现一个方法来使用颜色面板设置屏幕文本的颜色，该方法在用户在颜色面板中选择一种颜色时被调用。\n\
