    *managedObjectModel; @property (readonly, strong, nonatomic) NSManagedObjectContext
    *managedObjectContext;  - (IBAction)saveAction:(id)sender;  @end ```    This code
    declares a simple class with four properties and one method. The `window` variable
    also features `IBOutlet` in its property declaration, which makes it into an outlet
    available for connecting to a window in Interface Builder. The other three properties
    are instances of some important Core Data classes:    *   `NSPersistentStoreCoordinator`
    manages the back-storage, giving access to one or more instances of `NSPersistentStore`,
