    in [Chapter 8](#9781430245421_Ch08.xhtml).    For the buttons, we’ll use the same
    process as in the last chapter, using a combination of target-action and Cocoa
    bindings. We’ll use target-action for when a button is pressed, and Cocoa bindings
    to enable or disable the buttons as appropriate. We’ll start with the actions.
    Select the Add button, and control-drag to the Mythical Bands array controller.
    Select the `add:` action from the pop-up menu. Then, select the Remove button,
    and Control-drag to the same place. This time, select the `remove:` action. To
