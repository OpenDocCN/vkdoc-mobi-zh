  trans: "```objectivec\n@implementation VillainTrackerAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // 在此处插入代码以初始化您的应用程序\n}\n\n- (IBAction)takeName:(id)sender\
    \ { }\n- (IBAction)takeLastKnownLocation:(id)sender { }\n- (IBAction)takeLastSeenDate:(id)sender\
    \ { }\n- (IBAction)takeSwornEnemy:(id)sender { }\n- (IBAction)takeEvilness:(id)sender\
    \ { }\n- (IBAction)takePowers:(id)sender { }\n- (IBAction)takePowerSource:(id)sender\
    \ { }\n- (IBAction)takePrimaryMotivation:(id)sender { }\n- (IBAction)takeMugshot:(id)sender\
    \ { }\n\n@end\n```\n\n请注意，如果你需要在 `.h` 文件中做一些修改才能使其正确，例如删除一个命名错误的属性或一个本应是操作（action）的插座变量（outlet），那么在这里也可能需要进行相应的清理工作。\n\
    \n我们还有最后两个连接需要建立，它们不涉及创建代码。如上所述，文本视图在某种程度上是一种不同的存在。与窗口中的其他可编辑对象不同，`NSTextView`\
    \ 并不是 `NSControl` 的子类，这意味着它不了解目标/操作模式。然而，它确实通过调用其委托中的方法来暴露大量功能。稍后，我们将在 `VillainTrackerAppDelegate`\
    \ 内部实现一些委托方法，以便在文本视图的值发生更改时获得更新。现在，只需在 Interface Builder 编辑画布左侧的对象停靠栏中，将文本视图的委托插座变量连接到我们的\
    \ `VillainTrackerAppDelegate` 对象。正如我们创建插座变量时那样，由于文本视图自动包含在一个 `NSScrollView` 中，而该\
    \ `NSScrollView` 又包含在我们之前创建的 `NSBox` 中，这会使操作稍微复杂一些，因此我们可能需要单击或双击一两次，才能实际选中文本视图本身并能够从它拉出连接。\n\
    \n最后，为了我们的控制器类，我们还要建立一个额外的连接。当 nib 文件被加载并且应用程序本身已初始化并准备好与用户交互时，我们希望能够收到通知，以便可以准备初始显示。这可以通过使用\
    \ `NSApplication` 的委托方法来实现，因此从对象停靠栏窗口中的 Application 对象拖动一个连接到 `VillainTrackerAppDelegate`，然后从上下文菜单中选择\
    \ Delegate。\n\n我们做了很多拖拽连接的操作，确保这些连接按预期设置是很好的实践。检查这一点的最佳方法是查看 Xcode 中的连接检查器。在 Interface\
    \ Builder 编辑器左侧边缘的对象停靠栏中，选择当我们悬停时显示名称 `Villain Tracker App Delegate` 的蓝色框。然后选择连接检查器（![图片](img/arrow2.jpg)6），它将在实用工具区域中显示。涉及应用程序委托的连接应类似于图\
    \ 5-18 中所显示的内容。这显示了所有我们连线好的插座变量和操作，以及引用了该应用程序委托的对象。如果建立连接花费了不止一次尝试，或者你本想创建一个操作却创建了一个插座变量，你可能还会在这里看到一些需要修剪的残留连接。你可以将鼠标悬停在此处列出的连接上，以在\
    \ Interface Builder 编辑器窗格中高亮显示已连接的对象，并且可以单击右列中的小“x”图标来断开连接。\n\n![9781430245421_Fig05-18.jpg](img/9781430245421_Fig05-18.jpg)\n\
    \n图 5-18。与 `VillainTrackerAppDelegate` 之间的连接\n\n在我们开始实现这些操作之前，我们还需要解决这个难题的最后一个部分。我们将开始为我们将在本应用程序中使用的模型类铺平道路。\n\
    \n在一个真实的应用程序中，你会为你的反派对象拥有一个合适的模型类，这个类会包含从文件或数据库保存和加载的功能，在后面的章节中，你会看到如何使用 Core\
    \ Data 来实现这一点。但对于这个我们主要关注 GUI 组件如何连接和使用的应用程序，我们将保持简单，并使用一个 `NSMutableDictionary`\
    \ 来表示每个反派对象。`NSMutableDictionary` 确实非常适合这个任务，因为它使我们能够轻松地存储和检索任何类型的值，并且不需要为每个值预定义方法，因为这些值是使用代表键的简单字符串来访问的。\n\
    \n要将此添加到我们的类中，我们将在 notesView 属性下方声明一个名为 `villain` 的新属性。由于我们将在类内部管理这个属性，我们必须将其标记为\
    \ strong 而不是 weak。头文件应如下所示（我们正在添加的代码在此处以粗体显示）：\n\n```objectivec\n#import <Cocoa/Cocoa.h>\n\
    \n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\n\
    @property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
    \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n\
    @property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet\
    \ NSComboBox *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
    @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
    \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
    @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet\
    \ NSTextView *notesView;\n\n@property (strong) NSMutableDictionary *villain;\n\
    \n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
    - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
    - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
    - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
    \n@end\n```\n\n除了从 weak 改为 strong 之外，这看起来与 Xcode 为我们生成的插座变量的代码相同。这个声明告诉编译器，我们的类将包含用于\
    \ `villain` 属性的 getter 和 setter 方法（分别称为 `villain` 和 `setVillain:`），并暗示了 setter\
    \ 的语义（特别是，`strong` 意味着传递给 `setVillain:` 的值将由这个类“拥有”，这与由 nib 文件拥有的插座变量相反）。只要存在一个对象的\
    \ `strong` 引用，该对象就会保持存活。一旦没有更多的 `strong` 引用（但可能仍然存在 `weak` 引用），那么该对象将被释放，任何剩余的\
    \ `weak` 引用将被设置为 nil。注意，Xcode 生成的所有插座变量都被标记为 `weak`。我们的代码不拥有这些对象；它们由其父视图或窗口本身拥有。它还会创建一个实例变量，这将为我们节省一些输入。现在可以在代码中将此属性引用为\
    \ `self.villain`。\n\n现在是一个好时机，按下 Xcode 中的运行按钮，确保到目前为止我们没有犯任何错误。如果我们正确输入了所有内容，我们的应用程序应该能够编译通过，没有任何警告或错误，然后启动并显示我们辛苦构建的窗口。如果没有，请查看\
    \ Xcode 显示的错误消息，并尝试修复它们所指出的问题。一般来说，编译 Objective-C 比编译 C++ 或 Java 代码要快得多，所以频繁编译不会有什么损失。在本章的其余部分，我们将频繁编译我们的应用程序并运行它，以确保我们在进入下一个功能之前，每个编码的功能确实能按预期工作。"
- fmt: "现在我们已经完成了应用程序代码在 GUI 中显示值以及接收用户操作更新所需的所有连接。是时候开始编写应用程序了！\n\n## 开始编码\n\n既然\
    \ GUI 布局已经完成，我们将实现应用程序的“核心”部分。在 `VillainTracker` 中，所有这些核心功能都将包含在 `VillainTrackerAppDelegate`\
    \ 类中。我们将学习如何使 `NSApplication` 的委托（例如我们的控制器类）在应用程序启动时做出反应；我们将了解用于在已创建的 GUI 对象中显示值的基本\
    \ API；我们还将学习如何通过从相关控件获取值来实现响应用户操作的方法。\n\n### 标准化键名\n\n在开始编写实际代码之前，最好先想出一种方法来标准化用于从模型对象访问属性的键名。无论是像我们这样将\
    \ villain 存储在只能通过键访问属性的字典中，还是在更复杂的使用真实模型对象的情况下，标准化键名对于确保我们在模型对象中正确访问属性至关重要。\n\n\
    我们在这里使用的技术很简单：使用标准的 C 预处理器宏来定义在编译时替换为 `NSString` 实例的名称。这消除了拼错键名的潜在问题，并且还能与 Xcode\
    \ 的代码补全功能很好地配合使用。\n\n以下代码包含了我们在应用程序中使用的所有 villain 属性的键名。有了这些定义，我们就可以（并且应该）使用定义的名称，而不是在代码中使用\
    \ `NSString` 字面量来通过键名引用属性。将以下代码放在 `VillainTrackerAppDelegate.m` 文件的顶部：\n\n```c\n\
    #define kName @\"name\"\n#define kLastKnownLocation @\"lastKnownLocation\"\n#define\
    \ kLastSeenDate @\"lastSeenDate\"\n#define kSwornEnemy @\"swornEnemy\"\n#define\
    \ kPrimaryMotivation @\"primaryMotivation\"\n#define kPowers @\"powers\"\n#define\
    \ kPowerSource @\"powerSource\"\n#define kEvilness @\"evilness\"\n#define kMugshot\
    \ @\"mugshot\"\n#define kNotes @\"notes\"\n```\n\n### 创建默认 Villain\n\n现在是时候创建一个新的\
    \ villain 对象了，它包含用户可以在应用程序中编辑的所有属性。如前所述，我们不会创建一个“真正的”模型类来包含 villain，而是选择更简单的方案，即使用\
    \ `NSMutableDictionary`。我们将在 `NSApplication` 的委托方法 `applicationDidFinishLaunching:`\
    \ 内部创建它。几乎每个 Cocoa 应用程序都需要在启动时做一些设置工作，因此 Xcode 在生成类时已经为我们创建了此方法的存根。现在我们将填充其实现。\n\
    \n代码如下：\n\n```objc\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
    \ {\n    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n\
    \                    @\"Lex Luthor\", kName,\n                    @\"Smallville\"\
    , kLastKnownLocation,\n                    [NSDate date], kLastSeenDate,\n   \
    \                 @\"Superman\", kSwornEnemy,\n                    @\"Revenge\"\
    , kPrimaryMotivation,\n                    [NSArray arrayWithObjects:@\"Evil Genius\"\
    , nil], kPowers,\n                    @\"Superhero action\", kPowerSource,\n \
    \                   @9, kEvilness,\n                    [NSImage imageNamed:@\"\
    NSUser\"], kMugshot,\n                    @\"\", kNotes,\n                   \
    \ nil];\n}\n```\n\n这段代码为大多数人都熟悉的默认 villain 设置了所有属性。`initWithObjectsAndKeys:` 方法用一个以\
    \ `nil` 结尾的值和键对列表来填充字典。为了清晰起见，我们将每个值/键对放在单独的一行。我们已经熟悉了使用 `@\"string\"` 语法来创建新的\
    \ `NSString` 字面量，但 `@9` 是新的。这是 `[NSNumber numberWithInt:9]` 的简写形式。\n\n请注意，`mugshot`\
    \ 属性被设置为一个预先存在的 `NSImage` 实例，这是 Cocoa 内置的、可供任何人在其应用程序中使用的几个图像之一。现在是在 Xcode 中再次编译应用程序的好时机，以确保到目前为止一切正确，但现在运行应用程序仍然没有意义。GUI\
    \ 已经创建，但目前还没有任何功能在正常工作。\n\n**注意**：你可能会疑惑为什么要将 `NSApplication` 委托的初始化代码放在 `applicationDidFinishLaunching:`\
    \ 方法中，而不是放在 `init` 方法中。从应用程序的主 nib 文件加载的对象总是处于一种特殊的困境中：它们是在应用程序自身初始化过程中作为子步骤被初始化的，这意味着在\
    \ `init` 被主 nib 文件中的任何对象调用时，`NSApplication` 本身可能尚未完全初始化！这会产生很多影响，尤其是在用户界面方面，因此通常最好将所有初始化工作推迟到一切准备就绪后再进行。由于\
    \ `VillainTrackerAppDelegate` 被设置为 `NSApplication` 的委托，通过实现 `applicationDidFinishLaunching:`\
    \ 方法，你可以方便地得知应用程序何时真正准备就绪。\n\n### 关注细节\n\n之前的代码创建了一个 villain 对象，但如果我们现在构建并运行应用程序，将看不到\
    \ villain 的任何迹象。窗口上的所有控件都将是空白的，因为我们还没有使用 villain 属性中的值填充它们。现在是时候改变这一点了。在 `VillainTrackerAppDelegate`\
    \ 类中，我们将创建一个名为 `updateDetailViews` 的新私有方法，该方法负责设置所有 GUI 对象以显示当前 villain 的属性。我们将此功能放在一个独立的方法中（而不是直接在\
    \ `applicationDidFinishLaunching:` 内部进行设置），这样我们不仅可以在应用程序启动时，还可以在需要时刷新视图。我们将完成显示\
    \ villain 属性的过程，并熟悉与 GUI 中各种类交互的基础知识。\n\n让我们从创建新方法的一个简单“存根”开始。我们希望此方法可以从类内部的任何地方访问，但不能从外部访问。一种方法是不将其添加到\
    \ `.h` 文件的 `@interface` 声明中。因此，在 `VillainTrackerAppDelegate.m` 文件底部的 `@end` 声明上方，插入以下代码：\n\
    \n```objc\n- (void)updateDetailViews {\n}\n```\n\n在开始实现新方法之前，我们需要确保已准备好调用它，方法是在\
    \ `applicationDidFinishLaunching:` 的末尾插入以下代码行：\n\n```objc\n// insert this at the\
    \ end of applicationDidFinishLaunching:\n[self updateDetailViews];\n```\n\n快速编译一下，以确保到目前为止我们的代码可以顺利编译。现在是时候开始实现\
    \ `updateDetailViews` 方法，并最终在我们的窗口中看到一些 villain 数据了！\n\n### 设置简单值\n\n我们将要设置显示的前两个控件是包含\
    \ villain 姓名和最后已知地点的 `NSTextField`。`NSTextField` 也可以直接接受数字和其他类型的输入，但我们这里只是使用 `setStringValue:`\
    \ 为每个控件传入一个简单的字符串。将以下代码行放在 `updateDetailViews` 方法的开头（我们刚才用一对空括号定义了该方法）：\n\n```objc\n\
    [self.nameView setStringValue:[self.villain objectForKey:kName]];\n[self.lastKnownLocationView\
    \ setStringValue:\n                  [self.villain objectForKey:kLastKnownLocation]];\n\
    ```\n\n请注意，我们复用了之前定义的预处理器宏，因此不必担心拼错字符串值。"
  raw: 'Now we’ve made all the connections necessary for our application code to display
    values in the GUI and to receive updates in response to user actions. Time to
    start writing our application!    Getting Started with Coding    Now that the
    GUI layout is done, we’re going to implement the “guts” of the application, which
    in the case of VillainTracker will all be contained in the `VillainTrackerAppDelegate`
    class. We’ll learn how an `NSApplication` delegate (such as our controller class)
    can be made to react when the application launches, we’ll see the basic APIs for
    displaying values in the GUI objects we’ve created, and we’ll see how to implement
    methods that will respond to user actions by grabbing values from the relevant
    controls.    Standardizing Key Names    Before we start writing actual code, it’s
    a good idea to come up with a way of standardizing the names of the keys that
    will be used for accessing attributes from the model objects. Whether in a case
    like ours, where the villain is stored in a dictionary whose attributes are accessible
    only by keys, or in a more complex situation using real model objects, standardizing
    key names is critical to ensure that we’re correctly accessing the attributes
    in our model objects.    The technique we’re using here is a simple one: we use
    standard C preprocessor macros to define names that are replaced with `NSString`
    instances at compile time. This eliminates the potential problem of mistyping
    a key name and also adds the nice touch of working with the code-completion features
    in Xcode.    The following code includes key names for all the villain attributes
    that we are using in our application. With these in place, instead of using an
    `NSString` literal in our code to reference an attribute by its key name, we can
    (and should) use the defined name instead. Put the following code somewhere at
    the top of the `VillainTrackerAppDelegate.m` file:    ``` #define kName @"name"
    #define kLastKnownLocation @"lastKnownLocation" #define kLastSeenDate @"lastSeenDate"
    #define kSwornEnemy @"swornEnemy" #define kPrimaryMotivation @"primaryMotivation"
    #define kPowers @"powers" #define kPowerSource @"powerSource" #define kEvilness
    @"evilness" #define kMugshot @"mugshot" #define kNotes @"notes" ```    Creating
    the Default Villain    Now it’s time to create a new villain object containing
    all the attributes that users can edit in the application. As mentioned earlier,
    we’re not creating a “real” model class to contain a villain, instead going with
    the simpler option of using an `NSMutableDictionary`. We’ll create it inside an
    `NSApplication` delegate method called `applicationDidFinishLaunching:`. Nearly
    every Cocoa app needs to do some setup work at launch time, so Xcode generated
    the stub of this method for us when it generated the class. Now we’ll fill in
    an implementation.    Here’s the code:    ``` - (void)applicationDidFinishLaunching:(NSNotification
    *)aNotification {   self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:
                      @"Lex Luthor", kName,                   @"Smallville", kLastKnownLocation,
                      [NSDate date], kLastSeenDate,                   @"Superman",
    kSwornEnemy,                   @"Revenge", kPrimaryMotivation,                   [NSArray
    arrayWithObjects:@"Evil Genius", nil], kPowers,                   @"Superhero
    action", kPowerSource,                   @9, kEvilness,                   [NSImage
    imageNamed:@"NSUser"], kMugshot,                   @"", kNotes,                   nil];
    } ```    This code sets up all the attributes for a default villain that most
    people are familiar with. The `initWithObjectsAndKeys`: method fills the dictionary
    with a nil-terminated list of paired values and keys. For the sake of legibility,
    we’ve put each value/key pair on a line of its own. We’re already familiar with
    the `@"string"` syntax to make a new `NSString` literal, but the `@9` is new.
    This is shorthand for `[NSNumber numberWithInt:9]`.


    Note that the `mugshot` attribute is being set to a pre-existing `NSImage` instance,
    one of several that are included in Cocoa and are available for anyone to use
    in their applications. Now is a good time to once again compile the app in Xcode
    just to make sure we’ve got everything right so far, but there’s still no point
    in actually running the app just yet. The GUI has been created, but nothing’s
    actually working so far.    **Note**  You may be wondering why you’re putting
    initialization code for an `NSApplication`’s delegate into the `applicationDidFinishLaunching:`
    method, instead of into the `init` method. Objects that are loaded from the application’s
    main nib file are always in a special predicament: they are being initialized
    as a substep in the application’s own initialization routine, which means that
    at the time `init` is called on any object in the main nib file, the `NSApplication`
    itself may not be fully initialized! This has lots of repercussions, especially
    where the user interface is concerned, so often it’s best to postpone your initialization
    until everything is truly ready. Because the `VillainTrackerAppDelegate` is set
    up to be the delegate of `NSApplication`, you have a handy way to notice when
    the application is really ready by implementing the `applicationDidFinishLaunching:`
    method.    Paying Attention to Detail    The previous code created a villain object,
    but if we were to build and run our app right now, we wouldn’t see any sign of
    the villain. All the controls on the window would be blank because we haven’t
    populated any of them with values from our villain’s attributes. Now it’s time
    to change that. In the `VillainTrackerAppDelegate` class, we’re going to create
    a new private method called `updateDetailViews`, which sets up all the GUI objects
    to display the attributes of the current villain. We’re putting this functionality
    into a method of its own (as opposed to setting things up right inside of `applicationDidFinishLaunching:`)
    so that we can refresh our views whenever necessary, not just when the application
    launches. We’ll go through the process of displaying the villain’s attributes,
    and we’ll gain some familiarity with the basics of interacting with the various
    classes in our GUI.    Let’s start off by creating a simple “stub” of the new
    method. We want this method to be accessible from anywhere in our class, but not
    from the outside. One way to do this is to simply not add it to the `@interface`
    declaration in the `.h` file. So, just above the `@end` declaration at the bottom
    of the `VillainTrackerAppDelegate.m` file, insert the following code:    ``` -
    (void)updateDetailViews { } ```    Before we begin implementing the new method,
    we need to make sure we’re already set up to call it by inserting the following
    line at the end of `applicationDidFinishLaunching:`    ``` // insert this at the
    end of applicationDidFinishLaunching:   [self updateDetailViews]; ```    Do a
    quick compile to make sure that what we have so far compiles cleanly. Now it’s
    time to start implementing the `updateDetailViews` method and finally see some
    villain data in our window!    Setting Simple Values    The first two controls
    we’re going to set up for display are the two `NSTextFields` containing the villain’s
    name and last known location. `NSTextField` can directly accept numbers and other
    sorts of input as well, but we’re just passing along a simple string for each
    of these using `setStringValue:`. Place these lines at the start of `updateDetailViews`,
    which we defined with an empty set of brackets just a few paragraphs ago:    ```
    [self.nameView setStringValue:[self.villain objectForKey:kName]]; [self.lastKnownLocationView
    setStringValue:                   [self.villain objectForKey:kLastKnownLocation]];
    ```    Note that we’re reusing the preprocessor macros we defined earlier, so
    we don’t have to worry about mistyping a string value.'
