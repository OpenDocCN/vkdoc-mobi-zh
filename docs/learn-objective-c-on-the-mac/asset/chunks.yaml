    \ `updateDetailViews` 方法，并最终在我们的窗口中看到一些 villain 数据了！\n\n### 设置简单值\n\n我们将要设置显示的前两个控件是包含\
    \ villain 姓名和最后已知地点的 `NSTextField`。`NSTextField` 也可以直接接受数字和其他类型的输入，但我们这里只是使用 `setStringValue:`\
    \ 为每个控件传入一个简单的字符串。将以下代码行放在 `updateDetailViews` 方法的开头（我们刚才用一对空括号定义了该方法）：\n\n```objc\n\
    [self.nameView setStringValue:[self.villain objectForKey:kName]];\n[self.lastKnownLocationView\
    \ setStringValue:\n                  [self.villain objectForKey:kLastKnownLocation]];\n\
    ```\n\n请注意，我们复用了之前定义的预处理器宏，因此不必担心拼错字符串值。\n"
- fmt: "现在我们应该能够编译、运行此应用，并确实在窗口的文本字段中看到一些数据了！\n\n接下来，我们将设置`NSDateView`的值。将以下代码添加到`updateDetailViews`方法的末尾：\n\
    \n```\n[self.lastSeenDateView setDateValue:\n                  [self.villain objectForKey:kLastSeenDate]];\n\
    ```\n\n这显然与我们为`NSTextFields`所做的非常相似：同样使用了预处理宏，为目标对象调用了相关方法（本例中为`setDateValue:`），等等。输入这段代码后，我们应该再次编译并运行，以确保它正常工作，并且日期视图中显示了正确的日期（今天的日期）。\n\
    \n现在我们了解了这里的模式，让我们迈出更大的一步，看看如何一次为所有剩余的“简单”控件设置值。我们可以在每次添加后编译并运行以检查工作进展，或者如果我们觉得运气不错，也可以一次性输入所有代码，然后在最后编译并运行。将以下代码行添加到`updateDetailViews`方法的末尾：\n\
    \n```\n[self.evilnessView setIntegerValue:\n                  [[self.villain objectForKey:kEvilness]\
    \ integerValue]];\n[self.powerSourceView setTitle:[self.villain objectForKey:kPowerSource]];\n\
    [self.mugshotView setImage:[self.villain objectForKey:kMugshot]];\n[self.notesView\
    \ setString:[self.villain objectForKey:kNotes]];\n```\n\n这里唯一的复杂之处在于`evilnessView`。该视图期望一个`NSInteger`来设置其值，但我们的反派角色的邪恶度值是以`NSNumber`的形式存储在字典中的，因此我们多了一个步骤，需要将对象转换为`NSInteger`。\n\
    \n### 复杂控件中的值\n\n在我们将要显示的剩余属性中，有两个是简单值（`swornEnemy`和`primaryMotivation`），而第三个属性`powers`是一个“复合值”：一个字符串数组。所有这些属性都在比之前的属性更复杂的视图中显示，因此我们将花更多时间分别处理它们。\n\
    \n首先，让我们处理`swornEnemy`属性，它显示在`NSComboBox`中。组合框维护一个项目列表，如果我们想向其中添加新值，必须手动编辑。每当我们显示一个反派角色，其`swornEnemy`是在\
    \ Xcode 中设置组合框时未曾预料到的人时，我们就需要这样做。在以下代码中，我们首先检查组合框是否包含与我们要显示的名称匹配的项目。如果没有，则添加一个。之后，我们告诉组合框选择相应的项目。将以下代码添加到`updateDetailViews`方法的末尾：\n\
    \n```\nif ([self.swornEnemyView indexOfItemWithObjectValue:\n      [self.villain\
    \ objectForKey:kSwornEnemy]] == NSNotFound) {\n    [self.swornEnemyView addItemWithObjectValue:\n\
    \      [self.villain objectForKey:kSwornEnemy]];\n}\n[self.swornEnemyView selectItemWithObjectValue:\n\
    \      [self.villain objectForKey:kSwornEnemy]];\n```\n\n现在编译并运行，组合框应该显示正确的值，本例中为“Superman”。我们可以通过修改`applicationDidFinishLaunching:`方法中的相关行，将其引用为\
    \ nib 文件中不存在的其他超级英雄名字，然后重新编译并运行，来验证这对于未包含在 nib 文件组合框中的项目也能正常工作。\n\n接下来，让我们处理显示在单选按钮矩阵中的`primaryMotivation`属性。`NSMatrix`类允许我们通过指定其标签来选择单个单元格，而且由于这些是单选按钮，其他单元格将自动取消选择。我们要做的第一件事是定义一个方法，该方法返回一个字符串数组，包含我们为反派角色考虑的所有动机。这些字符串的排列顺序应与\
    \ nib 文件中复选框矩阵中单元格的顺序相同，以便它们的索引值与为每个单元格指定的标签相匹配。此方法应添加到`updateDetailViews:`方法之后。\n\
    \n```\n+ (NSArray *)motivations {\n    static NSArray *motivations = nil;\n  \
    \  if (!motivations) {\n        motivations = [[NSArray alloc] initWithObjects:@\"\
    Greed\",\n          @\"Revenge\", @\"Bloodlust\", @\"Nihilism\", @\"Insanity\"\
    , nil];\n    }\n    return motivations;\n}\n```\n\n关于这个新方法，有几点值得注意，每一点都可能对 Cocoa\
    \ 中使用的设计模式和哲学有所启示：\n\n*   这是一个类方法，而不是实例方法（由开头的`+`而不是`-`表示），因此这里发生的一切都应用于整个类，无论我们创建了多少个实例。这在许多情况下是合适的，尤其是当方法不处理任何特定于实例的内容（例如实例变量）时。\n\
    *   我们使用了一个局部定义的静态变量来指向我们创建的对象。初始赋值`nil`仅在方法第一次被调用时发生。这与标准 C 函数中静态局部变量的使用完全相同，它让我们定义一段代码块（`if`子句内的所有内容），该代码块仅在此方法第一次被调用时执行。\n\
    *   我们遵循一个称为*懒加载*的原则。我们不是在类初始化时创建数组，而是在第一次需要它时才创建。这样，如果没有人调用这个方法，数组就永远不会被创建。\n\
    \n乍一看，遵循这些原则可能有些小题大做。毕竟，我们只会有一个控制器类的实例，所以为什么要把它做成类方法呢？而且我们知道需要初始化那个数组，为什么要懒加载呢？\n\
    \n当然，在这个人为设计的例子中，我们可以选择走“更简单”的路线。我们可以直接获取`NSArray`创建代码，并将其插入到我们需要查看动机列表的任何地方！然而，从长远来看，用“简单”的方式做事常常会适得其反，最终变得一点也不简单。事实上，看到相同的代码片段在整个程序中重复出现几乎总是一个危险信号。除非不可避免，否则请*不要重复自己*——让你的代码保持`DRY`！请记住，你构建的系统未来可能会增长和扩展——方式可能是你今天无法预料的。用“正确”的方式做事是为你的代码提供将来保障的好方法，这样以后查看代码的人（例如，试图找到在哪里添加动机列表）能够理解发生了什么，并找到他们需要修改的那一个地方，而不是手动搜索并替换所有创建相同数组的地方。\n\
    \n有了我们的`motivations`方法，我们现在就可以从中获取一个索引号，以标识我们想要在 GUI 中选择的单元格的标签。以下是实现此目的的一种方法，准备添加到`updateDetailViews:`的末尾：\n\
    \n```\n[self.primaryMotivationView selectCellWithTag:\n  [[[self class] motivations]\
    \ indexOfObject:\n    [self.villain objectForKey:kPrimaryMotivation]]];\n```\n\
    \n好吧，我们意识到如果你不习惯这种写法，它看起来有点乱；甚至可能让一些人回想起在计算机科学教育中不得不学习，并且多年来一直试图忘记的 Lisp 或 Scheme（这些感觉是正常的，并且会随着时间的推移而消退）。为了清晰起见，我们将稍微拆解一下，并展示上述代码的另一种版本，其中一些中间值被赋值给了变量。\n\
    \n```\nNSArray *motivations = [[self class] motivations];\nid primaryMotivation\
    \ = [self.villain objectForKey:kPrimaryMotivation];\nint motivationIndex = [motivations\
    \ indexOfObject:primaryMotivation];\n[self.primaryMotivationView selectCellWithTag:motivationIndex];\n\
    ```\n\n这非常直接了当，所以你可能想知道我们为什么要先给你看那个所有代码都挤在一起的第一版。"
  raw: 'Now we should be able to compile the app, run it, and actually see some data
    in the window’s text fields!    Next we’ll set the `NSDateView`’s value. Add this
    to the end of `updateDetailViews`:    ```  [self.lastSeenDateView setDateValue:
                      [self.villain objectForKey:kLastSeenDate]]; ```    This is obviously
    quite similar to what we did for the `NSTextFields`: similar use of preprocessor
    macros, calling the relevant method for the target object (`setDateValue:` in
    this case), and so on. Once again we should compile and run after entering this
    code to make sure that it works and that the correct date (today’s date) is shown
    in the date view.    Now that we know the pattern here, let’s take a bigger step
    forward and see how to set values for all the remaining “simple” controls at once.
    We can either compile and run after each of these to check our work as we go,
    or if we’re feeling a little lucky, just enter all of them and then compile and
    run at the end. Add these lines to the end of the `updateDetailViews` method:    ```
      [self.evilnessView setIntegerValue:                   [[self.villain objectForKey:kEvilness]
    integerValue]];   [self.powerSourceView setTitle:[self.villain objectForKey:kPowerSource]];
      [self.mugshotView setImage:[self.villain objectForKey:kMugshot]];   [self.notesView
    setString:[self.villain objectForKey:kNotes]]; ```    The only complication here
    is for the `evilnessView`. The view expects an `NSInteger` with which to set its
    value, but our villain has its evilness value stored as an `NSNumber` inside a
    dictionary, so we have the added step of converting the object into an `NSInteger`.    Values
    in Complex Controls    Of the remaining attributes we’re going to display, two
    of them are simple values (`swornEnemy` and `primaryMotivation`), while the third,
    `powers`, is a “compound value;” an array of strings. All of them are being displayed
    in more complex views than the previous attributes were, so we’ll take a little
    more time with each of them.    First, let’s tackle the `swornEnemy` attribute,
    which is displayed in an `NSComboBox`. A combo box maintains a list of items that
    we must manually edit if we want to add new values to it. We’ll need to do that
    any time we’re displaying a villain whose `swornEnemy` is someone we didn’t anticipate
    back when we were setting up the combo box in Xcode. In the following code, we
    first check to see if the combo box contains an item matching the name we want
    to display. If it doesn’t, add one. After that, we tell the combo box to select
    the appropriate item. Add this to the end of the `updateDetailViews` method:    ```
    if ([self.swornEnemyView indexOfItemWithObjectValue:       [self.villain objectForKey:kSwornEnemy]]
    == NSNotFound) { [self.swornEnemyView addItemWithObjectValue:       [self.villain
    objectForKey:kSwornEnemy]];   } [self.swornEnemyView selectItemWithObjectValue:
          [self.villain objectForKey:kSwornEnemy]]; ```    Now compile and run, and
    the combo box should show the correct value, in this case “Superman.” We can verify
    that this will also work for items that aren’t included in the combo box in the
    nib file by changing the relevant line in the `applicationDidFinishLaunching:`
    method to refer to some other superhero name that isn’t present in the nib, then
    compiling and running again.    Next, let’s deal with the `primaryMotivation`
    attribute displayed in a matrix of radio buttons. The `NSMatrix` class lets us
    select a single cell by specifying its tag, and because these are radio buttons,
    the others will be automatically deselected. The first thing we’ll do is define
    a method that returns an array of strings containing all the motivations we’re
    considering for our villains. These will be arranged in the same order as the
    cells in the matrix of checkboxes in the nib file, so that their index values
    match the tags specified for each cell. This should be added after the `updateDetailViews:`
    method.


    ``` + (NSArray *)motivations {   static NSArray *motivations = nil;   if (!motivations)
    {     motivations = [[NSArray alloc] initWithObjects:@"Greed",       @"Revenge",
    @"Bloodlust", @"Nihilism", @"Insanity", nil];   }   return motivations; } ```    There
    are a few noteworthy things about this new method, each of which may provide some
    insight into the design patterns and philosophies used throughout Cocoa.    *   This
    is a class method instead of an instance method (indicated by an initial + instead
    of –), so everything that happens in here applies to the whole class, no matter
    how many instances we may create. This is appropriate in many situations where
    the method doesn’t deal with anything specific to an instance (for example, instance
    variables). *   We are using a locally defined static variable to point to an
    object we create. The initial assignment to nil occurs only the first time the
    method is called. This is identical to the use of static local variables in standard
    C functions and lets us define a chunk of code (everything inside the `if` clause)
    that will be executed only the first time this method is called. *   We are following
    a principle called *lazy loading*. Instead of creating the array when the class
    is initialized, we create it only the first time it’s needed. That way, if no
    one ever calls this method, the array is never created.    At first glance, it
    may seem like overkill to be following these principles. After all, we’re going
    to have only one instance of this controller class, so why make it a class method?
    And we know we’re going to need to initialize that array, so why be lazy about
    it?    Of course, in our contrived example, we could choose to follow the “simpler”
    route. We could just take the `NSArray` creation code and plop that into our code
    wherever we need to see the list of motivations! However, in the long run, doing
    things the “simple” way often backfires, and ends up not being simple at all.
    In fact, seeing identical pieces of code repeated throughout a program is almost
    always a red flag. Unless it’s unavoidable, Don’t Repeat Yourself—keep your code
    DRY! Remember that the systems you build may grow and be extended in the future—in
    ways you can’t always anticipate today. Doing things the “right” way is a good
    way to future-proof your code so that someone looking through the code later on
    (for example, trying to find where to add to the list of motivations) can figure
    out what’s happening and find the one spot they need to change, instead of doing
    a manual search and replace to find every spot where an identical array is being
    created.    With our motivations method in place, we’ll now be able to harvest
    from it an index number to identify the tag of the cell we want to select in the
    GUI. Here’s one way to do this, ready to be added to the end of `updateDetailViews:`    ```
    [self.primaryMotivationView selectCellWithTag:   [[[self class] motivations] indexOfObject:
        [self.villain objectForKey:kPrimaryMotivation]]]; ```    Okay, we realize
    that looks like a bit of a mess if you’re not used to it; it may even give some
    of you flashbacks to the Lisp or Scheme you had to learn in your computer science
    education and have spent years trying to forget (these feelings are normal and
    will subside over time). For the sake of clarity, we’re going to unpack this a
    bit and show an alternate version of the above, where some intermediate values
    are assigned to variables.    ``` NSArray *motivations = [[self class] motivations];
    id primaryMotivation = [self.villain objectForKey:kPrimaryMotivation]; int motivationIndex
    = [motivations indexOfObject:primaryMotivation]; [self.primaryMotivationView selectCellWithTag:motivationIndex];
    ```    Pretty straightforward, so you may wonder why we showed you the first version
    where everything is all packed together.'
