    图 10-4. 数据录入窗口的完成布局


    ## 输入一些初始引用


    保存更改并点击运行。应用程序应启动并显示数据录入窗口。选择上方表格视图下方的“Add”按钮添加一个剧集，然后双击表格视图中高亮区域编辑剧集名称。重复此操作几次，创建几个`Show`实例。现在，选中一个剧集后，在下方表格中添加一条引用，直接在表格中编辑文本和任何角色的名称。如果您添加的引用包含两个或多个角色之间的对话，请在“Character”字段中输入所有相关角色的名称。稍后我们启用基于角色名称的搜索时，它将与您输入的所有名称一起工作。再添加几条引用，分布在几个不同的剧集中。请注意，当您选择不同的剧集时，引用列表会发生变化；如果您退出并重新启动`QuoteMonger`，您应该看到您输入的所有内容都已保存。


    另一方面，如果似乎没有任何效果，请检查 Xcode 中的调试日志，查看应用程序是否引发了异常。常见的问题包括：忽略了为数组控制器上的托管对象上下文设置绑定，或者输错了`Controller
    Key`或`Model Key Path`绑定的名称。


    ## 创建引用查找器窗口


    现在是时候为搜索窗口打下基础了。回到 Xcode 的 Interface Builder 面板中，从*Object Library*拖出一个新窗口，并将其放到画布上。Xcode
    提供了多种窗口类型，但我们只需要一个普通的平面窗口。（您可能还想关闭`QuoteMonger`窗口以将其移开，方法是点击 Interface Builder
    画布上窗口左上角的小`x`。）


    选择新窗口，转到*Attributes Inspector*。将新窗口标题设为“Quote Finder”。此窗口上将有两个可见控件：一个表格视图和一个文本视图。表格视图将显示匹配引用的列表，文本视图将显示所选引用的内容。稍后，我们还将使用一个名为“谓词编辑器”的新工具来定义搜索条件。谓词编辑器用于在`Mail.app`中定义过滤规则以及在
    iTunes 中创建智能播放列表。它是一个通用的 Cocoa 组件，我们也可以使用它。不过，我们现在还不会用到它。


    让我们开始吧！从*Object Library*拖出一个表格视图，并将其定位在窗口顶部附近。在*Attributes Inspector*中，将其设置为基于视图，并赋予它三个列。分别将这三个列标题设为“Quote
    Text”、“Character”和“Show”。


    此外，编辑每个字段中的文本以反映列的名称。我们还可以为此表格视图勾选*Alternating Rows*复选框，以防搜索返回大量匹配项。此表格视图不会放入框中，因此我们可以调整其大小以填满窗口宽度，让蓝色参考线告诉我们何时停止。


    现在，从*Object Library*拖出一个文本视图（在库区域底部的搜索字段中输入“text view”），并将其放置在表格视图下方。将其展开至与表格视图相同的宽度。在*Attributes
    Inspector*中，关闭*Editable*和*Rich Text*复选框。对于“Find”，将弹出菜单设置为*Uses Bar*，并勾选*Incremental
    Searching*复选框。这将使大文本视图能够使用 Mac OS/X 10.7 中引入的嵌入式搜索栏。窗口应类似于图 10-5。


    ![9781430245421_Fig10-05.jpg](img/9781430245421_Fig10-05.jpg)


    图 10-5. 查询查找器窗口的第一版


    接下来，拖出一个数组控制器并将其命名为“FoundQuotes”。在*Attributes Inspector*中，将其*Mode*设置为`Entity Name`，并将“Quote”作为要使用的*Entity
    Name*。同时勾选*Prepares Content*复选框。在这些设置上方，在*Attributes Inspector*的数组控制器块中，勾选*Auto
    Rearrange Content*复选框。这将使得每当用户在`Quotes`控制器中进行更改时，它都能正确地重新加载和重新过滤其内容。在*Bindings
    Inspector*中，将其*Managed Object Context*绑定到`App Delegate`，并将*Model Key Path*设置为“managedObjectContext”。


    现在，我们需要为用户界面控件——表格视图和文本视图——设置绑定。像往常一样，我们从表格视图开始。将表格视图的*Content*和*Selection Indexes*绑定到`FoundQuotes`控制器。将*Content*绑定到`arrangedObjects`的*Controller
    Key*，并将*Selection Indexes*绑定到`selectionIndexes`的*Controller Key*。然后，深入到表格视图内部的“Static
    Text - Quote Text”字段。将其*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.quoteText”作为*Model
    Key Path*。将“Static Text – Character”字段的*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.character”作为*Model
    Key Path*。最后，选择表格视图内的“Static Text – Show”字段，将其*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.show.name”作为*Model
    Key Path*。


    对于文本视图，情况稍微简单一些。选择文本视图，将其*Value*绑定到`FoundQuotes`。使用“selection”作为*Controller Key*，使用“quoteText”作为*Model
    Key Path*。


    现在点击运行，注意两个窗口。新的查询查找器窗口仅显示我们在数据录入窗口中输入的所有引用。本章剩余部分将介绍如何使用`NSPredicate`来改变这一点，以便只有用户搜索的引用才会显示在这个窗口中。


    ## 使用`NSPredicate`限制结果


    如前所述，我们可以通过使用`NSPredicate`来限制`NSArrayController`为显示准备哪些记录。我们可以直接在 Interface Builder
    中为数组控制器分配一个谓词；在初始化或条件发生变化需要重新获取时，通过应用程序代码进行分配；或者通过 Cocoa 绑定来实现，这意味着对谓词的更改可以自动传播到控制器。我们将在本章中探讨所有这些选项。


    ### 创建谓词


    创建`NSPredicate`最简单的方法是使用一个包含属性名称、比较符和要比较的值的格式字符串。谓词的定义看起来很像 SQL 中的`WHERE`子句，并且服务于大致相同的目的。谓词不仅限于
    Core Data 的使用，还可以应用于 Mac OS X 的其他领域，例如 Spotlight。

