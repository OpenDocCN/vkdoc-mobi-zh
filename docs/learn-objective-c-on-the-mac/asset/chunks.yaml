    \ Cocoa GUI 类的基础知识；等等。在下一章中，我们将以目前所做的工作为基础，扩展 VillainTracker 应用，使其能够处理表格中列出的一系列反派。\n\
    \n## 第 6 章：使用表格视图\n\n第 4 章和第 5 章涵盖了一些 Cocoa 最常用的 GUI 组件，从按钮和简单的输入字段到功能齐全的文本编辑器。我们还没有谈到\
    \ Cocoa 最大、最复杂的视图类之一：`NSTableView`。本章将介绍如何使用 `NSTableView` 来显示整个组件集合的数据，如何响应用户通过点击行来更改表格选择，以及如何直接在表格中编辑值。\n\
    \n我们将通过扩展第 5 章中的 VillainTracker 应用来学习如何使用表格视图。本章将要创建的 VillainTracker 新版本将维护一个反派数组，在一个表格中显示所有反派，并允许用户点击表格中的条目来编辑所选反派的所有属性。我们将从使用\
    \ Xcode 扩展 `VillainTrackerAppDelegate` 类的接口开始，使其包含一个反派数组。既然无论如何都要处理这段代码，我们还将研究通过手动添加一些新出口的方法，用于连接新的表格视图和窗口本身，以及用于添加和删除反派的操作方法。然后，我们将在\
