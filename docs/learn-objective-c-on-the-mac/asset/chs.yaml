  ## 关于作者


  **杰克·纳廷** 早在 Cocoa 被命名为 Cocoa 之前的旧时代就开始使用它。他使用 Cocoa 及其前身为各种行业和应用开发软件，包括游戏、平面设计、在线数字发行、电信、金融、出版和旅游。当他不从事
  Mac 或 iOS 项目、不用 Unity3D 制作炫酷游戏、或者不和他的朋克摇滚乐队一起摇滚时，他通常会与家人共度时光。杰克在 Twitter 上是 `@jacknutting`，并偶尔在
  `www.nuthole.com` 上写博客。（照片由 Alison De Mars von Blixen 提供。）


  **彼得·克拉克** 大约在 1990 年大学期间开始接触 NeXTStep。这段经历为他职业生涯的前半段定下了基调，当时他与杰克在双子城的一家咨询公司共事。他与湾区的公司、芝加哥和双子城的公司合作过
  NeXTStep 和 WebObjects 项目，写过一本关于 OpenStep 开发的书，随后又转向了 Java、.NET、Ruby 和 Scala 开发以及管理工程团队。他很高兴
  NeXTStep 的许多设计模式至今仍然有用，并发现 Cocoa 开发既让人感到熟悉舒适，又常有令人愉悦的惊喜。彼得目前是明尼苏达大学一个研究项目的软件发展总监。他偶尔在
  `http://blog.pclark.net` 上写博客，也可以在 Twitter 上找到他，用户名为 `@pclark`。彼得想让你知道，他至少比杰克早一两个月开始使用
  NeXTStep。（照片由 Wade Stebbings 提供。）


  ---


  ## 关于技术审校者


  **尼克·韦尼克** 在 IT 领域已经工作了超过十三年，涉足过从网络管理到 Web 开发的方方面面。他在 SDK 首次发布时就开始编写 iOS 应用。从那时起，他开始了自己的事业，专注于
  iOS 开发。他喜欢在业余时间与妻子艾莉森和儿子普雷斯顿在一起，有时也会打打高尔夫。他在 `nickwaynik.com` 上写博客，也可以在 Twitter
  上找到他，用户名为 `@n_dubbs`。


