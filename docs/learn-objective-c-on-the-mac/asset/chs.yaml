  \  \n    _darkenBlendView.blendMode = kCGBlendModeDarken;  \n    _lightenBlendView.blendMode\
  \ = kCGBlendModeLighten;  \n    _colorDodgeBlendView.blendMode = kCGBlendModeColorDodge;\
  \  \n    _colorBurnBlendView.blendMode = kCGBlendModeColorBurn;  \n    _softLightBlendView.blendMode\
  \ = kCGBlendModeSoftLight;  \n    _hardLightBlendView.blendMode = kCGBlendModeHardLight;\
  \  \n    _differenceBlendView.blendMode = kCGBlendModeDifference;  \n    _exclusionBlendView.blendMode\
  \ = kCGBlendModeExclusion;  \n    _hueBlendView.blendMode = kCGBlendModeHue;  \n\
  \    _saturationBlendView.blendMode = kCGBlendModeSaturation;  \n    _colorBlendView.blendMode\
  \ = kCGBlendModeColor;  \n    _luminosityBlendView.```\n\n\n\n`blendMode = kCGBlendModeLuminosity;`\
  \  \n`NSArray *allBlendViews = @[_multiplyBlendView, _screenBlendView, _overlayBlendView,\
  \ _darkenBlendView, _lightenBlendView, _colorDodgeBlendView, _colorBurnBlendView,\
  \ _softLightBlendView, _hardLightBlendView, _differenceBlendView, _exclusionBlendView,\
  \ _hueBlendView, _saturationBlendView, _colorBlendView, _luminosityBlendView];`\
  \  \n\n```\nfor (CMColorBlendView *cbv in allBlendViews) {  \n    [cbv bind:@\"\
  color1\"  \n     toObject:_objectController  \n   withKeyPath:@\"selection.color1\"\
  \  \n       options:nil];  \n      \n    [cbv bind:@\"color2\"  \n     toObject:_objectController\
  \  \n   withKeyPath:@\"selection.color2\"  \n       options:nil];  \n}\n```\n\n\
  这段代码的第一部分为每个视图逐一设置了混合模式。第二部分为每个 `CMColorBlendView` 配置了绑定。由于所有视图的绑定都相同，我们遍历一个包含所有\
  \ `ColorBlendView` 的数组（该数组在 `for` 循环之前即时创建），并为每个视图执行绑定。\n\n这是我们第一次要求您在代码中进行大量的 GUI\
  \ 配置。使用 Cocoa 内建的对象，您可以直接在 Interface Builder 中配置许多内容，但对于自定义类来说，这并不总是那么简单。\n\n请注意，调用\
  \ `bind:toObject:withKeyPath:` 实现了与在 Interface Builder 中配置绑定相同的效果。事实上，您在 Interface\
  \ Builder 中配置的每个绑定更像是一个动词而非名词。当您的应用程序加载包含绑定的 nib 文件时，每个已保存的绑定都会触发一个您在此处看到的调用。还需要注意，Interface\
  \ Builder 中表示为 *Controller Key* 和 *Model Key Path* 的内容，最终会合并为一个字符串，用于 `bind:toObject:withKeyPath:`\
  \ 调用。\n\n好了，理论部分到此为止。现在保存工作，点击运行，您应该会看到类似图 12-6 的效果。\n\n![9781430245421_Fig12-06.jpg](img/9781430245421_Fig12-06.jpg)\n\
  \n图 12-6。最终，我们看到了混合后的颜色。如果您阅读的是本书的黑白印刷版，那么请想象这里有一组炫丽多彩的颜色阵列。\n\n点击其中一个颜色块打开颜色面板，并开始拖动里面的滑块，您会发现所有\
  \ 15 种混合颜色都会随着您设置的颜色同步更新。非常棒！\n\n现在应用程序已经运行起来，我们可以使用标准菜单项来创建多个文档、为每个文档指定不同的颜色、保存文档、关闭文档、管理其窗口等等。Cocoa\
  \ 的文档架构负责处理实例化文档和文档控制器、加载 nib 文件、使用保存面板等细节。所有这些功能都可以由开发者增强（例如，我们可以通过各种方式自定义文档保存的过程），但仅使用基本功能也能让我们走得很远，这些功能开箱即用。\n\
  \n## 关于撤销与重做\n\n现在，我们应该提一下 `NSUndoManager`，它负责处理 Cocoa 中的撤销/重做支持。请注意，我们在 ColorMix\
  \ 中执行的操作（实际上只是更改颜色）都可以通过“编辑”菜单中的项目进行撤销和重做。另外，请注意这些撤销和重做操作是文档相关的；在一个文档中进行的更改和撤销与其他文档中发生的任何事情完全独立。然而，可能不太清楚的是，究竟是什么启用了这种功能；我们并没有编写任何处理撤销和重做的代码，但它却神奇地出现了。简单的答案是：在\
  \ Core Data 应用程序中，基本的撤销/重做通常由系统为我们处理，我们无需做任何事情。负责管理模型对象的托管对象上下文能够注意到对象何时被编辑，并将反向操作添加到“撤销栈”中。\n\
  \n这样做的好处是，对于大多数现代 Cocoa 应用程序，我们免费获得了撤销和重做功能。\n\n然而，这是一本关于编程的书，而不是关于罗列框架酷炫特性的书。至少，我们需要对底层工作原理有所了解，以便在必要时知道在哪里进行调整。因此，以下是对\
  \ Cocoa 中撤销/重做支持如何工作，以及 Core Data 和 `NSDocument` 如何协同使其自动工作的速成教程。\n\n## 撤销栈\n\n\
  许多程序员可能从未深入思考过撤销和重做在应用程序中通常是如何实现的。这已经成为一种被普遍接受和期望的功能，以至于它似乎只是自然秩序的一部分。基本原理如下：每次我们在应用程序中编辑内容时，都需要创建一个代表编辑操作反向操作的项目。因此，如果用户在文本末尾添加了字母“X”，就需要有一段代码创建一个表示相反操作的项目，即一个可以删除那个“X”的操作。然后，该表示被放置到某处类似的项目的栈中（“撤销栈”）。调用“撤销”命令包括从撤销栈顶部弹出最近的项目，并执行它所描述的操作。同时，调用撤销命令最终会创建另一个项目，即来自撤销栈的反向项目的反向操作（实际上与原始编辑相同），并将其放置在“重做栈”上，以备用户后来想要撤销这个撤销操作。\n\
  \n这种架构存在多种变体，例如限制栈大小，或者根本没有栈而是只有单个撤销项目，但基本架构在大多数平台上都非常相似。Cocoa 实现此方式的一个特别之处在于，它不是将每个撤销项目以一种需要稍后以某种方式解码的特殊形式来表示，而是使用目标对象、要对该对象调用的方法选择器以及所需的任何参数，隐式地构造每个撤销项目。当触发撤销命令时，没有任何类型的解码或查找。该方法就像任何其他\
  \ Objective-C 方法一样被简单调用。\n\n让我们来看一个例子。假设有以下方法，放在一个具有可设置名称的类中：\n\n```\n- (void)setName:(NSString\
  \ *)newName {\n    if (![newName isEqual:name]) {\n        name = newName;\n   \
  \ }\n}\n```\n\n现在假设我们希望设置名称成为一个可撤销的操作。通过添加以下以粗体显示的行，可以轻松实现这一点：\n\n```\n- (void)setName:(NSString\
  \ *)newName {\n    if (![newName isEqual:name]) {\n        NSUndoManager *undoManager\
  \ = ...\n        [undoManager registerUndoWithTarget:self\n                selector:@selector(setName:)\n\
  \                object:name];\n        [undoManager setActionName:@\"名称更改\"];\n\
  \        name = newName;\n    }\n}\n```\n\n请注意，我们省略了实际获取撤销管理器的代码部分。在实际应用程序中，撤销管理器可能来自几个不同的地方，具体取决于应用程序是否具有\
  \ Core Data 和 `NSDocument` 支持。在 Core Data 应用中，我们可以随时向共享的 `NSManagedObjectContext`\
  \ 对象请求一个撤销管理器；而在同时支持 Core Data 和文档的应用中，每个文档都有自己的撤销管理器。\n\n这种方式的最终体现出现在 Core Data\
  \ 应用程序中，它实际上代表我们实现了类似上述的功能。请注意，上面的 `setName:` 方法非常公式化。Core Data 在幕后实现了一些魔法，这样我们就不必实现那个\
  \ `setName:` 方法。只要模型对象发生任何编辑，Core Data 就会注意到并为我们设置撤销。\n\n## 总结\n\n我们刚刚从头开始创建了第一个基于\
  \ `NSDocument` 的应用程序。我们还学习了一些在 `NSView` 上绘图和处理颜色的知识，这些都是适用于各种应用领域的有用技能。\n\n\n在后面的章节中，我们会基于这些技能进行更深入的探索，特别是\
  \ Cocoa 真正大放异彩的有趣图形编程。然而，在下一章中，我们得暂时放下乐趣，学习当应用中出现问题时会发生什么——以及如何使用 `NSError` 和 `NSException`\
  \ 来应对这些问题。\n\n## 第 13 章 异常、信号、错误与调试\n\n任何做过编程的人都知道，事情有时并不会按计划进行。你忘记处理某个特定的边缘情况，或者一个系统调用以一种你从未料到的方式失败，然后你的程序就突然崩溃了。每种编程语言和开发环境都有处理这些问题的方法，而\
  \ Cocoa 也不例外。\n\n本章将介绍 Cocoa 用于创建和处理异常与错误的机制，这是两个听起来相似但在概念上截然不同的系统。我们将学习它们各自不同的使用方式、如何处理它们，以及如何自己发起它们。我们还将了解某些内存滥用是如何导致信号（Signal）发生的，这通常会导致崩溃。最后，我们会窥探一下\
  \ Xcode 内置的调试器，它可以帮助我们解决这些问题。\n\n## 异常处理\n\n让我们从异常处理开始。*异常*（exception）是一种特殊的对象，可以在程序的一部分中创建，以告知另一部分出现了问题；这被称为“抛出”（raising）异常，在代码中看起来可能像这样：\n\
  \n```objc\n// 想象我们正在一个方法中，该方法有一个参数 \"index\"，其值不能为负数。\nif (index < 0) {\n    [NSException\
  \ raise:NSRangeException format:\n        @\"I can't take all this negativity! (index\
  \ == %d)\", index];\n}\n```\n\n在这个例子中，我们使用 `NSException` 类的一个类方法，一步创建并抛出了一个异常。该方法的第一个参数是一个字符串，用于指定异常的名称（此处为\
  \ `NSRangeException`，它是 Cocoa 中预定义的异常名称），这允许对异常进行一般性分类。与许多其他异常处理环境不同，`NSException`\
  \ 很少被子类化，因此其名称用于区分不同类型的异常。我们传递的第二个参数是异常“原因”（reason）的格式字符串，这是一个人类可读的描述性字符串。这个格式与我们可以传递给\
  \ `NSLog` 的参数列表类型相同，其中第一个是 `NSString`，其他参数根据字符串的指定进行插值。\n\n### 捕获异常\n\n当那段代码被执行时，如果\
  \ `index < 0`，程序的正常流程就会被中断。程序不会继续执行该方法的其余部分，而是会沿着调用栈向下查找一个称为*异常处理器*（exception handler）的特殊代码构造。异常处理器会执行包含在一对花括号内的所有代码，这些代码以\
  \ `@try` 关键字为前缀。如果在执行期间抛出了异常，执行将跳转到由 `@catch` 关键字标记的相邻代码块，并执行其中包含的代码。这被称为*处理异常*。最后，我们可以选择性地包含第三个由\
  \ `@finally` 关键字标记的代码块，无论 `@try` 和 `@catch` 部分中发生了什么，该代码块都会被执行，以执行任何必要的清理工作。\n\n\
  下面的示例创建了与之前相同的异常，但现在是在一个 `@try` 块内。我们在 `@catch` 块中捕获它并输出一条错误消息，然后进入 `@finally` 部分，无论发生什么，该部分都会被执行。在这个简单的例子中，我们不需要\
  \ `@finally` 部分，可以忽略它，但在某些情况下，例如某个资源在 `@try` 块中被初始化并需要释放时，它会非常有用。\n\n```objc\n@try\
  \ {\n    if (index < 0) {\n        [NSException raise:NSRangeException format:\n\
  \            @\"I can't take all this negativity! (index == %d)\", index];\n   \
  \ }\n} @catch (NSException *e) {\n    NSLog(@\"Encountered exception %@ with reason\
  \ %@\",\n        [e name],\n        [e reason]);\n} @finally {\n    // 我们这里实际上没有什么可做的。\n\
  }\n```\n\n这个示例在同一方法中处理了抛出的异常，但这实际上相当罕见。更常见的情况是，没有找到本地的异常处理器，因此系统会遍历调用栈寻找异常处理器，首先在当前方法的调用者中查找，然后是*那个*方法的调用者，依此类推。这个搜索会沿着调用栈一直进行，直到找到异常处理器为止。如果找不到，可以配置一个特殊场景来处理未捕获的异常。默认情况下，遇到未捕获异常的\
  \ Cocoa 应用会将有关异常的一些信息打印到控制台日志，然后尝试照常继续运行。\n\n### Cocoa 中有限的异常角色\n\n在 Cocoa 中，异常用于在发生不应该在程序运行时出现的严重问题时，让方法跳出其正常的操作流程。通常，如果你的代码导致抛出了异常，那就说明你有一个\
  \ bug。除极少数例外情况，一个编写得当的 Cocoa 程序应该能够永远运行而不抛出任何一个异常。\n\n如果你有 Java、Ruby、Python 或 C++\
  \ 的背景，这可能会显得有些限制。在许多其他环境中，异常的使用更为自由，例如一个文件读取方法抛出异常来告诉调用者它已经读到了文件末尾（仔细想想，这根本就不是什么异常状况，因为每个文件都有末尾）。在\
  \ Python 中，遍历数组的一种常见习语是递增索引，尝试从数组中读取索引值，并在读取超出末尾时捕获由此产生的异常。然而，在 Cocoa 中，这种做法是不被提倡的，异常通常仅用于报告可能由程序中的\
  \ bug 引起的意外结果。\n\n由于异常在 Cocoa 中的作用相当有限，你通常不会在 Cocoa 应用中看到大量的异常处理代码。与 Java 不同，Objective-C\
  \ 不要求（甚至不允许）其方法指定它们可能抛出哪些类型的异常，理论上你根本*不必*处理它们。默认情况下，你创建的每个 Cocoa 应用都会有一个顶层的异常处理器，它只是简单地将有关异常的一些信息输出到系统日志，然后让应用尽力继续运行。不幸的是，这算不上什么好策略，因为发生异常时应用正在做的事情很可能是在响应用户的上一个操作（点击按钮、按键等），而该操作在此之后本应执行的其他操作都被直接跳过了，这可能会使应用程序处于未定义或不一致的状态！\n\
  \n有些应用程序会安装自己的特殊顶层异常处理器来处理这些情况。例如，Xcode 偶尔会遇到异常（是的，即使是 Xcode 也有 bug！），这时它通常会为用户提供退出应用的机会，并意识到可能有些事情搞砸了。\n\
  \n## 创建一个测试平台\n\n让我们构建一个小的应用程序，演示 Cocoa 程序员可能遇到的几种常见异常。在 Xcode 中，创建一个新的 Cocoa 应用程序（这次不涉及\
  \ Core Data 或文档），命名为 “ExceptionCity”，并指定 “EC” 作为类前缀。我们创建的应用程序将自动包含一个名为 `ECAppDelegate`\
  \ 的类。\n\n我们的应用委托将是一个非常简单的类，包含 `applicationDidFinishLaunching:` 委托方法，该方法会调用三个不同的“工具”方法，每个方法都演示一个可能导致运行时抛出异常的常见\
  \ Cocoa 陷阱。\n\n\n\n### 排版后内容\n\n如果所有三个方法都成功完成并返回，我们将看到一个祝贺性的警告面板（这正是我们一直想要的）。然而，每个实用方法都存在一个问题，会引发异常。我们的目标是找到并修复每个问题。以下是`ECAppDelegate.m`文件的完整内容：\n\
  \n```objc\n#import \"ECAppDelegate.h\"\n\n@implementation ECAppDelegate\n\n- (void)invalidArgumentException_unrecognizedSelector\
  \ {\n    // The downside of dynamism is the occasional type mismatch.\n    // For\
  \ instance, it's sometimes hard to be sure what's coming\n    // out of an array.\
  \  Imagine this array is created somewhere...\n    NSArray *nameComponents = @[@\"\
  Thurston\",\n                                @\"Howell\",\n                    \
  \            [NSNumber numberWithInt:3]];\n\n    // ... and accessed later on, by\
  \ code that just assumes all the\n    // array's items are strings:\n    NSInteger\
  \ nameComponentLength = 0;\n    for (NSString *component in nameComponents) {\n\
  \        nameComponentLength += [component length];\n    }\n    NSLog(@\"Total length\
  \ of all name components: %ld\",\n          (long)nameComponentLength);\n}\n\n-\
  \ (void)invalidArgumentException_insertNil {\n    // Assuming we have an array to\
  \ put things into...\n    NSMutableArray *array = [NSMutableArray array];\n\n  \
  \  // ... we can add an object to it.\n    id object1 = @\"hello\";\n    [array\
  \ addObject:object1];\n\n    // But suppose we take a method parameter or instance\
  \ variable\n    // whose value we haven't checked to make sure it wasn't nil...\n\
  \    id object2 = nil;\n\n    // ... and try to add it to the array?\n    [array\
  \ addObject:object2];\n    NSLog(@\"inserted all the objects I could!\");\n}\n\n\
  - (void)rangeException {\n    // Assuming we have an array of things...\n    NSArray\
  \ *array = @[@\"one\", @\"two\", @\"three\"];\n\n    // ... we can ask for the index\
  \ of an item...\n    NSUInteger indexOfTwo = [array indexOfObject:@\"two\"];\n\n\
  \    // ... and we can later retrieve that value using the same index.\n    NSLog(@\"\
  found indexed item %@\", array[indexOfTwo]);\n\n    // But, what if we try to find\
  \ the index for something that's not\n    // there?\n    NSUInteger indexOfFive\
  \ = [array indexOfObject:@\"five\"];\n\n    // And we forget to check the return\
  \ value to make sure it's not\n    // NSNotFound?\n    NSLog(@\"found indexed item\
  \ %@\", array[indexOfFive]);\n}\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    [self invalidArgumentException_unrecognizedSelector];\n\
  \    [self invalidArgumentException_insertNil];\n    [self rangeException];\n  \
  \  NSRunAlertPanel(@\"Success\", @\"Hooray, you fixed everything!\",\n         \
  \           nil, nil, nil);\n}\n\n@end\n```\n\n运行这段代码。承诺的警告面板不会出现（但默认 nib 文件中包含的空窗口会出现）。然而，会发生的是，类似下面的内容将出现在\
  \ Xcode 的调试输出中：\n\n```\n2013-02-07 00:25:12.756 ExceptionCity[43532:303] -[__NSCFNumber\
  \ length]: unrecognized selector sent to instance 0x387\n```\n\n如果你回顾一下`invalidArgumentException_unrecognizedSelector`方法及其注释，你大概能看出问题出在哪里：我们的数组包含一个`NSNumber`，它没有`length`方法，因此引发了一个异常。我们没有做任何事情来显式处理异常，它最终沿着调用栈一直往下，没有得到处理，这导致了之前提到的默认行为：关于异常的一些信息（具体是它的`reason`）被记录，应用程序跳过当前事件的剩余部分。在此例中，正在处理的事件是应用程序启动，此时启动已经完成。\n\
  \n如果我们没有为你指出那个方法，情况就不会那么清楚。\n\n记录的异常信息没有告诉我们异常来自哪里、异常的名称，或者其他任何可能帮助我们找到触发异常的代码部分的信息。这时，我们的新朋友——Xcode\
  \ 调试器——就派上用场了。调试器允许我们在所有异常上设置断点，这样我们就可以在异常被抛出的那一刻暂停程序并尝试定位问题。\n\n### 调试器\n\n大多数开发者可能都熟悉调试器的概念，它允许你在应用程序运行时检查其状态，以便诊断问题。如果你之前没有接触过调试器，这里快速介绍一些关键概念：\n\
  \n- **断点** (*breakpoint*) 允许你指定程序应暂停的位置，可以是源代码中的行号，也可以是方法或函数的名称。你当前设置的所有断点都会显示在项目窗口左侧的“断点导航器”（Breakpoint\
  \ Navigator）中。当程序在断点处停止时，你可以检查程序执行到该位置时的所有 CPU 寄存器。如果你有程序的源代码，你还可以访问在该位置相关的任何变量（局部变量、实例变量或其他）。所有\
  \ CPU 寄存器和可用变量都显示在项目窗口底部 Xcode 调试区（Debug Area）的表格视图中。\n- **调用栈** (*call stack*)\
  \ 是任何时刻正在运行的所有嵌套方法和函数的列表。它显示在项目窗口左侧 Xcode 调试导航器（Debug Navigator）的表格视图中。当程序暂停时，当前方法或函数位于调用栈的顶部，调用它的方法或函数位于其下方，以此类推。你可以选择调用栈中的特定条目或“帧”来切换焦点，此时调试区将显示当该方法或函数调用调用栈中其上方的函数时的\
  \ CPU 寄存器和变量。\n- 调试器包含一些按钮，允许你对当前高亮的代码行执行某些操作。你可以**单步跳过**当前行（执行当前行剩余部分，然后在下一行暂停）、**单步进入**下一个方法或函数（将在被调用的下一个方法或函数的开头暂停）、**单步跳出**当前方法或函数（在调用者中返回后暂停），或者**继续**或**停止**程序。\n\
  - 调试器包含一个名为`lldb`的命令行界面（它是`gdb`命令的现代分支/重写版，`gdb`历史上是大多数基于 UNIX 的操作系统的标准命令），它允许你使用之前提到的所有功能，以及执行任意代码并检查结果。你可以通过像在源代码中那样输入\
  \ C 函数和 Objective-C 方法的名称来调用它们，并使用正在运行的程序的变量值作为消息接收者和参数。\n\n有关使用 Xcode 调试器的更多详细信息，请参阅\
  \ Xcode 文档中包含的“调试和优化你的应用”文档。\n\n在 Xcode 中，通过选择 **View** ![image](img/arrow.jpg)\
  \ **Navigators** ![image](img/arrow.jpg) **Show Breakpoint Navigator** 或按下 ![images](img/arrow3.jpg)**6**\
  \ 来打开断点导航器视图。这会使得导航面板显示所有当前的断点（参见图 13-1）。\n\n![9781430245421_Fig13-01.jpg](img/9781430245421_Fig13-01.jpg)\n\
  \n图 13-1 .  Xcode 的断点导航器，显示了一些断点。第一次使用时，左侧会有一个空列表\n\n断点导航器显示了 Xcode 当前为我们的项目配置的所有断点。由于我们刚刚创建了一个全新的项目，这个列表应该是空的！我们将通过添加一个异常断点来捕获应用程序中抛出的任何异常，从而改变这一状况。\n\
  \n\n\n请记住，每一次引发的异常都是某个 bug 的结果，很可能就是我们自己的 bug，并且我们想要抓住每一个机会停下来，看看它来自哪里。  \n点击断点导航器（Breakpoint\
  \ Navigator）最左下角的 `+` 符号来创建一个新的断点。会弹出一个小菜单，询问要创建哪种类型的断点。选择“添加异常断点”（Add Exception\
  \ Breakpoint），然后会弹出一个更大的视图，其中包含新断点的选项。将异常（Exception）弹出菜单设置为 `Objective-C`，并确保中断（Break）弹出菜单设置为抛出时（On\
  \ Throw），然后点击完成（Done）。  \n\n现在，我们有了一个断点，它会在任何抛出的 Objective-C 异常处停止 Xcode。完美！通过从菜单中选择\
  \ **Product** ![image](img/arrow.jpg) **Run** 重新启动 `ExceptionCity` 应用程序，如果它还在运行，先将其退出。这次，当应用程序遇到有问题的代码时，它会在异常抛出的地方暂停执行。图\
  \ 13-2 大致展示了此时 Xcode 的样子。  \n\n![9781430245421_Fig13-02.jpg](img/9781430245421_Fig13-02.jpg)\
  \  \n\n图 13-2.  Xcode 在断点处停止  \n\n左侧的导航面板切换为调试导航器（Debug Navigator），并显示调用堆栈，顶部是我们断点的位置（一个名为\
  \ `objc_exception_throw` 的函数，这是 Xcode 实际放置异常断点的地方），下方是所有调用者。注意，我们有源代码可用的帧以黑色文本呈现，而那些停留在闭源库中的帧则以灰色文本显示。灰色的帧仍然可以访问，但只能以汇编语言的形式。我们还可以通过查看左侧的帧编号序列发现，并非所有帧都显示出来。默认情况下，Xcode\
  \ 仅显示我们有源代码的帧，而其他帧被压缩成水平虚线。我们可以使用调试导航器底部的水平滑块来改变这一点，根据需要让 Xcode 显示更多或更少的帧。  \n\n\
  项目窗口底部是调试区（Debug Area），分为两部分。左侧显示所有可用的变量和寄存器值，我们可以立即看到一些简单的值。右侧显示 `lldb` 控制台界面，我们可以在那里查看程序的输出（由\
  \ `NSLog` 等生成），并在 `lldb` 提示符下输入命令。如果你看不到底部视图，可以通过从菜单中选择 **View** ![image](img/arrow.jpg)\
  \ **Debug Area** ![image](img/arrow.jpg) **Activate Console** 来使其显示。  \n\n主编辑器视图显示所选堆栈帧的源代码或编译后的汇编代码，并用一个箭头和高亮标出其停止的行。\
  \  \n\n此时，在异常被抛出的那一刻暂停下来，看看这个异常是什么会很有趣。但怎么做呢？当 Xcode 暂停时，它会指向包含我们源代码的最顶层堆栈帧。那是我们程序中问题所在的位置，但我们无法在那里“看到”异常。也就是说，从那里我们无法通过局部变量或任何全局可用的结构来查看异常本身。\
  \  \n\n相反，我们需要关注程序真正停止的最顶层堆栈帧，即 `objc_exception_throw` 函数。点击它来看看情况。它应该看起来像图 13-3。\
  \  \n\n![9781430245421_Fig13-03.jpg](img/9781430245421_Fig13-03.jpg)  \n\n图 13-3.\
  \  源代码？谁需要它！  \n\n我们看到的只是一堆汇编代码，没有任何变量名或其他东西来指引我们。幸运的是，有一种调用约定我们可以利用。  \n\n在针对 Mac\
  \ OS X（在 64 位 Intel 硬件上）编译的代码中，任何函数的返回值都临时存储在一个名为 `rax` 的 CPU 寄存器中，在 `lldb` 中可以通过一个名为\
  \ `$rax` 的特殊变量访问。当我们的程序在 `objc_exception_throw` 函数中暂停时，`$rax` 寄存器恰好包含了新的异常，所以我们都准备好了！`lldb`\
  \ 调试器包含 `po` 命令，用于以可读格式打印对象的值（它实际做的是调用该对象的 `description` 方法，该方法返回一个 `NSString`，然后打印该字符串值）。在\
  \ `lldb` 提示符下试试这个：  \n\n```  \n(lldb) po $rax  \n$1 = 4296302928 -[__NSCFNumber\
  \ length]: unrecognized selector sent to instance 0x387  \n```  \n\n看起来眼熟吗？这基本上就是我们在之前输出中看到的相同文本。知道我们在这里可以访问到\
  \ `NSException` 后，我们可以利用 `lldb` 的实时 Objective-C 方法执行来询问更多信息：  \n\n```  \n(lldb)\
  \ po [$rax name]  \n$2 = 0x00007fff783e0a30 NSInvalidArgumentException  \n(lldb)\
  \ po [$rax reason]  \n$3 = 0x0000000100136650 -[__NSCFNumber length]: unrecognized\
  \ selector sent to instance 0x387  \n```  \n\n这里我们看到 `reason` 方法的返回值与 `description`\
  \ 的返回值相同，但 `name` 方法返回了名称，你可能记得它通常被用作异常的类型或类别。在这个例子中，我们正在查看 Cocoa 中最常遇到的异常类型之一：`NSInvalidArgumentException`。\
  \  \n\n`NSInvalidArgumentException`  \n\n理论上，任何判断其参数在某些方面无效的方法都可能引发此异常。实际上，大多数 Cocoa\
  \ 开发者在某个时候会遇到两种典型情况，而我们刚刚遇到了第一种。回想一下，我们的代码遍历数组中的所有元素，并尝试对每个元素调用 `length` 方法，如下所示：\
  \  \n\n```  \nfor (NSString *component in nameComponents) {  \n    nameComponentLength\
  \ += [component length];  \n}  \n```  \n\n在这种情况下，问题出现在尝试对一个没有 `length` 方法的对象调用 `length`\
  \ 时。我们的代码尝试对 `NSCFNumber`（`NSNumber` 的一个具体子类，当我们以通常方式创建 `NSNumber` 时会用到它）调用 `length`\
  \ 方法，而该类没有实现该方法，所有这些我们都可以从异常的 `reason` 中合理推断出来。我们可以现在吹毛求疵地抱怨苹果确实应该在这里使用一个不同的异常名称，以便清楚地告诉我们异常与某个方法名称有关，但这似乎是我们目前只能接受的现实。\
  \  \n\n无论如何，我们可以通过使用 Xcode 中的图形调试器进一步探索。在显示调用堆栈的表格中，点击标记为“*-[ECAppDelegate invalidArgumentException_unrecognizedSelector]*”的行，切换回异常抛出之前执行的最后一段代码。编辑器面板切换回相关的源代码文件，变量视图现在显示了在程序该点上我们可以访问的变量（参见图\
  \ 13-4）。  \n\n![9781430245421_Fig13-04.jpg](img/9781430245421_Fig13-04.jpg)  \n\n\
  图 13-4.  在调用堆栈中选择不同的条目，可以让我们访问正在运行程序的不同部分。注意，底部的命令行界面显示了在调用堆栈顶层（`objc_exception_throw`\
  \ 内部）执行的命令。如果我们在当前堆栈帧聚焦时输入相同的命令，`$rax` 将有不同的值  \n\n根据我们获得的关于异常以及触发异常的代码部分的信息，我们应该能够找出问题所在。我们甚至可以通过输入\
  \ `po component` 来打印 `for` 循环当前正在查看的对象的摘要信息，从而进一步检查程序的当前状态。\n\n\n\n我们还可以利用左下角的变量视图来查看当前可用的变量。例如，点击\
  \ `nameComponents` 变量旁的展开三角形，查看其内容。在本例中，结构非常简单：我们的数组包含一个 `NSNumber`，而它没有 `length`\
  \ 方法。\n\n此时，我们需要决定如何修复这个问题。我们仍希望实现同一个基本算法：累加每个组件中字符串的长度；我们只需确保将 `NSNumber` 的值（此处为\
  \ `3`）转换为字符串（`@\"3\"`）。这时可以使用 `description` 方法，该方法定义在 `NSObject` 上，因此所有 Cocoa 对象都可使用。顺便提一下，当你使用\
  \ `po` 命令查看对象值时，lldb 调用的正是 `description` 方法。对于大多数类，调用 `description` 会得到由 `NSObject`\
  \ 实现定义的结果（通常类似 `<NameOfObjectClass: 0x10cdb0>`），但某些类（如 `NSString` 和 `NSNumber`）会重写该方法以返回其他内容。`NSString`\
  \ 的实现直接返回自身，而 `NSNumber` 的实现则将数值转换为 `NSString` 并返回。\n\n因此，为了让程序正常工作，请修改 `invalidArgumentException_unrecognizedSelector`\
  \ 方法，将 `for` 循环内的那一行改为以下内容：\n\n```\nnameComponentLength += [[component description]\
  \ length];\n```\n\n由于我们知道 `NSObject`（以及所有对象）都实现了 `description` 方法并返回一个字符串，因此这个调用现在总能成功。即使有人混入了其他类型的对象，无法像\
  \ `NSString` 和 `NSNumber` 那样返回简洁紧凑的结果，至少我们知道这个方法是存在的，并且会被调用！\n\n完成修改后，重新运行应用，查看\
  \ Xcode 输出控制台显示的内容。\n\n```\n2013-02-10 23:51:08.291 ExceptionCity[71675:303] Total\
  \ length of all name components: 15\n(lldb)\n```\n\n哎呀，又出错了！我们的应用执行了一些代码，触发了另一个异常。由于我们已经设置了异常断点，程序就此暂停，并返回到\
  \ lldb 提示符。和之前一样，在调试导航器中选择顶层栈帧（`objc_exception_throw`），然后再次在 lldb 提示符下输入一些命令，获取异常的相关信息：\n\
  \n```\n(lldb) po $rax\n$0 = 4327021824 *** -[__NSArrayM insertObject:atIndex:]:\
  \ object cannot be nil\n(lldb) po [$rax name]\n$1 = 0x00007fff783e0a30 NSInvalidArgumentException\n\
  ```\n\n如果我们沿着调用栈向下查看，寻找第一个显示为黑色而非灰色的位置，会发现 `-[ECAppDelegate invalidArgumentException_insertNil]`，这正是触发异常的那段代码所在位置。点击该行，代码编辑器窗口会高亮显示\
  \ `invalidArgumentException_insertNil` 中的这一行：\n\n```\n[array addObject:object2];\n\
  ```\n\n查看该行上方的代码，问题出现了：`object2` 是一个指向 `nil` 的指针，而 `NSMutableArray` 不允许我们向其中插入 `nil`。在复杂的应用中，你可能需要追踪根本原因（空指针从何而来？`nil`\
  \ 对该变量而言是否是有效值？），但在本例中，我们只需在添加对象前添加一项安全检查即可解决该问题，如下所示：\n\n```\nif (object2 != nil)\
  \ {\n    [array addObject:object2];\n}\n```\n\n这样就解决了问题。`NSInvalidArgumentException`\
  \ 是 Cocoa 中最常遇到的异常之一，而刚才我们见到的正是触发它的两种最常见情况：对未实现该方法的类调用方法，以及试图向数组中插入 `nil`。\n\n再次运行应用，准备迎接下一个问题。\n\
  \n### NSRangeException\n\n之前的异常已经解决，但看看现在发生了什么：\n\n```\n2009-09-16 23:44:33.038\
  \ ExceptionCity[8881:10b] Total length of all name components: 15\n2009-09-16 23:44:33.065\
  \ ExceptionCity[8881:10b] inserted all the objects I could!\n2009-09-16 23:44:33.066\
  \ ExceptionCity[8881:10b] found indexed item two\n2009-09-16 23:44:33.066 ExceptionCity[8881:10b]\
  \ *** -[NSCFArray objectAtIndex:]: index (2137483647( or possibly larger)) beyond\
  \ bounds (3)\n2013-02-10 23:57:55.575 ExceptionCity[71731:303] Total length of all\
  \ name components: 15\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] inserted\
  \ all the objects I could!\n2013-02-10 23:57:55.576 ExceptionCity[71731:303] found\
  \ indexed item two\n(lldb)\n```\n\n由于又一个异常，程序再次暂停。和之前一样，在调试导航器中点击 `objc_exception_throw`\
  \ 行，检查异常以找出问题。\n\n```\n(lldb) po $rax\n$0 = 4300330528 *** -[__NSArrayI objectAtIndex:]:\
  \ index 9223372036854775807 beyond bounds [0 .. 2]\n(lldb) po [$rax name]\n$1 =\
  \ 0x00007fff783e0a10 NSRangeException\n```\n\n天哪！这个索引值可真大。现在查看调用栈，点击我们代码中最高层的项目：`-[ECAppDelegate\
  \ rangeException]`。这将高亮显示文本编辑器中的以下行：\n\n```\nNSLog(@\"found indexed item %@\", array[indexOfFive]);\n\
  ```\n\n这一行实际上调用了两个方法：首先是 `objectAtIndex:` 方法（内含于 Apple 从 Xcode 4.5 开始引入的新 Objective-C\
  \ 数组访问器语法中），然后调用 `NSLog` 函数。快速查看调用栈可以发现，`objectAtIndex:` 方法正在报错。显然，它不喜欢 `indexOfFive`\
  \ 中包含的值。如果我们在变量视图中查看，或者输入 `p indexOfFive`（注意对标准 C 类型使用 `p`，而对 Objective-C 对象使用 `po`），将会看到\
  \ `9223372036854775807`。这个值确实有点大！如果查看设置该值的代码（就在上面两行），我们会看到这样一行：\n\n```\nNSUInteger\
  \ indexOfFive = [array indexOfObject:@\"five\"];\n```\n\n这行代码向 `array` 询问一个它实际上并不包含的对象的索引。在这种情况下，`NSArray`\
  \ 会返回一个名为 `NSNotFound` 的特殊整数值，它被定义为可能的最大整数值。在 64 位模式下运行的 Mac OS X 上，该值就是 `9223372036854775807`。这个值用于告知调用者：“嘿，你想查找索引的那个对象？我这里没有。”了解这一点非常有用！这意味着，每当我们从\
  \ `indexOfObject:` 获取结果时，都必须检查它是否是 `NSNotFound`。在本例中，我们确切地知道问题出在哪里，因此可以直接检查第二次调用，但养成始终检查返回值的习惯是件好事，所以我们将整个方法更新如下：\n\
  \n```\n- (void)rangeException {\n    // 假设我们有一个数组...\n    NSArray *array = @[@\"\
  one\", @\"two\", @\"three\"];\n\n    // ... 我们可以询问某个项目的索引...\n    NSUInteger indexOfTwo\
  \ = [array indexOfObject:@\"two\"];\n\n    if (indexOfTwo != NSNotFound) {\n   \
  \     // ... 之后我们可以使用相同的索引检索该值。\n        NSLog(@\"found indexed item %@\", array[indexOfTwo]);\n\
  \    }\n\n    // 但是，如果我们尝试查找不存在的对象的索引会怎样？\n    NSUInteger indexOfFive = [array indexOfObject:@\"\
  five\"];\n\n    if (indexOfFive != NSNotFound) {\n        // 并且我们忘记检查返回值以确保它不是 NSNotFound？\n\
  \        NSLog(@\"found indexed item %@\", array[indexOfFive]);\n    }\n}\n```\n\
  \n完成这些修改，运行应用，然后注意到祝贺弹窗的奖励。哦，甜蜜的成功！\n\n解决了这些问题后，我们已经经历并修复了每个 Cocoa 程序员在某个阶段都会遇到的主要运行时异常类型。仅此而已！\n\
  \n\n\n对于来自其他异常处理更频繁的开发环境的人来说，这可能令人惊讶，但正如我们所说，在 Cocoa 中，异常很少使用，而且几乎总是用于表示程序员犯了错误。`NSRangeException`\
  \ 和 `NSInvalidArgumentException`（针对上述两种原因）实际上构成了你可能遇到的大部分异常。\n\n## 其余异常\n\n好吧，Cocoa\
  \ 应用中可能引发的异常不止这些。例如，`NSException.h` 中定义了更多预定义的异常名称，但你很可能不会遇到它们。`NSGenericException`\
  \ 有时会在使用 SQLite 或 Apple Events 时出现，而如果你重写了本不该重写的方法（例如文档警告你不要这样做的时候），`NSInternalInconsistencyException`\
  \ 极少情况下会露出其狰狞面目，但在实际开发中，这些情况确实很难遇到。\n\n你可能会看到异常发生的一个场景是使用 Apple 的分布式对象技术，该技术使用异常的方式比\
  \ Cocoa 的其他部分要宽松得多。例如，如果 DO 失去了与它所连接的进程的连接，它会引发异常来警告你。事实上，Cocoa 定义的大多数预定义异常名称都是专门给\
  \ DO 使用的。本书中不介绍 DO 的使用，所以我们不会对这些异常多做阐述，但了解一下是有好处的，以防你将来某天用到它。\n\n## 比异常更糟：信号致死\n\
  \n现在我们已经了解了如何通过代码级操作（如捕获异常）来处理一些错误，接下来我们来看看由于对象指针使用不当而引发的另一种问题。在 Cocoa 中，每个 Objective-C\
  \ 对象都是通过一个指向特定 C 结构体的指针来引用的，该结构体定义了 Objective-C 对象的基本结构。如果该指针指向的要么不是包含有效对象的一块内存，要么不是\
  \ nil，那么几乎必然会发生某种形式的内存访问错误，导致产生一个*信号*，最终杀死我们的应用。\n\nCocoa 程序员无意中导致信号杀死应用的方式有两种。第一种是尝试向一个未初始化的对象指针发送消息。默认情况下，当我们在\
  \ Objective-C 方法中将一个新指针声明为局部变量时，我们不能指望它会自动指向 nil 或其他无害的东西。实际上，我们常常发现它指向的完全是些不合适的东西，比如一个甚至没有映射到系统中的内存地址（实例变量、静态局部变量和全局变量则不同，它们实际上会被初始化为\
  \ nil 值）。\n\n很难故意用一个未初始化的指针来触发这种行为，因为这种指针有可能恰好包含一个零值，而零值就是 nil，nil 当然是一个有效的消息接收者。不过，我们可以人为地模拟这种情况，通过在应用委托中添加以下方法：\n\
  ```\n- (void)uninitializedObject {\n    NSMutableString *string = (__bridge NSMutableString\
  \ *)(void *)0xdeadbeef;\n    [string appendFormat:@\"foo\"];\n}\n```\n因为我们使用的是 ARC，它对这些事情非常敏感，我们必须绕一些弯路才能把垃圾数据真正放入我们的指针中，先将其强制转换为\
  \ `void*`，然后再转换为 `NSMutableString*`。添加 `__bridge` 限定符告诉编译器忽略此赋值的内存管理含义。\n\n现在我们有了一个指向垃圾内存位置的\
  \ `NSMutableString` 指针。所以当它尝试调用 `appendFormat:` 方法时，接收者不是一个有效的对象，这会导致问题。要查看效果，请在\
  \ `applicationDidFinishLaunching:` 方法中添加这行代码：\n```\n[self uninitializedObject];\n\
  ```\n运行应用，然后观察。\n\n程序将停止，并显示类似于 图 13-5 的内容。\n\n![9781430245421_Fig13-05.jpg](img/9781430245421_Fig13-05.jpg)\n\
  \n图 13-5 . 程序在收到信号时停止\n\n根据这个垃圾指针具体指向什么，你可能会看到不同的信号名称，例如 `SIGSEGV` 或 `SIGILL`。更糟糕的是，它甚至可能指向我们程序中的其他有效对象，也许恰好是一个\
  \ `NSMutableString`，这使得追踪变得异常困难。具体细节其实并不重要；关键在于我们遇到了一个未初始化的指针（或者在此特定演示案例中，是一个指向错误内存位置的指针）。这个问题可以通过应用一条通用规则轻松解决：无论何时你在一个方法内部声明一个\
  \ Objective-C 对象指针，都要立刻给它赋值，即使只是 nil 也行。\n\n所以，通过将字符串声明行修改为以下内容来修复此问题：\n```\nNSMutableString\
  \ *string = nil;\n```\n构建并运行应用，一切顺利。在 Objective-C 中向 nil 指针发送消息是完全安全的（这基本上是一个空操作，并且向\
  \ nil 发送消息的返回值通常是 nil、0 或 NO），所以，虽然修复后的方法实际上不会*做*任何事情，但也不会导致崩溃。\n\n现在，还有一个需要在这里提及的内存问题来源：向一个已经被释放的对象发送消息。在本书中，我们为创建的每个应用都使用了\
  \ ARC，这几乎完全消除了这种类型的错误，但如果你将来某个时候在一个使用手动引用计数（使用 retain 和 release）的项目中工作，了解是什么导致了这类问题是很有好处的。\n\
  \n没有 ARC，Objective-C 对象的内存管理通过手动引用计数来处理。长话短说：任何时候我们使用 `alloc` 或 `copy` 方法创建一个对象，或者通过向对象发送\
  \ `retain` 消息将其标记为“正在使用”，它的引用计数就会增加。我们必须在某个时候（当我们使用完该对象后）向该对象发送 `release` 或 `autorelease`\
  \ 消息，两者都会减少其引用计数。当引用计数降至零时，该对象就会被释放。\n\n当我们使用 ARC 时，相同的 `retain` 和 `release` 调用会被内置到我们的应用中，但不是由我们将其写入源代码，而是由编译器为我们完成。事实证明，计算机在始终如一地遵守\
  \ `retain`/`release` 规则方面比我们做得更好！\n\n如果我们不使用 ARC，可能出现的问题是，如果我们没有正确执行这些操作，我们最终可能会陷入这样的境地：一个变量包含一个指向内存空间的指针，该内存空间曾经被一个“存活”的对象占据，但现在可能包含一个已释放的对象，或者可能已被用于其他目的。ARC\
  \ 在处理这个问题上非常出色，以至于在启用 ARC 的情况下很难构造出出现这种情况的场景。因此，为了进行下一个演示，让我们暂时关闭 ARC。为此，在项目导航器中选择顶层的\
  \ *ExceptionCity* 项目，然后选择“构建设置”标签。使用顶部的搜索字段搜索“automatic”，然后关闭 *Objective-C Automatic\
  \ Reference Counting*。图 13-6 显示了操作界面。\n\n![9781430245421_Fig13-06.jpg](img/9781430245421_Fig13-06.jpg)\n\
  \n图 13-6 . 摆弄构建设置。你应该知道你想这么做\n\n现在，在应用委托类中添加以下方法。这展示了一种简化版的不良行为，这种行为在 ARC 出现之前可能会给我们带来麻烦。\n\
  ```\n- (void)freedObject {\n    NSString *object = [[NSString alloc] initWithCString:\"\
  hi there\"\n                                                encoding:NSUTF8StringEncoding];\n\
  \    [object release];\n    NSLog(@\"Where is my object?\n```\n\n\n一个高级文档工程师接手了以下文本，并进行排版。\n\
  \n---\n\n然后添加一行`[self freedObject];`到`applicationDidFinishLaunching:`方法中，运行 App，观察结果。程序将停止并显示类似图\
  \ 13-7 的内容。\n\n![9781430245421_Fig13-07.jpg](img/9781430245421_Fig13-07.jpg)\n\n\
  图 13-7 中绿色条表示程序停止的位置。这不太有用！幸好我们还有其他栈帧可以查看。\n\n与之前的信号生成 bug 一样，程序可能会收到与此处所示不同的信号，但它肯定会收到某个信号。如果我们查看调用栈中顶层包含我们代码的栈帧，会发现其中同时包含了我们的`freedObject`方法和它正在调用的`NSLog`函数。\n\
  \n与前一个案例一样，修复方法在于自律：每当我们向某个对象发送`release`或`autorelease`消息时，如果变量中仍持有指向该对象的指针，应立即将该变量指向`nil`！发送`release`或`autorelease`不一定总会立即释放对象（因为其他代码可能也增加了它的引用计数），但在每个方法内部，我们应将已释放的对象视为禁区，并尽快清除所有指向它的悬垂指针。\n\
  \n在这种情况下，解决方案是在`[object release];`行后面添加以下代码：\n\n```\nobject = nil;\n```\n\n添加该行后，再次运行\
  \ App，一切恢复正常！再次提醒，这种类型的 bug 只会在未使用 ARC 的情况下发生。并且，除了释放对象后将指针设为`nil`这一相对简单的经验法则外，非\
  \ ARC 应用还可能因其他方式陷入类似情况，例如忘记保留稍后要使用的对象。这些 bug 可能是一些最难追踪的问题，这也是尽可能使用 ARC 的最有力理由之一。\n\
  \n在继续之前，我们需要在项目中重新启用 ARC。再次选择项目导航器中的顶级项目项，在“构建设置”选项卡中找到`Objective-C Automatic Reference\
  \ Counting`，并将其开启。此外，由于 ARC 不允许我们显式调用`release`，我们需要从 App 委托的`freedObject`方法中删除`[object\
  \ release];`这一行。\n\n## `NSError`\n\n现在您知道，Cocoa 中的异常通常不用于流程控制，而是主要用于指出 bug。如今使用的一些其他语言和框架，会将异常用于各类非\
  \ bug，但可能是开发者无法直接控制条件的副作用，例如尝试访问文件时的文件相关错误，或尝试从套接字读取数据时的网络错误。在 Cocoa 中，这类情况通常使用一个名为`NSError`的类来处理。在本节中，我们将学习`NSError`对象的内容、导致其创建的情况以及如何在代码中处理它，包括赋予应用程序重试某些触发错误的操作的能力。\n\
  \n### 域和代码\n\n传统上，每个操作系统都有自己的系统错误报告方式，通常提供一个整数值，我们可以将其与头文件中的预定义列表进行比较，以确定如何应对。例如，在基于\
  \ UNIX 的系统中，我们可以在每次系统调用（包括打开文件、读取文件、写入文件等函数）后检查`errno`的值（`errno`是一个全局变量，或一个调用函数的符号，这取决于我们在此不展开讨论的多个因素）。其理念是，如果任何系统函数遇到问题，它会将一个整数值放入`errno`，以告知我们错误的性质。\n\
  \n在“经典 Mac OS”编程（OS X 之前的所有产品）中，情况略有不同。许多系统函数不填充全局变量，而是返回一个`OSStatus`类型，这同样归结为一个整数，我们应在每次调用函数后检查它，以确保没有发生意外。\n\
  \nOS X 是一种混合操作系统。其底层深深植根于 UNIX，并且如您所知，它包含了构成 Cocoa 的所有 Objective-C 框架。它还包含 Carbon，这是一套从旧版\
  \ Mac OS 改编而来的大型 API 和技术。此外，还有为 OS X 和 iOS 完全用 C 编写的现代 API。每个“世界”都包含一个或多个需要用某种方式报告错误代码的函数或方法，并且由于这些世界是分别发展的，错误代码集之间当然存在一些重叠。在某个时候，Apple\
  \ 意识到用统一方式处理来自这些不同世界的错误消息可能有益，让它们各自继续使用它们一直使用的相同错误代码（确保与现有软件的二进制兼容性），同时通过用字符串为每个错误标记其域来避免混淆风险。\n\
  \n这正是我们在`NSError`类中拥有的内容，它基本上将系统级错误代码封装在一个 Objective-C 对象中。每个`NSError`实例都有一个`NSString`来指定其“域”的名称（通常，它来自哪个库或框架），一个整数来指定相关的错误代码，以及一个可选的`NSDictionary`，其中可以包含关于该错误的附加信息。由于这些是普通的\
  \ Objective-C 对象，它们可以像任何其他对象一样被处理：传递、放入`NSArray`等。\n\nCocoa 包含一些预定义的字符串常量，用于对 Cocoa\
  \ 框架中`NSError`对象的主要来源进行分类。作为 Cocoa 程序员，您最可能遇到的域如下：\n\n* `NSPOSIXErrorDomain`：UNIX\
  \ 错误（属于 POSIX 标准一部分的错误）。\n* `NSOSStatusErrorDomain`：来自 Carbon 函数的错误（这些函数通常返回`OSStatus`）。\n\
  * `NSCocoaErrorDomain`：直接来自 Cocoa 自身类的错误。\n\n每当一个 Cocoa 方法给我们一个`NSError`时，它的域很可能是这些之一。如果您开始在代码中创建自己的`NSError`实例，您可能希望定义自己的域和错误代码，以便在应用程序中更容易处理它们。\n\
  \n每个预定义的错误域都有一个相关的错误代码列表，定义在一个或多个头文件中。适用于`NSPOSIXErrorDomain`的错误代码在`errno.h`中。`NSOSStatusErrorDomain`的错误代码在`MacErrors.h`中；`NSCocoaErrorDomain`使用的错误代码包含在`FoundationErrors.h`、`AppKitErrors.h`和`CoreDataErrors.h`中。在\
  \ Xcode 中，通过调出“快速打开”窗口（![images](img/arrow7.jpg) O）并输入文件名，可以轻松找到这些头文件。\n\n### 识别错误\n\
  \n现在我们了解了`NSError`类的一些知识。但是，`NSError`实例从哪里来，以及它们在应用程序运行时如何影响应用程序？与异常不同，`NSError`对象不会对代码流程做出任何改变。通常，`NSError`实例通过方法调用返回给我们，不是作为返回值，而是通过引用我们传入的一个指针。这种参数弄巧成拙的方式在\
  \ C 中并不罕见，但在 Objective-C 中相当不常见。其理念是，一个容易出错的方法应该接收一个指向`NSError`指针的指针作为参数。这意味着我们不传入一个指向`NSError`的指针，而是一个指向指针的指针（我们指针的地址），以便接收方法可以创建一个`NSError`实例并将我们的指针指向它！（这听起来可能令人困惑，但一旦您看到这个模式，事情就会变得清晰。）\n\
  \n\n\n以`NSFileManager`类为例。文件管理器允许我们执行某些磁盘操作，例如创建目录、访问文件属性等。它有一个方法，其签名如下所示：\n\n```\n\
  - (NSDictionary *)attributesOfItemAtPath:(NSString *)path error:(NSError **)error\n\
  ```\n\n我们可以使用此方法获取一个字典，该字典包含`path`参数指定的文件或目录的大量相关文件系统信息。注意第二个参数`error`的类型是`NSError**`，这意味着我们传入一个指向可以指向`NSError`对象的变量的指针。如果该方法确实遇到错误情况，它将创建一个`NSError`对象，并将其地址存储在`error`指定的位置。如果我们想忽略此类方法产生的任何错误，可以传入特殊的`NULL`指针作为最后一个参数。\n\
  \n下面的方法展示了从调用者角度看这看起来是什么样的。我们创建一个用于指向`NSError`对象的变量，并将其初始化为指向`nil`。然后，我们将该变量的地址传递给一个可能产生错误的方法，之后检查该变量，看它是否仍然指向`nil`。如果不是，我们知道该方法遇到了错误，并请求应用程序向用户呈现该错误。\n\
  \n```\n- (void)fileError {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
  \    \n    // 声明一个变量并将其指向 nil\n    NSError *fileError = nil;\n    \n    // 将 fileError\
  \ 变量的地址传递给该方法\n    NSDictionary *attributes = [fileManager\n                   \
  \             attributesOfItemAtPath:@\"/tmp\" error:&fileError];\n    \n    //\
  \ 检查前一个方法调用是否给了我们一个 NSError\n    if (fileError == nil) {\n        // 显示属性\n    \
  \    NSRunAlertPanel(@\"Found file attributes\",\n                        [attributes\
  \ description], nil, nil, nil);\n    } else {\n        // 报告错误\n        [NSApp presentError:fileError];\n\
  \    }\n}\n```\n\n为简单起见，在探索`NSError`时，我们将继续构建我们正在使用的项目。将前面显示的`fileError`方法添加到应用程序委托类中，并在`applicationDidFinishLaunching:`方法中添加一行`[self\
  \ fileError];`。运行应用程序，我们将看到类似 Figure 13-8 中所示的警告面板。\n\n![9781430245421_Fig13-08.jpg](img/9781430245421_Fig13-08.jpg)\n\
  \nFigure 13-8 . 没有错误！\n\n现在返回并编辑`fileManager`调用，将字符串参数从`@\"/tmp\"`更改为`@\"/tmpfoo\"\
  `或某个其他不存在的路径。这将导致`fileManager`遇到错误并将其返回给我们，存储在传入地址的`fileError`变量中。它将注意到此错误并将其传递给`NSApp`，从而产生\
  \ Figure 12-5 中所示的警告面板。\n\n![9781430245421_Fig13-09.jpg](img/9781430245421_Fig13-09.jpg)\n\
  \nFigure 13-9 . 出现错误了\n\n这没问题，但看看那个警告面板中的文字：“*文件“tmpfoo”无法打开，因为没有这样的文件。*”这是否看起来有点……不够技术性？我们不是习惯于在计算机系统中使用更专业、更行话的语言吗？毕竟，这个错误是由一个低级系统例程触发的，它只报告了一个错误号，没有其他信息。那段文字是从哪里来的？\n\
  \n事实证明，`NSError`有一个名为`localizedDescription`的方法，它为我们提供了对错误的一个很好的、人类可读的解释。这个描述最终由`reportError:`方法显示出来。\n\
  \n让我们通过使用调试器来进一步探索一下。\n\n在 Xcode 中，通过单击文本编辑器中该行左侧的装订线（显示行号的空间），在包含`[NSApp presentError:fileError]`的行上设置一个断点。这是在我们的代码中设置断点的最直接方法。然后再次运行应用程序。应用程序将在选定行处暂停，在输出控制台中留下`lldb`提示符。让我们深入挖掘一下，通过在`lldb`提示符下执行命令来询问错误的域和错误代码：\n\
  \n```\n (lldb) po [fileError domain]\n $0 = 0x00007fff7cdab110 NSCocoaErrorDomain\n\
  \ (lldb) p (int)[fileError code]\n (int) $1 = 260\n (lldb) po [fileError localizedDescription]\n\
  \ $2 = 0x0000000102327470 The file \"tmpfoo\" couldn't be opened because there is\
  \ no such file.\n```\n\n注意我们可以使用`po`命令打印`NSString`的值，使用`p`命令打印任何基本 C 类型的值。通常在使用`p`命令时，`lldb`会抱怨它不知道我们试图显示的值的类型，所以我们在方法调用前放一个小的`(int)`，告诉`lldb`期望什么。\n\
  \n现在我们知道了错误代码和域。快速查看`FoundationErrors.h`会发现以下信息：\n\n```\nNSFileReadNoSuchFileError\
  \ = 260,    // Read error (no such file)\n```\n\n这仍然可能让你想知道这一切是如何结合在一起的。回想一下，当你创建一个`NSError`时，你需要指定一个域、一个代码，以及一个可选地包含附加信息的字典。这个字典是谜题的关键部分。如果你传递给这个方法的字典对于键`@\"\
  NSLocalizedDescriptionKey\"`有一个值，那么无论何时调用`localizedDescription`，都会返回该值。\n\n那么，让我们看看`userInfo`字典包含什么。\n\
  \n```\n(lldb) po [fileError userInfo]\n$3 = 0x0000000102118850 {\n    NSFilePath\
  \ = \"/tmpfoo\";\n    NSUnderlyingError = \"Error Domain=NSPOSIXErrorDomain Code=2\
  \ \\\"The operation couldn\\U2019t be completed. No such file or directory\\\"\"\
  ;\n}\n```\n\n嗯，显然这不是答案。`userInfo`字典没有指定本地化的描述，但它确实包含了一些其他东西：我们试图访问的文件的路径，以及看起来像是另一个`NSError`的内容。一个错误包裹在另一个错误里面！让我们看看内部那个错误的`domain`、`code`、`userInfo`和`localizedError`是什么样的。我们从另一个`lldb`命令`expression`开始，它只是执行行上的其余语句，就像它们是源代码一样，但不像`po`或`p`命令那样打印结果。在这种情况下，我们将内部错误对象的地址分配给一个我们称为`$inner`的新变量。这是`lldb`的一个很好的特性，允许我们保留执行的查询结果，让值保留下来，并在以后节省一些输入工作。我们将从`fileError`中获取`userInfo`字典，然后立即使用\
  \ Objective-C 的新字典查找语法来访问底层错误。\n\n```\n(lldb) expression id $inner = [fileError\
  \ userInfo][@\"NSUnderlyingError\"]\n(lldb) po $inner\n$inner = 0x000000010210a9e0\
  \ Error Domain=NSPOSIXErrorDomain Code=2 \"The operation couldn't be completed.\
  \ No such file or directory\"\n```\n\n将对象的地址分配给新变量后，使用`po`命令查看新变量的地址及其内容，即它指向的对象。从现在开始，我们可以将那个内部错误简称为`$inner`，就像这样：\n\
  \n```\n (lldb) po [$inner domain]\n $9 = 0x00007fff7cdab0b0 NSPOSIXErrorDomain\n\
  \ (lldb) p (int)[$inner code]\n (int) $10 = 2\n (lldb) po [$inner userInfo]\n $11\
  \ = 0x00000001001039d0 { }\n (lldb) po [$inner localizedDescription]\n $12 = 0x000000010011d2c0\
  \ The operation couldn't be completed. No such file or directory\n```\n\n这给我们带来了又一个谜题。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n## 当我们查看一个根本没有 `userInfo`\
  \ 字典的根本性错误时，它仍然会提供一个人类可读的 `localizedDescription`，而这仅通过查看域和代码是无法直接看出的。实际上，我们可以像这样创建自己的内部和外部错误：\n\
  \n```\nNSError *innerError = [NSError errorWithDomain:NSPOSIXErrorDomain\n     \
  \                                     code:2 userInfo:nil];\nNSDictionary *outerInfo\
  \ = @{NSUnderlyingErrorKey: innerError,\n                            NSFilePathErrorKey:\
  \ @\"/tmpfoo\"};\nNSError *outerError = [NSError errorWithDomain:NSCocoaErrorDomain\n\
  \                                          code:260 userInfo:outerInfo];\n```\n\n\
  这些错误的行为将*完全*类似于由 `NSFileManager` 生成的错误，包括显示我们未在任何地方指定的人类可读文本！事实证明，这种魔法似乎源自 `NSError`\
  \ 类本身。它显然内置了足够多的关于 Cocoa 错误域和错误代码的具体知识，能够为程序可能遇到的许多错误生成有意义的句子。这意味着，通常情况下，由 Cocoa\
  \ 方法调用提供给我们的错误，无需经过美化即可直接展示给用户。\n\n## 展示错误\n\n既然如此，我们顺便来看看如何向用户展示错误？在这里，我们一直通过调用\
  \ `[NSApp presentError:e]` 来让应用程序显示一个模态窗口，但还有其他一些选择。实际上，`presentError:` 方法是在 `NSResponder`、`NSDocument`\
  \ 和 `NSDocumentController` 中实现的，这意味着只要发生错误，我们就可以将其传递给附近或最相关的对象，然后它会沿着一个类似于响应者链的责任链向上传递，直到某个对象实际显示该错误。这为以不同方式显示错误信息（例如使用文档模态工作表警告）提供了可能性。\n\
  \n## 总结\n\n我们现在已经了解了 Cocoa 应用程序处理各种“不愉快情况”的主要方式、如何避免一些常见错误，以及如何使用 `lldb` 来帮助追踪问题。我们还看到了方法如何利用\
  \ `NSError` 实例，以可控的方式处理问题。随着我们更深入地学习 Cocoa 编程，所有这些都将派上用场。\n\n## 第 14 章：Cocoa 中的绘图\n\
  \n到目前为止，我们已经学习了许多强大的 Cocoa 技术，用于处理数据、优化布局应用程序的类，以及使用 Cocoa 提供的各种屏幕控件和其他视图。现在是时候开始学习如何使用\
  \ Cocoa 来创建我们自己的视图类，从而完全控制文本和图形的显示了。Mac 应用程序通常以包含“视觉糖果”而闻名——这不仅是为了绘制不必要的图形装饰，也是为了为用户创造更沉浸式的交互体验。作为\
  \ Cocoa 程序员，我们可以使用的图形技术能够帮助我们以惊人的少量努力实现一些同样的效果。\n\n`Core Graphics` 提供了丰富的功能，用于渲染路径、操纵坐标系等等。`Core\
  \ Graphics` 的一个主要部分是一组名为 `Quartz` 的 API。事实上，`Quartz` 在 `Core Graphics` 中占据了如此重要的地位，以至于这两个术语有时可以互换使用。`Core\
  \ Animation` 则更进一步，让我们能够以极其简单的方式为视图添加动画。\n\n本章将介绍坐标系和向 `NSView` 实例绘图的一些基础知识，并演示如何通过将视图放入滚动视图中，来显示一个比窗口中可用空间更大的视图。它还将触及如何轻松地为我们的应用程序添加基本的打印支持。\n\
  \n## 基础概念\n\n在本节中，我们将介绍 Cocoa 绘图 API 中使用的一些基本概念。\n\n如果你有过任何类型的图形编程经验，那么对 Cocoa 中可用的绘图方式可能会相当熟悉。毕竟，计算机图形学的大部分基本概念在几十年前就已经定型了。Cocoa\
  \ 的突出之处在于其渲染的质量（包括文本和图形基元的抗锯齿功能）以及为更复杂概念提供的高级抽象能力。\n\n在本章中，我们将始终使用点（point）而不是像素（pixel）。Cocoa\
  \ 中的绘图通常是基于矢量且与分辨率无关的。随着高像素密度显示器（也称为 HiDPI 或 Retina 显示器）的出现，绘图模型中的一个点实际上可能由显示器上的一个或四个像素表示。在可能的情况下，最好让底层操作系统自行决定如何从绘图基元转换为实际像素。这样做的话，图像在高分辨率显示器上会自动看起来很棒。如果你在编写与像素相关的代码，那就不那么容易了，你需要担心点和像素之间的区别，以及如何适当地缩放位图。不过，现在我们只讨论点。\n\
  \n## 视图坐标系\n\nCocoa 的绘图系统使用 x-y 坐标系，默认情况下，原点 (0,0) 位于左下角，x 轴指向右方（值增大表示向右移动），y 轴指向上方（值增大表示在屏幕上向上移动）。这与数学中传统的图形绘制方式类似，但与许多其他计算机图形系统相反，在那些系统中\
  \ y 轴指向下方（值增大表示在屏幕上向下移动）。虽然在 Cocoa 中翻转 y 轴是可行的，有时也是可取的，但在我们的示例中不会这样做。\n\n绘图通常由 `NSView`\
  \ 子类的实例完成。视图存在于一个层次结构中。如果层次结构中最顶层的视图被设置为 `NSWindow` 的 *contentView*，那么该层次结构中的所有视图都会在该窗口内显示。窗口中的顶层视图（即\
  \ *contentView*）可以跨越窗口的整个区域进行绘制。对于层次结构中的其他所有视图，其绘图区域仅限于其框架（frame），即其父视图坐标系内的一个空间（参见\
  \ 图 14-1）。\n\n![9781430245421_Fig14-01.jpg](img/9781430245421_Fig14-01.jpg)\n\n\
  图 14-1. 一个简单的视图层次结构。窗口的 contentView 包含一个 NSBox，该 NSBox 又包含一个包含单选按钮的 NSMatrix\n\n\
  ## 框架矩形 vs. 边界矩形\n\n对于窗口中的每个视图，都有几个重要的矩形（通常称为 *rect*）定义了大量关于其绘图特性的信息：框架矩形和边界矩形。框架矩形简单地指定了视图在其父视图坐标系中的位置和大小。例如，想象一下窗口中的顶层视图。我们称它为\
  \ A。如果 A 有一个名为 B 的子视图，该子视图从点 (10,20) 延伸到点 (40,60)，那么 B 的框架矩形的原点为 (10,20)，大小为 (30,40)。\n\
  \n除了决定视图在其父视图中出现的位置和范围的框架外，每个视图还有一个边界矩形，它定义了其自身的内部坐标空间。例如，前面描述的视图 B 默认情况下会有一个边界矩形，其原点为\
  \ (0,0)，大小为 (30,40)。如果需要，我们可以轻松更改这一点。例如，假设我们有一堆点要绘制，其 x 和 y 值都在 0.0 到 10.0 之间。通过更改\
  \ B 的边界矩形，将其大小设置为 (10,10)，这些点将精确地填充 B 所占用的空间，无论 B 在屏幕上实际占用多大空间（参见 图 14-2）。\n\n![9781430245421_Fig14-02.jpg](img/9781430245421_Fig14-02.jpg)\n\
  \n图 14-2.\n\n\n\n## 图形绘制基础\n\n## 视图边界与坐标点\n\n在左侧，使用默认边界的视图绘制来自较窄范围的点。在右侧，相同点绘制在边界较小的视图中。\n\
  \n## 矩形、点和尺寸\n\n在 Cocoa 中，矩形由名为 `NSRect` 的 C 结构体表示，该结构体包含一个表示原点的 `NSPoint` 和一个表示大小的\
  \ `NSSize`。原点和大小各自包含两个 `CGFloat` 类型的值，`CGFloat` 是 Cocoa 绘图 API 中广泛使用的基本 C 类型；原点包含\
  \ `x` 和 `y`，大小包含 `width` 和 `height`。\n\n更令人困惑的是，Core Graphics 中的许多函数使用等效的结构体 `CGRect`、`CGPoint`\
  \ 和 `CGSize`，它们具有相同的结构布局，并且都由 `CGFloat` 元素组成。这种划分的历史原因并不特别有趣，只要我们不是在处理 32 位遗留应用程序，这些\
  \ C 结构体具有相同的布局，并可以通过内联函数（例如 `NSRectToCGRect`、`NSSizeFromCGSize` 等）来回转换，这些函数实际上不过是类型转换。在本章中，我们将主要使用\
  \ `NS` 前缀的版本。\n\n## 路径基础\n\nCocoa 的绘图机制包含路径的概念，路径可以包含任意数量的直线或曲线段。每个路径不必是连续的。我们可以在一个点“拿起笔”，然后在另一个点重新开始绘制。在实际绘制路径之前，我们可以指定线宽、颜色等值。这些设置将应用于路径的每个部分。由路径各部分勾勒出的任何形状也可以用单独的颜色或图案进行填充。\n\
  \n## 创建 `NSView` 子类\n\n让我们通过创建一个能够绘制非常开心的笑脸的应用程序来开始探索（参见图 14-3）。在 Xcode 中，创建一个名为\
  \ *MrSmiley* 的新 Cocoa 项目。我们将为 Mr Smiley 应用使用 `MS` 作为类前缀，并保持启用*自动引用计数*。\n\n![9781430245421_Fig14-03.jpg](img/9781430245421_Fig14-03.jpg)\n\
  \n图 14-3. Mr Smiley 非常非常开心\n\n现在创建一个新的 Objective-C 类，作为 `NSView` 的子类，并将其命名为 `MSSmileyView`。通过选择\
  \ **文件** ![image](img/arrow.jpg) **新建** ![image](img/arrow.jpg) **文件...**（**![images](img/arrow3.jpg)**-N），或右键单击\
  \ Xcode 窗口左侧的项目导航器窗格并选择弹出菜单中的 **新建文件...** 来完成此操作。Xcode 将为我们创建类的文件，包括 `MSSmileyView.m`，本节所有工作将在此文件中进行。\n\
  \n在开始编码之前，打开项目的 `MainMenu.xib` 文件。从*库*窗口中抓取一个自定义视图，并将其拖入默认创建的空白窗口中。使用*身份检查器*将视图的类更改为\
  \ *MSSmileyView*（在*自定义类*标题下），然后使用*大小检查器*将其宽度和高度更改为 100×100。最后，选择窗口并按 **![images](img/arrow3.jpg)-=**\
  \ 使窗口自动调整大小以完美适应视图。然后保存更改。\n\n## 基本绘制方法：`drawRect:`\n\n现在开始编写代码。Xcode 创建的 `MSSmileyView.m`\
  \ 文件包含一个空的 `drawRect:` 方法，我们将在此方法中开始编写代码。`drawRect:` 方法通常不会直接调用，除非我们在实现现有视图的子类时调用\
  \ `[super drawRect:rect]` 让父类完成其绘制工作。相反，当应用的主运行循环确定视图需要重绘时（通常在视图被创建或调整大小后，或者我们自己的代码在视图上调用了\
  \ `setNeedsDisplay:` 并传递 `YES` 作为参数），`drawRect:` 方法会被自动调用。\n\n`drawRect:` 方法接受一个参数，即表示视图哪部分“脏”并需要重绘的矩形。这可用于优化复杂视图的绘制，但在我们的示例中，我们将忽略这一点，而是使用视图的边界矩形进行绘制。\n\
  \n## 图形状态\n\nCocoa 中的所有绘制都发生在特定的上下文中，该上下文由 `NSGraphicsContext` 类表示。根据上下文的不同，我们可能直接绘制到窗口缓冲区，或绘制到一块离屏内存中以供后续使用。除此之外，上下文还有一些自身的状态信息，这些信息会随时间变化，例如当前用于任何绘制命令的颜色。当视图需要绘制自身时，它应该以将图形状态恢复到绘制开始时的状态的方式进行绘制。\n\
  \n幸运的是，`NSGraphicsContext` 为我们提供了一种简单的方法来实现这一点。它的 `saveGraphicsState` 方法会将所有相关的状态信息推入栈中，而\
  \ `restoreGraphicsState` 方法会将状态从栈中弹出。我们可以像下面的代码片段那样，使用这两个方法调用来“包围”实际的绘制代码，从而确保我们不会让图形上下文处于意外状态。\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
  \    // 绘制代码放在这里。\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\n## 路径辅助工具\n\
  \n要绘制本节开头所示的视图，我们将首先绘制背景，然后绘制脸部本身。对于这两个元素中的每一个，我们将先填充背景，然后绘制边缘。所有这些都使用 `NSBezierPath`\
  \ 类完成。贝塞尔路径允许我们定义任意复杂度的路径，包括直线、点、曲线等。`NSBezierPath` 类的一个便利之处在于，它提供了用于创建表示常见形状（如矩形、椭圆等）的贝塞尔路径的便捷快捷方式。\n\
  \n让我们从创建一个定义视图可见边缘的路径开始，使用 `NSBezierPath` 上的一个类方法来获取一个圆角矩形。下面以粗体显示的行创建了一个路径，用白色填充它，然后“勾勒”路径（以黑色绘制其边缘）：\n\
  \n```\n- (void)drawRect:(NSRect)dirtyRect {\n    [NSGraphicsContext saveGraphicsState];\n\
  \n    NSRect bRect = CGRectInset([self bounds], 5, 5);\n    NSBezierPath *border\
  \ = [NSBezierPath bezierPathWithRoundedRect:bRect\n        xRadius:5 yRadius:5];\n\
  \    [[NSColor whiteColor] set];\n    [border fill];\n\n    [border setLineWidth:3];\n\
  \    [[NSColor blackColor] set];\n    [border stroke];\n\n    [NSGraphicsContext\
  \ restoreGraphicsState];\n}\n```\n\n第一步使用 `CGRectInset` 函数缩小我们的边界矩形，为其留出一些余量，以便我们可以绘制带有粗线的圆角矩形，而不会被边缘裁剪。然后，我们创建一个表示圆角矩形的路径，指定矩形的基本几何形状以及用于定义圆角椭圆曲线大小的两个数字。之后，我们发出简单的命令来设置颜色、线宽并执行一些绘制。\n\
  \n## 颜色与图形上下文\n\n请注意，指定用于绘制操作的颜色是与绘制操作本身分开的步骤，设置线宽也是如此。此外，虽然设置线宽是通过路径上的方法完成的，但设置颜色看起来像是一种自由浮动操作。我们只需向任何颜色发送\
  \ `set` 消息，它就会立即成为当前颜色！实际上发生的是，`NSColor` 的 `set` 方法与底层图形上下文交互，设置将用于后续绘制操作的颜色。其一个后果是，只有当存在当前图形上下文时（例如在\
  \ `drawRect:` 方法内），`NSColor` 的 `set` 方法才会执行有用的操作。\n\n\n\n## 图形上下文中的颜色管理与路径绘制\n\n\
  另一个结果是，当前颜色是图形上下文的一个属性（在一般意义上，如果不是在 Objective-C 语言意义上），因此，在我们方法开始时调用`[NSGraphicsContext\
  \ saveGraphicsState]`会保存之前设置的颜色，并在方法结束时调用`[NSGraphicsContext restoreGraphicsState]`恢复，从而将一切恢复原状。\n\
  \n此时，如果在 Xcode 中*运行*该应用，我们会看到它绘制了一个带有黑色轮廓的白色矩形（Figure 14-4）。\n\n![9781430245421_Fig14-04.jpg](img/9781430245421_Fig14-04.jpg)\n\
  \nFigure 14-4. 事物的形状\n\n## 超越颜色\n\n现在让我们开始绘制头部。在`drawRect:`方法中，靠近末尾但仍位于`[NSGraphicsContext\
  \ restoreGraphicsState]`调用之前，添加以下代码行：\n\n```objectivec\nNSRect hRect = CGRectInset([self\
  \ bounds],20,20);\nNSBezierPath *head = [NSBezierPath bezierPathWithOvalInRect:hRect];\n\
  NSGradient *faceGradient = [[NSGradient alloc]\n  initWithStartingColor:[NSColor\
  \ whiteColor]\n  endingColor:[NSColor lightGrayColor]];\n[faceGradient drawInBezierPath:head\
  \ angle:45];\n[head setLineWidth:3];\n[head stroke];\n```\n\n在这里，我们再次使用`CGRectInset`创建一个比边界矩形更小的新矩形，这次是为了给笑脸先生的头部创建一个椭圆形。在创建贝塞尔路径后，我们创建了一些新的东西：`NSGradient`的一个实例，它知道如何获取两种或多种颜色并在它们之间绘制平滑渐变。在这个示例中，它可以在贝塞尔路径的内表面绘制自身。*运行*这段代码；视图现在包含一个带有渐变阴影的圆形“头部”（Figure\
  \ 14-5）。\n\n![9781430245421_Fig14-05.jpg](img/9781430245421_Fig14-05.jpg)\n\nFigure\
  \ 14-5. 基本头部特写\n\n## 手动路径构建\n\n现在剩下的就是绘制面部特征（一个简单的嘴巴和眼睛）。在`drawRect:`的末尾（但在最终的`[NSGraphicsContext\
  \ restoreGraphicsState]`调用之前）添加以下代码行：\n\n```objectivec\nNSBezierPath *features =\
  \ [NSBezierPath bezierPath];\n[features moveToPoint:NSMakePoint(35, 30)];\n[features\
  \ lineToPoint:NSMakePoint(65, 30)];\n[features moveToPoint:NSMakePoint(40, 40)];\n\
  [features lineToPoint:NSMakePoint(40, 40)];\n[features moveToPoint:NSMakePoint(60,\
  \ 40)];\n[features lineToPoint:NSMakePoint(60, 40)];\n[features setLineCapStyle:NSRoundLineCapStyle];\n\
  [features setLineWidth:3];\n[features stroke];\n```\n\n这里，我们没有使用`NSBezierPath`上的便捷类方法来直接获取完整形状，而是使用了一些更基本的方法，从零开始构建路径。`moveToPoint:`方法将虚拟的“笔”定位在指定点，而不绘制线条到该点。而`lineToPoint:`方法则从路径的当前点绘制一条线到新点。实际上，这些方法并不执行任何绘制；它们只是构建了贝塞尔路径结构，稍后由`stroke`方法进行绘制。\n\
  \n这里的一个额外技巧是我们设置了线条端点样式。此设置定义了线条末端会发生什么。这对于眼睛尤其重要，因为眼睛被绘制为单个点。使用默认设置（在线段末端精确切断所有内容）时，眼睛完全不可见，但使用`NSRoundLineCapStyle`为每只眼睛提供了完美的小圆圈。点击*运行*查看最终结果（Figure\
  \ 14-6）。\n\n![9781430245421_Fig14-06.jpg](img/9781430245421_Fig14-06.jpg)\n\nFigure\
  \ 14-6. 笑脸先生。他真的很开心！\n\n## 边界问题\n\n既然`MSSmileyView`绘制了一个完美的笑脸，我们自然会希望能够调整其大小以适应不同的位置。\n\
  \n当我们将窗口适配内容时，`MSSmileyView`自定义视图应该会自动设置约束，使视图随窗口改变大小。通过查看从自定义视图边缘延伸到窗口的蓝色线条，我们可以判断出这种情况，如\
  \ Figure 14-7 所示。如果不是这种情况，我们可以使用边缘的调整手柄调整`MSSmileyView`的大小，直到蓝色引导线出现在所有四个边上。这将自定义视图定位在距窗口边框四周内嵌\
  \ 20 点的位置。\n\n![9781430245421_Fig14-07.jpg](img/9781430245421_Fig14-07.jpg)\n\n\
  Figure 14-7. 调整大小约束已就位\n\n保存工作，点击*运行*，并调整视图大小。它应该看起来像 Figure 14-8。\n\n![9781430245421_Fig14-08.jpg](img/9781430245421_Fig14-08.jpg)\n\
  \nFigure 14-8. 哎呀，你的头倒过来了！\n\n这看起来不对劲，对吧？问题在于，在`drawRect:`方法中，我们在指定路径几何时采用了一种混合匹配的方法。对于轮廓和头部形状，我们一切基于边界矩形，但对于面部特征，我们硬编码了数字像素宽度。当视图调整大小时，我们的边界矩形会自动随之调整大小。这使得轮廓和头部拉伸以适应新的边界，而面部特征仍然困在它们僵硬的微小世界里。\n\
  \n另外，请注意，调整大小后线条的粗细完全相同，这意味着它们相对于视图整体大小的相对粗细已经改变。如果我们把这个视图做得非常大，线条会显得异常细。\n\n幸运的是，有一个简单的方法可以解决所有这些问题。回想一下本章前面提到的视图的`frame`和`bounds`矩形之间的区别？`frame`定义了视图在其父视图中的位置和大小。而`bounds`则决定了视图内坐标系的范围和位置。如果我们能配置使得视图的`bounds`矩形永远不变，那么它就会始终绘制完全相同的内容，但完美地拉伸以匹配它实际绘制的`frame`！\n\
  \n为此，我们只需要在每次视图调整大小时手动将`bounds`设置回原始矩形。因此，让我们向`MSSmileyView.h`添加一个属性（用于保存我们想要的边界），完善`initWithFrame:`方法，并实现`setFrameSize:`方法，如下所示：\n\
  \n```objectivec\n// A portion of MSSmileyView.h:\n#import <Cocoa/Cocoa.h>\n@interface\
  \ MSSmileyView : NSView\n@property NSRect preferredBounds;\n@end\n\n// A portion\
  \ of MSSmileyView.m:\n- (id)initWithFrame:(NSRect)frame {\n    self = [super initWithFrame:frame];\n\
  \    if (self) {\n        self.preferredBounds = NSMakeRect(0, 0, 100, 100);\n \
  \   }\n\n    return self;\n}\n\n- (void)setFrameSize:(NSSize)newSize {\n    [super\
  \ setFrameSize:newSize];\n    [self setBounds:self.preferredBounds];\n}\n```\n\n\
  `setFrameSize:`方法是在用户调整窗口大小期间进行实时拖拽时被调用的。我们在这里做的是每一步都重置视图的`bounds`矩形，这样当需要绘制时，所有绘制都将基于原始的`bounds`进行。现在点击*运行*，调整窗口大小，见证奇迹（Figure\
  \ 14-9）。\n\n![9781430245421_Fig14-09.jpg](img/9781430245421_Fig14-09.jpg)\n\nFigure\
  \ 14-9. 真正的拉伸\n\n如您所见，一切都能完美地按比例拉伸，包括线条的宽度。此外，所有内容都会根据实际显示分辨率进行渲染。我们可以任意拉伸它，并且始终能看到完美抗锯齿的曲线。我们为`bounds`指定的任何几何图形都将被调整以匹配我们所处的`frame`。我们在这里看到的，实际上是一个二维变换。\n\
  \n\n\n"
- "# 排版后\n\n除了作为处理尺寸调整的一种便捷方式外，这种内置的变换能力意味着我们只需设置边界矩形，就能以自己舒适的任何比例进行绘图。如果我们想以像素分辨率绘制图形，完全可以这样做；但如果我们要绘制一条取值范围在\
  \ 0.0 到 0.1 之间的数学曲线细节，就可以相应地设置边界，而无需将所有显示值乘以某个系数来匹配屏幕坐标。\n\n## LOLmaker\n\n现在，我们对如何在\
  \ `NSView` 中绘图以及操纵其几何属性有了基本了解，接下来进入一个新项目：LOLmaker。LOLmaker 是一个简单的应用程序，只需拖入一张图片并输入想要显示的文本，就能创建属于自己的\
  \ LOLcat 风格图像。这并非什么高深的技术，但它会引导我们了解在 `NSView` 中绘图时涉及的更多问题。\n\n### 关于 LOLcats 的一点说明\n\
  \n如果你完全错过了 LOLcat 这个网络迷因，或者是在 LOLcat 已被遗忘的未来世界中阅读本书，那么这里简单介绍一下：LOLcat 基本上就是一张带有幽默字幕的猫（或其他动物）图片，其文字风格通常模仿\
  \ 21 世纪初的网络俚语。\n\n我们喜欢 LOLcat 仅仅因为它们是我们看了会大笑的猫咪图片。请千万别以为我们会堕落到为了多卖几本书而在书中加入 LOLcat\
  \ 的内容！众所周知，大多数 LOLcat 粉丝同时也是盗版者，他们只会通过偷来的 PDF 文件阅读本书。\n\n### LOL 第一步\n\n首先在 Xcode\
  \ 中创建一个新的基础 Cocoa 项目，开启自动引用计数，但这次不需要文档或 Core Data 支持。虽然这两项功能在这个项目中也能派上用场，但我们目前只专注于绘图方面。这个项目实际上不会保存任何内容。将项目命名为\
  \ LOLmaker，并使用 LOL 作为类前缀。\n\n现在，编辑 `LOLAppDelegate.h` 文件，添加以下加粗的行：\n\n```objectivec\n\
  #import <Cocoa/Cocoa.h>\n#import \"LOLView.h\"\n\n@interface LOLAppDelegate : NSObject\
  \ <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n@property\
  \ (weak) IBOutlet LOLView *lolView;\n@property (strong) NSImage *image;\n@property\
  \ (copy) NSString *text;\n\n@end\n```\n\n这些属性将与 Cocoa 绑定配合使用，让用户可以拖入图片并输入文本，文本会自动关联到我们的控制器对象，而控制器对象又会更新视图。请注意（Xcode\
  \ 也会注意到），我们导入了一个 `LOLView.h` 头文件，并声明了一个 `LOLView*` 类型的属性，尽管 `LOLView` 类尚未完成。立即解决这个问题：再创建一组新的类文件，这次为\
  \ `LOLView` 创建一个 `NSView` 子类。\n\n我们稍后就会实现 `LOLView`，但现在先配置图形界面。点击 `MainMenu.xib`\
  \ 在 Interface Builder 画布中打开它，使用资源库将一个自定义视图、一个图像框和一个文本字段拖入空白窗口。使用身份检查器将自定义视图的类设置为\
  \ LOLView，并使用属性检查器打开图像框的“可编辑”复选框。最后，将应用程序代理的 *lolView* 出口连接到窗口中的 `LOLView`。布局完成后，窗口应类似于图\
  \ 14-10。\n\n![9781430245421_Fig14-10.jpg](img/9781430245421_Fig14-10.jpg)\n\n图 14-10。我们的\
  \ LOLmaker 窗口布局\n\n这个窗口允许用户拖入一张图片（到拖放区域）并输入一条消息，消息将显示在图片之上。`LOLView` 会检测到拖入的图片和编辑后的文本，并通过\
  \ Cocoa 绑定触发自身的重绘。绑定的一半将在 Interface Builder 中配置，另一半通过代码完成。\n\n首先，选择图像框并切换到绑定检查器。为“值”属性创建一个绑定，在弹出的列表中选择应用程序代理，并在“模型键路径”字段中输入\
  \ `self.image`。然后选择文本字段，为其“值”属性创建一个绑定，同样在弹出的列表中选择应用程序代理，这次在“模型键路径”字段中输入 `self.text`。\n\
  \n这样就完成了控件的绑定设置，但由于 Interface Builder 不知道 `LOLView` 及其可绑定的值，因此我们需要在代码中为其设置绑定。回到\
  \ Xcode，编辑 `LOLAppDelegate.m`，在 `@implementation` 部分添加以下方法：\n\n```objectivec\n-\
  \ (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n    [self.lolView\
  \ bind:@\"image\" toObject:self withKeyPath:@\"image\"\n               options:nil];\n\
  \    [self.lolView bind:@\"text\" toObject:self withKeyPath:@\"text\"\n        \
  \       options:nil];\n}\n```\n\n至此，应用程序中所有对象之间的基本通信就完成了。用户对窗口中控件的编辑会通过 Cocoa 绑定传递给应用程序代理，再从那里传递到\
  \ `LOLView`。我们应用的“管道”现已搭建完成！\n\n## LOLView\n\n那么，`LOLView` 本身呢？首先，它会有几个属性，就像应用程序代理的属性一样，用于存放来自用户的值。不过，在这种情况下，我们希望每次某个值发生变化时都触发重绘，以便\
  \ `LOLView` 能够重新绘制。因此，我们自行实现 setter 方法，而不是使用编译器生成的默认 setter。由于我们使用自定义 setter，但允许编译器生成\
  \ getter，因此必须将属性标记为 `nonatomic`。编译器生成的 getter 和 setter 包含同步代码，以确保这些方法永远不会返回构造了一半的对象。由于我们构建了自己的\
  \ setter，编译器无法提供这种保证，但这个应用程序中我们无需关心。按指示将以下代码分别添加到 `LOLView.h` 和 `LOLView.m` 中：\n\
  \n```objectivec\n// LOLView.h:\n#import <Cocoa/Cocoa.h>\n@interface LOLView : NSView\n\
  @property (strong, nonatomic) NSImage *image;\n@property (copy, nonatomic) NSString\
  \ *text;\n@end\n\n// LOLView.m:\n#import \"LOLView.h\"\n@implementation LOLView\n\
  - (id)initWithFrame:(NSRect)frame {\n    self = [super initWithFrame:frame];\n \
  \   if (self) {\n        // 初始化代码写在这里。\n    }\n    return self;\n}\n\n- (void)drawRect:(NSRect)dirtyRect\
  \ {\n    // 绘图代码写在这里。\n}\n\n- (void)setImage:(NSImage *)i {\n    if (![i isEqual:_image])\
  \ {\n        _image = i;\n        [self setNeedsDisplay:YES];\n    }\n}\n\n- (void)setText:(NSString\
  \ *)t {\n    if (![t isEqual:_text]) {\n        _text = [t copy];\n        [self\
  \ setNeedsDisplay:YES];\n    }\n}\n```\n\n在两个 setter 中，我们直接使用了属性生成的实例变量。默认情况下，实例变量的名称是属性名加下划线前缀，但你可以根据需要控制名称，并且可以控制是否合成实例变量。在\
  \ `setText:` 方法中，我们对传入代码的 `NSString` 进行了显式复制。我们必须这样做，因为我们在属性声明中已经声明（注意它标记为 `copy`\
  \ 而非 `strong` 或 `weak`）。一般来说，在接收 `NSString` 这样的对象时这是一个好做法，因为调用者实际传递给你的可能是一个可变字符串，可能会被其他代码修改。\n\
  \n### 绘制位图\n\n现在，我们来进入 `LOLView` 类的“核心”：绘制图片并在其上叠加文本。\n\n\n\n让我们先从图像开始。通过在我们创建类时预置的\
  \ `drawRect:` 方法中添加几行代码，我们可以快速将图像复制到位：\n\n```\n- (void)drawRect:(NSRect)dirtyRect\
  \ {\n  NSRect srcImageRect = NSMakeRect(0, 0, [self.image size].width,\n    [self.image\
  \ size].height);\n  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n\
  \    operation:NSCompositeCopy fraction:1.0];\n}\n```\n\n我们在这里做的第一件事是创建一个名为 `srcImageRect`\
  \ 的矩形，其原点为 (0,0)，大小与图像尺寸相等。然后，我们向图像本身发送一条消息，告诉它将 `srcImageRect` 指定的图像部分（此处为整张图像）绘制到当前图形上下文中，该上下文位于视图边界矩形的原点位置。简而言之，整张图像被复制，其左下角将精确地位于视图的左下角。我们在此使用的绘制方法还允许我们指定一个操作，该操作决定源图像和目标图像中透明度的合并方式，以及一个介于\
  \ 0.0 和 1.0 之间的整数，作为整张图像的整体 alpha 级别。任何低于 1.0 的值都会使图像变得部分透明；一直降到 0.0 会使图像完全不可见。\n\
  \n现在，*运行*应用程序，看看我们目前做到了什么程度。应用程序打开后，显示一个几乎空白的窗口，底部是图像拖放区和文本字段。找一张好看的 LOLcat 风格的图片（我们使用的是通过\
  \ Flickr 找到的美国国家档案馆的非版权图片），并将其拖入图像拖放区，效果应类似于图 14-11。\n\n![9781430245421_Fig14-11.jpg](img/9781430245421_Fig14-11.jpg)\n\
  \n图 14-11。这里可没什么好笑的\n\n嘿，这可不是很令人满意！我们只看到了拖入图片的左下角！要是能有办法看到整张图片就好了……\n\n## 让它滚动起来\n\
  \n当然，是有办法的。Cocoa 包含一个名为 `NSScrollView` 的类，在这里可以提供帮助。通过将视图放入 `NSScrollView` 内部，我们可以获得水平和垂直滚动条，用户可以使用它们来滑动视图。滚动视图负责处理所有繁重的工作。我们放入其中的任何视图的绘制代码都不需要更改！将\
  \ `LOLView` 放入 `NSScrollView` 出奇地简单。我们只需要添加一点代码，并在 Interface Builder 中做一些调整。\n\n\
  首先，在 Xcode 中打开 nib 文件以准备滚动视图本身。选择 `LOLView`，然后从菜单中选择 **Editor** ![image](img/arrow.jpg)\
  \ **Embed in** ![image](img/arrow.jpg) **Scroll View**。我们的 `LOLView` 现在被包裹在一个滚动视图中，但定位和大小有些偏差。移动滚动视图，直到蓝色参考线在窗口左上角闪烁，然后使用右下角的调整控件稍微调整大小，直到该侧的蓝色参考线闪烁。该视图应几乎填满窗口的宽度，并带有通常的边框，并且向下延伸足够的距离，以便在其他控件上方留出合适的边距（参见图\
  \ 14-12）。\n\n![9781430245421_Fig14-12.jpg](img/9781430245421_Fig14-12.jpg)\n\n图\
  \ 14-12。为滚动调整后的 LOLmaker 窗口\n\n我们还可以免费获得滚动视图的一些有用的缩放行为，这对于支持用户双指捏合缩放的多点触控触控板非常有用。既然它是免费的，我们就利用一下。选中滚动视图，打开*属性检查器*。其中一个选项是“放大”。勾选*允许*旁边的复选框，代码部分我们就完成了。\n\
  \n我们需要添加的代码实际上是 `setImage:` 方法的另一部分。\n\n我们要做的是在每次设置新图像时调整 `LOLView` 的大小，使视图的大小与图像大小匹配。之后，当\
  \ `LOLView` 被包含在 `NSScrollView` 中时，滚动视图会注意到新的视图大小，并自动重新渲染包括滚动条在内的所有内容。新代码如下所示：\n\
  \n```\n- (void)setImage:(NSImage *)i {\n  if (![i isEqual:_image]) {\n    if (i)\
  \ {\n      NSRect newImageFrame = NSMakeRect(0, 0, [i size].width,\n        [i size].height);\n\
  \      [self setFrame:newImageFrame];\n    }\n    _image = i;\n    [self setNeedsDisplay:YES];\n\
  \  }\n}\n```\n\n保存所有工作，点击*运行*，滚动视图就完成啦！拖入一张大图片，注意它起始于左下角，但滚动条已经出现，我们可以拖动到任何想要的位置，如果硬件支持，我们还可以双指捏合缩放！在图\
  \ 14-13 中查看实际效果。\n\n![9781430245421_Fig14-13.jpg](img/9781430245421_Fig14-13.jpg)\n\
  \n图 14-13。滚动条：如此简单，连猫都会\n\n## 绘制文字\n\n好了，让我们进入最后一步，绘制文字。在 LOLcats 社区中，传统上使用 Impact\
  \ 字体并以黑色阴影的白色文字作为标题。这种字体随 Mountain Lion 系统安装，因此我们所有的用户都应该拥有它。这应该轻而易举。唯一稍微棘手的一点是选择字号。由于图像可能有各种尺寸，我们需要动态选择字号，以便标题在视图内占据合适的位置，而不会延伸到侧面。我们将通过测试几种字号来实现这一点，从\
  \ 1 开始，每次将大小加倍，直到达到文本宽度会超过视图本身的程度。然后我们将字号稍稍调小一些，再绘制文本。所有这些都通过添加下面显示的加粗行来完成：\n\n\
  ```\n- (void)drawRect:(NSRect)dirtyRect {\n  // 此处的绘制代码。\n  NSRect srcImageRect\
  \ = NSMakeRect(0, 0, [self.image size].width,\n    [self.image size].height);\n\
  \  [self.image drawAtPoint:[self bounds].origin fromRect:srcImageRect\n    operation:NSCompositeCopy\
  \ fraction:1.0];\n\n  if (self.text != nil && [self.text length] > 0) {\n    NSPoint\
  \ textLocation = NSMakePoint(0,0);\n    NSShadow *textShadow = [[NSShadow alloc]\
  \ init];\n    [textShadow setShadowOffset:NSMakeSize(0,0)];\n    [textShadow setShadowColor:[NSColor\
  \ blackColor]];\n    [textShadow setShadowBlurRadius:10];\n    NSMutableDictionary\
  \ *textAttributes =\n      [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
  \        [NSFont fontWithName:@\"Impact\" size:40], NSFontAttributeName,\n     \
  \   [NSColor whiteColor], NSForegroundColorAttributeName,\n        textShadow, NSShadowAttributeName,\n\
  \        nil];\n\n    // 找到最佳字号\n    CGFloat fontSize;\n    NSSize testSize = NSMakeSize(0,\
  \ 0);\n    for(fontSize=1; testSize.width < [self.image size].width; fontSize*=2)\n\
  \    {\n      [textAttributes setObject:[NSFont fontWithName:@\"Impact\"\n     \
  \   size:fontSize]\n        forKey:NSFontAttributeName];\n      testSize = [self.text\
  \ sizeWithAttributes:textAttributes];\n    }\n    [textAttributes setObject:[NSFont\
  \ fontWithName:@\"Impact\"\n      size:fontSize/4]\n      forKey:NSFontAttributeName];\n\
  \n    // 然后绘制文本\n    [self.text drawAtPoint:textLocation\n      withAttributes:textAttributes];\n\
  \  }\n}\n```\n\n现在点击*运行*，将一张图片拖入图像拖放区，并写入一些文字。瞧！它应该看起来像图 14-14。\n\n![9781430245421_Fig14-14.jpg](img/9781430245421_Fig14-14.jpg)\n\
  \n图 14-14。我能搞个新闻发布会吗？\n\n## 总结\n\n在本章中，我们深入了解了 `NSView`、`NSBezierPath` 以及一些其他处理绘图的类和数据结构的工作原理。\n\
  \n\n\n## 高级绘图主题\n\n然而，Cocoa 的绘图功能远不止于此，我们还能绘制更复杂的曲线、让绘图响应鼠标事件以及为视图添加动画效果，这些内容都将在下一章中介绍。\n\
  \n第 14 章提供了 Cocoa 核心绘图概念的基础知识，例如使用路径描述形状、将图像复制到屏幕以及渲染文本。本章将在此基础上进一步展开，演示一些让图形活灵活现的技巧。第一部分将介绍如何让视图响应鼠标事件，使用户能够与自定义视图进行交互。第二部分将简要介绍\
  \ Core Animation，这项令人兴奋的技术只需几行代码就能创建流畅的动画效果。\n\n## 编辑曲线\n\n第 14 章介绍了用于绘制圆角矩形、椭圆、直线和点的`NSBezierPath`类。如果你在\
  \ Photoshop 或其他应用中使用过贝塞尔绘图工具，可能会好奇这些形状与贝塞尔曲线究竟有何关联！贝塞尔曲线本质上是一系列描述路径的点，以及描述点之间曲线的控制点。因此，基本上任何能用笔（现实世界中的笔，或计算机图形系统中的虚拟笔）绘制的形状，包括直线和锯齿形角度，都可以描述为贝塞尔曲线。\n\
  \n然而，通俗地说，贝塞尔曲线通常指的是类似图 15-1 中所示的形状。图中黑色曲线即为贝塞尔曲线，它由两个端点（左下角和右上角）以及两个控制点定义，这些控制点以杆端巨大的圆圈表示。用户通过拖拽控制点来改变曲线的形状。此类视图可用作节奏控制器，用于确定某些数值随时间变化的速率，例如物体从一点移动到另一点的运动。将曲线变成直线可实现完美的线性过渡，或制作出\
  \ S 形曲线，使数值开始变化缓慢，中途快速上升，接近目标值时再减慢速度（有时称为“缓入/缓出”过渡）。这就是我们将在本节中实现的控制功能。\n\n![9781430245421_Fig15-01.jpg](img/9781430245421_Fig15-01.jpg)\n\
  \n图 15-1. 贝塞尔曲线\n\n## 准备工作\n\n在 Xcode 中新建一个 Cocoa 项目，并将其命名为`CurveEdit`。确保勾选*自动引用计数*，并将此类前缀设置为`CE`。\n\
  \n本应用的核心部分将全部位于视图对象中，但首先让我们处理视图周围的基础架构。我们将在此项目中坚持使用 MVC 架构，这将有助于确保我们创建的视图能够作为独立组件使用。用于显示每个控制点\
  \ x 和 y 值的文本字段将通过 Cocoa 绑定连接到我们的控制器对象，自定义视图本身也是如此。此应用中的模型将只是控制器类中的一组实例变量，但如果我们选择使用或创建真实的模型对象，所有视图同样可以轻松地绑定到该模型对象上。\n\
  \n新建一个名为`CECurveView`的`NSView`子类，暂时保持其实现不变。我们很快就会回头处理它。打开`MainMenu.xib`。从*对象库*中拖出一个*自定义视图*，并使用*身份检查器*将其类设置为`CECurveView`。将其大小调整为约\
  \ 240 x 240。接下来，我们需要连接应用代理和我们刚刚放入窗口的视图。为此，在辅助编辑器中打开`CEAppDelegate.h`文件，然后按住 Control\
  \ 键从`CECurveView`自定义视图拖拽到辅助编辑器窗口中的`CEAppDelegate.h`代码处。拖拽到现有`@property`声明下方时，应出现“插入输出口”提示。将新输出口命名为`curveView`。\n\
  \n我们还需要进行一些其他更改。我们将添加一个导入语句来引入`CECurveView`头文件，以及一些稍后通过 Cocoa 绑定使用的额外属性。在`.h`文件中添加以下内容：\n\
  \n```objc\n#import <Cocoa/Cocoa.h>\n#import \"CECurveView.h\"\n\n@interface CEAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet CECurveView *curveView;\n\n@property (assign) CGFloat\
  \ cp1X;\n@property (assign) CGFloat cp1Y;\n@property (assign) CGFloat cp2X;\n@property\
  \ (assign) CGFloat cp2Y;\n\n@end\n```\n\n然后切换到`.m`文件，并添加以下行：\n\n```objc\n#import\
  \ \"CEAppDelegate.h\"\n\n@implementation CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // 让 CECurveView 注意到我的更改\n    [self.curveView bind:@\"\
  cp1X\" toObject:self withKeyPath:@\"cp1X\"\n        options:nil];\n    [self.curveView\
  \ bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n        options:nil];\n  \
  \  [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"cp2X\"\n        options:nil];\n\
  \    [self.curveView bind:@\"cp2Y\" toObject:self withKeyPath:@\"cp2Y\"\n      \
  \  options:nil];\n    // 让我注意到 CECurveView 的更改\n    [self bind:@\"cp1X\" toObject:self.curveView\
  \ withKeyPath:@\"cp1X\"\n        options:nil];\n    [self bind:@\"cp1Y\" toObject:self.curveView\
  \ withKeyPath:@\"cp1Y\"\n        options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView\
  \ withKeyPath:@\"cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
  \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    // 设置初始值\n    self.cp1X = 0.5;\n\
  \    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y = 1.0;\n}\n\n@end\n```\n\
  \n如您所见，控制器类非常简单。它所做的只是声明用于访问控制点 x 和 y 值的属性，以及一个用于连接到`CECurveView`本身的`IBOutlet`，代表我们的`curveView`建立一些绑定（因为我们无法在\
  \ Interface Builder 中完成这些操作），并为控制点设置一些默认起始值。由于我们通过代码设置了此对象的绑定，因此`CECurveView`实例现在已经准备就绪（就我们的\
  \ nib 文件而言）。至此，我们可以关闭辅助编辑器。\n\n返回*对象库*，拖出一个标签，将其放置在`CECurveView`下方。将标签的标题更改为`X1:`。同时拖出一个文本字段，将其放置在标签旁边，让蓝色参考线指示正确的对齐方式。同时选中标签和文本字段，然后按`⌘D`复制它们。将新一组放置在第一个组下方，并将标签标题更改为`Y1:`。此表单将显示贝塞尔曲线中第一个控制点的\
  \ x 和 y 值。为两个文本字段分别创建绑定。对于每个字段，我们想将其 Value 属性绑定到`CEAppDelegate`对象，分别使用模型键路径`cp1X`和`cp1Y`。\n\
  \n同时选中两个标签和两个文本字段，复制它们（`⌘D`），并将新副本放置在第一组的右侧。这些字段将显示第二个控制点的值，因此将标签重命名为`X2:`和`Y2:`，并设置类似于第一组的绑定，但改用`cp2X`和`cp2Y`作为键路径。\n\
  \n请参考图 15-1 查看预期效果，妥善布局，并调整窗口大小以容纳新增内容。保存文件，然后*运行*项目，确保此时没有错误。最终的应用将允许我们编辑四个文本字段的内容。\n\
  \n\n\n系统还会提示错误：`CECurveView` 对于键 `cp1X` 不符合键值编码规范，确实如此——我们还没有将其添加到 `CECurveView`\
  \ 类中，但马上就会修改！\n\n**贝塞尔曲线的底层架构**\n\n现在开始为 `CECurveView` 类建立基础设施。`CECurveView` 需要跟踪两个控制点，我们将其设置为四个浮点数，每个浮点数都通过属性访问，这与控制器类的做法类似。我们还要采用一种与第\
  \ 14 章中 `MrSmiley` 类似的技术，使 GUI 能够按比例缩放，以适应其渲染尺寸。这一次，我们将设置固定的边界，以便始终能在平面上 (0,0) 到\
  \ (1,1) 之间的正方形区域内绘制曲线，并留出一点额外的周边空间。为此，我们将添加一些代码，将边界设置为 (-0.1,-0.1) 到 (1.1,1.1) 之间的正方形区域，并且无论视图如何调整大小，都保持这些边界不变。通过添加以下粗体行来实现这一切：\n\
  \n```objectivec\n// CECurveView.h:\n#import <Cocoa/Cocoa.h>\n@interface CECurveView\
  \ : NSView {\n    NSRect myBounds;\n}\n@property (assign, nonatomic) CGFloat cp1X;\n\
  @property (assign, nonatomic) CGFloat cp1Y;\n@property (assign, nonatomic) CGFloat\
  \ cp2X;\n@property (assign, nonatomic) CGFloat cp2Y;\n@end\n```\n\n然后将这些行添加到 `.m`\
  \ 文件中：\n\n```objectivec\n// CECurveView.m:\n#import \"CECurveView.h\"\n@implementation\
  \ CECurveView\n\n- (void)setCp1X:(CGFloat)f {\n    self.cp1X = MAX(MIN(f, 1.0),\
  \ 0.0);\n    [self setNeedsDisplay:YES];\n}\n- (void)setCp1Y:(CGFloat)f {\n    self.cp1Y\
  \ = MAX(MIN(f, 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n}\n- (void)setCp2X:(CGFloat)f\
  \ {\n    self.cp2X = MAX(MIN(f, 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n}\n\
  - (void)setCp2Y:(CGFloat)f {\n    self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n    [self\
  \ setNeedsDisplay:YES];\n}\n\n- (id)initWithFrame:(NSRect)frame {\n    self = [super\
  \ initWithFrame:frame];\n    if (self) {\n        // 初始化代码写在这里。\n        myBounds\
  \ = NSMakeRect(-0.1, -0.1, 1.2, 1.2);\n        [self setBounds:myBounds];\n    }\n\
  \    return self;\n}\n- (void)setFrameSize:(NSSize)newSize {\n    [super setFrameSize:newSize];\n\
  \    [self setBounds:myBounds];\n}\n- (void)drawRect:(NSRect)rect {\n    // 绘制代码写在这里。\n\
  }\n@end\n```\n\n请注意，我们正在为这些属性实现自己的设置方法，因此需要将属性标记为 `nonatomic`。编译器会注意到我们没有实现自己的获取方法，所以编译器仍会为我们生成这些方法。在设置方法中，我们将对输入值实施范围限制，使其保持在\
  \ 0.0 到 1.0 之间。我们还会使用 `setNeedsDisplay:` 将窗口标记为“脏”（需重绘），从而在属性发生变化时强制系统重绘窗口。\n\n\
  **绘制曲线**\n\n现在进入有趣的部分：绘制曲线本身。我们将使用预处理器的 `#define` 来定义颜色和线宽的值，这样便于查找和调整这些值以优化外观。在\
  \ `CECurveView.m` 中靠近顶部的位置添加以下行：\n\n```objectivec\n#define CP_RADIUS 0.1\n#define\
  \ CP_DIAMETER (CP_RADIUS*2)\n#define BACKGROUND_COLOR [NSColor whiteColor]\n#define\
  \ GRID_STROKE_COLOR [NSColor lightGrayColor]\n#define GRID_FILL_COLOR [NSColor colorWithCalibratedWhite:0.9\
  \ alpha:1.0]\n#define CURVE_COLOR [NSColor blackColor]\n#define LINE_TO_CP_COLOR\
  \ [NSColor darkGrayColor]\n#define CP_GRADIENT_COLOR1 [NSColor lightGrayColor]\n\
  #define CP_GRADIENT_COLOR2 [NSColor darkGrayColor]\n```\n\n我们将按照以下示例实现 `drawControlPointAtX:y:`\
  \ 和 `drawRect:` 方法。绘制控制点的代码演示了 `NSGradient` 类的使用，该类可以用于填充贝塞尔路径的内部，而不仅仅是进行纯色填充。\n\
  \n```objectivec\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y {\n    NSBezierPath\
  \ *cp = [NSBezierPath bezierPathWithOvalInRect:\n        NSMakeRect(x - CP_RADIUS,\
  \ y - CP_RADIUS,\n                   CP_DIAMETER, CP_DIAMETER)];\n    NSGradient\
  \ *g;\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n  \
  \                           endingColor:CP_GRADIENT_COLOR2];\n    [g drawInBezierPath:cp\n\
  \       relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n\n- (void)drawRect:(NSRect)rect\
  \ {\n    [NSGraphicsContext saveGraphicsState];\n\n    // 绘制背景\n    NSBezierPath\
  \ *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n                     \
  \               xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR set];\n    [bg\
  \ fill];\n\n    // 绘制网格\n    NSBezierPath *grid1 = [NSBezierPath bezierPath];\n\
  \    [grid1 moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0,\
  \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
  \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n\n    [grid1 moveToPoint:NSMakePoint(0.5,\
  \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
  \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR set];\n\
  \    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
  \    [grid1 stroke];\n\n    // 绘制指向控制点的连线\n    NSBezierPath *cpLines = [NSBezierPath\
  \ bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0, 0.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp1X,\
  \ self.cp1Y)];\n    [cpLines moveToPoint:NSMakePoint(1.0, 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X,\
  \ self.cp2Y)];\n    [LINE_TO_CP_COLOR set];\n    [cpLines setLineWidth:0.01];\n\
  \    [cpLines stroke];\n\n    // 绘制曲线本身\n    NSBezierPath *bp = [NSBezierPath bezierPath];\n\
  \    [bp moveToPoint:NSMakePoint(0.0, 0.0)];\n    [bp curveToPoint:NSMakePoint(1.0,\
  \ 1.0)\n      controlPoint1:NSMakePoint(self.cp1X, self.cp1Y)\n      controlPoint2:NSMakePoint(self.cp2X,\
  \ self.cp2Y)];\n    [CURVE_COLOR set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\
  \n    // 绘制控制点\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self\
  \ drawControlPointAtX:self.cp2X y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n\
  }\n```\n\n这种绘制代码可能会导致方法非常长，但通常它非常简单，就像前面展示的 `drawRect:` 方法一样。整个方法中没有循环或 `if` 结构！请注意，与第\
  \ 14 章中的 Mr. Smiley 代码不同，这个绘制代码完全没有引用我们视图的边界矩形。因为我们知道边界总是被调整为包含一个从 (0,0) 到 (1,1)\
  \ 的正方形，所以我们使用简单的硬编码值在这个单位正方形内及其周围绘制图形。\n\n点击 *运行* 来运行应用；它看起来应该类似于图 15-1。我们应该能够编辑文本字段中的值（0.0\
  \ 到 1.0 之间的任何值都适用），并看到控制点和曲线随之变化。\n\n**监听鼠标操作**\n\n但通过文本字段输入数值并不是本练习的目的；我们希望可以拖动这些控制点。事实证明，这非常简单。`NSView`\
  \ 包含一些方法，当用户通过点击、拖动等方式与视图交互时，这些方法会被自动调用。我们只需要重写几个方法，就可以对鼠标的每一次点击、拖动和释放做出响应。\n\n\
  首先，让我们在视图中添加一对 `BOOL` 类型的属性，用于跟踪其中一个控制点是否正在被拖动。在 `CECurveView.h` 的 `@interface`\
  \ 声明中添加以下两行：\n\n```objectivec\n@property (assign) BOOL draggingCp1;\n@property (assign)\
  \ BOOL draggingCp2;\n```\n\n现在，让我们在 `CECurveView.m` 的 `@implementation` 部分添加一些方法，以便开始拦截我们希望监听的鼠标活动。第一个方法\
  \ `mouseDown:` 将在用户点击我们的视图时被调用。\n\n\n```objc\n- (void)mouseDown:(NSEvent *)theEvent\
  \ {\n  // 获取当前鼠标位置，转换到我们的坐标空间\n  // (即我们的 bounds 所表示的空间)\n  NSPoint mouseLocation\
  \ = [theEvent locationInWindow];\n  NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
  \    fromView:nil];\n  // 检查点击是否落入了某个控制点\n  NSPoint cp1 = NSMakePoint(self.cp1X,\
  \ self.cp1Y);\n  NSPoint cp2 = NSMakePoint(self.cp2X, self.cp2Y);\n  if (pointsWithinDistance(self.cp1,\
  \ convertedLocation, CP_RADIUS)) {\n    self.draggingCp1 = YES;\n  } else if (pointsWithinDistance(cp2,\
  \ convertedLocation, CP_RADIUS)){\n    self.draggingCp2 = YES;\n  }\n  [self setNeedsDisplay:YES];\n\
  }\n```\n\n在`mouseDown:`方法中，我们首先向窗口请求当前鼠标位置，然后使用一个内置的`NSView`方法，将坐标从窗口的坐标系转换到我们自己的坐标系。这意味着，例如，我们单位方块右上角的一次点击，起初是距窗口左下角的水平和垂直像素数，最终将被转换为(1,1)或附近的值。然后我们执行两次测试，以查看是否点击了其中一个控制点。该测试使用以下函数完成，我们应将此函数添加到`CurveEdit.m`顶部，位于`#defines`组和`@implementation`部分之间：\n\
  \n```objc\nstatic BOOL pointsWithinDistance(NSPoint p1, NSPoint p2, CGFloat d) {\n\
  \  return pow((p1.x-p2.x), 2) + pow((p1.y - p2.y), 2) <= pow(d, 2);\n}\n```\n\n\
  `pointsWithinDistance`函数利用勾股定理来确定两点之间的距离（在我们的场景中，是控制点的中心和鼠标位置的距离）是否小于我们传入的距离（控制点半径）。利用这一点，我们能够检查用户是否点击了某个控制点；如果是，我们将相应的标志（`draggingCp1`或`draggingCp2`）设置为`YES`。\n\
  \n接下来要实现的方法是`mouseDragged:`，它在按住鼠标按钮并移动时被调用。请注意，此方法并非在鼠标拖过的每个视图中都被调用；它始终在最初发生鼠标点击的视图中被调用。从某种意义上说，接收点击的视图“拥有”之后所有的拖动操作。在此方法中，我们再次从事件中获取鼠标位置，将其转换为我们视图自己的坐标系，然后更新当前正在拖动的控制点的坐标。如果当前没有控制点被拖动，则什么也不会发生。\n\
  \n```objc\n- (void)mouseDragged:(NSEvent *)theEvent {\n  NSPoint mouseLocation =\
  \ [theEvent locationInWindow];\n  NSPoint convertedLocation = [self convertPoint:mouseLocation\n\
  \    fromView:nil];\n  if (self.draggingCp1) {\n    self.cp1X = convertedLocation.x;\n\
  \    self.cp1Y = convertedLocation.y;\n  } else if (self.draggingCp2) {\n    self.cp2X\
  \ = convertedLocation.x;\n    self.cp2Y = convertedLocation.y;\n  }\n  [self setNeedsDisplay:YES];\n\
  }\n```\n\n处理鼠标所需的最后一个方法是`mouseUp:`，它让我们处理按钮的释放。与`mouseDragged:`一样，`mouseUp:`始终在发起拖动的视图上被调用。这意味着当用户在我们的视图中点击后，无论用户在何处松开鼠标按钮，我们都会收到此消息。这里我们只需将标志设置为`NO`以指示没有东西正在被拖动。\n\
  \n```objc\n- (void)mouseUp:(NSEvent *)theEvent {\n  self.draggingCp1 = NO;\n  self.draggingCp2\
  \ = NO;\n}\n```\n\n完成所有这些后，*运行* 这个应用。我们应该能够拖动控制点，曲线会跟随每一次移动，文本框中的数字也会随拖动而改变。\n\n\
  ## 一点优化\n\n这已经很不错了，但正如我们在尝试新 GUI 设计时经常注意到的，一些小的使用体验会提示我们进行增强。\n\n一方面，我们总是以相同的顺序绘制控制点，因此控制点\
  \ 2 始终位于最上方，即使我们将控制点 1 直接拖到它上面也是如此。这感觉很不自然。幸运的是，修复方法非常简单，这也是我们将控制点绘制拆分为两个独立方法的真正、实际的原因。在`drawRect:`方法的末尾，添加如下粗体显示的行：\n\
  \n```objc\n// 绘制控制点\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
  \ y:self.cp2Y];\n  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n} else {\n\
  \  [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n  [self drawControlPointAtX:self.cp2X\
  \ y:self.cp2Y];\n}\n```\n\n就这样！点击 *运行*。注意，无论何时我们拖动第一个控制点，它都会显示在第二个控制点的前面。\n\n另外，高亮显示当前正在被拖动的控制点也会是不错的功能，比如用不同的颜色绘制它。这也是一个非常简单的改动，能为用户提供一些有用的反馈。首先，为新的渐变定义一些高亮颜色，在文件顶部的其他`#defines`中添加这几行：\n\
  \n```objc\n#define CP_GRADIENT_HIGHLIGHT_COLOR1 [NSColor whiteColor]\n#define CP_GRADIENT_HIGHLIGHT_COLOR2\
  \ [NSColor redColor]\n```\n\n现在，修改`drawControlPointAtX:y:`方法，添加一个额外的参数来指定是否绘制高亮变体，添加以下粗体显示的行：\n\
  \n```objc\n- (void)drawControlPointAtX:(CGFloat)x y:(CGFloat)y dragging:(BOOL)dragging\
  \ {\n  NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n    NSMakeRect(x\
  \ - CP_RADIUS, y - CP_RADIUS, CP_DIAMETER, CP_DIAMETER)];\n  NSGradient *g;\n  if\
  \ (dragging) {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_HIGHLIGHT_COLOR1\n\
  \                            endingColor:CP_GRADIENT_HIGHLIGHT_COLOR2];\n  } else\
  \ {\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n    \
  \                        endingColor:CP_GRADIENT_COLOR2];\n  }\n  [g drawInBezierPath:cp\n\
  \     relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n```\n\n因为我们已经为控制点绘制方法添加了一个参数，所以还需要更改它在`drawRect:`末尾的调用方式，如下所示：\n\
  \n```objc\n// 绘制控制点\nif (self.draggingCp1) {\n  [self drawControlPointAtX:self.cp2X\
  \ y:self.cp2Y dragging:self.draggingCp2];\n  [self drawControlPointAtX:self.cp1X\
  \ y:self.cp1Y dragging:self.draggingCp1];\n} else {\n  [self drawControlPointAtX:self.cp1X\
  \ y:cp1Y dragging:self.draggingCp1];\n  [self drawControlPointAtX:self.cp2X y:self.cp2Y\
  \ dragging:self.draggingCp2];\n}\n```\n\n现在点击 *运行*，会看到原本灰色的控制点在拖动时会亮起红色，给用户一个很好的视觉提示。还要注意，当我们松开时，最近被拖动的控制点会保持红色。要修复这个问题，在`mouseUp:`方法的末尾添加：\n\
  \n```objc\n[self setNeedsDisplay:YES];\n```\n\n## Core Animation 入门\n\nApple 在 Mac\
  \ OS X 中包含的最激动人心的技术之一是一个名为 Core Animation 的图形系统，它让我们能够轻松地在应用程序中创建动画效果。我们可以让视图平滑、轻松地滑动、淡入淡出、旋转和缩放，通常只需几行代码。实际上，Core\
  \ Animation 允许我们指定对象的一种变化——例如将其位置更改到窗口中的另一个点——这样，变化不会瞬间发生，而是被自动分割成几个由 Core Animation\
  \ 随时间渲染的小动作。我们可以指定过渡的时长（以秒为单位），以及变化的定时或节奏。我们还可以将动画分组，使它们完美同步执行。\n\n### Core Animation\
  \ 基础\n\n从技术角度来看，这一切的核心基本单元是一个名为`CALayer`的类（Core Animation 的预发布版本甚至被称为 Layer Kit）。\n\
  \n```markdown\n每个`NSView`都可以选择性地附加一个`CALayer`，这可以通过在 Interface Builder 中切换开关或在代码中设置来实现。为视图分配图层的实际过程是通过所有视图的子视图启动递归过程，因此当一个视图有图层时，其所有子视图（以及它们的子视图，以此类推）也会获得图层。一旦图层就位，我们就可以开始为视图设置动画。在底层，每个`CALayer`都与一些用于渲染图形的\
  \ OpenGL 结构相关联。OpenGL 在快速将矩形绘制到屏幕方面做得非常出色，即使是调整大小、旋转等操作，因此使用`CALayer`可以让我们的视图执行各种屏幕上的技巧，而不会降低应用程序的速度。Core\
  \ Animation API 完全将我们从 OpenGL 中屏蔽，因此它将安静地工作，我们无需过多考虑。唯一需要记住的是，每个图层都会消耗计算机图形硬件中的部分内存，因此我们最好仅在实际需要执行动画的应用程序部分使用图层，而不是将它们应用于每个窗口中的每个视图。\n\
  \n## 隐式动画\n\n任何支持图层的视图都可以通过其**动画代理**（*animator proxy*）来设置动画。这是一个特殊的对象，它充当视图本身的替身，不是立即进行更改，而是根据发送给它方法设置相应的动画。例如，如果我们希望动画显示视图的移动，那么可以不这样设置其`frame`：\n\
  \n```objc\n[myView setFrame:newFrame];\n```\n\n而是这样设置：\n\n```objc\n[[myView animator]\
  \ setFrame:newFrame];\n```\n\n要查看实际效果，请创建一个新的 Cocoa 项目，将其命名为`MovingButton`，并使用`MB`作为类前缀。首先，我们将设置用户界面。在\
  \ Interface Builder 画布中打开`MainMenu.xib`，打开 MovingButton 窗口，并在空窗口中放置一个名为 Move 的按钮。接下来，打开助手编辑器，并在其中打开`MBAppDelegate.h`文件。从按钮按住\
  \ Control 键拖动到`MBAppDelegate.h`文件，在窗口的`@property`声明正下方添加一个操作。将新操作命名为`move`。\n\n\
  现在，让我们填充`move:`操作的实现，如下所示：\n\n```objc\n- (IBAction)move:(id)sender {\n    NSRect\
  \ senderFrame = [sender frame];\n    NSRect superBounds = [[sender superview] bounds];\n\
  \    senderFrame.origin.x = (superBounds.size.width -\n        senderFrame.size.width)\
  \ * drand48();\n    senderFrame.origin.y = (superBounds.size.height -\n        senderFrame.size.height)\
  \ * drand48();\n    [sender setFrame:senderFrame];\n}\n```\n\n这个简单的操作方法只是为`sender`在其父视图中计算一个新的随机位置，并将其移动到那里。保存更改，*运行*项目，可以看到每次点击\
  \ Move 按钮时，它都会跳到窗口中的另一个位置。\n\n现在，让我们为移动添加动画效果。我们只需要编辑一行，将：\n\n```objc\n[sender setFrame:senderFrame];\n\
  ```\n\n改为：\n\n```objc\n[[sender animator] setFrame:senderFrame];\n```\n\n再次点击*运行*，点击\
  \ Move 按钮，看看会发生什么。现在，每次我们点击按钮时，它都会平滑地滑到新位置，而不是瞬间切换。由`animator`方法返回的对象是一个代理，它响应`NSView`的每个\
  \ setter 方法，并调度动画以逐步应用更改。在幕后，Core Animation 会按照 setter 调用中指定的目标值，一点一点地修改相关值，直到达到该目标值。\n\
  \n每个线程都维护一个动画上下文，其形式为`NSAnimationContext`实例。除其他功能外，它还允许我们通过首先设置如下值来设置隐式动画所需的时间长度（以秒为单位）：\n\
  \n```objc\n[[NSAnimationContext currentContext] setDuration:1.0];\n```\n\n如果这就是我们对动画所需的全部控制，那么可以使用隐式动画走得很远。如果需要更精细的调整，例如能够确保多个动画以同步方式发生或在动画完成时触发某些活动，那么我们需要更强大的工具，例如……\n\
  \n## 显式动画\n\nCore Animation 提供了一种在代码中显式设置动画的技术，而不是使用`NSView`的`animator`方法的“魔法”。我们显式创建的每个动画都由开始和结束动画代码部分的方法来界定，这使得一切更加清晰。结合显式动画所拥有的额外功能，很明显，除了最简单的动画之外，这是所有情况下的正确方法。\n\
  \n为了使用 Core Animation，我们首先必须将`QuartzCore`框架添加到我们的 Xcode 项目中。在 Xcode 中，在项目导航器窗格中选择`MovingButton`项目本身：这是项目导航器中最顶部的项目。在*Targets*部分下选择`MovingButton`，如图\
  \ 15-2 所示。在*Linked Frameworks and Libraries*部分中，点击表格视图底部的+按钮以添加新框架。在列表中找到`QuartzCore.framework`（使用顶部的搜索字段），并将其添加。\n\
  \n![9781430245421_Fig15-02.jpg](img/9781430245421_Fig15-02.jpg)\n\n图 15-2. 向项目添加新框架\n\
  \n然后，在`MBAppDelegate.m`的顶部添加以下行：\n\n```objc\n#import <QuartzCore/QuartzCore.h>\n\
  ```\n\n现在，我们准备好了在我们自己的代码中引用 Core Animation 类。让我们从修改前面的示例开始，使用显式动画而不是隐式动画。为此，我们必须创建一个名为`CABasicAnimation`的\
  \ Core Animation 类实例，它可以动画显示任何可以动画化的`CALayer`属性之间的值。在我们的例子中，我们不是对`frame`进行动画处理，而是对图层的`position`属性进行动画处理。我们使用动画的`toValue`和`fromValue`属性显式设置位置的开始和结束位置。请注意，这些属性期望一个适当的对象，而不仅仅是像`NSPoint`这样的结构，因此我们必须将每个`NSPoint`值包装在一个`NSValue`实例中。创建动画后，我们将其与一个键一起添加到视图的图层中。这个键与我们正在动画化的属性无关，它仅用于以后可能需要标识此动画时提供帮助。最后，我们在视图对象本身上更改`frame`，因为动画仅影响视图图层的绘制。我们希望视图实际上也移动，因此我们必须手动设置其目标`frame`。以下是完成所有这些操作的代码：\n\
  \n```objc\n- (IBAction)move:(id)sender {\n    NSRect senderFrame = [sender frame];\n\
  \    NSRect superBounds = [[sender superview] bounds];\n    CABasicAnimation *a\
  \ = [CABasicAnimation\n                           animationWithKeyPath:@\"position\"\
  ];\n    a.fromValue = [NSValue valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x\
  \ = (superBounds.size.width -\n        senderFrame.size.width)*drand48();\n    senderFrame.origin.y\
  \ = (superBounds.size.height -\n        senderFrame.size.height)*drand48();\n  \
  \  a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    [[sender layer]\
  \ addAnimation:a forKey:@\"position\"];\n    [[sender animator] setFrame:senderFrame];\n\
  \    [sender setFrame:senderFrame];\n}\n```\n\n请注意，我们还从此方法中删除了`[[sender animator]\
  \ setFrame:senderFrame];`行，因为我们这次不希望触发隐式动画。在这一切生效之前，我们需要额外完成一步，而之前的隐式动画已经替我们完成了：为需要动画化的视图建立图层。\n\
  ```\n\n\n使用动画代理器自动实现了这一点，但现在我们必须为任何将要进行动画的视图（包括任何将要移动的视图的父视图）手动开启该功能。在我们的例子中，这意味着按钮的父视图（窗口的内容视图）需要被赋予一个图层，而该图层又会为其子视图层级（即按钮本身）建立图层。最简单的方法是回到`MainMenu.xib`，在窗口中选择按钮，然后打开*视图效果检查器*（![image](img/arrow2.jpg)8）。该检查器顶部有一个名为*核心动画图层*的章节，其中显示了一个视图对象列表（参见图\
  \ 15-3）。\n\n![9781430245421_Fig15-03.jpg](img/9781430245421_Fig15-03.jpg)\n图 15-3.\
  \ 建立动画图层\n\n选中的对象（按钮）位于列表底部，而其所有父视图（本例中只有一个视图，即窗口的内容视图）则堆叠在其上方。点击复选框为该视图开启图层。我们可以让按钮的复选框保持未选中状态，因为其父视图会为它建立图层。\n\
  \n现在保存所有内容，运行应用程序，我们将看到与之前完全相同的行为。因此，这个新版本以增加几行代码为代价实现了相同的结果。目前看来这似乎算不上什么优势。但别急，还有更多功能！通过动画类（如`CABasicAnimation`）进行的显式动画，让我们能够完成几项隐式动画无法实现的关键操作。\n\
  \n首先，我们可以设置动画的持续时间。在将动画添加到图层（使用`[[sender layer] addAnimation:a forKey:@\"position\"\
  ]`）之前，添加以下代码行，以使此动画运行得稍慢一些：\n\n```\na.duration = 1.0;\n```\n\n在代码就位的情况下*运行*，我们会看到按钮的过渡速度变慢了。我们还可以更改动画的节奏，使其不再严格按线性方式从一个点移动到下一个点。让我们将其设置为“缓入、缓出”运动，如下所示：\n\
  \n```\na.timingFunction = [CAMediaTimingFunction functionWithName:\n           \
  \         kCAMediaTimingFunctionEaseInEaseOut];\n```\n\n*现在运行*，我们会看到，当我们点击按钮时，它开始缓慢移动，然后逐渐加速并移动得更快，最终在接近目标时减速。在底层，这些时序函数通过提供一个从\
  \ 0.0 到 1.0 的值的简单映射来工作，使用一对控制点来描述两者之间的曲线。这听起来是不是很熟悉？这似乎正是我们在本章前半部分实现的曲线编辑控件的完美用途！我们可以使用曲线编辑器来定义每次点击按钮时将应用于按钮移动的时序。\n\
  \n首先，从之前的项目中添加`CECurveView`类文件。在*MovingButton*项目中，右键单击`MovingButton`文件夹，然后从上下文菜单中选择“将文件添加到“MovingButton””。导航到`CECurveView.h`和`CECurveView.m`的位置，选中它们，然后点击*添加*按钮。在出现的表单中，点击以打开“将项目复制到目标组的文件夹中”复选框，并确保在表单下部选中了*MovingButton*目标（参见图\
  \ 15-4）。\n\n![9781430245421_Fig15-04.jpg](img/9781430245421_Fig15-04.jpg)\n图 15-4.\
  \ 将现有文件添加到项目\n\n这次，我们不为该控件设置绑定，而是在控制器定义中添加一个出口，以便能够访问我们将要设置的`CECurveView`。修改`MBAppDelegate.h`，在此添加粗体行：\n\
  \n```\n#import <Cocoa/Cocoa.h>\n@class CECurveView;\n\n@interface MBAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet CECurveView *curveView;\n- (IBAction)move:(id)sender;\n\
  @end\n```\n\n现在在 Interface Builder 画布中重新打开`MainMenu.xib`。我们将添加一个小的`NSPanel`，作为按钮动画的检查器。从*对象库*中拖出一个`NSPanel`，然后向新面板中拖入一个自定义视图。将自定义视图的大小调整为\
  \ 100×100，并将其类更改为`CECurveView`。Interface Builder 中的 GUI 现在应该类似于图 15-5 所示。\n\n![9781430245421_Fig15-05.jpg](img/9781430245421_Fig15-05.jpg)\n\
  图 15-5. 添加一个`CECurveView`以配置我们的动画\n\n现在，将应用程序委托的`curveView`出口连接到我们刚刚创建的`CECurveView`实例，然后切换回`MBAppDelegate.m`文件。在应用程序委托实现文件的顶部某处导入`CECurveView`头文件，添加以下代码行：\n\
  \n```\n#import \"CECurveView.h\"\n```\n\n按如下方式更新`move:`方法：\n\n```\n- (IBAction)move:(id)sender\
  \ {\n    NSRect senderFrame = [sender frame];\n    NSRect superBounds = [[sender\
  \ superview] bounds];\n    CABasicAnimation *a = [CABasicAnimation\n           \
  \               animationWithKeyPath:@\"position\"];\n    a.fromValue = [NSValue\
  \ valueWithPoint:senderFrame.origin];\n    senderFrame.origin.x = (superBounds.size.width\
  \ -\n                            senderFrame.size.width)*drand48();\n    senderFrame.origin.y\
  \ = (superBounds.size.height -\n                            senderFrame.size.height)*drand48();\n\
  \n    a.toValue = [NSValue valueWithPoint:senderFrame.origin];\n    a.duration =\
  \ 1.0;\n    a.timingFunction = [CAMediaTimingFunction\n                        functionWithControlPoints:self.curveView.cp1X\n\
  \                        :self.curveView.cp1Y\n                        :self.curveView.cp2X\n\
  \                        :self.curveView.cp2Y];\n\n    // add it to the layer\n\
  \    [[sender layer] addAnimation:a forKey:@\"position\"];\n    [sender setFrame:senderFrame];\n\
  }\n```\n\n现在，每次用户点击*Move*按钮时，生成的动画的时序函数将由`CECurveView`控件中的值决定。保存文件，运行应用程序，我们应该会看到这种情况发生。拖动控制柄以创建不同的曲线形状，点击*Move*按钮，看看它如何移动。\n\
  \n## 动画分组\n\n我们现在已经初步了解了 Core Animation 的工作原理，但这是在一个让按钮在屏幕上随机移动的略显滑稽的背景下。这可不是我们推荐的\
  \ GUI 设计！在现实世界中，Core Animation 最常用于在不同视图之间制作过渡动画。你可能已经在 iPhone（Core Animation 最初为之构建的平台，之后才被“反向移植”到\
  \ Mac OS X）上反复看到过这种用法。iPhone 界面中所有平滑的滑动、缩放和淡入淡出效果都是通过 Core Animation 实现的。在 Mac OS\
  \ X 中，Core Animation 虽然不那么无处不在，但在诸如日历的周过渡以及 Mission Control 中的屏幕过渡等地方得到了很好的应用。在本节中，我们将通过将动画组合在一起以使其同时运行，来了解如何实现一些不错的过渡效果。\n\
  \n在 Xcode 中，创建一个名为*FlipIt*的新 Cocoa 项目，类前缀为`FI`。我们要做的是呈现一个 GUI，用户可以在其中切换多个“页面”，而\
  \ Core Animation 将在它们之间进行流畅的动画。我们将在 nib 文件的空窗口中使用一个框来显示内容页面，这些页面本身将保存在一个`NSTabView`中。我们不会显示选项卡视图本身，只是将其用作内容页面的便捷容器。\n\
  \n我们首先在`MainMenu.xib`中布局视图，因此在 Interface Builder 画布中打开该文件。\n\n\n\n从`Object Library`中拖拽一个按钮到\
  \ GUI 空白窗口的底部。然后复制该按钮，并将两个按钮分别命名为`Previous`和`Next`。将它们并排放置在窗口底部中央。在`FIAppDelegate.h`文件中打开一个`Assistant\
  \ Editor`窗格。在接下来的步骤中，我们将使用此`Assistant Editor`进行连接。首先，从每个按钮按住 Control 键拖拽到`Assistant\
  \ Editor`窗口，并创建名为`next`和`previous`的新操作，以匹配这两个按钮。最终结果应如图 Figure 15-6 所示。\n\n![9781430245421_Fig15-06.jpg](img/9781430245421_Fig15-06.jpg)\n\
  \nFigure 15-6. 准备窗口\n\n现在从`Object Library`中找到一个`NSBox`，将其拖拽到空白窗口中，放置在按钮上方，并调整其大小以填充屏幕大部分区域。使用`Attributes\
  \ Inspector`，通过将`Title Position`弹出菜单设置为`None`来移除盒子的标题（见图 Figure 15-7）。然后从盒子按住 Control\
  \ 键拖拽到`Assistant Editor`中的`FIAppDelegate.h`代码，并创建一个名为`box`的新输出口，以便我们可以从类中访问该盒子。\n\
  \n![9781430245421_Fig15-07.jpg](img/9781430245421_Fig15-07.jpg)\n\nFigure 15-7.\
  \ 显示窗口现已准备就绪\n\n我们的下一步操作是设置一组视图，用于在主视图中切换进出。我们将为此使用`NSTabView`，因为它可以方便地在 Xcode 中构建一系列视图，并在应用程序运行时作为离屏视图列表进行维护。在`Object\
  \ Library`中找到一个`NSTabView`，但将其一直拖拽到左侧，并放入`Object Dock`中，位于`App Delegate`和`Font Manager`对象下方。注意，选项卡视图会作为顶级图标出现在\
  \ nib 窗口中，与应用程序委托、窗口及其他项目并列（见图 Figure 15-8）。\n\n![9781430245421_Fig15-08.jpg](img/9781430245421_Fig15-08.jpg)\n\
  \nFigure 15-8. 这是一个不寻常的地方，但选项卡视图就在那里\n\n放置在 nib 文件顶层的选项卡视图（或任何其他`NSView`子类）在加载 nib\
  \ 时不会显示，但只要我们有一个指向它的输出口，就可以以任何方式访问和使用它，包括将其放入窗口的视图层级中。在我们的例子中，我们永远不会将选项卡视图本身显示出来，只显示它包含的内容视图。为了获取内容视图，我们需要将其连接到\
  \ App Delegate 类。从`Object Dock`中的选项卡视图按住 Control 键拖拽到`Assistant Editor`中的`FIAppDelegate.h`文件，并创建一个名为`tabView`的输出口，以便以后可以访问它。\n\
  \n双击`Object Dock`中的选项卡视图条目，可以看到选项卡视图在没有窗口的情况下显示，如 Figure 15-8 中 Interface Builder\
  \ 画布的底部所示。它仍然带有调整大小的框架，我们可以像调整窗口大小一样在 Interface Builder 中调整其大小。现在调整它的大小，使其与之前放入主窗口的`NSBox`大小大致相同。\n\
  \n现在让我们向这个选项卡视图中放入一些内容，即我们可以翻动的“页面”。默认情况下，选项卡视图只包含两个内容视图，但让我们增加这个数量（使用`Attributes\
  \ Inspector`），以便有更多视图可供切换。实际内容并不重要，只要每个页面有独特的元素，以便我们能够轻松看到内容从一页切换到下一页。一个好的开始是从`Object\
  \ Library`中抓取一个标签，给它一个漂亮的大号字体，并将其文本更改为单词“One”。然后复制此标签并粘贴到每个其他视图中（我们可以像往常一样使用顶部的选项卡在这些视图之间切换），每次相应地更改文本。为了增加趣味性，还可以为每个页面添加一些独特的项目（此处为一个表格视图，彼处为一组按钮），这样应用程序完成后，在页面间切换时我们将看到更多动态效果。\n\
  \n现在是完善控制器类界面的时候了，因此我们将注意力转向`FIAppDelegate.h`文件。它当前声明了三个属性。第一个连接到主窗口。另外两个是我们为需要管理的两个视图添加的：`tabView`（包含我们将要显示的视图的对象）和`box`（屏幕上用于显示这些视图的视图）。我们需要添加五个额外的属性。其中三个是`weak`属性，用于指向正在主动切换进出的视图。我们还需要添加一个`strong`属性来引用包含所有可用视图的选项卡视图数组，以及一个`NSInteger`标量属性来标识当前聚焦的视图。\n\
  \n将以下加粗的行添加到`FIAppDelegate.h`中以添加所有这些内容。\n\n```objectivec\n@interface FIAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet NSBox *box;\n@property (weak) IBOutlet NSTabView *tabView;\n\
  \n@property (weak) NSView *leftView;\n@property (weak) NSView *rightView;\n@property\
  \ (weak) NSView *middleView;\n@property (strong) NSArray *items;\n@property NSInteger\
  \ currentTabIndex;\n\n- (IBAction)previous:(id)sender;\n- (IBAction)next:(id)sender;\n\
  \n@end\n```\n\n现在让我们开始在`FIAppDelegate.m`中实现我们的应用程序委托类。这个类将包含许多方法，用于准备过渡：通过设置下一个视图显示在盒子的一侧、将新视图过渡到位置以及将当前视图过渡到另一侧。由于我们希望能够根据是向右还是向左翻转来进行双向过渡，因此每个方法都有两种形式：设置并执行向右翻转或向左翻转。此外，我们将实现两个启动过渡的操作方法，以及一个设置初始视图的启动方法（`applicationDidFinishLaunching:`）。如果您仍然同时打开了\
  \ Interface Builder 画布和 Assistant Editor，您可能希望关闭它们，并将`FIAppDelegate.m`作为 Xcode 中的主视图。\n\
  \n让我们首先创建一个预处理定义`ANIM_DURATION`，用于定义我们将要创建的动画的持续时间（以秒为单位）。通过将其放在文件顶部的一个位置，我们可以轻松地进行实验，调整此设置直到找到我们喜欢的速度。定义如下：\n\
  \n```objectivec\n#define ANIM_DURATION 1.0\n```\n\n现在让我们继续实现`applicationDidFinishLaunching:`方法。在此方法中，我们从`tabView`获取视图列表，并将其存储在我们的`items`属性中。`items`属性需要是`strong`引用，因为`tabView`返回的是其内部数组的副本，而不是数组本身的引用。这意味着我们的代码现在拥有`tabViewItems`调用返回的`NSArray`的所有权。如果我们不将其放入`strong`引用中，则数组副本将没有任何强引用，并且在自动引用计数清理时会被释放。\n\
  \n我们还设置`currentTabIndex`指向数组的末尾，以便第一个项目能够对齐（稍后会详细介绍）。然后我们调用第一个内部方法`prepareRightSide`，该方法将设置下一个视图以显示在盒子的右侧。然后我们使用`ANIM_DURATION`值，用它来指定我们在当前动画上下文中创建的任何动画的持续时间。\n\
  \n\n\n然后我们调用另一个内部方法 `transitionInFromRight`，它会启动动画，将下一个视图移动到正确的位置。最后，我们将 `currentTabIndex`\
  \ 设置为指向第零项（`items` 数组中的第一个对象）。\n\n```\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    self.items = [self.tabView tabViewItems];\n    self.currentTabIndex\
  \ = [self.items count]-1;\n    [self prepareRightSide];\n    [[NSAnimationContext\
  \ currentContext] setDuration:ANIM_DURATION];\n    [self transitionInFromRight];\n\
  \    self.currentTabIndex = 0;\n    self.middleView = self.rightView;\n}\n```\n\n\
  当你输入这些代码时，Xcode 会抱怨找不到名为 `prepareRightSide` 和 `transitionInFromRight` 的方法。所以，我们现在就来编写这两个内部方法的代码。我们无需费心将这些方法放入单独的协议或其他东西中。在\
  \ Objective-C 中，代码可以自由调用同一 `@implementation` 块中声明的任何其他方法，即使这些方法没有在任何 `@interface`\
  \ 中声明，因此我们只需将这些内部方法放在 `@implementation` 块中的某个位置——`applicationDidFinishLaunching:`\
  \ 的实现下方就是一个好位置。\n\n其中第一个方法 `prepareRightSide` 首先确定要显示的下一个视图的索引。我们通过将 `currentTabIndex`\
  \ 加一，然后对新索引进行简单的边界检查来计算这个索引，如果索引过高则将其重置为零。然后我们使用该索引获取下一个视图，并将其 frame 设置为与 `box`\
  \ 相同的大小，但向右偏移正好 `box` 的宽度，使其刚好不可见。我们将其 alpha 值设置为 `0.0`，使其实际上不可见，最后我们将该视图添加为 `box`\
  \ 的子视图，这样它就能实际显示出来了。\n\n```\n- (void)prepareRightSide {\n    NSInteger nextTabIndex\
  \ = self.currentTabIndex + 1;\n    if (nextTabIndex >= [self.items count])\n   \
  \     nextTabIndex = 0;\n\n    self.rightView = [[self.items objectAtIndex:nextTabIndex]\
  \ view];\n\n    NSRect viewFrame = [self.box bounds];\n    viewFrame.origin.x +=\
  \ viewFrame.size.width;\n\n    [self.rightView setFrame:viewFrame];\n    [self.rightView\
  \ setAlphaValue:0.0];\n    [self.box addSubview:self.rightView];\n}\n```\n\n下一个方法\
  \ `transitionInFromRight` 会获取 `rightView` 并将其滑动到位，使其完美贴合 `box` 提供的空间。它还将 alpha 值设置为\
  \ `1.0`，使其完全不透明。请注意，与上一个方法不同，这里使用了 `rightView` 的 `animator` 方法来访问视图的动画代理，这样设置这些值就能为我们创建隐式动画。\n\
  \n```\n- (void)transitionInFromRight {\n    [[self.rightView animator] setFrame:[self.box\
  \ bounds]];\n    [[self.rightView animator] setAlphaValue:1.0];\n}\n```\n\n在继续之前，我们先检查一下工作成果。运行应用程序，你会看到标签视图中的第一个项目滑动到位，并从不可见状态淡入到完全不透明状态，如图\
  \ 15-9 所示。\n\n![9781430245421_Fig15-09.jpg](img/9781430245421_Fig15-09.jpg)  \n\n\
  图 15-9. 第一个“页面”正在滑入视野。请注意盒子中对象略显淡化的外观，此时它们都处于约 50% 的不透明度\n\n这是一个开始！现在让我们继续列表中的下一项：为\
  \ `next:` 方法提供实现。这段代码的某些部分与我们在 `applicationDidFinishLaunching:` 方法中的代码类似。我们准备右侧，启动一些过渡（包括调用另一个新的内部方法\
  \ `transitionOutToLeft`，我们稍后会实现它），并在最后更新索引（包括另一次边界检查）和一些指针。\n\n这里最大的不同在于，执行动画的方法都被夹在\
  \ `[NSAnimationContext beginGrouping]` 和 `[NSAnimationContext endGrouping]` 调用之间，这两个调用协同工作形成一种事务。在这两个调用之间，任何添加到默认动画上下文中的动画，包括所有隐式动画，都将被设置为同时运行。这意味着当我们在内部方法中创建隐式动画时，它们都会被设置为同时触发。如果没有这一步，我们创建的动画将按创建顺序一个接一个地顺序运行。通常情况下，这不会有太大区别，但完全有可能在创建这些动画时发生一些意外事件，例如另一个进程突然占用\
  \ CPU，这可能导致这些动画以轻微交错的方式运行，在开始和结束时间上出现差异。通过像这样将它们包装在一个分组中，就消除了这个潜在问题。\n\n```\n- (IBAction)next:(id)sender\
  \ {\n    [self prepareRightSide];\n\n    [NSAnimationContext beginGrouping];\n \
  \   [[NSAnimationContext currentContext] setDuration:ANIM_DURATION];\n    [self\
  \ transitionInFromRight];\n    [self transitionOutToLeft];\n    [NSAnimationContext\
  \ endGrouping];\n\n    self.currentTabIndex++;\n    if (self.currentTabIndex >=\
  \ [self.items count])\n        self.currentTabIndex = 0;\n    self.leftView = self.middleView;\n\
  \    self.middleView = self.rightView;\n}\n```\n\n`next:` 方法还调用了另一个内部方法 `transitionOutToLeft`，该方法会将当前视图向左移出。其实现如下所示：\n\
  \n```\n- (void)transitionOutToLeft {\n    NSRect newFrame = [self.middleView frame];\n\
  \    newFrame.origin.x -= newFrame.size.width;\n    [[self.middleView animator]\
  \ setFrame:newFrame];\n    [[self.middleView animator] setAlphaValue:0.0];\n}\n\
  ```\n\n完成这些后，我们现在可以再次运行了。这次我们会看到，不仅初始视图设置正常工作，而且我们还可以点击 **Next** 按钮来过渡到下一个视图！非常流畅。见图\
  \ 15-10。\n\n![9781430245421_Fig15-10.jpg](img/9781430245421_Fig15-10.jpg)  \n\n\
  图 15-10. 视图三正在退出，视图四几乎已经进入一半\n\n现在剩下的就是为向右的过渡实现匹配的方法。这些方法与前面的方法都非常相似，此处直接给出，不再赘述，但有一点需要注意：你可能会想复制粘贴现有的方法，然后找出需要修改的地方，但一定要小心！有些差异很细微但却很重要。\n\
  \n```\n- (void)prepareLeftSide {\n    NSInteger previousTabIndex = self.currentTabIndex-1;\n\
  \    if (previousTabIndex < 0)\n        previousTabIndex = [self.items count]-1;\n\
  \n    self.leftView = [[self.items objectAtIndex:previousTabIndex] view];\n\n  \
  \  NSRect viewFrame = [self.box bounds];\n    viewFrame.origin.x -= viewFrame.size.width;\n\
  \n    [self.leftView setFrame:viewFrame];\n    [self.leftView setAlphaValue:0.0];\n\
  \    [self.box addSubview:self.leftView];\n}\n\n- (void)transitionInFromLeft {\n\
  \    [[self.leftView animator] setFrame:[self.box bounds]];\n    [[self.leftView\
  \ animator] setAlphaValue:1.0];\n}\n\n- (void)transitionOutToRight {\n    NSRect\
  \ newFrame = [self.middleView frame];\n    newFrame.origin.x += [self.box bounds].size.width;\n\
  \    [[self.middleView animator] setFrame:newFrame];\n    [[self.middleView animator]\
  \ setAlphaValue:0.0];\n}\n\n- (IBAction)previous:(id)sender {\n    [self prepareLeftSide];\n\
  \n    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext currentContext]\
  \ setDuration:ANIM_DURATION];\n    [self transitionInFromLeft];\n    [self transitionOutToRight];\n\
  \    [NSAnimationContext endGrouping];\n\n    self.currentTabIndex--;\n    if (self.currentTabIndex\
  \ < 0)\n        self.currentTabIndex = [self.items count]-1;\n    self.rightView\
  \ = self.middleView;\n    self.middleView = self.leftView;\n}\n```\n\n\n\n`currentTabIndex\
  \ = [self.items count]-1`;  \n`self.rightView = self.middleView`;  \n`self.middleView\
  \ = self.leftView`;  \n\n```\n现在点击*运行*；我们应该能够实现双向转场动画了。\n```\n\n## 总结\n\n希望前一章和本章为你打下了坚实的\
  \ Cocoa 绘图技术基础，包括贝塞尔曲线的多种用法、通过鼠标使视图可交互、以及利用 Core Animation 实现相当轻松的动画。本书的篇幅不允许我们深入探讨这些主题，但要知道，尤其是在图形和动画领域，唯一的限制就是你的想象力！我们提供了基本工具。如果你想在图形方面有更多作为，应该深入探索你最感兴趣的领域，看看你能用\
  \ Cocoa 提供的 API 实现什么。这才是真正的乐趣所在！\n\n## 第 16 章\n\n"
- "# 文件操作\n\n大多数应用程序都需要以某种方式处理存储在磁盘上的文件。到目前为止，本书实际上并未深入探讨这个主题（除了对 Core Data 及其数据存储的一点讨论），所以现在让我们来弥补这个缺失。Cocoa\
  \ 实际上包含几个非常有用的类，可以以多种方式处理文件。有些类提供的 API 模拟了用户在 Finder 中通常能执行的操作，另一些类则以抽象方式表示文件。还有一些类内置了读写文件的功能。本章将概述这些机制的工作原理。\n\
  \n### 隐式文件访问\n\nCocoa 中的几个类，例如 `NSString`、`NSData`、`NSArray` 和 `NSDictionary`，提供了直接从文件读取数据或将内容写入文件的方法，只需使用包含文件完整路径的字符串即可。例如，如果我们想将整个文件内容读入一个字符串，可以像这样简单地实现：\n\
  \n```\nNSError *myError;\nNSStringEncoding encoding;\nNSString *myString = [NSString\
  \ stringWithContentsOfFile:@\"/path/to/something\"\n                      usedEncoding:&encoding\
  \ error:&myError];\n```\n\n这段代码会自动处理打开文件并读取其内容的繁琐工作。它甚至能告诉我们解释文件内容为字符串时使用了哪种文本编码，并反馈发生的任何错误，但前提是我们为第二和第三个参数传入非`NULL`值。除了与文件相关的错误（例如访问权限不足）外，此方法还能报告与将数据处理为字符串相关的错误，例如当文件包含二进制数据时的文本编码错误。本章后面我们将看到它的实际应用。\n\
  \n`NSArray` 和 `NSDictionary` 有类似的方法，但由于某种原因，它们不包含 `NSString` 那样的错误报告机制，因此如果失败，它们只会返回一个\
  \ `nil` 指针，让你无从得知原因。这些方法也更具专用性，因为它们旨在从 Apple 专有的属性列表格式存储的文件中读取值。`NSDictionary` 的\
  \ `dictionaryWithContentsOfFile:` 类方法的一个常见用途是从文本编辑器或 Xcode 的 plist 编辑器中创建的配置文件中读取数据。Cocoa\
  \ 还包含一个名为 `NSPropertyListSerialization` 的专用类来处理属性列表格式。如果我们需要以通用方式解析属性列表，并希望获得完整的错误报告和更多控制权，我们可以使用其类方法\
  \ `propertyListWithData:options:format:error:`。\n\n在本节开头提到的类中，`NSData` 提供了最通用的文件访问方式。它可以读取磁盘上的任何类型的数据，并将其表示为字节数组供我们使用。这是处理二进制数据的理想方式。\n\
  \n`NSData` 甚至提供了一个选项，用于提示应将文件映射到虚拟内存中（以防我们已知文件非常大，不希望一次性全部加载到内存中），如下所示：\n\n```\n\
  NSData *myData = [NSData dataWithContentsOfFile:@\"/path/to/something\"\n      \
  \                options:NSDataReadingMappedIfSafe error: &myError];\n```\n\n这里提到的每个类都包含一个名为\
  \ `writeToFile:atomically:` 的方法，其第二个参数是一个 `BOOL` 值，指定是否应先将数据写入一个辅助文件，待所有数据写入完成后，再用该辅助文件替换原始文件。`NSString`\
  \ 的这个方法版本实际上已被弃用，因此我们应该改用 `writeToFile:atomically:encoding:error:`，它强制我们指定要使用的文本编码，并让我们有机会检查可能发生的任何错误。`NSData`\
  \ 提供了类似的 `writeToFile:options:error:`，它同样让我们可以在写入文件时查看发生的任何错误。\n\n### 高级文件操作\n\n\
  除了基本的文件读写功能外，Cocoa 还提供了许多类，让我们能够以类似于 Finder 处理文件的方式来处理文件。我们可以访问文件系统属性、获取文件图标、查看默认打开此文件的应用程序等。本章的剩余部分将通过一个名为“关于那个文件？”的新应用程序（见图\
  \ 16-1）来探讨其中一些功能。\n\n![9781430245421_Fig16-01.jpg](img/9781430245421_Fig16-01.jpg)\n\
  \n图 16-1 . 完成的“关于那个文件？”应用程序\n\n此应用程序允许用户选择一个文件，然后显示该文件的一些信息，以及以字符串形式显示的文件内容。如果文件包含无法表示为字符串的数据，它会告知用户。否则，用户可以使用一个包含的下拉列表来更改读取磁盘文件时使用的文本编码，并显示生成的字符串。\n\
  \n### “关于那个文件？”：代码实现\n\n使用 Xcode 创建一个新的 Cocoa 应用程序（这次不启用文档支持或 Core Data），命名为 `WhatAboutThatFile`，并执行常规步骤，确保启用了\
  \ ARC 并为项目分配了一个类前缀，这里使用 `WAT`。这将创建一个简单的项目，仅包含一个 `WATAppDelegate` 类和一个名为 `MainMenu.xib`\
  \ 的 xib 文件。在前面的章节中，我们一步步地构建应用程序，但现在我们已经走到了这一步，让我们来处理更大的应用程序代码块。我们将呈现应用程序的完整代码，并穿插一些注释，然后描述如何使用\
  \ Cocoa 绑定在 Interface Builder 中连接所有内容。首先，这是应用程序委托的头文件，它声明了大量用于通过 Cocoa 绑定访问值的属性。它还声明了一个动作方法，允许用户从菜单中打开一个文件。\n\
  \n```\n//\n//  WATAppDelegate.h\n//\n\n#import <Cocoa/Cocoa.h>\n\n@interface WATAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  \n@property (strong) NSFileWrapper *fileWrapper;\n@property (strong) NSURL *fileURL;\n\
  @property (assign) NSStringEncoding chosenEncoding;\n\n@property (readonly) NSDictionary\
  \ *fileAttributes;\n@property (readonly) NSString *filename;\n@property (readonly)\
  \ NSImage *fileIcon;\n@property (readonly) NSImage *opensAppIcon;\n@property (readonly)\
  \ NSString *opensAppName;\n@property (weak) NSString *stringEncodingName;\n@property\
  \ (readonly) NSString *fileStringValue;\n@property (readonly) NSDictionary *encodingNames;\n\
  \n- (IBAction)chooseFile:(id)sender;\n\n@end\n```\n\n现在让我们转到 `.m` 文件。默认情况下，它包含 `applicationDidFinishLaunching:`\
  \ 方法，但我们不需要在应用程序运行时配置任何东西，所以可以忽略它，继续我们自己的业务。\n\n\n\n`chooseFile:` 方法使用 `NSOpenPanel`\
  \ 类来让用户选择要检查的文件。如果用户确实选择了文件，我们会根据所选内容设置所有实例变量。`chosenEncoding` 属性类型为 `NSStringEncoding`（本质上就是一个无符号整数），被设置为\
  \ `0`。这不是一个有效的字符串编码类型，因此我们可以在后续阶段让系统尝试为我们推断字符串编码类型。之后，我们根据打开面板中的选择设置 `fileURL`，最后设置\
  \ `fileWrapper`，这是 `NSFileWrapper` 类的一个实例，它简单地封装了一个文件，并让我们根据 `fileURL` 的值获取一些关于它的元数据。如果所选文件存在问题，我们还包含了一些错误处理逻辑。\n\
  \n```objc\n- (IBAction)chooseFile:(id)sender {\n    NSOpenPanel *openPanel = [NSOpenPanel\
  \ openPanel];\n    [openPanel setCanChooseFiles:YES];\n    [openPanel setCanChooseDirectories:NO];\n\
  \    [openPanel setResolvesAliases:NO];\n    [openPanel setAllowsMultipleSelection:NO];\n\
  \    if ([openPanel runModal] == NSFileHandlingPanelOKButton) {\n        self.chosenEncoding\
  \ = 0;\n        self.fileURL = [openPanel URL];\n        NSError *fileError;\n \
  \       self.fileWrapper = [[NSFileWrapper alloc] initWithURL:self.fileURL\n   \
  \                                                   options:0\n                \
  \                                        error:&fileError];\n        if (!self.fileWrapper)\
  \ {\n            NSRunAlertPanel(@\"Couldn't access file\",\n                  \
  \          [fileError localizedDescription], nil, nil, nil);\n        }\n    }\n\
  }\n```\n\n接着，我们有 `filename` 和 `fileIcon` 方法，这些方法将被窗口中最上层的 GUI 对象读取。请注意，这种读取是通过 Cocoa\
  \ 绑定进行的，因此我们采用提供名为 `keyPathsForValuesAffectingFilename` 和 `keyPathsForValuesAffectingFileIcon`\
  \ 的类方法的惯例，以确保对某个绑定友好值的更改会导致另一个值被重新获取。我们上一次使用这种技术是在 Core Data 模型类的上下文中，但它在这里同样适用，确保每当\
  \ `fileURL` 或 `fileWrapper` 值发生变化时，任何将其内容绑定到 `filename` 或 `fileIcon` 的视图都会自动重新加载其内容。`filename`\
  \ 和 `fileIcon` 方法都使用先前创建的 `fileWrapper` 来访问要显示的值。\n\n```objc\n+ (NSSet *)keyPathsForValuesAffectingFilename\
  \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
  \n- (NSString *)filename {\n    return [self.fileWrapper filename];\n}\n\n+ (NSSet\
  \ *)keyPathsForValuesAffectingFileIcon {\n    return [NSSet setWithObjects:@\"fileURL\"\
  , @\"fileWrapper\", nil];\n}\n\n- (NSImage *)fileIcon {\n    return [self.fileWrapper\
  \ icon];\n}\n```\n\n我们提供了类似的功能来显示关于应用程序的信息，该应用程序将在用户于 Finder 中双击所选文件时启动。这次，我们使用的是\
  \ `NSWorkspace` 类，它代表与 Finder 本身类似的东西。`NSWorkspace` 可以做很多事情，例如启动应用程序和操作文件。在 `opensAppName`\
  \ 中，我们使用工作区来获取作为所选文件默认“打开程序”的应用程序名称。在 `opensAppIcon` 中，我们做同样的事情，然后向工作区请求该应用程序的图标。我们再次使用\
  \ `keyPathsForValuesAffectingXxx` 惯例来确保在选择新文件时这些值会被正确刷新。\n\n```objc\n+ (NSSet *)keyPathsForValuesAffectingOpensAppName\
  \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
  \n- (NSString *)opensAppName {\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
  \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path application:&appName\
  \ type:NULL];\n    return appName;\n}\n\n+ (NSSet *)keyPathsForValuesAffectingOpensAppIcon\
  \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
  \n- (NSImage *)opensAppIcon {\n    NSWorkspace *workspace = [NSWorkspace sharedWorkspace];\n\
  \    NSString *appName = nil;\n    [workspace getInfoForFile:self.fileURL.path application:&appName\
  \ type:NULL];\n    return appName ? [workspace iconForFile:appName] : nil;\n}\n\
  ```\n\n在接下来的代码片段中，`fileAttributes` 访问器返回一个字典，该字典来自 `fileWrapper`。这个字典包含十几个或多个文件系统属性，将通过使用\
  \ `NSDictionaryController` 在 GUI 的表格视图中显示。\n\n```objc\n+ (NSSet *)keyPathsForValuesAffectingFileAttributes\
  \ {\n    return [NSSet setWithObjects:@\"fileURL\", @\"fileWrapper\", nil];\n}\n\
  \n- (NSDictionary *)fileAttributes {\n    return [self.fileWrapper fileAttributes];\n\
  }\n```\n\n现在我们进入字符串编码这个稍微棘手的问题。如前所述，`NSString` 提供了从文件读取字符串并猜测应使用哪种字符串编码的功能。这在大多数情况下可能是正确的，但有时，可以说，通过另一套不同的镜片来查看字符串的内容可能会很有用。例如，看看一个现代的\
  \ UTF8 文档在某个其他平台上没有字符串编码概念且始终使用其唯一可用字符串编码的古老应用程序中会如何显示，可能会很有启发性。\n\n我们首先定义 `encodingNames`\
  \ 方法。此方法将为 GUI 中的弹出按钮提供所有系统定义的编码名称列表，并且还将作为内部查找机制，用于在编码名称与其代码级表示 `NSStringEncoding`\
  \ 类型之间进行映射。作为键，此字典使用每个编码的数值，这些数值包装在 `NSString` 中。您可能会认为，考虑到这些值的数值性质，将它们包装在 `NSNumber`\
  \ 对象中会更合理，如果不是因为一个小问题，您是对的：如果您在键值观察者上下文中使用 `NSDictionary`，例如 Cocoa 绑定，您*必须*使用字符串作为键！因为我们正在使用此字典通过\
  \ Cocoa 绑定填充一个对象，所以我们正在这样做。\n\n```objc\n- (NSDictionary *)encodingNames {\n    static\
  \ NSDictionary *encodingNames = nil;\n    if (!\n```\n\n\n`encodingNames) {  \n\
  \    encodingNames = @{@\"1\" : @\"NSASCIIStringEncoding\",  \n                \
  \      @\"2\" : @\"NSNEXTSTEPStringEncoding\",  \n                      @\"3\" :\
  \ @\"NSJapaneseEUCStringEncoding\",  \n                      @\"4\" : @\"NSUTF8StringEncoding\"\
  ,  \n                      @\"5\" : @\"NSISOLatin1StringEncoding\",  \n        \
  \              @\"6\" : @\"NSSymbolStringEncoding\",  \n                      @\"\
  7\" : @\"NSNonLossyASCIIStringEncoding\",  \n                      @\"8\" : @\"\
  NSShiftJISStringEncoding\",  \n                      @\"9\" : @\"NSISOLatin2StringEncoding\"\
  ,  \n                      @\"10\" : @\"NSUnicodeStringEncoding\",  \n         \
  \             @\"11\" : @\"NSWindowsCP1251StringEncoding\",  \n                \
  \      @\"12\" : @\"NSWindowsCP1252StringEncoding\",  \n                      @\"\
  13\" : @\"NSWindowsCP1253StringEncoding\",  \n                      @\"14\" : @\"\
  NSWindowsCP1254StringEncoding\",  \n                      @\"15\" : @\"NSWindowsCP1250StringEncoding\"\
  ,  \n                      @\"21\" : @\"NSISO2022JPStringEncoding\",  \n       \
  \               @\"30\" : @\"NSMacOSRomanStringEncoding\",  \n                 \
  \     @\"2415919360\" : @\"NSUTF16BigEndianStringEncoding\",  \n               \
  \       @\"2483028224\" : @\"NSUTF16LittleEndianStringEncoding\",  \n          \
  \            @\"2348810496\" : @\"NSUTF32StringEncoding\",  \n                 \
  \     @\"2550137088\" : @\"NSUTF32BigEndianStringEncoding\",  \n               \
  \       @\"2617245952\" : @\"NSUTF32LittleEndianStringEncoding\"};  \n    }  \n\
  \    return encodingNames;  \n}\n```\n\n接下来，我们继续处理字符串编码相关的工作，定义 `stringEncodingName`\
  \ 的访问器，这次还会添加一个设置器（因为该值可通过弹出按钮进行设置）。和之前一样，我们实现 `keyPathsForValuesAffectingStringEncodingName`，并将\
  \ `chosenEncoding` 添加为需要监听的键之一。\n\n`stringEncodingName` 方法有两条主要执行路径。如果 `chosenEncoding`\
  \ 已经设置（即用户从弹出列表中选择了编码），我们就简单地从之前定义的字典中查找所选编码的名称。否则，就需要使用 `stringWithContentsOfFile:usedEncoding:error:`\
  \ 实际读取文件内容，并利用得到的编码在字典中查找该编码的名称（如果未能发现任何编码，则返回简要的问题描述）。\n\n`setStringEncodingName:`\
  \ 方法相当简单。我们在字典中进行反向查找，找到与所选编码对应的键（一个包含编码整数值的字符串）。当用户在弹出菜单中选择编码名称时，会调用此方法。\n\n```\n\
  + (NSSet *)keyPathsForValuesAffectingStringEncodingName {  \n    return [NSSet setWithObjects:@\"\
  fileURL\", @\"fileWrapper\",  \n            @\"chosenEncoding\", nil];  \n}  \n\n\
  - (NSString *)stringEncodingName {  \n    if (!self.fileURL) return nil;  \n   \
  \ if (self.chosenEncoding != 0) {  \n        return [[self encodingNames] objectForKey:\
  \  \n                @(self.chosenEncoding).stringValue];  \n    } else {  \n  \
  \      NSStringEncoding encoding = 0;  \n        NSError *err = nil;  \n       \
  \ [NSString stringWithContentsOfFile:self.fileURL.path  \n                     \
  \         usedEncoding:&encoding error:&err];  \n        if (encoding==0) {  \n\
  \            return @\"No encoding detected.  Perhaps a binary file?\";  \n    \
  \    }  \n        return [[self encodingNames] objectForKey:  \n               \
  \ @(self.chosenEncoding).stringValue];  \n    }  \n}  \n\n- (void)setStringEncodingName:(NSString\
  \ *)name {  \n    NSString *key = [[[self encodingNames] allKeysForObject:name]\
  \  \n                     lastObject];  \n    self.chosenEncoding = [key longLongValue];\
  \  \n}\n```\n\n最后，是 `fileStringValue` 及其对应的 `keyPathsForValuesAffectingFileStringValue`\
  \ 方法。这里同样有两条主要代码路径。第一种情况，当 `chosenEncoding` 已设置时，我们会尝试使用所选编码从指定文件中读取字符串值。\n\n另一种情况，当未选择编码时，会尝试读取字符串值，但让系统自行判断使用哪种编码。无论哪种情况，我们都会进行一些错误检查，并在遇到特定字符串编码错误时显示一个警告面板。\n\
  \n```\n+ (NSSet *)keyPathsForValuesAffectingFileStringValue {  \n    return [NSSet\
  \ setWithObjects:@\"fileURL\", @\"fileWrapper\",  \n            @\"chosenEncoding\"\
  , nil];  \n}  \n\n- (NSString *)fileStringValue {  \n    if (!self.fileURL) return\
  \ nil;  \n    NSError *err = nil;  \n    NSString *value = nil;  \n    if (self.chosenEncoding\
  \ != 0) {  \n        value = [NSString stringWithContentsOfFile:self.fileURL.path\
  \  \n                                          encoding:self.chosenEncoding error:&err];\
  \  \n    } else {  \n        NSStringEncoding encoding = 0;  \n        value = [NSString\
  \ stringWithContentsOfFile:self.fileURL.path  \n                               \
  \       usedEncoding:&encoding error:&err];  \n    }  \n    if (err)  {  \n    \
  \    if ([err code]==NSFileReadInapplicableStringEncodingError &&  \n          \
  \  [[err domain] isEqual:NSCocoaErrorDomain]) {  \n            NSRunAlertPanel(@\"\
  Invalid string encoding\",  \n                            [err localizedDescription],\
  \ nil, nil, nil);  \n        }  \n        NSLog(@\"encountered error: %@\", err);\
  \  \n    }  \n    return value;  \n}\n```\n\n## 文件部分呢：GUI\n\n代码部分就这些了。现在让我们设置图形用户界面（GUI）。打开\
  \ `MainMenu.xib`，我们需要先建立连接，以便菜单项可以调用我们应用程序委托的 `chooseFile:` 方法。打开主 Nib 编辑区域内的菜单，进入\
  \ *文件* 菜单，按住 Ctrl 键从 *打开* 项拖一条连接线到主 Nib 窗口中代表应用程序委托的图标上。然后从弹出的小菜单中选择 `chooseFile:`。\n\
  \n现在可以开始构建窗口本身了，双击坞中的窗口图标，使其显示在编辑区域中。这个 GUI 完全由 Cocoa 绑定（Cocoa Bindings）驱动。我们的控制器没有任何输出口指向此窗口中的任何对象，该窗口中的任何内容也不会调用我们控制器中的任何操作方法。我们将逐个介绍所有绑定，但首先，请查看\
  \ 图 16-2，它展示了在 Interface Builder 中看到的完整窗口视图，所有对象均已选中。\n\n![9781430245421_Fig16-02.jpg](img/9781430245421_Fig16-02.jpg)\n\
  \n图 16-2 .  我们所有的窗口组件，已高亮显示以便查看\n\n请注意，在表格视图和大文本视图之间有一个小的“凹陷”。这实际上是 `NSSplitView`\
  \ 的可拖拽控件，它允许我们将两个视图垂直或水平堆叠，并通过一次拖拽同时调整两者大小。这种控件在 Xcode 和其他地方经常使用，稍后我们将看到如何在此处进行设置。\n\
  \n现在，让我们开始一个部分、一个部分地创建这个窗口，并一路连接好所有绑定。前几个对象最终应该看起来像 图 16-3 所示，所以可以先往前看一下以获取一些指导。在窗口顶部附近，放置几个标签，并将左侧标签的标题改为“已选文件:”。然后在它们之间放置一个\
  \ `NSImageView`。要找到这个类，请在 *库* 中搜索“NSImageView”、“image well”或“image view”。通过选中左侧标签，然后从菜单中选择\
  \ **编辑** ![image](img/arrow.jpg) **格式** ![image](img/arrow.jpg) **字体** ![image](img/arrow.jpg)\
  \ **粗体**，使其文字以粗体显示，并将右侧的标签拉伸，使其几乎延伸到窗口的右边缘。我们希望由图像视图显示的文件图标看起来像是悬浮在窗口背景之上，因此选中该图像视图，并使用\
  \ *属性检查器*，在 *边框* 弹出菜单中选择 *无* 来移除其边框。\n\n\n\n此外，还需将“缩放”弹出菜单改为“按比例放大或缩小”，这样一来，无论系统提供的是小图标还是大图标，它都会缩放以适应当前可用空间。此时的\
  \ GUI 应如图 16-3 所示。\n\n![9781430245421_Fig16-03.jpg](img/9781430245421_Fig16-03.jpg)\
  \ 图 16-3. 用于显示所选文件图标和路径的 GUI。此截图已选中图像视图；否则它将不可见。\n\n现在，是时候为图像视图和右侧标签设置绑定了。选中图像视图，打开*绑定检查器*，使用\
  \ `self.fileIcon` 键路径将其*值*绑定到应用委托。然后选中右侧的标签，使用 `self.filename` 键路径将其*值*绑定到应用委托。\n\
  \n窗口的下一个部分看起来就像我们之前创建的一样。实际上，添加这些对象最快的方法是通过拖拽一个框选中上述三个对象，按下 ![images](img/arrow3.jpg)*D*\
  \ 复制选中的对象，然后将新对象拖到下方，与之前的对象对齐。将新左侧标签的标题改为“打开应用：”，并在必要时调整其位置。图 16-4 展示了此效果。\n\n![9781430245421_Fig16-04.jpg](img/9781430245421_Fig16-04.jpg)\
  \ 图 16-4. GUI 的这一部分将让我们看到文件将使用哪个应用打开。此处两个图像视图都显示出来了，否则，就像之前一样，它们会不可见。\n\n重新配置新图像视图的绑定，使用\
  \ `self.opensAppIcon` 键路径将其*值*连接到应用委托，然后将右侧标签的*值*使用 `self.opensAppName` 键路径连接到应用委托。\n\
  \n接下来，我们继续处理表格视图。从库中拖出一个表格视图，并将其加宽以匹配图 16-5。\n\n![9781430245421_Fig16-05.jpg](img/9781430245421_Fig16-05.jpg)\
  \ 图 16-5. 这里我们将显示文件的所有属性。\n\n这个表格视图将包含系统提供给我们的所有文件属性。这些属性以字典形式提供，这正好是 Apple 的 `NSDictionaryController`\
  \ 类的理想用途。使用 `NSDictionaryController`，我们只需通过 Cocoa 绑定进行连接，就能在表格视图中将所选文件的所有属性以键值对的形式显示出来。\n\
  \n在*库*中搜索 `NSDictionaryController`，并拖一个到 Interface Builder 的停靠栏中，以将其添加到 nib 文件中。然后点击停靠栏中其图标旁边的文本，将其重命名为\
  \ `attrDict`，以便稍后绑定时能轻松识别。与其他包含的控制器类一样，字典控制器类能够通过绑定获取其内容。使用*绑定检查器*将其*内容字典*（位于*控制器内容*组中）绑定到应用委托的\
  \ `self.fileAttributes` 键路径。\n\n现在，我们只需将表格视图的列绑定到新的控制器。选中左列，使用*绑定检查器*将其*值*列绑定到 `attrDict`，使用\
  \ `arrangedObjects` 作为控制器键，`key` 作为键路径。这将使左列显示字典中每个键值对的键。现在选中右列，将其*值*列绑定到 `attrDict`，使用\
  \ `arrangedObjects` 作为*控制器键*，`value` 作为*模型键路径*。\n\n接下来，从*库*中抓取一个 `NSTextView` 并将其拖入我们正在创建的窗口中，放置在靠近底部的位置。我们的窗口开始显得有些拥挤了！减小表格视图和文本视图的高度，使它们能够舒适地上下排列，并在下方留出相当大的空间，因为我们后面会用到。\n\
  \n然后调整文本视图的大小，使其宽度与表格视图相同。所有这些都显示在图 16-6 中。\n\n![9781430245421_Fig16-06.jpg](img/9781430245421_Fig16-06.jpg)\
  \ 图 16-6. 将文本视图正确放置在表格视图下方后，窗口应呈现的样子。\n\n当我们从*库*中拖出一个文本视图时，它实际上包含在一个滚动视图中，因此需要额外点击一次以选中滚动视图内部的文本视图。然后使用*属性检查器*取消选中*可编辑*复选框（我们只想在此处显示文件内容，而非编辑它）以及*富文本*复选框。现在是引入\
  \ `NSSplitView` 的好时机，正如之前所暗示的那样。确保表格视图和文本视图（实际上是包含它的滚动视图）大小大致相同，并上下对齐。然后同时选中它们，从菜单中选择**编辑器**\
  \ ![image](img/arrow.jpg) **嵌入于** ![image](img/arrow.jpg) **分割视图**。这样做会将它们紧密排列，并在它们之间绘制一个小小的凹痕。\n\
  \n现在再次仅选中文本视图。请记住，我们可以通过按住 Shift-Ctrl 点击文本视图，然后从显示的对象堆栈中选择文本视图，来避免在视图层次结构中选中正确对象时的歧义和额外步骤。切换到*绑定检查器*，将文本视图的*值*绑定到应用委托的\
  \ `self.fileStringValue` 键路径。\n\n最后，我们为字符串编码列表提供一个 GUI，用于重新解释所选文件的内容。为此，我们需要从库中获取一个标签和一个弹出按钮。按照显示的方式布局它们，包括超宽的弹出按钮，因为列表中的一些条目会非常长（参见图\
  \ 16-7）。\n\n![9781430245421_Fig16-07.jpg](img/9781430245421_Fig16-07.jpg) 图 16-7.\
  \ 说真的，谁不希望自己的弹出按钮足够宽，能完整显示“NSUTF32LittleEndianStringEncoding”呢？\n\n弹出按钮列表的值将从应用委托的\
  \ `encodingNames` 方法中获取，因此我们无需在 Interface Builder 中输入它们。这里我们将再次使用 `NSDictionaryController`，这次只显示\
  \ `encodingNames` 字典中的值。为此，我们需要先从*库*中拖拽另一个 `NSDictionaryController` 到 nib 窗口，同时将其重命名为\
  \ `strEncs`，并将其*内容字典*绑定到应用委托的 `self.encodingNames` 键路径。然后，将弹出按钮的*内容*绑定到 `strEncs`，使用\
  \ `arrangedObjects` 作为*控制器键*，`value` 作为*模型键路径*。\n\n最后，我们需要建立一个绑定，以便应用委托能够感知用户在弹出按钮中设置的值，从而让应用委托使用所选编码重新显示文本。通过将弹出按钮的“选定对象”绑定到应用委托，并使用\
  \ `self.stringEncodingName` 作为键路径来实现这一点。\n\n现在保存所有更改，并**构建并运行**应用程序。我们应该能看到我们构建的\
  \ GUI，包括一个**文件** ![image](img/arrow.jpg) **打开**菜单项，它允许我们选择一个文件，并显示文件的属性及其内容。从弹出列表中选择另一种编码将使应用使用所选编码在文本视图中重新显示数据。\n\
  \n## 总结\n\n在本章中，我们了解了如何使用 Cocoa 访问文件及其元数据。我们还学习了一些关于字符串编码的知识，以及 Cocoa 如何处理它们。更重要的是，我们看到了另一个由\
  \ Cocoa 绑定驱动的 GUI 示例。除了打开文件的菜单项外，这里发生的一切都通过绑定完成，包括在弹出列表中设置一个值，这最终会导致文本字段重新加载内容。\n\
  \n\n\n# 第 17 章 并发\n\n这是一个相当复杂的交互过程，在你适应之前，由于 Cocoa 绑定在幕后完成部分工作，它的运行方式并不直观。如果你对它的工作原理不太理解，不妨重新阅读本章，看看是否能更接近\"\
  恍然大悟\"的临界点。否则，请继续阅读下一章，学习如何使用并发让我们的应用程序响应更迅速。\n\n软件开发中最大的挑战之一，就是编写能够同时处理多项任务的软件。几十年来，计算机通过高速切换任务制造出并发的假象，让人以为它们能同时处理多件事情（实际上它们只是在任务间快速切换，一次只\"\
  关注\"一个任务）。如今，计算机通常包含两个或更多计算核心，因此它们确实能够同时执行多项任务——在所有核心上同时执行指令。\n\n然而，即使计算机硬件和操作系统能够支持多核心工作，编写能有效利用多核心的应用软件在技术上仍具挑战性。在大多数开发环境中，默认假设代码是顺序执行的（一个接一个操作），而分解任务以实现并发执行往往是一项艰巨的工作。\n\
  \n本章将举例说明 Cocoa 应用常见的受益于并发的情况，并演示具体实现方法。你一定见过 OS X 中那个旋转的光标（有时被称为\"死亡的沙滩球\"），它会在应用无法响应用户操作时出现。通常，当我们点击某个按钮或菜单项触发耗时超过几秒的处理时，这个光标就会出现。OS\
  \ X 检测到进程未处理输入事件，便会显示旋转光标提醒用户。当应用完全停止响应用户操作并濒临崩溃（或被用户强制退出）时，也会出现这种情况。因此，当应用停止响应并显示旋转光标时，许多用户的直接反应是恐慌——他们怀疑应用即将崩溃！\n\
  \n所以，为了用户也为了我们自己，必须确保应用中任何长时间运行的操作都能以不影响用户交互的方式处理——即让操作在后台执行，同时应用照常处理用户输入事件。本章将演示如何用最省事的方式为\
  \ Cocoa 应用添加此类并发功能。我们将使用 Foundation 框架中的`NSOperation`和`NSOperationQueue`类，还会学习如何通过\
  \ Grand Central Dispatch（以下简称 GCD）实现，这是所有 OS X 应用（无论是否基于 Cocoa）都能使用的 C 语言 API。\n\
  \n## SlowWorker\n\n作为演示这些并发选项的平台，我们将创建一个名为 SlowWorker 的简单应用，模拟从服务器获取数据并执行计算等长时间运行的操作。该应用提供一个按钮让用户启动任务，并在文本视图中显示结果（见图\
  \ 17-1）。\n\n![9781430245421_Fig17-01.jpg](img/9781430245421_Fig17-01.jpg)\n\n图 17-1\
  \ SlowWorker 在运行中（还是静止中？）\n\n首先，在 Xcode 中新建一个 Cocoa 应用。命名为 SlowWorker，使用`SW`作为类前缀。无需\
  \ Core Data 或文档支持。完成这些后，在*SWAppDelegate.h*中添加以下粗体代码：\n\n```objc\n#import <Cocoa/Cocoa.h>\n\
  \n@interface SWAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
  \ IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSButton *startButton;\n\
  @property (assign) IBOutlet NSTextView *resultsTextView;\n@property (assign) BOOL\
  \ isWorking;\n\n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n这定义了 GUI 中两个可见对象的输出口、一个名为`isWorking`的布尔标志（稍后用于跟踪后台是否有任务执行），以及一个由按钮触发的操作方法。\n\
  \n**注意** 眼尖的读者会发现`resultsTextView`属性用`assign`而非`weak`声明。这是因为`NSTextView`禁止在弱引用上下文中使用，就像第\
  \ 11 章讨论的`NSWindow`一样。OS X 中具有此限制的类并不多，但有一点可以放心：当你尝试对不支持的类使用`weak`时，Xcode 会给出令人困惑的\"\
  禁止合成 weak 不可用属性\"的提示。这就是向后兼容的代价。\n\n现在，将以下代码块中的粗体方法添加到*SWAppDelegate.m*中：\n\n```objc\n\
  #import \"SWAppDelegate.h\"\n\n@implementation SWAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // 在此处插入初始化应用代码\n}\n\n- (NSString *)fetchSomethingFromServer\
  \ {\n    sleep(1);\n    return @\"你好\";\n}\n\n- (NSString *)processData:(NSString\
  \ *)data {\n    sleep(2);\n    return [data uppercaseString];\n}\n\n- (NSString\
  \ *)calculateFirstResult:(NSString *)data {\n    sleep(3);\n    return [NSString\
  \ stringWithFormat:@\"字符数: %ld\",\n            [data length]];\n}\n\n- (NSString\
  \ *)calculateSecondResult:(NSString *)data {\n    sleep(4);\n    return [data stringByReplacingOccurrencesOfString:@\"\
  E\"\n                                          withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\
  \ {\n    NSDate *startTime = [NSDate date];\n    \n    NSString *fetchedData;\n\
  \    NSString *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\
  \n    self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
  \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                               @\"已获取: %@\\n\", fetchedData];\n    \n    processed\
  \ = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                               @\"已处理: %@\\n\", processed];\n\
  \    \n    firstResult = [self calculateFirstResult:processed];\n    secondResult\
  \ = [self calculateSecondResult:processed];\n    _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                               @\"第一结果: [%@]\\n 第二结果:\
  \ [%@]\\n\\n\",\n                               firstResult, secondResult];\n\n\
  \    NSDate *endTime = [NSDate date];\n    NSLog(@\"耗时 %f 秒完成\",\n          [endTime\
  \ timeIntervalSinceDate:startTime]);\n    self.isWorking = NO;\n}\n\n@end\n```\n\
  \n注意，该类的工作被拆分为多个小模块。这些代码仅用于模拟缓慢操作，实际上这些方法本身并不耗时。为了让效果更明显，每个方法都调用了`sleep()`函数，使程序（具体来说是调用该函数的线程）在指定秒数内暂停且不执行任何操作。`doWork:`方法还在开头和结尾包含计算总耗时的代码。\n\
  \n现在，打开*MainMenu.xib*，在空白窗口中放置一个`NSButton`和一个`NSTextView`，布局如图 17-1 所示。将应用代理的两个输出口连接到相关控件，并将按钮的动作连接到应用代理的`doWork:`方法。\n\
  \n\n\n接下来，我们对 `NSTextView` 稍作配置，从视图中删除示例文本，并在*属性检查器*中取消勾选*可编辑*复选框。现在保存工作，然后在 Xcode\
  \ 中点击**运行**。应用程序应该会启动，点击按钮后，它大约会运行十秒钟（所有睡眠时间的总和），然后显示结果。大约五六秒后，鼠标光标会变成旋转磁盘光标，并一直保持这种状态，直到工作完成。我们放在窗口中的\
  \ `NSTextView` 会一直保持空白直到最后，尽管我们的代码偶尔会尝试更新其内容，因为需要重新绘制显示的主线程 “卡住” 了，正在执行我们所有的后台处理。此外，在整个过程中，应用程序的菜单以及窗口控件都毫无响应。实际上，除了通过\
  \ Mac OS X 的*强制退出*窗口来杀死它之外，我们唯一能与应用程序交互的方式就是移动它的窗口，因为操作系统本身会处理这个操作。这正是我们想要避免的状况！在这个特定例子中，情况还不算太糟，因为应用程序似乎只挂起了几秒钟。然而，如果你的应用经常以这种方式出现“沙滩球”现象且持续时间更长，那么你将面临一些不满的用户——甚至可能成为前用户！\n\
  \n## 线程基础\n\n在我们开始实现解决方案之前，先来回顾一下并发处理中的一些基础知识。这远非对 OS X 线程或一般线程的完整描述。要了解完整信息，你需要查阅其他资料。我们只想解释足够的内容，让你理解本章中我们将要做的事情。\n\
  \n在大多数现代操作系统中（当然包括 OS X），除了包含存储在磁盘上的程序运行实例的“进程”这个概念之外，还有“执行线程”这个概念。每个进程可以包含多个同时运行的线程。如果只有一个处理器核心，操作系统会在执行多个线程之间进行切换，就像它在执行多个进程之间进行切换一样。如果有多个可用核心，线程会像进程一样被分配到各个核心上。\n\
  \n一个进程中的所有线程共享相同的可执行程序代码和相同的全局数据。每个线程也可以拥有一些专属于该线程的数据。线程可以利用一种称为 *mutex*（互斥锁的简称）或锁的特殊结构，它可以确保特定的代码块不会被多个线程同时运行。当多个线程同时访问同一数据时，这在确保正确结果方面非常有用：当一个线程正在更新某个值（在所谓的代码“临界区”内）时，它会锁定其他线程。例如，假设我们的应用程序实现了一个银行系统，其中账户余额可以作为交易的一部分进行修改。在多线程系统中，我们需要保护对账户余额进行加减操作的代码段，以消除两个线程同时修改它的可能性。否则，两个线程可能会几乎同时读取旧余额，然后两个线程又各自写回它们自己计算出的新余额，对另一个线程试图做出的更改毫不知情，从而导致最终状态不正确；最后设置值的线程是“赢家”，而另一个线程对余额的更改就这样丢失了。\n\
  \n处理线程时的一个常见问题就是代码的*线程安全性*。有些软件库在编写时就考虑了并发性，它们的所有临界区都用互斥锁进行了恰当的保护。而有些代码库则没有。例如，在\
  \ Cocoa 中，AppKit 框架（包含专门用于构建 GUI 应用程序的类，如 `NSApplication`、`NSView` 及其所有子类等）在很大程度上就*不是*线程安全的。\n\
  \n这意味着，在运行中的 Cocoa 应用程序里，所有涉及任何 AppKit 对象的方法调用都应该在同一个线程内执行，这个线程通常被称为主线程。如果我们从另一个线程访问\
  \ AppKit 对象，一切都无法保证；我们很可能会遇到看似无法解释的 bug。默认情况下，我们 Cocoa 应用程序的所有操作（例如处理由用户事件触发的操作）都发生在主线程上，因此对于简单的应用程序，我们无需担心这一点。用户触发的操作方法已经在主线程中运行。到本书目前这个阶段，我们的代码一直在主线程上运行，但这种状况即将改变。\n\
  \n## 工作单元\n\n刚才描述的线程模型的问题在于，对于普通程序员来说，编写无错误的多线程代码几乎是不可能的。这并非是对我们行业或普通程序员能力的批评；这只是一种观察结果。在跨多个线程同步数据和操作时，我们必须在代码中考虑到的复杂交互对于大多数人来说实在是难以应付。想象一下，只有\
  \ 5% 的人有能力编写软件。而这 5% 中只有一小部分人真正有能力承担编写重量级多线程应用程序的任务。即使是成功做到过的人，也常常会建议其他人不要效仿他们的做法！\n\
  \n幸运的是，希望并未完全破灭。我们可以在不进行太多底层线程操作的情况下实现一些并发处理。就像我们能够不直接往显存中写入比特位就在屏幕上显示数据，以及不直接与磁盘控制器交互就能从磁盘读取数据一样，存在一些软件抽象，可以让我们在多个线程上运行代码，而无需我们直接对线程做太多工作。Apple\
  \ 鼓励我们使用的解决方案，其核心思想是将长时间运行的任务拆分成工作单元，并将这些单元放入队列中执行。系统为我们管理这些队列，并在多个线程上执行工作单元。我们不需要直接启动和管理后台线程，并且从通常涉及实现并发应用程序的许多“簿记”工作中解放出来。系统会为我们处理这些。\n\
  \n## 操作队列\n\n自 OS X 10.5 发布以来，Apple 为我们提供了两个类：`NSOperation` 和 `NSOperationQueue`，它们协同工作以提供操作队列。其思路是将我们的计算任务分解成块或工作单元，将每个单元封装到一个\
  \ `NSOperation` 中，然后将每个操作放入一个 `NSOperationQueue`。我们还可以建立操作间的依赖关系，指定一个操作在另一个操作完成之前不会开始执行。然后\
  \ `NSOperationQueue` 会尽其所能地处理这些单元，它会使用操作添加到队列的顺序以及我们指定的依赖关系来决定其执行计划。如果我们指定的依赖关系允许某些操作同时执行，并且有足够多的可用核心来运行它们，那么操作队列将使用多个线程来同时执行多个操作。\n\
  \n## 成为块专家\n\n使用 Apple 的并发 API（无论是通过 `NSOperationQueue` 还是 GCD）最直接的方法之一就是使用块（blocks）。块最初随\
  \ GCD 一起发布，是 Apple 添加到 C 语言本身（并由此扩展到 Objective-C 和 C++）的一些新语法。这种新的语言特性，在其他一些语言中也被称为*闭包*，对于充分利用\
  \ GCD 至关重要。块背后的思想是让特定的代码块能够像任何其他 C 语言类型一样被处理。\n\n\n\n代码块（block）可以赋值给变量、作为参数传递给函数或方法，并且通常可以像其他\
  \ Objective-C 对象一样被处理。与 C 语言中其他大多数类型不同，代码块还可以被执行。我们可以在一个对象中创建代码块，然后将其传递给另一个对象，让它在之后执行。通过这种方式，代码块可以作为\
  \ Objective-C 中委托模式或 C 语言中回调函数的替代方案。\n\n与方法或函数非常相似，代码块可以接受一个或多个参数，并指定一个返回值。为了声明一个代码块变量，我们使用脱字符（`^`）符号，并配合一些额外的括号来声明参数和返回类型。定义代码块本身时，做法大致相同，但随后需要用花括号包裹定义代码块的实际代码。以下是一些相关的示例：\n\
  \n```\n// 声明一个名为 \"loggerBlock\" 的代码块变量，无参数，无返回值。\nvoid (^loggerBlock)(void);\n\n\
  // 将代码块赋值给上面声明的变量。像这样无参数且无返回值的代码块，\n// 不需要像前面变量声明中使用 void 那样的“修饰”。\nloggerBlock\
  \ = ^{\n    NSLog(@\"我很庆幸他们没有把它叫做闭包\");\n};\n\n// 执行代码块，就像调用函数一样。\nloggerBlock();\
  \  // 这会在控制台产生一些输出\n```\n\n如果你做过很多 C 语言编程，可能会认识到这类似于 C 语言中的函数指针概念。然而，两者有几个关键的区别。也许最大的区别在于，代码块可以在函数或方法体内内联定义。我们可以在代码块将要赋值给变量、或者传递给另一个方法或函数的地方直接定义它。\n\
  \n另一个重要区别是，代码块可以访问其创建所在作用域内的变量。默认情况下，代码块会以只读方式复制我们以这种方式访问的任何变量，保持原始变量不变。同时，它会自动增加从周围作用域使用的任何\
  \ Objective-C 对象的引用计数，并在代码块执行完毕后再次减少引用计数。但是，我们可以通过在任何外部变量的声明前加上 `__block`，使其变成可读写的。\n\
  \n```\n// 定义一个可以被代码块修改的变量\n__block int a = 0;\n\n// 定义一个试图修改其作用域中变量的代码块\nvoid (^sillyBlock)(void)\
  \ = ^{\n    a = 47;\n};\n\n// 在调用代码块前检查我们的变量值\nNSLog(@\"a == %d\", a); // 输出 \"\
  a == 0\"\n\n// 执行代码块\nsillyBlock();\n\n// 在调用代码块后再次检查我们的变量值\nNSLog(@\"a == %d\"\
  , a); // 输出 \"a == 47\"\n```\n\n如前所述，代码块在与 GCD 一起使用时才能真正大放异彩。GCD 包含一组函数，这些函数可以完成与\
  \ `NSOperation` 和 `NSOperationQueue` 类似的事情，但采取了不同的方式。主要区别在于，我们不是显式创建一堆操作、可选地声明操作间依赖关系、然后将操作添加到队列中，而是使用\
  \ GCD 调用一个函数，该函数接收一个代码块并将其添加到队列中，一步到位。我们稍后会讨论这个，但首先，我们将展示如何使用操作队列来处理并发。\n\n## 激活\
  \ SlowWorker\n\n为了了解操作队列的工作原理，让我们在 SlowWorker 中对它们进行测试。在开始之前，先复制包含 SlowWorker 项目的整个文件夹。在本章后面，我们将使用原始版本的\
  \ SlowWorker 作为另一种实现并发方式的起点，所以请保留一份副本。\n\n回想一下，这个应用的问题在于，单一的 action 方法顺序调用了几个其他方法，这导致的总耗时足以让应用感觉停止响应。\n\
  \n我们要做的是，将其他每个方法放入一个操作中，将所有操作放入一个队列，然后让队列自行处理。\n\n`doWork:` 方法是我们将要进行所有修改的地方。首先，我们给所有本地的\
  \ `NSString` 变量加上 `__block` 存储限定符。然后，我们将每一小段工作封装在一个代码块内，声明一些依赖关系以确保它们按正确顺序执行，然后将它们交给一个新的队列去执行。请看一下此处加粗的行（当然，也请将它们添加到我们的方法中），然后我们再稍微详细地讨论细节：\n\
  \n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate date];\n\
  \    \n    __block NSString *fetchedData;\n    __block NSString *processed;\n  \
  \  __block NSString *firstResult;\n    __block NSString *secondResult;\n    \n \
  \   self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        fetchedData = [self fetchSomethingFromServer];\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \           @\"已获取: %@\\n\", fetchedData];\n    }];\n    \n    NSBlockOperation\
  \ *process = [NSBlockOperation blockOperationWithBlock:^{\n        processed = [self\
  \ processData:fetchedData];\n        _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                                   @\"已处理: %@\\n\",\
  \ processed];\n    }];\n    \n    NSBlockOperation *calcFirst = [NSBlockOperation\
  \ blockOperationWithBlock:^{\n        firstResult = [self calculateFirstResult:processed];\n\
  \    }];\n    \n    NSBlockOperation *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        secondResult = [self calculateSecondResult:processed];\n    }];\n    NSBlockOperation\
  \ *showResults = [NSBlockOperation blockOperationWithBlock:^{\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \           @\"第一个结果: [%@]\\n 第二个结果: [%@]\\n\\n\",\n                           \
  \        firstResult, secondResult];\n\n        NSDate *endTime = [NSDate date];\n\
  \        NSLog(@\"在 %f 秒内完成\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \              self.isWorking = YES;\n\n    }];\n    \n    [process addDependency:fetch];\n\
  \    [calcFirst addDependency:process];\n    [calcSecond addDependency:process];\n\
  \    [showResults addDependency:calcFirst];\n    [showResults addDependency:calcSecond];\n\
  \    \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue\
  \ addOperations:@[fetch, process, calcFirst, calcSecond, showResults]\n       waitUntilFinished:NO];\n\
  }\n```\n\n我们做的第一件事是给一些局部变量添加 `__block` 存储限定符。这样，每个 `NSString` 指针仍然是单一的、唯一的指针，每个代码块都可以对其进行读取和写入。在此上下文中，“写入”意味着将指针赋值以指向一个不同的对象。没有\
  \ `__block`，每个代码块都会获得自己的新指针，并且所有指针都指向同一个初始对象，而且没有一个是可写的！所以 `__block` 为我们提供了一种在代码块之间共享数据的方式。\n\
  \n接下来，我们创建一些操作。现在不是简单地直接执行每个工作方法，而是为每个方法创建一个 `NSBlockOperation`。`NSBlockOperation`\
  \ 只是 `NSOperation` 的一个类，设计用于从一个代码块创建。\n\n然后我们定义这些操作之间的一组依赖关系，这样 `process` 仅在 `fetch`\
  \ 完成后才执行，`calcFirst` 和 `calcSecond` 仅在 `process` 完成后才执行，而 `showResults` 仅在所有其他操作完成后才执行。\n\
  \n最后，我们创建一个新的 `NSOperationQueue`，并将包含我们所有操作的数组传递给它。队列会查看这些操作之间的所有依赖关系，并确定如何以正确的顺序执行它们。\n\
  \n## 要求主线程\n\n然而，我们还没有完全准备好。\n\n\n\n## 排版后的文档\n\n请记住，AppKit 类（例如所有窗口和视图类）通常不是线程安全的。对它们的所有访问应仅在主线程上执行。但目前，我们正在从多个操作中访问\
  \ `NSTextView`。很可能，其中一些操作在时机成熟时会在其他线程上运行！即使在这个简单的测试应用中可能“可行”，但这并不是一个真正安全的基础。我们需要调整每个操作，以确保对\
  \ `NSTextView` 的所有访问都发生在主线程上。\n\n为此，我们将把每次这样的访问包裹在另一个 block 中，这个 block 将直接传递给一个特殊的队列，该队列始终在主线程上运行其操作。这里的粗体代码显示了我们需对\
  \ `doWork:` 方法所做的最终修改：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
  \ = [NSDate date];\n\n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
  \    __block NSString *firstResult;\n    __block NSString *secondResult;\n\n   \
  \ self.isWorking = YES;\n\n    NSBlockOperation *fetch = [NSBlockOperation blockOperationWithBlock:^{\n\
  \        fetchedData = [self fetchSomethingFromServer];\n        [[NSOperationQueue\
  \ mainQueue] addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                                       @\"Fetched: %@\\\
  n\", fetchedData];\n        }];\n    }];\n\n    NSBlockOperation *process = [NSBlockOperation\
  \ blockOperationWithBlock:^{\n        processed = [self processData:fetchedData];\n\
  \        [[NSOperationQueue mainQueue] addOperationWithBlock:^{\n            _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \               @\"Processed: %@\\n\", processed];\n        }];\n    }];\n\n   \
  \ NSBlockOperation *calcFirst = [NSBlockOperation blockOperationWithBlock:^{\n \
  \       firstResult = [self calculateFirstResult:processed];\n    }];\n\n    NSBlockOperation\
  \ *calcSecond = [NSBlockOperation blockOperationWithBlock:^{\n        secondResult\
  \ = [self calculateSecondResult:processed];\n    }];\n\n    NSBlockOperation *showResults\
  \ = [NSBlockOperation blockOperationWithBlock:^{\n        [[NSOperationQueue mainQueue]\
  \ addOperationWithBlock:^{\n            _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                                       @\"First Result:\
  \ [%@]\\nSecond Result: [%@]\\n\\n\",\n                                       firstResult,\
  \ secondResult];\n\n            NSDate *endTime = [NSDate date];\n            NSLog(@\"\
  Completed in %f seconds\",\n                  [endTime timeIntervalSinceDate:startTime]);\n\
  \            self.isWorking = NO;\n        }];\n    }];\n\n    [process addDependency:fetch];\n\
  \    [calcFirst addDependency:process];\n    [calcSecond addDependency:process];\n\
  \    [showResults addDependency:calcFirst];\n    [showResults addDependency:calcSecond];\n\
  \n    NSOperationQueue *queue = [[NSOperationQueue alloc] init];\n\n    [queue addOperations:@[fetch,\
  \ process, calcFirst, calcSecond, showResults]\n       waitUntilFinished:NO];\n\
  }\n```\n\n现在我们应该能够运行我们的应用了，并且按下 *Start* 按钮后，我们可能会注意到一些不同之处：按钮会立即恢复到非点击状态，菜单仍然有效。前两个操作在完成时会向\
  \ `NSTextView` 中写入一些文本。大约七秒后（相对于第一个版本所用的十秒有所缩短，因为现在某些工作方法同时运行），最终输出会出现在文本视图中。这一切都很好，但我们还可以通过使用\
  \ Cocoa Bindings 和我们一开始创建的 `isWorking` 属性来轻松地让应用响应更快。再次打开 *MainMenu.xib*，并使用对象库找到循环进度指示器。然后将其添加到我们的窗口中，如\
  \ 图 17-2 所示。\n\n![9781430245421_Fig17-02.jpg](img/9781430245421_Fig17-02.jpg)\n\n\
  图 17-2 . 添加进度指示器\n\n选中进度指示器后，使用*属性检查器*确保其*停止时显示*复选框处于关闭状态。然后切换到*绑定检查器*，展开其 *Animate*\
  \ 参数的视图，并将其绑定到 App Delegate，在模型键路径（Model Key Path）中输入 `isWorking`。接着选择窗口中的 *Start*\
  \ 按钮，我们将进行类似的配置。将按钮的 *Enabled* 属性绑定到应用委托，键路径为 `isWorking`，并这次添加一个 `NSNegateBoolean`\
  \ 作为*值转换器*。\n\n保存更改，然后点击 **Run**；当我们点击 *Start* 按钮时，它变为禁用状态，循环进度指示器出现并开始旋转。当工作完成时，进度指示器消失，按钮恢复正常。\n\
  \n现在让我们更进一步：添加一个水平进度指示器（一种水平移动，告诉我们事情正在发生，例如在软件安装程序中）。进度视图将从 0 到 4，每个工作方法都会增加一点数值。与循环进度指示器一样，这将完全使用\
  \ Cocoa Bindings 进行配置。\n\n首先，在 *SWAppDelegate.h* 中添加一个名为 `completed` 的新属性：\n\n```\n\
  //  SWAppDelegate.h\n//  Insert this after the @interface line\n@property (assign)\
  \ NSInteger completed;\n```\n\n接下来，切换到 *SWAppDelegate.m*。在 `doWork:` 方法顶部附近添加以下代码，以便在用户点击\
  \ Start 按钮时立即重置此计数器：\n\n```\nself.completed = 0;\n```\n\n现在，每个工作方法在完成后都需要递增这个变量。我们可以将以下代码行添加到每个工作方法中：\n\
  \n```\nself.completed = self.completed + 1;\n```\n\n然而，这正是那些棘手的多线程问题出现的地方。在这行代码中，实际发生的是：它首先通过调用\
  \ `[self completed]` 获取 `completed` 属性的当前值，然后加 1，再通过调用 `[self setCompleted:]` 将结果存储回\
  \ completed 属性。在多线程环境中，这可能导致不正确的行为。例如，假设两个线程大约同时执行这样一行代码会怎样？假设 `completed` 的初始值为\
  \ 2。如果两个线程都在它们写入自己的结果之前读取了当前值，那么每个线程都会将自己的值副本加 1，然后每个线程都会将本地的和（3）写回 completed 属性，结果该属性包含的是值\
  \ 3，而不是正确的值 4。\n\n解决这个问题的方法之一是使用 Objective-C 的 `@synchronized` 关键字，它允许我们指定一段代码一次只能由一个线程运行。在应用委托的\
  \ `@implementation` 部分的某处输入以下方法：\n\n```\n- (void)incrementCompleted {\n  @synchronized(self)\
  \ {\n    self.completed = self.completed + 1;\n  }\n}\n```\n\n我们在这里所做的是将之前考虑的相同代码包裹在一个安全区域内。`@synchronized`\
  \ 关键字将其唯一参数作为一个对象，用于确定同步限制的范围。基本上，任何使用相同值的调用都会尝试获取相同的锁。如果其他线程已经占用了该锁，当前线程必须等待，直到其他线程完成。在这种情况下，由于我们使用了\
  \ `self`，对同一实例上的此方法的任何调用都会尝试获取相同的锁。我们只有一个应用委托实例，所以这实际上是一个全局锁，但就我们的目的而言，这没问题。\n\n\
  要使此功能生效，需要做的编码工作就是将以下代码行添加到每个工作方法中，位于每个方法中的 `return` 之前：\n\n```\n[self incrementCompleted];\n\
  ```\n\n最后，我们需要配置 GUI。回到 *MainMenu.*\n\n\n\n在 Interface Builder 中打开`xib`文件，并在*Library*中搜索进度指示器。除了我们已经使用的圆形进度指示器外，还有一个标记为*Indeterminate\
  \ Progress Indicator*的水平进度指示器。将其拖到窗口中，并按图 17-3 所示进行布局。\n\n![9781430245421_Fig17-03.jpg](img/9781430245421_Fig17-03.jpg)\n\
  \n图 17-3 .  最终的 GUI 收尾工作\n\n现在打开*Attributes Inspector*。点击关闭*Display When Stopped*和*Indeterminate*复选框，然后将*Minimum*和*Current*值设为\
  \ 0，将*Maximum*值设为 4。接下来切换到*Bindings Inspector*，我们将配置两个绑定。首先，将其*Animate*属性绑定到 App\
  \ delegate 的`isWorking`键，就像我们对圆形进度指示器所做的那样。然后，将其*Value*属性绑定到 App delegate 的`completed`键。\n\
  \n保存工作，**Run**，然后点击*Start*按钮。在圆形进度指示器旁边，会同时出现一个水平进度指示器，随着每个工作方法的完成，会有一个进度条移动。\n\n\
  就是这样：相对无痛的并发。诚然，这个人为构造的示例与大型应用程序相比不算什么，但这些概念可以扩展以处理更复杂的情况。我们展示的内容在当今的 OS X 和 iOS\
  \ 应用程序中运行良好，但苹果并没有止步于此。从 Snow Leopard 开始，`NSOperation`和`NSOperationQueue`的大部分设计已在操作系统底层重新实现，形成了一项名为\
  \ Grand Central Dispatch 的出色技术。\n\n## GCD：底层队列\n\n将工作单元放入可以在后台执行的队列中，由系统为我们管理线程，这种想法非常强大，并且极大地简化了许多需要并发的开发场景。似乎一旦这项技术以`NSOperationQueue`的形式在\
  \ Leopard 中启动并运行，苹果就决定构建一个更通用的解决方案，使其不仅可以从 Objective-C 使用，还可以从 C 和 C++ 使用。从 Snow\
  \ Leopard 开始，这个名为 Grand Central Dispatch（以下简称 GCD）的解决方案已准备就绪。GCD 将`NSOperationQueue`的大多数核心概念——工作单元、无痛后台处理、自动线程管理——放入一个可以从所有基于\
  \ C 的语言中使用的 C 接口。这意味着它不仅仅适用于 Cocoa 程序员。现在，即使是使用 C 编写的低级命令行实用程序也可以利用这些特性。`NSOperationQueue`本身在\
  \ Snow Leopard 中使用 GCD 重写，更棒的是，苹果已经使其 GCD 的实现开源，以便它也可以移植到其他类 Unix 操作系统上。\n\n`NSOperationQueue`与\
  \ GCD 中队列的设计之间的主要区别在于，`NSOperationQueue`可以处理其`NSOperation`之间任意复杂的依赖关系以确定执行顺序，而 GCD\
  \ 队列是严格的 FIFO（先进先出）。添加到 GCD 队列的工作单元将始终按照它们放入队列的顺序启动。话虽如此，但它们可能不会总是以相同的顺序完成，因为 GCD\
  \ 队列会自动将其工作分配到多个线程中。\n\n使用 GCD，每个队列都可以访问一个在应用程序生命周期内可重用的线程池。GCD 将始终尝试维护一个适合机器架构的线程池，当有工作要做时，通过利用更多的处理器核心自动利用更强大的机器。\n\
  \n## 第二次改进 SlowWorker\n\n为了了解其工作原理，让我们来看看 SlowWorker 的`doWork:`方法的原始形式。要查看它，请打开我们之前制作的原始\
  \ SlowWorker 项目目录的副本，并用于我们将要展示的其余更改。\n\n这是原始方法：\n\n```objective-c\n- (IBAction)doWork:(id)sender\
  \ {\n    NSDate *startTime = [NSDate date];\n    \n    NSString *fetchedData;\n\
  \    NSString *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\
  \    \n    self.isWorking = YES;\n    \n    fetchedData = [self fetchSomethingFromServer];\n\
  \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                               @\"Fetched: %@\\n\", fetchedData];\n    \n    processed\
  \ = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                               @\"Processed: %@\\n\"\
  , processed];\n    \n    firstResult = [self calculateFirstResult:processed];\n\
  \    secondResult = [self calculateSecondResult:processed];\n    _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \       @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n                 \
  \              firstResult, secondResult];\n    \n    NSDate *endTime = [NSDate\
  \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
  \    self.isWorking = NO;\n}\n```\n\n我们可以通过将所有代码包装在一个块中并将其传递给一个名为`dispatch_async`的\
  \ GCD 函数，来使这个方法完全在后台运行。该函数接受两个参数：一个 GCD 调度队列（概念上类似于`NSOperationQueue`）和一个要分配给该队列的块。与另一种方法一样，我们也会为我们的局部变量添加`__block`存储限定符。请看：\n\
  \n```objective-c\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime = [NSDate\
  \ date];\n    \n    __block NSString *fetchedData;\n    __block NSString *processed;\n\
  \    __block NSString *firstResult;\n    __block NSString *secondResult;\n    \n\
  \    self.isWorking = YES;\n    \n    dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n        fetchedData = [self fetchSomethingFromServer];\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \           @\"Fetched: %@\\n\", fetchedData];\n        \n        processed = [self\
  \ processData:fetchedData];\n        _resultsTextView.string = [_resultsTextView.string\
  \ stringByAppendingFormat:\n                                   @\"Processed: %@\\\
  n\", processed];\n        \n        firstResult = [self calculateFirstResult:processed];\n\
  \        secondResult = [self calculateSecondResult:processed];\n        _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \           @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n             \
  \                      firstResult, secondResult];\n        \n        NSDate *endTime\
  \ = [NSDate date];\n        NSLog(@\"Completed in %f seconds\",\n              [endTime\
  \ timeIntervalSinceDate:startTime]);\n        self.isWorking = NO;\n    });\n}\n\
  ```\n\n这种方法首先使用`dispatch_get_global_queue()`函数获取一个始终可用的预存在全局队列（与`NSOperationQueue`不同，使用\
  \ GCD 时总有一个全局队列可用，随时准备将工作分派到后台线程）。该函数接受两个参数：第一个参数允许我们指定优先级，第二个参数当前未使用，应始终为 0。如果我们在第一个参数中指定不同的优先级，例如`DISPATCH_QUEUE_PRIORITY_HIGH`或`DISPATCH_QUEUE_PRIORITY_LOW`（传递\
  \ 0 等同于传递`DISPATCH_QUEUE_PRIORITY_DEFAULT`），我们实际上会获得一个不同的全局队列，系统将对其进行不同的优先级排序。现在，我们继续使用默认的全局队列。\n\
  \n然后将该队列与后面的代码块一起传递给`dispatch_async()`函数。GCD 随后将整个块传递到后台线程，在那里它将一步接一步地执行，就像它在主线程中运行时一样。\n\
  \n## 不要忘记那个主线程\n\n这里有一个问题：AppKit 的线程安全性。\n\n\n\n切记，从后台线程向任何 GUI 对象（包括我们的 `resultsTextView`）发送消息是不允许的。幸运的是，GCD\
  \ 也为我们提供了处理这个问题的方法。在块内部，我们可以调用另一个调度函数，将任务传回主线程！为此，我们再次调用 `dispatch_async()`，这次传入的是由\
  \ `dispatch_get_main_queue()` 函数返回的队列。该函数始终为我们提供驻留在主线程上的特殊队列，随时准备执行那些需要用到主线程的块。添加此处所示的粗体代码行，将使所有\
  \ AppKit 调用都在主线程上执行：\n\n```\n- (IBAction)doWork:(id)sender {\n    NSDate *startTime\
  \ = [NSDate date];\n    \n    __block NSString *fetchedData;\n    __block NSString\
  \ *processed;\n    __block NSString *firstResult;\n    __block NSString *secondResult;\n\
  \n    self.isWorking = YES;\n\n    dispatch_async(dispatch_get_global_queue(0, 0),\
  \ ^{\n        fetchedData = [self fetchSomethingFromServer];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                                       @\"Fetched: %@\\n\", fetchedData];\n   \
  \     });\n        \n        processed = [self processData:fetchedData];\n     \
  \   dispatch_async(dispatch_get_main_queue(), ^{\n            _resultsTextView.string\
  \ = [_resultsTextView.string stringByAppendingFormat:\n                        \
  \               @\"Processed: %@\\n\", processed];\n        });\n        \n    \
  \    firstResult = [self calculateFirstResult:processed];\n        secondResult\
  \ = [self calculateSecondResult:processed];\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
  \                                       @\"First Result: [%@]\\nSecond Result: [%@]\\\
  n\\n\",\n                                       firstResult, secondResult];\n  \
  \      });\n        \n        NSDate *endTime = [NSDate date];\n        NSLog(@\"\
  Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \        self.isWorking = NO;\n    });\n}\n```\n\n## GCD 中的并发块\n\n为了使这个程序的行为与之前使用\
  \ `NSOperationQueue` 的版本保持一致，且运行速度至少不慢于它，我们还需要再做一处修改。还记得吗？当我们设置队列中的操作时，我们通过依赖关系让\
  \ `calculateFirstResult` 和 `calculateSecondResult` 能够同时运行。我们声明了它们各自依赖于对 `processData`\
  \ 的前一个调用，而随后的 `finishWorking` 调用则依赖于它们两个。这样一来，操作队列就能够在可能的情况下同时运行这两个操作。但目前在我们的 GCD\
  \ 版本中，情况并非如此。代码完全按顺序依次执行，总是在 `calculateFirstResult:` 完成之后才调用 `calculateSecondResult:`。\n\
  \n幸运的是，GCD 又一次提供了实现相同目标的方法，即使用所谓的*调度组*。在组上下文中异步调度的所有块都会尽可能快地执行，包括在可能的情况下分发到多个线程以进行并发执行。我们还可以使用\
  \ `dispatch_group_notify()` 来指定一个额外的块，该块将在组中的所有块都执行完毕后运行。\n\n如下所示：\n\n```\n- (IBAction)doWork:(id)sender\
  \ {\n  NSDate *startTime = [NSDate date];\n  dispatch_async(dispatch_get_global_queue(0,\
  \ 0), ^{\n    NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString\
  \ *processed = [self processData:fetchedData];\n    __block NSString *firstResult;\n\
  \    __block NSString *secondResult;\n    dispatch_group_t group = dispatch_group_create();\n\
  \    dispatch_group_async(group, dispatch_get_global_queue(0, 0), ^{\n      firstResult\
  \ = [self calculateFirstResult:processed];\n    });\n    dispatch_group_async(group,\
  \ dispatch_get_global_queue(0, 0), ^{\n      secondResult = [self calculateSecondResult:processed];\n\
  \    });\n    dispatch_group_notify(group, dispatch_get_global_queue(0, 0), ^{\n\
  \      NSString *resultsSummary = [NSString stringWithFormat:\n        @\"First:\
  \ [%@]\\nSecond: [%@]\", firstResult, secondResult];\n      dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n        [_resultsTextView setString:resultsSummary];\n      });\n      NSDate\
  \ *endTime = [NSDate date];\n      NSLog(@\"Completed in %f seconds\",\n       \
  \ [endTime timeIntervalSinceDate:startTime]);\n    });\n  });\n}\n```\n\n完成所有这些设置后，我们应该能够**运行**我们的应用程序，并看到与第一组改进后相同的运行表现和性能，但看不到我们使用\
  \ Cocoa Bindings 在工作执行期间改善 GUI 行为所做的额外改动。将相关改动应用到 GCD 增强版的 SlowWorker 这一任务，留给读者作为练习。\n\
  \n## 小并发，大不同\n\n现在，我们已经看到了一些具体的例子，展示了如何使用 `NSOperationQueue` 和 GCD 在应用程序中提供基本的并发支持。我们简单的示例项目并没有做什么有趣的事，但这些技术可以应用于任何涉及长时间活动、且我们不想让用户看到旋转的忙碌光标的情况。我们还学习了一些关于新块语法，以及如何利用它来创建准备在后台线程运行的工作单元的知识。\n\
  \n使用这些技术可以对您应用的**用户体验**产生巨大影响。当您的用户正在等待应用执行某些任务时，您都应该使用它们！选择使用 `NSOperationQueue`\
  \ 还是 GCD，由您自己决定。请记住，自 OS X 10.6 起，每一版发布中 `NSOperationQueue` 都是基于 GCD 实现的，因此无论选择哪种方式，您的应用都会拥有相似的性能特征。最终使用哪种方式，由您自行决定。\n\
  \n# 第 18 章\n\n## 未来之路\n\n现在，你已经到达了《在 Mac 上学习 Cocoa》的最后一章！希望你已对 Cocoa 的工作原理，以及如何使用其各个部分编写各种有趣的桌面应用程序有了很好的理解。然而，Cocoa\
  \ 框架确实非常庞大，我们对于所涉及的大多数类和概念的介绍，仅仅是蜻蜓点水。本书从不是一本包罗万象的 Cocoa 参考手册（你的电脑上已经随 Xcode 安装了一份），而是一本旨在引导你找到入门之路的指南。秉承这一精神，我们将以介绍其他技巧和资源作为本书的结尾，这些内容将帮助你在我们已学的基础上，更进一步地拓展你的\
  \ Cocoa 开发能力。\n\n我们将首先对之前提过但值得更多关注的一些设计模式稍作展开。接着，我们来看看如何使用 Objective-C 以外的语言进行 Cocoa\
  \ 编程。最后，我们将探讨一些方法，将你辛苦学到的 Cocoa 技能应用到 Mac OS X 桌面以外的领域。\n\n## 更多 Cocoa 特性\n\n本书中，我们花了大量篇幅讨论\
  \ MVC 模式，它帮助我们**将**应用程序**划分**为逻辑层；以及委托模式，它允许我们在控制器层中定义某些 GUI 对象的行为，而无需对 GUI 对象本身进行子类化。\n\
  \n\n这些技术利用语言特性和约定来定义使用模式。沿着这条思路，Cocoa 还有更多妙招。其中之一是通知的概念（在某些圈子里被称为**观察者模式**），它允许一个对象在事件发生时通知一组其他对象。另一个是使用`block`来简化代码，避免使用完整的\
  \ delegate 甚至单个方法造成过度设计。我们在本书的其他地方已经看到了`block`的应用，但这里我们还会介绍一些其他有趣的用途。\n\n### 通知\n\
  \nCocoa 的`NSNotification`和`NSNotificationCenter`类提供了一种方式，让一个对象可以向一组其他对象发送消息，而这些对象之间无需互相了解。它们真正需要知道的只是通知的名称，这个名称可以是任何我们喜欢的内容。想要被通知的对象会提前注册为特定通知名称的观察者，而想要广播通知的对象则使用该名称向任何正在监听的观察者发送其消息。\n\
  \n例如，假设我们应用的多个部分需要在某个特定事件发生时进行更新，比如网络代码从 Web 服务器读取响应。使用通知，我们的网络代码无需知道每个想要获取信息的其他对象。相反，我们可以为网络代码和观察者定义一个共用的通知名称，最好放在一个所有相关类都能包含的头文件中，如下所示：\n\
  \n```objectivec\n#define DATA_RECEIVED @\"dataReceived\"\n```\n\n观察者可以在任何时候注册接收通知，但通常这发生在对象的初始化过程中。\n\
  \n```objectivec\n- (id)init {\n    if ((self = [super init])) {\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \     selector:@selector(receiveNetworkData:)\n                                \
  \                     name:DATA_RECEIVED\n                                     \
  \              object:nil];\n    }\n    return self;\n}\n```\n\n这会告诉应用中唯一的`NSNotificationCenter`实例，当有人发布`DATA_RECEIVED`通知时，它应该通过调用调用者的`receiveNetworkData:`方法来通知它。注意最后一个参数我们传入了`nil`：如果我们在这里指定了一个对象，那么通知观察将仅限于该特定对象。其他任何对象发布相同的通知都不会产生任何效果。\n\
  \n为了使这项工作生效，观察者还需要实现注册时指定的方法。该方法始终接收`NSNotification`本身作为参数。\n\n```objectivec\n-\
  \ (void)receiveNetworkData:(NSNotification *)notification {\n    NSLog(@\"received\
  \ notification: %@\", notification);\n}\n```\n\n最后，任何将自己设为观察者的对象通常应该在稍后将其从观察者列表中移除。一种常见的惯用法是在任何曾经注册为观察者的类的`dealloc`方法中执行如下操作：\n\
  \n```objectivec\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter] removeObserver:self];\n\
  }\n```\n\n现在，回到通知的发送者本身，在我们的例子中，就是将要广播其状态的网络读取对象。这一过程非常简单：\n\n```objectivec\nif\
  \ (some condition is met) {\n    [[NSNotificationCenter defaultCenter]\n       \
  \ postNotificationName:DATA_RECEIVED\n                      object:self];\n}\n```\n\
  \n其思想是，发送者可以像这样抛出一个通知，而通知中心负责实际的投递。\n\n发送者还可以通过一个字典的形式传递附加信息，供观察者检索，如下所示：\n\n```objectivec\n\
  // 在发送者中\nNSDictionary *info = @{@\"data\" : someData};\n[[NSNotificationCenter\
  \ defaultCenter]\n    postNotificationName:DATA_RECEIVED\n                  object:self\n\
  \                userInfo:info];\n\n// 在观察者中\nNSLog(@\"received data %@\", [[notification\
  \ userInfo] objectForKey:@\"data\"]);\n```\n\n通知是一种非常实用的方式，让应用的各个独立部分无需使用正式的 API\
  \ 就能相互通信。我们只需要决定几个代表各种事件的字符串，然后开始观察和发布即可。\n\n### Blocks\n\n第 11 章和第 17 章介绍了`block`，这是苹果几年前为\
  \ C 语言增加的一项特性。我们主要将`block`与 Grand Central Dispatch 提供的并发特性一起使用，`block`在这方面非常契合，但`block`还有更多用途。似乎每当\
  \ OS X 发布一个重要的新版本时，苹果都会扩展几个 Cocoa 类，添加一些以`block`作为参数的新方法。让我们来看看其中的一些。\n\n#### 枚举\n\
  \n让我们从简单的东西开始：枚举。你可能已经熟悉了基于 C 的标准列表遍历方式，也许使用过`NSEnumerator`，甚至是从 OS X 10.5 开始提供的快速枚举（“for-in”循环）。现在，`block`提供了另一种实现相同功能的方式。\n\
  \n```objectivec\nNSArray *array = @[@\"zero\", @\"one\", @\"two\", @\"three\"];\n\
  \n// C 风格枚举\nint i;\nfor (i = 0; i < [array count]; i++) {\n    NSLog(@\"C enumeration\
  \ accessing object: %@\", array[i]);\n}\n\n// NSEnumerator，经典的 Cocoa 枚举方式\nNSEnumerator\
  \ *aEnum = [array objectEnumerator];\nid classicEnumerated;\nwhile ((classicEnumerated\
  \ = [aEnum nextObject])) {\n    NSLog(@\"NSEnumerator accessing object: %@\", classicEnumerated\
  \ );\n}\n\n// \"快速枚举\"，随 OS X 10.5 发布\nid fastEnumerated;\nfor (fastEnumerated in\
  \ array) {\n    NSLog(@\"Fast enumeration accessing object: %@\", fastEnumerated\
  \ );\n}\n\n// \"Block 枚举\"，随 OS X 10.6 发布\n[array enumerateObjectsUsingBlock:^(id\
  \ blockEnumerated, NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration accessing\
  \ object: %@\", blockEnumerated);\n}];\n```\n\n我们传递给`enumerateObjectsUsingBlock:`的`block`接受三个参数并返回空值。这是该方法声明的`block`签名，我们必须遵循它。传入`block`的三个参数分别是：来自数组的一个对象、一个包含该对象在数组中索引的整数，以及一个通过引用传递的`BOOL`，我们可以通过将其值设置为`YES`来停止枚举。\n\
  \n这样看来，一开始可能不明显为什么`block`版本比其他版本更好，但事实上它确实结合了其他所有枚举方式的最佳特性。首先，它提供了当前对象的索引，这是之前基于\
  \ Objective-C 的两种方式都没有的。如果我们想要做一些事情，比如打印出数组中项目的编号列表，这将非常方便。我们无法告诉你为了轻松访问每个对象的索引值，我们有多少次又回到了\
  \ C 风格的迭代！此外，该方法还有一个变体，允许我们指定选项来定义枚举的运行方式，例如使其并发运行，如下所示：\n\n```objectivec\n[array\
  \ enumerateObjectsWithOptions:NSEnumerationConcurrent\n    usingBlock:^(id blockEnumerated,\
  \ NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration accessing object:\
  \ %@\", blockEnumerated);\n}];\n```\n\n这个方法实际上使用了 GCD 将工作分布到所有可用的处理器核心上，这将使我们的应用运行得更快，并更好地利用系统资源。而且，我们无需额外付出就能得到这一切！\n\
  \n\n类似的枚举方法也存在于 `NSSet` 类中，只是没有索引参数（因为集合中的对象在定义上就是无序的）。`NSDictionary` 也通过一些新方法引入了强大的块操作，例如\
  \ `enumerateKeysAndObjectsUsingBlock:`（以及其支持并发的带选项变体），让我们可以指定一个同时获取键和值的块。这比之前枚举字典内容的方法要好得多，之前的方法通常需要遍历所有键，然后查找每个键对应的值。\n\
  \n## 使用块观察通知\n\n我们知道在之前几页已经向你介绍过通知，但猜猜看：Apple 也已经将块概念应用到了 `NSNotification` 类中，该类提供了一个方法，让我们可以指定一个块而不是选择器，就像这样：\n\
  \n```\nid observe = [[NSNotificationCenter defaultCenter] addObserverForName:DATA_RECEIVED\n\
  \                                                     object:nil queue:nil usingBlock:^(NSNotification\
  \ *notification){\n                                                         NSLog(@\"\
  received notification: %@\", notification);\n                                  \
  \                   }];\n```\n\n这在几个方面都很酷。首先，它让我们摆脱了为通知处理代码创建方法的负担，转而允许我们将代码内联到设置它的地方，这可以使我们的代码更易读。另一个所有块都具备的酷炫特性是，因为我们创建的块会从其定义的位置获取上下文，所以它不仅可以访问实例变量，还可以访问同一方法中之前定义的局部变量。这意味着我们的块可以用设置时可用的某些值来创建，并在稍后块运行时使用，而无需显式地将它们放入实例变量或通过其他手动方式传递。\n\
  \n请注意，这个版本返回一个类型为 `id` 的值，我们将其存储到一个名为 `observe` 的变量中。块通知观察者需要像其他观察者一样被移除，因此我们可以利用这个返回值，在适当的时候调用以下代码进行清理：\n\
  \n```\n[[NSNotificationCenter defaultCenter] removeObserver:observe];\n```\n\n以这种方式使用块时需要注意的一点是，在\
  \ `dealloc` 方法中进行清理可能不够好；如果块显式或间接地使用了 `self` 指针，那么就会发生一种循环引用，导致对象永远无法释放！这引出了我们下一个关于块的主题。\n\
  \n## 为块弱化指针\n\n回到上一个主题，想象我们有一个类，它包含一个名为 `observation` 的实例变量，以及如下的 `init` 和 `dealloc`\
  \ 方法：\n\n```\n@implementation MyController {\n    id observation;\n}\n\n- (id)init\
  \ {\n    if ((self = [super init])) {\n        observation = [[NSNotificationCenter\
  \ defaultCenter]\n                       addObserverForName:@\"ESCHATON\"\n    \
  \                   object:nil\n                       queue:nil\n             \
  \          usingBlock: ^(NSNotification *notification){\n                      \
  \     NSLog(@\"notified observer: %@\", self);\n                       }];\n\n \
  \   }\n    return self;\n}\n\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:observation];\n}\n\n@end\n```\n\n乍一看这似乎没问题，但存在一个微妙的问题。这种设置创建了一个循环引用链，这意味着\
  \ `MyController` 实例和 `observation` 对象都永远无法被释放！原因在于，当执行 `init` 并创建块（我们将其传递给 `NSNotificationCenter`）时，会发生一系列特殊事件。在幕后，ARC\
  \ 会确保块内部访问的任何变量都处于“块就绪”状态。这意味着对于普通的 C 类型（`int`、`float` 等），会为块内使用准备一个新的只读变量槽位，而 Objective-C\
  \ 对象指针会收到一条 `retain` 消息，从而在整个块的生命周期内增加其引用计数。\n\n同时，被赋值给 `observation` 的返回值也由 ARC\
  \ 妥善处理，它会向其发送一条 `retain` 消息，防止其消失。结果如下：\n\n*   `MyController` 实例持有对 `observation`\
  \ 的强引用。\n*   `observation` 对象持有对其块的强引用，因为它“拥有”该块。\n*   该块持有对我们`MyController` 实例的强引用。\n\
  \n打破这个循环的方法是将其中一个强引用变为弱引用。最好的方法是将 `init` 修改如下：\n\n```\n- (id)init {\n    if ((self\
  \ = [super init])) {\n        __weak id weakSelf = self;\n        observation =\
  \ [[NSNotificationCenter defaultCenter]\n                       addObserverForName:@\"\
  ESCHATON\"\n                       object:nil\n                       queue:nil\n\
  \                       usingBlock: ^(NSNotification *notification){\n         \
  \                  NSLog(@\"notified observer: %@\", self);\n                  \
  \         NSLog(@\"notified observer: %@\", weakSelf);\n                       }];\n\
  \n    }\n    return self;\n}\n```\n\n这里我们声明了一个指向 `self` 的新弱指针，存储在一个名为 `weakSelf`\
  \ 的新变量中。这个新指针会在块内部使用。当编译器看到这个时，它理解这是一个弱指针，因此不应该被块保留。这意味着 `self` 永远不会收到额外的 `retain`，所以它可以在不再使用时被释放。当发生这种情况时，`dealloc`\
  \ 方法会被执行，`observation` 对象被释放，它所拥有的块也随之被释放。\n\n同样重要的是要认识到：一个块会捕获其代码中引用的任何对象，但对于实例变量，被保留的并非实例变量本身，而是\
  \ `self` 指针！原因在于，即使我们在代码中看不到，实例变量是通过一种 C 风格的结构体访问的。实际上，\n\n```\n[tableView reloadData];\n\
  ```\n\n本质上等同于\n\n```\n[self->tableView reloadData];\n```\n\n面对这种情况，编译器的 ARC 规则要求保留\
  \ `self`。\n\n即使我们可能不常遇到这种情况，理解这个机制的工作原理以及我们为何必须诉诸这种变通方法仍然很重要。那些会立即执行并释放的块（例如与枚举器一起使用时）可能不需要这种程度的审查。然而，一旦我们将块传递给另一个对象，并且我们知道它可能会是一个长期存在的对象，或者不确定时，我们就应该格外小心地检查我们的块，确保我们没有意外地为自己埋下隐患。\n\
  \n## 过滤\n\nApple 添加到 Cocoa 中的块另一个用途是 `NSArray` 的 `indexesOfObjectsPassingTest:`\
  \ 方法。这个方法允许我们声明一个块，该块会检查一个对象，并根据我们自己的标准，决定它是否应该包含在输出的索引集合中（然后可以用这个集合从原始数组中提取“符合条件的”对象）。例如，假设我们有一个人员数组，我们可以像这样找到所有名为“Bob”的人：\n\
  \n```\nNSArray *people;  // <- 假设这个数组已存在\nNSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:\n\
  \    BOOL ^(id obj, NSUInteger idx, BOOL *stop){\n    return [obj.firstName isEqual:@\"\
  Bob\"];\n}];\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n```\n\n尽管块的使用一开始可能看起来很棘手，但过一段时间它们就会变得得心应手，一旦你开始使用，你可能会发现越来越多的使用方式。对于每一位\
  \ Cocoa 程序员来说，它们都是一个非常重要的工具。\n\n\n\n## 异域风味的 Cocoa\n\n尽管我们中有些人热爱 Objective-C，但它并非唯一的选择，有些人更愿意使用其他语言来开发\
  \ Cocoa 应用。也许是因为你有一个特定的代码库想要利用，或者只是你更喜欢其他语言。好消息是，存在一些语言能够很好地与 Objective-C 对接，通过使用所谓的“桥接”技术，在它们与\
  \ Objective-C 之间搭建桥梁，从而进行一些 Cocoa 开发。\n\n坏消息（至少对某些人而言）是，两个最大、最流行的语言（C++ 和 Java）并不在其中。你可能想知道为什么。嗯，简单来说：C++\
  \ 和 Java 太不灵活了。它们缺乏与 Cocoa 这样复杂的 Objective-C 类库完全对接所需的运行时内省能力。也许从技术上讲，Java 具备这种能力。事实上，苹果在\
  \ Mac OS X 最初的几个版本中就包含了一个用于构建 Cocoa 应用的 Java 桥接。但程序员们并未趋之若鹜地使用它，再加上实现和维护 Java 桥接的技术挑战，使得这项投入得不偿失，因此苹果在几年前放弃了该项目。而且，由于我们实际上可以通过\
  \ Objective-C++ 的形式将 Objective-C 和 C++ 结合起来，这在一定程度上降低了对桥接的需求。但这里有一些实际限制。例如，我们不能以\
  \ C++ 类的形式实现 Objective-C 代理，因此需要创建一些“胶水类”，通常成对跨边界（一个 C++ 类，一个 Objective-C 类），每个类都能处理自己领域的事务并为对方翻译内容。这虽然可行，但编写和维护这类代码并不有趣。\n\
  \n回到好消息方面，一批流行的脚本语言（Ruby、Python 和 JavaScript）拥有稳定、可用的桥接，使我们能够用它们进行真正的 Cocoa 开发。\n\
  \n## PyObjC\n\n将非 Objective-C 语言与 Cocoa 框架桥接的最早项目之一是 PyObjC，它让我们可以用 Python 进行大量的\
  \ Cocoa 开发。至此你应该很清楚，Objective-C 的语法，特别是方法名和参数的交错，有些不同寻常，而大多数其他语言并没有等价物。PyObjC 所做的是为\
  \ Cocoa 中包含的所有 Objective-C 类中的所有方法提供映射，以便我们可以从 Python 中调用它们。这些映射由一个非常简单的规则决定：整个\
  \ Objective-C 方法名被压缩成一个单一的符号，方法名中的每个冒号都被替换为下划线字符。所有方法参数都被放在括号中传达，就像标准的 C 函数一样。所有对象都自动桥接，这样我们就可以直接从\
  \ Python 中使用所有标准的 Cocoa 类。\n\n例如，让我们来看一段关于通知的代码。这是 Objective-C 版本：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\n使用\
  \ PyObjC 的 Python 版本大致如下：\n\n```\ncenter = NSNotificationCenter.defaultCenter()\n\
  center.postNotificationName_object_(DATA_RECEIVED, self);\n```\n\n如你所见，缺少了交错的方法名部分和参数，确实影响了可读性。此外，总体而言，它相当“非\
  \ Python 化”，所以，虽然它在其功能上运行良好，但各方都有些不满意之处。\n\nPyObjC 似乎在几年前达到了稳定状态，最近几个版本主要集中在修复 bug\
  \ 上。在 `http://packages.python.org/pyobjc/` 上可用的版本似乎状态良好，并且正在实际项目中使用。\n\n## MacRuby\n\
  \n在 Ruby 方面，有几种方法可以桥接到 Objective-C。多年来，一个名为 RubyCocoa 的项目一直可用，它在许多方面与 PyObjC 类似。\n\
  \n然而，RubyCocoa 似乎已经停滞不前，大部分发展势头已转移到一个名为 MacRuby 的新项目。这个由苹果赞助的项目旨在以一种完全不同的方式将 Ruby\
  \ 语法引入 Cocoa。MacRuby 没有桥接相似的类，而是采取了不同的方法，基本上抛弃了所有现有的 Ruby 标准库类，转而使用 Cocoa 中的等价类，并且经常为它们提供名称与\
  \ Ruby 世界中等价类相匹配的新方法。这意味着，投身于 MacRuby 项目的有经验的 Ruby 开发者可能会发现，他们许多最喜爱的类和方法要么缺失，要么有细微差别。\n\
  \nMacRuby 与 PyObjC 和 RubyCocoa 的一个有趣区别在于，MacRuby 会多走一步，使方法调用的感觉更接近 Objective-C 中的方式，同时仍在\
  \ Ruby 语法内工作。这通过巧妙使用 Ruby 的关键字参数来实现，使用被调用的 Ruby 方法名和参数键来寻找匹配的 Objective-C 方法。回到之前的例子：\n\
  \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
  \ object:self];\n```\n\n在 MacRuby 中写成这样：\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
  center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\n当 MacRuby 处理第二行代码时，它会使用方法名（`postNotificationName`）和参数键（`object`）在接收者（`center`）中寻找名为\
  \ `postNotificationName:object:` 的 Objective-C 方法，找到它，然后调用它。如果我们没有包含 `object` 的关键字参数，或者包含了不属于我们目标底层方法的其他关键字参数，那么这个方法调用将找不到匹配的\
  \ Objective-C 方法并失败。\n\n除此之外，MacRuby 还提供了一些其他有趣的功能，例如编译成本地代码，既支持即时编译也支持提前编译。它也已经脱离了传统的\
  \ Ruby 虚拟机，转而采用一个构建在 LLVM 之上的新运行时，你们中的一些人会认出 LLVM 是 Xcode 能使用的最现代的编译器之一。\n\n在撰写本文时，MacRuby\
  \ 尚未发布 1.0 版本，但绝对值得通过 `www.macruby.org` 关注。\n\n## Nu\n\n在这个背景下，另一个有趣的语言是 Nu。与 PyObjC\
  \ 和 MacRuby 不同，这里不是将现有语言与 Objective-C 对接的问题。实际上，Nu 本质上是一种全新的语言（实际上是 Lisp 的一个变体），它是专门为与\
  \ Objective-C 互操作而设计的，因此它具有同样的交织方法名和参数语法。让我们再次举出那个例子。Objective-C：\n\n```\n[[NSNotificationCenter\
  \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\nNu：\n\
  \n```\n((NSNotificationCenter defaultCenter)\n  postNotificationName:DATA_RECEIVED\
  \ object:self)\n```\n\n怎么样！当然，它并非完全相同。即使忽略从方括号到圆括号的变化，在声明类、方法等方面还有许多其他语法变化，这通常源于\
  \ Nu 作为基于 Lisp 的语言的起源。不过，总的来说，这里有很多是 Objective-C 开发者一眼就能认出的。\n\n除了语言本身，Nu 还包含一个命令行\
  \ shell（`nush`）、一个类似 make 的工具（`nuke`）等等。这些工具组合成一个软件包，让我们可以启动一个 shell，并利用我们熟知并喜爱的\
  \ Cocoa 类进行一些临时脚本编写。我们可以与活动对象交互，并采用探索性的方法来研究 Cocoa 框架。请访问 `http://programming.nu`\
  \ 下载它，并了解更多关于 Cocoa 和 Lisp 这个有趣交集的信息。\n\n## JavaScript\n\n从某种意义上说，这里格格不入的是 JavaScript。每个人都知道\
  \ JavaScript 可以用于编写网页脚本，但你知道你也可以用它来为你的应用编写脚本吗？\n\n\n\nMac OS X 自带的 `WebKit` 框架不允许我们完全用\
  \ JavaScript 创建应用，但它允许我们包含一个脚本层（无论是否使用 Web 视图），让熟悉 JavaScript 的人能够定义应用中的部分行为。我们最可能将它与\
  \ Web 视图结合使用。通过 WebKit 中的 `WebView` 类，我们可以“穿透”到 `WebScriptObject`，这让我们能够从 Objective-C\
  \ 调用 JavaScript 函数，同时也允许我们将一个 Objective-C 对象暴露给 JavaScript 解释器，使 JavaScript 代码能够调用\
  \ Objective-C 方法，其方法到函数的映射方式类似于我们为 `PyObjC` 描述的那样。如果我们希望使用 `WebView` 来布局 GUI，但仍需在\
  \ GUI 中包含能够影响 JavaScript 环境外部事物的控件，这主要会很有用。\n\n但等等，还有更多！除了 WebKit 提供的 JavaScript\
  \ 支持外，还有一个名为 `JSCocoa` 的第三方选项，它使用与 WebKit 相同的 JavaScript 引擎（`JavaScriptCore`）将 JavaScript\
  \ 与 Cocoa 完全桥接。这让我们可以用 JavaScript 编写完整的 Cocoa 应用，就像用 Python 或 Ruby 一样。`JSCocoa`\
  \ 的一个优秀特性（它与本章最后一节描述的 `Cappuccino` 共享此特性）是，除了在 JavaScript 风格函数名与 Objective-C 方法名之间进行转换外，`JSCocoa`\
  \ 实际上还允许我们使用一种与 Objective-C 惊人相似的语法来编写 JavaScript。\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] postNotificationName:DATA_RECEIVED object:self];\n```\n\n`JSCocoa`：\n\
  \n```\n[[NSNotificationCenter defaultCenter] postNotificationName:DATA_RECEIVED\
  \ object:self]\n```\n\n没错——唯一的区别是少了分号，因为在 JavaScript 中，如果一行的结尾也是一个有效的语句结束符，我们就不需要分号。我们第一个承认这看起来像一个\
  \ JavaScript 奇迹：我们没有足够的 JavaScript 知识来理解这个技巧是如何实现的，可能永远也不会，但这没关系。想了解更多信息，请访问 `http://inexdo.com/JSCocoa`。\n\
  \n**F-Script**\n\n如果不提及 `F-Script`，关于 Cocoa 编程的替代语言的讨论就不完整。与大多数最终旨在让我们用另一种语言构建 Cocoa\
  \ 应用的语言桥不同，`F-Script` 似乎有几个互补的目的。首先，我们可以将 `F-Script` 嵌入到我们的应用中，从而为应用添加用户脚本支持，包括用于输入和尝试以\
  \ `F-Script` 语言（基于 Smalltalk，因此与 Objective-C 非常相似）编写的脚本的 GUI 组件。\n\n`F-Script` 的另一个（或许更有用的）特性是它为开发者提供的工具，即一个交互式命令外壳，让我们能探索正在运行的应用。这包括一个图形浏览器，可以让我们在应用的对象之间导航，检查它们的属性，遍历与其他对象的关系，等等。这就像是把\
  \ Xcode 调试器的交互性提升到了最高档。\n\n不仅如此，我们还可以将 `F-Script` 注入任何正在运行的 Cocoa 应用，并使用相同的工具探索其对象！虽然在没有目标应用源码的情况下，这一功能没那么有用，但能够浏览其他应用的结构可以极具教育意义——而且也很有趣。所有\
  \ Cocoa 开发者都应该对这个工具有所了解。请访问 `http://www.fscript.org` 亲自尝试一下。\n\n**移植的 Cocoa**\n\n\
  本书主要介绍 Mac 软件开发（书名就说明了这一点），但如果不提及其他可能应用 Cocoa 及类 Cocoa 技术的领域，那就对不住您了。\n\n**Cocoa\
  \ Touch**\n\n如今，随着 iPhone 开发的飞速发展，想必本书的每位读者都了解一些 iPhone 开发模型，以及它基于 Objective-C 的事实。事实上，很有把握地说，您很可能在试水\
  \ Mac 开发之前就已经做过一些 iPhone 开发了。尽管如此，还是值得提一下 iPhone 的 `Cocoa Touch` 框架，以及它与我们一直在介绍的\
  \ `Cocoa` 框架有何不同。\n\nCocoa 的核心类分布在两个框架中：`Foundation` 包含所有在各种开发中都很有用的基础类（如 `NSString`、`NSArray`\
  \ 等），而 `AppKit` 包含所有特定于桌面 GUI 应用开发的类（如 `NSApplication`、`NSView`、`NSWindow` 等）。在\
  \ iPhone 的 `Cocoa Touch` 中，`Foundation` 框架基本相同，但 `AppKit` 被移除，并由 `UIKit` 取代。\n\n\
  `UIKit` 的许多基础与 `AppKit` 相似，但做了一些调整，使其能在支持加速计的小型触摸屏设备上轻松工作。每个应用都有一个单一的 `UIWindow`，所有绘制都在其中进行，而这个\
  \ `UIWindow` 包含一个 `UIView` 子类（如 `UIButton`、`UITextField` 等）的层级结构。尽管 `AppKit` 仅有的原生用户输入方式是鼠标和键盘，但\
  \ `UIKit` 也提供了类似的基于事件的输入，用于处理多个屏幕触摸以及设备移动。\n\n在其他方面，`UIKit` 有点像“AppKit 2.0”。苹果趁机抛弃了一些累赘，这些\
  \ API 和类可能在一二十年前看起来是个好主意，但现在已显得多余。例如，与视图不同的单元格类（如 `NSCell` 类所展示的）整个概念现已不复存在。唯一名称中包含\
  \ *cell* 的 `UIKit` 类是 `UITableViewCell`，它实际上是一个用于绘制表格视图某一块的 `UIView` 子类（因此得名）。此外，`UIKit`\
  \ 以一种 `AppKit` 从未有过的方式接受了 Objective-C 2.0 的属性，为大多数可配置属性提供了声明的属性。\n\n除此之外，Cocoa 中还有一些重要部分在\
  \ `Cocoa Touch` 中不可用（至少写作本书时是这样）。具体来说，就您在本书中读到的内容而言，最大的缺失部分是 `Cocoa Bindings`。`KVC`\
  \ 和 `KVO` 是存在的，所以如果您雄心勃勃，构建自己的绑定技术的基础是有的。如果不这样做，您会发现 iOS 应用中有很大一部分是样板代码，用于将模型对象的值推送到各种视图和控件中。\n\
  \n**GNUstep 和 Cocotron**\n\n另一个可以运行类 Cocoa 应用的平台是 `GNUstep` 及其较新的兄弟项目 `Cocotron`。`GNUstep`\
  \ 项目已经存在很长时间了，其最初目标是为 Linux 和其他 Unix 机器提供桌面应用编程环境。开发库基于 `OpenStep` API，这是一个已发布的标准，列出了属于今天\
  \ `Foundation` 和 `AppKit` 框架子集的类和 API。而这又源于 1990 年代中期 NeXT 与 Sun 的合作，当时 Sun 希望为其\
  \ `Solaris` 操作系统提供一个应用开发环境，所有这些都发生在苹果后来收购 NeXT 之前，NeXT 的操作系统和软件后来演变成了 Mac OS X。\n\
  \n所以，时至今日，`GNUstep` 仍活跃在开源社区中。`GNUstep` 持续发展，随着志愿者重新实现苹果添加到 Mac OS X 的最新功能而获取新的\
  \ API，但其主要目标一直是实现旧的 `OpenStep` API，新增功能只是锦上添花。到目前为止，`GNUstep` 在知名项目方面还没有太多可吹嘘的，但作为将\
  \ Cocoa 应用移植到其他 Unix 变体或 Windows 的一种方式，值得关注 `www.gnustep.org` 上的 `GNUstep`。\n\n\
  几年前，出现了一个名为 `Cocotron` 的新替代方案。\n\n\n\n## Cocotron\n\nCocotron 的关注点略有不同（它试图紧跟苹果所有最新的类和\
  \ API 变更），其部署目标也不同（它主要关注 Windows 而非 Unix）。不过，如果你想把应用移植到 Windows 上，它也值得考虑。此外，它的许可证比\
  \ GNUstep 更为宽松，这意味着你可以自由地将 Cocotron 集成到你自己的闭源应用中。Cocotron 的官方网站 `www.cocotron.org`\
  \ 似乎已近乎停摆，但一些开发工作仍在进行，这从该项目 Google 群组 (`http://groups.google.com/group/cocotron-dev/`)\
  \ 的讨论中可见一斑。\n\n## Cappuccino/Objective-J\n\n过去几年中另一个有趣的发展是 Cappuccino 开发环境。与我们提到的其他环境不同，Cappuccino\
  \ 专注于开发 Web 应用，而非桌面应用。因此，Cappuccino 应用不是在桌面上运行，而是托管在 Web 服务器上，在 Web 浏览器中运行。Cappuccino\
  \ 开发的核心是让软件在客户端运行，使用在单个 HTML 页面上下文中执行的 JavaScript，而不是像传统 Web 开发框架那样，逐页地提供内容。\n\n\
  Cappuccino 包含的类库在名称和功能上模仿了 Foundation 和 AppKit 的许多特性，甚至还能神奇地在 JavaScript 中实现 Objective-C\
  \ 的大部分语法，正如我们在提到 JSCocoa 时描述的那样。使用 Cappuccino 创建的应用可以发布到任何 Web 服务器上，并在任何现代浏览器中运行，就像其他任何\
  \ Web 应用一样。这种在 JavaScript 中实现 Objective-C 的方式被称为 Objective-J，它是使 Cappuccino 运转起来的关键部分。\n\
  \nCappuccino 最初是一个奇怪的混合体，其核心是包含 JavaScript 框架的开源代码，以及一个原本打算作为商业 IDE 的名为 Atlas 的工具（它本身就是一个\
  \ Cappuccino 应用）。然而，这个创意背后的公司在其 Atlas 发布之前就被收购了。如今，这个开源项目已经扩展，包含了让你可以直接在 Xcode 的\
  \ Interface Builder 中为你的 Cappuccino 应用构建 GUI 的工具。请访问 `www.cappuccino-project.org`\
  \ 了解最新动态。\n\n## 一切终章\n\n至此，我们结束了对你在提升 Cocoa 技能时可以采取的后续路径的讨论；同时也结束了本书。我们希望本书带你到达了你想要去的地方，但请不要认为这个终点就是最终目的地！请访问\
  \ *Learn Cocoa on the Mac* 网站，在那里你会找到与其他 Cocoa 开发者讨论的论坛、本书所有示例的源代码等等。另外，请务必访问我们的网站\
  \ `http://learncocoa.org`，我们将竭尽全力帮助你学到更多知识！\n\n## 索引\n\n![image](img/square1.jpg)\
