  ## 致谢


  当一本书从概念变成你手中的纸张（或电子书）时，需要感谢很多人。除了将文字和代码片段输入文本编辑器之外，还有很多工作要做。Apress 的 Douglas Pundick
  和 Jill Balzano 帮助确保了许多事情的顺利进行，这些工作在作者的视线之外。当然，让作者们保持正轨也很重要，他们也一直在为此忙碌。我们的技术审校者尼克·韦尼克在代码和文字方面都发现了许多小（以及一些不小的）细节，并且总是有充分的理由建议修改。我们的文字编辑玛丽·贝尔出色地锤炼了我们的文字，完善了我们的语法，并确保你读到的内容清晰连贯。在她的手中，许多拗口的句子被重构得更加优美。


