  \n## 糟糕的调整大小意外，或者说，约束来救场！\n\n第一次运行重新布局后的程序时，你很可能看到像图 6-5 那样相当难看的画面。这是通过调整大小手柄垂直拉伸窗口并水平缩小的结果。观察图片中的窗口，表格视图状态良好，“能力与属性”框和“主要动机”框也是如此。“外观”框向下扩展了。“备注”框水平缩小了，“基本信息”框也一样。实际上，“基本信息”框简直一团糟。你的布局可能会以不同于图示的方式崩溃，但很可能无法完全按你预期的方式工作。你可能希望使用本章提供的源代码来进行试验。\n\
  \n![9781430245421_Fig06-05.jpg](img/9781430245421_Fig06-05.jpg)\n\n图 6-5。唉！这可不美观\n\
  \n在修复这个问题之前，让我们先想想我们希望达到的效果。对于这个程序，我们希望上一章的所有原始 UI 元素（`NSBoxes` 中的所有项目）保持相同大小，并固定在窗口右侧。两个新按钮应保持相同大小，彼此间距不变，并固定在窗口左侧表格视图的下方。新表格视图应在窗口扩展时同时垂直和水平扩展，它应紧贴窗口左侧，并且在任何方向上都不能缩小到当前尺寸以下。表格视图右侧的几个框应与表格视图保持距离。\n\
  \n为了实现这一切，我们必须了解 Cocoa 如何处理大小调整。从 Mac OS X Lion 开始，大小调整通过一个名为 Cocoa 自动布局（Cocoa Auto\
  \ Layout）的系统进行。自动布局中的调整行为使用带优先级的约束来指定，这意味着你可以声明视图的最小或最大尺寸、需要保留的子视图之间的关系、视图与其父视图之间的关系等等。当用户调整窗口大小时，约束满足引擎会根据优先级顺序动态尝试确定最佳布局，以尽可能保留约束。这些约束还处理用户界面在从右到左书写系统（如阿拉伯语和希伯来语）中的行为。\n\
  \n每个约束都表达一种关系，例如“等于”、“小于”或“大于”，以及一对视图或一个视图与一个常量。一个非常简单的约束是“`myButton` 的宽度 = 87”。显然，这会将按钮宽度固定为\
  \ 87 点。约束不必是等式；一个有效的约束可以是“`myButton` 的高度 >= 32”，这表示按钮的高度不能小于 32。系统会更倾向于较小尺寸而非较大尺寸；一个宽度必须大于或等于\
  \ 32 的按钮通常会是 32（满足不等式的最小值）。\n\n更复杂的一对约束如下：“`myButton` 的前边缘与窗口前边缘之间的水平间距 = 10”和“`myButton`\
  \ 的后边缘与窗口后边缘之间的水平间距 = 15”。为了在调整大小时保持这两个约束成立，按钮需要随窗口一起放大和缩小。注意，我们使用了“前”和“后”而非“左”和“右”。在从左到右的书写系统中，前边缘是左侧。然而，在从右到左的书写系统中，前边缘是右侧。\n\
  \n每个约束还有一个优先级，范围从 1 到 1000。优先级高的约束会在优先级低的约束之前被满足，如果两个冲突的约束无法同时满足，优先级高的胜出，优先级低的会被违反。例如：“`myButton`\
  \ 的宽度 >= 32，优先级 1000”和“`myButton` 的宽度 = `someField` 的宽度 - 40，优先级 750”。只要 `someField`\
  \ 的宽度大于 72，这两个约束都能得到满足，`myButton` 将比 `someField` 小 40 点。然而，如果 `someField` 缩小到低于\
  \ 72 点，优先级高的约束将胜出，`myButton` 将不再缩小。\n\n每个视图还具有内容拥抱优先级（Content Hugging Priority）和内容压缩阻力优先级（Content\
  \ Compression Resistance Priority）。这些属性描述了视图如何相对于最合适的尺寸（即其固有尺寸）进行大小调整。对于按钮而言，固有尺寸是显示其标签（以及图标，如果适用）而不发生裁剪所需的尺寸。内容拥抱控制视图在被要求大于其固有尺寸时如何调整大小。压缩阻力控制视图在被要求小于其固有尺寸时如何调整大小。通常，这些优先级的默认值是不错的选择，在本章中，我们将保持它们不变。\n\
  \n## 创建和编辑约束\n\nInterface Builder 允许我们指定控制每个视图调整大小行为的约束。事实上，我们一直通过 Interface Builder\
  \ 在我们拖动新控件到窗口时显示的蓝色虚线引导线来做到这一点。约束最初是在 Interface Builder 中根据控件定位时高亮显示的蓝色引导线创建的，并且如果控件被重新定位，约束可能会改变。例如，当我们把表格视图拖到窗口右上角时，当我们靠近边缘时会出现一条垂直和水平的蓝色虚线。这表明表格视图应固定在该角落，并创建一对约束，指示表格视图应与窗口顶部和左边缘保持恒定距离。像我们这样的复杂窗口，可能包含几十个约束。\n\
  \n为了确定哪些约束合适，我们首先需要决定窗口的适当调整行为。针对我们的窗口，假设我们希望新的表格视图在窗口放大时同时水平和垂直调整大小。我们希望所有框保持大小不变，并在用户调整窗口时向右侧弹性移动。最后，我们希望按钮保持彼此相同大小，并固定在窗口底部。我们需要设置新的约束来实现这一点，并可能移除一些非预期的约束。顺便提一下，处理调整大小是一个迭代过程。结合在\
  \ Interface Builder 模式下试验窗口调整大小以及使用 Xcode 中的“模拟文档”功能进行试错，通常是打磨它的方法。花时间试验调整大小并观察约束如何交互，将比你从书本中读到的任何内容都更能加深你的理解。\n\
  \n这些约束可以在 Xcode 内部进行编辑；我们可以在屏幕上、实用工具区域（Utility area）的“大小检查器”（Size Inspector）中以及\
  \ Interface Builder 窗格左侧边缘的图标停靠栏中看到它们。选择隐藏在 Interface Builder 窗格左下角的小展开三角形，图标停靠栏将展开，显示窗口中视图的完整层次结构。每个视图都有一组关联的约束，而我们的窗口有很多视图。在实用工具区域中，选择“大小检查器”（![image](images/arrow2.\n\
  \n\n5.  选中“外观”框，然后选择标记为**外观**的框，展开左侧的**约束**项。当该框被选中时，Interface Builder 窗格应如图 6-6\
  \ 所示。\n\n![9781430245421_Fig06-06.jpg](img/9781430245421_Fig06-06.jpg)\n\n**图 6-6.**\
  \ 外观框的调整大小约束\n\n在**尺寸检查器**中，我们可以看到影响外观框的九个约束，至少到目前为止我们是这样布局的。（根据你布局窗口的方式，你的约束可能顺序不同或常量略有不同。）每条从该框延伸出的蓝线也代表一个与另一个视图相关联的调整大小约束。并非所有约束都与另一个视图相关，因此实际激活的约束比蓝线可视化的要多。\n\
  \n外观框的问题在于，当窗口在调整大小过程中被拉长时，它会向下扩展，同时拉长图像视图。查看**尺寸检查器**中的约束列表，其中一条显示为“与父视图的底部间距等于：29”。此约束意味着外观框的底部应保持在窗口底部上方\
  \ 29 点处。另一个与垂直大小相关的约束显示为“与框的顶部间距 – 基本信息等于：默认”。这意味着该框的上边缘应保持与基本信息框底部的系统默认距离。约束左侧的紫色图标表示这些是系统创建的约束——即我们之前在\
  \ Interface Builder 中定位该框时设置的约束。当我们之前将外观框对齐到窗口底部附近出现的蓝色参考线时，我们隐式地创建了那个底部间距约束。然而，如果我们点击底部间距约束旁的齿轮图标，会发现**删除**菜单项是禁用的。要删除它，我们需要换个思路。\n\
  \n让我们稍微试验一下。在 Interface Builder 中，抓住窗口底部并向下拖动以放大它。外观框确实在垂直方向上变大了。底部间距约束导致该框增长，以保持距离窗口底部\
  \ 29 点。将窗口重新调整回 364 点高度以恢复所有内容（或者松开鼠标然后按撤销（![images](img/arrow3.jpg)Z）来撤销调整大小操作）。\n\
  \n既然我们不能直接删除外观框上的约束，我们将改变导致系统最初创建它的条件，我们通过利用（或避免使用）蓝色参考线来实现这一点。最简单的方法是将外观框从窗口底部边缘移开。请按照以下步骤操作：\n\
  \n1.  创建一个新的约束来保持外观框的当前大小。为此，选择该框，然后从菜单栏中选择**编辑器** ![image](img/arrow.jpg) **固定**\
  \ ![image](img/arrow.jpg) **高度**。\n2.  将外观框移至窗口顶部附近，远离底部。这将移除将框底部固定在窗口底部的约束。\n3.\
  \  向下缩小窗口以腾出更多空间。\n4.  将外观框放回原位，使其框标题与窗口底部区域的其他两个框对齐，并在它们之间均匀间隔。由于窗口底部更远了，我们应该避免创建该约束。窗口应该看起来像图\
  \ 6-7。\n5.  将窗口调整回原来的大小。\n\n![9781430245421_Fig06-07.jpg](img/9781430245421_Fig06-07.jpg)\n\
  \n**图 6-7.** 重新布置外观框的约束\n\n当垂直调整大小时，窗口的行为符合我们的预期。\n\n现在，在水平调整大小方面，我们有两个问题需要处理：表格视图没有伸缩，但最右边的两个框（备注，以及能力和特性）却在伸缩。我们可以通过选择**编辑器**\
  \ ![image](img/arrow.jpg) **模拟文档**来检查是否出现这种情况。\n\n我们先检查表格视图。在 Interface Builder\
  \ 中选择表格视图，查看其约束。没有前导或尾随间距约束会固定其大小，所以问题一定出在右边的两个框上。因为我们希望它们保持大小，而不是在窗口调整大小时扩大，所以选择能力和特性框，然后选择**编辑器**\
  \ ![image](img/arrow.jpg) **固定** ![image](img/arrow.jpg) **宽度**。对所有其他框执行相同操作。\n\n\
  选择**编辑器** ![image](img/arrow.jpg) **模拟文档**并尝试水平调整大小。窗口完全不动了。我们有一些约束固定了布局，需要找出并移除它们。对于每个框，查看**尺寸检查器**中列出的约束，找到那些说“到父视图的前导间距”且值为任意值的约束。你可以通过选择该框并查看是否有从左边缘延伸到窗口边缘的蓝线来判断这些约束是否存在。删除那些可删除的约束，可以通过从框的**尺寸检查器**中该约束条目的齿轮图标下的菜单选择**删除**，或者选择蓝线并按**删除**键。\n\
  \n移除所有约束后，再次选择**编辑器** ![image](img/arrow.jpg) **模拟文档**并尝试水平调整大小。这次窗口应该按我们期望的方式调整大小，如图\
  \ 6-8 所示。\n\n![9781430245421_Fig06-08.jpg](img/9781430245421_Fig06-08.jpg)\n\n**图\
  \ 6-8.** 终于，调整大小成功了！\n\n在继续实现代码之前，这里还有几点关于调整大小的补充说明。调试调整大小问题几乎总是一个迭代、试错的过程。我们在这里已经触及了一些可行的方法：\n\
  \n*   在 Interface Builder 中调整窗口大小，观察各元素相对于窗口如何调整。\n*   如果窗口设计已经演变，尝试移动用户界面元素以重置约束。\n\
  *   尝试使用“模拟文档”功能并进行实验。\n*   通过蓝线和尺寸检查器，查看 Interface Builder 中约束的可视化表示。\n\n关于约束和\
  \ Cocoa Auto Layout 还有很多要学习的内容；这些只是基础。更多详情和调试技巧，请查阅 Apple Developer Connection 网站和\
  \ Xcode 文档中的 *Cocoa Auto Layout 指南*。\n\n**注意**：Cocoa Auto Layout 是在 Mac OS X 10.7\
  \ 中引入的。在此之前，调整大小是通过一种称为“弹簧和支柱”的机制来控制的，该机制控制视图相对于包含它们的窗口如何调整大小。在 10.7 及更高版本中，旧的弹簧和支柱调整大小行为会在后台转换为约束；应用程序可以同时包含使用约束的\
  \ nib 文件和使用弹簧和支柱的 nib 文件。但是，如果你遇到 2011 年之前的 Cocoa 代码，你几乎肯定会遇到不使用约束的 nib 文件。\n\n\
  ## 为表格视图腾出空间：代码篇\n\n连接建立完毕且调整大小问题已得到控制，我们现在可以将注意力转向驱动表格视图并响应“添加”和“移除”按钮点击所需的代码。为此，我们需要离开\
  \ Interface Builder 模式并回到我们的代码中。打开**项目导航器**（![images](img/arrow3.jpg)1），如果它尚未打开的话。单击`VillainTrackerAppDelegate.m`文件的条目，编辑器区域应从\
  \ Interface Builder 更改为一个显示我们对象代码的代码窗口。\n\n\n## 章节标题：为反派数组添加支持\n\n上一章的基础工作已经就绪，为反派数组添加支持的过程出奇地简单。基本流程是：我们先创建一个数组，在需要显示内容时告知表格视图（当内容发生变化时），实现几个\
  \ `dataSource` 方法来向表格视图提供数据，再实现一个 `delegate` 方法用于在表格视图选择项发生变化时被调用（这样我们就能更新所有其他视图以匹配所选反派）。最后，我们还会添加一对方法来实现向数组中添加和删除反派。大功告成！\n\
  \n首先，我们初始化一个用于存储反派的数组，并通知表格视图加载其内容。通过向 `applicationDidFinishLaunching:` 方法中添加如下代码（加粗部分）即可实现。首先创建一个包含所有反派的数组（初始时仅包含我们之前在代码中创建的第一个反派），并将其赋值给我们的反派实例变量。然后通知表格视图加载内容，并选中其第一行。\n\
  \n通知表格视图选择哪一行其实比表面看起来要复杂。我们使用的 `NSTableView` 方法名为 `selectRowIndices:byExtendingSelection:`。由于表格视图可以同时选中多行，且选中的行不必连续，因此该方法需要传入一个索引集合来指定要选中的行。在我们的场景中，只需要选中一行，因此我们动态构建一个仅包含单个元素的集合。\n\
  \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
  \    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n     \
  \               @\"莱克斯·卢瑟\", kName,\n                    @\"斯莫维尔\", kLastKnownLocation,\n\
  \                    [NSDate date], kLastSeenDate,\n                    @\"超人\"\
  , kSwornEnemy,\n                    @\"复仇\", kPrimaryMotivation,\n             \
  \       [NSArray arrayWithObjects:@\"邪恶天才\", nil], kPowers,\n                  \
  \  @\"超级英雄行动\", kPowerSource,\n                    @9, kEvilness,\n            \
  \        [NSImage imageNamed:@\"NSUser\"], kMugshot,\n                    @\"\"\
  , kNotes,\n                    nil];\n    /* 新增代码开始 */\n    self.villains = [NSMutableArray\
  \ arrayWithObject:self.villain];\n    [self.villainsTableView reloadData];\n   \
  \ [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:0] byExtendingSelection:NO];\n\
  \    /* 新增代码结束 */\n\n    [self updateDetailViews];\n}\n```\n\n我们还需要在 `takeName:`、`takeLastSeenDate:`\
  \ 和 `takeMugshot:` 方法的末尾添加 `[villainsTableView reloadData]` 调用，这样当用户编辑这些属性的控件时，表格视图会相应更新。只需复制该行代码并粘贴到每个方法的末尾即可。仅仅因为单个值发生变化就去调用一个看起来会重新加载整个数据表的方法，似乎有些过度，但请放心：`NSTableView`\
  \ 采用*懒加载*机制，通常只在某行即将显示时才会请求该行的内容。即使你有上百万行数据，但只要不滚动到前 30 行之后，表格视图最多只会加载前 30 行。同理，通知表格视图重新加载数据只会立即加载可见行，其余行仅在滚动显示时才会重新加载。\n\
  \n至此，我们应该能够编译并运行应用，看到与上一章结束时大致相同的界面，只是多了一个空的表格视图和两个不起作用的按钮。是时候用反派来填充这个表格视图了！\n\n\
  ## 表格视图需要辅助\n\n我们已经通知表格视图加载内容，但在连接了表格视图 `dataSource` 和 `delegate` 输出的对象（即我们的 `VillainTrackerAppDelegate`）中，必须实现\
  \ `NSTableDataSource` 和 `NSTableViewDelegate` 协议中的某些方法，表格视图才能正常工作。`NSTableDataSource`\
  \ 和 `NSTableViewDelegate` 是非正式协议，与大多数委托协议类似，这意味着我们无需声明类遵循这些协议。因此，在 Objective-C 中实现这些方法是可选的。尽管如此，表格视图要显示内容，实际上有几个方法是必需的：`NSTableViewDataSource`\
  \ 中的 `numberOfRowsInTableView:` 和 `NSTableViewDelegate` 中的 `tableView:viewForTableColumn:row:`，这两个方法用于表格视图准备显示内容。以下是它们在\
  \ `VillainTrackerAppDelegate.m` 中的实现方式：\n\n```\n- (NSInteger)numberOfRowsInTableView:(NSTableView\
  \ *)aTableView {\n    return [self.villains count];\n}\n\n- (NSView *)tableView:(NSTableView\
  \ *)aTableView\n    viewForTableColumn:(NSTableColumn *)tableColumn\n          \
  \         row:(NSInteger)row {\n\n    NSMutableDictionary *thisVillain = [self.villains\
  \ objectAtIndex:row];\n    NSString *thisColName = [tableColumn identifier];\n\n\
  \    NSView *result = nil;\n\n    // 根据当前使用的列，我们需要执行不同的操作。\n    // 通过 [tableColumn\
  \ identifier] 调用 makeViewWithIdentifier 可以确保\n    // 获取到已在 IB 中为该列配置好的视图，AppKit\
  \ 会为我们管理这些。\n    if ([thisColName isEqualToString:kName]) {\n        NSTableCellView\
  \ *thisCell = [aTableView makeViewWithIdentifier:thisColName owner:self];\n    \
  \    thisCell.textField.stringValue = [thisVillain objectForKey:kName];\n      \
  \  result = thisCell;\n    } else if ([thisColName isEqualToString:kLastSeenDate])\
  \ {\n        NSTableCellView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
  \ owner:self];\n        thisCell.textField.stringValue = [thisVillain objectForKey:kLastSeenDate];\n\
  \        result = thisCell;\n    } else if ([thisColName isEqualToString:kMugshot])\
  \ {\n        NSImageView *thisCell = [aTableView makeViewWithIdentifier:thisColName\
  \ owner:self];\n        [thisCell setImage:[thisVillain objectForKey:kMugshot]];\n\
  \        result = thisCell;\n    }\n\n    // 返回结果。\n    return result;\n}\n```\n\
  \n第一个方法不言自明：我们只需返回数组的大小，这样表格视图就知道需要显示多少行。第二个方法会在表格中每个单元格即将显示时被调用。表格视图会告诉我们它想显示哪个列和行索引。行索引与内容数组中相关对象的索引相同，因此调用\
  \ `[villains objectAtIndex:rowIndex]` 可以从反派数组中返回相应的模型对象。你可能还记得，我们使用的模型对象实际上是 `NSMutableDictionary`\
  \ 实例，所有值都可通过键访问。在配置表格视图中每列的标识符属性时，我们使用了与模型对象相同的键名。根据列的标识符，我们通过 `makeViewWithIdentifier:owner:`\
  \ 方法向表格视图请求创建该列对应的 `NSView` 子类实例。然后根据模型对象中的相应值配置该视图，最后将视图返回给表格视图。\n\n例如，当 `名称` 列顶部单元格即将显示时，该方法会以\
  \ `rowIndex` 为 0 且 `TableColumn` 指向 `名称 NSTableColumn` 的参数被调用。\n\n\n\n我们使用`0`来从`villains`数组中获取指定的反派，然后利用表格列标识方法的返回值`@\"\
  name\"`，从选中的反派中检索对应的值。我们请求表格视图获取该列（该列已在 Interface Builder 中配置）的适当`NSView`实例，然后以该`NSView`支持的任何方式填充它。最后，返回该视图，表格视图会将其绘制出来。现在我们应该能够编译并运行\
  \ VillainTracker，并看到默认反派既显示在控件中，也作为表格视图的唯一一行显示。此外，如果我们编辑反派的名字、最后出现日期或头像，这些新值应能反映在表格视图中。然而，我们目前仍然只有一个反派，也无法追踪更多反派。让我们立即改变这一点。\n\
  \n## 添加更多反派\n\n我们之前已存根了`newVillain:`方法。现在来实现它。`newVillain:`方法向反派数组添加一个新的“空”反派对象，通知表格重新加载，并告知表格视图选择哪一行（最后一行，因为这是我们刚刚添加的）。\n\
  \n```objectivec\n- (IBAction)newVillain:(id)sender {\n    [_window endEditingFor:nil];\n\
  \    [self.villains addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
  \        @\"\", kName,\n        @\"\", kLastKnownLocation,\n        [NSDate date],\
  \ kLastSeenDate,\n        @\"\", kSwornEnemy,\n        @\"Greed\", kPrimaryMotivation,\n\
  \        [NSArray array], kPowers,\n        @\"\", kPowerSource,\n        [NSNumber\
  \ numberWithInt:0], kEvilness,\n        [NSImage imageNamed:@\"NSUser\"], kMugshot,\n\
  \        @\"\" , kNotes,\n        nil]];\n\n    [self.villainsTableView reloadData];\n\
  \n    [self.villainsTableView selectRowIndexes:[NSIndexSet indexSetWithIndex:[villains\
  \ count]-1]\n                      byExtendingSelection:NO];\n}\n```\n\n这里唯一可能不熟悉的代码是第一个方法调用`[_window\
  \ endEditingFor:nil]`。让我们看看它的两个部分。首先，`_window`实例变量从何而来？Xcode 通过一个声明的属性（在`VillainTrackerAppDelegate.h`文件中生成）为我们构建了它，并自动连接到窗口：\n\
  \n```objectivec\n@property (assign) IBOutlet NSWindow *window;\n```\n\n由于我们没有通过`@synthesize`声明给出显式名称，Xcode\
  \ 默认创建了一个带下划线前缀的实例变量。其次，我们在窗口上调用的方法是`endEditingFor:`。这简单地告诉窗口：是时候结束用户当前正在进行的任何其他编辑行为（例如在文本字段中打字）了。我们需要调用此方法，以便将编辑后的值“保存”到其底层反派对象中，因为稍后在`newVillain:`中，我们将更改表格视图的选择，这反过来可能会清空各个控件中显示的值！\n\
  \n## 选择一个反派\n\n我们应用的详情部分仍然只显示列表中的第一个反派。为了更新详情视图，我们需要实现一个委托方法，该方法在表格视图选择发生变化时被调用。这让我们能注意到用户选择了哪一行，将我们的反派实例变量指向反派数组中的相应行，并重新显示所有其他控件以匹配新的选择。将以下方法添加到`VillianTrackerAppDelegate.m`的`@implementation`部分：\n\
  \n```objectivec\n- (void)tableViewSelectionDidChange:(NSNotification *)aNotification\
  \ {\n    if ([self.villainsTableView selectedRow] > -1) {\n        self.villain\
  \ = [self.villains objectAtIndex:[self.villainsTableView selectedRow]];\n      \
  \  [self updateDetailViews];\n        NSLog(@\"current villain properties: %@\"\
  , self.villain);\n    }\n}\n```\n\n请注意，该方法的核心部分被包裹在一个`if`子句中。这是必要的，因为表格视图可能告诉我们它当前没有任何选中的行，这通过从其`selectedRow`方法返回`–1`来表示。除此之外，你现在应该能理解其中的逻辑了。\n\
  \n现在编译并运行应用，会发现+按钮现在确实能产生效果，如图 Figure 6-9 所示。此外，我们应该能够点击表格视图中的不同反派，并看到其他控件中的值随之变化。\n\
  \n![9781430245421_Fig06-09.jpg](img/9781430245421_Fig06-09.jpg)\n\nFigure 6-9. +按钮现在可以添加反派了\n\
  \n## 阻止你的邪恶行径！\n\n能够删除反派会很不错。一旦我们的英雄说服某个反派停止作恶，我们可能想将其从数据库中移除。或者可能只是我们打错了字。无论如何，让我们添加删除反派的功能。我们已经存根了`deleteVillain:`方法，下面是该方法应实现的功能。（我们添加了注释来展示不同的部分，代码后将进行描述。）\n\
  \n```objectivec\n- (IBAction)deleteVillain:(id)sender {\n\n    // 第 1 部分：\n    //\n\
  \    [_window endEditingFor:nil];\n    NSInteger selectedRow = [self.villainsTableView\
  \ selectedRow];\n\n    // 第 2 部分：\n    //\n    [self.villains removeObjectIdenticalTo:self.villain];\n\
  \    [self.villainsTableView reloadData];\n\n    // 第 3 部分：\n    //\n    if (selectedRow\
  \ >= [self.villains count]) {\n        selectedRow = [self.villains count]-1;\n\
  \    }\n\n    // 第 4 部分：\n    //\n    if (selectedRow > -1) {\n        // 取消选中所有行，以确保表格视图认为选择已“更改”，\n\
  \        // 即使可能仍然是同一行索引。\n\n        // 第 5 部分：\n        //\n        [self.villainsTableView\
  \ deselectAll:nil];\n        [self.villainsTableView selectRowIndexes:[NSIndexSet\
  \ indexSetWithIndex:selectedRow]\n                          byExtendingSelection:NO];\n\
  \n        [self updateDetailViews];\n    }\n}\n```\n\n这个方法比本书到目前为止展示的大部分代码都要复杂一些，因此需要稍作额外解释。\n\
  \n在第 1 部分，我们告诉窗口完成任何正在进行的编辑，然后获取表格当前选中行的索引——即将要被删除的行。注意，我们已经知道选中了哪个反派（因为它存储在一个实例变量中），但拥有行索引对于确保删除后选择的合理性至关重要（我们将在第\
  \ 4 部分处理）。\n\n在第 2 部分，我们从`villains`数组中删除选中的对象（由`villain`属性指向），然后通知表格视图重新加载。请注意从数组中移除反派的方法`removeObjectIdenticalTo:`。此方法让`NSMutableArray`通过比较对象的实际内存地址与它所包含对象的地址来扫描自身，从而找到并只移除我们传入的精确对象。否则，如果我们使用更常用的`removeObject:`方法，它会通过发送`isEqual:`方法来比较对象，后者则比较值。在这种情况下，任何属性与选中反派相同的其他反派对象也存在被删除的风险。\n\
  \n在第 3 部分，我们做一个小调整。如果之前的选中行索引是数组中的最后一行，那么现在我们已经从数组中移除了一个对象，该索引就已越界。\n\n\n\n此时，我们将其重置为指向当前最后一个对象。接下来，第\
  \ 4 节检查`selectedRow`是否为 0 或更高。这个检查很重要，因为第 3 节确实有可能将其设置为-1！想象一下这种情况：数组中只有一个对象，然后点击“移除”按钮：起初`selectedRow`为\
  \ 0（数组中唯一行的索引），但经过第 3 节后它将变为-1，第 4 节通过直接跳过方法剩余部分来处理这种情况。最后，第 5 节取消表格视图中的所有选中项，然后选中当前需要选择的行，最后根据当前选择更新所有视图。这看起来可能不明显，但先取消选中表格视图中的所有行很重要，否则`tableViewSelectionDidChange:`委托方法可能不会被总是调用（因为删除一行后，选中的行索引通常还是同一个数字，而表格视图无法知道我们已经从内容数组中删除了一个对象，导致该行索引现在指向了不同的对象）。\n\
  \n现在编译并运行应用程序；我们可以删除选中的反派，并且控件中的值将随之更新以匹配新的选中项。我们只剩下最后一个功能要实现。用户还不能直接在表格视图中编辑值。现在就来解决这个问题。\n\
  \n## 在表格视图中编辑\n\n用户应该能够编辑反派的名字，或将新的头像拖拽到表格视图中的任意行，并更新相应的反派。由于表格视图的列是`NSViews`，表格视图中的每个单元格都可以在\
  \ Interface Builder 中指定目标和动作；表格视图内部的用户界面元素与其他视图的工作方式完全相同。当用户在表格视图中编辑值时，该动作可以连接到我们的代码，通知我们发生了更改。限制在于目标必须是表格视图的委托，但这对本应用程序来说不是问题。此外，我们现有的`takeName:`和`takeMugshot:`方法仍然可用，但需要做一些小的调整。这些方法针对选中的反派进行操作，但如果用户没有选中行（即选中反派），就无法在表格视图中编辑值。然而，这些方法目前只期望从详细信息视图中的控件调用，但现在我们增加了从多个位置进行设置的能力。对于本应用，我们将只允许在行内编辑名字和头像，并禁止编辑最后出现日期。\n\
  \n还有一个小障碍需要解决。默认情况下，表格视图单元格是不可编辑的。在 Xcode 中可以轻松更改此设置。\n\n要建立连接，我们需要从每个列中的视图按住 Control\
  \ 键拖拽到`VillianTrackerAppDelegate`实例。但是，表格视图单元格嵌套在窗口视图层次结构的较深层，因此我们将采用另一种方式来建立连接，这样更易于找到正确的用户界面组件。\n\
  \n回到 Xcode，打开`MainMenu.xib`文件，该文件将在 Interface Builder 画布中打开。点击屏幕左下角的小展开三角形，这将把屏幕左侧的对象停靠栏展开为窗口视图层次结构的轮廓。同时，打开实用工具区域中的*属性检查器*。\n\
  \n深入轮廓到`Name`列的文本字段；从外到内的路径是：Window – Villain Tracker ![image](img/arrow.jpg) View\
  \ ![image](img/arrow.jpg) Scroll View – Table View ![image](img/arrow.jpg) Table\
  \ View ![image](img/arrow.jpg) Table Column – Name ![image](img/arrow.jpg) Table\
  \ Cell View ![image](img/arrow.jpg) Static Text – Table View Cell ![image](img/arrow.jpg)\
  \ Text Field Cell – Table View Cell。随着深入，您还会在编辑器画布上方的跳转栏中看到此路径。\n\n点击**Text Field\
  \ Cell – Table View Cell**，然后按住 Control 键拖拽到停靠栏中更下方的**Villain Tracker App Delegate**实例，如图\
  \ 6-10 所示。出现实用工具窗口时，从动作列表中选择`takeName:`。在继续之前，查看*属性检查器*，也在图 6-10 中显示。有一个标记为 Behavior\
  \ 的弹出菜单，当前值为 None。选择它并更改为 Editable。\n\n![9781430245421_Fig06-10.jpg](img/9781430245421_Fig06-10.jpg)\n\
  \n图 6-10. 使用停靠栏进行 Control 拖拽\n\n最后，对图像井执行相同操作。到图像井的路径是：Window – Villain Tracker\
  \ ![image](img/arrow.jpg) View ![image](img/arrow.jpg) Scroll View – Table View\
  \ ![image](img/arrow.jpg) Table View ![image](img/arrow.jpg) Table Column – Mugshot\
  \ ![image](img/arrow.jpg) Image Well ![image](img/arrow.jpg) Image Cell。从`Image\
  \ Well`行（不是`Image Cell`行，而是它上面那一行）按住 Control 键拖拽到 Villain Tracker App Delegate，并选择`takeMugshot:`。要使图像井可编辑，*属性检查器*顶部附近有一个复选框。如果愿意，您还可以启用\
  \ Animates。如果反派头像包含动画信息或多帧，例如反派 MySpace 页面上的动图 GIF，则显示时会播放动画。\n\n如前所述，`takeName:`和`takeMugshot:`方法都期望从详细信息视图中进行更新的控件调用。之前，我们在每个方法的末尾添加了对`[villainsTableView\
  \ reloadData]`的调用。现在我们需要在之后添加另一个调用。在`takeName:`和`takeMugshot:`中，在末尾添加对`[self updateDetailViews]`的调用。这确保了无论用户在何处进行编辑（在表格视图或详细信息视图中），更改都会在两个位置得到反映。\n\
  \n是时候再次编译并运行应用程序，看看我们是否能在表格视图中编辑了。此时，我们应该能够添加新的反派、编辑其属性，然后将其删除。我们仍然无法保存关于反派的任何信息；这将是下一章的主题。\n\
  \n## 总结\n\n本章通过一个简单的示例，演示了如何维护一个项目列表、在表格视图中显示它们，并在独立的控件集中编辑选中项的详细信息。我们学习了关于`NSTableView`如何使用其`dataSource`来访问显示和编辑的项目，并了解了当选择发生变化时，它如何通知其委托，从而使我们能够手动更新依赖于表格视图选择的其他视图中的内容。\n\
  \n如果您熟悉其他桌面 GUI 开发环境，其中一些内容可能看起来有些陌生，但我们希望您能看到 Cocoa 所支持方法中的一些优势，例如在代码和 GUI 布局之间提供了清晰的划分。然而，此时我们需要坦白：到目前为止我们所采用的方式并不一定是\
  \ Cocoa 中处理这类事情的最佳方法。尽管目前一切都很简单，但实际上我们一直是在向您展示解决这些问题的笨办法！在过去几年中，一种新的 GUI 编程方法已经在\
  \ Cocoa 社区中扎根，并且变得越来越普遍。这项技术称为 Cocoa 绑定，它是第 7 章的主题。\n\n# 第 7 章 Cocoa 绑定\n\n第 5 章和第\
  \ 6 章介绍了如何将控制器对象连接到各种视图对象，既用于显示值，也用于响应用户动作来获取新值。\n\n\n```markdown\n\n在我们的示例中，通常每个视图有一个小的操作方法（当用户编辑视图中显示的值时触发），外加一个庞大的`updateDetailViews`方法来一次性更新所有视图的内容（每当选择发生变化时调用）。这对于简单的项目来说没问题，但这种方法存在一些问题。首先，存在可扩展性问题。假设不是十个视图，而是有一百个视图。按照这种方法，我们最终会得到一个控制器，它有一百个小的操作方法，以及一个*庞大的*方法，用于将值推送到所有视图中！此外，我们的控制器与其关联视图之间确实存在紧密耦合。例如，如果我们最初使用`NSDatePicker`来显示和编辑日期，但后来决定改用`NSTextField`，该怎么办？除了修改图形用户界面，我们还必须更改输出口、相应的操作方法以及`updateDetailViews`方法。\n\
  \n幸运的是，Apple 早已认识到这个问题，自 Mac OS X 10.3 起，它加入了一项名为 *Cocoa bindings* 的技术，解决了其中的许多问题。Cocoa\
  \ bindings 让我们可以使用 Interface Builder 来配置视图，使其或多或少自动地检索其值并将更改传回模型对象。我们所要做的就是告诉它要处理哪个控制器对象，以及它应该使用哪个字符串作为键来获取和设置值。我们可以通过自己的控制器类或使用\
  \ Cocoa 提供的通用控制器类来访问模型对象。\n\n这导致了一种架构，其中我们自己的控制器类通常不需要知道任何关于正在使用的视图对象的具体信息。我们不需要拥有指向它们的实例变量，也不需要实现操作方法以获取它们的输入！我们的控制器最终只不过是模型对象和一堆视图对象之间的一个简单通道，并且从控制器的角度来看，有十个视图还是一百个视图都没有区别。\n\
  \n在本章中，我们将学习如何将 Cocoa bindings 用于简单的控件，例如复选框、滑块和文本字段，以及复杂的控件（如表视图）。我们将创建绑定，通过几个\
  \ Apple 自带的控制器类连接到模型对象。我们还将介绍如何使用`NSUserDefaults`及其支持绑定的同伴`NSUserDefaultsController`来处理应用程序中的偏好设置。\n\
  \n## 绑定到简单控件\n\n本章的示例应用程序可供角色扮演游戏中的游戏主持人在随机创建角色、怪物和地牢时使用。主窗口将包含一些按钮，当用户点击时，这些按钮会创建随机游戏对象，以及一些文本字段来显示结果。我们还将创建一个偏好设置窗口，用户可以在其中指定一些用于创建游戏对象的参数。我们不会实际进行这些随机对象的“投掷”操作。我们只会在用户点击某个按钮时显示所用参数的摘要。随机游戏对象的创建对于本书来说有点偏离主题，但如果您有兴趣，这对读者来说可能是一个有趣的练习！\n\
  \n### 创建 DungeonThing 项目与偏好设置窗口\n\n启动 Xcode，然后从菜单中选择 File ![image](img/arrow.jpg)\
  \ New Project。选择 *Cocoa Application*，并在 New Project 窗格中将其命名为 \"DungeonThing\"。对于这个示例应用程序，我们也使用\
  \ DungeonThing 作为类前缀。（如果输入太麻烦，您可以使用 DT，在这种情况下，您稍后在本章中遇到的所有对`DungeonThingAppDelegate`的引用，在\
  \ Xcode 中将显示为`DTAppDelegate`。）和之前一样，保持复选框的默认设置：*Use Automatic Reference Counting*\
  \ 应被选中，而其他复选框（Create Document-based Application、Use Core Data 和 Include Unit Tests）应取消选中。\n\
  \n现在在 Xcode 中找到 `MainMenu.xib`（它位于导航区域最左侧的项目导航器中），然后单次点击以在 Interface Builder 画布中打开它。这最初是一个标准的空应用程序图形用户界面，现在看起来应该已经很熟悉了。这个\
  \ nib 文件已经包含了一个主窗口，我们稍后会处理它，但首先，我们将通过创建一个偏好设置窗口来进入正题，该窗口的图形用户界面控件将完全使用 Cocoa bindings\
  \ 进行配置。\n\n在 *Object Library* 窗格中（![image](img/arrow4.jpg)4），在底部的搜索框中输入 \"window\"\
  ，然后将结果列表中的 Window 对象拖到 Interface Builder 画布上（我们不能将其拖到 Interface Builder 中另一个窗口的上面，因此如果\
  \ nib 文件中已有的窗口在画布上处于打开状态，请先将其关闭）。这个窗口将是我们的偏好设置窗口。使用 *Attributes Inspector* （![image](img/arrow2.jpg)4）将窗口标题设置为\
  \ \"DungeonThing Preferences\"，并注意 nib 窗口中相应图标下方的标签也会发生变化。在同一检查器窗格中，点击取消选中 *Resize*\
  \ 复选框，因为没有理由允许用户调整此窗口的大小。同时，点击取消选中 *Visible at Launch* 复选框，以便在 nib 加载时窗口不会立即出现在屏幕上，并点击选中\
  \ *Hide on Deactivate* 复选框，以便在用户点击离开应用程序时窗口消失。我们只希望当用户选择合适的菜单项时偏好设置窗口才出现，并且只有当 DungeonThing\
  \ 是前台应用程序时才可见。\n\n将窗口宽度调整得比默认宽度稍宽，以容纳我们将要添加的控件。按下![image](img/arrow2.jpg)3 调出 *Size\
  \ Inspector*，通过点击其标题栏确保新窗口已被选中，然后在 *Width* 字段中输入 530。\n\n最后一步是针对窗口本身，设置连接以便用户可以通过访问菜单中的\
  \ Preferences 项来打开此窗口。点击 Interface Builder 画布顶部的 DungeonThing 菜单项，然后单次点击 Preferences\
  \ 项。此对象将通过 target/action 连接到偏好设置窗口，因此按住 Control 键从菜单项拖拽到偏好设置窗口（要么拖拽到 Interface Builder\
  \ 画布左侧对象停靠区中代表窗口的图标，要么拖拽到实际窗口的标题栏），然后选择 `makeKeyAndOrderFront:` 行为。这是一个方法，它会使任何窗口成为其应用程序中最前面的窗口，并且成为“关键”窗口，准备好接收用户按下键盘按键时产生的事件（因此方法名中包含\
  \ \"makeKey\"）。\n\n### 添加标签视图\n\n我们将把应用程序的偏好设置分成三组，分别对应三个用户可以创建的游戏对象。我们将通过把控件放置在一个\
  \ `NSTabView` 中来分隔这些组，这允许用户通过选择顶部的标签列表在不同视图之间切换。在 *Object Library* 窗格中，输入 \"tab\"\
  ，然后将结果中的 Tab view 拖入我们空白的窗口中。调整其大小，使其几乎填满窗口（如图 7-1 所示），保留蓝色线条会愉快地为我们显示的标准边距。\n\n\
  ![9781430245421_Fig07-01.jpg](img/9781430245421_Fig07-01.jpg)\n\n图 7-1. 添加并命名标签后，DungeonThing\
  \ 的偏好设置窗口看起来像这样\n\n当我们从 *Object Library* 中拖出一个新的标签视图时，默认情况下它有两个标签，但我们希望有三个。点击 Tab\
  \ view，并打开 *Attributes Inspector*（![image](img/arrow2.jpg)4）。注意 Tabs 字段。点击微小的向上箭头，将其值从\
  \ 2 改为 3，然后就看到三个标签了。\n\n```\n\n\n双击每个标签页的标题，将其分别改为“Character Generation”、“Monster\
  \ Generation”和“Dungeon Generation”。图 7-1 显示了此时窗口应有的外观。\n\n## Character Generation\
  \ Preferences\n\n现在，我们开始向这些标签页中添加控件。首先是 Character Generation 标签页，请点击该标签页将其选中。到目前为止，你应该已经熟悉如何在\
  \ *Object Library* 中找到视图和控件，因此我们不再手把手地指导你每一步如何抓取这些对象并将其拖入窗口。对于你来说，只需查看图 7-2，就应该知道需要使用一个滑块、一个单选按钮矩阵、一个复选框矩阵，以及几个标签（包括滑块右侧的小标签）。（提醒一下，要获得复选框矩阵，请拖出一个复选框，然后选择\
  \ Editor ![image](img/arrow.jpg) Embed In ![image](img/arrow.jpg) Matrix。要增加矩阵的行数和列数，请按住\
  \ Option 键并拖动调整大小的手柄。）\n\n![9781430245421_Fig07-02.jpg](img/9781430245421_Fig07-02.jpg)\n\
  \n图 7-2. DungeonThing 中角色生成的首选项\n\n从 *Object Library* 中拖出这些对象，并大致按照图 7-2 所示对齐。要使`NSSlider`的外观和行为与图中一致，请选中它并打开\
  \ *Attributes Inspector*（![image](img/arrow2.jpg)4）。为其设置 19 个刻度线，勾选“仅在刻度线上停止”复选框，然后将最小值设为\
  \ 2，最大值设为 20，当前值设为 10。再往下一点，点击打开 *Continuous* 复选框（这样滑块将在用户拖动时持续报告其值），然后就可以了。图 7-3\
  \ 显示了具体操作。\n\n![9781430245421_Fig07-03.jpg](img/9781430245421_Fig07-03.jpg)\n\n\
  图 7-3. 用于选择 2 到 20 之间整数的 `NSSlider` 配置\n\n另一个需要做的调整（但在截图中看不到）是使包含复选框的矩阵能够响应鼠标点击并正确行为。由于`NSMatrix`被设计为包含多种控件，当用户点击某个单元格时，它有多种与单元格交互的方式。选中复选框矩阵，然后在\
  \ *Attributes Inspector* 中，将 *Mode* 弹出菜单设置为 *Highlight*（如果尚未设置）。此模式使矩阵在点击单元格时，将该单元格的选中状态在\
  \ 0 和 1 之间切换，从而打开或关闭复选框。\n\n该标签页的最后一项配置是为两个单选按钮设置标签，以便我们稍后区分它们（复选框不需要设置标签，因为在处理绑定时会以不同的方式处理它们）。保持\
  \ *Attributes Inspector* 打开，然后依次点击两个单选按钮，在检查器中为每个按钮输入新的标签值。将第一个单选按钮单元格的标签设为 1，将第二个设为\
  \ 2。\n\n## Monster Generation Preferences\n\n下一个标签页包含允许用户指定随机怪物生成首选项的控件，如图 7-4 所示。\n\
  \n![9781430245421_Fig07-04.jpg](img/9781430245421_Fig07-04.jpg)\n\n图 7-4. 怪物生成首选项\n\
  \n这里我们有一个滑块、一个复选框矩阵，以及几个作为标签的文本字段。滑块的配置应与 Character Generation 标签页中的滑块类似，但有几个不同的属性：最小值为\
  \ 1，最大值为 10，并显示 10 个刻度线。\n\n## Dungeon Generation Preferences\n\n最后，我们将创建 Dungeon\
  \ Generation 首选项的 GUI。这个比较简单——只有滑块和文本字段，如图 7-5 所示。这些滑块的配置应与 Monster Generation 标签页中的滑块一样，范围从\
  \ 1 到 10，并显示 10 个刻度线。\n\n![9781430245421_Fig07-05.jpg](img/9781430245421_Fig07-05.jpg)\n\
  \n图 7-5. 地牢生成首选项标签页\n\n## 绑定到 NSUserDefaultsController\n\n至此，我们已经在窗口中拥有了所有这些 GUI\
  \ 控件，但还没有输出口（outlets）连接它们，也没有当用户点击它们时可以调用的操作方法。那么，现在该怎么办？现在是时候创建我们的第一个绑定了！我们将使用一个名为`NSUserDefaultsController`的类，这是一个绑定就绪的通用控制器类，包含在\
  \ Cocoa 中。像这样的绑定就绪控制器让我们可以在 Interface Builder 中直接将视图对象绑定到底层模型对象。这个类的一个优点是，它以`NSUserDefaults`的形式维护自己的存储，`NSUserDefaults`是\
  \ Cocoa 应用中用于保存和检索用户应用首选项的标准类。这将允许我们将每个视图对象的值绑定到应用首选项中一个唯一键控的值。这些首选项会在用户退出应用前自动保存，并在用户下次启动应用时重新加载。\n\
  \n### Character Generation 的绑定\n\n转到我们正在构建的首选项窗口，并切换回 Character Generation 窗格。点击滑块，然后打开\
  \ *Bindings Inspector*（![image](img/arrow2.jpg)7）。在此检查器中，我们可以看到视图对象所有可以绑定到模型对象值的属性。大多数情况下，我们会将`Value`绑定到某个东西，但每个视图类都提供自己的一组可供绑定的属性。例如，滑块可以将其`Max\
  \ Value`和`Min Value`属性绑定到某些值，这允许我们根据模型对象中的值来改变这些极值。其他一些视图对象可以将文本颜色和字体绑定到模型值，并且大多数视图对象可以将其\
  \ Hidden 和 Enabled 状态绑定到模型值。目前，我们将绑定此滑块的`Value`属性，因此点击 *Value* 展开三角形以查看其配置选项。图 7-6\
  \ 显示了默认设置。\n\n![9781430245421_Fig07-06.jpg](img/9781430245421_Fig07-06.jpg)\n\n\
  图 7-6. `NSSlider`的 Value 绑定选项的默认“未绑定”状态\n\n要建立绑定，我们至少需要配置三个东西：要绑定到的控制器对象、控制器键（controller\
  \ key）和模型键路径（model key path）（其余都是可选设置，允许我们在特殊情况下优化绑定的行为，我们稍后会介绍其中一些）。从 *Bind to*\
  \ 弹出列表中选择控制器对象，该列表包含我们 nib 文件中存在的所有控制器对象，包括我们自己的任何控制器、我们从库中拖入的任何通用控制器，以及像`NSUserDefaultsController`这样的特殊控制器（它在每个\
  \ nib 文件中都自动可用，并在弹出列表中显示为 Shared User Defaults Controller）。控制器键允许我们选择控制器提供的模型对象的不同“方面”。例如，`NSArrayController`（提供对对象数组的绑定访问）有不同的控制器键来提供对整个排序数组或仅当前选择的访问。模型键路径是一个字符串，用作在模型对象中获取和设置值的键。\n\
  \n因此，对于我们的第一个绑定，首先从弹出列表中选择 Shared User Defaults Controller。\n\n\n\n这个控制器在任何 nib\
  \ 文件中都自动可用，不过在绑定中使用之前，我们无法在任何地方看到它，一旦使用它就会出现在主 nib 窗口中。现在检查*控制器键*组合框，确保它设置为`values`。然后点击*模型键路径*组合框，并在其中输入`characterMaxNameLength`。这个字符串定义了用于将滑块值存储到`NSUserDefaults`（用户的应用程序偏好设置）中的键。按下回车键或点击离开该字段，注意检查器顶部的*绑定到*复选框会被勾选。这样就搞定了！我们暂时不需要担心其余控件；它们的默认值对我们的需求来说已经足够了。图\
  \ 7-7 展示了当这个绑定配置完成后，检查器中相关配置项应该呈现的样子。\n\n![9781430245421_Fig07-07.jpg](img/9781430245421_Fig07-07.jpg)图\
  \ 7-7。第一个滑块的已完成绑定\n\n现在选择滑块右侧的小文本字段，并为其配置与滑块完全相同的绑定：共享用户默认值控制器，`values`，以及`characterMaxNameLength`。这将使其从同一个模型对象（用户的应用程序偏好设置）中的同一个位置（`characterMaxNameLength`\
  \ 的值）拉取显示值。现在来感受一下 Cocoa 绑定的魔力，选择菜单中的编辑器![image](img/arrow.jpg)模拟界面，点击并拖动滑块，观察右侧小文本字段中的值是否同步更新。请注意，这与我们在第\
  \ 2 章中构建的功能相同，但机制不同：当我们拖动滑块时，它的值正被`NSUserDefaultsController`推送到我们的应用程序偏好设置中，该控制器同时也会将该值传递给绑定到同一键的其他对象（即这个小文本字段）。相当巧妙的技巧！但这并非什么把戏。它是\
  \ Cocoa 绑定动态特性的一个简单示例。利用这项技术，我们可以从控制器类中消除大量枯燥的代码，有时甚至能完全摒弃控制器类——仅使用 Cocoa 内置的控制器类来代替。\n\
  \n接下来我们处理下一个 GUI 控件，即中间的单选按钮矩阵。点击该矩阵，然后查看*绑定检查器*，我们会发现这里没有“值”选项。对于这个控件，我们将不绑定“值”，而是绑定`选定标签`属性，这意味着当用户选择一个单元格时，该单元格的标签将被推送到模型中，并且下次打开偏好设置窗口时，保存的标签将决定哪个单选按钮被选中。打开*绑定检查器*中的*选定标签*部分，再次确保选中了共享用户默认值控制器，且*控制器键*为`values`，但这次在*模型键路径*中输入`characterStatsGenerationPolicy`，然后按回车。\n\
  \n接下来，我们来处理“允许的角色类别”复选框。对于每一个复选框，我们将创建一个新的键名，并将其“选择”状态绑定到用户应用程序偏好设置中的一个值。点击第一个单元格“圣骑士”。检查器的标题应变为“按钮单元格绑定”。如果没有变化，就再次点击按钮直到标题改变。现在将该按钮单元格的`值`属性绑定到`characterClassAllowedPaladin`键。对其余的按钮单元格重复这些步骤，通过共享用户默认值控制器将它们每一个绑定到相应的键名上。`吟游诗人`应绑定到`characterClassAllowedBard`，`战士`应绑定到`characterClassAllowedFighter`，以此类推。当处理到`魔法师`时，为了保持一致性，请使用键名`characterClassAllowedMagicUser`，省略其中的`-`符号。\n\
  \n## 怪物生成器的绑定\n\n现在切换到“怪物生成”标签页。\n\n将滑块的*值*绑定到`monsterBootyFrequency`，并对右侧的小文本字段执行相同操作。然后按照我们在“角色生成”标签页中使用的方法配置复选框。点击“兽人”复选框，直到复选框本身被选中，并将其值绑定到`monsterTypeAllowedOrc`。继续处理其余的复选框，将每个复选框的值绑定到相应的键名：`monsterTypeAllowedGoblin`，`monsterTypeAllowedOgre`，以此类推。\n\
  \n## 地下城生成器的绑定\n\n最后，切换到“地下城生成”标签页，该页面仅包含三对滑块和文本字段。在“隧道蜿蜒度”标签的右侧，将滑块和文本字段的*值*绑定都配置为`dungeonTunnelTwistiness`。将两个“怪物频率”控件的值都绑定到`dungeonMonsterFrequency`，并将两个“宝藏频率”控件的值都绑定到`dungeonTreasureFrequency`。\n\
  \n## 创建主窗口\n\n现在该关注我们的主窗口了，它将包含用户点击以生成角色、怪物和地下城的按钮，以及用于显示结果的文本字段。点击主窗口的标题栏（如果主窗口尚未可见，则双击其在主窗口中的图标），然后调出*大小检查器*（![image](img/arrow2.jpg)5）。将窗口大小更改为\
  \ 731 x 321，然后切换到*属性检查器*（![image](img/arrow2.jpg)4）并点击关闭*调整大小*复选框，这样我们就少了一件需要操心的事。此应用程序显示的数据集有限，因此没有理由让用户将窗口调得更大。我们现在将创建三组\
  \ GUI 组件，每组对应我们处理的三种数据类型。我们将手动布局第一组，然后复制它来完成另外两组。\n\n首先，我们在一个框内创建一个用于显示结果的文本字段。转到*对象库*面板，在搜索字段中输入\
  \ `nsbox`。在结果中找到“框”，并将一个框拖到我们的窗口中。选中新框后，切换回*大小检查器*，将框的尺寸设置为宽 227、高 247。趁此机会，将它的\
  \ X 和 Y 值都设置为 20。这将框置于窗口的左下角，大致相当于我们将其拖到左下角并根据蓝色对齐线放置的位置。然后切换回*属性检查器*，将*标题位置*设置为“无”，这样标题就不会显示出来。\n\
  \n现在，回到*对象库*面板，在搜索框中输入 `label`。搜索结果中有一个“多行标签”；选中它，将其拖到与我们刚刚创建的框完全重叠的位置，然后松开鼠标。这样操作会将其放入框内。放入后，通过先将标签的左下角拖到框的左下角，再将标签的右上角拖到框的右上角，将标签拉伸以填满整个框。在这两种情况下，当拖拽到距框边缘合适的距离时，蓝色对齐线就会出现。最后，三击文本字段以选中其中的文本（`多行标签`），然后按退格键或删除键清除文本。\n\
  \n让我们为这个框收尾，添加一个最终能向刚创建的文本字段中填入文本的按钮。在*对象库*中找到一个按钮（标准推送按钮就很合适），并将其拖到框正上方的一个位置。拖拽时，蓝色线条会出现，显示距窗口顶部的正确距离，同时也会在按钮与框的中心垂直对齐时进行提示。这就是我们要放置的位置！双击按钮以编辑其标题，将其改为`生成角色`。根据调整大小约束的设置方式，我们之后可能需要重设框的尺寸。图\
  \ 7-8 展示了此时我们应看到的效果。\n\n![9781430245421_Fig07-08.jpg](img/9781430245421_Fig07-08.jpg)\n\
  \n\n\n![9781430245421_Fig07-08.jpg](img/9781430245421_Fig07-08.jpg)  \n图 7-8。我们已为主窗口创建了三组视图中的第一组。框内的文本字段被高亮显示，只是为了让我们能看到它的位置。\n\
  \n现在，点击窗口任意位置，然后按 `![images](img/arrow3.jpg)A` 选择窗口中的所有对象，从而选中我们刚刚创建的所有视图。按 `![images](img/arrow3.jpg)D`\
  \ 复制它们，这会显示一组与原始对象完全相同、重叠且位置略有偏移的新对象。将这组对象拖动到窗口中央，使用蓝色参考线确保它们与原始对象保持相同的垂直位置，并且框之间有合适的水平间距。然后再次按\
  \ `![images](img/arrow3.jpg)D`，并将第三组对象拖动到窗口右侧，再次使用蓝色参考线帮助正确放置它们。最后，双击两个新按钮，分别将其标题更改为“生成怪物”和“生成地牢”。同样，根据大小限制条件的设置方式，我们可能需要将框的大小重新设为\
  \ 227 x 247。图 7-9 显示了窗口现在应有的样子。\n\n![9781430245421_Fig07-09.jpg](img/9781430245421_Fig07-09.jpg)\
  \  \n图 7-9。DungeonThing 的完整主窗口\n\n## 设置 DungeonThingAppDelegate\n\n既然初始绑定已完成，主窗口也已设置好，我们可以将各个部分连接到\
  \ `DungeonThingAppDelegate`。通过点击工具栏中标记为“Editor”的图标组里那个类似管家的小图标（或使用键盘快捷键），打开一个辅助编辑器（`![image](img/arrow2.jpg)↵`）窗格，然后从跳转栏中选择\
  \ `DungeonThingAppDelegate.h`。一次一个地，按住 Control 键从“生成角色”按钮下方的框中的标签拖动到辅助编辑器中的 `DungeonThingAppDelegate.h`\
  \ 文件，拖到预定义的窗口 `@property` 下方。到达时，会出现一个小窗口，提示可以创建新的输出口或操作。释放鼠标，创建一个名为 `characterLabel`\
  \ 的新输出口。对窗口中其他两个框中的标签执行相同操作，分别创建名为 `monsterLabel` 和 `dungeonLabel` 的新输出口。\n\n然后，按住\
  \ Control 键分别从三个按钮拖动到辅助编辑器中的 `DungeonThingAppDelegate.h` 文件，并创建名为 `createCharacter:`、`createMonster:`\
  \ 和 `createDungeon:` 的新操作。此时，应该清楚哪个操作对应哪个按钮。除了将输出口和操作添加到 `DungeonThingAppDelegate.h`\
  \ 文件外，这还会在 `DungeonThingAppDelegate.m` 文件中为这些操作添加方法存根。\n\n## 定义常量\n\n至此，GUI 已完成，相关的绑定都已配置好，这样“偏好设置”窗口中的控件都能将其值保存到用户的应用程序偏好设置中。剩下的工作就是编写操作方法，这些方法将使用\
  \ `NSUserPreferences` 来检索偏好设置值并显示它们。如前所述，我们不会真正使用这些值来生成游戏物品描述，但如果愿意，以后可以自行添加这一增强功能。\n\
  \n让我们从定义一些常量开始，就像我们在之前的示例中所做的那样（如果你忘记了，请参阅第 4 章中对这样做好处的讨论）。以下是与我们在 nib 文件中已设置的偏好设置键名相对应的所有常量。将这些代码插入到\
  \ `DungeonThingAppDelegate.m` 的顶部某处：\n\n```\n#define kCharacterMaxNameLength @\"\
  characterMaxNameLength\"\n#define kCharacterStatsGenerationPolicy \\\n  @\"characterStatsGenerationPolicy\"\
  \n#define kCharacterClassAllowedPaladin @\"characterClassAllowedPaladin\"\n#define\
  \ kCharacterClassAllowedBard @\"characterClassAllowedBard\"\n#define kCharacterClassAllowedFighter\
  \ @\"characterClassAllowedFighter\"\n#define kCharacterClassAllowedCleric @\"characterClassAllowedCleric\"\
  \n#define kCharacterClassAllowedRogue @\"characterClassAllowedRogue\"\n#define kCharacterClassAllowedMonk\
  \ @\"characterClassAllowedMonk\"\n#define kCharacterClassAllowedMagicUser \\\n \
  \ @\"characterClassAllowedMagicUser\"\n#define kCharacterClassAllowedThief @\"characterClassAllowedThief\"\
  \n\n#define kMonsterBootyFrequency @\"monsterBootyFrequency\"\n#define kMonsterTypeAllowedOrc\
  \ @\"monsterTypeAllowedOrc\"\n#define kMonsterTypeAllowedGoblin @\"monsterTypeAllowedGoblin\"\
  \n#define kMonsterTypeAllowedOgre @\"monsterTypeAllowedOgre\"\n#define kMonsterTypeAllowedSkeleton\
  \ @\"monsterTypeAllowedSkeleton\"\n#define kMonsterTypeAllowedTroll @\"monsterTypeAllowedTroll\"\
  \n#define kMonsterTypeAllowedVampire @\"monsterTypeAllowedVampire\"\n#define kMonsterTypeAllowedSuccubus\
  \ @\"monsterTypeAllowedSuccubus\"\n#define kMonsterTypeAllowedShoggoth @\"monsterTypeAllowedShoggoth\"\
  \n\n#define kDungeonTunnelTwistiness @\"dungeonTunnelTwistiness\"\n#define kDungeonMonsterFrequency\
  \ @\"dungeonMonsterFrequency\"\n#define kDungeonTreasureFrequency @\"dungeonTreasureFrequency\"\
  \n```\n\n**注意**  *为适应图书版式限制，同时仍展示有效代码，我们通过将反斜杠作为行末最后一个字符的方式对其中一些行进行了换行，这使得 C 预处理器将下一行的内容拼接过来，就好像它们原本就在同一行一样。你可以在自己的代码中省略这种手动换行，将每个\
  \ `#define` 都写成一行声明。*\n\n## 指定默认偏好设置值\n\n常量定义完成后，我们就可以开始编码了。在实现操作方法之前，我们需要先了解一下\
  \ `NSUserDefaults`。如前所述，这个类让我们可以像操作哈希表或字典一样存储和检索用户的应用程序偏好设置，键是我们自己选择的字符串。每个应用程序都应该做的一件事情是为\
  \ `NSUserDefaults` 创建一组默认值，这样在用户尚未为某个给定键设置值时，系统会使用这些默认值作为后备。例如，假设我们想存储一个值范围在 1 到\
  \ 10 之间的整数，使用的键是 `@\"greatness\"`。为 `@\"greatness\"` 键设置默认值 1，可以确保用户首次运行应用程序时，当\
  \ `NSUserDefaults` 试图检索 `@\"greatness\"` 值时，它会找到我们在代码中指定的默认值（1）。如果不这样做，检索任何尚未被用户设置过的数值都会返回\
  \ 0，而检索任何未设置过的对象值则会返回 nil。\n\n常见的做法是在应用程序启动阶段早期调用的方法中设置这些值，通常是在包含在主 nib 文件中的类里进行。类方法\
  \ `initialize` 是一个适合做这件事的地方，因为它对每个类只调用一次，且是在该类首次被访问时。在 `initialize` 方法中尝试访问其他应用程序对象是不好的做法，因为我们不知道启动过程进展到了哪一步，但在这里我们不需要这样做。在我们的\
  \ `DungeonThingAppDelegate` 中创建这样一个方法。\n\n\n```objc\n+ (void)initialize {\n    [[NSUserDefaults\
  \ standardUserDefaults] registerDefaults:\n     [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \      [NSNumber numberWithInt:1], kMonsterBootyFrequency,\n      [NSNumber numberWithBool:YES],\
  \ kMonsterTypeAllowedOrc,\n      [NSNumber numberWithBool:YES], kMonsterTypeAllowedGoblin,\n\
  \      [NSNumber numberWithBool:YES], kMonsterTypeAllowedOgre,\n      [NSNumber\
  \ numberWithBool:YES], kMonsterTypeAllowedSkeleton,\n      [NSNumber numberWithBool:YES],\
  \ kMonsterTypeAllowedTroll,\n      [NSNumber numberWithBool:YES], kMonsterTypeAllowedVampire,\n\
  \      [NSNumber numberWithBool:YES], kMonsterTypeAllowedSuccubus,\n      [NSNumber\
  \ numberWithBool:YES], kMonsterTypeAllowedShoggoth,\n      [NSNumber numberWithInt:7],\
  \ kCharacterMaxNameLength,\n      [NSNumber numberWithInt:1], kCharacterStatsGenerationPolicy,\n\
  \      [NSNumber numberWithBool:YES], kCharacterClassAllowedPaladin,\n      [NSNumber\
  \ numberWithBool:YES], kCharacterClassAllowedBard,\n      [NSNumber numberWithBool:YES],\
  \ kCharacterClassAllowedFighter,\n      [NSNumber numberWithBool:YES], kCharacterClassAllowedCleric,\n\
  \      [NSNumber numberWithBool:YES], kCharacterClassAllowedRogue,\n      [NSNumber\
  \ numberWithBool:YES], kCharacterClassAllowedMonk,\n      [NSNumber numberWithBool:YES],\
  \ kCharacterClassAllowedMagicUser,\n      [NSNumber numberWithBool:YES], kCharacterClassAllowedThief,\n\
  \      [NSNumber numberWithInt:3], kDungeonTunnelTwistiness,\n      [NSNumber numberWithInt:7],\
  \ kDungeonMonsterFrequency,\n      [NSNumber numberWithInt:1], kDungeonTreasureFrequency,\n\
  \      nil]];\n}\n```\n\n该方法调用了 `NSUserDefaults` 的 `registerDefaults:` 方法，并传入了一个包含应用默认值的字典。我们为应用中使用的每一个键名都设置了默认值，这样在请求某个值时，我们就能确保总能得到有效的结果。\n\
  \n## 创建操作方法\n\n现在我们可以开始实现操作方法了。先从 `createCharacter:` 方法开始，它会显示与角色创建相关的所有偏好设置的摘要。首先，我们获取\
  \ `NSUserDefaults` 的共享实例，然后创建一个空字符串来存放摘要文本，接着逐项创建偏好设置的摘要内容。最后，将摘要文本放入相应的 `NSTextField`\
  \ 中。请注意，在方法开头，我们创建了一个具有特定容量的 `NSMutableString`，但这并非上限；`NSMutableString` 足够智能，能在必要时自动“扩容”。该方法如下所示：\n\
  \n```objc\n- (IBAction)createCharacter:(id)sender {\n    NSUserDefaults *ud = [NSUserDefaults\
  \ standardUserDefaults];\n    NSMutableString *result = [NSMutableString stringWithCapacity:1024];\n\
  \    [result appendString:\n     @\"按照以下参数生成角色：\\n\"\n      \"-----------------\\\
  n\"];\t// 提示：可以像这样跨行分割字符串！\n    [result appendFormat:\n     @\"最大姓名长度：%ld\\n\",\n\
  \     [ud integerForKey:kCharacterMaxNameLength]];\n    [result appendFormat:\n\
  \     @\"属性生成策略：%ld\\n\",\n     [ud integerForKey:kCharacterStatsGenerationPolicy]];\n\
  \    [result appendFormat:\n     @\"允许圣骑士：%@\\n\",\n     [ud boolForKey:kCharacterClassAllowedPaladin]\
  \ ? @\"是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许吟游诗人：%@\\n\",\n    \
  \ [ud boolForKey:kCharacterClassAllowedBard] ? @\"是\" : @\"否\"];\n    [result appendFormat:\n\
  \     @\"允许战士：%@\\n\",\n     [ud boolForKey:kCharacterClassAllowedFighter] ? @\"\
  是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许牧师：%@\\n\",\n     [ud boolForKey:kCharacterClassAllowedCleric]\
  \ ? @\"是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许游荡者：%@\\n\",\n     [ud\
  \ boolForKey:kCharacterClassAllowedRogue] ? @\"是\" : @\"否\"];\n    [result appendFormat:\n\
  \     @\"允许武僧：%@\\n\",\n     [ud boolForKey:kCharacterClassAllowedMonk] ? @\"是\"\
  \ : @\"否\"];\n    [result appendFormat:\n     @\"允许魔法使用者：%@\\n\",\n     [ud boolForKey:kCharacterClassAllowedMagicUser]\
  \ ?\n      @\"是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许盗贼：%@\\n\",\n\
  \     [ud boolForKey:kCharacterClassAllowedThief] ? @\"是\" : @\"否\"];\n    [self.characterLabel\
  \ setStringValue:result];\n}\n```\n\n输入这些代码后，尝试编译并运行应用。一切顺利的话，我们应该能看到主窗口，按下“生成角色”按钮，结果应类似于图\
  \ 7-10 所示。\n\n![9781430245421_Fig07-10.jpg](img/9781430245421_Fig07-10.jpg)\n\n\
  图 7-10. DungeonThing 的首次运行\n\n下一步是打开偏好设置窗口，在“角色生成”选项卡中进行一些更改。例如，禁用某些复选框、拖动滑块等。每次更改后，再次点击主窗口中的“生成角色”按钮，显示的参数会相应变化，以反映偏好设置窗口的内容。\n\
  \n现在这部分功能已经正常工作了，我们来填充 `createMonster:` 和 `createDungeon:` 的方法体，如下所示。这两个方法的工作方式与之前展示的\
  \ `createCharacter:` 方法相同。\n\n```objc\n- (IBAction)createMonster:(id)sender {\n\
  \    NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];\n    NSMutableString\
  \ *result = [NSMutableString stringWithCapacity:1024];\n    [result appendString:@\"\
  按照以下参数生成怪物：\\n-----------------\\n\"];\n    [result appendFormat:\n     @\"战利品频率：%ld\\\
  n\",\n     [ud integerForKey:kMonsterBootyFrequency]];\n    [result appendFormat:\n\
  \     @\"允许兽人：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedOrc] ? @\"是\" : @\"\
  否\"];\n    [result appendFormat:\n     @\"允许地精：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedGoblin]\
  \ ? @\"是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许食人魔：%@\\n\",\n     [ud\
  \ boolForKey:kMonsterTypeAllowedOgre] ? @\"是\" : @\"否\"];\n    [result appendFormat:\n\
  \     @\"允许骷髅：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedSkeleton] ? @\"是\"\
  \ : @\"否\"];\n    [result appendFormat:\n     @\"允许巨魔：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedTroll]\
  \ ? @\"是\" : @\"否\"];\n    [result appendFormat:\n     @\"允许吸血鬼：%@\\n\",\n     [ud\
  \ boolForKey:kMonsterTypeAllowedVampire] ? @\"是\" : @\"否\"];\n    [result appendFormat:\n\
  \     @\"允许魅魔：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedSuccubus] ? @\"是\"\
  \ : @\"否\"];\n    [result appendFormat:\n     @\"允许修格斯：%@\\n\",\n     [ud boolForKey:kMonsterTypeAllowedShoggoth]\
  \ ? @\"是\" : @\"否\"];\n    [self.monsterLabel setStringValue:result];\n}\n\n- (IBAction)createDungeon:(id)sender\
  \ {\n    NSUserDefaults *ud = [NSUserDefaults standardUserDefaults];\n    NSMutableString\
  \ *result = [NSMutableString stringWithCapacity:1024];\n    [result appendString:@\"\
  按照以下参数生成地牢：\\n-----------------\\n\"];\n    [result appendFormat:\n     @\"通道曲折度：%ld\\\
  n\",\n     [ud integerForKey:kDungeonTunnelTwistiness]];\n    [result appendFormat:\n\
  \     @\"怪物密度：%ld\\n\",\n     [ud integerForKey:kDungeonMonsterFrequency]];\n  \
  \  [result appendFormat:\n     @\"宝藏密度：%ld\\n\",\n     [ud integerForKey:kDungeonTreasureFrequency]];\n\
  \    [self.dungeonLabel setStringValue:result];\n}\n```\n\n将这些方法补充完整后，我们应该能够编译并运行\
  \ DungeonThing，修改偏好设置窗口中每个选项卡下的所有值，并看到输出文本字段中反映出修改后的值。DungeonThing 的第一个版本现在完成了！\n\
  \n**注意** 我们使用了 `NSUserDefaults` 对象来存储偏好设置窗口中的设置。几乎所有 Cocoa 应用都使用 `NSUserDefaults`\
  \ 来保存用户设置。我们尚未讨论如何使用终端程序访问 Unix 命令行，但 `NSUserDefaults` 系统的一个特性是支持命令行访问。如果你对此感兴趣，可以打开\
  \ `Terminal.app`（在 Finder 中，可以在“应用程序”下的 `实用工具` 文件夹中找到它），然后输入 `defaults read com.learncocoa.`。\n\
  \n\n`DungeonThing` 如果你输入 `defaults domains`，就会列出所有在 `NSUserDefaults` 系统中存储默认设置的应用，你可以查看其中任意应用的存储设置。祝你好运！\n\
  \n## 绑定到表视图\n\n`DungeonThing` 就其功能而言是没问题的（当然，它不会真正生成游戏对象），但如果你“在实际生产环境”中使用这样的系统（比如在玩《龙与地下城》或类似游戏时），你很快就会遇到一个主要问题：随机生成的游戏对象根本无法持久保存！例如，一旦你点击按钮创建一个新的随机角色，上一个角色就会直接被抹去，并且你再也无法看到它。\n\
  \n对于 `DungeonThing` 的下一个迭代版本，我们将添加一些表视图来显示所有已创建游戏对象的列表。在表视图中点击某个游戏对象，将在相应的文本字段中显示其值。与第\
  \ 6 章 中我们演示如何在自己的代码中处理表视图不同，这里我们将演示如何使用 `NSArrayController` 类，这是 Cocoa 自带的一个通用控制器类，借助\
  \ Cocoa 绑定，无需编写自定义代码即可管理这些表视图的显示。我们需要为 `DungeonThingAppDelegate` 类添加一些出口和其他实例变量，用于管理三个\
  \ `NSArrayController` 实例和三个数组（每种游戏对象类型一个数组）。我们还将移除刚刚添加的 `NSTextField` 出口，因为这些也将通过绑定来配置，以显示其内容。最后，我们稍微修改动作方法，将每个创建的对象插入到相应的数组中。完成后，源代码的大小几乎相同，因为表视图的所有配置都是在\
  \ nib 文件中完成的。\n\n我们将首先为 `DungeonThingAppDelegate` 添加一些属性，并修改我们的 `create:` 方法，以便使用这些新属性。在\
  \ Interface Builder 中使用绑定之前，我们需要先在代码中进行设置。然后，我们将切换到 Interface Builder 来连接绑定，再回到代码进行一些清理工作。\n\
  \n## 使代码支持绑定\n\n首先，让我们在头文件中进行必要的修改。为了维护生成对象的列表，我们的 `DungeonThingAppDelegate` 需要三个新的\
  \ `NSMutableArray` 实例变量，每种游戏对象一个。这些变量无法从 Interface Builder 内部创建；我们需要显式声明它们。每个数组将由\
  \ nib 文件中的一个 `NSArrayController` 管理，稍后我们将在 Interface Builder 中创建和配置它们。我们将这三个 `NSMutableArray`\
  \ 声明为属性，以便 `NSArrayControllers` 可以随时访问它们。我们需要在 `DungeonThingAppDelegate.h` 中进行的修改如下：\n\
  \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface DungeonThingAppDelegate :\
  \ NSObject <NSApplicationDelegate>\n\n// 添加以下三个：\n@property (strong) NSMutableDictionary\
  \ *characters;\n@property (strong) NSMutableDictionary *monsters;\n@property (strong)\
  \ NSMutableDictionary *dungeons;\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet NSTextField *characterLabel;\n@property (weak) IBOutlet\
  \ NSTextField *monsterLabel;\n@property (weak) IBOutlet NSTextField *dungeonLabel;\n\
  \n- (IBAction)createCharacter:(id)sender;\n- (IBAction)createMonster:(id)sender;\n\
  - (IBAction)createDungeon:(id)sender;\n\n@end\n```\n\n添加完这三个属性声明后，我们需要在 `DungeonThingAppDelegate.m`\
  \ 文件中完成 `NSMutableArray` 实例的设置。我们将初始化 `NSMutableArray` 实例本身，并修改动作方法，将创建的值推送到我们的数组中，而不是直接在文本字段中显示值。\n\
  \n首先，让我们实现一个新的 `init` 方法来包含数组的初始化。\n\n将以下代码放在 `.m` 文件中 `@implementation DungeonThingAppDelegate`\
  \ 部分的顶部附近：\n\n```objectivec\n- (id)init {\n    if ((self = [super init])) {\n  \
  \      self.characters = [NSMutableArray array];\n        self.monsters = [NSMutableArray\
  \ array];\n        self.dungeons = [NSMutableArray array];\n    }\n    return self;\n\
  }\n```\n\n### 标准 INIT 方法\n\n上面的代码片段展示了一个为类的实例变量创建值的 `init` 方法示例。这种 `init` 方法的形式相当标准，你可能在你看到的大多数\
  \ Objective-C 类中都会看到类似的写法，但它做了一些乍一看很奇怪的事情，因此值得稍作解释。这个方法以这样一个奇特的 `if` 语句开头：\n\n`if\
  \ ((self = [super init])) {`\n\n这个 `if` 语句实际上是一举两得（甚至多得）。首先，它调用了超类的 `init` 实现，并将其返回值赋给特殊变量\
  \ `self`。然后，它检查赋值本身的值（即赋值后 `self` 的值），并且仅在该值不为假值（例如空指针 nil）时才执行后面的代码块。\n\n这种使用 `self`\
  \ 并为其赋值的方式确实很特殊。事实上，我们唯一可能看到为 `self` 赋值的代码地方，就是像这样的 `init` 方法中。这样做是为了应对一种可能性，尽管可能性很小，即超类的\
  \ `init` 方法可能会返回一个与最初 `self` 指向的不同值。一方面，超类可能发现由于某种原因无法正确初始化自身，并通过从 `init` 方法返回 nil\
  \ 来表示这一点，这是处理对象初始化失败的“标准”方式（而不是抛出异常）。在这种情况下，子类会注意到 nil 值并跳过 `if` 语句后面的块，直接跳到最后，返回\
  \ `self` 指向的值，现在这个值是 nil。\n\n超类 `init` 方法返回另一个值的另一种可能性是返回一个完全不同的实例。其思想是超类可能有一个智能方案，用于在私有池中回收对象，而不是不断地释放和创建新对象，该方案的一部分是，`init`\
  \ 方法有时会返回一个旧的、二手对象，而不是我们刚刚尝试创建的崭新对象。这种情况是否现实，是 Cocoa 程序员之间偶尔争论的话题。在这里，我们通过编写允许这种可能性的\
  \ `init` 方法，采取了谨慎的态度。\n\n就是这样——所有需要在 Interface Builder 中连接对象的代码修改已完成！请注意，与第 6 章中的示例不同，这里的代码完全不需要操作表视图。无需实现\
  \ `delegate` 或 `dataSource` 方法，无需指向表视图的出口，什么都不需要。得益于绑定和 `NSArrayController`，表视图将自行管理一切。\n\
  \n## 配置表视图和文本视图\n\n现在，我们准备转到 nib 文件。我们将创建一些表视图，添加一些数组控制器对象，并将它们的绑定设置到我们添加到 `DungeonThingAppDelegate`\
  \ 的新数组上。我们还将配置现有的文本字段，使其通过绑定获取数据。在 Xcode 中单击 `MainMenu.xib` 文件，返回 Interface Builder\
  \ 画布。\n\n我们将从修改主应用程序窗口开始。第一步是在窗口中为新的表视图腾出空间。我们将创建三个“历史记录”表视图，分别放在每组现有视图的下方，因此我们需要使窗口更高（但可以保持当前宽度不变）。\n\
  \n\n\n使用窗口右下角的调整控件，将窗口高度增加约一倍。蓝色辅助线将帮助我们保持当前宽度。\n\n在*对象库*面板中搜索“table”，将出现的表格视图拖入窗口。将其放置在最左侧方框左下角下方，然后抓住表格视图右下角的调整手柄，向下拖动，直到表格填满窗口底部的大部分可用空间，其左右边缘与上方方框的边缘对齐，如图\
  \ 7-11 所示。\n\n![9781430245421_Fig07-11.jpg](img/9781430245421_Fig07-11.jpg)\n\n\
  图 7-11. 向窗口中添加表格\n\n在我们的历史记录表格中，我们只打算显示对象创建的时间。用户随后可以点击某一行，在表格上方的文本字段中查看相关对象。这意味着我们只需要表格中有一列。因此，打开*属性检查器*（![image](img/arrow2.jpg)4）。选择表格视图（它位于滚动视图内部，因此需要点击两次才能选中表格视图本身）。在检查器中，将列数改为\
  \ 1，并将*内容模式*设置为基于视图而非基于单元格。\n\n接下来，调整剩余的列，使其填满表格的宽度。为此，点击表格标题，直到整个表格标题被选中。然后将鼠标悬停在标记表格列标题边缘的垂直线上，向右拖动，直到该列填满整个表格。\n\
  \n最后，禁用剩余列的编辑功能，因为我们不希望用户更改已创建对象的时间戳。点击表格列直到其被选中，然后打开*属性检查器*（![image](img/arrow2.jpg)4），点击取消*可编辑*复选框的勾选。接下来，将调整大小方式从“两者”改为“随表格自动调整大小”，因为没理由让用户调整表格视图的唯一列。\n\
  \n此时，表格视图及其列已按图形方式布局完毕，除了绑定之外的所有配置已完成。这是复制我们刚刚为显示角色而制作的表格的好时机，这样我们就可以为怪物和地牢使用完全相同的配置。点击窗口背景，然后点击一次表格视图以选中它（以及其包含的`NSScrollView`）。现在按下![images](img/arrow3.jpg)D\
  \ 复制表格视图，并将新复制的表格视图拖动到中间视图组底部的适当位置。然后再次按下![images](img/arrow3.jpg)D，并将最后一个表格视图拖到窗口右下角的适当位置。对于这两个表格视图，我们当然会使用蓝色辅助线来帮助正确对齐。图\
  \ 7-12 显示了最终布局。\n\n![9781430245421_Fig07-12.jpg](img/9781430245421_Fig07-12.jpg)\n\
  \n图 7-12. DungeonThing 窗口的最终布局\n\n### 创建并配置数组控制器\n\n现在是时候添加一个`NSArrayController`，以便为第一组对象（角色）配置一些绑定。在*对象库*面板中搜索“array”。注意搜索结果中出现的“Array\
  \ Controller”；这是`NSArrayController`对象的一个实例。将其中的一个拖到 Interface Builder 画布最左侧的对象停靠区域。如果该停靠区域尚未展开，请单击\
  \ Interface Builder 画布左下角的展开三角形以展开它。`NSArrayController`需要一个更有意义的名称，因此缓慢点击“Array\
  \ Controller”文本两次（就像在 Finder 中重命名文件一样）来编辑名称。我们将使用此控制器来提供对角色数组的访问，因此将其命名为“characters”。\n\
  \n为此顶级 nib 对象指定一个唯一的名称，将有助于稍后我们在此 nib 中添加另外两个数组控制器时使用。（请注意，在 Xcode 4.5 的初始版本中，更改名称后，对象停靠区域中的名称可能不会刷新。如果是这样，我们可以通过单击对象停靠区域的展开三角形两次来使新名称显示出来。）\n\
  \n为了让我们的`DungeonThingAppDelegate`能够使用这些`NSArrayController`实例，我们需要向应用程序委托添加输出口。像之前一样，打开一个助理编辑器窗格，并显示`DungeonThingAppDelegate.h`文件。按住\
  \ Control 键，从新的角色数组控制器拖到`DungeonThingAppDelegate.h`文件中，并创建一个名为`characterArrayController`的新输出口。\n\
  \n接下来，再次点击数组控制器，打开*属性检查器*（![image](img/arrow2.jpg)4）。我们将在顶部看到一些选项，可以微调数组控制器的行为，但现在我们保持它们不变。我们需要配置的是检查器下半部分的*对象控制器*部分。确保*模式*设置为\
  \ Class，并且*类名*为“NSMutableDictionary”。此配置告诉控制器，它正在处理的模型对象是`NSMutableDictionary`的实例，这是一个“普通”类（而不是实体，我们将在第\
  \ 7 章中作为 Core Data 的一部分进行介绍）。在其下方，我们将看到一个列出数组控制器应能在模型对象中访问的属性的表格视图。点击表格视图下方的 + 按钮，输入“createdObject”，然后再次点击\
  \ +，输入“timestamp”。图 7-13 显示了数组控制器的完整属性配置。\n\n![9781430245421_Fig07-13.jpg](img/9781430245421_Fig07-13.jpg)\n\
  \n图 7-13. 第一个 NSArrayController 的已配置属性\n\n是的，这些就是我们在每次用户点击按钮时，用于创建`NSMutableDictionary`的代码中使用的键。我们现在将使用这些键为\
  \ GUI 对象创建绑定。\n\n接下来，我们需要配置一个绑定，但不是针对 GUI 对象，而是针对数组控制器本身！实际上，`NSArrayController`不仅仅是提供对模型对象的、支持绑定的访问的提供者。它本身也是一个消费者，通过\
  \ Cocoa 绑定从另一个对象获取其内容数组。在我们的例子中，它将从`DungeonThingAppDelegate`的角色数组中获取内容。保持数组控制器被选中，打开*绑定检查器*（![image](img/arrow2.jpg)7）。点击*Content\
  \ Array*旁边的展开三角形以打开它，并通过从弹出列表中选择“Dungeon Thing App Delegate”，在*模型键路径*字段中输入“characters”，然后按回车键，来设置所需的绑定。请注意，我们的`DungeonThingAppDelegate`不需要任何特殊准备就能支持绑定。我们所需要做的只是将一个实例变量作为属性暴露出来（就像我们为三个内容数组所做的那样），然后我们就可以立即使用它来绑定其他对象了！\n\
  \n现在，我们已经添加了一个`NSArrayController`，并将其配置为从`DungeonThingAppDelegate`访问正确的数据。是时候将一些\
  \ GUI 对象绑定到这个新控制器了。\n\n### 通过数组控制器绑定表格显示\n\n首先，我们将为表格视图设置一个单一的绑定。我们将表格视图的 Content\
  \ 绑定绑定到角色数组（通过数组控制器），然后让表格视图单元格从每个模型对象中获取时间戳属性。\n\n方法如下：通过 Interface Builder 画布左侧的对象停靠区域向下钻取，点击表格视图，然后在*绑定检查器*（![image](img/arrow2.jpg)7）中打开*Value*绑定配置部分。\n\
  \n\n\n从弹出列表中选择`characters`，然后在*Controller Key*组合框中选择`arrangedObjects`。这将把表格视图连接到数组控制器，并为数组控制器管理的每个对象在表格视图中创建一行，并设置该行的`objectValue`属性。我们之前提到过，*Controller\
  \ Key*组合框允许我们选择所绑定控制器对象的不同方面。在这种情况下，通过`arrangedObjects`进行绑定意味着我们绑定到整个已排序的对象数组。这种绑定通常只适用于能够显示整个内容数组的视图对象，例如表格。\n\
  \n接下来，展开*Selection Indices*绑定配置部分（就在*Value*部分下方）。再次从弹出列表中选择`characters`，这次在*Controller\
  \ Key*组合框中输入`selectionIndices`。这会告诉数组控制器表格视图中选择了哪一行（或多行），并将选择状态传递给绑定到该数组控制器的任何其他对象。特别是，当选择发生变化时，文本字段将通过这种方式更新。\n\
  \n现在，我们需要为表格视图中包含的每个子视图建立绑定，以便从`objectValue`中提取适当的信息。由于我们只有一个列且其中只有一个视图（一个`NSTableCellView`），这很简单。`NSTableCellView`内嵌了一个`NSTextField`，这正是我们需要绑定的对象。在表格视图内的表格单元格视图中选择“Static\
  \ Text - Table View Cell”条目（从左侧展开的对象停靠栏中选择最方便）。在*Bindings Inspector*中，选择*Bind to*为`Table\
  \ Cell View`，然后在*Model Key Path*中输入`objectValue.timestamp`。这告诉`NSTextField`使用嵌入该文本字段的`NSTableCellView`所绑定对象的`timestamp`属性。\n\
  \n### 通过数组控制器的选择绑定文本字段\n\n对于`characters`部分需要完成的最后一个绑定是显示值的文本字段。此绑定也将通过数组控制器完成，从控制器的选定对象中获取`createdObject`属性。\n\
  \n单击选择左侧框中的文本字段。第一次单击可能会选择框本身，再次单击将选择文本字段。现在再次查看*Bindings Inspector*，找到*Value*绑定配置。从弹出列表中选择`characters`，从*Controller\
  \ Key*组合框中选择`selection`，从*Model Key Path*组合框中选择`createdObject`，然后勾选*Bind*复选框。请注意，通过选择`selection`作为*Controller\
  \ Key*，我们指定数组控制器仅将选定的对象提供给此控件，而不是像表格列那样提供整个对象数组。\n\n### 填充数组\n\n现在我们需要回到代码中。在编辑窗格中打开`DungeonThingAppDelegate.m`。为了让表格视图显示内容，我们需要向`NSArrayController`中放入一些数据。为此，我们将修改`createCharacter:`操作方法末尾的一行代码。我们不直接将方法生成的摘要文本放入文本字段，而是将每个摘要添加到一个数组中，并使用`NSArrayController`来完成此操作，这样所有依赖视图（任何通过同一个`NSArrayController`进行绑定的视图）也会自动更新。我们不是将裸字符串插入数组，而是创建一个包含创建对象和当前时间的`NSMutableDictionary`，将该字典作为最简单的模型对象，包含两个键值。在`createCharacter:`末尾实施此更改，将\n\
  \n```\n[self.characterLabel setStringValue:result];\n```\n\n更改为\n\n```\n[self.characterArrayController\
  \ addObject:[NSMutableDictionary dictionaryWithObjectsAndKeys:  \n    result, @\"\
  createdObject\",  \n    [NSDate date], @\"timestamp\",  \n    nil]];\n```\n\n回想一下，我们在\
  \ Interface Builder 中设置的`NSArrayController`中使用了`createdObject`和`timestamp`作为键，并且用于表格视图中文本字段的绑定。通过使用这些键名将对象放入数组，我们可以让绑定将其提取出来。\n\
  \n实际上，在修改代码的同时，我们还可以在`DungeonThingAppDelegate.h`文件中移除`characterLabel`的`@property`声明。代码中已不再有任何对该属性的引用，保持代码整洁是一个好习惯。\n\
  \n### 确保一切正常\n\n好了，准备工作很多。启动应用程序看看效果吧；继续构建并运行应用程序。我们应该能够创建新角色，并看到它出现在文本字段中，同时表格下方会有一条时间戳记录。修改一些偏好设置，再创建另一个角色，查看文本字段中新的参数摘要以及表格视图中新的时间戳。通过点击行来切换选择，观察文本字段中的值相应变化。\n\
  \n如果上述任何功能无法正常工作，请返回 nib 文件并仔细检查绑定的配置，以及`DungeonThingAppDelegate`与数组控制器的连接。\n\n\
  ### 重复实践\n\n既然我们已经完全通过绑定来处理角色，我们可以回过头来对怪物和地牢做同样的事情。通过复制`characters`数组控制器（从而保留其现有配置，包括我们已经输入的键名）创建一个新的`NSArrayController`，并将其命名为`monsters`以保持一致性。与我们之前对`characters`数组控制器的操作类似，通过创建一个名为`monsterArrayController`的新插口将`monsters`连接到`DungeonThingAppDelegate`，将其*Content\
  \ Array*和*Selected Indices*绑定配置为连接到`DungeonThingAppDelegate`中的`monsters`属性，并通过`monsters`数组控制器配置两个相关的\
  \ GUI 对象（表格列和文本字段），所有操作如前所述。最后，通过将`createMonster:`操作方法中的最后一行从\n\n```\n[self.monsterLabel\
  \ setStringValue:result];\n```\n\n更改为\n\n```\n[self.monsterArrayController addObject:[NSMutableDictionary\
  \ dictionaryWithObjectsAndKeys:  \n    result, @\"createdObject\",  \n    [NSDate\
  \ date], @\"timestamp\",  \n    nil]];\n```\n\n构建并运行应用程序，确保一切正常，然后对地牢再重复一次整个过程。\n\
  \n一旦创建了所有三个`NSArrayController`并设置了绑定，我们就可以移除`DungeonThingAppDelegate.h`中引用了文本字段的`monsterLabel`和`dungeonLabel`的`@property`声明，因为这些现在已通过绑定进行填充。\n\
  \n### 好吧，但这到底是如何工作的？\n\n既然你已经初步接触了 Cocoa 绑定，你可能会觉得自己刚刚目睹了一场魔术表演——并且想知道这些技巧究竟是如何运作的！这是一种完全可以理解的感觉。我们程序员习惯于必须详细说明数据的每一次移动以及屏幕的每一次更新，但突然发现仅仅在某处设置一个值，就会有一些看不见的力量将该值传播到屏幕上的其他视图。本节将通过解释键值编码和键值观察的\
  \ Cocoa 概念，以及 Cocoa 绑定如何利用它们实现其魔法，来帮助你澄清这个过程。\n\n### 键值编码\n\n首先，让我们谈谈键值编码（KVC）。KVC\
  \ 背后的思想是允许我们通过使用与属性名或某些 getter 和 setter 方法名相匹配的字符串来引用对象的属性。\n\n\n\n假设我们有一个名为 `Person`\
  \ 的类，它包含 `firstName` 的概念，可能以名为 `firstName` 的实例变量形式存在，也可能以名为 `firstName` 和 `setFirstName:`\
  \ 的一对方法形式存在。使用 KVC，我们可以通过以下咒语来访问一个人的 `firstName` 属性：\n\n```\n[myPerson setValue:@\"\
  Frodo\" forKey:@\"firstName\"];\n```\n\n给定键名 `firstName`，这个方法调用首先会检查该对象是否有一个名为 `setFirstName:`\
  \ 的方法，如果有，则调用它来设置值。如果找不到该方法，它会检查是否存在名为 `firstName` 的实例变量，并尝试直接设置它。\n\n我们也可以用类似的方式检索值：\n\
  \n```\nmyNameString = [myPerson valueForKey:@\"firstName\"];\n```\n\n这种情况下也会发生类似的查找顺序。它首先查找名为\
  \ `firstName` 的方法，如果没有，则尝试查找同名的实例变量。\n\n这一切的结果是，KVC 为我们提供了一种以极其通用的方式来谈论对象属性的途径。对象的属性存储方式对我们来说是透明的，甚至连从外部访问属性的方式我们也不必担心。它可能会发生变化，甚至在程序运行期间改变，而我们也察觉不到差别。\n\
  \n`setValue:forKey:` 和 `valueForKey:` 方法定义在 `NSObject` 中（并为 `NSArray` 和 `NSSet`\
  \ 等集合类提供了额外的扩展），它们会尝试根据键的名称动态确定访问值的最佳方式。这意味着它们在 Cocoa 的每一个类中都可以直接使用。\n\n关于 KVC 还需补充的一点是，用作键的字符串实际上可以作为一种路径，用来遍历对象之间的关系。例如，假设我们的\
  \ `Person` 类还包含一个名为 `mother` 的属性，它是一个指向另一个 `Person` 对象的指针。如果我们想设置 `myPerson` 的母亲的\
  \ `firstName`，在常规代码中，我们可能会这样做：\n\n```\nmyPerson.mother.firstName = @\"Anne\"; \n\
  [myPerson.mother setFirstName:@\"Anne\"]; \n[[myPerson mother] setFirstName:@\"\
  Anne\"];\n```\n\n使用 KVC，我们还有另一种方式来实现：\n\n```\n[myPerson setValue:@\"Anne\" forKeyPath:@\"\
  mother.firstName\"];\n```\n\nKVC 方法足够智能，能够解析键字符串，按路径将其拆分，并遍历路径中提到的所有对象关系。因此，上面这行代码最终会执行类似这样的操作：\n\
  \n```\n[[myPerson valueForKey:@\"mother\"] setValue:@\"Anne\" forKey:@\"firstName\"\
  ];\n```\n\n虽然 KVC 的这两种方式在我们自己的代码中常规使用时都不太有吸引力（因为“常规”版本读起来更顺眼），但在需要更高灵活性的场景下，它们却能发挥巨大优势。例如，想象一个界面，它允许我们仅仅通过输入属性路径的名称，就能配置视图中要显示哪些值，而无需编译任何源代码或其他东西。听起来是不是很熟悉？\n\
  \n## 键值观察\n\n问题的下一个部分是键值观察（KVO）。通过 KVO，一个对象可以向另一个对象注册，以便在值发生变化时得到通知。例如，接续上一个例子，我们可以让\
  \ `myPerson` 在其 `firstName` 属性值发生变化时通知我们，就像这样：\n\n```\n[myPerson addObserver:self\
  \ forKeyPath:@\"firstName\" options:nil context:NULL];\n```\n\n相应地，每当 `firstName`\
  \ 属性发生变化时，无论这种变化是通过 `setValue:forKey:` 方法还是通过调用 `setFirstName:` 方法引起的，`myPerson`\
  \ 都会在观察者中调用一个名为 `observeValueForKeyPath:ofObject:change:context:` 的方法。\n\n这种实现方式非常巧妙，涉及到\
  \ Cocoa 内部的一些元编程：在运行时创建一个 `Person` 的子类，重写 `setFirstName:` 方法，并在值发生变化后向所有观察者传递消息。这一过程如此顺畅，以至于我们永远也不会怀疑存在一个隐藏的\
  \ `Person` 子类——除非我们特意去寻找它，并且要相当深入地在恰当地点挖掘。因此，我们实际上不需要了解这些实现细节。只需庆幸我们进入 Cocoa 编程世界时，这项技术已经相当成熟即可，因为它在刚出现时还是有些粗糙之处的！\n\
  \n归根结底，我们可能根本不需要直接处理 KVO。几乎所有我们想用 KVO 做的事情，都可以通过构建在其之上并提供更高层接口的 Cocoa 绑定更干净、更轻松地完成。这正是我们专注于\
  \ Cocoa 绑定的功能，而不直接使用 KVO 进行编程的原因。\n\n## Cocoa 绑定：它是如何工作的\n\n虽然对 Cocoa 绑定的实现进行完整而准确的描述超出了本书的范围，但更全面地了解它如何利用\
  \ KVC 和 KVO 来完成工作，可能会对理解很有帮助。既然我们已经对 KVC 和 KVO 有了初步了解，接下来就看看这些部分是如何结合在一起的。\n\n当我们在\
  \ Interface Builder 中建立绑定时（就像本章中我们已经多次做的那样），实际上是在定义一个契约。我们声明的是：当这个 nib 文件被加载并且这些对象被设置好时，会触发一系列事件，在对象之间建立一些\
  \ KVO 关系。这个过程使用键路径字符串（通过 KVC）来定义每个绑定关注的是哪个属性，同时还会附带其他信息，以标识“接收端”（通常是一个 GUI 控件）的哪个方面（例如显示的值、启用状态等）应受底层值变化的影响。在运行时，Cocoa\
  \ 会进行设置，使得控件（或我们已建立绑定的任何其他对象）能够根据相关键来观察控制器中的变化，同时控制器也会被设置为观察控件选定方面的变化。\n\n## 总结\n\
  \n绑定是一项非常强大的技术。回顾一下，你可能已经发现，使用 Cocoa 绑定几乎可以实现前面章节中展示的所有内容，从而创建出一个几乎无需任何自定义代码的应用！然而，这丝毫不会削弱前面章节所展示技巧的实用性。事实是，有时候你仍然希望在由目标-动作调用的方法中手动访问\
  \ GUI 中的值。一个通用的经验法则是：如果你处于一个没有明显的模型对象可供使用的情况（无论是简单的应用还是大型应用的子组件），那么使用带有输出口和目标/动作连接的“老方法”可能是最佳选择。但总的来说，从现在开始，Cocoa\
  \ 绑定是开发 Mac 应用的首选方法。\n\n接下来的几章将演示如何结合 Core Data 来做更多与绑定相关的事情。Core Data 的功能与 Cocoa\
  \ 绑定是正交互补的：Cocoa 绑定让你省去一些枯燥的控制器代码，而 Core Data 则负责处理你原本需要为模型类编写的许多基础架构代码，为你提供存储后端、内置的撤销/重做支持，以及更多功能。Cocoa\
  \ 绑定和 Core Data 结合在一起，可以让你如此高效地构建大量软件，以至于让其他人眼花缭乱！\n\n\n\n# 第 8 章 Core Data 基础\n\
  \n在之前的章节中，我们展示了 Cocoa 在视图对象中显示数据的多种方式：从根据模型对象内容手动获取和设置值，到使用 Cocoa 绑定自动同步模型与视图对象之间的数据（从而省去大量枯燥的控制器代码）。现在，是时候学习\
  \ Core Data 了——这个强大的框架为我们的模型对象提供了一整套内置功能。\n\n我们将首先探讨 Core Data 是什么，以及它如何与 Cocoa\
  \ 的其他部分协同工作。接着，我们将使用 Core Data 创建一个名为 MythBase 的全功能数据库应用程序，其中包含一个允许我们创建、搜索、编辑和删除条目的图形用户界面（GUI），全程无需编写一行代码（运行中的\
  \ MythBase 截图见图 8-1）。然后，我们将探索创建 Core Data 项目时自动生成的代码资源，最后演示如何为模型对象添加功能（\"业务逻辑\"\
  ）。\n\n## 我们一直缺失的能力\n\n前几章的所有示例中，我们都使用了`NSMutableDictionary`的实例来替代真正的模型对象。什么是\"真正的模型对象\"\
  ？除了能够保存数据（这正是`NSMutableDictionary`擅长的工作——通过字段名或键访问数据）之外，真正的模型对象还应包含以下特性：\n\n- **归档**：模型对象应具备内置的保存到磁盘及后续重新加载的机制。\n\
  - **业务逻辑**：应能为模型对象提供响应输入值的自定义行为。\n- **验证**：每个模型对象应能自动验证输入值。\n\n![9781430245421_Fig08-01.jpg](img/9781430245421_Fig08-01.jpg)\n\
  \n图 8-1. MythBase 应用程序的全貌\n\n过去，遵循 MVC 原则的 Mac 应用程序开发者通常需要为这些常见需求自行设计解决方案。但 Core\
  \ Data 不仅提供了上述所有功能，还额外提供了以下关键特性：\n\n- **撤销/重做支持**：Core Data 处理值的机制已与 Mac OS X 的标准撤销功能集成。这一内建特性免去了我们自行实现该通用功能的大量额外工作。\n\
  - **与 Cocoa 绑定集成**：结合 Cocoa 绑定，Core Data 提供了一种通过通用控制器对象连接视图与模型的机制，从而消除了大量乏味的粘合代码。\n\
  - **持久化**：Core Data 提供了多种将对象持久化到磁盘的方式，允许我们在程序运行之间保存和加载对象状态。\n\n总而言之，这些特性为应用程序核心提供了坚实的基础架构。我们可以使用\
  \ Core Data 构建图形界面应用（无论是否使用 Cocoa 绑定）、命令行工具、游戏，或任何其他能通过传统对象建模技术定义的软件系统。换句话说，几乎适用于所有类型的应用程序。\n\
  \n## 创建 MythBase\n\n现在，让我们开始创建 MythBase——一个用于维护神话人物数据库的 GUI 应用程序。我们将使用 Core Data\
  \ 作为模型层，并借助 Cocoa 绑定处理大部分控制器功能。过程中会遇到一些新概念和术语，我们会在涉及每个部分时逐一解释。\n\n在第一轮迭代中，我们将使用\
  \ Xcode 内的专用工具定义应用程序的模型，并通过 Xcode 的助手创建一个简单的 GUI。在第二轮迭代中，我们将优化 GUI 以改善用户体验。随后，在解释应用程序的其他方面之后，我们将进行第三轮功能迭代，为应用程序的模型层添加业务逻辑。\n\
  \n首先，创建一个新的应用程序项目。在 Xcode 中，选择 File ![image](img/arrow.jpg) New Project，在窗口左侧选择\
  \ OS X/Application，从项目模板列表中选取**Cocoa Application**，然后点击 Next。将产品名称设为 MythBase，类前缀设为\
  \ MB，勾选**Use Core Data**和**Use Automatic Reference Counting**复选框（见图 8-2），然后点击 Next。导航到合适的目录保存项目，点击\
  \ Create。\n\n![9781430245421_Fig08-02.jpg](img/9781430245421_Fig08-02.jpg)\n\n图\
  \ 8-2. 创建新应用程序项目，并启用 Core Data 选项\n\n## 定义模型\n\n此时，我们拥有一个全新的项目，与之前创建的项目类似。选择使用 Core\
  \ Data 会使 Xcode 采用略有不同的项目模板，因此这个项目会包含一些旧项目中未曾见过的内容。Xcode 的导航面板中新增了一个名为`MythBase.xcdatamodeld`的文件，这就是空的\
  \ Core Data 模型文件。模型文件包含应用程序模型层的元数据。我们使用 Xcode 内置的图形工具创建模型文件，应用程序在运行时读取该文件。另外，若我们在项目导航区中搜索，会发现`CoreData.framework`已被添加至\
  \ Frameworks/Other Frameworks 下。\n\n### 建模：是什么？\n\n接下来，我们假设您对对象建模或数据库建模有一定了解。但如果您对此完全困惑，这里提供一个非常简短的总结。其核心思想是：应用程序所处理的\"\
  内容\"——即应用程序\"关乎\"的数据——可以通过建模技术拆分为独立的块，并组织成合理的结构。使用 Core Data 时，您需要按以下思路组织数据：\n\n\
  - **实体（Entity）**：实体用于描述应用程序中可唯一标识的\"事物\"，即能够独立存在、描述和识别的事物。实体通常是系统中的主要\"名词\"。例如：人、公司、货币交易都是实体。而眼睛颜色、市值、交易金额则不是实体。\n\
  - **属性（Attribute）**：任何看似实体描述性特征、且不涉及其他事物的内容，很可能就是该实体的属性。眼睛颜色、市值、交易金额很可能分别是上述人、公司、货币交易的属性。而一个人的当前账户余额、公司\
  \ CEO 的电话号码、收款人的电子邮件地址**不是**我们所述实体的属性。这些内容更适合通过遍历指向其他实体的**关系**来访问其属性。\n- **关系（Relationship）**：使用关系建立实体之间的关联。关系可以是一对多（一个人可以是多笔交易的收款人）、多对一（多人可受雇于同一家公司）、一对一（每人只能有一个配偶），或多对多（一家公司可以有多个客户，同时一个人也可以是多家公司的客户）。\n\
  \n模型文件包含的信息对于任何从事过对象建模、数据库建模或实体关系建模的人来说都不陌生。首先，**实体**的概念大致对应于对象建模中的类或数据库建模中的表。每个实体由多个**属性**组成，实体之间可以通过**关系**相互连接。\n\
  \n\n\n## 排版后的文本\n\n在 Xcode 和文档中，属性和关系统称为**属性**，Objective-C 2.0 中对同一术语的这种复用并非巧合。在模型对象内部，每个属性和每个关系都可以通过一个\
  \ Objective-C 属性访问，该属性的名称与模型文件中定义的属性名称相同。在我们将要为 MythBase 构建的模型中，我们将创建一个包含多个属性的单一实体。我们将在第\
  \ 9 章中介绍关系。\n\n## 使用 Xcode 的模型编辑器\n\n首先，在 Xcode 的导航面板中单击 `MythBase.xcdatamodeld`\
  \ 文件。这将在 Xcode 内置的模型编辑器中打开模型文件，该编辑器列出了三个表格视图：*属性*、*关系*和*获取属性*，以及左侧的*实体*、*获取请求*和*配置*的大纲视图。按\
  \ ![image](img/arrow2.jpg)3 打开*数据模型检查器*；由于我们尚未为实体定义任何结构，它将初始显示为“未选择”，如图 8-3 所示。模型编辑器有两种不同的视图样式：一种是最初包含三个表格视图的视图，另一种是类似于一张空白方格纸的视图。我们将使用默认的表格视图样式，如图\
  \ 8-3 所示，因为我们只有一个模型类。当处理复杂模型时，方格纸视图对于概览所有不同的实体及其相互关系非常有用。\n\n![9781430245421_Fig08-03.jpg](img/9781430245421_Fig08-03.jpg)\n\
  \n图 8-3. 创建任何实体之前的新模型文件\n\n## 创建实体\n\n对于 MythBase，我们将创建一个名为 `MythicalPerson` 的单一实体，并包含少量属性。首先，通过单击窗口底部附近的“添加实体”按钮来创建一个新实体。正如您所料，这将在左侧的实体列表中创建一个名为\
  \ Entity 的新实体。选中新实体后，其详细信息将在右侧的表格视图中可见。将新实体的名称更改为“MythicalPerson”，其余控件保持默认状态。我们的实体是一个名为\
  \ `NSManagedObject` 的类的实例，这是 Core Data 中包含的一个通用类，为 Core Data 的模型对象提供了所有基本功能。稍后，我们将需要为该实体编写一些代码，届时我们将创建\
  \ `NSManagedObject` 的自定义子类，但目前这个通用类就足够了。\n\n现在让我们创建我们的实体。我们已经做了一些对象建模，并提出了一个神话人物可能具备的几个特征。\n\
  \n`MythicalPerson` 实体将包含六个属性。这些属性见表 8-1，其中包含每个属性类型的一般描述以及相应的 Core Data 存储类型。\n\n\
  表 8-1. MythicalPerson 属性\n\n| 属性名称 | 通用类型 | Core Data 类型 |\n| --- | --- | --- |\n\
  | 姓名 | 字符串 | String |\n| 详情 | 字符串 | String |\n| 神性 | 整数 (0-100) | Integer 16 |\n\
  | 善良度 | 整数 (0-100) | Integer 16 |\n| 力量值 | 整数 (0-100) | Integer 16 |\n| 图像 | 图片\
  \ | Transformable |\n\nCore Data 包含 `String` 和 `Date` 类型，以及一系列数字类型：`Integer 16`、`Integer\
  \ 32`、`Integer 64`、`Float`、`Double`、`Decimal` 和 `Bool`。此外，它还包含一种 `Binary` 类型，允许通用存储我们可能想要附加到实体的任何数据（我们自行将其打包成二进制块），以及一种特殊的\
  \ `Transformable` 类型，允许许多原本不受支持的 Cocoa 类（例如 `NSImage`）与 Core Data 一起存储（稍后会详细介绍）。请注意，Core\
  \ Data 存储类型与 Cocoa 中的值类（如 `NSString`、`NSNumber` 等）名称不同。\n\n当 Core Data 属性被读入正在运行的应用程序时，它们会被转换为最接近的\
  \ Cocoa 等价物，这意味着，例如，所有数字类型在应用程序中最终都会变成 `NSNumber`，并在保存时转换回底层的存储格式。\n\n## 创建属性\n\n\
  让我们开始创建 `MythicalPerson` 的属性。在 Xcode 中打开 `MythBase.xcdatamodeld` 文件，单击以选中 `MythicalPerson`\
  \ 实体，然后单击窗口顶部属性表格视图左下角的小 + 号。一个新建属性将出现在表格视图中。将其名称设置为“name”，类型设置为 String，然后按下回车键。\n\
  \n现在查看右侧检查器中的复选框，分别标有*可选*、*瞬态*和*已索引*。默认情况下，*可选*处于选中状态，其他则未选中。*可选*的含义很明确。选中它意味着用户在创建或编辑对象时可以选择不为该属性输入值。至于其他复选框，选中*瞬态*可配置该属性不随其他数据一起保存（尽管\
  \ Core Data 仍会跟踪对该属性的更改以提供撤销/重做支持），而选中*已索引*则为该属性启用索引，从而允许基于该属性快速搜索 Core Data 存储后端。对于\
  \ `name` 属性，请确保*已索引*被选中，而其他选项未被选中。\n\n在复选框下方，您可以使用弹出列表指定属性的类型（这与表格视图中的弹出列表设置相同）。如果我们在主表格视图中将“name”指定为\
  \ String，那么在其正下方的空间中将出现一些附加选项。在这里，我们可以指定简单的验证规则，例如字符串的长度。我们还可以指定默认值，该值将在每次创建新的 `MythicalPerson`\
  \ 实例时出现。为默认值输入“Name”，其他字段留空。\n\n现在我们来处理 `details` 属性，它旨在保存所讨论的 `MythicalPerson`\
  \ 的文本描述。单击*属性*表格视图下方的 + 按钮以添加一个新属性，并将新属性的名称更改为“details”。我们将以与 name 属性略有不同的方式来配置此属性。它应该是\
  \ String 类型（从弹出列表中选择），并且*已索引*复选框应被选中，但在此情况下，*可选*复选框也应被选中，以便用户可以选择根据需要将此字段留空。此外，我们将默认值留空。\n\
  \n接下来，我们将处理 `MythicalPerson` 的数字属性：`divinity`、`goodness` 和 `power`。创建一个新属性并将其命名为“divinity”，并将其类型设置为\
  \ `Integer 16`，这是 Core Data 支持的最小整数类型。这次配置复选框，使其为可选，但既不是瞬态也不是已索引（因为我们预计没有实际需要使用神性值作为搜索参数来搜索\
  \ MythicalPerson）。显示界面将发生变化，显示一些适用于所选类型的附加配置。在这里，我们可以通过指定最小值和最大值来设置一些自动验证规则，还可以指定此属性的默认值。\n\
  \n在表 8-1 中，我们将神性定义为 0 到 100 之间的整数值，其理念是将角色定位在从人类到神祇的某个尺度上。例如，希腊神祇宙斯的神性值为 100，他的儿子赫拉克勒斯（其母阿尔克墨涅是普通人类）的神性值为\
  \ 50，而普通人类（例如赫拉克勒斯的母亲）的神性值为 0。通过为属性指定最小值和最大值，我们让 Core Data 帮助我们确保无法保存这些属性的无效值。输入\
  \ 0 作为最小值，100 作为最大值，50 作为默认值。参见图 8-4。\n\n\n### 排版后内容\n\n图 8-4 展示了正在编辑的实体/属性。  \n\
  ![9781430245421_Fig08-04.jpg](img/9781430245421_Fig08-04.jpg)  \n图 8-4：这是在 Core\
  \ Data 模型文件中编辑实体时的外观。\n\n接下来我们将创建另外两个数值属性：`goodness` 和 `power`。它们同样以 0 到 100 的范围表示每个\
  \ `MythicalPerson` 的特性，并且其配置与 `divinity` 完全相同（当然，属性名称除外）。创建这些属性最简便的方法是：在表格视图中点击选中\
  \ `divinity` 属性，然后复制（![images](img/arrow3.jpg) `C`），再粘贴两次（![images](img/arrow3.jpg)\
  \ `V`），得到两个名为 \"divinity1\" 和 \"divinity2\" 的新属性。将它们分别重命名为 \"goodness\" 和 \"power\"\
  \ 即可 – 这两个新属性将具有与原始属性相同的最小值和最大值。\n\n### 不支持类型的属性\n\n最后一个需要配置的属性是 `depiction`。如前所述，`depiction`\
  \ 属性用于存储图像，而 Core Data 并不了解 Cocoa 中通常使用的 `NSImage` 类。幸运的是，Core Data 的 Transformable\
  \ 类型提供了一种简单的方式来存储图像。创建一个新属性，命名为 \"depiction\"，然后将类型选择为 Transformable。注意，检查器（Inspector）会随之变化，显示\
  \ Transformable 的配置选项。在检查器中，勾选 *Optional* 复选框（并取消其他选项）。Transformable 的配置选项非常简单：只有一个标签为\
  \ *Value Transformer Name* 的文本字段。但实际上这里比表面上看起来更复杂。其原理是：Transformable 属性保存的是 Core\
  \ Data 并不真正理解的数据块；当 Core Data 从存储中读取这块数据时，会将其放入一个 `NSData` 对象（一个可以容纳任意数据块、充当 Objective-C\
  \ “包装器”的对象），然后通过一个转换器（transformer）—— 一个知道如何将一种对象转换为另一种对象的特殊类。在相反的方向，当对象即将被保存到存储中时，Core\
  \ Data 会获取新值并通过同一个转换器，只不过这次进行反向转换。\n\n在本例中，我们将使用一个名为 `NSKeyedUnarchiveFromData`\
  \ 的转换器。它能够根据包含对象键归档版本的 `NSData` 对象，生成任何类型的对象。什么是键归档？这里不做详细说明，但本质上键归档是一种以类字典格式归档或序列化对象所有实例变量的方式，以便日后重构该对象。这项技术在\
  \ Cocoa 中有多种应用，Cocoa 的所有类都内置了此功能。这意味着我们可以获取一个 `NSImage` 或任何其他 Cocoa 类的实例，并利用 `NSKeyedUnarchiveFromData`\
  \ 的反向转换将其塞入一个 `NSData` 对象中。如果我们通过实现 `NSCoding` 协议来以键值方式保存和加载我们自己的类的实例变量，我们也可以以相同方式归档自己的对象。\n\
  \n回到 `depiction` 字段，其思路是将转换器类的名称写入 *Value Transformer Name* 文本字段中。事实证明，键归档非常普遍，以至于在这种情况下（在\
  \ Xcode 的建模工具中为属性指定转换器），它被用作默认值。如果我们将该字段留空，实体将被配置为使用 `NSKeyedUnarchiveFromData`\
  \ 来将模型属性值与 `NSData` 相互转换以便存储。\n\n至此，我们已经为本章的 MythBase 应用程序定义了完整的模型，接下来让我们继续创建 GUI。\n\
  \n---\n\n## 设计 GUI\n\n由于我们已经使用 Interface Builder 设计过几个用户界面，这里将快速讲解基本操作，并且不再提供每个检查器的快捷键。这个应用程序与\
  \ 第 6 章 中的 VillainTracker 应用程序类似。我们的用户界面将允许用户搜索神话人物数据库、添加和删除人物，以及更改他们的特性。此外，我们将使用\
  \ Cocoa 绑定来完成连接。\n\n### 自动生成 GUI\n\nXcode 3 包含一个名为 Core Data Entity Interface Assistant\
  \ 的功能，可以根据 Core Data 模型自动生成带有基本 CRUD（增删改查）功能的 GUI。这个功能在 Xcode 4 中被移除了，因此我们必须手动完成。事实证明这非常简单，而且通过前面章节的学习，这个过程应该感觉熟悉。不仅如此，Xcode\
  \ 生成的 UI 通常也需要大量清理工作。\n\n### 创建 MythBase 显示界面\n\n首先，在 Xcode 中单击 `MainMenu.xib` 文件。在左侧的对象停靠栏中，打开名为\
  \ \"Window - MythBase\" 的主窗口。我们将拖拽出一个表格视图和一组字段，以便创建和编辑数据库中管理的神话人物的属性，因此我们首先将窗口拉高。将其拖拽至\
  \ 500 像素高。接着，在对象库中，于检查器底部的搜索字段中输入 \"search\"。对象库应显示一个对象：搜索字段。将搜索字段拖出对象库，放置到 MythBase\
  \ 主窗口的右上角，让蓝色参考线指示其位置。接下来，在对象库搜索字段中输入 \"table\"。将一个表格视图拖拽到 MythBase 窗口，将其放置在窗口的左边缘。将其拉宽以填充窗口宽度，直到它与右侧的垂直蓝色参考线连接。将表格视图放置在搜索字段下方，它将自动吸附在搜索字段下方几个像素的位置。\n\
  \n打开 *Attributes Inspector*（属性检查器），将表格视图的 *Content Mode*（内容模式）设置为基于视图（view-based）。将\
  \ *Column Sizing*（列大小调整）设置为 \"First Column Only\"（仅第一列）。在 *Content Mode* 下方，将表格视图设置为\
  \ 5 列。在设置表格视图为 5 列时，您可能会注意到表格视图下方闪过一个水平滚动条。新增加的列将位于表格视图的右侧之外，因此点击第二列并将其调整得更窄，直到所有五列都可见，如图\
  \ 8-5 所示。\n\n![9781430245421_Fig08-05.jpg](img/9781430245421_Fig08-05.jpg)  \n图\
  \ 8-5：为 MythBase 布局表格视图\n\n表格视图将显示我们为 `MythicalPerson` 实体定义的所有属性（`details` 除外），因此我们需要设置列标题的标签。在表格视图中，点击第一列的标题，直到它变为可编辑的文本字段。在该文本字段中输入\
  \ \"Name\" 以设置列标题。点击下一列，将其名称设置为 \"Divinity\"。将接下来三列的标题分别设置为 \"Power\"、\"Goodness\"\
  \ 和 \"Depiction\"。\n\n接下来，我们将添加一个指示器，用于显示搜索时找到的结果数量。在对象库搜索字段中输入 \"Label\"，然后将一个标签字段拖拽到窗口左侧、表格视图下方。一如既往，蓝色参考线会指示放置位置。将标签的标题设置为\
  \ \"# out of #\"，并调整其大小以使所有文本可见。\n\n我们下一组控件将是用于搜索、添加和删除记录的按钮。在对象库搜索字段中输入 \"Button\"\
  。Cocoa 有多种按钮样式，我们将得到一系列选择。对于这个应用，我们使用渐变按钮。\n\n\n\n拖出一个并将其放置在表格视图下方，与上一步中的文本字段平行。将其标题命名为“Fetch”。再拖出两个按钮，放置在\
  \ Fetch 按钮右侧。将这些新按钮分别命名为“Delete”和“Add”。命名后，将它们放置在表格视图下方，并与窗口右侧边缘对齐。布局应与图 8-6 一致。\
  \  \n![9781430245421_Fig08-06.jpg](img/9781430245421_Fig08-06.jpg)  \n图 8-6 添加结果计数器和按钮\
  \  \n\n**显示详细信息**  \n我们现在需要布局用于显示所选神话人物详细信息的控件。Core Data 实体具有`name`、`divinity`、`power`、`goodness`、`depiction`和`details`属性，这些属性将显示在用户界面中。首先，在按钮下方靠近窗口中心线处找到并拖出一个标签。双击它，将其标题设置为“Name:”。在\
  \ *对象库* 中，找到并拖出一个文本字段（在搜索框中输入“field”），放置在 Name: 标签旁边。将其拉伸至大约窗口宽度的三分之一，即约 200 像素。将其拖至按钮下方并与屏幕右侧边缘对齐。蓝色参考线会帮助您将其对齐。将\
  \ Name: 标签拖到文本字段左侧，使其对齐。  \n\n单击标签一次，按 ![images](img/arrow3.jpg)C 复制，再按 ![images](img/arrow3.jpg)V\
  \ 在其下方粘贴一个新标签。粘贴的标签将出现在第一个标签的右下方。将其拖至第一个标签正下方；它会在适当距离处对齐。重复此操作两次，使第一个标签下方有四个标签排列成一列。选中全部四个标签，选择\
  \ Editor ![image](img/arrow.jpg) Align ![image](img/arrow.jpg) Right Edges（![images](img/arrow3.jpg)）。最后，将这些标签的标题分别设置为“Divinity:”、“Power:”和“Goodness:”。标签会自动调整大小以显示完整标题，同时保持右边缘对齐。\
  \  \n\n`divinity`、`power`和`goodness`属性都是数值类型，因此我们将使用滑块来设置它们。在 *对象库* 中搜索“slider”，然后在\
  \ Divinity: 标签旁边、Name 文本字段下方拖出一个水平滑块。将其拉伸至与文本字段相同的宽度。蓝色参考线会指示位置。在 *属性检查器* 中，确保滑块的最小值为\
  \ 0，最大值为 100，默认值为 50，这与我们在 Mythical Person Core Data 实体上创建的`divinity`属性一致。同时勾选 *属性检查器*\
  \ 中的 *Continuous* 复选框。与处理标签类似，选中此滑块并按 ![images](img/arrow3.jpg)C 复制，然后按 ![images](img/arrow3.jpg)V\
  \ 在其下方粘贴一个新滑块。将新滑块重新定位，使其与 Divinity 滑块对齐，并与 Power: 标签对齐。再次按 ![images](img/arrow3.jpg)V\
  \ 粘贴另一个滑块，将其放置在前两个滑块下方，并与 Goodness: 标签对齐。窗口应如图 8-7 所示。  \n![9781430245421_Fig08-07.jpg](img/9781430245421_Fig08-07.jpg)\
  \  \n图 8-7 添加用于管理神话细节的控件  \n\n尚未显示控件的两个属性是`depiction`和`details`。我们将为它们使用图像框和文本框。在\
  \ *对象库* 的搜索框中输入“image”，然后将一个 Image Well 拖出到屏幕左下角，让它吸附到角落的蓝色参考线上。将其大小调整为 150 像素高、200\
  \ 像素宽。在 *属性检查器* 中，将图像框设置为可编辑。这将允许用户将图像拖入图像框。  \n\n接下来，在 *对象库* 的搜索框中输入“text”，然后将一个\
  \ Text View 拖出到右下角。将其大小调整为 150 像素高、250 像素宽，这个宽度应足够填充窗口边缘与图像框之间的空间，并留出美观的间隙。当接近正确位置时，您会看到蓝色参考线，文本视图会自动对齐。我们需要对其属性进行一项重要更改。`NSTextView`默认能够显示富文本，这是一个很强大的功能，但代价是：在\
  \ Cocoa 中，富文本由`NSAttributedString`实例表示，这个类比`NSString`复杂得多，我们在这里不想深入讨论。为了使文本视图能够将其显示值绑定到普通字符串，我们必须关闭富文本处理。因此，在\
  \ *属性检查器* 中，单击取消选中 *Rich Text* 复选框（如果看不到，您可能选中了文本视图的父视图，即`NSScrollView`。再单击一次文本视图以选择内部的`NSTextView`）。您还可以将\
  \ *Find* 设置更改为 *Uses Bar*，并勾选 *Incremental Search*，以便文本搜索利用 OS × 10.7 中引入的 Find\
  \ Bar 功能。  \n\n这些控件需要标签，因此在 *对象库* 搜索框中输入“label”，然后将一个标签拖出到图像框上方，与图像框左边缘对齐。将其文本更改为“Depiction”。再拖出另一个标签放在文本视图上方，并将其标题设置为“Details”。将\
  \ Details 标签对齐，使其右边缘与滑块标签的右边缘对齐。  \n\n最后要做的任务是配置表格视图的列。五列中有四列将显示文本或数字，因此默认配置即可。然而，对于\
  \ Depiction 列，我们想要显示图像，因此需要将该列中当前的`NSTextField`替换为图像框。使用左侧的对象停靠栏选择 Depiction 列表格视图单元格中包含的“Static\
  \ Text”对象，如图 8-8 所示。选中后，按 Delete 键将其删除。在 *对象库* 的搜索框中输入“image”，然后将一个 Image Well 拖入表格视图\
  \ Depiction 列的空表格单元格视图中。图像框会被裁剪为表格单元格视图的高度，因此将表格视图单元格的高度扩展为 48 像素，使其足以显示整个图像。  \n\
  ![9781430245421_Fig08-08.jpg](img/9781430245421_Fig08-08.jpg)  \n图 8-8 在对象停靠栏中选择\
  \ Depiction 文本字段  \n\n至此，GUI 布局完成。它很美观，不是吗？现在我们需要将其连接到数据源以填充内容。我们将使用上一章讨论的 Cocoa\
  \ 绑定来实现。  \n\n**设置 Cocoa 绑定**  \n当我们告诉 Xcode 要创建一个 Core Data 应用程序时，它生成了一个应用程序委托类（名为`MBAppDelegate`），其中包含用于处理\
  \ Core Data 的特殊支持。这种支持的一部分是，生成的`MBAppDelegate`类现在有一个`managedObjectContext`属性。Managed\
  \ Object Context 是一个对象，它允许数组控制器（或您自己的代码）通过 Core Data 访问模型对象（`NSManagedObject`或其子类的实例）的源。我们稍后检查创建项目时自动放置的控制器代码时，将看到应用程序控制器如何提供此功能。与上一章一样，我们将使用`NSArrayController`来管理数据，但此处创建的`NSArrayController`将通过\
  \ Core Data（而不是`NSMutableDictionary`）访问其数据。并且，像上一章一样，我们将使用 Cocoa 绑定将其连接到用户界面。\n\n\
  \n\n## 绑定数组控制器\n\n首先，我们需要在应用中添加一个数组控制器。在*对象库*的搜索框中搜索“array”，结果中会出现一个数组控制器。将其拖拽到界面构建器画布上，可以放置在编辑器面板的任意位置。无论在何处放置，它都会显示在界面构建器画布左侧的对象停靠区中。在对象停靠区中选中它，并将其重命名为“神话人物数组控制器”。打开*属性检视器*，将其模式从“类”（Class）改为“实体名称”（Entity\
  \ Name）。在*实体名称*字段中输入“MythicalPerson”，这与我们在模型编辑器中使用的名称一致。最后，勾选*准备内容*（Prepares Content）复选框。这会在应用启动时触发数组控制器加载数据。\n\
  \n接下来，我们将把数组控制器链接到 `managedObjectContext`。在对象停靠区中仍选中数组控制器的状态下，选择*绑定检视器*。展开*参数*（Parameters）部分，然后从弹出列表中选择*应用代理*（App\
  \ Delegate）。之后，勾选弹出列表旁边的*绑定到*（Bind to）复选框。接着，在*模型键路径*（Model Key Path）字段中输入“managedObjectContext”。这将把数组控制器连接到应用代理中的\
  \ Core Data 管道。\n\n现在我们已经连接好数组控制器，接下来需要设置与 UI 控件的绑定。我们将从基本控件（文本字段和滑块）开始，然后处理更复杂的控件（图像显示区域和表格视图），最后完成按钮的连线。\n\
  \n第一个绑定是针对“名称”（Name）文本字段的。选择名称文本框，然后打开*绑定检视器*。展开*值*（Value）部分，勾选*绑定到*复选框，然后从下拉菜单中选择“神话人物数组控制器”。确保*控制器键*（Controller\
  \ Key）框显示为“selection”，并在*模型键路径*字段中输入“name”，如图 8-9 所示。这将把文本字段连接到数组控制器所选对象的 name 属性。\n\
  \n![9781430245421_Fig08-09.jpg](img/9781430245421_Fig08-09.jpg)\n\n图 8-9. 用于将名称文本字段连接到神话人物数组控制器的绑定检视器\n\
  \n滑块的绑定设置类似；我们将建立到神话人物数组控制器所选项的绑定，并根据控件的相应属性设置不同的*模型键路径*。对于三个滑块，这分别对应我们在模型文件中创建的\
  \ `divinity`、`power` 和 `goodness` 属性。要设置这些绑定，请选择“神性”（Divinity）滑块并查看*绑定检视器*。展开*值*部分，勾选*绑定到*复选框，然后从下拉菜单中选择“神话人物数组控制器”。确保*控制器键*框显示为“selection”，并在*模型键路径*字段中输入“divinity”。对“力量”（Power）和“善良”（Goodness）滑块重复此操作，并相应更改*模型键路径*。\n\
  \n设置“图像显示区域”（Depiction）和“详情”（Details）区域的绑定会稍微复杂一些。我们先处理“详情”。选择文本视图（请记住文本视图嵌入在 `NSScrollView`\
  \ 中；您需要点击滚动视图才能进入文本视图本身）。在*绑定检视器*中，与名称文本字段和滑块相比，会有不同的选项。不过，仍然有一个*值*部分，我们将使用它。展开*值*部分，勾选*绑定到*复选框，并使用“details”作为*模型键路径*。\n\
  \n对于“图像显示区域”，我们需要获取一个 `NSImage` 供图像井显示。Core Data 并不知道 `NSImage`，但这并不是问题。还记得我们之前讨论过的转换器和\
  \ Core Data 使用的可转换类型吗？\n\n由于 depiction 是一个可转换属性，其值需要在 GUI 中看到的内容（一个 `NSImage`）和\
  \ Core Data 能够存储的内容（`NSData`）之间进行转换。我们将通过为此控件添加 `NSKeyedUnarchiveFromData` 到 Cocoa\
  \ 绑定配置来实现这一点。选择图像井并调出*绑定检视器*。与其他字段一样，打开*值*部分。勾选*绑定到*复选框，确保*控制器键*显示为“selection”，并将*模型键路径*设置为“depiction”。为了完成从\
  \ `NSData` 到 `NSImage` 的转换，点击值转换器（Value Transformer）弹出列表，并选择 `NSKeyedUnarchiveFromData`。\n\
  \n## 配置表格视图的绑定\n\n现在来处理表格视图的绑定。为基于视图的表格视图设置 Cocoa 绑定分为两步。首先，我们必须为表格视图本身设置绑定。然后，为行中的每个视图设置绑定。表格视图会施展一些“魔法”，将其绑定源暴露给其子视图，该子视图名为“表格单元格视图”（Table\
  \ Cell View）。在该绑定中，有一个“objectValue”的*模型键路径*，它代表该行的对象。\n\n首先，选择表格视图本身。在左侧的对象停靠区中选择最为方便。在*绑定检视器*中，展开*内容*（Content）部分，勾选*绑定到*复选框，确保下拉菜单显示为“神话人物数组控制器”，并且*控制器键*显示为“arrangedObjects”。对于表格视图本身，我们不需要设置*模型键路径*。我们还希望表格视图中选中的行能够传回给数组控制器。为此，请展开*绑定检视器*的*选择索引*（Selection\
  \ Indices）部分。在此处勾选*绑定到*复选框，将下拉菜单设置为“神话人物数组控制器”，并将*控制器键*设置为“selectionIndexes”。您的绑定应如\
  \ 图 8-10 所示。\n\n![9781430245421_Fig08-10.jpg](img/9781430245421_Fig08-10.jpg)\n\n\
  图 8-10. 设置表格视图的绑定\n\n表格中有五列：名称、神性、力量、善良和图像显示区域。我们不直接在列上设置绑定；相反，我们将为每列中包含的视图设置绑定。对于前四列，视图是包含在\
  \ `NSTableCellView` 内的一个 `NSTextField`。对于“图像显示区域”列，视图是包含在 `NSTableCellView` 内的一个\
  \ `NSImageWell`。不幸的是，Xcode 将 `NSTableCellView` 内文本字段的默认值设置为“Table View Cell”，这似乎有意制造混淆。表格视图中的视图是\
  \ `NSTableCellView` 的实例，尽管它们的默认文本如此。文本字段和图像井将绑定到表格单元格视图的 `objectValue` 属性。\n\n我们从“名称”列开始。在“名称”列中选择表格单元格视图，如果您在\
  \ UI 界面中点击，可能需要双击；或者通过在左侧的对象停靠区展开“表格列 - 名称”（Table Column - Name）条目，并逐级深入其中的“静态文本\
  \ - 表格单元格视图”（Static Text - Table View Cell）条目。在*绑定检视器*中，展开*值*部分。勾选*绑定到*复选框，确保下拉菜单显示为“表格单元格视图”（Table\
  \ Cell View），并将*模型键路径*设置为“objectValue.name”。*控制器键*应为空。\n\n“神性”、“力量”和“善良”的绑定设置类似。依次选择每列并逐级深入其中的静态文本字段。像设置“名称”列一样设置值绑定：打开*值*部分，勾选*绑定到*复选框，确保下拉菜单显示为“表格单元格视图”，并根据情况将*模型键路径*设置为“objectValue.divinity”、“objectValue.power”或“objectValue.goodness”。\n\
  \n接下来处理“图像显示区域”列。在“图像显示区域”列中选择表格单元格视图内的图像井。在*绑定检视器*中，打开*值*部分。\n\n\n\n和之前一样，勾选 `Bind\
  \ to` 复选框，确保下拉菜单显示的是 Table Cell View。将 `Model Key Path` 设置为 “objectValue.depiction”。正如我们对上面的\
  \ Depiction 视图所做的那样，点击 Value Transformer 弹出列表，然后选择 `NSKeyedUnarchiveFromData`，如\
  \ 图 8-11 所示。至此，表格视图的配置就完成了！  \n![9781430245421_Fig08-11.jpg](img/9781430245421_Fig08-11.jpg)\
  \  \n图 8-11. 为 Depiction 列建立绑定  \n\n对于表格视图左下方显示匹配数量的文本字段，我们将使用一种不同的绑定方法，这样我们就可以使用格式字符串来构建文本字段的内容。在这种情况下，我们将使用\
  \ `Display Pattern Value1` 而不是 `Value`。展开 `Display Pattern Value1` 部分，勾选 `Bind to`\
  \ 复选框，并将下拉菜单设置为 Mythical Person Array Controller，和之前一样。在 `Controller Key` 中输入 “selection”。这次，我们将使用一个不同的键路径（key\
  \ path）。将 `Model Key Path` 设置为 “@count”，`Display Pattern` 设置为 “%{value1}@ out of\
  \ %{value2}@。” 现在，在 `Display Pattern Value1` 下面出现了另一个名为 `Display Pattern Value2`\
  \ 的绑定选项。展开 `Display Pattern Value2` 部分，勾选 `Bind to` 复选框，并将下拉菜单设置为 Mythical Person\
  \ Array Controller，和之前一样。这次，在 `Model Key Path` 中输入 “@count”，并在 `Controller Key`\
  \ 中输入 “arrangedObjects” 来替代 “selection”。`Display Pattern` 将自动填入我们在 `Display Pattern\
  \ Value1` 绑定中输入的值。  \n\n现在，我们需要连接 Fetch、Delete 和 Add 按钮。为此，我们将结合使用目标-动作连接（用于响应点击）和\
  \ Cocoa 绑定（用于适时启用或禁用按钮）。让我们从目标-动作连接开始。选择 Fetch 按钮，按住 Control 键拖出一条连接线到 Mythical\
  \ Person Array Controller。数组控制器将位于对象停靠栏（Object Dock）中对象列表的底部；如果您看不到它，请将鼠标悬停在对象停靠栏底部，它会向下滚动以显示数组控制器。选择\
  \ `fetch:` 动作。对 Delete 和 Add 按钮执行相同操作，分别选择 `remove:` 和 `add:` 动作。  \n\n接下来，我们将为\
  \ Add 和 Remove 按钮的 Enabled 属性建立绑定。选择 Add 按钮并打开`绑定检查器`（Bindings Inspector）。展开`可用性`（Availability）下的`已启用`（Enabled）部分。您能猜到下一步是什么吗？没错，勾选\
  \ `Bind to` 复选框，确保下拉菜单显示为 Mythical Person Array Controller。但是，这次将 `Controller Key`\
  \ 字段改为 “canAdd”。当您在 `Controller Key` 字段中开始输入时，将会看到一个可能的补全列表。对 Remove 按钮执行相同操作，将\
  \ `Controller Key` 改为 “canRemove”。  \n\n我们现在已经构建了足够多的用户界面，在继续之前应该先测试一下。让我们来试试。保存\
  \ nib 文件并点击 Run。您应该能够点击 Add 按钮，并在表格视图中看到空白行。您还应该能够编辑名称并移动滑块，这些更改会反映在表格视图的选定行中。如果不是这样，请检查\
  \ nib 文件中的绑定和连接，确认它们是否与说明相符。  \n\n## 完成绑定：保存和搜索  \n我们的应用程序应该能够处理多条记录，并允许创建和删除神话人物。但我们还不能保存或搜索，这使得它成为一个相当糟糕的数据库。现在让我们来解决这个问题。\
  \  \n\n保存很简单。Xcode 生成的应用程序委托（Application Delegate）类为我们处理了这件事；我们只需要告诉它何时保存。在主菜单（Main\
  \ Menu）中，有一个包含保存菜单项（Save menu item）的文件菜单（File menu）。保存菜单项已经预先绑定到了 ![images](img/arrow3.jpg)\
  \ S 键快捷键上。我们的应用也将使用这个快捷键。  \n\n在 Interface Builder 的对象停靠栏中，展开 Main Menu 对象，然后展开\
  \ File 菜单，再展开 Menu Item – Save 项目。注意，我们讨论的是对象停靠栏中的对象，而不是 Xcode 自己的菜单！按住 Control\
  \ 键拖出一条连接线到对象停靠栏中的 App Delegate，然后从列表中选择 `saveAction:` 动作。完成！  \n\n搜索就没那么直接了，首先需要介绍一些术语。Core\
  \ Data 的搜索支持基于*谓词*（predicates）。一个谓词由属性名称、运算符和一个搜索值组成；一个搜索字段可以支持多个谓词。谓词的两个例子是 `name\
  \ contains Heracles` 或 `goodness greater than 75`。如果您熟悉 SQL，SQL 命令的 `WHERE` 子句就是由谓词构成的。对于\
  \ MythBase 来说，MythicalPerson 实体的所有属性（depiction 除外）都应该可搜索，因此我们需要定义几个谓词。我们不能搜索 depiction，因为二进制和可转换属性本质上是不可搜索的。谓词可以在`绑定检查器`中定义，我们接下来就要去那里操作。\
  \  \n\n我们将从定义一个用于搜索 name 属性的谓词开始。选择屏幕右上角的搜索字段，然后打开`绑定检查器`。在`绑定检查器`底部附近有一个名为`谓词`（Predicate）的部分。展开它并勾选\
  \ `Bind to` 复选框，将其绑定到 Mythical Person Array Controller。`Controller Key` 应该显示为 “filterPredicate”。将`显示名称`（Display\
  \ Name）设置为 “Name”，谓词格式（predicate format）设置为 “name contains[c] $value”，其中 `$value`\
  \ 表示搜索框的内容，name 表示应该被搜索的 MythicalPerson 实体属性。运算符 `contains[c]` 表示我们想要返回任何 name 属性包含\
  \ `$value` 所代表值的记录，并且使用不区分大小写的搜索——这就是末尾的 `[c]` 的含义。如果没有 `[c]`，搜索就是区分大小写的。  \n\n\
  请注意，现在创建了一个新的名为 `Predicate2` 的绑定。我们将用它来定义一个谓词，以搜索实体中所有可搜索的字段。打开 `Predicate2`，和第一个一样，勾选\
  \ `Bind to` 复选框，将其绑定到 Mythical Person Array Controller。`Controller Key` 应该显示为 “filterPredicate”。对于\
  \ `Predicate2`，将`显示名称`设置为 “All”，并将谓词格式设置为以下冗长的字符串：“(name contains $value) or (divinity.description\
  \ contains $value) or (power.description contains $value) or (goodness.description\
  \ contains $value) or (details contains[c] $value)。” 请注意，现在出现了一个名为 `Predicate3`\
  \ 的新绑定。  \n\n我们已经展示了如何搜索一个或多个属性。如果您希望能够搜索其他特定字段，例如 name 或 details，请随意按照上述相同模式添加更多谓词，并相应更改谓词格式值中的字段名称。构建搜索谓词的可能性比我们在这里讨论的要多得多，Apple\
  \ 在 Xcode 文档中提供了一个谓词编程指南（Predicate Programming Guide）章节，对此进行了详细介绍。  \n\n好了，完成所有这些之后，是时候运行应用程序了。按下\
  \ Xcode 窗口左上角的 Run 按钮，您应该能够创建一些 Mythical Person 记录，将图片拖入大的图片框以显示图片，使用文件（File）![image](img/arrow.jpg)\
  \ 保存（Save）菜单项来保存记录，以及搜索数据库。搜索字段左侧边缘的问号图标应该能让您选择哪个搜索谓词处于活动状态。当您退出并重新运行应用程序时，记录应该会被保留并在启动时重新加载。\
  \  \n\n我们仅仅通过定义模型和构建图形用户界面（GUI）就制作出了一个看起来相当酷的应用程序。值得注意的是，我们一行代码也没有写！\n\n\n\n这是`Cocoa`一直以来所支持的视觉编程模型的一个绝佳示例，并且随着过去几年`Cocoa\
  \ bindings`和`Core Data`的加入，它变得更加完整。当然，这一切的基础是那些让这些“魔法”在`Xcode`中得以实现的框架和 API，而有时你也会希望或需要从代码中访问`Core\
  \ Data`的功能。本章的其余部分将介绍使用`Core Data`进行编程（在传统的、基于代码的意义上）的一些方面，首先从浏览`Application Delegate`类中生成的代码开始。\n\
  \n## 探究模板代码\n\n当我们创建`MythBase`项目时，系统为我们创建了一个名为`MBAppDelegate`的应用程序委托类。这个类包含加载我们应用程序中包含的`Core\
  \ Data`模型文件中的模型信息的代码。它还打开了磁盘上的存储空间，`Core Data`在此读取和写入其模型对象，如果该存储空间不存在，则创建它。最后，它通过一个`NSManagedObjectContext`提供对数据存储的访问，其他对象可以依次绑定到该上下文（例如我们\
  \ nib 文件中的数组控制器），以便从存储中读取和写入数据。\n\n此处显示的所有代码都已重新格式化，以更好地适应本书的版式，因此您的版本可能略有不同，但语法上应该是相同的。\n\
  \n### 应用程序委托接口\n\n让我们直接开始，查看头文件`MBAppDelegate.h`，如下清单所示。这是由`Xcode 4.5`为 Mountain\
  \ Lion 自动生成的代码。不同版本的`Xcode`生成的代码可能略有不同，如果您愿意，可以将其修改为与此处显示的版本一致：\n\n```\n#import\
  \ <Cocoa/Cocoa.h>\n\n@interface MBAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n\n@property (readonly, strong,\
  \ nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n@property\
  \ (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n@property\
  \ (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\n\
  - (IBAction)saveAction:(id)sender;\n\n@end\n```\n\n这段代码声明了一个包含四个属性和一个方法的简单类。`window`变量的属性声明中也包含了`IBOutlet`，使其成为一个可用于连接到`Interface\
  \ Builder`中窗口的出口。另外三个属性是一些重要的`Core Data`类的实例：\n\n- `NSPersistentStoreCoordinator`管理后端存储，提供对一个或多个`NSPersistentStore`实例的访问，每个实例代表一个存储位置（在文件中或内存中）。协调器的目的是让应用程序可以访问多个持久化存储，就好像它们是一个整体一样。某些应用程序可能希望使用它来将应用程序数据分区到多个存储中。例如，你可能希望区分常规实体（其对象保存到磁盘）和临时实体（其对象仅保存在内存中，用户退出应用程序时就会消失）。即使没有保存到磁盘，临时对象仍然可以受益于`Core\
  \ Data`的其他功能（简单的`Undo`支持、与`Cocoa bindings`的集成等）。\n- `NSManagedObjectModel`从一个或多个模型文件（通常包含在您的应用程序包中）加载关于实体及其属性的信息，并充当一种元数据仓库，包含应用程序托管对象的结构。许多应用程序永远不需要直接与之交互。\n\
  - `NSManagedObjectContext`负责管理所有托管对象（我们通过`Core Data`存储的模型对象）的生命周期。它通过`NSPersistentStoreCoordinator`访问对象本身，并提供用于创建、读取、更新和删除对象的高级功能。\n\
  \n大多数应用程序都会在某个时候使用`NSManagedObjectContext`来创建对象、保存更改等。\n\n当我们查看实现文件时，我们将看到每个对象是如何被使用的。头文件中的最后一个声明是`saveAction:`方法，当用户从`MythBase`菜单中选择文件![image](img/arrow.jpg)保存时，会调用该方法。我们将在下一节了解其工作方式。\n\
  \n### 应用程序委托实现\n\n现在让我们切换到`MythBase_AppDelegate.m`，看看它做了什么。除了实现接口中声明的`saveAction:`方法外，它还需要确保为其声明的属性实现了适当的访问器。这包括`window`的\
  \ getter 和 setter，以及其他属性（被声明为只读）的 getter。与头文件一样，这段代码是使用 Mountain Lion 上的`Xcode 4.5`自动生成的。如果您使用的是其他版本，您看到的代码可能会略有不同。\n\
  \n#### `applicationSupportDirectory` 方法\n\n文件开头如下所示：\n\n```\n#import \"MBAppDelegate.h\"\
  \n\n@implementation MBAppDelegate\n\n@synthesize persistentStoreCoordinator = _persistentStoreCoordinator;\n\
  @synthesize managedObjectModel = _managedObjectModel;\n@synthesize managedObjectContext\
  \ = _managedObjectContext;\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // 在此处插入代码以初始化您的应用程序\n}\n\n// 返回应用程序用于存储 Core Data 存储文件的目录。此代码使用用户\
  \ Application Support 目录中名为 \"com.learncocoa.MythBase\" 的目录。\n- (NSURL *)applicationFilesDirectory\
  \ {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    NSURL\
  \ *appSupportURL = [[fileManager URLsForDirectory:NSApplicationSupportDirectory\
  \ inDomains:NSUserDomainMask] lastObject];\n    return [appSupportURL URLByAppendingPathComponent:@\"\
  com.learncocoa.MythBase\"];\n}\n```\n\n类实现中首先展示的是一些`@synthesize`指令，它们负责处理头文件中声明的属性的\
  \ getter 和 setter。接下来是`applicationDidFinishLaunching:`方法的存根，我们之前见过，这对于任何应用程序委托类都是标准的。之后是一个名为`applicationFilesDirectory`的方法的实现，它返回一个包含目录名称的`NSURL`，应用程序可以将数据保存到该目录中（在我们的例子中，是`Core\
  \ Data`保存其持久化存储的位置）。通常，此方法返回`Application Support`目录子目录的完整路径，该子目录位于用户主目录下的`Library`目录中（`/Users/somebody/Library/Application\
  \ Support/MythBase`）。\n\n`applicationFilesDirectory:`方法是一个“辅助”方法，在类实现的其他地方被调用。请注意，该方法既未在头文件中声明，也未在私有类别或类似结构中声明。在`Objective-C`实现代码块中，代码可以调用同一实现代码块中之前出现的任何方法，即使它们没有在任何地方声明。当你想要稍微重构代码，将一些功能提取到自己的方法中，但又不需要在当前类实现之外的任何地方访问它时，这有时是一个便捷的捷径。\n\
  \n#### `managedObjectModel` 访问器方法\n\n接下来是`managedObjectModel`方法。该方法作为`managedObjectModel`属性的\
  \ getter。\n\n```\n// 如有必要则创建，并返回应用程序的托管对象模型。\n```\n\n\n\n- (NSManagedObjectModel\
  \ *)managedObjectModel {\n    if (_managedObjectModel) {\n        return _managedObjectModel;\n\
  \    }\n\n    NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"MythBase\"\
  \ withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel alloc]\
  \ initWithContentsOfURL:modelURL];\n    return _managedObjectModel;\n}\n\n该方法简单地检查`managedObjectModel`是否已经创建。如果是，则返回它；如果不是，则通过读取应用程序包中的`MythBase.momd`资源文件来创建它。这个文件是由\
  \ Xcode 根据我们在本章开头创建的模型文件生成的。任何需要访问模型元数据的代码都可能调用`managedObjectModel:`方法。特别是，在创建`NSPersistentStoreCoordinator`时会被调用，该协调器需要读取或为我们的模型创建存储，因此它需要这些详细信息。\n\
  \n## 使用 NSError 进行错误处理\n\n这里展示的一些代码使用了`NSError`对象来处理可能发生的错误。我们还没有介绍`NSError`，所以这里提供一个简要的说明。\n\
  \n`NSError`的基本思想是：某些方法需要在不使用返回值的情况下，告知调用方可能发生的潜在错误。为了实现这一点，您传入一个指向`NSError`指针的指针（在\
  \ C 语言中有时称为“句柄”），以便该方法可以创建一个`NSError`对象并将指针指向它，大致如下：\n\n```\nNSError *error = nil;\n\
  [someObject doSomething:&error];\nif (error) {\n    // handle the error somehow!\n\
  }\n```\n\n关于`NSError`的更多细节，请参见第 14 章。\n\n## persistentStoreCoordinator 访问器方法\n\n\
  接下来是相当长的`persistentStoreCoordinator`方法：\n\n```objective-c\n// Returns the persistent\
  \ store coordinator for the application.\n// This implementation creates and returns\
  \ a coordinator, having added the store for the application to it.\n// (The directory\
  \ for the store is created, if necessary.)\n\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\
  \ {\n    if (_persistentStoreCoordinator) {\n        return _persistentStoreCoordinator;\n\
  \    }\n\n    NSManagedObjectModel *mom = [self managedObjectModel];\n    if (!mom)\
  \ {\n        NSLog(@\"%@:%@ No model to generate a store from\", [self class], NSStringFromSelector(_cmd));\n\
  \        return nil;\n    }\n\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
  \    NSURL *applicationFilesDirectory = [self applicationFilesDirectory];\n    NSError\
  \ *error = nil;\n\n    NSDictionary *properties = [applicationFilesDirectory resourceValuesForKeys:@[NSURLIsDirectoryKey]\
  \ error:&error];\n\n    if (!properties) {\n        BOOL ok = NO;\n        if ([error\
  \ code] == NSFileReadNoSuchFileError) {\n            ok = [fileManager createDirectoryAtPath:[applicationFilesDirectory\
  \ path] withIntermediateDirectories:YES attributes:nil error:&error];\n        }\n\
  \        if (!ok) {\n            [[NSApplication sharedApplication] presentError:error];\n\
  \            return nil;\n        }\n    } else {\n        if (![properties[NSURLIsDirectoryKey]\
  \ boolValue]) {\n            // Customize and localize this error.\n           \
  \ NSString *failureDescription = [NSString stringWithFormat:@\"Expected a folder\
  \ to store application data, found a file (%@).\", [applicationFilesDirectory path]];\n\
  \n            NSMutableDictionary *dict = [NSMutableDictionary dictionary];\n  \
  \          [dict setValue:failureDescription forKey:NSLocalizedDescriptionKey];\n\
  \            error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:101 userInfo:dict];\n\
  \n            [[NSApplication sharedApplication] presentError:error];\n        \
  \    return nil;\n        }\n    }\n\n    NSURL *url = [applicationFilesDirectory\
  \ URLByAppendingPathComponent:@\"MythBase.storedata\"];\n    NSPersistentStoreCoordinator\
  \ *coordinator = [[NSPersistentStoreCoordinator alloc] initWithManagedObjectModel:mom];\n\
  \    if (![coordinator addPersistentStoreWithType:NSXMLStoreType configuration:nil\
  \ URL:url options:nil error:&error]) {\n        [[NSApplication sharedApplication]\
  \ presentError:error];\n        return nil;\n    }\n    _persistentStoreCoordinator\
  \ = coordinator;\n\n    return _persistentStoreCoordinator;\n}\n```\n\n这个方法看起来有点吓人，但我们将逐步分析它。它首先检查`persistentStoreCoordinator`实例变量中是否已存在对象，如果存在则返回它。否则，它需要自己初始化协调器，因此继续调用同名方法来获取`managedObjectModel`。如果该模型不存在，则应用程序不包含模型，此方法会记录错误，实际上放弃并返回`nil`。\n\
  \n否则，它会继续检查由`applicationFilesDirectory`方法返回的路径所指定的目录是否存在，该目录用于存放应用的 Core Data 存储。它通过调用`applicationFilesDirectory`返回的`NSURL`上的`resourceValuesForKeys:error:`方法来实现这一点，该方法返回一个包含所请求属性信息的`NSDictionary`。在这个例子中，我们请求`NSURLIsDirectoryKey`键的资源值，询问该\
  \ URL 是否代表一个目录（而不是文件）。\n\n如果目录根本不存在（例如应用程序首次运行时），`resourceValuesForKeys:error:`方法可能返回`nil`。如果是这种情况，代码会检查`NSError`的内容，看路径是否不存在。如果路径不存在，它会尝试创建目录，然后检查目录创建是否成功。如果创建失败，则报告错误并返回`nil`。另一方面，如果`resourceValuesForKeys:error:`确实返回了一个属性对象，那么它会检查该对象的内容，看路径是否存在但不代表一个目录。如果存在一个同名的文件，就可能出现这种情况。如果这样，该方法会（在查找本地化错误消息后）报告错误并返回`nil`。\n\
  \n如果通过了所有这些边界情况（通常都会），那么该方法会构建一个指向存储文件应存放位置的 URL，创建一个`NSPersistentStoreCoordinator`，并告诉协调器根据该\
  \ URL 添加一个新存储。协调器足够智能，可以检查该 URL 是否已经存在持久化存储，如果不存在，则为我们创建一个。如果在过程中遇到任何错误，它会告诉我们，应用程序会向用户报告错误。\n\
  \n关于这个方法有几个值得关注的点：首先，这里是应用程序数据存储的实际文件名（当前为`MythBase.storedata`，不过在早期版本的 Mac OS/X\
  \ 中默认是`MythBase.xml`）被指定的地方。如果您想将文件命名为其他名称，就需要在这里更改。\n\n此外，这里还指定了后端存储的类型，就是在调用`addPersistentStoreWithType:configuration:URL:options:error:`方法时设置的。当前设置为`NSXMLStoreType`，这意味着存储的数据将以\
  \ XML 格式的文件存在。在开发应用程序时，这种存储方式很方便，因为生成的文件易于使用其他工具解析，或者直接用肉眼查看。然而，在交付最终应用程序之前，考虑到文件大小、速度和其他因素，您可能需要考虑将数据存储改为其他类型。\n\
  \n\n\n## 核心数据存储类型及相关委托\n\n我们还有其他选择：`NSBinaryStoreType`（以二进制格式保存数据，占用更少的磁盘空间且读写速度更快）和`NSSQLiteStoreType`（除具备`NSBinaryStoreType`的优势外，还免去了持久化存储一次性将整个对象图加载到内存的负担；它仅在访问对象时进行加载）。在处理大型数据集时，这一差异变得至关重要。鉴于这一优势，我们建议在发布应用程序前，将存储类型从`NSXMLStoreType`切换为`NSSQLiteStoreType`。还有一种存储类型是`NSInMemoryStoreType`，可用于维护一个永不保存到磁盘的内存对象图。\n\
  \n默认的 Core Data 应用程序模板在隐藏数据存储方面做得相当出色，让你无需过多操心，但在发布应用前的某个时刻，你必须决定使用哪种格式来存储应用数据。我们已给出了推荐，但建议你在决定如何处理此问题前，查阅\
  \ Xcode 中的文档（搜索“core data programming guide”）以加深理解。\n\n关于`persistentStoreCoordinator`，最后需要指出的是：如果你想将数据划分到不同的存储中（例如，一个存储在磁盘上，另一个仅保存在内存中，应用终止时数据消失），那么你需要在此处进行修改，将每个持久化存储添加到协调器中。\n\
  \n## managedObjectContext 访问器方法\n\n现在我们来查看`managedObjectContext`方法，它是同名只读属性的 getter\
  \ 方法：\n\n```\n// 返回应用程序的托管对象上下文（该上下文已绑定到应用程序的持久化存储协调器）。\n- (NSManagedObjectContext\
  \ *)managedObjectContext {\n    if (_managedObjectContext) {\n        return _managedObjectContext;\n\
  \    }\n\n    NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];\n\
  \    if (!coordinator) {\n        NSMutableDictionary *dict = [NSMutableDictionary\
  \ dictionary];\n        [dict setValue:@\"Failed to initialize the store\" forKey:NSLocalizedDescriptionKey];\n\
  \        [dict setValue:@\"There was an error building up the data file.\" forKey:NSLocalizedFailureReasonErrorKey];\n\
  \        NSError *error = [NSError errorWithDomain:@\"YOUR_ERROR_DOMAIN\" code:9999\
  \ userInfo:dict];\n        [[NSApplication sharedApplication] presentError:error];\n\
  \        return nil;\n    }\n    _managedObjectContext = [[NSManagedObjectContext\
  \ alloc] init];\n    [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n\
  \n    return _managedObjectContext;\n}\n```\n\n与我们看到的其他作为属性 getter 的方法类似，此方法首先检查实例变量是否已设置，若已设置则直接返回。否则，它会通过调用`persistentStoreCoordinator`方法来检查持久化存储协调器的存在性。如果该方法返回\
  \ nil，则本方法报告错误并返回 nil。如果协调器存在，则只需创建一个托管对象上下文，设置其持久化存储协调器，然后返回该上下文。\n\n这段代码非常直接，除了可能自定义错误报告之外，你可能不会过多关注它。\n\
  \n## NSWindow 委托方法\n\n接下来是一个名为`windowWillReturnUndoManager`的`NSWindow`委托方法。\n\n\
  ```\n// 返回应用程序的 NSUndoManager。在此情况下，返回的管理器是应用程序托管对象上下文的管理器。\n- (NSUndoManager *)windowWillReturnUndoManager:(NSWindow\
  \ *)window {\n    return [[self managedObjectContext] undoManager];\n}\n```\n\n\
  此方法允许我们指定负责处理包含 GUI 的窗口的撤销/重做操作的对象。\n\n我们将在后续章节讨论撤销/重做系统，但目前你需要知道的是，此方法会告知系统使用 Core\
  \ Data 的撤销管理器，该管理器通过托管对象上下文进行访问。\n\n## saveAction: 操作方法\n\n接下来是`saveAction:`方法，当用户点击相关菜单项时调用。\n\
  \n```\n// 执行应用程序的保存操作，即向应用程序的托管对象上下文发送 save: 消息。任何遇到的错误都会呈现给用户。\n- (IBAction)saveAction:(id)sender\
  \ {\n    NSError *error = nil;\n\n    if (![[self managedObjectContext] commitEditing])\
  \ {\n        NSLog(@\"%@:%@ unable to commit editing before saving\", [self class],\
  \ NSStringFromSelector(_cmd));\n    }\n\n    if (![[self managedObjectContext] save:&error])\
  \ {\n        [[NSApplication sharedApplication] presentError:error];\n    }\n}\n\
  ```\n\n此方法非常简单。它首先通知上下文确保所有待处理的编辑都已提交到底层模型对象，并在提交失败时打印警告。无论提交成功还是失败，它接着会通知上下文将所有模型对象保存到存储中。如果保存失败，则会向用户显示错误信息。\n\
  \n## NSApplication 委托方法\n\n现在我们来看这个类的最后一个方法，即`NSApplication`委托方法`applicationShouldTerminate:`。当用户从菜单中选择“退出”时，应用程序会调用此方法，它为委托提供了保存更改、检查自身状态、询问用户是否真的想退出等机会。此方法的返回值决定了应用程序是否真正终止。代码如下：\n\
  \n```\n- (NSApplicationTerminateReply)applicationShouldTerminate:(NSApplication\
  \ *)sender {\n    // 在应用程序终止前，保存应用程序托管对象上下文中的更改。\n\n    if (!_managedObjectContext)\
  \ {\n        return NSTerminateNow;\n    }\n\n    if (![[self managedObjectContext]\
  \ commitEditing]) {\n        NSLog(@\"%@:%@ unable to commit editing to terminate\"\
  , [self class], NSStringFromSelector(_cmd));\n        return NSTerminateCancel;\n\
  \    }\n\n    if (![[self managedObjectContext] hasChanges]) {\n        return NSTerminateNow;\n\
  \    }\n\n    NSError *error = nil;\n    if (![[self managedObjectContext] save:&error])\
  \ {\n\n        // 自定义此代码块以包含特定于应用程序的恢复步骤。\n        BOOL result = [sender presentError:error];\n\
  \        if (result) {\n            return NSTerminateCancel;\n        }\n\n   \
  \     NSString *question = NSLocalizedString(@\"Could not save changes while quitting.\
  \ Quit anyway?\", @\"Quit without saves error question message\");\n        NSString\
  \ *info = NSLocalizedString(@\"Quitting now will lose any changes you have made\
  \ since the last successful save\", @\"Quit without saves error question info\"\
  );\n        NSString *quitButton = NSLocalizedString(@\"Quit anyway\", @\"Quit anyway\
  \ button title\");\n        NSString *cancelButton = NSLocalizedString(@\"Cancel\"\
  , @\"Cancel button title\");\n        NSAlert *alert = [[NSAlert alloc] init];\n\
  \        [alert setMessageText:question];\n        [alert setInformativeText:info];\n\
  \        [alert addButtonWithTitle:quitButton];\n        [alert addButtonWithTitle:cancelButton];\n\
  \n        NSInteger answer = [alert runModal];\n\n        if (answer == NSAlertAlternateReturn)\
  \ {\n            return NSTerminateCancel;\n        }\n    }\n\n    return NSTerminateNow;\n\
  }\n```\n\n与`persistentStoreCoordinator`方法类似，我们将逐段分析这段代码。首先，它检查是否确实存在需要处理的`managedObjectContext`。如果不存在，则立即返回`NSTerminateNow`，应用程序终止。如果存在`managedObjectContext`，则通知上下文提交所有待处理的更改。\n\
  \n\n\n如果失败，它会记录一条错误消息并返回`NSTerminateCancel`，这会使应用程序中止当前的终止过程并继续其正常操作。然后，它会检查`managedObjectContext`是否实际有任何待处理的更改，如果没有，则返回`NSTerminateNow`。最后，它会执行关键步骤，指示上下文保存其更改。如果保存失败，则会触发最终的大的条件块。该块会构造一个`NSAlert`，它是一种特殊的窗口类型，会出现在所有其他应用程序窗口的前面，并强制您通过点击按钮做出选择（您将在第\
  \ 11 章中了解更多关于`NSAlert`和其他窗口的信息）。在这种情况下，它会告知用户他们的更改未被保存，并询问他们是选择“无论如何退出应用程序”还是“取消终止并返回正常状态”。根据此请求的返回值，它要么返回`NSTerminateCancel`，要么“直接通过”并返回`NSTerminateNow`。\n\
  \n是时候指出此方法中的一个小错误了：在接近末尾处，当方法检查“取消”按钮是否被按下时，它实际上是将`answer`与错误的值进行比较。它应该是`NSAlertSecondButtonReturn`，而不是`NSAlertAlternateReturn`。这可能不是什么大问题，并且我们不会为示例应用程序费心去修复它，但逻辑中的这个错误使得当应用程序处于特定的无效状态时无法避免退出。哎呀！\n\
  \n一个值得注意的有趣之处是此方法中使用了`NSLocalizedString`。`NSLocalizedString`是一种让我们的代码在可用时使用本地化资源的简单方式。它是一个\
  \ C 函数，接受两个参数：一个默认字符串和一个用于查找本地化字符串的键。例如，在`NSLocalizedString(@\"Cancel\", @\"Cancel\
  \ button title\")`这样的调用中，`NSLocalizedString`会首先检查用户偏好的语言，然后检查是否存在以`@\"Cancel button\
  \ title\"`为键的该语言的本地化字符串，如果存在则返回它。否则，它只会返回第一个参数`@\"Cancel\"`。\n\n## 添加业务逻辑\n\n既然我们已经了解了使用\
  \ Core Data 构建应用程序的基本思路，包括定义模型、配置 GUI 以及了解项目中模板提供的代码，现在是时候学习如何使用 Core Data 在我们的模型对象中实际实现一些“有趣”的功能了：即我们应用程序的“业务逻辑”。\n\
  \n部分业务逻辑直接在模型文件中指定，例如整数的`min`和`max`大小，而有些功能则需要一些代码。幸运的是，`NSManagedObject`提供了一些“钩子”，让我们可以测试对象的属性以验证它们并确保它们没问题。然而，为了使用这些钩子，我们首先需要创建一个`NSManagedObject`的子类来表示我们的`MythicalPerson`实体。到目前为止，我们一直使用的是`NSManagedObject`本身，但要添加代码，我们需要创建一个子类。\n\
  \n### 创建 MythicalPerson 类\n\nXcode 会愉快地为我们创建`NSManagedObject`的子类。为此，请点击 File ![image](img/arrow.jpg)\
  \ New ![image](img/arrow.jpg) File（或按 ![images](img/arrow3.jpg)N）。在模板选择器中，从左侧的 OS\
  \ X 部分选择 *Core Data*。然后，在主窗口中选择 *NSManagedObject subclass*。点击 Next。在出现的表格视图中，勾选`MythBase`的复选框，这表示我们将创建一个与`MythBase`数据模型中描述的实体一起工作的`NSManagedObject`子类。点击\
  \ Next。下一个选择是指定要为哪个实体创建`NSManagedObject`类。由于我们只定义了一个实体，这里只有一个选择：`MythicalPerson`。勾选它，然后点击\
  \ Next。最后，系统会询问我们将文件保存到哪里。文件面板应默认指向`MythBase`的主目录，这正是我们想要的位置。\n\n保持其他选项为默认值，并点击\
  \ Create。现在我们有了一个`MythicalPerson.h`和一个`MythicalPerson.m`文件可供使用。\n\n`MythicalPerson.h`文件内容如下：\n\
  \n```objc\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\n\
  @interface MythicalPerson : NSManagedObject\n\n@property (nonatomic, retain) id\
  \ depiction;\n@property (nonatomic, retain) NSString * details;\n@property (nonatomic,\
  \ retain) NSNumber * divinity;\n@property (nonatomic, retain) NSNumber * goodness;\n\
  @property (nonatomic, retain) NSString * name;\n@property (nonatomic, retain) NSNumber\
  \ * power;\n\n@end\n```\n\n我们为模型中定义的每个实体属性都提供了属性，并为其内容指定了合适的类。\n\n在`MythicalPerson.m`文件中，我们看到以下内容：\n\
  \n```objc\n#import \"MythicalPerson.h\"\n\n@implementation MythicalPerson\n\n@dynamic\
  \ depiction;\n@dynamic details;\n@dynamic divinity;\n@dynamic goodness;\n@dynamic\
  \ name;\n@dynamic power;\n\n@end\n```\n\n我们之前没有见过`@dynamic`指令。这告诉 Xcode，即使我们没有包含`@synthesize`指令，也不要自动合成它们，并且当它找不到访问器方法的实现时，不要产生警告。Core\
  \ Data 会在运行时生成相应的访问器。\n\n## 验证单个属性\n\n假设我们想为`MythBase`添加一个特殊约束，以确保任何`MythicalPerson`都不能被命名为“Bob”。为此，我们只需将此处显示的方法添加到`MythicalPerson.m`的`@implementation`部分：\n\
  \n```objc\n- (BOOL)validateName:(id *)ioValue error:(NSError **)outError {\n  if\
  \ (*ioValue == nil) {\n    return YES;\n  }\n  if ([*ioValue isEqualToString:@\"\
  Bob\"]) {\n    if (outError != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
  \        @\"You're not allowed to name a mythical person 'Bob'.  \"\n          \"\
  \ 'Bob' is a real person, just like you and me.\",\n        @\"validation: invalid\
  \ name error\");\n      NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
  \        forKey:NSLocalizedDescriptionKey];\n      NSError *error = [[NSError alloc]\
  \ initWithDomain:@\"MythicalPersonErrorDomain\"\n        code:13013 userInfo:userInfoDict];\n\
  \      *outError = error;\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\n\
  请注意此方法的名字`validateName:error:`。这个命名约定来自于在 Cocoa 中无处不在的键值编码模型。Core Data 中的属性验证是通过使用名为`validate<Key>:error:`的方法来实现的。在将更改保存到数据存储时，会（如果存在的话）在每个托管对象上调用这些方法。在此方法中，我们应检查建议的值，如果没问题则返回`YES`。如果不是，则返回`NO`，并且还应该创建一个描述错误的`NSError`对象，并将传入的`NSError\
  \ **`指向它。请注意，在创建错误时，我们需要指定一个标识错误名称的字符串和一个指明具体是哪个错误的整数。在一个更大的应用程序中，最好以某种方式标准化这些值。这样做可以帮助我们追踪用户可能报告的错误，还可以让我们捕获一些重复出现的错误并单独处理它们（例如，在应用控制器的`saveAction:`方法中）。我们将在第\
  \ 12 章中进一步讨论这一点。\n\n至此，我们可以编译并运行`MythBase`，一切应该和之前一样……直到我们将某个`MythicalPerson`的名字改为“Bob”并尝试保存更改，此时我们会被告知这是一个无效值。\n\
  \n## 验证多个属性\n\n有时，我们需要能够同时验证多个属性，确保它们的组合有意义。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n例如，假设我们为每个 `MythicalPerson` 设定了一个新约束：只有当 `divinity` 属性的值为 100（意味着只有处于完全“上帝模式”的人才能拥有高于\
  \ 50 的 `power` 等级）时，`power` 属性的值才能超过 50。推荐的做法不是在 `validatePower:error:` 或 `validateDivinity:error:`\
  \ 中检查此条件，而是在创建或编辑新托管对象时调用的另外两个验证方法中检查：`validateForInsert:` 和 `validateForUpdate:`。由于我们要在两个地方检查相同的内部一致性问题（即\
  \ `power > 50` 且 `divinity < 100`），我们将把该项检查放到我们自己的方法 `validateConsistency:` 中，并由另外两个方法调用它。\n\
  \n首先，让我们在 `MythicalPerson.m` 中实现这两个 Core Data 验证方法：\n\n```\n- (BOOL)validateForInsert:(NSError\
  \ **)error {\n  BOOL propertiesValid = [super validateForInsert:error];\n  BOOL\
  \ consistencyValid = [self validateConsistency:error];\n  return (propertiesValid\
  \ && consistencyValid);\n}\n\n- (BOOL)validateForUpdate:(NSError **)error {\n  BOOL\
  \ propertiesValid = [super validateForUpdate:error];\n  BOOL consistencyValid =\
  \ [self validateConsistency:error];\n  return (propertiesValid && consistencyValid);\n\
  }\n```\n\n这两种方法的工作方式相同。首先，它们调用父类的同名方法；这非常重要，因为该方法会实际调用每个被更改属性的所有 `validate:error:`\
  \ 方法。然后，会调用我们自己的 `validateConsistency:` 方法。如果这两个调用的返回值都是 `YES`，那么该方法本身返回 `YES`；否则返回\
  \ `NO`。\n\n现在让我们看看 `validateConsistency:` 是什么样的。\n\n```\n- (BOOL)validateConsistency:(NSError\
  \ **)error {\n  int divinity = [[self valueForKey:@\"divinity\"] intValue];\n  int\
  \ power = [[self valueForKey:@\"power\"] intValue];\n  if (divinity < 100 && power\
  \ > 50) {\n    if (error != NULL) {\n      NSString *errorStr = NSLocalizedString(\n\
  \        @\"Power cannot exceed 50 unless divinity is 100\",\n        @\"validation:\
  \ divinity / power error\");\n      NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
  \        forKey:NSLocalizedDescriptionKey];\n      NSError *divinityPowerError =\
  \ [[NSError alloc]\n        initWithDomain:@\"MythicalPersonErrorDomain\" code:182\n\
  \        userInfo:userInfoDict];\n      if (*error == nil) {\n        // 没有之前的错误，返回新错误\n\
  \        *error = divinityPowerError;\n      }\n      else {\n        // 将之前的错误与新错误合并\n\
  \        *error = [self errorFromOriginalError:*error\n          error:divinityPowerError];\n\
  \      }\n    }\n    return NO;\n  }\n  return YES;\n}\n```\n\n这个方法比单属性的验证方法稍微复杂一些。我们以同样的方式检查问题，如果一切正常则返回\
  \ `YES`，否则构造一个 `NSError`，将错误参数指向它，然后返回 `NO`。然而，为了与 Core Data“友好相处”，我们必须检查是否已存在错误，如果存在，则将其与我们自己的错误合并成一种特殊类型的错误。这使得\
  \ Core Data 最终能够在尝试保存时报告它发现的所有错误。这种错误合并是通过我们自己的另一个方法 `errorFromOriginalError:error:`\
  \ 完成的，我们应该将其添加到我们的类中。\n\n```\n- (NSError *)errorFromOriginalError:(NSError *)originalError\n\
  \    error:(NSError *)secondError {\n  NSMutableDictionary *userInfo = [NSMutableDictionary\
  \ dictionary];\n  NSMutableArray *errors = [NSMutableArray\n    arrayWithObject:secondError];\n\
  \n  if ([originalError code] == NSValidationMultipleErrorsError) {\n    [userInfo\
  \ addEntriesFromDictionary:[originalError userInfo]];\n    [errors addObjectsFromArray:[userInfo\n\
  \      objectForKey:NSDetailedErrorsKey]];\n  }\n  else {\n    [errors addObject:originalError];\n\
  \  }\n  [userInfo setObject:errors forKey:NSDetailedErrorsKey];\n  return [NSError\
  \ errorWithDomain:NSCocoaErrorDomain\n                             code:NSValidationMultipleErrorsError\n\
  \                         userInfo:userInfo];\n}\n```\n\n基本上，此方法检查 `originalError`\
  \ 参数是否已包含多个错误，如果是，则只需将新错误添加到列表中。否则，它将两个单个错误合并到一个新的多错误对象中。\n\n完成所有这些之后，我们现在应该能够编译并运行，选择一个\
  \ `MythicalPerson`，将其 `power` 设置为高于 50，`divinity` 设置为低于 100，然后尝试保存。我们会看到一个错误，告知我们问题所在。我们还可以通过保持\
  \ power/divinity 的不一致性，将名称更改为“Bob”，然后尝试保存，来确保多问题的报告功能正常工作。我们应该会看到一个警告面板，告知我们发生了多个验证错误，但不会看到其中任何一个的详细信息。这为将来扩展应用委托的\
  \ `saveAction:` 和 `applicationShouldTerminate:` 方法提供了一个好思路：想出一种显示多个错误的方法，而不是像当前这样只调用\
  \ `presentError:`。这是一个可以在空闲时处理的问题！\n\n## 创建自定义属性\n\n另一种常见的简单“业务逻辑”是基于对象属性中包含的值来创建自定义属性。例如，如果我们有一个具有\
  \ `firstName` 和 `lastName` 属性的实体，我们可能想要创建一个名为 `fullName` 的自定义属性，将两者组合在一起。\n\n这种事情对于\
  \ Core Data 来说是小菜一碟。在我们的例子中，假设我们想为 `MythicalPerson` 添加一个名为 `awesomeness` 的属性，它将根据\
  \ `MythicalPerson` 的 `power`、`divinity` 和 `goodness` 计算得出。首先，我们在 `MythicalPerson`\
  \ 的实现中定义一个名为 `awesomeness` 的方法：\n\n```\n- (int)awesomeness {\n  int awesomeness\
  \ = [[self valueForKey:@\"divinity\"] intValue] * 10 +\n    [[self valueForKey:@\"\
  power\"] intValue] * 5 +\n    [[self valueForKey:@\"goodness\"] intValue];\n  return\
  \ awesomeness;\n}\n```\n\n完成此操作后，我们可以对任何 `MythicalPerson` 调用 `awesomeness` 方法并获取结果。当然，这同样适用于\
  \ Cocoa 绑定，因此我们可以轻松地将 GUI 控件的值绑定到此新属性。返回到 Xcode，将窗口和框稍微放大一些，然后从库窗口中添加一个标签和一个级别指示器，类似于图\
  \ 8-12。\n\n![9781430245421_Fig08-12.jpg](img/9781430245421_Fig08-12.jpg)\n\n图 8-12.\
  \ MythBase，现已添加神威值\n\n现在选择“神威值”控件，并打开*属性检查器*。将*样式*设置为“连续”，将*最小值*和*最大值*分别设置为 0 和\
  \ 1600。现在切换到*绑定检查器*，通过神话人物数组控制器绑定级别指示器的值，控制器键为“selection”，模型键为“awesomeness”。Xcode\
  \ 不知道神威值是什么，所以我们必须自己输入，而不是从组合框中选取；我们相信您会同意，为了神威值，这点小代价是值得的。\n\n保存更改，切换回 Xcode，单击“运行”，然后出发。在表格视图的不同行之间切换，查看神威值柱状图的变化。\n\
  \n\n\n## Core Data 关系与迁移\n\n## 理解 Core Data 中的依赖关系\n\n拖动滑块，现在稍等片刻：`Awesomeness`\
  \ 值竟然没有变化！原因是 Core Data 中的任何部分——无论是我们的模型文件、`MythicalPerson` 类，还是使用的控制器——都不知道 `Awesomeness`\
  \ 依赖于其他值，并且在它们发生变化时需要重新计算。通过在 `MythicalPerson` 中实现一个额外的小方法即可解决这个问题：\n\n```\n+ (NSSet\
  \ *)keyPathsForValuesAffectingAwesomeness {\n    return [NSSet setWithObjects:@\"\
  divinity\", @\"power\", @\"goodness\",\n        nil];\n}\n```\n\n这是另一个根据访问器名称动态构建的方法名称。我们在验证单个属性时也见过这种模式。在这个方法中，我们返回一组属性名称，这些属性是\
  \ `awesomeness` 属性所依赖的。有了这个设置，Core Data 会在应用生命周期的某个早期阶段自动调用此方法，并妥善处理，使得对该集合中任何属性的更改也会触发控制器更新所有绑定到\
  \ `awesomeness` 属性的对象。注意方法签名中用的是加号而非减号——这表明 `keyPathsForValuesAffectingAwesomeness`\
  \ 是一个类方法，而非实例方法。这是 Cocoa 键值观察系统的一部分。Cocoa KVO 会查找这种结构的方法，如果存在，则进行调用。\n\n构建并运行应用，现在当我们拖动其他滑块时，绿色条会随之变化。太棒了！\n\
  \n## 总结\n\n在本章中，我们涵盖了关于 Core Data 的相当广泛的内容。我们学习了如何在 Xcode 中创建模型文件，以及如何使用 Core Data\
  \ 和 Cocoa 绑定的组合快速构建一个像样的图形用户界面。我们还了解了 Core Data 存储数据的一些底层原理，并学习了实现自定义业务逻辑的一些基础知识。在第\
  \ 9 章中，我们将在此基础上进一步学习如何通过添加关系来完善数据模型。\n\n# 第 9 章：Core Data 关系\n\n上一章介绍了 Core Data\
  \ 工作原理的许多基础知识，但我们使用的数据模型极其简单，只包含单个实体。在本章中，我们将扩展数据模型以包含多个实体，并定义这些实体之间的关系。我们还将创建一个图形用户界面来显示这些关系，并允许我们进行编辑。在这个过程中，我们将初步了解\
  \ Core Data 如何处理多个不兼容版本的数据模型，以及如何将数据存储从一个模型版本迁移到下一个版本。\n\n所有这些工作将在扩展第 7 章的 MythBase\
  \ 项目时完成，我们将在其中添加一些讨论神话英雄和神灵时经常被忽视的数据：他们曾经演出的传奇乐队！阿喀琉斯和希腊配方乐队在旧帕特农舞厅那晚的震撼演出堪称传奇，谁又能忘记四诺斯曼人在克朗塔夫晚餐俱乐部的告别音乐会呢？我们在本章中对\
  \ MythBase 所做的改进（见图 9-1）将帮助我们记录这些关键信息。\n\n![9781430245421_Fig09-01.jpg](img/9781430245421_Fig09-01.jpg)\n\
  \n图 9-1 . 本章将要创建的全新改进版 MythBase 应用\n\n我们将首先在数据模型中添加所有想要的新实体和关系，然后继续设置图形用户界面以允许编辑所有内容。为了准备本章后续内容，请前往\
  \ Finder，复制上一章最终的 MythBase 项目目录，然后进入新目录，双击 `MythBase.xcodeproj` 在 Xcode 中打开。\n\n\
  ## 建模新实体与关系\n\n我们将向 MythBase 添加三个新实体：`MythicalBand`、`MythicalGig` 和 `MythicalVenue`。我们还将为其中几个实体定义关系。\n\
  \n完成后，我们的数据模型将如图 9-2 所示。\n\n![9781430245421_Fig09-02.jpg](img/9781430245421_Fig09-02.jpg)\n\
  \n图 9-2 . 新的数据模型\n\n## 模型版本控制与迁移\n\n在我们开始对数据模型进行更改之前，有一个重要问题需要解决：迁移。我们这里讨论的不是人们从一个国家迁移到另一个国家，也不是鸟儿南飞过冬；而是关于我们的数据。如果你曾经开发过数据库应用程序，你会熟悉将数据从一个部署版本“迁移”到下一个版本的概念。这通常需要编写某种脚本来更改数据库结构本身（添加、删除或修改表和列），并用适当的值填充新字段。使用\
  \ Core Data 时，你不需要真正编写脚本，但思路是相同的。在数据存储中，Core Data 保存了一些关于数据模型结构的元数据。当你的应用运行时，Core\
  \ Data 会尝试从数据存储中读取数据。如果它发现应用拥有结构不同的新版本数据模型，它会自动更新数据存储以匹配最新的数据模型。让我们看看这是如何工作的。\n\n\
  ### 准备多模型版本\n\n我们首先需要做的是将当前模型转换为一种特殊的多版本格式。这将允许我们在 Xcode 项目中以及在 MythBase 自身中存储多个版本的数据模型。在\
  \ Xcode 的导航面板中，打开 `Models` 组并选择 `MythBase.xcdatamodeld`。然后从菜单中选择 `Editor` ![image](img/arrow.jpg)\
  \ `Add Model Version`。会出现一个对话框，询问新版本的名称，默认名为 `MythBase 2`。这个默认名称没问题，所以点击“完成”。Xcode\
  \ 刚刚为我们创建了一个数据模型的副本，这样我们就可以在保留旧版本的同时扩展它。在导航面板中，`MythBase.xcdatamodeld` 的名称左侧出现了一个小的展开三角形。\n\
  \n点击三角形展开内容，注意它包含了我们模型文件的两个版本：`MythBase.xcdatamodel` 和 `MythBase 2.xcdatamodel`。`MythBase.xcdatamodel`\
  \ 是原始数据模型，它在导航面板中旁边有一个绿色的小复选框，表示这是 Xcode 当前使用的版本。文件名末尾带有“2”的是我们将在其中进行一些更改的新版本。首先，我们需要将\
  \ MythBase 2 设置为模型的当前版本。选择 `MythBase.xcdatamodeld` 文件（包含展开三角形的父行，而不是下面的两个数据模型之一）。在*文件检查器*中，有一个名为*版本化\
  \ Core Data 模型*的部分，如图 9-3 所示。将*当前版本*设置为 MythBase 2。当我们这样做时，绿色复选框将移动到导航面板中的 `MythBase\
  \ 2.xcdatamodel` 文件。下次我们构建 MythBase 时，这个包含模型多个版本的新复合模型将被复制到应用中，并且应用将尝试使用我们设置为当前版本的模型。\n\
  \n![9781430245421_Fig09-03.jpg](img/9781430245421_Fig09-03.jpg)\n\n图 9-3 . 文件检查器中的版本化\
  \ Core Data 模型控件\n\n### 添加新实体\n\n我们不仅希望能够记录某些神话人物曾经演奏过的乐队，还想记录他们演出的场馆，甚至具体演出的日期，因此我们将添加三个新实体：`MythicalBand`、`MythicalVenue`\
  \ 和 `MythicalGig`。概览请参见图 9-4。\n\n![9781430245421_Fig09-04.jpg](img/9781430245421_Fig09-04.jpg)\n\
  \n图 9-4 .\n\n\n\n下面是我们将定义的所有实体及其属性。确保已选中新的模型文件，然后创建一个新实体并将其命名为 `MythicalBand`。为该实体添加一个名为\
  \ `name` 的新属性，将其类型设置为 `String`，然后点击关闭*可选*复选框，并打开*已索引*复选框。现在创建另一个名为 `MythicalVenue`\
  \ 的新实体，同样为其添加一个名为 `name` 的 String 类型单一属性，该属性同样应设为*已索引*且非*可选*。最后，创建一个名为 `MythicalGig`\
  \ 的实体。与我们添加的其他实体不同，演出没有名称。`MythicalGig` 的唯一区别特征在于它与乐队和演出场地的关系（我们稍后会讲到）以及演出的日期。添加一个新属性，将其命名为\
  \ `performanceDate`，并将其类型更改为 `Date`。我们可以将 `performanceDate` 保留为*可选*（因为某些古老演出的确切日期可能已从记忆中消失），并且也无需为其开启索引。\n\
  \n## 添加关系\n\n现在是时候添加关系了，这样每个对象就可以关联到其他相关对象。我们将定义从 `MythicalBand` 到 `MythicalPerson`\
  \ 的一对多关系，从 `MythicalBand` 到 `MythicalGig` 的一对多关系，以及从 `MythicalVenue` 到 `MythicalGig`\
  \ 的另一个一对多关系。概览请参见图 9-5。\n\n![9781430245421_Fig09-05.jpg](img/9781430245421_Fig09-05.jpg)\n\
  \n图 9-5。添加关系后，模型将如下所示。\n\n在这一点上，我们应该稍微澄清一下我们的术语。在 Core Data 中，每个关系实际上都是单向的，并且它们不是用“一对多”、“一对一”、“多对多”等术语来定义的。相反，每个\
  \ Core Data 关系要么是**对一**，要么是**对多**。为了在 Core Data 中创建通常用法中（如果你接受任何形式的计算机程序员行话都是“正常”的这种说法）所谓的一对多关系，我们实际上必须创建两个关系：一个根植于第一个实体并终止于第二个实体的对多关系，以及一个根植于第二个实体并终止于第一个实体的对一关系。然后，我们在模型中指定这两个关系互为逆向关系，Core\
  \ Data 就会理解我们所配置的这种双向性质。如果需要，这种设置允许我们创建一个真正单向的关系，尽管在实践中是否真的可取值得怀疑。本书中的示例都使用双向关系。\n\
  \n那么，让我们创建这些关系，从 `MythicalBand` 到 `MythicalPerson` 的一对多关系开始。选中 `MythicalBand`，然后点击*关系*表视图左下角的小\
  \ `+` 按钮。这将创建一个新关系，其配置选项（参见图 9-6）看起来与我们创建属性时见到的略有不同。\n\n![9781430245421_Fig09-06.jpg](img/9781430245421_Fig09-06.jpg)\n\
  \n图 9-6。新关系的配置选项。\n\n这里有一个*名称*字段以及*可选*和*瞬态*复选框，但除此之外都完全不同。*目标*弹出菜单让我们可以选择关系的另一端指向何处，设置后，*逆向*弹出菜单让我们可以选择使用哪个其他关系（如果有的话）来创建双向关系。一个复选框允许我们指定这是一个对多关系，如果选中该复选框，则会启用两个字段，让我们可以方便地约束关系另一端可以关联的对象的最小和最大数量。最后，*删除规则*弹出菜单让我们决定如果关系的“源端”被删除，关系另一端的对象应发生什么情况。\n\
  \n最常见的选项是 `Nullify`（这意味着源端会从目标元素中的任何逆向关系中移除）、`Cascade`（这意味着目标对象也会被删除）和 `Deny`（这意味着如果存在此关系，源对象将完全拒绝被删除）。第四种选择\
  \ `No Action` 会保持逆向关系不变，将处理它的任务留给开发者（否则可能导致数据完整性问题）。我们不会使用这个选项。\n\n将我们刚刚创建的关系命名为\
  \ `members`，并将其目标实体设置为 `MythicalPerson`。点击打开*对多关系*复选框，并将*删除规则*保持为 `Nullify`（这是默认值）。太好了，我们刚刚创建了第一个单向关系！完成这个简单的步骤后，`MythicalBand`\
  \ 实体获得了一个新的 `members` 属性，并附带一整套新特性。每个乐队现在都可以提供一个 `MythicalPerson` 对象数组，并且该数组将根据我们配置的选项自动维护。在图表纸视图中，有一条从\
  \ `MythicalBand` 指向 `MythicalPerson` 的、带有双箭头的单向箭头。\n\n现在让我们创建这个关系的逆向关系。选中 `MythicalPerson`\
  \ 实体，并添加一个新关系。将其命名为 `memberOf`，目标实体设置为 `MythicalBand`，然后将其逆向关系设置为 `members`。其余默认值可以保持不变。现在，`MythicalPerson`\
  \ 和 `MythicalBand` 之间出现了一个双向箭头，在乐队一端是单箭头。\n\n接下来是 `MythicalBand` 和 `MythicalGig`\
  \ 之间的一对多关系。选中 `MythicalBand`，创建一个名为 `gigs` 的新关系，目标为 `MythicalGig`，并选中*对多关系*复选框。由于一场没有乐队的演出对我们毫无用处，因此将*删除规则*设置为\
  \ `Cascade`。这样，如果一个乐队被删除，其所有演出也会被删除。现在选中 `MythicalGig` 并创建一个名为 `band` 的新关系，目标为 `MythicalBand`，并选择\
  \ `gigs` 作为其逆向关系。这里，我们可以将*删除规则*保留为其默认值 `Nullify`。这仅仅意味着如果一场演出被删除，该演出在关联乐队的关系另一端的所有痕迹都会被清除，但乐队本身将保持不变。\n\
  \n最后，是 `MythicalVenue` 和 `MythicalGig` 之间的一对多关系。选中 `MythicalVenue`，创建一个名为 `gigs`\
  \ 的新关系，目标为 `MythicalGig`，并选中*对多关系*复选框。因为没有场地的演出和没有乐队的演出一样毫无意义，因此我们在此也将*删除规则*设置为\
  \ `Cascade`，这样删除一个场地也会删除其所有演出。现在选中 `MythicalGig` 并创建一个名为 `venue` 的新关系，目标为 `MythicalVenue`，并选择\
  \ `gigs` 作为其逆向关系。\n\n现在，我们已经为 MythBase 的新版本创建了所有需要的关系，我们的模型应该看起来类似于我们之前在图 9-4 中看到的。\n\
  \n## 创建简单迁移\n\n假设您之前已经完成了第 8 章的内容，并使用该版本的 MythBase 保存了一些数据，那么在此阶段运行新版本会遇到一些问题。启动时您会看到一些关于数据存储版本不匹配的错误消息，并且在原本应该显示您之前创建的\
  \ `MythicalPerson` 对象的地方，您只会得到一个空的表视图。如果您添加一些新对象并尝试保存，您只会遇到更多的错误！原因是当前版本的应用程序数据模型与之前用于保存数据的版本有相当大的差异；Core\
  \ Data 足够智能，可以检测到这一点，通知应用程序委托，并阻止您用新数据覆盖旧版本。\n\n\n\n不仅如此，它还足够智能，可以自动“升级”现有的数据存储，以与你新的模型版本配合使用。这被称为*迁移*。Core\
  \ Data 提供了两种迁移方式。第一种是*轻量级迁移*，由 Core Data 自动推断完成。Core Data 能够识别数据模型版本之间的许多常见变化（例如添加、删除或重命名属性、实体和关系），并能够自动计算出如何进行前向迁移。如果你使用\
  \ iCloud 存储数据，这是唯一可用的迁移方式。对于更复杂的数据模型演变，Core Data 可能无法推断出变化之间的映射关系，你就需要创建一个*映射模型*，或许还需要编写一些\
  \ Objective-C 代码来处理迁移。映射模型描述了旧模型中的实体和属性在新模型中的表示方式，但如果你做出了大幅度的更改，可能还需要编写代码。在本例中，我们将使用轻量级迁移策略，无需任何额外配置即可完成。\n\
  \n### 运行时机\n\n在迁移发生之前，我们需要对应用程序的源代码做一个小改动。在当前版本中，应用尝试从其数据存储中加载数据，如果存储数据的结构与数据模型最新版本描述的结构不匹配，就会出现问题，应用会向用户显示一个错误。要修复此问题并使应用程序升级数据存储，我们只需在加载数据存储的方法中传入一个配置选项即可。打开`MBAppDelegate.m`，找到`persistentStoreCoordinator`方法。在该方法的末尾附近，有一组代码行类似这样：\n\
  \n```\nif (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
  \    URL:url\n    options:nil\n    error:&error]){\n```\n\n接下来我们要创建一个选项字典，并将其传递到该方法调用中。这个字典包含两对键值，它们告诉存储协调器应尝试更新现有数据以匹配当前数据模型，并且应尝试自动推断映射关系。将上面显示的代码行替换为以下内容：\n\
  \n```\nNSDictionary *optionsDictionary = [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \  [NSNumber numberWithBool:YES], NSMigratePersistentStoresAutomaticallyOption,\n\
  \  [NSNumber numberWithBool:YES], NSInferMappingModelAutomaticallyOption, nil];\n\
  if (![coordinator addPersistentStoreWithType:NSXMLStoreType\n    configuration:nil\n\
  \    URL:url\n    options:optionsDictionary\n    error:&error]){\n```\n\n现在，有了这段代码，我们应该能够构建并运行我们的应用程序，它会正常运行！我们会看到之前用\
  \ MythBase 第 8 章版本存储的旧数据，现在已经转换为我们应用的最新数据模型。当然，我们不会看到模型中创建的任何新实体——事实上，如果一切按计划进行，我们根本不会看到与第\
  \ 8 章有任何不同的地方，但底层结构现在已经被修改，包含了新的实体和关系。\n\n那么，这是如何发生的呢？你可能还记得在第 8 章中，`MBAppDelegate`的`persistentStoreCoordinator`方法里有一个方法调用：\n\
  \n```\n[persistentStoreCoordinator addPersistentStoreWithType:NSXMLStoreType\n \
  \                           configuration:nil\n                            URL:url\n\
  \                            options:optionsDictionary\n                       \
  \     error:&error]\n```\n\n这可能不太明显，但正是这个方法调用触发了数据迁移。当上述代码被执行时，通常会发生的情况是数据存储被打开并准备使用。\n\
  \n然而，如果数据存储的结构与协调器的数据模型（即你在 Xcode 中指定的当前版本）的结构不匹配，就会触发一个完全不同的事件链。Core Data 首先会查找一个与磁盘上数据存储中编码的版本信息相匹配的模型。如果找到了，Core\
  \ Data 会查找应用包中是否存在一个映射模型，该模型可以将数据存储从旧结构转换为新结构。如果找不到，它会尝试通过推断映射关系来进行轻量级迁移。如果无法推断出映射关系，该过程将停止，方法会返回`nil`，并在`error`参数中返回一个错误。如果发生这种情况，下一行代码是`[[NSApplication\
  \ sharedApplication] presentError:error]`，这会导致应用程序显示一个错误，内容为“用于打开持久化存储的受管对象模型版本与创建该持久化存储时使用的版本不兼容。”但在我们的例子中，MythBase\
  \ 确实有两个可用的模型，并且映射关系可以推断，因此轻量级迁移会自动执行，旧数据文件会先被备份，以防出现严重问题。得益于这一自动过程，我们的用户无需担心导入或转换数据。当他们运行我们应用的新版本时，以前存储的数据会自动转换，并且除非数据存储非常庞大，否则转换速度很快。\n\
  \n### 更新用户界面\n\n现在，我们已经有了更新后的数据模型，接下来要创建用户界面。我们将保持现有窗口基本不变，并添加几个新窗口，一个专注于`MythicalBands`，另一个专注于`MythicalVenues`。\n\
  \n#### 创建乐队窗口\n\n首先，我们将创建一个新窗口来显示`MythicalBands`的列表。与第 8 章中展示的过程类似，我们将使用一些`NSTableView`、一个`NSArrayController`和\
  \ Cocoa 绑定来连接所有元素。我们首先将表格视图连接到乐队列表，确保它能正常工作，然后再考虑将一些`MythicalPersons`连接到乐队。\n\n\
  要开始，请在 Xcode 中打开`MainMenu.xib`。从*对象库*中拖出一个新的`NSWindow`。使用*属性检查器*将这个窗口命名为“Mythical\
  \ Bands”。从*对象库*中拖出一个`NSTableView`，将其放入窗口的左上角，让蓝色参考线指示放置位置。在*属性检查器*中，将其设置为基于视图的，并且只有一列，而不是两列。将其向右扩展，直到到达窗口右侧边缘附近的蓝色参考线，这样表格视图就几乎填满了窗口的宽度。将其向下移动一点，以便为搜索字段留出空间，这是接下来要添加的。\n\
  \n现在，将一个搜索字段拖到表格视图上方的空间，靠近窗口的右边缘。将其定位，使得字段的底部边缘和右侧边缘都有蓝色参考线。这样设置后，搜索字段会紧贴在窗口顶部，而表格视图则在其下方调整大小。\n\
  \n接下来，我们需要两个按钮，用于“移除”和“添加”。保持外观一致性很重要，因此使用与主窗口中相同的渐变按钮。将一个渐变按钮拖到表格视图下方的空间。将按钮的右边缘与表格视图的右边缘对齐。蓝色参考线会将其定位到表格视图下方适当距离，并与右边缘对齐。双击按钮中的文本，将标签更改为“Add”。在“Add”按钮左侧再拖出另一个按钮。\n\
  \n\n\n很多蓝色参考线会在垂直对齐“添加”按钮时亮起，然后它会自动吸附到左侧的正确距离上。双击按钮内的文本，将其重新标记为“Remove”。这让我们获得了足够用于处理乐队列表的用户界面，但我们还需要一个对象来将所有内容整合在一起，那就是一个`NSArrayController`。从*对象库*中拖出一个数组控制器（在搜索框中输入“array”以缩小列表范围），并将其拖放到“乐队\
  \ (Band)”窗口下方的图谱画布上。它会消失，并出现在界面构建器窗格左侧的对象停靠区中。缓慢双击新的数组控制器，将其重命名为“Mythical Bands”。选中“Mythical\
  \ Bands”对象，打开*属性检查器*。在*对象控制器*部分，将*模式*从“类 (Class)”更改为“实体名称 (Entity Name)”。在*实体名称*字段中输入字符串`MythicalBand`，并勾选*准备内容\
  \ (Prepares Content)*复选框。完成后，我们的 Xcode 窗口应看起来像图 9-7 所示。![9781430245421_Fig09-07.jpg](img/9781430245421_Fig09-07.jpg)\
  \ 图 9-7 M* M* M* Mythical Band 窗口的开端  \n\n### 设置 Cocoa 绑定\n\n现在我们已经布置好了对象，需要设置合适的\
  \ Cocoa 绑定，以便将 UI 控件与 Core Data 管理的乐队列表真正连接起来。我们从数组控制器开始，因为它已经被选中。切换到*绑定检查器*，展开*参数\
  \ (Parameters)*部分。勾选*绑定到 (Bind to)*复选框，然后从下拉菜单中选择 App Delegate。接着，在*模型键路径 (Model\
  \ Key Path)*字段中输入“`managedObjectContext`”。这将数组控制器连接到 App Delegate 中的 Core Data 机制。\n\
  \n现在来处理表格视图的绑定。由于这个表格视图只有一列，所以会比“Mythical Persons”窗口中的那个省事一些。首先选中表格视图本身。这最好在左侧对象停靠区的大纲视图中完成。选中后，转到*绑定检查器*（应该还开着），展开*表格内容\
  \ (Table Content)*标题下的*内容 (Content)*部分。勾选*绑定到*复选框，并确保下拉菜单显示`Mythical Bands`，且*控制器键\
  \ (Controller Key)*显示`arrangedObjects`。和之前一样，我们也希望表格视图中选中的行能传回给数组控制器。为此，展开*绑定检查器*的*选择索引\
  \ (Selection Indices)*部分。在此处勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*设置为`selectionIndexes`。这看起来很像前一章节中的图\
  \ 8-10。\n\n表格视图本身的绑定设置好之后，我们可以为列设置绑定。在对象停靠区中，展开表格视图的子视图，直到显示出一个标有“Static Text –\
  \ Table View Cell”的视图。在*绑定检查器*中，展开*值 (Value)*部分，勾选*绑定到*复选框，将下拉菜单设置为`Table Cell View`，并将*模型键路径*设置为`objectValue.name`。这应该看起来像图\
  \ 9-8 所示。然后，切换到*属性检查器*，将“行为 (Behavior)”弹出菜单从“无 (None)”更改为“可编辑 (Editable)”。如果不做此更改，我们将无法在表格视图中实际输入新乐队的名称。\n\
  \n![9781430245421_Fig09-08.jpg](img/9781430245421_Fig09-08.jpg) 图 9-8 M* M* M* 为\
  \ Mythical Bands 表格视图设置绑定  \n\n最后，我们来处理搜索框。选择屏幕右上角的搜索字段，打开*绑定检查器*。在*绑定检查器*的底部附近有一个名为“谓词\
  \ (Predicate)”的章节。展开它，勾选*绑定到*复选框，将其绑定到`Mythical Bands`。*控制器键*应为`filterPredicate`。将*显示名\
  \ (Display Name)*设置为“`Name`”，并将谓词格式设置为`name contains[c] $value`，其中`$value`表示搜索框的内容，`name`表示应被搜索的`MythicalBand`实体属性。这就像我们在第\
  \ 8 章中对搜索字段所做的绑定一样。\n\n对于按钮，我们将使用与上一章节相同的过程，结合 target-action 和 Cocoa 绑定。我们会用 target-action\
  \ 来处理按钮按下事件，用 Cocoa 绑定来根据需要启用或禁用按钮。先从操作开始。选中“添加 (Add)”按钮，按住 Control 键拖拽到`Mythical\
  \ Bands`数组控制器。从弹出菜单中选择`add:`操作。然后，选中“移除 (Remove)”按钮，按住 Control 键拖拽到同一位置。这次，选择`remove:`操作。为了根据表格视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。选中“添加”按钮，打开*绑定检查器*，展开*可用性\
  \ (Availability)*下的*已启用 (Enabled)*部分。勾选*绑定到*复选框，将下拉菜单设置为`Mythical Bands`，并将*控制器键*字段修改为`canAdd`。对于“移除”按钮，执行同样的操作，但在*控制器键*字段中使用`canRemove`。\n\
  \n现在保存更改，并运行应用程序。新窗口出现了，我们可以添加一些乐队，直接在表格视图中编辑它们的名称，并保存更改。\n\n### 为数组控制器指定有用的名称\n\
  \n我们建议您在 nib 文件中做一个更改，这在配置我们即将创建的新绑定时会很有帮助。它不会影响应用程序的行为，但您很可能会因为做了这个更改而感到高兴，并且后续的文本也假定您已进行此更新。\n\
  \nCore Data 基础设施与用户界面之间的连接都是通过一个`NSArrayController`来运行的。我们在上一章节中设置的`NSArrayController`被命名为`Mythical\
  \ Person Array Controller`。这个名字很长，超出了 Xcode 中绑定检查器（Binding Inspector）实际设计的显示长度。事实上，它勉强能挤进绑定检查器的弹出按钮中，并且这导致每个绑定属性的摘要信息溢出，部分文本被省略号代替。对于`Mythical\
  \ Bands`数组控制器，我们并没有在其名称中包含“Array Controller”，这使得它更容易操作。\n\n您可以通过更改控制器的名称来改善这种情况。更改名称不会修改您已配置的任何绑定，也不会对应用程序的用户产生任何影响。能看到这个变化的只有您自己，但请记住，您也很重要。就像以易于浏览和查找所需内容的方式格式化源代码很重要一样，尽您所能简化在\
  \ Interface Builder 中的编辑体验将为您节省时间和减少挫折。\n\n因此，如果您想进行此更改，请转到主 nib 窗口，确保您查看的是左侧的对象停靠区，找到您的`Mythical\
  \ Person Array Controller`。点击它的名称，将其改为`Mythical Person`。这样做可以删除一些没有实际价值的词语（例如“Array”和“Controller”），这些词语可能会广泛分布在您的\
  \ nib 文件和代码中，最终留下的显示内容希望能让您的大脑和眼睛更快速扫描和理解。\n\n### 将人员放入乐队\n\n现在，让我们通过向`MythicalPerson`显示界面添加一个简单的弹出按钮，实现将人员关联到乐队的功能，这将允许我们为选定的`MythicalPerson`选择一个`MythicalBand`。\n\
  \n\n\n弹窗按钮将通过 Cocoa 绑定连接，这意味着它不仅能像其他控件一样，始终自动更新以显示选中人物的正确值，还能自动更新以始终显示当前的乐队列表，并在用户在“神话乐队”窗口中做出更改时自动改变其内容。这需要通过为弹窗按钮配置几个绑定来实现，同时使用“神话人物”和“神话乐队”控制器。\n\
  \n首先，对原始窗口进行一项更改，使其与新窗口更加匹配。打开原始窗口（标题为`MythBase`的窗口），然后点击其标题栏选中窗口，并使用*属性检查器*将其重命名为“`Mythical\
  \ People`”。这样，两个窗口就具有了相同的外观。每个窗口都围绕一个特定实体居中设计，但都没有被区分成“主窗口”。\n\n现在，选中滑块下方的所有视图，并将它们整体向下拖动一点。在腾出的空间中，从*对象库*拖出一个标签（命名为“`Member\
  \ of Band:`”）和一个弹窗按钮。将它们排列整齐，使其大致看起来像图 9-9。\n\n![9781430245421_Fig09-09.jpg](img/9781430245421_Fig09-09.jpg)\n\
  \n图 9-9. 全新且改进的“神话人物”窗口\n\n现在剩下的工作就是为弹窗按钮配置一些绑定。与文本字段或滑块不同，弹窗按钮的显示需要多个绑定才能使其以有用的方式工作。考虑到一个弹窗按钮需要有一个要显示的字符串数组（这里将显示所有可用的乐队名称）、一个这些字符串所属的底层对象数组（乐队本身），以及一些指示列表中被选中项的内容（通过选中人物的`band`关系）。前两项将通过“神话乐队”控制器绑定，通过它我们可以轻松绑定到所有乐队或所有乐队名称的数组。第三项将通过“神话人物”控制器绑定。\n\
  \n首先，选中弹窗按钮并打开*绑定检查器*。展开列表顶部的*Content*绑定配置，在弹出列表中选择`Mythical Bands`，将*Controller\
  \ Key*设置为“`arrangedObjects`”，并勾选复选框。这告诉了弹窗按钮在哪里找到底层对象列表。\n\n接下来，展开*Content Values*绑定的配置。再次在弹出列表中选择`Mythical\
  \ Bands`，*Controller Key*设置为“`arrangedObjects`”，但这次将*Model Key Path*设置为“`name`”。这告诉弹窗按钮，它应通过获取同一个数组（`arrangedObjects`）并询问每个对象的`name`来填充其显示值。\n\
  \n最后，展开*Selected Object*绑定的配置。在这里，从弹出列表中选择`Mythical Persons`，*Controller Key*设置为“`selection`”，*Model\
  \ Key Path*设置为“`memberOf`”。弹窗列表将自动连接各项，以便当“神话人物”控制器的选择发生变化时，弹窗按钮会注意到新选中人物的乐队，在`Content`数组（从“神话乐队”控制器获取）中查找该乐队，并显示`Content\
  \ Values`数组（也来自“神话乐队”控制器）中对应的字符串。通过保存更改、在 Xcode 中点击运行并测试来验证其是否有效。对于每个选中的`MythicalPerson`，我们可以选择一个`MythicalBand`来关联他们（参见图\
  \ 9-10）。\n\n![9781430245421_Fig09-10.jpg](img/9781430245421_Fig09-10.jpg)\n\n图 9-10.\
  \ 将赫拉克勒斯设置为“希腊配方”乐队的成员\n\n**显示乐队成员**\n\n既然我们可以将人物添加到乐队，那么能否查看乐队中所有成员的列表呢？\n\n让我们将其添加到“神话乐队”窗口中。这很简单：我们将手动添加一个表格视图和一个数组控制器，并将它们连接起来。\n\
  \n首先，从*对象库*中拖出一个`NSArrayController`，并将其拖到主 nib 窗口中。就像处理其他数组控制器一样，我们希望给这个控制器起一个简短但有意义的名字。这个控制器将处理`MythicalPersons`的列表，但我们已经有名为“神话人物”的数组控制器了，而且我们想让它更容易看出这其中的上下文（它只会显示选中乐队的成员），所以我们在主\
  \ nib 窗口中将其命名为“`Band Members`”。\n\n然后，在选中新数组控制器的情况下，打开*属性检查器*，在*Object Controller*部分将*Mode*设置为“`Entity`”，*Entity\
  \ Name*设置为“`MythicalPerson`”。勾选*Prepares Content*复选框。这将确保当 nib 文件加载时，控制器的内容会被自动获取。\n\
  \n现在切换到*绑定检查器*，我们将在此配置两个绑定，使这个控制器能够根据选中的`MythicalBand`自动获取其内容。首先，在最底部，展开*Managed\
  \ Object Context*的配置。在弹出菜单中选择`App Delegate`，*Model Key Path*设置为“`managedObjectContext`”，这应会自动勾选*Bind\
  \ to*复选框。此配置与我们所有数组控制器的配置相同，允许它们连接到 Core Data 存储。接下来，在*Controller Content*部分，展开*Content\
  \ Set*绑定的配置，在弹出菜单中选择`Mythical Bands`，*Controller Key*设置为“`selection`”，*Model Key\
  \ Path*设置为“`members`”。这样做会使控制器的内容依赖于选中的乐队。\n\n现在，为成员列表腾出空间。调出“神话乐队”窗口，将其拉高一些，几乎增加一倍的高度，以便在当前内容下方放置另一个表格视图。然后，从*对象库*拖出一个表格视图，点击以选中表格视图本身（而不是包含它的滚动视图，拖动后默认选中的是滚动视图）。这里只显示乐队成员的名字，因此表格只需要一列。调出*属性检查器*，找到顶部的*Content\
  \ Mode*设置，将*Content Mode*更改为`view-based`。接下来，找到*Content Mode*下方的*Columns*设置，将其更改为\
  \ 1。然后，按照前几章的做法，通过将列标题设置为“`Member Name`”并使其填满表格宽度，来美化列标题。最后，加上一个“`Band Members`”标签，这样用户就能知道他们看到的是什么。图\
  \ 9-11 展示了您期望的布局。\n\n![9781430245421_Fig09-11.jpg](img/9781430245421_Fig09-11.jpg)\n\
  \n图 9-11. 向“神话乐队”窗口添加乐队成员\n\n剩下要做的就是为“乐队成员”表格配置绑定。我们将把表格绑定到`NSArrayController`，然后再把列绑定到表格。首先，选中表格本身。在*绑定检查器*中，展开*Table\
  \ Content*下的*Content*部分。然后，勾选*Bind to*复选框，并将下拉菜单设置为`Band Members`。默认的*Controller\
  \ Key*（`arrangedObjects`）就很好。接下来配置列。使用左侧的对象停靠区大纲视图，向下钻取到表格视图中的“`Static Text - Table\
  \ View Cell`”。在*绑定检查器*中，展开*Value*部分。下拉菜单应显示`Table Cell View`。勾选*Bind to*复选框，*Model\
  \ Key Path*设置为“`objectValue.name`”，*Controller Key*字段留空。图 9-11 中窗口右侧的*绑定检查器*显示了最终的配置。\n\
  \n\n```markdown\n\n图 11 显示了这在 Xcode 中的样子。好了，这个窗口的工作就完成了。现在该保存我们的工作，在 Xcode 中点击“运行”，然后查看新功能：为一个人指定乐队会将此人添加到该乐队的\
  \ `members` 数组中，当我们在“Mythical Band”窗口中选择该乐队时，就会看到这个效果。\n\n### 创建一个“Venue”窗口\n\n\
  现在，是时候再创建一个用于显示和编辑 `MythicalVenues` 的窗口了。制作这个窗口的过程与我们制作“Mythical Bands”窗口时非常相似：需要一个窗口、一个表视图、几个按钮以及一个\
  \ `NSArrayController`。由于真正的神话级场地并不多，我们省去了这个窗口上的搜索框。而且，由于我们已经做过一次，所以会加快速度。\n\n首先，从*对象库*中拖出一个窗口到\
  \ Interface Builder 画布上。在*属性检查器*中，将其标题设置为“Mythical Venues”。这个窗口比我们需要的要大一点，所以我们可以在垂直方向上将其缩小到大约三分之二的高度，并稍微收窄一些。拖出一个表视图，将其放置在屏幕的左上角，让蓝色参考线告诉我们放置的位置。将表视图展开以填满窗口，如图\
  \ 9-1 所示。在表视图的*属性检查器*中，将其*内容模式*更改为基于视图，并将其设置为一列。展开这一列以填满表视图的宽度。\n\n拖出一个渐变按钮到窗口上，将其放置在表视图的右下边缘下方。这将是我们的“添加”按钮，所以双击它并将标题改为“Add”。再拖出另一个按钮，将其放置在“添加”按钮的左侧，并将此按钮标题设置为“Remove”。和往常一样，蓝色参考线是我们正确定位的帮手。\n\
  \n接下来我们需要一个 `NSArrayController`。从*对象库*中抓取一个，并将其拖到 Interface Builder 画布上。在左侧的对象停靠区中，将其标题设置为“Mythical\
  \ Venues”。在*属性检查器*中，将其*模式*设置为“Entity Name”，将实体名称设置为“MythicalVenue”，并勾选*Prepares\
  \ Content*复选框，以便在加载 nib 文件时获取所有场地。我们还需要将“Mythical Venues”数组控制器连接到 App Delegate 提供的托管对象上下文。在*绑定检查器*中，展开底部的*参数*部分。勾选*Bind\
  \ to*复选框，将下拉菜单设置为“App Delegate”，并将*模型键路径*设置为“managedObjectContext”。\n\n现在我们需要将所有内容连接起来。让我们从表视图开始。选中表视图（记住它嵌入在一个滚动视图中）。在*绑定检查器*中，展开*表内容*下的*内容*部分。然后，勾选*Bind\
  \ to*复选框并将下拉菜单设置为“Mythical Venues”。默认的控制器键 `arrangedObjects` 就很好。现在处理列。正如我们之前对“Band\
  \ Members”表视图所做的那样，深入到表视图内部的“Static Text – Table View Cell”。在*绑定检查器*中，展开*值*部分。下拉菜单应该显示“Table\
  \ Cell View”。勾选*Bind to*复选框，将*模型键路径*设置为“objectValue.name”，同时将*控制器键*字段留空。在这里，我们切换到*属性检查器*，将*行为*设置从“None”更改为“Editable”，这样当我们创建新场地时，就可以在表视图内设置名称。\n\
  \n接下来，我们将处理按钮。选中“添加”按钮，按住 Control 键并拖拽到“Mythical Venues”数组控制器上。从弹出菜单中选择 `add:` 操作。然后，选中“移除”按钮，按住\
  \ Control 键并拖拽到同一个位置。这次，选择 `remove:` 操作。为了根据表视图中的选择来启用或禁用按钮，我们需要使用*绑定检查器*。\n\n选中“添加”按钮，打开*绑定检查器*，展开*可用性*下的*已启用*部分。勾选*Bind\
  \ to*复选框，将下拉菜单设置为“Mythical Venues”，并将*控制器键*字段改为“canAdd”。对于“移除”按钮，执行相同操作，但在*控制器键*字段中使用“canRemove”。\n\
  \n再次，保存我们的工作，在 Xcode 中点击“运行”，然后查看新功能：我们可以添加和删除新的神话级场地。\n\n### 向“Band”窗口添加“Gig”列表\n\
  \n我们需要添加的最后一项功能是能够创建 `MythicalGigs`。`MythicalGigs` 位于 `MythicalBands` 和 `MythicalVenues`\
  \ 之间，每个乐队和场地都可能有多场演出。同时，每场演出恰好与一个乐队和一个场地相关联。我们将添加另一个表视图来包含所需功能，将其放置在“Mythical Band”窗口中的成员表视图旁边。表视图的每一行将包含用于显示演出的\
  \ `performanceDate` 和 `venue` 的字段。我们还将在此表视图下方设置一个详细信息区域，以便编辑这些字段（参见图 9-12）。\n\n\
  ![9781430245421_Fig09-12.jpg](img/9781430245421_Fig09-12.jpg)\n\n图 9-12 . 这是最终的“Mythical\
  \ Bands”窗口的样子\n\n首先，在*对象库*中找到一个 `NSArrayController`。将其拖到主 nib 窗口，并命名为“Gigs”。打开*属性检查器*，将*模式*设置为“Entity”，并在*实体名称*中输入“MythicalGig”，然后点击以打开*Prepares\
  \ Content*复选框。现在切换到*绑定检查器*。将新数组控制器的*托管对象上下文*绑定到 App Delegate 的 `managedObjectContext`，并将其*内容集合*通过“Mythical\
  \ Bands”进行绑定，将*控制器键*设置为“selection”，将*模型键路径*设置为“gigs”。\n\n接下来，我们将设置 GUI 本身。从*对象库*中拖出另一个表视图到“Mythical\
  \ Bands”窗口，并拖出一个“Gigs”标签，按照图 9-12 所示进行布局。这个表视图将显示一列日期和一列场地名称。默认的表视图单元格对此就完全适用。首先，在*属性检查器*中将表视图的*模式*设置为基于视图。然后，切换到*绑定检查器*，展开*表内容*下的*内容*区域。将其绑定到“Gigs”，将*控制器键*保留为“arrangedObjects”，并将*模型键路径*留空。我们还需要绑定*选择索引*。也将其绑定到“Gigs”，将*控制器键*设置为“selectionIndices”，并将*模型键路径*留空。\n\
  \n表格列的标题应该有名称——左列为“Date”，右列为“Venue”——现在就去设置它们。然后，在对象停靠区中展开对象层级，深入到“Date”列的“Static\
  \ Text – Table View Cell”对象。在*绑定检查器*中，将其绑定到“Table Cell View”，并将*模型键路径*设置为“objectValue.performanceDate”。然后，展开“Venue”列下方的对象层级，深入到该列的“Static\
  \ Text – Table View Cell”。在*绑定检查器*中，将其绑定到`objectValue.venue.name`。这就涵盖了表视图所需做的所有工作！\n\
  \n我们还需要添加和移除按钮，以便用户创建和删除演出。选择并复制窗口上部的两个按钮，将新按钮拖到演出表视图的下方。按住 Control 键从“添加”按钮拖拽到“Gigs”控制器并选择\
  \ `add:` 操作，然后按住 Control 键从“移除”按钮拖拽到“Gigs”控制器并选择 `remove:` 操作。作为最后的润色，我们可以通过使用一些简单的绑定，让这些按钮根据表视图的内容和选择变化自动启用或禁用。\n\
  \n```\n\n\n\n选择“Add”按钮，打开`Bindings Inspector`，并将其`Enabled`属性绑定到 Gigs 控制器的`canAdd`控制器键。然后选择“Remove”按钮，并将其绑定到\
  \ Gigs 控制器的`canRemove`控制器键。\n\n现在，我们需要设置其下方的详细信息区域。从日期显示开始。从`Object Library`中拖出一个日期选择器，并将其放置到左侧表格视图的下方。在`Attributes\
  \ Inspector`中，将日期选择器设置为带步进器的文本模式 (Textual with Stepper) 而非图形模式 (Graphical)，将`Elements`设置为月份、日期和年份，并勾选纪元\
  \ (Era) 旁边的复选框（因为很可能有些演出在公元前）。在`Bindings Inspector`中，展开`Value`部分。从下拉菜单中选择“Gigs”，并勾选`Bind\
  \ to`复选框。默认的`Controller Key`（即“selection”）正是我们需要的。在`Model Key Path`字段中输入“performanceDate”。\n\
  \n接下来是场馆 (Venues) 菜单。从`Object Library`中拖出一个弹出按钮 (Popup Button)，并将其放置在日期选择器旁边，即表格视图右侧的下方。这个按钮的绑定稍微复杂一些。我们需要为这个弹出按钮配置三个绑定。首先，将`Content`绑定到\
  \ Mythical Venues 控制器的`arrangedObjects`。接下来，将`ContentValues`绑定到 Mythical Venues\
  \ 控制器的`arrangedObjects`，这次需要在`Model Key Path`中指定“name”。最后但同样重要的是，将`Selected Object`绑定到\
  \ Gigs 控制器，使用“venue”作为`Model Key Path`，并将`Controller Key`保留为“selection”。\n\n最后，让我们将这两个字段放入一个盒子中，以便在视觉上对它们进行分组。这不会对它们的行为产生任何影响，纯粹是为了外观。为此，同时选中日期选择器和弹出按钮。从`Editor`菜单中，选择`Embed\
  \ In` ![image](img/arrow.jpg) `Box`，将这两个字段分组在一起。将盒子的标题设置为“Gig Details”。调整盒子的大小使其与\
  \ Gigs 表格视图的宽度相同。完成此操作后，我们可能需要调整盒子内控件的大小以充分利用空间。我们将根据需要整理尺寸，然后就大功告成了！\n\n现在保存这项工作，在\
  \ Xcode 中点击运行，然后拭目以待！假设所有配置都正确，我们现在应该能够将演出添加到每个乐队的信息中。\n\n## 总结 (Wrap Up)\n\n在本章中，我们扩展了旧的数据模型，将其从一个单独的实体发展为一组通过关系相互关联的完整实体。我们还看到了如何将这些关系中的每一个在\
  \ GUI 中表达出来（例如，使用弹出列表来选择对一关系的远端，并使用表格视图来展示对多关系的所有内容），并通过 Cocoa 绑定进行配置和管理。\n\n关于这种可视化编程的方式，我们并非老生常谈，但值得重复的是，本章中的所有操作都是在没有编写一行代码的情况下完成的。请注意，我们使用的术语“可视化编程”与微软在其开发工具中所使用的“Visual”一词无关。可视化编程背后的理念是允许程序或其部分使用图形化组件来构建，这些组件不需要传统用于编写软件的文本式、过程式编程。Cocoa\
  \ 在一定程度上支持可视化编程，允许您仅使用 Xcode 数据建模器和 Interface Builder 来构建应用程序原型甚至整个应用程序。然而，它并非旨在构成一个完整的可视化编程系统，因此，对于您构建的每个\
  \ Cocoa 应用程序，您将不可避免地需要沉下心来编写一些代码！\n\n此外，这些使用模式同样可以很好地应用于您自己的应用程序。仅仅是建模您的问题域、定义实体和关系，往往就能开始让您了解如何构建\
  \ GUI。\n\n随着您在应用程序开发过程中取得进展，您肯定会找到更多使用 Cocoa 绑定将不同类型的控件连接到数据的方法，并且有时您也会发现需要通过编写代码来连接事物和在对象之间传输数据。\n\
  \n在您学习本书剩余部分的过程中，您将看到更多将 Core Data 和 Cocoa 绑定作为其架构核心部分的应用程序示例，因此您将看到更多使用这些技术的方法。下一章是专门讨论\
  \ Core Data 的最后一章，将向您展示如何限制在 GUI 中显示内容的范围，这对于处理大量数据的任何应用程序来说都是绝对必要的。\n\n# 第 10 章\
  \ 使用条件进行搜索和检索 Core Data\n\n第 8 章和第 9 章中的 MythBase 示例演示了 Core Data 的基本工作原理，让我们能够轻松地从后端存储中创建、检索、更新和删除对象。到目前为止，我们在\
  \ MythBase 中主要处理完整的数据集。对于使用的大部分实体（`MythicalPerson`、`MythicalBand`和`MythicalVenue`），每个实体的所有对象都在应用程序启动期间加载，并在应用程序的整个生命周期内保持在内存中。对于像\
  \ MythBase 这样维护小型数据库的应用程序来说，这没问题，但如果我们的某个主要实体在后端存储中包含成千上万个实例呢？我们的应用程序会在启动时加载所有数据，这很可能导致应用程序耗尽所有可用内存、转而使用磁盘交换等问题。除了这个问题，我们还可能最终导致糟糕的用户体验，因为一个显示\
  \ 20 个对象时易于导航的 GUI，在有数千个条目时可能会变得难以有效使用。\n\n这个问题的解决方案涉及一个重要的功能：一种提供搜索条件的方法，以便我们能够限制控制器从存储中读取的对象。本章将介绍使用`NSPredicate`来将搜索限制为给定`Entity`所有对象的一个子集。我们将在\
  \ Interface Builder 和源代码中指定一个硬编码的`NSPredicate`，并让用户使用`NSPredicateEditor`为条件定义值。\n\
  \n### 创建 QuoteMonger\n\n我们将通过创建一个名为 QuoteMonger 的应用程序来演示`NSPredicate`的使用，该应用程序允许我们跟踪所有最喜欢的节目及其中的著名台词。它将是一个包含两个实体的\
  \ Core Data 应用程序，外加一个支持数据输入和灵活查询的 GUI。图 10-1 显示了完成后的应用程序视图。\n\n![9781430245421_Fig10-01.jpg](img/9781430245421_Fig10-01.jpg)\n\
  \n图 10-1. QuoteMonger 的数据输入和搜索窗口\n\n**注意** 到现在为止，您已经掌握了创建 Xcode 项目和文件的基础知识，因此对于某些您已经做过多次的操作，我们不会再给出逐一点击的详细说明，而是将最详细的描述保留给每章涵盖的新主题。\n\
  \n### 创建项目及其数据模型\n\n首先在 Xcode 中创建一个新的 Core Data 项目，并将其命名为`QuoteMonger`。然后编辑`QuoteMonger.xcdatamodel`文件，并添加两个实体，分别命名为`Show`和`Quote`。我们在前两章中已经介绍过这个步骤，所以如果遇到困难，请翻阅回前几页进行回顾。\n\
  \n为`Show`添加一个名为`name`的属性，类型为`String`。关闭`Optional`复选框，并打开`Indexed`复选框。然后为`Quote`添加两个`String`类型的属性，分别命名为`quoteText`和`character`。\n\
  \n\n\n```markdown\n\n对于其中的每一项，打开 `Indexed` 复选框，但仅对 `quoteText` 取消勾选 `Optional` 复选框，对\
  \ `character` 则保持勾选（因为有可能你无法完全记住或确定某句话是谁说的，但仍想将其作为引文存储）。最后，在 `Show` 和 `Quote` 之间建立一对多关系（记住，这意味着要创建两个关系——从\
  \ `Show` 到 `Quote` 的名为 `quotes` 的对多关系，以及从 `Quote` 到 `Show` 的名为 `show` 的对一关系——并将它们配置为互为逆关系）。生成的数据模型应类似于图\
  \ 10-2。\n\n![9781430245421_Fig10-02.jpg](img/9781430245421_Fig10-02.jpg)\n\n图 10-2.\
  \ QuoteMonger 的数据模型\n\n## 数据录入窗口\n\n数据模型就位后，就该开始构建 GUI 了。其中有趣的部分（也是本章的主要内容）是搜索窗口。但在有数据可搜索之前，我们无法进行任何搜索，因此我们将从创建\
  \ GUI 中允许我们进行数据录入的部分开始。我们将为此构建一个非常基本的 GUI——在单个窗口中显示节目和引文，并且只显示与当前选中节目相关联的引文。\n\n\
  ### 两部分的窗口\n\n在 Xcode 项目中双击 `MainMenu.xib`，在 Interface Builder 窗格中打开它。这会调出我们之前使用过的标准空应用程序\
  \ nib。在主 nib 窗口中选择 `NSWindow` 实例，然后使用调整大小控件使其更高（大约为初始高度的两倍）。我们需要这个空间，因为我们要在这里放置两组视图，一组用于\
  \ `Show` 实体，另一组用于 `Quote` 实体。\n\n#### 显示节目\n\n我们将从 `Show` 的视图开始。从*对象库*中拖出一个 `NSTableView`，并将其放置在窗口顶部附近。调整其大小以占据大部分空间。这次不要担心蓝色辅助线；实际上，使其比辅助线建议的尺寸略小一些。我们将把它与一些其他控件一起分组到一个盒子中，因此尺寸调整目前还不关键。打开*属性检查器*，将表格视图设置为基于视图，并带有一列。调整列本身的大小以占据表格视图的宽度，并将列的名称设置为“Name”。拖出一个按钮，将其放置在表格视图的右下角下方，并将其标签设置为“Add”。再拖出一个相同类型的按钮，将其放置在\
  \ Add 按钮的左侧，并将该按钮标签设置为“Remove”。选择所有这三个控件，并将它们分组到一个盒子中（选择 **Editor** ![image](img/arrow.jpg)\
  \ **Embed In** ![image](img/arrow.jpg) **Box**）。将盒子的标题设置为“Show”。现在我们可以相对于窗口调整盒子的大小，然后调整盒子内部的表格视图，以获得一个令人满意的布局。\n\
  \n既然我们有了一个列出节目的位置，我们需要将它们连接到核心数据模型，我们将使用 Cocoa 绑定和一个 `NSArrayController` 作为粘合剂。从*对象库*中拖出一个数组控制器，并将其命名为“Shows”。在*属性检查器*中，将*模式*下拉菜单设置为“Entity\
  \ Name”，然后在*实体名称*字段中输入“Show”，以将其连接到模型编辑器中的 `Show` 实体。勾选*准备内容*复选框，这将指示数组控制器在启动时加载所有\
  \ `Show`。切换到*绑定检查器*。将*托管对象上下文*（位于绑定列表底部）绑定到 App Delegate，并将*模型键路径*设置为 `managedObjectContext`。\n\
  \n对于绑定，我们从表格视图开始。选择表格视图，然后打开*绑定检查器*。展开*表内容*下的*内容*部分，并勾选*绑定到*旁边的复选框。下拉菜单应显示“Shows”。默认的*控制器键*\
  \ `arrangedObjects` 就是我们想要的，*模型键路径*中无需输入内容。\n\n我们还希望数组控制器知道选中的行，因此将*选择索引*绑定绑定到 Shows，并将此处的*控制器键*设置为\
  \ `selectionIndexes`。然后，在表格视图内的视图层次结构中，使用对象停靠区向下深入到“静态文本 - 表格视图单元格”。在*属性检查器*中，将*行为*更改为可编辑。然后，在*绑定检查器*中，将“值”绑定到表格单元格视图，并将其*模型键路径*设置为\
  \ `objectValue.name`。\n\n这样就完成了表格视图的设置。为了完成窗口中处理 `Show` 的部分，我们需要连接按钮。这就像上一章一样完成——结合使用目标-动作来处理点击，以及使用\
  \ Cocoa 绑定来适当地启用或禁用按钮。我们先做目标-动作部分。按住 Control 键从 Add 按钮拖动到 Shows 数组控制器，并选择 `add:`\
  \ 作为接收的动作。对 Remove 按钮执行相同操作，这次选择 `remove:` 作为接收的动作。再次选择 Add 按钮，然后转到*绑定检查器*。勾选*绑定到*复选框，将按钮连接到\
  \ Shows 控制器，并输入 `canAdd` 作为*控制器键*。对 Remove 按钮重复此操作，将其绑定到 `canRemove` *控制器键*。\n\n\
  窗口应类似于图 10-3。请注意实用区域中的 Outlets Inspector 视图，它显示了数组控制器的绑定和目标-动作连接。当事情没有按预期工作时，此视图对于故障排除非常有用！\n\
  \n![9781430245421_Fig10-03.jpg](img/9781430245421_Fig10-03.jpg)\n\n图 10-3. 数据录入窗口的部分布局\n\
  \n#### 录入引文\n\n现在我们将在 Show 框的下方重复大部分相同设置，用于引文。和之前一样，拖出一个表格视图和两个按钮，将它们放置在窗口的下半部分，并按之前的方式给按钮设置标签。然而，对于这个表格视图，我们将保留两列。像之前一样将其更改为基于视图，并勾选标签为“交替行颜色”的复选框，这将使内容更易于阅读。将左列标题设置为“Quote\
  \ Text”，右列标题设置为“Character”，并调整大小以为 Quote Text 列提供更多空间。在 Quote Text 列中，双击列内的“Table\
  \ View Cell”文本，并将其更改为“Quote”。对 Character 列中的“Table View Cell”文本执行相同操作，将其更改为“Character”。这将在稍后帮助我们区分这两列。像之前一样将这些三个控件分组到一个盒子中，并将盒子标题设置为“Quote”。\n\
  \n窗口的这一部分也将使用一个 `NSArrayController`，但其配置将与 Shows 数组控制器略有不同。拖出一个控制器，并将其命名为“Quotes”。在*属性检查器*中，将其*模式*设置为\
  \ Entity Name，然后将*实体名称*字段设置为 Quote（与我们在模型编辑器中定义的实体名称相同）。然后，切换到*绑定检查器*。默认情况下，每个数组控制器将获取对应实体的所有对象。我们将更改此设置，使其仅根据选中的\
  \ Show 获取引文。打开*内容集*绑定，在下拉列表中选择“Shows”，在*控制器键*组合框中选择“selection”，并在*模型键路径*组合框中输入“quotes”。最后，按回车键以启用绑定。我们还需要将其连接到由\
  \ App Delegate 提供的托管对象上下文。将*托管对象上下文*（位于绑定列表底部）绑定到 App Delegate，并将*模型键路径*设置为 `managedObjectContext`。\n\
  \n现在我们可以将这个表格视图绑定到 Quotes 控制器。选择表格视图，然后打开*绑定检查器*。展开*表内容*下的*内容*部分，并勾选*绑定到*旁边的复选框。下拉菜单应显示“Quotes”。\n\
  \n```\n\n\n”默认的“arrangedObjects”的`Controller Key`正是我们需要的。和之前一样，需要让数组控制器知道选中的行，因此将`Selection\
  \ Indexes`绑定到`Quotes`，并将此处的`Controller Key`设置为“selectionIndexes”。要绑定这两个列，需在表视图内使用对象停靠区深入到视图层次结构中，直到“Static\
  \ Text – Quote”条目。在*Attributes Inspector*中，将*Behavior*改为`Editable`。然后，在*Bindings\
  \ Inspector*中，将*Value*绑定到`Table Cell View`，并将其*Model Key Path*设置为“objectValue.quoteText”。切换到对象停靠区中的“Static\
  \ Text – Character”条目，将其*Mode*改为`Editable`，然后将其绑定到`Table Cell View`，并将其*Model Key\
  \ Path*设置为“objectValue.character”。\n\n最后，我们需要连接按钮。从每个按钮按住`Control`拖拽到`Quotes`控制器，根据情况将动作设置为`add:`或`remove:`。根据情况，将每个按钮的`enabled`绑定到`Quotes`控制器上的`canAdd`或`canRemove`的`Controller\
  \ Key`。\n\n布局应类似于图 10-4。\n\n![9781430245421_Fig10-04.jpg](img/9781430245421_Fig10-04.jpg)\n\
  \n图 10-4. 数据录入窗口的完成布局\n\n## 输入一些初始引用\n\n保存更改并点击运行。应用程序应启动并显示数据录入窗口。选择上方表格视图下方的“Add”按钮添加一个剧集，然后双击表格视图中高亮区域编辑剧集名称。重复此操作几次，创建几个`Show`实例。现在，选中一个剧集后，在下方表格中添加一条引用，直接在表格中编辑文本和任何角色的名称。如果您添加的引用包含两个或多个角色之间的对话，请在“Character”字段中输入所有相关角色的名称。稍后我们启用基于角色名称的搜索时，它将与您输入的所有名称一起工作。再添加几条引用，分布在几个不同的剧集中。请注意，当您选择不同的剧集时，引用列表会发生变化；如果您退出并重新启动`QuoteMonger`，您应该看到您输入的所有内容都已保存。\n\
  \n另一方面，如果似乎没有任何效果，请检查 Xcode 中的调试日志，查看应用程序是否引发了异常。常见的问题包括：忽略了为数组控制器上的托管对象上下文设置绑定，或者输错了`Controller\
  \ Key`或`Model Key Path`绑定的名称。\n\n## 创建引用查找器窗口\n\n现在是时候为搜索窗口打下基础了。回到 Xcode 的 Interface\
  \ Builder 面板中，从*Object Library*拖出一个新窗口，并将其放到画布上。Xcode 提供了多种窗口类型，但我们只需要一个普通的平面窗口。（您可能还想关闭`QuoteMonger`窗口以将其移开，方法是点击\
  \ Interface Builder 画布上窗口左上角的小`x`。）\n\n选择新窗口，转到*Attributes Inspector*。将新窗口标题设为“Quote\
  \ Finder”。此窗口上将有两个可见控件：一个表格视图和一个文本视图。表格视图将显示匹配引用的列表，文本视图将显示所选引用的内容。稍后，我们还将使用一个名为“谓词编辑器”的新工具来定义搜索条件。谓词编辑器用于在`Mail.app`中定义过滤规则以及在\
  \ iTunes 中创建智能播放列表。它是一个通用的 Cocoa 组件，我们也可以使用它。不过，我们现在还不会用到它。\n\n让我们开始吧！从*Object Library*拖出一个表格视图，并将其定位在窗口顶部附近。在*Attributes\
  \ Inspector*中，将其设置为基于视图，并赋予它三个列。分别将这三个列标题设为“Quote Text”、“Character”和“Show”。\n\n\
  此外，编辑每个字段中的文本以反映列的名称。我们还可以为此表格视图勾选*Alternating Rows*复选框，以防搜索返回大量匹配项。此表格视图不会放入框中，因此我们可以调整其大小以填满窗口宽度，让蓝色参考线告诉我们何时停止。\n\
  \n现在，从*Object Library*拖出一个文本视图（在库区域底部的搜索字段中输入“text view”），并将其放置在表格视图下方。将其展开至与表格视图相同的宽度。在*Attributes\
  \ Inspector*中，关闭*Editable*和*Rich Text*复选框。对于“Find”，将弹出菜单设置为*Uses Bar*，并勾选*Incremental\
  \ Searching*复选框。这将使大文本视图能够使用 Mac OS/X 10.7 中引入的嵌入式搜索栏。窗口应类似于图 10-5。\n\n![9781430245421_Fig10-05.jpg](img/9781430245421_Fig10-05.jpg)\n\
  \n图 10-5. 查询查找器窗口的第一版\n\n接下来，拖出一个数组控制器并将其命名为“FoundQuotes”。在*Attributes Inspector*中，将其*Mode*设置为`Entity\
  \ Name`，并将“Quote”作为要使用的*Entity Name*。同时勾选*Prepares Content*复选框。在这些设置上方，在*Attributes\
  \ Inspector*的数组控制器块中，勾选*Auto Rearrange Content*复选框。这将使得每当用户在`Quotes`控制器中进行更改时，它都能正确地重新加载和重新过滤其内容。在*Bindings\
  \ Inspector*中，将其*Managed Object Context*绑定到`App Delegate`，并将*Model Key Path*设置为“managedObjectContext”。\n\
  \n现在，我们需要为用户界面控件——表格视图和文本视图——设置绑定。像往常一样，我们从表格视图开始。将表格视图的*Content*和*Selection Indexes*绑定到`FoundQuotes`控制器。将*Content*绑定到`arrangedObjects`的*Controller\
  \ Key*，并将*Selection Indexes*绑定到`selectionIndexes`的*Controller Key*。然后，深入到表格视图内部的“Static\
  \ Text - Quote Text”字段。将其*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.quoteText”作为*Model\
  \ Key Path*。将“Static Text – Character”字段的*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.character”作为*Model\
  \ Key Path*。最后，选择表格视图内的“Static Text – Show”字段，将其*Value*绑定配置为绑定到`Table Cell View`，并使用“objectValue.show.name”作为*Model\
  \ Key Path*。\n\n对于文本视图，情况稍微简单一些。选择文本视图，将其*Value*绑定到`FoundQuotes`。使用“selection”作为*Controller\
  \ Key*，使用“quoteText”作为*Model Key Path*。\n\n现在点击运行，注意两个窗口。新的查询查找器窗口仅显示我们在数据录入窗口中输入的所有引用。本章剩余部分将介绍如何使用`NSPredicate`来改变这一点，以便只有用户搜索的引用才会显示在这个窗口中。\n\
  \n## 使用`NSPredicate`限制结果\n\n如前所述，我们可以通过使用`NSPredicate`来限制`NSArrayController`为显示准备哪些记录。我们可以直接在\
  \ Interface Builder 中为数组控制器分配一个谓词；在初始化或条件发生变化需要重新获取时，通过应用程序代码进行分配；或者通过 Cocoa 绑定来实现，这意味着对谓词的更改可以自动传播到控制器。我们将在本章中探讨所有这些选项。\n\
  \n### 创建谓词\n\n创建`NSPredicate`最简单的方法是使用一个包含属性名称、比较符和要比较的值的格式字符串。谓词的定义看起来很像 SQL 中的`WHERE`子句，并且服务于大致相同的目的。谓词不仅限于\
  \ Core Data 的使用，还可以应用于 Mac OS X 的其他领域，例如 Spotlight。\n\n\n\n```objectivec\n在最基本的形式中，我们可以这样定义一个\
  \ `NSPredicate`：\n```\nNSPredicate *p = [NSPredicate predicateWithFormat:\n    @\"\
  (quoteText CONTAINS[cd] 'missed') OR \"\n     \"(character CONTAINS[cd] 'kramer')\
  \ OR \"\n     \"(show.name CONTAINS[cd] 'trek')\"];\n```\n\n**注意：** 在 C 语言中，如果代码中有多个内联字符串常量且它们之间仅由空格（包括回车符）分隔，这些常量会被拼接成一个字符数组，这有助于在代码中格式化长字符串。这一技巧同样适用于内联的\
  \ `NSString` 常量——只需在第一个字符串前加上一个 `@` 符号即可，如前所示。\n\n在这个示例中，我们实际上是通过 `OR` 连接了三个条件，并用括号将它们包裹起来，就像在应用程序代码中那样。每个条件都使用了\
  \ `CONTAINS` 比较器（其功能正如你所想），并带有所述的 `[cd]` 选项。其中 `c` 使比较不区分大小写，而 `d` 使比较不区分变音符号。例如，指定了这两个选项的相等比较会将\
  \ “ramon” 和 “Ramón” 视为相等。\n\n`CONTAINS` 只是谓词中可用的几个比较器之一。所有属性都可以使用 `=`、`<`、`>`、`>=`、`<=`、`!=`\
  \ 和 `BETWEEN` 比较器。（注意，`==`、`=>`、`=<` 和 `<>` 分别等同于 `=`、`>=`、`<=` 和 `!=`。）字符串属性可以使用\
  \ `BEGINSWITH`、`CONTAINS`、`ENDSWITH`、`LIKE` 和 `MATCHES` 比较器。\n\n**注意：** 这些比较器大多不言自明，但有几点需要特别说明：`BETWEEN`\
  \ 允许我们指定一对上下限，因此其右侧的值应通过一个包含两个元素的 `NSArray` 来替换；`LIKE` 允许我们进行通配符匹配；`MATCHES` 允许我们使用正则表达式进行高级比较。然而，`MATCHES`\
  \ 不能与 SQLite 后端一起使用，因此在从 Core Data 存储中获取数据时作用不大。\n\n如果我们在应用程序中确实需要针对某些特殊目的进行固定查询，硬编码选项是可以的，但有时我们需要根据用户输入或其他当前数据创建查询。幸运的是，`NSPredicate`\
  \ 类提供了一种简单的方法，使用我们刚才看到的同一个 `predicateWithFormat:` 方法来插入值。例如，\n\n```\n// 假设这些变量已存在，并指向有效对象\n\
  NSString *quoteInput;\nNSString *characterInput;\nNSString *showNameInput;\nNSPredicate\
  \ *p = [NSPredicate predicateWithFormat:\n    @\"(quoteText CONTAINS[cd] %@) OR\
  \ \"\n     \"(character CONTAINS[cd] %@) OR \"\n     \"(show.name CONTAINS[cd] %@)\"\
  ,\n    quoteInput, characterInput, showNameInput];\n```\n\n当这段代码运行时，三个变量的值将被放入最终的谓词中。请注意，格式字符串中的\
  \ `%@` 占位符没有用单引号括起来，而之前的示例中直接的值是用了单引号的。\n\n**在 Xcode 中为 `NSAppController` 指定谓词**\n\
  \n让我们尝试一种最基本的使用谓词的方法：在 Xcode 中将其直接附加到一个控制器。回到 Xcode 中的 `MainMenu.xib` 文件，在主要 Nib\
  \ 窗口中选择 FoundQuotes 控制器，并打开*属性检查器*。底部有一个标记为“获取谓词”的文本视图，我们可以在其中添加一些文本来定义谓词。尝试输入以下内容：\n\
  \n```\nshow.name CONTAINS[cd] 'trek'\n```\n\n然后保存更改，切换回 Xcode，并点击运行。现在搜索窗口不一定显示您输入的所有引用。如果您输入了一些《星际迷航》的引用，它将只显示那些引用；但如果您没有输入任何《星际迷航》的引用，那么现在搜索窗口中什么都不会显示。当然，您可能只输入了《星际迷航》的引用，这种情况下，这个视图看起来和之前一样。\n\
  \n如果是这种情况，请从另一个节目输入一些引用来验证谓词是否正在过滤它们（同时，也确实，电视节目不止《星际迷航》）。\n\n**用户定义的谓词**\n\n在 Nib\
  \ 中定义的谓词适用于特殊用途，例如 GUI 的某个部分应始终显示数据的特定子集，但我们追求的是让用户自己定义搜索参数的能力。理想情况下，他们应该能够选择多个搜索参数，编辑要比较的值，甚至更改比较器本身（而不是一直只使用\
  \ `CONTAINS`）。幸运的是，Cocoa 提供了一个名为 `NSPredicateEditor` 的 GUI 控件，正好能实现这一点！\n\n正如我们之前暗示的，通过\
  \ `NSPredicateEditor`，我们可以制作一个类似于 iTunes 中的智能播放列表或 Mail 中的智能邮箱功能的 GUI。用户可以添加和删除搜索条件，结果将实时更新。参见图\
  \ 10-6。\n\n![9781430245421_Fig10-06.jpg](img/9781430245421_Fig10-06.jpg)\n\n图 10-6.\
  \ QuoteMonger 的谓词编辑器运行中\n\n`NSPredicateEditor` 和 `NSArrayController` 都可以通过绑定来设置和检索其\
  \ `NSPredicate` 的值，因此我们要做的是将一个 `NSPredicate` 作为应用代理的一个属性，并进行适当的绑定。这样，当用户在谓词编辑器中进行任何更改时，更新后的谓词会自动传递给数组控制器。\n\
  \n**向应用代理添加谓词**\n\n首先，向应用代理添加一个新属性。打开 `QMAppDelegate.h` 文件，该文件看起来就像为 MythBase 生成的默认应用代理头文件。添加一个名为\
  \ `searchPredicate` 的新属性。接口声明现在应如下所示（新行以粗体显示）：\n\n```\n@interface QMAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  \n@property (readonly, strong, nonatomic) NSPersistentStoreCoordinator *persistentStoreCoordinator;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectModel *managedObjectModel;\n\
  @property (readonly, strong, nonatomic) NSManagedObjectContext *managedObjectContext;\n\
  \n@property (strong) NSPredicate *searchPredicate;\n\n- (IBAction)saveAction:(id)sender;\n\
  \n@end\n```\n\n现在切换到 `QMAppDelegate.m`，并在靠近顶部、紧跟在 Xcode 生成的 `@synthesize` 指令之后添加以下代码。新行以粗体显示。\n\
  \n```\n@implementation QMAppDelegate\n\n@synthesize persistentStoreCoordinator =\
  \ _persistentStoreCoordinator;\n@synthesize managedObjectModel = _managedObjectModel;\n\
  @synthesize managedObjectContext = _managedObjectContext;\n\n#define DEFAULT_PREDICATE\
  \ @\"(quoteText CONTAINS[cd] 'space') OR \" \\\n                           \"(character\
  \ CONTAINS[cd] 'Knight')\"\n\n- (id)init {\n    if ((self = [super init])) {\n \
  \       self.searchPredicate = [NSPredicate predicateWithFormat:DEFAULT_PREDICATE];\n\
  \    }\n    return self;\n}\n```\n\n`init` 方法仅为 `searchPredicate` 属性创建了一个默认值。现在让我们连接我们的控制器以使用这个新的谓词。回到\
  \ Interface Builder 画布，选择 FoundQuotes 控制器，并打开*属性检查器*。选中*获取谓词*文本视图中的所有文本并删除，然后切换到*绑定检查器*。在*控制器内容参数*部分，打开*过滤谓词*绑定信息。在弹出的菜单中选择\
  \ App Delegate，在*模型键路径*组合框中输入 “searchPredicate”，然后按 Return 键来启用绑定。\n\n保存工作，回到 Xcode，并点击运行。您现在应该会看到一组不同的结果：由名为\
  \ “Knight” 的角色说出的引用，或包含单词 “space” 的引用。如果没有匹配项，则添加一个具有这些特征之一的引用来测试搜索窗口。\n```\n\n\n\
  ## 向搜索窗口添加谓词编辑器\n\n现在，我们有了一个 `FoundQuotes` 控制器，它根据应用程序委托“拥有”的谓词内容来获取值。下一步是向搜索窗口添加一个\
  \ `NSPredicateEditor`，并配置它，让用户能够编辑谓词。\n\n在 Xcode 中，调出“引文查找器”窗口。将整个窗口稍微拉高一些，然后将现有的表格视图和文本视图拖到底部。接着在*对象库*中找到`NSPredicateEditor`，将其拖入窗口顶部的空白区域，并调整其大小使其填满可用空间。图\
  \ 10-7 展示了这一布局。\n\n![9781430245421_Fig10-07.jpg](img/9781430245421_Fig10-07.jpg)\n\
  \n图 10-7。谓词编辑器已就位于我们的搜索窗口中\n\n## 配置谓词编辑器\n\n现在，需要将编辑器绑定到应用程序委托的谓词实例。选中`NSPredicateEditor`（别忘了额外点击一次以选中编辑器本身，而不是包含它的滚动视图），打开*绑定检查器*，然后检查*值*绑定信息。在弹出的菜单中选择“App\
  \ Delegate”，然后在*模型键路径*组合框中输入“searchPredicate”，并按回车键激活此绑定。\n\n此时，要启用此谓词编辑器的搜索功能，我们只需再做一件事：根据我们想要搜索的属性对编辑器进行定制。`NSPredicateEditor`是一个相当复杂的控件，幸运的是，其大部分有趣的功能都可在\
  \ Xcode 中直接配置。谓词编辑器显示一个或多个`NSPredicateEditorRowTemplate`对象，每个对象都可以配置为以多种方式进行搜索。我们可以创建行模板，允许用户指定数字或日期来与对象值进行比较，或者从预定义字符串列表中选取。在我们的例子中，我们将配置一个行模板，允许用户在文本字段中输入字符串，以便按角色名称、剧集名称和引文内容进行搜索。这个行模板可以复用，允许用户同时指定多个搜索条件。此外，另一个行模板将让用户选择搜索结果中的引文是必须满足所有条件（布尔`AND`），还是只要任意匹配成功即可（布尔`OR`）。\n\
  \n在 Interface Builder 画布中，点击两个可见行中较低的那个（即包含显示“名称”和“包含”的弹出按钮的那一行），深入查看谓词编辑器。选中该行模板后，调出*属性检查器*。注意那些复选框，它们让我们可以选择允许用户使用哪些比较器；还有弹出按钮，让我们可以选择比较器两侧表达式的性质（键路径、字符串、常量值等）。默认设置（左侧为键路径，右侧为字符串）非常适合我们的需求，但我们确实需要根据搜索需求调整键路径。\n\
  \n编辑 *Left Exprs* 键路径下方列出的三个默认值，将它们修改为 `quoteText`、`character` 和 `show.name`。接着，点击选中*忽略大小写*和*忽略变音符号*复选框（参见图\
  \ 10-8）。\n\n![9781430245421_Fig10-08.jpg](img/9781430245421_Fig10-08.jpg)\n\n图 10-8。配置\
  \ `NSPredicateEditorRowTemplate`\n\n然后，检查行模板本身的弹出按钮。这里会显示三个条目，名称与我们刚刚输入的键路径相同。将它们改为更易读的名称：“引文”、“角色名称”和“剧集名称”。\n\
  \n现在点击上方的行模板，即显示“以下任意一项为真”的那一个。它的配置非常简单。复选框让我们可以选择是否允许用户使用布尔 `AND`、`OR` 和 `NOT`\
  \ 进行搜索。\n\n启用所有这些选项以获得最大的实用性。\n\n现在，还有最后一项配置需要完成。默认情况下，`NSPredicateEditor` 允许用户删除所有行，直至最后一行，此时将不再有\
  \ + 按钮来添加新行。通过选中谓词编辑器本身（而不是某个行模板），并在*属性检查器*中点击取消勾选*可移除所有行*复选框来更改此行为。\n\n保存工作，在 Xcode\
  \ 中点击运行，尽情享受 QuoteMonger 的强大功能吧！现在，我们可以使用在谓词编辑器中配置的三个条件，轻松搜索所有已保存的引文。\n\n## 保存谓词\n\
  \n在收工之前，让我们再添加一项最后的润色，使 QuoteMonger 为用户带来友好的使用体验。目前，每次用户启动应用时，它都会使用我们设定的默认查询。如果它能显示上次运行时的最后一个查询，岂不是很好？事实证明，这非常简单。`NSPredicate`\
  \ 有一个便捷的方法叫做 `predicateFormat`，它以字符串形式返回谓词的值。因此，我们可以在用户退出应用时，使用 `NSUserDefaults`\
  \ 保存当前 `searchPredicate` 的字符串表示形式，并在应用启动时检查是否有保存的字符串。打开 `QMAppDelegate.m`，对其实现的第一部分进行如下修改（只需添加所有以粗体显示的行）：\n\
  \n```\n#import \"QMAppDelegate.h\"\n\n@implementation QMAppDelegate\n\n@synthesize\
  \ persistentStoreCoordinator = _persistentStoreCoordinator;\n@synthesize managedObjectModel\
  \ = _managedObjectModel;\n@synthesize managedObjectContext = _managedObjectContext;\n\
  \n#define DEFAULT_PREDICATE @\"(quoteText CONTAINS[cd] 'missed') OR \" \\\n    \
  \                       \"(character CONTAINS[cd] 'kramer')\"\n#define STORED_PREDICATE_KEY\
  \ @\"storedPredicateFormat\"\n\n- init {\n  if ((self = [super init])) {\n    NSString\
  \ *format = [[NSUserDefaults standardUserDefaults]\n        objectForKey:STORED_PREDICATE_KEY];\n\
  \    if (format)\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
  \ format];\n    else\n      self.searchPredicate = [NSPredicate predicateWithFormat:\
  \ DEFAULT_PREDICATE];\n  }\n  return self;\n}\n\n- (void)applicationWillTerminate:(NSNotification\
  \ *)aNotification {\n  NSString *format = [self.searchPredicate predicateFormat];\n\
  \  [[NSUserDefaults standardUserDefaults] setObject:format forKey:STORED_PREDICATE_KEY];\n\
  }\n```\n\n我们首先定义了一个字符串，它将用作通过 `NSUserDefaults` 在用户偏好设置中存储和检索谓词的键。然后，我们增强了 `init`\
  \ 方法，以便查找已存储的谓词。它首先检查是否存在已存储的谓词字符串，如果存在，则使用该格式字符串创建一个新的谓词来填充 `searchPredicate` 实例变量。如果没有存储的谓词，则创建默认谓词。\n\
  \n最后，我们实现了 `applicationWillTerminate:` 方法。当用户退出应用程序时，这个方法会被自动调用，让我们有机会进行一些最后的清理工作。在这里，我们将当前的搜索参数（保存在\
  \ `searchPredicate` 实例变量中）转换为字符串，并将该字符串保存到用户的偏好设置中，以便用户下次运行应用时，相同的搜索条件会再次出现。\n\n\
  保存，运行，然后修改搜索词。退出应用并再次运行，之前的搜索词会再次出现。\n\n## 总结\n\n本章展示了如何使用 `NSPredicate` 来缩小 Core\
  \ Data 结果集的基本知识。我们了解了如何在代码中、在 Xcode 中、或者通过用户与 `NSPredicateEditor` 的交互来构造 `NSPredicate`。我们还初步了解了如何保存这些谓词以供以后使用，就像\
  \ iTunes 和 Mail 对智能播放列表和智能文件夹所做的那样。这些技术可以帮助你轻松地为自己的应用程序带来新的功能层次。\n\n[第 8 章](#9781430245421_Ch08.\n\
  \n\n\n# 第 11 章：窗口、菜单与面板\n\n第 1 章到第 10 章涵盖了开始使用 Core Data 所需的主要概念。现在让我们转向其他主题。不过我们不会完全抛开\
  \ Core Data，它仍会在后续的一些练习中发挥作用，虽然程度不同。本书篇幅有限，无法将每个示例都变成完整的应用程序。然而，即使在没有使用 Core Data\
  \ 的情况下，您也可以思考它如何融入我们接下来章节演示的内容。既然您已经熟练掌握了 Core Data，那么对于应用开发的某些方面，您可能会产生全新的见解，而这些方面您以前可能会用不同的方式解决。说到视图，这正是第\
  \ 11 章的主题——我们将探讨 Cocoa 及其他框架中最突出、最常用的视图组件：窗口、菜单和面板。\n\n在过去的几章中，我们一直专注于可视为 Cocoa\
  \ 编程“后端”的内容——即提供功能来维护应用基础设施的模型和控制器类。现在该把注意力转向 Cocoa 的“前端”，更多地关注 MVC 架构中的视图部分了。\n\
  \n在本章中，我们将重点讨论窗口（不是微软那种）、菜单（不是餐厅那种）、面板（不是太阳能那种）和表单（不是床单那种），这些都是高级 GUI 对象，几乎没有哪个\
  \ Cocoa 应用能离开它们。窗口为视图对象的绘制提供了基础。在 Cocoa 中，这些由`NSWindow`、其直接子类`NSPanel`以及几个专用子类表示。菜单提供了熟悉的屏幕顶部访问系统范围和特定应用用户操作的途径，这是大多数\
  \ Mac 应用都有的功能，由`NSMenu`和`NSMenuItem`对象的层级结构表示。表单提供了一种替代经典自由浮动模态窗口的方式——它将模态窗口作为覆盖层附着在现有窗口上，为用户提供更连贯的界面。\n\
  \n我们将通过一个“实验室”来探索这三个领域，这是一个没有实际用途的玩具应用，仅用于演示某些功能并让我们了解这些组件的工作原理。\n\n## NSWindow\
  \ 与 NSPanel\n\n首先，使用 Cocoa 应用模板创建一个新的 Xcode 项目，并将其命名为`WindowLab`。我们将用这个项目作为测试平台来演示各种窗口功能。\n\
  \n在 Mac OS X 中，屏幕上几乎所有的显示内容都是通过窗口呈现的。许多窗口很容易识别，顶部有标准控件，背后有投影。\n\n但有些窗口并不那么明显。例如，如果启动一个全屏显示的游戏，即使它呈现的是与\
  \ Cocoa 无关的自定义控件，这一切也都发生在一个窗口中。屏幕底部的 Dock 显然是一个窗口。如果将一个文件图标从一个 Finder 窗口拖到另一个窗口，拖动的图标实际上是被一个透明的小窗口“携带”着！\n\
  \n在所有这些情况下，我们看到并与交互的都是`NSWindow`及其子类的实例。`NSWindow`是一个非常通用的类，它允许我们直接配置多种行为，并通过子类化实现更多功能。通常，如果我们想改变窗口本身的外观——无论是其“镀铬装饰”（标题栏和左上角控件）、透明度还是形状——我们可能需要子类化`NSWindow`，但在其他情况下几乎不需要这样做。在本书中，我们将坚持使用可直接使用的窗口类型，并遵循苹果的人机界面指南，不会通过子类化`NSWindow`来改变它们的外观。\n\
  \n**提示** 人机界面指南（常简称为“HIG”）是苹果为应用开发者提供的一系列建议。HIG 就像一种风格指南，当你担心应用看起来有点“不对劲”时可以查阅。它并非严格的规定，也没有人会阻止你违反\
  \ HIG。实际上，包括苹果自家应用在内的许多应用，都会以各种方式偏离指南。然而，它提供了一个良好的基准，描述了各种组件应如何使用。\n\n我们在第 2 章已经提到过\
  \ HIG，但值得再次指出。你可以在`http://developer.apple.com/library/mac/#documentation/UserExperience/Conceptual/AppleHIGuidelines/Intro/Intro.html`在线找到\
  \ HIG。\n\n图 11-1 展示了当今大多数 Cocoa 应用中常见的主要窗口类型。`NSWindow`包含两种绘制风格：“普通”外观和“纹理”外观（后者有点像闪亮的金属片）。`NSWindow`的任一风格都可以配置为支持全屏模式，这会在标题栏右端添加箭头。`NSPanel`可以配置为工具模式（此时标题栏更小、阴影更小，并浮动在应用的其他窗口之上），也可以看起来像普通窗口。在这两种情况下，普通外观与纹理外观的选择也同样适用，与`NSWindow`类似。`NSPanel`的另一个选项是\
  \ HUD（平视显示器）模式，此时面板的配色方案反转，标题栏和底部边缘被修改，整个窗口变得略微透明。这种模式（没有纹理选项）旨在让用户透过界面的部分区域看到背后的内容，并在像\
  \ iPhoto 这样的应用中得到了很好的应用——你可以调出一个包含可调颜色设置的 HUD 面板，透过它仍然可以看到正在查看的照片。\n\n![9781430245421_Fig11-01.jpg](img/9781430245421_Fig11-01.jpg)\n\
  \n图 11-1. Cocoa 中可直接使用的主要窗口类型示例\n\n与某些其他 GUI 工具包不同——它们创建新应用时首先要做的就是子类化某种应用类和某种窗口类——Cocoa\
  \ 允许模型、视图和控制器部分真正分离。窗口只需要知道如何显示自身并为视图提供图形上下文，仅此而已。任何处理应用运行时窗口状态变化的代码（例如从 nib 文件加载、被拖过屏幕或被用户关闭）通常都可以由窗口的委托对象（即其控制器）来处理。\n\
  \n## 处理输入\n\n除了为视图提供显示内容的框架外，`NSWindow`还处理来自鼠标和键盘的用户输入。`NSWindow`中的任何鼠标操作（点击、拖动、移动、释放等）都会触发`NSWindow`中的一个方法，该方法在其内容中查找适当的视图对象，并在视图上调用相同的方法。这种对称性之所以有效，是因为`NSWindow`和`NSView`都继承自`NSResponder`，而处理这些事件的方法正是在该类中定义的。同样，当用户按下或释放键盘上的某个键时，应用程序会调用应用“关键窗口”（即当前拥有键盘焦点的窗口；通常是用户最后点击的窗口）中的方法，该方法进而确定哪个视图当前拥有键盘焦点，并将责任移交出去，在焦点视图中调用相同的方法。\n\
  \n\n\n## 使用面板还是不用面板？\n\n由于我们不会修改窗口的基本外观，因此将使用 `NSWindow` 或其子类 `NSPanel` 来显示应用程序中的控件和其他视图。我们应用程序的核心元素通常位于\
  \ `NSWindow` 中，而 `NSPanel` 则用于辅助窗口，例如 Finder 中的“显示查看选项”面板。从用户的角度来看，`NSWindow` 和\
  \ `NSPanel` 之间只有几个关键区别：\n\n- `NSPanel` 实例通常在其他应用程序成为活动应用程序时变为不可见，并在其自身应用程序再次成为活动状态时重新出现。\n\
  - `NSPanel` 可以设置为“浮动”在其应用程序的所有其他窗口（包括主窗口）之前。\n- `NSPanel` 可以轻松配置为不会不必要地成为关键窗口，这样用户就可以点击辅助面板中的按钮，然后继续在主窗口中输入。\n\
  \n## 窗口属性\n\n在 Xcode 的 WindowLab 项目中，导航到 *MainMenu.xib* 文件并单击以在 Interface Builder\
  \ 画布中打开它。与往常一样，应用程序 nib 文件中包含的对象之一是一个窗口。单击以在主 nib 窗口中选择它，然后打开 *属性检查器*，以便我们能够对其进行一些探索（参见图\
  \ 11-2）。在之前的章节中，我们使用此检查器来设置窗口的标题，但当然我们还可以在这里做更多事情。\n\n![9781430245421_Fig11-02.jpg](img/9781430245421_Fig11-02.jpg)\n\
  \n图 11-2. NSWindow 的属性检查器\n\n我们已经熟悉了 *标题* 文本字段。其正下方是 *自动保存* 字段，它提供了非常不错的功能：在此字段中输入一个文本字符串，窗口将使用该字符串作为\
  \ `NSUserDefaults` 系统中的键，并基于该键存储和检索其位置。这意味着当用户重新排列我们应用程序中的窗口时，窗口位置会保存在用户的偏好设置中，并且下次运行我们的应用程序时，窗口将出现在相同的位置。而我们要做的就是为应用中的每个窗口填写此文本字段，并为每个窗口输入一个唯一的值。\n\
  \n接下来，有一些复选框允许我们关闭某些标准窗口控件。请注意，关闭这些复选框不会从窗口的标题栏中移除相应的按钮；它只会在我们的应用程序运行时使它们永久显示为灰色且不可用。其下方是一些用于调整窗口外观的复选框，包括启用纹理模式、禁用窗口后的投影等。这里提到\
  \ *工具栏* 的选项指的是可附加到窗口的可选 `NSToolbar`，我们将在本章稍后部分进行解释。我们还可以移除窗口的标题栏。这通常是一个坏主意，因为用户将无法重新定位窗口，但对于像全屏游戏这样的应用程序可能有用。\n\
  \n下一组复选框允许我们以多种方式微调窗口的行为，其中大部分不言自明。一个例外是 *自动重新计算视图循环* 复选框，它的名称令人费解。其概念是：每个窗口都维护一个包含所有视图对象的列表，用户可以通过\
  \ Tab 键在这些视图之间切换。如果选中此复选框，则在应用程序运行时添加到窗口的任何视图都将自动插入到这个“循环”中的某个位置。另一个例外是 *可恢复* 复选框。启用\
  \ *可恢复* 会告诉 Cocoa，我们的窗口应尝试在应用程序启动之间恢复到相同的状态。\n\n在我们的帮助下，我们的应用程序可以重新打开用户退出时处于打开状态的窗口，甚至可以将它们恢复到用户退出时的相同滚动位置和选择状态。\n\
  \n在其下方，您会找到一系列处理窗口如何与桌面交互的菜单。Mac 桌面环境有一个叫做 *Mission Control* 的功能（位于“系统偏好设置”应用中），它允许用户拥有多个桌面（或空间）并在它们之间移动窗口，以及显示所有窗口或单个应用程序的所有窗口。在先前版本的\
  \ Mac OS/X 中，Mission Control 是两个独立的功能，分别称为 Spaces 和 Exposé，属性检查器中仍然沿用这些名称。\n\n通常，我们应将这些设置为\
  \ *推断行为*，这意味着窗口行为正常。对于 Spaces，其他选项是 *可以加入所有空间*，这意味着窗口将始终可见，或 *移动到活动空间*，这意味着窗口在变为活动状态时将移动到当前空间，而不是将活动桌面切换到窗口所在的桌面。对于\
  \ Exposé，*推断行为* 等同于 *托管行为*，这意味着窗口对 Exposé 操作正常响应。其他选项是 *瞬态*，这会导致在激活 Exposé 时隐藏窗口（这是面板的默认设置），以及\
  \ *固定*，这意味着窗口完全忽略 Exposé。下一个选项涉及此窗口是否应包含在用户可以使用 **窗口** ![image](img/arrow.jpg) **循环浏览窗口**\
  \ (![images](img/arrow3.jpg)-``) 命令旋转浏览的窗口集合中。接下来是窗口是否支持全屏选项，窗口会扩展到自己独立的空间并占据整个显示屏，就像\
  \ iOS 应用程序一样，包括隐藏菜单栏。如果此项设置为 *主窗口*，则标题栏右侧会显示一个特殊控件以激活全屏模式。\n\n最后，有一些与窗口内存使用相关的选项。最好保持\
  \ *延迟* 开启，因为这会跳过为窗口分配一些内部内存，直到它即将实际显示窗口为止。此外，我们应该保持 *一次性* 关闭。如果打开，则该内部内存在窗口关闭后会立即释放，因此只有在涉及的窗口是临时窗口（如启动画面）且每个会话只能显示一次时，才应打开此选项。最后，一个弹出式窗口提供了将窗口的“后备存储”从\
  \ *缓冲* 切换到 *保留* 或 *非保留* 的功能。永远不要这样做！*保留* 和 *非保留* 选项仅用于支持特定类型的遗留代码，所有新的 Cocoa 应用程序都应该为每个窗口将此设置保留为\
  \ *缓冲*。\n\n现在，从 *对象库* 窗口中拉出一个 `NSPanel`，再次查看 *属性检查器*；注意除了我们检查 `NSWindow` 时看到的选项外，还有一个样式弹出式菜单和几个新增的复选框。此处的样式选项是\
  \ *实用工具*，如果选择它，会使面板具有独特的外观，并使其浮动在应用程序的其他窗口之上；以及 *HUD*，它会给窗口带来更加独特的“平视”外观。尝试一些这些样式，看看它们如何影响面板的外观。面板的行为也可能与窗口不同。面板可以在\
  \ *全屏* 下拉菜单中标记为辅助窗口，这意味着它将在同一空间中浮动在全屏模式窗口之上。这对于影响另一个窗口中文档的“查找”或“信息”面板之类的东西非常有用。探索后，从\
  \ nib 文件中删除该面板。\n\n## 标准系统面板\n\n除了为我们填充自己的视图和控件而设计的通用窗口类之外，Cocoa 还包含一些专门的窗口子类，供我们在应用程序中使用。\n\
  \n\n\n这些旨在满足各种应用的需求，因此使用它们可以免费获得大量功能，同时为我们的用户提供可能在其他应用程序中使用过的熟悉界面。\n\n**颜色面板**\n\
  \n首先，让我们看看`NSColorPanel`。这个面板提供了一个界面，允许用户选择一种颜色。我们将通过在我们的控制器类中实现一个方法来使用颜色面板设置屏幕文本的颜色，该方法在用户在颜色面板中选择一种颜色时被调用。\n\
  \n假设我们在 Xcode 中创建的`WindowLab`项目中，`MainMenu.xib`文件仍然打开，让我们看看 nib 文件中的主窗口对象。从*对象库*中拖出一个换行标签（也称为多行标签），并将其放到窗口上。再拖出一个按钮，并将其放置在标签下方。使用`显示颜色面板`作为标题。布局应如图\
  \ 11-3 所示。\n\n![9781430245421_Fig11-03.jpg](img/9781430245421_Fig11-03.jpg)\n\n\
  图 11-3。一个非常简单的窗口布局\n\nXcode 也会为我们创建一个 App Delegate 类。如果我们使用`WL`作为类前缀，那么它将被命名为`WLAppDelegate`。在\
  \ Xcode 中，在 Interface Builder 面板旁边打开一个辅助编辑器窗格（我们在第 5 章中讨论过辅助编辑器窗格；点击 Xcode 工具栏中*编辑器*标签图标块中看起来像管家背心和领结的图标）。很可能打开此窗格时会预加载`WLAppDelegate.h`文件，但如果未加载，请使用窗格顶部的导航栏打开它。我们将添加一个名为`title`的\
  \ outlet 和一个名为`showColorPanel:`的 action。为此，从*多行标签*拖拽到`WLAppDelegate.h`文件，目标指向现有`@property`声明的正下方。添加一个新的\
  \ Outlet 并将其命名为`title`。然后，从*显示颜色面板*按钮拖拽到新添加的 outlet 正下方，并添加一个名为`showColorPanel:`的\
  \ Action（我们需要将连接类型更改为*Action*）。\n\n完成后，`WLAppDelegate.h`文件应如下所示：\n\n```objc\n#import\
  \ <Cocoa/Cocoa.h>\n\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
  \ *title;\n- (IBAction)showColorPanel:(id)sender;\n\n@end\n```\n\n现在切换到`.m`文件，并添加以下`showColorPanel:`方法的实现，以及一个名为`changeColor:`的方法，如下所示：\n\
  \n```objc\n#import \"WLAppDelegate.h\"\n\n@implementation WLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // Insert code here to initialize your application\n}\n\
  \n- (IBAction)showColorPanel:(id)sender {\n    // create the color panel\n    NSColorPanel\
  \ *panel = [NSColorPanel sharedColorPanel];\n    // bring the color panel to the\
  \ front of the screen\n    [panel orderFront:nil];\n}\n\n- (void)changeColor:(id)sender\
  \ {\n    // in this method, the \"sender\" parameter is the NSColorPanel\n    //\
  \ itself.  We just ask it for its color, and pass it along to\n    // the \"title\"\
  \ object.\n    [self.title setTextColor:[sender color]];\n}\n\n@end\n```\n\n**注意**：尽管我们之前见过，但请仔细查看`WLAppDelegate.h`文件中的`@property`声明。大多数情况下，当添加一个连接到用户界面元素的属性时，该属性包含`weak`注释。但对于指向窗口的引用，情况并非如此。该属性被标记为`assign`。这有一个很好的理由：注释控制着自动引用计数（ARC）如何处理引用。标记为`strong`的引用表示对对象的所有权。\n\
  \n标记为`weak`的引用不表示所有权，并且当指向某对象的所有强引用被释放且该对象被回收时，弱引用将被清零。但是，ARC 不能与重写`release`和`retain`的类一起工作，这包括`NSWindow`。由于`NSWindow`不支持\
  \ ARC，该属性被赋予了`assign`注释。这实际上意味着与`weak`相同，但适用于非 ARC 启用的类。应用代理并不拥有该窗口，因此应用代理与窗口的连接不应阻止窗口在适当时被释放和回收。\n\
  \n`showColorPanel:`方法将由 GUI 中的简单按钮点击调用，而当我们从按钮拖拽时 Xcode 已经为我们连接好了。但是，`changeColor:`方法将在用户点击颜色面板中的颜色时被调用，即使颜色面板和我们的代码之间没有任何直接连接。这种“魔法”之所以有效，归功于一个名为响应者链的\
  \ Cocoa 概念（参见侧边栏）。\n\n**响应者链**\n\n响应者链是一个特别的对象集合，在应用程序生命周期中按需动态收集，可以查询它们是否实现了特定的\
  \ action。这使得某些 action 可以以通用方式配置，以便在运行时，它们将被调用到在当时最有意义的对象上。该链按特定性顺序排列，从“最接近” action\
  \ 的对象开始，一直延续到最通用的对象。在 Interface Builder 中，通过将操作连接到 nib 的*第一响应者*图标上的 action 来配置使用响应者链的对象，该图标只不过是响应者链中第一个对象的代理，当被询问是否实现了特定方法时，该对象在运行时说“是的，我可以”。\n\
  \n由于每个窗口都有自己的“第一响应者”概念（通常是用户最后交互的控件或视图，从而使其成为接收按键等操作的可能候选者），这使得这一切变得更加令人困惑。\n\n\
  让我们尝试通过一个例子来澄清这一点。考虑一个按钮的情况，其目标/操作被配置为调用*第一响应者*上一个名为`showThing:`的方法。当用户点击按钮时，会按顺序询问列表中的每个对象是否实现了`showThing:`方法，直到其中一个回答`YES`，此时将调用该对象的`showThing:`方法，响应者链的工作就完成了。以下是响应者链可能的样子示例：\n\
  \n1.  窗口的“第一响应者”（当前聚焦并接受键盘输入的视图）、其父视图、父视图的父视图，依此类推，一直向上到窗口内的视图层次结构\n2.  窗口本身\n3.\
  \  窗口的代理\n4.  应用程序对象，`NSApp`\n5.  应用程序对象的代理\n\n响应者链可能还包含其他对象，特别是如果我们在处理基于文档的应用程序，那么打开的文档及其控制器也会在链中占有一席之地。更多内容请参见第\
  \ 12 章。\n\n一旦这些对象中的任何一个表示实现了`showThing:`，那么就会在该对象上调用该方法，搜索结束。\n\n现在保存工作并点击**运行**。我们的新应用将出现，点击按钮将调出颜色面板。点击一些不同的颜色，所选文本的颜色将立即更改以反映新的选择。\n\
  \n那么，考虑到颜色面板与我们的应用代理没有直接连接，有理由怀疑：这是如何工作的？我们应用代理中的`changeColor:`方法是如何被调用的？关键在于使用如前所述的响应者链。\n\
  \n\n\n`NSColorPanel`使用响应者链来查找实现了`changeColor:`方法的对象。作为应用程序的委托，我们的小控制器对象是被查询是否实现了该方法的最后一个对象之一，由于它实现了，所以该方法会被调用。请注意，如果窗口本身实现了该方法，或者窗口的委托实现了该方法，那么这些方法之一会被优先调用。\n\
  \n现在我们需要以一个现实检验来结束本节。实际上，我们刚才所做的事情可以通过使用`NSColorWell`更轻松（也更美观）地完成，这是一个特殊的控件，点击时会启动`NSColorPanel`。我们只需要编写代码在控制器类中声明一个属性来包含`NSColor`，然后使用\
  \ Cocoa 绑定将`NSColorWell`的*Value*属性和`NSTextField`的*Text Color*属性绑定到控制器中的这个属性。此示例在此处原样保留，主要是为了向您展示如何从自己的代码中使用颜色面板，并让您初步了解响应者链的概念。\n\
  \n## 字体面板\n\n接下来要介绍的特殊面板是`NSFontPanel`。与颜色面板不同，字体面板没有匹配的控件来启动它。不过，它可以相当容易地与系统“格式”菜单的内容集成，我们稍后会看到这一点。\n\
  \n我们在这里要做的是向`WindowLab`窗口添加一个按钮，该按钮将触发一个打开字体面板的操作方法，以及另一个将更新文本字段的方法。首先，让`WindowLab`窗口变得更高一些。然后，选择打开颜色面板的按钮，并复制它。将新按钮标题设为“Show\
  \ Font Panel”。打开一个助理编辑器窗格，显示`WLAppDelegate.h`文件，并从按钮按住 Control 键拖动到助理编辑器窗格，目标位置在现有操作方法下方。插入一个新的操作，并将其命名为`showFontPanel`。\n\
  \n添加该操作将导致以下方法声明被添加到类的`@interface`块中，位于`WLAppDelegate.h`文件内：\n\n```\n- (IBAction)showFontPanel:(id)sender;\n\
  ```\n\n以下存根将被添加到`WLAppDelegate.m`文件中的`@implementation`部分：\n\n```\n- (IBAction)showFontPanel:(id)sender\
  \ { }\n```\n\n切换到`.m`文件，并在`@implementation`部分填写以下代码：\n\n```\n- (IBAction)showFontPanel:(id)sender\
  \ {\n    NSFontPanel *panel = [NSFontPanel sharedFontPanel];\n    NSFontManager\
  \ *manager = [NSFontManager sharedFontManager];\n    [manager setSelectedFont:[self.title\
  \ font] isMultiple:NO];\n    [panel orderFront:nil];\n}\n\n- (void)changeFont:(id)sender\
  \ {\n    // 这里，'sender' 是共享的 NSFontManager 实例\n    NSFont *oldFont = [self.title\
  \ font];\n    NSFont *newFont = [sender convertFont:oldFont];\n    [self.title setFont:newFont];\n\
  }\n```\n\n这遵循与颜色面板相同的使用模式。当用户点击字体时，字体面板使用响应者链查找实现了`changeFont:`操作方法的对象，并且它成功在我们的应用程序委托中找到了它。这里的情况稍微复杂一些，因为在这两个方法中，我们都使用了`NSFontManager`类的共享实例。运行中的应用程序对所选或当前字体的概念保存在这个共享实例中，我们首先在`showFontPanel:`中使用它，间接告诉`NSFontPanel`它应该开始显示哪个字体，然后在`changeFont:`中再次使用它来获取新的所选字体。我们通过将旧字体传递给字体管理器的`convertFont:`方法来获取新字体，该方法将旧字体的特性与用户在字体面板中的选择状态结合起来（例如，如果旧字体是\
  \ Lucida Grande/Bold/36，而用户选择了 Times New Roman，其他保持不变，转换后的字体将是 Times New Roman/Bold/36）。\n\
  \n现在，保存工作，返回 Xcode，然后点击**Run**。\n\n我们现在可以更改显示文本的颜色和字体（参见图 11-4）。\n\n![9781430245421_Fig11-04.jpg](img/9781430245421_Fig11-04.jpg)\n\
  \n图 11-4 设置标签的颜色和字体\n\n## 拥有独立 Nib 文件的控制器\n\n接下来，我们将演示一个在 Cocoa 开发中经常出现的简单模式：创建一个加载自己\
  \ nib 文件的控制器类，成为文件中所有对象的“所有者”。在我们迄今为止创建的所有应用程序中，所有 GUI 元素都包含在应用程序的单个`.xib`文件中。这对于简单应用程序来说效果很好，但有其局限性。首先，我们在\
  \ nib 文件中只有一个窗口实例和一个控制器实例。其次，整个主 nib 文件在应用程序启动时一次性加载，nib 文件中的内容越多，启动阶段就会越慢且占用更多内存。诚然，在拥有数\
  \ GB RAM 的现代计算机上，这可能不是一个大问题，但作为程序员，总是应该尽量避免随意浪费 CPU 和 RAM。最后，将太多顶级对象（如窗口、控制器等）放入单个\
  \ nib 文件会给程序员带来困难，因为更难看出哪些控制器和窗口属于一起。\n\n这两个问题的解决方案是将部分 GUI 对象分发到其他 nib 文件中，并通过加载这些\
  \ nib 文件的控制器类来管理它们的使用。许多 Cocoa 应用程序使用此技术，通常将偏好设置、文档、工具等窗口拆分为单独的 nib 文件。以下部分将演示两种不同的实现方式，复杂度递增。\n\
  \n### 使用 NSWindowController 加载 Nib 文件\n\n第一种也是最简单的方法是使用 Cocoa 的`NSWindowController`类加载\
  \ nib 文件并成为其所有者。我们将向主窗口添加一个按钮来触发加载新的 nib 文件，并向`WLAppDelegate`添加一个`NSMutableArray`来持有对新加载\
  \ nib 文件的引用。如果没有东西持有对新加载 nib 的引用，ARC 系统会导致它们被立即释放。\n\n首先，打开`WLAppDelegate.h`文件，并添加以下属性（以粗体显示）：\n\
  \n```\n@interface WLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property\
  \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField *title;\n\
  @property (strong) NSMutableArray *subWindows;\n```\n\n然后，在`.m`文件的`applicationDidFinishLaunching:`方法中添加这一行：\n\
  \n```\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n\
  \    self.subWindows = [[NSMutableArray alloc] init];\n}\n```\n\n接下来，打开`MainMenu.xib`文件，并在主窗口中已有的两个按钮下方添加一个新按钮。将其标签设为“Load\
  \ Easy Window”。打开一个*Assistant Editor*窗格（如果尚未打开），并在其中打开`WLAppDelegate.h`文件。从新按钮按住\
  \ Control 键拖动到`.h`文件，并添加一个名为`loadEasyWindow`的新操作。然后，在`WLAppDelegate`的`.m`文件中为存根填写以下实现：\n\
  \n```\n- (IBAction)loadEasyWindow:(id)sender {\n    NSWindowController *easyController\
  \ = [[NSWindowController alloc]\n        initWithWindowNibName:@\"EasyWindow\"];\n\
  \    // 需要持有对该对象的引用。\n    [self.subWindows addObject:easyController];\n    [easyController\
  \ window];\n}\n```\n\n在该方法中，我们首先初始化一个新的控制器，并告诉它要使用的 nib 文件名。然后，我们将对该控制器的引用存储到在`applicationDidFinishLaunching:`方法中创建的`subWindows\
  \ NSMutableArray`中，这样新的控制器就不会在方法结束时被释放。\n\n\n\n如果我们不保留对它的引用，当它超出作用域时就会被释放，新加载的 nib\
  \ 文件也会随之释放。当然，在实际应用中，我们需要一种机制来适时地从该列表中移除对象，但我们暂时先忽略这一点。然后我们调用它的 `window` 方法，该方法实际加载\
  \ nib 文件并显示窗口。当然，我们还没有创建 EasyWindow nib 文件，所以现在就来创建它。\n\n在 Xcode 中通过选择 **File**\
  \ ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg) **New File** 创建一个全新的 nib\
  \ 文件。在模板选择器中，选择 OS X 下的 *User Interface*，然后选择 *Window* 模板，该模板包含一个可供我们使用的 `NSWindow`。将新文件命名为\
  \ EasyWindow，并在 *Group* 弹出菜单中选择 WindowLab 文件夹。*Group* 弹出菜单会显示五个项目，前三个分别是带 Xcode\
  \ 项目图标的 WindowLab、带文件夹图标的 WindowLab 以及带文件夹图标的 Supporting Files。这些对应着 Xcode 导航区域中的文件分组。选择带文件夹图标的\
  \ *WindowLab* 条目，然后点击 *Create*。\n\n我们新建的 xib 文件会作为新文件出现在 Xcode 的 *Navigator* 区域中，因此从那里打开该文件。在\
  \ nib 文件中选中 Window，然后打开 *Attributes Inspector*。给窗口设置标题为“Easy Window”。\n\n在前面的章节中，我们创建的每个控制器都已作为顶层对象添加到\
  \ nib 文件中，但当你自己加载 nib 文件时，可以指定一个对象作为其“所有者”，在 Interface Builder 中，这通过主 nib 窗口中的 *File’s\
  \ Owner* 对象来表示。`NSWindowController`（我们控制器的类）在加载文件时已经自动将自己设置为 nib 文件的所有者，但我们仍需要在\
  \ Interface Builder 中手动配置，以便能够利用它。为此，选中 *File’s Owner* 图标并打开 *Identity Inspector*。在该检查器的顶部，我们可以设置希望成为文件所有者的对象的类。默认情况下它设置为\
  \ `NSObject`，但我们通常希望它设置为 `NSWindowController` 本身或 `NSWindowController` 的自定义子类。现在，将其\
  \ *Custom Class* 设置为 `NSWindowController`，如图 11-5 所示。最后，从 *File’s Owner* 图标按住 Control\
  \ 键拖拽到窗口上，并将其分配给 *File’s Owner* 的 `window` 输出口。我们需要这样做，以便 `NSWindowController` 知道众多\
  \ `NSWindow` 对象中哪个是 nib 的“主”窗口。\n\n![9781430245421_Fig11-05.jpg](img/9781430245421_Fig11-05.jpg)\n\
  \n图 11-5. 设置 File’s Owner 的类\n\n保存然后点击 **Run**。应用的新按钮将允许我们每次按下按钮时创建新窗口（参见图 11-6）。\n\
  \n![9781430245421_Fig11-06.jpg](img/9781430245421_Fig11-06.jpg)\n\n图 11-6. 一些简易窗口\n\
  \n每次它实际创建一个新的 `NSWindowController` 实例，该实例会加载一份全新的 nib 文件副本，包括其中的所有对象。在这个例子中，我们只拥有一个窗口，但你可以将任何你喜欢的内容放入这些\
  \ nib 文件中，例如用于访问 Core Data 的控制器对象。\n\n## Subclassing NSWindowController\n\n当然，你通常需要在控制器类中添加一些自己的代码。你也可以通过子类化\
  \ `NSWindowController` 来轻松满足需求。下一步，我们将创建一个子类，并为其创建一个新的 nib 文件来加载，然后设置一种从主窗口和控制器调用它的方式。\n\
  \n在 Xcode 中，通过从菜单中选择 **File** ![image](img/arrow.jpg) **New File** 并在模板选择器的 OS X\
  \ 部分选择 *Cocoa*，在 WindowLab 项目中创建一个名为 `NotSoEasyWindowController` 的新类。\n\n选择 *Objective-C\
  \ class*，然后指定我们要创建 *NSWindowController* 的子类。Xcode 会建议使用 `WLWindowController` 作为名称，但你应该将其改为\
  \ `WLNotSoEasyWindowController`。勾选 *With XIB for user interface* 复选框，Xcode 还会为我们生成一个\
  \ `WLNotSoEasyWindowController.xib` 文件，其中 *File’s Owner* 设置为我们的新子类，并且 *window* 输出口已预先连接好。Xcode\
  \ 会提示你保存 nib 文件，并询问将其添加到哪个分组。使用我们之前用于 Easy Window nib 文件的同一分组，即 WindowLab 文件夹。Xcode\
  \ 会为我们生成包含一些方法的 `WLNotSoEasyWindowController.h` 和 `WLNotSoEasyWindowController.m`\
  \ 文件，但我们需要在这些文件上做一些工作。\n\n我们在这里创建自己的类，并且它只负责管理一个 nib 文件。因此，我们可以将 nib 文件的名称内置到类中，这样任何使用该类的用户只需了解该类，而无需知道\
  \ nib 文件本身的名称。我们还可以让调用者更轻松：假设任何创建此类实例的人都希望加载 nib 文件，我们就把对 `window` 的调用直接构建到 `init`\
  \ 方法中。通过创建以下 `init` 方法来实现这一点：\n\n```\n- init {\n\tif ((self = [super initWithWindowNibName:@\"\
  WLNotSoEasyWindowController\"])) {\n\t\t[self window];\n\t}\n\treturn self;\n}\n\
  ```\n\n这是标准 `init` 方法的推荐形式，我们调用超类中的另一个 `init` 方法，如果成功则执行特定于我们实例的工作，最后返回指向 `self`\
  \ 的指针。趁现在，让我们删除 Xcode 为我们生成的 `initWithWindow:` 方法，因为永远不需要调用它。\n\n现在切换到 `MainMenu.xib`。再次将窗口调高一些，复制最后一个按钮，并将其命名为“Not\
  \ So Easy”。然后在 Assistant Editor 中打开 `WLAppDelegate.h`，从按钮按住 Control 键拖拽到 `WLAppDelegate.h`\
  \ 上，并添加一个名为 `loadNotSoEasyWindow` 的新操作。打开 `WLAppDelegate.m` 文件，为该操作添加以下实现：\n\n```\n\
  // 添加到 WLAppDelegate.m 中：\n- (IBAction)loadNotSoEasyWindow:(id)sender {\n    WLNotSoEasyWindowController\
  \ *notSoEasyController = [[WLNotSoEasyWindowController alloc] init];\n    [self.subWindows\
  \ addObject:notSoEasyController];\n}\n```\n\n我们还需要在 `WLAppDelegate.m` 顶部添加以下 `#import`\
  \ 指令，以便编译器在编译应用委托时知道这个新类：\n\n```\n#import \"WLNotSoEasyWindowController.h\"\n```\n\
  \n完成这些后，让我们为窗口控制器类添加一点功能，以便在创建 nib 文件后，我们可以确保窗口按预期与其正确连接：一个简单的方法，当被调用时让电脑发出蜂鸣声。不幸的是，我们需要手动添加它，但这很容易做到。\n\
  \n在 `WLNotSoEasyWindowController.h` 中添加以下方法声明：\n\n```\n- (IBAction)beep:(id)sender;\n\
  ```\n\n`WLNotSoEasyWindowController.m` 的整个内容应如下所示，其中添加了新的 `beep:` 操作方法：\n\n```\n\
  #import \"WLNotSoEasyWindowController.h\"\n\n@interface WLNotSoEasyWindowController\
  \ ()\n@end\n\n@implementation WLNotSoEasyWindowController\n\n- init {\n    if ((self\
  \ = [super initWithWindowNibName:@\"WLNotSoEasyWindowController\"])) {\n       \
  \ [self window];\n    }\n    return self;\n}\n\n- (void)windowDidLoad {\n    [super\
  \ windowDidLoad];\n    \n    // 实现此方法以处理窗口控制器的窗口从其 nib 文件加载后的任何初始化。\n}\n\n- (IBAction)beep:(id)sender\
  \ {\n    NSBeep();\n}\n\n@end\n```\n\n在 Interface Builder 画布中打开 `WLNotSoEasyWindowController.nib`\
  \ 文件，从 *Object Library* 中拖出一个按钮，并将其标题设置为“Beep!”。从 Beep! 按钮按住 Control 键拖拽到 Object\
  \ Dock 中的 *File’s Owner* 图标上，然后选择我们刚刚添加的 `beep:` 操作。\n\n\n\nXcode 会自动注意到我们添加了一个新操作，并使其可供使用。保存更改并选择**运行**；新的按钮将让我们能够创建窗口，当按下其中的按钮时会发出哔哔声，如图\
  \ Figure 11-7 所示。\n\n![9781430245421_Fig11-07.jpg](img/9781430245421_Fig11-07.jpg)\n\
  \n图 11-7. 这些窗口的按钮会向我们发出哔哔声。\n\n## 模态窗口\n\n现在我们将继续讨论一种特殊的 GUI 元素，即*模态窗口*。每个人都曾使用过模态窗口，但如果你对桌面\
  \ GUI 编程不熟悉，这个术语可能对你是新的。基本上，模态窗口是一种使应用程序进入特定“模式”的窗口。具体来说，在这种模式下，应用程序只能通过模态窗口本身的控件接受输入，而在应用程序中的任何其他位置点击都只会使其发出哔哔声。由于其干扰性，模态窗口应谨慎使用——仅在应用程序在没有用户回答某种问题（例如，“有五个打开的文档带有未保存的更改。您确定要退出吗？”）的情况下无法自行推进时使用。如果应用程序需要用户提供的信息仅与单个窗口或文档相关，则最好使用工作表（本章后面会介绍），它锁定的是单个窗口而不是整个应用程序。\n\
  \n### NSAlert 函数\n\nCocoa 中最简单的模态窗口是警报面板，只需一次函数调用即可创建和运行。当用户点击其中一个按钮时，该函数返回，然后我们可以检查返回值以确定他们点击了哪个按钮。根据我们调用函数的方式，可能会显示一个、两个或三个按钮供用户选择。\n\
  \n最常用的模态警报函数是 `NSRunAlertPanel`。它有几个变体，称为 `NSRunCriticalAlertPanel` 和 `NSRunInformationalAlertPanel`，它们用于\
  \ Apple 用户界面指南中概述的特定目的，但我们可以放心地使用 `NSRunAlertPanel`。这些函数中的每一个都需要五个或更多参数：首先是显示在面板顶部的标题，然后是要显示的完整文本（它提供一些信息或向用户提问），然后是三个包含按钮标题的字符串（可能为\
  \ `nil`）。设为 `nil` 的按钮标题将不会显示，除非它们全部为 `nil`，在这种情况下，面板上会包含一个“确定”按钮。\n\n要查看一些警报面板的实际效果，请在\
  \ Interface Builder 窗格中打开 `MainMenu.xib`，然后在 Assistant Editor 窗格中打开 `WLAppDelegate.h`。向\
  \ WindowLab 窗口添加一个新按钮，并将其标题设置为“运行模态警报”。按住 Control 键从新按钮拖动到 Assistant Editor 以添加一个新操作。将新操作命名为\
  \ `runModalAlerts`。然后，在 Xcode 生成的存根内的 `WLAppDelegate.m` 中实现以下方法：\n\n```objc\n- (IBAction)runModalAlerts:(id)sender\
  \ {\n   NSRunCriticalAlertPanel(@\"基本用法\", @\"这是一个简单的警报面板。\", nil, nil, nil);\n\
  \   NSRunAlertPanel(@\"三个按钮\", @\"我们可以设置按钮标题：\",\n     @\"真的吗？\", @\"哦，多么令人愉快！\"\
  , @\"随便吧。\");\n   NSRunAlertPanel(@\"格式化字符串\", @\"我们也可以进行一些格式化，%@ %@\",\n     nil,\
  \ nil, nil, @\"将值放在末尾进行插入，\", @\"在三个按钮值之后。\");\n   switch (NSRunAlertPanel(@\"注意选择\"\
  ,\n             @\"当然，我们可以检测到点击了哪个按钮。\",\n             @\"默认\", @\"备用\", @\"其他\"\
  )) {\n     case NSAlertDefaultReturn:\n       NSRunInformationalAlertPanel(@\"结果：\"\
  , @\"您按下了默认按钮\",\n          nil, nil, nil);\n       break;\n     case NSAlertAlternateReturn:\n\
  \       NSRunInformationalAlertPanel(@\"结果：\", @\"您按下了备用按钮\",\n         nil, nil,\
  \ nil);\n       break;\n     case NSAlertOtherReturn:\n       NSRunInformationalAlertPanel(@\"\
  结果：\", @\"您按下了其他按钮\",\n         nil, nil, nil);\n       break;\n     default:\n\
  \       break;\n   }\n}\n```\n\n试试看！保存，点击**运行**，然后试一试。\n\n### 打开面板和保存面板\n\nCocoa\
  \ 中另一个最常用的模态面板可能是用于打开和保存文件的面板，即 `NSOpenPanel` 和 `NSSavePanel`。使用这些面板通常不仅仅是一行代码。我们首先需要配置面板上的各种选项（例如，它是否允许用户选择多个文件进行打开，还是只允许选择一个），然后运行面板，检查返回值（它指示用户最终是点击了“打开”或“保存”按钮，还是取消了），然后从面板中获取结果文件名。请注意，这些面板实际上并不执行任何文件\
  \ I/O；它们只是提示用户输入文件名并返回结果。Cocoa 使用 `NSURL` 而不是 `NSString` 来表示文件路径，这使得打开和保存对话框可以引用本地文件系统之外的内容（例如\
  \ iCloud）。\n\n要查看其工作原理的示例，请考虑以下方法，该方法模拟复制文件。此方法使用 `NSOpenPanel` 提示用户选择要复制的文件，然后使用\
  \ `NSSavePanel` 让用户指定文件的目标位置：\n\n```objc\n- (IBAction)copyFile:(id)sender {\n     NSOpenPanel\
  \ *openPanel = [NSOpenPanel openPanel];\n     [openPanel setTitle:@\"选择要复制的文件：\"\
  ];\n     \n     if ([openPanel runModal] == NSOKButton) {\n         // 获取第一个（也是唯一一个）选定的文件名\n\
  \         NSURL *openPath = [[openPanel URLs] objectAtIndex:0];\n         // 仅提取文件名，不包括目录路径\n\
  \         NSString *openFilename = [openPath lastPathComponent];\n         \n         NSSavePanel\
  \ *savePanel = [NSSavePanel savePanel];\n         \n         [savePanel setTitle:@\"\
  输入目标文件名：\"];\n         [savePanel setNameFieldStringValue:openFilename];\n         \n\
  \         // 在其默认目录中运行保存面板，并将打开的文件名作为建议。\n         if ([savePanel runModal] == NSOKButton)\
  \ {\n             NSURL *savePath = [savePanel URL];\n             NSString *message\
  \ = [NSString stringWithFormat:\n                                  @\"您已经打开了该文件：\\\
  n\\n%@\\n\\n 并将其保存到此处：\\n\\n%@\\n\\n\",\n                                  openPath,\
  \ savePath];\n             NSRunAlertPanel(@\"复制文件（并非真的复制）\", message, nil, nil,\
  \ nil);\n         }\n     }\n}\n```\n\n和之前一样，在主窗口中添加一个按钮（将这个称为“复制文件”），然后按住 Control\
  \ 键拖动到 `WLAppDelegate.h` 文件以添加一个操作。将操作命名为 `copyFile`。然后将上面的代码复制到 `WLAppDelegate.m`\
  \ 中，替换 Xcode 生成的操作存根。保存更改，点击**运行**，然后尝试新按钮。标准的打开面板会出现，接着是一个标准的保存面板。请注意，保存面板甚至具有内置功能，可以在我们选择现有文件时发出警告，并询问我们是否确实要覆盖它（请记住，在此示例中确认覆盖文件是完全安全的，因为我们实际上并没有复制任何内容）。\n\
  \n这里可能值得提一下一个不那么明显的事实：`NSOpenPanel` 实际上是 `NSSavePanel` 的子类。这意味着如果你在 `NSOpenPanel`\
  \ 的文档或头文件中找不到预期的功能，你可能也需要查看 `NSSavePanel`。\n\n\n\n## 系统菜单\n\n我们已经了解了 Cocoa 中窗口的一些基本用法，接下来让我们花点时间探讨\
  \ Mac OS X 的另一个无处不在的特性——应用程序菜单。与大多数其他现代操作系统不同，Mac OS X 将菜单放置在屏幕顶部而非每个窗口顶部。这种布局有一些显著的优点：由于无需在每个打开窗口的顶部预留横向条幅，仅需屏幕顶部的一条横向菜单即可显示当前活动应用的菜单，从而节省了屏幕空间。此外，鼠标操作菜单更加轻松快捷——我们只需将鼠标向上甩动即可定位菜单，随后只需左右微调就能找到想要选择的顶层菜单项。\n\
  \n然而，这种布局并非没有复杂性。在典型的 Windows 应用程序中，可能会有多个不同的窗口，每个窗口都有自己的菜单，菜单项仅与当前窗口内容相关。虽然在 Mac\
  \ OS X 应用程序中技术上可以实现类似功能（在不同窗口被选中时改变菜单结构），但这种做法并不被提倡，并且可能会打扰那些早已习惯 Mac 上应用行为一致性的用户。相反，我们可以实现一种完全受支持且推荐的行为：根据当前选中的窗口（或者更确切地说，窗口内当前选中的对象）来启用或禁用菜单项。在本节中，我们将演示如何实现这一点，但首先，我们将简要介绍\
  \ Cocoa 自带且大多数应用程序通用的系统菜单。\n\n## 标准应用程序菜单项\n\n苹果的指南定义了一组大多数应用程序都应包含的菜单和菜单项。在 Xcode\
  \ 中创建一个新应用程序，命名为 `MenuLab`，并使用 `ML` 作为类前缀。我们将在此进行一些菜单项实验。打开刚创建的 `MainMenu.xib` 文件，Interface\
  \ Builder 画布将显示顶部预定义的菜单集合。该集合包含应用程序自身的顶层条目，其后依次是\"文件\"、\"编辑\"、\"格式\"、\"显示\"、\"窗口\"\
  和\"帮助\"菜单，每个菜单都包含各自的项目。打开*连接检查器*检查这些项目，查看它们连接到何处。只需依次点击各个菜单项，每次点击后观察检查器。其中有一些例外，例如*显示字体*菜单项，但大多数项目都连接到了我们之前讨论过的*第一响应者*代理。请注意，将菜单项连接到*第一响应者*不仅会让该菜单项在最相关的对象中调用其操作方法，还会根据响应者链中的内容自动启用或禁用该菜单项。\n\
  \n## 自定义菜单\n\n标准菜单包含了大量功能：从调出应用程序的\"关于\"窗口，到编辑和格式化文本，再到处理窗口，所有功能都已配置完毕。然而，许多应用程序需要一些额外的功能——某些功能不适合附加到窗口，或者会占用窗口过多空间。解决这个问题的常见方法是在\"\
  显示\"和\"窗口\"菜单之间添加一个或多个额外的顶层菜单项。例如，Finder 中有一个\"前往\"菜单，Xcode 有三个额外的顶层菜单：\"导航\"、\"\
  编辑器\"和\"产品\"。在我们的应用中，只需添加一个额外的菜单即可，我们将把它添加到 MenuLab 项目中。\n\n## 使用绑定启用/禁用\n\n我们要做的第一件事是设置一对菜单项，用于控制应用委托中的布尔属性。我们可以用它们来控制某种影响应用全局设置的开关。\n\
  \n在此，我们将创建一个名为 `turbo` 的属性，它假定能让一切运行得更快（在 MenuLab 中这很容易实现，因为它实际上并不执行任何操作）。我们将创建两个菜单项，分别标记为\"\
  Turbo On\"和\"Turbo Off\"，并将它们连接到应用委托中的操作方法，以执行实际的切换。然后，我们将使用绑定来适当地启用和禁用它们，这样当 `turbo`\
  \ 为 `YES` 时，只有\"Turbo Off\"项可点击；当 `turbo` 为 `NO` 时，只有\"Turbo On\"项可点击。\n\n首先在 Xcode\
  \ 中向应用委托添加 `turbo` 属性，以及一个用于切换属性值的操作方法。我们需要对 `MLAppDelegate.h` 和 `MLAppDelegate.m`\
  \ 两个文件进行的修改如下所示（格式稍作精简，删除了空行）。我们只需添加以粗体显示的行。\n\n```\n#import <Cocoa/Cocoa.h>\n\n\
  @interface MLAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
  \ IBOutlet NSWindow *window;\n@property (assign) BOOL turbo;\n- (IBAction)toggleTurbo:(id)sender;\n\
  \n@end\n```\n\n对于 `MLAppDelegate.m`：\n\n```\n#import \"MLAppDelegate.h\"\n\n@implementation\
  \ MLAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
  \ {\n    // 在此插入代码以初始化你的应用程序\n}\n\n- (IBAction)toggleTurbo:(id)sender {\n    self.turbo\
  \ = !self.turbo;\n}\n\n@end\n```\n\n现在切换回 Interface Builder 画布中的 `MainMenu.xib`。打开\
  \ nib 文件的空白窗口，将其标题更改为\"Turbo Switch\"，然后从*对象库*中拖入一个复选框，放置好后将其标题更改为\"Turbo!\"。我们放置此复选框是为了直接查看应用委托的\
  \ `turbo` 属性中存储的值，从而轻松检查并确认菜单项行为正确。打开*绑定检查器*，配置复选框的*值*绑定，使用 `turbo` 键路径将其连接到 `MLAppDelegate`。\n\
  \n接下来，是时候创建一些菜单项了（图 11-8 展示了完成后的效果）。首先，在*对象库*中搜索\"Menu\"以缩小范围。将一个子菜单项拖入菜单，将其放置在\"\
  显示\"和\"窗口\"菜单之间。双击我们刚刚添加的新顶层菜单项，将其标题更改为\"工具\"。再次点击它会发现其中已包含一个项目（标题为\"Item\"）。点击选中它，然后按\
  \ `⌘D` 复制，会在其下方放置一个相同的项目。\n\n![9781430245421_Fig11-08.jpg](img/9781430245421_Fig11-08.jpg)\n\
  \n图 11-8. 设置用于切换布尔属性的菜单项\n\n此时，应该选中了两个新菜单项中下方的那个。双击选中标题文本，将其重命名为\"Turbo Off\"。按住\
  \ Control 键从中拖拽到主窗口中的应用委托图标，连接到 `toggleTurbo:` 操作。现在打开*绑定检查器*，配置菜单项的*已启用*绑定，使用 `turbo`\
  \ 键路径连接到应用委托。这确保了只有应用委托的 `turbo` 属性值为 `YES` 时，该菜单项才会被启用。\n\n现在回到上方的菜单项，将其重命名为\"\
  Turbo On\"，并像处理\"Turbo Off\"一样将其连接到应用委托的 `toggleTurbo:` 操作。由于此菜单项启用或禁用的条件与\"Turbo\
  \ Off\"菜单项相反，因此绑定会稍有不同。它也应该使用应用委托和 `turbo` 键路径配置*已启用*绑定，但在下方还需要指定 `NSNegateBoolean`\
  \ 作为*值转换器*。\n\n保存更改并点击**运行**。应会出现包含一个复选框的\"Turbo Switch\"窗口。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，为您翻译这段英文文本。\n\
  \n\n我们的应用应该有一个包含“Turbo 开”和“Turbo 关”两个菜单项的“工具”菜单，每次只能启用其中一个；点击已启用的菜单项应切换复选框状态并更改两个菜单项的状态，使得只有另一个菜单项被启用。此外，点击复选框应适当地影响每个菜单项的启用/禁用状态。这是一种通过绑定来启用和禁用菜单项的简单方法，但我们不能避而不谈的是，这种用法有点刻意，并非处理菜单中应用级布尔值的常规方式。在这种情况下，相比于两个菜单项（其中一个始终被禁用），你更可能使用一个带有复选框的单个菜单项来指示状态，就像我们窗口中的复选框一样。事实证明，这比我们已经做的还要容易。回到`MainMenu.xib`，在\
  \ Interface Builder 画布中打开“工具”菜单，从*对象库*中拖出一个新的菜单项到“工具”菜单上。将此新项目命名为“Turbo”，并配置其*值*绑定，使用`turbo`键路径连接到\
  \ App Delegate。这样就完成了！我们不需要通过 Control-拖拽来设置菜单项的操作；Cocoa Bindings 会为我们管理一切。保存、**运行**并进行测试。请注意，这种快速方法甚至不需要`toggleTurbo:`方法，因此如果需要，我们可以删除该方法以及“Turbo\
  \ 开”和“Turbo 关”菜单项。\n\n### 使用 First Responder 启用/禁用\n\n现在，我们将展示一种更常见的自动启用和禁用菜单项的方法，该方法为我们提供了更细粒度的控制，以便可以根据选中的窗口、窗口中选中的文本字段或其他控件等，自动更新每个菜单项的启用状态。这种方法使用响应者链，与本章前面描述的“颜色面板如何查找对象以传递所选颜色”有些类似。在这种情况下，沿着响应者链搜索的方法是`validateUserInterfaceItem:`，其声明如下：\n\
  \n```\n- (BOOL)validateUserInterfaceItem:\n    (id <NSValidatedUserInterfaceItem>)anItem;\n\
  ```\n\n如果该方法在响应者链的对象中实现，它会在适当的时候被调用来确定用户界面项（本例中为菜单项）是否应被启用。在实现此方法时，我们可以使用`anItem`获取有关即将被启用或禁用的对象的一些信息；我们可以查询它的操作（以便与我们的某个方法进行比较）和它的标签（如果我们更愿意与在对象上设置的控制标签进行比较）。通常我们只想使用操作。我们将很快演示这是如何工作的，但首先我们可能需要澄清一下这个方法何时被调用。\n\
  \n基本思路如下：每当 Cocoa 即将绘制菜单时（通常是在用户点击菜单栏时），都会对每个菜单项进行一些检查，以确定它应该被启用还是禁用。图 11-9 中的流程图粗略地概述了事件的顺序。\n\
  \n![9781430245421_Fig11-09.jpg](img/9781430245421_Fig11-09.jpg)\n\n图 11-9. 菜单系统如何决定菜单项是否应被启用\n\
  \n这一切的要点是，菜单项的目标对象（无论是显式配置的还是通过响应者链找到的）决定了菜单项当前是否应被启用。这意味着我们可以对每个菜单项进行完全动态控制。\n\n\
  通过在我们每个包含由菜单项调用的方法（无论是直接调用还是通过响应者链）的类中实现`validateUserInterfaceItem:`，我们可以定义一些逻辑，菜单系统会在适当的时候调用这些逻辑，并根据我们返回的结果自动启用或禁用每个菜单项。\n\
  \n让我们用一个例子来说明这一点。我们将在 nib 文件中创建一个新窗口，并为其匹配一个专门管理该窗口的新委托类，该类将实现`validateUserInterfaceItem:`来处理菜单项的状态。在真实的应用程序中，你可能会基于模型对象的内容来决定，但为了简单起见，我们将根据窗口中选中的内容来启用或禁用菜单项。\n\
  \n首先，在 Xcode 中创建一个新类，一个普通的`NSObject`子类，名为`MLListWindowDelegate`。为此，请选择**文件** ![image](img/arrow.jpg)\
  \ **新建** ![image](img/arrow.jpg) **文件**，然后在左侧的 OS X 标题下选择*Cocoa*。选择*Objective-C\
  \ Class*。将类名设置为`MLListWindowDelegate`，并将其设置为*NSObject*的子类。在其头文件中，在顶部添加一行`#import\
  \ <Cocoa/Cocoa.h>`，然后定义一个名为`selectedTag`的整数属性，我们稍后会将其绑定到一个 GUI 对象（添加用粗体显示的行）：\n\n\
  ```\n// MLListWindowDelegate.h\n#import <Foundation/Foundation.h>\n#import <Cocoa/Cocoa.h>\n\
  \n@interface MLListWindowDelegate : NSObject\n@property (assign) NSInteger selectedTag;\n\
  @end\n```\n\n在匹配的`MLListWindowDelegate.m`文件中，我们将实现一个`specialAction:`方法（菜单项将通过 First\
  \ Responder 代理以 target/action 方式连接到该方法），并实现`validateUserInterfaceItem:`方法。Xcode\
  \ 会自动为我们合成`selectedTag`属性的 getter 和 setter。\n\n```\n// MLListWindowDelegate.m\n\
  #import \"MLListWindowDelegate.h\"\n@implementation MLListWindowDelegate\n\n- (BOOL)validateUserInterfaceItem:\n\
  \  (id <NSValidatedUserInterfaceItem>)anItem {\n    // set the default response\
  \ to YES, in case it's not the action we care about\n    BOOL result = YES;\n  \
  \  SEL theAction = [anItem action];\n    if (theAction == @selector(specialAction:)\
  \ ) {\n        if (self.selectedTag != 13013) {\n            result = NO;\n    \
  \    }\n    }\n    return result;\n}\n\n- (void)specialAction:(id)sender {\n   \
  \ NSRunAlertPanel(@\"Boy Howdy!\",\n                    @\"That's some mighty special\
  \ action you got there!\",\n                    nil, nil, nil);\n}\n@end\n```\n\n\
  关于`validateUserInterfaceItem:`方法，我们需要指出几点。首先，请注意我们使用该项的操作（action）来确定它被点击时会调用哪个方法。在代码中，一个操作（或任何方法）可以通过\
  \ Objective-C 的`SEL`类型来引用。从技术上讲，`SEL`不是方法，而是一个“选择器”，它是方法名称的一种哈希，为了性能考虑而有所修改，Objective-C\
  \ 运行时可以用它来查找方法的实际实现。除了查找方法之外，一个`SEL`可以与另一个`SEL`进行比较，比如代码中`@selector(specialAction:)`构造返回的选择器。在我们的方法中，我们测试相关菜单项是否指向我们关心的操作方法，如果是，则进行深入检查。如果操作匹配，我们接着根据某些内部状态（以`selectedTag`属性的形式）进行简单检查，以确定是否允许启用此菜单项。如果选择器不匹配，则默认返回`YES`。\n\
  \n现在，让我们创建一个 GUI 来让这段代码工作起来。在 Interface Builder 画布中打开`MainMenu.xib`文件，然后从*对象库*中拖拽一个普通的`NSObject`到\
  \ nib 窗口（在*对象库*搜索框中搜索`NSObject`）。它将出现在屏幕左侧的对象停靠栏中。使用*身份检查器*将其类更改为`MLListWindowDelegate`。\n\
  \n\n\n接着，从*对象库*中拖出一个新窗口，并将其 `delegate` 连接口连接到我们刚刚设置的 `MLListWindowDelegate` 对象上。现在，在*对象库*中找到*单选组*，将其拖入新窗口。将此项包含在窗口中，为我们提供了一种为窗口及其委托提供某种选择的基本方法。将组的*选定标签*绑定到\
  \ `ListWindowDelegate` 的 *selectedTag* 属性。这样，每当有人点击某个单选按钮时，委托就会收到通知。现在，通过按住 Option\
  \ 键向下拖动手柄，将单选组展开以包含更多单选按钮，直到有七八个按钮为止。然后，点击中间附近的一个按钮，使用*属性检查器*将其标题更改为“特殊选择”，并将其标签改为\
  \ 13013，即我们将在代码中查找的“魔法数字”。\n\n剩下的工作就是配置一个新的菜单项，通过第一响应者调用 `specialAction:` 方法。首先，在\
  \ nib 窗口中选择第一响应者项，然后打开*属性检查器*。在这里，我们可以手动添加任何我们希望这个代理对象知道的动作方法。我们会看到一个用户定义动作的列表，起初是空的。点击\
  \ + 按钮添加我们自己的动作，并将其名称改为 `specialAction:`（别忘了冒号！）。现在是菜单项：在*对象库*中找到普通的*菜单项*，将其拖入我们之前创建的“工具”菜单中。将其标题设置为“特殊操作”，然后通过按住\
  \ Control 键拖拽到 nib 窗口中的第一响应者项，并从结果列表中选择 `specialAction:`，来配置其目标/动作。\n\n现在是时候看看实际效果了。保存工作并点击**运行**。该应用程序现在有一个新窗口，我们可以在其中选择一个单选按钮。点击几个单选按钮，每次点击“工具”顶层菜单项，看看“特殊操作”项是否启用。只有在选择了*特殊选择*按钮时，它才应该被启用。如果选择了其他单选按钮，或者选择了应用程序的其他窗口（带有\
  \ Turbo 复选框的旧窗口），则菜单项应被禁用。\n\n这个基本概念可以按你的需求任意扩展。关键在于，启用和禁用菜单项实际上非常简单。你永远不需要在应用程序中发生各种事件时手动启用或禁用单个菜单项；你只需编写当菜单项即将显示时自动调用的代码，并在那时处理它即可。\n\
  \n## 工作表\n\n本章要介绍的最后一个主题是工作表的概念。工作表只是一个临时附加到另一个窗口并以半模态方式运行的窗口，这样“另一个窗口”就不会收到任何事件。其理念是，一个应用程序可以有多个窗口，它们之间不会因用户注意力的需求而相互影响。例如，在\
  \ Mac OS X 自带的文本编辑应用程序中，你可以让“另存为”面板作为一个工作表出现在一个文档上，“打印”面板作为另一个工作表出现在另一个文档上，同时还能在第三个文档中继续打字。\n\
  \n你可能不会在你构建的每个 Cocoa 应用程序中都使用工作表，但在你的应用程序需要针对特定窗口获取某种用户输入，并且你不想使用会阻止应用程序其他部分输入的模态面板时，它们非常有用。例如，在刚刚展示的例子中，如果不使用工作表，那个“保存”面板可能会以模态方式运行，从而阻止所有其他窗口的输入，直到用户关闭它。而使用工作表，用户可以暂时搁置正在进行的保存操作，在确认保存之前与应用程序进行其他交互。\n\
  \n工作表在 Cocoa 中并不由特定的类来表示。相反，它们是以特殊方式使用的普通窗口。每个 `NSWindow` 都可以附加一个工作表，而通常以模态方式使用的每个窗口或面板也可以用作工作表。\n\
  \n让我们通过在一个名为 SheetLab 的新应用程序中将 `NSOpenPanel` 附加到一个普通窗口，来了解使用工作表的基础知识。在 Xcode 中创建一个新的\
  \ Cocoa 应用程序项目，使用 SL 作为类前缀，并将其保存为 *SheetLab*。现在，编辑 `SLAppDelegate.h`，添加一个 `openDocument:`\
  \ 动作方法：\n\n```\n#import <Cocoa/Cocoa.h>\n@interface SLAppDelegate : NSObject <NSApplicationDelegate>\n\
  @property (assign) IBOutlet NSWindow *window;\n- (IBAction)openDocument:(id)sender;\n\
  @end\n```\n\n然后编辑 `SLAppDelegate.m`，添加以下方法实现：\n\n```\n#import \"SLAppDelegate.h\"\
  \n@implementation SLAppDelegate\n- (IBAction)openDocument:(id)sender {\n    NSOpenPanel\
  \ *panel = [NSOpenPanel openPanel];\n    [panel setCanChooseDirectories:NO];\n \
  \   [panel setAllowsMultipleSelection:NO];\n    [panel setMessage:@\"请选择一个文件进行导入。\"\
  ];\n\n    // 将面板附加到文档的窗口上显示。\n    [panel beginSheetModalForWindow:self.window completionHandler:^(NSInteger\
  \ result){\n        if (result == NSFileHandlingPanelOKButton) {\n            //\
  \ 将窗口标题设置为所选文件的文件名。\n            NSArray* urls = [panel URLs];\n            NSString\
  \ *selectedFile = [[urls lastObject] lastPathComponent];\n            [self.window\
  \ setTitle:selectedFile];\n        }\n    }];\n}\n@end\n```\n\n我们在这个类中声明了一个名为 `openDocument:`\
  \ 的方法。`openDocument:` 是**文件** ![image](img/arrow.jpg) **打开**菜单项使用的动作。当用户点击**文件**\
  \ ![image](img/arrow.jpg) **打开**（或 ![images](img/arrow3.jpg)-O）时，响应者链会被遍历，直到找到一个响应对应\
  \ `openDocument:` 的对象。由于应用程序委托在响应者链中，并且应用程序中没有其他对象响应 `openDocument:`，我们的代码将被调用。`openDocument:`\
  \ 方法会获取标准的打开面板，将其设置为只允许选择一个文件（不能是目录，也不能是多选），并向面板添加一条消息。然后，它使用 `beginSheetModalForWindow:completionHandler:`\
  \ 方法，告诉面板以模态方式附加到一个窗口上运行（使用 `window` 属性）。此方法的第二个参数是一个 Objective-C *块*，这是我们之前没有接触过的新概念。它指定了面板运行完成后应执行的操作。在这种情况下，如果用户选择了文件并点击了确定，我们将获取所选文件的\
  \ URL，然后将窗口的 `title` 设置为路径的最后一部分，也就是文件名本身。\n\n**注意**  *块*代表一段代码（除此之外还有其他用途），它可作为参数传递给方法。在其他语言中，它被称为*闭包*或*lambda*。在\
  \ Cocoa 中，使用块（而非传递指向回调函数的指针）正变得越来越普遍。块可以访问声明时作用域内的所有变量，并且具有在使用点声明的优势。块是在 OS X 10.6\
  \ 和 iOS 4 中引入的。你可以在 Xcode 中的 Apple 开发者文档中，或访问 `https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html#//apple_ref/doc/uid/TP40007502`\
  \ 了解更多关于块的信息。\n\n保存更改，点击**运行**，应用程序将启动。按下 ![images](img/arrow3.jpg)-O 会弹出模态打开面板，并作为工作表附加在应用程序窗口之上。当我们选择一个文件时，窗口的名称将设置为该文件的名称！\n\
  \n## 总结\n\n本章介绍了 Cocoa 图形用户界面体验的几个关键部分，以及一些关于如何使用响应者链的示例。这些特性对于制作专业品质的 Mac 应用程序至关重要。Mac\
  \ 用户在应用程序在无正当理由的情况下使用非标准行为时往往相当苛刻，因此，了解如何以用户熟悉的方式处理窗口和菜单非常重要。\n\n\n\n# 文档排版结果\n\n\
  在下一章中，我们将基于这些知识探索 Cocoa 中用于处理文档及其关联窗口的类。\n\n## 第 12 章 基于文档的应用程序\n\n到目前为止，我们在本书中构建的应用程序都有一个共同的重大缺陷：它们都以某种“全有或全无”的方式工作。我们要么在应用程序使用的唯一后端存储中拥有一份特定的数据（如果它使用了存储的话），要么在没有任何地方拥有它。这些应用都没有任何概念允许我们将数据分割成离散的、不相关的存储单元——即我们所说的“文档”。虽然将所有内容放在一个数据库中对于某些目的来说是有益的，但对于其他目的来说却是一个巨大的障碍。如果我们只想与他人分享我们数据的一部分呢？如果我们希望能够并排查看多个相同类型的\
  \ Core Data 实体的详细信息，以便相互比较呢？大多数人对于这些可能性并不陌生，因为他们使用过任何现代应用程序，这些应用程序可以同时打开多个文档，且对一个文档的操作不会影响其他文档。\n\
  \n事实证明，Apple 的工程师们多年前就考虑到了这一点，并将文档支持直接内置到 Cocoa 中，其核心是`NSDocument`和`NSDocumentController`类。Cocoa\
  \ 的文档架构让我们能够访问大量原本需要我们自己构建的基础设施，例如管理窗口及其标题栏、处理打开面板和保存面板等。如果你在应用程序中使用了 Core Data，它甚至会自动处理实际的打开和保存操作，因此你的应用程序代码甚至不需要接触文档文件。\n\
  \n本章将介绍如何创建一个基于文档的 Cocoa 应用程序的基础知识，包括使用 Core Data，我们将通过创建一个名为 ColorMix 的应用程序来学习。ColorMix\
  \ 允许用户使用标准的系统颜色面板选择两种颜色，然后显示一个颜色样本网格，展示将这两种颜色混合在一起的不同方法。每组选定的两种颜色（以及其 15 种混合颜色）都可以保存在一个文档中，该文档就像任何其他文件一样，可以保存在你喜欢的任何位置，并在以后重新打开。除了学习\
  \ Cocoa 如何处理文档之外，我们还将构建一个简单的视图类来绘制彩色矩形，并在我们的代码中与 Core Data 进行交互。图 12-1 展示了 ColorMix\
  \ 应用程序完成后的外观。\n\n![9781430245421_Fig12-01.jpg](img/9781430245421_Fig12-01.jpg)\n\
  \n图 12-1 . ColorMix 应用程序的完成界面\n\n如果你使用过 Photoshop 或 Gimp 等图形软件，你可能对这些混合模式中的一些比较熟悉。每种模式都使用特定的公式，取两种颜色的红色、绿色和蓝色分量，并产生一个输出颜色。我们不会在此处描述这些混合模式，但你可以在`http://en.wikipedia.org/wiki/Blend_modes`和其他地方找到它们的详细描述和示例。我们在这里要做的是展示如何构建一个应用程序，让用户以动手的方式探索所有这些模式，一次选择两种颜色。\n\
  \n我们将使用的混合模式都内置在 Core Graphics 中，这是 Cocoa 图形架构的一个重要部分，我们将在第 13 章中详细讨论。使用这种内置功能让我们无需自己进行任何颜色计算；我们只需要调用\
  \ Core Graphics 函数来设置混合模式并绘制矩形。\n\n## 创建 ColorMix 应用程序\n\n首先在 Xcode 中创建一个新应用程序，使用新建项目助手中的\
  \ *OS X / Application* 部分的 *Cocoa Application* 模板。点击 *Next* 后，将新应用程序命名为 *ColorMix*，并将类前缀设置为\
  \ `CM`。\n\n新应用程序将同时使用`NSDocument`架构和 Core Data，因此我们需要在创建应用程序时正确配置项目。确保 *Create Document-Based\
  \ Application* 和 *Use Core Data* 复选框都被选中。请注意，启用文档复选框也会激活 *Document Extension* 文本字段。这让我们可以设置应用程序在保存文件时将使用的默认文件扩展名。在此处也输入\
  \ `ColorMix`，以便我们可以轻松识别我们创建的文档。\n\nColorMix 应用程序将有一些我们之前从未见过自动创建的项目。特别是，它有一个名为`CMDocument`的类（`NSPersistentDocument`的子类，而`NSPersistentDocument`本身是`NSDocument`的子类，我们稍后会解释这两个类），以及一个匹配的\
  \ *CMDocument.xib* 资源。这是两个关键元素，我们将扩展它们以定义我们文档的行为和外观。除此之外，我们还会看到一个模型文件，我们将在其中设置此应用程序的\
  \ Core Data 实体和属性信息。\n\n## 检查默认的 Nib 文件\n\n在我们开始创建任何内容之前，在 Interface Builder 中打开\
  \ *MainMenu.xib* 文件。注意这个 nib 文件与我们之前创建的每个其他 *MainMenu.xib* 文件相比有什么不同吗？它不包含任何窗口！打开文件会显示各种代理对象、菜单本身，仅此而已。这是另一个线索，表明我们在创建基于文档的应用程序时正在处理一种不同类型的“生物”，因为这样的应用程序（例如\
  \ Xcode、Microsoft Office、Garage Band 等）通常没有“主窗口”的概念，而是将应用程序的主体部分放入一个或多个文档窗口中。\n\n\
  打开连接检查器（Connections Inspector），花点时间点击一些菜单项，看看它们是如何连接起来的。*File* 菜单中的许多项都连接到 *First\
  \ Responder*，调用的动作名称中包含单词“document”（例如`newDocument:`、`openDocument:`等）。事实证明，其中几个动作是在`NSDocumentController`类中实现的。这是一个特殊的类，在运行时有一个共享实例，用于管理应用程序的所有打开的文档。我们不会在这个\
  \ nib 文件或任何其他地方看到这个共享实例，甚至看不到它的代理。`NSApplication`在应用程序启动期间创建此对象，并将其添加到响应者链中，以便它可以处理这些动作。\n\
  \n查看一番之后，我们可以基本上忽略这个应用程序的 *MainMenu.xib*，因为我们再也不需要打开它了。请记住，里面唯一真正的内容是菜单，并且大多数菜单项都连接到\
  \ *First Responder* 上的动作，这意味着它们会在适当的时候找到通往相关窗口控制器或共享的`NSDocumentController`的路径。\n\
  \n现在打开 *CMDocument.xib*，看看它提供了什么。一个`NSWindow`等着我们去填充一些内容，如果我们打开身份检查器（Identity Inspector），我们会看到\
  \ *File’s Owner* 是`CMDocument`的一个实例。除此之外，它是一张空白画布，我们稍后将在这上面留下我们的印记。\n\n## 定义模型\n\
  \n在我们开始构建任何类型的图形用户界面之前，让我们先创建用于表示文档的数据模型。这是一个极其简单的模型，包含一个具有两个属性的单一实体。我们将在每个文档中只创建该实体的一份实例，但你在本章中学到的关于文档的所有内容同样适用于大型、复杂的数据模型。\n\
  \n打开 *CMDocument.xcdatamodeld*。创建一个实体并将其命名为 *ColorSet*。保持新实体处于选中状态，创建一个属性，将其命名为\
  \ *color1*，将其类型设置为 *Transformable*，然后点击取消选中 *Optional* 复选框。\n\n\n\n接下来，创建第二个属性，命名为\
  \ `color 2`，并像第一个属性一样配置它：类型为 `Transformable`，且取消勾选 `Optional`。这两个属性代表用户将为每个文档选择的两种颜色。它们各自包含一个\
  \ `NSColor` 实例，而 `NSColor` 不属于 Core Data 支持的数据类型，因此需要按照第 8 章所述，使用 `Transformable`\
  \ 类型。保存模型，这部分工作就完成了。这真是个极其简单的模型，不是吗？\n\n## 设置两种颜色\n\n现在该开始构建图形用户界面了。记住，这发生在文档窗口中，因此请切换回\
  \ Interface Builder 中的 `CMDocument.xib`。默认窗口包含一个 `NSTextField`（内容为“Your document\
  \ contents here”），在继续之前，我们应该将其删除。接下来，我们要向 nib 文件中添加一个 `NSObjectController`，用它来连接一些\
  \ GUI 对象与底层文档。请按照以下步骤进行设置。\n\n使用库面板找到 `NSObjectController`，将其拖拽到 Dock 区，它会和 `File’s\
  \ Owner`、`Window` 以及其他顶层对象并列。选中这个新对象（现在标签名为“Object Controller”），打开**属性检查器**。检查器最顶部是\
  \ `Mode` 下拉菜单，将其从 `Class` 改为 `Entity Name`，然后在下方出现的 `Entity Name` 字段中输入“ColorSet”。\n\
  \n保持新添加的 `Object Controller` 处于选中状态，切换到**绑定检查器**。我们需要告诉这个控制器从哪里获取数据，方法是将其 `managedObjectContext`\
  \ 绑定到一个合适的值。因此，请在 `Parameters` 标题下找到 `Managed Object Context` 项。如果该绑定的详情不可见，请点击其展开三角形以显示它们。使用\
  \ `Bind To` 下拉菜单选择 `File’s Owner`，然后在 `Model Key Path` 文本字段中输入“managedObjectContext”，并按\
  \ `Enter` 键创建绑定。对这个对象控制器的最后一步操作是：在 Dock 区选中它，并将其名称改为“colorset”。这不会改变应用运行时的任何内容，但能为将来查看此\
  \ nib 的程序员（很可能就是你自己；从现在开始记录文档，你以后会感谢自己的）增加一些清晰度。\n\n## 最简单的图形用户界面\n\n现在该构建一个简单的\
  \ GUI 了，它让我们能够查看 `ColorSet` 对象的核心细节，也就是它包含的两种颜色。使用**库**找到 `UILabel` 对象，将其拖入我们的 `Window`。选中它的文本，将其改为\
  \ `Mix Color 1`。然后按 `![images](img/arrow3.jpg)D` 复制该标签，将其稍微移开一点，并将其文本改为 `Mix Color\
  \ 2`。现在，在**库**中找到一个 `NSColorWell`，将其拖拽到我们正在构建的文档窗口中。放置好后，按 `![images](img/arrow3.jpg)D`\
  \ 复制它，然后重新排列标签和颜色选择器，使其看起来像图 12-2 所示。\n\n![9781430245421_Fig12-02.jpg](img/9781430245421_Fig12-02.jpg)\n\
  \n图 12-2 .  用于选择两种颜色的最低限度 GUI\n\n现在选中左侧的颜色选择器，打开**绑定检查器**，配置其 Value 绑定，使其使用 `colorset`\
  \ 控制器，控制器键为 `selection`，模型键路径为 `color1`。选中右侧的颜色选择器，配置其 Value 绑定，使其也使用 `colorset`\
  \ 控制器，控制器键为 `selection`，但这次模型键路径为 `color2`。保存工作，然后点击**运行**按钮。应用启动了，一个新且空白的“Untitled”文档窗口出现了，但颜色选择器竟然不可点击！我们急于让某些内容显示在屏幕上，却忽略了创建一个非常重要的东西：一个模型对象！\n\
  \n## 创建默认的 ColorSet\n\n我们需要做的是编写一些代码，使得每当创建新文档时，都能向对象控制器中插入一个新的 `ColorSet` 对象。\n\
  \n我们将在 `CMDocument` 类中实现此功能，通过添加一些方法来访问我们添加到 nib 文件中的对象控制器，并跟踪文档是从头创建还是从文件加载的。选择将要添加这些新代码的\
  \ `CMDocument.m` 文件。首先，我们要添加一个属性，一个名为 `objectController` 的出口，用于指向我们一两页前放入 nib 文件中的\
  \ `NSObjectController`。我们不将其添加到头文件中，而是可以使用 *类扩展* 在 `.m` 文件中声明此属性。类扩展看起来就像类目声明，但括号内没有类目名称。在\
  \ `@implementation` 块之前添加以下代码：\n\n``` \n@interface CMDocument () \n@property (weak)\
  \ IBOutlet NSObjectController *objectController; \n@end \n```\n\n任何我们可以在类的 `@interface`\
  \ 块中声明的内容（实例变量、属性、方法等），都可以改为在类扩展中声明。这样做的好处是保持类接口的整洁。我们可以选择只公开其他类真正需要的部分，而将剩余部分作为仅在类内部使用的私有\
  \ API。\n\n我们还将添加一个实例变量，一个名为 `isNew` 的 `BOOL` 类型变量，用来跟踪每个文档是刚刚创建的，还是从文件加载的。遵循刚才使用类扩展时信息隐藏的思路，我们将揭示另一个巧妙的技巧：实例变量可以在类的\
  \ `@implementation` 块中声明，而不是在头文件的 `@interface` 中。通过添加下面加粗的代码来实现这一点：\n\n``` \n@implementation\
  \ CMDocument { \n    BOOL isNew; \n} \n```\n\n现在，快速浏览这个 `.m` 文件的其余部分。该文件包含一些现成的方法，并附有注释说明我们可以在哪里扩展它们的行为。我们将在\
  \ `init` 和 `windowControllerDidLoadNib:` 方法中实现一些功能，同时还将实现 `initWithType:error:`\
  \ 方法，稍后我们会解释这个方法。这里预定义的方法都来自 `NSDocument`，它为我们处理了大部分与文档相关的功能。然而，`CMDocument` 的直接父类是\
  \ `NSPersistentDocument`，它实现了额外的功能，用于将文档存储为 Core Data 存储后端。首先，添加这个方法：\n\n``` \n\
  - (id)initWithType:(NSString *)typeName error:(NSError **)outError { \n  if (self\
  \ = [super initWithType:typeName error:outError]) { \n    isNew = YES; \n  } \n\
  \  return self; \n} \n\n- (NSString *)windowNibName { \n    return @\"CMDocument\"\
  ; \n} \n```\n\n然后，将下面加粗的行添加到 `windowControllerDidLoadNib:` 方法中：\n\n``` \n- (void)windowControllerDidLoadNib:(NSWindowController\
  \ *)windowController { \n    [super windowControllerDidLoadNib:windowController];\
  \ \n    // 在此处添加任何需要在 windowController 加载了文档窗口之后执行的代码。\n    if (isNew) { \n    \
  \    id newObj = [_objectController newObject]; \n        [newObj setValue:[NSColor\
  \ redColor] forKey:@\"color1\"]; \n        [newObj setValue:[NSColor yellowColor]\
  \ forKey:@\"color2\"]; \n        [_objectController addObject:newObj]; \n    } \n\
  } \n```\n\n这些加粗的代码片段在创建新文档时执行。第一个方法 `initWithType:error:` 仅当从头开始创建新文档时才会被调用。这是理想情况下我们想要初始化模型对象的地方，但所有对模型对象的访问都通过\
  \ `NSObjectController` 来中介，而这个控制器在 nib 文件中，此时 nib 文件尚未加载。因此，我们只需将 `isNew` 标志设置为\
  \ `YES`，然后继续。稍后，在 `CMDocument` 的 nib 文件加载完成后，会调用 `windowControllerDidLoadNib:` 方法。在这里，我们使用\
  \ `objectController` 创建一个新的模型对象，为其两个属性设置值，然后将这个新对象添加到控制器中。\n\n\n\n至此，剩下的工作就是将 *CMDocument.xib*\
  \ 中 `CMDocument` 的 `objectController` 输出口连接起来。回到那里，按住 Ctrl 键从 *File*’*s Owner* 拖拽到颜色集对象控制器，然后选择\
  \ `objectController` 输出口。保存工作，接着点击**运行**按钮。两个颜色井中的红色和黄色应该可见，点击其中一个会弹出颜色面板，让我们可以更改颜色。不仅如此，现在通过菜单可以完整使用文档功能。我们能够保存文档、关闭文档、访问最近使用的文档、打开文档等等。\n\
  \n## 确定文件格式\n\n做到这一步，你可能已经注意到，保存文档时，会有一个弹出列表让你选择将文件保存为*二进制*、*SQLite* 或 *XML* 格式，文件扩展名也会相应设置。虽然这种灵活性在开发期间可能有点用，但对于一个发布的成品应用，最好只选择一种格式并坚持使用，以免让用户感到困惑。总的来说，对于大多数应用，SQLite\
  \ 可能是最佳选择。你还应该将文件扩展名改为能体现应用用途的名称，而不是使用默认扩展名。所有这些选项都在 Xcode 的 Target 设置中配置。回到 Xcode，在导航窗格中选择最顶层的\
  \ `ColorMix` 组，点击 `ColorMix` target，然后点击视图顶部的 Info 选项卡查看 target 设置。展开 *Document\
  \ Types* 组，会看到一个视图，其中包含所有三个预配置的文件格式。删除*二进制*和 *XML* 选项（使用每个版块右上角的“x”按钮），只保留 *SQLite*\
  \ 选项。通过编辑 *Extensions* 列中显示的值，将此保留格式的文件扩展名改为 `ColorMix`。现在保存工作，构建并运行，然后保存一个颜色集，验证我们已无法选择保存为哪种文件格式。\n\
  \n## 添加色彩\n\n现在文档功能都正常工作了，但我们拥有的是一个非常无聊的应用，完全没有任何有趣的功能。让我们让应用完成本章开头承诺的功能：使用所有 Core\
  \ Graphics 预定义的混合模式，显示由两种选定颜色混合而成的一系列颜色。\n\n为此，我们将创建一个名为 `CMColorBlendView` 的新类，它直接继承自\
  \ `NSView`。在 `NSView` 子类中通常会做的主要事情之一就是重写 `drawRect:` 方法，以精确指定要绘制的内容。我们正是要这样做，并用混合后的颜色填充每个视图。为了进行混合，每个\
  \ `CMColorBlendView` 实例需要知道使用哪种混合模式以及要混合哪两种颜色。我们将手动为每个 `CMColorBlendView` 设置混合模式，但两种颜色的值将通过\
  \ Cocoa Bindings 填充，这样一旦用户更改了选定的颜色之一，窗口中所有的 `CMColorBlendView` 对象都会立即重绘。\n\n## `CMColorBlendView`\
  \ 类\n\n首先在项目中创建一个新类。在 *New File* 助手中，从 OS X - *Cocoa* 部分选择 *Objective-C class*，然后点击\
  \ Next。将新类命名为 `CMColorBlendView.m`，并使其成为 `NSView` 的子类。\n\n现在编辑 `CMColorBlendView.h`，添加下面代码中加粗的行：\n\
  \n```objective-c\n#import <Cocoa/Cocoa.h>\n\n@interface CMColorBlendView : NSView\n\
  \n@property (strong, nonatomic) NSColor *color1;\n@property (strong, nonatomic)\
  \ NSColor *color2;\n@property (assign, nonatomic) CGBlendMode blendMode;\n\n@end\n\
  ```\n\n这为我们的类提供了两个 `NSColor` 对象（将由 Cocoa Bindings 填充），以及一个 `CGBlendMode`（将在 `MyController`\
  \ 类加载 nib 文件时设置）。\n\n我们为所有这些属性使用了 `nonatomic` 关键字，这是一种声明方式，表明这些属性的 getter 和 setter\
  \ 不会采取额外的线程安全预防措施。由于我们知道这个简单应用中的所有代码都仅在主线程上使用，因此使用 `nonatomic` 足够安全，并且性能略好。\n\n\
  现在切换到 `CMColorBlendView.m`，我们要做的第一件事是为已声明的属性定义方法。本书之前声明的大多数属性都是通过显式的 `@synthesize`\
  \ 行来创建方法的，但这里情况有点特殊，因为我们希望视图在每次属性值发生变化时都重绘。所以我们将为每个属性提供显式的 setter 方法。如果存在显式方法，它们总是会取代任何合成的方法。实际上，这也引出了我们在属性声明中使用\
  \ `nonatomic` 的另一个原因：如果没有它，编译器不太允许我们将合成的 getter 与显式的 setter 混合使用，因此会产生警告。\n\n在完成所有这些新工作的同时，我们将介绍\
  \ LLVM 编译器中的一项新功能。任何时候我们在接口中声明一个属性，实际上可以完全省略 `@synthesize` 行！如果这样做，编译器仍然会为我们创建一个实例变量，其名称将是属性名前加下划线。我们可以在下面的代码中看到这一点，这些代码应添加到类的\
  \ `@implementation` 部分：\n\n```objective-c\n// 将这些放在 @implementation 块的开头\n- (void)setBlendMode:(CGBlendMode)bm\
  \ {\n    if (_blendMode != bm) {\n        _blendMode = bm;\n        [self setNeedsDisplay:YES];\n\
  \    }\n}\n- (void)setColor1:(NSColor *)c {\n    if (![c isEqual:_color1]) {\n \
  \       _color1 = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n- (void)setColor2:(NSColor\
  \ *)c {\n    if (![c isEqual:_color2]) {\n        _color2 = c;\n        [self setNeedsDisplay:YES];\n\
  \    }\n}\n```\n\n有一点需要注意：`[self setNeedsDisplay:YES]` 调用。我们将在后续涉及 Cocoa 绘图的章节中更详细地讨论这一点，但基本思想是：当我们要在\
  \ `NSView` 中绘制某些内容时，调用此方法，它会设置一个标记，当我们的应用处理完当前正在处理的任何事件后，它会遍历打开的窗口，检查是否有窗口被标记为需要重绘，这最终会导致调用\
  \ `drawRect:` 方法。\n\n说到这个，我们在这个类中需要实现的另一个方法就是 `drawRect:` 方法本身。\n\n```objective-c\n\
  - (void)drawRect:(NSRect)dirtyRect {\n  // 如果没有两个有效的颜色，则不绘制任何内容。\n  if (!self.color1\
  \ || !self.color2) return;\n\n  CGColorRef cgColor1 = genericRGBWithNSColor(self.color1);\n\
  \  CGColorRef cgColor2 = genericRGBWithNSColor(self.color2);\n\n  CGContextRef myContext\
  \ = [[NSGraphicsContext currentContext] graphicsPort];\n  CGContextSaveGState(myContext);\n\
  \n  CGContextSetFillColorWithColor(myContext, cgColor1);\n  CGContextSetBlendMode(myContext,\
  \ kCGBlendModeNormal);\n  CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
  \n  CGContextSetFillColorWithColor(myContext, cgColor2);\n  CGContextSetBlendMode(myContext,\
  \ self.blendMode);\n  CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
  \n  CGContextRestoreGState(myContext);\n\n  CGColorRelease(cgColor1);\n  CGColorRelease(cgColor2);\n\
  }\n```\n\n不要过于纠结这里的细节。只要阅读注释并相信代码正在执行注释所说的事情就足够了。在学习了后面一些涉及图形的章节后，这会变得更有意义。现在要注意的是，在我们完成下一步之前，这段代码会产生一些编译器错误。\n\
  \n\n\n为了这个类能够正常工作，最后需要添加一个转换例程，以便用户从颜色面板中选择的`NSColor`可以转换为 Core Graphics 函数所需的`CGColorRef`。由于某些原因，Cocoa\
  \ 并未提供任何一行就能完成此转换的函数或方法调用，但以下函数可以很好地完成这项工作。将此函数插入到`.m`文件的顶部附近，位于`drawRect:`方法之上即可。不过为了保持结构清晰，我们建议将其放在`@implementation`块的正上方，以明确该函数并非类的一部分。\n\
  \n``` static CGColorRef genericRGBWithNSColor (NSColor *color) {  \n    CGColorRef\
  \ cgColor = NULL;    \n    NSColorSpace *nsColorSpace = [NSColorSpace genericRGBColorSpace];\
  \  \n    NSColor *deviceRGBColor = [color colorUsingColorSpace: nsColorSpace]; \
  \ \n    if (deviceRGBColor != nil) {  \n        CGFloat components[4];  \n     \
  \   [deviceRGBColor getRed: &components[0] green: &components[1]  \n           \
  \               blue: &components[2] alpha: &components[3]];  \n        cgColor\
  \ = CGColorCreate([nsColorSpace CGColorSpace], components);  \n    }    \n    return\
  \ cgColor;  \n} ```\n\n至此，`CMColorBlendView`类就完成了。保存工作并点击`Build`，它应能顺利编译。我们要求你现在点击`Build`只是为了确保到目前为止没有输入错误；我们尚未设置\
  \ GUI，因此现在点击`Build & Run`没有意义。\n\n## 向 GUI 中添加混合色\n\n现在是为文档窗口添加混合色样块的时候了。首先，在`CMDocument.h`文件中为每个样块添加一个`outlet`。此处显示的每个新`outlet`最终都将连接到`CMColorBlendView`的一个实例。我们还在顶部附近添加了一行`@class`声明，它告诉编译器下一个标记（`CMColorBlendView`）是一个类的名称。这足以让编译器处理指向该类实例的实例变量和方法参数，而无需导入该类的头文件。在头文件中始终使用这些前向声明而不是`#import`，可以略微缩短编译时间，并使头文件更稳健，因为它们之间的依赖关系更少。然而，在实现文件中，当我们调用这些类的方法时，则需要导入头文件。\n\
  \n``` #import <Cocoa/Cocoa.h>  \n@class CMColorBlendView;  \n\n@interface CMDocument\
  \ : NSPersistentDocument  \n\n@property (weak) IBOutlet CMColorBlendView *multiplyBlendView;\
  \  \n@property (weak) IBOutlet CMColorBlendView *screenBlendView;  \n@property (weak)\
  \ IBOutlet CMColorBlendView *overlayBlendView;  \n@property (weak) IBOutlet CMColorBlendView\
  \ *darkenBlendView;  \n@property (weak) IBOutlet CMColorBlendView *lightenBlendView;\
