  ## 创建应用程序图标


  所有应用程序都需要一个图标。Mac OS X 为图标使用了一种特殊格式，该格式将多个图像打包在一起，以便在缩放时和为配备 Retina 显示屏的设备提供多种尺寸和分辨率的图像。不过，Xcode
  会为我们准备这种格式。我们只需要恰当地命名图像，并将它们放入一个扩展名为 `.iconset` 的文件夹中。


  命名约定相当简单直接。一个示例图像名称是 `icon_128x128@2x.png`。每个图像的名称以 `icon_` 开头，后跟分辨率，再后跟一个可选的标记以指示高分辨率素材，最后是文件扩展名，例如
  `.png`。Cocoa 使用的全套尺寸是 16 × 16、32 × 32、128 × 128、256 × 256 和 512 × 512。每一个都可以选择加上
  `@2x` 的高分辨率标记。请注意，尺寸是以屏幕点为单位，而不是像素；一个 512 × 512 的 `@2x` 文件的实际像素尺寸是 1024 × 1024 像素。Cocoa
  知道我们的应用是否运行在配备 Retina 或其他高分辨率显示屏的机器上，并将根据屏幕像素密度和所需尺寸选择最佳的位图。


  如果我们没有提供 Cocoa 所需的图像，它会缩放我们提供的某个图像。我们可以提供一个细节丰富的超大图像，用于在配备 Retina 显示屏的 Mac 上运行，但这可能看起来不完全是我们想要的样子。对多个图像的支持意味着我们可以定制图标在较小尺寸下的显示效果。


  我们需要在图像编辑程序（如 Photoshop、Pixelmator 或 GIMP）中创建我们的图标。原始文件尺寸应为 1024 × 1024 像素，并保存为支持
  Alpha 通道（透明度）的标准图像格式，例如 TIFF、PSD 或 PNG。在本示例中，我们使用的是 `.png` 文件。我们将其保存为 `icon_512x512@2x.png`。然后，我们可以使用任何最有效的方法来缩小图像。通常的做法是使用图像编辑器的调整大小功能，然后根据需要进行手动清理。


  为免去您自行创建图标的麻烦，我们提供了一个包含图像的 `hello world.iconset` 文件夹，您可以将它添加到您的项目中。您可以在第 2 章的下载项目文件中找到这个文件夹。如果您想自己创建，请继续，使用
  `hello world.iconset` 文件夹中相同的命名约定来命名您的图像。


