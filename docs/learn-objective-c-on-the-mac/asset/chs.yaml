  ## 总结


  在本章中，我们学习了如何使用插座和操作将对象相互连接，了解了一些关于 OS X 框架的背景知识，并获得了在 Xcode 中布局用户界面的更多实践。插座和操作是构建
  Cocoa 应用程序的基本概念，在接下来的章节中我们将进行大量按住 Control 键拖拽的操作。然而，这可能还不太像编程。你的耐心即将得到回报，因为在下一章中，我们将实际编写一些代码，实现我们自己的操作方法，并了解如何将
  Cocoa 界面对象连接到我们自己的代码，而不仅仅是相互连接。


  '
- "# 第 4 章\n\n## 行动的号角\n\n正如我们在前两章中所见，Cocoa 免费提供的所有功能确实令人惊叹。\n\n\n\n## 输出口与操作\n\n\
  但在前两个应用中，缺少了一个大多数应用都需要的非常重要的功能：与用户交互的能力。上一章我们在 Interface Builder 中看到，有一个完整的库，里面装满了文本字段和按钮之类的对象，我们可以用它们来组装界面，但如果无法得知这些界面对象何时被使用或更改它们包含的数据，它们就毫无用处。在本章中，我们将了解如何通过这些对象的输出口和操作，让用户与我们的应用进行交互。\n\
  \n### 声明输出口与操作\n\n回顾上一章的内容，Cocoa 使用所谓的*输出口*和*操作*来连接用户界面中的对象和我们代码中的对象。输出口是我们 nib\
  \ 文件中指向对象的指针，它允许我们的代码访问和操作 nib 中的对象。操作是我们编写的方法，可以直接响应用户交互而执行，例如点击按钮或用户选择菜单项。输出口和操作通常包含在我们的控制器类中（尽管有时也会在其他地方使用）。\n\
  \n#### 声明输出口\n\n输出口是 Objective-C 的实例变量，使用一个特殊关键字 `IBOutlet` 声明。输出口是一个指针，可以链接到用户界面中的对象。因此，例如，我们的控制器类可以像这样声明一个指向可编辑文本字段的输出口：\n\
  \n```objc\n@property (weak) IBOutlet NSTextField *nameField;\n```\n\n在这个例子中，就我们的代码而言，`nameField`\
  \ 是一个指针，指向我们在 Interface Builder 中链接到的任何文本字段。它的行为与我们自己分配和初始化的对象指针完全相同。一旦输出口链接到一个对象，我们就可以检索或设置其值、隐藏它、禁用它，或者执行该对象支持的任何其他操作。稍后我们将看到如何在\
  \ nib 文件中建立输出口和对象之间的链接。\n\n属性 `(weak)` 包含在 Xcode 在 `.h` 文件中生成输出口代码中。它意味着控制器不“拥有”\
  \ `nameField`；该 `nameField` 可能会被释放，如果发生这种情况，该属性将设置为 `nil`。属性上还可以设置其他属性，涉及内存语义和命名。当我们手动添加属性时，我们需要熟悉可用于注释它们的各种属性。目前，只需保留\
  \ Xcode 生成的方式即可。\n\n你可以在 Mark Dalrymple 和 Scott Knaster 合著的第二版 *Learn Objective-C\
  \ on the Mac*（Apress, 2012）以及 *The Objective-C Programming Language* 一书中了解更多关于新的\
  \ Objective-C 属性的信息，后者可在 Xcode 和 Apple 开发者网站 `https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/ObjectiveC/ObjC.pdf`\
  \ 上找到。\n\n#### 声明操作\n\n如前一章所述，操作是可以直接从应用用户界面调用的 Objective-C 方法。我们的对象中的操作通过在 Interface\
  \ Builder 中从用户界面控件拖拽到我们代码中的方法来连接到用户界面。\n\n操作的创建方式与其他 Objective-C 方法完全相同，但它们必须符合特定的结构。特别是，操作方法声明必须如下所示：\n\
  \n```objc\n-(IBAction)doSomething:(id)sender;\n```\n\n方法的名称可以是任何我们想要的，但返回类型必须是 `IBAction`，并且该方法必须接受一个类型为\
  \ `id` 的参数，它将是指向触发该操作的对象的指针。如果此方法因用户点击按钮而被调用，那么 `sender` 将是指向所按下按钮的指针。一个操作可以是多个用户界面对象的目标，并且\
  \ `sender` 参数让我们知道使用了哪个控件。\n\n**注意** 操作方法是一个 Cocoa 和 Cocoa Touch 存在差异的领域。\n\n在 Cocoa\
  \ Touch 中，操作方法可以具有三种不同的方法签名之一，分别接受零个、一个或两个参数。但这不适用于 Cocoa 中的操作，后者必须且只能接受一个参数。\n\n\
  ## 但它们到底是什么？\n\n`IBAction` 和 `IBOutlet` 到底是什么？它们是 Objective-C 语言的一部分吗？\n\n不，它们只是老式的\
  \ C 预处理器宏。如果我们进入 `AppKit.framework` 并查看 `NSNibDeclarations.h` 头文件，我们会发现它们是这样定义的：\n\
  \n```c\n#ifndef IBOutlet\n#define IBOutlet\n#endif\n#ifndef IBAction\n#define IBAction\
  \ void\n#endif\n```\n\n困惑吗？这两个关键字对编译器来说绝对没有任何作用。`IBOutlet` 在编译器看到它们之前就被完全从代码中删除了。`IBAction`\
  \ 解析为一个 `void` 返回类型，这只是意味着操作不返回值。那么，这是怎么回事？\n\n答案其实很简单：`IBOutlet` 和 `IBAction` 不是给编译器用的。它们是给\
  \ Interface Builder 用的。Interface Builder 使用这些关键字来解析可用的输出口和操作。Interface Builder 只能看到以\
  \ `IBAction` 开头的方法，以及以 `IBOutlet` 开头的变量或属性。此外，这些关键字的存在告诉将来查看我们代码的其他程序员，所涉及的变量和方法并非完全通过代码处理。他们需要深入研究相关的\
  \ nib 文件，才能了解事物是如何连接和使用的。\n\n## 输出口与操作实际运用，第二幕\n\n没有什么比实际操作更能理解这些概念了，因此我们将编写另一个\
  \ Cocoa 应用。在这个应用中，我们将自己编写一些代码。设置新项目的步骤与上一章中使用的步骤相同，所以应该会感觉很熟悉。实际上，我们每次创建新项目时都会重复这些步骤。\n\
  \n如果你不在 Xcode 中，请重新打开它。现在，按下 `![image](img/arrow1.jpg)N` 或从**文件**菜单中选择**新建项目**。再次选择*Cocoa\
  \ 应用*模板。确保*Core Data* 和*基于文档的应用*复选框已关闭，*使用自动引用计数*复选框已打开，并在提示输入项目名称时，输入\"Chapter4\"\
  （图 4-1）。对于此示例，我们将使用 `Buttons` 作为类前缀设置。再次点击下一步，并为项目选择一个文件夹。点击创建，Xcode 会带我们进入项目设置面板。Xcode\
  \ 还为我们生成了一个名为 `ButtonAppDelegate` 的类和一个名为 `MainMenu.xib` 的 nib 文件。\n\n![9781430245421_Fig04-01.jpg](img/9781430245421_Fig04-01.jpg)\n\
  \n图 4-1. 在 Xcode 中设置新 Cocoa 应用的初始属性\n\n我们将从布局界面开始，因此在*导航器*窗格中单击 `MainMenu.xib`。这将在\
  \ Interface Builder 编辑窗格中打开 nib 文件（图 4-2）。\n\n![9781430245421_Fig04-02.jpg](img/9781430245421_Fig04-02.jpg)\n\
  \n图 4-2. Xcode 的 Interface Builder 编辑器中 MainMenu.xib 窗口的初始视图\n\n在 Interface Builder\
  \ 窗格的左下方有一个小的灰色三角形，像一个播放按钮。点击它，Interface Builder 窗格左边界上的一组图标将展开为一组*占位符*和一组*对象*（图\
  \ 4-3）。我们将处理*对象*部分中名为 `Window - Chapter4` 的对象。\n\n![9781430245421_Fig04-03.jpg](img/9781430245421_Fig04-03.jpg)\n\
  \n图 4-3. 将 nib 内容展开为占位符和对象\n\n### 占位符对象\n\n不过，在此之前，请花点时间看一下 nib 中的前三个对象。\n\n\n\n\
  这些图标将始终存在于 Cocoa nib 文件中。我们无法删除它们，并且与其他图标不同，它们在加载 nib 时不会导致创建对象实例。这三个图标被称为*占位符对象*，它们允许此\
  \ nib 中的对象与某些已存在的对象建立连接。\n\n任何 nib 文件中的第一个图标称为 `File’s Owner`。此图标是一个占位符，指向从磁盘加载\
  \ nib 的对象实例，换句话说，就是“拥有”该 nib 的对象实例。在应用程序的 `MainMenu.xib` 文件中（就像我们这里一样），`File’s Owner`\
  \ 图标始终指向 `NSApplication` 的一个实例，该类代表整个应用程序，接收输入并确保根据该输入调用相应的代码。对于其他 nib 文件，`File’s\
  \ Owner` 可能是不同的类，例如文档类的实例，或代表插件的类。\n\n此文件以及任何其他 nib 文件中的第二个图标称为 `First Responder`。我们将在第\
  \ 10 章中更详细地讨论响应者，但第一响应者是用户当前正在交互的对象。例如，如果光标正在文本字段中键入，则该文本字段就是当前的第一响应者。第一响应者会随着用户与界面的交互而改变，而\
  \ `First Responder` 图标为我们提供了一种便捷的方式，可以与当前具有焦点的任何控件或视图进行交互，而无需编写代码来确定是哪个控件或视图。\n\n\
  第三个图标称为 `Application`（或应用程序占位符），是 Cocoa nib 文件中相对较新的添加项。此对象指向此应用程序的唯一一个 `NSApplication`\
  \ 实例。在 `MainMenu.xib` 文件中，应用程序代理和 `File’s Owner` 占位符始终指向完全相同的对象。应用程序占位符使我们能够从任何\
  \ nib 文件访问应用程序的 `NSApplication` 实例，即使是那些 `File’s Owner` 不是 `NSApplication` 的 nib\
  \ 文件。对于本章，我们可以暂时忽略应用程序占位符，因为这个 nib 的 `File’s Owner` 已经提供了对该对象的访问。\n\n## 设置窗口\n\n\
  现在我们可以开始布局窗口了。在 *Objects* 部分，选择标记为 `Window - Chapter4` 的图标，该窗口将显示在 Interface Builder\
  \ 窗格中，并带有一个蓝色框，表示它已被选中。*Utility* 区域中的 *Inspector* 窗格将显示可以为窗口调整的设置（图 4-4）。我们将对默认设置进行一些更改。\n\
  \n![9781430245421_Fig04-04.jpg](img/9781430245421_Fig04-04.jpg)\n\n图 4-4. 显示窗口可用选项的属性检查器\n\
  \n将窗口的标题从“Chapter4”更改为“Press a Button”。*Title* 下方的字段标记为 *Autosave*。如果我们在此字段中提供一个值，我们的应用程序将自动在用户偏好设置中保存窗口的位置、大小和其他信息，这样当用户再次启动应用程序时，他将发现窗口正好位于上次关闭时的位置。我们在此处输入什么值并不重要，只要它对应用程序中的每个窗口都是唯一的即可。如果我们对任何两个对象使用相同的自动保存名称，其中一个将无法保存。在此处输入\
  \ `mainWindow`。\n\n在 *Autosave* 字段正下方，有三个复选框，用于控制窗口的一些基本行为。*Close* 复选框用于启用或禁用关闭窗口的功能。在只有一个窗口的实用程序应用程序中，我们可以取消选中此框，这样窗口就无法关闭。如果此框未选中，则窗口标题栏中的红色关闭按钮和\
  \ **Close** 菜单项都将被禁用。如果我们允许关闭窗口，我们应该提供一种使窗口再次可见的方法。\n\n或者，如果我们的应用程序是一个仅包含一个窗口的实用程序，那么允许在窗口关闭时退出应用程序也是可以接受的。在本章稍后部分，我们将配置我们的应用程序在关闭此窗口时退出，因此保持\
  \ *Close* 复选框的当前状态。在后面的章节中，我们将学习如何使关闭的窗口重新可见。\n\n*Minimize* 复选框控制是否可以使用窗口标题栏中的黄色按钮或从\
  \ **Window** 菜单中选择 *Minimize* 来将窗口最小化到 Dock。通常，窗口应该能够最小化。但也有一些例外，例如仅在我们的应用程序处于最前面时才可见的实用程序窗口，但绝大多数情况下我们应该保持此复选框选中。\n\
  \n第三个框称为 *Resize*，它控制用户是否可以通过拖动右下角来更改窗口的大小。对于此应用程序，我们将禁用此窗口的调整大小功能，因此取消选中 *Resize*。我们将在本书后面学习如何处理可调整大小的窗口中的控件。\n\
  \n现在保持其余属性不变。表示窗口的类是一个非常灵活的类，其他属性为我们提供了对应用程序外观以及它如何响应 OS X 中一些更高级的用户功能（如 Exposé、Spaces\
  \ 和全屏模式）的巨大控制能力，但对于大多数窗口来说，默认设置就是我们想要的。\n\n现在，按 ![image](img/arrow2.jpg)5 调出 *Size\
  \ Inspector*（图 4-5）。在这里我们可以设置选定对象的尺寸以及与尺寸相关的属性。正如我们在上一章中看到的，可以使用鼠标移动和调整对象大小，但此检查器为我们提供了对对象大小和位置更精确的控制。\n\
  \n![9781430245421_Fig04-05.jpg](img/9781430245421_Fig04-05.jpg)\n\n图 4-5. 应用程序窗口的尺寸检查器\n\
  \n将我们窗口的宽度设置为 480 像素，高度设置为 130 像素。将窗口的 x 值设置为 100，这表明我们希望窗口的初始位置位于屏幕的左侧。由于 Mac 显示器的几何特性，y\
  \ 值可能有点棘手。Mac 屏幕上的坐标系以屏幕左下角为 0，随着我们向屏幕顶部移动，y 值会增大。这里的问题是，并非每个人都有相同尺寸的显示器，因此任何给定的\
  \ y 值在不同尺寸的显示器上相对于屏幕顶部的位置都会不同。\n\n幸运的是，Cocoa 会自动调整窗口的位置，以便窗口始终在屏幕上启动，即使我们指定的位置可能导致窗口位于屏幕之外，并且因为我们为窗口指定了自动保存名称，每当用户在第一次之后启动应用程序时，窗口将位于我们上次退出应用程序时的位置。但有时窗口相对于屏幕顶部从特定位置启动非常重要。\n\
  \n请注意尺寸检查器底部的小图表；它根据我们自己的屏幕尺寸，以可视方式呈现窗口的初始位置。小白框代表窗口，大框代表屏幕减去菜单栏。白框四边的小红工字形标记让我们可以控制窗口相对于屏幕边缘的相对位置。我们可以将窗口放在屏幕上的所需位置，然后使用工字形标记将位置锁定在屏幕的左侧和顶部。点击工字形标记将允许窗口相对于屏幕的那一侧成比例移动。点击底部的工字形标记将使窗口从底部浮动，但保持与屏幕顶部的固定距离。\n\
  \n\n\n单击顶部和底部的 I 形梁，窗口将在屏幕上垂直居中。我们需要设置一个 y 值，将窗口放置在菜单栏附近，但不要紧贴菜单栏。最简单的方法是使用“大小检查器”中的屏幕表示，将应用程序的主窗口移动到我们想要的位置。如有必要，我们还可以通过数字方式微调大小和位置。一旦窗口的初始位置符合要求，单击底部的\
  \ I 形梁，使其变为条纹状。我们也可以通过选择“初始位置”部分底部的弹出菜单，并将其从“垂直比例”更改为“距顶部固定”来进行此更改。\n\n## 设计窗口的界面\n\
  \n在“对象库”中，选择“对象库”弹出菜单，然后选择“控件”。这将显示许多我们可以使用的不同按钮和文本字段（图 4-6）。底部列表中的第一个项目应该是“下压按钮”（`Push\
  \ Button`），这是标准的 OS X 按钮。\n\n![9781430245421_Fig04-06.jpg](img/9781430245421_Fig04-06.jpg)\n\
  \n图 4-6. Xcode 实用工具区域中的对象库视图\n\n抓取其中一个并将其拖到窗口的界面上。将出现蓝色辅助线，指示按钮位于左边缘、右边缘或中心的最佳位置。使用蓝色辅助线将按钮放置在窗口的右下部分（图\
  \ 4-7）。一旦按钮位于正确位置，松开鼠标，我们就在窗口上获得了一个按钮。现在双击该按钮，这将允许我们编辑按钮的标题。将其标题从“`Button`”更改为“`Right`”。\n\
  \n![9781430245421_Fig04-07.jpg](img/9781430245421_Fig04-07.jpg)\n\n图 4-7. 向主窗口添加按钮\n\
  \n从库中拖出第二个按钮，并使用蓝色辅助线将其放置在窗口的左下方。放置此按钮后，双击它，并将此按钮的标题更改为“`Left`”。\n\n再拖入一个按钮，并使用底部蓝色辅助线将按钮放置在距窗口底部正确距离的位置。将其放置在窗口的水平中心，同样，会出现一条蓝色辅助线来帮助我们正确定位。放置好后，双击第三个按钮，并将其标签更改为“`Center`”。窗口现在应该如图\
  \ 4-8 所示。\n\n![9781430245421_Fig04-08.jpg](img/9781430245421_Fig04-08.jpg)\n\n图\
  \ 4-8. 窗口应如图所示，三个按钮均已布局\n\n请注意，当我们向窗口添加控件时，Interface Builder 窗格左侧的“对象”显示区域会展开，以显示控件的添加以及视图的约束集，这在图\
  \ 4-8 中也可见。约束部分控制了控件布局在窗口调整大小时如何响应。\n\n接下来，我们需要一个标签，以便告知用户单击了哪个按钮。标签是一个 GUI 对象，可以以我们选择的字体和大小显示一段文本。在我们的应用程序代码中，我们可以随时以编程方式更改标签的文本。从库中抓取一个标签。您可能需要向下滚动控件列表，或者直接使用搜索框。将标签拖到窗口的左上角，并使用辅助线将其正确放置在上边距和左边距处。\n\
  \n单击标签右侧的调整大小手柄，向右拖动，直到到达窗口右侧的蓝色辅助线，然后松开。在选中标签的情况下，按 ![image](img/arrow2.jpg)`4`\
  \ 调出“实用工具”窗格中的“属性检查器”，并使用“文本对齐”按钮将文本居中。\n\n然后，单击“字体”设置右侧的小 T 图标。这将调出一个特殊的字体面板，如图\
  \ 4-9 所示。将字体大小更改为 36，可以直接输入数字，也可以使用“大小”字段右侧的小箭头按钮。完成此操作后，剩下的就是双击标签，使其进入编辑模式，然后按\
  \ Delete 键删除文本。我们希望在按下按钮之前，此标签不显示任何内容。\n\n![9781430245421_Fig04-09.jpg](img/9781430245421_Fig04-09.jpg)\n\
  \n图 4-9. 更改标签的字体\n\n至此，用户界面部分完成，所以现在我们需要编写一些代码，以便在按下三个按钮中的任何一个时更新标签中的文本。\n\n## 创建控制器类\n\
  \n我们将向 `ButtonAppDelegate` 类添加一些代码。这个类将作为控制器，处理我们所有三个按钮的点击动作。在我们刚刚布局的窗口中，我们设置了三个按钮和一个文本字段。当用户按下其中一个按钮时，文本字段的值应该被更新。因为我们需要更改文本字段显示的文本，所以需要一个指向它的输出口（`outlet`）。此外，我们还需要一个供按钮触发的操作方法（`action`）。因为操作方法会接收触发它的对象的指针，所以我们可以为所有三个按钮使用一个单一的操作方法。现在让我们来设置输出口和操作方法。\n\
  \n为此，我们需要在用户界面元素和我们的代码之间建立一些连接。在上一章中，我们讨论了如何从一个 UI 元素按住 Control 键拖到另一个 UI 元素。这里我们将做类似的事情。\n\
  \n在 nib 文件编辑器仍然打开的情况下，我们还需要打开一个显示代码的窗格。单击主 Xcode 窗口工具栏右侧“编辑器”组中的“助理”按钮（看起来像一个管家的躯干）。我们也可以通过输入\
  \ ![image](img/arrow5.jpg) 来打开助理编辑器。通过选择**视图** ![image](img/arrow.jpg) **助理编辑器**下的不同选项，可以将该窗格并排或放置在\
  \ nib 编辑器窗格下方。\n\n“助理编辑器”窗格会在编辑器区域上方的跳转栏中显示当前文件的名称。选择文件名，一个弹出菜单将显示名称 `ButtonsAppDelegate.h`\
  \ 和 `ButtonsAppDelegate.m`。如果尚未选中，请选择 `ButtonAppDelegate.h`。我们将看到 Xcode 为我们生成的类接口。生成的代码如下所示（忽略文件顶部的注释块）：\n\
  \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface ButtonsAppDelegate : NSObject\
  \ <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\n@end\n\
  ```\n\n在上一章中，我们从一个用户界面对象按住 Control 键拖到另一个对象。这次，我们将从 nib 文件按住 Control 键拖到我们的代码中。在\
  \ nib 编辑器窗格中，单击我们添加到窗口的标签。现在，从标签按住 Control 键拖到 `.h` 文件中，向下拖到 `@property` 行下方的空行处，文本编辑器中会延伸出一条蓝线，指示“插入输出口或操作”（`Insert\
  \ Outlet or Action`），如图 4-10 所示。松开鼠标按钮，会出现一个小弹出窗口，我们可以在其中配置这个新连接。\n\n![9781430245421_Fig04-10.jpg](img/9781430245421_Fig04-10.jpg)\n\
  \n图 4-10. 从 nib 对象按住 Control 键拖到代码编辑器以连接输出口或操作\n\n在此弹出窗口中，将连接标记为“输出口”（`Outlet`），并将名称设置为“`label`”。将其他字段保留为默认设置，然后单击“连接”（`Connect`）。Xcode\
  \ 将在 `.h` 文件中添加一行新代码，内容如下：\n\n```objectivec\n@property (weak) IBOutlet NSTextField\
  \ *label;\n```\n\n该属性声明在我们的类中创建了一个名为 `label` 的新属性。\n\n\n\n## 声明中包含 `IBOutlet` 关键字\n\
  \n该声明还包含 `IBOutlet` 关键字，这将使 Xcode 能够找到我们的插座，并使其在 Interface Builder 中可用。Xcode 还在类实现中添加了一行代码，我们可以通过点击跳转栏中的文件名并选择\
  \ `ButtonsAppDelegate.m` 来查看。此文件现在看起来如下：\n\n```objc\n#import \"ButtonsAppDelegate.h\"\
  \n\n@implementation ButtonsAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // Insert code here to initialize your application\n}\n\
  \n@end\n```\n\n根据你的 Xcode 版本，你可能还会看到一行代码为 `@synthesize label`。如果你确实看到了，它指示编译器为 `label`\
  \ 属性生成 getter 和 setter 方法。最新版本的 Xcode 不会生成这一行，因为编译器现在可以自动推断何时需要生成属性的 getter 和 setter\
  \ 方法，但你会在此前的代码中看到它，包括苹果的许多示例代码项目中。无论你是否看到它，由于我们将这个插座连接到了窗口中的标签上，当 nib 文件被加载时，`label`\
  \ 属性将自动连接到标签 `NSTextField` 对象。\n\n## 实现动作方法\n\n我们将执行相同的操作来在我们的类中创建一个动作。在可以尝试运行程序之前，剩下的唯一任务是实际编写当按钮被点击时将被调用的代码，我们现在就来完成它。这段代码将检查\
  \ sender 参数以确定被点击按钮的标题，使用该标题创建一个字符串，然后使用我们的标签插座来显示该字符串。\n\n在跳转栏中，选择显示 `ButtonsAppDelegate.h`。接着，选择我们命名为“Left”的按钮。按住\
  \ Control 键从 Left 按钮拖拽到代码中，拖到我们之前创建的 `@property` 那一行下方。这次，选择连接类型为 Action。将动作命名为\
  \ `buttonPressed:`，其余字段保留默认值。当我们点击 Connect 时，Xcode 将为我们创建一个遵循动作约定的新实例方法。与我们添加的属性一样，当\
  \ nib 文件被加载时，它也将自动连接。\n\n如果我们切换回 `.m` 文件，会看到一个看起来如下的新空方法：\n\n```objc\n- (IBAction)buttonPressed:(id)sender\
  \ { }\n```\n\n我们将用代码填充这个方法，以在标签中显示按下了哪个按钮。将以下代码输入到方法体中：\n\n```objc\n- (IBAction)buttonPressed:(id)sender\
  \ {\n    NSString *title = [sender title];\n    NSString *labelText = [NSString\
  \ stringWithFormat:@\"%@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n\
  }\n```\n\n该方法首先获取调用它的按钮的标题。然后它使用该标题创建一个新字符串，接着使用该字符串来更新标签。该方法使用*点表示法*来访问属性，这只是表示\
  \ `[self label]` 的简写形式。\n\n### 嵌套消息\n\n一些 Objective-C 开发者会深度嵌套他们的消息调用。你在编程过程中可能会遇到如下代码：\n\
  \n```objc\n[self.label setStringValue:[NSString stringWithFormat:@\"%@ button pressed.\"\
  ,\n  [sender title]]];\n```\n\n这一行代码的功能与我们 `buttonPressed:` 方法中的三行代码完全相同。为了清晰起见，在本书的代码示例中，我们通常不会将\
  \ Objective-C 消息嵌套得这么深，但 `alloc` 和 `init` 的调用除外，按照长期以来的惯例，它们几乎总是被嵌套使用。\n\n## 运行应用\n\
  \n在上一章中，我们使用了“模拟文档”命令来操作我们设置好的控件和连接。那一章之所以能成功，是因为我们没有代码。这次我们有一些代码，所以需要实际编译和链接应用。点击\
  \ Xcode 窗口左上角的 Run 按钮，或按下![images](img/arrow3.jpg)R。\n\n如果这是你第一次尝试运行自定义代码，可能会弹出一个窗口，询问你是否要在本\
  \ Mac 上启用开发者模式。继续点击确认启用；出于安全考虑，系统会提示你输入密码。你的代码应该能干净地编译，然后你会看到“按下一个按钮”窗口。如果你点击 Left\
  \ 按钮，标签应更新显示“Left button pressed.”。如果你点击中间或右边的按钮，什么都不会发生，因为你还没有连接这些按钮。我们稍后会处理，但现在请注意，你已经让一个包含你自定义代码的\
  \ Cocoa 应用运行起来了！\n\n退出应用，你应该会回到 Xcode，保持原样。你应该仍能在窗口一侧看到 nib 编辑器面板，另一侧是 Assistant\
  \ 编辑器并打开 `.m` 文件。我们将设置 Center 和 Right 按钮与 `buttonPressed:` 动作之间的连接。实际上，我们可以通过 `.h`\
  \ 或 `.m` 文件将连接建立到现有动作上。\n\n在 nib 中选择 Center 按钮，然后按住 Control 键拖拽到 `.h` 或 `.m` 文件中的\
  \ `buttonPressed:` 方法上。当指针到达有效动作时，动作会以蓝色轮廓高亮显示，并出现一个小窗口显示“Connect Action”。松开鼠标，连接就建立好了。对\
  \ Right 按钮执行相同操作。\n\n和之前一样，点击 Xcode 窗口左上角的 Run 按钮，应用将编译并启动。这次，点击三个按钮中的任何一个都会更新标签。这一个动作方法就能妥善处理所有三个按钮。将窗口移动到新位置，然后退出应用。按下![images](img/arrow3.jpg)R\
  \ 再次启动程序，窗口应该会出现在我们退出程序时完全相同的位置。如果我们点击标题栏中的黄色最小化按钮，窗口将缩小到我们的 Dock 中（在 Dock 中点击它以最大化窗口），如果我们按下![images](img/arrow3.jpg)W\
  \ 或点击窗口中的红色关闭按钮，窗口将关闭。遗憾的是，应用仍在运行，但无法重新打开窗口。现在让我们通过配置应用在窗口关闭时退出来解决这个问题。为此，我们将需要使用一个名为*应用委托*的对象。\n\
  \n## 应用委托\n\n每个 Cocoa 应用有且只有一个 `NSApplication` 类的实例。我们不需要过多地与 `NSApplication` 直接交互。它是由系统为我们创建的，并处理事件循环（应用中负责监听来自鼠标和键盘的用户输入，并通过发送消息将输入传递给适当对象的部分）以及大部分底层细节，我们无需过多操心。\n\
  \n展开项目导航器窗格中的 Supporting Files 文件夹，单击 `main.m`。在该文件中是我们的应用的 `main()` 函数，这是应用启动时被调用的函数。该函数只包含一行代码，它调用了一个名为\
  \ `NSApplicationMain()` 的函数。这个 Cocoa 框架中的函数会自动为我们创建一个 `NSApplication` 的实例。该 `NSApplication`\
  \ 实例进入一个循环，持续轮询来自键盘、鼠标、操作系统和其他应用的事件，然后响应这些事件（现在不必担心具体细节；我们将在本书后面学习更多关于事件的知识）。当它检测到表示应用应退出的事件时，事件循环停止，应用的执行结束。\n\
  \n`NSApplication` 允许我们指定一个可选对象作为其委托。简而言之，委托是一个代表另一个类处理特定任务的类。\n\n\n\n## 应用委托与 GUI\
  \ 组件\n\n## 应用委托\n\n应用委托允许我们的应用程序在生命周期中的特定时刻执行操作，从而避免必须子类化 `NSApplication` 带来的混乱。应用委托可以是任何类的任何实例，但只有一个对象能成为应用委托。几乎每个应用程序都需要一个应用委托对象。由于这是一种常见模式，为我们创建的\
  \ `ButtonsAppDelegate` 类已经在 nib 文件中被配置为应用委托。`ButtonsAppDelegate.h` 文件中的 `ButtonsAppDelegate`\
  \ 类声明指出，该类实现了 `NSApplicationDelegate` 协议。\n\n### 配置应用程序在窗口关闭时退出\n\n单击 `ButtonsAppDelegate.m`\
  \ 文件，添加一个名为 `applicationShouldTerminateAfterLastWindowClosed:` 的方法，如下文加粗所示：\n\n\
  ```objc\n#import \"ButtonsAppDelegate.h\"\n\n@implementation ButtonsAppDelegate\n\
  \n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification {\n    //\
  \ 在此处插入代码以初始化应用程序\n}\n\n- (BOOL)applicationShouldTerminateAfterLastWindowClosed:(NSApplication\
  \ *)sender {\n    return YES;\n}\n\n- (IBAction)buttonPressed:(id)sender {\n   \
  \ NSString *title = [sender title];\n    NSString *labelText = [NSString stringWithFormat:@\"\
  %@ button pressed.\", title];\n    [self.label setStringValue:labelText];\n}\n@end\n\
  ```\n\n这个新方法是那些特殊的应用委托方法之一。在应用程序运行期间的某些预设时刻，`NSApplication` 会检查其委托是否实现了某个特定方法。如果委托实现了，`NSApplication`\
  \ 就会调用该方法。我们刚刚实现的这个方法允许我们改变 `NSApplication` 的行为，而无需对其进行子类化。默认行为是 `NSApplication`\
  \ 持续运行，直到被明确告知退出，即使没有窗口打开也是如此。不过，应用程序在最后一个（或唯一）窗口关闭时退出也是可以接受的，而此方法正是专门为了让委托修改这种默认行为而提供的。\n\
  \n再次运行应用程序，当主窗口出现后将其关闭。由于应用程序的唯一窗口已被关闭，应用程序现在应该会退出。\n\n### 使用文档浏览器\n\n那么，我们如何知道这些应用委托方法是什么？如果我们不知道这些方法，就难以实现它们。幸运的是，它们通常很容易找到。查看我们刚刚添加的方法，它接受一个参数，该参数是一个指向调用该方法的\
  \ `NSApplication` 实例的指针。按住 Option 键，然后在编辑窗格中双击 `NSApplication` 一词。这将打开文档浏览器，定位到我们刚点击的词的定义，即\
  \ `NSApplication`（图 4-11）。\n\n![9781430245421_Fig04-11.jpg](img/9781430245421_Fig04-11.jpg)\n\
  \n图 4-11。Xcode 中的文档浏览器，显示 NSApplication 类参考\n\n然而，在本例中，我们不会在这个文件中找到 `NSApplication`\
  \ 的委托方法文档。从 OS X 10.6 开始，苹果开始将委托方法重构到独立的协议中，并将这些方法的文档迁移到该协议的文档中。许多 Cocoa 类都有相关联的委托协议——例如\
  \ `NSApplication`、`NSBrowser`、`NSToolbar`、`NSWindow` 等。在阅读某个类的文档时，务必同时查找同名的关联委托协议：`NSApplication`\
  \ 的委托协议名为 `NSApplicationDelegate`。\n\n要浏览文档树，请在 NSApplication 类参考文档中右键单击，然后选择“在库中显示”。这将显示文档树，其中\
  \ `NSApplication` 处于选中状态。\n\n在 NSApplication 类参考下方是 NSApplicationDelegate 协议参考，其中包含我们正在寻找的文档。\n\
  \n花几分钟浏览一下应用委托方法是值得的，这样你就会了解有哪些方法可用。文档浏览器是你的好帮手。在学习 Cocoa 的过程中，你会经常使用它，所以请熟悉它。还有一种更简洁的查看文档的方式：按住\
  \ Option 键单击一个类或方法名，会弹出一个小型文档窗口，显示你点击内容的简短摘要以及相关文档的链接。总的来说，Xcode 中包含的文档是 Cocoa、Xcode\
  \ 以及所有其他苹果开发技术的终极百科全书。**务必查阅文档**（RTFM）！你以后会庆幸自己这么做的。\n\n### 小结\n\n本章在前两章内容的基础上进行了扩展。我们了解了如何通过\
  \ Control 拖拽在 Interface Builder 中建立用户界面元素之间的输出口和目标/动作连接，以及如何在自己的代码中实现动作。我们用不到十行代码构建了一个完整的\
  \ GUI 应用程序。诚然，这个应用程序功能有限，但这些基本理念是 Cocoa 所提供功能的基础，也是 Cocoa 成为如此高效开发环境的原因所在。在下一章中，我们将使用按钮和文本字段之外的更多用户界面元素，并会发现配置和使用它们的方式与本章中按钮和文本字段的使用方式完全相同。\n\
  \n"
- "# 第 5 章：GUI 组件\n\n在第 3 章和第 4 章中，我们介绍了在 Interface Builder 中创建用户界面以及使用目标/动作将其连接到\
  \ Xcode 中编写的应用程序代码的一些基础知识。到目前为止，我们仅仅触及了表面，但你应该很高兴地知道，你在前两章中学到的目标/动作系统几乎被 Cocoa 中所有的用户界面对象所使用。如果你不太清楚这有什么了不起，你可能想再复习一遍第\
  \ 3 章，以确保你掌握了目标/动作的概念。\n\n到现在为止，你一定已经注意到了 Interface Builder 的“对象库”面板中列出的丰富多样的用户界面对象。现在是时候深入挖掘\
  \ Cocoa 的锦囊妙计，探索其中的一些类了。Cocoa 中可用的用户界面类涵盖了广泛的使用场景，并尽可能为其功能提供一致的 API，因此一旦你学会了如何对一个类进行某种操作，通常就能迅速推测出如何用另一个类实现类似的结果。特别是，你经常使用的许多类都是\
  \ `NSControl` 的子类，而大部分工作都会用到在该类中声明的方法。不同的子类与用户交互的方式不同，但与你自己代码交互的方式基本相同。\n\n本章将介绍\
  \ Cocoa 提供的一些最常见的用户界面类，展示它们的基本用法以及如何在适当的情况下对其进行定制以满足我们的需求。在此过程中，我们还将了解一些辅助性的 Cocoa\
  \ 类，它们可能没有明显的屏幕表现形式，但仍为我们的应用程序提供重要的服务。我们将重点介绍以下类（参见图 5-1，了解这些对象在屏幕上的样式示例）：\n\n-\
  \ `NSTextField`：许多应用程序的基本文本输入方法。响应按键并渲染文本，为用户提供很大的编辑灵活性。\n- `NSButton`：基本的鼠标触发的\
  \ GUI 组件。尽管在操作和外观上存在差异，但单选按钮、复选框和普通的旧按钮都是 `NSButton` 的实例。\n\n\n\n*   `NSPopUpButton`：当我们需要用户从一组字符串中选择时，`NSPopUpButton`\
  \ 通常是首选方案。\n*   `NSComboBox`：与 `NSPopUpButton` 类似，但额外允许用户输入列表中未提供的值。\n*   `NSMatrix`：一个将一系列相似控件组合成单个单元的对象。\n\
  *   `NSLevelIndicator`：通常用于显示预定义范围内的数值，但也可用于输入数据。\n*   `NSImageView`：用户只需将来自访达或其他应用程序中的任意图像拖放至该类控件上，即可轻松将其导入到应用程序中。\n\
  *   `NSTextView`：这几乎是一个完整的文本编辑器，它允许用户编辑具有多种字体、格式、标尺等内容的文本。\n\n![9781430245421_Fig05-01.jpg](img/9781430245421_Fig05-01.jpg)\n\
  \n图 5-1。 Cocoa UI 元素示例\n\n**注意** 在本书中，我们有时会使用 Cocoa 类名（例如 `NSButton`），有时则会使用它们常用的通俗名称（例如\
  \ button）。通常，在讨论代码时我们会使用类名，而在其他大多数情况下则使用通俗名称，但无论哪种情况，我们实际上指的都是同一种东西。\n\n我们将使用这些类来创建一个模拟数据库应用的简单程序。用户可以通过一些简单的\
  \ GUI 控件来编辑和创建对象，但编辑结果不会被保存（这就是“模拟”的由来）。在后面的章节中，我们将学习如何使用 Core Data 将对象保存到磁盘，但现在我们将专注于\
  \ GUI。\n\n## 创建 VillainTracker 应用程序\n\n本章要创建的应用程序名为 `VillainTracker`。它是一个简单的应用程序，用于追踪超级反派、他们最后已知的下落、特殊能力等信息。对于任何称职的超级英雄团队来说，这都是一款应该安装在电脑系统中的应用，因此对于我们这样的英雄来说，它显然是一个入门应用。我们将把\
  \ `VillainTracker` 的开发分为两个阶段：第一阶段，我们将创建一个简单的应用程序，用于编辑单个反派的信息；第二阶段（参见第 6 章），我们将添加管理整个反派列表的功能。这将演示基于模型-视图-控制器（MVC）设计模式开发应用程序的基础知识，该模式已被开发者们使用多年。无论您对此模式是否有经验，了解\
  \ MVC 在 Cocoa 应用中的典型实现方式都非常重要，因为它确实是 Cocoa 中良好应用设计的基石。\n\n与之前的应用程序一样，我们首先在 Xcode\
  \ 中创建一个新的应用程序项目。我们将在 Interface Builder 模式下创建 GUI，然后通过使用 control-drag 的强大功能在生成的类中创建输出口和操作，将其与生成的代码连接起来。然后，我们将回到\
  \ Xcode，学习如何编写代码来设置和获取值——即 GUI 控件中显示的值——每次学习一个类，以便了解每个类的工作方式。通常，在构建 Cocoa 应用时，我们会在构建和修改\
  \ GUI 与实现代码之间来回切换：先布置一些 UI，然后实现其背后的代码，检查它是否按预期工作，然后迭代。由于这个应用相对简单，我们将先布置 GUI，然后再实现其背后的功能。\n\
  \n**注意** 在讨论 GUI 问题时，术语“视图”和“控件”通常可以互换使用。从技术上讲，大多数 Cocoa 用户界面类既是视图也是控件，至少在 Cocoa\
  \ 的意义上是这样。\n\n`NSView` 是一个允许在屏幕上绘图的类；`NSControl` 是 `NSView` 的子类，它通过响应用户事件、在目标对象中触发操作等方式扩展了\
  \ `NSView`。因此，我们应用中视图层的大部分将由“控件”对象组成，这当然不能与控制器层混淆。如果这听起来令人困惑，只需记住“控件”是视图的一种特定类型，而“控制器”是控制器层中协调视图和模型对象的对象。我们保证，过一段时间，这一切都会变得非常清晰。\n\
  \n那么，让我们创建一个新的应用程序项目。与之前的章节一样，启动 Xcode，如果它已经在运行则切换到它，然后按下 `![image](img/arrow1.jpg)N`，或者从\
  \ **文件** 菜单中选择 **新建项目**。在新建项目辅助工具中，在左侧的 OS X 下，单击 *应用程序*；然后在右侧的大窗格中，单击 *Cocoa 应用程序*，然后单击“下一步”。\n\
  \n标准的 Xcode 新建项目选项面板将提示我们输入应用程序的标识信息。在“产品名称”中输入“VillainTracker”，并在相应的两个框中输入您选择的组织名称和公司标识符。本次的类前缀，我们的示例也将使用字符串“VillainTracker”。确保选中\
  \ *使用自动引用计数*，并取消选中其他复选框。单击“下一步”。\n\n接下来看到的标准保存面板允许我们导航到选择的目录并在那里创建新项目。使用控件导航到您主目录或桌面上的合适位置，然后单击“创建”。现在，Xcode\
  \ 会在指定位置创建一个名为 `VillainTracker` 的新文件夹，其中包含一些默认内容，例如 `VillainTracker.xcodeproj` 项目文件，并打开一个新窗口，显示我们项目的设置。\n\
  \n## 构建界面\n\n我们将从使用 Interface Builder 编辑项目的主 nib 文件开始，为 `VillainTracker` 创建 GUI。我们将添加\
  \ GUI 控件来捕获我们需要了解的每个宿敌的信息，并学习如何将控件组织成逻辑组，以及如何在调整窗口大小时让它们正确地重新定位。我们还将把它们连接到控制器类，在控制器中创建输出口，并将所有内容连接在一起。\n\
  \n首先在 Xcode 的导航器窗格（屏幕左侧的项目导航器窗格中）中找到 `MainMenu.xib`。单击 `MainMenu.xib`，它将在 Xcode\
  \ 的中央窗格中以 Interface Builder 模式打开。我们将看到新应用程序的默认菜单集，以及在 Interface Builder 编辑器区域左侧的\
  \ Dock 中的几个图标——三个占位对象（文件所有者、第一响应者和应用程序）和另外四个对象（主菜单、窗口 - VillainTracker、VillainTrackerAppDelegate\
  \ 和字体管理器）。单击“窗口 - VillainTracker”对象，一个空白的窗口将在编辑器区域中打开。\n\n### 摆弄文本字段\n\n现在可以开始构建\
  \ GUI 了。我们将一次构建一小部分，但可以参考图 5-2 中窗口的完成版本，以了解布局。\n\n![9781430245421_Fig05-02.jpg](img/9781430245421_Fig05-02.jpg)\n\
  \n图 5-2。 完整的 `VillainTracker` 窗口看起来是这样的\n\n我们要设置的第一个控件是几个 `NSTextField`。`NSTextField`\
  \ 是一个非常有用的类，它提供堪比成熟文本编辑器的文本编辑能力，即使在仅输入几个字符的场景下也是如此。在 Xcode 窗口右侧实用工具面板的 *对象库* 区域中，确保顶部选中了\
  \ *对象* 选项卡，然后在其中选择 *对象库* 或其子项 Cocoa。然后点击窗口底部的搜索字段，输入“text field”。\n\n\n\n库中可用的对象列表缩减到只有几个，其中包括一个名为`Text\
  \ Field`的对象。它应该位于列表顶部附近。将其中一个（`Text Field`，不是`Text Field Cell`，后者是一个略有不同的对象，我们将在第\
  \ 6 章和第 7 章中遇到）拖到我们空白的窗口上，并将其放置在窗口的左上角附近。我们将在字段的左侧添加一个项目，因此请在字段和窗口边缘之间留出一些空间。现在，在选中新的文本字段的情况下，通过按`⌘D`复制它。一个新的文本字段会出现，并覆盖前一个。将新的文本字段向下拖动一点，窗口中会出现一些蓝色参考线，帮助将其对齐到前一个字段的下方。当它看起来大致如图\
  \ 5-3 所示时，松开鼠标。\n\n![9781430245421_Fig05-03.jpg](img/9781430245421_Fig05-03.jpg)\n\
  \n**图 5-3.** `VillainTracker`的前两个文本字段\n\n现在我们需要标记这些对象，以便用户知道它们代表什么。回到`Object Library`窗格，点击搜索字段（如有必要，删除已有的文本），并输入单词“label”。它应该会显示一个名为`Label`的对象。将一个标签拖到窗口上，放在我们创建的第一个文本字段的左侧。同样，当我们拖到另一个对象附近时，会出现蓝色线条，帮助我们将其定位；这些参考线有助于我们相对于标签旁边的文本字段进行顶部、中心、文本基线或底部的对齐。当我们在\
  \ Interface Builder 中编辑此标签时，它会水平调整大小以匹配其内容。这没问题——只是默认情况下文本是水平居中的，这意味着在编辑时，它会向两个方向扩展并开始与右侧的`NSTextField`重叠。为避免这种情况，打开`Attributes\
  \ Inspector`窗格（`⌘4`），找到并点击`Text Field`设置下的`Align Right`按钮（提示：它看起来与大多数文字处理器中对应的按钮一样）。这样做将使标签在更改其内容时仍能保持其右边距。\n\
  \n将标签中的文本编辑为“Name:”，然后通过按`⌘D`复制此标签。将新标签向下拖动一点，使其与下方的文本字段对齐，将其编辑为“Last Known Location:”，这样我们就完成了！如果你在标签中没有为那么多文本留出足够的空间，它会与文本字段重叠。可以随意移动对象，使布局更整洁。\n\
  \n### 让用户选择日期\n\n我们要准备的下一个 GUI 对象是一个日期选择器，它将允许用户指定反派最后一次出现的日期。日期选择器克服了解析和呈现日期时可能遇到的模棱两可和相互竞争的日期格式标准，这是一个令人头疼的问题，而且我们在\
  \ Cocoa 中有一个很棒的内置日期选择器，所以我们就用它吧。\n\n在`Object Library`窗格的搜索字段中，输入“date”并查看出现的内容。应该有一个名为`Date\
  \ Picker`的条目。抓住它，将其拖入我们的窗口，并放在我们之前创建的`NSTextFields`下方，再次使用拖动到目标位置附近时出现的蓝色参考线。此控件的默认宽度小于其上方`NSTextFields`的默认宽度，因此它不会占用相同的水平空间，但这没关系。只需使其与其他控件的左边缘对齐即可。现在点击之前创建的某个标签，通过按`⌘D`再次复制它。将其向下拖动，与日期选择器对齐，并将文本更改为“Last\
  \ Seen:”。图 5-4 显示了窗口现在应该是什么样子。\n\n![9781430245421_Fig05-04.jpg](img/9781430245421_Fig05-04.jpg)\n\
  \n**图 5-4.** 我们有了一个良好的开端，为窗口添加控件和标签\n\n### 创建组合框\n\n现在该创建组合框了。如果我们有一组预定义的有效字符串值可供选择，但又希望允许用户输入他们自己的值，那么这个控件非常有用。这对于反派的`Sworn\
  \ Enemy`属性来说非常完美。我们可以提供一些默认的超级英雄名字供选择，同时仍然允许用户输入我们未预料到的名字。\n\n转到`Object Library`窗格，在搜索字段中输入“combo”，会看到一个`Combo\
  \ Box`出现在列表中。将其拖到我们的窗口中，放在`NSTextFields`和`NSDatePicker`下方。再次使用蓝色参考线，使其与上方控件的左边缘对齐。再次复制一个现有的标签，将其放置在组合框的左侧，并将其重命名为“Sworn\
  \ Enemy:”。\n\n现在，让我们用一些默认值填充组合框。我们希望用户能够指定任何超级英雄，甚至是那些我们不知道的（这就是我们选择组合框的原因），但为了方便起见，我们应该用一些流行超级英雄的名字预加载此控件，因为流行的超级英雄往往也是最招致敌人的。\n\
  \n点击我们刚添加的组合框，并打开`Attributes Inspector`窗格（`⌘4`）。在上部区域有一个标有`Items`的位置，我们可以在其中添加将出现在组合框中的项目。图\
  \ 5-5 显示了检查器此部分的操作。使用`+`按钮添加一个新项目，然后双击出现的“Item”文本，并将其更改为“Superman”。现在重复此过程，使用`+`按钮添加几个项目，每次编辑“Item”文本并将其更改为你喜欢的某个超级英雄的名字。\n\
  \n![9781430245421_Fig05-05.jpg](img/9781430245421_Fig05-05.jpg)\n\n**图 5-5.** 在\
  \ Interface Builder 中配置`NSComboBox`\n\n添加完超级英雄列表后，通过从**Editor**菜单中选择**Simulate Document**来测试界面。我们的窗口应该会出现，我们可以验证为组合框创建的项目在点击时是否出现。我们还可以在任何字段（包括组合框）中输入文本，并与日期选择器进行交互。完成后，按`⌘Q`返回\
  \ Xcode。\n\n### 使用级别指示器显示评级\n\n我们要创建的下一个控件是`NSLevelIndicator`，我们将用它来显示和指定任何反派的邪恶程度。我们将允许用户为此值指定\
  \ 0 到 10 的星级评分，而`NSLevelIndicator`实际上会将其显示为一行星星。\n\n回到`Object Library`窗格，在底部的搜索字段中输入“level”。出现的一个类是`NSLevelIndicator`，我们应该将其拖出并放入窗口中，再次使用蓝色参考线使其与先前控件的左边缘对齐，正好位于上一步添加的组合框下方。\n\
  \n现在我们需要稍微配置一下这个新对象。`NSLevelIndicator`类具有许多内置的显示样式，适用于不同的用途。在 Interface Builder\
  \ 中创建的新实例的默认样式称为“Discrete”，但我们要更改它以匹配我们要显示的内容，这相当于一种评级。调出`Attributes Inspector`（`⌘4`），我们将看到第一个选项是一个标有`Style`的弹出菜单（见图\
  \ 5-6）。点击弹出菜单，改为选择`Rating`。级别指示器会立即变为显示几颗星星的视图。\n\n![9781430245421_Fig05-06.jpg](img/9781430245421_Fig05-06.jpg)\n\
  \n**图 5-6.**\n\n\n\n## 配置 NSLevelIndicator 以显示星级评分\n\n我们还需要为此控件指定有效的最大值和最小值，以便它知道如何显示给定的值。仍在*属性检查器*中，找到标有*值*的部分，其中包含用于设置最小值和最大值的控件。将最小值设为\
  \ 0，最大值设为 10，可以通过在这些字段中输入数字或使用小的向上/向下按钮来设置。在这些文本字段下方稍低一点的位置，有一个标有*当前*的字段。将其设置为 10，这样我们就可以看到控件中星星的完整范围，并勾选*可编辑*复选框，以便用户自己编辑此值，而不仅仅是欣赏漂亮的星星。\n\
  \n也许控件并没有显示全部 10 颗星。在撰写本文时，从库中拖出的新 `NSLevelIndicator` 的默认宽度仅足以显示略多于 7 颗星，无法显示更多。幸运的是，Xcode\
  \ 提供了一个方便的快捷方式，可以帮助我们调整视图的大小，使其完美适应其内容。从菜单中选择**编辑器** ![image](img/arrow.jpg) **使大小适应内容**，或者按\
  \ ![images](img/arrow3.jpg)= 键，使级别指示器扩展到恰好能显示全部 10 颗星的正确大小。根据我们相对于其他字段布局 `NSLevelIndicator`\
  \ 的方式，我们可能已经创建了在 `NSLevelIndicator` 和其他字段之间建立大小关系的约束。如果在调整 `NSLevelIndicator` 大小时其他字段也调整了大小，那也没关系。我们可以按撤销\
  \ (![images](img/arrow3.jpg)Z) 并将 `NSLevelIndicator` 重新定位到远离其他字段的位置以打破约束，然后按照上述方法调整其大小，最后再将其重新定位到与其他字段左边缘对齐的位置。\n\
  \n**注意**  对于此应用，我们可以忽略警告和临界值，因为它们对 `NSLevelIndicator` 的评分样式没有任何影响。这些值确实会影响 `NSLevelIndicator`\
  \ 在离散和连续样式下的绘制方式；我们还可以将 `NSLevelIndicator` 改回离散或连续样式，然后使用模拟文档查看效果，但继续操作前需要将其改回评分样式。\n\
  \n最后，是时候再次复制窗口中已有的标签之一了。将其拖放到级别指示器的左侧，并将文本更改为“邪恶程度：”。\n\n现在可能是再次通过选择**模拟文档**来测试界面的好时机。我们应该能够点击星星线上的任意位置，使控件仅高亮显示相应数量的星星。\n\
  \n## 在矩阵中添加单选按钮\n\n接下来，我们将为`主要动机`属性创建图形用户界面。通过对漫画书多年的仔细研究，我们了解到每个反派都有一个导致他们作恶的主要驱动因素，而这种动机总是可以归结为以下五种之一：贪婪、复仇、嗜血、虚无主义或疯狂。当然，有些反派可能同时受多种邪恶力量驱动，但我们将为每个追踪的反派选择一个主要动机。\n\
  \n我们将使用一组*单选按钮*来让用户选择主要动机。单选按钮通常被分组在一个共同工作的集合中，这样选择一个按钮会同时取消选择所有其他按钮。如果“单选按钮”这个名称对于此控件来说显得过于晦涩难懂，那么你可能太年轻，不记得\
  \ 20 世纪 80 年代之前普遍存在的旧式汽车收音机调谐器控制装置——它通过按下一个机械按钮来选择电台，该按钮会将调谐器调整到特定电台，同时使之前按下的按钮弹回到“弹出”位置。无论如何，“单选按钮”这个术语将继续使用下去，当我们有一个小的、预先定义的选项列表，并且希望该列表始终显示在屏幕上时，这个控件是一个不错的选择。\n\
  \n在 Cocoa 中，单选按钮通常是一组位于 `NSMatrix` 内部并对齐的 `NSButtonCell` 实例。我们可以在*对象库*面板中通过在搜索字段中输入“radio”来找到这些预配置的控件。这将显示一个*单选组*。将其拖出并放到窗口中，放在其他控件下方。默认的单选按钮矩阵只包含两个单选按钮，但在本例中我们需要五个。在这里，仅通过拖拽调整手柄之一来调整矩阵大小是行不通的；那只会拉伸现有的按钮。相反，请尝试在按住\
  \ Option 键的同时向下拖动底部中央的调整手柄。这将同时调整矩阵大小并向内添加新按钮以填充空白区域。向下拖动直到出现五个按钮，然后松开鼠标按钮。\n\n\
  **提示**  请注意，许多 Cocoa 的 GUI 类似乎都有一个“影子”形式的*单元格类*：`NSButton` 对应 `NSButtonCell`，依此类推。这种划分源于过去的性能问题。为了加快绘图速度，部分绘图职责从视图类中移出，放入了专门的单元格类中。因此，在一个充满按钮的\
  \ `NSMatrix` 中，不是有一堆完整的 `NSButton` 实例，而是有一堆更简单的 `NSButtonCell` 实例。\n\n现在是时候填写每个按钮标题中显示的值了。从最上面的按钮开始；双击选择“Radio”这个词，然后输入“Greed”。对剩余按钮进行相同操作，依次输入“Revenge”、“Bloodlust”、“Nihilism”和“Insanity”，如图\
  \ 5-7 所示。请注意，此视图不会水平扩展以包含我们输入的文本，因此我们需要通过拖拽中央右侧的调整手柄并向右拖动，直到我们输入的所有文本都可见来自行调整。这也是**使大小适应内容**命令派上用场的情况。\n\
  \n![9781430245421_Fig05-07.jpg](img/9781430245421_Fig05-07.jpg)\n\n图 5-7. 你生活中的主要动机是什么？\n\
  \n在完成之前，我们需要为每个单元格分配一个标签。我们可以使用任何整数作为每个单元格的标签，这样我们就可以通过包含该单元格的矩阵来引用它，而无需为每个单独的单元格设置一个出口。我们要为我们刚创建的矩阵中的每个单元格分配一个唯一的标签，为方便起见，让最上面的单元格从\
  \ 0 开始，然后每向下一个单元格递增 1。除了遵循这个简单的模式外，这还将使我们能够在稍后创建一个字符串数组，其数组中的索引与各自的单元格标签完全匹配（因为\
  \ `NSArray` 使用从零开始的索引，第一个项目的索引为 0，第二个为 1，依此类推）。\n\n从第一个按钮“Greed”开始。在矩阵中选择一个单元格通常需要多次点击。第一次点击选择矩阵，然后第二次点击告诉矩阵我们想要聚焦其内部，第三次点击才实际选择了单元格。一旦单元格被选中（你可以通过高亮显示来判断），在工具区的*属性检查器*中\
  \ (![image](img/arrow2.jpg)4)，在*单元格*属性最底部找到*标签*字段。将其设置为 0。现在选择“Revenge”按钮并将其标签设置为\
  \ 1。继续向下操作矩阵，最后将“Insanity”的标签设置为 4。\n\n现在，用于让用户指定反派主要动机的单选按钮就完成了！像之前一样，复制一个标签，将其拖下来，放在单选按钮组上方稍偏左的位置，并将其标题改为“主要动机：”。我们现在应该得到类似于\
  \ 图 5-8 的结果。\n\n![9781430245421_Fig05-08.jpg](img/9781430245421_Fig05-08.jpg)\n\n\
  图 5-8. 多得数不过来的反派属性！\n\n\n\n## 添加图像视图\n\n没有反派追踪应用能缺少显示反派冷酷面容的功能。在 VillainTracker\
  \ 中，我们将使用 `NSImageView` 类的实例来显示反派图片，并通过 Mac 的拖放机制接收图片作为输入。\n\n返回对象库面板，在搜索字段中输入“image”。搜索结果中有一项是图像井（Image\
  \ Well），它实际上就是 `NSImageView` 的一个实例。将其中一个拖拽到我们的窗口中，并放置在上节单选按钮矩阵的右侧稍远位置。\n\n现在，这个图像井非常小，我们来把它放大。打开尺寸检查器（![image](img/arrow2.jpg)5）；注意图像井的宽度和高度都是\
  \ 48。分别将这两个值编辑修改为 96，控件在窗口中的大小就会改变。我们希望用户能将图像拖入此视图，因此还需要打开属性检查器（![image](img/arrow2.jpg)4），并点击启用“可编辑”复选框。\n\
  \n现在，通过在窗口内稍微拖拽来调整图像井的位置。蓝色的对齐参考线会弹出；请注意，此控件现在与左侧的单选按钮矩阵处于同一垂直高度。将它们并排放置，然后复制另一个标签，将其放在图像视图的左上侧稍远位置，并将其标题改为“外观：”。请参考图\
  \ 5-9 了解此时的粗略布局。\n\n![9781430245421_Fig05-09.jpg](img/9781430245421_Fig05-09.jpg)\n\
  \n图 5-9. 图像井已就位\n\n## 在矩阵中添加复选框\n\n现在我们将添加一系列复选框，让用户标记每个反派的能力。与反派的主要动机类似，我们将创建一个分类系统，将所有超级反派的能力归纳到相应的类别中。我们再次使用矩阵，但这次填充的是复选框，而不是单选按钮。\n\
  \n再次前往*对象库*，在搜索字段中输入“check”。其中一个搜索结果将标记为*复选框*（Check Box）。抓取一个并将其拖入窗口。这会在窗口中放置一个配置为复选框工作的\
  \ `NSButton`。我们打算并排排列四个这样的复选框，但目前只有一个。现在是时候学习 Interface Builder 模式中的一个便捷技巧了：它允许我们自动选取任何可以出现在\
  \ `NSMatrix` 中的对象（例如 `NSButton`），并将其替换为一个新的 `NSMatrix`，该矩阵包含一个与原始对象配置相同的单元格。只需选中该对象（即复选框），然后在菜单中选择**编辑器**\
  \ ![image](img/arrow.jpg)**嵌入到** ![image](img/arrow.jpg)**矩阵**。这个复选框现在就被包裹在一个矩阵中了，我们可以使用之前学习过的调整包含单选按钮的矩阵大小的技巧：按住\
  \ Option 键，点击底部居中的调整手柄，然后向下拖拽，直到出现四个复选框。\n\n接下来，我们来配置这个新矩阵，使其能与一组复选框正确配合。选中矩阵本身（而不是其内部的某个复选框），然后打开实用工具区域中的*属性检查器*（![image](img/arrow2.jpg)4）。通过检查检查器顶部显示的名称来确认我们选中的是矩阵——它应该显示为\
  \ Matrix（矩阵），而不是 Button Cell（按钮单元格）。在检查器窗口的顶部是一个标记为“模式”（Mode）的弹出按钮。如果它没有设置为“高亮”（Highlight），我们就将其改为该模式，以获得正确的行为。\n\
  \n现在，为复选框填充以下（诚然不完整）能力列表的标题：“邪恶天才”、“读心者”、“近乎无敌”、“天气控制”。在点击设置这些值时，我们可能会无意中打开或关闭复选框。对此不必担心；所有这些复选框的状态最终都将由代码本身设定。\n\
  \n与单选按钮矩阵一样，我们需要将矩阵稍微加宽，以便按钮的完整文本都能显示出来。将中心右侧的调整手柄向外拖拽，直到所有文本都可见。\n\n现在，我们需要为所有这些复选框设置标签，就像我们为选择主要动机的单选按钮设置标签一样。点击选中“邪恶天才”单元格，然后打开*属性检查器*（![image](img/arrow2.jpg)4），将标签设置为\
  \ 0。接着点击“读心者”单元格，将其标签设置为 1。继续设置其余复选框，最后将“天气控制”复选框的标签设置为 3。此时，我们应该得到与图 5-10 类似的效果。\n\
  \n![9781430245421_Fig05-10.jpg](img/9781430245421_Fig05-10.jpg)\n\n图 5-10. 为最坏的情况做准备\n\
  \n## 配置弹出按钮\n\n现在我们来处理反派的能量来源，使用一个弹出按钮让用户从预定义列表中选择，以指定反派是如何获得能力的。我们再次提供几个选项：“天生”（反派天生就具备）、“意外事故”（某种“天灾”，如实验室爆炸、陨石撞击或类似事件导致变异）、“超级英雄行为”（某位超级英雄在执行任务时意外赋予了他人能力）以及“其他”。\n\
  \n再次前往*对象库*窗口，在搜索字段中输入“popup”。从搜索结果中抓取一个弹出按钮（Pop Up Button），将其拖入窗口，并放置在上节复选框矩阵的下方稍远位置。通过点击然后双击这个新的弹出按钮，我们可以看到默认的可选值列表。双击第一个值以编辑其文本，将其改为“天生”。继续编辑其余标题，输入上面提到的名称。输入第三个后，按钮的值就用完了；默认的弹出按钮只有三个值。点击这三个值中的某一个，按\
  \ ![images](img/arrow3.jpg)D 键复制它，然后输入最后一个值。现在再抓取一个标签，将其放置在这个弹出按钮的左侧，并将标题改为“能力来源：”。\n\
  \n## 插入文本视图\n\n现在是时候添加最后一个控件了，一个用于编辑有关当前反派自由格式笔记的文本视图。我们将使用 `NSTextView`，这是一个功能强大的文本显示和编辑类，广泛应用于\
  \ Mac OS X 界面。在 Interface Builder 画布中，抓住窗口轮廓上的调整手柄，向下拖拽以放大窗口。一些字段可能会随之移动；调整大小后，将它们重新放回应有的位置。我们可以通过按住\
  \ Shift 键单击，或者拖出选择矩形框选要移动的多个元素来同时选择它们。\n\n腾出一些空间后，在*对象库*面板的搜索字段中输入“text view”，然后将搜索结果中的文本视图拖拽到我们窗口中的其他元素下方。调整其大小，使其填满大部分可用空间。此时的窗口布局应类似于图\
  \ 5-11。\n\n![9781430245421_Fig05-11.jpg](img/9781430245421_Fig05-11.jpg)\n\n图 5-11.\
  \ 所有控件都已放入窗口\n\n## 进行逻辑分组\n\n现在，我们所需的所有控件都已布局在窗口中，让我们退后一步，看看当前的情况。图 5-11 可能与我们现在拥有的界面看起来很相似。\n\
  \n这个界面可能功能齐全，标签清晰，但肯定不会赢得任何设计奖项，这一点是肯定的。我们的界面展示了大量功能，但所有控件都挤在一起，很难看出所有这些可编辑属性之间有什么逻辑分组。\n\
  \n\n\n通过将相关控件分组到*方框视图*中，我们可以对界面进行一些改进；Cocoa 提供了一个名为 `NSBox` 的类，它可以包含多个其他对象，并在它们周围绘制一个漂亮的边框。Xcode\
  \ 包含一个便捷的快捷方式，可以让我们将现有视图放入一个大小恰好能容纳所有视图且边框精确匹配的方框中，因此为界面添加这一增强功能非常容易。\n\n首先，选中前五个控件（位于窗口左上角）及其所有标签。最简单的操作方式是：点击窗口左上角（就在窗口的关闭/最小化/最大化控件下方），然后拖出一个选择框，框选我们想要选择的所有视图。接着从菜单中选择\
  \ **Editor** ![image](img/arrow.jpg) **Embed In** ![image](img/arrow.jpg) **Box**——一个漂亮的方框会环绕它们，带有深灰色背景和圆角。方框顶部有一个文本标签（显示为“Box”），可以编辑成描述方框内容的文字。双击该文本，将其改为“Basic\
  \ Information”。\n\n接下来对“Primary Motivation”部分执行相同的操作。首先，选中标签并按下 Backspace 或 Delete\
  \ 键将其删除。由于我们即将创建的方框中只有一组控件，我们可以直接使用方框的标题。现在选中单选按钮矩阵，再次从菜单中选择 **Editor** ![image](img/arrow.jpg)\
  \ **Embed In** ![image](img/arrow.jpg) **Box**。我们的单选按钮现在被包含在一个方框中。将方框的标签改为“Primary\
  \ Motivation”。\n\n对 mugshot 部分重复这些步骤：先删除现有标签，然后通过菜单创建方框，最后将方框的标签设置为“Appearance”。\n\
  \n接下来处理 powers and abilities。选中“Source of Powers”弹出按钮及其标签，以及能力（Abilities）部分的复选框矩阵。同样，最简单的方法可能是“画一个框”：在窗口右上角附近的背景处点击，然后向左下方拖动，直到所有相关项目都被选中。使用菜单将这些视图放入一个方框中，并将方框标题设为“Powers\
  \ and Abilities”。\n\n最后，选中为 villain 的 notes 属性创建的文本视图，将它放入一个单独的方框中，标题设为“Notes”。\n\
  \n现在我们已经创建了一堆方框，但它们可能彼此重叠，并且相对位置通常不太理想（如图 5-12 所示）。\n\n![9781430245421_Fig05-12.jpg](img/9781430245421_Fig05-12.jpg)\n\
  \n图 5-12. 并非我们见过的最佳方框布局\n\n别担心；Xcode 的蓝色辅助线会帮助我们迅速将其整理整齐。从左上角的第一个方框开始。点击方框深色背景的任意位置（但不要点击控件或标签），然后拖动整个方框。当我们稍微移动它时，蓝色辅助线就会出现。这些辅助线可以帮助我们相对于彼此或相对于窗口本身来定位方框或任何视图。我们总可以通过沿着辅助线追踪到其末端，看它与什么相连，来判断辅助线正在对齐什么。当辅助线一直延伸到窗口边缘时，我们就知道它正在帮助我们设置距窗口边缘的推荐距离。\n\
  \n接着处理“Primary Motivation”方框，将其与上方方框的左边缘对齐，并保持在其下方几个像素的位置，同样利用辅助线来精确调整。然后处理“Appearance”方框，使其在垂直方向上与“Primary\
  \ Motivation”方框对齐，在水平方向上与“Basic Information”方框的右边缘对齐。\n\n继续处理其他方框，将“Powers and Abilities”方框对齐到已排好方框的右侧，然后将“Notes”方框放在所有方框的下方。\n\
  \n如果在移动过程中空间不足，或者你的窗口远大于所有其他视图的总尺寸，请适当调整窗口大小以容纳所有内容。\n\n通过将“Notes”方框移入右下角留下的空隙中来完成此步骤，并调整其内部的\
  \ `NSTextView` 大小以适应新的边界和边距，同时也许还需要微调其他一些方框的尺寸，使它们能够整齐地排列在一起。图 5-13 展示了理想效果。如果尚未保存，请务必保存\
  \ nib 文件！\n\n![9781430245421_Fig05-13.jpg](img/9781430245421_Fig05-13.jpg)\n\n图\
  \ 5-13. 终于，一个值得骄傲的窗口布局！\n\n## 调整大小\n\n现在我们已经有了一个漂亮的窗口，但还需要做一些额外工作来确保一切行为正常：我们需要能够处理用户调整窗口大小的情况。要理解为什么这甚至是有必要的，可以通过从\
  \ **Editor** 菜单中选择 **Simulate Document** 来测试界面。现在调整窗口大小，看看会发生什么。按照我们目前的布局，当垂直调整窗口大小时，所有控件都会保持原位，但我们可以将窗口垂直缩小到某些控件不可见的地步，并且我们根本无法水平调整窗口大小。（根据你跟随操作时布局控件的方式，调整大小的行为可能会有所不同。）我们将在下一章更深入地探讨调整大小。现在，我们将通过将窗口的最小和最大尺寸设为相同值，使窗口不可调整大小，然后继续编写代码。\n\
  \nXcode 使这变得很容易。在 Interface Builder Editor 画布中选中 VillainTracker 窗口后，选择 *尺寸检查器* (![image](img/arrow2.jpg)5)。当前尺寸、最小尺寸和最大尺寸所给出的宽度和高度值应全部相同。勾选\
  \ *最小尺寸* 和 *最大尺寸* 约束对应的复选框，如图 5-14 所示。\n\n![9781430245421_Fig05-14.jpg](img/9781430245421_Fig05-14.jpg)\n\
  \n图 5-14. 设置窗口的尺寸约束\n\n## 连接 VillainTrackerAppDelegate 类\n\n当我们创建 VillainTracker\
  \ 项目时，Xcode 创建了一个名为 `VillainTrackerAppDelegate` 的类。我们将向这个类中添加代码，使其与用户界面控件连接起来，从而在模型-视图-控制器（MVC）的意义上成为一个“控制器”。更复杂的应用程序很可能会有多个控制器类，但对于像这样与单个窗口及应用程序本身交互的简单应用来说，一个控制器就足够了。我们将要添加的大部分代码都将采用输出口（outlets）和动作（actions）的形式，正如上一章所讨论的。这个控制器将拥有指向\
  \ GUI 中所有对象的输出口（以便它可以在需要时设置和检索视图对象中的值），以及用于这些对象的动作方法，以便用户在编辑某个值时通知控制器。\n\n请记住，输出口不过是一个经过特殊标记的属性或实例变量，而动作则是任何符合特定签名的方法，它接受一个类型为\
  \ `id` 的单个参数并返回 void。注意，在源代码中，动作的返回类型通常被标记为 `IBAction` 而不是 void。`IBAction` 实际上被定义为与\
  \ void 相同，因此对于编译器来说没有任何区别。现在，假设我们有某种设计文档，其中指定了几个 villain 属性及其类型。根据它们的类型和用法，我们可以将每个属性映射到一个合适的\
  \ GUI 类（参见表 5-1）。\n\n表 5-1.\n\n\n\n## 反派属性映射到 GUI 类\n\n| 属性名称 | 类型 | 视图类 |\n| ---\
  \ | --- | --- |\n| Name | 字符串（自由格式） | `NSTextField` |\n| lastKnownLocation | 字符串（自由格式）\
  \ | `NSTextField` |\n| lastSeenDate | 日期 | `NSDatePicker` |\n| swornEnemy | 字符串（自由格式，但可从现有列表中选择）\
  \ | `NSComboBox` |\n| primaryMotivation | 字符串（来自预定义列表） | `NSMatrix`（包含单选按钮） |\n\
  | Powers | 字符串数组（来自预定义列表） | `NSMatrix`（包含复选框） |\n| powerSource | 字符串（来自预定义列表） |\
  \ `NSPopUpButton` |\n| Evilness | 数字（0–10） | `NSLevelIndicator` |\n| Mugshot | 图像\
  \ | `NSImageView` |\n| Notes | 字符串（可能较长） | `NSTextView` |\n\n根据此规范，我们将在 `VillainTrackerAppDelegate`\
  \ 中为每个 GUI 控件添加一个 outlet 和一个 action。outlet 让我们能够访问控件，以便在必要时设置和获取其值；每个控件将调用相应的 action\
  \ 方法，以在其内容发生变化时通知我们。为了使代码易于理解，我们将为 outlet 使用特定的命名约定：属性名称加上字符串 \"View\" 作为后缀。例如，对于名为\
  \ `lastSeenDate` 的属性，我们将有一个名为 `lastSeenDateView` 的 outlet。类似地，对于 action，我们将使用动词\
  \ \"take\" 作为前缀。对于属性 `lastSeenDate`，我们的 action 将被命名为 `takeLastSeenDate`。\n\n可以通过手动创建属性或实例变量来将\
  \ outlet 添加到代码中，但更简单的方法是通过从 nib 文件按住 Control 键拖拽到代码窗口来实现。为此，我们首先需要一个包含代码的窗格。点击 Xcode\
  \ 主窗口工具栏右侧编辑器图标组中的 *Assistant* 按钮（看起来像一个管家的躯干）。对于此操作，请确保 Xcode 左侧打开 nib 文件，右侧打开代码编辑器，如图\
  \ 5-15 所示。我们可以通过选择 **View** ![image](img/arrow.jpg) **Assistant Editor** 下的首选位置来定位\
  \ Assistant 窗口。如果尚未打开，请在 Assistant 编辑器窗格中打开 `VillainTrackerAppDelegate.h` 文件。为此，点击窗格顶部的小管家图标，它应该位于\
  \ Automatic 下的选项中。\n\n![9781430245421_Fig05-15.jpg](img/9781430245421_Fig05-15.jpg)\n\
  \n图 5-15. 准备开始创建 outlet\n\n首先，点击标签为 Name: 旁边的文本字段。按住 Control 键拖拽到 Assistant 编辑器窗格中的代码处，拖出一条蓝线，放在现有属性\
  \ `window` 的正下方。拖拽过程中，任何可以作为有效连接终点的内容都会在鼠标下方高亮显示。当到达 Assistant 编辑器窗格中的正确位置时，会出现一个小旗帜，指示\
  \ *Insert Outlet or Action*，如图 5-16 所示。释放鼠标按钮，代码上方会弹出一个小型上下文窗口，我们可以在其中命名 outlet，并在必要时修改一些默认参数。对于此应用，我们不需要更改\
  \ outlet 的默认值。使用上述命名约定命名 outlet：对于保存名称的字段，将 outlet 命名为 `nameView`。\n\n![9781430245421_Fig05-16.jpg](img/9781430245421_Fig05-16.jpg)\n\
  \n图 5-16. 向 VillainTracker 添加第一个 outlet\n\n某些 UI 组件由多个元素组成：复选框矩阵、单选按钮和文本视图。对于矩阵，请确保选中整个矩阵，而不是矩阵内的某个单元格。对于文本视图，我们遇到了相反的问题。文本视图包含在滚动视图中。点击文本区域内部，直到仅文本部分高亮显示，而不是边缘的滚动条。\n\
  \n用于创建 outlet 的弹出窗口应指示类型为 `NSTextView`。如果它显示的是 `NSScrollView`，请点击取消，然后在 Notes 框中再点击一次\
  \ `NSTextView`。\n\n完成后，Assistant 编辑器中的代码应如下所示：\n\n```objc\n#import <Cocoa/Cocoa.h>\n\
  \n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n@property\
  \ (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField *nameView;\n\
  @property (weak) IBOutlet NSTextField *lastKnownLocationView;\n@property (weak)\
  \ IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet NSComboBox\
  \ *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
  @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
  \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
  @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet NSTextView\
  \ *notesView;\n\n@end\n```\n\n以上涵盖了 outlet，现在让我们来处理 action。过程大致相同；我们将再次从 Name 文本字段开始。按住\
  \ Control 键从 Name 文本字段拖拽到代码处，但这次在释放鼠标时，将上下文窗口中的第一个字段从 \"Outlet\" 更改为 \"Action\"\
  。完成后，为每个剩余的 UI 元素拖拽出连接。以 `take` 前缀输入 action 名称：`takeName`、`takeLastKnownLocation`，依此类推。对于两个按钮矩阵（Primary\
  \ Motivation 和 Powers），请确保连接的是矩阵本身，而不是矩阵内部的按钮单元格。窗口应如图 5-17 所示。\n\n![9781430245421_Fig05-17.jpg](img/9781430245421_Fig05-17.jpg)\n\
  \n图 5-17. 添加 takeSwornEnemy action\n\n完成后，Assistant 编辑器中的代码应如下所示：\n\n```objc\n#import\
  \ <Cocoa/Cocoa.h>\n\n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
  \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n@property\
  \ (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet NSComboBox\
  \ *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
  @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
  \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
  @property (weak) IBOutlet NSImageView *mugshotView;\n@property (weak) IBOutlet NSTextView\
  \ *notesView;\n\n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
  - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
  - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
  - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
  \n@end\n```\n\n只要属性和方法存在，它们的顺序与这里看到的不同也是可以的。您可能还会注意到这里似乎缺少了一件事：没有为用于编辑 notes 属性的\
  \ `NSTextView` 定义 action 方法。原因是 `NSTextView` 实际上并不使用 target/action 范式。相反，当内容发生变化时，它会通知其委托。我们将在稍后实现所有这些\
  \ action 方法时一起实现该委托调用。\n\n将 Assistant 编辑器窗格切换到 `VillainTrackerAppDelegate.m` 文件，以便可以看到类的实现。Xcode\
  \ 已经为每个 action 生成了空的方法存根。\n\n```objc\n#import \"VillainTrackerAppDelegate.h\"\n\
  ```\n\n\n```objectivec\n@implementation VillainTrackerAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
  \ *)aNotification {\n    // 在此处插入代码以初始化您的应用程序\n}\n\n- (IBAction)takeName:(id)sender\
  \ { }\n- (IBAction)takeLastKnownLocation:(id)sender { }\n- (IBAction)takeLastSeenDate:(id)sender\
  \ { }\n- (IBAction)takeSwornEnemy:(id)sender { }\n- (IBAction)takeEvilness:(id)sender\
  \ { }\n- (IBAction)takePowers:(id)sender { }\n- (IBAction)takePowerSource:(id)sender\
  \ { }\n- (IBAction)takePrimaryMotivation:(id)sender { }\n- (IBAction)takeMugshot:(id)sender\
  \ { }\n\n@end\n```\n\n请注意，如果你需要在 `.h` 文件中做一些修改才能使其正确，例如删除一个命名错误的属性或一个本应是操作（action）的插座变量（outlet），那么在这里也可能需要进行相应的清理工作。\n\
  \n我们还有最后两个连接需要建立，它们不涉及创建代码。如上所述，文本视图在某种程度上是一种不同的存在。与窗口中的其他可编辑对象不同，`NSTextView` 并不是\
  \ `NSControl` 的子类，这意味着它不了解目标/操作模式。然而，它确实通过调用其委托中的方法来暴露大量功能。稍后，我们将在 `VillainTrackerAppDelegate`\
  \ 内部实现一些委托方法，以便在文本视图的值发生更改时获得更新。现在，只需在 Interface Builder 编辑画布左侧的对象停靠栏中，将文本视图的委托插座变量连接到我们的\
  \ `VillainTrackerAppDelegate` 对象。正如我们创建插座变量时那样，由于文本视图自动包含在一个 `NSScrollView` 中，而该\
  \ `NSScrollView` 又包含在我们之前创建的 `NSBox` 中，这会使操作稍微复杂一些，因此我们可能需要单击或双击一两次，才能实际选中文本视图本身并能够从它拉出连接。\n\
  \n最后，为了我们的控制器类，我们还要建立一个额外的连接。当 nib 文件被加载并且应用程序本身已初始化并准备好与用户交互时，我们希望能够收到通知，以便可以准备初始显示。这可以通过使用\
  \ `NSApplication` 的委托方法来实现，因此从对象停靠栏窗口中的 Application 对象拖动一个连接到 `VillainTrackerAppDelegate`，然后从上下文菜单中选择\
  \ Delegate。\n\n我们做了很多拖拽连接的操作，确保这些连接按预期设置是很好的实践。检查这一点的最佳方法是查看 Xcode 中的连接检查器。在 Interface\
  \ Builder 编辑器左侧边缘的对象停靠栏中，选择当我们悬停时显示名称 `Villain Tracker App Delegate` 的蓝色框。然后选择连接检查器（![图片](img/arrow2.jpg)6），它将在实用工具区域中显示。涉及应用程序委托的连接应类似于图\
  \ 5-18 中所显示的内容。这显示了所有我们连线好的插座变量和操作，以及引用了该应用程序委托的对象。如果建立连接花费了不止一次尝试，或者你本想创建一个操作却创建了一个插座变量，你可能还会在这里看到一些需要修剪的残留连接。你可以将鼠标悬停在此处列出的连接上，以在\
  \ Interface Builder 编辑器窗格中高亮显示已连接的对象，并且可以单击右列中的小“x”图标来断开连接。\n\n![9781430245421_Fig05-18.jpg](img/9781430245421_Fig05-18.jpg)\n\
  \n图 5-18。与 `VillainTrackerAppDelegate` 之间的连接\n\n在我们开始实现这些操作之前，我们还需要解决这个难题的最后一个部分。我们将开始为我们将在本应用程序中使用的模型类铺平道路。\n\
  \n在一个真实的应用程序中，你会为你的反派对象拥有一个合适的模型类，这个类会包含从文件或数据库保存和加载的功能，在后面的章节中，你会看到如何使用 Core Data\
  \ 来实现这一点。但对于这个我们主要关注 GUI 组件如何连接和使用的应用程序，我们将保持简单，并使用一个 `NSMutableDictionary` 来表示每个反派对象。`NSMutableDictionary`\
  \ 确实非常适合这个任务，因为它使我们能够轻松地存储和检索任何类型的值，并且不需要为每个值预定义方法，因为这些值是使用代表键的简单字符串来访问的。\n\n要将此添加到我们的类中，我们将在\
  \ notesView 属性下方声明一个名为 `villain` 的新属性。由于我们将在类内部管理这个属性，我们必须将其标记为 strong 而不是 weak。头文件应如下所示（我们正在添加的代码在此处以粗体显示）：\n\
  \n```objectivec\n#import <Cocoa/Cocoa.h>\n\n@interface VillainTrackerAppDelegate\
  \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
  @property (weak) IBOutlet NSTextField *nameView;\n@property (weak) IBOutlet NSTextField\
  \ *lastKnownLocationView;\n@property (weak) IBOutlet NSDatePicker *lastSeenDateView;\n\
  @property (weak) IBOutlet NSComboBox *swornEnemyView;\n@property (weak) IBOutlet\
  \ NSLevelIndicator *evilnessView;\n@property (weak) IBOutlet NSMatrix *powersView;\n\
  @property (weak) IBOutlet NSPopUpButton *powerSourceView;\n@property (weak) IBOutlet\
  \ NSMatrix *primaryMotivationView;\n@property (weak) IBOutlet NSImageView *mugshotView;\n\
  @property (weak) IBOutlet NSTextView *notesView;\n\n@property (strong) NSMutableDictionary\
  \ *villain;\n\n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
  - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
  - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
  - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
  \n@end\n```\n\n除了从 weak 改为 strong 之外，这看起来与 Xcode 为我们生成的插座变量的代码相同。这个声明告诉编译器，我们的类将包含用于\
  \ `villain` 属性的 getter 和 setter 方法（分别称为 `villain` 和 `setVillain:`），并暗示了 setter 的语义（特别是，`strong`\
  \ 意味着传递给 `setVillain:` 的值将由这个类“拥有”，这与由 nib 文件拥有的插座变量相反）。只要存在一个对象的 `strong` 引用，该对象就会保持存活。一旦没有更多的\
  \ `strong` 引用（但可能仍然存在 `weak` 引用），那么该对象将被释放，任何剩余的 `weak` 引用将被设置为 nil。注意，Xcode 生成的所有插座变量都被标记为\
  \ `weak`。我们的代码不拥有这些对象；它们由其父视图或窗口本身拥有。它还会创建一个实例变量，这将为我们节省一些输入。现在可以在代码中将此属性引用为 `self.villain`。\n\
  \n现在是一个好时机，按下 Xcode 中的运行按钮，确保到目前为止我们没有犯任何错误。如果我们正确输入了所有内容，我们的应用程序应该能够编译通过，没有任何警告或错误，然后启动并显示我们辛苦构建的窗口。如果没有，请查看\
  \ Xcode 显示的错误消息，并尝试修复它们所指出的问题。一般来说，编译 Objective-C 比编译 C++ 或 Java 代码要快得多，所以频繁编译不会有什么损失。在本章的其余部分，我们将频繁编译我们的应用程序并运行它，以确保我们在进入下一个功能之前，每个编码的功能确实能按预期工作。\n\
  \n\n现在我们已经完成了应用程序代码在 GUI 中显示值以及接收用户操作更新所需的所有连接。是时候开始编写应用程序了！\n\n## 开始编码\n\n既然 GUI\
  \ 布局已经完成，我们将实现应用程序的“核心”部分。在 `VillainTracker` 中，所有这些核心功能都将包含在 `VillainTrackerAppDelegate`\
  \ 类中。我们将学习如何使 `NSApplication` 的委托（例如我们的控制器类）在应用程序启动时做出反应；我们将了解用于在已创建的 GUI 对象中显示值的基本\
  \ API；我们还将学习如何通过从相关控件获取值来实现响应用户操作的方法。\n\n### 标准化键名\n\n在开始编写实际代码之前，最好先想出一种方法来标准化用于从模型对象访问属性的键名。无论是像我们这样将\
  \ villain 存储在只能通过键访问属性的字典中，还是在更复杂的使用真实模型对象的情况下，标准化键名对于确保我们在模型对象中正确访问属性至关重要。\n\n\
  我们在这里使用的技术很简单：使用标准的 C 预处理器宏来定义在编译时替换为 `NSString` 实例的名称。这消除了拼错键名的潜在问题，并且还能与 Xcode\
  \ 的代码补全功能很好地配合使用。\n\n以下代码包含了我们在应用程序中使用的所有 villain 属性的键名。有了这些定义，我们就可以（并且应该）使用定义的名称，而不是在代码中使用\
  \ `NSString` 字面量来通过键名引用属性。将以下代码放在 `VillainTrackerAppDelegate.m` 文件的顶部：\n\n```c\n\
  #define kName @\"name\"\n#define kLastKnownLocation @\"lastKnownLocation\"\n#define\
  \ kLastSeenDate @\"lastSeenDate\"\n#define kSwornEnemy @\"swornEnemy\"\n#define\
  \ kPrimaryMotivation @\"primaryMotivation\"\n#define kPowers @\"powers\"\n#define\
  \ kPowerSource @\"powerSource\"\n#define kEvilness @\"evilness\"\n#define kMugshot\
  \ @\"mugshot\"\n#define kNotes @\"notes\"\n```\n\n### 创建默认 Villain\n\n现在是时候创建一个新的\
  \ villain 对象了，它包含用户可以在应用程序中编辑的所有属性。如前所述，我们不会创建一个“真正的”模型类来包含 villain，而是选择更简单的方案，即使用\
  \ `NSMutableDictionary`。我们将在 `NSApplication` 的委托方法 `applicationDidFinishLaunching:`\
  \ 内部创建它。几乎每个 Cocoa 应用程序都需要在启动时做一些设置工作，因此 Xcode 在生成类时已经为我们创建了此方法的存根。现在我们将填充其实现。\n\
  \n代码如下：\n\n```objc\n- (void)applicationDidFinishLaunching:(NSNotification *)aNotification\
  \ {\n    self.villain = [[NSMutableDictionary alloc] initWithObjectsAndKeys:\n \
  \                   @\"Lex Luthor\", kName,\n                    @\"Smallville\"\
  , kLastKnownLocation,\n                    [NSDate date], kLastSeenDate,\n     \
  \               @\"Superman\", kSwornEnemy,\n                    @\"Revenge\", kPrimaryMotivation,\n\
  \                    [NSArray arrayWithObjects:@\"Evil Genius\", nil], kPowers,\n\
  \                    @\"Superhero action\", kPowerSource,\n                    @9,\
  \ kEvilness,\n                    [NSImage imageNamed:@\"NSUser\"], kMugshot,\n\
  \                    @\"\", kNotes,\n                    nil];\n}\n```\n\n这段代码为大多数人都熟悉的默认\
  \ villain 设置了所有属性。`initWithObjectsAndKeys:` 方法用一个以 `nil` 结尾的值和键对列表来填充字典。为了清晰起见，我们将每个值/键对放在单独的一行。我们已经熟悉了使用\
  \ `@\"string\"` 语法来创建新的 `NSString` 字面量，但 `@9` 是新的。这是 `[NSNumber numberWithInt:9]`\
  \ 的简写形式。\n\n请注意，`mugshot` 属性被设置为一个预先存在的 `NSImage` 实例，这是 Cocoa 内置的、可供任何人在其应用程序中使用的几个图像之一。现在是在\
  \ Xcode 中再次编译应用程序的好时机，以确保到目前为止一切正确，但现在运行应用程序仍然没有意义。GUI 已经创建，但目前还没有任何功能在正常工作。\n\n\
  **注意**：你可能会疑惑为什么要将 `NSApplication` 委托的初始化代码放在 `applicationDidFinishLaunching:` 方法中，而不是放在\
  \ `init` 方法中。从应用程序的主 nib 文件加载的对象总是处于一种特殊的困境中：它们是在应用程序自身初始化过程中作为子步骤被初始化的，这意味着在 `init`\
  \ 被主 nib 文件中的任何对象调用时，`NSApplication` 本身可能尚未完全初始化！这会产生很多影响，尤其是在用户界面方面，因此通常最好将所有初始化工作推迟到一切准备就绪后再进行。由于\
  \ `VillainTrackerAppDelegate` 被设置为 `NSApplication` 的委托，通过实现 `applicationDidFinishLaunching:`\
  \ 方法，你可以方便地得知应用程序何时真正准备就绪。\n\n### 关注细节\n\n之前的代码创建了一个 villain 对象，但如果我们现在构建并运行应用程序，将看不到\
  \ villain 的任何迹象。窗口上的所有控件都将是空白的，因为我们还没有使用 villain 属性中的值填充它们。现在是时候改变这一点了。在 `VillainTrackerAppDelegate`\
  \ 类中，我们将创建一个名为 `updateDetailViews` 的新私有方法，该方法负责设置所有 GUI 对象以显示当前 villain 的属性。我们将此功能放在一个独立的方法中（而不是直接在\
  \ `applicationDidFinishLaunching:` 内部进行设置），这样我们不仅可以在应用程序启动时，还可以在需要时刷新视图。我们将完成显示\
  \ villain 属性的过程，并熟悉与 GUI 中各种类交互的基础知识。\n\n让我们从创建新方法的一个简单“存根”开始。我们希望此方法可以从类内部的任何地方访问，但不能从外部访问。一种方法是不将其添加到\
  \ `.h` 文件的 `@interface` 声明中。因此，在 `VillainTrackerAppDelegate.m` 文件底部的 `@end` 声明上方，插入以下代码：\n\
  \n```objc\n- (void)updateDetailViews {\n}\n```\n\n在开始实现新方法之前，我们需要确保已准备好调用它，方法是在\
  \ `applicationDidFinishLaunching:` 的末尾插入以下代码行：\n\n```objc\n// insert this at the\
  \ end of applicationDidFinishLaunching:\n[self updateDetailViews];\n```\n\n快速编译一下，以确保到目前为止我们的代码可以顺利编译。现在是时候开始实现\
  \ `updateDetailViews` 方法，并最终在我们的窗口中看到一些 villain 数据了！\n\n### 设置简单值\n\n我们将要设置显示的前两个控件是包含\
  \ villain 姓名和最后已知地点的 `NSTextField`。`NSTextField` 也可以直接接受数字和其他类型的输入，但我们这里只是使用 `setStringValue:`\
  \ 为每个控件传入一个简单的字符串。将以下代码行放在 `updateDetailViews` 方法的开头（我们刚才用一对空括号定义了该方法）：\n\n```objc\n\
  [self.nameView setStringValue:[self.villain objectForKey:kName]];\n[self.lastKnownLocationView\
  \ setStringValue:\n                  [self.villain objectForKey:kLastKnownLocation]];\n\
  ```\n\n请注意，我们复用了之前定义的预处理器宏，因此不必担心拼错字符串值。\n\n\n\n现在我们应该能够编译、运行此应用，并确实在窗口的文本字段中看到一些数据了！\n\
  \n接下来，我们将设置`NSDateView`的值。将以下代码添加到`updateDetailViews`方法的末尾：\n\n```\n[self.lastSeenDateView\
  \ setDateValue:\n                  [self.villain objectForKey:kLastSeenDate]];\n\
  ```\n\n这显然与我们为`NSTextFields`所做的非常相似：同样使用了预处理宏，为目标对象调用了相关方法（本例中为`setDateValue:`），等等。输入这段代码后，我们应该再次编译并运行，以确保它正常工作，并且日期视图中显示了正确的日期（今天的日期）。\n\
  \n现在我们了解了这里的模式，让我们迈出更大的一步，看看如何一次为所有剩余的“简单”控件设置值。我们可以在每次添加后编译并运行以检查工作进展，或者如果我们觉得运气不错，也可以一次性输入所有代码，然后在最后编译并运行。将以下代码行添加到`updateDetailViews`方法的末尾：\n\
  \n```\n[self.evilnessView setIntegerValue:\n                  [[self.villain objectForKey:kEvilness]\
  \ integerValue]];\n[self.powerSourceView setTitle:[self.villain objectForKey:kPowerSource]];\n\
  [self.mugshotView setImage:[self.villain objectForKey:kMugshot]];\n[self.notesView\
  \ setString:[self.villain objectForKey:kNotes]];\n```\n\n这里唯一的复杂之处在于`evilnessView`。该视图期望一个`NSInteger`来设置其值，但我们的反派角色的邪恶度值是以`NSNumber`的形式存储在字典中的，因此我们多了一个步骤，需要将对象转换为`NSInteger`。\n\
  \n### 复杂控件中的值\n\n在我们将要显示的剩余属性中，有两个是简单值（`swornEnemy`和`primaryMotivation`），而第三个属性`powers`是一个“复合值”：一个字符串数组。所有这些属性都在比之前的属性更复杂的视图中显示，因此我们将花更多时间分别处理它们。\n\
  \n首先，让我们处理`swornEnemy`属性，它显示在`NSComboBox`中。组合框维护一个项目列表，如果我们想向其中添加新值，必须手动编辑。每当我们显示一个反派角色，其`swornEnemy`是在\
  \ Xcode 中设置组合框时未曾预料到的人时，我们就需要这样做。在以下代码中，我们首先检查组合框是否包含与我们要显示的名称匹配的项目。如果没有，则添加一个。之后，我们告诉组合框选择相应的项目。将以下代码添加到`updateDetailViews`方法的末尾：\n\
  \n```\nif ([self.swornEnemyView indexOfItemWithObjectValue:\n      [self.villain\
  \ objectForKey:kSwornEnemy]] == NSNotFound) {\n    [self.swornEnemyView addItemWithObjectValue:\n\
  \      [self.villain objectForKey:kSwornEnemy]];\n}\n[self.swornEnemyView selectItemWithObjectValue:\n\
  \      [self.villain objectForKey:kSwornEnemy]];\n```\n\n现在编译并运行，组合框应该显示正确的值，本例中为“Superman”。我们可以通过修改`applicationDidFinishLaunching:`方法中的相关行，将其引用为\
  \ nib 文件中不存在的其他超级英雄名字，然后重新编译并运行，来验证这对于未包含在 nib 文件组合框中的项目也能正常工作。\n\n接下来，让我们处理显示在单选按钮矩阵中的`primaryMotivation`属性。`NSMatrix`类允许我们通过指定其标签来选择单个单元格，而且由于这些是单选按钮，其他单元格将自动取消选择。我们要做的第一件事是定义一个方法，该方法返回一个字符串数组，包含我们为反派角色考虑的所有动机。这些字符串的排列顺序应与\
  \ nib 文件中复选框矩阵中单元格的顺序相同，以便它们的索引值与为每个单元格指定的标签相匹配。此方法应添加到`updateDetailViews:`方法之后。\n\
  \n```\n+ (NSArray *)motivations {\n    static NSArray *motivations = nil;\n    if\
  \ (!motivations) {\n        motivations = [[NSArray alloc] initWithObjects:@\"Greed\"\
  ,\n          @\"Revenge\", @\"Bloodlust\", @\"Nihilism\", @\"Insanity\", nil];\n\
  \    }\n    return motivations;\n}\n```\n\n关于这个新方法，有几点值得注意，每一点都可能对 Cocoa 中使用的设计模式和哲学有所启示：\n\
  \n*   这是一个类方法，而不是实例方法（由开头的`+`而不是`-`表示），因此这里发生的一切都应用于整个类，无论我们创建了多少个实例。这在许多情况下是合适的，尤其是当方法不处理任何特定于实例的内容（例如实例变量）时。\n\
  *   我们使用了一个局部定义的静态变量来指向我们创建的对象。初始赋值`nil`仅在方法第一次被调用时发生。这与标准 C 函数中静态局部变量的使用完全相同，它让我们定义一段代码块（`if`子句内的所有内容），该代码块仅在此方法第一次被调用时执行。\n\
  *   我们遵循一个称为*懒加载*的原则。我们不是在类初始化时创建数组，而是在第一次需要它时才创建。这样，如果没有人调用这个方法，数组就永远不会被创建。\n\n\
  乍一看，遵循这些原则可能有些小题大做。毕竟，我们只会有一个控制器类的实例，所以为什么要把它做成类方法呢？而且我们知道需要初始化那个数组，为什么要懒加载呢？\n\n\
  当然，在这个人为设计的例子中，我们可以选择走“更简单”的路线。我们可以直接获取`NSArray`创建代码，并将其插入到我们需要查看动机列表的任何地方！然而，从长远来看，用“简单”的方式做事常常会适得其反，最终变得一点也不简单。事实上，看到相同的代码片段在整个程序中重复出现几乎总是一个危险信号。除非不可避免，否则请*不要重复自己*——让你的代码保持`DRY`！请记住，你构建的系统未来可能会增长和扩展——方式可能是你今天无法预料的。用“正确”的方式做事是为你的代码提供将来保障的好方法，这样以后查看代码的人（例如，试图找到在哪里添加动机列表）能够理解发生了什么，并找到他们需要修改的那一个地方，而不是手动搜索并替换所有创建相同数组的地方。\n\
  \n有了我们的`motivations`方法，我们现在就可以从中获取一个索引号，以标识我们想要在 GUI 中选择的单元格的标签。以下是实现此目的的一种方法，准备添加到`updateDetailViews:`的末尾：\n\
  \n```\n[self.primaryMotivationView selectCellWithTag:\n  [[[self class] motivations]\
  \ indexOfObject:\n    [self.villain objectForKey:kPrimaryMotivation]]];\n```\n\n\
  好吧，我们意识到如果你不习惯这种写法，它看起来有点乱；甚至可能让一些人回想起在计算机科学教育中不得不学习，并且多年来一直试图忘记的 Lisp 或 Scheme（这些感觉是正常的，并且会随着时间的推移而消退）。为了清晰起见，我们将稍微拆解一下，并展示上述代码的另一种版本，其中一些中间值被赋值给了变量。\n\
  \n```\nNSArray *motivations = [[self class] motivations];\nid primaryMotivation\
  \ = [self.villain objectForKey:kPrimaryMotivation];\nint motivationIndex = [motivations\
  \ indexOfObject:primaryMotivation];\n[self.primaryMotivationView selectCellWithTag:motivationIndex];\n\
  ```\n\n这非常直接了当，所以你可能想知道我们为什么要先给你看那个所有代码都挤在一起的第一版。\n\n\n\n基本上，第一个版本是一种 Objective-C\
  \ 风格，你*迟早*会在实际开发中遇到它，所以能够大致看懂它是有好处的。这并不是因为它在技术上有什么优越性（实际上没有），而仅仅是因为有些人认为这种高度嵌套的版本在某些方面更易读，并且更倾向于这样写代码。方括号的位置，结合\
  \ Xcode 文本编辑器的特性，让你可以轻松地对前一个版本执行一些操作，而这些操作在后一个版本中会花费更多时间。例如，在 Xcode 中双击一个方括号会选中整个括号表达式，包括括号本身，这意味着你可以通过一次双击轻松选中整个方法调用，包括接收者、方法名和所有参数。这在编辑代码以及浏览或阅读代码时都非常有用。\n\
  \n另一方面，我们向你展示的第二种形式在调试应用程序时非常有帮助。只需设置一个断点，你就拥有了一整套的中间变量，随时准备向你展示它们的内容。最终，你倾向于哪种风格取决于个人喜好和实用性。在当下情况下，使用最适合你的方法即可。在你积累更多\
  \ Cocoa 经验之前，最好还是坚持使用后一种风格，因为它能更清晰地显示执行的顺序。现在，`updateDetailViews` 方法末尾使用的上述任何一种替代方案都应该能正常工作。编译并运行，验证\
  \ GUI 中显示的正确主要动机是“Revenge”。\n\n最后，是时候显示 powers 属性了。与 `primaryMotivation` 类似，反派的能力显示在一个按钮单元矩阵中。不过，这次按钮单元是复选框，并且可以选择（或“勾选”）任意数量的复选框。powers\
  \ 属性不是一个单独的字符串，而是一个 `NSArray`，其中包含你所查看反派的**所有**相关字符串。\n\n我们将从与我们为 `primaryMotivation`\
  \ 属性添加的内容非常相似的东西开始：一个名为 `powers` 的新类方法：\n\n```objectivec\n+ (NSArray *)powers {\n\
  \    static NSArray *powers = nil;\n    if (!powers) {\n        powers = [[NSArray\
  \ alloc] initWithObjects:@\"Evil Genius\",\n                  @\"Mind Reader\",\
  \ @\"Nigh-invulnerable\", @\"Weather Control\", nil];\n    }\n    return powers;\n\
  }\n```\n\n与 `motivations` 方法类似，此方法创建一个字符串数组，数组中字符串的索引对应 nib 文件中矩阵中定义的标签。现在我们只需添加一段代码来有选择地“勾选”所有适当的复选框。将以下代码添加到\
  \ `updateDetailViews` 方法的末尾：\n\n```objectivec\n[self.powersView deselectAllCells];\n\
  \nfor (NSString *power in [[self class] powers]) {\n    if ([[self.villain objectForKey:kPowers]\
  \ containsObject:power]) {\n        [[self.powersView cellWithTag:\n          [[[self\
  \ class] powers] indexOfObject:power]]\n          setState:NSOnState];\n    }\n\
  }\n```\n\n这段代码现在应该很容易理解。首先，它取消选择所有单元，这样我们就从所有复选框都未勾选的干净状态开始。然后，它遍历我们能力主列表中的每个命名能力，检查我们反派的能力属性是否包含匹配的字符串，如果包含，则将该单元的状态设置为\
  \ `NSOnState`，这意味着复选框被勾选。这里需要注意的一个新东西是特殊的 `for` 结构。这被称为**快速枚举**，是 Objective-C 最新版本中的一个新增特性，其工作方式不同于\
  \ C 语言中任何形式的 `for`，但你可能会熟悉它，因为它在 Java 或 C# 中作为 `foreach` 循环出现。它基本上接收 `in` 右侧的一个集合（通常是一个\
  \ `NSArray`），并对其进行迭代，一次一个地将集合中的每个对象赋值给 `in` 左侧指定的变量，然后执行后面花括号包裹的代码。\n\n现在编译并运行应用程序，相关的复选框应该会在显示中被选中（对于\
  \ Lex Luthor 来说是“Evil Genius”）。\n\n## 响应输入\n\n既然我们能够显示所有这些反派属性，现在是时候反过来编写代码，让我们能够注意到用户对这些字段所做的更改。我们之前创建了由各种\
  \ GUI 控件触发的空操作方法；现在是我们填充这些方法并让它们做有用事情的时候了！此外，我们将实现一个委托方法，以便获取窗口中不能通过 target/action\
  \ 工作的那个视图（`NSTextView`）的编辑值。\n\n让我们从用于显示和编辑反派名称的 `NSTextField` 开始，它会触发 `takeName:`\
  \ 方法。将方法改为如下所示：\n\n```objectivec\n- (IBAction)takeName:(id)sender {\n    [self.villain\
  \ setObject:[sender stringValue] forKey:kName];\n    NSLog(@\"current villain properties:\
  \ %@\", self.villain);\n}\n```\n\n此方法首先从发送者（即文本字段本身）获取字符串值，并将其传递给反派对象以设置其名称。因为我们包含了\
  \ `@synthesize villain` 指令，所以可以直接引用 `villain`，而不需要输入 `self.villain`。最后，我们进行一些日志记录，以显示反派的所有当前属性。这有助于调试，并且在运行时也可以作为我们代码的测试，以便我们能看到它确实在按照预期工作。`NSLog`\
  \ 函数将其第一个参数作为一个 `NSString` 来定义输出格式，并为字符串中的每个格式化标签（以 `%` 符号开头的特殊序列）提供一个额外的参数。这与 C\
  \ 语言中的标准 `printf` 函数非常相似，只是增加了 `%@` 标签，用于打印任何 Objective-C 对象的描述。`NSLog` 的输出显示在 Xcode\
  \ 的控制台窗口中，该窗口通常在我们从 Xcode 内部启动应用程序时自动出现。\n\n**提示** 操作方法总是会传递一个发送者对象，该对象通常是用户点击或编辑的、触发方法调用的对象。如果我们的操作方法可能被多个\
  \ GUI 对象触发，我们可以通过检查 `sender`、将其与我们的实例变量进行比较等方式来确定它来自哪个对象。\n\n编译并运行应用程序，然后选择包含 Lex\
  \ Luthor 名字的文本字段。以某种方式更改名称，按 Tab 键（或单击窗口中的另一个控件），代码中指定的输出应该会打印到 Xcode 的输出窗格中。如果你在运行应用程序时在\
  \ Xcode 中没有看到任何输出窗口，请切换到 Xcode 并按 ![image](img/arrow1.jpg)NC（或选择**视图** ![image](img/arrow.jpg)\
  \ **调试区域** ![image](img/arrow.jpg) **激活控制台**）打开控制台窗口。反派字典的输出格式使得你可以看到每个键及其关联的值。你应该能够找到\
  \ Name 键，并看到其值已更改为你输入的新值。\n\n我们其余的大多数操作方法都与 `takeName:` 方法类似，应该是不言自明的。它们每个都只是完成我们在\
  \ `updateDetailViews` 方法中所做工作的逆过程，从 GUI 中获取值并将其应用到我们的模型对象中。以下是所有“简单”操作方法的代码：\n\n\
  ```objectivec\n- (IBAction)takeLastKnownLocation:(id)sender {\n    [self.villain\
  \ setObject:[sender stringValue] forKey:kLastKnownLocation];\n    NSLog(@\"current\
  \ villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeLastSeenDate:(id)sender\
  \ {\n    [self.villain setObject:[sender dateValue] forKey:kLastSeenDate];\n   \
  \ NSLog(@\"current villain properties: %@\", self.villain);\n}\n\n- (IBAction)takeSwornEnemy:(id)sender\
  \ {\n    [self.villain setObject:[sender stringValue] forKey:kSwornEnemy];\n   \
  \ NSLog(@\"current villain properties: %@\", self.villain);\n}\n```\n\n\n\n- (IBAction)takePrimaryMotivation:(id)sender\
  \ {  \n    [self.villain setObject:[[sender selectedCell] title]  \n        forKey:kPrimaryMotivation];\
  \  \n    NSLog(@\"当前反派属性: %@\", self.villain);  \n}  \n\n- (IBAction)takePowerSource:(id)sender\
  \ {  \n    [self.villain setObject:[sender title] forKey:kPowerSource];  \n    NSLog(@\"\
  当前反派属性: %@\", self.villain);  \n}  \n\n- (IBAction)takeEvilness:(id)sender {  \n\
  \    [self.villain setObject:[NSNumber numberWithInteger:[sender  \n        integerValue]]\
  \ forKey:kEvilness];  \n    NSLog(@\"当前反派属性: %@\", self.villain);  \n}  \n\n- (IBAction)takeMugshot:(id)sender\
  \ {  \n    [self.villain setObject:[sender image] forKey:kMugshot];  \n    NSLog(@\"\
  当前反派属性: %@\", self.villain);  \n}  \n\n```  \n将所有这些代码输入到 `VillainTrackerAppDelegate`\
  \ 的 `@implementation` 部分，然后编译并运行应用。现在，我们应该能够编辑到目前为止处理的所有字段，并在输出日志中看到它们的值发生变化。要为头像设置图片，只需从\
  \ Mac 上的任意位置拖拽任意图片（来自 Finder 的图片文件、iPhoto 中的照片、Safari 中的图片等）并将其放入头像视图中。\n\n请注意，对于\
  \ `swornEnemy` 组合框和 `primaryMotivation` 单选按钮矩阵，虽然设置值的步骤稍显复杂，但从它们中检索值却非常简单，只需一行代码即可完成。\n\
  \n剩下的复杂视图——Powers 复选框矩阵，检索值也稍微复杂一些，因为我们需要找到所有选中的复选框并获取其关联的字符串。以下代码可以完成此任务：\n\n```\
  \  \n- (IBAction)takePowers:(id)sender {  \n    NSMutableArray *powers = [NSMutableArray\
  \ array];  \n    for (NSCell *cell in [sender cells]) {  \n        if ([cell state]==NSOnState)\
  \ {  \n            [powers addObject:[cell title]];  \n        }  \n    }  \n  \
  \  [self.villain setObject:powers forKey:kPowers];  \n    NSLog(@\"当前反派属性: %@\"\
  , self.villain);  \n}  \n```  \n\n编译并运行应用，在 Powers 矩阵中点击各个复选框，输出日志应该会相应地更新。\n\n\
  最后，我们需要实现一个方法，用于从 Notes 视图（即`NSTextView` 的实例）中检索值。`NSTextView` 提供了许多委托方法，让我们能够根据用户编辑文本时的操作执行多种不同操作。我们将采用一种非常简单的方法：每次用户编辑文本时（即每次按键后！）都获取值的副本。对于大型文档视图，这样做可能过于极端（且效率极低），需要考虑性能影响；但对于旨在容纳少量笔记的小型文本视图，这种简单方法不会带来任何问题：\n\
  \n```  \n- (void)textDidChange:(NSNotification *)aNotification {  \n    [self.villain\
  \ setObject:[[self.notesView string] copy] forKey:kNotes];  \n    NSLog(@\"当前反派属性:\
  \ %@\", self.villain);  \n}  \n```  \n\n这里发生了一件不寻常的事情：我们正在创建从 `notesView` 的 `string`\
  \ 方法返回结果的副本。这样做的原因是，在内部，`NSTextView` 会保留自己的字符串用于编辑和显示，而其 `string` 方法实际上返回的是指向该内部字符串对象的指针。如果我们不创建副本，该字符串将被我们的\
  \ `villain` 直接引用，这可能会导致之后在这些 GUI 对象显示不同反派时出现混乱。最终，多个反派会引用同一个字符串，编辑任何一个反派的笔记都会同时修改所有反派的笔记！`NSTextField`\
  \ 不会引起此类问题，因为其 `stringValue` 方法返回的是副本，而非内部字符串对象。\n\n另需指出的是，我们实现的 `NSTextView` 委托方法有一个奇特的方法签名，并且传递了一个\
  \ `NSNotification` 作为参数。\n\n这里我们看到了 Cocoa 中通用通知系统的一点影子。使用名为 `NSNotificationCenter`\
  \ 的类，我们可以配置任何对象在特定事件发生时接收来自其他对象的通知。当我们为 `NSTextView` 设置委托时（仅举一例，其他一些类也存在此模式），我们可以选择实现的一些委托方法是委托专有的，只能在该处实现；但其中一些是此类通知方法，理论上也可以在能够访问\
  \ `NSTextView` 并已配置好接收其通知的任何其他类中实现。我们将在本书后面更详细地讨论此主题。\n\n## 总结\n\n本章涵盖了大量的内容。我们学习了对任何\
  \ Cocoa 应用都至关重要的一些基础知识：如何在应用启动时执行我们自己的初始化代码；如何使用 Xcode 的 Interface Builder 编辑器在窗口中布局视图，包括指定调整大小行为；如何使用各种\
  \ Cocoa GUI 类的基础知识；等等。在下一章中，我们将以目前所做的工作为基础，扩展 VillainTracker 应用，使其能够处理表格中列出的一系列反派。\n\
  \n# 第 6 章：使用表格视图\n\n第 4 章和第 5 章涵盖了一些 Cocoa 最常用的 GUI 组件，从按钮和简单的输入字段到功能齐全的文本编辑器。我们还没有谈到\
  \ Cocoa 最大、最复杂的视图类之一：`NSTableView`。本章将介绍如何使用 `NSTableView` 来显示整个组件集合的数据，如何响应用户通过点击行来更改表格选择，以及如何直接在表格中编辑值。\n\
  \n我们将通过扩展第 5 章中的 VillainTracker 应用来学习如何使用表格视图。本章将要创建的 VillainTracker 新版本将维护一个反派数组，在一个表格中显示所有反派，并允许用户点击表格中的条目来编辑所选反派的所有属性。我们将从使用\
  \ Xcode 扩展 `VillainTrackerAppDelegate` 类的接口开始，使其包含一个反派数组。既然无论如何都要处理这段代码，我们还将研究通过手动添加一些新出口的方法，用于连接新的表格视图和窗口本身，以及用于添加和删除反派的操作方法。然后，我们将在\
  \ Interface Builder 模式下扩展 nib 文件，添加一个表格视图并进行连线。之后，我们将返回 Xcode 修改控制器的实现以处理表格。图 6-1\
  \ 显示了最终结果。\n\n![9781430245421_Fig06-01.jpg](img/9781430245421_Fig06-01.jpg)\n\n\
  图 6-1. 完成的应用窗口\n\n在前面的章节中，我们通过从 GUI 控件拖拽到代码中，并让 Xcode 生成相应的存根来创建新的出口和操作。在本章中，由于我们是在扩展现有代码，我们将手动创建存根。这两种方法都是完全有效的，了解这两种方法可以让您根据情况选择最方便的一种。\n\
  \n### 为处理多个反派准备 VillainTrackerAppDelegate\n\n在 Xcode 中，打开我们在第 4 章创建的项目，导航到 `VillainTrackerAppDelegate.h`，以便更新类的接口以适应即将进行的更改。首先，我们将添加所需的新实例变量。因为我们要维护一个反派列表，所以我们将创建一个名为\
  \ `villains` 的 `NSMutableArray` 来包含所有反派。我们还将添加一个名为 `villainsTableView` 的出口，以便访问我们即将用来展示反派列表的\
  \ `NSTableView`。\n\n我们还将添加 `newVillain:` 和 `deleteVillain:` 的声明，这是我们两个新的操作方法。\n\n\
  \n\n下面的代码展示了进行这些更改后`VillainTrackerAppDelegate.h`的状态（新增的行以**粗体**显示）：\n\n```objectivec\n\
  #import <Cocoa/Cocoa.h>\n\n@interface VillainTrackerAppDelegate : NSObject <NSApplicationDelegate>\n\
  \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSTextField\
  \ *nameView;\n@property (weak) IBOutlet NSTextField *lastKnownLocationView;\n@property\
  \ (weak) IBOutlet NSDatePicker *lastSeenDateView;\n@property (weak) IBOutlet NSComboBox\
  \ *swornEnemyView;\n@property (weak) IBOutlet NSLevelIndicator *evilnessView;\n\
  @property (weak) IBOutlet NSMatrix *powersView;\n@property (weak) IBOutlet NSPopUpButton\
  \ *powerSourceView;\n@property (weak) IBOutlet NSMatrix *primaryMotivationView;\n\
  @property (weak) IBOutlet NSImageView *mugshotView;\n@property (unsafe_unretained)\
  \ IBOutlet NSTextView *notesView;\n@property (weak) IBOutlet NSTableView *villainsTableView;\n\
  \n@property (strong) NSMutableDictionary *villain;\n@property (strong) NSMutableArray\
  \ *villains;\n\n- (IBAction)takeName:(id)sender;\n- (IBAction)takeLastKnownLocation:(id)sender;\n\
  - (IBAction)takeLastSeenDate:(id)sender;\n- (IBAction)takeSwornEnemy:(id)sender;\n\
  - (IBAction)takeEvilness:(id)sender;\n- (IBAction)takePowers:(id)sender;\n- (IBAction)takePowerSource:(id)sender;\n\
  - (IBAction)takePrimaryMotivation:(id)sender;\n- (IBAction)takeMugshot:(id)sender;\n\
  \n- (IBAction)newVillain:(id)sender;\n- (IBAction)deleteVillain:(id)sender;\n\n\
  @end\n```\n\n这些新声明的结构与上一章中我们通过控制拖拽到`VillainTrackerAppDelegate`类时，Xcode 生成的属性和方法相同。Xcode\
  \ 会注意到这些代码已被添加，并且这些输出口和操作方法与 Xcode 生成的同样有效。实际上，请注意代码编辑器窗格左边距中出现的小圆圈。这些圆圈是我们可以通过控制拖拽连接到的端点，这表明\
  \ Xcode 识别了我们所做的事情，即创建了一个输出口或操作方法。在布局用户界面时，通过控制拖拽来创建它们非常方便，因为我们可以同时建立连接并创建存根。然而，在调整现有代码时，手动操作可能更快。\n\
  \n现在，我们将在`VillainTrackerAppDelegate.m`中为新的操作方法添加两个方法实现（目前只是空壳）。将这些行添加到`@implementation\
  \ VillainTrackerAppDelegate`部分：\n\n```objectivec\n- (IBAction)newVillain:(id)sender\
  \ {}\n- (IBAction)deleteVillain:(id)sender {}\n```\n\n现在，我们已经向`VillainTrackerAppDelegate`的接口添加了所需内容，并向实现添加了一些空的存根方法。点击“运行”按钮以确保编译无误，然后我们将继续调整\
  \ GUI，为表格腾出空间。\n\n## 为表格视图腾出空间\n\n在 Xcode 的*项目导航器*面板中，单击`MainMenu.xib`以在 Interface\
  \ Builder 模式下打开它（我们也可以双击`MainMenu.xib`文件在新窗口中打开它）。我们将放大窗口，添加一个表格视图和几个按钮，重新组织布局，并调整所有`NSBoxes`的调整大小特性，以便表格视图可以在两个维度上完全调整大小，而其他盒子将相应地移动。\n\
  \n首先调整窗口大小，使其宽度增加约 300 像素（大约是原来宽度的一半），但高度保持不变。我们将遵循西方从左到右的阅读习惯来安排布局，使得左侧的选项（在表格视图中）决定右侧显示的内容（所有其他视图），因此您还应该将所有现有视图拖到窗口的右侧。请参见图\
  \ 6-2 了解目标布局。在选中窗口的情况下，打开*属性检查器*（![image](img/arrow2.jpg)4），并勾选“调整大小”复选框。\n\n![9781430245421_Fig06-02.jpg](img/9781430245421_Fig06-02.jpg)\n\
  \n图 6-2. 使您的窗口看起来像这样，为表格视图做准备\n\n现在，在*实用工具*区域（它可能折叠在*检查器*窗格下方）中打开*对象库*窗格（![images](img/arrow6.jpg)4），然后在搜索字段中输入“table”。搜索结果之一应该是“表格视图”，它是包含在`NSScrollView`中的`NSTableView`类的一个实例。将“表格视图”拖到窗口左上方空间，让蓝色参考线出现，将其定位到距离窗口边框的推荐距离。表格视图的默认大小比我们放置它的空间小得多，但暂时不要调整它来填充可用空间，我们稍后会处理。\n\
  \n我们要对这个表格视图做的第一件事是配置其列。默认情况下，新的表格视图有两列，但我们希望它有**三列**，以便在列表中显示每个反派的名字、最后一次出现日期和头像。要添加一列，我们必须“深入”浏览几层视图。打开*属性检查器*（![image](img/arrow2.jpg)4）以帮助导航；它总是显示关于所选对象的一些信息，最关键的是类名。第一次单击窗口中的表格视图时，我们会看到*属性检查器*顶部显示“滚动视图”。这是因为我们从库中拖出的表格视图实际包含在`NSScrollView`中。再次单击，检查器将显示“表格视图”。\n\
  \n检查器中可见的属性之一是列数。将其从 2 改为 3。当列数更改时，表格视图中会短暂闪过一个水平滚动条，但很容易错过。除了那个闪烁和表格标题边缘的调整大小栏提示外，表格视图在视觉上并不会真正反映现在有三列；我们稍后会处理这个问题。同时，还需要对表格视图进行另外两项更改。第一项是将*列调整大小*行为从“仅调整最后一列大小”更改为“仅调整第一列大小”。我们的第一列将存放反派的名字，而反派名字的宽度比日期或头像变化更大，因此我们希望调整大小时扩展该列。默认情况下，用户将能够随意调整列宽。\n\
  \n第二项是使用列数上方的弹出菜单，将表格视图的*内容模式*从基于单元格更改为基于视图。请注意，表格中占位符的名称已从“文本单元格”变为“表格视图单元格”。不幸的是，`NSTableView`中最初显示的对象的命名有点令人困惑。文本单元格是`NSTextFieldCell`，它是`NSCell`的子类。然而，表格视图单元格是`NSTableCellView`的实例，它是`NSView`的子类，而不是`NSCell`，尽管默认标题中使用了“cell”一词。在本书中，我们使用表格视图所做的一切都将基于视图的表格视图。\n\
  \n**注意** 我们在上一章中简要介绍了单元格。这里提供更多背景信息。在 33Mhz 处理器被视为快速的时代，AppKit 的设计者发现为矩阵或表格中的每个单元格使用单独的视图对象开销太大。为了解决这个问题，他们为这些用户界面部分发明了“单元格”对象的概念。单元格只是表示控件状态的数据承载对象，具有自己的目标和操作输出口，但没有绘图、文本管理和事件管理的开销。单元格不是`NSView`的子类，这使它们成为更轻量级的对象。这意味着基于单元格的用户界面控件必须处理视图（实际可以在屏幕上绘制并响应用户操作）与单元格（不能）之间的状态协调。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n在 iOS 中，这种分离已不复存在，苹果似乎也在将\
  \ Cocoa 推向这个方向；`NSTableView` 现在支持使用单元格（像传统 Cocoa 一样）或视图（像 iOS 一样）作为其子视图。`NSMatrix`\
  \ 目前尚未支持此功能，但未来版本可能会实现。让我们看看能否找到第三列。在窗口中的表格视图外单击以取消选中它，然后再次单击表格视图以选中包含它的滚动视图。你的\
  \ Xcode 中的 Interface Builder 窗格应类似于图 6-3。单击表格视图的右边缘并稍稍展开，使所有三列都可见。继续展开，直到它卡入到旁边显示反派基本信息的信息框位置。出现蓝色参考线，其向下延伸的范围仅与基本信息框大小一致。\n\
  \n![9781430245421_Fig06-03.jpg](img/9781430245421_Fig06-03.jpg)\n\n图 6-3：我们选中了滚动视图\n\
  \n最后一列需要进行一些额外配置，因为它将显示图像而非文本。幸运的是，Cocoa 提供了一个类来简化此操作。在实用工具区域中，打开*标识检查器*（![image](img/arrow2.jpg)3），以便我们看清当前位置。单击最后一列，直到选中表格视图单元格。可能需要点击四次才能到达——依次穿过滚动视图、表格视图、表格列和表格单元格视图。到达后，我们会在*标识检查器*中看到\
  \ `NSTableCellView` 作为类名。然而，在费尽周折选中它之后，是时候删除它了。按下 Delete 键将其删除。我们将用一个图像井来替换它。在*对象库*搜索框中输入\
  \ Image，顶部项应是一个图像井。将其从*对象库*拖拽到表格视图的第三列。当鼠标移到一个可放置的位置时，光标应变为绿色加号，并且该列会以蓝色边框高亮显示。松开鼠标按钮，搞定！该表格列现在已准备好显示图像。\n\
  \n由于图像井比其他两列的表格视图单元格视图更高，请将每个表格视图单元格的大小调整为与图像井相同的高度。它们的高度都应设置为 48 点。要调整大小，请单击每列中显示“Table\
  \ View Cell”的文本，直到表格视图单元格本身变为蓝色，并在底部显示一个调整手柄。向下拖拽调整手柄，会弹出一个实用工具窗口，显示当前尺寸。\n\n在完成表格视图的处理之前，我们需要配置这些表格列的标识符，使其与反派对象中的\
  \ `name`、`lastSeenDate` 和 `mugshot` 值相对应。具体做法是为每一列提供一个与要显示的属性键名相同的标识符。稍后，我们将在代码中看到如何利用此标识符轻松准备要显示的值。通过单击表格视图中“Table\
  \ View Cell”文本下方的空白区域，选中第一列。在*标识检查器*（![image](img/arrow2.jpg)3）中，`NSTableColumn`\
  \ 应为类名。在 Identifier 字段中输入“name”。切换到*属性检查器*（![image](img/arrow2.jpg)4），在 Title 字段中输入“Name”；这将决定列标题中显示的文字。对第二列重复此过程，输入“lastSeenDate”作为标识符，“Last\
  \ Seen”作为标题。再对第三列重复，输入“mugshot”作为标识符，“Mugshot”作为标题。\n\n现在，我们要添加两个按钮，一个用于在列表中添加新反派，另一个用于删除选中的反派。回到*对象库*窗格，在搜索字段中输入“button”；结果中会显示数量惊人的按钮列表。苹果公司里一定有非常喜欢设计按钮的人！\n\
  \n尽管外观各不相同，但此列表中的几乎每个按钮本质上都是一个 `NSButton`，其核心功能始终相同。其中一些按钮被预配置为不同的模式，以用作复选框或展开三角形，但除此之外，它们的基本功能都一样：在被点击时，调用目标对象中的操作方法。从列表中选择前几个按钮之一（例如“Push\
  \ Button”或“Rounded Rect Button”），将其拖拽到我们的窗口中，放在表格视图的正下方。这将作为我们的“添加反派”按钮。我们不直接用文本“Add\
  \ Villain”作为按钮标题，而是使用 Cocoa 内置的图形图像，使其外观类似于其他应用程序中的添加按钮。在按钮仍处于选中状态时，调出*属性检查器*，找到*图像*组合框。单击组合框右侧的小三角形，开始输入“nsaddtemplate”。当你看到它自动补全为“NSAddTemplate”时，按回车键，你会看到新按钮上现在显示一个\
  \ + 图标，叠加在“Add Villain”标签上。在*图像*组合框下方是另一个标注为*替代*的组合框。将其也设置为“NSAddTemplate”。再下方是一组标注为*位置*的按钮，用于指示图像（显示为正方形）相对于按钮标题（显示为一条线）的位置。选择一个只显示正方形而不带文字的项目，按钮标题将消失。水平调整按钮大小，使其刚好能容纳图像，然后复制该按钮（按\
  \ ![images](img/arrow3.jpg)D）以创建另一个按钮。选中这第二个按钮，再次转到*属性检查器*中的*图像*组合框，开始输入“nsremovetemplate”，这将在按钮中提供一个减号（-）图标。同样地，也将*替代*图像设置为“NSRemoveTemplate”。\n\
