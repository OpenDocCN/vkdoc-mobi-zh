  无需编写一行代码，我们的应用就支持将文本复制到剪贴板以及文本转语音。几乎零工作，我们的应用就表现得像真正的 Mac 应用，带有窗口和菜单栏，并响应常用键盘命令，比如`⌘Q`退出。应用的主窗口可以移动、最小化到程序坞，甚至可以关闭。我们可以隐藏应用，或隐藏所有其他应用。所有这些功能都是免费获得的，无需任何代价。这就是
  Cocoa 的力量。如果你的计算机已经知道如何做某事，你很可能不需要编写太多代码来实现它，有时甚至根本不需要编写任何代码。


  **与世界分享我们的创作**


  退出 Hello, World。还有最后一件事要介绍。我们现在已经创建了应用，但它在哪里？如果我们想将应用赠予（或出售）给他人，以便他们能在自己的机器上运行，该怎么做？


  首先，如果我们希望他人使用我们的应用，我们需要以略有不同的方式编译它。在 Xcode 中，如果我们点击“产品”菜单，会看到 Xcode 构建应用的五种不同方式：运行、测试、分析、性能分析和归档。要分发应用，我们需要进行归档构建。现在选择“归档”，让
  Xcode 再次编译应用。但这次，构建完成后，我们将看到管理器的*归档*标签页（图 2-18）。


  ![9781430245421_Fig02-18.jpg](img/9781430245421_Fig02-18.jpg)


  图 2-18. Xcode 的归档窗口


  要准备分发应用，点击“分发”按钮，并选择导出为“应用”。其他选项（提交到 App Store 和导出为开发者 ID 签名的应用）现在可以忽略。点击“下一步”，Xcode
  会提示我们选择代码签名身份。选择“不要重新签名”，再次点击“下一步”。Xcode 会询问我们想要保存应用的位置。


  在 Finder 中打开该文件夹，我们会看到我们的程序。


  但这还不是全部。每次我们进行归档构建时，Xcode 都会保留该构建的副本以供将来参考。它不会保留源码在归档中（源码由源码控制系统保管），但如果我们需要支持程序的多个版本，保留确切分发包的副本非常有用。当然，当旧版本不再有用时，我们可以清理它们。


  在离开这个话题之前，我们应该对构建配置有所了解。“产品”菜单下的每个不同选项都与一个构建配置相关联。Xcode 为新建项目提供了两种配置：调试和发布。默认情况下，当我们在
  Xcode 中工作时，我们使用的是调试配置。以这种方式构建应用时，Xcode 会添加额外内容，以便更容易地排除应用故障。例如，这些调试符号允许我们在程序运行时检查和更改不同变量的值，或者使用调试器逐行逐步执行源代码。当我们点击运行按钮时，我们使用的是调试配置。


  另一方面，归档构建过程使用发布配置。发布配置不包含调试信息，并且会对最终程序进行更多优化。它还可以配置为进行多架构构建，以生成 32 位和 64 位的 x86
  二进制文件，这也会减慢构建过程。在为他人运行准备应用时，我们通常希望这样做，但在积极开发时则不然。必要时我们可以定义其他配置，但本应用无需这样做。


