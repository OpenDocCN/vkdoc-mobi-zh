  ## 属性列表


  `Info.plist` 是一种特殊类型的文件，称为*属性列表*。属性列表在整个 OS X 中被广泛使用。虽然最终用户很少看到它们，但它们在 Cocoa 开发的许多部分中都会用到，所以您会经常见到它们。


  属性列表文件由一系列条目组成。每个条目由一个键和一个值组成。图 2-16 显示了 Xcode 内置的属性列表编辑器正在编辑 `Chapter2-Info.plist`
  文件。每一行代表一个单独的条目。如您所见，属性列表由三列组成。左列标记为*键*，右列标记为*值*。中间的列标记为*类型*，表示数据类型；大多数属性列表的值是字符串，但有时也可能看到其他类型。


