  图 2-16. 在编辑窗格中打开的 `Chapter2-Info.plist`，以便我们查看此应用程序图标文件的名称。


  **注意** 属性列表还能够在单个键下存储多个值。可以在单个键下存储一个项目数组（或列表），甚至可以在一个键下存储另一整套键值对。您可能还需要一段时间才需要用到这个功能，但我们认为您应该知道它是可行的。


  在图 2-16 中，键为 `Icon file` 的条目被高亮显示。




