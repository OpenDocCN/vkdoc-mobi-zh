  \ //                    Image(systemName: \"9.square\")\n    //                \
  \    Image(systemName: \"10.square\")\n    //                }.font(.largeTitle)\n\
  \    //            })\n    ```\n    请注意，没有了第二个 `ScrollView`，`LazyHGrid` 现在可以扩展行之间的间距，如图\
  \ 19-5 所示。\n\n![](img/329781_7_En_19_Fig6_HTML.jpg)\n\n此图展示了数字 1 到 10 垂直排列成三行，位于圆形内。\n\
  \n**图 19-6**\n\n\n\n`.adaptive`选项将间距缩小到最小可能值。\n\n1.  如下所示编辑数组，在 `LazyHGrid` 中定义三行，在\
  \ `LazyVGrid` 中定义三列：\n\n```swift\nlet gridItems = [GridItem(.adaptive(minimum: 20,\
