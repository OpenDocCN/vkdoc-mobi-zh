  \ 20, maximum: 450))\n]\n```\n\n注意，`.adaptive`选项将间距缩小到最小，如图 19-6 所示。\n\n### 使用`GridRow`创建表格\n\
  \n数据通常可以像电子表格或表格一样按行和列组织。为了在`SwiftUI`中模拟表格，有一个特殊的`GridRow`，它允许你定义在网格内组织的数据行，如图 19-7\
  \ 所示。\n\n![](img/329781_7_En_19_Fig7_HTML.jpg)\n\n一个包含 2 列和 5 行的表格显示了电影列表及其各自的发行商。行条目如下：1.\
  \ *《火星救援》*，二十世纪福克斯。2. *《E.T.外星人》*，环球影业。3. *《夺宝奇兵》*，派拉蒙。4. *《玩具总动员》*，博伟影业。5. *《敦刻尔克》*，华纳兄弟。\n\
  \n图 19-7\n\n`Grid`和`GridRow`可以创建表格\n\n要创建表格，你必须首先像这样定义一个网格：\n\n```swift\nvar body:\
  \ some View {\nGrid() {\n}\n```\n\n然后在`Grid()`内部，定义多个`GridRow`。在每个`GridRow`内部，为你想要创建的每一列定义一个单独的视图。因此，如果你想创建一行分成两列，`GridRow`可能由两个`Text`视图组成，如下所示：\n\
  \n```swift\nGridRow {\nText(\"The Martian\")\nText(\"20th Century\")\n}\n```\n\n\
  要了解如何使用`GridRow`创建表格，请按照以下步骤操作：\n\n![](img/329781_7_En_19_Fig8_HTML.jpg)\n\n一个表格列出了电影，包括*《火星救援》*、*《E.T.外星人》*、*《夺宝奇兵》*、*《玩具总动员》*和*《敦刻尔克》*，以及它们各自的发行商，如二十世纪福克斯、环球影业、派拉蒙、博伟影业和华纳兄弟。电影和发行商以三种不同的对齐方式列出：左对齐、居中对齐和右对齐。\n\
  \n图 19-8\n\n在`GridRow`中对齐数据的不同方式\n\n1.  创建一个新的`SwiftUI` iOS 应用项目，并赋予你想要的任何名称，例如“GridRows”。\n\
  \n2.  在导航窗格中点击`ContentView`文件。\n\n3.  在`var body: some View`内部添加一个`Grid()`，如下所示：\n\
  \n```swift\nvar body: some View {\nGrid() {\n}\n```\n\n4.  在`Grid()`内部添加`GridRow`。`GridRow`的数量定义了行数。一个`GridRow`内不同视图的数量定义了列数：\n\
  \n```swift\nvar body: some View {\nGrid() {\nGridRow {\nText(\"Movies\")\nText(\"\
  Distributer\")\n}.bold()\n.font(.largeTitle)\nGridRow {\nText(\"The Martian\")\n\
  Text(\"20th Century\")\n}\nGridRow {\nText(\"E.T.\")\nText(\"Universal\")\n}\nGridRow\
  \ {\nText(\"Raiders of the Lost Ark\")\nText(\"Paramount\")\n}\nGridRow {\nText(\"\
  Toy Story\")\nText(\"Buena Vista Pictures\")\n}\nGridRow {\nText(\"Dunkirk\")\n\
  Text(\"Warner Brothers\")\n}\n}\n```\n\n注意，你可以格式化单个 `GridRow`。在前面的示例中，第一个 `GridRow`\
  \ 以粗体和`.largeTitle`格式设置，以定义表格的标题（见图 19-7）。\n\n整个`ContentView`文件应如下所示：\n\n```swift\n\
  import SwiftUI\nstruct ContentView: View {\nvar body: some View {\nGrid() {\nGridRow\
  \ {\nText(\"Movies\")\nText(\"Distributer\")\n}.bold()\n.font(.largeTitle)\nGridRow\
  \ {\nText(\"The Martian\")\nText(\"20th Century\")\n}\nGridRow {\nText(\"E.T.\"\
  )\nText(\"Universal\")\n}\nGridRow {\nText(\"Raiders of the Lost Ark\")\nText(\"\
  Paramount\")\n}\nGridRow {\nText(\"Toy Story\")\nText(\"Buena Vista Pictures\")\n\
  }\nGridRow {\nText(\"Dunkirk\")\nText(\"Warner Brothers\")\n}\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n5.  在画布窗格中点击“Live”图标。\n\n格式化网格外观的另外两种方式是使用分隔符和对齐。分隔符在每个`GridRow`之间显示一条水平线，而对齐则让你定义数据在每个`GridRow`内的显示方式，例如`.center`（默认）、`.leading`（左对齐）或`.trailing`（右对齐），如图\
  \ 19-8 所示。\n\n要了解如何在网格和`GridRow`中使用分隔符和对齐，请按照以下步骤操作：\n\n![](img/329781_7_En_19_Fig9_HTML.jpg)\n\
  \n一个包含 2 列和 5 行的表格列出了电影及其各自的发行商。行条目如下：1. *《火星救援》*，二十世纪福克斯。2. *《E.T.外星人》*，环球影业。3.\
  \ *《夺宝奇兵》*，派拉蒙。4. *《玩具总动员》*，博伟影业。5. *《敦刻尔克》*，华纳兄弟。\n\n图 19-9\n\n对齐网格（`.leading`）并在`GridRow`之间添加分隔符\n\
  \n1.  打开你之前创建的项目“GridRows”。\n\n2.  在导航窗格中点击`ContentView`文件。\n\n3.  编辑`ContentView`文件，为网格添加对齐，并在`GridRow`之间添加分隔符，如下所示：\n\
  \n```swift\nGrid(alignment: .leading) {\nGridRow {\nText(\"Movies\")\nText(\"Distributer\"\
  )\n}.bold()\n.font(.largeTitle)\nGridRow {\nText(\"The Martian\")\nText(\"20th Century\"\
  )\n}\nDivider()\nGridRow {\nText(\"E.T.\")\nText(\"Universal\")\n}\nDivider()\n\
  GridRow {\nText(\"Raiders of the Lost Ark\")\nText(\"Paramount\")\n}\nDivider()\n\
  GridRow {\nText(\"Toy Story\")\nText(\"Buena Vista Pictures\")\n}\nDivider()\nGridRow\
  \ {\nText(\"Dunkirk\")\nText(\"Warner Brothers\")\n}\n}\n```\n\n整个`ContentView`文件应如下所示：\n\
  \n```swift\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View {\n\
  Grid(alignment: .leading) {\nGridRow {\nText(\"Movies\")\nText(\"Distributer\")\n\
  }.bold()\n.font(.largeTitle)\nGridRow {\nText(\"The Martian\")\nText(\"20th Century\"\
  )\n}\nDivider()\nGridRow {\nText(\"E.T.\")\nText(\"Universal\")\n}\nDivider()\n\
  GridRow {\nText(\"Raiders of the Lost Ark\")\nText(\"Paramount\")\n}\nDivider()\n\
  GridRow {\nText(\"Toy Story\")\nText(\"Buena Vista Pictures\")\n}\nDivider()\nGridRow\
  \ {\nText(\"Dunkirk\")\nText(\"Warner Brothers\")\n}\n}\n}\n}\nstruct ContentView_Previews:\
