- "# 1. 理解 iOS 编程\n\n编程涉及编写供计算机遵循的指令。在 iOS 编程中，计算机指的就是 iPhone 或 iPad。要为 iPhone 或 iPad\
  \ 创建应用，你需要学习三种不同的技能：\n\n- 如何用 Swift 编程语言编写指令\n- 如何使用苹果的软件框架\n- 如何在 Xcode 中创建用户界面\n\
  \n你需要用 Swift 编程语言编写指令，让应用实现独特的功能。然后，依赖苹果的软件框架来处理诸如检测触摸手势或访问摄像头等常见任务。最后，设计应用的用户界面。\n\
  \n苹果的软件框架让你无需编写（和测试）自己的 Swift 代码就能执行常见任务。通过依赖苹果成熟且经过测试的软件框架，你可以专注于应用的独特功能，而不是处理让应用访问\
  \ iPhone 或 iPad 不同硬件功能的繁琐细节。\n\n理想情况下，你希望用户界面能够适应 iPhone 或 iPad 等所有不同的屏幕尺寸，看起来美观。用户界面用于向用户显示信息并从用户那里获取信息。最好的用户界面是那种甚至无需用户思考的界面。\n\
  \n本质上，每个 iOS 应用都由三部分组成，如图 1-1 所示：\n\n![](img/329781_7_En_1_Fig1_HTML.png)\n\n**图\
  \ 1-1** iOS 应用的三个组成部分\n\n- 你的代码，使应用实现有用的功能\n- 可在 Xcode 中可视设计的用户界面\n- 通过一个或多个苹果 iOS\
  \ 框架访问 iOS 设备的硬件功能\n\n苹果为 iOS（及其其他操作系统，如 macOS、watchOS 和 tvOS）提供了数十个框架。只需使用苹果的框架，你就能通过编写少量自己的代码来完成常见任务。苹果提供的一些框架包括：\n\
  \n- `SwiftUI` – 用户界面和触摸屏支持\n- `ARKit` – 增强现实功能\n- `Core Animation` – 显示动画\n- `GameKit`\
  \ – 创建多人互动应用\n- `Contacts` – 访问 iOS 设备上的通讯录数据\n- `SiriKit` – 允许通过 Siri 使用语音命令\n\
  - `AVKit` – 允许播放音频和视频文件\n- `Media Library` – 允许访问存储在 iOS 设备上的图片、音频和视频\n- `CallKit`\
  \ – 提供语音通话功能\n\n苹果的框架本质上包含可以重复使用的代码。这使得应用更可靠、更一致，同时通过使用经过验证的正确代码，也节省了开发者的时间。要查看苹果可用软件框架的完整列表，请访问苹果开发者文档网站（[`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)）。\n\
  \n苹果的框架可以为创建 iOS 应用提供巨大的先发优势，但你仍然需要提供一个用户界面，以便用户能够与你的应用进行交互。虽然你可以从头开始创建用户界面，但这同样繁琐、耗时且容易出错。更糟糕的是，如果每个应用开发者都从头创建用户界面，那么\
  \ iOS 应用的外观和操作方式就会各不相同，让用户感到困惑。\n\n正因如此，苹果的 Xcode 编译器能帮助你使用大多数应用中常见的标准功能（如按钮、标签、文本字段和滑块）来设计用户界面。在\
  \ Xcode 中，用户界面的每个窗口被称为**视图**。虽然简单的 iOS 应用可能只包含一个视图（想想 iPhone 上的计算器应用），但更复杂的 iOS\
  \ 应用包含多个视图。\n\n为了创建用户界面，Xcode 提供了两种选择：\n\n- Storyboards\n- `SwiftUI`\n\nStoryboards\
  \ 让你通过将用户界面对象放置在屏幕上的特定位置来可视化设计用户界面，如图 1-2 所示。不幸的是，使用固定值来定义用户界面上各种对象的位置，意味着 Storyboard\
  \ 用户界面不容易适应不同尺寸的 iOS 设备屏幕或方向（竖屏或横屏）。\n\n![](img/329781_7_En_1_Fig2_HTML.jpg)\n\n\
  **图 1-2** Storyboards 使用固定值来定义用户界面上对象的排列方式\n\n由于使用固定值排列用户界面上的对象无法适应不同的屏幕尺寸，苹果提供了第二种设计用户界面的方法，即使用名为`SwiftUI`的框架。`SwiftUI`的主要思想是将对象放置在用户界面的中心，并定义它们相对于中心的位置。\n\
  \n当屏幕尺寸较大时，用户界面对象之间的距离会扩大。当屏幕尺寸较小时，用户界面对象之间的距离会缩小，因此用户界面会自动适应屏幕尺寸，如图 1-3 所示。\n\n\
  ![](img/329781_7_En_1_Fig3_HTML.jpg)\n\n**图 1-3** `SwiftUI`用户界面可以自动适应不同的屏幕尺寸\n\n\
  你可以在一个项目中将 Storyboards 和`SwiftUI`结合使用，也可以单独使用 Storyboards 或`SwiftUI`。由于`SwiftUI`代表了为所有苹果产品开发应用的未来，本书将专注于使用`SwiftUI`而非\
  \ Storyboards 来创建用户界面。\n\n\n\n## 了解 Xcode\n\n学习 iOS 开发不仅仅是学习如何使用 `Swift` 编程语言编写代码。除了掌握\
  \ `Swift`，你还必须知道如何查找并使用苹果公司的不同软件框架，如何使用 `Xcode` 通过 `SwiftUI` 设计用户界面，以及如何组织、创建和删除包含\
  \ `Swift` 代码的文件。此外，你还必须学习如何使用 `Xcode` 的编辑器编写代码。\n\n每次创建 `Xcode` 项目时，你实际上是在创建一个包含多个文件的文件夹。一个简单的\
  \ iOS 应用可能由少数几个文件组成，而一个复杂的应用可能包含成百上千个单独的文件。\n\n通过将代码存储在不同的文件中，你可以快速找到包含你想要编辑和修改数据的文件，同时安全地忽略其他文件。无论一个项目包含多少文件，`Xcode`\
  \ 都会将它们视为所有 `Swift` 代码都存储在一个文件中。通过将程序分解成多个文件，你可以将程序的不同部分分组到不同的文件中，从而组织你的应用。\n\n\
  为了进一步帮助你在项目中组织多个文件，`Xcode` 允许你创建单独的文件夹。这些文件夹的存在仅仅是为了方便你组织代码。图 1-4 展示了 `Xcode` 如何将一个应用划分为文件夹和文件。\n\
  \n![Figure 1-4](img/329781_7_En_1_Fig4_HTML.jpg)\n\n**图 1-4** – `Xcode` 将代码存储在文件中，你可以在文件夹中组织这些文件\n\
  \n为了熟悉 iOS 应用开发，让我们从一个简单的项目开始，它将教你：\n\n- 如何理解项目的组成部分\n- 如何查看不同的文件\n- `Xcode` 的不同部分如何工作\n\
  \n![Figure 1-5](img/329781_7_En_1_Fig5_HTML.jpg)\n\n**图 1-5** – `Xcode` 欢迎屏幕\n\n\
  1.  启动 `Xcode`。会出现一个欢迎屏幕，让你选择最近使用的项目或创建新项目的选项，如图 1-5 所示。（你总是可以通过选择 **Windows ➤ Welcome\
  \ to Xcode** 或按下 `Shift + Command + 1` 在 `Xcode` 中打开此欢迎屏幕。）\n\n![Figure 1-6](img/329781_7_En_1_Fig6_HTML.jpg)\n\
  \n**图 1-6** – 选择项目模板\n\n2.  点击 **Create a new Xcode project** 选项。`Xcode` 会显示用于设计不同类型应用的模板，如图\
  \ 1-6 所示。请注意，模板窗口的顶部会显示你可以为其开发应用的不同操作系统，例如 iOS、watchOS、tvOS 和 macOS。通过选择不同的操作系统，你可以创建针对运行该特定操作系统的设备而设计的项目。\n\
  \n![Figure 1-7](img/329781_7_En_1_Fig7_HTML.jpg)\n\n**图 1-7** – 定义项目名称、组织名称和组织标识符\n\
  \n3.  点击 **iOS**，然后点击 **App**。**App** 模板代表最基本的 iOS 项目。\n4.  点击 **Next** 按钮。会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图\
  \ 1-7 所示。你必须填写全部三个文本框，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。请注意，用户界面弹出菜单让你可以在 `SwiftUI`\
  \ 和 `Storyboard` 之间进行选择。对于本书中的所有项目，请务必确保选择 `SwiftUI`。\n5.  点击 **Project Name** 文本框，并为你的项目输入一个名称，例如\
  \ `MyFirstApp`。\n6.  点击 **Team** 文本框，并输入你的名字或公司名称。\n7.  点击 **Organization Identifier**\
  \ 文本框，并输入你想要的任何标识文本。通常，此标识符是你网站名称的反写，例如 `com.microsoft`。\n8.  点击 **Interface** 弹出菜单，并选择\
  \ **SwiftUI**。确保所有复选框都未选中。然后点击 **Next** 按钮。`Xcode` 会显示一个对话框，让你选择存储项目的驱动器和文件夹。\n\
  9.  选择一个驱动器和文件夹，然后点击 **Create** 按钮。`Xcode` 会显示你新创建的项目。\n\n`Xcode` 窗口一开始可能看起来很混乱，但你需要明白\
  \ `Xcode` 将信息分组在几个窗格中。最左边的窗格称为**导航器**窗格。通过点击**导航器**窗格顶部的图标，你可以查看项目的不同部分，如图 1-8 所示。\n\
  \n![Figure 1-8](img/329781_7_En_1_Fig8_HTML.jpg)\n\n**图 1-8** – **导航器**窗格出现在 `Xcode`\
  \ 窗口的最左侧\n\n主要的 `SwiftUI` 文件称为 `ContentView`，它包含定义应用用户界面的 `Swift` 代码：\n\n```\nimport\
  \ SwiftUI\nstruct ContentView: View {\n    var body: some View {\n        VStack\
  \ {\n            Image(systemName: \"globe\")\n                .imageScale(.large)\n\
  \                .foregroundColor(.accentColor)\n            Text(\"Hello, world!\"\
  )\n        }\n        .padding()\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n`import SwiftUI` 这一行让你的应用能够使用 `SwiftUI` 框架来设计用户界面。\n\n`ContentView: View` 结构体在屏幕上显示单个视图。`SwiftUI`\
  \ 一次只能在屏幕上显示一个视图。当你创建一个 `SwiftUI` iOS 应用时，默认视图是一个垂直堆栈（`VStack`），其中包含一个 `Image` 视图和一个\
  \ `Text` 视图。`Image` 视图显示一个地球图标，`Text` 视图在屏幕上显示“Hello, world!”。\n\n`ContentView_Previews:\
  \ PreviewProvider` 结构体实际上在**画布**窗格中显示用户界面，该窗格出现在 `Swift` 代码的右侧，如图 1-9 所示。\n\n![Figure\
  \ 1-9](img/329781_7_En_1_Fig9_HTML.jpg)\n\n**图 1-9** – **编辑器**窗格和**画布**窗格\n\n当**编辑器**窗格和**画布**窗格并排显示时，你对**编辑器**窗格所做的任何更改都会出现在**画布**窗格中，反之亦然。如果你点击右上角的**编辑器选项**图标，你可以隐藏或显示**画布**窗格，如图\
  \ 1-10 所示。\n\n![Figure 1-10](img/329781_7_En_1_Fig10_HTML.jpg)\n\n**图 1-10** – **编辑器选项**图标可用于切换**画布**窗格的显示和隐藏\n\
  \n**画布**窗格有两个用途。首先，它让你能确切地看到你的用户界面在模拟 iOS 设备上的样子。除了让你在不同的模拟 iOS 设备（例如不同的 iPhone\
  \ 或 iPad 型号）之间切换，**画布**窗格还允许你选择不同的设置，例如浅色或深色模式以及动态字体。更改 iOS 设置可以让你看到用户界面在不同外观选项下可能的样子。\n\
  \n\n\n### 在 iOS 设备间切换\n\n`Canvas` 面板可模拟单个 iOS 设备，例如 iPhone 14 Pro 或 iPad Mini。这样，您就能看到用户界面如何适配不同\
  \ iOS 设备的屏幕尺寸。要使 `Canvas` 面板模拟其他 iOS 设备，请按以下步骤操作：\n\n![](img/329781_7_En_1_Fig11_HTML.jpg)\n\
  \n*Xcode 窗口截图突出显示了顶部的 iOS 设备列表，其中列出了不同的 iOS 设备。*\n\n**图 1-11** — `Canvas` 面板可模拟的\
  \ iOS 设备列表\n\n1.  点击 Xcode 窗口顶部当前显示的 iOS 设备名称。将会出现一个列表，其中列出了不同的 iOS 设备，如图 1-11 所示。\n\
  2.  点击您希望在 `Canvas` 面板中显示的 iOS 设备。\n\nXcode 还提供了第二种更改 `Canvas` 面板中 iOS 设备模拟的方法，即通过\
  \ `Inspector` 面板。请按以下步骤操作：\n\n![](img/329781_7_En_1_Fig12_HTML.jpg)\n\n*内容视图界面的两张截图。左侧：在预览选项中高亮显示了设备下拉菜单。右侧：设备弹出菜单高亮显示了“继承”选项。*\n\
  \n**图 1-12** — `Device` 弹出菜单可在 `Inspector` 面板中选择 iOS 设备\n\n1.  将光标移动到 `ContentView_Previews:\
  \ PreviewProvider` 结构体中的 `ContentView()` 内。`Inspector` 面板将会出现。\n2.  点击 `Device`\
  \ 弹出菜单，选择一个 iOS 设备，使其显示在 `Canvas` 面板中，如图 1-12 所示。\n\n为 `Canvas` 面板选择了不同的 iOS 设备后，您可以通过点击\
  \ `Canvas` 面板右下角出现的不同图标来更改其放大倍率，如图 1-13 所示：\n\n![](img/329781_7_En_1_Fig13_HTML.jpg)\n\
  \n*插图解释了 `Canvas` 面板中出现的不同图标，包括缩小、缩放到 100%、适合窗口缩放和放大。*\n\n**图 1-13** — 缩放图标可让您更改\
  \ `Canvas` 面板的放大倍率\n\n- **缩小** – 缩小 iOS 设备的尺寸\n- **缩放到 100%** – 以实际尺寸显示 iOS 设备（可能会截断\
  \ iOS 设备的部分内容，尤其是在模拟 iPad 或较大型号的 iPhone 时）\n- **适合窗口** – 使整个 iOS 设备可见\n- **放大**\
  \ – 放大 iOS 设备的尺寸\n\n`缩放到 100%` 可让您在所模拟 iOS 设备的实际尺寸下查看用户界面，而 `适合窗口` 则让您看到完整的模拟 iOS\
  \ 设备，如图 1-14 所示。然后您可以使用 `缩小` 和 `放大` 选项，根据需要调整 iOS 设备的尺寸。\n\n![](img/329781_7_En_1_Fig14_HTML.jpg)\n\
  \n*两张 iOS 设备插图比较了“缩放到 100%”和“适合窗口”两种编程效果。左侧：iOS 设备完全缩放显示；右侧：适合窗口显示。*\n\n**图 1-14**\
  \ — 比较 `缩放到 100%` 和 `适合窗口`\n\n### 更改 iOS 设备模拟的外观\n\n在 `Canvas` 面板中选定了要模拟的 iOS 设备后，您可以通过三种额外的方式来定制用户界面的外观：\n\
  \n- **配色方案** – 显示浅色或深色模式\n- **方向** – 显示纵向或横向模式\n- **动态字体** – 更改文本大小\n\n要更改 `Canvas`\
  \ 面板中 iOS 设备模拟的外观，请按以下步骤操作：\n\n![](img/329781_7_En_1_Fig15_HTML.jpg)\n\n*Canvas\
  \ 设备设置窗口截图。其中包含以下切换按钮：配色方案、方向和动态字体。*\n\n**图 1-15** — 设备设置窗口\n\n1.  点击 `Canvas` 面板底部的“设备设置”图标。将会出现一个弹出窗口，如图\
  \ 1-15 所示。\n2.  点击您想要更改的设置（如 `配色方案` 或 `方向`）右侧的开关按钮。\n3.  点击某个选项以更改 iOS 设备的外观，或拖动滑块以更改\
  \ `动态字体` 选项下的文本大小。\n\n如果您想要并排比较不同的选项，请按以下步骤操作：\n\n![](img/329781_7_En_1_Fig16_HTML.jpg)\n\
  \n*“变体”弹出菜单截图。它包含以下选项：配色方案变体、方向变体和动态字体变体。*\n\n**图 1-16** — “变体”弹出菜单\n\n1.  点击 `Canvas`\
  \ 面板底部的“变体”图标。将会出现一个弹出菜单，如图 1-16 所示。\n\n![](img/329781_7_En_1_Fig17_HTML.jpg)\n\n\
  *三张 iOS 设备插图展示了不同的方向变体：纵向、左侧横向和右侧横向。*\n\n**图 1-17** — 显示的方向变体\n\n1.  选择一个选项，例如 `配色方案变体`\
  \ 或 `动态字体变体`。Xcode 会一次性显示所有不同的选项，如图 1-17 所示。\n\n![](img/329781_7_En_1_Fig18_HTML.jpg)\n\
  \n*Canvas 面板中“实时”图标的插图。*\n\n**图 1-18** — “实时”图标\n\n1.  点击 `实时` 图标，即可在 `Canvas` 面板中再次查看\
  \ iOS 设备，如图 1-18 所示。\n\n### 选择用户界面对象\n\n一旦您将对象放置在用户界面上，只能通过将光标移动到该对象的 Swift 代码中来选择它们。如果您更倾向于使用鼠标点击用户界面上的对象，则必须点击\
  \ `Canvas` 面板底部的`可选择`图标，如图 1-19 所示。\n\n![](img/329781_7_En_1_Fig19_HTML.jpg)\n\n\
  *插图显示 Canvas 面板底部的“可选择”图标。顶部的文本带有边框，并且已被选中。*\n\n**图 1-19** — “可选择”图标\n\n点击 `可选择`\
  \ 图标，然后点击用户界面上的某个对象后，该对象周围会出现蓝色边框。这些蓝色边框让您能看到该对象的大小。如果您添加了背景颜色，这有助于了解对象背景区域的大小。\n\
  \n`实时` 图标（见图 1-18）让您能够与用户界面互动以测试您的应用。`可选择` 图标则让您能轻松编辑用户界面。\n\n\n  \n"
- "# 操作 Xcode 面板  \n\nXcode 的四个面板（`Navigator`（导航器）、`Editor`（编辑器）、`Canvas`（画布）和 `Inspector`（检查器））各有用处。`Navigator`\
  \ 面板显示你项目的相关信息，例如构成该项目的所有文件名称。`Editor` 面板是你编写和编辑 Swift 代码的地方。`Canvas` 面板让你可以查看并测试由\
  \ Swift 代码定义的用户界面。`Inspector` 面板则显示当前选中对象的相关信息。\n\n你可以通过将鼠标指针移动到面板边框上，然后左右拖动鼠标来调整任意面板的大小。你也可以切换\
  \ `Navigator` 和 `Inspector` 面板的隐藏与显示，这样就能看到更多 `Editor` 和 `Canvas` 面板的内容。\n\n要隐藏/显示\
  \ `Navigator` 或 `Inspector` 面板，有两种操作方式，如图 1-20 所示：\n\n![](img/329781_7_En_1_Fig20_HTML.jpg)\
  \  \n\n一张 Xcode 窗口的截图，展示了左侧隐藏或显示导航器面板以及右侧隐藏或显示检查器面板的功能。  \n\n图 1-20  \n隐藏或显示导航器和检查器面板\
  \  \n\n* 选择 `View` ➤ `Navigators`/`Inspectors` ➤ `Hide`/`Show Navigator`/`Inspector`。\
  \  \n* 点击 `Show`/`Hide Navigator`/`Inspector` 面板图标。  \n\n`Navigator` 面板允许你选择要在 `Editor`\
  \ 面板中显示的选项。`Inspector` 面板则允许你选择用户界面项目，并选取不同的修改方式，如图 1-21 所示。  \n\n![](img/329781_7_En_1_Fig21_HTML.jpg)\
  \  \n\n一张截图展示了 Xcode 窗口的不同面板。右侧的检查器面板被高亮显示。左侧下方一行文字被高亮：`Text(\"Hello, world!\")`。\
  \  \n\n图 1-21  \n检查器面板列出了修改选中项目的不同方式  \n\n要了解 `Inspector` 面板的工作方式，请按以下步骤操作：  \n\n\
  ![](img/329781_7_En_1_Fig22_HTML.jpg)  \n\n一张检查器面板的截图，其中属性检查器图标被高亮显示。包含以下字段：文本、辅助功能、字体、内边距和框架。\
  \  \n\n图 1-22  \n属性检查器图标让你可以在检查器面板中查看修改项目的更多方式  \n\n1. 创建一个新的 iOS App 项目，然后在 `Navigator`\
  \ 面板中点击 `ContentView` 文件。`Editor` 面板会显示 `ContentView` 文件的内容。  \n2. 将光标移动到 `Text(\"\
  Hello, world!\")` 这一行。  \n3. 点击 `Inspector` 面板中的 `Attributes Inspector` 图标，如图 1-22\
  \ 所示。`Inspector` 面板会显示修改当前选中项目的更多方式。  \n\n如你所见，Xcode 的不同面板会显示项目相关的不同信息。`Navigator`\
  \ 面板（最左侧）让你可以查看项目的概览。在 `Navigator` 面板中点击特定项目，该内容便会显示在 `Editor` 面板中。`Inspector` 面板（最右侧）会显示\
  \ `Editor` 面板中选中内容的额外信息。`Canvas` 面板则让你可以预览用户界面的外观。  \n\n如果你深入探索 Xcode，会发现它拥有数十项功能，但不必一次性全部掌握才能开始使用\
  \ Xcode。只需专注于使用你需要的功能，暂时忽略其余部分，直到你需要它们时再说。  \n\n## 总结  \n\n创建 iOS 应用不仅仅是编写代码。为了让你的应用能够访问不同\
  \ iOS 设备的硬件功能，你可以使用 Apple 的软件框架，这些框架提供了访问摄像头或 iOS 设备通讯录的接口。所有 SwiftUI 项目都会用到的最重要框架就是\
  \ SwiftUI 框架。通过将你的代码与 Apple 现有的软件框架结合，你可以专注于编写让应用运行起来的代码，并利用 Apple 的软件框架来帮助你实现大多数\
  \ iOS 设备上的常见功能。  \n\n除了编写代码，每个 iOS 应用还需要用户界面。要创建用户界面，请使用 SwiftUI。由于 SwiftUI 可以轻松创建适配不同设备的用户界面，它正迅速成为为\
  \ Apple 所有平台（macOS、iOS、iPadOS、watchOS 和 tvOS）上的应用设计用户界面的首选方式。  \n\n创建 iOS 应用的主要工具是\
  \ Apple 的免费软件 Xcode，它能让你创建项目、组织项目中的各个文件，并查看和编辑每个文件的内容。Xcode 让你可以在一个程序中完成应用的设计、编辑和测试。尽管\
  \ Xcode 提供了数十项功能，但你只需使用其中少数几项，就能开始创建你自己的 iOS 应用。  \n\n学习 iOS 编程涉及学习如何使用 Swift 编程语言编写指令、学习如何查找并使用\
  \ Apple 的各种软件框架、学习如何在 SwiftUI 中设计用户界面，以及学习如何使用 Xcode。虽然这听起来任务繁多，但本书将循序渐进地引导你完成每一步，让你在不久的将来能自如地使用\
  \ Xcode 并创建自己的 iOS 应用。  \n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n"
- "# 使用 SwiftUI 设计用户界面\n\n每个应用程序都需要一个用户界面。SwiftUI 背后的基本思想是使用称为“视图”的构建块来创建用户界面。视图在用户界面上显示单个项目，例如文本、图像或按钮，如图\
  \ 2-1 所示。\n\n![一个 SwiftUI 屏幕显示了以下元素：一个大的标题 Hello, world，一个导航视图，一个文本视图，一张乌龟图片，以及一个标记为\
  \ Click Me 的按钮。右侧是带有 Content View 的预览提供程序。](img/329781_7_En_2_Fig1_HTML.jpg)\n\n\
  **图 2-1** SwiftUI 用户界面的组成部分\n\nSwiftUI 的一个限制是它一次只能在屏幕上显示一个视图。为了解决这个限制，SwiftUI 提供了称为“堆栈”的东西。一个堆栈被视为一个单一的视图，但它允许你组合或堆叠最多十个额外的视图。通过创建堆栈，你可以在屏幕上显示多个视图。堆栈甚至可以容纳其他堆栈，从而让你在单个屏幕上显示任意数量的视图。\n\
  \n如图 2-2 所示，共有三种类型的堆栈：\n\n![一段包含 3 组代码的片段。V stack 以垂直形式列出文本。H stack 以水平形式列出文本。Z\
  \ stack 以重叠形式列出文本。](img/329781_7_En_2_Fig2_HTML.jpg)\n\n**图 2-2** 垂直、水平和 Z 堆栈\n\n\
  - `VStack` – 垂直堆栈，将视图排列在另一个视图的上方和下方\n- `HStack` – 水平堆栈，将视图并排排列\n- `ZStack` – 一个将视图直接相互重叠的堆栈\n\
  \n一个堆栈算作一个单一的视图。通过使用水平 (`HStack`) 或垂直 (`VStack`) 堆栈，你可以在一个堆栈内添加最多十 (10) 个视图。为了获得更大的灵活性，你可以将堆栈嵌入到堆栈中，以显示尽可能多的视图。\n\
  \n> **注意：** 一个堆栈最多只能包含十 (10) 个视图。如果你尝试在堆栈中存储 11 个或更多视图，Xcode 将显示错误消息并拒绝运行你的程序。\n\
  \n在 SwiftUI 中创建用户界面时，你有三个选择：\n\n- 在编辑器窗格中键入 Swift 代码。\n- 将一个视图（例如按钮）拖放至编辑器窗格中的 Swift\
  \ 代码中。\n- 将一个视图（例如按钮）拖放至画布窗格中。\n\n在编辑器窗格中键入 Swift 代码来设计用户界面是最快、最灵活的方法，但这需要时间，并且需要熟悉不同的选项。为了使键入\
  \ Swift 代码定义用户界面视图更容易，Xcode 在识别出你正在尝试键入的内容时会显示一个选项弹出菜单。通过选择一个选项并按 Return 键，你可以快速创建用户界面视图，如图\
  \ 2-3 所示。\n\n![一个 SwiftUI 屏幕显示了与 Button 组件相关的代码片段。它包括 Button 声明的不同变体，例如 Button (action,\
  \ label)、Button (title, action) 和 Button (role, action, label)。](img/329781_7_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3** 当你键入 Swift 代码定义用户界面视图时，Xcode 会显示一个选项菜单\n\n如果你不熟悉设计用户界面的选项，使用库窗口会更简单，该窗口列出了你可以使用的所有可能的用户界面视图，如图\
  \ 2-4 所示。\n\n![截图显示了各种 UI 组件，例如 View、Control、Library 图标、Button、Color Picker、Date\
  \ Picker、Disclosure Group、Edit Button、Library 窗口、Form、Gauge 和 Group Box。](img/329781_7_En_2_Fig4_HTML.jpg)\n\
  \n**图 2-4** 单击库图标会打开库窗口\n\n一旦你打开库窗口，你可以执行以下任一操作：\n\n- 将用户界面视图从库窗口拖放至编辑器窗格中，如图 2-5\
  \ 所示。\n- 单击可选图标，然后将用户界面视图拖放至画布窗格中模拟的 iOS 设备用户界面上，如图 2-6 所示。\n\n![代码片段显示了一个带有包含 Button\
  \ 和 color picker 的 VStack 的 SwiftUI 内容视图。它还提到了按钮的外观取决于放置位置、角色分配和样式，并包含一个在开发人员文档中打开内容的参考。](img/329781_7_En_2_Fig5_HTML.jpg)\n\
  \n**图 2-5** 将用户界面视图拖放至编辑器窗格\n\n![截图显示了各种视图，包括一个 Button 和 Controls。文本提供了关于创建按钮、其操作和标签以及用户如何在不同的平台上激活该按钮的信息。它提到了按钮的外观取决于放置位置、角色分配和样式，并包含一个在开发人员文档中打开内容的参考。](img/329781_7_En_2_Fig6_HTML.jpg)\n\
  \n**图 2-6** 将用户界面视图拖放至画布窗格\n\n无论你如何更改用户界面，Xcode 都会保持编辑器窗格和画布窗格之间的所有更改同步。这意味着当你在编辑器窗格中键入\
  \ Swift 代码时，画布窗格会立即显示你的更改。当你将用户界面视图拖放至画布窗格时，Xcode 会立即自动将该 Swift 代码添加到编辑器窗格中。\n\n\
  画布窗格显示你的用户界面，但如果你想测试你的应用程序，你有两个选择，如图 2-7 所示：\n\n![屏幕显示了一个名为 delete me 2 的项目，包含各种组件，如内容视图、Phone\
  \ SE 和一条成功消息。代码片段包括一个包含带有图像和文本的 VStack 的内容视图结构体。运行图标和实时图标被高亮显示。](img/329781_7_En_2_Fig7_HTML.jpg)\n\
  \n**图 2-7** “运行”按钮和“实时预览”图标\n\n- 单击“运行”按钮或选择“产品”➤“运行”以打开模拟器。\n- 单击画布窗格底部的“实时”图标。\n\
  \n要了解 SwiftUI 如何创建一个可以响应用户的简单用户界面，请按照以下步骤操作：\n\n1. 创建一个新的 iOS App 项目，确保界面是 SwiftUI，并为其指定一个描述性名称（例如\
  \ `SwiftExample`）。\n2. 在导航器窗格中单击 `ContentView` 文件。编辑器窗格将显示 `ContentView` 文件的内容。\n\
  3. 选择“编辑器”➤“画布”。（如果 Canvas 选项前面已经出现复选标记，则跳过此步骤。）这将打开画布，以便你可以预览用户界面。\n4. 删除 `Text`\
  \ 命令中的文本 “Hello, world!”，并键入以下内容，使 `ContentView` 结构体如下所示：\n\n```swift\nstruct ContentView:\
  \ View {\n    @State private var message = true\n    var body: some View {\n   \
  \     VStack {\n            Toggle(isOn: $message) {\n                Text(\"Toggle\
  \ message on/off\")\n            }\n            if message {\n                Text(\"\
  Here's a secret message!\")\n            }\n        }\n    }\n}\n```\n\n上述 Swift\
  \ 代码在屏幕上显示了一个切换开关，但除非你在模拟器（它模拟如 iPhone 或 iPad 之类的 iOS 设备）中运行你的应用程序，或者通过单击“实时”图标进行测试，否则你将无法看到它的工作。在大多数情况下，“实时”图标提供了一种在画布窗格中查看和测试用户界面的更快方法。\n\
  \n![一个片段显示了一个切换消息开或关，一个切换消息开或关已启用，文本显示这是一条秘密消息。](img/329781_7_En_2_Fig8_HTML.jpg)\n\
  \n**图 2-8** 实时预览让你可以在画布窗格中与用户界面进行交互\n\n5. 单击“实时”图标以打开“实时预览”。当你单击切换开关时，请注意消息会按图 2-8\
  \ 所示出现和消失。\n6. 再次单击“实时”图标以关闭“实时预览”。\n\n\n\n重复前面的步骤，但这次点击“运行”按钮打开模拟器。在模拟器或画布面板中测试你的应用是完全相同的，主要区别在于画布面板通常使用起来快得多。\n\
  \n现在让我们快速浏览这个项目，以便你对其工作原理有一个大致了解。首先，它声明了一个名为“message”的特殊状态变量，初始设置为`true`。接着，`ContentView`结构体定义了一个视图为`VStack`。这意味着`VStack`内部的任何内容都将垂直堆叠显示。\n\
  \n`VStack`中的第一个视图是一个`Toggle`开关，它使用一个`Text`视图在开关左侧显示以下文本：“Toggle message on/off”。当开关打开时，“message”状态变量会被修改为存储`true`值。当开关关闭时，“message”状态变量则会被修改为存储`false`值。\n\
  \n在`Toggle`下方，有一个`if`语句。如果“message”状态变量为`true`，它会显示一个`Text`视图，内容为“Here’s a secret\
  \ message!”。如果“message”状态变量为`false`，则该`Text`视图根本不会显示。\n\n## 使用检查器面板修改用户界面\n\n在 SwiftUI\
  \ 中创建用户界面通常涉及两个步骤。首先，你需要安排各个用户界面视图在屏幕上的显示方式。接着，你需要通过更改每个用户界面视图的大小、颜色或位置来自定义它们。\n\
  \n要自定义用户界面视图，你需要添加修改器。Xcode 提供了两种添加修改器的方式：\n\n![](img/329781_7_En_2_Fig9_HTML.jpg)\n\
  \n屏幕显示一个名为“Delete Me 2”的项目，并选择了 iPhone SE。`ContentView`结构体包含一个带有`Toggle`按钮和`Text`视图的`VStack`。一个可选择的图标被高亮显示。\n\
  \n**图 2-9** 检查器面板显示了修改用户界面视图的不同方式\n\n*   直接在编辑器面板中输入修改器。\n*   点击你想要修改的视图（在编辑器面板中，或者点击可选择图标后在画布面板中点击该视图）。然后，如图\
  \ 2-9 所示，从检查器面板中选择一个修改器。\n\n直接在编辑器面板中输入修改器需要你知道想要使用的修改器名称。随着经验增长，直接在 Swift 代码中输入修改器会变得很快。然而，刚开始学习时，你可能不知道有哪些修改器可用。这时，你可能会倾向于使用检查器面板。\n\
  \n首先，选择你想要修改的用户界面视图。你可以通过将光标移动到定义该用户界面视图的 Swift 代码中，或者点击可选择图标然后在画布面板中点击一个用户界面视图来完成此操作。当你选中一个用户界面视图时，检查器面板会显示该特定视图的修改器。\n\
  \n检查器面板会显示最常用的修改器，例如让你选择文本的字体、对齐方式或颜色。通过点击检查器面板底部的“Add Modifier”按钮，你可以查看其他修改器的列表，如图\
  \ 2-10 所示。\n\n![](img/329781_7_En_2_Fig10_HTML.png)\n\n截图中显示了文本、辅助功能、字体、填充和框架等选项。“添加修改器”控件列出了动作、街景、徽章以及其他选项。\n\
  \n**图 2-10** “Add Modifier”按钮会显示一个你可以使用的其他修改器列表\n\n当你在“Add Modifier”列表中看到你想要使用的修改器时，点击该修改器。Xcode\
  \ 会在检查器面板中显示该修改器。如果你不再想看到已添加到检查器面板中的任何修改器，可以点击该修改器右上角的“Delete”按钮，如图 2-11 所示。\n\n\
  ![](img/329781_7_En_2_Fig11_HTML.jpg)\n\n屏幕显示了一个强调色（蓝色），并且在右上角有一个带深色轮廓高亮的删除按钮。\n\
  \n**图 2-11** 出现一个“Delete”按钮，用于移除已添加到检查器面板中的修改器\n\n请记住，你应用修改器的顺序可能会产生影响。考虑下面的`Text`视图，它有两个修改器：背景（`background`）和填充（`padding`）：\n\
  \n```\nText (\"Here's a secret message!\")\n    .background(Color.yellow)\n    .padding()\n\
  ```\n\n这会为`Text`视图添加黄色背景，然后在该`Text`视图周围添加填充（间距）。假设你像这样调换了这些修改器的顺序：\n\n```\nText\
  \ (\"Here's a secret message!\")\n    .padding()\n    .background(Color.yellow)\n\
  ```\n\n这个顺序会先在`Text`视图周围添加填充（间距），然后为背景着色。因为背景现在包含了新添加的间距，背景色也会填满`Text`视图周围的空白区域，如图\
  \ 2-12 所示。\n\n![](img/329781_7_En_2_Fig12_HTML.jpg)\n\n一段 6 行代码的片段产生了 2 组输出。文本显示：“here's\
  \ a secret message”。1. 一个带有高亮文本的矩形块。2. 一个带有文本的阴影矩形块。\n\n**图 2-12**\n\n\n\n修饰符的顺序会影响最终效果\n\
  \n无论使用哪种方法添加修饰符，Xcode 都会保持所有内容同步。因此，若你在编辑器面板中键入修饰符，更改会自动出现在检查器面板中。同样，若你在检查器面板中选择一个修饰符，Xcode\
  \ 会自动将该修饰符添加到编辑器面板的 Swift 代码中。\n\n要了解如何更改用户界面项目的外观，请按以下步骤操作：\n\n![](img/329781_7_En_2_Fig13_HTML.jpg)\n\
  \n屏幕显示一段文本，内容为\"这是一条秘密消息\"，并附带多种修饰符选项，如辅助功能、标签、字体、字重、颜色、对齐方式、行数限制、内边距等。\n\n图 2-13\n\
  \n`Font`弹出菜单显示了不同的字体选项\n\n1.  确保上一节中的 `SwiftExample` 项目已加载到 Xcode 中。`ContentView`\
  \ 文件应包含一个 `Toggle` 和一个位于其下方的 `Text` 视图。\n\n2.  点击画布面板底部的\"可选中\"图标。这样你就可以通过在画布面板中直接点击来选中视图。\n\
  \n3.  点击画布面板中的 `Toggle`，或者将光标移动到编辑器面板中的 `Toggle` 上。Xcode 会在 Xcode 窗口右侧显示检查器面板，其中列出了可用来更改\
  \ `Toggle` 外观的修饰符。\n\n4.  点击画布面板中显示\"这是一条秘密消息！\"的 `Text` 视图，或者将光标移动到编辑器面板中的 `Text`\
  \ 视图上。注意，检查器面板会显示用于更改 `Text` 视图外观的修饰符。\n\n5.  点击 `Font` 弹出菜单。会弹出如图 2-13 所示的不同字体选项列表。\n\
  \n![](img/329781_7_En_2_Fig14_HTML.jpg)\n\n屏幕显示包含多种修饰符的内容视图，包括预览设置、设备布局、方向、配色方案、辅助功能、内边距、秘密消息的切换开关、框架大小调整，以及添加宽度和高度等额外修饰符的选项。\n\
  \n图 2-14\n\nSwiftUI 会自动适配不同尺寸屏幕的用户界面\n\n1.  选择 `Large Title`。注意，Xcode 会自动在 `ContentView`\
  \ 文件中添加 `.font(.largeTitle)` 命令，如下所示：\n\n    ```\n    Text (\"这是一条秘密消息！\")\n   \
  \ .font(.largeTitle)\n    ```\n\n2.  点击 `Weight` 弹出菜单，选择 `Semibold`。\n\n3.  点击 `Color`\
  \ 弹出菜单，选择 `Red`。注意，每次选择修饰符时，Xcode 都会自动将对应的 Swift 代码添加到你的 `.swift` 文件中，如下所示：\n\n\
  \    ```\n    Text (\"这是一条秘密消息！\")\n    .font(.largeTitle)\n    .fontWeight(.semibold)\n\
  \    .foregroundColor(Color.red)\n    ```\n\n4.  将光标移动到 `ContentView_Previews: PreviewProvider`\
  \ 结构体中的 `ContentView()` 内部。\n\n5.  点击检查器面板中的 `Device` 弹出菜单。\n\n6.  选择一个 iPad 型号。注意，画布面板会随之变化，模拟出\
  \ iPad 的外观。同时留意 SwiftUI 如何自动修改你的用户界面外观，使其在不同尺寸的屏幕上正确显示，如图 2-14 所示。（Xcode 可能需要一些时间才能将画布面板切换为显示不同的\
  \ iOS 设备，请耐心等待。）\n\n1.  再次点击 `Device` 弹出菜单，选择一个 iPhone 型号，例如 iPhone 11。画布随即会改变，模拟出你选择的\
  \ iPhone 型号。\n\nSwiftUI 的基本理念是让你设计用户界面，并让 Xcode 自动调整其外观以适应不同的 iOS 屏幕尺寸。无需编写大量 Swift\
  \ 代码来设计用户界面，SwiftUI 让你只需编写最少的 Swift 代码就能完成界面设计，这样你就可以将精力集中在编写 Swift 代码上，让你的应用实现独特的功能。\n\
  \n## 总结\n\n每个应用都需要一个用户界面。使用 SwiftUI，你只需定义所需的用户界面元素，SwiftUI 会负责确保你的用户界面在不同尺寸的 iOS\
  \ 屏幕上都能正常工作并呈现正确的外观。\n\n你可以通过编程方式（编写 Swift 代码）或可视化方式（从库窗口拖放用户界面项目）来设计用户界面。程序员通常结合使用这两种方法来设计界面。将项目（按钮、标签、文本字段等）添加到用户界面后，你可以通过代码或使用检查器面板中的修饰符来自定义这些项目。\n\
  \n设计并自定义用户界面外观后，可以通过两种方式进行测试。首先，你可以在模拟器程序中运行你的应用，该程序可以模拟不同的 iOS 设备，如 iPhone 或 iPad。其次，你可以使用实时预览功能，在画布面板中与你的用户界面进行交互。\n\
  \n用户界面代表了用户所看到的内容，因此无论用户在何种 iOS 设备上运行你的应用，确保用户界面始终美观至关重要。既然你已经了解了用户界面的基本工作原理，那么是时候开始学习特定用户界面元素（如按钮、选择器和滑块）的细节了。\n\
  \n"
- "# 3. 在用户界面上放置视图\n\n当你在用户界面上放置单个视图时，无论屏幕是小尺寸的 iPhone 还是大得多的 iPad，SwiftUI 都会将其居中显示。随着你在用户界面中添加更多视图，SwiftUI\
  \ 会根据你是将它们排列在垂直堆栈还是水平堆栈中，简单地将这些视图上下堆叠或并排显示。然而，你在用户界面上添加的视图越多，相邻的视图就会显得越拥挤。为了解决这个问题，SwiftUI\
  \ 提供了几种在用户界面上放置视图的方法：\n\n*   使用 `padding` 修饰符。\n\n*   在堆栈内定义间距。\n\n*   在视图之间使用间隔器。\n\
  \n*   定义偏移量或位置坐标。\n\n你可以使用这些方法中的一种或多种来在用户界面上排列视图，使其精确显示在你想要的位置。最重要的是，这些定位方法适用于 SwiftUI\
  \ 中的所有用户界面视图。\n\n\n## 使用填充修饰符\n\n填充修饰符可以在用户界面视图周围添加空间。默认情况下，填充修饰符会在视图的顶部、底部、前导（左侧）和尾部（右侧）添加空间。要使用填充修饰符，只需在任何视图后添加以下代码：\n\
  \n```\n.padding()\n```\n\n填充有两个作用。首先，它在视图周围添加空间，这会改变背景，你可以为其添加颜色，使视图更大、更容易看到。其次，填充修饰符会将相邻视图推开得更远，使相邻视图更容易看清并消除拥挤感。\n\
  \n最简单的填充修饰符会在视图的四边各添加 16 点的间距。如果你添加一个数字，则可以定义所需的精确间距，例如 `.padding(45)` 或 `.padding(3)`，如图\
  \ 3-1 所示。\n\n![](img/329781_7_En_3_Fig1_HTML.jpg)\n\n一段代码和示意图展示了填充修饰符的不同间距。第一个是默认的\
  \ 16 点填充，第二个是 45 点的厚填充，第三个是薄填充。\n\n**图 3-1** 为填充修饰符定义不同的间距\n\n请注意，填充修饰符会为所有边添加空间。如果需要，你可以将间距定义在单个或多个特定区域，如图\
  \ 3-2 所示：\n\n![](img/329781_7_En_3_Fig2_HTML.jpg)\n\n一段代码和框图展示了不同区域填充的不同间距。它列出了填充类型，例如仅顶部填充、仅底部填充、垂直填充、仅前导填充、仅尾部填充和水平填充。\n\
  \n**图 3-2** 在特定区域定义填充\n\n- `.top`\n- `.bottom`\n- `.vertical`（顶部和底部）\n- `.leading`（左侧）\n\
  - `.trailing`（右侧）\n- `.horizontal`（尾部和前导）\n\n如果你没有添加具体的数值，SwiftUI 会默认使用 16 点的间距。要同时定义填充区域和具体间距，你必须先定义填充区域，接着指定具体数值，例如：\n\
  \n```\n.padding(.top, 30)\n```\n\n如果你想在两个或三个区域添加间距，你可以将这些区域定义在方括号内，后面跟上可选的间距值，就像这样：\n\
  \n```\n.padding([.top, .leading])\n.padding([.top, .leading], 30)\n```\n\n这样你就能定义两个区域来添加间距，如图\
  \ 3-3 所示。\n\n![](img/329781_7_En_3_Fig3_HTML.jpg)\n\n一段代码和框图展示了不同区域填充的不同间距。它列出了填充类型，例如顶部和前导、顶部和尾部、底部和前导、底部和尾部。\n\
  \n**图 3-3** 在两个区域定义填充\n\n你也可以在三个区域添加填充，并附带可选的间距值，如图 3-4 所示。\n\n![](img/329781_7_En_3_Fig4_HTML.jpg)\n\
  \n一段代码和插图展示了不同区域填充的不同间距。它列出了填充区域，例如顶部、前导和底部；顶部、尾部和底部；底部、前导和尾部；以及前导、尾部和顶部。\n\n**图\
  \ 3-4** 在三个区域定义填充\n\n除了使用固定的数值来定义填充间距，你也可以使用代表数值的变量，像这样：\n\n```\nvar distanceSize\
  \ = 15.0\n```\n\n然后你可以使用这个 `CGFloat` 变量来定义填充大小，像这样：\n\n```\n.padding(CGFloat(distanceSize))\n\
  ```\n\n请注意，`.padding` 修饰符会将任何数值专门转换为 `CGFloat` 数据类型。通过在 `.padding` 修饰符中使用数值变量来定义间距，代码可以通过更改此变量的值来改变\
  \ `.padding` 修饰符的间距。\n\n## 在堆栈内定义间距\n\n`.padding()` 修饰符可以方便地将不同的视图隔开。没有填充时，堆栈内的多个视图可能会显得拥挤和挤压在一起。通过给堆栈内的每个视图添加填充，你可以将它们分隔开，使每个视图更容易看清，如图\
  \ 3-5 所示。\n\n![](img/329781_7_En_3_Fig5_HTML.jpg)\n\n两段代码和插图展示了无填充状态和不同区域的填充状态。它列出了填充区域，例如顶部文本视图、中间文本视图和底部文本视图。\n\
  \n**图 3-5** 填充分隔了堆栈内的视图\n\n虽然填充能让每个视图更易看清，但你可能希望更精确地控制堆栈内视图之间的间距。要做到这一点，你可以在定义堆栈时定义一个间距值，例如：\n\
  \n```\nVStack(spacing: 40) {\n}\n```\n\n在堆栈内部，间距会将视图推开一个固定的距离，如图 3-6 所示。\n\n![](img/329781_7_En_3_Fig6_HTML.jpg)\n\
  \n两段代码和插图展示了无间距状态和不同区域的间距状态。它列出了间距区域，例如顶部文本视图、中间文本视图和底部文本视图。\n\n**图 3-6** 间距在堆栈中的所有视图间创建了一个固定的距离\n\
  \n## 在堆栈内对齐视图\n\n当你创建一个堆栈（`VStack` 或 `HStack`）时，你可以选择定义对齐方式，无论你是否定义了间距，例如：\n\n```\n\
  VStack(alignment: .leading)\nVStack(alignment: .leading, spacing: 24)\n```\n\n注意\n\
  \n> 如果你在堆栈中同时定义了对齐方式和间距，则必须首先定义对齐方式，然后定义间距。\n\n对于 `VStack`（垂直堆栈），你有三种方式来对齐视图，如图\
  \ 3-7 所示：\n\n![](img/329781_7_En_3_Fig7_HTML.jpg)\n\n三张垂直堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的前导对齐、居中对齐和尾部对齐。\n\
  \n**图 3-7** 在 `VStack` 中对齐视图的三种方式\n\n- `.leading`（左侧）\n- `.center`（如果未选择其他对齐选项时的默认设置）\n\
  - `.trailing`（右侧）\n\n以下 Swift 代码为 `VStack` 定义了 `.leading` 对齐：\n\n```\nVStack(alignment:\
  \ .leading) {\n    Text(\"Top\")\n        .background(Color.yellow)\n    Text(\"\
  Middle Text View\")\n        .background(Color.yellow)\n    Text(\"Bottom\")\n \
  \       .background(Color.yellow)\n}\n```\n\n对于 `HStack`（水平堆栈），你有五种不同的方式来对齐视图，如图\
  \ 3-8 所示：\n\n![](img/329781_7_En_3_Fig8_HTML.jpg)\n\n三张水平堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的顶部对齐、底部对齐和居中对齐。\n\
  \n**图 3-8** 在 `HStack` 中对齐视图\n\n- `.top`\n- `.bottom`\n- `.center`（如果未选择其他对齐选项时的默认设置）\n\
  - `.firstTextBaseline`\n- `.lastTextBaseline`\n\n以下 Swift 代码为 `HStack` 定义了 `.bottom`\
  \ 对齐：\n\n```\nHStack(alignment: .bottom) {\n    Text(\"Top\")\n        .font(.system(size:\
  \ 40))\n        .background(Color.yellow)\n    Text(\"Middle Text View\")\n    \
  \    .background(Color.yellow)\n    Text(\"Bottom\")\n        .font(.largeTitle)\n\
  \        .background(Color.yellow)\n}\n```\n\n`.top`、`.bottom` 和 `.center` 对齐选项适用于所有类型的用户界面视图。但是，如果你专门处理\
  \ `Text` 视图，SwiftUI 提供了另外两种基于基线对齐 `Text` 视图的方式。你可以根据第一个视图（`.firstTextBaseline`）或最后一个视图（`.lastTextBaseline`）来对齐文本，如图\
  \ 3-9 所示。\n\n![](img/329781_7_En_3_Fig9_HTML.jpg)\n\n一张水平堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的对齐方式。右侧的文字写着“基线”。\n\
  \n**图 3-9** 在 `HStack` 中对齐文本\n\n\n\n"
- '# 使用间距器


  在用户界面中，利用堆栈内视图之间的内边距和间距可以便捷地排列视图。要定位视图在用户界面的位置，你还可以使用间距器。间距器就像一个弹簧，能将两个视图尽可能地推向两端。间距器在编辑器窗格中显示如下：


  ```

  Spacer()

  ```


  由于间距器能自动适应不同屏幕尺寸，无论屏幕大小如何，它都能将视图对齐到屏幕边缘，如图 3-10 所示。


  ![](img/329781_7_En_3_Fig10_HTML.jpg)


  一张展示视图与一个间距器位置的代码及示例图。它描绘了左侧视图与右侧视图之间通过一个间距器对齐的方式。


  **图 3-10** 间距器将视图尽可能地推向两端


  你可以组合使用多个间距器来将视图推得更开。例如，考虑在视图前后各使用一个间距器，用以下 Swift 代码将它们分开：


  ```

  struct ContentView: View {

  var body: some View {

  VStack {

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  Spacer()

  Text ("Middle")

  .font(.system(size: 40))

  .background(Color.yellow)

  Spacer()

  Text ("Bottom")

  .font(.system(size: 40))

  .background(Color.yellow)

  }

  }

  }

  ```


  上述代码定义了一个垂直堆栈，其中包含三个 `Text` 视图。每个 `Text` 视图之间的间距器将它们均匀推开，如图 3-11 所示。


  ![](img/329781_7_En_3_Fig11_HTML.jpg)


  一张在手机上展示视图与间距器位置的示意图。它描绘了顶部、中间和底部视图的排列，它们之间由间距器隔开。


  **图 3-11** 间距器将三个视图均匀分开


  如果你组合使用间距器，多个间距器会将视图推得更开。如果我们在顶部视图与中间视图之间添加两个间距器，这两个间距器会将中间视图进一步向下推，如下列 Swift 代码所示：


  ```

  struct ContentView: View {

  var body: some View {

  VStack {

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  Spacer()

  Spacer()

  Text ("Middle")

  .font(.system(size: 40))

  .background(Color.yellow)

  Spacer()

  Text ("Bottom")

  .font(.system(size: 40))

  .background(Color.yellow)

  }

  }

  }

  ```


  由于顶部视图与中间视图之间现在有两个间距器，它们将中间视图进一步向下推，如图 3-12 所示。


  ![](img/329781_7_En_3_Fig12_HTML.jpg)


  一张在手机上展示视图与间距器位置的示意图。它描绘了顶部、中间和底部视图的排列，顶部和中间视图之间有两个间距器，中间和底部视图之间有一个间距器。


  **图 3-12** 两个间距器将中间视图进一步向下推


  通过使用多个间距器，你可以根据屏幕尺寸调整用户界面上的视图。当应用在较大屏幕上运行时，间距器会将视图推向屏幕边缘更远处。当应用在较小屏幕上运行时，间距器推动视图的距离较短。


  间距器会根据屏幕尺寸自动调整自身大小。不过，你可能会希望为间距器定义最小长度，以防止它过度缩小。要定义最小长度，请使用以下代码：


  ```

  Spacer(minLength: 25.73)

  ```


  请注意，你可以将最小长度定义为小数值（`CGFloat`），不过你也可以使用整数值，例如：


  ```

  Spacer(minLength: 25)

  ```


  如果你没有指定最小长度，间距器将根据应用运行的屏幕尺寸自由伸缩。如果需要对间距器指定固定值，你可以使用 `.frame` 修饰符。如果你在 `VStack` 中使用间距器，可以在
  frame 修饰符中定义一个高度，如图 3-13 所示。


  ![](img/329781_7_En_3_Fig13_HTML.jpg)


  一张展示第一个视图与第二个视图之间被一个高度为 125 的间距器分隔的代码及示例图。


  **图 3-13** `.frame` 修饰符的高度为 `VStack` 中的间距器定义了固定尺寸


  当在 `HStack` 中使用间距器时，则应为间距器定义宽度，如图 3-14 所示。


  ![](img/329781_7_En_3_Fig14_HTML.jpg)


  一张展示第一个视图与第二个视图之间被一个宽度为 55 的间距器分隔的代码及示例图。


  **图 3-14** `.frame` 修饰符的宽度为 `HStack` 中的间距器定义了固定尺寸




  ## 使用偏移和位置修饰符


  堆栈中的间距、填充和对齐可以改变视图在用户界面上的位置，但若想以另一种方式定位视图，你还可以使用`offset`修饰符。`offset`修饰符允许你指定具体的`x`和`y`值，将视图从
  SwiftUI 通常放置的位置移开。


  在每个 iOS 屏幕中，原点 (`0,0`) 位于左上角。`x` 值越大，水平方向越靠右。`y` 值越大，垂直方向越靠下，如图 3-15 所示。


  ![](img/329781_7_En_3_Fig15_HTML.jpg)


  一张手机示意图，屏幕左上角沿着宽度和高度方向标有箭头。原点标记为 `0, 0`，并标出了 `X` 和 `Y` 轴。


  **图 3-15** — iOS 屏幕上的原点及 `x,y` 方向


  以下 `ZStack` 将两个相同的 `Text` 视图叠放在一起。因为两个 `Text` 视图出现在完全相同的位置，所以无法同时看到它们：


  ```

  ZStack {

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  }

  ```


  如果我们为其中一个 `Text` 视图添加 `offset` 修饰符，该修饰符会将第二个 `Text` 视图从其常规位置移动一个固定距离，例如：


  ```

  ZStack {

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  .offset(x: 75, y: 125)

  }

  ```


  这个偏移会将第二个 `Text` 视图向右移动 75 点，向下移动 125 点，如图 3-16 所示。


  ![](img/329781_7_En_3_Fig16_HTML.jpg)


  一张手机显示屏示意图，有两个 "top" 视图块，其中一个高亮显示。`offset` 修饰符将视图移离其原始位置。


  **图 3-16** — `offset` 修饰符将视图从其正常显示位置移开


  正 `x` 值将视图向右移动，负 `x` 值将视图向左移动。同样，正 `y` 值将视图向下移动，负 `y` 值将视图向上移动。假设我们有如下 `offset`
  修饰符：


  ```

  .offset(x: -75, y: -125)

  ```


  这会将第二个 `Text` 视图从其正常显示位置向左上方移动，如图 3-17 所示。


  ![](img/329781_7_En_3_Fig17_HTML.jpg)


  一张手机显示屏示意图，有两个 "top" 视图块，其中一个高亮显示。`offset` 修饰符将视图移离其原始位置。


  **图 3-17** — 负的 `x` 和 `y` 值使视图向左和向上偏移


  `offset` 修饰符允许你根据 SwiftUI 通常放置视图的位置来定位视图。如果你更希望基于原点（屏幕左上角）来定位视图，则应使用 `position`
  修饰符。


  与 `offset` 修饰符类似，`position` 修饰符也需要 `x` 和 `y` 值来定义视图的中心位置。以下 Swift 代码将一个 `Text` 视图放置在向右
  225 点、向下 126 点处，如图 3-18 所示：


  ![](img/329781_7_En_3_Fig18_HTML.jpg)


  一张手机示意图，屏幕的宽度和高度方向标有箭头。`X` 和 `Y` 轴标记有值：`X` 等于 225，`Y` 等于 127。


  **图 3-18** — 使用 `position` 修饰符将视图放置在用户界面上


  ```

  Text ("Top")

  .font(.system(size: 40))

  .background(Color.yellow)

  .position(x: 225, y: 127)

  ```


  > **注意：** 在使用 `offset` 或 `position` 修饰符时，要小心使用过大的 `x` 或 `y` 值。因为较大的值可能在大屏幕上完美定位视图，但在较小的屏幕上却可能使该视图移出屏幕边缘。


  你可以将 `offset` 和 `position` 修饰符应用于任何视图。由于堆栈也是视图，因此可以将 `offset` 和 `position` 修饰符应用于堆栈，这会自动移动堆栈内每个视图的位置。考虑以下将
  `offset` 修饰符应用于整个 `VStack` 的 Swift 代码：


  ```

  VStack {

  Text ("First")

  .font(.system(size: 40))

  .background(Color.yellow)

  Text ("Second View")

  .font(.system(size: 40))

  .background(Color.yellow)

  }.offset(x: 25, y: 125)

  ```


  上述代码将整个 `VStack` 的内容（两个 `Text` 视图）从其正常显示位置向右下方移动，如图 3-19 所示。


  ![](img/329781_7_En_3_Fig19_HTML.jpg)


  一张手机示意图。其上标有箭头，分别指示了 `VStack` 的正常位置以及 `VStack` 偏移后第一个和第二个视图在屏幕上的位置。


  **图 3-19** — `offset` 修饰符将整个堆栈从其正常显示位置移开


  `offset` 修饰符将整个 `VStack` 从其正常位置移动，但 `position` 修饰符是基于原点（屏幕左上角）来定位 `VStack` 的。以下
  Swift 代码使用了完全相同的 `x` 和 `y` 值，但将其应用于 `VStack` 的却是 `position` 修饰符：


  ```

  VStack {

  Text ("First")

  .font(.system(size: 40))

  .background(Color.yellow)

  Text ("Second View")

  .font(.system(size: 40))

  .background(Color.yellow)

  }.position(x: 25, y: 125)

  ```


  请注意，由于 `position` 修饰符是从原点开始移动 `VStack`，因此 `x` 值不够大，导致 `VStack` 的内容被屏幕截断，如图 3-20
  所示。


  ![](img/329781_7_En_3_Fig20_HTML.jpg)


  一张手机示意图。它展示了 `VStack` 的第一个和第二个视图位于显示屏最左侧部分的位置。


  **图 3-20** — `position` 修饰符相对于原点放置 `VStack`


  ## 总结


  在 SwiftUI 中设计用户界面时，默认会将视图居中显示在屏幕中间。通过使用 `padding` 修饰符，你可以增加视图周围的间距。`padding` 修饰符可以影响视图的一个、两个、三个或全部四个边。


  当你想要推开视图时，可以使用间距器，它们就像弹簧一样，无论屏幕实际尺寸如何，都能将视图推到屏幕边缘。通过使用多个间距器，你可以将视图推得更远。你还可以定义间距器可以收缩的最小长度，以确保它不会收缩到特定长度以下。


  在垂直和水平堆栈中，你可以定义堆栈内所有视图之间的间距。通过使用 `offset` 修饰符，你可以将视图从其正常显示位置移开。通过使用 `position` 修饰符，你可以根据原点（即
  iOS 屏幕的左上角）精确地将视图放置在屏幕上。


  `padding` 修饰符、间距器、堆栈内的间距以及 `offset`/`position` 修饰符让你能够安排视图在用户界面上的布局。你可以将 `padding`、`offset`
  和 `position` 修饰符应用于任何视图，包括堆栈。通过修改整个堆栈，你可以修改该堆栈内的所有视图。


  由于堆栈间距、`offset` 修饰符和 `position` 修饰符可以使用固定的数值，请确保这些值不要过大，以免在较小尺寸的 iOS 设备屏幕上将视图推出屏幕边缘。通过使用
  `padding`、间距器以及 `position` 和 `offset` 修饰符，你可以设计出在不同 iOS 设备上外观和功能都完全一致的用户界面。这样，你就可以将更多时间用于编写代码，让应用实现有用且令人惊叹的功能，而减少花费在让用户界面适配不同尺寸屏幕和方向上的时间。




