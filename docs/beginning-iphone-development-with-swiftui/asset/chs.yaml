  \ `RuleMark`，它可以在你所显示数据的精确平均值处显示一条线。\n\n`RuleMark` 命令如下所示：\n\n```swift\nRuleMark\
  \ (y: .value(\"Average Sales\", (mySalesArray.map{Int($0.sales)}).reduce(0, +)/Set(mySalesArray.map({$0.sales})).count))\
  \                                       .foregroundStyle(.purple)\n```\n\n首先，我们需要定义\
  \ Y 轴上显示的是哪个数值数据。上述代码假设每个标记（条形）的高度由一个名为“销售额”的数值定义，该数值是结构体数组（`mySalesArray`）的一部分。\n\
  \n其次，我们需要通过将各项（如销售额）的值相加并除以总项数来计算平均值。如果有两项（3 和 5），平均值就是 (3 + 5)/2。\n\n`.map{Int($0.sales)}.reduce(0,+)`\
  \ 将所有销售额（`.map`）相加，并将其归约为单个数值。\n\n`Set(mySalesArray.map({$0.sales})).count` 只是简单统计了销售额的总数。然后，`.foregroundStyle`\
  \ 修饰符定义了 `RuleMark` 的颜色。\n\n> **注意**：`RuleMarks` 可用于突出显示图表的任何部分。\n\n要了解如何在图表上显示\
  \ `RuleMark`，请按照以下步骤操作：\n\n![](img/329781_7_En_16_Fig6_HTML.jpg)\n\n一个条形图表示了 Oscar、Mayer、George\
