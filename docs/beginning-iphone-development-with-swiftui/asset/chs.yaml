  )\n                    }\n                }\n                ToolbarItem(placement:\
  \ .navigationBarTrailing) {\n                    Button {\n                    \
  \    message = \"完成按钮被点击\"\n                    } label: {\n                   \
  \     Text(\"完成\")\n                    }\n                }\n            }\n  \
  \          Text(message)\n            HStack (spacing: 50) {\n                Button\
  \ (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
  \                }\n                Button (\".inline\") {\n                   \
  \ titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n   \
  \         }\n        }.accentColor(.purple)\n    }\n    ```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var titleType\
  \ = NavigationBarItem.TitleDisplayMode.large\n    @State var message = \"\"\n  \
  \  var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \        .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
  \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
  \ {\n                    Button {\n                        message = \"iCloud 图标被点击\"\
  \n                    } label: {\n                        Image(systemName: \"icloud\"\
  )\n                    }\n                }\n                ToolbarItem(placement:\
  \ .navigationBarTrailing) {\n                    Button {\n                    \
  \    message = \"完成按钮被点击\"\n                    } label: {\n                   \
  \     Text(\"完成\")\n                    }\n                }\n            }\n  \
  \          Text(message)\n            HStack (spacing: 50) {\n                Button\
  \ (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
  \                }\n                Button (\".inline\") {\n                   \
  \ titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n   \
  \         }\n        }.accentColor(.purple)\n    }\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n9.  点击画布窗格中的“Live”图标。\n10. 点击由 `ToolbarItem` 定义的按钮。注意，每次点击工具栏按钮时，`Text`\
  \ 视图中都会出现一条消息，例如“iCloud 图标被点击”或“完成按钮被点击”。\n\n\n\n## 在导航堆栈中显示视图\n\n在某些情况下，在`NavigationStack`中仅显示单个视图（例如`Text`或`Image`视图）可能没问题。然而，很多时候你希望显示一个完全不同的用户界面。由于你可以使用结构体定义用户界面屏幕，因此可以创建多个结构体来生成多个屏幕，这些屏幕都能在`NavigationStack`中显示。\n\
  \n创建新结构体的最简单方法是在`ContentView`文件内部。但这可能会使代码变得杂乱，因此第二种方法是将结构体存储在单独的文件中。\n\n要了解如何创建定义另一个用户界面屏幕的结构体，请按照以下步骤操作：\n\
  \n![](img/329781_7_En_17_Fig4_HTML.jpg)\n\n该屏幕展示了用于创建新文件的模板选择，例如 macOS、watchOS、tvOS、DriverKit\
  \ 等。它还包含 Swift 文件、C 文件、用户界面、UI 测试用例类和 SwiftUI 视图等选项，以及用于取消、查看、空文件、启动屏幕和上一步或下一步的导航按钮。\n\
  \n图 17-4\n选择要创建的文件的对话框\n\n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其任意命名，例如 `NavigationStackStructures`。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 这行内部添加一个 `NavigationStack`\
  \ 和一个 `VStack`，如下所示：\n\n```\nvar body: some View {\n    NavigationStack {\n    \
  \    VStack {\n        }\n    }\n}\n```\n\n4. 向 `VStack` 添加两个 `NavigationLink` 和一个\
  \ `.navigationTitle` 修饰符，如下所示：\n\n```\nvar body: some View {\n    NavigationStack\
  \ {\n        VStack {\n            NavigationLink(destination: FileView()) {\n \
  \               Text(\"Link to structure in same file\")\n            }\n      \
  \      NavigationLink(destination: SeparateFileView()) {\n                Text(\"\
  Separate file link\")\n            }\n            .navigationTitle(\"Navigation\
  \ Title\")\n        }\n    }\n}\n```\n\n第一个 `NavigationLink` 将显示一个名为 `FileView`\
  \ 的结构体。第二个 `NavigationLink` 将显示一个名为 `SeparateFileView` 的结构体。由于这两个结构体都还不存在，我们需要创建它们。\n\
  \n5. 在完整的 `struct ContentView: View` 结构体下方添加以下结构体，如下所示：\n\n```\nstruct FileView:\
  \ View {\n    var body: some View {\n        HStack {\n            Spacer()\n  \
  \          VStack {\n                Spacer()\n                Text(\"This is a\
  \ separate structure\")\n                Text(\"that's stored in the same file\"\
  )\n                Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    var body: some View {\n        NavigationStack {\n            VStack\
  \ {\n                NavigationLink(destination: FileView()) {\n               \
  \     Text(\"Link to structure in same file\")\n                }\n            \
  \    NavigationLink(destination: SeparateFileView()) {\n                    Text(\"\
  Separate file link\")\n                }\n                .navigationTitle(\"Navigation\
  \ Title\")\n            }\n        }\n    }\n}\n\nstruct FileView: View {\n    var\
  \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
  \ {\n                Spacer()\n                Text(\"This is a separate structure\"\
  )\n                Text(\"that's stored in the same file\")\n                Spacer()\n\
  \            }\n            Spacer()\n        }.background(Color.yellow)\n    }\n\
  }\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n        ContentView()\n    }\n}\n```\n\n我们可以在 `ContentView` 文件内继续添加新的结构体，但这有使文件变得杂乱的风险。创建结构体的第二种方法是将它们存储在单独的文件中，接下来的步骤将帮助我们实现这一点。在创建单独文件存储结构体时，我们可以使用完全空白的\
  \ Swift 文件或 SwiftUI View 文件。\n\n我们将使用一个空白的 Swift 文件来查看创建 SwiftUI 视图所需的所有代码，但 SwiftUI\
  \ View 文件也同样适用，并且会提供创建用户界面所需的基本代码。\n\n6. 选择 `文件` ➤ `新建` ➤ `文件`。会弹出一个对话框，如图 17-4\
  \ 所示。\n   - 点击对话框顶部的“iOS”，然后点击 `Swift 文件`，再点击 `下一步`。Xcode 会要求你为新创建的文件命名。\n   - 输入\
  \ `SeparateFile` 并点击 `创建`。Xcode 会创建一个新的 Swift 文件。\n   - 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\
  \n```\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    var body: some View\
  \ {\n        HStack {\n            Spacer()\n            VStack {\n            \
  \    Spacer()\n                Text(\"This is another structure\")\n           \
  \     Text(\"but stored in a separate file\")\n                Spacer()\n      \
  \      }\n            Spacer()\n        }.background(Color.orange)\n    }\n}\n\n\
  struct SeparateFileView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n        SeparateFileView()\n    }\n}\n```\n\n> **注意**：当将结构体存储在单独的文件中时，你需要第二个结构体（`PreviewProvider`）才能在画布窗格中显示该用户界面。\n\
  \n1. 在导航器窗格中点击 `ContentView` 文件。\n2. 在画布窗格中点击“实时”图标。\n3. 点击 `\"Link to structure\
  \ in same file\"`。注意，这会显示存储在 `ContentView` 文件中的 `FileView` 结构体。\n4. 点击“返回”按钮回到原始屏幕。\n\
  5. 点击 `\"Separate file link\"`。注意，这会显示存储在名为 `SeparateFile` 文件中的 `SeparateFileView`\
  \ 结构体。\n\n如果结构体很短，将其与 `NavigationStack` 存储在同一个文件中可能更为方便。然而，通常将结构体存储在单独文件中更有用，这样可以更好地组织它们，使每个文件更易于阅读。\n\
  \n\n\n### 在导航栈中结构体之间传递数据\n\n上一个项目创建了两个结构体，其中一个结构体存储在 `ContentView` 文件中，另一个结构体存储在一个单独的文件中。在这两种情况下，结构体都定义了显示静态信息的用户界面，这些信息与原始结构体（`ContentView`）中的任何内容都无关。\n\
  \n在许多情况下，您可能希望一个结构体中的数据出现在另一个结构体中。这意味着我们必须将数据从一个结构体传递到另一个结构体。\n\n幸运的是，这个任务类似于在函数之间传递数据。当一个结构体需要接收数据时，我们只需声明一个属性：创建一个变量，为该变量起一个描述性的名称，并定义该变量可以保存的数据类型，例如\
  \ `String` 或 `Double`，如下所示：\n\n```\nstruct FileView: View {\n    var choice: String\n\
  ```\n\n这定义了一个名为 `choice` 的变量，它可以保存一个 `String` 类型的值。要向此结构体传递数据，我们可以通过调用结构体名称（`FileView`）并后跟\
  \ `choice` 变量作为参数的方式来加载该结构体，如下所示：\n\n```\nFileView(choice: \"Heads\")\n```\n\n当向存储在同一个文件中的结构体传递数据时，我们只需要遵循以下两步流程：\n\
  \n- 在结构体内部声明一个或多个变量以接收数据。\n- 使用这些变量作为参数来调用该结构体。\n\n然而，当向存储在单独文件中的结构体传递数据时，还需要一个额外的步骤。因为存储在单独文件中的结构体还包含另一个用于在画布窗格中显示用户界面的结构体，所以这个预览结构体必须包含该结构体的参数，并向其传递数据，如下所示：\n\
  \n```\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n```\n\n要了解如何在结构体之间传递数据，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `NavigationStackPassData`。\n2. 点击导航器窗格中的\
  \ `ContentView` 文件。\n3. 像这样编辑 `struct ContentView` 结构体：\n\n```swift\nstruct ContentView:\
  \ View {\n    var body: some View {\n        NavigationStack {\n            VStack\
  \ (spacing: 26) {\n                Text(\"Choose Heads or Tails\")\n           \
  \     NavigationLink(destination: FileView(choice: \"Heads\")) {\n             \
  \       Text(\"Heads\")\n                }\n                NavigationLink(destination:\
  \ SeparateFileView(passedData: \"Tails\")) {\n                    Text(\"Tails\"\
  )\n                }\n                .navigationTitle(\"Flip a Coin\")\n      \
  \      }\n        }\n    }\n}\n```\n\n上述代码定义了两个 `NavigationLink`，其中一个链接调用了一个名为 `FileView`\
  \ 的结构体，参数为 `choice:`，并传入了 `\"Heads\"`。第二个 `NavigationLink` 调用了一个名为 `SeparateFileView`\
  \ 的结构体，参数为 `passedData:`，并传入了 `\"Tails\"`。\n\n4. 在 `struct ContentView` 下方添加一个新的结构体，如下所示：\n\
  \n```swift\nstruct FileView: View {\n    var choice: String\n    var body: some\
  \ View {\n        HStack {\n            Spacer()\n            VStack {\n       \
  \         Spacer()\n                Text(\"You chose = \\(choice)\")\n         \
  \       Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n```\n\n这个 `FileView` 结构体声明了一个可以保存 `String` 类型的 `choice` 变量。然后，它在一个显示\
  \ `\"You chose = \"` 的 `Text` 视图中展示了这个 `choice` 变量。整个 `ContentView` 文件应该如下所示：\n\n\
  ```swift\nimport SwiftUI\nstruct ContentView: View {\n    var body: some View {\n\
  \        NavigationStack {\n            VStack (spacing: 26) {\n               \
  \ Text(\"Choose Heads or Tails\")\n                NavigationLink(destination: FileView(choice:\
  \ \"Heads\")) {\n                    Text(\"Heads\")\n                }\n      \
  \          NavigationLink(destination: SeparateFileView(passedData: \"Tails\"))\
  \ {\n                    Text(\"Tails\")\n                }\n                .navigationTitle(\"\
  Flip a Coin\")\n            }\n        }\n    }\n}\nstruct FileView: View {\n  \
  \  var choice: String\n    var body: some View {\n        HStack {\n           \
  \ Spacer()\n            VStack {\n                Spacer()\n                Text(\"\
  You chose = \\(choice)\")\n                Spacer()\n            }\n           \
  \ Spacer()\n        }.background(Color.yellow)\n    }\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n这段代码创建了一个名为 `FileView` 的结构体，但现在我们需要创建第二个名为 `SeparateFileView`\
  \ 的结构体，它声明一个 `String` 类型的 `passedData` 变量。\n\n5. 选择“文件” ➤ “新建” ➤ “文件”。出现一个对话框（见图\
  \ 17-4）。\n6. 点击对话框顶部的“iOS”，点击“Swift 文件”，然后点击“下一步”。Xcode 会要求为您新创建的文件命名。\n7. 输入 `SeparateFile`\
  \ 并点击“创建”。Xcode 会创建一个新的 Swift 文件。\n8. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n\
  ```swift\nimport SwiftUI\nstruct SeparateFileView: View {\n    var passedData: String\n\
  \    var body: some View {\n        HStack {\n            Spacer()\n           \
  \ VStack {\n                Spacer()\n                Text(\"You chose = \\(passedData)\"\
  )\n                Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
  \    }\n}\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n```\n\n这个文件创建了一个\
  \ `SeparateFileView` 结构体，它声明了一个 `String` 类型的 `passedData` 变量。由于这个 `SeparateFileView`\
  \ 结构体存储在一个单独的文件中，它包含一个 `struct PreviewProvider`，我们在此也必须使用 `passedData` 参数。\n\n9.\
  \ 点击导航器窗格中的 `ContentView`，返回到 `ContentView` 结构体。\n10. 点击画布窗格中的“实时”图标。\n11. 点击“Heads”导航链接。将出现\
  \ `FileView` 结构体，显示“You chose = Heads”。\n12. 点击左上角的“返回”按钮。\n13. 点击“Tails”导航链接。将出现\
  \ `SeparateFileView` 结构体，显示“You chose = Tails”。\n\n\n\n### 在导航栈中更改结构体之间的数据\n\n之前的项目创建了两个结构体，一个存储在\
  \ `ContentView` 文件中，另一个存储在单独的文件中。在这两种情况下，这些结构体都定义了用于接收和显示数据的用户界面。\n\n如果我们将数据传递给一个结构体，然后允许该结构体修改这些数据，情况会怎样？这需要进行几项更改：\n\
  \n-   创建一个 `@State` 变量。\n-   使用 `NavigationLink` 打开另一个结构体，并向该结构体传递一个指向 `@State`\
  \ 变量的绑定（使用 `$` 符号），例如：\n-   在接收数据的结构体中定义一个 `@Binding` 变量。\n-   在接收数据的结构体中更改该 `@Binding`\
  \ 变量。\n\n```\nFileView(choice: $message)\n```\n\n要了解如何在导航栈中的结构体之间更改数据，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `\"NavigationStackBindingData\"`。\n\n\
  2.  在导航器窗格中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 一行下方创建一个 `@State`\
  \ 变量，如下所示：\n\n```\n    struct ContentView: View {\n    @State var message = \"\"\
  \n    ```\n\n4.  在 `var body: some View` 一行内部添加一个 `NavigationStack` 和一个 `VStack`，如下所示：\n\
  \n```\n    var body: some View {\n    NavigationStack {\n    VStack {\n    }\n \
  \   }\n    ```\n\n5.  在 `VStack` 内部添加一个 `Text` 视图和两个 `NavigationLink`，如下所示：\n\n\
  ```\n    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"Type here\"\
  , text: $message)\n    NavigationLink(destination: FileView(choice: $message)) {\n\
  \    Text(\"Send a message\")\n    }\n    NavigationLink(destination: SeparateFileView(passedData:\
  \ $message)) {\n    Text(\"Separate file\")\n    }\n    .navigationTitle(\"Passing\
  \ Data\")\n    }\n    }\n    ```\n\n注意，第一个 `NavigationLink` 打开一个名为 `FileView` 的结构体，并将一个绑定变量（`$message`）发送给\
  \ `choice:` 参数。第二个 `NavigationLink` 打开一个名为 `SeparateFileView` 的结构体，并将同一个绑定变量（`$message`）发送给\
  \ `passedData` 参数。\n\n6.  在 `struct ContentView: View` 结构体下方添加以下结构体：\n\n```\n  \
  \  struct FileView: View {\n    @Binding var choice: String\n    var body: some\
  \ View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
  Type here:\", text: $choice)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
  \    }\n    }\n    ```\n\n注意，该结构体声明了一个名为 `choice` 的 `@Binding` 变量，它可以存储一个 `String`。此结构体使用\
  \ `TextField` 来更改该 `@Binding` 变量（`$choice`），这会自动将更改发送回 `ContentView` 结构体。\n\n7.\
  \  选择 `File` ➤ `New` ➤ `File`。一个对话框会出现（见图 17-4）。\n\n8.  点击对话框顶部附近的 `iOS`，点击 `Swift\
  \ File`，然后点击 `Next`。Xcode 会询问您为新创建的文件命名。\n\n9.  输入 `SeparateFile` 并点击 `Create`。Xcode\
  \ 会创建一个新的 Swift 文件。\n\n10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\n    import\
  \ SwiftUI\n    struct SeparateFileView: View {\n    @Binding var passedData: String\n\
  \    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n\
  \    TextField(\"Type here\", text: $passedData)\n    Spacer()\n    }\n    Spacer()\n\
  \    }.background(Color.orange)\n    }\n    }\n    struct SeparateFileView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    SeparateFileView(passedData:\
  \ .constant(\"\"))\n    }\n    }\n    ```\n\n注意，该结构体声明了一个名为 `passedData` 的 `@Binding`\
  \ 变量，它可以存储一个 `String`。`TextField` 可以更改此变量（`$passedData`）并自动将更改发送回 `ContentView`\
  \ 结构体。\n\n另外请注意，由于此结构体存储在单独的文件中，因此 `PreviewProvider` 结构体也必须通过提供 `.constant(\"\"\
  )` 来包含 `passedData` 参数。\n\n11. 在导航器窗格中点击 `ContentView` 文件。\n\n12. 在画布窗格中点击 `Live`\
  \ 图标。\n\n13. 点击 `TextField` 并输入一个短语。\n\n14. 点击 `\"Send a message\"` 导航链接，该链接会将字符串传递给存储在\
  \ `ContentView` 文件中的 `FileView` 结构体。\n\n15. 点击 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击\
  \ `Back` 按钮返回到 `ContentView` 结构体，该结构体会显示修改后的数据。\n\n16. 点击 `\"Separate file\"` 导航链接，该链接会将字符串传递给存储在单独文件中的\
  \ `SeparateFileView` 结构体。\n\n17. 点击 `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击\
  \ `Back` 按钮返回到 `ContentView` 结构体，该结构体会显示修改后的数据。\n\n\n\n### 在导航堆栈中的结构体之间共享数据\n\n\
  使用 `@State` 和 `@Binding` 变量可以让多个视图共享和修改数据。但是，假设你创建了一个按顺序链接四个结构体的导航堆栈。如果你在第一个结构体中更改了数据，并想将其传递给第四个结构体，则还必须通过第二个和第三个结构体来传递该数据。\n\
  \n虽然这种方法可行，但很笨拙。更好的办法是直接将数据传递给需要数据的结构体。为此，SwiftUI 提供了另一种在结构体间共享数据的方式。首先，创建一个 `ObservableObject`\
  \ 类，其中包含一个或多个要共享的变量。每个变量都必须标记为 `@Published`，如下所示：\n\n```\nclass ShareString: ObservableObject\
  \ {\n@Published var message = \"\"\n}\n```\n\n包含 `NavigationStack` 的结构体（例如 `ContentView`）需要定义一个\
  \ `@StateObject` 变量，该变量用于定义来自 `ObservableObject` 类的对象，如下所示：\n\n```\n@StateObject\
  \ var showMe = ShareString()\n```\n\n由于我们希望在导航堆栈内的所有视图之间共享这个 `ObservableObject`，因此需要将\
  \ `.environmentObject` 修饰符与要共享的 `StateObject` 一起添加到 `NavigationStack` 上，如下所示：\n\n\
  ```\nNavigationStack {\n}.environmentObject(showMe)\n```\n\n`NavigationLink` 不再需要将数据传递给每个视图，它只需要指定要显示的视图名称即可，例如：\n\
  \n```\nNavigationLink(destination: FileView()) {\nText(\"发送消息\")\n}\n```\n\n在需要访问\
  \ `ObservableObject` 的每个结构体中，我们需要声明一个使用 `ObservableObject` 类的 `@EnvironmentObject`\
  \ 变量，如下所示：\n\n```\n@EnvironmentObject var choice: ShareString\n```\n\n最后，在每个定义了\
  \ `@EnvironmentObject` 的结构体中，我们可以通过使用 `@EnvironmentObject` 名称加上 `@Published` 属性名称来访问要共享的实际数据，如下所示：\n\
  \n```\n$choice.message\n```\n\n在这个例子中，`\"choice\"` 是 `@EnvironmentObject` 的名称，而\
  \ `\"message\"` 是在 `ObservableObject` 中定义的 `@Published` 属性。要了解如何使用 `ObservableObject`\
  \ 共享数据，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如 `\"NavigationStackObservable\"\
  `。\n\n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `import SwiftUI` 行下方创建一个 `ObservableObject`\
  \ 类，如下所示：\n\n```\n    class ShareString: ObservableObject {\n    @Published var\
  \ message = \"\"\n    }\n    ```\n\n    `@Published` 变量将包含要在导航堆栈内的结构体之间共享的数据。\n\n\
  4.  在 `struct ContentView: View` 行下方创建一个 `StateObject` 变量，如下所示：\n\n```\n    struct\
  \ ContentView: View {\n    @StateObject var showMe = ShareString()\n    ```\n\n\
  \    这会基于 `ShareString` `ObservableObject` 创建一个新对象（`showMe`）。\n\n5.  在 `var body:\
  \ some View` 行内部添加一个 `NavigationStack` 和一个 `VStack`，如下所示：\n\n```\n    var body:\
  \ some View {\n    NavigationStack {\n    VStack (spacing: 26) {\n    }\n    }\n\
  \    ```\n\n6.  在 `VStack` 内部添加一个 `Text` 视图、两个 `NavigationLink` 以及一个 `.navigationTitle`\
  \ 修饰符，如下所示：\n\n```\n    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"\
  在此输入\", text: $showMe.message)\n    NavigationLink(destination: FileView()) {\n\
  \    Text(\"发送消息\")\n    }\n    NavigationLink(destination: SeparateFileView())\
  \ {\n    Text(\"单独文件\")\n    }\n    .navigationTitle(\"共享数据\")\n    }\n    }.environmentObject(showMe)\n\
  \    ```\n\n    请确保在 `NavigationStack` 末尾添加 `.environmentObject(showMe)` 修饰符。这样允许共享\
  \ `showMe` 这个 `ObservableObject` `ShareString` 类。前面的 `NavigationLink` 将打开我们需要创建的结构体，名为\
  \ `FileView` 和 `SeparateFileView`。\n\n7.  在 `struct ContentView` 结构体下方添加以下结构体，如下所示：\n\
  \n```\n    struct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
  \    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n\
  \    TextField(\"在此输入:\", text: $choice.message)\n    Spacer()\n    }\n    Spacer()\n\
  \    }.background(Color.yellow)\n    }\n    }\n    ```\n\n    注意，这个结构体定义了一个 `@EnvironmentObject`\
  \ 变量，它可以持有一个 `ShareString` `ObservableObject`。在 `TextField` 中，我们必须将文本存储在 `\"choice\"\
  ` 这个 `@EnvironmentObject` 中，该对象使用了 `\"message\"` 这个 `@Published` 属性（`$choice.message`）。完整的\
  \ `ContentView` 文件应该如下所示：\n\n```\n    import SwiftUI\n    class ShareString: ObservableObject\
  \ {\n    @Published var message = \"\"\n    }\n    struct ContentView: View {\n\
  \    @StateObject var showMe = ShareString()\n    var body: some View {\n    NavigationStack\
  \ {\n    VStack (spacing: 26) {\n    TextField(\"在此输入\", text: $showMe.message)\n\
  \    NavigationLink(destination: FileView()) {\n    Text(\"发送消息\")\n    }\n    NavigationLink(destination:\
  \ SeparateFileView()) {\n    Text(\"单独文件\")\n    }\n    .navigationTitle(\"共享数据\"\
  )\n    }\n    }.environmentObject(showMe)\n    }\n    }\n    struct FileView: View\
  \ {\n    @EnvironmentObject var choice: ShareString\n    var body: some View {\n\
  \    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"在此输入:\"\
  , text: $choice.message)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
  \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n8.  选择 文件 ➤\
  \ 新建 ➤ 文件。会弹出一个对话框（见图 17-4）。\n\n9.  在对话框顶部附近点击 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode\
  \ 会要求你为新创建的文件命名。\n\n10.  输入 `SeparateFile` 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。\n\n\
  11.  删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\n    import SwiftUI\n    struct\
  \ SeparateFileView: View {\n    @EnvironmentObject var passedData: ShareString\n\
  \    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n\
  \    TextField(\"在此输入\", text: $passedData.message)\n    Spacer()\n    }\n    Spacer()\n\
  \    }.background(Color.orange)\n    }\n    }\n    struct SeparateFileView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    SeparateFileView()\n\
  \    }\n    }\n    ```\n\n    注意，这个结构体也声明了一个 `@EnvironmentObject`，它可以持有一个 `ShareString`\
  \ `ObservableObject`。然后，`TextField` 使用 `\"passedData\"` 这个 `@EnvironmentObject`\
  \ 来访问 `\"message\"` 这个 `@Published` 属性（`$passedData.message`）。\n\n12.  在导航器面板中点击\
  \ `ContentView` 文件。\n\n13.  在画布面板中点击 **Live** 图标。\n\n14.  在 `TextField` 中点击并输入一个短语。\n\
  \n15.  点击 `\"发送消息\"` 导航链接以打开 `FileView` 结构体。注意，你在步骤 14 中输入的文本现在显示在 `FileView` 的\
  \ `TextField` 中。\n\n16.  编辑 `TextField` 中的文本，然后点击 **返回** 按钮。注意，修改后的文本现在显示在 `ContentView`\
  \ 的 `TextField` 中。\n\n17.  编辑 `TextField` 中的文本，然后点击 `\"单独文件\"` 导航链接。编辑后的文本现在显示在\
  \ `SeparateFileView` 的 `TextField` 中。\n\n18.  编辑 `TextField` 中的文本，然后点击 **返回** 按钮。注意，修改后的文本现在显示在\
  \ `ContentView` 的 `TextField` 中。所有这些展示了不同的结构体如何访问 `ObservableObject` 中的 `@Published`\
  \ 属性。\n\n\n\n## 在导航栈中使用列表\n\n与其单独显示`NavigationLink`，一种常见技巧是创建一个`List`（参见第 13 章），其中`List`的每一项都充当链接。通过在`List`中选择一项，导航栈即可打开一个新视图。导航栈中嵌套列表的这种组合方式在\
  \ iOS 的“设置”应用中极为常见。\n\n在前面的项目中创建导航链接时，我们按照如下方式定义了链接上显示的文本以及要显示的目标视图：\n\n```\nNavigationLink\
  \ {\n    Text(\"目标视图\")\n} label: {\n    Text(\"链接上显示的文本\")\n}\n```\n\n然而，在处理列表时，将目标视图与导航链接分离开来会更方便。这样一来，导航链接只需定义其外观即可。为了定义目标视图，我们可以使用一个`navigationDestination`修饰符，该修饰符用于定义当用户选择导航链接时显示的内容。\n\
  \n要了解如何在`NavigationStack`中使用`List`，请按照以下步骤操作：\n\n![](img/329781_7_En_17_Fig5_HTML.jpg)\n\
  \n一段文字显示了一个书籍列表，其标题包括《华氏 451 度》、《火星纪事》、《邪恶降临》和《纹身人》。最后一项似乎由一个非英文字符表示。\n\n图 17-5\
  \ — 导航链接列表\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“NavigationStackList”。\n\n\
  2.  在导航器窗格中点击`ContentView`文件。\n\n3.  在`import SwiftUI`这一行下方添加如下结构体：\n\n```\nstruct\
  \ Books: Identifiable, Hashable {\n    var id = UUID()\n    var title: String\n\
  \    var summary: String\n}\n```\n\n请注意，该结构体需要遵循`Identifiable`协议以创建唯一 ID，并且必须遵循`Hashable`协议，以便能用在与`.navigationDestination`修饰符配合使用的位置，该修饰符将定义用户选择导航链接后打开的视图。\n\
  \n4.  在`struct ContentView: View`这一行下方添加一个结构体数组，如下所示：\n\n```\nlet books: [Books]\
  \ = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"),\n    Books(title:\
  \ \"火星纪事\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"\
  ),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\")\n]\n```\n\n5.  在`struct\
  \ ContentView_Previews: PreviewProvider`这一行上方添加如下结构体：\n\n```\nstruct BookView: View\
  \ {\n    var bookInfo: Books\n    var body: some View {\n        VStack (spacing:\
  \ 24) {\n            Text(\"\\(bookInfo.title)\")\n                .font(.largeTitle)\n\
  \            Text(\"\\(bookInfo.summary)\")\n                .font(.body)\n    \
  \    }\n    }\n}\n```\n\n此结构体定义了用户在点击导航链接后显示的视图（用户界面）。它需要从之前定义的`Books`结构体中检索数据。然后，它获取`title`和`summary`，并在`VStack`内的两个`Text`视图中显示。\n\
  \n6.  在`var body: some View`内部添加一个`NavigationStack`、`List`和`NavigationLink`，如下所示：\n\
  \n```\nvar body: some View {\n    NavigationStack {\n        List(books) { book\
  \ in\n            NavigationLink(\"\\(book.title)\", value: book)\n        }.navigationTitle(Text(\"\
  书籍列表\"))\n        .navigationDestination(for: Books.self) { x in\n            BookView(bookInfo:\
  \ x)\n        }\n    }\n}\n```\n\n`List`获取`books`数组。然后，它创建了一个任意命名的变量“book”，用于将`book.title`显示为导航链接。请注意，导航链接还定义了一个值（`book`），该值对于显示的每个导航链接都是唯一的。\n\
  \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\nstruct Books: Identifiable, Hashable\
  \ {\n    var id = UUID()\n    var title: String\n    var summary: String\n}\nstruct\
  \ ContentView: View {\n    let books: [Books] = [\n        Books(title: \"华氏 451\
  \ 度\", summary: \"关于焚书的反乌托邦小说\"),\n        Books(title: \"火星纪事\", summary: \"关于火星殖民的故事\"\
  ),\n        Books(title: \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n        Books(title:\
  \ \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\")\n    ]\n    var body: some View {\n  \
  \      NavigationStack {\n            List(books) { book in\n                NavigationLink(\"\
  \\(book.title)\", value: book)\n            }.navigationTitle(Text(\"书籍列表\"))\n\
  \            .navigationDestination(for: Books.self) { x in\n                BookView(bookInfo:\
  \ x)\n            }\n        }\n    }\n}\nstruct BookView: View {\n    var bookInfo:\
  \ Books\n    var body: some View {\n        VStack (spacing: 24) {\n           \
  \ Text(\"\\(bookInfo.title)\")\n                .font(.largeTitle)\n           \
  \ Text(\"\\(bookInfo.summary)\")\n                .font(.body)\n        }\n    }\n\
  }\nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n        ContentView()\n    }\n}\n```\n\n7.  点击画布窗格中的“Live”图标。注意，`List`将书籍标题显示为导航链接，如图\
  \ 17-5 所示。\n\n![](img/329781_7_En_17_Fig6_HTML.jpg)\n\n一个屏幕显示了一个书籍列表，其中包括《火星纪事》，其内容是关于火星殖民的故事。\n\
  \n图 17-6 — 选择导航链接后出现的用户界面\n\n1.  点击任意书籍标题（导航链接）。由结构体`BookView`定义的用户界面将出现，并在左上角显示一个“返回”按钮，如图\
  \ 17-6 所示。\n\n列表可以成为在导航栈内创建导航链接的一种便捷方式。由于列表通常依赖数组来提供数据，因此你可能需要创建一个结构体来存储在数组中。\n\n\
  ## 总结\n\n导航栈是显示多个视图的便捷工具。一个结构体定义一个导航栈，其中包含一个或多个`NavigationLink`。这些`NavigationLink`打开的视图可以像`Text`或`Image`视图那样简单，但更常见的是由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\
  \n`NavigationLink`可以将数据传递给另一个视图，很像将数据传递给函数。另一个视图需要定义一个属性，然后`NavigationLink`就可以将数据传递给该属性。如果要将数据传递给另一个可以修改数据的视图，可以使用两种不同的方法。\n\
  \n第一种方法使用`@State`和`@Binding`变量，强制`NavigationLink`将数据传递给它打开的每个视图。第二种方法使用`ObservableObject`、`StateObject`和`EnvironmentObject`在多个视图之间共享数据。\n\
  \n导航栈通常与列表一起使用。通过点击`List`中的某个项目，用户可以跳转到新视图。列表通常检索存储在数组中的数据。该数组可以存储像字符串这样的单个数据类型，但更常见的是数组存储结构体以将相关数据分组到一起。`List`中的项目可以自然地创建指向另一个视图的导航链接，例如\
  \ iOS 的“设置”应用中的项目。\n\n当使用`List`创建导航栈时，使用导航链接来定义链接，然后使用`.navigationDestination`修饰符来定义要显示的目标视图，通常会更简单。导航栈使得连续显示数据屏幕变得容易。\n\
  \n\n\n"
- "# 18. 使用标签视图\n\n多数应用都包含多个屏幕。第 17 章解释了如何创建使用导航堆栈的应用，让用户可以按顺序从一个屏幕跳转到另一个屏幕。这对于显示更多详细信息非常方便，例如\
  \ iOS 中的“设置”应用，它允许你选择各种选项，然后查看多个屏幕来选取不同的设置。\n\n然而，导航堆栈的一个问题是，如果你将太多屏幕链接在一起，导航会变得笨重，因为你必须从第一个屏幕导航到第二个，再到第三个，才能到达第四个屏幕。然后你必须反转整个过程，从第四个屏幕返回到第一个屏幕。\n\
  \n为了提供另一种从一个屏幕跳转到另一个屏幕的方式，你可以使用标签视图，它会在屏幕底部显示图标和/或文本。选择一个标签（图标和/或文本）即可跳转到一个新屏幕。例如，“时钟”应用在屏幕底部显示图标/文本，让你跳转到不同的功能，如图\
  \ 18-1 所示。\n\n![](img/329781_7_En_18_Fig1_HTML.jpg)\n\n一张手机屏幕显示了一个世界时钟，展示了不同国家/地区的不同时间，包括圣地亚哥、底特律、拉各斯和北京。它包含了用于闹钟和计时器图标的标签。\n\
  \n图 18-1\n\n标签视图让你可以轻松从一个屏幕跳转到另一个屏幕\n\n由于无论你正在查看哪个屏幕，标签栏都显示在屏幕底部，因此标签视图让你可以随时轻松跳转到想要查看的屏幕。\n\
  \n## 使用标签视图\n\n一个标签视图通过如下代码包含多个视图：\n\n```\nTabView {\n// 在此放置多个视图\n}\n```\n\n存储在标签视图中的每个视图，可以简单到单个视图（如\
  \ `Text` 或 `Image` 视图），也可以更详细，例如定义一个视图的结构体。创建标签视图的第一步就是简单地列出你想要在标签视图内使用的所有视图，如下所示：\n\
  \n```\nTabView {\nText(\"一\")\nText(\"二\")\nText(\"三\")\nText(\"四\")\n}\n```\n\n\
  在定义了要在标签视图内显示的视图之后，下一步是为每个视图定义一个图标和/或文本来表示它。为此，需要为每个视图添加一个 `.tabItem` 修饰符，并使用 `Image`\
  \ 和 `Text` 视图，如下所示：\n\n```\nText(\"一\")\n.tabItem {\nImage(systemName: \"heart.fill\"\
  )\nText(\"标签 1\")\n}\n```\n\n通过为每个视图附加一个 `.tabItem` 修饰符，并使用 `Image` 和 `Text` 视图来定义其内容，你可以创建一个显示在屏幕底部的标签栏，如图\
  \ 18-2 所示。\n\n![](img/329781_7_En_18_Fig2_HTML.jpg)\n\n一段显示四个图标（标签 1、标签 2、标签 3、标签\
  \ 4）的片段。标签 1 是心形符号，标签 2 是兔子，标签 3 是乌龟，标签 4 是文件夹。\n\n图 18-2\n\n一个典型的标签栏显示图标和文本\n\n\
  `Image` 视图可以显示任何图像，但通常显示你可以在 SF Symbols 应用（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）中看到的图标。\n\
  \n> **注意**  \n> 标签可以显示为图像和文本、仅图像或仅文本。为了清晰起见，通常最好将标签同时定义为图像和文本。\n\n要了解如何创建一个简单的标签视图，请遵循以下步骤：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其起一个你喜欢的名称，例如 `\"TabViewSimple\"`。\n2. 在导航器窗格中点击\
  \ `ContentView` 文件。\n3. 在 `var body: some View` 内部添加以下视图，如下所示：\n\n```\n    var body:\
  \ some View {\n    TabView {\n    Text(\"一\")\n    Text(\"二\")\n    Text(\"三\")\n\
  \    Text(\"四\")\n    }\n    }\n```\n\n为了在屏幕底部创建一个标签栏，我们需要添加使用 `Image` 和 `Text`\
  \ 视图的 `.tabItem` 修饰符。\n\n4. 为每个视图添加如下的 `.tabItem` 修饰符：\n\n```\n    var body: some\
  \ View {\n    TabView {\n    Text(\"一\")\n    .tabItem {\n    Image(systemName:\
  \ \"heart.fill\")\n    Text(\"一\")\n    }\n    Text(\"二\")\n    .tabItem {\n   \
  \ Image(systemName: \"hare.fill\")\n    Text(\"二\")\n    }\n    Text(\"三\")\n  \
  \  .tabItem {\n    Image(systemName: \"tortoise.fill\")\n    Text(\"三\")\n    }\n\
  \    Text(\"四\")\n    .tabItem {\n    Image(systemName: \"folder.fill\")\n    Text(\"\
  四\")\n    }\n    }\n    }\n```\n\n你可以随意使用不同的 SF Symbols 图标和文本来定制屏幕底部标签栏中的按钮。除了使用\
  \ `Image` 和 `Text` 视图的组合，你也可以使用单个 `Label` 视图，如下所示：\n\n1. 在画布窗格中点击“实时”图标。\n2. 点击屏幕底部的不同标签，查看不同的视图。\n\
  \n```\nLabel(\"四\", systemImage: \"folder.fill\")\n```\n\n> **注意**  \n> 由于标签视图将每个视图表示为图标/文本，因此标签视图在屏幕底部最多只能显示五\
  \ (5) 个项目。如果你在标签视图中存储了超过五个视图，标签视图会自动创建一个“更多”图标，将任何额外的视图隐藏到第二个标签栏中。\n\n要了解如果你在标签视图中显示超过五个视图，标签视图如何自动在标签栏中创建一个“更多”按钮，请遵循以下步骤：\n\
