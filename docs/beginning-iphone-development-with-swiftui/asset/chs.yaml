  在之前的项目中，我们在 `LazyHGrid` 中创建了单行，在 `LazyVGrid` 中创建了单列。这些单行和单列是由 `GridItem` 数组定义的，如下所示：\n\
  \n```\nlet gridItems = [GridItem()]\n```\n\n如果你想要创建多行或多列，只需定义一个包含多个 `GridItem` 的数组即可，如下所示：\n\
  \n```\nlet gridItems = [GridItem(),\nGridItem()\n]\n```\n\n这将会在 `LazyHGrid` 中创建两行，或在\
  \ `LazyVGrid` 中创建两列。每当你向数组中添加一个额外的 `GridItem`，网格中的行数或列数就会增加。\n\n要了解如何更改网格中的行数或列数，请按照以下步骤操作：\n\
  \n![](img/329781_7_En_19_Fig3_HTML.jpg)\n\n此图展示了数字 1 到 10 排成三行三列，分别位于圆形和方形的盒子内，并沿水平和垂直方向排列。\n\
  \n**图 19-3** – 显示一个三行三列的网格\n\n1.  确保在 Xcode 中加载了之前的项目（“GridSimple”）。\n2.  按如下所示编辑数组，以在\
  \ `LazyHGrid` 中定义三行，在 `LazyVGrid` 中定义三列：\n    ```\n    let gridItems = [GridItem(),\n\
  \    GridItem(),\n    GridItem()\n    ]\n    ```\n    整个 `ContentView` 文件应如下所示：\n\
  \    ```\n    import SwiftUI\n    struct ContentView: View {\n    var body: some\
  \ View {\n    VStack {\n    let gridItems = [GridItem(),\n    GridItem(),\n    GridItem()\n\
  \    ]\n    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n\
  \    LazyHGrid(rows: gridItems) {\n    Image(systemName: \"1.circle\")\n    Image(systemName:\
  \ \"2.circle\")\n    Image(systemName: \"3.circle\")\n    Image(systemName: \"4.circle\"\
  )\n    Image(systemName: \"5.circle\")\n    Image(systemName: \"6.circle\")\n  \
  \  Image(systemName: \"7.circle\")\n    Image(systemName: \"8.circle\")\n    Image(systemName:\
  \ \"9.circle\")\n    Image(systemName: \"10.circle\")\n    }.font(.largeTitle)\n\
  \    })\n    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n \
  \   LazyVGrid(columns: gridItems) {\n    Image(systemName: \"1.square\")\n    Image(systemName:\
  \ \"2.square\")\n    Image(systemName: \"3.square\")\n    Image(systemName: \"4.square\"\
  )\n    Image(systemName: \"5.square\")\n    Image(systemName: \"6.square\")\n  \
  \  Image(systemName: \"7.square\")\n    Image(systemName: \"8.square\")\n    Image(systemName:\
  \ \"9.square\")\n    Image(systemName: \"10.square\")\n    }.font(.largeTitle)\n\
  \    })\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n\
  \    static var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\
  3.  点击 Canvas 面板中的 Live 图标。\n4.  左右滚动水平网格，以查看所有编号的圆形，如图 19-3 所示。\n5.  上下滚动垂直网格，以查看所有编号的方形。\n\
  \n请注意，在填充 `LazyHGrid` 时，SwiftUI 会将每个项目放置在不同的行中。这就是为什么圆形 1 出现在第一行，圆形 2 出现在第二行，圆形\
  \ 3 出现在第三行，而圆形 4 又回到第一行的原因。\n\n填充 `LazyVGrid` 时也遵循同样的规则，只不过 SwiftUI 会将每个项目放置在不同的列中。方形\
  \ 1 出现在第一列，方形 2 出现在第二列，方形 3 出现在第三列，而方形 4 又回到第一列。\n\n> **注意**：只有当网格无法同时显示所有项目时，滚动指示器才会出现。当显示三行或三列时，所有项目都是可见的，因此滚动指示器无需出现。\n\
  \n### 调整行/列间距\n\n通过创建一个 `GridItem` 数组，我们可以定义网格中的行数/列数。为了进一步定制，我们还可以定义行与列之间的间距。在网格中定义行/列间距的三种方式包括：\n\
  \n*   `.fixed`\n*   `.flexible`\n*   `.adaptive`\n\n`.fixed` 选项允许你定义一个十进制数值（`CGFloat`\
  \ 数据类型），用于创建一个特定的间距量。图 19-4 展示了不同的固定间距选项，以及它们如何影响网格中行列的外观。\n\n![](img/329781_7_En_19_Fig4_HTML.jpg)\n\
  \n此图展示了数字 1 到 10 排成三行三列，分别位于圆形和方形的盒子内，并沿水平和垂直方向排列。图下方有一段代码片段。\n\n**图 19-4** – 网格的各种\
  \ `.fixed` 间距选项\n\n> **注意**：在图 19-4 中，数组中的所有 `GridItem` 元素都使用了相同的 `.fixed` 尺寸值，但如果需要，你可以为每个\
  \ `GridItem` 赋予不同的尺寸值。\n\n为网格中的行和列间距定义一个 `.fixed` 值，在任何 iOS 设备上都会产生可预测的结果。然而，在较小或较大的\
  \ iOS 设备屏幕上，`.fixed` 值的效果可能并不总是理想。如果你想创建能够根据不同的屏幕尺寸进行调整的网格，可以改用 `.flexible` 或 `.adaptive`。\n\
  \n`.flexible` 选项会尝试尽可能地扩展行/列之间的间距。另一方面，`.adaptive` 选项会尝试尽可能地缩小行/列之间的间距。`.flexible`\
  \ 和 `.adaptive` 选项都允许你定义最小值和最大值。这定义了网格间距可以使用的值的范围。\n\n如果未选择任何选项，则默认值为 `.flexible`，最大值为\
  \ `.infinity`。要了解 `.fixed`、`.flexible` 和 `.adaptive` 选项是如何工作的，请按照以下步骤操作：\n\n![](img/329781_7_En_19_Fig5_HTML.jpg)\n\
  \n此图展示了数字 1 到 10 垂直排列成三行，位于圆形内，其下方有一段代码片段。\n\n**图 19-5** – `LazyHGrid` 扩展了行之间的间距\n\
  \n1.  确保在 Xcode 中加载了之前的项目（“GridSimple”）。\n2.  按如下所示编辑数组，以在 `LazyHGrid` 中定义三行，在 `LazyVGrid`\
  \ 中定义三列：\n    ```\n    let gridItems = [GridItem(.fixed(120)),\n    GridItem(.fixed(120)),\n\
  \    GridItem(.fixed(120))\n    ]\n    ```\n    请注意，这会以固定数量分隔网格中的行和列（参见图 19-4）。\n\
  3.  按如下所示编辑数组，以在 `LazyHGrid` 中定义三行，在 `LazyVGrid` 中定义三列：\n    ```\n    let gridItems\
  \ = [GridItem(.flexible(minimum: 20, maximum: 450)),\n    GridItem(.flexible(minimum:\
  \ 20, maximum: 450)),\n    GridItem(.flexible(minimum: 20, maximum: 450))\n    ]\n\
  \    ```\n4.  像这样注释掉第二个 `Scroll View`：\n    ```\n    //            ScrollView(Axis.Set.vertical,\
