  \n\n\n### 搜索列表\n\n由于列表通常显示大量数据，因此滚动浏览一个长的`List`会变得很麻烦。为了让在大型`List`中搜索特定数据变得更容易，你可以添加一个搜索栏。现在用户可以输入一个或多个字符来过滤长的`List`，这样他们只能看到想要的、相关的数据。\n\
  \n要给`List`添加搜索栏，你需要将一个`List`嵌入到`NavigationView`中，并为`List`添加一个`.searchable`修饰符，操作如下：\n\
  \n```\nNavigationView {\n    List (arrayName, id: \\.self) { x in\n        Text(x)\n\
  \    }.searchable(text: $stateVariable)\n}\n```\n\n在这个示例中，你需要将`\"arrayName\"`替换为包含`List`项的实际数组名称。然后，你需要将`\"\
  stateVariable\"`替换为一个持有`String`数据类型的`State`变量的名称。\n\n要了解如何搜索`List`，请按照以下步骤操作：\n\n\
  ![](img/329781_7_En_13_Fig11_HTML.jpg)\n\n屏幕截图显示了一个单词列表，包括 automobile、bicycle、skateboard、boat、scooter、airplane\
  \ 和 skates。顶部有一个搜索栏。\n\n**图 13-11** – 搜索栏和`List`项的初始外观\n\n1.  创建一个新的 SwiftUI iOS\
  \ 应用项目，并给它取任意你喜欢的名字，例如`\"ListSearch\"`。\n\n2.  在导航器窗格中点击`ContentView`文件。\n\n3. \
  \ 在`import SwiftUI`行下方，添加一个返回字符串数组的函数，如下所示：\n\n    ```\n    func newList() -> [String]\
  \ {\n        return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"Boat\", \"Scooter\"\
  , \"Airplane\", \"Skates\"]\n    }\n    ```\n\n    该函数简单地返回一个`Strings`数组。这个函数稍后将在用户完成对`List`的搜索后，用于刷新整个`List`。\n\
  \n4.  在`struct ContentView`行下方添加两个`State`变量，如下所示：\n\n    ```\n    @State var search\
  \ = \"\"\n    @State var transportation = newList()\n    ```\n\n    `search`状态变量将存储从搜索栏输入的数据。`transportation`状态变量存储一个`Strings`数组，该数组通过调用`newList()`函数获取。\n\
  \n5.  在`VStack`内部添加一个`NavigationView`，如下所示：\n\n    ```\n    var body: some View\
  \ {\n        VStack {\n            NavigationView {\n            }\n        }\n\
  \    }\n    ```\n\n6.  在`NavigationView`内部添加一个`List`，如下所示：\n\n    ```\n    var body:\
  \ some View {\n        VStack {\n            NavigationView {\n                List\
  \ (transportation, id: \\.self) { x in\n                    Text(x)\n          \
  \      }\n            }\n        }\n    }\n    ```\n\n    这将用存储在`transportation`状态变量中的项（一个`Strings`数组）填充`List`。\n\
  \n7.  将`.searchable`修饰符添加到`List`的最后一个花括号后面，如下所示：\n\n    ```\n    var body: some\
  \ View {\n        VStack {\n            NavigationView {\n                List (transportation,\
  \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
  \ $search)\n            }\n        }\n    }\n    ```\n\n    这会在屏幕顶部添加一个搜索栏。用户在搜索栏中输入的所有内容都将存储在`search`状态变量中。目前这个搜索栏还不起作用，因此我们需要为其添加一个`.onChange`修饰符。\n\
  \n8.  将`.onChange`修饰符添加到`List`中，如下所示：\n\n    ```\n    var body: some View {\n  \
  \      VStack {\n            NavigationView {\n                List (transportation,\
  \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
  \ $search)\n                .onChange(of: search) { newValue in\n              \
  \      if !newValue.isEmpty && newValue.count >= 1 {\n                        transportation\
  \ = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
  \                        }\n                    } else {\n                     \
  \   transportation = newList()\n                    }\n                }\n     \
  \       }\n        }\n    }\n    ```\n\n    每次搜索栏内容发生变化时，`.onChange`修饰符都会运行。如果搜索栏完全为空，则`.onChange`修饰符会运行`newList()`函数来重新填充`List`。如果搜索栏不为空且至少包含一个字符，则搜索栏会使用过滤器来匹配用户输入的内容与每个`List`项。`.hasPrefix`修饰符仅仅检查用户输入的内容是否匹配构成每个`List`项的部分或全部字母。\n\
  \n整个`ContentView`文件应该如下所示：\n\n```\nimport SwiftUI\nfunc newList() -> [String] {\n\
  \    return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"Boat\", \"Scooter\"\
  , \"Airplane\", \"Skates\"]\n}\nstruct ContentView: View {\n    @State var search\
  \ = \"\"\n    @State var transportation = newList()\n    var body: some View {\n\
  \        VStack {\n            NavigationView {\n                List (transportation,\
  \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
  \ $search)\n                .onChange(of: search) { newValue in\n              \
  \      if !newValue.isEmpty && newValue.count >= 1 {\n                        transportation\
  \ = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
  \                        }\n                    } else {\n                     \
  \   transportation = newList()\n                    }\n                }\n     \
  \       }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n\
  \    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\n\
  9.  点击画布（Canvas）窗格中的“Live”图标。项目将出现在`List`中，顶部有一个搜索栏，如图 13-11 所示。\n\n![](img/329781_7_En_13_Fig12_HTML.jpg)\n\
  \n屏幕截图显示搜索栏下方有一个包含 2 个单词的列表，其中包括 bicycle 和 boat。搜索栏中键入了字母 B。\n\n**图 13-12** – 搜索栏过滤掉了所有与搜索栏中键入文本不匹配的项目\n\
  \n10. 点击搜索栏并键入`\"b\"`。请注意，`List`现在过滤掉了所有项目，除了那些以`\"b\"`开头的项目，例如`\"Boat\"`和`\"Bicycle\"\
  `，如图 13-12 所示。\n\n11. 点击“取消”或关闭图标（x）。请注意，`List`再次显示了所有项目。\n\n## 总结\n\n列表是在一个位置显示多个相关项的常见方式。为了帮助组织`List`中的项目，你可以将相关的项目分组。\n\
  \n除了在`List`中显示项目，你还可以检测从左到右或从右到左的滑动手势。通过使用`.onDelete`修饰符，你可以允许用户从`List`中删除项目。通过使用`NavigationView`和一个“编辑”按钮，你可以使用`.onMove`修饰符允许用户在`List`内移动项目。\n\
  \n你还可以为`List`自定义滑动手势。当你创建自定义滑动手势时，可以为每个按钮定义图标和颜色。通过对列表使用滑动手势，用户可以用不同的方式修改`List`项。\n\
  \n为了让列表更易于阅读，可以考虑添加分隔线来分隔项目，或者使用交替颜色。搜索栏也可以让用户轻松找到他们想要的项目，特别是当`List`包含大量项目时。通过使用列表，你可以显示组织好的信息供用户查看和选择。\n\
  \n\n\n"
- "# 14. 使用表单和分组框\n\n在填写纸质表单时，你可能会注意到纸质表单会将相关项分组在一起。例如，表单可能会在某个区域要求你填写姓名、地址和电话号码，而在另一个区域则要求你填写性别、种族背景和婚姻状况。纸质表单能让你轻松地在同一区域输入相关数据。\n\
  \nSwiftUI 的 `Form` 的工作原理类似，它将提供用户可选选项和设置的关联视图分组在一起。表单由可选的头部、尾部以及内部由 `Text`、`Slider`\
  \ 或 `Toggle` 等视图定义的内容组成，如图 14-1 所示。\n\n![](img/329781_7_En_14_Fig1_HTML.jpg)\n\n\
  一组两张截图。左侧显示了一段代码片段，用于定义节标题的名称和切换开关的设置。右侧显示了代码在用户界面中渲染后的输出结果。\n\n图 14-1\n\n`Form`\
  \ 的典型组成部分\n\n`Form` 像堆栈一样将相关视图分组在一起。区别在于，`Form` 还会在用户界面上将视图进行视觉上的分组。`Form` 内的所有视图会一起显示，而任何不在\
  \ `Form` 内的视图则会通过灰色区域分隔开，如图 14-2 所示。\n\n![](img/329781_7_En_14_Fig2_HTML.jpg)\n\n\
  一个图示展示了一段代码片段，用于显示在表单内和表单外的文本。右侧显示了代码渲染后的输出，其中上方的文本位于表单内部，下方的文本位于表单外部。\n\n图 14-2\n\
  \n`Form` 在用户界面上将视图分组在一起\n\n与表单类似的是分组框，它提供了一种更简单的方法来在用户界面上将相关视图进行视觉分组。当你需要将视图分组时，可以在\
  \ `Form` 和 `GroupBox` 之间进行选择。\n\n## 创建简单的表单\n\n最简单的 `Form` 只是将一个或多个视图分组在一起。要创建一个\
  \ `Form`，你只需这样做：\n\n```\nForm {\n    //\n}\n```\n\n要了解如何创建简单的 `Form`，请遵循以下步骤：\n\n\
  ![](img/329781_7_En_14_Fig3_HTML.jpg)\n\n一组两张截图，每张各显示一个矩形文本框。上面的文本框显示“这是第一个表单”。下面的文本框显示“这是第二个表单”。\n\
  \n图 14-3\n\n用户界面上显示两个表单\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如“SimpleForm”。\n\
  2. 在导航面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 代码行下方，添加两个 `State`\
  \ 变量，如下所示：\n\n    ```\n    @State var messageOne = \"\"\n    @State var messageTwo\
  \ = \"\"\n    ```\n\n4. 在 `VStack` 内部添加两个 `Form` 和两个 `Text` 视图，如下所示：\n\n    ```\n\
  \    var body: some View {\n        VStack {\n            Form {\n             \
  \   Text(\"This is the first Form\")\n                TextField(\"Type here\", text:\
  \ $messageOne)\n            }\n            Form {\n                Text(\"This is\
  \ the second Form\")\n                TextField(\"Type here\", text: $messageTwo)\n\
  \            }\n            Text(\"Form #1 = \\(messageOne)\")\n            Text(\"\
  Form #2 = \\(messageTwo)\")\n        }\n    }\n    ```\n\n    完整的 `ContentView`\
  \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    \n    struct ContentView: View {\n\
  \        @State var messageOne = \"\"\n        @State var messageTwo = \"\"\n  \
  \      \n        var body: some View {\n            VStack {\n                Form\
  \ {\n                    Text(\"This is the first Form\")\n                    TextField(\"\
  Type here\", text: $messageOne)\n                }\n                Form {\n   \
  \                 Text(\"This is the second Form\")\n                    TextField(\"\
  Type here\", text: $messageTwo)\n                }\n                Text(\"Form\
  \ #1 = \\(messageOne)\")\n                Text(\"Form #2 = \\(messageTwo)\")\n \
  \           }\n        }\n    }\n    \n    struct ContentView_Previews: PreviewProvider\
  \ {\n        static var previews: some View {\n            ContentView()\n     \
  \   }\n    }\n    ```\n\n    这段代码创建了一个用户界面，在屏幕上显示两个表单，以及两个不属于任何表单的 `Text` 视图，如图\
  \ 14-3 所示。\n\n5. 点击画布面板中的 Live 图标。\n6. 点击顶部的 `TextField` 并输入一些文本。请注意，此文本现在会出现在屏幕底部的\
  \ `Text` 视图（“Form #1 =”）中。\n7. 点击中间的 `TextField` 并输入一些文本。请注意，此文本现在会出现在屏幕底部的 `Text`\
  \ 视图（“Form #2 =”）中。\n\n## 将表单划分为多个分区\n\n一个 `Form` 可以包含一个或多个视图。然而，`Form` 中的视图越多，所有视图就会显得越拥挤。为了将相关视图分组，你可以将\
  \ `Form` 划分为多个分区（Section），每个 `Section` 可以包含一个或多个要在屏幕上显示的视图。此外，分区还可以显示可选的头部和/或尾部。\n\
  \n最简单的 `Section` 只是将相关视图分组在一起，如下所示：\n\n```\nSection {\n    // 在此处添加视图\n}\n```\n\n\
  尽管 `Section` 在用户界面上看起来是截然不同的，但你还可以通过使用头部和/或尾部来进一步区分 `Section`。如果你只想定义一个头部，可以使用如下代码：\n\
  \n```\nSection(\"Header text here\") {\n    // 在此处添加视图\n}\n```\n\n这种方法会自动将文本显示为大写，即使你不是以这种方式输入的。另一种定义头部的方法如下所示：\n\
  \n```\nSection(content: {\n    // 在此处添加视图\n}, header: {\n    // 在此处定义头部文本\n})\n\
  ```\n\n你也可以使用此方法仅定义一个尾部，如下所示：\n\n```\nSection(content: {\n    // 在此处添加视图\n}, footer:\
  \ {\n    // 在此处定义尾部文本\n})\n```\n\n> 注意：尾部中的文本会按照你输入的原样显示，这与自动将所有文本显示为大写的头部不同。\n\n\
  如果你想同时定义头部和尾部，可以使用以下代码：\n\n```\nSection {\n    // 在此处添加视图\n} header: {\n    // 在此处定义头部文本\n\
  } footer: {\n    // 在此处定义尾部文本\n}\n```\n\n要了解如何在分区中创建头部和尾部，请遵循以下步骤：\n\n![](img/329781_7_En_14_Fig4_HTML.jpg)\n\
  \n一张截图显示了一个矩形分区，从上到下排列着四个文本框。这些文本框分别表示：无头部分区、简单头部分区、简单尾部分区以及同时包含头部和尾部的分区。\n\n图 14-4\n\
  \n显示 `Section` 的四种不同方式\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如“HeaderFormSections”。\n\
  2. 在导航面板中点击 `ContentView` 文件。\n3. 在 `var body: some View` 内部添加一个 `Form`，如下所示：\n\n\
  \    ```\n    var body: some View {\n        Form {\n        }\n    }\n    ```\n\
  \n4. 在 `Form` 内部添加四个以不同方式定义的 `Section`，如下所示：\n\n    ```\n    var body: some View\
  \ {\n        Form {\n            Section {\n                Text(\"This Section\
  \ has no header\")\n            }\n            Section(\"Just a Header\") {\n  \
  \              Text(\"This Section uses a simple header\")\n            }\n    \
  \        Section {\n                Text(\"This Section uses a simple footer\")\n\
  \            } footer: {\n                Text(\"Just a Footer\")\n            }\n\
  \            Section {\n                Text(\"This Section uses both a header and\
  \ footer\")\n            } header: {\n                Text(\"The header\")\n   \
  \         } footer: {\n                Text(\"The footer\")\n            }\n   \
  \     }\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n    import\
  \ SwiftUI\n    \n    struct ContentView: View {\n        var body: some View {\n\
  \            Form {\n                Section {\n                    Text(\"This\
  \ Section has no header\")\n                }\n                Section(\"Just a\
  \ Header\") {\n                    Text(\"This Section uses a simple header\")\n\
  \                }\n                Section {\n                    Text(\"This Section\
  \ uses a simple footer\")\n                } footer: {\n                    Text(\"\
  Just a Footer\")\n                }\n                Section {\n               \
  \     Text(\"This Section uses both a header and footer\")\n                } header:\
  \ {\n                    Text(\"The header\")\n                } footer: {\n   \
  \                 Text(\"The footer\")\n                }\n            }\n     \
  \   }\n    }\n    \n    struct ContentView_Previews: PreviewProvider {\n       \
  \ static var previews: some View {\n            ContentView()\n        }\n    }\n\
  \    ```\n\n    上述代码创建了一个包含四个不同 `Section` 的 `Form`，如图 14-4 所示。\n\n\n\n### 在表单中禁用视图\n\
  \n通常情况下，纸质表单可能会询问一系列问题。根据你的回答，另一组问题可能就不相关了。例如，如果一张纸质表单询问你是已婚还是单身，你可能会回答“已婚”。在这种情况下，表单的另一部分可能会询问你配偶的姓名和联系方式。\n\
  \n然而，如果你回答“单身”，那么回答任何关于配偶的额外问题就没有意义了。使用 SwiftUI 表单，你可以通过使用 `.disabled` 修饰符，基于一个布尔值有选择地禁用\
  \ `Form` 中的视图，如下所示：\n\n```\n.disabled(flag)\n```\n\n如果布尔变量的值为 `true`，那么 `.disabled`\
  \ 修饰符会阻止用户与所选视图交互。如果布尔变量为 `false`，那么 `.disabled` 修饰符允许用户与所选视图交互。\n\n要了解如何在 `Form`\
  \ 中使用 `.disabled` 修饰符，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“FormDisable”。\n\
  2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 代码行下方添加如下的 `State`\
  \ 变量：\n\n    ```\n    @State var flag = false\n    ```\n\n4.  在 `var body: some\
  \ View` 内部添加一个 `Form`，如下所示：\n\n    ```\n    var body: some View {\n        Form\
  \ {\n        }\n    }\n    ```\n\n5.  在 `Form` 内部添加一个 `Section` 来定义页眉和页脚，如下所示：\n\
  \n    ```\n    var body: some View {\n        Form {\n            Section {\n  \
  \          } header: {\n                Text(\"Header\")\n            } footer:\
  \ {\n                Text(\"Footer\")\n            }\n        }\n    }\n    ```\n\
  \n6.  在 `Section` 内部添加一个 `Toggle` 和一个 `Button`，如下所示：\n\n    ```\n    var body: some\
  \ View {\n        Form {\n            Section {\n                Toggle(isOn: $flag)\
  \ {\n                    Text(\"Are you married?\")\n                }\n       \
  \         Button(flag ? \"Disabled\" : \"Click Me\") {\n                }.disabled(flag)\n\
  \            } header: {\n                Text(\"Header\")\n            } footer:\
  \ {\n                Text(\"Footer\")\n            }\n        }\n    }\n    ```\n\
  \n    请注意，`.disabled` 修饰符会影响 `Button`。如果 `flag` 布尔变量为 `true`，那么 `Button` 将被禁用。如果\
  \ `flag` 布尔变量为 `false`，那么 `Button` 将被启用。整个 `ContentView` 文件应如下所示：\n\n    ```\n \
  \   import SwiftUI\n    struct ContentView: View {\n        @State var flag = false\n\
  \        var body: some View {\n            Form {\n                Section {\n\
  \                    Toggle(isOn: $flag) {\n                        Text(\"Are you\
  \ married?\")\n                    }\n                    Button(flag ? \"Disabled\"\
  \ : \"Click Me\") {\n                    }.disabled(flag)\n                } header:\
  \ {\n                    Text(\"Header\")\n                } footer: {\n       \
  \             Text(\"Footer\")\n                }\n            }\n        }\n  \
  \  }\n    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
  \ some View {\n            ContentView()\n        }\n    }\n    ```\n\n7.  在画布窗格中点击\
  \ Live 图标。注意，`Button` 以蓝色显示标题“Click Me”。\n8.  点击 `Toggle`。这会将 `flag` `State` 变量从\
  \ `false` 变为 `true`（或从 `true` 变为 `false`）。当 `flag` `State` 变量等于 `true` 时，`.disabled`\
  \ 修饰符会使 `Button` 变灰，使用户无法选中它。\n\n## 使用分组框\n\n分组框提供了一种更简单的方法来将相关的视图组织在一起。虽然与 `Form`\
  \ 类似，但`Group Box` 可以显示标签，并在灰色矩形内直观地显示多个视图，而 `Form` 则在白色矩形内显示多个视图，如图 14-5 所示。\n\n\
  ![一个插图，展示了一段代码片段及其在移动屏幕上的渲染效果。它指出了代码中用于显示表单和分组框的功能。每个元素都包含一个可点击的按钮。](img/329781_7_En_14_Fig5_HTML.jpg)\n\
  \n**图 14-5** – Form 和 Group Box 之间的视觉差异\n\n要了解如何使用 `Group Box`，请按照以下步骤操作：\n\n1.\
  \  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“GroupBox”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 代码行下方添加如下的 `State` 变量：\n\n    ```\n    struct\
  \ ContentView: View {\n        @State var flag = true\n        @State var message\
  \ = \"\"\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `GroupBox`，如下所示：\n\n   \
  \ ```\n    var body: some View {\n        GroupBox(label: Text(\"Group Box\")) {\n\
  \        }\n    }\n    ```\n\n5.  在 `GroupBox` 内部添加一个 `Toggle` 和一个 `TextField`，如下所示：\n\
  \n    ```\n    var body: some View {\n        GroupBox(label: Text(\"Group Box\"\
  )) {\n            Toggle(isOn: $flag) {\n                Text(\"Click me\")\n  \
  \          }\n            TextField(\"Type here\", text: $message)\n        }\n\
  \    }\n    ```\n\n    整个 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
  \    struct ContentView: View {\n        @State var flag = true\n        @State\
  \ var message = \"\"\n        var body: some View {\n            GroupBox(label:\
  \ Text(\"Group Box\")) {\n                Toggle(isOn: $flag) {\n              \
  \      Text(\"Click me\")\n                }\n                TextField(\"Type here\"\
  , text: $message)\n            }\n        }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n\n上述代码创建了一个`Group Box`，如图 14-6 所示。\n\n![一个部分截图，展示了标题为\
  \ group box 的界面。它包含一个标记为 click me 的切换按钮以及下方的一个空白文本框。](img/329781_7_En_14_Fig6_HTML.jpg)\n\
  \n**图 14-6** – Group Box 的外观\n\n## 总结\n\n`Form` 让你可以在用户界面上直观地将相关视图组合在一起。为了进一步区分\
  \ `Form` 上的视图，你可以将 `Form` 划分为多个部分，每个 `Section` 允许你定义一个可选的页眉和/或可选的页脚。一个 `Section`\
  \ 可以有页眉、页脚、既有页眉又有页脚，或者什么都没有。\n\n根据用户对用户界面的响应方式，你可能希望禁用一个或多个视图，以防止用户与之交互。禁用一个或多个视图可以防止用户输入不必要的数据。\n\
  \n表单和分组框都只是两种不同的方式，用于将相关的视图分组和组织在一起，使你的应用程序用户界面更易于理解。\n\n"
- "# 15. 使用 Disclosure Groups、Scroll Views 和 Outline Groups\n\n许多应用程序包含大量信息，例如姓名和地址。但是，你可能不希望同时查看所有存储的信息，以免屏幕杂乱。当你希望让用户有选择地隐藏或显示信息时，就可以使用\
  \ `Disclosure Group` 或 `Outline Group`。\n\n一个 `Disclosure Group` 可以呈现两种状态。首先，它可以显示为代表链接的单行文本。其次，当用户点击此链接时，它会展开以显示一个或多个额外的视图，如图\
  \ 15-1 所示。\n\n![一个屏幕截图，展示了折叠状态和可展开状态下标记为“show software license”的选项。可展开状态显示了软件许可证的详细信息以及一个同意条款的按钮。](img/329781_7_En_15_Fig1_HTML.jpg)\n\
  \n**图 15-1** – Disclosure Group 的两种状态\n\n`Disclosure Group` 可以可选地隐藏或显示一组相关视图，而 `Outline\
  \ Group` 可以可选地在 `List`（参见第 13 章）中隐藏或显示文本组，如图 15-2 所示。\n\n![一个哺乳动物下拉菜单的屏幕截图，列出了 dog、cat、elephant\
  \ 和 whale。它指示了在 dog 类别下的 Poodle、Collie 和 Saint Bernard 品种。](img/329781_7_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2** – Outline Group 的外观\n\n\n\n## 使用公开组\n\n`DisclosureGroup` 旨在隐藏一个或多个视图（如\
  \ `Text`、`Slider`、`Toggle` 等），直到用户点击 `DisclosureGroup` 名称将其展开。当展开时，`DisclosureGroup`\
  \ 会在用户界面上显示一个或多个视图。\n\n**注意：** 与堆栈类似，`DisclosureGroup` 最多可容纳十（10）个视图。但其中部分视图可以是能够容纳多个视图的堆栈。此外，你还可以在其他公开组中嵌套公开组。\n\
  \n要创建一个 `DisclosureGroup`，首先需要创建一段描述性的文本，它在用户界面上代表一个链接。这段文本最右侧会显示 `>` 符号，向用户表明此链接包含隐藏项目。其次，你需要创建一个视图列表（最多十个），这些视图将在用户选择\
  \ `DisclosureGroup` 链接时显示。\n\n要了解如何创建 `DisclosureGroup`，请遵循以下步骤：\n\n![](img/329781_7_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3** – 展开后的 `DisclosureGroup`\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DisclosureGroup”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 这行下方添加三个 `State`\
  \ 变量，具体如下：\n\n    ```\n    @State var sliderValue = 0.0\n    @State var message\
  \ = \"\"\n    @State var flag = true\n    ```\n\n4. 在 `var body: some View` 内添加一个\
  \ `DisclosureGroup`，具体如下：\n\n    ```\n    var body: some View {\n    DisclosureGroup(\"\
  展开我\") {\n    }.padding()\n    }\n    ```\n\n5. 在 `DisclosureGroup` 内部添加以下内容：\n\n\
  \    ```\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n    Text(\"\
  你输入了 = \\(message)\")\n    TextField(\"在此输入\", text: $message)\n    .padding()\n\
  \    Text(flag ? \"开关 = true\" : \"开关 = false\")\n    Toggle(isOn: $flag) {\n  \
  \  Text(\"开关\")\n    }.padding()\n    Text(\"滑动条值 = \\(sliderValue)\")\n    Slider(value:\
  \ $sliderValue, in: 0...15)\n    .padding()\n    }.padding()\n    }\n    ```\n\n\
  \    完整的 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView:\
  \ View {\n    @State var sliderValue = 0.0\n    @State var message = \"\"\n    @State\
  \ var flag = true\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n \
  \   Text(\"你输入了 = \\(message)\")\n    TextField(\"在此输入\", text: $message)\n    .padding()\n\
  \    Text(flag ? \"开关 = true\" : \"开关 = false\")\n    Toggle(isOn: $flag) {\n  \
  \  Text(\"开关\")\n    }.padding()\n    Text(\"滑动条值 = \\(sliderValue)\")\n    Slider(value:\
  \ $sliderValue, in: 0...15)\n    .padding()\n    }.padding()\n    }\n    }\n   \
  \ struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n    ContentView()\n    }\n    }\n    ```\n\n6. 在画布窗格中点击 Live 图标。\n7. 点击“展开我”\
  \ `DisclosureGroup` 链接，以显示隐藏在内的所有视图，如图 15-3 所示。\n8. 点击文本字段并输入一些文字。请注意，无论你输入什么，都会显示在显示“你输入了\
  \ =”的 `Text` 视图中。\n9. 点击 `Toggle`。请注意，每次点击 `Toggle`，`Toggle` 上方的 `Text` 视图都会显示“开关\
  \ = true”或“开关 = false”。\n10. 左右拖动 `Slider`。请注意，当你拖动 `Slider` 时，其数值会显示在 `Slider`\
  \ 上方显示“滑动条值 =”的 `Text` 视图中。\n11. 再次点击 `DisclosureGroup` 链接以隐藏所有视图。每次点击 `DisclosureGroup`\
  \ 链接时，它都会在显示 `DisclosureGroup` 内的所有视图和隐藏它们之间切换。\n\n## 使用滚动视图\n\n当你在 `VStack` 内排列多个视图时，这些视图会固定在用户界面上。如果你显示的视图超出用户界面所能显示的范围，部分视图会被截断或隐藏于视线之外。为了解决这个问题，SwiftUI\
  \ 提供了一个名为 `ScrollView` 的特殊容器。\n\n与堆栈类似，`ScrollView` 可以容纳多个视图。但与堆栈不同的是，`ScrollView`\
  \ 允许用户垂直或水平滚动，以查看 `ScrollView` 的全部内容。滚动视图可以用于任何可能使用堆栈的地方，包括在 `DisclosureGroup` 内部。\n\
  \n创建 `ScrollView` 最简单的方法是像这样定义一个 `ScrollView`：\n\n```\nScrollView {\n//  多个视图在此\n\
  }\n```\n\n这样你可以垂直滚动，右侧会有一个滚动指示器。滚动指示器让你了解当前滚动位置距离项目列表开头或结尾有多近（或多远），如图 15-4 所示。\n\
  \n![](img/329781_7_En_15_Fig4_HTML.jpg)\n\n**图 15-4** – 垂直滚动的 `ScrollView` 右侧显示滚动指示器\n\
  \n创建 `ScrollView` 的另一种方式是定义滚动方向（`Axis.Set.horizontal` 或 `Axis.Set.vertical`）以及是否显示滚动指示器（`showsIndicators:`\
  \ 参数），具体如下：\n\n```\nScrollView(Axis.Set.horizontal, showsIndicators: false, content:\
  \ {\n}\n```\n\n要了解 `ScrollView` 的工作原理，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“ScrollView”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 这行下方添加一个 `ScrollView`，具体如下：\n\
  \n    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
  \ showsIndicators: true, content: {\n    })\n    }\n    .padding()\n    }\n    ```\n\
  \n    为了缩短 `ScrollView` 的代码，你可以这样写：\n\n    ```\n    var body: some View {\n    VStack\
  \ {\n    ScrollView {\n    }\n    }\n    ```\n\n4. 在 `ScrollView` 内部添加一个 `ForEach`\
  \ 循环，具体如下：\n\n    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
  \ showsIndicators: true, content: {\n    ForEach(0..<50) {\n    Text(\"项目 #\\($0)\
  \     \")\n    }\n    })\n    }\n    .padding()\n    }\n    ```\n\n    完整的 `ContentView`\
  \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n    var\
  \ body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical, showsIndicators:\
  \ true, content: {\n    ForEach(0..<50) {\n    Text(\"项目 #\\($0)     \")\n    }\n\
  \    })\n    }\n    .padding()\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n   \
  \ ```\n\n5. 在画布窗格中点击 Live 图标。\n6. 在用户界面上显示的项目列表中上下滚动。请注意，当你上下滚动时，可以在右侧看到滚动指示器（参见图\
  \ 15-4）。\n\n\n\n### 跳转到指定位置\n\n`ScrollView` 可以显示大量项目。然而，显示的项目越多，就越难找到某个特定的项目。与其强迫用户无休止地滚动，SwiftUI\
  \ 提供了在 `ScrollView` 中跳转到指定位置的功能。\n\n因此，如果一个 `ScrollView` 显示了 100 个项目，你可以直接跳转到 `ScrollView`\
  \ 中的某个特定位置，比如第 54 个项目或第 12 个项目。这使得用户可以轻松地在 `ScrollView` 的大量项目列表中快速跳转到特定的数字位置。\n\n\
  当跳转到 `ScrollView` 中的特定位置时，你可以选择该项目的显示或锚定位置：`.top`、`.center` 或 `.bottom`。`.top` 锚点将所选项目显示在屏幕顶部，`.center`\
  \ 锚点将所选项目显示在屏幕中央，`.bottom` 锚点将所选项目显示在屏幕底部。\n\n要了解如何在 `ScrollView` 中跳转到特定位置，请按照以下步骤操作：\n\
  \n![](img/329781_7_En_15_Fig5_HTML.jpg)\n\n一张智能手机的示意图，屏幕上显示了一个项目列表。方向设置为居中。顶部有一个设置，用于调整滚动到滑块的值。\n\
  \n图 15-5 — 完整的用户界面\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 “ScrollViewJumpTo”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView` 行下方添加两个状态变量，如下所示：\n\n\
  ```\n    @State var sliderValue = 0.0\n    @State var anchorPosition = UnitPoint.center\n\
  ```\n\n4. 在 `var body: some View` 行下方添加一个 `ScrollViewReader`，如下所示：\n\n```\n    var\
  \ body: some View {\n    ScrollViewReader { scrollView in\n    }\n    }\n```\n\n\
  5. 在 `ScrollViewReader` 内部添加一个 `HStack`，并在 `HStack` 内放置一个 `Text` 视图和一个 `Slider`，如下所示：\n\
  \n```\n    var body: some View {\n    ScrollViewReader { scrollView in\n    HStack\
  \ {\n    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
  \    }\n    }\n    }\n```\n\n`Text` 视图将 `Slider` 的值显示为整数，因为 `Slider` 的值是 `Double`\
  \ 数据类型。`Slider` 的取值范围是 0 到 99。\n\n6. 在 `HStack` 下方添加一个 `Button`。这个 `Button` 将允许我们滚动到\
  \ `ScrollView` 列表中由 `Slider` 定义的特定位置：\n\n```\n    var body: some View {\n    ScrollViewReader\
  \ { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\")\n    Slider(value:\
  \ $sliderValue, in: 0...99)\n    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n\
  \    scrollView.scrollTo(Int(sliderValue), anchor: anchorPosition)\n    }\n    }\n\
  \    }\n    }\n```\n\n`Button` 获取 `Slider` 中存储的值，并跳转到 `ScrollView` 中的该位置。`withAnimation`\
  \ 使 `ScrollView` 逐渐移动到由锚点定义的位置。\n\n7. 在 `Button` 下方添加一个 `Picker`，如下所示：\n\n```\n\
  \    var body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n\
  \    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
  \    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
  \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"位置\", selection: $anchorPosition,\
  \ content: {\n    Text(\"顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n\
  \    Text(\"底部\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    }\n\
  \    }\n```\n\n`Picker` 显示一个包含三个选项的分段控件：顶部、中间和底部。这样用户就可以决定使用哪种类型的锚点来滚动到 `ScrollView`\
  \ 中的特定项目。\n\n8. 在 `Picker` 视图下方添加 `ScrollView`，如下所示：\n\n```\n    var body: some\
  \ View {\n    ScrollViewReader { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\"\
  )\n    Slider(value: $sliderValue, in: 0...99)\n    }\n    Button(\"滚动到滑块值\") {\n\
  \    withAnimation{\n    scrollView.scrollTo(Int(sliderValue), anchor: anchorPosition)\n\
  \    }\n    }\n    Picker(\"位置\", selection: $anchorPosition, content: {\n    Text(\"\
  顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n    Text(\"底部\"\
  ).tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    ScrollView {\n    }\n\
  \    }\n    }\n```\n\n9. 在 `ScrollView` 内部添加一个 `ForEach` 循环来创建项目列表：\n\n```\n   \
  \ var body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n  \
  \  Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
  \    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
  \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"位置\", selection: $anchorPosition,\
  \ content: {\n    Text(\"顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n\
  \    Text(\"底部\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    ScrollView\
  \ {\n    ForEach(0..<100) { index in\n    Text(\"项目 # \\(index)\")\n    .id(index)\n\
  \    }\n    }\n    }\n    }\n```\n\n请注意，`ScrollView` 内部的 `Text` 视图包含一个 `.id` 修饰符，它跟踪从\
  \ 0 到 99（不包括 100）的索引值。`.scrollTo` 命令将使用此 `.id` 值来跳转到 `ScrollView` 中的特定项目。用户界面应如图\
  \ 15-5 所示。\n\n1. 点击画布窗格中的“实时”图标。\n2. 将 `Slider` 拖动到一个较大的值，例如 67。\n3. 点击“滚动到滑块值”`Button`。注意，您选择的位置会出现在屏幕中央。\n\
  4. 点击分段控件并选择“顶部”或“底部”，然后点击“滚动到滑块值”`Button`。您选择的值将出现在屏幕顶部或底部附近。\n\n### 定义水平滚动视图\n\
  \n默认情况下，`ScrollView` 是垂直滚动的。但是，你也可以将滚动方向更改为水平，这对于滚动浏览可能因太宽而无法在屏幕上完全显示的信息（例如大量文本）非常方便。\n\
  \n要了解如何使 `ScrollView` 水平滚动，请按照以下步骤操作：\n\n![](img/329781_7_En_15_Fig6_HTML.jpg)\n\
  \n左侧是一个代码插图，用于展示以下文本。这是一段很长的文本，无法适应 iPhone 的狭窄宽度。右侧是一张智能手机的示意图，屏幕上部分显示了该文本。\n\n\
  图 15-6 — 水平滚动让你能够查看被 iOS 屏幕边界截断的文本\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 “ScrollViewHorizontal”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 行下方添加一个 `ScrollViewReader`，如下所示：\n\
  \n```\n    var body: some View {\n    ScrollViewReader { scrollView in\n    }\n\
  \    }\n```\n\n4. 在 `ScrollViewReader` 内部添加 `ScrollView`，如下所示：\n\n```\n    var body:\
  \ some View {\n    ScrollViewReader { scrollView in\n    ScrollView (.horizontal,\
  \ showsIndicators: true){\n    Text(\"这是一段很长的文本，无法适应 iPhone 的狭窄宽度。这样你就能看到如何水平滚动了。\"\
  )\n    }\n    }\n    }\n```\n\n5. 点击画布窗格中的“实时”图标。文本在模拟 iOS 设备的右侧被截断，如图 15-6 所示。\n\
  6. 将鼠标指针移到文本上，并左右拖动，以查看文本如何水平滚动。\n\n\n\n## 使用大纲组\n\n大纲组就像一个超级公开组。主要区别在于，公开组最多只能显示十个视图，而大纲组可以显示在单独类中定义的无限数量的项目。此外，大纲组会自动缩进类别，便于查看项目之间的层级关系（见图\
  \ 15-2）。\n\n大纲组用于显示定义关系的对象数组。要使用大纲组，你需要执行以下操作：\n\n-   创建一个类，用于存放你想要显示的数据。\n-   创建一个数组，用于存放由该类定义的多个对象。\n\
  -   创建一个大纲组，用于显示存储在对象中的数据。\n\n要创建存放待显示数据的类，你需要使其遵循 `Identifiable` 协议。这样，基于该类的每个对象都会拥有一个唯一的标识号，如下所示：\n\
  \n```\nclass Species: Identifiable {\n    let id = UUID()\n}\n```\n\n接下来，你需要定义要在大纲组中显示的数据，例如一个字符串：\n\
  \n```\nclass Species: Identifiable {\n    let id = UUID()\n    var name: String\n\
  }\n```\n\n下一步是创建一个可选的数组，用于存放子类别。这些子类别项目也必须是同一个类，如下所示：\n\n```\nclass Species: Identifiable\
  \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
  }\n```\n\n最后，该类需要一个初始化器，因为该类的属性都没有初始值。这意味着每次创建对象时，都必须为其属性赋值。在这种情况下，唯一需要赋值的属性是 `name`\
  \ 属性，它持有一个绝对必要的 `String` 数据类型。另一个名为 `classification` 的属性可以持有一个对象数组，但也可以是 `nil` 值：\n\
  \n```\nclass Species: Identifiable {\n    let id = UUID()\n    var name: String\n\
  \    var classification: [Species]?\n\n    init(name: String, classification: [Species]?\
  \ = nil) {\n        self.name = name\n        self.classification = classification\n\
  \    }\n}\n```\n\n定义类之后，下一步是定义一个数组，用于存放基于该类的对象，如下所示：\n\n```\nvar Animals: [Species]\
  \ = [\n    Species(name: \"Mammal\", classification: [\n        Species(name: \"\
  Dog\", classification: [\n            Species(name: \"Poodle\"),\n            Species(name:\
  \ \"Collie\"),\n        ]),\n    ]),\n]\n```\n\n注意，这个数组被定义为存放基于已定义类（本例中为 `Animals`）的对象。数组中的每个对象都需要一个名称（例如\
  \ `Mammal` 或 `Collie`）。有些对象不包含子类别列表，但对于那些包含子类别的对象，你需要指定一个基于同一类（`Species`）的对象数组。在上面的例子中，`Dog`\
  \ 对象定义了一个包含 `Poodle` 和 `Collie` 的对象数组。\n\n第三步是定义一个大纲组：\n\n```\nOutlineGroup(Animals,\
  \ id: \\.id, children: \\.classification) { creature in\n    Text(creature.name)\n\
  }\n```\n\n这定义了要使用的数组（`Animals`），并使用唯一 ID（由类声明中的 `UUID()` 定义）来显示数组中的每个项目。如果对象中存储了任何子项或子类别，则由\
  \ `children:` 参数指定。最后，`OutlineGroup` 内的 `Text` 视图会显示每个对象的 `name` 属性。\n\n要了解如何使用大纲组，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `OutlineGroup`。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `import SwiftUI` 行下方添加以下类声明，如下所示：\n\n```\n    class Species: Identifiable\
  \ {\n        let id = UUID()\n        var name: String\n        var classification:\
  \ [Species]?\n\n        init(name: String, classification: [Species]? = nil) {\n\
  \            self.name = name\n            self.classification = classification\n\
  \        }\n    }\n```\n\n4.  在 `struct ContentView: View` 行下方添加以下数组，如下所示：\n\n```\n\
  \    struct ContentView: View {\n        var Animals: [Species] = [\n          \
  \  Species(name: \"Mammal\", classification: [\n                Species(name: \"\
  Dog\", classification: [\n                    Species(name: \"Poodle\"),\n     \
  \               Species(name: \"Collie\"),\n                    Species(name: \"\
  St. Bernard\"),\n                ]),\n                Species(name: \"Cat\"),\n\
  \                Species(name: \"Elephant\"),\n                Species(name: \"\
  Whale\"),\n            ]),\n            Species(name: \"Bird\", classification:\
  \ [\n                Species(name: \"Canary\"),\n                Species(name: \"\
  Parakeet\"),\n                Species(name: \"Eagle\"),\n            ]),\n     \
  \   ]\n```\n\n5.  在 `var body: some View` 行下方添加 `OutlineGroup`，如下所示：\n\n```\n  \
  \  var body: some View {\n        List {\n            OutlineGroup(Animals, id:\
  \ \\.id, children: \\.classification) { creature in\n                Text(creature.name)\n\
  \            }\n        }\n    }\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\n    import\
  \ SwiftUI\n\n    class Species: Identifiable {\n        let id = UUID()\n      \
  \  var name: String\n        var classification: [Species]?\n\n        init(name:\
  \ String, classification: [Species]? = nil) {\n            self.name = name\n  \
  \          self.classification = classification\n        }\n    }\n\n    struct\
  \ ContentView: View {\n        var Animals: [Species] = [\n            Species(name:\
  \ \"Mammal\", classification: [\n                Species(name: \"Dog\", classification:\
  \ [\n                    Species(name: \"Poodle\"),\n                    Species(name:\
  \ \"Collie\"),\n                    Species(name: \"St. Bernard\"),\n          \
  \      ]),\n                Species(name: \"Cat\"),\n                Species(name:\
  \ \"Elephant\"),\n                Species(name: \"Whale\"),\n            ]),\n \
  \           Species(name: \"Bird\", classification: [\n                Species(name:\
  \ \"Canary\"),\n                Species(name: \"Parakeet\"),\n                Species(name:\
  \ \"Eagle\"),\n            ]),\n        ]\n\n        var body: some View {\n   \
  \         List {\n                OutlineGroup(Animals, id: \\.id, children: \\\
  .classification) { creature in\n                    Text(creature.name)\n      \
  \          }\n            }\n        }\n    }\n\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n```\n\n6.  点击 Canvas 窗格中的 Live 图标。\n7.  点击大纲组中任何在右侧显示 `>` 字符的项目。这表示该项目包含可展开显示的附加列表（见图\
  \ 15-2）。\n\n大纲组对于存储和显示用户可以隐藏或展开的项目列表非常方便。由于大纲组使用数组，因此你可以在大纲组中显示的项目数量没有限制（不同于公开组的十视图限制）。\n\
  \n## 总结\n\n公开组可以方便地将一个或多个视图临时隐藏起来。通过点击公开组标题，你可以在查看附加视图和隐藏它们之间切换。可以将公开组视为可折叠的视图列表。\n\
  \n虽然公开组使得隐藏或显示数据变得容易，但滚动视图使得上下滚动（或左右滚动）以查看更多数据变得容易。你甚至可以在公开组内部使用滚动视图。\n\n如果你需要以层级结构显示数据，请考虑使用大纲组。使用大纲组需要定义一个类，其中包含你想要存储的属性，以及一个\
  \ `UUID()` 来为每条数据自动创建唯一的 ID 号。然后，你需要根据定义的类创建一个对象数组。最后，你可以使用 `OutlineGroup` 在屏幕上显示数据。\n\
  \n公开组、滚动视图和大纲组只是将相关数据分组到一起的不同方式。公开组像可折叠的列表。滚动视图让用户看到通常可能被截断的数据。大纲组像多个公开组，可以有选择地隐藏或显示数据。这三种视图的全部目的就是提供向用户展示信息的不同方式。\n\
  \n\n\n"
- "# 16. 创建图表\n\n应用程序需要向用户展示信息。无论这些信息是文本还是数字，大量的数据都可能难以理解。这就是为什么许多应用会将信息转化为图表，以便轻松追踪趋势、进行比较或识别比例。图表能将数字数据转换成一目了然的彩色图像。\n\
  \n创建任何图表的关键在于识别你拥有的数据，并确定你想要讲述关于这些数据的什么故事。例如，一份销售清单可以用来展示销售额是如何增长（或萎缩）的，哪些时间段的利润最高（以及哪些最低），不同销售人员的业绩对比，或者哪些产品可能比其他产品卖得更好。\n\
  \n用数据创建图表没有绝对正确或错误的方法。由于图表的目的是沟通，你唯一可能犯的错误是创建了一个无法讲述你想表达的关于数据故事的图表。`SwiftUI` 可以创建如图\
  \ 16-1 所示的几种图表类型：\n\n![一张插图展示了一组图表，包括条形图、折线图、面积图、散点图和矩形图。](img/329781_7_En_16_Fig1_HTML.jpg)\n\
  \n**图 16-1** 可用的不同图表类型\n\n- 条形图\n- 散点图\n- 折线图\n- 面积图\n- 矩形图\n\n图表使用数字数据来定义坐标轴上的标记。标记以视觉方式衡量数据，而坐标轴则像一把尺子，帮助用户确定每个标记所代表的数量。在条形图中，单个条形是一个标记；在折线图中，单条线是一个标记，如图\
  \ 16-2 所示。\n\n![一张插图展示了一个条形图，并标明了标记以及 X 轴和 Y 轴。](img/329781_7_En_16_Fig2_HTML.jpg)\n\
  \n**图 16-2** 识别图表中的标记和坐标轴\n\n要创建图表，你必须像这样导入 `Charts` 框架：\n\n```\nimport Charts\n\
  ```\n\n然后，你可以在 body 中像这样定义一个图表：\n\n```\nChart {\n}\n```\n\n## 创建条形图\n\n要创建条形图，你需要使用\
  \ `BarMark` 来定义 x 和 y 值，如下所示：\n\n```\nBarMark(x: .value(\"类别\", \"图表标签\"),\ny: .value(\"\
  数量\", 0))\n```\n\nx 值定义了数据的类别（帮助你理解每个标记代表什么）以及在图表上显示的标签。y 值定义了数据的数量，后跟一个数值，如图 16-3\
  \ 所示。\n\n![一张条形图展示了两个条形。较长的条形代表狗，较短的条形代表猫。底部的一组文字表明狗的 Y 轴值为 25，猫的 Y 轴值为 18。](img/329781_7_En_16_Fig3_HTML.jpg)\n\
  \n**图 16-3** `BarMark` 如何定义条形图\n\n注意，在图 16-3 中，“狗”和“猫”的文字显示在每个标记下方，而数值 25 和 18 定义了每个标记的高度。“动物”这个文本有助于识别“狗”和“猫”所属的类别，“领养数量”这个文本则有助于理解每个数值的含义。\n\
  \n请注意，“动物”和“领养数量”都不会显示在图表上，因为这些文本旨在帮助你理解每个标记所展示的数据。另外需要注意的是，你可以用一个或多个变量替换固定的数值。这样，当数值发生变化时，图表的外观也会随之改变。\n\
  \n要了解如何创建一个简单的条形图，请遵循以下步骤：\n\n1.  创建一个新的 `SwiftUI` iOS 应用项目，并给它起一个你喜欢的名字，例如“BarChartSimple”。\n\
  2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `SwiftUI` 框架下方添加 `Charts` 框架，如下所示：\n\n```\n\
  import Charts\n```\n\n1.  在 `struct ContentView: View` 这行代码下方添加一个 `@State` 变量，如下所示：\n\
  \n```\n@State var sliderValue = 50.0\n```\n\n1.  在 `VStack` 内部添加一个 `Chart`，如下所示：\n\
  \n```\nvar body: some View {\nVStack {\nChart {\n}\n}\n}\n```\n\n1.  在 `Chart` 内部添加两个\
  \ `BarMark` 来定义两个条形，如下所示：\n\n```\nvar body: some View {\nVStack {\nChart {\nBarMark(x:\
  \ .value(\"姓名\", \"Oscar\"),\ny: .value(\"销售额\", 50))\nBarMark(x: .value(\"姓名\"\
  , \"Mayer\"),\ny: .value(\"销售额\", Int(sliderValue)))\n}\n}\n}\n```\n\n这段代码定义了一个包含两个垂直条形的条形图。\n\
  \n1.  在 `Chart` 下方添加如下的 `HStack`：\n\n```\nvar body: some View {\nVStack {\nChart\
  \ {\nBarMark(x: .value(\"姓名\", \"Oscar\"),\ny: .value(\"销售额\", 50))\nBarMark(x:\
  \ .value(\"姓名\", \"Mayer\"),\ny: .value(\"销售额\", Int(sliderValue)))\n}\nHStack {\n\
  Text(\"\\(Int(sliderValue))\")\nSlider(value: $sliderValue, in: 1...100)\n}.padding()\n\
  }\n}\n```\n\n`HStack` 显示了一个 `Text` 视图和一个 `Slider`，其中 `Text` 视图显示了 `Slider` 的当前值，其范围可以从\
  \ 1 到 100。整个 `ContentView` 文件应该如下所示：\n\n```\nimport SwiftUI\nimport Charts\nstruct\
  \ ContentView: View {\n@State var sliderValue = 50.0\nvar body: some View {\nVStack\
  \ {\nChart {\nBarMark(x: .value(\"姓名\", \"Oscar\"),\ny: .value(\"销售额\", 50))\nBarMark(x:\
  \ .value(\"姓名\", \"Mayer\"),\ny: .value(\"销售额\", Int(sliderValue)))\n}\nHStack {\n\
  Text(\"\\(Int(sliderValue))\")\nSlider(value: $sliderValue, in: 1...100)\n}.padding()\n\
  }\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n1.  在画布窗格中点击“实时”图标。\n2.  拖动 `Slider`，观察 `Slider`\
  \ 的值如何调整第二个条形的高度。当你拖动 `Slider` 改变其值时，注意 `Charts` 框架如何自动将 Y 轴的值调整到最大值 100。\n\n\n\n\
  ### 使用循环和数组定义图表\n\n对于小型图表，定义一两个标记（例如 `BarMarks`）很容易。然而，如果你需要为大量数据绘制图表，逐一定义每个标记就会变得很繁琐。更糟糕的是，对于大小会变化的数据，你可能无法事先知道图表需要的确切标记数量。\n\
  \n因此，更好的做法不是单独定义标记，而是依靠数据结构和循环来定义图表中每个标记的数量和高度。首先，我们需要定义一个结构来存放要绘制图表的数据：\n\n```swift\n\
  struct SalesPeople: Identifiable {\n    var name: String\n    var sales: Int\n \
  \   var id: String { name }\n}\n```\n\n该结构让你能定义两种数据类型来定义你的图表。在这个示例中，它们是 `String`（姓名）和\
  \ `Int`（销售额数量）。该结构需要一个 `ID` 来标识它自己，因此整个结构必须定义为 `Identifiable`，并且 `id` 被定义为基于 `name`\
  \ 属性的 `String`。\n\n其次，我们需要像这样创建一个刚刚定义的结构体的数组：\n\n```swift\nvar mySalesArray: [SalesPeople]\
  \ = [\n    .init(name: \"Oscar\", sales: 50),\n    .init(name: \"Mayer\", sales:\
  \ 43),\n    .init(name: \"George\", sales: 62),\n    .init(name: \"Hormel\", sales:\
  \ 26)\n]\n```\n\n一旦我们拥有一个结构体数组，其中数组定义了类别（`name`）和值（`sales`），我们就可以在图表中使用它。这意味着要定义包含图表数据的数组名，以及一个临时存储每个数组元素的任意变量名，就像这样：\n\
  \n```swift\nChart(mySalesArray) { x in\n}\n```\n\n最后，我们需要定义一个 `BarMark`，用于访问每个数组元素的\
  \ `name` 和 `sales` 属性，就像这样：\n\n```swift\nChart(mySalesArray) { x in\n    BarMark(x:\
  \ .value(\"Name\", x.name),\n            y: .value(\"Sales\", x.sales))\n}\n```\n\
  \n要了解如何使用结构体数组来定义条形图，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并给它任意你喜欢的名字，比如“BarChartArray”。\n\
  2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `SwiftUI` 框架下方添加 `Charts` 框架，像这样：\n\n   \
  \ ```swift\n    import Charts\n    ```\n\n4.  在 `import Charts` 行下方添加一个结构体，像这样：\n\
  \n    ```swift\n    struct SalesPeople: Identifiable {\n        var name: String\n\
  \        var sales: Int\n        var id: String { name }\n    }\n    ```\n\n5. \
  \ 在结构体下方添加一个数组，像这样：\n\n    ```swift\n    var mySalesArray: [SalesPeople] = [\n \
  \       .init(name: \"Oscar\", sales: 50),\n        .init(name: \"Mayer\", sales:\
  \ 43),\n        .init(name: \"George\", sales: 62),\n        .init(name: \"Hormel\"\
  , sales: 26)\n    ]\n    ```\n\n6.  在 `VStack` 内部添加一个 `Chart`，像这样：\n\n    ```swift\n\
  \    VStack {\n        Chart(mySalesArray) { x in\n        }\n    }\n    ```\n\n\
  7.  在 `Chart` 内部添加一个 `BarMark`，像这样：\n\n    ```swift\n    VStack {\n        Chart(mySalesArray)\
  \ { x in\n            BarMark(x: .value(\"Name\", x.name),\n                   \
  \ y: .value(\"Sales\", x.sales))\n        }\n    }\n    ```\n\n    整个 `ContentView`\
  \ 文件应该看起来像这样：\n\n    ```swift\n    import SwiftUI\n    import Charts\n\n    struct\
  \ SalesPeople: Identifiable {\n        var name: String\n        var sales: Int\n\
  \        var id: String { name }\n    }\n\n    var mySalesArray: [SalesPeople] =\
  \ [\n        .init(name: \"Oscar\", sales: 50),\n        .init(name: \"Mayer\",\
  \ sales: 43),\n        .init(name: \"George\", sales: 62),\n        .init(name:\
  \ \"Hormel\", sales: 26)\n    ]\n\n    struct ContentView: View {\n        var body:\
  \ some View {\n            VStack {\n                Chart(mySalesArray) { x in\n\
  \                    BarMark(x: .value(\"Name\", x.name),\n                    \
  \        y: .value(\"Sales\", x.sales))\n                }\n            }\n    \
  \    }\n    }\n\n    struct ContentView_Previews: PreviewProvider {\n        static\
  \ var previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
  \n8.  点击画布窗格中的 Live 图标。 注意，图表创建了四个不同的标记（条形），它们显示了一个底部标签（`name`）。 每个标记（条形）的高度表示其数值的大小。\n\
  \n### 为条形图定义颜色\n\n通常，条形图会以默认的蓝色显示每个标记（条形）。 但是，你可以通过使用 `.foregroundStyle` 修改器来选择不同的颜色，就像这样：\n\
  \n```swift\nBarMark(x: .value(\"Name\", x.name),\n        y: .value(\"Sales\", x.sales))\n\
  \    .foregroundStyle(.orange)\n```\n\n`.foregroundStyle` 修改器定义单一颜色。 要以不同颜色显示标记（条形），我们需要定义第三个类别。\
  \ 这样每个类别就会以它自己的颜色出现。 在前面的例子中，我们仅基于 `name` 和 `sales` 创建了标记（条形），像这样：\n\n```swift\n\
  .init(name: \"Hormel\", sales: 26)\n```\n\n`name` 标识每个标记（条形），而 `sales` 定义了标记（条形）的外观。\
  \ 要创建不同的颜色，我们需要添加第三个类别，比如：\n\n```swift\n.init(name: \"Hormel\", department: \"West\"\
  , sales: 26)\n```\n\n这个新类别（`department`）将定义颜色。 每个部门都会获得一种独特的颜色，如图 16-4 所示。\n\n![插图展示了一段代码片段和一张智能手机的图形。代码标明了姓名、部门和销售额的值。智能手机屏幕展示了代码在条形图形式下的渲染输出。](img/329781_7_En_16_Fig4_HTML.jpg)\n\
  \n**图 16-4** 为每个标记（条形）显示不同的颜色\n\n要了解如何为条形图创建多种颜色，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI\
  \ iOS App 项目，并给它任意你喜欢的名字，比如“BarChartMultipleColors”。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `SwiftUI` 框架下方添加 `Charts` 框架，像这样：\n\n    ```swift\n    import Charts\n\
  \    ```\n\n4.  在 `import Charts` 行下方添加一个结构体，像这样：\n\n    ```swift\n    struct SalesPeople:\
