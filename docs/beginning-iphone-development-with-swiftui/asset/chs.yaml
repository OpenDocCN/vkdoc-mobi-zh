  struct ContentView: View {\n    @State var showAlert = false\n    var body: some\
  \ View {\n        VStack {\n            Button(\"Show Action Sheet\") {\n      \
  \          showAlert.toggle()\n            }\n            .actionSheet(isPresented:\
  \ $showAlert) {\n                ActionSheet(title: Text(\"Warning!\"),\n      \
  \                      message: Text(\"Zombies on the loose\"),\n              \
  \              buttons: [\n                                .default(Text(\"Default\"\
  )),\n                                .cancel(Text(\"Cancel\")),\n              \
  \                  .destructive(Text(\"Destructive\"))])\n            }\n      \
  \  }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n6. 在画布窗格中点击“实时”图标，然后点击“Show\
  \ Action Sheet”按钮。`ActionSheet` 将会显示在模拟的 iOS 屏幕底部。\n7. 点击“Default”、“Cancel”或“Destructive”按钮以关闭\
  \ `ActionSheet`。\n\n\n\n### 让警告框/操作表按钮具备响应能力\n\n仅仅向警告框或操作表添加按钮，只能让用户在点击任意按钮时关闭警告框或操作表。通常情况下，你希望按钮能够执行某种操作。为此，你首先需要创建一个函数，其中包含用户点击特定按钮时要运行的代码。然后，你需要在用户点击按钮时调用这个函数。\n\
  \n要让按钮具备响应能力，你需要添加 `action:` 参数，如下所示：\n\n```\n.alert(isPresented: $showAlert) {\n\
  Alert(title: Text(\"Warning!\"),\nmessage: Text(\"Zombies on the loose\"),\nprimaryButton:\
  \ .default(Text(\"Default\"), action: {\nmessage = \"Default chosen\"\n}),\nsecondaryButton:\
  \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n}\n}\n}\nfunc cancelFunction()\
  \ {\nmessage = \"Cancel chosen\"\n}\n```\n\n使用 `action:` 参数的第一种方法涉及花括号，你可以在其中输入任意多行代码。然而，代码写得越多，整个\
  \ `.alert` 或 `.actionSheet` 看起来就越杂乱。\n\n使用 `action:` 参数的第二种方法是调用一个函数。这样，`action:`\
  \ 的代码被隔离在一个独立的函数中，同时让 `.alert` 或 `.actionSheet` 的代码更简短、更易读。\n\n无论你选择哪种方法，点击任意按钮都会从屏幕上关闭警告框或操作表。这就是为什么如果你完全省略了\
  \ `action:` 参数，点击该按钮也会关闭警告框或操作表。\n\n要了解如何在警告框中让按钮具备响应能力，请按照以下步骤操作：\n\n1.  创建一个新的\
  \ SwiftUI iOS App 项目，并为其任意命名，例如 \"AlertResponsiveButtons\"。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 State 变量：\n\n```\n    @State var\
  \ showAlert = false\n    @State var message = \"\"\n```\n\n4.  在 `var body: some\
  \ View` 中添加一个 `VStack`，并在 `VStack` 中放置一个 `Text` 视图和一个 `Button`，如下所示：\n\n```\n  \
  \  var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n    Button(\"\
  Show Alert\") {\n    showAlert.toggle()\n    }\n    }\n    }\n}\n```\n\n5.  为 `Button`\
  \ 添加一个 `.alert` 修饰符，如下所示：\n\n```\n    .alert(isPresented: $showAlert) {\n    Alert(title:\
  \ Text(\"Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton:\
  \ .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n    }),\n\
  \    secondaryButton: .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n\
  ```\n\n6.  在 `struct ContentView: View` 的最后一个花括号上方添加以下函数，如下所示：\n\n```\n    func\
  \ cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
  \ var showAlert = false\n    @State var message = \"\"\n    var body: some View\
  \ {\n    VStack {\n    Text(message)\n    .padding()\n    Button(\"Show Alert\"\
  ) {\n    showAlert.toggle()\n    }\n    .alert(isPresented: $showAlert) {\n    Alert(title:\
  \ Text(\"Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton:\
  \ .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n    }),\n\
  \    secondaryButton: .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n\
  \    }\n    }\n    func cancelFunction() {\n    message = \"Cancel chosen\"\n  \
  \  }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n    ContentView()\n    }\n    }\n```\n\n7.  在画布窗格中点击“实时”图标，然后点击“Show\
  \ Alert”按钮。一个警告框会出现。\n8.  点击“Cancel”或“Default”按钮。请注意，会出现一条消息，告知你选择了哪个按钮。\n\n要了解如何在操作表中让按钮具备响应能力，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"ActionSheetResponsiveButtons\"。\n2.\
  \  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 State 变量：\n\
  \n```\n    @State var showAlert = false\n    @State var message = \"\"\n```\n\n\
  4.  在 `var body: some View` 中添加一个 `VStack`，并在 `VStack` 中放置一个 `Text` 视图和一个 `Button`，如下所示：\n\
  \n```\n    var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n\
  \    Button(\"Show Action Sheet\") {\n    showAlert.toggle()\n    }\n    }\n   \
  \ }\n}\n```\n\n5.  为 `Button` 添加一个 `.actionSheet` 修饰符，如下所示：\n\n```\n    .actionSheet(isPresented:\
  \ $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"\
  Zombies on the loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action:\
  \ {\n    message = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"), action:\
  \ cancelFunction),\n    .destructive(Text(\"Destructive\"), action: {\n    message\
  \ = \"Destructive chosen\"\n    })])\n    }\n```\n\n6.  在 `struct ContentView: View`\
  \ 的最后一个花括号上方添加以下函数，如下所示：\n\n```\n    func cancelFunction() {\n    message = \"Cancel\
  \ chosen\"\n    }\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\n    import SwiftUI\n\
  \    struct ContentView: View {\n    @State var showAlert = false\n    @State var\
  \ message = \"\"\n    var body: some View {\n    VStack {\n    Text(message)\n \
  \   .padding()\n    Button(\"Show Action Sheet\") {\n    showAlert.toggle()\n  \
  \  }\n    .actionSheet(isPresented: $showAlert) {\n    ActionSheet(title: Text(\"\
  Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    buttons: [\n   \
  \ .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n    }),\n\
  \    .cancel(Text(\"Cancel\"), action: cancelFunction),\n    .destructive(Text(\"\
  Destructive\"), action: {\n    message = \"Destructive chosen\"\n    })])\n    }\n\
  \    }\n    }\n    func cancelFunction() {\n    message = \"Cancel chosen\"\n  \
  \  }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n    ContentView()\n    }\n    }\n```\n\n7.  在画布窗格中点击“实时”图标，然后点击“Show\
  \ Action Sheet”按钮。一个操作表会出现。\n8.  点击“Cancel”、“Default”或“Destructive”按钮。请注意，会出现一条消息，告知你选择了哪个按钮。\n\
  \n\n\n## 在警告框中显示文本输入框\n\n`Alert`（但`ActionSheet`不行）支持显示一个或多个`TextField`，供用户输入数据。随后`Alert`可以检索用户在`TextField`中输入的数据，并将其传递给程序的其他部分。\n\
  \n我们需要将`.alert`修饰器附加到用户界面元素上，但与创建`Alert`对话框不同，我们需要像这样分别定义`TextField`和`Button`：\n\
  \n```\n.alert(\"登录\", isPresented: $showAlert, actions: {\n    TextField(\"用户名\"\
  , text: $username)\n    SecureField(\"密码\", text: $password)\n    Button(\"登录\"\
  , action: {\n        message = \"login\"\n    })\n}, message: {\n    Text(\"请输入您的用户名和密码。\"\
  )\n})\n```\n\n上述代码创建了一个简单的`Alert`，其中显示了一个文本输入框和一个按钮，如图 12-4 所示。\n\n![](img/329781_7_En_12_Fig4_HTML.jpg)\n\
  \n一个用于输入登录凭证的对话框截图。文本提示输入用户名和密码。有一个文本框用于输入用户名。\n\n**图 12-4** 在警告对话框中显示文本输入框\n\n\
  要了解如何创建带有文本输入框的`Alert`，请按照以下步骤操作：\n\n![](img/329781_7_En_12_Fig5_HTML.jpg)\n\n一个对话框截图显示输入登录凭证的提示信息。有用于输入用户名和密码的文本框，以及登录和取消按钮。\n\
  \n**图 12-5** 显示`TextField`和`SecureField`的警告对话框\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如\
  \ \"AlertTextField\"。\n\n2. 在导航窗格中点击 `ContentView` 文件。\n\n3. 在 `struct ContentView:\
  \ View` 行下方添加以下 `State` 变量：\n\n    ```\n    @State var showAlert = false\n    @State\
  \ var username: String = \"\"\n    @State var password: String = \"\"\n    @State\
  \ var message = \"\"\n    ```\n\n4. 在 `var body: some View` 中添加一个 `VStack`，并在其中放入三个\
  \ `Text` 视图和一个 `Button`，如下所示：\n\n    ```\n    var body: some View {\n        VStack\
  \ (spacing: 50) {\n            Text(\"您点击了 \" + message + \" 按钮！\")\n          \
  \  Text(\"您的用户名是： \" + username)\n            Text(\"您的密码是： \" + password)\n   \
  \         Button(\"显示警告\") {\n                showAlert = true\n            }\n\
  \        }\n    ```\n\n5. 在 `Button` 的闭合大括号上附加一个 `.alert`，如下所示：\n\n    ```\n   \
  \ .alert(\"登录\", isPresented: $showAlert, actions: {\n        TextField(\"用户名\"\
  , text: $username)\n        SecureField(\"密码\", text: $password)\n        Button(\"\
  登录\", action: {\n            message = \"login\"\n        })\n        Button(\"\
  取消\", role: .cancel, action: {\n            message = \"cancel\"\n        })\n \
  \   }, message: {\n        Text(\"请输入您的用户名和密码。\")\n    })\n    ```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var showAlert\
  \ = false\n    @State var username: String = \"\"\n    @State var password: String\
  \ = \"\"\n    @State var message = \"\"\n    var body: some View {\n        VStack\
  \ (spacing: 50) {\n            Text(\"您点击了 \" + message + \" 按钮！\")\n          \
  \  Text(\"您的用户名是： \" + username)\n            Text(\"您的密码是： \" + password)\n   \
  \         Button(\"显示警告\") {\n                showAlert = true\n            }\n\
  \            .alert(\"登录\", isPresented: $showAlert, actions: {\n              \
  \  TextField(\"用户名\", text: $username)\n                SecureField(\"密码\", text:\
  \ $password)\n                Button(\"登录\", action: {\n                    message\
  \ = \"login\"\n                })\n                Button(\"取消\", role: .cancel,\
  \ action: {\n                    message = \"cancel\"\n                })\n    \
  \        }, message: {\n                Text(\"请输入您的用户名和密码。\")\n            })\n\
  \        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n6. 点击画布窗格中的\
  \ Live 图标。\n\n7. 点击用户界面上的 \"显示警告\" 按钮。出现一个登录警告，如图 12-5 所示。\n\n8. 点击用户名 `TextField`\
  \ 并输入一个名称。\n\n9. 点击密码 `SecureField` 并输入一个密码。注意 `SecureField` 会屏蔽你输入的所有字符。\n\n10.\
  \ 点击登录按钮。用户界面会识别出你点击了登录按钮，并输入了用户名和密码。\n\n## 使用上下文菜单\n\n`Contextual Menu`（上下文菜单）可以在用户界面中隐藏多个选项。只有当在视图（例如`Text`视图）上检测到长按手势时，它才会出现。当`Contextual\
  \ Menu`列出选项时，用户可以选择其中一个。\n\n`Contextual Menu`定义了一个`Button`列表，每个`Button`显示文本，并指定用户选择该`Button`时要执行的操作。该操作可以调用函数，或在花括号内包含\
  \ Swift 代码，如下所示：\n\n```\n.contextMenu(menuItems: {\n    Button(\"红色\", action: {\n\
  \        myColor = Color.red\n    })\n    Button(\"紫色\", action: purple)\n    Button(\"\
  绿色\", action: green)\n    Button(\"橙色\", action: orange)\n})\n```\n\n在这个示例中，显示 \"\
  红色\" 为标题的`Button`使用花括号来定义要运行的代码。其他三个`Button`（\"紫色\"、\"绿色\" 和 \"橙色\"）调用函数。注意，每个函数调用仅使用函数名，如果参数列表为空，则无需提供参数列表。\n\
  \n要了解如何创建`Contextual Menu`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 \"\
  ContextualMenu\"。\n\n2. 在导航窗格中点击 `ContentView` 文件。\n\n3. 在 `struct ContentView:\
  \ View` 行下方添加以下 `State` 变量：\n\n    `@State var myColor = Color.gray`\n\n4. 在 `var\
  \ body: some View` 中添加一个 `VStack`，并在其中放入一个 `Rectangle` 和一个 `Text` 视图，如下所示：\n\n \
  \   ```\n    var body: some View {\n        VStack {\n            Rectangle()\n\
  \                .foregroundColor(myColor)\n            Text(\"选择一种颜色\")\n     \
  \           .padding()\n        }\n    }\n    ```\n\n    上述代码定义了一个`Rectangle`，并根据`myColor`\
  \ `State`变量（初始设置为`Color.gray`）为其着色。然后显示一个`Text`视图。\n\n5. 在 `Text` 视图上添加一个 `.contextualMenu`\
  \ 修饰器，如下所示：\n\n    ```\n    .contextMenu(menuItems: {\n        Button(\"红色\", action:\
  \ {\n            myColor = Color.red\n        })\n        Button(\"紫色\", action:\
  \ purple)\n        Button(\"绿色\", action: green)\n        Button(\"橙色\", action:\
  \ orange)\n    })\n    ```\n\n6. 在 `struct ContentView: View` 的最后一个大括号上方添加以下函数，如下所示：\n\
  \n    ```\n    func purple() {\n        myColor = Color.purple\n    }\n    func\
  \ green() {\n        myColor = Color.green\n    }\n    func orange() {\n       \
  \ myColor = Color.orange\n    }\n    ```\n\n    整个 `ContentView` 文件应如下所示：\n\n  \
  \  ```\n    import SwiftUI\n    struct ContentView: View {\n        @State var myColor\
  \ = Color.gray\n        var body: some View {\n            VStack {\n          \
  \      Rectangle()\n                    .foregroundColor(myColor)\n            \
  \    Text(\"选择一种颜色\")\n                    .padding()\n                    .contextMenu(menuItems:\
  \ {\n                        Button(\"红色\", action: {\n                        \
  \    myColor = Color.red\n                        })\n                        Button(\"\
  紫色\", action: purple)\n                        Button(\"绿色\", action: green)\n \
  \                       Button(\"橙色\", action: orange)\n                    })\n\
  \            }\n        }\n        func purple() {\n            myColor = Color.purple\n\
  \        }\n        func green() {\n            myColor = Color.green\n        }\n\
  \        func orange() {\n            myColor = Color.orange\n        }\n    }\n\
  \    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
  \ some View {\n            ContentView()\n        }\n    }\n    ```\n\n7. 点击画布窗格中的\
  \ Live 图标。\n\n8. 将鼠标指针移到 \"选择一种颜色\" `Text` 视图上，并按住鼠标左键模拟长按手势。片刻之后，`Contextual Menu`\
  \ 会出现。\n\n9. 点击 `Contextual Menu` 中显示的任何选项。注意，`Rectangle` 会根据你选择的选项改变颜色。\n\n\n\n"
- '# 摘要


  警告框会在屏幕中央显示信息（`.alert`），而操作表则在屏幕底部显示信息（`.actionSheet`）。警告框和操作表都可以显示标题和消息，并至少包含一个用于关闭警告框/操作表的按钮。但警告框最多可显示两个按钮，而操作表则最多可显示三个。


  警告框/操作表上的按钮只是用来关闭警告框/操作表，但你可以附加代码，使其在用户选择按钮时执行。一种方法是将代码直接写入 `.alert`/`.actionSheet`
  修饰符中，但更好的方式是调用一个函数，并将该函数中的代码与 `.alert`/`.actionSheet` 修饰符分离开来。


  当你需要向用户显示重要信息并立即获得反馈时，请使用警告框，例如确认用户是否要删除数据。当需要在屏幕底部显示信息时，请使用操作表。当你想将多个选项隐藏在用户界面之外，但又在用户需要时可供查看，请使用上下文菜单。


  '
- "# 13. 显示列表\n\n向用户显示大量相关数据的一种常见方式是通过列表（也称为 Table 视图）。列表只是将多行相似类型的数据垂直堆叠显示。最简单的列表类型定义一个或多个\
  \ `Text` 视图，这些视图会出现在不同的行中，如图 13-1 所示：\n\n![](img/329781_7_En_13_Fig1_HTML.jpg)\n\
  \n一张屏幕截图显示了一个单词列表，依次为 cat、dog、bird、reptile 和 fish。\n\n**图 13-1** – 一个包含多个 `Text`\
  \ 视图的简单列表\n\n```\nList {\n    Text(\"Cat\")\n    Text(\"Dog\")\n    Text(\"Bird\"\
  )\n    Text(\"Reptile\")\n    Text(\"Fish\")\n}\n```\n\n如果列表包含的项数超过屏幕一次可显示的数量，列表将允许用户上下滑动以查看所有数据。最棒的是，这种滚动功能无需任何额外编码。\n\
  \n创建列表时，你可以使用多个 `Text` 视图，但如果要显示大量可能随时间增长或缩减的项，手动输入多个 `Text` 视图是行不通的。相反，你可能需要使用循环来检索数据，并将其显示在列表中的\
  \ `Text` 视图内。\n\n要了解如何使用循环创建列表以及上下滑动查看所有列表项，请按照以下步骤操作：\n\n![](img/329781_7_En_13_Fig2_HTML.jpg)\n\
  \n一张智能手机的插图显示其屏幕上有一个文本列表，内容从动物编号 1 到动物编号 19。\n\n**图 13-2** – 由 `ForEach` 循环定义的列表外观\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"SimpleList\"。\n\n2.  在导航器面板中点击 `ContentView`\
  \ 文件。\n\n3.  在 `var body: some View` 中添加一个 `List`，如下所示：\n\n    ```\n    var body:\
  \ some View {\n        List {\n            ForEach(1...25, id: \\.self) { index\
  \ in\n                Text(\"Animal #\\(index)\")\n            }\n        }\n  \
  \  }\n    ```\n\n    这段代码使用一个 `ForEach` 循环创建了 25 个独立的项。每次 `ForEach` 循环运行时，`index`\
  \ 变量都会递增，因此 `index` 的值将从 1 开始，到 25 结束。整个 `ContentView` 文件应如下所示：\n\n    ```\n   \
  \ import SwiftUI\n    struct ContentView: View {\n        var body: some View {\n\
  \            List {\n                ForEach(1...25, id: \\.self) { index in\n \
  \                   Text(\"Animal #\\(index)\")\n                }\n           \
  \ }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    \
  \    static var previews: some View {\n            ContentView()\n        }\n  \
  \  }\n    ```\n\n4.  点击画布面板中的 Live 图标。请注意，即使列表包含 25 个项，但如图 13-2 所示，并非所有项都同时显示在屏幕上。\n\
  \n5.  上下拖动鼠标以模拟滑动手势。请注意，列表会自动向上/向下滚动，以显示其余内容。\n\n## 在列表中显示数组数据\n\n列表中显示的数据通常存储在数组中。数组中的项数可以是固定的，但更常见的是项数会随时间变化。这意味着随着数组随时间增长和缩减，列表的内容也可能会发生变化。\n\
  \n要了解如何在列表中显示数组内容，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"ListArray\"\
  。\n\n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: some View` 这行下方定义一个数组，如下所示：\n\
  \n    ```\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\"\
  , \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    ```\n\n\
  4.  在 `var body: some View` 中添加一个 `VStack`，并创建一个 `List`，如下所示：\n\n    ```\n    var\
  \ body: some View {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n     \
  \           }\n            }\n        }\n    }\n    ```\n\n这将创建一个列表，并使用 `ForEach`\
  \ 循环从 0 计数到数组中的最后一个项。（请记住，数组中的第一个项索引值为 0，因此数组中最后一个项的索引值等于数组中的总项数减 1。）然后它使用此索引值从数组中检索每个项，以显示在列表中，如图\
  \ 13-3 所示。\n\n![](img/329781_7_En_13_Fig3_HTML.jpg)\n\n一个矩形块显示了一个单词列表。从上到下依次为 cat、dog、turtle、ferret、parrot、goldfish、lizard、canary、tarantula\
  \ 和 hamster。\n\n**图 13-3** – 在列表中显示数组的内容\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport\
  \ SwiftUI\nstruct ContentView: View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
  , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"\
  Hamster\"]\n    var body: some View {\n        VStack {\n            List {\n  \
  \              ForEach(0...myArray.count - 1, id: \\.self) { index in\n        \
  \            Text(myArray[index])\n                }\n            }\n        }\n\
  \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n\n\n### 在列表中显示结构体数组\n\n之前的代码使用\
  \ `ForEach` 循环通过索引值获取数组项。另一种存储数据的方法是使用结构体，然后创建结构体数组。  \n这样做的目的是定义你想要存储的数据，同时附带一个唯一\
  \ ID，你可以用这个 ID 来标识每个结构体，例如：\n\n```\nstruct Animals: Identifiable {\n    let pet:\
  \ String\n    let id = UUID()\n}\n```\n\n一旦定义了 `Identifiable` 结构体，就可以像这样将其存储在数组中：\n\
  \n```\nvar myAnimals = [\n    Animals(pet: \"Cat\"),\n    Animals(pet: \"Dog\"),\n\
  \    Animals(pet: \"Turtle\"),\n    Animals(pet: \"Ferret\"),\n    Animals(pet:\
  \ \"Parrot\"),\n    Animals(pet: \"Goldfish\"),\n    Animals(pet: \"Lizard\"),\n\
  \    Animals(pet: \"Canary\"),\n    Animals(pet: \"Tarantula\"),\n    Animals(pet:\
  \ \"Hamster\")\n]\n```\n\n这个数组不仅在 `pet` 字段中存储了字符串，还通过 ID 唯一标识了每个结构体。现在，你可以使用这个唯一\
  \ ID 在 `List` 中显示每个项，如下所示：\n\n```\nList(myAnimals) {\n    Text($0.pet)\n}\n```\n\
  \n请注意，上述代码不需要循环。要了解这段代码的工作原理，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\
  \ \"ListOfStructures\"。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
  \ some View` 行下方定义一个结构体和一个数组，如下所示：\n\n    ```\n    struct ContentView: View {\n\
  \        struct Animals: Identifiable {\n            let pet: String\n         \
  \   let id = UUID()\n        }\n        var myAnimals = [\n            Animals(pet:\
  \ \"Cat\"),\n            Animals(pet: \"Dog\"),\n            Animals(pet: \"Turtle\"\
  ),\n            Animals(pet: \"Ferret\"),\n            Animals(pet: \"Parrot\"),\n\
  \            Animals(pet: \"Goldfish\"),\n            Animals(pet: \"Lizard\"),\n\
  \            Animals(pet: \"Canary\"),\n            Animals(pet: \"Tarantula\"),\n\
  \            Animals(pet: \"Hamster\")\n        ]\n    ```\n\n4.  在 `var body: some\
  \ View` 内部添加一个 `List`，如下所示：\n\n    ```\n    var body: some View {\n        List(myAnimals)\
  \ {\n            Text($0.pet)\n        }\n    }\n    ```\n\n    完整的 `ContentView`\
  \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n\n    struct ContentView: View {\n  \
  \      struct Animals: Identifiable {\n            let pet: String\n           \
  \ let id = UUID()\n        }\n        var myAnimals = [\n            Animals(pet:\
  \ \"Cat\"),\n            Animals(pet: \"Dog\"),\n            Animals(pet: \"Turtle\"\
  ),\n            Animals(pet: \"Ferret\"),\n            Animals(pet: \"Parrot\"),\n\
  \            Animals(pet: \"Goldfish\"),\n            Animals(pet: \"Lizard\"),\n\
  \            Animals(pet: \"Canary\"),\n            Animals(pet: \"Tarantula\"),\n\
  \            Animals(pet: \"Hamster\")\n        ]\n        var body: some View {\n\
  \            List(myAnimals) {\n                Text($0.pet)\n            }\n  \
  \      }\n    }\n\n    struct ContentView_Previews: PreviewProvider {\n        static\
  \ var previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
  \n请注意，与之前需要 `ForEach` 循环的版本相比，创建 `List` 的代码要简洁得多。\n\n### 在列表中创建分组\n\n如果 `List` 中显示了很多项，那么滚动浏览所有这些数据以找到想要的项可能会很困难。为了解决这个问题，列表允许你创建分区，如图\
  \ 13-4 所示。\n\n![](img/329781_7_En_13_Fig4_HTML.png)  \n一张截图显示了哺乳动物、爬行动物、鸟类和其他分区下的生物列表。哺乳动物分区包括猫、狗、雪貂和仓鼠。乌龟和蜥蜴属于爬行动物分区。鸟类分区有鹦鹉和金丝雀。其他分区有狼蛛和金鱼。\n\
  \n**图 13-4** — 按分区显示 `List` 的内容\n\n要定义分区，你需要创建两个结构体。一个结构体定义分区标题，另一个结构体定义要显示的数据。要定义分区标题，你需要定义：\n\
  \n- 一个 `String` 常量，用于保存每个分区的名称\n- 一个数组常量，用于保存包含实际显示数据的结构体数组\n- 一个 `ID`，用于为每个分区定义唯一\
  \ ID\n\n结构体名称必须定义为 `Identifiable` 以创建唯一 ID，例如：\n\n```\nstruct SectionHeading: Identifiable\
  \ {\n    let name: String\n    let animalList: [Animals]\n    let id = UUID()\n\
  }\n```\n\n上述结构体使用 `animalList` 来存储一个名为 `Animals` 的结构体数组。这个 `Animals` 结构体需要：\n\n\
  - 一个 `String` 常量，用于保存在 `List` 中要显示的数据\n- 一个 `ID`，用于为 `List` 中的每个项定义唯一 ID\n\n第二个结构体必须定义为\
  \ `Hashable` 和 `Identifiable`，例如：\n\n```\nstruct Animals: Hashable, Identifiable\
  \ {\n    let pet: String\n    let id = UUID()\n}\n```\n\n最后，你可以创建一个数组来定义分区以及每个分区内的项，例如：\n\
  \n```\nvar myAnimals = [\n    SectionHeading(name: \"Mammals\",\n        animalList:\
  \ [\n            Animals(pet: \"Cat\"),\n            Animals(pet: \"Dog\"),\n  \
  \          Animals(pet: \"Ferret\"),\n            Animals(pet: \"Hamster\")])\n\
  \    ]\n```\n\n然后，要在 `List` 中显示项，你需要使用嵌套的 `ForEach` 循环。外层的 `ForEach` 循环定义分区名称，例如：\n\
  \n```\nForEach(myAnimals) { heading in\n    Section(header: Text(\"\\(heading.name)\
  \ Section\")) {\n    }\n}\n```\n\n然后，内层的 `ForEach` 循环定义每个分区内要显示的项，例如：\n\n```\nForEach(heading.animalList)\
  \ { creature in\n    Text(creature.pet)\n}\n```\n\n要了解如何创建分成多个分区的 `List`，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"ListSections\"。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: some View` 行下方定义一个结构体，以定义要在 `List` 中显示的数据，如下所示：\n\
  \n    ```\n    struct Animals: Hashable, Identifiable {\n        let pet: String\n\
  \        let id = UUID()\n    }\n    ```\n\n4.  在其下方添加第二个结构体，以定义要在 `List` 中显示的分区名称，如下所示：\n\
  \n    ```\n    struct SectionHeading: Identifiable {\n        let name: String\n\
  \        let animalList: [Animals]\n        let id = UUID()\n    }\n    ```\n\n\
  5.  添加一个数组，列出分区以及每个分区内要显示的项，如下所示：\n\n    ```\n    var myAnimals = [\n        SectionHeading(name:\
  \ \"Mammals\",\n            animalList: [\n                Animals(pet: \"Cat\"\
  ),\n                Animals(pet: \"Dog\"),\n                Animals(pet: \"Ferret\"\
  ),\n                Animals(pet: \"Hamster\")]),\n        SectionHeading(name: \"\
  Reptiles\",\n            animalList: [\n                Animals(pet: \"Turtle\"\
  ),\n                Animals(pet: \"Lizard\")]),\n        SectionHeading(name: \"\
  Birds\",\n            animalList: [\n                Animals(pet: \"Parrot\"),\n\
  \                Animals(pet: \"Canary\")]),\n        SectionHeading(name: \"Other\"\
  ,\n            animalList: [\n                Animals(pet: \"Tarantula\"),\n   \
  \             Animals(pet: \"Goldfish\")])\n    ]\n    ```\n\n6.  在 `var body: some\
  \ View` 内部添加一个 `List`，如下所示：\n\n    ```\n    var body: some View {\n        List\
  \ {\n        }\n    ```\n\n7.  在 `List` 内部添加一个 `ForEach` 循环来定义分区名称，如下所示：\n\n   \
  \ ```\n    var body: some View {\n        List {\n            ForEach(myAnimals)\
  \ { heading in\n                Section(header: Text(\"\\(heading.name) Section\"\
  )) {\n                }\n            }\n        }\n    }\n    ```\n\n\n\n### 关于\
  \ `Text` 视图和 `ForEach` 循环\n\n注意，`Text` 视图显示了每个分区的 `name` 属性，该属性之前由数组 `(\"Mammals\"\
  , \"Reptiles\", \"Birds\", \"Other\")` 定义。\n\n8.  添加第二个 `ForEach` 循环来定义要在 `List`\
  \ 中显示的实际数据，如下所示：\n\n```swift\nvar body: some View {\n    List {\n        ForEach(myAnimals)\
  \ { heading in\n            Section(header: Text(\"\\(heading.name) Section\"))\
  \ {\n                ForEach(heading.animalList) { creature in\n               \
  \     Text(creature.pet)\n                }\n            }\n        }\n    }\n}\n\
  ```\n\n注意，这个第二个 `ForEach` 循环使用了之前由数组 `(\"Cat\", \"Dog\", \"Ferret\", \"Hamster\"\
  , \"Turtle\", \"Lizard\", \"Parrot\", \"Canary\", \"Tarantula\", \"Goldfish\")`\
  \ 定义的 `pet` 属性。整个 `ContentView` 文件应该如下所示：\n\n```swift\nimport SwiftUI\nstruct ContentView:\
  \ View {\n    struct Animals: Hashable, Identifiable {\n        let pet: String\n\
  \        let id = UUID()\n    }\n    struct SectionHeading: Identifiable {\n   \
  \     let name: String\n        let animalList: [Animals]\n        let id = UUID()\n\
  \    }\n    var myAnimals = [\n        SectionHeading(name: \"Mammals\",\n     \
  \                  animalList: [\n                           Animals(pet: \"Cat\"\
  ),\n                           Animals(pet: \"Dog\"),\n                        \
  \   Animals(pet: \"Ferret\"),\n                           Animals(pet: \"Hamster\"\
  )]),\n        SectionHeading(name: \"Reptiles\",\n                       animalList:\
  \ [\n                           Animals(pet: \"Turtle\"),\n                    \
  \       Animals(pet: \"Lizard\")]),\n        SectionHeading(name: \"Birds\",\n \
  \                      animalList: [\n                           Animals(pet: \"\
  Parrot\"),\n                           Animals(pet: \"Canary\")]),\n        SectionHeading(name:\
  \ \"Other\",\n                       animalList: [\n                           Animals(pet:\
  \ \"Tarantula\"),\n                           Animals(pet: \"Goldfish\")])\n   \
  \ ]\n    var body: some View {\n        List {\n            ForEach(myAnimals) {\
  \ heading in\n                Section(header: Text(\"\\(heading.name) Section\"\
  )) {\n                    ForEach(heading.animalList) { creature in\n          \
  \              Text(creature.pet)\n                    }\n                }\n  \
  \          }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n## 向 `List` 添加行分隔线\n\n列表通常会在项目之间显示线条。`SwiftUI` 允许你选择隐藏或显示这些线条，或者用特定颜色给线条着色。\n\n\
  要隐藏或显示 `List` 中的线条，请像这样使用 `.listRowSeparator` 修饰符，并传入 `.visible` 或 `.hidden`：\n\n\
  ```swift\n.listRowSeparator(.hidden)\n```\n\n要为 `List` 中的分隔线着色，请像这样使用 `.listRowSeparatorTint`\
  \ 修饰符，并传入一个颜色值，例如 `.red` 或 `.blue`：\n\n```swift\n.listRowSeparatorTint(.red)\n```\n\
  \n你可以在 `List` 内部同时使用这两个修饰符，来修改用于定义 `List` 显示内容的 `ForEach` 循环。要了解如何在 `List` 中显示和着色行分隔线，请按照以下步骤操作：\n\
  \n1.  创建一个新的 `SwiftUI iOS App` 项目，并为其指定任意名称，例如 `\"ListLines\"`。\n2.  在导航器窗格中单击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 行下面添加一个数组，如下所示：\n    ```swift\n    var myArray\
  \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
  , \"Canary\", \"Tarantula\", \"Hamster\"]\n    ```\n4.  在 `var body: some View`\
  \ 行下面的 `VStack` 内添加一个 `List`，如下所示：\n    ```swift\n    var body: some View {\n  \
  \      VStack {\n            List {\n            }\n        }\n    }\n    ```\n\
  5.  在 `List` 内部添加一个 `ForEach` 循环，以查找数组中的所有项目，索引从 `0` 到数组项目总数减 `1`，如下所示：\n    ```swift\n\
  \    var body: some View {\n        VStack {\n            List {\n             \
  \   ForEach(0...myArray.count - 1, id: \\.self) { index in\n                   \
  \ Text(myArray[index])\n                }\n            }\n        }\n    }\n   \
  \ ```\n6.  向 `ForEach` 循环添加一个 `.listRowSeparator` 修饰符，如下所示：\n    ```swift\n    var\
  \ body: some View {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n     \
  \           }.listRowSeparator(.visible)\n            }\n        }\n    }\n    ```\n\
  \    这个 `.listRowSeparator` 会显示线条 (`.visible`)。\n7.  向 `ForEach` 循环添加一个 `.listRowSeparatorTint`\
  \ 修饰符，如下所示：\n    ```swift\n    var body: some View {\n        VStack {\n       \
  \     List {\n                ForEach(0...myArray.count - 1, id: \\.self) { index\
  \ in\n                    Text(myArray[index])\n                }.listRowSeparator(.visible)\n\
  \                .listRowSeparatorTint(.red)\n            }\n        }\n    }\n\
  \    ```\n    你可以选择任何你想要的颜色，例如 `.orange` 或 `.purple`。整个 `ContentView` 文件应该如下所示：\n\
  \    ```swift\n    import SwiftUI\n    struct ContentView: View {\n        var myArray\
  \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
  , \"Canary\", \"Tarantula\", \"Hamster\"]\n        var body: some View {\n     \
  \       VStack {\n                List {\n                    ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                        Text(myArray[index])\n \
  \                   }.listRowSeparator(.visible)\n                    .listRowSeparatorTint(.red)\n\
  \                }\n            }\n        }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n8.  在画布窗格中单击“Live”图标。注意，`List` 会以你定义的颜色在每一项之间显示线条。\n\
  \n\n\n### 为列表交替显示颜色\n\n当`List`（列表）内容较长时，浏览起来可能不太方便。虽然用线条（有无颜色均可）分隔列表中的项目可以让列表更易读，但另一种方法是像图\
  \ 13-5 所示，在列表行中使用交替颜色。\n\n![](img/329781_7_En_13_Fig5_HTML.png)\n\n一个单列表格表示一个单词列表，包含猫、狗、乌龟、雪貂、鹦鹉、金鱼、蜥蜴、金丝雀、狼蛛和仓鼠，并交替使用两种高亮颜色。\n\
  \n**图 13-5** 交替颜色可以使列表更易读\n\nSwiftUI 允许你这样定义颜色：\n\n```\nColor.green\n```\n\n颜色的一个问题在于它们可能过于鲜艳，导致列表每行中的文本难以阅读。为了调整颜色的强度，我们可以添加一个\
  \ `.opacity` 修饰符来降低颜色的饱和度。值为 0 时颜色完全消失，值为 1 时颜色完全显示。因此，小于 1 的不透明度值会降低颜色的视觉效果，例如：\n\
  \n```\nColor.green.opacity(0.4)\n```\n\n如果用一个数组来填充列表，那么可以根据数组索引是奇数还是偶数来交替设置行的颜色。要判断数组索引（或任何数字）是否为偶数，可以使用\
  \ Swift 的模运算符（`%`）将该数字除以 2。如果余数为 0，则该数字是偶数；否则为奇数。\n\n因此，要定义列表中每一行的背景颜色，我们需要使用 `.background`\
  \ 修饰符来识别数组索引的奇偶性，如下所示：\n\n```\n.background(index % 2 == 0 ? Color.green : Color.yellow)\n\
  ```\n\n要了解如何让列表显示交替颜色，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“ListAlternatingColors”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 这行下方添加一个数组，如下所示：\n\
  \n```\nvar myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
  , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n```\n\n4. 在 `var body: some\
  \ View` 这行下方的 `VStack` 内添加一个 `List`（列表），如下所示：\n\n```\nvar body: some View {\n  \
  \  VStack {\n        List {\n        }\n    }\n}\n```\n\n5. 在 `List` 内部添加一个 `ForEach`\
  \ 循环，以遍历从 0 到数组元素总数减 1 的所有数组项，如下所示：\n\n```\nvar body: some View {\n    VStack {\n\
  \        List {\n            ForEach(0...myArray.count - 1, id: \\.self) { index\
  \ in\n                Text(myArray[index])\n            }\n        }\n    }\n}\n\
  ```\n\n如果我们只是在 `ForEach` 循环内的 `Text` 视图上添加背景颜色，那么仅仅高亮显示 `Text` 视图本身，而不是整个行。我们需要做的是将\
  \ `Text` 视图嵌入到一个 `HStack` 中，然后添加一个 `Spacer()`，以将 `HStack` 的边界扩展到 iOS 屏幕的边缘。\n\n\
  6. 将 `Text` 视图嵌入到包含 `Spacer()` 的 `HStack` 中，如下所示：\n\n```\nvar body: some View {\n\
  \    VStack {\n        List {\n            ForEach(0...myArray.count - 1, id: \\\
  .self) { index in\n                HStack {\n                    Text(myArray[index])\n\
  \                    Spacer()\n                }\n            }\n        }\n   \
  \ }\n}\n```\n\n现在我们可以为 `HStack` 添加背景颜色，这将同时包含 `Text` 视图和 `HStack` 的宽度（通过 `Spacer()`\
  \ 向右扩展）。\n\n7. 在定义 `HStack` 的最后那个花括号上添加背景修饰符，如下所示：\n\n```\nvar body: some View {\n\
  \    VStack {\n        List {\n            ForEach(0...myArray.count - 1, id: \\\
  .self) { index in\n                HStack {\n                    Text(myArray[index])\n\
  \                    Spacer()\n                }.background(index % 2 == 0 ? Color.green.opacity(0.4)\
  \ : Color.yellow.opacity(0.4))\n            }\n        }\n    }\n}\n```\n\n你可以随意选择不同的颜色和不透明度值。请注意，如果数组索引是偶数，该行将显示为绿色；如果数组索引是奇数，则该行将显示为黄色。整个\
  \ `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n  \
  \  var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
  , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    var body: some View {\n\
  \        VStack {\n            List {\n                ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                    HStack {\n                 \
  \       Text(myArray[index])\n                        Spacer()\n               \
  \     }.background(index % 2 == 0 ? Color.green.opacity(0.4) : Color.yellow.opacity(0.4))\n\
  \                }\n            }\n        }\n    }\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n8. 点击 Canvas 窗格中的 Live 图标。SwiftUI 会显示颜色和不透明度交替的行（参见图 13-5）。\n\n\
  ### 为列表添加轻扫手势\n\n许多常见的应用程序，如邮件、信息和照片，都会在 `List` 中显示项目。通过这些列表，用户可以向左或向右轻扫，以显示可供选择的附加选项，如图\
  \ 13-6 所示。\n\n![](img/329781_7_En_13_Fig6_HTML.jpg)\n\n一张屏幕截图显示了包含 3 条消息的列表。中间的消息被轻扫，并在右端显示了附加选项，用于静音通知和删除消息。\n\
  \n**图 13-6** 在 `List` 上轻扫可以显示附加选项\n\n列表的两个常见操作是删除和移动项目。从 `List` 中删除项目通常是在用户从右向左轻扫后移除该项目。在\
  \ `List` 中移动项目则是指滑动手指将某个项目放置到列表中的新位置。\n\n\n\n### 从列表中删除项目\n\n在 iOS 中，从`List`中删除项目最常见的快捷方式是从右向左滑动以显示**删除**按钮。另外，用户也可以继续从右向左滑动来直接删除项目，而无需点击**删除**按钮。由于这种滑动删除手势很常用，SwiftUI\
  \ 让实现变得非常简单。\n\n第一步是在`List`内的`ForEach`循环中添加`.onDelete`修饰符，如下所示：\n\n```swift\nList\
  \ {\n    ForEach(0...myArray.count - 1, id: \\.self) { index in\n    }.onDelete(perform:\
  \ delete)\n}\n```\n\n这会调用一个删除函数，该函数使用包含`List`中显示项目的数组名称（以下示例中称为`myArray`），并调用`remove`方法，如下所示：\n\
  \n```swift\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets: offsets)\n\
  }\n```\n\n要了解如何在`List`中创建滑动删除手势，请按照以下步骤操作：\n\n![一张截图在顶部显示单词雪貂(furret)，底部显示金鱼(goldfish)。两个单词之间有一个“删除”按钮，位于右侧。](img/329781_7_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** – 由`.onDelete`修饰符创建的**删除**按钮。\n\n1.  创建一个新的 SwiftUI iOS 应用程序项目，并为其指定任意名称，例如“ListDelete”。\n\
  2.  点击导航器窗格中的`ContentView`文件。\n3.  在`struct ContentView`行下添加一个`@State`变量数组，如下所示：\n\
  \n    ```swift\n    @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\"\
  , \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
  \    ```\n\n    输入的具体字符串无关紧要，只要输入几个字符串来填充数组即可。\n\n4.  在`var body: some View`行下添加一个`List`，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        List {\n        }\n    }\n  \
  \  ```\n\n5.  在此`List`内添加一个`ForEach`循环，从 0 计数到数组项目总数减 1。然后在一个`Text`视图中显示数组项目，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        List {\n            ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n         \
  \   }\n        }\n    }\n    ```\n\n6.  向`ForEach`循环添加`.onDelete`修饰符，以调用一个名为`delete`的函数，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        List {\n            ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n         \
  \   }.onDelete(perform: delete)\n        }\n    }\n    ```\n\n7.  在`struct ContentView:\
  \ View`中的最后一个花括号上方添加以下函数，如下所示：\n\n    ```swift\n    func delete(at offsets: IndexSet)\
  \ {\n        myArray.remove(atOffsets: offsets)\n    }\n    ```\n\n    整个`ContentView`文件应如下所示：\n\
  \n    ```swift\n    import SwiftUI\n    struct ContentView: View {\n        @State\
  \ var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
  , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n        var body: some View\
  \ {\n            List {\n                ForEach(0...myArray.count - 1, id: \\.self)\
  \ { index in\n                    Text(myArray[index])\n                }.onDelete(perform:\
  \ delete)\n            }\n        }\n        func delete(at offsets: IndexSet) {\n\
  \            myArray.remove(atOffsets: offsets)\n        }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n\n8.  点击画布窗格中的**Live**图标。\n9.  在`List`中的任意项目上从右向左滑动。注意，`.onDelete`修饰符会自动显示**删除**按钮，如图\
  \ 13-7 所示。\n10. 点击**删除**按钮。注意，包含该项目的行消失了。\n\n### 在列表中移动项目\n\n另一种使用列表的常见方式是在`List`内重新排列或移动项目。在\
  \ iOS 中，这通常是一个两步过程。首先，您必须编辑`List`，使其在`List`中每个项目的右侧显示三横线图标。其次，您使用三横线图标滑动`List`项目，将其放置到新位置，如图\
  \ 13-8 所示。\n\n![一张截图展示了一个单词列表，每个单词旁边有三条水平线。这些线条被称为移动图标。](img/329781_7_En_13_Fig8_HTML.jpg)\n\
  \n**图 13-8** – 移动图标显示在`List`中项目的右侧\n\n第一步是在`List`内的`ForEach`循环中添加`.onMove`修饰符，如下所示：\n\
  \n```swift\nForEach(0...myArray.count - 1, id: \\.self) { index in\n}.onMove(perform:\
  \ move)\n```\n\n这会调用一个移动函数，该函数使用包含`List`中显示项目的数组名称（以下示例中称为`myArray`），并调用`move`方法，如下所示：\n\
  \n```swift\nfunc move(from source: IndexSet, to destination: Int) {\n    myArray.move(fromOffsets:\
  \ source, toOffset: destination)\n}\n```\n\n要了解如何在`List`中显示移动图标，请按照以下步骤操作：\n\n1.\
  \  创建一个新的 SwiftUI iOS 应用程序项目，并为其指定任意名称，例如“ListMove”。\n2.  点击导航器窗格中的`ContentView`文件。\n\
  3.  在`struct ContentView`行下添加一个`@State`变量数组，如下所示：\n\n    ```swift\n    @State var\
  \ myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
  , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    ```\n\n    输入的具体字符串无关紧要，只要输入几个字符串来填充数组即可。\n\
  \n4.  在`var body: some View`行下添加一个`NavigationView`，如下所示：\n\n    ```swift\n    var\
  \ body: some View {\n        NavigationView {\n        }\n    }\n    ```\n\n   \
  \ `NavigationView`对于在屏幕右上角显示**编辑**按钮是必需的。\n\n5.  在`NavigationView`内部添加一个`List`，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        NavigationView {\n          \
  \  List {\n            }\n        }\n    }\n    ```\n\n6.  在此`List`内添加一个`ForEach`循环，从\
  \ 0 计数到数组项目总数减 1。然后在一个`Text`视图中显示数组项目，如下所示：\n\n    ```swift\n    var body: some\
  \ View {\n        NavigationView {\n            List {\n                ForEach(0...myArray.count\
  \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n     \
  \           }\n            }\n        }\n    }\n    ```\n\n7.  向`List`添加`.toolbar`修饰符，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        NavigationView {\n          \
  \  List {\n                ForEach(0...myArray.count - 1, id: \\.self) { index in\n\
  \                    Text(myArray[index])\n                }\n            }.toolbar\
  \ {\n                EditButton()\n            }\n        }\n    }\n    ```\n\n\
  \    这段`.toolbar { EditButton() }`代码会在`NavigationView`的右上角添加一个**编辑**按钮。\n\n8.  向`ForEach`循环添加`.onMove`修饰符，以调用一个名为`move`的函数，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        NavigationView {\n          \
  \  List {\n                ForEach(0...myArray.count - 1, id: \\.self) { index in\n\
  \                    Text(myArray[index])\n                }.onMove(perform: move)\n\
  \            }.toolbar {\n                EditButton()\n            }\n        }\n\
  \    }\n    ```\n\n9.  在`struct ContentView: View`中的最后一个花括号上方添加以下函数，如下所示：\n\n  \
  \  ```swift\n    func move(from source: IndexSet, to destination: Int) {\n     \
  \   myArray.move(fromOffsets: source, toOffset: destination)\n    }\n    ```\n\n\
  \    整个`ContentView`文件应如下所示：\n\n    ```swift\n    import SwiftUI\n    struct ContentView:\
  \ View {\n        @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\"\
  , \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
  \        var body: some View {\n            NavigationView {\n                List\
  \ {\n                    ForEach(0...myArray.count - 1, id: \\.self) { index in\n\
  \                        Text(myArray[index])\n                    }.onMove(perform:\
  \ move)\n                }.toolbar {\n                    EditButton()\n       \
  \         }\n            }\n        }\n        func move(from source: IndexSet,\
  \ to destination: Int) {\n            myArray.move(fromOffsets: source, toOffset:\
  \ destination)\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n        static var previews: some View {\n            ContentView()\n     \
  \   }\n    }\n    ```\n\n\n\n10.  点击`Canvas`面板中的`Live`图标。\n\n11.  点击屏幕右上角的`Edit`按钮。`List`中每个项目的右侧会出现三条水平线图标（见图\
  \ 13-8）。请注意，当你点击`Edit`按钮时，它会变成一个`Done`按钮。\n\n12.  向上或向下滑动任意水平线图标，即可将项目移动到`List`中的新位置。\n\
  \n13.  点击屏幕右上角的`Done`按钮，可隐藏`List`中每个项目右侧的水平线图标。\n\n### 为列表创建自定义滑动操作\n\nSwiftUI 还允许在`List`项目上实现自定义的从左到右和从右到左手势。第一步是在显示`List`项目的视图（例如`Text`视图）上添加`.swipeActions`修饰符。然后，像这样定义你是想要`.leading`（从左到右）还是`.trailing`（从右到左）滑动手势：\n\
  \n```\n.swipeActions(edge: .trailing)\n```\n\n每个`.swipeActions`修饰符都需要定义一个`Button`（包括`Button`的标题以及选中时要运行的代码），同时搭配一个`.tint`修饰符，以便在选中时显示特定颜色，例如：\n\
  \n```\n.swipeActions(edge: .trailing) {\n    Button {\n        //  要运行的代码\n    }\
  \ label: {\n        //  要显示的图标\n    }.tint(.red)\n}\n```\n\n要了解如何在`List`中创建自定义滑动操作，请按照以下步骤操作：\n\
