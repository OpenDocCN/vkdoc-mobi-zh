  ### 为文本或标签视图添加边框


  为了突出显示文本视图和标签视图，你可以为它们添加边框。边框可以由颜色和宽度组成，例如：


  ```

  .border(Color.red, width: 3)

  ```


  当你对文本或标签视图使用 `.border` 修饰符时，边框会紧密包裹在内部文本周围，如图 4-19 所示。


  ![](img/329781_7_En_4_Fig19_HTML.jpg)


  两套文本、边框、标签、系统图像和颜色命令的示例，分别对应文本视图周围的边框和带文件夹图标的标签视图周围的边框。


  图 4-19


  边框紧密包裹在文本或标签视图内部的文本周围


  如果你不希望边框如此紧密地包裹文本，可以首先为文本或标签视图添加内边距（padding），然后再应用 `.border` 修饰符，如图 4-20 所示。


  ![](img/329781_7_En_4_Fig20_HTML.jpg)


  两套文本、边框、标签、内边距、系统图像和颜色命令的示例，分别对应文本视图周围带空间的边框和带文件夹图标的标签视图周围带空间的边框。


  图 4-20


  内边距修饰符可以为文本或标签视图周围的边框添加空间


  **注意**


  请确保在 `.border` 修饰符之前应用 `.padding` 修饰符。否则，如果 `.border` 修饰符出现在前面，SwiftUI 会先绘制边框，然后在文本或标签视图周围应用内边距。


  ## 总结


  文本视图非常适合在用户界面上显示任何类型的文本信息。即使你需要显示数字、日期或任何其他数据类型，你也可以使用字符串插值在文本视图中显示数据。与文本视图类似的是标签视图。


  文本视图仅显示文本，而标签视图可以并排显示图像和文本。标签视图可以显示 SF Symbols 应用中列出的图标，也可以显示你添加到 Xcode 项目 Assets
  文件夹中的任何图像。通过对标签视图应用不同的样式，你可以显示文本和图标、仅文本或仅图标。通过使用文本视图或标签视图，你的应用可以在用户界面上显示信息，供用户查看。




  '
- "# 5. 处理图像\n\n多数用户界面由文本构成，但纯文本难免显得单调。因此，屏幕上第二常见的信息展示方式便是图像。图像可以纯粹用于装饰，也可以帮助用户在用户界面中进行导航。\n\
  \n最常见的显示图像是图标。SF Symbols 应用（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）列出了所有可用于\
  \ App 用户界面的图标。除了这些图标，你还可以包含任何拖入 Xcode 项目 Assets 文件夹的图像。此外，你还可以包含矩形或圆形等常见形状，这些形状都可以显示在屏幕上。\n\
  \n通过显示彩色或信息丰富的图形，图像可以让你美化任何用户界面的外观。每当你创建用户界面时，思考如何添加图形图像，让你的用户界面在视觉上更吸引用户。\n\n##\
  \ 显示形状\n\n最简单地添加到用户界面的图像是常见的几何形状。几何形状可以单独使用，也可以作为其他类型视图（例如 `Text` 视图）的背景进行装饰。五种常见的几何形状如图\
  \ 5-1 所示：\n\n一组 5 张深色插图，分别展示胶囊形、圆形、椭圆形、矩形和圆角矩形及其对应的命令。圆角矩形额外有一个圆角半径命令。\n\n**图 5-1**:\
  \ SwiftUI 中五种不同类型的几何形状\n\n- `Capsule`（胶囊形）\n- `Circle`（圆形）\n- `Ellipse`（椭圆形）\n-\
  \ `Rectangle`（矩形）\n- `Rounded rectangle(cornerRadius: x)`（圆角矩形）\n\n要创建这些几何形状中的任何一个，只需声明你想要的形状名称，例如\
  \ `Circle()`。唯一的例外是圆角矩形，它需要一个定义圆角弯曲程度的圆角半径值。该值越低，角看起来越尖锐，圆角半径为 0 时会创建出与普通矩形一样的 90\
  \ 度角。圆角半径值越高，圆角矩形就越像胶囊形。\n\n你可以通过两种方式定义圆角矩形：\n\n- 通过圆角半径\n- 通过定义曲线的宽度和高度\n\n通过圆角半径定义圆角矩形需要一个数值。较低的值（例如\
  \ 10）会使圆角几乎不明显。较高的值（例如 100）会在矩形的每个角创建更平滑、更突出的圆角曲线，如图 5-2 所示。\n\n一组 2 张圆角矩形插图及其对应的命令。它们分别具有\
  \ 10 和 100 的圆角半径。\n\n**图 5-2**: 更改圆角半径值会改变圆角效果\n\n在矩形上定义圆角的第二种方法是像这样定义圆角曲线的宽度和高度：\n\
  \n```\nRoundedRectangle(cornerSize: CGSize(width: 100, height: 25))\n```\n\n宽度定义了曲线沿\
  \ X 轴（水平方向）的长度，而高度定义了曲线沿 Y 轴（垂直方向）的大小。通过选择不同的宽度和高度值，你可以为矩形创建不对称形状的圆角，如图 5-3 所示。\n\
  \n一张深色圆角矩形插图，其高度为 25，宽度为 100。\n\n**图 5-3**: 使用宽度和高度定义圆角\n\n### 为形状着色\n\n由于每个几何形状的默认颜色都是黑色，你可能希望为形状选择不同的颜色。要为形状添加颜色，你可以像这样使用\
  \ `fill` 修饰符：\n\n```\nCapsule()\n.fill(Color.yellow)\n```\n\n如果你不喜欢使用任何标准颜色（绿色、红色、黄色、蓝色等），你也可以通过定义红色、绿色和蓝色值，或色相、饱和度和亮度值来定义自己的颜色，示例如下：\n\
  \n```\nCircle()\n.fill(Color(red: 1.0, green: 0.0, blue: 0.0, opacity: 1.0))\n```\n\
  \n或\n\n```\nEllipse()\n.fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58))\n\
  ```\n\n另外两种改变形状外观的方式是：\n\n- 不透明度\n- 阴影\n\n不透明度定义了形状的实体或透明程度，低不透明度值使形状几乎透明，而高不透明度值使形状看起来更实体，如图\
  \ 5-4 所示。\n\n一组 2 条 ZStack、Text、Ellipse、fill、color 和 opacity 命令及其值，以及相应的文字“不透明度使形状变透明”。\n\
  \n**图 5-4**: 不透明度可以使形状呈现透明或实体效果\n\n要为形状定义不透明度，只需在定义颜色后添加 `.opacity` 修饰符，例如：\n\n\
  ```\n.fill(Color.purple.opacity(0.25))\n.fill(Color(hue: 1.7, saturation: 2.9, brightness:\
  \ 0.58).opacity(0.79))\n```\n\n另一种改变形状外观的方法是使用阴影。阴影可以出现在形状的外部边缘或内部边缘，如图 5-5 所示。\n\
  \n一组 2 张彩色渐变矩形插图及其对应的 fill、color、shadow、drop、inner 和 radius 命令。\n\n**图 5-5**: 阴影可以出现在形状边缘外部或边缘内部\n\
  \n要使阴影出现在形状外部，请使用 `.shadow` 修饰符并定义投影半径。高投影半径值使阴影更大，而低投影半径值使阴影更小但也更清晰。投影修饰符如下所示：\n\
  \n```\n.fill(Color.yellow.shadow(.drop(radius: 15)))\n```\n\n要使阴影出现在形状内部，请使用 `.shadow`\
  \ 修饰符并定义内阴影半径。高内阴影半径使阴影更大，而低内阴影半径使阴影更小。内阴影修饰符如下所示：\n\n```\n.fill(Color.yellow.shadow(.inner(radius:\
  \ 145)))\n```\n\n\n\n### 使用渐变为形状着色\n\n另一种添加颜色的方式是使用渐变，它能以不同方式扩散两种或多种颜色。SwiftUI 提供了三种类型的渐变，如图\
  \ 5-6 所示：\n\n![](img/329781_7_En_5_Fig6_HTML.jpg)\n\n一组三张插图，分别展示了胶囊形状、椭圆形状和矩形形状上的线性渐变、径向渐变和角度渐变。\n\
  \n图 5-6  \n可用的三种渐变类型\n\n- 线性渐变\n- 径向渐变\n- 角度渐变\n\n线性渐变需要定义两种或多种颜色，以及一个起点和一个终点。颜色存储在中括号内，起点和终点可以定义如图\
  \ 5-7 所示的以下位置之一：\n\n![](img/329781_7_En_5_Fig7_HTML.jpg)\n\n一张矩形颜色渐变边框的截图，上面带有 `dot\
  \ top leading`、`dot top`、`dot top trailing`、`dot trailing`、`dot bottom trailing`、`dot\
  \ bottom`、`dot bottom leading`、`dot leading` 和 `dot center` 等命令。\n\n图 5-7  \n线性渐变不同起点/终点的位置\n\
  \n- `bottom`\n- `bottomLeading`\n- `bottomTrailing`\n- `center`\n- `leading`\n-\
  \ `top`\n- `topLeading`\n- `topTrailing`\n- `trailing`\n\n要创建线性渐变，只需定义两种或多种颜色，以及起点和终点，如下所示：\n\
  \n```\nCapsule()\n.fill(LinearGradient(gradient: Gradient(colors: [.blue, .green,\
  \ .pink]), startPoint: .topLeading, endPoint: .bottomTrailing))\n```\n\n径向渐变会在由\
  \ `center` 参数（例如 `.center` 或 `.top`）指定的特定位置绘制一个圆形颜色。如果你选择 `.top` 这样的值，那么渐变中心将从形状的顶部中心开始，如图\
  \ 5-8 所示：\n\n![](img/329781_7_En_5_Fig8_HTML.jpg)\n\n一组针对椭圆、填充、径向渐变、渐变、颜色、中心、起始半径和结束半径的命令，并附有对应的椭圆颜色渐变插图。\n\
  \n图 5-8  \n`center` 参数定义了径向渐变中心开始的位置\n\n第一种颜色的大小由 `startRadius` 定义。`startRadius`\
  \ 值越小，第一种颜色的半径就越小。与 `startRadius` 值相比，`endRadius` 值越大，颜色混合得越扩散。与 `startRadius` 相比，`endRadius`\
  \ 值越小，颜色之间的边界就越清晰，如图 5-9 所示：\n\n![](img/329781_7_En_5_Fig9_HTML.jpg)\n\n一组针对椭圆、填充、径向渐变、渐变、颜色、中心、起始半径和结束半径的两条命令，并附有对应的椭圆颜色渐变插图。\n\
  \n图 5-9  \n比较径向渐变中的 `startRadius` 和 `endRadius` 值\n\n要创建径向渐变，需定义两种或多种颜色、渐变中心出现的位置（例如\
  \ `.center` 或 `.topLeading`），以及 `startRadius` 和 `endRadius`，如下所示：\n\n```\nEllipse()\n\
  .fill(RadialGradient(gradient: Gradient(colors: [.blue, .yellow]), center: .top,\
  \ startRadius: 10, endRadius: 65))\n```\n\n虽然线性渐变和径向渐变使用两种颜色就能很好地工作，但角度渐变在使用更多颜色时效果最佳。如果你只为角度渐变定义两种颜色，SwiftUI\
  \ 会将这两种颜色并排显示，然后它们会逐渐融合，如图 5-10 所示：\n\n![](img/329781_7_En_5_Fig10_HTML.jpg)\n\n\
  一组针对矩形、填充、角度渐变、渐变、颜色和中心的命令，并附有对应的矩形颜色渐变插图。\n\n图 5-10  \n仅显示两种不同颜色的角度渐变\n\n在角度渐变中，你定义的颜色越多，它们就越能相互融合。除了定义多种颜色之外，你只需定义角度渐变的中心，例如\
  \ `.center` 或 `.bottomTrailing`。要创建角度渐变，需定义多种颜色或多次重复相同的颜色（如图 5-11 所示），以及 `center`\
  \ 参数，例如：\n\n![](img/329781_7_En_5_Fig11_HTML.jpg)\n\n一组针对矩形、填充、角度渐变、渐变、颜色和中心的命令，并附有对应的矩形颜色渐变插图。\n\
  \n图 5-11  \n多次显示相同颜色的角度渐变\n\n```\nRectangle()\n.fill(AngularGradient(gradient: Gradient(colors:\
  \ [.green, .blue, .black, .green, .blue, .black, .green]), center: .center))\n```\n\
  \n\n\n## 显示图片\n\n就像 `Text` 视图允许你在用户界面上显示文本一样，`Image` 视图允许你在用户界面上显示图标和图形文件。如果你想显示存储在\
  \ SF Symbols 应用中的图标，可以使用如下 Swift 代码：\n\n```\nImage(systemName: \"hare.fill\")\n\
  ```\n\n当你想要显示一个 SF Symbol 图标时，必须使用 `systemName` 参数。由于图标通常很小，你可能希望放大它们。最简单的放大图标方法是定义一个更大的字体，例如`.largeTitle`\
  \ 或 `.custom`，如图 5-12 所示。\n\n![](img/329781_7_En_5_Fig12_HTML.jpg)\n\n一组由 3 个命令（image、system\
  \ name、font、large title、custom、size）和 3 个不同大小的乌龟图标构成的集合。\n\n图 5-12\n\n通过改变字体大小来修改\
  \ SF Symbol 图标的大小\n\n要显示一张图片，首先需要将其拖放到 Assets 文件夹中。然后，要显示存储在 Assets 文件夹中的图片，你可以使用\
  \ `Image` 视图并像这样指定图片名称：\n\n```\nImage(\"flag\")\n```\n\n图片可以是任意尺寸，但如果它们太大或太小，`Image`\
  \ 视图会以其原始尺寸显示。由于你可能需要调整图片大小以适配用户界面，你需要在 `Image` 视图上使用以下三个修饰符：\n\n- `.resizable()`\n\
  - `.aspectRatio(contentMode: z)`\n- `.frame(width: x, height: y)`\n\n`.resizable()`\
  \ 修饰符允许 `Image` 视图改变所显示图片的大小。如果 `Image` 视图缺少这个 `.resizable()` 修饰符，那么无论 `Image` 视图的尺寸如何，图片都会保持其原始大小。\n\
  \n`.frame(width: x, height: y)` 修饰符允许你定义 `Image` 视图的尺寸。与 `.resizable()` 修饰符一起使用时，`.frame`\
  \ 修饰符可以让你定义图片固定的宽度和高度。\n\n由于拉伸 `Image` 视图的宽度和高度可能会扭曲其内部显示的图片，`.aspectRatio` 修饰符允许你定义图片应如何响应。`.fill`\
  \ 选项将图片扩展至 `.frame` 修饰符定义的较大宽度或高度。`.fit` 选项将图片缩小至 `.frame` 修饰符定义的较小宽度或高度，如图 5-13\
  \ 所示。\n\n![](img/329781_7_En_5_Fig13_HTML.jpg)\n\n一组由 2 个命令（image、resizable、aspect\
  \ ratio、content mode、fill、fit、frame width、height）及其各自的 2 个不同尺寸的旗帜图标（在一个边框内外）构成的集合。\n\
  \n图 5-13\n\n在图片上使用 `.fill` 和 `.fit` 宽高比\n\n如果你想进一步调整宽高比，可以包含一个宽高比值，例如：\n\n```\n\
  Image(\"flag\")\n.resizable()\n.frame(width: 150, height: 150)\n.aspectRatio(0.5,\
  \ contentMode: .fill)\n```\n\n这个宽高比定义了宽度与高度的比例，因此值 `0.5` 表示宽度与高度之比为 1:2，而值 `0.75`\
  \ 则表示宽度与高度之比为 3:4。\n\n除了使用 `.aspectRatio` 修饰符并定义 `.fill` 或 `.fit` 的 `contentMode`，Swift\
  \ 还提供了另外两种选择：\n\n- `.scaleToFill()`\n- `.scaleToFit()`\n\n只需像这样用 `.scaleToFit` 或\
  \ `.scaleToFill` 修饰符替换 `.aspectRatio` 修饰符：\n\n```\nImage(\"flag\")\n.resizable()\n\
  .frame(width: 150, height: 150)\n.scaleToFill()\n```\n\n### 裁剪图片\n\n`Image` 视图可以显示别人绘制的剪贴画图片，也可以显示用数码相机拍摄的照片。通常，`Image`\
  \ 视图会在 `.frame` 修饰符定义的矩形内显示任何图片。然而，为了创造更独特的视觉效果，你可以通过使用 `.clipShape` 修饰符，用几何形状覆盖来裁剪图片。\n\
  \n`.clipShape` 修饰符接受任何常见的几何形状，例如：\n\n```\n.clipShape(Circle())\n```\n\n当使用其他几何形状（如\
  \ `Ellipse()` 或 `Capsule()`）时，请确保框架宽度足够宽。如果框架的宽度和高度相同，那么 `Ellipse()` 和 `Capsule()`\
  \ 形状看起来就像 `Circle()` 一样。图 5-14 展示了 `.clipShape(Circle())` 修饰符如何改变通常显示为矩形图片的外观。\n\
  \n![](img/329781_7_En_5_Fig14_HTML.jpg)\n\n一组由 2 个命令（image、resizable、scaled to fill、frame\
  \ width、height、clip shape）及其各自的 2 张猫的照片（矩形和圆形）构成的集合。\n\n图 5-14\n\n使用 `.clipShape()`\
  \ 修饰符\n\n### 为图片添加阴影\n\n突出显示 `Image` 视图外观的另一种方法是使用 `.shadow` 修饰符，它会在视图周围添加阴影。你可以通过定义其半径来调整阴影在视图周围出现的程度，例如：\n\
  \n```\n.shadow(color: .red, radius: 46, x: 0, y: 0)\n```\n\n`.shadow` 修饰符需要以下参数：\n\
  \n- **Color** – 定义阴影的颜色。\n- **Radius** – 定义阴影在视图周围的大小。\n- **X** – 定义阴影的 x（水平）偏移量。值为\
  \ `0` 时，阴影在水平方向上围绕视图居中。\n- **Y** – 定义阴影的 y（垂直）偏移量。值为 `0` 时，阴影在垂直方向上围绕视图居中。\n\n如果\
  \ `x` 和 `y` 的值非零，则阴影会偏离 `Image` 视图。如果 `x` 和 `y` 的值都为 `0`，则阴影会均匀地出现在 `Image` 视图的所有四个边缘周围，如图\
  \ 5-15 所示。\n\n![](img/329781_7_En_5_Fig15_HTML.jpg)\n\n一组由 2 个命令（image、resizable、scaled\
  \ to fill、frame width、height、clip shape、shadow、radius）及其各自的 2 张猫在桌子上的照片（矩形和圆形，带有渐变色阴影）构成的集合。\n\
  \n图 5-15\n\n使用不同的 `x` 和 `y` 值向 `Image` 视图添加阴影\n\n### 为图片添加边框\n\n为了进一步突出 `Image`\
  \ 视图，你可以使用 `.overlay` 修饰符在其周围添加边框，如下所示：\n\n```\n.overlay(Rectangle().stroke(Color.blue,\
  \ lineWidth: 10))\n```\n\n`.overlay` 修饰符需要以下参数：\n\n- **Shape** – 定义边框的形状以匹配 `Image`\
  \ 视图的形状\n- **Color** – 定义边框的颜色\n- **lineWidth** – 定义 `Image` 视图周围边框线的粗细\n\n图 5-16\
  \ 展示了 `.overlay` 修饰符的两种用法，它们使用了不同的形状、颜色和线条宽度。\n\n![](img/329781_7_En_5_Fig16_HTML.jpg)\n\
  \n一组由 2 个命令（image、resizable、scaled to fill、frame width、height、clip shape、shadow、radius、overlay、stroke、line\
  \ width）及其各自的 2 张猫在桌子上的照片（矩形和圆形，带有渐变色边框和阴影）构成的集合。\n\n图 5-16\n\n为 `.overlay` 修饰符使用不同的值\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n### 定义图像的不透明度\n\n另一种修改图像外观的方法是通过定义其不透明度。不透明度为\
  \ `0` 意味着图像完全不可见。不透明度为 `1` 意味着图像没有任何改变。不透明度越接近 `0`，图像越淡。不透明度越接近 `1`，图像越清晰。\n\n要使用\
  \ `opacity` 修饰符，只需定义一个从 `0` 到 `1` 的不透明度值，如下所示：\n\n```\n.opacity(0.75)\n```\n\n图\
  \ 5-17 展示了不同的不透明度值如何修改图像的外观。\n\n![](img/329781_7_En_5_Fig17_HTML.jpg)\n\n一组共 3 条命令，分别针对图像、可调整大小、缩放填充、框架宽高和不透明度值，以及相应的坐在布上的猫的照片。\n\
  \n**图 5-17.** 对 `.opacity` 修饰符使用不同的值\n\n通过改变不同视图的不透明度，你可以将它们堆叠在 `ZStack` 中，从而创造出有趣的视觉效果，如图\
  \ 5-18 所示。\n\n![](img/329781_7_En_5_Fig18_HTML.jpg)\n\n一组命令，包括 `ZStack`、图像、可调整大小、缩放填充、框架宽高、不透明度、圆角矩形、圆角半径、填充、颜色、偏移、文本和字体，以及一张不透明的坐在布上的猫的照片和“挪威森林猫”文本。\n\
  \n**图 5-18.** `.opacity` 修饰符与 `ZStack` 结合可以创造视觉效果\n\n## 总结\n\n图像是在用户界面上提供信息的另一种方式。图像可以是常见的几何形状（如圆形、椭圆和圆角矩形）、可以在\
  \ SF Symbols 应用中找到的图标、图形图像，或者是你拖放到 Xcode 项目 Assets 文件夹中的数码照片。\n\n如果你正在创建几何形状，你可以使用纯色、自定义颜色或渐变色填充它们，以创建多种颜色的有趣视觉混合。如果你使用的是\
  \ SF Symbol 图标，你可以使用 `.font` 修饰符调整它们的大小。如果你使用的是存储在 Xcode 项目 Assets 文件夹中的图像，你可以使用\
  \ `.resizable`、`.frame` 和 `.aspectRatio`/`.scaleToFit`/`.scaleToFill` 修饰符来定义图像的大小和外观。\n\
  \n为了创建额外的视觉效果，你可以将图像裁剪成几何形状（如圆形）、在图像周围添加边框和阴影，以及修改不透明度。有了这么多调整图像外观的方法，你应该能够按照自己的意愿，精确地定义图像在用户界面上的显示效果。\n\
  \n"
- "# 6. 使用按钮和分段控件响应用户\n\n每个用户界面都需要向用户显示信息，无论是文本还是图像。然而，用户界面的另一个特性是接受用户的命令。通过用户界面接受命令的最简单方式是通过按钮实现。\n\
  \n按钮代表一个单一的命令，可以像确认（如“确定”或“取消”）一样简单。要创建一个按钮，你需要定义：\n\n-   按钮上显示文本的标题\n-   用户点击按钮时运行的\
  \ Swift 代码\n\nSwiftUI 为你提供了两种创建按钮的方法。最简单的方法只需定义标题中要显示的文本，后跟用户选择按钮时要运行的 Swift 代码，如下所示：\n\
  \n```\nButton(\"点击此处\") {\n    // 要运行的代码\n}\n```\n\n创建按钮的第二种方法为你提供了更大的灵活性，可以修改按钮上文本的外观，例如：\n\
  \n```\nButton {\n    // 要运行的代码\n} label: {\n    Text(\"点击此处\")\n        .font(.largeTitle)\n\
  \        .foregroundColor(.green)\n        .padding()\n        .border(Color.red,\
  \ width: 6)\n}\n```\n\n第二种方法使用 `Text` 视图来定义标题上显示的文本。然后，它使用 `.font` 修饰符定义字体大小，使用\
  \ `.foregroundColor` 修饰符将文本显示为绿色，使用 `.padding` 修饰符在 `Text` 视图周围添加间距，并使用 `.border`\
  \ 修饰符为 `Text` 视图添加一个宽度为 6 点的红色边框。\n\n除了使用 `Text` 视图来定义按钮的标题，你还可以使用 `Label` 视图同时显示文本和图标，如下所示：\n\
  \n```\nButton {\n    // 要运行的代码\n} label: {\n    Label(\"图片按钮\", systemImage: \"\
  hare.fill\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n  \
  \      .padding()\n        .border(Color.blue, width: 6)\n}\n```\n\n这个 `Label` 视图定义了要显示的文本和图标，然后使用\
  \ `.font` 修饰符定义文本和图标的大小。它使用 `.foregroundColor` 修饰符将文本和图标显示为紫色，使用 `.padding` 修饰符在\
  \ `Label` 视图周围添加间距，并使用 `.border` 修饰符在 `Label` 视图周围显示一个宽度为 6 点的蓝色边框。\n\n你也可以使用 `Image`\
  \ 视图来使图像像按钮一样显示，如下所示：\n\n```\nButton {\n    // 要运行的代码\n} label: {\n    Image(\"\
  browncat\")\n        .resizable()\n        .frame(width: 150, height: 150)\n   \
  \     .clipShape(Circle())\n        .overlay(Circle().stroke(Color.yellow, lineWidth:\
  \ 4))\n}\n```\n\n这个 `Image` 视图使用了存储在 Assets 文件夹中的图像（名为 `\"browncat\"`），然后使用 `.frame`\
  \ 修饰符将图像压缩成一个宽高均为 150 的正方形。接着，它使用 `.clipShape` 修饰符将图像显示在一个圆形内，然后使用 `.overlay` 修饰符显示一个线宽为\
  \ 4 的黄色边框。\n\n通过使用第二种方法来定义按钮的标题，你可以看到如何对按钮标题的外观拥有更多控制，特别是与使用纯文本定义按钮的简单方法相比，如图 6-1\
  \ 所示。\n\n![](img/329781_7_En_6_Fig1_HTML.jpg)\n\n左侧是一段代码片段，右侧是相应的输出。代码用于定义 3 个不同的按钮：1.\
  \ 纯文本按钮、2. 自定义文本按钮、3. 带有兔子的图片按钮、4. 一个带有深色阴影轮廓的圆形小猫图像。\n\n**图 6-1.** 使用 `Text` 视图、`Label`\
  \ 视图或 `Image` 视图定义按钮的标题\n\n\n\n## 在按钮中运行代码\n\n你可以在按钮中存储任意代码，以便在用户点击时执行。按钮内常见的一种代码类型是用于改变状态的代码。在\
  \ SwiftUI 中，你可以像这样将特殊变量声明为 `State`（状态）变量：\n\n```\n@State var colorMe = false\n```\n\
  \n当你将更新后的数据存储到普通变量中时，程序中任何使用该变量的其他部分都无法获知数据已更新。要确保程序的所有部分都能接收到变量中存储的更新数据，过程可能既繁琐又容易出错。正因如此，SwiftUI\
  \ 提供了 `State` 变量来解决这个问题。\n\n当你更改 `State` 变量的值时，任何使用该 `State` 变量的部分都会自动获取该变量中存储的最新数据，无需编写任何额外代码。当一个变量持有一个值时，它处于一种状态；当同一个变量持有另一个不同的值时，则处于另一种状态。SwiftUI\
  \ 的 `State` 变量只是自动化了确保程序所有部分都能知晓变量值或状态变化的过程。\n\n前面的示例通过使用 `@State` 关键字创建了一个 `State`\
  \ 变量，后跟一个变量声明（`var`），该声明定义了变量的名称（`colorMe`）、数据类型（推断为布尔类型）和初始值（`false`）。\n\n在使用表示布尔数据类型的\
  \ `State` 变量时，一个常用的命令是 `.toggle()` 命令，它可以将布尔变量从 `true` 变为 `false`（或从 `false` 变为\
  \ `true`），例如：\n\n```\ncolorMe.toggle()\n```\n\n如果 `colorMe` 这个 `State` 变量的值是 `true`，那么\
  \ `.toggle()` 命令会将其值改为 `false`。如果 `colorMe` 这个 `State` 变量的值是 `false`，那么 `.toggle()`\
  \ 命令会将其值改为 `true`。\n\n布尔类型的 `State` 变量常用于进行 if-else 判断。通常情况下，修饰符只包含单个值，例如：\n\n```\n\
  .fill(Color.green)\n```\n\n然而，如果在修饰符中嵌入一个 if-else 三元运算符，你可以将传统的 if-else 语句压缩成一行，像这样：\n\
  \n```\n.fill(colorMe ? Color.green : Color.gray)\n```\n\n上述 Swift 代码会检查 `colorMe`\
  \ 变量的布尔值。如果为 `true`，则使用绿色；否则，使用灰色。\n\n现在，让我们看看如何将 `State` 变量、`.toggle()` 命令和 if-else\
  \ 三元运算符结合起来，使按钮能够响应用户操作。\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `Buttons`。\n\
  \n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 这行代码下方添加一个\
  \ `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n    @State var colorMe\
  \ = false\n    var body: some View {\n    ```\n\n    这定义了一个名为 `colorMe`（具体名称可任意）的\
  \ `State` 变量，将其初始值设为 `false`，并声明它仅能容纳布尔数据类型。\n\n4.  在 `var body: some View` 内部创建一个间距值为\
  \ 28 的 `VStack`，如下所示：\n\n    ```\n    struct ContentView: View {\n    @State var\
  \ colorMe = false\n    var body: some View {\n    VStack (spacing: 28) {\n    }\n\
  \    }\n    }\n    ```\n\n    间距 28 会将 `VStack` 内的所有视图分隔开，使它们不显得拥挤。\n\n5.  在 `VStack`\
  \ 内输入以下代码：\n\n    ```\n    Rectangle()\n    .fill(colorMe ? Color.green : Color.gray)\n\
  \    .frame(width: 250, height: 100)\n    ```\n\n    这会创建一个矩形，其中 `.frame` 修饰符将其宽度定义为\
  \ 250，高度定义为 100。请注意，`.fill` 修饰符使用了 `colorMe` 这个布尔型 `State` 变量来决定显示哪种颜色。如果 `colorMe`\
  \ 是 `true`，矩形显示为绿色；如果 `colorMe` 是 `false`，矩形显示为灰色。\n\n6.  在 `VStack` 内的 `Rectangle()`\
