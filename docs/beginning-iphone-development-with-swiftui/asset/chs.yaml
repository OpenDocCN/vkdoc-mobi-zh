  \n\n### 在标签栏中通过编程方式选择按钮\n\n要切换到不同的视图，用户只需点击标签栏中的某个标签即可。默认情况下，最左侧的第一个标签会高亮显示。但有时您可能需要通过代码来选择标签。此时，您需要使用\
  \ `.tag` 修饰符来标识每个 `.tabItem`。\n\n`.tag` 修饰符允许您通过一个固定值（例如 `2`）来标识每个标签。当每个 `.tabItem`\
  \ 都有唯一的 `.tag` 值时，您就可以通过 Swift 代码引用其 `.tag` 值来选择特定的标签。\n\n要了解如何通过 Swift 代码访问标签视图中的标签，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“TabViewTag”。\n2.  在导航窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 代码行下方添加一个状态变量，如下所示：\n    ```\n    struct\
  \ ContentView: View {\n    @State var selectedView = 1\n    ```\n4.  在 `var body:\
  \ some View` 代码行下方添加一个 `VStack` 和一个 `HStack`，并在 `HStack` 中添加四个按钮，如下所示：\n    ```\n\
  \    var body: some View {\n    VStack {\n    HStack {\n    Button (\"1\") {\n \
  \   selectedView = 1\n    }\n    Button (\"2\") {\n    selectedView = 2\n    }\n\
  \    Button (\"3\") {\n    selectedView = 3\n    }\n    Button (\"4\") {\n    selectedView\
  \ = 4\n    }\n    }\n    }\n    }\n    ```\n5.  在 `VStack` 内部、`HStack` 下方添加一个标签视图，如下所示：\n\
  \    ```\n    TabView (selection: $selectedView){\n    Text(\"One\")\n    .tabItem\
  \ {\n    Image(systemName: \"heart.fill\")\n    Text(\"One\")\n    }.tag(1)\n  \
  \  Text(\"Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"\
  Two\")\n    }.tag(2)\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
  \ \"tortoise.fill\")\n    Text(\"Three\")\n    }.tag(3)\n    Text(\"Four\")\n  \
  \  .tabItem {\n    Image(systemName: \"folder.fill\")\n    Text(\"Four\")\n    }.tag(4)\n\
  \    }\n    ```\n    整个 `ContentView` 文件应如下所示：\n    ```\n    import SwiftUI\n  \
  \  struct ContentView: View {\n    @State var selectedView = 1\n    var body: some\
  \ View {\n    VStack {\n    HStack {\n    Button (\"1\") {\n    selectedView = 1\n\
  \    }\n    Button (\"2\") {\n    selectedView = 2\n    }\n    Button (\"3\") {\n\
  \    selectedView = 3\n    }\n    Button (\"4\") {\n    selectedView = 4\n    }\n\
  \    }\n    TabView (selection: $selectedView){\n    Text(\"One\")\n    .tabItem\
  \ {\n    Image(systemName: \"heart.fill\")\n    Text(\"One\")\n    }.tag(1)\n  \
  \  Text(\"Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"\
  Two\")\n    }.tag(2)\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
  \ \"tortoise.fill\")\n    Text(\"Three\")\n    }.tag(3)\n    Text(\"Four\")\n  \
  \  .tabItem {\n    Image(systemName: \"folder.fill\")\n    Text(\"Four\")\n    }.tag(4)\n\
  \    }\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n\
  \    static var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\
  \    此代码会创建一个标签视图，并在屏幕顶部创建四个分别标记为 1、2、3 和 4 的按钮。\n6.  点击画布窗格中的“实时”图标。\n7.  点击屏幕顶部的编号按钮。请注意，如果您点击按钮\
  \ 2，标签栏中的第二个标签将被选中。如果您点击按钮 4，标签栏中的第四个标签将被选中。`.tag` 修饰符为您提供了一种通过 Swift 代码访问特定标签的方法。\n\
  \n## 显示页面视图\n\n通常，标签视图会在屏幕底部显示标签，以便用户选择一个标签并跳转到不同的视图。作为一种替代方案，您可以将标签视图转换为页面视图。页面视图会在屏幕底部中央显示代表不同屏幕的标签栏图标。然后，用户可以向左或向右滚动，按顺序查看每个屏幕。\n\
  \n要将标签视图转换为页面视图，只需向标签视图添加 `.tabViewStyle` 修饰符并指定 `.page`，如下所示：\n\n```\nTabView {\n\
  }.tabViewStyle(.page)\n```\n\n现在，用户不必从屏幕底部选择标签来打开视图，而是可以向左或向右滚动以按顺序打开每个视图。为了提供可用视图数量的视觉映射，您可以添加\
  \ `.indexViewStyle` 修饰符，并为 `backgroundDisplayMode` 指定 `.always`，如下所示：\n\n```\nTabView\
  \ {\n}.tabViewStyle(.page)\n.indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
  \ .always))\n```\n\n要了解页面视图的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_18_Fig5_HTML.jpg)\n\
  \n一个包含 6 个图标的片段，包括一个心形、一个兔子、一只乌龟、一个文件、一个文件夹和一个圆圈。\n\n**图 18-5** 页面视图底部的图标栏\n\n1.\
  \  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“PageView”。\n2.  在导航窗格中点击 `ContentView` 文件。\n\
  3.  在 `var body: some View` 代码行内部添加一个标签视图，如下所示：\n    ```\n    TabView {\n    Text(\"\
  One\")\n    .tabItem {\n    Image(systemName: \"heart.fill\")\n    }\n    Text(\"\
  Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n    }\n    Text(\"\
  Three\")\n    .tabItem {\n    Image(systemName: \"tortoise.fill\")\n    }\n    Text(\"\
  Four\")\n    .tabItem {\n    Image(systemName: \"folder.fill\")\n    }\n    Text(\"\
  Five\")\n    .tabItem {\n    Image(systemName: \"tray.fill\")\n    }\n    Text(\"\
  Six\")\n    .tabItem {\n    Image(systemName: \"keyboard.fill\")\n    }\n    }\n\
  \    ```\n    您可以为每个 `Text` 视图选择不同的文本，并为每个 `Image` 视图选择不同的 SF Symbol 图标。请注意，您只需为每个\
  \ `.tabItem` 添加一个 `Image` 视图，无需添加 `Text` 视图。\n4.  向标签视图添加 `.tabViewStyle` 和 `.indexViewStyle`\
  \ 修饰符，如下所示：\n    ```\n    TabView {\n    Text(\"One\")\n    .tabItem {\n    Image(systemName:\
  \ \"heart.fill\")\n    }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName:\
  \ \"hare.fill\")\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
  \ \"tortoise.fill\")\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName:\
  \ \"folder.fill\")\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName:\
  \ \"tray.fill\")\n    }\n    Text(\"Six\")\n    .tabItem {\n    Image(systemName:\
  \ \"keyboard.fill\")\n    }\n    }.tabViewStyle(.page)\n    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
  \ .always))\n    ```\n    这会将每个 Image 显示为屏幕底部中央的图标列表，如图 18-5 所示。\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n1.  点击画布窗格中的“实时”图标。\n2.  从右向左（以及从左向右）拖动鼠标，从一个视图滑动到下一个视图。请注意，每次执行此操作时，屏幕底部都会有一个不同的图标高亮显示，以提示您当前位于哪个视图，以及当前显示视图之前和之后还有多少其他视图。\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View {\nTabView\
  \ {\nText(\"One\")\n.tabItem {\nImage(systemName: \"heart.fill\")\n}\nText(\"Two\"\
  )\n.tabItem {\nImage(systemName: \"hare.fill\")\n}\nText(\"Three\")\n.tabItem {\n\
  Image(systemName: \"tortoise.fill\")\n}\nText(\"Four\")\n.tabItem {\nImage(systemName:\
  \ \"folder.fill\")\n}\nText(\"Five\")\n.tabItem {\nImage(systemName: \"tray.fill\"\
  )\n}\nText(\"Six\")\n.tabItem {\nImage(systemName: \"keyboard.fill\")\n}\n}.tabViewStyle(.page)\n\
  .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))\n}\n}\nstruct\
  \ ContentView_Previews: PreviewProvider {\nstatic var previews: some View {\nContentView()\n\
  }\n}\n```\n\n\n\n### 在标签视图中显示结构\n\n虽然标签视图可以像 `Text` 或 `Image` 视图那样显示单个视图，但很多时候你可能希望显示一个全新的用户界面。由于你可以使用结构来定义用户界面屏幕，因此你可以创建多个屏幕，每个屏幕使用一个不同的结构，这些屏幕都可以显示在标签视图中。\n\
  \n创建新结构最简单的方法是在 `ContentView` 文件中进行。但是，这可能会使代码变得杂乱，因此第二种方法是将该结构存储在一个单独的文件中。\n\n\
  要了解如何创建定义另一个用户界面屏幕的结构，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“TabViewStructures”。\n\
  2.  在导航窗格中点击 `ContentView` 文件。\n3.  在 `var body: some View ` 行内添加一个 `TabView`，如下所示：\n\
  \n```\n    var body: some View {\n    TabView {\n    }\n    }\n```\n\n4.  在 `TabView`\
  \ 内部添加如下代码：\n\n```\n    var body: some View {\n    TabView {\n    FileView()\n \
  \   .tabItem {\n    Image(systemName: \"heart.fill\")\n    Text(\"First\")\n   \
  \ }\n    SeparateFileView()\n    .tabItem {\n    Image(systemName: \"hare.fill\"\
  )\n    Text(\"Second\")\n    }\n    }\n    }\n```\n\n上述代码显示了两个名为 `FileView()` 和\
  \ `SeparateFileView()` 的视图，我们需要使用结构来定义它们。\n\n5.  在整个 `struct ContentView: View`\
  \ 结构下方添加如下结构：\n\n```\n    struct FileView: View {\n    var body: some View {\n \
  \   HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    Text(\"This is a separate\
  \ structure\")\n    Text(\"that's stored in the same file\")\n    Spacer()\n   \
  \ }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    var body:\
  \ some View {\n    TabView {\n    FileView()\n    .tabItem {\n    Image(systemName:\
  \ \"heart.fill\")\n    Text(\"First\")\n    }\n    SeparateFileView()\n    .tabItem\
  \ {\n    Image(systemName: \"hare.fill\")\n    Text(\"Second\")\n    }\n    }\n\
  \    }\n    }\n    struct FileView: View {\n    var body: some View {\n    HStack\
  \ {\n    Spacer()\n    VStack {\n    Spacer()\n    Text(\"This is a separate structure\"\
  )\n    Text(\"that's stored in the same file\")\n    Spacer()\n    }\n    Spacer()\n\
  \    }.background(Color.yellow)\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n```\n\n我们可以继续在 `ContentView` 文件中添加新的结构，但这有使文件变得杂乱的风险。创建结构的第二种方法是将它们存储在一个单独的文件中，接下来的步骤将指导我们完成此操作。\n\
  \n6.  选择 **文件** ➤ **新建** ➤ **文件**。 将出现一个对话框。\n7.  点击对话框顶部的 **iOS**，点击 **Swift 文件**，然后点击\
  \ **下一步**。 Xcode 会要求为你刚刚创建的文件命名。\n8.  输入 `SeparateFile` 并点击 **创建**。 Xcode 会创建一个新的\
  \ Swift 文件。\n9.  删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\n    import SwiftUI\n\
  \    struct SeparateFileView: View {\n    var body: some View {\n    HStack {\n\
  \    Spacer()\n    VStack {\n    Spacer()\n    Text(\"This is another structure\"\
  )\n    Text(\"but stored in a separate file\")\n    Spacer()\n    }\n    Spacer()\n\
  \    }.background(Color.orange)\n    }\n    }\n    struct SeparateFileView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    SeparateFileView()\n\
  \    }\n    }\n```\n\n**注意**\n\n当将结构存储在单独的文件中时，你需要第二个结构（`PreviewProvider`）才能在画布窗格中显示用户界面。\n\
  \n1.  在导航窗格中点击 `ContentView` 文件。\n2.  点击画布窗格中的 **Live** 图标。 注意，`FileView` 结构会出现，因为标签栏中的\
  \ **First** 图标默认被选中。\n3.  点击标签栏中的 **Second** 图标。 注意，这会显示在 `SeparateFile` 文件中定义的\
  \ `SeparateFileView` 结构。\n\n在标签视图中显示由结构定义的视图要常见得多。你可以将定义视图的结构存储在同一个文件或不同的文件中。\n\n\
  ### 在标签视图中结构间传递数据\n\n之前的项目创建了两个结构，其中一个结构存储在 `ContentView` 文件中，另一个结构存储在一个单独的文件中。在这两种情况下，这些结构都定义了显示静态信息的用户界面，这些信息与原始结构（`ContentView`）中的任何内容都没有关联。\n\
  \n在许多情况下，你可能希望将一个结构中的数据传递到另一个结构中。这意味着我们必须将数据从一个结构传递到另一个结构。\n\n幸运的是，这项任务类似于在函数之间传递数据。当结构需要接收数据时，我们只需要创建一个变量来声明一个属性，给该变量起一个描述性的名称，并定义该变量可以保存的数据类型，例如\
  \ `String` 或 `Double`，如下所示：\n\n```\nstruct FileView: View {\nvar choice: String\n\
  ```\n\n这定义了一个名为“choice”的变量，它可以保存一个 `String`。要将数据传递到此结构，我们可以通过调用结构名称（`FileView`）并将此“choice”变量作为参数传入来加载此结构，如下所示：\n\
  \n```\nFileView(choice: \"Heads\")\n```\n\n当向存储在同一个文件中的结构传递数据时，我们只需遵循以下两步过程：\n\n\
  *   在结构内部声明一个或多个变量以接收数据。\n*   使用其变量作为参数调用该结构。\n\n但是，当向存储在单独文件中的结构传递数据时，还需要额外的一步。因为存储在单独文件中的结构还包含一个在画布窗格中显示用户界面的第二个结构，所以这个预览结构必须包含该结构的参数并同时向其传递数据，如下所示：\n\
  \n```\nstruct SeparateFileView_Previews: PreviewProvider {\nstatic var previews:\
  \ some View {\nSeparateFileView(passedData: \"\")\n}\n}\n```\n\n要了解如何在标签视图中结构间传递数据，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名，例如“TabViewPassData”。\n2.  在导航窗格中点击 `ContentView`\
  \ 文件。\n3.  像这样编辑 `struct ContentView` 结构：\n\n```\n    struct ContentView: View {\n\
  \    @State var message = \"\"\n    var body: some View {\n    TabView {\n    TextField(\"\
  Type here\", text: $message)\n    .tabItem {\n    Image(systemName: \"house.fill\"\
  )\n    Text(\"Home\")\n    }\n    FileView(choice: message)\n    .tabItem {\n  \
  \  Image(systemName: \"heart.fill\")\n    Text(\"First\")\n    }\n    SeparateFileView(passedData:\
  \ message)\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"Second\"\
  )\n    }\n    }\n    }\n    }\n```\n\n上述代码定义了一个名为 `FileView` 的结构，其参数为 `choice:`，该参数接收状态变量\
  \ `message`。第二个结构名为 `SeparateFileView`，其参数为 `passedData:`，该参数同样接收状态变量 `message`。\n\
  \n4.  在 `struct ContentView` 下方添加一个新结构，如下所示：\n\n```\n    struct FileView: View {\n\
  \    var choice: String\n    var body: some View {\n    HStack {\n    Spacer()\n\
  \    VStack {\n    Spacer()\n    Text(\"You typed = \\(choice)\")\n    Spacer()\n\
  \    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n```\n\n这个 `FileView`\
  \ 结构声明了一个可以保存 `String` 的 `choice` 变量。然后，它在一个显示“You typed = ”的 `Text` 视图中显示这个 `choice`\
  \ 变量。整个 `ContentView` 文件应如下所示：\n\n\n```swift\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var message = \"\"\n    var body: some View {\n        TabView\
  \ {\n            TextField(\"在此输入\", text: $message)\n                .tabItem {\n\
  \                    Image(systemName: \"house.fill\")\n                    Text(\"\
  主页\")\n                }\n            FileView(choice: message)\n              \
  \  .tabItem {\n                    Image(systemName: \"heart.fill\")\n         \
  \           Text(\"第一个\")\n                }\n            SeparateFileView(passedData:\
  \ message)\n                .tabItem {\n                    Image(systemName: \"\
  hare.fill\")\n                    Text(\"第二个\")\n                }\n        }\n\
  \    }\n}\n\nstruct FileView: View {\n    var choice: String\n    var body: some\
  \ View {\n        HStack {\n            Spacer()\n            VStack {\n       \
  \         Spacer()\n                Text(\"你输入的内容 = \\(choice)\")\n            \
  \    Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n这段代码创建了一个名为 `FileView` 的结构体，但现在我们需要创建第二个名为\
  \ `SeparateFileView` 的结构体，其中声明了一个 `passedData` 字符串变量。\n\n5. 选择 文件 ➤ 新建 ➤ 文件。此时会弹出一个对话框。\n\
  \n6. 点击对话框顶部的 iOS，点击 Swift 文件，然后点击 下一步。Xcode 会要求你为新创建的文件命名。\n\n7. 输入 `SeparateFile`\
  \ 并点击 创建。Xcode 会创建一个新的 Swift 文件。\n\n8. 删除 `SeparateFile` 中当前的所有代码，并替换为以下内容：\n\n\
  ```swift\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    var passedData:\
  \ String\n    var body: some View {\n        HStack {\n            Spacer()\n  \
  \          VStack {\n                Spacer()\n                Text(\"来自文本框的字符串\
  \ = \\(passedData)\")\n                Spacer()\n            }\n            Spacer()\n\
  \        }.background(Color.orange)\n    }\n}\n\nstruct SeparateFileView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        SeparateFileView(passedData:\
  \ \"\")\n    }\n}\n```\n\n这个文件创建了一个 `SeparateFileView` 结构体，其中声明了一个 `passedData`\
  \ 字符串变量。由于这个 `SeparateFileView` 结构体存储在一个单独的文件中，它包含一个 `PreviewProvider` 结构体，其中我们也必须使用\
  \ `passedData` 参数。\n\n9. 点击导航面板中的 `ContentView` 以返回 `ContentView` 结构体。\n\n10. 点击画布面板中的实时图标。此时会出现\
  \ `TextField`。\n\n11. 点击 `TextField` 并输入一个单词或短句。\n\n12. 点击标签栏中的心形图标。这将把你输入到 `TextField`\
  \ 中的字符串传递过去，并显示在 `FileView` 结构体中。\n\n13. 点击标签栏中的兔子图标。这将把你输入到 `TextField` 中的字符串传递过去，并显示在\
  \ `SeparateFileView` 结构体中。\n\n### 在标签视图中的结构体之间更改数据\n\n之前的项目创建了两个结构体，其中一个存储在 `ContentView`\
  \ 文件中，另一个存储在单独的文件中。在这两种情况下，结构体都定义了接收数据并显示数据的用户界面。\n\n如果我们想将数据传递到一个结构体中，然后允许该结构体修改这些数据，该怎么办？这需要进行几项更改：\n\
  \n- 创建一个 `State` 变量。\n- 打开另一个结构体，并将该结构体与 `State` 变量的绑定（使用 `$` 符号）传递给它，例如：\n- 在接收数据的结构体中定义一个\
  \ `@Binding` 变量。\n- 在接收数据的结构体中更改该 `Binding` 变量。\n\n```\nFileView(choice: $message)\n\
  ```\n\n要了解如何在标签视图中的结构体之间更改数据，请执行以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如\
  \ \"TabViewBindingData\"。\n\n2. 点击导航面板中的 `ContentView` 文件。\n\n3. 在 `struct ContentView:\
  \ View` 下方创建一个 `State` 变量，如下所示：\n\n```\nstruct ContentView: View {\n    @State var\
  \ message = \"\"\n```\n\n4. 在 `var body: some View` 内部添加一个 `TabView`，如下所示：\n\n```\n\
  var body: some View {\n    TabView {\n        TextField(\"在此输入\", text: $message)\n\
  \            .tabItem {\n                Image(systemName: \"house.fill\")\n   \
  \             Text(\"主页\")\n            }\n        FileView(choice: $message)\n\
  \            .tabItem {\n                Image(systemName: \"heart.fill\")\n   \
  \             Text(\"第一个\")\n            }\n        SeparateFileView(passedData:\
  \ $message)\n            .tabItem {\n                Image(systemName: \"hare.fill\"\
  )\n                Text(\"第二个\")\n            }\n    }\n}\n```\n\n请注意，`FileView`\
  \ 将一个绑定变量（`$message`）传递给了 `\"choice:\"` 参数。第二个名为 `SeparateFileView` 的结构体将相同的绑定变量（`$message`）传递给了\
  \ `\"passedData\"` 参数。\n\n5. 在 `struct ContentView: View` 结构体下方添加以下结构体：\n\n```\n\
  struct FileView: View {\n    @Binding var choice: String\n    var body: some View\
  \ {\n        HStack {\n            Spacer()\n            VStack {\n            \
  \    Spacer()\n                TextField(\"在此输入:\", text: $choice)\n           \
  \     Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n```\n\n请注意，这个结构体声明了一个名为 `\"choice\"` 的 `@Binding` 变量，它可以保存一个 `String`。该结构体使用一个\
  \ `TextField` 来更改这个 `@Binding` 变量（`$choice`），这会自动将更改发送回 `ContentView` 结构体。\n\n整个\
  \ `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
  \    @State var message = \"\"\n    var body: some View {\n        TabView {\n \
  \           TextField(\"在此输入\", text: $message)\n                .tabItem {\n  \
  \                  Image(systemName: \"house.fill\")\n                    Text(\"\
  主页\")\n                }\n            FileView(choice: $message)\n             \
  \   .tabItem {\n                    Image(systemName: \"heart.fill\")\n        \
  \            Text(\"第一个\")\n                }\n            SeparateFileView(passedData:\
  \ $message)\n                .tabItem {\n                    Image(systemName: \"\
  hare.fill\")\n                    Text(\"第二个\")\n                }\n        }\n\
  \    }\n}\n\nstruct FileView: View {\n    @Binding var choice: String\n    var body:\
  \ some View {\n        HStack {\n            Spacer()\n            VStack {\n  \
  \              Spacer()\n                TextField(\"在此输入:\", text: $choice)\n \
  \               Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
  \    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n6. 选择 文件 ➤ 新建 ➤ 文件。此时会弹出一个对话框。\n\
  \n7. 点击对话框顶部的 iOS，点击 Swift 文件，然后点击 下一步。Xcode 会要求你为新创建的文件命名。\n\n8. 输入 `SeparateFile`\
  \ 并点击 创建。Xcode 会创建一个新的 Swift 文件。\n\n9. 删除 `SeparateFile` 中当前的所有代码，并替换为以下内容：\n\n\
  ```\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    @Binding var passedData:\
  \ String\n    var body: some View {\n        HStack {\n            Spacer()\n  \
  \          VStack {\n                Spacer()\n                TextField(\"在此输入\"\
  , text: $passedData)\n                Spacer()\n            }\n            Spacer()\n\
  \        }.background(Color.orange)\n    }\n}\n\nstruct SeparateFileView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        SeparateFileView(passedData:\
  \ .constant(\"\"))\n    }\n}\n```\n\n请注意，这个结构体声明了一个名为 `\"passedData\"` 的 `@Binding`\
  \ 变量，它可以保存一个 `String`。`TextField` 可以更改这个变量（`$passedData`）并自动将更改发送回 `ContentView`\
  \ 结构体。\n\n还要注意，由于此结构体存储在一个单独的文件中，`PreviewProvider` 结构体也必须通过为其赋予 `.constant(\"\"\
  )` 来包含 `\"passedData\"` 参数。\n\n10. 点击导航面板中的 `ContentView` 文件。\n\n11. 点击画布面板中的实时图标。\n\
  \n12. 点击 `TextField` 并输入一个短语。\n\n13. 点击心形图标，将字符串传递到存储在 `ContentView` 文件中的 `FileView`\
  \ 结构体。\n\n14. 点击由 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击主页标签返回显示修改后数据的 `ContentView`\
  \ 结构体。\n\n15. 编辑此数据。\n\n16. 点击兔子标签，将字符串传递到存储在单独文件中的 `SeparateFileView` 结构体。请注意，你现在编辑的数据会出现在\
  \ `SeparateFileView` 结构体中。\n\n17. 点击由 `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击主页标签返回显示修改后数据的\
  \ `ContentView` 结构体。\n```\n\n\n## 在标签视图中分享结构体之间的数据\n\n使用`@State`和`@Binding`变量可以让多个视图共享和修改数据。不过，SwiftUI\
  \ 还提供了另一种在结构体之间分享数据的方式。首先，创建一个包含一个或多个待分享变量的 `ObservableObject` 类。每个变量都必须像这样标记为 `@Published`：\n\
  \n```swift\nclass ShareString: ObservableObject {\n    @Published var message =\
  \ \"\"\n}\n```\n\n包含标签视图的结构体（例如 `ContentView`）需要定义一个 `@StateObject` 变量，该变量定义了一个来自\
  \ `ObservableObject` 类的对象，示例如下：\n\n```swift\n@StateObject var showMe = ShareString()\n\
  ```\n\n由于我们希望在整个标签视图内的所有视图之间分享这个 `ObservableObject`，我们需要将 `.environmentObject` 修饰符添加到\
  \ `TabView` 中，并传入要分享的 `StateObject`，如下所示：\n\n```swift\nTabView {\n    // ...\n}.environmentObject(showMe)\n\
  ```\n\n在每个需要访问该 `ObservableObject` 的结构体内部，我们需要声明一个 `@EnvironmentObject` 变量，该变量使用该\
  \ `ObservableObject` 类，示例如下：\n\n```swift\n@EnvironmentObject var choice: ShareString\n\
  ```\n\n最后，在每个定义了 `@EnvironmentObject` 的结构体内部，我们可以通过使用 `@EnvironmentObject` 的名称加上\
  \ `@Published` 属性名来访问要分享的实际数据，如下所示：\n\n```swift\n$choice.message\n```\n\n在这个例子中，\"\
  choice\" 是 `@EnvironmentObject` 的名称，而 \"message\" 是在 `ObservableObject` 中定义的 `@Published`\
  \ 属性。要了解如何使用 `ObservableObject` 分享数据，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\
  \ \"TabViewObservable\"。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `import SwiftUI`\
  \ 代码行下方创建一个 `ObservableObject` 类，如下所示：\n\n```swift\nclass ShareString: ObservableObject\
  \ {\n    @Published var message = \"\"\n}\n```\n\n`@Published` 变量将包含要在标签视图内的结构体之间分享的数据。\n\
  \n4. 在 `struct ContentView: View` 代码行下方创建一个 `StateObject` 变量，如下所示：\n\n```swift\n\
  struct ContentView: View {\n    @StateObject var showMe = ShareString()\n```\n\n\
  这会基于 `ShareString` 这个 `ObservableObject` 创建一个新对象（`showMe`）。\n\n5. 在 `var body: some\
  \ View` 代码行内部添加一个 `TabView`，如下所示：\n\n```swift\nvar body: some View {\n    TabView\
  \ {\n        TextField(\"在此输入\", text: $showMe.message)\n            .tabItem {\n\
  \                Image(systemName: \"house.fill\")\n                Text(\"首页\"\
  )\n            }\n        FileView()\n            .tabItem {\n                Image(systemName:\
  \ \"heart.fill\")\n                Text(\"第一页\")\n            }\n        SeparateFileView()\n\
  \            .tabItem {\n                Image(systemName: \"hare.fill\")\n    \
  \            Text(\"第二页\")\n            }\n    }.environmentObject(showMe)\n}\n\
  ```\n\n确保在 `TabView` 的末尾添加了 `.environmentObject(showMe)` 修饰符。这允许分享 `showMe` 这个 `ObservableObject`（即\
  \ `ShareString` 类）。上述 `TabView` 会打开名为 `FileView` 和 `SeparateFileView` 的结构体，接下来我们需要创建它们。\n\
  \n6. 在 `struct ContentView` 结构体下方添加以下结构体，如下所示：\n\n```swift\nstruct FileView: View\
  \ {\n    @EnvironmentObject var choice: ShareString\n    var body: some View {\n\
  \        HStack {\n            Spacer()\n            VStack {\n                Spacer()\n\
  \                TextField(\"在此输入：\", text: $choice.message)\n                Spacer()\n\
  \            }\n            Spacer()\n        }.background(Color.yellow)\n    }\n\
  }\n```\n\n请注意，此结构体定义了一个可以持有 `ShareString` 这个 `ObservableObject` 的 `@EnvironmentObject`\
  \ 变量。在 `TextField` 中，我们必须将文本存储在使用 \"message\" 这个 `@Published` 属性（`$choice.message`）的\
  \ \"choice\" `@EnvironmentObject` 中。整个 `ContentView` 文件应该如下所示：\n\n```swift\nimport\
  \ SwiftUI\n\nclass ShareString: ObservableObject {\n    @Published var message =\
  \ \"\"\n}\n\nstruct ContentView: View {\n    @StateObject var showMe = ShareString()\n\
  \    var body: some View {\n        TabView {\n            TextField(\"在此输入\", text:\
  \ $showMe.message)\n                .tabItem {\n                    Image(systemName:\
  \ \"house.fill\")\n                    Text(\"首页\")\n                }\n       \
  \     FileView()\n                .tabItem {\n                    Image(systemName:\
  \ \"heart.fill\")\n                    Text(\"第一页\")\n                }\n      \
  \      SeparateFileView()\n                .tabItem {\n                    Image(systemName:\
  \ \"hare.fill\")\n                    Text(\"第二页\")\n                }\n       \
  \ }.environmentObject(showMe)\n    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject\
  \ var choice: ShareString\n    var body: some View {\n        HStack {\n       \
  \     Spacer()\n            VStack {\n                Spacer()\n               \
  \ TextField(\"在此输入：\", text: $choice.message)\n                Spacer()\n      \
  \      }\n            Spacer()\n        }.background(Color.yellow)\n    }\n}\n\n\
  struct ContentView_Previews: PreviewProvider {\n    static var previews: some View\
  \ {\n        ContentView()\n    }\n}\n```\n\n7. 选择**文件** ➤ **新建** ➤ **文件**。会弹出一个对话框。\n\
  8. 点击对话框顶部的 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode 会要求为你新建的文件命名。\n9. 输入 `SeparateFile`\
  \ 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。\n10. 删除 `SeparateFile` 中当前的所有代码，并用以下代码替换：\n\
  \n```swift\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    @EnvironmentObject\
  \ var passedData: ShareString\n    var body: some View {\n        HStack {\n   \
  \         Spacer()\n            VStack {\n                Spacer()\n           \
  \     TextField(\"在此输入\", text: $passedData.message)\n                Spacer()\n\
  \            }\n            Spacer()\n        }.background(Color.orange)\n    }\n\
  }\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        SeparateFileView()\n    }\n}\n```\n\n请注意，此结构体也声明了一个可以持有 `ShareString`\
  \ 这个 `ObservableObject` 的 `@EnvironmentObject`。然后 `TextField` 使用 \"passedData\"\
  \ 这个 `@EnvironmentObject` 来访问 \"message\" 这个 `@Published` 属性（`$passedData.message`）。\n\
  \n11. 在导航器窗格中点击 `ContentView` 文件。\n12. 在画布窗格中点击 **Live** 图标。\n13. 点击 `TextField`\
  \ 并输入一个短语。\n14. 点击 **心形** 标签。请注意，你在第 13 步输入的内容现在出现在了 `FileView` 的 `TextField` 中。\n\
  15. 编辑 `TextField` 中的文本，然后点击 **首页** 标签。请注意，修改后的文本现在出现在了 `ContentView` 的 `TextField`\
  \ 中。\n16. 编辑 `TextField` 中的文本，然后点击 **野兔** 标签。编辑后的文本现在出现在了 `SeparateFileView` 的 `TextField`\
  \ 中。\n17. 编辑 `TextField` 中的文本，然后点击 **首页** 标签。请注意，修改后的文本现在出现在了 `ContentView` 的 `TextField`\
  \ 中。这一切都展示了各个结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n\n## 总结\n\n标签视图提供了另一种显示多个视图的方式，其中每个视图都可以通过屏幕底部的标签来代表。标签视图可以打开像\
  \ `Text` 或 `Image` 视图这样简单的视图，但更常见的是打开由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\n\
  标签视图可以将数据传递给另一个视图，这类似于将数据传递给函数。这个其他视图需要定义一个属性，然后标签视图可以将数据传递给该属性。如果你希望将数据传递给另一个可以修改数据的视图，可以使用两种不同的方法。\n\
  \n第一种方法使用 `@State` 和 `@Binding` 变量，并强制标签视图将数据传递给它打开的每一个视图。第二种方法使用 `ObservableObjects`、`StateObjects`\
  \ 和 `EnvironmentObjects` 在多个视图之间分享数据。\n\n标签视图最多可以在屏幕底部显示五个标签。如果你定义了超过五个标签，SwiftUI\
  \ 会自动创建一个**更多**标签，并在导航堆栈中显示所有额外的标签。\n\n由于标签视图只能在屏幕底部显示五个标签，你可以将标签视图转换为页面视图。这样你就可以在屏幕底部显示超过五个图标。与标签视图不同，页面视图强制用户按顺序在屏幕之间导航。当用户需要跳转到应用用户界面中的不同屏幕时，标签视图非常方便。\n\
  \n\n\n# 使用网格\n\n`Text` 视图适合显示文本，而 `Image` 视图则非常适合显示图形。但是，如果你想要在屏幕上显示多个数据块呢？这时就可以使用网格了，它能以行（水平）或列（垂直）的形式显示数据，如图\
  \ 19-1 所示。\n\n![两组由 4 个方框组成的集合，分别垂直和水平排列。垂直网格：一列中有 4 个方框。水平网格：一行中有 4 个方框。](img/329781_7_En_19_Fig1_HTML.jpg)\n\
  \n**图 19-1** 网格可以水平或垂直地显示数据\n\n创建网格需要三个要素：\n\n- 你想要显示的数据\n- 一个 `GridItem` 数组，用于定义如何在网格中排列数据\n\
  - 一个 `LazyVGrid` 或 `LazyHGrid`，用于将数据放置在 `GridItem` 数组中\n\n术语“Lazy”（懒加载）指的是网格加载数据的方式。如果一个网格需要显示\
  \ 1000 个项目，它可能会将全部 1000 个项目加载到内存中，即使其中大部分项目无法显示在屏幕上。这会造成内存浪费，因此“懒加载”网格只加载那些需要显示的项目。一旦用户滚动以查看更多数据，懒加载网格会立即加载这些项目。通过等到最后一刻才加载数据，懒加载网格使用的内存要少得多，并且能让应用运行更高效，代价是运行速度会略慢一些。\n\
  \n**注意：** 懒加载网格通常嵌入在 `ScrollView` 中，以便用户滚动查看更多存储在网格中的数据。\n\n要了解如何创建一个简单的水平和垂直网格，请遵循以下步骤：\n\
  \n![两组数字集合，分别垂直和水平排列。垂直网格：方框中标记了数字 1 到 9，并排成一列。水平网格：圆圈中标记了数字 1 到 8，并排成一行。](img/329781_7_En_19_Fig2_HTML.jpg)\n\
  \n**图 19-2** 在垂直网格上方显示一个水平网格\n\n1. 创建一个新的 SwiftUI iOS App 项目，并随意命名，例如“GridSimple”。\n\
  2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 内部，添加一个 `VStack` 并创建一个\
  \ `GridItem` 数组，如下所示：\n\n```\nvar body: some View {\n    VStack {\n        let gridItems\
  \ = [GridItem()]\n    }\n}\n```\n\n`GridItem` 是 SwiftUI 中的一个结构体，允许你定义列与行之间的间距。目前，我们将使用默认值，即保留\
  \ `GridItem` 参数列表为空。\n\n4. 在 `gridItems` 数组下方，添加一个 `ScrollView` 和一个 `LazyHGrid`，如下所示：\n\
  \n```\nScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n    LazyHGrid(rows:\
  \ gridItems) {\n        Image(systemName: \"1.circle\")\n        Image(systemName:\
  \ \"2.circle\")\n        Image(systemName: \"3.circle\")\n        Image(systemName:\
  \ \"4.circle\")\n        Image(systemName: \"5.circle\")\n        Image(systemName:\
  \ \"6.circle\")\n        Image(systemName: \"7.circle\")\n        Image(systemName:\
  \ \"8.circle\")\n        Image(systemName: \"9.circle\")\n        Image(systemName:\
  \ \"10.circle\")\n    }.font(.largeTitle)\n})\n```\n\n这段代码定义了一个水平 `ScrollView`（`Axis.Set.horizontal`），其中包含一个\
  \ `LazyHGrid`，用于显示一行数据。`LazyHGrid` 最多可以容纳十（10）个视图，因此我们用它填充了十个 `Image` 视图，在圆圈内显示不同的数字。由于圆圈图标较小，`.font(.largeTitle)`\
  \ 修饰符使它们变得更大，更易于查看。\n\n5. 在另一个 `ScrollView` 下方，添加第二个包含 `LazyVGrid` 的 `ScrollView`，如下所示：\n\
  \n```\nScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    LazyVGrid(columns:\
  \ gridItems) {\n        Image(systemName: \"1.square\")\n        Image(systemName:\
  \ \"2.square\")\n        Image(systemName: \"3.square\")\n        Image(systemName:\
  \ \"4.square\")\n        Image(systemName: \"5.square\")\n        Image(systemName:\
  \ \"6.square\")\n        Image(systemName: \"7.square\")\n        Image(systemName:\
  \ \"8.square\")\n        Image(systemName: \"9.square\")\n        Image(systemName:\
  \ \"10.square\")\n    }.font(.largeTitle)\n})\n```\n\n这段代码定义了一个垂直 `ScrollView`（`Axis.Set.vertical`），其中包含一个\
  \ `LazyVGrid`，用于显示一列数据。这些数据由十个 `Image` 视图组成，在方形内显示不同的数字。`.font(.largeTitle)` 修饰符使这些方形图标更大，更易于查看。整个\
  \ `ContentView` 文件看起来应该像这样：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n\
  \    var body: some View {\n        VStack {\n            let gridItems = [GridItem()]\n\
  \            ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n\
  \                LazyHGrid(rows: gridItems) {\n                    Image(systemName:\
  \ \"1.circle\")\n                    Image(systemName: \"2.circle\")\n         \
  \           Image(systemName: \"3.circle\")\n                    Image(systemName:\
