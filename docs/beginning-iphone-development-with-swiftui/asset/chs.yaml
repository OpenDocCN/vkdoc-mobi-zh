  .fill(colorMe ? Color.green : Color.gray)\n.frame(width: 250, height: 100)\nButton(\"\
  Plain text button\") {\ncolorMe.toggle()\n}\nButton {\ncolorMe.toggle()\n} label:\
  \ {\nText(\"Custom text button\")\n.font(.largeTitle)\n.foregroundColor(.green)\n\
