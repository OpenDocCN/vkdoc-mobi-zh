  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n10. 在画布面板中点击“Live”图标。\n\n11. 点击任意按钮。注意，每次点击按钮时，它都会切换 `colorMe` 这个布尔变量，使得矩形在绿色和灰色之间交替显示。\n\
  \n\n\n### 在用户界面视图中存储要运行的代码\n\n当您创建一个与用户交互的按钮或类似类型的用户界面视图时，需要编写 Swift 代码来让该用户界面视图做出响应。最简单的方法是直接在定义用户界面的同一文件中编写代码，例如：\n\
  \n```\nButton(\"Plain text button\") {\ncolorMe.toggle()\n}\n```\n\n当代码只有几行时，这种方式没问题。然而，如果需要存储数十行代码来定义用户界面视图如何响应用户，这可能会使整个\
  \ `.swift` 文件变得难以理解。这样的文件将同时包含设计用户界面和响应用户操作的 Swift 代码。\n\n与其将多行代码塞入定义用户界面的代码中，不如将代码存储在一个单独的函数中。这样，用户界面代码只需调用一行代码，如下所示：\n\
  \n```\nButton(\"Click Me\") {\ncallMyFunction()\n}\n```\n\n这种方法有助于将执行操作的 Swift 代码与定义用户界面的\
  \ Swift 代码分离开来。存储函数的一个位置是在包含定义用户界面的 Swift 代码的同一文件中，例如在定义用户界面的结构体底部附近，如图 6-2 所示。\n\
  \n![](img/329781_7_En_6_Fig2_HTML.jpg)\n\n该代码片段定义了一个 Swift UI 内容视图结构体，包含一个 `colorMe`\
  \ 状态变量和一个 `body` 属性，该属性包含一个 `Rectangle` 和一个用于切换 `colorMe` 值的 `Plain` 文本按钮。它还包含一个单独的\
  \ `callMyFunction` 函数和一个用于在 iPhone 14 Pro 设备上预览视图的 `ContentView_Previews` 结构体。\n\
  \n**图 6-2** 函数可以出现在定义用户界面的同一结构体内部\n\n将函数存储在包含定义用户界面 Swift 代码的同一文件中，可以将所有内容集中在一个地方。然而，如果函数包含大量代码，这种方法可能仍然会显得杂乱，因为文件中同时包含了定义用户界面的代码和使界面具有响应性的代码。\n\
  \n更好的解决方案是将函数存储在一个完全独立的文件中。这样，一个文件包含用于定义用户界面的 Swift 代码，另一个文件包含执行特定任务的 Swift 代码（存储在函数中）。要了解如何将函数存储在单独的文件中，请按照以下步骤操作：\n\
  \n1. 创建一个新的 iOS App 项目，确保界面是 SwiftUI，并为其起一个描述性的名称，例如 `CodeFile`。\n2. 创建一个名为 `randomNumber`\
  \ 的 `State` 变量，如下所示：\n\n```\n@State var randomNumber = 0\n```\n\n3. 在 `VStack` 内部创建一个\
  \ `Text` 视图和一个 `Button`，如下所示：\n\n```\nVStack (spacing: 28) {\n    Text(\"Random\
  \ number = \\(randomNumber)\")\n    Button(\"Roll dice\") {\n        randomNumber\
  \ = rollDice()\n    }\n}\n```\n\n请注意，`Button` 调用了一个名为 `rollDice()` 的函数。整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var randomNumber\
  \ = 0\n    var body: some View {\n        VStack (spacing: 28) {\n            Text(\"\
  Random number = \\(randomNumber)\")\n            Button(\"Roll dice\") {\n     \
  \           randomNumber = rollDice()\n            }\n        }\n    }\n}\nstruct\
  \ ContentView_Previews: PreviewProvider {\n    static var previews: some View {\n\
  \        ContentView()\n    }\n}\n```\n\n4. 选择 `File` ➤ `New` ➤ `File`。出现一个窗口，如图\
  \ 6-3 所示。\n\n![](img/329781_7_En_6_Fig3_HTML.jpg)\n\n屏幕显示了用于创建新文件的模板选择，包括 `macOS`、`watchOS`、`tvOS`、`DriverKit`、`Filter`、`Source`、`Swift\
  \ File`、`Cocoa Touch Class`、`C`、`UI Test Case Class`、`C++`、`Unit Test Case Class`、`h`、`Header\
  \ File`、`C File`、`C++ File`、`m`、`Objective-C File`、`UI`、`UNIT`、`Metal File`、`User\
  \ Interface`、`SwiftUI View`、`Storyboard`、`View`、`Empty`、`Launch Screen`、`Cancel`、`Previous`\
  \ 和 `Next` 等选项。\n\n5. 点击 iOS 标签，然后点击 `Swift File`。\n6. 点击 `Next` 按钮。出现一个窗口，要求您为文件选择名称。\n\
  7. 输入一个描述性的名称，例如 `StoreFunctions`，然后点击 `Create` 按钮。Xcode 会在导航窗格中创建一个新的 `.swift`\
  \ 文件。\n8. 点击新创建的 `.swift` 文件。新创建的 `.swift` 文件中唯一的代码如下：\n\n```\nimport Foundation\n\
  ```\n\n`Foundation` 框架为在 Apple 的所有操作系统（包括 iOS、macOS、watchOS 和 tvOS）中创建应用程序提供了基本功能。\n\
  \n9. 在 `import Foundation` 行下方输入以下内容：\n\n```\nfunc rollDice() -> Int {\n    let\
  \ firstDie = Int.random(in: 1...6)\n    let secondDie = Int.random(in: 1...6)\n\
  \    return firstDie + secondDie\n}\n```\n\n此函数模拟掷两个六面骰子并将结果相加。\n\n10. 在导航窗格中点击\
  \ `ContentView` 文件。Xcode 会在画布窗格中显示用户界面。\n11. 点击用户界面上的 `Roll dice` 按钮。每次点击此按钮时，`Text`\
  \ 视图都会显示不同的随机数，这表明 `ContentView` 文件中对 `rollDice()` 函数的调用可以成功访问存储在另一个独立 `.swift`\
  \ 文件中的 `rollDice()` 函数。\n\n**注意：** 将函数存储在单独文件中的一个优点是，您可以轻松地将一个 `.swift` 文件从一个项目复制并粘贴到另一个项目中。这使得在项目之间重用代码变得容易。\n\
  \n\n\n## 使用分段控件\n\n按钮代表单个命令，因此如果你想让用户在多个命令之间做出选择，就需要使用多个按钮。不幸的是，在用户界面上塞入多个按钮会很麻烦。为了解决这个问题，SwiftUI\
  \ 提供了分段控件。\n\n**注意**\n\n尽管分段控件理论上可以显示大量选项，但显示的选项越多，分段控件看起来就越杂乱。一般来说，如果分段控件包含的选项过多，可以考虑改用其他方式（如转盘或菜单选择器）来让用户进行选择，详见第\
  \ 8 章。\n\n分段控件的主要思想是在紧凑的空间内显示两个或更多选项，而不是使用多个按钮。要创建分段控件，你需要以下内容：\n\n- 一个 `State`\
  \ 变量，用于表示用户选择了哪个分段（选项）\n- 一个列出了两个或更多选项的 `Picker` 视图\n- 一个与每个选项关联的 `tag` 属性\n- `SegmentedPickerStyle`\
  \ 修饰符\n\n要在分段控件上显示选项，最简单的方法是使用多个 `Text` 视图，如下所示：\n\n```\nPicker(\"\", selection:\
  \ $selectedItem) {\n    Text(\"鱼\")\n    Text(\"龟\")\n    Text(\"兔\")\n    Text(\"\
  鸟\")\n}.pickerStyle(.segmented)\n```\n\n这将创建一个分段控件，按顺序显示 `Text` 视图中的项目，因此最左侧的项目将是\"\
  鱼\"，最右侧的项目将是\"鸟\"，如图 6-4 所示。\n\n![](img/329781_7_En_6_Fig4_HTML.jpg)\n\n这一段代码定义了一个使用分段样式的\
  \ `Picker`，允许从鱼、龟、兔和鸟等选项中进行选择。\n\n**图 6-4** 创建一个简单的分段控件\n\n在 `Picker` 视图中放置多个 `Text`\
  \ 视图可以定义显示的选项，但分段控件无法知道用户选择了哪个选项。如果你通过使用多个 `Text` 视图在 `Picker` 视图中定义选项，则需要在每个 `Text`\
  \ 视图后添加一个 `.tag` 属性。\n\n这个 `.tag` 属性提供了代表分段控件上每个项目的实际数据。`.tag` 属性可以是任何数据类型（如 `String`\
  \ 或 `Int`），但每个 `.tag` 属性都应包含相同的数据类型。\n\n要了解如何使用分段控件——通过 `Picker` 视图中的多个 `Text` 视图和\
  \ `.tag` 属性来显示选项——请按照以下步骤操作：\n\n![](img/329781_7_En_6_Fig5_HTML.jpg)\n\n一个底部显示红、绿、蓝文本的移动屏幕。\n\
  \n**图 6-5** 分段控件的完整用户界面\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名（例如 \"SegmentedControl\"\
  ）。\n\n2.  在导航面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 这行代码下方添加一个\
  \ `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n        @State private\
  \ var selectedColor = Color.gray\n        var body: some View {\n    ```\n\n   \
  \ 这将创建一个名为 `selectedColor` 的 `State` 变量。注意，`private` 关键字是可选的，它仅表示该变量只能在 `ContentView`\
  \ 结构体内部使用。`selectedColor` 变量的初始值是 `Color.gray`，这意味着其推断的数据类型是 `Color`。\n\n4.  在 `var\
  \ body: some View` 内部创建一个间距为 28 的 `VStack`，如下所示：\n\n    ```\n    struct ContentView:\
  \ View {\n        @State private var selectedColor = Color.gray\n        var body:\
  \ some View {\n            VStack (spacing: 28) {\n            }\n        }\n  \
  \  }\n    ```\n\n    间距值可以是任意你想要的数值，它会在你添加到 `VStack` 内部的任何视图之间增加间距，使它们在用户界面上不会显得拥挤。\n\
  \n5.  输入以下内容，在 `VStack` 内部创建一个彩色矩形：\n\n    ```\n    Rectangle()\n        .fill(selectedColor)\n\
  \    ```\n\n    这将创建一个矩形，其颜色由 `selectedColor` 状态变量定义。初始状态下，该矩形填充为 `Color.gray`。\n\
  \n\n\n6.  在`VStack`内部键入以下代码，创建一个分段控件：\n\n```\nPicker(\"Favorite Color\", selection:\
  \ $selectedColor) {\n    Text(\"Red\").tag(Color.red)\n    Text(\"Green\").tag(Color.green)\n\
  \    Text(\"Blue\").tag(Color.blue)\n}.pickerStyle(.segmented)\n```\n\n这段代码创建了一个`Picker`视图，在分段控件上列出了三个选项（\"\
  Red\"、\"Green\"和\"Blue\"）。每个选项后面都有一个与之关联的`.tag`。虽然用户看到的是三个`Text`视图显示的选项（\"Red\"\
  、\"Green\"和\"Blue\"），但`selectedColor`状态变量实际存储的是`.tag`值，即`Colors`（`.red`、`.green`和`.blue`）。`.pickerStyle`修饰符通过定义`.segmented`（而不是`.wheel`或`.menu`），将`Picker`视图显示为分段控件。\n\
  \n完整的 SwiftUI 代码应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State\
  \ private var selectedColor = Color.gray\n    var body: some View {\n        VStack\
  \ (spacing: 28) {\n            Rectangle()\n                .fill(selectedColor)\n\
  \            Picker(\"Favorite Color\", selection: $selectedColor) {\n         \
  \       Text(\"Red\").tag(Color.red)\n                Text(\"Green\").tag(Color.green)\n\
  \                Text(\"Blue\").tag(Color.blue)\n            }.pickerStyle(.segmented)\n\
  \        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n7.  点击画布面板中的“Live”图标。\n\
  \n8.  点击分段控件上的“Red”、“Green”和“Blue”选项。每次从分段控件中选择不同的选项时，`selectedColor`状态变量都会发生变化。随后，该状态变量会自动更改矩形的颜色，如图\
  \ 6-5 所示。\n\n**注意**  \n如果省略了`.pickerStyle(.segmented)`修饰符，`Picker`视图会以菜单形式显示三个选项（\"\
  Red\"、\"Green\"和\"Blue\"），如图 6-6 所示。\n\n![](img/329781_7_En_6_Fig6_HTML.jpg)  \n\
  屏幕显示红色、绿色和蓝色。其中蓝色选项被选中。  \n**图 6-6** 未使用`.pickerStyle`修饰符时的`Picker`视图外观会显示为菜单\n\n\
  通过键入多个`Text`视图来填充分段控件是可行的，但重复的代码往往意味着代码可以简化。对于`Picker`视图，你可以使用数组和`ForEach`循环来替代多个`Text`视图，示例如下：\n\
  \n```\nPicker(\"\", selection: $selectedItem) {\n    ForEach(animalArray, id: \\\
  .self) {\n        Text($0)\n    }\n}.pickerStyle(.segmented)\n```\n\n这个`ForEach`循环指定了一个包含分段控件选项的数组（例如名为`animalArray`的数组），并使用`id`属性标识每个数组项，以便在单个`Text`视图中显示。该`Text`视图使用`$0`简写参数名来表示每个数组项。\n\
  \n除了减少定义分段控件选项时使用多个`Text`视图的需求外，`ForEach`循环还免去了为每个选项单独添加`.tag`属性的步骤。取而代之的是，数组项本身既代表分段控件上显示的选项，也代表用户所选的选择。\n\
  \n要了解如何使用`ForEach`循环填充`Picker`视图的分段控件，请按以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“SegmentedControlForEach”。\n\
  \n2.  在导航器面板中点击`ContentView`文件。\n\n3.  在`struct ContentView: View`行下方添加一个状态变量，如下所示：\n\
  \n```\n@State var selectedItem = \"\"\n```\n\n这将创建一个名为`selectedItem`的状态变量。`selectedItem`变量的初始值为空字符串，这意味着其推断的数据类型为`String`。\n\
  \n4.  在`var body: some View`内部创建一个`VStack`，如下所示：\n\n```\nstruct ContentView: View\
  \ {\n    @State var selectedItem = \"\"\n    let animalArray = [\"Fish\", \"Tortoise\"\
  , \"Hare\", \"Bird\"]\n    var body: some View {\n        VStack {\n        }\n\
  \    }\n}\n```\n\n5.  在`VStack`内部键入以下代码，创建一个`Picker`视图和一个`Text`视图：\n\n```\nVStack\
  \ {\n    Picker(\"\", selection: $selectedItem) {\n        ForEach(animalArray,\
  \ id: \\.self) {\n            Text($0)\n        }\n    }.pickerStyle(.segmented)\n\
  \    Text(selectedItem)\n}\n```\n\n这段代码使用`ForEach`循环来填充由`Picker`视图创建的分段控件。`Text`视图显示用户所选的内容。\n\
  \n完整的 SwiftUI 代码应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State\
  \ var selectedItem = \"\"\n    let animalArray = [\"Fish\", \"Tortoise\", \"Hare\"\
  , \"Bird\"]\n    var body: some View {\n        VStack {\n            Picker(\"\"\
  , selection: $selectedItem) {\n                ForEach(animalArray, id: \\.self)\
  \ {\n                    Text($0)\n                }\n            }.pickerStyle(.segmented)\n\
  \            Text(selectedItem)\n        }\n    }\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n6.  点击画布面板中的“Live”图标。\n\n7.  点击分段控件上的“Fish”、“Tortoise”、“Hare”和“Bird”选项。每次从分段控件中选择不同的选项时，`selectedItem`状态变量都会发生变化。随后，该状态变量会自动更改`Text`视图中显示的内容。\n\
  \n\n\n### 从分段控件中运行代码\n\n仅通过选择分段控件上的选项，分段控件只能更改一个 `State` 变量。如果你想根据用户在分段控件上选择的选项来运行代码，需要添加一个\
  \ `.onChange` 修饰符，如下所示：\n\n```\n.onChange(of: stateVariable) { newValue in\n// code\
  \ to run\n}\n```\n\n每当用户在分段控件上选择不同的选项时，它就会更改一个 `State` 变量。`.onChange` 修饰符会在 `State`\
  \ 变量每次发生变化时运行代码。`newValue` 变量包含了这个最新的变化，然后可以据此运行代码。要了解其工作原理，请遵循以下步骤：\n\n1.  新建一个\
  \ SwiftUI iOS 应用项目，并命名为任意你喜欢的名称，例如“SegmentedControl Code”。\n2.  在导航窗格中单击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 这行下方添加一个 `State` 变量，如下所示：\n\n```\nstruct\
  \ ContentView: View {\n@State private var message = \"\"\nvar body: some View {\n\
  ```\n\n这会创建一个名为 `message` 的 `State` 变量。注意，`private` 关键字是可选的，它仅表示此变量只能在 `ContentView`\
  \ 结构体内部使用。其初始值是一个空字符串，因此它的数据类型被推断为 `String`。\n\n4.  在 `var body: some View` 内部创建一个间距值为\
  \ 28 的 `VStack`，如下所示：\n\n```\nstruct ContentView: View {\n@State private var message\
  \ = \"\"\nvar body: some View {\nVStack (spacing: 28) {\n}\n}\n}\n```\n\n间距值可以是任何你想要的数字，但它在添加到\
  \ `VStack` 内部的任何视图之间增加间距，以免它们在用户界面上显得拥挤。\n\n5.  在 `VStack` 内输入以下内容来创建一个 `Text` 视图：\n\
  \n```\nText(message)\n```\n\n这会创建一个 `Text` 视图，用于显示 `message` 状态变量的内容。\n\n![](img/329781_7_En_6_Fig7_HTML.jpg)\n\
  \n屏幕显示了一个 Swift UI 代码片段，其中使用了一个带有分段样式的 `Picker` 来选择如“开心”、“悲伤”和“无聊”等选项。右侧是移动屏幕，显示文字“寻找你的目标”以及“开心”、“悲伤”和“无聊”三个选项。\n\
  \n**图 6-7** `.onChange` 修饰符可以在 `Text` 视图中显示不同的文本\n\n1.  在 `VStack` 内输入以下内容来创建一个分段控件：\n\
  \n```\nPicker(\"\", selection: $message) {\nText(\"Happy\").tag(\"happy\")\nText(\"\
  Sad\").tag(\"sad\")\nText(\"Bored\").tag(\"bored\")\n}.pickerStyle(.segmented)\n\
  ```\n\n这会创建一个 `Picker` 视图，列出在分段控件上显示的三个选项（“Happy”、“Sad”和“Bored”）。每个选项后面都有一个 `.tag`\
  \ 与该选项关联。虽然在用户界面上显示的是三个 `Text` 视图（“Happy”、“Sad”和“Bored”）提供的选项，但 `message` 状态变量实际上存储的是\
  \ `.tag` 的值，即字符串（“happy”、“sad”、“bored”）。`.pickerStyle` 修饰符通过指定 `.segmented` 将 `Picker`\
  \ 视图显示为分段控件。\n\n2.  在 `.pickerStyle` 修饰符之后输入以下内容：\n\n```\n.onChange(of: message)\
  \ { newValue in\nswitch newValue {\ncase \"happy\": message = \"Be happy and joyous\"\
  \ncase \"sad\": message = \"Life can be a struggle at times\"\ncase \"bored\": message\
  \ = \"Look for your purpose\"\ndefault:\nbreak\n}\n}\n```\n\n当 `.onChange` 修饰符检测到\
  \ `message` 状态变量发生变化时（即用户在分段控件上选择了不同选项时），便会运行代码。当用户选择了不同选项时，`newValue` 变量会存储该选中的选项（例如\
  \ `.tag(\"happy\")`）。\n\n根据 `newValue` 的值，`switch` 语句决定将哪个文本存储到 `message` 状态变量中。一旦\
  \ `message` 状态变量获得新值，它就会显示在 `Text` 视图中。\n\n完整的 SwiftUI 代码应如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State private var message = \"\"\nvar body: some View\
  \ {\nVStack (spacing: 28) {\nText(message)\nPicker(\"\", selection: $message) {\n\
  Text(\"Happy\").tag(\"happy\")\nText(\"Sad\").tag(\"sad\")\nText(\"Bored\").tag(\"\
  bored\")\n}.pickerStyle(.segmented)\n.onChange(of: message) { newValue in\nswitch\
  \ newValue {\ncase \"happy\": message = \"Be happy and joyous\"\ncase \"sad\": message\
  \ = \"Life can be a struggle at times\"\ncase \"bored\": message = \"Look for your\
  \ purpose\"\ndefault:\nbreak\n}\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\n3.  单击画布面板中的“Live”图标。\n\
  4.  单击分段控件上的“Happy”、“Sad”和“Bored”选项。每次你在分段控件上选择不同的选项时，`message` 状态变量都会发生变化。然后 `.onChange`\
  \ 修饰符运行代码来更改 `message` 状态变量。这个新文本随后会出现在 `Text` 视图中，如图 6-7 所示。\n\n通过将 `.onChange`\
  \ 修饰符与分段控件结合使用，你可以在用户选择分段控件上的不同选项时运行任何你想要的 Swift 代码。前面的示例使用了多个 `Text` 视图和 `.tag`\
  \ 属性来填充 `Picker` 视图。以下是使用数组和 `ForEach` 循环代替的相同项目代码：\n\n```\nimport SwiftUI\nstruct\
  \ ContentView: View {\n@State var selectedItem = \"\"\n@State var message = \"\"\
  \nlet moodArray = [\"Happy\", \"Sad\", \"Bored\"]\nvar body: some View {\nVStack\
  \ {\nText(message)\nPicker(\"\", selection: $selectedItem) {\nForEach(moodArray,\
  \ id: \\.self) {\nText($0)\n}\n}.pickerStyle(.segmented)\n.onChange(of: selectedItem)\
  \ { newValue in\nswitch newValue {\ncase \"Happy\": message = \"Be happy and joyous\"\
  \ncase \"Sad\": message = \"Life can be a struggle at times\"\ncase \"Bored\": message\
  \ = \"Look for your purpose\"\ndefault:\nbreak\n}\n}\n}\n}\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
  \n## 总结\n\n按钮是让用户向程序发出命令的最简单方式。在最简单的层面上，一个按钮由文本和一段代码列表组成，每次用户点击该按钮时都会运行这段代码。要自定义按钮，你可以使用带有修饰符的\
  \ `Text` 视图或 `Label` 视图，或者使用可以显示图标或数码照片等图像的 `Image` 视图。\n\n分段控件就像两个或更多按钮被挤在单个控件中。通过使用分段控件，你可以在比使用多个按钮小得多的空间内向用户显示多个选项。\n\
  \n在使用按钮和分段控件时，你通常需要创建一个 `State` 变量。当程序的任何部分更改了 `State` 变量的值时，更新后的数据会自动出现在整个程序中。\n\
  \n虽然按钮可以在用户每次点击时运行一行或多行 Swift 代码，但分段控件只有与 `.onChange` 修饰符结合使用时才能运行代码。按钮和分段控件都允许你在用户界面上显示不同的选项供用户选择。\n\
  \n\n\n"
- "# 7. 从文本字段和文本编辑器中检索文本\n\n用户界面通常需要从用户处检索文本。有时这些文本可能是一个单词或短句，但其他时候可能包含多个段落。为了从用户处检索文本，SwiftUI\
  \ 提供了三种类型的视图：\n\n- `Text` 字段\n- `Secure` 字段\n- `Text` 编辑器\n\n`Text` 字段允许用户输入单行文本，例如姓名或地址。可选择地，文本字段可以显示占位符文本，该文本以浅灰色显示，用于说明该\
  \ `Text` 字段期望接收的信息类型。\n\n`Secure` 字段的工作方式与 `Text` 字段完全相同，区别在于它会屏蔽用户输入的任何文本。这在要求用户输入信用卡号等敏感信息时非常有用。\n\
  \n`Text` 编辑器显示为一个大型文本框，用户可以在其中输入和编辑多行文本，例如多个段落。\n\n由于 `Text` 字段、`Secure` 字段和 `Text`\
  \ 编辑器需要存储数据，因此它们需要与一个可以保存 `String` 数据类型的 State 变量配合使用，例如：\n\n```\n@State private\
  \ var message = \"\"\n```\n\n## 使用文本字段\n\n`Text` 字段的主要目的是接受用户输入的简短文本。可以是单个单词或一个短句。为促使用户输入预期的文本，`Text`\
  \ 字段可以显示占位符文本，该文本以浅灰色显示，如图 7-1 所示。\n\n一个文本示例：`TextField(\"占位符文本\", text: $message)`。`message`\
  \ 变量中的占位符文本，以较浅的色调显示在下方平行线之间。\n\n**图 7-1** 文本字段可以显示占位符文本以引导用户\n\n当用户在 `Text` 字段中输入内容时，该文本会存储到由\
  \ `text:` 参数定义的 State 变量中。在图 7-1 中，这个 State 变量名为 `\"message\"`，美元符号（`$`）表示该 State\
  \ 变量已绑定到此 `Text` 字段。这意味着更改 `Text` 字段的内容会自动更改 `message` 这个 State 变量。\n\n### 定义可扩展的文本字段\n\
  \n尽管 `Text` 字段旨在接受简短的文本（例如地址或电话号码），但用户实际上可以输入任意数量的文本。当用户输入过多文本时，`Text` 字段可以自动水平（默认设置）或垂直扩展。\n\
  \n要定义可扩展的 `Text` 字段，请添加一个 `axis` 参数，其值为 `.horizontal` 或 `.vertical`，如下所示：\n\n```\n\
  TextField(\"垂直\", text: $message, axis: .vertical)\n```\n\n当 `Text` 字段水平扩展时，用户可以继续输入，文本将显示在一行上，直到滚动出视野。当\
  \ `Text` 字段垂直扩展时，`Text` 字段的宽度保持不变，但高度会扩展以显示多行文本，如图 7-2 所示。\n\n一个定义可扩展文本字段的代码截图。包含\
  \ 3 段文本，间隔为 75 垂直堆叠，用于指示消息水平和垂直扩展。\n\n**图 7-2** 文本字段可以水平或垂直扩展\n\n当 `Text` 字段垂直扩展时，其高度会随着用户继续输入文本而不断增加。如果想指定垂直扩展的\
  \ `Text` 字段可以显示多少行文本，请使用 `.lineLimit` 修饰符，如下所示：\n\n```\nTextField(\"垂直\", text:\
  \ $message, axis: .vertical)\n.lineLimit(3)\n```\n\n上述代码将 `Text` 字段限制为最多显示三行文本。在定义行数限制时，垂直扩展的\
  \ `Text` 字段仍然可以容纳大量文本，但随着用户继续输入，文本将向上滚动并超出视野。\n\n除了为 `.lineLimit` 修饰符定义固定值，你还可以定义一个范围，例如：\n\
  \n```\n.lineLimit(2...5)\n```\n\n范围意味着 `Text` 字段会扩展并显示最小行数的文本，然后继续扩展直到达到最大限制。使用\
  \ `.lineLimit(2...5)`（定义两到五行文本）时，`Text` 字段将扩展到两行文本。然后，如果用户继续添加更多文本，它将扩展到显示三行，接着四行，最后停在五行。达到五行文本后，`Text`\
  \ 字段将停止扩展，并将额外的文本行滚动出视野。\n\n要查看可扩展 `Text` 字段的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI\
  \ iOS App 项目，并为其取任意名称，例如 `\"ExpandableTextField\"`。\n2. 在导航器窗格中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 行下方添加一个 State 变量，如下所示：\n\n    ```\n    struct\
  \ ContentView: View {\n    @State var message = \"\"\n    ```\n\n4. 在 body 中添加一个\
  \ `TextField`，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n    TextField(\"\
  垂直\", text: $message, axis: .vertical)\n    .lineLimit(3)\n    }\n    }\n    ```\n\
  \n    整个 `ContentView` 文件应该如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView:\
  \ View {\n    @State var message = \"\"\n    var body: some View {\n    VStack {\n\
  \    TextField(\"垂直\", text: $message, axis: .vertical)\n    .lineLimit(3)\n   \
  \ }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n5. 点击实时图标。\n\
  6. 点击 `Text` 字段并输入大量文本。注意 `Text` 字段的高度会扩展，直到最多显示三行文本。然后文本会开始向上滚动超出 `Text` 字段顶部。\n\
  7. 按上/下箭头键上下滚动，查看隐藏在 `Text` 字段顶部或底部的任何文本。\n\n### 更改文本字段样式\n\n使 `Text` 字段更易于识别的一种方法是显示以浅灰色出现的占位符文本，让用户知道输入什么以及在哪里输入。第二种强调\
  \ `Text` 字段的方法是添加圆角边框，如图 7-3 所示。\n\n一个 3 行代码的截图，用于在较浅色调的占位符文本消息周围生成圆角边框。\n\n**图\
  \ 7-3** 文本字段周围圆角边框的外观\n\n`.textFieldStyle` 修饰符为你提供了 `.plain` 或 `.rounded` 边框的选项：\n\
  \n```\n.textFieldStyle(.roundedBorder)\n```\n\n`.roundedBorder` 在 `Text` 字段周围显示边框，而\
  \ `.plain` 修饰符则消除边框，使 `Text` 字段看起来如同没有使用 `.textFieldStyle` 修饰符一样。\n\n### 创建安全文本字段\n\
  \n当你在 `Text` 字段中输入时，该文本在屏幕上是可见的。虽然在大多数情况下这很方便，但在输入密码或信用卡号等敏感信息时就不合适了。为了屏蔽用户输入的任何文本，SwiftUI\
  \ 提供了一种特殊的文本字段，称为 `SecureField`。\n\n与 `Text` 字段一样，`SecureField` 会显示占位符文本，并将其绑定到一个\
  \ State 变量，如下所示：\n\n```\nSecureField(\"密码\", text: $message)\n```\n\n`SecureField`\
  \ 在用户界面上看起来与 `TextField` 完全相同。唯一的区别是，当你在 `SecureField` 中输入时，它会屏蔽你的文本，如图 7-4 所示。\n\
  \n一个安全字段的截图，输入栏中有星号，还有一个显示文本“我的密码”的文本字段。\n\n**图 7-4** `SecureField` 会屏蔽文本，而 `Text`\
  \ 字段则显示用户输入的所有内容\n\n任何可以在 `Text` 字段上使用的修饰符，都可以在 `SecureField` 上使用，例如 `.textFieldStyle`\
  \ 修饰符。\n\n\n\n## 使用自动更正与文本内容\n\n默认情况下，文本字段会启用自动更正功能，这意味着当您输入时，文本字段会尝试猜测您要输入的单词。在某些情况下，这可能会很有帮助，但如果您试图输入一个名字，您可能不希望自动更正功能将名字改为常见单词。\n\
  \n要关闭自动更正功能，只需添加以下修饰符：\n\n```\n.disableAutocorrection(true)\n```\n\n如果您想重新打开自动更正功能，可以删除整个\
  \ `.disableAutocorrection` 修饰符，或者像这样传入一个 `false` 值：\n\n```\n.disableAutocorrection(false)\n\
  ```\n\n虽然禁用自动更正可以阻止文本字段提供不相关的建议，另一种解决方案是使用 `.textContentType` 修饰符来定义文本字段应期望的文本类型，例如姓名、电子邮件地址或电话号码。要使用\
  \ `.textContentType` 修饰符，您只需指定期望的文本类型，例如\n\n```\nTextField(\"请输入您的电子邮件地址\", text:\
  \ $emailAddress)\n.textContentType(.emailAddress)\n```\n\n通过定义特定的 `.textContentType`，自动更正功能将减少其提供的不相关建议的数量。不同的\
  \ `.textContentType` 修饰符选项如下：\n\n*   `.URL` – 用于输入网址数据\n*   `.namePrefix` – 用于输入前缀或头衔，例如博士或先生\n\
  *   `.name` – 用于输入姓名\n*   `.nameSuffix` – 用于输入姓名后缀，例如小\n*   `.givenName` – 用于输入名字\n\
  *   `.middleName` – 用于输入中间名\n*   `.familyName` – 用于输入姓氏或家族名\n*   `.nickname` – 用于输入别名\n\
  *   `.organizationName` – 用于输入组织名称\n*   `.jobTitle` – 用于输入职位\n*   `.location` –\
  \ 用于输入地点（包括地址）\n*   `.fullStreetAddress` – 用于输入完整的街道地址\n*   `.streetAddressLine1`\
  \ – 用于输入街道地址的第一行\n*   `.streetAddressLine2` – 用于输入街道地址的第二行\n*   `.addressCity` –\
  \ 用于输入地址中的城市名\n*   `.addressCityAndState` – 用于输入地址中的城市和州名\n*   `.postalCode` – 用于输入地址中的邮政编码\n\
  *   `.sublocality` – 用于输入地址中的子区域\n*   `.countryName` – 用于输入地址中的国家或地区名称\n*   `.username`\
  \ – 用于输入账户或登录名\n*   `.password` – 用于输入密码\n*   `.newPassword` – 用于输入新密码\n*   `.oneTimeCode`\
  \ – 用于输入一次性代码\n*   `.emailAddress` – 用于输入电子邮件地址\n*   `.telephoneNumber` – 用于输入电话号码\n\
  *   `.creditCardNumber` – 用于输入信用卡号\n*   `.dateTime` – 用于输入日期、时间或持续时间\n*   `.flightNumber`\
  \ – 用于输入航班号\n*   `.shipmentTrackingNumber` – 用于输入包裹追踪号\n\n### 定义不同的键盘\n\n在真实的 iOS\
  \ 设备上，应用会显示一个虚拟键盘，用户可以通过点击键盘来输入数字或字符。由于文本字段可能期望输入特定类型的信息，例如姓名、数字或电子邮件地址，您可以为用户界面上的每个文本字段定义要使用的特定类型的虚拟键盘。文本字段可以显示的一些不同的虚拟键盘包括：\n\
  \n*   `.default` – 通常显示的默认虚拟键盘，除非您另行指定\n*   `.asciiCapable` – 显示标准的 ASCII 字符\n*\
  \   `.numbersAndPunctuation` – 显示数字和标点符号\n*   `.URL` – 显示针对网址输入优化的键盘\n*   `.numberPad`\
  \ – 显示用于输入 PIN 码的数字键盘\n*   `.phonePad` – 显示用于输入电话号码的拨号键盘\n*   `.namePhonePad` –\
  \ 显示用于输入人名和电话号码的拨号键盘\n*   `.emailAddress` – 显示用于输入电子邮件地址的键盘\n*   `.decimalPad` –\
  \ 显示带有数字和小数点的键盘\n*   `.twitter` – 显示用于 Twitter 文本输入的键盘\n*   `.webSearch` – 显示用于网络搜索词和网址输入的键盘\n\
  *   `.asciiCapableNumberPad` – 显示仅输出 ASCII 数字的数字键盘\n*   `.alphabet` – 显示用于字母输入的键盘\n\
  \n图 7-5 展示了虚拟键盘的四种不同外观。\n\n![](img/329781_7_En_7_Fig5_HTML.jpg)\n\n四张虚拟键盘截图。左边是\
  \ QWERTY 键盘，右边是数字和标点键盘。\n\n图 7-5\n\n虚拟键盘的不同外观\n\n要为文本字段定义特定的键盘类型，请像这样使用 `.keyboardType`\
  \ 修饰符：\n\n```\nTextField(\"输入姓名\", text: $message)\n.keyboardType(.phonePad)\n```\n\
  \n注意\n\n要查看虚拟键盘，您必须在模拟器或实际的 iOS 设备上测试您的项目。在模拟器中，您可以通过选择 I/O ➤ Keyboard ➤ Toggle\
  \ Software Keyboard 或按 Command+K 来切换隐藏或显示虚拟键盘。您无法在画布窗格中查看虚拟键盘。\n\n### 关闭虚拟键盘\n\n\
  当用户想要在文本字段中输入时，虚拟键盘会出现，并且用户界面会自动向上滑动。然而，一旦输入完毕，您需要让虚拟键盘再次消失。\n\n一种技术是使用 `.submitLabel`\
  \ 修饰符，它在虚拟键盘上定义一个特定的按键。通过点击 `.submitLabel` 修饰符定义的此按键，用户可以使虚拟键盘消失，如图 7-6 所示。`.submitLabel`\
  \ 修饰符看起来像这样：\n\n![](img/329781_7_En_7_Fig6_HTML.jpg)\n\n一张虚拟键盘截图，其中高亮显示了空格键旁边的一个“完成”按钮。\n\
  \n图 7-6\n\n`.submitLabel(.done)` 修饰符在虚拟键盘上显示一个“完成”按钮\n\n```\n.submitLabel(.done)\n\
  ```\n\n如果您没有指定 `.submitLabel` 修饰符，SwiftUI 默认会在虚拟键盘的右下角显示一个“回车”按钮。无论右下角按键上显示的标签是什么，点击它都会使虚拟键盘消失。\n\
  \n`.submitLabel` 修饰符可以放置在虚拟键盘上的不同类型按钮包括：\n\n*   `.continue` – 添加一个“继续”按钮\n*   `.done`\
  \ – 添加一个“完成”按钮\n*   `.go` – 添加一个“前往”按钮\n*   `.join` – 添加一个“加入”按钮\n*   `.next` –\
  \ 添加一个“下一个”按钮\n*   `.return` – 添加一个“回车”按钮\n*   `.route` – 添加一个“路线”按钮\n*   `.search`\
  \ – 添加一个“搜索”按钮\n*   `.send` – 添加一个“发送”按钮\n\n要了解如何使用您可以定义的虚拟键盘按钮来隐藏虚拟键盘，请遵循以下步骤：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“DismissKeyboard”。\n\n2.  在导航器窗格中点击\
  \ ContentView 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个状态变量，如下所示：\n\n    ```\n\
  \    struct ContentView: View {\n    @State var message = \"\"\n    ```\n\n4.  在\
  \ body 中添加一个 TextField，如下所示：\n\n    ```\n    var body: some View {\n    TextField(\"\
  在此输入\", text: $message)\n    .submitLabel(.done)\n    .padding()\n    }\n    ```\n\
  \n    整个 ContentView 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView:\
  \ View {\n    @State var message = \"\"\n    var body: some View {\n    TextField(\"\
  在此输入\", text: $message)\n    .submitLabel(.done)\n    .padding()\n    }\n    }\n\
  \    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
  \ View {\n    ContentView()\n    }\n    }\n    ```\n\n5.  点击“运行”按钮或选择 Product ➤\
  \ Run 在模拟器中运行您的应用。\n\n6.  当您的应用在模拟器中显示时，点击文本字段。如果虚拟键盘未出现，请按 Command+K 或选择 I/O ➤\
  \ Keyboard ➤ Toggle Software Keyboard。\n\n7.  点击虚拟键盘右下角的“完成”按钮，使虚拟键盘消失。\n\n\n\n\
  ### 使用文本编辑器\n\n`TextField` 允许用户输入单词或短句，而 `TextEditor` 则允许用户输入多行文本，就像一个文字处理器。当你在用户界面上放置一个\
  \ `TextEditor` 时，它会扩展以填充所有可用空间。因此，最好使用 `.frame` 修饰符为 `TextEditor` 定义特定大小。\n\n对于\
  \ `TextField`，点击虚拟键盘右下角的按钮可以使其消失。由于 `TextEditor` 可以容纳多行文本，虚拟键盘右下角的按钮仅将光标移动到下一行，并且始终显示“换行”标签。\n\
  \n因此，如果你想在使用 `TextEditor` 时隐藏虚拟键盘，需要执行以下操作：\n\n-   创建一个表示布尔值的 `FocusState` 变量。\n\
  -   为 `TextEditor` 添加 `.focused` 修饰符，并使用该 `FocusState` 变量。\n-   创建一个额外的控件（例如按钮），将该\
  \ `FocusState` 变量设置为 `false`。\n\n> **注意：** 这种将 `FocusState` 变量与 `.focused` 修饰符以及单独控件结合使用的方法同样适用于\
  \ `TextField`。\n\n首先，你需要像这样创建一个 `@FocusState` 变量：\n\n```\n@FocusState var dismissKeyboard:\
  \ Bool\n```\n\n定义 `@FocusState` 变量后，你需要在 `TextEditor`（或 `TextField`）上使用 `.focused`\
  \ 修饰符来链接到 `@FocusState` 变量，就像这样：\n\n```\nTextEditor(text: $message)\n    .focused($dismissKeyboard)\n\
  ```\n\n然后，你可以通过一个单独的控件将 `@FocusState` 变量的值设置为 `false`，从而使虚拟键盘消失，就像这样：\n\n```\nButton(\"\
  隐藏键盘\") {\n    dismissKeyboard = false\n}\n```\n\n要了解 `FocusState` 变量如何工作，请遵循以下步骤：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任何你喜欢的名称，例如“DismissKeyboardTextEditor”。\n2.\
  \  在导航器窗格中单击 `ContentView` 文件。\n3.  创建一个 `@State` 变量来保存 `TextEditor` 的内容，并创建一个 `@FocusState`\
  \ 变量来使虚拟键盘消失，如下所示：\n\n    ```\n    struct ContentView: View {\n        @State var\
  \ message = \"\"\n        @FocusState var dismissKeyboard: Bool\n    ```\n\n4. \
  \ 在 `VStack` 内部添加一个 `Button` 和一个 `TextEditor`。为防止 `TextEditor` 扩展，请确保为 `TextEditor`\
  \ 添加 `.frame` 修饰符。`ContentView` 文件内的完整代码如下所示：\n\n    ```\n    import SwiftUI\n\n\
  \    struct ContentView: View {\n        @State var message = \"\"\n        @FocusState\
  \ var dismissKeyboard: Bool\n\n        var body: some View {\n            VStack\
  \ {\n                TextEditor(text: $message)\n                    .focused($dismissKeyboard)\n\
  \                    .frame(width: 250, height: 150)\n                    .padding()\n\
  \                Button(\"隐藏键盘\") {\n                    dismissKeyboard = false\n\
  \                }\n            }\n        }\n    }\n\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n\n5.  点击**运行**按钮或选择**产品** ➤ **运行**，在模拟器中运行你的应用程序。\n\
  6.  当你的应用程序出现在模拟器中时，点击 `TextEditor`。如果虚拟键盘没有出现，请按下 **Command+K** 或选择 **I/O** ➤ **键盘**\
  \ ➤ **切换软件键盘**。\n7.  输入一些文本，然后点击你在 `TextEditor` 下方创建的**“隐藏键盘”**按钮。这将把 `@FocusState`\
  \ 变量 `dismissKeyboard` 设置为 `false`，从而使虚拟键盘消失。\n\n你必须使用 `@FocusState` 变量才能使虚拟键盘随\
  \ `TextEditor` 一起消失。\n\n## 总结\n\n用户向应用程序输入数据最常见的方式之一是通过键入文本。`TextField` 可以接受较短的文本，例如姓名或句子。默认情况下，`TextField`\
  \ 会水平扩展，这意味着用户可以随意输入尽可能多的文本，并且这些文本将显示为单行。\n\n如果将 `TextField` 改为垂直扩展，当用户继续输入文本时，`TextField`\
  \ 的高度会增加并显示多行文本。为了防止 `TextField` 无限扩展，可以使用 `.lineLimit` 修饰符来定义 `TextField` 中显示的最大行数。\n\
  \n如果用户需要输入不应显示在屏幕上的敏感信息，可以使用 `SecureField`，它会屏蔽所有键入的内容。若要显示多行文本，可以使用 `TextEditor`，它就像一个微型文字处理器。\n\
  \n为了使文本输入更轻松，可以使用 `.contentType` 修饰符来定义 `TextField` 预期的信息类型，例如姓名或电子邮件地址。然后使用 `.keyboardType`\
  \ 修饰符来定义针对特定信息类型（例如电话号码或姓名）优化的特定虚拟键盘。\n\n当用户不再需要虚拟键盘时，`TextField` 和 `SecureField`\
  \ 可以依靠右下角的按钮来关闭虚拟键盘。通过使用 `.submitLabel` 修饰符，你可以为此虚拟键盘右下角按钮定义常见的标题类型，例如**完成**、**发送**或**下一步**。\n\
  \n创建 `TextEditor` 时，它会扩展以填充所有可用空间，因此你可能需要使用 `.frame` 修饰符为 `TextEditor` 定义特定的宽度和高度。要隐藏使用\
  \ `TextEditor` 时的虚拟键盘，请使用带有 `.focused` 修饰符的 `@FocusState` 变量。然后创建一个单独的控件（例如按钮），将\
  \ `@FocusState` 变量设置为 `false`。这将使虚拟键盘消失。\n\n文本是输入数据最常见的方式，因此请使用户能够轻松地将数据输入到 `TextField`、`SecureField`\
  \ 或 `TextEditor` 中。\n\n"
- "# 8. 使用选取器限制选择\n\n文本字段非常适合让用户输入任何类型的信息，例如姓名或简短的问题答案。问题是，如果用户可以自由输入任何内容，他们可能会意外（或故意）输入无效数据。\n\
  \n例如，如果一个 `TextField` 要求输入地址，你希望用户自由输入任何内容。但是，如果一个 `TextField` 要求输入州、语言或性别，你就不希望用户输入“狗”、“1258dke3”或“我在找鞋子”，因为这些都不是有效输入，很可能会导致程序崩溃。\n\
  \n一种解决方案是让用户输入任何数据，然后编写 Swift 代码来验证输入是否有效。不幸的是，这很可能会花费大量时间，而且仍然不准确。一个更好的解决方案是，当只有少数可接受的选项时，最好将用户限制在从有限范围内进行选择。\n\
  \n`Picker` 显示多个选项，并让用户有机会点击选择其中一个选项。由于所有选项都是有效的，`Picker` 确保用户只能输入有效数据。普通的 `Picker`\
  \ 非常适合让用户从一系列文本选项中进行选择。对于选择颜色或日期，SwiftUI 还提供了特殊的 `ColorPicker` 和 `DatePicker`。\n\
  \n`DatePicker` 甚至允许你定义一个有效的日期范围。`Picker` 的全部目的是确保用户在任意时刻只能向程序输入有效数据。\n\n\n\n## 使用选择器（Picker）\n\
  \n`Picker` 会显示一个由多个 `Text` 视图定义的选项列表。虽然 `Picker` 使用文本字符串来展示可用选项，但用户选择的选项实际上可以代表任何值，例如字符串、十进制数、整数或由枚举定义的值。（分段控件是\
  \ `Picker` 视图的一种特殊类型，已在第 6 章介绍过。）\n\n要创建一个 `Picker`，需使用多个 `Text` 视图来显示选项，并为每个选项附加一个\
  \ `.tag` 修饰符。`.tag` 修饰符定义了用户所选的实际值，例如：\n\n```\nPicker(selection: $choice, label:\
  \ Text(\"选择器\")) {\n    Text(\"一\").tag(\"one\")\n    Text(\"二\").tag(\"two\")\n\
  \    Text(\"三\").tag(\"three\")\n    Text(\"四\").tag(\"four\")\n    Text(\"五\").tag(\"\
  five\")\n}\n```\n\n在此示例中，可用选项是数字，但当用户选择一个数字时，实际选择会以字符串形式存储，例如 `\"three\"` 或 `\"\
  five\"`，如图 8-1 所示。\n\n![一张显示从 1 到 5 的数字滚轮的截图，其中 3 被高亮并选中。](img/329781_7_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** – `Picker` 使用 `Text` 视图在用户界面上显示选项\n\n`Text` 视图上的 `.tag` 修饰符可以包含任何数据类型，但同一个\
  \ `Picker` 内的所有 `.tag` 修饰符必须是相同的数据类型，并且要与它所链接的 `State` 变量类型匹配。以下 Swift 代码定义了一个 `Picker`，其中多个\
  \ `Text` 视图显示诸如 `\"Cat\"` 或 `\"Bird\"` 之类的单词，但 `.tag` 修饰符存储的是诸如 `0` 或 `2` 之类的整数：\n\
  \n```\nPicker(\"\", selection: $choice) {\n    Text(\"鸟\").tag(1)\n    Text(\"猫\"\
  ).tag(2)\n    Text(\"蜥蜴\").tag(3)\n    Text(\"狗\").tag(4)\n    Text(\"仓鼠\").tag(5)\n\
  }\n```\n\n因为 `.tag` 修饰符包含整数，所以 `choice` `State` 变量现在需要存储 `Int` 数据类型，例如：\n\n```\n\
  @State private var choice = 0\n```\n\n要了解 `Picker` 的工作原理，请按以下步骤操作：\n\n1. 创建一个新的\
  \ SwiftUI iOS App 项目，并为其指定任意名称，例如 `\"Picker\"`。\n\n2. 在导航器窗格中点击 `ContentView` 文件。\n\
  \n3. 在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n```\nstruct ContentView:\
  \ View {\n    @State private var choice = 0\n```\n\n这将创建一个初始设置为 `0` 的 `State` 变量，它是一个整数，因此\
  \ `choice` `State` 变量被定义为持有 `Int` 数据类型。\n\n4. 在 `var body: some View` 代码行内创建一个 `VStack`，并在其中创建一个\
  \ `Picker` 和一个 `Text` 视图：\n\n```\nvar body: some View {\n    VStack {\n        Picker(\"\
  \", selection: $choice) {\n            Text(\"鸟\").tag(1)\n            Text(\"猫\"\
  ).tag(2)\n            Text(\"蜥蜴\").tag(3)\n            Text(\"狗\").tag(4)\n    \
  \        Text(\"仓鼠\").tag(5)\n        }\n        Text(\"选择结果 = \\(choice)\")\n \
  \   }\n}\n```\n\n`ContentView` 文件中的完整代码应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var choice = 0\n\n    var body: some View {\n        VStack\
  \ {\n            Picker(\"\", selection: $choice) {\n                Text(\"鸟\"\
  ).tag(1)\n                Text(\"猫\").tag(2)\n                Text(\"蜥蜴\").tag(3)\n\
  \                Text(\"狗\").tag(4)\n                Text(\"仓鼠\").tag(5)\n     \
  \       }\n            Text(\"选择结果 = \\(choice)\")\n        }\n    }\n}\n\nstruct\
  \ ContentView_Previews: PreviewProvider {\n    static var previews: some View {\n\
  \        ContentView()\n    }\n}\n```\n\n5. 点击画布窗格中的 `Live` 图标。\n\n6. 在 `Picker`\
  \ 中选择不同的选项。请注意，每次选择不同的选项时，`Text` 视图都会显示 `\"选择结果 = __\"`，其中 `__` 是用户选择的 `Text` 视图所附加的\
  \ `.tag` 值。\n\n7. 按如下方式更改 `State` 变量，以使其持有 `Double` 数据类型：\n\n```\n@State private\
  \ var choice = 0.0\n```\n\n由于此 `choice` `State` 变量的初始值为 `0.0`，它是一个十进制数，因此 Swift\
  \ 推断 `choice` 变量现在只能持有 `Double` 数据类型。\n\n![一段 7 行代码片段。它包含了选择器（Picker）、文本（Text）、标签（tag）和选择结果\
  \ = 2.060000 等功能。](img/329781_7_En_8_Fig2_HTML.jpg)\n\n**图 8-2** – 一个在 `.tag` 修饰符中使用\
  \ `Double` 值的 `Picker` 视图\n\n8. 按如下方式更改 `Picker` 中的 `.tag` 修饰符：\n\n```\nPicker(\"\
  \", selection: $choice) {\n    Text(\"鸟\").tag(1.7)\n    Text(\"猫\").tag(2.06)\n\
  \    Text(\"蜥蜴\").tag(3.41)\n    Text(\"狗\").tag(4.13)\n    Text(\"仓鼠\").tag(5.28)\n\
  }\n```\n\n由于 `choice` 状态变量已被重新定义为持有 `Double` 数据类型，因此 `.tag` 修饰符的值现在也必须全部表示 `Double`\
  \ 数据类型。\n\n9. 点击画布窗格中的 `Live` 图标。\n\n10. 在 `Picker` 中选择不同的选项。请注意，每次选择不同的选项时，`Text`\
  \ 视图都会显示 `\"选择结果 = __\"`，其中 `__` 是作为 `Double` 值的 `.tag` 值，如图 8-2 所示。\n\n默认情况下，`Picker`\
  \ 视图显示为菜单。然而，`.pickerStyle` 修饰符提供了三种不同的方式来显示 `Picker` 视图，如图 8-3 所示：\n\n![一组 3 张截图，分别展示了点菜单（dot\
  \ menu）、点滚轮（dot wheel）和点分段（dot segmented）样式。菜单样式显示了一个包含鸟、猫、蜥蜴、狗和仓鼠选项的选项菜单。滚轮样式高亮并选中了鸟选项，下方有其他名称。分段样式则水平排列了这些名称。](img/329781_7_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3** – 三种不同的 `Picker` 视图样式\n\n- `.pickerStyle(.menu)`\n- `.pickerStyle(.wheel)`\n\
  - `.pickerStyle(.segmented)`\n\n\n\n### 在 Picker 中显示选项\n\n在 Picker 中显示选项最直接的方式是使用多个\
  \ `Text` 视图。对于少量选项，这种方式效果不错，但当你需要显示大量选项时，尤其是在使用 `.wheel` 拾取器样式时，使用 `ForEach` 循环从数组中获取选项通常更为方便。\n\
  \n首先，创建一个数组，用于存放你想在 `Picker` 视图中显示的所有选项，例如：\n\n```\nlet myArray = [\"Fish\", \"\
  Tortoise\", \"Hare\", \"Bird\"]\n```\n\n接着，为 `Picker` 视图创建一个可供访问的 `State` 变量：\n\n\
  ```\n@State var selectedItem = \"\"\n```\n\n最后，使用 `ForEach` 循环创建 `Picker` 视图来获取数组中的每个元素，如下所示：\n\
  \n```\nPicker(\"\", selection: $selectedItem) {\nForEach(myArray, id: \\.self) {\n\
  Text($0)\n}\n```\n\n`ForEach` 循环需要知道要访问哪个数组，然后它使用 `id` 参数来标识要在 `Text` 视图中显示的每个不同的数组项。`Text`\
  \ 视图使用快捷方式 `$0` 来表示每个数组项。\n\n要了解如何使用数组和 `ForEach` 循环来填充 `Picker` 视图，请执行以下步骤：\n\n\
  ![一张移动屏幕的截图，顶部显示一个野兔图标和文字“You chose = hare”，底部是一个轮盘，其中 hare 被选中](img/329781_7_En_8_Fig4_HTML.jpg)\
  \  \n**图 8-4** – 用户界面上的 `Image` 视图、`Text` 视图和 `Picker` 视图\n\n1. 创建一个新的 SwiftUI iOS\
  \ App 项目，并为其取一个你喜欢的名称，例如 “PickerWheel”。\n2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct\
  \ ContentView: View` 行下方添加以下 `State` 变量和数组声明：\n\n    ```\n    struct ContentView:\
  \ View {\n    let myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n    @State\
  \ var selectedItem = \"\"\n    ```\n\n4. 创建一个 `VStack`，在其中放入一个 `Picker` 视图，并为其拾取器样式使用\
  \ `.wheel` 选项。`Picker` 视图必须绑定到 `State` 变量 `selectedItem`。在 `Picker` 视图内部，添加一个 `ForEach`\
  \ 循环，从数组中获取每个元素，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n    Picker(\"\
  \", selection: $selectedItem) {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n\
  \    }\n    }.pickerStyle(.wheel)\n    }\n    }\n    ```\n\n5. 在 `Picker` 视图上方，添加一个\
  \ `Image` 视图、一个 `Text` 视图和一个 `Spacer`，如下所示：\n\n    ```\n    VStack {\n    Image(systemName:\
  \ selectedItem.lowercased())\n    .font(.custom(\"\", size: 60))\n    .foregroundColor(Color.red)\n\
  \    Text(\"You chose = \\(selectedItem)\")\n    Spacer()\n    Picker(\"\", selection:\
  \ $selectedItem) {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n    }\n \
  \   }.pickerStyle(.wheel)\n    }\n    ```\n\n    `Image` 视图获取 `selectedItem` `State`\
  \ 变量并将其转换为小写。这是因为 `Picker` 视图中显示的每个选项（来自数组）都代表一个图标的名称，但每个图标名称都由小写字母组成。为了使此图标可见，`.font`\
  \ 修饰符将大小更改为 60，`.foregroundColor` 修饰符将颜色更改为红色。\n\n    `Text` 视图显示用户从 `Picker` 视图中选择的项目名称。`Spacer`\
  \ 将 `Image` 和 `Text` 视图推到屏幕顶部，同时将 `Picker` 视图推到屏幕底部，如图 8-4 所示。\n\n6. 在画布面板中点击 Live\
  \ 图标。\n7. 从 `Picker` 视图的轮盘中选择一个选项。每次你选择不同的选项时，请注意，`Text` 视图会显示你选择的名称，而 `Image` 视图会为每个选择显示相应的图像。\n\
  \n### 使用枚举填充 Picker\n\n数组是填充 `Picker` 视图的一种方式。另一种方式是从枚举中检索选项。枚举允许你定义自己的数据类型，并附带一个有限的有效选项列表。要创建一个枚举，你需要定义枚举名称及其数据类型（例如\
  \ `String`），如下所示：\n\n```\nenum ColorItems: String, CaseIterable, Identifiable {\n\
  case rose\ncase grass\ncase sky\nvar id: Self { self }\n}\n```\n\n在枚举名称（例如 `ColorItems`）之后是\
  \ `CaseIterable` 和 `Identifiable`。`CaseIterable` 意味着我们可以访问枚举中列出的选项，并将这些选项（`rose`、`grass`\
  \ 和 `sky`）作为数据（例如 `String`）处理。`Identifiable` 意味着 `ForEach` 循环可以使用 `id: Self { self\
  \ }` 变量来计数枚举中的每个项。\n\n要了解如何使用枚举填充 `Picker` 视图，请执行以下步骤：\n\n1. 创建一个新的 SwiftUI iOS\
  \ App 项目，并为其取一个你喜欢的名称，例如 “PickerEnumeration”。\n2. 在导航器面板中点击 `ContentView` 文件。\n\
  3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量和枚举声明：\n\n```\n    struct ContentView:\
  \ View {\n    @State private var selectedColor = ColorItems.rose\n    @State var\
  \ myColor = Color.red\n    enum ColorItems: String, CaseIterable, Identifiable {\n\
  \    case rose\n    case grass\n    case sky\n    var id: Self { self }\n    }\n\
  \    ```\n\n`selectedColor` `State` 变量代表 `ColorItems` 枚举数据类型。`myColor` `State` 变量代表\
  \ `Color` 数据类型。`ColorItems` 枚举定义了三个有效选项：`rose`、`grass` 或 `sky`。\n\n4. 创建一个 `VStack`，并添加一个\
  \ `Rectangle` 和一个拾取器样式为 `.wheel` 的 `Picker` 视图。`Picker` 视图必须绑定到 `State` 变量 `selectedColor`。在\
  \ `Picker` 视图内部，添加一个 `ForEach` 循环，从枚举中获取每个元素，如下所示：\n\n```\n    var body: some View\
  \ {\n    VStack  {\n    Rectangle()\n    .fill(myColor)\n    Picker(\"Favorite Color\"\
  , selection: $selectedColor) {\n    ForEach(ColorItems.allCases, id: \\.self) {catFood\
  \ in\n    Text(catFood.rawValue.capitalized)\n    }\n    }.pickerStyle(.wheel)\n\
  \    }\n    ```\n\n`Rectangle` 包含由 `myColor` `State` 变量定义的颜色。`Picker` 视图使用 `ForEach`\
  \ 循环从 `ColorItems` 枚举中检索每个项。因为 `ColorItems` 枚举被定义为 `CaseIterable`，所以 `ForEach` 循环可以使用\
  \ `.allCases` 和 `id` 参数来检索每个项。\n\n`ForEach` 循环使用一个任意命名的变量 (`catFood`) 来存储枚举中的每个项。然后，`Text`\
  \ 视图使用每个枚举项，检索其 `.rawValue`（即字符串类型的 \"rose\"、\"grass\" 和 \"sky\"），并以大写形式在 `Picker`\
  \ 视图中显示该项（\"Rose\"、\"Grass\" 和 \"Sky\"）。\n\n5. 为 `Picker` 视图添加 `.onChange`，如下所示：\n\
  \n```\n    .onChange(of: selectedColor) { newValue in\n    switch newValue {\n \
  \   case ColorItems.rose: myColor = Color.red\n    case ColorItems.grass: myColor\
  \ = Color.green\n    case ColorItems.sky: myColor = Color.blue\n    }\n    }\n \
  \   ```\n\n当 `.onChange` 检测到用户从 `Picker` 视图选择了不同的项时，它会将该选中的项存储在 `newValue` 变量中。然后，`switch`\
  \ 语句会检查用户从 `Picker` 视图中选择了哪个选项（`rose`、`grass` 或 `sky`）。根据用户从 `Picker` 视图中选择的项，`switch`\
  \ 语句会为 `myColor` `State` 变量分配一个颜色。`myColor` `State` 变量会立即将颜色发送给 `Rectangle`。\n\n\
  完整的 `ContentView` 文件应如下所示：\n\n\n```swift\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State private var selectedColor = ColorItems.rose\n    @State var\
  \ myColor = Color.red\n\n    enum ColorItems: String, CaseIterable, Identifiable\
  \ {\n        case rose\n        case grass\n        case sky\n        var id: Self\
  \ { self }\n    }\n\n    var body: some View {\n        VStack {\n            Rectangle()\n\
  \                .fill(myColor)\n            Picker(\"Favorite Color\", selection:\
  \ $selectedColor) {\n                ForEach(ColorItems.allCases, id: \\.self) {\
  \ catFood in\n                    Text(catFood.rawValue.capitalized)\n         \
  \       }\n            }\n            .pickerStyle(.wheel)\n            .onChange(of:\
  \ selectedColor) { newValue in\n                switch newValue {\n            \
  \    case ColorItems.rose: myColor = Color.red\n                case ColorItems.grass:\
  \ myColor = Color.green\n                case ColorItems.sky: myColor = Color.blue\n\
  \                }\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n6.  在画布面板中点击“Live”图标。\n7.  点击`Picker`视图并选择一个选项。无论你选择哪个选项，相应的颜色都会显示在`Rectangle`中。\n\
  \n## 使用颜色选择器\n\n普通的`Picker`可以让用户选择`Text`视图中显示的不同选项。但是，如果你想让用户选择特定的颜色呢？你可以在`Picker`中列出几种颜色，但用户想选择自定义颜色怎么办？这时你就可以使用颜色选择器（Color\
  \ Picker）。\n\n颜色选择器允许用户从网格、色谱或红绿蓝滑块中选择标准颜色（红色、蓝色、绿色、黄色等）或自定义颜色，如图 8-5 所示。\n\n![](img/329781_7_En_8_Fig5_HTML.jpg)\n\
  \n三个选取颜色窗口的截图，包含颜色框和不同颜色的滑块以及透明度选项。第一个选中了网格选项卡。第二个选中了光谱选项卡。第三个选中了滑块选项卡，并显示红、绿、蓝滑块。\n\
  \n**图 8-5** 颜色选择器提供了三种不同的选项用于选择自定义颜色\n\n要创建颜色选择器，必须首先创建一个`State`变量来保存`Color`数据类型，例如：\n\
  \n```\n@State var myColor = Color.red\n```\n\n然后，可以通过定义一个描述性标题，后跟指向代表`Color`的`State`变量的链接，来创建一个颜色选择器，如下所示：\n\
  \n```\nColorPicker(\"Pick a color\", selection: $myColor)\n```\n\n要了解颜色选择器的工作原理，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其命名，例如“ColorPicker”。\n2.  在导航器面板中点击`ContentView`文件。\n\
  3.  在`struct ContentView: View`行下方添加以下`State`变量：\n\n```\nstruct ContentView: View\
  \ {\n    @State var myColor = Color.gray\n```\n\n4.  创建一个`VStack`，并在其中放入一个`Rectangle`。由于`Rectangle`会扩展以填满整个屏幕，请务必在其上添加`.frame`修饰符，并使用之前定义的`State`变量设置其`.foregroundColor`：\n\
  \n```\nvar body: some View {\n    VStack {\n        Rectangle()\n            .frame(width:\
  \ 200, height: 150)\n            .foregroundColor(myColor)\n    }\n}\n```\n\n5.\
  \  在`Rectangle()`下方，定义一个链接或绑定到`State`变量的颜色选择器：\n\n```\nColorPicker(\"Pick a color\"\
  , selection: $myColor)\n```\n\n整个`ContentView`文件应如下所示：\n\n![](img/329781_7_En_8_Fig6_HTML.jpg)\n\
  \n一个截图显示，文字标题指向左侧的“Pick a color”，文字“颜色选择器图标”指向右侧的一个圆形渐变颜色图标。\n\n**图 8-6** 颜色选择器图标\n\
  \n6.  点击画布面板中的“Live”图标。请注意，由于`State`变量`myColor`的初始值为灰色，因此`Rectangle`最初显示为灰色。\n7.\
  \  点击颜色选择器图标，如图 8-6 所示，以显示不同的颜色选项（见图 8-4）。\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var myColor = Color.gray\n\n    var body: some View {\n   \
  \     VStack {\n            Rectangle()\n                .frame(width: 200, height:\
  \ 150)\n                .foregroundColor(myColor)\n            ColorPicker(\"Pick\
  \ a color\", selection: $myColor)\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n8.  点击一种颜色，然后点击颜色选择器对话框右上角的关闭（X）图标将其关闭。请注意，`Rectangle`现在显示为你选择的颜色。\n\
  \n颜色选择器不仅允许用户选择颜色，还可以选择透明度。默认情况下，透明度是开启的，但如果想关闭它，可以通过将`supportsOpacity`参数更改为`false`来关闭，如下所示：\n\
  \n```\nColorPicker(\"Pick a color\", selection: $myColor, supportsOpacity: false)\n\
  ```\n\n当`supportsOpacity`参数为`true`（或省略）时，会显示透明度滑块。当`supportsOpacity`参数为`false`时，透明度滑块不会显示，如图\
  \ 8-7 所示。\n\n![](img/329781_7_En_8_Fig7_HTML.jpg)\n\n选取颜色窗口的两个截图都选中了网格选项卡，下方显示网格格式的各种颜色的颜色框。一个有透明度选项，另一个没有透明度选项。它们还分别对应命令`supportsOpacity\
  \ = true`和`supportsOpacity = false`。\n\n**图 8-7** 透明度开启和关闭的颜色选择器\n\n## 使用日期选择器\n\
  \n用户需要输入的常见数据类型之一是日期和时间。然而，一个人可能会将日期写成“June 14, 2023”，而另一个人可能会将同一日期写成“6/14/23”。在输入时间时，一个人可能会输入“6:45\
  \ p.m.”，而另一个人可能会输入“18:45”。\n\n为了让用户轻松输入日期和时间，SwiftUI 提供了日期选择器（Date Picker）。用户无需手动输入日期或时间，只需点击他们想要的日期或时间即可，如图\
  \ 8-8 所示。\n\n![](img/329781_7_En_8_Fig8_HTML.jpg)\n\n一个日历窗口的截图，月份和年份显示为 2023 年 1\
  \ 月，选中的日期为 15 日。右上角显示日期 January 15, 2023 和时间 6 52 PM。\n\n**图 8-8** 日期选择器\n\n要创建日期选择器，只需定义一个描述性文本和一个用于存储用户所选日期和/或时间的`State`变量，如下所示：\n\
  \n```\nDatePicker(selection: $myDate, label: { Text(\"Date\") })\n```\n\n### 选择日期选择器样式\n\
  \n默认情况下，日期选择器以可编辑字段的形式显示日期和时间。如果您不喜欢日期选择器的默认紧凑格式，可以使用`.datePickerStyle()`修饰符自定义日期选择器的外观，如图\
  \ 8-9 所示。\n\n![](img/329781_7_En_8_Fig9_HTML.jpg)\n\n一组三张截图，分别展示了`.compact`、`.graphical`和`.wheel`样式。Compact\
  \ 样式显示文本日期选择器和日期时间“January 15, 2023, 7 PM”。Graphical 样式显示日历，选中日期 15，月份和年份为 January\
  \ 2023。Wheel 样式选中了 today 和 7 26 PM。\n\n**图 8-9** 日期选择器的不同样式\n\n*   `.compact` –\
  \ 显示日期和时间的默认方式。当用户选择日期时，会像`.graphical`样式一样显示日历。当用户选择时间时，会像`.wheel`样式一样显示不同的时间选项。\n\
  *   `.graphical` – 以日历形式显示日期，时间则以字段形式显示。当用户选择时间时，会像`.wheel`样式一样显示不同的时间选项。\n*   `.wheel`\
  \ – 以滚轮形式显示日期和时间。\n\n创建日期选择器的 Swift 代码只需添加一个`State`变量来存储日期，然后使用该`State`变量。此外，当日期选择器样式为`.compact`时，日期选择器允许你定义显示的文本：\n\
  \n```\n@State var myDate = Date.now\nDatePicker(selection: $myDate, label: { Text(\"\
  Date\") })\n    .datePickerStyle(.graphical)\n```\n\n\n### 显示日期和/或时间\n\n虽然`DatePicker`可以让用户同时选择日期和时间，但你可能只想让`DatePicker`选择日期或时间中的一项。要限制`DatePicker`仅显示日期或时间，可以添加`displayedComponents`参数，并指定为`[.date]`或`[.hourAndMinute]`，示例如下：\n\
  \n```\nDatePicker(selection: $myDate, displayedComponents: [.date], label: { Text(\"\
  日期\") })\nDatePicker(selection: $myDate, displayedComponents: [.hourAndMinute],\
  \ label: { Text(\"时间\") })\n```\n\n### 限制日期范围\n\n当允许用户选择日期时，你可能需要限制有效日期的范围。例如，如果你在询问某人的出生日期，让`DatePicker`允许用户选择一个异常古老的日期（如\
  \ 1737 年 2 月 3 日）是不合理的。\n\n要为`DatePicker`限制日期范围，你首先需要定义起始和结束日期范围，例如：\n\n```\nlet\
  \ dateRange: ClosedRange = {\n    let calendar = Calendar.current\n    let startComponents\
  \ = DateComponents(year: 2024, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
  \ 2024, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:startComponents)!\n\
  \    ...\n    calendar.date(from:endComponents)!\n}()\n```\n\n请注意，一个闭区间需要同时定义起始日期和结束日期。用户无法选择早于起始日期的过去日期，也无法选择晚于结束日期的未来日期。\n\
  \n除了闭区间，你还可以选择部分范围。一种方法是定义一个从特定日期开始的部分范围，例如：\n\n```\nlet dateRange2: PartialRangeFrom\
  \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
  \ 2023, month: 1, day: 1)\n    return calendar.date(from:startComponents)!...\n\
  }()\n```\n\n上述范围从 2023 年 1 月 1 日开始，允许`DatePicker`选择此起始日期之后的任何日期。另一种定义部分范围的方式是定义一个截止到特定日期的范围，例如：\n\
  \n```\nlet dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
  \    let stopComponents = DateComponents(year: 2024, month: 1, day: 1)\n    return\
  \ ...calendar.date(from:stopComponents)!\n}()\n```\n\n此范围允许`DatePicker`选择到指定日期（本例中为\
  \ 2024 年 1 月 1 日）为止的任何日期。定义日期范围后，你需要将该日期范围添加到`DatePicker`中，如下所示：\n\n```\nDatePicker(selection:\
  \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"日期\") })\n\
  ```\n\n这个`DatePicker`使用一个名为`myDate`的`State`变量，通过`dateRange`常量定义有效范围，并且仅显示日期（不显示时间）。如果`DatePicker`的样式是`.compact`，它还会在`DatePicker`上显示“日期”。\n\
  \n要了解如何使用`DatePicker`，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如“DatePicker”。\n\
  \n2.  在导航面板中点击`ContentView`文件。\n\n3.  创建一个`State`变量来保存日期，如下所示：\n\n    ```\n    @State\
  \ var myDate = Date.now\n    ```\n\n    ![](img/329781_7_En_8_Fig10_HTML.jpg)\n\n\
  \    日历窗口的屏幕截图显示月份和年份为 2023 年 1 月，选中的日期为 15 日。顶部文字显示：所选日期 = 2023 年 1 月 15 日星期日太平洋标准时间晚上\
  \ 8:46:10。\n\n    **图 8-10** 显示`Text`视图和`DatePicker`的用户界面\n\n4.  定义三个日期范围，如下所示：\n\
  \n    ```\n    let dateRange: ClosedRange = {\n        let calendar = Calendar.current\n\
  \        let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n  \
  \      let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
  \ 23, minute: 59, second: 59)\n        return calendar.date(from:startComponents)!\n\
  \        ...\n        calendar.date(from:endComponents)!\n    }()\n    let dateRange2:\
  \ PartialRangeFrom = {\n        let calendar = Calendar.current\n        let startComponents\
  \ = DateComponents(year: 2023, month: 1, day: 1)\n        let endComponents = DateComponents(year:\
  \ 2023, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return calendar.date(from:endComponents)!...\n\
  \    }()\n    let dateRange3: PartialRangeThrough = {\n        let calendar = Calendar.current\n\
  \        let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n  \
  \      let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
  \ 23, minute: 59, second: 59)\n        return ...calendar.date(from:startComponents)!\n\
  \    }()\n    ```\n\n5.  创建一个`VStack`来容纳一个`Text`视图和一个`DatePicker`，如下所示：\n\n    ```\n\
  \    var body: some View {\n        VStack {\n            Text(\"所选日期 = \\(myDate)\"\
  )\n                .padding()\n            DatePicker(selection: $myDate, in: dateRange3,\
  \ displayedComponents: [.date], label: { Text(\"日期\") })\n                .datePickerStyle(.graphical)\n\
  \                .padding()\n        }\n    }\n    ```\n\n    完整的`ContentView`文件应如下所示：\n\
  \n    ```\n    import SwiftUI\n    struct ContentView: View {\n        @State var\
  \ myDate = Date.now\n        let dateRange: ClosedRange = {\n            let calendar\
  \ = Calendar.current\n            let startComponents = DateComponents(year: 2023,\
  \ month: 1, day: 1)\n            let endComponents = DateComponents(year: 2023,\
  \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n            return calendar.date(from:startComponents)!\n\
  \            ...\n            calendar.date(from:endComponents)!\n        }()\n\
  \        let dateRange2: PartialRangeFrom = {\n            let calendar = Calendar.current\n\
  \            let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
  \            let endComponents = DateComponents(year: 2023, month: 12, day: 31,\
  \ hour: 23, minute: 59, second: 59)\n            return calendar.date(from:endComponents)!...\n\
  \        }()\n        let dateRange3: PartialRangeThrough = {\n            let calendar\
  \ = Calendar.current\n            let startComponents = DateComponents(year: 2023,\
  \ month: 1, day: 1)\n            let endComponents = DateComponents(year: 2023,\
  \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n            return ...calendar.date(from:startComponents)!\n\
  \        }()\n        var body: some View {\n            VStack {\n            \
  \    Text(\"所选日期 = \\(myDate)\")\n                    .padding()\n             \
  \   DatePicker(selection: $myDate, in: dateRange, displayedComponents: [.date],\
  \ label: { Text(\"日期\") })\n                    .datePickerStyle(.graphical)\n \
  \                   .padding()\n            }\n        }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n\n6.  在画布面板中点击 Live 图标，然后点击任意日期。请注意，当你选择一个日期时，它会显示在`DatePicker`上方，如图\
  \ 8-10 所示。\n\n7.  尝试更改`DatePicker`样式（`.compact`、`.graphical`、`.wheel`），并搭配选择不同的日期范围（`dateRange`、`dateRange2`、`dateRange3`）。\n\
  \n\n\n### 格式化日期\n\n默认情况下，SwiftUI 会显示包含大量你可能不想展示的细节的日期。要以特定格式显示日期，你可以像这样使用 `DateFormatter`：\n\
  \n```\nlet formatter = DateFormatter()\n```\n\n然后你可以定义一个样式来显示日期和时间，例如以下其中之一：\n\n\
  | 样式 | 日期 | 时间 |\n| --- | --- | --- |\n| `.short` | 2/15/22 | 7:15 PM |\n| `.medium`\
  \ | Feb 15, 2022 | 7:15:29 PM |\n| `.long` | February 15, 2022 | 7:15:29 PM CST\
  \ |\n| `.full` | Tuesday, February 15, 2022 | 7:15:29 PM Central Standard Time |\n\
  \n注意\n\n地区设置可能会改变日期的实际显示方式，例如显示为 15 June 2021 或 June 15, 2021。\n\n要使用日期样式，你必须像这样定义\
  \ formatter 的 `dateStyle` 属性：\n\n```\nformatter.dateStyle = .medium\n```\n\n要使用时间样式，你必须像这样定义\
  \ formatter 的 `timeStyle` 属性：\n\n```\nformatter.timeStyle = .short\n```\n\n创建了 `DateFormatter`\
  \ 并定义好其 `.dateStyle` 和 `.timeStyle` 属性之后，最后一步就是使用该 formatter 及其 `dateStyle` 来格式化一个日期，例如：\n\
  \n```\nformatter.string(from: myDate)\n```\n\n要了解如何格式化从日期选择器中选取的日期，请遵循以下步骤：\n\n\
  1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DatePickerFormat”。\n2. 在导航面板中点击 `ContentView`\
  \ 文件。\n3. 创建一个 `State` 变量来保存日期，如下所示：\n   1. 在 `State` 变量下方输入以下内容来定义一个 `DateFormatter`：\n\
  \n   ```\n   @State var myDate = Date.now\n   ```\n\n   2. 在 `var body: some View`\
  \ 行内添加一个 `VStack`，并在 `VStack` 内创建一个 `DatePicker`，如下所示：\n\n   ```\n   VStack {\n\
  \       Text(\"选择的日期 = \\(formatter.string(from: myDate))\")\n           .padding()\n\
  \       DatePicker(selection: $myDate, label: { Text(\"日期\") })\n   }.onAppear()\
  \ {\n       formatter.dateStyle = .full\n       formatter.timeStyle = .full\n  \
  \ }\n   ```\n\n   `Text` 视图显示“选择的日期 = ”后跟存储在 `myDate` State 变量中的日期。注意，`formatter.string`\
  \ 命令定义了该日期的实际显示方式。\n\n   `DatePicker` 将选定的日期存储在 `myDate` State 变量中。然后，每当 `VStack`\
  \ 定义的用户界面出现时，`.onAppear` 修饰符就会运行 Swift 代码。在这个 `.onAppear` 修饰符内部，有一行代码将 `formatter`\
  \ 的 `.dateStyle` 定义为 `.full`。如果你将 `.full` 改为 `.short`、`.medium` 或 `.long`，就可以在 `Text`\
  \ 视图中看到日期格式的不同变化。\n\n   整个 `ContentView` 文件应如下所示：\n\n   ```\n   import SwiftUI\n\
  \   struct ContentView: View {\n       @State var myDate = Date.now\n       let\
  \ formatter = DateFormatter()\n       var body: some View {\n           VStack {\n\
  \               Text(\"选择的日期 = \\(formatter.string(from: myDate))\")\n         \
  \          .padding()\n               DatePicker(selection: $myDate, label: { Text(\"\
  日期\") })\n           }.onAppear() {\n               formatter.dateStyle = .full\n\
  \               formatter.timeStyle = .full\n           }\n       }\n   }\n   struct\
  \ ContentView_Previews: PreviewProvider {\n       static var previews: some View\
  \ {\n           ContentView()\n       }\n   }\n   ```\n\n4. 点击画布面板中的 Live 图标，然后点击任意日期。注意，当你选择一个日期时，它会显示在\
  \ `DatePicker` 上方，并使用 `.onAppear` 修饰符中定义的日期和时间样式，例如 `.full` 或 `.short`。\n\n```\n\
  let formatter = DateFormatter()\n```\n\n### 创建 MultiDatePicker\n\n普通的日期选择器只允许用户选择单个日期。如果你希望用户能够同时选择多个日期，可以使用\
  \ `MultiDatePicker`。由于 `MultiDatePicker` 允许用户选择多个日期，这些日期会存储在一组 `DateComponents`\
  \ 中。这意味着你需要像这样创建一个 `State` 变量：\n\n```\n@State var dates = Set<DateComponents>()\n\
  ```\n\n要创建一个 `MultiDatePicker`，只需使用这个 State 变量来存储选中的多个日期，代码如下：\n\n```\nMultiDatePicker(\"\
  选择日期\", selection: $dates)\n```\n\n要了解如何创建一个 `MultiDatePicker`，请遵循以下步骤：\n\n1. 创建一个新的\
  \ SwiftUI iOS App 项目，并为其任意命名，例如“MultiDatePicker”。\n2. 在导航面板中点击 `ContentView` 文件。\n\
  3. 创建一个 `State` 变量来以一个集合的形式保存多个日期，如下所示：\n\n   ![](img/329781_7_En_8_Fig11_HTML.jpg)\n\
  \   *一个日历窗口的截图，显示月份和年份为 2023 年 1 月，选中了 2、8、12、17、21、23 和 26 等多个日期。*\n   **图 8-11**\
  \ `MultiDatePicker` 允许用户选择两个或更多日期。\n\n4. 在 `var body: some View` 行内添加一个 `VStack`，并在\
  \ `VStack` 内创建一个 `MultiDatePicker`，如下所示：\n\n   ```\n   VStack {\n       MultiDatePicker(\"\
  选择日期\", selection: $dates)\n   }\n   .padding()\n   ```\n\n5. 点击画布面板中的 Live 图标。`MultiDatePicker`\
  \ 会出现。\n6. 点击两个或更多日期。每次点击一个日期，`MultiDatePicker` 就会将其高亮显示，如图 8-11 所示。如果点击一个已高亮的日期，`MultiDatePicker`\
  \ 会清除其选中状态。\n\n```\n@State var dates = Set<DateComponents>()\n```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var dates\
  \ = Set<DateComponents>()\n    var body: some View {\n        VStack {\n       \
  \     MultiDatePicker(\"选择日期\", selection: $dates)\n        }\n        .padding()\n\
  \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n创建好 `MultiDatePicker` 之后，下一步就是获取用户选中的多个日期。首先，所有选中的日期都存储为\
  \ `DateComponents` 数据类型，该类型包含的不仅仅是日期，还有大量其他信息。要了解以 `DateComponents` 形式存储的日期是什么样子，请按如下方式修改当前项目：\n\
  \n1. 在当前 MultiDatePicker 项目中，添加以下 `State` 变量：\n\n   ![](img/329781_7_En_8_Fig12_HTML.jpg)\n\
  \   *一个日历窗口的截图，显示月份和年份为 2023 年 1 月，选中了 17、24、29 和 30 等多个日期。它有一个“点击我”选项，底部有 3 组关于日历、纪元、月份、日以及是否为闰月的命令。*\n\
  \   **图 8-12** 从 `MultiDatePicker` 中选中的日期。\n\n2. 在 `VStack` 内部的 `MultiDatePicker`\
  \ 下方添加一个 `Button` 和一个 `TextEditor`，如下所示：\n\n   ```\n   Button(\"点击我\") {\n     \
  \  for x in dates {\n           message += \"\\(x)\" + \"\\n\"\n       }\n   }\n\
  \   TextEditor(text: $message)\n   ```\n\n   整个 `ContentView` 文件应如下所示：\n\n   ```\n\
  \   import SwiftUI\n   struct ContentView: View {\n       @State var dates = Set<DateComponents>()\n\
  \       @State var message = \"\"\n       var body: some View {\n           VStack\
  \ {\n               MultiDatePicker(\"选择日期\", selection: $dates)\n             \
  \  Button(\"点击我\") {\n                   for x in dates {\n                    \
  \   message += \"\\(x)\" + \"\\n\"\n                   }\n               }\n   \
  \            TextEditor(text: $message)\n           }\n           .padding()\n \
  \      }\n   }\n   struct ContentView_Previews: PreviewProvider {\n       static\
  \ var previews: some View {\n           ContentView()\n       }\n   }\n   ```\n\n\
  3. 点击画布面板中的 Live 图标。\n4. 在 `MultiDatePicker` 中点击多个日期。\n5. 点击 `点击我` 按钮。你选中的日期会出现在\
  \ `TextEditor` 中，如图 8-12 所示。\n\n```\n@State var message = \"\"\n```\n\n注意，像 2023\
  \ 年 1 月 24 日这样的日期，实际上被存储为 year: 2023, month: 1, day: 24。这种格式可能没什么用，所以我们需要做的是仅访问\
  \ `DateComponents` 结构体中的日期属性。\n\n\n\n为了实现这一点，我们需要使用`DateFormatter`，如下所示：\n\n1. \
  \ 在当前`MultiDatePicker`项目中，在两个状态变量下方添加以下代码：\n\n    ![](img/329781_7_En_8_Fig13_HTML.jpg)\n\
  \n    *一个日历窗口的截图显示月份和年份为 2023 年 1 月，并选择了多个日期：3、5、12、13 和 30。它有一个“Click Me”选项，底部以月、日、年格式列出了上述选择的日期。*\n\
  \n    **图 8-13** 从`MultiDatePicker`中选择的已格式化日期\n\n2.  修改`Button`代码如下：\n\n    ```\n\
  \    Button(\"Click Me\") {\n        for x in dates {\n            //          \
  \          message += \"\\(x)\" + \"\\n\"\n            message += dateFormatter.string(from:\
  \ x.date!) + \"\\n\"\n        }\n    }\n    ```\n\n    现在，`for`循环将使用`dateFormatter`以更熟悉的格式显示检索到的`date`属性，而不是显示原始的`DateComponents`数据。\n\
  \n3.  在定义`VStack`的最后一个花括号之后添加以下代码：\n\n    ```\n        .onAppear() {\n         \
  \   dateFormatter.dateStyle = .medium\n            dateFormatter.locale = Locale(identifier:\
  \ \"en_US\")\n        }\n    ```\n\n    这将定义一个显示日期的样式（`.short`、`.medium`、`.long`和`.full`）。此外，它还定义了显示日期的区域设置，例如`\"\
  en_US\"`。\n\n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
  \ View {\n    @State var dates = Set<DateComponents>()\n    @State var message =\
  \ \"\"\n    let dateFormatter = DateFormatter()\n\n    var body: some View {\n \
  \       VStack {\n            MultiDatePicker(\"Select Dates\", selection: $dates)\n\
  \            Button(\"Click Me\") {\n                for x in dates {\n        \
  \            //                    message += \"\\(x)\" + \"\\n\"\n            \
  \        message += dateFormatter.string(from: x.date!) + \"\\n\"\n            \
  \    }\n            }\n            TextEditor(text: $message)\n        }\n     \
  \   .onAppear() {\n            dateFormatter.dateStyle = .medium\n            dateFormatter.locale\
  \ = Locale(identifier: \"en_US\")\n        }\n        .padding()\n    }\n}\n\nstruct\
  \ ContentView_Previews: PreviewProvider {\n    static var previews: some View {\n\
  \        ContentView()\n    }\n}\n```\n\n4.  点击 Canvas 面板中的“Live”图标。\n5.  在`MultiDatePicker`中点击两个或更多日期。\n\
  6.  点击“Click Me”按钮。您选择的日期将出现在`TextEditor`中，并根据您选择的日期样式（如`.medium`或`.long`）进行格式化，如图\
  \ 8-13 所示。\n\n```\nlet dateFormatter = DateFormatter()\n```\n\n## 总结\n\n文本字段（`TextField`）可以方便地让用户输入数据。不幸的是，用户可以在文本字段中输入任何内容，甚至是完全无意义的数据。为了将用户限制在有效选择的范围内，您可以使用选择器（`Picker`）。选择器可以提供所有有效选项的列表。这样，用户就无法通过选择器输入无效数据。\n\
  \n创建选择器时，您可以使用`.tag`属性为用户在选择器中的选择分配一个特定值。`.tag`属性可以保存任何类型的数据，例如整数、小数或字符串。所有`.tag`属性必须保存相同的数据类型。\n\
  \n作为使用多个`Text`视图的替代方案，您可以使用`ForEach`循环来检索选择器视图的选项，这些选项可以存储在数组或枚举中。当您需要显示大量选项（例如通过以滚轮形式显示的选择器视图）时，检索要在选择器视图上显示的选项尤其有用。\n\
  \n另一种显示有效选项列表的方式是通过颜色选择器（`ColorPicker`）。通过使用颜色选择器，用户可以选择标准颜色（如红色、绿色或蓝色）或创建自定义颜色。\n\
  \n为了选择日期，SwiftUI 提供了日期选择器（`DatePicker`）。您可以格式化日期的显示方式，例如`6/15/22`或`June 15, 2022`。日期选择器还可以以三种不同的样式（`.compact`、`.graphical`或`.wheel`）显示。这样，您就可以让日期选择器以最适合您应用程序的方式呈现。通过使用选择器，您可以轻松让用户只输入有效数据。\n\
  \n如果用户需要选择多个日期，请使用`MultiDatePicker`。它将选定的日期存储在一个集合中，您可能需要使用`DateFormatter`对其进行格式化。最终，选择器允许您为用户提供一系列固定的有效选项供其选择。\n\
  \n"
- "# 9. 使用切换开关（Toggles）、步进器（Steppers）和滑块（Sliders）来限制选择\n\n理想情况下，您希望将用户限制为只选择有效选项。这可以防止用户输入无效数据，例如拼写数字（如“thirty-seven”）而不是输入数字（`37`）。另外三种将用户限制为只选择有效数据的方法是：切换开关、步进器和滑块。\n\
  \n切换开关（`Toggle`）为用户提供恰好两个选择，例如开/关、是/否、真/假。由于切换开关只提供两个选择，它表示一个布尔值（`true`或`false`）。\n\
  \n步进器（`Stepper`）将用户输入限制在有效数据范围内。步进器显示一个减号/加号图标，用户可以单击它来按固定量递增/递减一个值（向上或向下）。通过使用步进器，用户无需输入特定数字即可定义一个值。\n\
  \n滑块（`Slider`）也将用户输入限制在有效数据范围内。滑块允许用户通过拖拽来输入一个特定值，完全无需打字。步进器和滑块都可以定义最小值和最大值，以限制用户只能选择有效的数值。对于许多人来说，点击或拖拽选择一个值比输入数字本身更容易。步进器和滑块都表示一个`Double`值（十进制数）。\n\
  \n切换开关、滑块和步进器的全部目的，是确保用户在任何时候都只能向程序输入有效数据。\n\n\n\n## 使用开关\n\n如果你查看 iPhone 或 iPad\
  \ 的设置，你会看到一系列可以打开或关闭的选项，如图 9-1 所示。\n\n![](img/329781_7_En_9_Fig1_HTML.png)\n\n一张标题为“所有键盘”的截图，包含文本、智能标点、字符预览和快捷指令的开关，共三行。下方文字说明：双击空格键将插入一个句点后跟一个空格。\n\
  \n图 9-1\n\n开关的典型用途\n\n要创建一个开关，你需要定义显示在开关旁边的文本，同时将一个状态变量与开关链接或绑定，例如：\n\n```\nToggle(isOn:\
  \ $settingValue) {\nText(\"开关文本\")\n}\n```\n\n在这个示例中，开关会改变一个名为 `settingValue` 的状态变量的值，该变量应定义为布尔类型，如下所示：\n\
  \n```\n@State var settingValue = true\n```\n\n然后，`Text` 视图会在开关旁边显示“开关文本”，如图 9-2\
  \ 所示。\n\n![](img/329781_7_En_9_Fig2_HTML.jpg)\n\n一张显示单个开关处于开启状态的截图，左侧有文本“开关文本”。\n\
  \n图 9-2\n\n典型开关的外观\n\n要了解开关的工作原理，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“Toggle”。\n\
  2.  点击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下状态变量：\n\n\
  \    ```\n    struct ContentView: View {\n    @State var myToggle = true\n    ```\n\
  \n4.  创建一个 `VStack` 并在其中放入一个 `Rectangle`。由于 `Rectangle` 会扩展以填满整个屏幕，请确保为其添加一个 `.frame`\
  \ 修饰符，并使用之前定义的状态变量设置其 `.foregroundColor`：\n\n    ```\n    var body: some View {\n\
  \    VStack {\n    Rectangle()\n    .frame(width: 200, height: 150)\n    .foregroundColor(myToggle\
  \ ? .orange : .green)\n    }\n    }\n    ```\n\n5.  在 `Rectangle` 及其修饰符下方添加开关，如下所示：\n\
  \n```\nToggle(myToggle ? \"橙色\" : \"绿色\", isOn: $myToggle)\n```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n1.  点击画布窗格中的“实时”图标。注意，由于状态变量 `myToggle` 为 `true`，矩形初始显示为橙色。\n2.  点击开关。注意，每次点击开关时，矩形的颜色会在橙色和绿色之间切换，开关上的文本也会在“橙色”和“绿色”之间交替。\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var myToggle = true\n\
  var body: some View {\nVStack {\nRectangle()\n.frame(width: 200, height: 150)\n\
  .foregroundColor(myToggle ? .orange : .green)\nToggle(myToggle ? \"橙色\" : \"绿色\"\
  , isOn: $myToggle)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic\
  \ var previews: some View {\nContentView()\n}\n}\n```\n\n## 使用步进器\n\n当你希望用户输入数值数据时，你可能希望限制可接受数据的范围。毕竟，如果你询问用户的年龄，你不会希望得到\
  \ –23 或 938478，因为对于一个人的年龄来说，这两个值显然都是不可能的。为了让用户轻松输入可接受范围内的数值数据，你可以使用 `Stepper`。\n\
  \n`Stepper` 存储一个用户可以通过固定增量（如 1 或 2.5）递增的值。你可以定义 `Stepper` 可以表示的最小值和最大值，例如 1 到 10\
  \ 的范围。此外，你还可以定义步进器是否循环。循环是指如果你持续增加步进器的值超过其最大值，它会回到最小值。同样，如果你持续减小步进器的值低于其最小值，它会跳转到最大值。这可以让用户轻松选择不同的值，而无需从一个极端值逐步调整到另一个极端值。\n\
  \n要了解 `Stepper` 的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_9_Fig3_HTML.jpg)\n\n步进器的截图。它包含文本“步进器值\
  \ = 0”，右侧有减号和加号操作符。\n\n图 9-3\n\n一个简单的步进器\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“Stepper”。\n\
  2.  点击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下状态变量：\n\n\
  \    ```\n    struct ContentView: View {\n    @State var newValue = 0\n    ```\n\
  \n4.  在 `var body: some View` 内部创建一个 `VStack` 并添加一个 `Stepper`，如下所示：\n\n    ```\n\
  \    var body: some View {\n    VStack {\n    Stepper(value: $newValue) {\n    Text(\"\
  步进器值 = \\(newValue)\")\n    }.padding()\n    }\n    }\n    ```\n\n    这定义了一个简单的\
  \ `Stepper`，它可以表示任何值，并以 1 为增量增加或减少其值，如图 9-3 所示。\n\n整个 `ContentView` 文件应如下所示：\n\n\
  1.  点击画布窗格中的“实时”图标来运行你的应用。\n2.  点击 `Stepper` 上的减号和加号图标来减小或增加其值。\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n@State var newValue = 0\nvar body: some View {\nVStack\
  \ {\nStepper(value: $newValue) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n}\n\
  }\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews: some\
  \ View {\nContentView()\n}\n}\n```\n\n### 在步进器中定义范围\n\n在许多情况下，你需要定义 `Stepper` 可以表示的有效值范围，例如从\
  \ 1 到 25。要为 `Stepper` 定义范围，你需要在 `in:` 参数中列出该范围，如下所示：\n\n```\nStepper(value: $newValue,\
  \ in: 1...10) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n```\n\n要了解如何定义 `Stepper`\
  \ 可以表示的值范围，请添加上述代码，使整个 `ContentView` 文件如下所示：\n\n```\nimport SwiftUI\nstruct ContentView:\
  \ View {\n@State var newValue = 0\nvar body: some View {\nVStack {\n// 基本步进器\nStepper(value:\
  \ $newValue) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n// 范围步进器\nStepper(value:\
  \ $newValue, in: 1...10) {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n}\n}\n}\n\
  struct ContentView_Previews: PreviewProvider {\nstatic var previews: some View {\n\
  ContentView()\n}\n}\n```\n\n点击画布窗格中的“实时”图标，然后点击底部的 `Stepper`。注意，由于它的范围被限制在 1 到 10\
  \ 之间，点击底部 `Stepper` 的减号和加号图标将无法将 `Stepper` 的值减小到 1 以下或增加到 10 以上。\n\n\n\n### 在步进器中定义增量/减量值\n\
  \n通常，`Stepper`（步进器）会按 1 来增减其值。有时你可能想要按 1 以外的数值，例如 2 或 5 来增减。要定义一个用于增减 `Stepper`\
  \ 值的整数，你需要为 `step:` 参数定义一个整数值，如下所示：\n\n```\nStepper(value: $newValue, in: 1...10,\
  \ step: 2) {\n    Text(\"Stepper value = \\(newValue)\")\n}.padding()\n```\n\n完整的\
  \ `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
  \    @State var newValue = 0\n\n    var body: some View {\n        VStack {\n  \
  \          Stepper(value: $newValue) {\n                Text(\"Stepper value = \\\
  (newValue)\")\n            }.padding()\n\n            // 在指定范围内的步进器\n          \
  \  Stepper(value: $newValue, in: 1...10) {\n                Text(\"Stepper value\
  \ = \\(newValue)\")\n            }.padding()\n\n            // 在指定范围内并带增量值的步进器\n\
  \            Stepper(value: $newValue, in: 1...10, step: 2) {\n                Text(\"\
  Stepper value = \\(newValue)\")\n            }.padding()\n        }\n    }\n}\n\n\
  struct ContentView_Previews: PreviewProvider {\n    static var previews: some View\
  \ {\n        ContentView()\n    }\n}\n```\n\n点击画布面板中的“Live”图标，然后点击底部的 `Stepper`。请注意，由于其范围被限制在\
  \ 1 到 10 之间，点击底部 `Stepper` 的“–”和“+”图标不会将值减至 1 以下或增至 10 以上。然而，点击这些图标会使该 `Stepper`\
  \ 的值按 2 进行增减。\n\n如果你想为 `step:` 参数定义一个十进制值，你需要确保在 `Stepper` 中使用的所有值都是十进制类型，例如：\n\n\
  ```\nStepper(value: $decimalValue,\n        in: 1.0...10.0,\n        step: 0.25)\
  \ {\n    Text(\"Stepper value = \\(decimalValue)\")\n}.padding()\n```\n\n在上述 `Stepper`\
  \ 定义中，范围是从 1.0（不仅仅是 1）到 10.0（包含）。然后 `step:` 参数被定义为 0.25。最后，`State` 变量（`decimalValue`）也必须定义为十进制值（`Double`\
  \ 数据类型），如下所示：\n\n```\n@State var decimalValue: Double = 0\n```\n\n完整的 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var\
  \ newValue = 0\n    @State var decimalValue: Double = 0\n\n    var body: some View\
  \ {\n        VStack {\n            // 基础步进器\n            Stepper(value: $newValue)\
  \ {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
  \n            // 在指定范围内的步进器\n            Stepper(value: $newValue, in: 1...10) {\n\
  \                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
  \n            // 带增量值的步进器\n            Stepper(value: $newValue, in: 1...10, step:\
  \ 2) {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
  \n            // 带十进制增量值的步进器\n            Stepper(value: $decimalValue,\n      \
  \              in: 1.0...10.0,\n                    step: 0.25) {\n            \
  \    Text(\"Stepper value = \\(decimalValue)\")\n            }.padding()\n     \
  \   }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n        ContentView()\n    }\n}\n```\n\n点击画布面板中的“Live”图标，然后点击底部的\
  \ `Stepper`。请注意，由于其范围被限制在 1.0 到 10.0 之间，点击底部 `Stepper` 的“–”和“+”图标不会将值减至 1.0 以下或增至\
  \ 10.0 以上。然而，点击这些图标会使该 `Stepper` 的值按 0.25 进行增减。\n\n## 使用滑块\n\n与 `Stepper` 类似，`Slider`（滑块）允许用户在不输入特定数字的情况下选择数值。`Stepper`\
  \ 迫使用户按固定量增减值，而滑块则使用户能够通过简单地改变 `Slider` 的位置，快速在某个值域范围内进行选择。这使得 `Slider` 比 `Stepper`\
  \ 更适合让用户从大范围的值中做选择。\n\n尽管 `Slider` 可以表示任何 `Double` 数据类型（十进制数），但默认情况下其值域范围为 0 到 1，最左侧代表\
  \ 0，最右侧代表 1。\n\n要了解 `Slider` 的工作原理，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“Slider”。\n\
  \n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 行下方添加以下 `State`\
  \ 变量：\n\n```\nstruct ContentView: View {\n    @State var sliderValue = 0.0\n```\n\
  \n4.  在 `var body: some View` 内部创建一个 `VStack`，并添加一个 `Text` 和一个 `Slider`，如下所示：\n\n\
  ```\nvar body: some View {\n    VStack (spacing: 28){\n        Text(\"Slider value\
  \ = \\(sliderValue)\")\n        Slider(value: $sliderValue)\n    }\n}\n```\n\n5.\
  \  点击画布面板中的“Live”图标，然后将 `Slider` 左右拖动。请注意，此 `Slider` 的值域范围为 0 到 1，是一个 `Double` 值，会显示为十进制数。\n\
  \n### 更改滑块的颜色\n\n默认情况下，当你向右拖动 `Slider` 时，它会显示蓝色。如果你想更改该颜色，可以使用 `.accentColor` 修饰符，如图\
  \ 9-4 所示：\n\n![一张显示滑块颜色变化的截图。水平条被一个小圆点分隔，其左侧部分显示强调色。](img/329781_7_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4** – `Slider` 上的强调色\n\n```\nSlider(value: $sliderValue)\n    .accentColor(.red)\n\
  ```\n\n### 为滑块定义范围\n\n默认情况下，`Slider` 的值域范围是 0 到 1。但是，你可能希望为 `Slider` 定义不同的范围，例如：\n\
  \n```\nSlider(value: $sliderValue, in: 1...50)\n```\n\n这将 `Slider` 的最小值定义为 1，最大值定义为\
  \ 50。请记住，这些值实际上是十进制值，例如 1.0 到 50.0。\n\n### 为滑块定义步进增量\n\n如果 `Slider` 的范围大于 1，拖动 `Slider`\
  \ 会按 1 增减。要为 `Slider` 定义不同的增减量，你需要定义一个 `step:` 参数，例如：\n\n```\nSlider(value: $sliderValue,\
  \ in: 1...50, step: 4)\n```\n\n这将把 `Slider` 的值的改变量定义为 4，例如从 1 变为 5，再变为 9。\n\n###\
  \ 在滑块上显示最小值和最大值标签\n\n为了使 `Slider` 更易于理解，你可以在 `Slider` 的两端显示最小值和最大值的标签。这样你可以清晰地表明`Slider`\
  \ 的最小值和最大值可能是什么，例如：\n\n```\nSlider(value: $sliderValue, in: 1...50, step: 4) {\n\
  \    Text(\"Slider\")\n} minimumValueLabel: {\n    Text(\"1\")\n} maximumValueLabel:\
  \ {\n    Text(\"50\")\n}\n```\n\n这将定义一个在左侧显示 0，在右侧显示 50 的 `Slider`，如图 9-5 所示：\n\n\
  ![一张滑块截图，显示为一条水平线，两侧分别标有 1 和 50。线条被一个小圆点分隔，左侧部分带有强调色。](img/329781_7_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5** – 在 `Slider` 上显示最小值和最大值标签\n\n要查看所有这些不同滑块的工作方式，请按如下方式编辑 `ContentView`\
  \ 文件：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var sliderValue\
  \ = 0.0\n\n    var body: some View {\n        VStack (spacing: 28){\n          \
  \  Text(\"Slider value = \\(sliderValue)\")\n\n            Slider(value: $sliderValue)\n\
  \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50)\n\
  \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50,\
  \ step: 4)\n                .padding()\n\n            Slider(value: $sliderValue,\
  \ in: 1...50, step: 4) {\n                Text(\"Slider\")\n            } minimumValueLabel:\
  \ {\n                Text(\"1\")\n            } maximumValueLabel: {\n         \
  \       Text(\"50\")\n            }.padding()\n        }\n    }\n}\n\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n当你运行这个项目时，顶部的 `Slider` 的值域范围为 0 到 1。这意味着当你拖动其他滑块时，顶部的 `Slider`\
  \ 会立即移动到最右侧。这是因为顶部 `Slider` 的最大值只能是 1，而其他滑块的值域范围是 1 到 50。因此，拖动其他滑块时，总是会将顶部 `Slider`\
  \ 固定在最右侧，以表示值 1，这是它能表示的最大值。\n\n\n\n"
- '# 摘要


  当你的 App 需要用户输入数字数据时，使用文本字段虽然可行，但可能会显得笨拙，尤其是当你只希望接受一个有限范围的数值时。为了方便输入数字数据，可以使用 `Stepper`（步进器）或
  `Slider`（滑块）。


  `Stepper` 和 `Slider` 都可以定义最小值和最大值，这样用户就无法输入低于最小值或高于最大值的数字数据。步进器和滑块都可以让你定义除 1 以外的增量/减量值。


  `Stepper` 占用的空间更少，但 `Slider` 只需左右拖动滑块，就能更轻松地将值从一个极端更改到另一个极端。


  通过使用步进器和滑块，你可以让用户轻松输入数字数据。通过使用 `Toggle`（切换开关），你可以让用户轻松地在恰好两个选项之间进行选择，例如开/关或是/否。步进器、滑块和切换开关可以简单地让用户仅输入有效数据。


