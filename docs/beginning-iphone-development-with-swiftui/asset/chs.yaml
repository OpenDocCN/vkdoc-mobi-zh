  \ 视图来显示文本（\"Image button\"）以及一个名为 `hare.fill` 的图标。然后，它使用 `.font` 修饰符放大文本和图标，使用 `.foregroundColor`\
  \ 修饰符将文本和图标显示为紫色。最后，它使用 `.padding` 修饰符在 `Label` 视图周围添加间距，并在 `Label` 视图周围放置了一个宽度为\
  \ 6 的蓝色边框。\n\n9.  在 `VStack` 内的上一个 `Button` 下方输入以下代码，以使用 `Image` 视图定义按钮标题：\n\n \
