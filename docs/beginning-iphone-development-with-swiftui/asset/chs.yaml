  \ 和 Hormel 的值。它用不同的颜色表示条形。](img/329781_7_En_16_Fig5_HTML.jpg)\n\n    **图 16-5**\
  \ 每个标记（条形）由不同的颜色标识\n\n5.  在结构体下方添加一个数组，像这样：\n\n    ```swift\n    var mySalesArray:\
  \ [SalesPeople] = [\n        .init(name: \"Oscar\", department: \"North\", sales:\
