- "# 10. 使用链接和菜单提供选项\n\n曾经，App 只需要按钮就能让用户选择命令。随着 iPhone 和 iPad App 变得越来越复杂，允许用户选择命令的替代方式的需求也随之增长。两种常见的向用户显示可选项以供选择的方式是链接和菜单。\n\
  \n`Link`（链接）类似于 `Button`（按钮），不同之处在于它会打开浏览器来显示网站内容。`Menu`（菜单）允许你显示一个选项列表，其中还可以包含子菜单，如图\
  \ 10-1 所示。\n\n![图 10-1](img/329781_7_En_10_Fig1_HTML.jpg)\n\n**图 10-1**：一个显示选项列表（包含子菜单）的\
  \ `Menu`。\n\n## 使用链接\n\n链接提供了一种便捷的方式，让用户可以在 App 内访问网站。`Link` 定义一个网址，例如：\n\n```swift\n\
  Link(destination: URL(string: \"https://www.apple.com\")! ) {\n    Text(\"Apple\"\
  )\n}\n```\n\n`Text` 视图定义了链接上显示的文本。你可以向此 `Text` 视图添加任何你想要的修饰符，例如定义字体或背景颜色。\n\n`Link`\
  \ 必须将 `destination` 定义为 `URL`。确保网址准确的一种方法是访问所需网站，然后从浏览器中复制其地址，再粘贴到你的 Swift 代码中。\n\
  \n**注意**：要测试 `Link` 是否成功加载网址，你需要在模拟器或实际的 iOS 设备上测试项目。画布窗格无法像模拟器或 iOS 设备那样打开 Safari\
  \ 浏览器。\n\n## 使用 ShareLink\n\n普通的 `Link` 就像一个超链接，可以将用户带到特定的网页。`ShareLink`（共享链接）让用户可以点击一个链接，该链接会显示一个共享表单，为用户提供复制数据或与其他\
  \ App 共享数据的选项，如图 10-2 所示。\n\n![图 10-2](img/329781_7_En_10_Fig2_HTML.jpg)\n\n**图\
  \ 10-2**：一个 `ShareLink` 显示一个共享表单，其中包含用于与其他 App 共享数据的选项。\n\n最简单的 `ShareLink` 只定义一个要共享的项目，它可以是一个字符串或\
  \ `URL`，例如：\n\n```swift\nShareLink(item: \"This text will be shared\")\nShareLink(item:\
  \ URL(string: \"https://www.apple.com\")!)\n```\n\n除了直接在 `ShareLink` 中输入字符串或 `URL`，你也可以使用变量，例如：\n\
  \n```swift\nlet shareText = \"This text will be shared\"\nShareLink(item: shareText)\n\
  let url = URL(string: \"https://www.apple.com\")!\nShareLink(item: url)\n```\n\n\
  默认情况下，`ShareLink` 只显示一个共享图标和“Share…”字样，如图 10-3 所示。\n\n![图 10-3](img/329781_7_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3**：`ShareLink` 的默认外观显示一个共享图标和“Share…”字样\n\n当用户点击 `ShareLink` 时，会出现一个共享表单（见图\
  \ 10-2），允许用户将 `ShareLink` 中的数据与其他 App 共享。要了解其工作原理，请按照以下步骤操作：\n\n![图 10-4](img/329781_7_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4**：包含两个 `ShareLink` 和一个 `TextField` 的用户界面。\n\n1. 创建一个新的 SwiftUI iOS App\
  \ 项目，并为其指定任意名称，例如“ShareLink”。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView:\
  \ View {` 代码行下方添加以下 `@State` 变量和常量：\n\n   ```swift\n   @State var message = \"\"\
  \n   let shareText = \"This text will be shared\"\n   let url = URL(string: \"https://www.apple.com\"\
  )!\n   ```\n\n4. 将 `var body: some View {` 代码行下方的 `VStack` 编辑为如下所示：\n\n   ```swift\n\
  \   VStack {\n       ShareLink(item: \"This text will be shared\")\n       TextField(\"\
  Placeholder text\", text: $message)\n       ShareLink(item: URL(string: \"https://www.apple.com\"\
  )!)\n   }\n   ```\n\n   这将创建两个 `ShareLink`，中间由一个 `TextField` 隔开，如图 10-4 所示。\n\n\
  整个 `ContentView` 文件应如下所示：\n\n![图 10-5](img/329781_7_En_10_Fig5_HTML.jpg)\n\n**图\
  \ 10-5**：`TextField` 上方的粘贴菜单。\n\n5. 点击画布窗格中的“Live”图标。\n6. 点击顶部或底部的 `ShareLink`。将出现一个共享表单（见图\
  \ 10-2）。\n7. 点击共享表单上的“Copy”。共享表单消失。\n8. 点击 `TextField` 并按住鼠标左键（或触控板），直到弹出粘贴菜单，如图\
  \ 10-5 所示。\n\n   ```swift\n   import SwiftUI\n   struct ContentView: View {\n  \
  \     @State var message = \"\"\n       let shareText = \"This text will be shared\"\
  \n       let url = URL(string: \"https://www.apple.com\")!\n       var body: some\
  \ View {\n           VStack {\n               ShareLink(item: \"This text will be\
  \ shared\")\n               TextField(\"Placeholder text\", text: $message)\n  \
  \             ShareLink(item: URL(string: \"https://www.apple.com\")!)\n       \
  \    }\n           .padding()\n       }\n   }\n   struct ContentView_Previews: PreviewProvider\
  \ {\n       static var previews: some View {\n           ContentView()\n       }\n\
  \   }\n   ```\n\n9. 点击“Paste”。由 `ShareLink` 定义的项目（“This text will be shared”或 `https://www.apple.com`）将出现在\
  \ `TextField` 中。\n\n\n\n### 自定义 `ShareLink`\n\n除了显示默认的分享图标和“分享…”字样外，你还可以通过定义分享内容和\
  \ `ShareLink` 的外观（使用文本、图标或两者结合）来自定义 `ShareLink` 的样式。\n\n要在 `ShareLink` 上显示自定义文本，你需要像这样先定义自定义文本，再定义要分享的项目，这将创建一个如图\
  \ 10-6 所示的 `ShareLink`：\n\n![](img/329781_7_En_10_Fig6_HTML.jpg)\n\n图 10-6 — 定义\
  \ `ShareLink` 中显示的自定义文本\n\n```\nShareLink(\"自定义文本此处\", item: URL(string: \"https://www.apple.com\"\
  )!)\n```\n\n如果你复制并粘贴了上面的 `ShareLink`，你将会分享 [`https://www.apple.com`](https://www.apple.com)\
  \ 这个网站地址。请注意，上面的 `ShareLink` 仍然显示默认的分享图标。如果你不想显示这个分享图标，你需要使用 `Text` 视图来定义 `ShareLink`\
  \ 中显示的文本，如下所示：\n\n```\nShareLink(item: \"这段文本将被分享\") {\n    Text(\"自定义 ShareLink\
  \ 文本\")\n}\n```\n\n上面的 `ShareLink` 将在用户界面上只显示“自定义 ShareLink 文本”，但不会显示分享图标。如果你只想显示一个图标而不显示任何文本，你可以像这样使用\
  \ `Image` 视图：\n\n```\nShareLink(item: \"ShareLink 示例\") {\n    Image(systemName:\
  \ \"tortoise\")\n}\n```\n\n这个 `ShareLink` 会显示一个乌龟图标。你可以从苹果免费程序 SF Symbols 的图标列表中选择你想要的任何图标（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）。\n\
  \n如果你想为 `ShareLink` 同时显示自定义图标和文本，请使用 `Label` 视图，它可以让你同时自定义 `Text` 视图和 `Image` 视图，如图\
  \ 10-7 所示：\n\n![](img/329781_7_En_10_Fig7_HTML.jpg)\n\n图 10-7 — 使用图标和文本自定义 `ShareLink`\n\
  \n```\nShareLink(item: \"ShareLink 示例\") {\n    Label {\n        Text(\"自定义 ShareLink\
  \ 文本\")\n    } icon: {\n        Image(systemName: \"hare\")\n    }\n}\n```\n\n`ShareLink`\
  \ 会分享 `item:` 参数定义的任何内容，比如一个字符串（“ShareLink 示例”）或一个 URL（“[`www.apple.com`](http://www.apple.com)”）。\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并任意取名，例如“ShareLink Custom”。\n2.  在导航窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n    ```\n    @State\
  \ var message = \"\"\n    ```\n4.  像这样修改 `var body: some View` 代码行下方的 `VStack`：\n\
  \    ```\n    VStack (spacing: 55) {\n        ShareLink(item: \"这段文本将被分享\") {\n\
  \            Text(\"自定义 ShareLink 文本\")\n        }\n        ShareLink(item: \"仅一个图标可分享\"\
  ) {\n            Image(systemName: \"tortoise\")\n        }\n        ShareLink(item:\
  \ \"自定义图标和文本\") {\n            Label {\n                Text(\"自定义 ShareLink 文本\"\
  )\n            } icon: {\n                Image(systemName: \"hare\")\n        \
  \    }\n        }\n        TextField(\"占位符文本\", text: $message)\n    }\n    ```\n\
  \n这将创建三个 `ShareLink` 和一个 `TextField`。第一个 `ShareLink` 仅显示文本，第二个 `ShareLink` 仅显示图标，第三个\
  \ `ShareLink` 同时显示自定义图标和文本。\n\n整个 `ContentView` 文件应该如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n    @State var message = \"\"\n    var body: some View\
  \ {\n        VStack (spacing: 55) {\n            ShareLink(item: \"这段文本将被分享\") {\n\
  \                Text(\"自定义 ShareLink 文本\")\n            }\n            ShareLink(item:\
  \ \"仅一个图标可分享\") {\n                Image(systemName: \"tortoise\")\n           \
  \ }\n            ShareLink(item: \"自定义图标和文本\") {\n                Label {\n    \
  \                Text(\"自定义 ShareLink 文本\")\n                } icon: {\n       \
  \             Image(systemName: \"hare\")\n                }\n            }\n  \
  \          TextField(\"占位符文本\", text: $message)\n        }\n        .padding()\n\
  \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n2.  点击画布窗格中的“Live”图标。\n3.\
  \  点击任意一个 `ShareLink`。将出现一个分享表单（见图 10-2）。\n4.  点击“复制”。分享表单消失。\n5.  点击 `TextField`\
  \ 并按住鼠标左键（或触控板），直到出现“粘贴”菜单（见图 10-5）。\n6.  点击“粘贴”。你选择的 `ShareLink` 中的文本现在会出现在 `TextField`\
  \ 中。\n\n\n\n## 使用菜单\n\n有时您可能想为用户提供多个选项。在屏幕上塞满多个按钮可能显得笨拙，就连分段控件也可能限制过多。当您需要在狭小空间内展示多个选项时，就可以使用\
  \ `Menu`。\n\n`Menu` 在用户界面上仅以 `Button` 的形式呈现。当用户点击它时，`Menu` 会显示一个选项列表（见图 10-1）。现在用户可以点击某个选项，或打开另一个子菜单以查看更多选项。`Menu`\
  \ 使得在有限空间中隐藏多个选项变得轻而易举。\n\n最简单的 `Menu` 由标题和由 `Button` 定义的选项列表组成，如下所示：\n\n```\nMenu(\"\
  Options\") {\n    Button(\"打开 \", action: openFile)\n    Button(\"查找\", action:\
  \ findFile)\n    Button(\"删除...\", action: deleteFile)\n}\n```\n\n上述代码会在屏幕上显示一个带有“Options”文字的\
  \ `Menu`。当用户点击“Options”时，会出现一个菜单，列出三个选项——打开、查找和删除……——如图 10-8 所示。\n\n![](img/329781_7_En_10_Fig8_HTML.jpg)\n\
  \n*Options 选项卡的截图。列出的三个选项分别为“打开”、“查找”和“删除”。*\n\n**图 10-8** — `Menu` 在下拉菜单中显示一组 `Button`\n\
  \n当用户点击某个 `Button` 时，该 `Button` 会调用如 `openFile`、`findFile` 或 `deleteFile` 等函数。请注意，这些函数调用不包含参数列表，例如\
  \ `openFile()`。要了解如何创建简单的 `Menu`，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并随意命名，例如“MenuSimple”。\n\
  \n2. 在导航器窗格中点击 `ContentView` 文件。\n\n3. 在 `struct ContentView: View` 行下方添加以下 `State`\
  \ 变量：\n\n    ```\n    @State var message = \"\"\n    ```\n\n4. 将 `var body: some\
  \ View` 下的 `VStack` 修改如下：\n\n    ```\n    var body: some View {\n        VStack\
  \ {\n            Text(message)\n                .padding()\n            Menu(\"\
  Options\") {\n                Button(\"打开 \", action: openFile)\n              \
  \  Button(\"查找\", action: findFile)\n                Button(\"删除...\", action: deleteFile)\n\
  \            }\n            Spacer()\n        }\n    }\n    ```\n\n    所有三个 `Button`\
  \ 都调用函数来执行操作。因此我们需要创建函数来让这些 `Button` 生效。\n\n5. 在 `struct ContentView: View` 的最后一个右花括号上方，添加以下三个函数：\n\
  \n    ```\n    func openFile() {\n        message = \"已选择打开\"\n    }\n    func findFile()\
  \ {\n        message = \"已选择查找\"\n    }\n    func deleteFile() {\n        message\
  \ = \"已选择删除\"\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n   \
  \ import SwiftUI\n\n    struct ContentView: View {\n        @State var message =\
  \ \"\"\n\n        var body: some View {\n            VStack {\n                Text(message)\n\
  \                    .padding()\n                Menu(\"Options\") {\n         \
  \           Button(\"打开 \", action: openFile)\n                    Button(\"查找\"\
  , action: findFile)\n                    Button(\"删除...\", action: deleteFile)\n\
  \                }\n            }\n        }\n\n        func openFile() {\n    \
  \        message = \"已选择打开\"\n        }\n\n        func findFile() {\n         \
  \   message = \"已选择查找\"\n        }\n\n        func deleteFile() {\n            message\
  \ = \"已选择删除\"\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider\
  \ {\n        static var previews: some View {\n            ContentView()\n     \
  \   }\n    }\n    ```\n\n6. 在画布窗格中点击“Live”图标。\n\n7. 在模拟的 iOS 设备中间点击“Options”按钮。会出现一个菜单，列出由三个\
  \ `Button` 视图定义的三个选项：打开、查找和删除……\n\n8. 点击任意选项。请注意，无论选择哪个选项，它都会在 `Menu` 上方的 `Text`\
  \ 视图中显示略有不同的消息。\n\n请注意，`Menu` 中的每个 `Button` 都调用了由 `action:` 参数定义的函数。除了调用函数，您也可以将一条或多条命令直接放在花括号内，如下所示：\n\
  \n```\nMenu(\"Options\") {\n    Button(\"打开 \", action: {\n        message = \"\
  已选择打开\"\n    })\n    Button(\"查找\", action: {\n        message = \"已选择查找\"\n   \
  \ })\n    Button(\"删除...\", action: {\n        message = \"已选择删除\"\n    })\n}\n\
  ```\n\n### 格式化菜单和按钮的标题\n\n`Menu` 允许您定义一个像标准 `Button` 一样显示的标题。但是，如果您想格式化标题，还有一种替代方式来定义\
  \ `Menu`。除了仅定义要显示为标题的文字外，您还可以定义一个 `label:` 参数，在其中使用 `Text` 或 `Label` 视图，如下所示：\n\n\
  ```\nMenu {\n    Button(\"打开 \", action: {\n        message = \"已选择打开\"\n    })\n\
  \    Button(\"查找\", action: {\n        message = \"已选择查找\"\n    })\n    Button(\"\
  删除...\", action: {\n        message = \"已选择删除\"\n    })\n} label: {\n    Text(\"\
  Options\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n    \
  \    .italic()\n}\n```\n\n此示例使用 `.largeTitle` 字体、紫色和斜体显示 `Menu` 的标题。除了使用 `Text`\
  \ 视图，您还可以使用 `Label` 视图来并排显示图标和文字，例如：\n\n```\nMenu {\n    Button(\"打开 \", action:\
  \ {\n        message = \"已选择打开\"\n    })\n    Button(\"查找\", action: {\n       \
  \ message = \"已选择查找\"\n    })\n    Button(\"删除...\", action: {\n        message\
  \ = \"已选择删除\"\n    })\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\"\
  )\n}\n```\n\n通过使用 `label:` 参数来定义 `Menu` 的标题，您可以通过多种方式定制 `Menu` 的标题。使用上述 `Label`\
  \ 视图会显示带有图标和文字的 `Menu`，如图 10-9 所示。\n\n![](img/329781_7_En_10_Fig9_HTML.jpg)\n\n\
  *一个选项图标。*\n\n**图 10-9** — `Label` 视图为 `Menu` 标题显示图标和文字\n\n您还可以使用 `Label` 视图（而非 `Text`\
  \ 视图）来格式化 `Button` 标题，如下所示：\n\n```\nMenu {\n    Button(action: {\n        message\
  \ = \"已选择打开\"\n    }) {\n        Label(\"打开\", systemImage: \"book\")\n    }\n \
  \   Button(action: {\n        message = \"已选择查找\"\n    }) {\n        Label(\"查找\"\
  , systemImage: \"magnifyingglass\")\n    }\n    Button(action: {\n        message\
  \ = \"已选择删除\"\n    }) {\n        Label(\"删除\", systemImage: \"trash\")\n    }\n\
  } label: {\n    Label(\"Options\", systemImage: \"pencil.circle\")\n}\n```\n\n上述代码会显示一个\
  \ `Menu` 列表，如图 10-10 所示。\n\n![](img/329781_7_En_10_Fig10_HTML.jpg)\n\n*Options 选项卡的截图。三个选项分别标记为“打开”、“查找”和“删除”，并带有对应符号。*\n\
  \n**图 10-10** — 使用 `Label` 视图在 `Menu` 列表中显示 `Button`\n\n\n\n### 添加子菜单\n\n一个`Menu`可以显示由`Button`定义的选项列表。但除此之外，`Menu`还可以显示子菜单，用于列出额外的相关命令，如图\
  \ 10-11 所示。\n\n![](img/329781_7_En_10_Fig11_HTML.jpg)\n\n*选项标签页的截图。三个选项分别标注为“打开”、“查找”和“删除”。子菜单包含“复制格式”和“粘贴格式”。*\n\
  \n**图 10-11** — 显示子菜单\n\n要创建子菜单，只需定义另一个`Menu`来代替`Button`。然后在子菜单内部包含额外的`Button`，如下所示：\n\
  \n```\nMenu(\"选项\") {\n    Button(\"打开\", action: openFile)\n    Button(\"查找\",\
  \ action: findFile)\n    Button(\"删除...\", action: deleteFile)\n    Menu(\"子菜单\"\
  ) {\n        Button(\"复制格式\", action: copyFormat)\n        Button(\"粘贴格式\", action:\
  \ pasteFormat)\n    }\n}\n```\n\n**注意**\n\n在子菜单内部创建子菜单是可行的。但通常作为一般规则，只使用一级子菜单，否则过多的选项列表可能会让用户感到困惑。\n\
  \n要了解子菜单的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_10_Fig12_HTML.jpg)\n\n*选项标签页的截图。三个选项分别标注为“打开”、“查找”和“删除”。子菜单由右箭头符号表示。*\n\
  \n**图 10-12** — `>`符号标识一个子菜单\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“Submenu”。\n\
  2.  在导航器面板中点击`ContentView`文件。\n3.  编辑`ContentView`文件，使其全部内容如下所示：\n\n    ```\n  \
  \  import SwiftUI\n    struct ContentView: View {\n        @State var message =\
  \ \"\"\n        var body: some View {\n            VStack {\n                Text(message)\n\
  \                    .padding()\n                Menu(\"选项\") {\n              \
  \      Button(\"打开\", action: openFile)\n                    Button(\"查找\", action:\
  \ findFile)\n                    Button(\"删除...\", action: deleteFile)\n       \
  \             Menu(\"子菜单\") {\n                        Button(\"复制格式\", action:\
  \ copyFormat)\n                        Button(\"粘贴格式\", action: pasteFormat)\n \
  \                   }\n                }\n                Spacer()\n           \
  \ }\n        }\n        func openFile() {\n            message = \"已选择打开\"\n   \
  \     }\n        func findFile() {\n            message = \"已选择查找\"\n        }\n\
  \        func deleteFile() {\n            message = \"已选择删除\"\n        }\n     \
  \   func copyFormat() {\n            message = \"已选择复制格式\"\n        }\n        func\
  \ pasteFormat() {\n            message = \"已选择粘贴格式\"\n        }\n    }\n    struct\
  \ ContentView_Previews: PreviewProvider {\n        static var previews: some View\
  \ {\n            ContentView()\n        }\n    }\n    ```\n\n4.  在画布面板中点击“实时”图标。\n\
  5.  点击由`Menu`定义的“选项”。这将显示一个选项列表，其中包含由`>`符号标识的子菜单，如图 10-12 所示。\n6.  点击子菜单，即可看到额外的选项列表出现。\n\
  \n子菜单便于将相关选项分组在一起，但由于这些选项最初是隐藏的，请谨慎使用子菜单，以免让用户感到困惑。\n\n## 本章小结\n\n链接和菜单是用户界面为用户提供可选选项的另外两种方式。`Link`用于打开浏览器并跳转至特定网站。`ShareLink`允许你与其他应用共享信息。菜单则显示由`Button`和其他用于定义子菜单的`Menu`组成的选项列表。\n\
  \n通过在`Menu`中使用`Label`视图，你可以将图标与文本并排组合。通过在`Menu`中使用`Text`视图，你可以自定义用户界面上显示的文本外观，例如选择字体或颜色。菜单提供了一种在不占用太多屏幕空间的情况下向用户显示多个选项的方式。\n\
  \n"
- "# 11. 触摸手势\n\n让用户通过按钮、切换开关或菜单来控制应用固然方便，但这些控件都会占用屏幕空间。为了消除对用户界面上额外对象的需求，你的应用还可以检测并响应触摸手势，从而允许直接操作屏幕上显示的项目。\n\
  \niOS 应用能够检测并响应的不同类型触摸手势包括：\n\n- **点按** – 指尖触摸屏幕并抬起。\n- **空间点按** – 一个或多个指尖触摸屏幕并报告点按位置。\n\
  - **捏合** – 两个指尖并拢或分开。\n- **旋转** – 两个指尖以圆形运动向左或向右旋转。\n- **平移** – 指尖在屏幕上滑动拖动。\n- **清扫**\
  \ – 指尖在屏幕上向上、向下、向左或向右滑动并抬起。\n- **长按** – 指尖触摸并按压屏幕。\n\n你可以将触摸手势应用于任何视图，例如`Image`视图、`Text`视图，或者像`Rectangle`或`Ellipse`这样的形状。\n\
  \n## 检测点按手势\n\n点按手势仅用于检测用户何时点击屏幕。默认情况下，点按手势识别一个手指的单次点按，但你可以定义两个或多个手指的多次点按。\n\n要了解如何检测点按手势，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“TapGesture”。\n2.  在导航器面板中点击`ContentView`文件。\n\
  3.  在`struct ContentView: View`行下方添加以下`State`变量：\n\n    ```\n    @State var changeMe\
  \ = false\n    ```\n\n4.  在 body 中添加一个`VStack`和一个`Rectangle`，如下所示：\n\n    ```\n\
  \    var body: some View {\n        VStack {\n            Rectangle()\n        \
  \        .frame(width: 175, height: 125)\n                .foregroundColor(changeMe\
  \ ? .red : .yellow)\n                .onTapGesture {\n                    changeMe.toggle()\n\
  \                }\n        }\n    }\n    ```\n\n    这会创建一个填满整个屏幕的`Rectangle`。然后，`.frame`修饰符将其宽度限制为\
  \ 175，高度限制为 125。`.foregroundColor`修饰符使用`changeMe`这个`State`变量来决定将`Rectangle`着色为红色还是黄色。\n\
  \n    `.onTapGesture`修饰符使`Rectangle`能够检测单次点按手势。当检测到点按手势时，它会将`changeMe`这个`State`变量的值从`true`切换为`false`（或从`false`切换为`true`）。整个`ContentView`文件应如下所示：\n\
  \n    ```\n    import SwiftUI\n    struct ContentView: View {\n        @State var\
  \ changeMe = false\n        var body: some View {\n            VStack {\n      \
  \          Rectangle()\n                    .frame(width: 175, height: 125)\n  \
  \                  .foregroundColor(changeMe ? .red : .yellow)\n               \
  \     .onTapGesture {\n                        changeMe.toggle()\n             \
  \       }\n            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n        static var previews: some View {\n            ContentView()\n     \
  \   }\n    }\n    ```\n\n5.  在画布面板中点击“实时”图标。\n6.  点击`Rectangle`。注意，每次点击`Rectangle`时，`.onTapGesture`修饰符都会切换`changeMe`这个`State`变量的值，从而使`Rectangle`的颜色在红色和黄色之间交替变化。\n\
  \n默认情况下，`.onTapGesture`修饰符检测单次点按手势。如果你想检测多次点按，例如双击或三击，可以像这样定义`count:`参数：\n\n```\n\
  .onTapGesture(count: 2)\n```\n\n值为 2 表示双击，而值为 3 则表示三击。\n\n\n\n### 检测空间轻点手势\n\n空间轻点手势与普通轻点手势类似，但它最常用于检测一次或多次轻点的位置。要检测轻点位置，你需要一个能存储\
  \ `CGPoint` 数据类型的 `State` 变量，如下所示：\n\n```\n@State var tapLocation: CGPoint = .zero\n\
  ```\n\n接着，你需要定义一个空间轻点手势来检测位置，如下所示：\n\n```\nvar spatialTapGesture: some Gesture {\n\
  SpatialTapGesture()\n.onEnded { event in\ntapLocation = event.location\n}\n}\n```\n\
  \n`event.location` 会检测轻点手势的位置，并将 `x` 和 `y` 数据存储在 `tapLocation` `State` 变量中，其中 `tapLocation.x`\
  \ 包含距原点（对象的左上角）的水平距离，`tapLocation.y` 包含距原点的垂直距离。原点由附加了空间轻点手势的对象定义。\n\n一旦你能检测到轻点位置，就可以根据用户点击的区域来做出响应。默认情况下，空间轻点手势只检测单次轻点，但你可以通过定义\
  \ `count` 参数来指定所需的点击次数，例如双击，如下所示：\n\n```\nvar spatialTapGesture: some Gesture {\n\
  SpatialTapGesture(count: 2)\n.onEnded { event in\ntapLocation = event.location\n\
  }\n}\n```\n\n要了解如何使用空间轻点手势，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"\
  SpatialTapGesture\"。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView:\
  \ View` 这行下方添加以下 `State` 变量和常量：\n\n```\n    @State var tapLocation: CGPoint = .zero\n\
  \    let dimension: CGFloat = 360\n```\n\n4. 在 `State` 变量和常量下方添加一个空间轻点手势变量，如下所示：\n\
  \n```\n    var spatialTapGesture: some Gesture {\n    SpatialTapGesture()\n    .onEnded\
  \ { event in\n    tapLocation = event.location\n    }\n    }\n```\n\n在本例中，空间轻点手势的名称为\
  \ `spatialTapGesture`，但你可以使用任何你想要的名称。你的空间轻点手势的名称稍后将用于将其附加到一个对象上。\n\n5. 在 `body`\
  \ 内部添加一个 `VStack`，以及一个 `Rectangle` 和两个 `Text` 视图，如下所示：\n\n```\n    VStack {\n  \
  \  Rectangle()\n    .foregroundStyle(tapLocation.y > dimension / 2.0 ? Color.orange\
  \ : Color.purple)\n    .overlay(Text(\"Tap Me\").font(.largeTitle).foregroundColor(tapLocation.x\
  \ > dimension / 2.0 ? Color.black : Color.white))\n    .frame(width: dimension,\
  \ height: dimension)\n    .gesture(spatialTapGesture)\n    Text(\"Tap x location\
  \ = \\(tapLocation.x)\")\n    Text(\"Tap y location = \\(tapLocation.y)\")\n   \
  \ }\n```\n\n这会创建一个宽度和高度由 `dimension` 常量（设置为 360）定义的 `Rectangle`。`.foregroundStyle`\
  \ 修饰符会根据用户在 `Rectangle` 上点击的位置来改变颜色。如果用户点击在 `Rectangle` 的下半部分（`tapLocation.y > dimension\
  \ / 2.0`），那么 `Rectangle` 的颜色是橙色。否则，`Rectangle` 的颜色是紫色。\n\n覆盖在 `Rectangle` 之上的是一个\
  \ `Text` 视图，如果用户点击（轻点）了 `Rectangle` 的右半部分（`tapLocation.x > dimension / 2.0`），文本的前景色将显示为黑色；如果用户点击（轻点）了\
  \ `Rectangle` 的左半部分，则显示为白色。\n\n`Rectangle` 下方的两个 `Text` 视图仅显示用户点击（轻点）位置的 x 和 y 坐标，原点\
  \ (0,0) 是 `Rectangle` 的左上角。\n\n整个 `ContentView` 文件应如下所示：\n\n```\n    import SwiftUI\n\
  \    struct ContentView: View {\n    @State var tapLocation: CGPoint = .zero\n \
  \   let dimension: CGFloat = 360\n    var spatialTapGesture: some Gesture {\n  \
  \  SpatialTapGesture()\n    .onEnded { event in\n    tapLocation = event.location\n\
  \    }\n    }\n    var body: some View {\n    VStack {\n    Rectangle()\n    .foregroundStyle(tapLocation.y\
  \ > dimension / 2.0 ? Color.orange : Color.purple)\n    .overlay(Text(\"Tap Me\"\
  ).font(.largeTitle).foregroundColor(tapLocation.x > dimension / 2.0 ? Color.black\
  \ : Color.white))\n    .frame(width: dimension, height: dimension)\n    .gesture(spatialTapGesture)\n\
  \    Text(\"Tap x location = \\(tapLocation.x)\")\n    Text(\"Tap y location = \\\
  (tapLocation.y)\")\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n```\n\
  \n6. 在画布窗格中点击 Live 图标。\n7. 依次点击 `Rectangle` 的左上角、右上角、右下角和左下角。注意，每次你在不同区域点击时，两个 `Text`\
  \ 视图会标识出你点击的位置。你在 `Rectangle` 上点击的位置也决定了 `Rectangle` 和文本颜色如何变化。\n\n尝试像这样向 `SpatialTapGesture`\
  \ 添加一个 `count` 参数，并再次测试应用，确保在空间轻点手势被识别前需要双击：\n\n```\nSpatialTapGesture(count: 2)\n\
  ```\n\n\n\n### 检测长按手势\n\n当用户用一个或多个手指尖按住屏幕一段时间且指尖没有大幅移动时，就会触发长按手势。要定义长按手势，可以修改以下属性：\n\
  \n- `minimumDuration` – 定义一个或多个指尖需要按住屏幕多长时间才能被识别为长按\n- `maximumDistance` – 定义在长按手势失败前指尖可以移动的最大距离\n\
  \n最简单的`.onLongPressGesture`修饰器写法如下：\n\n```\n.onLongPressGesture {\n//  要运行的代码\n\
  }\n```\n\n如果需要，可以像这样添加`minimumDuration:`和`maximumDistance:`参数：\n\n```\n.onLongPressGesture(minimumDuration:\
  \ 3, maximumDistance: 2) {\n//  要运行的代码\n}\n```\n\n上述版本的`.onLongPressGesture`修饰器强制用户至少按住\
  \ 3 秒。如果希望在用户按下时执行某些操作，可以使用`pressing:`参数，如下所示：\n\n```\n.onLongPressGesture(minimumDuration:\
  \ 2, maximumDistance: 2, pressing: {stillPressed in\n//  长按期间要运行的代码\n}) {\n//  检测到长按手势后要运行的代码\n\
  }\n```\n\n要了解如何检测长按手势，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“LongPressGesture”。\n\
  2. 在导航面板中点击`ContentView`文件。\n3. 在`struct ContentView: View`行下方添加以下 State 变量：\n\n\
  \    ```\n    @State var changeMe = false\n    @State var message = \"\"\n    ```\n\
  \n4. 在`VStack`内添加一个`Text`视图，如下所示：\n\n    ```\n    var body: some View {\n    VStack\
  \ {\n    Text(message)\n    }\n    }\n    ```\n\n5. 在`Text`视图下方添加一个`Rectangle`：\n\
  \n    ```\n    Rectangle()\n    .frame(width: 175, height: 125)\n    .foregroundColor(changeMe\
  \ ? .red : .yellow)\n    ```\n\n6. 为`Rectangle`添加`.onLongPressGesture`修饰器，如下所示：\n\
  \n    ```\n    .onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing:\
  \ {stillPressed in\n    message = \"正在进行长按：\\(stillPressed)\"\n    }) {\n    changeMe.toggle()\n\
  \    }\n    ```\n\n    `pressing:`参数会在长按手势进行时显示`true`，长按手势完成后立即显示`false`。长按手势完成后，它会将`changeMe`\
  \ State 变量从`false`切换为`true`（或从`true`切换为`false`）。\n\n    整个`ContentView`文件应如下所示：\n\
  \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var changeMe\
  \ = false\n    @State var message = \"\"\n    var body: some View {\n    VStack\
  \ {\n    Text(message)\n    Rectangle()\n    .frame(width: 175, height: 125)\n \
  \   .foregroundColor(changeMe ? .red : .yellow)\n    .onLongPressGesture(minimumDuration:\
  \ 2, maximumDistance: 2, pressing: {stillPressed in\n    message = \"正在进行长按：\\(stillPressed)\"\
  \n    }) {\n    changeMe.toggle()\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n7. 在画布面板中点击“Live”图标。\n8. 将鼠标指针移到`Rectangle`上，按住鼠标左键模拟按下手势。注意`Text`视图会显示“正在进行长按：true”。\n\
  9. 继续按住鼠标左键，直到`Rectangle`改变颜色。这表明已达到`minimumDuration`的 2 秒阈值，长按手势已被识别。\n\n## 检测缩放手势\n\
  \n当用户用两个指尖按住屏幕并使指尖相互远离或靠近时，就会触发缩放手势（也称为捏合手势）。用户通常希望放大图片或缩小以查看更多内容（例如地图的更大视图）时，会用到这种缩放手势。\n\
  \n由于缩放手势会改变视图的大小，你需要定义两个 State 变量来表示当前尺寸和最终尺寸，数据类型为`CGFloat`，如下所示：\n\n```\n@State\
  \ private var tempValue: CGFloat = 0\n@State private var finalValue: CGFloat = 1\n\
  ```\n\n要调整视图大小，缩放手势需要与要调整大小的视图上的`.scaleEffect`修饰器配合使用，例如：\n\n```\nImage(systemName:\
  \ \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
  \ + tempValue)\n```\n\n然后，你需要将要调整大小的视图附加`.gesture`修饰器，并使用缩放手势，如下所示：\n\n```\n.gesture(\n\
  )\n```\n\n在`.gesture`修饰器的括号内，就是定义缩放手势的地方。你需要检测缩放手势何时发生变化以及何时最终结束，如下所示：\n\n```\n\
  .gesture(\nMagnificationGesture()\n.onChanged { amount in\n//  要运行的代码\n}\n.onEnded\
  \ { amount in\n//  要运行的代码\n}\n)\n```\n\n`.onChanged`修饰器测量用户将两个指尖相互远离或靠近的距离。`.onEnded`修饰器测量用户通过将两个指尖抬离屏幕来结束缩放手势时两个指尖之间的距离。\n\
  \n要了解如何检测缩放手势，请按照以下步骤操作：\n\n**图 11-1** 在画布面板中模拟双指按压手势\n\n1. 创建一个新的 SwiftUI iOS App\
  \ 项目，并为其任意命名，例如“MagnificationGesture”。\n2. 在导航面板中点击`ContentView`文件。\n3. 在`struct\
  \ ContentView: View`行下方添加以下 State 变量：\n\n    ```\n    @State private var tempValue:\
  \ CGFloat = 0\n    @State private var finalValue: CGFloat = 1\n    ```\n\n4. 在 body\
  \ 中添加一个包含`Image`的`VStack`，如下所示：\n\n    ```\n    var body: some View {\n    VStack\
  \ {\n    Image(systemName: \"star.fill\")\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n\
  \    .scaleEffect(finalValue + tempValue)\n    }\n    }\n    ```\n\n    这将在`Image`视图中显示一颗星星，字体大小为\
  \ 200，填充颜色为绿色。注意`.scaleEffect`修饰器将星形图像的大小定义为两个 State 变量的组合。大小为 1 表示图像的当前大小，较小的值会缩小图像，较大的值会放大图像。\n\
  \n5. 为`Image`添加一个`.gesture`修饰器，因为这是我们要使用缩放手势调整大小的对象，如下所示：\n\n    ```\n    var body:\
  \ some View {\n    VStack {\n    Image(systemName: \"star.fill\")\n    .font(.system(size:\
  \ 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue + tempValue)\n\
  \    .gesture(\n    )\n    }\n    }\n    ```\n\n    这使`Image`视图能够识别手势。现在我们只需定义要识别哪种手势。\n\
  \n6. 在`.gesture()`括号内添加`MagnificationGesture`，并定义`.onChanged`和`.onEnded`修饰器，如下所示：\n\
  \n    ```\n    var body: some View {\n    VStack {\n    Image(systemName: \"star.fill\"\
  )\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue\
  \ + tempValue)\n    .gesture(\n    MagnificationGesture()\n    .onChanged { amount\
  \ in\n    tempValue = amount - 1\n    }\n    .onEnded { amount in\n    finalValue\
  \ += tempValue\n    tempValue = 0\n    }\n    )\n    }\n    }\n    ```\n\n\n\n`onChanged`修饰器测量两个指尖之间的距离，并减去\
  \ 1 来计算`tempValue`状态变量的值。如果用户将两个指尖分开，`amount`的值将大于 1，因此减去 1 后会保留用于调整`Image`大小的额外量。\n\
  \n`onEnded`修饰器使用用户两个指尖最后定义的距离，并将该值存储在`finalValue`状态变量中，然后将`tempValue`状态变量清零。\n\n\
  整个`ContentView`文件应如下所示：\n\n```swift\nimport SwiftUI\nstruct ContentView: View {\n\
  \    @State private var tempValue: CGFloat = 0\n    @State private var finalValue:\
  \ CGFloat = 1\n    var body: some View {\n        VStack {\n            Image(systemName:\
  \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
  \                .scaleEffect(finalValue + tempValue)\n                .gesture(\n\
  \                    MagnificationGesture()\n                        .onChanged\
  \ { amount in\n                            tempValue = amount - 1\n            \
  \            }\n                        .onEnded { amount in\n                 \
  \           finalValue += tempValue\n                            tempValue = 0\n\
  \                        }\n                )\n        }\n    }\n}\nstruct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
  \    }\n}\n```\n\n7.  点击画布面板中的 Live 图标。\n8.  按住 Option 键，点击画布面板中显示的模拟 iOS 设备屏幕。按住\
  \ Option 键的同时点击鼠标左键，会显示两个灰色圆点，模拟两个指尖按压在屏幕上，如图 11-1 所示。\n1.  按住 Option 键的同时拖动鼠标，模拟将两个指尖靠近或远离。注意，当您拖动鼠标时，星形图像会相应缩小或放大以匹配缩放手势。\n\
  \n## 检测旋转手势\n\n旋转手势与缩放手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测两个指尖顺时针或逆时针做圆周运动。\n\n由于旋转手势会改变视图的角度，您需要定义一个`Double`数据类型的`State`变量来测量旋转角度，如下所示：\n\
  \n```swift\n@State private var degree = 0.0\n```\n\n要旋转视图，旋转手势需要与您想要旋转的视图上的`rotationEffect`修饰器配合使用，例如：\n\
  \n```swift\nImage(systemName: \"star.fill\")\n    .font(.system(size: 200))\n  \
  \  .foregroundColor(.green)\n    .rotationEffect(Angle.degrees(degree))\n```\n\n\
  然后，您需要将`gesture`修饰器附加到您想要旋转的视图上，并使用旋转手势，如下所示：\n\n```swift\n.gesture(\n)\n```\n\n\
  在`gesture`修饰器的括号内，您需要定义旋转手势并检测其变化，如下所示：\n\n```swift\n.gesture(\n    RotationGesture()\n\
  \        .onChanged({ angle in\n            degree = angle.degrees\n        })\n\
  )\n```\n\n`onChanged`修饰器测量用户将两个指尖顺时针或逆时针旋转了多少。要了解如何检测旋转手势，请按照以下步骤操作：\n\n1.  创建一个新的\
  \ SwiftUI iOS App 项目，并为其命名，例如 \"RotationGesture\"。\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n3.  在 `struct ContentView: View` 一行下方，添加以下`State`变量：\n4.  像这样在`body`中添加一个包含`Image`的`VStack`：\n\
  \n    ```swift\n    var body: some View {\n        VStack {\n            Image(systemName:\
  \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
  \                .rotationEffect(Angle.degrees(degree))\n        }\n    }\n    ```\n\
  \n    这定义了一个`Image`视图，以字体大小 200 和绿色显示一颗星。然后它使用`rotationEffect`修饰器旋转`Image`。\n\n\
  5.  为`Image`添加一个`gesture`修饰器，因为我们希望使用旋转手势来旋转它，如下所示：\n\n    ```swift\n    var body:\
  \ some View {\n        VStack {\n            Image(systemName: \"star.fill\")\n\
  \                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
  \                .rotationEffect(Angle.degrees(degree))\n                .gesture(\n\
  \                )\n        }\n    }\n    ```\n\n6.  在`.gesture()`括号内添加`RotationGesture`，并同时定义一个`onChanged`修饰器，如下所示：\n\
  \n    ```swift\n    var body: some View {\n        VStack {\n            Image(systemName:\
  \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
  \                .rotationEffect(Angle.degrees(degree))\n                .gesture(\n\
  \                    RotationGesture()\n                        .onChanged({ angle\
  \ in\n                            degree = angle.degrees\n                     \
  \   })\n                )\n        }\n    }\n    ```\n\n    `onChanged`修饰器测量用户在屏幕上旋转两个指尖手势的角度。整个`ContentView`文件应如下所示：\n\
  \n    ```swift\n    import SwiftUI\n    struct ContentView: View {\n        @State\
  \ private var degree = 0.0\n        var body: some View {\n            VStack {\n\
  \                Image(systemName: \"star.fill\")\n                    .font(.system(size:\
  \ 200))\n                    .foregroundColor(.green)\n                    .rotationEffect(Angle.degrees(degree))\n\
  \                    .gesture(\n                        RotationGesture()\n    \
  \                        .onChanged({ angle in\n                               \
  \ degree = angle.degrees\n                            })\n                    )\n\
  \            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n        static var previews: some View {\n            ContentView()\n     \
  \   }\n    }\n    ```\n\n4.  点击画布面板中的 Live 图标。\n5.  按住 Option 键，点击画布面板中显示的绿色星星内部。按住\
  \ Option 键的同时点击鼠标左键，会显示两个灰色圆点，模拟两个指尖按压在屏幕上（见图 11-1）。\n6.  按住 Option 键的同时拖动鼠标，模拟两个指尖旋转。注意，当您拖动鼠标时，星形图像会相应旋转以匹配旋转手势。\n\
  \n\n\n### 检测拖拽手势\n\n拖拽手势发生在用户按压并在屏幕上滑动指尖时。拖拽手势通常用于将屏幕上的某个项目移动到新位置。\n\n由于拖拽手势会改变视图的位置，你需要定义一个用来测量位置的\
  \ `State` 变量，类型为 `CGPoint`，如下所示：\n\n```\n@State private var circlePosition = CGPoint(x:\
  \ 50, y: 50)\n```\n\n要移动一个视图，拖拽手势需要与你要移动的视图上的 `.position` 修饰符配合使用，例如：\n\n```\nCircle()\n\
  .fill(Color.blue)\n.frame(width: 100, height: 100)\n.position(circlePosition)\n\
  ```\n\n然后，你需要使用拖拽手势将要移动的视图与 `.gesture` 修饰符关联起来，如下所示：\n\n```\n.gesture(\n)\n```\n\
  \n在 `.gesture` 修饰符的圆括号内，定义拖拽手势并检测其变化，如下所示：\n\n```\n.gesture(DragGesture()\n.onChanged({\
  \ value in\n// 要运行的代码\n}))\n```\n\n`.onChanged` 修饰符测量用户在屏幕上滑动指尖的距离。要了解如何检测拖拽手势，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 \"DragGesture\"。\n\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n    ```\n   \
  \ @State private var circlePosition = CGPoint(x: 50, y: 50)\n    @State private\
  \ var circleLabel = \"50, 50\"\n    ```\n\n4.  在 `body` 中添加一个包含 `Text` 视图和 `Circle`\
  \ 的 `VStack`，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n\
  \    .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
  \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    }\n    }\n    ```\n\
  \n    这段代码定义了一个 `Text` 视图来显示 `circleLabel` 状态变量的内容，并定义了一个蓝色的 `Circle`。这个 `Circle`\
  \ 使用 `.position` 修饰符来配合拖拽手势。\n\n5.  为 `Circle` 添加 `.gesture` 修饰符，因为这是我们想要通过拖拽手势移动的对象，如下所示：\n\
  \n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n    .padding()\n\
  \    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height: 100)\n    .opacity(0.8)\n\
  \    .position(circlePosition)\n    .gesture(\n    )\n    }\n    }\n    ```\n\n\
  6.  在 `.gesture()` 的圆括号内添加 `DragGesture`，同时定义一个 `.onChanged` 修饰符，如下所示：\n\n    ```\n\
  \    var body: some View {\n    VStack {\n    Text(circleLabel)\n    .padding()\n\
  \    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height: 100)\n    .opacity(0.8)\n\
  \    .position(circlePosition)\n    .gesture(DragGesture()\n    .onChanged({ value\
  \ in\n    circlePosition = value.location\n    circleLabel = \"\\(Int(value.location.x)),\
  \ \\(Int(value.location.y))\"\n    }))\n    }\n    }\n    ```\n\n    `.onChanged`\
  \ 修饰符测量用户指尖在屏幕上的位置。然后它将 x 和 y 的位置值存储在 `circleLabel` 中，以便在 `Text` 视图中显示。整个 `ContentView`\
  \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
  \ private var circlePosition = CGPoint(x: 50, y: 50)\n    @State private var circleLabel\
  \ = \"50, 50\"\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n\
  \    .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
  \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    .gesture(DragGesture()\n\
  \    .onChanged({ value in\n    circlePosition = value.location\n    circleLabel\
  \ = \"\\(Int(value.location.x)), \\(Int(value.location.y))\"\n    }))\n    }\n \
  \   }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
  \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n7.  在画布窗格中点击\"\
  实时\"图标。\n\n8.  将鼠标指针移到画布窗格中模拟 iOS 设备上的 `Circle` 上，然后拖动鼠标。注意，拖动鼠标时，`Text` 视图会不断更新\
  \ `Circle` 的 x 和 y 位置。\n\n## 定义手势优先级与同时触发的手势\n\n你可以向任何视图添加触摸手势。由于堆栈也是一种视图，这意味着你也可以向\
  \ `VStack`、`HStack` 和 `ZStack` 添加触摸手势。如果你向堆栈内部的某个视图添加一个手势，然后向堆栈本身添加第二个相同的（同类型）手势，哪个手势会被识别？\n\
  \n当一个手势修饰整个堆栈时，该堆栈内的每个视图都可以识别该手势。但是，如果该堆栈内部的某个视图有自己的手势修饰符，那么这个视图的手势修饰符将优先被识别。要了解其工作原理，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 \"TwoGestures\"。\n\n2.  在导航器窗格中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n    ```\n   \
  \ @State var message = \"\"\n    ```\n\n4.  在 `body` 中添加一个包含 `Text` 视图、`Circle`\
  \ 和 `Spacer` 的 `VStack`，如下所示：\n\n    ```\n    var body: some View {\n    VStack\
  \ {\n    Text(message)\n    .padding()\n    Circle()\n    .frame(width: 125, height:\
  \ 125)\n    .foregroundColor(.blue)\n    Spacer()\n    }.background(Color.yellow)\n\
  \    }\n    ```\n\n    这会创建一个位于顶部的 `Text` 视图和一个位于其下方的蓝色 `Circle`。然后 `Spacer` 推动\
  \ `VStack` 的边界向下延伸，并将其背景色设置为黄色以便于观察，如图 11-2 所示。\n\n5.  为 `Circle` 添加一个 `.onTapGesture`\
  \ 修饰符，如下所示：\n\n    ```\n    Circle()\n    .frame(width: 125, height: 125)\n    .foregroundColor(.blue)\n\
  \    .onTapGesture {\n    message = \"Circle tapped\"\n    }\n    ```\n\n    当用户点击\
  \ `Circle` 时，`message` 状态变量将保存字符串 \"Circle tapped\"（圆圈被点击）。\n\n6.  为整个 `VStack`\
  \ 添加一个 `.onTapGesture` 修饰符，如下所示：\n\n    ```\n    var body: some View {\n    VStack\
  \ {\n    Text(message)\n    .padding()\n    Circle()\n    .frame(width: 125, height:\
  \ 125)\n    .foregroundColor(.blue)\n    .onTapGesture {\n    message = \"Circle\
  \ tapped\"\n    }\n    Spacer()\n    }.background(Color.yellow)\n    .onTapGesture\
  \ {\n    message = \"VStack tapped\"\n    }\n    ```\n\n    如果你点击 `Circle`，`Circle`\
  \ 的 `.onTapGesture` 修饰符（显示 \"Circle tapped\"）将被识别。如果你点击 `VStack` 中的其他任何位置，`VStack`\
  \ 的 `.onTapGesture` 修饰符（显示 \"VStack tapped\"）将被识别。整个 `ContentView` 文件应如下所示：\n\n\
  \    ```\n    import SwiftUI\n    struct ContentView_Previews: PreviewProvider {\n\
  \    static var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\
  \n7.  点击画布窗格中的\"实时\"图标，然后点击蓝色的 `Circle`。注意\"Circle tapped\"会出现在 `Text` 视图中。即使 `Circle`\
  \ 位于 `VStack` 内部，`VStack` 的 `.onTapGesture` 修饰符也会被忽略。\n\n8.  点击 `VStack` 的黄色背景。注意\"\
  VStack tapped\"会出现在 `Text` 视图中。\n\n\n\n### 定义高优先级手势\n\n堆栈内视图上的手势总会优先于堆栈上的手势被识别。如果你希望堆栈的手势修饰符优先于堆栈内视图上的手势修饰符执行，则需要使用\
  \ `.highPriorityGesture` 修饰符。\n\n这个 `.highPriorityGesture` 修饰符的作用就是明确哪个手势应具有更高优先级。在本例中，我们希望堆栈的手势修饰符先执行，因此需要将其包裹在\
  \ `.highPriorityGesture` 修饰符中，如下所示：\n\n```\n.highPriorityGesture(\n    TapGesture()\n\
  \        .onEnded { _ in\n            message = \"VStack tapped\"\n        })\n\
  ```\n\n请注意，`TapGesture` 使用 `.onEnded` 修饰符来检测点击手势何时结束，从而将 `\"VStack tapped\"` 存储到\
  \ `message` 这个 `State` 变量中。\n\n要了解 `.highPriorityGesture` 修饰符的工作方式，请遵循以下步骤：\n\n\
  1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `\"HighPriorityGestures\"`。\n2.  在导航器面板中点击\
  \ `ContentView` 文件。\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n  \
  \  ```\n    @State var message = \"\"\n    ```\n4.  在 body 内部添加一个包含 `Text` 视图、`Circle`\
  \ 和 `Spacer` 的 `VStack`，如下所示：\n    ```\n    var body: some View {\n        VStack\
  \ {\n            Text(message)\n                .padding()\n            Circle()\n\
  \                .frame(width: 125, height: 125)\n                .foregroundColor(.blue)\n\
  \            Spacer()\n        }.background(Color.yellow)\n    }\n    ```\n5.  为\
  \ `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n    ```\n    Circle()\n        .frame(width:\
  \ 125, height: 125)\n        .foregroundColor(.blue)\n        .onTapGesture {\n\
  \            message = \"Circle tapped\"\n        }\n    ```\n    通常，当用户点击 `Circle`\
  \ 时，`message` `State` 变量将包含字符串 `\"Circle tapped\"`。\n6.  为整个 `VStack` 添加一个 `.highPriorityGesture`\
  \ 修饰符，如下所示：\n    ```\n    var body: some View {\n        VStack {\n            Text(message)\n\
  \                .padding()\n            Circle()\n                .frame(width:\
  \ 125, height: 125)\n                .foregroundColor(.blue)\n                .onTapGesture\
  \ {\n                    message = \"Circle tapped\"\n                }\n      \
  \      Spacer()\n        }.background(Color.yellow)\n            .highPriorityGesture(\n\
  \                TapGesture()\n                    .onEnded { _ in\n           \
  \             message = \"VStack tapped\"\n                    })\n    }\n    ```\n\
  \    如果你点击 `Circle`，`Circle` 的 `.onTapGesture` 修饰符（`\"Circle tapped\"`）通常会被识别。然而，`.highPriorityGesture`\
  \ 修饰符定义了 `VStack` 上的 `TapGesture` 被优先识别。整个 `ContentView` 文件应如下所示：\n    ```\n   \
  \ import SwiftUI\n    struct ContentView: View {\n        @State var message = \"\
  \"\n        var body: some View {\n            VStack {\n                Text(message)\n\
  \                    .padding()\n                Circle()\n                    .frame(width:\
  \ 125, height: 125)\n                    .foregroundColor(.blue)\n             \
  \       .onTapGesture {\n                        message = \"Circle tapped\"\n \
  \                   }\n                Spacer()\n            }.background(Color.yellow)\n\
  \                .highPriorityGesture(\n                    TapGesture()\n     \
  \                   .onEnded { _ in\n                            message = \"VStack\
  \ tapped\"\n                        })\n        }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
  \        }\n    }\n    ```\n7.  在画布面板中点击“Live”图标，然后点击蓝色 Circle。注意，`Text` 视图中会显示\
  \ `\"VStack tapped\"`，这是因为 `VStack` 上的 `.highPriorityGesture` 修饰符覆盖了 `Circle` 的\
  \ `.onTapGesture` 修饰符。\n8.  点击 `VStack` 的黄色背景。注意，`Text` 视图中仍然显示 `\"VStack tapped\"\
  `。\n\n### 定义同时手势\n\n通常，附加到单个视图上的手势修饰符会优先于附加到堆栈上的任何手势修饰符执行。如果你使用 `.highPriorityGesture`\
  \ 修饰符，则可以让堆栈的手势优先于附加到单个视图上的任何手势修饰符执行。但是，如果你希望附加到视图和附加到堆栈上的两个手势都执行，该怎么办呢？\n\n这时你可以使用\
  \ `.simultaneousGesture` 修饰符来确保堆栈的手势修饰符与附加到单个视图上的手势修饰符同时执行。要定义同时执行的手势，请将通常会被忽略的手势包裹在\
  \ `.simultaneousGesture` 修饰符中，如下所示：\n\n```\n.simultaneousGesture(\n    TapGesture()\n\
  \        .onEnded { _ in\n            message = \"VStack tapped\"\n        })\n\
  ```\n\n要了解 `.simultaneousGesture` 修饰符的工作方式，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App\
  \ 项目，并为其任意命名，例如 `\"SimultaneousGestures\"`。\n2.  在导航器面板中点击 `ContentView` 文件。\n3.\
  \  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n    ```\n    @State var message\
  \ = \"\"\n    ```\n4.  在 body 内部添加一个包含 `Text` 视图、`Circle` 和 `Spacer` 的 `VStack`，如下所示：\n\
  \    ```\n    var body: some View {\n        VStack {\n            Text(message)\n\
  \                .padding()\n            Circle()\n                .frame(width:\
  \ 125, height: 125)\n                .foregroundColor(.blue)\n            Spacer()\n\
  \        }.background(Color.yellow)\n    }\n    ```\n5.  为 `Circle` 添加一个 `.onTapGesture`\
  \ 修饰符，如下所示：\n    ```\n    Circle()\n        .frame(width: 125, height: 125)\n  \
  \      .foregroundColor(.blue)\n        .onTapGesture {\n            message +=\
  \ \"Circle tapped\"\n        }\n    ```\n    请注意，当 `Circle` 识别到点击手势时，它会将 `\"Circle\
  \ tapped\"` 追加（`+=`）到 `message` `State` 变量的当前值中。\n6.  为整个 `VStack` 添加一个 `.simultaneousGesture`\
  \ 修饰符，如下所示：\n    ```\n    var body: some View {\n        VStack {\n            Text(message)\n\
  \                .padding()\n            Circle()\n                .frame(width:\
  \ 125, height: 125)\n                .foregroundColor(.blue)\n                .onTapGesture\
  \ {\n                    message += \"Circle tapped\"\n                }\n     \
  \       Spacer()\n        }.background(Color.yellow)\n            .simultaneousGesture(\n\
  \                TapGesture()\n                    .onEnded { _ in\n           \
  \             message = \"VStack tapped\"\n                    })\n    }\n    ```\n\
  \    如果你点击 `Circle`，`Circle` 的 `.onTapGesture` 修饰符（`\"Circle tapped\"`）通常会被识别。然而，`.simultaneousGesture`\
  \ 修饰符定义了 `VStack` 上的 `TapGesture` 被优先识别，然后再识别 `Circle` 上的手势修饰符。整个 `ContentView`\
  \ 文件应如下所示：\n    ```\n    import SwiftUI\n    struct ContentView: View {\n      \
  \  @State var message = \"\"\n        var body: some View {\n            VStack\
  \ {\n                Text(message)\n                    .padding()\n           \
  \     Circle()\n                    .frame(width: 125, height: 125)\n          \
  \          .foregroundColor(.blue)\n                    .onTapGesture {\n      \
  \                  message += \"Circle tapped\"\n                    }\n       \
  \         Spacer()\n            }.background(Color.yellow)\n                .simultaneousGesture(\n\
  \                    TapGesture()\n                        .onEnded { _ in\n   \
  \                         message = \"VStack tapped\"\n                        })\n\
  \        }\n    }\n    struct ContentView_Previews: PreviewProvider {\n        static\
  \ var previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
  7.  在画布面板中点击“Live”图标，然后点击蓝色 Circle。注意，`Text` 视图中会显示 `\"VStack tappedCircle tapped\"\
  `，这是因为 `VStack` 上的 `.simultaneousGesture` 修饰符使其在 `Circle` 的 `.onTapGesture` 修饰符之前执行。\n\
  8.  点击 `VStack` 的黄色背景。注意，`Text` 视图中仍然显示 `\"VStack tapped\"`。\n\n## 总结\n\n触摸手势无需在用户界面上放置按钮等对象即可向应用发送指令。手势通常可以用一个或多个指尖来操作，例如双击或三击。\n\
  \n在添加多个手势时，请记住：附加到单个视图上的手势会优先于附加到堆栈上的手势执行。如果你希望堆栈的手势修饰符先执行，请将其包裹在 `.highPriorityGesture`\
  \ 修饰符中。如果你希望堆栈和单个视图的手势修饰符依次执行，请将堆栈修饰符包裹在 `.simultaneousGesture` 修饰符中。\n\n通过让用户直接操作屏幕上的对象，为应用添加手势可以使用户界面更加简洁、直观。\n\
  \n\n\n"
- "# 12. 使用警告框、操作列表和上下文菜单\n\n几乎每个应用都需要向用户显示并接收数据。显示数据的最简单方式是通过`Text`视图，但有时你需要展示数据并给用户提供回应方式。此时，你可以使用`Alert`（警告框）或`Action\
  \ Sheet`（操作列表）。另一种向用户显示选项的方式是上下文菜单。\n\n`Alert`会在屏幕上弹出，让用户有机会做出回应。用户可以通过点击一个或多个按钮来关闭`Alert`，如图\
  \ 12-1 所示。\n\n![](img/329781_7_En_12_Fig1_HTML.jpg)\n\n一个显示警告信息的对话框截图。文字显示\"僵尸出没\"\
  。底部有一个\"确定\"按钮。\n\n图 12-1\n\n一个`Alert`通常显示一条消息和一个或多个按钮\n\n`Action Sheet`看起来与`Alert`几乎相同，区别在于`Alert`出现在屏幕中央，而`Action\
  \ Sheet`从底部滑入并显示在屏幕底部。`Alert`更侧重于吸引用户注意，例如在你要删除无法恢复或撤销的数据时发出警告。而操作列表则更侧重于作为提醒，可能不那么关键或具有破坏性。\n\
  \n上下文菜单在长按`Text`视图等视图后出现。它会弹出一个选项列表供用户选择，如图 12-2 所示。\n\n![](img/329781_7_En_12_Fig2_HTML.jpg)\n\
  \n一个上下文菜单的截图，包含红色、紫色、绿色和橙色等颜色选项列表。底部文字显示\"选择一种颜色\"。\n\n图 12-2\n\n上下文菜单列出多个选项供选择\n\
  \n## 显示警告框/操作列表\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以仅通过标签显示，但有时你需要确保用户看到特定信息。在这些情况下，你应该使用警告控制器。\n\
  \n`Alert`/`Action Sheet`会覆盖在应用的用户界面之上，并可通过更改以下属性进行自定义：\n\n*   标题 – 显示在`Alert`/`Action\
  \ Sheet`顶部的文本，通常为粗体大字号\n*   消息 – 显示在标题下方、字号较小的文本\n*   一个或多个按钮 – 可关闭`Alert`/`Action\
  \ Sheet`的按钮\n\n标题通常由单个单词或短语组成，用以说明警告控制器的用途，例如显示\"警告\"或\"登录\"。要关闭`Alert`/`Action\
  \ Sheet`，你至少需要一个按钮。\n\n要了解如何创建一个仅显示标题、消息和关闭按钮的简单`Alert`/`Action Sheet`，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\"Alert\"。\n2.  在导航器窗格中点击`ContentView`文件。\n\
  3.  在`struct ContentView: View`行下添加以下`State`变量：\n\n    ```\n    @State var showAlert\
  \ = false\n    ```\n\n4.  添加一个包含`Button`的`VStack`，如下所示：\n\n    ```\n    var body:\
  \ some View {\n        VStack {\n            Button(\"Show Alert\") {\n        \
  \        showAlert.toggle()\n            }\n        }\n    }\n    ```\n\n5.  向`Button`添加`.alert`修饰符，如下所示：\n\
  \n    ```\n    .alert(isPresented: $showAlert) {\n        Alert(title: Text(\"Warning!\"\
  ), message: Text(\"Zombies on the loose\"), dismissButton: .default(Text(\"OK\"\
  )))\n    }\n    ```\n\n    当`showAlert`的`State`变量为`true`时，此`.alert`修饰符会显示一个`Alert`。它使用一个`Text`视图显示\"\
  Warning!\"，并使用第二个`Text`视图显示\"Zombies on the loose\"。最后，它使用第三个`Text`视图在`Button`上显示\"\
  OK\"。\n\n注意\n    `Alert`使用`dismissButton:`参数来定义单个显示的按钮。为简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，例如：`Alert.Button.default`。\n\
  \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
  \    @State var showAlert = false\n    \n    var body: some View {\n        VStack\
  \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
  \            }\n            .alert(isPresented: $showAlert) {\n                Alert(title:\
  \ Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), dismissButton: .default(Text(\"\
  OK\")))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n6.  点击画布窗格中的\"Live\"图标，然后点击`Button`以显示屏幕中央的`Alert`（参见图 12-1）。\n7.  点击\"OK\"关闭`Alert`。\n\
  8.  将`.alert`替换为`.actionSheet`，如下所示：\n\n    ```\n    .actionSheet(isPresented: $showAlert)\
  \ {\n        ActionSheet(title: Text(\"Warning!\"), message: Text(\"Zombies on the\
  \ loose\"), buttons: [.default(Text(\"OK\"))])\n    }\n    ```\n\n注意\n    在`Alert`使用`dismissButton:`参数定义`Button`的地方，`ActionSheet`使用`buttons:`参数，并将一个或多个按钮用方括号`[\
  \ ]`括起来（类似数组）。为简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，例如：`ActionSheet.Button.default`。\n\
  \n9.  点击模拟 iOS 屏幕上的`Button`。注意，现在屏幕底部会出现一个`Action Sheet`。\n10. 点击\"OK\"按钮关闭`Action\
  \ Sheet`。\n\n创建`Alert`或`Action Sheet`几乎完全相同，仅在定义按钮以及使用`.alert`（和`Alert`）还是`.actionSheet`（`ActionSheet`）时略有差异。\n\
  \n\n\n### 显示与响应多个按钮\n\n最简单的 `Alert`/`ActionSheet` 会显示一个允许用户关闭它的单一按钮。然而，你可能希望为用户提供多个选项以供选择，并根据用户点击的按钮做出不同的响应。\n\
  \n`Alert` 最多可以显示两个按钮，分别称为 `primaryButton` 和 `secondaryButton`。而 `ActionSheet` 最多可以显示三个按钮。对于你希望显示的每个按钮，可以从如图\
  \ 12-3 所示的三种样式中选择一种：\n\n![](img/329781_7_En_12_Fig3_HTML.jpg)\n\n一张上下文菜单的截图，顶部显示一条警告信息。底部显示三个选项，分别标注为默认、破坏性和取消。\n\
  \n图 12-3\n\n按钮的三种不同样式\n\n- `.default` – 以蓝色显示文本\n- `.destructive` – 以红色显示文本\n- `.cancel`\
  \ – 以粗体显示文本\n\n要了解如何创建一个显示两个按钮的 `Alert`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“AlertTwoButtons”。\n\
  2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 一行下方添加以下 `State`\
  \ 变量：\n\n```\n@State var showAlert = false\n```\n\n4. 在 `var body: some View` 内部添加一个\
  \ `VStack` 和一个 `Button`，如下所示：\n\n```\nvar body: some View {\n    VStack {\n    \
  \    Button(\"Show Alert\") {\n            showAlert.toggle()\n        }\n    }\n\
  }\n```\n\n5. 为 `Button` 添加一个 `.alert` 修饰符，如下所示：\n\n```\n.alert(isPresented: $showAlert)\
  \ {\n    Alert(title: Text(\"Warning!\"),\n          message: Text(\"Zombies on\
  \ the loose\"),\n          primaryButton: .default(Text(\"Default\")),\n       \
  \   secondaryButton: .cancel(Text(\"Cancel\")))\n}\n```\n\n无论是 `primaryButton` 还是\
  \ `secondaryButton`，你都可以改用 `.destructive` 按钮类型，仅用于观察按钮在 `Alert` 中的外观变化。整个 `ContentView`\
  \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var showAlert\
  \ = false\n    var body: some View {\n        VStack {\n            Button(\"Show\
  \ Alert\") {\n                showAlert.toggle()\n            }\n            .alert(isPresented:\
  \ $showAlert) {\n                Alert(title: Text(\"Warning!\"),\n            \
  \          message: Text(\"Zombies on the loose\"),\n                      primaryButton:\
  \ .default(Text(\"Default\")),\n                      secondaryButton: .cancel(Text(\"\
  Cancel\")))\n            }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n6. 在画布窗格中点击“实时”图标，然后点击“Show Alert”按钮。`Alert` 将会显示。\n7. 点击“Default”或“Cancel”按钮以关闭\
  \ `Alert`。\n\n要了解如何创建一个显示三个按钮的 `ActionSheet`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS\
  \ 应用项目，并为其指定任意名称，例如“ActionSheetButtons”。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct\
  \ ContentView: View` 一行下方添加以下 `State` 变量：\n\n```\n@State var showAlert = false\n\
