  \n4.  在画布窗格中点击“Live”图标。表格现在应如图 19-9 所示。\n\n\n\n## 摘要\n\n网格提供了在用户界面上显示视图的另一种方式。`LazyHGrids`\
  \ 可以水平按行显示视图，而 `LazyVGrids` 可以垂直按列显示视图。要使用网格，你需要准备待显示的数据、一个用于定义数据在网格中排列方式的 `GridItem`\
  \ 数组，以及一个 `LazyHGrid` 或 `LazyVGrid`。\n\n数组中定义的 `GridItem` 数量决定了网格中显示的行/列数。通过每个 `GridItem`，你可以定义诸如\
  \ `.fixed`、`.flexible` 或 `.adaptive` 等间距选项。\n\n`.fixed` 选项允许你定义一个十进制数值作为间距，例如 `25.7`。`.flexible`\
  \ 选项会尽可能扩展间距，而 `.adaptive` 选项则会尽可能缩小间距。你可以为数组中的每个 `GridItem` 应用不同的间距选项。\n\n通过使用网格，你可以在行和列中显示数据。网格通常嵌入在\
  \ `Scroll View` 中，以便用户能够上下或左右滚动，查看那些可能因网格尺寸和 iOS 设备屏幕大小而无法完全显示的数据。\n\n如果你想以表格形式显示数据，请使用网格定义表格结构，然后使用多个\
  \ `GridRows` 来定义行数。在每个 `GridRow` 内部，定义一个或多个视图，这些视图的总数决定了表格的列数。网格只是一种组织和显示相关数据的便捷方式，目的是让用户更容易阅读。\n\
  \n# 使用动画\n\n动画可以移动用户界面上的元素，以提供反馈或仅仅增加美感。与手工制作的传统动画（漫画家需要逐帧绘制，每帧略有不同）不同，SwiftUI 中的动画只需定义起始状态和结束状态即可运行。然后\
  \ SwiftUI 会负责处理元素在这两种状态之间的动画过渡。\n\n三种最常见的动画类型包括：\n\n*   **移动** – 改变元素在用户界面上的 `x`\
  \ 和 `y` 位置\n*   **缩放** – 通过缩小或放大来改变元素的大小\n*   **旋转** – 沿顺时针或逆时针方向改变元素的角度\n\n创建动画涉及定义：要动画化什么、如何动画化（移动、缩放、旋转）以及何时动画化。动画通常发生在用户执行某些操作（如点击按钮）或特定事件发生（如数值达到某个点）时。\n\
  \n## 移动动画\n\n要移动一个视图，我们必须定义其 `x`、`y` 的起始位置和 `x`、`y` 的结束位置。用于指定位置的两个修饰符是 `.position`\
  \ 和 `.offset`。\n\n`.position` 修饰符将视图放置于相对于 iOS 设备屏幕左上角（被视为原点 (0,0)）的特定 `x` 和 `y`\
  \ 位置。`.offset` 修饰符则将视图放置于相对于它通常在用户界面上出现位置的特定 `x` 和 `y` 偏移量处。\n\n`.position` 修饰符定义的是屏幕上的固定位置。`.offset`\
  \ 修饰符定义的是相对于视图在 `.offset` 修饰符的 `x` 和 `y` 值均为 `0` 时正常显示位置的相对位置。在这两种情况下，正的 `x` 值将视图向右移动，正的\
  \ `y` 值将视图向下移动，如图 20-1 所示。\n\n![](img/329781_7_En_20_Fig1_HTML.jpg)\n\n一组两个矩形框。左上角有一个对角箭头，标注为\
  \ position 修饰符。位于垂直矩形框中心的一个矩形标注为 offset 修饰符，并用一个对角箭头标记。\n\n图 20-1: `.position` 修饰符与\
  \ `.offset` 修饰符之间的区别\n\n**注意：** 使用 `.position` 和 `.offset` 修饰符时，极端的 `x` 或 `y` 值可能会导致视图移出屏幕。\n\
  \n要了解如何使用 `.position` 和 `.offset` 修饰符移动视图，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App\
  \ 项目，并为其指定任何你喜欢的名称，例如 \"AnimationMove\"。\n2.  在导航器面板中点击 ContentView 文件。\n3.  在 `struct\
  \ ContentView: View` 代码行下方添加一个 `State` 变量，如下所示：\n\n```\n@State var move = true\n\
  ```\n\n4.  在 `VStack` 内部添加一个 `Text` 视图和一个 `Toggle`，如下所示：\n\n```\nvar body: some\
  \ View {\n    VStack {\n        Text(\"A Text view\")\n            .offset(x: move\
  \ ? 100 : 0, y: move ? 100 : 0)\n        Toggle(isOn: $move) {\n            Text(\"\
  Toggle me\")\n        }\n    }\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport\
  \ SwiftUI\n\nstruct ContentView: View {\n    @State var move = true\n\n    var body:\
  \ some View {\n        VStack {\n            Text(\"A Text view\")\n           \
  \     .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n            Toggle(isOn: $move)\
  \ {\n                Text(\"Toggle me\")\n            }\n        }\n    }\n}\n\n\
  struct ContentView_Previews: PreviewProvider {\n    static var previews: some View\
  \ {\n        ContentView()\n    }\n}\n```\n\n5.  点击画布面板中的 Live 图标。\n6.  点击 Toggle。注意\
  \ `.offset` 修饰符将 `Text` 视图从其正常位置移开。\n7.  编辑 `ContentView` 文件，将 `.offset` 替换为 `.position`，如下所示：\n\
  \n```\n.position(x: move ? 100 : 0, y: move ? 100 : 0)\n```\n\n8.  确保 Live 仍处于开启状态，然后点击\
  \ Toggle。注意 `Text` 视图现在根据屏幕左上角的原点 (0,0) 进行移动。\n9.  为 `Text` 视图添加 `.animation` 修饰符，使移动看起来更平滑。\n\
  \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var move = true\n\
  \n    var body: some View {\n        VStack {\n            Text(\"A Text view\"\
  )\n                .position(x: move ? 100 : 0, y: move ? 100 : 0)\n           \
  \     .animation(.default, value: move)\n            Toggle(isOn: $move) {\n   \
  \             Text(\"Toggle me\")\n            }\n        }\n    }\n}\n\nstruct\
  \ ContentView_Previews: PreviewProvider {\n    static var previews: some View {\n\
  \        ContentView()\n    }\n}\n```\n\n10. 确保 Live 仍处于开启状态，然后点击 Toggle。注意 `Text`\
  \ 视图现在在根据屏幕左上角原点 (0,0) 移动时呈现动画效果。\n11. 将 `.position` 修饰符替换为 `.offset` 修饰符。\n12.\
  \ 确保 Live 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在在基于其正常位置移动时呈现动画效果。\n\n在这个项目中，`.animation`\
  \ 修饰符提供了 `Text` 视图在两个不同 `x` 和 `y` 位置之间的过渡。每次 `Toggle` 改变布尔类型的 `State` 变量时，动画都会再次运行。\n\
  \n`.animation` 修饰符需要定义你想要动画的类型（例如 `.default`）以及将触发动画的变量。在这种情况下，每次 `move` 变量改变时，我们都希望有动画效果，这就是为什么\
  \ `.animation` 修饰符在其 `value` 参数中显示 `move`，如下所示：\n\n```\n@State var move = true\n\
  .animation(.default, value: move)\n```\n\n\n\n### 缩放动画\n\n创建动画的另一种方法是为视图定义两种不同的大小，即缩放。要定义视图大小的起始和结束状态，请使用\
  \ `.scaleEffect` 修饰符并定义相对的尺寸变化。例如，`.scaleEffect(1)` 表示视图的当前大小。大于 1 的 `.scaleEffect`\
  \ 值表示更大的尺寸或缩放比例，而小于 1 的 `.scaleEffect` 值则表示更小的尺寸或缩放比例。\n\n要了解如何通过将视图缩放到不同大小来制作动画，请按以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“AnimationScale”。\n2. 在导航器面板中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 代码行下方添加一个 `State` 变量，如下所示：\n\n```\n@State\
  \ private var changeMe = false\n```\n\n4. 在 `var body: some View` 内部添加一个 `Image`\
  \ 视图，如下所示：\n\n```\nvar body: some View {\n    Image(systemName: \"tortoise.fill\"\
  )\n        .font(.system(size:100))\n        .foregroundColor(.red)\n        .scaleEffect(changeMe\
  \ ? 1.75 : 1)\n}\n```\n\n这会在屏幕上显示一个大小为 100 的海龟图标，使其更容易看清。然后将海龟图标着色为红色，并使用 `.scaleEffect`\
  \ 修饰符在原始大小的 1.75 倍和原始大小之间切换。\n\n5. 像这样为 `Image` 视图添加以下修饰符：\n\n```\n.animation(.default,\
  \ value: changeMe)\n.onTapGesture {\n    changeMe.toggle()\n}\n```\n\n这为 `Image`\
  \ 视图添加了 `.animation` 修饰符，使其大小变化呈现动画效果。然后，`.onTapGesture` 修饰符检测点击手势，将 `changeMe`\
  \ `State` 变量从 `true` 切换为 `false`（或从 `false` 切换为 `true`）。整个 `ContentView` 文件应如下所示：\n\
  \n```\nimport SwiftUI\nstruct ContentView: View {\n    @State private var changeMe\
  \ = false\n    var body: some View {\n        Image(systemName: \"tortoise.fill\"\
  )\n            .font(.system(size:100))\n            .foregroundColor(.red)\n  \
  \          .scaleEffect(changeMe ? 1.75 : 1)\n            .animation(.default, value:\
  \ changeMe)\n            .onTapGesture {\n                changeMe.toggle()\n  \
  \          }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
  \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n6. 在画布面板中点击“Live”图标。\n\
  7. 点击海龟图像。请注意，每次点击海龟图像时，它都会在缩小和放大之间切换。\n\n### 旋转动画\n\n动画旋转涉及使用 `.rotationEffect`\
  \ 修饰符改变视图的角度。`.rotationEffect` 值为 0 表示不旋转，而小于或大于 0 的旋转值则分别使视图逆时针或顺时针旋转。\n\n要了解如何通过将视图旋转不同角度来制作动画，请按以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“AnimationRotate”。\n2. 在导航器面板中点击 `ContentView`\
  \ 文件。\n3. 在 `struct ContentView: View` 代码行下方添加两个 `State` 变量，如下所示：\n\n```\n@State\
  \ var myDegrees: Double = 0.0\n@State var flag = false\n```\n\n4. 在 `VStack` 内部添加一个\
  \ `Text` 视图，如下所示：\n\n```\nvar body: some View {\n    VStack {\n        Text(\"Hello,\
  \ world!\")\n            .padding()\n            .rotationEffect(Angle(degrees:\
  \ flag ? myDegrees : 0))\n            .animation(.default, value: flag)\n```\n\n\
  此 `Text` 视图使用 `.rotationEffect` 定义起始和结束角度。然后使用 `.animation` 修饰符在 `Text` 视图在起始和结束角度之间旋转时为其添加动画效果。每当\
  \ `flag` 变量发生变化时，`.animation` 修饰符就会显示动画。\n\n5. 在 `VStack` 内部的 `Text` 视图下方添加一个 `Button`\
  \ 和一个 `Slider`，如下所示：\n\n```\nvar body: some View {\n    VStack {\n        Text(\"\
  Hello, world!\")\n            .padding()\n            .rotationEffect(Angle(degrees:\
  \ flag ? myDegrees : 0))\n            .animation(.default, value: flag)\n      \
  \  Button(\"Animate now\") {\n            flag.toggle()\n        }\n        Slider(value:\
  \ $myDegrees, in: -180...180, step: 1)\n            .padding()\n    }\n}\n```\n\n\
  `Slider` 允许你在 -180 度到 180 度之间选择一个角度。整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n    @State var myDegrees: Double = 0.0\n    @State var\
  \ flag = false\n    var body: some View {\n        VStack {\n            Text(\"\
  Hello, world!\")\n                .padding()\n                .rotationEffect(Angle(degrees:\
  \ flag ? myDegrees : 0))\n                .animation(.default, value: flag)\n  \
  \          Button(\"Animate now\") {\n                flag.toggle()\n          \
  \  }\n            Slider(value: $myDegrees, in: -180...180, step: 1)\n         \
  \       .padding()\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n6. 在画布面板中点击“Live”图标。\n7. 向左或向右拖动 `Slider` 来定义结束角度。（起始角度为 0。）\n8. 点击 `Button`。请注意，当\
  \ `Text` 视图旋转到新角度时，`.animation` 修饰符会为其添加动画效果。\n\n## 动画选项\n\n到目前为止，我们一直在 `.animation`\
  \ 修饰符中使用 `.default` 设置。虽然这可行，但你还可以选择其他几种动画选项：\n\n- `.easeIn` – 动画开始较慢，然后加速\n- `.easeOut`\
  \ – 动画在接近结束时减慢\n- `.easeInOut` – 动画开始较慢，然后加速，最后接近结束时减速（与 `.default` 相同）\n- `.linear`\
  \ – 动画从开始到结束保持恒定速度\n\n通过选择不同的 `.animation` 选项，你可以调整动画运行时的外观。要比较这些不同的 `.animation`\
  \ 选项，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“CompareAnimation”。\n2. 在导航器面板中点击\
  \ `ContentView` 文件。\n3. 在 `struct ContentView: View` 代码行下方添加一个 `State` 变量，如下所示：\n\
  \n```\n@State private var start = false\n```\n\n4. 在 `var body: some View` 中添加一个\
  \ `VStack`。\n5. 在 `VStack` 内部添加一个 `Button`，如下所示：\n\n```\nvar body: some View {\n\
  \    VStack {\n        Button(\"Start animation\") {\n            start.toggle()\n\
  \        }\n```\n\n6. 在 `Button` 下方添加一个包含四个 `Text` 视图的 `HStack`，如下所示：\n\n```\nHStack\
  \ {\n    Text(\"easeIn\")\n        .offset(x: 0, y: start ? 450 : 0)\n        .animation(.easeIn,\
  \ value: start)\n    Text(\"easeOut\")\n        .offset(x: 0, y: start ? 450 : 0)\n\
  \        .animation(.easeOut, value: start)\n    Text(\"easeInOut\")\n        .offset(x:\
  \ 0, y: start ? 450 : 0)\n        .animation(.easeInOut, value: start)\n    Text(\"\
  linear\")\n        .offset(x: 0, y: start ? 450 : 0)\n        .animation(.linear,\
  \ value: start)\n}.position(x: 150, y: 10)\n```\n\n请注意，`.position` 修饰符最初将整个 `HStack`\
  \ 及其所有四个 `Text` 视图放置在靠近屏幕顶部的位置。整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
  struct ContentView: View {\n    @State private var start = false\n    var body:\
  \ some View {\n        VStack {\n            Button(\"Start animation\") {\n   \
  \             start.toggle()\n            }\n            HStack {\n            \
  \    Text(\"easeIn\")\n                    .offset(x: 0, y: start ? 450 : 0)\n \
  \                   .animation(.easeIn, value: start)\n                Text(\"easeOut\"\
  )\n                    .offset(x: 0, y: start ? 450 : 0)\n                    .animation(.easeOut,\
  \ value: start)\n                Text(\"easeInOut\")\n                    .offset(x:\
  \ 0, y: start ? 450 : 0)\n                    .animation(.easeInOut, value: start)\n\
  \                Text(\"linear\")\n                    .offset(x: 0, y: start ?\
  \ 450 : 0)\n                    .animation(.linear, value: start)\n            }.position(x:\
  \ 150, y: 10)\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n7. 在画布面板中点击“Live”图标。\n8. 点击 `Button`。请注意，所有四个 `Text` 视图都会向下移动到屏幕底部，但由于它们使用了不同的\
  \ `.animation` 选项，即使它们同时开始和停止，动画效果也略有不同。\n\n\n\n### 在动画中使用延迟和持续时间\n\n通过两种方式可以按时间修改动画，即延迟和持续时间。延迟让你指定动画开始前等待的秒数。持续时间则让你指定动画应持续多久。较大的时间值会使动画运行得更慢，而较短的时间值会使动画运行得更快。\n\
  \n要定义延迟，请在你希望的 `.animation` 选项上添加 `.delay` 修饰符，例如：\n\n```\n.animation(.linear.delay(2.5),\
  \ value: yourVariableNameHere)\n```\n\n要查看延迟的工作原理，请按照以下步骤操作：\n\n1.  加载之前的“CompareAnimation”\
  \ Xcode 项目。\n2.  为每个 `.animation` 选项添加 `.delay` 修饰符，如下所示：\n\n```\n    HStack {\n\
  \    Text(\"easeIn\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeIn.delay(0.5))\n\
  \    Text(\"easeOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeOut.delay(1.0))\n\
  \    Text(\"easeInOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeInOut.delay(1.5))\n\
  \    Text(\"linear\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.linear.delay(2.5))\n\
  \    }.position(x: 150, y: 10)\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\n    import\
  \ SwiftUI\n    struct ContentView: View {\n    @State private var start = false\n\
  \    var body: some View {\n    VStack {\n    Button(\"Start animation\") {\n  \
  \  start.toggle()\n    }\n    HStack {\n    Text(\"easeIn\")\n    .offset(x: 0,\
  \ y: start ? 450 : 0)\n    .animation(.easeIn.delay(0.5), value: start)\n    Text(\"\
  easeOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeOut.delay(1.0),\
  \ value: start)\n    Text(\"easeInOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.easeInOut.delay(1.5), value: start)\n    Text(\"linear\")\n   \
  \ .offset(x: 0, y: start ? 450 : 0)\n    .animation(.linear.delay(2.5), value: start)\n\
  \    }.position(x: 150, y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n```\n\n3.  在画布窗格中单击“Live”图标。\n4.  单击“Button”按钮。请注意，如果每个 `Text` 视图具有不同的\
  \ `.delay` 值，它们现在会在不同时间进行动画。\n\n要定义持续时间，请在你希望的 `.animation` 选项上添加持续时间，例如：\n\n```\n\
  .animation(.easeIn(duration: 0.7), value: start)\n```\n\n> **注意**：你可以将持续时间与延迟结合使用，如下所示：`.animation(.linear(duration:\
  \ 3.1).delay(1.2), value: start).`\n\n延迟是临时阻止动画启动，而持续时间则定义该动画实际运行的时间。要查看持续时间的工作原理，请按照以下步骤操作：\n\
  \n1.  加载之前的“CompareAnimation” Xcode 项目。\n2.  为每个 `.animation` 选项添加持续时间，如下所示：\n\n\
  ```\n    HStack {\n    Text(\"easeIn\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.easeIn(duration: 0.7), value: start)\n    Text(\"easeOut\")\n \
  \   .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeOut(duration: 1.7), value:\
  \ start)\n    Text(\"easeInOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeInOut(duration:\
  \ 2.6), value: start)\n    Text(\"linear\")\n    .offset(x: 0, y: start ? 450 :\
  \ 0)\n    .animation(.linear(duration: 3.1), value: start)\n    }.position(x: 150,\
  \ y: 10)\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\n    import SwiftUI\n    struct\
  \ ContentView: View {\n    @State private var start = false\n    var body: some\
  \ View {\n    VStack {\n    Button(\"Start animation\") {\n    start.toggle()\n\
  \    }\n    HStack {\n    Text(\"easeIn\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.easeIn(duration: 0.7), value: start)\n    Text(\"easeOut\")\n \
  \   .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeOut(duration: 1.7), value:\
  \ start)\n    Text(\"easeInOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeInOut(duration:\
  \ 2.6), value: start)\n    Text(\"linear\")\n    .offset(x: 0, y: start ? 450 :\
  \ 0)\n    .animation(.linear(duration: 3.1), value: start)\n    }.position(x: 150,\
  \ y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n```\n\
  \n3.  在画布窗格中单击“Live”图标。\n4.  单击“Button”按钮。注意不同的持续时间值如何修改各种动画。\n\n### 在动画中使用插值弹簧动画\n\
  \n为了提供更多自定义动画工作方式的方法，你还可以为动画定义一个 `.interpolatingSpring` 修饰符。`.interpolatingSpring`\
  \ 允许你定义以下一项或多项：\n\n- **质量**——低数值会使动画更慢且阻尼更小；高数值会使动画更快且阻尼更大。\n- **刚度**——低数值会使动画更慢；高数值会使动画更快。\n\
  - **阻尼**——低数值会产生更多“弹跳”；高数值会抑制“弹跳”。\n- **初始速度**——低数值会使动画开始时较慢；高数值会使动画开始时较快。\n\n要查看刚度和阻尼的工作原理，请按照以下步骤操作：\n\
  \n1.  加载之前的“CompareAnimation” Xcode 项目。\n2.  将所有 `Text` 视图改为显示相同的字符串，例如“spring”。\n\
  3.  为每个 `Text` 视图添加 `.interpolatingSpring` 修饰符，如下所示：\n\n```\n    HStack {\n    Text(\"\
  spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness:\
  \ 1, damping: 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start\
  \ ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness: 1.8, damping: 1), value:\
  \ start)\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness:\
  \ 0.5, damping: 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start\
  \ ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness: 2, damping: 1), value:\
  \ start)\n    }.position(x: 150, y: 10)\n```\n\n确保每个 `.animation` 修饰符的 `damping`\
  \ 参数相同，并且每个 `.animation` 修饰符的 `stiffness` 参数不同。整个 `ContentView` 文件应如下所示：\n\n```\n\
  \    import SwiftUI\n    struct ContentView: View {\n    @State private var start\
  \ = false\n    var body: some View {\n    VStack {\n    Button(\"Start animation\"\
  ) {\n    start.toggle()\n    }\n    HStack {\n    Text(\"spring\")\n    .offset(x:\
  \ 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness: 1, damping:\
  \ 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.interpolatingSpring(stiffness: 1.8, damping: 1), value: start)\n\
  \    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness:\
  \ 0.5, damping: 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start\
  \ ? 450 : 0)\n    .animation(.interpolatingSpring(stiffness: 2, damping: 1), value:\
  \ start)\n    }.position(x: 150, y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n```\n\n4.  在画布窗格中单击“Live”图标。\n5.  单击“Button”按钮。注意不同的 `stiffness` 值如何改变每个\
  \ `Text` 视图的动画方式。\n6.  编辑 `.animation` 修饰符，使得 `stiffness` 值相同，但 `damping` 值不同。\n\
  7.  单击“Button”按钮。注意不同的 `damping` 值如何改变每个 `Text` 视图在停止前上下弹跳的方式。\n\n除了 `stiffness`\
  \ 和 `damping`，你还可以定义 `mass` 和 `initialVelocity`。通过尝试所有四个参数的不同值，你可以进一步自定义动画。\n\n\
  要查看 `mass` 和 `initialVelocity` 如何影响动画，请按照以下步骤操作：\n\n1.  加载之前的“CompareAnimation”\
  \ Xcode 项目。\n2.  为每个 `Text` 视图添加 `.interpolatingSpring` 修饰符，如下所示：\n\n\n\n```swift\n\
  \    HStack {\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n   \
  \ .animation(.interpolatingSpring(mass: 1, stiffness: 1, damping: 1, initialVelocity:\
  \ 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.interpolatingSpring(mass: 1.9, stiffness: 1, damping: 1, initialVelocity:\
  \ 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.interpolatingSpring(mass: 2.5, stiffness: 1, damping: 1, initialVelocity:\
  \ 1), value: start)\n    Text(\"spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    .animation(.interpolatingSpring(mass: 3.5, stiffness: 1, damping: 1, initialVelocity:\
  \ 1), value: start)\n    }.position(x: 150, y: 10)\n    ```\n\n确保每个 `.animation`\
  \ 修饰符中的 `initialVelocity` 值相同，但每个 `.animation` 修饰符中的 `mass` 值不同。整个 `ContentView`\
  \ 文件应如下所示：\n\n```swift\n    import SwiftUI\n    struct ContentView: View {\n   \
  \ @State private var start = false\n    var body: some View {\n    VStack {\n  \
  \  Button(\"Start animation\") {\n    start.toggle()\n    }\n    HStack {\n    Text(\"\
  spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(mass:\
  \ 1, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n    Text(\"spring\"\
  )\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(mass:\
  \ 1.9, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n    Text(\"\
  spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(mass:\
  \ 2.5, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n    Text(\"\
  spring\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.interpolatingSpring(mass:\
  \ 3.5, stiffness: 1, damping: 1, initialVelocity: 1), value: start)\n    }.position(x:\
  \ 150, y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n   \
  \ ```\n\n3.  在画布面板中点击“Live”图标。\n\n4.  点击“Button”。注意较高的 `mass` 值与较低的 `mass` 值相比，如何影响动画效果。\n\
  \n5.  编辑 `.animation` 修饰符，使 `mass` 值相同，但 `initialVelocity` 值不同。\n\n6.  点击“Button”。注意不同的\
  \ `initialVelocity` 值如何改变每个 `Text` 视图开始动画的方式。\n\n通过改变 `mass`、`stiffness`、`damping`\
  \ 和 `initialVelocity` 的值，你可以为用户界面找到完美的动画效果。\n\n## 使用 withAnimation\n\n通过使用 `.animation`\
  \ 修饰符，你可以定义想要动画化的视图。`.animation` 修饰符的一个问题是，如果你有五个想要以相同方式动画化的视图，你必须将相同的 `.animation`\
  \ 修饰符添加到所有五个视图中，如下所示：\n\n```swift\nHStack {\nText(\"One\")\n.offset(x: 0, y: start\
  \ ? 450 : 0)\n.animation(.default, value: start)\nText(\"Two\")\n.offset(x: 0, y:\
  \ start ? 450 : 0)\n.animation(.default, value: start)\nText(\"Three\")\n.offset(x:\
  \ 0, y: start ? 450 : 0)\n.animation(.default, value: start)\nText(\"Four\")\n.offset(x:\
  \ 0, y: start ? 450 : 0)\n.animation(.default, value: start)\nText(\"Five\")\n.offset(x:\
  \ 0, y: start ? 450 : 0)\n.animation(.default, value: start)\n}\n```\n\n为了解决这个问题，SwiftUI\
  \ 提供了第二种动画视图的方法。`withAnimation` 允许你指定一个可以动画视图的 `State` 变量。你无需在单独的视图中编写多个 `.animation`\
  \ 修饰符，只需定义要影响的 `State` 变量，当该 `State` 变量改变时，它会自动动画化任何使用该 `State` 变量的视图，如下所示：\n\n\
  ```swift\nwithAnimation {\nstart.toggle()\n}\n```\n\n要了解 `withAnimation` 的工作原理，请按照以下步骤操作：\n\
  \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“WithAnimation”。\n\n2.  在导航面板中点击 `ContentView`\
  \ 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个 `State` 变量，如下所示：\n\n4.  在 `var\
  \ body: some View` 行下方添加一个 `VStack` 和一个 `Button`，如下所示：\n\n```swift\n    var body:\
  \ some View {\n    VStack {\n    Button(\"Start animation\") {\n    start.toggle()\n\
  \    }\n    ```\n\n5.  在 `Button` 下方添加一个包含五个 `Text` 视图的 `HStack`，如下所示：\n\n```swift\n\
  \    HStack {\n    Text(\"One\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
  \ value: start)\n    Text(\"Two\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
  \ value: start)\n    Text(\"Three\")\n    .offset(x: 0, y: start ? 450 : 0)\n  \
  \  .animation(.default, value: start)\n    Text(\"Four\")\n    .offset(x: 0, y:\
  \ start ? 450 : 0)\n    .animation(.default, value: start)\n    Text(\"Five\")\n\
  \    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default, value: start)\n\
  \    }.position(x: 150, y: 10)\n    ```\n\n注意每个 `Text` 视图都具有相同的 `.animation` 修饰符。整个\
  \ `ContentView` 文件应如下所示：\n\n```swift\n    import SwiftUI\n    struct ContentView:\
  \ View {\n    @State private var start = false\n    var body: some View {\n    VStack\
  \ {\n    Button(\"Start animation\") {\n    start.toggle()\n    }\n    HStack {\n\
  \    Text(\"One\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
  \ value: start)\n    Text(\"Two\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
  \ value: start)\n    Text(\"Three\")\n    .offset(x: 0, y: start ? 450 : 0)\n  \
  \  .animation(.default, value: start)\n    Text(\"Four\")\n    .offset(x: 0, y:\
  \ start ? 450 : 0)\n    .animation(.default, value: start)\n    Text(\"Five\")\n\
  \    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default, value: start)\n\
  \    }.position(x: 150, y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n6.  在画布面板中点击“Live”图标。\n\n7.  点击“Button”使所有五个 `Text` 视图以相同方式动画化。\n\
  \n8.  注释掉（或删除）每个 `Text` 视图上的所有 `.animation` 修饰符。\n\n9.  编辑 `ContentView` 文件中的 `Button`\
  \ 代码，使其包含 `withAnimation` 块，如下所示：\n\n```swift\n    Button(\"Start animation\") {\n\
  \    withAnimation {\n    start.toggle()\n    }\n    }\n    ```\n\n整个 `ContentView`\
  \ 文件应如下所示：\n\n```swift\n    import SwiftUI\n    struct ContentView: View {\n   \
  \ @State private var start = false\n    var body: some View {\n    VStack {\n  \
  \  Button(\"Start animation\") {\n    withAnimation {\n    start.toggle()\n    }\n\
  \    }\n    HStack {\n    Text(\"One\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
  \    //                    .animation(.default, value: start)\n    Text(\"Two\"\
  )\n    .offset(x: 0, y: start ? 450 : 0)\n    //                    .animation(.default,\
  \ value: start)\n    Text(\"Three\")\n    .offset(x: 0, y: start ? 450 : 0)\n  \
  \  //                    .animation(.default, value: start)\n    Text(\"Four\")\n\
  \    .offset(x: 0, y: start ? 450 : 0)\n    //                    .animation(.default,\
  \ value: start)\n    Text(\"Five\")\n    .offset(x: 0, y: start ? 450 : 0)\n   \
  \ //                    .animation(.default, value: start)\n    }.position(x: 150,\
  \ y: 10)\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n   \
  \ ```\n\n10. 点击“Button”，注意所有五个 `Text` 视图的动画效果与之前每个 `Text` 视图拥有自己的 `.animation` 修饰符时完全相同。\n\
  \n如果你想要添加延迟和持续时间，可以使用如下代码：\n\n```swift\n    withAnimation(.easeOut(duration: 2.1).delay(1.2))\
  \ {\n    }\n    ```\n\n你也可以使用 `.interpolatingSpring` 来定义 `stiffness` 和 `damping`，如下所示：\n\
  \n```swift\n    withAnimation(.interpolatingSpring(stiffness: 2.4, damping: 1.6))\
  \ {\n    }\n    ```\n\n要包含 `mass` 和 `initialVelocity` 参数，你可以使用如下代码：\n\n```swift\n\
  \    withAnimation(.interpolatingSpring(mass: 25, stiffness: 1.5, damping: 2.3,\
  \ initialVelocity: 1.7)) {\n    }\n    ```\n\n```swift\n@State private var start\
  \ = false\n```\n\n任何你可以用 `.animation` 修饰符做到的事情，你也可以用 `withAnimation` 块做到。你可以在同一代码中使用其中一种方法代替另一种方法，或者同时使用两种方法。\n\
  \n\n\n# 概述\n\n动画可以通过向用户提供视觉反馈，或仅仅展示有趣的视觉图像来吸引用户，从而让你的用户界面变得生动。一般来说，应谨慎使用动画，因为同时发生过多的视觉变化可能会令人困惑和分心。最好的动画能够突出某个操作，但又不会在过程中给用户带来压力。\n\
  \n动画涉及定义开始状态和结束状态，无论你是要移动、调整大小还是旋转某个视图。然后，你需要某种触发器来定义一个新状态。最后，你需要使用`.animation`修饰符。如果你要使用完全相同的`.animation`修饰符来为多个视图添加动画，可以通过使用`withAnimation`来减少代码重复。\n\
  \n要自定义动画，你可以定义延迟和持续时间值，以延缓动画开始前的时间，并设置完成动画所需的时间。如需更高级的自定义，请使用`.interpolatingSpring`修饰符，并定义`mass`（质量）、`stiffness`（刚度）、`damping`（阻尼）和`initialVelocity`（初始速度）。通过使用动画，你可以让用户界面变得有趣且更具吸引力。\n\
  \n# 21. 使用 `GeometryReader`\n\niOS 设备的用户界面必须适应不同的屏幕尺寸。不仅 iPhone 和 iPad 的屏幕尺寸不同，市场上不同型号的\
  \ iPhone 和 iPad 之间也存在不同的屏幕尺寸。为了解决这个问题，SwiftUI 会居中放置用户界面元素，但如果你需要将用户界面元素精确地放置在特定位置，该怎么办？\n\
  \n具体的 X 和 Y 坐标是行不通的，因为在大屏幕上看起来不错的效果在小屏幕上可能并不合适，反之亦然。当你需要将用户界面元素放置在屏幕上的特定位置时，更安全的方法是使用\
  \ `GeometryReader`。\n\n`GeometryReader` 就像一个容器，能够自动适应不同的屏幕尺寸。添加 `GeometryReader`\
  \ 后，你就可以使用 `GeometryReader` 的相对坐标（而非不同尺寸屏幕的精确坐标）来放置用户界面元素。这样一来，当应用程序在不同尺寸的屏幕上运行时，`GeometryReader`\
  \ 也会相应地调整其相对坐标。\n\n## 理解 `GeometryReader`\n\n`GeometryReader` 可以像堆栈一样容纳多个视图。关键区别在于，`GeometryReader`\
  \ 会扩展以占用尽可能多的空间。此外，`GeometryReader` 可以获取自身的宽度和高度。定义 `GeometryReader` 的代码如下所示：\n\n\
  ```\nGeometryReader { geometry in\n// 在此处定义视图\n}\n```\n\n`GeometryReader` 使用一个任意命名的变量，如上例中的\
  \ `geometry`，尽管这个变量可以被命名为任何名称。然后，要获取 `GeometryReader` 的宽度和高度，你可以像这样获取 `size.width`\
  \ 和 `size.height` 属性：\n\n```\ngeometry.size.width\ngeometry.size.height\n```\n\n\
  要了解 `GeometryReader` 的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_21_Fig1_HTML.jpg)\n\
  \n一个移动屏幕显示 `width=374.000000` 和 `height=647.000000`。\n\n图 21-1\n\n`GeometryReader`\
  \ 在 iPhone SE 中定义的宽度和高度\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“BasicGeometryReader”。\n\
  \n2.  在导航器窗格中点击 `ContentView` 文件。\n\n3.  在 `var body: some View` 内部添加一个 `GeometryReader`，如下所示：\n\
  \n    ```\n    var body: some View {\n    GeometryReader { geometry in\n    }.background(Color.yellow)\n\
  \    }\n    ```\n\n    `.background` 修饰符会为 `GeometryReader` 着色，使其边界易于辨认。\n\n4. \
  \ 在 `GeometryReader` 内部添加一个 `VStack`。\n\n5.  在 `VStack` 内部添加两个 `Text` 视图，如下所示：\n\
  \n    ```\n    var body: some View {\n    GeometryReader { geometry in\n    VStack\
  \ {\n    Text(\"Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
  )\n    }\n    }.background(Color.yellow)\n    }\n    ```\n\n    整个 `ContentView`\
  \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n    var\
  \ body: some View {\n    GeometryReader { geometry in\n    VStack {\n    Text(\"\
  Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
  )\n    }\n    }.background(Color.yellow)\n    }\n    }\n    struct ContentView_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n \
  \   }\n    }\n    ```\n\n    请注意，`geometry.size.width` 和 `geometry.size.height`\
  \ 属性定义了当前 iOS 设备（如图 21-1 所示的 iPhone SE）内 `GeometryReader` 的高度和宽度。\n\n![](img/329781_7_En_21_Fig2_HTML.jpg)\n\
  \n屏幕的一个片段显示了修饰符选项。它包括预览、配色方案、辅助功能和动态类型。预览包括名称、设备、布局和方向。下拉选项列出了多个选项，其中继承的选项以深色高亮显示。\n\
  \n图 21-2\n\n检查器窗格中的设备弹出菜单\n\n1.  在 `struct ContentView_Previews: PreviewProvider`\
  \ 内部点击 `ContentView()`。Xcode 窗口的右侧会出现检查器窗格。\n\n2.  点击设备弹出菜单，并选择一个不同尺寸的屏幕，例如较大或较小的\
  \ iPhone 或 iPad，如图 21-2 所示。\n\n![](img/329781_7_En_21_Fig3_HTML.jpg)\n\n一个平板电脑屏幕显示\
  \ `width=744.000000` 和 `height=1089.000000`。\n\n图 21-3\n\n在不同尺寸的 iOS 屏幕中显示 `GeometryReader`\
  \ 的宽度和高度\n\n1.  选择不同尺寸的 iPhone 或 iPad。请注意，`GeometryReader` 会扩展或收缩以适配新 iOS 屏幕尺寸的边界，并显示不同的宽度和高度，如图\
  \ 21-3 所示。\n\n尝试使用不同的 iOS 设备，例如小屏幕的 iPhone 或大屏幕的 iPad。无论你选择哪种尺寸的 iOS 设备屏幕，`GeometryReader`\
  \ 都能扩展或收缩，并返回其宽度和高度。\n\n\n\n### 理解全局坐标与局部坐标的区别\n\n当你了解 `GeometryReader` 如何伸缩以适应不同\
  \ iOS 屏幕尺寸的宽度和高度后，下一步就是理解 `GeometryReader` 的坐标系统。`GeometryReader` 内部的坐标被称为局部坐标。\n\
  \n另一方面，全局坐标指的是整个 iOS 屏幕。虽然不同 iOS 设备的屏幕之间全局坐标总是不同，但 `GeometryReader` 内部的局部坐标始终保持一致。\n\
  \n要查看局部坐标和全局坐标之间的区别，请按以下步骤操作：\n\n![](img/329781_7_En_21_Fig4_HTML.jpg)\n\n一个手机屏幕显示了局部\
  \ X 原点和 Y 原点，以及全局 X 原点和 Y 原点的值，它们分别被标记为全局原点和局部原点，数值分别为 0、0、0 和 59.0000000。\n\n图\
  \ 21-4\n\n局部原点出现在左上角，而全局原点出现在 `GeometryReader` 的左上角\n\n1. 新建一个 SwiftUI iOS App 项目，并为其取任意名称，例如\
  \ \"GeometryReaderCoordinates\"。\n\n2. 在 Navigator 面板中点击 `ContentView` 文件。\n\n3.\
  \ 在 `var body: some View` 中添加一个 `GeometryReader`，如下所示：\n\n```\nvar body: some View\
  \ {\n    GeometryReader { geometry in\n    }.background(Color.yellow)\n}\n```\n\n\
  4. 在 `GeometryReader` 内部添加一个 `VStack`，并添加四个 `Text` 视图和一个 `Divider`，如下所示：\n\n```\n\
  GeometryReader { geometry in\n    VStack {\n        Text(\"Local X origin = \\(geometry.frame(in:\
  \ .local).origin.x)\")\n        Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
  )\n        Divider()\n        Text(\"Global X origin = \\(geometry.frame(in: .global).origin.x)\"\
  )\n        Text(\"Global Y origin = \\(geometry.frame(in: .global).origin.y)\")\n\
  \    }\n}.background(Color.yellow)\n```\n\n首先，请注意 `Divider()` 只是在 `VStack` 中绘制一条水平线（在\
  \ `HStack` 中则是垂直线）。其次，`frame` 会返回坐标。当使用 `.local` 坐标时，`GeometryReader` 的 x 和 y 原点始终为\
  \ `(0,0)`。当使用 `.global` 坐标时，`GeometryReader` 的 x 和 y 原点基于其距离 iOS 屏幕左上角的距离而定。\n\n\
  整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n \
  \   var body: some View {\n        GeometryReader { geometry in\n            VStack\
  \ {\n                Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\"\
  )\n                Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
  )\n                Divider()\n                Text(\"Global X origin = \\(geometry.frame(in:\
  \ .global).origin.x)\")\n                Text(\"Global Y origin = \\(geometry.frame(in:\
  \ .global).origin.y)\")\n            }\n        }.background(Color.yellow)\n   \
  \ }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
  \ some View {\n        ContentView()\n    }\n}\n```\n\n请注意，局部原点是 `(0,0)`，因为它起始于\
  \ iOS 屏幕的左上角。但是，全局原点显示为 `(0,59)`。这是因为 `GeometryReader` 实际上出现在 iPhone 14 Pro 机型的刘海屏下方，如图\
  \ 21-4 所示。\n\n![](img/329781_7_En_21_Fig5_HTML.jpg)\n\n一个手机屏幕显示了局部 X 原点和 Y 原点，以及全局\
  \ X 原点和 Y 原点的值，分别为 0、0、0 和 0。\n\n图 21-5\n\n`.ignoresSafeArea()` 修饰符将 `GeometryReader`\
  \ 推至屏幕顶部，因此局部和全局原点相同\n\n1. 在 `.background(Color.yellow)` 修饰符之后添加一个 `.ignoreAllSafeAreas()`\
  \ 修饰符，如下所示：\n\n```\n}.background(Color.yellow)\n.ignoresSafeArea()\n```\n\n这会忽略刘海屏周围的区域，因此全局\
  \ y 原点现在出现在屏幕的左上角，与局部 y 原点相同，如图 21-5 所示。\n\n1. 按如下方式编辑 `var body: some View` 内部的代码：\n\
  \n```\nvar body: some View {\n    VStack {\n        Text(\"This Text view pushes\
  \ the GeometryReader down\")\n        HStack {\n            Text(\"Pushes to the\
  \ right\")\n            GeometryReader { geometry in\n                VStack {\n\
  \                    Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\"\
  )\n                    Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
  )\n                    Divider()\n                    Text(\"Global X origin = \\\
  (geometry.frame(in: .global).origin.x)\")\n                    Text(\"Global Y origin\
  \ = \\(geometry.frame(in: .global).origin.y)\")\n                }\n           \
  \ }.background(Color.yellow)\n            .ignoresSafeArea()\n        }\n    }\n\
  }\n```\n\n上述代码使用了一个 `VStack` 将 `GeometryReader` 向下推，然后使用了一个 `HStack` 将其向右推。请注意，`GeometryReader`\
  \ 的局部原点仍然是 `(0,0)`，但全局原点不同，它是从 iOS 屏幕左上角开始测量的，如图 21-6 所示。\n\n![](img/329781_7_En_21_Fig6_HTML.jpg)\n\
  \n一段 SwiftUI 代码片段显示了一个手机屏幕，其中展示了局部和全局原点的值，全局 X 原点为 151.666667，全局 Y 原点为 91.642415。左侧是\
  \ 30 行代码。\n\n图 21-6\n\n定义一个 `GeometryReader` 的全局原点\n\n\n\n### 识别 GeometryReader\
  \ 的最小值、中值和最大值\n\n全局坐标取决于当前 iOS 屏幕的尺寸。较小 iOS 屏幕上的最大 X 和 Y 坐标，与较大 iOS 屏幕上的最大 X 和 Y\
  \ 坐标是不同的。因此，使用全局坐标来定位屏幕上的视图，可能会使视图完全移出屏幕，或导致其部分被截断。\n\n另一方面，在 `GeometryReader` 中使用局部坐标，总能自动适配不同的屏幕尺寸。由于\
  \ `GeometryReader` 的宽度或高度会随 iOS 屏幕尺寸变化，因此务必不要使用固定值，而应使用最小值和最大值。\n\n`GeometryReader`\
  \ 允许你访问以下定义的属性，如图 21-7 所示：\n\n![](img/329781_7_En_21_Fig7_HTML.jpg)\n\n一个 2x2 的方块网格布局，其边角和边被标记为\
  \ min X、min Y、mid X、max X、mid Y 和 max Y。\n\n图 21-7：`GeometryReader` 的最小值、中值和最大值\
  \ X 与 Y\n\n- `minX`\n- `minY`\n- `midX`\n- `midY`\n- `maxX`\n- `maxY`\n\n要了解 `GeometryReader`\
  \ 的最小值、中值和最大值 X 与 Y 是如何工作的，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"\
  GeometryReaderValues\"。\n2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View`\
  \ 内部添加一个 `GeometryReader`，如下所示：\n\n    ```\n    var body: some View {\n        GeometryReader\
  \ { geometry in\n        }.background(Color.yellow)\n    }\n    ```\n\n4. 在 `GeometryReader`\
  \ 内部添加一个 `VStack`，并添加六个 `Text` 视图和一个 `Divider`，如下所示：\n\n    ```\n    var body: some\
  \ View {\n        GeometryReader { geometry in\n            VStack {\n         \
  \       Text(\"minX = \\(geometry.frame(in: .local).minX)\")\n                Text(\"\
  midX = \\(geometry.frame(in: .local).midX)\")\n                Text(\"maxX = \\\
  (geometry.frame(in: .local).maxX)\")\n                Divider()\n              \
  \  Text(\"minY = \\(geometry.frame(in: .local).minY)\")\n                Text(\"\
  midY = \\(geometry.frame(in: .local).midY)\")\n                Text(\"maxY = \\\
  (geometry.frame(in: .local).maxY)\")\n            }\n        }.background(Color.yellow)\n\
  \    }\n    ```\n\n   整个 `ContentView` 文件应该如下所示：\n\n    ```\n    import SwiftUI\n\
  \    struct ContentView: View {\n        var body: some View {\n            GeometryReader\
  \ { geometry in\n                VStack {\n                    Text(\"minX = \\\
  (geometry.frame(in: .local).minX)\")\n                    Text(\"midX = \\(geometry.frame(in:\
  \ .local).midX)\")\n                    Text(\"maxX = \\(geometry.frame(in: .local).maxX)\"\
  )\n                    Divider()\n                    Text(\"minY = \\(geometry.frame(in:\
  \ .local).minY)\")\n                    Text(\"midY = \\(geometry.frame(in: .local).midY)\"\
  )\n                    Text(\"maxY = \\(geometry.frame(in: .local).maxY)\")\n  \
  \              }\n            }.background(Color.yellow)\n        }\n    }\n   \
  \ struct ContentView_Previews: PreviewProvider {\n        static var previews: some\
  \ View {\n            ContentView()\n        }\n    }\n    ```\n\n   请注意，`maxX`\
  \ 和 `maxY` 属性只是测量 `GeometryReader` 宽度和高度的一种不同方式。\n\n5. 在 `struct ContentView_Previews:\
  \ PreviewProvider` 内部点击 `ContentView()`。检查器窗格会出现在 Xcode 窗口的右侧。\n6. 点击设备弹出菜单，选择一个不同尺寸的屏幕，例如更大或更小的\
  \ iPhone 或 iPad（见图 21-2）。\n7. 选择一个不同尺寸的 iPhone 或 iPad。注意 `GeometryReader` 会相应地扩展或收缩以适应新\
  \ iOS 屏幕的边界，并显示不同的 `maxX` 和 `maxY` 值。\n\n## 总结\n\n`GeometryReader` 是一个独特的容器，它可以容纳多个视图。通过使用\
  \ `GeometryReader` 的局部坐标，你可以在用户界面上放置不同的视图，这些视图能够自动适配不同的 iOS 屏幕尺寸。\n\n`GeometryReader`\
  \ 可以扩展以填充整个屏幕，也可以与堆栈中的其他视图共享一个屏幕。识别 `GeometryReader` 宽度和高度的两种方法是：检索 `size.height`\
  \ 和 `size.width` 属性，或者检索 `maxX` 和 `maxY` 属性。\n\n通过在 `GeometryReader` 内使用局部坐标，无论\
  \ `GeometryReader` 出现在哪里，你都知道原点 (0,0) 位于 `GeometryReader` 的左上角。通过使用全局坐标，你始终知道原点\
  \ (0,0) 位于屏幕的左上角。\n\n`GeometryReader` 只是使用特定的 X 和 Y 坐标在屏幕上定位不同视图的又一种方法。\n\n\n\n\
