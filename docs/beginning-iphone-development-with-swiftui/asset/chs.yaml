  \n## 总结\n\n许多应用依赖存储大量数据。但不幸的是，如果用户无法理解这些数据，那么所有数据都毫无意义。因此，您可能需要使用图表将数据可视化，以发现趋势、识别潜在问题或比较数据。通过使数据易于理解，图表可以提升数据的实用性。\n\
  \n折线图有助于识别趋势，例如销售额的下降或上升。面积图通过填充折线下方空白区域，能让此类趋势更易观察。\n\n散点图常用于发现不符合正常数据集群的异常值。矩形图则便于突出显示数值。如同面积图是填充后的折线图，条形图也是填充后的矩形图。\n\
  \n在图表（如条形图）中堆叠数据，可以让你看到整体的各部分占比。添加规则线可以让你绘制线条，以突出显示图表中的特定值，例如平均销售额。\n\n每种图表都基于用户偏好而各有优劣，因此请尝试不同的图表，直到找到适合您应用和用户的类型。\n\
  \n"
- "# 17. 使用导航堆栈\n\n只有最简单的应用（如计算器应用）才由单个屏幕组成。然而，大多数应用通常需要两个或更多屏幕来显示信息。在 SwiftUI 中，你可以通过创建独立的结构体来定义应用用户界面的每个屏幕。然后，你需要提供一种从一个屏幕跳转到另一个屏幕的方法。\n\
  \n从一个屏幕跳转到另一个屏幕的最简单方法之一是通过`NavigationStack`，它按顺序显示多个屏幕。许多 iOS 应用（如“设置”）都常用此`NavigationStack`，让用户查看不同的选项，如图\
  \ 17-1 所示。\n\n![](img/329781_7_En_17_Fig1_HTML.png)\n\n一组 3 张手机截图。显示含“通用”选项的设置页面指向通用选项页面。通用选项页面列出多个选项，其中“键盘”选项被选中。键盘选项页面包含所有键盘选项。\n\
  \n**图 17-1**  \n`NavigationStack`让从一个屏幕跳转到另一个屏幕变得简单\n\n在图 17-1 中，用户可以点击主屏幕上的“设置”图标来显示设置屏幕。点击“通用”会打开通用屏幕。接着点击“键盘”会打开键盘屏幕。请注意，要返回，只需点击左上角的“返回”按钮即可。\n\
  \n从键盘屏幕，返回按钮会把你带回通用屏幕。从通用屏幕，返回按钮会把你带回设置屏幕。`NavigationStack`的作用仅仅是让用户能够按顺序从一个屏幕跳转到另一个屏幕。\n\
  \n\n\n## 使用导航堆栈\n\n与任何其他类型的堆栈（`VStack`、`HStack`、`ZStack`）一样，一个`NavigationStack`最多可以容纳十（10）个视图。一个`NavigationStack`通过如下代码包含多个视图：\n\
  \n```\nNavigationStack {\n    // 在此处放置多个视图\n}\n```\n\n在一个`NavigationStack`中，你需要一个或多个`NavigationLink`，每个`NavigationLink`定义一个可点击的视图和另一个要显示的视图。创建`NavigationLink`的一种方法是显示无额外格式的文本，然后定义要显示的视图，如下所示：\n\
  \n```\nNavigationLink(\"链接文本\") {\n    // 要显示的视图\n}\n```\n\n用户选择`NavigationLink`时显示的视图可以是单个视图（如`Text`视图），也可以是包含多个视图的堆栈。\n\
  \n创建`NavigationLink`的第二种方法允许你设置链接的外观并定义要显示的视图，如下所示：\n\n```\nNavigationLink {\n \
  \   // 要显示的视图\n} label: {\n    // 定义导航链接的视图\n}\n```\n\n要了解如何通过不同的方式创建`NavigationLink`来创建一个简单的导航堆栈，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其命名，例如\"NavigationStack\"。\n2. 在导航器窗格中单击`ContentView`文件。\n\
  3. 在`var body: some View`下方添加一个`NavigationStack`，如下所示：\n\n    ```\n    var body:\
  \ some View {\n        NavigationStack {\n        }\n    }\n    ```\n\n4. 在`NavigationStack`内部添加四个`NavigationLink`，如下所示：\n\
  \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \        NavigationLink {\n                Text(\"第二个视图\")\n            } label:\
  \ {\n                Label {\n                    Text(\"第二个链接\")\n            \
  \    } icon: {\n                    Image(systemName: \"sun.and.horizon.circle\"\
  )\n                }\n            }.padding()\n            NavigationLink {\n  \
  \              Image(systemName: \"ellipsis.message\")\n                    .font(.system(size:\
  \ 125))\n            } label: {\n                VStack {\n                    Text(\"\
  第三个视图\")\n                    Image(systemName: \"figure.archery\")\n          \
  \      }.font(.largeTitle)\n            }.padding()\n            NavigationLink(\"\
  第四个视图\") {\n                VStack {\n                    Image(systemName: \"airplane.departure\"\
  )\n                        .font(.system(size: 120))\n                    Text(\"\
  出发时间是 12:15\")\n                        .font(.largeTitle)\n                }\n\
  \            }.padding()\n        }\n    }\n    ```\n\n    请注意，每个`NavigationLink`定义了创建导航链接和用户选择该特定导航链接时显示的视图的不同方式。\n\
  \n    整个`ContentView`文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView:\
  \ View {\n        var body: some View {\n            NavigationStack {\n       \
  \         NavigationLink {\n                    Text(\"第一个视图\")\n              \
  \  } label: {\n                    Text(\"第一个链接\")\n                        .font(.largeTitle)\n\
  \                }.padding()\n                NavigationLink {\n               \
  \     Text(\"第二个视图\")\n                } label: {\n                    Label {\n\
  \                        Text(\"第二个链接\")\n                    } icon: {\n      \
  \                  Image(systemName: \"sun.and.horizon.circle\")\n             \
  \       }\n                }.padding()\n                NavigationLink {\n     \
  \               Image(systemName: \"ellipsis.message\")\n                      \
  \  .font(.system(size: 125))\n                } label: {\n                    VStack\
  \ {\n                        Text(\"第三个视图\")\n                        Image(systemName:\
  \ \"figure.archery\")\n                    }.font(.largeTitle)\n               \
  \ }.padding()\n                NavigationLink(\"第四个视图\") {\n                   \
  \ VStack {\n                        Image(systemName: \"airplane.departure\")\n\
  \                            .font(.system(size: 120))\n                       \
  \ Text(\"出发时间是 12:15\")\n                            .font(.largeTitle)\n      \
  \              }\n                }.padding()\n            }\n        }\n    }\n\
  \    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
  \ some View {\n            ContentView()\n        }\n    }\n    ```\n\n5. 在画布窗格中单击**LIVE**图标。所有四个`NavigationLink`都会显示在用户界面上。\n\
  6. 单击任意显示的`NavigationLink`。该`NavigationLink`定义的视图就会显示出来。\n\n### 为导航堆栈添加标题\n\n一个`NavigationStack`只是在屏幕上显示一个或多个`NavigationLink`。但是，你可能希望通过在其上添加标题来确保用户理解这些`NavigationLink`的用途。标题可以以两种样式（`.large`或`.inline`）之一显示，如图\
  \ 17-2 所示。\n\n![图 17-2](img/329781_7_En_17_Fig2_HTML.jpg)\n\n**图 17-2** 比较导航堆栈上方`.large`和`.inline`标题的外观\n\
  \n要在导航堆栈上方显示标题，请使用以下修饰符：\n\n```\n.navigationTitle(\"导航堆栈\")\n```\n\n要更改标题的外观，请使用以下修饰符：\n\
  \n```\n.navigationBarTitleDisplayMode(.inline)\n```\n\n> **注意：** 当将`.navigationTitle`和`.navigationBarTitleDisplayMode`修饰符添加到`NavigationStack`时，请将这些修饰符放在`NavigationStack`的最后一个花括号内，如下所示：\n\
  >\n> ```\n> NavigationStack {\n>     .navigationTitle(\"导航堆栈标题\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
  > }\n> ```\n\n`.navigationTitle`修饰符定义了将显示在屏幕顶部、导航堆栈上方的文本。`.navigationBarTitleDisplayMode`修饰符定义了该标题在屏幕上的显示方式。两个选项是`.large`和`.inline`（见图\
  \ 17-2）。如果你没有定义`.navigationBarTitleDisplayMode`，则默认值为`.large`。\n\n要了解如何为导航堆栈显示标题并更改其外观，请按照以下步骤操作：\n\
  \n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其命名，例如\"NavigationStackTitle\"。\n2. 在导航器窗格中单击`ContentView`文件。\n\
  3. 在`struct ContentView: View`下方添加一个状态变量，如下所示：\n\n    ```\n    @State var titleType\
  \ = NavigationBarItem.TitleDisplayMode.large\n    ```\n\n4. 在`var body: some View`内部添加一个`NavigationStack`，如下所示：\n\
  \n    ```\n    var body: some View {\n        NavigationStack {\n        }\n   \
  \ }\n    ```\n\n5. 在`NavigationStack`内部添加一个`NavigationLink`，如下所示：\n\n    ```\n \
  \   var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \    }\n    }\n    ```\n\n6. 添加`.navigationTitle`和`.navigationBarTitleDisplayMode`修饰符，如下所示：\n\
  \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \        .navigationTitle(\"导航堆栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
  \        }\n    }\n    ```\n\n> **注意：** `.navigationTitle`修饰符不仅定义了导航堆栈上方的标题，还定义了返回按钮中显示的文本。如果`.navigationTitle`修饰符不存在，返回按钮将只显示\"\
  返回\"。\n\n7. 添加一个包含两个`Button`的`HStack`，如下所示：\n\n    ```\n    var body: some View\
  \ {\n        NavigationStack {\n            NavigationLink {\n                Text(\"\
  第一个视图\")\n            } label: {\n                Text(\"第一个链接\")\n            \
  \        .font(.largeTitle)\n            }.padding()\n            .navigationTitle(\"\
  导航堆栈\")\n            .navigationBarTitleDisplayMode(titleType)\n            HStack(spacing:\
  \ 50) {\n                Button(\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
  \                }\n                Button(\".inline\") {\n                    titleType\
  \ = NavigationBarItem.TitleDisplayMode.inline\n                }\n            }\n\
  \        }\n    }\n    ```\n\n8. 在画布窗格中单击**LIVE**图标。\n9. 单击`.large`和`.inline`按钮，查看导航堆栈标题的外观如何变化。\n\
  \n\n\n## 向导航栈添加按钮\n\n除了在导航栈上方显示标题外，你还可以在屏幕顶部显示一个或多个按钮。这些按钮会出现在一个工具栏上，你可以通过在导航栈内部使用\
  \ `.toolbar` 修饰符来添加这个工具栏，具体方法如下：\n\n```\nNavigationStack {\n    .navigationTitle(\"\
  导航标题\")\n    .toolbar {\n    }\n}\n```\n\n默认情况下，在 `.toolbar` 内部定义的任何按钮或图标的颜色都是蓝色。如果你想定义不同的颜色，可以像这样为\
  \ `NavigationStack` 添加 `.accentColor` 修饰符：\n\n```\nNavigationStack {\n    .navigationTitle(\"\
  导航标题\")\n    .toolbar {\n    }\n}.accentColor(.purple)\n```\n\n在 `.toolbar` 修饰符内部，你可以定义一个或多个\
  \ `ToolbarItem`。对于你添加的每一个 `ToolbarItem`，你都可以定义其放置位置（左上角设置为 `.navigationBarLeading`，或右上角设置为\
  \ `.navigationBarTrailing`）。此外，你必须定义按钮的外观以及用户点击该按钮时要运行的代码，如下所示：\n\n```\n.toolbar\
  \ {\n    ToolbarItem(placement: .navigationBarLeading) {\n        Button {\n   \
  \         //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n        }\n\
  \    }\n    ToolbarItem(placement: .navigationBarTrailing) {\n        Button {\n\
  \            //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n      \
  \  }\n    }\n}\n```\n\n要了解如何在导航栈中定义按钮，请按照以下步骤操作：\n\n![](img/329781_7_En_17_Fig3_HTML.jpg)\n\
  \n**图 17-3.** 使用 `.toolbar` 修饰符的工具栏按钮外观\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意你喜欢的名称，例如“NavigationStackButtons”。\n\
  2.  在导航窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 一行下方添加两个状态变量，如下所示：\n\
  \n    ```\n    @State var titleType = NavigationBarItem.TitleDisplayMode.large\n\
  \    @State var message = \"\"\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `NavigationStack`，如下所示：\n\
  \n    ```\n    var body: some View {\n        NavigationStack {\n        }\n   \
  \ }\n    ```\n\n5.  为 `NavigationStack` 添加 `.accentColor` 修饰符，如下所示：\n\n    ```\n\
  \    var body: some View {\n        NavigationStack {\n        }.accentColor(.purple)\n\
  \    }\n    ```\n\n6.  在 `NavigationStack` 内部添加一个 `NavigationLink`，如下所示：\n\n   \
  \ ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \        .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
  \        }.accentColor(.purple)\n    }\n    ```\n\n7.  添加 `.toolbar` 修饰符，如下所示：\n\
  \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
  \ {\n                Text(\"第一个视图\")\n            } label: {\n                Text(\"\
  第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n    \
  \        .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
  \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
  \ {\n                    Button {\n                        message = \"iCloud 图标被点击\"\
  \n                    } label: {\n                        Image(systemName: \"icloud\"\
  )\n                    }\n                }\n                ToolbarItem(placement:\
  \ .navigationBarTrailing) {\n                    Button {\n                    \
  \    message = \"完成按钮被点击\"\n                    } label: {\n                   \
  \     Text(\"完成\")\n                    }\n                }\n            }\n  \
  \      }.accentColor(.purple)\n    }\n    ```\n\n对于每个 `ToolbarItem`，你可以使用 `Text`\
  \ 视图或 `Image` 视图来定义按钮的外观。上述代码在左上角显示一个云形图标，在右上角显示单词“Done”（完成），如图 17-3 所示。\n\n8. \
