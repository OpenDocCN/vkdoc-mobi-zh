  trans: "\n# 检测长按手势\n\n当用户用一个或多个手指尖按住屏幕一段时间且指尖没有大幅移动时，就会触发长按手势。要定义长按手势，可以修改以下属性：\n\
    \n- `minimumDuration` – 定义一个或多个指尖需要按住屏幕多长时间才能被识别为长按\n- `maximumDistance` – 定义在长按手势失败前指尖可以移动的最大距离\n\
    \n最简单的`.onLongPressGesture`修饰器写法如下：\n\n```\n.onLongPressGesture {\n//  要运行的代码\n\
    }\n```\n\n如果需要，可以像这样添加`minimumDuration:`和`maximumDistance:`参数：\n\n```\n.onLongPressGesture(minimumDuration:\
    \ 3, maximumDistance: 2) {\n//  要运行的代码\n}\n```\n\n上述版本的`.onLongPressGesture`修饰器强制用户至少按住\
    \ 3 秒。如果希望在用户按下时执行某些操作，可以使用`pressing:`参数，如下所示：\n\n```\n.onLongPressGesture(minimumDuration:\
    \ 2, maximumDistance: 2, pressing: {stillPressed in\n//  长按期间要运行的代码\n}) {\n//\
    \  检测到长按手势后要运行的代码\n}\n```\n\n要了解如何检测长按手势，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App\
    \ 项目，并为其任意命名，例如“LongPressGesture”。\n2. 在导航面板中点击`ContentView`文件。\n3. 在`struct ContentView:\
    \ View`行下方添加以下 State 变量：\n\n    ```\n    @State var changeMe = false\n    @State\
    \ var message = \"\"\n    ```\n\n4. 在`VStack`内添加一个`Text`视图，如下所示：\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    Text(message)\n    }\n    }\n  \
    \  ```\n\n5. 在`Text`视图下方添加一个`Rectangle`：\n\n    ```\n    Rectangle()\n    .frame(width:\
    \ 175, height: 125)\n    .foregroundColor(changeMe ? .red : .yellow)\n    ```\n\
    \n6. 为`Rectangle`添加`.onLongPressGesture`修饰器，如下所示：\n\n    ```\n    .onLongPressGesture(minimumDuration:\
    \ 2, maximumDistance: 2, pressing: {stillPressed in\n    message = \"正在进行长按：\\\
    (stillPressed)\"\n    }) {\n    changeMe.toggle()\n    }\n    ```\n\n    `pressing:`参数会在长按手势进行时显示`true`，长按手势完成后立即显示`false`。长按手势完成后，它会将`changeMe`\
    \ State 变量从`false`切换为`true`（或从`true`切换为`false`）。\n\n    整个`ContentView`文件应如下所示：\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var\
    \ changeMe = false\n    @State var message = \"\"\n    var body: some View {\n\
    \    VStack {\n    Text(message)\n    Rectangle()\n    .frame(width: 175, height:\
    \ 125)\n    .foregroundColor(changeMe ? .red : .yellow)\n    .onLongPressGesture(minimumDuration:\
    \ 2, maximumDistance: 2, pressing: {stillPressed in\n    message = \"正在进行长按：\\\
    (stillPressed)\"\n    }) {\n    changeMe.toggle()\n    }\n    }\n    }\n    }\n\
    \    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n7. 在画布面板中点击“Live”图标。\n\
    8. 将鼠标指针移到`Rectangle`上，按住鼠标左键模拟按下手势。注意`Text`视图会显示“正在进行长按：true”。\n9. 继续按住鼠标左键，直到`Rectangle`改变颜色。这表明已达到`minimumDuration`的\
    \ 2 秒阈值，长按手势已被识别。\n\n## 检测缩放手势\n\n当用户用两个指尖按住屏幕并使指尖相互远离或靠近时，就会触发缩放手势（也称为捏合手势）。用户通常希望放大图片或缩小以查看更多内容（例如地图的更大视图）时，会用到这种缩放手势。\n\
    \n由于缩放手势会改变视图的大小，你需要定义两个 State 变量来表示当前尺寸和最终尺寸，数据类型为`CGFloat`，如下所示：\n\n```\n@State\
    \ private var tempValue: CGFloat = 0\n@State private var finalValue: CGFloat =\
    \ 1\n```\n\n要调整视图大小，缩放手势需要与要调整大小的视图上的`.scaleEffect`修饰器配合使用，例如：\n\n```\nImage(systemName:\
    \ \"star.fill\")\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
    \ + tempValue)\n```\n\n然后，你需要将要调整大小的视图附加`.gesture`修饰器，并使用缩放手势，如下所示：\n\n```\n.gesture(\n\
    )\n```\n\n在`.gesture`修饰器的括号内，就是定义缩放手势的地方。你需要检测缩放手势何时发生变化以及何时最终结束，如下所示：\n\n```\n\
    .gesture(\nMagnificationGesture()\n.onChanged { amount in\n//  要运行的代码\n}\n.onEnded\
    \ { amount in\n//  要运行的代码\n}\n)\n```\n\n`.onChanged`修饰器测量用户将两个指尖相互远离或靠近的距离。`.onEnded`修饰器测量用户通过将两个指尖抬离屏幕来结束缩放手势时两个指尖之间的距离。\n\
    \n要了解如何检测缩放手势，请按照以下步骤操作：\n\n**图 11-1** 在画布面板中模拟双指按压手势\n\n1. 创建一个新的 SwiftUI iOS\
    \ App 项目，并为其任意命名，例如“MagnificationGesture”。\n2. 在导航面板中点击`ContentView`文件。\n3. 在`struct\
    \ ContentView: View`行下方添加以下 State 变量：\n\n    ```\n    @State private var tempValue:\
    \ CGFloat = 0\n    @State private var finalValue: CGFloat = 1\n    ```\n\n4. 在\
    \ body 中添加一个包含`Image`的`VStack`，如下所示：\n\n    ```\n    var body: some View {\n \
    \   VStack {\n    Image(systemName: \"star.fill\")\n    .font(.system(size: 200))\n\
    \    .foregroundColor(.green)\n    .scaleEffect(finalValue + tempValue)\n    }\n\
    \    }\n    ```\n\n    这将在`Image`视图中显示一颗星星，字体大小为 200，填充颜色为绿色。注意`.scaleEffect`修饰器将星形图像的大小定义为两个\
    \ State 变量的组合。大小为 1 表示图像的当前大小，较小的值会缩小图像，较大的值会放大图像。\n\n5. 为`Image`添加一个`.gesture`修饰器，因为这是我们要使用缩放手势调整大小的对象，如下所示：\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Image(systemName: \"star.fill\"\
    )\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue\
    \ + tempValue)\n    .gesture(\n    )\n    }\n    }\n    ```\n\n    这使`Image`视图能够识别手势。现在我们只需定义要识别哪种手势。\n\
    \n6. 在`.gesture()`括号内添加`MagnificationGesture`，并定义`.onChanged`和`.onEnded`修饰器，如下所示：\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Image(systemName: \"star.fill\"\
    )\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue\
    \ + tempValue)\n    .gesture(\n    MagnificationGesture()\n    .onChanged { amount\
    \ in\n    tempValue = amount - 1\n    }\n    .onEnded { amount in\n    finalValue\
    \ += tempValue\n    tempValue = 0\n    }\n    )\n    }\n    }\n    ```\n"
- fmt: "`onChanged`修饰器测量两个指尖之间的距离，并减去 1 来计算`tempValue`状态变量的值。如果用户将两个指尖分开，`amount`的值将大于\
    \ 1，因此减去 1 后会保留用于调整`Image`大小的额外量。\n\n`onEnded`修饰器使用用户两个指尖最后定义的距离，并将该值存储在`finalValue`状态变量中，然后将`tempValue`状态变量清零。\n\
    \n整个`ContentView`文件应如下所示：\n\n```swift\nimport SwiftUI\nstruct ContentView: View\
    \ {\n    @State private var tempValue: CGFloat = 0\n    @State private var finalValue:\
    \ CGFloat = 1\n    var body: some View {\n        VStack {\n            Image(systemName:\
    \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
    \                .scaleEffect(finalValue + tempValue)\n                .gesture(\n\
    \                    MagnificationGesture()\n                        .onChanged\
    \ { amount in\n                            tempValue = amount - 1\n          \
    \              }\n                        .onEnded { amount in\n             \
    \               finalValue += tempValue\n                            tempValue\
    \ = 0\n                        }\n                )\n        }\n    }\n}\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n7.  点击画布面板中的Live图标。\n8.  按住Option键，点击画布面板中显示的模拟iOS设备屏幕。按住Option键的同时点击鼠标左键，会显示两个灰色圆点，模拟两个指尖按压在屏幕上，如图[11-1](#329781_7_En_11_Chapter.xhtml#Fig1)所示。\n\
    1.  按住Option键的同时拖动鼠标，模拟将两个指尖靠近或远离。注意，当您拖动鼠标时，星形图像会相应缩小或放大以匹配缩放手势。\n\n## 检测旋转手势\n\
    \n旋转手势与缩放手势类似，因为它们都使用两个指尖。主要区别在于，旋转手势检测两个指尖顺时针或逆时针做圆周运动。\n\n由于旋转手势会改变视图的角度，您需要定义一个`Double`数据类型的`State`变量来测量旋转角度，如下所示：\n\
    \n```swift\n@State private var degree = 0.0\n```\n\n要旋转视图，旋转手势需要与您想要旋转的视图上的`rotationEffect`修饰器配合使用，例如：\n\
    \n```swift\nImage(systemName: \"star.fill\")\n    .font(.system(size: 200))\n\
    \    .foregroundColor(.green)\n    .rotationEffect(Angle.degrees(degree))\n```\n\
    \n然后，您需要将`gesture`修饰器附加到您想要旋转的视图上，并使用旋转手势，如下所示：\n\n```swift\n.gesture(\n)\n```\n\
    \n在`gesture`修饰器的括号内，您需要定义旋转手势并检测其变化，如下所示：\n\n```swift\n.gesture(\n    RotationGesture()\n\
    \        .onChanged({ angle in\n            degree = angle.degrees\n        })\n\
    )\n```\n\n`onChanged`修饰器测量用户将两个指尖顺时针或逆时针旋转了多少。要了解如何检测旋转手势，请按照以下步骤操作：\n\n1.  创建一个新的\
    \ SwiftUI iOS App 项目，并为其命名，例如 \"RotationGesture\"。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `struct ContentView: View` 一行下方，添加以下`State`变量：\n4.  像这样在`body`中添加一个包含`Image`的`VStack`：\n\
    \n    ```swift\n    var body: some View {\n        VStack {\n            Image(systemName:\
    \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
    \                .rotationEffect(Angle.degrees(degree))\n        }\n    }\n  \
    \  ```\n\n    这定义了一个`Image`视图，以字体大小200和绿色显示一颗星。然后它使用`rotationEffect`修饰器旋转`Image`。\n\
    \n5.  为`Image`添加一个`gesture`修饰器，因为我们希望使用旋转手势来旋转它，如下所示：\n\n    ```swift\n    var\
    \ body: some View {\n        VStack {\n            Image(systemName: \"star.fill\"\
    )\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
    \                .rotationEffect(Angle.degrees(degree))\n                .gesture(\n\
    \                )\n        }\n    }\n    ```\n\n6.  在`.gesture()`括号内添加`RotationGesture`，并同时定义一个`onChanged`修饰器，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        VStack {\n            Image(systemName:\
    \ \"star.fill\")\n                .font(.system(size: 200))\n                .foregroundColor(.green)\n\
    \                .rotationEffect(Angle.degrees(degree))\n                .gesture(\n\
    \                    RotationGesture()\n                        .onChanged({ angle\
    \ in\n                            degree = angle.degrees\n                   \
    \     })\n                )\n        }\n    }\n    ```\n\n    `onChanged`修饰器测量用户在屏幕上旋转两个指尖手势的角度。整个`ContentView`文件应如下所示：\n\
    \n    ```swift\n    import SwiftUI\n    struct ContentView: View {\n        @State\
    \ private var degree = 0.0\n        var body: some View {\n            VStack\
    \ {\n                Image(systemName: \"star.fill\")\n                    .font(.system(size:\
    \ 200))\n                    .foregroundColor(.green)\n                    .rotationEffect(Angle.degrees(degree))\n\
    \                    .gesture(\n                        RotationGesture()\n  \
    \                          .onChanged({ angle in\n                           \
    \     degree = angle.degrees\n                            })\n               \
    \     )\n            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n4.  点击画布面板中的Live图标。\n5.  按住Option键，点击画布面板中显示的绿色星星内部。按住Option键的同时点击鼠标左键，会显示两个灰色圆点，模拟两个指尖按压在屏幕上（见图[11-1](#329781_7_En_11_Chapter.xhtml#Fig1)）。\n\
    6.  按住Option键的同时拖动鼠标，模拟两个指尖旋转。注意，当您拖动鼠标时，星形图像会相应旋转以匹配旋转手势。"
  raw: "The .onChanged modifier measures the distance between the two fingertips and\
    \ subtracts 1 to calculate the value of the tempValue State variable. If the user\
    \ moves two fingertips apart, the value of amount will be greater than 1, so subtracting\
    \ 1 will leave the additional amount to resize the Image.\n\nThe .onEnded modifier\
    \ uses the last distance defined by the user’s two fingertips and stores that\
    \ value in the finalValue State variable. Then it clears the tempValue State variable\
    \ to 0.\n\nThe entire ContentView file should look like this:\n\n```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n    @State private var tempValue: CGFloat\
    \ = 0\n    @State private var finalValue: CGFloat = 1\n    var body: some View\
    \ {\n    VStack {\n    Image(systemName: \"star.fill\")\n    .font(.system(size:\
    \ 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue + tempValue)\n\
    \    .gesture(\n    MagnificationGesture()\n    .onChanged { amount in\n    tempValue\
    \ = amount - 1\n    }\n    .onEnded { amount in\n    finalValue += tempValue\n\
    \    tempValue = 0\n    }\n    )\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7.  Click the Live icon in the Canvas pane.\n\n8.  Hold\
    \ down the Option key and click on the simulated iOS device screen displayed in\
    \ the Canvas pane. Holding down the Option key while clicking the left mouse button\
    \ displays two gray circles that simulate pressing two fingertips on the screen\
    \ as shown in Figure [11-1](#329781_7_En_11_Chapter.xhtml#Fig1).\n\n1.  While\
    \ holding down the Option key, drag the mouse to simulate moving the two fingertips\
    \ closer or farther apart. Notice that as you drag the mouse, the star image shrinks\
    \ or expands to match the magnification gesture.\n\n## Detecting Rotation Gestures\n\
    \nA rotation gesture is similar to a magnification gesture because they both use\
    \ two fingertips. The main difference is that a rotation gesture detects when\
    \ the two fingertips move in a circular motion clockwise or counterclockwise.\n\
    \nSince the rotation gesture changes the angle of a view, you need to define one\
    \ State variable that measures the angle of rotation as a Double data type like\
    \ this:\n\n```\n@State private var degree = 0.0\n```\n\nTo rotate a view, the\
    \ rotation gesture needs to work with the .rotationEffect modifier on the view\
    \ you want to rotate such as\n\n```\nImage(systemName: \"star.fill\")\n.font(.system(size:\
    \ 200))\n.foregroundColor(.green)\n.rotationEffect(Angle.degrees(degree))\n```\n\
    \nThen you need to attach the .gesture modifier to the view you want to rotate\
    \ using the rotation gesture like this:\n\n```\n.gesture(\n)\n```\n\nInside the\
    \ parentheses of the .gesture modifier is where you define the rotation gesture\
    \ and detect when it changes like this:\n\n```\n.gesture(\nRotationGesture()\n\
    .onChanged({ angle in\ndegree = angle.degrees\n})\n)\n```\n\nThe .onChanged modifier\
    \ measures how far the user rotates two fingertips clockwise or counterclockwise.\
    \ To see how to detect a rotation gesture, follow these steps:\n\n1.  Create a\
    \ new SwiftUI iOS App project and give it any name you wish such as “RotationGesture.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Add the following\
    \ State variable under the struct ContentView: View line:\n\n1.  Add a VStack\
    \ with an Image inside the body like this:\n\n    ```\n    var body: some View\
    \ {\n    VStack {\n    Image(systemName: \"star.fill\")\n    .font(.system(size:\
    \ 200))\n    .foregroundColor(.green)\n    .rotationEffect(Angle.degrees(degree))\n\
    \    }\n    }\n    ```\n\n    This defines an Image view that displays a star\
    \ at a font size of 200 and a color of green. Then it uses the .rotationEffect\
    \ modifier to rotate the Image.\n\n2.  Add a .gesture modifier to the Image since\
    \ that’s what we want to rotate using the rotation gesture like this:\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    Image(systemName: \"star.fill\"\
    )\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n    .rotationEffect(Angle.degrees(degree))\n\
    \    .gesture(\n    )\n    }\n    }\n    ```\n\n3.  Add the RotationGesture inside\
    \ the .gesture () parentheses along with defining an .onChanged modifier like\
    \ this:\n\n    ```\n    var body: some View {\n    VStack {\n    Image(systemName:\
    \ \"star.fill\")\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n\
    \    .rotationEffect(Angle.degrees(degree))\n    .gesture(\n    RotationGesture()\n\
    \    .onChanged({ angle in\n    degree = angle.degrees\n    })\n    )\n    }\n\
    \    }\n    ```\n\n    The .onChanged modifier measures the angle that the user\
    \ rotates the two-fingertip gesture on the screen. The entire ContentView file\
    \ should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State private var degree = 0.0\n    var body: some View {\n   \
    \ VStack {\n    Image(systemName: \"star.fill\")\n    .font(.system(size: 200))\n\
    \    .foregroundColor(.green)\n    .rotationEffect(Angle.degrees(degree))\n  \
    \  .gesture(\n    RotationGesture()\n    .onChanged({ angle in\n    degree = angle.degrees\n\
    \    })\n    )\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n4.  Click the Live icon in the Canvas pane.\n\n5.  Hold down the Option\
    \ key and click inside the green star displayed in the Canvas pane. Holding down\
    \ the Option key while clicking the left mouse button displays two gray circles\
    \ that simulate pressing two fingertips on the screen (see Figure [11-1](#329781_7_En_11_Chapter.xhtml#Fig1)).\n\
    \n6.  While holding down the Option key, drag the mouse to simulate moving the\
    \ two fingertips rotating. Notice that as you drag the mouse, the star image rotates\
    \ to match the rotation gesture.\n\n```\n@State private var degree = 0.0\n```"
