  trans: "\n# 向导航栈添加按钮\n\n除了在导航栈上方显示标题外，你还可以在屏幕顶部显示一个或多个按钮。这些按钮会出现在一个工具栏上，你可以通过在导航栈内部使用\
    \ `.toolbar` 修饰符来添加这个工具栏，具体方法如下：\n\n```\nNavigationStack {\n    .navigationTitle(\"\
    导航标题\")\n    .toolbar {\n    }\n}\n```\n\n默认情况下，在 `.toolbar` 内部定义的任何按钮或图标的颜色都是蓝色。如果你想定义不同的颜色，可以像这样为\
    \ `NavigationStack` 添加 `.accentColor` 修饰符：\n\n```\nNavigationStack {\n    .navigationTitle(\"\
    导航标题\")\n    .toolbar {\n    }\n}.accentColor(.purple)\n```\n\n在 `.toolbar` 修饰符内部，你可以定义一个或多个\
    \ `ToolbarItem`。对于你添加的每一个 `ToolbarItem`，你都可以定义其放置位置（左上角设置为 `.navigationBarLeading`，或右上角设置为\
    \ `.navigationBarTrailing`）。此外，你必须定义按钮的外观以及用户点击该按钮时要运行的代码，如下所示：\n\n```\n.toolbar\
    \ {\n    ToolbarItem(placement: .navigationBarLeading) {\n        Button {\n \
    \           //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n     \
    \   }\n    }\n    ToolbarItem(placement: .navigationBarTrailing) {\n        Button\
    \ {\n            //  要运行的代码\n        } label: {\n            //  在此处定义按钮的外观\n\
    \        }\n    }\n}\n```\n\n要了解如何在导航栈中定义按钮，请按照以下步骤操作：\n\n![](img/329781_7_En_17_Fig3_HTML.jpg)\n\
    \n**图 17-3.** 使用 `.toolbar` 修饰符的工具栏按钮外观\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意你喜欢的名称，例如“NavigationStackButtons”。\n\
    2.  在导航窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 一行下方添加两个状态变量，如下所示：\n\
