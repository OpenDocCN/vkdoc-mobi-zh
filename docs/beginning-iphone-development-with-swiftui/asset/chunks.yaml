  trans: '

    # 显示图片


    就像 `Text` 视图允许你在用户界面上显示文本一样，`Image` 视图允许你在用户界面上显示图标和图形文件。如果你想显示存储在 SF Symbols
    应用中的图标，可以使用如下 Swift 代码：


    ```

    Image(systemName: "hare.fill")

    ```


    当你想要显示一个 SF Symbol 图标时，必须使用 `systemName` 参数。由于图标通常很小，你可能希望放大它们。最简单的放大图标方法是定义一个更大的字体，例如`.largeTitle`
    或 `.custom`，如图 5-12 所示。


    ![](img/329781_7_En_5_Fig12_HTML.jpg)


    一组由 3 个命令（image、system name、font、large title、custom、size）和 3 个不同大小的乌龟图标构成的集合。


    图 5-12


    通过改变字体大小来修改 SF Symbol 图标的大小


    要显示一张图片，首先需要将其拖放到 Assets 文件夹中。然后，要显示存储在 Assets 文件夹中的图片，你可以使用 `Image` 视图并像这样指定图片名称：


    ```

    Image("flag")

    ```


    图片可以是任意尺寸，但如果它们太大或太小，`Image` 视图会以其原始尺寸显示。由于你可能需要调整图片大小以适配用户界面，你需要在 `Image` 视图上使用以下三个修饰符：


    - `.resizable()`

    - `.aspectRatio(contentMode: z)`

    - `.frame(width: x, height: y)`


    `.resizable()` 修饰符允许 `Image` 视图改变所显示图片的大小。如果 `Image` 视图缺少这个 `.resizable()` 修饰符，那么无论
    `Image` 视图的尺寸如何，图片都会保持其原始大小。


    `.frame(width: x, height: y)` 修饰符允许你定义 `Image` 视图的尺寸。与 `.resizable()` 修饰符一起使用时，`.frame`
    修饰符可以让你定义图片固定的宽度和高度。


    由于拉伸 `Image` 视图的宽度和高度可能会扭曲其内部显示的图片，`.aspectRatio` 修饰符允许你定义图片应如何响应。`.fill` 选项将图片扩展至
    `.frame` 修饰符定义的较大宽度或高度。`.fit` 选项将图片缩小至 `.frame` 修饰符定义的较小宽度或高度，如图 5-13 所示。


    ![](img/329781_7_En_5_Fig13_HTML.jpg)


    一组由 2 个命令（image、resizable、aspect ratio、content mode、fill、fit、frame width、height）及其各自的
    2 个不同尺寸的旗帜图标（在一个边框内外）构成的集合。


    图 5-13


    在图片上使用 `.fill` 和 `.fit` 宽高比


    如果你想进一步调整宽高比，可以包含一个宽高比值，例如：


    ```

    Image("flag")

    .resizable()

    .frame(width: 150, height: 150)

    .aspectRatio(0.5, contentMode: .fill)

    ```


    这个宽高比定义了宽度与高度的比例，因此值 `0.5` 表示宽度与高度之比为 1:2，而值 `0.75` 则表示宽度与高度之比为 3:4。


    除了使用 `.aspectRatio` 修饰符并定义 `.fill` 或 `.fit` 的 `contentMode`，Swift 还提供了另外两种选择：


    - `.scaleToFill()`

    - `.scaleToFit()`


    只需像这样用 `.scaleToFit` 或 `.scaleToFill` 修饰符替换 `.aspectRatio` 修饰符：


    ```

    Image("flag")

    .resizable()

    .frame(width: 150, height: 150)

    .scaleToFill()

    ```


    ## 裁剪图片


    `Image` 视图可以显示别人绘制的剪贴画图片，也可以显示用数码相机拍摄的照片。通常，`Image` 视图会在 `.frame` 修饰符定义的矩形内显示任何图片。然而，为了创造更独特的视觉效果，你可以通过使用
    `.clipShape` 修饰符，用几何形状覆盖来裁剪图片。


    `.clipShape` 修饰符接受任何常见的几何形状，例如：


    ```

    .clipShape(Circle())

    ```


    当使用其他几何形状（如 `Ellipse()` 或 `Capsule()`）时，请确保框架宽度足够宽。如果框架的宽度和高度相同，那么 `Ellipse()`
    和 `Capsule()` 形状看起来就像 `Circle()` 一样。图 5-14 展示了 `.clipShape(Circle())` 修饰符如何改变通常显示为矩形图片的外观。


    ![](img/329781_7_En_5_Fig14_HTML.jpg)


    一组由 2 个命令（image、resizable、scaled to fill、frame width、height、clip shape）及其各自的 2
    张猫的照片（矩形和圆形）构成的集合。


    图 5-14


    使用 `.clipShape()` 修饰符


    ## 为图片添加阴影


    突出显示 `Image` 视图外观的另一种方法是使用 `.shadow` 修饰符，它会在视图周围添加阴影。你可以通过定义其半径来调整阴影在视图周围出现的程度，例如：


    ```

    .shadow(color: .red, radius: 46, x: 0, y: 0)

    ```


    `.shadow` 修饰符需要以下参数：


    - **Color** – 定义阴影的颜色。

    - **Radius** – 定义阴影在视图周围的大小。

    - **X** – 定义阴影的 x（水平）偏移量。值为 `0` 时，阴影在水平方向上围绕视图居中。

    - **Y** – 定义阴影的 y（垂直）偏移量。值为 `0` 时，阴影在垂直方向上围绕视图居中。


    如果 `x` 和 `y` 的值非零，则阴影会偏离 `Image` 视图。如果 `x` 和 `y` 的值都为 `0`，则阴影会均匀地出现在 `Image` 视图的所有四个边缘周围，如图
    5-15 所示。


    ![](img/329781_7_En_5_Fig15_HTML.jpg)


    一组由 2 个命令（image、resizable、scaled to fill、frame width、height、clip shape、shadow、radius）及其各自的
    2 张猫在桌子上的照片（矩形和圆形，带有渐变色阴影）构成的集合。


    图 5-15


    使用不同的 `x` 和 `y` 值向 `Image` 视图添加阴影


    ## 为图片添加边框


    为了进一步突出 `Image` 视图，你可以使用 `.overlay` 修饰符在其周围添加边框，如下所示：


    ```

    .overlay(Rectangle().stroke(Color.blue, lineWidth: 10))

    ```


    `.overlay` 修饰符需要以下参数：


    - **Shape** – 定义边框的形状以匹配 `Image` 视图的形状

    - **Color** – 定义边框的颜色

    - **lineWidth** – 定义 `Image` 视图周围边框线的粗细


    图 5-16 展示了 `.overlay` 修饰符的两种用法，它们使用了不同的形状、颜色和线条宽度。


    ![](img/329781_7_En_5_Fig16_HTML.jpg)


    一组由 2 个命令（image、resizable、scaled to fill、frame width、height、clip shape、shadow、radius、overlay、stroke、line
    width）及其各自的 2 张猫在桌子上的照片（矩形和圆形，带有渐变色边框和阴影）构成的集合。


    图 5-16


    为 `.overlay` 修饰符使用不同的值

