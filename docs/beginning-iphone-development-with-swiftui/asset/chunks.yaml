  trans: "\n### 搜索列表\n\n由于列表通常显示大量数据，因此滚动浏览一个长的`List`会变得很麻烦。为了让在大型`List`中搜索特定数据变得更容易，你可以添加一个搜索栏。现在用户可以输入一个或多个字符来过滤长的`List`，这样他们只能看到想要的、相关的数据。\n\
    \n要给`List`添加搜索栏，你需要将一个`List`嵌入到`NavigationView`中，并为`List`添加一个`.searchable`修饰符，操作如下：\n\
    \n```\nNavigationView {\n    List (arrayName, id: \\.self) { x in\n        Text(x)\n\
    \    }.searchable(text: $stateVariable)\n}\n```\n\n在这个示例中，你需要将`\"arrayName\"`替换为包含`List`项的实际数组名称。然后，你需要将`\"\
    stateVariable\"`替换为一个持有`String`数据类型的`State`变量的名称。\n\n要了解如何搜索`List`，请按照以下步骤操作：\n\
    \n![](img/329781_7_En_13_Fig11_HTML.jpg)\n\n屏幕截图显示了一个单词列表，包括 automobile、bicycle、skateboard、boat、scooter、airplane\
    \ 和 skates。顶部有一个搜索栏。\n\n**图 13-11** – 搜索栏和`List`项的初始外观\n\n1.  创建一个新的 SwiftUI iOS\
    \ 应用项目，并给它取任意你喜欢的名字，例如`\"ListSearch\"`。\n\n2.  在导航器窗格中点击`ContentView`文件。\n\n3.\
    \  在`import SwiftUI`行下方，添加一个返回字符串数组的函数，如下所示：\n\n    ```\n    func newList() ->\
    \ [String] {\n        return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"\
    Boat\", \"Scooter\", \"Airplane\", \"Skates\"]\n    }\n    ```\n\n    该函数简单地返回一个`Strings`数组。这个函数稍后将在用户完成对`List`的搜索后，用于刷新整个`List`。\n\
    \n4.  在`struct ContentView`行下方添加两个`State`变量，如下所示：\n\n    ```\n    @State var search\
    \ = \"\"\n    @State var transportation = newList()\n    ```\n\n    `search`状态变量将存储从搜索栏输入的数据。`transportation`状态变量存储一个`Strings`数组，该数组通过调用`newList()`函数获取。\n\
    \n5.  在`VStack`内部添加一个`NavigationView`，如下所示：\n\n    ```\n    var body: some View\
    \ {\n        VStack {\n            NavigationView {\n            }\n        }\n\
    \    }\n    ```\n\n6.  在`NavigationView`内部添加一个`List`，如下所示：\n\n    ```\n    var\
    \ body: some View {\n        VStack {\n            NavigationView {\n        \
    \        List (transportation, id: \\.self) { x in\n                    Text(x)\n\
    \                }\n            }\n        }\n    }\n    ```\n\n    这将用存储在`transportation`状态变量中的项（一个`Strings`数组）填充`List`。\n\
    \n7.  将`.searchable`修饰符添加到`List`的最后一个花括号后面，如下所示：\n\n    ```\n    var body: some\
    \ View {\n        VStack {\n            NavigationView {\n                List\
    \ (transportation, id: \\.self) { x in\n                    Text(x)\n        \
    \        }.searchable(text: $search)\n            }\n        }\n    }\n    ```\n\
    \n    这会在屏幕顶部添加一个搜索栏。用户在搜索栏中输入的所有内容都将存储在`search`状态变量中。目前这个搜索栏还不起作用，因此我们需要为其添加一个`.onChange`修饰符。\n\
    \n8.  将`.onChange`修饰符添加到`List`中，如下所示：\n\n    ```\n    var body: some View {\n\
    \        VStack {\n            NavigationView {\n                List (transportation,\
    \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
    \ $search)\n                .onChange(of: search) { newValue in\n            \
    \        if !newValue.isEmpty && newValue.count >= 1 {\n                     \
    \   transportation = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
    \                        }\n                    } else {\n                   \
    \     transportation = newList()\n                    }\n                }\n \
    \           }\n        }\n    }\n    ```\n\n    每次搜索栏内容发生变化时，`.onChange`修饰符都会运行。如果搜索栏完全为空，则`.onChange`修饰符会运行`newList()`函数来重新填充`List`。如果搜索栏不为空且至少包含一个字符，则搜索栏会使用过滤器来匹配用户输入的内容与每个`List`项。`.hasPrefix`修饰符仅仅检查用户输入的内容是否匹配构成每个`List`项的部分或全部字母。\n\
    \n整个`ContentView`文件应该如下所示：\n\n```\nimport SwiftUI\nfunc newList() -> [String]\
    \ {\n    return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"Boat\", \"Scooter\"\
    , \"Airplane\", \"Skates\"]\n}\nstruct ContentView: View {\n    @State var search\
    \ = \"\"\n    @State var transportation = newList()\n    var body: some View {\n\
    \        VStack {\n            NavigationView {\n                List (transportation,\
    \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
    \ $search)\n                .onChange(of: search) { newValue in\n            \
    \        if !newValue.isEmpty && newValue.count >= 1 {\n                     \
    \   transportation = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
    \                        }\n                    } else {\n                   \
    \     transportation = newList()\n                    }\n                }\n \
    \           }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n9.  点击画布（Canvas）窗格中的“Live”图标。项目将出现在`List`中，顶部有一个搜索栏，如图 13-11 所示。\n\n![](img/329781_7_En_13_Fig12_HTML.jpg)\n\
    \n屏幕截图显示搜索栏下方有一个包含 2 个单词的列表，其中包括 bicycle 和 boat。搜索栏中键入了字母 B。\n\n**图 13-12** –\
    \ 搜索栏过滤掉了所有与搜索栏中键入文本不匹配的项目\n\n10. 点击搜索栏并键入`\"b\"`。请注意，`List`现在过滤掉了所有项目，除了那些以`\"\
    b\"`开头的项目，例如`\"Boat\"`和`\"Bicycle\"`，如图 13-12 所示。\n\n11. 点击“取消”或关闭图标（x）。请注意，`List`再次显示了所有项目。\n\
    \n### 总结\n\n列表是在一个位置显示多个相关项的常见方式。为了帮助组织`List`中的项目，你可以将相关的项目分组。\n\n除了在`List`中显示项目，你还可以检测从左到右或从右到左的滑动手势。通过使用`.onDelete`修饰符，你可以允许用户从`List`中删除项目。通过使用`NavigationView`和一个“编辑”按钮，你可以使用`.onMove`修饰符允许用户在`List`内移动项目。\n\
    \n你还可以为`List`自定义滑动手势。当你创建自定义滑动手势时，可以为每个按钮定义图标和颜色。通过对列表使用滑动手势，用户可以用不同的方式修改`List`项。\n\
    \n为了让列表更易于阅读，可以考虑添加分隔线来分隔项目，或者使用交替颜色。搜索栏也可以让用户轻松找到他们想要的项目，特别是当`List`包含大量项目时。通过使用列表，你可以显示组织好的信息供用户查看和选择。\n"
- fmt: "# 14. Using Forms and Group Boxes\n\nWhen you fill out paper forms, you may\
    \ notice that the paper forms group related items together. For example, the form\
    \ may ask for your name, address, and phone number in one area of the form and\
    \ ask for your gender, racial background, and marital status in another area of\
    \ the form. Paper forms make it easy to enter related data in one area.\n\nA SwiftUI\
    \ `Form` works in a similar way by grouping related views together that offer\
    \ options and settings that the user can select. Forms consist of an optional\
    \ header, optional footer, and content inside defined by views such as `Text`,\
    \ `Slider`, or `Toggle` views as shown in Figure [14-1](#329781_7_En_14_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_14_Chapter/329781_7_En_14_Fig1_HTML.jpg)\n\nA set of\
    \ 2 screenshots. The left one denotes a snippet of code to define the name of\
    \ the section header and settings for the toggle. The right side denotes the rendered\
    \ output of the code in the user interface.\n\nFigure 14-1\n\nThe typical parts\
    \ of a `Form`\n\nA `Form` groups related views together like a stack. The difference\
    \ is that a `Form` also visually groups views together on the user interface.\
    \ All views within a `Form` appear together, while any views not in the `Form`\
    \ appear separated by a gray area as shown in Figure [14-2](#329781_7_En_14_Chapter.xhtml#Fig2).\n\
    \n![](images/329781_7_En_14_Chapter/329781_7_En_14_Fig2_HTML.jpg)\n\nAn illustration\
    \ represents a snippet of code to exhibit the texts which are in the form and\
    \ outside the form. The right part denotes the rendered output of the code denoting\
    \ the text inside the form at the top and outside the form at the bottom.\n\n\
    Figure 14-2\n\n`Form`s group views together on the user interface\n\nSimilar to\
    \ forms are group boxes, which give you a simpler way to visually group related\
    \ views together on the user interface. When you need to group views together,\
    \ you can choose between a `Form` and a `GroupBox`.\n\n## Creating a Simple Form\n\
    \nThe simplest `Form` just groups one or more views together. To create a `Form`,\
    \ you just need to do this:\n\n```\nForm {\n    //\n}\n```\n\nTo see how to create\
    \ a simple `Form`, follow these steps:\n\n![](images/329781_7_En_14_Chapter/329781_7_En_14_Fig3_HTML.jpg)\n\
    \nA set of 2 screenshots represents a rectangular text box in each. The top one\
    \ denotes the text this is the first form. The bottom one denotes this is the\
    \ second form.\n\nFigure 14-3\n\nTwo forms appear on the user interface\n\n1.\
    \ Create a new SwiftUI iOS App project and give it any name you wish such as “SimpleForm.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add two `State` variables\
    \ under the `struct ContentView: View` line like this:\n\n    ```\n    @State\
    \ var messageOne = \"\"\n    @State var messageTwo = \"\"\n    ```\n\n4. Add two\
    \ `Form`s and two `Text` views inside the `VStack` like this:\n\n    ```\n   \
    \ var body: some View {\n        VStack {\n            Form {\n              \
    \  Text(\"This is the first Form\")\n                TextField(\"Type here\",\
    \ text: $messageOne)\n            }\n            Form {\n                Text(\"\
    This is the second Form\")\n                TextField(\"Type here\", text: $messageTwo)\n\
    \            }\n            Text(\"Form #1 = \\(messageOne)\")\n            Text(\"\
    Form #2 = \\(messageTwo)\")\n        }\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    \n    struct\
    \ ContentView: View {\n        @State var messageOne = \"\"\n        @State var\
    \ messageTwo = \"\"\n        \n        var body: some View {\n            VStack\
    \ {\n                Form {\n                    Text(\"This is the first Form\"\
    )\n                    TextField(\"Type here\", text: $messageOne)\n         \
    \       }\n                Form {\n                    Text(\"This is the second\
    \ Form\")\n                    TextField(\"Type here\", text: $messageTwo)\n \
    \               }\n                Text(\"Form #1 = \\(messageOne)\")\n      \
    \          Text(\"Form #2 = \\(messageTwo)\")\n            }\n        }\n    }\n\
    \    \n    struct ContentView_Previews: PreviewProvider {\n        static var\
    \ previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
    \n    This code creates a user interface that displays two forms on the screen\
    \ along with two `Text` views that are not part of either `Form` as shown in Figure\
    \ [14-3](#329781_7_En_14_Chapter.xhtml#Fig3).\n\n5. Click the Live icon in the\
    \ Canvas pane.\n6. Click in the top `TextField` and type some text. Notice that\
    \ this text now appears in the `Text` view (“Form #1 =”) at the bottom of the\
    \ screen.\n7. Click in the middle `TextField` and type some text. Notice that\
    \ this text now appears in the `Text` view (“Form #2 =”) at the bottom of the\
    \ screen.\n\n## Dividing a Form into Sections\n\nA `Form` can hold one or more\
    \ views. However, the more views in a `Form`, the more crowded all of those views\
    \ will appear. To group related views, you can divide a `Form` into sections where\
    \ each `Section` can contain one or more views to display on the screen. In addition,\
    \ sections can display an optional header and/or footer.\n\nThe simplest `Section`\
    \ just groups related views together like this:\n\n```\nSection {\n    // Add\
    \ views here\n}\n```\n\nWhile a `Section` visibly appears distinct on the user\
    \ interface, you can further distinguish a `Section` by using a header and/or\
    \ a footer. If you just want to define a header, you can use code like this:\n\
    \n```\nSection(\"Header text here\") {\n    // Add views here\n}\n```\n\nThis\
    \ method simply displays text in uppercase even if you don’t type it that way.\
    \ Another way to define a header looks like this:\n\n```\nSection(content: {\n\
    \    // Add views here\n}, header: {\n    // Define header text here\n})\n```\n\
    \nYou can also use this method to define just a footer like this:\n\n```\nSection(content:\
    \ {\n    // Add views here\n}, footer: {\n    // Define footer text here\n})\n\
    ```\n\n> Note: The text in a footer appears exactly as you type it, unlike a header\
    \ that automatically displays text in all uppercase.\n\nIf you want to define\
    \ both a header and a footer, you can use this code:\n\n```\nSection {\n    //\
    \ Add views here\n} header: {\n    // Define header text here\n} footer: {\n \
    \   // Define footer text here\n}\n```\n\nTo see how to create headers and footers\
    \ in sections, follow these steps:\n\n![](images/329781_7_En_14_Chapter/329781_7_En_14_Fig4_HTML.jpg)\n\
    \nA screenshot denotes a rectangular section with 4 text boxes arranged from top\
    \ to bottom. The text boxes denote the sections for no header, simple header,\
    \ simple footer, and both header and footer.\n\nFigure 14-4\n\nFour different\
    \ ways to display a `Section`\n\n1. Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “HeaderFormSections.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add a `Form` inside the `var body: some View`\
    \ like this:\n\n    ```\n    var body: some View {\n        Form {\n        }\n\
    \    }\n    ```\n\n4. Add four `Section`s defined in different ways inside the\
    \ `Form` like this:\n\n    ```\n    var body: some View {\n        Form {\n  \
    \          Section {\n                Text(\"This Section has no header\")\n \
    \           }\n            Section(\"Just a Header\") {\n                Text(\"\
    This Section uses a simple header\")\n            }\n            Section {\n \
    \               Text(\"This Section uses a simple footer\")\n            } footer:\
    \ {\n                Text(\"Just a Footer\")\n            }\n            Section\
    \ {\n                Text(\"This Section uses both a header and footer\")\n  \
    \          } header: {\n                Text(\"The header\")\n            } footer:\
    \ {\n                Text(\"The footer\")\n            }\n        }\n    }\n \
    \   ```\n\n    The entire `ContentView` file should look like this:\n\n    ```\n\
    \    import SwiftUI\n    \n    struct ContentView: View {\n        var body: some\
    \ View {\n            Form {\n                Section {\n                    Text(\"\
    This Section has no header\")\n                }\n                Section(\"Just\
    \ a Header\") {\n                    Text(\"This Section uses a simple header\"\
    )\n                }\n                Section {\n                    Text(\"This\
    \ Section uses a simple footer\")\n                } footer: {\n             \
    \       Text(\"Just a Footer\")\n                }\n                Section {\n\
    \                    Text(\"This Section uses both a header and footer\")\n  \
    \              } header: {\n                    Text(\"The header\")\n       \
    \         } footer: {\n                    Text(\"The footer\")\n            \
    \    }\n            }\n        }\n    }\n    \n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n    The preceding code creates a `Form` with four\
    \ different `Section`s as shown in Figure [14-4](#329781_7_En_14_Chapter.xhtml#Fig4)."
