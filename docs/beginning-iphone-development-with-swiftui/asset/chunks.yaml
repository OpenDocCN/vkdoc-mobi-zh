    ## 使用`GridRow`创建表格


    数据通常可以像电子表格或表格一样按行和列组织。为了在`SwiftUI`中模拟表格，有一个特殊的`GridRow`，它允许你定义在网格内组织的数据行，如图[19-7](#329781_7_En_19_Chapter.xhtml#Fig7)所示。


    ![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig7_HTML.jpg)


    一个包含2列和5行的表格显示了电影列表及其各自的发行商。行条目如下：1. 《火星救援》，二十世纪福克斯。2. 《E.T.外星人》，环球影业。3. 《夺宝奇兵》，派拉蒙。4.
    《玩具总动员》，博伟影业。5. 《敦刻尔克》，华纳兄弟。


    图19-7


    `Grid`和`GridRow`可以创建表格


    要创建表格，你必须首先像这样定义一个网格：


    ```swift

    var body: some View {

    Grid() {

    }

    ```


    然后在`Grid()`内部，定义多个`GridRow`。在每个`GridRow`内部，为你想要创建的每一列定义一个单独的视图。因此，如果你想创建一行分成两列，`GridRow`可能由两个`Text`视图组成，如下所示：


    ```swift

    GridRow {

    Text("The Martian")

    Text("20th Century")

    }

    ```


    要了解如何使用`GridRow`创建表格，请按照以下步骤操作：


    ![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig8_HTML.jpg)


    一个表格列出了电影，包括《火星救援》、《E.T.外星人》、《夺宝奇兵》、《玩具总动员》和《敦刻尔克》，以及它们各自的发行商，如二十世纪福克斯、环球影业、派拉蒙、博伟影业和华纳兄弟。电影和发行商以三种不同的对齐方式列出：左对齐、居中对齐和右对齐。


    图19-8


    在`GridRow`中对齐数据的不同方式


    1.  创建一个新的`SwiftUI` iOS应用项目，并赋予你想要的任何名称，例如“GridRows”。


    2.  在导航窗格中点击`ContentView`文件。


    3.  在`var body: some View`内部添加一个`Grid()`，如下所示：


    ```swift

    var body: some View {

    Grid() {

    }

    ```


    4.  在`Grid()`内部添加`GridRow`。`GridRow`的数量定义了行数。一个`GridRow`内不同视图的数量定义了列数：


    ```swift

    var body: some View {

    Grid() {

    GridRow {

    Text("Movies")

    Text("Distributer")

    }.bold()

    .font(.largeTitle)

    GridRow {

    Text("The Martian")

    Text("20th Century")

    }

    GridRow {

    Text("E.T.")

    Text("Universal")

    }

    GridRow {

    Text("Raiders of the Lost Ark")

    Text("Paramount")

    }

    GridRow {

    Text("Toy Story")

    Text("Buena Vista Pictures")

    }

    GridRow {

    Text("Dunkirk")

    Text("Warner Brothers")

    }

    }

    ```


    注意，你可以格式化单个`GridRow`。在前面的示例中，第一个`GridRow`以粗体和`.largeTitle`格式设置，以定义表格的标题（见图[19-7](#329781_7_En_19_Chapter.xhtml#Fig7)）。


    整个`ContentView`文件应如下所示：


    ```swift

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    Grid() {

    GridRow {

    Text("Movies")

    Text("Distributer")

    }.bold()

    .font(.largeTitle)

    GridRow {

