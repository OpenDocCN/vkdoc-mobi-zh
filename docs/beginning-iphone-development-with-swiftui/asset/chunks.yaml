  trans: "\n# 检测拖拽手势\n\n拖拽手势发生在用户按压并在屏幕上滑动指尖时。拖拽手势通常用于将屏幕上的某个项目移动到新位置。\n\n由于拖拽手势会改变视图的位置，你需要定义一个用来测量位置的\
    \ `State` 变量，类型为 `CGPoint`，如下所示：\n\n```\n@State private var circlePosition = CGPoint(x:\
    \ 50, y: 50)\n```\n\n要移动一个视图，拖拽手势需要与你要移动的视图上的 `.position` 修饰符配合使用，例如：\n\n```\n\
    Circle()\n.fill(Color.blue)\n.frame(width: 100, height: 100)\n.position(circlePosition)\n\
    ```\n\n然后，你需要使用拖拽手势将要移动的视图与 `.gesture` 修饰符关联起来，如下所示：\n\n```\n.gesture(\n)\n```\n\
    \n在 `.gesture` 修饰符的圆括号内，定义拖拽手势并检测其变化，如下所示：\n\n```\n.gesture(DragGesture()\n.onChanged({\
    \ value in\n// 要运行的代码\n}))\n```\n\n`.onChanged` 修饰符测量用户在屏幕上滑动指尖的距离。要了解如何检测拖拽手势，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 \"DragGesture\"。\n\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n    ```\n \
    \   @State private var circlePosition = CGPoint(x: 50, y: 50)\n    @State private\
    \ var circleLabel = \"50, 50\"\n    ```\n\n4.  在 `body` 中添加一个包含 `Text` 视图和 `Circle`\
    \ 的 `VStack`，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n\
    \    .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
    \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    }\n    }\n    ```\n\
    \n    这段代码定义了一个 `Text` 视图来显示 `circleLabel` 状态变量的内容，并定义了一个蓝色的 `Circle`。这个 `Circle`\
    \ 使用 `.position` 修饰符来配合拖拽手势。\n\n5.  为 `Circle` 添加 `.gesture` 修饰符，因为这是我们想要通过拖拽手势移动的对象，如下所示：\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n  \
    \  .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
    \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    .gesture(\n    )\n\
    \    }\n    }\n    ```\n\n6.  在 `.gesture()` 的圆括号内添加 `DragGesture`，同时定义一个 `.onChanged`\
    \ 修饰符，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n\
    \    .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
    \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    .gesture(DragGesture()\n\
    \    .onChanged({ value in\n    circlePosition = value.location\n    circleLabel\
    \ = \"\\(Int(value.location.x)), \\(Int(value.location.y))\"\n    }))\n    }\n\
    \    }\n    ```\n\n    `.onChanged` 修饰符测量用户指尖在屏幕上的位置。然后它将 x 和 y 的位置值存储在 `circleLabel`\
    \ 中，以便在 `Text` 视图中显示。整个 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State private var circlePosition = CGPoint(x:\
    \ 50, y: 50)\n    @State private var circleLabel = \"50, 50\"\n    var body: some\
    \ View {\n    VStack {\n    Text(circleLabel)\n    .padding()\n    Circle()\n\
    \    .fill(Color.blue)\n    .frame(width: 100, height: 100)\n    .opacity(0.8)\n\
    \    .position(circlePosition)\n    .gesture(DragGesture()\n    .onChanged({ value\
    \ in\n    circlePosition = value.location\n    circleLabel = \"\\(Int(value.location.x)),\
    \ \\(Int(value.location.y))\"\n    }))\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7.  在画布窗格中点击\"实时\"图标。\n\n8.  将鼠标指针移到画布窗格中模拟 iOS 设备上的\
    \ `Circle` 上，然后拖动鼠标。注意，拖动鼠标时，`Text` 视图会不断更新 `Circle` 的 x 和 y 位置。\n\n## 定义手势优先级与同时触发的手势\n\
    \n你可以向任何视图添加触摸手势。由于堆栈也是一种视图，这意味着你也可以向 `VStack`、`HStack` 和 `ZStack` 添加触摸手势。如果你向堆栈内部的某个视图添加一个手势，然后向堆栈本身添加第二个相同的（同类型）手势，哪个手势会被识别？\n\
    \n当一个手势修饰整个堆栈时，该堆栈内的每个视图都可以识别该手势。但是，如果该堆栈内部的某个视图有自己的手势修饰符，那么这个视图的手势修饰符将优先被识别。要了解其工作原理，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并随意命名，例如 \"TwoGestures\"。\n\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n    ```\n \
    \   @State var message = \"\"\n    ```\n\n4.  在 `body` 中添加一个包含 `Text` 视图、`Circle`\
    \ 和 `Spacer` 的 `VStack`，如下所示：\n\n    ```\n    var body: some View {\n    VStack\
    \ {\n    Text(message)\n    .padding()\n    Circle()\n    .frame(width: 125, height:\
    \ 125)\n    .foregroundColor(.blue)\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    ```\n\n    这会创建一个位于顶部的 `Text` 视图和一个位于其下方的蓝色 `Circle`。然后 `Spacer` 推动\
    \ `VStack` 的边界向下延伸，并将其背景色设置为黄色以便于观察，如图 11-2 所示。\n\n5.  为 `Circle` 添加一个 `.onTapGesture`\
    \ 修饰符，如下所示：\n\n    ```\n    Circle()\n    .frame(width: 125, height: 125)\n  \
    \  .foregroundColor(.blue)\n    .onTapGesture {\n    message = \"Circle tapped\"\
    \n    }\n    ```\n\n    当用户点击 `Circle` 时，`message` 状态变量将保存字符串 \"Circle tapped\"\
    （圆圈被点击）。\n\n6.  为整个 `VStack` 添加一个 `.onTapGesture` 修饰符，如下所示：\n\n    ```\n    var\
    \ body: some View {\n    VStack {\n    Text(message)\n    .padding()\n    Circle()\n\
    \    .frame(width: 125, height: 125)\n    .foregroundColor(.blue)\n    .onTapGesture\
    \ {\n    message = \"Circle tapped\"\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    .onTapGesture {\n    message = \"VStack tapped\"\n    }\n    ```\n\n    如果你点击\
    \ `Circle`，`Circle` 的 `.onTapGesture` 修饰符（显示 \"Circle tapped\"）将被识别。如果你点击 `VStack`\
    \ 中的其他任何位置，`VStack` 的 `.onTapGesture` 修饰符（显示 \"VStack tapped\"）将被识别。整个 `ContentView`\
    \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n7.  点击画布窗格中的\"实时\"图标，然后点击蓝色的 `Circle`。注意\"Circle tapped\"会出现在 `Text`\
    \ 视图中。即使 `Circle` 位于 `VStack` 内部，`VStack` 的 `.onTapGesture` 修饰符也会被忽略。\n\n8.  点击\
    \ `VStack` 的黄色背景。注意\"VStack tapped\"会出现在 `Text` 视图中。\n"
- fmt: "### Defining a High-Priority Gesture\n\nThe gestures attached to views inside\
    \ a stack will always be recognized over gestures attached to a stack. If you\
    \ want a stack’s gesture modifier to run instead of a gesture modifier attached\
    \ to a view inside of that stack, you need to use the `.highPriorityGesture` modifier.\n\
    \nThis `.highPriorityGesture` modifier simply identifies which gesture should\
    \ have the higher priority. In this case, we want the stack’s gesture modifier\
    \ to run first, so we need to enclose it within the `.highPriorityGesture` modifier\
    \ like this:\n\n```\n.highPriorityGesture(\n    TapGesture()\n        .onEnded\
    \ { _ in\n            message = \"VStack tapped\"\n        })\n```\n\nNotice that\
    \ the `TapGesture` uses the `.onEnded` modifier to detect when the tap gesture\
    \ ends so it can store `\"VStack tapped\"` in the `message` `State` variable.\n\
    \nTo see how the `.highPriorityGesture` modifier works, follow these steps:\n\n\
    1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ `\"HighPriorityGestures\"`.\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add the following `State` variable under the `struct ContentView:\
    \ View` line:\n   ```\n   @State var message = \"\"\n   ```\n4. Add a `VStack`\
    \ with a `Text` view, a `Circle`, and a `Spacer` inside the body like this:\n\
    \   ```\n   var body: some View {\n       VStack {\n           Text(message)\n\
    \               .padding()\n           Circle()\n               .frame(width:\
    \ 125, height: 125)\n               .foregroundColor(.blue)\n           Spacer()\n\
    \       }.background(Color.yellow)\n   }\n   ```\n5. Add a `.onTapGesture` modifier\
    \ to the `Circle` like this:\n   ```\n   Circle()\n       .frame(width: 125, height:\
    \ 125)\n       .foregroundColor(.blue)\n       .onTapGesture {\n           message\
    \ = \"Circle tapped\"\n       }\n   ```\n   Normally when the user taps the `Circle`,\
    \ the `message` `State` variable will hold the string `\"Circle tapped\"`.\n6.\
    \ Add a `.highPriorityGesture` modifier to the entire `VStack` like this:\n  \
    \ ```\n   var body: some View {\n       VStack {\n           Text(message)\n \
    \              .padding()\n           Circle()\n               .frame(width: 125,\
    \ height: 125)\n               .foregroundColor(.blue)\n               .onTapGesture\
    \ {\n                   message = \"Circle tapped\"\n               }\n      \
    \     Spacer()\n       }.background(Color.yellow)\n           .highPriorityGesture(\n\
    \               TapGesture()\n                   .onEnded { _ in\n           \
    \            message = \"VStack tapped\"\n                   })\n   }\n   ```\n\
    \   If you click the `Circle`, the `Circle`’s `.onTapGesture` modifier (`\"Circle\
    \ tapped\"`) would normally be recognized. However, the `.highPriorityGesture`\
    \ modifier defines the `TapGesture` on the `VStack` to get recognized first. The\
    \ entire `ContentView` file should look like this:\n   ```\n   import SwiftUI\n\
    \   struct ContentView: View {\n       @State var message = \"\"\n       var body:\
    \ some View {\n           VStack {\n               Text(message)\n           \
    \        .padding()\n               Circle()\n                   .frame(width:\
    \ 125, height: 125)\n                   .foregroundColor(.blue)\n            \
    \       .onTapGesture {\n                       message = \"Circle tapped\"\n\
    \                   }\n               Spacer()\n           }.background(Color.yellow)\n\
    \               .highPriorityGesture(\n                   TapGesture()\n     \
    \                  .onEnded { _ in\n                           message = \"VStack\
    \ tapped\"\n                       })\n       }\n   }\n   struct ContentView_Previews:\
    \ PreviewProvider {\n       static var previews: some View {\n           ContentView()\n\
    \       }\n   }\n   ```\n7. Click the Live icon in the Canvas pane and click the\
    \ blue Circle. Notice `\"VStack tapped\"` appears in the `Text` view because of\
    \ the `.highPriorityGesture` modifier on the `VStack` that overrides the `Circle`’s\
    \ `.onTapGesture` modifier.\n8. Click the yellow background of the `VStack`. Notice\
    \ `\"VStack tapped\"` still appears in the `Text` view.\n\n### Defining Simultaneous\
    \ Gestures\n\nNormally, the gesture modifiers attached to an individual view will\
    \ run instead of any gesture modifiers attached to a stack. If you use the `.highPriorityGesture`\
    \ modifier, then you can make a stack’s gestures run instead of any gesture modifiers\
    \ attached to an individual view. However, what if you want both gestures attached\
    \ to a view and attached to a stack to run?\n\nThen you can use the `.simultaneousGesture`\
    \ modifier to make sure that a stack’s gesture modifier run at the same time as\
    \ a gesture modifier attached to an individual view. To define simultaneous gestures\
    \ to run, enclose the gesture that would normally get ignored within the `.simultaneousGesture`\
    \ modifier like this:\n\n```\n.simultaneousGesture(\n    TapGesture()\n      \
    \  .onEnded { _ in\n            message = \"VStack tapped\"\n        })\n```\n\
    \nTo see how the `.simultaneousGesture` modifier works, follow these steps:\n\n\
    1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ `\"SimultaneousGestures\"`.\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add the following `State` variable under the `struct ContentView:\
    \ View` line:\n   ```\n   @State var message = \"\"\n   ```\n4. Add a `VStack`\
    \ with a `Text` view, a `Circle`, and a `Spacer` inside the body like this:\n\
    \   ```\n   var body: some View {\n       VStack {\n           Text(message)\n\
    \               .padding()\n           Circle()\n               .frame(width:\
    \ 125, height: 125)\n               .foregroundColor(.blue)\n           Spacer()\n\
    \       }.background(Color.yellow)\n   }\n   ```\n5. Add a `.onTapGesture` modifier\
    \ to the `Circle` like this:\n   ```\n   Circle()\n       .frame(width: 125, height:\
    \ 125)\n       .foregroundColor(.blue)\n       .onTapGesture {\n           message\
    \ += \"Circle tapped\"\n       }\n   ```\n   Notice that when the `Circle` recognizes\
    \ a tap gesture, it adds (`+=`) `\"Circle tapped\"` to the current value of the\
    \ `message` `State` variable.\n6. Add a `.simultaneousGesture` modifier to the\
    \ entire `VStack` like this:\n   ```\n   var body: some View {\n       VStack\
    \ {\n           Text(message)\n               .padding()\n           Circle()\n\
    \               .frame(width: 125, height: 125)\n               .foregroundColor(.blue)\n\
    \               .onTapGesture {\n                   message += \"Circle tapped\"\
    \n               }\n           Spacer()\n       }.background(Color.yellow)\n \
    \          .simultaneousGesture(\n               TapGesture()\n              \
    \     .onEnded { _ in\n                       message = \"VStack tapped\"\n  \
    \                 })\n   }\n   ```\n   If you click the `Circle`, the `Circle`’s\
    \ `.onTapGesture` modifier (`\"Circle tapped\"`) would normally be recognized.\
    \ However, the `.simultaneousGesture` modifier defines the `TapGesture` on the\
    \ `VStack` to get recognized first before also recognizing the gesture modifier\
    \ on the `Circle`. The entire `ContentView` file should look like this:\n   ```\n\
    \   import SwiftUI\n   struct ContentView: View {\n       @State var message =\
    \ \"\"\n       var body: some View {\n           VStack {\n               Text(message)\n\
    \                   .padding()\n               Circle()\n                   .frame(width:\
    \ 125, height: 125)\n                   .foregroundColor(.blue)\n            \
    \       .onTapGesture {\n                       message += \"Circle tapped\"\n\
    \                   }\n               Spacer()\n           }.background(Color.yellow)\n\
    \               .simultaneousGesture(\n                   TapGesture()\n     \
    \                  .onEnded { _ in\n                           message = \"VStack\
    \ tapped\"\n                       })\n       }\n   }\n   struct ContentView_Previews:\
    \ PreviewProvider {\n       static var previews: some View {\n           ContentView()\n\
    \       }\n   }\n   ```\n7. Click the Live icon in the Canvas pane and click the\
    \ blue Circle. Notice `\"VStack tappedCircle tapped\"` appears in the `Text` view\
    \ because of the `.simultaneousGesture` modifier on the `VStack` that lets it\
    \ run before the `Circle`’s `.onTapGesture` modifier.\n8. Click the yellow background\
    \ of the `VStack`. Notice `\"VStack tapped\"` still appears in the `Text` view.\n\
    \n## Summary\n\nTouch gestures give commands to an app without placing an object\
    \ on the user interface such as a button. Gestures can often work with one or\
    \ more fingertips such as a double or triple tap.\n\nWhen adding multiple gestures,\
    \ remember that gestures attached to individual views run instead of gestures\
    \ attached to stacks. If you want a stack’s gesture modifier to run first, enclose\
    \ it within the `.highPriorityGesture` modifier. If you want both the stack and\
    \ individual view’s gesture modifiers to run one after another, enclose the stack\
    \ modifier within the `.simultaneousGesture` modifier.\n\nAdding gestures to an\
    \ app can make the user interface less cluttered and more intuitive by letting\
    \ users directly manipulate objects on the screen."
