  trans: "\n### 在导航栈中结构体之间传递数据\n\n上一个项目创建了两个结构体，其中一个结构体存储在 `ContentView` 文件中，另一个结构体存储在一个单独的文件中。在这两种情况下，结构体都定义了显示静态信息的用户界面，这些信息与原始结构体（`ContentView`）中的任何内容都无关。\n\
    \n在许多情况下，您可能希望一个结构体中的数据出现在另一个结构体中。这意味着我们必须将数据从一个结构体传递到另一个结构体。\n\n幸运的是，这个任务类似于在函数之间传递数据。当一个结构体需要接收数据时，我们只需声明一个属性：创建一个变量，为该变量起一个描述性的名称，并定义该变量可以保存的数据类型，例如\
    \ `String` 或 `Double`，如下所示：\n\n```\nstruct FileView: View {\n    var choice: String\n\
    ```\n\n这定义了一个名为 `choice` 的变量，它可以保存一个 `String` 类型的值。要向此结构体传递数据，我们可以通过调用结构体名称（`FileView`）并后跟\
    \ `choice` 变量作为参数的方式来加载该结构体，如下所示：\n\n```\nFileView(choice: \"Heads\")\n```\n\n\
    当向存储在同一个文件中的结构体传递数据时，我们只需要遵循以下两步流程：\n\n- 在结构体内部声明一个或多个变量以接收数据。\n- 使用这些变量作为参数来调用该结构体。\n\
    \n然而，当向存储在单独文件中的结构体传递数据时，还需要一个额外的步骤。因为存储在单独文件中的结构体还包含另一个用于在画布窗格中显示用户界面的结构体，所以这个预览结构体必须包含该结构体的参数，并向其传递数据，如下所示：\n\
    \n```\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n```\n\n要了解如何在结构体之间传递数据，请按照以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `NavigationStackPassData`。\n2. 点击导航器窗格中的\
    \ `ContentView` 文件。\n3. 像这样编辑 `struct ContentView` 结构体：\n\n```swift\nstruct ContentView:\
    \ View {\n    var body: some View {\n        NavigationStack {\n            VStack\
    \ (spacing: 26) {\n                Text(\"Choose Heads or Tails\")\n         \
    \       NavigationLink(destination: FileView(choice: \"Heads\")) {\n         \
    \           Text(\"Heads\")\n                }\n                NavigationLink(destination:\
    \ SeparateFileView(passedData: \"Tails\")) {\n                    Text(\"Tails\"\
    )\n                }\n                .navigationTitle(\"Flip a Coin\")\n    \
    \        }\n        }\n    }\n}\n```\n\n上述代码定义了两个 `NavigationLink`，其中一个链接调用了一个名为\
    \ `FileView` 的结构体，参数为 `choice:`，并传入了 `\"Heads\"`。第二个 `NavigationLink` 调用了一个名为\
    \ `SeparateFileView` 的结构体，参数为 `passedData:`，并传入了 `\"Tails\"`。\n\n4. 在 `struct\
    \ ContentView` 下方添加一个新的结构体，如下所示：\n\n```swift\nstruct FileView: View {\n    var\
    \ choice: String\n    var body: some View {\n        HStack {\n            Spacer()\n\
    \            VStack {\n                Spacer()\n                Text(\"You chose\
    \ = \\(choice)\")\n                Spacer()\n            }\n            Spacer()\n\
    \        }.background(Color.yellow)\n    }\n}\n```\n\n这个 `FileView` 结构体声明了一个可以保存\
    \ `String` 类型的 `choice` 变量。然后，它在一个显示 `\"You chose = \"` 的 `Text` 视图中展示了这个 `choice`\
    \ 变量。整个 `ContentView` 文件应该如下所示：\n\n```swift\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    var body: some View {\n        NavigationStack {\n            VStack\
    \ (spacing: 26) {\n                Text(\"Choose Heads or Tails\")\n         \
    \       NavigationLink(destination: FileView(choice: \"Heads\")) {\n         \
    \           Text(\"Heads\")\n                }\n                NavigationLink(destination:\
    \ SeparateFileView(passedData: \"Tails\")) {\n                    Text(\"Tails\"\
    )\n                }\n                .navigationTitle(\"Flip a Coin\")\n    \
    \        }\n        }\n    }\n}\nstruct FileView: View {\n    var choice: String\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                Text(\"You chose = \\\
    (choice)\")\n                Spacer()\n            }\n            Spacer()\n \
    \       }.background(Color.yellow)\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n这段代码创建了一个名为 `FileView` 的结构体，但现在我们需要创建第二个名为 `SeparateFileView` 的结构体，它声明一个 `String`\
    \ 类型的 `passedData` 变量。\n\n5. 选择“文件” ➤ “新建” ➤ “文件”。出现一个对话框（见图 17-4）。\n6. 点击对话框顶部的“iOS”，点击“Swift\
    \ 文件”，然后点击“下一步”。Xcode 会要求为您新创建的文件命名。\n7. 输入 `SeparateFile` 并点击“创建”。Xcode 会创建一个新的\
    \ Swift 文件。\n8. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```swift\nimport SwiftUI\n\
    struct SeparateFileView: View {\n    var passedData: String\n    var body: some\
    \ View {\n        HStack {\n            Spacer()\n            VStack {\n     \
    \           Spacer()\n                Text(\"You chose = \\(passedData)\")\n \
    \               Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
    \    }\n}\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n\
    ```\n\n这个文件创建了一个 `SeparateFileView` 结构体，它声明了一个 `String` 类型的 `passedData` 变量。由于这个\
    \ `SeparateFileView` 结构体存储在一个单独的文件中，它包含一个 `struct PreviewProvider`，我们在此也必须使用 `passedData`\
    \ 参数。\n\n9. 点击导航器窗格中的 `ContentView`，返回到 `ContentView` 结构体。\n10. 点击画布窗格中的“实时”图标。\n\
    11. 点击“Heads”导航链接。将出现 `FileView` 结构体，显示“You chose = Heads”。\n12. 点击左上角的“返回”按钮。\n\
    13. 点击“Tails”导航链接。将出现 `SeparateFileView` 结构体，显示“You chose = Tails”。\n"
- fmt: "### Changing Data Between Structures in a Navigation Stack\n\nThe previous\
    \ project created two structures where one structure was stored in the `ContentView`\
    \ file and a second structure was stored in a separate file. In both cases, the\
    \ structures defined user interfaces that received data and displayed it.\n\n\
    What if we pass data to a structure and then allow that structure to modify that\
    \ data? This will require several changes:\n\n- Create a `@State` variable.\n\
    - Use the `NavigationLink` to open another structure and pass that structure a\
    \ binding to the `@State` variable (using the `$` symbol) such as:\n- Define a\
    \ `@Binding` variable in the structure that will receive data.\n- Change that\
    \ `@Binding` variable in the structure that received data.\n\n```\nFileView(choice:\
    \ $message)\n```\n\nTo see how to change data between structures in a Navigation\
    \ Stack, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as `\"NavigationStackBindingData\"`.\n\n2.  Click\
    \ the `ContentView` file in the Navigator pane.\n\n3.  Create a `@State` variable\
    \ under the `struct ContentView: View` line like this:\n\n```\n    struct ContentView:\
    \ View {\n    @State var message = \"\"\n    ```\n\n4.  Add a `NavigationStack`\
    \ and a `VStack` inside the `var body: some View` line like this:\n\n```\n   \
    \ var body: some View {\n    NavigationStack {\n    VStack {\n    }\n    }\n \
    \   ```\n\n5.  Add a `Text` view and two `NavigationLink`s inside the `VStack`\
    \ like this:\n\n```\n    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"\
    Type here\", text: $message)\n    NavigationLink(destination: FileView(choice:\
    \ $message)) {\n    Text(\"Send a message\")\n    }\n    NavigationLink(destination:\
    \ SeparateFileView(passedData: $message)) {\n    Text(\"Separate file\")\n   \
    \ }\n    .navigationTitle(\"Passing Data\")\n    }\n    }\n    ```\n\nNotice that\
    \ the first `NavigationLink` opens a structure called `FileView` and sends a binding\
    \ variable (`$message`) to the `choice:` parameter. The second `NavigationLink`\
    \ opens a structure called `SeparateFileView` and sends the same binding variable\
    \ (`$message`) to the `passedData` parameter.\n\n6.  Add the following structure\
    \ underneath the `struct ContentView: View` structure:\n\n```\n    struct FileView:\
    \ View {\n    @Binding var choice: String\n    var body: some View {\n    HStack\
    \ {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"Type here:\", text:\
    \ $choice)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n    ```\n\nNotice that this structure declares a `@Binding` variable\
    \ called `choice` that can hold a `String`. This structure uses a `TextField`\
    \ to change this `@Binding` variable (`$choice`), which sends the changes automatically\
    \ back to the `ContentView` structure.\n\n7.  Choose `File` ➤ `New` ➤ `File`.\
    \ A dialog appears (see Figure [17-4](#329781_7_En_17_Chapter.xhtml#Fig4)).\n\n\
    8.  Click `iOS` near the top of the dialog, click `Swift File`, and then click\
    \ `Next`. Xcode asks for a name to give your newly created file.\n\n9.  Type `SeparateFile`\
    \ and click `Create`. Xcode creates a new Swift file.\n\n10.  Delete all code\
    \ currently in the `SeparateFile` and replace it with the following:\n\n```\n\
    \    import SwiftUI\n    struct SeparateFileView: View {\n    @Binding var passedData:\
    \ String\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n\
    \    Spacer()\n    TextField(\"Type here\", text: $passedData)\n    Spacer()\n\
    \    }\n    Spacer()\n    }.background(Color.orange)\n    }\n    }\n    struct\
    \ SeparateFileView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    SeparateFileView(passedData: .constant(\"\"))\n    }\n    }\n  \
    \  ```\n\nNotice that this structure declares a `@Binding` variable called `passedData`\
    \ that can hold a `String`. The `TextField` can change this variable (`$passedData`)\
    \ and automatically send the changes back to the `ContentView` structure.\n\n\
    Also note that because this structure is stored in a separate file, the `PreviewProvider`\
    \ structure must also include the `passedData` parameter by giving it a `.constant(\"\
    \")`.\n\n11.  Click the `ContentView` file in the Navigator pane.\n\n12.  Click\
    \ the `Live` icon in the Canvas pane.\n\n13.  Click in the `TextField` and type\
    \ a phrase.\n\n14.  Click the `\"Send a message\"` navigation link that passes\
    \ the string to the `FileView` structure stored in the `ContentView` file.\n\n\
    15.  Click in the `TextField` displayed by the `FileView` structure and edit the\
    \ data. Then click the `Back` button to return to the `ContentView` structure\
    \ that displays the modified data.\n\n16.  Click the `\"Separate file\"` navigation\
    \ link that passes the string to the `SeparateFileView` structure stored in a\
    \ separate file.\n\n17.  Click in the `TextField` displayed by the `SeparateFileView`\
    \ structure and edit the data. Then click the `Back` button to return to the `ContentView`\
    \ structure that displays the modified data."
