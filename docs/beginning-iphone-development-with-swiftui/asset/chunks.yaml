  trans: "\n# 为列表交替显示颜色\n\n当`List`（列表）内容较长时，浏览起来可能不太方便。虽然用线条（有无颜色均可）分隔列表中的项目可以让列表更易读，但另一种方法是像图\
    \ 13-5 所示，在列表行中使用交替颜色。\n\n![](img/329781_7_En_13_Fig5_HTML.png)\n\n一个单列表格表示一个单词列表，包含猫、狗、乌龟、雪貂、鹦鹉、金鱼、蜥蜴、金丝雀、狼蛛和仓鼠，并交替使用两种高亮颜色。\n\
    \n**图 13-5** 交替颜色可以使列表更易读\n\nSwiftUI 允许你这样定义颜色：\n\n```\nColor.green\n```\n\n颜色的一个问题在于它们可能过于鲜艳，导致列表每行中的文本难以阅读。为了调整颜色的强度，我们可以添加一个\
    \ `.opacity` 修饰符来降低颜色的饱和度。值为 0 时颜色完全消失，值为 1 时颜色完全显示。因此，小于 1 的不透明度值会降低颜色的视觉效果，例如：\n\
    \n```\nColor.green.opacity(0.4)\n```\n\n如果用一个数组来填充列表，那么可以根据数组索引是奇数还是偶数来交替设置行的颜色。要判断数组索引（或任何数字）是否为偶数，可以使用\
    \ Swift 的模运算符（`%`）将该数字除以 2。如果余数为 0，则该数字是偶数；否则为奇数。\n\n因此，要定义列表中每一行的背景颜色，我们需要使用\
    \ `.background` 修饰符来识别数组索引的奇偶性，如下所示：\n\n```\n.background(index % 2 == 0 ? Color.green\
    \ : Color.yellow)\n```\n\n要了解如何让列表显示交替颜色，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS App\
    \ 项目，并为其任意命名，例如“ListAlternatingColors”。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在\
    \ `struct ContentView: View` 这行下方添加一个数组，如下所示：\n\n```\nvar myArray = [\"Cat\",\
    \ \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\"\
    , \"Tarantula\", \"Hamster\"]\n```\n\n4. 在 `var body: some View` 这行下方的 `VStack`\
    \ 内添加一个 `List`（列表），如下所示：\n\n```\nvar body: some View {\n    VStack {\n       \
    \ List {\n        }\n    }\n}\n```\n\n5. 在 `List` 内部添加一个 `ForEach` 循环，以遍历从 0 到数组元素总数减\
    \ 1 的所有数组项，如下所示：\n\n```\nvar body: some View {\n    VStack {\n        List {\n\
    \            ForEach(0...myArray.count - 1, id: \\.self) { index in\n        \
    \        Text(myArray[index])\n            }\n        }\n    }\n}\n```\n\n如果我们只是在\
    \ `ForEach` 循环内的 `Text` 视图上添加背景颜色，那么仅仅高亮显示 `Text` 视图本身，而不是整个行。我们需要做的是将 `Text`\
    \ 视图嵌入到一个 `HStack` 中，然后添加一个 `Spacer()`，以将 `HStack` 的边界扩展到 iOS 屏幕的边缘。\n\n6. 将 `Text`\
    \ 视图嵌入到包含 `Spacer()` 的 `HStack` 中，如下所示：\n\n```\nvar body: some View {\n    VStack\
    \ {\n        List {\n            ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                HStack {\n                    Text(myArray[index])\n\
    \                    Spacer()\n                }\n            }\n        }\n \
    \   }\n}\n```\n\n现在我们可以为 `HStack` 添加背景颜色，这将同时包含 `Text` 视图和 `HStack` 的宽度（通过 `Spacer()`\
    \ 向右扩展）。\n\n7. 在定义 `HStack` 的最后那个花括号上添加背景修饰符，如下所示：\n\n```\nvar body: some View\
    \ {\n    VStack {\n        List {\n            ForEach(0...myArray.count - 1,\
    \ id: \\.self) { index in\n                HStack {\n                    Text(myArray[index])\n\
    \                    Spacer()\n                }.background(index % 2 == 0 ? Color.green.opacity(0.4)\
    \ : Color.yellow.opacity(0.4))\n            }\n        }\n    }\n}\n```\n\n你可以随意选择不同的颜色和不透明度值。请注意，如果数组索引是偶数，该行将显示为绿色；如果数组索引是奇数，则该行将显示为黄色。整个\
    \ `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n\
    \    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
    , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    var body: some View\
    \ {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    HStack {\n               \
    \         Text(myArray[index])\n                        Spacer()\n           \
    \         }.background(index % 2 == 0 ? Color.green.opacity(0.4) : Color.yellow.opacity(0.4))\n\
    \                }\n            }\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n8. 点击 Canvas 窗格中的 Live 图标。SwiftUI 会显示颜色和不透明度交替的行（参见图 13-5）。\n\
    \n# 为列表添加轻扫手势\n\n许多常见的应用程序，如邮件、信息和照片，都会在 `List` 中显示项目。通过这些列表，用户可以向左或向右轻扫，以显示可供选择的附加选项，如图\
    \ 13-6 所示。\n\n![](img/329781_7_En_13_Fig6_HTML.jpg)\n\n一张屏幕截图显示了包含 3 条消息的列表。中间的消息被轻扫，并在右端显示了附加选项，用于静音通知和删除消息。\n\
    \n**图 13-6** 在 `List` 上轻扫可以显示附加选项\n\n列表的两个常见操作是删除和移动项目。从 `List` 中删除项目通常是在用户从右向左轻扫后移除该项目。在\
    \ `List` 中移动项目则是指滑动手指将某个项目放置到列表中的新位置。\n"
- fmt: "### Deleting Items from a List\n\nThe most common shortcut in iOS for deleting\
    \ an item in a `List` involves a right-to-left swipe to reveal a **Delete** button.\
    \ As an alternative, the user can continue the right-to-left swipe to delete an\
    \ item without needing to tap the **Delete** button at all. Since this swipe-to-delete\
    \ gesture is often used, SwiftUI makes it easy to implement.\n\nThe first step\
    \ is to add the `.onDelete` modifier to the `ForEach` loop within a `List` like\
    \ this:\n\n```\nList {\n    ForEach(0...myArray.count - 1, id: \\.self) { index\
    \ in\n    }.onDelete(perform: delete)\n}\n```\n\nThis calls a delete function\
    \ that uses the array name that contains the items displayed in a `List` (called\
    \ `myArray` in the following example) and calls the `remove` method like this:\n\
    \n```\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets: offsets)\n\
    }\n```\n\nTo see how to create a swipe-to-delete gesture in a `List`, follow these\
    \ steps:\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig7_HTML.jpg)\n\n\
    A screenshot denotes the word ferret at the top and goldfish at the bottom. There\
    \ is a delete button between the words, which is placed towards the right.\n\n\
    **Figure 13-7** – The **Delete** button created by the `.onDelete` modifier\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “ListDelete.”\n2.  Click the `ContentView` file in the Navigator pane.\n3. \
    \ Add a `@State` variable array under the `struct ContentView` line like this:\n\
    \n    ```\n    @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\"\
    , \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"\
    ]\n    ```\n\n    The exact strings you type don’t matter just as long as you\
    \ type several strings to fill the array.\n\n4.  Add a `List` under the `var body:\
    \ some View` line like this:\n\n    ```\n    var body: some View {\n        List\
    \ {\n        }\n    }\n    ```\n\n5.  Add a `ForEach` loop inside this `List`\
    \ to count from 0 to the total number of items in the array – 1. Then display\
    \ the array item in a `Text` view like this:\n\n    ```\n    var body: some View\
    \ {\n        List {\n            ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                Text(myArray[index])\n            }\n        }\n \
    \   }\n    ```\n\n6.  Add the `.onDelete` modifier to the `ForEach` loop to call\
    \ a function called `delete` like this:\n\n    ```\n    var body: some View {\n\
    \        List {\n            ForEach(0...myArray.count - 1, id: \\.self) { index\
    \ in\n                Text(myArray[index])\n            }.onDelete(perform: delete)\n\
    \        }\n    }\n    ```\n\n7.  Add the following function above the last curly\
    \ bracket in the `struct ContentView: View` like this:\n\n    ```\n    func delete(at\
    \ offsets: IndexSet) {\n        myArray.remove(atOffsets: offsets)\n    }\n  \
    \  ```\n\n    The entire `ContentView` file should look like this:\n\n    ```\n\
    \    import SwiftUI\n    struct ContentView: View {\n        @State var myArray\
    \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n        var body: some View {\n   \
    \         List {\n                ForEach(0...myArray.count - 1, id: \\.self)\
    \ { index in\n                    Text(myArray[index])\n                }.onDelete(perform:\
    \ delete)\n            }\n        }\n        func delete(at offsets: IndexSet)\
    \ {\n            myArray.remove(atOffsets: offsets)\n        }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n        static var previews: some View\
    \ {\n            ContentView()\n        }\n    }\n    ```\n\n8.  Click the **Live**\
    \ icon in the Canvas pane.\n9.  Swipe right to left on any item in the `List`.\
    \ Notice that the `.onDelete` modifier automatically displays the **Delete** button\
    \ as shown in Figure [13-7](#329781_7_En_13_Chapter.xhtml#Fig7).\n10. Tap the\
    \ **Delete** button. Notice that the row containing that item disappears.\n\n\
    ### Moving Items in a List\n\nAnother common way to use lists is to rearrange\
    \ or move items within a `List`. In iOS, this is usually a two-step process. First,\
    \ you must edit the `List` to display three-horizontal line icons to the right\
    \ of each item in the `List`. Second, you slide a `List` item using the three-horizontal\
    \ line icon to place that item in a new location as shown in Figure [13-8](#329781_7_En_13_Chapter.xhtml#Fig8).\n\
    \n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig8_HTML.jpg)\n\nA screenshot\
    \ exhibits a list of words consisting of 3 horizontal lines on their sides. The\
    \ lines are denoted as the move icon.\n\n**Figure 13-8** – Move icons appear to\
    \ the right of items in a `List`\n\nThe first step is to add the `.onMove` modifier\
    \ to the `ForEach` loop within a `List` like this:\n\n```\nForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n}.onMove(perform: move)\n```\n\nThis calls a move\
    \ function that uses the array name that contains the items displayed in a `List`\
    \ (called `myArray` in the following example) and calls the `move` method like\
    \ this:\n\n```\nfunc move(from source: IndexSet, to destination: Int) {\n    myArray.move(fromOffsets:\
    \ source, toOffset: destination)\n}\n```\n\nTo see how to display move icons in\
    \ a `List`, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as “ListMove.”\n2.  Click the `ContentView` file\
    \ in the Navigator pane.\n3.  Add a `@State` variable array under the `struct\
    \ ContentView` line like this:\n\n    ```\n    @State var myArray = [\"Cat\",\
    \ \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\"\
    , \"Tarantula\", \"Hamster\"]\n    ```\n\n    The exact strings you type don’t\
    \ matter just as long as you type several strings to fill the array.\n\n4.  Add\
    \ a `NavigationView` under the `var body: some View` line like this:\n\n    ```\n\
    \    var body: some View {\n        NavigationView {\n        }\n    }\n    ```\n\
    \n    The `NavigationView` is necessary to display an **Edit** button in the upper-right\
    \ corner of the screen.\n\n5.  Add a `List` inside the `NavigationView` like this:\n\
    \n    ```\n    var body: some View {\n        NavigationView {\n            List\
    \ {\n            }\n        }\n    }\n    ```\n\n6.  Add a `ForEach` loop inside\
    \ this `List` to count from 0 to the total number of items in the array – 1. Then\
    \ display the array item in a `Text` view like this:\n\n    ```\n    var body:\
    \ some View {\n        NavigationView {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }\n            }\n        }\n    }\n    ```\n\n7.  Add the `.toolbar`\
    \ modifier to the `List` like this:\n\n    ```\n    var body: some View {\n  \
    \      NavigationView {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }\n            }.toolbar {\n                EditButton()\n     \
    \       }\n        }\n    }\n    ```\n\n    This `.toolbar { EditButton() }` code\
    \ adds an **Edit** button in the upper-right corner of the `NavigationView`.\n\
    \n8.  Add the `.onMove` modifier to the `ForEach` loop to call a function called\
    \ `move` like this:\n\n    ```\n    var body: some View {\n        NavigationView\
    \ {\n            List {\n                ForEach(0...myArray.count - 1, id: \\\
    .self) { index in\n                    Text(myArray[index])\n                }.onMove(perform:\
    \ move)\n            }.toolbar {\n                EditButton()\n            }\n\
    \        }\n    }\n    ```\n\n9.  Add the following function above the last curly\
    \ bracket in the `struct ContentView: View` like this:\n\n    ```\n    func move(from\
    \ source: IndexSet, to destination: Int) {\n        myArray.move(fromOffsets:\
    \ source, toOffset: destination)\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\"\
    , \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"\
    ]\n        var body: some View {\n            NavigationView {\n             \
    \   List {\n                    ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                        Text(myArray[index])\n                   \
    \ }.onMove(perform: move)\n                }.toolbar {\n                    EditButton()\n\
    \                }\n            }\n        }\n        func move(from source: IndexSet,\
    \ to destination: Int) {\n            myArray.move(fromOffsets: source, toOffset:\
    \ destination)\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```"
