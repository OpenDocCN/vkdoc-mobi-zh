    \ file in the Navigator pane.\n3. Add a `State` variable under the `struct ContentView:\
    \ View` line like this:\n\n```\n@State private var start = false\n```\n\n4. Add\
    \ a `VStack` in the `var body: some View`.\n5. Add a `Button` inside the `VStack`\
    \ like this:\n\n```\nvar body: some View {\n    VStack {\n        Button(\"Start\
    \ animation\") {\n            start.toggle()\n        }\n```\n\n6. Add an `HStack`\
    \ with four `Text` views underneath the `Button` like this:\n\n```\nHStack {\n\
    \    Text(\"easeIn\")\n        .offset(x: 0, y: start ? 450 : 0)\n        .animation(.easeIn,\
    \ value: start)\n    Text(\"easeOut\")\n        .offset(x: 0, y: start ? 450 :\
    \ 0)\n        .animation(.easeOut, value: start)\n    Text(\"easeInOut\")\n  \
    \      .offset(x: 0, y: start ? 450 : 0)\n        .animation(.easeInOut, value:\
    \ start)\n    Text(\"linear\")\n        .offset(x: 0, y: start ? 450 : 0)\n  \
    \      .animation(.linear, value: start)\n}.position(x: 150, y: 10)\n```\n\nNotice\
    \ that the `.position` modifier initially places the entire `HStack` and all four\
    \ `Text` views near the top of the screen. The entire `ContentView` file should\
    \ look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State\
    \ private var start = false\n    var body: some View {\n        VStack {\n   \
    \         Button(\"Start animation\") {\n                start.toggle()\n    \
    \        }\n            HStack {\n                Text(\"easeIn\")\n         \
    \           .offset(x: 0, y: start ? 450 : 0)\n                    .animation(.easeIn,\
    \ value: start)\n                Text(\"easeOut\")\n                    .offset(x:\
    \ 0, y: start ? 450 : 0)\n                    .animation(.easeOut, value: start)\n\
