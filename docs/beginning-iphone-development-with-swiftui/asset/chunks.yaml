    \ 33),\n    .init(name: \"Lundy\",sales: 43)\n    ]\n    struct ContentView: View\
    \ {\n    var body: some View {\n    VStack {\n    Chart (mySalesArray) { x in\n\
    \    AreaMark(x: .value(\"Name\", x.name),\n    y: .value(\"Sales\", x.sales))\n\
    \    }\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n5.  在画布面板中点击“Live”图标。\n\n```\nimport Charts\n```\n\n## 创建点图\n\n点图与折线图和面积图类似。主要区别在于，点图仅将数据显示为图表上的点。虽然这可能使得识别趋势比折线图或面积图更困难，但点图在识别数据组出现的位置时特别有用。一旦你知道数据通常应该出现在哪里，点图就能轻松识别出超出此正常范围的数据，如图\
