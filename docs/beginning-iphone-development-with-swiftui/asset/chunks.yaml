    *《夺宝奇兵》*，派拉蒙。4. *《玩具总动员》*，博伟影业。5. *《敦刻尔克》*，华纳兄弟。


    图 19-7


    `Grid`和`GridRow`可以创建表格


    要创建表格，你必须首先像这样定义一个网格：


    ```swift

    var body: some View {

    Grid() {

    }

    ```


    然后在`Grid()`内部，定义多个`GridRow`。在每个`GridRow`内部，为你想要创建的每一列定义一个单独的视图。因此，如果你想创建一行分成两列，`GridRow`可能由两个`Text`视图组成，如下所示：


    ```swift

    GridRow {

    Text("The Martian")

    Text("20th Century")

    }

    ```


