    \   ```\n\n    The preceding code creates a Form with four different Sections\
    \ as shown in Figure [14-4](#329781_7_En_14_Chapter.xhtml#Fig4)."
  trans: "\n# 14. 使用表单和分组框\n\n在填写纸质表单时，你可能会注意到纸质表单会将相关项分组在一起。例如，表单可能会在某个区域要求你填写姓名、地址和电话号码，而在另一个区域则要求你填写性别、种族背景和婚姻状况。纸质表单能让你轻松地在同一区域输入相关数据。\n\
    \nSwiftUI 的 `Form` 的工作原理类似，它将提供用户可选选项和设置的关联视图分组在一起。表单由可选的头部、尾部以及内部由 `Text`、`Slider`\
    \ 或 `Toggle` 等视图定义的内容组成，如图 14-1 所示。\n\n![](img/329781_7_En_14_Fig1_HTML.jpg)\n\
    \n一组两张截图。左侧显示了一段代码片段，用于定义节标题的名称和切换开关的设置。右侧显示了代码在用户界面中渲染后的输出结果。\n\n图 14-1\n\n`Form`\
    \ 的典型组成部分\n\n`Form` 像堆栈一样将相关视图分组在一起。区别在于，`Form` 还会在用户界面上将视图进行视觉上的分组。`Form` 内的所有视图会一起显示，而任何不在\
    \ `Form` 内的视图则会通过灰色区域分隔开，如图 14-2 所示。\n\n![](img/329781_7_En_14_Fig2_HTML.jpg)\n\
    \n一个图示展示了一段代码片段，用于显示在表单内和表单外的文本。右侧显示了代码渲染后的输出，其中上方的文本位于表单内部，下方的文本位于表单外部。\n\n图\
    \ 14-2\n\n`Form` 在用户界面上将视图分组在一起\n\n与表单类似的是分组框，它提供了一种更简单的方法来在用户界面上将相关视图进行视觉分组。当你需要将视图分组时，可以在\
    \ `Form` 和 `GroupBox` 之间进行选择。\n\n## 创建简单的表单\n\n最简单的 `Form` 只是将一个或多个视图分组在一起。要创建一个\
    \ `Form`，你只需这样做：\n\n```\nForm {\n    //\n}\n```\n\n要了解如何创建简单的 `Form`，请遵循以下步骤：\n\
    \n![](img/329781_7_En_14_Fig3_HTML.jpg)\n\n一组两张截图，每张各显示一个矩形文本框。上面的文本框显示“这是第一个表单”。下面的文本框显示“这是第二个表单”。\n\
    \n图 14-3\n\n用户界面上显示两个表单\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如“SimpleForm”。\n\
    2. 在导航面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 代码行下方，添加两个 `State`\
    \ 变量，如下所示：\n\n    ```\n    @State var messageOne = \"\"\n    @State var messageTwo\
    \ = \"\"\n    ```\n\n4. 在 `VStack` 内部添加两个 `Form` 和两个 `Text` 视图，如下所示：\n\n    ```\n\
    \    var body: some View {\n        VStack {\n            Form {\n           \
    \     Text(\"This is the first Form\")\n                TextField(\"Type here\"\
    , text: $messageOne)\n            }\n            Form {\n                Text(\"\
    This is the second Form\")\n                TextField(\"Type here\", text: $messageTwo)\n\
    \            }\n            Text(\"Form #1 = \\(messageOne)\")\n            Text(\"\
    Form #2 = \\(messageTwo)\")\n        }\n    }\n    ```\n\n    完整的 `ContentView`\
    \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    \n    struct ContentView: View\
    \ {\n        @State var messageOne = \"\"\n        @State var messageTwo = \"\"\
    \n        \n        var body: some View {\n            VStack {\n            \
    \    Form {\n                    Text(\"This is the first Form\")\n          \
    \          TextField(\"Type here\", text: $messageOne)\n                }\n  \
    \              Form {\n                    Text(\"This is the second Form\")\n\
    \                    TextField(\"Type here\", text: $messageTwo)\n           \
    \     }\n                Text(\"Form #1 = \\(messageOne)\")\n                Text(\"\
    Form #2 = \\(messageTwo)\")\n            }\n        }\n    }\n    \n    struct\
    \ ContentView_Previews: PreviewProvider {\n        static var previews: some View\
    \ {\n            ContentView()\n        }\n    }\n    ```\n\n    这段代码创建了一个用户界面，在屏幕上显示两个表单，以及两个不属于任何表单的\
    \ `Text` 视图，如图 14-3 所示。\n\n5. 点击画布面板中的 Live 图标。\n6. 点击顶部的 `TextField` 并输入一些文本。请注意，此文本现在会出现在屏幕底部的\
    \ `Text` 视图（“Form #1 =”）中。\n7. 点击中间的 `TextField` 并输入一些文本。请注意，此文本现在会出现在屏幕底部的 `Text`\
    \ 视图（“Form #2 =”）中。\n\n## 将表单划分为多个分区\n\n一个 `Form` 可以包含一个或多个视图。然而，`Form` 中的视图越多，所有视图就会显得越拥挤。为了将相关视图分组，你可以将\
    \ `Form` 划分为多个分区（Section），每个 `Section` 可以包含一个或多个要在屏幕上显示的视图。此外，分区还可以显示可选的头部和/或尾部。\n\
    \n最简单的 `Section` 只是将相关视图分组在一起，如下所示：\n\n```\nSection {\n    // 在此处添加视图\n}\n```\n\
    \n尽管 `Section` 在用户界面上看起来是截然不同的，但你还可以通过使用头部和/或尾部来进一步区分 `Section`。如果你只想定义一个头部，可以使用如下代码：\n\
    \n```\nSection(\"Header text here\") {\n    // 在此处添加视图\n}\n```\n\n这种方法会自动将文本显示为大写，即使你不是以这种方式输入的。另一种定义头部的方法如下所示：\n\
    \n```\nSection(content: {\n    // 在此处添加视图\n}, header: {\n    // 在此处定义头部文本\n})\n\
    ```\n\n你也可以使用此方法仅定义一个尾部，如下所示：\n\n```\nSection(content: {\n    // 在此处添加视图\n}, footer:\
    \ {\n    // 在此处定义尾部文本\n})\n```\n\n> 注意：尾部中的文本会按照你输入的原样显示，这与自动将所有文本显示为大写的头部不同。\n\
    \n如果你想同时定义头部和尾部，可以使用以下代码：\n\n```\nSection {\n    // 在此处添加视图\n} header: {\n   \
    \ // 在此处定义头部文本\n} footer: {\n    // 在此处定义尾部文本\n}\n```\n\n要了解如何在分区中创建头部和尾部，请遵循以下步骤：\n\
    \n![](img/329781_7_En_14_Fig4_HTML.jpg)\n\n一张截图显示了一个矩形分区，从上到下排列着四个文本框。这些文本框分别表示：无头部分区、简单头部分区、简单尾部分区以及同时包含头部和尾部的分区。\n\
    \n图 14-4\n\n显示 `Section` 的四种不同方式\n\n1. 新建一个 SwiftUI iOS App 项目，并为其任意命名，例如“HeaderFormSections”。\n\
    2. 在导航面板中点击 `ContentView` 文件。\n3. 在 `var body: some View` 内部添加一个 `Form`，如下所示：\n\
    \n    ```\n    var body: some View {\n        Form {\n        }\n    }\n    ```\n\
    \n4. 在 `Form` 内部添加四个以不同方式定义的 `Section`，如下所示：\n\n    ```\n    var body: some View\
    \ {\n        Form {\n            Section {\n                Text(\"This Section\
    \ has no header\")\n            }\n            Section(\"Just a Header\") {\n\
    \                Text(\"This Section uses a simple header\")\n            }\n\
    \            Section {\n                Text(\"This Section uses a simple footer\"\
    )\n            } footer: {\n                Text(\"Just a Footer\")\n        \
    \    }\n            Section {\n                Text(\"This Section uses both a\
    \ header and footer\")\n            } header: {\n                Text(\"The header\"\
    )\n            } footer: {\n                Text(\"The footer\")\n           \
    \ }\n        }\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n\
    \    import SwiftUI\n    \n    struct ContentView: View {\n        var body: some\
    \ View {\n            Form {\n                Section {\n                    Text(\"\
    This Section has no header\")\n                }\n                Section(\"Just\
    \ a Header\") {\n                    Text(\"This Section uses a simple header\"\
    )\n                }\n                Section {\n                    Text(\"This\
    \ Section uses a simple footer\")\n                } footer: {\n             \
    \       Text(\"Just a Footer\")\n                }\n                Section {\n\
    \                    Text(\"This Section uses both a header and footer\")\n  \
    \              } header: {\n                    Text(\"The header\")\n       \
    \         } footer: {\n                    Text(\"The footer\")\n            \
    \    }\n            }\n        }\n    }\n    \n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n    上述代码创建了一个包含四个不同 `Section` 的 `Form`，如图 14-4 所示。\n"
- fmt: "# Disabling Views in a Form\n\nOften times a paper form might ask a series\
    \ of questions. Based on your answer, another group of questions may not be relevant.\
    \ For example, if a paper form asks if you’re married or single, you might answer\
    \ “married.” In this case another part of the paper form might ask about your\
    \ spouse’s name and contact information.\n\nHowever, if you answer “single,” there’s\
    \ no point in answering any additional questions about a spouse. With SwiftUI\
    \ forms, you can selectively disable views within a `Form` based on a Boolean\
    \ value by using the `.disabled` modifier like this:\n\n```\n.disabled(flag)\n\
    ```\n\nIf the value of the Boolean variable is `true`, then the `.disabled` modifier\
    \ prevents the user from interacting with the selected view. If the Boolean variable\
    \ is `false`, then the `.disabled` modifier allows the user to interact with the\
    \ selected view.\n\nTo see how to use the `.disabled` modifier within a `Form`,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as “FormDisable.”\n2.  Click the `ContentView` file in\
    \ the Navigator pane.\n3.  Add the following `State` variable under the `struct\
    \ ContentView: View` line like this:\n\n    ```\n    @State var flag = false\n\
    \    ```\n\n4.  Add a `Form` inside the `var body: some View` like this:\n\n \
    \   ```\n    var body: some View {\n        Form {\n        }\n    }\n    ```\n\
    \n5.  Add a `Section` inside the `Form` to define a header and a footer like this:\n\
    \n    ```\n    var body: some View {\n        Form {\n            Section {\n\
    \            } header: {\n                Text(\"Header\")\n            } footer:\
    \ {\n                Text(\"Footer\")\n            }\n        }\n    }\n    ```\n\
    \n6.  Add a `Toggle` and a `Button` inside the `Section` like this:\n\n    ```\n\
    \    var body: some View {\n        Form {\n            Section {\n          \
    \      Toggle(isOn: $flag) {\n                    Text(\"Are you married?\")\n\
    \                }\n                Button(flag ? \"Disabled\" : \"Click Me\"\
    ) {\n                }.disabled(flag)\n            } header: {\n             \
    \   Text(\"Header\")\n            } footer: {\n                Text(\"Footer\"\
    )\n            }\n        }\n    }\n    ```\n\n    Notice that the `.disabled`\
    \ modifier affects the `Button`. If the `flag` Boolean variable is `true`, then\
    \ the `Button` will be disabled. If the `flag` Boolean variable is `false`, then\
    \ the `Button` will be enabled. The entire `ContentView` file should look like\
    \ this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n     \
    \   @State var flag = false\n        var body: some View {\n            Form {\n\
    \                Section {\n                    Toggle(isOn: $flag) {\n      \
    \                  Text(\"Are you married?\")\n                    }\n       \
    \             Button(flag ? \"Disabled\" : \"Click Me\") {\n                 \
    \   }.disabled(flag)\n                } header: {\n                    Text(\"\
    Header\")\n                } footer: {\n                    Text(\"Footer\")\n\
    \                }\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n7.  Click the Live icon in the Canvas pane. Notice\
    \ that the `Button` displays the title “Click Me” in blue.\n8.  Click the `Toggle`.\
    \ This changes the `flag` `State` variable from `false` to `true` (or `true` to\
    \ `false`). When the `flag` `State` variable equals `true`, then the `.disabled`\
    \ modifier grays out the `Button`, making it impossible for the user to select.\n\
    \n## Using Group Boxes\n\nGroup boxes offer a simpler way to organize related\
    \ views together. Although similar to a `Form`, a `Group Box` can display a label\
    \ and visually displays multiple views within a gray rectangle, while a `Form`\
    \ displays multiple views within a white rectangle as shown in Figure 14-5.\n\n\
    ![An illustration represents a snippet of code and its rendered output on a mobile\
    \ screen. It indicates the functions for displaying the form and group box from\
    \ the code. Each element comprises a button to click.](images/329781_7_En_14_Chapter/329781_7_En_14_Fig5_HTML.jpg)\n\
    \n**Figure 14-5** – The visual differences between a Form and a Group Box\n\n\
    To see how to use a `Group Box`, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “GroupBox.”\n2.  Click\
    \ the `ContentView` file in the Navigator pane.\n3.  Add the following `State`\
    \ variables under the `struct ContentView: View` line like this:\n\n    ```\n\
    \    struct ContentView: View {\n        @State var flag = true\n        @State\
    \ var message = \"\"\n    ```\n\n4.  Add a `GroupBox` inside the `var body: some\
    \ View` like this:\n\n    ```\n    var body: some View {\n        GroupBox(label:\
    \ Text(\"Group Box\")) {\n        }\n    }\n    ```\n\n5.  Add a `Toggle` and\
    \ a `TextField` inside the `GroupBox` like this:\n\n    ```\n    var body: some\
    \ View {\n        GroupBox(label: Text(\"Group Box\")) {\n            Toggle(isOn:\
    \ $flag) {\n                Text(\"Click me\")\n            }\n            TextField(\"\
    Type here\", text: $message)\n        }\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        @State var flag = true\n        @State var message = \"\"\n\
    \        var body: some View {\n            GroupBox(label: Text(\"Group Box\"\
    )) {\n                Toggle(isOn: $flag) {\n                    Text(\"Click\
    \ me\")\n                }\n                TextField(\"Type here\", text: $message)\n\
    \            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\nThe preceding code creates a `Group Box` as shown in\
    \ Figure 14-6.\n\n![A partial screenshot represents the title group box. It comprises\
    \ a toggle button labeled click me and a blank text box underneath.](images/329781_7_En_14_Chapter/329781_7_En_14_Fig6_HTML.jpg)\n\
    \n**Figure 14-6** – The appearance of a Group Box\n\n## Summary\n\n`Form`s let\
    \ you visually group related views together on the user interface. To further\
    \ differentiate views on a `Form`, you can divide a `Form` into multiple sections\
    \ where each `Section` lets you define an optional header and/or optional footer.\
    \ A `Section` can have a header, a footer, both a header and a footer, or nothing\
    \ at all.\n\nDepending on how the user responds to the user interface, you may\
    \ want to disable one or more views to prevent the user from interacting with\
    \ them. Disabling one or more views prevents the user from inputting unnecessary\
    \ data.\n\nBoth forms and group boxes are simply two different ways to group and\
    \ organize related views together to make your app’s user interface easier to\
    \ understand.\n\n# 15. Using Disclosure Groups, Scroll Views, and Outline Groups\n\
    \nMany apps contain lots of information such as names and addresses. However,\
    \ you may not want to view all stored information at once to avoid cluttering\
    \ up the screen. When you want to give users the option of selectively hiding\
    \ or displaying information, that’s when you can use a `Disclosure Group` or an\
    \ `Outline Group`.\n\nA `Disclosure Group` can appear in two states. First, it\
    \ can appear as a single line of text that represents a link. Second, when the\
    \ user taps this link, it expands to reveal one or more additional views as shown\
    \ in Figure 15-1.\n\n![A screenshot denotes the option labeled show software license\
    \ in collapsed state and expandable state. The expandable state represents the\
    \ details of the software license along with a button to agree on the terms.](images/329781_7_En_15_Chapter/329781_7_En_15_Fig1_HTML.jpg)\n\
    \n**Figure 15-1** – The two states of a Disclosure Group\n\nWhile a `Disclosure\
    \ Group` can selectively hide or show a group of related views, an `Outline Group`\
    \ can selectively hide or show groups of text within a `List` (see Chapter 13)\
    \ as shown in Figure 15-2.\n\n![A screenshot of a dropdown menu of Mammal listing\
    \ dog, cat, elephant, and whale. It indicates the Poodle, Collie, and Saint Bernard\
    \ breeds under the dog.](images/329781_7_En_15_Chapter/329781_7_En_15_Fig2_HTML.jpg)\n\
    \n**Figure 15-2** – The appearance of an Outline Group"
