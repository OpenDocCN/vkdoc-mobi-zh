    \ creating a Navigation Stack with a List, it’s often easier to use navigation\
    \ links to define the link and then use the .navigationDestination modifier to\
    \ define the destination view to display. Navigation stacks make it easy to display\
    \ successive screens of data."
  trans: "\n# 在导航栈中使用列表\n\n与其单独显示`NavigationLink`，一种常见技巧是创建一个`List`（参见第 13 章），其中`List`的每一项都充当链接。通过在`List`中选择一项，导航栈即可打开一个新视图。导航栈中嵌套列表的这种组合方式在\
    \ iOS 的“设置”应用中极为常见。\n\n在前面的项目中创建导航链接时，我们按照如下方式定义了链接上显示的文本以及要显示的目标视图：\n\n```\n\
    NavigationLink {\n    Text(\"目标视图\")\n} label: {\n    Text(\"链接上显示的文本\")\n}\n\
    ```\n\n然而，在处理列表时，将目标视图与导航链接分离开来会更方便。这样一来，导航链接只需定义其外观即可。为了定义目标视图，我们可以使用一个`navigationDestination`修饰符，该修饰符用于定义当用户选择导航链接时显示的内容。\n\
    \n要了解如何在`NavigationStack`中使用`List`，请按照以下步骤操作：\n\n![](img/329781_7_En_17_Fig5_HTML.jpg)\n\
    \n一段文字显示了一个书籍列表，其标题包括《华氏 451 度》、《火星纪事》、《邪恶降临》和《纹身人》。最后一项似乎由一个非英文字符表示。\n\n图 17-5\
    \ — 导航链接列表\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“NavigationStackList”。\n\
    \n2.  在导航器窗格中点击`ContentView`文件。\n\n3.  在`import SwiftUI`这一行下方添加如下结构体：\n\n```\n\
    struct Books: Identifiable, Hashable {\n    var id = UUID()\n    var title: String\n\
    \    var summary: String\n}\n```\n\n请注意，该结构体需要遵循`Identifiable`协议以创建唯一 ID，并且必须遵循`Hashable`协议，以便能用在与`.navigationDestination`修饰符配合使用的位置，该修饰符将定义用户选择导航链接后打开的视图。\n\
    \n4.  在`struct ContentView: View`这一行下方添加一个结构体数组，如下所示：\n\n```\nlet books: [Books]\
    \ = [\n    Books(title: \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"),\n    Books(title:\
    \ \"火星纪事\", summary: \"关于火星殖民的故事\"),\n    Books(title: \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"\
    ),\n    Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\")\n]\n```\n\n5.  在`struct\
    \ ContentView_Previews: PreviewProvider`这一行上方添加如下结构体：\n\n```\nstruct BookView:\
    \ View {\n    var bookInfo: Books\n    var body: some View {\n        VStack (spacing:\
    \ 24) {\n            Text(\"\\(bookInfo.title)\")\n                .font(.largeTitle)\n\
    \            Text(\"\\(bookInfo.summary)\")\n                .font(.body)\n  \
    \      }\n    }\n}\n```\n\n此结构体定义了用户在点击导航链接后显示的视图（用户界面）。它需要从之前定义的`Books`结构体中检索数据。然后，它获取`title`和`summary`，并在`VStack`内的两个`Text`视图中显示。\n\
    \n6.  在`var body: some View`内部添加一个`NavigationStack`、`List`和`NavigationLink`，如下所示：\n\
    \n```\nvar body: some View {\n    NavigationStack {\n        List(books) { book\
    \ in\n            NavigationLink(\"\\(book.title)\", value: book)\n        }.navigationTitle(Text(\"\
    书籍列表\"))\n        .navigationDestination(for: Books.self) { x in\n           \
    \ BookView(bookInfo: x)\n        }\n    }\n}\n```\n\n`List`获取`books`数组。然后，它创建了一个任意命名的变量“book”，用于将`book.title`显示为导航链接。请注意，导航链接还定义了一个值（`book`），该值对于显示的每个导航链接都是唯一的。\n\
    \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\nstruct Books: Identifiable,\
    \ Hashable {\n    var id = UUID()\n    var title: String\n    var summary: String\n\
    }\nstruct ContentView: View {\n    let books: [Books] = [\n        Books(title:\
    \ \"华氏 451 度\", summary: \"关于焚书的反乌托邦小说\"),\n        Books(title: \"火星纪事\", summary:\
    \ \"关于火星殖民的故事\"),\n        Books(title: \"邪恶降临\", summary: \"一个邪恶的马戏团来到小镇\"),\n\
    \        Books(title: \"纹身人\", summary: \"围绕一个纹身男子展开的短篇故事集\")\n    ]\n    var\
    \ body: some View {\n        NavigationStack {\n            List(books) { book\
    \ in\n                NavigationLink(\"\\(book.title)\", value: book)\n      \
    \      }.navigationTitle(Text(\"书籍列表\"))\n            .navigationDestination(for:\
    \ Books.self) { x in\n                BookView(bookInfo: x)\n            }\n \
    \       }\n    }\n}\nstruct BookView: View {\n    var bookInfo: Books\n    var\
    \ body: some View {\n        VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\"\
    )\n                .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\"\
    )\n                .font(.body)\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n7.  点击画布窗格中的“Live”图标。注意，`List`将书籍标题显示为导航链接，如图 17-5 所示。\n\n![](img/329781_7_En_17_Fig6_HTML.jpg)\n\
    \n一个屏幕显示了一个书籍列表，其中包括《火星纪事》，其内容是关于火星殖民的故事。\n\n图 17-6 — 选择导航链接后出现的用户界面\n\n1.  点击任意书籍标题（导航链接）。由结构体`BookView`定义的用户界面将出现，并在左上角显示一个“返回”按钮，如图\
    \ 17-6 所示。\n\n列表可以成为在导航栈内创建导航链接的一种便捷方式。由于列表通常依赖数组来提供数据，因此你可能需要创建一个结构体来存储在数组中。\n\
    \n## 总结\n\n导航栈是显示多个视图的便捷工具。一个结构体定义一个导航栈，其中包含一个或多个`NavigationLink`。这些`NavigationLink`打开的视图可以像`Text`或`Image`视图那样简单，但更常见的是由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\
    \n`NavigationLink`可以将数据传递给另一个视图，很像将数据传递给函数。另一个视图需要定义一个属性，然后`NavigationLink`就可以将数据传递给该属性。如果要将数据传递给另一个可以修改数据的视图，可以使用两种不同的方法。\n\
    \n第一种方法使用`@State`和`@Binding`变量，强制`NavigationLink`将数据传递给它打开的每个视图。第二种方法使用`ObservableObject`、`StateObject`和`EnvironmentObject`在多个视图之间共享数据。\n\
    \n导航栈通常与列表一起使用。通过点击`List`中的某个项目，用户可以跳转到新视图。列表通常检索存储在数组中的数据。该数组可以存储像字符串这样的单个数据类型，但更常见的是数组存储结构体以将相关数据分组到一起。`List`中的项目可以自然地创建指向另一个视图的导航链接，例如\
    \ iOS 的“设置”应用中的项目。\n\n当使用`List`创建导航栈时，使用导航链接来定义链接，然后使用`.navigationDestination`修饰符来定义要显示的目标视图，通常会更简单。导航栈使得连续显示数据屏幕变得容易。\n"
- fmt: "# 18. Using the Tab View\n\nMost apps consist of multiple screens. Chapter\
    \ [17](#329781_7_En_17_Chapter.xhtml) explained how to create apps that use a\
    \ Navigation Stack that lets users jump from one screen to another in sequential\
    \ order. This can be handy for showing more details such as the Settings app in\
    \ iOS that lets you pick various options and then view multiple screens to choose\
    \ different settings.\n\nHowever, one problem with the Navigation Stack is that\
    \ if you link too many screens together, navigation becomes cumbersome since you\
    \ must navigate from the first screen to the second to the third just to get to\
    \ the fourth screen. Then you have to reverse the entire process to get back from\
    \ the fourth screen to the first screen.\n\nTo provide an alternate way of jumping\
    \ from one screen to another, you can use the Tab View, which displays icons and/or\
    \ text at the bottom of the screen. Selecting a tab (icon and/or text) then jumps\
    \ to a new screen. For example, the Clock app displays icons/text at the bottom\
    \ of the screen to let you jump to different features as shown in Figure [18-1](#329781_7_En_18_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig1_HTML.jpg)\n\nA mobile\
    \ screen displays a world clock displaying different timings in various countries,\
    \ including San Diego, Detroit, Lagos, and Beijing. It includes labeled tabs for\
    \ the alarm and timer icons.\n\nFigure 18-1\n\nA Tab View makes it easy to jump\
    \ from one screen to another\n\nSince the tab bar appears at the bottom of the\
    \ screen no matter which screen you’re viewing, tab views make it easy to jump\
    \ to the screen you want to see at any time.\n\n## Using a Tab View\n\nA Tab View\
    \ contains multiple views using code like this:\n\n```\nTabView {\n// Put multiple\
    \ views here\n}\n```\n\nEach view stored within a Tab View can be as simple as\
    \ an individual view (such as a `Text` or `Image` view) or more detailed such\
    \ as a structure that defines a view. The first part of creating a Tab View is\
    \ simply listing all the views you want to use within the Tab View like this:\n\
    \n```\nTabView {\nText(\"One\")\nText(\"Two\")\nText(\"Three\")\nText(\"Four\"\
    )\n}\n```\n\nAfter you’ve defined the views to display within a Tab View, the\
    \ next step is to define an icon and/or text to represent each view. To do this,\
    \ add a `.tabItem` modifier to each view that uses an `Image` and a `Text` view\
    \ like this:\n\n```\nText(\"One\")\n.tabItem {\nImage(systemName: \"heart.fill\"\
    )\nText(\"Tab1\")\n}\n```\n\nBy attaching a `.tabItem` modifier to each view and\
    \ using an `Image` and a `Text` view to define its contents, you can create a\
    \ tab bar that appears at the bottom of the screen as shown in Figure [18-2](#329781_7_En_18_Chapter.xhtml#Fig2).\n\
    \n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig2_HTML.jpg)\n\nA snippet\
    \ of four icons of tab 1, tab 2, tab 3, and tab 4. Tab 1, heart symbol. Tab 2,\
    \ rabbit. Tab 3, tortoise. Tab 4, folder.\n\nFigure 18-2\n\nA typical tab bar\
    \ displays icons and text\n\nThe `Image` view can display any image but typically\
    \ displays an icon that you can view inside of the SF Symbols app ([`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)).\n\
    \n> **Note**  \n> Tabs can appear as an image and text, just an image, or just\
    \ text. For clarity, it’s usually best to define a tab as both an image and text.\n\
    \nTo see how to create a simple Tab View, follow these steps:\n\n1. Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as `\"TabViewSimple\"\
    `.\n2. Click the `ContentView` file in the Navigator pane.\n3. Add the following\
    \ views inside the `var body: some View` like this:\n\n```\n    var body: some\
    \ View {\n    TabView {\n    Text(\"One\")\n    Text(\"Two\")\n    Text(\"Three\"\
    )\n    Text(\"Four\")\n    }\n    }\n```\n\nTo create a tab bar at the bottom\
    \ of the screen, we need to add the `.tabItem` modifier that uses an `Image` and\
    \ a `Text` view.\n\n4. Add the following `.tabItem` modifiers to each view like\
    \ this:\n\n```\n    var body: some View {\n    TabView {\n    Text(\"One\")\n\
    \    .tabItem {\n    Image(systemName: \"heart.fill\")\n    Text(\"One\")\n  \
    \  }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n\
    \    Text(\"Two\")\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
    \ \"tortoise.fill\")\n    Text(\"Three\")\n    }\n    Text(\"Four\")\n    .tabItem\
    \ {\n    Image(systemName: \"folder.fill\")\n    Text(\"Four\")\n    }\n    }\n\
    \    }\n```\n\nFeel free to use different SF Symbol icons and text to customize\
    \ the buttons in the tab bar at the bottom of the screen. Rather than use a combination\
    \ of an `Image` and a `Text` view, you can also use a single `Label` view like\
    \ this:\n\n1. Click the Live icon in the Canvas pane.\n2. Click the different\
    \ tabs at the bottom of the screen to see the different views.\n\n```\nLabel(\"\
    Four\", systemImage: \"folder.fill\")\n```\n\n> **Note**  \n> Since a Tab View\
    \ represents each view as an icon/text, tab views can only display a maximum of\
    \ five (5) items at the bottom of the screen. If you store more than five views\
    \ in a Tab View, the Tab View automatically creates a `More` icon that hides any\
    \ additional views in a second tab bar.\n\nTo see how a Tab View automatically\
    \ creates a `More` button in the tab bar if you display more than five views in\
    \ the Tab View, follow these steps:\n\n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig3_HTML.jpg)\n\
    \nA snippet of four icons of one, two, three, and four. The more icon on the right\
    \ is highlighted. 1, heart symbol. 2, rabbit. 3, tortoise. 4, folder. More, three\
    \ dots.\n\nFigure 18-3\n\nThe `More` icon automatically appears when a Tab View\
    \ contains more than five tabs\n\n1. Open the previous Xcode project (`\"TabViewSimple\"\
    `) that you created earlier.\n2. Edit the `ContentView` file so the entire code\
    \ looks like this:\n\n```\n    import SwiftUI\n    struct ContentView: View {\n\
    \    var body: some View {\n    TabView {\n    Text(\"One\")\n    .tabItem {\n\
    \    Image(systemName: \"heart.fill\")\n    Text(\"One\")\n    }\n    Text(\"\
    Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"Two\"\
    )\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName: \"tortoise.fill\"\
    )\n    Text(\"Three\")\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName:\
    \ \"folder.fill\")\n    Text(\"Four\")\n    }\n    Text(\"Five\")\n    .tabItem\
    \ {\n    Image(systemName: \"internaldrive.fill\")\n    Text(\"Five\")\n    }\n\
    \    Text(\"Six\")\n    .tabItem {\n    Image(systemName: \"cloud.drizzle.fill\"\
    )\n    Text(\"Six\")\n    }\n    }.accentColor(.purple)\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n```\n\nNotice that the `.accentColor` modifier\
    \ on the Tab View lets you define a color for the tab bar.\n\n3. Click the Live\
    \ icon in the Canvas pane. The tab bar appears, but now a `More` icon appears\
    \ on the far right as shown in Figure [18-3](#329781_7_En_18_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig4_HTML.jpg)\n\nA mobile\
    \ screen displays more tabs with five and six tabs. At the bottom, there are four\
    \ icons of one, two, three, and four. The more icon on the right is highlighted.\
    \ 1, heart symbol. 2, rabbit. 3, tortoise. 4, folder. More, three dots.\n\nFigure\
    \ 18-4\n\nThe `More` icon displays a Navigation Stack\n\n4. Click the `More` icon.\
    \ Notice that a Navigation Stack appears, listing your additional tabs in a list\
    \ as shown in Figure [18-4](#329781_7_En_18_Chapter.xhtml#Fig4).\n\n5. Click the\
    \ `Five` or `Six` item in the Navigation Stack to see that particular `Text` view.\n\
    \nBecause the tab bar can only show a maximum of five icons, it’s best to limit\
    \ the number of options to five or fewer."
