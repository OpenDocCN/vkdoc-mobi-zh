    Cancel\", role: .cancel, action: {\n    message = \"cancel\"\n    })\n    }, message:\
    \ {\n    Text(\"Please enter your username and password.\")\n    })\n    }\n \
    \   }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n6.  Click\
    \ the Live icon in the Canvas pane.\n\n7.  Click the Show Alert Button on the\
    \ user interface. A Login Alert appears as shown in Figure [12-5](#329781_7_En_12_Chapter.xhtml#Fig5).\n\
    \n1.  Click in the Username TextField and type a name.\n\n2.  Click in the Password\
    \ SecureField and type a password. Notice that the SecureField masks any characters\
    \ you type.\n\n3.  Click the Login Button. The user interface identifies that\
    \ you clicked the Login button and typed in a username and password.\n\n## Using\
    \ Contextual Menus\n\nA Contextual Menu can hide multiple options from the user\
    \ interface. Then it appears only after detecting a long press gesture on a view\
    \ such as a Text view. When the Contextual Menu lists options, the user can select\
    \ one.\n\nA Contextual Menu defines a list of Buttons where each Button displays\
    \ text and an action to perform if the user selects that Button. The action can\
    \ call a function or enclose Swift code within curly brackets like this:\n\n```\n\
    .contextMenu(menuItems: {\nButton(\"Red\", action: {\nmyColor = Color.red\n})\n\
    Button(\"Purple\", action: purple)\nButton(\"Green\", action: green)\nButton(\"\
    Orange\", action: orange)\n})\n```\n\nIn this example, the Button displaying “Red”\
    \ as its title uses curly brackets to define code to run. The other three Buttons\
    \ (“Purple”, “Green”, and “Orange”) call functions. Notice that each function\
    \ call simply uses the function name and does not need a parameter list if it\
    \ is empty.\n\nTo see how to make a Contextual Menu, follow these steps:\n\n1.\
    \  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “ContextualMenu.”\n\n2.  Click the ContentView file in the Navigator pane.\n\
    \n3.  Add the following State variable under the struct ContentView: View line:\n\
    \n1.  Add a VStack in the var body: some View and put a Rectangle and a Text view\
    \ inside the VStack like this:\n\n    ```\n    var body: some View {\n    VStack\
    \ {\n    Rectangle()\n    .foregroundColor(myColor)\n    Text(\"Pick a color\"\
    )\n    .padding()\n    }\n    }\n    ```\n\n    The preceding code defines a Rectangle\
    \ and colors it based on the myColor State variable, which is initially set to\
    \ Color.gray. Then it displays a Text view.\n\n2.  Add a .contextualMenu modifier\
    \ to the Text view like this:\n\n    ```\n    .contextMenu(menuItems: {\n    Button(\"\
    Red\", action: {\n    myColor = Color.red\n    })\n    Button(\"Purple\", action:\
    \ purple)\n    Button(\"Green\", action: green)\n    Button(\"Orange\", action:\
    \ orange)\n    })\n    ```\n\n3.  Add the following functions above the last curly\
    \ bracket in the struct ContentView: View like this:\n\n    ```\n    func purple()\
    \ {\n    myColor = Color.purple\n    }\n    func green() {\n    myColor = Color.green\n\
    \    }\n    func orange() {\n    myColor = Color.orange\n    }\n    ```\n\n  \
    \  The entire ContentView file should look like this:\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State var myColor = Color.gray\n    var\
    \ body: some View {\n    VStack {\n    Rectangle()\n    .foregroundColor(myColor)\n\
    \    Text(\"Pick a color\")\n    .padding()\n    .contextMenu(menuItems: {\n \
    \   Button(\"Red\", action: {\n    myColor = Color.red\n    })\n    Button(\"\
    Purple\", action: purple)\n    Button(\"Green\", action: green)\n    Button(\"\
    Orange\", action: orange)\n    })\n    }\n    }\n    func purple() {\n    myColor\
    \ = Color.purple\n    }\n    func green() {\n    myColor = Color.green\n    }\n\
    \    func orange() {\n    myColor = Color.orange\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n4.  Click the Live icon in the Canvas pane.\n\n5.  Move\
    \ the mouse pointer over the “Pick a color” Text view and hold down the left mouse\
    \ button to mimic a long press gesture. After a moment, the Contextual Menu appears.\n\
    \n6.  Click any of the options displayed in the Contextual Menu. Notice that the\
    \ Rectangle changes color based on the option you chose.\n\n```\n@State var myColor\
    \ = Color.gray\n```"
  trans: "\n# 在警告框中显示文本输入框\n\n`Alert`（但`ActionSheet`不行）支持显示一个或多个`TextField`，供用户输入数据。随后`Alert`可以检索用户在`TextField`中输入的数据，并将其传递给程序的其他部分。\n\
    \n我们需要将`.alert`修饰器附加到用户界面元素上，但与创建`Alert`对话框不同，我们需要像这样分别定义`TextField`和`Button`：\n\
    \n```\n.alert(\"登录\", isPresented: $showAlert, actions: {\n    TextField(\"用户名\"\
    , text: $username)\n    SecureField(\"密码\", text: $password)\n    Button(\"登录\"\
    , action: {\n        message = \"login\"\n    })\n}, message: {\n    Text(\"请输入您的用户名和密码。\"\
    )\n})\n```\n\n上述代码创建了一个简单的`Alert`，其中显示了一个文本输入框和一个按钮，如图 12-4 所示。\n\n![](img/329781_7_En_12_Fig4_HTML.jpg)\n\
    \n一个用于输入登录凭证的对话框截图。文本提示输入用户名和密码。有一个文本框用于输入用户名。\n\n**图 12-4** 在警告对话框中显示文本输入框\n\n\
    要了解如何创建带有文本输入框的`Alert`，请按照以下步骤操作：\n\n![](img/329781_7_En_12_Fig5_HTML.jpg)\n\n\
    一个对话框截图显示输入登录凭证的提示信息。有用于输入用户名和密码的文本框，以及登录和取消按钮。\n\n**图 12-5** 显示`TextField`和`SecureField`的警告对话框\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 \"AlertTextField\"。\n\n2. 在导航窗格中点击 `ContentView`\
    \ 文件。\n\n3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\n    ```\n    @State\
    \ var showAlert = false\n    @State var username: String = \"\"\n    @State var\
    \ password: String = \"\"\n    @State var message = \"\"\n    ```\n\n4. 在 `var\
    \ body: some View` 中添加一个 `VStack`，并在其中放入三个 `Text` 视图和一个 `Button`，如下所示：\n\n   \
    \ ```\n    var body: some View {\n        VStack (spacing: 50) {\n           \
    \ Text(\"您点击了 \" + message + \" 按钮！\")\n            Text(\"您的用户名是： \" + username)\n\
    \            Text(\"您的密码是： \" + password)\n            Button(\"显示警告\") {\n  \
    \              showAlert = true\n            }\n        }\n    ```\n\n5. 在 `Button`\
    \ 的闭合大括号上附加一个 `.alert`，如下所示：\n\n    ```\n    .alert(\"登录\", isPresented: $showAlert,\
    \ actions: {\n        TextField(\"用户名\", text: $username)\n        SecureField(\"\
    密码\", text: $password)\n        Button(\"登录\", action: {\n            message\
    \ = \"login\"\n        })\n        Button(\"取消\", role: .cancel, action: {\n \
    \           message = \"cancel\"\n        })\n    }, message: {\n        Text(\"\
    请输入您的用户名和密码。\")\n    })\n    ```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\
    struct ContentView: View {\n    @State var showAlert = false\n    @State var username:\
    \ String = \"\"\n    @State var password: String = \"\"\n    @State var message\
    \ = \"\"\n    var body: some View {\n        VStack (spacing: 50) {\n        \
    \    Text(\"您点击了 \" + message + \" 按钮！\")\n            Text(\"您的用户名是： \" + username)\n\
    \            Text(\"您的密码是： \" + password)\n            Button(\"显示警告\") {\n  \
    \              showAlert = true\n            }\n            .alert(\"登录\", isPresented:\
    \ $showAlert, actions: {\n                TextField(\"用户名\", text: $username)\n\
    \                SecureField(\"密码\", text: $password)\n                Button(\"\
    登录\", action: {\n                    message = \"login\"\n                })\n\
    \                Button(\"取消\", role: .cancel, action: {\n                   \
    \ message = \"cancel\"\n                })\n            }, message: {\n      \
    \          Text(\"请输入您的用户名和密码。\")\n            })\n        }\n    }\n}\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n6. 点击画布窗格中的 Live 图标。\n\n7. 点击用户界面上的\
    \ \"显示警告\" 按钮。出现一个登录警告，如图 12-5 所示。\n\n8. 点击用户名 `TextField` 并输入一个名称。\n\n9. 点击密码\
    \ `SecureField` 并输入一个密码。注意 `SecureField` 会屏蔽你输入的所有字符。\n\n10. 点击登录按钮。用户界面会识别出你点击了登录按钮，并输入了用户名和密码。\n\
    \n## 使用上下文菜单\n\n`Contextual Menu`（上下文菜单）可以在用户界面中隐藏多个选项。只有当在视图（例如`Text`视图）上检测到长按手势时，它才会出现。当`Contextual\
    \ Menu`列出选项时，用户可以选择其中一个。\n\n`Contextual Menu`定义了一个`Button`列表，每个`Button`显示文本，并指定用户选择该`Button`时要执行的操作。该操作可以调用函数，或在花括号内包含\
    \ Swift 代码，如下所示：\n\n```\n.contextMenu(menuItems: {\n    Button(\"红色\", action:\
    \ {\n        myColor = Color.red\n    })\n    Button(\"紫色\", action: purple)\n\
    \    Button(\"绿色\", action: green)\n    Button(\"橙色\", action: orange)\n})\n```\n\
    \n在这个示例中，显示 \"红色\" 为标题的`Button`使用花括号来定义要运行的代码。其他三个`Button`（\"紫色\"、\"绿色\" 和 \"\
    橙色\"）调用函数。注意，每个函数调用仅使用函数名，如果参数列表为空，则无需提供参数列表。\n\n要了解如何创建`Contextual Menu`，请按照以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其命名，例如 \"ContextualMenu\"。\n\n2. 在导航窗格中点击 `ContentView`\
    \ 文件。\n\n3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\n    `@State var\
    \ myColor = Color.gray`\n\n4. 在 `var body: some View` 中添加一个 `VStack`，并在其中放入一个\
    \ `Rectangle` 和一个 `Text` 视图，如下所示：\n\n    ```\n    var body: some View {\n    \
    \    VStack {\n            Rectangle()\n                .foregroundColor(myColor)\n\
    \            Text(\"选择一种颜色\")\n                .padding()\n        }\n    }\n\
    \    ```\n\n    上述代码定义了一个`Rectangle`，并根据`myColor` `State`变量（初始设置为`Color.gray`）为其着色。然后显示一个`Text`视图。\n\
    \n5. 在 `Text` 视图上添加一个 `.contextualMenu` 修饰器，如下所示：\n\n    ```\n    .contextMenu(menuItems:\
    \ {\n        Button(\"红色\", action: {\n            myColor = Color.red\n     \
    \   })\n        Button(\"紫色\", action: purple)\n        Button(\"绿色\", action:\
    \ green)\n        Button(\"橙色\", action: orange)\n    })\n    ```\n\n6. 在 `struct\
    \ ContentView: View` 的最后一个大括号上方添加以下函数，如下所示：\n\n    ```\n    func purple() {\n\
    \        myColor = Color.purple\n    }\n    func green() {\n        myColor =\
    \ Color.green\n    }\n    func orange() {\n        myColor = Color.orange\n  \
    \  }\n    ```\n\n    整个 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n        @State var myColor = Color.gray\n   \
    \     var body: some View {\n            VStack {\n                Rectangle()\n\
    \                    .foregroundColor(myColor)\n                Text(\"选择一种颜色\"\
    )\n                    .padding()\n                    .contextMenu(menuItems:\
    \ {\n                        Button(\"红色\", action: {\n                      \
    \      myColor = Color.red\n                        })\n                     \
    \   Button(\"紫色\", action: purple)\n                        Button(\"绿色\", action:\
    \ green)\n                        Button(\"橙色\", action: orange)\n           \
    \         })\n            }\n        }\n        func purple() {\n            myColor\
    \ = Color.purple\n        }\n        func green() {\n            myColor = Color.green\n\
    \        }\n        func orange() {\n            myColor = Color.orange\n    \
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n        static\
    \ var previews: some View {\n            ContentView()\n        }\n    }\n   \
    \ ```\n\n7. 点击画布窗格中的 Live 图标。\n\n8. 将鼠标指针移到 \"选择一种颜色\" `Text` 视图上，并按住鼠标左键模拟长按手势。片刻之后，`Contextual\
    \ Menu` 会出现。\n\n9. 点击 `Contextual Menu` 中显示的任何选项。注意，`Rectangle` 会根据你选择的选项改变颜色。\n"
- fmt: "# Summary\n\nAlerts display information in the middle of the screen (`.alert`),\
    \ while action sheets display information at the bottom of the screen (`.actionSheet`).\
    \ An Alert and an Action Sheet can display a title and a message along with at\
    \ least one button to dismiss the Alert/Action Sheet. However, an Alert can display\
    \ up to two buttons, while an Action Sheet can display up to three buttons.\n\n\
    Buttons on an Alert/Action Sheet just dismiss the Alert/Action Sheet, but you\
    \ can attach code to run when the user selects a button. One way is to write the\
    \ code directly in the `.alert`/`.actionSheet` modifier, but a better solution\
    \ is to call a function and separate code in that function away from the `.alert`/`.actionSheet`\
    \ modifier.\n\nUse alerts when you need to display important information to the\
    \ user and get immediate feedback, such as verifying if the user wants to delete\
    \ data. Use action sheets when you need to display information at the bottom of\
    \ the screen. Use contextual menus when you want to hide multiple options off\
    \ the user interface but make them available when the user wants to see them.\n\
    \n# 13. Displaying Lists\n\nOne common way to display lots of related data to\
    \ the user is through a List (also called a Table view). A List simply shows multiple\
    \ rows of similar types of data stacked vertically. The simplest type of a List\
    \ defines one or more `Text` views that appear in separate rows as shown in Figure\
    \ [13-1](#329781_7_En_13_Chapter.xhtml#Fig1):\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig1_HTML.jpg)\n\
    \nA screenshot denotes a list of words named cat, dog, bird, reptile, and fish.\n\
    \n**Figure 13-1** – A simple List containing multiple `Text` views\n\n```\nList\
    \ {\n    Text(\"Cat\")\n    Text(\"Dog\")\n    Text(\"Bird\")\n    Text(\"Reptile\"\
    )\n    Text(\"Fish\")\n}\n```\n\nIf a List contains more items than can appear\
    \ on the screen at one time, the List will let users swipe up or down to view\
    \ all the data. Best of all, this scrolling feature doesn’t require any additional\
    \ coding.\n\nWhen creating a List, you can use multiple `Text` views, but if you\
    \ want to display a large number of items that may grow or shrink over time, manually\
    \ typing multiple `Text` views won’t work. Instead, you may need to use a loop\
    \ to retrieve data and display it in a `Text` view within a List.\n\nTo see how\
    \ to use a loop to create a List and swipe up and down to view all items in a\
    \ List, follow these steps:\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig2_HTML.jpg)\n\
    \nAn illustration of a smartphone denotes a list of text on its screen, which\
    \ reads animal number 1 to animal number 19.\n\n**Figure 13-2** – The appearance\
    \ of the List defined by a `ForEach` loop\n\n1.  Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as \"SimpleList.\"\n\n2.  Click the\
    \ `ContentView` file in the Navigator pane.\n\n3.  Add a `List` inside the `var\
    \ body: some View` like this:\n\n    ```\n    var body: some View {\n        List\
    \ {\n            ForEach(1...25, id: \\.self) { index in\n                Text(\"\
    Animal #\\(index)\")\n            }\n        }\n    }\n    ```\n\n    This code\
    \ uses a `ForEach` loop to create 25 separate items. The `index` variable increments\
    \ each time the `ForEach` loop runs, so the value of `index` will start at 1 and\
    \ end at 25. The entire `ContentView` file should look like this:\n\n    ```\n\
    \    import SwiftUI\n    struct ContentView: View {\n        var body: some View\
    \ {\n            List {\n                ForEach(1...25, id: \\.self) { index\
    \ in\n                    Text(\"Animal #\\(index)\")\n                }\n   \
    \         }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n4.  Click the Live icon in the Canvas pane. Notice\
    \ that even though the List contains 25 items, not all items are visible on the\
    \ screen at once as shown in Figure [13-2](#329781_7_En_13_Chapter.xhtml#Fig2).\n\
    \n5.  Drag the mouse up and down to mimic a swipe gesture. Notice that the List\
    \ automatically scrolls up/down to show you the rest of its contents.\n\n## Displaying\
    \ Array Data in a List\n\nThe data displayed in a List is typically stored in\
    \ an array. The number of items in the array can be fixed, but more often the\
    \ number of items will vary over time. That means the contents of the List will\
    \ likely vary as the array grows and shrinks over time.\n\nTo see how to display\
    \ the contents of an array in a List, follow these steps:\n\n1.  Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as \"ListArray.\"\
    \n\n2.  Click the `ContentView` file in the Navigator pane.\n\n3.  Define an array\
    \ under the `struct ContentView: some View` line like this:\n\n    ```\n    var\
    \ myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
    , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    ```\n\n4.  Add a `VStack`\
    \ inside the `var body: some View` and create a `List` like this:\n\n    ```\n\
    \    var body: some View {\n        VStack {\n            List {\n           \
    \     ForEach(0...myArray.count - 1, id: \\.self) { index in\n               \
    \     Text(myArray[index])\n                }\n            }\n        }\n    }\n\
    \    ```\n\nThis creates a List and uses the `ForEach` loop to count from 0 up\
    \ to the last item in the array. (Remember, the first item in the array has an\
    \ index value of 0, so the last item in the array has an index value equal to\
    \ the total number of items in the array – 1.) Then it uses this index value to\
    \ retrieve each item from the array to display in the List as shown in Figure\
    \ [13-3](#329781_7_En_13_Chapter.xhtml#Fig3).\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig3_HTML.jpg)\n\
    \nA rectangular block denotes a list of words. It reads, cat, dog, turtle, ferret,\
    \ parrot, goldfish, lizard, canary, tarantula, and hamster from top to bottom.\n\
    \n**Figure 13-3** – Displaying the contents of an array in a List\n\nThe entire\
    \ `ContentView` file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\"\
    , \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    var body:\
    \ some View {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }\n            }\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```"
