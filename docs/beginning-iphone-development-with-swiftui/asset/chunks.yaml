  raw: "## Defining Multiple Rows/Columns\n\nThe previous project created a single\
    \ row in the LazyHGrid and a single column in the LazyVGrid. These single row\
    \ and column were defined by the array of GridItem like this:\n\n```\nlet gridItems\
    \ = [GridItem()]\n```\n\nIf you want to create multiple rows or columns, just\
    \ define the array with more than one GridItem like this:\n\n```\nlet gridItems\
    \ = [GridItem(),\nGridItem()\n]\n```\n\nThis will create two rows in a LazyHGrid\
    \ or two columns in a LazyVGrid. Each time you add an additional GridItem to the\
    \ array, you increase the number of rows or columns in the grid.\n\nTo see how\
    \ to change the number of rows or columns in a grid, follow these steps:\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig3_HTML.jpg)\n\
    \nA diagram illustrates numbers 1 to 10 arranged in three rows and columns that\
