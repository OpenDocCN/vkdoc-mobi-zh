  trans: "\n# 使用自动更正与文本内容\n\n默认情况下，文本字段会启用自动更正功能，这意味着当您输入时，文本字段会尝试猜测您要输入的单词。在某些情况下，这可能会很有帮助，但如果您试图输入一个名字，您可能不希望自动更正功能将名字改为常见单词。\n\
    \n要关闭自动更正功能，只需添加以下修饰符：\n\n```\n.disableAutocorrection(true)\n```\n\n如果您想重新打开自动更正功能，可以删除整个\
    \ `.disableAutocorrection` 修饰符，或者像这样传入一个 `false` 值：\n\n```\n.disableAutocorrection(false)\n\
    ```\n\n虽然禁用自动更正可以阻止文本字段提供不相关的建议，另一种解决方案是使用 `.textContentType` 修饰符来定义文本字段应期望的文本类型，例如姓名、电子邮件地址或电话号码。要使用\
    \ `.textContentType` 修饰符，您只需指定期望的文本类型，例如\n\n```\nTextField(\"请输入您的电子邮件地址\", text:\
    \ $emailAddress)\n.textContentType(.emailAddress)\n```\n\n通过定义特定的 `.textContentType`，自动更正功能将减少其提供的不相关建议的数量。不同的\
    \ `.textContentType` 修饰符选项如下：\n\n*   `.URL` – 用于输入网址数据\n*   `.namePrefix` – 用于输入前缀或头衔，例如博士或先生\n\
    *   `.name` – 用于输入姓名\n*   `.nameSuffix` – 用于输入姓名后缀，例如小\n*   `.givenName` – 用于输入名字\n\
    *   `.middleName` – 用于输入中间名\n*   `.familyName` – 用于输入姓氏或家族名\n*   `.nickname` –\
    \ 用于输入别名\n*   `.organizationName` – 用于输入组织名称\n*   `.jobTitle` – 用于输入职位\n*   `.location`\
    \ – 用于输入地点（包括地址）\n*   `.fullStreetAddress` – 用于输入完整的街道地址\n*   `.streetAddressLine1`\
    \ – 用于输入街道地址的第一行\n*   `.streetAddressLine2` – 用于输入街道地址的第二行\n*   `.addressCity`\
    \ – 用于输入地址中的城市名\n*   `.addressCityAndState` – 用于输入地址中的城市和州名\n*   `.postalCode`\
    \ – 用于输入地址中的邮政编码\n*   `.sublocality` – 用于输入地址中的子区域\n*   `.countryName` – 用于输入地址中的国家或地区名称\n\
    *   `.username` – 用于输入账户或登录名\n*   `.password` – 用于输入密码\n*   `.newPassword` – 用于输入新密码\n\
    *   `.oneTimeCode` – 用于输入一次性代码\n*   `.emailAddress` – 用于输入电子邮件地址\n*   `.telephoneNumber`\
    \ – 用于输入电话号码\n*   `.creditCardNumber` – 用于输入信用卡号\n*   `.dateTime` – 用于输入日期、时间或持续时间\n\
    *   `.flightNumber` – 用于输入航班号\n*   `.shipmentTrackingNumber` – 用于输入包裹追踪号\n\n##\
    \ 定义不同的键盘\n\n在真实的 iOS 设备上，应用会显示一个虚拟键盘，用户可以通过点击键盘来输入数字或字符。由于文本字段可能期望输入特定类型的信息，例如姓名、数字或电子邮件地址，您可以为用户界面上的每个文本字段定义要使用的特定类型的虚拟键盘。文本字段可以显示的一些不同的虚拟键盘包括：\n\
    \n*   `.default` – 通常显示的默认虚拟键盘，除非您另行指定\n*   `.asciiCapable` – 显示标准的 ASCII 字符\n\
    *   `.numbersAndPunctuation` – 显示数字和标点符号\n*   `.URL` – 显示针对网址输入优化的键盘\n*   `.numberPad`\
    \ – 显示用于输入 PIN 码的数字键盘\n*   `.phonePad` – 显示用于输入电话号码的拨号键盘\n*   `.namePhonePad`\
    \ – 显示用于输入人名和电话号码的拨号键盘\n*   `.emailAddress` – 显示用于输入电子邮件地址的键盘\n*   `.decimalPad`\
    \ – 显示带有数字和小数点的键盘\n*   `.twitter` – 显示用于 Twitter 文本输入的键盘\n*   `.webSearch` – 显示用于网络搜索词和网址输入的键盘\n\
    *   `.asciiCapableNumberPad` – 显示仅输出 ASCII 数字的数字键盘\n*   `.alphabet` – 显示用于字母输入的键盘\n\
    \n图 7-5 展示了虚拟键盘的四种不同外观。\n\n![](img/329781_7_En_7_Fig5_HTML.jpg)\n\n四张虚拟键盘截图。左边是\
    \ QWERTY 键盘，右边是数字和标点键盘。\n\n图 7-5\n\n虚拟键盘的不同外观\n\n要为文本字段定义特定的键盘类型，请像这样使用 `.keyboardType`\
    \ 修饰符：\n\n```\nTextField(\"输入姓名\", text: $message)\n.keyboardType(.phonePad)\n\
    ```\n\n注意\n\n要查看虚拟键盘，您必须在模拟器或实际的 iOS 设备上测试您的项目。在模拟器中，您可以通过选择 I/O ➤ Keyboard ➤\
    \ Toggle Software Keyboard 或按 Command+K 来切换隐藏或显示虚拟键盘。您无法在画布窗格中查看虚拟键盘。\n\n## 关闭虚拟键盘\n\
    \n当用户想要在文本字段中输入时，虚拟键盘会出现，并且用户界面会自动向上滑动。然而，一旦输入完毕，您需要让虚拟键盘再次消失。\n\n一种技术是使用 `.submitLabel`\
    \ 修饰符，它在虚拟键盘上定义一个特定的按键。通过点击 `.submitLabel` 修饰符定义的此按键，用户可以使虚拟键盘消失，如图 7-6 所示。`.submitLabel`\
    \ 修饰符看起来像这样：\n\n![](img/329781_7_En_7_Fig6_HTML.jpg)\n\n一张虚拟键盘截图，其中高亮显示了空格键旁边的一个“完成”按钮。\n\
    \n图 7-6\n\n`.submitLabel(.done)` 修饰符在虚拟键盘上显示一个“完成”按钮\n\n```\n.submitLabel(.done)\n\
    ```\n\n如果您没有指定 `.submitLabel` 修饰符，SwiftUI 默认会在虚拟键盘的右下角显示一个“回车”按钮。无论右下角按键上显示的标签是什么，点击它都会使虚拟键盘消失。\n\
    \n`.submitLabel` 修饰符可以放置在虚拟键盘上的不同类型按钮包括：\n\n*   `.continue` – 添加一个“继续”按钮\n*  \
    \ `.done` – 添加一个“完成”按钮\n*   `.go` – 添加一个“前往”按钮\n*   `.join` – 添加一个“加入”按钮\n*  \
    \ `.next` – 添加一个“下一个”按钮\n*   `.return` – 添加一个“回车”按钮\n*   `.route` – 添加一个“路线”按钮\n\
    *   `.search` – 添加一个“搜索”按钮\n*   `.send` – 添加一个“发送”按钮\n\n要了解如何使用您可以定义的虚拟键盘按钮来隐藏虚拟键盘，请遵循以下步骤：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“DismissKeyboard”。\n\n2.  在导航器窗格中点击\
    \ ContentView 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个状态变量，如下所示：\n\n  \
    \  ```\n    struct ContentView: View {\n    @State var message = \"\"\n    ```\n\
    \n4.  在 body 中添加一个 TextField，如下所示：\n\n    ```\n    var body: some View {\n   \
    \ TextField(\"在此输入\", text: $message)\n    .submitLabel(.done)\n    .padding()\n\
    \    }\n    ```\n\n    整个 ContentView 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State var message = \"\"\n    var body:\
    \ some View {\n    TextField(\"在此输入\", text: $message)\n    .submitLabel(.done)\n\
    \    .padding()\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n5.  点击“运行”按钮或选择 Product ➤ Run 在模拟器中运行您的应用。\n\n6.  当您的应用在模拟器中显示时，点击文本字段。如果虚拟键盘未出现，请按\
    \ Command+K 或选择 I/O ➤ Keyboard ➤ Toggle Software Keyboard。\n\n7.  点击虚拟键盘右下角的“完成”按钮，使虚拟键盘消失。\n"
- fmt: "### Using a Text Editor\n\nWhere a `TextField` lets the user type in a word\
    \ or short sentence, a `TextEditor` lets the user type in multiple lines of text,\
    \ much like a word processor. When you place a `TextEditor` on a user interface,\
    \ it expands to fill all available space. That’s why it’s best to use the `.frame`\
    \ modifier to define a specific size for the `TextEditor`.\n\nWith a `TextField`,\
    \ tapping the button in the bottom-right corner of the virtual keyboard makes\
    \ it go away. Since a `TextEditor` can hold multiple lines of text, the button\
    \ in the bottom-right corner of the virtual keyboard simply moves the cursor to\
    \ the next line and always displays the “Return” label.\n\nSo if you want to hide\
    \ a virtual keyboard when using a `TextEditor`, you need to do the following:\n\
    \n- Create a `FocusState` variable that represents a Boolean value.\n- Add the\
    \ `.focused` modifier to the `TextEditor` and use the `FocusState` variable.\n\
    - Create an additional control, such as a button, that sets the `FocusState` variable\
    \ to `false`.\n\n> **Note:** This method of using a `FocusState` variable with\
    \ a `.focused` modifier and a separate control works with `TextField`s as well.\n\
    \nFirst, you need to create a `@FocusState` variable like this:\n\n```\n@FocusState\
    \ var dismissKeyboard: Bool\n```\n\nOnce you’ve defined a `@FocusState` variable,\
    \ you need to use the `.focused` modifier on a `TextEditor` (or `TextField`) to\
    \ link to the `@FocusState` variable like this:\n\n```\nTextEditor(text: $message)\n\
    \    .focused($dismissKeyboard)\n```\n\nThen you can set the value of the `@FocusState`\
    \ variable to `false` through a separate control to make the virtual keyboard\
    \ disappear like this:\n\n```\nButton(\"Hide Keyboard\") {\n    dismissKeyboard\
    \ = false\n}\n```\n\nTo see how `FocusState` variables work, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “DismissKeyboardTextEditor.”\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Create a `@State` variable to hold the contents of a `TextEditor`,\
    \ and create a `@FocusState` variable to make the virtual keyboard disappear as\
    \ follows:\n\n    ```\n    struct ContentView: View {\n        @State var message\
    \ = \"\"\n        @FocusState var dismissKeyboard: Bool\n    ```\n\n4. Add a `Button`\
    \ and a `TextEditor` inside of a `VStack`. To keep the `TextEditor` from expanding,\
    \ make sure you add a `.frame` modifier to the `TextEditor`. The entire code inside\
    \ the `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n\
    \n    struct ContentView: View {\n        @State var message = \"\"\n        @FocusState\
    \ var dismissKeyboard: Bool\n\n        var body: some View {\n            VStack\
    \ {\n                TextEditor(text: $message)\n                    .focused($dismissKeyboard)\n\
    \                    .frame(width: 250, height: 150)\n                    .padding()\n\
    \                Button(\"Hide Keyboard\") {\n                    dismissKeyboard\
    \ = false\n                }\n            }\n        }\n    }\n\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n5. Click the **Run** button or choose **Product**\
    \ ➤ **Run** to run your app in the Simulator.\n6. Click in the `TextEditor` when\
    \ your app appears in the Simulator. If the virtual keyboard does not appear,\
    \ press **Command+K** or choose **I/O** ➤ **Keyboard** ➤ **Toggle Software Keyboard**.\n\
    7. Type some text and then click the **“Hide Keyboard”** Button that you created\
    \ below the `TextEditor`. This sets the `@FocusState` variable `dismissKeyboard`\
    \ to `false`, which makes the virtual keyboard go away.\n\nYou must use a `@FocusState`\
    \ variable to make the virtual keyboard go away with a `TextEditor`.\n\n## Summary\n\
    \nOne of the most common ways a user can input data into an app is by typing in\
    \ text. A `TextField` can accept a short amount of text such as a name or sentence.\
    \ By default, a `TextField` will expand horizontally, which means the user can\
    \ keep inputting as much text as they wish and it will appear as a single line.\n\
    \nIf you change the `TextField` to expand vertically, the height of the `TextField`\
    \ will increase and display multiple lines of text as the user continues inputting\
    \ text. To keep a `TextField` from expanding endlessly, you can use the `.lineLimit`\
    \ modifier to define the maximum number of lines to appear in the `TextField`.\n\
    \nIf the user needs to type in sensitive information that shouldn’t be displayed\
    \ on the screen, you can use a `SecureField`, which masks anything typed. For\
    \ displaying multiple lines of text, you can use a `TextEditor`, which acts like\
    \ a miniature word processor.\n\nTo make typing text easier, use the `.contentType`\
    \ modifier to define what type of information a `TextField` can expect such as\
    \ a name or email address. Then use the `.keyboardType` modifier to define a specific\
    \ virtual keyboard optimized for inputting in a certain type of information such\
    \ as telephone numbers or names.\n\nTo make a virtual keyboard go away when the\
    \ user no longer needs it, `TextField`s and `SecureField`s can rely on the bottom-right\
    \ corner button to dismiss the virtual keyboard. By using the `.submitLabel` modifier,\
    \ you can define common types of titles for this bottom-right corner virtual keyboard\
    \ button such as **Done**, **Send**, or **Next**.\n\nWhen creating a `TextEditor`,\
    \ it will expand to fill all available space, so you may want to use the `.frame`\
    \ modifier to define a specific width and height for the `TextEditor`. To hide\
    \ a virtual keyboard when using a `TextEditor`, use a `@FocusState` variable with\
    \ the `.focused` modifier. Then create a separate control, such as a button, to\
    \ set the `@FocusState` variable to `false`. This will make the virtual keyboard\
    \ go away.\n\nText is the most common way to input data, so make it easy for users\
    \ to type data into a `TextField`, `SecureField`, or `TextEditor`.\n\n# 8. Limiting\
    \ Choices with Pickers\n\nText Fields are great for letting the user enter any\
    \ type of information such as names or short answers to questions. The problem\
    \ is that if the user has the freedom to enter anything, they could accidentally\
    \ (or on purpose) enter invalid data.\n\nFor example, if a `TextField` asks for\
    \ an address, you want the user to have the freedom to type anything. However,\
    \ if a `TextField` asks for a state, language, or gender, you don’t want the user\
    \ to type “dog,” “1258dke3,” or “I am looking for shoes” because none of this\
    \ would be valid input, which would likely crash the program.\n\nOne solution\
    \ is to let the user enter any data and then write Swift code to verify that the\
    \ input is valid. Unfortunately, this would likely take a lot of time and still\
    \ not be accurate. A far better solution is when there are only a handful of acceptable\
    \ options; it’s best to restrict the user to selecting from a limited range of\
    \ options.\n\n`Picker`s display several options and give the user a chance to\
    \ click to select one option. Since all options are valid, `Picker`s ensure that\
    \ users can only enter valid data. An ordinary `Picker` is fine for letting a\
    \ user select from a range of text options. For selecting colors or dates, SwiftUI\
    \ offers special `ColorPicker`s and `DatePicker`s as well.\n\n`DatePicker`s even\
    \ let you define a valid date range. The whole purpose of `Picker`s is to make\
    \ sure the user can only input valid data into a program at any given time."
