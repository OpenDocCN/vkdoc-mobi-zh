    \ you can also use a `Label` view to display both text and an icon like this:\n\
    \n```\nButton {\n    // code to run\n} label: {\n    Label(\"Image button\", systemImage:\
    \ \"hare.fill\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n\
    \        .padding()\n        .border(Color.blue, width: 6)\n}\n```\n\nThis `Label`\
    \ view defines text and an icon to appear and then uses the `.font` modifier to\
