    \ give it any name you wish such as “SimpleList.”\n\n2.  Click the ContentView\
    \ file in the Navigator pane.\n\n3.  Add a List inside the var body: some View\
    \ like this:\n\n    ```\n    var body: some View {\n    List {\n    ForEach(1...25,\
    \ id: \\.self) { index in\n    Text(\"Animal #\\(index)\")\n    }\n    }\n   \
    \ ```\n\n    This code uses a ForEach loop to create 25 separate items. The index\
    \ variable increments each time the ForEach loop runs, so the value of index will\
    \ start at 1 and end at 25\\. The entire ContentView file should look like this:\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    var body: some\
    \ View {\n    List {\n    ForEach(1...25, id: \\.self) { index in\n    Text(\"\
    Animal #\\(index)\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n4.  Click the Live icon in the Canvas pane. Notice that\
    \ even though the List contains 25 items, not all items are visible on the screen\
    \ at once as shown in Figure [13-2](#329781_7_En_13_Chapter.xhtml#Fig2).\n\n1.\
    \  Drag the mouse up and down to mimic a swipe gesture. Notice that the List automatically\
    \ scrolls up/down to show you the rest of its contents.\n\n## Displaying Array\
    \ Data in a List\n\nThe data displayed in a List is typically stored in an array.\
    \ The number of items in the array can be fixed, but more often the number of\
    \ items will vary over time. That means the contents of the List will likely vary\
    \ as the array grows and shrinks over time.\n\nTo see how to display the contents\
    \ of an array in a List, follow these steps:\n\n1.  Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as “ListArray.”\n\n2.  Click the\
    \ ContentView file in the Navigator pane.\n\n3.  Define an array under the struct\
    \ ContentView: some View line like this:\n\n    ```\n    var myArray = [\"Cat\"\
    , \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\"\
    , \"Tarantula\", \"Hamster\"]\n    ```\n\n4.  Add a VStack inside the var body:\
    \ some View and create a List like this:\n\n    ```\n    var body: some View {\n\
    \    VStack {\n    List {\n    ForEach(0...myArray.count - 1, id: \\.self) { index\
    \ in\n    Text(myArray[index])\n    }\n    }\n    }\n    }\n    ```\n\nThis creates\
    \ a List and uses the ForEach loop to count from 0 up to the last item in the\
    \ array. (Remember, the first item in the array has an index value of 0, so the\
    \ last item in the array has an index value equal to the total number of items\
    \ in the array – 1.) Then it uses this index value to retrieve each item from\
    \ the array to display in the List as shown in Figure [13-3](#329781_7_En_13_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig3_HTML.jpg)\n\nA rectangular\
    \ block denotes a list of words. It reads, cat, dog, turtle, ferret, parrot, goldfish,\
    \ lizard, canary, tarantula, and hamster from top to bottom.\n\nFigure 13-3\n\n\
    Displaying the contents of an array in a List\n\nThe entire ContentView file should\
    \ look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\nvar myArray\
    \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\nvar body: some View {\nVStack {\nList\
    \ {\nForEach(0...myArray.count - 1, id: \\.self) { index in\nText(myArray[index])\n\
    }\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nContentView()\n}\n}\n```"
  trans: "\n# 摘要\n\n警告框会在屏幕中央显示信息（`.alert`），而操作表则在屏幕底部显示信息（`.actionSheet`）。警告框和操作表都可以显示标题和消息，并至少包含一个用于关闭警告框/操作表的按钮。但警告框最多可显示两个按钮，而操作表则最多可显示三个。\n\
    \n警告框/操作表上的按钮只是用来关闭警告框/操作表，但你可以附加代码，使其在用户选择按钮时执行。一种方法是将代码直接写入 `.alert`/`.actionSheet`\
    \ 修饰符中，但更好的方式是调用一个函数，并将该函数中的代码与 `.alert`/`.actionSheet` 修饰符分离开来。\n\n当你需要向用户显示重要信息并立即获得反馈时，请使用警告框，例如确认用户是否要删除数据。当需要在屏幕底部显示信息时，请使用操作表。当你想将多个选项隐藏在用户界面之外，但又在用户需要时可供查看，请使用上下文菜单。\n\
    \n# 13. 显示列表\n\n向用户显示大量相关数据的一种常见方式是通过列表（也称为 Table 视图）。列表只是将多行相似类型的数据垂直堆叠显示。最简单的列表类型定义一个或多个\
    \ `Text` 视图，这些视图会出现在不同的行中，如图 13-1 所示：\n\n![](img/329781_7_En_13_Fig1_HTML.jpg)\n\
    \n一张屏幕截图显示了一个单词列表，依次为 cat、dog、bird、reptile 和 fish。\n\n**图 13-1** – 一个包含多个 `Text`\
    \ 视图的简单列表\n\n```\nList {\n    Text(\"Cat\")\n    Text(\"Dog\")\n    Text(\"Bird\"\
    )\n    Text(\"Reptile\")\n    Text(\"Fish\")\n}\n```\n\n如果列表包含的项数超过屏幕一次可显示的数量，列表将允许用户上下滑动以查看所有数据。最棒的是，这种滚动功能无需任何额外编码。\n\
    \n创建列表时，你可以使用多个 `Text` 视图，但如果要显示大量可能随时间增长或缩减的项，手动输入多个 `Text` 视图是行不通的。相反，你可能需要使用循环来检索数据，并将其显示在列表中的\
    \ `Text` 视图内。\n\n要了解如何使用循环创建列表以及上下滑动查看所有列表项，请按照以下步骤操作：\n\n![](img/329781_7_En_13_Fig2_HTML.jpg)\n\
    \n一张智能手机的插图显示其屏幕上有一个文本列表，内容从动物编号 1 到动物编号 19。\n\n**图 13-2** – 由 `ForEach` 循环定义的列表外观\n\
    \n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"SimpleList\"。\n\n2.  在导航器面板中点击 `ContentView`\
    \ 文件。\n\n3.  在 `var body: some View` 中添加一个 `List`，如下所示：\n\n    ```\n    var body:\
    \ some View {\n        List {\n            ForEach(1...25, id: \\.self) { index\
    \ in\n                Text(\"Animal #\\(index)\")\n            }\n        }\n\
    \    }\n    ```\n\n    这段代码使用一个 `ForEach` 循环创建了 25 个独立的项。每次 `ForEach` 循环运行时，`index`\
    \ 变量都会递增，因此 `index` 的值将从 1 开始，到 25 结束。整个 `ContentView` 文件应如下所示：\n\n    ```\n \
    \   import SwiftUI\n    struct ContentView: View {\n        var body: some View\
    \ {\n            List {\n                ForEach(1...25, id: \\.self) { index\
    \ in\n                    Text(\"Animal #\\(index)\")\n                }\n   \
    \         }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n4.  点击画布面板中的 Live 图标。请注意，即使列表包含 25 个项，但如图 13-2 所示，并非所有项都同时显示在屏幕上。\n\
    \n5.  上下拖动鼠标以模拟滑动手势。请注意，列表会自动向上/向下滚动，以显示其余内容。\n\n## 在列表中显示数组数据\n\n列表中显示的数据通常存储在数组中。数组中的项数可以是固定的，但更常见的是项数会随时间变化。这意味着随着数组随时间增长和缩减，列表的内容也可能会发生变化。\n\
    \n要了解如何在列表中显示数组内容，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如 \"ListArray\"\
    。\n\n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: some View`\
    \ 这行下方定义一个数组，如下所示：\n\n    ```\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
    , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
    , \"Hamster\"]\n    ```\n\n4.  在 `var body: some View` 中添加一个 `VStack`，并创建一个 `List`，如下所示：\n\
    \n    ```\n    var body: some View {\n        VStack {\n            List {\n \
    \               ForEach(0...myArray.count - 1, id: \\.self) { index in\n     \
    \               Text(myArray[index])\n                }\n            }\n     \
    \   }\n    }\n    ```\n\n这将创建一个列表，并使用 `ForEach` 循环从 0 计数到数组中的最后一个项。（请记住，数组中的第一个项索引值为\
    \ 0，因此数组中最后一个项的索引值等于数组中的总项数减 1。）然后它使用此索引值从数组中检索每个项，以显示在列表中，如图 13-3 所示。\n\n![](img/329781_7_En_13_Fig3_HTML.jpg)\n\
    \n一个矩形块显示了一个单词列表。从上到下依次为 cat、dog、turtle、ferret、parrot、goldfish、lizard、canary、tarantula\
    \ 和 hamster。\n\n**图 13-3** – 在列表中显示数组的内容\n\n整个 `ContentView` 文件应如下所示：\n\n```\n\
    import SwiftUI\nstruct ContentView: View {\n    var myArray = [\"Cat\", \"Dog\"\
    , \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"\
    Tarantula\", \"Hamster\"]\n    var body: some View {\n        VStack {\n     \
    \       List {\n                ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                    Text(myArray[index])\n                }\n    \
    \        }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n"
- fmt: "# Displaying Arrays of Structures in a List\n\nThe previous code uses a `ForEach`\
    \ loop to retrieve array items by index values. Another way to store data is to\
    \ use a structure and then create an array of structures.  \nThe purpose for this\
    \ is to define the data you want to store along with a unique ID that you can\
    \ use to identify each structure such as  \n\n```\nstruct Animals: Identifiable\
    \ {\n    let pet: String\n    let id = UUID()\n}\n```\n\nOnce you define an `Identifiable`\
    \ structure, you can store it in an array like this:  \n\n```\nvar myAnimals =\
    \ [\n    Animals(pet: \"Cat\"),\n    Animals(pet: \"Dog\"),\n    Animals(pet:\
    \ \"Turtle\"),\n    Animals(pet: \"Ferret\"),\n    Animals(pet: \"Parrot\"),\n\
    \    Animals(pet: \"Goldfish\"),\n    Animals(pet: \"Lizard\"),\n    Animals(pet:\
    \ \"Canary\"),\n    Animals(pet: \"Tarantula\"),\n    Animals(pet: \"Hamster\"\
    )\n]\n```\n\nNot only does this array store a string in the `pet` field, but it\
    \ also uniquely identifies each structure with an ID. Now you can use this unique\
    \ ID to display each item in a `List` like this:  \n\n```\nList(myAnimals) {\n\
    \    Text($0.pet)\n}\n```\n\nNotice that the preceding code does not require a\
    \ loop. To see how this code works, follow these steps:  \n\n1.  Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as “ListOfStructures.”\
    \  \n2.  Click the `ContentView` file in the Navigator pane.  \n3.  Define a structure\
    \ and an array under the `struct ContentView: some View` line like this:  \n\n\
    \    ```\n    struct ContentView: View {\n        struct Animals: Identifiable\
    \ {\n            let pet: String\n            let id = UUID()\n        }\n   \
    \     var myAnimals = [\n            Animals(pet: \"Cat\"),\n            Animals(pet:\
    \ \"Dog\"),\n            Animals(pet: \"Turtle\"),\n            Animals(pet: \"\
    Ferret\"),\n            Animals(pet: \"Parrot\"),\n            Animals(pet: \"\
    Goldfish\"),\n            Animals(pet: \"Lizard\"),\n            Animals(pet:\
    \ \"Canary\"),\n            Animals(pet: \"Tarantula\"),\n            Animals(pet:\
    \ \"Hamster\")\n        ]\n    ```\n\n4.  Add a `List` inside the `var body: some\
    \ View` like this:  \n\n    ```\n    var body: some View {\n        List(myAnimals)\
    \ {\n            Text($0.pet)\n        }\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:  \n\n    ```\n    import SwiftUI\n\n    struct ContentView:\
    \ View {\n        struct Animals: Identifiable {\n            let pet: String\n\
    \            let id = UUID()\n        }\n        var myAnimals = [\n         \
    \   Animals(pet: \"Cat\"),\n            Animals(pet: \"Dog\"),\n            Animals(pet:\
    \ \"Turtle\"),\n            Animals(pet: \"Ferret\"),\n            Animals(pet:\
    \ \"Parrot\"),\n            Animals(pet: \"Goldfish\"),\n            Animals(pet:\
    \ \"Lizard\"),\n            Animals(pet: \"Canary\"),\n            Animals(pet:\
    \ \"Tarantula\"),\n            Animals(pet: \"Hamster\")\n        ]\n        var\
    \ body: some View {\n            List(myAnimals) {\n                Text($0.pet)\n\
    \            }\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\nNotice how much shorter the code looks to create a\
    \ `List` compared with the previous version that required a `ForEach` loop.\n\n\
    # Creating Groups in a List\n\nIf you have many items displayed in a `List`, it\
    \ can be hard to scroll through all this data to find the item you want. To solve\
    \ this problem, lists let you create sections as shown in Figure [13-4](#329781_7_En_13_Chapter.xhtml#Fig4).\n\
    \n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig4_HTML.png)  \nA screenshot\
    \ denotes a list of creatures under the mammal, reptile, bird, and other sections.\
    \ The mammal section comprises cat, dog, ferret, and hamster. Turtle and lizard\
    \ are under the reptile section. The bird section has parrot and canary. The other\
    \ section has tarantula and goldfish.  \n\n**Figure 13-4** — Displaying the contents\
    \ of a `List` in sections\n\nTo define sections, you need to create two structures.\
    \ One structure defines the section headings, and the second structure defines\
    \ the data you want to display. To define the section headings, you need to define\
    \  \n\n- A `String` constant to hold each section’s name  \n- An array constant\
    \ to hold an array of structures that contain the actual data to display  \n-\
    \ An `ID` that defines a unique ID for each section  \n\nThe structure name must\
    \ be defined as `Identifiable` to create a unique ID such as  \n\n```\nstruct\
    \ SectionHeading: Identifiable {\n    let name: String\n    let animalList: [Animals]\n\
    \    let id = UUID()\n}\n```\n\nThe preceding structure uses `animalList` to store\
    \ an array of structures called `Animals`. This `Animals` structure needs  \n\n\
    - A `String` constant to hold the data you want to display in the `List`  \n-\
    \ An `ID` that defines a unique ID for each item in the `List`  \n\nThis second\
    \ structure must be defined as `Hashable` and `Identifiable` such as  \n\n```\n\
    struct Animals: Hashable, Identifiable {\n    let pet: String\n    let id = UUID()\n\
    }\n```\n\nFinally, you can create an array that defines the sections and the items\
    \ within each section such as  \n\n```\nvar myAnimals = [\n    SectionHeading(name:\
    \ \"Mammals\",\n        animalList: [\n            Animals(pet: \"Cat\"),\n  \
    \          Animals(pet: \"Dog\"),\n            Animals(pet: \"Ferret\"),\n   \
    \         Animals(pet: \"Hamster\")])\n    ]\n```\n\nThen to display items in\
    \ a `List`, you need to use nested `ForEach` loops. The outer `ForEach` loop defines\
    \ the section names such as  \n\n```\nForEach(myAnimals) { heading in\n    Section(header:\
    \ Text(\"\\(heading.name) Section\")) {\n    }\n}\n```\n\nThen the inner `ForEach`\
    \ loop defines the items to appear within each section such as  \n\n```\nForEach(heading.animalList)\
    \ { creature in\n    Text(creature.pet)\n}\n```\n\nTo see how to create a `List`\
    \ divided into sections, follow these steps:  \n\n1.  Create a new SwiftUI iOS\
    \ App project and give it any name you wish such as “ListSections.”  \n2.  Click\
    \ the `ContentView` file in the Navigator pane.  \n3.  Define a structure under\
    \ the `struct ContentView: some View` line to define the data you want to display\
    \ in the `List` like this:  \n\n    ```\n    struct Animals: Hashable, Identifiable\
    \ {\n        let pet: String\n        let id = UUID()\n    }\n    ```\n\n4.  Add\
    \ a second structure underneath to define the section names to display in the\
    \ `List` like this:  \n\n    ```\n    struct SectionHeading: Identifiable {\n\
    \        let name: String\n        let animalList: [Animals]\n        let id =\
    \ UUID()\n    }\n    ```\n\n5.  Add an array to list the sections and the items\
    \ to appear within each section like this:  \n\n    ```\n    var myAnimals = [\n\
    \        SectionHeading(name: \"Mammals\",\n            animalList: [\n      \
    \          Animals(pet: \"Cat\"),\n                Animals(pet: \"Dog\"),\n  \
    \              Animals(pet: \"Ferret\"),\n                Animals(pet: \"Hamster\"\
    )]),\n        SectionHeading(name: \"Reptiles\",\n            animalList: [\n\
    \                Animals(pet: \"Turtle\"),\n                Animals(pet: \"Lizard\"\
    )]),\n        SectionHeading(name: \"Birds\",\n            animalList: [\n   \
    \             Animals(pet: \"Parrot\"),\n                Animals(pet: \"Canary\"\
    )]),\n        SectionHeading(name: \"Other\",\n            animalList: [\n   \
    \             Animals(pet: \"Tarantula\"),\n                Animals(pet: \"Goldfish\"\
    )])\n    ]\n    ```\n\n6.  Add a `List` inside the `var body: some View` like\
    \ this:  \n\n    ```\n    var body: some View {\n        List {\n        }\n \
    \   ```\n\n7.  Add a `ForEach` loop inside the `List` to define the section name\
    \ like this:  \n\n    ```\n    var body: some View {\n        List {\n       \
    \     ForEach(myAnimals) { heading in\n                Section(header: Text(\"\
    \\(heading.name) Section\")) {\n                }\n            }\n        }\n\
    \    }\n    ```"
