  trans: "\n# 缩放动画\n\n创建动画的另一种方法是为视图定义两种不同的大小，即缩放。要定义视图大小的起始和结束状态，请使用 `.scaleEffect`\
    \ 修饰符并定义相对的尺寸变化。例如，`.scaleEffect(1)` 表示视图的当前大小。大于 1 的 `.scaleEffect` 值表示更大的尺寸或缩放比例，而小于\
    \ 1 的 `.scaleEffect` 值则表示更小的尺寸或缩放比例。\n\n要了解如何通过将视图缩放到不同大小来制作动画，请按以下步骤操作：\n\n1.\
    \ 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“AnimationScale”。\n2. 在导航器面板中点击 `ContentView`\
    \ 文件。\n3. 在 `struct ContentView: View` 代码行下方添加一个 `State` 变量，如下所示：\n\n```\n@State\
    \ private var changeMe = false\n```\n\n4. 在 `var body: some View` 内部添加一个 `Image`\
    \ 视图，如下所示：\n\n```\nvar body: some View {\n    Image(systemName: \"tortoise.fill\"\
    )\n        .font(.system(size:100))\n        .foregroundColor(.red)\n        .scaleEffect(changeMe\
    \ ? 1.75 : 1)\n}\n```\n\n这会在屏幕上显示一个大小为 100 的海龟图标，使其更容易看清。然后将海龟图标着色为红色，并使用 `.scaleEffect`\
    \ 修饰符在原始大小的 1.75 倍和原始大小之间切换。\n\n5. 像这样为 `Image` 视图添加以下修饰符：\n\n```\n.animation(.default,\
    \ value: changeMe)\n.onTapGesture {\n    changeMe.toggle()\n}\n```\n\n这为 `Image`\
    \ 视图添加了 `.animation` 修饰符，使其大小变化呈现动画效果。然后，`.onTapGesture` 修饰符检测点击手势，将 `changeMe`\
    \ `State` 变量从 `true` 切换为 `false`（或从 `false` 切换为 `true`）。整个 `ContentView` 文件应如下所示：\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n    @State private var changeMe\
    \ = false\n    var body: some View {\n        Image(systemName: \"tortoise.fill\"\
    )\n            .font(.system(size:100))\n            .foregroundColor(.red)\n\
    \            .scaleEffect(changeMe ? 1.75 : 1)\n            .animation(.default,\
    \ value: changeMe)\n            .onTapGesture {\n                changeMe.toggle()\n\
    \            }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n   \
    \ static var previews: some View {\n        ContentView()\n    }\n}\n```\n\n6.\
    \ 在画布面板中点击“Live”图标。\n7. 点击海龟图像。请注意，每次点击海龟图像时，它都会在缩小和放大之间切换。\n\n# 旋转动画\n\n动画旋转涉及使用\
    \ `.rotationEffect` 修饰符改变视图的角度。`.rotationEffect` 值为 0 表示不旋转，而小于或大于 0 的旋转值则分别使视图逆时针或顺时针旋转。\n\
    \n要了解如何通过将视图旋转不同角度来制作动画，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“AnimationRotate”。\n\
    2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 代码行下方添加两个 `State`\
    \ 变量，如下所示：\n\n```\n@State var myDegrees: Double = 0.0\n@State var flag = false\n\
    ```\n\n4. 在 `VStack` 内部添加一个 `Text` 视图，如下所示：\n\n```\nvar body: some View {\n  \
    \  VStack {\n        Text(\"Hello, world!\")\n            .padding()\n       \
    \     .rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n            .animation(.default,\
    \ value: flag)\n```\n\n此 `Text` 视图使用 `.rotationEffect` 定义起始和结束角度。然后使用 `.animation`\
    \ 修饰符在 `Text` 视图在起始和结束角度之间旋转时为其添加动画效果。每当 `flag` 变量发生变化时，`.animation` 修饰符就会显示动画。\n\
    \n5. 在 `VStack` 内部的 `Text` 视图下方添加一个 `Button` 和一个 `Slider`，如下所示：\n\n```\nvar body:\
    \ some View {\n    VStack {\n        Text(\"Hello, world!\")\n            .padding()\n\
    \            .rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n         \
    \   .animation(.default, value: flag)\n        Button(\"Animate now\") {\n   \
    \         flag.toggle()\n        }\n        Slider(value: $myDegrees, in: -180...180,\
    \ step: 1)\n            .padding()\n    }\n}\n```\n\n`Slider` 允许你在 -180 度到 180\
    \ 度之间选择一个角度。整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    @State var myDegrees: Double = 0.0\n    @State var flag = false\n\
    \    var body: some View {\n        VStack {\n            Text(\"Hello, world!\"\
    )\n                .padding()\n                .rotationEffect(Angle(degrees:\
    \ flag ? myDegrees : 0))\n                .animation(.default, value: flag)\n\
    \            Button(\"Animate now\") {\n                flag.toggle()\n      \
    \      }\n            Slider(value: $myDegrees, in: -180...180, step: 1)\n   \
    \             .padding()\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6. 在画布面板中点击“Live”图标。\n7. 向左或向右拖动 `Slider` 来定义结束角度。（起始角度为 0。）\n8. 点击 `Button`。请注意，当\
    \ `Text` 视图旋转到新角度时，`.animation` 修饰符会为其添加动画效果。\n\n# 动画选项\n\n到目前为止，我们一直在 `.animation`\
    \ 修饰符中使用 `.default` 设置。虽然这可行，但你还可以选择其他几种动画选项：\n\n- `.easeIn` – 动画开始较慢，然后加速\n-\
    \ `.easeOut` – 动画在接近结束时减慢\n- `.easeInOut` – 动画开始较慢，然后加速，最后接近结束时减速（与 `.default`\
    \ 相同）\n- `.linear` – 动画从开始到结束保持恒定速度\n\n通过选择不同的 `.animation` 选项，你可以调整动画运行时的外观。要比较这些不同的\
    \ `.animation` 选项，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“CompareAnimation”。\n\
    2. 在导航器面板中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 代码行下方添加一个 `State`\
    \ 变量，如下所示：\n\n```\n@State private var start = false\n```\n\n4. 在 `var body: some\
    \ View` 中添加一个 `VStack`。\n5. 在 `VStack` 内部添加一个 `Button`，如下所示：\n\n```\nvar body:\
    \ some View {\n    VStack {\n        Button(\"Start animation\") {\n         \
    \   start.toggle()\n        }\n```\n\n6. 在 `Button` 下方添加一个包含四个 `Text` 视图的 `HStack`，如下所示：\n\
    \n```\nHStack {\n    Text(\"easeIn\")\n        .offset(x: 0, y: start ? 450 :\
    \ 0)\n        .animation(.easeIn, value: start)\n    Text(\"easeOut\")\n     \
    \   .offset(x: 0, y: start ? 450 : 0)\n        .animation(.easeOut, value: start)\n\
    \    Text(\"easeInOut\")\n        .offset(x: 0, y: start ? 450 : 0)\n        .animation(.easeInOut,\
    \ value: start)\n    Text(\"linear\")\n        .offset(x: 0, y: start ? 450 :\
    \ 0)\n        .animation(.linear, value: start)\n}.position(x: 150, y: 10)\n```\n\
    \n请注意，`.position` 修饰符最初将整个 `HStack` 及其所有四个 `Text` 视图放置在靠近屏幕顶部的位置。整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State private\
    \ var start = false\n    var body: some View {\n        VStack {\n           \
    \ Button(\"Start animation\") {\n                start.toggle()\n            }\n\
    \            HStack {\n                Text(\"easeIn\")\n                    .offset(x:\
    \ 0, y: start ? 450 : 0)\n                    .animation(.easeIn, value: start)\n\
    \                Text(\"easeOut\")\n                    .offset(x: 0, y: start\
    \ ? 450 : 0)\n                    .animation(.easeOut, value: start)\n       \
    \         Text(\"easeInOut\")\n                    .offset(x: 0, y: start ? 450\
    \ : 0)\n                    .animation(.easeInOut, value: start)\n           \
    \     Text(\"linear\")\n                    .offset(x: 0, y: start ? 450 : 0)\n\
    \                    .animation(.linear, value: start)\n            }.position(x:\
    \ 150, y: 10)\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n7. 在画布面板中点击“Live”图标。\n8. 点击 `Button`。请注意，所有四个 `Text` 视图都会向下移动到屏幕底部，但由于它们使用了不同的\
    \ `.animation` 选项，即使它们同时开始和停止，动画效果也略有不同。\n"
- fmt: "### Using Delays and Duration in Animation\n\nTwo ways to modify animation\
    \ by time include delays and duration. A delay lets you specify how many seconds\
    \ to wait before starting the animation. A duration lets you specify how long\
    \ the animation should last. Larger time values make the animation run slower,\
    \ while shorter time values make the animation run faster.\n\nTo define a delay,\
    \ add the `.delay` modifier to the `.animation` option you want, such as:\n\n\
    ```\n.animation(.linear.delay(2.5), value: yourVariableNameHere)\n```\n\nTo see\
    \ how delays work, follow these steps:\n\n1.  Load the previous \"CompareAnimation\"\
    \ Xcode project.\n2.  Add the `.delay` modifier to each `.animation` option like\
    \ this:\n\n```\n    HStack {\n    Text(\"easeIn\")\n    .offset(x: 0, y: start\
    \ ? 450 : 0)\n    .animation(.easeIn.delay(0.5))\n    Text(\"easeOut\")\n    .offset(x:\
    \ 0, y: start ? 450 : 0)\n    .animation(.easeOut.delay(1.0))\n    Text(\"easeInOut\"\
    )\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeInOut.delay(1.5))\n\
    \    Text(\"linear\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.linear.delay(2.5))\n\
    \    }.position(x: 150, y: 10)\n```\n\nThe entire `ContentView` file should look\
    \ like this:\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
