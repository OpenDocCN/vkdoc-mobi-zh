- fmt: "# Creating Area Charts\n\nArea charts are essentially line charts but filled\
    \ in to make them easier to read as shown in Figure [16-10](#329781_7_En_16_Chapter.xhtml#Fig10).\n\
    \n![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig10_HTML.jpg)\n\nA set of\
    \ two graphs consisting of a line graph and an area graph. Both graphs denote\
    \ multiple peaks and troughs.\n\nFigure 16-10\n\nAn area chart can be easier to\
    \ understand than a line chart\n\nLike line charts, area charts are best for plotting\
    \ trends consisting of a large number of data points. That way you can easily\
    \ see how the data changed over time.\n\nTo see how to create an area chart, follow\
    \ these steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as `\"AreaChart\"`.\n2.  Click the `ContentView` file in the Navigator\
    \ pane. Add the `Charts` framework underneath the `SwiftUI` framework like this:\n\
    1.  Add a structure underneath the `\"import Charts\"` line like this:\n\n   \
    \ ```\n    struct SalesPeople: Identifiable {\n    var name: String\n    var sales:\
    \ Int\n    var id = UUID()\n    }\n    ```\n\n2.  Add an array underneath the\
    \ structure like this:\n\n    ```\n    var mySalesArray: [SalesPeople] = [\n \
    \   .init(name: \"Oscar\", sales: 50),\n    .init(name: \"Mayer\", sales: 43),\n\
    \    .init(name: \"George\", sales: 62),\n    .init(name: \"Hormel\", sales: 56),\n\
    \    .init(name: \"Mike\", sales: 27),\n    .init(name: \"Spam\", sales: 38),\n\
    \    .init(name: \"Jan\", sales: 33),\n    .init(name: \"Lundy\",sales: 43)\n\
    \    ]\n    ```\n\n3.  Add a `Chart` inside a `VStack` like this:\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    Chart (mySalesArray) { x in\n  \
    \  }\n    }\n    ```\n\n4.  Add an `AreaMark` inside the `Chart` like this:\n\n\
    \    ```\n    VStack {\n    Chart (mySalesArray) { x in\n    AreaMark(x: .value(\"\
    Name\", x.name),\n    y: .value(\"Sales\", x.sales))\n    }\n    }\n    ```\n\n\
    \    The entire `ContentView` file should look like this:\n\n    ```\n    import\
    \ SwiftUI\n    import Charts\n    struct SalesPeople: Identifiable {\n    var\
    \ name: String\n    var sales: Int\n    var id = UUID()\n    }\n    var mySalesArray:\
    \ [SalesPeople] = [\n    .init(name: \"Oscar\", sales: 50),\n    .init(name: \"\
    Mayer\", sales: 43),\n    .init(name: \"George\", sales: 62),\n    .init(name:\
    \ \"Hormel\", sales: 56),\n    .init(name: \"Mike\", sales: 27),\n    .init(name:\
