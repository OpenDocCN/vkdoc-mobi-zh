    \n7. Click the Live icon in the Canvas pane.\n8. Click the `Button`. Notice that\
    \ all four `Text` views drop to the bottom of the screen, but because they all\
    \ use different `.animation` options, the animation appears slightly different\
    \ even though they all start and stop at the same time."
  raw: "## Scaling Animation\n\nAnother way to create animation is to define two different\
    \ sizes for a view, known as scaling. To define the starting and ending states\
