    \    var body: some View {\n    Image(systemName: \"tortoise.fill\")\n    .font(.system(size:100))\n\
    \    .foregroundColor(.red)\n    .scaleEffect(changeMe ? 1.75 : 1)\n    }\n  \
    \  ```\n\n    This displays a tortoise icon on the screen at a size of 100 to\
