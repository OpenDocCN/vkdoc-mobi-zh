    \   var name: String\n        var region: String\n        var sales: Int\n   \
    \     var id = UUID()\n    }\n\n    var mySalesArray: [SalesPeople] = [\n    \
    \    .init(name: \"Oscar\", region: \"North\", sales: 50),\n        .init(name:\
    \ \"Mayer\", region: \"South\", sales: 43),\n        .init(name: \"George\", region:\
    \ \"East\", sales: 35),\n        .init(name: \"Hormel\", region: \"West\", sales:\
    \ 56),\n        .init(name: \"Mike\", region: \"North\", sales: 27),\n       \
    \ .init(name: \"Spam\", region: \"East\", sales: 38),\n        .init(name: \"\
    Jan\", region: \"West\", sales: 33),\n        .init(name: \"Lundy\", region: \"\
    South\", sales: 43)\n    ]\n\n    struct ContentView: View {\n        var body:\
    \ some View {\n            VStack {\n                Chart (mySalesArray) { x\
    \ in\n                    RectangleMark(x: .value(\"Name\", x.name),\n       \
    \                           y: .value(\"Sales\", x.sales))\n                 \
    \   .foregroundStyle(by: .value(\"Region\", x.region))\n                }\n  \
    \          }\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n8.  点击画布面板中的“Live”图标。\n\n```swift\nimport Charts\n```\n\
    \n## 总结\n\n许多应用依赖存储大量数据。但不幸的是，如果用户无法理解这些数据，那么所有数据都毫无意义。因此，您可能需要使用图表将数据可视化，以发现趋势、识别潜在问题或比较数据。通过使数据易于理解，图表可以提升数据的实用性。\n\
    \n折线图有助于识别趋势，例如销售额的下降或上升。面积图通过填充折线下方空白区域，能让此类趋势更易观察。\n\n散点图常用于发现不符合正常数据集群的异常值。矩形图则便于突出显示数值。如同面积图是填充后的折线图，条形图也是填充后的矩形图。\n\
    \n在图表（如条形图）中堆叠数据，可以让你看到整体的各部分占比。添加规则线可以让你绘制线条，以突出显示图表中的特定值，例如平均销售额。\n\n每种图表都基于用户偏好而各有优劣，因此请尝试不同的图表，直到找到适合您应用和用户的类型。\n\
    \n# 17. 使用导航堆栈\n\n只有最简单的应用（如计算器应用）才由单个屏幕组成。然而，大多数应用通常需要两个或更多屏幕来显示信息。在 SwiftUI\
    \ 中，你可以通过创建独立的结构体来定义应用用户界面的每个屏幕。然后，你需要提供一种从一个屏幕跳转到另一个屏幕的方法。\n\n从一个屏幕跳转到另一个屏幕的最简单方法之一是通过`NavigationStack`，它按顺序显示多个屏幕。许多\
    \ iOS 应用（如“设置”）都常用此`NavigationStack`，让用户查看不同的选项，如图 17-1 所示。\n\n![](img/329781_7_En_17_Fig1_HTML.png)\n\
    \n一组 3 张手机截图。显示含“通用”选项的设置页面指向通用选项页面。通用选项页面列出多个选项，其中“键盘”选项被选中。键盘选项页面包含所有键盘选项。\n\
    \n**图 17-1**  \n`NavigationStack`让从一个屏幕跳转到另一个屏幕变得简单\n\n在图 17-1 中，用户可以点击主屏幕上的“设置”图标来显示设置屏幕。点击“通用”会打开通用屏幕。接着点击“键盘”会打开键盘屏幕。请注意，要返回，只需点击左上角的“返回”按钮即可。\n\
    \n从键盘屏幕，返回按钮会把你带回通用屏幕。从通用屏幕，返回按钮会把你带回设置屏幕。`NavigationStack`的作用仅仅是让用户能够按顺序从一个屏幕跳转到另一个屏幕。\n"
- fmt: "# Using a Navigation Stack\n\nA `NavigationStack` can hold up to ten (10)\
    \ views just like any other type of stack (`VStack`, `HStack`, `ZStack`). A `NavigationStack`\
    \ contains multiple views using code like this:\n\n```\nNavigationStack {\n  \
    \  // Put multiple views here\n}\n```\n\nWithin a `NavigationStack`, you need\
    \ one or more `NavigationLink`s where each `NavigationLink` defines a view to\
    \ click and another view to appear. One way to create a `NavigationLink` is to\
    \ display text with no extra formatting and then define the view to appear like\
    \ this:\n\n```\nNavigationLink(\"Link text\") {\n    // View to appear\n}\n```\n\
    \nThe view that appears when the user selects the `NavigationLink` can vary from\
    \ a single view (such as a `Text` view) to a stack containing multiple views.\n\
    \nA second way to create a `NavigationLink` lets you format the link's appearance\
    \ and define the view to appear like this:\n\n```\nNavigationLink {\n    // View\
    \ to appear\n} label: {\n    // View that defines the navigation link\n}\n```\n\
    \nTo see how to create a simple Navigation Stack with different ways of creating\
    \ a `NavigationLink`, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as \"NavigationStack.\"\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add a `NavigationStack` under the `var body:\
    \ some View` line like this:\n\n    ```\n    var body: some View {\n        NavigationStack\
    \ {\n        }\n    }\n    ```\n\n4. Add four `NavigationLink`s inside the `NavigationStack`\
    \ like this:\n\n    ```\n    var body: some View {\n        NavigationStack {\n\
    \            NavigationLink {\n                Text(\"The 1st view\")\n      \
    \      } label: {\n                Text(\"First link\")\n                    .font(.largeTitle)\n\
    \            }.padding()\n            NavigationLink {\n                Text(\"\
    The 2nd view\")\n            } label: {\n                Label {\n           \
    \         Text(\"Second link\")\n                } icon: {\n                 \
    \   Image(systemName: \"sun.and.horizon.circle\")\n                }\n       \
    \     }.padding()\n            NavigationLink {\n                Image(systemName:\
    \ \"ellipsis.message\")\n                    .font(.system(size: 125))\n     \
    \       } label: {\n                VStack {\n                    Text(\"Third\
    \ view\")\n                    Image(systemName: \"figure.archery\")\n       \
    \         }.font(.largeTitle)\n            }.padding()\n            NavigationLink(\"\
    The 4th view\") {\n                VStack {\n                    Image(systemName:\
    \ \"airplane.departure\")\n                        .font(.system(size: 120))\n\
    \                    Text(\"Departure time is 12:15\")\n                     \
    \   .font(.largeTitle)\n                }\n            }.padding()\n        }\n\
    \    }\n    ```\n\n    Notice that each `NavigationLink` defines a different way\
    \ to create the navigation link and the view that appears when the user selects\
    \ that particular navigation link.\n\n    The entire `ContentView` file should\
    \ look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n        var body: some View {\n            NavigationStack {\n          \
    \      NavigationLink {\n                    Text(\"The 1st view\")\n        \
    \        } label: {\n                    Text(\"First link\")\n              \
    \          .font(.largeTitle)\n                }.padding()\n                NavigationLink\
    \ {\n                    Text(\"The 2nd view\")\n                } label: {\n\
    \                    Label {\n                        Text(\"Second link\")\n\
    \                    } icon: {\n                        Image(systemName: \"sun.and.horizon.circle\"\
    )\n                    }\n                }.padding()\n                NavigationLink\
    \ {\n                    Image(systemName: \"ellipsis.message\")\n           \
    \             .font(.system(size: 125))\n                } label: {\n        \
    \            VStack {\n                        Text(\"Third view\")\n        \
    \                Image(systemName: \"figure.archery\")\n                    }.font(.largeTitle)\n\
    \                }.padding()\n                NavigationLink(\"The 4th view\"\
    ) {\n                    VStack {\n                        Image(systemName: \"\
    airplane.departure\")\n                            .font(.system(size: 120))\n\
    \                        Text(\"Departure time is 12:15\")\n                 \
    \           .font(.largeTitle)\n                    }\n                }.padding()\n\
    \            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n5. Click the Live icon in the Canvas pane. All four\
    \ `NavigationLink`s appear on the user interface.\n6. Click any of the displayed\
    \ `NavigationLink`s. The view defined for that `NavigationLink` appears.\n\n##\
    \ Adding a Title to a Navigation Stack\n\nA `NavigationStack` simply displays\
    \ one or more `NavigationLink`s on the screen. However, you may want to make sure\
    \ users understand the purpose of these `NavigationLink`s by adding a title over\
    \ them. Titles can appear in one of two styles (`.large` or `.inline`) as shown\
    \ in Figure 17-2.\n\n![Figure 17-2](images/329781_7_En_17_Chapter/329781_7_En_17_Fig2_HTML.jpg)\n\
    \n**Figure 17-2** Comparing the appearance of a `.large` and an `.inline` title\
    \ above a Navigation Stack\n\nTo display a title above the Navigation Stack, use\
    \ the following modifier:\n\n```\n.navigationTitle(\"Navigation Stack\")\n```\n\
    \nTo change the appearance of a title, use the following modifier:\n\n```\n.navigationBarTitleDisplayMode(.inline)\n\
    ```\n\n> **Note:** When adding the `.navigationTitle` and `.navigationBarTitleDisplayMode`\
    \ modifiers to a `NavigationStack`, place the modifiers inside the last curly\
    \ bracket of the `NavigationStack` like this:\n>\n> ```\n> NavigationStack {\n\
    >     .navigationTitle(\"Navigation Stack Title\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
    > }\n> ```\n\nThe `.navigationTitle` modifier defines the text that will appear\
    \ at the top of the screen, above the Navigation Stack. The `.navigationBarTitleDisplayMode`\
    \ modifier defines how that title appears on the screen. The two options are `.large`\
    \ and `.inline` (see Figure 17-2). If you do not define the `.navigationBarTitleDisplayMode`,\
    \ `.large` is the default value.\n\nTo see how to display a title for a Navigation\
    \ Stack and change its appearance, follow these steps:\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as \"NavigationStackTitle.\"\
    \n2. Click the `ContentView` file in the Navigator pane.\n3. Add a state variable\
    \ under the `struct ContentView: View` line like this:\n\n    ```\n    @State\
    \ var titleType = NavigationBarItem.TitleDisplayMode.large\n    ```\n\n4. Add\
    \ a `NavigationStack` inside the `var body: some View` like this:\n\n    ```\n\
    \    var body: some View {\n        NavigationStack {\n        }\n    }\n    ```\n\
    \n5. Add a `NavigationLink` inside the `NavigationStack` like this:\n\n    ```\n\
    \    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"The 1st view\")\n            } label: {\n        \
    \        Text(\"First link\")\n                    .font(.largeTitle)\n      \
    \      }.padding()\n        }\n    }\n    ```\n\n6. Add the `.navigationTitle`\
    \ and `.navigationBarTitleDisplayMode` modifiers like this:\n\n    ```\n    var\
    \ body: some View {\n        NavigationStack {\n            NavigationLink {\n\
    \                Text(\"The 1st view\")\n            } label: {\n            \
    \    Text(\"First link\")\n                    .font(.largeTitle)\n          \
    \  }.padding()\n            .navigationTitle(\"Navigation Stack\")\n         \
    \   .navigationBarTitleDisplayMode(titleType)\n        }\n    }\n    ```\n\n>\
    \ **Note:** The `.navigationTitle` modifier not only defines the title above the\
    \ Navigation Stack but also defines the text that appears in the Back button.\
    \ If the `.navigationTitle` modifier does not exist, the Back button simply displays\
    \ \"Back.\"\n\n7. Add an `HStack` with two `Button`s inside like this:\n\n   \
    \ ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"The 1st view\")\n            } label: {\n        \
    \        Text(\"First link\")\n                    .font(.largeTitle)\n      \
    \      }.padding()\n            .navigationTitle(\"Navigation Stack\")\n     \
    \       .navigationBarTitleDisplayMode(titleType)\n            HStack(spacing:\
    \ 50) {\n                Button(\".large\") {\n                    titleType =\
    \ NavigationBarItem.TitleDisplayMode.large\n                }\n              \
    \  Button(\".inline\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.inline\n\
    \                }\n            }\n        }\n    }\n    ```\n\n8. Click the Live\
    \ icon in the Canvas pane.\n9. Click the `.large` and `.inline` buttons to see\
    \ how the Navigation Stack title's appearance can change."
