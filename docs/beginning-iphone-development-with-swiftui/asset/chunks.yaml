    \ View {\n    var passedData: String\n    var body: some View {\n        HStack\
    \ {\n            Spacer()\n            VStack {\n                Spacer()\n  \
    \              Text(\"You chose = \\(passedData)\")\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.orange)\n   \
    \ }\n}\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n```\n\nThis\
    \ file creates a `SeparateFileView` structure that declares a `passedData` `String`\
    \ variable. Because this `SeparateFileView` structure is stored in a separate\
    \ file, it contains a `struct PreviewProvider` where we must use the `passedData`\
    \ parameter as well.\n\n9. Click `ContentView` in the Navigator pane to return\
    \ to the `ContentView` structure.\n10. Click the Live icon in the Canvas pane.\n\
    11. Click the Heads navigation link. The `FileView` structure appears, displaying\
    \ “You chose = Heads”.\n12. Click the Back button in the upper-left corner.\n\
    13. Click the Tails navigation link. The `SeparateFileView` structure appears,\
    \ displaying “You chose = Tails”."
  raw: "### Passing Data Between Structures in a Navigation Stack\n\nThe previous\
    \ project created two structures where one structure was stored in the ContentView\
    \ file and a second structure was stored in a separate file. In both cases, the\
    \ structures defined user interfaces that displayed static information unconnected\
    \ to anything from the original structure (ContentView).\n\nIn many cases, you\
    \ may want data from one structure to appear in a second structure. That means\
    \ we must pass data from one structure to another.\n\nFortunately, this task is\
    \ similar to passing data between functions. When a structure needs to receive\
    \ data, we just need to declare a property by creating a variable, giving that\
    \ variable a descriptive name, and defining the data type that variable can hold\
    \ such as String or Double like this:\n\n```\nstruct FileView: View {\nvar choice:\
    \ String\n```\n\nThis defines a variable called “choice” that can hold a String.\
    \ To pass data to this structure, we can load this structure by calling the structure\
    \ name (FileView) followed by this “choice” variable as a parameter like this:\n\
    \n```\nFileView(choice: \"Heads\")\n```\n\nWhen passing data to a structure stored\
    \ in the same file, we just need to follow this two-step process:\n\n*   Declare\
    \ one or more variables inside the structure to receive data.\n\n*   Call that\
    \ structure using its variables as parameters.\n\nHowever, when passing data to\
    \ a structure stored in a separate file, there’s an additional step necessary.\
    \ Because a structure stored in a separate file also contains a second structure\
    \ that displays the user interface in the Canvas pane, this preview structure\
    \ must include the structure’s parameter and pass it data as well like this:\n\
    \n```\nstruct SeparateFileView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nSeparateFileView(passedData: \"\")\n}\n}\n```\n\nTo see how to\
    \ pass data between structures, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “NavigationStackPassData.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Edit the struct\
    \ ContentView structure like this:\n\n```\n    struct ContentView: View {\n  \
    \  var body: some View {\n    NavigationStack {\n    VStack (spacing: 26) {\n\
    \    Text(\"Choose Heads or Tails\")\n    NavigationLink(destination: FileView(choice:\
    \ \"Heads\")) {\n    Text(\"Heads\")\n    }\n    NavigationLink(destination: SeparateFileView(passedData:\
    \ \"Tails\")) {\n    Text(\"Tails\")\n    }\n    .navigationTitle(\"Flip a Coin\"\
    )\n    }\n    }\n    }\n    }\n    ```\n\nThe preceding code defines two NavigationLinks\
    \ where one calls a structure called FileView with a parameter of “choice:” that\
    \ gets passed “Heads”. The second NavigationLink calls a structure called SeparateFileView\
    \ with a parameter of “passedData:” that gets passed “Tails”.\n\n4.  Add a new\
    \ structure underneath the struct ContentView like this:\n\n```\n    struct FileView:\
    \ View {\n    var choice: String\n    var body: some View {\n    HStack {\n  \
    \  Spacer()\n    VStack {\n    Spacer()\n    Text(\"You chose = \\(choice)\")\n\
    \    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n  \
    \  }\n    ```\n\nThis FileView structure declares a “choice” variable that can\
    \ hold a String. Then it displays this “choice” variable in a Text view that shows\
    \ “You chose = ”. The entire ContentView file should look like this:\n\n```\n\
    \    import SwiftUI\n    struct ContentView: View {\n    var body: some View {\n\
    \    NavigationStack {\n    VStack (spacing: 26) {\n    Text(\"Choose Heads or\
    \ Tails\")\n    NavigationLink(destination: FileView(choice: \"Heads\")) {\n \
    \   Text(\"Heads\")\n    }\n    NavigationLink(destination: SeparateFileView(passedData:\
    \ \"Tails\")) {\n    Text(\"Tails\")\n    }\n    .navigationTitle(\"Flip a Coin\"\
    )\n    }\n    }\n    }\n    }\n    struct FileView: View {\n    var choice: String\n\
    \    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n\
    \    Text(\"You chose = \\(choice)\")\n    Spacer()\n    }\n    Spacer()\n   \
    \ }.background(Color.yellow)\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\nThis code creates a structure called FileView, but now we need to create\
    \ a second structure called SeparateFileView that declares a passedData String\
    \ variable.\n\n5.  Choose File ➤ New ➤ File. A dialog appears (see Figure [17-4](#329781_7_En_17_Chapter.xhtml#Fig4)).\n\
    \n6.  Click iOS near the top of the dialog, click Swift File, and then click Next.\
    \ Xcode asks for a name to give your newly created file.\n\n7.  Type SeparateFile\
    \ and click Create. Xcode creates a new Swift file.\n\n8.  Delete all code currently\
    \ in the SeparateFile and replace it with the following:\n\n```\n    import SwiftUI\n\
    \    struct SeparateFileView: View {\n    var passedData: String\n    var body:\
    \ some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    Text(\"\
    You chose = \\(passedData)\")\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n\
    \    }\n    }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    SeparateFileView(passedData: \"\")\n    }\n \
    \   }\n    ```\n\nThis file creates a SeparateFileView structure that declares\
    \ a passedData String variable. Because this SeparateFileView structure is stored\
    \ in a separate file, it contains a struct PreviewProvider where we must use the\
    \ passedData parameter as well.\n\n9.  Click ContentView in the Navigator pane\
    \ to return to the ContentView structure.\n\n10.  Click the Live icon in the Canvas\
    \ pane.\n\n11.  Click the Heads navigation link. The FileView structure appears,\
    \ displaying “You chose = Heads”.\n\n12.  Click the Back button in the upper-left\
