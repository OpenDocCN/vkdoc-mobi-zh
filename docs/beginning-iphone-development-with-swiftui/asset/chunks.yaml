- fmt: "### Defining the Opacity of an Image\n\nAnother way to modify the appearance\
    \ of an image is to define its opacity. An opacity of `0` means the image is invisible.\
    \ An opacity of `1` means the image appears with no changes whatsoever. The closer\
    \ the opacity is to `0`, the fainter the image. The closer the opacity is to `1`,\
    \ the sharper the image.\n\nTo use the `opacity` modifier, just define an opacity\
    \ value from `0` to `1` like this:\n\n```\n.opacity(0.75)\n```\n\nFigure [5-17](#329781_7_En_5_Chapter.xhtml#Fig17)\
    \ shows how different opacity values modify the appearance of an image.\n\n![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig17_HTML.jpg)\n\
    \nA set of 3 commands for image, resizable, scaled to fill, frame width and height,\
    \ and opacity values with their respective photographs of a cat sitting on a cloth.\n\
    \n**Figure 5-17.** Using different values for the `.opacity` modifier\n\nBy changing\
    \ the opacity of different views, you can stack them on top of each other within\
    \ a `ZStack` to create interesting visual effects as shown in Figure [5-18](#329781_7_En_5_Chapter.xhtml#Fig18).\n\
    \n![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig18_HTML.jpg)\n\nA set of commands\
    \ for `ZStack`, image, resizable, scaled to fill, frame width and height, opacity,\
    \ rounded rectangle, corner radius, fill, color, offset, text, and font with an\
    \ opaque photograph of a cat sitting on a cloth and the text, Norwegian forest\
    \ cat.\n\n**Figure 5-18.** The `.opacity` modifier combined with the `ZStack`\
    \ can create visual effects\n\n## Summary\n\nImages are another way to provide\
    \ information on the user interface. Images can be common geometric shapes such\
    \ as circles, ellipses, and rounded rectangles, icons that you can find in the\
    \ SF Symbols app, graphic images, or digital photographs you drag and drop into\
    \ the Assets folder of an Xcode project.\n\nIf you’re creating geometric shapes,\
    \ you can fill them with solid colors, custom colors, or gradients to create an\
    \ interesting visual blend of multiple colors. If you’re using SF Symbol icons,\
    \ you can adjust their size using the `.font` modifier. If you’re using images\
    \ stored in the Assets folder of your Xcode project, you can use the `.resizable`,\
    \ `.frame`, and `.aspectRatio`/`.scaleToFit`/`.scaleToFill` modifiers to define\
    \ the size and appearance of an image.\n\nTo create extra visual effects, you\
    \ can clip images into geometric shapes such as circles, add borders around images,\
    \ add shadows around images, and modify the opacity. With so many different ways\
    \ to adjust the appearance of images, you should be able to define an image to\
    \ appear exactly the way you want it to look on your user interface.\n\n# 6. Responding\
    \ to the User with Buttons and Segmented Controls\n\nEvery user interface needs\
    \ to display information to the user whether that information may be text or images.\
    \ However, another feature of a user interface is to accept commands from the\
    \ user. The simplest way to accept commands through a user interface is through\
    \ buttons.\n\nButtons represent a single command that can be as simple as a confirmation\
    \ such as OK or Cancel. To create a button, you need to define:\n\n- The title\
    \ that displays text on the button\n- Swift code that runs when the user taps\
    \ the button\n\nSwiftUI gives you two ways to create a button. The simplest way\
    \ just defines the text to appear on the title followed by the Swift code to run\
    \ when the user selects the button like this:\n\n```\nButton(\"Click here\") {\n\
    \    // code to run\n}\n```\n\nA second way to create a button gives you more\
    \ flexibility in modifying the appearance of the text on the button such as:\n\
    \n```\nButton {\n    // code to run\n} label: {\n    Text(\"Click here\")\n  \
    \      .font(.largeTitle)\n        .foregroundColor(.green)\n        .padding()\n\
    \        .border(Color.red, width: 6)\n}\n```\n\nThis second method uses a `Text`\
    \ view to define the text that appears on the title. Then it uses the `.font`\
    \ modifier to define the font size, the `.foregroundColor` modifier to display\
    \ the text in green, the `.padding` modifier to add space around the `Text` view,\
    \ and the `.border` modifier to add a red border with a width of 6 points around\
