    Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
    \    ```\n4.  在 `var body: some View` 行下面的 `VStack` 内添加一个 `List`，如下所示：\n    ```swift\n\
    \    var body: some View {\n        VStack {\n            List {\n           \
    \ }\n        }\n    }\n    ```\n5.  在 `List` 内部添加一个 `ForEach` 循环，以查找数组中的所有项目，索引从\
    \ `0` 到数组项目总数减 `1`，如下所示：\n    ```swift\n    var body: some View {\n        VStack\
    \ {\n            List {\n                ForEach(0...myArray.count - 1, id: \\\
    .self) { index in\n                    Text(myArray[index])\n                }\n\
    \            }\n        }\n    }\n    ```\n6.  向 `ForEach` 循环添加一个 `.listRowSeparator`\
    \ 修饰符，如下所示：\n    ```swift\n    var body: some View {\n        VStack {\n     \
    \       List {\n                ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                    Text(myArray[index])\n                }.listRowSeparator(.visible)\n\
    \            }\n        }\n    }\n    ```\n    这个 `.listRowSeparator` 会显示线条 (`.visible`)。\n\
    7.  向 `ForEach` 循环添加一个 `.listRowSeparatorTint` 修饰符，如下所示：\n    ```swift\n    var\
    \ body: some View {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }.listRowSeparator(.visible)\n                .listRowSeparatorTint(.red)\n\
    \            }\n        }\n    }\n    ```\n    你可以选择任何你想要的颜色，例如 `.orange` 或 `.purple`。整个\
    \ `ContentView` 文件应该如下所示：\n    ```swift\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"\
    Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
    \        var body: some View {\n            VStack {\n                List {\n\
    \                    ForEach(0...myArray.count - 1, id: \\.self) { index in\n\
    \                        Text(myArray[index])\n                    }.listRowSeparator(.visible)\n\
    \                    .listRowSeparatorTint(.red)\n                }\n        \
    \    }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider {\n\
    \        static var previews: some View {\n            ContentView()\n       \
