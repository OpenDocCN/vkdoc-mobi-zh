    ## 使用`GridRow`创建表格


    数据通常可以像电子表格或表格一样按行和列组织。为了在`SwiftUI`中模拟表格，有一个特殊的`GridRow`，它允许你定义在网格内组织的数据行，如图 19-7
    所示。


    ![](img/329781_7_En_19_Fig7_HTML.jpg)


