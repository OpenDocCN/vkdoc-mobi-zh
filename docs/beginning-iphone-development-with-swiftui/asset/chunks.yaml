    \   //                    Image(systemName: \"9.square\")\n    //            \
    \        Image(systemName: \"10.square\")\n    //                }.font(.largeTitle)\n\
    \    //            })\n    ```\n\nNotice that without the second Scroll View,\
    \ the LazyHGrid can now expand the spacing between rows as shown in Figure [19-5](#329781_7_En_19_Chapter.xhtml#Fig5).\n\
    \n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig6_HTML.jpg)\n\nA diagram\
    \ illustrates numbers 1 to 10 arranged in three rows vertically inside circles.\n\
