    ![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig4_HTML.jpg)\n\nA list of text\
    \ denotes the item numbers ranging from item number 17 to item number 34\\. A\
    \ vertical line on the side is indicated as the scroll indicator.\n\nFigure 15-4\n\
    \nThe scroll indicator appears on the right of a vertically scrolling Scroll View\n\
    \nAnother way to create a Scroll View is to define a direction to scroll (Axis.Set.horizontal\
    \ or Axis.Set.vertical) along with whether to show the scroll indicator or not\
    \ (showsIndicators: parameter) like this:\n\n```\nScrollView(Axis.Set.horizontal,\
    \ showsIndicators: false, content: {\n}\n```\n\nTo see how the Scroll View works,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as “ScrollView.”\n\n2.  Click the ContentView file in\
    \ the Navigator pane.\n\n3.  Add a ScrollView under the var body: some View line\
    \ like this:\n\n    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    })\n    }\n    .padding()\n    }\n  \
    \  ```\n\n    To shorten the ScrollView code, you could just do this:\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    ScrollView {\n    }\n    }\n   \
    \ ```\n\n4.  Add a ForEach loop inside the ScrollView like this:\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical, showsIndicators:\
    \ true, content: {\n    ForEach(0..<50) {\n    Text(\"Item #\\($0)     \")\n \
    \   }\n    })\n    }\n    .padding()\n    }\n    ```\n\n    The entire ContentView\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    ForEach(0..<50) {\n    Text(\"Item #\\\
    ($0)     \")\n    }\n    })\n    }\n    .padding()\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n5.  Click the Live icon in the Canvas pane.\n\n6.  Scroll\
    \ up and down on the list of “Item #” items displayed on the user interface. Notice\
    \ that as you scroll up or down, you can see the slider indicator on the right\
    \ side (see Figure [15-4](#329781_7_En_15_Chapter.xhtml#Fig4))."
  trans: "\n# 使用公开组\n\n`DisclosureGroup` 旨在隐藏一个或多个视图（如 `Text`、`Slider`、`Toggle` 等），直到用户点击\
    \ `DisclosureGroup` 名称将其展开。当展开时，`DisclosureGroup` 会在用户界面上显示一个或多个视图。\n\n**注意：**\
    \ 与堆栈类似，`DisclosureGroup` 最多可容纳十（10）个视图。但其中部分视图可以是能够容纳多个视图的堆栈。此外，你还可以在其他公开组中嵌套公开组。\n\
    \n要创建一个 `DisclosureGroup`，首先需要创建一段描述性的文本，它在用户界面上代表一个链接。这段文本最右侧会显示 `>` 符号，向用户表明此链接包含隐藏项目。其次，你需要创建一个视图列表（最多十个），这些视图将在用户选择\
    \ `DisclosureGroup` 链接时显示。\n\n要了解如何创建 `DisclosureGroup`，请遵循以下步骤：\n\n![](img/329781_7_En_15_Fig3_HTML.jpg)\n\
    \n**图 15-3** – 展开后的 `DisclosureGroup`\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DisclosureGroup”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 这行下方添加三个 `State`\
    \ 变量，具体如下：\n\n    ```\n    @State var sliderValue = 0.0\n    @State var message\
    \ = \"\"\n    @State var flag = true\n    ```\n\n4. 在 `var body: some View` 内添加一个\
    \ `DisclosureGroup`，具体如下：\n\n    ```\n    var body: some View {\n    DisclosureGroup(\"\
    展开我\") {\n    }.padding()\n    }\n    ```\n\n5. 在 `DisclosureGroup` 内部添加以下内容：\n\
    \n    ```\n    var body: some View {\n    DisclosureGroup(\"展开我\") {\n    Text(\"\
    你输入了 = \\(message)\")\n    TextField(\"在此输入\", text: $message)\n    .padding()\n\
    \    Text(flag ? \"开关 = true\" : \"开关 = false\")\n    Toggle(isOn: $flag) {\n\
    \    Text(\"开关\")\n    }.padding()\n    Text(\"滑动条值 = \\(sliderValue)\")\n   \
    \ Slider(value: $sliderValue, in: 0...15)\n    .padding()\n    }.padding()\n \
    \   }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State var sliderValue = 0.0\n    @State\
    \ var message = \"\"\n    @State var flag = true\n    var body: some View {\n\
    \    DisclosureGroup(\"展开我\") {\n    Text(\"你输入了 = \\(message)\")\n    TextField(\"\
    在此输入\", text: $message)\n    .padding()\n    Text(flag ? \"开关 = true\" : \"开关\
    \ = false\")\n    Toggle(isOn: $flag) {\n    Text(\"开关\")\n    }.padding()\n \
    \   Text(\"滑动条值 = \\(sliderValue)\")\n    Slider(value: $sliderValue, in: 0...15)\n\
    \    .padding()\n    }.padding()\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n6. 在画布窗格中点击 Live 图标。\n7. 点击“展开我” `DisclosureGroup` 链接，以显示隐藏在内的所有视图，如图\
    \ 15-3 所示。\n8. 点击文本字段并输入一些文字。请注意，无论你输入什么，都会显示在显示“你输入了 =”的 `Text` 视图中。\n9. 点击 `Toggle`。请注意，每次点击\
    \ `Toggle`，`Toggle` 上方的 `Text` 视图都会显示“开关 = true”或“开关 = false”。\n10. 左右拖动 `Slider`。请注意，当你拖动\
    \ `Slider` 时，其数值会显示在 `Slider` 上方显示“滑动条值 =”的 `Text` 视图中。\n11. 再次点击 `DisclosureGroup`\
    \ 链接以隐藏所有视图。每次点击 `DisclosureGroup` 链接时，它都会在显示 `DisclosureGroup` 内的所有视图和隐藏它们之间切换。\n\
    \n# 使用滚动视图\n\n当你在 `VStack` 内排列多个视图时，这些视图会固定在用户界面上。如果你显示的视图超出用户界面所能显示的范围，部分视图会被截断或隐藏于视线之外。为了解决这个问题，SwiftUI\
    \ 提供了一个名为 `ScrollView` 的特殊容器。\n\n与堆栈类似，`ScrollView` 可以容纳多个视图。但与堆栈不同的是，`ScrollView`\
    \ 允许用户垂直或水平滚动，以查看 `ScrollView` 的全部内容。滚动视图可以用于任何可能使用堆栈的地方，包括在 `DisclosureGroup`\
    \ 内部。\n\n创建 `ScrollView` 最简单的方法是像这样定义一个 `ScrollView`：\n\n```\nScrollView {\n//\
    \  多个视图在此\n}\n```\n\n这样你可以垂直滚动，右侧会有一个滚动指示器。滚动指示器让你了解当前滚动位置距离项目列表开头或结尾有多近（或多远），如图\
    \ 15-4 所示。\n\n![](img/329781_7_En_15_Fig4_HTML.jpg)\n\n**图 15-4** – 垂直滚动的 `ScrollView`\
    \ 右侧显示滚动指示器\n\n创建 `ScrollView` 的另一种方式是定义滚动方向（`Axis.Set.horizontal` 或 `Axis.Set.vertical`）以及是否显示滚动指示器（`showsIndicators:`\
    \ 参数），具体如下：\n\n```\nScrollView(Axis.Set.horizontal, showsIndicators: false, content:\
    \ {\n}\n```\n\n要了解 `ScrollView` 的工作原理，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“ScrollView”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 这行下方添加一个 `ScrollView`，具体如下：\n\
    \n    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    })\n    }\n    .padding()\n    }\n  \
    \  ```\n\n    为了缩短 `ScrollView` 的代码，你可以这样写：\n\n    ```\n    var body: some View\
    \ {\n    VStack {\n    ScrollView {\n    }\n    }\n    ```\n\n4. 在 `ScrollView`\
    \ 内部添加一个 `ForEach` 循环，具体如下：\n\n    ```\n    var body: some View {\n    VStack\
    \ {\n    ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n   \
    \ ForEach(0..<50) {\n    Text(\"项目 #\\($0)     \")\n    }\n    })\n    }\n   \
    \ .padding()\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n  \
    \  import SwiftUI\n    struct ContentView: View {\n    var body: some View {\n\
    \    VStack {\n    ScrollView(Axis.Set.vertical, showsIndicators: true, content:\
    \ {\n    ForEach(0..<50) {\n    Text(\"项目 #\\($0)     \")\n    }\n    })\n   \
    \ }\n    .padding()\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n5. 在画布窗格中点击 Live 图标。\n6. 在用户界面上显示的项目列表中上下滚动。请注意，当你上下滚动时，可以在右侧看到滚动指示器（参见图\
    \ 15-4）。\n"
- fmt: "### Jumping to a Specific Location\n\nA `ScrollView` can display a large number\
    \ of items. However, the more items are displayed, the harder it can be to find\
    \ any one particular item. Rather than force users to endlessly scroll, SwiftUI\
    \ offers the ability to jump to a specific location in a `ScrollView`.\n\nSo if\
    \ a `ScrollView` displays 100 items, you can jump to a specific position such\
    \ as the 54th item or the 12th item in the `ScrollView`. This makes it easy for\
    \ users to rapidly jump to a specific numeric position among a large list of items\
    \ in a `ScrollView`.\n\nWhen jumping to a specific position in a `ScrollView`,\
    \ you have a choice of where to display or anchor that item: `.top`, `.center`,\
    \ or `.bottom`. The `.top` anchor displays the selected item at the top of the\
    \ screen, the `.center` anchor displays the selected item in the center of the\
    \ screen, and the `.bottom` anchor displays the selected item at the bottom of\
    \ the screen.\n\nTo see how to jump to a specific location in a `ScrollView`,\
    \ follow these steps:\n\n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig5_HTML.jpg)\n\
    \nAn illustration of a smartphone denotes a list of items on the screen. The orientation\
    \ is set as the center. There is a setting at the top to adjust the scroll to\
    \ slider value.\n\nFigure 15-5 — The complete user interface\n\n1. Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as “ScrollViewJumpTo.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add two State variables\
    \ underneath the `struct ContentView` line like this:\n\n```\n    @State var sliderValue\
    \ = 0.0\n    @State var anchorPosition = UnitPoint.center\n```\n\n4. Add a `ScrollViewReader`\
    \ under the `var body: some View` line like this:\n\n```\n    var body: some View\
    \ {\n    ScrollViewReader { scrollView in\n    }\n    }\n```\n\n5. Add an `HStack`\
    \ inside the `ScrollViewReader` and put a `Text` view and a `Slider` inside the\
    \ `HStack` like this:\n\n```\n    var body: some View {\n    ScrollViewReader\
    \ { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\")\n    Slider(value:\
    \ $sliderValue, in: 0...99)\n    }\n    }\n    }\n```\n\nThe `Text` view displays\
    \ the `Slider`’s value as an integer because the `Slider`’s value is a `Double`\
    \ data type. The `Slider` ranges in value from 0 to 99.\n\n6. Add a `Button` underneath\
    \ the `HStack`. This `Button` will let us scroll to a specific location in the\
    \ `ScrollView` list where the location is defined by the `Slider`:\n\n```\n  \
    \  var body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n\
    \    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
    \    }\n    Button(\"Scroll to slider value\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    }\n    }\n```\n\nThe `Button` takes\
    \ the value stored in the `Slider` and jumps to that position in the `ScrollView`.\
    \ `withAnimation` makes the `ScrollView` move gradually to the location defined\
    \ by the anchor.\n\n7. Add a `Picker` underneath the `Button` like this:\n\n```\n\
    \    var body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n\
    \    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
    \    }\n    Button(\"Scroll to slider value\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"Location\", selection: $anchorPosition,\
    \ content: {\n    Text(\"Top\").tag(UnitPoint.top)\n    Text(\"Center\").tag(UnitPoint.center)\n\
    \    Text(\"Bottom\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n\
    \    }\n    }\n```\n\nThe `Picker` displays a segmented control with three choices:\
    \ Top, Center, and Bottom. That way the user can decide which type of anchor to\
    \ use for scrolling to a specific item in the `ScrollView`.\n\n8. Add the `ScrollView`\
    \ underneath the `Picker` view like this:\n\n```\n    var body: some View {\n\
    \    ScrollViewReader { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\"\
    )\n    Slider(value: $sliderValue, in: 0...99)\n    }\n    Button(\"Scroll to\
    \ slider value\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"Location\", selection: $anchorPosition,\
    \ content: {\n    Text(\"Top\").tag(UnitPoint.top)\n    Text(\"Center\").tag(UnitPoint.center)\n\
    \    Text(\"Bottom\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n\
    \    ScrollView {\n    }\n    }\n    }\n```\n\n9. Add a `ForEach` loop inside\
    \ the `ScrollView` to create a list of items:\n\n```\n    var body: some View\
    \ {\n    ScrollViewReader { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\"\
    )\n    Slider(value: $sliderValue, in: 0...99)\n    }\n    Button(\"Scroll to\
    \ slider value\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"Location\", selection: $anchorPosition,\
    \ content: {\n    Text(\"Top\").tag(UnitPoint.top)\n    Text(\"Center\").tag(UnitPoint.center)\n\
    \    Text(\"Bottom\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n\
    \    ScrollView {\n    ForEach(0..<100) { index in\n    Text(\"Item # \\(index)\"\
    )\n    .id(index)\n    }\n    }\n    }\n    }\n```\n\nNotice that the `Text` view\
    \ inside the `ScrollView` contains an `.id` modifier, which tracks the index value\
    \ from 0 up to but not including 100 (99). This `.id` value is what the `.scrollTo`\
    \ command will use to jump to specific items in the `ScrollView`. The user interface\
    \ should look as shown in Figure 15-5.\n\n1. Click the Live icon in the Canvas\
    \ pane.\n2. Drag the `Slider` to a large value such as 67.\n3. Click the “Scroll\
    \ to slider value” `Button`. Notice that your chosen position appears centered\
    \ in the screen.\n4. Click the segmented control and choose Top or Bottom and\
    \ click the “Scroll to slider value” `Button`. Your chosen value appears near\
    \ the top or bottom of the screen.\n\n### Defining a Horizontal Scroll View\n\n\
    `ScrollView`s, by default, scroll vertically. However, you can also change the\
    \ scroll direction to horizontal, which can be handy for scrolling information\
    \ that may be too wide to be visible on the screen such as large amounts of text.\n\
    \nTo see how to make a `ScrollView` scroll horizontally, follow these steps:\n\
    \n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig6_HTML.jpg)\n\nAn illustration\
    \ represents a code on the left to exhibit the following text. This is a long\
    \ amount of text that won't fit within the narrow width of an iPhone. On the right\
    \ is a graphic of a smartphone exhibiting the text partially on its screen.\n\n\
    Figure 15-6 — Horizontal scrolling lets you view text cut off by the boundaries\
    \ of the iOS screen\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as “ScrollViewHorizontal.”\n2. Click the `ContentView` file\
    \ in the Navigator pane.\n3. Add a `ScrollViewReader` under the `var body: some\
    \ View` line like this:\n\n```\n    var body: some View {\n    ScrollViewReader\
    \ { scrollView in\n    }\n    }\n```\n\n4. Add the `ScrollView` inside the `ScrollViewReader`\
    \ like this:\n\n```\n    var body: some View {\n    ScrollViewReader { scrollView\
    \ in\n    ScrollView (.horizontal, showsIndicators: true){\n    Text(\"This is\
    \ a long amount of text that won't fit within the narrow width of an iPhone. That\
    \ way you can see how to scroll horizontally.\")\n    }\n    }\n    }\n```\n\n\
    5. Click the Live icon in the Canvas pane. The text appears cut off on the right\
    \ side of the simulated iOS device as shown in Figure 15-6.\n6. Move the mouse\
    \ pointer over the text and drag left and right to see how the text can scroll\
    \ horizontally."
