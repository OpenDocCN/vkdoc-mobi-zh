  trans: "\n# 理解全局坐标与局部坐标的区别\n\n当你了解 `GeometryReader` 如何伸缩以适应不同 iOS 屏幕尺寸的宽度和高度后，下一步就是理解\
    \ `GeometryReader` 的坐标系统。`GeometryReader` 内部的坐标被称为局部坐标。\n\n另一方面，全局坐标指的是整个 iOS\
    \ 屏幕。虽然不同 iOS 设备的屏幕之间全局坐标总是不同，但 `GeometryReader` 内部的局部坐标始终保持一致。\n\n要查看局部坐标和全局坐标之间的区别，请按以下步骤操作：\n\
    \n![](img/329781_7_En_21_Fig4_HTML.jpg)\n\n一个手机屏幕显示了局部 X 原点和 Y 原点，以及全局 X 原点和 Y\
    \ 原点的值，它们分别被标记为全局原点和局部原点，数值分别为 0、0、0 和 59.0000000。\n\n图 21-4\n\n局部原点出现在左上角，而全局原点出现在\
    \ `GeometryReader` 的左上角\n\n1. 新建一个 SwiftUI iOS App 项目，并为其取任意名称，例如 \"GeometryReaderCoordinates\"\
    。\n\n2. 在 Navigator 面板中点击 `ContentView` 文件。\n\n3. 在 `var body: some View` 中添加一个\
    \ `GeometryReader`，如下所示：\n\n```\nvar body: some View {\n    GeometryReader { geometry\
    \ in\n    }.background(Color.yellow)\n}\n```\n\n4. 在 `GeometryReader` 内部添加一个 `VStack`，并添加四个\
    \ `Text` 视图和一个 `Divider`，如下所示：\n\n```\nGeometryReader { geometry in\n    VStack\
    \ {\n        Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\"\
    )\n        Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\")\n\
    \        Divider()\n        Text(\"Global X origin = \\(geometry.frame(in: .global).origin.x)\"\
    )\n        Text(\"Global Y origin = \\(geometry.frame(in: .global).origin.y)\"\
    )\n    }\n}.background(Color.yellow)\n```\n\n首先，请注意 `Divider()` 只是在 `VStack` 中绘制一条水平线（在\
    \ `HStack` 中则是垂直线）。其次，`frame` 会返回坐标。当使用 `.local` 坐标时，`GeometryReader` 的 x 和 y\
    \ 原点始终为 `(0,0)`。当使用 `.global` 坐标时，`GeometryReader` 的 x 和 y 原点基于其距离 iOS 屏幕左上角的距离而定。\n\
    \n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n\
    \    var body: some View {\n        GeometryReader { geometry in\n           \
    \ VStack {\n                Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\"\
    )\n                Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
    )\n                Divider()\n                Text(\"Global X origin = \\(geometry.frame(in:\
    \ .global).origin.x)\")\n                Text(\"Global Y origin = \\(geometry.frame(in:\
    \ .global).origin.y)\")\n            }\n        }.background(Color.yellow)\n \
    \   }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n请注意，局部原点是 `(0,0)`，因为它起始于\
    \ iOS 屏幕的左上角。但是，全局原点显示为 `(0,59)`。这是因为 `GeometryReader` 实际上出现在 iPhone 14 Pro 机型的刘海屏下方，如图\
    \ 21-4 所示。\n\n![](img/329781_7_En_21_Fig5_HTML.jpg)\n\n一个手机屏幕显示了局部 X 原点和 Y 原点，以及全局\
    \ X 原点和 Y 原点的值，分别为 0、0、0 和 0。\n\n图 21-5\n\n`.ignoresSafeArea()` 修饰符将 `GeometryReader`\
    \ 推至屏幕顶部，因此局部和全局原点相同\n\n1. 在 `.background(Color.yellow)` 修饰符之后添加一个 `.ignoreAllSafeAreas()`\
    \ 修饰符，如下所示：\n\n```\n}.background(Color.yellow)\n.ignoresSafeArea()\n```\n\n这会忽略刘海屏周围的区域，因此全局\
    \ y 原点现在出现在屏幕的左上角，与局部 y 原点相同，如图 21-5 所示。\n\n1. 按如下方式编辑 `var body: some View` 内部的代码：\n\
    \n```\nvar body: some View {\n    VStack {\n        Text(\"This Text view pushes\
    \ the GeometryReader down\")\n        HStack {\n            Text(\"Pushes to the\
    \ right\")\n            GeometryReader { geometry in\n                VStack {\n\
    \                    Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\"\
    )\n                    Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
    )\n                    Divider()\n                    Text(\"Global X origin =\
    \ \\(geometry.frame(in: .global).origin.x)\")\n                    Text(\"Global\
    \ Y origin = \\(geometry.frame(in: .global).origin.y)\")\n                }\n\
    \            }.background(Color.yellow)\n            .ignoresSafeArea()\n    \
    \    }\n    }\n}\n```\n\n上述代码使用了一个 `VStack` 将 `GeometryReader` 向下推，然后使用了一个 `HStack`\
    \ 将其向右推。请注意，`GeometryReader` 的局部原点仍然是 `(0,0)`，但全局原点不同，它是从 iOS 屏幕左上角开始测量的，如图 21-6\
    \ 所示。\n\n![](img/329781_7_En_21_Fig6_HTML.jpg)\n\n一段 SwiftUI 代码片段显示了一个手机屏幕，其中展示了局部和全局原点的值，全局\
    \ X 原点为 151.666667，全局 Y 原点为 91.642415。左侧是 30 行代码。\n\n图 21-6\n\n定义一个 `GeometryReader`\
    \ 的全局原点\n"
- fmt: "# Identifying Minimum, Mid, and Maximum Values of a GeometryReader\n\nGlobal\
    \ coordinates depend on the current iOS screen size. The maximum X and Y coordinates\
    \ on smaller iOS screens will be different than the maximum X and Y coordinates\
    \ on a much larger iOS screen. As a result, using global coordinates to position\
    \ views on the screen could move a view entirely off the screen or cut part of\
    \ it off.\n\nOn the other hand, using local coordinates within a `GeometryReader`\
    \ will always adapt to different screen sizes automatically. Since a `GeometryReader`’s\
    \ width or height will vary depending on the iOS screen size, it’s important not\
    \ to use fixed values but minimum and maximum values instead.\n\nThe `GeometryReader`\
    \ lets you access the following defined properties as shown in Figure [21-7](#329781_7_En_21_Chapter.xhtml#Fig7):\n\
    \n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig7_HTML.jpg)\n\nA 2 by 2\
    \ grid layout of square with corners and edges labeled min X and min Y, mid X,\
    \ max X, mid Y, and Max Y.\n\nFigure 21-7\n\nThe minimum, mid, and maximum X and\
    \ Y values of a `GeometryReader`\n\n- `minX`\n- `minY`\n- `midX`\n- `midY`\n-\
    \ `maxX`\n- `maxY`\n\nTo see how the minimum, mid, and maximum X and Y values\
    \ of the `GeometryReader` work, follow these steps:\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “GeometryReaderValues.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add a `GeometryReader`\
    \ inside `var body: some View` like this:\n\n    ```\n    var body: some View\
    \ {\n        GeometryReader { geometry in\n        }.background(Color.yellow)\n\
    \    }\n    ```\n\n4. Add a `VStack` inside the `GeometryReader` and add six `Text`\
    \ views and a `Divider` like this:\n\n    ```\n    var body: some View {\n   \
    \     GeometryReader { geometry in\n            VStack {\n                Text(\"\
    minX = \\(geometry.frame(in: .local).minX)\")\n                Text(\"midX = \\\
    (geometry.frame(in: .local).midX)\")\n                Text(\"maxX = \\(geometry.frame(in:\
    \ .local).maxX)\")\n                Divider()\n                Text(\"minY = \\\
    (geometry.frame(in: .local).minY)\")\n                Text(\"midY = \\(geometry.frame(in:\
    \ .local).midY)\")\n                Text(\"maxY = \\(geometry.frame(in: .local).maxY)\"\
    )\n            }\n        }.background(Color.yellow)\n    }\n    ```\n\n   The\
    \ entire `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n        var body: some View {\n            GeometryReader\
    \ { geometry in\n                VStack {\n                    Text(\"minX = \\\
    (geometry.frame(in: .local).minX)\")\n                    Text(\"midX = \\(geometry.frame(in:\
    \ .local).midX)\")\n                    Text(\"maxX = \\(geometry.frame(in: .local).maxX)\"\
    )\n                    Divider()\n                    Text(\"minY = \\(geometry.frame(in:\
    \ .local).minY)\")\n                    Text(\"midY = \\(geometry.frame(in: .local).midY)\"\
    )\n                    Text(\"maxY = \\(geometry.frame(in: .local).maxY)\")\n\
    \                }\n            }.background(Color.yellow)\n        }\n    }\n\
    \    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
    \ some View {\n            ContentView()\n        }\n    }\n    ```\n\n   Notice\
    \ that the `maxX` and `maxY` properties are just another way to measure the width\
    \ and height of the `GeometryReader`.\n\n5. Click `ContentView()` inside the `struct\
    \ ContentView_Previews: PreviewProvider`. The Inspector pane appears on the right\
    \ side of the Xcode window.\n6. Click the Device popup menu and choose a different-size\
    \ screen such as a larger or smaller iPhone or iPad (see Figure [21-2](#329781_7_En_21_Chapter.xhtml#Fig2)).\n\
    7. Choose a different-size iPhone or iPad. Notice that the `GeometryReader` expands\
    \ or shrinks to fit within the boundaries of the new iOS screen size and displays\
    \ a different `maxX` and `maxY` value.\n\n## Summary\n\nThe `GeometryReader` is\
    \ a unique container that can hold multiple views. By using the `GeometryReader`’s\
    \ local coordinates, you can place different views on the user interface that\
    \ can automatically adapt to different iOS screen sizes.\n\nThe `GeometryReader`\
    \ can expand to fill an entire screen or can share a screen with other views within\
    \ a stack. Two ways to identify the `GeometryReader`’s width and height are either\
    \ to retrieve the `size.height` and `size.width` properties or to retrieve the\
    \ `maxX` and `maxY` properties.\n\nBy using local coordinates within a `GeometryReader`,\
    \ you always know the origin (0,0) appears in the upper-left corner of the `GeometryReader`\
    \ no matter where the `GeometryReader` appears. By using global coordinates, you\
    \ always know the origin (0,0) appears at the upper-left corner of the screen.\n\
    \nThe `GeometryReader` is just one more way to position different views on the\
    \ screen using specific X and Y coordinates."
  raw: "## Identifying Minimum, Mid, and Maximum Values of a GeometryReader\n\nGlobal\
    \ coordinates depend on the current iOS screen size. The maximum X and Y coordinates\
    \ on smaller iOS screens will be different than the maximum X and Y coordinates\
    \ on a much larger iOS screen. As a result, using global coordinates to position\
    \ views on the screen could move a view entirely off the screen or cut part of\
    \ it off.\n\nOn the other hand, using local coordinates within a GeometryReader\
    \ will always adapt to different screen sizes automatically. Since a GeometryReader’s\
    \ width or height will vary depending on the iOS screen size, it’s important not\
    \ to use fixed values but minimum and maximum values instead.\n\nThe GeometryReader\
    \ lets you access the following defined properties as shown in Figure [21-7](#329781_7_En_21_Chapter.xhtml#Fig7):\n\
    \n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig7_HTML.jpg)\n\nA 2 by 2\
    \ grid layout of square with corners and edges labeled min X and min Y, mid X,\
    \ max X, mid Y, and Max Y.\n\nFigure 21-7\n\nThe minimum, mid, and maximum X and\
    \ Y values of a GeometryReader\n\n*   minX\n\n*   minY\n\n*   midX\n\n*   midY\n\
    \n*   maxX\n\n*   maxY\n\nTo see how the minimum, mid, and maximum X and Y values\
    \ of the GeometryReader work, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “GeometryReaderValues.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Add a GeometryReader\
    \ inside var body: some View like this:\n\n    ```\n    var body: some View {\n\
    \    GeometryReader { geometry in\n    }.background(Color.yellow)\n    }\n   \
    \ ```\n\n4.  Add a VStack inside the GeometryReader and add six Text views and\
    \ a Divider like this:\n\n    ```\n    var body: some View {\n    GeometryReader\
    \ { geometry in\n    VStack {\n    Text(\"minX = \\(geometry.frame(in: .local).minX)\"\
    )\n    Text(\"midX = \\(geometry.frame(in: .local).midX)\")\n    Text(\"maxX =\
    \ \\(geometry.frame(in: .local).maxX)\")\n    Divider()\n    Text(\"minY = \\\
    (geometry.frame(in: .local).minY)\")\n    Text(\"midY = \\(geometry.frame(in:\
    \ .local).midY)\")\n    Text(\"maxY = \\(geometry.frame(in: .local).maxY)\")\n\
    \    }\n    }.background(Color.yellow)\n    }\n    ```\n\n    The entire ContentView\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    var body: some View {\n    GeometryReader { geometry in\n    VStack\
    \ {\n    Text(\"minX = \\(geometry.frame(in: .local).minX)\")\n    Text(\"midX\
    \ = \\(geometry.frame(in: .local).midX)\")\n    Text(\"maxX = \\(geometry.frame(in:\
    \ .local).maxX)\")\n    Divider()\n    Text(\"minY = \\(geometry.frame(in: .local).minY)\"\
    )\n    Text(\"midY = \\(geometry.frame(in: .local).midY)\")\n    Text(\"maxY =\
    \ \\(geometry.frame(in: .local).maxY)\")\n    }\n    }.background(Color.yellow)\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n    Notice\
    \ that the maxX and maxY properties are just another way to measure the width\
    \ and height of the GeometryReader.\n\n5.  Click ContentView() inside the struct\
    \ ContentView_Previews: PreviewProvider. The Inspector pane appears on the right\
    \ side of the Xcode window.\n\n6.  Click the Device popup menu and choose a different-size\
    \ screen such as a larger or smaller iPhone or iPad (see Figure [21-2](#329781_7_En_21_Chapter.xhtml#Fig2)).\n\
    \n7.  Choose a different-size iPhone or iPad. Notice that the GeometryReader expands\
    \ or shrinks to fit within the boundaries of the new iOS screen size and displays\
    \ a different maxX and maxY value.\n\n## Summary\n\nThe GeometryReader is a unique\
    \ container that can hold multiple views. By using the GeometryReader’s local\
    \ coordinates, you can place different views on the user interface that can automatically\
    \ adapt to different iOS screen sizes.\n\nThe GeometryReader can expand to fill\
    \ an entire screen or can share a screen with other views within a stack. Two\
    \ ways to identify the GeometryReader’s width and height are either to retrieve\
    \ the size.height and size.width properties or to retrieve the maxX and maxY properties.\n\
    \nBy using local coordinates within a GeometryReader, you always know the origin\
    \ (0,0) appears in the upper-left corner of the GeometryReader no matter where\
    \ the GeometryReader appears. By using global coordinates, you always know the\
    \ origin (0,0) appears at the upper-left corner of the screen.\n\nThe GeometryReader\
    \ is just one more way to position different views on the screen using specific\
    \ X and Y coordinates."
  trans: "\n# 识别 GeometryReader 的最小值、中值和最大值\n\n全局坐标取决于当前 iOS 屏幕的尺寸。较小 iOS 屏幕上的最大 X\
    \ 和 Y 坐标，与较大 iOS 屏幕上的最大 X 和 Y 坐标是不同的。因此，使用全局坐标来定位屏幕上的视图，可能会使视图完全移出屏幕，或导致其部分被截断。\n\
    \n另一方面，在 `GeometryReader` 中使用局部坐标，总能自动适配不同的屏幕尺寸。由于 `GeometryReader` 的宽度或高度会随 iOS\
    \ 屏幕尺寸变化，因此务必不要使用固定值，而应使用最小值和最大值。\n\n`GeometryReader` 允许你访问以下定义的属性，如图 21-7 所示：\n\
    \n![](img/329781_7_En_21_Fig7_HTML.jpg)\n\n一个 2x2 的方块网格布局，其边角和边被标记为 min X、min\
    \ Y、mid X、max X、mid Y 和 max Y。\n\n图 21-7：`GeometryReader` 的最小值、中值和最大值 X 与 Y\n\n\
    - `minX`\n- `minY`\n- `midX`\n- `midY`\n- `maxX`\n- `maxY`\n\n要了解 `GeometryReader`\
    \ 的最小值、中值和最大值 X 与 Y 是如何工作的，请按以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如\
    \ \"GeometryReaderValues\"。\n2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `var body: some\
    \ View` 内部添加一个 `GeometryReader`，如下所示：\n\n    ```\n    var body: some View {\n\
    \        GeometryReader { geometry in\n        }.background(Color.yellow)\n  \
    \  }\n    ```\n\n4. 在 `GeometryReader` 内部添加一个 `VStack`，并添加六个 `Text` 视图和一个 `Divider`，如下所示：\n\
    \n    ```\n    var body: some View {\n        GeometryReader { geometry in\n \
    \           VStack {\n                Text(\"minX = \\(geometry.frame(in: .local).minX)\"\
    )\n                Text(\"midX = \\(geometry.frame(in: .local).midX)\")\n    \
    \            Text(\"maxX = \\(geometry.frame(in: .local).maxX)\")\n          \
    \      Divider()\n                Text(\"minY = \\(geometry.frame(in: .local).minY)\"\
    )\n                Text(\"midY = \\(geometry.frame(in: .local).midY)\")\n    \
    \            Text(\"maxY = \\(geometry.frame(in: .local).maxY)\")\n          \
    \  }\n        }.background(Color.yellow)\n    }\n    ```\n\n   整个 `ContentView`\
    \ 文件应该如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n \
    \       var body: some View {\n            GeometryReader { geometry in\n    \
    \            VStack {\n                    Text(\"minX = \\(geometry.frame(in:\
    \ .local).minX)\")\n                    Text(\"midX = \\(geometry.frame(in: .local).midX)\"\
    )\n                    Text(\"maxX = \\(geometry.frame(in: .local).maxX)\")\n\
    \                    Divider()\n                    Text(\"minY = \\(geometry.frame(in:\
    \ .local).minY)\")\n                    Text(\"midY = \\(geometry.frame(in: .local).midY)\"\
    )\n                    Text(\"maxY = \\(geometry.frame(in: .local).maxY)\")\n\
    \                }\n            }.background(Color.yellow)\n        }\n    }\n\
    \    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
    \ some View {\n            ContentView()\n        }\n    }\n    ```\n\n   请注意，`maxX`\
    \ 和 `maxY` 属性只是测量 `GeometryReader` 宽度和高度的一种不同方式。\n\n5. 在 `struct ContentView_Previews:\
    \ PreviewProvider` 内部点击 `ContentView()`。检查器窗格会出现在 Xcode 窗口的右侧。\n6. 点击设备弹出菜单，选择一个不同尺寸的屏幕，例如更大或更小的\
    \ iPhone 或 iPad（见图 21-2）。\n7. 选择一个不同尺寸的 iPhone 或 iPad。注意 `GeometryReader` 会相应地扩展或收缩以适应新\
    \ iOS 屏幕的边界，并显示不同的 `maxX` 和 `maxY` 值。\n\n## 总结\n\n`GeometryReader` 是一个独特的容器，它可以容纳多个视图。通过使用\
    \ `GeometryReader` 的局部坐标，你可以在用户界面上放置不同的视图，这些视图能够自动适配不同的 iOS 屏幕尺寸。\n\n`GeometryReader`\
    \ 可以扩展以填充整个屏幕，也可以与堆栈中的其他视图共享一个屏幕。识别 `GeometryReader` 宽度和高度的两种方法是：检索 `size.height`\
    \ 和 `size.width` 属性，或者检索 `maxX` 和 `maxY` 属性。\n\n通过在 `GeometryReader` 内使用局部坐标，无论\
    \ `GeometryReader` 出现在哪里，你都知道原点 (0,0) 位于 `GeometryReader` 的左上角。通过使用全局坐标，你始终知道原点\
    \ (0,0) 位于屏幕的左上角。\n\n`GeometryReader` 只是使用特定的 X 和 Y 坐标在屏幕上定位不同视图的又一种方法。\n"
