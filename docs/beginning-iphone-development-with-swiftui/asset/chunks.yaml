    \    @State var message = \"\"\n    ```\n\n4.  在 `var body: some View` 内部添加一个\
    \ `NavigationStack`，如下所示：\n\n    ```\n    var body: some View {\n        NavigationStack\
    \ {\n        }\n    }\n    ```\n\n5.  为 `NavigationStack` 添加 `.accentColor` 修饰符，如下所示：\n\
    \n    ```\n    var body: some View {\n        NavigationStack {\n        }.accentColor(.purple)\n\
    \    }\n    ```\n\n6.  在 `NavigationStack` 内部添加一个 `NavigationLink`，如下所示：\n\n \
    \   ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \            .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
    \        }.accentColor(.purple)\n    }\n    ```\n\n7.  添加 `.toolbar` 修饰符，如下所示：\n\
    \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \            .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
    \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
    \ {\n                    Button {\n                        message = \"iCloud\
    \ 图标被点击\"\n                    } label: {\n                        Image(systemName:\
    \ \"icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"完成按钮被点击\"\n                    } label: {\n               \
    \         Text(\"完成\")\n                    }\n                }\n           \
    \ }\n        }.accentColor(.purple)\n    }\n    ```\n\n对于每个 `ToolbarItem`，你可以使用\
    \ `Text` 视图或 `Image` 视图来定义按钮的外观。上述代码在左上角显示一个云形图标，在右上角显示单词“Done”（完成），如图 17-3 所示。\n\
    \n8.  添加一个 `Text` 视图和一个包含两个 `Button` 的 `HStack`，如下所示：\n\n    ```\n    var body:\
    \ some View {\n        NavigationStack {\n            NavigationLink {\n     \
    \           Text(\"第一个视图\")\n            } label: {\n                Text(\"第一个链接\"\
    )\n                    .font(.largeTitle)\n            }.padding()\n         \
    \   .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
    \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
    \ {\n                    Button {\n                        message = \"iCloud\
    \ 图标被点击\"\n                    } label: {\n                        Image(systemName:\
    \ \"icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"完成按钮被点击\"\n                    } label: {\n               \
    \         Text(\"完成\")\n                    }\n                }\n           \
    \ }\n            Text(message)\n            HStack (spacing: 50) {\n         \
    \       Button (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
    \                }\n                Button (\".inline\") {\n                 \
    \   titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n\
    \            }\n        }.accentColor(.purple)\n    }\n    ```\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var\
    \ titleType = NavigationBarItem.TitleDisplayMode.large\n    @State var message\
    \ = \"\"\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \            .navigationTitle(\"导航栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
    \            .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
    \ {\n                    Button {\n                        message = \"iCloud\
    \ 图标被点击\"\n                    } label: {\n                        Image(systemName:\
    \ \"icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"完成按钮被点击\"\n                    } label: {\n               \
    \         Text(\"完成\")\n                    }\n                }\n           \
    \ }\n            Text(message)\n            HStack (spacing: 50) {\n         \
    \       Button (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
    \                }\n                Button (\".inline\") {\n                 \
    \   titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n\
    \            }\n        }.accentColor(.purple)\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n9.  点击画布窗格中的“Live”图标。\n10. 点击由 `ToolbarItem` 定义的按钮。注意，每次点击工具栏按钮时，`Text`\
    \ 视图中都会出现一条消息，例如“iCloud 图标被点击”或“完成按钮被点击”。\n"
- fmt: "# Displaying Views from a Navigation Stack\n\nJust displaying a single view\
    \ like a `Text` or `Image` view within a `NavigationStack` might be fine in some\
    \ cases. However, many times you may want to display a completely different user\
    \ interface altogether. Since you can define a user interface screen with a structure,\
    \ you can create multiple screens using multiple structures that can appear within\
    \ a `NavigationStack`.\n\nThe simplest way to create a new structure is within\
    \ the `ContentView` file. However, this can clutter the code, so a second way\
    \ is to store the structure in a separate file.\n\nTo see how to create structures\
    \ that define another user interface screen, follow these steps:\n\n![](images/329781_7_En_17_Chapter/329781_7_En_17_Fig4_HTML.jpg)\n\
    \nThe screen presents a selection of templates for creating a new file, such as\
    \ macOS, watchOS, tvOS, DriverKit, and more. It also includes options like Swift\
    \ File, C File, User Interface, UI Test Case Class, and SwiftUI View, along with\
    \ navigation buttons for Cancel, View, Empty, Launch Screen, and Previous or Next.\n\
    \nFigure 17-4\nA dialog for choosing a file to create\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as `NavigationStackStructures`.\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add a `NavigationStack`\
    \ and a `VStack` inside the `var body: some View` line like this:\n\n```\nvar\
    \ body: some View {\n    NavigationStack {\n        VStack {\n        }\n    }\n\
    }\n```\n\n4. Add two `NavigationLink`s and a `.navigationTitle` modifier to the\
    \ `VStack` like this:\n\n```\nvar body: some View {\n    NavigationStack {\n \
    \       VStack {\n            NavigationLink(destination: FileView()) {\n    \
    \            Text(\"Link to structure in same file\")\n            }\n       \
    \     NavigationLink(destination: SeparateFileView()) {\n                Text(\"\
    Separate file link\")\n            }\n            .navigationTitle(\"Navigation\
    \ Title\")\n        }\n    }\n}\n```\n\nThe first `NavigationLink` will display\
    \ a structure called `FileView`. The second `NavigationLink` will display a structure\
    \ called `SeparateFileView`. Since neither of these structures exists yet, we’ll\
    \ need to create them.\n\n5. Add the following structure underneath the entire\
    \ `struct ContentView: View` structure like this:\n\n```\nstruct FileView: View\
    \ {\n    var body: some View {\n        HStack {\n            Spacer()\n     \
    \       VStack {\n                Spacer()\n                Text(\"This is a separate\
    \ structure\")\n                Text(\"that's stored in the same file\")\n   \
    \             Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n```\n\nThe entire `ContentView` file should look like this:\n\n```\n\
    import SwiftUI\n\nstruct ContentView: View {\n    var body: some View {\n    \
    \    NavigationStack {\n            VStack {\n                NavigationLink(destination:\
    \ FileView()) {\n                    Text(\"Link to structure in same file\")\n\
    \                }\n                NavigationLink(destination: SeparateFileView())\
    \ {\n                    Text(\"Separate file link\")\n                }\n   \
    \             .navigationTitle(\"Navigation Title\")\n            }\n        }\n\
    \    }\n}\n\nstruct FileView: View {\n    var body: some View {\n        HStack\
    \ {\n            Spacer()\n            VStack {\n                Spacer()\n  \
    \              Text(\"This is a separate structure\")\n                Text(\"\
    that's stored in the same file\")\n                Spacer()\n            }\n \
    \           Spacer()\n        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\nWe can keep adding new structures inside the `ContentView` file,\
    \ but this risks cluttering up the file. A second way to create structures is\
    \ to store them in a separate file, which the next steps will let us do. When\
    \ creating a separate file to store a structure, we can use a completely blank\
    \ Swift file or a SwiftUI View file.\n\nWe’ll use a blank Swift file to see all\
    \ the code needed to create a SwiftUI view, but a SwiftUI View file would work\
    \ just as well too and provide the basic code needed to create a user interface.\n\
    \n6. Choose `File` ➤ `New` ➤ `File`. A dialog appears as shown in Figure [17-4](#329781_7_En_17_Chapter.xhtml#Fig4).\n\
    \   - Click iOS near the top of the dialog, click `Swift File`, and then click\
    \ `Next`. Xcode asks for a name to give your newly created file.\n   - Type `SeparateFile`\
    \ and click `Create`. Xcode creates a new Swift file.\n   - Delete all code currently\
    \ in the `SeparateFile` and replace it with the following:\n\n```\nimport SwiftUI\n\
    \nstruct SeparateFileView: View {\n    var body: some View {\n        HStack {\n\
    \            Spacer()\n            VStack {\n                Spacer()\n      \
    \          Text(\"This is another structure\")\n                Text(\"but stored\
    \ in a separate file\")\n                Spacer()\n            }\n           \
    \ Spacer()\n        }.background(Color.orange)\n    }\n}\n\nstruct SeparateFileView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        SeparateFileView()\n\
    \    }\n}\n```\n\n> **Note**: When storing a structure in a separate file, you\
    \ need a second structure (`PreviewProvider`) to display that user interface in\
    \ the Canvas pane.\n\n1. Click the `ContentView` file in the Navigator pane.\n\
    2. Click the Live icon in the Canvas pane.\n3. Click the `\"Link to structure\
    \ in same file\"`. Notice that this displays the `FileView` structure stored in\
    \ the `ContentView` file.\n4. Click the Back button to return to the original\
    \ screen.\n5. Click the `\"Separate file link\"`. Notice that this displays the\
    \ `SeparateFileView` structure stored in a file called `SeparateFile`.\n\nIf a\
    \ structure is short, it might be more convenient to store it in the same file\
    \ as the `NavigationStack`. However, it’s generally more useful to store structures\
    \ in separate files to keep them better organized so each file is easier to read."
