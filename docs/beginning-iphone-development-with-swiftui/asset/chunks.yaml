    Second\")\n    }\n    }\n    }\n    }\n    struct FileView: View {\n    @Binding\
    \ var choice: String\n    var body: some View {\n    HStack {\n    Spacer()\n\
    \    VStack {\n    Spacer()\n    TextField(\"Type here:\", text: $choice)\n  \
    \  Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n\
    \    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n6.  Choose File ➤ New\
    \ ➤ File. A dialog appears.\n\n7.  Click iOS near the top of the dialog, click\
    \ Swift File, and then click Next. Xcode asks for a name to give your newly created\
    \ file.\n\n8.  Type SeparateFile and click Create. Xcode creates a new Swift file.\n\
    \n9.  Delete all code currently in the SeparateFile and replace it with the following:\n\
    \n```\n    import SwiftUI\n    struct SeparateFileView: View {\n    @Binding var\
