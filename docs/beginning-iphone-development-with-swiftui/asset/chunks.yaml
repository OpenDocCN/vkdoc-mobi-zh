  trans: "  \n# 操作 Xcode 面板  \n\nXcode 的四个面板（`Navigator`（导航器）、`Editor`（编辑器）、`Canvas`（画布）和\
    \ `Inspector`（检查器））各有用处。`Navigator` 面板显示你项目的相关信息，例如构成该项目的所有文件名称。`Editor` 面板是你编写和编辑\
    \ Swift 代码的地方。`Canvas` 面板让你可以查看并测试由 Swift 代码定义的用户界面。`Inspector` 面板则显示当前选中对象的相关信息。\n\
    \n你可以通过将鼠标指针移动到面板边框上，然后左右拖动鼠标来调整任意面板的大小。你也可以切换 `Navigator` 和 `Inspector` 面板的隐藏与显示，这样就能看到更多\
    \ `Editor` 和 `Canvas` 面板的内容。\n\n要隐藏/显示 `Navigator` 或 `Inspector` 面板，有两种操作方式，如图\
    \ 1-20 所示：\n\n![](img/329781_7_En_1_Fig20_HTML.jpg)  \n\n一张 Xcode 窗口的截图，展示了左侧隐藏或显示导航器面板以及右侧隐藏或显示检查器面板的功能。\
    \  \n\n图 1-20  \n隐藏或显示导航器和检查器面板  \n\n* 选择 `View` ➤ `Navigators`/`Inspectors` ➤\
    \ `Hide`/`Show Navigator`/`Inspector`。  \n* 点击 `Show`/`Hide Navigator`/`Inspector`\
    \ 面板图标。  \n\n`Navigator` 面板允许你选择要在 `Editor` 面板中显示的选项。`Inspector` 面板则允许你选择用户界面项目，并选取不同的修改方式，如图\
    \ 1-21 所示。  \n\n![](img/329781_7_En_1_Fig21_HTML.jpg)  \n\n一张截图展示了 Xcode 窗口的不同面板。右侧的检查器面板被高亮显示。左侧下方一行文字被高亮：`Text(\"\
    Hello, world!\")`。  \n\n图 1-21  \n检查器面板列出了修改选中项目的不同方式  \n\n要了解 `Inspector` 面板的工作方式，请按以下步骤操作：\
    \  \n\n![](img/329781_7_En_1_Fig22_HTML.jpg)  \n\n一张检查器面板的截图，其中属性检查器图标被高亮显示。包含以下字段：文本、辅助功能、字体、内边距和框架。\
    \  \n\n图 1-22  \n属性检查器图标让你可以在检查器面板中查看修改项目的更多方式  \n\n1. 创建一个新的 iOS App 项目，然后在 `Navigator`\
    \ 面板中点击 `ContentView` 文件。`Editor` 面板会显示 `ContentView` 文件的内容。  \n2. 将光标移动到 `Text(\"\
    Hello, world!\")` 这一行。  \n3. 点击 `Inspector` 面板中的 `Attributes Inspector` 图标，如图\
    \ 1-22 所示。`Inspector` 面板会显示修改当前选中项目的更多方式。  \n\n如你所见，Xcode 的不同面板会显示项目相关的不同信息。`Navigator`\
    \ 面板（最左侧）让你可以查看项目的概览。在 `Navigator` 面板中点击特定项目，该内容便会显示在 `Editor` 面板中。`Inspector`\
    \ 面板（最右侧）会显示 `Editor` 面板中选中内容的额外信息。`Canvas` 面板则让你可以预览用户界面的外观。  \n\n如果你深入探索 Xcode，会发现它拥有数十项功能，但不必一次性全部掌握才能开始使用\
    \ Xcode。只需专注于使用你需要的功能，暂时忽略其余部分，直到你需要它们时再说。  \n\n## 总结  \n\n创建 iOS 应用不仅仅是编写代码。为了让你的应用能够访问不同\
    \ iOS 设备的硬件功能，你可以使用 Apple 的软件框架，这些框架提供了访问摄像头或 iOS 设备通讯录的接口。所有 SwiftUI 项目都会用到的最重要框架就是\
    \ SwiftUI 框架。通过将你的代码与 Apple 现有的软件框架结合，你可以专注于编写让应用运行起来的代码，并利用 Apple 的软件框架来帮助你实现大多数\
    \ iOS 设备上的常见功能。  \n\n除了编写代码，每个 iOS 应用还需要用户界面。要创建用户界面，请使用 SwiftUI。由于 SwiftUI 可以轻松创建适配不同设备的用户界面，它正迅速成为为\
    \ Apple 所有平台（macOS、iOS、iPadOS、watchOS 和 tvOS）上的应用设计用户界面的首选方式。  \n\n创建 iOS 应用的主要工具是\
    \ Apple 的免费软件 Xcode，它能让你创建项目、组织项目中的各个文件，并查看和编辑每个文件的内容。Xcode 让你可以在一个程序中完成应用的设计、编辑和测试。尽管\
    \ Xcode 提供了数十项功能，但你只需使用其中少数几项，就能开始创建你自己的 iOS 应用。  \n\n学习 iOS 编程涉及学习如何使用 Swift\
    \ 编程语言编写指令、学习如何查找并使用 Apple 的各种软件框架、学习如何在 SwiftUI 中设计用户界面，以及学习如何使用 Xcode。虽然这听起来任务繁多，但本书将循序渐进地引导你完成每一步，让你在不久的将来能自如地使用\
    \ Xcode 并创建自己的 iOS 应用。  \n"
- fmt: "# Designing User Interfaces with SwiftUI\n\nEvery app needs a user interface.\
    \ The basic idea behind SwiftUI is to create a user interface using building blocks\
    \ known as “views.” A view displays a single item on the user interface such as\
    \ text, an image, or a button as shown in Figure [2-1](#329781_7_En_2_Chapter.xhtml#Fig1).\n\
    \n![A SwiftUI screen displays the following elements, a large title Hello, world,\
    \ a navigation view, a text view, an image of a tortoise, and a button labeled\
    \ Click Me. On the right is the preview provider with the Content View.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig1_HTML.jpg)\n\
    \n**Figure 2-1** The parts of a SwiftUI user interface\n\nOne limitation of SwiftUI\
    \ is that it can only display a single view on the screen at a time. To get around\
    \ this limitation, SwiftUI offers something called “stacks.” A stack is considered\
    \ a single view but lets you combine or stack up to ten additional views. By creating\
    \ a stack, you can display more than one view on the screen. Stacks can even hold\
    \ other stacks, essentially letting you display as many views as you want on a\
    \ single screen.\n\nThere are three types of stacks as shown in Figure [2-2](#329781_7_En_2_Chapter.xhtml#Fig2):\n\
    \n![A snippet of 3 sets of code. V stack list text in vertical form. H stack list\
    \ text in horizontal form. Z stack list text in overlapping form.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig2_HTML.jpg)\n\
    \n**Figure 2-2** Vertical, horizontal, and ZStacks\n\n- `VStack` – Vertical stacks\
    \ that arrange views above and below another view\n- `HStack` – Horizontal stacks\
    \ that arrange views side by side\n- `ZStack` – A stack that overlays views directly\
    \ over each other\n\nA stack counts as a single view. By using horizontal (`HStack`)\
    \ or vertical (`VStack`) stacks, you can add up to ten (10) views inside a stack.\
    \ For greater flexibility, you can embed stacks inside of stacks to display as\
    \ many views as necessary.\n\n> **Note:** A stack can only contain a maximum of\
    \ ten (10) views. If you try to store 11 or more views inside of a stack, Xcode\
    \ will display an error message and refuse to run your program.\n\nWhen creating\
    \ a user interface in SwiftUI, you have three options:\n\n- Type Swift code in\
    \ the Editor pane.\n- Drag and drop a view (such as a button) into your Swift\
    \ code in the Editor pane.\n- Drag and drop a view (such as a button) into the\
    \ Canvas pane.\n\nTyping Swift code in the Editor pane to design a user interface\
    \ is the fastest and most flexible method, but takes time and requires familiarity\
    \ with different options. To make typing Swift code to define user interface views\
    \ easier, Xcode displays a popup menu of options when it recognizes what you’re\
    \ trying to type. By choosing an option and pressing Return, you can create a\
    \ user interface view quickly as shown in Figure [2-3](#329781_7_En_2_Chapter.xhtml#Fig3).\n\
    \n![A SwiftUI screen displays code snippets related to the Button component. It\
    \ includes different variations of Button declarations, such as Button (action,\
    \ label), Button (title, action), and Button (role, action, label).](images/329781_7_En_2_Chapter/329781_7_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3** As you type Swift code to define a user interface view, Xcode\
    \ displays a menu of options\n\nIf you’re not familiar with your options for designing\
    \ a user interface, it’s easier to use the Library window, which lists all possible\
    \ user interface views you can use as shown in Figure [2-4](#329781_7_En_2_Chapter.xhtml#Fig4).\n\
    \n![The screenshot displays various UI components such as View, Control, Library\
    \ icon, Button, Color Picker, Date Picker, Disclosure Group, Edit Button, Library\
    \ window, Form, Gauge, and Group Box.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig4_HTML.jpg)\n\
    \n**Figure 2-4** Clicking the Library icon opens the Library window\n\nOnce you\
    \ open the Library window, you can either:\n\n- Drag and drop a user interface\
    \ view from the Library window into the Editor pane as shown in Figure [2-5](#329781_7_En_2_Chapter.xhtml#Fig5).\n\
    - Click the Selectable icon and then drag and drop a user interface view onto\
    \ the simulated iOS device user interface in the Canvas pane as shown in Figure\
    \ [2-6](#329781_7_En_2_Chapter.xhtml#Fig6).\n\n![The snippet of code displays\
    \ a SwiftUI content view with a VStack containing a Button and a color picker.\
    \ It also mentions the appearance of the button depending on placement, role assignment,\
    \ and styling, and includes a reference to opening the content in the developer\
    \ documentation.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig5_HTML.jpg)\n\n\
    **Figure 2-5** Drag and drop a user interface view into the Editor pane\n\n![The\
    \ screenshot displays various views, including a Button and Controls. The text\
    \ provides information about creating a button, its action and label, and how\
    \ the user activates the button on different platforms. It mentions the appearance\
    \ of the button depending on placement, role assignment, and styling, and includes\
    \ a reference to opening the content in the developer documentation.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig6_HTML.jpg)\n\
    \n**Figure 2-6** Drag and drop a user interface view into the Canvas pane\n\n\
    No matter how you change the user interface, Xcode keeps all changes synchronized\
    \ between the Editor pane and the Canvas pane. That means when you type Swift\
    \ code in the Editor pane, the Canvas pane shows your changes right away. When\
    \ you drag and drop a user interface view into the Canvas pane, Xcode automatically\
    \ adds that Swift code in the Editor pane right away.\n\nThe Canvas pane displays\
    \ your user interface, but if you want to test your app, you have two choices\
    \ as shown in Figure [2-7](#329781_7_En_2_Chapter.xhtml#Fig7):\n\n![The screen\
    \ displays a project named delete me 2 with various components such as the content\
    \ view, Phone SE, and a success message. The code snippet includes the content\
    \ view struct with a VStack containing an image and text. The run icons and live\
    \ icon are highlighted.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig7_HTML.jpg)\n\
    \n**Figure 2-7** The Run button and the Live Preview icon\n\n- Click the Run button\
    \ or choose Product ➤ Run to open the Simulator.\n- Click the Live icon at the\
    \ bottom of the Canvas pane.\n\nTo see how SwiftUI works to create a simple user\
    \ interface that can respond to the user, follow these steps:\n\n1. Create a new\
    \ iOS App project, make sure the interface is SwiftUI, and give it a descriptive\
    \ name (such as `SwiftExample`).\n2. Click the `ContentView` file in the Navigator\
    \ pane. The Editor pane displays the contents of the `ContentView` file.\n3. Choose\
    \ Editor ➤ Canvas. (Skip this step if a check mark already appears in front of\
    \ the Canvas option.) This opens the canvas so you can preview your user interface.\n\
    4. Delete the text “Hello, world!” in the `Text` command and type the following\
    \ so the `ContentView` structure looks like this:\n\n```swift\nstruct ContentView:\
    \ View {\n    @State private var message = true\n    var body: some View {\n \
    \       VStack {\n            Toggle(isOn: $message) {\n                Text(\"\
    Toggle message on/off\")\n            }\n            if message {\n          \
    \      Text(\"Here's a secret message!\")\n            }\n        }\n    }\n}\n\
    ```\n\nThe preceding Swift code displays a toggle switch on the screen, but you\
    \ won’t be able to see it work unless you run your app in the Simulator (which\
    \ mimics an iOS device such as an iPhone or iPad) or test it by clicking the Live\
    \ icon. In most cases, the Live icon offers a faster way to view and test your\
    \ user interface in the Canvas pane.\n\n![A snippet displays a toggle message\
    \ on or off, a toggle message on or off is enabled, and text reads here's a secret\
    \ message.](images/329781_7_En_2_Chapter/329781_7_En_2_Fig8_HTML.jpg)\n\n**Figure\
    \ 2-8** Live Preview lets you interact with the user interface in the Canvas pane\n\
    \n5. Click the Live icon to turn on Live Preview. As you click the toggle, notice\
    \ that the message appears and disappears as shown in Figure [2-8](#329781_7_En_2_Chapter.xhtml#Fig8).\n\
    6. Click the Live icon again to turn off Live Preview."
  raw: '# 2. Designing User Interfaces with SwiftUI


    Every app needs a user interface. The basic idea behind SwiftUI is to create a
    user interface using building blocks known as “views.” A view displays a single
    item on the user interface such as text, an image, or a button as shown in Figure
    [2-1](#329781_7_En_2_Chapter.xhtml#Fig1).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig1_HTML.jpg)


    A Swift U I screen displays the following elements, a large title Hello, world,
    a navigation view, a text view, an image of a tortoise, and a button labeled Click
    Me. On the right is the preview provider with the Content View.


    Figure 2-1


    The parts of a SwiftUI user interface


    One limitation of SwiftUI is that it can only display a single view on the screen
    at a time. To get around this limitation, SwiftUI offers something called “stacks.”
    A stack is considered a single view but lets you combine or stack up to ten additional
    views. By creating a stack, you can display more than one view on the screen.
    Stacks can even hold other stacks, essentially letting you display as many views
    as you want on a single screen.


    There are three types of stacks as shown in Figure [2-2](#329781_7_En_2_Chapter.xhtml#Fig2):


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig2_HTML.jpg)


    A snippet of 3 sets of code. V stack list text in vertical form. H stack list
    text in horizontal form. Z stack list text in overlapping form.


    Figure 2-2


    Vertical, horizontal, and ZStacks


    *   VStack – Vertical stacks that arrange views above and below another view


    *   HStack – Horizontal stacks that arrange views side by side


    *   ZStack – A stack that overlays views directly over each other


    A stack counts as a single view. By using horizontal (HStack) or vertical (VStack)
    stacks, you can add up to ten (10) views inside a stack. For greater flexibility,
    you can embed stacks inside of stacks to display as many views as necessary.


    Note


    A stack can only contain a maximum of ten (10) views. If you try to store 11 or
    more views inside of a stack, Xcode will display an error message and refuse to
    run your program.


    When creating a user interface in SwiftUI, you have three options:


    *   Type Swift code in the Editor pane.


    *   Drag and drop a view (such as a button) into your Swift code in the Editor
    pane.


    *   Drag and drop a view (such as a button) into the Canvas pane.


    Typing Swift code in the Editor pane to design a user interface is the fastest
    and most flexible method, but takes time and requires familiarity with different
    options. To make typing Swift code to define user interface views easier, Xcode
    displays a popup menu of options when it recognizes what you’re trying to type.
    By choosing an option and pressing Return, you can create a user interface view
    quickly as shown in Figure [2-3](#329781_7_En_2_Chapter.xhtml#Fig3).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig3_HTML.jpg)


    A Swift U I screen displays code snippets related to the Button component. It
    includes different variations of Button declarations, such as Button (action,
    label), Button (title, action), and Button (role, action, label).


    Figure 2-3


    As you type Swift code to define a user interface view, Xcode displays a menu
    of options


    If you’re not familiar with your options for designing a user interface, it’s
    easier to use the Library window, which lists all possible user interface views
    you can use as shown in Figure [2-4](#329781_7_En_2_Chapter.xhtml#Fig4).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig4_HTML.jpg)


    The screenshot displays various UI components such as View, Control, Library icon,
    Button, Color Picker, Date Picker, Disclosure Group, Edit Button, Library window,
    Form, Gauge, and Group Box.


    Figure 2-4


    Clicking the Library icon opens the Library window


    Once you open the Library window, you can either


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig6_HTML.jpg)


    The screenshot displays various views, including a Button and Controls. The text
    provides information about creating a button, its action and label, and how the
    user activates the button on different platforms. It mentions the appearance of
    the button depending on placement, role assignment, and styling, and includes
    a reference to opening the content in the developer documentation.


    Figure 2-6


    Drag and drop a user interface view into the Canvas pane


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig5_HTML.jpg)


    The snippet of code displays a Swift U I content view with a V Stack containing
    a Button and a color picker. It also mentions the appearance of the button depending
    on placement, role assignment, and styling, and includes a reference to opening
    the content in the developer documentation.


    Figure 2-5


    Drag and drop a user interface view into the Editor pane


    *   Drag and drop a user interface view from the Library window into the Editor
    pane as shown in Figure [2-5](#329781_7_En_2_Chapter.xhtml#Fig5).


    *   Click the Selectable icon and then drag and drop a user interface view onto
    the simulated iOS device user interface in the Canvas pane as shown in Figure
    [2-6](#329781_7_En_2_Chapter.xhtml#Fig6).


    No matter how you change the user interface, Xcode keeps all changes synchronized
    between the Editor pane and the Canvas pane. That means when you type Swift code
    in the Editor pane, the Canvas pane shows your changes right away. When you drag
    and drop a user interface view into the Canvas pane, Xcode automatically adds
    that Swift code in the Editor pane right away.


    The Canvas pane displays your user interface, but if you want to test your app,
    you have two choices as shown in Figure [2-7](#329781_7_En_2_Chapter.xhtml#Fig7):


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig7_HTML.jpg)


    The screen displays a project named delete me 2 with various components such as
    the content view, Phone S E, and a success message. The code snippet includes
    the content view struct with a V Stack containing an image and text. The run icons
    and live icon are highlighted.


    Figure 2-7


    The Run button and the Live Preview icon


    *   Click the Run button or choose Product ➤ Run to open the Simulator.


    *   Click the Live icon at the bottom of the Canvas pane.


    To see how SwiftUI works to create a simple user interface that can respond to
    the user, follow these steps:


    1.  Create a new iOS App project, make sure the interface is SwiftUI, and give
    it a descriptive name (such as SwiftExample).


    2.  Click the ContentView file in the Navigator pane. The Editor pane displays
    the contents of the ContentView file.


    3.  Choose Editor ➤ Canvas. (Skip this step if a check mark already appears in
    front of the Canvas option.) This opens the canvas so you can preview your user
    interface.


    4.  Delete the text “Hello, world!” in the Text command and type the following
    so the ContentView structure looks like this:


    ```

    struct ContentView: View {

    @State private var message = true

    var body: some View {

    VStack {

    Toggle(isOn: $message) {

    Text("Toggle message on/off")

    }

    if message {

    Text ("Here''s a secret message!")

    }

    }

    }

    }

    ```


    The preceding Swift code displays a toggle switch on the screen, but you won’t
    be able to see it work unless you run your app in the Simulator (which mimics
    an iOS device such as an iPhone or iPad) or test it by clicking the Live icon.
    In most cases, the Live icon offers a faster way to view and test your user interface
    in the Canvas pane.


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig8_HTML.jpg)


    A snippet displays a toggle message on or off, a toggle message on or off is enabled,
    and text reads here''s a secret message.


    Figure 2-8


    Live Preview lets you interact with the user interface in the Canvas pane


    1.  Click the Live icon to turn on Live Preview. As you click the toggle, notice
    that the message appears and disappears as shown in Figure [2-8](#329781_7_En_2_Chapter.xhtml#Fig8).


    1.  Click the Live icon again to turn off Live Preview.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n# 使用 SwiftUI\
    \ 设计用户界面\n\n每个应用程序都需要一个用户界面。SwiftUI 背后的基本思想是使用称为“视图”的构建块来创建用户界面。视图在用户界面上显示单个项目，例如文本、图像或按钮，如图\
    \ 2-1 所示。\n\n![一个 SwiftUI 屏幕显示了以下元素：一个大的标题 Hello, world，一个导航视图，一个文本视图，一张乌龟图片，以及一个标记为\
    \ Click Me 的按钮。右侧是带有 Content View 的预览提供程序。](img/329781_7_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** SwiftUI 用户界面的组成部分\n\nSwiftUI 的一个限制是它一次只能在屏幕上显示一个视图。为了解决这个限制，SwiftUI\
    \ 提供了称为“堆栈”的东西。一个堆栈被视为一个单一的视图，但它允许你组合或堆叠最多十个额外的视图。通过创建堆栈，你可以在屏幕上显示多个视图。堆栈甚至可以容纳其他堆栈，从而让你在单个屏幕上显示任意数量的视图。\n\
    \n如图 2-2 所示，共有三种类型的堆栈：\n\n![一段包含 3 组代码的片段。V stack 以垂直形式列出文本。H stack 以水平形式列出文本。Z\
    \ stack 以重叠形式列出文本。](img/329781_7_En_2_Fig2_HTML.jpg)\n\n**图 2-2** 垂直、水平和 Z 堆栈\n\
    \n- `VStack` – 垂直堆栈，将视图排列在另一个视图的上方和下方\n- `HStack` – 水平堆栈，将视图并排排列\n- `ZStack` –\
    \ 一个将视图直接相互重叠的堆栈\n\n一个堆栈算作一个单一的视图。通过使用水平 (`HStack`) 或垂直 (`VStack`) 堆栈，你可以在一个堆栈内添加最多十\
    \ (10) 个视图。为了获得更大的灵活性，你可以将堆栈嵌入到堆栈中，以显示尽可能多的视图。\n\n> **注意：** 一个堆栈最多只能包含十 (10) 个视图。如果你尝试在堆栈中存储\
    \ 11 个或更多视图，Xcode 将显示错误消息并拒绝运行你的程序。\n\n在 SwiftUI 中创建用户界面时，你有三个选择：\n\n- 在编辑器窗格中键入\
    \ Swift 代码。\n- 将一个视图（例如按钮）拖放至编辑器窗格中的 Swift 代码中。\n- 将一个视图（例如按钮）拖放至画布窗格中。\n\n在编辑器窗格中键入\
    \ Swift 代码来设计用户界面是最快、最灵活的方法，但这需要时间，并且需要熟悉不同的选项。为了使键入 Swift 代码定义用户界面视图更容易，Xcode\
    \ 在识别出你正在尝试键入的内容时会显示一个选项弹出菜单。通过选择一个选项并按 Return 键，你可以快速创建用户界面视图，如图 2-3 所示。\n\n\
    ![一个 SwiftUI 屏幕显示了与 Button 组件相关的代码片段。它包括 Button 声明的不同变体，例如 Button (action, label)、Button\
    \ (title, action) 和 Button (role, action, label)。](img/329781_7_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3** 当你键入 Swift 代码定义用户界面视图时，Xcode 会显示一个选项菜单\n\n如果你不熟悉设计用户界面的选项，使用库窗口会更简单，该窗口列出了你可以使用的所有可能的用户界面视图，如图\
    \ 2-4 所示。\n\n![截图显示了各种 UI 组件，例如 View、Control、Library 图标、Button、Color Picker、Date\
    \ Picker、Disclosure Group、Edit Button、Library 窗口、Form、Gauge 和 Group Box。](img/329781_7_En_2_Fig4_HTML.jpg)\n\
    \n**图 2-4** 单击库图标会打开库窗口\n\n一旦你打开库窗口，你可以执行以下任一操作：\n\n- 将用户界面视图从库窗口拖放至编辑器窗格中，如图\
    \ 2-5 所示。\n- 单击可选图标，然后将用户界面视图拖放至画布窗格中模拟的 iOS 设备用户界面上，如图 2-6 所示。\n\n![代码片段显示了一个带有包含\
    \ Button 和 color picker 的 VStack 的 SwiftUI 内容视图。它还提到了按钮的外观取决于放置位置、角色分配和样式，并包含一个在开发人员文档中打开内容的参考。](img/329781_7_En_2_Fig5_HTML.jpg)\n\
    \n**图 2-5** 将用户界面视图拖放至编辑器窗格\n\n![截图显示了各种视图，包括一个 Button 和 Controls。文本提供了关于创建按钮、其操作和标签以及用户如何在不同的平台上激活该按钮的信息。它提到了按钮的外观取决于放置位置、角色分配和样式，并包含一个在开发人员文档中打开内容的参考。](img/329781_7_En_2_Fig6_HTML.jpg)\n\
    \n**图 2-6** 将用户界面视图拖放至画布窗格\n\n无论你如何更改用户界面，Xcode 都会保持编辑器窗格和画布窗格之间的所有更改同步。这意味着当你在编辑器窗格中键入\
    \ Swift 代码时，画布窗格会立即显示你的更改。当你将用户界面视图拖放至画布窗格时，Xcode 会立即自动将该 Swift 代码添加到编辑器窗格中。\n\
    \n画布窗格显示你的用户界面，但如果你想测试你的应用程序，你有两个选择，如图 2-7 所示：\n\n![屏幕显示了一个名为 delete me 2 的项目，包含各种组件，如内容视图、Phone\
    \ SE 和一条成功消息。代码片段包括一个包含带有图像和文本的 VStack 的内容视图结构体。运行图标和实时图标被高亮显示。](img/329781_7_En_2_Fig7_HTML.jpg)\n\
    \n**图 2-7** “运行”按钮和“实时预览”图标\n\n- 单击“运行”按钮或选择“产品”➤“运行”以打开模拟器。\n- 单击画布窗格底部的“实时”图标。\n\
    \n要了解 SwiftUI 如何创建一个可以响应用户的简单用户界面，请按照以下步骤操作：\n\n1. 创建一个新的 iOS App 项目，确保界面是 SwiftUI，并为其指定一个描述性名称（例如\
    \ `SwiftExample`）。\n2. 在导航器窗格中单击 `ContentView` 文件。编辑器窗格将显示 `ContentView` 文件的内容。\n\
    3. 选择“编辑器”➤“画布”。（如果 Canvas 选项前面已经出现复选标记，则跳过此步骤。）这将打开画布，以便你可以预览用户界面。\n4. 删除 `Text`\
    \ 命令中的文本 “Hello, world!”，并键入以下内容，使 `ContentView` 结构体如下所示：\n\n```swift\nstruct\
    \ ContentView: View {\n    @State private var message = true\n    var body: some\
    \ View {\n        VStack {\n            Toggle(isOn: $message) {\n           \
    \     Text(\"Toggle message on/off\")\n            }\n            if message {\n\
    \                Text(\"Here's a secret message!\")\n            }\n        }\n\
    \    }\n}\n```\n\n上述 Swift 代码在屏幕上显示了一个切换开关，但除非你在模拟器（它模拟如 iPhone 或 iPad 之类的 iOS\
    \ 设备）中运行你的应用程序，或者通过单击“实时”图标进行测试，否则你将无法看到它的工作。在大多数情况下，“实时”图标提供了一种在画布窗格中查看和测试用户界面的更快方法。\n\
    \n![一个片段显示了一个切换消息开或关，一个切换消息开或关已启用，文本显示这是一条秘密消息。](img/329781_7_En_2_Fig8_HTML.jpg)\n\
    \n**图 2-8** 实时预览让你可以在画布窗格中与用户界面进行交互\n\n5. 单击“实时”图标以打开“实时预览”。当你单击切换开关时，请注意消息会按图\
    \ 2-8 所示出现和消失。\n6. 再次单击“实时”图标以关闭“实时预览”。\n"
- fmt: "重复前面的步骤，但这次点击“运行”按钮打开模拟器。在模拟器或画布面板中测试你的应用是完全相同的，主要区别在于画布面板通常使用起来快得多。\n\n现在让我们快速浏览这个项目，以便你对其工作原理有一个大致了解。首先，它声明了一个名为“message”的特殊状态变量，初始设置为`true`。接着，`ContentView`结构体定义了一个视图为`VStack`。这意味着`VStack`内部的任何内容都将垂直堆叠显示。\n\
    \n`VStack`中的第一个视图是一个`Toggle`开关，它使用一个`Text`视图在开关左侧显示以下文本：“Toggle message on/off”。当开关打开时，“message”状态变量会被修改为存储`true`值。当开关关闭时，“message”状态变量则会被修改为存储`false`值。\n\
    \n在`Toggle`下方，有一个`if`语句。如果“message”状态变量为`true`，它会显示一个`Text`视图，内容为“Here’s a secret\
    \ message!”。如果“message”状态变量为`false`，则该`Text`视图根本不会显示。\n\n## 使用检查器面板修改用户界面\n\n\
    在SwiftUI中创建用户界面通常涉及两个步骤。首先，你需要安排各个用户界面视图在屏幕上的显示方式。接着，你需要通过更改每个用户界面视图的大小、颜色或位置来自定义它们。\n\
    \n要自定义用户界面视图，你需要添加修改器。Xcode提供了两种添加修改器的方式：\n\n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig9_HTML.jpg)\n\
    \n屏幕显示一个名为“Delete Me 2”的项目，并选择了iPhone SE。`ContentView`结构体包含一个带有`Toggle`按钮和`Text`视图的`VStack`。一个可选择的图标被高亮显示。\n\
    \n**图 2-9** 检查器面板显示了修改用户界面视图的不同方式\n\n*   直接在编辑器面板中输入修改器。\n*   点击你想要修改的视图（在编辑器面板中，或者点击可选择图标后在画布面板中点击该视图）。然后，如图[2-9](#329781_7_En_2_Chapter.xhtml#Fig9)所示，从检查器面板中选择一个修改器。\n\
    \n直接在编辑器面板中输入修改器需要你知道想要使用的修改器名称。随着经验增长，直接在Swift代码中输入修改器会变得很快。然而，刚开始学习时，你可能不知道有哪些修改器可用。这时，你可能会倾向于使用检查器面板。\n\
    \n首先，选择你想要修改的用户界面视图。你可以通过将光标移动到定义该用户界面视图的Swift代码中，或者点击可选择图标然后在画布面板中点击一个用户界面视图来完成此操作。当你选中一个用户界面视图时，检查器面板会显示该特定视图的修改器。\n\
    \n检查器面板会显示最常用的修改器，例如让你选择文本的字体、对齐方式或颜色。通过点击检查器面板底部的“Add Modifier”按钮，你可以查看其他修改器的列表，如图[2-10](#329781_7_En_2_Chapter.xhtml#Fig10)所示。\n\
    \n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig10_HTML.png)\n\n截图中显示了文本、辅助功能、字体、填充和框架等选项。“添加修改器”控件列出了动作、街景、徽章以及其他选项。\n\
    \n**图 2-10** “Add Modifier”按钮会显示一个你可以使用的其他修改器列表\n\n当你在“Add Modifier”列表中看到你想要使用的修改器时，点击该修改器。Xcode会在检查器面板中显示该修改器。如果你不再想看到已添加到检查器面板中的任何修改器，可以点击该修改器右上角的“Delete”按钮，如图[2-11](#329781_7_En_2_Chapter.xhtml#Fig11)所示。\n\
    \n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig11_HTML.jpg)\n\n屏幕显示了一个强调色（蓝色），并且在右上角有一个带深色轮廓高亮的删除按钮。\n\
    \n**图 2-11** 出现一个“Delete”按钮，用于移除已添加到检查器面板中的修改器\n\n请记住，你应用修改器的顺序可能会产生影响。考虑下面的`Text`视图，它有两个修改器：背景（`background`）和填充（`padding`）：\n\
    \n```\nText (\"Here's a secret message!\")\n    .background(Color.yellow)\n  \
    \  .padding()\n```\n\n这会为`Text`视图添加黄色背景，然后在该`Text`视图周围添加填充（间距）。假设你像这样调换了这些修改器的顺序：\n\
    \n```\nText (\"Here's a secret message!\")\n    .padding()\n    .background(Color.yellow)\n\
    ```\n\n这个顺序会先在`Text`视图周围添加填充（间距），然后为背景着色。因为背景现在包含了新添加的间距，背景色也会填满`Text`视图周围的空白区域，如图[2-12](#329781_7_En_2_Chapter.xhtml#Fig12)所示。\n\
    \n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig12_HTML.jpg)\n\n一段6行代码的片段产生了2组输出。文本显示：“here's\
    \ a secret message”。1. 一个带有高亮文本的矩形块。2. 一个带有文本的阴影矩形块。\n\n**图 2-12**"
  raw: 'Repeat the preceding steps except click the Run button to open the Simulator.
    Testing your app in either the Simulator or the Canvas pane is identical. The
    main difference is that the Canvas pane is usually much faster to use.


    Now let’s go over this project so you get a rough idea how it works. First, it
    declares a special State variable called “message,” which is initially set to
    true. Next, the ContentView structure defines a single view as a VStack. That
    means anything inside this VStack will appear stacked on top of each other.


    The first view inside the VStack is a Toggle, which uses a Text view to display
    the following text to the left of the toggle: “Toggle message on/off”. When the
    Toggle is on, the “message” State variable gets changed to hold a true value.
    When the Toggle is off, the “message” State variable gets changed to store a false
    value.


    Underneath the Toggle, an if statement appears. If the “message” State variable
    is true, then it shows a Text view that displays “Here’s a secret message!” If
    the “message” State variable is false, then the Text view does not appear at all.


    ## Modifying the User Interface with the Inspector Pane


    Creating a user interface in SwiftUI typically involves two steps. First, you
    arrange how you want the various user interface views to appear on the screen.
    Next, you need to customize each user interface view by changing its size, color,
    or position.


    To customize user interface views, you add modifiers. Xcode gives you two ways
    to add modifiers:


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig9_HTML.jpg)


    The screen displays a project named Delete Me 2 with the i Phone S E selected.
    The Content View struct contains a V Stack with a toggle button and a text view.
    A selectable icon is highlighted.


    Figure 2-9


    The Inspector pane displays different ways to modify a user interface view


    *   Type modifiers directly in the Editor pane.


    *   Click the view you want to modify (either in the Editor pane or after clicking
    the Selectable icon and then clicking the view in the Canvas pane). Then select
    a modifier from the Inspector pane as shown in Figure [2-9](#329781_7_En_2_Chapter.xhtml#Fig9).


    Typing modifiers directly into the Editor pane requires knowing the names of the
    modifiers you want to use. As you get more experienced, typing modifiers directly
    into your Swift code will be fast. However, when you’re first getting started,
    you may not know which modifiers are even available. That’s when you might prefer
    using the Inspector pane.


    First, select the user interface view you want to modify. You can do this by moving
    the cursor into the Swift code that defines that user interface view or by clicking
    the Selectable icon and then clicking a user interface view in the Canvas pane.
    When you select a user interface view, the Inspector pane displays modifiers for
    that particular view.


    The Inspector pane displays the most commonly used modifiers such as letting you
    choose the font, alignment, or color for text. By clicking the Add Modifier button
    near the bottom of the Inspector pane, you can view a list of additional modifiers
    as shown in Figure [2-10](#329781_7_En_2_Chapter.xhtml#Fig10).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig10_HTML.png)


    A screenshot displays text, accessibility, font, padding, and frame options. The
    add modifier controls list action street, alert, badge, and other options.


    Figure 2-10


    The Add Modifier button displays a list of additional modifiers you can use


    When you see a modifier you want to use from the Add Modifier list, click that
    modifier. Xcode displays that modifier in the Inspector pane. If you no longer
    want to see any modifiers you may have added to the Inspector pane, click the
    Delete button in the upper-right corner of that modifier as shown in Figure [2-11](#329781_7_En_2_Chapter.xhtml#Fig11).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig11_HTML.jpg)


    A screen displays an accent color, blue, and a delete button at the top right
    highlights with a dark outline.


    Figure 2-11


    A Delete button appears to remove modifiers you have added to the Inspector pane


    Keep in mind that the order that you apply modifiers can make a difference. Consider
    the following Text view with two modifiers, a background and a padding:


    ```

    Text ("Here''s a secret message!")

    .background(Color.yellow)

    .padding()

    ```


    This adds a background color of yellow to the Text view and then adds padding
    (space) around that Text view. Suppose you switched these modifiers around like
    this:


    ```

    Text ("Here''s a secret message!")

    .padding()

    .background(Color.yellow)

    ```


    This order adds padding (space) around the Text view first and then colors the
    background. Because the background now includes the added space, the background
    color fills the space around the Text view as well, as shown in Figure [2-12](#329781_7_En_2_Chapter.xhtml#Fig12).


    ![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig12_HTML.jpg)


    A snippet of 6-line code results 2 sets of outputs. The text reads, here''s a
    secret message. 1\. A rectangle block with text highlighted. 2. A shaded rectangle
    block with text.


    Figure 2-12'
