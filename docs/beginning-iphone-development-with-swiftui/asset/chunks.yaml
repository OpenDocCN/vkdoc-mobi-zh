  trans: "\n# 使用分段控件\n\n按钮代表单个命令，因此如果你想让用户在多个命令之间做出选择，就需要使用多个按钮。不幸的是，在用户界面上塞入多个按钮会很麻烦。为了解决这个问题，SwiftUI\
    \ 提供了分段控件。\n\n**注意**\n\n尽管分段控件理论上可以显示大量选项，但显示的选项越多，分段控件看起来就越杂乱。一般来说，如果分段控件包含的选项过多，可以考虑改用其他方式（如转盘或菜单选择器）来让用户进行选择，详见第\
    \ 8 章。\n\n分段控件的主要思想是在紧凑的空间内显示两个或更多选项，而不是使用多个按钮。要创建分段控件，你需要以下内容：\n\n- 一个 `State`\
    \ 变量，用于表示用户选择了哪个分段（选项）\n- 一个列出了两个或更多选项的 `Picker` 视图\n- 一个与每个选项关联的 `tag` 属性\n-\
    \ `SegmentedPickerStyle` 修饰符\n\n要在分段控件上显示选项，最简单的方法是使用多个 `Text` 视图，如下所示：\n\n```\n\
    Picker(\"\", selection: $selectedItem) {\n    Text(\"鱼\")\n    Text(\"龟\")\n \
    \   Text(\"兔\")\n    Text(\"鸟\")\n}.pickerStyle(.segmented)\n```\n\n这将创建一个分段控件，按顺序显示\
    \ `Text` 视图中的项目，因此最左侧的项目将是\"鱼\"，最右侧的项目将是\"鸟\"，如图 6-4 所示。\n\n![](img/329781_7_En_6_Fig4_HTML.jpg)\n\
    \n这一段代码定义了一个使用分段样式的 `Picker`，允许从鱼、龟、兔和鸟等选项中进行选择。\n\n**图 6-4** 创建一个简单的分段控件\n\n\
    在 `Picker` 视图中放置多个 `Text` 视图可以定义显示的选项，但分段控件无法知道用户选择了哪个选项。如果你通过使用多个 `Text` 视图在\
    \ `Picker` 视图中定义选项，则需要在每个 `Text` 视图后添加一个 `.tag` 属性。\n\n这个 `.tag` 属性提供了代表分段控件上每个项目的实际数据。`.tag`\
    \ 属性可以是任何数据类型（如 `String` 或 `Int`），但每个 `.tag` 属性都应包含相同的数据类型。\n\n要了解如何使用分段控件——通过\
    \ `Picker` 视图中的多个 `Text` 视图和 `.tag` 属性来显示选项——请按照以下步骤操作：\n\n![](img/329781_7_En_6_Fig5_HTML.jpg)\n\
    \n一个底部显示红、绿、蓝文本的移动屏幕。\n\n**图 6-5** 分段控件的完整用户界面\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其命名（例如\
    \ \"SegmentedControl\"）。\n\n2.  在导航面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView:\
    \ View` 这行代码下方添加一个 `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n\
    \        @State private var selectedColor = Color.gray\n        var body: some\
    \ View {\n    ```\n\n    这将创建一个名为 `selectedColor` 的 `State` 变量。注意，`private` 关键字是可选的，它仅表示该变量只能在\
    \ `ContentView` 结构体内部使用。`selectedColor` 变量的初始值是 `Color.gray`，这意味着其推断的数据类型是 `Color`。\n\
    \n4.  在 `var body: some View` 内部创建一个间距为 28 的 `VStack`，如下所示：\n\n    ```\n    struct\
    \ ContentView: View {\n        @State private var selectedColor = Color.gray\n\
    \        var body: some View {\n            VStack (spacing: 28) {\n         \
    \   }\n        }\n    }\n    ```\n\n    间距值可以是任意你想要的数值，它会在你添加到 `VStack` 内部的任何视图之间增加间距，使它们在用户界面上不会显得拥挤。\n\
    \n5.  输入以下内容，在 `VStack` 内部创建一个彩色矩形：\n\n    ```\n    Rectangle()\n        .fill(selectedColor)\n\
    \    ```\n\n    这将创建一个矩形，其颜色由 `selectedColor` 状态变量定义。初始状态下，该矩形填充为 `Color.gray`。\n"
- fmt: "6.  Type the following to create a segmented control inside the `VStack`:\n\
    \n```\nPicker(\"Favorite Color\", selection: $selectedColor) {\n    Text(\"Red\"\
    ).tag(Color.red)\n    Text(\"Green\").tag(Color.green)\n    Text(\"Blue\").tag(Color.blue)\n\
    }.pickerStyle(.segmented)\n```\n\nThis creates a `Picker` view that lists three\
    \ options (\"Red\", \"Green\", and \"Blue\") displayed on the segmented control.\
    \ After each option is a `.tag` that's linked to each option. While the user sees\
    \ the options displayed by the three `Text` views (\"Red\", \"Green\", and \"\
    Blue\"), the `selectedColor` State variable is actually storing the `.tag` values,\
    \ which are `Colors` (`.red`, `.green`, and `.blue`). The `.pickerStyle` modifier\
    \ displays the `Picker` view as a segmented control by defining `.segmented` (instead\
    \ of `.wheel` or `.menu`).\n\nThe entire SwiftUI code should look like this:\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n    @State private var selectedColor\
    \ = Color.gray\n    var body: some View {\n        VStack (spacing: 28) {\n  \
    \          Rectangle()\n                .fill(selectedColor)\n            Picker(\"\
    Favorite Color\", selection: $selectedColor) {\n                Text(\"Red\").tag(Color.red)\n\
    \                Text(\"Green\").tag(Color.green)\n                Text(\"Blue\"\
    ).tag(Color.blue)\n            }.pickerStyle(.segmented)\n        }\n    }\n}\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n7.  Click the Live icon in the\
    \ Canvas pane.\n\n8.  Click the \"Red,\" \"Green,\" and \"Blue\" options on the\
    \ segmented control. Each time you choose a different option from the segmented\
    \ control, the `selectedColor` State variable changes. Then this State variable\
    \ automatically changes the color of the rectangle as shown in Figure [6-5](#329781_7_En_6_Chapter.xhtml#Fig5).\n\
    \n**Note**  \nIf you omit the `.pickerStyle(.segmented)` modifier, the `Picker`\
    \ view will display the three options (\"Red\", \"Green\", and \"Blue\") in a\
    \ menu as shown in Figure [6-6](#329781_7_En_6_Chapter.xhtml#Fig6).\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig6_HTML.jpg)\
    \  \nA screen displays red, green, and blue. The blue option is selected.  \n\
    **Figure 6-6** The `Picker` view appearance without the `.pickerStyle` modifier\
    \ displays a menu\n\nTyping multiple `Text` views to populate a segmented control\
    \ can work, but repetition is almost always a sign that code can be simplified.\
    \ In the case of a `Picker` view, you can replace multiple `Text` views by using\
    \ an array and a `ForEach` loop instead like this:\n\n```\nPicker(\"\", selection:\
    \ $selectedItem) {\n    ForEach(animalArray, id: \\.self) {\n        Text($0)\n\
    \    }\n}.pickerStyle(.segmented)\n```\n\nThis `ForEach` loop identifies an array\
    \ that contains the options to appear on the segmented control (such as an array\
    \ called `animalArray`) and uses the `id` property to identify each array item\
    \ to display in a single `Text` view. This `Text` view uses the `$0` shorthand\
    \ argument name to represent each array item.\n\nBesides reducing the need of\
    \ using multiple `Text` views to define the options on a segmented control, the\
    \ `ForEach` loop also eliminates the need for separate `.tag` properties for each\
    \ item. Instead, the array items themselves represent both the options that appear\
    \ on the segmented control and the choice the user selected.\n\nTo see how to\
    \ use a segmented control that uses a `ForEach` loop to populate a `Picker` view,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as \"SegmentedControlForEach.\"\n\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n\n3.  Add a State variable underneath the `struct\
    \ ContentView: View` line like this:\n\n```\n@State var selectedItem = \"\"\n\
    ```\n\nThis creates a State variable called `selectedItem`. The initial value\
    \ of this `selectedItem` variable is an empty string, which means its inferred\
    \ data type is `String`.\n\n4.  Create a `VStack` inside the `var body: some View`\
    \ like this:\n\n```\nstruct ContentView: View {\n    @State var selectedItem =\
    \ \"\"\n    let animalArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n \
    \   var body: some View {\n        VStack {\n        }\n    }\n}\n```\n\n5.  Type\
    \ the following to create a `Picker` view and a `Text` view inside the `VStack`:\n\
    \n```\nVStack {\n    Picker(\"\", selection: $selectedItem) {\n        ForEach(animalArray,\
    \ id: \\.self) {\n            Text($0)\n        }\n    }.pickerStyle(.segmented)\n\
    \    Text(selectedItem)\n}\n```\n\nThis uses a `ForEach` loop to populate the\
    \ segmented control created by the `Picker` view. The `Text` view displays the\
    \ choice the user selected.\n\nThe entire SwiftUI code should look like this:\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var selectedItem\
    \ = \"\"\n    let animalArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n\
    \    var body: some View {\n        VStack {\n            Picker(\"\", selection:\
    \ $selectedItem) {\n                ForEach(animalArray, id: \\.self) {\n    \
    \                Text($0)\n                }\n            }.pickerStyle(.segmented)\n\
    \            Text(selectedItem)\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6.  Click the Live icon in the Canvas pane.\n\n7.  Click the\
    \ \"Fish,\" \"Tortoise,\" \"Hare,\" and \"Bird\" options on the segmented control.\
    \ Each time you choose a different option from the segmented control, the `selectedItem`\
    \ State variable changes. Then this State variable automatically changes what\
    \ appears in the `Text` view."
