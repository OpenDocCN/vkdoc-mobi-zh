    \    y: .value(\"Sales\", x.sales))\n    }\n    }\n    ```\n\n    完整的 `ContentView`\
    \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    import Charts\n    struct SalesPeople:\
    \ Identifiable {\n    var name: String\n    var sales: Int\n    var id = UUID()\n\
    \    }\n    var mySalesArray: [SalesPeople] = [\n    .init(name: \"Oscar\", sales:\
