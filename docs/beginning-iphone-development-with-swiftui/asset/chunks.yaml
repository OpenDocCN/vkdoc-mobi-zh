    \n![](images/329781_7_En_14_Chapter/329781_7_En_14_Fig6_HTML.jpg)\n\nA partial\
    \ screenshot represents the title group box. It comprises a toggle button labeled\
    \ click me and a blank text box underneath.\n\nFigure 14-6\n\nThe appearance of\
    \ a Group Box\n\n## Summary\n\nForms let you visually group related views together\
    \ on the user interface. To further differentiate views on a Form, you can divide\
    \ a Form into multiple sections where each Section lets you define an optional\
    \ header and/or optional footer. A Section can have a header, a footer, both a\
    \ header and a footer, or nothing at all.\n\nDepending on how the user responds\
    \ to the user interface, you may want to disable one or more views to prevent\
    \ the user from interacting with them. Disabling one or more views prevents the\
    \ user from inputting unnecessary data.\n\nBoth forms and group boxes are simply\
    \ two different ways to group and organize related views together to make your\
    \ app’s user interface easier to understand.\n\n# 15. Using Disclosure Groups,\
    \ Scroll Views, and Outline Groups\n\nMany apps contain lots of information such\
    \ as names and addresses. However, you may not want to view all stored information\
    \ at once to avoid cluttering up the screen. When you want to give users the option\
    \ of selectively hiding or displaying information, that’s when you can use a Disclosure\
    \ Group or an Outline Group.\n\nA Disclosure Group can appear in two states. First,\
    \ it can appear as a single line of text that represents a link. Second, when\
    \ the user taps this link, it expands to reveal one or more additional views as\
    \ shown in Figure [15-1](#329781_7_En_15_Chapter.xhtml#Fig1).\n\n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig1_HTML.jpg)\n\
    \nA screenshot denotes the option labeled show software license in collapsed state\
    \ and expandable state. The expandable state represents the details of the software\
    \ license along with a button to agree on the terms.\n\nFigure 15-1\n\nThe two\
    \ states of a Disclosure Group\n\nWhile a Disclosure Group can selectively hide\
    \ or show a group of related views, an Outline Group can selectively hide or show\
    \ groups of text within a List (see Chapter [13](#329781_7_En_13_Chapter.xhtml))\
    \ as shown in Figure [15-2](#329781_7_En_15_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig2_HTML.jpg)\n\
    \nA screenshot of a dropdown menu of Mammal listing dog, cat, elephant, and whale.\
    \ It indicates the Poodle, Collie, and Saint Bernard breeds under the dog.\n\n\
    Figure 15-2\n\nThe appearance of an Outline Group"
  trans: "\n# 在表单中禁用视图\n\n通常情况下，纸质表单可能会询问一系列问题。根据你的回答，另一组问题可能就不相关了。例如，如果一张纸质表单询问你是已婚还是单身，你可能会回答“已婚”。在这种情况下，表单的另一部分可能会询问你配偶的姓名和联系方式。\n\
    \n然而，如果你回答“单身”，那么回答任何关于配偶的额外问题就没有意义了。使用 SwiftUI 表单，你可以通过使用 `.disabled` 修饰符，基于一个布尔值有选择地禁用\
    \ `Form` 中的视图，如下所示：\n\n```\n.disabled(flag)\n```\n\n如果布尔变量的值为 `true`，那么 `.disabled`\
    \ 修饰符会阻止用户与所选视图交互。如果布尔变量为 `false`，那么 `.disabled` 修饰符允许用户与所选视图交互。\n\n要了解如何在 `Form`\
    \ 中使用 `.disabled` 修饰符，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“FormDisable”。\n\
    2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 代码行下方添加如下的 `State`\
    \ 变量：\n\n    ```\n    @State var flag = false\n    ```\n\n4.  在 `var body: some\
    \ View` 内部添加一个 `Form`，如下所示：\n\n    ```\n    var body: some View {\n        Form\
    \ {\n        }\n    }\n    ```\n\n5.  在 `Form` 内部添加一个 `Section` 来定义页眉和页脚，如下所示：\n\
    \n    ```\n    var body: some View {\n        Form {\n            Section {\n\
    \            } header: {\n                Text(\"Header\")\n            } footer:\
    \ {\n                Text(\"Footer\")\n            }\n        }\n    }\n    ```\n\
    \n6.  在 `Section` 内部添加一个 `Toggle` 和一个 `Button`，如下所示：\n\n    ```\n    var body:\
    \ some View {\n        Form {\n            Section {\n                Toggle(isOn:\
    \ $flag) {\n                    Text(\"Are you married?\")\n                }\n\
    \                Button(flag ? \"Disabled\" : \"Click Me\") {\n              \
    \  }.disabled(flag)\n            } header: {\n                Text(\"Header\"\
    )\n            } footer: {\n                Text(\"Footer\")\n            }\n\
    \        }\n    }\n    ```\n\n    请注意，`.disabled` 修饰符会影响 `Button`。如果 `flag` 布尔变量为\
    \ `true`，那么 `Button` 将被禁用。如果 `flag` 布尔变量为 `false`，那么 `Button` 将被启用。整个 `ContentView`\
    \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n  \
    \      @State var flag = false\n        var body: some View {\n            Form\
    \ {\n                Section {\n                    Toggle(isOn: $flag) {\n  \
    \                      Text(\"Are you married?\")\n                    }\n   \
    \                 Button(flag ? \"Disabled\" : \"Click Me\") {\n             \
    \       }.disabled(flag)\n                } header: {\n                    Text(\"\
    Header\")\n                } footer: {\n                    Text(\"Footer\")\n\
    \                }\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n7.  在画布窗格中点击 Live 图标。注意，`Button` 以蓝色显示标题“Click Me”。\n\
    8.  点击 `Toggle`。这会将 `flag` `State` 变量从 `false` 变为 `true`（或从 `true` 变为 `false`）。当\
    \ `flag` `State` 变量等于 `true` 时，`.disabled` 修饰符会使 `Button` 变灰，使用户无法选中它。\n\n## 使用分组框\n\
    \n分组框提供了一种更简单的方法来将相关的视图组织在一起。虽然与 `Form` 类似，但`Group Box` 可以显示标签，并在灰色矩形内直观地显示多个视图，而\
    \ `Form` 则在白色矩形内显示多个视图，如图 14-5 所示。\n\n![一个插图，展示了一段代码片段及其在移动屏幕上的渲染效果。它指出了代码中用于显示表单和分组框的功能。每个元素都包含一个可点击的按钮。](img/329781_7_En_14_Fig5_HTML.jpg)\n\
    \n**图 14-5** – Form 和 Group Box 之间的视觉差异\n\n要了解如何使用 `Group Box`，请按照以下步骤操作：\n\n\
    1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“GroupBox”。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `struct ContentView: View` 代码行下方添加如下的 `State` 变量：\n\n    ```\n  \
    \  struct ContentView: View {\n        @State var flag = true\n        @State\
    \ var message = \"\"\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `GroupBox`，如下所示：\n\
    \n    ```\n    var body: some View {\n        GroupBox(label: Text(\"Group Box\"\
    )) {\n        }\n    }\n    ```\n\n5.  在 `GroupBox` 内部添加一个 `Toggle` 和一个 `TextField`，如下所示：\n\
    \n    ```\n    var body: some View {\n        GroupBox(label: Text(\"Group Box\"\
    )) {\n            Toggle(isOn: $flag) {\n                Text(\"Click me\")\n\
    \            }\n            TextField(\"Type here\", text: $message)\n       \
    \ }\n    }\n    ```\n\n    整个 `ContentView` 文件应如下所示：\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n        @State var flag = true\n        @State\
    \ var message = \"\"\n        var body: some View {\n            GroupBox(label:\
    \ Text(\"Group Box\")) {\n                Toggle(isOn: $flag) {\n            \
    \        Text(\"Click me\")\n                }\n                TextField(\"Type\
    \ here\", text: $message)\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n上述代码创建了一个`Group Box`，如图 14-6 所示。\n\n![一个部分截图，展示了标题为\
    \ group box 的界面。它包含一个标记为 click me 的切换按钮以及下方的一个空白文本框。](img/329781_7_En_14_Fig6_HTML.jpg)\n\
    \n**图 14-6** – Group Box 的外观\n\n## 总结\n\n`Form` 让你可以在用户界面上直观地将相关视图组合在一起。为了进一步区分\
    \ `Form` 上的视图，你可以将 `Form` 划分为多个部分，每个 `Section` 允许你定义一个可选的页眉和/或可选的页脚。一个 `Section`\
    \ 可以有页眉、页脚、既有页眉又有页脚，或者什么都没有。\n\n根据用户对用户界面的响应方式，你可能希望禁用一个或多个视图，以防止用户与之交互。禁用一个或多个视图可以防止用户输入不必要的数据。\n\
    \n表单和分组框都只是两种不同的方式，用于将相关的视图分组和组织在一起，使你的应用程序用户界面更易于理解。\n\n# 15. 使用 Disclosure Groups、Scroll\
    \ Views 和 Outline Groups\n\n许多应用程序包含大量信息，例如姓名和地址。但是，你可能不希望同时查看所有存储的信息，以免屏幕杂乱。当你希望让用户有选择地隐藏或显示信息时，就可以使用\
    \ `Disclosure Group` 或 `Outline Group`。\n\n一个 `Disclosure Group` 可以呈现两种状态。首先，它可以显示为代表链接的单行文本。其次，当用户点击此链接时，它会展开以显示一个或多个额外的视图，如图\
    \ 15-1 所示。\n\n![一个屏幕截图，展示了折叠状态和可展开状态下标记为“show software license”的选项。可展开状态显示了软件许可证的详细信息以及一个同意条款的按钮。](img/329781_7_En_15_Fig1_HTML.jpg)\n\
    \n**图 15-1** – Disclosure Group 的两种状态\n\n`Disclosure Group` 可以可选地隐藏或显示一组相关视图，而\
    \ `Outline Group` 可以可选地在 `List`（参见第 13 章）中隐藏或显示文本组，如图 15-2 所示。\n\n![一个哺乳动物下拉菜单的屏幕截图，列出了\
    \ dog、cat、elephant 和 whale。它指示了在 dog 类别下的 Poodle、Collie 和 Saint Bernard 品种。](img/329781_7_En_15_Fig2_HTML.jpg)\n\
    \n**图 15-2** – Outline Group 的外观\n"
- fmt: "# Using a Disclosure Group\n\nA `DisclosureGroup` is designed to hide one\
    \ or more views (`Text`, `Slider`, `Toggle`, etc.) until the user taps the `DisclosureGroup`\
    \ name to expand it. When expanded, a `DisclosureGroup` reveals one or more views\
    \ on the user interface.\n\n**Note:** Like a stack, a `DisclosureGroup` can hold\
    \ a maximum of ten (10) views. However, one or more of those views can be stacks\
    \ that can hold multiple views. In addition, you can nest disclosure groups inside\
    \ of other disclosure groups.\n\nTo create a `DisclosureGroup`, you first need\
    \ to create descriptive text that represents a link on the user interface. This\
    \ text appears with a `>` symbol on the far right to show users that this link\
    \ contains hidden items. Second, you need to create a list of views (up to ten)\
    \ that will appear when the user selects the `DisclosureGroup` link.\n\nTo see\
    \ how to create a `DisclosureGroup`, follow these steps:\n\n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3** – The expanded `DisclosureGroup`\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “DisclosureGroup.”\n2.\
    \ Click the `ContentView` file in the Navigator pane.\n3. Add three `State` variables\
    \ under the `struct ContentView: View` line like this:\n\n    ```\n    @State\
    \ var sliderValue = 0.0\n    @State var message = \"\"\n    @State var flag =\
    \ true\n    ```\n\n4. Add a `DisclosureGroup` inside the `var body: some View`\
    \ like this:\n\n    ```\n    var body: some View {\n    DisclosureGroup(\"Expand\
    \ Me\") {\n    }.padding()\n    }\n    ```\n\n5. Add the following inside the\
    \ `DisclosureGroup`:\n\n    ```\n    var body: some View {\n    DisclosureGroup(\"\
    Expand Me\") {\n    Text(\"You typed = \\(message)\")\n    TextField(\"Type here\"\
    , text: $message)\n    .padding()\n    Text(flag ? \"Toggle = true\" : \"Toggle\
    \ = false\")\n    Toggle(isOn: $flag) {\n    Text(\"Toggle\")\n    }.padding()\n\
    \    Text(\"The slider value = \\(sliderValue)\")\n    Slider(value: $sliderValue,\
    \ in: 0...15)\n    .padding()\n    }.padding()\n    }\n    ```\n\n    The entire\
    \ `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n \
    \   struct ContentView: View {\n    @State var sliderValue = 0.0\n    @State var\
    \ message = \"\"\n    @State var flag = true\n    var body: some View {\n    DisclosureGroup(\"\
    Expand Me\") {\n    Text(\"You typed = \\(message)\")\n    TextField(\"Type here\"\
    , text: $message)\n    .padding()\n    Text(flag ? \"Toggle = true\" : \"Toggle\
    \ = false\")\n    Toggle(isOn: $flag) {\n    Text(\"Toggle\")\n    }.padding()\n\
    \    Text(\"The slider value = \\(sliderValue)\")\n    Slider(value: $sliderValue,\
    \ in: 0...15)\n    .padding()\n    }.padding()\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n6. Click the Live icon in the Canvas pane.\n7. Click\
    \ the \"Expand Me\" `DisclosureGroup` link to reveal all the views hidden inside\
    \ as shown in Figure [15-3](#329781_7_En_15_Chapter.xhtml#Fig3).\n8. Click in\
    \ the Text field and type some text. Notice that whatever you type appears in\
    \ the `Text` view that displayed “You typed =”.\n9. Click the `Toggle`. Notice\
    \ that each time you click the `Toggle`, the `Text` view above the `Toggle` displays\
    \ either “Toggle = true” or “Toggle = false”.\n10. Drag the `Slider` left and\
    \ right. Notice that as you drag the `Slider`, its numeric value appears in the\
    \ `Text` view above the `Slider` that displays “The slider value =”.\n11. Click\
    \ the `DisclosureGroup` link again to hide all the views. Each time you click\
    \ the `DisclosureGroup` link, it alternates between showing all the views inside\
    \ the `DisclosureGroup` and hiding them.\n\n# Using a Scroll View\n\nWhen you\
    \ arrange multiple views within a `VStack`, those views remain fixed on the user\
    \ interface. If you display more views than the user interface can show, part\
    \ of those views will be cut off or hidden out of sight. To fix this problem,\
    \ SwiftUI offers a special container called a `ScrollView`.\n\nLike a stack, a\
    \ `ScrollView` can hold multiple views. Unlike a stack, a `ScrollView` lets users\
    \ scroll vertically or horizontally to view the entire contents of the `ScrollView`.\
    \ Scroll views can work anywhere you might use a stack, including within a `DisclosureGroup`.\n\
    \nThe simplest way to create a `ScrollView` is to define a `ScrollView` like this:\n\
    \n```\nScrollView {\n//  Multiple views here\n}\n```\n\nThis lets you scroll vertically\
    \ with a scroll indicator on the right side. The scroll indicator lets you see\
    \ how close or how far away you may be to/from the beginning or end of the list\
    \ of items as shown in Figure [15-4](#329781_7_En_15_Chapter.xhtml#Fig4).\n\n\
    ![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig4_HTML.jpg)\n\n**Figure 15-4**\
    \ – The scroll indicator appears on the right of a vertically scrolling `ScrollView`\n\
    \nAnother way to create a `ScrollView` is to define a direction to scroll (`Axis.Set.horizontal`\
    \ or `Axis.Set.vertical`) along with whether to show the scroll indicator or not\
    \ (`showsIndicators:` parameter) like this:\n\n```\nScrollView(Axis.Set.horizontal,\
    \ showsIndicators: false, content: {\n}\n```\n\nTo see how the `ScrollView` works,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as “ScrollView.”\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n3. Add a `ScrollView` under the `var body: some View` line\
    \ like this:\n\n    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    })\n    }\n    .padding()\n    }\n  \
    \  ```\n\n    To shorten the `ScrollView` code, you could just do this:\n\n  \
    \  ```\n    var body: some View {\n    VStack {\n    ScrollView {\n    }\n   \
    \ }\n    ```\n\n4. Add a `ForEach` loop inside the `ScrollView` like this:\n\n\
    \    ```\n    var body: some View {\n    VStack {\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    ForEach(0..<50) {\n    Text(\"Item #\\\
    ($0)     \")\n    }\n    })\n    }\n    .padding()\n    }\n    ```\n\n    The\
    \ entire `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    var body: some View {\n    VStack {\n   \
    \ ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    ForEach(0..<50)\
    \ {\n    Text(\"Item #\\($0)     \")\n    }\n    })\n    }\n    .padding()\n \
    \   }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n5. Click\
    \ the Live icon in the Canvas pane.\n6. Scroll up and down on the list of “Item\
    \ #” items displayed on the user interface. Notice that as you scroll up or down,\
    \ you can see the scroll indicator on the right side (see Figure [15-4](#329781_7_En_15_Chapter.xhtml#Fig4))."
