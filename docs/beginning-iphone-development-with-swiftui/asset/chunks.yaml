    \n## Using withAnimation\n\nBy using the `.animation` modifier, you can define\
    \ which views you want to animate. One problem with the `.animation` modifier\
    \ is that if you have five views that you want to animate identically, you have\
    \ to add the same `.animation` modifier to all five views like this:\n\n```swift\n\
    HStack {\nText(\"One\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
    \ value: start)\nText(\"Two\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
    \ value: start)\nText(\"Three\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
    \ value: start)\nText(\"Four\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
    \ value: start)\nText(\"Five\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default,\
    \ value: start)\n}\n```\n\nTo solve this problem, SwiftUI offers a second way\
    \ to animate views. The `withAnimation` lets you specify a `State` variable that\
    \ can animate views. Rather than write multiple `.animation` modifiers on separate\
    \ views, you can just define the `State` variable to affect, and when that `State`\
    \ variable changes, it automatically animates any view that uses that `State`\
    \ variable like this:\n\n```swift\nwithAnimation {\nstart.toggle()\n}\n```\n\n\
