- fmt: "The order of modifiers can make a difference\n\nNo matter which method you\
    \ use to add modifiers, Xcode keeps everything synchronized. So if you type modifiers\
    \ in the Editor pane, your changes automatically appear in the Inspector pane.\
    \ Likewise, if you choose a modifier in the Inspector pane, Xcode automatically\
    \ adds that modifier to your Swift code in the Editor pane.\n\nTo see how to change\
    \ the appearance of a user interface item, follow these steps:\n\n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig13_HTML.jpg)\n\
    \nA screen displays a text with the phrase \"Here's a secret message\" along with\
    \ various modifiers such as accessibility, label, font, weight, color, alignment,\
    \ line limit, padding, and more.\n\nFigure 2-13\n\nThe `Font` popup menu displays\
    \ different font options\n\n1.  Make sure your `SwiftExample` project from the\
    \ previous section is loaded in Xcode. The `ContentView` file should contain a\
    \ `Toggle` and a `Text` view that appears underneath the `Toggle`.\n\n2.  Click\
    \ the Selectable icon near the bottom of the Canvas pane. This will let you select\
    \ views by clicking them directly in the Canvas pane.\n\n3.  Click the `Toggle`\
    \ in the Canvas pane or move the cursor in the `Toggle` in the Editor pane. Xcode\
    \ displays the Inspector pane on the right side of the Xcode window, which shows\
    \ you the modifiers you can choose to change the appearance of the `Toggle`.\n\
    \n4.  Click the `Text` view in the Canvas pane that displays \"Here’s a secret\
    \ message!\" or move the cursor into the `Text` view in the Editor pane. Notice\
    \ that the Inspector pane displays modifiers to change the appearance of the `Text`\
    \ view.\n\n5.  Click the `Font` popup menu. A list of different font options appears\
    \ as shown in Figure [2-13](#329781_7_En_2_Chapter.xhtml#Fig13).\n\n![](images/329781_7_En_2_Chapter/329781_7_En_2_Fig14_HTML.jpg)\n\
    \nA screen displays the Content View with various modifiers, including preview\
    \ settings, device layout, orientation, color scheme, accessibility, padding,\
    \ toggle for a secret message, frame size adjustments, and the option to add additional\
    \ modifiers such as width and height.\n\nFigure 2-14\n\nSwiftUI adapts user interfaces\
    \ to different-size screens\n\n1.  Choose `Large Title`. Notice that Xcode automatically\
    \ adds the `.font(.largeTitle)` command in the `ContentView` file as shown in\
    \ the following:\n\n    ```\n    Text (\"Here's a secret message!\")\n    .font(.largeTitle)\n\
    \    ```\n\n2.  Click the `Weight` popup menu and choose `Semibold`.\n\n3.  Click\
    \ the `Color` popup menu and choose `Red`. Notice that each time you choose a\
    \ modifier, Xcode automatically adds the Swift code to your `.swift` file as shown\
    \ in the following:\n\n    ```\n    Text (\"Here's a secret message!\")\n    .font(.largeTitle)\n\
    \    .fontWeight(.semibold)\n    .foregroundColor(Color.red)\n    ```\n\n4.  Move\
    \ the cursor into `ContentView()` inside the `ContentView_Previews: PreviewProvider`\
    \ structure.\n\n5.  Click the `Device` popup menu in the Inspector pane.\n\n6.\
    \  Choose an iPad model. Notice that the Canvas pane changes to mimic an iPad.\
    \ Also note how SwiftUI automatically modifies the appearance of your user interface\
    \ so it appears correctly on a different-size screen as shown in Figure [2-14](#329781_7_En_2_Chapter.xhtml#Fig14).\
    \ (Xcode may take time to change the Canvas pane to display a different iOS device,\
    \ so be patient.)\n\n1.  Click the `Device` popup menu again and choose an iPhone\
    \ model such as iPhone 11. The canvas now changes to mimic your chosen iPhone\
    \ model.\n\nThe basic idea behind SwiftUI is to let you design your user interface\
    \ and let Xcode automatically adjust its appearance for different iOS screen sizes.\
    \ Instead of writing a lot of Swift code to design your user interface, SwiftUI\
    \ lets you write a minimal amount of Swift code to design your user interface\
    \ so you can focus your time writing Swift code to make your app do something\
    \ unique.\n\n## Summary\n\nEvery app needs a user interface. With SwiftUI, you\
    \ simply define the user interface items you want, and SwiftUI takes care of making\
    \ sure your user interface works and looks correctly on different-size iOS screens.\n\
    \nYou can design a user interface programmatically (by writing Swift code) or\
    \ visually (by dragging and dropping user interface items from the Library window).\
    \ Programmers often use both methods to design their user interface. Once you’ve\
    \ added items (buttons, labels, text fields, etc.) to a user interface, you can\
    \ customize those items using modifiers either through code or through the Inspector\
    \ pane.\n\nOnce you’ve designed and customized the appearance of your user interface,\
    \ you can test it in two ways. First, you can run your app in the Simulator program,\
    \ which can mimic different iOS devices such as an iPhone or iPad. Second, you\
    \ can use the Live Preview feature to interact with your user interface in the\
    \ Canvas pane.\n\nUser interfaces represent what users see, so it’s important\
    \ that your user interface always looks good no matter what type of iOS device\
    \ the user runs it on. Now that you understand the basics of how a user interface\
    \ works, it’s time to start learning the details of specific user interface items\
    \ such as buttons, pickers, and sliders.\n\n# 3. Placing Views on the User Interface\n\
    \nWhen you place a single view on a user interface, SwiftUI centers it in the\
    \ middle of the screen whether that screen is a small iPhone screen or a much\
    \ larger iPad screen. As you add more views to your user interface, SwiftUI simply\
    \ displays those views on top of each other or side by side, depending on whether\
    \ you arrange them in a vertical or horizontal stack. However, the more views\
    \ you add to a user interface, the more crowded neighboring views can appear.\
    \ To solve this problem, SwiftUI offers several ways to place views on the user\
    \ interface:\n\n*   Use the `padding` modifier.\n\n*   Define spacing within a\
    \ stack.\n\n*   Use a spacer between views.\n\n*   Define an offset or position\
    \ location.\n\nYou can use one or more of these different methods to arrange views\
    \ on the user interface so they appear exactly where you want them. Best of all,\
    \ these positioning methods work on all user interface views in SwiftUI."
  raw: "The order of modifiers can make a difference\n\nNo matter which method you\
