    (such as a Text view) for decorative purposes. The five common geometric shapes
    are shown in Figure [5-1](#329781_7_En_5_Chapter.xhtml#Fig1):


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig1_HTML.jpg)


    A set of 5 dark-colored illustrations of a capsule, circle, ellipse, rectangle,
    and rounded rectangle with their corresponding commands. The rounded rectangle
    has an additional command of corner radius.


    Figure 5-1


    The five different types of geometric shapes available in SwiftUI


    *   Capsule


    *   Circle


    *   Ellipse


    *   Rectangle


    *   Rounded rectangle(cornerRadius: x)


    To create any of these geometric shapes, just state the name of the shape you
    want such as Circle(). The only exception is the rounded rectangle that requires
    a corner radius value that defines how curved the corners appear. The lower the
    value is, the sharper the corners appear where a corner radius of 0 creates a
    90-degree corner just like an ordinary rectangle. The higher the corner radius
    value is, the more the rounded rectangle starts to resemble a capsule.


    You can define a rounded rectangle in two ways:


    *   By corner radius


    *   By defining width and height of the curve


    Defining a rounded rectangle by its corner radius requires a numeric value. A
    low value (such as 10) makes the corners barely rounded. A high value (such as
    100) creates a smoother and more prominent rounded curve at each corner of the
    rectangle as shown in Figure [5-2](#329781_7_En_5_Chapter.xhtml#Fig2).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig2_HTML.jpg)


    A set of 2 illustrations of rounded rectangles with their corresponding commands.
    They have a corner radius of 10 and 100, respectively.


    Figure 5-2


    Changing the corner radius value changes the rounded corners


    A second way to define rounded corners on a rectangle is to define the width and
    height of the rounded curve like this:


    ```

    RoundedRectangle(cornerSize: CGSize(width: 100, height: 25))

    ```


    The width defines the length of the curve along the X-axis (horizontally), while
    the height defines the size of the curve along the Y-axis (vertically). By choosing
    different width and height values, you can create asymmetrically shaped rounded
    corners for a rectangle as shown in Figure [5-3](#329781_7_En_5_Chapter.xhtml#Fig3).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig3_HTML.jpg)


    An illustration of a dark-colored rounded rectangle with a height and width of
    25 and 100.


    Figure 5-3


    Defining rounded corners using a width and height


    ### Coloring a Shape


    Since the default color of every geometric shape is black, you may want to choose
    a different color for your shapes. To add color to a shape, you can use the fill
    modifier like this:


    ```

    Capsule()

    .fill(Color.yellow)

    ```


    In case you don’t like using any of the standard colors (green, red, yellow, blue,
    etc.), you can also define your own colors by defining red, green, and blue values
    or hue, saturation, and brightness values like this:


    ```

    Circle()

    .fill(Color(red: 1.0, green: 0.0, blue: 0.0, opacity: 1.0))

    ```


    or


    ```

    Ellipse()

    .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58))

    ```


    Two additional ways to change the appearance of shapes are


    *   Opacity


    *   Shadows


    Opacity defines how solid or transparent a shape might be where a low opacity
    value makes a shape nearly transparent, while a high opacity value makes a shape
    appear more solid as shown in Figure [5-4](#329781_7_En_5_Chapter.xhtml#Fig4).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig4_HTML.jpg)


    A set of 2 commands of Z stack, text, ellipse, fill, color, and opacity with their
    values and their corresponding text of opacity makes a shape transparent.


    Figure 5-4


    Opacity can make a shape appear transparent or solid


    To define an opacity for a shape, just add the .opacity modifier after defining
    a color such as


    ```

    .fill(Color.purple.opacity(0.25))

    .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58).opacity(0.79))

    ```


    Another way to alter the appearance of a shape is to use shadows. Shadows can
    appear around the outside or inside edges of a shape as shown in Figure [5-5](#329781_7_En_5_Chapter.xhtml#Fig5).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig5_HTML.jpg)


    A set of 2 illustrations of a color gradient rectangle with its corresponding
    commands of fill, color, shadow, drop, inner, and radius.


    Figure 5-5


    Shadows can appear outside the edges of a shape or inside the edges of a shape


    To make shadows appear outside a shape, use the .shadow modifier and define a
    drop radius. A high drop radius value makes the shadow larger, while a low drop
    radius value makes the shadow smaller but also more distinct. The drop modifier
    looks like this:


    ```

    .fill(Color.yellow.shadow(.drop(radius: 15)))

    ```


    To make shadows appear inside a shape, use the .shadow modifier and define an
    inner radius. A high inner radius makes the shadow larger, while a low inner radius
    makes the shadow smaller. The inner modifier looks like this:


    ```

    .fill(Color.yellow.shadow(.inner(radius: 145)))

    ```'
  trans: '

    # 5. 处理图像


    多数用户界面由文本构成，但纯文本难免显得单调。因此，屏幕上第二常见的信息展示方式便是图像。图像可以纯粹用于装饰，也可以帮助用户在用户界面中进行导航。


    最常见的显示图像是图标。SF Symbols 应用（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）列出了所有可用于
    App 用户界面的图标。除了这些图标，你还可以包含任何拖入 Xcode 项目 Assets 文件夹的图像。此外，你还可以包含矩形或圆形等常见形状，这些形状都可以显示在屏幕上。


    通过显示彩色或信息丰富的图形，图像可以让你美化任何用户界面的外观。每当你创建用户界面时，思考如何添加图形图像，让你的用户界面在视觉上更吸引用户。


    ## 显示形状


    最简单地添加到用户界面的图像是常见的几何形状。几何形状可以单独使用，也可以作为其他类型视图（例如 `Text` 视图）的背景进行装饰。五种常见的几何形状如图
    5-1 所示：


    一组 5 张深色插图，分别展示胶囊形、圆形、椭圆形、矩形和圆角矩形及其对应的命令。圆角矩形额外有一个圆角半径命令。


    **图 5-1**: SwiftUI 中五种不同类型的几何形状


    - `Capsule`（胶囊形）

    - `Circle`（圆形）

    - `Ellipse`（椭圆形）

    - `Rectangle`（矩形）

    - `Rounded rectangle(cornerRadius: x)`（圆角矩形）


    要创建这些几何形状中的任何一个，只需声明你想要的形状名称，例如 `Circle()`。唯一的例外是圆角矩形，它需要一个定义圆角弯曲程度的圆角半径值。该值越低，角看起来越尖锐，圆角半径为
    0 时会创建出与普通矩形一样的 90 度角。圆角半径值越高，圆角矩形就越像胶囊形。


    你可以通过两种方式定义圆角矩形：


    - 通过圆角半径

    - 通过定义曲线的宽度和高度


    通过圆角半径定义圆角矩形需要一个数值。较低的值（例如 10）会使圆角几乎不明显。较高的值（例如 100）会在矩形的每个角创建更平滑、更突出的圆角曲线，如图
    5-2 所示。


    一组 2 张圆角矩形插图及其对应的命令。它们分别具有 10 和 100 的圆角半径。


    **图 5-2**: 更改圆角半径值会改变圆角效果


    在矩形上定义圆角的第二种方法是像这样定义圆角曲线的宽度和高度：


    ```

    RoundedRectangle(cornerSize: CGSize(width: 100, height: 25))

    ```


    宽度定义了曲线沿 X 轴（水平方向）的长度，而高度定义了曲线沿 Y 轴（垂直方向）的大小。通过选择不同的宽度和高度值，你可以为矩形创建不对称形状的圆角，如图
    5-3 所示。


    一张深色圆角矩形插图，其高度为 25，宽度为 100。


    **图 5-3**: 使用宽度和高度定义圆角


    ### 为形状着色


    由于每个几何形状的默认颜色都是黑色，你可能希望为形状选择不同的颜色。要为形状添加颜色，你可以像这样使用 `fill` 修饰符：


    ```

    Capsule()

    .fill(Color.yellow)

    ```


    如果你不喜欢使用任何标准颜色（绿色、红色、黄色、蓝色等），你也可以通过定义红色、绿色和蓝色值，或色相、饱和度和亮度值来定义自己的颜色，示例如下：


    ```

    Circle()

    .fill(Color(red: 1.0, green: 0.0, blue: 0.0, opacity: 1.0))

    ```


    或


    ```

    Ellipse()

    .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58))

    ```


    另外两种改变形状外观的方式是：


    - 不透明度

    - 阴影


    不透明度定义了形状的实体或透明程度，低不透明度值使形状几乎透明，而高不透明度值使形状看起来更实体，如图 5-4 所示。


    一组 2 条 ZStack、Text、Ellipse、fill、color 和 opacity 命令及其值，以及相应的文字“不透明度使形状变透明”。


    **图 5-4**: 不透明度可以使形状呈现透明或实体效果


    要为形状定义不透明度，只需在定义颜色后添加 `.opacity` 修饰符，例如：


    ```

    .fill(Color.purple.opacity(0.25))

    .fill(Color(hue: 1.7, saturation: 2.9, brightness: 0.58).opacity(0.79))

    ```


    另一种改变形状外观的方法是使用阴影。阴影可以出现在形状的外部边缘或内部边缘，如图 5-5 所示。


    一组 2 张彩色渐变矩形插图及其对应的 fill、color、shadow、drop、inner 和 radius 命令。


    **图 5-5**: 阴影可以出现在形状边缘外部或边缘内部


    要使阴影出现在形状外部，请使用 `.shadow` 修饰符并定义投影半径。高投影半径值使阴影更大，而低投影半径值使阴影更小但也更清晰。投影修饰符如下所示：


    ```

    .fill(Color.yellow.shadow(.drop(radius: 15)))

    ```


    要使阴影出现在形状内部，请使用 `.shadow` 修饰符并定义内阴影半径。高内阴影半径使阴影更大，而低内阴影半径使阴影更小。内阴影修饰符如下所示：


    ```

    .fill(Color.yellow.shadow(.inner(radius: 145)))

    ```

    '
- fmt: '### Coloring a Shape with Gradients


    Another way to add color is to use gradients that spread two or more colors in
    different ways. SwiftUI offers three types of gradients you can use as shown in
    Figure [5-6](#329781_7_En_5_Chapter.xhtml#Fig6):


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig6_HTML.jpg)


    A set of 3 illustrations of different color gradients of linear gradient, radial
    gradient, and angular gradient in the shape of a capsule, ellipse, and rectangle,
    respectively.


    Figure 5-6


    The three types of gradients available


    - Linear gradients

    - Radial gradients

    - Angular gradients


    A linear gradient requires defining two or more colors along with a start point
    and an end point. The colors get stored within square brackets, and the start
    and end points can define one of the following positions as shown in Figure [5-7](#329781_7_En_5_Chapter.xhtml#Fig7):


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig7_HTML.jpg)


    A screenshot of a rectangular color gradient border with commands of dot top leading,
    dot top, dot top trailing, dot trailing, dot bottom trailing, dot bottom, dot
    bottom leading, dot leading, and dot center.


    Figure 5-7


    Positions of different starting/ending points for a linear gradient


    - `bottom`

    - `bottomLeading`

    - `bottomTrailing`

    - `center`

    - `leading`

    - `top`

    - `topLeading`

    - `topTrailing`

    - `trailing`


    To create a linear gradient, simply define two or more colors along with a start
    and end point like this:


    ```

    Capsule()

    .fill(LinearGradient(gradient: Gradient(colors: [.blue, .green, .pink]), startPoint:
    .topLeading, endPoint: .bottomTrailing))

    ```


    The radial gradient draws a circular color at a specific location defined by the
    `center` parameter such as `.center` or `.top`. If you choose a value such as
    `.top`, then the gradient center will begin at the top center of a shape as shown
    in Figure [5-8](#329781_7_En_5_Chapter.xhtml#Fig8).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig8_HTML.jpg)


    A set of commands for ellipse, fill, radial gradient, gradient, colors, center,
    start radius, and end radius with its respective color gradient illustration of
    an ellipse.


    Figure 5-8


    The `center` parameter defines where the center of the radial gradient begins


    The size of the first color is defined by the `startRadius`. The smaller the `startRadius`
    value, the smaller the radius of the first color. The larger the `endRadius` value
    is compared with the `startRadius` value, the more diffuse the colors will blend
    together. The smaller the `endRadius` value is compared with the `startRadius`,
    the sharper the boundaries between colors as shown in Figure [5-9](#329781_7_En_5_Chapter.xhtml#Fig9).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig9_HTML.jpg)


    A set of 2 commands for ellipse, fill, radial gradient, gradient, colors, center,
    start radius, and end radius with its respective color gradient illustrations
    of the ellipses.


    Figure 5-9


    Comparing the `startRadius` and `endRadius` values in a radial gradient


    To create a radial gradient, define two or more colors, where the center of the
    gradient should appear (such as `.center` or `.topLeading`), and the `startRadius`
    and `endRadius` like this:


    ```

    Ellipse()

    .fill(RadialGradient(gradient: Gradient(colors: [.blue, .yellow]), center: .top,
    startRadius: 10, endRadius: 65))

    ```


    While the linear and radial gradients can work just fine with two colors, the
    angular gradient works best with a larger number of colors. If you just define
    two colors for the angular gradient, SwiftUI will display the two colors side
    by side and then where they gradually merge as shown in Figure [5-10](#329781_7_En_5_Chapter.xhtml#Fig10).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig10_HTML.jpg)


    A set of commands for rectangle, fill, angular gradient, gradient, colors, and
    center with its respective color gradient illustration of a rectangle.


    Figure 5-10


    An angular gradient displaying just two different colors


    The more colors you define in an angular gradient, the more they can all blend
    together. Besides defining multiple colors, you just need to define the center
    of the angular gradient such as `.center` or `.bottomTrailing`. To create an angular
    gradient, define multiple colors or the same colors multiple times (as shown in
    Figure [5-11](#329781_7_En_5_Chapter.xhtml#Fig11)) along with the `center` such
    as


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig11_HTML.jpg)


    A set of commands for rectangle, fill, angular gradient, gradient, colors, and
    center with its respective color gradient illustration of a rectangle.


    Figure 5-11


    An angular gradient displaying the same colors multiple times


    ```

    Rectangle()

    .fill(AngularGradient(gradient: Gradient(colors: [.green, .blue, .black, .green,
    .blue, .black, .green]), center: .center))

    ```'
