- fmt: "# Detecting Drag Gestures\n\nA drag gesture occurs when the user presses and\
    \ slides a fingertip across the screen. The drag gesture often moves an item on\
    \ the screen to a new location.\n\nSince the drag gesture changes the location\
    \ of a view, you need to define one `State` variable that measures this location\
    \ as a `CGPoint` like this:\n\n```\n@State private var circlePosition = CGPoint(x:\
    \ 50, y: 50)\n```\n\nTo move a view, the drag gesture needs to work with the `.position`\
    \ modifier on the view you want to move such as:\n\n```\nCircle()\n.fill(Color.blue)\n\
    .frame(width: 100, height: 100)\n.position(circlePosition)\n```\n\nThen you need\
    \ to attach the `.gesture` modifier to the view you want to move using the drag\
    \ gesture like this:\n\n```\n.gesture(\n)\n```\n\nInside the parentheses of the\
    \ `.gesture` modifier is where you define the drag gesture and detect when it\
    \ changes like this:\n\n```\n.gesture(DragGesture()\n.onChanged({ value in\n//\
    \ Code to run\n}))\n```\n\nThe `.onChanged` modifier measures how far the user\
    \ drags a fingertip across the screen. To see how to detect a drag gesture, follow\
    \ these steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as \"DragGesture.\"\n\n2.  Click the `ContentView` file in the\
    \ Navigator pane.\n\n3.  Add the following `State` variables under the `struct\
    \ ContentView: View` line:\n\n    ```\n    @State private var circlePosition =\
    \ CGPoint(x: 50, y: 50)\n    @State private var circleLabel = \"50, 50\"\n   \
    \ ```\n\n4.  Add a `VStack` with a `Text` view and a `Circle` inside the `body`\
    \ like this:\n\n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n\
    \    .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
    \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    }\n    }\n    ```\n\
    \n    This defines a `Text` view that displays the contents of the `circleLabel`\
    \ State variable and defines a `Circle` colored blue. This `Circle` uses the `.position`\
    \ modifier to work with the drag gesture.\n\n5.  Add a `.gesture` modifier to\
    \ the `Circle` since that’s what we want to move using the drag gesture like this:\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Text(circleLabel)\n  \
    \  .padding()\n    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height:\
    \ 100)\n    .opacity(0.8)\n    .position(circlePosition)\n    .gesture(\n    )\n\
    \    }\n    }\n    ```\n\n6.  Add the `DragGesture` inside the `.gesture()` parentheses\
    \ along with defining an `.onChanged` modifier like this:\n\n    ```\n    var\
    \ body: some View {\n    VStack {\n    Text(circleLabel)\n    .padding()\n   \
    \ Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height: 100)\n    .opacity(0.8)\n\
    \    .position(circlePosition)\n    .gesture(DragGesture()\n    .onChanged({ value\
    \ in\n    circlePosition = value.location\n    circleLabel = \"\\(Int(value.location.x)),\
    \ \\(Int(value.location.y))\"\n    }))\n    }\n    }\n    ```\n\n    The `.onChanged`\
    \ modifier measures the location of the user’s fingertip on the screen. Then it\
    \ stores the x and y location values in the `circleLabel` to appear inside the\
    \ `Text` view. The entire `ContentView` file should look like this:\n\n    ```\n\
    \    import SwiftUI\n    struct ContentView: View {\n    @State private var circlePosition\
    \ = CGPoint(x: 50, y: 50)\n    @State private var circleLabel = \"50, 50\"\n \
    \   var body: some View {\n    VStack {\n    Text(circleLabel)\n    .padding()\n\
    \    Circle()\n    .fill(Color.blue)\n    .frame(width: 100, height: 100)\n  \
    \  .opacity(0.8)\n    .position(circlePosition)\n    .gesture(DragGesture()\n\
    \    .onChanged({ value in\n    circlePosition = value.location\n    circleLabel\
    \ = \"\\(Int(value.location.x)), \\(Int(value.location.y))\"\n    }))\n    }\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n7.  Click\
    \ the Live icon in the Canvas pane.\n\n8.  Move the mouse pointer over the `Circle`\
    \ on the simulated iOS device in the Canvas pane and then drag the mouse. Notice\
    \ as you drag the mouse, the `Text` view constantly updates the x and y location\
    \ of the `Circle`.\n\n## Defining Priority and Simultaneous Gestures\n\nYou can\
    \ add touch gestures to any view. Since a stack is also a view, that means you\
    \ can add touch gestures to `VStack`s, `HStack`s, and `ZStack`s as well. If you\
    \ add a gesture to a view inside of a stack and then add a second, identical gesture\
    \ to the stack itself, which gesture gets recognized?\n\nWhen a gesture modifies\
    \ an entire stack, every view inside that stack can recognize that gesture. However,\
    \ if a view inside that stack has its own gesture modifier, that gesture modifier\
    \ will get recognized instead. To see how this works, follow these steps:\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"TwoGestures.\"\n\n2.  Click the `ContentView` file in the Navigator pane.\n\
    \n3.  Add the following `State` variable under the `struct ContentView: View`\
    \ line:\n\n    ```\n    @State var message = \"\"\n    ```\n\n4.  Add a `VStack`\
    \ with a `Text` view, a `Circle`, and a `Spacer` inside the `body` like this:\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n\
    \    Circle()\n    .frame(width: 125, height: 125)\n    .foregroundColor(.blue)\n\
    \    Spacer()\n    }.background(Color.yellow)\n    }\n    ```\n\n    This creates\
    \ a `Text` view at the top and a blue `Circle` underneath. Then the `Spacer` pushes\
    \ the boundary of the `VStack` down and colors it yellow to make it easy to see\
    \ as shown in Figure 11-2.\n\n5.  Add a `.onTapGesture` modifier to the `Circle`\
    \ like this:\n\n    ```\n    Circle()\n    .frame(width: 125, height: 125)\n \
    \   .foregroundColor(.blue)\n    .onTapGesture {\n    message = \"Circle tapped\"\
    \n    }\n    ```\n\n    When the user taps the `Circle`, the `message` State variable\
    \ will hold the string \"Circle tapped\".\n\n6.  Add a `.onTapGesture` modifier\
    \ to the entire `VStack` like this:\n\n    ```\n    var body: some View {\n  \
    \  VStack {\n    Text(message)\n    .padding()\n    Circle()\n    .frame(width:\
    \ 125, height: 125)\n    .foregroundColor(.blue)\n    .onTapGesture {\n    message\
    \ = \"Circle tapped\"\n    }\n    Spacer()\n    }.background(Color.yellow)\n \
    \   .onTapGesture {\n    message = \"VStack tapped\"\n    }\n    ```\n\n    If\
    \ you click the `Circle`, the `Circle`'s `.onTapGesture` modifier (\"Circle tapped\"\
    ) will be recognized. If you click anywhere else in the `VStack`, the `VStack`'s\
    \ `.onTapGesture` modifier (\"VStack tapped\") will be recognized. The entire\
    \ `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n \
    \   struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    ContentView()\n    }\n    }\n    ```\n\n7.  Click the Live icon\
    \ in the Canvas pane and click the blue `Circle`. Notice \"Circle tapped\" appears\
    \ in the `Text` view. Even though the `Circle` is inside the `VStack`, the `VStack`'s\
    \ `.onTapGesture` modifier gets ignored.\n\n8.  Click the yellow background of\
    \ the `VStack`. Notice \"VStack tapped\" appears in the `Text` view."
