    \n3.  在定义`VStack`的最后一个花括号之后添加以下代码：\n\n    ```\n        .onAppear() {\n       \
    \     dateFormatter.dateStyle = .medium\n            dateFormatter.locale = Locale(identifier:\
    \ \"en_US\")\n        }\n    ```\n\n    这将定义一个显示日期的样式（`.short`、`.medium`、`.long`和`.full`）。此外，它还定义了显示日期的区域设置，例如`\"\
    en_US\"`。\n\n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
    \ View {\n    @State var dates = Set<DateComponents>()\n    @State var message\
    \ = \"\"\n    let dateFormatter = DateFormatter()\n\n    var body: some View {\n\
    \        VStack {\n            MultiDatePicker(\"Select Dates\", selection: $dates)\n\
    \            Button(\"Click Me\") {\n                for x in dates {\n      \
    \              //                    message += \"\\(x)\" + \"\\n\"\n        \
    \            message += dateFormatter.string(from: x.date!) + \"\\n\"\n      \
    \          }\n            }\n            TextEditor(text: $message)\n        }\n\
    \        .onAppear() {\n            dateFormatter.dateStyle = .medium\n      \
    \      dateFormatter.locale = Locale(identifier: \"en_US\")\n        }\n     \
    \   .padding()\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n \
    \   static var previews: some View {\n        ContentView()\n    }\n}\n```\n\n\
    4.  点击Canvas面板中的“Live”图标。\n5.  在`MultiDatePicker`中点击两个或更多日期。\n6.  点击“Click Me”按钮。您选择的日期将出现在`TextEditor`中，并根据您选择的日期样式（如`.medium`或`.long`）进行格式化，如图[8-13](#329781_7_En_8_Chapter.xhtml#Fig13)所示。\n\
    \n```\nlet dateFormatter = DateFormatter()\n```\n\n## 总结\n\n文本字段（`TextField`）可以方便地让用户输入数据。不幸的是，用户可以在文本字段中输入任何内容，甚至是完全无意义的数据。为了将用户限制在有效选择的范围内，您可以使用选择器（`Picker`）。选择器可以提供所有有效选项的列表。这样，用户就无法通过选择器输入无效数据。\n\
    \n创建选择器时，您可以使用`.tag`属性为用户在选择器中的选择分配一个特定值。`.tag`属性可以保存任何类型的数据，例如整数、小数或字符串。所有`.tag`属性必须保存相同的数据类型。\n\
    \n作为使用多个`Text`视图的替代方案，您可以使用`ForEach`循环来检索选择器视图的选项，这些选项可以存储在数组或枚举中。当您需要显示大量选项（例如通过以滚轮形式显示的选择器视图）时，检索要在选择器视图上显示的选项尤其有用。\n\
    \n另一种显示有效选项列表的方式是通过颜色选择器（`ColorPicker`）。通过使用颜色选择器，用户可以选择标准颜色（如红色、绿色或蓝色）或创建自定义颜色。\n\
    \n为了选择日期，SwiftUI提供了日期选择器（`DatePicker`）。您可以格式化日期的显示方式，例如`6/15/22`或`June 15, 2022`。日期选择器还可以以三种不同的样式（`.compact`、`.graphical`或`.wheel`）显示。这样，您就可以让日期选择器以最适合您应用程序的方式呈现。通过使用选择器，您可以轻松让用户只输入有效数据。\n\
    \n如果用户需要选择多个日期，请使用`MultiDatePicker`。它将选定的日期存储在一个集合中，您可能需要使用`DateFormatter`对其进行格式化。最终，选择器允许您为用户提供一系列固定的有效选项供其选择。\n\
    \n# 9. 使用切换开关（Toggles）、步进器（Steppers）和滑块（Sliders）来限制选择\n\n理想情况下，您希望将用户限制为只选择有效选项。这可以防止用户输入无效数据，例如拼写数字（如“thirty-seven”）而不是输入数字（`37`）。另外三种将用户限制为只选择有效数据的方法是：切换开关、步进器和滑块。\n\
    \n切换开关（`Toggle`）为用户提供恰好两个选择，例如开/关、是/否、真/假。由于切换开关只提供两个选择，它表示一个布尔值（`true`或`false`）。\n\
    \n步进器（`Stepper`）将用户输入限制在有效数据范围内。步进器显示一个减号/加号图标，用户可以单击它来按固定量递增/递减一个值（向上或向下）。通过使用步进器，用户无需输入特定数字即可定义一个值。\n\
    \n滑块（`Slider`）也将用户输入限制在有效数据范围内。滑块允许用户通过拖拽来输入一个特定值，完全无需打字。步进器和滑块都可以定义最小值和最大值，以限制用户只能选择有效的数值。对于许多人来说，点击或拖拽选择一个值比输入数字本身更容易。步进器和滑块都表示一个`Double`值（十进制数）。\n\
    \n切换开关、滑块和步进器的全部目的，是确保用户在任何时候都只能向程序输入有效数据。"
  raw: "To do this, we need to use the DateFormatter as follows:\n\n1.  In the current\
    \ MultiDatePicker project, add the following underneath the two State variables:\n\
    \n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig13_HTML.jpg)\n\nA screenshot\
    \ of a calendar window has the month and year as January 2023 with multiple dates\
    \ selected as 3, 5, 12, 13, and 30\\. It has an option click me and a list of\
    \ selected dates from above in the format of month, date, and year at the bottom.\n\
    \nFigure 8-13\n\nFormatted dates chosen from the MultiDatePicker\n\n1.  Modify\
    \ the Button code as follows:\n\n```\n    Button(\"Click Me\") {\n    for x in\
    \ dates {\n    //                    message += \"\\(x)\" + \"\\n\"\n    message\
    \ += dateFormatter.string(from: x.date!) + \"\\n\"\n    }\n    }\n    ```\n\n\
    Rather than display the raw DateComponents data, the for loop will now use the\
    \ dateFormatter to display the retrieved date property in a more familiar appearance.\n\
    \n2.  Add the following after the last curly bracket that defines the VStack:\n\
    \n```\n    .onAppear() {\n    dateFormatter.dateStyle = .medium\n    dateFormatter.locale\
    \ = Locale(identifier: \"en_US\")\n    }\n    ```\n\nThis defines a style for\
    \ displaying dates (.short, .medium, .long, and .full). In addition, this also\
    \ defines the locale for displaying dates such as “en_US”.\n\nThe entire ContentView\
    \ file should look like this:\n\n```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State var dates = Set()\n    @State var message = \"\"\n    let\
    \ dateFormatter = DateFormatter()\n    var body: some View {\n    VStack {\n \
    \   MultiDatePicker(\"Select Dates\", selection: $dates)\n    Button(\"Click Me\"\
    ) {\n    for x in dates {\n    //                    message += \"\\(x)\" + \"\
    \\n\"\n    message += dateFormatter.string(from: x.date!) + \"\\n\"\n    }\n \
    \   }\n    TextEditor(text: $message)\n    }.onAppear() {\n    dateFormatter.dateStyle\
    \ = .medium\n    dateFormatter.locale = Locale(identifier: \"en_US\")\n    }\n\
    \    .padding()\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n3.  Click the Live icon in the Canvas pane.\n\n4.  Click two or more\
    \ dates in the MultiDatePicker.\n\n5.  Click the Click Me Button. Your chosen\
    \ dates appear in the TextEditor, formatted according to the date style you chose\
    \ such as .medium or .long, as shown in Figure [8-13](#329781_7_En_8_Chapter.xhtml#Fig13).\n\
    \n```\nlet dateFormatter = DateFormatter()\n```\n\n## Summary\n\nText Fields can\
    \ be handy for letting users input data. Unfortunately, users can type anything\
    \ into a Text Field, even completely nonsensical data. To restrict the user to\
    \ just a valid range of choices, you can use a Picker. A Picker can provide a\
    \ list of all valid options. Now it’s impossible for the user to enter invalid\
    \ data through a Picker.\n\nWhen creating a Picker, you can use a .tag property\
    \ to assign a specific value to the user’s selection in a Picker. The .tag property\
    \ can hold any type of data such as integers, decimal numbers, or strings. All\
    \ .tag properties must hold the same data type.\n\nAs an alternative to using\
    \ multiple Text views, you can use a ForEach loop to retrieve the choices for\
    \ a Picker view, which can be stored in an array or an enumeration. Retrieving\
    \ options to display on a Picker view can be especially useful when you need to\
    \ display a large number of choices, such as through a Picker view displayed as\
    \ a wheel.\n\nAnother way to display a list of valid options is through the Color\
    \ Picker. By using the Color Picker, users can select standard colors such as\
    \ red, green, or blue or create custom colors.\n\nFor selecting dates, SwiftUI\
    \ offers the Date Picker. You can format the way a date appears, such as 6/15/22\
    \ or June 15, 2022\\. The Date Picker can also appear in three different styles\
    \ (.compact, .graphical, or .wheel). That way you can make a Date Picker look\
    \ the way that works best in your app. By using Pickers, you can make it easy\
    \ for users to input only valid data.\n\nIf users need to select multiple dates,\
    \ use the MultiDatePicker. This stores selected dates in a set, which you may\
    \ need to format using the DateFormatter. Ultimately, Pickers let you offer a\
    \ fixed range of valid options for the user to select.\n\n# 9. Limiting Choices\
    \ with Toggles, Steppers, and Sliders\n\nIdeally, you want to limit the user to\
    \ select only valid options. That keeps the user from entering invalid data such\
    \ as spelling out a number (such as thirty-seven) instead of typing out the number\
    \ (37). Three additional ways to restrict the user into selecting only valid data\
    \ are toggles, steppers, and sliders.\n\nA Toggle gives users exactly two choices\
    \ such as on or off, yes or no, and true or false. Because a Toggle only offers\
    \ two choices, it represents a Boolean value (true or false).\n\nA Stepper restricts\
    \ user input to a range of valid data. Steppers display a minus/plus icon that\
    \ users can click to increment/decrement a value by a fixed amount, up or down.\
    \ By using a Stepper, users can define a value without typing a specific number.\n\
    \nSliders also restrict user input to a range of valid data. Sliders let users\
    \ drag to input a specific value without any typing whatsoever. Both steppers\
    \ and sliders can define minimum and maximum values to restrict users into choosing\
    \ only valid numeric values. For many people, it’s easier to click or drag to\
    \ choose a value than to type that number itself. Both steppers and sliders represent\
    \ a Double value (decimal number).\n\nThe whole purpose of toggles, sliders, and\
    \ steppers is to make sure the user can only input valid data into a program at\
    \ any given time."
