    \n11. Click in the `TextField` and type a word or short phrase.\n\n12. Click the\
    \ Heart icon in the tab bar. This passes the string that you typed in the `TextField`\
    \ and displays it in the `FileView` structure.\n\n13. Click the Hare icon in the\
    \ tab bar. This passes the string that you typed in the `TextField` and displays\
    \ it in the `SeparateFileView` structure.\n\n## Changing Data Between Structures\
    \ in a Tab View\n\nThe previous project created two structures where one structure\
    \ was stored in the `ContentView` file and a second structure was stored in a\
    \ separate file. In both cases, the structures defined user interfaces that received\
    \ data and displayed it.\n\nWhat if we pass data to a structure and then allow\
    \ that structure to modify that data? This will require several changes:\n\n-\
    \ Create a `State` variable.\n- Open another structure and pass that structure\
    \ a binding to the `State` variable (using the `$` symbol) such as\n- Define a\
    \ `@Binding` variable in the structure that will receive data.\n- Change that\
    \ `Binding` variable in the structure that received data.\n\n```\nFileView(choice:\
    \ $message)\n```\n\nTo see how to change data between structures in a Tab View,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as \"TabViewBindingData.\"\n\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n\n3. Create a `State` variable under the `struct\
    \ ContentView: View` line like this:\n\n```\nstruct ContentView: View {\n    @State\
    \ var message = \"\"\n```\n\n4. Add a `TabView` inside the `var body: some View`\
    \ line like this:\n\n```\nvar body: some View {\n    TabView {\n        TextField(\"\
    Type here\", text: $message)\n            .tabItem {\n                Image(systemName:\
    \ \"house.fill\")\n                Text(\"Home\")\n            }\n        FileView(choice:\
    \ $message)\n            .tabItem {\n                Image(systemName: \"heart.fill\"\
    )\n                Text(\"First\")\n            }\n        SeparateFileView(passedData:\
    \ $message)\n            .tabItem {\n                Image(systemName: \"hare.fill\"\
    )\n                Text(\"Second\")\n            }\n    }\n}\n```\n\nNotice that\
    \ the `FileView` sends a binding variable (`$message`) to the `\"choice:\"` parameter.\
    \ The second structure called `SeparateFileView` sends the same binding variable\
    \ (`$message`) to the `\"passedData\"` parameter.\n\n5. Add the following structure\
    \ underneath the `struct ContentView: View` structure:\n\n```\nstruct FileView:\
    \ View {\n    @Binding var choice: String\n    var body: some View {\n       \
    \ HStack {\n            Spacer()\n            VStack {\n                Spacer()\n\
    \                TextField(\"Type here:\", text: $choice)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n```\n\nNotice that this structure declares a `@Binding` variable called\
    \ `\"choice\"` that can hold a `String`. This structure uses a `TextField` to\
    \ change this `@Binding` variable (`$choice`), which sends the changes automatically\
    \ back to the `ContentView` structure.\n\nThe entire `ContentView` file should\
    \ look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State\
    \ var message = \"\"\n    var body: some View {\n        TabView {\n         \
    \   TextField(\"Type here\", text: $message)\n                .tabItem {\n   \
    \                 Image(systemName: \"house.fill\")\n                    Text(\"\
    Home\")\n                }\n            FileView(choice: $message)\n         \
    \       .tabItem {\n                    Image(systemName: \"heart.fill\")\n  \
    \                  Text(\"First\")\n                }\n            SeparateFileView(passedData:\
    \ $message)\n                .tabItem {\n                    Image(systemName:\
    \ \"hare.fill\")\n                    Text(\"Second\")\n                }\n  \
    \      }\n    }\n}\n\nstruct FileView: View {\n    @Binding var choice: String\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                TextField(\"Type here:\"\
    , text: $choice)\n                Spacer()\n            }\n            Spacer()\n\
    \        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6. Choose File ➤ New ➤ File. A dialog appears.\n\n7. Click iOS\
    \ near the top of the dialog, click Swift File, and then click Next. Xcode asks\
    \ for a name to give your newly created file.\n\n8. Type `SeparateFile` and click\
    \ Create. Xcode creates a new Swift file.\n\n9. Delete all code currently in the\
    \ `SeparateFile` and replace it with the following:\n\n```\nimport SwiftUI\n\n\
    struct SeparateFileView: View {\n    @Binding var passedData: String\n    var\
    \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
    \ {\n                Spacer()\n                TextField(\"Type here\", text:\
    \ $passedData)\n                Spacer()\n            }\n            Spacer()\n\
    \        }.background(Color.orange)\n    }\n}\n\nstruct SeparateFileView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        SeparateFileView(passedData:\
    \ .constant(\"\"))\n    }\n}\n```\n\nNotice that this structure declares a `@Binding`\
    \ variable called `\"passedData\"` that can hold a `String`. The `TextField` can\
    \ change this variable (`$passedData`) and automatically send the changes back\
    \ to the `ContentView` structure.\n\nAlso note that because this structure is\
    \ stored in a separate file, the `PreviewProvider` structure must also include\
    \ the `\"passedData\"` parameter by giving it a `.constant(\"\")`.\n\n10. Click\
    \ the `ContentView` file in the Navigator pane.\n\n11. Click the Live icon in\
    \ the Canvas pane.\n\n12. Click in the `TextField` and type a phrase.\n\n13. Click\
    \ the Heart icon to pass the string to the `FileView` structure stored in the\
    \ `ContentView` file.\n\n14. Click in the `TextField` displayed by the `FileView`\
