- fmt: '# Creating a Stacked Bar Chart


    A bar chart can track trends, but a stacked bar chart can let you see the parts
    of a whole, such as which products sold the most each quarter or which salesperson
    had the most sales each month. Creating a stacked bar chart involves three sets
    of data:


    - The numeric data you want to define the marks (bars) (y value)

    - The duplicate data that defines each stacked bar (x value)

    - The category to separate each bar


    To stack data in a bar chart, the x value needs to be duplicated like this:


    ```

    var mySalesArray: [SalesPeople] = [

    .init(name: "Oscar", department: "North", sales: 50),

    .init(name: "Oscar", department: "South", sales: 43),

    .init(name: "Oscar", department: "East", sales: 62),

    .init(name: "Oscar", department: "West", sales: 26),

    .init(name: "Mayer", department: "North", sales: 67),

    .init(name: "Mayer", department: "South", sales: 38),

    .init(name: "Mayer", department: "East", sales: 47),

    .init(name: "Mayer", department: "West", sales: 53)

    ]

    ```


    In this array, `name` represents a single stacked bar, `department` represents
    the separate colors of a single stacked bar, and `sales` represents the height
    of each separate color in the stacked bar as shown in Figure [16-7](#329781_7_En_16_Chapter.xhtml#Fig7).


    ![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig7_HTML.jpg)


    A stacked bar chart represents 2 bars. The bars have 4 different colors from top
    to bottom indicated as sales and departments. It denotes the names at the bottom
    which are Oscar and Mayer.


    **Figure 16-7** How data defines a stacked bar chart


    To see how to create a stacked bar chart, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    `BarChartStacked`.

    2. Click the `ContentView` file in the Navigator pane. Add the `Charts` framework
    underneath the `SwiftUI` framework like this:


    ```

    import Charts

    ```


    3. Add a structure underneath the `import Charts` line like this:


    ```

    struct SalesPeople: Identifiable {

    var name: String

    var department: String

    var sales: Int

    var id = UUID()

    }

    ```


    4. Add an array underneath the structure like this:


    ```

    var mySalesArray: [SalesPeople] = [

    .init(name: "Oscar", department: "North", sales: 50),

    .init(name: "Oscar", department: "South", sales: 43),

    .init(name: "Oscar", department: "East", sales: 62),

    .init(name: "Oscar", department: "West", sales: 26),

    .init(name: "Mayer", department: "North", sales: 67),

    .init(name: "Mayer", department: "South", sales: 38),

    .init(name: "Mayer", department: "East", sales: 47),

    .init(name: "Mayer", department: "West", sales: 53)

    ]

    ```


    5. Add a `Chart` inside a `VStack` like this:


    ```

    var body: some View {

    VStack {

    Chart (mySalesArray) { x in

    }

    }

    ```


    6. Add a `BarMark` inside the `Chart` like this:


    ```

    VStack {

    Chart (mySalesArray) { x in

    BarMark(x: .value("Name", x.name),

    y: .value("Sales", x.sales))

    .foregroundStyle(by: .value("Department", $0.department))

    }.padding()

    Spacer()

    }

    }

    ```


    7. Click the Live icon in the Canvas pane.


    ---


    # Creating a Line Chart


    A line chart works like a bar chart in measuring values by height. The main difference
    is that a line chart makes it easier to spot upward or downward trends. To create
    any chart, just use the proper mark such as:


    - `BarMark` – Bar charts

    - `LineMark` – Line charts

    - `PointMark` – Point charts

    - `AreaMark` – Area charts

    - `RectangleMark` – Rectangle charts (also known as heat maps)


    Line charts tend to look best when plotting several sets of data. On the other
    hand, bar charts still look useful when plotting just two sets of data as shown
    in Figure [16-8](#329781_7_En_16_Chapter.xhtml#Fig8).


    ![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig8_HTML.jpg)


    A set of a line chart and a bar chart. The lines and bars are shaded in the same
    color.


    **Figure 16-8** Comparing a bar chart with a line chart


    To see how to create a line chart, follow these steps:


    1. Create a new SwiftUI iOS App project and give it any name you wish such as
    `LineChart`.

    2. Click the `ContentView` file in the Navigator pane. Add the `Charts` framework
    underneath the `SwiftUI` framework like this:


    ```

    import Charts

    ```


    3. Add a structure underneath the `import Charts` line like this:


    ```

    struct SalesPeople: Identifiable {

    var name: String

    var department: String

    var sales: Int

    var id = UUID()

    }

    ```


    4. Add an array underneath the structure like this:


    ```

    var mySalesArray: [SalesPeople] = [

    .init(name: "Oscar", sales: 50),

    .init(name: "Mayer", sales: 43),

    .init(name: "George", sales: 62),

    .init(name: "Hormel", sales: 26),

    .init(name: "Jan", sales: 47),

    .init(name: "Lundy", sales: 53)

    ]

    ```


    5. Add a `Chart` inside a `VStack` like this:


    ```

    var body: some View {

    VStack {

    Chart (mySalesArray) { x in

    }

    }

    ```


    6. Add a `LineMark` inside the `Chart` like this:


    ```

    VStack {

    Chart (mySalesArray) { x in

    LineMark(x: .value("Name", x.name),

    y: .value("Sales", x.sales))

    }

    }

    ```


    The entire `ContentView` file should look like this:


    ```

    import SwiftUI

    import Charts


    struct SalesPeople: Identifiable {

    var name: String

    var sales: Int

    var id = UUID()

    }


    var mySalesArray: [SalesPeople] = [

    .init(name: "Oscar", sales: 50),

    .init(name: "Mayer", sales: 43),

    .init(name: "George", sales: 62),

    .init(name: "Hormel", sales: 26),

    .init(name: "Jan", sales: 47),

    .init(name: "Lundy", sales: 53)

    ]


    struct ContentView: View {

    var body: some View {

    VStack {

    Chart (mySalesArray) { x in

    LineMark(x: .value("Name", x.name),

    y: .value("Sales", x.sales))

    }

    }

    }

    }


    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    7. Click the Live icon in the Canvas pane. The line chart appears as shown in
    Figure [16-9](#329781_7_En_16_Chapter.xhtml#Fig9).


    ![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig9_HTML.jpg)


    A line chart denotes the trends for Oscar, Mayer, George, Hrmel, Jan, and Lundy.
    It progresses with peaks and troughs.


    **Figure 16-9** A line chart can show trends over multiple sets of data'
