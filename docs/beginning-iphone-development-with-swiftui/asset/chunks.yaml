- fmt: "# Displaying Structures in a Tab View\n\nWhile a Tab View can display a single\
    \ view like a `Text` or `Image` view, many times you may want to display a new\
    \ user interface altogether. Since you can define a user interface screen with\
    \ a structure, you can create multiple screens using multiple structures that\
    \ can appear within a Tab View.\n\nThe simplest way to create a new structure\
    \ is within the `ContentView` file. However, this can clutter the code, so a second\
    \ way is to store the structure in a separate file.\n\nTo see how to create structures\
    \ that define another user interface screen, follow these steps:\n\n1.  Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as “TabViewStructures.”\n\
    2.  Click the `ContentView` file in the Navigator pane.\n3.  Add a `TabView` inside\
    \ the `var body: some View` line like this:\n\n```\n    var body: some View {\n\
    \    TabView {\n    }\n    }\n```\n\n4.  Add the following inside the `TabView`\
    \ like this:\n\n```\n    var body: some View {\n    TabView {\n    FileView()\n\
    \    .tabItem {\n    Image(systemName: \"heart.fill\")\n    Text(\"First\")\n\
    \    }\n    SeparateFileView()\n    .tabItem {\n    Image(systemName: \"hare.fill\"\
    )\n    Text(\"Second\")\n    }\n    }\n    }\n```\n\nThe preceding code displays\
    \ two views called `FileView()` and `SeparateFileView()`, which we’ll need to\
    \ define using a structure.\n\n5.  Add the following structure underneath the\
    \ entire `struct ContentView: View` structure like this:\n\n```\n    struct FileView:\
    \ View {\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n\
    \    Spacer()\n    Text(\"This is a separate structure\")\n    Text(\"that's stored\
    \ in the same file\")\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n```\n\nThe entire `ContentView` file should look like this:\n\n\
    ```\n    import SwiftUI\n    struct ContentView: View {\n    var body: some View\
    \ {\n    TabView {\n    FileView()\n    .tabItem {\n    Image(systemName: \"heart.fill\"\
    )\n    Text(\"First\")\n    }\n    SeparateFileView()\n    .tabItem {\n    Image(systemName:\
    \ \"hare.fill\")\n    Text(\"Second\")\n    }\n    }\n    }\n    }\n    struct\
    \ FileView: View {\n    var body: some View {\n    HStack {\n    Spacer()\n  \
    \  VStack {\n    Spacer()\n    Text(\"This is a separate structure\")\n    Text(\"\
    that's stored in the same file\")\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n```\n\nWe can keep\
    \ adding new structures inside the `ContentView` file, but this risks cluttering\
    \ up the file. A second way to create structures is to store them in a separate\
    \ file, which the next steps will let us do.\n\n6.  Choose **File** ➤ **New**\
    \ ➤ **File**. A dialog appears.\n7.  Click **iOS** near the top of the dialog,\
    \ click **Swift File**, and then click **Next**. Xcode asks for a name to give\
    \ your newly created file.\n8.  Type `SeparateFile` and click **Create**. Xcode\
    \ creates a new Swift file.\n9.  Delete all code currently in the `SeparateFile`\
    \ and replace it with the following:\n\n```\n    import SwiftUI\n    struct SeparateFileView:\
    \ View {\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n\
    \    Spacer()\n    Text(\"This is another structure\")\n    Text(\"but stored\
    \ in a separate file\")\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n\
    \    }\n    }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    SeparateFileView()\n    }\n    }\n```\n\n**Note**\n\
    \nWhen storing a structure in a separate file, you need a second structure (`PreviewProvider`)\
    \ to display the user interface in the Canvas pane.\n\n1.  Click the `ContentView`\
    \ file in the Navigator pane.\n2.  Click the **Live** icon in the Canvas pane.\
    \ Notice that the `FileView` structure appears because the **First** icon in the\
    \ tab bar is selected by default.\n3.  Click the **Second** icon in the tab bar.\
    \ Notice that this displays the `SeparateFileView` structure defined in the `SeparateFile`.\n\
    \nIt’s far more common to display views defined by a structure within a Tab View.\
    \ You can store structures that define a view in the same file or in separate\
    \ files.\n\n## Passing Data Between Structures in a Tab View\n\nThe previous project\
    \ created two structures where one structure was stored in the `ContentView` file\
    \ and a second structure was stored in a separate file. In both cases, the structures\
    \ defined user interfaces that displayed static information unconnected to anything\
    \ from the original structure (`ContentView`).\n\nIn many cases, you may want\
    \ data from one structure to appear in a second structure. That means we must\
    \ pass data from one structure to another.\n\nFortunately, this task is similar\
    \ to passing data between functions. When a structure needs to receive data, we\
    \ just need to declare a property by creating a variable, giving that variable\
    \ a descriptive name, and defining the data type that variable can hold such as\
    \ `String` or `Double` like this:\n\n```\nstruct FileView: View {\nvar choice:\
    \ String\n```\n\nThis defines a variable called “choice” that can hold a `String`.\
    \ To pass data to this structure, we can load this structure by calling the structure\
    \ name (`FileView`) followed by this “choice” variable as a parameter like this:\n\
    \n```\nFileView(choice: \"Heads\")\n```\n\nWhen passing data to a structure stored\
    \ in the same file, we just need to follow this two-step process:\n\n*   Declare\
    \ one or more variables inside the structure to receive data.\n*   Call that structure\
    \ using its variables as parameters.\n\nHowever, when passing data to a structure\
    \ stored in a separate file, there’s an additional step necessary. Because a structure\
    \ stored in a separate file also contains a second structure that displays the\
    \ user interface in the Canvas pane, this preview structure must include the structure’s\
    \ parameter and pass it data as well like this:\n\n```\nstruct SeparateFileView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nSeparateFileView(passedData:\
    \ \"\")\n}\n}\n```\n\nTo see how to pass data between structures in a Tab View,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as “TabViewPassData.”\n2.  Click the `ContentView` file\
    \ in the Navigator pane.\n3.  Edit the `struct ContentView` structure like this:\n\
    \n```\n    struct ContentView: View {\n    @State var message = \"\"\n    var\
    \ body: some View {\n    TabView {\n    TextField(\"Type here\", text: $message)\n\
    \    .tabItem {\n    Image(systemName: \"house.fill\")\n    Text(\"Home\")\n \
    \   }\n    FileView(choice: message)\n    .tabItem {\n    Image(systemName: \"\
    heart.fill\")\n    Text(\"First\")\n    }\n    SeparateFileView(passedData: message)\n\
    \    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"Second\")\n\
    \    }\n    }\n    }\n    }\n```\n\nThe preceding code defines a structure called\
    \ `FileView` with a parameter of `choice:` that gets passed the State variable\
    \ `message`. The second structure is called `SeparateFileView` with a parameter\
    \ of `passedData:` that gets passed the State variable `message` as well.\n\n\
    4.  Add a new structure underneath the `struct ContentView` like this:\n\n```\n\
    \    struct FileView: View {\n    var choice: String\n    var body: some View\
    \ {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    Text(\"You typed\
    \ = \\(choice)\")\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n```\n\nThis `FileView` structure declares a `choice` variable that\
    \ can hold a `String`. Then it displays this `choice` variable in a `Text` view\
    \ that shows “You typed = ”. The entire `ContentView` file should look like this:"
