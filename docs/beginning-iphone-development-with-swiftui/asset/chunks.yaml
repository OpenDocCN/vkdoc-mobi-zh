- fmt: "### Defining Charts with Loops and Arrays\n\nFor small charts, it’s easy to\
    \ define one or more marks, such as `BarMarks`. However, if you need to chart\
    \ large amounts of data, defining each mark can be cumbersome. Even worse, you\
    \ may not know the exact number of marks you want for a chart based on data that\
    \ can change in size.\n\nFor that reason, it’s better not to define marks individually\
    \ but instead rely on data structures and loops to define the number and height\
    \ of each mark in a chart. First, we need to define a structure to hold the data\
    \ to chart:\n\n```swift\nstruct SalesPeople: Identifiable {\n    var name: String\n\
    \    var sales: Int\n    var id: String { name }\n}\n```\n\nA structure lets you\
    \ define the two types of data to define your chart. In this example, it’s a `String`\
    \ (name) and an `Int` (number of sales). The structure needs an `ID` to identify\
    \ it, so the entire structure must be defined as `Identifiable`, and the `id`\
    \ is defined as a `String` based on the `name` property.\n\nSecond, we need to\
    \ create an array of the structure we just defined like this:\n\n```swift\nvar\
    \ mySalesArray: [SalesPeople] = [\n    .init(name: \"Oscar\", sales: 50),\n  \
    \  .init(name: \"Mayer\", sales: 43),\n    .init(name: \"George\", sales: 62),\n\
    \    .init(name: \"Hormel\", sales: 26)\n]\n```\n\nOnce we have an array of structures\
    \ where the array defines a category (`name`) and a value (`sales`), we can use\
    \ that within a chart. That means defining the array name that contains the chart\
    \ data and an arbitrary variable name that temporarily stores each array item\
    \ like this:\n\n```swift\nChart(mySalesArray) { x in\n}\n```\n\nFinally, we need\
    \ to define a `BarMark` that accesses the `name` and `sales` properties of each\
    \ array item like this:\n\n```swift\nChart(mySalesArray) { x in\n    BarMark(x:\
    \ .value(\"Name\", x.name),\n            y: .value(\"Sales\", x.sales))\n}\n```\n\
    \nTo see how to use an array of structures to define a bar chart, follow these\
    \ steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as \"BarChartArray.\"\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n3.  Add the `Charts` framework underneath the `SwiftUI` framework like\
    \ this:\n\n    ```swift\n    import Charts\n    ```\n\n4.  Add a structure underneath\
    \ the `import Charts` line like this:\n\n    ```swift\n    struct SalesPeople:\
    \ Identifiable {\n        var name: String\n        var sales: Int\n        var\
    \ id: String { name }\n    }\n    ```\n\n5.  Add an array underneath the structure\
    \ like this:\n\n    ```swift\n    var mySalesArray: [SalesPeople] = [\n      \
    \  .init(name: \"Oscar\", sales: 50),\n        .init(name: \"Mayer\", sales: 43),\n\
    \        .init(name: \"George\", sales: 62),\n        .init(name: \"Hormel\",\
    \ sales: 26)\n    ]\n    ```\n\n6.  Add a `Chart` inside the `VStack` like this:\n\
    \n    ```swift\n    VStack {\n        Chart(mySalesArray) { x in\n        }\n\
    \    }\n    ```\n\n7.  Add a `BarMark` inside the `Chart` like this:\n\n    ```swift\n\
    \    VStack {\n        Chart(mySalesArray) { x in\n            BarMark(x: .value(\"\
    Name\", x.name),\n                    y: .value(\"Sales\", x.sales))\n       \
    \ }\n    }\n    ```\n\n    The entire `ContentView` file should look like this:\n\
    \n    ```swift\n    import SwiftUI\n    import Charts\n\n    struct SalesPeople:\
    \ Identifiable {\n        var name: String\n        var sales: Int\n        var\
    \ id: String { name }\n    }\n\n    var mySalesArray: [SalesPeople] = [\n    \
    \    .init(name: \"Oscar\", sales: 50),\n        .init(name: \"Mayer\", sales:\
    \ 43),\n        .init(name: \"George\", sales: 62),\n        .init(name: \"Hormel\"\
    , sales: 26)\n    ]\n\n    struct ContentView: View {\n        var body: some\
    \ View {\n            VStack {\n                Chart(mySalesArray) { x in\n \
    \                   BarMark(x: .value(\"Name\", x.name),\n                   \
    \         y: .value(\"Sales\", x.sales))\n                }\n            }\n \
    \       }\n    }\n\n    struct ContentView_Previews: PreviewProvider {\n     \
    \   static var previews: some View {\n            ContentView()\n        }\n \
    \   }\n    ```\n\n8.  Click the Live icon in the Canvas pane. Notice that the\
    \ Chart has created four different marks (bars) that display a label underneath\
    \ (`name`). The height of each mark (bar) represents its numeric value.\n\n###\
    \ Defining Colors for a Bar Chart\n\nNormally a bar chart displays each mark (bar)\
    \ in a default color of blue. However, you can choose a different color by using\
    \ the `.foregroundStyle` modifier like this:\n\n```swift\nBarMark(x: .value(\"\
    Name\", x.name),\n        y: .value(\"Sales\", x.sales))\n    .foregroundStyle(.orange)\n\
    ```\n\nThe `.foregroundStyle` modifier defines a single color. To display marks\
    \ (bars) in different colors, we need to define a third category. That way each\
    \ category will appear in its own color. In the previous example, we simply created\
    \ marks (bars) based on `name` and `sales` like this:\n\n```swift\n.init(name:\
    \ \"Hormel\", sales: 26)\n```\n\nThe `name` identifies each mark (bar), and `sales`\
    \ defines how the mark (bar) appears. To create distinct colors, we need to add\
    \ a third category such as:\n\n```swift\n.init(name: \"Hormel\", department: \"\
    West\", sales: 26)\n```\n\nThis new category (`department`) will define the colors.\
    \ Each department will get a unique color as shown in Figure 16-4.\n\n![An illustration\
    \ represents a snippet of code and a graphic of a smartphone. The code denotes\
    \ the values of the name, department, and sales. The screen of the smartphone\
    \ exhibits the rendered output of the code in the form of a bar graph.](images/329781_7_En_16_Chapter/329781_7_En_16_Fig4_HTML.jpg)\n\
    \n**Figure 16-4** Displaying different colors for each mark (bar)\n\nTo see how\
    \ to create multiple colors for a bar chart, follow these steps:\n\n1.  Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as \"BarChartMultipleColors.\"\
    \n2.  Click the `ContentView` file in the Navigator pane.\n3.  Add the `Charts`\
    \ framework underneath the `SwiftUI` framework like this:\n\n    ```swift\n  \
    \  import Charts\n    ```\n\n4.  Add a structure underneath the `import Charts`\
    \ line like this:\n\n    ```swift\n    struct SalesPeople: Identifiable {\n  \
    \      var name: String\n        var department: String\n        var sales: Int\n\
    \        var id = UUID()\n    }\n    ```\n\n    Notice that we added a new category\
    \ called \"department.\" Also notice that the `id` is set to `UUID()` to create\
    \ a unique identifier for each structure. This is essentially equivalent to the\
    \ previous project structure that created an `id` from the `name` like this:\n\
    \n    ```swift\n    var id: String { name }\n    ```\n\n    ![A bar graph represents\
    \ the values for Oscar, Mayer, George, and Hormel. It indicates the bars in different\
    \ colors.](images/329781_7_En_16_Chapter/329781_7_En_16_Fig5_HTML.jpg)\n\n   \
    \ **Figure 16-5** Each mark (bar) is identified by a different color\n\n5.  Add\
    \ an array underneath the structure like this:\n\n    ```swift\n    var mySalesArray:\
    \ [SalesPeople] = [\n        .init(name: \"Oscar\", department: \"North\", sales:\
    \ 50),\n        .init(name: \"Mayer\", department: \"South\", sales: 43),\n  \
    \      .init(name: \"George\", department: \"East\", sales: 62),\n        .init(name:\
    \ \"Hormel\", department: \"West\", sales: 26),\n        .init(name: \"Mike\"\
    , department: \"North\", sales: 67),\n        .init(name: \"Spam\", department:\
    \ \"South\", sales: 38),\n        .init(name: \"Jan\", department: \"East\", sales:\
    \ 47),\n        .init(name: \"Lundy\", department: \"West\", sales: 53)\n    ]\n\
    \    ```\n\n    Notice that this array defines different departments: North, South,\
    \ East, and West. We’ll define this `department` value to display each department\
    \ in a different color.\n\n6.  Add a `Chart` inside the `VStack` like this:\n\n\
    \    ```swift\n    VStack {\n        Chart(mySalesArray) { x in\n        }\n \
    \   }\n    ```\n\n7.  Add a `BarMark` inside the `Chart` like this:\n\n    ```swift\n\
    \    VStack {\n        Chart(mySalesArray) { x in\n            BarMark(x: .value(\"\
    Name\", x.name),\n                    y: .value(\"Sales\", x.sales))\n       \
    \ }\n    }\n    ```\n\n8.  Add a `.foregroundStyle` modifier like this:\n\n  \
    \  ```swift\n    VStack {\n        Chart(mySalesArray) { x in\n            BarMark(x:\
    \ .value(\"Name\", x.name),\n                    y: .value(\"Sales\", x.sales))\n\
    \                .foregroundStyle(by: .value(\"Department\", x.department))\n\
    \        }\n    }\n    ```\n\nThe entire `ContentView` file should look like this:\n\
    \n```swift\nimport SwiftUI\nimport Charts\n\nstruct SalesPeople: Identifiable\
    \ {\n    var name: String\n    var department: String\n    var sales: Int\n  \
    \  var id = UUID()\n}\n\nvar mySalesArray: [SalesPeople] = [\n    .init(name:\
    \ \"Oscar\", department: \"North\", sales: 50),\n    .init(name: \"Mayer\", department:\
    \ \"South\", sales: 43),\n    .init(name: \"George\", department: \"East\", sales:\
    \ 62),\n    .init(name: \"Hormel\", department: \"West\", sales: 26),\n    .init(name:\
    \ \"Mike\", department: \"North\", sales: 67),\n    .init(name: \"Spam\", department:\
    \ \"South\", sales: 38),\n    .init(name: \"Jan\", department: \"East\", sales:\
    \ 47),\n    .init(name: \"Lundy\", department: \"West\", sales: 53)\n]\n\nstruct\
    \ ContentView: View {\n    var body: some View {\n        VStack {\n         \
    \   Chart(mySalesArray) { x in\n                BarMark(x: .value(\"Name\", x.name),\n\
    \                        y: .value(\"Sales\", x.sales))\n                    .foregroundStyle(by:\
    \ .value(\"Department\", x.department))\n            }\n        }\n    }\n}\n\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```"
