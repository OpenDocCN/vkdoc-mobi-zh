  trans: "\n### 显示与响应多个按钮\n\n最简单的 `Alert`/`ActionSheet` 会显示一个允许用户关闭它的单一按钮。然而，你可能希望为用户提供多个选项以供选择，并根据用户点击的按钮做出不同的响应。\n\
    \n`Alert` 最多可以显示两个按钮，分别称为 `primaryButton` 和 `secondaryButton`。而 `ActionSheet`\
    \ 最多可以显示三个按钮。对于你希望显示的每个按钮，可以从如图 12-3 所示的三种样式中选择一种：\n\n![](img/329781_7_En_12_Fig3_HTML.jpg)\n\
    \n一张上下文菜单的截图，顶部显示一条警告信息。底部显示三个选项，分别标注为默认、破坏性和取消。\n\n图 12-3\n\n按钮的三种不同样式\n\n- `.default`\
    \ – 以蓝色显示文本\n- `.destructive` – 以红色显示文本\n- `.cancel` – 以粗体显示文本\n\n要了解如何创建一个显示两个按钮的\
    \ `Alert`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“AlertTwoButtons”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 一行下方添加以下 `State`\
    \ 变量：\n\n```\n@State var showAlert = false\n```\n\n4. 在 `var body: some View`\
    \ 内部添加一个 `VStack` 和一个 `Button`，如下所示：\n\n```\nvar body: some View {\n    VStack\
    \ {\n        Button(\"Show Alert\") {\n            showAlert.toggle()\n      \
    \  }\n    }\n}\n```\n\n5. 为 `Button` 添加一个 `.alert` 修饰符，如下所示：\n\n```\n.alert(isPresented:\
    \ $showAlert) {\n    Alert(title: Text(\"Warning!\"),\n          message: Text(\"\
    Zombies on the loose\"),\n          primaryButton: .default(Text(\"Default\")),\n\
    \          secondaryButton: .cancel(Text(\"Cancel\")))\n}\n```\n\n无论是 `primaryButton`\
    \ 还是 `secondaryButton`，你都可以改用 `.destructive` 按钮类型，仅用于观察按钮在 `Alert` 中的外观变化。整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var\
    \ showAlert = false\n    var body: some View {\n        VStack {\n           \
    \ Button(\"Show Alert\") {\n                showAlert.toggle()\n            }\n\
    \            .alert(isPresented: $showAlert) {\n                Alert(title: Text(\"\
    Warning!\"),\n                      message: Text(\"Zombies on the loose\"),\n\
    \                      primaryButton: .default(Text(\"Default\")),\n         \
    \             secondaryButton: .cancel(Text(\"Cancel\")))\n            }\n   \
    \     }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n6. 在画布窗格中点击“实时”图标，然后点击“Show\
    \ Alert”按钮。`Alert` 将会显示。\n7. 点击“Default”或“Cancel”按钮以关闭 `Alert`。\n\n要了解如何创建一个显示三个按钮的\
    \ `ActionSheet`，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“ActionSheetButtons”。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct ContentView: View` 一行下方添加以下 `State`\
    \ 变量：\n\n```\n@State var showAlert = false\n```\n\n4. 在 `var body: some View`\
    \ 内部添加一个 `VStack` 和一个 `Button`，如下所示：\n\n```\nvar body: some View {\n    VStack\
    \ {\n        Button(\"Show Action Sheet\") {\n            showAlert.toggle()\n\
    \        }\n    }\n}\n```\n\n5. 为 `Button` 添加一个 `.actionSheet` 修饰符，如下所示：\n\n```\n\
    .actionSheet(isPresented: $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"\
    ),\n                message: Text(\"Zombies on the loose\"),\n               \
    \ buttons: [\n                    .default(Text(\"Default\")),\n             \
    \       .cancel(Text(\"Cancel\")),\n                    .destructive(Text(\"Destructive\"\
    ))])\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    @State var showAlert = false\n    var body: some View {\n      \
    \  VStack {\n            Button(\"Show Action Sheet\") {\n                showAlert.toggle()\n\
    \            }\n            .actionSheet(isPresented: $showAlert) {\n        \
    \        ActionSheet(title: Text(\"Warning!\"),\n                            message:\
    \ Text(\"Zombies on the loose\"),\n                            buttons: [\n  \
    \                              .default(Text(\"Default\")),\n                \
    \                .cancel(Text(\"Cancel\")),\n                                .destructive(Text(\"\
    Destructive\"))])\n            }\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6. 在画布窗格中点击“实时”图标，然后点击“Show Action Sheet”按钮。`ActionSheet` 将会显示在模拟的\
    \ iOS 屏幕底部。\n7. 点击“Default”、“Cancel”或“Destructive”按钮以关闭 `ActionSheet`。\n"
- fmt: "### Making Alert/ActionSheet Buttons Responsive\n\nJust adding buttons to\
    \ an Alert or Action Sheet makes those buttons simply dismiss the Alert/Action\
    \ Sheet when the user selects any of them. Most likely, you’ll want buttons to\
    \ perform some type of action. To do that, you must first create a function that\
    \ contains code you want to run when the user selects a particular button. Then\
    \ you must call that function when the user selects a button.\n\nTo make a button\
    \ responsive, you need to add the `action:` parameter like this:\n\n```\n.alert(isPresented:\
    \ $showAlert) {\nAlert(title: Text(\"Warning!\"),\nmessage: Text(\"Zombies on\
    \ the loose\"),\nprimaryButton: .default(Text(\"Default\"), action: {\nmessage\
    \ = \"Default chosen\"\n}),\nsecondaryButton: .cancel(Text(\"Cancel\"), action:\
    \ cancelFunction))\n}\n}\n}\nfunc cancelFunction() {\nmessage = \"Cancel chosen\"\
    \n}\n```\n\nThe first method to using the `action:` parameter involves curly brackets\
    \ where you can type as many lines of code as you wish. However, the more code\
    \ you type, the more cluttered the entire `.alert` or `.actionSheet` will look.\n\
    \nThe second method to using the `action:` parameter is to call a function. That\
    \ way the `action:` code is isolated in a separate function while keeping the\
    \ `.alert` or `.actionSheet` code shorter and easier to read.\n\nNo matter which\
    \ method you choose, selecting any button will dismiss the Alert or Action Sheet\
    \ from the screen. That’s why if you omit the `action:` parameter completely,\
    \ selecting that button will dismiss the Alert or Action Sheet.\n\nTo see how\
    \ to make buttons responsive in an Alert, follow these steps:\n\n1. Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as “AlertResponsiveButtons.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following State\
    \ variables under the `struct ContentView: View` line:\n\n```\n    @State var\
    \ showAlert = false\n    @State var message = \"\"\n```\n\n4. Add a `VStack` in\
    \ the `var body: some View` and put a `Text` view and a `Button` inside the `VStack`\
    \ like this:\n\n```\n    var body: some View {\n    VStack {\n    Text(message)\n\
    \    .padding()\n    Button(\"Show Alert\") {\n    showAlert.toggle()\n    }\n\
    \    }\n    }\n}\n```\n\n5. Add an `.alert` modifier to the `Button` like this:\n\
    \n```\n    .alert(isPresented: $showAlert) {\n    Alert(title: Text(\"Warning!\"\
    ),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton: .default(Text(\"\
    Default\"), action: {\n    message = \"Default chosen\"\n    }),\n    secondaryButton:\
    \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n```\n\n6. Add the\
    \ following function above the last curly bracket in the `struct ContentView:\
    \ View` like this:\n\n```\n    func cancelFunction() {\n    message = \"Cancel\
    \ chosen\"\n    }\n```\n\nThe entire `ContentView` file should look like this:\n\
    \n```\n    import SwiftUI\n    struct ContentView: View {\n    @State var showAlert\
    \ = false\n    @State var message = \"\"\n    var body: some View {\n    VStack\
    \ {\n    Text(message)\n    .padding()\n    Button(\"Show Alert\") {\n    showAlert.toggle()\n\
    \    }\n    .alert(isPresented: $showAlert) {\n    Alert(title: Text(\"Warning!\"\
    ),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton: .default(Text(\"\
    Default\"), action: {\n    message = \"Default chosen\"\n    }),\n    secondaryButton:\
    \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n    }\n    }\n  \
    \  func cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n    }\n  \
    \  struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    ContentView()\n    }\n    }\n```\n\n7. Click the Live icon in the\
    \ Canvas pane and then click the Show Alert Button. An Alert appears.\n8. Click\
    \ the Cancel or Default Button. Notice that a message appears to let you know\
    \ which Button you chose.\n\nTo see how to make buttons responsive in an Action\
    \ Sheet, follow these steps:\n\n1. Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “ActionSheetResponsiveButtons.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add the following State variables under the\
    \ `struct ContentView: View` line:\n\n```\n    @State var showAlert = false\n\
    \    @State var message = \"\"\n```\n\n4. Add a `VStack` in the `var body: some\
    \ View` and put a `Text` view and a `Button` inside the `VStack` like this:\n\n\
    ```\n    var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n\
    \    Button(\"Show Action Sheet\") {\n    showAlert.toggle()\n    }\n    }\n \
    \   }\n}\n```\n\n5. Add an `.actionSheet` modifier to the `Button` like this:\n\
    \n```\n    .actionSheet(isPresented: $showAlert) {\n    ActionSheet(title: Text(\"\
    Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    buttons: [\n \
    \   .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n\
    \    }),\n    .cancel(Text(\"Cancel\"), action: cancelFunction),\n    .destructive(Text(\"\
    Destructive\"), action: {\n    message = \"Destructive chosen\"\n    })])\n  \
    \  }\n```\n\n6. Add the following function above the last curly bracket in the\
    \ `struct ContentView: View` like this:\n\n```\n    func cancelFunction() {\n\
    \    message = \"Cancel chosen\"\n    }\n```\n\nThe entire `ContentView` file\
    \ should look like this:\n\n```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    @State var showAlert = false\n    @State var message = \"\"\n    var\
    \ body: some View {\n    VStack {\n    Text(message)\n    .padding()\n    Button(\"\
    Show Action Sheet\") {\n    showAlert.toggle()\n    }\n    .actionSheet(isPresented:\
    \ $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"\
    Zombies on the loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action:\
    \ {\n    message = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"),\
    \ action: cancelFunction),\n    .destructive(Text(\"Destructive\"), action: {\n\
    \    message = \"Destructive chosen\"\n    })])\n    }\n    }\n    }\n    func\
    \ cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n```\n\n7. Click the Live icon in the Canvas\
    \ pane and then click the Show Action Sheet Button. An Alert appears.\n8. Click\
    \ the Cancel, Default, or Destructive Button. Notice that a message appears to\
    \ let you know which Button you chose."
