- fmt: "# Displaying Alternating Colors to a List\n\nA long `List` can be cumbersome\
    \ to view. While lines (colored or not) separating items in a `List` can make\
    \ lists easier to read, another option is to use alternating colors in list rows\
    \ as shown in Figure [13-5](#329781_7_En_13_Chapter.xhtml#Fig5).\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig5_HTML.png)\n\
    \nA single-column table denotes a list of words which include cat, dog, turtle,\
    \ ferret, parrot, goldfish, lizard, canary, tarantula, and hamster, highlighted\
    \ in 2 colors alternatively.\n\n**Figure 13-5** Alternating colors can make lists\
    \ easier to read\n\nSwiftUI lets you define colors like this:\n\n```\nColor.green\n\
    ```\n\nOne problem with colors is that they may appear so vibrant that they make\
    \ the text in each row of a `List` hard to read. To adjust the color strength,\
    \ we can add an `.opacity` modifier to make the color less intense. A value of\
    \ 0 makes the color disappear completely, and a color of 1 makes the color appear\
    \ in full strength. Therefore, an opacity value less than 1 will lower the color's\
    \ appearance such as:\n\n```\nColor.green.opacity(0.4)\n```\n\nIf an array populates\
    \ a `List`, then the array index can be used to alternate rows depending if the\
    \ array index is odd or even. To determine if an array index (or any number) is\
    \ even, use the Swift modulo operator (`%`) to divide that number by 2. If the\
    \ value is 0, then the number is even; otherwise, the number is odd.\n\nSo to\
    \ define the background color of each row in a `List`, we'll need to use the `.background`\
    \ modifier to identify even and odd array index values like this:\n\n```\n.background(index\
    \ % 2 == 0 ? Color.green : Color.yellow)\n```\n\nTo see how to display alternating\
    \ colors in a `List`, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as \"ListAlternatingColors.\"\n2. Click the\
    \ `ContentView` file in the Navigator pane.\n3. Add an array under the `struct\
    \ ContentView: View` line like this:\n\n```\nvar myArray = [\"Cat\", \"Dog\",\
    \ \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"\
    Tarantula\", \"Hamster\"]\n```\n\n4. Add a `List` inside the `VStack` under the\
    \ `var body: some View` line like this:\n\n```\nvar body: some View {\n    VStack\
    \ {\n        List {\n        }\n    }\n}\n```\n\n5. Add a `ForEach` loop inside\
    \ the `List` to find all the array items starting from 0 up to the total number\
    \ of items in the array – 1 like this:\n\n```\nvar body: some View {\n    VStack\
    \ {\n        List {\n            ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                Text(myArray[index])\n            }\n        }\n \
    \   }\n}\n```\n\nIf we add a background color to the `Text` view inside the `ForEach`\
    \ loop, all we'll do is highlight just the `Text` view and not the entire row.\
    \ What we need to do is embed the `Text` view inside of an `HStack` and then add\
    \ a `Spacer()` to push the `HStack` boundary all the way to the edge of the iOS\
    \ screen.\n\n6. Embed the `Text` view inside an `HStack` with a `Spacer()` like\
    \ this:\n\n```\nvar body: some View {\n    VStack {\n        List {\n        \
    \    ForEach(0...myArray.count - 1, id: \\.self) { index in\n                HStack\
    \ {\n                    Text(myArray[index])\n                    Spacer()\n\
    \                }\n            }\n        }\n    }\n}\n```\n\nNow we can add\
    \ a background color to the `HStack`, which will include both the `Text` view\
    \ and the width of the `HStack`, which is pushed out to the right with the `Spacer()`.\n\
    \n7. Add a background modifier to the last curly bracket that defines the `HStack`\
    \ like this:\n\n```\nvar body: some View {\n    VStack {\n        List {\n   \
    \         ForEach(0...myArray.count - 1, id: \\.self) { index in\n           \
    \     HStack {\n                    Text(myArray[index])\n                   \
    \ Spacer()\n                }.background(index % 2 == 0 ? Color.green.opacity(0.4)\
    \ : Color.yellow.opacity(0.4))\n            }\n        }\n    }\n}\n```\n\nFeel\
    \ free to choose different colors and opacity values. Notice that if an array\
    \ index is even, the row will appear in green, but if an array index is odd, then\
    \ the row will appear in yellow. The entire `ContentView` file should look like\
    \ this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    var myArray =\
    \ [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n    var body: some View {\n       \
    \ VStack {\n            List {\n                ForEach(0...myArray.count - 1,\
    \ id: \\.self) { index in\n                    HStack {\n                    \
    \    Text(myArray[index])\n                        Spacer()\n                \
    \    }.background(index % 2 == 0 ? Color.green.opacity(0.4) : Color.yellow.opacity(0.4))\n\
    \                }\n            }\n        }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n8. Click the Live icon in the Canvas pane. SwiftUI displays\
    \ alternating rows of colors and opacities (see Figure [13-5](#329781_7_En_13_Chapter.xhtml#Fig5)).\n\
    \n# Adding Swipe Gestures to a List\n\nMany common apps such as Mail, Messages,\
    \ and Photos display items in a `List`. With these lists, users can swipe left\
    \ to right or right to left to display additional options to choose as shown in\
    \ Figure [13-6](#329781_7_En_13_Chapter.xhtml#Fig6).\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig6_HTML.jpg)\n\
    \nA screenshot represents a list of 3 messages. The middle one is swiped and exhibits\
    \ additional options on the right end to mute the notification and delete the\
    \ message.\n\n**Figure 13-6** Swiping on a `List` can reveal additional options\n\
    \nTwo common tasks for lists involve deleting and moving items. Deleting items\
    \ from a `List` involves removing the item, typically after the user swipes from\
    \ right to left. Moving items in a `List` involves sliding a fingertip on an item\
    \ to place it in a new location in the `List`."
