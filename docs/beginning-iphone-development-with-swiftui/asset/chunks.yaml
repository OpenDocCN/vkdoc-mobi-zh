    \ to detect multiple taps such as a double or triple tap, you can define the count:\
    \ parameter like this:\n\n```\n.onTapGesture(count: 2)\n```\n\nA value of 2 defines\
    \ a double tap, while a value of 3 would define a triple tap."
  trans: "\n### 添加子菜单\n\n一个`Menu`可以显示由`Button`定义的选项列表。但除此之外，`Menu`还可以显示子菜单，用于列出额外的相关命令，如图\
    \ 10-11 所示。\n\n![](img/329781_7_En_10_Fig11_HTML.jpg)\n\n*选项标签页的截图。三个选项分别标注为“打开”、“查找”和“删除”。子菜单包含“复制格式”和“粘贴格式”。*\n\
    \n**图 10-11** — 显示子菜单\n\n要创建子菜单，只需定义另一个`Menu`来代替`Button`。然后在子菜单内部包含额外的`Button`，如下所示：\n\
    \n```\nMenu(\"选项\") {\n    Button(\"打开\", action: openFile)\n    Button(\"查找\"\
    , action: findFile)\n    Button(\"删除...\", action: deleteFile)\n    Menu(\"子菜单\"\
    ) {\n        Button(\"复制格式\", action: copyFormat)\n        Button(\"粘贴格式\", action:\
    \ pasteFormat)\n    }\n}\n```\n\n**注意**\n\n在子菜单内部创建子菜单是可行的。但通常作为一般规则，只使用一级子菜单，否则过多的选项列表可能会让用户感到困惑。\n\
    \n要了解子菜单的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_10_Fig12_HTML.jpg)\n\n*选项标签页的截图。三个选项分别标注为“打开”、“查找”和“删除”。子菜单由右箭头符号表示。*\n\
    \n**图 10-12** — `>`符号标识一个子菜单\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“Submenu”。\n\
    2.  在导航器面板中点击`ContentView`文件。\n3.  编辑`ContentView`文件，使其全部内容如下所示：\n\n    ```\n\
    \    import SwiftUI\n    struct ContentView: View {\n        @State var message\
    \ = \"\"\n        var body: some View {\n            VStack {\n              \
    \  Text(message)\n                    .padding()\n                Menu(\"选项\"\
    ) {\n                    Button(\"打开\", action: openFile)\n                  \
    \  Button(\"查找\", action: findFile)\n                    Button(\"删除...\", action:\
    \ deleteFile)\n                    Menu(\"子菜单\") {\n                        Button(\"\
    复制格式\", action: copyFormat)\n                        Button(\"粘贴格式\", action:\
    \ pasteFormat)\n                    }\n                }\n                Spacer()\n\
    \            }\n        }\n        func openFile() {\n            message = \"\
    已选择打开\"\n        }\n        func findFile() {\n            message = \"已选择查找\"\
    \n        }\n        func deleteFile() {\n            message = \"已选择删除\"\n  \
    \      }\n        func copyFormat() {\n            message = \"已选择复制格式\"\n   \
    \     }\n        func pasteFormat() {\n            message = \"已选择粘贴格式\"\n   \
    \     }\n    }\n    struct ContentView_Previews: PreviewProvider {\n        static\
    \ var previews: some View {\n            ContentView()\n        }\n    }\n   \
    \ ```\n\n4.  在画布面板中点击“实时”图标。\n5.  点击由`Menu`定义的“选项”。这将显示一个选项列表，其中包含由`>`符号标识的子菜单，如图\
    \ 10-12 所示。\n6.  点击子菜单，即可看到额外的选项列表出现。\n\n子菜单便于将相关选项分组在一起，但由于这些选项最初是隐藏的，请谨慎使用子菜单，以免让用户感到困惑。\n\
    \n## 本章小结\n\n链接和菜单是用户界面为用户提供可选选项的另外两种方式。`Link`用于打开浏览器并跳转至特定网站。`ShareLink`允许你与其他应用共享信息。菜单则显示由`Button`和其他用于定义子菜单的`Menu`组成的选项列表。\n\
    \n通过在`Menu`中使用`Label`视图，你可以将图标与文本并排组合。通过在`Menu`中使用`Text`视图，你可以自定义用户界面上显示的文本外观，例如选择字体或颜色。菜单提供了一种在不占用太多屏幕空间的情况下向用户显示多个选项的方式。\n\
    \n# 11. 触摸手势\n\n让用户通过按钮、切换开关或菜单来控制应用固然方便，但这些控件都会占用屏幕空间。为了消除对用户界面上额外对象的需求，你的应用还可以检测并响应触摸手势，从而允许直接操作屏幕上显示的项目。\n\
    \niOS 应用能够检测并响应的不同类型触摸手势包括：\n\n- **点按** – 指尖触摸屏幕并抬起。\n- **空间点按** – 一个或多个指尖触摸屏幕并报告点按位置。\n\
    - **捏合** – 两个指尖并拢或分开。\n- **旋转** – 两个指尖以圆形运动向左或向右旋转。\n- **平移** – 指尖在屏幕上滑动拖动。\n\
    - **清扫** – 指尖在屏幕上向上、向下、向左或向右滑动并抬起。\n- **长按** – 指尖触摸并按压屏幕。\n\n你可以将触摸手势应用于任何视图，例如`Image`视图、`Text`视图，或者像`Rectangle`或`Ellipse`这样的形状。\n\
    \n## 检测点按手势\n\n点按手势仅用于检测用户何时点击屏幕。默认情况下，点按手势识别一个手指的单次点按，但你可以定义两个或多个手指的多次点按。\n\n\
    要了解如何检测点按手势，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“TapGesture”。\n\
    2.  在导航器面板中点击`ContentView`文件。\n3.  在`struct ContentView: View`行下方添加以下`State`变量：\n\
    \n    ```\n    @State var changeMe = false\n    ```\n\n4.  在 body 中添加一个`VStack`和一个`Rectangle`，如下所示：\n\
    \n    ```\n    var body: some View {\n        VStack {\n            Rectangle()\n\
    \                .frame(width: 175, height: 125)\n                .foregroundColor(changeMe\
    \ ? .red : .yellow)\n                .onTapGesture {\n                    changeMe.toggle()\n\
    \                }\n        }\n    }\n    ```\n\n    这会创建一个填满整个屏幕的`Rectangle`。然后，`.frame`修饰符将其宽度限制为\
    \ 175，高度限制为 125。`.foregroundColor`修饰符使用`changeMe`这个`State`变量来决定将`Rectangle`着色为红色还是黄色。\n\
    \n    `.onTapGesture`修饰符使`Rectangle`能够检测单次点按手势。当检测到点按手势时，它会将`changeMe`这个`State`变量的值从`true`切换为`false`（或从`false`切换为`true`）。整个`ContentView`文件应如下所示：\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n        @State\
    \ var changeMe = false\n        var body: some View {\n            VStack {\n\
    \                Rectangle()\n                    .frame(width: 175, height: 125)\n\
    \                    .foregroundColor(changeMe ? .red : .yellow)\n           \
    \         .onTapGesture {\n                        changeMe.toggle()\n       \
    \             }\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n5.  在画布面板中点击“实时”图标。\n6.  点击`Rectangle`。注意，每次点击`Rectangle`时，`.onTapGesture`修饰符都会切换`changeMe`这个`State`变量的值，从而使`Rectangle`的颜色在红色和黄色之间交替变化。\n\
    \n默认情况下，`.onTapGesture`修饰符检测单次点按手势。如果你想检测多次点按，例如双击或三击，可以像这样定义`count:`参数：\n\n```\n\
    .onTapGesture(count: 2)\n```\n\n值为 2 表示双击，而值为 3 则表示三击。\n"
- fmt: "# Detecting Spatial Tap Gestures\n\nA spatial tap gesture is like an ordinary\
    \ tap gesture except it’s most useful for detecting the location of one or more\
    \ taps. To detect a tap location, you need a `State` variable that can store `CGPoint`\
    \ data types like this:\n\n```\n@State var tapLocation: CGPoint = .zero\n```\n\
    \nThen you need to define a spatial tap gesture to detect locations like this:\n\
    \n```\nvar spatialTapGesture: some Gesture {\nSpatialTapGesture()\n.onEnded {\
    \ event in\ntapLocation = event.location\n}\n}\n```\n\nThe `event.location` detects\
    \ the location of tap gestures and stores the `x` and `y` data in the `tapLocation`\
    \ `State` variable where `tapLocation.x` contains the horizontal distance from\
    \ the origin (upper-left corner of an object) and `tapLocation.y` contains the\
    \ vertical distance from the origin. The origin is defined by the object that\
    \ the spatial tap gesture is attached to.\n\nOnce you can detect the tap location,\
    \ then you can respond based on the area where the user tapped. By default, the\
    \ spatial tap gesture only detects a single tap, but you can define how many taps\
    \ needed such as two by defining the `count` parameter like this:\n\n```\nvar\
    \ spatialTapGesture: some Gesture {\nSpatialTapGesture(count: 2)\n.onEnded { event\
    \ in\ntapLocation = event.location\n}\n}\n```\n\nTo see how to use a spatial tap\
    \ gesture, follow these steps:\n\n1. Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as “SpatialTapGesture.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add the following `State` variable and constant\
    \ under the `struct ContentView: View` line:\n\n```\n    @State var tapLocation:\
    \ CGPoint = .zero\n    let dimension: CGFloat = 360\n```\n\n4. Add a spatial tap\
    \ gesture variable underneath the `State` variable and constant like this:\n\n\
    ```\n    var spatialTapGesture: some Gesture {\n    SpatialTapGesture()\n    .onEnded\
    \ { event in\n    tapLocation = event.location\n    }\n    }\n```\n\nIn this example,\
    \ the spatial tap gesture name is `spatialTapGesture`, but it can be any name\
    \ you want. The name of your spatial tap gesture will later be used to attach\
    \ it to an object.\n\n5. Add a `VStack` inside the `body` along with a `Rectangle`\
    \ and two `Text` views like this:\n\n```\n    VStack {\n    Rectangle()\n    .foregroundStyle(tapLocation.y\
    \ > dimension / 2.0 ? Color.orange : Color.purple)\n    .overlay(Text(\"Tap Me\"\
    ).font(.largeTitle).foregroundColor(tapLocation.x > dimension / 2.0 ? Color.black\
    \ : Color.white))\n    .frame(width: dimension, height: dimension)\n    .gesture(spatialTapGesture)\n\
    \    Text(\"Tap x location = \\(tapLocation.x)\")\n    Text(\"Tap y location =\
    \ \\(tapLocation.y)\")\n    }\n```\n\nThis creates a `Rectangle` with a width\
    \ and height defined by the `dimension` constant, which is set to 360. The `.foregroundStyle`\
    \ modifier changes color based on where the user taps (clicks) on the `Rectangle`.\
    \ If the user clicks in the bottom half of the `Rectangle` (`tapLocation.y > dimension\
    \ / 2.0`), then the `Rectangle`’s color is orange. Otherwise, the `Rectangle`’s\
    \ color is purple.\n\nOverlaid over the `Rectangle` is a `Text` view where the\
    \ foreground color of the text will appear as black if the user clicks (taps)\
    \ the right half of the `Rectangle` (`tapLocation.x > dimension / 2.0`) or appear\
    \ white if the user clicks (taps) the left half of the `Rectangle`.\n\nThe two\
    \ `Text` views underneath the `Rectangle` simply display the `x` and `y` location\
    \ where the user tapped (clicked) where the origin (0,0) is the upper-left corner\
    \ of the `Rectangle`.\n\nThe entire `ContentView` file should look like this:\n\
    \n```\n    import SwiftUI\n    struct ContentView: View {\n    @State var tapLocation:\
    \ CGPoint = .zero\n    let dimension: CGFloat = 360\n    var spatialTapGesture:\
    \ some Gesture {\n    SpatialTapGesture()\n    .onEnded { event in\n    tapLocation\
    \ = event.location\n    }\n    }\n    var body: some View {\n    VStack {\n  \
    \  Rectangle()\n    .foregroundStyle(tapLocation.y > dimension / 2.0 ? Color.orange\
    \ : Color.purple)\n    .overlay(Text(\"Tap Me\").font(.largeTitle).foregroundColor(tapLocation.x\
    \ > dimension / 2.0 ? Color.black : Color.white))\n    .frame(width: dimension,\
    \ height: dimension)\n    .gesture(spatialTapGesture)\n    Text(\"Tap x location\
    \ = \\(tapLocation.x)\")\n    Text(\"Tap y location = \\(tapLocation.y)\")\n \
    \   }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n```\n\n6. Click\
    \ the Live icon in the Canvas pane.\n7. Click in the upper-left corner, upper\
    \ right, bottom right, and bottom left of the `Rectangle`. Notice that each time\
    \ you click in a different area, the two `Text` views identify the location where\
    \ you clicked. The location where you click on the `Rectangle` also defines how\
    \ the `Rectangle` and text color may change.\n\nTry adding a `count` parameter\
    \ to the `SpatialTapGesture` like this and testing the app again to double-click\
    \ before the spatial tap gesture will be recognized:\n\n```\nSpatialTapGesture(count:\
    \ 2)\n```"
