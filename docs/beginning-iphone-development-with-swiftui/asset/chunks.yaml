  trans: "\n### 从列表中删除项目\n\n在 iOS 中，从`List`中删除项目最常见的快捷方式是从右向左滑动以显示**删除**按钮。另外，用户也可以继续从右向左滑动来直接删除项目，而无需点击**删除**按钮。由于这种滑动删除手势很常用，SwiftUI\
    \ 让实现变得非常简单。\n\n第一步是在`List`内的`ForEach`循环中添加`.onDelete`修饰符，如下所示：\n\n```swift\n\
    List {\n    ForEach(0...myArray.count - 1, id: \\.self) { index in\n    }.onDelete(perform:\
    \ delete)\n}\n```\n\n这会调用一个删除函数，该函数使用包含`List`中显示项目的数组名称（以下示例中称为`myArray`），并调用`remove`方法，如下所示：\n\
    \n```swift\nfunc delete(at offsets: IndexSet) {\n    myArray.remove(atOffsets:\
    \ offsets)\n}\n```\n\n要了解如何在`List`中创建滑动删除手势，请按照以下步骤操作：\n\n![一张截图在顶部显示单词雪貂(furret)，底部显示金鱼(goldfish)。两个单词之间有一个“删除”按钮，位于右侧。](img/329781_7_En_13_Fig7_HTML.jpg)\n\
    \n**图 13-7** – 由`.onDelete`修饰符创建的**删除**按钮。\n\n1.  创建一个新的 SwiftUI iOS 应用程序项目，并为其指定任意名称，例如“ListDelete”。\n\
    2.  点击导航器窗格中的`ContentView`文件。\n3.  在`struct ContentView`行下添加一个`@State`变量数组，如下所示：\n\
    \n    ```swift\n    @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\"\
    , \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"\
    ]\n    ```\n\n    输入的具体字符串无关紧要，只要输入几个字符串来填充数组即可。\n\n4.  在`var body: some View`行下添加一个`List`，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        List {\n        }\n    }\n\
    \    ```\n\n5.  在此`List`内添加一个`ForEach`循环，从 0 计数到数组项目总数减 1。然后在一个`Text`视图中显示数组项目，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        List {\n            ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n       \
    \     }\n        }\n    }\n    ```\n\n6.  向`ForEach`循环添加`.onDelete`修饰符，以调用一个名为`delete`的函数，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        List {\n            ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                Text(myArray[index])\n       \
    \     }.onDelete(perform: delete)\n        }\n    }\n    ```\n\n7.  在`struct ContentView:\
    \ View`中的最后一个花括号上方添加以下函数，如下所示：\n\n    ```swift\n    func delete(at offsets: IndexSet)\
    \ {\n        myArray.remove(atOffsets: offsets)\n    }\n    ```\n\n    整个`ContentView`文件应如下所示：\n\
    \n    ```swift\n    import SwiftUI\n    struct ContentView: View {\n        @State\
    \ var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
    , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n        var body: some\
    \ View {\n            List {\n                ForEach(0...myArray.count - 1, id:\
    \ \\.self) { index in\n                    Text(myArray[index])\n            \
    \    }.onDelete(perform: delete)\n            }\n        }\n        func delete(at\
    \ offsets: IndexSet) {\n            myArray.remove(atOffsets: offsets)\n     \
    \   }\n    }\n    struct ContentView_Previews: PreviewProvider {\n        static\
    \ var previews: some View {\n            ContentView()\n        }\n    }\n   \
    \ ```\n\n8.  点击画布窗格中的**Live**图标。\n9.  在`List`中的任意项目上从右向左滑动。注意，`.onDelete`修饰符会自动显示**删除**按钮，如图\
    \ 13-7 所示。\n10. 点击**删除**按钮。注意，包含该项目的行消失了。\n\n### 在列表中移动项目\n\n另一种使用列表的常见方式是在`List`内重新排列或移动项目。在\
    \ iOS 中，这通常是一个两步过程。首先，您必须编辑`List`，使其在`List`中每个项目的右侧显示三横线图标。其次，您使用三横线图标滑动`List`项目，将其放置到新位置，如图\
    \ 13-8 所示。\n\n![一张截图展示了一个单词列表，每个单词旁边有三条水平线。这些线条被称为移动图标。](img/329781_7_En_13_Fig8_HTML.jpg)\n\
    \n**图 13-8** – 移动图标显示在`List`中项目的右侧\n\n第一步是在`List`内的`ForEach`循环中添加`.onMove`修饰符，如下所示：\n\
    \n```swift\nForEach(0...myArray.count - 1, id: \\.self) { index in\n}.onMove(perform:\
    \ move)\n```\n\n这会调用一个移动函数，该函数使用包含`List`中显示项目的数组名称（以下示例中称为`myArray`），并调用`move`方法，如下所示：\n\
    \n```swift\nfunc move(from source: IndexSet, to destination: Int) {\n    myArray.move(fromOffsets:\
    \ source, toOffset: destination)\n}\n```\n\n要了解如何在`List`中显示移动图标，请按照以下步骤操作：\n\n\
    1.  创建一个新的 SwiftUI iOS 应用程序项目，并为其指定任意名称，例如“ListMove”。\n2.  点击导航器窗格中的`ContentView`文件。\n\
    3.  在`struct ContentView`行下添加一个`@State`变量数组，如下所示：\n\n    ```swift\n    @State\
    \ var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\"\
    , \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n    ```\n\n    输入的具体字符串无关紧要，只要输入几个字符串来填充数组即可。\n\
    \n4.  在`var body: some View`行下添加一个`NavigationView`，如下所示：\n\n    ```swift\n   \
    \ var body: some View {\n        NavigationView {\n        }\n    }\n    ```\n\
    \n    `NavigationView`对于在屏幕右上角显示**编辑**按钮是必需的。\n\n5.  在`NavigationView`内部添加一个`List`，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        NavigationView {\n        \
    \    List {\n            }\n        }\n    }\n    ```\n\n6.  在此`List`内添加一个`ForEach`循环，从\
    \ 0 计数到数组项目总数减 1。然后在一个`Text`视图中显示数组项目，如下所示：\n\n    ```swift\n    var body: some\
    \ View {\n        NavigationView {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }\n            }\n        }\n    }\n    ```\n\n7.  向`List`添加`.toolbar`修饰符，如下所示：\n\
    \n    ```swift\n    var body: some View {\n        NavigationView {\n        \
    \    List {\n                ForEach(0...myArray.count - 1, id: \\.self) { index\
    \ in\n                    Text(myArray[index])\n                }\n          \
    \  }.toolbar {\n                EditButton()\n            }\n        }\n    }\n\
    \    ```\n\n    这段`.toolbar { EditButton() }`代码会在`NavigationView`的右上角添加一个**编辑**按钮。\n\
    \n8.  向`ForEach`循环添加`.onMove`修饰符，以调用一个名为`move`的函数，如下所示：\n\n    ```swift\n    var\
    \ body: some View {\n        NavigationView {\n            List {\n          \
    \      ForEach(0...myArray.count - 1, id: \\.self) { index in\n              \
    \      Text(myArray[index])\n                }.onMove(perform: move)\n       \
    \     }.toolbar {\n                EditButton()\n            }\n        }\n  \
    \  }\n    ```\n\n9.  在`struct ContentView: View`中的最后一个花括号上方添加以下函数，如下所示：\n\n  \
    \  ```swift\n    func move(from source: IndexSet, to destination: Int) {\n   \
    \     myArray.move(fromOffsets: source, toOffset: destination)\n    }\n    ```\n\
    \n    整个`ContentView`文件应如下所示：\n\n    ```swift\n    import SwiftUI\n    struct\
    \ ContentView: View {\n        @State var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
    , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
    , \"Hamster\"]\n        var body: some View {\n            NavigationView {\n\
    \                List {\n                    ForEach(0...myArray.count - 1, id:\
    \ \\.self) { index in\n                        Text(myArray[index])\n        \
    \            }.onMove(perform: move)\n                }.toolbar {\n          \
    \          EditButton()\n                }\n            }\n        }\n       \
    \ func move(from source: IndexSet, to destination: Int) {\n            myArray.move(fromOffsets:\
    \ source, toOffset: destination)\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n"
- fmt: "10.  Click the `Live` icon in the `Canvas` pane.\n\n11.  Tap the `Edit` button\
    \ in the upper-right corner of the screen. The three–horizontal line icons appear\
    \ to the right of each item in the `List` (see Figure [13-8](#329781_7_En_13_Chapter.xhtml#Fig8)).\
    \ Notice that when you tap the `Edit` button, it changes into a `Done` button.\n\
    \n12.  Slide any of the horizontal line icons up or down to move an item to a\
    \ new location in the `List`.\n\n13.  Tap the `Done` button in the upper-right\
    \ corner of the screen to hide the horizontal line icons to the right of each\
    \ item in the `List`.\n\n### Creating Custom Swipe Actions for a List\n\nSwiftUI\
    \ also allows custom left-to-right and right-to-left gestures on `List` items.\
    \ The first step is to add a `.swipeActions` modifier to the view that displays\
    \ items in a `List` such as a `Text` view. Then define whether you want a `.leading`\
    \ (left-to-right) or `.trailing` (right-to-left) swipe gesture like this:\n\n\
    ```\n.swipeActions(edge: .trailing)\n```\n\nEach `.swipeActions` modifier needs\
    \ to define a `Button` (including the `Button`’s title and code to run when selected)\
    \ along with a `.tint` modifier to display a specific color when selected such\
    \ as:\n\n```\n.swipeActions(edge: .trailing) {\n    Button {\n        //  Code\
    \ to run\n    } label: {\n        //  Icon to display\n    }.tint(.red)\n}\n```\n\
    \nTo see how to create a custom swipe action in a `List`, follow these steps:\n\
    \n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig9_HTML.jpg)\nA screenshot\
    \ represents a list of 3 words named `parrot`, `goldfish`, and `lizard`. The word\
    \ `goldfish` is swiped and indicates a graduation cap icon on the left side.\n\
    \n**Figure 13-9** – The appearance of a `List` item after a left-to-right swipe\
    \ gesture\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as `\"ListCustomSwipes\"`.\n\n2.  Click the `ContentView` file in\
    \ the `Navigator` pane.\n\n3.  Add a `State` variable and a `State` variable array\
    \ under the `struct ContentView` line like this:\n\n```\n    @State var myArray\
    \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n    @State var message = \"\"\n```\n\
    \n4.  Add a `VStack`, `Text` view, and a `List` under the `var body: some View`\
    \ line like this:\n\n```\n    var body: some View {\n        VStack {\n      \
    \      Text(\"\\(message)\")\n            List {\n            }\n        }\n \
    \   }\n```\n\n5.  Add a `ForEach` loop inside this `List` to count from 0 to the\
    \ total number of items in the array – 1. Then display the array item in a `Text`\
    \ view like this:\n\n```\n    var body: some View {\n        VStack {\n      \
    \      Text(\"\\(message)\")\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }\n            }\n        }\n    }\n```\n\n6.  Add multiple `.swipeActions`\
    \ modifiers to the `Text` view inside the `ForEach` loop like this:\n\n```\n \
    \   var body: some View {\n        VStack {\n            Text(\"\\(message)\"\
    )\n            List {\n                ForEach(0...myArray.count - 1, id: \\.self)\
    \ { index in\n                    Text(myArray[index])\n                     \
    \   .swipeActions(edge: .trailing) {\n                            Button {\n \
    \                               message = \"Item = \\(myArray[index]) -- Index\
    \ = \\(index)\"\n                            } label: {\n                    \
    \            Image(systemName: \"calendar.circle\")\n                        \
    \    }.tint(.yellow)\n                        }\n                        .swipeActions(edge:\
    \ .trailing) {\n                            Button {\n                       \
    \         message = \"Green button selected\"\n                            } label:\
    \ {\n                                Image(systemName: \"book\")\n           \
    \                 }.tint(.green)\n                        }\n                \
    \        .swipeActions(edge: .leading) {\n                            Button {\n\
    \                                message = \"Left to right swipe\"\n         \
    \                   } label: {\n                                Image(systemName:\
    \ \"graduationcap\")\n                            }.tint(.purple)\n          \
    \              }\n                }\n            }\n        }\n    }\n```\n\n\
    The entire `ContentView` file should look like this:\n\n```\n    import SwiftUI\n\
    \    struct ContentView: View {\n        @State var myArray = [\"Cat\", \"Dog\"\
    , \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"\
    Tarantula\", \"Hamster\"]\n        @State var message = \"\"\n        var body:\
    \ some View {\n            VStack {\n                Text(\"\\(message)\")\n \
    \               List {\n                    ForEach(0...myArray.count - 1, id:\
    \ \\.self) { index in\n                        Text(myArray[index])\n        \
    \                    .swipeActions(edge: .trailing) {\n                      \
    \          Button {\n                                    message = \"Item = \\\
    (myArray[index]) -- Index = \\(index)\"\n                                } label:\
    \ {\n                                    Image(systemName: \"calendar.circle\"\
    )\n                                }.tint(.yellow)\n                         \
    \   }\n                            .swipeActions(edge: .trailing) {\n        \
    \                        Button {\n                                    message\
    \ = \"Green button selected\"\n                                } label: {\n  \
    \                                  Image(systemName: \"book\")\n             \
    \                   }.tint(.green)\n                            }\n          \
    \                  .swipeActions(edge: .leading) {\n                         \
    \       Button {\n                                    message = \"Left to right\
    \ swipe\"\n                                } label: {\n                      \
    \              Image(systemName: \"graduationcap\")\n                        \
    \        }.tint(.purple)\n                            }\n                    }\n\
    \                }\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n```\n\n7.  Click the `Live` icon in the `Canvas` pane.\n\n\
    8.  Swipe left to right to see the `.leading` swipe gesture `Button` appear as\
    \ shown in Figure [13-9](#329781_7_En_13_Chapter.xhtml#Fig9).\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig10_HTML.jpg)\n\
    A screenshot represents a list of 3 words. The middle row is swiped and denotes\
    \ a book and a calendar icon at the right corner.\n\n**Figure 13-10** – The appearance\
    \ of a `List` item after a right-to-left swipe gesture\n\n9.  Tap the purple graduation\
    \ cap icon. The message `\"Left to right swipe\"` appears near the top of the\
    \ screen.\n\n10.  Swipe right to left to see the two `.trailing` swipe gesture\
    \ `Button`s appear as shown in Figure [13-10](#329781_7_En_13_Chapter.xhtml#Fig10).\n\
    \n11.  Tap the green book icon. The message `\"Green button selected\"` appears.\n\
    \n12.  Swipe right to left to see the two `.trailing` swipe gesture `Button`s\
    \ appear (see Figure [13-10](#329781_7_En_13_Chapter.xhtml#Fig10)).\n\n13.  Tap\
    \ the yellow calendar circle icon. The name of the item and its index position\
    \ in the array appear at the top of the screen.\n\n**Note**\n\nIf you create a\
    \ custom right-to-left swipe gesture, it will override the `.onDelete` gesture."
