- fmt: '# Changing the Appearance of Text


    A `Text` view normally displays plain text. To spice up the appearance of text,
    SwiftUI lets you define a font size, weight, and color either by typing modifiers
    in Swift code or through the Inspector pane. The font size options include specific
    text styles that can automatically adapt to any accessibility settings defined
    on an iPhone or iPad. The available font size options are shown in Figure [4-5](#329781_7_En_4_Chapter.xhtml#Fig5):


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig5_HTML.jpg)


    A set of 3 screenshots. The first one has the text and font commands for the large
    title, title, title 2, title 3, caption, caption 2, and headline, among others.
    The second one has the texts in various font sizes. The third one is a window
    with an options menu for the font option, among others.


    **Figure 4-5** Different font sizes for displaying text


    - Large Title

    - Title

    - Title 2

    - Title 3

    - Caption

    - Caption 2

    - Headline

    - Subheadline

    - Callout

    - Footnote

    - Body


    In case you want to choose a specific font for a `Text` view, you can do that
    using the custom font modifier like this:


    ```

    .font(.custom("Courier", size: 36))

    ```


    In the preceding code, you define the font family followed by the font size. Just
    keep in mind that Xcode may not support all fonts. If you just want to define
    a custom font size, you can omit the font name such as:


    ```

    .font(.custom("", size: 36))

    ```


    > **Note:** When you define custom fonts and font sizes, the `Text` view will
    not automatically resize text based on the user’s iOS settings. For that reason,
    it’s best to avoid custom fonts unless you absolutely need them.


    In addition to the font size, you can also select a weight, which defines how
    thin or thick text can appear. The weight options include the following as shown
    in Figure [4-6](#329781_7_En_4_Chapter.xhtml#Fig6):


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig6_HTML.jpg)


    A set of 3 screenshots. The first one has the text and font weight commands for
    the large title, title, title 2, and title 3, among others. The second one has
    texts with various font weights of heavy and ultra-light, among others. The third
    one is a window with an options menu for the font option.


    **Figure 4-6** Different weights for displaying text


    - Heavy

    - Semibold

    - Bold

    - Regular

    - Thin

    - Black

    - Medium

    - Light

    - Ultra Light


    A third way to modify the appearance of text is to choose a color for text. You
    can type a color modifier in Swift code or choose a standard color from the Inspector
    pane such as Red, Green, or Orange as shown in Figure [4-7](#329781_7_En_4_Chapter.xhtml#Fig7).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig7_HTML.jpg)


    A set of 2 screenshots of the foreground color command and a cropped window with
    an options menu for the text option that has a list of various colors.


    **Figure 4-7** Defining color for text


    With color, you can choose a standard color option such as Green, Blue, or Yellow.
    If you don’t want to use a standard color, you can also choose Custom, which lets
    you define different color values and an opacity value as well from 0 (invisible)
    to 1 (completely visible). When you choose a custom color option, a color dialog
    appears for you to choose a nonstandard color as shown in Figure [4-8](#329781_7_En_4_Chapter.xhtml#Fig8).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig8_HTML.jpg)


    A screenshot of the extended range s R G B dialog box with a color box, 2 color
    sliders, and other options. It has a window in the background with options for
    text, accessibility, and font. The dialog box is from the color spin box in the
    font option.


    **Figure 4-8** Defining a custom color for text


    Two other ways to define colors include defining:

    - Hue, saturation, and brightness

    - Red, green, and blue (RGB)


    The hue value (between 0.0 and 1.0) defines a color based on a color wheel. A
    value of 0.0 or 1.0 is identical. Other values display different colors from around
    the color wheel as shown in Figure [4-9](#329781_7_En_4_Chapter.xhtml#Fig9).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig9_HTML.jpg)


    An illustration of a color wheel with various colors. It has the title hue and
    the values 0.25, 0.0 and 1.0, 0.75, and 0.5 around the wheel.


    **Figure 4-9** Choosing a color from the color wheel using a hue value


    A saturation value defines how prominent the color appears where a value of 0.0
    displays gray, while a value of 1.0 displays the strongest appearance of that
    color. A brightness value defines how visible the color appears where a value
    of 0.0 displays no color and a value of 1.0 displays the brightest color.


    The red, blue, green (RGB) values let you define a value from 0.0 to 1.0 where
    0.0 represents the complete absence of that color. By using different values for
    red, blue, and green, you can create interesting and unique colors.


    To define the hue, saturation, and brightness, use this code:


    ```

    Color(hue: 0.75, saturation: 1.0, brightness: 1.0)

    ```


    To define the red, green, and blue colors, use this code:


    ```

    Color(red: 0.9, green: 0.2, blue: 0.6)

    ```


    Use different values from 0.0 to 1.0 to define each option such as a value of
    0.84 for the hue or a value of 0.62 for the green color.


    Just like a word processor, SwiftUI also lets you modify text in italics, bold,
    underline, or strikethrough. To add these effects to text, you can type the following
    commands:


    ```

    .bold()

    .italic()

    .underline()

    .strikethrough()

    ```


    Rather than type these modifiers, you can also click the Add Modifier popup menu
    in the Inspector pane as shown in Figure [4-10](#329781_7_En_4_Chapter.xhtml#Fig10).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig10_HTML.jpg)


    A screenshot of the add modifier search bar. It has a section for text with options
    for autocorrection disabled, baseline offset, bold, disable autocorrection, dynamic
    type size, find disabled, font, font weight, italic, kerning, keyboard type, and
    line spacing, among others.


    **Figure 4-10** Adding bold, italics, underline, or strikethrough to text


    Another way to modify text is to define its alignment. The three types of alignment
    are shown in Figure [4-11](#329781_7_En_4_Chapter.xhtml#Fig11):


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig11_HTML.jpg)


    A set of 3 commands of text and multiline text alignment with their respective
    descriptions and alignment for leading, center, and trailing.


    **Figure 4-11** Three ways to align text


    - **Leading** – Text aligns on the left edge.

    - **Center** – Each line of text appears centered between the left and right edges.

    - **Trailing** – Text aligns on the right edge.


    You can define text alignment by using the `.multilineTextAlignment` modifier
    or through choosing a text alignment option in the Attributes Inspector as shown
    in Figure [4-12](#329781_7_En_4_Chapter.xhtml#Fig12).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig12_HTML.jpg)


    A cropped screenshot of a window. It has options for text, accessibility, and
    font. The font option has the alignment options highlighted with a bounding box.


    **Figure 4-12** Aligning text in the Inspector pane'
