    \n```\nCapsule()\n.fill(LinearGradient(gradient: Gradient(colors: [.blue, .green,\
    \ .pink]), startPoint: .topLeading, endPoint: .bottomTrailing))\n```\n\n径向渐变会在由\
    \ `center` 参数（例如 `.center` 或 `.top`）指定的特定位置绘制一个圆形颜色。如果你选择 `.top` 这样的值，那么渐变中心将从形状的顶部中心开始，如图\
    \ 5-8 所示：\n\n![](img/329781_7_En_5_Fig8_HTML.jpg)\n\n一组针对椭圆、填充、径向渐变、渐变、颜色、中心、起始半径和结束半径的命令，并附有对应的椭圆颜色渐变插图。\n\
