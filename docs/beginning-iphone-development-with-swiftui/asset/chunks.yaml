    \n```swift\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    var passedData:\
    \ String\n    var body: some View {\n        HStack {\n            Spacer()\n\
    \            VStack {\n                Spacer()\n                Text(\"String\
