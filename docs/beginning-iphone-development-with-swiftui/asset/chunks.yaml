    \ 每个标记（条形）的高度表示其数值的大小。\n\n### 为条形图定义颜色\n\n通常，条形图会以默认的蓝色显示每个标记（条形）。 但是，你可以通过使用\
    \ `.foregroundStyle` 修改器来选择不同的颜色，就像这样：\n\n```swift\nBarMark(x: .value(\"Name\"\
