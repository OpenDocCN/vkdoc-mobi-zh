    \ 43)\n    ]\n    ```\n\n3.  在 `VStack` 内部添加一个 `Chart`，如下所示：\n\n    ```\n    var\
    \ body: some View {\n    VStack {\n    Chart (mySalesArray) { x in\n    }\n  \
    \  }\n    ```\n\n4.  在 `Chart` 内部添加一个 `AreaMark`，如下所示：\n\n    ```\n    VStack\
