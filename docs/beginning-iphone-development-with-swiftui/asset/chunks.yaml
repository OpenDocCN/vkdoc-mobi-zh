  trans: "\n10.  点击`Canvas`面板中的`Live`图标。\n\n11.  点击屏幕右上角的`Edit`按钮。`List`中每个项目的右侧会出现三条水平线图标（见图\
    \ 13-8）。请注意，当你点击`Edit`按钮时，它会变成一个`Done`按钮。\n\n12.  向上或向下滑动任意水平线图标，即可将项目移动到`List`中的新位置。\n\
    \n13.  点击屏幕右上角的`Done`按钮，可隐藏`List`中每个项目右侧的水平线图标。\n\n### 为列表创建自定义滑动操作\n\nSwiftUI\
    \ 还允许在`List`项目上实现自定义的从左到右和从右到左手势。第一步是在显示`List`项目的视图（例如`Text`视图）上添加`.swipeActions`修饰符。然后，像这样定义你是想要`.leading`（从左到右）还是`.trailing`（从右到左）滑动手势：\n\
    \n```\n.swipeActions(edge: .trailing)\n```\n\n每个`.swipeActions`修饰符都需要定义一个`Button`（包括`Button`的标题以及选中时要运行的代码），同时搭配一个`.tint`修饰符，以便在选中时显示特定颜色，例如：\n\
    \n```\n.swipeActions(edge: .trailing) {\n    Button {\n        //  要运行的代码\n  \
    \  } label: {\n        //  要显示的图标\n    }.tint(.red)\n}\n```\n\n要了解如何在`List`中创建自定义滑动操作，请按照以下步骤操作：\n\
    \n![](img/329781_7_En_13_Fig9_HTML.jpg)\n一张屏幕截图，显示了一个包含三个单词`parrot`、`goldfish`和`lizard`的列表。`goldfish`一词被滑动，左侧显示一个毕业帽图标。\n\
    \n**图 13-9** – 从左到右滑动后`List`项目的外观\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如`\"\
    ListCustomSwipes\"`。\n\n2.  点击`Navigator`面板中的`ContentView`文件。\n\n3.  在`struct\
    \ ContentView`代码行下方添加一个`State`变量和一个`State`变量数组，如下所示：\n\n```\n    @State var myArray\
    \ = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\"\
    , \"Canary\", \"Tarantula\", \"Hamster\"]\n    @State var message = \"\"\n```\n\
    \n4.  在`var body: some View`代码行下方添加一个`VStack`、`Text`视图和一个`List`，如下所示：\n\n```\n\
    \    var body: some View {\n        VStack {\n            Text(\"\\(message)\"\
    )\n            List {\n            }\n        }\n    }\n```\n\n5.  在这个`List`内部添加一个`ForEach`循环，从\
    \ 0 计数到数组中项目的总数减 1。然后在`Text`视图中显示数组项目，如下所示：\n\n```\n    var body: some View {\n\
    \        VStack {\n            Text(\"\\(message)\")\n            List {\n   \
    \             ForEach(0...myArray.count - 1, id: \\.self) { index in\n       \
    \             Text(myArray[index])\n                }\n            }\n       \
    \ }\n    }\n```\n\n6.  在`ForEach`循环内的`Text`视图上添加多个`.swipeActions`修饰符，如下所示：\n\n\
    ```\n    var body: some View {\n        VStack {\n            Text(\"\\(message)\"\
    )\n            List {\n                ForEach(0...myArray.count - 1, id: \\.self)\
    \ { index in\n                    Text(myArray[index])\n                     \
    \   .swipeActions(edge: .trailing) {\n                            Button {\n \
    \                               message = \"Item = \\(myArray[index]) -- Index\
    \ = \\(index)\"\n                            } label: {\n                    \
    \            Image(systemName: \"calendar.circle\")\n                        \
    \    }.tint(.yellow)\n                        }\n                        .swipeActions(edge:\
    \ .trailing) {\n                            Button {\n                       \
    \         message = \"Green button selected\"\n                            } label:\
    \ {\n                                Image(systemName: \"book\")\n           \
    \                 }.tint(.green)\n                        }\n                \
    \        .swipeActions(edge: .leading) {\n                            Button {\n\
    \                                message = \"Left to right swipe\"\n         \
    \                   } label: {\n                                Image(systemName:\
    \ \"graduationcap\")\n                            }.tint(.purple)\n          \
    \              }\n                }\n            }\n        }\n    }\n```\n\n\
    整个`ContentView`文件应如下所示：\n\n```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n        @State var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"\
    Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
    \        @State var message = \"\"\n        var body: some View {\n          \
    \  VStack {\n                Text(\"\\(message)\")\n                List {\n \
    \                   ForEach(0...myArray.count - 1, id: \\.self) { index in\n \
    \                       Text(myArray[index])\n                            .swipeActions(edge:\
    \ .trailing) {\n                                Button {\n                   \
    \                 message = \"Item = \\(myArray[index]) -- Index = \\(index)\"\
    \n                                } label: {\n                               \
    \     Image(systemName: \"calendar.circle\")\n                               \
    \ }.tint(.yellow)\n                            }\n                           \
    \ .swipeActions(edge: .trailing) {\n                                Button {\n\
    \                                    message = \"Green button selected\"\n   \
    \                             } label: {\n                                   \
    \ Image(systemName: \"book\")\n                                }.tint(.green)\n\
    \                            }\n                            .swipeActions(edge:\
    \ .leading) {\n                                Button {\n                    \
    \                message = \"Left to right swipe\"\n                         \
    \       } label: {\n                                    Image(systemName: \"graduationcap\"\
    )\n                                }.tint(.purple)\n                         \
    \   }\n                    }\n                }\n            }\n        }\n  \
    \  }\n    struct ContentView_Previews: PreviewProvider {\n        static var previews:\
    \ some View {\n            ContentView()\n        }\n    }\n```\n\n7.  点击`Canvas`面板中的`Live`图标。\n\
    \n8.  从左向右滑动，即可看到`.leading`滑动手势`Button`出现，如图 13-9 所示。\n\n![](img/329781_7_En_13_Fig10_HTML.jpg)\n\
    一张屏幕截图，显示了一个包含三个单词的列表。中间一行被滑动，右侧显示一个书和一个日历图标。\n\n**图 13-10** – 从右到左滑动后`List`项目的外观\n\
    \n9.  点击紫色毕业帽图标。屏幕顶部附近会显示消息`\"Left to right swipe\"`。\n\n10. 从右向左滑动，即可看到两个`.trailing`滑动手势`Button`出现，如图\
    \ 13-10 所示。\n\n11. 点击绿色书图标。会显示消息`\"Green button selected\"`。\n\n12. 从右向左滑动，即可看到两个`.trailing`滑动手势`Button`出现（见图\
    \ 13-10）。\n\n13. 点击黄色日历圆圈图标。该项目的名称及其在数组中的索引位置会显示在屏幕顶部。\n\n**注意**\n\n如果你创建了自定义的从右到左滑动手势，它将覆盖`.onDelete`手势。\n"
- fmt: "### Searching a List\n\nSince lists often display large amounts of data, scrolling\
    \ through a long `List` can be cumbersome. To make searching for specific data\
    \ in a large `List` easier, you can add a search bar. Now users can type one or\
    \ more characters to filter a long `List` so they only see the relevant data they\
    \ want.\n\nTo add a search bar to a `List`, you need to embed a `List` inside\
    \ a `NavigationView` and add a `.searchable` modifier to a `List` like this:\n\
    \n```\nNavigationView {\nList (arrayName, id: \\.self) { x in\nText(x)\n}.searchable(text:\
    \ $stateVariable)\n```\n\nIn this example, you would need to replace `\"arrayName\"\
    ` with the actual array name containing the `List` items. Then you need to replace\
    \ `\"stateVariable\"` with the name of a `State` variable that holds a `String`\
    \ data type.\n\nTo see how to search a `List`, follow these steps:\n\n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig11_HTML.jpg)\n\
    \nA screenshot denotes a list of words, which include automobile, bicycle, skateboard,\
    \ boat, scooter, airplane, and skates. There is a search bar at the top.\n\n**Figure\
    \ 13-11** – The initial appearance of the search bar and the `List` of items\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as `\"ListSearch\"`.\n\n2.  Click the `ContentView` file in the Navigator pane.\n\
    \n3.  Underneath the `import SwiftUI` line, add a function that returns an array\
    \ of `Strings` like this:\n\n    ```\n    func newList() -> [String] {\n     \
    \   return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"Boat\", \"Scooter\"\
    , \"Airplane\", \"Skates\"]\n    }\n    ```\n\n    This function simply returns\
    \ an array of `Strings`. This function will later be used to refresh the entire\
    \ `List` after a user finishes searching the `List`.\n\n4.  Add two `State` variables\
    \ underneath the `struct ContentView` line like this:\n\n    ```\n    @State var\
    \ search = \"\"\n    @State var transportation = newList()\n    ```\n\n    The\
    \ `search` `State` variable will store data typed from the search bar. The `transportation`\
    \ `State` variable stores an array of `Strings`, which it retrieves by calling\
    \ the `newList()` function.\n\n5.  Add a `NavigationView` inside the `VStack`\
    \ like this:\n\n    ```\n    var body: some View {\n        VStack {\n       \
    \     NavigationView {\n            }\n        }\n    }\n    ```\n\n6.  Add a\
    \ `List` inside the `NavigationView` like this:\n\n    ```\n    var body: some\
    \ View {\n        VStack {\n            NavigationView {\n                List\
    \ (transportation, id: \\.self) { x in\n                    Text(x)\n        \
    \        }\n            }\n        }\n    }\n    ```\n\n    This populates the\
    \ `List` with the items stored in the `transportation` `State` variable, which\
    \ contains an array of `Strings`.\n\n7.  Add the `.searchable` modifier to the\
    \ last curly bracket of the `List` like this:\n\n    ```\n    var body: some View\
    \ {\n        VStack {\n            NavigationView {\n                List (transportation,\
    \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
    \ $search)\n            }\n        }\n    }\n    ```\n\n    This adds a search\
    \ bar to the top of the screen. Whatever the user types in the search bar will\
    \ get stored in the `search` `State` variable. Right now this search bar won’t\
    \ work, so we need to add an `.onChange` modifier to it.\n\n8.  Add the `.onChange`\
    \ modifier to the `List` like this:\n\n    ```\n    var body: some View {\n  \
    \      VStack {\n            NavigationView {\n                List (transportation,\
    \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
    \ $search)\n                .onChange(of: search) { newValue in\n            \
    \        if !newValue.isEmpty && newValue.count >= 1 {\n                     \
    \   transportation = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
    \                        }\n                    } else {\n                   \
    \     transportation = newList()\n                    }\n                }\n \
    \           }\n        }\n    }\n    ```\n\n    The `.onChange` modifier runs\
    \ each time the content of the search bar changes. If the search bar is completely\
    \ empty, then the `.onChange` modifier runs the `newList()` function to repopulate\
    \ the `List`. If the search bar is not empty and contains at least one character,\
    \ then the search bar uses a filter to match what the user typed to each `List`\
    \ item. The `.hasPrefix` modifier simply checks if what the user typed matches\
    \ part or all of the letters that make up each `List` item.\n\nThe entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\nfunc newList() -> [String]\
    \ {\n    return [\"Automobile\", \"Bicycle\", \"Skateboard\", \"Boat\", \"Scooter\"\
    , \"Airplane\", \"Skates\"]\n}\nstruct ContentView: View {\n    @State var search\
    \ = \"\"\n    @State var transportation = newList()\n    var body: some View {\n\
    \        VStack {\n            NavigationView {\n                List (transportation,\
    \ id: \\.self) { x in\n                    Text(x)\n                }.searchable(text:\
    \ $search)\n                .onChange(of: search) { newValue in\n            \
    \        if !newValue.isEmpty && newValue.count >= 1 {\n                     \
    \   transportation = transportation.filter {\n                            $0.lowercased().hasPrefix(newValue.lowercased())\n\
    \                        }\n                    } else {\n                   \
    \     transportation = newList()\n                    }\n                }\n \
    \           }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n9.  Click the Live icon in the Canvas pane. The items appear in the `List` with\
    \ a search bar on top as shown in Figure [13-11](#329781_7_En_13_Chapter.xhtml#Fig11).\n\
    \n![](images/329781_7_En_13_Chapter/329781_7_En_13_Fig12_HTML.jpg)\n\nA screenshot\
    \ denotes a list of 2 words under the search bar, which include bicycle and boat.\
    \ The letter B is typed in the search bar.\n\n**Figure 13-12** – The search bar\
    \ filters out all items that fail to match text typed in the search bar\n\n10.\
    \ Click in the search bar and type a `\"b\"`. Notice that the `List` now filters\
    \ out all items except the ones that start with a `\"b\"` like `\"Boat\"` and\
    \ `\"Bicycle\"` as shown in Figure [13-12](#329781_7_En_13_Chapter.xhtml#Fig12).\n\
    \n11. Click Cancel or the close icon (x). Notice that the `List` displays all\
    \ items once more.\n\n### Summary\n\nLists are common ways to display multiple,\
    \ related items in one place. To help organize items in a `List`, you can group\
    \ related items together.\n\nBesides displaying items in a `List`, you can also\
    \ detect swipe gestures from left to right or right to left. By using the `.onDelete`\
    \ modifier, you can allow users to delete items from a `List`. By using a `NavigationView`\
    \ and an Edit button, you can use the `.onMove` modifier to allow users to move\
    \ items within a `List`.\n\nYou can also define custom swipe gestures to appear\
    \ on a `List`. When you create custom swipe gestures, you can define an icon and\
    \ a color to appear for each button. By using swipe gestures with lists, users\
    \ can modify `List` items in different ways.\n\nTo make lists easier to read,\
    \ consider adding lines to separate items or use alternating colors. A search\
    \ bar can also make it easy for users to find the item they want, especially if\
    \ a `List` contains a large number of items. By using lists, you can display organized\
    \ information for the user to view and select."
