    \ Data\")\n    }\n    }\n    ```\n\nNotice that the first NavigationLink opens\
    \ a structure called FileView and sends a binding variable ($message) to the “choice:”\
    \ parameter. The second NavigationLink opens a structure called SeparateFileView\
    \ and sends the same binding variable ($message) to the “passedData” parameter.\n\
    \n6.  Add the following structure underneath the struct ContentView: View structure:\n\
    \n```\n    struct FileView: View {\n    @Binding var choice: String\n    var body:\
    \ some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
    Type here:\", text: $choice)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n    ```\n\nNotice that this structure declares a @Binding variable\
    \ called “choice” that can hold a String. This structure uses a TextField to change\
    \ this @Binding variable ($choice), which sends the changes automatically back\
    \ to the ContentView structure.\n\n7.  Choose File ➤ New ➤ File. A dialog appears\
    \ (see Figure [17-4](#329781_7_En_17_Chapter.xhtml#Fig4)).\n\n8.  Click iOS near\
    \ the top of the dialog, click Swift File, and then click Next. Xcode asks for\
    \ a name to give your newly created file.\n\n9.  Type SeparateFile and click Create.\
    \ Xcode creates a new Swift file.\n\n10.  Delete all code currently in the SeparateFile\
    \ and replace it with the following:\n\n```\n    import SwiftUI\n    struct SeparateFileView:\
    \ View {\n    @Binding var passedData: String\n    var body: some View {\n   \
    \ HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"Type here\"\
    , text: $passedData)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n\
    \    }\n    }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    SeparateFileView(passedData: .constant(\"\"))\n\
    \    }\n    }\n    ```\n\nNotice that this structure declares a @Binding variable\
    \ called “passedData” that can hold a String. The TextField can change this variable\
    \ ($passedData) and automatically send the changes back to the ContentView structure.\n\
    \nAlso note that because this structure is stored in a separate file, the PreviewProvider\
    \ structure must also include the “passedData” parameter by giving it a .constant(“”).\n\
    \n11.  Click the ContentView file in the Navigator pane.\n\n12.  Click the Live\
    \ icon in the Canvas pane.\n\n13.  Click in the TextField and type a phrase.\n\
    \n14.  Click the “Send a message” navigation link that passes the string to the\
    \ FileView structure stored in the ContentView file.\n\n15.  Click in the TextField\
    \ displayed by the FileView structure and edit the data. Then click the Back button\
    \ to return to the ContentView structure that displays the modified data.\n\n\
    16.  Click the “Separate file” navigation link that passes the string to the SeparateFileView\
    \ structure stored in a separate file.\n\n17.  Click in the TextField displayed\
    \ by the SeparateFileView structure and edit the data. Then click the Back button\
    \ to return to the ContentView structure that displays the modified data."
  trans: "\n### 在导航栈中更改结构体之间的数据\n\n之前的项目创建了两个结构体，一个存储在 `ContentView` 文件中，另一个存储在单独的文件中。在这两种情况下，这些结构体都定义了用于接收和显示数据的用户界面。\n\
    \n如果我们将数据传递给一个结构体，然后允许该结构体修改这些数据，情况会怎样？这需要进行几项更改：\n\n-   创建一个 `@State` 变量。\n-\
    \   使用 `NavigationLink` 打开另一个结构体，并向该结构体传递一个指向 `@State` 变量的绑定（使用 `$` 符号），例如：\n\
    -   在接收数据的结构体中定义一个 `@Binding` 变量。\n-   在接收数据的结构体中更改该 `@Binding` 变量。\n\n```\nFileView(choice:\
    \ $message)\n```\n\n要了解如何在导航栈中的结构体之间更改数据，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS\
    \ App 项目，并为其任意命名，例如 `\"NavigationStackBindingData\"`。\n\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3.  在 `struct ContentView: View` 一行下方创建一个 `@State` 变量，如下所示：\n\n```\n\
    \    struct ContentView: View {\n    @State var message = \"\"\n    ```\n\n4.\
    \  在 `var body: some View` 一行内部添加一个 `NavigationStack` 和一个 `VStack`，如下所示：\n\n```\n\
    \    var body: some View {\n    NavigationStack {\n    VStack {\n    }\n    }\n\
    \    ```\n\n5.  在 `VStack` 内部添加一个 `Text` 视图和两个 `NavigationLink`，如下所示：\n\n```\n\
    \    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"Type here\"\
    , text: $message)\n    NavigationLink(destination: FileView(choice: $message))\
    \ {\n    Text(\"Send a message\")\n    }\n    NavigationLink(destination: SeparateFileView(passedData:\
    \ $message)) {\n    Text(\"Separate file\")\n    }\n    .navigationTitle(\"Passing\
    \ Data\")\n    }\n    }\n    ```\n\n注意，第一个 `NavigationLink` 打开一个名为 `FileView`\
    \ 的结构体，并将一个绑定变量（`$message`）发送给 `choice:` 参数。第二个 `NavigationLink` 打开一个名为 `SeparateFileView`\
    \ 的结构体，并将同一个绑定变量（`$message`）发送给 `passedData` 参数。\n\n6.  在 `struct ContentView:\
    \ View` 结构体下方添加以下结构体：\n\n```\n    struct FileView: View {\n    @Binding var choice:\
    \ String\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n\
    \    Spacer()\n    TextField(\"Type here:\", text: $choice)\n    Spacer()\n  \
    \  }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n    ```\n\n\
    注意，该结构体声明了一个名为 `choice` 的 `@Binding` 变量，它可以存储一个 `String`。此结构体使用 `TextField` 来更改该\
    \ `@Binding` 变量（`$choice`），这会自动将更改发送回 `ContentView` 结构体。\n\n7.  选择 `File` ➤ `New`\
    \ ➤ `File`。一个对话框会出现（见图 17-4）。\n\n8.  点击对话框顶部附近的 `iOS`，点击 `Swift File`，然后点击 `Next`。Xcode\
    \ 会询问您为新创建的文件命名。\n\n9.  输入 `SeparateFile` 并点击 `Create`。Xcode 会创建一个新的 Swift 文件。\n\
    \n10. 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\n```\n    import SwiftUI\n    struct\
    \ SeparateFileView: View {\n    @Binding var passedData: String\n    var body:\
    \ some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
    Type here\", text: $passedData)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n\
    \    }\n    }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    SeparateFileView(passedData: .constant(\"\"))\n\
    \    }\n    }\n    ```\n\n注意，该结构体声明了一个名为 `passedData` 的 `@Binding` 变量，它可以存储一个\
    \ `String`。`TextField` 可以更改此变量（`$passedData`）并自动将更改发送回 `ContentView` 结构体。\n\n\
    另外请注意，由于此结构体存储在单独的文件中，因此 `PreviewProvider` 结构体也必须通过提供 `.constant(\"\")` 来包含 `passedData`\
    \ 参数。\n\n11. 在导航器窗格中点击 `ContentView` 文件。\n\n12. 在画布窗格中点击 `Live` 图标。\n\n13. 点击\
    \ `TextField` 并输入一个短语。\n\n14. 点击 `\"Send a message\"` 导航链接，该链接会将字符串传递给存储在 `ContentView`\
    \ 文件中的 `FileView` 结构体。\n\n15. 点击 `FileView` 结构体显示的 `TextField` 并编辑数据。然后点击 `Back`\
    \ 按钮返回到 `ContentView` 结构体，该结构体会显示修改后的数据。\n\n16. 点击 `\"Separate file\"` 导航链接，该链接会将字符串传递给存储在单独文件中的\
    \ `SeparateFileView` 结构体。\n\n17. 点击 `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击\
    \ `Back` 按钮返回到 `ContentView` 结构体，该结构体会显示修改后的数据。\n"
- fmt: "### Sharing Data Between Structures in a Navigation Stack\n\nUsing `@State`\
    \ and `@Binding` variables lets multiple views share and modify data. However,\
    \ suppose you created a Navigation Stack that links four structures together in\
    \ sequential order. If you change the data on the first structure and want to\
    \ pass it to the fourth structure, you also have to pass that data through the\
    \ second and third structures.\n\nWhile this can work, it’s clumsy. It’s far better\
    \ to pass data straight to the structures that need the data. To do this, SwiftUI\
    \ offers another way to share data between structures. First, create an `ObservableObject`\
    \ class that contains one or more variables to share. Each variable must be marked\
    \ as `@Published` like this:\n\n```\nclass ShareString: ObservableObject {\n@Published\
    \ var message = \"\"\n}\n```\n\nThe structure that contains the `NavigationStack`\
    \ (such as `ContentView`) needs to define a `@StateObject` variable that defines\
    \ an object from the `ObservableObject` class like this:\n\n```\n@StateObject\
    \ var showMe = ShareString()\n```\n\nSince we want to share this `ObservableObject`\
    \ between all views within the Navigation Stack, we need to add the `.environmentObject`\
    \ modifier to the `NavigationStack` along with the `StateObject` to share like\
    \ this:\n\n```\nNavigationStack {\n}.environmentObject(showMe)\n```\n\nInstead\
    \ of passing data to each view, the `NavigationLink` just needs the name of the\
    \ view to display such as\n\n```\nNavigationLink(destination: FileView()) {\n\
    Text(\"Send a message\")\n}\n```\n\nWithin each structure that needs to access\
    \ the `ObservableObject`, we need to declare an `@EnvironmentObject` variable\
    \ that uses the `ObservableObject` class like this:\n\n```\n@EnvironmentObject\
    \ var choice: ShareString\n```\n\nFinally, within each structure that defines\
    \ an `@EnvironmentObject`, we can access the actual data to share by using the\
    \ `@EnvironmentObject` name plus the `@Published` property name to share like\
    \ this:\n\n```\n$choice.message\n```\n\nIn this case, `\"choice\"` is the `@EnvironmentObject`\
    \ name, and `\"message\"` is the `@Published` property defined within the `ObservableObject`.\
    \ To see how to share data using an `ObservableObject`, follow these steps:\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ `\"NavigationStackObservable\"`.\n\n2.  Click the `ContentView` file in the\
    \ Navigator pane.\n\n3.  Create an `ObservableObject` class under the `import\
    \ SwiftUI` line like this:\n\n```\n    class ShareString: ObservableObject {\n\
    \    @Published var message = \"\"\n    }\n    ```\n\n    The `@Published` variable\
    \ will contain the data to share between structures within the Navigation Stack.\n\
    \n4.  Create a `StateObject` variable under the `struct ContentView: View` line\
    \ like this:\n\n```\n    struct ContentView: View {\n    @StateObject var showMe\
    \ = ShareString()\n    ```\n\n    This creates a new object (`showMe`) based on\
    \ the `ShareString` `ObservableObject`.\n\n5.  Add a `NavigationStack` and a `VStack`\
    \ inside the `var body: some View` line like this:\n\n```\n    var body: some\
    \ View {\n    NavigationStack {\n    VStack (spacing: 26) {\n    }\n    }\n  \
    \  ```\n\n6.  Add a `Text` view, two `NavigationLinks`, and a `.navigationTitle`\
    \ modifier inside the `VStack` like this:\n\n```\n    NavigationStack {\n    VStack\
    \ (spacing: 26) {\n    TextField(\"Type here\", text: $showMe.message)\n    NavigationLink(destination:\
    \ FileView()) {\n    Text(\"Send a message\")\n    }\n    NavigationLink(destination:\
    \ SeparateFileView()) {\n    Text(\"Separate file\")\n    }\n    .navigationTitle(\"\
    Sharing Data\")\n    }\n    }.environmentObject(showMe)\n    ```\n\n    Make sure\
    \ you add the `.environmentObject(showMe)` modifier at the end of the `NavigationStack`.\
    \ This allows sharing of the `showMe` `ObservableObject` `ShareString` class.\
    \ The preceding `NavigationLinks` open structures called `FileView` and `SeparateFileView`\
    \ that we need to create.\n\n7.  Add the following structure underneath the `struct\
    \ ContentView` structure like this:\n\n```\n    struct FileView: View {\n    @EnvironmentObject\
    \ var choice: ShareString\n    var body: some View {\n    HStack {\n    Spacer()\n\
    \    VStack {\n    Spacer()\n    TextField(\"Type here:\", text: $choice.message)\n\
    \    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n  \
    \  }\n    ```\n\n    Notice that this structure defines an `@EnvironmentObject`\
    \ variable that can hold a `ShareString` `ObservableObject`. In the `TextField`,\
    \ we must store the text in the `\"choice\"` `@EnvironmentObject` that uses the\
    \ `\"message\"` `@Published` property (`$choice.message`). The entire `ContentView`\
    \ file should look like this:\n\n```\n    import SwiftUI\n    class ShareString:\
    \ ObservableObject {\n    @Published var message = \"\"\n    }\n    struct ContentView:\
    \ View {\n    @StateObject var showMe = ShareString()\n    var body: some View\
    \ {\n    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"Type here\"\
    , text: $showMe.message)\n    NavigationLink(destination: FileView()) {\n    Text(\"\
    Send a message\")\n    }\n    NavigationLink(destination: SeparateFileView())\
    \ {\n    Text(\"Separate file\")\n    }\n    .navigationTitle(\"Sharing Data\"\
    )\n    }\n    }.environmentObject(showMe)\n    }\n    }\n    struct FileView:\
    \ View {\n    @EnvironmentObject var choice: ShareString\n    var body: some View\
    \ {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
    Type here:\", text: $choice.message)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n8.  Choose\
    \ File ➤ New ➤ File. A dialog appears (see Figure [17-4](#329781_7_En_17_Chapter.xhtml#Fig4)).\n\
    \n9.  Click iOS near the top of the dialog, click Swift File, and then click Next.\
    \ Xcode asks for a name to give your newly created file.\n\n10.  Type `SeparateFile`\
    \ and click Create. Xcode creates a new Swift file.\n\n11.  Delete all code currently\
    \ in the `SeparateFile` and replace it with the following:\n\n```\n    import\
    \ SwiftUI\n    struct SeparateFileView: View {\n    @EnvironmentObject var passedData:\
    \ ShareString\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack\
    \ {\n    Spacer()\n    TextField(\"Type here\", text: $passedData.message)\n \
    \   Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n    }\n   \
    \ }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    SeparateFileView()\n    }\n    }\n    ```\n\n    Notice that\
    \ this structure also declares an `@EnvironmentObject` that can hold a `ShareString`\
    \ `ObservableObject`. Then the `TextField` uses the `\"passedData\"` `@EnvironmentObject`\
    \ to access the `\"message\"` `@Published` property (`$passedData.message`).\n\
    \n12.  Click the `ContentView` file in the Navigator pane.\n\n13.  Click the Live\
    \ icon in the Canvas pane.\n\n14.  Click in the `TextField` and type a phrase.\n\
    \n15.  Click the `\"Send a message\"` navigation link to open the `FileView` structure.\
    \ Notice that what you typed in step 14 now appears in the `FileView` `TextField`.\n\
    \n16.  Edit the text in the `TextField` and then click the Back button. Notice\
    \ that the modified text now appears in the `ContentView` `TextField`.\n\n17.\
    \  Edit the text in the `TextField` and then click the `\"Separate file\"` navigation\
    \ link. The edited text now appears in the `SeparateFileView` `TextField`.\n\n\
    18.  Edit the text in the `TextField` and click the Back button. Notice that the\
    \ modified text now appears in the `ContentView` `TextField`. All this shows how\
    \ the various structures can access the `@Published` property in the `ObservableObject`."
