    \  var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n  \
    \  Button(\"Show Alert\") {\n    showAlert.toggle()\n    }\n    .alert(isPresented:\
    \ $showAlert) {\n    Alert(title: Text(\"Warning!\"),\n    message: Text(\"Zombies\
    \ on the loose\"),\n    primaryButton: .default(Text(\"Default\"), action: {\n\
    \    message = \"Default chosen\"\n    }),\n    secondaryButton: .cancel(Text(\"\
    Cancel\"), action: cancelFunction))\n    }\n    }\n    }\n    func cancelFunction()\
    \ {\n    message = \"Cancel chosen\"\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7.  Click the Live icon in the Canvas pane and then\
    \ click the Show Alert Button. An Alert appears.\n\n8.  Click the Cancel or Default\
    \ Button. Notice that a message appears to let you know which Button you chose.\n\
    \nTo see how to make buttons responsive in an Action Sheet, follow these steps:\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “ActionSheetResponsiveButtons.”\n\n2.  Click the ContentView file in the\
    \ Navigator pane.\n\n3.  Add the following State variables under the struct ContentView:\
    \ View line:\n\n```\n    @State var showAlert = false\n    @State var message\
    \ = \"\"\n    ```\n\n4.  Add a VStack in the var body: some View and put a Text\
    \ view and a Button inside the VStack like this:\n\n```\n    var body: some View\
    \ {\n    VStack {\n    Text(message)\n    .padding()\n    Button(\"Show Action\
    \ Sheet\") {\n    showAlert.toggle()\n    }\n    }\n    }\n    }\n    ```\n\n\
    5.  Add an .actionSheet modifier to the Button like this:\n\n```\n    .actionSheet(isPresented:\
    \ $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"\
    Zombies on the loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action:\
    \ {\n    message = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"),\
    \ action: cancelFunction),\n    .destructive(Text(\"Destructive\"), action: {\n\
    \    message = \"Destructive chosen\"\n    })])\n    }\n    ```\n\n6.  Add the\
    \ following function above the last curly bracket in the struct ContentView: View\
    \ like this:\n\n```\n    func cancelFunction() {\n    message = \"Cancel chosen\"\
    \n    }\n    ```\n\nThe entire ContentView file should look like this:\n\n```\n\
    \    import SwiftUI\n    struct ContentView: View {\n    @State var showAlert\
    \ = false\n    @State var message = \"\"\n    var body: some View {\n    VStack\
    \ {\n    Text(message)\n    .padding()\n    Button(\"Show Action Sheet\") {\n\
    \    showAlert.toggle()\n    }\n    .actionSheet(isPresented: $showAlert) {\n\
    \    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"Zombies on the\
    \ loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action: {\n    message\
    \ = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"), action: cancelFunction),\n\
    \    .destructive(Text(\"Destructive\"), action: {\n    message = \"Destructive\
    \ chosen\"\n    })])\n    }\n    }\n    }\n    func cancelFunction() {\n    message\
    \ = \"Cancel chosen\"\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n7.  Click the Live icon in the Canvas pane and then click the Show\
    \ Action Sheet Button. An Alert appears.\n\n8.  Click the Cancel, Default, or\
    \ Destructive Button. Notice that a message appears to let you know which Button\
    \ you chose."
  trans: "\n### 让警告框/操作表按钮具备响应能力\n\n仅仅向警告框或操作表添加按钮，只能让用户在点击任意按钮时关闭警告框或操作表。通常情况下，你希望按钮能够执行某种操作。为此，你首先需要创建一个函数，其中包含用户点击特定按钮时要运行的代码。然后，你需要在用户点击按钮时调用这个函数。\n\
    \n要让按钮具备响应能力，你需要添加 `action:` 参数，如下所示：\n\n```\n.alert(isPresented: $showAlert)\
    \ {\nAlert(title: Text(\"Warning!\"),\nmessage: Text(\"Zombies on the loose\"\
    ),\nprimaryButton: .default(Text(\"Default\"), action: {\nmessage = \"Default\
    \ chosen\"\n}),\nsecondaryButton: .cancel(Text(\"Cancel\"), action: cancelFunction))\n\
    }\n}\n}\nfunc cancelFunction() {\nmessage = \"Cancel chosen\"\n}\n```\n\n使用 `action:`\
    \ 参数的第一种方法涉及花括号，你可以在其中输入任意多行代码。然而，代码写得越多，整个 `.alert` 或 `.actionSheet` 看起来就越杂乱。\n\
    \n使用 `action:` 参数的第二种方法是调用一个函数。这样，`action:` 的代码被隔离在一个独立的函数中，同时让 `.alert` 或 `.actionSheet`\
    \ 的代码更简短、更易读。\n\n无论你选择哪种方法，点击任意按钮都会从屏幕上关闭警告框或操作表。这就是为什么如果你完全省略了 `action:` 参数，点击该按钮也会关闭警告框或操作表。\n\
    \n要了解如何在警告框中让按钮具备响应能力，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"\
    AlertResponsiveButtons\"。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView:\
    \ View` 行下方添加以下 State 变量：\n\n```\n    @State var showAlert = false\n    @State\
    \ var message = \"\"\n```\n\n4.  在 `var body: some View` 中添加一个 `VStack`，并在 `VStack`\
    \ 中放置一个 `Text` 视图和一个 `Button`，如下所示：\n\n```\n    var body: some View {\n    VStack\
    \ {\n    Text(message)\n    .padding()\n    Button(\"Show Alert\") {\n    showAlert.toggle()\n\
    \    }\n    }\n    }\n}\n```\n\n5.  为 `Button` 添加一个 `.alert` 修饰符，如下所示：\n\n```\n\
    \    .alert(isPresented: $showAlert) {\n    Alert(title: Text(\"Warning!\"),\n\
    \    message: Text(\"Zombies on the loose\"),\n    primaryButton: .default(Text(\"\
    Default\"), action: {\n    message = \"Default chosen\"\n    }),\n    secondaryButton:\
    \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n```\n\n6.  在 `struct\
    \ ContentView: View` 的最后一个花括号上方添加以下函数，如下所示：\n\n```\n    func cancelFunction()\
    \ {\n    message = \"Cancel chosen\"\n    }\n```\n\n整个 `ContentView` 文件应如下所示：\n\
    \n```\n    import SwiftUI\n    struct ContentView: View {\n    @State var showAlert\
    \ = false\n    @State var message = \"\"\n    var body: some View {\n    VStack\
    \ {\n    Text(message)\n    .padding()\n    Button(\"Show Alert\") {\n    showAlert.toggle()\n\
    \    }\n    .alert(isPresented: $showAlert) {\n    Alert(title: Text(\"Warning!\"\
    ),\n    message: Text(\"Zombies on the loose\"),\n    primaryButton: .default(Text(\"\
    Default\"), action: {\n    message = \"Default chosen\"\n    }),\n    secondaryButton:\
    \ .cancel(Text(\"Cancel\"), action: cancelFunction))\n    }\n    }\n    }\n  \
    \  func cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n    }\n  \
    \  struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    ContentView()\n    }\n    }\n```\n\n7.  在画布窗格中点击“实时”图标，然后点击“Show\
    \ Alert”按钮。一个警告框会出现。\n8.  点击“Cancel”或“Default”按钮。请注意，会出现一条消息，告知你选择了哪个按钮。\n\n要了解如何在操作表中让按钮具备响应能力，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"ActionSheetResponsiveButtons\"。\n\
    2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下 State\
    \ 变量：\n\n```\n    @State var showAlert = false\n    @State var message = \"\"\n\
    ```\n\n4.  在 `var body: some View` 中添加一个 `VStack`，并在 `VStack` 中放置一个 `Text` 视图和一个\
    \ `Button`，如下所示：\n\n```\n    var body: some View {\n    VStack {\n    Text(message)\n\
    \    .padding()\n    Button(\"Show Action Sheet\") {\n    showAlert.toggle()\n\
    \    }\n    }\n    }\n}\n```\n\n5.  为 `Button` 添加一个 `.actionSheet` 修饰符，如下所示：\n\
    \n```\n    .actionSheet(isPresented: $showAlert) {\n    ActionSheet(title: Text(\"\
    Warning!\"),\n    message: Text(\"Zombies on the loose\"),\n    buttons: [\n \
    \   .default(Text(\"Default\"), action: {\n    message = \"Default chosen\"\n\
    \    }),\n    .cancel(Text(\"Cancel\"), action: cancelFunction),\n    .destructive(Text(\"\
    Destructive\"), action: {\n    message = \"Destructive chosen\"\n    })])\n  \
    \  }\n```\n\n6.  在 `struct ContentView: View` 的最后一个花括号上方添加以下函数，如下所示：\n\n```\n\
    \    func cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n```\n\n\
    整个 `ContentView` 文件应如下所示：\n\n```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State var showAlert = false\n    @State var message = \"\"\n  \
    \  var body: some View {\n    VStack {\n    Text(message)\n    .padding()\n  \
    \  Button(\"Show Action Sheet\") {\n    showAlert.toggle()\n    }\n    .actionSheet(isPresented:\
    \ $showAlert) {\n    ActionSheet(title: Text(\"Warning!\"),\n    message: Text(\"\
    Zombies on the loose\"),\n    buttons: [\n    .default(Text(\"Default\"), action:\
    \ {\n    message = \"Default chosen\"\n    }),\n    .cancel(Text(\"Cancel\"),\
    \ action: cancelFunction),\n    .destructive(Text(\"Destructive\"), action: {\n\
    \    message = \"Destructive chosen\"\n    })])\n    }\n    }\n    }\n    func\
    \ cancelFunction() {\n    message = \"Cancel chosen\"\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n```\n\n7.  在画布窗格中点击“实时”图标，然后点击“Show Action\
    \ Sheet”按钮。一个操作表会出现。\n8.  点击“Cancel”、“Default”或“Destructive”按钮。请注意，会出现一条消息，告知你选择了哪个按钮。\n"
- fmt: "# Displaying TextFields in an Alert\n\nAn `Alert` (but not an `ActionSheet`)\
    \ has the option of displaying one or more `TextField`s where the user can enter\
    \ data. Then the `Alert` can retrieve the data the user entered in the `TextField`s\
    \ to pass it to another part of the program.\n\nYou need to attach the `.alert`\
    \ modifier to a user interface item, but instead of creating an `Alert` dialog,\
    \ you define `TextField`s and `Button`s separately like this:\n\n```\n.alert(\"\
    Login\", isPresented: $showAlert, actions: {\n    TextField(\"Username\", text:\
    \ $username)\n    SecureField(\"Password\", text: $password)\n    Button(\"Login\"\
    , action: {\n        message = \"login\"\n    })\n}, message: {\n    Text(\"Please\
    \ enter your username and password.\")\n})\n```\n\nThe preceding code creates\
    \ a simple `Alert` that displays a text field and a button as shown in Figure\
    \ [12-4](#329781_7_En_12_Chapter.xhtml#Fig4).\n\n![](images/329781_7_En_12_Chapter/329781_7_En_12_Fig4_HTML.jpg)\n\
    \nA screenshot of a dialog box to input the login credentials. The text instructs\
    \ to enter the username and password. A text box is there to input the username.\n\
    \n**Figure 12-4** Displaying a text field in an Alert dialog\n\nTo see how to\
    \ make an `Alert` with text fields, follow these steps:\n\n![](images/329781_7_En_12_Chapter/329781_7_En_12_Fig5_HTML.jpg)\n\
    \nA screenshot of a dialog box exhibits the message to input the login credentials.\
    \ There are text boxes to enter the username and password along with the buttons\
    \ to log in and cancel.\n\n**Figure 12-5** An Alert dialog displaying a `TextField`\
    \ and a `SecureField`\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as \"AlertTextField\".\n\n2. Click the `ContentView` file\
    \ in the Navigator pane.\n\n3. Add the following `State` variables under the `struct\
    \ ContentView: View` line:\n\n    ```\n    @State var showAlert = false\n    @State\
    \ var username: String = \"\"\n    @State var password: String = \"\"\n    @State\
    \ var message = \"\"\n    ```\n\n4. Add a `VStack` in the `var body: some View`\
    \ and put three `Text` views and a `Button` inside the `VStack` like this:\n\n\
    \    ```\n    var body: some View {\n        VStack (spacing: 50) {\n        \
    \    Text(\"You clicked the \" + message + \" button!\")\n            Text(\"\
    Your user name is: \" + username)\n            Text(\"Your password is: \" + password)\n\
    \            Button(\"Show Alert\") {\n                showAlert = true\n    \
    \        }\n        }\n    ```\n\n5. Attach an `.alert` to the closing curly bracket\
    \ of the `Button` like this:\n\n    ```\n    .alert(\"Login\", isPresented: $showAlert,\
    \ actions: {\n        TextField(\"Username\", text: $username)\n        SecureField(\"\
    Password\", text: $password)\n        Button(\"Login\", action: {\n          \
    \  message = \"login\"\n        })\n        Button(\"Cancel\", role: .cancel,\
    \ action: {\n            message = \"cancel\"\n        })\n    }, message: {\n\
    \        Text(\"Please enter your username and password.\")\n    })\n    ```\n\
    \nThe entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\n\
    struct ContentView: View {\n    @State var showAlert = false\n    @State var username:\
    \ String = \"\"\n    @State var password: String = \"\"\n    @State var message\
    \ = \"\"\n    var body: some View {\n        VStack (spacing: 50) {\n        \
    \    Text(\"You clicked the \" + message + \" button!\")\n            Text(\"\
    Your user name is: \" + username)\n            Text(\"Your password is: \" + password)\n\
    \            Button(\"Show Alert\") {\n                showAlert = true\n    \
    \        }\n            .alert(\"Login\", isPresented: $showAlert, actions: {\n\
    \                TextField(\"Username\", text: $username)\n                SecureField(\"\
    Password\", text: $password)\n                Button(\"Login\", action: {\n  \
    \                  message = \"login\"\n                })\n                Button(\"\
    Cancel\", role: .cancel, action: {\n                    message = \"cancel\"\n\
    \                })\n            }, message: {\n                Text(\"Please\
    \ enter your username and password.\")\n            })\n        }\n    }\n}\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n6. Click the Live icon in the\
    \ Canvas pane.\n\n7. Click the Show Alert Button on the user interface. A Login\
    \ Alert appears as shown in Figure [12-5](#329781_7_En_12_Chapter.xhtml#Fig5).\n\
    \n8. Click in the Username `TextField` and type a name.\n\n9. Click in the Password\
    \ `SecureField` and type a password. Notice that the `SecureField` masks any characters\
    \ you type.\n\n10. Click the Login Button. The user interface identifies that\
    \ you clicked the Login button and typed in a username and password.\n\n## Using\
    \ Contextual Menus\n\nA `Contextual Menu` can hide multiple options from the user\
    \ interface. Then it appears only after detecting a long press gesture on a view\
    \ such as a `Text` view. When the `Contextual Menu` lists options, the user can\
    \ select one.\n\nA `Contextual Menu` defines a list of `Button`s where each `Button`\
    \ displays text and an action to perform if the user selects that `Button`. The\
    \ action can call a function or enclose Swift code within curly brackets like\
    \ this:\n\n```\n.contextMenu(menuItems: {\n    Button(\"Red\", action: {\n   \
    \     myColor = Color.red\n    })\n    Button(\"Purple\", action: purple)\n  \
    \  Button(\"Green\", action: green)\n    Button(\"Orange\", action: orange)\n\
    })\n```\n\nIn this example, the `Button` displaying \"Red\" as its title uses\
    \ curly brackets to define code to run. The other three `Button`s (\"Purple\"\
    , \"Green\", and \"Orange\") call functions. Notice that each function call simply\
    \ uses the function name and does not need a parameter list if it is empty.\n\n\
    To see how to make a `Contextual Menu`, follow these steps:\n\n1. Create a new\
    \ SwiftUI iOS App project and give it any name you wish such as \"ContextualMenu\"\
    .\n\n2. Click the `ContentView` file in the Navigator pane.\n\n3. Add the following\
    \ `State` variable under the `struct ContentView: View` line:\n\n    `@State var\
    \ myColor = Color.gray`\n\n4. Add a `VStack` in the `var body: some View` and\
    \ put a `Rectangle` and a `Text` view inside the `VStack` like this:\n\n    ```\n\
    \    var body: some View {\n        VStack {\n            Rectangle()\n      \
    \          .foregroundColor(myColor)\n            Text(\"Pick a color\")\n   \
    \             .padding()\n        }\n    }\n    ```\n\n    The preceding code\
    \ defines a `Rectangle` and colors it based on the `myColor` `State` variable,\
    \ which is initially set to `Color.gray`. Then it displays a `Text` view.\n\n\
    5. Add a `.contextualMenu` modifier to the `Text` view like this:\n\n    ```\n\
    \    .contextMenu(menuItems: {\n        Button(\"Red\", action: {\n          \
    \  myColor = Color.red\n        })\n        Button(\"Purple\", action: purple)\n\
    \        Button(\"Green\", action: green)\n        Button(\"Orange\", action:\
    \ orange)\n    })\n    ```\n\n6. Add the following functions above the last curly\
    \ bracket in the `struct ContentView: View` like this:\n\n    ```\n    func purple()\
    \ {\n        myColor = Color.purple\n    }\n    func green() {\n        myColor\
    \ = Color.green\n    }\n    func orange() {\n        myColor = Color.orange\n\
    \    }\n    ```\n\n    The entire `ContentView` file should look like this:\n\n\
    \    ```\n    import SwiftUI\n    struct ContentView: View {\n        @State var\
    \ myColor = Color.gray\n        var body: some View {\n            VStack {\n\
    \                Rectangle()\n                    .foregroundColor(myColor)\n\
    \                Text(\"Pick a color\")\n                    .padding()\n    \
    \                .contextMenu(menuItems: {\n                        Button(\"\
    Red\", action: {\n                            myColor = Color.red\n          \
    \              })\n                        Button(\"Purple\", action: purple)\n\
    \                        Button(\"Green\", action: green)\n                  \
    \      Button(\"Orange\", action: orange)\n                    })\n          \
    \  }\n        }\n        func purple() {\n            myColor = Color.purple\n\
    \        }\n        func green() {\n            myColor = Color.green\n      \
    \  }\n        func orange() {\n            myColor = Color.orange\n        }\n\
    \    }\n    struct ContentView_Previews: PreviewProvider {\n        static var\
    \ previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
    \n7. Click the Live icon in the Canvas pane.\n\n8. Move the mouse pointer over\
    \ the \"Pick a color\" `Text` view and hold down the left mouse button to mimic\
    \ a long press gesture. After a moment, the `Contextual Menu` appears.\n\n9. Click\
    \ any of the options displayed in the `Contextual Menu`. Notice that the `Rectangle`\
    \ changes color based on the option you chose."
