- fmt: '# Using the Label View


    Similar to the Text view is the Label view. While the Text view just displays
    a single string of text, the Label view can display both a string and an image
    side by side as shown in Figure [4-13](#329781_7_En_4_Chapter.xhtml#Fig13).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig13_HTML.jpg)


    A command of label and system image with an illustration of a hare and the text,
    label text.


    Figure 4-13


    The Label view can display an image and text at the same time


    The Label view can use any image from Apple’s free SF Symbols app (`https://developer.apple.com/sf-symbols/`)
    that displays all available system images as shown in Figure [4-14](#329781_7_En_4_Chapter.xhtml#Fig14).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig14_HTML.jpg)


    A screenshot of a window has the automotive option selected from the panel on
    the left. It has the automotive symbols of arrow shape dot left, arrow shape dot
    forward, snowflake dot circle dot fill, fan blades dot fill, key, and key dot
    fill, among others on the pane on the right.


    Figure 4-14


    The SF Symbols app displays icons you can include in an Xcode project


    If you want to display an SF Symbol icon in a Label view, you can use this code:


    ```

    Label("Text", systemImage: "SF Symbol image name here")

    ```


    The text can be any string or string variable, while the SF Symbol name must be
    completely enclosed within double quotation marks such as `"creditcard"` or `"banknote.fill"`.
    Make sure you type the SF Symbol icon name exactly as it appears in the SF Symbols
    app. You can also right-click any icon in the SF Symbols app and, when a popup
    menu appears, choose Copy Name as shown in Figure [4-15](#329781_7_En_4_Chapter.xhtml#Fig15).
    Then you can paste this name into the Label view.


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig15_HTML.jpg)


    A screenshot of the options menu with the option for copy name highlighted. It
    has 4 symbols in the background.


    Figure 4-15


    Right-clicking an icon lets you copy its name within the SF Symbols app


    If you want to use your own images, then you’ll need to drag and drop them into
    the Assets folder as shown in Figure [4-16](#329781_7_En_4_Chapter.xhtml#Fig16).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig16_HTML.jpg)


    A screenshot of a window has the assets option selected, redination icon option
    selected, and a downloads window with the redination icon dot j p g selected from
    left to right.


    Figure 4-16


    You can drag and drop images into the Assets folder of an Xcode project


    If you want to display an image stored in the Assets folder of your Xcode project,
    you can use this code:


    ```

    Label("Text", image: "image name here")

    ```


    The text can be any string or string variable, while the image name must exactly
    match the name of the image file in the Assets folder but without the file extension.


    **Note**


    You may want to resize an image before adding it to the Assets folder of your
    Xcode project. Otherwise, if an image is too large, the Label view will display
    the image at its original size, which may be far larger than you might want.


    The simplest way to define a Label view is to define either a `systemImage` (from
    the SF Symbols library) or a regular image stored in the Assets folder:


    ```

    Label("Text", systemImage: "SF Symbol image name here")

    Label("Text", image: "image name here from Assets folder here")

    ```


    However, if you want to customize the appearance of the text and/or image, you
    can create a Label view using this code instead:


    ```

    Label {

    Text("Alternate Label definition")

    } icon: {

    Image(systemName: "SF Symbol image name here")

    }

    ```


    or


    ```

    Label {

    Text("Alternate Label definition")

    } icon: {

    Image("image name here")

    }

    ```


    **Note**


    When using an SF Symbol icon, you must define the `systemName:` parameter within
    the Image view, but when using an image stored in the Assets folder, you just
    define the image name with no parameter at all within the Image view.


    When you define a Label view using a Text and an Image view, you can customize
    each individually such as choosing a font for the text and an opacity for the
    image like this:


    ```

    Label {

    Text("Modifiers")

    .font(.title)

    } icon: {

    Image("flag")

    .opacity(0.25)

    }

    ```


    The preceding label displays text using the `.title` font and displays a flag
    image with an opacity of `0.25` as shown in Figure [4-17](#329781_7_En_4_Chapter.xhtml#Fig17).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig17_HTML.jpg)


    A set of 2 commands of label, text, image, and opacity with symbols of flags and
    the texts, no modifiers and modifiers.


    Figure 4-17


    Modifying text and an image in a Label view


    When creating a Label view, you have three options as shown in Figure [4-18](#329781_7_En_4_Chapter.xhtml#Fig18):


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig18_HTML.jpg)


    A set of 3 commands of the label, text and icon, text only, icon only, system
    image, and label style with their respective text and icon of a hare, text only,
    and icon of a hare.


    Figure 4-18


    Three different ways the Label view can display information


    *   Text and icon (default)

    *   Text only

    *   Icon only


    ## Adding a Border Around a Text or Label View


    To highlight both a Text and a Label view, you can add a border around them. A
    border can consist of a color and a width such as


    ```

    .border(Color.red, width: 3)

    ```


    When you use the `.border` modifier with a Text or Label view, the border closely
    wraps around the text inside as shown in Figure [4-19](#329781_7_En_4_Chapter.xhtml#Fig19).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig19_HTML.jpg)


    A set of 2 commands of text, border, label, system image, and color with their
    respective border around a text view and a border around a label view with an
    icon of a folder.


    Figure 4-19


    Borders closely wrap around text inside a Text or Label view


    In case you don’t want a border to wrap so tightly around text, you can add padding
    around the Text or Label view first and then apply the `.border` modifier as shown
    in Figure [4-20](#329781_7_En_4_Chapter.xhtml#Fig20).


    ![](images/329781_7_En_4_Chapter/329781_7_En_4_Fig20_HTML.jpg)


    A set of 2 commands of text, border, label, padding, system image, and color has
    the respective spaces for a border around a text view and a border around a label
    view with an icon of a folder.


    Figure 4-20


    The padding modifier can add space for borders around a Text or Label view


    **Note**


    Make sure you apply the `.padding` modifier before the `.border` modifier. Otherwise,
    if the `.border` modifier appears first, SwiftUI will draw the border and then
    apply the padding around the Text or Label view.


    ## Summary


    Text views are handy for displaying any type of textual information on the user
    interface. Even if you need to display numbers, dates, or any other data types,
    you can use string interpolation to display data in a Text view. Similar to a
    Text view is the Label view.


    Where the Text view simply displays text, the Label view can display an image
    and text side by side. The Label view can display either icons listed in the SF
    Symbols app or any images you add to the Assets folder of your Xcode project.
    By applying different styles to a Label view, you can display text and icons,
    text only, or icon only. By using either the Text or Label view, your app can
    display information on the user interface for the user to view.'
  raw: '## Using the Label View


    Similar to the Text view is the Label view. While the Text view just displays
    a single string of text, the Label view can display both a string and an image
    side by side as shown in Figure [4-13](#329781_7_En_4_Chapter.xhtml#Fig13).


