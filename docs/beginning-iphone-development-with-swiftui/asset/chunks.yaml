    ### 从分段控件中运行代码


    仅通过选择分段控件上的选项，分段控件只能更改一个 `State` 变量。如果你想根据用户在分段控件上选择的选项来运行代码，需要添加一个 `.onChange`
    修饰符，如下所示：


    ```

    .onChange(of: stateVariable) { newValue in

    // code to run

    }

    ```


    每当用户在分段控件上选择不同的选项时，它就会更改一个 `State` 变量。`.onChange` 修饰符会在 `State` 变量每次发生变化时运行代码。`newValue`
    变量包含了这个最新的变化，然后可以据此运行代码。要了解其工作原理，请遵循以下步骤：


    1.  新建一个 SwiftUI iOS 应用项目，并命名为任意你喜欢的名称，例如“SegmentedControl Code”。

    2.  在导航窗格中单击 `ContentView` 文件。

    3.  在 `struct ContentView: View` 这行下方添加一个 `State` 变量，如下所示：


    ```

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    ```


    这会创建一个名为 `message` 的 `State` 变量。注意，`private` 关键字是可选的，它仅表示此变量只能在 `ContentView`
    结构体内部使用。其初始值是一个空字符串，因此它的数据类型被推断为 `String`。


    4.  在 `var body: some View` 内部创建一个间距值为 28 的 `VStack`，如下所示：


    ```

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    VStack (spacing: 28) {

    }

    }

    }

    ```


    间距值可以是任何你想要的数字，但它在添加到 `VStack` 内部的任何视图之间增加间距，以免它们在用户界面上显得拥挤。


    5.  在 `VStack` 内输入以下内容来创建一个 `Text` 视图：


    ```

    Text(message)

    ```


    这会创建一个 `Text` 视图，用于显示 `message` 状态变量的内容。


    ![](img/329781_7_En_6_Fig7_HTML.jpg)


    屏幕显示了一个 Swift UI 代码片段，其中使用了一个带有分段样式的 `Picker` 来选择如“开心”、“悲伤”和“无聊”等选项。右侧是移动屏幕，显示文字“寻找你的目标”以及“开心”、“悲伤”和“无聊”三个选项。


    **图 6-7** `.onChange` 修饰符可以在 `Text` 视图中显示不同的文本


    1.  在 `VStack` 内输入以下内容来创建一个分段控件：


    ```

    Picker("", selection: $message) {

    Text("Happy").tag("happy")

    Text("Sad").tag("sad")

    Text("Bored").tag("bored")

    }.pickerStyle(.segmented)

    ```


    这会创建一个 `Picker` 视图，列出在分段控件上显示的三个选项（“Happy”、“Sad”和“Bored”）。每个选项后面都有一个 `.tag` 与该选项关联。虽然在用户界面上显示的是三个
    `Text` 视图（“Happy”、“Sad”和“Bored”）提供的选项，但 `message` 状态变量实际上存储的是 `.tag` 的值，即字符串（“happy”、“sad”、“bored”）。`.pickerStyle`
    修饰符通过指定 `.segmented` 将 `Picker` 视图显示为分段控件。


    2.  在 `.pickerStyle` 修饰符之后输入以下内容：


    ```

    .onChange(of: message) { newValue in

    switch newValue {

    case "happy": message = "Be happy and joyous"

    case "sad": message = "Life can be a struggle at times"

    case "bored": message = "Look for your purpose"

    default:

    break

    }

    }

    ```


    当 `.onChange` 修饰符检测到 `message` 状态变量发生变化时（即用户在分段控件上选择了不同选项时），便会运行代码。当用户选择了不同选项时，`newValue`
    变量会存储该选中的选项（例如 `.tag("happy")`）。


    根据 `newValue` 的值，`switch` 语句决定将哪个文本存储到 `message` 状态变量中。一旦 `message` 状态变量获得新值，它就会显示在
    `Text` 视图中。


    完整的 SwiftUI 代码应如下所示：


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    VStack (spacing: 28) {

    Text(message)

    Picker("", selection: $message) {

    Text("Happy").tag("happy")

    Text("Sad").tag("sad")

    Text("Bored").tag("bored")

    }.pickerStyle(.segmented)

    .onChange(of: message) { newValue in

    switch newValue {

    case "happy": message = "Be happy and joyous"

    case "sad": message = "Life can be a struggle at times"

    case "bored": message = "Look for your purpose"

    default:

    break

    }

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    3.  单击画布面板中的“Live”图标。

    4.  单击分段控件上的“Happy”、“Sad”和“Bored”选项。每次你在分段控件上选择不同的选项时，`message` 状态变量都会发生变化。然后
    `.onChange` 修饰符运行代码来更改 `message` 状态变量。这个新文本随后会出现在 `Text` 视图中，如图 6-7 所示。


    通过将 `.onChange` 修饰符与分段控件结合使用，你可以在用户选择分段控件上的不同选项时运行任何你想要的 Swift 代码。前面的示例使用了多个 `Text`
    视图和 `.tag` 属性来填充 `Picker` 视图。以下是使用数组和 `ForEach` 循环代替的相同项目代码：


    ```

    import SwiftUI

    struct ContentView: View {

    @State var selectedItem = ""

    @State var message = ""

    let moodArray = ["Happy", "Sad", "Bored"]

    var body: some View {

    VStack {

    Text(message)

    Picker("", selection: $selectedItem) {

    ForEach(moodArray, id: \.self) {

    Text($0)

    }

    }.pickerStyle(.segmented)

    .onChange(of: selectedItem) { newValue in

    switch newValue {

    case "Happy": message = "Be happy and joyous"

    case "Sad": message = "Life can be a struggle at times"

    case "Bored": message = "Look for your purpose"

    default:

    break

    }

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## 总结


    按钮是让用户向程序发出命令的最简单方式。在最简单的层面上，一个按钮由文本和一段代码列表组成，每次用户点击该按钮时都会运行这段代码。要自定义按钮，你可以使用带有修饰符的
    `Text` 视图或 `Label` 视图，或者使用可以显示图标或数码照片等图像的 `Image` 视图。


    分段控件就像两个或更多按钮被挤在单个控件中。通过使用分段控件，你可以在比使用多个按钮小得多的空间内向用户显示多个选项。


    在使用按钮和分段控件时，你通常需要创建一个 `State` 变量。当程序的任何部分更改了 `State` 变量的值时，更新后的数据会自动出现在整个程序中。


    虽然按钮可以在用户每次点击时运行一行或多行 Swift 代码，但分段控件只有与 `.onChange` 修饰符结合使用时才能运行代码。按钮和分段控件都允许你在用户界面上显示不同的选项供用户选择。

