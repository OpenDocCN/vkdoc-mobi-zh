  trans: "\n6.  在`VStack`内部键入以下代码，创建一个分段控件：\n\n```\nPicker(\"Favorite Color\", selection:\
    \ $selectedColor) {\n    Text(\"Red\").tag(Color.red)\n    Text(\"Green\").tag(Color.green)\n\
    \    Text(\"Blue\").tag(Color.blue)\n}.pickerStyle(.segmented)\n```\n\n这段代码创建了一个`Picker`视图，在分段控件上列出了三个选项（\"\
    Red\"、\"Green\"和\"Blue\"）。每个选项后面都有一个与之关联的`.tag`。虽然用户看到的是三个`Text`视图显示的选项（\"Red\"\
    、\"Green\"和\"Blue\"），但`selectedColor`状态变量实际存储的是`.tag`值，即`Colors`（`.red`、`.green`和`.blue`）。`.pickerStyle`修饰符通过定义`.segmented`（而不是`.wheel`或`.menu`），将`Picker`视图显示为分段控件。\n\
    \n完整的 SwiftUI 代码应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n  \
    \  @State private var selectedColor = Color.gray\n    var body: some View {\n\
    \        VStack (spacing: 28) {\n            Rectangle()\n                .fill(selectedColor)\n\
    \            Picker(\"Favorite Color\", selection: $selectedColor) {\n       \
    \         Text(\"Red\").tag(Color.red)\n                Text(\"Green\").tag(Color.green)\n\
    \                Text(\"Blue\").tag(Color.blue)\n            }.pickerStyle(.segmented)\n\
    \        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n7.  点击画布面板中的“Live”图标。\n\
    \n8.  点击分段控件上的“Red”、“Green”和“Blue”选项。每次从分段控件中选择不同的选项时，`selectedColor`状态变量都会发生变化。随后，该状态变量会自动更改矩形的颜色，如图\
    \ 6-5 所示。\n\n**注意**  \n如果省略了`.pickerStyle(.segmented)`修饰符，`Picker`视图会以菜单形式显示三个选项（\"\
    Red\"、\"Green\"和\"Blue\"），如图 6-6 所示。\n\n![](img/329781_7_En_6_Fig6_HTML.jpg) \
    \ \n屏幕显示红色、绿色和蓝色。其中蓝色选项被选中。  \n**图 6-6** 未使用`.pickerStyle`修饰符时的`Picker`视图外观会显示为菜单\n\
    \n通过键入多个`Text`视图来填充分段控件是可行的，但重复的代码往往意味着代码可以简化。对于`Picker`视图，你可以使用数组和`ForEach`循环来替代多个`Text`视图，示例如下：\n\
    \n```\nPicker(\"\", selection: $selectedItem) {\n    ForEach(animalArray, id:\
    \ \\.self) {\n        Text($0)\n    }\n}.pickerStyle(.segmented)\n```\n\n这个`ForEach`循环指定了一个包含分段控件选项的数组（例如名为`animalArray`的数组），并使用`id`属性标识每个数组项，以便在单个`Text`视图中显示。该`Text`视图使用`$0`简写参数名来表示每个数组项。\n\
    \n除了减少定义分段控件选项时使用多个`Text`视图的需求外，`ForEach`循环还免去了为每个选项单独添加`.tag`属性的步骤。取而代之的是，数组项本身既代表分段控件上显示的选项，也代表用户所选的选择。\n\
    \n要了解如何使用`ForEach`循环填充`Picker`视图的分段控件，请按以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“SegmentedControlForEach”。\n\
    \n2.  在导航器面板中点击`ContentView`文件。\n\n3.  在`struct ContentView: View`行下方添加一个状态变量，如下所示：\n\
    \n```\n@State var selectedItem = \"\"\n```\n\n这将创建一个名为`selectedItem`的状态变量。`selectedItem`变量的初始值为空字符串，这意味着其推断的数据类型为`String`。\n\
    \n4.  在`var body: some View`内部创建一个`VStack`，如下所示：\n\n```\nstruct ContentView: View\
    \ {\n    @State var selectedItem = \"\"\n    let animalArray = [\"Fish\", \"Tortoise\"\
    , \"Hare\", \"Bird\"]\n    var body: some View {\n        VStack {\n        }\n\
    \    }\n}\n```\n\n5.  在`VStack`内部键入以下代码，创建一个`Picker`视图和一个`Text`视图：\n\n```\nVStack\
    \ {\n    Picker(\"\", selection: $selectedItem) {\n        ForEach(animalArray,\
    \ id: \\.self) {\n            Text($0)\n        }\n    }.pickerStyle(.segmented)\n\
    \    Text(selectedItem)\n}\n```\n\n这段代码使用`ForEach`循环来填充由`Picker`视图创建的分段控件。`Text`视图显示用户所选的内容。\n\
    \n完整的 SwiftUI 代码应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n  \
    \  @State var selectedItem = \"\"\n    let animalArray = [\"Fish\", \"Tortoise\"\
    , \"Hare\", \"Bird\"]\n    var body: some View {\n        VStack {\n         \
    \   Picker(\"\", selection: $selectedItem) {\n                ForEach(animalArray,\
    \ id: \\.self) {\n                    Text($0)\n                }\n          \
    \  }.pickerStyle(.segmented)\n            Text(selectedItem)\n        }\n    }\n\
    }\nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\n6.  点击画布面板中的“Live”图标。\n\n7.\
    \  点击分段控件上的“Fish”、“Tortoise”、“Hare”和“Bird”选项。每次从分段控件中选择不同的选项时，`selectedItem`状态变量都会发生变化。随后，该状态变量会自动更改`Text`视图中显示的内容。\n"
- fmt: '### Running Code from a Segmented Control


    By just selecting options on a segmented control, the segmented control can only
    change a `State` variable. If you want to run code based on which option the user
    selected on a segmented control, you need to add an `.onChange` modifier as follows:


    ```

    .onChange(of: stateVariable) { newValue in

    // code to run

    }

    ```


    Each time the user selects a different option on a segmented control, it changes
    a `State` variable. The `.onChange` modifier runs code each time this `State`
    variable changes. The `newValue` variable contains this latest change and can
    then run code. To see how this works, follow these steps:


    1.  Create a new SwiftUI iOS App project and give it any name you wish such as
    “SegmentedControl Code.”

    2.  Click the `ContentView` file in the Navigator pane.

    3.  Add a `State` variable underneath the `struct ContentView: View` line like
    this:


    ```

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    ```


    This creates a `State` variable called `message`. Notice that the `private` keyword
    is optional, which simply means this variable can only be used within this `ContentView`
    structure. Its initial value is an empty string, so its data type is inferred
    to be `String`.


    4.  Create a `VStack` with a spacing value of 28 inside the `var body: some View`
    like this:


    ```

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    VStack (spacing: 28) {

    }

    }

    }

    ```


    The spacing value can be any number you wish, but it adds spacing between any
    views you add inside the `VStack` so they don’t appear crowded together on the
    user interface.


    5.  Type the following to create a `Text` view inside the `VStack`:


    ```

    Text(message)

    ```


    This creates a `Text` view that displays the contents of the `message` State variable.


    ![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig7_HTML.jpg)


    A screen displays a Swift U I code snippet where a Picker is used with a segmented
    style to select options like Happy, Sad, and Bored. On the right is the mobile
    screen with the text Look for your purpose and 3 options happy, sad, and bored.


    **Figure 6-7** The `.onChange` modifier can display different texts in the `Text`
    view


    1.  Type the following to create a segmented control inside the `VStack`:


    ```

    Picker("", selection: $message) {

    Text("Happy").tag("happy")

    Text("Sad").tag("sad")

    Text("Bored").tag("bored")

    }.pickerStyle(.segmented)

    ```


    This creates a `Picker` view that lists three options (“Happy”, “Sad”, and “Bored”)
    displayed on the segmented control. After each option is a `.tag` that’s linked
    to each option. While the user sees the options displayed by the three `Text`
    views (“Happy”, “Sad”, and “Bored”), the `message` State variable is actually
    storing the `.tag` values, which are strings (“happy”, “sad”, “bored”). The `.pickerStyle`
    modifier displays the `Picker` view as a segmented control by defining `.segmented`.


    2.  Type the following after the `.pickerStyle` modifier:


    ```

    .onChange(of: message) { newValue in

    switch newValue {

    case "happy": message = "Be happy and joyous"

    case "sad": message = "Life can be a struggle at times"

    case "bored": message = "Look for your purpose"

    default:

    break

    }

    }

    ```


    The `.onChange` modifier runs code as soon as it detects a change in the `message`
    State variable, which occurs when the user selects a different option on the segmented
    control. When the user selected a different option, the `newValue` variable stores
    that selected option (such as `.tag("happy")`).


    Based on the value of `newValue`, a `switch` statement determines which text to
    store in the `message` State variable. As soon as the `message` State variable
    gets a new value, it gets displayed in the `Text` view.


    The entire SwiftUI code should look like this:


    ```

    import SwiftUI

    struct ContentView: View {

    @State private var message = ""

    var body: some View {

    VStack (spacing: 28) {

    Text(message)

    Picker("", selection: $message) {

    Text("Happy").tag("happy")

    Text("Sad").tag("sad")

    Text("Bored").tag("bored")

    }.pickerStyle(.segmented)

    .onChange(of: message) { newValue in

    switch newValue {

    case "happy": message = "Be happy and joyous"

    case "sad": message = "Life can be a struggle at times"

    case "bored": message = "Look for your purpose"

    default:

    break

    }

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    3.  Click the Live icon in the Canvas pane.

    4.  Click the “Happy,” “Sad,” and “Bored” options on the segmented control. Each
    time you choose a different option from the segmented control, the `message` State
    variable changes. Then the `.onChange` modifier runs code to change the `message`
    State variable. This new text then appears in the `Text` view as shown in Figure
    [6-7](#329781_7_En_6_Chapter.xhtml#Fig7).


    By using the `.onChange` modifier with a segmented control, you can run any Swift
    code you want when the user chooses a different option on the segmented control.
    The preceding example uses multiple `Text` views and `.tag` properties to populate
    a `Picker` view. Here’s the code that duplicates that project except using an
    array and a `ForEach` loop instead:


    ```

    import SwiftUI

    struct ContentView: View {

    @State var selectedItem = ""

    @State var message = ""

    let moodArray = ["Happy", "Sad", "Bored"]

    var body: some View {

    VStack {

    Text(message)

    Picker("", selection: $selectedItem) {

    ForEach(moodArray, id: \.self) {

    Text($0)

    }

    }.pickerStyle(.segmented)

    .onChange(of: selectedItem) { newValue in

    switch newValue {

    case "Happy": message = "Be happy and joyous"

    case "Sad": message = "Life can be a struggle at times"

    case "Bored": message = "Look for your purpose"

    default:

    break

    }

    }

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    ## Summary


    Buttons represent the simplest way to let the user give commands to a program.
    At the simplest level, a button consists of text and a list of code to run each
    time the user selects that button. To customize a button, you can use a `Text`
    view or `Label` view with modifiers or an `Image` view that can display images
    such as icons or digital photographs.


    A segmented control acts like two or more buttons crammed together in a single
    control. By using a segmented control, you can display multiple options to the
    user in a much smaller space than by using multiple buttons.


    When working with buttons and segmented controls, you’ll often have to create
    a `State` variable. When any part of your program changes the value of a `State`
    variable, that updated data automatically appears throughout your entire program.


    While buttons can run one or more lines of Swift code each time the user selects
    the button, segmented controls can only run code when combined with the `.onChange`
    modifier. Both buttons and segmented controls let you display different options
    for the user to select on a user interface.'
