    \ 修饰符，你可以定义想要动画化的视图。`.animation` 修饰符的一个问题是，如果你有五个想要以相同方式动画化的视图，你必须将相同的 `.animation`\
    \ 修饰符添加到所有五个视图中，如下所示：\n\n```swift\nHStack {\nText(\"One\")\n.offset(x: 0, y: start\
    \ ? 450 : 0)\n.animation(.default, value: start)\nText(\"Two\")\n.offset(x: 0,\
    \ y: start ? 450 : 0)\n.animation(.default, value: start)\nText(\"Three\")\n.offset(x:\
    \ 0, y: start ? 450 : 0)\n.animation(.default, value: start)\nText(\"Four\")\n\
    .offset(x: 0, y: start ? 450 : 0)\n.animation(.default, value: start)\nText(\"\
    Five\")\n.offset(x: 0, y: start ? 450 : 0)\n.animation(.default, value: start)\n\
    }\n```\n\n为了解决这个问题，SwiftUI 提供了第二种动画视图的方法。`withAnimation` 允许你指定一个可以动画视图的 `State`\
    \ 变量。你无需在单独的视图中编写多个 `.animation` 修饰符，只需定义要影响的 `State` 变量，当该 `State` 变量改变时，它会自动动画化任何使用该\
    \ `State` 变量的视图，如下所示：\n\n```swift\nwithAnimation {\nstart.toggle()\n}\n```\n\n\
    要了解 `withAnimation` 的工作原理，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如“WithAnimation”。\n\
    \n2.  在导航面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 行下方添加一个 `State`\
    \ 变量，如下所示：\n\n4.  在 `var body: some View` 行下方添加一个 `VStack` 和一个 `Button`，如下所示：\n\
    \n```swift\n    var body: some View {\n    VStack {\n    Button(\"Start animation\"\
    ) {\n    start.toggle()\n    }\n    ```\n\n5.  在 `Button` 下方添加一个包含五个 `Text` 视图的\
    \ `HStack`，如下所示：\n\n```swift\n    HStack {\n    Text(\"One\")\n    .offset(x:\
    \ 0, y: start ? 450 : 0)\n    .animation(.default, value: start)\n    Text(\"\
    Two\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default, value:\
    \ start)\n    Text(\"Three\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
    \ value: start)\n    Text(\"Four\")\n    .offset(x: 0, y: start ? 450 : 0)\n \
    \   .animation(.default, value: start)\n    Text(\"Five\")\n    .offset(x: 0,\
    \ y: start ? 450 : 0)\n    .animation(.default, value: start)\n    }.position(x:\
    \ 150, y: 10)\n    ```\n\n注意每个 `Text` 视图都具有相同的 `.animation` 修饰符。整个 `ContentView`\
    \ 文件应如下所示：\n\n```swift\n    import SwiftUI\n    struct ContentView: View {\n \
    \   @State private var start = false\n    var body: some View {\n    VStack {\n\
    \    Button(\"Start animation\") {\n    start.toggle()\n    }\n    HStack {\n\
    \    Text(\"One\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
    \ value: start)\n    Text(\"Two\")\n    .offset(x: 0, y: start ? 450 : 0)\n  \
    \  .animation(.default, value: start)\n    Text(\"Three\")\n    .offset(x: 0,\
    \ y: start ? 450 : 0)\n    .animation(.default, value: start)\n    Text(\"Four\"\
    )\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default, value: start)\n\
    \    Text(\"Five\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.default,\
    \ value: start)\n    }.position(x: 150, y: 10)\n    }\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n    ```\n\n6.  在画布面板中点击“Live”图标。\n\n7. \
    \ 点击“Button”使所有五个 `Text` 视图以相同方式动画化。\n\n8.  注释掉（或删除）每个 `Text` 视图上的所有 `.animation`\
    \ 修饰符。\n\n9.  编辑 `ContentView` 文件中的 `Button` 代码，使其包含 `withAnimation` 块，如下所示：\n\
    \n```swift\n    Button(\"Start animation\") {\n    withAnimation {\n    start.toggle()\n\
    \    }\n    }\n    ```\n\n整个 `ContentView` 文件应如下所示：\n\n```swift\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State private var start = false\n    var\
    \ body: some View {\n    VStack {\n    Button(\"Start animation\") {\n    withAnimation\
    \ {\n    start.toggle()\n    }\n    }\n    HStack {\n    Text(\"One\")\n    .offset(x:\
    \ 0, y: start ? 450 : 0)\n    //                    .animation(.default, value:\
    \ start)\n    Text(\"Two\")\n    .offset(x: 0, y: start ? 450 : 0)\n    //   \
    \                 .animation(.default, value: start)\n    Text(\"Three\")\n  \
    \  .offset(x: 0, y: start ? 450 : 0)\n    //                    .animation(.default,\
    \ value: start)\n    Text(\"Four\")\n    .offset(x: 0, y: start ? 450 : 0)\n \
    \   //                    .animation(.default, value: start)\n    Text(\"Five\"\
    )\n    .offset(x: 0, y: start ? 450 : 0)\n    //                    .animation(.default,\
    \ value: start)\n    }.position(x: 150, y: 10)\n    }\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n    ```\n\n10. 点击“Button”，注意所有五个 `Text`\
    \ 视图的动画效果与之前每个 `Text` 视图拥有自己的 `.animation` 修饰符时完全相同。\n\n如果你想要添加延迟和持续时间，可以使用如下代码：\n\
    \n```swift\n    withAnimation(.easeOut(duration: 2.1).delay(1.2)) {\n    }\n \
    \   ```\n\n你也可以使用 `.interpolatingSpring` 来定义 `stiffness` 和 `damping`，如下所示：\n\n\
    ```swift\n    withAnimation(.interpolatingSpring(stiffness: 2.4, damping: 1.6))\
    \ {\n    }\n    ```\n\n要包含 `mass` 和 `initialVelocity` 参数，你可以使用如下代码：\n\n```swift\n\
    \    withAnimation(.interpolatingSpring(mass: 25, stiffness: 1.5, damping: 2.3,\
    \ initialVelocity: 1.7)) {\n    }\n    ```\n\n```swift\n@State private var start\
    \ = false\n```\n\n任何你可以用 `.animation` 修饰符做到的事情，你也可以用 `withAnimation` 块做到。你可以在同一代码中使用其中一种方法代替另一种方法，或者同时使用两种方法。\n"
- fmt: "# Summary\n\nAnimation can make your user interface come to life by providing\
    \ visual feedback to the user or simply offering fun visual images that engage\
    \ the user. As a general rule, use animation sparingly because too many visual\
    \ changes happening at once can be confusing and distracting. The best animation\
    \ highlights an action but doesn’t overwhelm the user in the process.\n\nAnimation\
    \ involves defining a starting and an ending state whether you’re moving, resizing,\
    \ or rotating a view. Then you need some kind of trigger to define a new state.\
    \ Finally, you need to use the `.animation` modifier. If you’re going to animate\
    \ multiple views using the exact same `.animation` modifier, you could reduce\
    \ duplication of code by using `withAnimation` instead.\n\nTo customize animation,\
    \ you can define delay and duration values to slow down the amount of time before\
    \ the animation begins and set how long it takes to complete. For greater customization,\
    \ use the `.interpolatingSpring` modifier and define `mass`, `stiffness`, `damping`,\
    \ and `initialVelocity`. By using animation, you can make your user interface\
    \ fun and more interesting to use.\n\n# 21. Using `GeometryReader`\n\nUser interfaces\
    \ for iOS devices must adapt to different screen sizes. Not only are there different-size\
    \ screens for the iPhone and iPad, but there are also different screen sizes among\
    \ different iPhone and iPad models on the market. To solve this problem, SwiftUI\
    \ centers user interface items, but what if you need to precisely place user interface\
    \ items in specific locations?\n\nSpecific X and Y coordinates won’t work because\
    \ what might look good on a large screen won’t look right on a much smaller screen\
    \ and vice versa. When you need to the place user interface items in specific\
    \ locations on the screen, a safer approach is to use the `GeometryReader`.\n\n\
    The `GeometryReader` acts like a container that automatically adapts to different\
    \ screen sizes. After adding a `GeometryReader`, you can then place user interface\
    \ items using the `GeometryReader`’s relative coordinates instead of the exact\
    \ coordinates of different-size screens. That way when an app runs on different-size\
    \ screens, the `GeometryReader` adapts its relative coordinates as well.\n\n##\
    \ Understanding the `GeometryReader`\n\nThe `GeometryReader` can hold multiple\
    \ views like a stack. The key difference is that the `GeometryReader` expands\
    \ to take up as much space as possible. In addition, the `GeometryReader` can\
    \ retrieve its width and height. The code to define a `GeometryReader` looks like\
    \ this:\n\n```\nGeometryReader { geometry in\n// Views defined here\n}\n```\n\n\
    The `GeometryReader` uses an arbitrarily named variable such as `geometry` in\
    \ the preceding example, although this variable can be named anything. Then to\
    \ retrieve the width and height of the `GeometryReader`, you can retrieve the\
    \ `size.width` and `size.height` properties like this:\n\n```\ngeometry.size.width\n\
    geometry.size.height\n```\n\nTo see how a `GeometryReader` works, follow these\
    \ steps:\n\n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig1_HTML.jpg)\n\n\
    A mobile screen displays `width=374.000000` and `height=647.000000`.\n\nFigure\
    \ 21-1\n\nThe `GeometryReader` defines its width and height within an iPhone SE\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “BasicGeometryReader.”\n\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n\n3.  Add a `GeometryReader` inside `var body: some View` like this:\n\
    \n    ```\n    var body: some View {\n    GeometryReader { geometry in\n    }.background(Color.yellow)\n\
    \    }\n    ```\n\n    The `.background` modifier colors the `GeometryReader`\
    \ to make it easy to see its boundaries.\n\n4.  Add a `VStack` inside the `GeometryReader`.\n\
    \n5.  Add two `Text` views inside the `VStack` like this:\n\n    ```\n    var\
    \ body: some View {\n    GeometryReader { geometry in\n    VStack {\n    Text(\"\
    Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
    )\n    }\n    }.background(Color.yellow)\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    var body: some View {\n    GeometryReader { geometry in\n    VStack\
    \ {\n    Text(\"Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
    )\n    }\n    }.background(Color.yellow)\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n    Notice that the `geometry.size.width` and `geometry.size.height`\
    \ properties define the height and width of the `GeometryReader` within the current\
    \ iOS device such as an iPhone SE as shown in Figure [21-1](#329781_7_En_21_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig2_HTML.jpg)\n\nA snippet\
    \ of the screen displays modifier options. It includes preview, color scheme,\
    \ accessibility, and dynamic type. The preview includes the name, device, layout,\
    \ and orientation. The dropdown options list multiple options where the inherited\
    \ option highlight in a dark shade.\n\nFigure 21-2\n\nThe Device popup menu in\
    \ the Inspector pane\n\n1.  Click `ContentView()` inside the `struct ContentView_Previews:\
    \ PreviewProvider`. The Inspector pane appears on the right side of the Xcode\
    \ window.\n\n2.  Click the Device popup menu and choose a different-size screen\
    \ such as a larger or smaller iPhone or iPad as shown in Figure [21-2](#329781_7_En_21_Chapter.xhtml#Fig2).\n\
    \n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig3_HTML.jpg)\n\nA tablet\
    \ screen displays `width=744.000000` and `height=1089.000000`.\n\nFigure 21-3\n\
    \nDisplaying the width and height of the `GeometryReader` in a different-size\
    \ iOS screen\n\n1.  Choose a different-size iPhone or iPad. Notice that the `GeometryReader`\
    \ expands or shrinks to fit within the boundaries of the new iOS screen size and\
    \ displays a different width and height as shown in Figure [21-3](#329781_7_En_21_Chapter.xhtml#Fig3).\n\
    \nTry experimenting with different iOS devices such as a small-screen iPhone or\
    \ a large-screen iPad. No matter which size iOS device screen you choose, the\
    \ `GeometryReader` can expand or shrink and return its width and height."
