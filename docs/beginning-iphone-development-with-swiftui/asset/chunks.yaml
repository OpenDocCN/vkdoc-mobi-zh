    \  \nThe registered company address is: 1 New York Plaza, New York, NY 10004,\
    \ U.S.A.\n\nAbout the Author  \nAbout the Technical Reviewer\n\n# 1. Understanding\
    \ iOS Programming\n\nProgramming involves writing commands for a computer to follow.\
    \ In iOS programming, the computer is either an iPhone or an iPad. To create apps\
    \ for an iPhone or iPad, you need to learn three different skills:\n\n- How to\
    \ write commands in the Swift programming language\n- How to use Apple’s software\
    \ frameworks\n- How to create user interfaces in Xcode\n\nYou need to write commands\
    \ in the Swift programming language to make your app do something unique. Then\
    \ you rely on Apple’s software frameworks to handle common tasks such as detecting\
    \ touch gestures or accessing the camera. Finally, you design your app’s user\
    \ interface.\n\nApple’s software frameworks let you perform common tasks without\
    \ writing (and testing) your own Swift code. By relying on Apple’s proven and\
    \ tested software frameworks, you can focus solely on the unique features of your\
    \ app rather than the mundane details of making an app access different hardware\
    \ features of an iPhone or iPad.\n\nIdeally, you want your user interface to look\
    \ good by adapting to all different screen sizes such as an iPhone or iPad. The\
    \ user interface lets you display information to the user and retrieve information\
    \ from the user. The best user interface is one that doesn’t require even thinking\
    \ about.\n\nEssentially, every iOS app consists of three parts as shown in Figure\
    \ 1-1:\n\n![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig1_HTML.png)\n\n**Figure\
    \ 1-1** The three parts of an iOS app\n\n- Your code to make an app do something\
    \ useful\n- A user interface that you can design visually in Xcode\n- Access to\
    \ hardware features of an iOS device through one or more of Apple’s iOS frameworks\n\
    \nApple provides dozens of frameworks for iOS (and their other operating systems\
    \ as well such as macOS, watchOS, and tvOS). By simply using Apple’s frameworks,\
    \ you can accomplish common tasks by writing little code of your own. Some of\
    \ Apple’s available frameworks include:\n\n- `SwiftUI` – User interface and touch\
    \ screen support\n- `ARKit` – Augmented reality features\n- `Core Animation` –\
    \ Displays animation\n- `GameKit` – Creates multiplayer interactive apps\n- `Contacts`\
    \ – Accesses the Contacts data on an iOS device\n- `SiriKit` – Allows the use\
    \ of voice commands through Siri\n- `AVKit` – Allows playing of audio and video\
    \ files\n- `Media Library` – Allows access to images, audio, and video stored\
    \ on an iOS device\n- `CallKit` – Provides voice calling features\n\nApple’s frameworks\
    \ essentially contain code that you can reuse. This makes apps more reliable and\
    \ consistent while also saving developers’ time by using proven code that works\
    \ correctly. To see a complete list of Apple’s available software frameworks,\
    \ visit the Apple Developer Documentation site ([`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)).\n\
    \nApple’s frameworks can give you a huge head start in creating an iOS app, but\
    \ you still need to provide a user interface so users can interact with your app.\
    \ While you could create a user interface from scratch, this would also be tedious,\
    \ time-consuming, and error-prone. Even worse, if every app developer created\
    \ a user interface from scratch, no two iOS apps would look or work exactly the\
    \ same, confusing users.\n\nThat’s why Apple’s Xcode compiler helps you design\
    \ user interfaces with standard features used in most apps such as buttons, labels,\
    \ text fields, and sliders. In Xcode, each window of a user interface is called\
    \ a view. While simple iOS apps may consist of a single view (think of the Calculator\
    \ app on an iPhone), more sophisticated iOS apps consist of multiple views.\n\n\
    To create user interfaces, Xcode offers two options:\n\n- Storyboards\n- `SwiftUI`\n\
    \nStoryboards let you design user interfaces visually by placing user interface\
    \ objects at specific locations on the screen as shown in Figure 1-2. Unfortunately,\
    \ using fixed values to define the position of various objects on a user interface\
    \ means that storyboard user interfaces do not adapt easily to different-size\
    \ iOS device screens or orientations (portrait or landscape).\n\n![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig2_HTML.jpg)\n\
    \n**Figure 1-2** Storyboards use fixed values to define the arrangement of objects\
    \ on a user interface\n\nSince fixed values for arranging objects on a user interface\
    \ won’t adapt to different screen sizes, Apple offers a second way to design user\
    \ interfaces using a framework called `SwiftUI`. The main idea behind `SwiftUI`\
    \ is that you place objects in the center of the user interface and define their\
    \ position relative to the center.\n\nWhen the screen size is large, the distance\
    \ between user interface objects expands. When the screen size is small, the distance\
    \ between user interface objects shrinks, so the user interface adapts to the\
    \ screen size automatically as shown in Figure 1-3.\n\n![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig3_HTML.jpg)\n\
    \n**Figure 1-3** `SwiftUI` user interfaces can adapt to different screen sizes\
    \ automatically\n\nYou can use storyboards and `SwiftUI` together in a single\
    \ project, or you can use either storyboards or `SwiftUI` by themselves. Because\
    \ `SwiftUI` represents the future for developing apps for all of Apple’s products,\
    \ this book focuses exclusively on creating user interfaces using `SwiftUI` rather\
    \ than storyboards."
