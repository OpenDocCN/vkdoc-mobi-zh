    \ $myDate, label: { Text(\"Date\") })\n```\n\n### 选择日期选择器样式\n\n默认情况下，日期选择器以可编辑字段的形式显示日期和时间。如果您不喜欢日期选择器的默认紧凑格式，可以使用`.datePickerStyle()`修饰符自定义日期选择器的外观，如图\
    \ 8-9 所示。\n\n![](img/329781_7_En_8_Fig9_HTML.jpg)\n\n一组三张截图，分别展示了`.compact`、`.graphical`和`.wheel`样式。Compact\
    \ 样式显示文本日期选择器和日期时间“January 15, 2023, 7 PM”。Graphical 样式显示日历，选中日期 15，月份和年份为 January\
    \ 2023。Wheel 样式选中了 today 和 7 26 PM。\n\n**图 8-9** 日期选择器的不同样式\n\n*   `.compact`\
    \ – 显示日期和时间的默认方式。当用户选择日期时，会像`.graphical`样式一样显示日历。当用户选择时间时，会像`.wheel`样式一样显示不同的时间选项。\n\
    *   `.graphical` – 以日历形式显示日期，时间则以字段形式显示。当用户选择时间时，会像`.wheel`样式一样显示不同的时间选项。\n* \
    \  `.wheel` – 以滚轮形式显示日期和时间。\n\n创建日期选择器的 Swift 代码只需添加一个`State`变量来存储日期，然后使用该`State`变量。此外，当日期选择器样式为`.compact`时，日期选择器允许你定义显示的文本：\n\
    \n```\n@State var myDate = Date.now\nDatePicker(selection: $myDate, label: { Text(\"\
    Date\") })\n    .datePickerStyle(.graphical)\n```"
- fmt: "### Displaying a Date and/or Time\n\nAlthough the `DatePicker` can let the\
    \ user select both a date and a time, you may only want the `DatePicker` to select\
    \ either a date or a time. To limit the `DatePicker` to displaying just a date\
    \ or a time, you can add the `displayedComponents` parameter and specify either\
    \ `[.date]` or `[.hourAndMinute]` like this:\n\n```\nDatePicker(selection: $myDate,\
    \ displayedComponents: [.date], label: { Text(\"Date\") })\nDatePicker(selection:\
    \ $myDate, displayedComponents: [.hourAndMinute], label: { Text(\"Time\") })\n\
    ```\n\n### Restricting a Date Range\n\nWhen letting users select a date, you may\
    \ want to restrict the list of valid dates. For example, if you're asking for\
    \ someone's birthdate, it doesn't make sense to let the `DatePicker` allow a user\
    \ to select an outrageously old date of birth such as February 3, 1737.\n\nTo\
    \ restrict a date range for a `DatePicker`, you must first define the start and\
    \ end date range such as:\n\n```\nlet dateRange: ClosedRange = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2024, month:\
    \ 1, day: 1)\n    let endComponents = DateComponents(year: 2024, month: 12, day:\
    \ 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:startComponents)!\n\
    \    ...\n    calendar.date(from:endComponents)!\n}()\n```\n\nNotice that a closed\
    \ range requires defining both a starting date and an ending date. The user can't\
    \ go further in the past beyond the starting date and can't go further in the\
    \ future beyond the ending date.\n\nBesides a closed range, you can also choose\
    \ a partial range. One way is to define a partial range that starts from a specific\
    \ date such as:\n\n```\nlet dateRange2: PartialRangeFrom = {\n    let calendar\
    \ = Calendar.current\n    let startComponents = DateComponents(year: 2023, month:\
    \ 1, day: 1)\n    return calendar.date(from:startComponents)!...\n}()\n```\n\n\
    The preceding range starts at January 1, 2023, and allows the `DatePicker` to\
    \ choose any date beyond this starting date. Another way to define a partial range\
    \ is one that goes up to but stops at a specific date such as:\n\n```\nlet dateRange3:\
    \ PartialRangeThrough = {\n    let calendar = Calendar.current\n    let stopComponents\
    \ = DateComponents(year: 2024, month: 1, day: 1)\n    return ...calendar.date(from:stopComponents)!\n\
    }()\n```\n\nThis range lets the `DatePicker` choose any date up to the specified\
    \ date (January 1, 2024, in this case). Once you define a date range, you need\
    \ to add this date range into the `DatePicker` like this:\n\n```\nDatePicker(selection:\
    \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"Date\"\
    ) })\n```\n\nThis `DatePicker` uses a `State` variable called `myDate`, defines\
    \ the valid range by the `dateRange` constant, and only displays dates (and not\
    \ times). If the `DatePicker` style is `.compact`, then it will also display \"\
    Date\" on the `DatePicker`.\n\nTo see how to use a `DatePicker`, follow these\
    \ steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as \"DatePicker.\"\n\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n\n3.  Create a `State` variable to hold a date like this:\n\n    ```\n\
    \    @State var myDate = Date.now\n    ```\n\n    ![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig10_HTML.jpg)\n\
    \n    A screenshot of the calendar window has the month and year as January 2023\
    \ with the date selected as 15. It has a text at the top that reads, chosen date\
    \ = Sunday, January 15, 2023 at 8 46 10 P M Pacific Standard Time.\n\n    **Figure\
    \ 8-10** The user interface showing a `Text` view and a `DatePicker`\n\n4.  Define\
    \ three date ranges as follows:\n\n    ```\n    let dateRange: ClosedRange = {\n\
    \        let calendar = Calendar.current\n        let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n        let endComponents = DateComponents(year: 2023,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n        return calendar.date(from:startComponents)!\n\
    \        ...\n        calendar.date(from:endComponents)!\n    }()\n    let dateRange2:\
    \ PartialRangeFrom = {\n        let calendar = Calendar.current\n        let startComponents\
    \ = DateComponents(year: 2023, month: 1, day: 1)\n        let endComponents =\
    \ DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute: 59, second:\
    \ 59)\n        return calendar.date(from:endComponents)!...\n    }()\n    let\
    \ dateRange3: PartialRangeThrough = {\n        let calendar = Calendar.current\n\
    \        let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
    \        let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
    \ 23, minute: 59, second: 59)\n        return ...calendar.date(from:startComponents)!\n\
    \    }()\n    ```\n\n5.  Create a `VStack` to hold a `Text` view and a `DatePicker`\
    \ like this:\n\n    ```\n    var body: some View {\n        VStack {\n       \
    \     Text(\"Chosen date = \\(myDate)\")\n                .padding()\n       \
    \     DatePicker(selection: $myDate, in: dateRange3, displayedComponents: [.date],\
    \ label: { Text(\"Date\") })\n                .datePickerStyle(.graphical)\n \
    \               .padding()\n        }\n    }\n    ```\n\n    The entire `ContentView`\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        @State var myDate = Date.now\n        let dateRange: ClosedRange\
    \ = {\n            let calendar = Calendar.current\n            let startComponents\
    \ = DateComponents(year: 2023, month: 1, day: 1)\n            let endComponents\
    \ = DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute: 59, second:\
    \ 59)\n            return calendar.date(from:startComponents)!\n            ...\n\
    \            calendar.date(from:endComponents)!\n        }()\n        let dateRange2:\
    \ PartialRangeFrom = {\n            let calendar = Calendar.current\n        \
    \    let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n    \
    \        let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
    \ 23, minute: 59, second: 59)\n            return calendar.date(from:endComponents)!...\n\
    \        }()\n        let dateRange3: PartialRangeThrough = {\n            let\
    \ calendar = Calendar.current\n            let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n            let endComponents = DateComponents(year:\
    \ 2023, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n            return\
    \ ...calendar.date(from:startComponents)!\n        }()\n        var body: some\
    \ View {\n            VStack {\n                Text(\"Chosen date = \\(myDate)\"\
    )\n                    .padding()\n                DatePicker(selection: $myDate,\
    \ in: dateRange, displayedComponents: [.date], label: { Text(\"Date\") })\n  \
    \                  .datePickerStyle(.graphical)\n                    .padding()\n\
    \            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n6.  Click the Live icon in the Canvas pane and click\
    \ any date. Notice that when you choose a date, it appears above the `DatePicker`\
    \ as shown in Figure 8-10.\n\n7.  Experiment with changing the `DatePicker` style\
    \ (`.compact`, `.graphical`, `.wheel`) along with choosing the different date\
    \ ranges (`dateRange`, `dateRange2`, `dateRange3`)."
  raw: "### Displaying a Date and/or Time\n\nAlthough the Date Picker can let the\
    \ user select both a date and a time, you may only want the Date Picker to select\
    \ either a date or a time. To limit the Date Picker to displaying just a date\
    \ or a time, you can add the displayedComponents parameter and specify either\
    \ [.date] or [.hourAndMinute] like this:\n\n```\nDatePicker(selection: $myDate,\
    \ displayedComponents: [.date], label: { Text(\"Date\") })\nDatePicker(selection:\
    \ $myDate, displayedComponents: [.hourAndMinute], label: { Text(\"Time\") })\n\
    ```\n\n### Restricting a Date Range\n\nWhen letting users select a date, you may\
    \ want to restrict the list of valid dates. For example, if you’re asking for\
    \ someone’s birthdate, it doesn’t make sense to let the Date Picker allow a user\
    \ to select an outrageously old date of birth such as February 3, 1737.\n\nTo\
    \ restrict a date range for a Date Picker, you must first define the start and\
    \ end date range such as\n\n```\nlet dateRange: ClosedRange = {\nlet calendar\
    \ = Calendar.current\nlet startComponents = DateComponents(year: 2024, month:\
    \ 1, day: 1)\nlet endComponents = DateComponents(year: 2024, month: 12, day: 31,\
    \ hour: 23, minute: 59, second: 59)\nreturn calendar.date(from:startComponents)!\n\
    ...\ncalendar.date(from:endComponents)!\n}()\n```\n\nNotice that a closed range\
    \ requires defining both a starting date and an ending date. The user can’t go\
    \ further in the past beyond the starting date and can’t go further in the future\
    \ beyond the ending date.\n\nBesides a closed range, you can also choose a partial\
    \ range. One way is to define a partial range that starts from a specific date\
    \ such as\n\n```\nlet dateRange2: PartialRangeFrom = {\nlet calendar = Calendar.current\n\
    let startComponents = DateComponents(year: 2023, month: 1, day: 1)\nreturn calendar.date(from:startComponents)!...\n\
    }()\n```\n\nThe preceding range starts at January 1, 2023, and allows the Date\
    \ Picker to choose any date beyond this starting date. Another way to define a\
    \ partial range is one that goes up to but stops at a specific date such as\n\n\
    ```\nlet dateRange3: PartialRangeThrough = {\nlet calendar = Calendar.current\n\
    let stopComponents = DateComponents(year: 2024, month: 1, day: 1)\nreturn ...calendar.date(from:stopComponents)!\n\
    }()\n```\n\nThis range lets the Date Picker choose any date up to the specified\
    \ date (January 1, 2024, in this case). Once you define a date range, you need\
    \ to add this date range into the Date Picker like this:\n\n```\nDatePicker(selection:\
    \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"Date\"\
    ) })\n```\n\nThis Date Picker uses a State variable called myDate, defines the\
    \ valid range by the dateRange constant, and only displays dates (and not times).\
    \ If the Date Picker style is .compact, then it will also display “Date” on the\
    \ Date Picker.\n\nTo see how to use a Date Picker, follow these steps:\n\n1. \
    \ Create a new SwiftUI iOS App project and give it any name you wish such as “DatePicker.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Create a State\
    \ variable to hold a date like this:\n\n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig10_HTML.jpg)\n\
    \nA screenshot of the calendar window has the month and year as January 2023 with\
    \ the date selected as 15\\. It has a text at the top that reads, chosen date\
    \ = Sunday, January 15, 2023 at 8 46 10 P M Pacific Standard Time.\n\nFigure 8-10\n\
    \nThe user interface showing a Text view and a Date Picker\n\n1.  Define three\
    \ date ranges as follows:\n\n```\n    let dateRange: ClosedRange = {\n    let\
    \ calendar = Calendar.current\n    let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n    let endComponents = DateComponents(year: 2023,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:startComponents)!\n\
    \    ...\n    calendar.date(from:endComponents)!\n    }()\n    let dateRange2:\
    \ PartialRangeFrom = {\n    let calendar = Calendar.current\n    let startComponents\
    \ = DateComponents(year: 2023, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
    \ 2023, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:endComponents)!...\n\
    \    }()\n    let dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
    \    let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n    let\
    \ endComponents = DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute:\
    \ 59, second: 59)\n    return ...calendar.date(from:startComponents)!\n    }()\n\
    \    ```\n\n2.  Create a VStack to hold a Text view and a Date Picker like this:\n\
    \n```\n    var body: some View {\n    VStack {\n    Text(\"Chosen date = \\(myDate)\"\
    )\n    .padding()\n    DatePicker(selection: $myDate, in: dateRange3, displayedComponents:\
    \ [.date], label: { Text(\"Date\") })\n    .datePickerStyle(.graphical)\n    .padding()\n\
    \    }\n    }\n    ```\n\nThe entire ContentView file should look like this:\n\
    \n```\n    import SwiftUI\n    struct ContentView: View {\n    @State var myDate\
    \ = Date.now\n    let dateRange: ClosedRange = {\n    let calendar = Calendar.current\n\
    \    let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n    let\
    \ endComponents = DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute:\
    \ 59, second: 59)\n    return calendar.date(from:startComponents)!\n    ...\n\
    \    calendar.date(from:endComponents)!\n    }()\n    let dateRange2: PartialRangeFrom\
    \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n    let endComponents = DateComponents(year: 2023,\
    \ month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:endComponents)!...\n\
    \    }()\n    let dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
    \    let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n    let\
    \ endComponents = DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute:\
    \ 59, second: 59)\n    return ...calendar.date(from:startComponents)!\n    }()\n\
    \    var body: some View {\n    VStack {\n    Text(\"Chosen date = \\(myDate)\"\
    )\n    .padding()\n    DatePicker(selection: $myDate, in: dateRange, displayedComponents:\
    \ [.date], label: { Text(\"Date\") })\n    .datePickerStyle(.graphical)\n    .padding()\n\
    \    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n   \
    \ static var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\
    \n3.  Click the Live icon in the Canvas pane and click any date. Notice that when\
    \ you choose a date, it appears above the Date Picker as shown in Figure [8-10](#329781_7_En_8_Chapter.xhtml#Fig10).\n\
    \n```\n@State var myDate = Date.now\n```\n\n1.  Experiment with changing the Date\
    \ Picker style (.compact, .graphical, .wheel) along with choosing the different\
    \ date ranges (dateRange, dateRange2, dateRange3)."
  trans: "\n### 显示日期和/或时间\n\n虽然`DatePicker`可以让用户同时选择日期和时间，但你可能只想让`DatePicker`选择日期或时间中的一项。要限制`DatePicker`仅显示日期或时间，可以添加`displayedComponents`参数，并指定为`[.date]`或`[.hourAndMinute]`，示例如下：\n\
    \n```\nDatePicker(selection: $myDate, displayedComponents: [.date], label: { Text(\"\
    日期\") })\nDatePicker(selection: $myDate, displayedComponents: [.hourAndMinute],\
    \ label: { Text(\"时间\") })\n```\n\n### 限制日期范围\n\n当允许用户选择日期时，你可能需要限制有效日期的范围。例如，如果你在询问某人的出生日期，让`DatePicker`允许用户选择一个异常古老的日期（如\
    \ 1737 年 2 月 3 日）是不合理的。\n\n要为`DatePicker`限制日期范围，你首先需要定义起始和结束日期范围，例如：\n\n```\n\
    let dateRange: ClosedRange = {\n    let calendar = Calendar.current\n    let startComponents\
    \ = DateComponents(year: 2024, month: 1, day: 1)\n    let endComponents = DateComponents(year:\
    \ 2024, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n    return calendar.date(from:startComponents)!\n\
    \    ...\n    calendar.date(from:endComponents)!\n}()\n```\n\n请注意，一个闭区间需要同时定义起始日期和结束日期。用户无法选择早于起始日期的过去日期，也无法选择晚于结束日期的未来日期。\n\
    \n除了闭区间，你还可以选择部分范围。一种方法是定义一个从特定日期开始的部分范围，例如：\n\n```\nlet dateRange2: PartialRangeFrom\
    \ = {\n    let calendar = Calendar.current\n    let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n    return calendar.date(from:startComponents)!...\n\
    }()\n```\n\n上述范围从 2023 年 1 月 1 日开始，允许`DatePicker`选择此起始日期之后的任何日期。另一种定义部分范围的方式是定义一个截止到特定日期的范围，例如：\n\
    \n```\nlet dateRange3: PartialRangeThrough = {\n    let calendar = Calendar.current\n\
    \    let stopComponents = DateComponents(year: 2024, month: 1, day: 1)\n    return\
    \ ...calendar.date(from:stopComponents)!\n}()\n```\n\n此范围允许`DatePicker`选择到指定日期（本例中为\
    \ 2024 年 1 月 1 日）为止的任何日期。定义日期范围后，你需要将该日期范围添加到`DatePicker`中，如下所示：\n\n```\nDatePicker(selection:\
    \ $myDate, in: dateRange, displayedComponents: [.date], label: { Text(\"日期\")\
    \ })\n```\n\n这个`DatePicker`使用一个名为`myDate`的`State`变量，通过`dateRange`常量定义有效范围，并且仅显示日期（不显示时间）。如果`DatePicker`的样式是`.compact`，它还会在`DatePicker`上显示“日期”。\n\
    \n要了解如何使用`DatePicker`，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其取任意名称，例如“DatePicker”。\n\
    \n2.  在导航面板中点击`ContentView`文件。\n\n3.  创建一个`State`变量来保存日期，如下所示：\n\n    ```\n  \
    \  @State var myDate = Date.now\n    ```\n\n    ![](img/329781_7_En_8_Fig10_HTML.jpg)\n\
    \n    日历窗口的屏幕截图显示月份和年份为 2023 年 1 月，选中的日期为 15 日。顶部文字显示：所选日期 = 2023 年 1 月 15 日星期日太平洋标准时间晚上\
    \ 8:46:10。\n\n    **图 8-10** 显示`Text`视图和`DatePicker`的用户界面\n\n4.  定义三个日期范围，如下所示：\n\
    \n    ```\n    let dateRange: ClosedRange = {\n        let calendar = Calendar.current\n\
    \        let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
    \        let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
    \ 23, minute: 59, second: 59)\n        return calendar.date(from:startComponents)!\n\
    \        ...\n        calendar.date(from:endComponents)!\n    }()\n    let dateRange2:\
    \ PartialRangeFrom = {\n        let calendar = Calendar.current\n        let startComponents\
    \ = DateComponents(year: 2023, month: 1, day: 1)\n        let endComponents =\
    \ DateComponents(year: 2023, month: 12, day: 31, hour: 23, minute: 59, second:\
    \ 59)\n        return calendar.date(from:endComponents)!...\n    }()\n    let\
    \ dateRange3: PartialRangeThrough = {\n        let calendar = Calendar.current\n\
    \        let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
    \        let endComponents = DateComponents(year: 2023, month: 12, day: 31, hour:\
    \ 23, minute: 59, second: 59)\n        return ...calendar.date(from:startComponents)!\n\
    \    }()\n    ```\n\n5.  创建一个`VStack`来容纳一个`Text`视图和一个`DatePicker`，如下所示：\n\n  \
    \  ```\n    var body: some View {\n        VStack {\n            Text(\"所选日期 =\
    \ \\(myDate)\")\n                .padding()\n            DatePicker(selection:\
    \ $myDate, in: dateRange3, displayedComponents: [.date], label: { Text(\"日期\"\
    ) })\n                .datePickerStyle(.graphical)\n                .padding()\n\
    \        }\n    }\n    ```\n\n    完整的`ContentView`文件应如下所示：\n\n    ```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n        @State var myDate = Date.now\n\
    \        let dateRange: ClosedRange = {\n            let calendar = Calendar.current\n\
    \            let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
    \            let endComponents = DateComponents(year: 2023, month: 12, day: 31,\
    \ hour: 23, minute: 59, second: 59)\n            return calendar.date(from:startComponents)!\n\
    \            ...\n            calendar.date(from:endComponents)!\n        }()\n\
    \        let dateRange2: PartialRangeFrom = {\n            let calendar = Calendar.current\n\
    \            let startComponents = DateComponents(year: 2023, month: 1, day: 1)\n\
    \            let endComponents = DateComponents(year: 2023, month: 12, day: 31,\
    \ hour: 23, minute: 59, second: 59)\n            return calendar.date(from:endComponents)!...\n\
    \        }()\n        let dateRange3: PartialRangeThrough = {\n            let\
    \ calendar = Calendar.current\n            let startComponents = DateComponents(year:\
    \ 2023, month: 1, day: 1)\n            let endComponents = DateComponents(year:\
    \ 2023, month: 12, day: 31, hour: 23, minute: 59, second: 59)\n            return\
    \ ...calendar.date(from:startComponents)!\n        }()\n        var body: some\
    \ View {\n            VStack {\n                Text(\"所选日期 = \\(myDate)\")\n\
    \                    .padding()\n                DatePicker(selection: $myDate,\
    \ in: dateRange, displayedComponents: [.date], label: { Text(\"日期\") })\n    \
    \                .datePickerStyle(.graphical)\n                    .padding()\n\
    \            }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n6.  在画布面板中点击 Live 图标，然后点击任意日期。请注意，当你选择一个日期时，它会显示在`DatePicker`上方，如图\
    \ 8-10 所示。\n\n7.  尝试更改`DatePicker`样式（`.compact`、`.graphical`、`.wheel`），并搭配选择不同的日期范围（`dateRange`、`dateRange2`、`dateRange3`）。\n"
- fmt: "### Formatting Dates\n\nBy default, SwiftUI displays dates with lots of details\
    \ that you may not want to display. To display dates within a specific format,\
    \ you can use the `DateFormatter` like this:\n\n```\nlet formatter = DateFormatter()\n\
    ```\n\nThen you can define a style to display dates and times such as one of the\
    \ following:\n\n| Style | Date | Time |\n| --- | --- | --- |\n| `.short` | 2/15/22\
    \ | 7:15 PM |\n| `.medium` | Feb 15, 2022 | 7:15:29 PM |\n| `.long` | February\
    \ 15, 2022 | 7:15:29 PM CST |\n| `.full` | Tuesday, February 15, 2022 | 7:15:29\
    \ PM Central Standard Time |\n\nNote\n\nThe locale may change the way dates are\
    \ actually displayed such as 15 June 2021 or June 15, 2021.\n\nTo use a date style,\
    \ you must define the formatter’s `dateStyle` property like this:\n\n```\nformatter.dateStyle\
    \ = .medium\n```\n\nTo use a time style, you must define the formatter’s `timeStyle`\
    \ property like this:\n\n```\nformatter.timeStyle = .short\n```\n\nOnce you’ve\
    \ created a `DateFormatter` and defined its `.dateStyle` and `.timeStyle` properties,\
    \ the final step is to format a date using that formatter and its `dateStyle`\
    \ such as:\n\n```\nformatter.string(from: myDate)\n```\n\nTo see how to format\
    \ dates chosen from a Date Picker, follow these steps:\n\n1. Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “DatePickerFormat.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Create a `State` variable\
    \ to hold a date like this:\n   1. Type the following underneath the `State` variable\
    \ to define a `DateFormatter`:\n\n   ```\n   @State var myDate = Date.now\n  \
    \ ```\n\n   2. Add a `VStack` inside the `var body: some View` line and create\
    \ a `DatePicker` inside the `VStack` like this:\n\n   ```\n   VStack {\n     \
    \  Text(\"Chosen date = \\(formatter.string(from: myDate))\")\n           .padding()\n\
    \       DatePicker(selection: $myDate, label: { Text(\"Date\") })\n   }.onAppear()\
    \ {\n       formatter.dateStyle = .full\n       formatter.timeStyle = .full\n\
    \   }\n   ```\n\n   The `Text` view displays “Chosen date = ” followed by the\
    \ date, which is stored in the `myDate` State variable. Notice that the `formatter.string`\
    \ command defines how that date is actually displayed.\n\n   The `DatePicker`\
    \ stores the selected date in the `myDate` State variable. Then the `.onAppear`\
    \ modifier runs Swift code every time the user interface defined by the `VStack`\
    \ appears. Inside this `.onAppear` modifier is the single line that defines the\
    \ `.dateStyle` of the `formatter` to `.full`. If you change `.full` to `.short`,\
    \ `.medium`, or `.long`, you can see how that formats the date differently in\
    \ the `Text` view.\n\n   The entire `ContentView` files should look like this:\n\
    \n   ```\n   import SwiftUI\n   struct ContentView: View {\n       @State var\
    \ myDate = Date.now\n       let formatter = DateFormatter()\n       var body:\
    \ some View {\n           VStack {\n               Text(\"Chosen date = \\(formatter.string(from:\
    \ myDate))\")\n                   .padding()\n               DatePicker(selection:\
    \ $myDate, label: { Text(\"Date\") })\n           }.onAppear() {\n           \
    \    formatter.dateStyle = .full\n               formatter.timeStyle = .full\n\
    \           }\n       }\n   }\n   struct ContentView_Previews: PreviewProvider\
    \ {\n       static var previews: some View {\n           ContentView()\n     \
    \  }\n   }\n   ```\n\n4. Click the Live icon in the Canvas pane and click any\
    \ date. Notice that when you choose a date, it appears above the `DatePicker`,\
    \ using the date and time styles defined within the `.onAppear` modifier such\
    \ as `.full` or `.short`.\n\n```\nlet formatter = DateFormatter()\n```\n\n###\
    \ Creating a MultiDatePicker\n\nAn ordinary Date Picker only lets users select\
    \ a single date. If you want users to be able to select multiple dates at a time,\
    \ you can use the `MultiDatePicker`. Since a `MultiDatePicker` lets users select\
    \ multiple dates, these dates get stored in a set of `DateComponents`. That means\
    \ you need to create a `State` variable like this:\n\n```\n@State var dates =\
    \ Set<DateComponents>()\n```\n\nTo create a `MultiDatePicker`, just define it\
    \ with the State variable to store the multiple dates selected like this:\n\n\
    ```\nMultiDatePicker(\"Select Dates\", selection: $dates)\n```\n\nTo see how to\
    \ create a `MultiDatePicker`, follow these steps:\n\n1. Create a new SwiftUI iOS\
    \ App project and give it any name you wish such as “MultiDatePicker.”\n2. Click\
    \ the `ContentView` file in the Navigator pane.\n3. Create a `State` variable\
    \ to hold multiple dates in a set like this:\n\n   ![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig11_HTML.jpg)\n\
    \   *A screenshot of a calendar window has the month and year as January 2023\
    \ with multiple dates selected as 2, 8, 12, 17, 21, 23, and 26.*  \n   **Figure\
    \ 8-11** The `MultiDatePicker` lets users select two or more dates.\n\n4. Add\
    \ a `VStack` inside the `var body: some View` line and create a `MultiDatePicker`\
    \ inside the `VStack` like this:\n\n   ```\n   VStack {\n       MultiDatePicker(\"\
    Select Dates\", selection: $dates)\n   }\n   .padding()\n   ```\n\n5. Click the\
    \ Live icon in the Canvas pane. The `MultiDatePicker` appears.\n6. Click two or\
    \ more dates. Each time you click a date, the `MultiDatePicker` highlights it\
    \ as shown in Figure [8-11](#329781_7_En_8_Chapter.xhtml#Fig11). If you click\
    \ a highlighted date, the `MultiDatePicker` clears the selection.\n\n```\n@State\
    \ var dates = Set<DateComponents>()\n```\n\nThe entire `ContentView` file should\
    \ look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State\
    \ var dates = Set<DateComponents>()\n    var body: some View {\n        VStack\
    \ {\n            MultiDatePicker(\"Select Dates\", selection: $dates)\n      \
    \  }\n        .padding()\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nOnce you’ve created a `MultiDatePicker`, the next step is to retrieve the multiple\
    \ dates the user selected. First, all selected dates are stored as a `DateComponents`\
    \ data type, which includes lots of different information beyond just the date.\
    \ To see how dates, stored as `DateComponents`, look, modify the current project\
    \ as follows:\n\n1. In the current MultiDatePicker project, add the following\
    \ `State` variable:\n\n   ![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig12_HTML.jpg)\n\
    \   *A screenshot of a calendar window has the month and year as January 2023\
    \ with multiple dates selected as 17, 24, 29, and 30. It has an option “click\
    \ me” and 3 sets of commands for calendar, era, month, day, and is leap month\
    \ at the bottom.*  \n   **Figure 8-12** Selected dates chosen from the `MultiDatePicker`.\n\
    \n2. Add a `Button` and a `TextEditor` underneath the `MultiDatePicker` inside\
    \ the `VStack` like this:\n\n   ```\n   Button(\"Click Me\") {\n       for x in\
    \ dates {\n           message += \"\\(x)\" + \"\\n\"\n       }\n   }\n   TextEditor(text:\
    \ $message)\n   ```\n\n   The entire `ContentView` file should look like this:\n\
    \n   ```\n   import SwiftUI\n   struct ContentView: View {\n       @State var\
    \ dates = Set<DateComponents>()\n       @State var message = \"\"\n       var\
    \ body: some View {\n           VStack {\n               MultiDatePicker(\"Select\
    \ Dates\", selection: $dates)\n               Button(\"Click Me\") {\n       \
    \            for x in dates {\n                       message += \"\\(x)\" + \"\
    \\n\"\n                   }\n               }\n               TextEditor(text:\
    \ $message)\n           }\n           .padding()\n       }\n   }\n   struct ContentView_Previews:\
    \ PreviewProvider {\n       static var previews: some View {\n           ContentView()\n\
    \       }\n   }\n   ```\n\n3. Click the Live icon in the Canvas pane.\n4. Click\
    \ multiple dates in the `MultiDatePicker`.\n5. Click the `Click Me` button. Your\
    \ selected dates appear in the `TextEditor` as shown in Figure [8-12](#329781_7_En_8_Chapter.xhtml#Fig12).\n\
    \n```\n@State var message = \"\"\n```\n\nNotice that a date such as January 24,\
    \ 2023, actually gets stored as year: 2023, month: 1, and day: 24. Such a format\
    \ likely won’t be useful, so what we need to do is access just the date property\
    \ of the `DateComponents` structure."
  raw: "### Formatting Dates\n\nBy default, SwiftUI displays dates with lots of details\
    \ that you may not want to display. To display dates within a specific format,\
    \ you can use the DateFormatter like this:\n\n```\nlet formatter = DateFormatter()\n\
    ```\n\nThen you can define a style to display dates and times such as one of the\
    \ following:\n\n| Style | Date | Time |\n| --- | --- | --- |\n| .short | 2/15/22\
    \ | 7:15 PM |\n| .medium | Feb 15, 2022 | 7:15:29 PM |\n| .long | February 15,\
    \ 2022 | 7:15:29 PM CST |\n| .full | Tuesday, February 15, 2022 | 7:15:29 PM Central\
    \ Standard Time |\n\nNote\n\nThe locale may change the way dates are actually\
    \ displayed such as 15 June 2021 or June 15, 2021.\n\nTo use a date style, you\
    \ must define the formatter’s dateStyle property like this:\n\n```\nformatter.dateStyle\
    \ = .medium\n```\n\nTo use a time style, you must define the formatter’s timeStyle\
    \ property like this:\n\n```\nformatter.timeStyle = .short\n```\n\nOnce you’ve\
    \ created a DateFormatter and defined its .dateStyle and .timeStyle properties,\
    \ the final step is to format a date using that formatter and its dateStyle such\
    \ as\n\n```\nformatter.string(from: myDate)\n```\n\nTo see how to format dates\
    \ chosen from a Date Picker, follow these steps:\n\n1.  Create a new SwiftUI iOS\
    \ App project and give it any name you wish such as “DatePickerFormat.”\n\n2.\
    \  Click the ContentView file in the Navigator pane.\n\n3.  Create a State variable\
    \ to hold a date like this:\n\n1.  Type the following underneath the State variable\
    \ to define a DateFormatter:\n\n```\n@State var myDate = Date.now\n```\n\n1. \
    \ Add a VStack inside the var body: some View line and create a Date Picker inside\
    \ the VStack like this:\n\n    ```\n    VStack {\n    Text(\"Chosen date = \\\
    (formatter.string( from: myDate))\")\n    .padding()\n    DatePicker(selection:\
    \ $myDate, label: { Text(\"Date\") })\n    }.onAppear() {\n    formatter.dateStyle\
    \ = .full\n    formatter.timeStyle = .full\n    }\n    ```\n\n    The Text view\
    \ displays “Chosen date = ” followed by the date, which is stored in the myDate\
    \ State variable. Notice that the formatter.string command defines how that date\
    \ is actually displayed.\n\n    The Date Picker stores the selected date in the\
    \ myDate State variable. Then the .onAppear modifier runs Swift code every time\
    \ the user interface defined by the VStack appears. Inside this .onAppear modifier\
    \ is the single line that defines the .dateStyle of the formatter to .full. If\
    \ you change .full to .short, .medium, or .long, you can see how that formats\
    \ the date differently in the Text view.\n\n    The entire ContentView files should\
    \ look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    @State var myDate = Date.now\n    let formatter = DateFormatter()\n \
    \   var body: some View {\n    VStack {\n    Text(\"Chosen date = \\(formatter.string(\
    \ from: myDate))\")\n    .padding()\n    DatePicker(selection: $myDate, label:\
    \ { Text(\"Date\") })\n    }.onAppear() {\n    formatter.dateStyle = .full\n \
    \   formatter.timeStyle = .full\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n2.  Click the Live icon in the Canvas pane and click\
    \ any date. Notice that when you choose a date, it appears above the Date Picker,\
    \ using the date and time styles defined within the .onAppear modifier such as\
    \ .full or .short.\n\n```\nlet formatter = DateFormatter()\n```\n\n## Creating\
    \ a MultiDate Picker\n\nAn ordinary Date Picker only lets users select a single\
    \ date. If you want users to be able to select multiple dates at a time, you can\
    \ use the MultiDatePicker. Since a MultiDatePicker lets users select multiple\
    \ dates, these dates get stored in a set of DateComponents. That means you need\
    \ to create a State variable like this:\n\n```\n@State var dates = Set()\n```\n\
    \nTo create a MultiDatePicker, just define it with the State variable to store\
    \ the multiple dates selected like this:\n\n```\nMultiDatePicker(\"Select Dates\"\
    , selection: $dates)\n```\n\nTo see how to create a MultiDatePicker, follow these\
    \ steps:\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as “MultiDatePicker.”\n\n2.  Click the ContentView file in the Navigator\
    \ pane.\n\n3.  Create a State variable to hold multiple dates in a set like this:\n\
    \n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig11_HTML.jpg)\n\nA screenshot\
    \ of a calendar window has the month and year as January 2023 with multiple dates\
    \ selected as 2, 8, 12, 17, 21, 23, and 26.\n\nFigure 8-11\n\nThe MultiDatePicker\
    \ lets users select two or more dates\n\n1.  Add a VStack inside the var body:\
    \ some View line and create a MultiDatePicker inside the VStack like this:\n\n\
    ```\n    VStack {\n    MultiDatePicker(\"Select Dates\", selection: $dates)\n\
    \    }\n    .padding()\n    ```\n\n2.  Click the Live icon in the Canvas pane.\
    \ The MultiDatePicker appears.\n\n3.  Click two or more dates. Each time you click\
    \ a date, the MultiDatePicker highlights it as shown in Figure [8-11](#329781_7_En_8_Chapter.xhtml#Fig11).\
    \ If you click a highlighted date, the MultiDatePicker clears the selection.\n\
    \n```\n@State var dates = Set()\n```\n\nThe entire ContentView file should look\
    \ like this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\n@State var dates\
    \ = Set()\nvar body: some View {\nVStack {\nMultiDatePicker(\"Select Dates\",\
    \ selection: $dates)\n}\n.padding()\n}\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\nOnce you’ve\
    \ created a MultiDatePicker, the next step is to retrieve the multiple dates the\
    \ user selected. First, all selected dates are stored as a DateComponents data\
    \ type, which includes lots of different information beyond just the date. To\
    \ see how dates, stored as DateComponents, look, modify the current project as\
    \ follows:\n\n1.  In the current MultiDatePicker project, add the following State\
    \ variable:\n\n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig12_HTML.jpg)\n\
    \nA screenshot of a calendar window has the month and year as January 2023 with\
    \ multiple dates selected as 17, 24, 29, and 30\\. It has an option click me and\
    \ 3 sets of commands for calendar, era, month, day, and is leap month at the bottom.\n\
    \nFigure 8-12\n\nSelected dates chosen from the MultiDatePicker\n\n1.  Add a Button\
    \ and a TextEditor underneath the MultiDatePicker inside the VStack like this:\n\
    \n```\n    Button(\"Click Me\") {\n    for x in dates {\n    message += \"\\(x)\"\
    \ + \"\\n\"\n    }\n    }\n    TextEditor(text: $message)\n    ```\n\nThe entire\
    \ ContentView file should look like this:\n\n```\n    import SwiftUI\n    struct\
    \ ContentView: View {\n    @State var dates = Set()\n    @State var message =\
    \ \"\"\n    var body: some View {\n    VStack {\n    MultiDatePicker(\"Select\
    \ Dates\", selection: $dates)\n    Button(\"Click Me\") {\n    for x in dates\
    \ {\n    message += \"\\(x)\" + \"\\n\"\n    }\n    }\n    TextEditor(text: $message)\n\
    \    }\n    .padding()\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n2.  Click the Live icon in the Canvas pane.\n\n3.  Click multiple dates\
    \ in the MultiDatePicker.\n\n4.  Click the Click Me button. Your selected dates\
    \ appear in the TextEditor as shown in Figure [8-12](#329781_7_En_8_Chapter.xhtml#Fig12).\n\
    \n```\n@State var message = \"\"\n```\n\nNotice that a date such as January 24,\
    \ 2023, actually gets stored as year: 2023, month: 1, and day: 24\\. Such a format\
    \ likely won’t be useful, so what we need to do is access just the date property\
    \ of the DateComponents structure."
  trans: "\n### 格式化日期\n\n默认情况下，SwiftUI 会显示包含大量你可能不想展示的细节的日期。要以特定格式显示日期，你可以像这样使用 `DateFormatter`：\n\
    \n```\nlet formatter = DateFormatter()\n```\n\n然后你可以定义一个样式来显示日期和时间，例如以下其中之一：\n\
    \n| 样式 | 日期 | 时间 |\n| --- | --- | --- |\n| `.short` | 2/15/22 | 7:15 PM |\n| `.medium`\
    \ | Feb 15, 2022 | 7:15:29 PM |\n| `.long` | February 15, 2022 | 7:15:29 PM CST\
    \ |\n| `.full` | Tuesday, February 15, 2022 | 7:15:29 PM Central Standard Time\
    \ |\n\n注意\n\n地区设置可能会改变日期的实际显示方式，例如显示为 15 June 2021 或 June 15, 2021。\n\n要使用日期样式，你必须像这样定义\
    \ formatter 的 `dateStyle` 属性：\n\n```\nformatter.dateStyle = .medium\n```\n\n要使用时间样式，你必须像这样定义\
    \ formatter 的 `timeStyle` 属性：\n\n```\nformatter.timeStyle = .short\n```\n\n创建了\
    \ `DateFormatter` 并定义好其 `.dateStyle` 和 `.timeStyle` 属性之后，最后一步就是使用该 formatter 及其\
    \ `dateStyle` 来格式化一个日期，例如：\n\n```\nformatter.string(from: myDate)\n```\n\n要了解如何格式化从日期选择器中选取的日期，请遵循以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“DatePickerFormat”。\n2. 在导航面板中点击 `ContentView`\
    \ 文件。\n3. 创建一个 `State` 变量来保存日期，如下所示：\n   1. 在 `State` 变量下方输入以下内容来定义一个 `DateFormatter`：\n\
    \n   ```\n   @State var myDate = Date.now\n   ```\n\n   2. 在 `var body: some View`\
    \ 行内添加一个 `VStack`，并在 `VStack` 内创建一个 `DatePicker`，如下所示：\n\n   ```\n   VStack {\n\
    \       Text(\"选择的日期 = \\(formatter.string(from: myDate))\")\n           .padding()\n\
    \       DatePicker(selection: $myDate, label: { Text(\"日期\") })\n   }.onAppear()\
    \ {\n       formatter.dateStyle = .full\n       formatter.timeStyle = .full\n\
    \   }\n   ```\n\n   `Text` 视图显示“选择的日期 = ”后跟存储在 `myDate` State 变量中的日期。注意，`formatter.string`\
    \ 命令定义了该日期的实际显示方式。\n\n   `DatePicker` 将选定的日期存储在 `myDate` State 变量中。然后，每当 `VStack`\
    \ 定义的用户界面出现时，`.onAppear` 修饰符就会运行 Swift 代码。在这个 `.onAppear` 修饰符内部，有一行代码将 `formatter`\
    \ 的 `.dateStyle` 定义为 `.full`。如果你将 `.full` 改为 `.short`、`.medium` 或 `.long`，就可以在\
    \ `Text` 视图中看到日期格式的不同变化。\n\n   整个 `ContentView` 文件应如下所示：\n\n   ```\n   import\
    \ SwiftUI\n   struct ContentView: View {\n       @State var myDate = Date.now\n\
    \       let formatter = DateFormatter()\n       var body: some View {\n      \
    \     VStack {\n               Text(\"选择的日期 = \\(formatter.string(from: myDate))\"\
    )\n                   .padding()\n               DatePicker(selection: $myDate,\
    \ label: { Text(\"日期\") })\n           }.onAppear() {\n               formatter.dateStyle\
    \ = .full\n               formatter.timeStyle = .full\n           }\n       }\n\
    \   }\n   struct ContentView_Previews: PreviewProvider {\n       static var previews:\
    \ some View {\n           ContentView()\n       }\n   }\n   ```\n\n4. 点击画布面板中的\
    \ Live 图标，然后点击任意日期。注意，当你选择一个日期时，它会显示在 `DatePicker` 上方，并使用 `.onAppear` 修饰符中定义的日期和时间样式，例如\
    \ `.full` 或 `.short`。\n\n```\nlet formatter = DateFormatter()\n```\n\n### 创建 MultiDatePicker\n\
    \n普通的日期选择器只允许用户选择单个日期。如果你希望用户能够同时选择多个日期，可以使用 `MultiDatePicker`。由于 `MultiDatePicker`\
    \ 允许用户选择多个日期，这些日期会存储在一组 `DateComponents` 中。这意味着你需要像这样创建一个 `State` 变量：\n\n```\n\
    @State var dates = Set<DateComponents>()\n```\n\n要创建一个 `MultiDatePicker`，只需使用这个\
    \ State 变量来存储选中的多个日期，代码如下：\n\n```\nMultiDatePicker(\"选择日期\", selection: $dates)\n\
    ```\n\n要了解如何创建一个 `MultiDatePicker`，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如“MultiDatePicker”。\n\
    2. 在导航面板中点击 `ContentView` 文件。\n3. 创建一个 `State` 变量来以一个集合的形式保存多个日期，如下所示：\n\n   ![](img/329781_7_En_8_Fig11_HTML.jpg)\n\
    \   *一个日历窗口的截图，显示月份和年份为 2023 年 1 月，选中了 2、8、12、17、21、23 和 26 等多个日期。*\n   **图 8-11**\
    \ `MultiDatePicker` 允许用户选择两个或更多日期。\n\n4. 在 `var body: some View` 行内添加一个 `VStack`，并在\
    \ `VStack` 内创建一个 `MultiDatePicker`，如下所示：\n\n   ```\n   VStack {\n       MultiDatePicker(\"\
    选择日期\", selection: $dates)\n   }\n   .padding()\n   ```\n\n5. 点击画布面板中的 Live 图标。`MultiDatePicker`\
    \ 会出现。\n6. 点击两个或更多日期。每次点击一个日期，`MultiDatePicker` 就会将其高亮显示，如图 8-11 所示。如果点击一个已高亮的日期，`MultiDatePicker`\
    \ 会清除其选中状态。\n\n```\n@State var dates = Set<DateComponents>()\n```\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var\
    \ dates = Set<DateComponents>()\n    var body: some View {\n        VStack {\n\
    \            MultiDatePicker(\"选择日期\", selection: $dates)\n        }\n       \
    \ .padding()\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n创建好 `MultiDatePicker`\
    \ 之后，下一步就是获取用户选中的多个日期。首先，所有选中的日期都存储为 `DateComponents` 数据类型，该类型包含的不仅仅是日期，还有大量其他信息。要了解以\
    \ `DateComponents` 形式存储的日期是什么样子，请按如下方式修改当前项目：\n\n1. 在当前 MultiDatePicker 项目中，添加以下\
    \ `State` 变量：\n\n   ![](img/329781_7_En_8_Fig12_HTML.jpg)\n   *一个日历窗口的截图，显示月份和年份为\
    \ 2023 年 1 月，选中了 17、24、29 和 30 等多个日期。它有一个“点击我”选项，底部有 3 组关于日历、纪元、月份、日以及是否为闰月的命令。*\n\
    \   **图 8-12** 从 `MultiDatePicker` 中选中的日期。\n\n2. 在 `VStack` 内部的 `MultiDatePicker`\
    \ 下方添加一个 `Button` 和一个 `TextEditor`，如下所示：\n\n   ```\n   Button(\"点击我\") {\n   \
    \    for x in dates {\n           message += \"\\(x)\" + \"\\n\"\n       }\n \
    \  }\n   TextEditor(text: $message)\n   ```\n\n   整个 `ContentView` 文件应如下所示：\n\n\
    \   ```\n   import SwiftUI\n   struct ContentView: View {\n       @State var dates\
    \ = Set<DateComponents>()\n       @State var message = \"\"\n       var body:\
    \ some View {\n           VStack {\n               MultiDatePicker(\"选择日期\", selection:\
    \ $dates)\n               Button(\"点击我\") {\n                   for x in dates\
    \ {\n                       message += \"\\(x)\" + \"\\n\"\n                 \
    \  }\n               }\n               TextEditor(text: $message)\n          \
    \ }\n           .padding()\n       }\n   }\n   struct ContentView_Previews: PreviewProvider\
    \ {\n       static var previews: some View {\n           ContentView()\n     \
    \  }\n   }\n   ```\n\n3. 点击画布面板中的 Live 图标。\n4. 在 `MultiDatePicker` 中点击多个日期。\n\
    5. 点击 `点击我` 按钮。你选中的日期会出现在 `TextEditor` 中，如图 8-12 所示。\n\n```\n@State var message\
    \ = \"\"\n```\n\n注意，像 2023 年 1 月 24 日这样的日期，实际上被存储为 year: 2023, month: 1, day:\
    \ 24。这种格式可能没什么用，所以我们需要做的是仅访问 `DateComponents` 结构体中的日期属性。\n"
- fmt: "为了实现这一点，我们需要使用`DateFormatter`，如下所示：\n\n1.  在当前`MultiDatePicker`项目中，在两个状态变量下方添加以下代码：\n\
    \n    ![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig13_HTML.jpg)\n\n    *一个日历窗口的截图显示月份和年份为2023年1月，并选择了多个日期：3、5、12、13和30。它有一个“Click\
    \ Me”选项，底部以月、日、年格式列出了上述选择的日期。*\n\n    **图 8-13** 从`MultiDatePicker`中选择的已格式化日期\n\
    \n2.  修改`Button`代码如下：\n\n    ```\n    Button(\"Click Me\") {\n        for x in\
