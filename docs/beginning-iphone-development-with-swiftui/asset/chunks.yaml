    \n6.  Click the Live icon in the Canvas pane.\n\n7.  Click the numbered Buttons\
    \ at the top of the screen. Notice that if you click the 2 Button, the second\
    \ tab in the tab bar gets selected. If you click the 4 button, the fourth tab\
    \ in the tab bar gets selected. The .tag modifier gives you a way to access a\
    \ specific tab through Swift code.\n\n## Displaying a Page View\n\nNormally a\
    \ Tab View displays tabs at the bottom of the screen so users can select a tab\
    \ and jump to a different view. As an alternative, you can turn a Tab View into\
    \ a Page View. A Page View displays tab bar icons at the bottom middle of the\
    \ screen that represent different screens. Then the user can scroll right and\
    \ left to view each screen in sequential order.\n\nTo turn a Tab View into a Page\
    \ View, just add the .tabViewStyle modifier to a Tab View and specify .page like\
    \ this:\n\n```\nTabView {\n}.tabViewStyle(.page)\n```\n\nNow instead of selecting\
    \ a tab from the bottom of the screen to open a view, users can scroll left and\
    \ right to open each view in sequential order. To provide a visual map of how\
    \ many views are available, you can add the .indexViewStyle modifier and specify\
    \ .always for the backgroundDisplayMode like this:\n\n```\nTabView {\n}.tabViewStyle(.page)\n\
    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))\n```\n\nTo\
    \ see how to a Page View works, follow these steps:\n\n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig5_HTML.jpg)\n\
    \nA snippet of 6 icons includes a heart, a rabbit, a tortoise, a file, a folder,\
    \ and a circle.\n\nFigure 18-5\n\nThe icon bar at the bottom of a Page View\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “PageView.”\n\n2.  Click the ContentView file in the Navigator pane.\n\n3. \
    \ Add a Tab View inside the var body: some View line like this:\n\n    ```\n \
    \   TabView {\n    Text(\"One\")\n    .tabItem {\n    Image(systemName: \"heart.fill\"\
    )\n    }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\"\
    )\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName: \"tortoise.fill\"\
    )\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName: \"folder.fill\"\
    )\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName: \"tray.fill\"\
    )\n    }\n    Text(\"Six\")\n    .tabItem {\n    Image(systemName: \"keyboard.fill\"\
    )\n    }\n    }\n    ```\n\n    Feel free to choose different text for each Text\
    \ view and different SF Symbol icons for each Image view. Notice that you only\
    \ need to add an Image view and do not need a Text view for each .tabItem.\n\n\
    4.  Add a .tabViewStyle and an .indexViewStyle modifier to the Tab View like this:\n\
    \n    ```\n    TabView {\n    Text(\"One\")\n    .tabItem {\n    Image(systemName:\
    \ \"heart.fill\")\n    }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName:\
    \ \"hare.fill\")\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
    \ \"tortoise.fill\")\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName:\
    \ \"folder.fill\")\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName:\
    \ \"tray.fill\")\n    }\n    Text(\"Six\")\n    .tabItem {\n    Image(systemName:\
    \ \"keyboard.fill\")\n    }\n    }.tabViewStyle(.page)\n    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
    \ .always))\n    ```\n\n    This displays each Image as a list of icons in the\
    \ bottom middle of the screen as shown in Figure [18-5](#329781_7_En_18_Chapter.xhtml#Fig5).\n\
    \nThe entire ContentView file should look like this:\n\n1.  Click the Live icon\
    \ in the Canvas pane.\n\n2.  Drag the mouse from right to left (and left to right)\
    \ to swipe from one view to the next. Notice that each time you do this, a different\
    \ icon at the bottom of the screen appears highlighted to let you know which view\
    \ you’re currently on and how many additional views may be before and after the\
    \ currently displayed view.\n\n```\nimport SwiftUI\nstruct ContentView: View {\n\
    var body: some View {\nTabView {\nText(\"One\")\n.tabItem {\nImage(systemName:\
    \ \"heart.fill\")\n}\nText(\"Two\")\n.tabItem {\nImage(systemName: \"hare.fill\"\
    )\n}\nText(\"Three\")\n.tabItem {\nImage(systemName: \"tortoise.fill\")\n}\nText(\"\
    Four\")\n.tabItem {\nImage(systemName: \"folder.fill\")\n}\nText(\"Five\")\n.tabItem\
    \ {\nImage(systemName: \"tray.fill\")\n}\nText(\"Six\")\n.tabItem {\nImage(systemName:\
    \ \"keyboard.fill\")\n}\n}.tabViewStyle(.page)\n.indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
    \ .always))\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var\
    \ previews: some View {\nContentView()\n}\n}\n```"
  trans: "\n# 在标签栏中通过编程方式选择按钮\n\n要切换到不同的视图，用户只需点击标签栏中的某个标签即可。默认情况下，最左侧的第一个标签会高亮显示。但有时您可能需要通过代码来选择标签。此时，您需要使用\
    \ `.tag` 修饰符来标识每个 `.tabItem`。\n\n`.tag` 修饰符允许您通过一个固定值（例如 `2`）来标识每个标签。当每个 `.tabItem`\
