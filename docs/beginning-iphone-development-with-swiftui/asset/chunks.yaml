  trans: "\n# 在导航堆栈中显示视图\n\n在某些情况下，在`NavigationStack`中仅显示单个视图（例如`Text`或`Image`视图）可能没问题。然而，很多时候你希望显示一个完全不同的用户界面。由于你可以使用结构体定义用户界面屏幕，因此可以创建多个结构体来生成多个屏幕，这些屏幕都能在`NavigationStack`中显示。\n\
    \n创建新结构体的最简单方法是在`ContentView`文件内部。但这可能会使代码变得杂乱，因此第二种方法是将结构体存储在单独的文件中。\n\n要了解如何创建定义另一个用户界面屏幕的结构体，请按照以下步骤操作：\n\
    \n![](img/329781_7_En_17_Fig4_HTML.jpg)\n\n该屏幕展示了用于创建新文件的模板选择，例如 macOS、watchOS、tvOS、DriverKit\
    \ 等。它还包含 Swift 文件、C 文件、用户界面、UI 测试用例类和 SwiftUI 视图等选项，以及用于取消、查看、空文件、启动屏幕和上一步或下一步的导航按钮。\n\
    \n图 17-4\n选择要创建的文件的对话框\n\n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其任意命名，例如 `NavigationStackStructures`。\n\
    2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 这行内部添加一个 `NavigationStack`\
    \ 和一个 `VStack`，如下所示：\n\n```\nvar body: some View {\n    NavigationStack {\n  \
    \      VStack {\n        }\n    }\n}\n```\n\n4. 向 `VStack` 添加两个 `NavigationLink`\
    \ 和一个 `.navigationTitle` 修饰符，如下所示：\n\n```\nvar body: some View {\n    NavigationStack\
    \ {\n        VStack {\n            NavigationLink(destination: FileView()) {\n\
    \                Text(\"Link to structure in same file\")\n            }\n   \
    \         NavigationLink(destination: SeparateFileView()) {\n                Text(\"\
    Separate file link\")\n            }\n            .navigationTitle(\"Navigation\
    \ Title\")\n        }\n    }\n}\n```\n\n第一个 `NavigationLink` 将显示一个名为 `FileView`\
    \ 的结构体。第二个 `NavigationLink` 将显示一个名为 `SeparateFileView` 的结构体。由于这两个结构体都还不存在，我们需要创建它们。\n\
    \n5. 在完整的 `struct ContentView: View` 结构体下方添加以下结构体，如下所示：\n\n```\nstruct FileView:\
    \ View {\n    var body: some View {\n        HStack {\n            Spacer()\n\
    \            VStack {\n                Spacer()\n                Text(\"This is\
    \ a separate structure\")\n                Text(\"that's stored in the same file\"\
    )\n                Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView:\
    \ View {\n    var body: some View {\n        NavigationStack {\n            VStack\
    \ {\n                NavigationLink(destination: FileView()) {\n             \
    \       Text(\"Link to structure in same file\")\n                }\n        \
    \        NavigationLink(destination: SeparateFileView()) {\n                 \
    \   Text(\"Separate file link\")\n                }\n                .navigationTitle(\"\
    Navigation Title\")\n            }\n        }\n    }\n}\n\nstruct FileView: View\
    \ {\n    var body: some View {\n        HStack {\n            Spacer()\n     \
    \       VStack {\n                Spacer()\n                Text(\"This is a separate\
    \ structure\")\n                Text(\"that's stored in the same file\")\n   \
    \             Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n我们可以在 `ContentView` 文件内继续添加新的结构体，但这有使文件变得杂乱的风险。创建结构体的第二种方法是将它们存储在单独的文件中，接下来的步骤将帮助我们实现这一点。在创建单独文件存储结构体时，我们可以使用完全空白的\
    \ Swift 文件或 SwiftUI View 文件。\n\n我们将使用一个空白的 Swift 文件来查看创建 SwiftUI 视图所需的所有代码，但 SwiftUI\
    \ View 文件也同样适用，并且会提供创建用户界面所需的基本代码。\n\n6. 选择 `文件` ➤ `新建` ➤ `文件`。会弹出一个对话框，如图 17-4\
    \ 所示。\n   - 点击对话框顶部的“iOS”，然后点击 `Swift 文件`，再点击 `下一步`。Xcode 会要求你为新创建的文件命名。\n   -\
    \ 输入 `SeparateFile` 并点击 `创建`。Xcode 会创建一个新的 Swift 文件。\n   - 删除 `SeparateFile` 中当前的所有代码，并将其替换为以下内容：\n\
    \n```\nimport SwiftUI\n\nstruct SeparateFileView: View {\n    var body: some View\
    \ {\n        HStack {\n            Spacer()\n            VStack {\n          \
    \      Spacer()\n                Text(\"This is another structure\")\n       \
    \         Text(\"but stored in a separate file\")\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.orange)\n   \
    \ }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n> **注意**：当将结构体存储在单独的文件中时，你需要第二个结构体（`PreviewProvider`）才能在画布窗格中显示该用户界面。\n\
    \n1. 在导航器窗格中点击 `ContentView` 文件。\n2. 在画布窗格中点击“实时”图标。\n3. 点击 `\"Link to structure\
    \ in same file\"`。注意，这会显示存储在 `ContentView` 文件中的 `FileView` 结构体。\n4. 点击“返回”按钮回到原始屏幕。\n\
    5. 点击 `\"Separate file link\"`。注意，这会显示存储在名为 `SeparateFile` 文件中的 `SeparateFileView`\
    \ 结构体。\n\n如果结构体很短，将其与 `NavigationStack` 存储在同一个文件中可能更为方便。然而，通常将结构体存储在单独文件中更有用，这样可以更好地组织它们，使每个文件更易于阅读。\n"
- fmt: "### Passing Data Between Structures in a Navigation Stack\n\nThe previous\
    \ project created two structures where one structure was stored in the `ContentView`\
    \ file and a second structure was stored in a separate file. In both cases, the\
    \ structures defined user interfaces that displayed static information unconnected\
    \ to anything from the original structure (`ContentView`).\n\nIn many cases, you\
    \ may want data from one structure to appear in a second structure. That means\
    \ we must pass data from one structure to another.\n\nFortunately, this task is\
    \ similar to passing data between functions. When a structure needs to receive\
    \ data, we just need to declare a property by creating a variable, giving that\
    \ variable a descriptive name, and defining the data type that variable can hold\
    \ such as `String` or `Double` like this:\n\n```\nstruct FileView: View {\n  \
    \  var choice: String\n```\n\nThis defines a variable called `choice` that can\
    \ hold a `String`. To pass data to this structure, we can load this structure\
    \ by calling the structure name (`FileView`) followed by this `choice` variable\
    \ as a parameter like this:\n\n```\nFileView(choice: \"Heads\")\n```\n\nWhen passing\
    \ data to a structure stored in the same file, we just need to follow this two-step\
    \ process:\n\n- Declare one or more variables inside the structure to receive\
    \ data.\n- Call that structure using its variables as parameters.\n\nHowever,\
    \ when passing data to a structure stored in a separate file, there’s an additional\
    \ step necessary. Because a structure stored in a separate file also contains\
    \ a second structure that displays the user interface in the Canvas pane, this\
    \ preview structure must include the structure’s parameter and pass it data as\
    \ well like this:\n\n```\nstruct SeparateFileView_Previews: PreviewProvider {\n\
    \    static var previews: some View {\n        SeparateFileView(passedData: \"\
    \")\n    }\n}\n```\n\nTo see how to pass data between structures, follow these\
    \ steps:\n\n1. Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as `NavigationStackPassData`.\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Edit the `struct ContentView` structure like this:\n\n```swift\nstruct\
    \ ContentView: View {\n    var body: some View {\n        NavigationStack {\n\
    \            VStack (spacing: 26) {\n                Text(\"Choose Heads or Tails\"\
    )\n                NavigationLink(destination: FileView(choice: \"Heads\")) {\n\
    \                    Text(\"Heads\")\n                }\n                NavigationLink(destination:\
    \ SeparateFileView(passedData: \"Tails\")) {\n                    Text(\"Tails\"\
    )\n                }\n                .navigationTitle(\"Flip a Coin\")\n    \
    \        }\n        }\n    }\n}\n```\n\nThe preceding code defines two `NavigationLink`s\
    \ where one calls a structure called `FileView` with a parameter of `choice:`\
    \ that gets passed `\"Heads\"`. The second `NavigationLink` calls a structure\
    \ called `SeparateFileView` with a parameter of `passedData:` that gets passed\
    \ `\"Tails\"`.\n\n4. Add a new structure underneath the `struct ContentView` like\
    \ this:\n\n```swift\nstruct FileView: View {\n    var choice: String\n    var\
    \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
    \ {\n                Spacer()\n                Text(\"You chose = \\(choice)\"\
    )\n                Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n```\n\nThis `FileView` structure declares a `choice` variable that\
    \ can hold a `String`. Then it displays this `choice` variable in a `Text` view\
    \ that shows `\"You chose = \"`. The entire `ContentView` file should look like\
    \ this:\n\n```swift\nimport SwiftUI\nstruct ContentView: View {\n    var body:\
    \ some View {\n        NavigationStack {\n            VStack (spacing: 26) {\n\
    \                Text(\"Choose Heads or Tails\")\n                NavigationLink(destination:\
    \ FileView(choice: \"Heads\")) {\n                    Text(\"Heads\")\n      \
    \          }\n                NavigationLink(destination: SeparateFileView(passedData:\
    \ \"Tails\")) {\n                    Text(\"Tails\")\n                }\n    \
    \            .navigationTitle(\"Flip a Coin\")\n            }\n        }\n   \
    \ }\n}\nstruct FileView: View {\n    var choice: String\n    var body: some View\
    \ {\n        HStack {\n            Spacer()\n            VStack {\n          \
    \      Spacer()\n                Text(\"You chose = \\(choice)\")\n          \
    \      Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\nThis code creates a structure\
    \ called `FileView`, but now we need to create a second structure called `SeparateFileView`\
    \ that declares a `passedData` `String` variable.\n\n5. Choose File ➤ New ➤ File.\
    \ A dialog appears (see Figure 17-4).\n6. Click iOS near the top of the dialog,\
    \ click Swift File, and then click Next. Xcode asks for a name to give your newly\
