    **图 4-11** 对齐文本的三种方式


    - **左对齐** – 文本沿左边缘对齐。

    - **居中** – 每行文本显示在左边缘和右边缘的中间。

    - **右对齐** – 文本沿右边缘对齐。


    你可以通过使用 `.multilineTextAlignment` 修饰符，或在属性检查器中选择文本对齐选项来定义文本对齐，如图 4-12 所示。


    ![](img/329781_7_En_4_Fig12_HTML.jpg)


    一张裁剪后的窗口截图。其中包含文本、辅助功能和字体选项。字体选项中，对齐选项被一个边界框高亮显示。


    **图 4-12** 在检查器面板中对齐文本

