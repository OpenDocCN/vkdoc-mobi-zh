    \n1.  Scroll the vertical grid up and down to see all the numbered squares.\n\n\
    Notice that when filling out a LazyHGrid, SwiftUI places each item in a separate\
    \ row. That’s why circle 1 appears in the top row, circle 2 appears in the second\
    \ row, circle 3 appears in the third row, and circle 4 appears back in the top\
    \ row again.\n\nThe same holds true when filling out the LazyVGrid except SwiftUI\
    \ places each item in a separate column. Square 1 appears in the first column,\
    \ square 2 appears in the second column, square 3 appears in the third column,\
    \ and square 4 appears back in the first column again.\n\nNote\n\nThe scroll indicator\
    \ only appears when the grid cannot show all items at the same time. When displaying\
    \ three rows or three columns, all items can be visible, so the scroll indicator\
    \ does not need to appear.\n\n## Adjusting Spacing Between Rows/Columns\n\nBy\
    \ creating an array of GridItem, we can define the number of rows/columns in a\
    \ grid. For additional customization, we can also define the spacing between rows\
    \ and columns. Three ways to define spacing between rows/columns in a grid include\n\
    \n*   .fixed\n\n*   .flexible\n\n*   .adaptive\n\nThe .fixed option lets you define\
    \ a decimal value (CGFloat data type) that creates a specific spacing amount.\
    \ Figure [19-4](#329781_7_En_19_Chapter.xhtml#Fig4) shows different fixed spacing\
    \ options and how they affect the appearance of rows and columns in grids.\n\n\
    ![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig4_HTML.jpg)\n\nA diagram illustrates\
    \ numbers 1 to 10 arranged in three rows and columns that are horizontally and\
    \ vertically inside circle and square boxes. A snippet of code is below the diagram.\n\
    \nFigure 19-4\n\nVarious .fixed spacing options for a grid\n\nNote\n\nIn Figure\
    \ [19-4](#329781_7_En_19_Chapter.xhtml#Fig4), all GridItem elements in the array\
    \ use the same .fixed size value, but you can give each GridItem different size\
    \ values if you want.\n\nDefining a .fixed value for spacing rows and columns\
    \ in a grid will give predictable results on any iOS device. However, a .fixed\
    \ value may not always look good on smaller or larger iOS device screens. In case\
    \ you want to create grids that can change based on different screen sizes, use\
    \ .flexible or .adaptive instead.\n\nThe .flexible option tries to expand spacing\
    \ between rows/columns as much as possible. On the other hand, the .adaptive option\
    \ tries to shrink spacing between rows/columns as much as possible. Both the .flexible\
    \ and .adaptive options let you define a minimum and a maximum value. This defines\
    \ the range of values the grid spacing can use.\n\nIf no option is chosen, the\
    \ default value is .flexible with a maximum value of .infinity. To see how the\
    \ .fixed, .flexible, and .adaptive options work, follow these steps:\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig5_HTML.jpg)\n\
    \nA diagram illustrates numbers 1 to 10 arranged in three rows vertically inside\
    \ circles, a snippet of code below it.\n\nFigure 19-5\n\nThe LazyHGrid expands\
    \ the spacing between rows\n\n1.  Make sure to load the previous project in Xcode\
    \ ( “GridSimple”).\n\n2.  Edit the array as follows to define three rows in the\
    \ LazyHGrid and three columns in the LazyVGrid:\n\n```\n    let gridItems = [GridItem(.fixed(120)),\n\
    \    GridItem(.fixed(120)),\n    GridItem(.fixed(120))\n    ]\n    ```\n\nNotice\
    \ that this separates the rows and columns in the grid by a fixed amount (see\
    \ Figure [19-4](#329781_7_En_19_Chapter.xhtml#Fig4)).\n\n3.  Edit the array as\
