    \ and canary. The other section has tarantula and goldfish.\n\nFigure 13-4\n\n\
    Displaying the contents of a List in sections\n\nTo define sections, you need\
    \ to create two structures. One structure defines the section headings, and the\
    \ second structure defines the data you want to display. To define the section\
    \ headings, you need to define\n\n*   A String constant to hold each section’s\
    \ name\n\n*   An array constant to hold an array of structures that contain the\
    \ actual data to display\n\n*   An ID that defines a unique ID for each section\n\
    \nThe structure name must be defined as Identifiable to create a unique ID such\
    \ as\n\n```\nstruct SectionHeading: Identifiable {\nlet name: String\nlet animalList:\
    \ [Animals]\nlet id = UUID()\n}\n```\n\nThe preceding structure uses “animalList”\
    \ to store an array of structures called Animals. This Animals structure needs\n\
    \n*   A String constant to hold the data you want to display in the List\n\n*\
    \   An ID that defines a unique ID for each item in the List\n\nThis second structure\
    \ must be defined as Hashable and Identifiable such as\n\n```\nstruct Animals:\
    \ Hashable, Identifiable {\nlet pet: String\nlet id = UUID()\n}\n```\n\nFinally,\
    \ you can create an array that defines the sections and the items within each\
    \ section such as\n\n```\nvar myAnimals = [\nSectionHeading(name: \"Mammals\"\
    ,\nanimalList: [\nAnimals(pet: \"Cat\"),\nAnimals(pet: \"Dog\"),\nAnimals(pet:\
    \ \"Ferret\"),\nAnimals(pet: \"Hamster\")])\n]\n```\n\nThen to display items in\
    \ a List, you need to use nested ForEach loops. The outer ForEach loop defines\
    \ the section names such as\n\n```\nForEach(myAnimals) { heading in\nSection(header:\
    \ Text(\"\\(heading.name) Section\")) {\n}\n}\n```\n\nThen the inner ForEach loop\
    \ defines the items to appear within each section such as\n\n```\nForEach(heading.animalList)\
    \ { creature in\nText(creature.pet)\n}\n```\n\nTo see how to create a List divided\
    \ into sections, follow these steps:\n\n1.  Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “ListSections.”\n\n2.  Click the ContentView\
    \ file in the Navigator pane.\n\n3.  Define a structure under the struct ContentView:\
    \ some View line to define the data you want to display in the List like this:\n\
    \n```\n    struct Animals: Hashable, Identifiable {\n    let pet: String\n   \
    \ let id = UUID()\n    }\n    ```\n\n4.  Add a second structure underneath to\
    \ define the section names to display in the List like this:\n\n```\n    struct\
    \ SectionHeading: Identifiable {\n    let name: String\n    let animalList: [Animals]\n\
    \    let id = UUID()\n    }\n    ```\n\n5.  Add an array to list the sections\
    \ and the items to appear within each section like this:\n\n```\n    var myAnimals\
    \ = [\n    SectionHeading(name: \"Mammals\",\n    animalList: [\n    Animals(pet:\
    \ \"Cat\"),\n    Animals(pet: \"Dog\"),\n    Animals(pet: \"Ferret\"),\n    Animals(pet:\
    \ \"Hamster\")]),\n    SectionHeading(name: \"Reptiles\",\n    animalList: [\n\
    \    Animals(pet: \"Turtle\"),\n    Animals(pet: \"Lizard\")]),\n    SectionHeading(name:\
    \ \"Birds\",\n    animalList: [\n    Animals(pet: \"Parrot\"),\n    Animals(pet:\
    \ \"Canary\")]),\n    SectionHeading(name: \"Other\",\n    animalList: [\n   \
    \ Animals(pet: \"Tarantula\"),\n    Animals(pet: \"Goldfish\")])\n    ]\n    ```\n\
    \n6.  Add a List inside the var body: some View like this:\n\n```\n    var body:\
    \ some View {\n    List {\n    }\n    ```\n\n7.  Add a ForEach loop inside the\
    \ List to define the section name like this:\n\n```\n    var body: some View {\n\
    \    List {\n    ForEach(myAnimals) { heading in\n    Section(header: Text(\"\\\
    (heading.name) Section\")) {\n    }\n    }\n    }\n    ```"
  trans: "\n# 在列表中显示结构体数组\n\n之前的代码使用 `ForEach` 循环通过索引值获取数组项。另一种存储数据的方法是使用结构体，然后创建结构体数组。\
    \  \n这样做的目的是定义你想要存储的数据，同时附带一个唯一 ID，你可以用这个 ID 来标识每个结构体，例如：\n\n```\nstruct Animals:\
    \ Identifiable {\n    let pet: String\n    let id = UUID()\n}\n```\n\n一旦定义了 `Identifiable`\
    \ 结构体，就可以像这样将其存储在数组中：\n\n```\nvar myAnimals = [\n    Animals(pet: \"Cat\"),\n\
    \    Animals(pet: \"Dog\"),\n    Animals(pet: \"Turtle\"),\n    Animals(pet: \"\
    Ferret\"),\n    Animals(pet: \"Parrot\"),\n    Animals(pet: \"Goldfish\"),\n \
    \   Animals(pet: \"Lizard\"),\n    Animals(pet: \"Canary\"),\n    Animals(pet:\
    \ \"Tarantula\"),\n    Animals(pet: \"Hamster\")\n]\n```\n\n这个数组不仅在 `pet` 字段中存储了字符串，还通过\
    \ ID 唯一标识了每个结构体。现在，你可以使用这个唯一 ID 在 `List` 中显示每个项，如下所示：\n\n```\nList(myAnimals)\
    \ {\n    Text($0.pet)\n}\n```\n\n请注意，上述代码不需要循环。要了解这段代码的工作原理，请按照以下步骤操作：\n\n1. \
    \ 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"ListOfStructures\"。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `struct ContentView: some View` 行下方定义一个结构体和一个数组，如下所示：\n\n    ```\n\
    \    struct ContentView: View {\n        struct Animals: Identifiable {\n    \
    \        let pet: String\n            let id = UUID()\n        }\n        var\
    \ myAnimals = [\n            Animals(pet: \"Cat\"),\n            Animals(pet:\
    \ \"Dog\"),\n            Animals(pet: \"Turtle\"),\n            Animals(pet: \"\
    Ferret\"),\n            Animals(pet: \"Parrot\"),\n            Animals(pet: \"\
    Goldfish\"),\n            Animals(pet: \"Lizard\"),\n            Animals(pet:\
    \ \"Canary\"),\n            Animals(pet: \"Tarantula\"),\n            Animals(pet:\
    \ \"Hamster\")\n        ]\n    ```\n\n4.  在 `var body: some View` 内部添加一个 `List`，如下所示：\n\
    \n    ```\n    var body: some View {\n        List(myAnimals) {\n            Text($0.pet)\n\
    \        }\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n    import\
    \ SwiftUI\n\n    struct ContentView: View {\n        struct Animals: Identifiable\
    \ {\n            let pet: String\n            let id = UUID()\n        }\n   \
    \     var myAnimals = [\n            Animals(pet: \"Cat\"),\n            Animals(pet:\
    \ \"Dog\"),\n            Animals(pet: \"Turtle\"),\n            Animals(pet: \"\
    Ferret\"),\n            Animals(pet: \"Parrot\"),\n            Animals(pet: \"\
    Goldfish\"),\n            Animals(pet: \"Lizard\"),\n            Animals(pet:\
    \ \"Canary\"),\n            Animals(pet: \"Tarantula\"),\n            Animals(pet:\
    \ \"Hamster\")\n        ]\n        var body: some View {\n            List(myAnimals)\
    \ {\n                Text($0.pet)\n            }\n        }\n    }\n\n    struct\
    \ ContentView_Previews: PreviewProvider {\n        static var previews: some View\
    \ {\n            ContentView()\n        }\n    }\n    ```\n\n请注意，与之前需要 `ForEach`\
    \ 循环的版本相比，创建 `List` 的代码要简洁得多。\n\n# 在列表中创建分组\n\n如果 `List` 中显示了很多项，那么滚动浏览所有这些数据以找到想要的项可能会很困难。为了解决这个问题，列表允许你创建分区，如图\
    \ 13-4 所示。\n\n![](img/329781_7_En_13_Fig4_HTML.png)  \n一张截图显示了哺乳动物、爬行动物、鸟类和其他分区下的生物列表。哺乳动物分区包括猫、狗、雪貂和仓鼠。乌龟和蜥蜴属于爬行动物分区。鸟类分区有鹦鹉和金丝雀。其他分区有狼蛛和金鱼。\n\
    \n**图 13-4** — 按分区显示 `List` 的内容\n\n要定义分区，你需要创建两个结构体。一个结构体定义分区标题，另一个结构体定义要显示的数据。要定义分区标题，你需要定义：\n\
    \n- 一个 `String` 常量，用于保存每个分区的名称\n- 一个数组常量，用于保存包含实际显示数据的结构体数组\n- 一个 `ID`，用于为每个分区定义唯一\
    \ ID\n\n结构体名称必须定义为 `Identifiable` 以创建唯一 ID，例如：\n\n```\nstruct SectionHeading:\
    \ Identifiable {\n    let name: String\n    let animalList: [Animals]\n    let\
    \ id = UUID()\n}\n```\n\n上述结构体使用 `animalList` 来存储一个名为 `Animals` 的结构体数组。这个 `Animals`\
    \ 结构体需要：\n\n- 一个 `String` 常量，用于保存在 `List` 中要显示的数据\n- 一个 `ID`，用于为 `List` 中的每个项定义唯一\
    \ ID\n\n第二个结构体必须定义为 `Hashable` 和 `Identifiable`，例如：\n\n```\nstruct Animals: Hashable,\
    \ Identifiable {\n    let pet: String\n    let id = UUID()\n}\n```\n\n最后，你可以创建一个数组来定义分区以及每个分区内的项，例如：\n\
    \n```\nvar myAnimals = [\n    SectionHeading(name: \"Mammals\",\n        animalList:\
    \ [\n            Animals(pet: \"Cat\"),\n            Animals(pet: \"Dog\"),\n\
    \            Animals(pet: \"Ferret\"),\n            Animals(pet: \"Hamster\")])\n\
    \    ]\n```\n\n然后，要在 `List` 中显示项，你需要使用嵌套的 `ForEach` 循环。外层的 `ForEach` 循环定义分区名称，例如：\n\
    \n```\nForEach(myAnimals) { heading in\n    Section(header: Text(\"\\(heading.name)\
    \ Section\")) {\n    }\n}\n```\n\n然后，内层的 `ForEach` 循环定义每个分区内要显示的项，例如：\n\n```\n\
    ForEach(heading.animalList) { creature in\n    Text(creature.pet)\n}\n```\n\n\
    要了解如何创建分成多个分区的 `List`，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"\
    ListSections\"。\n2.  在导航器窗格中点击 `ContentView` 文件。\n3.  在 `struct ContentView: some\
    \ View` 行下方定义一个结构体，以定义要在 `List` 中显示的数据，如下所示：\n\n    ```\n    struct Animals: Hashable,\
    \ Identifiable {\n        let pet: String\n        let id = UUID()\n    }\n  \
    \  ```\n\n4.  在其下方添加第二个结构体，以定义要在 `List` 中显示的分区名称，如下所示：\n\n    ```\n    struct\
    \ SectionHeading: Identifiable {\n        let name: String\n        let animalList:\
    \ [Animals]\n        let id = UUID()\n    }\n    ```\n\n5.  添加一个数组，列出分区以及每个分区内要显示的项，如下所示：\n\
    \n    ```\n    var myAnimals = [\n        SectionHeading(name: \"Mammals\",\n\
    \            animalList: [\n                Animals(pet: \"Cat\"),\n         \
    \       Animals(pet: \"Dog\"),\n                Animals(pet: \"Ferret\"),\n  \
    \              Animals(pet: \"Hamster\")]),\n        SectionHeading(name: \"Reptiles\"\
    ,\n            animalList: [\n                Animals(pet: \"Turtle\"),\n    \
    \            Animals(pet: \"Lizard\")]),\n        SectionHeading(name: \"Birds\"\
    ,\n            animalList: [\n                Animals(pet: \"Parrot\"),\n    \
    \            Animals(pet: \"Canary\")]),\n        SectionHeading(name: \"Other\"\
    ,\n            animalList: [\n                Animals(pet: \"Tarantula\"),\n \
    \               Animals(pet: \"Goldfish\")])\n    ]\n    ```\n\n6.  在 `var body:\
    \ some View` 内部添加一个 `List`，如下所示：\n\n    ```\n    var body: some View {\n     \
    \   List {\n        }\n    ```\n\n7.  在 `List` 内部添加一个 `ForEach` 循环来定义分区名称，如下所示：\n\
    \n    ```\n    var body: some View {\n        List {\n            ForEach(myAnimals)\
    \ { heading in\n                Section(header: Text(\"\\(heading.name) Section\"\
    )) {\n                }\n            }\n        }\n    }\n    ```\n"
- fmt: "### 关于 `Text` 视图和 `ForEach` 循环\n\n注意，`Text` 视图显示了每个分区的 `name` 属性，该属性之前由数组\
    \ `(\"Mammals\", \"Reptiles\", \"Birds\", \"Other\")` 定义。\n\n8.  添加第二个 `ForEach`\
    \ 循环来定义要在 `List` 中显示的实际数据，如下所示：\n\n```swift\nvar body: some View {\n    List {\n\
    \        ForEach(myAnimals) { heading in\n            Section(header: Text(\"\\\
    (heading.name) Section\")) {\n                ForEach(heading.animalList) { creature\
    \ in\n                    Text(creature.pet)\n                }\n            }\n\
    \        }\n    }\n}\n```\n\n注意，这个第二个 `ForEach` 循环使用了之前由数组 `(\"Cat\", \"Dog\"\
    , \"Ferret\", \"Hamster\", \"Turtle\", \"Lizard\", \"Parrot\", \"Canary\", \"\
    Tarantula\", \"Goldfish\")` 定义的 `pet` 属性。整个 `ContentView` 文件应该如下所示：\n\n```swift\n\
    import SwiftUI\nstruct ContentView: View {\n    struct Animals: Hashable, Identifiable\
    \ {\n        let pet: String\n        let id = UUID()\n    }\n    struct SectionHeading:\
    \ Identifiable {\n        let name: String\n        let animalList: [Animals]\n\
    \        let id = UUID()\n    }\n    var myAnimals = [\n        SectionHeading(name:\
    \ \"Mammals\",\n                       animalList: [\n                       \
    \    Animals(pet: \"Cat\"),\n                           Animals(pet: \"Dog\"),\n\
    \                           Animals(pet: \"Ferret\"),\n                      \
    \     Animals(pet: \"Hamster\")]),\n        SectionHeading(name: \"Reptiles\"\
    ,\n                       animalList: [\n                           Animals(pet:\
    \ \"Turtle\"),\n                           Animals(pet: \"Lizard\")]),\n     \
    \   SectionHeading(name: \"Birds\",\n                       animalList: [\n  \
    \                         Animals(pet: \"Parrot\"),\n                        \
    \   Animals(pet: \"Canary\")]),\n        SectionHeading(name: \"Other\",\n   \
    \                    animalList: [\n                           Animals(pet: \"\
    Tarantula\"),\n                           Animals(pet: \"Goldfish\")])\n    ]\n\
    \    var body: some View {\n        List {\n            ForEach(myAnimals) { heading\
    \ in\n                Section(header: Text(\"\\(heading.name) Section\")) {\n\
    \                    ForEach(heading.animalList) { creature in\n             \
    \           Text(creature.pet)\n                    }\n                }\n   \
    \         }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n## 向 `List` 添加行分隔线\n\n列表通常会在项目之间显示线条。`SwiftUI` 允许你选择隐藏或显示这些线条，或者用特定颜色给线条着色。\n\
    \n要隐藏或显示 `List` 中的线条，请像这样使用 `.listRowSeparator` 修饰符，并传入 `.visible` 或 `.hidden`：\n\
    \n```swift\n.listRowSeparator(.hidden)\n```\n\n要为 `List` 中的分隔线着色，请像这样使用 `.listRowSeparatorTint`\
    \ 修饰符，并传入一个颜色值，例如 `.red` 或 `.blue`：\n\n```swift\n.listRowSeparatorTint(.red)\n\
    ```\n\n你可以在 `List` 内部同时使用这两个修饰符，来修改用于定义 `List` 显示内容的 `ForEach` 循环。要了解如何在 `List`\
    \ 中显示和着色行分隔线，请按照以下步骤操作：\n\n1.  创建一个新的 `SwiftUI iOS App` 项目，并为其指定任意名称，例如 `\"ListLines\"\
    `。\n2.  在导航器窗格中单击 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下面添加一个数组，如下所示：\n\
    \    ```swift\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"\
    Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
    \    ```\n4.  在 `var body: some View` 行下面的 `VStack` 内添加一个 `List`，如下所示：\n    ```swift\n\
    \    var body: some View {\n        VStack {\n            List {\n           \
    \ }\n        }\n    }\n    ```\n5.  在 `List` 内部添加一个 `ForEach` 循环，以查找数组中的所有项目，索引从\
    \ `0` 到数组项目总数减 `1`，如下所示：\n    ```swift\n    var body: some View {\n        VStack\
    \ {\n            List {\n                ForEach(0...myArray.count - 1, id: \\\
    .self) { index in\n                    Text(myArray[index])\n                }\n\
    \            }\n        }\n    }\n    ```\n6.  向 `ForEach` 循环添加一个 `.listRowSeparator`\
    \ 修饰符，如下所示：\n    ```swift\n    var body: some View {\n        VStack {\n     \
    \       List {\n                ForEach(0...myArray.count - 1, id: \\.self) {\
    \ index in\n                    Text(myArray[index])\n                }.listRowSeparator(.visible)\n\
    \            }\n        }\n    }\n    ```\n    这个 `.listRowSeparator` 会显示线条 (`.visible`)。\n\
    7.  向 `ForEach` 循环添加一个 `.listRowSeparatorTint` 修饰符，如下所示：\n    ```swift\n    var\
    \ body: some View {\n        VStack {\n            List {\n                ForEach(0...myArray.count\
    \ - 1, id: \\.self) { index in\n                    Text(myArray[index])\n   \
    \             }.listRowSeparator(.visible)\n                .listRowSeparatorTint(.red)\n\
    \            }\n        }\n    }\n    ```\n    你可以选择任何你想要的颜色，例如 `.orange` 或 `.purple`。整个\
    \ `ContentView` 文件应该如下所示：\n    ```swift\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        var myArray = [\"Cat\", \"Dog\", \"Turtle\", \"Ferret\", \"\
    Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\", \"Hamster\"]\n\
    \        var body: some View {\n            VStack {\n                List {\n\
    \                    ForEach(0...myArray.count - 1, id: \\.self) { index in\n\
    \                        Text(myArray[index])\n                    }.listRowSeparator(.visible)\n\
    \                    .listRowSeparatorTint(.red)\n                }\n        \
    \    }\n        }\n    }\n    struct ContentView_Previews: PreviewProvider {\n\
    \        static var previews: some View {\n            ContentView()\n       \
    \ }\n    }\n    ```\n8.  在画布窗格中单击“Live”图标。注意，`List` 会以你定义的颜色在每一项之间显示线条。"
  raw: "Notice that a Text view displays the “name” property of each section, which\
    \ was previously defined by the array (“Mammals”, “Reptiles”, “Birds”, and “Other”).\n\
    \n8.  Add a second ForEach loop to define the actual data to display in the List\
    \ like this:\n\n```\n    var body: some View {\n    List {\n    ForEach(myAnimals)\
    \ { heading in\n    Section(header: Text(\"\\(heading.name) Section\")) {\n  \
    \  ForEach(heading.animalList) { creature in\n    Text(creature.pet)\n    }\n\
    \    }\n    }\n    }\n    ```\n\nNotice that this second ForEach loop uses the\
    \ “pet” property that was previously defined by the array (“Cat”, “Dog”, “Ferret”,\
    \ “Hamster”, “Turtle”, “Lizard”, “Parrot”, “Canary”, “Tarantula”, “Goldfish”).\
    \ The entire ContentView file should look like this:\n\n```\nimport SwiftUI\n\
    struct ContentView: View {\nstruct Animals: Hashable, Identifiable {\nlet pet:\
    \ String\nlet id = UUID()\n}\nstruct SectionHeading: Identifiable {\nlet name:\
    \ String\nlet animalList: [Animals]\nlet id = UUID()\n}\nvar myAnimals = [\nSectionHeading(name:\
    \ \"Mammals\",\nanimalList: [\nAnimals(pet: \"Cat\"),\nAnimals(pet: \"Dog\"),\n\
    Animals(pet: \"Ferret\"),\nAnimals(pet: \"Hamster\")]),\nSectionHeading(name:\
    \ \"Reptiles\",\nanimalList: [\nAnimals(pet: \"Turtle\"),\nAnimals(pet: \"Lizard\"\
    )]),\nSectionHeading(name: \"Birds\",\nanimalList: [\nAnimals(pet: \"Parrot\"\
    ),\nAnimals(pet: \"Canary\")]),\nSectionHeading(name: \"Other\",\nanimalList:\
    \ [\nAnimals(pet: \"Tarantula\"),\nAnimals(pet: \"Goldfish\")])\n]\nvar body:\
    \ some View {\nList {\nForEach(myAnimals) { heading in\nSection(header: Text(\"\
    \\(heading.name) Section\")) {\nForEach(heading.animalList) { creature in\nText(creature.pet)\n\
    }\n}\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nContentView()\n}\n}\n```\n\n## Adding Line Separators to a List\n\
    \nLists typically display lines in between items. SwiftUI lets you choose to hide\
    \ or display those lines or tint the lines with a specific color.\n\nTo hide or\
    \ display lines within a List, use the .listRowSeparator modifier with either\
    \ .visible or .hidden like this:\n\n```\n.listRowSeparator(.hidden)\n```\n\nTo\
    \ color the lines separating items in a List, use the .listRowSeparatorTint modifier\
    \ with a color such as .red or .blue like this:\n\n```\n.listRowSeparatorTint(.red)\n\
    ```\n\nYou can use both modifiers inside of a List to modify the ForEach loop\
    \ that defines what to display in a List. To see how to show and color line separators\
    \ in a List, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as “ListLines.”\n\n2.  Click the ContentView\
    \ file in the Navigator pane.\n\n3.  Add an array under the struct ContentView:\
    \ View line like this:\n\n    ```\n    var myArray = [\"Cat\", \"Dog\", \"Turtle\"\
    , \"Ferret\", \"Parrot\", \"Goldfish\", \"Lizard\", \"Canary\", \"Tarantula\"\
    , \"Hamster\"]\n    ```\n\n4.  Add a List inside the VStack under the var body:\
    \ some View line like this:\n\n    ```\n    var body: some View {\n    VStack\
    \ {\n    List {\n    }\n    }\n    }\n    ```\n\n5.  Add a ForEach loop inside\
    \ the List to find all the array items starting from 0 up to the total number\
