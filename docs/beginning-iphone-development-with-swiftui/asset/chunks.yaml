  raw: '### Defining the Opacity of an Image


    Another way to modify the appearance of an image is to define its opacity. An
    opacity of 0 means the image is invisible. An opacity of 1 means the image appears
    with no changes whatsoever. The closer the opacity is to 0, the fainter the image.
    The closer the opacity is to 1, the sharper the image.


    To use the opacity modifier, just define an opacity value from 0 to 1 like this:


    ```

    .opacity(0.75)

    ```


    Figure [5-17](#329781_7_En_5_Chapter.xhtml#Fig17) shows how different opacity
    values modify the appearance of an image.


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig17_HTML.jpg)


    A set of 3 commands for image, resizable, scaled to fill, frame width and height,
    and opacity values with their respective photographs of a cat sitting on a cloth.


    Figure 5-17


    Using different values for the .opacity modifier


    By changing the opacity of different views, you can stack them on top of each
    other within a ZStack to create interesting visual effects as shown in Figure
    [5-18](#329781_7_En_5_Chapter.xhtml#Fig18).


    ![](images/329781_7_En_5_Chapter/329781_7_En_5_Fig18_HTML.jpg)


    A set of commands for Z stack, image, resizable, scaled to fill, frame width and
    height, opacity, rounded rectangle, corner radius, fill, color, offset, text,
    and font with an opaque photograph of a cat sitting on a cloth and the text, Norwegian
    forest cat.


    Figure 5-18


    The .opacity modifier combined with the ZStack can create visual effects


    ## Summary


    Images are another way to provide information on the user interface. Images can
    be common geometric shapes such as circles, ellipses, and rounded rectangles,
    icons that you can find in the SF Symbols app, graphic images, or digital photographs
    you drag and drop into the Assets folder of an Xcode project.


    If you’re creating geometric shapes, you can fill them with solid colors, custom
    colors, or gradients to create an interesting visual blend of multiple colors.
    If you’re using SF Symbol icons, you can adjust their size using the .font modifier.
    If you’re using images stored in the Assets folder of your Xcode project, you
    can use the .resizable, .frame, and .aspectRatio/.scaleToFit/.scaleToFill modifiers
    to define the size and appearance of an image.


    To create extra visual effects, you can clip images into geometric shapes such
    as circles, add borders around images, add shadows around images, and modify the
    opacity. With so many different ways to adjust the appearance of images, you should
    be able to define an image to appear exactly the way you want it to look on your
    user interface.


    # 6. Responding to the User with Buttons and Segmented Controls


    Every user interface needs to display information to the user whether that information
    may be text or images. However, another feature of a user interface is to accept
    commands from the user. The simplest way to accept commands through a user interface
    is through buttons.


    Buttons represent a single command that can be as simple as a confirmation such
    as OK or Cancel. To create a button, you need to define


    *   The title that displays text on the button


    *   Swift code that runs when the user taps the button


    SwiftUI gives you two ways to create a button. The simplest way just defines the
    text to appear on the title followed by the Swift code to run when the user selects
    the button like this:


    ```

    Button("Click here") {

    // code to run

    }

    ```


    A second way to create a button gives you more flexibility in modifying the appearance
    of the text on the button such as


    ```

    Button {

    // code to run

    } label: {

    Text("Click here")

    .font(.largeTitle)

    .foregroundColor(.green)

    .padding()

    .border(Color.red, width: 6)

    }

    ```


    This second method uses a Text view to define the text that appears on the title.
    Then it uses the .font modifier to define the font size, the .foregroundColor
    modifier to display the text in green, the .padding modifier to add space around
    the Text view, and the .border modifier to add a red border with a width of 6
    points around the Text view.


    Instead of using a Text view to define the button’s title, you can also use a
    Label view to display both text and an icon like this:


    ```

    Button {

    // code to run

    } label: {

    Label("Image button", systemImage: "hare.fill")

    .font(.largeTitle)

    .foregroundColor(.purple)

    .padding()

    .border(Color.blue, width: 6)

    }

    ```


    This Label view defines text and an icon to appear and then uses the .font modifier
    to define the size of both the text and the icon. It uses the .foregroundColor
    modifier to display the text and icon in purple, adds space around the Label view
    using the .padding modifier, and uses the .border modifier to display a blue border
    with a width of 6 points around the Label view.


    You can also use an Image view to make an image appear as a button like this:


    ```

    Button {

    // code to run

    } label: {

    Image("browncat")

    .resizable()

    .frame(width: 150, height: 150)

    .clipShape(Circle())

    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))

    }

    ```


    This Image view uses an image (called “browncat”) stored in the Assets folder
    and then uses the .frame modifier to squeeze the image into a square with a width
    and height of 150\. Then it uses the .clipShape modifier to display the image
    within a circle followed by the .overlay modifier that displays a yellow border
    with a line width of 4.


    By using this second method to define the title of a button, you can see how you
    have more control over the appearance of the button’s title, especially compared
    with the simple way of defining a button with plain text as shown in Figure [6-1](#329781_7_En_6_Chapter.xhtml#Fig1).


    ![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig1_HTML.jpg)


    A snippet of code is on the left, and the respective outputs are on the right.
    The code is for defining 3 different buttons. 1\. plain text button. 2\. custom
    text button. 3\. image button with rabbit. 4\. a kitty image in a circle shape
    with a dark shaded outline.


    Figure 6-1


    Using a Text view, Label view, or an Image view to define a button’s title'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n### 定义图像的不透明度\n\
    \n另一种修改图像外观的方法是通过定义其不透明度。不透明度为 `0` 意味着图像完全不可见。不透明度为 `1` 意味着图像没有任何改变。不透明度越接近 `0`，图像越淡。不透明度越接近\
    \ `1`，图像越清晰。\n\n要使用 `opacity` 修饰符，只需定义一个从 `0` 到 `1` 的不透明度值，如下所示：\n\n```\n.opacity(0.75)\n\
    ```\n\n图 5-17 展示了不同的不透明度值如何修改图像的外观。\n\n![](img/329781_7_En_5_Fig17_HTML.jpg)\n\
    \n一组共 3 条命令，分别针对图像、可调整大小、缩放填充、框架宽高和不透明度值，以及相应的坐在布上的猫的照片。\n\n**图 5-17.** 对 `.opacity`\
    \ 修饰符使用不同的值\n\n通过改变不同视图的不透明度，你可以将它们堆叠在 `ZStack` 中，从而创造出有趣的视觉效果，如图 5-18 所示。\n\n\
    ![](img/329781_7_En_5_Fig18_HTML.jpg)\n\n一组命令，包括 `ZStack`、图像、可调整大小、缩放填充、框架宽高、不透明度、圆角矩形、圆角半径、填充、颜色、偏移、文本和字体，以及一张不透明的坐在布上的猫的照片和“挪威森林猫”文本。\n\
    \n**图 5-18.** `.opacity` 修饰符与 `ZStack` 结合可以创造视觉效果\n\n## 总结\n\n图像是在用户界面上提供信息的另一种方式。图像可以是常见的几何形状（如圆形、椭圆和圆角矩形）、可以在\
    \ SF Symbols 应用中找到的图标、图形图像，或者是你拖放到 Xcode 项目 Assets 文件夹中的数码照片。\n\n如果你正在创建几何形状，你可以使用纯色、自定义颜色或渐变色填充它们，以创建多种颜色的有趣视觉混合。如果你使用的是\
    \ SF Symbol 图标，你可以使用 `.font` 修饰符调整它们的大小。如果你使用的是存储在 Xcode 项目 Assets 文件夹中的图像，你可以使用\
    \ `.resizable`、`.frame` 和 `.aspectRatio`/`.scaleToFit`/`.scaleToFill` 修饰符来定义图像的大小和外观。\n\
    \n为了创建额外的视觉效果，你可以将图像裁剪成几何形状（如圆形）、在图像周围添加边框和阴影，以及修改不透明度。有了这么多调整图像外观的方法，你应该能够按照自己的意愿，精确地定义图像在用户界面上的显示效果。\n\
    \n# 6. 使用按钮和分段控件响应用户\n\n每个用户界面都需要向用户显示信息，无论是文本还是图像。然而，用户界面的另一个特性是接受用户的命令。通过用户界面接受命令的最简单方式是通过按钮实现。\n\
    \n按钮代表一个单一的命令，可以像确认（如“确定”或“取消”）一样简单。要创建一个按钮，你需要定义：\n\n-   按钮上显示文本的标题\n-   用户点击按钮时运行的\
    \ Swift 代码\n\nSwiftUI 为你提供了两种创建按钮的方法。最简单的方法只需定义标题中要显示的文本，后跟用户选择按钮时要运行的 Swift 代码，如下所示：\n\
    \n```\nButton(\"点击此处\") {\n    // 要运行的代码\n}\n```\n\n创建按钮的第二种方法为你提供了更大的灵活性，可以修改按钮上文本的外观，例如：\n\
    \n```\nButton {\n    // 要运行的代码\n} label: {\n    Text(\"点击此处\")\n        .font(.largeTitle)\n\
    \        .foregroundColor(.green)\n        .padding()\n        .border(Color.red,\
    \ width: 6)\n}\n```\n\n第二种方法使用 `Text` 视图来定义标题上显示的文本。然后，它使用 `.font` 修饰符定义字体大小，使用\
    \ `.foregroundColor` 修饰符将文本显示为绿色，使用 `.padding` 修饰符在 `Text` 视图周围添加间距，并使用 `.border`\
    \ 修饰符为 `Text` 视图添加一个宽度为 6 点的红色边框。\n\n除了使用 `Text` 视图来定义按钮的标题，你还可以使用 `Label` 视图同时显示文本和图标，如下所示：\n\
    \n```\nButton {\n    // 要运行的代码\n} label: {\n    Label(\"图片按钮\", systemImage: \"\
    hare.fill\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n\
    \        .padding()\n        .border(Color.blue, width: 6)\n}\n```\n\n这个 `Label`\
    \ 视图定义了要显示的文本和图标，然后使用 `.font` 修饰符定义文本和图标的大小。它使用 `.foregroundColor` 修饰符将文本和图标显示为紫色，使用\
    \ `.padding` 修饰符在 `Label` 视图周围添加间距，并使用 `.border` 修饰符在 `Label` 视图周围显示一个宽度为 6 点的蓝色边框。\n\
    \n你也可以使用 `Image` 视图来使图像像按钮一样显示，如下所示：\n\n```\nButton {\n    // 要运行的代码\n} label:\
    \ {\n    Image(\"browncat\")\n        .resizable()\n        .frame(width: 150,\
    \ height: 150)\n        .clipShape(Circle())\n        .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n}\n```\n\n这个 `Image` 视图使用了存储在 Assets 文件夹中的图像（名为 `\"browncat\"\
    `），然后使用 `.frame` 修饰符将图像压缩成一个宽高均为 150 的正方形。接着，它使用 `.clipShape` 修饰符将图像显示在一个圆形内，然后使用\
    \ `.overlay` 修饰符显示一个线宽为 4 的黄色边框。\n\n通过使用第二种方法来定义按钮的标题，你可以看到如何对按钮标题的外观拥有更多控制，特别是与使用纯文本定义按钮的简单方法相比，如图\
    \ 6-1 所示。\n\n![](img/329781_7_En_6_Fig1_HTML.jpg)\n\n左侧是一段代码片段，右侧是相应的输出。代码用于定义\
    \ 3 个不同的按钮：1. 纯文本按钮、2. 自定义文本按钮、3. 带有兔子的图片按钮、4. 一个带有深色阴影轮廓的圆形小猫图像。\n\n**图 6-1.**\
    \ 使用 `Text` 视图、`Label` 视图或 `Image` 视图定义按钮的标题\n"
- fmt: "# Running Code in a Button\n\nYou can store any code to run when the user\
    \ taps a button. One common type of code to run inside of a button is code that\
    \ changes a state. In SwiftUI, you can declare special variables as `State` variables\
    \ like this:\n\n```\n@State var colorMe = false\n```\n\nWhen you store updated\
    \ data in an ordinary variable, any other part of your program that uses that\
    \ variable has no idea that the data has been updated. To make sure every part\
    \ of your program receives any updated data stored in a variable can be tedious\
    \ and error-prone. That’s why SwiftUI offers `State` variables to solve this problem.\n\
    \nThe moment you change the value of a `State` variable, anything that uses that\
    \ `State` variable automatically gets the latest data stored in that `State` variable\
    \ without the need to write any extra code. When a variable holds one value, it’s\
    \ in one state, and when that same variable holds a different value, that’s another\
    \ state. SwiftUI `State` variables simply automate the process of making sure\
    \ every part of your program knows about changes in a variable’s value or state.\n\
    \nThe preceding example creates a `State` variable by using the `@State` keyword\
    \ followed by a variable declaration (`var`) that defines a variable’s name (`colorMe`),\
    \ data type (Boolean type inferred), and initial value (`false`).\n\nWhen using\
    \ `State` variables that represent Boolean data types, one common command to use\
    \ is the `.toggle()` command, which changes a Boolean variable from `true` to\
    \ `false` (or `false` to `true`) such as\n\n```\ncolorMe.toggle()\n```\n\nIf the\
    \ value of the `colorMe` `State` variable is `true`, then the `.toggle()` command\
    \ changes the `colorMe` value to `false`. If the value of the `colorMe` `State`\
    \ variable is `false`, then the `.toggle()` command changes the `colorMe` value\
    \ to `true`.\n\nBoolean `State` variables are often used to make if-else decisions.\
    \ Normally, modifiers just contain a single value such as\n\n```\n.fill(Color.green)\n\
    ```\n\nHowever, if you embed an if-else ternary operator in a modifier, you can\
    \ duplicate the traditional if-else statement in a single line like this:\n\n\
    ```\n.fill(colorMe ? Color.green : Color.gray)\n```\n\nThe preceding Swift code\
    \ checks the Boolean value of the `colorMe` variable. If it’s `true`, then it\
    \ uses the color green. Otherwise, it uses the color gray.\n\nLet’s see how to\
    \ put together `State` variables, the `.toggle()` command, and the if-else ternary\
    \ operator to make a button respond to the user.\n\n1.  Create a new SwiftUI iOS\
    \ App project and give it any name you wish such as `Buttons`.\n\n2.  Click the\
    \ `ContentView` file in the Navigator pane.\n\n3.  Add a `State` variable underneath\
    \ the `struct ContentView: View` line like this:\n\n    ```\n    struct ContentView:\
    \ View {\n    @State var colorMe = false\n    var body: some View {\n    ```\n\
    \n    This defines a `State` variable called `colorMe` (the exact name is arbitrary)\
    \ and sets its initial value as `false`, defining it to hold only Boolean data\
    \ types.\n\n4.  Create a `VStack` with a spacing value of 28 inside the `var body:\
    \ some View` like this:\n\n    ```\n    struct ContentView: View {\n    @State\
    \ var colorMe = false\n    var body: some View {\n    VStack (spacing: 28) {\n\
    \    }\n    }\n    }\n    ```\n\n    The spacing of 28 will separate all views\
    \ inside the `VStack` so they don’t appear crowded together.\n\n5.  Type the following\
    \ inside the `VStack`:\n\n    ```\n    Rectangle()\n    .fill(colorMe ? Color.green\
    \ : Color.gray)\n    .frame(width: 250, height: 100)\n    ```\n\n    This creates\
    \ a rectangle where the `.frame` modifier defines its width as 250 and its height\
    \ as 100. Notice that the `.fill` modifier uses the `colorMe` Boolean `State`\
    \ variable to determine which color to display. If `colorMe` is `true`, then the\
    \ rectangle appears green. If `colorMe` is `false`, then the rectangle appears\
    \ gray.\n\n6.  Type the following underneath the `Rectangle()` inside the `VStack`\
    \ to create a plain button:\n\n    ```\n    Button(\"Plain text button\") {\n\
    \    colorMe.toggle()\n    }\n    ```\n\n    This defines a button that displays\
    \ plain text. Each time the user taps this `Button`, it uses the `.toggle()` command\
    \ to change the value of `colorMe` from `true` to `false` (or `false` to `true`).\n\
    \n7.  Type the following underneath the `Button` inside the `VStack` to create\
    \ a button that uses a customized `Text` view to display its title:\n\n    ```\n\
    \    Button {\n    colorMe.toggle()\n    } label: {\n    Text(\"Custom text button\"\
    )\n    .font(.largeTitle)\n    .foregroundColor(.green)\n    .padding()\n    .border(Color.red,\
    \ width: 6)\n    }\n    ```\n\n    This defines a button that also uses the `.toggle()`\
    \ command to change the Boolean value of the `colorMe` variable. However, it uses\
    \ a `Text` view to display the `Button`’s title. The `.font` modifier changes\
    \ the size of the `Text` view, the `.foregroundColor` modifier displays the text\
    \ in green, the `.padding` modifier adds space around the `Text` view, and the\
    \ `.border` modifier displays a red border, with a width of 6, around the `Text`\
    \ view.\n\n8.  Type the following underneath the previous `Button` inside the\
    \ `VStack` to define a button’s title using a `Label` view:\n\n    ```\n    Button\
    \ {\n    colorMe.toggle()\n    } label: {\n    Label(\"Image button\", systemImage:\
    \ \"hare.fill\")\n    .font(.largeTitle)\n    .foregroundColor(.purple)\n    .padding()\n\
    \    .border(Color.blue, width: 6)\n    }\n    ```\n\n    This defines a button\
    \ that uses the `.toggle()` command to change the Boolean value of the `colorMe`\
    \ variable. However, it uses a `Label` view to display text (\"Image button\"\
    ) along with an icon called `hare.fill`. Then it uses the `.font` modifier to\
    \ enlarge the text and icon and the `.foregroundColor` modifier to display the\
    \ text and icon in purple. Finally, it uses the `.padding` modifier to add space\
    \ around the `Label` view and places a blue border with a width of 6 around the\
    \ `Label` view.\n\n9.  Type the following underneath the previous `Button` inside\
    \ the `VStack` to define a button’s title using an `Image` view:\n\n    ```\n\
    \    Button {\n    colorMe.toggle()\n    } label: {\n    Image(\"browncat\")\n\
    \    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
    \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    ```\n\n\
    \    This defines a button that uses the `.toggle()` command to change the Boolean\
    \ value of the `colorMe` variable. Instead of displaying text for the `Button`’s\
    \ title, the `Image` view assumes there’s an image (called `browncat`) that’s\
    \ been stored in the `Assets` folder of the Xcode project. Then it uses the `.resizable`\
    \ and `.frame` modifiers to resize the image into a box 150 in width and 150 in\
    \ height. Finally, it uses the `.clipShape` modifier to shape the image in a circle\
    \ and uses the `.overlay` modifier to place a yellow circle border around the\
    \ image with a line width of 4.\n\nThe entire SwiftUI code should look like this:\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var colorMe = false\n\
    var body: some View {\nVStack (spacing: 28) {\nRectangle()\n.fill(colorMe ? Color.green\
    \ : Color.gray)\n.frame(width: 250, height: 100)\nButton(\"Plain text button\"\
    ) {\ncolorMe.toggle()\n}\nButton {\ncolorMe.toggle()\n} label: {\nText(\"Custom\
    \ text button\")\n.font(.largeTitle)\n.foregroundColor(.green)\n.padding()\n.border(Color.red,\
    \ width: 6)\n}\nButton {\ncolorMe.toggle()\n} label: {\nLabel(\"Image button\"\
    , systemImage: \"hare.fill\")\n.font(.largeTitle)\n.foregroundColor(.purple)\n\
    .padding()\n.border(Color.blue, width: 6)\n}\nButton {\ncolorMe.toggle()\n} label:\
    \ {\nImage(\"browncat\")\n.resizable()\n.frame(width: 150, height: 150)\n.clipShape(Circle())\n\
    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n}\n}\n}\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n10. Click the Live icon in the Canvas pane.\n\n11. Click any of the buttons.\
    \ Notice that each time you click a button, it toggles the `colorMe` Boolean variable\
    \ to alternate displaying green or gray in the rectangle."
  raw: "## Running Code in a Button\n\nYou can store any code to run when the user\
    \ taps a button. One common type of code to run inside of a button is code that\
    \ changes a state. In SwiftUI, you can declare special variables as State variables\
    \ like this:\n\n```\n@State var colorMe = false\n```\n\nWhen you store updated\
    \ data in an ordinary variable, any other part of your program that uses that\
    \ variable has no idea that the data has been updated. To make sure every part\
    \ of your program receives any updated data stored in a variable can be tedious\
    \ and error-prone. That’s why SwiftUI offers State variables to solve this problem.\n\
    \nThe moment you change the value of a State variable, anything that uses that\
    \ State variable automatically gets the latest data stored in that State variable\
    \ without the need to write any extra code. When a variable holds one value, it’s\
    \ in one state, and when that same variable holds a different value, that’s another\
    \ state. SwiftUI State variables simply automate the process of making sure every\
    \ part of your program knows about changes in a variable’s value or state.\n\n\
    The preceding example creates a State variable by using the @State keyword followed\
    \ by a variable declaration (var) that defines a variable’s name (colorMe), data\
    \ type (Boolean type inferred), and initial value (false).\n\nWhen using State\
    \ variables that represent Boolean data types, one common command to use is the\
    \ .toggle() command, which changes a Boolean variable from true to false (or false\
    \ to true) such as\n\n```\ncolorMe.toggle()\n```\n\nIf the value of the colorMe\
    \ State variable is true, then the .toggle() command changes the colorMe value\
    \ to false. If the value of the colorMe State variable is false, then the .toggle()\
    \ command changes the colorMe value to true.\n\nBoolean State variables are often\
    \ used to make if-else decisions. Normally, modifiers just contain a single value\
    \ such as\n\n```\n.fill(Color.green)\n```\n\nHowever, if you embed an if-else\
    \ ternary operator in a modifier, you can duplicate the traditional if-else statement\
    \ in a single line like this:\n\n```\n.fill(colorMe ? Color.green : Color.gray)\n\
    ```\n\nThe preceding Swift code checks the Boolean value of the “colorMe” variable.\
    \ If it’s true, then it uses the color green. Otherwise, it uses the color gray.\n\
    \nLet’s see how to put together State variables, the .toggle() command, and the\
    \ if-else ternary operator to make a button respond to the user.\n\n1.  Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as “Buttons.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Add a State variable\
    \ underneath the struct ContentView: View line like this:\n\n```\n    struct ContentView:\
    \ View {\n    @State var colorMe = false\n    var body: some View {\n    ```\n\
    \nThis defines a State variable called colorMe (the exact name is arbitrary) and\
    \ sets its initial value as false, defining it to hold only Boolean data types.\n\
    \n4.  Create a VStack with a spacing value of 28 inside the var body: some View\
    \ like this:\n\n```\n    struct ContentView: View {\n    @State var colorMe =\
    \ false\n    var body: some View {\n    VStack (spacing: 28) {\n    }\n    }\n\
    \    }\n    ```\n\nThe spacing of 28 will separate all views inside the VStack\
    \ so they don’t appear crowded together.\n\n5.  Type the following inside the\
    \ VStack:\n\n```\n    Rectangle()\n    .fill(colorMe ? Color.green : Color.gray)\n\
    \    .frame(width: 250, height: 100)\n    ```\n\nThis creates a rectangle where\
    \ the .frame modifier defines its width as 250 and its height as 100\\. Notice\
    \ that the .fill modifier uses the colorMe Boolean State variable to determine\
    \ which color to display. If colorMe is true, then the rectangle appears green.\
    \ If colorMe is false, then the rectangle appears gray.\n\n6.  Type the following\
    \ underneath the Rectangle() inside the VStack to create a plain button:\n\n```\n\
    \    Button(\"Plain text button\") {\n    colorMe.toggle()\n    }\n    ```\n\n\
    This defines a button that displays plain text. Each time the user taps this Button,\
    \ it uses the .toggle() command to change the value of colorMe from true to false\
    \ (or false to true).\n\n7.  Type the following underneath the Button inside the\
    \ VStack to create a button that uses a customized Text view to display its title:\n\
    \n```\n    Button {\n    colorMe.toggle()\n    } label: {\n    Text(\"Custom text\
    \ button\")\n    .font(.largeTitle)\n    .foregroundColor(.green)\n    .padding()\n\
    \    .border(Color.red, width: 6)\n    }\n    ```\n\nThis defines a button that\
    \ also uses the .toggle() command to change the Boolean value of the colorMe variable.\
    \ However, it uses a Text view to display the Button’s title. The .font modifier\
    \ changes the size of the Text view, the .foregroundColor modifier displays the\
    \ text in green, the .padding modifier adds space around the Text view, and the\
    \ .border modifier displays a red border, with a width of 6, around the Text view.\n\
    \n8.  Type the following underneath the previous Button inside the VStack to define\
    \ a button’s title using a Label view:\n\n```\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Label(\"Image button\", systemImage: \"hare.fill\")\n   \
    \ .font(.largeTitle)\n    .foregroundColor(.purple)\n    .padding()\n    .border(Color.blue,\
    \ width: 6)\n    }\n    ```\n\nThis defines a button that uses the .toggle() command\
    \ to change the Boolean value of the colorMe variable. However, it uses a Label\
    \ view to display text (“Image button”) along with an icon called “hare.fill”.\
    \ Then it uses the .font modifier to enlarge the text and icon and the .foregroundColor\
    \ modifier to display the text and icon in purple. Finally, it uses the .padding\
    \ modifier to add space around the Label view and places a blue border with a\
    \ width of 6 around the Label view.\n\n9.  Type the following underneath the previous\
    \ Button inside the VStack to define a button’s title using an Image view:\n\n\
    ```\n    Button {\n    colorMe.toggle()\n    } label: {\n    Image(\"browncat\"\
    )\n    .resizable()\n    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n\
    \    .overlay(Circle().stroke(Color.yellow, lineWidth: 4))\n    }\n    ```\n\n\
    This defines a button that uses the .toggle() command to change the Boolean value\
    \ of the colorMe variable. Instead of displaying text for the Button’s title,\
    \ the Image view assumes there’s an image (called “browncat”) that’s been stored\
    \ in the Assets folder of the Xcode project. Then it uses the .resizable and .frame\
    \ modifiers to resize the image into a box 150 in width and 150 in height. Finally,\
    \ it uses the .clipShape modifier to shape the image in a circle and uses the\
    \ .overlay modifier to place a yellow circle border around the image with a line\
    \ width of 4.\n\nThe entire SwiftUI code should look like this:\n\n```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n    @State var colorMe = false\n  \
    \  var body: some View {\n    VStack (spacing: 28) {\n    Rectangle()\n    .fill(colorMe\
    \ ? Color.green : Color.gray)\n    .frame(width: 250, height: 100)\n    Button(\"\
    Plain text button\") {\n    colorMe.toggle()\n    }\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Text(\"Custom text button\")\n    .font(.largeTitle)\n  \
    \  .foregroundColor(.green)\n    .padding()\n    .border(Color.red, width: 6)\n\
    \    }\n    Button {\n    colorMe.toggle()\n    } label: {\n    Label(\"Image\
    \ button\", systemImage: \"hare.fill\")\n    .font(.largeTitle)\n    .foregroundColor(.purple)\n\
    \    .padding()\n    .border(Color.blue, width: 6)\n    }\n    Button {\n    colorMe.toggle()\n\
    \    } label: {\n    Image(\"browncat\")\n    .resizable()\n    .frame(width:\
    \ 150, height: 150)\n    .clipShape(Circle())\n    .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n10.  Click the Live icon in the Canvas pane.\n\n11.\
    \  Click any of the buttons. Notice that each time you click a button, it toggles\
    \ the colorMe Boolean variable to alternate displaying green or gray in the rectangle."
  trans: "\n# 在按钮中运行代码\n\n你可以在按钮中存储任意代码，以便在用户点击时执行。按钮内常见的一种代码类型是用于改变状态的代码。在 SwiftUI\
    \ 中，你可以像这样将特殊变量声明为 `State`（状态）变量：\n\n```\n@State var colorMe = false\n```\n\n\
    当你将更新后的数据存储到普通变量中时，程序中任何使用该变量的其他部分都无法获知数据已更新。要确保程序的所有部分都能接收到变量中存储的更新数据，过程可能既繁琐又容易出错。正因如此，SwiftUI\
    \ 提供了 `State` 变量来解决这个问题。\n\n当你更改 `State` 变量的值时，任何使用该 `State` 变量的部分都会自动获取该变量中存储的最新数据，无需编写任何额外代码。当一个变量持有一个值时，它处于一种状态；当同一个变量持有另一个不同的值时，则处于另一种状态。SwiftUI\
    \ 的 `State` 变量只是自动化了确保程序所有部分都能知晓变量值或状态变化的过程。\n\n前面的示例通过使用 `@State` 关键字创建了一个 `State`\
    \ 变量，后跟一个变量声明（`var`），该声明定义了变量的名称（`colorMe`）、数据类型（推断为布尔类型）和初始值（`false`）。\n\n在使用表示布尔数据类型的\
    \ `State` 变量时，一个常用的命令是 `.toggle()` 命令，它可以将布尔变量从 `true` 变为 `false`（或从 `false` 变为\
    \ `true`），例如：\n\n```\ncolorMe.toggle()\n```\n\n如果 `colorMe` 这个 `State` 变量的值是 `true`，那么\
    \ `.toggle()` 命令会将其值改为 `false`。如果 `colorMe` 这个 `State` 变量的值是 `false`，那么 `.toggle()`\
    \ 命令会将其值改为 `true`。\n\n布尔类型的 `State` 变量常用于进行 if-else 判断。通常情况下，修饰符只包含单个值，例如：\n\n\
    ```\n.fill(Color.green)\n```\n\n然而，如果在修饰符中嵌入一个 if-else 三元运算符，你可以将传统的 if-else 语句压缩成一行，像这样：\n\
    \n```\n.fill(colorMe ? Color.green : Color.gray)\n```\n\n上述 Swift 代码会检查 `colorMe`\
    \ 变量的布尔值。如果为 `true`，则使用绿色；否则，使用灰色。\n\n现在，让我们看看如何将 `State` 变量、`.toggle()` 命令和 if-else\
    \ 三元运算符结合起来，使按钮能够响应用户操作。\n\n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `Buttons`。\n\
    \n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct ContentView: View` 这行代码下方添加一个\
    \ `State` 变量，如下所示：\n\n    ```\n    struct ContentView: View {\n    @State var\
    \ colorMe = false\n    var body: some View {\n    ```\n\n    这定义了一个名为 `colorMe`（具体名称可任意）的\
    \ `State` 变量，将其初始值设为 `false`，并声明它仅能容纳布尔数据类型。\n\n4.  在 `var body: some View` 内部创建一个间距值为\
    \ 28 的 `VStack`，如下所示：\n\n    ```\n    struct ContentView: View {\n    @State var\
    \ colorMe = false\n    var body: some View {\n    VStack (spacing: 28) {\n   \
    \ }\n    }\n    }\n    ```\n\n    间距 28 会将 `VStack` 内的所有视图分隔开，使它们不显得拥挤。\n\n5.\
    \  在 `VStack` 内输入以下代码：\n\n    ```\n    Rectangle()\n    .fill(colorMe ? Color.green\
    \ : Color.gray)\n    .frame(width: 250, height: 100)\n    ```\n\n    这会创建一个矩形，其中\
    \ `.frame` 修饰符将其宽度定义为 250，高度定义为 100。请注意，`.fill` 修饰符使用了 `colorMe` 这个布尔型 `State`\
    \ 变量来决定显示哪种颜色。如果 `colorMe` 是 `true`，矩形显示为绿色；如果 `colorMe` 是 `false`，矩形显示为灰色。\n\n\
    6.  在 `VStack` 内的 `Rectangle()` 下方输入以下代码以创建一个纯文本按钮：\n\n    ```\n    Button(\"\
    Plain text button\") {\n    colorMe.toggle()\n    }\n    ```\n\n    这定义了一个显示纯文本的按钮。每次用户点击此\
    \ `Button` 时，它都会使用 `.toggle()` 命令将 `colorMe` 的值从 `true` 变为 `false`（或从 `false`\
    \ 变为 `true`）。\n\n7.  在 `VStack` 内的 `Button` 下方输入以下代码，以创建一个使用自定义 `Text` 视图显示标题的按钮：\n\
    \n    ```\n    Button {\n    colorMe.toggle()\n    } label: {\n    Text(\"Custom\
    \ text button\")\n    .font(.largeTitle)\n    .foregroundColor(.green)\n    .padding()\n\
    \    .border(Color.red, width: 6)\n    }\n    ```\n\n    这定义了一个同样使用 `.toggle()`\
    \ 命令来改变 `colorMe` 变量布尔值的按钮。不过，它使用 `Text` 视图来显示按钮标题。`.font` 修饰符更改了 `Text` 视图的字号，`.foregroundColor`\
    \ 修饰符将文本显示为绿色，`.padding` 修饰符在 `Text` 视图周围添加了间距，`.border` 修饰符在 `Text` 视图周围显示了一个宽度为\
    \ 6 的红色边框。\n\n8.  在 `VStack` 内的上一个 `Button` 下方输入以下代码，以使用 `Label` 视图定义按钮标题：\n\n\
    \    ```\n    Button {\n    colorMe.toggle()\n    } label: {\n    Label(\"Image\
    \ button\", systemImage: \"hare.fill\")\n    .font(.largeTitle)\n    .foregroundColor(.purple)\n\
    \    .padding()\n    .border(Color.blue, width: 6)\n    }\n    ```\n\n    这定义了一个使用\
    \ `.toggle()` 命令来改变 `colorMe` 变量布尔值的按钮。但它使用了 `Label` 视图来显示文本（\"Image button\"\
    ）以及一个名为 `hare.fill` 的图标。然后，它使用 `.font` 修饰符放大文本和图标，使用 `.foregroundColor` 修饰符将文本和图标显示为紫色。最后，它使用\
    \ `.padding` 修饰符在 `Label` 视图周围添加间距，并在 `Label` 视图周围放置了一个宽度为 6 的蓝色边框。\n\n9.  在 `VStack`\
    \ 内的上一个 `Button` 下方输入以下代码，以使用 `Image` 视图定义按钮标题：\n\n    ```\n    Button {\n   \
    \ colorMe.toggle()\n    } label: {\n    Image(\"browncat\")\n    .resizable()\n\
    \    .frame(width: 150, height: 150)\n    .clipShape(Circle())\n    .overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n    }\n    ```\n\n    这定义了一个使用 `.toggle()` 命令来改变 `colorMe` 变量布尔值的按钮。`Image`\
    \ 视图假设存在一张名为 `browncat` 的图片，它已存储在 Xcode 项目的 `Assets` 文件夹中。然后，它使用 `.resizable`\
    \ 和 `.frame` 修饰符将图片大小调整为一个宽度和高度均为 150 的方块。最后，它使用 `.clipShape` 修饰符将图片裁剪成圆形，并使用\
    \ `.overlay` 修饰符在图片周围放置一个线宽为 4 的黄色圆形边框。\n\n完整的 SwiftUI 代码应如下所示：\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n@State var colorMe = false\nvar body: some\
    \ View {\nVStack (spacing: 28) {\nRectangle()\n.fill(colorMe ? Color.green : Color.gray)\n\
    .frame(width: 250, height: 100)\nButton(\"Plain text button\") {\ncolorMe.toggle()\n\
    }\nButton {\ncolorMe.toggle()\n} label: {\nText(\"Custom text button\")\n.font(.largeTitle)\n\
    .foregroundColor(.green)\n.padding()\n.border(Color.red, width: 6)\n}\nButton\
    \ {\ncolorMe.toggle()\n} label: {\nLabel(\"Image button\", systemImage: \"hare.fill\"\
    )\n.font(.largeTitle)\n.foregroundColor(.purple)\n.padding()\n.border(Color.blue,\
    \ width: 6)\n}\nButton {\ncolorMe.toggle()\n} label: {\nImage(\"browncat\")\n\
    .resizable()\n.frame(width: 150, height: 150)\n.clipShape(Circle())\n.overlay(Circle().stroke(Color.yellow,\
    \ lineWidth: 4))\n}\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\n\
    static var previews: some View {\nContentView()\n}\n}\n```\n\n10. 在画布面板中点击“Live”图标。\n\
    \n11. 点击任意按钮。注意，每次点击按钮时，它都会切换 `colorMe` 这个布尔变量，使得矩形在绿色和灰色之间交替显示。\n"
- fmt: "## Storing Code to Run in a User Interface View\n\nWhen you create a button\
    \ or similar type of user interface view that interacts with users, you’ll need\
    \ to write Swift code to make that user interface view respond. The simplest way\
    \ is to write code directly in the same file that defines the user interface such\
    \ as:\n\n```\nButton(\"Plain text button\") {\ncolorMe.toggle()\n}\n```\n\nWhen\
    \ there are just a few lines of code, this can be fine. However, if you need to\
    \ store dozens of lines of code to define how a user interface view responds to\
    \ the user, this can make an entire `.swift` file harder to understand. Such a\
    \ file will consist of Swift code to both design the user interface and respond\
    \ to the user’s actions.\n\nRather than cram multiple lines of code in the code\
    \ that defines the user interface, it’s much better to store the code in a separate\
    \ function. That way the user interface code just calls a single line of code\
    \ like this:\n\n```\nButton(\"Click Me\") {\ncallMyFunction()\n}\n```\n\nSuch\
    \ an approach will help keep the Swift code that performs an action from the Swift\
    \ code that defines the user interface. One place to store a function is within\
    \ the same file that contains the Swift code that defines the user interface such\
    \ as near the bottom of the structure that defines the user interface as shown\
    \ in Figure [6-2](#329781_7_En_6_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig2_HTML.jpg)\n\
    \nThe code snippet defines a Swift UI Content View structure with a `colorMe`\
    \ state variable and a `body` property that includes a `Rectangle` and a `Plain`\
    \ text button that toggles the `colorMe` value. It also includes a separate `callMyFunction`\
    \ and a `ContentView_Previews` structure for previewing the view on an iPhone\
    \ 14 Pro device.\n\n**Figure 6-2** A function can appear inside the same structure\
    \ that defines the user interface\n\nStoring a function in the same file that\
    \ contains Swift code that defines the user interface keeps everything in one\
    \ place. However, if a function contains a large amount of code, this approach\
    \ can still be messy since the file contains both code to define the user interface\
    \ and code to make the user interface responsive.\n\nA better solution is to store\
    \ functions in a completely separate file. That way one file contains Swift code\
    \ for defining the user interface, and another file contains Swift code (stored\
    \ in functions) that performs specific tasks. To see how to store functions in\
    \ a separate file, follow these steps:\n\n1. Create a new iOS App project, make\
    \ sure the interface is SwiftUI, and give it a descriptive name such as `CodeFile`.\n\
    2. Create a `State` variable called `randomNumber` like this:\n\n```\n@State var\
    \ randomNumber = 0\n```\n\n3. Create a `Text` view and a `Button` inside a `VStack`\
    \ like this:\n\n```\nVStack (spacing: 28) {\n    Text(\"Random number = \\(randomNumber)\"\
    )\n    Button(\"Roll dice\") {\n        randomNumber = rollDice()\n    }\n}\n\
    ```\n\nNotice that the `Button` calls a function called `rollDice()`. The entire\
    \ `ContentView` file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    @State var randomNumber = 0\n    var body: some View {\n       \
    \ VStack (spacing: 28) {\n            Text(\"Random number = \\(randomNumber)\"\
    )\n            Button(\"Roll dice\") {\n                randomNumber = rollDice()\n\
    \            }\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n4. Choose `File` ➤ `New` ➤ `File`. A window appears as shown in Figure [6-3](#329781_7_En_6_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig3_HTML.jpg)\n\nA screen presents\
    \ a selection of templates for creating a new file, including options such as\
    \ `macOS`, `watchOS`, `tvOS`, `DriverKit`, `Filter`, `Source`, `Swift File`, `Cocoa\
    \ Touch Class`, `C`, `UI Test Case Class`, `C++`, `Unit Test Case Class`, `h`,\
    \ `Header File`, `C File`, `C++ File`, `m`, `Objective-C File`, `UI`, `UNIT`,\
    \ `Metal File`, `User Interface`, `SwiftUI View`, `Storyboard`, `View`, `Empty`,\
    \ `Launch Screen`, `Cancel`, `Previous`, and `Next`.\n\n5. Click the iOS tab and\
    \ then click `Swift File`.\n6. Click the `Next` button. A window appears, asking\
    \ you to choose a name for your file.\n7. Type a descriptive name, such as `StoreFunctions`,\
    \ and click the `Create` button. Xcode creates a new `.swift` file in the Navigator\
    \ pane.\n8. Click the newly created `.swift` file. The only code in a newly created\
    \ `.swift` file is the following:\n\n```\nimport Foundation\n```\n\nThe `Foundation`\
    \ framework provides basic functionality for creating apps throughout all of Apple’s\
    \ operating systems including iOS, macOS, watchOS, and tvOS.\n\n9. Type the following\
    \ underneath the `import Foundation` line:\n\n```\nfunc rollDice() -> Int {\n\
    \    let firstDie = Int.random(in: 1...6)\n    let secondDie = Int.random(in:\
    \ 1...6)\n    return firstDie + secondDie\n}\n```\n\nThis function simulates rolling\
    \ two six-sided dice and adding the results.\n\n10. Click the `ContentView` file\
    \ in the Navigator pane. Xcode displays the user interface in the Canvas pane.\n\
    11. Click the `Roll dice` button on the user interface. Each time you click this\
    \ button, the `Text` view displays a different random number, which shows that\
    \ the `rollDice()` function call in the `ContentView` file can successfully access\
    \ the `rollDice()` function stored in a separate `.swift` file.\n\n**Note:** One\
    \ advantage of storing functions in separate files is that you can easily copy\
    \ a `.swift` file from one project and paste it in another project. This makes\
    \ it easy to reuse code between projects."
  raw: "## Storing Code to Run in a User Interface View\n\nWhen you create a button\
    \ or similar type of user interface view that interacts with users, you’ll need\
    \ to write Swift code to make that user interface view respond. The simplest way\
    \ is to write code directly in the same file that defines the user interface such\
    \ as\n\n```\nButton(\"Plain text button\") {\ncolorMe.toggle()\n}\n```\n\nWhen\
    \ there are just a few lines of code, this can be fine. However, if you need to\
    \ store dozens of lines of code to define how a user interface view responds to\
    \ the user, this can make an entire .swift file harder to understand. Such a file\
    \ will consist of Swift code to both design the user interface and respond to\
    \ the user’s actions.\n\nRather than cram multiple lines of code in the code that\
    \ defines the user interface, it’s much better to store the code in a separate\
    \ function. That way the user interface code just calls a single line of code\
    \ like this:\n\n```\nButton(\"Click Me\") {\ncallMyFunction()\n}\n```\n\nSuch\
    \ an approach will help keep the Swift code that performs an action from the Swift\
    \ code that defines the user interface. One place to store a function is within\
    \ the same file that contains the Swift code that defines the user interface such\
    \ as near the bottom of the structure that defines the user interface as shown\
    \ in Figure [6-2](#329781_7_En_6_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig2_HTML.jpg)\n\
    \nThe code snippet defines a Swift U I Content View structure with a color Me\
    \ state variable and a body property that includes a Rectangle and a Plain text\
    \ button that toggles the color Me value. It also includes a separate call My\
    \ Function and a Content View Previews structure for previewing the view on an\
    \ iPhone 14 Pro device.\n\nFigure 6-2\n\nA function can appear inside the same\
    \ structure that defines the user interface\n\nStoring a function in the same\
    \ file that contains Swift code that defines the user interface keeps everything\
    \ in one place. However, if a function contains a large amount of code, this approach\
    \ can still be messy since the file contains both code to define the user interface\
    \ and code to make the user interface responsive.\n\nA better solution is to store\
    \ functions in a completely separate file. That way one file contains Swift code\
    \ for defining the user interface, and another file contains Swift code (stored\
    \ in functions) that performs specific tasks. To see how to store functions in\
    \ a separate file, follow these steps:\n\n1.  Create a new iOS App project, make\
    \ sure the interface is SwiftUI, and give it a descriptive name such as CodeFile.\n\
    \n2.  Create a State variable called randomNumber like this:\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig3_HTML.jpg)\n\
    \nA screen presents a selection of templates for creating a new file, including\
    \ options such as mac O S, watch O S, t v O S, Driver Kit, Filter, Source, Swift\
    \ File, Cocoa Touch Class, C, U I Test Case Class, C++, Unit Test Case Class,\
    \ h, Header File, C File, C++ File, m, Objective-C File, U I, UNIT, Metal File,\
    \ User Interface, Swift UI View, Storyboard, View, Empty, Launch Screen, Cancel,\
    \ Previous, and Next.\n\nFigure 6-3\n\nCreating a new file for an Xcode project\n\
    \n1.  Create a Text view and a Button inside a VStack like this:\n\n```\n    VStack\
    \ (spacing: 28) {\n    Text(\"Random number = \\(randomNumber)\")\n    Button(\"\
    Roll dice\") {\n    randomNumber = rollDice()\n    }\n    }\n    ```\n\nNotice\
    \ that the Button calls a function called rollDice(). The entire ContentView file\
    \ should look like this:\n\n```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    @State var randomNumber = 0\n    var body: some View {\n    VStack (spacing:\
    \ 28) {\n    Text(\"Random number = \\(randomNumber)\")\n    Button(\"Roll dice\"\
    ) {\n    randomNumber = rollDice()\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n2.  Choose File ➤ New ➤ File. A window appears as shown\
    \ in Figure [6-3](#329781_7_En_6_Chapter.xhtml#Fig3).\n\n```\n@State var randomNumber\
    \ = 0\n```\n\n1.  Click the iOS tab and then click Swift File.\n\n2.  Click the\
    \ Next button. A window appears, asking you to choose a name for your file.\n\n\
    3.  Type a descriptive name, such as StoreFunctions, and click the Create button.\
    \ Xcode creates a new .swift file in the Navigator pane.\n\n4.  Click the newly\
    \ created .swift file. The only code in a newly created .swift file is the following:\n\
    \n```\nimport Foundation\n```\n\nThe Foundation framework provides basic functionality\
    \ for creating apps throughout all of Apple’s operating systems including iOS,\
    \ macOS, watchOS, and tvOS.\n\n1.  Type the following underneath the “import Foundation”\
    \ line:\n\n```\n    func rollDice() -> Int {\n    let firstDie = Int.random(in:\
    \ 1...6)\n    let secondDie = Int.random(in: 1...6)\n    return firstDie + secondDie\n\
    \    }\n    ```\n\nThis function simulates rolling two six-sided dice and adding\
    \ the results.\n\n2.  Click the ContentView file in the Navigator pane. Xcode\
    \ displays the user interface in the Canvas pane.\n\n3.  Click the “Roll dice”\
    \ Button on the user interface. Each time you click this Button, the Text view\
    \ displays a different random number, which shows that the rollDice() function\
    \ call in the ContentView file can successfully access the rollDice() function\
    \ stored in a separate .swift file.\n\nNote\n\nOne advantage of storing functions\
    \ in separate files is that you can easily copy a .swift file from one project\
    \ and paste it in another project. This makes it easy to reuse code between projects."
  trans: "\n## 在用户界面视图中存储要运行的代码\n\n当您创建一个与用户交互的按钮或类似类型的用户界面视图时，需要编写 Swift 代码来让该用户界面视图做出响应。最简单的方法是直接在定义用户界面的同一文件中编写代码，例如：\n\
    \n```\nButton(\"Plain text button\") {\ncolorMe.toggle()\n}\n```\n\n当代码只有几行时，这种方式没问题。然而，如果需要存储数十行代码来定义用户界面视图如何响应用户，这可能会使整个\
    \ `.swift` 文件变得难以理解。这样的文件将同时包含设计用户界面和响应用户操作的 Swift 代码。\n\n与其将多行代码塞入定义用户界面的代码中，不如将代码存储在一个单独的函数中。这样，用户界面代码只需调用一行代码，如下所示：\n\
    \n```\nButton(\"Click Me\") {\ncallMyFunction()\n}\n```\n\n这种方法有助于将执行操作的 Swift\
    \ 代码与定义用户界面的 Swift 代码分离开来。存储函数的一个位置是在包含定义用户界面的 Swift 代码的同一文件中，例如在定义用户界面的结构体底部附近，如图\
    \ 6-2 所示。\n\n![](img/329781_7_En_6_Fig2_HTML.jpg)\n\n该代码片段定义了一个 Swift UI 内容视图结构体，包含一个\
    \ `colorMe` 状态变量和一个 `body` 属性，该属性包含一个 `Rectangle` 和一个用于切换 `colorMe` 值的 `Plain`\
    \ 文本按钮。它还包含一个单独的 `callMyFunction` 函数和一个用于在 iPhone 14 Pro 设备上预览视图的 `ContentView_Previews`\
    \ 结构体。\n\n**图 6-2** 函数可以出现在定义用户界面的同一结构体内部\n\n将函数存储在包含定义用户界面 Swift 代码的同一文件中，可以将所有内容集中在一个地方。然而，如果函数包含大量代码，这种方法可能仍然会显得杂乱，因为文件中同时包含了定义用户界面的代码和使界面具有响应性的代码。\n\
    \n更好的解决方案是将函数存储在一个完全独立的文件中。这样，一个文件包含用于定义用户界面的 Swift 代码，另一个文件包含执行特定任务的 Swift 代码（存储在函数中）。要了解如何将函数存储在单独的文件中，请按照以下步骤操作：\n\
    \n1. 创建一个新的 iOS App 项目，确保界面是 SwiftUI，并为其起一个描述性的名称，例如 `CodeFile`。\n2. 创建一个名为 `randomNumber`\
    \ 的 `State` 变量，如下所示：\n\n```\n@State var randomNumber = 0\n```\n\n3. 在 `VStack`\
    \ 内部创建一个 `Text` 视图和一个 `Button`，如下所示：\n\n```\nVStack (spacing: 28) {\n    Text(\"\
    Random number = \\(randomNumber)\")\n    Button(\"Roll dice\") {\n        randomNumber\
    \ = rollDice()\n    }\n}\n```\n\n请注意，`Button` 调用了一个名为 `rollDice()` 的函数。整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n    @State var\
    \ randomNumber = 0\n    var body: some View {\n        VStack (spacing: 28) {\n\
    \            Text(\"Random number = \\(randomNumber)\")\n            Button(\"\
    Roll dice\") {\n                randomNumber = rollDice()\n            }\n   \
    \     }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n4. 选择 `File`\
    \ ➤ `New` ➤ `File`。出现一个窗口，如图 6-3 所示。\n\n![](img/329781_7_En_6_Fig3_HTML.jpg)\n\
    \n屏幕显示了用于创建新文件的模板选择，包括 `macOS`、`watchOS`、`tvOS`、`DriverKit`、`Filter`、`Source`、`Swift\
    \ File`、`Cocoa Touch Class`、`C`、`UI Test Case Class`、`C++`、`Unit Test Case Class`、`h`、`Header\
    \ File`、`C File`、`C++ File`、`m`、`Objective-C File`、`UI`、`UNIT`、`Metal File`、`User\
    \ Interface`、`SwiftUI View`、`Storyboard`、`View`、`Empty`、`Launch Screen`、`Cancel`、`Previous`\
    \ 和 `Next` 等选项。\n\n5. 点击 iOS 标签，然后点击 `Swift File`。\n6. 点击 `Next` 按钮。出现一个窗口，要求您为文件选择名称。\n\
    7. 输入一个描述性的名称，例如 `StoreFunctions`，然后点击 `Create` 按钮。Xcode 会在导航窗格中创建一个新的 `.swift`\
    \ 文件。\n8. 点击新创建的 `.swift` 文件。新创建的 `.swift` 文件中唯一的代码如下：\n\n```\nimport Foundation\n\
    ```\n\n`Foundation` 框架为在 Apple 的所有操作系统（包括 iOS、macOS、watchOS 和 tvOS）中创建应用程序提供了基本功能。\n\
    \n9. 在 `import Foundation` 行下方输入以下内容：\n\n```\nfunc rollDice() -> Int {\n    let\
    \ firstDie = Int.random(in: 1...6)\n    let secondDie = Int.random(in: 1...6)\n\
    \    return firstDie + secondDie\n}\n```\n\n此函数模拟掷两个六面骰子并将结果相加。\n\n10. 在导航窗格中点击\
    \ `ContentView` 文件。Xcode 会在画布窗格中显示用户界面。\n11. 点击用户界面上的 `Roll dice` 按钮。每次点击此按钮时，`Text`\
    \ 视图都会显示不同的随机数，这表明 `ContentView` 文件中对 `rollDice()` 函数的调用可以成功访问存储在另一个独立 `.swift`\
    \ 文件中的 `rollDice()` 函数。\n\n**注意：** 将函数存储在单独文件中的一个优点是，您可以轻松地将一个 `.swift` 文件从一个项目复制并粘贴到另一个项目中。这使得在项目之间重用代码变得容易。\n"
- fmt: "# Using a Segmented Control\n\nA button represents a single command, so if\
    \ you want to offer the user a choice between multiple commands, you need to use\
    \ multiple buttons. Unfortunately, multiple buttons can be cumbersome to cram\
    \ onto a user interface. To get around this problem, SwiftUI offers a segmented\
    \ control.\n\n**Note**\n\nAlthough a segmented control can theoretically display\
    \ a large number of options, the more options displayed, the more cluttered the\
    \ segmented control will look. As a general rule, if a segmented control contains\
    \ too many options, consider using a different way to offer users multiple choices\
    \ to select such as through a wheel or menu picker as explained in Chapter [8](#329781_7_En_8_Chapter.xhtml).\n\
    \nThe main idea behind a segmented control is to display two or more options in\
    \ a condensed space rather than use multiple buttons. To create a segmented control,\
    \ you need the following:\n\n- A `State` variable to represent which segment (option)\
    \ the user chose\n- A `Picker` view that lists two or more options\n- A `tag`\
    \ property linked to each option\n- The `SegmentedPickerStyle` modifier\n\nTo\
    \ display options on a segmented control, the simplest way is to use multiple\
    \ `Text` views like this:\n\n```\nPicker(\"\", selection: $selectedItem) {\n \
    \   Text(\"Fish\")\n    Text(\"Tortoise\")\n    Text(\"Hare\")\n    Text(\"Bird\"\
    )\n}.pickerStyle(.segmented)\n```\n\nThis would create a segmented control displaying\
    \ the `Text` view items in order, so the furthest item on the left will be \"\
    Fish\" and the furthest item on the right will be \"Bird\" as shown in Figure\
    \ [6-4](#329781_7_En_6_Chapter.xhtml#Fig4).\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig4_HTML.jpg)\n\
    \nA code snippet defines a `Picker` with a segmented style, allowing selection\
    \ from options like Fish, Tortoise, Hare, and Bird.\n\n**Figure 6-4** Creating\
    \ a simple segmented control\n\nPutting multiple `Text` views inside a `Picker`\
    \ view can define the options that appear, but there’s no way for the segmented\
    \ control to know which option a user selected. If you define the options in a\
    \ `Picker` view by using multiple `Text` views, you need to add a `.tag` property\
    \ after each `Text` view.\n\nThis `.tag` property provides the actual data that\
    \ represents each item on the segmented control. The `.tag` property can be any\
    \ data type (such as `String` or `Int`), but every `.tag` property should contain\
    \ the same data type.\n\nTo see how to use a segmented control that displays options\
    \ in a `Picker` view through multiple `Text` views and `.tag` properties, follow\
    \ these steps:\n\n![](images/329781_7_En_6_Chapter/329781_7_En_6_Fig5_HTML.jpg)\n\
    \nA mobile screen with red, green, and blue text at the bottom.\n\n**Figure 6-5**\
    \ The complete user interface for the segmented control\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as \"SegmentedControl.\"\n\
    \n2.  Click the `ContentView` file in the Navigator pane.\n\n3.  Add a `State`\
    \ variable underneath the line `struct ContentView: View` like this:\n\n    ```\n\
    \    struct ContentView: View {\n        @State private var selectedColor = Color.gray\n\
    \        var body: some View {\n    ```\n\n    This creates a `State` variable\
    \ called `selectedColor`. Notice that the `private` keyword is optional, which\
    \ simply means this variable can only be used within this `ContentView` structure.\
    \ The initial value of this `selectedColor` variable is `Color.gray`, which means\
    \ its inferred data type is `Color`.\n\n4.  Create a `VStack` with a spacing value\
    \ of 28 inside the `var body: some View` like this:\n\n    ```\n    struct ContentView:\
    \ View {\n        @State private var selectedColor = Color.gray\n        var body:\
    \ some View {\n            VStack (spacing: 28) {\n            }\n        }\n\
    \    }\n    ```\n\n    The spacing value can be any number you wish, but it adds\
    \ spacing between any views you add inside the `VStack` so they don’t appear crowded\
    \ together on the user interface.\n\n5.  Type the following to create a colored\
    \ rectangle inside the `VStack`:\n\n    ```\n    Rectangle()\n        .fill(selectedColor)\n\
    \    ```\n\n    This creates a rectangle that contains the color defined by the\
    \ `selectedColor` State variable. Initially, this rectangle is filled with `Color.gray`."
