    \    Text(\"Bottom\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n\
    \    ScrollView {\n    ForEach(0..<100) { index in\n    Text(\"Item # \\(index)\"\
    )\n    .id(index)\n    }\n    }\n    }\n    }\n    ```\n\nNotice that the Text\
    \ view inside the ScrollView contains an .id modifier, which tracks the index\
    \ value from 0 up to but not including 100 (99). This .id value is what the .scrollTo\
    \ command will use to jump to specific items in the ScrollView. The user interface\
    \ should look as shown in Figure [15-5](#329781_7_En_15_Chapter.xhtml#Fig5).\n\
    \n1.  Click the Live icon in the Canvas pane.\n\n2.  Drag the Slider to a large\
    \ value such as 67.\n\n3.  Click the Scroll to slider value Button. Notice that\
    \ your chosen position appears centered in the screen.\n\n4.  Click the segmented\
    \ control and choose Top or Bottom and click the Scroll to slider value Button.\
    \ Your chosen value appears near the top or bottom of the screen.\n\n### Defining\
    \ a Horizontal Scroll View\n\nScrollViews, by default, scroll vertically. However,\
    \ you can also change the scroll direction to horizontal, which can be handy for\
    \ scrolling information that may be too wide to be visible on the screen such\
    \ as large amounts of text.\n\nTo see how to make a ScrollView scroll horizontally,\
    \ follow these steps:\n\n![](images/329781_7_En_15_Chapter/329781_7_En_15_Fig6_HTML.jpg)\n\
    \nAn illustration represents a code on the left to exhibit the following text.\
    \ This is a long amount of text that won't fit within the narrow width of an iPhone.\
    \ On the right is a graphic of a smartphone exhibiting the text partially on its\
    \ screen.\n\nFigure 15-6\n\nHorizontal scrolling lets you view text cut off by\
    \ the boundaries of the iOS screen\n\n1.  Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “ScrollViewHorizontal.”\n\n2.  Click the\
    \ ContentView file in the Navigator pane.\n\n3.  Add a ScrollViewReader under\
    \ the var body: some View line like this:\n\n    ```\n    var body: some View\
    \ {\n    ScrollViewReader { scrollView in\n    }\n    }\n    ```\n\n4.  Add the\
    \ ScrollView inside the ScrollViewReader like this:\n\n    ```\n    var body:\
    \ some View {\n    ScrollViewReader { scrollView in\n    ScrollView (.horizontal,\
    \ showsIndicators: true){\n    Text(\"This is a long amount of text that won't\
    \ fit within the narrow width of an iPhone. That way you can see how to scroll\
    \ horizontally.\")\n    }\n    }\n    }\n    ```\n\n5.  Click the Live icon in\
    \ the Canvas pane. The text appears cut off on the right side of the simulated\
    \ iOS device as shown in Figure [15-6](#329781_7_En_15_Chapter.xhtml#Fig6).\n\n\
    1.  Move the mouse pointer over the text and drag left and right to see how the\
    \ text can scroll horizontally."
  trans: "\n### 跳转到指定位置\n\n`ScrollView` 可以显示大量项目。然而，显示的项目越多，就越难找到某个特定的项目。与其强迫用户无休止地滚动，SwiftUI\
    \ 提供了在 `ScrollView` 中跳转到指定位置的功能。\n\n因此，如果一个 `ScrollView` 显示了 100 个项目，你可以直接跳转到\
    \ `ScrollView` 中的某个特定位置，比如第 54 个项目或第 12 个项目。这使得用户可以轻松地在 `ScrollView` 的大量项目列表中快速跳转到特定的数字位置。\n\
    \n当跳转到 `ScrollView` 中的特定位置时，你可以选择该项目的显示或锚定位置：`.top`、`.center` 或 `.bottom`。`.top`\
    \ 锚点将所选项目显示在屏幕顶部，`.center` 锚点将所选项目显示在屏幕中央，`.bottom` 锚点将所选项目显示在屏幕底部。\n\n要了解如何在\
    \ `ScrollView` 中跳转到特定位置，请按照以下步骤操作：\n\n![](img/329781_7_En_15_Fig5_HTML.jpg)\n\n\
    一张智能手机的示意图，屏幕上显示了一个项目列表。方向设置为居中。顶部有一个设置，用于调整滚动到滑块的值。\n\n图 15-5 — 完整的用户界面\n\n1.\
    \ 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 “ScrollViewJumpTo”。\n2. 在导航器窗格中点击 `ContentView`\
    \ 文件。\n3. 在 `struct ContentView` 行下方添加两个状态变量，如下所示：\n\n```\n    @State var sliderValue\
    \ = 0.0\n    @State var anchorPosition = UnitPoint.center\n```\n\n4. 在 `var body:\
    \ some View` 行下方添加一个 `ScrollViewReader`，如下所示：\n\n```\n    var body: some View\
    \ {\n    ScrollViewReader { scrollView in\n    }\n    }\n```\n\n5. 在 `ScrollViewReader`\
    \ 内部添加一个 `HStack`，并在 `HStack` 内放置一个 `Text` 视图和一个 `Slider`，如下所示：\n\n```\n    var\
    \ body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n    Text(\"\
    \\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n    }\n\
    \    }\n    }\n```\n\n`Text` 视图将 `Slider` 的值显示为整数，因为 `Slider` 的值是 `Double` 数据类型。`Slider`\
    \ 的取值范围是 0 到 99。\n\n6. 在 `HStack` 下方添加一个 `Button`。这个 `Button` 将允许我们滚动到 `ScrollView`\
    \ 列表中由 `Slider` 定义的特定位置：\n\n```\n    var body: some View {\n    ScrollViewReader\
    \ { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\")\n    Slider(value:\
    \ $sliderValue, in: 0...99)\n    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n\
    \    scrollView.scrollTo(Int(sliderValue), anchor: anchorPosition)\n    }\n  \
    \  }\n    }\n    }\n```\n\n`Button` 获取 `Slider` 中存储的值，并跳转到 `ScrollView` 中的该位置。`withAnimation`\
    \ 使 `ScrollView` 逐渐移动到由锚点定义的位置。\n\n7. 在 `Button` 下方添加一个 `Picker`，如下所示：\n\n```\n\
    \    var body: some View {\n    ScrollViewReader { scrollView in\n    HStack {\n\
    \    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
    \    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"位置\", selection: $anchorPosition,\
    \ content: {\n    Text(\"顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n\
    \    Text(\"底部\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    }\n\
    \    }\n```\n\n`Picker` 显示一个包含三个选项的分段控件：顶部、中间和底部。这样用户就可以决定使用哪种类型的锚点来滚动到 `ScrollView`\
    \ 中的特定项目。\n\n8. 在 `Picker` 视图下方添加 `ScrollView`，如下所示：\n\n```\n    var body: some\
    \ View {\n    ScrollViewReader { scrollView in\n    HStack {\n    Text(\"\\(Int(sliderValue))\"\
    )\n    Slider(value: $sliderValue, in: 0...99)\n    }\n    Button(\"滚动到滑块值\")\
    \ {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue), anchor: anchorPosition)\n\
    \    }\n    }\n    Picker(\"位置\", selection: $anchorPosition, content: {\n   \
    \ Text(\"顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n  \
    \  Text(\"底部\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    ScrollView\
    \ {\n    }\n    }\n    }\n```\n\n9. 在 `ScrollView` 内部添加一个 `ForEach` 循环来创建项目列表：\n\
    \n```\n    var body: some View {\n    ScrollViewReader { scrollView in\n    HStack\
    \ {\n    Text(\"\\(Int(sliderValue))\")\n    Slider(value: $sliderValue, in: 0...99)\n\
    \    }\n    Button(\"滚动到滑块值\") {\n    withAnimation{\n    scrollView.scrollTo(Int(sliderValue),\
    \ anchor: anchorPosition)\n    }\n    }\n    Picker(\"位置\", selection: $anchorPosition,\
    \ content: {\n    Text(\"顶部\").tag(UnitPoint.top)\n    Text(\"中间\").tag(UnitPoint.center)\n\
    \    Text(\"底部\").tag(UnitPoint.bottom)\n    }).pickerStyle(.segmented)\n    ScrollView\
    \ {\n    ForEach(0..<100) { index in\n    Text(\"项目 # \\(index)\")\n    .id(index)\n\
    \    }\n    }\n    }\n    }\n```\n\n请注意，`ScrollView` 内部的 `Text` 视图包含一个 `.id` 修饰符，它跟踪从\
    \ 0 到 99（不包括 100）的索引值。`.scrollTo` 命令将使用此 `.id` 值来跳转到 `ScrollView` 中的特定项目。用户界面应如图\
    \ 15-5 所示。\n\n1. 点击画布窗格中的“实时”图标。\n2. 将 `Slider` 拖动到一个较大的值，例如 67。\n3. 点击“滚动到滑块值”`Button`。注意，您选择的位置会出现在屏幕中央。\n\
    4. 点击分段控件并选择“顶部”或“底部”，然后点击“滚动到滑块值”`Button`。您选择的值将出现在屏幕顶部或底部附近。\n\n### 定义水平滚动视图\n\
    \n默认情况下，`ScrollView` 是垂直滚动的。但是，你也可以将滚动方向更改为水平，这对于滚动浏览可能因太宽而无法在屏幕上完全显示的信息（例如大量文本）非常方便。\n\
    \n要了解如何使 `ScrollView` 水平滚动，请按照以下步骤操作：\n\n![](img/329781_7_En_15_Fig6_HTML.jpg)\n\
    \n左侧是一个代码插图，用于展示以下文本。这是一段很长的文本，无法适应 iPhone 的狭窄宽度。右侧是一张智能手机的示意图，屏幕上部分显示了该文本。\n\n\
    图 15-6 — 水平滚动让你能够查看被 iOS 屏幕边界截断的文本\n\n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\
    \ “ScrollViewHorizontal”。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `var body: some\
    \ View` 行下方添加一个 `ScrollViewReader`，如下所示：\n\n```\n    var body: some View {\n \
    \   ScrollViewReader { scrollView in\n    }\n    }\n```\n\n4. 在 `ScrollViewReader`\
    \ 内部添加 `ScrollView`，如下所示：\n\n```\n    var body: some View {\n    ScrollViewReader\
    \ { scrollView in\n    ScrollView (.horizontal, showsIndicators: true){\n    Text(\"\
    这是一段很长的文本，无法适应 iPhone 的狭窄宽度。这样你就能看到如何水平滚动了。\")\n    }\n    }\n    }\n```\n\n5.\
    \ 点击画布窗格中的“实时”图标。文本在模拟 iOS 设备的右侧被截断，如图 15-6 所示。\n6. 将鼠标指针移到文本上，并左右拖动，以查看文本如何水平滚动。\n"
- fmt: "# Using an Outline Group\n\nAn Outline Group acts like a super Disclosure\
    \ Group. The main difference is that a Disclosure Group can only display up to\
    \ ten views, while an Outline Group can display an endless number of items defined\
    \ within a separate class. In addition, an Outline Group automatically indents\
    \ categories to make it easier to see the hierarchical relationship between items\
    \ (see Figure [15-2](#329781_7_En_15_Chapter.xhtml#Fig2)).\n\nOutline groups display\
    \ arrays of objects that define relationships. To use an Outline Group, you need\
    \ to do the following:\n\n- Create a class that holds the data you want to display.\n\
    - Create an array that holds multiple objects defined by the class.\n- Create\
    \ an Outline Group that displays the data stored in the objects.\n\nTo create\
    \ a class that holds the data you want to display, you need to make it `Identifiable`.\
    \ That way each object based on that class will have a unique identification number\
    \ like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n}\n```\n\
    \nNext, you need to define the data you want to display in the Outline Group such\
    \ as a string like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n\
    \    var name: String\n}\n```\n\nThe next step is to create an optional array\
    \ for holding subcategories. These subcategory items must also be the same class\
    \ like this:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n    var\
    \ name: String\n    var classification: [Species]?\n}\n```\n\nFinally, the class\
    \ needs an initializer since none of the class’s properties have an initial value.\
    \ That means each time you create an object, you must assign a value to its property.\
    \ In this case, the only property that needs a value is the `name` property that\
    \ holds a `String` data type that’s absolutely necessary. The other property,\
    \ called `classification`, can hold an array of objects but can also be a `nil`\
    \ value:\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n    var name:\
    \ String\n    var classification: [Species]?\n\n    init(name: String, classification:\
    \ [Species]? = nil) {\n        self.name = name\n        self.classification =\
    \ classification\n    }\n}\n```\n\nAfter defining a class, the next step is to\
    \ define an array that holds objects based on that class like this:\n\n```\nvar\
    \ Animals: [Species] = [\n    Species(name: \"Mammal\", classification: [\n  \
    \      Species(name: \"Dog\", classification: [\n            Species(name: \"\
    Poodle\"),\n            Species(name: \"Collie\"),\n        ]),\n    ]),\n]\n\
    ```\n\nNotice that this array is defined to hold objects based on the defined\
    \ class (`Animals` in this example). Each object in the array needs a name (such\
    \ as `Mammal` or `Collie`). Some objects do not hold a list of subcategories,\
    \ but for those that do, you need to specify an array of objects based on the\
    \ same class (`Species`). In the preceding example, the `Dog` object defines an\
    \ array of objects that hold `Poodle` and `Collie`.\n\nThe third step is to define\
    \ an Outline Group:\n\n```\nOutlineGroup(Animals, id: \\.id, children: \\.classification)\
    \ { creature in\n    Text(creature.name)\n}\n```\n\nThis defines the array to\
    \ use (`Animals`) and to display each item in the array using a unique ID (defined\
    \ by `UUID()` within the class declaration). If there are any children or subcategories\
    \ stored within an object, that’s identified by the `children:` parameter. Finally,\
    \ the `Text` view within the `OutlineGroup` displays the `name` property of each\
    \ object.\n\nTo see how to use an Outline Group, follow these steps:\n\n1. Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as `OutlineGroup`.\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following class\
    \ declaration under the `import SwiftUI` line like this:\n\n```\n    class Species:\
    \ Identifiable {\n        let id = UUID()\n        var name: String\n        var\
    \ classification: [Species]?\n\n        init(name: String, classification: [Species]?\
    \ = nil) {\n            self.name = name\n            self.classification = classification\n\
    \        }\n    }\n```\n\n4. Add the following array underneath the `struct ContentView:\
    \ View` line like this:\n\n```\n    struct ContentView: View {\n        var Animals:\
    \ [Species] = [\n            Species(name: \"Mammal\", classification: [\n   \
    \             Species(name: \"Dog\", classification: [\n                    Species(name:\
    \ \"Poodle\"),\n                    Species(name: \"Collie\"),\n             \
    \       Species(name: \"St. Bernard\"),\n                ]),\n               \
    \ Species(name: \"Cat\"),\n                Species(name: \"Elephant\"),\n    \
    \            Species(name: \"Whale\"),\n            ]),\n            Species(name:\
    \ \"Bird\", classification: [\n                Species(name: \"Canary\"),\n  \
    \              Species(name: \"Parakeet\"),\n                Species(name: \"\
    Eagle\"),\n            ]),\n        ]\n```\n\n5. Add the `OutlineGroup` underneath\
    \ the `var body: some View` line like this:\n\n```\n    var body: some View {\n\
    \        List {\n            OutlineGroup(Animals, id: \\.id, children: \\.classification)\
    \ { creature in\n                Text(creature.name)\n            }\n        }\n\
    \    }\n```\n\nThe entire `ContentView` file should look like this:\n\n```\n \
    \   import SwiftUI\n\n    class Species: Identifiable {\n        let id = UUID()\n\
    \        var name: String\n        var classification: [Species]?\n\n        init(name:\
    \ String, classification: [Species]? = nil) {\n            self.name = name\n\
    \            self.classification = classification\n        }\n    }\n\n    struct\
    \ ContentView: View {\n        var Animals: [Species] = [\n            Species(name:\
    \ \"Mammal\", classification: [\n                Species(name: \"Dog\", classification:\
    \ [\n                    Species(name: \"Poodle\"),\n                    Species(name:\
    \ \"Collie\"),\n                    Species(name: \"St. Bernard\"),\n        \
    \        ]),\n                Species(name: \"Cat\"),\n                Species(name:\
    \ \"Elephant\"),\n                Species(name: \"Whale\"),\n            ]),\n\
    \            Species(name: \"Bird\", classification: [\n                Species(name:\
    \ \"Canary\"),\n                Species(name: \"Parakeet\"),\n               \
    \ Species(name: \"Eagle\"),\n            ]),\n        ]\n\n        var body: some\
    \ View {\n            List {\n                OutlineGroup(Animals, id: \\.id,\
    \ children: \\.classification) { creature in\n                    Text(creature.name)\n\
    \                }\n            }\n        }\n    }\n\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n```\n\n6. Click the Live icon in the Canvas pane.\n7. Click\
    \ any of the items in the Outline Group that displays a `>` character on the far\
    \ right. This indicates that the item contains additional lists that can be displayed\
    \ (see Figure [15-2](#329781_7_En_15_Chapter.xhtml#Fig2)).\n\nOutline groups can\
    \ be handy for storing and displaying lists of items that the user can hide or\
    \ display. Since outline groups use arrays, there’s no limit to the number of\
    \ items you can display in an Outline Group (unlike the ten-view limit of a Disclosure\
    \ Group).\n\n# Summary\n\nDisclosure groups can be handy for hiding one or more\
    \ views temporarily out of sight. By clicking the Disclosure Group title, you\
    \ can toggle between seeing additional views and hiding them. Think of disclosure\
    \ groups as a collapsible list of views.\n\nWhile disclosure groups make it easy\
    \ to hide or view data, scroll views make it easy to scroll up or down (or left\
    \ and right) to view additional data. You can even use scroll views inside of\
    \ disclosure groups as well.\n\nIf you need to display data in a hierarchy, consider\
    \ using the Outline Group. An Outline Group requires defining a class that contains\
    \ the properties you want to store along with a `UUID()` to automatically create\
    \ distinct ID numbers for each chunk of data. Then you need to create an array\
    \ of objects, based on the class you defined. Finally, you can use an `OutlineGroup`\
    \ to display data on the screen.\n\nDisclosure groups, scroll views, and outline\
    \ groups are just different ways to group related data together. Disclosure groups\
    \ act like collapsible lists. Scroll views let users see data that might normally\
    \ get cut off. Outline groups act like multiple disclosure groups that can selectively\
    \ hide or display data. The whole purpose of all three views is to provide different\
    \ ways to display information to the user."
