  trans: "\n# 概述\n\n动画可以通过向用户提供视觉反馈，或仅仅展示有趣的视觉图像来吸引用户，从而让你的用户界面变得生动。一般来说，应谨慎使用动画，因为同时发生过多的视觉变化可能会令人困惑和分心。最好的动画能够突出某个操作，但又不会在过程中给用户带来压力。\n\
    \n动画涉及定义开始状态和结束状态，无论你是要移动、调整大小还是旋转某个视图。然后，你需要某种触发器来定义一个新状态。最后，你需要使用`.animation`修饰符。如果你要使用完全相同的`.animation`修饰符来为多个视图添加动画，可以通过使用`withAnimation`来减少代码重复。\n\
    \n要自定义动画，你可以定义延迟和持续时间值，以延缓动画开始前的时间，并设置完成动画所需的时间。如需更高级的自定义，请使用`.interpolatingSpring`修饰符，并定义`mass`（质量）、`stiffness`（刚度）、`damping`（阻尼）和`initialVelocity`（初始速度）。通过使用动画，你可以让用户界面变得有趣且更具吸引力。\n\
    \n# 21. 使用 `GeometryReader`\n\niOS 设备的用户界面必须适应不同的屏幕尺寸。不仅 iPhone 和 iPad 的屏幕尺寸不同，市场上不同型号的\
    \ iPhone 和 iPad 之间也存在不同的屏幕尺寸。为了解决这个问题，SwiftUI 会居中放置用户界面元素，但如果你需要将用户界面元素精确地放置在特定位置，该怎么办？\n\
    \n具体的 X 和 Y 坐标是行不通的，因为在大屏幕上看起来不错的效果在小屏幕上可能并不合适，反之亦然。当你需要将用户界面元素放置在屏幕上的特定位置时，更安全的方法是使用\
    \ `GeometryReader`。\n\n`GeometryReader` 就像一个容器，能够自动适应不同的屏幕尺寸。添加 `GeometryReader`\
    \ 后，你就可以使用 `GeometryReader` 的相对坐标（而非不同尺寸屏幕的精确坐标）来放置用户界面元素。这样一来，当应用程序在不同尺寸的屏幕上运行时，`GeometryReader`\
    \ 也会相应地调整其相对坐标。\n\n## 理解 `GeometryReader`\n\n`GeometryReader` 可以像堆栈一样容纳多个视图。关键区别在于，`GeometryReader`\
    \ 会扩展以占用尽可能多的空间。此外，`GeometryReader` 可以获取自身的宽度和高度。定义 `GeometryReader` 的代码如下所示：\n\
    \n```\nGeometryReader { geometry in\n// 在此处定义视图\n}\n```\n\n`GeometryReader` 使用一个任意命名的变量，如上例中的\
    \ `geometry`，尽管这个变量可以被命名为任何名称。然后，要获取 `GeometryReader` 的宽度和高度，你可以像这样获取 `size.width`\
    \ 和 `size.height` 属性：\n\n```\ngeometry.size.width\ngeometry.size.height\n```\n\
    \n要了解 `GeometryReader` 的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_21_Fig1_HTML.jpg)\n\
    \n一个移动屏幕显示 `width=374.000000` 和 `height=647.000000`。\n\n图 21-1\n\n`GeometryReader`\
    \ 在 iPhone SE 中定义的宽度和高度\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其指定任意名称，例如“BasicGeometryReader”。\n\
    \n2.  在导航器窗格中点击 `ContentView` 文件。\n\n3.  在 `var body: some View` 内部添加一个 `GeometryReader`，如下所示：\n\
    \n    ```\n    var body: some View {\n    GeometryReader { geometry in\n    }.background(Color.yellow)\n\
    \    }\n    ```\n\n    `.background` 修饰符会为 `GeometryReader` 着色，使其边界易于辨认。\n\n4.\
    \  在 `GeometryReader` 内部添加一个 `VStack`。\n\n5.  在 `VStack` 内部添加两个 `Text` 视图，如下所示：\n\
    \n    ```\n    var body: some View {\n    GeometryReader { geometry in\n    VStack\
    \ {\n    Text(\"Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
    )\n    }\n    }.background(Color.yellow)\n    }\n    ```\n\n    整个 `ContentView`\
    \ 文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n  \
    \  var body: some View {\n    GeometryReader { geometry in\n    VStack {\n   \
    \ Text(\"Width = \\(geometry.size.width)\")\n    Text(\"Height = \\(geometry.size.height)\"\
    )\n    }\n    }.background(Color.yellow)\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n    请注意，`geometry.size.width` 和 `geometry.size.height`\
    \ 属性定义了当前 iOS 设备（如图 21-1 所示的 iPhone SE）内 `GeometryReader` 的高度和宽度。\n\n![](img/329781_7_En_21_Fig2_HTML.jpg)\n\
    \n屏幕的一个片段显示了修饰符选项。它包括预览、配色方案、辅助功能和动态类型。预览包括名称、设备、布局和方向。下拉选项列出了多个选项，其中继承的选项以深色高亮显示。\n\
    \n图 21-2\n\n检查器窗格中的设备弹出菜单\n\n1.  在 `struct ContentView_Previews: PreviewProvider`\
    \ 内部点击 `ContentView()`。Xcode 窗口的右侧会出现检查器窗格。\n\n2.  点击设备弹出菜单，并选择一个不同尺寸的屏幕，例如较大或较小的\
    \ iPhone 或 iPad，如图 21-2 所示。\n\n![](img/329781_7_En_21_Fig3_HTML.jpg)\n\n一个平板电脑屏幕显示\
    \ `width=744.000000` 和 `height=1089.000000`。\n\n图 21-3\n\n在不同尺寸的 iOS 屏幕中显示 `GeometryReader`\
    \ 的宽度和高度\n\n1.  选择不同尺寸的 iPhone 或 iPad。请注意，`GeometryReader` 会扩展或收缩以适配新 iOS 屏幕尺寸的边界，并显示不同的宽度和高度，如图\
    \ 21-3 所示。\n\n尝试使用不同的 iOS 设备，例如小屏幕的 iPhone 或大屏幕的 iPad。无论你选择哪种尺寸的 iOS 设备屏幕，`GeometryReader`\
    \ 都能扩展或收缩，并返回其宽度和高度。\n"
- fmt: "# Understanding the Differences Between Global and Local Coordinates\n\nOnce\
    \ you’ve seen how the `GeometryReader` can shrink or expand to fit the width and\
    \ height of different iOS screen sizes, the next step is to understand how the\
    \ `GeometryReader`’s coordinates work. Coordinates within the `GeometryReader`\
    \ are known as local coordinates.\n\nOn the other hand, global coordinates refer\
    \ to the entire iOS screen. While global coordinates always differ between different\
    \ iOS device screens, local coordinates within a `GeometryReader` always remain\
    \ consistent.\n\nTo see the differences between local and global coordinates,\
    \ follow these steps:\n\n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig4_HTML.jpg)\n\
    \nA mobile screen displays the values of local X origin and Y origin, as well\
    \ as Global X origin and Y origin, which are labeled as global origin and local\
    \ origin, respectively, with the values 0, 0, 0, and 59.0000000.\n\nFigure 21-4\n\
    \nThe local origin appears in the upper left corner while the global origin appears\
    \ in the upper-left corner of the Geometry Reader\n\n1. Create a new SwiftUI iOS\
    \ App project and give it any name you wish such as “GeometryReaderCoordinates.”\n\
    \n2. Click the `ContentView` file in the Navigator pane.\n\n3. Add a `GeometryReader`\
    \ inside `var body: some View` like this:\n\n```\nvar body: some View {\n    GeometryReader\
    \ { geometry in\n    }.background(Color.yellow)\n}\n```\n\n4. Add a `VStack` inside\
    \ the `GeometryReader` and add four `Text` views and a `Divider` like this:\n\n\
    ```\nGeometryReader { geometry in\n    VStack {\n        Text(\"Local X origin\
    \ = \\(geometry.frame(in: .local).origin.x)\")\n        Text(\"Local Y origin\
    \ = \\(geometry.frame(in: .local).origin.y)\")\n        Divider()\n        Text(\"\
    Global X origin = \\(geometry.frame(in: .global).origin.x)\")\n        Text(\"\
    Global Y origin = \\(geometry.frame(in: .global).origin.y)\")\n    }\n}.background(Color.yellow)\n\
    ```\n\nFirst, notice that the `Divider()` simply draws a horizontal line in a\
    \ `VStack` (and a vertical line in an `HStack`). Second, the `frame` returns coordinates.\
    \ When using `.local` coordinates, the x and y origin of a `GeometryReader` is\
    \ always `(0,0)`. When using `.global` coordinates, the x and y origin of a `GeometryReader`\
    \ is based on the distance from the upper-left corner of the iOS screen.\n\nThe\
    \ entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\nstruct\
    \ ContentView: View {\n    var body: some View {\n        GeometryReader { geometry\
    \ in\n            VStack {\n                Text(\"Local X origin = \\(geometry.frame(in:\
    \ .local).origin.x)\")\n                Text(\"Local Y origin = \\(geometry.frame(in:\
    \ .local).origin.y)\")\n                Divider()\n                Text(\"Global\
    \ X origin = \\(geometry.frame(in: .global).origin.x)\")\n                Text(\"\
    Global Y origin = \\(geometry.frame(in: .global).origin.y)\")\n            }\n\
    \        }.background(Color.yellow)\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nNotice that the local origin is `(0,0)` because it starts in the upper-left\
    \ corner of the iOS screen. However, the global origin appears at `(0,59)`. That’s\
    \ because the `GeometryReader` actually appears underneath the notch of the iPhone\
    \ 14 Pro model as shown in Figure [21-4](#329781_7_En_21_Chapter.xhtml#Fig4).\n\
    \n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig5_HTML.jpg)\n\nA mobile\
    \ screen displays the values of local X origin and Y origin, as well as Global\
    \ X origin and Y origin, with the values 0, 0, 0, and 0.\n\nFigure 21-5\n\nThe\
    \ `.ignoresSafeArea()` modifier pushes the `GeometryReader` to the top of the\
    \ screen so the local and global origins are identical\n\n1. Add an `.ignoreAllSafeAreas()`\
    \ modifier after the `.background(Color.yellow)` modifier like this:\n\n```\n\
    }.background(Color.yellow)\n.ignoresSafeArea()\n```\n\nThis ignores the area around\
    \ the notch, so the global y origin now appears in the upper-left corner of the\
    \ screen, just like the local y origin as shown in Figure [21-5](#329781_7_En_21_Chapter.xhtml#Fig5).\n\
    \n1. Edit the code inside `var body: some View` like this:\n\n```\nvar body: some\
    \ View {\n    VStack {\n        Text(\"This Text view pushes the GeometryReader\
    \ down\")\n        HStack {\n            Text(\"Pushes to the right\")\n     \
    \       GeometryReader { geometry in\n                VStack {\n             \
    \       Text(\"Local X origin = \\(geometry.frame(in: .local).origin.x)\")\n \
    \                   Text(\"Local Y origin = \\(geometry.frame(in: .local).origin.y)\"\
    )\n                    Divider()\n                    Text(\"Global X origin =\
    \ \\(geometry.frame(in: .global).origin.x)\")\n                    Text(\"Global\
    \ Y origin = \\(geometry.frame(in: .global).origin.y)\")\n                }\n\
    \            }.background(Color.yellow)\n            .ignoresSafeArea()\n    \
    \    }\n    }\n}\n```\n\nThe preceding code uses a `VStack` to push the `GeometryReader`\
    \ down and then uses an `HStack` to push the `GeometryReader` to the right. Notice\
    \ that the `GeometryReader`’s local origin is still `(0,0)`, but the global origin\
    \ is different as measured from the upper-left corner of the iOS screen as shown\
    \ in Figure [21-6](#329781_7_En_21_Chapter.xhtml#Fig6).\n\n![](images/329781_7_En_21_Chapter/329781_7_En_21_Fig6_HTML.jpg)\n\
    \nA snippet of code in SwiftUI displays a mobile screen with values showing the\
    \ local and global origins, where the global X origin is 151.666667, and the global\
    \ Y origin is 91.642415. On the left is the 30-line code.\n\nFigure 21-6\n\nDefining\
    \ a `GeometryReader`’s global origin"
