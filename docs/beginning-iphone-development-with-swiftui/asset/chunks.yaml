- fmt: '# Using the Offset and Position Modifiers


    Spacers, padding, and alignment within a stack can alter the position of views
    on a user interface, but for another way to position views on the user interface,
    you can use the `offset` modifier as well. The `offset` modifier lets you specify
    a specific `x` and `y` value to move a view from where SwiftUI would normally
    place it.


    In every iOS screen, the origin (`0,0`) appears in the upper-left corner. The
    greater the value of `x`, the further to the right horizontally. The greater the
    value of `y`, the further down vertically as shown in Figure 3-15.


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig15_HTML.jpg)


    An illustration of a mobile phone with arrows marked along the width and the height
    of the top left corner of the display. The origin is labeled as `0, 0`, and `X`
    and `Y` axes are marked.


    **Figure 3-15** — The origin and `x,y` direction on an iOS screen


    The following `ZStack` places two identical `Text` views on top of each other.
    Because both `Text` views appear in the exact same place, you cannot see both
    of them at the same time:


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    ```


    If we add an `offset` modifier to one of the `Text` views, the `offset` modifier
    will move the second `Text` view a fixed distance from where it would normally
    appear such as:


    ```

    ZStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .offset(x: 75, y: 125)

    }

    ```


    This offset pushes the second `Text` view 75 points to the right and 125 points
    down as shown in Figure 3-16.


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig16_HTML.jpg)


    An illustration of a mobile display has two top view blocks, with a top view block
    highlighted. The `offset` modifier moves the view away from its position.


    **Figure 3-16** — The `offset` modifier moves a view away from where it would
    normally appear


    Positive `x` values move a view to the right, and negative `x` values move a view
    to the left. Likewise, positive `y` values move a view down, and negative values
    move a view up. Suppose we had an `offset` modifier as follows:


    ```

    .offset(x: -75, y: -125)

    ```


    This would move the second `Text` view up and to the left from where it would
    normally appear as shown in Figure 3-17.


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig17_HTML.jpg)


    An illustration of a mobile display has two top view blocks, with a top view block
    highlighted. The `offset` modifier moves the view away from its position.


    **Figure 3-17** — Negative `x` and `y` values offset a view to the left and up


    The `offset` modifier lets you position a view based on where SwiftUI would normally
    place it. If you’d rather position a view based on the origin (the upper left-hand
    corner of the screen), use the `position` modifier instead.


    Like the `offset` modifier, the `position` modifier needs an `x` and `y` value
    to define the center position of a view. The following Swift code places a `Text`
    view 225 to the right and 126 down as shown in Figure 3-18:


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig18_HTML.jpg)


    An illustration of a mobile phone with arrows marked along the width and the height
    of the display. `X` and `Y` axes are marked with values `X` equals 225 and `Y`
    equals 127.


    **Figure 3-18** — Using the `position` modifier to place a view on the user interface


    ```

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    .position(x: 225, y: 127)

    ```


    > **Note:** Be careful when using large `x` or `y` values with either the `offset`
    or `position` modifier. That’s because large values may position a view perfectly
    on a large screen but position that same view off the edge on a smaller screen.


    You can apply the `offset` and `position` modifiers to any views. Since stacks
    are views, you can apply the `offset` and `position` modifiers to stacks, which
    automatically shifts the position of every view inside the stack as well. Consider
    the following Swift code that applies the `offset` modifier to an entire `VStack`:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.offset(x: 25, y: 125)

    ```


    The preceding code shifts the entire `VStack`’s contents (the two `Text` views)
    down and to the right from where they would normally appear as shown in Figure
    3-19.


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig19_HTML.jpg)


    An illustration of a mobile phone. It has arrows that depict `VStack`''s normal
    position and `VStack`''s offset position of first and second views on the display.


    **Figure 3-19** — The `offset` modifier moves an entire stack from where it would
    normally appear


    The `offset` modifier shifts the entire `VStack` from its normal position, but
    the `position` modifier places the `VStack` based on the origin (the upper left-hand
    corner of the screen). The following Swift code uses the exact same `x` and `y`
    values, but uses the `position` modifier on the `VStack` instead:


    ```

    VStack {

    Text ("First")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Second View")

    .font(.system(size: 40))

    .background(Color.yellow)

    }.position(x: 25, y: 125)

    ```


    Notice that since the `position` modifier shifts the `VStack` from the origin,
    the `x` value isn’t large enough, and the `VStack`’s contents get cut off by the
    screen as shown in Figure 3-20.


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig20_HTML.jpg)


    An illustration of a mobile phone. It depicts `VStack`''s positions of first and
    second views on the left-most section of the display.


    **Figure 3-20** — The `position` modifier places the `VStack` in relation to the
    origin


    # Summary


    Designing a user interface in SwiftUI normally centers views in the middle of
    the screen. By using the `padding` modifier, you can increase the space around
    a view. The `padding` modifier can affect one, two, three, or all four sides of
    a view.


    When you want to push views apart, use spacers, which act like springs that push
    views up to the edge of the screen, regardless of the screen’s actual size. By
    using multiple spacers, you can push a view further. You can also define the minimum
    length that a spacer can shrink to make sure it doesn’t shrink beyond a specific
    length.


    Within vertical and horizontal stacks, you can define the spacing between all
    views within a stack. By using the `offset` modifier, you can shift a view from
    where it would normally appear. By using the `position` modifier, you can precisely
    place a view on the screen, based on the origin, which is the upper left-hand
    corner of an iOS screen.


    The `padding` modifier, spacers, spacing within stacks, and the `offset`/`position`
    modifiers let you arrange the placement of views on your user interface. You can
    apply the `padding`, `offset`, and `position` modifiers on any view, including
    stacks. By modifying an entire stack, you can modify all views within that stack.


    Since stack spacing, the `offset` modifier, and the `position` modifier can use
    fixed numeric values, make sure these values aren’t too large where they might
    push views off the edge of the screen of smaller-size iOS devices. By using `padding`,
    spacers, and `position` and `offset` modifiers, you can design user interfaces
    that will look and work identically on different iOS devices. That way you can
    focus more time on writing code to make your app do something useful and amazing
    and less time trying to make the user interface adapt to different-size screens
    and orientations.'
