  trans: "\n### 定义高优先级手势\n\n堆栈内视图上的手势总会优先于堆栈上的手势被识别。如果你希望堆栈的手势修饰符优先于堆栈内视图上的手势修饰符执行，则需要使用\
    \ `.highPriorityGesture` 修饰符。\n\n这个 `.highPriorityGesture` 修饰符的作用就是明确哪个手势应具有更高优先级。在本例中，我们希望堆栈的手势修饰符先执行，因此需要将其包裹在\
    \ `.highPriorityGesture` 修饰符中，如下所示：\n\n```\n.highPriorityGesture(\n    TapGesture()\n\
    \        .onEnded { _ in\n            message = \"VStack tapped\"\n        })\n\
    ```\n\n请注意，`TapGesture` 使用 `.onEnded` 修饰符来检测点击手势何时结束，从而将 `\"VStack tapped\"` 存储到\
    \ `message` 这个 `State` 变量中。\n\n要了解 `.highPriorityGesture` 修饰符的工作方式，请遵循以下步骤：\n\n\
    1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `\"HighPriorityGestures\"`。\n2.  在导航器面板中点击\
    \ `ContentView` 文件。\n3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\
    \    ```\n    @State var message = \"\"\n    ```\n4.  在 body 内部添加一个包含 `Text` 视图、`Circle`\
    \ 和 `Spacer` 的 `VStack`，如下所示：\n    ```\n    var body: some View {\n        VStack\
    \ {\n            Text(message)\n                .padding()\n            Circle()\n\
    \                .frame(width: 125, height: 125)\n                .foregroundColor(.blue)\n\
    \            Spacer()\n        }.background(Color.yellow)\n    }\n    ```\n5.\
    \  为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n    ```\n    Circle()\n        .frame(width:\
    \ 125, height: 125)\n        .foregroundColor(.blue)\n        .onTapGesture {\n\
    \            message = \"Circle tapped\"\n        }\n    ```\n    通常，当用户点击 `Circle`\
    \ 时，`message` `State` 变量将包含字符串 `\"Circle tapped\"`。\n6.  为整个 `VStack` 添加一个 `.highPriorityGesture`\
    \ 修饰符，如下所示：\n    ```\n    var body: some View {\n        VStack {\n          \
    \  Text(message)\n                .padding()\n            Circle()\n         \
    \       .frame(width: 125, height: 125)\n                .foregroundColor(.blue)\n\
    \                .onTapGesture {\n                    message = \"Circle tapped\"\
    \n                }\n            Spacer()\n        }.background(Color.yellow)\n\
    \            .highPriorityGesture(\n                TapGesture()\n           \
    \         .onEnded { _ in\n                        message = \"VStack tapped\"\
    \n                    })\n    }\n    ```\n    如果你点击 `Circle`，`Circle` 的 `.onTapGesture`\
    \ 修饰符（`\"Circle tapped\"`）通常会被识别。然而，`.highPriorityGesture` 修饰符定义了 `VStack` 上的\
    \ `TapGesture` 被优先识别。整个 `ContentView` 文件应如下所示：\n    ```\n    import SwiftUI\n\
    \    struct ContentView: View {\n        @State var message = \"\"\n        var\
    \ body: some View {\n            VStack {\n                Text(message)\n   \
    \                 .padding()\n                Circle()\n                    .frame(width:\
    \ 125, height: 125)\n                    .foregroundColor(.blue)\n           \
    \         .onTapGesture {\n                        message = \"Circle tapped\"\
    \n                    }\n                Spacer()\n            }.background(Color.yellow)\n\
    \                .highPriorityGesture(\n                    TapGesture()\n   \
    \                     .onEnded { _ in\n                            message = \"\
    VStack tapped\"\n                        })\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n7.  在画布面板中点击“Live”图标，然后点击蓝色 Circle。注意，`Text` 视图中会显示\
    \ `\"VStack tapped\"`，这是因为 `VStack` 上的 `.highPriorityGesture` 修饰符覆盖了 `Circle`\
    \ 的 `.onTapGesture` 修饰符。\n8.  点击 `VStack` 的黄色背景。注意，`Text` 视图中仍然显示 `\"VStack tapped\"\
    `。\n\n### 定义同时手势\n\n通常，附加到单个视图上的手势修饰符会优先于附加到堆栈上的任何手势修饰符执行。如果你使用 `.highPriorityGesture`\
    \ 修饰符，则可以让堆栈的手势优先于附加到单个视图上的任何手势修饰符执行。但是，如果你希望附加到视图和附加到堆栈上的两个手势都执行，该怎么办呢？\n\n这时你可以使用\
    \ `.simultaneousGesture` 修饰符来确保堆栈的手势修饰符与附加到单个视图上的手势修饰符同时执行。要定义同时执行的手势，请将通常会被忽略的手势包裹在\
    \ `.simultaneousGesture` 修饰符中，如下所示：\n\n```\n.simultaneousGesture(\n    TapGesture()\n\
    \        .onEnded { _ in\n            message = \"VStack tapped\"\n        })\n\
    ```\n\n要了解 `.simultaneousGesture` 修饰符的工作方式，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS\
    \ App 项目，并为其任意命名，例如 `\"SimultaneousGestures\"`。\n2.  在导航器面板中点击 `ContentView` 文件。\n\
    3.  在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n    ```\n    @State var\
    \ message = \"\"\n    ```\n4.  在 body 内部添加一个包含 `Text` 视图、`Circle` 和 `Spacer` 的\
    \ `VStack`，如下所示：\n    ```\n    var body: some View {\n        VStack {\n     \
    \       Text(message)\n                .padding()\n            Circle()\n    \
    \            .frame(width: 125, height: 125)\n                .foregroundColor(.blue)\n\
    \            Spacer()\n        }.background(Color.yellow)\n    }\n    ```\n5.\
    \  为 `Circle` 添加一个 `.onTapGesture` 修饰符，如下所示：\n    ```\n    Circle()\n        .frame(width:\
    \ 125, height: 125)\n        .foregroundColor(.blue)\n        .onTapGesture {\n\
    \            message += \"Circle tapped\"\n        }\n    ```\n    请注意，当 `Circle`\
    \ 识别到点击手势时，它会将 `\"Circle tapped\"` 追加（`+=`）到 `message` `State` 变量的当前值中。\n6.  为整个\
    \ `VStack` 添加一个 `.simultaneousGesture` 修饰符，如下所示：\n    ```\n    var body: some\
    \ View {\n        VStack {\n            Text(message)\n                .padding()\n\
    \            Circle()\n                .frame(width: 125, height: 125)\n     \
    \           .foregroundColor(.blue)\n                .onTapGesture {\n       \
    \             message += \"Circle tapped\"\n                }\n            Spacer()\n\
    \        }.background(Color.yellow)\n            .simultaneousGesture(\n     \
    \           TapGesture()\n                    .onEnded { _ in\n              \
    \          message = \"VStack tapped\"\n                    })\n    }\n    ```\n\
    \    如果你点击 `Circle`，`Circle` 的 `.onTapGesture` 修饰符（`\"Circle tapped\"`）通常会被识别。然而，`.simultaneousGesture`\
    \ 修饰符定义了 `VStack` 上的 `TapGesture` 被优先识别，然后再识别 `Circle` 上的手势修饰符。整个 `ContentView`\
    \ 文件应如下所示：\n    ```\n    import SwiftUI\n    struct ContentView: View {\n    \
    \    @State var message = \"\"\n        var body: some View {\n            VStack\
    \ {\n                Text(message)\n                    .padding()\n         \
    \       Circle()\n                    .frame(width: 125, height: 125)\n      \
    \              .foregroundColor(.blue)\n                    .onTapGesture {\n\
    \                        message += \"Circle tapped\"\n                    }\n\
    \                Spacer()\n            }.background(Color.yellow)\n          \
    \      .simultaneousGesture(\n                    TapGesture()\n             \
    \           .onEnded { _ in\n                            message = \"VStack tapped\"\
    \n                        })\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n7.  在画布面板中点击“Live”图标，然后点击蓝色 Circle。注意，`Text` 视图中会显示\
    \ `\"VStack tappedCircle tapped\"`，这是因为 `VStack` 上的 `.simultaneousGesture` 修饰符使其在\
    \ `Circle` 的 `.onTapGesture` 修饰符之前执行。\n8.  点击 `VStack` 的黄色背景。注意，`Text` 视图中仍然显示\
    \ `\"VStack tapped\"`。\n\n### 总结\n\n触摸手势无需在用户界面上放置按钮等对象即可向应用发送指令。手势通常可以用一个或多个指尖来操作，例如双击或三击。\n\
    \n在添加多个手势时，请记住：附加到单个视图上的手势会优先于附加到堆栈上的手势执行。如果你希望堆栈的手势修饰符先执行，请将其包裹在 `.highPriorityGesture`\
    \ 修饰符中。如果你希望堆栈和单个视图的手势修饰符依次执行，请将堆栈修饰符包裹在 `.simultaneousGesture` 修饰符中。\n\n通过让用户直接操作屏幕上的对象，为应用添加手势可以使用户界面更加简洁、直观。\n"
- fmt: "# 12. Using Alerts, Action Sheets, and Contextual Menus\n\nAlmost every app\
    \ needs to display and accept data from the user. The simplest way to display\
    \ data is through a `Text` view, but sometimes you need to display data and give\
    \ the user a way to respond. In that case, you can use an `Alert` or an `Action\
    \ Sheet`. Yet another way to display options to the user are contextual menus.\n\
    \nAn `Alert` pops up on the screen, giving the user a chance to respond. Then\
    \ users can dismiss the `Alert` by tapping one or more buttons as shown in Figure\
    \ 12-1.\n\n![](images/329781_7_En_12_Chapter/329781_7_En_12_Fig1_HTML.jpg)\n\n\
    A screenshot of a dialog box exhibiting a warning message. The text reads zombies\
    \ on the loose. An ok button is at the bottom.\n\nFigure 12-1\n\nAn `Alert` typically\
    \ displays a message and one or more buttons\n\nAn `Action Sheet` looks nearly\
    \ identical to an `Alert` except that an `Alert` appears in the middle of the\
    \ screen, while an `Action Sheet` slides up and appears at the bottom of the screen.\
    \ Alerts are meant more to grab the user’s attention such as warning if you’re\
    \ about to delete data that you won’t be able to retrieve or undo later. On the\
    \ other hand, action sheets are meant more as a reminder that may not be as crucial\
    \ or destructive.\n\nContextual menus appear after a long press gesture on a view\
    \ such as a `Text` view. Then it pops up as a list of options that the user can\
    \ select as shown in Figure 12-2.\n\n![](images/329781_7_En_12_Chapter/329781_7_En_12_Fig2_HTML.jpg)\n\
    \nA screenshot of a context menu comprises a list of color options labeled red,\
    \ purple, green, and orange. A text at the bottom reads pick a color.\n\nFigure\
    \ 12-2\n\nA Contextual Menu lists multiple options to select\n\n## Displaying\
    \ an Alert/Action Sheet\n\nEvery user interface needs to display data back to\
    \ the user. In some cases, this data can be displayed just in a label, but sometimes\
    \ you need to make sure the user sees certain information. In those situations,\
    \ you should use an alert controller.\n\nAn `Alert`/`Action Sheet` appears over\
    \ an app’s user interface and can be customized by changing the following properties:\n\
    \n*   Title – Text that appears at the top of the `Alert`/`Action Sheet`, often\
    \ in bold and a large font size\n\n*   Message – Text that appears underneath\
    \ the title in a smaller font size\n\n*   One or more buttons – A button that\
    \ can dismiss the `Alert`/`Action Sheet`\n\nA title typically consists of a single\
    \ word or short phrase that explains the purpose of the alert controller such\
    \ as displaying \"Warning\" or \"Log In.\" To dismiss an `Alert`/`Action Sheet`,\
    \ you need at least one button.\n\nTo see how to create a simple `Alert`/`Action\
    \ Sheet` that does nothing but display a title, a message, and a button to dismiss\
    \ it, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as \"Alert.\"\n\n2.  Click the `ContentView` file\
    \ in the Navigator pane.\n\n3.  Add the following `State` variable under the `struct\
    \ ContentView: View` line:\n\n    ```\n    @State var showAlert = false\n    ```\n\
    \n4.  Add a `VStack` with a `Button` like this:\n\n    ```\n    var body: some\
    \ View {\n        VStack {\n            Button(\"Show Alert\") {\n           \
    \     showAlert.toggle()\n            }\n        }\n    }\n    ```\n\n5.  Add\
    \ the `.alert` modifier to the `Button` like this:\n\n    ```\n    .alert(isPresented:\
    \ $showAlert) {\n        Alert(title: Text(\"Warning!\"), message: Text(\"Zombies\
    \ on the loose\"), dismissButton: .default(Text(\"OK\")))\n    }\n    ```\n\n\
    \    This `.alert` modifier shows an `Alert` when the `showAlert` `State` variable\
    \ is `true`. Then it uses a `Text` view to display \"Warning!\" and a second `Text`\
    \ view to display \"Zombies on the loose\". Finally, it uses a third `Text` view\
    \ to display \"OK\" on a `Button`.\n\nNote\n    The `Alert` uses a `dismissButton:`\
    \ parameter to define a single button to appear. To make the code shorter, you\
    \ can define the `Button`’s appearance by just using the style (`.default`) instead\
    \ of the longer version like this: `Alert.Button.default`.\n\nThe entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View\
    \ {\n    @State var showAlert = false\n    \n    var body: some View {\n     \
    \   VStack {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
    \            }\n            .alert(isPresented: $showAlert) {\n              \
    \  Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), dismissButton:\
    \ .default(Text(\"OK\")))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6.  Click the Live icon in the Canvas pane and then click the\
    \ `Button` to display the `Alert` (see Figure 12-1) in the middle of the screen.\n\
    \n7.  Click OK to make the `Alert` go away.\n\n8.  Replace `.alert` with `.actionSheet`\
    \ like this:\n\n    ```\n    .actionSheet(isPresented: $showAlert) {\n       \
    \ ActionSheet(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"\
    ), buttons: [.default(Text(\"OK\"))])\n    }\n    ```\n\nNote\n    Where the `Alert`\
    \ defined a `Button` using the `dismissButton:` parameter, the `ActionSheet` uses\
    \ the `buttons:` parameter and encloses one or more buttons inside square brackets\
    \ `[ ]` like an array. To make the code shorter, you can define the `Button`’s\
    \ appearance by just using the style (`.default`) instead of the longer version\
    \ like this: `ActionSheet.Button.default`.\n\n9.  Click the `Button` on the simulated\
    \ iOS screen. Notice that now an `Action Sheet` appears at the bottom of the screen.\n\
    \n10. Click the OK button to make the `Action Sheet` go away.\n\nCreating an `Alert`\
    \ or an `Action Sheet` is nearly identical but with minor differences in defining\
    \ buttons and whether you use `.alert` (and `Alert`) or `.actionSheet` (`ActionSheet`)."
