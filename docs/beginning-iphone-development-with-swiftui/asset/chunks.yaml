    \ assumes that the height of each mark (bar) is defined by a numeric value called\
    \ “sales,” which is part of an array (mySalesArray) of structures.\n\nSecond,\
    \ we need to calculate the average by adding the values of the items (such as\
    \ sales) and dividing by the total number of items. If there are two items (3\
    \ and 5), the average would be (3 + 5)/2.\n\nThe .map{Int($0.sales)}.reduce(0,+)\
    \ adds up all the sales (.map) and reduces it to a single value.\n\nThe Set(mySalesArray.map({$0.sales})).count\
    \ simply counts the total number of sales. The .foregroundStyle modifier then\
    \ defines the color of the RuleMark.\n\nNote\n\nRuleMarks can be used to highlight\
    \ any part of a chart.\n\nTo see how to display a RuleMark on a chart, follow\
    \ these steps:\n\n![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig6_HTML.jpg)\n\
    \nA bar graph represents the values for Oscar, Mayer, George, and Hormel. It indicates\
    \ the bars in the same color. Two horizontal lines in different colors are marked\
    \ across the bars.\n\nFigure 16-6\n\nRuleMarks display horizontal lines to identify\
    \ specific values in a bar chart\n\n1.  Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as “BarChartRuleMark.”\n\n2.  Click the ContentView\
    \ file in the Navigator pane. Add the Charts framework underneath the SwiftUI\
    \ framework like this:\n\n```\n    import Charts\n    ```\n\n3.  Add a structure\
    \ underneath the “import Charts” line like this:\n\n```\n    struct SalesPeople:\
    \ Identifiable {\n    var name: String\n    var department: String\n    var sales:\
    \ Int\n    var id = UUID()\n    }\n    ```\n\n4.  Add an array underneath the\
    \ structure like this:\n\n```\n    var mySalesArray: [SalesPeople] = [\n    .init(name:\
    \ \"Oscar\", sales: 50),\n    .init(name: \"Mayer\", sales: 43),\n    .init(name:\
    \ \"George\", sales: 62),\n    .init(name: \"Hormel\", sales: 26)\n    ]\n   \
    \ ```\n\n5.  Add a Chart inside a VStack like this:\n\n```\n    var body: some\
    \ View {\n    VStack {\n    Chart (mySalesArray) { x in\n    }\n    }\n    ```\n\
    \n6.  Add a BarMark inside the Chart like this:\n\n```\n    VStack {\n    Chart\
    \ (mySalesArray) { x in\n    BarMark(x: .value(\"Name\", x.name),\n    y: .value(\"\
    Sales\", x.sales))\n    }\n    }\n    ```\n\nThe BarMark inside the Chart creates\
    \ a simple bar chart.\n\n7.  Add the following two RuleMarks underneath the BarMark\
    \ like this:\n\n```\n    VStack {\n    Chart (mySalesArray) { x in\n    BarMark(x:\
    \ .value(\"Name\", x.name),\n    y: .value(\"Sales\", x.sales))\n    RuleMark(y:\
    \ .value(\"Average Sales\", (mySalesArray.map{Int($0.sales)}).reduce(0, +)/Set(mySalesArray.map({$0.sales})).count))\n\
    \    .foregroundStyle(.purple)\n    RuleMark(y: .value(\"Sales must not go below\
    \ this line\",20))\n    .foregroundStyle(.red)\n    }\n    }\n    ```\n\nThe entire\
    \ ContentView file should look like this:\n\n```\n    import SwiftUI\n    import\
    \ Charts\n    struct SalesPeople: Identifiable {\n    var name: String\n    var\
    \ sales: Int\n    var id = UUID()\n    }\n    var mySalesArray: [SalesPeople]\
    \ = [\n    .init(name: \"Oscar\", sales: 50),\n    .init(name: \"Mayer\", sales:\
    \ 43),\n    .init(name: \"George\", sales: 62),\n    .init(name: \"Hormel\", sales:\
