- fmt: "# Using a Toggle\n\nIf you look at the settings for an iPhone or iPad, you’ll\
    \ see a list of options that you can turn on or off as shown in Figure [9-1](#329781_7_En_9_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig1_HTML.png)\n\nA screenshot\
    \ titled, all keyboards, contains toggle ON for text, smart punctuation, character\
    \ preview, and shortcut, in 3 rows. A text below reads, double tapping the space\
    \ bar will insert a period followed by a space.\n\nFigure 9-1\n\nTypical uses\
    \ for a Toggle\n\nTo create a Toggle, you need to define the text to appear next\
    \ to the Toggle along with linking or binding a State variable to the Toggle such\
    \ as\n\n```\nToggle(isOn: $settingValue) {\nText(\"Toggle text\")\n}\n```\n\n\
    In this example, the Toggle changes the value of a State variable called `settingValue`,\
    \ which should be defined as a Boolean like this:\n\n```\n@State var settingValue\
    \ = true\n```\n\nThen the Text view displays “Toggle text” next to the Toggle\
    \ itself as shown in Figure [9-2](#329781_7_En_9_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig2_HTML.jpg)\n\
    \nA screenshot of a single toggle in ON position, with text, toggle text on the\
    \ left.\n\nFigure 9-2\n\nThe appearance of a typical Toggle\n\nTo see how a Toggle\
    \ works, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “Toggle.”\n2.  Click the `ContentView` file in\
    \ the Navigator pane.\n3.  Add the following State variable under the `struct\
    \ ContentView: View` line:\n\n    ```\n    struct ContentView: View {\n    @State\
    \ var myToggle = true\n    ```\n\n4.  Create a `VStack` and put a `Rectangle`\
    \ inside. Since a `Rectangle` will expand to fill the entire screen, make sure\
    \ you put a `.frame` modifier on it and define its `.foregroundColor` with the\
    \ previously defined State variable:\n\n    ```\n    var body: some View {\n \
    \   VStack {\n    Rectangle()\n    .frame(width: 200, height: 150)\n    .foregroundColor(myToggle\
    \ ? .orange : .green)\n    }\n    }\n    ```\n\n5.  Add the Toggle underneath\
    \ the `Rectangle` and its modifiers like this:\n\n```\nToggle(myToggle ? \"Orange\"\
    \ : \"Green\", isOn: $myToggle)\n```\n\nThe entire `ContentView` file should look\
    \ like this:\n\n1.  Click the Live icon in the Canvas pane. Notice that since\
    \ the State variable `myToggle` is `true`, the Rectangle initially appears in\
    \ orange.\n2.  Click the Toggle. Notice that each time you click the Toggle, the\
    \ color of the Rectangle alternates between orange and green, and the text on\
    \ the Toggle alternates between “Orange” and “Green” as well.\n\n```\nimport SwiftUI\n\
    struct ContentView: View {\n@State var myToggle = true\nvar body: some View {\n\
    VStack {\nRectangle()\n.frame(width: 200, height: 150)\n.foregroundColor(myToggle\
    \ ? .orange : .green)\nToggle(myToggle ? \"Orange\" : \"Green\", isOn: $myToggle)\n\
    }\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nContentView()\n}\n}\n```\n\n# Using a Stepper\n\nWhen you want\
    \ the user to input numeric data, you may want to restrict the range of acceptable\
    \ data. After all, if you ask for the user’s age, you don’t want –23 or 938478\
    \ since both are clearly impossible for someone’s age. To make it easy for the\
    \ user to input numeric data within an acceptable range, you can use a `Stepper`.\n\
    \n`Stepper`s store a value that users can increment by a fixed increment such\
    \ as 1 or 2.5. You can define a minimum and a maximum value that the `Stepper`\
    \ can represent such as a range between 1 and 10. Furthermore, you can define\
    \ whether the `Stepper` wraps or not. Wrapping means if you keep incrementing\
    \ the `Stepper` beyond its maximum value, it goes back to its minimum value. Likewise,\
    \ if you keep decrementing the `Stepper` below its minimum value, it jumps to\
    \ its maximum value. This can make it easy for users to choose different values\
    \ without having to exhaustively step from one extreme value to the other.\n\n\
    To see how a `Stepper` works, follow these steps:\n\n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig3_HTML.jpg)\n\
    \nA screenshot of the stepper. It contains the text, stepper value = 0, with a\
    \ negative and positive operator signs to its right.\n\nFigure 9-3\n\nA simple\
    \ Stepper\n\n1.  Create a new SwiftUI iOS App project and give it any name you\
    \ wish such as “Stepper.”\n2.  Click the `ContentView` file in the Navigator pane.\n\
    3.  Add the following State variable under the `struct ContentView: View` line:\n\
    \n    ```\n    struct ContentView: View {\n    @State var newValue = 0\n    ```\n\
    \n4.  Create a `VStack` inside the `var body: some View` and add a `Stepper` like\
    \ this:\n\n    ```\n    var body: some View {\n    VStack {\n    Stepper(value:\
    \ $newValue) {\n    Text(\"Stepper value = \\(newValue)\")\n    }.padding()\n\
    \    }\n    }\n    ```\n\n    This defines a simple `Stepper` that can represent\
    \ any value and increases or decreases its value by 1 as shown in Figure [9-3](#329781_7_En_9_Chapter.xhtml#Fig3).\n\
    \nThe entire `ContentView` file should look like this:\n\n1.  Click the Live icon\
    \ in the Canvas pane to run your app.\n2.  Click the – and + icons on the `Stepper`\
    \ to decrease or increase its value.\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n@State var newValue = 0\nvar body: some View {\nVStack {\nStepper(value:\
    \ $newValue) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n}\n}\n}\n\
    struct ContentView_Previews: PreviewProvider {\nstatic var previews: some View\
    \ {\nContentView()\n}\n}\n```\n\n## Defining a Range in a Stepper\n\nIn many cases,\
    \ you want to define a valid range of values that the `Stepper` can represent\
    \ such as from 1 to 25. To define a range for a `Stepper`, you need to list the\
    \ range within the `in:` parameter like this:\n\n```\nStepper(value: $newValue,\
    \ in: 1...10) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n```\n\n\
    To see how to define a range of values that a `Stepper` can represent, add the\
    \ preceding code so the entire `ContentView` file looks like this:\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n@State var newValue = 0\nvar body: some\
    \ View {\nVStack {\n// Basic stepper\nStepper(value: $newValue) {\nText(\"Stepper\
    \ value = \\(newValue)\")\n}.padding()\n// Stepper in a range\nStepper(value:\
    \ $newValue, in: 1...10) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n\
    }\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nContentView()\n}\n}\n```\n\nClick the Live icon in the Canvas pane\
    \ and click the bottom `Stepper`. Notice that because its range is restricted\
    \ between 1 and 10, clicking the – and + icons on the bottom `Stepper` won’t decrease\
    \ or increase the `Stepper`’s value below 1 or above 10."
  raw: "## Using a Toggle\n\nIf you look at the settings for an iPhone or iPad, you’ll\
    \ see a list of options that you can turn on or off as shown in Figure [9-1](#329781_7_En_9_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig1_HTML.png)\n\nA screenshot\
    \ titled, all keyboards, contains toggle ON for text, smart punctuation, character\
    \ preview, and shortcut, in 3 rows. A text below reads, double tapping the space\
    \ bar will insert a period followed by a space.\n\nFigure 9-1\n\nTypical uses\
    \ for a Toggle\n\nTo create a Toggle, you need to define the text to appear next\
    \ to the Toggle along with linking or binding a State variable to the Toggle such\
    \ as\n\n```\nToggle(isOn: $settingValue) {\nText(\"Toggle text\")\n}\n```\n\n\
    In this example, the Toggle changes the value of a State variable called settingValue,\
    \ which should be defined as a Boolean like this:\n\n```\n@State var settingValue\
    \ = true\n```\n\nThen the Text view displays “Toggle text” next to the Toggle\
    \ itself as shown in Figure [9-2](#329781_7_En_9_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig2_HTML.jpg)\n\
    \nA screenshot of a single toggle in ON position, with text, toggle text on the\
    \ left.\n\nFigure 9-2\n\nThe appearance of a typical Toggle\n\nTo see how a Toggle\
    \ works, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “Toggle.”\n\n2.  Click the ContentView file in\
    \ the Navigator pane.\n\n3.  Add the following State variable under the struct\
    \ ContentView: View line:\n\n    ```\n    struct ContentView: View {\n    @State\
    \ var myToggle = true\n    ```\n\n4.  Create a VStack and put a Rectangle inside.\
    \ Since a Rectangle will expand to fill the entire screen, make sure you put a\
    \ .frame modifier on it and define its .foregroundColor with the previously defined\
    \ State variable:\n\n    ```\n    var body: some View {\n    VStack {\n    Rectangle()\n\
    \    .frame(width: 200, height: 150)\n    .foregroundColor(myToggle ? .orange\
    \ : .green)\n    }\n    }\n    ```\n\n5.  Add the Toggle underneath the Rectangle\
    \ and its modifiers like this:\n\n```\nToggle(myToggle ? \"Orange\" : \"Green\"\
    , isOn: $myToggle)\n```\n\nThe entire ContentView file should look like this:\n\
    \n1.  Click the Live icon in the Canvas pane. Notice that since the State variable\
    \ myToggle is true, the Rectangle initially appears in orange.\n\n2.  Click the\
    \ Toggle. Notice that each time you click the Toggle, the color of the Rectangle\
    \ alternates between orange and green, and the text on the Toggle alternates between\
    \ “Orange” and “Green” as well.\n\n```\nimport SwiftUI\nstruct ContentView: View\
    \ {\n@State var myToggle = true\nvar body: some View {\nVStack {\nRectangle()\n\
    .frame(width: 200, height: 150)\n.foregroundColor(myToggle ? .orange : .green)\n\
    Toggle(myToggle ? \"Orange\" : \"Green\", isOn: $myToggle)\n}\n}\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n## Using a Stepper\n\nWhen you want the user to input numeric data, you may\
    \ want to restrict the range of acceptable data. After all, if you ask for the\
    \ user’s age, you don’t want –23 or 938478 since both are clearly impossible for\
    \ someone’s age. To make it easy for the user to input numeric data within an\
    \ acceptable range, you can use a Stepper.\n\nSteppers store a value that users\
    \ can increment by a fixed increment such as 1 or 2.5\\. You can define a minimum\
    \ and a maximum value that the Stepper can represent such as a range between 1\
    \ and 10. Furthermore, you can define whether the Stepper wraps or not. Wrapping\
    \ means if you keep incrementing the Stepper beyond its maximum value, it goes\
    \ back to its minimum value. Likewise, if you keep decrementing the Stepper below\
    \ its minimum value, it jumps to its maximum value. This can make it easy for\
    \ users to choose different values without having to exhaustively step from one\
    \ extreme value to the other.\n\nTo see how a Stepper works, follow these steps:\n\
    \n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig3_HTML.jpg)\n\nA screenshot\
    \ of the stepper. It contains the text, stepper value = 0, with a negative and\
    \ positive operator signs to its right.\n\nFigure 9-3\n\nA simple Stepper\n\n\
    1.  Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “Stepper.”\n\n2.  Click the ContentView file in the Navigator pane.\n\n3.  Add\
    \ the following State variable under the struct ContentView: View line:\n\n  \
    \  ```\n    struct ContentView: View {\n    @State var newValue = 0\n    ```\n\
    \n4.  Create a VStack inside the var body: some View and add a Stepper like this:\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Stepper(value: $newValue)\
    \ {\n    Text(\"Stepper value = \\(newValue)\")\n    }.padding()\n    }\n    }\n\
    \    ```\n\n    This defines a simple Stepper that can represent any value and\
    \ increases or decreases its value by 1 as shown in Figure [9-3](#329781_7_En_9_Chapter.xhtml#Fig3).\n\
    \nThe entire ContentView file should look like this:\n\n1.  Click the Live icon\
    \ in the Canvas pane to run your app.\n\n2.  Click the – and + icons on the Stepper\
    \ to decrease or increase its value.\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n@State var newValue = 0\nvar body: some View {\nVStack {\nStepper(value:\
    \ $newValue) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n}\n}\n}\n\
    struct ContentView_Previews: PreviewProvider {\nstatic var previews: some View\
    \ {\nContentView()\n}\n}\n```\n\n### Defining a Range in a Stepper\n\nIn many\
    \ cases, you want to define a valid range of values that the Stepper can represent\
    \ such as from 1 to 25\\. To define a range for a Stepper, you need to list the\
    \ range within the in: parameter like this:\n\n```\nStepper(value: $newValue,\
    \ in: 1...10) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n```\n\n\
    To see how to define a range of values that a Stepper can represent, add the preceding\
    \ code so the entire ContentView file looks like this:\n\n```\nimport SwiftUI\n\
    struct ContentView: View {\n@State var newValue = 0\nvar body: some View {\nVStack\
    \ {\n// Basic stepper\nStepper(value: $newValue) {\nText(\"Stepper value = \\\
    (newValue)\")\n}.padding()\n// Stepper in a range\nStepper(value: $newValue, in:\
    \ 1...10) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n}\n}\n}\nstruct\
    \ ContentView_Previews: PreviewProvider {\nstatic var previews: some View {\n\
    ContentView()\n}\n}\n```\n\nClick the Live icon in the Canvas pane and click the\
    \ bottom Stepper. Notice that because its range is restricted between 1 and 10,\
    \ clicking the – and + icons on the bottom Stepper won’t decrease or increase\
    \ the Stepper’s value below 1 or above 10."
  trans: "\n# 使用开关\n\n如果你查看 iPhone 或 iPad 的设置，你会看到一系列可以打开或关闭的选项，如图 9-1 所示。\n\n![](img/329781_7_En_9_Fig1_HTML.png)\n\
    \n一张标题为“所有键盘”的截图，包含文本、智能标点、字符预览和快捷指令的开关，共三行。下方文字说明：双击空格键将插入一个句点后跟一个空格。\n\n图 9-1\n\
    \n开关的典型用途\n\n要创建一个开关，你需要定义显示在开关旁边的文本，同时将一个状态变量与开关链接或绑定，例如：\n\n```\nToggle(isOn:\
    \ $settingValue) {\nText(\"开关文本\")\n}\n```\n\n在这个示例中，开关会改变一个名为 `settingValue`\
    \ 的状态变量的值，该变量应定义为布尔类型，如下所示：\n\n```\n@State var settingValue = true\n```\n\n然后，`Text`\
    \ 视图会在开关旁边显示“开关文本”，如图 9-2 所示。\n\n![](img/329781_7_En_9_Fig2_HTML.jpg)\n\n一张显示单个开关处于开启状态的截图，左侧有文本“开关文本”。\n\
    \n图 9-2\n\n典型开关的外观\n\n要了解开关的工作原理，请按照以下步骤操作：\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“Toggle”。\n\
    2.  点击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下状态变量：\n\
    \n    ```\n    struct ContentView: View {\n    @State var myToggle = true\n  \
    \  ```\n\n4.  创建一个 `VStack` 并在其中放入一个 `Rectangle`。由于 `Rectangle` 会扩展以填满整个屏幕，请确保为其添加一个\
    \ `.frame` 修饰符，并使用之前定义的状态变量设置其 `.foregroundColor`：\n\n    ```\n    var body: some\
    \ View {\n    VStack {\n    Rectangle()\n    .frame(width: 200, height: 150)\n\
    \    .foregroundColor(myToggle ? .orange : .green)\n    }\n    }\n    ```\n\n\
    5.  在 `Rectangle` 及其修饰符下方添加开关，如下所示：\n\n```\nToggle(myToggle ? \"橙色\" : \"绿色\"\
    , isOn: $myToggle)\n```\n\n整个 `ContentView` 文件应如下所示：\n\n1.  点击画布窗格中的“实时”图标。注意，由于状态变量\
    \ `myToggle` 为 `true`，矩形初始显示为橙色。\n2.  点击开关。注意，每次点击开关时，矩形的颜色会在橙色和绿色之间切换，开关上的文本也会在“橙色”和“绿色”之间交替。\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var myToggle = true\n\
    var body: some View {\nVStack {\nRectangle()\n.frame(width: 200, height: 150)\n\
    .foregroundColor(myToggle ? .orange : .green)\nToggle(myToggle ? \"橙色\" : \"绿色\"\
    , isOn: $myToggle)\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\n\
    static var previews: some View {\nContentView()\n}\n}\n```\n\n# 使用步进器\n\n当你希望用户输入数值数据时，你可能希望限制可接受数据的范围。毕竟，如果你询问用户的年龄，你不会希望得到\
    \ –23 或 938478，因为对于一个人的年龄来说，这两个值显然都是不可能的。为了让用户轻松输入可接受范围内的数值数据，你可以使用 `Stepper`。\n\
    \n`Stepper` 存储一个用户可以通过固定增量（如 1 或 2.5）递增的值。你可以定义 `Stepper` 可以表示的最小值和最大值，例如 1 到\
    \ 10 的范围。此外，你还可以定义步进器是否循环。循环是指如果你持续增加步进器的值超过其最大值，它会回到最小值。同样，如果你持续减小步进器的值低于其最小值，它会跳转到最大值。这可以让用户轻松选择不同的值，而无需从一个极端值逐步调整到另一个极端值。\n\
    \n要了解 `Stepper` 的工作原理，请按照以下步骤操作：\n\n![](img/329781_7_En_9_Fig3_HTML.jpg)\n\n步进器的截图。它包含文本“步进器值\
    \ = 0”，右侧有减号和加号操作符。\n\n图 9-3\n\n一个简单的步进器\n\n1.  创建一个新的 SwiftUI iOS 应用项目，并为其任意命名，例如“Stepper”。\n\
    2.  点击导航窗格中的 `ContentView` 文件。\n3.  在 `struct ContentView: View` 行下方添加以下状态变量：\n\
    \n    ```\n    struct ContentView: View {\n    @State var newValue = 0\n    ```\n\
    \n4.  在 `var body: some View` 内部创建一个 `VStack` 并添加一个 `Stepper`，如下所示：\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    Stepper(value: $newValue) {\n  \
    \  Text(\"步进器值 = \\(newValue)\")\n    }.padding()\n    }\n    }\n    ```\n\n \
    \   这定义了一个简单的 `Stepper`，它可以表示任何值，并以 1 为增量增加或减少其值，如图 9-3 所示。\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n1.  点击画布窗格中的“实时”图标来运行你的应用。\n2.  点击 `Stepper` 上的减号和加号图标来减小或增加其值。\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var newValue = 0\nvar\
    \ body: some View {\nVStack {\nStepper(value: $newValue) {\nText(\"步进器值 = \\(newValue)\"\
    )\n}.padding()\n}\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic\
    \ var previews: some View {\nContentView()\n}\n}\n```\n\n## 在步进器中定义范围\n\n在许多情况下，你需要定义\
    \ `Stepper` 可以表示的有效值范围，例如从 1 到 25。要为 `Stepper` 定义范围，你需要在 `in:` 参数中列出该范围，如下所示：\n\
    \n```\nStepper(value: $newValue, in: 1...10) {\nText(\"步进器值 = \\(newValue)\")\n\
    }.padding()\n```\n\n要了解如何定义 `Stepper` 可以表示的值范围，请添加上述代码，使整个 `ContentView` 文件如下所示：\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var newValue = 0\nvar\
    \ body: some View {\nVStack {\n// 基本步进器\nStepper(value: $newValue) {\nText(\"\
    步进器值 = \\(newValue)\")\n}.padding()\n// 范围步进器\nStepper(value: $newValue, in: 1...10)\
    \ {\nText(\"步进器值 = \\(newValue)\")\n}.padding()\n}\n}\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n点击画布窗格中的“实时”图标，然后点击底部的 `Stepper`。注意，由于它的范围被限制在 1 到 10 之间，点击底部 `Stepper` 的减号和加号图标将无法将\
    \ `Stepper` 的值减小到 1 以下或增加到 10 以上。\n"
- fmt: "# Defining an Increment/Decrement Value in a Stepper\n\nNormally, a `Stepper`\
    \ increases or decreases its value by 1. Sometimes you might want to increment/decrement\
    \ by a value other than 1 such as 2 or 5. To define an integer value to increment/decrement\
    \ a `Stepper`, you need to define an integer value for the `step:` parameter like\
    \ this:\n\n```\nStepper(value: $newValue, in: 1...10, step: 2) {\n    Text(\"\
    Stepper value = \\(newValue)\")\n}.padding()\n```\n\nThe entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View\
    \ {\n    @State var newValue = 0\n\n    var body: some View {\n        VStack\
    \ {\n            Stepper(value: $newValue) {\n                Text(\"Stepper value\
    \ = \\(newValue)\")\n            }.padding()\n\n            // Stepper in a range\n\
    \            Stepper(value: $newValue, in: 1...10) {\n                Text(\"\
    Stepper value = \\(newValue)\")\n            }.padding()\n\n            // Stepper\
    \ in a range with increments\n            Stepper(value: $newValue, in: 1...10,\
    \ step: 2) {\n                Text(\"Stepper value = \\(newValue)\")\n       \
    \     }.padding()\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nClick the Live icon in the Canvas pane and click the bottom `Stepper`. Notice\
    \ that because its range is restricted between 1 and 10, clicking the – and +\
    \ icons on the bottom `Stepper` won’t decrease or increase the `Stepper`’s value\
    \ below 1 or above 10. Yet clicking the – and + icons on the bottom `Stepper`\
    \ increments/decrements the `Stepper`’s value by 2.\n\nIf you want to define a\
    \ decimal value for the `step:` parameter, you’ll need to make sure every value\
    \ used in the `Stepper` is a decimal value such as:\n\n```\nStepper(value: $decimalValue,\n\
    \        in: 1.0...10.0,\n        step: 0.25) {\n    Text(\"Stepper value = \\\
    (decimalValue)\")\n}.padding()\n```\n\nIn the preceding `Stepper` definition,\
    \ the range goes from 1.0 (not just 1) up to and including 10.0 (not just 10).\
    \ Then the `step:` parameter is defined as 0.25. Finally, the `State` variable\
    \ (`decimalValue`) must also be defined as a decimal value (`Double` data type)\
    \ like this:\n\n```\n@State var decimalValue: Double = 0\n```\n\nThe entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View\
    \ {\n    @State var newValue = 0\n    @State var decimalValue: Double = 0\n\n\
    \    var body: some View {\n        VStack {\n            // Basic stepper\n \
    \           Stepper(value: $newValue) {\n                Text(\"Stepper value\
    \ = \\(newValue)\")\n            }.padding()\n\n            // Stepper in a range\n\
    \            Stepper(value: $newValue, in: 1...10) {\n                Text(\"\
    Stepper value = \\(newValue)\")\n            }.padding()\n\n            // Stepper\
    \ with increment value\n            Stepper(value: $newValue, in: 1...10, step:\
    \ 2) {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // Stepper with decimal increment value\n            Stepper(value:\
    \ $decimalValue,\n                    in: 1.0...10.0,\n                    step:\
    \ 0.25) {\n                Text(\"Stepper value = \\(decimalValue)\")\n      \
    \      }.padding()\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \nClick the Live icon in the Canvas pane and click the bottom `Stepper`. Notice\
    \ that because its range is restricted between 1.0 and 10.0, clicking the – and\
    \ + icons on the bottom `Stepper` won’t decrease or increase the `Stepper`’s value\
    \ below 1.0 or above 10.0. Yet clicking the – and + icons on the bottom `Stepper`\
    \ increments/decrements the `Stepper`’s value by 0.25.\n\n## Using Sliders\n\n\
    Like a `Stepper`, a `Slider` lets the user choose a numeric value without typing\
    \ a specific number. While a `Stepper` forces users to increment/decrement values\
    \ by a fixed amount, sliders make it easy for users to choose between a range\
    \ of values quickly by simply changing the `Slider`’s position. This makes a `Slider`\
    \ better suited than a `Stepper` for letting the user choose from a wide range\
    \ of values.\n\nAlthough the `Slider` can represent any `Double` data type (decimal\
    \ number), by default it ranges from 0 to 1 where the far left represents 0 and\
    \ the far right represents 1.\n\nTo see how a `Slider` works, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"Slider.\"\n\n2. Click the `ContentView` file in the Navigator pane.\n\n3.\
    \ Add the following `State` variable under the `struct ContentView: View` line:\n\
    \n```\nstruct ContentView: View {\n    @State var sliderValue = 0.0\n```\n\n4.\
    \ Create a `VStack` inside the `var body: some View` and add a `Text` and a `Slider`\
    \ like this:\n\n```\nvar body: some View {\n    VStack (spacing: 28){\n      \
    \  Text(\"Slider value = \\(sliderValue)\")\n        Slider(value: $sliderValue)\n\
    \    }\n}\n```\n\n5. Click the Live icon in the Canvas pane and drag the `Slider`\
    \ left and right. Notice that the value of this `Slider` ranges from 0 to 1 as\
    \ a `Double` value, which displays decimal values.\n\n### Changing the Color of\
    \ a Slider\n\nBy default, a `Slider` displays the color blue as you drag the `Slider`\
    \ to the right. If you want to change that color, you can use the `.accentColor`\
    \ modifier like this as shown in Figure 9-4:\n\n![A screenshot of the change in\
    \ color of the slider. The left part of the horizontal, separated by a small circle,\
    \ denotes the accent color.](images/329781_7_En_9_Chapter/329781_7_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4** – The accent color on a `Slider`\n\n```\nSlider(value: $sliderValue)\n\
    \    .accentColor(.red)\n```\n\n### Defining a Range for a Slider\n\nBy default,\
    \ a `Slider` ranges in value from 0 to 1. However, you may want to define a different\
    \ range for the `Slider` such as:\n\n```\nSlider(value: $sliderValue, in: 1...50)\n\
    ```\n\nThis defines a minimum value for the `Slider` as 1 and a maximum value\
    \ as 50. Just remember that these values are actually decimal values such as 1.0\
    \ through 50.0.\n\n### Defining a Step Increment for a Slider\n\nIf the range\
    \ of a `Slider` is greater than 1, dragging the `Slider` increments/decrements\
    \ it by 1. To define a different value for the `Slider` to increment/decrement,\
    \ you need to define a `step:` parameter such as:\n\n```\nSlider(value: $sliderValue,\
    \ in: 1...50, step: 4)\n```\n\nThis defines the `Slider` to change values by 4\
    \ such as going from 1 to 5 to 9.\n\n### Displaying Minimum and Maximum Labels\
    \ on a Slider\n\nTo make a `Slider` easier to understand, you can display a minimum\
    \ and a maximum value label on each end of the `Slider`. That way you can make\
    \ it clear what the minimum and the maximum value of a `Slider` might be such\
    \ as:\n\n```\nSlider(value: $sliderValue, in: 1...50, step: 4) {\n    Text(\"\
    Slider\")\n} minimumValueLabel: {\n    Text(\"1\")\n} maximumValueLabel: {\n \
    \   Text(\"50\")\n}\n```\n\nThis defines a `Slider` that displays 0 at the far\
    \ left and 50 at the far right as shown in Figure 9-5:\n\n![A screenshot of the\
    \ slider represented by a horizontal line with 1 and 50 on either side. The left\
    \ part of the line, separated by a small circle has an accent color.](images/329781_7_En_9_Chapter/329781_7_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5** – Displaying minimum and maximum labels on a `Slider`\n\nTo see\
    \ how all these different sliders work, edit the `ContentView` file as follows:\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var sliderValue\
    \ = 0.0\n\n    var body: some View {\n        VStack (spacing: 28){\n        \
    \    Text(\"Slider value = \\(sliderValue)\")\n\n            Slider(value: $sliderValue)\n\
    \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50)\n\
    \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50,\
    \ step: 4)\n                .padding()\n\n            Slider(value: $sliderValue,\
    \ in: 1...50, step: 4) {\n                Text(\"Slider\")\n            } minimumValueLabel:\
    \ {\n                Text(\"1\")\n            } maximumValueLabel: {\n       \
    \         Text(\"50\")\n            }.padding()\n        }\n    }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\nWhen you run this project, the top\
    \ `Slider` ranges in value from 0 to 1. That means when you drag the other sliders,\
    \ the top `Slider` immediately moves all the way to the right. That’s because\
    \ the top `Slider` can only have a maximum value of 1, while the other sliders\
    \ range in value from 1 to 50. So dragging the other sliders always pins the top\
    \ `Slider` all the way to the right to represent a value of 1, which is the maximum\
    \ value it can represent."
  raw: "### Defining an Increment/Decrement Value in a Stepper\n\nNormally, a Stepper\
    \ increases or decreases its value by 1\\. Sometimes you might want to increment/decrement\
    \ by a value other than 1 such as 2 or 5\\. To define an integer value to increment/decrement\
    \ a Stepper, you need to define an integer value for the step: parameter like\
    \ this:\n\n```\nStepper(value: $newValue, in: 1...10, step: 2) {\nText(\"Stepper\
    \ value = \\(newValue)\")\n}.padding()\n```\n\nThe entire ContentView file should\
    \ look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View {\n@State var\
    \ newValue = 0\nvar body: some View {\nVStack {\nStepper(value: $newValue) {\n\
    Text(\"Stepper value = \\(newValue)\")\n}.padding()\n// Stepper in a range\nStepper(value:\
    \ $newValue, in: 1...10) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n\
    // Stepper in a range with increments\nStepper(value: $newValue, in: 1...10, step:\
    \ 2) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n}\n}\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \nClick the Live icon in the Canvas pane and click the bottom Stepper. Notice\
    \ that because its range is restricted between 1 and 10, clicking the – and +\
    \ icons on the bottom Stepper won’t decrease or increase the Stepper’s value below\
    \ 1 or above 10\\. Yet clicking the – and + icons on the bottom Stepper increments/decrements\
    \ the Stepper’s value by 2.\n\nIf you want to define a decimal value for the step:\
    \ parameter, you’ll need to make sure every value used in the Stepper is a decimal\
    \ value such as\n\n```\nStepper(value: $decimalValue,\nin: 1.0...10.0,\nstep:\
    \ 0.25) {\nText(\"Stepper value = \\(decimalValue)\")\n}.padding()\n```\n\nIn\
    \ the preceding Stepper definition, the range goes from 1.0 (not just 1) up to\
    \ and including 10.0 (not just 10). Then the step: parameter is defined as 0.25\\\
    . Finally, the State variable (decimalValue) must also be defined as a decimal\
    \ value (Double data type) like this:\n\n```\n@State var decimalValue: Double\
    \ = 0\n```\n\nThe entire ContentView file should look like this:\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n@State var newValue = 0\n@State var decimalValue:\
    \ Double = 0\nvar body: some View {\nVStack {\n// Basic stepper\nStepper(value:\
    \ $newValue) {\nText(\"Stepper value = \\(newValue)\")\n}.padding()\n// Stepper\
    \ in a range\nStepper(value: $newValue, in: 1...10) {\nText(\"Stepper value =\
    \ \\(newValue)\")\n}.padding()\n// Stepper with increment value\nStepper(value:\
    \ $newValue, in: 1...10, step: 2) {\nText(\"Stepper value = \\(newValue)\")\n\
    }.padding()\n// Stepper with decimal increment value\nStepper(value: $decimalValue,\n\
    in: 1.0...10.0,\nstep: 0.25) {\nText(\"Stepper value = \\(decimalValue)\")\n}.padding()\n\
    }\n}\n}\nstruct ContentView_Previews: PreviewProvider {\nstatic var previews:\
    \ some View {\nContentView()\n}\n}\n```\n\nClick the Live icon in the Canvas pane\
    \ and click the bottom Stepper. Notice that because its range is restricted between\
    \ 1.0 and 10.0, clicking the – and + icons on the bottom Stepper won’t decrease\
    \ or increase the Stepper’s value below 1.0 or above 10.0\\. Yet clicking the\
    \ – and + icons on the bottom Stepper increments/decrements the Stepper’s value\
    \ by 0.25.\n\n## Using Sliders\n\nLike a Stepper, a Slider lets the user choose\
    \ a numeric value without typing a specific number. While a Stepper forces users\
    \ to increment/decrement values by a fixed amount, sliders make it easy for users\
    \ to choose between a range of values quickly by simply changing the Slider’s\
    \ position. This makes a Slider better suited than a Stepper for letting the user\
    \ choose from a wide range of values.\n\nAlthough the Slider can represent any\
    \ Double data type (decimal number), by default it ranges from 0 to 1 where the\
    \ far left represents 0 and the far right represents 1.\n\nTo see how a Slider\
    \ works, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “Slider.”\n\n2.  Click the ContentView file in\
    \ the Navigator pane.\n\n3.  Add the following State variable under the struct\
    \ ContentView: View line:\n\n    ```\n    struct ContentView: View {\n    @State\
    \ var sliderValue = 0.0\n    ```\n\n4.  Create a VStack inside the var body: some\
    \ View and add a Text and a Slider like this:\n\n    ```\n    var body: some View\
    \ {\n    VStack (spacing: 28){\n    Text(\"Slider value = \\(sliderValue)\")\n\
    \    Slider(value: $sliderValue)\n    }\n    }\n    ```\n\n5.  Click the Live\
    \ icon in the Canvas pane and drag the Slider left and right. Notice that the\
    \ value of this Slider ranges from 0 to 1 as a Double value, which displays decimal\
    \ values.\n\n### Changing the Color of a Slider\n\nBy default, a Slider displays\
    \ the color blue as you drag the Slider to the right. If you want to change that\
    \ color, you can use the .accentColor modifier like this as shown in Figure [9-4](#329781_7_En_9_Chapter.xhtml#Fig4):\n\
    \n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig4_HTML.jpg)\n\nA screenshot\
    \ of the change in color of the slider. The left part of the horizontal, separated\
    \ by a small circle, denotes the accent color.\n\nFigure 9-4\n\nThe accent color\
    \ on a Slider\n\n```\nSlider(value: $sliderValue)\n.accentColor(.red)\n```\n\n\
    ### Defining a Range for a Slider\n\nBy default, a Slider ranges in value from\
    \ 0 to 1\\. However, you may want to define a different range for the Slider such\
    \ as\n\n```\nSlider(value: $sliderValue, in: 1...50)\n```\n\nThis defines a minimum\
    \ value for the Slider as 1 and a maximum value as 50\\. Just remember that these\
    \ values are actually decimal values such as 1.0 through 50.0.\n\n### Defining\
    \ a Step Increment for a Slider\n\nIf the range of a Slider is greater than 1,\
    \ dragging the Slider increments/decrements it by 1\\. To define a different value\
    \ for the Slider to increment/decrement, you need to define a step: parameter\
    \ such as\n\n```\nSlider(value: $sliderValue, in: 1...50, step: 4)\n```\n\nThis\
    \ defines the Slider to change values by 4 such as going from 1 to 5 to 9.\n\n\
    ### Displaying Minimum and Maximum Labels on a Slider\n\nTo make a Slider easier\
    \ to understand, you can display a minimum and a maximum value label on each end\
    \ of the Slider. That way you can make it clear what the minimum and the maximum\
    \ value of a Slider might be such as\n\n```\nSlider(value: $sliderValue, in: 1...50,\
    \ step: 4) {\nText(\"Slider\")\n} minimumValueLabel: {\nText(\"1\")\n} maximumValueLabel:\
    \ {\nText(\"50\")\n}\n```\n\nThis defines a Slider that displays 0 at the far\
    \ left and 50 at the far right as shown in Figure [9-5](#329781_7_En_9_Chapter.xhtml#Fig5).\n\
    \n![](images/329781_7_En_9_Chapter/329781_7_En_9_Fig5_HTML.jpg)\n\nA screenshot\
    \ of the slider represented by a horizontal line with 1 and 50 on either side.\
    \ The left part of the line, separated by a small circle has an accent color.\n\
    \nFigure 9-5\n\nDisplaying minimum and maximum labels on a Slider\n\nTo see how\
    \ all these different sliders work, edit the ContentView file as follows:\n\n\
    ```\nimport SwiftUI\nstruct ContentView: View {\n@State var sliderValue = 0.0\n\
    var body: some View {\nVStack (spacing: 28){\nText(\"Slider value = \\(sliderValue)\"\
    )\nSlider(value: $sliderValue)\n.padding()\nSlider(value: $sliderValue, in: 1...50)\n\
    .padding()\nSlider(value: $sliderValue, in: 1...50, step: 4)\n.padding()\nSlider(value:\
    \ $sliderValue, in: 1...50, step: 4) {\nText(\"Slider\")\n} minimumValueLabel:\
    \ {\nText(\"1\")\n} maximumValueLabel: {\nText(\"50\")\n}.padding()\n}\n}\n}\n\
    struct ContentView_Previews: PreviewProvider {\nstatic var previews: some View\
    \ {\nContentView()\n}\n}\n```\n\nWhen you run this project, the top Slider ranges\
    \ in value from 0 to 1\\. That means when you drag the other sliders, the top\
    \ Slider immediately moves all the way to the right. That’s because the top Slider\
    \ can only have a maximum value of 1, while the other sliders range in value from\
    \ 1 to 50\\. So dragging the other sliders always pins the top Slider all the\
    \ way to the right to represent a value of 1, which is the maximum value it can\
    \ represent."
  trans: "\n# 在步进器中定义增量/减量值\n\n通常，`Stepper`（步进器）会按 1 来增减其值。有时你可能想要按 1 以外的数值，例如 2 或\
    \ 5 来增减。要定义一个用于增减 `Stepper` 值的整数，你需要为 `step:` 参数定义一个整数值，如下所示：\n\n```\nStepper(value:\
    \ $newValue, in: 1...10, step: 2) {\n    Text(\"Stepper value = \\(newValue)\"\
    )\n}.padding()\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct\
    \ ContentView: View {\n    @State var newValue = 0\n\n    var body: some View\
    \ {\n        VStack {\n            Stepper(value: $newValue) {\n             \
    \   Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\n      \
    \      // 在指定范围内的步进器\n            Stepper(value: $newValue, in: 1...10) {\n  \
    \              Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 在指定范围内并带增量值的步进器\n            Stepper(value: $newValue, in: 1...10,\
    \ step: 2) {\n                Text(\"Stepper value = \\(newValue)\")\n       \
    \     }.padding()\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n点击画布面板中的“Live”图标，然后点击底部的 `Stepper`。请注意，由于其范围被限制在 1 到 10 之间，点击底部 `Stepper` 的“–”和“+”图标不会将值减至\
    \ 1 以下或增至 10 以上。然而，点击这些图标会使该 `Stepper` 的值按 2 进行增减。\n\n如果你想为 `step:` 参数定义一个十进制值，你需要确保在\
    \ `Stepper` 中使用的所有值都是十进制类型，例如：\n\n```\nStepper(value: $decimalValue,\n       \
    \ in: 1.0...10.0,\n        step: 0.25) {\n    Text(\"Stepper value = \\(decimalValue)\"\
    )\n}.padding()\n```\n\n在上述 `Stepper` 定义中，范围是从 1.0（不仅仅是 1）到 10.0（包含）。然后 `step:`\
    \ 参数被定义为 0.25。最后，`State` 变量（`decimalValue`）也必须定义为十进制值（`Double` 数据类型），如下所示：\n\n\
    ```\n@State var decimalValue: Double = 0\n```\n\n完整的 `ContentView` 文件应如下所示：\n\n\
    ```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var newValue = 0\n\
    \    @State var decimalValue: Double = 0\n\n    var body: some View {\n      \
    \  VStack {\n            // 基础步进器\n            Stepper(value: $newValue) {\n \
    \               Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 在指定范围内的步进器\n            Stepper(value: $newValue, in: 1...10)\
    \ {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 带增量值的步进器\n            Stepper(value: $newValue, in: 1...10, step:\
    \ 2) {\n                Text(\"Stepper value = \\(newValue)\")\n            }.padding()\n\
    \n            // 带十进制增量值的步进器\n            Stepper(value: $decimalValue,\n    \
    \                in: 1.0...10.0,\n                    step: 0.25) {\n        \
    \        Text(\"Stepper value = \\(decimalValue)\")\n            }.padding()\n\
    \        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n点击画布面板中的“Live”图标，然后点击底部的\
    \ `Stepper`。请注意，由于其范围被限制在 1.0 到 10.0 之间，点击底部 `Stepper` 的“–”和“+”图标不会将值减至 1.0 以下或增至\
    \ 10.0 以上。然而，点击这些图标会使该 `Stepper` 的值按 0.25 进行增减。\n\n## 使用滑块\n\n与 `Stepper` 类似，`Slider`（滑块）允许用户在不输入特定数字的情况下选择数值。`Stepper`\
    \ 迫使用户按固定量增减值，而滑块则使用户能够通过简单地改变 `Slider` 的位置，快速在某个值域范围内进行选择。这使得 `Slider` 比 `Stepper`\
    \ 更适合让用户从大范围的值中做选择。\n\n尽管 `Slider` 可以表示任何 `Double` 数据类型（十进制数），但默认情况下其值域范围为 0 到\
    \ 1，最左侧代表 0，最右侧代表 1。\n\n要了解 `Slider` 的工作原理，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI iOS\
    \ 应用项目，并为其任意命名，例如“Slider”。\n\n2.  在导航器面板中点击 `ContentView` 文件。\n\n3.  在 `struct\
    \ ContentView: View` 行下方添加以下 `State` 变量：\n\n```\nstruct ContentView: View {\n\
    \    @State var sliderValue = 0.0\n```\n\n4.  在 `var body: some View` 内部创建一个 `VStack`，并添加一个\
    \ `Text` 和一个 `Slider`，如下所示：\n\n```\nvar body: some View {\n    VStack (spacing:\
    \ 28){\n        Text(\"Slider value = \\(sliderValue)\")\n        Slider(value:\
    \ $sliderValue)\n    }\n}\n```\n\n5.  点击画布面板中的“Live”图标，然后将 `Slider` 左右拖动。请注意，此\
    \ `Slider` 的值域范围为 0 到 1，是一个 `Double` 值，会显示为十进制数。\n\n### 更改滑块的颜色\n\n默认情况下，当你向右拖动\
    \ `Slider` 时，它会显示蓝色。如果你想更改该颜色，可以使用 `.accentColor` 修饰符，如图 9-4 所示：\n\n![一张显示滑块颜色变化的截图。水平条被一个小圆点分隔，其左侧部分显示强调色。](img/329781_7_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4** – `Slider` 上的强调色\n\n```\nSlider(value: $sliderValue)\n    .accentColor(.red)\n\
    ```\n\n### 为滑块定义范围\n\n默认情况下，`Slider` 的值域范围是 0 到 1。但是，你可能希望为 `Slider` 定义不同的范围，例如：\n\
    \n```\nSlider(value: $sliderValue, in: 1...50)\n```\n\n这将 `Slider` 的最小值定义为 1，最大值定义为\
    \ 50。请记住，这些值实际上是十进制值，例如 1.0 到 50.0。\n\n### 为滑块定义步进增量\n\n如果 `Slider` 的范围大于 1，拖动\
    \ `Slider` 会按 1 增减。要为 `Slider` 定义不同的增减量，你需要定义一个 `step:` 参数，例如：\n\n```\nSlider(value:\
    \ $sliderValue, in: 1...50, step: 4)\n```\n\n这将把 `Slider` 的值的改变量定义为 4，例如从 1 变为\
    \ 5，再变为 9。\n\n### 在滑块上显示最小值和最大值标签\n\n为了使 `Slider` 更易于理解，你可以在 `Slider` 的两端显示最小值和最大值的标签。这样你可以清晰地表明`Slider`\
    \ 的最小值和最大值可能是什么，例如：\n\n```\nSlider(value: $sliderValue, in: 1...50, step: 4) {\n\
    \    Text(\"Slider\")\n} minimumValueLabel: {\n    Text(\"1\")\n} maximumValueLabel:\
    \ {\n    Text(\"50\")\n}\n```\n\n这将定义一个在左侧显示 0，在右侧显示 50 的 `Slider`，如图 9-5 所示：\n\
    \n![一张滑块截图，显示为一条水平线，两侧分别标有 1 和 50。线条被一个小圆点分隔，左侧部分带有强调色。](img/329781_7_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5** – 在 `Slider` 上显示最小值和最大值标签\n\n要查看所有这些不同滑块的工作方式，请按如下方式编辑 `ContentView`\
    \ 文件：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var sliderValue\
    \ = 0.0\n\n    var body: some View {\n        VStack (spacing: 28){\n        \
    \    Text(\"Slider value = \\(sliderValue)\")\n\n            Slider(value: $sliderValue)\n\
    \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50)\n\
    \                .padding()\n\n            Slider(value: $sliderValue, in: 1...50,\
    \ step: 4)\n                .padding()\n\n            Slider(value: $sliderValue,\
    \ in: 1...50, step: 4) {\n                Text(\"Slider\")\n            } minimumValueLabel:\
    \ {\n                Text(\"1\")\n            } maximumValueLabel: {\n       \
    \         Text(\"50\")\n            }.padding()\n        }\n    }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n当你运行这个项目时，顶部的 `Slider` 的值域范围为 0 到\
    \ 1。这意味着当你拖动其他滑块时，顶部的 `Slider` 会立即移动到最右侧。这是因为顶部 `Slider` 的最大值只能是 1，而其他滑块的值域范围是\
    \ 1 到 50。因此，拖动其他滑块时，总是会将顶部 `Slider` 固定在最右侧，以表示值 1，这是它能表示的最大值。\n"
- fmt: "# Summary\n\nWhen your app needs the user to input numeric data, a text field\
    \ can work, but it might be clumsy, especially if you only want to accept a limited\
    \ range of numeric values. To make it easy to input numeric data, use a `Stepper`\
    \ or a `Slider`.\n\nBoth a `Stepper` and a `Slider` can define a minimum and a\
    \ maximum value, so that way the user can’t input numeric data below a minimum\
    \ value or above a maximum value. Both steppers and sliders let you define a different\
    \ increment/decrement value other than 1.\n\nA `Stepper` takes up less space,\
    \ but a `Slider` makes it easier to change values from one extreme to another\
    \ by simply dragging the `Slider` from side to side.\n\nBy using steppers and\
    \ sliders, you can make it easy for users to input numeric data. By using a `Toggle`,\
    \ you can make it easy for users to choose between exactly two choices such as\
    \ on/off or yes/no. Steppers, sliders, and toggles simply make it easy for users\
    \ to enter only valid data.\n\n# 10. Providing Options with Links and Menus\n\n\
    At one time, apps just needed buttons to let the user choose commands. As iPhone\
    \ and iPad apps started getting more sophisticated, the need for alternate ways\
    \ to allow the user to select commands has grown as well. Two common ways to display\
    \ commands for users to select are links and menus.\n\nA `Link` resembles a `Button`,\
    \ except that it opens up a browser to display the contents of a website. A `Menu`\
    \ lets you display a list of options, which can also include submenus as shown\
    \ in Figure 10-1.\n\n![Figure 10-1](images/329781_7_En_10_Chapter/329781_7_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1**: A `Menu` displaying a list of options including a submenu.\n\
    \n## Using Links\n\nLinks offer a handy way to give users a chance to visit a\
    \ website from within an app. A `Link` defines a website address such as:\n\n\
    ```swift\nLink(destination: URL(string: \"https://www.apple.com\")! ) {\n    Text(\"\
    Apple\")\n}\n```\n\nThe `Text` view defines the text that appears on the link.\
    \ You can add any modifiers you want to this `Text` view such as defining a font\
    \ or background color.\n\nThe `Link` must define a `destination` as a `URL`. One\
    \ way to make sure the website address is accurate is to visit the desired website\
    \ and then copy its address from your browser and paste it into your Swift code.\n\
    \n**Note**: To test if the `Link` successfully loads the website address, you\
    \ need to test the project either in the Simulator or on an actual iOS device.\
    \ The Canvas pane cannot open the Safari browser like the Simulator or an iOS\
    \ device can do.\n\n## Using ShareLinks\n\nAn ordinary `Link` acts like a hyperlink\
    \ to take users to a specific web page. A `ShareLink` lets users tap on a link\
    \ that displays a share sheet that gives users options for copying data or sharing\
    \ it with other apps as shown in Figure 10-2.\n\n![Figure 10-2](images/329781_7_En_10_Chapter/329781_7_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2**: A `ShareLink` displays a share sheet of options for sharing\
    \ data with other apps.\n\nThe simplest `ShareLink` simply defines an item to\
    \ share, which can be a string or `URL` such as:\n\n```swift\nShareLink(item:\
    \ \"This text will be shared\")\nShareLink(item: URL(string: \"https://www.apple.com\"\
    )!)\n```\n\nRather than type a string or `URL` directly in a `ShareLink`, you\
    \ can also use variables such as:\n\n```swift\nlet shareText = \"This text will\
    \ be shared\"\nShareLink(item: shareText)\nlet url = URL(string: \"https://www.apple.com\"\
    )!\nShareLink(item: url)\n```\n\nBy default, a `ShareLink` simply displays a share\
    \ icon and the word “Share…” as shown in Figure 10-3.\n\n![Figure 10-3](images/329781_7_En_10_Chapter/329781_7_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3**: The default appearance of a `ShareLink` displays a share icon\
    \ and the word “Share…”\n\nWhen users click the `ShareLink`, a share sheet appears\
    \ (see Figure 10-2), allowing users to share the data in the `ShareLink` with\
    \ other apps. To see how this works, follow these steps:\n\n![Figure 10-4](images/329781_7_En_10_Chapter/329781_7_En_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4**: The user interface with two `ShareLink`s and a `TextField`.\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “ShareLink.”\n\n2. Click the `ContentView` file in the Navigator pane.\n\n3.\
    \ Add the following `@State` variable and constants under the `struct ContentView:\
    \ View {` line:\n\n   ```swift\n   @State var message = \"\"\n   let shareText\
    \ = \"This text will be shared\"\n   let url = URL(string: \"https://www.apple.com\"\
    )!\n   ```\n\n4. Edit the `VStack` under the `var body: some View {` line like\
    \ this:\n\n   ```swift\n   VStack {\n       ShareLink(item: \"This text will be\
    \ shared\")\n       TextField(\"Placeholder text\", text: $message)\n       ShareLink(item:\
    \ URL(string: \"https://www.apple.com\")!)\n   }\n   ```\n\n   This creates two\
    \ `ShareLink`s with a `TextField` separating them as shown in Figure 10-4.\n\n\
    The entire `ContentView` file should look like this:\n\n![Figure 10-5](images/329781_7_En_10_Chapter/329781_7_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5**: The Paste menu above the `TextField`.\n\n5. Click the Live\
    \ icon in the Canvas pane.\n\n6. Click the top or bottom `ShareLink`. A share\
    \ sheet appears (see Figure 10-2).\n\n7. Click Copy on the share sheet. The share\
    \ sheet disappears.\n\n8. Click in the `TextField` and hold the left mouse button\
    \ (or trackpad) down until a Paste menu pops up as shown in Figure 10-5.\n\n \
    \  ```swift\n   import SwiftUI\n   struct ContentView: View {\n       @State var\
    \ message = \"\"\n       let shareText = \"This text will be shared\"\n      \
    \ let url = URL(string: \"https://www.apple.com\")!\n       var body: some View\
    \ {\n           VStack {\n               ShareLink(item: \"This text will be shared\"\
    )\n               TextField(\"Placeholder text\", text: $message)\n          \
    \     ShareLink(item: URL(string: \"https://www.apple.com\")!)\n           }\n\
    \           .padding()\n       }\n   }\n   struct ContentView_Previews: PreviewProvider\
    \ {\n       static var previews: some View {\n           ContentView()\n     \
    \  }\n   }\n   ```\n\n9. Click Paste. The item defined by the `ShareLink` appears\
    \ in the `TextField` (either “This text will be shared” or `https://www.apple.com`)."
  raw: "## Summary\n\nWhen your app needs the user to input numeric data, a text field\
    \ can work, but it might be clumsy, especially if you only want to accept a limited\
    \ range of numeric values. To make it easy to input numeric data, use a Stepper\
    \ or a Slider.\n\nBoth a Stepper and a Slider can define a minimum and a maximum\
    \ value, so that way the user can’t input numeric data below a minimum value or\
    \ above a maximum value. Both steppers and sliders let you define a different\
    \ increment/decrement value other than 1.\n\nA Stepper takes up less space, but\
    \ a Slider makes it easier to change values from one extreme to another by simply\
    \ dragging the Slider from side to side.\n\nBy using steppers and sliders, you\
    \ can make it easy for users to input numeric data. By using a Toggle, you can\
    \ make it easy for users to choose between exactly two choices such as on/off\
    \ or yes/no. Steppers, sliders, and toggles simply make it easy for users to enter\
    \ only valid data.\n\n# 10. Providing Options with Links and Menus\n\nAt one time,\
    \ apps just needed buttons to let the user choose commands. As iPhone and iPad\
    \ apps started getting more sophisticated, the need for alternate ways to allow\
    \ the user to select commands has grown as well. Two common ways to display commands\
    \ for users to select are links and menus.\n\nA Link resembles a Button, except\
    \ that it opens up a browser to display the contents of a website. A Menu lets\
    \ you display a list of options, which can also include submenus as shown in Figure\
    \ [10-1](#329781_7_En_10_Chapter.xhtml#Fig1)\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig1_HTML.jpg)\n\
    \n11 lines of code illustrate the commands for menus. It includes submenus such\
    \ as copy, delete, rename, and duplicate.\n\nFigure 10-1\n\nA Menu displaying\
    \ a list of options including a submenu\n\n## Using Links\n\nLinks offer a handy\
    \ way to give users a chance to visit a website from within an app. A Link defines\
    \ a website address such as\n\n```\nLink(destination: URL(string: \"https://www.apple.com\"\
    )! ) {\nText(\"Apple\")\n}\n```\n\nThe Text view defines the text that appears\
    \ on the link. You can add any modifiers you want to this Text view such as defining\
    \ a font or background color.\n\nThe Link must define a destination as a URL.\
    \ One way to make sure the website address is accurate is to visit the desired\
    \ website and then copy its address from your browser and paste it into your Swift\
    \ code.\n\nNote\n\nTo test if the Link successfully loads the website address,\
    \ you need to test the project either in the Simulator or on an actual iOS device.\
    \ The Canvas pane cannot open the Safari browser like the Simulator or an iOS\
    \ device can do.\n\n## Using ShareLinks\n\nAn ordinary Link acts like a hyperlink\
    \ to take users to a specific web page. A ShareLink lets users tap on a link that\
    \ displays a share sheet that gives users options for copying data or sharing\
    \ it with other apps as shown in Figure [10-2](#329781_7_En_10_Chapter.xhtml#Fig2).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig2_HTML.jpg)\n\nA screenshot\
    \ titled Sharelink example contains the options for sharing data such as messages,\
    \ reminders, and more. Copy, save to files, and edit actions options are also\
    \ included.\n\nFigure 10-2\n\nA ShareLink displays a share sheet of options for\
    \ sharing data with other apps\n\nThe simplest ShareLink simply defines an item\
    \ to share, which can be a string or URL such as\n\n```\nShareLink(item: \"This\
    \ text will be shared\")\nShareLink(item: URL(string: \"https://www.apple.com\"\
    )!)\n```\n\nRather than type a string or URL directly in a ShareLink, you can\
    \ also use variables such as\n\n```\nlet shareText = \"This text will be shared\"\
    \nShareLink(item: shareText)\nlet url = URL(string: \"https://www.apple.com\"\
    )!\nShareLink(item: url)\n```\n\nBy default, a ShareLink simply displays a share\
    \ icon and the word “Share…” as shown in Figure [10-3](#329781_7_En_10_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig3_HTML.jpg)\n\nA share icon.\n\
    \nFigure 10-3\n\nThe default appearance of a ShareLink displays a share icon and\
    \ the word “Share…”\n\nWhen users click the ShareLink, a share sheet appears (see\
    \ Figure [10-2](#329781_7_En_10_Chapter.xhtml#Fig2)), allowing users to share\
    \ the data in the ShareLink with other apps. To see how this works, follow these\
    \ steps:\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig4_HTML.jpg)\n\n\
    A screenshot of the user interface, which includes two share icons and a text\
    \ field.\n\nFigure 10-4\n\nThe user interface with two ShareLinks and a TextField\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “ShareLink.”\n\n2.  Click the ContentView file in the Navigator pane.\n\n\
    3.  Add the following State variable and constants under the struct ContentView:\
    \ View line:\n\n    ```\n    @State var message = \"\"\n    let shareText = \"\
    This text will be shared\"\n    let url = URL(string: \"https://www.apple.com\"\
    )!\n    ```\n\n4.  Edit the VStack under the var body: some View line like this:\n\
    \n    ```\n    VStack {\n    ShareLink(item: \"This text will be shared\")\n \
    \   TextField(\"Placeholder text\", text: $message)\n    ShareLink(item: URL(string:\
    \ \"https://www.apple.com\")!)\n    }\n    ```\n\n    This creates two ShareLinks\
    \ with a TextField separating them as shown in Figure [10-4](#329781_7_En_10_Chapter.xhtml#Fig4).\n\
    \nThe entire ContentView file should look like this:\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig5_HTML.jpg)\n\
    \nA screenshot of the user interface, which includes two share icons and a text\
    \ field. Above the text field is a paste icon.\n\nFigure 10-5\n\nThe Paste menu\
    \ above the TextField\n\n1.  Click the Live icon in the Canvas pane.\n\n2.  Click\
    \ the top or bottom ShareLink. A share sheet appears (see Figure [10-2](#329781_7_En_10_Chapter.xhtml#Fig2)).\n\
    \n3.  Click Copy on the share sheet. The share sheet disappears.\n\n4.  Click\
    \ in the TextField and hold the left mouse button (or trackpad) down until a Paste\
    \ menu pops up as shown in Figure [10-5](#329781_7_En_10_Chapter.xhtml#Fig5).\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n@State var message = \"\"\n\
    let shareText = \"This text will be shared\"\nlet url = URL(string: \"https://www.apple.com\"\
    )!\nvar body: some View {\nVStack {\nShareLink(item: \"This text will be shared\"\
    )\nTextField(\"Placeholder text\", text: $message)\nShareLink(item: URL(string:\
    \ \"https://www.apple.com\")!)\n}\n.padding()\n}\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var previews: some View {\nContentView()\n}\n}\n```\n\
    \n1.  Click Paste. The item defined by the ShareLink appears in the TextField\
    \ (either “This text will be shared” or [`https://www.apple.com`](http://www.apple.com))."
  trans: "\n# 摘要\n\n当你的 App 需要用户输入数字数据时，使用文本字段虽然可行，但可能会显得笨拙，尤其是当你只希望接受一个有限范围的数值时。为了方便输入数字数据，可以使用\
    \ `Stepper`（步进器）或 `Slider`（滑块）。\n\n`Stepper` 和 `Slider` 都可以定义最小值和最大值，这样用户就无法输入低于最小值或高于最大值的数字数据。步进器和滑块都可以让你定义除\
    \ 1 以外的增量/减量值。\n\n`Stepper` 占用的空间更少，但 `Slider` 只需左右拖动滑块，就能更轻松地将值从一个极端更改到另一个极端。\n\
    \n通过使用步进器和滑块，你可以让用户轻松输入数字数据。通过使用 `Toggle`（切换开关），你可以让用户轻松地在恰好两个选项之间进行选择，例如开/关或是/否。步进器、滑块和切换开关可以简单地让用户仅输入有效数据。\n\
    \n# 10. 使用链接和菜单提供选项\n\n曾经，App 只需要按钮就能让用户选择命令。随着 iPhone 和 iPad App 变得越来越复杂，允许用户选择命令的替代方式的需求也随之增长。两种常见的向用户显示可选项以供选择的方式是链接和菜单。\n\
    \n`Link`（链接）类似于 `Button`（按钮），不同之处在于它会打开浏览器来显示网站内容。`Menu`（菜单）允许你显示一个选项列表，其中还可以包含子菜单，如图\
    \ 10-1 所示。\n\n![图 10-1](img/329781_7_En_10_Fig1_HTML.jpg)\n\n**图 10-1**：一个显示选项列表（包含子菜单）的\
    \ `Menu`。\n\n## 使用链接\n\n链接提供了一种便捷的方式，让用户可以在 App 内访问网站。`Link` 定义一个网址，例如：\n\n```swift\n\
    Link(destination: URL(string: \"https://www.apple.com\")! ) {\n    Text(\"Apple\"\
    )\n}\n```\n\n`Text` 视图定义了链接上显示的文本。你可以向此 `Text` 视图添加任何你想要的修饰符，例如定义字体或背景颜色。\n\n\
    `Link` 必须将 `destination` 定义为 `URL`。确保网址准确的一种方法是访问所需网站，然后从浏览器中复制其地址，再粘贴到你的 Swift\
    \ 代码中。\n\n**注意**：要测试 `Link` 是否成功加载网址，你需要在模拟器或实际的 iOS 设备上测试项目。画布窗格无法像模拟器或 iOS 设备那样打开\
    \ Safari 浏览器。\n\n## 使用 ShareLink\n\n普通的 `Link` 就像一个超链接，可以将用户带到特定的网页。`ShareLink`（共享链接）让用户可以点击一个链接，该链接会显示一个共享表单，为用户提供复制数据或与其他\
    \ App 共享数据的选项，如图 10-2 所示。\n\n![图 10-2](img/329781_7_En_10_Fig2_HTML.jpg)\n\n**图\
    \ 10-2**：一个 `ShareLink` 显示一个共享表单，其中包含用于与其他 App 共享数据的选项。\n\n最简单的 `ShareLink` 只定义一个要共享的项目，它可以是一个字符串或\
    \ `URL`，例如：\n\n```swift\nShareLink(item: \"This text will be shared\")\nShareLink(item:\
    \ URL(string: \"https://www.apple.com\")!)\n```\n\n除了直接在 `ShareLink` 中输入字符串或 `URL`，你也可以使用变量，例如：\n\
    \n```swift\nlet shareText = \"This text will be shared\"\nShareLink(item: shareText)\n\
    let url = URL(string: \"https://www.apple.com\")!\nShareLink(item: url)\n```\n\
    \n默认情况下，`ShareLink` 只显示一个共享图标和“Share…”字样，如图 10-3 所示。\n\n![图 10-3](img/329781_7_En_10_Fig3_HTML.jpg)\n\
    \n**图 10-3**：`ShareLink` 的默认外观显示一个共享图标和“Share…”字样\n\n当用户点击 `ShareLink` 时，会出现一个共享表单（见图\
    \ 10-2），允许用户将 `ShareLink` 中的数据与其他 App 共享。要了解其工作原理，请按照以下步骤操作：\n\n![图 10-4](img/329781_7_En_10_Fig4_HTML.jpg)\n\
    \n**图 10-4**：包含两个 `ShareLink` 和一个 `TextField` 的用户界面。\n\n1. 创建一个新的 SwiftUI iOS\
    \ App 项目，并为其指定任意名称，例如“ShareLink”。\n2. 在导航器窗格中点击 `ContentView` 文件。\n3. 在 `struct\
    \ ContentView: View {` 代码行下方添加以下 `@State` 变量和常量：\n\n   ```swift\n   @State var\
    \ message = \"\"\n   let shareText = \"This text will be shared\"\n   let url\
    \ = URL(string: \"https://www.apple.com\")!\n   ```\n\n4. 将 `var body: some View\
    \ {` 代码行下方的 `VStack` 编辑为如下所示：\n\n   ```swift\n   VStack {\n       ShareLink(item:\
    \ \"This text will be shared\")\n       TextField(\"Placeholder text\", text:\
    \ $message)\n       ShareLink(item: URL(string: \"https://www.apple.com\")!)\n\
    \   }\n   ```\n\n   这将创建两个 `ShareLink`，中间由一个 `TextField` 隔开，如图 10-4 所示。\n\n整个\
    \ `ContentView` 文件应如下所示：\n\n![图 10-5](img/329781_7_En_10_Fig5_HTML.jpg)\n\n**图\
    \ 10-5**：`TextField` 上方的粘贴菜单。\n\n5. 点击画布窗格中的“Live”图标。\n6. 点击顶部或底部的 `ShareLink`。将出现一个共享表单（见图\
    \ 10-2）。\n7. 点击共享表单上的“Copy”。共享表单消失。\n8. 点击 `TextField` 并按住鼠标左键（或触控板），直到弹出粘贴菜单，如图\
    \ 10-5 所示。\n\n   ```swift\n   import SwiftUI\n   struct ContentView: View {\n\
    \       @State var message = \"\"\n       let shareText = \"This text will be\
    \ shared\"\n       let url = URL(string: \"https://www.apple.com\")!\n       var\
    \ body: some View {\n           VStack {\n               ShareLink(item: \"This\
    \ text will be shared\")\n               TextField(\"Placeholder text\", text:\
    \ $message)\n               ShareLink(item: URL(string: \"https://www.apple.com\"\
    )!)\n           }\n           .padding()\n       }\n   }\n   struct ContentView_Previews:\
    \ PreviewProvider {\n       static var previews: some View {\n           ContentView()\n\
    \       }\n   }\n   ```\n\n9. 点击“Paste”。由 `ShareLink` 定义的项目（“This text will be\
    \ shared”或 `https://www.apple.com`）将出现在 `TextField` 中。\n"
- fmt: "### Customizing a `ShareLink`\n\nRather than display the default share icon\
    \ and the word “Share…”, you can customize the appearance of a `ShareLink` by\
    \ defining both the content to share and the appearance of the `ShareLink` using\
    \ text, icons, or both.\n\nTo display custom text on a `ShareLink`, you must define\
    \ the custom text followed by the item to share like this, which creates a `ShareLink`\
    \ as shown in Figure [10-6](#329781_7_En_10_Chapter.xhtml#Fig6):\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6 — Defining custom text to appear in a `ShareLink`\n\n```\nShareLink(\"\
    Custom text here\", item: URL(string: \"https://www.apple.com\")!)\n```\n\nIf\
    \ you copied and pasted the preceding `ShareLink`, you would share the [`https://www.apple.com`](https://www.apple.com)\
    \ website address. Notice that the preceding `ShareLink` still displays the default\
    \ share icon. If you don’t want to display this share icon, you need to define\
    \ the text to appear in the `ShareLink` using a `Text` view like this:\n\n```\n\
    ShareLink(item: \"This text will be shared\") {\n    Text(\"Custom ShareLink text\"\
    )\n}\n```\n\nThe preceding `ShareLink` will simply display “Custom ShareLink text”\
    \ on the user interface but without the share icon. If you just want to display\
    \ an icon without any text, you can use an `Image` view like this:\n\n```\nShareLink(item:\
    \ \"ShareLink example\") {\n    Image(systemName: \"tortoise\")\n}\n```\n\nThis\
    \ `ShareLink` displays a tortoise icon. You can use any icon you wish from the\
    \ list of icons displayed by the free Apple program, SF Symbols ([`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)).\n\
    \nIf you want to display a custom icon and text for a `ShareLink`, use a `Label`\
    \ view that lets you customize a `Text` view and an `Image` view like this as\
    \ shown in Figure [10-7](#329781_7_En_10_Chapter.xhtml#Fig7):\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7 — Customizing a `ShareLink` with both an icon and text\n\n```\n\
    ShareLink(item: \"ShareLink example\") {\n    Label {\n        Text(\"Custom ShareLink\
    \ text\")\n    } icon: {\n        Image(systemName: \"hare\")\n    }\n}\n```\n\
    \n`ShareLink`s will share whatever the `item:` parameter defines, such as a string\
    \ (“ShareLink example”) or a URL (“[`www.apple.com`](http://www.apple.com)”).\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “ShareLink Custom.”\n2.  Click the `ContentView` file in the Navigator pane.\n\
    3.  Add the following `State` variable under the `struct ContentView: View` line:\n\
    \    ```\n    @State var message = \"\"\n    ```\n4.  Edit the `VStack` under\
    \ the `var body: some View` line like this:\n    ```\n    VStack (spacing: 55)\
    \ {\n        ShareLink(item: \"This text will be shared\") {\n            Text(\"\
    Custom ShareLink text\")\n        }\n        ShareLink(item: \"Just an icon to\
    \ share\") {\n            Image(systemName: \"tortoise\")\n        }\n       \
    \ ShareLink(item: \"Custom icon and text\") {\n            Label {\n         \
    \       Text(\"Custom ShareLink text\")\n            } icon: {\n             \
    \   Image(systemName: \"hare\")\n            }\n        }\n        TextField(\"\
    Placeholder text\", text: $message)\n    }\n    ```\n\nThis creates three `ShareLink`s\
    \ and a `TextField`. The first `ShareLink` displays only text, the second `ShareLink`\
    \ displays only an icon, and the third `ShareLink` displays both a custom icon\
    \ and text.\n\nThe entire `ContentView` file should look like this:\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n    @State var message = \"\"\n    var\
    \ body: some View {\n        VStack (spacing: 55) {\n            ShareLink(item:\
    \ \"This text will be shared\") {\n                Text(\"Custom ShareLink text\"\
    )\n            }\n            ShareLink(item: \"Just an icon to share\") {\n \
    \               Image(systemName: \"tortoise\")\n            }\n            ShareLink(item:\
    \ \"Custom icon and text\") {\n                Label {\n                    Text(\"\
    Custom ShareLink text\")\n                } icon: {\n                    Image(systemName:\
    \ \"hare\")\n                }\n            }\n            TextField(\"Placeholder\
    \ text\", text: $message)\n        }\n        .padding()\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n2.  Click the Live icon in the Canvas pane.\n3.  Click any of\
    \ the `ShareLink`s. A share sheet appears (see Figure [10-2](#329781_7_En_10_Chapter.xhtml#Fig2)).\n\
    4.  Click Copy. The share sheet disappears.\n5.  Click in the `TextField` and\
    \ hold down the left mouse button (or trackpad) until a Paste menu pops up (see\
    \ Figure [10-5](#329781_7_En_10_Chapter.xhtml#Fig5)).\n6.  Click Paste. The text\
    \ from your chosen `ShareLink` now appears in the `TextField`."
  raw: "### Customizing a ShareLink\n\nRather than display the default share icon\
    \ and the word “Share…”, you can customize the appearance of a ShareLink by defining\
    \ both the content to share and the appearance of the ShareLink using text, icons,\
    \ or both.\n\nTo display custom text on a ShareLink, you must define the custom\
    \ text followed by the item to share like this, which creates a ShareLink as shown\
    \ in Figure [10-6](#329781_7_En_10_Chapter.xhtml#Fig6):\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig6_HTML.jpg)\n\
    \nA custom text here icon.\n\nFigure 10-6\n\nDefining custom text to appear in\
    \ a ShareLink\n\n```\nShareLink(\"Custom text here\", item: URL(string: \"https://www.apple.com\"\
    )!)\n```\n\nIf you copied and pasted the preceding ShareLink, you would share\
    \ the [`https://www.apple.com`](https://www.apple.com) website address. Notice\
    \ that the preceding ShareLink still displays the default share icon. If you don’t\
    \ want to display this share icon, you need to define the text to appear in the\
    \ ShareLink using a Text view like this:\n\n```\nShareLink(item: \"This text will\
    \ be shared\") {\nText(\"Custom ShareLink text\")\n}\n```\n\nThe preceding ShareLink\
    \ will simply display “Custom ShareLink text” on the user interface but without\
    \ the share icon. If you just want to display an icon without any text, you can\
    \ use an Image view like this:\n\n```\nShareLink(item: \"ShareLink example\")\
    \ {\nImage(systemName: \"tortoise\")\n}\n```\n\nThis ShareLink displays a tortoise\
    \ icon. You can use any icon you wish from the list of icons displayed by the\
    \ free Apple program, SF Symbols ([`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)).\n\
    \nIf you want to display a custom icon and text for a ShareLink, use a Label view\
    \ that lets you customize a Text view and an Image view like this as shown in\
    \ Figure [10-7](#329781_7_En_10_Chapter.xhtml#Fig7):\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig7_HTML.jpg)\n\
    \nA custom Sharelink text icon.\n\nFigure 10-7\n\nCustomizing a ShareLink with\
    \ both an icon and text\n\n```\nShareLink(item: \"ShareLink example\") {\nLabel\
    \ {\nText(\"Custom ShareLink text\")\n} icon: {\nImage(systemName: \"hare\")\n\
    }\n```\n\nShareLinks will share whatever the item: parameter defines, such as\
    \ a string (“ShareLink example”) or a URL (“[`www.apple.com`](http://www.apple.com)”).\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “ShareLink Custom.”\n\n2.  Click the ContentView file in the Navigator pane.\n\
    \n3.  Add the following State variable under the struct ContentView: View line:\n\
    \n1.  Edit the VStack under the var body: some View line like this:\n\n```\n \
    \   VStack (spacing: 55) {\n    ShareLink(item: \"This text will be shared\")\
    \ {\n    Text(\"Custom ShareLink text\")\n    }\n    ShareLink(item: \"Just an\
    \ icon to share\") {\n    Image(systemName: \"tortoise\")\n    }\n    ShareLink(item:\
    \ \"Custom icon and text\") {\n    Label {\n    Text(\"Custom ShareLink text\"\
    )\n    } icon: {\n    Image(systemName: \"hare\")\n    }\n    }\n    TextField(\"\
    Placeholder text\", text: $message)\n    }\n    ```\n\nThis creates three ShareLinks\
    \ and a TextField. The first ShareLink displays only text, the second ShareLink\
    \ displays only an icon, and the third ShareLink displays both a custom icon and\
    \ text.\n\nThe entire ContentView file should look like this:\n\n```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n    @State var message = \"\"\n   \
    \ var body: some View {\n    VStack (spacing: 55) {\n    ShareLink(item: \"This\
    \ text will be shared\") {\n    Text(\"Custom ShareLink text\")\n    }\n    ShareLink(item:\
    \ \"Just an icon to share\") {\n    Image(systemName: \"tortoise\")\n    }\n \
    \   ShareLink(item: \"Custom icon and text\") {\n    Label {\n    Text(\"Custom\
    \ ShareLink text\")\n    } icon: {\n    Image(systemName: \"hare\")\n    }\n \
    \   }\n    TextField(\"Placeholder text\", text: $message)\n    }\n    .padding()\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n2.  Click\
    \ the Live icon in the Canvas pane.\n\n3.  Click any of the ShareLinks. A share\
    \ sheet appears (see Figure [10-2](#329781_7_En_10_Chapter.xhtml#Fig2)).\n\n4.\
    \  Click Copy. The share sheet disappears.\n\n5.  Click in the TextField and hold\
    \ down the left mouse button (or trackpad) until a Paste menu pops up (see Figure\
    \ [10-5](#329781_7_En_10_Chapter.xhtml#Fig5)).\n\n6.  Click Paste. The text from\
    \ your chosen ShareLink now appears in the TextField.\n\n```\n@State var message\
    \ = \"\"\n```"
  trans: "\n### 自定义 `ShareLink`\n\n除了显示默认的分享图标和“分享…”字样外，你还可以通过定义分享内容和 `ShareLink`\
    \ 的外观（使用文本、图标或两者结合）来自定义 `ShareLink` 的样式。\n\n要在 `ShareLink` 上显示自定义文本，你需要像这样先定义自定义文本，再定义要分享的项目，这将创建一个如图\
    \ 10-6 所示的 `ShareLink`：\n\n![](img/329781_7_En_10_Fig6_HTML.jpg)\n\n图 10-6 — 定义\
    \ `ShareLink` 中显示的自定义文本\n\n```\nShareLink(\"自定义文本此处\", item: URL(string: \"https://www.apple.com\"\
    )!)\n```\n\n如果你复制并粘贴了上面的 `ShareLink`，你将会分享 [`https://www.apple.com`](https://www.apple.com)\
    \ 这个网站地址。请注意，上面的 `ShareLink` 仍然显示默认的分享图标。如果你不想显示这个分享图标，你需要使用 `Text` 视图来定义 `ShareLink`\
    \ 中显示的文本，如下所示：\n\n```\nShareLink(item: \"这段文本将被分享\") {\n    Text(\"自定义 ShareLink\
    \ 文本\")\n}\n```\n\n上面的 `ShareLink` 将在用户界面上只显示“自定义 ShareLink 文本”，但不会显示分享图标。如果你只想显示一个图标而不显示任何文本，你可以像这样使用\
    \ `Image` 视图：\n\n```\nShareLink(item: \"ShareLink 示例\") {\n    Image(systemName:\
    \ \"tortoise\")\n}\n```\n\n这个 `ShareLink` 会显示一个乌龟图标。你可以从苹果免费程序 SF Symbols 的图标列表中选择你想要的任何图标（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）。\n\
    \n如果你想为 `ShareLink` 同时显示自定义图标和文本，请使用 `Label` 视图，它可以让你同时自定义 `Text` 视图和 `Image`\
    \ 视图，如图 10-7 所示：\n\n![](img/329781_7_En_10_Fig7_HTML.jpg)\n\n图 10-7 — 使用图标和文本自定义\
    \ `ShareLink`\n\n```\nShareLink(item: \"ShareLink 示例\") {\n    Label {\n     \
    \   Text(\"自定义 ShareLink 文本\")\n    } icon: {\n        Image(systemName: \"hare\"\
    )\n    }\n}\n```\n\n`ShareLink` 会分享 `item:` 参数定义的任何内容，比如一个字符串（“ShareLink 示例”）或一个\
    \ URL（“[`www.apple.com`](http://www.apple.com)”）。\n\n1.  创建一个新的 SwiftUI iOS App\
    \ 项目，并任意取名，例如“ShareLink Custom”。\n2.  在导航窗格中点击 `ContentView` 文件。\n3.  在 `struct\
    \ ContentView: View` 代码行下方添加以下 `State` 变量：\n    ```\n    @State var message =\
    \ \"\"\n    ```\n4.  像这样修改 `var body: some View` 代码行下方的 `VStack`：\n    ```\n \
    \   VStack (spacing: 55) {\n        ShareLink(item: \"这段文本将被分享\") {\n        \
    \    Text(\"自定义 ShareLink 文本\")\n        }\n        ShareLink(item: \"仅一个图标可分享\"\
    ) {\n            Image(systemName: \"tortoise\")\n        }\n        ShareLink(item:\
    \ \"自定义图标和文本\") {\n            Label {\n                Text(\"自定义 ShareLink 文本\"\
    )\n            } icon: {\n                Image(systemName: \"hare\")\n      \
    \      }\n        }\n        TextField(\"占位符文本\", text: $message)\n    }\n   \
    \ ```\n\n这将创建三个 `ShareLink` 和一个 `TextField`。第一个 `ShareLink` 仅显示文本，第二个 `ShareLink`\
    \ 仅显示图标，第三个 `ShareLink` 同时显示自定义图标和文本。\n\n整个 `ContentView` 文件应该如下所示：\n\n```\nimport\
    \ SwiftUI\nstruct ContentView: View {\n    @State var message = \"\"\n    var\
    \ body: some View {\n        VStack (spacing: 55) {\n            ShareLink(item:\
    \ \"这段文本将被分享\") {\n                Text(\"自定义 ShareLink 文本\")\n            }\n\
    \            ShareLink(item: \"仅一个图标可分享\") {\n                Image(systemName:\
    \ \"tortoise\")\n            }\n            ShareLink(item: \"自定义图标和文本\") {\n\
    \                Label {\n                    Text(\"自定义 ShareLink 文本\")\n   \
    \             } icon: {\n                    Image(systemName: \"hare\")\n   \
    \             }\n            }\n            TextField(\"占位符文本\", text: $message)\n\
    \        }\n        .padding()\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n2.  点击画布窗格中的“Live”图标。\n3.  点击任意一个 `ShareLink`。将出现一个分享表单（见图 10-2）。\n4.  点击“复制”。分享表单消失。\n\
    5.  点击 `TextField` 并按住鼠标左键（或触控板），直到出现“粘贴”菜单（见图 10-5）。\n6.  点击“粘贴”。你选择的 `ShareLink`\
    \ 中的文本现在会出现在 `TextField` 中。\n"
- fmt: "# Using Menus\n\nSometimes you may want to offer the user multiple choices.\
    \ Cramming multiple buttons on the screen can be clumsy, and even a segmented\
    \ control can be too limiting. When you need to display multiple options in a\
    \ small space, that’s when you can use a `Menu`.\n\nA `Menu` simply appears as\
    \ a `Button` on the user interface. When the user taps it, the `Menu` displays\
    \ a list of options (see Figure [10-1](#329781_7_En_10_Chapter.xhtml#Fig1)). Now\
    \ the user can tap an option or open an additional submenu to see even more options.\
    \ `Menu`s make it easy to hide multiple options in a limited amount of space.\n\
    \nThe simplest `Menu` consists of a title and a list of options defined by `Button`s\
    \ like this:\n\n```\nMenu(\"Options\") {\n    Button(\"Open \", action: openFile)\n\
    \    Button(\"Find\", action: findFile)\n    Button(\"Delete...\", action: deleteFile)\n\
    }\n```\n\nThe preceding code would display a `Menu` on the screen with the word\
    \ “Options” displayed. When the user taps “Options,” a menu appears listing three\
    \ choices – Open, Find, and Delete… – as shown in Figure [10-8](#329781_7_En_10_Chapter.xhtml#Fig8).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig8_HTML.jpg)\n\n*A screenshot\
    \ of the Options tab. Open, Find, and Delete are the three options that are listed.*\n\
    \n**Figure 10-8** — A `Menu` displays a list of `Button`s in a drop-down menu\n\
    \nWhen the user taps a `Button`, that `Button` calls a function such as `openFile`,\
    \ `findFile`, or `deleteFile`. Notice that these function calls do not include\
    \ a parameter list such as `openFile()`. To see how to create a simple `Menu`,\
    \ follow these steps:\n\n1. Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as “MenuSimple.”\n\n2. Click the `ContentView` file in the\
    \ Navigator pane.\n\n3. Add the following `State` variable under the `struct ContentView:\
    \ View` line:\n\n    ```\n    @State var message = \"\"\n    ```\n\n4. Modify\
    \ the `VStack` under the `var body: some View` line like this:\n\n    ```\n  \
    \  var body: some View {\n        VStack {\n            Text(message)\n      \
    \          .padding()\n            Menu(\"Options\") {\n                Button(\"\
    Open \", action: openFile)\n                Button(\"Find\", action: findFile)\n\
    \                Button(\"Delete...\", action: deleteFile)\n            }\n  \
    \          Spacer()\n        }\n    }\n    ```\n\n    All three `Button`s call\
    \ functions to do something. So we need to create functions to make these `Button`s\
    \ work.\n\n5. Right above the last curly bracket in the `struct ContentView: View`,\
    \ add the following three functions:\n\n    ```\n    func openFile() {\n     \
    \   message = \"Open chosen\"\n    }\n    func findFile() {\n        message =\
    \ \"Find chosen\"\n    }\n    func deleteFile() {\n        message = \"Delete\
    \ chosen\"\n    }\n    ```\n\n    The entire `ContentView` file should look like\
    \ this:\n\n    ```\n    import SwiftUI\n\n    struct ContentView: View {\n   \
    \     @State var message = \"\"\n\n        var body: some View {\n           \
    \ VStack {\n                Text(message)\n                    .padding()\n  \
    \              Menu(\"Options\") {\n                    Button(\"Open \", action:\
    \ openFile)\n                    Button(\"Find\", action: findFile)\n        \
    \            Button(\"Delete...\", action: deleteFile)\n                }\n  \
    \          }\n        }\n\n        func openFile() {\n            message = \"\
    Open chosen\"\n        }\n\n        func findFile() {\n            message = \"\
    Find chosen\"\n        }\n\n        func deleteFile() {\n            message =\
    \ \"Delete chosen\"\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n6. Click the Live icon in the Canvas pane.\n\n7. Click\
    \ the Options button in the middle of the simulated iOS device. A menu appears\
    \ listing the three options defined by the three `Button` views: Open, Find, and\
    \ Delete…\n\n8. Click any option. Notice that whatever option you choose, it displays\
    \ a slightly different message in the `Text` view above the `Menu`.\n\nNotice\
    \ that each `Button` in the `Menu` calls a function defined by the `action:` parameter.\
    \ Rather than call a function, you can just enclose one or more commands within\
    \ curly brackets like this:\n\n```\nMenu(\"Options\") {\n    Button(\"Open \"\
    , action: {\n        message = \"Open chosen\"\n    })\n    Button(\"Find\", action:\
    \ {\n        message = \"Find chosen\"\n    })\n    Button(\"Delete...\", action:\
    \ {\n        message = \"Delete chosen\"\n    })\n}\n```\n\n## Formatting Titles\
    \ on the Menu and Buttons\n\nA `Menu` lets you define a title that appears like\
    \ a standard `Button`. However, if you want to format the title, there’s an alternate\
    \ way to define a `Menu`. Instead of just defining the text to appear as a title,\
    \ you can define a `label:` parameter where you can use either a `Text` or `Label`\
    \ view like this:\n\n```\nMenu {\n    Button(\"Open \", action: {\n        message\
    \ = \"Open chosen\"\n    })\n    Button(\"Find\", action: {\n        message =\
    \ \"Find chosen\"\n    })\n    Button(\"Delete...\", action: {\n        message\
    \ = \"Delete chosen\"\n    })\n} label: {\n    Text(\"Options\")\n        .font(.largeTitle)\n\
    \        .foregroundColor(.purple)\n        .italic()\n}\n```\n\nThis example\
    \ displays the `Menu`’s title using the `.largeTitle` font, the color purple,\
    \ and italics. Rather than use a `Text` view, you can also use a `Label` view\
    \ to display an icon side by side with text such as:\n\n```\nMenu {\n    Button(\"\
    Open \", action: {\n        message = \"Open chosen\"\n    })\n    Button(\"Find\"\
    , action: {\n        message = \"Find chosen\"\n    })\n    Button(\"Delete...\"\
    , action: {\n        message = \"Delete chosen\"\n    })\n} label: {\n    Label(\"\
    Options\", systemImage: \"pencil.circle\")\n}\n```\n\nBy using the `label:` parameter\
    \ to define a `Menu`’s title, you have more options for customizing a `Menu`’s\
    \ title in multiple ways. Using the preceding `Label` view displays the `Menu`\
    \ with an icon and text as shown in Figure [10-9](#329781_7_En_10_Chapter.xhtml#Fig9).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig9_HTML.jpg)\n\n*An options\
    \ icon.*\n\n**Figure 10-9** — A `Label` view displays an icon and text for the\
    \ `Menu`’s title\n\nYou can also format a `Button` title using a `Label` view\
    \ instead of a `Text` view like this:\n\n```\nMenu {\n    Button(action: {\n \
    \       message = \"Open chosen\"\n    }) {\n        Label(\"Open\", systemImage:\
    \ \"book\")\n    }\n    Button(action: {\n        message = \"Find chosen\"\n\
    \    }) {\n        Label(\"Find\", systemImage: \"magnifyingglass\")\n    }\n\
    \    Button(action: {\n        message = \"Delete chosen\"\n    }) {\n       \
    \ Label(\"Delete\", systemImage: \"trash\")\n    }\n} label: {\n    Label(\"Options\"\
    , systemImage: \"pencil.circle\")\n}\n```\n\nThe preceding code displays a `Menu`\
    \ list as shown in Figure [10-10](#329781_7_En_10_Chapter.xhtml#Fig10).\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig10_HTML.jpg)\n\
    \n*A screenshot of the Options tab. The three options are labeled Open, Find,\
    \ and Delete, with corresponding symbols.*\n\n**Figure 10-10** — Displaying `Button`s\
    \ in a `Menu` list using the `Label` view"
