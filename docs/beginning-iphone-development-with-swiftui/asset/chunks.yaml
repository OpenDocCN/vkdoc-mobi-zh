    \ = true`和`supportsOpacity = false`。\n\n**图 8-7** 透明度开启和关闭的颜色选择器\n\n## 使用日期选择器\n\
    \n用户需要输入的常见数据类型之一是日期和时间。然而，一个人可能会将日期写成“June 14, 2023”，而另一个人可能会将同一日期写成“6/14/23”。在输入时间时，一个人可能会输入“6:45\
    \ p.m.”，而另一个人可能会输入“18:45”。\n\n为了让用户轻松输入日期和时间，SwiftUI 提供了日期选择器（Date Picker）。用户无需手动输入日期或时间，只需点击他们想要的日期或时间即可，如图\
