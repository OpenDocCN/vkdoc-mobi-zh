- fmt: "# 7. Retrieving Text from Text Fields and Text Editors\n\nUser interfaces\
    \ often need to retrieve text from the user. Sometimes this text can be a single\
    \ word or short phrase, but other times this text might consist of several paragraphs.\
    \ To retrieve text from the user, SwiftUI offers three types of views:\n\n- `Text`\
    \ Field\n- `Secure` Field\n- `Text` Editor\n\nA `Text` Field lets the user type\
    \ in a single line of text such as a name or an address. Optionally, Text Fields\
    \ can display placeholder text that appears in light gray and is used to explain\
    \ what type of information the `Text` Field expects.\n\nA `Secure` Field works\
    \ exactly like a `Text` Field except that it masks any text the user types in.\
    \ That can be useful when asking the user to type in sensitive information such\
    \ as credit card numbers.\n\nA `Text` Editor appears as a large box where the\
    \ user can type and edit several lines of text such as multiple paragraphs.\n\n\
    Since `Text` Fields, `Secure` Fields, and `Text` Editors need to store data, they\
    \ need to work with a State variable that can hold a `String` data type such as:\n\
    \n```\n@State private var message = \"\"\n```\n\n## Using Text Fields\n\nThe main\
    \ purpose of a `Text` Field is to accept a short amount of text from the user.\
    \ This can be a single word or a short sentence. To prod the user into typing\
    \ the expected text, a `Text` Field can display placeholder text that appears\
    \ in light gray as shown in Figure 7-1.\n\nA text. `TextField(\"Placeholder text\"\
    , text: $message)`. The message, placeholder text, is in a lighter shade between\
    \ parallel lines below.\n\n**Figure 7-1** Text Fields can display placeholder\
    \ text to guide the user\n\nWhen the user types something into a `Text` Field,\
    \ that text gets stored in the State variable defined by the `text:` parameter.\
    \ In Figure 7-1, this State variable is called `\"message\"`, and the dollar sign\
    \ (`$`) means that the State variable is bound to this `Text` Field. That means\
    \ changing the contents of the `Text` Field automatically changes the `message`\
    \ State variable.\n\n### Defining Expandable Text Fields\n\nAlthough a `Text`\
    \ Field is meant for accepting a short amount of text, such as an address or a\
    \ phone number, users can actually type as much text as they want. When a user\
    \ types too much text, the `Text` Field can automatically expand either horizontally\
    \ (the default setting) or vertically.\n\nTo define an expandable `Text` Field,\
    \ add an `axis` parameter as either `.horizontal` or `.vertical` like this:\n\n\
    ```\nTextField(\"Vertical\", text: $message, axis: .vertical)\n```\n\nWhen a `Text`\
    \ Field expands horizontally, the user can keep typing, and the text appears on\
    \ a single line until it scrolls out of sight. When a `Text` Field expands vertically,\
    \ the width of the `Text` Field remains fixed, but the height expands to display\
    \ text on multiple lines as shown in Figure 7-2.\n\nA screenshot of the codes\
    \ to define expandable text field. Includes 3 paragraphs of text, stacked with\
    \ a spacing of 75, to indicate that the message expands horizontally and vertically.\n\
    \n**Figure 7-2** Text Fields can expand horizontally or vertically\n\nWhen a `Text`\
    \ Field expands vertically, its height will keep expanding as the user continues\
    \ typing in text. If you want to define how many lines of text a vertically expanding\
    \ `Text` Field can display, use the `.lineLimit` modifier like this:\n\n```\n\
    TextField(\"Vertical\", text: $message, axis: .vertical)\n.lineLimit(3)\n```\n\
    \nThe preceding code restricts the `Text` Field to displaying a maximum of three\
    \ lines of text. When defining a line limit, a vertically expanding `Text` Field\
    \ can still allow a large amount of text, but as the user continues typing, the\
    \ text will scroll up and out of sight.\n\nRather than define a fixed value to\
    \ the `.lineLimit` modifier, you can also define a range such as:\n\n```\n.lineLimit(2...5)\n\
    ```\n\nA range means that a `Text` Field expands and displays the minimum number\
    \ of text lines and keeps expanding until it reaches the maximum limit. With a\
    \ `.lineLimit(2...5)` that defines two to five lines of text, the `Text` Field\
    \ will expand to two lines of text. Then if the user keeps adding more text, it\
    \ will expand to display three lines of text and then four and then finally stop\
    \ at five. After five lines of text, the `Text` Field will stop expanding and\
    \ scroll additional lines of text out of sight.\n\nTo see how an expandable `Text`\
    \ Field works, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as `\"ExpandableTextField\"`.\n2. Click the\
    \ `ContentView` file in the Navigator pane.\n3. Add a State variable underneath\
    \ the `struct ContentView: View` line like this:\n\n    ```\n    struct ContentView:\
    \ View {\n    @State var message = \"\"\n    ```\n\n4. Add a `TextField` inside\
    \ the body like this:\n\n    ```\n    var body: some View {\n    VStack {\n  \
    \  TextField(\"Vertical\", text: $message, axis: .vertical)\n    .lineLimit(3)\n\
    \    }\n    }\n    ```\n\n    The entire `ContentView` file should look like this:\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var\
    \ message = \"\"\n    var body: some View {\n    VStack {\n    TextField(\"Vertical\"\
    , text: $message, axis: .vertical)\n    .lineLimit(3)\n    }\n    }\n    }\n \
    \   struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    ContentView()\n    }\n    }\n    ```\n\n5. Click the Live icon.\n\
    6. Click in the `Text` Field and type a large amount of text. Notice that the\
    \ `Text` Field expands in height until a maximum of three lines of text appears.\
    \ Then text starts scrolling up the top of the `Text` Field.\n7. Press the up/down\
    \ arrow keys to scroll up and down to see any text hidden at the top or bottom\
    \ of the `Text` Field.\n\n### Changing the Text Field Style\n\nOne way to make\
    \ a `Text` Field easier to see is to display placeholder text that appears in\
    \ light gray to let the user know what to type and where to type. A second way\
    \ to emphasize a `Text` Field is to add a rounded border around it as shown in\
    \ Figure 7-3.\n\nA screenshot of a 3-line code to generate a rounded border around\
    \ the text message of, placeholder text, in lighter shade.\n\n**Figure 7-3** The\
    \ appearance of a rounded border around a Text Field\n\nThe `.textFieldStyle`\
    \ modifier gives you the option of a `.plain` or `.rounded` border:\n\n```\n.textFieldStyle(.roundedBorder)\n\
    ```\n\nWhile the `.roundedBorder` displays a border around the `Text` Field, the\
    \ `.plain` modifier eliminates the border and displays the `Text` Field as if\
    \ there was no `.textFieldStyle` modifier at all.\n\n### Creating Secure Text\
    \ Fields\n\nWhen you type in a `Text` Field, that text appears visible on the\
    \ screen. While this can be handy in most cases, it's not appropriate when typing\
    \ in sensitive information like passwords or credit card numbers. To mask any\
    \ text that the user types, SwiftUI offers a special text field called a `SecureField`.\n\
    \nLike a `Text` Field, a `SecureField` displays placeholder text and binds itself\
    \ to a State variable like this:\n\n```\nSecureField(\"Password\", text: $message)\n\
    ```\n\nA `SecureField` looks identical to a `TextField` on the user interface.\
    \ The only difference is that when you type in a `SecureField`, it masks your\
    \ text as shown in Figure 7-4.\n\nA screenshot of a secure field, with asterisks\
    \ in the entry bar, and a text field with text, my password.\n\n**Figure 7-4**\
    \ The `SecureField` masks text unlike a `Text` Field that displays everything\
    \ the user types\n\nAny modifier you can use on a `Text` Field, you can use on\
    \ a `SecureField` such as the `.textFieldStyle` modifier."
  raw: "# 7. Retrieving Text from Text Fields and Text Editors\n\nUser interfaces\
    \ often need to retrieve text from the user. Sometimes this text can be a single\
    \ word or short phrase, but other times this text might consist of several paragraphs.\
    \ To retrieve text from the user, SwiftUI offers three types of views:\n\n*  \
    \ Text Field\n\n*   Secure Field\n\n*   Text Editor\n\nA Text Field lets the user\
    \ type in a single line of text such as a name or an address. Optionally, Text\
    \ Fields can display placeholder text that appears in light gray and is used to\
    \ explain what type of information the Text Field expects.\n\nA Secure Field works\
    \ exactly like a Text Field except that it masks any text the user types in. That\
    \ can be useful when asking the user to type in sensitive information such as\
    \ credit card numbers.\n\nA Text Editor appears as a large box where the user\
    \ can type and edit several lines of text such as multiple paragraphs.\n\nSince\
    \ Text Fields, Secure Fields, and Text Editors need to store data, they need to\
    \ work with a State variable that can hold a String data type such as\n\n```\n\
    @State private var message = \"\"\n```\n\n## Using Text Fields\n\nThe main purpose\
    \ of a Text Field is to accept a short amount of text from the user. This can\
    \ be a single word or a short sentence. To prod the user into typing the expected\
    \ text, a Text Field can display placeholder text that appears in light gray as\
    \ shown in Figure [7-1](#329781_7_En_7_Chapter.xhtml#Fig1).\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig1_HTML.jpg)\n\
    \nA text. Text Field left bracket double quotes Placeholder text double quotes\
    \ comma text colon dollar sign message right bracket. The message, placeholder\
    \ text, is in a lighter shade between parallel lines below.\n\nFigure 7-1\n\n\
    Text Fields can display placeholder text to guide the user\n\nWhen the user types\
    \ something into a Text Field, that text gets stored in the State variable defined\
    \ by the text: parameter. In Figure [7-1](#329781_7_En_7_Chapter.xhtml#Fig1),\
    \ this State variable is called “message,” and the dollar sign ($) means that\
    \ the State variable is bound to this Text Field. That means changing the contents\
    \ of the Text Field automatically changes the message State variable.\n\n### Defining\
    \ Expandable Text Fields\n\nAlthough a Text Field is meant for accepting a short\
    \ amount of text, such as an address or a phone number, users can actually type\
    \ as much text as they want. When a user types too much text, the Text Field can\
    \ automatically expand either horizontally (the default setting) or vertically.\n\
    \nTo define an expandable Text Field, add an axis parameter as either .horizontal\
    \ or .vertical like this:\n\n```\nTextField(\"Vertical\", text: $message, axis:\
    \ .vertical)\n```\n\nWhen a Text Field expands horizontally, the user can keep\
    \ typing, and the text appears on a single line until it scrolls out of sight.\
    \ When a Text Field expands vertically, the width of the Text Field remains fixed,\
    \ but the height expands to display text on multiple lines as shown in Figure\
    \ [7-2](#329781_7_En_7_Chapter.xhtml#Fig2).\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig2_HTML.jpg)\n\
    \nA screenshot of the codes to define expandable text field. Includes 3 paragraphs\
    \ of text, stacked with a spacing of 75, to indicate that the message expands\
    \ horizontally and vertically.\n\nFigure 7-2\n\nText Fields can expand horizontally\
    \ or vertically\n\nWhen a Text Field expands vertically, its height will keep\
    \ expanding as the user continues typing in text. If you want to define how many\
    \ lines of text a vertically expanding Text Field can display, use the .lineLimit\
    \ modifier like this:\n\n```\nTextField(\"Vertical\", text: $message, axis: .vertical)\n\
    .lineLimit(3)\n```\n\nThe preceding code restricts the Text Field to displaying\
    \ a maximum of three lines of text. When defining a line limit, a vertically expanding\
    \ Text Field can still allow a large amount of text, but as the user continues\
    \ typing, the text will scroll up and out of sight.\n\nRather than define a fixed\
    \ value to the .lineLimit modifier, you can also define a range such as\n\n```\n\
    .lineLimit(2...5)\n```\n\nA range means that a Text Field expands and displays\
    \ the minimum number of text lines and keeps expanding until it reaches the maximum\
    \ limit. With a .lineLimit(2…5) that defines two to five lines of text, the Text\
    \ Field will expand to two lines of text. Then if the user keeps adding more text,\
    \ it will expand to display three lines of text and then four and then finally\
    \ stop at five. After five lines of text, the Text Field will stop expanding and\
    \ scroll additional lines of text out of sight.\n\nTo see how an expandable Text\
    \ Field works, follow these steps:\n\n1.  Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “ExpandableTextField.”\n\n2.  Click the\
    \ ContentView file in the Navigator pane.\n\n3.  Add a State variable underneath\
    \ the struct ContentView: View line like this:\n\n    ```\n    struct ContentView:\
    \ View {\n    @State var message = \"\"\n    ```\n\n4.  Add a TextField inside\
    \ the body like this:\n\n    ```\n    var body: some View {\n    VStack {\n  \
    \  TextField(\"Vertical\", text: $message, axis: .vertical)\n    .lineLimit(3)\n\
    \    }\n    }\n    ```\n\n    The entire ContentView file should look like this:\n\
    \n    ```\n    import SwiftUI\n    struct ContentView: View {\n    @State var\
    \ message = \"\"\n    var body: some View {\n    VStack {\n    TextField(\"Vertical\"\
    , text: $message, axis: .vertical)\n    .lineLimit(3)\n    }\n    }\n    }\n \
    \   struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n    ContentView()\n    }\n    }\n    ```\n\n5.  Click the Live icon.\n\
    \n6.  Click in the Text Field and type a large amount of text. Notice that the\
    \ Text Field expands in height until a maximum of three lines of text appears.\
    \ Then text starts scrolling up the top of the Text Field.\n\n7.  Press the up/down\
    \ arrow keys to scroll up and down to see any text hidden at the top or bottom\
    \ of the Text Field.\n\n### Changing the Text Field Style\n\nOne way to make a\
    \ Text Field easier to see is to display placeholder text that appears in light\
    \ gray to let the user know what to type and where to type. A second way to emphasize\
    \ a Text Field is to add a rounded border around it as shown in Figure [7-3](#329781_7_En_7_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig3_HTML.jpg)\n\nA screenshot\
    \ of a 3-line code to generate a rounded border around the text message of, placeholder\
    \ text, in lighter shade.\n\nFigure 7-3\n\nThe appearance of a rounded border\
    \ around a Text Field\n\nThe .textFieldStyle modifier gives you the option of\
    \ a .plain or .rounded border:\n\n```\n.textFieldStyle(.roundedBorder)\n```\n\n\
    While the .roundedBorder displays a border around the Text Field, the .plain modifier\
    \ eliminates the border and displays the Text Field as if there was no .textFieldStyle\
    \ modifier at all.\n\n### Creating Secure Text Fields\n\nWhen you type in a Text\
    \ Field, that text appears visible on the screen. While this can be handy in most\
    \ cases, it’s not appropriate when typing in sensitive information like passwords\
    \ or credit card numbers. To mask any text that the user types, SwiftUI offers\
    \ a special text field called a SecureField.\n\nLike a Text Field, a SecureField\
    \ displays placeholder text and binds itself to a State variable like this:\n\n\
    ```\nSecureField(\"Password\", text: $message)\n```\n\nA SecureField looks identical\
    \ to a TextField on the user interface. The only difference is that when you type\
    \ in a SecureField, it masks your text as shown in Figure [7-4](#329781_7_En_7_Chapter.xhtml#Fig4).\n\
    \n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig4_HTML.jpg)\n\nA screenshot\
    \ of a secure field, with asterisks in the entry bar, and a text field with text,\
    \ my password.\n\nFigure 7-4\n\nThe SecureField masks text unlike a Text Field\
    \ that displays everything the user types\n\nAny modifier you can use on a Text\
    \ Field, you can use on a SecureField such as the .textFieldStyle modifier."
  trans: "\n# 7. 从文本字段和文本编辑器中检索文本\n\n用户界面通常需要从用户处检索文本。有时这些文本可能是一个单词或短句，但其他时候可能包含多个段落。为了从用户处检索文本，SwiftUI\
    \ 提供了三种类型的视图：\n\n- `Text` 字段\n- `Secure` 字段\n- `Text` 编辑器\n\n`Text` 字段允许用户输入单行文本，例如姓名或地址。可选择地，文本字段可以显示占位符文本，该文本以浅灰色显示，用于说明该\
    \ `Text` 字段期望接收的信息类型。\n\n`Secure` 字段的工作方式与 `Text` 字段完全相同，区别在于它会屏蔽用户输入的任何文本。这在要求用户输入信用卡号等敏感信息时非常有用。\n\
    \n`Text` 编辑器显示为一个大型文本框，用户可以在其中输入和编辑多行文本，例如多个段落。\n\n由于 `Text` 字段、`Secure` 字段和 `Text`\
    \ 编辑器需要存储数据，因此它们需要与一个可以保存 `String` 数据类型的 State 变量配合使用，例如：\n\n```\n@State private\
    \ var message = \"\"\n```\n\n## 使用文本字段\n\n`Text` 字段的主要目的是接受用户输入的简短文本。可以是单个单词或一个短句。为促使用户输入预期的文本，`Text`\
    \ 字段可以显示占位符文本，该文本以浅灰色显示，如图 7-1 所示。\n\n一个文本示例：`TextField(\"占位符文本\", text: $message)`。`message`\
    \ 变量中的占位符文本，以较浅的色调显示在下方平行线之间。\n\n**图 7-1** 文本字段可以显示占位符文本以引导用户\n\n当用户在 `Text` 字段中输入内容时，该文本会存储到由\
    \ `text:` 参数定义的 State 变量中。在图 7-1 中，这个 State 变量名为 `\"message\"`，美元符号（`$`）表示该 State\
    \ 变量已绑定到此 `Text` 字段。这意味着更改 `Text` 字段的内容会自动更改 `message` 这个 State 变量。\n\n### 定义可扩展的文本字段\n\
    \n尽管 `Text` 字段旨在接受简短的文本（例如地址或电话号码），但用户实际上可以输入任意数量的文本。当用户输入过多文本时，`Text` 字段可以自动水平（默认设置）或垂直扩展。\n\
    \n要定义可扩展的 `Text` 字段，请添加一个 `axis` 参数，其值为 `.horizontal` 或 `.vertical`，如下所示：\n\n\
    ```\nTextField(\"垂直\", text: $message, axis: .vertical)\n```\n\n当 `Text` 字段水平扩展时，用户可以继续输入，文本将显示在一行上，直到滚动出视野。当\
    \ `Text` 字段垂直扩展时，`Text` 字段的宽度保持不变，但高度会扩展以显示多行文本，如图 7-2 所示。\n\n一个定义可扩展文本字段的代码截图。包含\
    \ 3 段文本，间隔为 75 垂直堆叠，用于指示消息水平和垂直扩展。\n\n**图 7-2** 文本字段可以水平或垂直扩展\n\n当 `Text` 字段垂直扩展时，其高度会随着用户继续输入文本而不断增加。如果想指定垂直扩展的\
    \ `Text` 字段可以显示多少行文本，请使用 `.lineLimit` 修饰符，如下所示：\n\n```\nTextField(\"垂直\", text:\
    \ $message, axis: .vertical)\n.lineLimit(3)\n```\n\n上述代码将 `Text` 字段限制为最多显示三行文本。在定义行数限制时，垂直扩展的\
    \ `Text` 字段仍然可以容纳大量文本，但随着用户继续输入，文本将向上滚动并超出视野。\n\n除了为 `.lineLimit` 修饰符定义固定值，你还可以定义一个范围，例如：\n\
    \n```\n.lineLimit(2...5)\n```\n\n范围意味着 `Text` 字段会扩展并显示最小行数的文本，然后继续扩展直到达到最大限制。使用\
    \ `.lineLimit(2...5)`（定义两到五行文本）时，`Text` 字段将扩展到两行文本。然后，如果用户继续添加更多文本，它将扩展到显示三行，接着四行，最后停在五行。达到五行文本后，`Text`\
    \ 字段将停止扩展，并将额外的文本行滚动出视野。\n\n要查看可扩展 `Text` 字段的工作原理，请按照以下步骤操作：\n\n1. 创建一个新的 SwiftUI\
    \ iOS App 项目，并为其取任意名称，例如 `\"ExpandableTextField\"`。\n2. 在导航器窗格中点击 `ContentView`\
    \ 文件。\n3. 在 `struct ContentView: View` 行下方添加一个 State 变量，如下所示：\n\n    ```\n   \
    \ struct ContentView: View {\n    @State var message = \"\"\n    ```\n\n4. 在 body\
    \ 中添加一个 `TextField`，如下所示：\n\n    ```\n    var body: some View {\n    VStack {\n\
    \    TextField(\"垂直\", text: $message, axis: .vertical)\n    .lineLimit(3)\n \
    \   }\n    }\n    ```\n\n    整个 `ContentView` 文件应该如下所示：\n\n    ```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n    @State var message = \"\"\n   \
    \ var body: some View {\n    VStack {\n    TextField(\"垂直\", text: $message, axis:\
    \ .vertical)\n    .lineLimit(3)\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n5. 点击实时图标。\n6. 点击 `Text` 字段并输入大量文本。注意 `Text` 字段的高度会扩展，直到最多显示三行文本。然后文本会开始向上滚动超出\
    \ `Text` 字段顶部。\n7. 按上/下箭头键上下滚动，查看隐藏在 `Text` 字段顶部或底部的任何文本。\n\n### 更改文本字段样式\n\n\
    使 `Text` 字段更易于识别的一种方法是显示以浅灰色出现的占位符文本，让用户知道输入什么以及在哪里输入。第二种强调 `Text` 字段的方法是添加圆角边框，如图\
    \ 7-3 所示。\n\n一个 3 行代码的截图，用于在较浅色调的占位符文本消息周围生成圆角边框。\n\n**图 7-3** 文本字段周围圆角边框的外观\n\
    \n`.textFieldStyle` 修饰符为你提供了 `.plain` 或 `.rounded` 边框的选项：\n\n```\n.textFieldStyle(.roundedBorder)\n\
    ```\n\n`.roundedBorder` 在 `Text` 字段周围显示边框，而 `.plain` 修饰符则消除边框，使 `Text` 字段看起来如同没有使用\
    \ `.textFieldStyle` 修饰符一样。\n\n### 创建安全文本字段\n\n当你在 `Text` 字段中输入时，该文本在屏幕上是可见的。虽然在大多数情况下这很方便，但在输入密码或信用卡号等敏感信息时就不合适了。为了屏蔽用户输入的任何文本，SwiftUI\
    \ 提供了一种特殊的文本字段，称为 `SecureField`。\n\n与 `Text` 字段一样，`SecureField` 会显示占位符文本，并将其绑定到一个\
    \ State 变量，如下所示：\n\n```\nSecureField(\"密码\", text: $message)\n```\n\n`SecureField`\
    \ 在用户界面上看起来与 `TextField` 完全相同。唯一的区别是，当你在 `SecureField` 中输入时，它会屏蔽你的文本，如图 7-4 所示。\n\
    \n一个安全字段的截图，输入栏中有星号，还有一个显示文本“我的密码”的文本字段。\n\n**图 7-4** `SecureField` 会屏蔽文本，而 `Text`\
    \ 字段则显示用户输入的所有内容\n\n任何可以在 `Text` 字段上使用的修饰符，都可以在 `SecureField` 上使用，例如 `.textFieldStyle`\
    \ 修饰符。\n"
- fmt: "# Using Autocorrect and Text Content\n\nBy default Text Fields use autocorrect,\
    \ which means as you type, the Text Field tries to guess the word you want to\
    \ write. In some cases, this can be helpful, but when you're trying to type a\
    \ name, you don't want autocorrect changing names to common words.\n\nTo turn\
    \ off autocorrect, just add the following modifier:\n\n```\n.disableAutocorrection(true)\n\
    ```\n\nIf you want to turn autocorrect back on again, either delete the entire\
    \ `.disableAutocorrection` modifier or pass it a `false` value like this:\n\n\
    ```\n.disableAutocorrection(false)\n```\n\nWhile disabling autocorrect can stop\
    \ a Text Field from offering irrelevant suggestions, another solution is to use\
    \ the `.textContentType` modifier to define the type of text a Text Field should\
    \ expect such as a name, email address, or telephone number. To use the `.textContentType`\
    \ modifier, you just need to specify the type of text to expect such as\n\n```\n\
    TextField(\"Enter your email address\", text: $emailAddress)\n.textContentType(.emailAddress)\n\
    ```\n\nBy defining a specific `.textContentType`, autocorrect will reduce the\
    \ number of irrelevant suggestions it makes. The different `.textContentType`\
    \ modifier options are\n\n*   `.URL` – For entering URL data\n*   `.namePrefix`\
    \ – For entering prefixes or titles such as Dr. or Mr.\n*   `.name` – For entering\
    \ names\n*   `.nameSuffix` – For entering suffixes to names such as Jr.\n*   `.givenName`\
    \ – For entering a first name\n*   `.middleName` – For entering a middle name\n\
    *   `.familyName` – For entering a family or last name\n*   `.nickname` – For\
    \ entering an alternative name\n*   `.organizationName` – For entering an organization\
    \ name\n*   `.jobTitle` – For entering a job title\n*   `.location` – For entering\
    \ a location including an address\n*   `.fullStreetAddress` – For entering a complete\
    \ street address\n*   `.streetAddressLine1` – For entering the first line of a\
    \ street address\n*   `.streetAddressLine2` – For entering the second line of\
    \ a street address\n*   `.addressCity` – For entering the city name of an address\n\
    *   `.addressCityAndState` – For entering a city and a state name in an address\n\
    *   `.postalCode` – For entering a postal code in an address\n*   `.sublocality`\
    \ – For entering a sublocality in an address\n*   `.countryName` – For entering\
    \ a country or region name in an address\n*   `.username` – For entering an account\
    \ or login name\n*   `.password` – For entering a password\n*   `.newPassword`\
    \ – For entering a new password\n*   `.oneTimeCode` – For entering a one-time\
    \ code\n*   `.emailAddress` – For entering an email address\n*   `.telephoneNumber`\
    \ – For entering a telephone number\n*   `.creditCardNumber` – For entering a\
    \ credit card number\n*   `.dateTime` – For entering a date, time, or duration\n\
    *   `.flightNumber` – For entering an airline flight number\n*   `.shipmentTrackingNumber`\
    \ – For entering a parcel tracking number\n\n## Defining Different Keyboards\n\
    \nOn a real iOS device, apps display a virtual keyboard that users can tap to\
    \ type out numbers or characters. Since a Text Field may expect certain types\
    \ of information such as names, numbers, or email addresses, you can define the\
    \ specific type of virtual keyboard to use for each Text Field on your user interface.\
    \ Some of the different virtual keyboards a Text Field can display include\n\n\
    *   `.default` – The virtual keyboard that normally appears unless you specify\
    \ otherwise\n*   `.asciiCapable` – Displays standard ASCII characters\n*   `.numbersAndPunctuation`\
    \ – Displays numbers and punctuation marks\n*   `.URL` – Displays a keyboard optimized\
    \ for URL entries\n*   `.numberPad` – Displays a numeric keypad for PIN entry\n\
    *   `.phonePad` – Displays a keypad for entering telephone numbers\n*   `.namePhonePad`\
    \ – Displays a keypad for entering a person's name and telephone number\n*   `.emailAddress`\
    \ – Displays a keyboard for typing email addresses\n*   `.decimalPad` – Displays\
    \ a keyboard with numbers and a decimal point\n*   `.twitter` – Displays a keyboard\
    \ for Twitter text entry\n*   `.webSearch` – Displays a keyboard for web search\
    \ terms and URL entry\n*   `.asciiCapableNumberPad` – Displays a numeric pad that\
    \ outputs only ASCII digits\n*   `.alphabet` – Displays a keyboard for alphabetic\
    \ entry\n\nFigure [7-5](#329781_7_En_7_Chapter.xhtml#Fig5) shows four different\
    \ appearances of the virtual keyboard.\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig5_HTML.jpg)\n\
    \nFour screenshots of the virtual keyboards. On the left is the QWERTY keyboards\
    \ and on the right is the number and punctuation keyboard.\n\nFigure 7-5\n\nDifferent\
    \ appearances of the virtual keyboard\n\nTo define a particular keyboard type\
    \ for a Text Field, use the `.keyboardType` modifier like this:\n\n```\nTextField(\"\
    Enter name\", text: $message)\n.keyboardType(.phonePad)\n```\n\nNote\n\nTo view\
    \ a virtual keyboard, you must test your project in the Simulator or on an actual\
    \ iOS device. In the Simulator, you can toggle to hide or display the virtual\
    \ keyboard by choosing I/O ➤ Keyboard ➤ Toggle Software Keyboard or by pressing\
    \ Command+K. You cannot view the virtual keyboard in the Canvas pane.\n\n## Dismissing\
    \ the Virtual Keyboard\n\nWhen the user wants to type in a Text Field, the virtual\
    \ keyboard appears, and the user interface automatically slides up. However, once\
    \ you're done typing, you need to make the virtual keyboard go away again.\n\n\
    One technique is to use the `.submitLabel` modifier that defines a specific key\
    \ to appear on the virtual keyboard. By tapping this key defined by the `.submitLabel`\
    \ modifier, users can make the virtual keyboard go away as shown in Figure [7-6](#329781_7_En_7_Chapter.xhtml#Fig6).\
    \ The `.submitLabel` modifier looks like this:\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig6_HTML.jpg)\n\
    \nA screenshot of the virtual keyboard with a done button highlighted, that is\
    \ next to the space bar.\n\nFigure 7-6\n\nThe `.submitLabel(.done)` modifier displays\
    \ a Done button on the virtual keyboard\n\n```\n.submitLabel(.done)\n```\n\nIf\
    \ you don't specify a `.submitLabel` modifier, SwiftUI defaults to displaying\
    \ a Return button in the bottom-right corner of the virtual keyboard. No matter\
    \ what label appears on the bottom-right corner key, tapping it will make the\
    \ virtual keyboard go away.\n\nThe different types of buttons the `.submitLabel`\
    \ modifier can place on the virtual keyboard include\n\n*   `.continue` – Adds\
    \ a Continue button\n*   `.done` – Adds a Done button\n*   `.go` – Adds a Go button\n\
    *   `.join` – Adds a Join button\n*   `.next` – Adds a Next button\n*   `.return`\
    \ – Adds a Return button\n*   `.route` – Adds a Route button\n*   `.search` –\
    \ Adds a Search button\n*   `.send` – Adds a Send button\n\nTo see how to hide\
    \ the virtual keyboard by using the virtual keyboard button that you can define,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as \"DismissKeyboard.\"\n\n2.  Click the ContentView\
    \ file in the Navigator pane.\n\n3.  Add a State variable underneath the `struct\
    \ ContentView: View` line like this:\n\n    ```\n    struct ContentView: View\
    \ {\n    @State var message = \"\"\n    ```\n\n4.  Add a TextField inside the\
    \ body like this:\n\n    ```\n    var body: some View {\n    TextField(\"Type\
    \ here\", text: $message)\n    .submitLabel(.done)\n    .padding()\n    }\n  \
    \  ```\n\n    The entire ContentView file should look like this:\n\n    ```\n\
    \    import SwiftUI\n    struct ContentView: View {\n    @State var message =\
    \ \"\"\n    var body: some View {\n    TextField(\"Type here\", text: $message)\n\
    \    .submitLabel(.done)\n    .padding()\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n5.  Click the Run button or choose Product ➤ Run to\
    \ run your app in the Simulator.\n\n6.  Click in the Text Field when your app\
    \ appears in the Simulator. If the virtual keyboard does not appear, press Command+K\
    \ or choose I/O ➤ Keyboard ➤ Toggle Software Keyboard.\n\n7.  Click the Done button\
    \ in the bottom-right corner of the virtual keyboard to make the virtual keyboard\
    \ disappear."
  raw: "### Using Autocorrect and Text Content\n\nBy default Text Fields use autocorrect,\
    \ which means as you type, the Text Field tries to guess the word you want to\
    \ write. In some cases, this can be helpful, but when you’re trying to type a\
    \ name, you don’t want autocorrect changing names to common words.\n\nTo turn\
    \ off autocorrect, just add the following modifier:\n\n```\n.disableAutocorrection(true)\n\
    ```\n\nIf you want to turn autocorrect back on again, either delete the entire\
    \ .disableAutocorrection modifier or pass it a false value like this:\n\n```\n\
    .disableAutocorrection(false)\n```\n\nWhile disabling autocorrect can stop a Text\
    \ Field from offering irrelevant suggestions, another solution is to use the .textContentType\
    \ modifier to define the type of text a Text Field should expect such as a name,\
    \ email address, or telephone number. To use the .textContentType modifier, you\
    \ just need to specify the type of text to expect such as\n\n```\nTextField(\"\
    Enter your email address\", text: $emailAddress)\n.textContentType(.emailAddress)\n\
    ```\n\nBy defining a specific .textContentType, autocorrect will reduce the number\
    \ of irrelevant suggestions it makes. The different .textContentType modifier\
    \ options are\n\n*   .URL – For entering URL data\n\n*   .namePrefix – For entering\
    \ prefixes or titles such as Dr. or Mr.\n\n*   .name – For entering names\n\n\
    *   .nameSuffix – For entering suffixes to names such as Jr.\n\n*   .givenName\
    \ – For entering a first name\n\n*   .middleName – For entering a middle name\n\
    \n*   .familyName – For entering a family or last name\n\n*   .nickname – For\
    \ entering an alternative name\n\n*   .organizationName – For entering an organization\
    \ name\n\n*   .jobTitle – For entering a job title\n\n*   .location – For entering\
    \ a location including an address\n\n*   .fullStreetAddress – For entering a complete\
    \ street address\n\n*   .streetAddressLine1 – For entering the first line of a\
    \ street address\n\n*   .streetAddressLine2 – For entering the second line of\
    \ a street address\n\n*   .addressCity – For entering the city name of an address\n\
    \n*   .addressCityAndState – For entering a city and a state name in an address\n\
    \n*   .postalCode – For entering a postal code in an address\n\n*   .sublocality\
    \ – For entering a sublocality in an address\n\n*   .countryName – For entering\
    \ a country or region name in an address\n\n*   .username – For entering an account\
    \ or login name\n\n*   .password – For entering a password\n\n*   .newPassword\
    \ – For entering a new password\n\n*   .oneTimeCode – For entering a one-time\
    \ code\n\n*   .emailAddress – For entering an email address\n\n*   .telephoneNumber\
    \ – For entering a telephone number\n\n*   .creditCardNumber – For entering a\
    \ credit card number\n\n*   .dateTime – For entering a date, time, or duration\n\
    \n*   .flightNumber – For entering an airline flight number\n\n*   .shipmentTrackingNumber\
    \ – For entering a parcel tracking number\n\n### Defining Different Keyboards\n\
    \nOn a real iOS device, apps display a virtual keyboard that users can tap to\
    \ type out numbers or characters. Since a Text Field may expect certain types\
    \ of information such as names, numbers, or email addresses, you can define the\
    \ specific type of virtual keyboard to use for each Text Field on your user interface.\
    \ Some of the different virtual keyboards a Text Field can display include\n\n\
    *   .default – The virtual keyboard that normally appears unless you specify otherwise\n\
    \n*   .asciiCapable – Displays standard ASCII characters\n\n*   .numbersAndPunctuation\
    \ – Displays numbers and punctuation marks\n\n*   .URL – Displays a keyboard optimized\
    \ for URL entries\n\n*   .numberPad – Displays a numeric keypad for PIN entry\n\
    \n*   .phonePad – Displays a keypad for entering telephone numbers\n\n*   .namePhonePad\
    \ – Displays a keypad for entering a person’s name and telephone number\n\n* \
    \  .emailAddress – Displays a keyboard for typing email addresses\n\n*   .decimalPad\
    \ – Displays a keyboard with numbers and a decimal point\n\n*   .twitter – Displays\
    \ a keyboard for Twitter text entry\n\n*   .webSearch – Displays a keyboard for\
    \ web search terms and URL entry\n\n*   .asciiCapableNumberPad – Displays a numeric\
    \ pad that outputs only ASCII digits\n\n*   .alphabet – Displays a keyboard for\
    \ alphabetic entry\n\nFigure [7-5](#329781_7_En_7_Chapter.xhtml#Fig5) shows four\
    \ different appearances of the virtual keyboard.\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig5_HTML.jpg)\n\
    \nFour screenshots of the virtual keyboards. On the left is the QWERTY keyboards\
    \ and on the right is the number and punctuation keyboard.\n\nFigure 7-5\n\nDifferent\
    \ appearances of the virtual keyboard\n\nTo define a particular keyboard type\
    \ for a Text Field, use the .keyboardType modifier like this:\n\n```\nTextField(\"\
    Enter name\", text: $message)\n.keyboardType(.phonePad)\n```\n\nNote\n\nTo view\
    \ a virtual keyboard, you must test your project in the Simulator or on an actual\
    \ iOS device. In the Simulator, you can toggle to hide or display the virtual\
    \ keyboard by choosing I/O ➤ Keyboard ➤ Toggle Software Keyboard or by pressing\
    \ Command+K. You cannot view the virtual keyboard in the Canvas pane.\n\n### Dismissing\
    \ the Virtual Keyboard\n\nWhen the user wants to type in a Text Field, the virtual\
    \ keyboard appears, and the user interface automatically slides up. However, once\
    \ you’re done typing, you need to make the virtual keyboard go away again.\n\n\
    One technique is to use the .submitLabel modifier that defines a specific key\
    \ to appear on the virtual keyboard. By tapping this key defined by the .submitLabel\
    \ modifier, users can make the virtual keyboard go away as shown in Figure [7-6](#329781_7_En_7_Chapter.xhtml#Fig6).\
    \ The .submitLabel modifier looks like this:\n\n![](images/329781_7_En_7_Chapter/329781_7_En_7_Fig6_HTML.jpg)\n\
    \nA screenshot of the virtual keyboard with a done button highlighted, that is\
    \ next to the space bar.\n\nFigure 7-6\n\nThe .submitLabel(.done) modifier displays\
    \ a Done button on the virtual keyboard\n\n```\n.submitLabel(.done)\n```\n\nIf\
    \ you don’t specify a .submitLabel modifier, SwiftUI defaults to displaying a\
    \ Return button in the bottom-right corner of the virtual keyboard. No matter\
    \ what label appears on the bottom-right corner key, tapping it will make the\
    \ virtual keyboard go away.\n\nThe different types of buttons the .submitLabel\
    \ modifier can place on the virtual keyboard include\n\n*   .continue – Adds a\
    \ Continue button\n\n*   .done – Adds a Done button\n\n*   .go – Adds a Go button\n\
    \n*   .join – Adds a Join button\n\n*   .next – Adds a Next button\n\n*   .return\
    \ – Adds a Return button\n\n*   .route – Adds a Route button\n\n*   .search –\
    \ Adds a Search button\n\n*   .send – Adds a Send button\n\nTo see how to hide\
    \ the virtual keyboard by using the virtual keyboard button that you can define,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as “DismissKeyboard.”\n\n2.  Click the ContentView file\
    \ in the Navigator pane.\n\n3.  Add a State variable underneath the struct ContentView:\
    \ View line like this:\n\n    ```\n    struct ContentView: View {\n    @State\
    \ var message = \"\"\n    ```\n\n4.  Add a TextField inside the body like this:\n\
    \n    ```\n    var body: some View {\n    TextField(\"Type here\", text: $message)\n\
    \    .submitLabel(.done)\n    .padding()\n    }\n    ```\n\n    The entire ContentView\
    \ file should look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State var message = \"\"\n    var body: some View {\n    TextField(\"\
    Type here\", text: $message)\n    .submitLabel(.done)\n    .padding()\n    }\n\
    \    }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n5.  Click the Run button\
    \ or choose Product ➤ Run to run your app in the Simulator.\n\n6.  Click in the\
    \ Text Field when your app appears in the Simulator. If the virtual keyboard does\
    \ not appear, press Command+K or choose I/O ➤ Keyboard ➤ Toggle Software Keyboard.\n\
    \n7.  Click the Done button in the bottom-right corner of the virtual keyboard\
