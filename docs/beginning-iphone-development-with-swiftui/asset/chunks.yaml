    )\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName: \"folder.fill\"\
    )\n    Text(\"Four\")\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName:\
    \ \"internaldrive.fill\")\n    Text(\"Five\")\n    }\n    Text(\"Six\")\n    .tabItem\
    \ {\n    Image(systemName: \"cloud.drizzle.fill\")\n    Text(\"Six\")\n    }\n\
    \    }.accentColor(.purple)\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\nNotice that the .accentColor modifier on the Tab View lets you define\
    \ a color for the tab bar.\n\n3.  Click the Live icon in the Canvas pane. The\
    \ tab bar appears, but now a More icon appears on the far right as shown in Figure\
    \ [18-3](#329781_7_En_18_Chapter.xhtml#Fig3).\n\n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig4_HTML.jpg)\n\
    \nA mobile screen displays more tabs with five and six tabs. At the bottom, there\
    \ are four icons of one, two, three, and four. The more icon on the right is highlighted.\
    \ 1, heart symbol. 2, rabbit. 3, tortoise. 4, folder. More, three dots.\n\nFigure\
    \ 18-4\n\nThe More icon displays a Navigation Stack\n\n1.  Click the More icon.\
    \ Notice that a Navigation Stack appears, listing your additional tabs in a list\
    \ as shown in Figure [18-4](#329781_7_En_18_Chapter.xhtml#Fig4).\n\n1.  Click\
    \ the Five or Six item in the Navigation Stack to see that particular Text view.\n\
    \nBecause the tab bar can only show a maximum of five icons, it’s best to limit\
    \ the number of options to five or fewer."
  trans: "\n# 18. 使用标签视图\n\n多数应用都包含多个屏幕。第 17 章解释了如何创建使用导航堆栈的应用，让用户可以按顺序从一个屏幕跳转到另一个屏幕。这对于显示更多详细信息非常方便，例如\
    \ iOS 中的“设置”应用，它允许你选择各种选项，然后查看多个屏幕来选取不同的设置。\n\n然而，导航堆栈的一个问题是，如果你将太多屏幕链接在一起，导航会变得笨重，因为你必须从第一个屏幕导航到第二个，再到第三个，才能到达第四个屏幕。然后你必须反转整个过程，从第四个屏幕返回到第一个屏幕。\n\
    \n为了提供另一种从一个屏幕跳转到另一个屏幕的方式，你可以使用标签视图，它会在屏幕底部显示图标和/或文本。选择一个标签（图标和/或文本）即可跳转到一个新屏幕。例如，“时钟”应用在屏幕底部显示图标/文本，让你跳转到不同的功能，如图\
    \ 18-1 所示。\n\n![](img/329781_7_En_18_Fig1_HTML.jpg)\n\n一张手机屏幕显示了一个世界时钟，展示了不同国家/地区的不同时间，包括圣地亚哥、底特律、拉各斯和北京。它包含了用于闹钟和计时器图标的标签。\n\
    \n图 18-1\n\n标签视图让你可以轻松从一个屏幕跳转到另一个屏幕\n\n由于无论你正在查看哪个屏幕，标签栏都显示在屏幕底部，因此标签视图让你可以随时轻松跳转到想要查看的屏幕。\n\
    \n## 使用标签视图\n\n一个标签视图通过如下代码包含多个视图：\n\n```\nTabView {\n// 在此放置多个视图\n}\n```\n\n\
    存储在标签视图中的每个视图，可以简单到单个视图（如 `Text` 或 `Image` 视图），也可以更详细，例如定义一个视图的结构体。创建标签视图的第一步就是简单地列出你想要在标签视图内使用的所有视图，如下所示：\n\
    \n```\nTabView {\nText(\"一\")\nText(\"二\")\nText(\"三\")\nText(\"四\")\n}\n```\n\
    \n在定义了要在标签视图内显示的视图之后，下一步是为每个视图定义一个图标和/或文本来表示它。为此，需要为每个视图添加一个 `.tabItem` 修饰符，并使用\
    \ `Image` 和 `Text` 视图，如下所示：\n\n```\nText(\"一\")\n.tabItem {\nImage(systemName:\
    \ \"heart.fill\")\nText(\"标签 1\")\n}\n```\n\n通过为每个视图附加一个 `.tabItem` 修饰符，并使用 `Image`\
    \ 和 `Text` 视图来定义其内容，你可以创建一个显示在屏幕底部的标签栏，如图 18-2 所示。\n\n![](img/329781_7_En_18_Fig2_HTML.jpg)\n\
    \n一段显示四个图标（标签 1、标签 2、标签 3、标签 4）的片段。标签 1 是心形符号，标签 2 是兔子，标签 3 是乌龟，标签 4 是文件夹。\n\n\
    图 18-2\n\n一个典型的标签栏显示图标和文本\n\n`Image` 视图可以显示任何图像，但通常显示你可以在 SF Symbols 应用（[`https://developer.apple.com/sf-symbols`](https://developer.apple.com/sf-symbols)）中看到的图标。\n\
    \n> **注意**  \n> 标签可以显示为图像和文本、仅图像或仅文本。为了清晰起见，通常最好将标签同时定义为图像和文本。\n\n要了解如何创建一个简单的标签视图，请遵循以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS 应用项目，并为其起一个你喜欢的名称，例如 `\"TabViewSimple\"`。\n2. 在导航器窗格中点击\
    \ `ContentView` 文件。\n3. 在 `var body: some View` 内部添加以下视图，如下所示：\n\n```\n    var\
    \ body: some View {\n    TabView {\n    Text(\"一\")\n    Text(\"二\")\n    Text(\"\
    三\")\n    Text(\"四\")\n    }\n    }\n```\n\n为了在屏幕底部创建一个标签栏，我们需要添加使用 `Image` 和\
    \ `Text` 视图的 `.tabItem` 修饰符。\n\n4. 为每个视图添加如下的 `.tabItem` 修饰符：\n\n```\n    var\
    \ body: some View {\n    TabView {\n    Text(\"一\")\n    .tabItem {\n    Image(systemName:\
    \ \"heart.fill\")\n    Text(\"一\")\n    }\n    Text(\"二\")\n    .tabItem {\n \
    \   Image(systemName: \"hare.fill\")\n    Text(\"二\")\n    }\n    Text(\"三\")\n\
    \    .tabItem {\n    Image(systemName: \"tortoise.fill\")\n    Text(\"三\")\n \
    \   }\n    Text(\"四\")\n    .tabItem {\n    Image(systemName: \"folder.fill\"\
    )\n    Text(\"四\")\n    }\n    }\n    }\n```\n\n你可以随意使用不同的 SF Symbols 图标和文本来定制屏幕底部标签栏中的按钮。除了使用\
    \ `Image` 和 `Text` 视图的组合，你也可以使用单个 `Label` 视图，如下所示：\n\n1. 在画布窗格中点击“实时”图标。\n2. 点击屏幕底部的不同标签，查看不同的视图。\n\
    \n```\nLabel(\"四\", systemImage: \"folder.fill\")\n```\n\n> **注意**  \n> 由于标签视图将每个视图表示为图标/文本，因此标签视图在屏幕底部最多只能显示五\
    \ (5) 个项目。如果你在标签视图中存储了超过五个视图，标签视图会自动创建一个“更多”图标，将任何额外的视图隐藏到第二个标签栏中。\n\n要了解如果你在标签视图中显示超过五个视图，标签视图如何自动在标签栏中创建一个“更多”按钮，请遵循以下步骤：\n\
    \n![](img/329781_7_En_18_Fig3_HTML.jpg)\n\n一段显示四个图标（一、二、三、四）的片段。右侧的“更多”图标被高亮显示。1\
    \ 是心形符号，2 是兔子，3 是乌龟，4 是文件夹。“更多”是三个点。\n\n图 18-3\n\n当标签视图包含超过五个标签时，“更多”图标会自动出现\n\
    \n1. 打开你先前创建的 Xcode 项目（`\"TabViewSimple\"`）。\n2. 编辑 `ContentView` 文件，使整个代码如下所示：\n\
    \n```\n    import SwiftUI\n    struct ContentView: View {\n    var body: some\
    \ View {\n    TabView {\n    Text(\"一\")\n    .tabItem {\n    Image(systemName:\
    \ \"heart.fill\")\n    Text(\"一\")\n    }\n    Text(\"二\")\n    .tabItem {\n \
    \   Image(systemName: \"hare.fill\")\n    Text(\"二\")\n    }\n    Text(\"三\")\n\
    \    .tabItem {\n    Image(systemName: \"tortoise.fill\")\n    Text(\"三\")\n \
    \   }\n    Text(\"四\")\n    .tabItem {\n    Image(systemName: \"folder.fill\"\
    )\n    Text(\"四\")\n    }\n    Text(\"五\")\n    .tabItem {\n    Image(systemName:\
    \ \"internaldrive.fill\")\n    Text(\"五\")\n    }\n    Text(\"六\")\n    .tabItem\
    \ {\n    Image(systemName: \"cloud.drizzle.fill\")\n    Text(\"六\")\n    }\n \
    \   }.accentColor(.purple)\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n```\n\
    \n注意，标签视图上的 `.accentColor` 修饰符允许你为标签栏定义一种颜色。\n\n3. 在画布窗格中点击“实时”图标。标签栏出现，但现在最右侧会出现一个“更多”图标，如图\
    \ 18-3 所示。\n\n![](img/329781_7_En_18_Fig4_HTML.jpg)\n\n一张手机屏幕显示了带有五个和六个标签的更多标签。底部有四个图标：一、二、三、四。右侧的“更多”图标被高亮显示。1\
    \ 是心形符号，2 是兔子，3 是乌龟，4 是文件夹。“更多”是三个点。\n\n图 18-4\n\n“更多”图标显示一个导航堆栈\n\n4. 点击“更多”图标。注意，出现一个导航堆栈，以列表形式列出了你的额外标签，如图\
    \ 18-4 所示。\n\n5. 点击导航堆栈中的“五”或“六”项，查看相应的 `Text` 视图。\n\n由于标签栏最多只能显示五个图标，因此最好将选项数量限制在五个或更少。\n"
- fmt: "# Selecting Buttons Programmatically in a Tab Bar\n\nTo select a different\
    \ view, users can simply select a tab in the tab bar. By default, the first tab\
    \ on the far left appears highlighted. However, sometimes you may want to select\
    \ a tab through code. In that case, you need to identify each `.tabItem` using\
    \ the `.tag` modifier.\n\nThe `.tag` modifier lets you identify each tab with\
    \ a fixed value such as `2`. When each `.tabItem` has a unique `.tag` value, then\
    \ you can use Swift code to choose a particular tab by referencing its `.tag`\
    \ value.\n\nTo see how to access tabs in a Tab View through Swift code, follow\
    \ these steps:\n\n1. Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as “TabViewTag.”\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add a State variable under the `struct ContentView: View` line like\
    \ this:\n    ```\n    struct ContentView: View {\n    @State var selectedView\
    \ = 1\n    ```\n4. Add a `VStack` and an `HStack` under the `var body: some View`\
    \ line, and add four Buttons inside the `HStack` like this:\n    ```\n    var\
    \ body: some View {\n    VStack {\n    HStack {\n    Button (\"1\") {\n    selectedView\
    \ = 1\n    }\n    Button (\"2\") {\n    selectedView = 2\n    }\n    Button (\"\
    3\") {\n    selectedView = 3\n    }\n    Button (\"4\") {\n    selectedView =\
    \ 4\n    }\n    }\n    }\n    }\n    ```\n5. Add a Tab View inside the `VStack`\
    \ and underneath the `HStack` like this:\n    ```\n    TabView (selection: $selectedView){\n\
    \    Text(\"One\")\n    .tabItem {\n    Image(systemName: \"heart.fill\")\n  \
    \  Text(\"One\")\n    }.tag(1)\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName:\
    \ \"hare.fill\")\n    Text(\"Two\")\n    }.tag(2)\n    Text(\"Three\")\n    .tabItem\
    \ {\n    Image(systemName: \"tortoise.fill\")\n    Text(\"Three\")\n    }.tag(3)\n\
    \    Text(\"Four\")\n    .tabItem {\n    Image(systemName: \"folder.fill\")\n\
    \    Text(\"Four\")\n    }.tag(4)\n    }\n    ```\n    The entire `ContentView`\
    \ file should look like this:\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n    @State var selectedView = 1\n    var body: some View {\n    VStack\
    \ {\n    HStack {\n    Button (\"1\") {\n    selectedView = 1\n    }\n    Button\
    \ (\"2\") {\n    selectedView = 2\n    }\n    Button (\"3\") {\n    selectedView\
    \ = 3\n    }\n    Button (\"4\") {\n    selectedView = 4\n    }\n    }\n    TabView\
    \ (selection: $selectedView){\n    Text(\"One\")\n    .tabItem {\n    Image(systemName:\
    \ \"heart.fill\")\n    Text(\"One\")\n    }.tag(1)\n    Text(\"Two\")\n    .tabItem\
    \ {\n    Image(systemName: \"hare.fill\")\n    Text(\"Two\")\n    }.tag(2)\n \
    \   Text(\"Three\")\n    .tabItem {\n    Image(systemName: \"tortoise.fill\")\n\
    \    Text(\"Three\")\n    }.tag(3)\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName:\
    \ \"folder.fill\")\n    Text(\"Four\")\n    }.tag(4)\n    }\n    }\n    }\n  \
    \  }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n    This code creates\
    \ a Tab View and four Buttons at the top of the screen labeled 1, 2, 3, and 4.\n\
    6. Click the Live icon in the Canvas pane.\n7. Click the numbered Buttons at the\
    \ top of the screen. Notice that if you click the 2 Button, the second tab in\
    \ the tab bar gets selected. If you click the 4 button, the fourth tab in the\
    \ tab bar gets selected. The `.tag` modifier gives you a way to access a specific\
    \ tab through Swift code.\n\n## Displaying a Page View\n\nNormally a Tab View\
    \ displays tabs at the bottom of the screen so users can select a tab and jump\
    \ to a different view. As an alternative, you can turn a Tab View into a Page\
    \ View. A Page View displays tab bar icons at the bottom middle of the screen\
    \ that represent different screens. Then the user can scroll right and left to\
    \ view each screen in sequential order.\n\nTo turn a Tab View into a Page View,\
    \ just add the `.tabViewStyle` modifier to a Tab View and specify `.page` like\
    \ this:\n\n```\nTabView {\n}.tabViewStyle(.page)\n```\n\nNow instead of selecting\
    \ a tab from the bottom of the screen to open a view, users can scroll left and\
    \ right to open each view in sequential order. To provide a visual map of how\
    \ many views are available, you can add the `.indexViewStyle` modifier and specify\
    \ `.always` for the `backgroundDisplayMode` like this:\n\n```\nTabView {\n}.tabViewStyle(.page)\n\
    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))\n```\n\nTo\
    \ see how to a Page View works, follow these steps:\n\n![](images/329781_7_En_18_Chapter/329781_7_En_18_Fig5_HTML.jpg)\n\
    \nA snippet of 6 icons includes a heart, a rabbit, a tortoise, a file, a folder,\
    \ and a circle.\n\n**Figure 18-5** The icon bar at the bottom of a Page View\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “PageView.”\n2. Click the `ContentView` file in the Navigator pane.\n3. Add\
    \ a Tab View inside the `var body: some View` line like this:\n    ```\n    TabView\
    \ {\n    Text(\"One\")\n    .tabItem {\n    Image(systemName: \"heart.fill\")\n\
    \    }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName: \"hare.fill\"\
    )\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName: \"tortoise.fill\"\
    )\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName: \"folder.fill\"\
    )\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName: \"tray.fill\"\
    )\n    }\n    Text(\"Six\")\n    .tabItem {\n    Image(systemName: \"keyboard.fill\"\
    )\n    }\n    }\n    ```\n    Feel free to choose different text for each `Text`\
    \ view and different SF Symbol icons for each `Image` view. Notice that you only\
    \ need to add an `Image` view and do not need a `Text` view for each `.tabItem`.\n\
    4. Add a `.tabViewStyle` and an `.indexViewStyle` modifier to the Tab View like\
    \ this:\n    ```\n    TabView {\n    Text(\"One\")\n    .tabItem {\n    Image(systemName:\
    \ \"heart.fill\")\n    }\n    Text(\"Two\")\n    .tabItem {\n    Image(systemName:\
    \ \"hare.fill\")\n    }\n    Text(\"Three\")\n    .tabItem {\n    Image(systemName:\
    \ \"tortoise.fill\")\n    }\n    Text(\"Four\")\n    .tabItem {\n    Image(systemName:\
    \ \"folder.fill\")\n    }\n    Text(\"Five\")\n    .tabItem {\n    Image(systemName:\
    \ \"tray.fill\")\n    }\n    Text(\"Six\")\n    .tabItem {\n    Image(systemName:\
    \ \"keyboard.fill\")\n    }\n    }.tabViewStyle(.page)\n    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode:\
    \ .always))\n    ```\n    This displays each Image as a list of icons in the bottom\
    \ middle of the screen as shown in Figure 18-5.\n\nThe entire `ContentView` file\
    \ should look like this:\n\n1. Click the Live icon in the Canvas pane.\n2. Drag\
    \ the mouse from right to left (and left to right) to swipe from one view to the\
    \ next. Notice that each time you do this, a different icon at the bottom of the\
    \ screen appears highlighted to let you know which view you’re currently on and\
    \ how many additional views may be before and after the currently displayed view.\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\nvar body: some View {\nTabView\
    \ {\nText(\"One\")\n.tabItem {\nImage(systemName: \"heart.fill\")\n}\nText(\"\
    Two\")\n.tabItem {\nImage(systemName: \"hare.fill\")\n}\nText(\"Three\")\n.tabItem\
    \ {\nImage(systemName: \"tortoise.fill\")\n}\nText(\"Four\")\n.tabItem {\nImage(systemName:\
    \ \"folder.fill\")\n}\nText(\"Five\")\n.tabItem {\nImage(systemName: \"tray.fill\"\
    )\n}\nText(\"Six\")\n.tabItem {\nImage(systemName: \"keyboard.fill\")\n}\n}.tabViewStyle(.page)\n\
    .indexViewStyle(PageIndexViewStyle(backgroundDisplayMode: .always))\n}\n}\nstruct\
    \ ContentView_Previews: PreviewProvider {\nstatic var previews: some View {\n\
    ContentView()\n}\n}\n```"
