    \ structure like this:\n\n```\n    struct FileView: View {\n    var body: some\
    \ View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    Text(\"\
    This is a separate structure\")\n    Text(\"that's stored in the same file\")\n\
    \    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n  \
    \  }\n    ```\n\nThe entire ContentView file should look like this:\n\n```\n \
    \   import SwiftUI\n    struct ContentView: View {\n    var body: some View {\n\
    \    TabView {\n    FileView()\n    .tabItem {\n    Image(systemName: \"heart.fill\"\
    )\n    Text(\"First\")\n    }\n    SeparateFileView()\n    .tabItem {\n    Image(systemName:\
    \ \"hare.fill\")\n    Text(\"Second\")\n    }\n    }\n    }\n    }\n    struct\
