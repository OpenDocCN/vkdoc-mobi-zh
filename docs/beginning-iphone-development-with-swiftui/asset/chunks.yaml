    \ underneath the Button like this:\n\n    ```\n    HStack {\n    Text(\"easeIn\"\
    )\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeIn, value: start)\n\
    \    Text(\"easeOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n    .animation(.easeOut,\
    \ value: start)\n    Text(\"easeInOut\")\n    .offset(x: 0, y: start ? 450 : 0)\n\
    \    .animation(.easeInOut, value: start)\n    Text(\"linear\")\n    .offset(x:\
    \ 0, y: start ? 450 : 0)\n    .animation(.linear, value: start)\n    }.position(x:\
    \ 150, y: 10)\n    ```\n\n    Notice that the .position modifier initially places\
    \ the entire HStack and all four Text views near the top of the screen. The entire\
    \ ContentView file should look like this:\n\n    ```\n    import SwiftUI\n   \
    \ struct ContentView: View {\n    @State private var start = false\n    var body:\
    \ some View {\n    VStack {\n    Button(\"Start animation\") {\n    start.toggle()\n\
    \    }\n    HStack {\n    Text(\"easeIn\")\n    .offset(x: 0, y: start ? 450 :\
