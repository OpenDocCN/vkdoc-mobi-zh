  trans: "\n# 检测空间轻点手势\n\n空间轻点手势与普通轻点手势类似，但它最常用于检测一次或多次轻点的位置。要检测轻点位置，你需要一个能存储 `CGPoint`\
    \ 数据类型的 `State` 变量，如下所示：\n\n```\n@State var tapLocation: CGPoint = .zero\n```\n\
    \n接着，你需要定义一个空间轻点手势来检测位置，如下所示：\n\n```\nvar spatialTapGesture: some Gesture {\n\
    SpatialTapGesture()\n.onEnded { event in\ntapLocation = event.location\n}\n}\n\
    ```\n\n`event.location` 会检测轻点手势的位置，并将 `x` 和 `y` 数据存储在 `tapLocation` `State` 变量中，其中\
    \ `tapLocation.x` 包含距原点（对象的左上角）的水平距离，`tapLocation.y` 包含距原点的垂直距离。原点由附加了空间轻点手势的对象定义。\n\
    \n一旦你能检测到轻点位置，就可以根据用户点击的区域来做出响应。默认情况下，空间轻点手势只检测单次轻点，但你可以通过定义 `count` 参数来指定所需的点击次数，例如双击，如下所示：\n\
    \n```\nvar spatialTapGesture: some Gesture {\nSpatialTapGesture(count: 2)\n.onEnded\
    \ { event in\ntapLocation = event.location\n}\n}\n```\n\n要了解如何使用空间轻点手势，请遵循以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 \"SpatialTapGesture\"。\n2. 在导航器窗格中点击\
    \ `ContentView` 文件。\n3. 在 `struct ContentView: View` 这行下方添加以下 `State` 变量和常量：\n\
    \n```\n    @State var tapLocation: CGPoint = .zero\n    let dimension: CGFloat\
    \ = 360\n```\n\n4. 在 `State` 变量和常量下方添加一个空间轻点手势变量，如下所示：\n\n```\n    var spatialTapGesture:\
    \ some Gesture {\n    SpatialTapGesture()\n    .onEnded { event in\n    tapLocation\
    \ = event.location\n    }\n    }\n```\n\n在本例中，空间轻点手势的名称为 `spatialTapGesture`，但你可以使用任何你想要的名称。你的空间轻点手势的名称稍后将用于将其附加到一个对象上。\n\
    \n5. 在 `body` 内部添加一个 `VStack`，以及一个 `Rectangle` 和两个 `Text` 视图，如下所示：\n\n```\n  \
    \  VStack {\n    Rectangle()\n    .foregroundStyle(tapLocation.y > dimension /\
    \ 2.0 ? Color.orange : Color.purple)\n    .overlay(Text(\"Tap Me\").font(.largeTitle).foregroundColor(tapLocation.x\
    \ > dimension / 2.0 ? Color.black : Color.white))\n    .frame(width: dimension,\
    \ height: dimension)\n    .gesture(spatialTapGesture)\n    Text(\"Tap x location\
    \ = \\(tapLocation.x)\")\n    Text(\"Tap y location = \\(tapLocation.y)\")\n \
    \   }\n```\n\n这会创建一个宽度和高度由 `dimension` 常量（设置为 360）定义的 `Rectangle`。`.foregroundStyle`\
    \ 修饰符会根据用户在 `Rectangle` 上点击的位置来改变颜色。如果用户点击在 `Rectangle` 的下半部分（`tapLocation.y >\
    \ dimension / 2.0`），那么 `Rectangle` 的颜色是橙色。否则，`Rectangle` 的颜色是紫色。\n\n覆盖在 `Rectangle`\
    \ 之上的是一个 `Text` 视图，如果用户点击（轻点）了 `Rectangle` 的右半部分（`tapLocation.x > dimension /\
    \ 2.0`），文本的前景色将显示为黑色；如果用户点击（轻点）了 `Rectangle` 的左半部分，则显示为白色。\n\n`Rectangle` 下方的两个\
    \ `Text` 视图仅显示用户点击（轻点）位置的 x 和 y 坐标，原点 (0,0) 是 `Rectangle` 的左上角。\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
    \ var tapLocation: CGPoint = .zero\n    let dimension: CGFloat = 360\n    var\
    \ spatialTapGesture: some Gesture {\n    SpatialTapGesture()\n    .onEnded { event\
    \ in\n    tapLocation = event.location\n    }\n    }\n    var body: some View\
    \ {\n    VStack {\n    Rectangle()\n    .foregroundStyle(tapLocation.y > dimension\
    \ / 2.0 ? Color.orange : Color.purple)\n    .overlay(Text(\"Tap Me\").font(.largeTitle).foregroundColor(tapLocation.x\
    \ > dimension / 2.0 ? Color.black : Color.white))\n    .frame(width: dimension,\
    \ height: dimension)\n    .gesture(spatialTapGesture)\n    Text(\"Tap x location\
    \ = \\(tapLocation.x)\")\n    Text(\"Tap y location = \\(tapLocation.y)\")\n \
    \   }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n```\n\n6. 在画布窗格中点击\
    \ Live 图标。\n7. 依次点击 `Rectangle` 的左上角、右上角、右下角和左下角。注意，每次你在不同区域点击时，两个 `Text` 视图会标识出你点击的位置。你在\
    \ `Rectangle` 上点击的位置也决定了 `Rectangle` 和文本颜色如何变化。\n\n尝试像这样向 `SpatialTapGesture`\
    \ 添加一个 `count` 参数，并再次测试应用，确保在空间轻点手势被识别前需要双击：\n\n```\nSpatialTapGesture(count:\
    \ 2)\n```\n"
- fmt: "# Detecting Long Press Gestures\n\nA long press gesture occurs when the user\
    \ presses one or more fingertips on the screen for a fixed amount of time where\
    \ the fingertips don’t move very far. To define a long press, you can modify the\
    \ following properties:\n\n- `minimumDuration` – Defines how long one or more\
    \ fingertips must press down on the screen until the long press is recognized\n\
    - `maximumDistance` – Defines how far fingertips can move before the long press\
    \ gesture fails\n\nThe simplest `.onLongPressGesture` modifier looks like this:\n\
    \n```\n.onLongPressGesture {\n//  Code to run\n}\n```\n\nIf you want, you can\
    \ add the `minimumDuration:` and `maximumDistance:` parameters like this:\n\n\
    ```\n.onLongPressGesture(minimumDuration: 3, maximumDistance: 2) {\n//  Code to\
    \ run\n}\n```\n\nThe preceding version of the `.onLongPressGesture` modifier forces\
    \ the user to hold a press for a minimum of 3 seconds. If you want to do something\
    \ while the user presses down, you can use the `pressing:` parameter like this:\n\
    \n```\n.onLongPressGesture(minimumDuration: 2, maximumDistance: 2, pressing: {stillPressed\
    \ in\n//  Code to run while the long press occurs\n}) {\n//  Code to run after\
    \ detecting the long press gesture\n}\n```\n\nTo see how to detect a long press\
    \ gesture, follow these steps:\n\n1. Create a new SwiftUI iOS App project and\
    \ give it any name you wish such as “LongPressGesture.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add the following State variables under the\
    \ `struct ContentView: View` line:\n\n    ```\n    @State var changeMe = false\n\
    \    @State var message = \"\"\n    ```\n\n4. Add a `Text` view inside the `VStack`\
    \ like this:\n\n    ```\n    var body: some View {\n    VStack {\n    Text(message)\n\
    \    }\n    }\n    ```\n\n5. Add a `Rectangle` underneath the `Text` view:\n\n\
    \    ```\n    Rectangle()\n    .frame(width: 175, height: 125)\n    .foregroundColor(changeMe\
    \ ? .red : .yellow)\n    ```\n\n6. Add the `.onLongPressGesture` modifier to the\
    \ `Rectangle` like this:\n\n    ```\n    .onLongPressGesture(minimumDuration:\
    \ 2, maximumDistance: 2, pressing: {stillPressed in\n    message = \"Long press\
    \ in progress: \\(stillPressed)\"\n    }) {\n    changeMe.toggle()\n    }\n  \
    \  ```\n\n    The `pressing:` parameter displays `true` while the long press gesture\
    \ is in progress. Then it displays `false` as soon as the long press gesture is\
    \ completed. As soon as the long press gesture is completed, it toggles the `changeMe`\
    \ State variable from `false` to `true` (or `true` to `false`).\n\n    The entire\
    \ `ContentView` file should look like this:\n\n    ```\n    import SwiftUI\n \
    \   struct ContentView: View {\n    @State var changeMe = false\n    @State var\
    \ message = \"\"\n    var body: some View {\n    VStack {\n    Text(message)\n\
    \    Rectangle()\n    .frame(width: 175, height: 125)\n    .foregroundColor(changeMe\
    \ ? .red : .yellow)\n    .onLongPressGesture(minimumDuration: 2, maximumDistance:\
    \ 2, pressing: {stillPressed in\n    message = \"Long press in progress: \\(stillPressed)\"\
    \n    }) {\n    changeMe.toggle()\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n7. Click the Live icon in the Canvas pane.\n8. Move\
    \ the mouse pointer over the `Rectangle` and hold down the left mouse button to\
    \ simulate a press gesture. Notice that the `Text` view displays “Long press in\
    \ progress: true”.\n9. Keep holding the left mouse button down until the `Rectangle`\
    \ changes color. This indicates that the `minimumDuration` of 2 has been reached\
    \ and the long press gesture recognized.\n\n## Detecting Magnification Gestures\n\
    \nA magnification gesture (also known as a pinch gesture) occurs when the user\
    \ holds two fingertips on the screen and moves the fingertips apart or closer\
    \ together. This magnification gesture often occurs when the user wants to zoom\
    \ in on an image or zoom out to see more of something such as a larger view of\
    \ a map.\n\nSince the magnification gesture changes the size of a view, you need\
    \ to define two State variables that represent the current size and the final\
    \ size as `CGFloat` data types like this:\n\n```\n@State private var tempValue:\
    \ CGFloat = 0\n@State private var finalValue: CGFloat = 1\n```\n\nTo resize a\
    \ view, the magnification gesture needs to work with the `.scaleEffect` modifier\
    \ on the view you want to resize such as\n\n```\nImage(systemName: \"star.fill\"\
    )\n.font(.system(size: 200))\n.foregroundColor(.green)\n.scaleEffect(finalValue\
    \ + tempValue)\n```\n\nThen you need to attach the `.gesture` modifier to the\
    \ view you want to resize using the magnification gesture like this:\n\n```\n\
    .gesture(\n)\n```\n\nInside the parentheses of the `.gesture` modifier is where\
    \ you define the magnification gesture. You need to detect when the magnification\
    \ gesture changes and when it finally ends like this:\n\n```\n.gesture(\nMagnificationGesture()\n\
    .onChanged { amount in\n//  Code to run\n}\n.onEnded { amount in\n//  Code to\
    \ run\n}\n)\n```\n\nThe `.onChanged` modifier measures how far the user moves\
    \ two fingertips apart or closer together. The `.onEnded` modifier measures the\
    \ distance between the two fingertips when the user ends the magnification gesture\
    \ by lifting both fingertips off the screen.\n\nTo see how to detect a magnification\
    \ gesture, follow these steps:\n\n![](images/329781_7_En_11_Chapter/329781_7_En_11_Fig1_HTML.jpg)\n\
    \nAn illustration of a mobile phone with a star shape on the screen. The peak\
    \ and trough points of the star are indicated as simulated fingertips.\n\n**Figure\
    \ 11-1** Mimicking a two-finger press gesture in the Canvas pane\n\n1. Create\
    \ a new SwiftUI iOS App project and give it any name you wish such as “MagnificationGesture.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add the following State\
    \ variables under the `struct ContentView: View` line:\n\n    ```\n    @State\
    \ private var tempValue: CGFloat = 0\n    @State private var finalValue: CGFloat\
    \ = 1\n    ```\n\n4. Add a `VStack` with an `Image` inside the body like this:\n\
    \n    ```\n    var body: some View {\n    VStack {\n    Image(systemName: \"star.fill\"\
    )\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n    .scaleEffect(finalValue\
    \ + tempValue)\n    }\n    }\n    ```\n\n    This displays a star in an `Image`\
    \ view with a font size of 200 and filled with the color green. Notice the `.scaleEffect`\
    \ modifier defines the size of the star image as the combination of the two State\
    \ variables. A size of 1 represents the current size of the image where a smaller\
    \ value shrinks the image and a larger value expands the image.\n\n5. Add a `.gesture`\
    \ modifier to the `Image` since that’s what we want to resize using the magnification\
    \ gesture like this:\n\n    ```\n    var body: some View {\n    VStack {\n   \
    \ Image(systemName: \"star.fill\")\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n\
    \    .scaleEffect(finalValue + tempValue)\n    .gesture(\n    )\n    }\n    }\n\
    \    ```\n\n    This allows the `Image` view to recognize a gesture. Now we just\
    \ need to define which gesture to recognize.\n\n6. Add the `MagnificationGesture`\
    \ inside the `.gesture()` parentheses along with defining `.onChanged` and `.onEnded`\
    \ modifiers like this:\n\n    ```\n    var body: some View {\n    VStack {\n \
    \   Image(systemName: \"star.fill\")\n    .font(.system(size: 200))\n    .foregroundColor(.green)\n\
    \    .scaleEffect(finalValue + tempValue)\n    .gesture(\n    MagnificationGesture()\n\
    \    .onChanged { amount in\n    tempValue = amount - 1\n    }\n    .onEnded {\
    \ amount in\n    finalValue += tempValue\n    tempValue = 0\n    }\n    )\n  \
    \  }\n    }\n    ```"
