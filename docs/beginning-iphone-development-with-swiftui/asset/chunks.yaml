    \ can access the @Published property in the ObservableObject."
  trans: "\n### 在导航堆栈中的结构体之间共享数据\n\n使用 `@State` 和 `@Binding` 变量可以让多个视图共享和修改数据。但是，假设你创建了一个按顺序链接四个结构体的导航堆栈。如果你在第一个结构体中更改了数据，并想将其传递给第四个结构体，则还必须通过第二个和第三个结构体来传递该数据。\n\
    \n虽然这种方法可行，但很笨拙。更好的办法是直接将数据传递给需要数据的结构体。为此，SwiftUI 提供了另一种在结构体间共享数据的方式。首先，创建一个 `ObservableObject`\
    \ 类，其中包含一个或多个要共享的变量。每个变量都必须标记为 `@Published`，如下所示：\n\n```\nclass ShareString: ObservableObject\
    \ {\n@Published var message = \"\"\n}\n```\n\n包含 `NavigationStack` 的结构体（例如 `ContentView`）需要定义一个\
    \ `@StateObject` 变量，该变量用于定义来自 `ObservableObject` 类的对象，如下所示：\n\n```\n@StateObject\
    \ var showMe = ShareString()\n```\n\n由于我们希望在导航堆栈内的所有视图之间共享这个 `ObservableObject`，因此需要将\
    \ `.environmentObject` 修饰符与要共享的 `StateObject` 一起添加到 `NavigationStack` 上，如下所示：\n\
    \n```\nNavigationStack {\n}.environmentObject(showMe)\n```\n\n`NavigationLink`\
    \ 不再需要将数据传递给每个视图，它只需要指定要显示的视图名称即可，例如：\n\n```\nNavigationLink(destination: FileView())\
    \ {\nText(\"发送消息\")\n}\n```\n\n在需要访问 `ObservableObject` 的每个结构体中，我们需要声明一个使用 `ObservableObject`\
    \ 类的 `@EnvironmentObject` 变量，如下所示：\n\n```\n@EnvironmentObject var choice: ShareString\n\
    ```\n\n最后，在每个定义了 `@EnvironmentObject` 的结构体中，我们可以通过使用 `@EnvironmentObject` 名称加上\
    \ `@Published` 属性名称来访问要共享的实际数据，如下所示：\n\n```\n$choice.message\n```\n\n在这个例子中，`\"\
    choice\"` 是 `@EnvironmentObject` 的名称，而 `\"message\"` 是在 `ObservableObject` 中定义的\
    \ `@Published` 属性。要了解如何使用 `ObservableObject` 共享数据，请遵循以下步骤：\n\n1.  创建一个新的 SwiftUI\
    \ iOS App 项目，并为其取任意名称，例如 `\"NavigationStackObservable\"`。\n\n2.  在导航器面板中点击 `ContentView`\
    \ 文件。\n\n3.  在 `import SwiftUI` 行下方创建一个 `ObservableObject` 类，如下所示：\n\n```\n  \
    \  class ShareString: ObservableObject {\n    @Published var message = \"\"\n\
    \    }\n    ```\n\n    `@Published` 变量将包含要在导航堆栈内的结构体之间共享的数据。\n\n4.  在 `struct\
    \ ContentView: View` 行下方创建一个 `StateObject` 变量，如下所示：\n\n```\n    struct ContentView:\
    \ View {\n    @StateObject var showMe = ShareString()\n    ```\n\n    这会基于 `ShareString`\
    \ `ObservableObject` 创建一个新对象（`showMe`）。\n\n5.  在 `var body: some View` 行内部添加一个\
    \ `NavigationStack` 和一个 `VStack`，如下所示：\n\n```\n    var body: some View {\n   \
    \ NavigationStack {\n    VStack (spacing: 26) {\n    }\n    }\n    ```\n\n6. \
    \ 在 `VStack` 内部添加一个 `Text` 视图、两个 `NavigationLink` 以及一个 `.navigationTitle` 修饰符，如下所示：\n\
    \n```\n    NavigationStack {\n    VStack (spacing: 26) {\n    TextField(\"在此输入\"\
    , text: $showMe.message)\n    NavigationLink(destination: FileView()) {\n    Text(\"\
    发送消息\")\n    }\n    NavigationLink(destination: SeparateFileView()) {\n    Text(\"\
    单独文件\")\n    }\n    .navigationTitle(\"共享数据\")\n    }\n    }.environmentObject(showMe)\n\
    \    ```\n\n    请确保在 `NavigationStack` 末尾添加 `.environmentObject(showMe)` 修饰符。这样允许共享\
    \ `showMe` 这个 `ObservableObject` `ShareString` 类。前面的 `NavigationLink` 将打开我们需要创建的结构体，名为\
    \ `FileView` 和 `SeparateFileView`。\n\n7.  在 `struct ContentView` 结构体下方添加以下结构体，如下所示：\n\
    \n```\n    struct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
    \    var body: some View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n\
    \    TextField(\"在此输入:\", text: $choice.message)\n    Spacer()\n    }\n    Spacer()\n\
    \    }.background(Color.yellow)\n    }\n    }\n    ```\n\n    注意，这个结构体定义了一个 `@EnvironmentObject`\
    \ 变量，它可以持有一个 `ShareString` `ObservableObject`。在 `TextField` 中，我们必须将文本存储在 `\"choice\"\
    ` 这个 `@EnvironmentObject` 中，该对象使用了 `\"message\"` 这个 `@Published` 属性（`$choice.message`）。完整的\
    \ `ContentView` 文件应该如下所示：\n\n```\n    import SwiftUI\n    class ShareString: ObservableObject\
    \ {\n    @Published var message = \"\"\n    }\n    struct ContentView: View {\n\
    \    @StateObject var showMe = ShareString()\n    var body: some View {\n    NavigationStack\
    \ {\n    VStack (spacing: 26) {\n    TextField(\"在此输入\", text: $showMe.message)\n\
    \    NavigationLink(destination: FileView()) {\n    Text(\"发送消息\")\n    }\n  \
    \  NavigationLink(destination: SeparateFileView()) {\n    Text(\"单独文件\")\n   \
    \ }\n    .navigationTitle(\"共享数据\")\n    }\n    }.environmentObject(showMe)\n\
    \    }\n    }\n    struct FileView: View {\n    @EnvironmentObject var choice:\
    \ ShareString\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack\
    \ {\n    Spacer()\n    TextField(\"在此输入:\", text: $choice.message)\n    Spacer()\n\
    \    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n    struct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n    ContentView()\n    }\n    }\n    ```\n\n8.  选择 文件 ➤ 新建 ➤ 文件。会弹出一个对话框（见图\
    \ 17-4）。\n\n9.  在对话框顶部附近点击 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode 会要求你为新创建的文件命名。\n\
    \n10.  输入 `SeparateFile` 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。\n\n11.  删除 `SeparateFile`\
    \ 中当前的所有代码，并将其替换为以下内容：\n\n```\n    import SwiftUI\n    struct SeparateFileView:\
    \ View {\n    @EnvironmentObject var passedData: ShareString\n    var body: some\
    \ View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
    在此输入\", text: $passedData.message)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.orange)\n\
    \    }\n    }\n    struct SeparateFileView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    SeparateFileView()\n    }\n    }\n    ```\n\n\
    \    注意，这个结构体也声明了一个 `@EnvironmentObject`，它可以持有一个 `ShareString` `ObservableObject`。然后，`TextField`\
    \ 使用 `\"passedData\"` 这个 `@EnvironmentObject` 来访问 `\"message\"` 这个 `@Published`\
    \ 属性（`$passedData.message`）。\n\n12.  在导航器面板中点击 `ContentView` 文件。\n\n13.  在画布面板中点击\
    \ **Live** 图标。\n\n14.  在 `TextField` 中点击并输入一个短语。\n\n15.  点击 `\"发送消息\"` 导航链接以打开\
    \ `FileView` 结构体。注意，你在步骤 14 中输入的文本现在显示在 `FileView` 的 `TextField` 中。\n\n16.  编辑\
    \ `TextField` 中的文本，然后点击 **返回** 按钮。注意，修改后的文本现在显示在 `ContentView` 的 `TextField` 中。\n\
    \n17.  编辑 `TextField` 中的文本，然后点击 `\"单独文件\"` 导航链接。编辑后的文本现在显示在 `SeparateFileView`\
    \ 的 `TextField` 中。\n\n18.  编辑 `TextField` 中的文本，然后点击 **返回** 按钮。注意，修改后的文本现在显示在 `ContentView`\
    \ 的 `TextField` 中。所有这些展示了不同的结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n"
- fmt: "# Using Lists in a Navigation Stack\n\nRather than display `NavigationLink`s\
    \ individually, one common technique is to create a `List` (see Chapter [13](#329781_7_En_13_Chapter.xhtml))\
    \ where each item in the `List` acts like a link. By selecting an item in a `List`,\
    \ the Navigation Stack can then open a new view. This combination of lists within\
    \ a Navigation Stack is commonly used in the Settings app on iOS.\n\nWhen we created\
    \ navigation links in previous projects, we defined the text to appear on the\
    \ link along with the destination view to display like this:\n\n```\nNavigationLink\
    \ {\n    Text(\"Destination view\")\n} label: {\n    Text(\"Text to appear on\
    \ link\")\n}\n```\n\nHowever, when working with lists, it can be more convenient\
    \ to separate the destination view from the navigation link. That way the navigation\
    \ link simply defines its appearance. Then to define the destination view, we\
    \ can use a `navigationDestination` modifier that defines what to display when\
    \ the user selects a navigation link.\n\nTo see how to use a `List` within a `NavigationStack`,\
    \ follow these steps:\n\n![](images/329781_7_En_17_Chapter/329781_7_En_17_Fig5_HTML.jpg)\n\
    \nA text displays a book list with titles including Fahrenheit 451, The Martian\
    \ chronicles, something wicked this way comes, and the illustrated man. The last\
    \ entry appears to be represented by a non-English character.\n\nFigure 17-5 —\
    \ A List of navigation links\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “NavigationStackList.”\n\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n\n3.  Add the following structure under the `import\
    \ SwiftUI` line like this:\n\n```\nstruct Books: Identifiable, Hashable {\n  \
    \  var id = UUID()\n    var title: String\n    var summary: String\n}\n```\n\n\
    Notice that this structure needs to be `Identifiable` to create a unique ID, and\
    \ it must be `Hashable` so it can be used in the `.navigationDestination` modifier\
    \ that will define the view to open after the user selects a navigation link.\n\
    \n4.  Add an array of structures underneath the `struct ContentView: View` line\
    \ like this:\n\n```\nlet books: [Books] = [\n    Books(title: \"Fahrenheit 451\"\
    , summary: \"Dystopian novel about book burning\"),\n    Books(title: \"The Martian\
    \ Chronicles\", summary: \"Tales about the colonization of Mars\"),\n    Books(title:\
    \ \"Something Wicked This Way Comes\", summary: \"A sinister circus comes to town\"\
    ),\n    Books(title: \"The Illustrated Man\", summary: \"Short stories revolving\
    \ around a tattooed man\")\n]\n```\n\n5.  Add the following structure above the\
    \ `struct ContentView_Previews: PreviewProvider` line like this:\n\n```\nstruct\
    \ BookView: View {\n    var bookInfo: Books\n    var body: some View {\n     \
    \   VStack (spacing: 24) {\n            Text(\"\\(bookInfo.title)\")\n       \
    \         .font(.largeTitle)\n            Text(\"\\(bookInfo.summary)\")\n   \
    \             .font(.body)\n        }\n    }\n}\n```\n\nThis structure defines\
    \ the view (user interface) that appears after the user selects a navigation link.\
    \ It needs to retrieve data from the previously defined `Books` structure. Then\
    \ it retrieves the `title` and `summary` to display within two `Text` views inside\
    \ of a `VStack`.\n\n6.  Add a `NavigationStack`, `List`, and `NavigationLink`\
    \ inside the `var body: some View` like this:\n\n```\nvar body: some View {\n\
    \    NavigationStack {\n        List(books) { book in\n            NavigationLink(\"\
    \\(book.title)\", value: book)\n        }.navigationTitle(Text(\"Book List\"))\n\
    \        .navigationDestination(for: Books.self) { x in\n            BookView(bookInfo:\
    \ x)\n        }\n    }\n}\n```\n\nThe `List` retrieves the `books` array. Then\
    \ it creates an arbitrarily named variable called “book” that it uses to display\
    \ the `book.title` as a navigation link. Notice that the navigation link also\
    \ defines a value (`book`), which is unique to each navigation link displayed.\n\
    \nThe entire `ContentView` file should look like this:\n\n```\nimport SwiftUI\n\
    struct Books: Identifiable, Hashable {\n    var id = UUID()\n    var title: String\n\
    \    var summary: String\n}\nstruct ContentView: View {\n    let books: [Books]\
    \ = [\n        Books(title: \"Fahrenheit 451\", summary: \"Dystopian novel about\
    \ book burning\"),\n        Books(title: \"The Martian Chronicles\", summary:\
    \ \"Tales about the colonization of Mars\"),\n        Books(title: \"Something\
    \ Wicked This Way Comes\", summary: \"A sinister circus comes to town\"),\n  \
    \      Books(title: \"The Illustrated Man\", summary: \"Short stories revolving\
    \ around a tattooed man\")\n    ]\n    var body: some View {\n        NavigationStack\
    \ {\n            List(books) { book in\n                NavigationLink(\"\\(book.title)\"\
    , value: book)\n            }.navigationTitle(Text(\"Book List\"))\n         \
    \   .navigationDestination(for: Books.self) { x in\n                BookView(bookInfo:\
    \ x)\n            }\n        }\n    }\n}\nstruct BookView: View {\n    var bookInfo:\
    \ Books\n    var body: some View {\n        VStack (spacing: 24) {\n         \
    \   Text(\"\\(bookInfo.title)\")\n                .font(.largeTitle)\n       \
    \     Text(\"\\(bookInfo.summary)\")\n                .font(.body)\n        }\n\
    \    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n7.  Click the Live icon\
    \ in the Canvas pane. Notice that the `List` displays book titles as navigation\
    \ links as shown in Figure [17-5](#329781_7_En_17_Chapter.xhtml#Fig5).\n\n![](images/329781_7_En_17_Chapter/329781_7_En_17_Fig6_HTML.jpg)\n\
    \nA screen displays a book list, with the Martian Chronicles included, which features\
    \ tales about the colonization of Mars.\n\nFigure 17-6 — The user interface that\
    \ appears after selecting a navigation link\n\n1.  Click any book title (navigation\
    \ link). The user interface defined by the struct `BookView` appears with a Back\
    \ button in the upper-left corner as shown in Figure [17-6](#329781_7_En_17_Chapter.xhtml#Fig6).\n\
    \nLists can be a convenient way to create navigation links within a Navigation\
    \ Stack. Since lists typically rely on arrays for data, you’ll likely need to\
    \ create a structure to store in an array.\n\n## Summary\n\nA Navigation Stack\
    \ is a handy way to display multiple views. One structure defines a Navigation\
    \ Stack with one or more `NavigationLink`s. These `NavigationLink`s open views\
    \ that can be as simple as `Text` or `Image` views, but more often are views defined\
    \ by structures. These structures can be stored in the same file or in a separate\
    \ file.\n\nA `NavigationLink` can pass data to another view, much like passing\
    \ data to a function. This other view needs to define a property, and then the\
    \ `NavigationLink` can pass data to that property. If you want to pass data to\
    \ another view that can modify the data, you can use two different methods.\n\n\
    The first method uses `@State` and `@Binding` variables and forces the `NavigationLink`\
    \ to pass data to each view that it opens. The second method uses `ObservableObject`s,\
    \ `StateObject`s, and `EnvironmentObject`s to share data among multiple views.\n\
    \nNavigation stacks are often used with lists. By tapping an item in a `List`,\
    \ users can jump to a new view. Lists typically retrieve data stored in an array.\
    \ That array can store individual data types like strings, but more often the\
    \ array stores structures to group related data together. Items in a `List` can\
    \ naturally create navigation links to another view such as items found in the\
    \ Settings app in iOS.\n\nWhen creating a Navigation Stack with a `List`, it’s\
    \ often easier to use navigation links to define the link and then use the `.navigationDestination`\
    \ modifier to define the destination view to display. Navigation stacks make it\
    \ easy to display successive screens of data."
