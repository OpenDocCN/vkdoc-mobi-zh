  trans: "\n修饰符的顺序会影响最终效果\n\n无论使用哪种方法添加修饰符，Xcode 都会保持所有内容同步。因此，若你在编辑器面板中键入修饰符，更改会自动出现在检查器面板中。同样，若你在检查器面板中选择一个修饰符，Xcode\
    \ 会自动将该修饰符添加到编辑器面板的 Swift 代码中。\n\n要了解如何更改用户界面项目的外观，请按以下步骤操作：\n\n![](img/329781_7_En_2_Fig13_HTML.jpg)\n\
    \n屏幕显示一段文本，内容为\"这是一条秘密消息\"，并附带多种修饰符选项，如辅助功能、标签、字体、字重、颜色、对齐方式、行数限制、内边距等。\n\n图 2-13\n\
    \n`Font`弹出菜单显示了不同的字体选项\n\n1.  确保上一节中的 `SwiftExample` 项目已加载到 Xcode 中。`ContentView`\
    \ 文件应包含一个 `Toggle` 和一个位于其下方的 `Text` 视图。\n\n2.  点击画布面板底部的\"可选中\"图标。这样你就可以通过在画布面板中直接点击来选中视图。\n\
    \n3.  点击画布面板中的 `Toggle`，或者将光标移动到编辑器面板中的 `Toggle` 上。Xcode 会在 Xcode 窗口右侧显示检查器面板，其中列出了可用来更改\
    \ `Toggle` 外观的修饰符。\n\n4.  点击画布面板中显示\"这是一条秘密消息！\"的 `Text` 视图，或者将光标移动到编辑器面板中的 `Text`\
    \ 视图上。注意，检查器面板会显示用于更改 `Text` 视图外观的修饰符。\n\n5.  点击 `Font` 弹出菜单。会弹出如图 2-13 所示的不同字体选项列表。\n\
    \n![](img/329781_7_En_2_Fig14_HTML.jpg)\n\n屏幕显示包含多种修饰符的内容视图，包括预览设置、设备布局、方向、配色方案、辅助功能、内边距、秘密消息的切换开关、框架大小调整，以及添加宽度和高度等额外修饰符的选项。\n\
    \n图 2-14\n\nSwiftUI 会自动适配不同尺寸屏幕的用户界面\n\n1.  选择 `Large Title`。注意，Xcode 会自动在 `ContentView`\
    \ 文件中添加 `.font(.largeTitle)` 命令，如下所示：\n\n    ```\n    Text (\"这是一条秘密消息！\")\n \
    \   .font(.largeTitle)\n    ```\n\n2.  点击 `Weight` 弹出菜单，选择 `Semibold`。\n\n3. \
    \ 点击 `Color` 弹出菜单，选择 `Red`。注意，每次选择修饰符时，Xcode 都会自动将对应的 Swift 代码添加到你的 `.swift` 文件中，如下所示：\n\
    \n    ```\n    Text (\"这是一条秘密消息！\")\n    .font(.largeTitle)\n    .fontWeight(.semibold)\n\
    \    .foregroundColor(Color.red)\n    ```\n\n4.  将光标移动到 `ContentView_Previews:\
    \ PreviewProvider` 结构体中的 `ContentView()` 内部。\n\n5.  点击检查器面板中的 `Device` 弹出菜单。\n\
    \n6.  选择一个 iPad 型号。注意，画布面板会随之变化，模拟出 iPad 的外观。同时留意 SwiftUI 如何自动修改你的用户界面外观，使其在不同尺寸的屏幕上正确显示，如图\
    \ 2-14 所示。（Xcode 可能需要一些时间才能将画布面板切换为显示不同的 iOS 设备，请耐心等待。）\n\n1.  再次点击 `Device` 弹出菜单，选择一个\
    \ iPhone 型号，例如 iPhone 11。画布随即会改变，模拟出你选择的 iPhone 型号。\n\nSwiftUI 的基本理念是让你设计用户界面，并让\
    \ Xcode 自动调整其外观以适应不同的 iOS 屏幕尺寸。无需编写大量 Swift 代码来设计用户界面，SwiftUI 让你只需编写最少的 Swift\
    \ 代码就能完成界面设计，这样你就可以将精力集中在编写 Swift 代码上，让你的应用实现独特的功能。\n\n## 总结\n\n每个应用都需要一个用户界面。使用\
    \ SwiftUI，你只需定义所需的用户界面元素，SwiftUI 会负责确保你的用户界面在不同尺寸的 iOS 屏幕上都能正常工作并呈现正确的外观。\n\n\
    你可以通过编程方式（编写 Swift 代码）或可视化方式（从库窗口拖放用户界面项目）来设计用户界面。程序员通常结合使用这两种方法来设计界面。将项目（按钮、标签、文本字段等）添加到用户界面后，你可以通过代码或使用检查器面板中的修饰符来自定义这些项目。\n\
    \n设计并自定义用户界面外观后，可以通过两种方式进行测试。首先，你可以在模拟器程序中运行你的应用，该程序可以模拟不同的 iOS 设备，如 iPhone 或\
    \ iPad。其次，你可以使用实时预览功能，在画布面板中与你的用户界面进行交互。\n\n用户界面代表了用户所看到的内容，因此无论用户在何种 iOS 设备上运行你的应用，确保用户界面始终美观至关重要。既然你已经了解了用户界面的基本工作原理，那么是时候开始学习特定用户界面元素（如按钮、选择器和滑块）的细节了。\n\
    \n# 3. 在用户界面上放置视图\n\n当你在用户界面上放置单个视图时，无论屏幕是小尺寸的 iPhone 还是大得多的 iPad，SwiftUI 都会将其居中显示。随着你在用户界面中添加更多视图，SwiftUI\
    \ 会根据你是将它们排列在垂直堆栈还是水平堆栈中，简单地将这些视图上下堆叠或并排显示。然而，你在用户界面上添加的视图越多，相邻的视图就会显得越拥挤。为了解决这个问题，SwiftUI\
    \ 提供了几种在用户界面上放置视图的方法：\n\n*   使用 `padding` 修饰符。\n\n*   在堆栈内定义间距。\n\n*   在视图之间使用间隔器。\n\
    \n*   定义偏移量或位置坐标。\n\n你可以使用这些方法中的一种或多种来在用户界面上排列视图，使其精确显示在你想要的位置。最重要的是，这些定位方法适用于\
    \ SwiftUI 中的所有用户界面视图。"
- fmt: "# Using the Padding Modifier\n\nThe padding modifier adds space around a user\
    \ interface view. By default, the padding modifier adds space around the top,\
    \ bottom, leading (left), and trailing (right) sides of a view. To use the padding\
    \ modifier, just add the following after any view:\n\n```\n.padding()\n```\n\n\
    Padding serves two purposes. First, it adds space around a view, which changes\
    \ the background to which you can add color to make the view larger and easier\
    \ to see. Second, the padding modifier pushes neighboring views further away to\
    \ make neighboring views easier to see and eliminate crowding.\n\nThe simplest\
    \ padding modifier adds 16 points of spacing on all four sides of a view. If you\
    \ add a number, you can define the precise spacing you want such as `.padding(45)`\
    \ or `.padding(3)` as shown in Figure [3-1](#329781_7_En_3_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig1_HTML.jpg)\n\nA code and\
    \ a diagram depict different spacing for padding modifiers. The first one is the\
    \ default padding of 16 points, the second is a thick padding of 45 points, and\
    \ the third is a thin padding of points.\n\n**Figure 3-1** Defining different\
    \ spacing for the padding modifier\n\nNotice that the padding modifier adds space\
    \ around all sides. If you want, you can define spacing to occur in one or more\
    \ specific areas as shown in Figure [3-2](#329781_7_En_3_Chapter.xhtml#Fig2):\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig2_HTML.jpg)\n\nA code and\
    \ a block diagram depict different spacing for padding around different areas.\
    \ It lists the types of padding such as top padding only, bottom padding only,\
    \ vertical padding, leading padding only, trailing padding only, and horizontal\
    \ padding.\n\n**Figure 3-2** Defining padding around certain areas\n\n- `.top`\n\
    - `.bottom`\n- `.vertical` (top and bottom)\n- `.leading` (left)\n- `.trailing`\
    \ (right)\n- `.horizontal` (trailing and leading)\n\nIf you don’t add a specific\
    \ value, SwiftUI uses the default 16-point spacing. To define both an area to\
    \ add padding and a specific spacing, you must define the area to add padding\
    \ first, followed by a specific value, such as:\n\n```\n.padding(.top, 30)\n```\n\
    \nIf you want to add spacing to two or three areas, you can define those areas\
    \ in square brackets followed by an optional spacing value like this:\n\n```\n\
    .padding([.top, .leading])\n.padding([.top, .leading], 30)\n```\n\nThis lets you\
    \ define two areas to add spacing as shown in Figure [3-3](#329781_7_En_3_Chapter.xhtml#Fig3).\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig3_HTML.jpg)\n\nA code and\
    \ a block diagram depict different spacing for padding around different areas.\
    \ It lists the types of padding such as top and leading, top and trailing, bottom\
    \ and leading, and bottom and trailing.\n\n**Figure 3-3** Defining padding around\
    \ two areas\n\nYou can also add padding around three areas with an optional spacing\
    \ value as shown in Figure [3-4](#329781_7_En_3_Chapter.xhtml#Fig4).\n\n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig4_HTML.jpg)\n\
    \nA code and illustration depict different spacing for padding around different\
    \ areas. It lists the areas of padding such as top, leading, and bottom, top trailing\
    \ and bottom, bottom, leading, and trailing and leading, trailing, and top.\n\n\
    **Figure 3-4** Defining padding around three areas\n\nRather than use a fixed\
    \ numeric value to define a padding’s spacing, you can also use a variable that\
    \ represents a numeric value like this:\n\n```\nvar distanceSize = 15.0\n```\n\
    \nThen you can use this `CGFloat` variable to define a padding size like this:\n\
    \n```\n.padding(CGFloat(distanceSize))\n```\n\nNotice that the `.padding` modifier\
    \ specifically converts any numeric value into a `CGFloat` data type. By using\
    \ a numeric variable to define spacing within a `.padding` modifier, code can\
    \ change the value of this variable to change the `.padding` modifier’s spacing.\n\
    \n# Defining Spacing Within a Stack\n\nThe `.padding()` modifier can be handy\
    \ to space different views apart. Without padding, multiple views can appear squashed\
    \ and crowded together within a stack. By adding padding to each view within a\
    \ stack, you can separate them so each view is easier to see as shown in Figure\
    \ [3-5](#329781_7_En_3_Chapter.xhtml#Fig5).\n\n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig5_HTML.jpg)\n\
    \nTwo codes and illustrations depict no padding and padding around different areas.\
    \ It lists the areas of padding such as the top text view, middle text view, and\
    \ bottom text view.\n\n**Figure 3-5** Padding separates views within a stack\n\
    \nWhile padding can make each view easier to see, you may want more control over\
    \ the spacing between views within a stack. To do that, you can define a spacing\
    \ value when you define a stack such as:\n\n```\nVStack(spacing: 40) {\n}\n```\n\
    \nWithin a stack, spacing pushes views apart a fixed distance as shown in Figure\
    \ [3-6](#329781_7_En_3_Chapter.xhtml#Fig6).\n\n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig6_HTML.jpg)\n\
    \nTwo codes and illustrations depict no spacing and spacing around different areas.\
    \ It lists the areas of spacing such as the top text view, middle text view, and\
    \ bottom text view.\n\n**Figure 3-6** Spacing creates a fixed distance between\
    \ all views in a stack\n\n# Aligning Views Within a Stack\n\nWhen you create a\
    \ stack (`VStack` or `HStack`), you have the option of defining alignment whether\
    \ you define spacing or not, such as:\n\n```\nVStack(alignment: .leading)\nVStack(alignment:\
    \ .leading, spacing: 24)\n```\n\nNote\n\n> If you define both alignment and spacing\
    \ in a stack, you must define alignment first and spacing second.\n\nWith `VStack`s,\
    \ you have three ways to align views as shown in Figure [3-7](#329781_7_En_3_Chapter.xhtml#Fig7):\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig7_HTML.jpg)\n\nThree illustrations\
    \ of alignment of views in V Stacks. It depicts leading, center, and trailing\
    \ view alignments of the top text view, middle text view, and bottom text view.\n\
    \n**Figure 3-7** Three ways to align views in a `VStack`\n\n- `.leading` (left)\n\
    - `.center` (default setting if no other alignment options are chosen)\n- `.trailing`\
    \ (right)\n\nThe following Swift code defines `.leading` alignment for a `VStack`:\n\
    \n```\nVStack(alignment: .leading) {\n    Text(\"Top\")\n        .background(Color.yellow)\n\
    \    Text(\"Middle Text View\")\n        .background(Color.yellow)\n    Text(\"\
    Bottom\")\n        .background(Color.yellow)\n}\n```\n\nWith `HStack`s, you have\
    \ five different ways to align views as shown in Figure [3-8](#329781_7_En_3_Chapter.xhtml#Fig8):\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig8_HTML.jpg)\n\nThree illustrations\
    \ of alignment of views in H Stack. It depicts top, bottom, and center view alignments\
    \ of the top text view, middle text view, and bottom text view.\n\n**Figure 3-8**\
    \ Aligning views in an `HStack`\n\n- `.top`\n- `.bottom`\n- `.center` (default\
    \ setting if no other alignment options are chosen)\n- `.firstTextBaseline`\n\
    - `.lastTextBaseline`\n\nThe following Swift code defines `.bottom` alignment\
    \ for an `HStack`:\n\n```\nHStack(alignment: .bottom) {\n    Text(\"Top\")\n \
    \       .font(.system(size: 40))\n        .background(Color.yellow)\n    Text(\"\
    Middle Text View\")\n        .background(Color.yellow)\n    Text(\"Bottom\")\n\
    \        .font(.largeTitle)\n        .background(Color.yellow)\n}\n```\n\nThe\
    \ `.top`, `.bottom`, and `.center` alignment options work with all types of user\
    \ interface views. However, if you’re specifically working with `Text` views,\
    \ SwiftUI offers two additional ways to align `Text` views based on the baseline.\
    \ You can align text based on the first view (`.firstTextBaseline`) or the last\
    \ view (`.lastTextBaseline`) as shown in Figure [3-9](#329781_7_En_3_Chapter.xhtml#Fig9).\n\
    \n![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig9_HTML.jpg)\n\nAn illustration\
    \ of alignment of views in H Stack. It depicts the alignments of the top text\
    \ view, middle text view, and bottom text view. The text on the right reads, baseline.\n\
    \n**Figure 3-9** Aligning text in an `HStack`"
  raw: '## Using the Padding Modifier


    The padding modifier adds space around a user interface view. By default, the
    padding modifier adds space around the top, bottom, leading (left), and trailing
    (right) sides of a view. To use the padding modifier, just add the following after
    any view:


    ```

    .padding()

    ```


    Padding serves two purposes. First, it adds space around a view, which changes
    the background to which you can add color to make the view larger and easier to
    see. Second, the padding modifier pushes neighboring views further away to make
    neighboring views easier to see and eliminate crowding.


    The simplest padding modifier adds 16 points of spacing on all four sides of a
    view. If you add a number, you can define the precise spacing you want such as
    .padding(45) or .padding (3) as shown in Figure [3-1](#329781_7_En_3_Chapter.xhtml#Fig1).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig1_HTML.jpg)


    A code and a diagram depict different spacing for padding modifiers. The first
    one is the default padding of 16 points, the second is a thick padding of 45 points,
    and the third is a thin padding of points.


    Figure 3-1


    Defining different spacing for the padding modifier


    Notice that the padding modifier adds space around all sides. If you want, you
    can define spacing to occur in one or more specific areas as shown in Figure [3-2](#329781_7_En_3_Chapter.xhtml#Fig2):


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig2_HTML.jpg)


    A code and a block diagram depict different spacing for padding around different
    areas. It lists the types of padding such as top padding only, bottom padding
    only, vertical padding, leading padding only, trailing padding only, and horizontal
    padding.


    Figure 3-2


    Defining padding around certain areas


    *   .top


    *   .bottom


    *   .vertical (top and bottom)


    *   .leading (left)


    *   .trailing (right)


    *   .horizontal (trailing and leading)


    If you don’t add a specific value, SwiftUI uses the default 16-point spacing.
    To define both an area to add padding and a specific spacing, you must define
    the area to add padding first, followed by a specific value, such as


    ```

    .padding(.top, 30)

    ```


    If you want to add spacing to two or three areas, you can define those areas in
    square brackets followed by an optional spacing value like this:


    ```

    .padding([.top, .leading])

    .padding([.top, .leading] , 30)

    ```


    This lets you define two areas to add spacing as shown in Figure [3-3](#329781_7_En_3_Chapter.xhtml#Fig3).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig3_HTML.jpg)


    A code and a block diagram depict different spacing for padding around different
    areas. It lists the types of padding such as top and leading, top and trailing,
    bottom and leading, and bottom and trailing.


    Figure 3-3


    Defining padding around two areas


    You can also add padding around three areas with an optional spacing value as
    shown in Figure [3-4](#329781_7_En_3_Chapter.xhtml#Fig4).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig4_HTML.jpg)


    A code and illustration depict different spacing for padding around different
    areas. It lists the areas of padding such as top, leading, and bottom, top trailing
    and bottom, bottom, leading, and trailing and leading, trailing, and top.


    Figure 3-4


    Defining padding around three areas


    Rather than use a fixed numeric value to define a padding’s spacing, you can also
    use a variable that represents a numeric value like this:


    ```

    var distanceSize = 15.0

    ```


    Then you can use this CGFloat variable to define a padding size like this:


    ```

    .padding(CGFloat(distanceSize))

    ```


    Notice that the .padding modifier specifically converts any numeric value into
    a CGFloat data type. By using a numeric variable to define spacing within a .padding
    modifier, code can change the value of this variable to change the .padding modifier’s
    spacing.


    ## Defining Spacing Within a Stack


    The .padding() modifier can be handy to space different views apart. Without padding,
    multiple views can appear squashed and crowded together within a stack. By adding
    padding to each view within a stack, you can separate them so each view is easier
    to see as shown in Figure [3-5](#329781_7_En_3_Chapter.xhtml#Fig5).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig5_HTML.jpg)


    Two codes and illustrations depict no padding and padding around different areas.
    It lists the areas of padding such as the top text view, middle text view, and
    bottom text view.


    Figure 3-5


    Padding separates views within a stack


    While padding can make each view easier to see, you may want more control over
    the spacing between views within a stack. To do that, you can define a spacing
    value when you define a stack such as


    ```

    VStack (spacing: 40) {

    }

    ```


    Within a stack, spacing pushes views apart a fixed distance as shown in Figure
    [3-6](#329781_7_En_3_Chapter.xhtml#Fig6).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig6_HTML.jpg)


    Two codes and illustrations depict no spacing and spacing around different areas.
    It lists the areas of spacing such as the top text view, middle text view, and
    bottom text view.


    Figure 3-6


    Spacing creates a fixed distance between all views in a stack


    ## Aligning Views Within a Stack


    When you create a stack (VStack or HStack), you have the option of defining alignment
    whether you define spacing or not such as


    ```

    VStack (alignment: .leading)

    VStack (alignment: .leading, spacing: 24)

    ```


    Note


    If you define both alignment and spacing in a stack, you must define alignment
    first and spacing second.


    With VStacks, you have three ways to align views as shown in Figure [3-7](#329781_7_En_3_Chapter.xhtml#Fig7):


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig7_HTML.jpg)


    Three illustrations of alignment of views in V Stacks. It depicts leading, center,
    and trailing view alignments of the top text view, middle text view, and bottom
    text view.


    Figure 3-7


    Three ways to align views in a VStack


    *   .leading (left)


    *   .center (default setting if no other alignment options are chosen)


    *   .trailing (right)


    The following Swift code defines .leading alignment for a VStack:


    ```

    VStack (alignment: .leading){

    Text ("Top")

    .background(Color.yellow)

    Text ("Middle Text View")

    .background(Color.yellow)

    Text ("Bottom")

    .background(Color.yellow)

    }

    ```


    With HStacks, you have five different ways to align views as shown in Figure [3-8](#329781_7_En_3_Chapter.xhtml#Fig8):


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig8_HTML.jpg)


    Three illustrations of alignment of views in H Stack. It depicts top, bottom,
    and center view alignments of the top text view, middle text view, and bottom
    text view.


    Figure 3-8


    Aligning views in an HStack


    *   .top


    *   .bottom


    *   .center (default setting if no other alignment options are chosen)


    *   .firstTextBaseline


    *   .lastTextBaseline


    The following Swift code defines .bottom alignment for an HStack:


    ```

    HStack (alignment: .bottom){

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Text ("Middle Text View")

    .background(Color.yellow)

    Text ("Bottom")

    .font(.largeTitle)

    .background(Color.yellow)

    }

    ```


    The .top, .bottom, and .center alignment options work with all types of user interface
    views. However, if you’re specifically working with Text views, SwiftUI offers
    two additional ways to align Text views based on the baseline. You can align text
    based on the first view (.firstTextBaseline) or the last view (.lastTextBaseline)
    as shown in Figure [3-9](#329781_7_En_3_Chapter.xhtml#Fig9).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig9_HTML.jpg)


    An illustration of alignment of views in H Stack. It depicts the alignments of
    the top text view, middle text view, and bottom text view. The text on the right
    reads, baseline.


    Figure 3-9


    Aligning text in an HStack'
  trans: "\n# 使用填充修饰符\n\n填充修饰符可以在用户界面视图周围添加空间。默认情况下，填充修饰符会在视图的顶部、底部、前导（左侧）和尾部（右侧）添加空间。要使用填充修饰符，只需在任何视图后添加以下代码：\n\
    \n```\n.padding()\n```\n\n填充有两个作用。首先，它在视图周围添加空间，这会改变背景，你可以为其添加颜色，使视图更大、更容易看到。其次，填充修饰符会将相邻视图推开得更远，使相邻视图更容易看清并消除拥挤感。\n\
    \n最简单的填充修饰符会在视图的四边各添加 16 点的间距。如果你添加一个数字，则可以定义所需的精确间距，例如 `.padding(45)` 或 `.padding(3)`，如图\
    \ 3-1 所示。\n\n![](img/329781_7_En_3_Fig1_HTML.jpg)\n\n一段代码和示意图展示了填充修饰符的不同间距。第一个是默认的\
    \ 16 点填充，第二个是 45 点的厚填充，第三个是薄填充。\n\n**图 3-1** 为填充修饰符定义不同的间距\n\n请注意，填充修饰符会为所有边添加空间。如果需要，你可以将间距定义在单个或多个特定区域，如图\
    \ 3-2 所示：\n\n![](img/329781_7_En_3_Fig2_HTML.jpg)\n\n一段代码和框图展示了不同区域填充的不同间距。它列出了填充类型，例如仅顶部填充、仅底部填充、垂直填充、仅前导填充、仅尾部填充和水平填充。\n\
    \n**图 3-2** 在特定区域定义填充\n\n- `.top`\n- `.bottom`\n- `.vertical`（顶部和底部）\n- `.leading`（左侧）\n\
    - `.trailing`（右侧）\n- `.horizontal`（尾部和前导）\n\n如果你没有添加具体的数值，SwiftUI 会默认使用 16 点的间距。要同时定义填充区域和具体间距，你必须先定义填充区域，接着指定具体数值，例如：\n\
    \n```\n.padding(.top, 30)\n```\n\n如果你想在两个或三个区域添加间距，你可以将这些区域定义在方括号内，后面跟上可选的间距值，就像这样：\n\
    \n```\n.padding([.top, .leading])\n.padding([.top, .leading], 30)\n```\n\n这样你就能定义两个区域来添加间距，如图\
    \ 3-3 所示。\n\n![](img/329781_7_En_3_Fig3_HTML.jpg)\n\n一段代码和框图展示了不同区域填充的不同间距。它列出了填充类型，例如顶部和前导、顶部和尾部、底部和前导、底部和尾部。\n\
    \n**图 3-3** 在两个区域定义填充\n\n你也可以在三个区域添加填充，并附带可选的间距值，如图 3-4 所示。\n\n![](img/329781_7_En_3_Fig4_HTML.jpg)\n\
    \n一段代码和插图展示了不同区域填充的不同间距。它列出了填充区域，例如顶部、前导和底部；顶部、尾部和底部；底部、前导和尾部；以及前导、尾部和顶部。\n\n\
    **图 3-4** 在三个区域定义填充\n\n除了使用固定的数值来定义填充间距，你也可以使用代表数值的变量，像这样：\n\n```\nvar distanceSize\
    \ = 15.0\n```\n\n然后你可以使用这个 `CGFloat` 变量来定义填充大小，像这样：\n\n```\n.padding(CGFloat(distanceSize))\n\
    ```\n\n请注意，`.padding` 修饰符会将任何数值专门转换为 `CGFloat` 数据类型。通过在 `.padding` 修饰符中使用数值变量来定义间距，代码可以通过更改此变量的值来改变\
    \ `.padding` 修饰符的间距。\n\n# 在堆栈内定义间距\n\n`.padding()` 修饰符可以方便地将不同的视图隔开。没有填充时，堆栈内的多个视图可能会显得拥挤和挤压在一起。通过给堆栈内的每个视图添加填充，你可以将它们分隔开，使每个视图更容易看清，如图\
    \ 3-5 所示。\n\n![](img/329781_7_En_3_Fig5_HTML.jpg)\n\n两段代码和插图展示了无填充状态和不同区域的填充状态。它列出了填充区域，例如顶部文本视图、中间文本视图和底部文本视图。\n\
    \n**图 3-5** 填充分隔了堆栈内的视图\n\n虽然填充能让每个视图更易看清，但你可能希望更精确地控制堆栈内视图之间的间距。要做到这一点，你可以在定义堆栈时定义一个间距值，例如：\n\
    \n```\nVStack(spacing: 40) {\n}\n```\n\n在堆栈内部，间距会将视图推开一个固定的距离，如图 3-6 所示。\n\n![](img/329781_7_En_3_Fig6_HTML.jpg)\n\
    \n两段代码和插图展示了无间距状态和不同区域的间距状态。它列出了间距区域，例如顶部文本视图、中间文本视图和底部文本视图。\n\n**图 3-6** 间距在堆栈中的所有视图间创建了一个固定的距离\n\
    \n# 在堆栈内对齐视图\n\n当你创建一个堆栈（`VStack` 或 `HStack`）时，你可以选择定义对齐方式，无论你是否定义了间距，例如：\n\n\
    ```\nVStack(alignment: .leading)\nVStack(alignment: .leading, spacing: 24)\n```\n\
    \n注意\n\n> 如果你在堆栈中同时定义了对齐方式和间距，则必须首先定义对齐方式，然后定义间距。\n\n对于 `VStack`（垂直堆栈），你有三种方式来对齐视图，如图\
    \ 3-7 所示：\n\n![](img/329781_7_En_3_Fig7_HTML.jpg)\n\n三张垂直堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的前导对齐、居中对齐和尾部对齐。\n\
    \n**图 3-7** 在 `VStack` 中对齐视图的三种方式\n\n- `.leading`（左侧）\n- `.center`（如果未选择其他对齐选项时的默认设置）\n\
    - `.trailing`（右侧）\n\n以下 Swift 代码为 `VStack` 定义了 `.leading` 对齐：\n\n```\nVStack(alignment:\
    \ .leading) {\n    Text(\"Top\")\n        .background(Color.yellow)\n    Text(\"\
    Middle Text View\")\n        .background(Color.yellow)\n    Text(\"Bottom\")\n\
    \        .background(Color.yellow)\n}\n```\n\n对于 `HStack`（水平堆栈），你有五种不同的方式来对齐视图，如图\
    \ 3-8 所示：\n\n![](img/329781_7_En_3_Fig8_HTML.jpg)\n\n三张水平堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的顶部对齐、底部对齐和居中对齐。\n\
    \n**图 3-8** 在 `HStack` 中对齐视图\n\n- `.top`\n- `.bottom`\n- `.center`（如果未选择其他对齐选项时的默认设置）\n\
    - `.firstTextBaseline`\n- `.lastTextBaseline`\n\n以下 Swift 代码为 `HStack` 定义了 `.bottom`\
    \ 对齐：\n\n```\nHStack(alignment: .bottom) {\n    Text(\"Top\")\n        .font(.system(size:\
    \ 40))\n        .background(Color.yellow)\n    Text(\"Middle Text View\")\n  \
    \      .background(Color.yellow)\n    Text(\"Bottom\")\n        .font(.largeTitle)\n\
    \        .background(Color.yellow)\n}\n```\n\n`.top`、`.bottom` 和 `.center` 对齐选项适用于所有类型的用户界面视图。但是，如果你专门处理\
    \ `Text` 视图，SwiftUI 提供了另外两种基于基线对齐 `Text` 视图的方式。你可以根据第一个视图（`.firstTextBaseline`）或最后一个视图（`.lastTextBaseline`）来对齐文本，如图\
    \ 3-9 所示。\n\n![](img/329781_7_En_3_Fig9_HTML.jpg)\n\n一张水平堆栈中视图对齐的图示。它展示了顶部文本视图、中间文本视图和底部文本视图的对齐方式。右侧的文字写着“基线”。\n\
    \n**图 3-9** 在 `HStack` 中对齐文本\n"
- fmt: '# Using Spacers


    Using padding and spacing between views in a stack can be handy for arranging
    views on the user interface. For another way to position views on the user interface,
    you can also use spacers. A spacer acts like a spring that pushes two views as
    far apart as possible. A spacer appears in the Editor pane like this:


    ```

    Spacer()

    ```


    Because spacers automatically adapt to different screen sizes, spacers can align
    views to the edges of the screen no matter what that screen size might be as shown
    in Figure [3-10](#329781_7_En_3_Chapter.xhtml#Fig10).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig10_HTML.jpg)


    A code and an illustration of the positions of views and a spacer. It depicts
    the alignments of the left and right view, with a spacer in between.


    **Figure 3-10** Spacers push views as far apart as possible


    You can combine multiple spacers to push views further apart. For example, consider
    using a spacer before and after a view to separate them using this Swift code:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Middle")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Bottom")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    }

    }

    ```


    The preceding code defines a vertical stack that contains three `Text` views.
    A spacer in between each `Text` view pushes them equally apart as shown in Figure
    [3-11](#329781_7_En_3_Chapter.xhtml#Fig11).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig11_HTML.jpg)


    An illustration of the positions of views and spacers on a mobile phone. It depicts
    the alignment of the top, middle, and bottom views, with spacers in between.


    **Figure 3-11** Spacers separate three views equally apart


    If you combine spacers, multiple spacers push views further apart. If we add two
    spacers in between the Top and Middle views, those two spacers will push the Middle
    view further down as the following Swift code shows:


    ```

    struct ContentView: View {

    var body: some View {

    VStack {

    Text ("Top")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Spacer()

    Text ("Middle")

    .font(.system(size: 40))

    .background(Color.yellow)

    Spacer()

    Text ("Bottom")

    .font(.system(size: 40))

    .background(Color.yellow)

    }

    }

    }

    ```


    Because there are now two spacers in between the Top and Middle views, they push
    the Middle view further down the screen as shown in Figure [3-12](#329781_7_En_3_Chapter.xhtml#Fig12).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig12_HTML.jpg)


    An illustration of the positions of views and spacers on a mobile phone. It depicts
    the alignment of the top, middle, and bottom views, with two spacers between the
    top and middle views, and a spacer between the middle and bottom views.


    **Figure 3-12** Two spacers push the Middle view further down


    By using multiple spacers, you can adjust views on the user interface relative
    to the screen size. When the app runs on a larger screen, the spacers push the
    views further to the boundaries of the screen. When the app runs on a smaller
    screen, the spacers push the views a shorter distance.


    Spacers automatically adjust their size based on screen size. However, you may
    want to define a minimum length for a spacer to keep it from shrinking too far.
    To define a minimum length, use the following code:


    ```

    Spacer(minLength: 25.73)

    ```


    Notice that you can define the minimum length as a decimal value (`CGFloat`) although
    you could use an integer value as well such as:


    ```

    Spacer(minLength: 25)

    ```


    If you do not specify a minimum length, the spacer will simply grow or shrink
    based on the screen size that the app is running in. If you need to specify a
    fixed value for a spacer, you can use the `.frame` modifier. If you’re using a
    spacer within a `VStack`, you can define a height within the frame modifier as
    shown in Figure [3-13](#329781_7_En_3_Chapter.xhtml#Fig13).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig13_HTML.jpg)


    A code and an illustration of the positions of the first and second views separated
    by a height spacer of 125 in between the both of them.


    **Figure 3-13** The height of a `.frame` modifier defines a fixed size for a spacer
    in a `VStack`


    When using a spacer in an `HStack`, define a width for the spacer instead as shown
    in Figure [3-14](#329781_7_En_3_Chapter.xhtml#Fig14).


    ![](images/329781_7_En_3_Chapter/329781_7_En_3_Fig14_HTML.jpg)


    A code and an illustration of the positions of the first and second views separated
    by a width spacer equal to 55 in between both of them.


    **Figure 3-14** The width of a `.frame` modifier defines a fixed size for a spacer
    in an `HStack`'
