    \ \"Lundy\",sales: 43)\n    ]\n    struct ContentView: View {\n    var body: some\
    \ View {\n    VStack {\n    Chart (mySalesArray) { x in\n    AreaMark(x: .value(\"\
    Name\", x.name),\n    y: .value(\"Sales\", x.sales))\n    }\n    }\n    }\n  \
    \  }\n    struct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n    ContentView()\n    }\n    }\n    ```\n\n5.  Click the Live\
    \ icon in the Canvas pane.\n\n```\nimport Charts\n```\n\n## Creating a Point Chart\n\
    \nPoint charts are similar to line and area charts. The main difference is that\
    \ point charts simply display data as dots on a chart. While this can make identifying\
    \ trends harder than a line or an area chart, point charts can be especially useful\
    \ to identify where groups of data appear. Once you know where data normally should\
    \ appear, a point chart makes it easy to identify data that falls outside this\
    \ normal range as shown in Figure [16-11](#329781_7_En_16_Chapter.xhtml#Fig11).\n\
    \n![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig11_HTML.jpg)\n\nA point\
