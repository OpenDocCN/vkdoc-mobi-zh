    \ Swift 代码访问特定标签的方法。\n\n## 显示页面视图\n\n通常，标签视图会在屏幕底部显示标签，以便用户选择一个标签并跳转到不同的视图。作为一种替代方案，您可以将标签视图转换为页面视图。页面视图会在屏幕底部中央显示代表不同屏幕的标签栏图标。然后，用户可以向左或向右滚动，按顺序查看每个屏幕。\n\
