- fmt: "# Creating a Rectangle Chart\n\nRectangles essentially display the tops of\
    \ a bar chart but without any colors underneath. That way it can be easy to see\
    \ the values they represent without the distraction of additional graphics getting\
    \ in the way as shown in Figure [16-12](#329781_7_En_16_Chapter.xhtml#Fig12).\n\
    \n![](images/329781_7_En_16_Chapter/329781_7_En_16_Fig12_HTML.jpg)\n\nA set of\
    \ 2 graphs comprises a bar chart and a rectangle chart denoting the data for 8\
    \ elements. The bars and rectangles are indicated in 4 different colors, which\
    \ represent east, west, north, and south.\n\n**Figure 16-12**  \nComparison of\
    \ a rectangle chart with an equivalent bar chart\n\nTo see how to create a rectangle\
    \ chart, follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give\
    \ it any name you wish such as “RectangleChart.”\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n3.  Add the `Charts` framework underneath the `SwiftUI`\
    \ framework like this:\n    ```swift\n    import Charts\n    ```\n4.  Add a structure\
    \ underneath the `import Charts` line like this:\n    ```swift\n    struct SalesPeople:\
    \ Identifiable {\n        var name: String\n        var region: String\n     \
    \   var sales: Int\n        var id = UUID()\n    }\n    ```\n5.  Add an array\
    \ underneath the structure like this:\n    ```swift\n    var mySalesArray: [SalesPeople]\
    \ = [\n        .init(name: \"Oscar\", region: \"North\", sales: 50),\n       \
    \ .init(name: \"Mayer\", region: \"South\", sales: 43),\n        .init(name: \"\
    George\", region: \"East\", sales: 35),\n        .init(name: \"Hormel\", region:\
    \ \"West\", sales: 56),\n        .init(name: \"Mike\", region: \"North\", sales:\
    \ 27),\n        .init(name: \"Spam\", region: \"East\", sales: 38),\n        .init(name:\
    \ \"Jan\", region: \"West\", sales: 33),\n        .init(name: \"Lundy\", region:\
    \ \"South\", sales: 43)\n    ]\n    ```\n6.  Add a `Chart` inside a `VStack` like\
    \ this:\n    ```swift\n    var body: some View {\n        VStack {\n         \
    \   Chart (mySalesArray) { x in\n            }\n        }\n    }\n    ```\n7.\
    \  Add a `RectangleMark` inside the `Chart` like this:\n    ```swift\n    VStack\
    \ {\n        Chart (mySalesArray) { x in\n            RectangleMark(x: .value(\"\
    Name\", x.name),\n                          y: .value(\"Sales\", x.sales))\n \
    \           .foregroundStyle(by: .value(\"Region\", x.region))\n        }\n  \
    \  }\n    ```\n    The entire `ContentView` file should look like this:\n    ```swift\n\
    \    import SwiftUI\n    import Charts\n\n    struct SalesPeople: Identifiable\
    \ {\n        var name: String\n        var region: String\n        var sales:\
    \ Int\n        var id = UUID()\n    }\n\n    var mySalesArray: [SalesPeople] =\
    \ [\n        .init(name: \"Oscar\", region: \"North\", sales: 50),\n        .init(name:\
    \ \"Mayer\", region: \"South\", sales: 43),\n        .init(name: \"George\", region:\
    \ \"East\", sales: 35),\n        .init(name: \"Hormel\", region: \"West\", sales:\
    \ 56),\n        .init(name: \"Mike\", region: \"North\", sales: 27),\n       \
    \ .init(name: \"Spam\", region: \"East\", sales: 38),\n        .init(name: \"\
    Jan\", region: \"West\", sales: 33),\n        .init(name: \"Lundy\", region: \"\
    South\", sales: 43)\n    ]\n\n    struct ContentView: View {\n        var body:\
    \ some View {\n            VStack {\n                Chart (mySalesArray) { x\
    \ in\n                    RectangleMark(x: .value(\"Name\", x.name),\n       \
    \                           y: .value(\"Sales\", x.sales))\n                 \
    \   .foregroundStyle(by: .value(\"Region\", x.region))\n                }\n  \
    \          }\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n8.  Click the Live icon in the Canvas pane.\n\n```swift\n\
    import Charts\n```\n\n## Summary\n\nMany apps rely on storing large amounts of\
    \ data. Unfortunately, all that data means nothing if users can’t understand it.\
    \ That’s why you may need charts to visualize data to spot trends, identify possible\
    \ problems, or compare data. By making data easy to understand, charts can make\
    \ data more useful.\n\nLine charts can help identify trends such as falling or\
    \ rising sales. Area charts can make such trends easier to see by filling in the\
    \ empty space underneath a line.\n\nPoint charts can often be useful to spot outlying\
    \ data that doesn’t fit within normal clusters of data. Rectangle charts can be\
    \ handy for highlighting values. Just as area charts are like line charts but\
    \ filled in, bar charts are like rectangle charts but also filled in.\n\nStacking\
    \ data in a chart, such as a bar chart, allows you to see proportions of a whole.\
    \ Adding rule marks lets you draw lines to highlight specific values in a chart\
    \ such as average sales.\n\nEvery chart has its pros and cons based on what people\
    \ like, so experiment with different charts until you find the right one for your\
    \ app and users.\n\n# 17. Using the Navigation Stack\n\nOnly the simplest apps\
    \ consist of a single screen such as the Calculator app. However, most apps usually\
    \ need two or more screens to display information. In SwiftUI, you can define\
    \ each screen of your app’s user interface by creating a separate structure. Then\
    \ you need to provide a way to jump from one screen to another.\n\nOne of the\
    \ simplest ways to jump from one screen to another is through a `NavigationStack`,\
    \ which displays multiple screens in sequential order. This `NavigationStack`\
    \ is commonly used in many iOS apps such as Settings to let users view different\
    \ options as shown in Figure [17-1](#329781_7_En_17_Chapter.xhtml#Fig1).\n\n![](images/329781_7_En_17_Chapter/329781_7_En_17_Fig1_HTML.png)\n\
    \nA set of 3 mobile screenshots. The setting page with the general option points\
    \ to the general options page. The general option list multiple options where\
    \ the keyboard option is selected. The keyboard option page has all keyboard options.\n\
    \n**Figure 17-1**  \nA `NavigationStack` makes it easy to jump from one screen\
    \ to another\n\nIn Figure [17-1](#329781_7_En_17_Chapter.xhtml#Fig1), the user\
    \ can tap the Settings icon on the Home screen to display the Settings screen.\
    \ Tapping General opens the General screen. Then tapping Keyboard opens the Keyboards\
    \ screen. Note that to go backward, you can just tap the Back button in the upper-left\
    \ corner.\n\nFrom the Keyboards screen, the Back button takes you back to the\
    \ General screen. From the General screen, the Back button takes you back to the\
    \ Settings screen. A `NavigationStack` does nothing more than allow the user to\
    \ jump from one screen to another in sequential order."
