  trans: "\n### 使用文本编辑器\n\n`TextField` 允许用户输入单词或短句，而 `TextEditor` 则允许用户输入多行文本，就像一个文字处理器。当你在用户界面上放置一个\
    \ `TextEditor` 时，它会扩展以填充所有可用空间。因此，最好使用 `.frame` 修饰符为 `TextEditor` 定义特定大小。\n\n\
    对于 `TextField`，点击虚拟键盘右下角的按钮可以使其消失。由于 `TextEditor` 可以容纳多行文本，虚拟键盘右下角的按钮仅将光标移动到下一行，并且始终显示“换行”标签。\n\
    \n因此，如果你想在使用 `TextEditor` 时隐藏虚拟键盘，需要执行以下操作：\n\n-   创建一个表示布尔值的 `FocusState` 变量。\n\
    -   为 `TextEditor` 添加 `.focused` 修饰符，并使用该 `FocusState` 变量。\n-   创建一个额外的控件（例如按钮），将该\
    \ `FocusState` 变量设置为 `false`。\n\n> **注意：** 这种将 `FocusState` 变量与 `.focused` 修饰符以及单独控件结合使用的方法同样适用于\
    \ `TextField`。\n\n首先，你需要像这样创建一个 `@FocusState` 变量：\n\n```\n@FocusState var dismissKeyboard:\
    \ Bool\n```\n\n定义 `@FocusState` 变量后，你需要在 `TextEditor`（或 `TextField`）上使用 `.focused`\
    \ 修饰符来链接到 `@FocusState` 变量，就像这样：\n\n```\nTextEditor(text: $message)\n    .focused($dismissKeyboard)\n\
    ```\n\n然后，你可以通过一个单独的控件将 `@FocusState` 变量的值设置为 `false`，从而使虚拟键盘消失，就像这样：\n\n```\n\
    Button(\"隐藏键盘\") {\n    dismissKeyboard = false\n}\n```\n\n要了解 `FocusState` 变量如何工作，请遵循以下步骤：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其指定任何你喜欢的名称，例如“DismissKeyboardTextEditor”。\n\
    2.  在导航器窗格中单击 `ContentView` 文件。\n3.  创建一个 `@State` 变量来保存 `TextEditor` 的内容，并创建一个\
    \ `@FocusState` 变量来使虚拟键盘消失，如下所示：\n\n    ```\n    struct ContentView: View {\n\
    \        @State var message = \"\"\n        @FocusState var dismissKeyboard: Bool\n\
    \    ```\n\n4.  在 `VStack` 内部添加一个 `Button` 和一个 `TextEditor`。为防止 `TextEditor` 扩展，请确保为\
    \ `TextEditor` 添加 `.frame` 修饰符。`ContentView` 文件内的完整代码如下所示：\n\n    ```\n    import\
    \ SwiftUI\n\n    struct ContentView: View {\n        @State var message = \"\"\
    \n        @FocusState var dismissKeyboard: Bool\n\n        var body: some View\
    \ {\n            VStack {\n                TextEditor(text: $message)\n      \
    \              .focused($dismissKeyboard)\n                    .frame(width: 250,\
    \ height: 150)\n                    .padding()\n                Button(\"隐藏键盘\"\
    ) {\n                    dismissKeyboard = false\n                }\n        \
    \    }\n        }\n    }\n\n    struct ContentView_Previews: PreviewProvider {\n\
    \        static var previews: some View {\n            ContentView()\n       \
    \ }\n    }\n    ```\n\n5.  点击**运行**按钮或选择**产品** ➤ **运行**，在模拟器中运行你的应用程序。\n6.  当你的应用程序出现在模拟器中时，点击\
    \ `TextEditor`。如果虚拟键盘没有出现，请按下 **Command+K** 或选择 **I/O** ➤ **键盘** ➤ **切换软件键盘**。\n\
    7.  输入一些文本，然后点击你在 `TextEditor` 下方创建的**“隐藏键盘”**按钮。这将把 `@FocusState` 变量 `dismissKeyboard`\
    \ 设置为 `false`，从而使虚拟键盘消失。\n\n你必须使用 `@FocusState` 变量才能使虚拟键盘随 `TextEditor` 一起消失。\n\
    \n## 总结\n\n用户向应用程序输入数据最常见的方式之一是通过键入文本。`TextField` 可以接受较短的文本，例如姓名或句子。默认情况下，`TextField`\
    \ 会水平扩展，这意味着用户可以随意输入尽可能多的文本，并且这些文本将显示为单行。\n\n如果将 `TextField` 改为垂直扩展，当用户继续输入文本时，`TextField`\
    \ 的高度会增加并显示多行文本。为了防止 `TextField` 无限扩展，可以使用 `.lineLimit` 修饰符来定义 `TextField` 中显示的最大行数。\n\
    \n如果用户需要输入不应显示在屏幕上的敏感信息，可以使用 `SecureField`，它会屏蔽所有键入的内容。若要显示多行文本，可以使用 `TextEditor`，它就像一个微型文字处理器。\n\
    \n为了使文本输入更轻松，可以使用 `.contentType` 修饰符来定义 `TextField` 预期的信息类型，例如姓名或电子邮件地址。然后使用 `.keyboardType`\
    \ 修饰符来定义针对特定信息类型（例如电话号码或姓名）优化的特定虚拟键盘。\n\n当用户不再需要虚拟键盘时，`TextField` 和 `SecureField`\
    \ 可以依靠右下角的按钮来关闭虚拟键盘。通过使用 `.submitLabel` 修饰符，你可以为此虚拟键盘右下角按钮定义常见的标题类型，例如**完成**、**发送**或**下一步**。\n\
    \n创建 `TextEditor` 时，它会扩展以填充所有可用空间，因此你可能需要使用 `.frame` 修饰符为 `TextEditor` 定义特定的宽度和高度。要隐藏使用\
    \ `TextEditor` 时的虚拟键盘，请使用带有 `.focused` 修饰符的 `@FocusState` 变量。然后创建一个单独的控件（例如按钮），将\
    \ `@FocusState` 变量设置为 `false`。这将使虚拟键盘消失。\n\n文本是输入数据最常见的方式，因此请使用户能够轻松地将数据输入到 `TextField`、`SecureField`\
    \ 或 `TextEditor` 中。\n\n# 8. 使用选取器限制选择\n\n文本字段非常适合让用户输入任何类型的信息，例如姓名或简短的问题答案。问题是，如果用户可以自由输入任何内容，他们可能会意外（或故意）输入无效数据。\n\
    \n例如，如果一个 `TextField` 要求输入地址，你希望用户自由输入任何内容。但是，如果一个 `TextField` 要求输入州、语言或性别，你就不希望用户输入“狗”、“1258dke3”或“我在找鞋子”，因为这些都不是有效输入，很可能会导致程序崩溃。\n\
    \n一种解决方案是让用户输入任何数据，然后编写 Swift 代码来验证输入是否有效。不幸的是，这很可能会花费大量时间，而且仍然不准确。一个更好的解决方案是，当只有少数可接受的选项时，最好将用户限制在从有限范围内进行选择。\n\
    \n`Picker` 显示多个选项，并让用户有机会点击选择其中一个选项。由于所有选项都是有效的，`Picker` 确保用户只能输入有效数据。普通的 `Picker`\
    \ 非常适合让用户从一系列文本选项中进行选择。对于选择颜色或日期，SwiftUI 还提供了特殊的 `ColorPicker` 和 `DatePicker`。\n\
    \n`DatePicker` 甚至允许你定义一个有效的日期范围。`Picker` 的全部目的是确保用户在任意时刻只能向程序输入有效数据。\n"
- fmt: "# Using a Picker\n\nA `Picker` displays a list of options defined by multiple\
    \ `Text` views. Although a `Picker` uses text strings to display available options,\
    \ whatever option the user chooses can actually represent any value such as a\
    \ string, a decimal number, an integer, or a value defined by an enumeration.\
    \ (Segmented controls, a special type of `Picker` view, were introduced in Chapter\
    \ 6.)\n\nTo create a `Picker`, use multiple `Text` views to display the options\
    \ and attach a `.tag` modifier to each option. The `.tag` modifier defines the\
    \ actual value the user chose such as:\n\n```\nPicker(selection: $choice, label:\
    \ Text(\"Picker\")) {\n    Text(\"1\").tag(\"one\")\n    Text(\"2\").tag(\"two\"\
    )\n    Text(\"3\").tag(\"three\")\n    Text(\"4\").tag(\"four\")\n    Text(\"\
    5\").tag(\"five\")\n}\n```\n\nIn this example, the available options are numbers,\
    \ but when the user selects a number, the actual choice is stored as a string\
    \ such as `\"three\"` or `\"five\"` as shown in Figure 8-1.\n\n![A screenshot\
    \ of a wheel of numbers from 1 to 5 with 3 highlighted and selected.](images/329781_7_En_8_Chapter/329781_7_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** – A `Picker` uses `Text` views to display choices on the user\
    \ interface\n\nThe `.tag` modifier on a `Text` view can contain any data type,\
    \ but all `.tag` modifiers inside the same `Picker` must be of the same data type\
    \ that matches the `State` variable that it’s linked to. The following Swift code\
    \ defines a `Picker` where multiple `Text` views display words such as `\"Cat\"\
    ` or `\"Bird\"`, but the `.tag` modifiers store integers such as `0` or `2`:\n\
    \n```\nPicker(\"\", selection: $choice) {\n    Text(\"Bird\").tag(1)\n    Text(\"\
    Cat\").tag(2)\n    Text(\"Lizard\").tag(3)\n    Text(\"Dog\").tag(4)\n    Text(\"\
    Hamster\").tag(5)\n}\n```\n\nBecause the `.tag` modifier contains integers, the\
    \ `choice` `State` variable now needs to store `Int` data types such as:\n\n```\n\
    @State private var choice = 0\n```\n\nTo see how a `Picker` works, follow these\
    \ steps:\n\n1. Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as `\"Picker\"`.\n\n2. Click the `ContentView` file in the Navigator pane.\n\
    \n3. Add the following `State` variable under the `struct ContentView: View` line:\n\
    \n```\nstruct ContentView: View {\n    @State private var choice = 0\n```\n\n\
    This creates a `State` variable that’s initially set to `0`, which is an integer,\
    \ so the `choice` `State` variable is defined to hold `Int` data types.\n\n4.\
    \ Create a `VStack` and create a `Picker` and a `Text` view inside the `var body:\
    \ some View` line:\n\n```\nvar body: some View {\n    VStack {\n        Picker(\"\
    \", selection: $choice) {\n            Text(\"Bird\").tag(1)\n            Text(\"\
    Cat\").tag(2)\n            Text(\"Lizard\").tag(3)\n            Text(\"Dog\").tag(4)\n\
    \            Text(\"Hamster\").tag(5)\n        }\n        Text(\"Choice = \\(choice)\"\
    )\n    }\n}\n```\n\nThe entire code in the `ContentView` file should look like\
    \ this:\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var choice\
    \ = 0\n\n    var body: some View {\n        VStack {\n            Picker(\"\"\
    , selection: $choice) {\n                Text(\"Bird\").tag(1)\n             \
    \   Text(\"Cat\").tag(2)\n                Text(\"Lizard\").tag(3)\n          \
    \      Text(\"Dog\").tag(4)\n                Text(\"Hamster\").tag(5)\n      \
    \      }\n            Text(\"Choice = \\(choice)\")\n        }\n    }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n5. Click the `Live` icon in the Canvas\
    \ pane.\n\n6. Select different options in the `Picker`. Notice that each time\
    \ you select a different option, the `Text` view displays `\"Choice = __\"` where\
    \ `__` is the `.tag` value attached to the `Text` view that the user chose.\n\n\
    7. Change the `State` variable as follows to hold `Double` data types:\n\n```\n\
    @State private var choice = 0.0\n```\n\nBecause this `choice` `State` variable\
    \ has an initial value of `0.0`, which is a decimal number, Swift infers that\
    \ the `choice` variable can now only hold `Double` data types.\n\n![A snippet\
    \ of a 7-line code. It includes functions of the picker, text, tag, and choice\
    \ = 2.060000, among others.](images/329781_7_En_8_Chapter/329781_7_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2** – A `Picker` view uses `Double` values in its `.tag` modifiers\n\
    \n8. Change the `.tag` modifiers in the `Picker` as follows:\n\n```\nPicker(\"\
    \", selection: $choice) {\n    Text(\"Bird\").tag(1.7)\n    Text(\"Cat\").tag(2.06)\n\
    \    Text(\"Lizard\").tag(3.41)\n    Text(\"Dog\").tag(4.13)\n    Text(\"Hamster\"\
    ).tag(5.28)\n}\n```\n\nBecause the `choice` State variable has been redefined\
    \ to hold `Double` data types, the `.tag` modifier values must now all represent\
    \ `Double` data types as well.\n\n9. Click the `Live` icon in the Canvas pane.\n\
    \n10. Select different options in the `Picker`. Notice that each time you select\
    \ a different option, the `Text` view displays `\"Choice = __\"` where `__` is\
    \ the `.tag` value as a `Double` value as shown in Figure 8-2.\n\nBy default,\
    \ a `Picker` view appears as a menu. However, the `.pickerStyle` modifier gives\
    \ you three different ways to display the `Picker` view as shown in Figure 8-3:\n\
    \n![A set of 3 screenshots of the dot menu, dot wheel, and dot segmented styles.\
    \ Menu has an options menu with options of bird, cat, lizard, dog, and hamster.\
    \ Wheel has the bird option highlighted and selected with other names below. Segmented\
    \ has the names in horizontal order.](images/329781_7_En_8_Chapter/329781_7_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3** – Three different `Picker` view styles\n\n- `.pickerStyle(.menu)`\n\
    - `.pickerStyle(.wheel)`\n- `.pickerStyle(.segmented)`"
  raw: "## Using a Picker\n\nA Picker displays a list of options defined by multiple\
    \ Text views. Although a Picker uses text strings to display available options,\
    \ whatever option the user chooses can actually represent any value such as a\
    \ string, a decimal number, an integer, or a value defined by an enumeration.\
    \ (Segmented controls, a special type of Picker view, were introduced in Chapter\
    \ [6](#329781_7_En_6_Chapter.xhtml).)\n\nTo create a Picker, use multiple Text\
    \ views to display the options and attach a .tag modifier to each option. The\
    \ .tag modifier defines the actual value the user chose such as\n\n```\nPicker(selection:\
    \ $choice, label: Text(\"Picker\"){\nText(\"1\").tag(\"one\")\nText(\"2\").tag(\"\
    two\")\nText(\"3\").tag(\"three\")\nText(\"4\").tag(\"four\")\nText(\"5\").tag(\"\
    five\")\n}\n```\n\nIn this example, the available options are numbers, but when\
    \ the user selects a number, the actual choice is stored as a string such as “three”\
    \ or “five” as shown in Figure [8-1](#329781_7_En_8_Chapter.xhtml#Fig1).\n\n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig1_HTML.jpg)\n\
    \nA screenshot of a wheel of numbers from 1 to 5 with 3 highlighted and selected.\n\
    \nFigure 8-1\n\nA Picker uses Text views to display choices on the user interface\n\
    \nThe .tag modifier on a Text view can contain any data type, but all .tag modifiers\
    \ inside the same Picker must be of the same data type that matches the State\
    \ variable that it’s linked to. The following Swift code defines a Picker where\
    \ multiple Text views display words such as “Cat” or “Bird”, but the .tag modifiers\
    \ store integers such as 0 or 2:\n\n```\nPicker(\"\", selection: $choice) {\n\
    Text(\"Bird\").tag(1)\nText(\"Cat\").tag(2)\nText(\"Lizard\").tag(3)\nText(\"\
    Dog\").tag(4)\nText(\"Hamster\").tag(5)\n}\n```\n\nBecause the .tag modifier contains\
    \ integers, the “choice” State variable now needs to store Int data types such\
    \ as\n\n```\n@State private var choice = 0\n```\n\nTo see how a Picker works,\
    \ follow these steps:\n\n1.  Create a new SwiftUI iOS App project and give it\
    \ any name you wish such as “Picker.”\n\n2.  Click the ContentView file in the\
    \ Navigator pane.\n\n3.  Add the following State variable under the struct ContentView:\
    \ View line:\n\n```\n    struct ContentView: View {\n    @State private var choice\
    \ = 0\n    ```\n\nThis creates a State variable that’s initially set to 0, which\
    \ is an integer, so the “choice” State variable is defined to hold Int data types.\n\
    \n4.  Create a VStack and create a Picker and a Text view inside the var body:\
    \ some View line:\n\n```\n    var body: some View {\n    VStack {\n    Picker(\"\
    \", selection: $choice) {\n    Text(\"Bird\").tag(1)\n    Text(\"Cat\").tag(2)\n\
    \    Text(\"Lizard\").tag(3)\n    Text(\"Dog\").tag(4)\n    Text(\"Hamster\").tag(5)\n\
    \    }\n    Text(\"Choice = \\(choice)\")\n    }\n    }\n    ```\n\nThe entire\
    \ code in the ContentView file should look like this:\n\n```\n    import SwiftUI\n\
    \    struct ContentView: View {\n    @State var choice = 0\n    var body: some\
    \ View {\n    VStack {\n    Picker(\"\", selection: $choice) {\n    Text(\"Bird\"\
    ).tag(1)\n    Text(\"Cat\").tag(2)\n    Text(\"Lizard\").tag(3)\n    Text(\"Dog\"\
    ).tag(4)\n    Text(\"Hamster\").tag(5)\n    }\n    Text(\"Choice = \\(choice)\"\
    )\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n \
    \   static var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\
    \n5.  Click the Live icon in the Canvas pane.\n\n6.  Select different options\
    \ in the Picker. Notice that each time you select a different option, the Text\
    \ view displays “Choice = __” where __ is the .tag value attached to the Text\
    \ view that the user chose.\n\n7.  Change the State variable as follows to hold\
    \ Double data types:\n\n```\n@State private var choice = 0.0\n```\n\nBecause this\
    \ “choice” State variable has an initial value of 0.0, which is a decimal number,\
    \ Swift infers that the “choice” variable can now only hold Double data types.\n\
    \n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig2_HTML.jpg)\n\nA snippet of\
    \ a 7-line code. It includes functions of the picker, text, tag, and choice =\
    \ 2.060000, among others.\n\nFigure 8-2\n\nA Picker view uses Double values in\
    \ its .tag modifiers\n\n1.  Change the .tag modifiers in the Picker as follows:\n\
    \n```\n    Picker(\"\", selection: $choice) {\n    Text(\"Bird\").tag(1.7)\n \
    \   Text(\"Cat\").tag(2.06)\n    Text(\"Lizard\").tag(3.41)\n    Text(\"Dog\"\
    ).tag(4.13)\n    Text(\"Hamster\").tag(5.28)\n    }\n    ```\n\nBecause the “choice”\
    \ State variable has been redefined to hold Double data types, the .tag modifier\
    \ values must now all represent Double data types as well.\n\n2.  Click the Live\
    \ icon in the Canvas pane.\n\n3.  Select different options in the Picker. Notice\
    \ that each time you select a different option, the Text view displays “Choice\
    \ = __” where __ is the .tag value as a Double value as shown in Figure [8-2](#329781_7_En_8_Chapter.xhtml#Fig2).\n\
    \nBy default, a Picker view appears as a menu. However, the .pickerStyle modifier\
    \ gives you three different ways to display the Picker view as shown in Figure\
    \ [8-3](#329781_7_En_8_Chapter.xhtml#Fig3):\n\n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig3_HTML.jpg)\n\
    \nA set of 3 screenshots of the dot menu, dot wheel, and dot segmented styles.\
    \ Menu has an options menu with options of bird, cat, lizard, dog, and hamster.\
    \ Wheel has the bird option highlighted and selected with other names below. Segmented\
    \ has the names in horizontal order.\n\nFigure 8-3\n\nThree different Picker view\
    \ styles\n\n*   .pickerStyle(.menu)\n\n*   .pickerStyle(.wheel)\n\n*   .pickerStyle(.segmented)"
  trans: "\n# 使用选择器（Picker）\n\n`Picker` 会显示一个由多个 `Text` 视图定义的选项列表。虽然 `Picker` 使用文本字符串来展示可用选项，但用户选择的选项实际上可以代表任何值，例如字符串、十进制数、整数或由枚举定义的值。（分段控件是\
    \ `Picker` 视图的一种特殊类型，已在第 6 章介绍过。）\n\n要创建一个 `Picker`，需使用多个 `Text` 视图来显示选项，并为每个选项附加一个\
    \ `.tag` 修饰符。`.tag` 修饰符定义了用户所选的实际值，例如：\n\n```\nPicker(selection: $choice, label:\
    \ Text(\"选择器\")) {\n    Text(\"一\").tag(\"one\")\n    Text(\"二\").tag(\"two\"\
    )\n    Text(\"三\").tag(\"three\")\n    Text(\"四\").tag(\"four\")\n    Text(\"\
    五\").tag(\"five\")\n}\n```\n\n在此示例中，可用选项是数字，但当用户选择一个数字时，实际选择会以字符串形式存储，例如 `\"three\"\
    ` 或 `\"five\"`，如图 8-1 所示。\n\n![一张显示从 1 到 5 的数字滚轮的截图，其中 3 被高亮并选中。](img/329781_7_En_8_Fig1_HTML.jpg)\n\
    \n**图 8-1** – `Picker` 使用 `Text` 视图在用户界面上显示选项\n\n`Text` 视图上的 `.tag` 修饰符可以包含任何数据类型，但同一个\
    \ `Picker` 内的所有 `.tag` 修饰符必须是相同的数据类型，并且要与它所链接的 `State` 变量类型匹配。以下 Swift 代码定义了一个\
    \ `Picker`，其中多个 `Text` 视图显示诸如 `\"Cat\"` 或 `\"Bird\"` 之类的单词，但 `.tag` 修饰符存储的是诸如\
    \ `0` 或 `2` 之类的整数：\n\n```\nPicker(\"\", selection: $choice) {\n    Text(\"鸟\"\
    ).tag(1)\n    Text(\"猫\").tag(2)\n    Text(\"蜥蜴\").tag(3)\n    Text(\"狗\").tag(4)\n\
    \    Text(\"仓鼠\").tag(5)\n}\n```\n\n因为 `.tag` 修饰符包含整数，所以 `choice` `State` 变量现在需要存储\
    \ `Int` 数据类型，例如：\n\n```\n@State private var choice = 0\n```\n\n要了解 `Picker` 的工作原理，请按以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 `\"Picker\"`。\n\n2. 在导航器窗格中点击 `ContentView`\
    \ 文件。\n\n3. 在 `struct ContentView: View` 代码行下方添加以下 `State` 变量：\n\n```\nstruct\
    \ ContentView: View {\n    @State private var choice = 0\n```\n\n这将创建一个初始设置为 `0`\
    \ 的 `State` 变量，它是一个整数，因此 `choice` `State` 变量被定义为持有 `Int` 数据类型。\n\n4. 在 `var body:\
    \ some View` 代码行内创建一个 `VStack`，并在其中创建一个 `Picker` 和一个 `Text` 视图：\n\n```\nvar body:\
    \ some View {\n    VStack {\n        Picker(\"\", selection: $choice) {\n    \
    \        Text(\"鸟\").tag(1)\n            Text(\"猫\").tag(2)\n            Text(\"\
    蜥蜴\").tag(3)\n            Text(\"狗\").tag(4)\n            Text(\"仓鼠\").tag(5)\n\
    \        }\n        Text(\"选择结果 = \\(choice)\")\n    }\n}\n```\n\n`ContentView`\
    \ 文件中的完整代码应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State\
    \ var choice = 0\n\n    var body: some View {\n        VStack {\n            Picker(\"\
    \", selection: $choice) {\n                Text(\"鸟\").tag(1)\n              \
    \  Text(\"猫\").tag(2)\n                Text(\"蜥蜴\").tag(3)\n                Text(\"\
    狗\").tag(4)\n                Text(\"仓鼠\").tag(5)\n            }\n            Text(\"\
    选择结果 = \\(choice)\")\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n5. 点击画布窗格中的 `Live` 图标。\n\n6. 在 `Picker` 中选择不同的选项。请注意，每次选择不同的选项时，`Text` 视图都会显示\
    \ `\"选择结果 = __\"`，其中 `__` 是用户选择的 `Text` 视图所附加的 `.tag` 值。\n\n7. 按如下方式更改 `State`\
    \ 变量，以使其持有 `Double` 数据类型：\n\n```\n@State private var choice = 0.0\n```\n\n由于此\
    \ `choice` `State` 变量的初始值为 `0.0`，它是一个十进制数，因此 Swift 推断 `choice` 变量现在只能持有 `Double`\
    \ 数据类型。\n\n![一段 7 行代码片段。它包含了选择器（Picker）、文本（Text）、标签（tag）和选择结果 = 2.060000 等功能。](img/329781_7_En_8_Fig2_HTML.jpg)\n\
    \n**图 8-2** – 一个在 `.tag` 修饰符中使用 `Double` 值的 `Picker` 视图\n\n8. 按如下方式更改 `Picker`\
    \ 中的 `.tag` 修饰符：\n\n```\nPicker(\"\", selection: $choice) {\n    Text(\"鸟\").tag(1.7)\n\
    \    Text(\"猫\").tag(2.06)\n    Text(\"蜥蜴\").tag(3.41)\n    Text(\"狗\").tag(4.13)\n\
    \    Text(\"仓鼠\").tag(5.28)\n}\n```\n\n由于 `choice` 状态变量已被重新定义为持有 `Double` 数据类型，因此\
    \ `.tag` 修饰符的值现在也必须全部表示 `Double` 数据类型。\n\n9. 点击画布窗格中的 `Live` 图标。\n\n10. 在 `Picker`\
    \ 中选择不同的选项。请注意，每次选择不同的选项时，`Text` 视图都会显示 `\"选择结果 = __\"`，其中 `__` 是作为 `Double` 值的\
    \ `.tag` 值，如图 8-2 所示。\n\n默认情况下，`Picker` 视图显示为菜单。然而，`.pickerStyle` 修饰符提供了三种不同的方式来显示\
    \ `Picker` 视图，如图 8-3 所示：\n\n![一组 3 张截图，分别展示了点菜单（dot menu）、点滚轮（dot wheel）和点分段（dot\
    \ segmented）样式。菜单样式显示了一个包含鸟、猫、蜥蜴、狗和仓鼠选项的选项菜单。滚轮样式高亮并选中了鸟选项，下方有其他名称。分段样式则水平排列了这些名称。](img/329781_7_En_8_Fig3_HTML.jpg)\n\
    \n**图 8-3** – 三种不同的 `Picker` 视图样式\n\n- `.pickerStyle(.menu)`\n- `.pickerStyle(.wheel)`\n\
    - `.pickerStyle(.segmented)`\n"
- fmt: "### Displaying Options in a Picker\n\nThe most straightforward way to display\
    \ options in a `Picker` is by using multiple `Text` views. For small numbers of\
    \ options, this works fine, but if you have a large number of options, especially\
    \ when displaying options using the `.wheel` picker style, it’s often more convenient\
    \ to use a `ForEach` loop to retrieve options from an array.\n\nFirst, create\
    \ an array that holds all the options you want to appear in the `Picker` view\
    \ such as\n\n```\nlet myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n\
    ```\n\nThen create a `State` variable for the `Picker` view to access:\n\n```\n\
    @State var selectedItem = \"\"\n```\n\nFinally, create the `Picker` view with\
    \ a `ForEach` loop to retrieve each item in the array like this:\n\n```\nPicker(\"\
    \", selection: $selectedItem) {\nForEach(myArray, id: \\.self) {\nText($0)\n}\n\
    ```\n\nThe `ForEach` loop needs to know which array to access, and then it uses\
    \ its `id` parameter to identify each different array item to display in the `Text`\
    \ view. The `Text` view uses the shortcut `$0` to represent each array item.\n\
    \nTo see how to use an array and a `ForEach` loop to populate a `Picker` view,\
    \ follow these steps:\n\n![A screenshot of a mobile screen with an icon of a hare\
    \ and the text, you chose = hare at the top, and a wheel with hare selected among\
    \ other names at the bottom.](images/329781_7_En_8_Chapter/329781_7_En_8_Fig4_HTML.jpg)\
    \  \n**Figure 8-4** – The `Image` view, `Text` view, and `Picker` view on the\
    \ user interface\n\n1. Create a new SwiftUI iOS App project and give it any name\
    \ you wish such as “PickerWheel.”\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add the following `State` variable and array declaration under the\
    \ `struct ContentView: View` line:\n\n    ```\n    struct ContentView: View {\n\
    \    let myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n    @State var\
    \ selectedItem = \"\"\n    ```\n\n4. Create a `VStack` and put a `Picker` view\
    \ inside and use the `.wheel` option for its picker style. The `Picker` view must\
    \ bind to the `State` variable `selectedItem`. Inside the `Picker` view, add a\
    \ `ForEach` loop that retrieves each item from the array like this:\n\n    ```\n\
    \    var body: some View {\n    VStack {\n    Picker(\"\", selection: $selectedItem)\
    \ {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n    }\n    }.pickerStyle(.wheel)\n\
    \    }\n    }\n    ```\n\n5. Above the `Picker` view, add an `Image` view, a `Text`\
    \ view, and a `Spacer` like this:\n\n    ```\n    VStack {\n    Image(systemName:\
    \ selectedItem.lowercased())\n    .font(.custom(\"\", size: 60))\n    .foregroundColor(Color.red)\n\
    \    Text(\"You chose = \\(selectedItem)\")\n    Spacer()\n    Picker(\"\", selection:\
    \ $selectedItem) {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n    }\n\
    \    }.pickerStyle(.wheel)\n    }\n    ```\n\n    The `Image` view takes the `selectedItem`\
    \ `State` variable and changes it to lowercase. That’s because each option displayed\
    \ in the `Picker` view (from the array) represents a name of an icon, but each\
    \ icon name consists of lowercase letters. To make this icon visible, the `.font`\
    \ modifier changes the size to 60, and the `.foregroundColor` modifier changes\
    \ the color to red.\n\n    The `Text` view displays the name of the item the user\
    \ selected from the `Picker` view. The `Spacer` pushes the `Image` and `Text`\
    \ views to the top of the screen while pushing the `Picker` view to the bottom\
    \ as shown in Figure [8-4](#329781_7_En_8_Chapter.xhtml#Fig4).\n\n6. Click the\
    \ Live icon in the Canvas pane.\n7. Choose an option from the `Picker` view wheel.\
    \ Each time you choose a different option, notice that the `Text` view displays\
    \ the name of your choice, while the `Image` view displays the appropriate image\
    \ with each choice.\n\n### Populating a Picker with an Enumeration\n\nAn array\
    \ can be one way to populate a `Picker` view. Another way can be by retrieving\
    \ options listed in an enumeration. An enumeration lets you define your own data\
    \ type with a limited list of valid options. To create an enumeration, you need\
    \ to define the enumeration name followed by its data type (such as `String`)\
    \ such as\n\n```\nenum ColorItems: String, CaseIterable, Identifiable {\ncase\
    \ rose\ncase grass\ncase sky\nvar id: Self { self }\n}\n```\n\nFollowing the enumeration\
    \ name (such as `ColorItems`) are `CaseIterable` and `Identifiable`. `CaseIterable`\
    \ means we can access the options listed within the enumeration and treat these\
    \ options (`rose`, `grass`, and `sky`) as data such as `String`s. `Identifiable`\
    \ means the `ForEach` loop can count each item in the enumeration, using the `id:\
    \ Self { self }` variable.\n\nTo see how to populate a `Picker` view using an\
    \ enumeration, follow these steps:\n\n1. Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “PickerEnumeration.”\n2. Click the `ContentView`\
    \ file in the Navigator pane.\n3. Add the following `State` variables and enumeration\
    \ declaration under the `struct ContentView: View` line:\n\n```\n    struct ContentView:\
    \ View {\n    @State private var selectedColor = ColorItems.rose\n    @State var\
    \ myColor = Color.red\n    enum ColorItems: String, CaseIterable, Identifiable\
    \ {\n    case rose\n    case grass\n    case sky\n    var id: Self { self }\n\
    \    }\n    ```\n\nThe `selectedColor` `State` variable represents the `ColorItems`\
    \ enumeration data type (`ColorItems`). The `myColor` `State` variable represents\
    \ a `Color` data type. The `ColorItems` enumeration defines three valid options:\
    \ `rose`, `grass`, or `sky`.\n\n4. Create a `VStack` and add a `Rectangle` and\
    \ a `Picker` view where the picker style is `.wheel`. The `Picker` view must bind\
    \ to the `State` variable `selectedColor`. Inside the `Picker` view, add a `ForEach`\
    \ loop that retrieves each item from the enumeration like this:\n\n```\n    var\
    \ body: some View {\n    VStack  {\n    Rectangle()\n    .fill(myColor)\n    Picker(\"\
    Favorite Color\", selection: $selectedColor) {\n    ForEach(ColorItems.allCases,\
    \ id: \\.self) {catFood in\n    Text(catFood.rawValue.capitalized)\n    }\n  \
    \  }.pickerStyle(.wheel)\n    }\n    ```\n\nThe `Rectangle` contains the color\
    \ defined by the `myColor` `State` variable. The `Picker` view uses a `ForEach`\
    \ loop to retrieve each item from the `ColorItems` enumeration. Because the `ColorItems`\
    \ enumeration was defined as `CaseIterable`, the `ForEach` loop can retrieve each\
    \ item using `.allCases` and the `id` parameter.\n\nThe `ForEach` loop uses an\
    \ arbitrarily named variable (`catFood`) to store each item from the enumeration.\
    \ Then the `Text` view uses each enumeration item, retrieves its `.rawValue` (which\
    \ is the `String` data type “rose”, “grass”, and “sky”), and displays the item\
    \ in the `Picker` view capitalized (“Rose,” “Grass,” and “Sky”).\n\n5. Add `.onChange`\
    \ to the `Picker` view as follows:\n\n```\n    .onChange(of: selectedColor) {\
    \ newValue in\n    switch newValue {\n    case ColorItems.rose: myColor = Color.red\n\
    \    case ColorItems.grass: myColor = Color.green\n    case ColorItems.sky: myColor\
    \ = Color.blue\n    }\n    }\n    ```\n\nWhen `.onChange` detects that the user\
    \ selected a different item from the `Picker` view, it stores that selected item\
    \ in the `newValue` variable. The `switch` statement then checks what option the\
    \ user selected from the `Picker` view (`rose`, `grass`, or `sky`). Based on which\
    \ item the user selected from the `Picker` view, the `switch` statement assigns\
    \ a color to the `myColor` `State` variable. The `myColor` `State` variable immediately\
    \ sends the color to the `Rectangle`.\n\nThe entire `ContentView` file should\
    \ look like this:"
  raw: "### Displaying Options in a Picker\n\nThe most straightforward way to display\
    \ options in a Picker is by using multiple Text views. For small numbers of options,\
    \ this works fine, but if you have a large number of options, especially when\
    \ displaying options using the .wheel picker style, it’s often more convenient\
    \ to use a ForEach loop to retrieve options from an array.\n\nFirst, create an\
    \ array that holds all the options you want to appear in the Picker view such\
    \ as\n\n```\nlet myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n```\n\
    \nThen create a State variable for the Picker view to access:\n\n```\n@State var\
    \ selectedItem = \"\"\n```\n\nFinally, create the Picker view with a ForEach loop\
    \ to retrieve each item in the array like this:\n\n```\nPicker(\"\", selection:\
    \ $selectedItem) {\nForEach(myArray, id: \\.self) {\nText($0)\n}\n```\n\nThe ForEach\
    \ loop needs to know which array to access, and then it uses its id parameter\
    \ to identify each different array item to display in the Text view. The Text\
    \ view uses the shortcut $0 to represent each array item.\n\nTo see how to use\
    \ an array and a ForEach loop to populate a Picker view, follow these steps:\n\
    \n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig4_HTML.jpg)\n\nA screenshot\
    \ of a mobile screen with an icon of a hare and the text, you chose = hare at\
    \ the top, and a wheel with hare selected among other names at the bottom.\n\n\
    Figure 8-4\n\nThe Image view, Text view, and Picker view on the user interface\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “PickerWheel.”\n\n2.  Click the ContentView file in the Navigator pane.\n\
    \n3.  Add the following State variable and array declaration under the struct\
    \ ContentView: View line:\n\n    ```\n    struct ContentView: View {\n    let\
    \ myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"]\n    @State var selectedItem\
    \ = \"\"\n    ```\n\n4.  Create a VStack and put a Picker view inside and use\
    \ the .wheel option for its picker style. The Picker view must bind to the State\
    \ variable selectedItem. Inside the Picker view, add a ForEach loop that retrieves\
    \ each item from the array like this:\n\n    ```\n    var body: some View {\n\
    \    VStack {\n    Picker(\"\", selection: $selectedItem) {\n    ForEach(myArray,\
    \ id: \\.self) {\n    Text($0)\n    }\n    }.pickerStyle(.wheel)\n    }\n    }\n\
    \    ```\n\n5.  Above the Picker view, add an Image view, a Text view, and a Spacer\
    \ like this:\n\n    ```\n    VStack {\n    Image(systemName: selectedItem.lowercased())\n\
    \    .font(.custom(\"\", size: 60))\n    .foregroundColor(Color.red)\n    Text(\"\
    You chose = \\(selectedItem)\")\n    Spacer()\n    Picker(\"\", selection: $selectedItem)\
    \ {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n    }\n    }.pickerStyle(.wheel)\n\
    \    }\n    ```\n\n    The Image view takes the selectedItem State variable and\
    \ changes it to lowercase. That’s because each option displayed in the Picker\
    \ view (from the array) represents a name of an icon, but each icon name consists\
    \ of lowercase letters. To make this icon visible, the .font modifier changes\
    \ the size to 60, and the .foregroundColor modifier changes the color to red.\n\
    \n    The Text view displays the name of the item the user selected from the Picker\
    \ view. The Spacer pushes the Image and Text views to the top of the screen while\
    \ pushing the Picker view to the bottom as shown in Figure [8-4](#329781_7_En_8_Chapter.xhtml#Fig4).\n\
    \n1.  Click the Live icon in the Canvas pane.\n\n2.  Choose an option from the\
    \ Picker view wheel. Each time you choose a different option, notice that the\
    \ Text view displays the name of your choice, while the Image view displays the\
    \ appropriate image with each choice.\n\n### Populating a Picker with an Enumeration\n\
    \nAn array can be one way to populate a Picker view. Another way can be by retrieving\
    \ options listed in an enumeration. An enumeration lets you define your own data\
    \ type with a limited list of valid options. To create an enumeration, you need\
    \ to define the enumeration name followed by its data type (such as String) such\
    \ as\n\n```\nenum ColorItems: String, CaseIterable, Identifiable {\ncase rose\n\
    case grass\ncase sky\nvar id: Self { self }\n}\n```\n\nFollowing the enumeration\
    \ name (such as ColorItems) are CaseIterable and Identifiable. CaseIterable means\
    \ we can access the options listed within the enumeration and treat these options\
    \ (rose, grass, and sky) as data such as Strings. Identifiable means the ForEach\
    \ loop can count each item in the enumeration, using the id: Self { self } variable.\n\
    \nTo see how to populate a Picker view using an enumeration, follow these steps:\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “PickerEnumeration.”\n\n2.  Click the ContentView file in the Navigator pane.\n\
    \n3.  Add the following State variables and enumeration declaration under the\
    \ struct ContentView: View line:\n\n```\n    struct ContentView: View {\n    @State\
    \ private var selectedColor = ColorItems.rose\n    @State var myColor = Color.red\n\
    \    enum ColorItems: String, CaseIterable, Identifiable {\n    case rose\n  \
    \  case grass\n    case sky\n    var id: Self { self }\n    }\n    ```\n\nThe\
    \ selectedColor State variable represents the ColorItems enumeration data type\
    \ (ColorItems). The myColor State variable represents a Color data type. The ColorItems\
    \ enumeration defines three valid options: rose, grass, or sky.\n\n4.  Create\
    \ a VStack and add a Rectangle and a Picker view where the picker style is .wheel.\
    \ The Picker view must bind to the State variable selectedColor. Inside the Picker\
    \ view, add a ForEach loop that retrieves each item from the enumeration like\
    \ this:\n\n```\n    var body: some View {\n    VStack  {\n    Rectangle()\n  \
    \  .fill(myColor)\n    Picker(\"Favorite Color\", selection: $selectedColor) {\n\
    \    ForEach(ColorItems.allCases, id: \\.self) {catFood in\n    Text(catFood.rawValue.capitalized)\n\
    \    }\n    }.pickerStyle(.wheel)\n    }\n    ```\n\nThe Rectangle contains the\
    \ color defined by the myColor State variable. The Picker view uses a ForEach\
    \ loop to retrieve each item from the ColorItems enumeration. Because the ColorItems\
    \ enumeration was defined as CaseIterable, the ForEach loop can retrieve each\
    \ item using .allCases and the id parameter.\n\nThe ForEach loop uses an arbitrarily\
    \ named variable (catFood) to store each item from the enumeration. Then the Text\
    \ view uses each enumeration item, retrieves its .rawValue (which is the String\
    \ data type “rose”, “grass”, and “sky”), and displays the item in the Picker view\
    \ capitalized (“Rose,” “Grass,” and “Sky”).\n\n5.  Add .onChange to the Picker\
    \ view as follows:\n\n```\n    .onChange(of: selectedColor) { newValue in\n  \
    \  switch newValue {\n    case ColorItems.rose: myColor = Color.red\n    case\
    \ ColorItems.grass: myColor = Color.green\n    case ColorItems.sky: myColor =\
    \ Color.blue\n    }\n    }\n    ```\n\nWhen .onChange detects that the user selected\
    \ a different item from the Picker view, it stores that selected item in the newValue\
    \ variable. The switch statement then checks what option the user selected from\
    \ the Picker view (rose, grass, or sky). Based on which item the user selected\
    \ from the Picker view, the switch statement assigns a color to the myColor State\
    \ variable. The myColor State variable immediately sends the color to the Rectangle.\n\
    \nThe entire ContentView file should look like this:"
  trans: "\n### 在 Picker 中显示选项\n\n在 Picker 中显示选项最直接的方式是使用多个 `Text` 视图。对于少量选项，这种方式效果不错，但当你需要显示大量选项时，尤其是在使用\
    \ `.wheel` 拾取器样式时，使用 `ForEach` 循环从数组中获取选项通常更为方便。\n\n首先，创建一个数组，用于存放你想在 `Picker`\
    \ 视图中显示的所有选项，例如：\n\n```\nlet myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"Bird\"\
    ]\n```\n\n接着，为 `Picker` 视图创建一个可供访问的 `State` 变量：\n\n```\n@State var selectedItem\
    \ = \"\"\n```\n\n最后，使用 `ForEach` 循环创建 `Picker` 视图来获取数组中的每个元素，如下所示：\n\n```\nPicker(\"\
    \", selection: $selectedItem) {\nForEach(myArray, id: \\.self) {\nText($0)\n}\n\
    ```\n\n`ForEach` 循环需要知道要访问哪个数组，然后它使用 `id` 参数来标识要在 `Text` 视图中显示的每个不同的数组项。`Text`\
    \ 视图使用快捷方式 `$0` 来表示每个数组项。\n\n要了解如何使用数组和 `ForEach` 循环来填充 `Picker` 视图，请执行以下步骤：\n\
    \n![一张移动屏幕的截图，顶部显示一个野兔图标和文字“You chose = hare”，底部是一个轮盘，其中 hare 被选中](img/329781_7_En_8_Fig4_HTML.jpg)\
    \  \n**图 8-4** – 用户界面上的 `Image` 视图、`Text` 视图和 `Picker` 视图\n\n1. 创建一个新的 SwiftUI\
    \ iOS App 项目，并为其取一个你喜欢的名称，例如 “PickerWheel”。\n2. 在导航器面板中点击 `ContentView` 文件。\n\
    3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量和数组声明：\n\n    ```\n    struct\
    \ ContentView: View {\n    let myArray = [\"Fish\", \"Tortoise\", \"Hare\", \"\
    Bird\"]\n    @State var selectedItem = \"\"\n    ```\n\n4. 创建一个 `VStack`，在其中放入一个\
    \ `Picker` 视图，并为其拾取器样式使用 `.wheel` 选项。`Picker` 视图必须绑定到 `State` 变量 `selectedItem`。在\
    \ `Picker` 视图内部，添加一个 `ForEach` 循环，从数组中获取每个元素，如下所示：\n\n    ```\n    var body: some\
    \ View {\n    VStack {\n    Picker(\"\", selection: $selectedItem) {\n    ForEach(myArray,\
    \ id: \\.self) {\n    Text($0)\n    }\n    }.pickerStyle(.wheel)\n    }\n    }\n\
    \    ```\n\n5. 在 `Picker` 视图上方，添加一个 `Image` 视图、一个 `Text` 视图和一个 `Spacer`，如下所示：\n\
    \n    ```\n    VStack {\n    Image(systemName: selectedItem.lowercased())\n  \
    \  .font(.custom(\"\", size: 60))\n    .foregroundColor(Color.red)\n    Text(\"\
    You chose = \\(selectedItem)\")\n    Spacer()\n    Picker(\"\", selection: $selectedItem)\
    \ {\n    ForEach(myArray, id: \\.self) {\n    Text($0)\n    }\n    }.pickerStyle(.wheel)\n\
    \    }\n    ```\n\n    `Image` 视图获取 `selectedItem` `State` 变量并将其转换为小写。这是因为 `Picker`\
    \ 视图中显示的每个选项（来自数组）都代表一个图标的名称，但每个图标名称都由小写字母组成。为了使此图标可见，`.font` 修饰符将大小更改为 60，`.foregroundColor`\
    \ 修饰符将颜色更改为红色。\n\n    `Text` 视图显示用户从 `Picker` 视图中选择的项目名称。`Spacer` 将 `Image` 和\
    \ `Text` 视图推到屏幕顶部，同时将 `Picker` 视图推到屏幕底部，如图 8-4 所示。\n\n6. 在画布面板中点击 Live 图标。\n7.\
    \ 从 `Picker` 视图的轮盘中选择一个选项。每次你选择不同的选项时，请注意，`Text` 视图会显示你选择的名称，而 `Image` 视图会为每个选择显示相应的图像。\n\
    \n### 使用枚举填充 Picker\n\n数组是填充 `Picker` 视图的一种方式。另一种方式是从枚举中检索选项。枚举允许你定义自己的数据类型，并附带一个有限的有效选项列表。要创建一个枚举，你需要定义枚举名称及其数据类型（例如\
    \ `String`），如下所示：\n\n```\nenum ColorItems: String, CaseIterable, Identifiable\
    \ {\ncase rose\ncase grass\ncase sky\nvar id: Self { self }\n}\n```\n\n在枚举名称（例如\
    \ `ColorItems`）之后是 `CaseIterable` 和 `Identifiable`。`CaseIterable` 意味着我们可以访问枚举中列出的选项，并将这些选项（`rose`、`grass`\
    \ 和 `sky`）作为数据（例如 `String`）处理。`Identifiable` 意味着 `ForEach` 循环可以使用 `id: Self {\
    \ self }` 变量来计数枚举中的每个项。\n\n要了解如何使用枚举填充 `Picker` 视图，请执行以下步骤：\n\n1. 创建一个新的 SwiftUI\
    \ iOS App 项目，并为其取一个你喜欢的名称，例如 “PickerEnumeration”。\n2. 在导航器面板中点击 `ContentView`\
    \ 文件。\n3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量和枚举声明：\n\n```\n    struct\
    \ ContentView: View {\n    @State private var selectedColor = ColorItems.rose\n\
    \    @State var myColor = Color.red\n    enum ColorItems: String, CaseIterable,\
    \ Identifiable {\n    case rose\n    case grass\n    case sky\n    var id: Self\
    \ { self }\n    }\n    ```\n\n`selectedColor` `State` 变量代表 `ColorItems` 枚举数据类型。`myColor`\
    \ `State` 变量代表 `Color` 数据类型。`ColorItems` 枚举定义了三个有效选项：`rose`、`grass` 或 `sky`。\n\
    \n4. 创建一个 `VStack`，并添加一个 `Rectangle` 和一个拾取器样式为 `.wheel` 的 `Picker` 视图。`Picker`\
    \ 视图必须绑定到 `State` 变量 `selectedColor`。在 `Picker` 视图内部，添加一个 `ForEach` 循环，从枚举中获取每个元素，如下所示：\n\
    \n```\n    var body: some View {\n    VStack  {\n    Rectangle()\n    .fill(myColor)\n\
    \    Picker(\"Favorite Color\", selection: $selectedColor) {\n    ForEach(ColorItems.allCases,\
    \ id: \\.self) {catFood in\n    Text(catFood.rawValue.capitalized)\n    }\n  \
    \  }.pickerStyle(.wheel)\n    }\n    ```\n\n`Rectangle` 包含由 `myColor` `State`\
    \ 变量定义的颜色。`Picker` 视图使用 `ForEach` 循环从 `ColorItems` 枚举中检索每个项。因为 `ColorItems` 枚举被定义为\
    \ `CaseIterable`，所以 `ForEach` 循环可以使用 `.allCases` 和 `id` 参数来检索每个项。\n\n`ForEach`\
    \ 循环使用一个任意命名的变量 (`catFood`) 来存储枚举中的每个项。然后，`Text` 视图使用每个枚举项，检索其 `.rawValue`（即字符串类型的\
    \ \"rose\"、\"grass\" 和 \"sky\"），并以大写形式在 `Picker` 视图中显示该项（\"Rose\"、\"Grass\" 和\
    \ \"Sky\"）。\n\n5. 为 `Picker` 视图添加 `.onChange`，如下所示：\n\n```\n    .onChange(of:\
    \ selectedColor) { newValue in\n    switch newValue {\n    case ColorItems.rose:\
    \ myColor = Color.red\n    case ColorItems.grass: myColor = Color.green\n    case\
    \ ColorItems.sky: myColor = Color.blue\n    }\n    }\n    ```\n\n当 `.onChange`\
    \ 检测到用户从 `Picker` 视图选择了不同的项时，它会将该选中的项存储在 `newValue` 变量中。然后，`switch` 语句会检查用户从 `Picker`\
    \ 视图中选择了哪个选项（`rose`、`grass` 或 `sky`）。根据用户从 `Picker` 视图中选择的项，`switch` 语句会为 `myColor`\
    \ `State` 变量分配一个颜色。`myColor` `State` 变量会立即将颜色发送给 `Rectangle`。\n\n完整的 `ContentView`\
    \ 文件应如下所示：\n"
- fmt: "```swift\nimport SwiftUI\n\nstruct ContentView: View {\n    @State private\
    \ var selectedColor = ColorItems.rose\n    @State var myColor = Color.red\n\n\
    \    enum ColorItems: String, CaseIterable, Identifiable {\n        case rose\n\
    \        case grass\n        case sky\n        var id: Self { self }\n    }\n\n\
    \    var body: some View {\n        VStack {\n            Rectangle()\n      \
    \          .fill(myColor)\n            Picker(\"Favorite Color\", selection: $selectedColor)\
    \ {\n                ForEach(ColorItems.allCases, id: \\.self) { catFood in\n\
    \                    Text(catFood.rawValue.capitalized)\n                }\n \
    \           }\n            .pickerStyle(.wheel)\n            .onChange(of: selectedColor)\
    \ { newValue in\n                switch newValue {\n                case ColorItems.rose:\
    \ myColor = Color.red\n                case ColorItems.grass: myColor = Color.green\n\
    \                case ColorItems.sky: myColor = Color.blue\n                }\n\
    \            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6.  Click the Live icon in the Canvas pane.\n7.  Click the `Picker` view and\
    \ choose an option. Whatever option you choose, the related color will appear\
    \ in the `Rectangle`.\n\n## Using the Color Picker\n\nAn ordinary `Picker` lets\
    \ you select different options displayed in a `Text` view. However, what if you\
    \ want the user to select a particular color? You could list several colors in\
    \ a `Picker`, but what if the user wants to select a custom color? That’s when\
    \ you can use the Color Picker.\n\nThe Color Picker lets the user select standard\
    \ colors (red, blue, green, yellow, etc.) or custom colors from a grid or a spectrum\
    \ or from red, green, and blue sliders as shown in Figure [8-5](#329781_7_En_8_Chapter.xhtml#Fig5).\n\
    \n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig5_HTML.jpg)\n\n3 cropped screenshots\
    \ of the pick a color window with a color box and sliders of various colors and\
    \ the option for opacity. The first one has the grid tab selected. The second\
    \ one has the spectrum tab selected. The third one has the sliders tab selected\
    \ with sliders for red, green, and blue.\n\n**Figure 8-5** A Color Picker gives\
    \ you three different options for choosing a custom color\n\nTo create a Color\
    \ Picker, you must first create a `State` variable to hold a `Color` data type\
    \ such as\n\n```\n@State var myColor = Color.red\n```\n\nThen you can create a\
    \ Color Picker by defining a descriptive title followed by a link to the `State`\
    \ variable that represents a `Color` like this:\n\n```\nColorPicker(\"Pick a color\"\
    , selection: $myColor)\n```\n\nTo see how a Color Picker works, follow these steps:\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “ColorPicker.”\n2.  Click the `ContentView` file in the Navigator pane.\n\
    3.  Add the following `State` variable under the `struct ContentView: View` line:\n\
    \n```\nstruct ContentView: View {\n    @State var myColor = Color.gray\n```\n\n\
    4.  Create a `VStack` and put a `Rectangle` inside. Since a `Rectangle` will expand\
    \ to fill the entire screen, make sure you put a `.frame` modifier on it and define\
    \ its `.foregroundColor` with the previously defined `State` variable:\n\n```\n\
    var body: some View {\n    VStack {\n        Rectangle()\n            .frame(width:\
    \ 200, height: 150)\n            .foregroundColor(myColor)\n    }\n}\n```\n\n\
    5.  Underneath the `Rectangle()`, define a Color Picker that links or binds to\
    \ the `State` variable:\n\n```\nColorPicker(\"Pick a color\", selection: $myColor)\n\
    ```\n\nThe entire `ContentView` file should look like this:\n\n![](images/329781_7_En_8_Chapter/329781_7_En_8_Fig6_HTML.jpg)\n\
    \nA screenshot of the text title points to pick a color on the left, and the text\
    \ color picker icon points to a round color gradient icon on the right.\n\n**Figure\
    \ 8-6** The Color Picker icon\n\n6.  Click the Live icon in the Canvas pane. Notice\
    \ that since the `State` variable `myColor` is given an initial value of gray,\
    \ the `Rectangle` initially appears as gray.\n7.  Click the Color Picker icon,\
    \ as shown in Figure [8-6](#329781_7_En_8_Chapter.xhtml#Fig6), to display the\
    \ different color options (see Figure [8-4](#329781_7_En_8_Chapter.xhtml#Fig4)).\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var myColor =\
    \ Color.gray\n\n    var body: some View {\n        VStack {\n            Rectangle()\n\
    \                .frame(width: 200, height: 150)\n                .foregroundColor(myColor)\n\
    \            ColorPicker(\"Pick a color\", selection: $myColor)\n        }\n \
    \   }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n8.  Click a color and then\
    \ click the close (X) icon in the upper-right corner of the Color Picker dialog\
    \ to make it go away. Notice that the `Rectangle` now displays the color you chose.\n\
    \nThe Color Picker not only lets users select a color but also an opacity. By\
    \ default, opacity is turned on, but if you want to turn it off, you can turn\
    \ it off by changing the `supportsOpacity` parameter to `false` like this:\n\n\
    ```\nColorPicker(\"Pick a color\", selection: $myColor, supportsOpacity: false)\n\
    ```\n\nWhen the `supportsOpacity` parameter is `true` (or omitted), the opacity\
