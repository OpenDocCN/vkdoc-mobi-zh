    About the Author About the Technical Reviewer


    # 1. Understanding iOS Programming


    Programming involves writing commands for a computer to follow. In iOS programming,
    the computer is either an iPhone or an iPad. To create apps for an iPhone or iPad,
    you need to learn three different skills:


    *   How to write commands in the Swift programming language


    *   How to use Apple’s software frameworks


    *   How to create user interfaces in Xcode


    You need to write commands in the Swift programming language to make your app
    do something unique. Then you rely on Apple’s software frameworks to handle common
    tasks such as detecting touch gestures or accessing the camera. Finally, you design
    your app’s user interface.


    Apple’s software frameworks let you perform common tasks without writing (and
    testing) your own Swift code. By relying on Apple’s proven and tested software
    frameworks, you can focus solely on the unique features of your app rather than
    the mundane details of making an app access different hardware features of an
    iPhone or iPad.


    Ideally, you want your user interface to look good by adapting to all different
    screen sizes such as an iPhone or iPad. The user interface lets you display information
    to the user and retrieve information from the user. The best user interface is
    one that doesn’t require even thinking about.


    Essentially, every iOS app consists of three parts as shown in Figure [1-1](#329781_7_En_1_Chapter.xhtml#Fig1):


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig1_HTML.png)


    Three rectangular blocks represent the three components of an i O S application.
    From top to bottom, your code, user interface, and I O S frameworks.


    Figure 1-1


    The three parts of an iOS app


    *   Your code to make an app do something useful


    *   A user interface that you can design visually in Xcode


    *   Access to hardware features of an iOS device through one or more of Apple’s
    iOS frameworks


    Apple provides dozens of frameworks for iOS (and their other operating systems
    as well such as macOS, watchOS, and tvOS). By simply using Apple’s frameworks,
    you can accomplish common tasks by writing little code of your own. Some of Apple’s
    available frameworks include


    *   SwiftUI – User interface and touch screen support


    *   ARKit – Augmented reality features


    *   Core Animation – Displays animation


    *   GameKit – Creates multiplayer interactive apps


    *   Contacts – Accesses the Contacts data on an iOS device


    *   SiriKit – Allows the use of voice commands through Siri


    *   AVKit – Allows playing of audio and video files


    *   Media Library – Allows access to images, audio, and video stored on an iOS
    device


    *   CallKit – Provides voice calling features


    Apple’s frameworks essentially contain code that you can reuse. This makes apps
    more reliable and consistent while also saving developers’ time by using proven
    code that works correctly. To see a complete list of Apple’s available software
    frameworks, visit the Apple Developer Documentation site ([`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)).


    Apple’s frameworks can give you a huge head start in creating an iOS app, but
    you still need to provide a user interface so users can interact with your app.
    While you could create a user interface from scratch, this would also be tedious,
    time-consuming, and error-prone. Even worse, if every app developer created a
    user interface from scratch, no two iOS apps would look or work exactly the same,
    confusing users.


    That’s why Apple’s Xcode compiler helps you design user interfaces with standard
    features used in most apps such as buttons, labels, text fields, and sliders.
    In Xcode, each window of a user interface is called a view. While simple iOS apps
    may consist of a single view (think of the Calculator app on an iPhone), more
    sophisticated iOS apps consist of multiple views.


    To create user interfaces, Xcode offers two options:


    *   Storyboards


    *   SwiftUI


    Storyboards let you design user interfaces visually by placing user interface
    objects at specific locations on the screen as shown in Figure [1-2](#329781_7_En_1_Chapter.xhtml#Fig2).
    Unfortunately, using fixed values to define the position of various objects on
    a user interface means that storyboard user interfaces do not adapt easily to
    different-size iOS device screens or orientations (portrait or landscape).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig2_HTML.jpg)


    A screenshot of the storyboard user interface. The rectangle on the left is drawn
    with the width and height being, respectively, x = 85 and y = 241\. The following
    field is located in the view section on the right. Show drop down menu, arrange,
    layout, and auto resizing.


    Figure 1-2


    Storyboards use fixed values to define the arrangement of objects on a user interface


    Since fixed values for arranging objects on a user interface won’t adapt to different
    screen sizes, Apple offers a second way to design user interfaces using a framework
    called SwiftUI. The main idea behind SwiftUI is that you place objects in the
    center of the user interface and define their position relative to the center.


    When the screen size is large, the distance between user interface objects expands.
    When the screen size is small, the distance between user interface objects shrinks,
    so the user interface adapts to the screen size automatically as shown in Figure
    [1-3](#329781_7_En_1_Chapter.xhtml#Fig3).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig3_HTML.jpg)


    Two illustrations of the mobile phone in different sizes. It demonstrates the
    Swift U I user interface. The following buttons are present at the center. Home
    screen and go to second view.


    Figure 1-3


    SwiftUI user interfaces can adapt to different screen sizes automatically


    You can use storyboards and SwiftUI together in a single project, or you can use
    either storyboards or SwiftUI by themselves. Because SwiftUI represents the future
    for developing apps for all of Apple’s products, this book focuses exclusively
    on creating user interfaces using SwiftUI rather than storyboards.'
  trans: "\n![](img/978-1-4842-9541-0_CoverFigure.jpg)\n\nISBN 978-1-4842-9540-3 电子书\
    \ ISBN 978-1-4842-9541-0 [`doi.org/10.1007/978-1-4842-9541-0`](https://doi.org/10.1007/978-1-4842-9541-0)\
    \  \n© Wallace Wang 2014, 2015, 2016, 2017, 2019, 2022, 2023  \n本作品受版权保护。版权所有，无论是全部还是部分材料，均由出版商独家授权，具体包括翻译、重印、插图重用、朗诵、广播、以微缩胶片或任何其他物理形式复制，以及通过电子方式改编、计算机软件或现在已知或未来开发的类似或不同方法进行传输或信息存储与检索。在本出版物中使用通用描述性名称、注册商标名称、商标、服务标记等，即使没有明确声明，也不意味着这些名称不受相关保护性法律和法规的约束，因此可自由通用。出版商、作者和编辑可以合理地假设，本书中的建议和信息在出版之日是真实和准确的。出版商、作者或编辑均不对本材料中包含的内容或可能存在的任何错误或遗漏提供明示或暗示的保证。对于出版地图中的管辖权主张和机构隶属关系，出版商保持中立立场。\n\
    \n本 Apress 印记由注册公司 APress Media, LLC 出版，该公司隶属于 Springer Nature。  \n注册公司地址为：1 New\
    \ York Plaza, New York, NY 10004, U.S.A.\n\n关于作者  \n关于技术审阅者\n\n# 1. 理解 iOS 编程\n\
    \n编程涉及编写供计算机遵循的指令。在 iOS 编程中，计算机指的就是 iPhone 或 iPad。要为 iPhone 或 iPad 创建应用，你需要学习三种不同的技能：\n\
    \n- 如何用 Swift 编程语言编写指令\n- 如何使用苹果的软件框架\n- 如何在 Xcode 中创建用户界面\n\n你需要用 Swift 编程语言编写指令，让应用实现独特的功能。然后，依赖苹果的软件框架来处理诸如检测触摸手势或访问摄像头等常见任务。最后，设计应用的用户界面。\n\
    \n苹果的软件框架让你无需编写（和测试）自己的 Swift 代码就能执行常见任务。通过依赖苹果成熟且经过测试的软件框架，你可以专注于应用的独特功能，而不是处理让应用访问\
    \ iPhone 或 iPad 不同硬件功能的繁琐细节。\n\n理想情况下，你希望用户界面能够适应 iPhone 或 iPad 等所有不同的屏幕尺寸，看起来美观。用户界面用于向用户显示信息并从用户那里获取信息。最好的用户界面是那种甚至无需用户思考的界面。\n\
    \n本质上，每个 iOS 应用都由三部分组成，如图 1-1 所示：\n\n![](img/329781_7_En_1_Fig1_HTML.png)\n\n\
    **图 1-1** iOS 应用的三个组成部分\n\n- 你的代码，使应用实现有用的功能\n- 可在 Xcode 中可视设计的用户界面\n- 通过一个或多个苹果\
    \ iOS 框架访问 iOS 设备的硬件功能\n\n苹果为 iOS（及其其他操作系统，如 macOS、watchOS 和 tvOS）提供了数十个框架。只需使用苹果的框架，你就能通过编写少量自己的代码来完成常见任务。苹果提供的一些框架包括：\n\
    \n- `SwiftUI` – 用户界面和触摸屏支持\n- `ARKit` – 增强现实功能\n- `Core Animation` – 显示动画\n- `GameKit`\
    \ – 创建多人互动应用\n- `Contacts` – 访问 iOS 设备上的通讯录数据\n- `SiriKit` – 允许通过 Siri 使用语音命令\n\
    - `AVKit` – 允许播放音频和视频文件\n- `Media Library` – 允许访问存储在 iOS 设备上的图片、音频和视频\n- `CallKit`\
    \ – 提供语音通话功能\n\n苹果的框架本质上包含可以重复使用的代码。这使得应用更可靠、更一致，同时通过使用经过验证的正确代码，也节省了开发者的时间。要查看苹果可用软件框架的完整列表，请访问苹果开发者文档网站（[`https://developer.apple.com/documentation`](https://developer.apple.com/documentation)）。\n\
    \n苹果的框架可以为创建 iOS 应用提供巨大的先发优势，但你仍然需要提供一个用户界面，以便用户能够与你的应用进行交互。虽然你可以从头开始创建用户界面，但这同样繁琐、耗时且容易出错。更糟糕的是，如果每个应用开发者都从头创建用户界面，那么\
    \ iOS 应用的外观和操作方式就会各不相同，让用户感到困惑。\n\n正因如此，苹果的 Xcode 编译器能帮助你使用大多数应用中常见的标准功能（如按钮、标签、文本字段和滑块）来设计用户界面。在\
    \ Xcode 中，用户界面的每个窗口被称为**视图**。虽然简单的 iOS 应用可能只包含一个视图（想想 iPhone 上的计算器应用），但更复杂的 iOS\
    \ 应用包含多个视图。\n\n为了创建用户界面，Xcode 提供了两种选择：\n\n- Storyboards\n- `SwiftUI`\n\nStoryboards\
    \ 让你通过将用户界面对象放置在屏幕上的特定位置来可视化设计用户界面，如图 1-2 所示。不幸的是，使用固定值来定义用户界面上各种对象的位置，意味着 Storyboard\
    \ 用户界面不容易适应不同尺寸的 iOS 设备屏幕或方向（竖屏或横屏）。\n\n![](img/329781_7_En_1_Fig2_HTML.jpg)\n\
    \n**图 1-2** Storyboards 使用固定值来定义用户界面上对象的排列方式\n\n由于使用固定值排列用户界面上的对象无法适应不同的屏幕尺寸，苹果提供了第二种设计用户界面的方法，即使用名为`SwiftUI`的框架。`SwiftUI`的主要思想是将对象放置在用户界面的中心，并定义它们相对于中心的位置。\n\
    \n当屏幕尺寸较大时，用户界面对象之间的距离会扩大。当屏幕尺寸较小时，用户界面对象之间的距离会缩小，因此用户界面会自动适应屏幕尺寸，如图 1-3 所示。\n\
    \n![](img/329781_7_En_1_Fig3_HTML.jpg)\n\n**图 1-3** `SwiftUI`用户界面可以自动适应不同的屏幕尺寸\n\
    \n你可以在一个项目中将 Storyboards 和`SwiftUI`结合使用，也可以单独使用 Storyboards 或`SwiftUI`。由于`SwiftUI`代表了为所有苹果产品开发应用的未来，本书将专注于使用`SwiftUI`而非\
    \ Storyboards 来创建用户界面。\n"
- fmt: "# Learning About Xcode\n\nLearning iOS development is more than just learning\
    \ how to write code in the `Swift` programming language. Besides knowing `Swift`,\
    \ you must also know how to find and use Apple’s different software frameworks,\
    \ how to use `Xcode` to design your user interface using `SwiftUI`, and how to\
    \ organize, create, and delete files that contain your `Swift` code. In addition,\
    \ you must also learn how to write code using `Xcode`’s editor.\n\nEach time you\
    \ create an `Xcode` project, you’re actually creating a folder that contains multiple\
    \ files. A simple iOS app might consist of a handful of files, while a complicated\
    \ app might contain hundreds or even thousands of separate files.\n\nBy storing\
    \ code in separate files, you can quickly identify the file that contains the\
    \ data you want to edit and modify while safely ignoring other files. No matter\
    \ how many files a project may hold, `Xcode` treats them as if all your `Swift`\
    \ code were stored in a single file. By breaking up your program into multiple\
    \ files, you can group different parts of your program in separate files to organize\
    \ your app.\n\nTo further help you organize multiple files in a project, `Xcode`\
    \ lets you create separate folders. These folders exist solely for your convenience\
    \ in organizing your code. Figure 1-4 shows how `Xcode` can divide an app into\
    \ folders and files.\n\n![Figure 1-4](images/329781_7_En_1_Chapter/329781_7_En_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4** – `Xcode` stores your code in files that you can organize in\
    \ folders\n\nTo get acquainted with iOS app development, let’s start with a simple\
    \ project that will teach you:\n\n- How to understand the parts of a project\n\
    - How to view different files\n- How the different parts of `Xcode` work\n\n![Figure\
    \ 1-5](images/329781_7_En_1_Chapter/329781_7_En_1_Fig5_HTML.jpg)\n\n**Figure 1-5**\
    \ – The `Xcode` welcoming screen\n\n1.  Start `Xcode`. A welcoming screen appears\
    \ that lets you choose a recently used project or the option of creating a new\
    \ project as shown in Figure 1-5. (You can always open this welcoming screen from\
    \ within `Xcode` by choosing **Windows ➤ Welcome to Xcode** or by pressing `Shift\
    \ + Command + 1`.)\n\n![Figure 1-6](images/329781_7_En_1_Chapter/329781_7_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6** – Choosing a project template\n\n2.  Click the **Create a new\
    \ Xcode project** option. `Xcode` displays templates for designing different types\
    \ of apps as shown in Figure 1-6. Notice that the top of the template window displays\
    \ different operating systems you can develop apps for such as iOS, watchOS, tvOS,\
    \ and macOS. By selecting different operating systems, you can create projects\
    \ designed for the devices that run that particular operating system.\n\n![Figure\
    \ 1-7](images/329781_7_En_1_Chapter/329781_7_En_1_Fig7_HTML.jpg)\n\n**Figure 1-7**\
    \ – Defining a project name, organization name, and organization identifier\n\n\
    3.  Click **iOS** and then click **App**. The `App` template represents the most\
    \ basic iOS project.\n4.  Click the **Next** button. Another window appears, asking\
    \ for your project name along with an organization name and organization identifier\
    \ as shown in Figure 1-7. You must fill out all three text fields, but the project\
    \ name, organization name, and organization identifier can be any descriptive\
    \ text that you want. Notice that the user interface popup menu lets you choose\
    \ between `SwiftUI` and `Storyboard`. For every project in this book, always make\
    \ sure you choose `SwiftUI`.\n5.  Click in the **Project Name** text field and\
    \ type a name for your project such as `MyFirstApp`.\n6.  Click in the **Team**\
    \ text field and type your name or company name.\n7.  Click in the **Organization\
    \ Identifier** text field and type any identifying text you wish. Typically this\
    \ identifier is your website spelled backward such as `com.microsoft`.\n8.  Click\
    \ the **Interface** popup menu and choose **SwiftUI**. Make sure that all checkboxes\
    \ are clear. Then click the **Next** button. `Xcode` displays a dialog for you\
    \ to choose which drive and folder to store your project in.\n9.  Choose a drive\
    \ and folder and click the **Create** button. `Xcode` displays your newly created\
    \ project.\n\nThe `Xcode` window may initially look confusing, but you need to\
    \ see that `Xcode` groups information in several panes. The far-left pane is called\
    \ the **Navigator** pane. By clicking icons at the top of the **Navigator** pane,\
    \ you can view different parts of your project as shown in Figure 1-8.\n\n![Figure\
    \ 1-8](images/329781_7_En_1_Chapter/329781_7_En_1_Fig8_HTML.jpg)\n\n**Figure 1-8**\
    \ – The **Navigator** pane appears on the far left of the `Xcode` window\n\nThe\
    \ main `SwiftUI` file is called `ContentView`, which contains `Swift` code that\
    \ defines the user interface of an app:\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    var body: some View {\n        VStack {\n            Image(systemName:\
    \ \"globe\")\n                .imageScale(.large)\n                .foregroundColor(.accentColor)\n\
    \            Text(\"Hello, world!\")\n        }\n        .padding()\n    }\n}\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\nThe `import SwiftUI` line lets\
    \ your app use the `SwiftUI` framework for designing user interfaces.\n\nThe `ContentView:\
    \ View` structure displays a single view on the screen. `SwiftUI` can only display\
    \ one view at a time on the screen. When you create a `SwiftUI` iOS app, the default\
    \ view is a vertical stack (`VStack`) that contains an `Image` view and a `Text`\
    \ view. The `Image` view displays a globe icon, and the `Text` view displays “Hello,\
    \ world!” on the screen.\n\nThe `ContentView_Previews: PreviewProvider` structure\
    \ actually displays the user interface in the **Canvas** pane, which appears to\
    \ the right of the `Swift` code as shown in Figure 1-9.\n\n![Figure 1-9](images/329781_7_En_1_Chapter/329781_7_En_1_Fig9_HTML.jpg)\n\
    \n**Figure 1-9** – The **Editor** pane and the **Canvas** pane\n\nWhen the **Editor**\
    \ pane and the **Canvas** pane appear side by side, any changes you make to the\
    \ **Editor** pane appear in the **Canvas** pane and vice versa. If you click the\
    \ **Editor Options** icon in the upper-right corner, you can hide or display the\
    \ **Canvas** pane as shown in Figure 1-10.\n\n![Figure 1-10](images/329781_7_En_1_Chapter/329781_7_En_1_Fig10_HTML.jpg)\n\
    \n**Figure 1-10** – The **Editor Options** icon lets you toggle between displaying\
    \ and hiding the **Canvas** pane\n\nThe **Canvas** pane serves two purposes. First,\
    \ it lets you see exactly what your user interface looks like on a simulated iOS\
    \ device. Besides letting you switch between different simulated iOS devices (such\
    \ as between different iPhone or iPad models), the **Canvas** pane also lets you\
    \ select different settings such as light or dark mode and dynamic type. Changing\
    \ iOS settings lets you see how your user interface might look under different\
    \ appearance options."
  raw: '## Learning About Xcode


    Learning iOS development is more than just learning how to write code in the Swift
    programming language. Besides knowing Swift, you must also know how to find and
    use Apple’s different software frameworks, how to use Xcode to design your user
    interface using SwiftUI, and how to organize, create, and delete files that contain
    your Swift code. In addition, you must also learn how to write code using Xcode’s
    editor.


    Each time you create an Xcode project, you’re actually creating a folder that
    contains multiple files. A simple iOS app might consist of a handful of files,
    while a complicated app might contain hundreds or even thousands of separate files.


    By storing code in separate files, you can quickly identify the file that contains
    the data you want to edit and modify while safely ignoring other files. No matter
    how many files a project may hold, Xcode treats them as if all your Swift code
    were stored in a single file. By breaking up your program into multiple files,
    you can group different parts of your program in separate files to organize your
    app.


    To further help you organize multiple files in a project, Xcode lets you create
    separate folders. These folders exist solely for your convenience in organizing
    your code. Figure [1-4](#329781_7_En_1_Chapter.xhtml#Fig4) shows how Xcode can
    divide an app into folders and files.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig4_HTML.jpg)


    A screenshot contains the following folders and files. Delete Me 2 includes the
    Delete Me 2 app, content view, and asset files.


    Figure 1-4


    Xcode stores your code in files that you can organize in folders


    To get acquainted with iOS app development, let’s start with a simple project
    that will teach you


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig5_HTML.jpg)


    A screenshot of the welcome screen of Xcode is depicted. Three options, such as
    create a new Xcode project, clone an existing project, and open a project or file
    are present. On the right, the slider offset U I template is selected.


    Figure 1-5


    The Xcode welcoming screen


    1.  Start Xcode. A welcoming screen appears that lets you choose a recently used
    project or the option of creating a new project as shown in Figure [1-5](#329781_7_En_1_Chapter.xhtml#Fig5).
    (You can always open this welcoming screen from within Xcode by choosing Windows
    ➤ Welcome to Xcode or by pressing Shift + Command + 1.


    *   How to understand the parts of a project


    *   How to view different files


    *   How the different parts of Xcode work


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig6_HTML.jpg)


    A screenshot titled choose a template for your new project contains two sections.
    In the i O S tab, application and framework and library sections are available.
    The app option is highlighted in the application section.


    Figure 1-6


    Choosing a project template


    1.  Click the **Create a new Xcode project** option. Xcode displays templates
    for designing different types of apps as shown in Figure [1-6](#329781_7_En_1_Chapter.xhtml#Fig6).
    Notice that the top of the template window displays different operating systems
    you can develop apps for such as iOS, watchOS, tvOS, and macOS. By selecting different
    operating systems, you can create projects designed for the devices that run that
    particular operating system.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig7_HTML.jpg)


    A screenshot titled choose options for your project highlights the interface menu.
    The Swift U I option is highlighted.


    Figure 1-7


    Defining a project name, organization name, and organization identifier


    1.  Click **iOS** and then click **App**. The App template represents the most
    basic iOS project.


    2.  Click the **Next** button. Another window appears, asking for your project
    name along with an organization name and organization identifier as shown in Figure
    [1-7](#329781_7_En_1_Chapter.xhtml#Fig7). You must fill out all three text fields,
    but the project name, organization name, and organization identifier can be any
    descriptive text that you want. Notice that the user interface popup menu lets
    you choose between SwiftUI and Storyboard. For every project in this book, always
    make sure you choose SwiftUI.


    1.  Click in the Project Name text field and type a name for your project such
    as MyFirstApp.


    2.  Click in the Team text field and type your name or company name.


    3.  Click in the Organization Identifier text field and type any identifying text
    you wish. Typically this identifier is your website spelled backward such as com.microsoft.


    4.  Click the Interface popup menu and choose **SwiftUI**. Make sure that all
    checkboxes are clear. Then click the **Next** button. Xcode displays a dialog
    for you to choose which drive and folder to store your project in.


    5.  Choose a drive and folder and click the **Create** button. Xcode displays
    your newly created project.


    The Xcode window may initially look confusing, but you need to see that Xcode
    groups information in several panes. The far-left pane is called the Navigator
    pane. By clicking icons at the top of the Navigator pane, you can view different
    parts of your project as shown in Figure [1-8](#329781_7_En_1_Chapter.xhtml#Fig8).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig8_HTML.jpg)


    A screenshot of the navigator pane. From the delete me 2 folder, the content view
    option is chosen.


    Figure 1-8


    The Navigator pane appears on the far left of the Xcode window


    The main SwiftUI file is called ContentView, which contains Swift code that defines
    the user interface of an app:


    ```

    import SwiftUI

    struct ContentView: View {

    var body: some View {

    VStack {

    Image(systemName: "globe")

    .imageScale(.large)

    .foregroundColor(.accentColor)

    Text("Hello, world!")

    }

    .padding()

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The import SwiftUI line lets your app use the SwiftUI framework for designing
    user interfaces.


    The ContentView: View structure displays a single view on the screen. SwiftUI
    can only display one view at a time on the screen. When you create a SwiftUI iOS
    app, the default view is a vertical stack (VStack) that contains an Image view
    and a Text view. The Image view displays a globe icon, and the Text view displays
    “Hello, world!” on the screen.


    The ContentView_Previews: PreviewProvider structure actually displays the user
    interface in the Canvas pane, which appears to the right of the Swift code as
    shown in Figure [1-9](#329781_7_En_1_Chapter.xhtml#Fig9).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig9_HTML.jpg)


    A screenshot demonstrates the four sections. Navigator pane, editor pane, canvas
    pane, and inspector pane. The editor and canvas pane are highlighted. Editor pane
    includes the set of codes, whereas the canvas pane includes an interface illustration.


    Figure 1-9


    The Editor pane and the Canvas pane


    When the Editor pane and the Canvas pane appear side by side, any changes you
    make to the Editor pane appear in the Canvas pane and vice versa. If you click
    the Editor Options icon in the upper-right corner, you can hide or display the
    Canvas pane as shown in Figure [1-10](#329781_7_En_1_Chapter.xhtml#Fig10).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig10_HTML.jpg)


    A screenshot highlights the editor options icon. The pop-up menu highlights the
    canvas option that lets the user toggle between hiding and appearing.


    Figure 1-10


    The Editor Options icon lets you toggle between displaying and hiding the Canvas
    pane


    The Canvas pane serves two purposes. First, it lets you see exactly what your
    user interface looks like on a simulated iOS device. Besides letting you switch
    between different simulated iOS devices (such as between different iPhone or iPad
    models), the Canvas pane also lets you select different settings such as light
    or dark mode and dynamic type. Changing iOS settings lets you see how your user
    interface might look under different appearance options.'
  trans: "\n# 了解 Xcode\n\n学习 iOS 开发不仅仅是学习如何使用 `Swift` 编程语言编写代码。除了掌握 `Swift`，你还必须知道如何查找并使用苹果公司的不同软件框架，如何使用\
    \ `Xcode` 通过 `SwiftUI` 设计用户界面，以及如何组织、创建和删除包含 `Swift` 代码的文件。此外，你还必须学习如何使用 `Xcode`\
    \ 的编辑器编写代码。\n\n每次创建 `Xcode` 项目时，你实际上是在创建一个包含多个文件的文件夹。一个简单的 iOS 应用可能由少数几个文件组成，而一个复杂的应用可能包含成百上千个单独的文件。\n\
    \n通过将代码存储在不同的文件中，你可以快速找到包含你想要编辑和修改数据的文件，同时安全地忽略其他文件。无论一个项目包含多少文件，`Xcode` 都会将它们视为所有\
    \ `Swift` 代码都存储在一个文件中。通过将程序分解成多个文件，你可以将程序的不同部分分组到不同的文件中，从而组织你的应用。\n\n为了进一步帮助你在项目中组织多个文件，`Xcode`\
    \ 允许你创建单独的文件夹。这些文件夹的存在仅仅是为了方便你组织代码。图 1-4 展示了 `Xcode` 如何将一个应用划分为文件夹和文件。\n\n![Figure\
    \ 1-4](img/329781_7_En_1_Fig4_HTML.jpg)\n\n**图 1-4** – `Xcode` 将代码存储在文件中，你可以在文件夹中组织这些文件\n\
    \n为了熟悉 iOS 应用开发，让我们从一个简单的项目开始，它将教你：\n\n- 如何理解项目的组成部分\n- 如何查看不同的文件\n- `Xcode` 的不同部分如何工作\n\
    \n![Figure 1-5](img/329781_7_En_1_Fig5_HTML.jpg)\n\n**图 1-5** – `Xcode` 欢迎屏幕\n\
    \n1.  启动 `Xcode`。会出现一个欢迎屏幕，让你选择最近使用的项目或创建新项目的选项，如图 1-5 所示。（你总是可以通过选择 **Windows\
    \ ➤ Welcome to Xcode** 或按下 `Shift + Command + 1` 在 `Xcode` 中打开此欢迎屏幕。）\n\n![Figure\
    \ 1-6](img/329781_7_En_1_Fig6_HTML.jpg)\n\n**图 1-6** – 选择项目模板\n\n2.  点击 **Create\
    \ a new Xcode project** 选项。`Xcode` 会显示用于设计不同类型应用的模板，如图 1-6 所示。请注意，模板窗口的顶部会显示你可以为其开发应用的不同操作系统，例如\
    \ iOS、watchOS、tvOS 和 macOS。通过选择不同的操作系统，你可以创建针对运行该特定操作系统的设备而设计的项目。\n\n![Figure\
    \ 1-7](img/329781_7_En_1_Fig7_HTML.jpg)\n\n**图 1-7** – 定义项目名称、组织名称和组织标识符\n\n3.\
    \  点击 **iOS**，然后点击 **App**。**App** 模板代表最基本的 iOS 项目。\n4.  点击 **Next** 按钮。会出现另一个窗口，要求你输入项目名称以及组织名称和组织标识符，如图\
    \ 1-7 所示。你必须填写全部三个文本框，但项目名称、组织名称和组织标识符可以是任何你想要的描述性文本。请注意，用户界面弹出菜单让你可以在 `SwiftUI`\
    \ 和 `Storyboard` 之间进行选择。对于本书中的所有项目，请务必确保选择 `SwiftUI`。\n5.  点击 **Project Name**\
    \ 文本框，并为你的项目输入一个名称，例如 `MyFirstApp`。\n6.  点击 **Team** 文本框，并输入你的名字或公司名称。\n7.  点击\
    \ **Organization Identifier** 文本框，并输入你想要的任何标识文本。通常，此标识符是你网站名称的反写，例如 `com.microsoft`。\n\
    8.  点击 **Interface** 弹出菜单，并选择 **SwiftUI**。确保所有复选框都未选中。然后点击 **Next** 按钮。`Xcode`\
    \ 会显示一个对话框，让你选择存储项目的驱动器和文件夹。\n9.  选择一个驱动器和文件夹，然后点击 **Create** 按钮。`Xcode` 会显示你新创建的项目。\n\
    \n`Xcode` 窗口一开始可能看起来很混乱，但你需要明白 `Xcode` 将信息分组在几个窗格中。最左边的窗格称为**导航器**窗格。通过点击**导航器**窗格顶部的图标，你可以查看项目的不同部分，如图\
    \ 1-8 所示。\n\n![Figure 1-8](img/329781_7_En_1_Fig8_HTML.jpg)\n\n**图 1-8** – **导航器**窗格出现在\
    \ `Xcode` 窗口的最左侧\n\n主要的 `SwiftUI` 文件称为 `ContentView`，它包含定义应用用户界面的 `Swift` 代码：\n\
    \n```\nimport SwiftUI\nstruct ContentView: View {\n    var body: some View {\n\
    \        VStack {\n            Image(systemName: \"globe\")\n                .imageScale(.large)\n\
    \                .foregroundColor(.accentColor)\n            Text(\"Hello, world!\"\
    )\n        }\n        .padding()\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n`import SwiftUI` 这一行让你的应用能够使用 `SwiftUI` 框架来设计用户界面。\n\n`ContentView: View` 结构体在屏幕上显示单个视图。`SwiftUI`\
    \ 一次只能在屏幕上显示一个视图。当你创建一个 `SwiftUI` iOS 应用时，默认视图是一个垂直堆栈（`VStack`），其中包含一个 `Image`\
    \ 视图和一个 `Text` 视图。`Image` 视图显示一个地球图标，`Text` 视图在屏幕上显示“Hello, world!”。\n\n`ContentView_Previews:\
    \ PreviewProvider` 结构体实际上在**画布**窗格中显示用户界面，该窗格出现在 `Swift` 代码的右侧，如图 1-9 所示。\n\n\
    ![Figure 1-9](img/329781_7_En_1_Fig9_HTML.jpg)\n\n**图 1-9** – **编辑器**窗格和**画布**窗格\n\
    \n当**编辑器**窗格和**画布**窗格并排显示时，你对**编辑器**窗格所做的任何更改都会出现在**画布**窗格中，反之亦然。如果你点击右上角的**编辑器选项**图标，你可以隐藏或显示**画布**窗格，如图\
    \ 1-10 所示。\n\n![Figure 1-10](img/329781_7_En_1_Fig10_HTML.jpg)\n\n**图 1-10** –\
    \ **编辑器选项**图标可用于切换**画布**窗格的显示和隐藏\n\n**画布**窗格有两个用途。首先，它让你能确切地看到你的用户界面在模拟 iOS 设备上的样子。除了让你在不同的模拟\
    \ iOS 设备（例如不同的 iPhone 或 iPad 型号）之间切换，**画布**窗格还允许你选择不同的设置，例如浅色或深色模式以及动态字体。更改 iOS\
    \ 设置可以让你看到用户界面在不同外观选项下可能的样子。\n"
- fmt: '### Switching Between iOS Devices


    The `Canvas` pane emulates a single iOS device such as an iPhone 14 Pro or an
    iPad Mini. That way you can see how your user interface adapts to the screen sizes
    of different iOS devices. To make the `Canvas` pane emulate a different iOS device,
    follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig11_HTML.jpg)


    *A screenshot of the Xcode window highlights the iOS devices at the top. It lists
    the different iOS devices.*


    **Figure 1-11** — The list of iOS devices the `Canvas` pane can emulate


    1.  Click the name of the currently displayed iOS device at the top of the Xcode
    window. A list of different iOS devices appears as shown in Figure 1-11.

    2.  Click the iOS device you want to appear in the `Canvas` pane.


    Xcode offers a second way to change the iOS device emulation in the `Canvas` pane
    by using the `Inspector` pane. Follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig12_HTML.jpg)


    *Two screenshots of the content view screen. Left: The device drop-down menu is
    highlighted in the preview option. Right: The device pop-up menu highlights the
    inherited option.*


    **Figure 1-12** — The `Device` popup menu can select iOS devices in the `Inspector`
    pane


    1.  Move the cursor in `ContentView()` inside the `ContentView_Previews: PreviewProvider`
    structure. The `Inspector` pane appears.

    2.  Click the `Device` popup menu and choose an iOS device to appear in the `Canvas`
    pane as shown in Figure 1-12.


    After you choose a different iOS device for the `Canvas` pane, you can change
    the magnification of the `Canvas` pane by clicking different icons that appear
    in the bottom-right corner of the `Canvas` pane as shown in Figure 1-13:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig13_HTML.jpg)


    *An illustration explains the different icons that appear in the canvas pane.
    It includes zoom out, zoom to 100%, zoom to fit, and zoom in.*


    **Figure 1-13** — The Zoom icons let you change the magnification of the `Canvas`
    pane


    - **Zoom Out** – Shrinks the size of the iOS device

    - **Zoom to 100%** – Displays the iOS device in its actual size (may cut off parts
    of the iOS device, especially when emulating an iPad or larger iPhone model)

    - **Zoom to Fit** – Makes the entire iOS device visible

    - **Zoom In** – Expands the size of the iOS device


    The `Zoom to 100%` lets you see your user interface on the actual size of the
    emulated iOS device, while the `Zoom to Fit` lets you see the entire emulated
    iOS device as shown in Figure 1-14. Then you can use the `Zoom Out` and `Zoom
    In` options to adjust the size of the iOS device to your liking.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig14_HTML.jpg)


    *Two illustrations of the iOS device compare the zoom to 100% and the zoom to
    fit programming. On the left, the iOS device is fully zoomed, and on the right,
    it is zoomed to fit.*


    **Figure 1-14** — Comparing `Zoom to 100%` and `Zoom to Fit`


    ### Changing the iOS Device Emulation Appearance


    Once you’ve selected an iOS device to emulate in the `Canvas` pane, you can customize
    three additional ways to change the appearance of your user interface:


    - **Color Scheme** – Displays either light or dark mode

    - **Orientation** – Displays either portrait or landscape mode

    - **Dynamic Type** – Changes the size of text


    To change the appearance of the iOS device emulation in the `Canvas` pane, follow
    these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig15_HTML.jpg)


    *A screenshot of the Canvas device settings window. The following toggle buttons
    are present: Color scheme, orientation, and dynamic type.*


    **Figure 1-15** — The Device Settings window


    1.  Click the Device Settings icon near the bottom of the `Canvas` pane. A popup
    window appears as shown in Figure 1-15.

    2.  Click the on/off switch to the right of the setting you want to change such
    as `Color Scheme` or `Orientation`.

    3.  Click an option to change the iOS device appearance, or drag the slider to
    change the size of text under the `Dynamic Type` option.


    If you want to compare different options side by side, follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig16_HTML.jpg)


    *A screenshot of the variants popup menu. It includes the following options: Color
    scheme variants, orientation variants, and dynamic type variants.*


    **Figure 1-16** — The Variants popup menu


    1.  Click the Variants icon at the bottom of the `Canvas` pane. A popup menu appears
    as shown in Figure 1-16.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig17_HTML.jpg)


    *Three illustrations of the iOS devices in different orientation variants: Portrait,
    landscape left, and landscape right.*


    **Figure 1-17** — The Orientation Variants displayed


    1.  Choose an option such as `Color Scheme Variants` or `Dynamic Type Variants`.
    Xcode displays all the different options at once as shown in Figure 1-17.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig18_HTML.jpg)


    *An illustration of the Live icon in the canvas pane.*


    **Figure 1-18** — The Live icon


    1.  Click the `Live` icon to view the iOS device back in the `Canvas` pane again
    as shown in Figure 1-18.


    ### Selecting User Interface Objects


    Once you’ve placed objects on the user interface, you can only select them by
    moving the cursor in the Swift code for that object. If you would rather click
    objects on the user interface using the mouse, you must click the `Selectable`
    icon near the bottom of the `Canvas` pane as shown in Figure 1-19.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig19_HTML.jpg)


    *An illustration contains the selectable icon at the bottom of the canvas pane.
    The text at the top has a border and has been selected.*


    **Figure 1-19** — The Selectable icon


    Once you click the `Selectable` icon and click an object on the user interface,
    blue borders appear around that object. These blue borders let you see the size
    of that object. This can be handy for seeing how large an object’s background
    appears if you add a background color.


    The `Live` icon (see Figure 1-18) lets you interact with your user interface to
    test your app. The `Selectable` icon makes it easy to edit your user interface.'
  raw: '## Switching Between iOS Devices


    The Canvas pane emulates a single iOS device such as an iPhone 14 Pro or an iPad
    Mini. That way you can see how your user interface adapts to the screen sizes
    of different iOS devices. To make the Canvas pane emulate a different iOS device,
    follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig11_HTML.jpg)


    A screenshot of the X code window highlights the i O S devices at the top. It
    lists the different i O S devices.


    Figure 1-11


    The list of iOS devices the Canvas pane can emulate


    1.  Click the name of the currently displayed iOS device at the top of the Xcode
    window. A list of different iOS devices appears as shown in Figure [1-11](#329781_7_En_1_Chapter.xhtml#Fig11).


    1.  Click the iOS device you want to appear in the Canvas pane.


    Xcode offers a second way to change the iOS device emulation in the Canvas pane
    by using the Inspector pane. Follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig12_HTML.jpg)


    Two screenshots of the content view screen. Left. The device drop down menu is
    highlighted in the preview option. Right. The device pop-up menu highlights the
    inherited option.


    Figure 1-12


    The Device popup menu can select iOS devices in the Inspector pane


    1.  Move the cursor in ContentView() inside the ContentView_Previews: PreviewProvider
    structure. The Inspector pane appears.


    2.  Click the Device popup menu and choose an iOS device to appear in the Canvas
    pane as shown in Figure [1-12](#329781_7_En_1_Chapter.xhtml#Fig12).


    After you choose a different iOS device for the Canvas pane, you can change the
    magnification of the Canvas pane by clicking different icons that appear in the
    bottom-right corner of the Canvas pane as shown in Figure [1-13](#329781_7_En_1_Chapter.xhtml#Fig13):


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig13_HTML.jpg)


    An illustration explains the different icon that appears in the canvas pane. It
    includes zoom out, zoom to 100%, zoom to fit, and zoom in.


    Figure 1-13


    The Zoom icons let you change the magnification of the Canvas pane


    *   Zoom Out – Shrinks the size of the iOS device


    *   Zoom to 100% – Displays the iOS device in its actual size (may cut off parts
    of the iOS device, especially when emulating an iPad or larger iPhone model)


    *   Zoom to Fit – Makes the entire iOS device visible


    *   Zoom In – Expands the size of the iOS device


    The Zoom to 100% lets you see your user interface on the actual size of the emulated
    iOS device, while the Zoom to Fit lets you see the entire emulated iOS device
    as shown in Figure [1-14](#329781_7_En_1_Chapter.xhtml#Fig14). Then you can use
    the Zoom Out and Zoom In options to adjust the size of the iOS device to your
    liking.


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig14_HTML.jpg)


    Two illustrations of the i O S device compare the zoom to 100% and the zoom to
    fit programming. On the left, the i O S device is fully zoomed, and on the right,
    it is zoomed to fit.


    Figure 1-14


    Comparing Zoom to 100% and Zoom to Fit


    ## Changing the iOS Device Emulation Appearance


    Once you’ve selected an iOS device to emulate in the Canvas pane, you can customize
    three additional ways to change the appearance of your user interface:


    *   Color Scheme – Displays either light or dark mode


    *   Orientation – Displays either portrait or landscape mode


    *   Dynamic Type – Changes the size of text


    To change the appearance of the iOS device emulation in the Canvas pane, follow
    these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig15_HTML.jpg)


    A screenshot of the Canvas device settings window. The following toggle buttons
    are present. Color scheme, orientation, and dynamic type.


    Figure 1-15


    The Device Settings window


    1.  Click the Device Settings icon near the bottom of the Canvas pane. A popup
    window appears as shown in Figure [1-15](#329781_7_En_1_Chapter.xhtml#Fig15).


    1.  Click the on/off switch to the right of the setting you want to change such
    as Color Scheme or Orientation.


    2.  Click an option to change the iOS device appearance, or drag the slider to
    change the size of text under the Dynamic Type option.


    If you want to compare different options side by side, follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig16_HTML.jpg)


    A screenshot of the variants popup menu. It includes the following options. Color
    scheme variants, orientation variants, and dynamic type variants.


    Figure 1-16


    The Variants popup menu


    1.  Click the Variants icon at the bottom of the Canvas pane. A popup menu appears
    as shown in Figure [1-16](#329781_7_En_1_Chapter.xhtml#Fig16).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig17_HTML.jpg)


    Three illustrations of the i O S devices in different orientation variants. Portrait,
    landscape left, and landscape right.


    Figure 1-17


    The Orientation Variants displayed


    1.  Choose an option such as Color Scheme Variants or Dynamic Type Variants. Xcode
    displays all the different options at once as shown in Figure [1-17](#329781_7_En_1_Chapter.xhtml#Fig17).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig18_HTML.jpg)


    An illustration of the live icon in the canvas pane.


    Figure 1-18


    The Live icon


    1.  Click the Live icon to view the iOS device back in the Canvas pane again as
    shown in Figure [1-18](#329781_7_En_1_Chapter.xhtml#Fig18).


    ## Selecting User Interface Objects


    Once you’ve placed objects on the user interface, you can only select them by
    moving the cursor in the Swift code for that object. If you would rather click
    objects on the user interface using the mouse, you must click the Selectable icon
    near the bottom of the Canvas pane as shown in Figure [1-19](#329781_7_En_1_Chapter.xhtml#Fig19).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig19_HTML.jpg)


    An illustration contains the selectable icon at the bottom of the canvas pane.
    The text at the top has a border and has been selected.


    Figure 1-19


    The Selectable icon


    Once you click the Selectable icon and click an object on the user interface,
    blue borders appear around that object. These blue borders let you see the size
    of that object. This can be handy for seeing how large an object’s background
    appears if you add a background color.


    The Live icon (see Figure [1-18](#329781_7_En_1_Chapter.xhtml#Fig18)) lets you
    interact with your user interface to test your app. The Selectable icon makes
    it easy to edit your user interface.'
  trans: '

    ### 在 iOS 设备间切换


    `Canvas` 面板可模拟单个 iOS 设备，例如 iPhone 14 Pro 或 iPad Mini。这样，您就能看到用户界面如何适配不同 iOS 设备的屏幕尺寸。要使
    `Canvas` 面板模拟其他 iOS 设备，请按以下步骤操作：


    ![](img/329781_7_En_1_Fig11_HTML.jpg)


    *Xcode 窗口截图突出显示了顶部的 iOS 设备列表，其中列出了不同的 iOS 设备。*


    **图 1-11** — `Canvas` 面板可模拟的 iOS 设备列表


    1.  点击 Xcode 窗口顶部当前显示的 iOS 设备名称。将会出现一个列表，其中列出了不同的 iOS 设备，如图 1-11 所示。

    2.  点击您希望在 `Canvas` 面板中显示的 iOS 设备。


    Xcode 还提供了第二种更改 `Canvas` 面板中 iOS 设备模拟的方法，即通过 `Inspector` 面板。请按以下步骤操作：


    ![](img/329781_7_En_1_Fig12_HTML.jpg)


    *内容视图界面的两张截图。左侧：在预览选项中高亮显示了设备下拉菜单。右侧：设备弹出菜单高亮显示了“继承”选项。*


    **图 1-12** — `Device` 弹出菜单可在 `Inspector` 面板中选择 iOS 设备


    1.  将光标移动到 `ContentView_Previews: PreviewProvider` 结构体中的 `ContentView()` 内。`Inspector`
    面板将会出现。

    2.  点击 `Device` 弹出菜单，选择一个 iOS 设备，使其显示在 `Canvas` 面板中，如图 1-12 所示。


    为 `Canvas` 面板选择了不同的 iOS 设备后，您可以通过点击 `Canvas` 面板右下角出现的不同图标来更改其放大倍率，如图 1-13 所示：


    ![](img/329781_7_En_1_Fig13_HTML.jpg)


    *插图解释了 `Canvas` 面板中出现的不同图标，包括缩小、缩放到 100%、适合窗口缩放和放大。*


    **图 1-13** — 缩放图标可让您更改 `Canvas` 面板的放大倍率


    - **缩小** – 缩小 iOS 设备的尺寸

    - **缩放到 100%** – 以实际尺寸显示 iOS 设备（可能会截断 iOS 设备的部分内容，尤其是在模拟 iPad 或较大型号的 iPhone 时）

    - **适合窗口** – 使整个 iOS 设备可见

    - **放大** – 放大 iOS 设备的尺寸


    `缩放到 100%` 可让您在所模拟 iOS 设备的实际尺寸下查看用户界面，而 `适合窗口` 则让您看到完整的模拟 iOS 设备，如图 1-14 所示。然后您可以使用
    `缩小` 和 `放大` 选项，根据需要调整 iOS 设备的尺寸。


    ![](img/329781_7_En_1_Fig14_HTML.jpg)


    *两张 iOS 设备插图比较了“缩放到 100%”和“适合窗口”两种编程效果。左侧：iOS 设备完全缩放显示；右侧：适合窗口显示。*


    **图 1-14** — 比较 `缩放到 100%` 和 `适合窗口`


    ### 更改 iOS 设备模拟的外观


    在 `Canvas` 面板中选定了要模拟的 iOS 设备后，您可以通过三种额外的方式来定制用户界面的外观：


    - **配色方案** – 显示浅色或深色模式

    - **方向** – 显示纵向或横向模式

    - **动态字体** – 更改文本大小


    要更改 `Canvas` 面板中 iOS 设备模拟的外观，请按以下步骤操作：


    ![](img/329781_7_En_1_Fig15_HTML.jpg)


    *Canvas 设备设置窗口截图。其中包含以下切换按钮：配色方案、方向和动态字体。*


    **图 1-15** — 设备设置窗口


    1.  点击 `Canvas` 面板底部的“设备设置”图标。将会出现一个弹出窗口，如图 1-15 所示。

    2.  点击您想要更改的设置（如 `配色方案` 或 `方向`）右侧的开关按钮。

    3.  点击某个选项以更改 iOS 设备的外观，或拖动滑块以更改 `动态字体` 选项下的文本大小。


    如果您想要并排比较不同的选项，请按以下步骤操作：


    ![](img/329781_7_En_1_Fig16_HTML.jpg)


    *“变体”弹出菜单截图。它包含以下选项：配色方案变体、方向变体和动态字体变体。*


    **图 1-16** — “变体”弹出菜单


    1.  点击 `Canvas` 面板底部的“变体”图标。将会出现一个弹出菜单，如图 1-16 所示。


    ![](img/329781_7_En_1_Fig17_HTML.jpg)


    *三张 iOS 设备插图展示了不同的方向变体：纵向、左侧横向和右侧横向。*


    **图 1-17** — 显示的方向变体


    1.  选择一个选项，例如 `配色方案变体` 或 `动态字体变体`。Xcode 会一次性显示所有不同的选项，如图 1-17 所示。


    ![](img/329781_7_En_1_Fig18_HTML.jpg)


    *Canvas 面板中“实时”图标的插图。*


    **图 1-18** — “实时”图标


    1.  点击 `实时` 图标，即可在 `Canvas` 面板中再次查看 iOS 设备，如图 1-18 所示。


    ### 选择用户界面对象


    一旦您将对象放置在用户界面上，只能通过将光标移动到该对象的 Swift 代码中来选择它们。如果您更倾向于使用鼠标点击用户界面上的对象，则必须点击 `Canvas`
    面板底部的`可选择`图标，如图 1-19 所示。


    ![](img/329781_7_En_1_Fig19_HTML.jpg)


    *插图显示 Canvas 面板底部的“可选择”图标。顶部的文本带有边框，并且已被选中。*


    **图 1-19** — “可选择”图标


    点击 `可选择` 图标，然后点击用户界面上的某个对象后，该对象周围会出现蓝色边框。这些蓝色边框让您能看到该对象的大小。如果您添加了背景颜色，这有助于了解对象背景区域的大小。


    `实时` 图标（见图 1-18）让您能够与用户界面互动以测试您的应用。`可选择` 图标则让您能轻松编辑用户界面。

    '
- fmt: '# Manipulating the Xcode Panes


    The four Xcode panes (`Navigator`, `Editor`, `Canvas`, and `Inspector`) serve
    different purposes. The `Navigator` pane displays information about your project
    such as the names of all the files that make up that project. The `Editor` pane
    is where you can write and edit Swift code. The `Canvas` pane is where you can
    see and test the user interface defined by your Swift code. The `Inspector` pane
    displays information about the currently selected object.


    You can resize any of the panes by moving the mouse pointer over the pane border
    and dragging the mouse left or right. If you want, you can toggle between hiding
    and displaying the `Navigator` and the `Inspector` pane. That way you can see
    more of the `Editor` and `Canvas` panes.


    To hide/display the `Navigator` or `Inspector` pane, you have two options as shown
    in Figure [1-20](#329781_7_En_1_Chapter.xhtml#Fig20):


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig20_HTML.jpg)


    A screenshot of the X code window demonstrates the hide or show navigator pane
    on the left and the hide or show inspector pane on the right.


    Figure 1-20


    Hiding or showing the Navigator and Inspector panes


    * Choose `View` ➤ `Navigators`/`Inspectors` ➤ `Hide`/`Show Navigator`/`Inspector`.

    * Click the `Show`/`Hide Navigator`/`Inspector` pane icons.


    The `Navigator` pane lets you select options to display in the `Editor` pane.
    The `Inspector` pane lets you select user interface items to choose different
    ways to modify them as shown in Figure [1-21](#329781_7_En_1_Chapter.xhtml#Fig21).


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig21_HTML.jpg)


    A screenshot contains the different panes of the X code window. The inspector
    pane on the right is highlighted. The following line is highlighted on the left.
    Text open bracket apostrophe Hello comma world exclamatory apostrophe, close bracket.


    Figure 1-21


    The Inspector pane lists different ways to modify a selected item


    To see how the `Inspector` pane works, follow these steps:


    ![](images/329781_7_En_1_Chapter/329781_7_En_1_Fig22_HTML.jpg)


    A screenshot of the inspector pane highlights the attribute inspector icon. The
    following fields are present. Text, accessibility, font, padding, and frame.


    Figure 1-22


    The Attributes Inspector icon lets you view additional ways to modify an item
    in the Inspector pane


    1. Create a new iOS App project and then click the `ContentView` file in the `Navigator`
    pane. The `Editor` pane displays the contents of the `ContentView` file.


    2. Move the cursor in the `Text("Hello, world!")` line.


    3. Click the `Attributes Inspector` icon in the `Inspector` pane as shown in Figure
    [1-22](#329781_7_En_1_Chapter.xhtml#Fig22). The `Inspector` pane displays additional
    ways to modify the currently selected item.


    As you can see, Xcode’s panes show different information about a project. The
    `Navigator` pane (on the far left) lets you see an overview of your project. Clicking
    specific items in the `Navigator` pane displays that item in the `Editor` pane.
    The `Inspector` pane (on the far right) shows additional information about something
    selected in the `Editor` pane. The `Canvas` pane lets you preview the appearance
    of your user interface.


    If you explore Xcode, you’ll see dozens of features, but it’s not necessary to
    understand everything at once to start using Xcode. Just focus on using only those
    features you need and feel free to ignore the rest until you need them.


    ## Summary


    Creating iOS apps involves more than just writing code. To help your app access
    hardware features of different iOS devices, you can use Apple’s software frameworks
    that provide access to the camera or to the address book of an iOS device. The
    most important framework that all SwiftUI projects use is the SwiftUI framework.
    By combining your code with Apple’s existing software frameworks, you can focus
    on writing code to make your app work and use Apple’s software frameworks to help
    you perform common functions found on most iOS devices.


    Besides writing code, every iOS app also needs a user interface. To create user
    interfaces, use SwiftUI. Since SwiftUI makes it easy to create user interfaces
    that adapt to different devices, SwiftUI is fast becoming the preferred way to
    design user interfaces for apps on all of Apple’s platforms (macOS, iOS, iPadOS,
    watchOS, and tvOS).


    The main tool for creating iOS apps is Apple’s free Xcode program, which lets
    you create projects, organize the separate files of a project, and view and edit
    the contents of each file. Xcode lets you design, edit, and test your app all
    in a single program. Although Xcode offers dozens of features, you only need to
    use a handful of them to start creating iOS apps of your own.


    Learning iOS programming involves learning how to write commands using the Swift
    programming language, learning how to find and use Apple’s various software frameworks,
    learning how to design user interfaces in SwiftUI, and learning how to use Xcode.
    While this might seem like a lot, this book will take you through each step of
    the way so you’ll feel comfortable using Xcode and creating your own iOS apps
    in the near future.'
