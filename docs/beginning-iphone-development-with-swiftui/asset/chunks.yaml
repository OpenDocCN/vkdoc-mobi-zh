    \ 的结构体，但现在我们需要创建第二个名为 `SeparateFileView` 的结构体，其中声明了一个 `passedData` 字符串变量。\n\n\
    5. 选择 文件 ➤ 新建 ➤ 文件。此时会弹出一个对话框。\n\n6. 点击对话框顶部的 iOS，点击 Swift 文件，然后点击 下一步。Xcode 会要求你为新创建的文件命名。\n\
    \n7. 输入 `SeparateFile` 并点击 创建。Xcode 会创建一个新的 Swift 文件。\n\n8. 删除 `SeparateFile`\
    \ 中当前的所有代码，并替换为以下内容：\n\n```swift\nimport SwiftUI\n\nstruct SeparateFileView: View\
    \ {\n    var passedData: String\n    var body: some View {\n        HStack {\n\
    \            Spacer()\n            VStack {\n                Spacer()\n      \
    \          Text(\"来自文本框的字符串 = \\(passedData)\")\n                Spacer()\n  \
    \          }\n            Spacer()\n        }.background(Color.orange)\n    }\n\
    }\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        SeparateFileView(passedData: \"\")\n    }\n}\n```\n\n这个文件创建了一个\
    \ `SeparateFileView` 结构体，其中声明了一个 `passedData` 字符串变量。由于这个 `SeparateFileView` 结构体存储在一个单独的文件中，它包含一个\
    \ `PreviewProvider` 结构体，其中我们也必须使用 `passedData` 参数。\n\n9. 点击导航面板中的 `ContentView`\
    \ 以返回 `ContentView` 结构体。\n\n10. 点击画布面板中的实时图标。此时会出现 `TextField`。\n\n11. 点击 `TextField`\
    \ 并输入一个单词或短句。\n\n12. 点击标签栏中的心形图标。这将把你输入到 `TextField` 中的字符串传递过去，并显示在 `FileView`\
    \ 结构体中。\n\n13. 点击标签栏中的兔子图标。这将把你输入到 `TextField` 中的字符串传递过去，并显示在 `SeparateFileView`\
    \ 结构体中。\n\n## 在标签视图中的结构体之间更改数据\n\n之前的项目创建了两个结构体，其中一个存储在 `ContentView` 文件中，另一个存储在单独的文件中。在这两种情况下，结构体都定义了接收数据并显示数据的用户界面。\n\
    \n如果我们想将数据传递到一个结构体中，然后允许该结构体修改这些数据，该怎么办？这需要进行几项更改：\n\n- 创建一个 `State` 变量。\n- 打开另一个结构体，并将该结构体与\
    \ `State` 变量的绑定（使用 `$` 符号）传递给它，例如：\n- 在接收数据的结构体中定义一个 `@Binding` 变量。\n- 在接收数据的结构体中更改该\
    \ `Binding` 变量。\n\n```\nFileView(choice: $message)\n```\n\n要了解如何在标签视图中的结构体之间更改数据，请执行以下步骤：\n\
    \n1. 创建一个新的 SwiftUI iOS App 项目，并为其指定任意名称，例如 \"TabViewBindingData\"。\n\n2. 点击导航面板中的\
    \ `ContentView` 文件。\n\n3. 在 `struct ContentView: View` 下方创建一个 `State` 变量，如下所示：\n\
    \n```\nstruct ContentView: View {\n    @State var message = \"\"\n```\n\n4. 在\
    \ `var body: some View` 内部添加一个 `TabView`，如下所示：\n\n```\nvar body: some View {\n\
    \    TabView {\n        TextField(\"在此输入\", text: $message)\n            .tabItem\
    \ {\n                Image(systemName: \"house.fill\")\n                Text(\"\
    主页\")\n            }\n        FileView(choice: $message)\n            .tabItem\
    \ {\n                Image(systemName: \"heart.fill\")\n                Text(\"\
    第一个\")\n            }\n        SeparateFileView(passedData: $message)\n      \
    \      .tabItem {\n                Image(systemName: \"hare.fill\")\n        \
    \        Text(\"第二个\")\n            }\n    }\n}\n```\n\n请注意，`FileView` 将一个绑定变量（`$message`）传递给了\
    \ `\"choice:\"` 参数。第二个名为 `SeparateFileView` 的结构体将相同的绑定变量（`$message`）传递给了 `\"passedData\"\
    ` 参数。\n\n5. 在 `struct ContentView: View` 结构体下方添加以下结构体：\n\n```\nstruct FileView:\
    \ View {\n    @Binding var choice: String\n    var body: some View {\n       \
    \ HStack {\n            Spacer()\n            VStack {\n                Spacer()\n\
    \                TextField(\"在此输入:\", text: $choice)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n```\n\n请注意，这个结构体声明了一个名为 `\"choice\"` 的 `@Binding` 变量，它可以保存一个 `String`。该结构体使用一个\
    \ `TextField` 来更改这个 `@Binding` 变量（`$choice`），这会自动将更改发送回 `ContentView` 结构体。\n\n\
    整个 `ContentView` 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
    \    @State var message = \"\"\n    var body: some View {\n        TabView {\n\
    \            TextField(\"在此输入\", text: $message)\n                .tabItem {\n\
    \                    Image(systemName: \"house.fill\")\n                    Text(\"\
    主页\")\n                }\n            FileView(choice: $message)\n           \
    \     .tabItem {\n                    Image(systemName: \"heart.fill\")\n    \
    \                Text(\"第一个\")\n                }\n            SeparateFileView(passedData:\
    \ $message)\n                .tabItem {\n                    Image(systemName:\
    \ \"hare.fill\")\n                    Text(\"第二个\")\n                }\n     \
    \   }\n    }\n}\n\nstruct FileView: View {\n    @Binding var choice: String\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                TextField(\"在此输入:\", text:\
    \ $choice)\n                Spacer()\n            }\n            Spacer()\n  \
    \      }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6. 选择 文件 ➤ 新建 ➤ 文件。此时会弹出一个对话框。\n\n7. 点击对话框顶部的 iOS，点击 Swift 文件，然后点击 下一步。Xcode\
    \ 会要求你为新创建的文件命名。\n\n8. 输入 `SeparateFile` 并点击 创建。Xcode 会创建一个新的 Swift 文件。\n\n9.\
    \ 删除 `SeparateFile` 中当前的所有代码，并替换为以下内容：\n\n```\nimport SwiftUI\n\nstruct SeparateFileView:\
    \ View {\n    @Binding var passedData: String\n    var body: some View {\n   \
    \     HStack {\n            Spacer()\n            VStack {\n                Spacer()\n\
    \                TextField(\"在此输入\", text: $passedData)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.orange)\n   \
    \ }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView(passedData: .constant(\"\"))\n\
    \    }\n}\n```\n\n请注意，这个结构体声明了一个名为 `\"passedData\"` 的 `@Binding` 变量，它可以保存一个 `String`。`TextField`\
    \ 可以更改这个变量（`$passedData`）并自动将更改发送回 `ContentView` 结构体。\n\n还要注意，由于此结构体存储在一个单独的文件中，`PreviewProvider`\
    \ 结构体也必须通过为其赋予 `.constant(\"\")` 来包含 `\"passedData\"` 参数。\n\n10. 点击导航面板中的 `ContentView`\
    \ 文件。\n\n11. 点击画布面板中的实时图标。\n\n12. 点击 `TextField` 并输入一个短语。\n\n13. 点击心形图标，将字符串传递到存储在\
    \ `ContentView` 文件中的 `FileView` 结构体。\n\n14. 点击由 `FileView` 结构体显示的 `TextField`\
    \ 并编辑数据。然后点击主页标签返回显示修改后数据的 `ContentView` 结构体。\n\n15. 编辑此数据。\n\n16. 点击兔子标签，将字符串传递到存储在单独文件中的\
    \ `SeparateFileView` 结构体。请注意，你现在编辑的数据会出现在 `SeparateFileView` 结构体中。\n\n17. 点击由\
    \ `SeparateFileView` 结构体显示的 `TextField` 并编辑数据。然后点击主页标签返回显示修改后数据的 `ContentView`\
    \ 结构体。\n```"
- fmt: "# Sharing Data Between Structures in a Tab View\n\nUsing `@State` and `@Binding`\
    \ variables lets multiple views share and modify data. However, SwiftUI offers\
    \ another way to share data between structures. First, create an `ObservableObject`\
    \ class that contains one or more variables to share. Each variable must be marked\
    \ as `@Published` like this:\n\n```swift\nclass ShareString: ObservableObject\
    \ {\n    @Published var message = \"\"\n}\n```\n\nThe structure that contains\
    \ the Tab View (such as `ContentView`) needs to define a `@StateObject` variable\
    \ that defines an object from the `ObservableObject` class like this:\n\n```swift\n\
    @StateObject var showMe = ShareString()\n```\n\nSince we want to share this `ObservableObject`\
    \ between all views within the Tab View, we need to add the `.environmentObject`\
    \ modifier to the `TabView` along with the `StateObject` to share like this:\n\
    \n```swift\nTabView {\n    // ...\n}.environmentObject(showMe)\n```\n\nWithin\
    \ each structure that needs to access the `ObservableObject`, we need to declare\
    \ an `@EnvironmentObject` variable that uses the `ObservableObject` class like\
    \ this:\n\n```swift\n@EnvironmentObject var choice: ShareString\n```\n\nFinally,\
    \ within each structure that defines an `@EnvironmentObject`, we can access the\
    \ actual data to share by using the `@EnvironmentObject` name plus the `@Published`\
    \ property name to share like this:\n\n```swift\n$choice.message\n```\n\nIn this\
    \ case, \"choice\" is the `@EnvironmentObject` name, and \"message\" is the `@Published`\
    \ property defined within the `ObservableObject`. To see how to share data using\
    \ an `ObservableObject`, follow these steps:\n\n1. Create a new SwiftUI iOS App\
    \ project and give it any name you wish such as \"TabViewObservable.\"\n2. Click\
    \ the `ContentView` file in the Navigator pane.\n3. Create an `ObservableObject`\
    \ class under the `import SwiftUI` line like this:\n\n```swift\nclass ShareString:\
    \ ObservableObject {\n    @Published var message = \"\"\n}\n```\n\nThe `@Published`\
    \ variable will contain the data to share between structures within the Tab View.\n\
    \n4. Create a `StateObject` variable under the `struct ContentView: View` line\
    \ like this:\n\n```swift\nstruct ContentView: View {\n    @StateObject var showMe\
    \ = ShareString()\n```\n\nThis creates a new object (`showMe`) based on the `ShareString`\
    \ `ObservableObject`.\n\n5. Add a `TabView` inside the `var body: some View` line\
    \ like this:\n\n```swift\nvar body: some View {\n    TabView {\n        TextField(\"\
    Type here\", text: $showMe.message)\n            .tabItem {\n                Image(systemName:\
    \ \"house.fill\")\n                Text(\"Home\")\n            }\n        FileView()\n\
    \            .tabItem {\n                Image(systemName: \"heart.fill\")\n \
    \               Text(\"First\")\n            }\n        SeparateFileView()\n \
    \           .tabItem {\n                Image(systemName: \"hare.fill\")\n   \
    \             Text(\"Second\")\n            }\n    }.environmentObject(showMe)\n\
    }\n```\n\nMake sure you add the `.environmentObject(showMe)` modifier at the end\
    \ of the `TabView`. This allows sharing of the `showMe` `ObservableObject` `ShareString`\
    \ class. The preceding `TabView` opens structures called `FileView` and `SeparateFileView`\
    \ that we need to create.\n\n6. Add the following structure underneath the `struct\
    \ ContentView` structure like this:\n\n```swift\nstruct FileView: View {\n   \
    \ @EnvironmentObject var choice: ShareString\n    var body: some View {\n    \
    \    HStack {\n            Spacer()\n            VStack {\n                Spacer()\n\
    \                TextField(\"Type here:\", text: $choice.message)\n          \
    \      Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n```\n\nNotice that this structure defines an `@EnvironmentObject` variable\
    \ that can hold a `ShareString` `ObservableObject`. In the `TextField`, we must\
    \ store the text in the \"choice\" `@EnvironmentObject` that uses the \"message\"\
    \ `@Published` property (`$choice.message`). The entire `ContentView` file should\
    \ look like this:\n\n```swift\nimport SwiftUI\n\nclass ShareString: ObservableObject\
    \ {\n    @Published var message = \"\"\n}\n\nstruct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n    var body: some View {\n        TabView {\n \
    \           TextField(\"Type here\", text: $showMe.message)\n                .tabItem\
    \ {\n                    Image(systemName: \"house.fill\")\n                 \
    \   Text(\"Home\")\n                }\n            FileView()\n              \
    \  .tabItem {\n                    Image(systemName: \"heart.fill\")\n       \
    \             Text(\"First\")\n                }\n            SeparateFileView()\n\
    \                .tabItem {\n                    Image(systemName: \"hare.fill\"\
    )\n                    Text(\"Second\")\n                }\n        }.environmentObject(showMe)\n\
    \    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject var choice: ShareString\n\
    \    var body: some View {\n        HStack {\n            Spacer()\n         \
    \   VStack {\n                Spacer()\n                TextField(\"Type here:\"\
    , text: $choice.message)\n                Spacer()\n            }\n          \
    \  Spacer()\n        }.background(Color.yellow)\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n7. Choose **File** ➤ **New** ➤ **File**. A dialog appears.\n\
    8. Click **iOS** near the top of the dialog, click **Swift File**, and then click\
    \ **Next**. Xcode asks for a name to give your newly created file.\n9. Type `SeparateFile`\
    \ and click **Create**. Xcode creates a new Swift file.\n10. Delete all code currently\
    \ in the `SeparateFile` and replace it with the following:\n\n```swift\nimport\
    \ SwiftUI\n\nstruct SeparateFileView: View {\n    @EnvironmentObject var passedData:\
    \ ShareString\n    var body: some View {\n        HStack {\n            Spacer()\n\
    \            VStack {\n                Spacer()\n                TextField(\"\
    Type here\", text: $passedData.message)\n                Spacer()\n          \
    \  }\n            Spacer()\n        }.background(Color.orange)\n    }\n}\n\nstruct\
    \ SeparateFileView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        SeparateFileView()\n    }\n}\n```\n\nNotice that this structure\
    \ also declares an `@EnvironmentObject` that can hold a `ShareString` `ObservableObject`.\
    \ Then the `TextField` uses the \"passedData\" `@EnvironmentObject` to access\
    \ the \"message\" `@Published` property (`$passedData.message`).\n\n11. Click\
    \ the `ContentView` file in the Navigator pane.\n12. Click the **Live** icon in\
    \ the Canvas pane.\n13. Click in the `TextField` and type a phrase.\n14. Click\
    \ the **Heart** tab. Notice that what you typed in step 13 now appears in the\
    \ `FileView` `TextField`.\n15. Edit the text in the `TextField` and then click\
    \ the **Home** tab. Notice that the modified text now appears in the `ContentView`\
    \ `TextField`.\n16. Edit the text in the `TextField` and then click the **Hare**\
    \ tab. The edited text now appears in the `SeparateFileView` `TextField`.\n17.\
    \ Edit the text in the `TextField` and click the **Home** tab. Notice that the\
    \ modified text now appears in the `ContentView` `TextField`. All this shows how\
    \ the various structures can access the `@Published` property in the `ObservableObject`.\n\
    \n## Summary\n\nA Tab View offers another way to display multiple views where\
    \ each view can be represented by a tab at the bottom of the screen. Tab views\
    \ can open views as simple as `Text` or `Image` views, but more often use views\
    \ defined by structures. These structures can be stored in the same file or in\
    \ a separate file.\n\nA Tab View can pass data to another view, much like passing\
    \ data to a function. This other view needs to define a property, and then the\
    \ Tab View can pass data to that property. If you want to pass data to another\
    \ view that can modify the data, you can use two different methods.\n\nThe first\
    \ method uses `@State` and `@Binding` variables and forces the Tab View to pass\
    \ data to each view that it opens. The second method uses `ObservableObjects`,\
    \ `StateObjects`, and `EnvironmentObjects` to share data among multiple views.\n\
    \nTab views can display a maximum of five tabs at the bottom of the screen. If\
    \ you define more than five tabs, SwiftUI automatically creates a **More** tab\
    \ and displays all additional tabs in a Navigation Stack.\n\nSince tab views can\
    \ only display five tabs at the bottom of the screen, you can turn a Tab View\
    \ into a Page View. That way you can display more than five icons at the bottom\
    \ of the screen. Unlike a Tab View, a Page View forces users to navigate between\
    \ screens sequentially. Tab Views are convenient any time users need to jump to\
    \ a different screen on your app's user interface."
  raw: "### Sharing Data Between Structures in a Tab View\n\nUsing @State and @Binding\
    \ variables lets multiple views share and modify data. However, SwiftUI offers\
    \ another way to share data between structures. First, create an ObservableObject\
    \ class that contains one or more variables to share. Each variable must be marked\
    \ as @Published like this:\n\n```\nclass ShareString: ObservableObject {\n@Published\
    \ var message = \"\"\n}\n```\n\nThe structure that contains the Tab View (such\
    \ as ContentView) needs to define a @StateObject variable that defines an object\
    \ from the ObservableObject class like this:\n\n```\n@StateObject var showMe =\
    \ ShareString()\n```\n\nSince we want to share this ObservableObject between all\
    \ views within the Tab View, we need to add the .environmentObject modifier to\
    \ the TabView along with the StateObject to share like this:\n\n```\nTabView {\n\
    }.environmentObject(showMe)\n```\n\nWithin each structure that needs to access\
    \ the ObservableObject, we need to declare an @EnvironmentObject variable that\
    \ uses the ObservableObject class like this:\n\n```\n@EnvironmentObject var choice:\
    \ ShareString\n```\n\nFinally, within each structure that defines an @EnvironmentObject,\
    \ we can access the actual data to share by using the @EnvironmentObject name\
    \ plus the @Published property name to share like this:\n\n```\n$choice.message\n\
    ```\n\nIn this case, “choice” is the @EnvironmentObject name, and “message” is\
    \ the @Published property defined within the ObservableObject. To see how to share\
    \ data using an ObservableObject, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “TabViewObservable.”\n\
    \n2.  Click the ContentView file in the Navigator pane.\n\n3.  Create an ObservableObject\
    \ class under the import SwiftUI line like this:\n\n```\n    class ShareString:\
    \ ObservableObject {\n    @Published var message = \"\"\n    }\n    ```\n\nThe\
    \ @Published variable will contain the data to share between structures within\
    \ the Tab View.\n\n4.  Create a StateObject variable under the struct ContentView:\
    \ View line like this:\n\n```\n    struct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n    ```\n\nThis creates a new object (showMe) based\
    \ on the ShareString ObservableObject.\n\n5.  Add a TabView inside the var body:\
    \ some View line like this:\n\n```\n    var body: some View {\n    TabView {\n\
    \    TextField(\"Type here\", text: $showMe.message)\n    .tabItem {\n    Image(systemName:\
    \ \"house.fill\")\n    Text(\"Home\")\n    }\n    FileView()\n    .tabItem {\n\
    \    Image(systemName: \"heart.fill\")\n    Text(\"First\")\n    }\n    SeparateFileView()\n\
    \    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"Second\")\n\
    \    }\n    }.environmentObject(showMe)\n    }\n    ```\n\nMake sure you add the\
    \ .environmentObject(showMe) modifier at the end of the TabView. This allows sharing\
    \ of the showMe ObservableObject ShareString class. The preceding TabView opens\
    \ structures called FileView and SeparateFileView that we need to create.\n\n\
    6.  Add the following structure underneath the struct ContentView structure like\
    \ this:\n\n```\n    struct FileView: View {\n    @EnvironmentObject var choice:\
    \ ShareString\n    var body: some View {\n    HStack {\n    Spacer()\n    VStack\
    \ {\n    Spacer()\n    TextField(\"Type here:\", text: $choice.message)\n    Spacer()\n\
    \    }\n    Spacer()\n    }.background(Color.yellow)\n    }\n    }\n    ```\n\n\
    Notice that this structure defines an @EnvironmentObject variable that can hold\
    \ a ShareString ObservableObject. In the TextField, we must store the text in\
    \ the “choice” @EnvironmentObject that uses the “message” @Published property\
    \ ($choice.message). The entire ContentView file should look like this:\n\n```\n\
    \    import SwiftUI\n    class ShareString: ObservableObject {\n    @Published\
    \ var message = \"\"\n    }\n    struct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n    var body: some View {\n    TabView {\n    TextField(\"\
    Type here\", text: $showMe.message)\n    .tabItem {\n    Image(systemName: \"\
    house.fill\")\n    Text(\"Home\")\n    }\n    FileView()\n    .tabItem {\n   \
    \ Image(systemName: \"heart.fill\")\n    Text(\"First\")\n    }\n    SeparateFileView()\n\
    \    .tabItem {\n    Image(systemName: \"hare.fill\")\n    Text(\"Second\")\n\
    \    }\n    }.environmentObject(showMe)\n    }\n    }\n    struct FileView: View\
    \ {\n    @EnvironmentObject var choice: ShareString\n    var body: some View {\n\
    \    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"Type\
    \ here:\", text: $choice.message)\n    Spacer()\n    }\n    Spacer()\n    }.background(Color.yellow)\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n7.  Choose\
    \ File ➤ New ➤ File. A dialog appears.\n\n8.  Click iOS near the top of the dialog,\
    \ click Swift File, and then click Next. Xcode asks for a name to give your newly\
    \ created file.\n\n9.  Type SeparateFile and click Create. Xcode creates a new\
    \ Swift file.\n\n10.  Delete all code currently in the SeparateFile and replace\
    \ it with the following:\n\n```\n    import SwiftUI\n    struct SeparateFileView:\
    \ View {\n    @EnvironmentObject var passedData: ShareString\n    var body: some\
    \ View {\n    HStack {\n    Spacer()\n    VStack {\n    Spacer()\n    TextField(\"\
    Type here\", text: $passedData.message)\n    Spacer()\n    }\n    Spacer()\n \
    \   }.background(Color.orange)\n    }\n    }\n    struct SeparateFileView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    SeparateFileView()\n\
    \    }\n    }\n    ```\n\nNotice that this structure also declares an @EnvironmentObject\
    \ that can hold a ShareString ObservableObject. Then the TextField uses the “passedData”\
    \ @EnvironmentObject to access the “message” @Published property ($passedData.message).\n\
    \n11.  Click the ContentView file in the Navigator pane.\n\n12.  Click the Live\
    \ icon in the Canvas pane.\n\n13.  Click in the TextField and type a phrase.\n\
    \n14.  Click the Heart tab. Notice that what you typed in step 13 now appears\
    \ in the FileView TextField.\n\n15.  Edit the text in the TextField and then click\
    \ the Home tab. Notice that the modified text now appears in the ContentView TextField.\n\
    \n16.  Edit the text in the TextField and then click the Hare tab. The edited\
    \ text now appears in the SeparateFileView TextField.\n\n17.  Edit the text in\
    \ the TextField and click the Home tab. Notice that the modified text now appears\
    \ in the ContentView TextField. All this shows how the various structures can\
    \ access the @Published property in the ObservableObject.\n\n## Summary\n\nA Tab\
    \ View offers another way to display multiple views where each view can be represented\
    \ by a tab at the bottom of the screen. Tab views can open views as simple as\
    \ Text or Image views, but more often use views defined by structures. These structures\
    \ can be stored in the same file or in a separate file.\n\nA Tab View can pass\
    \ data to another view, much like passing data to a function. This other view\
    \ needs to define a property, and then the Tab View can pass data to that property.\
    \ If you want to pass data to another view that can modify the data, you can use\
    \ two different methods.\n\nThe first method uses @State and @Binding variables\
    \ and forces the Tab View to pass data to each view that it opens. The second\
    \ method uses ObservableObjects, StateObjects, and EnvironmentObjects to share\
    \ data among multiple views.\n\nTab views can display a maximum of five tabs at\
    \ the bottom of the screen. If you define more than five tabs, SwiftUI automatically\
    \ creates a More tab and displays all additional tabs in a Navigation Stack.\n\
    \nSince tab views can only display five tabs at the bottom of the screen, you\
    \ can turn a Tab View into a Page View. That way you can display more than five\
    \ icons at the bottom of the screen. Unlike a Tab View, a Page View forces users\
    \ to navigate between screens sequentially. Tab Views are convenient any time\
    \ users need to jump to a different screen on your app’s user interface."
  trans: "\n# 在标签视图中分享结构体之间的数据\n\n使用`@State`和`@Binding`变量可以让多个视图共享和修改数据。不过，SwiftUI\
    \ 还提供了另一种在结构体之间分享数据的方式。首先，创建一个包含一个或多个待分享变量的 `ObservableObject` 类。每个变量都必须像这样标记为\
    \ `@Published`：\n\n```swift\nclass ShareString: ObservableObject {\n    @Published\
    \ var message = \"\"\n}\n```\n\n包含标签视图的结构体（例如 `ContentView`）需要定义一个 `@StateObject`\
    \ 变量，该变量定义了一个来自 `ObservableObject` 类的对象，示例如下：\n\n```swift\n@StateObject var showMe\
    \ = ShareString()\n```\n\n由于我们希望在整个标签视图内的所有视图之间分享这个 `ObservableObject`，我们需要将 `.environmentObject`\
    \ 修饰符添加到 `TabView` 中，并传入要分享的 `StateObject`，如下所示：\n\n```swift\nTabView {\n    //\
    \ ...\n}.environmentObject(showMe)\n```\n\n在每个需要访问该 `ObservableObject` 的结构体内部，我们需要声明一个\
    \ `@EnvironmentObject` 变量，该变量使用该 `ObservableObject` 类，示例如下：\n\n```swift\n@EnvironmentObject\
    \ var choice: ShareString\n```\n\n最后，在每个定义了 `@EnvironmentObject` 的结构体内部，我们可以通过使用\
    \ `@EnvironmentObject` 的名称加上 `@Published` 属性名来访问要分享的实际数据，如下所示：\n\n```swift\n$choice.message\n\
    ```\n\n在这个例子中，\"choice\" 是 `@EnvironmentObject` 的名称，而 \"message\" 是在 `ObservableObject`\
    \ 中定义的 `@Published` 属性。要了解如何使用 `ObservableObject` 分享数据，请遵循以下步骤：\n\n1. 创建一个新的 SwiftUI\
    \ iOS App 项目，并为其任意命名，例如 \"TabViewObservable\"。\n2. 在导航器窗格中点击 `ContentView` 文件。\n\
    3. 在 `import SwiftUI` 代码行下方创建一个 `ObservableObject` 类，如下所示：\n\n```swift\nclass\
    \ ShareString: ObservableObject {\n    @Published var message = \"\"\n}\n```\n\
    \n`@Published` 变量将包含要在标签视图内的结构体之间分享的数据。\n\n4. 在 `struct ContentView: View` 代码行下方创建一个\
    \ `StateObject` 变量，如下所示：\n\n```swift\nstruct ContentView: View {\n    @StateObject\
    \ var showMe = ShareString()\n```\n\n这会基于 `ShareString` 这个 `ObservableObject`\
    \ 创建一个新对象（`showMe`）。\n\n5. 在 `var body: some View` 代码行内部添加一个 `TabView`，如下所示：\n\
    \n```swift\nvar body: some View {\n    TabView {\n        TextField(\"在此输入\",\
    \ text: $showMe.message)\n            .tabItem {\n                Image(systemName:\
    \ \"house.fill\")\n                Text(\"首页\")\n            }\n        FileView()\n\
    \            .tabItem {\n                Image(systemName: \"heart.fill\")\n \
    \               Text(\"第一页\")\n            }\n        SeparateFileView()\n   \
    \         .tabItem {\n                Image(systemName: \"hare.fill\")\n     \
    \           Text(\"第二页\")\n            }\n    }.environmentObject(showMe)\n}\n\
    ```\n\n确保在 `TabView` 的末尾添加了 `.environmentObject(showMe)` 修饰符。这允许分享 `showMe` 这个\
    \ `ObservableObject`（即 `ShareString` 类）。上述 `TabView` 会打开名为 `FileView` 和 `SeparateFileView`\
    \ 的结构体，接下来我们需要创建它们。\n\n6. 在 `struct ContentView` 结构体下方添加以下结构体，如下所示：\n\n```swift\n\
    struct FileView: View {\n    @EnvironmentObject var choice: ShareString\n    var\
    \ body: some View {\n        HStack {\n            Spacer()\n            VStack\
    \ {\n                Spacer()\n                TextField(\"在此输入：\", text: $choice.message)\n\
    \                Spacer()\n            }\n            Spacer()\n        }.background(Color.yellow)\n\
    \    }\n}\n```\n\n请注意，此结构体定义了一个可以持有 `ShareString` 这个 `ObservableObject` 的 `@EnvironmentObject`\
    \ 变量。在 `TextField` 中，我们必须将文本存储在使用 \"message\" 这个 `@Published` 属性（`$choice.message`）的\
    \ \"choice\" `@EnvironmentObject` 中。整个 `ContentView` 文件应该如下所示：\n\n```swift\nimport\
    \ SwiftUI\n\nclass ShareString: ObservableObject {\n    @Published var message\
    \ = \"\"\n}\n\nstruct ContentView: View {\n    @StateObject var showMe = ShareString()\n\
    \    var body: some View {\n        TabView {\n            TextField(\"在此输入\"\
    , text: $showMe.message)\n                .tabItem {\n                    Image(systemName:\
    \ \"house.fill\")\n                    Text(\"首页\")\n                }\n     \
    \       FileView()\n                .tabItem {\n                    Image(systemName:\
    \ \"heart.fill\")\n                    Text(\"第一页\")\n                }\n    \
    \        SeparateFileView()\n                .tabItem {\n                    Image(systemName:\
    \ \"hare.fill\")\n                    Text(\"第二页\")\n                }\n     \
    \   }.environmentObject(showMe)\n    }\n}\n\nstruct FileView: View {\n    @EnvironmentObject\
    \ var choice: ShareString\n    var body: some View {\n        HStack {\n     \
    \       Spacer()\n            VStack {\n                Spacer()\n           \
    \     TextField(\"在此输入：\", text: $choice.message)\n                Spacer()\n\
    \            }\n            Spacer()\n        }.background(Color.yellow)\n   \
    \ }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static var previews:\
    \ some View {\n        ContentView()\n    }\n}\n```\n\n7. 选择**文件** ➤ **新建** ➤\
    \ **文件**。会弹出一个对话框。\n8. 点击对话框顶部的 **iOS**，点击 **Swift 文件**，然后点击 **下一步**。Xcode 会要求为你新建的文件命名。\n\
    9. 输入 `SeparateFile` 并点击 **创建**。Xcode 会创建一个新的 Swift 文件。\n10. 删除 `SeparateFile`\
    \ 中当前的所有代码，并用以下代码替换：\n\n```swift\nimport SwiftUI\n\nstruct SeparateFileView: View\
    \ {\n    @EnvironmentObject var passedData: ShareString\n    var body: some View\
    \ {\n        HStack {\n            Spacer()\n            VStack {\n          \
    \      Spacer()\n                TextField(\"在此输入\", text: $passedData.message)\n\
    \                Spacer()\n            }\n            Spacer()\n        }.background(Color.orange)\n\
    \    }\n}\n\nstruct SeparateFileView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        SeparateFileView()\n    }\n}\n```\n\n请注意，此结构体也声明了一个可以持有\
    \ `ShareString` 这个 `ObservableObject` 的 `@EnvironmentObject`。然后 `TextField` 使用\
    \ \"passedData\" 这个 `@EnvironmentObject` 来访问 \"message\" 这个 `@Published` 属性（`$passedData.message`）。\n\
    \n11. 在导航器窗格中点击 `ContentView` 文件。\n12. 在画布窗格中点击 **Live** 图标。\n13. 点击 `TextField`\
    \ 并输入一个短语。\n14. 点击 **心形** 标签。请注意，你在第 13 步输入的内容现在出现在了 `FileView` 的 `TextField`\
    \ 中。\n15. 编辑 `TextField` 中的文本，然后点击 **首页** 标签。请注意，修改后的文本现在出现在了 `ContentView` 的\
    \ `TextField` 中。\n16. 编辑 `TextField` 中的文本，然后点击 **野兔** 标签。编辑后的文本现在出现在了 `SeparateFileView`\
    \ 的 `TextField` 中。\n17. 编辑 `TextField` 中的文本，然后点击 **首页** 标签。请注意，修改后的文本现在出现在了 `ContentView`\
    \ 的 `TextField` 中。这一切都展示了各个结构体如何访问 `ObservableObject` 中的 `@Published` 属性。\n\n\
    ## 总结\n\n标签视图提供了另一种显示多个视图的方式，其中每个视图都可以通过屏幕底部的标签来代表。标签视图可以打开像 `Text` 或 `Image`\
    \ 视图这样简单的视图，但更常见的是打开由结构体定义的视图。这些结构体可以存储在同一个文件中，也可以存储在单独的文件中。\n\n标签视图可以将数据传递给另一个视图，这类似于将数据传递给函数。这个其他视图需要定义一个属性，然后标签视图可以将数据传递给该属性。如果你希望将数据传递给另一个可以修改数据的视图，可以使用两种不同的方法。\n\
    \n第一种方法使用 `@State` 和 `@Binding` 变量，并强制标签视图将数据传递给它打开的每一个视图。第二种方法使用 `ObservableObjects`、`StateObjects`\
    \ 和 `EnvironmentObjects` 在多个视图之间分享数据。\n\n标签视图最多可以在屏幕底部显示五个标签。如果你定义了超过五个标签，SwiftUI\
    \ 会自动创建一个**更多**标签，并在导航堆栈中显示所有额外的标签。\n\n由于标签视图只能在屏幕底部显示五个标签，你可以将标签视图转换为页面视图。这样你就可以在屏幕底部显示超过五个图标。与标签视图不同，页面视图强制用户按顺序在屏幕之间导航。当用户需要跳转到应用用户界面中的不同屏幕时，标签视图非常方便。\n"
- fmt: "# Using Grids\n\nA `Text` view is fine for displaying strings, and an `Image`\
    \ view is perfect for displaying graphics. However, what if you want to display\
    \ multiple chunks of data on the screen? That’s when you can use a grid that can\
    \ display data in rows (horizontally) or columns (vertically) as shown in Figure\
    \ 19-1.\n\n![An illustration of 2 sets of 4 square boxes arranged vertically and\
    \ horizontally. Vertical grid. 4 square boxes in a column. Horizontal grid. 4\
    \ square boxes in a row.](images/329781_7_En_19_Chapter/329781_7_En_19_Fig1_HTML.jpg)\n\
    \n**Figure 19-1** Grids can display data horizontally or vertically\n\nCreating\
    \ a grid requires three items:\n\n- The data you want to display\n- An array of\
    \ `GridItem` that defines how to arrange data in a grid\n- A `LazyVGrid` or `LazyHGrid`\
    \ that places your data in the array of `GridItem`\n\nThe term “Lazy” refers to\
    \ the way the grid loads data. If a grid needs to display 1000 items, it could\
    \ load all 1000 items in memory even though most of those items can’t be shown\
    \ on the screen. Since this wastes memory, “Lazy” grids only load those items\
    \ that need to be displayed. The moment the user scrolls to view more data, the\
    \ Lazy grid immediately loads those items. By waiting until the last second to\
    \ load data, Lazy grids use far less memory and allow an app to run more efficiently\
    \ at the slight tradeoff of running slightly slower.\n\n**Note:** Lazy grids are\
    \ commonly embedded inside of a `ScrollView` to let users scroll to see more data\
    \ stored in the grid.\n\nTo see how to create a simple horizontal and vertical\
    \ grid, follow these steps:\n\n![An illustration of 2 sets of numbers arranged\
    \ vertically and horizontally. Vertical grid. Numbers from 1 to 9 are labeled\
    \ inside the square boxes and arranged in a column. Horizontal grid. Numbers from\
    \ 1 to 8 are labeled inside the circles and arranged in a row.](images/329781_7_En_19_Chapter/329781_7_En_19_Fig2_HTML.jpg)\n\
    \n**Figure 19-2** Displaying a horizontal grid on top of a vertical grid\n\n1.\
    \ Create a new SwiftUI iOS App project and give it any name you wish such as “GridSimple.”\n\
    2. Click the `ContentView` file in the Navigator pane.\n3. Add a `VStack` and\
    \ create an array of `GridItem` inside the `var body: some View` like this:\n\n\
    ```\nvar body: some View {\n    VStack {\n        let gridItems = [GridItem()]\n\
    \    }\n}\n```\n\n`GridItem` is a structure in SwiftUI that allows you to define\
    \ the spacing between columns and rows. For now, we’ll just use default values\
    \ by leaving the `GridItem` parameter list empty.\n\n4. Add a `ScrollView` and\
    \ a `LazyHGrid` underneath the `gridItems` array like this:\n\n```\nScrollView(Axis.Set.horizontal,\
    \ showsIndicators: true, content: {\n    LazyHGrid(rows: gridItems) {\n      \
    \  Image(systemName: \"1.circle\")\n        Image(systemName: \"2.circle\")\n\
    \        Image(systemName: \"3.circle\")\n        Image(systemName: \"4.circle\"\
    )\n        Image(systemName: \"5.circle\")\n        Image(systemName: \"6.circle\"\
    )\n        Image(systemName: \"7.circle\")\n        Image(systemName: \"8.circle\"\
    )\n        Image(systemName: \"9.circle\")\n        Image(systemName: \"10.circle\"\
    )\n    }.font(.largeTitle)\n})\n```\n\nThis code defines a horizontal `ScrollView`\
    \ (`Axis.Set.horizontal`) with a `LazyHGrid` inside that displays a row of data.\
    \ The `LazyHGrid` can hold a maximum of ten (10) views, so we fill it with ten\
    \ `Image` views displaying a different number inside the circle. Since the circle\
    \ icons are small, the `.font(.largeTitle)` modifier makes them larger and easier\
    \ to see.\n\n5. Add a second `ScrollView` with a `LazyVGrid` underneath the other\
    \ `ScrollView` like this:\n\n```\nScrollView(Axis.Set.vertical, showsIndicators:\
    \ true, content: {\n    LazyVGrid(columns: gridItems) {\n        Image(systemName:\
    \ \"1.square\")\n        Image(systemName: \"2.square\")\n        Image(systemName:\
    \ \"3.square\")\n        Image(systemName: \"4.square\")\n        Image(systemName:\
    \ \"5.square\")\n        Image(systemName: \"6.square\")\n        Image(systemName:\
    \ \"7.square\")\n        Image(systemName: \"8.square\")\n        Image(systemName:\
    \ \"9.square\")\n        Image(systemName: \"10.square\")\n    }.font(.largeTitle)\n\
    })\n```\n\nThis code defines a vertical `ScrollView` (`Axis.Set.vertical`) with\
    \ a `LazyVGrid` inside that displays a column of data. That data consists of ten\
    \ `Image` views that display a different number inside of a square. The `.font(.largeTitle)`\
    \ modifier makes these square icons larger and easier to see. The entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View\
    \ {\n    var body: some View {\n        VStack {\n            let gridItems =\
    \ [GridItem()]\n            ScrollView(Axis.Set.horizontal, showsIndicators: true,\
    \ content: {\n                LazyHGrid(rows: gridItems) {\n                 \
    \   Image(systemName: \"1.circle\")\n                    Image(systemName: \"\
    2.circle\")\n                    Image(systemName: \"3.circle\")\n           \
    \         Image(systemName: \"4.circle\")\n                    Image(systemName:\
    \ \"5.circle\")\n                    Image(systemName: \"6.circle\")\n       \
    \             Image(systemName: \"7.circle\")\n                    Image(systemName:\
    \ \"8.circle\")\n                    Image(systemName: \"9.circle\")\n       \
    \             Image(systemName: \"10.circle\")\n                }.font(.largeTitle)\n\
    \            })\n            ScrollView(Axis.Set.vertical, showsIndicators: true,\
    \ content: {\n                LazyVGrid(columns: gridItems) {\n              \
    \      Image(systemName: \"1.square\")\n                    Image(systemName:\
    \ \"2.square\")\n                    Image(systemName: \"3.square\")\n       \
    \             Image(systemName: \"4.square\")\n                    Image(systemName:\
    \ \"5.square\")\n                    Image(systemName: \"6.square\")\n       \
    \             Image(systemName: \"7.square\")\n                    Image(systemName:\
    \ \"8.square\")\n                    Image(systemName: \"9.square\")\n       \
    \             Image(systemName: \"10.square\")\n                }.font(.largeTitle)\n\
    \            })\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6. Click the Live icon in the Canvas pane.\n7. Scroll the horizontal grid left\
    \ to right or right to left to see all the numbered circles as shown in Figure\
    \ 19-2.\n8. Scroll the vertical grid up and down to see all the numbered squares."
  raw: "# 19. Using Grids\n\nA Text view is fine for displaying strings, and an Image\
    \ view is perfect for displaying graphics. However, what if you want to display\
    \ multiple chunks of data on the screen? That’s when you can use a grid that can\
    \ display data in rows (horizontally) or columns (vertically) as shown in Figure\
    \ [19-1](#329781_7_En_19_Chapter.xhtml#Fig1).\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig1_HTML.jpg)\n\
    \nAn illustration of 2 sets of 4 square boxes arranged vertically and horizontally.\
    \ Vertical grid. 4 square boxes in a column. Horizontal grid. 4 square boxes in\
    \ a row.\n\nFigure 19-1\n\nGrids can display data horizontally or vertically\n\
    \nCreating a grid requires three items:\n\n*   The data you want to display\n\n\
    *   An array of GridItem that defines how to arrange data in a grid\n\n*   A LazyVGrid\
    \ or LazyHGrid that places your data in the array of GridItem\n\nThe term “Lazy”\
    \ refers to the way the grid loads data. If a grid needs to display 1000 items,\
    \ it could load all 1000 items in memory even though most of those items can’t\
    \ be shown on the screen. Since this wastes memory, “Lazy” grids only load those\
    \ items that need to be displayed. The moment the user scrolls to view more data,\
    \ the Lazy grid immediately loads those items. By waiting until the last second\
    \ to load data, Lazy grids use far less memory and allow an app to run more efficiently\
    \ at the slight tradeoff of running slightly slower.\n\nNote\n\nLazy grids are\
    \ commonly embedded inside of a Scroll View to let users scroll to see more data\
    \ stored in the grid.\n\nTo see how to create a simple horizonal and vertical\
    \ grid, follow these steps:\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig2_HTML.jpg)\n\
    \nAn illustration of 2 sets of numbers arranged vertically and horizontally. Vertical\
    \ grid. Numbers from 1 to 9 are labeled inside the square boxes and arranged in\
    \ a column. Horizontal grid. Numbers from 1 to 8 are labeled inside the circles\
    \ and arranged in a row.\n\nFigure 19-2\n\nDisplaying a horizontal grid on top\
    \ of a vertical grid\n\n1.  Create a new SwiftUI iOS App project and give it any\
    \ name you wish such as “GridSimple.”\n\n2.  Click the ContentView file in the\
    \ Navigator pane.\n\n3.  Add a VStack and create an array of GridItem inside the\
    \ var body: some View like this:\n\n```\n    var body: some View {\n    VStack\
    \ {\n    let gridItems = [GridItem()]\n    }\n    }\n    ```\n\nGridItem is a\
    \ structure in SwiftUI that allows you to define the spacing between columns and\
    \ rows. For now, we’ll just use default values by leaving the GridItem parameter\
    \ list empty.\n\n4.  Add a ScrollView and a LazyHGrid underneath the gridItems\
    \ array like this:\n\n```\n    ScrollView(Axis.Set.horizontal, showsIndicators:\
    \ true, content: {\n    LazyHGrid(rows: gridItems) {\n    Image(systemName: \"\
    1.circle\")\n    Image(systemName: \"2.circle\")\n    Image(systemName: \"3.circle\"\
    )\n    Image(systemName: \"4.circle\")\n    Image(systemName: \"5.circle\")\n\
    \    Image(systemName: \"6.circle\")\n    Image(systemName: \"7.circle\")\n  \
    \  Image(systemName: \"8.circle\")\n    Image(systemName: \"9.circle\")\n    Image(systemName:\
    \ \"10.circle\")\n    }.font(.largeTitle)\n    })\n    ```\n\nThis code defines\
    \ a horizontal Scroll View (Axis.Set.horizontal) with a LazyHGrid inside that\
    \ displays a row of data. The LazyHGrid can hold a maximum of ten (10) views,\
    \ so we fill it with ten Image views displaying a different number inside the\
    \ circle. Since the circle icons are small, the .font(.largeTitle) modifier makes\
    \ them larger and easier to see.\n\n5.  Add a second ScrollView with a LazyVGrid\
    \ underneath the other Scroll View like this:\n\n```\n    ScrollView(Axis.Set.vertical,\
    \ showsIndicators: true, content: {\n    LazyVGrid(columns: gridItems) {\n   \
    \ Image(systemName: \"1.square\")\n    Image(systemName: \"2.square\")\n    Image(systemName:\
    \ \"3.square\")\n    Image(systemName: \"4.square\")\n    Image(systemName: \"\
    5.square\")\n    Image(systemName: \"6.square\")\n    Image(systemName: \"7.square\"\
    )\n    Image(systemName: \"8.square\")\n    Image(systemName: \"9.square\")\n\
    \    Image(systemName: \"10.square\")\n    }.font(.largeTitle)\n    })\n    ```\n\
    \nThis code defines a vertical Scroll View (Axis.Set.vertical) with a LazyVGrid\
    \ inside that displays a column of data. That data consists of ten Image views\
    \ that display a different number inside of a square. The .font(.largeTitle) modifier\
    \ makes these square icons larger and easier to see. The entire ContentView file\
    \ should look like this:\n\n```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n    var body: some View {\n    VStack {\n    let gridItems = [GridItem()]\n\
    \    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n    LazyHGrid(rows:\
    \ gridItems) {\n    Image(systemName: \"1.circle\")\n    Image(systemName: \"\
    2.circle\")\n    Image(systemName: \"3.circle\")\n    Image(systemName: \"4.circle\"\
    )\n    Image(systemName: \"5.circle\")\n    Image(systemName: \"6.circle\")\n\
    \    Image(systemName: \"7.circle\")\n    Image(systemName: \"8.circle\")\n  \
    \  Image(systemName: \"9.circle\")\n    Image(systemName: \"10.circle\")\n   \
    \ }.font(.largeTitle)\n    })\n    ScrollView(Axis.Set.vertical, showsIndicators:\
    \ true, content: {\n    LazyVGrid(columns: gridItems) {\n    Image(systemName:\
    \ \"1.square\")\n    Image(systemName: \"2.square\")\n    Image(systemName: \"\
    3.square\")\n    Image(systemName: \"4.square\")\n    Image(systemName: \"5.square\"\
    )\n    Image(systemName: \"6.square\")\n    Image(systemName: \"7.square\")\n\
    \    Image(systemName: \"8.square\")\n    Image(systemName: \"9.square\")\n  \
    \  Image(systemName: \"10.square\")\n    }.font(.largeTitle)\n    })\n    }\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n\n6.  Click\
    \ the Live icon in the Canvas pane.\n\n7.  Scroll the horizontal grid left to\
    \ right or right to left to see all the numbered circles as shown in Figure [19-2](#329781_7_En_19_Chapter.xhtml#Fig2).\n\
    \n1.  Scroll the vertical grid up and down to see all the numbered squares."
  trans: "\n# 使用网格\n\n`Text` 视图适合显示文本，而 `Image` 视图则非常适合显示图形。但是，如果你想要在屏幕上显示多个数据块呢？这时就可以使用网格了，它能以行（水平）或列（垂直）的形式显示数据，如图\
    \ 19-1 所示。\n\n![两组由 4 个方框组成的集合，分别垂直和水平排列。垂直网格：一列中有 4 个方框。水平网格：一行中有 4 个方框。](img/329781_7_En_19_Fig1_HTML.jpg)\n\
    \n**图 19-1** 网格可以水平或垂直地显示数据\n\n创建网格需要三个要素：\n\n- 你想要显示的数据\n- 一个 `GridItem` 数组，用于定义如何在网格中排列数据\n\
    - 一个 `LazyVGrid` 或 `LazyHGrid`，用于将数据放置在 `GridItem` 数组中\n\n术语“Lazy”（懒加载）指的是网格加载数据的方式。如果一个网格需要显示\
    \ 1000 个项目，它可能会将全部 1000 个项目加载到内存中，即使其中大部分项目无法显示在屏幕上。这会造成内存浪费，因此“懒加载”网格只加载那些需要显示的项目。一旦用户滚动以查看更多数据，懒加载网格会立即加载这些项目。通过等到最后一刻才加载数据，懒加载网格使用的内存要少得多，并且能让应用运行更高效，代价是运行速度会略慢一些。\n\
    \n**注意：** 懒加载网格通常嵌入在 `ScrollView` 中，以便用户滚动查看更多存储在网格中的数据。\n\n要了解如何创建一个简单的水平和垂直网格，请遵循以下步骤：\n\
    \n![两组数字集合，分别垂直和水平排列。垂直网格：方框中标记了数字 1 到 9，并排成一列。水平网格：圆圈中标记了数字 1 到 8，并排成一行。](img/329781_7_En_19_Fig2_HTML.jpg)\n\
    \n**图 19-2** 在垂直网格上方显示一个水平网格\n\n1. 创建一个新的 SwiftUI iOS App 项目，并随意命名，例如“GridSimple”。\n\
    2. 在导航窗格中点击 `ContentView` 文件。\n3. 在 `var body: some View` 内部，添加一个 `VStack` 并创建一个\
    \ `GridItem` 数组，如下所示：\n\n```\nvar body: some View {\n    VStack {\n        let\
    \ gridItems = [GridItem()]\n    }\n}\n```\n\n`GridItem` 是 SwiftUI 中的一个结构体，允许你定义列与行之间的间距。目前，我们将使用默认值，即保留\
    \ `GridItem` 参数列表为空。\n\n4. 在 `gridItems` 数组下方，添加一个 `ScrollView` 和一个 `LazyHGrid`，如下所示：\n\
    \n```\nScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n   \
    \ LazyHGrid(rows: gridItems) {\n        Image(systemName: \"1.circle\")\n    \
    \    Image(systemName: \"2.circle\")\n        Image(systemName: \"3.circle\")\n\
    \        Image(systemName: \"4.circle\")\n        Image(systemName: \"5.circle\"\
    )\n        Image(systemName: \"6.circle\")\n        Image(systemName: \"7.circle\"\
    )\n        Image(systemName: \"8.circle\")\n        Image(systemName: \"9.circle\"\
    )\n        Image(systemName: \"10.circle\")\n    }.font(.largeTitle)\n})\n```\n\
    \n这段代码定义了一个水平 `ScrollView`（`Axis.Set.horizontal`），其中包含一个 `LazyHGrid`，用于显示一行数据。`LazyHGrid`\
    \ 最多可以容纳十（10）个视图，因此我们用它填充了十个 `Image` 视图，在圆圈内显示不同的数字。由于圆圈图标较小，`.font(.largeTitle)`\
    \ 修饰符使它们变得更大，更易于查看。\n\n5. 在另一个 `ScrollView` 下方，添加第二个包含 `LazyVGrid` 的 `ScrollView`，如下所示：\n\
    \n```\nScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n    LazyVGrid(columns:\
    \ gridItems) {\n        Image(systemName: \"1.square\")\n        Image(systemName:\
    \ \"2.square\")\n        Image(systemName: \"3.square\")\n        Image(systemName:\
    \ \"4.square\")\n        Image(systemName: \"5.square\")\n        Image(systemName:\
    \ \"6.square\")\n        Image(systemName: \"7.square\")\n        Image(systemName:\
    \ \"8.square\")\n        Image(systemName: \"9.square\")\n        Image(systemName:\
    \ \"10.square\")\n    }.font(.largeTitle)\n})\n```\n\n这段代码定义了一个垂直 `ScrollView`（`Axis.Set.vertical`），其中包含一个\
    \ `LazyVGrid`，用于显示一列数据。这些数据由十个 `Image` 视图组成，在方形内显示不同的数字。`.font(.largeTitle)` 修饰符使这些方形图标更大，更易于查看。整个\
    \ `ContentView` 文件看起来应该像这样：\n\n```\nimport SwiftUI\nstruct ContentView: View {\n\
    \    var body: some View {\n        VStack {\n            let gridItems = [GridItem()]\n\
    \            ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n\
    \                LazyHGrid(rows: gridItems) {\n                    Image(systemName:\
    \ \"1.circle\")\n                    Image(systemName: \"2.circle\")\n       \
    \             Image(systemName: \"3.circle\")\n                    Image(systemName:\
    \ \"4.circle\")\n                    Image(systemName: \"5.circle\")\n       \
    \             Image(systemName: \"6.circle\")\n                    Image(systemName:\
    \ \"7.circle\")\n                    Image(systemName: \"8.circle\")\n       \
    \             Image(systemName: \"9.circle\")\n                    Image(systemName:\
    \ \"10.circle\")\n                }.font(.largeTitle)\n            })\n      \
    \      ScrollView(Axis.Set.vertical, showsIndicators: true, content: {\n     \
    \           LazyVGrid(columns: gridItems) {\n                    Image(systemName:\
    \ \"1.square\")\n                    Image(systemName: \"2.square\")\n       \
    \             Image(systemName: \"3.square\")\n                    Image(systemName:\
    \ \"4.square\")\n                    Image(systemName: \"5.square\")\n       \
    \             Image(systemName: \"6.square\")\n                    Image(systemName:\
    \ \"7.square\")\n                    Image(systemName: \"8.square\")\n       \
    \             Image(systemName: \"9.square\")\n                    Image(systemName:\
    \ \"10.square\")\n                }.font(.largeTitle)\n            })\n      \
    \  }\n    }\n}\nstruct ContentView_Previews: PreviewProvider {\n    static var\
    \ previews: some View {\n        ContentView()\n    }\n}\n```\n\n6. 在画布窗格中点击 Live\
    \ 图标。\n7. 左右滚动水平网格，查看所有带数字的圆圈，如图 19-2 所示。\n8. 上下滚动垂直网格，查看所有带数字的方块。\n"
- fmt: "# Defining Multiple Rows/Columns\n\nThe previous project created a single\
    \ row in the `LazyHGrid` and a single column in the `LazyVGrid`. These single\
    \ row and column were defined by the array of `GridItem` like this:\n\n```\nlet\
    \ gridItems = [GridItem()]\n```\n\nIf you want to create multiple rows or columns,\
    \ just define the array with more than one `GridItem` like this:\n\n```\nlet gridItems\
    \ = [GridItem(),\nGridItem()\n]\n```\n\nThis will create two rows in a `LazyHGrid`\
    \ or two columns in a `LazyVGrid`. Each time you add an additional `GridItem`\
    \ to the array, you increase the number of rows or columns in the grid.\n\nTo\
    \ see how to change the number of rows or columns in a grid, follow these steps:\n\
    \n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig3_HTML.jpg)\n\nA diagram\
    \ illustrates numbers 1 to 10 arranged in three rows and columns that are horizontally\
    \ and vertically inside circle and square boxes.\n\n**Figure 19-3** – Displaying\
    \ a grid with three rows and three columns\n\n1.  Make sure to load the previous\
    \ project in Xcode (“GridSimple”).\n2.  Edit the array as follows to define three\
    \ rows in the `LazyHGrid` and three columns in the `LazyVGrid`:\n    ```\n   \
    \ let gridItems = [GridItem(),\n    GridItem(),\n    GridItem()\n    ]\n    ```\n\
    \    The entire `ContentView` file should look like this:\n    ```\n    import\
    \ SwiftUI\n    struct ContentView: View {\n    var body: some View {\n    VStack\
    \ {\n    let gridItems = [GridItem(),\n    GridItem(),\n    GridItem()\n    ]\n\
    \    ScrollView(Axis.Set.horizontal, showsIndicators: true, content: {\n    LazyHGrid(rows:\
    \ gridItems) {\n    Image(systemName: \"1.circle\")\n    Image(systemName: \"\
    2.circle\")\n    Image(systemName: \"3.circle\")\n    Image(systemName: \"4.circle\"\
    )\n    Image(systemName: \"5.circle\")\n    Image(systemName: \"6.circle\")\n\
    \    Image(systemName: \"7.circle\")\n    Image(systemName: \"8.circle\")\n  \
    \  Image(systemName: \"9.circle\")\n    Image(systemName: \"10.circle\")\n   \
    \ }.font(.largeTitle)\n    })\n    ScrollView(Axis.Set.vertical, showsIndicators:\
    \ true, content: {\n    LazyVGrid(columns: gridItems) {\n    Image(systemName:\
    \ \"1.square\")\n    Image(systemName: \"2.square\")\n    Image(systemName: \"\
    3.square\")\n    Image(systemName: \"4.square\")\n    Image(systemName: \"5.square\"\
    )\n    Image(systemName: \"6.square\")\n    Image(systemName: \"7.square\")\n\
    \    Image(systemName: \"8.square\")\n    Image(systemName: \"9.square\")\n  \
    \  Image(systemName: \"10.square\")\n    }.font(.largeTitle)\n    })\n    }\n\
    \    }\n    }\n    struct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n    ContentView()\n    }\n    }\n    ```\n3.  Click\
    \ the Live icon in the Canvas pane.\n4.  Scroll the horizontal grid left to right\
    \ or right to left to see all the numbered circles as shown in Figure 19-3.\n\
    5.  Scroll the vertical grid up and down to see all the numbered squares.\n\n\
    Notice that when filling out a `LazyHGrid`, SwiftUI places each item in a separate\
    \ row. That’s why circle 1 appears in the top row, circle 2 appears in the second\
    \ row, circle 3 appears in the third row, and circle 4 appears back in the top\
    \ row again.\n\nThe same holds true when filling out the `LazyVGrid` except SwiftUI\
    \ places each item in a separate column. Square 1 appears in the first column,\
    \ square 2 appears in the second column, square 3 appears in the third column,\
    \ and square 4 appears back in the first column again.\n\n> **Note**: The scroll\
    \ indicator only appears when the grid cannot show all items at the same time.\
    \ When displaying three rows or three columns, all items can be visible, so the\
    \ scroll indicator does not need to appear.\n\n## Adjusting Spacing Between Rows/Columns\n\
    \nBy creating an array of `GridItem`, we can define the number of rows/columns\
    \ in a grid. For additional customization, we can also define the spacing between\
    \ rows and columns. Three ways to define spacing between rows/columns in a grid\
    \ include:\n\n* `.fixed`\n* `.flexible`\n* `.adaptive`\n\nThe `.fixed` option\
    \ lets you define a decimal value (`CGFloat` data type) that creates a specific\
    \ spacing amount. Figure 19-4 shows different fixed spacing options and how they\
    \ affect the appearance of rows and columns in grids.\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig4_HTML.jpg)\n\
    \nA diagram illustrates numbers 1 to 10 arranged in three rows and columns that\
    \ are horizontally and vertically inside circle and square boxes. A snippet of\
    \ code is below the diagram.\n\n**Figure 19-4** – Various `.fixed` spacing options\
    \ for a grid\n\n> **Note**: In Figure 19-4, all `GridItem` elements in the array\
    \ use the same `.fixed` size value, but you can give each `GridItem` different\
    \ size values if you want.\n\nDefining a `.fixed` value for spacing rows and columns\
    \ in a grid will give predictable results on any iOS device. However, a `.fixed`\
    \ value may not always look good on smaller or larger iOS device screens. In case\
    \ you want to create grids that can change based on different screen sizes, use\
    \ `.flexible` or `.adaptive` instead.\n\nThe `.flexible` option tries to expand\
    \ spacing between rows/columns as much as possible. On the other hand, the `.adaptive`\
    \ option tries to shrink spacing between rows/columns as much as possible. Both\
    \ the `.flexible` and `.adaptive` options let you define a minimum and a maximum\
    \ value. This defines the range of values the grid spacing can use.\n\nIf no option\
    \ is chosen, the default value is `.flexible` with a maximum value of `.infinity`.\
    \ To see how the `.fixed`, `.flexible`, and `.adaptive` options work, follow these\
    \ steps:\n\n![](images/329781_7_En_19_Chapter/329781_7_En_19_Fig5_HTML.jpg)\n\n\
    A diagram illustrates numbers 1 to 10 arranged in three rows vertically inside\
