  trans: "\n# 使用导航堆栈\n\n与任何其他类型的堆栈（`VStack`、`HStack`、`ZStack`）一样，一个`NavigationStack`最多可以容纳十（10）个视图。一个`NavigationStack`通过如下代码包含多个视图：\n\
    \n```\nNavigationStack {\n    // 在此处放置多个视图\n}\n```\n\n在一个`NavigationStack`中，你需要一个或多个`NavigationLink`，每个`NavigationLink`定义一个可点击的视图和另一个要显示的视图。创建`NavigationLink`的一种方法是显示无额外格式的文本，然后定义要显示的视图，如下所示：\n\
    \n```\nNavigationLink(\"链接文本\") {\n    // 要显示的视图\n}\n```\n\n用户选择`NavigationLink`时显示的视图可以是单个视图（如`Text`视图），也可以是包含多个视图的堆栈。\n\
    \n创建`NavigationLink`的第二种方法允许你设置链接的外观并定义要显示的视图，如下所示：\n\n```\nNavigationLink {\n\
    \    // 要显示的视图\n} label: {\n    // 定义导航链接的视图\n}\n```\n\n要了解如何通过不同的方式创建`NavigationLink`来创建一个简单的导航堆栈，请按照以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其命名，例如\"NavigationStack\"。\n2. 在导航器窗格中单击`ContentView`文件。\n\
    3. 在`var body: some View`下方添加一个`NavigationStack`，如下所示：\n\n    ```\n    var body:\
    \ some View {\n        NavigationStack {\n        }\n    }\n    ```\n\n4. 在`NavigationStack`内部添加四个`NavigationLink`，如下所示：\n\
    \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \            NavigationLink {\n                Text(\"第二个视图\")\n            }\
    \ label: {\n                Label {\n                    Text(\"第二个链接\")\n   \
    \             } icon: {\n                    Image(systemName: \"sun.and.horizon.circle\"\
    )\n                }\n            }.padding()\n            NavigationLink {\n\
    \                Image(systemName: \"ellipsis.message\")\n                   \
    \ .font(.system(size: 125))\n            } label: {\n                VStack {\n\
    \                    Text(\"第三个视图\")\n                    Image(systemName: \"\
    figure.archery\")\n                }.font(.largeTitle)\n            }.padding()\n\
    \            NavigationLink(\"第四个视图\") {\n                VStack {\n         \
    \           Image(systemName: \"airplane.departure\")\n                      \
    \  .font(.system(size: 120))\n                    Text(\"出发时间是 12:15\")\n    \
    \                    .font(.largeTitle)\n                }\n            }.padding()\n\
    \        }\n    }\n    ```\n\n    请注意，每个`NavigationLink`定义了创建导航链接和用户选择该特定导航链接时显示的视图的不同方式。\n\
    \n    整个`ContentView`文件应如下所示：\n\n    ```\n    import SwiftUI\n    struct ContentView:\
    \ View {\n        var body: some View {\n            NavigationStack {\n     \
    \           NavigationLink {\n                    Text(\"第一个视图\")\n          \
    \      } label: {\n                    Text(\"第一个链接\")\n                     \
    \   .font(.largeTitle)\n                }.padding()\n                NavigationLink\
    \ {\n                    Text(\"第二个视图\")\n                } label: {\n       \
    \             Label {\n                        Text(\"第二个链接\")\n             \
    \       } icon: {\n                        Image(systemName: \"sun.and.horizon.circle\"\
    )\n                    }\n                }.padding()\n                NavigationLink\
    \ {\n                    Image(systemName: \"ellipsis.message\")\n           \
    \             .font(.system(size: 125))\n                } label: {\n        \
    \            VStack {\n                        Text(\"第三个视图\")\n             \
    \           Image(systemName: \"figure.archery\")\n                    }.font(.largeTitle)\n\
    \                }.padding()\n                NavigationLink(\"第四个视图\") {\n  \
    \                  VStack {\n                        Image(systemName: \"airplane.departure\"\
    )\n                            .font(.system(size: 120))\n                   \
    \     Text(\"出发时间是 12:15\")\n                            .font(.largeTitle)\n\
    \                    }\n                }.padding()\n            }\n        }\n\
    \    }\n    struct ContentView_Previews: PreviewProvider {\n        static var\
    \ previews: some View {\n            ContentView()\n        }\n    }\n    ```\n\
    \n5. 在画布窗格中单击**LIVE**图标。所有四个`NavigationLink`都会显示在用户界面上。\n6. 单击任意显示的`NavigationLink`。该`NavigationLink`定义的视图就会显示出来。\n\
    \n## 为导航堆栈添加标题\n\n一个`NavigationStack`只是在屏幕上显示一个或多个`NavigationLink`。但是，你可能希望通过在其上添加标题来确保用户理解这些`NavigationLink`的用途。标题可以以两种样式（`.large`或`.inline`）之一显示，如图\
    \ 17-2 所示。\n\n![图 17-2](img/329781_7_En_17_Fig2_HTML.jpg)\n\n**图 17-2** 比较导航堆栈上方`.large`和`.inline`标题的外观\n\
    \n要在导航堆栈上方显示标题，请使用以下修饰符：\n\n```\n.navigationTitle(\"导航堆栈\")\n```\n\n要更改标题的外观，请使用以下修饰符：\n\
    \n```\n.navigationBarTitleDisplayMode(.inline)\n```\n\n> **注意：** 当将`.navigationTitle`和`.navigationBarTitleDisplayMode`修饰符添加到`NavigationStack`时，请将这些修饰符放在`NavigationStack`的最后一个花括号内，如下所示：\n\
    >\n> ```\n> NavigationStack {\n>     .navigationTitle(\"导航堆栈标题\")\n>     .navigationBarTitleDisplayMode(.inline)\n\
    > }\n> ```\n\n`.navigationTitle`修饰符定义了将显示在屏幕顶部、导航堆栈上方的文本。`.navigationBarTitleDisplayMode`修饰符定义了该标题在屏幕上的显示方式。两个选项是`.large`和`.inline`（见图\
    \ 17-2）。如果你没有定义`.navigationBarTitleDisplayMode`，则默认值为`.large`。\n\n要了解如何为导航堆栈显示标题并更改其外观，请按照以下步骤操作：\n\
    \n1. 创建一个新的 SwiftUI iOS 应用程序项目，并为其命名，例如\"NavigationStackTitle\"。\n2. 在导航器窗格中单击`ContentView`文件。\n\
    3. 在`struct ContentView: View`下方添加一个状态变量，如下所示：\n\n    ```\n    @State var titleType\
    \ = NavigationBarItem.TitleDisplayMode.large\n    ```\n\n4. 在`var body: some View`内部添加一个`NavigationStack`，如下所示：\n\
    \n    ```\n    var body: some View {\n        NavigationStack {\n        }\n \
    \   }\n    ```\n\n5. 在`NavigationStack`内部添加一个`NavigationLink`，如下所示：\n\n    ```\n\
    \    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \        }\n    }\n    ```\n\n6. 添加`.navigationTitle`和`.navigationBarTitleDisplayMode`修饰符，如下所示：\n\
    \n    ```\n    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"第一个视图\")\n            } label: {\n               \
    \ Text(\"第一个链接\")\n                    .font(.largeTitle)\n            }.padding()\n\
    \            .navigationTitle(\"导航堆栈\")\n            .navigationBarTitleDisplayMode(titleType)\n\
    \        }\n    }\n    ```\n\n> **注意：** `.navigationTitle`修饰符不仅定义了导航堆栈上方的标题，还定义了返回按钮中显示的文本。如果`.navigationTitle`修饰符不存在，返回按钮将只显示\"\
    返回\"。\n\n7. 添加一个包含两个`Button`的`HStack`，如下所示：\n\n    ```\n    var body: some View\
    \ {\n        NavigationStack {\n            NavigationLink {\n               \
    \ Text(\"第一个视图\")\n            } label: {\n                Text(\"第一个链接\")\n \
    \                   .font(.largeTitle)\n            }.padding()\n            .navigationTitle(\"\
    导航堆栈\")\n            .navigationBarTitleDisplayMode(titleType)\n            HStack(spacing:\
    \ 50) {\n                Button(\".large\") {\n                    titleType =\
    \ NavigationBarItem.TitleDisplayMode.large\n                }\n              \
    \  Button(\".inline\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.inline\n\
    \                }\n            }\n        }\n    }\n    ```\n\n8. 在画布窗格中单击**LIVE**图标。\n\
    9. 单击`.large`和`.inline`按钮，查看导航堆栈标题的外观如何变化。\n"
- fmt: "# Adding Buttons to a Navigation Stack\n\nBesides displaying a title above\
    \ a Navigation Stack, you can also display one or more buttons at the top of the\
    \ screen. These buttons appear on a toolbar that you can add by using the `.toolbar`\
    \ modifier inside the Navigation Stack like this:\n\n```\nNavigationStack {\n\
    \    .navigationTitle(\"Navigation Title\")\n    .toolbar {\n    }\n}\n```\n\n\
    By default, the color of any buttons or icons defined inside the `.toolbar` will\
    \ be blue. If you want to define a different color, you can add the `.accentColor`\
    \ modifier to the NavigationStack like this:\n\n```\nNavigationStack {\n    .navigationTitle(\"\
    Navigation Title\")\n    .toolbar {\n    }\n}.accentColor(.purple)\n```\n\nInside\
    \ the `.toolbar` modifier is where you can define one or more `ToolbarItem`s.\
    \ For each `ToolbarItem` you add, you can define its placement (in the upper-left\
    \ corner as `.navigationBarLeading` or in the upper-right corner as `.navigationBarTrailing`).\
    \ In addition, you must define the appearance of the button and the code to run\
    \ if the user selects that button like this:\n\n```\n.toolbar {\n    ToolbarItem(placement:\
    \ .navigationBarLeading) {\n        Button {\n            //  Code to run\n  \
    \      } label: {\n            //  Define button’s appearance here\n        }\n\
    \    }\n    ToolbarItem(placement: .navigationBarTrailing) {\n        Button {\n\
    \            //  Code to run\n        } label: {\n            //  Define button’s\
    \ appearance here\n        }\n    }\n}\n```\n\nTo see how to define buttons in\
    \ a Navigation Stack, follow these steps:\n\n![](images/329781_7_En_17_Chapter/329781_7_En_17_Fig3_HTML.jpg)\n\
    \n**Figure 17-3.** The appearance of toolbar buttons with the `.toolbar` modifier\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as \"NavigationStackButtons.\"\n\n2.  Click the `ContentView` file in the Navigator\
    \ pane.\n\n3.  Add two State variables under the `struct ContentView: View` line\
    \ like this:\n\n    ```\n    @State var titleType = NavigationBarItem.TitleDisplayMode.large\n\
    \    @State var message = \"\"\n    ```\n\n4.  Add a `NavigationStack` inside\
    \ the `var body: some View` like this:\n\n    ```\n    var body: some View {\n\
    \        NavigationStack {\n        }\n    }\n    ```\n\n5.  Add the `.accentColor`\
    \ modifier to the NavigationStack like this:\n\n    ```\n    var body: some View\
    \ {\n        NavigationStack {\n        }.accentColor(.purple)\n    }\n    ```\n\
    \n6.  Add a `NavigationLink` inside the NavigationStack like this:\n\n    ```\n\
    \    var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"The 1st view\")\n            } label: {\n        \
    \        Text(\"First link\")\n                    .font(.largeTitle)\n      \
    \      }.padding()\n            .navigationTitle(\"Navigation Stack\")\n     \
    \       .navigationBarTitleDisplayMode(titleType)\n        }.accentColor(.purple)\n\
    \    }\n    ```\n\n7.  Add the `.toolbar` modifier like this:\n\n    ```\n   \
    \ var body: some View {\n        NavigationStack {\n            NavigationLink\
    \ {\n                Text(\"The 1st view\")\n            } label: {\n        \
    \        Text(\"First link\")\n                    .font(.largeTitle)\n      \
    \      }.padding()\n            .navigationTitle(\"Navigation Stack\")\n     \
    \       .navigationBarTitleDisplayMode(titleType)\n            .toolbar {\n  \
    \              ToolbarItem(placement: .navigationBarLeading) {\n             \
    \       Button {\n                        message = \"iCloud icon tapped\"\n \
    \                   } label: {\n                        Image(systemName: \"icloud\"\
    )\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"Done button tapped\"\n                    } label: {\n    \
    \                    Text(\"Done\")\n                    }\n                }\n\
    \            }\n        }.accentColor(.purple)\n    }\n    ```\n\nFor each `ToolbarItem`,\
    \ you can define the button's appearance with either a `Text` view or an `Image`\
    \ view. The preceding code displays a cloud icon in the upper-left corner and\
    \ the word \"Done\" in the upper-right corner as shown in Figure [17-3](#329781_7_En_17_Chapter.xhtml#Fig3).\n\
    \n8.  Add a `Text` view and an `HStack` with two `Button`s inside of them like\
    \ this:\n\n    ```\n    var body: some View {\n        NavigationStack {\n   \
    \         NavigationLink {\n                Text(\"The 1st view\")\n         \
    \   } label: {\n                Text(\"First link\")\n                    .font(.largeTitle)\n\
    \            }.padding()\n            .navigationTitle(\"Navigation Stack\")\n\
    \            .navigationBarTitleDisplayMode(titleType)\n            .toolbar {\n\
    \                ToolbarItem(placement: .navigationBarLeading) {\n           \
    \         Button {\n                        message = \"iCloud icon tapped\"\n\
    \                    } label: {\n                        Image(systemName: \"\
    icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"Done button tapped\"\n                    } label: {\n    \
    \                    Text(\"Done\")\n                    }\n                }\n\
    \            }\n            Text(message)\n            HStack (spacing: 50) {\n\
    \                Button (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
    \                }\n                Button (\".inline\") {\n                 \
    \   titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n\
    \            }\n        }.accentColor(.purple)\n    }\n    ```\n\nThe entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View\
    \ {\n    @State var titleType = NavigationBarItem.TitleDisplayMode.large\n   \
    \ @State var message = \"\"\n    var body: some View {\n        NavigationStack\
    \ {\n            NavigationLink {\n                Text(\"The 1st view\")\n  \
    \          } label: {\n                Text(\"First link\")\n                \
    \    .font(.largeTitle)\n            }.padding()\n            .navigationTitle(\"\
    Navigation Stack\")\n            .navigationBarTitleDisplayMode(titleType)\n \
    \           .toolbar {\n                ToolbarItem(placement: .navigationBarLeading)\
    \ {\n                    Button {\n                        message = \"iCloud\
    \ icon tapped\"\n                    } label: {\n                        Image(systemName:\
    \ \"icloud\")\n                    }\n                }\n                ToolbarItem(placement:\
    \ .navigationBarTrailing) {\n                    Button {\n                  \
    \      message = \"Done button tapped\"\n                    } label: {\n    \
    \                    Text(\"Done\")\n                    }\n                }\n\
    \            }\n            Text(message)\n            HStack (spacing: 50) {\n\
    \                Button (\".large\") {\n                    titleType = NavigationBarItem.TitleDisplayMode.large\n\
    \                }\n                Button (\".inline\") {\n                 \
    \   titleType = NavigationBarItem.TitleDisplayMode.inline\n                }\n\
    \            }\n        }.accentColor(.purple)\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n9.  Click the Live icon in the Canvas pane.\n\n10. Click the\
    \ buttons defined by `ToolbarItem`s. Notice each time you click a toolbar button,\
    \ a message appears in the `Text` view such as \"iCloud icon tapped\" or \"Done\
    \ button tapped.\""
