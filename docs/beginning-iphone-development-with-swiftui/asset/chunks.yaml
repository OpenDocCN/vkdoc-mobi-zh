  trans: "\n# 12. 使用警告框、操作列表和上下文菜单\n\n几乎每个应用都需要向用户显示并接收数据。显示数据的最简单方式是通过`Text`视图，但有时你需要展示数据并给用户提供回应方式。此时，你可以使用`Alert`（警告框）或`Action\
    \ Sheet`（操作列表）。另一种向用户显示选项的方式是上下文菜单。\n\n`Alert`会在屏幕上弹出，让用户有机会做出回应。用户可以通过点击一个或多个按钮来关闭`Alert`，如图\
    \ 12-1 所示。\n\n![](img/329781_7_En_12_Fig1_HTML.jpg)\n\n一个显示警告信息的对话框截图。文字显示\"僵尸出没\"\
    。底部有一个\"确定\"按钮。\n\n图 12-1\n\n一个`Alert`通常显示一条消息和一个或多个按钮\n\n`Action Sheet`看起来与`Alert`几乎相同，区别在于`Alert`出现在屏幕中央，而`Action\
    \ Sheet`从底部滑入并显示在屏幕底部。`Alert`更侧重于吸引用户注意，例如在你要删除无法恢复或撤销的数据时发出警告。而操作列表则更侧重于作为提醒，可能不那么关键或具有破坏性。\n\
    \n上下文菜单在长按`Text`视图等视图后出现。它会弹出一个选项列表供用户选择，如图 12-2 所示。\n\n![](img/329781_7_En_12_Fig2_HTML.jpg)\n\
    \n一个上下文菜单的截图，包含红色、紫色、绿色和橙色等颜色选项列表。底部文字显示\"选择一种颜色\"。\n\n图 12-2\n\n上下文菜单列出多个选项供选择\n\
    \n## 显示警告框/操作列表\n\n每个用户界面都需要向用户回显数据。在某些情况下，这些数据可以仅通过标签显示，但有时你需要确保用户看到特定信息。在这些情况下，你应该使用警告控制器。\n\
    \n`Alert`/`Action Sheet`会覆盖在应用的用户界面之上，并可通过更改以下属性进行自定义：\n\n*   标题 – 显示在`Alert`/`Action\
    \ Sheet`顶部的文本，通常为粗体大字号\n*   消息 – 显示在标题下方、字号较小的文本\n*   一个或多个按钮 – 可关闭`Alert`/`Action\
    \ Sheet`的按钮\n\n标题通常由单个单词或短语组成，用以说明警告控制器的用途，例如显示\"警告\"或\"登录\"。要关闭`Alert`/`Action\
    \ Sheet`，你至少需要一个按钮。\n\n要了解如何创建一个仅显示标题、消息和关闭按钮的简单`Alert`/`Action Sheet`，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如\"Alert\"。\n2.  在导航器窗格中点击`ContentView`文件。\n\
    3.  在`struct ContentView: View`行下添加以下`State`变量：\n\n    ```\n    @State var showAlert\
    \ = false\n    ```\n\n4.  添加一个包含`Button`的`VStack`，如下所示：\n\n    ```\n    var body:\
    \ some View {\n        VStack {\n            Button(\"Show Alert\") {\n      \
    \          showAlert.toggle()\n            }\n        }\n    }\n    ```\n\n5.\
    \  向`Button`添加`.alert`修饰符，如下所示：\n\n    ```\n    .alert(isPresented: $showAlert)\
    \ {\n        Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"\
    ), dismissButton: .default(Text(\"OK\")))\n    }\n    ```\n\n    当`showAlert`的`State`变量为`true`时，此`.alert`修饰符会显示一个`Alert`。它使用一个`Text`视图显示\"\
    Warning!\"，并使用第二个`Text`视图显示\"Zombies on the loose\"。最后，它使用第三个`Text`视图在`Button`上显示\"\
    OK\"。\n\n注意\n    `Alert`使用`dismissButton:`参数来定义单个显示的按钮。为简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，例如：`Alert.Button.default`。\n\
    \n整个`ContentView`文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n\
    \    @State var showAlert = false\n    \n    var body: some View {\n        VStack\
    \ {\n            Button(\"Show Alert\") {\n                showAlert.toggle()\n\
    \            }\n            .alert(isPresented: $showAlert) {\n              \
    \  Alert(title: Text(\"Warning!\"), message: Text(\"Zombies on the loose\"), dismissButton:\
    \ .default(Text(\"OK\")))\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6.  点击画布窗格中的\"Live\"图标，然后点击`Button`以显示屏幕中央的`Alert`（参见图 12-1）。\n\
    7.  点击\"OK\"关闭`Alert`。\n8.  将`.alert`替换为`.actionSheet`，如下所示：\n\n    ```\n    .actionSheet(isPresented:\
    \ $showAlert) {\n        ActionSheet(title: Text(\"Warning!\"), message: Text(\"\
    Zombies on the loose\"), buttons: [.default(Text(\"OK\"))])\n    }\n    ```\n\n\
    注意\n    在`Alert`使用`dismissButton:`参数定义`Button`的地方，`ActionSheet`使用`buttons:`参数，并将一个或多个按钮用方括号`[\
    \ ]`括起来（类似数组）。为简化代码，你可以直接使用样式（`.default`）来定义`Button`的外观，而不是使用更长的版本，例如：`ActionSheet.Button.default`。\n\
    \n9.  点击模拟 iOS 屏幕上的`Button`。注意，现在屏幕底部会出现一个`Action Sheet`。\n10. 点击\"OK\"按钮关闭`Action\
    \ Sheet`。\n\n创建`Alert`或`Action Sheet`几乎完全相同，仅在定义按钮以及使用`.alert`（和`Alert`）还是`.actionSheet`（`ActionSheet`）时略有差异。\n"
- fmt: "### Displaying and Responding to Multiple Buttons\n\nThe simplest `Alert`/`ActionSheet`\
    \ displays a single button that allows the user to dismiss it. However, you may\
    \ want to give the user more than one option to choose and then respond differently\
    \ depending on which button the user taps.\n\nAn `Alert` can display up to two\
    \ buttons called `primaryButton` and `secondaryButton`. An `ActionSheet` can display\
    \ up to three buttons. For each button you want to display, you can choose one\
    \ of three styles as shown in Figure [12-3](#329781_7_En_12_Chapter.xhtml#Fig3):\n\
    \n![](images/329781_7_En_12_Chapter/329781_7_En_12_Fig3_HTML.jpg)\n\nA screenshot\
    \ of a context menu denotes a warning message at the top. It denotes 3 options\
    \ at the bottom labeled default, destructive, and cancel.\n\nFigure 12-3\n\nThe\
    \ three different styles for buttons\n\n- `.default` – Displays text in blue\n\
    - `.destructive` – Displays text in red\n- `.cancel` – Displays text in bold\n\
    \nTo see how to create an `Alert` that displays two buttons, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “AlertTwoButtons.”\n2. Click the `ContentView` file in the Navigator pane.\n\
    3. Add the following `State` variable under the `struct ContentView: View` line:\n\
    \n```\n@State var showAlert = false\n```\n\n4. Add a `VStack` and a `Button` inside\
    \ the `var body: some View` like this:\n\n```\nvar body: some View {\n    VStack\
    \ {\n        Button(\"Show Alert\") {\n            showAlert.toggle()\n      \
