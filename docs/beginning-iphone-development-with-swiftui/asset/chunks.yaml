    \ = classification\n    }\n    }\n    ```\n\n4.  Add the following array underneath\
    \ the struct ContentView: View line like this:\n\n```\n    struct ContentView:\
    \ View {\n    var Animals: [Species] = [\n    Species(name: \"Mammal\", classification:\
    \ [\n    Species(name: \"Dog\", classification: [\n    Species(name: \"Poodle\"\
    ),\n    Species(name: \"Collie\"),\n    Species(name: \"St. Bernard\"),\n    ]),\n\
    \    Species(name: \"Cat\"),\n    Species(name: \"Elephant\"),\n    Species(name:\
    \ \"Whale\"),\n    ]),\n    Species(name: \"Bird\", classification: [\n    Species(name:\
    \ \"Canary\"),\n    Species(name: \"Parakeet\"),\n    Species(name: \"Eagle\"\
    ),\n    ]),\n    ]\n    ```\n\n5.  Add the OutlineGroup underneath the var body:\
    \ some View line like this:\n\n```\n    var body: some View {\n    List {\n  \
    \  OutlineGroup(Animals, id: \\.id, children: \\.classification) { creature in\n\
    \    Text(creature.name)\n    }\n    }\n    }\n    ```\n\nThe entire ContentView\
    \ file should look like this:\n\n```\n    import SwiftUI\n    class Species: Identifiable\
    \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
    \    init(name: String, classification: [Species]? = nil) {\n    self.name = name\n\
    \    self.classification = classification\n    }\n    }\n    struct ContentView:\
    \ View {\n    var Animals: [Species] = [\n    Species(name: \"Mammal\", classification:\
    \ [\n    Species(name: \"Dog\", classification: [\n    Species(name: \"Poodle\"\
    ),\n    Species(name: \"Collie\"),\n    Species(name: \"St. Bernard\"),\n    ]),\n\
    \    Species(name: \"Cat\"),\n    Species(name: \"Elephant\"),\n    Species(name:\
    \ \"Whale\"),\n    ]),\n    Species(name: \"Bird\", classification: [\n    Species(name:\
    \ \"Canary\"),\n    Species(name: \"Parakeet\"),\n    Species(name: \"Eagle\"\
    ),\n    ]),\n    ]\n    var body: some View {\n    List {\n    OutlineGroup(Animals,\
    \ id: \\.id, children: \\.classification) { creature in\n    Text(creature.name)\n\
    \    }\n    }\n    }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n    ContentView()\n    }\n    }\n \
    \   ```\n\n6.  Click the Live icon in the Canvas pane.\n\n7.  Click any of the\
    \ items in the Outline Group that displays a > character on the far right. This\
    \ indicates that the item contains additional lists that can be displayed (see\
    \ Figure [15-2](#329781_7_En_15_Chapter.xhtml#Fig2)).\n\nOutline groups can be\
    \ handy for storing and displaying lists of items that the user can hide or display.\
    \ Since outline groups use arrays, there’s no limit to the number of items you\
    \ can display in an Outline Group (unlike the ten-view limit of a Disclosure Group).\n\
    \n## Summary\n\nDisclosure groups can be handy for hiding one or more views temporarily\
    \ out of sight. By clicking the Disclosure Group title, you can toggle between\
    \ seeing additional views and hiding them. Think of disclosure groups as a collapsible\
    \ list of views.\n\nWhile disclosure groups make it easy to hide or view data,\
    \ scroll views make it easy to scroll up or down (or left and right) to view additional\
    \ data. You can even use scroll views inside of disclosure groups as well.\n\n\
    If you need to display data in a hierarchy, consider using the Outline Group.\
    \ An Outline Group requires defining a class that contains the properties you\
    \ want to store along with a UUID() to automatically create distinct ID numbers\
    \ for each chunk of data. Then you need to create an array of objects, based on\
    \ the class you defined. Finally, you can use an OutlineGroup to display data\
    \ on the screen.\n\nDisclosure groups, scroll views, and outline groups are just\
    \ different ways to group related data together. Disclosure groups act like collapsible\
    \ lists. Scroll views let users see data that might normally get cut off. Outline\
    \ groups act like multiple disclosure groups that can selectively hide or display\
    \ data. The whole purpose of all three views is to provide different ways to display\
    \ information to the user."
  trans: "\n# 使用大纲组\n\n大纲组就像一个超级公开组。主要区别在于，公开组最多只能显示十个视图，而大纲组可以显示在单独类中定义的无限数量的项目。此外，大纲组会自动缩进类别，便于查看项目之间的层级关系（见图\
    \ 15-2）。\n\n大纲组用于显示定义关系的对象数组。要使用大纲组，你需要执行以下操作：\n\n-   创建一个类，用于存放你想要显示的数据。\n- \
    \  创建一个数组，用于存放由该类定义的多个对象。\n-   创建一个大纲组，用于显示存储在对象中的数据。\n\n要创建存放待显示数据的类，你需要使其遵循\
    \ `Identifiable` 协议。这样，基于该类的每个对象都会拥有一个唯一的标识号，如下所示：\n\n```\nclass Species: Identifiable\
    \ {\n    let id = UUID()\n}\n```\n\n接下来，你需要定义要在大纲组中显示的数据，例如一个字符串：\n\n```\nclass\
    \ Species: Identifiable {\n    let id = UUID()\n    var name: String\n}\n```\n\
    \n下一步是创建一个可选的数组，用于存放子类别。这些子类别项目也必须是同一个类，如下所示：\n\n```\nclass Species: Identifiable\
    \ {\n    let id = UUID()\n    var name: String\n    var classification: [Species]?\n\
    }\n```\n\n最后，该类需要一个初始化器，因为该类的属性都没有初始值。这意味着每次创建对象时，都必须为其属性赋值。在这种情况下，唯一需要赋值的属性是\
    \ `name` 属性，它持有一个绝对必要的 `String` 数据类型。另一个名为 `classification` 的属性可以持有一个对象数组，但也可以是\
    \ `nil` 值：\n\n```\nclass Species: Identifiable {\n    let id = UUID()\n    var\
    \ name: String\n    var classification: [Species]?\n\n    init(name: String, classification:\
    \ [Species]? = nil) {\n        self.name = name\n        self.classification =\
    \ classification\n    }\n}\n```\n\n定义类之后，下一步是定义一个数组，用于存放基于该类的对象，如下所示：\n\n```\n\
    var Animals: [Species] = [\n    Species(name: \"Mammal\", classification: [\n\
    \        Species(name: \"Dog\", classification: [\n            Species(name: \"\
    Poodle\"),\n            Species(name: \"Collie\"),\n        ]),\n    ]),\n]\n\
    ```\n\n注意，这个数组被定义为存放基于已定义类（本例中为 `Animals`）的对象。数组中的每个对象都需要一个名称（例如 `Mammal` 或 `Collie`）。有些对象不包含子类别列表，但对于那些包含子类别的对象，你需要指定一个基于同一类（`Species`）的对象数组。在上面的例子中，`Dog`\
    \ 对象定义了一个包含 `Poodle` 和 `Collie` 的对象数组。\n\n第三步是定义一个大纲组：\n\n```\nOutlineGroup(Animals,\
    \ id: \\.id, children: \\.classification) { creature in\n    Text(creature.name)\n\
    }\n```\n\n这定义了要使用的数组（`Animals`），并使用唯一 ID（由类声明中的 `UUID()` 定义）来显示数组中的每个项目。如果对象中存储了任何子项或子类别，则由\
    \ `children:` 参数指定。最后，`OutlineGroup` 内的 `Text` 视图会显示每个对象的 `name` 属性。\n\n要了解如何使用大纲组，请按照以下步骤操作：\n\
    \n1.  创建一个新的 SwiftUI iOS App 项目，并为其任意命名，例如 `OutlineGroup`。\n2.  在导航器窗格中点击 `ContentView`\
    \ 文件。\n3.  在 `import SwiftUI` 行下方添加以下类声明，如下所示：\n\n```\n    class Species: Identifiable\
    \ {\n        let id = UUID()\n        var name: String\n        var classification:\
    \ [Species]?\n\n        init(name: String, classification: [Species]? = nil) {\n\
    \            self.name = name\n            self.classification = classification\n\
    \        }\n    }\n```\n\n4.  在 `struct ContentView: View` 行下方添加以下数组，如下所示：\n\n\
    ```\n    struct ContentView: View {\n        var Animals: [Species] = [\n    \
    \        Species(name: \"Mammal\", classification: [\n                Species(name:\
    \ \"Dog\", classification: [\n                    Species(name: \"Poodle\"),\n\
    \                    Species(name: \"Collie\"),\n                    Species(name:\
    \ \"St. Bernard\"),\n                ]),\n                Species(name: \"Cat\"\
    ),\n                Species(name: \"Elephant\"),\n                Species(name:\
    \ \"Whale\"),\n            ]),\n            Species(name: \"Bird\", classification:\
    \ [\n                Species(name: \"Canary\"),\n                Species(name:\
    \ \"Parakeet\"),\n                Species(name: \"Eagle\"),\n            ]),\n\
    \        ]\n```\n\n5.  在 `var body: some View` 行下方添加 `OutlineGroup`，如下所示：\n\n\
    ```\n    var body: some View {\n        List {\n            OutlineGroup(Animals,\
    \ id: \\.id, children: \\.classification) { creature in\n                Text(creature.name)\n\
    \            }\n        }\n    }\n```\n\n整个 `ContentView` 文件应如下所示：\n\n```\n  \
    \  import SwiftUI\n\n    class Species: Identifiable {\n        let id = UUID()\n\
    \        var name: String\n        var classification: [Species]?\n\n        init(name:\
    \ String, classification: [Species]? = nil) {\n            self.name = name\n\
    \            self.classification = classification\n        }\n    }\n\n    struct\
    \ ContentView: View {\n        var Animals: [Species] = [\n            Species(name:\
    \ \"Mammal\", classification: [\n                Species(name: \"Dog\", classification:\
    \ [\n                    Species(name: \"Poodle\"),\n                    Species(name:\
    \ \"Collie\"),\n                    Species(name: \"St. Bernard\"),\n        \
    \        ]),\n                Species(name: \"Cat\"),\n                Species(name:\
    \ \"Elephant\"),\n                Species(name: \"Whale\"),\n            ]),\n\
    \            Species(name: \"Bird\", classification: [\n                Species(name:\
    \ \"Canary\"),\n                Species(name: \"Parakeet\"),\n               \
    \ Species(name: \"Eagle\"),\n            ]),\n        ]\n\n        var body: some\
    \ View {\n            List {\n                OutlineGroup(Animals, id: \\.id,\
    \ children: \\.classification) { creature in\n                    Text(creature.name)\n\
    \                }\n            }\n        }\n    }\n\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n```\n\n6.  点击 Canvas 窗格中的 Live 图标。\n7.  点击大纲组中任何在右侧显示 `>` 字符的项目。这表示该项目包含可展开显示的附加列表（见图\
    \ 15-2）。\n\n大纲组对于存储和显示用户可以隐藏或展开的项目列表非常方便。由于大纲组使用数组，因此你可以在大纲组中显示的项目数量没有限制（不同于公开组的十视图限制）。\n\
    \n# 总结\n\n公开组可以方便地将一个或多个视图临时隐藏起来。通过点击公开组标题，你可以在查看附加视图和隐藏它们之间切换。可以将公开组视为可折叠的视图列表。\n\
    \n虽然公开组使得隐藏或显示数据变得容易，但滚动视图使得上下滚动（或左右滚动）以查看更多数据变得容易。你甚至可以在公开组内部使用滚动视图。\n\n如果你需要以层级结构显示数据，请考虑使用大纲组。使用大纲组需要定义一个类，其中包含你想要存储的属性，以及一个\
    \ `UUID()` 来为每条数据自动创建唯一的 ID 号。然后，你需要根据定义的类创建一个对象数组。最后，你可以使用 `OutlineGroup` 在屏幕上显示数据。\n\
    \n公开组、滚动视图和大纲组只是将相关数据分组到一起的不同方式。公开组像可折叠的列表。滚动视图让用户看到通常可能被截断的数据。大纲组像多个公开组，可以有选择地隐藏或显示数据。这三种视图的全部目的就是提供向用户展示信息的不同方式。\n"
- fmt: '# 16. Creating Charts


    Apps need to display information to users. Whether that information might be text
    or numbers, large amounts of data can be difficult to understand. That’s why many
    apps convert information into charts that can make it easy to track trends, make
    comparisons, or identify ratios. Charts simply convert numeric data into colorful
    images that are easy to understand at a glance.


    The key to creating any chart is to identify the data you have and determine what
    story you want to tell about that data. For example, a list of sales can be used
    to show how sales are growing (or shrinking), which time periods are most profitable
    (and which are least profitable), how different salespeople compare, or which
    products might be selling better than others.


    There is no right or wrong way to create a chart from data. Since charts are meant
    to communicate, the only mistake you can make is creating a chart that doesn’t
    tell the story you want to tell about your data. `SwiftUI` can create the following
    types of charts as shown in Figure [16-1](#329781_7_En_16_Chapter.xhtml#Fig1):


    ![An illustration represents a set of charts. it includes a bar chart, line chart,
    area chart, point chart, and rectangle chart.](images/329781_7_En_16_Chapter/329781_7_En_16_Fig1_HTML.jpg)


    **Figure 16-1** Different types of charts available


    - Bar

    - Point

    - Line

    - Area

    - Rectangle


    Charts use numeric data to define marks along an axis. The mark visually measures
    data, while an axis acts like a ruler that helps users determine the quantities
    that each mark represents. In a bar chart, an individual bar is a mark, while
    in a line chart, an individual line is a mark as shown in Figure [16-2](#329781_7_En_16_Chapter.xhtml#Fig2).


    ![An illustration represents a bar chart and denotes the marks, along with the
    x and y axes.](images/329781_7_En_16_Chapter/329781_7_En_16_Fig2_HTML.jpg)


    **Figure 16-2** Identifying marks and axes in a chart


    To create charts, you must import the `Charts` framework like this:


    ```

    import Charts

    ```


    Then you can define a chart within the body like this:


    ```

    Chart {

    }

    ```


    ## Creating a Bar Chart


    To create a bar chart, you need to use `BarMark` to define an x and a y value
    like this:


    ```

    BarMark(x: .value("Category", "Chart Label"),

    y: .value("Quantity", 0))

    ```


    The x value defines the category of the data (to help you understand what each
    mark represents) and the label to display on the chart. The y value defines the
    quantity of the data followed by a numeric value as shown in Figure [16-3](#329781_7_En_16_Chapter.xhtml#Fig3).


    ![A bar graph denotes 2 bars. The larger bar represents the dog and the smaller
    bar represents the cat. A set of text at the bottom indicates the y-axis values
    for the dog and cat as 25 and 18 respectively.](images/329781_7_En_16_Chapter/329781_7_En_16_Fig3_HTML.jpg)


    **Figure 16-3** How a `BarMark` defines a bar chart


    Notice that in Figure [16-3](#329781_7_En_16_Chapter.xhtml#Fig3), the texts “Dogs”
    and “Cats” appear under each mark, and the numeric values 25 and 18 define the
    height of each mark. The text “Animals” helps identify the category that “Dogs”
    and “Cats” fall under, and the text “Number adopted” helps identify what each
    numeric value means.


    Notice that neither “Animals” nor “Number adopted” appears on the chart since
    this text is meant to help you understand the data each mark displays. Also notice
    that instead of using fixed numeric values, you could replace one or more with
    variables instead. That way the chart can change appearance when values change.


    To see how to create a simple bar chart, follow these steps:


    1.  Create a new `SwiftUI` iOS App project and give it any name you wish such
    as “BarChartSimple.”

    2.  Click the `ContentView` file in the Navigator pane.

    3.  Add the `Charts` framework underneath the `SwiftUI` framework like this:


    ```

    import Charts

    ```


    1.  Add a `@State` variable under the `struct ContentView: View` line like this:


    ```

    @State var sliderValue = 50.0

    ```


    1.  Add a `Chart` inside the `VStack` like this:


    ```

    var body: some View {

    VStack {

    Chart {

    }

    }

    }

    ```


    1.  Add two `BarMark`s inside the `Chart` to define two bars like this:


    ```

    var body: some View {

    VStack {

    Chart {

    BarMark(x: .value("Name", "Oscar"),

    y: .value("Sales", 50))

    BarMark(x: .value("Name", "Mayer"),

    y: .value("Sales", Int(sliderValue)))

    }

    }

    }

    ```


    This code defines a bar chart with two vertical bars.


    1.  Add the following `HStack` underneath the `Chart` like this:


    ```

    var body: some View {

    VStack {

    Chart {

    BarMark(x: .value("Name", "Oscar"),

    y: .value("Sales", 50))

    BarMark(x: .value("Name", "Mayer"),

    y: .value("Sales", Int(sliderValue)))

    }

    HStack {

    Text("\(Int(sliderValue))")

    Slider(value: $sliderValue, in: 1...100)

    }.padding()

    }

    }

    ```


    The `HStack` displays a `Text` view and a `Slider` where the `Text` view displays
    the current value of the `Slider`, which can range from 1 to 100. The entire `ContentView`
    file should look like this:


    ```

    import SwiftUI

    import Charts

    struct ContentView: View {

    @State var sliderValue = 50.0

    var body: some View {

    VStack {

    Chart {

    BarMark(x: .value("Name", "Oscar"),

    y: .value("Sales", 50))

    BarMark(x: .value("Name", "Mayer"),

    y: .value("Sales", Int(sliderValue)))

    }

    HStack {

    Text("\(Int(sliderValue))")

    Slider(value: $sliderValue, in: 1...100)

    }.padding()

    }

    }

    }

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    1.  Click the Live icon in the Canvas pane.

    2.  Drag the `Slider` to see how the value of the `Slider` adjusts the height
    of the second bar. As you drag the `Slider` to change its value, notice how the
    `Charts` framework automatically adjusts the values of the Y-axis up to a maximum
    of 100.'
