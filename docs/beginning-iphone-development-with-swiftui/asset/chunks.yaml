    \    y: .value(\"Sales\", x.sales))\n    RuleMark(y: .value(\"Average Sales\"\
    , (mySalesArray.map{Int($0.sales)}).reduce(0, +)/Set(mySalesArray.map({$0.sales})).count))\n\
