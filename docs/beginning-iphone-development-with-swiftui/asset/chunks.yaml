    Button(action: {\nmessage = \"Delete chosen\"\n}) {\nLabel(\"Delete\", systemImage:\
    \ \"trash\")\n}\n} label: {\nLabel(\"Options\", systemImage: \"pencil.circle\"\
    )\n}\n```\n\nThe preceding code displays a Menu list as shown in Figure [10-10](#329781_7_En_10_Chapter.xhtml#Fig10).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig10_HTML.jpg)\n\nA screenshot\
    \ of the Options tab. The three options are labeled Open, Find, and Delete, with\
    \ corresponding symbols.\n\nFigure 10-10\n\nDisplaying Buttons in a Menu list\
    \ using the Label view"
  trans: "\n# 使用菜单\n\n有时您可能想为用户提供多个选项。在屏幕上塞满多个按钮可能显得笨拙，就连分段控件也可能限制过多。当您需要在狭小空间内展示多个选项时，就可以使用\
    \ `Menu`。\n\n`Menu` 在用户界面上仅以 `Button` 的形式呈现。当用户点击它时，`Menu` 会显示一个选项列表（见图 10-1）。现在用户可以点击某个选项，或打开另一个子菜单以查看更多选项。`Menu`\
    \ 使得在有限空间中隐藏多个选项变得轻而易举。\n\n最简单的 `Menu` 由标题和由 `Button` 定义的选项列表组成，如下所示：\n\n```\n\
    Menu(\"Options\") {\n    Button(\"打开 \", action: openFile)\n    Button(\"查找\"\
    , action: findFile)\n    Button(\"删除...\", action: deleteFile)\n}\n```\n\n上述代码会在屏幕上显示一个带有“Options”文字的\
    \ `Menu`。当用户点击“Options”时，会出现一个菜单，列出三个选项——打开、查找和删除……——如图 10-8 所示。\n\n![](img/329781_7_En_10_Fig8_HTML.jpg)\n\
    \n*Options 选项卡的截图。列出的三个选项分别为“打开”、“查找”和“删除”。*\n\n**图 10-8** — `Menu` 在下拉菜单中显示一组\
    \ `Button`\n\n当用户点击某个 `Button` 时，该 `Button` 会调用如 `openFile`、`findFile` 或 `deleteFile`\
    \ 等函数。请注意，这些函数调用不包含参数列表，例如 `openFile()`。要了解如何创建简单的 `Menu`，请按以下步骤操作：\n\n1. 创建一个新的\
    \ SwiftUI iOS App 项目，并随意命名，例如“MenuSimple”。\n\n2. 在导航器窗格中点击 `ContentView` 文件。\n\
    \n3. 在 `struct ContentView: View` 行下方添加以下 `State` 变量：\n\n    ```\n    @State var\
    \ message = \"\"\n    ```\n\n4. 将 `var body: some View` 下的 `VStack` 修改如下：\n\n\
    \    ```\n    var body: some View {\n        VStack {\n            Text(message)\n\
    \                .padding()\n            Menu(\"Options\") {\n               \
    \ Button(\"打开 \", action: openFile)\n                Button(\"查找\", action: findFile)\n\
    \                Button(\"删除...\", action: deleteFile)\n            }\n      \
    \      Spacer()\n        }\n    }\n    ```\n\n    所有三个 `Button` 都调用函数来执行操作。因此我们需要创建函数来让这些\
    \ `Button` 生效。\n\n5. 在 `struct ContentView: View` 的最后一个右花括号上方，添加以下三个函数：\n\n  \
    \  ```\n    func openFile() {\n        message = \"已选择打开\"\n    }\n    func findFile()\
    \ {\n        message = \"已选择查找\"\n    }\n    func deleteFile() {\n        message\
    \ = \"已选择删除\"\n    }\n    ```\n\n    完整的 `ContentView` 文件应如下所示：\n\n    ```\n \
    \   import SwiftUI\n\n    struct ContentView: View {\n        @State var message\
    \ = \"\"\n\n        var body: some View {\n            VStack {\n            \
    \    Text(message)\n                    .padding()\n                Menu(\"Options\"\
    ) {\n                    Button(\"打开 \", action: openFile)\n                 \
    \   Button(\"查找\", action: findFile)\n                    Button(\"删除...\", action:\
    \ deleteFile)\n                }\n            }\n        }\n\n        func openFile()\
    \ {\n            message = \"已选择打开\"\n        }\n\n        func findFile() {\n\
    \            message = \"已选择查找\"\n        }\n\n        func deleteFile() {\n \
    \           message = \"已选择删除\"\n        }\n    }\n\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n6. 在画布窗格中点击“Live”图标。\n\n7. 在模拟的 iOS 设备中间点击“Options”按钮。会出现一个菜单，列出由三个\
    \ `Button` 视图定义的三个选项：打开、查找和删除……\n\n8. 点击任意选项。请注意，无论选择哪个选项，它都会在 `Menu` 上方的 `Text`\
    \ 视图中显示略有不同的消息。\n\n请注意，`Menu` 中的每个 `Button` 都调用了由 `action:` 参数定义的函数。除了调用函数，您也可以将一条或多条命令直接放在花括号内，如下所示：\n\
    \n```\nMenu(\"Options\") {\n    Button(\"打开 \", action: {\n        message = \"\
    已选择打开\"\n    })\n    Button(\"查找\", action: {\n        message = \"已选择查找\"\n \
    \   })\n    Button(\"删除...\", action: {\n        message = \"已选择删除\"\n    })\n\
    }\n```\n\n## 格式化菜单和按钮的标题\n\n`Menu` 允许您定义一个像标准 `Button` 一样显示的标题。但是，如果您想格式化标题，还有一种替代方式来定义\
    \ `Menu`。除了仅定义要显示为标题的文字外，您还可以定义一个 `label:` 参数，在其中使用 `Text` 或 `Label` 视图，如下所示：\n\
    \n```\nMenu {\n    Button(\"打开 \", action: {\n        message = \"已选择打开\"\n  \
    \  })\n    Button(\"查找\", action: {\n        message = \"已选择查找\"\n    })\n   \
    \ Button(\"删除...\", action: {\n        message = \"已选择删除\"\n    })\n} label: {\n\
    \    Text(\"Options\")\n        .font(.largeTitle)\n        .foregroundColor(.purple)\n\
    \        .italic()\n}\n```\n\n此示例使用 `.largeTitle` 字体、紫色和斜体显示 `Menu` 的标题。除了使用 `Text`\
    \ 视图，您还可以使用 `Label` 视图来并排显示图标和文字，例如：\n\n```\nMenu {\n    Button(\"打开 \", action:\
    \ {\n        message = \"已选择打开\"\n    })\n    Button(\"查找\", action: {\n     \
    \   message = \"已选择查找\"\n    })\n    Button(\"删除...\", action: {\n        message\
    \ = \"已选择删除\"\n    })\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\"\
    )\n}\n```\n\n通过使用 `label:` 参数来定义 `Menu` 的标题，您可以通过多种方式定制 `Menu` 的标题。使用上述 `Label`\
    \ 视图会显示带有图标和文字的 `Menu`，如图 10-9 所示。\n\n![](img/329781_7_En_10_Fig9_HTML.jpg)\n\n\
    *一个选项图标。*\n\n**图 10-9** — `Label` 视图为 `Menu` 标题显示图标和文字\n\n您还可以使用 `Label` 视图（而非\
    \ `Text` 视图）来格式化 `Button` 标题，如下所示：\n\n```\nMenu {\n    Button(action: {\n    \
    \    message = \"已选择打开\"\n    }) {\n        Label(\"打开\", systemImage: \"book\"\
    )\n    }\n    Button(action: {\n        message = \"已选择查找\"\n    }) {\n      \
    \  Label(\"查找\", systemImage: \"magnifyingglass\")\n    }\n    Button(action:\
    \ {\n        message = \"已选择删除\"\n    }) {\n        Label(\"删除\", systemImage:\
    \ \"trash\")\n    }\n} label: {\n    Label(\"Options\", systemImage: \"pencil.circle\"\
    )\n}\n```\n\n上述代码会显示一个 `Menu` 列表，如图 10-10 所示。\n\n![](img/329781_7_En_10_Fig10_HTML.jpg)\n\
    \n*Options 选项卡的截图。三个选项分别标记为“打开”、“查找”和“删除”，并带有对应符号。*\n\n**图 10-10** — 使用 `Label`\
    \ 视图在 `Menu` 列表中显示 `Button`\n"
- fmt: "### Adding a Submenu\n\nA `Menu` can display a list of options defined by\
    \ `Button`s. However, a `Menu` can also display submenus that list additional,\
    \ related commands as shown in Figure [10-11](#329781_7_En_10_Chapter.xhtml#Fig11).\n\
    \n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig11_HTML.jpg)\n\n*A screenshot\
    \ of the Options tab. The three options are labeled Open, Find, and Delete. The\
    \ submenu includes copy and paste formats.*\n\n**Figure 10-11** — Displaying a\
    \ submenu\n\nTo create a submenu, just define another `Menu` instead of a `Button`.\
    \ Then include additional `Button`s inside the submenu like this:\n\n```\nMenu(\"\
    Options\") {\n    Button(\"Open \", action: openFile)\n    Button(\"Find\", action:\
    \ findFile)\n    Button(\"Delete...\", action: deleteFile)\n    Menu(\"Submenu\"\
    ) {\n        Button(\"Copy Format\", action: copyFormat)\n        Button(\"Paste\
    \ Format\", action: pasteFormat)\n    }\n}\n```\n\n**Note**\n\nIt’s possible to\
    \ create submenus inside of submenus. As a general rule, use only one level of\
    \ submenus, or else so many lists of options can look confusing to the user.\n\
    \nTo see how submenus work, follow these steps:\n\n![](images/329781_7_En_10_Chapter/329781_7_En_10_Fig12_HTML.jpg)\n\
    \n*A screenshot of the Options tab. The three options are labeled Open, Find,\
    \ and Delete. The submenu is denoted by the right arrow symbol.*\n\n**Figure 10-12**\
    \ — The `>` symbol identifies a submenu\n\n1.  Create a new SwiftUI iOS App project\
    \ and give it any name you wish such as “Submenu.”\n2.  Click the `ContentView`\
    \ file in the Navigator pane.\n3.  Edit the `ContentView` file so its entire contents\
    \ look like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View\
    \ {\n        @State var message = \"\"\n        var body: some View {\n      \
    \      VStack {\n                Text(message)\n                    .padding()\n\
    \                Menu(\"Options\") {\n                    Button(\"Open \", action:\
    \ openFile)\n                    Button(\"Find\", action: findFile)\n        \
    \            Button(\"Delete...\", action: deleteFile)\n                    Menu(\"\
    Submenu\") {\n                        Button(\"Copy Format\", action: copyFormat)\n\
    \                        Button(\"Paste Format\", action: pasteFormat)\n     \
    \               }\n                }\n                Spacer()\n            }\n\
    \        }\n        func openFile() {\n            message = \"Open chosen\"\n\
    \        }\n        func findFile() {\n            message = \"Find chosen\"\n\
    \        }\n        func deleteFile() {\n            message = \"Delete chosen\"\
    \n        }\n        func copyFormat() {\n            message = \"Copy format\
    \ chosen\"\n        }\n        func pasteFormat() {\n            message = \"\
    Paste format chosen\"\n        }\n    }\n    struct ContentView_Previews: PreviewProvider\
    \ {\n        static var previews: some View {\n            ContentView()\n   \
    \     }\n    }\n    ```\n\n4.  Click the Live icon in the Canvas pane.\n5.  Click\
    \ Options defined by the `Menu`. This displays a list of options including the\
    \ submenu identified by a `>` symbol as shown in Figure [10-12](#329781_7_En_10_Chapter.xhtml#Fig12).\n\
    6.  Click the submenu to see an additional list of options appear.\n\nSubmenus\
    \ make it easy to group related options together, but since these options are\
    \ initially hidden from view, use submenus sparingly to avoid confusing the user.\n\
    \n## Summary\n\nLinks and menus are two additional ways a user interface can display\
    \ options for the user to select. A `Link` opens a browser and jumps to a specific\
    \ website. A `ShareLink` lets you share information with another app. Menus display\
    \ a list of options defined by `Button`s and other `Menu`s that define submenus.\n\
    \nBy using the `Label` view in a `Menu`, you can combine an icon with text side\
    \ by side. By using the `Text` view in a `Menu`, you can customize the appearance\
    \ of text that appears on the user interface such as choosing a font or color.\
    \ Menus give you a way to display multiple options to the user without taking\
    \ up a lot of space on the screen.\n\n# 11. Touch Gestures\n\nAllowing the user\
    \ to control an app through buttons, toggles, or menus is handy, but all of these\
    \ controls take up space on the screen. To eliminate the need for extra objects\
    \ on the user interface, your app can also detect and respond to touch gestures\
    \ that allow direct manipulation of items displayed on the screen.\n\nThe different\
    \ types of touch gestures that an iOS app can detect and respond to include:\n\
    \n- **Tap** – A fingertip touches the screen and lifts up.\n- **Spatial tap**\
    \ – One or more fingertips touching the screen and reporting the tap location.\n\
    - **Pinch** – Two fingertips come together or move apart.\n- **Rotation** – Two\
    \ fingertips rotate left or right in a circular motion.\n- **Pan** – A fingertip\
    \ slides in a dragging motion across the screen.\n- **Swipe** – A fingertip slides\
    \ up, down, left, or right across the screen and lifts up.\n- **Long press** –\
    \ A fingertip touches and presses down on the screen.\n\nYou can apply touch gestures\
    \ to any view such as an `Image` view, a `Text` view, or a shape like a `Rectangle`\
    \ or `Ellipse`.\n\n## Detecting Tap Gestures\n\nTap gestures simply detect when\
    \ a user taps the screen. By default, a tap gesture recognizes a single tap by\
    \ one fingertip, but you can define multiple taps by two or more fingertips.\n\
    \nTo see how to detect tap gestures, follow these steps:\n\n1.  Create a new SwiftUI\
    \ iOS App project and give it any name you wish such as “TapGesture.”\n2.  Click\
    \ the `ContentView` file in the Navigator pane.\n3.  Add the following `State`\
    \ variable under the `struct ContentView: View` line:\n\n    ```\n    @State var\
    \ changeMe = false\n    ```\n\n4.  Add a `VStack` inside the body along with a\
    \ `Rectangle` like this:\n\n    ```\n    var body: some View {\n        VStack\
    \ {\n            Rectangle()\n                .frame(width: 175, height: 125)\n\
    \                .foregroundColor(changeMe ? .red : .yellow)\n               \
    \ .onTapGesture {\n                    changeMe.toggle()\n                }\n\
    \        }\n    }\n    ```\n\n    This creates a `Rectangle` that fills up the\
    \ entire screen. Then the `.frame` modifier restricts its width to 175 and its\
    \ height to 125. The `.foregroundColor` modifier uses the `changeMe` `State` variable\
    \ to decide whether to color the `Rectangle` with red or yellow.\n\n    The `.onTapGesture`\
    \ modifier lets the `Rectangle` detect a single tap gesture. When it detects a\
    \ tap gesture, it toggles the value of the `changeMe` `State` variable from `true`\
    \ to `false` (or `false` to `true`). The entire `ContentView` file should look\
    \ like this:\n\n    ```\n    import SwiftUI\n    struct ContentView: View {\n\
    \        @State var changeMe = false\n        var body: some View {\n        \
    \    VStack {\n                Rectangle()\n                    .frame(width:\
    \ 175, height: 125)\n                    .foregroundColor(changeMe ? .red : .yellow)\n\
    \                    .onTapGesture {\n                        changeMe.toggle()\n\
    \                    }\n            }\n        }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n        static var previews: some View {\n            ContentView()\n\
    \        }\n    }\n    ```\n\n5.  Click the Live icon in the Canvas pane.\n6.\
    \  Click the `Rectangle`. Notice that each time you click the `Rectangle`, the\
    \ `.onTapGesture` modifier toggles the `changeMe` `State` variable, which alternates\
    \ the `Rectangle` color between red and yellow.\n\nBy default, the `.onTapGesture`\
    \ modifier detects a single tap gesture. If you want to detect multiple taps such\
    \ as a double or triple tap, you can define the `count:` parameter like this:\n\
    \n```\n.onTapGesture(count: 2)\n```\n\nA value of 2 defines a double tap, while\
    \ a value of 3 would define a triple tap."
