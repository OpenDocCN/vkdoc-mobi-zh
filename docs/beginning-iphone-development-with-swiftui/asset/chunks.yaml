    \ 现在可以扩展行之间的间距，如图 19-5 所示。\n\n![](img/329781_7_En_19_Fig6_HTML.jpg)\n\n此图展示了数字\
    \ 1 到 10 垂直排列成三行，位于圆形内。\n\n**图 19-6**\n"
