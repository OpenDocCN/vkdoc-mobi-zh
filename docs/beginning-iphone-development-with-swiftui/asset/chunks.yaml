  trans: "\n### 在动画中使用延迟和持续时间\n\n通过两种方式可以按时间修改动画，即延迟和持续时间。延迟让你指定动画开始前等待的秒数。持续时间则让你指定动画应持续多久。较大的时间值会使动画运行得更慢，而较短的时间值会使动画运行得更快。\n\
