- fmt: "## Summary\n\nGrids offer another way to display views on the user interface.\
    \ `LazyHGrids` can display views horizontally in rows, while `LazyVGrids` can\
    \ display views vertically in columns. To use grids, you need the data you want\
    \ to display, an array of `GridItem` that defines how to arrange data in a grid,\
    \ and a `LazyHGrid` or `LazyVGrid`.\n\nThe number of `GridItem` defined in the\
    \ array determines the number of rows/columns displayed in the grid. With each\
    \ `GridItem`, you can define a spacing option such as `.fixed`, `.flexible`, or\
    \ `.adaptive`.\n\nThe `.fixed` option lets you define a decimal value for spacing\
    \ such as `25.7`. The `.flexible` option tries to expand spacing as much as possible,\
    \ while the `.adaptive` option tries to shrink spacing as much as possible. You\
    \ can apply different spacing options to each `GridItem` in an array.\n\nBy using\
    \ grids, you can display data in rows and columns. Grids are often embedded in\
    \ a `Scroll View` to allow users to scroll up/down or left/right to view data\
    \ that might not be visible due to the size of the grid and the iOS device screen.\n\
    \nIf you want to display data in a table, use a grid to define the table, and\
    \ then use multiple `GridRows` to define the number of rows. Within each `GridRow`,\
    \ define one or more views where the total number of views defines the number\
    \ of columns in the table. Grids are simply a convenient way to organize and display\
    \ related data so it’s easy for users to read.\n\n# Using Animation\n\nAnimation\
    \ can move items on a user interface to provide feedback or just add an aesthetic\
    \ touch. Unlike traditional animation created by hand where cartoonists had to\
    \ draw every single frame but slightly differently, animation in SwiftUI works\
    \ by simply defining a starting and an ending state. Then SwiftUI takes care of\
    \ animating an item in between those starting and ending states.\n\nThe three\
    \ most common types of animation involve:\n\n* Moving – Changing the `x` and `y`\
    \ position of an item on the user interface\n* Scaling – Changing the size of\
    \ an item by shrinking or enlarging it\n* Rotating – Changing the angle of an\
    \ item in either a clockwise or counterclockwise direction\n\nCreating animation\
    \ involves defining what to animate, how to animate it (move, scale, rotate),\
    \ and when to animate it. Animation typically occurs when the user does something\
    \ (such as tap a button) or when a specific event occurs (such as a numeric value\
    \ reaching a certain point).\n\n## Moving Animation\n\nTo move a view, we must\
    \ define an `x`, `y` starting location and an `x`, `y` ending location. The two\
    \ modifiers that specify location are `.position` and `.offset`.\n\nThe `.position`\
    \ modifier places a view at a specific `x` and `y` position away from the upper-left\
    \ corner of an iOS device screen, which is considered the origin (0,0). The `.offset`\
    \ modifier places a view at a specific `x` and `y` position away from where it\
    \ would normally appear on the user interface.\n\nThe `.position` modifier defines\
    \ fixed locations on the screen. The `.offset` modifier defines locations relative\
    \ to where it would normally appear if its `.offset` modifier `x` and `y` values\
    \ were `0`. In both cases, positive `x` values move a view to the right, and positive\
    \ `y` values move a view down as shown in Figure 20-1.\n\n![](images/329781_7_En_20_Chapter/329781_7_En_20_Fig1_HTML.jpg)\n\
    \nA set of 2 rectangular boxes. The top left corner has a diagonal arrow that\
    \ labels the position modifier. A rectangle at the center of the vertical rectangular\
    \ box labels the offset modifier, which marks with a diagonal arrow.\n\nFigure\
    \ 20-1: The difference between the `.position` modifier and the `.offset` modifier\n\
    \n**Note:** With both the `.position` and `.offset` modifiers, it’s possible that\
    \ extreme `x` or `y` values could place a view off the screen.\n\nTo see how to\
    \ move a view using the `.position` and `.offset` modifiers, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ \"AnimationMove.\"\n2. Click the ContentView file in the Navigator pane.\n3.\
    \ Add a `State` variable under the `struct ContentView: View` line like this:\n\
    \n```\n@State var move = true\n```\n\n4. Add a `Text` view and a `Toggle` inside\
    \ the `VStack` like this:\n\n```\nvar body: some View {\n    VStack {\n      \
    \  Text(\"A Text view\")\n            .offset(x: move ? 100 : 0, y: move ? 100\
    \ : 0)\n        Toggle(isOn: $move) {\n            Text(\"Toggle me\")\n     \
    \   }\n    }\n}\n```\n\nThe entire `ContentView` file should look like this:\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var move = true\n\
    \n    var body: some View {\n        VStack {\n            Text(\"A Text view\"\
    )\n                .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n           \
    \ Toggle(isOn: $move) {\n                Text(\"Toggle me\")\n            }\n\
    \        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n    }\n}\n```\n\n5. Click\
    \ the Live icon in the Canvas pane.\n6. Click the Toggle. Notice that the `.offset`\
    \ modifier moves the `Text` view away from its normal position.\n7. Edit the `ContentView`\
    \ file and replace `.offset` with `.position` like this:\n\n```\n.position(x:\
    \ move ? 100 : 0, y: move ? 100 : 0)\n```\n\n8. Make sure Live is still turned\
    \ on and click the Toggle. Notice that the `Text` view now moves based on the\
    \ origin (0,0) in the upper-left corner of the screen.\n\nBoth the `.offset` and\
    \ `.position` modifiers cause the `Text` view to jump from one location to another.\
    \ Now it’s time to add the `.animation` modifier to the `Text` view so the movement\
    \ appears smoother.\n\n9. Add the `.animation` modifier to the `Text` view so\
    \ the entire `ContentView` should look like this:\n\n```\nimport SwiftUI\n\nstruct\
    \ ContentView: View {\n    @State var move = true\n\n    var body: some View {\n\
    \        VStack {\n            Text(\"A Text view\")\n                .position(x:\
    \ move ? 100 : 0, y: move ? 100 : 0)\n                .animation(.default, value:\
    \ move)\n            Toggle(isOn: $move) {\n                Text(\"Toggle me\"\
    )\n            }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n10. Make sure Live is still turned on and click the Toggle. Notice that the\
    \ `Text` view now appears animated as it moves based on the origin (0,0) in the\
    \ upper-left corner of the screen.\n11. Replace the `.position` modifier with\
    \ the `.offset` modifier.\n12. Make sure Live is still turned on and click the\
    \ Toggle. Notice that the `Text` view now appears animated as it moves based on\
    \ its normal location.\n\nIn this project, the `.animation` modifier provides\
    \ the transition between the two different `x` and `y` locations of the `Text`\
    \ view. Each time the `Toggle` changes the Boolean `State` variable, the animation\
    \ runs again.\n\nThe `.animation` modifier requires defining the type of animation\
    \ you want (such as `.default`) and the variable that will trigger the animation.\
    \ In this case, each time the `move` variable changes, we want animation, so that's\
    \ why the `.animation` modifier displays `move` in its value parameter like this:\n\
    \n```\n@State var move = true\n.animation(.default, value: move)\n```"
  raw: "## Summary\n\nGrids offer another way to display views on the user interface.\
    \ LazyHGrids can display views horizontally in rows, while LazyVGrids can display\
    \ views vertically in columns. To use grids, you need the data you want to display,\
    \ an array of GridItem that defines how to arrange data in a grid, and a LazyHGrid\
    \ or LazyVGrid.\n\nThe number of GridItem defined in the array determines the\
    \ number of rows/columns displayed in the grid. With each GridItem, you can define\
    \ a spacing option such as .fixed, .flexible, or .adaptive.\n\nThe .fixed option\
    \ lets you define a decimal value for spacing such as 25.7. The .flexible option\
    \ tries to expand spacing as much as possible, while the .adaptive option tries\
    \ to shrink spacing as much as possible. You can apply different spacing options\
    \ to each GridItem in an array.\n\nBy using grids, you can display data in rows\
    \ and columns. Grids are often embedded in a Scroll View to allow users to scroll\
    \ up/down or left/right to view data that might not be visible due to the size\
    \ of the grid and the iOS device screen.\n\nIf you want to display data in a table,\
    \ use a grid to define the table, and then use multiple GridRows to define the\
    \ number of rows. Within each GridRow, define one or more views where the total\
    \ number of views defines the number of columns in the table. Grids are simply\
    \ a convenient way to organize and display related data so it’s easy for users\
    \ to read.\n\n# 20. Using Animation\n\nAnimation can move items on a user interface\
    \ to provide feedback or just add an aesthetic touch. Unlike traditional animation\
    \ created by hand where cartoonists had to draw every single frame but slightly\
    \ differently, animation in SwiftUI works by simply defining a starting and an\
    \ ending state. Then SwiftUI takes care of animating an item in between those\
    \ starting and ending states.\n\nThe three most common types of animation involve\n\
    \n*   Moving – Changing the x and y position of an item on the user interface\n\
    \n*   Scaling – Changing the size of an item by shrinking or enlarging it\n\n\
    *   Rotating – Changing the angle of an item in either a clockwise or counterclockwise\
    \ direction\n\nCreating animation involves defining what to animate, how to animate\
    \ it (move, scale, rotate), and when to animate it. Animation typically occurs\
    \ when the user does something (such as tap a button) or when a specific event\
    \ occurs (such as a numeric value reaching a certain point).\n\n## Moving Animation\n\
    \nTo move a view, we must define an x, y starting location and an x, y ending\
    \ location. The two modifiers that specify location are .position and .offset.\n\
    \nThe .position modifier places a view at a specific x and y position away from\
    \ the upper-left corner of an iOS device screen, which is considered the origin\
    \ (0,0). The .offset modifier places a view at a specific x and y position away\
    \ from where it would normally appear on the user interface.\n\nThe .position\
    \ modifier defines fixed locations on the screen. The .offset modifier defines\
    \ locations relative to where it would normally appear if its .offset modifier\
    \ x and y values were 0\\. In both cases, positive x values move a view to the\
    \ right, and positive y values move a view down as shown in Figure [20-1](#329781_7_En_20_Chapter.xhtml#Fig1).\n\
    \n![](images/329781_7_En_20_Chapter/329781_7_En_20_Fig1_HTML.jpg)\n\nA set of\
    \ 2 rectangular boxes. 1\\. 2 lines are inside the rectangle, one is at the top,\
    \ and another is at the bottom. The top left corner has a diagonal arrow that\
    \ labels the position modifier. 2\\. A rectangle at the center of the vertical\
    \ rectangular box labels the offset modifier, which marks with a diagonal arrow.\n\
    \nFigure 20-1\n\nThe difference between the .position modifier and the .offset\
    \ modifier\n\nNote\n\nWith both the .position and .offset modifiers, it’s possible\
    \ that extreme x or y values could place a view off the screen.\n\nTo see how\
    \ to move a view using the .position and .offset modifiers, follow these steps:\n\
    \n1.  Create a new SwiftUI iOS App project and give it any name you wish such\
    \ as “AnimationMove.”\n\n2.  Click the ContentView file in the Navigator pane.\n\
    \n3.  Add a State variable under the struct ContentView: View line like this:\n\
    \n1.  Add a Text view and a Toggle inside the VStack like this:\n\n```\n    var\
    \ body: some View {\n    VStack {\n    Text(\"A Text view\")\n    .offset(x: move\
    \ ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn: $move) {\n    Text(\"Toggle\
    \ me\")\n    }\n    }\n    }\n    ```\n\nThe entire ContentView file should look\
    \ like this:\n\n```\n    import SwiftUI\n    struct ContentView: View {\n    @State\
    \ var move = true\n    var body: some View {\n    VStack {\n    Text(\"A Text\
    \ view\")\n    .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n    Toggle(isOn:\
    \ $move) {\n    Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n2.  Click the Live icon in the Canvas pane.\n\n3.  Click\
    \ the Toggle. Notice that the .offset modifier moves the Text view away from its\
    \ normal position.\n\n4.  Edit the ContentView file and replace .offset with .position\
    \ like this:\n\n```\n@State var move = true\n```\n\n1.  Make sure Live is still\
    \ turned on and click the Toggle. Notice that the Text view now moves based on\
    \ the origin (0,0) in the upper-left corner of the screen.\n\nBoth the .offset\
    \ and .position modifiers cause the Text view to jump from one location to another.\
    \ Now it’s time to add the .animation modifier to the Text view so the movement\
    \ appears smoother.\n\n2.  Add the .animation modifier to the Text view so the\
    \ entire ContentView should look like this:\n\n```\n    import SwiftUI\n    struct\
    \ ContentView: View {\n    @State var move = true\n    var body: some View {\n\
    \    VStack {\n    Text(\"A Text view\")\n    .position(x: move ? 100 : 0, y:\
    \ move ? 100 : 0)\n    .animation(.default, value: move)\n    Toggle(isOn: $move)\
    \ {\n    Text(\"Toggle me\")\n    }\n    }\n    }\n    }\n    struct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n    ContentView()\n\
    \    }\n    }\n    ```\n\n3.  Make sure Live is still turned on and click the\
    \ Toggle. Notice that the Text view now appears animated as it moves based on\
    \ the origin (0,0) in the upper-left corner of the screen.\n\n4.  Replace the\
    \ .position modifier with the .offset modifier.\n\n5.  Make sure Live is still\
    \ turned on and click the Toggle. Notice that the Text view now appears animated\
    \ as it moves based on its normal location.\n\n```\n.position(x: move ? 100 :\
    \ 0, y: move ? 100 : 0)\n```\n\nIn this project, the .animation modifier provides\
    \ the transition between the two different x and y locations of the Text view.\
    \ Each time the Toggle changes the Boolean State variable, the animation runs\
    \ again.\n\nThe .animation modifier requires defining the type of animation you\
    \ want (such as .default) and the variable that will trigger the animation. In\
    \ this case, each time the “move” variable changes, we want animation, so that’s\
    \ why the .animation modifier displays “move” in its value parameter like this:\n\
    \n```\n@State var move = true\n.animation(.default, value: move)\n```"
  trans: "\n## 摘要\n\n网格提供了在用户界面上显示视图的另一种方式。`LazyHGrids` 可以水平按行显示视图，而 `LazyVGrids`\
    \ 可以垂直按列显示视图。要使用网格，你需要准备待显示的数据、一个用于定义数据在网格中排列方式的 `GridItem` 数组，以及一个 `LazyHGrid`\
    \ 或 `LazyVGrid`。\n\n数组中定义的 `GridItem` 数量决定了网格中显示的行/列数。通过每个 `GridItem`，你可以定义诸如\
    \ `.fixed`、`.flexible` 或 `.adaptive` 等间距选项。\n\n`.fixed` 选项允许你定义一个十进制数值作为间距，例如\
    \ `25.7`。`.flexible` 选项会尽可能扩展间距，而 `.adaptive` 选项则会尽可能缩小间距。你可以为数组中的每个 `GridItem`\
    \ 应用不同的间距选项。\n\n通过使用网格，你可以在行和列中显示数据。网格通常嵌入在 `Scroll View` 中，以便用户能够上下或左右滚动，查看那些可能因网格尺寸和\
    \ iOS 设备屏幕大小而无法完全显示的数据。\n\n如果你想以表格形式显示数据，请使用网格定义表格结构，然后使用多个 `GridRows` 来定义行数。在每个\
    \ `GridRow` 内部，定义一个或多个视图，这些视图的总数决定了表格的列数。网格只是一种组织和显示相关数据的便捷方式，目的是让用户更容易阅读。\n\n\
    # 使用动画\n\n动画可以移动用户界面上的元素，以提供反馈或仅仅增加美感。与手工制作的传统动画（漫画家需要逐帧绘制，每帧略有不同）不同，SwiftUI 中的动画只需定义起始状态和结束状态即可运行。然后\
    \ SwiftUI 会负责处理元素在这两种状态之间的动画过渡。\n\n三种最常见的动画类型包括：\n\n*   **移动** – 改变元素在用户界面上的 `x`\
    \ 和 `y` 位置\n*   **缩放** – 通过缩小或放大来改变元素的大小\n*   **旋转** – 沿顺时针或逆时针方向改变元素的角度\n\n创建动画涉及定义：要动画化什么、如何动画化（移动、缩放、旋转）以及何时动画化。动画通常发生在用户执行某些操作（如点击按钮）或特定事件发生（如数值达到某个点）时。\n\
    \n## 移动动画\n\n要移动一个视图，我们必须定义其 `x`、`y` 的起始位置和 `x`、`y` 的结束位置。用于指定位置的两个修饰符是 `.position`\
    \ 和 `.offset`。\n\n`.position` 修饰符将视图放置于相对于 iOS 设备屏幕左上角（被视为原点 (0,0)）的特定 `x` 和 `y`\
    \ 位置。`.offset` 修饰符则将视图放置于相对于它通常在用户界面上出现位置的特定 `x` 和 `y` 偏移量处。\n\n`.position` 修饰符定义的是屏幕上的固定位置。`.offset`\
    \ 修饰符定义的是相对于视图在 `.offset` 修饰符的 `x` 和 `y` 值均为 `0` 时正常显示位置的相对位置。在这两种情况下，正的 `x` 值将视图向右移动，正的\
    \ `y` 值将视图向下移动，如图 20-1 所示。\n\n![](img/329781_7_En_20_Fig1_HTML.jpg)\n\n一组两个矩形框。左上角有一个对角箭头，标注为\
    \ position 修饰符。位于垂直矩形框中心的一个矩形标注为 offset 修饰符，并用一个对角箭头标记。\n\n图 20-1: `.position`\
    \ 修饰符与 `.offset` 修饰符之间的区别\n\n**注意：** 使用 `.position` 和 `.offset` 修饰符时，极端的 `x` 或\
    \ `y` 值可能会导致视图移出屏幕。\n\n要了解如何使用 `.position` 和 `.offset` 修饰符移动视图，请遵循以下步骤：\n\n1.\
    \  创建一个新的 SwiftUI iOS App 项目，并为其指定任何你喜欢的名称，例如 \"AnimationMove\"。\n2.  在导航器面板中点击\
    \ ContentView 文件。\n3.  在 `struct ContentView: View` 代码行下方添加一个 `State` 变量，如下所示：\n\
    \n```\n@State var move = true\n```\n\n4.  在 `VStack` 内部添加一个 `Text` 视图和一个 `Toggle`，如下所示：\n\
    \n```\nvar body: some View {\n    VStack {\n        Text(\"A Text view\")\n  \
    \          .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n        Toggle(isOn:\
    \ $move) {\n            Text(\"Toggle me\")\n        }\n    }\n}\n```\n\n整个 `ContentView`\
    \ 文件应如下所示：\n\n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var\
    \ move = true\n\n    var body: some View {\n        VStack {\n            Text(\"\
    A Text view\")\n                .offset(x: move ? 100 : 0, y: move ? 100 : 0)\n\
    \            Toggle(isOn: $move) {\n                Text(\"Toggle me\")\n    \
    \        }\n        }\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n5.  点击画布面板中的 Live 图标。\n6.  点击 Toggle。注意 `.offset` 修饰符将 `Text` 视图从其正常位置移开。\n\
    7.  编辑 `ContentView` 文件，将 `.offset` 替换为 `.position`，如下所示：\n\n```\n.position(x:\
    \ move ? 100 : 0, y: move ? 100 : 0)\n```\n\n8.  确保 Live 仍处于开启状态，然后点击 Toggle。注意\
    \ `Text` 视图现在根据屏幕左上角的原点 (0,0) 进行移动。\n9.  为 `Text` 视图添加 `.animation` 修饰符，使移动看起来更平滑。\n\
    \n```\nimport SwiftUI\n\nstruct ContentView: View {\n    @State var move = true\n\
    \n    var body: some View {\n        VStack {\n            Text(\"A Text view\"\
    )\n                .position(x: move ? 100 : 0, y: move ? 100 : 0)\n         \
    \       .animation(.default, value: move)\n            Toggle(isOn: $move) {\n\
    \                Text(\"Toggle me\")\n            }\n        }\n    }\n}\n\nstruct\
    \ ContentView_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        ContentView()\n    }\n}\n```\n\n10. 确保 Live 仍处于开启状态，然后点击 Toggle。注意\
    \ `Text` 视图现在在根据屏幕左上角原点 (0,0) 移动时呈现动画效果。\n11. 将 `.position` 修饰符替换为 `.offset` 修饰符。\n\
    12. 确保 Live 仍处于开启状态，然后点击 Toggle。注意 `Text` 视图现在在基于其正常位置移动时呈现动画效果。\n\n在这个项目中，`.animation`\
    \ 修饰符提供了 `Text` 视图在两个不同 `x` 和 `y` 位置之间的过渡。每次 `Toggle` 改变布尔类型的 `State` 变量时，动画都会再次运行。\n\
    \n`.animation` 修饰符需要定义你想要动画的类型（例如 `.default`）以及将触发动画的变量。在这种情况下，每次 `move` 变量改变时，我们都希望有动画效果，这就是为什么\
    \ `.animation` 修饰符在其 `value` 参数中显示 `move`，如下所示：\n\n```\n@State var move = true\n\
    .animation(.default, value: move)\n```\n"
- fmt: "# Scaling Animation\n\nAnother way to create animation is to define two different\
    \ sizes for a view, known as scaling. To define the starting and ending states\
    \ for a view’s size, use the `.scaleEffect` modifier and define the relative size\
    \ changes to make. For example, a `.scaleEffect(1)` represents the view’s current\
    \ size. A `.scaleEffect` value greater than 1 defines a greater size or scale,\
    \ while a `.scaleEffect` value less than 1 defines a smaller size or scale.\n\n\
    To see how to animate a view by scaling it to different sizes, follow these steps:\n\
    \n1. Create a new SwiftUI iOS App project and give it any name you wish such as\
    \ “AnimationScale.”\n2. Click the `ContentView` file in the Navigator pane.\n\
    3. Add a `State` variable under the `struct ContentView: View` line like this:\n\
    \n```\n@State private var changeMe = false\n```\n\n4. Add an `Image` view inside\
    \ the `var body: some View` like this:\n\n```\nvar body: some View {\n    Image(systemName:\
    \ \"tortoise.fill\")\n        .font(.system(size:100))\n        .foregroundColor(.red)\n\
    \        .scaleEffect(changeMe ? 1.75 : 1)\n}\n```\n\nThis displays a tortoise\
    \ icon on the screen at a size of 100 to make it easier to see. Then it colors\
    \ the tortoise icon red and uses the `.scaleEffect` modifier to alternate the\
    \ size of the tortoise from 1.75 times its normal size back to its original size.\n\
    \n5. Add the following modifiers to the `Image` view like this:\n\n```\n.animation(.default,\
    \ value: changeMe)\n.onTapGesture {\n    changeMe.toggle()\n}\n```\n\nThis adds\
    \ the `.animation` modifier to the `Image` view so its size changes appear animated.\
    \ Then the `.onTapGesture` modifier detects a tap gesture to toggle the `changeMe`\
    \ `State` variable from `true` to `false` (or `false` to `true`). The entire `ContentView`\
    \ file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView: View\
    \ {\n    @State private var changeMe = false\n    var body: some View {\n    \
    \    Image(systemName: \"tortoise.fill\")\n            .font(.system(size:100))\n\
    \            .foregroundColor(.red)\n            .scaleEffect(changeMe ? 1.75\
    \ : 1)\n            .animation(.default, value: changeMe)\n            .onTapGesture\
    \ {\n                changeMe.toggle()\n            }\n    }\n}\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n6. Click the Live icon in the Canvas pane.\n7. Click the tortoise\
    \ image. Notice that each time you click the tortoise image, it alternates between\
    \ shrinking and expanding in size.\n\n# Rotating Animation\n\nAnimating rotation\
    \ involves changing the angle of a view using the `.rotationEffect` modifier.\
    \ A `.rotationEffect` value of 0 displays no rotation, while a rotation less than\
    \ or greater than 0 rotates the view either counterclockwise or clockwise.\n\n\
    To see how to animate a view by rotating it by different angles, follow these\
    \ steps:\n\n1. Create a new SwiftUI iOS App project and give it any name you wish\
    \ such as “AnimationRotate.”\n2. Click the `ContentView` file in the Navigator\
    \ pane.\n3. Add two `State` variables under the `struct ContentView: View` line\
    \ like this:\n\n```\n@State var myDegrees: Double = 0.0\n@State var flag = false\n\
    ```\n\n4. Add a `Text` view inside the `VStack` like this:\n\n```\nvar body: some\
    \ View {\n    VStack {\n        Text(\"Hello, world!\")\n            .padding()\n\
    \            .rotationEffect(Angle(degrees: flag ? myDegrees : 0))\n         \
    \   .animation(.default, value: flag)\n```\n\nThis `Text` view uses the `.rotationEffect`\
    \ to define the starting and ending angles. Then it uses the `.animation` modifier\
    \ to animate the `Text` view as it rotates between the starting and ending angles.\
    \ The `.animation` modifier displays animation whenever the `flag` variable changes.\n\
    \n5. Add a `Button` and a `Slider` under the `Text` view inside the `VStack` like\
    \ this:\n\n```\nvar body: some View {\n    VStack {\n        Text(\"Hello, world!\"\
    )\n            .padding()\n            .rotationEffect(Angle(degrees: flag ? myDegrees\
    \ : 0))\n            .animation(.default, value: flag)\n        Button(\"Animate\
    \ now\") {\n            flag.toggle()\n        }\n        Slider(value: $myDegrees,\
    \ in: -180...180, step: 1)\n            .padding()\n    }\n}\n```\n\nThe `Slider`\
    \ lets you choose between an angle of –180 degrees and 180 degrees. The entire\
    \ `ContentView` file should look like this:\n\n```\nimport SwiftUI\nstruct ContentView:\
    \ View {\n    @State var myDegrees: Double = 0.0\n    @State var flag = false\n\
    \    var body: some View {\n        VStack {\n            Text(\"Hello, world!\"\
    )\n                .padding()\n                .rotationEffect(Angle(degrees:\
    \ flag ? myDegrees : 0))\n                .animation(.default, value: flag)\n\
    \            Button(\"Animate now\") {\n                flag.toggle()\n      \
    \      }\n            Slider(value: $myDegrees, in: -180...180, step: 1)\n   \
    \             .padding()\n        }\n    }\n}\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n6. Click the Live icon in the Canvas pane.\n7. Drag the `Slider` left or right\
    \ to define an ending angle. (The starting angle is 0.)\n8. Click the `Button`.\
    \ Notice the `.animation` modifier animates the `Text` view as it rotates to its\
    \ new angle.\n\n# Animation Options\n\nSo far, we’ve used the `.default` setting\
    \ for the `.animation` modifier. While this works, there are several other animation\
    \ options you can choose:\n\n- `.easeIn` – Starts the animation slower and then\
    \ speeds up\n- `.easeOut` – Slows the animation near the end\n- `.easeInOut` –\
    \ Starts the animation slower, speeds up, and then slows down near the end (same\
    \ as `.default`)\n- `.linear` – Maintains a constant speed for the animation from\
    \ start to finish\n\nBy choosing a different `.animation` option, you can adjust\
