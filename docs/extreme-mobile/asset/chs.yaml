- "# 3. 为可复用框架设计通用、解耦的架构\n\n扩展`RecordingsFW`框架\n\n上一章设计的框架支持管理**本地**音频录音。随着本书内容的深入，它将与其他框架结合，构建一个“录音室”风格的应用程序。本章将增强该框架，以支持在独立的移动应用中显示**远程**音频录音（即“已发布录音”）。运行模式将通过属性列表（`Property\
  \ List`）进行控制。网络 API 将集成到远程服务中，并在模型-视图-视图模型（MVVM）设计模式中使用。\n\n本章还将使用一种名为依赖注入（Dependency\
  \ Injection）的软件设计模式。依赖注入是一种编程技术，它将对象的隐式依赖关系显式化，允许对象在构造时或通过函数调用从其他对象接收这些依赖关系。⁽⁷⁾\
  \ 在本例中，依赖注入将通过构造函数注入 API 服务和端点，在框架的`ViewModel`中使用。由于`ViewModel`不关心服务的具体实现，因此如果服务被替换，`ViewModel`也无需更改。\n\
  \n除了依赖注入，本章还将整合 Combine 来处理和发布网络 API 请求的结果。Combine 框架提供了一种声明式的 Swift API，用于处理随时间变化的值。这些值可以代表多种类型的异步事件。Combine\
  \ 声明了发布者以公开值，并声明了订阅者以从发布者接收这些值。有关 Combine 框架的文档，可在 Apple 开发者网站上获取。⁽⁸⁾\n\n简而言之，本章将扩展`RecordingsFW`框架以支持远程音频录音，同时保持其可扩展性和可复用性。将使用属性列表来控制框架的运行模式。网络\
  \ API 将使用依赖注入集成到 MVVM 模式中，以将`ViewModel`与服务实现解耦。我们将利用 Combine 来处理和发布异步网络结果，确保该框架能够生成多个移动应用，而无需修改代码。\n\
  \n### 创建属性列表\n\n需要在`RecordingsFW`项目中添加一个属性列表（Property List，简称“p-list”），以控制框架的运行模式。属性列表只是通过文件系统持久化/加载的对象层次结构的表示。属性列表对于存储少量数据非常有用。⁽⁹⁾\
  \ 请执行以下步骤创建属性列表：\n\n![Screenshot of a software interface for selecting a new file\
  \ template. Options include iOS, macOS, watchOS, tvOS, visionOS, and DriverKit.\
  \ Core Data options are “Data Model” and “Mapping Model.” Resource options include\
  \ “App Privacy,” “Asset Catalog,” “GeoJSON File,” “GPX File,” “Module Map,” “Property\
  \ List,” “Rich Text File,” “SceneKit Catalog,” “SceneKit Scene File,” and “Settings\
  \ Bundle.” A “Filter” search bar is at the top right. “Cancel,” “Previous,” and\
  \ “Next” buttons are at the bottom.](img/678928_1_En_3_Fig1_HTML.jpg)\n\n**图 3-1**\
  \ 新建文件模板\n\n1.  在项目导航器中右键点击框架文件夹，然后选择**从模板新建文件...**\n2.  在**资源**组中选择**属性列表**模板（**图**\
  \ **3-1**），然后点击**下一步**\n3.  将文件保存为`Recordings.plist`\n\n## 配置属性列表\n\n创建属性列表后，添加一个布尔值来控制框架的运行模式，根据所需结果（例如，显示本地文件\
  \ vs. 远程文件）静态设置该值：\n\n![Screenshot of a development environment showing a project\
  \ named “RecordingsFW.” The left panel lists files and folders, including “RecordingsFW.h,”\
