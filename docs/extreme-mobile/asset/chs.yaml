  \n**创建新工作区：**\n\n1.  如果 Xcode 正在运行，请先关闭它，然后重新启动，并关闭**欢迎使用 Xcode** 界面（没有直接创建工作区的选项，因此需要使用\
  \ Xcode 菜单）\n2.  选择 Xcode 的 **文件/新建/工作区...** 菜单\n3.  将工作区命名为 `ScratchTraxApp1` 并将其保存到包含其他\
  \ Xcode 项目的根目录中\n4.  右键单击项目导航器中的空白区域，选择**将文件添加到 ScratchTraxApp1…**\n5.  导航到包含 `ScratchTraxApp1`\
  \ 项目的目录，添加 `ScratchTraxApp1.xcodeproj`\n6.  在“选择添加文件的选项”下，将**操作**设置为**原地引用文件**\n\
  7.  右键单击项目导航器中的空白区域，选择**将文件添加到 ScratchTraxApp1…**\n8.  导航到包含 `RecordingsFW` 项目的目录，添加\
  \ `RecordingsFW.xcodeproj`\n9.  在“选择添加文件的选项”下，将**操作**设置为**原地引用文件**\n\n**将 RecordingsFW\
  \ 框架添加到应用中：**\n\n1.  在**项目导航器**中选择 `ScratchTraxApp1` 项目的根节点\n2.  在**目标**部分选择 `ScratchTraxApp1`\n\
  3.  选择**通用**选项卡，然后点击**框架、库和嵌入内容**部分的 **+** 图标\n4.  将 `RecordingsFW.framework` 添加到应用中，并确认它出现在**框架、库和嵌入内容**部分，且嵌入方式设置为“嵌入并签名”\n\
  \n\n\n### 动态集成 iOS 框架\n\n到目前为止，iOS 框架已通过 `SceneDelegate.willConnectTo()` 方法，使用框架内定义的公开协议集成到应用目标中。接下来，我们将用一种动态、解耦的方案替换这些协议的使用。\n\
  \n为此，需要设计一种机制，允许框架将其根视图控制器注册，供 iOS 应用消费/暴露。将使用 `UserDefaults` 来传播这些“注册信息”。\n\n要支持框架的通用注册，需满足以下要求：\n\
  \n1. 数据格式必须同时为应用和框架所熟知\n2. 框架在加载时需要自行注册\n3. 应用需要在 `SceneDelegate.willConnectTo()`\
  \ 中处理注册信息\n\n首先，需要定义一种双方熟知的数据格式。为了实例化、加载并集成框架的用户界面视图控制器，应用需要知道框架的 Bundle ID、Storyboard\
  \ 名称、Storyboard 标识符、标题以及图标。每个由框架注册的视图都会添加到 `UserDefaults` 的顶级“views”键下：\n\n```\n\
  let config = [ \"bundle\": \"com.gw.RecordingsFW\", \"storyboard\": \"RecordingsUI\"\
  , \"view\":\n\"RecordingsNC\", \"title\": \"Recordings\", \"icon\": \"music.note.list\"\
  ]\n```\n\n使用 `UserDefaults` 来管理跨应用和框架的注册信息效果良好，原因如下：\n\n1. 框架总是在应用的 `SceneDelegate.willConnectTo()`\
  \ 被调用之前加载\n2. 框架在加载时总会注册或更新其注册信息，使得框架中的更改能够在应用中体现，而无需应用做出修改\n3. 如果应用从设备上删除并重新安装，框架会在加载时重建其注册信息\n\
  4. 由应用或其任何框架设置的 `UserDefaults` 对所有框架都是可访问的\n\n为了实现应用的注册流程，`SceneDelegate.willConnectTo()`\
  \ 需要通过 `UserDefaults` 查找顶级的“views”键。如果找到，它将遍历注册信息数组，并为每个注册信息实例化一个视图控制器，并将其添加到标签栏控制器中。完成后，它会检查应用的属性列表设置，看是否有覆盖框架中对应设置的值，如果有，则通过\
  \ `UserDefaults` 传播该值，供框架代码使用。\n\n每个框架内部应用目标中所引用的框架协议将不再需要。取而代之，用以下注册代码替换 `ScratchTraxApp1`\
  \ 项目中的 `SceneDelegate.willConnectTo()`，以动态地将框架添加到其用户界面：\n\n```\nfunc scene(_ scene:\
  \ UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
  \ {\n    guard let winScene = (scene as? UIWindowScene) else { return }\n    if\
  \ let storyboard = session.configuration.storyboard {\n        if let tabBarController\
  \ = storyboard.instantiateInitialViewController() as? UITabBarController {\n   \
  \         window = UIWindow(windowScene: winScene)\n            window?.rootViewController\
  \ = tabBarController\n            window?.makeKeyAndVisible()\n            var tbcViewControllers\
  \ = tabBarController.viewControllers ?? []\n            // 通用地添加框架用户界面...\n    \
  \        if let configs = UserDefaults.standard.object(forKey: \"views\") as? [[String:String]]\
  \ {\n                var lastTitle = \"\"\n                for config in configs\
  \ {\n                    if let bundle = config[\"bundle\"], let storyboard = config[\"\
  storyboard\"], let view = config[\"view\"] {\n                        if let bundle\
  \ = Bundle(identifier: bundle) {\n                            let storyboard = UIStoryboard(name:\
  \ storyboard, bundle: bundle)\n                            let storyboardVC = storyboard.instantiateViewController(withIdentifier:\
  \ view)\n                            var image: UIImage?\n                     \
  \       if let icon = config[\"icon\"] {\n                                image\
  \ = UIImage(systemName: icon, withConfiguration: UIImage.SymbolConfiguration(weight:\
  \ .medium))\n                            }\n                            storyboardVC.tabBarItem\
  \ = UITabBarItem(title: config[\"title\"], image: image, tag: 0)\n             \
  \               if lastTitle == \"\" || storyboardVC.tabBarItem.title?.caseInsensitiveCompare(lastTitle)\
  \ == .orderedDescending {\n                                tbcViewControllers.append(storyboardVC)\n\
  \                            } else {\n                                tbcViewControllers.insert(storyboardVC,\
  \ at: tabBarController.viewControllers?.count ?? 0)\n                          \
  \  }\n                            lastTitle = storyboardVC.tabBarItem.title ?? \"\
  \"\n                        }\n                    }\n                }\n      \
  \      }\n            tabBarController.setViewControllers(tbcViewControllers, animated:\
  \ false)\n        }\n    }\n    // 用自己的设置覆盖任何框架的属性列表设置...\n    if let bundle = Bundle(identifier:\"\
  com.gw.ScratchTraxApp1\"), let path = bundle.path(forResource: \"ScratchTraxApp1\"\
  , ofType: \"plist\"),\n       let plistDict = NSDictionary(contentsOfFile: path),\
  \ let showPublished = plistDict[\"showPublished\"] as? Bool {\n        var features\
  \ = UserDefaults.standard.object(forKey: \"features\") as? [String:String] ?? [:]\n\
  \        features[\"showPublished\"] = String(showPublished)\n        UserDefaults.standard.set(features,\
  \ forKey: \"features\")\n    }\n}\n```\n\n\n\n## 框架注册\n\n为了给框架提供充足的机会在应用中注册其用户界面视图控制器，它需要在应用生命周期的早期完成注册，最好是在框架加载时，并且在\
  \ `SceneDelegate.willConnectTo()` 执行之前。由于集成到应用中的所有框架都在应用启动其生命周期之前加载完毕，因此检测框架加载至关重要。\n\
  \n那么，在基于 Swift 的框架中如何实现这一点呢？简而言之，这实际上行不通。在 Objective-C 编程语言中，`NSObject` 有一个 `+load`\
  \ 方法，该方法在实例化 Objective-C 对象时，在其所有父类的 `+load` 方法都被调用后，会被自动调用。然而，在 Swift 类中，该方法并不会被自动调用。\n\
  \n这使框架注册过程变得复杂，实际上阻止了它的正常工作。但有一种替代方案。我们将把 Objective-C 与 Swift 桥接起来，让它作为框架加载的代理。\n\
  \n首先，创建一个 Objective-C 头文件：\n\n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n\
  2. 在**Source**组下选择**头文件**模板\n3. 将文件命名为 `RecordingsFWObjcLoader.h`\n\n将以下代码添加到头文件中，以定义\
  \ Objective-C 的类接口：\n\n```\n#ifndef RecordingsFWObjcLoader_h\n#define RecordingsFWObjcLoader_h\n\
  #import \nNS_ASSUME_NONNULL_BEGIN\n@interface RecordingsFWObjcLoader : NSObject\n\
  @end\nNS_ASSUME_NONNULL_END\n#endif /* RecordingsFWObjcLoader_h */\n```\n\n为该类创建一个\
  \ Objective-C 实现文件：\n\n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n\
  2. 在**Source**组下选择**Objective-C 文件**模板\n3. 将文件命名为 `RecordingsFWObjcLoader.m`\n\n\
  将以下代码添加到类文件中，以定义 Objective-C 类的实现，该类实现了用于注册钩子的 `+load()` 方法：\n\n```\n#import \"\
  RecordingsFWObjcLoader.h\"\n#import \"RecordingsFW/RecordingsFW-Swift.h\"\n@implementation\
  \ RecordingsFWObjcLoader\n+(void) load {\n    if ([[RecordingsFWSwiftLoader alloc]\
  \ init]) {\n        NSLog(@\"RecordingsFWObjcLoader.load() succeeded...\");\n  \
  \  } else {\n        NSLog(@\"RecordingsFWObjcLoader.load() failed...\");\n    }\n\
  }\n@end\n```\n\n由于 `RecordingsFW/RecordingsFW-Swift.h` 是一个不可见的桥接头文件，用于支持从 Objective-C\
  \ 中引用 Swift 类，因此需要设置以下构建设置来强制编译器生成它：\n\n1. 在**项目导航器**中选择 `RecordingsFW` 项目文件夹\n\
  2. 选择 `RecordingsFW` 目标\n3. 选择**构建设置**选项卡，搜索**Install Generated Header**，并将其设置为**YES**\n\
  \n> **注意：** 在完成下一步之前，`RecordingsFWObjcLoader.m` 将无法编译。\n\n创建一个用于注册框架的 Swift 文件：\n\
  \n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n2. 在**Source**组下选择**Swift\
  \ 文件**模板\n3. 将文件命名为 `RecordingsFWSwiftLoader.swift`\n\n将以下代码添加到类中，以执行框架注册，从而让应用能够暴露框架的功能：\n\
  \n```\nimport Foundation\n\n@objcMembers public class RecordingsFWSwiftLoader: NSObject\
  \ {\n    override public init() {\n        super.init()\n        initViews()\n \
  \   }\n\n    func initViews() {\n        let config = [ \"bundle\": \"com.gw.RecordingsFW\"\
  , \"storyboard\": \"RecordingsUI\", \"view\": \"RecordingsNC\", \"title\": \"Recordings\"\
  , \"icon\": \"music.note.list\"]\n        var configs: [[String:String]] = []\n\
  \        if let persistedConfigs = UserDefaults.standard.object(forKey: \"views\"\
  ) as? [Dictionary], !persistedConfigs.isEmpty {\n            configs.append(contentsOf:\
  \ persistedConfigs)\n            if !findConfig(configs: persistedConfigs) {\n \
  \               configs.append(config)\n            }\n        } else {\n      \
  \      configs.append(config)\n        }\n        UserDefaults.standard.set(configs,\
  \ forKey: \"views\")\n    }\n\n    func findConfig(configs: [[String:String]]) ->\
  \ Bool {\n        var found = false\n        for config in configs {\n         \
  \   if config[\"bundle\"] == \"com.gw.RecordingsFW\", config[\"storyboard\"] ==\
  \ \"RecordingsUI\", config[\"view\"] == \"RecordingsNC\" {\n                found\
  \ = true\n                break\n            }\n        }\n        return found\n\
  \    }\n}\n```\n\n###### 关键测试\n\n在方案下拉菜单中将应用设置为当前活动方案，构建应用，然后使用 Xcode 模拟器或真实设备运行它。代码应能正常编译和运行。结果应与**图\
  \ 7-4**中的截图一致。\n\n当框架被加载时，它会注册自己的视图控制器。应用随后从 `UserDefaults` 中检索此注册信息，实例化相应的视图控制器，将其集成到自己的用户界面中，并覆盖任何框架属性列表设置，以确保视图在“录音”功能中显示**已发布**的音频录音。\n\
  \n![开发环境截图，显示一个 iPhone 模拟器上运行着一个名为“Published Recordings”的应用。应用列出了两条录音：“My (Published)\
  \ Electric Anthem”和“My (Published) Acoustic Ballad”，作者均为 John Doe。模拟器周围是 Xcode 中“ScratchTraxApp1”项目的代码编辑器及项目文件与设置，包括“AppDelegate.swift”和“Main.storyboard”等文件。](img/678928_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4** Xcode 模拟器\n\n在本章中，你成功地将一个框架动态集成到了 `ScratchTraxApp1` 应用中，没有使用协议，也没有修改应用底层代码（在为了能够集成而修改代码之后）。你探索了无代码框架集成的技术，展示了如何构建灵活、可扩展且易于维护的应用架构，能够轻松集成模块化框架。这种方法为构建高度可适配的\
  \ iOS 应用提供了一个实用的蓝图。\n\n掌握了动态集成技术后，你就可以将多个框架统一到一个单一的、内聚的应用架构中了。在下一章中，我们将把目前开发的所有框架合并到一个应用中，展示跨系统的模块化功能和驱动收入的功能。\n\
  \n"
- "# 8. 统一动态框架架构\n\n## 设计 ScratchTraxApp2 应用\n\n本章将把本书中开发的所有框架整合到一个统一、内聚的架构中。每个框架都基于第\
