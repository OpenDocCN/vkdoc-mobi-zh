  \n### 集成 iOS 框架\n\n与之前章节一样，需要在 `SceneDelegate.willConnectTo()` 方法中将框架集成到应用中：\n\n\
  ```swift\nimport RecordingStudioFW\n\nfunc scene(_ scene: UIScene, willConnectTo\
  \ session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
  \ {\n    guard let winScene = (scene as? UIWindowScene) else { return }\n    \n\
  \    if let storyboard = session.configuration.storyboard {\n        if let tabBarController\
  \ = storyboard.instantiateInitialViewController() as? UITabBarController {\n   \
  \         window = UIWindow(windowScene: winScene)\n            window?.rootViewController\
  \ = tabBarController\n            window?.makeKeyAndVisible()\n            \n  \
  \          // 通过协议添加框架的用户界面...\n            var tbcViewControllers = tabBarController.viewControllers\
  \ ?? []\n            tbcViewControllers.append(RecordingStudioProtocol().instantiateRootViewController())\n\
  \            tabBarController.setViewControllers(tbcViewControllers, animated: false)\n\
  \            tabBarController.tabBar.isHidden = (tbcViewControllers.count <= 1)\n\
  \        }\n    }\n}\n```\n\n#### 运行应用目标\n\n在方案下拉菜单中将应用设置为活动方案，构建应用，然后使用 Xcode 模拟器或实际设备运行。应用应该能够成功编译并运行，显示一条已启用的音轨（**图\
  \ 5-4**）。\n\n![一张截图显示了 iPhone 模拟器上的录音室应用界面，叠加在 Xcode 开发环境之上。应用界面显示了一个“New Recording”屏幕，包含各种控制旋钮和滑块。Xcode\
  \ 背景显示了一个 Swift 文件，包含与场景委托相关的代码，包括 import 语句和函数定义。项目导航器和属性面板在两侧可见。](img/678928_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** Xcode 模拟器\n\n在本章中，你通过开发 `RecordingStudioFW` 框架拓展了动态功能启用能力。你在多个框架中实现了可解锁的、由购买驱动的功能，同时保持了解耦，并使用模拟的多轨录音室用户界面演示了实际应用。完成本章后，你进一步加深了对互连框架生态系统中模块化、可扩展性和灵活功能管理原则的理解。\n\
  \n由于现在有多个框架独立支持可解锁功能，你已经准备好探索应用内购买如何跨应用生态系统推动收入增长。在下一章中，我们将扩展一个现有框架，演示在保持解耦的同时实现功能货币化。\n\
  \n"
- "# 6. 通过动态功能启用推动收入增长\n\n## 扩展 RecordingsFW 框架\n\n本章将扩展 `RecordingsFW` 框架，以支持后续章节中演示如何利用应用内购买，根据用户需求和渴望通过功能升级来推动收入增长。\n\
  \n本章将演示通过另一个框架中实现的应用内购买来启用一个“模拟”歌曲发布功能。我们将扩展 `RecordingsFW` 框架以实现收入驱动功能。这种方法为框架在未来章节中应对更复杂的货币化场景做好了准备。\n\
  \n### 功能启用\n\n打开 `RecordingsFW` 框架，因为本章将扩展之前章节开发的代码。\n\n歌曲发布功能将由一个属性列表设置控制，并最终由应用内购买驱动。为了集成属性列表设置，需要在\
  \ `Recordings.plist` 中添加一个新属性来控制功能的可见性。创建一个名为 `enablePublishing` 的新属性，并将其定义为 `Bool`\
  \ 类型，值设置为 `NO`（**图 6-1**）。\n\n![一张开发环境的截图，显示了项目目录和一个属性列表文件。左侧面板显示了一个文件树，包含多个 Swift\
