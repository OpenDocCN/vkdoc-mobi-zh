  \n图 1-8 故事板编辑器\n\n1. 在界面生成器中选择**标签栏控制器场景**\n2. 使用右上角对应的图标选择**显示身份检查器**\n3. 在相应字段中输入**故事板\
  \ ID**，例如 `SettingsAppId`（**图** **1-8**）\n4. 使用右上角对应的图标选择**显示属性检查器**，并选择**是初始视图控制器**（**图**\
  \ **1-9**）\n\n### 添加 iOS 框架\n\n在将 iOS 框架集成到应用之前，需要先将其添加到应用目标中：\n\n![开发环境界面截图，显示名为“SettingsFW”的项目，侧边栏列出“AppDelegate.swift”和“Main.storyboard”等文件。打开的对话框标题为“选择要添加的框架和库”，显示“SettingsFW.framework”和各种\
  \ Apple SDK 等选项。“SettingsFW.framework”被高亮显示，底部有“添加其他”、“取消”和“添加”按钮。](img/678928_1_En_1_Fig10_HTML.jpg)\n\
  \n图 1-10 添加框架\n\n1. 在**项目导航器**中选择框架项目的根节点\n2. 在**目标**部分选择 `SettingsApp` 目标\n3. 选择**通用**标签页，然后点击**框架、库和嵌入式内容**部分的\
  \ **+** 图标\n4. 将框架添加到应用目标，它将出现在**框架、库和嵌入式内容**部分，并带有**嵌入并签名**选项（**图** **1-10**）\n\
  \n### 集成 iOS 框架\n\n需要在应用的 `SceneDelegate.willConnectTo()` 方法中集成 iOS 框架，以便使用定义的协议实例化框架的用户界面：\n\
  \n```swift\nimport SettingsFW\nfunc scene(_ scene: UIScene, willConnectTo session:\
  \ UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {\n    guard\
  \ let winScene = (scene as? UIWindowScene) else { return }\n    if let storyboard\
  \ = session.configuration.storyboard {\n        if let tabBarController = storyboard.instantiateInitialViewController()\
  \ as? UITabBarController {\n            window = UIWindow(windowScene: winScene)\n\
  \            window?.rootViewController = tabBarController\n            window?.makeKeyAndVisible()\n\
  \            // 通过协议添加框架用户界面...\n            var tbcViewControllers = tabBarController.viewControllers\
  \ ?? []\n            tbcViewControllers.append(SettingsProtocol().instantiateRootViewController(configuration:\
  \ [\"TestAttribute\" : true]))\n            tabBarController.setViewControllers(tbcViewControllers,\
  \ animated: false)\n            tabBarController.tabBar.isHidden = (tbcViewControllers.count\
  \ <= 1)\n        }\n    }\n}\n```\n\n#### 运行应用目标\n\n在方案下拉菜单中选择 `SettingsApp` 作为活动方案，构建应用，并使用\
  \ Xcode 模拟器或实际设备运行它。应用应能正确编译和运行，并展示相应的框架功能（**图** **1-11**）。\n\n![开发环境截图，显示移动应用模拟器。模拟器显示“设置”屏幕，包含以下详细信息：名称为“Graphixware,\
  \ LLC”，电子邮件为“gw@graphixware.com”，网站为“https:/graphixware.com”。开发环境左侧包含项目文件结构，右侧包含构建设置。](img/678928_1_En_1_Fig11_HTML.jpg)\n\
  \n图 1-11 Xcode 模拟器\n\n在本章中，你学习了如何设计并实现一个使用 Swift 协议的 iOS 框架。你从零开始构建了一个框架，探索了如何为模块化和可重用性构建其结构，并将其集成到了一款移动应用中。完成这些步骤后，你获得了创建框架的实践经验，这些框架可以简化应用架构并促进跨项目的代码共享。\n\
  \n随着第一个 iOS 框架的构建完成并集成到应用中，你已经准备好探索更高级的设计技巧。在下一章中，我们将应用现代架构模式来创建可扩展、可维护的框架，这些框架能够适应多个应用和用例。\n\
