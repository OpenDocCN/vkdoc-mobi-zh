  \ = tracks\n    }\n    switch trackCount {\n    case 2:\n        initializeImageView(imageView:\
  \ self.track1ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track2ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track3ImageView, enableTrack: false)\n        initializeImageView(imageView:\
  \ self.track4ImageView, enableTrack: false)\n    case 3:\n        initializeImageView(imageView:\
  \ self.track1ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track2ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track3ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track4ImageView, enableTrack: false)\n    case 4:\n        initializeImageView(imageView:\
  \ self.track1ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track2ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track3ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track4ImageView, enableTrack: true)\n    default:\n        initializeImageView(imageView:\
  \ self.track1ImageView, enableTrack: true)\n        initializeImageView(imageView:\
  \ self.track2ImageView, enableTrack: false)\n        initializeImageView(imageView:\
  \ self.track3ImageView, enableTrack: false)\n        initializeImageView(imageView:\
  \ self.track4ImageView, enableTrack: false)\n    }\n}\n\nfunc initializeImageView(imageView:\
  \ UIImageView, enableTrack: Bool) {\n    imageView.image = UIImage(named: \"AudioMixer_Track\"\
  , in: Bundle(for: RecordingStudioVC.self), with: nil)\n    imageView.isUserInteractionEnabled\
  \ = enableTrack ? true : false\n    imageView.layer.opacity = enableTrack ? 1.0\
  \ : 0.25\n    imageView.layer.cornerRadius = 10.0\n    imageView.layer.masksToBounds\
  \ = true\n    imageView.layer.borderWidth = 1.0\n    imageView.layer.borderColor\
  \ = UIColor(red: 220.0/255.0, green: 220.0/255.0, blue: 220.0/255.0, alpha: 1.0).cgColor\n\
  }\n```\n\n### 创建资源目录\n\n资源目录^(²⁶) 通常用于组织和管理 iOS 应用内使用的图像。此框架将包含一个表示录音室控制台轨道的图像，该图像将用于每个\
