  \n## 动态品牌化技术\n\n动态品牌化将首先通过 `UIKit` 组件进行演示，然后介绍 `SwiftUI` 组件。`UIKit` 元素将尽可能使用 `Configuration`\
  \ 功能，否则使用替代技术。`SwiftUI` 元素将利用 `Environment Keys`。将使用类、协议和结构体扩展来一致地应用品牌化。所有动态品牌化都将从集中位置进行管理，以确保由框架提供的\
  \ App 用户界面在外观上保持一致。\n\n在 iOS 26+ 中，支持现代 `Configuration` 功能的 UIKit 组件包括：`UIButton`、`UIBarButtonItem`、`UISegmentedControl`、`UIToolbar`、`UITabBarItem`、`UITabBar`、`UINavigationBar`、嵌入在菜单中的\
  \ `UIStackView` 按钮，以及通过内容配置实现的 `UICollectionView`/`UITableView` 单元格。不支持 `Configuration`\
  \ 功能并且仍然需要直接设置属性或使用 `UIAppearance` 功能的组件包括：`UILabel`、`UITextField`、`UITextView`、`UIImageView`、`UISlider`、`UISwitch`、`UIProgressView`、`UIActivityIndicatorView`\
  \ 以及大多数自定义的 `UIView` 子类。\n\n`SwiftUI` 组件将通过为适用的组件字体定义 `Environment Keys` 来进行品牌化。`View`\
  \ 的扩展（例如 `.appBodyFont()` 和 `.appButtonFont()`）会自动应用这些字体，从而确保整个 App 中所有 `SwiftUI`\
  \ 组件的品牌形象保持一致。\n\n\n\n## 为品牌化创建属性列表\n\n属性列表（plist）将用于定义和管理品牌化属性，提供一种集中式、人类可读且结构化的格式，可在运行时加载，以配置字体、字号和颜色，而无需更改代码。翻译人员或本地化团队可以使用此\
  \ plist 或等效的 CSV 版本来配置品牌属性。\n\n在 `ScratchTraxApp2` 项目中创建一个属性列表：\n\n1.  在 `项目导航器`\
