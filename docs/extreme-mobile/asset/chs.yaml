  \ Property List 设置。在此案例中，应用将在“录音”功能中显示**本地音频录音**。\n\n太棒了！现在使用相同的框架创建了两个截然不同的应用。两者都无需依赖协议即可动态加载框架，并且都不需要修改代码来支持不同的操作模式或功能。\n\
