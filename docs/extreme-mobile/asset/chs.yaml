  \n**图 3-2** 属性列表编辑器\n\n1.  在项目导航器中选择**属性列表**文件\n2.  点击空表 Root 行中的**+**图标\n3.  创建一个名为`showPublished`的变量；将其类型设置为**布尔值**，值设置为**YES**（**图**\
  \ **3-2**）\n\n\n\n## 配置外部 API\n\n由于本框架的运行模式是显示“已发布的录音”，因此需要通过网络 API 请求远程获取这些数据。本章的示例代码并未包含支持此功能的实际服务，因此需要对其进行模拟。\n\
  \n有多种方法可以模拟网络 API 请求，包括使用第三方“存根”库（如 `OHHTTPStubs`^(¹⁰）和“模拟”服务（如 `Beeceptor`^(¹¹）。本章的示例代码将使用\
  \ `Beeceptor`，通过网络 API 请求返回以下表示音频录音的 JSON 数据：\n\n```json\n[\n{\n\"bitrate\": 131072,\n\
  \"copyright\": \"© 2025 Words and Music by John Doe\",\n\"date\": \"04/28/2025\"\
  ,\n\"length\": 270,\n\"size\": 5242880,\n\"title\": \"My (Published) Electric Anthem\"\
  ,\n\"type\": \"AAC Audio File\",\n\"url\": \"https://graphixware.com/MyElectricAnthem.aac\"\
  \n},\n{\n\"bitrate\": 131072,\n\"copyright\": \"© 2025 Words and Music by John Doe\"\
  ,\n\"date\": \"08/24/2025\",\n\"length\": 228,\n\"size\": 10485760,\n\"title\":\
  \ \"My (Published) Acoustic Ballad\",\n\"type\": \"AAC Audio File\",\n\"url\": \"\
  https://graphixware.com/MyAcousticBallad.aac\"\n}\n]\n```\n\n在 `RecordingsProtocol.swift`\
  \ 中定义一个枚举来表示端点：\n\n```swift\nenum RecordingsEndpoint {\ncase fetchRecordings\nvar\
  \ urlString: String {\nswitch self {\ncase .fetchRecordings:\nreturn \"https://graphixware.free.beeceptor.com/scratchtrax/recordings\"\
  \n}\n}\n}\n```\n\n此示例中的 URL 不保证始终有效，因此现在是你前往 `Beeceptor.com` 创建免费账户以及自己专属端点的好时机。\n\
  \n在 `RecordingsProtocol.swift` 中定义另一个枚举来处理模拟的错误情况：\n\n```swift\nenum RecordingsError:\
  \ Error {\ncase request(message: String)\ncase network(message: String)\ncase status(message:\
  \ String)\ncase parsing(message: String)\ncase other(message: String)\n}\n```\n\n\
  ### 设计一个通用服务\n\n在框架项目下创建一个名为 `PublishedRecordingsService` 的新类，用作远程服务。此服务将通过网络 API\
  \ 获取录音数据，并将其发布给已订阅变更通知的对象，例如 `ViewModel`。为了防止创建该类的多个实例，它将被定义为一个单例：\n\n```swift\n\
  class PublishedRecordingsService {\npublic static let shared = PublishedRecordingsService()\n\
  private init() {\n}\n}\n```\n\n在 `PublishedRecordingsService` 中为远程服务定义一个协议。任何遵循该协议的服务都能够被注入到\
  \ `ViewModel` 中，而无需修改 `ViewModel` 本身。协议及其实现将使用 `Combine`，因此还需要导入 `Combine` 框架：\n\
  \n```swift\nimport Combine\nprotocol StubAPIService {\nfunc fetch<T: Decodable>(_t:\
  \ T.Type, url: URL) -> AnyPublisher<T, RecordingsError>\n}\n```\n\n`fetch()` 函数使用了\
  \ Swift 泛型。Swift 泛型允许创建灵活、可复用的函数和类型来处理不同类型的数据，从而避免代码重复。^(¹²)\n\n当调用 `fetch()` 函数时，需要将网络\
  \ API 请求期望返回的对象类型作为参数传入：\n\n```swift\nservice.fetch(_t: Recording.self, url: url)\n\
  ```\n\n`fetch` 函数的返回值类型定义为 `AnyPublisher<T, RecordingsError>`。`AnyPublisher` 是 `Publisher`\
  \ 的一个具体实现，它本身没有重要的属性，仅充当一个穿透对象。`Publisher` 将元素传递给一个或多个 `Subscriber` 实例。订阅者的 `Input`\
  \ 和 `Failure` 关联类型必须与发布者声明的 `Output` 和 `Failure` 类型匹配。发布者通过实现 `receive(subscriber:)`\
  \ 方法来接受订阅者。^(¹³)\n\n让 `PublishedRecordingsService` 遵循该协议，并实现其所需的行为：\n\n```swift\n\
  class PublishedRecordingsService: StubAPIService {\npublic static let shared = PublishedRecordingsService()\n\
  private init() {\n}\nfunc fetch<T: Decodable>(_t: T.Type, url: URL) -> AnyPublisher<T,\
  \ RecordingsError> {\nreturn URLSession.shared.dataTaskPublisher(for: url)\n.mapError\
  \ { error in\nRecordingsError.network(message: error.localizedDescription)\n}\n\
  .flatMap(maxPublishers: .max(1)) { pair in\nself.decode(pair.data)\n}\n.eraseToAnyPublisher()\n\
  }\nprivate func decode<T: Decodable>(_ data: Data) -> AnyPublisher<T, RecordingsError>\
  \ {\nlet decoder = JSONDecoder()\ndecoder.dateDecodingStrategy = .secondsSince1970\n\
  return Just(data)\n.decode(type: T.self, decoder: decoder)\n.mapError { error in\n\
  RecordingsError.parsing(message: error.localizedDescription)\n}\n.eraseToAnyPublisher()\n\
  }\n}\n```\n\n`mapError` 将上游发布者的任何失败转换为新的错误。\n\n`flatMap` 将来自上游发布者的元素转换成一个新的发布者，该发布者数量不超过你指定的最大值。在此示例中，`flatMap`\
  \ 使用指定的解码器解码来自上游发布者的输出，以生成 `Recording` 模型。\n\n`eraseToAnyPublisher` 用一个类型擦除器包装此发布者，向下游订阅者暴露一个\
  \ `AnyPublisher` 实例，而不是该发布者的实际类型。\n\n### 设计一个支持依赖注入的 ViewModel\n\n创建一个名为 `PublishedRecordingsViewModel`\
  \ 的 ViewModel，用于获取已发布的录音并通知视图更新其处理方式。\n\n`PublishedRecordingsViewModel` 将遵循 `RefreshableViewModel`\
  \ 协议，以确保支持视图所需的行为。该 ViewModel 还将遵循 `ObservableObject`^(¹⁴ 协议，以支持“预发布”变更。\n\n需要定义\
  \ `service` 和 `endpoint` 变量以支持依赖注入。由于这些是外部依赖项，它们将通过构造函数注入到 ViewModel 中，以保持 ViewModel\
  \ 内部的解耦。\n\n`recordings` 变量需要使用 `@Published` 类型别名进行定义。它将维护从服务返回的转换后数据，并在设置时将变更事件发布给订阅者。\n\
  \n`fetch()` 函数将使用注入的服务和端点泛型地获取音频录音元数据，将其存储在 `recordings` 变量中，并通知订阅者此变更。\n\n将以下代码添加到该类中：\n\
  \n```swift\nimport Foundation\nimport Combine\nclass PublishedRecordingsViewModel:\
  \ RefreshableViewModel, ObservableObject {\n// 依赖注入...\nprivate let service: StubAPIService\n\
  private let endpoint: RecordingsEndpoint\nprivate var disposables = Set<AnyCancellable>()\n\
  @Published private(set) var recordings: [Recording] = []\ninit(service: StubAPIService,\
  \ endpoint: RecordingsEndpoint) {\nself.service = service\nself.endpoint = endpoint\n\
  }\nfunc getRecordings() -> [Recording] {\nreturn recordings\n}\nfunc refresh() {\n\
  fetch()\n}\nfunc fetch() {\nif let url = URL(string: endpoint.urlString) {\nservice.fetch(_t:\
  \ Recording.self, url: url)\n.receive(on: DispatchQueue.main)\n.sink { [weak self]\
  \ value in\nswitch value {\ncase .failure:\nself?.recordings = []\ncase .finished:\n\
  break\n}\n} receiveValue: { [weak self] response in\nself?.recordings = response\n\
  }\n.store(in: &disposables)\n}\n}\n}\n```\n\n\n\n## 将 ViewModel 集成到视图中\n\n为了完成本例的\
  \ MVVM 设计模式，需要将 ViewModel 集成到视图中。本例中的视图由在第 2 章中创建的 `RecordingsTVC` 管理。\n\n将使用属性列表设置来确定框架的操作模式。需要创建一个名为\
  \ `showPublished()` 的函数来读取属性列表值并执行相应的代码路径。和之前一样，需要使用 Bundle 标识符加载属性列表，以确保其正常工作。\n\
  \n**趣闻：**请注意检索属性列表值之后的语句，如果找到 `UserDefaults` 值，该语句将覆盖属性列表值。在本书后面，当应用内购买集成到框架中时，将使用\
  \ `UserDefaults` 来实现。\n\n将以下代码集成到 `RecordingsTVC` 中（不要删除现有代码）：\n\n```\nlet publishedTitle\
  \ = \"Published Recordings\"\nlet localTitle = \"Local Recordings\"\noverride func\
  \ viewDidLoad() {\nif showPublished() {\nself.navigationItem.title = publishedTitle\n\
  // Initialize published recordings\ninitRemoteServiceVM()\n} else {\nself.navigationItem.title\
  \ = localTitle\n// Initialize local recordings\ninitLocalServiceVM()\n}\n}\nfunc\
  \ showPublished() -> Bool {\nvar showPublished = false\nif let bundle = Bundle(identifier:\"\
  com.gw.RecordingsFW\"), let path = bundle.path(forResource: \"Recordings\", ofType:\
  \ \"plist\"),\nlet plistDict = NSDictionary(contentsOfFile: path) {\nshowPublished\
  \ = plistDict.object(forKey: \"showPublished\") as? Bool ?? false\n}\nif let features\
  \ = UserDefaults.standard.object(forKey: \"features\") as? [String:String] {\nif\
  \ let publishedValue = features[\"showPublished\"], let published = Bool(publishedValue)\
  \ {\nshowPublished = published\n}\n}\nreturn showPublished\n}\nfunc initRemoteServiceVM()\
  \ {\n// This will be completed in the next step…\n}\n```\n\n### 将依赖注入 ViewModel\n\
  \n第 2 章通过 `initLocalServiceVM()` 初始化了一个 ViewModel 来管理本地音频录制。第 3 章需要通过 `initRemoteServiceVM()`\
  \ 初始化一个 ViewModel 来管理远程音频录制。\n\n将以下代码集成到 `RecordingsTVC` 中（不要删除现有代码）：\n\n```\nimport\
  \ Combine\nclass RecordingsTVC: UITableViewController {\nprivate var cancellables:\
  \ Set = []\nfunc initRemoteServiceVM() {\nself.viewModel = PublishedRecordingsViewModel(service:\
  \ PublishedRecordingsService.shared, endpoint: .fetchRecordings)\n(self.viewModel\
  \ as! PublishedRecordingsViewModel).$recordings\n.sink { [weak self] recordings\
  \ in\nguard let strongSelf = self else { return }\nprint(\"RecordingsTVC.initRemoteServiceVM().sink():\
  \ recordings.count = \\(recordings.count)\")\nDispatchQueue.main.asyncAfter(deadline:\
  \ .now()+1) {\nstrongSelf.refreshControl?.endRefreshing()\nstrongSelf.tableView.reloadData()\n\
  }\n}\n.store(in: &cancellables)\nself.viewModel?.refresh()\n}\n}\n```\n\n`AnyCancellable`\
  \ 变量是一个令牌，代表一个活跃的 Combine 订阅，当它被释放时会自动取消。\n\n在 `initRemoteServicesVM()` 中创建 ViewModel\
  \ 时，会通过构造函数将服务和端点注入对象。\n\n`sink()` 函数将用于订阅异步变更事件，这些事件会在 `recordings` 值发生变化时发布。检测到变化后，将在主线程（用于更新用户界面的线程）上重新加载表格视图，以反映这些变化。\n\
  \n`store(in:)` 会将可取消令牌保存到一个集合（通常是 `Set<AnyCancellable>`）中，以便订阅在所有者对象存活期间保持活跃。\n\n\
  `ViewModel.refresh()` 将触发 ViewModel 从服务获取数据并在视图中显示。\n\n### 测试\n\n源代码的全面测试对于实现和维持软件应用程序的高质量水平至关重要，这可以在应用程序发布后降低未来的维护成本。单元测试、集成测试和\
  \ UI 测试应在代码开发过程中（或如果采用测试驱动开发方法，则在此之前）纳入软件开发流程。\n\n大多数 iOS 开发者都熟悉 Xcode 中用于创建测试的工具，特别是基于\
  \ XCTest 框架的工具。Xcode 16 引入了一个新的测试框架 Swift Testing。创建 Xcode 项目时，生成存根测试的选项现在包括 XCTest\
  \ 和 Swift Testing。选择任一选项都会根据所选框架生成存根测试和测试计划。使用 Swift Testing 创建的测试不会自动添加到测试计划中（截至\
  \ Xcode 26），但可以通过编辑测试计划并选择它们来轻松添加。\n\n`XCTest` 和 `Swift Testing` 之间的主要区别在于它们的结构和发现方式。XCTest\
  \ 使用继承自 `XCTestCase` 的类，Xcode 会自动查找以 test 开头的测试方法，并在测试导航器中显示它们。另一方面，Swift Testing\
  \ 允许你在结构体中使用 `@Test` 和 `#expect` 编写测试，这更加“Swift 化”并且能很好地处理并发，但 Xcode 不会自动检测它们。然而，如果你将\
  \ Swift Testing 测试添加到测试计划中，它们将出现在测试导航器中，让你可以像 XCTest 测试一样在 Xcode 中运行它们。\n\n关于使用\
  \ XCTest 和 Swift Testing 框架编写单元测试、集成测试和 UI 测试的全面概述，可以在 Apple 开发者网站上找到。^(¹⁵)\n\n\
  本章将演示使用模拟服务测试模型-视图-视图模型（MVVM）设计模式中的 ViewModel 部分。在 MVVM 设计中，服务被模拟以将 ViewModel 的逻辑与外部依赖隔离开来。模拟提供可预测的硬编码数据或模拟错误，使测试快速、可靠且可重复，而无需依赖网络条件或实时\
  \ API。这还使得测试边缘情况（如解析失败或空响应）变得容易，确保 ViewModel 正确处理所有场景，同时保持测试仅专注于其行为。\n\n在 `RecordingsFWTests`\
  \ 文件夹（项目创建时生成）下，选择 `RecordingsFWTests.swift` 并导入 Foundation 和 Combine 框架（Testing\
  \ 和 RecordingsFW 框架应该已经导入，并且 RecordingsFW 标记为 `@testable`）：\n\n```\nimport Foundation\n\
  import Combine\nimport Testing\n@testable import RecordingsFW\n```\n\n将创建一个基于 `StubAPIService`\
  \ 协议（本章前面创建的）的模拟服务，以返回与 `PublishedRecordingsService` API 相同的预设数据。它将定义一个 `MockMode`\
  \ 枚举来模拟不同场景（成功、网络错误、解析错误），并提供一组硬编码的示例 `Recording` 对象，类似于 API。`fetch` 方法将返回一个 Combine\
  \ 发布者，根据当前模式，它要么发出录制数据，要么因模拟错误而失败，从而允许测试验证 ViewModel 如何处理各种响应。\n\n将以下代码添加到类中：\n\n\
  \n\n```swift\nfinal class MockRecordingsService: StubAPIService {\n    enum MockMode\
  \ {\n        case success\n        case networkError\n        case parsingError\n\
  \    }\n    var mode: MockMode = .success\n    private let recordings: [Recording]\
  \ = [\n        Recording(bitrate: 131_072,\n                  copyright: \"© 2025\
  \ Words and Music by John Doe\",\n                  date: \"04/28/2025\",\n    \
  \              length: 270,\n                  size: 5 * 1024 * 1024,\n        \
  \          title: \"My Electric Guitar Anthem\",\n                  type: \"AAC\
  \ Audio File\",\n                  url: \"https://graphixware.com/MyElectricAnthem.aac\"\
  ),\n        Recording(bitrate: 131_072,\n                  copyright: \"© 2025 Words\
  \ and Music by John Doe\",\n                  date: \"08/24/2025\",\n          \
  \        length: 228,\n                  size: 10 * 1024 * 1024,\n             \
  \     title: \"My Acoustic Guitar Ballad\",\n                  type: \"AAC Audio\
  \ File\",\n                  url: \"https://graphixware.com/MyAcousticBallad.aac\"\
  )\n    ]\n    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T : Decodable\
  \ {\n        switch mode {\n        case .networkError:\n            return Fail(error:\
  \ RecordingsError.network(message: \".networkError: Simulated network error\"))\n\
  \                .eraseToAnyPublisher()\n        case .parsingError:\n         \
  \   return Fail(error: RecordingsError.parsing(message: \".parsingError: Simulated\
  \ parsing error\"))\n                .eraseToAnyPublisher()\n        case .success:\n\
  \            guard let result = recordings as? [T] else {\n                return\
  \ Fail(error: RecordingsError.parsing(message: \".success: Type mismatch\"))\n \
  \                   .eraseToAnyPublisher()\n            }\n            return Just(result)\n\
  \                .setFailureType(to: RecordingsError.self)\n                .eraseToAnyPublisher()\n\
  \        }\n    }\n}\n```\n\n在此示例中，需要创建一个 `Publisher` 扩展，用于异步等待发布者发出满足给定条件的值。它使用\
  \ `withCheckedContinuation` 来暂停异步函数，直到满足条件或发生超时，从而简化在异步上下文中测试 `@Published` 属性的操作。\n\
  \n将以下代码添加到类中：\n\n```swift\nextension Publisher {\n    func waitForValue(\n     \
  \   timeout: Duration = .seconds(1),\n        condition: @escaping (Output) -> Bool\n\
  \    ) async -> Output? {\n        await withCheckedContinuation { continuation\
  \ in\n            var cancellable: AnyCancellable?\n            let deadline = ContinuousClock.now\
  \ + timeout\n            cancellable = self.sink(\n                receiveCompletion:\
  \ { _ in\n                    continuation.resume(returning: nil)\n            \
  \        cancellable?.cancel()\n                },\n                receiveValue:\
  \ { value in\n                    if condition(value) {\n                      \
  \  continuation.resume(returning: value)\n                        cancellable?.cancel()\n\
  \                    }\n                })\n            Task {\n               \
  \ try? await Task.sleep(until: deadline, clock: .continuous)\n                continuation.resume(returning:\
  \ nil)\n                cancellable?.cancel()\n            }\n        }\n    }\n\
  }\n```\n\n需要创建一个基于 `Publisher` 扩展的扩展，使其专门与任何 `ObservableObject` 中的 `@Published`\
  \ 属性配合使用。它允许测试异步等待属性达到所需状态（例如加载完成或数据更新），从而提高测试的可读性和可靠性。\n\n将以下代码添加到类中：\n\n```swift\n\
  extension ObservableObject {\n    func waitForPublishedValue(\n        _ keyPath:\
  \ KeyPath.Publisher>,\n        timeout: Duration = .seconds(1),\n        condition:\
  \ @escaping (Value) -> Bool\n    ) async -> Value? {\n        let publisher = self[keyPath:\
  \ keyPath]\n        return await publisher.waitForValue(timeout: timeout, condition:\
  \ condition)\n    }\n}\n```\n\n需要创建一个基于 `PublishedRecordingsViewModel` 的扩展，为 `recordings`\
  \ 属性封装泛型的 `waitForPublishedValue` 方法。它允许测试轻松等待录音数组更新，而无需编写重复的 Combine 代码，从而简化 ViewModel\
  \ 的异步单元测试。\n\n将以下代码添加到类中：\n\n```swift\nextension PublishedRecordingsViewModel {\n\
  \    func waitForRecordings(\n        timeout: Duration = .seconds(1),\n       \
  \ condition: @escaping ([Recording]) -> Bool\n    ) async -> [Recording]? {\n  \
  \      await waitForPublishedValue(\\.$recordings, timeout: timeout, condition:\
  \ condition)\n    }\n}\n```\n\n最后，需要添加测试用例，基于 `MockMode` 枚举定义的用例来测试 ViewModel。这些测试包含使用\
  \ `@Test` 和 `#expect` 的 Swift Testing 测试用例。每个方法测试 `PublishedRecordingsViewModel`\
  \ 的不同场景：成功获取、网络错误、解析错误以及泛型 `@Published` 属性辅助方法。测试异步运行，使用模拟服务控制行为，并通过 `#expect` 断言预期结果，展示了\
  \ ViewModel 如何在 Swift 原生、并发友好的测试风格下响应不同条件。\n\n将以下代码添加到类中：\n\n```swift\n@MainActor\n\
  struct PublishedRecordingsViewModelTests {\n    @Test(\"成功获取录音\")\n    func testFetchRecordingsSuccess()\
  \ async throws {\n        let mockService = MockRecordingsService()\n        mockService.mode\
  \ = .success\n        let viewModel = PublishedRecordingsViewModel(\n          \
  \  service: mockService,\n            endpoint: .fetchRecordings\n        )\n  \
  \      viewModel.fetch()\n        let recordings = await viewModel.waitForRecordings\
  \ { !$0.isEmpty }\n        #expect(recordings?.count == 2)\n        #expect(recordings?.first?.title\
  \ == \"My Electric Guitar Anthem\")\n        #expect(recordings?.last?.title ==\
  \ \"My Acoustic Guitar Ballad\")\n    }\n    @Test(\"正确处理网络错误\")\n    func testFetchRecordingsNetworkError()\
  \ async throws {\n        let mockService = MockRecordingsService()\n        mockService.mode\
  \ = .networkError\n        let viewModel = PublishedRecordingsViewModel(\n     \
  \       service: mockService,\n            endpoint: .fetchRecordings\n        )\n\
  \        viewModel.fetch()\n        let recordings = await viewModel.waitForRecordings\
  \ { $0.isEmpty }\n        #expect(recordings?.isEmpty == true)\n    }\n    @Test(\"\
  正确处理解析错误\")\n    func testFetchRecordingsParsingError() async throws {\n       \
  \ let mockService = MockRecordingsService()\n        mockService.mode = .parsingError\n\
  \        let viewModel = PublishedRecordingsViewModel(\n            service: mockService,\n\
  \            endpoint: .fetchRecordings\n        )\n        viewModel.fetch()\n\
  \        let recordings = await viewModel.waitForRecordings { $0.isEmpty }\n   \
  \     #expect(recordings?.isEmpty == true)\n    }\n    @Test(\"正确使用泛型 @Published\
  \ 辅助方法\")\n    func testGenericWaitForPublishedValue() async throws {\n        class\
  \ DummyViewModel: ObservableObject {\n            @Published var isLoading = true\n\
  \            func finishLoading() { isLoading = false }\n        }\n        let\
  \ dummy = DummyViewModel()\n        Task {\n            try? await Task.sleep(for:\
  \ .milliseconds(200))\n            dummy.finishLoading()\n        }\n        let\
  \ isDone = await dummy.waitForPublishedValue(\\.$isLoading) { $0 == false }\n  \
  \      #expect(isDone == false)\n    }\n}\n```\n\n为了运行测试用例，如果它们尚未出现在测试导航器中，则需要将它们添加到测试计划中，具体操作如下：\n\
