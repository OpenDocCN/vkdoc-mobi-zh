  \ `Theme.plist`\n3.  在项目导航器中右键单击 `Theme.plist`，选择 `打开方式/源代码`\n4.  将 `<dict/>` 替换为下面的示例品牌属性\n\
  5.  在项目导航器中右键单击 `Theme.plist`，选择 `打开方式/属性列表`\n\n```\nbodyFontName\nSnellRoundhand\n\
