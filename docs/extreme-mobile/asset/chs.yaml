  \ `UserDefaults` 将其传播到整个应用和框架中。\n\n## 创建 UIKit 类扩展\n\n使用**类扩展**可以方便地应用品牌属性，因为它们允许您将样式逻辑封装在一个地方，而无需修改各个视图控制器。通过扩展\
  \ `UILabel` 或 `UIButton` 等类，您可以在组件实例化时自动应用字体、颜色和其他主题设置，从而确保整个应用的一致性，减少重复代码，并使未来的品牌更新变得容易。\n\
  \n在创建 UIKit 类扩展时，品牌属性将通过 `awakeFromNib()` 和 `didMoveToSuperView()` 应用到组件上。`awakeFromNib()`\
  \ 在组件从故事板或 XIB 加载后调用，因此非常适合在视图存在后、显示前立即初始化字体、颜色或其他样式。`didMoveToSuperview()` 在视图添加到视图层级时调用，涵盖了组件可能以编程方式创建的情况。\n\
  \n将以下类扩展添加到 `AppDelegate` 类中，以将通过 `UserDefaults` 传播的品牌属性应用到 `UILabel` 组件：\n\n```\n\
