  2.  如果这些测试不存在，请通过在测试导航器左下角的图标处选择**编辑测试计划**菜单项来选中它们（**图** **3-3**）。\n3.  一旦它们出现在测试导航器中，即可使用主测试层次结构右侧对应的运行图标来运行它们（**图**\
  \ **3-4**）。\n\n\n\n#### 运行应用目标\n\n在方案下拉菜单中将该应用设置为活跃方案，构建应用，然后使用任一 Xcode 模拟器或实际设备运行它。应用应能正常编译和运行，并展示相应的框架功能（图\
  \ 3-5）。\n\n![开发环境截图，显示 iPhone 17 Pro Max 上的移动应用模拟。应用显示一个标题为\"已发布录音\"的列表，包含两个条目：\"\
  我的（已发布）电子颂歌\"和\"我的（已发布）原声民谣\"，均标注为 John Doe 创作于 2023 年。开发界面左侧显示文件目录，包含多个 Swift 文件，右侧为项目设置。](img/678928_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\nXcode 模拟器\n\n现在，该框架能够在不修改代码的情况下，在不同的移动应用中同时显示本地和远程音频录音。\n\n在本章中，你增强了\
  \ `RecordingsFW` 框架以支持远程音频录音，并使用 `MVVM` 集成了网络 API。你应用了依赖注入来将 `ViewModel` 与服务实现解耦，并使用\
  \ `Combine` 处理异步数据流。完成这些步骤后，你构建了一个灵活、可复用的框架，能够支持多个应用而无需修改核心代码，强化了可扩展 `iOS` 开发的现代设计原则。\n\
  \n随着 `RecordingsFW` 框架被扩展以支持远程录音，并通过依赖注入实现完全解耦，你已准备好探索动态功能启用。在下一章中，我们将设计一个能够在运行时暴露和管理功能的框架，包括通过应用内购买解锁的功能。\n\
