- "# 1. 构建模块化框架设计的基础\n\n设计 `SettingsFW` 框架\n\n`Swift` 协议将被引入作为支持移动应用中软件模块化的首要手段。`Swift`\
  \ 协议是一种蓝图或接口，它定义了一组方法、属性和要求，供类、结构体或枚举采用。它提供了一种在不同类型之间建立契约的方式，使它们能够以一致的方式进行通信和交互。`Swift`\
  \ 中的协议用于定义可在多个类型之间共享的公共行为或功能，从而实现代码复用并促进模块化。通过采用协议，类型保证实现协议定义的必需方法和属性，从而确保具备一组公共能力并实现多态性。你可以在\
  \ `Swift.org` 找到关于 `Swift` 协议(¹) 的更多细节。\n\n在设计 iOS 框架时，努力实现软件组件的解耦至关重要。这一目标确保对某一组件的修改对其他组件的影响最小化。当组件紧密耦合，存在强依赖关系时，系统的维护将变得艰巨且耗时。`Swift`\
  \ 协议可以通过抽象化实现细节，并减少在框架及其集成的应用中需要进行的全局性修改，从而帮助降低耦合度。这有助于实现更精简、更易于管理的开发过程。\n\n在本章中，我们将使用\
  \ `Swift` 协议设计一个 iOS 框架。到本章结束时，你将创建出第一个 iOS 框架，并成功将其集成到一个移动应用中，从而获得处理模块化、可复用代码的实战经验。\n\
  \n\n\n## 创建 iOS 框架\n\nXcode 提供了一个名为 `Framework` 的项目模板，位于 `Frameworks & Libraries`\
  \ 分组下，用于创建 iOS 框架。该框架模板最初被称为 Cocoa Touch 框架，它将为项目提供一组默认文件。在你学习本章的过程中，将逐步向其中添加内容。让我们开始吧！\n\
  \n为你的新项目选择一个模板：\n\n![软件开发界面截图，用于创建新项目。顶部选项卡包括多平台、iOS、macOS 等选项，当前选中了 iOS 选项卡。下方有“应用程序”和“框架与库”部分。“应用程序”部分显示了\
  \ App、文档 App、游戏、增强现实 App 等图标。“框架与库”部分包括框架、静态库和 Metal 库等选项，其中框架被选中。底部有“取消”、“上一页”和“下一页”按钮。](img/678928_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1 新项目模板\n\n1. 启动 `Xcode`\n2. 选择 `创建新项目`\n3. 在 `框架与库` 分组下选择 `框架` 模板（**图** **1-1**）\n\
  4. 选择 `下一页`\n\n为新项目选择选项（**图** **1-2**）：\n\n![软件开发环境中创建新项目的选项界面。字段包括“产品名称”设置为“SettingsFW”，“团队”设置为“Graphixware,\
  \ LLC”，“组织标识符”为“com.gw”，“包标识符”为“com.gw.SettingsFW”。“语言”设置为“Swift”，“测试系统”为“Swift\
  \ Testing”。“包含文档”选项未被勾选。底部有“取消”、“上一页”和“下一页”导航按钮。](img/678928_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2 新项目设置\n\n**产品名称：** 你的新产品名称\n\n这将是框架项目的名称。项目根目录中会创建一个同名的文件夹。本项目中请使用 `SettingsFW`。\n\
  \n**团队：** 你的开发团队\n\n此字段是一个下拉菜单，包含与你的 Apple ID 关联的代码签名身份。你需要选择一个，以确保在 Apple App Store\
  \ 发布应用时，该应用来自你的组织。如果需要创建代码签名身份，可以在框架创建后，参考相应的 Apple 文档来完成。^(²)\n\n**组织标识符：** 你组织的包标识符前缀\n\
  \n该值将附加到包标识符之前。\n\n**语言：** 你的主要实现语言\n\n该值应设置为 `Swift`，因为本书提供的代码示例均使用 Swift。\n\n\
  **测试系统：** `XCTest` 或 `Swift Testing`\n\n该值应设置为 `Swift Testing`，因为本书提供的代码示例使用了 Swift\
  \ Testing 框架。\n\n其余设置可根据需要自行决定。\n\n### 配置 iOS 框架\n\n`Framework` 模板设置了大多数必要的项目设置。如果你仍需要为框架关联一个团队，请使用上一步中提到的\
  \ Apple 文档创建一个团队，下载并选中它（**图** **1-3**）：\n\n![Xcode 项目窗口截图，标题为“SettingsFW”。左侧面板显示文件目录，包含“SettingsFW”和“SettingsFWTests”文件夹，每个文件内各有一个\
  \ Swift 文件。主面板显示“签名与功能”选项卡，展示了自动签名设置、团队名称“Graphixware, LLC”以及 iOS 和 macOS 的包标识符。iOS\
  \ 部分列出了配置文件为“无需配置”，签名证书为 Apple Development。macOS 部分类似。](img/678928_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3 签名与功能设置\n\n1. 选择 `Xcode`/`设置` 菜单项\n2. 选择 `Apple 账户` 选项卡。如果你未登录 Apple 账户，请立即登录，这将自动将你的团队下载到“团队”部分\n\
  3. 关闭设置，并在 `项目导航器` 中选择项目的根节点\n4. 在 `显示项目与目标列表` 下选择默认目标\n5. 选择 `签名与功能` 选项卡\n6. 在\
  \ `签名` 部分下选择 `自动管理签名`\n7. 在 `团队` 下拉列表中选择你的团队\n\n项目创建后，`构建设置`/`打包` 部分下的 `DEFINES_MODULE`\
  \ 设置可设为 `YES`，以便将框架打包为 Swift 模块，从而允许在 Swift 代码中使用 `import [框架名称]` 导入，并可通过伞头文件暴露任何公共\
  \ Objective-C 头文件。如果需要伞头文件来暴露 Objective-C 头文件，则需执行以下步骤：\n\n![开发环境界面截图，显示一个名为“SettingsFW”的项目。左侧面板列出文件：“SettingsFW.h”、“SettingsFW.swift”和“SettingsFWTests.swift”。右侧面板显示“构建阶段”选项卡，包含“目标依赖项”、“运行构建工具插件”和“头文件”等部分，其中头文件部分列出了公共、私有和项目头文件。界面设置为\
  \ iPhone 17 Pro Max 模拟器，状态栏显示时间 12:40 PM。](img/678928_1_En_1_Fig4_HTML.jpg)\n\n\
  图 1-4 构建阶段设置\n\n1. 在 `项目导航器` 中右键点击框架文件夹，选择 `从模板新建文件…`\n2. 在 `源` 部分下选择 `头文件` 模板，然后点击\
  \ `下一页`\n3. 输入文件名，例如 `SettingsFW.h`，并创建该文件\n4. 在 `项目导航器` 中选择根节点\n5. 选择 `构建阶段` 选项卡，展开\
  \ `头文件` 部分，将伞头文件拖拽到 `公共` 列表中（**图** **1-4**）\n6. 在 `项目导航器` 中选择伞头文件，并插入以下内容（请使用相应的框架名称）：\n\
  \n```objc\n#import \n//! SettingsFW 的项目版本号。\nFOUNDATION_EXPORT double SettingsFWVersionNumber;\n\
  //! SettingsFW 的项目版本字符串。\nFOUNDATION_EXPORT const unsigned char SettingsFWVersionString[];\n\
  // MARK: - 公共 Objective-C 头文件\n// 在此处导入所有你希望 Swift 可见的头文件\n// MARK: - 可选的 Swift\
  \ 互操作性\n// 仅包含 Swift 代码的类会自动可用，无需导入\n```\n\n**趣闻：** 旧版本的 Xcode 会自动生成此文件。\n\n###\
  \ 创建故事板\n\niOS 框架可以提供不同类型的功能，你可以在移动应用中使用，包括 Swift 类扩展、常用工具、第三方 API 集成以及功能集。在本例中，将使用\
  \ Interface Builder 开发一个用户界面故事板功能。本书后续章节将创建一个更复杂的 SwiftUI 用户界面。\n\n![软件界面截图，用于选择新文件的模板。界面包含不同操作系统选项，如\
  \ iOS、macOS、watchOS、tvOS、visionOS 和 DriverKit。在“源”选项下，包括 Swift 文件、Cocoa Touch 类、Objective-C\
  \ 文件、头文件、C++ 文件、Metal 文件和 C 文件。在“用户界面”选项下，包括 SwiftUI 视图、故事板、视图、空文件和启动屏幕。其中“故事板”选项高亮显示，底部有“取消”、“上一页”和“下一页”按钮。](img/678928_1_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5 新文件模板窗口\n\n1. 在 `项目导航器` 中右键点击框架文件夹，选择 `从模板新建文件…`\n2. 在 `用户界面` 分组下选择 `故事板`\
  \ 模板（**图** **1-5**），然后点击 `下一页`\n3. 将文件保存为 `SettingsUI.storyboard`\n\n\n\n## 创建用户界面\n\
  \n本框架将展示账户设置。你可以使用 Interface Builder 练习开发此用户界面，也可以从 GitHub 下载源代码并替换 Storyboard 文件内容，具体操作如下：\n\
  \n![展示 iOS 应用故事板的 Xcode 界面截图。故事板包含两个 iPhone 屏幕。第一个屏幕显示一个“导航控制器”，带有一个标题占位符。第二个屏幕标记为“设置”，包含一个带有静态内容的表格视图，列出了“常规”信息，如名称、电子邮件和网站，并附有示例条目：“Graphixware,\
  \ LLC”、“graphixware@gmail.com”和“https:/graphixware.com”。左侧边栏显示文件结构，其中突出显示了“SettingsFW.h”和“SettingsUI.storyboard”等文件。](img/678928_1_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6 Storyboard 编辑器\n\n1. 在`Project Navigator`中右键点击`SettingsUI.storyboard`，选择“打开方式/源代码”\n\
  2. 选中文件内容并删除\n3. 在文本编辑器中打开下载的`SettingsUI.storyboard`文件，并将其内容粘贴到项目的`.storyboard`文件中\n\
  4. 在`Project Navigator`中右键点击该 Storyboard 文件，选择“打开方式/Interface Builder - Storyboard”（**图**\
  \ 1-6）\n\n### 创建 Cocoa Touch 类\n\n需要创建一个 Cocoa Touch 类来支持 Storyboard 中定义的用户界面：\n\
  \n1. 在`Project Navigator`中右键点击文件夹，选择**从模板新建文件…**\n2. 在**Source**部分选择**Cocoa Touch\
  \ Class**模板，然后点击**下一步**\n3. 输入类名，例如`SettingsTVC`，并将`UITableViewController`设置为父类\n\
  4. 确保**同时创建 XIB 文件**未勾选，且**语言**为 Swift\n\n将`SettingsTVC.swift`中的默认生成代码替换为以下内容：\n\
  \n```\nimport UIKit\nclass SettingsTVC: UITableViewController {\n@IBOutlet weak\
  \ var nameLabel: UILabel!\n@IBOutlet weak var nameValueLabel: UILabel!\n@IBOutlet\
  \ weak var emailLabel: UILabel!\n@IBOutlet weak var emailValueLabel: UILabel!\n\
  @IBOutlet weak var websiteLabel: UILabel!\n@IBOutlet weak var websiteValueLabel:\
  \ UILabel!\nvar configuration: Dictionary?\nfunc configure(configuration: Dictionary)\
  \ {\nself.configuration = configuration\n}\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  self.navigationController?.navigationBar.prefersLargeTitles = true\nself.navigationItem.largeTitleDisplayMode\
  \ = .always\n// 以下硬编码值在实际应用中将通过 API 从后端存储获取...\nself.nameValueLabel.text = \"Graphixware,\
  \ LLC\"\nself.emailValueLabel.text = \"gw@graphixware.com\"\nself.websiteValueLabel.text\
  \ = \"https://graphixware.com\"\n}\noverride func numberOfSections(in tableView:\
  \ UITableView) -> Int {\nreturn 1\n}\noverride func tableView(_ tableView: UITableView,\
  \ heightForHeaderInSection section: Int) -> CGFloat {\nreturn 0\n}\noverride func\
  \ tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) -> Int\
  \ {\nreturn 3\n}\noverride func tableView(_ tableView: UITableView, canEditRowAt\
  \ indexPath: IndexPath) -> Bool {\nreturn false\n}\n}\n```\n\n由于此类仅作为任意账户设置的静态表示，因此分区数和行数通过`numberOfSections()`和`numberOfRowsInSection()`固定。\n\
  \n字典变量`configuration`和函数`configure()`将允许在未来启用和配置新功能（当这些功能通过框架增强可用时）。本章后续将添加`SettingsTVC`所需的额外代码。\n\
  \n## 创建 Swift 协议\n\n为实现框架集成到应用中的功能，需要定义一个应用可以使用的公共接口。虽然框架可以在不使用协议的情况下，简单地在 Swift\
  \ 类中暴露一个公共函数，但这会导致两个实体之间紧密耦合，并阻碍框架在未来修改其用户界面而不影响消费端应用。更好的方法是定义一个公共协议来隐藏实现细节，允许框架在未来进行更改而无需修改应用或再次发布\
  \ App Store。请按以下步骤创建协议：\n\n1. 在`Project Navigator`中右键点击文件夹，选择**从模板新建文件…**\n2. 在**Source**部分选择**Swift\
  \ File**模板，然后点击**下一步**\n3. 将文件命名为`SettingsProtocol.swift`\n\n需要定义一个带有字典参数的协议函数，该函数将在未来用于暴露、启用和配置框架功能：\n\
  \n```\nimport Foundation\nimport UIKit\nprotocol DisplayableViewController {\nfunc\
  \ instantiateRootViewController(configuration: Dictionary) -> UIViewController\n\
  }\n```\n\n需要实现该协议以实例化根视图控制器：\n\n```\npublic class SettingsProtocol: DisplayableViewController\
  \ {\npublic init() {}\npublic func instantiateRootViewController(configuration:\
  \ Dictionary) -> UIViewController {\nlet storyboard = UIStoryboard(name: \"SettingsUI\"\
  , bundle: Bundle(for: SettingsTVC.self))\nlet vc = storyboard.instantiateViewController(withIdentifier:\
  \ \"SettingsNC\")\nif let navController = vc as? UINavigationController {\nif let\
  \ settingsTVC = navController.topViewController as? SettingsTVC {\nsettingsTVC.configure(configuration:\
  \ configuration)\n}\n}\nreturn vc\n}\n}\n```\n\n**趣味事实：** 如果未使用`UIStoryboard`初始化器`Bundle(for:\
  \ [class])`，从外部应用目标引用框架 Storyboard 时将无法找到。\n\n**趣味事实：** 如果在 Storyboard 中未为框架视图控制器分配\
  \ **Storyboard ID** 和对应的类，它将无法正常加载（示例 Storyboard 已设置好这些内容）。\n\n**趣味事实：** 定义函数协议时未使用访问修饰符，但在实现时必须将其设为`public`，以便外部应用目标正确集成。\n\
  \n至此，代码应能顺利编译。\n\n## 创建应用目标\n\n为了在不集成到外部应用（此操作将在框架项目外部进行）的情况下运行 iOS 框架，需要在框架项目中创建一个应用目标用于测试。请按以下步骤创建应用目标：\n\
  \n![展示选择新目标模板的软件开发界面截图。选项包括 iOS、macOS 等平台。列出的应用程序扩展包括 Spotlight Import、Sticker Pack、Thumbnail、Translation\
  \ Provider、Unwanted Communication、URL Filter Network、Virtual Conference 和 Widget\
