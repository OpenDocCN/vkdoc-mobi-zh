  \n1.  在**项目导航器**中，右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n\n2.  在**源代码**分组下选择**Swift\
  \ 文件**模板\n\n3.  将文件命名为 `RecordingsStoreFWSwiftLoader.swift`\n\n将以下代码添加到类中，以执行框架注册，从而使应用能够公开框架的功能：\n\
  \n```\nimport Foundation\n@objcMembers public class RecordingsStoreFWSwiftLoader:\
  \ NSObject {\noverride public init() {\nsuper.init()\ninitViews()\n}\nfunc initViews()\
  \ {\nlet config = [ \"bundle\": \"com.gw.RecordingsStoreFW\", \"storyboard\": \"\
  RecordingsStoreUI\", \"view\": \"RecordingsStoreVC\", \"title\": \"Pro Features\"\
  , \"icon\": \"storefront\"]\nvar configs: [[String:String]] = []\nif let persistedConfigs\
  \ = UserDefaults.standard.object(forKey: \"views\") as? [Dictionary], !persistedConfigs.isEmpty\
  \ {\nconfigs.append(contentsOf: persistedConfigs)\nif !findConfig(configs: persistedConfigs)\
  \ {\nconfigs.append(config)\n}\n} else {\nconfigs.append(config)\n}\nUserDefaults.standard.set(configs,\
  \ forKey: \"views\")\n}\nfunc findConfig(configs: [[String:String]]) -> Bool {\n\
  var found = false\nfor config in configs {\nif config[\"bundle\"] == \"com.gw.RecordingsStoreFW\"\
  , config[\"storyboard\"] == \"RecordingsStoreUI\", config[\"view\"] == \"RecordingsStoreVC\"\
  \ {\nfound = true\nbreak\n}\n}\nreturn found\n}\n}\n```\n\n向 `RecordingsStoreFWSwiftLoader`\
  \ 添加 `initFeatures()` 方法，以获取持久化到 Core Data 的应用内购买内容，从而能够通过 `UserDefaults` 进行传播。\n\
  \n```\nimport Foundation\n@objcMembers public class RecordingsStoreFWSwiftLoader:\
  \ NSObject {\noverride public init() {\nsuper.init()\ninitViews()\ninitFeatures()\n\
  }\nfunc initFeatures() {\nvar publish = false\nvar tracks: Int16 = 1\nlet manager\
  \ = SwiftDataManager.shared\nif let config = manager.configuration {\npublish =\
  \ config.publishRecordings\ntracks = config.trackCount\n} else {\n// 没有现有配置——创建一个默认配置\n\
  manager.saveConfiguration(existing: nil, publishRecordings: false, trackCount: 1)\n\
  if let config = manager.configuration {\npublish = config.publishRecordings\ntracks\
  \ = config.trackCount\n}\n}\nUserDefaults.standard.set([\"publishRecordings\": publish,\
  \ \"trackCount\": tracks], forKey: \"features\")\n}\n}\n```\n\n## 锦上添花\n\n在方案下拉菜单中选择该应用作为当前方案，构建应用，并使用某个\
