- "# 2. 应用现代设计模式打造可扩展、可维护的框架\n\n## 设计 RecordingsFW 框架\n\n本章将深入探讨设计一个能够跨不同应用、服务于多种用途的\
  \ iOS 框架的复杂性。它将通过演示如何使用模型-视图-视图模型（MVVM）设计模式将本地文件服务集成到用户界面中，来展示软件可重用性的有效性。本章将继续强化软件解耦的重要性，在前一章引入的概念基础上进一步深化。随着阅读的深入，该框架的协议将替换为一个更通用、更灵活的解决方案，进一步增强软件解耦。\n\
  \n对于不熟悉 MVVM 设计模式的人来说，它是计算机软件中的一种架构模式，有助于将图形用户界面（视图）与业务逻辑（模型）分离，使视图不依赖于任何特定的模型平台。^(³)\
  \ 互联网上关于此主题有大量专门针对 iOS 移动应用的文章。\n\n在本章中，我们将重点设计 `RecordingsFW` 框架，强调其可扩展性、可维护性和可重用性。你将看到如何使用模型-视图-视图模型（MVVM）设计模式将本地文件服务集成到用户界面中，从而强化之前介绍的软件解耦原则。随着学习的深入，该框架的协议最终将演变成一个更通用、更灵活的解决方案，进一步提升跨应用的模块化和灵活性。\n\
  \n\n\n### 设置 iOS 框架与项目\n\n需要新建并配置一个 iOS 框架和项目，流程与第 1 章类似。使用`Recordings`前缀命名项目及其对应文件，例如`RecordingsFW`：\n\
  \n1.  执行第 1 章中“创建 iOS 框架”一节所列的步骤\n2.  执行第 1 章中“配置 iOS 框架”一节所列的步骤\n3.  执行第 1 章中“创建\
  \ Storyboard”一节所列的步骤\n\n## 创建用户界面\n\n本章的框架将展示一个代表音频录音的本地文件列表。你可以使用 Interface Builder\
  \ 练习开发此 UI，也可以从 GitHub 下载代码并按如下方式替换 Storyboard 文件内容：\n\n![移动应用故事板的开发环境截图。界面包含三个主面板，分别代表不同的应用屏幕。第一个面板是带有“Title”标签的导航控制器。第二个面板显示标题为“Recordings”的列表视图，其中包含一个标签为“My\
  \ Acoustic Recording”的原型单元格。第三个面板显示“My Acoustic Recording”的详细信息，包括版权信息、发布日期、时长、类型、比特率和大小。每个面板底部都可见导航和控制按钮。左侧边栏列出了项目文件和组件。](img/678928_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1 Storyboard 编辑器\n\n1.  在“项目导航器”中右键单击`RecordingsUI.storyboard`，选择**打开方式/源代码**\n\
  2.  选中文件内容并删除\n3.  从下载的`RecordingsUI.storyboard`文件中复制故事板文件内容，粘贴到框架的`.storyboard`文件中\n\
  4.  在“项目导航器”中右键单击`RecordingsUI.storyboard`，选择**打开方式/Interface Builder - Storyboard**（**图**\
  \ **2-1**）\n\n### 创建 Cocoa Touch 类\n\n执行以下步骤以创建一个 Cocoa Touch 类，用于支持上一步定义的用户界面：\n\
  \n1.  在“项目导航器”中右键单击文件夹，选择**从模板新建文件…**\n2.  在“Source”部分选择`Cocoa Touch Class`模板，点击**下一步**\n\
  3.  输入`RecordingsTVC`作为类名，并将`UITableViewController`设置为父类\n4.  确保**同时创建 XIB 文件**未勾选，且`Language`为\
  \ Swift\n\n同样地，需要修改 Cocoa Touch 类以匹配下载的故事板配置：\n\n```\nimport UIKit\nclass RecordingsTVC:\
  \ UITableViewController {\n@IBOutlet weak var publishBarButtonItem: UIBarButtonItem!\
  \ // 注意：将在后续章节中使用\noverride func viewDidLoad() {\nsuper.viewDidLoad()\nself.publishBarButtonItem.isHidden\
  \ = true // 注意：将在后续章节中使用\nself.clearsSelectionOnViewWillAppear = true\nself.navigationController?.navigationBar.prefersLargeTitles\
  \ = true\nself.navigationItem.largeTitleDisplayMode = .always\nself.extendedLayoutIncludesOpaqueBars\
  \ = true\nself.tableView.refreshControl?.addTarget(self, action: #selector(self.refresh(_:)),\
  \ for: .valueChanged)\nself.tableView.refreshControl?.beginRefreshing()\n}\n@objc\
  \ func refresh(_ sender: AnyObject) {\n}\noverride func tableView(_ tableView: UITableView,\
  \ numberOfRowsInSection section: Int) -> Int {\nreturn 0\n}\noverride func numberOfSections(in\
  \ tableView: UITableView) -> Int {\nreturn 1\n}\noverride func tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\nlet cell\
  \ = tableView.dequeueReusableCell(withIdentifier: \"RecordingsCell\", for: indexPath)\n\
  return cell\n}\noverride func tableView(_ tableView: UITableView, canEditRowAt indexPath:\
  \ IndexPath) -> Bool {\nreturn false\n}\n}\nclass RecordingsCell: UITableViewCell\
  \ {\n@IBOutlet weak var titleLabel: UILabel!\n@IBOutlet weak var copyrightLabel:\
  \ UILabel!\n}\n```\n\n在此代码示例中，`cellForRowAt()`通过标识符复用`UITableViewCell`来渲染表格的每一行。支持此功能的类`RecordingsCell`也在该类中定义。\n\
  \n### 创建协议与模型\n\n为了实现该框架的 MVVM 设计模式，需要为 ViewModel 创建一个协议。该协议的 ViewModel 实现将获取代表音频录音的本地文件列表。在\
  \ ViewModel 中实现该协议后，需要将 ViewModel 集成到表格视图中。执行以下步骤创建协议：\n\n1.  在“项目导航器”中右键单击文件夹，选择**从模板新建文件…**\n\
  2.  在“Source”部分选择`Swift File`模板\n3.  创建一个名为`RecordingsProtocol.swift`的类\n\n定义协议以返回`Recording`模型数组，这些模型将由设备上的本地文件生成：\n\
  \n```\nprotocol RefreshableViewModel {\nfunc getRecordings() -> [Recording]\nfunc\
  \ refresh()\n}\n```\n\n定义一个`Recording`模型来表示音频录音的（任意）元数据。该模型需要符合`Codable`^(⁴)协议，以便这些数据类型可以从外部表示中读取和写入：\n\
  \n```\nstruct Recording: Codable {\nlet bitrate: Int64\nlet copyright: String\n\
  let date: String\nlet length: Int64\nlet size: Int64\nvar title: String\nlet type:\
  \ String\nlet url: String\n}\n```\n\n### 创建 ViewModel\n\n需要创建一个 ViewModel 类来实现上一节定义的协议：\n\
  \n1.  在“项目导航器”中右键单击文件夹，选择**从模板新建文件…**\n2.  在“Source”部分选择`Swift File`模板\n3.  创建一个名为`RecordingsViewModel.swift`的类\n\
  \n采用`RefreshableViewModel`，实现所需的协议函数，并定义一个名为`recordings`的变量来保存由底层服务返回的模型（将在下一节定义）：\n\
  \n```\nimport Foundation\nclass RecordingsViewModel: RefreshableViewModel {\nprivate(set)\
  \ var recordings: [Recording]!\ninit() {\n}\nfunc getRecordings() -> [Recording]\
  \ {\nreturn recordings\n}\nfunc refresh() {\nfetch()\n}\nprivate func fetch() {\n\
  }\n}\n```\n\n需要重写`recordings`变量的`didSet`属性，以便在录音发生变化时通知视图。还需要定义一个复合（函数）类型^(⁵)变量来执行通知。该变量将在视图（View）中设置，并将视图绑定到\
  \ ViewModel：\n\n```\nprivate(set) var recordings: [Recording]! {\ndidSet {\nself.bindRecordingsViewModelToController()\n\
  }\n}\nvar bindRecordingsViewModelToController : (() -> ()) = {}\n```\n\n应在`fetch()`函数中实现以下代码，以调用本地服务从设备读取文件，创建相应的模型，并设置`recordings`变量以触发视图更新自身的通知。\n\
  \n注意：在`RecordingsService`类创建完成之前，`fetch`函数将无法编译，因此可以将其注释掉，直到该类创建完成。\n\n```\nprivate\
  \ func fetch() {\nRecordingsService.shared.fetch() { [weak self] recordings, error\
  \ in\nguard let strongSelf = self else { return }\nif let err = error {\nprint(\"\
  RecordingsViewModel.fetch(): error = \\(err.localizedDescription)\")\n} else {\n\
  strongSelf.recordings = recordings\n}\n}\n}\n```\n\n\n\n## 创建本地文件服务\n\n在该框架中，将使用本地文件服务从设备读取文件并返回代表音频文件的元数据。请按照以下步骤创建该服务：\n\
  \n1. 右键点击**项目导航器**中的文件夹，选择 **从模板新建文件...**（**New File from Template…**）\n2. 在 **Source**\
  \ 部分下选择 **Swift** **文件**（**Swift** **File**）模板\n3. 创建一个名为 `RecordingsService.swift`\
  \ 的类\n\n为服务创建一个**单例**^(⁶)类。单例是一种常见的设计模式，可防止类被实例化出多个实例。一旦实例化，无论在哪里引用，都会使用同一个实例。\n\
  \n```swift\nimport Foundation\nclass RecordingsService {\n    public static let\
  \ shared = RecordingsService()\n}\n```\n\n定义一个完成处理程序作为复合（函数）类型，当文件系统数据被读取并转换为 `Recording`\
  \ 模型后，服务将调用该处理程序。\n\n```swift\ntypealias RecordingCompletionHandler = ([Recording]?,\
  \ Error?) -> ()\n```\n\n由于此框架从设备读取文件并返回代表这些文件的元数据，因此需要定义当文件不存在时使用的示例数据。`init()`\
  \ 函数将使用每个 `Recording` 模型的 `title` 属性来检查对应文件是否存在，如果不存在则创建该文件。向类中添加以下代码：\n\n```swift\n\
  private let recordings: [Recording] = [\n    Recording(bitrate: 131072, copyright:\
  \ \"© 2025 Words and Music by John Doe\", date: \"04/28/2025\", length: 270, size:\
  \ 5*1024*1024,\n              title: \"My Electric Guitar Anthem\", type: \"AAC\
  \ Audio File\", url: \"https://graphixware.com/MyElectricAnthem.aac\"),\n    Recording(bitrate:\
  \ 131072, copyright: \"© 2025 Words and Music by John Doe\", date: \"08/24/2025\"\
  , length: 228, size: 10*1024*1024,\n              title: \"My Acoustic Guitar Ballad\"\
  , type: \"AAC Audio File\", url: \"https://graphixware.com/MyAcousticBallad.aac\"\
  )\n]\n\nprivate init() {\n    let encoder = JSONEncoder()\n    encoder.outputFormatting\
  \ = .prettyPrinted\n    for recording in recordings {\n        do {\n          \
  \  let file = try FileManager.default.url(for: .documentDirectory, in: .userDomainMask,\
  \ appropriateFor: nil, create: true)\n                .appendingPathComponent(recording.title\
  \ + \".aac\")\n            if !FileManager.default.fileExists(atPath: file.lastPathComponent)\
  \ {\n                try encoder.encode(recording).write(to: file)\n           \
  \ }\n        } catch {\n            print(\"RecordingsService.init(): Error = \\\
  (error.localizedDescription)\")\n        }\n    }\n}\n```\n\n定义一个 `fetch()` 函数，供\
  \ ViewModel 调用以获取数据，随后视图将在其用户界面处理中显示这些数据。\n\n```swift\nfunc fetch(completion: @escaping\
  \ RecordingCompletionHandler) {\n    var recordingModels: [Recording] = []\n   \
  \ let fileManager = FileManager.default\n    let documentsURL = fileManager.urls(for:\
  \ .documentDirectory, in: .userDomainMask)[0]\n    do {\n        let fileURLs =\
  \ try fileManager.contentsOfDirectory(at: documentsURL, includingPropertiesForKeys:\
  \ nil)\n        for fileURL in fileURLs {\n            if let recording = read(type:\
  \ Recording.self, file: fileURL) {\n                recordingModels.append(recording)\n\
  \            }\n        }\n    } catch {\n        print(\"RecordingsService.fetch():\
  \ Error = \\(error.localizedDescription)\")\n    }\n    completion(recordingModels,\
  \ nil)\n}\n\nprivate func read<T: Decodable>(type: T.Type, file: URL) -> T? {\n\
  \    var data: Data?\n    do {\n        data = try Data(contentsOf: file)\n    }\
  \ catch {\n        print(\"RecordingsService.read(): Error = \\(error.localizedDescription)\"\
  )\n    }\n    guard let recordingData = data else { return nil }\n    do {\n   \
  \     let decoder = JSONDecoder()\n        return try decoder.decode(T.self, from:\
  \ recordingData)\n    } catch {\n        print(\"RecordingsService.read(): Error\
  \ = \\(error.localizedDescription)\")\n    }\n    return nil\n}\n```\n\n**注意**\n\
  \n既然 `RecordingsService` 已经定义完毕，请取消 `RecordingsViewModel` 的 `fetch()` 函数中先前注释掉的代码，以便项目能够正确编译。\n\
  \n## 将 ViewModel 集成到视图中\n\n选择 `RecordingsTVC.swift`，定义一个名为 `viewModel` 的变量，以及一个名为\
  \ `initLocalServiceVM()` 的函数，用于实例化 ViewModel、将 ViewModel 绑定到视图、从本地文件服务获取数据，并在数据发生变化时更新用户界面：\n\
  \n```swift\nclass RecordingsTVC: UITableViewController {\n    var viewModel: RefreshableViewModel?\n\
  \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        // ...\n\
  \        initLocalServiceVM()\n    }\n\n    func initLocalServiceVM() {\n      \
  \  self.viewModel = RecordingsViewModel()\n        (self.viewModel as! RecordingsViewModel).bindRecordingsViewModelToController\
  \ = { [weak self] in\n            guard let strongSelf = self else { return }\n\
  \            if let recordings = strongSelf.viewModel?.getRecordings() {\n     \
  \           print(\"RecordingsTVC.initLocalServiceVM().bindRecordingsViewModelToController():\
  \ recordings.count= \\(recordings.count)\")\n            }\n            DispatchQueue.main.async\
  \ {\n                strongSelf.refreshControl?.endRefreshing()\n              \
  \  strongSelf.tableView.reloadData()\n            }\n        }\n        self.viewModel?.refresh()\n\
  \    }\n}\n```\n\n将 ViewModel 集成到用户界面实现中每个使用数据的函数中：\n\n```swift\n@objc func refresh(_\
  \ sender: AnyObject) {\n    viewModel?.refresh()\n}\n\noverride func tableView(_\
  \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
