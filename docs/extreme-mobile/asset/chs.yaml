  \n**图 6-1** 属性列表编辑器\n\n\n### 集成行动号召\n\n添加属性列表设置后，该设置将用于控制用户界面组件 `UIBarButtonItem`\
  \ 的可见性。`UIBarButtonItem` 将触发一个行动号召（CTA），以显示歌曲发布功能的模拟用户界面。\n\n`UIBarButtonItem` 之前已作为\
  \ `IBOutlet` 添加到 `RecordingsTVC` 中。应添加一个名为 `publishButtonPressed()` 的行动号召函数作为 `IBAction`，以响应按钮选择（相应的故事板连接已经设置完成）：\n\
  \n```\n@IBAction func publishButtonPressed(_ sender: Any) {\nlet storyboard = UIStoryboard(name:\
  \ \"RecordingsUI\", bundle: Bundle(for: RecordingsTVC.self))\nlet viewController\
  \ = storyboard.instantiateViewController(withIdentifier: \"PublishRecordingNC\"\
  )\nself.present(viewController, animated: true)\n}\n```\n\n需要在 `viewWillAppear()`\
  \ 中根据属性列表设置（最终会被 `UserDefaults` 设置覆盖以反映应用内购买）来设置按钮的可见性：\n\n```\noverride func viewWillAppear(_\
  \ animated: Bool) {\nsuper.viewWillAppear(animated)\nvar enablePublishing = false\n\
