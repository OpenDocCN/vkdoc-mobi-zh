  \ 不支持 `Configuration` 特性，字体和文本颜色属性将直接通过 `UserDefaults` 公开的 plist 设置应用到组件上。\n\n`UIColor`\
  \ 类扩展是一个便捷类，用于从系统颜色名称（如 `systemRed` 或 `systemTeal`）或十六进制字符串（如 `#RRGGBB`）创建颜色。这使得存储在\
  \ plist 中的品牌属性可以被动态应用，从而支持标准的 UIKit 颜色和自定义颜色。\n\n将以下类扩展添加到 `AppDelegate` 类中，以将品牌应用于\
  \ `UIButton` 组件：\n\n```\npublic extension UIButton {\n    override func awakeFromNib()\
