  \nbuttonStrokeColor\nwhite\nbuttonStrokeWidth\n\nbuttonHighlightedColor\nsystemRed\n\
  buttonDisabledColor\nsystemGray\n\n```\n\n## 跨框架集中管理品牌属性\n\n`AppDelegate` 是从 plist\
  \ 读取品牌属性以填充 `UserDefaults` 的理想位置，因为它在应用启动时运行一次，且在所有视图或视图控制器加载之前。这确保了所有依赖于品牌值、字体或其他配置设置的\
  \ UI 元素和代码从一开始就能访问这些数据。通过在此处初始化 `UserDefaults`，您的主题系统将保证在整个应用中准备就绪，无论是在 UIKit 组件、SwiftUI\
  \ 视图还是其他服务中，都无需在多个位置重复设置。\n\n选择 `ScratchTraxApp2` 文件夹下的 `AppDelegate` 类，并将 `didFinishLaunchingWithOptions()`\
  \ 替换为以下代码：\n\n```\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
