- "# 4. 为动态功能启用奠定基础\n\n设计 `RecordingsStoreFW` 框架\n\n本章将为 `iOS` 框架中的动态功能启用奠定架构基础。你将设计一个可扩展、模块化的框架，能够在运行时暴露、激活和管理功能。我们将利用模拟的应用内购买^(¹⁶)来演示如何解锁框架中已有的内置功能，以推动收入增长。\n\
  \n应用内购买类似于数字商店，允许用户从应用内部购买内容和功能，而无需下载并安装新版本的应用。应用内购买使移动应用开发者能够将功能集设计为独立的实体，用户可以根据体验和需求进行购买。应用内购买由\
  \ `Apple StoreKit` 框架以及 `App Store Connect` 门户提供支持。Apple 已对应用内购买的集成、配置和测试提供了详细的文档，因此本章不将重点放在这些方面。本章将重点介绍如何通过模拟的应用内购买来启用外部框架中的功能。\n\
  \n在本章中，我们将构建 `RecordingsStoreFW` 框架，以支持 `iOS` 框架中的动态功能启用。你将创建一个可扩展、模块化的系统，能够在运行时暴露、激活和管理功能。通过使用模拟的应用内购买，我们将演示如何在不破坏解耦架构的前提下，解锁框架内的功能以推动收入。与之前一样，`MVVM`\
  \ 将构建框架结构，`SwiftData` 支持模型，`SwiftUI` 和 `Combine` 处理视图，依赖注入将桩 API 集成到 `ViewModel`\
  \ 中。`ViewModel` 也将通过依赖注入集成第三方桩 API。\n\n## 设置 iOS 框架和项目\n\n需要创建一个新的 `iOS` 框架和项目并进行配置，类似于第\
  \ 1 章。使用 `RecordingsStore` 前缀命名项目及对应的文件，例如 `RecordingsStoreFW`：\n\n1.  执行第 1 章中\"\
  创建 iOS 框架\"部分列出的步骤。\n\n2.  执行第 1 章中\"配置 iOS 框架\"部分列出的步骤。\n\n\n\n### 创建 SwiftData\
  \ 管理器\n\n`SwiftData` 于 iOS 17 中引入，是 Core Data 的现代化转型，专为 Swift 构建并与 SwiftUI 紧密集成。它使用以\
  \ `@Model` 属性标记的 Swift 原生模型类型，取代了 `.xcdatamodeld` 文件，自动处理模型架构演进，并提供了更简单的类型安全 API。数据存储在\
  \ `ModelContainer` 中，通过 `FetchDescriptor` 进行查询，并通过轻量级的 `ModelContext` 保存。它还能与 SwiftUI\
  \ 的 `@Query` 和 `@Environment(\\.modelContext)` 无缝集成，在数据变化时自动更新视图。本质上，SwiftData 用现代、声明式且以\
  \ Swift 为先的设计取代了 Core Data 的复杂性。\n\nSwiftData^(¹⁷) 将用于持久化模拟的应用内购买。应用内购买的交易和收据通常在应用启动、变为活跃状态或接收到与购买相关的交易状态变化时从\
  \ Apple App Store 获取。SwiftData 将用于启用需要购买的功能。以下部分将解释如何将 SwiftData 集成到 iOS Framework\
  \ 中。\n\n**创建一个新文件来管理 SwiftData 交互：**\n\n1.  在 **项目导航器** 中右键点击文件夹，然后选择 **来自模板的新文件…**\n\
  2.  在 **Source** 组下选择 **Swift 文件** 模板，并将文件保存为 **SwiftDataManager.swift**\n\n**导入所需的框架：**\n\
  \n```swift\nimport Foundation\nimport SwiftData\nimport Combine\n```\n\n**定义 SwiftData\
  \ 模型：**\n\n在 SwiftData 中，模型被定义为使用 `@Model` 注解的纯 Swift 类型。这取代了 Core Data 的 `.xcdatamodeld`\
  \ 文件和 `NSManagedObject` 子类。每个存储属性都会自动成为持久化属性，因此无需手动定义实体或属性类型。\n\n`@Attribute(.unique)`\
  \ 修饰符确保每个记录的 `id` 在数据存储中是唯一的，类似于主键。\n\nSwiftData 会自动为此类生成架构元数据、迁移支持和持久化存储，因此不再需要维护\
  \ Core Data 模型文件。\n\n```swift\n@Model\npublic final class Configuration {\n    @Attribute(.unique)\
  \ public var id: UUID\n    public var publishRecordings: Bool\n    public var trackCount:\
  \ Int16\n    public init(id: UUID = UUID(), publishRecordings: Bool = false, trackCount:\
  \ Int16 = 0) {\n        self.id = id\n        self.publishRecordings = publishRecordings\n\
  \        self.trackCount = trackCount\n    }\n}\n```\n\n**定义类：**\n\n`SwiftDataManager`\
  \ 将作为单例实现，以确保应用在其整个生命周期内与一个一致的持久化层交互。\n\n它将遵循 `ObservableObject` 协议，以便直接与 SwiftUI\
  \ 的数据流集成。任何使用 `@StateObject` 或 `@ObservedObject` 观察 `SwiftDataManager.shared` 的\
  \ SwiftUI 视图，当其某个 `@Published` 属性发生变化时，都会自动刷新。\n\n将定义一个 `Configuration` 属性并标记为 `@Published`，这样当应用加载、保存或修改该属性时，SwiftUI\
  \ 视图会立即更新。\n\n此外，还会定义 `ModelContainer` 和 `ModelContext`。`ModelContainer` 取代了 Core\
  \ Data 的 `NSPersistentContainer`，用于定义架构中存在哪些模型以及数据存储的位置。`ModelContext` 取代了 `NSManagedObjectContext`，允许对模型执行插入、获取、更新和删除等操作。\n\
  \n```swift\npublic class SwiftDataManager: ObservableObject {\n    public static\
  \ let shared = SwiftDataManager()\n    @Published public var configuration: Configuration?\n\
  \    private let modelContainer: ModelContainer\n    private let context: ModelContext\n\
  }\n```\n\n**初始化 SwiftData 环境：**\n\n类初始化器将在启动时构建完整的 SwiftData 环境。`ModelContainer(for:\
  \ Configuration.self)` 将创建一个仅管理 `Configuration` 模型的容器，`ModelContext(modelContainer)`\
  \ 将为持久化操作建立工作上下文。\n\n`fetchConfiguration()` 将立即从磁盘加载任何现有的配置到可观察的 `Configuration`\
  \ 属性中，确保应用始终以最新的设置启动。\n\n```swift\nprivate init() {\n    do {\n        // 正确初始化\
  \ ModelContainer\n        modelContainer = try ModelContainer(for: Configuration.self)\n\
  \        context = ModelContext(modelContainer)\n        fetchConfiguration()\n\
  \    } catch {\n        fatalError(\"创建 ModelContainer 失败: \\(error)\")\n    }\n\
  }\n\npublic func fetchConfiguration() {\n    let fetchDescriptor = FetchDescriptor<Configuration>()\n\
  \    do {\n        if let firstConfig = try context.fetch(fetchDescriptor).first\
  \ {\n            self.configuration = firstConfig\n        }\n    } catch {\n  \
  \      print(\"获取失败: \\(error)\")\n    }\n}\n```\n\n**持久化 SwiftData 模型和上下文：**\n\n\
  `saveConfiguration()` 将更新现有配置，如果不存在则创建新配置。如果创建了新实例，它将被插入到上下文中，然后填充新值。在将更新应用到配置模型后，它将调用\
  \ `context.save()` 将内存中的更改提交到持久化存储。\n\n```swift\npublic func saveConfiguration(existing:\
  \ Configuration? = nil, publishRecordings: Bool, trackCount: Int16) {\n    let config:\
  \ Configuration\n    if let existing = existing {\n        config = existing\n \
  \   } else {\n        config = Configuration()\n        context.insert(config)\n\
  \    }\n    config.publishRecordings = publishRecordings\n    config.trackCount\
  \ = trackCount\n    do {\n        try context.save()\n        self.configuration\
  \ = config\n    } catch {\n        print(\"保存失败: \\(error)\")\n    }\n}\n```\n\n\
  ### 配置桩 API 服务\n\n本章将使用名为 OHHTTPStubs 的桩 API 服务，从模拟的网络 API 请求中返回代表应用内购买的 JSON 数据。将使用依赖注入将服务和端点注入到\
  \ ViewModel，这与第 3 章中的做法类似。使用此模式有助于解耦。\n\n创建一个名为 `IAP.json` 的文件，包含以下代表可用应用内购买的 JSON\
  \ 数据：\n\n```json\n[\n    {\n        \"category\": \"发布\",\n        \"name\": \"\
  发布录音\",\n        \"price\": 3.99,\n        \"type\": \"publishRecordings\"\n   \
  \ },\n    {\n        \"category\": \"录音\",\n        \"name\": \"2 个录音轨道\",\n   \
  \     \"price\": 0.99,\n        \"type\": \"twoTracks\"\n    },\n    {\n       \
  \ \"category\": \"录音\",\n        \"name\": \"3 个录音轨道\",\n        \"price\": 1.99,\n\
  \        \"type\": \"threeTracks\"\n    },\n    {\n        \"category\": \"录音\"\
  ,\n        \"name\": \"4 个录音轨道\",\n        \"price\": 2.99,\n        \"type\": \"\
  fourTracks\"\n    }\n]\n```\n\n创建一个名为 `IAP.swift` 的新类，并为端点定义一个枚举。`.fetchInAppPurchases`\
  \ 中的 URL 是任意的，但主机名应与集成桩 API 服务时将使用的主机名匹配：\n\n```swift\nenum IAPEndpoint {\n    case\
  \ fetchInAppPurchases\n    var urlString: String {\n        switch self {\n    \
  \    case .fetchInAppPurchases:\n            return \"https://graphixware.com/iaps\"\
  \n        }\n    }\n}\n```\n\n定义一个枚举来映射错误情况：\n\n```swift\nenum IAPError: Error {\n\
  \    case request(message: String)\n    case network(message: String)\n    case\
  \ status(message: String)\n    case parsing(message: String)\n    case other(message:\
  \ String)\n}\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n####\
  \ 集成 OHHTTPStubs\n\n`OHHTTPStubs`¹⁸ 是一个可以拦截和模拟网络 API 请求的库。它非常适合在参考应用中模拟网络请求。本章将使用它来模拟获取应用内购买项，这些购买项通常是通过\
  \ App Store Connect 为 iOS 应用配置的。在实际应用中，则会使用 `StoreKit` API¹⁹。\n\n`OHHTTPStubs` 可以通过\
  \ CocoaPods 或 Swift Package Manager 安装。为了使这个框架保持为 `.xcodeproj` 格式，将使用 Swift Package\
  \ 选项。\n\n![显示“OHHTTPStubs”包的软件包管理器界面截图。该界面显示了包的仓库链接、版本兼容性以及对 Swift、Carthage 和 SPM\
  \ 的支持。描述说明了该包在模拟网络请求和使用虚假网络数据测试应用方面的用途。界面包括将包添加到项目的选项，以及一条通知，表明项目已依赖于“ohhttpstubs”。](img/678928_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** Swift Package Manager\n\n1.  在**项目导航器**的空白区域右键单击，然后选择**添加包依赖项…**\n2.\
  \  在搜索字段中输入以下 OHHTTPStubs URL：[`https://github.com/AliSoftware/OHHTTPStubs`](https://github.com/AliSoftware/OHHTTPStubs)\n\
  3.  选择**添加包**，然后在相应的弹出窗口（**图** **4-1**）中为包产品选择 **OHHTTPStubsSwift**\n\n#### 设计通用服务\n\
  \n创建一个名为 `IAPService.swift` 的新类来管理应用内购买。为了防止创建该类的多个实例，将其定义为单例：\n\n```swift\nimport\
  \ Foundation\n\nclass IAPService {\n    public static let shared = IAPService()\n\
  \    private init() {\n    }\n}\n```\n\n为该服务创建一个协议（在类定义之前），ViewModel 将使用该协议：\n\n\
  ```swift\nimport Foundation\nimport Combine\n\nprotocol StubAPIService {\n    func\
  \ fetch<T: Decodable>(_t: T.Type, url: URL) -> AnyPublisher<T, Error>\n}\n```\n\n\
  与上一章一样，`fetch()` 将利用 **Swift 泛型**来创建灵活、可复用的函数和类型，这些函数和类型可以与不同的类型一起工作，从而避免代码重复。²⁰\
  \ 当调用 `fetch()` 函数时，需要将从网络 API 请求返回的所需对象类型传递给该函数。\n\n```\n例如: service.fetch(_t:\
  \ IAP.self, url: url)\n```\n\n`OHHTTPStubs` 库将被集成到 `init()` 函数中，用于拦截网络 API 请求并模拟其响应。主机名应替换为您自己的域名。如果您目前没有域名，可以使用示例代码中的域名。只需要一个变量来保存“存根描述符”，它将定义拦截请求的条件（例如，主机匹配），以及使用之前在\
  \ `IAP.json` 中定义的 JSON 数据的响应。`onStubActivation()` 回调可用于监视被存根的请求。还需要导入 OHHTTPStubs\
  \ 框架：\n\n```swift\ninternal import OHHTTPStubs\ninternal import OHHTTPStubsSwift\n\
  \nclass IAPService: StubAPIService {\n    public static let shared = IAPService()\n\
  \    weak var stubDesc: HTTPStubsDescriptor?\n    \n    private init() {\n     \
  \   stubDesc = stub(condition: isHost(\"graphixware.com\")) { request in\n     \
  \       return HTTPStubsResponse(fileAtPath: OHPathForFile(\"IAP.json\", type(of:\
  \ self))!, statusCode: 200,\n                                     headers: [\"Content-Type\"\
  :\"application/json\"]\n            )\n        }\n        stubDesc?.name = \"IAP.json\"\
  \n        HTTPStubs.onStubActivation { (request: URLRequest, stub: HTTPStubsDescriptor,\
  \ response: HTTPStubsResponse) in\n            print(\"IAPService.init(): 对 \\(request.url!)\
  \ 的请求已被 \\((stub.name != nil) ? stub.name! : \"?\") 存根\")\n        }\n    }\n}\n\
  ```\n\n> **注意：** `OHHTTPStubs` 和 `OHHTTPStubsSwift` 框架是使用内部访问修饰符导入的，以解决编译器警告：模块未使用“库演进支持”进行编译。由于实际应用永远不会附带这些测试框架，因此解决警告对此示例而言已足够。\n\
  \n采用 `StubAPIService` 协议并实现其所需的行为：\n\n```swift\nfunc fetch<T: Decodable>(_t: T.Type,\
  \ url: URL) -> AnyPublisher<T, Error> {\n    return URLSession.shared.dataTaskPublisher(for:\
  \ url)\n        .mapError { error in\n            IAPError.network(message: error.localizedDescription)\n\
  \        }\n        .flatMap(maxPublishers: .max(1)) { pair in\n            self.decode(pair.data)\n\
  \        }\n        .eraseToAnyPublisher()\n}\n\nprivate func decode<T: Decodable>(_\
  \ data: Data) -> AnyPublisher<T, Error> {\n    let decoder = JSONDecoder()\n   \
  \ decoder.dateDecodingStrategy = .secondsSince1970\n    return Just(data)\n    \
  \    .decode(type: T.self, decoder: decoder)\n        .mapError { error in\n   \
  \         IAPError.parsing(message: error.localizedDescription)\n        }\n   \
  \     .eraseToAnyPublisher()\n}\n```\n\n`fetch` 函数的返回值定义为 `AnyPublisher<T, Error>`。`AnyPublisher`\
  \ 是 `Publisher` 的一个具体实现，它本身没有重要的属性，仅充当传递对象。发布者将元素传递给一个或多个订阅者实例。订阅者的 `Input` 和 `Failure`\
  \ 关联类型必须与发布者声明的 `Output` 和 `Failure` 类型匹配。发布者实现 `receive(subscriber:)` 方法来接受订阅者。\n\
  \n`mapError` 会将上游发布者的任何失败转换为新的错误。\n\n`flatMap` 会将上游发布者的元素转换为一个新的发布者，最多转换您指定的最大发布者数量。在我们的示例中，`flatMap`\
  \ 使用指定的解码器解码上游发布者的输出，以生成 `IAP` 模型。\n\n`eraseToAnyPublisher` 将使用类型擦除器包装此发布者，向下游订阅者公开\
  \ `AnyPublisher` 的实例，而不是此发布者的实际类型。\n\n\n\n## 使用依赖注入设计 ViewModel\n\n创建存根远程服务后，需要一个\
  \ `ViewModel` 来获取已发布的录制元数据，并通知视图更新其用户界面处理方式。\n\n在 `IAP.swift` 中创建一个新协议 `RefreshableViewModel`。视图将依赖\
  \ ViewModel 实现该协议的方法，以满足其自身需求。\n\n```\nprotocol RefreshableViewModel {\n    func\
  \ getIAPs() -> [IAP]\n    func refresh()\n}\n```\n\n创建一个 `enum` 和 `struct` 以支持在视图中显示的应用内购买项目。`IAPType`\
  \ 枚举将为每种应用内购买类型包含一个 case。`IAP` 结构体将包含一个类别，以支持在视图中进行分组表格处理。`IAP` 结构体需要遵循获取协议中的 `Decodable`、SwiftUI\
  \ `List` 所需的 `Hashable`，以及满足 SwiftUI `ForEach` 签名的 `Identifiable`：\n\n```\nenum\
  \ IAPType: String, Decodable {\n    case publishRecordings = \"publishRecordings\"\
  \n    case twoTracks = \"twoTracks\"\n    case threeTracks = \"threeTracks\"\n \
  \   case fourTracks = \"fourTracks\"\n}\n\nstruct IAP: Hashable, Identifiable, Decodable\
  \ {\n    var id: String { name }\n    let category: String\n    let name: String\n\
  \    let price: Double\n    let type: IAPType\n\n    init(category: String, name:\
  \ String, price: Double, type: IAPType) {\n        self.category = category\n  \
  \      self.name = name\n        self.price = price\n        self.type = type\n\
  \    }\n}\n```\n\n需要执行以下步骤来定义 `IAPViewModel`。支持这些步骤的实际代码将在后续给出。\n\n创建一个名为 `IAPViewModel.swift`\
  \ 的新 ViewModel 类，并遵循 `RefreshableViewModel` 协议，以确保支持视图所需的必要行为。ViewModel 还将遵循 `ObservableObject`\
  \ 协议，以支持“预发布”更改。\n\n创建 `service` 和 `endpoint` 变量以支持依赖注入。由于这些是外部依赖项，它们将通过构造函数注入到\
  \ ViewModel 中，以保持 ViewModel 内部的解耦。\n\n使用 `@Published` 类型别名定义一个 `iaps` 变量。它将维护从服务返回的转换后数据，并在设置时向订阅者发布更改事件。\n\
  \n创建一个 `fetch()` 函数，用于使用注入的服务和端点泛型地获取样本元数据，将其存储在 `iaps` 变量中，并通知订阅者更改。\n\n将以下代码添加到\
  \ `IAPViewModel` 类中：\n\n```\nimport Foundation\nimport Combine\n\nclass IAPViewModel:\
  \ ObservableObject, RefreshableViewModel {\n    // 依赖注入...\n    private let service:\
  \ StubAPIService\n    private let endpoint: IAPEndpoint\n    private var disposables\
  \ = Set<AnyCancellable>()\n\n    @Published private(set) var iaps: [IAP] = []\n\n\
  \    init(service: StubAPIService, endpoint: IAPEndpoint) {\n        self.service\
  \ = service\n        self.endpoint = endpoint\n    }\n\n    func getIAPs() -> [IAP]\
  \ {\n        return iaps\n    }\n\n    func refresh() {\n        fetch()\n    }\n\
  \n    private func fetch() {\n        if let url = URL(string: endpoint.urlString)\
  \ {\n            service.fetch(_t: IAP.self, url: url)\n                .receive(on:\
  \ DispatchQueue.main)\n                .sink { [weak self] value in\n          \
  \          switch value {\n                    case .failure:\n                \
  \        self?.iaps = []\n                    case .finished:\n                \
  \        break\n                    }\n                } receiveValue: { [weak self]\
  \ response in\n                    self?.iaps = response\n                }\n  \
  \              .store(in: &disposables)\n        }\n    }\n}\n```\n\n## 将 ViewModel\
  \ 集成到视图中\n\n为了完成此示例的 MVVM 设计模式，需要将 ViewModel 集成到视图中。在此框架中，视图将使用 SwiftUI 创建。要将 SwiftUI\
  \ 视图集成到 UIKit 视图层次结构中，需要将视图嵌入 `UIHostingController` 中，并将 `UIHostingController` 指定为框架\
  \ Storyboard 的根视图控制器。\n\n在 **User Interface** 组下，使用 **SwiftUI** **View** 模板创建一个名为\
  \ `RecordingsStoreView` 的 SwiftUI 类。生成的代码将包含一个默认视图以及 `#Preview`，Xcode 使用它在 SwiftUI\
  \ 编辑器中设计视图时生成预览。\n\n在 **Source** 组下，使用 **Cocoa Touch** **Class** 模板创建一个名为 `RecordingsStoreVC`\
  \ 的 UIKit 类（“**Subclass of:**” 字段是任意的，在创建类后将更改为 `UIHostController`）。\n\n`RecordingsStoreVC`\
  \ 需要在类定义中为嵌入的类类型（例如 `RecordingsStoreView`）包含一个泛型。视图初始化将包含一个 ViewModel 输入参数：\n\n\
  ```\nimport Foundation\nimport SwiftUI\n\nclass RecordingsStoreVC: UIHostingController<RecordingsStoreView>\
  \ {\n    required init?(coder: NSCoder) {\n        super.init(coder: coder, rootView:\
  \ RecordingsStoreView(viewModel:\n            IAPViewModel(service: IAPService.shared,\
  \ endpoint: .fetchInAppPurchases)))\n    }\n}\n```\n\n> **注意**：在创建 `RecordingsStoreView`\
  \ 类之前，代码将无法编译。\n\n在 **User Interface** 组下，使用 **Storyboard** 模板创建一个名为 `RecordingsStoreUI.storyboard`\
  \ 的 Storyboard，并将其配置为托管 SwiftUI 视图：\n\n1. 在 **Project Navigator** 中选择 `RecordingsStoreUI.storyboard`\n\
  2. 在 **Interface Builder** 的 **Document Outline** 中选择根视图控制器并将其删除\n3. 选择 **Interface\
  \ Builder** 中的 **Library** 图标并添加一个 **Hosting View Controller**\n4. 将 **Identity\
  \ Inspector** 中 **Custom Class** 部分的 **Class** 设置为 `RecordingsStoreVC`\n5. 将 **Identity\
  \ Inspector** 中 **Identity** 部分的 **Storyboard ID** 设置为 `RecordingsStoreVC`\n6. 将\
  \ **Attributes Inspector** 中 **View Controller** 部分的 **Is Initial View Controller**\
  \ 设置为选中状态\n\n\n\n## 设计 SwiftUI 视图\n\n以下代码需要添加到 `RecordingsStoreView` 类中。由于实现较为复杂，将围绕特定代码片段进行说明。完整类代码可复制本章节末尾的代码。\n\
  \n变量将被定义为 `@State` 属性包装器。State 属性包装器可以读写由 SwiftUI 管理的值。State 用作存储在视图层次结构中给定值类型的“单一数据源”。^(²⁴)\n\
  \nViewModel 将被定义为 `StateObject` 属性包装器。StateObject 属性包装器可以实例化一个可观察对象。StateObject\
  \ 用作存储在视图层次结构中引用类型的“单一数据源”。^(²⁵)\n\n```\n@State private var selectedIAP: IAP?\n\
  @State private var showAlert = false\n@State private var loaded = false\n@StateObject\
  \ private var viewModel: IAPViewModel\ninit(viewModel: IAPViewModel) {\n_viewModel\
  \ = StateObject(wrappedValue: viewModel)\n}\n```\n\n`groupByCategory()` 是一种排序算法，它按类别对应用内购买项目进行字母顺序排序。\n\
  \n```\nfunc groupByCategory(_ iaps: [IAP]) -> [(String, [IAP])] {\nlet grouped =\
  \ Dictionary(grouping: iaps, by: { $0.category })\nreturn grouped.sorted(by: { $0.key\
  \ < $1.key })\n}\n```\n\n视图主体将被定义为 SwiftUI 的 `List`，类似于 UIKit 的表格视图。每一行对应一个应用内购买项目。如果某个应用内购买项目已被购买，则该行将被禁用。选择某行会向用户显示提示，询问是否继续执行（模拟）购买。如果用户选择继续，交易将通过\
  \ SwiftData 持久化，并通过 UserDefaults 传播。\n\n> **注意：** 在实际支持应用内购买的 iOS 应用中，将使用 StoreKit\
  \ 框架来执行交易、接收交易状态变化以及验证交易收据。\n\n```\nvar body: some View {\nNavigationView {\nList(selection:\
  \ $selectedIAP) {\nForEach(groupByCategory(viewModel.getIAPs()), id:\\.0) { iap\
  \ in\nSection(header: Text(\"\\(iap.0)\")\n.foregroundColor(.black)\n.font(.custom(\"\
  HelveticaNeue-Bold\", fixedSize: 20.0))\n){\nForEach(iap.1) { iap in\nHStack {\n\
  Button(\"\\(Image(systemName: \"music.note\")) \\(iap.name)\") {\nshowAlert = true\n\
  selectedIAP = iap\n}\n.font(.custom(\"HelveticaNeue\", fixedSize: 16.0))\nSpacer()\n\
  Text(\"\\(NumberFormatter.localizedString(from: NSNumber(value: iap.price), number:\
  \ .currency))\")\n.font(.custom(\"HelveticaNeue-Bold\", fixedSize: 16.0))\n}\n.listRowSeparator(.hidden)\n\
  .disabled(isPurchased(iap: iap))\n}\n}\n}\n}\n.listStyle(.plain)\n.navigationBarTitle(\"\
  专业功能\", displayMode: .large)\n.alert(isPresented: self.$showAlert) {\nAlert(\ntitle:\
  \ Text(\"专业功能\"),\nmessage: Text(\"是否要购买 '\\(selectedIAP?.name ?? \"?\")'\"),\n\
  primaryButton: .default(Text(\"确定\")) {\nif let iap = selectedIAP {\nupdateFeatures(type:\
  \ iap.type)\n}\n},\nsecondaryButton: .default(Text(\"取消\"))\n)\n}\n}\n}\n```\n\n\
  `onAppear()` 将在视图首次出现时用于获取应用内购买项目，通过调用 `viewModel.refresh()` 来触发底层服务请求：\n\n```\n\
  .onAppear {\nif !loaded {\nloaded = true\nviewModel.refresh()\n}\n}\n```\n\n`isPurchased()`\
  \ 将利用 UserDefaults 来反映通过 SwiftData 持久化的应用内购买交易的状态。\n\n```\nfunc isPurchased(iap:\
  \ IAP) -> Bool {\nif let features = UserDefaults.standard.object(forKey: \"iaps\"\
  ) as? [String: Any] {\nswitch iap.type {\ncase .publishRecordings:\nreturn features[\"\
  publishRecordings\"] as? Bool ?? false\ncase .twoTracks:\nif let trackCount = features[\"\
  trackCount\"] as? Int16 { return trackCount > 1 }\nreturn false\ncase .threeTracks:\n\
  if let trackCount = features[\"trackCount\"] as? Int16 { return trackCount > 2 }\n\
  return false\ncase .fourTracks:\nif let trackCount = features[\"trackCount\"] as?\
  \ Int16 { return trackCount > 3 }\nreturn false\n}\n}\nreturn false\n}\n```\n\n\
  `updateFeatures()` 将通过 SwiftData 持久化一个新的应用内购买交易。\n\n```\nfunc updateFeatures(type:\
  \ IAPType) {\nguard let config = dataManager.configuration else {\nsaveConfiguration(existing:\
