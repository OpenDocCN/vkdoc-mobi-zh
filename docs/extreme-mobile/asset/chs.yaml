  \        applyBrandedFont()\n    }\n    override func didMoveToSuperview() {\n \
  \       super.didMoveToSuperview()\n        applyBrandedFont()\n    }\n    private\
  \ func applyBrandedFont() {\n        guard let theme = UserDefaults.standard.dictionary(forKey:\
  \ \"Theme\"),\n              let name = theme[\"bodyFontName\"] as? String,\n  \
  \            let size = theme[\"bodyFontSize\"] as? CGFloat else { return }\n  \
  \      self.font = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize: size)\n\
  \        if let colorName = theme[\"bodyFontColor\"] as? String {\n            self.textColor\
  \ = UIColor(namedSystemOrHex: colorName) ?? .darkGray\n        }\n    }\n}\nextension\
  \ UIColor {\n    convenience init?(namedSystemOrHex name: String?) {\n        guard\
  \ let name = name else { return nil }\n        let systemColors: [String: UIColor]\
  \ = [\n            \"systemRed\": .systemRed,\n            \"systemBlue\": .systemBlue,\n\
  \            \"systemTeal\": .systemTeal,\n            \"systemGray\": .systemGray,\n\
  \            \"white\": .white,\n            \"black\": .black,\n            \"\
  darkGray\": .darkGray,\n            \"lightGray\": .lightGray\n        ]\n     \
  \   if let color = systemColors[name.lowercased()] {\n            self.init(cgColor:\
  \ color.cgColor)\n            return\n        }\n        // 十六进制格式: #RRGGBB\n  \
  \      if name.hasPrefix(\"#\"), name.count == 7 {\n            let r = CGFloat(Int(name.dropFirst().prefix(2),\
