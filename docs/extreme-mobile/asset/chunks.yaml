    # 3. Designing Generic, Decoupled Architectures for Reusable Frameworks


    Extending the RecordingsFW Framework


    The framework designed in the previous chapter supports the management of **local**
    audio recordings. As the book progresses, it will be combined with other frameworks
    to produce a “recording studio” style application. This chapter will enhance the
    framework to support the display of **remote** audio recordings, or “published
    recordings,” within a separate mobile app. The mode of operation will be controlled
    using a Property List. A network API will be integrated into a remote service
    and used within a Model-View-ViewModel (MVVM) design pattern.


    This chapter will also utilize a software design pattern called Dependency Injection.
    Dependency Injection is a programming technique that makes implicit dependencies
    of an object explicit, allowing an object to receive those dependencies from another
    object, either at construction or through function calls.^([⁷](#fn7)) In this
    example, Dependency Injection will be used in the frameworks’ ViewModel by injecting
    an API service and endpoint via constructor. Since the ViewModel will not be concerned
    with the implementation of the service, it won’t require changes if the service
    is replaced.


    Along with Dependency Injection, this chapter will incorporate Combine to process
    and publish the results of network API requests. The Combine framework provides
    a declarative Swift API for processing values over time. These values can represent
    many kinds of asynchronous events. Combine declares publishers to expose values
    and subscribers to receive those values from the publishers. Documentation on
    the Combine framework is available on the Apple Developer website.^([⁸](#fn8))


    In a nutshell, this chapter will extend the RecordingsFW Framework to support
    remote audio recordings while maintaining scalability and reusability. A Property
    List will be used to control the framework’s mode of operation. A network API
    will be integrated within the MVVM pattern using Dependency Injection to decouple
    the ViewModel from service implementations. And we’ll leverage Combine to process
    and publish asynchronous network results, ensuring that the framework can produce
    multiple mobile apps without the need for code changes.


    ## Creating a Property List


    A Property List, or “p-list,” will need to be added to the RecordingsFW project
    to control the framework’s mode of operation. A Property List is simply a representation
    of a hierarchy of objects persisted/loaded via a file system. Property Lists are
    useful for storing small amounts of data.^([⁹](#fn9)) Perform the following steps
    to create the property list:


    ![Screenshot of a software interface for selecting a new file template. Options
