    Int) -> Int {

    switch section {

    case 0:

    return 3

    case 1:

    return 1

    case 2:

    return 2

    default:

    return 0

    }

    }

    override func tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)
    -> CGFloat {

    return 44.0

    }

