    \ = \\(error.localizedDescription)\")\n        }\n    }\n}\n```\n\n定义一个 `fetch()`\
    \ 函数，供 ViewModel 调用以获取数据，随后视图将在其用户界面处理中显示这些数据。\n\n```swift\nfunc fetch(completion:\
    \ @escaping RecordingCompletionHandler) {\n    var recordingModels: [Recording]\
    \ = []\n    let fileManager = FileManager.default\n    let documentsURL = fileManager.urls(for:\
    \ .documentDirectory, in: .userDomainMask)[0]\n    do {\n        let fileURLs\
    \ = try fileManager.contentsOfDirectory(at: documentsURL, includingPropertiesForKeys:\
    \ nil)\n        for fileURL in fileURLs {\n            if let recording = read(type:\
    \ Recording.self, file: fileURL) {\n                recordingModels.append(recording)\n\
    \            }\n        }\n    } catch {\n        print(\"RecordingsService.fetch():\
    \ Error = \\(error.localizedDescription)\")\n    }\n    completion(recordingModels,\
    \ nil)\n}\n\nprivate func read<T: Decodable>(type: T.Type, file: URL) -> T? {\n\
    \    var data: Data?\n    do {\n        data = try Data(contentsOf: file)\n  \
    \  } catch {\n        print(\"RecordingsService.read(): Error = \\(error.localizedDescription)\"\
    )\n    }\n    guard let recordingData = data else { return nil }\n    do {\n \
    \       let decoder = JSONDecoder()\n        return try decoder.decode(T.self,\
    \ from: recordingData)\n    } catch {\n        print(\"RecordingsService.read():\
    \ Error = \\(error.localizedDescription)\")\n    }\n    return nil\n}\n```\n\n\
    **注意**\n\n既然 `RecordingsService` 已经定义完毕，请取消 `RecordingsViewModel` 的 `fetch()`\
    \ 函数中先前注释掉的代码，以便项目能够正确编译。\n\n# 将 ViewModel 集成到视图中\n\n选择 `RecordingsTVC.swift`，定义一个名为\
    \ `viewModel` 的变量，以及一个名为 `initLocalServiceVM()` 的函数，用于实例化 ViewModel、将 ViewModel\
    \ 绑定到视图、从本地文件服务获取数据，并在数据发生变化时更新用户界面：\n\n```swift\nclass RecordingsTVC: UITableViewController\
    \ {\n    var viewModel: RefreshableViewModel?\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // ...\n        initLocalServiceVM()\n\
    \    }\n\n    func initLocalServiceVM() {\n        self.viewModel = RecordingsViewModel()\n\
    \        (self.viewModel as! RecordingsViewModel).bindRecordingsViewModelToController\
    \ = { [weak self] in\n            guard let strongSelf = self else { return }\n\
    \            if let recordings = strongSelf.viewModel?.getRecordings() {\n   \
    \             print(\"RecordingsTVC.initLocalServiceVM().bindRecordingsViewModelToController():\
    \ recordings.count= \\(recordings.count)\")\n            }\n            DispatchQueue.main.async\
    \ {\n                strongSelf.refreshControl?.endRefreshing()\n            \
    \    strongSelf.tableView.reloadData()\n            }\n        }\n        self.viewModel?.refresh()\n\
    \    }\n}\n```\n\n将 ViewModel 集成到用户界面实现中每个使用数据的函数中：\n\n```swift\n@objc func refresh(_\
    \ sender: AnyObject) {\n    viewModel?.refresh()\n}\n\noverride func tableView(_\
    \ tableView: UITableView, numberOfRowsInSection section: Int) -> Int {\n    return\
    \ self.viewModel?.getRecordings().count ?? 0\n}\n\noverride func tableView(_ tableView:\
    \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n    let\
    \ cell = tableView.dequeueReusableCell(withIdentifier: \"RecordingsCell\", for:\
    \ indexPath)\n    if let recordingCell = cell as? RecordingsCell, let recording\
    \ = self.viewModel?.getRecordings()[indexPath.row] {\n        recordingCell.titleLabel.text\
    \ = recording.title\n        recordingCell.copyrightLabel.text = recording.copyright\n\
    \        return recordingCell\n    }\n    return cell\n}\n```\n"
- fmt: '# Integrating the Details View into the Table


    As previously discussed, the User Interface in this framework utilizes a Master-Detail
    design pattern. To complete the Details View, create a class to display details
    of an audio file when the corresponding row is tapped in the table view:


    1. Right-click the folder within the Project Navigator and select **New File from
    Template…**

    2. Choose the **Cocoa Touch Class** template under the **Source** section and
    **Next**

    3. Input a class name, e.g., `RecordingTVC`, and set `UITableViewController` as
    the subclass

    4. Ensure **Also create XIB file** is unchecked and **Language** is Swift


    > Note: This class is insignificant to this framework other than to allow it to
    operate correctly. Replace the default code that was generated with the following
    code, which supports the corresponding Storyboard previously created.


    ```

    import UIKit

    class RecordingTVC: UITableViewController {

    @IBOutlet weak var copyrightNameLabel: UILabel!

    @IBOutlet weak var copyrightLabel: UILabel!

    @IBOutlet weak var dateNameLabel: UILabel!

    @IBOutlet weak var dateLabel: UILabel!

    @IBOutlet weak var lengthNameLabel: UILabel!

    @IBOutlet weak var lengthLabel: UILabel!

    @IBOutlet weak var typeNameLabel: UILabel!

    @IBOutlet weak var typeLabel: UILabel!

    @IBOutlet weak var bitrateNameLabel: UILabel!

    @IBOutlet weak var bitrateLabel: UILabel!

    @IBOutlet weak var sizeNameLabel: UILabel!

    @IBOutlet weak var sizeLabel: UILabel!

    let detailsTitle = "Details"

    let previewTitle = "Preview"

    var recording: Recording?

    let kbps = "kbps"

    let mb = "MB"

    override func viewDidLoad() {

    super.viewDidLoad()

    self.clearsSelectionOnViewWillAppear = true

    self.navigationItem.title = recording?.title ?? detailsTitle

    self.tableView.separatorInset = UIEdgeInsets.init(top: 0.0, left: 20.0, bottom:
    0.0, right: 0.0)

    copyrightLabel.text = recording?.copyright ?? ""

    dateLabel.text = recording?.date ?? ""

    if let length = recording?.length {

    let quotient = length / 60

    let remainder = length % 60

    lengthLabel.text = String(describing: quotient) + ":" + String(describing: remainder)

    }

    typeLabel.text = recording?.type ?? ""

    if let bitrate = recording?.bitrate {

    bitrateLabel.text = String(describing: bitrate / 1024) + " kbps"

    }

    if let size = recording?.size {

    let quotientMB = size / (1024 * 1024)

    let remainder = size % (1024 * 1024)

    let value = remainder > 0 ? String(describing: remainder) + "." : ""

    sizeLabel.text = String(describing: quotientMB) + value + " MB"

    }

    }

    override func numberOfSections(in tableView: UITableView) -> Int {

    return 2

    }

    override func tableView(_ tableView: UITableView, numberOfRowsInSection section:
    Int) -> Int {

    switch section {

    case 0:

    return 6

    case 1:

    return 1

    default:

    return 0

    }

    }

    override func tableView(_ tableView: UITableView, canEditRowAt indexPath: IndexPath)
    -> Bool {

    return false

    }

    override func tableView(_ tableView: UITableView, viewForFooterInSection section:
    Int) -> UIView? {

    if section  CGFloat {

    return 21.0

    }

    override func tableView(_ tableView: UITableView, heightForRowAt indexPath: IndexPath)
    -> CGFloat {

    return indexPath.section == 0 ? 58.0 : 44.0

    }

    override func tableView(_ tableView: UITableView, willDisplayHeaderView view:
    UIView, forSection section: Int) {

    var title = ""

    switch section {

    case 0:

    title = detailsTitle

    case 1:

    title = previewTitle

    default:

    break

    }

    let titleView = view as! UITableViewHeaderFooterView

    titleView.textLabel?.text = title // Remove all capitalized letters

    }

    }

    ```


    Select the `RecordingsTVC` (Master View), and create a function called `prepare()`
    to pass the `Recording` model corresponding to the selected table row to this
    Details View:


    ```

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    if segue.identifier == "RecordingDetailsSegue" {

    if let recordingTVC = segue.destination as? RecordingTVC {

    if let indexPath = self.tableView.indexPathForSelectedRow, let recording = self.viewModel?.getRecordings()[indexPath.row]  {

    recordingTVC.recording = recording

    }

    }

    }

    }

    ```


    ## Implementing a Swift Protocol


    Since protocols are still being used to integrate this framework into a corresponding
    app, the protocol created in `RecordingsProtocol.swift` will also need to be adopted
    by this framework (also in `RecordingsProtocol`):


    ```

    public class RecordingsProtocol: DisplayableViewController {

    public init() {}

    public func instantiateRootViewController() -> UIViewController {

    let storyboard = UIStoryboard(name: "RecordingsUI", bundle: Bundle(for: RecordingsTVC.self))

    let vc = storyboard.instantiateViewController(withIdentifier: "RecordingsNC")

    return vc

    }

    }

    ```


    ## Creating an App Target


    As was done in the previous chapter, an App Target within the iOS Framework project
    will need to be created and configured:


    1. Perform the steps listed under the section “**Creating an App Target**” in
    Chapter 1

    2. Perform the steps listed under the section “**Creating an App Target User Interface**”
    in Chapter 1

    3. Perform the steps listed under the section “**Designing an App Target User
    Interface**” in Chapter 1

    4. Perform the steps listed under the section “**Adding an iOS Framework**” in
    Chapter 1, and then select `RecordingsFW.framework`


    ## Integrating an iOS Framework


    The iOS Framework will need to be integrated into the app from within the app’s
    `SceneDelegate.willConnectTo()`:


    ```

    import RecordingsFW

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    guard let winScene = (scene as? UIWindowScene) else { return }

    if let storyboard = session.configuration.storyboard {

    if let tabBarController = storyboard.instantiateInitialViewController() as? UITabBarController
    {

    window = UIWindow(windowScene: winScene)

    window?.rootViewController = tabBarController

    window?.makeKeyAndVisible()

    // Add framework User Interfaces via protocol...

    var tbcViewControllers = tabBarController.viewControllers ?? []

    tbcViewControllers.append(RecordingsProtocol().instantiateRootViewController())

    tabBarController.setViewControllers(tbcViewControllers, animated: false)

    tabBarController.tabBar.isHidden = (tbcViewControllers.count <= 1)

    }

    }

    }

    ```'
