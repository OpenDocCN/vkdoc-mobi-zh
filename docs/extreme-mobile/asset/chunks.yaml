    模拟器，显示标题为“添加功能”的应用屏幕，列出如“发布录音”（售价 3.99 美元）和“录音轨道”（不同数量和价格）等选项。应用屏幕底部有一个导航栏，图标分别标注为“专业功能”、“录音工作室”、“录音”和“设置”。右侧显示应用的构建设置。](img/678928_1_En_10_Fig2_HTML.jpg)


