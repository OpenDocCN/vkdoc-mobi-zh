    \ File from Template…**\n2.  Select the **Swift File** template under the **Source**\
    \ group and save the file as **SwiftDataManager.swift**\n\n**Import the required\
    \ frameworks:**\n\n```swift\nimport Foundation\nimport SwiftData\nimport Combine\n\
    ```\n\n**Define the SwiftData models:**\n\nIn SwiftData, models are defined as\
