    \n图 1-11 Xcode 模拟器\n\n在本章中，你学习了如何设计并实现一个使用 Swift 协议的 iOS 框架。你从零开始构建了一个框架，探索了如何为模块化和可重用性构建其结构，并将其集成到了一款移动应用中。完成这些步骤后，你获得了创建框架的实践经验，这些框架可以简化应用架构并促进跨项目的代码共享。\n\
    \n随着第一个 iOS 框架的构建完成并集成到应用中，你已经准备好探索更高级的设计技巧。在下一章中，我们将应用现代架构模式来创建可扩展、可维护的框架，这些框架能够适应多个应用和用例。\n\
    \n脚注 1 2\n\n# 2. 应用现代设计模式打造可扩展、可维护的框架\n\n## 设计 RecordingsFW 框架\n\n本章将深入探讨设计一个能够跨不同应用、服务于多种用途的\
    \ iOS 框架的复杂性。它将通过演示如何使用模型-视图-视图模型（MVVM）设计模式将本地文件服务集成到用户界面中，来展示软件可重用性的有效性。本章将继续强化软件解耦的重要性，在前一章引入的概念基础上进一步深化。随着阅读的深入，该框架的协议将替换为一个更通用、更灵活的解决方案，进一步增强软件解耦。\n\
    \n对于不熟悉 MVVM 设计模式的人来说，它是计算机软件中的一种架构模式，有助于将图形用户界面（视图）与业务逻辑（模型）分离，使视图不依赖于任何特定的模型平台。^(³)\
    \ 互联网上关于此主题有大量专门针对 iOS 移动应用的文章。\n\n在本章中，我们将重点设计 `RecordingsFW` 框架，强调其可扩展性、可维护性和可重用性。你将看到如何使用模型-视图-视图模型（MVVM）设计模式将本地文件服务集成到用户界面中，从而强化之前介绍的软件解耦原则。随着学习的深入，该框架的协议最终将演变成一个更通用、更灵活的解决方案，进一步提升跨应用的模块化和灵活性。\n"
- fmt: '## Setting Up the iOS Framework and Project


    A new iOS Framework and Project will need to be created and configured, similar
    to Chapter [1](#678928_1_En_1_Chapter.xhtml). Name the project and corresponding
    files using the `Recordings` prefix, e.g., `RecordingsFW`:


    1. Perform the steps listed under the section “Creating an iOS Framework” in Chapter
    [1](#678928_1_En_1_Chapter.xhtml)

    2. Perform the steps listed under the section “Configuring an iOS Framework” in
    Chapter [1](#678928_1_En_1_Chapter.xhtml)

    3. Perform the steps listed under the section “Creating a Storyboard” in Chapter
    [1](#678928_1_En_1_Chapter.xhtml)


    ## Creating a User Interface


    The framework in this chapter will display a list of local files that will represent
    audio recordings. You can practice developing this UI using Interface Builder,
    or you can download the code from GitHub and replace the Storyboard file contents
    as follows:


    ![Screenshot of a development environment showing a storyboard for a mobile app.
    The interface includes three main panels representing different app screens. The
    first panel is a navigation controller with a “Title” label. The second panel
    displays a list view titled “Recordings” with a prototype cell labeled “My Acoustic
    Recording.” The third panel shows details for “My Acoustic Recording,” including
    copyright information, release date, length, type, bit rate, and size. Navigation
    and control buttons are visible at the bottom of each panel. The left sidebar
    lists project files and components.](images/678928_1_En_2_Chapter/678928_1_En_2_Fig1_HTML.jpg)


    Figure 2-1 Storyboard Editor


    1. Right-click `RecordingsUI.storyboard` in the `Project Navigator` and select
    **Open As/Source Code**

    2. Select the file contents and delete it

    3. Copy the storyboard file contents from the downloaded `RecordingsUI.storyboard`
    file and paste it into the framework’s `.storyboard` file

    4. Right-click `RecordingsUI.storyboard` in the `Project Navigator` and select
    **Open As/Interface Builder - Storyboard** (**Figure** [**2-1**](#678928_1_En_2_Chapter.xhtml#Fig1))


    ## Creating a Cocoa Touch Class


    Perform the following steps to create a Cocoa Touch class to support the User
    Interface defined in the last step:


    1. Right-click the folder within the Project Navigator and select **New File from
    Template…**

    2. Choose the `Cocoa Touch Class` template under the `Source` section and **Next**

    3. Input `RecordingsTVC` as the class name, and set `UITableViewController` as
    the subclass

    4. Ensure **Also create XIB file** is unchecked and `Language` is Swift


    Again, the Cocoa Touch class will need to be modified to correspond to the downloaded
    storyboard configuration:


    ```

    import UIKit

    class RecordingsTVC: UITableViewController {

    @IBOutlet weak var publishBarButtonItem: UIBarButtonItem! // Note: To be used
    in a future chapter

    override func viewDidLoad() {

    super.viewDidLoad()

    self.publishBarButtonItem.isHidden = true // Note: To be used in a future chapter

    self.clearsSelectionOnViewWillAppear = true

    self.navigationController?.navigationBar.prefersLargeTitles = true

    self.navigationItem.largeTitleDisplayMode = .always

    self.extendedLayoutIncludesOpaqueBars = true

    self.tableView.refreshControl?.addTarget(self, action: #selector(self.refresh(_:)),
    for: .valueChanged)

    self.tableView.refreshControl?.beginRefreshing()

    }

    @objc func refresh(_ sender: AnyObject) {

    }

    override func tableView(_ tableView: UITableView, numberOfRowsInSection section:
    Int) -> Int {

    return 0

    }

    override func numberOfSections(in tableView: UITableView) -> Int {

    return 1

    }

    override func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)
    -> UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "RecordingsCell", for:
    indexPath)

    return cell

    }

    override func tableView(_ tableView: UITableView, canEditRowAt indexPath: IndexPath)
    -> Bool {

    return false

    }

    }

    class RecordingsCell: UITableViewCell {

    @IBOutlet weak var titleLabel: UILabel!

    @IBOutlet weak var copyrightLabel: UILabel!

    }

    ```


    In this code sample, `cellForRowAt()` dequeues a reusable `UITableViewCell` via
    identifier to render each row of the table. The class to support this, `RecordingsCell`,
    is also defined in this class.


    ## Creating a Protocol and Model


    In order to implement the MVVM design pattern for this framework, a protocol will
    need to be created for the ViewModel. The ViewModel implementation of the protocol
    will fetch a list of local files representing audio recordings. Once the protocol
    has been implemented in the ViewModel, the ViewModel will need to be integrated
    into the table view. Perform the following steps to create the protocol:


    1. Right-click the folder in `Project Navigator` and select **New File from Template…**

    2. Choose the `Swift File` template under the `Source` section

    3. Create a class called `RecordingsProtocol.swift`


    Define the protocol to return an array of `Recording` models, which will be generated
    from local files on the device:


    ```

    protocol RefreshableViewModel {

    func getRecordings() -> [Recording]

    func refresh()

    }

    ```


    Define a `Recording` model to represent (arbitrary) metadata for an audio recording.
    The model will need to be `Codable`^([⁴](#fn4)) so that these data types can be
    read from, and written to, an external representation:


    ```

    struct Recording: Codable {

    let bitrate: Int64

    let copyright: String

    let date: String

    let length: Int64

    let size: Int64

    var title: String

    let type: String

    let url: String

    }

    ```


    ## Creating a ViewModel


    A ViewModel class will need to be created to implement the protocol defined in
    the previous section:


    1. Right-click the folder within the `Project Navigator` and select **New File
    from Template…**

    2. Choose the `Swift File` template under the `Source` section

    3. Create a class called `RecordingsViewModel.swift`


    Adopt `RefreshableViewModel`, implement the required protocol functions, and define
    a variable named `recordings` to hold the models returned by the underlying service
    (to be defined next):


    ```

    import Foundation

    class RecordingsViewModel: RefreshableViewModel {

    private(set) var recordings: [Recording]!

    init() {

    }

    func getRecordings() -> [Recording] {

    return recordings

    }

    func refresh() {

    fetch()

    }

    private func fetch() {

    }

    }

    ```


    The `recordings` variable `didSet` will need to be overridden to provide a way
    to notify the view when recordings have changed. A compound (function) type^([⁵](#fn5))
    variable will also need to be defined to perform the notification. This will be
    set in the View and will bind the View to the ViewModel:


    ```

    private(set) var recordings: [Recording]! {

    didSet {

    self.bindRecordingsViewModelToController()

    }

    }

    var bindRecordingsViewModelToController : (() -> ()) = {}

    ```


    The following code should be implemented in the `fetch()` function to call the
    local service to read files from the device, create corresponding models, and
    set the `recordings` variable to trigger a notification to the View to update
    itself.


    Note: The `fetch` function won’t compile until the `RecordingsService` class has
    been created, so it can be commented out until it has been created.


    ```

    private func fetch() {

    RecordingsService.shared.fetch() { [weak self] recordings, error in

    guard let strongSelf = self else { return }

    if let err = error {

    print("RecordingsViewModel.fetch(): error = \(err.localizedDescription)")

    } else {

    strongSelf.recordings = recordings

    }

    }

    }

    ```'
