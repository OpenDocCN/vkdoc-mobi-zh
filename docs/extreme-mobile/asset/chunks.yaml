    # 将详情视图集成到表格中


    如前所述，该框架中的用户界面采用了主从设计模式。要完成详情视图，需要创建一个类，在表格视图中点击对应行时显示音频文件的详细信息：


    1.  在项目导航器中右键点击文件夹，选择**从模板新建文件…**

    2.  在**来源**部分选择**Cocoa Touch Class**模板，然后点击**下一步**

    3.  输入类名，例如 `RecordingTVC`，并将子类设置为 `UITableViewController`

