  raw: '## Creating a Swift Protocol


    Since protocols will still be used to integrate the framework into an app target,
    create a new class named **RecordingsStoreProtocol.swift** and define the protocol:


    ```

    import Foundation

    import UIKit

    protocol DisplayableViewController {

    func instantiateRootViewController() -> UIViewController

    }

    ```


    Adopt the protocol:


    ```

    public class RecordingsStoreProtocol: DisplayableViewController {

    public init() {}

    public func instantiateRootViewController() -> UIViewController {

    let storyboard = UIStoryboard(name: "RecordingsStoreUI", bundle: Bundle(for: RecordingsStoreVC.self))

    let vc = storyboard.instantiateViewController(withIdentifier: "RecordingsStoreVC")

    return vc

    }

    }

    ```


    ## Creating an App Target


    As was done in previous chapters, create and configure an App Target to integrate
    the framework.


    1.  Perform the steps listed under the section “**Creating an App Target**” in
    Chapter [1](#678928_1_En_1_Chapter.xhtml)


    2.  Perform the steps listed under the section “**Creating an** **App Target**
    **User Interface**” in Chapter [1](#678928_1_En_1_Chapter.xhtml)


    3.  Perform the steps listed under the section “**Designing an** **App Target**
    **User Interface**” in Chapter [1](#678928_1_En_1_Chapter.xhtml)


    4.  Perform the steps listed under the section “**Adding an iOS Framework**” in
    Chapter [1](#678928_1_En_1_Chapter.xhtml), and then select **RecordingsStoreFW.framework**


    ## Integrating the iOS Framework


    The framework user interface will be integrated into the app from within **SceneDelegate.willConnectTo**,
    as follows:


    ```

    import RecordingsStoreFW

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    guard let winScene = (scene as? UIWindowScene) else { return }

    if let storyboard = session.configuration.storyboard {

    if let tabBarController = storyboard.instantiateInitialViewController() as? UITabBarController
    {

    window = UIWindow(windowScene: winScene)

    window?.rootViewController = tabBarController

    window?.makeKeyAndVisible()

    // Add framework User Interfaces via protocol...

    var tbcViewControllers = tabBarController.viewControllers ?? []

    tbcViewControllers.append(RecordingsStoreProtocol().instantiateRootViewController())

    tabBarController.setViewControllers(tbcViewControllers, animated: false)

    tabBarController.tabBar.isHidden = (tbcViewControllers.count <= 1)

    }

    }

    }

    ```


    ## Running the App Target


    Set the app as the active scheme in the scheme drop-down, build the app, and run
    it using one of the Xcode simulators or an actual device. The app should compile
    and run properly, exposing the corresponding framework features (**Figure** [**4-2**](#678928_1_En_4_Chapter.xhtml#Fig2)).


    ![A screenshot of a mobile app interface displayed on an iPhone 17 Pro Max simulator
    within a development environment. The app screen shows “Pro Features” with options
    for “Publishing” and “Recording.” Under “Publishing,” “Publish Recordings” is
    listed for $3.99\. Under “Recording,” options include “2 Recording Tracks” for
    $0.99, “3 Recording Tracks” for $1.99, and “4 Recording Tracks” for $2.99\. The
    development environment in the background shows project details and resource usage.](images/678928_1_En_4_Chapter/678928_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Xcode Simulator


    ## Managing In-App Purchases


    Simulated In-App Purchases can be made by selecting a row in the table and agreeing
    to make the purchase. Once a purchase has been made, it will be persisted via
    SwiftData, and a UserDefault corresponding to that purchase will be created. All
    code running within the containing app, including other frameworks, will have
    access to that UserDefault and can enable or disable features accordingly. Shutting
    down and running the app again will reflect the persisted state of these In-App
    Purchases (**Figure** [**4-3**](#678928_1_En_4_Chapter.xhtml#Fig3)).


    ![A screenshot of an Xcode development environment displaying a mobile app interface
    on an iPhone simulator. The app screen titled “Add Features” lists options for
    purchasing features: “Publish Recordings” for $3.99, “2 Recording Tracks” for
    $0.99, “3 Recording Tracks” for $1.99, and “4 Recording Tracks” for $2.99\. The
    Xcode interface shows project files and settings on the left and right panels.](images/678928_1_En_4_Chapter/678928_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Xcode Simulator


    In this chapter, you developed the RecordingsStoreFW framework to enable dynamic
    feature activation via simulated In-App Purchases. By leveraging MVVM, SwiftData,
    SwiftUI, Combine, and Dependency Injection, you built a decoupled, modular framework
    capable of driving revenue and managing runtime features. This foundation positions
    you to implement flexible, monetizable functionality in multiple apps without
    modifying the core framework.


    After creating a framework that enables dynamic features with In-App Purchases,
    you’re ready to see how this approach scales across multiple frameworks. In the
    next chapter, we’ll build a framework that demonstrates unlockable functionality
    in different contexts while maintaining decoupling between frameworks.


