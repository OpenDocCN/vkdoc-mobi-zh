    # 前言


    撰写本书的动机源于一个信念：软件开发应以最大化效用、最小化冗余并促进创新为目标。


    本书特意避免对一些技术与主题提供过多细节，并集中专注于与 iOS 框架直接相关的技术和技巧。读者应认识到，诸如测试、品牌设计及国际化等主题内容庞大，足以单独成书。


    强烈建议读者完成本书的每一个章节，尤其要积极参与各章节中所述代码的编写过程。


    # 引言


    本书旨在演示设计并开发可复用、可配置、可品牌化且可本地化的 iOS 移动软件的实际技术。这将通过利用 iOS 框架高效、系统地构建商业级移动应用来实现。


    设计和开发此类可复用、模块化的解决方案具有诸多优势。整个工程组织使用的通用功能可在多个应用中复用，并按需扩展，从而减少开发时间并提高一致性。通过定价层级和应用内购买提供功能集，可增强营收机会。以最小的投入即可动态添加新功能。集中化的资源与样式让品牌重塑变得简单直接。此外，无需进行大量的重新工程即可集成国际化与本地化，使应用能够快速覆盖全球用户。


    本书面向具备 `Xcode`、`iOS SDK`、`Swift`、`Storyboards` 及 `SwiftUI` 基础知识的**中级软件开发者**。


    本书首先介绍使用 iOS 框架开发可复用软件的核心概念，然后以清晰、循序渐进的方式逐步构建复杂性。读者将探索 `Swift 协议`、`模型-视图-视图模型
    (MVVM)` 设计模式、本地与远程服务请求、`依赖注入`、`Combine`、`SwiftData`、`Swift 测试`、`Storyboards` 及
    `SwiftUI`。书中还涵盖了将 iOS 框架动态集成到应用中的技术。阅读本书后，读者将使用相同的框架开发出两个不同的应用程序，从而展示无需修改底层代码即可实现的强大且灵活的可复用、模块化
    iOS 软件。


    作者在本书中引用的任何源代码或其他补充材料，均可从 GitHub ([`github.com/Apress/Extreme-Mobile`](https://github.com/Apress/Extreme-Mobile))
    获取。更多详细信息，请访问 [`www.apress.com/gp/services/source-code`](https://www.apress.com/gp/services/source-code)。


    # 关于作者


    # 关于技术审校者


    # 1. 构建模块化框架设计的基础


    设计 `SettingsFW` 框架


    `Swift` 协议将被引入作为支持移动应用中软件模块化的首要手段。`Swift` 协议是一种蓝图或接口，它定义了一组方法、属性和要求，供类、结构体或枚举采用。它提供了一种在不同类型之间建立契约的方式，使它们能够以一致的方式进行通信和交互。`Swift`
    中的协议用于定义可在多个类型之间共享的公共行为或功能，从而实现代码复用并促进模块化。通过采用协议，类型保证实现协议定义的必需方法和属性，从而确保具备一组公共能力并实现多态性。你可以在
    `Swift.org` 找到关于 `Swift` 协议(¹) 的更多细节。


    在设计 iOS 框架时，努力实现软件组件的解耦至关重要。这一目标确保对某一组件的修改对其他组件的影响最小化。当组件紧密耦合，存在强依赖关系时，系统的维护将变得艰巨且耗时。`Swift`
    协议可以通过抽象化实现细节，并减少在框架及其集成的应用中需要进行的全局性修改，从而帮助降低耦合度。这有助于实现更精简、更易于管理的开发过程。


    在本章中，我们将使用 `Swift` 协议设计一个 iOS 框架。到本章结束时，你将创建出第一个 iOS 框架，并成功将其集成到一个移动应用中，从而获得处理模块化、可复用代码的实战经验。

