    \n图 1-9 故事板编辑器\n\n![Xcode 界面截图，显示名为“SettingsFW”的项目。左侧面板显示包含文件夹和 Swift 文件的目录，包括“AppDelegate.swift”和“Main.storyboard”。中央面板展示故事板编辑器，其中包含\
    \ iPhone 17 Pro 的“标签栏控制器”布局。右侧面板包含所选“标签栏控制器”的属性，包括类和故事板设置。界面包括用于导航和编辑的各种工具栏和图标。](img/678928_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8 故事板编辑器\n\n1. 在界面生成器中选择**标签栏控制器场景**\n2. 使用右上角对应的图标选择**显示身份检查器**\n3. 在相应字段中输入**故事板\
