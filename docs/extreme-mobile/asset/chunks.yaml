  raw: '## Integrating iOS Frameworks Dynamically


    Up to this point, iOS Frameworks have been integrated into app targets via **SceneDelegate****.****willConnectTo****()**
    using public protocols defined within the frameworks. We’ll replace the use of
    these protocols with a dynamic, decoupled solution.


    To accomplish this, a mechanism will be designed to allow frameworks to register
    their root view controllers for consumption/exposure by iOS apps. UserDefaults
    will be utilized to propagate these “registrations.”


    The following requirements will need to be met to support the generic registration
    of frameworks:


    1.  The data format must be well-known to both apps and frameworks


    2.  Frameworks will need to register themselves when loaded


    3.  Apps will need to process registrations in SceneDelegate .willConnectTo()


    First, a well-known data format will need to be defined. In order to instantiate,
    load, and integrate a framework’s User Interface view controller, the app will
    need to know the framework Bundle ID, Storyboard Name, Storyboard Identifier,
    title, and icon. Each view registered by a framework will be added to a UserDefaults
    top-level “views” key:


    ```

    let config = [ "bundle": "com.gw.RecordingsFW", "storyboard": "RecordingsUI",
    "view":

    "RecordingsNC", "title": "Recordings", "icon": "music.note.list"]

    ```


    UserDefaults works well for managing registrations across apps and frameworks
    for several reasons:


    1.  Frameworks will always load before the app’s SceneDelegate.willConnectTo()
    is called


    2.  Frameworks will always register or update their registrations when loaded,
    allowing changes made in a framework to be reflected in an app without the app
    requiring changes


    3.  If an app is deleted from a device and reinstalled, frameworks will reconstitute
    their registrations when loaded


    4.  UserDefaults set by an app, or any of its frameworks, is accessible to all
    of them


    To implement the registration process for the app, SceneDelegate.willConnectTo()
    will need to search for a top-level “views” key via UserDefaults. If found, it
    will iterate through the array of registrations and add an instantiated view controller
    to its tab bar controller for each one found. Once completed, it will check for
    an app Property List setting that overrides a corresponding one in a framework,
    and if found, propagate it via UserDefaults for use in framework code.


    The framework protocol referenced in each framework’s internal App Target will
    no longer be needed. Instead, replace this app’s SceneDelegate.willConnectTo()
    in the ScratchTraxApp1 project with the following registration code to dynamically
    add the framework to its UI:


    ```

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions:
    UIScene.ConnectionOptions) {

    guard let winScene = (scene as? UIWindowScene) else { return }

    if let storyboard = session.configuration.storyboard {

    if let tabBarController = storyboard.instantiateInitialViewController() as? UITabBarController
    {

    window = UIWindow(windowScene: winScene)

    window?.rootViewController = tabBarController

    window?.makeKeyAndVisible()

    var tbcViewControllers = tabBarController.viewControllers ?? []

    // Add framework UI''s generically...

    if let configs = UserDefaults.standard.object(forKey: "views") as? [[String:String]]
    {

    var lastTitle = ""

    for config in configs {

    if let bundle = config["bundle"], let storyboard = config["storyboard"], let view
    = config["view"] {

    if let bundle = Bundle(identifier: bundle) {

    let storyboard = UIStoryboard(name: storyboard, bundle: bundle)

    let storyboardVC = storyboard.instantiateViewController(withIdentifier: view)

    var image: UIImage?

    if let icon = config["icon"] {

    image = UIImage(systemName: icon, withConfiguration: UIImage.SymbolConfiguration(weight:
    .medium))

    }

    storyboardVC.tabBarItem = UITabBarItem(title: config["title"], image: image, tag:
    0)

    if lastTitle == "" || storyboardVC.tabBarItem.title?.caseInsensitiveCompare(lastTitle)
    == .orderedDescending {

    tbcViewControllers.append(storyboardVC)

    } else {

    tbcViewControllers.insert(storyboardVC, at: tabBarController.viewControllers?.count
    ?? 0)

    }

    lastTitle = storyboardVC.tabBarItem.title ?? ""

    }

    }

    }

    tabBarController.setViewControllers(tbcViewControllers, animated: false)

    }

    }

    }

    // Override any frameworks’ p-list settings with its own…

    if let bundle = Bundle(identifier:"com.gw.ScratchTraxApp1"), let path = bundle.path(forResource:
    "ScratchTraxApp1", ofType: "plist"),

    let plistDict = NSDictionary(contentsOfFile: path), let showPublished = plistDict["showPublished"]
    as? Bool {

    var features = UserDefaults.standard.object(forKey: "features") as? [String:String]
    ?? [:]

    features["showPublished"] = String(showPublished)

    UserDefaults.standard.set(features, forKey: "features")

    }

    }

    ```'
  trans: "\n# 动态集成 iOS 框架\n\n到目前为止，iOS 框架已通过 `SceneDelegate.willConnectTo()` 方法，使用框架内定义的公开协议集成到应用目标中。接下来，我们将用一种动态、解耦的方案替换这些协议的使用。\n\
    \n为此，需要设计一种机制，允许框架将其根视图控制器注册，供 iOS 应用消费/暴露。将使用 `UserDefaults` 来传播这些“注册信息”。\n\n\
    要支持框架的通用注册，需满足以下要求：\n\n1. 数据格式必须同时为应用和框架所熟知\n2. 框架在加载时需要自行注册\n3. 应用需要在 `SceneDelegate.willConnectTo()`\
    \ 中处理注册信息\n\n首先，需要定义一种双方熟知的数据格式。为了实例化、加载并集成框架的用户界面视图控制器，应用需要知道框架的 Bundle ID、Storyboard\
    \ 名称、Storyboard 标识符、标题以及图标。每个由框架注册的视图都会添加到 `UserDefaults` 的顶级“views”键下：\n\n```\n\
    let config = [ \"bundle\": \"com.gw.RecordingsFW\", \"storyboard\": \"RecordingsUI\"\
    , \"view\":\n\"RecordingsNC\", \"title\": \"Recordings\", \"icon\": \"music.note.list\"\
    ]\n```\n\n使用 `UserDefaults` 来管理跨应用和框架的注册信息效果良好，原因如下：\n\n1. 框架总是在应用的 `SceneDelegate.willConnectTo()`\
    \ 被调用之前加载\n2. 框架在加载时总会注册或更新其注册信息，使得框架中的更改能够在应用中体现，而无需应用做出修改\n3. 如果应用从设备上删除并重新安装，框架会在加载时重建其注册信息\n\
    4. 由应用或其任何框架设置的 `UserDefaults` 对所有框架都是可访问的\n\n为了实现应用的注册流程，`SceneDelegate.willConnectTo()`\
    \ 需要通过 `UserDefaults` 查找顶级的“views”键。如果找到，它将遍历注册信息数组，并为每个注册信息实例化一个视图控制器，并将其添加到标签栏控制器中。完成后，它会检查应用的属性列表设置，看是否有覆盖框架中对应设置的值，如果有，则通过\
    \ `UserDefaults` 传播该值，供框架代码使用。\n\n每个框架内部应用目标中所引用的框架协议将不再需要。取而代之，用以下注册代码替换 `ScratchTraxApp1`\
    \ 项目中的 `SceneDelegate.willConnectTo()`，以动态地将框架添加到其用户界面：\n\n```\nfunc scene(_ scene:\
    \ UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    guard let winScene = (scene as? UIWindowScene) else { return }\n    if\
    \ let storyboard = session.configuration.storyboard {\n        if let tabBarController\
    \ = storyboard.instantiateInitialViewController() as? UITabBarController {\n \
    \           window = UIWindow(windowScene: winScene)\n            window?.rootViewController\
    \ = tabBarController\n            window?.makeKeyAndVisible()\n            var\
    \ tbcViewControllers = tabBarController.viewControllers ?? []\n            //\
    \ 通用地添加框架用户界面...\n            if let configs = UserDefaults.standard.object(forKey:\
    \ \"views\") as? [[String:String]] {\n                var lastTitle = \"\"\n \
    \               for config in configs {\n                    if let bundle = config[\"\
    bundle\"], let storyboard = config[\"storyboard\"], let view = config[\"view\"\
    ] {\n                        if let bundle = Bundle(identifier: bundle) {\n  \
    \                          let storyboard = UIStoryboard(name: storyboard, bundle:\
    \ bundle)\n                            let storyboardVC = storyboard.instantiateViewController(withIdentifier:\
    \ view)\n                            var image: UIImage?\n                   \
    \         if let icon = config[\"icon\"] {\n                                image\
    \ = UIImage(systemName: icon, withConfiguration: UIImage.SymbolConfiguration(weight:\
    \ .medium))\n                            }\n                            storyboardVC.tabBarItem\
    \ = UITabBarItem(title: config[\"title\"], image: image, tag: 0)\n           \
    \                 if lastTitle == \"\" || storyboardVC.tabBarItem.title?.caseInsensitiveCompare(lastTitle)\
    \ == .orderedDescending {\n                                tbcViewControllers.append(storyboardVC)\n\
    \                            } else {\n                                tbcViewControllers.insert(storyboardVC,\
    \ at: tabBarController.viewControllers?.count ?? 0)\n                        \
    \    }\n                            lastTitle = storyboardVC.tabBarItem.title\
    \ ?? \"\"\n                        }\n                    }\n                }\n\
    \            }\n            tabBarController.setViewControllers(tbcViewControllers,\
    \ animated: false)\n        }\n    }\n    // 用自己的设置覆盖任何框架的属性列表设置...\n    if let\
    \ bundle = Bundle(identifier:\"com.gw.ScratchTraxApp1\"), let path = bundle.path(forResource:\
    \ \"ScratchTraxApp1\", ofType: \"plist\"),\n       let plistDict = NSDictionary(contentsOfFile:\
    \ path), let showPublished = plistDict[\"showPublished\"] as? Bool {\n       \
    \ var features = UserDefaults.standard.object(forKey: \"features\") as? [String:String]\
    \ ?? [:]\n        features[\"showPublished\"] = String(showPublished)\n      \
    \  UserDefaults.standard.set(features, forKey: \"features\")\n    }\n}\n```\n"
- fmt: "### Framework Registration\n\nIn order to provide ample opportunity for a\
    \ framework to register its User Interface view controller for use in an app,\
    \ it needs to do so early in the app life cycle, preferable when the framework\
    \ is loaded, and before `SceneDelegate.willConnectTo()` executes. Since all frameworks\
    \ integrated into an app are loaded before the app starts its life cycle, detecting\
    \ framework loading is critical.\n\nSo how can this be done in a Swift-based framework?\
    \ In a nutshell, it really can’t. In the Objective-C programming language, `NSObject`\
    \ has a `+load` method which is always called when instantiating an Objective-C\
    \ object, after all of its superclasses’ `+load` methods have been called. However,\
    \ it’s not called automatically in Swift classes.\n\nThat complicates the framework\
    \ registration process and, in fact, prevents it from working. But there’s an\
    \ alternative. We’ll bridge Objective-C with Swift and have it act as a proxy\
    \ for loading for the framework.\n\nFirst, create an Objective-C header file:\n\
    \n1. Right-click the `RecordingsFW` project folder within the **Project Navigator**\
    \ and select **New File from Template…**\n2. Select the **Header File** template\
    \ under the **Source** group\n3. Name the file `RecordingsFWObjcLoader.h`\n\n\
    Add following code to the header file to define the Objective-C class interface:\n\
    \n```\n#ifndef RecordingsFWObjcLoader_h\n#define RecordingsFWObjcLoader_h\n#import\
    \ \nNS_ASSUME_NONNULL_BEGIN\n@interface RecordingsFWObjcLoader : NSObject\n@end\n\
    NS_ASSUME_NONNULL_END\n#endif /* RecordingsFWObjcLoader_h */\n```\n\nCreate an\
    \ Objective-C implementation file for the class:\n\n1. Right-click the `RecordingsFW`\
    \ project folder within the **Project Navigator** and select **New File from Template…**\n\
    2. Select the **Objective-C File** template under the **Source** group\n3. Name\
    \ the file `RecordingsFWObjcLoader.m`\n\nAdd the following code to the class file\
    \ to define the Objective-C class implementation, which implements the `+load()`\
    \ method for the registration hook:\n\n```\n#import \"RecordingsFWObjcLoader.h\"\
    \n#import \"RecordingsFW/RecordingsFW-Swift.h\"\n@implementation RecordingsFWObjcLoader\n\
    +(void) load {\n    if ([[RecordingsFWSwiftLoader alloc] init]) {\n        NSLog(@\"\
    RecordingsFWObjcLoader.load() succeeded...\");\n    } else {\n        NSLog(@\"\
    RecordingsFWObjcLoader.load() failed...\");\n    }\n}\n@end\n```\n\nSince `RecordingsFW/RecordingsFW-Swift.h`\
    \ is a non-visible bridging header needed to support the referencing of Swift\
    \ classes from within Objective-C, the following build setting needs to be set\
    \ to force the compiler to generate it:\n\n1. Select the `RecordingsFW` project\
    \ folder within the **Project Navigator**\n2. Select the `RecordingsFW` target\n\
    3. Select the **Build Settings** tab and search for **Install Generated Header**,\
    \ and set it to **YES**\n\n> **Note:** `RecordingsFWObjcLoader.m` will not compile\
    \ until the next step has been completed.\n\nCreate a Swift file for registering\
    \ the framework:\n\n1. Right-click the `RecordingsFW` project folder within the\
    \ **Project Navigator** and select **New File from Template…**\n2. Select the\
    \ **Swift File** template under the **Source** group\n3. Name the file `RecordingsFWSwiftLoader.swift`\n\
    \nAdd the following code to the class to perform the framework registration, so\
    \ that the app can expose the framework’s functionality:\n\n```\nimport Foundation\n\
    \n@objcMembers public class RecordingsFWSwiftLoader: NSObject {\n    override\
    \ public init() {\n        super.init()\n        initViews()\n    }\n\n    func\
    \ initViews() {\n        let config = [ \"bundle\": \"com.gw.RecordingsFW\", \"\
    storyboard\": \"RecordingsUI\", \"view\": \"RecordingsNC\", \"title\": \"Recordings\"\
    , \"icon\": \"music.note.list\"]\n        var configs: [[String:String]] = []\n\
    \        if let persistedConfigs = UserDefaults.standard.object(forKey: \"views\"\
    ) as? [Dictionary], !persistedConfigs.isEmpty {\n            configs.append(contentsOf:\
    \ persistedConfigs)\n            if !findConfig(configs: persistedConfigs) {\n\
    \                configs.append(config)\n            }\n        } else {\n   \
    \         configs.append(config)\n        }\n        UserDefaults.standard.set(configs,\
    \ forKey: \"views\")\n    }\n\n    func findConfig(configs: [[String:String]])\
    \ -> Bool {\n        var found = false\n        for config in configs {\n    \
    \        if config[\"bundle\"] == \"com.gw.RecordingsFW\", config[\"storyboard\"\
    ] == \"RecordingsUI\", config[\"view\"] == \"RecordingsNC\" {\n              \
    \  found = true\n                break\n            }\n        }\n        return\
    \ found\n    }\n}\n```\n\n### The Acid Test\n\nSet the app as the active scheme\
    \ in the scheme drop-down, build the app, and run it using one of the Xcode simulators\
    \ or an actual device. The code should compile and run properly. The results should\
    \ match the screenshot in **Figure 7-4**.\n\nWhen the framework is loaded, it\
    \ registers its view controller. The app then retrieves this registration from\
    \ `UserDefaults`, instantiates the corresponding view controller, integrates it\
    \ into its own user interface, and overrides any framework Property List settings\
    \ to ensure the view displays **published** audio recordings in the Recordings\
    \ feature.\n\n![Screenshot of a development environment showing an iPhone simulator\
    \ displaying an app titled “Published Recordings.” The app lists two recordings:\
    \ “My (Published) Electric Anthem” and “My (Published) Acoustic Ballad,” both\
    \ credited to John Doe. The simulator is surrounded by a code editor with project\
    \ files and settings for “ScratchTraxApp1” in Xcode, including files like “AppDelegate.swift”\
    \ and “Main.storyboard.”](images/678928_1_En_7_Chapter/678928_1_En_7_Fig4_HTML.jpg)\n\
    \n**Figure 7-4** Xcode Simulator\n\nIn this chapter, you successfully integrated\
    \ a framework dynamically into the `ScratchTraxApp1` app without using protocols\
    \ or altering the app’s underlying code (once the code was modified to be able\
    \ to do so). You explored techniques for no-code framework integration, demonstrating\
    \ how to build flexible, scalable, and maintainable app architectures that can\
    \ easily incorporate modular frameworks. This approach provides a practical blueprint\
    \ for highly adaptable iOS applications.\n\nWith dynamic integration techniques\
    \ in place, you’re ready to unify multiple frameworks into a single, cohesive\
    \ app architecture. In the next chapter, we’ll combine the frameworks developed\
    \ so far into one app, demonstrating modular functionality and revenue-driven\
    \ features across the system.\n\n# 8. Unifying the Dynamic Framework Architecture\n\
    \n## Designing the ScratchTraxApp2 App\n\nThis chapter brings together the frameworks\
    \ developed throughout this book into a single, cohesive architecture. Each framework\
    \ is integrated to load dynamically at runtime, building on the principles introduced\
    \ in Chapter 7. This unified system also incorporates In-App Purchases across\
    \ frameworks, demonstrating how dynamic feature enablement can drive modular functionality\
    \ and revenue growth within a scalable iOS architecture.\n\nThe `RecordingsStoreFW`\
    \ and `RecordingStudioFW` frameworks will need to be modified as in Chapter 7\
    \ to allow them to be integrated dynamically. `SettingsFW` will continue to be\
    \ loaded using a protocol.\n\nIn this chapter, we’ll design the `ScratchTraxApp2`\
    \ App to bring together all previously developed frameworks into a unified, dynamically\
    \ integrated system. In-App Purchases will showcase how dynamic feature enablement\
    \ can drive modular functionality and revenue growth while maintaining a scalable\
    \ and maintainable iOS architecture.\n\n### Creating Another iOS App\n\nA second\
    \ app will need to be created, `ScratchTraxApp2`, utilizing the frameworks developed\
    \ in the book:\n\n1. Launch Xcode\n2. Select **Create a new Xcode project**\n\
    3. Select the **App** template under the **Application** group\n4. Set Product\
    \ Name to `ScratchTraxApp2`\n5. Set Interface to **Storyboard**\n6. Set Language\
    \ to **Swift**"
