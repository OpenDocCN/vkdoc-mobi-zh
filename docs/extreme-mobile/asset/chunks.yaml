    UI using Interface Builder, or you can download the source code from GitHub and
    replace the Storyboard file contents as follows:


    ![Screenshot of an Xcode interface displaying a storyboard for an iOS app. The
    storyboard includes two iPhone screens. The first screen shows a “Navigation Controller”
    with a placeholder for a title. The second screen is labeled “Settings” and contains
    a table view with static content, listing “General” information such as Name,
