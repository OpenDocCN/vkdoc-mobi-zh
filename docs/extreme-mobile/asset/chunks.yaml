    # 11. 打包与分发


    将 iOS 框架集成到移动应用中有多种方式，每种方式根据项目的结构和分发需求提供不同的优势。框架可以直接添加到 `Xcode` 项目中，以获得紧密的控制和简单性，正如本书所做的那样。它们也可以通过依赖管理器（如
    `CocoaPods` 和 `Swift Package Manager`）进行集成。`CocoaPods` 提供了一个成熟的系统，可通过集中式仓库管理和更新第三方库，而
    `Swift Package Manager` 则在 `Xcode` 内提供原生支持，实现无缝的版本控制和集成。这些选项共同为开发者提供了在组织、共享和维护跨
    iOS 应用的可复用代码方面的灵活性。


    **直接项目集成** 让开发者能够完全控制框架如何集成到 iOS 应用中。通过手动将框架的源代码或编译后的包直接添加到 `Xcode` 项目中，开发者可以微调构建设置、版本控制和可见性。此方法的一个主要优势是，它允许开发者在调试时逐步执行框架的源代码，从而完全透明地了解其内部行为以及与宿主应用的交互。这使得它对于不公开发布的内部或专有框架特别有用。然而，每当框架发生变化时，都需要手动更新，随着时间的推移，这可能会变得繁琐。管理多个依赖同一个框架的项目也可能导致冗余和维护开销，使得该方法在较大规模的开发环境中可扩展性较差。


    `CocoaPods` 是一个历史悠久且被广泛采用的依赖管理器，它简化了第三方库集成到 iOS 应用的过程。它自动化了下载、链接和版本控制的过程，使开发者能够轻松包含其集中式仓库中维护的数千个开源框架。`CocoaPods`
    支持静态和动态框架，非常适合具有多个依赖项的复杂项目。其缺点是，它需要创建一个 `Xcode` 工作区（我们在应用中正在使用），这会改变项目结构。依赖关系解析有时会引入版本冲突，并且与像
    `Swift Package Manager` 这样的现代工具相比，构建速度可能会较慢。


    **Swift Package Manager (SPM)** 提供了一种现代的、由 Apple 支持的依赖管理解决方案，它直接内置于 `Xcode` 中。它允许开发者通过简单的基于
    Git 的集成轻松添加、更新和管理框架，从而减少设置时间并保持清晰的源代码管理。`SPM` 与 Apple 工具链的紧密集成确保了项目的顺畅更新和兼容性。然而，它的库生态系统仍然比
    `CocoaPods` 小，并且缺乏复杂构建设置所需的一些高级自定义选项。此外，某些较旧的或遗留的框架可能尚不支持 `SPM` 分发，这会限制其在混合环境项目中的使用。


    由于 `CocoaPods` 和 `Swift Package Manager` 都是有完善文档记载的技术，因此本章将仅为你提供必要资源的链接，以便你使用这些技术来打包和分发
    iOS 框架。到最后，你将了解在多个 iOS 应用程序中组织、共享和维护可复用代码的选项和最佳实践。


    ## CocoaPods


    关于创建、安装和集成 `CocoaPods` 有大量文档可用：


    **官方文档**


    *   什么是 `CocoaPods`^(³⁴)


    *   制作一个 `CocoaPod`^(³⁵)


    *   `Podspec 语法` 参考^(³⁶)


    *   `Trunk 服务`（发布 Pods）^(³⁷)


    *   所有 `CocoaPods` 指南索引^(³⁸)


    **补充资源**


    *   `CocoaPods` 博客（新闻与更新）^(³⁹)


    *   `CocoaPods` GitHub 仓库^(⁴⁰)


    *   `CocoaPods Core` API 参考^(⁴¹)


    ## Swift Package Manager


    `swift.org` 提供了关于集成和创建 Swift Package 的大量文档：


    **官方文档**


    *   `Swift Package Manager` 概览^(⁴²)


    *   创建一个 `Swift Package`^(⁴³)


    *   向你的应用添加 `Package` 依赖项^(⁴⁴)


    *   `Package.swift` 清单参考^(⁴⁵)


    *   将二进制框架作为 Swift Package 分发^(⁴⁶)


    **补充资源**


    *   `Swift Package Manager` GitHub 仓库^(⁴⁷)


    *   Swift Package 索引（包发现）^(⁴⁸)


    在本章中，你探索了打包和分发 iOS 框架的各种选项。除了本书前面介绍的将框架直接集成到 Xcode 项目中之外，你还了解了使用依赖管理器（如 `CocoaPods`
    和 `Swift Package Manager`）进行分发的替代方法。你选择哪种方法将取决于与你框架的开发和目标受众相关的因素。


