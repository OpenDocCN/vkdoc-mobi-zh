- fmt: '# Localizing a View Controller


    When developing an iOS framework that includes a user interface, it''s best to
    localize the relevant code to simplify future efforts toward internationalization.
    The display text used throughout this book''s sample projects was intentionally
    hard-coded for clarity. This chapter will walk through the steps needed to localize
    the `SettingsFW` framework for multiple languages.


    The `SettingsTVC` class defines the framework''s user interface, which includes
    three `UILabel` components: `nameLabel`, `emailLabel`, and `websiteLabel`. These
    labels must be properly initialized when the view loads, using values from the
    appropriate language file. In a production app, the corresponding value labels
    `nameValueLabel`, `emailValueLabel`, and `websiteValueLabel` would typically be
    set dynamically through a network API request. For the purposes of this example,
    however, those values remain hard-coded.


    `String`, the newer and preferred way to localize strings in Swift, will be used
    to retrieve the `UILabel` values from the appropriate language file rather than
    using the legacy `NSLocalizedString`.


    ```

    String("settingsTVCUILabelName", bundle: Bundle(for: SettingsTVC.self), comment:
    "Name field label in the Settings view")

    ```


    The first parameter is the key to be defined in the appropriate language file.
    Although no strict naming conventions are enforced for keys, they must be unique
    across the framework code base and should be easily identifiable when translations
    occur. This becomes particularly important when the number of key-value pairs
    becomes large. If no key is found in the translation file, the key is displayed.


    **Note**: The Xcode String Catalog Editor will convert dot-delimited, hyphen-delimited,
    underscore-delimited, and camelCase keys to lowerCamelCase variations. If a specific
    format is desired for keys, the Strings catalog can be edited manually (right-click
    + Open As/Source Code).


    The second parameter is the framework bundle ID, which is critical for the function
    to work correctly. If a variation of `String()` is used that doesn''t include
    the bundle ID, the function will attempt to retrieve the string from the app''s
    language file instead of the framework''s language file, causing it to fail.


    The third parameter is a comment that provides context for translators. It doesn''t
    appear in the app''s UI, but it''s stored in the generated translation file when
    extracting localized strings using Xcode''s `Export for Localization` feature.
    Since the Comment parameter will be provided by the String Catalog, it can be
    left out.


    Integrate `String()` into the `SettingsTVC` class to localize the displayable
    text in the Settings feature:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    let frameworkBundle = Bundle(for: SettingsTVC.self)

    self.navigationItem.title = String(localized: "settingsTVCUINavigationItemTitle",
    bundle: frameworkBundle)

    self.nameLabel.text = String(localized: "settingsTVCUILabelName", bundle: frameworkBundle)

    self.emailLabel.text = String(localized: "settingsTVCUILabelEmail", bundle: frameworkBundle)

    self.websiteLabel.text = String(localized: "settingsTVCUILabelWebsite", bundle:
    frameworkBundle)

    }

    ```


    ## Creating a String Catalog


    Create a String Catalog for the `SettingsFW` framework:


    ![Screenshot of a file template selection window for creating a new file in a
    development environment. The options include "String Catalog," "Strings File (Legacy),"
    and "Stringsdict File (Legacy)." The interface shows tabs for different platforms
    like iOS, macOS, watchOS, tvOS, visionOS, and DriverKit. A search bar at the top
    right contains the term "string." The "Next" button is highlighted in orange at
    the bottom right.](images/678928_1_En_9_Chapter/678928_1_En_9_Fig1_HTML.jpg)


    **Figure 9-1** String Catalog Template


    1. Right-click the `SettingsFW` folder within the `Project Navigator` and select
    `New File from Template…`

    2. Select the `String Catalog` template under the `Resource` group and `Next`
    (**Figure** [**9-1**](#678928_1_En_9_Chapter.xhtml#Fig1))

    3. Name the file `Localizable.xcstrings`


    ## Add Localizations to the String Catalog


    Add the English (en), French (fr), and Italian (it) localizations to the String
    Catalog:


    1. Select the `.xcstrings` file within the `Project Navigator`

    2. Select `Add new language` via + icon at the bottom left of the `Localizations
    Navigator` and add `French (fr)` and then `Italian (it)`, as English (en) is created
    by default


    ## Add Values to the English Localization


    Add localization values to the English Localization:


    ![Screenshot of an Xcode interface displaying a project named "ScratchTraxApp."
    The left panel shows a file directory with various files, including "SettingsFW.xcstrings"
    selected. The central panel lists key-value pairs for localization, with keys
    like "settingsTVCUILabelName" and corresponding English translations such as "Name"
    and "Settings." The right panel shows details about the selected file, including
    its name and location. The bottom panel displays a debug message: "Message from
    debugger: killed."](images/678928_1_En_9_Chapter/678928_1_En_9_Fig2_HTML.jpg)


    **Figure 9-2** String Catalog Editor


    1. Select `English` in the `String Catalog Navigator`

    2. Select `Add a new manual string` using + icon at the top left of the empty
    English Localization editor, and set Key to `settingsTVCUINavigationItemTitle`,
    English (en) to `Settings`, and Comment to "`Title for the Settings view`" (**Figure**
    [**9-2**](#678928_1_En_9_Chapter.xhtml#Fig2))

    3. Repeat Step 2 for the remaining strings


    ## Add Values to the French Localization


    Add localization values to the French Localization:


    1. Select `French` in the `String Catalog Navigator`

    2. Select `Add a new manual string` using + icon at the top left of the empty
    English Localization editor, and set Key to `settingsTVCUINavigationItemTitle`,
    French (fr) to `Settings` 🇫🇷 (you can add an emoji for France by selecting Control-Command-Space
    and searching for France), and Comment to "`Title for the Settings view`"

    3. Repeat Step 2 for the remaining strings


    ## Add Values to the Italian Localization


    Add localization values to the Italian Localization:


    1. Select `Italian` in the `String Catalog Navigator`

    2. Select `Add a new manual string` using + icon at the top left of the empty
    English Localization editor, and set Key to `settingsTVCUINavigationItemTitle`,
    Italian (it) to `Settings` 🇮🇹 (you can add an emoji for Italy by selecting Control-Command-Space
    and searching for Italy), and Comment to "`Title for the Settings view`"

    3. Repeat Step 2 for the remaining strings'
