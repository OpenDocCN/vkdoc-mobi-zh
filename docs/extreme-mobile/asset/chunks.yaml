  trans: '

    ## 创建 iOS 应用


    到目前为止，每个框架都是独立开发，并利用各自框架项目内的应用目标来执行的。本章将要构建的 iOS 应用将不再需要这些应用目标，但它们仍保留，以支持框架未来的功能增强，且不依赖于这些
    iOS 应用。


    创建 `ScratchTraxApp1` 应用与创建内部应用目标类似，该应用将显示通过远程网络请求获取的已发布录音列表。


    按如下步骤创建新项目：


    ![软件开发界面截图，用于创建新项目。顶部选项卡包含不同平台的选项，如 iOS、macOS 及其他。当前选中“iOS”选项卡。下方“应用”类别下显示了不同应用类型的图标，包括
    App、文档 App、游戏和增强现实 App。“App”选项高亮显示。“框架与库”类别下包括框架、静态库和 Metal 库选项。底部有“取消”、“上一步”和“下一步”按钮。](img/678928_1_En_7_Fig1_HTML.jpg)


    图 7-1


    新建项目模板


    1.  启动 Xcode

    2.  选择**创建新 Xcode 项目**

    3.  在“应用”分组下选择 **App** 模板（**图** **7-1**）

    4.  将产品名称设置为 `ScratchTraxApp1`

    5.  将界面设置为 **Storyboard**

    6.  将语言设置为 **Swift**


    ## 为 iOS 应用创建用户界面


    本章构建的 iOS 应用需要一个用户界面来支持框架提供的功能。将使用标签栏控制器，就像每个框架应用目标中使用的那样。执行以下步骤创建并配置标签栏控制器：


    ![Xcode 界面截图，显示名为“ScratchTraxApp1”的项目，且故事板已打开。主视图展示了一个适用于 iPhone 17 Pro Max 的“标签栏控制器”。左侧面板列出了项目文件，包括“AppDelegate.swift”和“Main.storyboard”。右侧面板显示了视图控制器的属性，例如布局和过渡样式设置。界面上可见各种界面元素和选项，表明这是一个
    iOS 应用开发环境。](img/678928_1_En_7_Fig2_HTML.jpg)


    图 7-2


    故事板编辑器


    1.  在**项目导航器**中选择 `ViewController.swift` 并删除它

    2.  在**项目导航器**中选择 `Main.storyboard` 以显示**界面构建器**

    3.  在**故事板导航器**中选择**视图控制器场景**并删除它

    4.  选择**界面构建器**左下角的**库**图标 (+) 并创建一个**标签栏控制器**

    5.  删除故事板导航器中的**项目 1 场景**和**项目 2 场景**

    6.  在故事板导航器中选择**标签栏控制器场景**

    7.  使用右上角的图标显示**检查器**

    8.  选择**标识检查器**并输入**故事板 ID**

    9.  选择**属性检查器**并勾选**是初始视图控制器**（**图** **7-2**）


    ## 为 iOS 应用创建属性列表


    需要向项目中添加一个属性列表，以覆盖 `RecordingsFW` 框架中控制其运行模式的属性列表设置 `showPublished`：


    ![Xcode 界面截图，显示名为“ScratchTraxApp1”的项目。左侧面板显示文件目录，包含各种文件，其中“ScratchTraxApp1.plist”高亮显示。中央面板显示此
    plist 文件的内容，展示了一个字典，键“showPublished”的布尔值设置为“YES”。右侧面板提供了文件的详细信息，包括其位置和类型。](img/678928_1_En_7_Fig3_HTML.jpg)


    图 7-3


    属性列表编辑器


    1.  右键单击**项目导航器**中的文件夹，选择**从模板新建文件...**

    2.  在**资源**分组下选择**属性列表**模板，点击**下一步**

    3.  将文件命名为 `ScratchTraxApp1.plist`

    4.  在**项目导航器**中选择 `ScratchTraxApp1.plist`

    5.  点击空表根行中的 **+** 图标（将鼠标悬停在根单元格上使其可见）

    6.  创建一个名为 `showPublished` 的变量，类型设置为 Boolean，值设置为 YES（**图** **7-3**）


    ## 创建 Xcode 工作区


    将使用 Xcode 工作区来组织构建本章移动应用所需的一组项目。当项目被添加到工作区时，Xcode 会自动检测这些项目中目标之间的依赖关系，并以正确的顺序构建它们。关于工作区的详细信息，可在
    Apple 开发者文档的“项目与工作区”网站的“**文件和**工作区”主题下找到。^(²⁷)


    **创建新工作区：**


    1.  如果 Xcode 正在运行，请先关闭它，然后重新启动，并关闭**欢迎使用 Xcode** 界面（没有直接创建工作区的选项，因此需要使用 Xcode
    菜单）

    2.  选择 Xcode 的 **文件/新建/工作区...** 菜单

    3.  将工作区命名为 `ScratchTraxApp1` 并将其保存到包含其他 Xcode 项目的根目录中

    4.  右键单击项目导航器中的空白区域，选择**将文件添加到 ScratchTraxApp1…**

    5.  导航到包含 `ScratchTraxApp1` 项目的目录，添加 `ScratchTraxApp1.xcodeproj`

    6.  在“选择添加文件的选项”下，将**操作**设置为**原地引用文件**

    7.  右键单击项目导航器中的空白区域，选择**将文件添加到 ScratchTraxApp1…**

    8.  导航到包含 `RecordingsFW` 项目的目录，添加 `RecordingsFW.xcodeproj`

    9.  在“选择添加文件的选项”下，将**操作**设置为**原地引用文件**


    **将 RecordingsFW 框架添加到应用中：**


    1.  在**项目导航器**中选择 `ScratchTraxApp1` 项目的根节点

    2.  在**目标**部分选择 `ScratchTraxApp1`

    3.  选择**通用**选项卡，然后点击**框架、库和嵌入内容**部分的 **+** 图标

    4.  将 `RecordingsFW.framework` 添加到应用中，并确认它出现在**框架、库和嵌入内容**部分，且嵌入方式设置为“嵌入并签名”

    '
- fmt: "# Integrating iOS Frameworks Dynamically\n\nUp to this point, iOS Frameworks\
    \ have been integrated into app targets via `SceneDelegate.willConnectTo()` using\
    \ public protocols defined within the frameworks. We'll replace the use of these\
    \ protocols with a dynamic, decoupled solution.\n\nTo accomplish this, a mechanism\
    \ will be designed to allow frameworks to register their root view controllers\
    \ for consumption/exposure by iOS apps. `UserDefaults` will be utilized to propagate\
    \ these \"registrations.\"\n\nThe following requirements will need to be met to\
    \ support the generic registration of frameworks:\n\n1. The data format must be\
    \ well-known to both apps and frameworks\n2. Frameworks will need to register\
    \ themselves when loaded\n3. Apps will need to process registrations in `SceneDelegate.willConnectTo()`\n\
    \nFirst, a well-known data format will need to be defined. In order to instantiate,\
    \ load, and integrate a framework's User Interface view controller, the app will\
    \ need to know the framework Bundle ID, Storyboard Name, Storyboard Identifier,\
    \ title, and icon. Each view registered by a framework will be added to a `UserDefaults`\
    \ top-level \"views\" key:\n\n```\nlet config = [ \"bundle\": \"com.gw.RecordingsFW\"\
    , \"storyboard\": \"RecordingsUI\", \"view\":\n\"RecordingsNC\", \"title\": \"\
    Recordings\", \"icon\": \"music.note.list\"]\n```\n\n`UserDefaults` works well\
    \ for managing registrations across apps and frameworks for several reasons:\n\
    \n1. Frameworks will always load before the app's `SceneDelegate.willConnectTo()`\
    \ is called\n2. Frameworks will always register or update their registrations\
    \ when loaded, allowing changes made in a framework to be reflected in an app\
    \ without the app requiring changes\n3. If an app is deleted from a device and\
    \ reinstalled, frameworks will reconstitute their registrations when loaded\n\
    4. `UserDefaults` set by an app, or any of its frameworks, is accessible to all\
    \ of them\n\nTo implement the registration process for the app, `SceneDelegate.willConnectTo()`\
    \ will need to search for a top-level \"views\" key via `UserDefaults`. If found,\
    \ it will iterate through the array of registrations and add an instantiated view\
    \ controller to its tab bar controller for each one found. Once completed, it\
    \ will check for an app Property List setting that overrides a corresponding one\
    \ in a framework, and if found, propagate it via `UserDefaults` for use in framework\
    \ code.\n\nThe framework protocol referenced in each framework's internal App\
    \ Target will no longer be needed. Instead, replace this app's `SceneDelegate.willConnectTo()`\
    \ in the `ScratchTraxApp1` project with the following registration code to dynamically\
    \ add the framework to its UI:\n\n```\nfunc scene(_ scene: UIScene, willConnectTo\
    \ session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions)\
    \ {\n    guard let winScene = (scene as? UIWindowScene) else { return }\n    if\
    \ let storyboard = session.configuration.storyboard {\n        if let tabBarController\
    \ = storyboard.instantiateInitialViewController() as? UITabBarController {\n \
    \           window = UIWindow(windowScene: winScene)\n            window?.rootViewController\
    \ = tabBarController\n            window?.makeKeyAndVisible()\n            var\
    \ tbcViewControllers = tabBarController.viewControllers ?? []\n            //\
    \ Add framework UI's generically...\n            if let configs = UserDefaults.standard.object(forKey:\
    \ \"views\") as? [[String:String]] {\n                var lastTitle = \"\"\n \
    \               for config in configs {\n                    if let bundle = config[\"\
    bundle\"], let storyboard = config[\"storyboard\"], let view = config[\"view\"\
    ] {\n                        if let bundle = Bundle(identifier: bundle) {\n  \
    \                          let storyboard = UIStoryboard(name: storyboard, bundle:\
    \ bundle)\n                            let storyboardVC = storyboard.instantiateViewController(withIdentifier:\
    \ view)\n                            var image: UIImage?\n                   \
    \         if let icon = config[\"icon\"] {\n                                image\
    \ = UIImage(systemName: icon, withConfiguration: UIImage.SymbolConfiguration(weight:\
    \ .medium))\n                            }\n                            storyboardVC.tabBarItem\
    \ = UITabBarItem(title: config[\"title\"], image: image, tag: 0)\n           \
    \                 if lastTitle == \"\" || storyboardVC.tabBarItem.title?.caseInsensitiveCompare(lastTitle)\
    \ == .orderedDescending {\n                                tbcViewControllers.append(storyboardVC)\n\
    \                            } else {\n                                tbcViewControllers.insert(storyboardVC,\
    \ at: tabBarController.viewControllers?.count ?? 0)\n                        \
