  raw: '## Creating a Local File Service


    In this framework, a local file service will be used to read files from a device
    and return metadata representing audio files. Perform the following steps to create
    the service:


    1.  Right-click the folder within the **Project Navigator** and select **New File
    from Template…**


    2.  Choose the **Swift** **File** template under the **Source** section


    3.  Create a class called **RecordingsService.swift**


    Create a **singleton**^([⁶](#fn6)) class for the service. A singleton is a common
    design pattern that prevents multiple instances of a class from being instantiated.
    Once instantiated, the same instance is used wherever it’s referenced.


    ```

    import Foundation

    class RecordingsService {

    public static let shared = RecordingsService()

    }

    ```


    Define a completion handler as a compound (function) type, which the service will
    call when data has been read from the file system and converted to **Recording**
    models.


    ```

    typealias RecordingCompletionHandler = ([Recording]?, Error?) -> ()

    ```


    Since this framework reads files from a device and returns metadata representing
    those files, sample data will need to be defined for use when no files exist.
    The **init()** function will use the **title** attribute of each **Recording**
    model to check for the existence of a corresponding file and create the file if
    it doesn’t exist. Add the following code to the class:


    ```

    private let recordings: [Recording] = [

    Recording(bitrate: 131072, copyright: "© 2025 Words and Music by  John Doe", date:
    "04/28/2025", length: 270, size: 5*1024*1024,

    title: "My Electric Guitar Anthem", type: "AAC Audio File", url: "https://graphixware.com/MyElectricAnthem.aac"),

    Recording(bitrate: 131072, copyright: "© 2025 Words and Music by John Doe", date:
    "08/24/2025", length: 228, size: 10*1024*1024,

    title: "My Acoustic Guitar Ballad", type: "AAC Audio File", url: "https://graphixware.com/MyAcousticBallad.aac")

    ]

    private init() {

    let encoder = JSONEncoder()

    encoder.outputFormatting = .prettyPrinted

    for recording in recordings {

    do {

    let file = try FileManager.default.url(for: .documentDirectory, in: .userDomainMask,
    appropriateFor: nil, create: true)

    .appendingPathComponent(recording.title + ".aac")

    if !FileManager.default.fileExists(atPath: file.lastPathComponent) {

    try encoder.encode(recording).write(to: file)

    }

    } catch {

    print("RecordingsService.init(): Error = \(error.localizedDescription)")

    }

    }

    }

    ```


    Define a **fetch****()** function to be called by the ViewModel to fetch the data,
    which the View, in turn, will display in its User Interface treatment.


    ```

    func fetch(completion: @escaping RecordingCompletionHandler) {

    var recordingModels: [Recording] = []

    let fileManager = FileManager.default

    let documentsURL = fileManager.urls(for: .documentDirectory, in: .userDomainMask)[0]

    do {

    let fileURLs = try fileManager.contentsOfDirectory(at: documentsURL, includingPropertiesForKeys:
    nil)

    for fileURL in fileURLs {

    if let recording = read(type: Recording.self, file: fileURL) {

    recordingModels.append(recording)

    }

    }

    } catch {

    print("RecordingsService.fetch(): Error = \(error.localizedDescription)")

    }

    completion(recordingModels, nil)

    }

    private func read(type: T.Type, file: URL) -> T? {

    var data: Data?

    do {

    data = try Data(contentsOf: file)

    } catch {

    print("RecordingsService.read(): Error = \(error.localizedDescription)")

    }

    guard let recordingData = data else { return nil }

    do {

    let decoder = JSONDecoder()

    return try decoder.decode(T.self, from: recordingData)

    } catch {

    print("RecordingsService.read(): Error = \(error.localizedDescription)")

    }

    return nil

    }

    ```


    Note


    Since the RecordingsService is now defined, uncomment the code that was previously
    commented out in the *fetch*() function within the RecordingsViewModel, so that
    the project will compile properly.


    ## Integrating the ViewModel into the View


    Select **RecordingsTVC.swift** and define a variable called **viewModel**, along
    with a function called **initLocalServiceVM()**, to instantiate the ViewModel,
    bind the ViewModel to the View, fetch the data from the local file service, and
    update the User Interface when the data changes:


    ```

    class RecordingsTVC: UITableViewController {

    var viewModel: RefreshableViewModel?

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    initLocalServiceVM()

    }

    func initLocalServiceVM() {

    self.viewModel = RecordingsViewModel()

    (self.viewModel as! RecordingsViewModel).bindRecordingsViewModelToController =
    { [weak self] in

    guard let strongSelf = self else { return }

    if let recordings = strongSelf.viewModel?.getRecordings() {

    print("RecordingsTVC.initLocalServiceVM().bindRecordingsViewModelToController():
    recordings.count= \(recordings.count)")

    }

    DispatchQueue.main.async {

    strongSelf.refreshControl?.endRefreshing()

    strongSelf.tableView.reloadData()

    }

    }

    self.viewModel?.refresh()

    }

    }

    ```


    Integrate the ViewModel into each function of the User Interface implementation
    that utilizes the data:


    ```

    @objc func refresh(_ sender: AnyObject) {

    viewModel?.refresh()

    }

    override func tableView(_ tableView: UITableView, numberOfRowsInSection section:
    Int) -> Int {

    return self.viewModel?.getRecordings().count ?? 0

    }

    override func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)
    -> UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "RecordingsCell", for:
    indexPath)

    if let recordingCell = cell as? RecordingsCell, let recording = self.viewModel?.getRecordings()[indexPath.row]
    {

    recordingCell.titleLabel.text = recording.title

    recordingCell.copyrightLabel.text = recording.copyright

    return recordingCell

    }

    return cell

    }

    ```'
