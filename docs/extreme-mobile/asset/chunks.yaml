    ## 将依赖注入 ViewModel


    第 2 章通过 `initLocalServiceVM()` 初始化了一个 ViewModel 来管理本地音频录制。第 3 章需要通过 `initRemoteServiceVM()`
    初始化一个 ViewModel 来管理远程音频录制。


    将以下代码集成到 `RecordingsTVC` 中（不要删除现有代码）：


    ```

    import Combine

    class RecordingsTVC: UITableViewController {

    private var cancellables: Set = []

    func initRemoteServiceVM() {

    self.viewModel = PublishedRecordingsViewModel(service: PublishedRecordingsService.shared,
    endpoint: .fetchRecordings)

    (self.viewModel as! PublishedRecordingsViewModel).$recordings

    .sink { [weak self] recordings in

    guard let strongSelf = self else { return }

    print("RecordingsTVC.initRemoteServiceVM().sink(): recordings.count = \(recordings.count)")

    DispatchQueue.main.asyncAfter(deadline: .now()+1) {

    strongSelf.refreshControl?.endRefreshing()

    strongSelf.tableView.reloadData()

    }

    }

    .store(in: &cancellables)

    self.viewModel?.refresh()

    }

    }

    ```


    `AnyCancellable` 变量是一个令牌，代表一个活跃的 Combine 订阅，当它被释放时会自动取消。


    在 `initRemoteServicesVM()` 中创建 ViewModel 时，会通过构造函数将服务和端点注入对象。


    `sink()` 函数将用于订阅异步变更事件，这些事件会在 `recordings` 值发生变化时发布。检测到变化后，将在主线程（用于更新用户界面的线程）上重新加载表格视图，以反映这些变化。


    `store(in:)` 会将可取消令牌保存到一个集合（通常是 `Set<AnyCancellable>`）中，以便订阅在所有者对象存活期间保持活跃。


    `ViewModel.refresh()` 将触发 ViewModel 从服务获取数据并在视图中显示。


    ## 测试


    源代码的全面测试对于实现和维持软件应用程序的高质量水平至关重要，这可以在应用程序发布后降低未来的维护成本。单元测试、集成测试和 UI 测试应在代码开发过程中（或如果采用测试驱动开发方法，则在此之前）纳入软件开发流程。


    大多数 iOS 开发者都熟悉 Xcode 中用于创建测试的工具，特别是基于 XCTest 框架的工具。Xcode 16 引入了一个新的测试框架 Swift
    Testing。创建 Xcode 项目时，生成存根测试的选项现在包括 XCTest 和 Swift Testing。选择任一选项都会根据所选框架生成存根测试和测试计划。使用
    Swift Testing 创建的测试不会自动添加到测试计划中（截至 Xcode 26），但可以通过编辑测试计划并选择它们来轻松添加。


    `XCTest` 和 `Swift Testing` 之间的主要区别在于它们的结构和发现方式。XCTest 使用继承自 `XCTestCase` 的类，Xcode
    会自动查找以 test 开头的测试方法，并在测试导航器中显示它们。另一方面，Swift Testing 允许你在结构体中使用 `@Test` 和 `#expect`
    编写测试，这更加“Swift 化”并且能很好地处理并发，但 Xcode 不会自动检测它们。然而，如果你将 Swift Testing 测试添加到测试计划中，它们将出现在测试导航器中，让你可以像
    XCTest 测试一样在 Xcode 中运行它们。


    关于使用 XCTest 和 Swift Testing 框架编写单元测试、集成测试和 UI 测试的全面概述，可以在 Apple 开发者网站上找到。^(¹⁵)


    本章将演示使用模拟服务测试模型-视图-视图模型（MVVM）设计模式中的 ViewModel 部分。在 MVVM 设计中，服务被模拟以将 ViewModel
