    Region`，并勾选 `Localization Debugging`（SwiftUI 会自动将未本地化的文本显示为大写）

    2.  通过 Xcode 在 `Run Destinations` 下选择一台真机设备，然后点击运行以将 App 安装到设备上

    3.  在设备上，进入 `Settings/General/Language & Region`，然后 `Add Italian`（在提示时选择 `Use
    Italian`）

    4.  设备重启后，在设备上（在 Xcode 之外）运行 App 以查看结果（**图** **9-6**）


    在本章中，您对 `SettingsFW` 框架进行了本地化以支持多种语言，并应用了文本适配的最佳实践。通过完成这项工作，`ScratchTraxApp2`
    现在可以以不同语言显示设置，展示了如何为 iOS 框架做好面向国际用户的准备，同时保持模块化和可用性。


    在为框架做好面向国际用户的准备之后，您就可以探索如何让您的 App 在视觉上更具灵活性。在下一章中，我们将实现动态品牌化，以便在不更改代码的情况下，跨框架实现一致且集中的样式。


    脚注 1


    # 10. 在 iOS 框架中设计动态品牌化


    增强 `ScratchTraxApp2` App


    品牌化涉及为 App 创建一个独特且令人难忘的身份，确保在所有平台和素材上保持一致。品牌化的关键方面包括 App 图标、启动屏幕、调色板、排版、图像、图标设计、无障碍访问和
    UI 元素。


    关于品牌化、^(³⁰) 人机界面指南 (HIG)、^(³¹) `UIAppearance`、^(³²) 和配置^(³³) 的全面文档，可以在 Apple 开发者网站上找到。


    在本章中，我们将通过跨框架实现动态品牌化来增强 `ScratchTraxApp2` App。您将学习如何为 `UIKit` 和 `SwiftUI` 组件集中管理字体和样式属性，从而确保一致的
    App 身份。通过应用这些技术，您的 App 将能够在不修改底层代码的情况下动态更新品牌形象。


    ## 动态品牌化技术


    动态品牌化将首先通过 `UIKit` 组件进行演示，然后介绍 `SwiftUI` 组件。`UIKit` 元素将尽可能使用 `Configuration` 功能，否则使用替代技术。`SwiftUI`
    元素将利用 `Environment Keys`。将使用类、协议和结构体扩展来一致地应用品牌化。所有动态品牌化都将从集中位置进行管理，以确保由框架提供的 App
    用户界面在外观上保持一致。


    在 iOS 26+ 中，支持现代 `Configuration` 功能的 UIKit 组件包括：`UIButton`、`UIBarButtonItem`、`UISegmentedControl`、`UIToolbar`、`UITabBarItem`、`UITabBar`、`UINavigationBar`、嵌入在菜单中的
    `UIStackView` 按钮，以及通过内容配置实现的 `UICollectionView`/`UITableView` 单元格。不支持 `Configuration`
    功能并且仍然需要直接设置属性或使用 `UIAppearance` 功能的组件包括：`UILabel`、`UITextField`、`UITextView`、`UIImageView`、`UISlider`、`UISwitch`、`UIProgressView`、`UIActivityIndicatorView`
    以及大多数自定义的 `UIView` 子类。


    `SwiftUI` 组件将通过为适用的组件字体定义 `Environment Keys` 来进行品牌化。`View` 的扩展（例如 `.appBodyFont()`
    和 `.appButtonFont()`）会自动应用这些字体，从而确保整个 App 中所有 `SwiftUI` 组件的品牌形象保持一致。

