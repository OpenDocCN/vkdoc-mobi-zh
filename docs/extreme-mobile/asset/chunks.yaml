- fmt: '# Integrating a ViewModel into a View


    In order to complete the MVVM design pattern for this example, the ViewModel will
    need to be integrated into the View. The View in this example is managed by `RecordingsTVC`,
    created in Chapter [2](#678928_1_En_2_Chapter.xhtml).


    The Property List setting will be used to determine the mode of operation for
    the framework. A function called `showPublished()` will need to be created to
    read the Property List value and execute the corresponding code path. As before,
    the Property List will need to be loaded using the Bundle Identifier in order
    to work properly.


    **Fun Fact:** Notice the statement following the retrieval of the Property List
    value, which overrides the Property List value if a `UserDefaults` value is found.
    Later in the book, when In-App Purchases are integrated into the framework, `UserDefaults`
    will be used to do so.


    Integrate the following code into `RecordingsTVC` (don’t delete existing code):


    ```

    let publishedTitle = "Published Recordings"

    let localTitle = "Local Recordings"

    override func viewDidLoad() {

    if showPublished() {

    self.navigationItem.title = publishedTitle

    // Initialize published recordings

    initRemoteServiceVM()

    } else {

    self.navigationItem.title = localTitle

    // Initialize local recordings

    initLocalServiceVM()

    }

    }

    func showPublished() -> Bool {

    var showPublished = false

    if let bundle = Bundle(identifier:"com.gw.RecordingsFW"), let path = bundle.path(forResource:
    "Recordings", ofType: "plist"),

    let plistDict = NSDictionary(contentsOfFile: path) {

    showPublished = plistDict.object(forKey: "showPublished") as? Bool ?? false

    }

    if let features = UserDefaults.standard.object(forKey: "features") as? [String:String]
    {

    if let publishedValue = features["showPublished"], let published = Bool(publishedValue)
    {

    showPublished = published

    }

    }

    return showPublished

    }

    func initRemoteServiceVM() {

    // This will be completed in the next step…

    }

    ```


    ## Injecting Dependencies into a ViewModel


    Chapter [2](#678928_1_En_2_Chapter.xhtml) initialized a ViewModel for managing
    local audio recordings via `initLocalServiceVM()`. Chapter [3](#678928_1_En_3_Chapter.xhtml)
    will need to initialize a ViewModel for managing remote audio recordings via `initRemoteServiceVM()`.


    Integrate the following code into `RecordingsTVC` (don’t delete existing code):


    ```

    import Combine

    class RecordingsTVC: UITableViewController {

    private var cancellables: Set = []

    func initRemoteServiceVM() {

    self.viewModel = PublishedRecordingsViewModel(service: PublishedRecordingsService.shared,
    endpoint: .fetchRecordings)

    (self.viewModel as! PublishedRecordingsViewModel).$recordings

    .sink { [weak self] recordings in

    guard let strongSelf = self else { return }

    print("RecordingsTVC.initRemoteServiceVM().sink(): recordings.count = \(recordings.count)")

    DispatchQueue.main.asyncAfter(deadline: .now()+1) {

    strongSelf.refreshControl?.endRefreshing()

    strongSelf.tableView.reloadData()

    }

    }

    .store(in: &cancellables)

    self.viewModel?.refresh()

    }

    }

    ```


    The `AnyCancellable` variable is a token that represents an active Combine subscription,
    which is automatically cancelled when it’s deallocated.


    The creation of the ViewModel in `initRemoteServicesVM()` will inject the service
    and endpoint into the object via constructor.


    The `sink()` function will be used to subscribe to asynchronous change events
    that will be published whenever the `recordings` value changes. When a change
    is detected, the table view will be reloaded on the main thread (which is the
    thread used to update the User Interface) to reflect the changes.


    `store(in:)` will save the cancellables tokens into a collection (usually a `Set<AnyCancellable>`)
    so the subscriptions stay alive for as long as the owner object does.


    `ViewModel.refresh()` will trigger the ViewModel to fetch data from the service
    and display it in the View.


    ## Testing


    Full test coverage of source code is critical to achieve and maintain a high level
    of quality in software applications, which reduces future maintenance costs once
    applications are released. Unit, Integration, and UI Tests should be incorporated
    into the software development process as code is being developed (or beforehand
    if a Test-Driven Development approach is being used).


    Most iOS developers are familiar with Xcode tools available for creating tests,
    specifically those based on the XCTest framework. A new testing framework, Swift
    Testing, was introduced in Xcode 16. When creating an Xcode project, the option
    for generating stub tests now includes XCTest and Swift Testing. Choosing either
    option will generate stub tests based on the framework selected, and a Test Plan.
    Tests created using Swift Testing are not automatically added to the Test Plan
    (as of Xcode 26), but they can be easily added by editing the Test Plan and selecting
    them.


    The main difference between `XCTest` and `Swift Testing` is how they’re structured
    and discovered. XCTest uses classes that inherit from `XCTestCase`, and Xcode
    automatically finds test methods starting with test, showing them in the Test
    navigator. Swift Testing, on the other hand, lets you write tests in structs using
    `@Test` and `#expect`, which is more “Swift-like” and works well with concurrency,
    but Xcode doesn’t automatically detect them. However, if you add your Swift Testing
    tests to a Test Plan, they will appear in the Test navigator, letting you run
    them inside Xcode just like XCTest tests.


    A comprehensive overview of writing Unit, Integration, and UI Tests using the
    XCTest and Swift Testing framework can be found on the Apple developer website.^([^(15)](#fn15))


    This chapter will demonstrate testing a ViewModel portion of a Model-View-ViewModel
    (MVVM) design pattern using a mock service. In an MVVM design, the service is
    mocked to isolate the ViewModel’s logic from external dependencies. Mocks provide
    predictable, hard-coded data or simulated errors, allowing tests to be fast, reliable,
    and repeatable without relying on network conditions or a live API. This also
    makes it easy to test edge cases, such as parsing failures or empty responses,
    ensuring the ViewModel handles all scenarios correctly while keeping tests focused
    purely on its behavior.


    Under the `RecordingsFWTests` folder (created when the project was created), select
    `RecordingsFWTests.swift` and import the Foundation and Combine frameworks (the
    Testing and RecordingsFW frameworks should already be imported, with RecordingsFW
    marked as `@testable`):


    ```

    import Foundation

    import Combine

    import Testing

    @testable import RecordingsFW

    ```


    A mock service based on the `StubAPIService` protocol (created earlier in the
    chapter) will be created to return canned data identical to that of the `PublishedRecordingsService`
    API. It will define a `MockMode` enum to simulate different scenarios (success,
    networkError, parsingError) and provide a hard-coded list of sample `Recording`
    objects similar to the API. The `fetch` method will return a Combine publisher
    that either emits the recordings or fails with a simulated error depending on
    the current mode, allowing tests to verify how the ViewModel handles various responses.


