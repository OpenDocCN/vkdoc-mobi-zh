    \n在方案下拉菜单中选择该应用作为当前方案，构建应用，并使用某个 Xcode 模拟器或真机运行它。代码应能正常编译和运行。结果应与**图 8-1** 中的截图一致。\n\
    \n![一张在 iPhone 17 Pro Max 上显示的移动应用界面截图。应用屏幕标题为“添加功能”，列出了购买功能的选项：“发布录音”售价 3.99\
