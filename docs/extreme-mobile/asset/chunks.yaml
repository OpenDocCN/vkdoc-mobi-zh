- fmt: "# Creating a SwiftData Manager\n\n`SwiftData`, introduced in iOS 17, is a\
    \ modern transformation of Core Data, built entirely for Swift and tightly integrated\
    \ with SwiftUI. It uses Swift-native model types marked with the `@Model` attribute\
    \ instead of `.xcdatamodeld` files, automatically handles model schema evolution,\
    \ and provides a simpler, type-safe API. Data is stored in a `ModelContainer`,\
    \ queried through `FetchDescriptor`s, and saved via a lightweight `ModelContext`.\
    \ It also integrates seamlessly with SwiftUI’s `@Query` and `@Environment(\\.modelContext)`\
    \ to automatically update views when data changes. Essentially, SwiftData replaces\
    \ Core Data’s complexity with a modern, declarative, and Swift-first design.\n\
    \nSwiftData^([^(17)](#fn17)) will be used to persist simulated In-App Purchases.\
    \ In-App Purchase transactions and receipts are typically fetched from the Apple\
    \ App Store when an app is launched, becomes active, or receives a transaction\
    \ state change related to a purchase. SwiftData will be used to enable features\
    \ that require purchase. The following section will explain how to integrate SwiftData\
    \ into an iOS Framework.\n\n**Create a new file to manage SwiftData interactions:**\n\
