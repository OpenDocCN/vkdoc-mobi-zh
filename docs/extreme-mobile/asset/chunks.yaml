    \ MockMode {\n        case success\n        case networkError\n        case parsingError\n\
    \    }\n    var mode: MockMode = .success\n    private let recordings: [Recording]\
    \ = [\n        Recording(bitrate: 131_072,\n                  copyright: \"© 2025\
    \ Words and Music by John Doe\",\n                  date: \"04/28/2025\",\n  \
    \                length: 270,\n                  size: 5 * 1024 * 1024,\n    \
    \              title: \"My Electric Guitar Anthem\",\n                  type:\
    \ \"AAC Audio File\",\n                  url: \"https://graphixware.com/MyElectricAnthem.aac\"\
    ),\n        Recording(bitrate: 131_072,\n                  copyright: \"© 2025\
    \ Words and Music by John Doe\",\n                  date: \"08/24/2025\",\n  \
    \                length: 228,\n                  size: 10 * 1024 * 1024,\n   \
    \               title: \"My Acoustic Guitar Ballad\",\n                  type:\
    \ \"AAC Audio File\",\n                  url: \"https://graphixware.com/MyAcousticBallad.aac\"\
    )\n    ]\n    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T : Decodable\
    \ {\n        switch mode {\n        case .networkError:\n            return Fail(error:\
    \ RecordingsError.network(message: \".networkError: Simulated network error\"\
    ))\n                .eraseToAnyPublisher()\n        case .parsingError:\n    \
    \        return Fail(error: RecordingsError.parsing(message: \".parsingError:\
    \ Simulated parsing error\"))\n                .eraseToAnyPublisher()\n      \
    \  case .success:\n            guard let result = recordings as? [T] else {\n\
    \                return Fail(error: RecordingsError.parsing(message: \".success:\
    \ Type mismatch\"))\n                    .eraseToAnyPublisher()\n            }\n\
    \            return Just(result)\n                .setFailureType(to: RecordingsError.self)\n\
    \                .eraseToAnyPublisher()\n        }\n    }\n}\n```\n\n在此示例中，需要创建一个\
    \ `Publisher` 扩展，用于异步等待发布者发出满足给定条件的值。它使用 `withCheckedContinuation` 来暂停异步函数，直到满足条件或发生超时，从而简化在异步上下文中测试\
    \ `@Published` 属性的操作。\n\n将以下代码添加到类中：\n\n```swift\nextension Publisher {\n    func\
    \ waitForValue(\n        timeout: Duration = .seconds(1),\n        condition:\
    \ @escaping (Output) -> Bool\n    ) async -> Output? {\n        await withCheckedContinuation\
    \ { continuation in\n            var cancellable: AnyCancellable?\n          \
    \  let deadline = ContinuousClock.now + timeout\n            cancellable = self.sink(\n\
    \                receiveCompletion: { _ in\n                    continuation.resume(returning:\
    \ nil)\n                    cancellable?.cancel()\n                },\n      \
    \          receiveValue: { value in\n                    if condition(value) {\n\
    \                        continuation.resume(returning: value)\n             \
    \           cancellable?.cancel()\n                    }\n                })\n\
    \            Task {\n                try? await Task.sleep(until: deadline, clock:\
    \ .continuous)\n                continuation.resume(returning: nil)\n        \
    \        cancellable?.cancel()\n            }\n        }\n    }\n}\n```\n\n需要创建一个基于\
    \ `Publisher` 扩展的扩展，使其专门与任何 `ObservableObject` 中的 `@Published` 属性配合使用。它允许测试异步等待属性达到所需状态（例如加载完成或数据更新），从而提高测试的可读性和可靠性。\n\
    \n将以下代码添加到类中：\n\n```swift\nextension ObservableObject {\n    func waitForPublishedValue(\n\
    \        _ keyPath: KeyPath.Publisher>,\n        timeout: Duration = .seconds(1),\n\
    \        condition: @escaping (Value) -> Bool\n    ) async -> Value? {\n     \
    \   let publisher = self[keyPath: keyPath]\n        return await publisher.waitForValue(timeout:\
    \ timeout, condition: condition)\n    }\n}\n```\n\n需要创建一个基于 `PublishedRecordingsViewModel`\
    \ 的扩展，为 `recordings` 属性封装泛型的 `waitForPublishedValue` 方法。它允许测试轻松等待录音数组更新，而无需编写重复的\
    \ Combine 代码，从而简化 ViewModel 的异步单元测试。\n\n将以下代码添加到类中：\n\n```swift\nextension PublishedRecordingsViewModel\
    \ {\n    func waitForRecordings(\n        timeout: Duration = .seconds(1),\n \
    \       condition: @escaping ([Recording]) -> Bool\n    ) async -> [Recording]?\
    \ {\n        await waitForPublishedValue(\\.$recordings, timeout: timeout, condition:\
    \ condition)\n    }\n}\n```\n\n最后，需要添加测试用例，基于 `MockMode` 枚举定义的用例来测试 ViewModel。这些测试包含使用\
    \ `@Test` 和 `#expect` 的 Swift Testing 测试用例。每个方法测试 `PublishedRecordingsViewModel`\
    \ 的不同场景：成功获取、网络错误、解析错误以及泛型 `@Published` 属性辅助方法。测试异步运行，使用模拟服务控制行为，并通过 `#expect`\
    \ 断言预期结果，展示了 ViewModel 如何在 Swift 原生、并发友好的测试风格下响应不同条件。\n\n将以下代码添加到类中：\n\n```swift\n\
    @MainActor\nstruct PublishedRecordingsViewModelTests {\n    @Test(\"成功获取录音\")\n\
    \    func testFetchRecordingsSuccess() async throws {\n        let mockService\
    \ = MockRecordingsService()\n        mockService.mode = .success\n        let\
    \ viewModel = PublishedRecordingsViewModel(\n            service: mockService,\n\
    \            endpoint: .fetchRecordings\n        )\n        viewModel.fetch()\n\
    \        let recordings = await viewModel.waitForRecordings { !$0.isEmpty }\n\
    \        #expect(recordings?.count == 2)\n        #expect(recordings?.first?.title\
    \ == \"My Electric Guitar Anthem\")\n        #expect(recordings?.last?.title ==\
    \ \"My Acoustic Guitar Ballad\")\n    }\n    @Test(\"正确处理网络错误\")\n    func testFetchRecordingsNetworkError()\
    \ async throws {\n        let mockService = MockRecordingsService()\n        mockService.mode\
    \ = .networkError\n        let viewModel = PublishedRecordingsViewModel(\n   \
    \         service: mockService,\n            endpoint: .fetchRecordings\n    \
    \    )\n        viewModel.fetch()\n        let recordings = await viewModel.waitForRecordings\
    \ { $0.isEmpty }\n        #expect(recordings?.isEmpty == true)\n    }\n    @Test(\"\
    正确处理解析错误\")\n    func testFetchRecordingsParsingError() async throws {\n     \
    \   let mockService = MockRecordingsService()\n        mockService.mode = .parsingError\n\
    \        let viewModel = PublishedRecordingsViewModel(\n            service: mockService,\n\
    \            endpoint: .fetchRecordings\n        )\n        viewModel.fetch()\n\
    \        let recordings = await viewModel.waitForRecordings { $0.isEmpty }\n \
    \       #expect(recordings?.isEmpty == true)\n    }\n    @Test(\"正确使用泛型 @Published\
    \ 辅助方法\")\n    func testGenericWaitForPublishedValue() async throws {\n      \
    \  class DummyViewModel: ObservableObject {\n            @Published var isLoading\
    \ = true\n            func finishLoading() { isLoading = false }\n        }\n\
    \        let dummy = DummyViewModel()\n        Task {\n            try? await\
    \ Task.sleep(for: .milliseconds(200))\n            dummy.finishLoading()\n   \
    \     }\n        let isDone = await dummy.waitForPublishedValue(\\.$isLoading)\
    \ { $0 == false }\n        #expect(isDone == false)\n    }\n}\n```\n\n为了运行测试用例，如果它们尚未出现在测试导航器中，则需要将它们添加到测试计划中，具体操作如下：\n\
