    # 本地化视图控制器


    在开发包含用户界面的 iOS 框架时，最好对相关代码进行本地化，以简化未来的国际化工作。本书示例项目中使用到的界面显示文本，为了清晰起见，特意采用了硬编码。本章将逐步讲解将
    `SettingsFW` 框架本地化为多种语言所需的步骤。


    `SettingsTVC` 类定义了框架的用户界面，其中包含三个 `UILabel` 组件：`nameLabel`、`emailLabel` 和 `websiteLabel`。当视图加载时，必须使用相应语言文件中的值来正确初始化这些标签。在生产应用中，对应的值标签
    `nameValueLabel`、`emailValueLabel` 和 `websiteValueLabel` 通常会通过网络 API 请求动态设置。然而，在本示例中，这些值仍保持硬编码。


    将使用 `String`（这是 Swift 中用于本地化字符串的新式且更推荐的方式）从相应的语言文件中检索 `UILabel` 的值，而不是使用旧的 `NSLocalizedString`。


    ```

    String("settingsTVCUILabelName", bundle: Bundle(for: SettingsTVC.self), comment:
    "设置视图中的“姓名”字段标签")

    ```


    第一个参数是在相应语言文件中定义的键（Key）。虽然对键没有严格的命名规范，但它们在框架代码库中必须唯一，并且在执行翻译时应易于识别。当键值对数量很大时，这一点尤其重要。如果在翻译文件中找不到某个键，则会显示该键本身。


    **注意**：Xcode 的字符串目录编辑器会将点分隔、连字符分隔、下划线分隔以及驼峰式的键转换为小驼峰形式。如果希望键采用特定格式，可以手动编辑 Strings
    目录（右键点击 -> 打开为/源代码）。


    第二个参数是框架的包标识符（bundle ID），这对函数正常工作至关重要。如果使用的 `String()` 变体不包含包标识符，该函数将尝试从应用的语言文件（而非框架的语言文件）中检索字符串，从而导致失败。


    第三个参数是为翻译人员提供上下文的注释。它不会出现在应用的 UI 中，但在使用 Xcode 的"导出用于本地化"功能提取本地化字符串时，它会存储在生成的翻译文件中。由于注释参数将由
    String Catalog 提供，因此可以省略。


    将 `String()` 集成到 `SettingsTVC` 类中，以本地化设置功能中的可显示文本：


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    let frameworkBundle = Bundle(for: SettingsTVC.self)

    self.navigationItem.title = String(localized: "settingsTVCUINavigationItemTitle",
    bundle: frameworkBundle)

    self.nameLabel.text = String(localized: "settingsTVCUILabelName", bundle: frameworkBundle)

    self.emailLabel.text = String(localized: "settingsTVCUILabelEmail", bundle: frameworkBundle)

    self.websiteLabel.text = String(localized: "settingsTVCUILabelWebsite", bundle:
    frameworkBundle)

    }

    ```


    ## 创建字符串目录


    为 `SettingsFW` 框架创建一个字符串目录：


    ![开发环境中创建新文件的文件模板选择窗口截图。选项包括 "String Catalog"、"Strings File (Legacy)" 和 "Stringsdict
    File (Legacy)"。界面显示了适用于不同平台的标签，如 iOS、macOS、watchOS、tvOS、visionOS 和 DriverKit。右上角的搜索栏中包含术语
    "string"。"Next" 按钮在右下角以橙色高亮显示。](img/678928_1_En_9_Fig1_HTML.jpg)


    **图 9-1** 字符串目录模板


    1. 在 `Project Navigator` 中右键点击 `SettingsFW` 文件夹，然后选择 `New File from Template…`

    2. 在 `Resource` 组下选择 `String Catalog` 模板，然后点击 `Next`（**图** **9-1**）

    3. 将文件命名为 `Localizable.xcstrings`


    ## 向字符串目录添加本地化语言


    向字符串目录添加英语 (en)、法语 (fr) 和意大利语 (it) 的本地化：


    1. 在 `Project Navigator` 中选择 `.xcstrings` 文件

    2. 通过 `Localizations Navigator` 左下角的 + 图标选择 `Add new language`，先添加 `French (fr)`，然后添加
    `Italian (it)`，因为英语 (en) 是默认创建的


    ## 向英语本地化添加值


    向英语本地化添加值：


    ![Xcode 界面截图，显示一个名为 "ScratchTraxApp" 的项目。左侧面板显示包含多个文件的目录，其中 "SettingsFW.xcstrings"
    被选中。中央面板列出了用于本地化的键值对，键包括 "settingsTVCUILabelName" 等，对应的英文翻译如 "Name" 和 "Settings"。右侧面板显示所选文件的详细信息，包括文件名和位置。底部面板显示调试消息："Message
    from debugger: killed."](img/678928_1_En_9_Fig2_HTML.jpg)


    **图 9-2** 字符串目录编辑器


    1. 在 `String Catalog Navigator` 中选择 `English`

    2. 在空白的 English 本地化编辑器中使用左上角的 + 图标选择 `Add a new manual string`，将 Key 设置为 `settingsTVCUINavigationItemTitle`，English
    (en) 设置为 `Settings`，Comment 设置为 "`设置视图的标题`"（**图** **9-2**）

    3. 对其余字符串重复步骤 2


    ## 向法语本地化添加值


    向法语本地化添加值：


    1. 在 `String Catalog Navigator` 中选择 `French`

    2. 在空白的 English 本地化编辑器中使用左上角的 + 图标选择 `Add a new manual string`，将 Key 设置为 `settingsTVCUINavigationItemTitle`，French
    (fr) 设置为 `Settings` 🇫🇷（你可以通过 Control-Command-Space 并搜索 France 来添加法国表情符号），并将 Comment
    设置为 "`设置视图的标题`"

    3. 对其余字符串重复步骤 2


    ## 向意大利语本地化添加值


    向意大利语本地化添加值：


    1. 在 `String Catalog Navigator` 中选择 `Italian`

    2. 在空白的 English 本地化编辑器中使用左上角的 + 图标选择 `Add a new manual string`，将 Key 设置为 `settingsTVCUINavigationItemTitle`，Italian
    (it) 设置为 `Settings` 🇮🇹（你可以通过 Control-Command-Space 并搜索 Italy 来添加意大利表情符号），并将 Comment
    设置为 "`设置视图的标题`"

    3. 对其余字符串重复步骤 2

