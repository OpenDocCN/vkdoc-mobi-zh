    # 3. 为可复用框架设计通用、解耦的架构


    扩展`RecordingsFW`框架


    上一章设计的框架支持管理**本地**音频录音。随着本书内容的深入，它将与其他框架结合，构建一个“录音室”风格的应用程序。本章将增强该框架，以支持在独立的移动应用中显示**远程**音频录音（即“已发布录音”）。运行模式将通过属性列表（`Property
    List`）进行控制。网络API将集成到远程服务中，并在模型-视图-视图模型（MVVM）设计模式中使用。


    本章还将使用一种名为依赖注入（Dependency Injection）的软件设计模式。依赖注入是一种编程技术，它将对象的隐式依赖关系显式化，允许对象在构造时或通过函数调用从其他对象接收这些依赖关系。⁽⁷⁾
    在本例中，依赖注入将通过构造函数注入API服务和端点，在框架的`ViewModel`中使用。由于`ViewModel`不关心服务的具体实现，因此如果服务被替换，`ViewModel`也无需更改。


    除了依赖注入，本章还将整合Combine来处理和发布网络API请求的结果。Combine框架提供了一种声明式的Swift API，用于处理随时间变化的值。这些值可以代表多种类型的异步事件。Combinen声明了发布者以公开值，并声明了订阅者以从发布者接收这些值。有关Combine框架的文档，可在Apple开发者网站上获取。⁽⁸⁾


    简而言之，本章将扩展`RecordingsFW`框架以支持远程音频录音，同时保持其可扩展性和可复用性。将使用属性列表来控制框架的运行模式。网络API将使用依赖注入集成到MVVM模式中，以将`ViewModel`与服务实现解耦。我们将利用Combine来处理和发布异步网络结果，确保该框架能够生成多个移动应用，而无需修改代码。


    ## 创建属性列表


