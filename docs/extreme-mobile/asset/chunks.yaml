- fmt: '## Running the App Target


    将`RecordingsApp`设置为方案下拉菜单中的活动方案，构建应用程序，并使用某个Xcode模拟器或实际设备运行它。应用程序应能正常编译和运行，并展示相应的框架功能（**图**
    [**2-2**](#678928_1_En_2_Chapter.xhtml#Fig2)）。


    ![A screenshot of a development environment displaying an iOS simulator running
    an app called “Local Recordings.” The app interface shows two music recordings:
    “My Acoustic Guitar Ballad” and “My Electric Guitar Anthem,” both credited to
    John Doe with a copyright date of 2025\. The simulator is shown on an iPhone 17
    Pro Max with iOS 26.0\. The development environment includes a project directory
    with files related to the app’s code and settings.](images/678928_1_En_2_Chapter/678928_1_En_2_Fig2_HTML.jpg)


    **图 2-2** Xcode 模拟器


    在本章中，您学习了如何使用MVVM模式设计iOS框架，以分离关注点并促进软件解耦。您将本地文件服务集成到了UI中，探索了协议驱动设计，并为将来使用更通用的解决方案增强框架做好了准备。通过应用这些现代设计模式，您创建了一个可扩展、可维护且可在多个应用程序中复用的框架。


    借助基于MVVM构建并采用模块化设计的`RecordingsFW`框架，您现在已准备好使其更加通用。在下一章中，我们将扩展该框架以处理远程数据，集成网络服务，并应用高级设计模式来创建可复用且解耦的架构。


