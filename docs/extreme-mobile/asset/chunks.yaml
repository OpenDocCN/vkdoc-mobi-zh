  raw: '## Creating a SwiftData Manager


    SwiftData, introduced in iOS 17, is a modern transformation of Core Data, built
    entirely for Swift and tightly integrated with SwiftUI. It uses Swift-native model
    types marked with the @Model attribute instead of .xcdatamodeld files, automatically
    handles model schema evolution, and provides a simpler, type-safe API. Data is
    stored in a ModelContainer, queried through FetchDescriptors, and saved via a
    lightweight ModelContext. It also integrates seamlessly with SwiftUI’s @Query
    and @Environment(\.modelContext) to automatically update views when data changes.
    Essentially, SwiftData replaces Core Data’s complexity with a modern, declarative,
    and Swift-first design.


    SwiftData^([^(17)](#fn17)) will be used to persist simulated In-App Purchases.
    In-App Purchase transactions and receipts are typically fetched from the Apple
    App Store when an app is launched, becomes active, or receives a transaction state
    change related to a purchase. SwiftData will be used to enable features that require
    purchase. The following section will explain how to integrate SwiftData into an
    iOS Framework.


    **Create a new file to manage SwiftData interactions:**


    1.  Right-click the folder within the **Project Navigator** and select **New File
    from Template…**


    2.  Select the **Swift File** template under the **Source** group and save the
    file as **SwiftDataManager.swift**


    **Import the required frameworks:**


    ```

    import Foundation

    import SwiftData

    import Combine

    ```


    **Define the SwiftData models:**


    In SwiftData, models are defined as pure Swift types annotated with @Model. This
    replaces Core Data’s .xcdatamodeld file and NSManagedObject subclasses. Each stored
    property automatically becomes a persisted attribute, so entities or attribute
    types don’t need to be manually defined.


    The @Attribute(.unique) modifier ensures that each record `id` is unique across
    the data store, similar to a primary key.


    SwiftData automatically generates schema metadata, migration support, and persistent
    storage for this class, so a Core Data model file no longer needs to be maintained.


    ```

    @Model

    public final class Configuration {

    @Attribute(.unique) public var id: UUID

    public var publishRecordings: Bool

    public var trackCount: Int16

    public init(id: UUID = UUID(), publishRecordings: Bool = false, trackCount: Int16
    = 0) {

    self.id = id

    self.publishRecordings = publishRecordings

    self.trackCount = trackCount

    }

    }

    ```


    **Define the Class:**


    SwiftDataManager will be implemented as a singleton to ensure the app interacts
    with one consistent persistence layer throughout its life cycle.


    It will conform to ObservableObject so it can integrate directly with SwiftUI’s
    data flow. Any SwiftUI view that observes SwiftDataManager.shared using @StateObject
    or @ObservedObject will automatically refresh when one of its @Published properties
    changes.


    A Configuration property will be defined and marked as @Published, so that when
    the app loads, saves, or modifies it, SwiftUI views instantly update.


    A **ModelContainer** and **ModelContext** will also be defined. ModelContainer
    replaces Core Data’s NSPersistentContainer and defines which models exist in the
    schema and where data is stored. ModelContext replaces NSManagedObjectContext
    and allows interactions such as insert, fetch, update, and delete with those models.


    ```

    public class SwiftDataManager: ObservableObject {

    public static let shared = SwiftDataManager()

    @Published public var configuration: Configuration?

    private let modelContainer: ModelContainer

    private let context: ModelContext

    }

    ```


    **Initialize the SwiftData environment:**


    The class initializer will build the entire SwiftData environment at launch. ModelContainer(for:
    Configuration.self) will create a container managing only the Configuration model,
    and ModelContext(modelContainer) will establish the working context for persistence
    operations.


    fetchConfiguration() will immediately load any existing configuration from disk
    into the observable Configuration property, ensuring the app always starts with
    up-to-date settings.


    ```

    private init() {

    do {

    // Correct initialization of ModelContainer

    modelContainer = try ModelContainer(for: Configuration.self)

    context = ModelContext(modelContainer)

    fetchConfiguration()

    } catch {

    fatalError("Failed to create ModelContainer: \(error)")

    }

    }

    public func fetchConfiguration() {

    let fetchDescriptor = FetchDescriptor()

    do {

    if let firstConfig = try context.fetch(fetchDescriptor).first {

    self.configuration = firstConfig

    }

    } catch {

    print("Fetch failed: \(error)")

    }

    }

    ```


    **Persist the SwiftData models and context:**


    saveConfiguration() will update an existing configuration or create a new one
    if none exists. If a new instance is created, it will be inserted into the context
    and then populated with the new values. After applying updates to the configuration
    model, it will call context.save() to commit in-memory changes to the persistent
    store.


    ```

    public func saveConfiguration(existing: Configuration? = nil, publishRecordings:
    Bool, trackCount: Int16) {

    let config: Configuration

    if let existing = existing {

    config = existing

    } else {

    config = Configuration()

    context.insert(config)

    }

    config.publishRecordings = publishRecordings

    config.trackCount = trackCount

    do {

    try context.save()

    self.configuration = config

    } catch {

    print("Save failed: \(error)")

    }

    }

    ```


    ## Configuring a Stub API Service


    This chapter will use a stub API service called OHHTTPStubs to return JSON data,
    representing In-App Purchases, from a simulated network API request. Dependency
    Injection will be used to inject the service and endpoint into the ViewModel,
    similar to how it was done in Chapter [3](#678928_1_En_3_Chapter.xhtml). Use of
    this pattern reinforces decoupling.


    Create a file called **IAP****.json** to hold the following JSON data to represent
    available In-App Purchases:


    ```

    [

    {

    "category": "Publishing",

    "name": "Publish Recordings",

    "price": 3.99,

    "type": "publishRecordings" },

    {

    "category": "Recording",

    "name": "2 Recording Tracks",

    "price": 0.99,

    "type": "twoTracks" },

    {

    "category": "Recording",

    "name": "3 Recording Tracks",

    "price": 1.99,

    "type": "threeTracks" },

    {

    "category": "Recording",

    "name": "4 Recording Tracks",

    "price": 2.99,

    "type": "fourTracks" }

    ]

    ```


    Create a new class named **IAP.swift** and define an enum for the endpoint. The
    URL in **.fetchInAppPurchases** is arbitrary, but the host should match the one
    that will be used when the stub API service is integrated:


    ```

    enum IAPEndpoint {

    case fetchInAppPurchases

    var urlString: String {

    switch self {

    case .fetchInAppPurchases:

    return "https://graphixware.com/iaps"

    }

    }

    }

    ```


    Define an enum to map error conditions:


    ```

    enum IAPError: Error {

    case request(message: String)

    case network(message: String)

    case status(message: String)

    case parsing(message: String)

    case other(message: String)

    }

    ```'
  trans: "\n# 创建 SwiftData 管理器\n\n`SwiftData` 于 iOS 17 中引入，是 Core Data 的现代化转型，专为 Swift\
    \ 构建并与 SwiftUI 紧密集成。它使用以 `@Model` 属性标记的 Swift 原生模型类型，取代了 `.xcdatamodeld` 文件，自动处理模型架构演进，并提供了更简单的类型安全\
    \ API。数据存储在 `ModelContainer` 中，通过 `FetchDescriptor` 进行查询，并通过轻量级的 `ModelContext`\
    \ 保存。它还能与 SwiftUI 的 `@Query` 和 `@Environment(\\.modelContext)` 无缝集成，在数据变化时自动更新视图。本质上，SwiftData\
    \ 用现代、声明式且以 Swift 为先的设计取代了 Core Data 的复杂性。\n\nSwiftData^(¹⁷) 将用于持久化模拟的应用内购买。应用内购买的交易和收据通常在应用启动、变为活跃状态或接收到与购买相关的交易状态变化时从\
    \ Apple App Store 获取。SwiftData 将用于启用需要购买的功能。以下部分将解释如何将 SwiftData 集成到 iOS Framework\
    \ 中。\n\n**创建一个新文件来管理 SwiftData 交互：**\n\n1.  在 **项目导航器** 中右键点击文件夹，然后选择 **来自模板的新文件…**\n\
    2.  在 **Source** 组下选择 **Swift 文件** 模板，并将文件保存为 **SwiftDataManager.swift**\n\n**导入所需的框架：**\n\
    \n```swift\nimport Foundation\nimport SwiftData\nimport Combine\n```\n\n**定义 SwiftData\
    \ 模型：**\n\n在 SwiftData 中，模型被定义为使用 `@Model` 注解的纯 Swift 类型。这取代了 Core Data 的 `.xcdatamodeld`\
    \ 文件和 `NSManagedObject` 子类。每个存储属性都会自动成为持久化属性，因此无需手动定义实体或属性类型。\n\n`@Attribute(.unique)`\
    \ 修饰符确保每个记录的 `id` 在数据存储中是唯一的，类似于主键。\n\nSwiftData 会自动为此类生成架构元数据、迁移支持和持久化存储，因此不再需要维护\
    \ Core Data 模型文件。\n\n```swift\n@Model\npublic final class Configuration {\n  \
    \  @Attribute(.unique) public var id: UUID\n    public var publishRecordings:\
    \ Bool\n    public var trackCount: Int16\n    public init(id: UUID = UUID(), publishRecordings:\
    \ Bool = false, trackCount: Int16 = 0) {\n        self.id = id\n        self.publishRecordings\
    \ = publishRecordings\n        self.trackCount = trackCount\n    }\n}\n```\n\n\
    **定义类：**\n\n`SwiftDataManager` 将作为单例实现，以确保应用在其整个生命周期内与一个一致的持久化层交互。\n\n它将遵循 `ObservableObject`\
    \ 协议，以便直接与 SwiftUI 的数据流集成。任何使用 `@StateObject` 或 `@ObservedObject` 观察 `SwiftDataManager.shared`\
    \ 的 SwiftUI 视图，当其某个 `@Published` 属性发生变化时，都会自动刷新。\n\n将定义一个 `Configuration` 属性并标记为\
    \ `@Published`，这样当应用加载、保存或修改该属性时，SwiftUI 视图会立即更新。\n\n此外，还会定义 `ModelContainer`\
    \ 和 `ModelContext`。`ModelContainer` 取代了 Core Data 的 `NSPersistentContainer`，用于定义架构中存在哪些模型以及数据存储的位置。`ModelContext`\
    \ 取代了 `NSManagedObjectContext`，允许对模型执行插入、获取、更新和删除等操作。\n\n```swift\npublic class\
    \ SwiftDataManager: ObservableObject {\n    public static let shared = SwiftDataManager()\n\
    \    @Published public var configuration: Configuration?\n    private let modelContainer:\
    \ ModelContainer\n    private let context: ModelContext\n}\n```\n\n**初始化 SwiftData\
    \ 环境：**\n\n类初始化器将在启动时构建完整的 SwiftData 环境。`ModelContainer(for: Configuration.self)`\
    \ 将创建一个仅管理 `Configuration` 模型的容器，`ModelContext(modelContainer)` 将为持久化操作建立工作上下文。\n\
    \n`fetchConfiguration()` 将立即从磁盘加载任何现有的配置到可观察的 `Configuration` 属性中，确保应用始终以最新的设置启动。\n\
    \n```swift\nprivate init() {\n    do {\n        // 正确初始化 ModelContainer\n    \
    \    modelContainer = try ModelContainer(for: Configuration.self)\n        context\
    \ = ModelContext(modelContainer)\n        fetchConfiguration()\n    } catch {\n\
    \        fatalError(\"创建 ModelContainer 失败: \\(error)\")\n    }\n}\n\npublic func\
    \ fetchConfiguration() {\n    let fetchDescriptor = FetchDescriptor<Configuration>()\n\
    \    do {\n        if let firstConfig = try context.fetch(fetchDescriptor).first\
    \ {\n            self.configuration = firstConfig\n        }\n    } catch {\n\
    \        print(\"获取失败: \\(error)\")\n    }\n}\n```\n\n**持久化 SwiftData 模型和上下文：**\n\
    \n`saveConfiguration()` 将更新现有配置，如果不存在则创建新配置。如果创建了新实例，它将被插入到上下文中，然后填充新值。在将更新应用到配置模型后，它将调用\
    \ `context.save()` 将内存中的更改提交到持久化存储。\n\n```swift\npublic func saveConfiguration(existing:\
    \ Configuration? = nil, publishRecordings: Bool, trackCount: Int16) {\n    let\
    \ config: Configuration\n    if let existing = existing {\n        config = existing\n\
    \    } else {\n        config = Configuration()\n        context.insert(config)\n\
    \    }\n    config.publishRecordings = publishRecordings\n    config.trackCount\
    \ = trackCount\n    do {\n        try context.save()\n        self.configuration\
    \ = config\n    } catch {\n        print(\"保存失败: \\(error)\")\n    }\n}\n```\n\
    \n# 配置桩 API 服务\n\n本章将使用名为 OHHTTPStubs 的桩 API 服务，从模拟的网络 API 请求中返回代表应用内购买的 JSON\
    \ 数据。将使用依赖注入将服务和端点注入到 ViewModel，这与第 3 章中的做法类似。使用此模式有助于解耦。\n\n创建一个名为 `IAP.json`\
    \ 的文件，包含以下代表可用应用内购买的 JSON 数据：\n\n```json\n[\n    {\n        \"category\": \"发布\"\
    ,\n        \"name\": \"发布录音\",\n        \"price\": 3.99,\n        \"type\": \"\
    publishRecordings\"\n    },\n    {\n        \"category\": \"录音\",\n        \"\
    name\": \"2 个录音轨道\",\n        \"price\": 0.99,\n        \"type\": \"twoTracks\"\
    \n    },\n    {\n        \"category\": \"录音\",\n        \"name\": \"3 个录音轨道\"\
    ,\n        \"price\": 1.99,\n        \"type\": \"threeTracks\"\n    },\n    {\n\
    \        \"category\": \"录音\",\n        \"name\": \"4 个录音轨道\",\n        \"price\"\
    : 2.99,\n        \"type\": \"fourTracks\"\n    }\n]\n```\n\n创建一个名为 `IAP.swift`\
    \ 的新类，并为端点定义一个枚举。`.fetchInAppPurchases` 中的 URL 是任意的，但主机名应与集成桩 API 服务时将使用的主机名匹配：\n\
    \n```swift\nenum IAPEndpoint {\n    case fetchInAppPurchases\n    var urlString:\
    \ String {\n        switch self {\n        case .fetchInAppPurchases:\n      \
    \      return \"https://graphixware.com/iaps\"\n        }\n    }\n}\n```\n\n定义一个枚举来映射错误情况：\n\
    \n```swift\nenum IAPError: Error {\n    case request(message: String)\n    case\
    \ network(message: String)\n    case status(message: String)\n    case parsing(message:\
    \ String)\n    case other(message: String)\n}\n```\n"
- fmt: "### Integrating OHHTTPStubs\n\n`OHHTTPStubs`[^(18)](#fn18) is a library that\
    \ allows a network API request to be intercepted and mocked. It’s ideal for simulating\
    \ network requests in reference apps. This chapter will use it to simulate the\
    \ retrieval of available In-App-Purchases which are normally configured for an\
    \ iOS app via App Store Connect. In an actual application, the `StoreKit` API[^(19)](#fn19)\
    \ would be used instead.\n\n`OHHTTPStubs` can be installed using CocoaPods or\
    \ the Swift Package Manager. In order for this framework to remain as a `.xcodeproj`,\
    \ the Swift Package option will be used.\n\n![Screenshot of a software package\
    \ manager interface displaying the “OHHTTPStubs” package. The interface shows\
    \ the package’s repository link, version compatibility, and support for Swift,\
    \ Carthage, and SPM. A description explains the package’s purpose in stubbing\
    \ network requests and testing apps with fake network data. The interface includes\
    \ options to add the package to a project and a notification indicating the project\
    \ already depends on “ohhttpstubs.”](images/678928_1_En_4_Chapter/678928_1_En_4_Fig1_HTML.jpg)\n\
    \n**Figure 4-1** Swift Package Manager\n\n1.  Right-click in an empty area within\
    \ the **Project Navigator** and select **Add Package Dependencies…**\n2.  Enter\
    \ the following OHHTTPStubs URL in the Search field: [`https://github.com/AliSoftware/OHHTTPStubs`](https://github.com/AliSoftware/OHHTTPStubs)\n\
    3.  Select **Add Package**, and then select **OHHTTPStubsSwift** for the Package\
    \ Product in the corresponding pop-up (**Figure** [**4-1**](#678928_1_En_4_Chapter.xhtml#Fig1))\n\
    \n### Designing a Generic Service\n\nCreate a new class named `IAPService.swift`\
    \ to manage In-App Purchases. To prevent multiple instances of the class from\
    \ being created, define it as a singleton:\n\n```swift\nimport Foundation\n\n\
    class IAPService {\n    public static let shared = IAPService()\n    private init()\
    \ {\n    }\n}\n```\n\nCreate a protocol for the service (before the class definition),\
    \ which will be used by the ViewModel:\n\n```swift\nimport Foundation\nimport\
    \ Combine\n\nprotocol StubAPIService {\n    func fetch<T: Decodable>(_t: T.Type,\
    \ url: URL) -> AnyPublisher<T, Error>\n}\n```\n\nAs in the previous chapter, `fetch()`\
    \ will utilize **Swift Generics** to allow flexible, reusable functions and types\
    \ to be created that can work with different types, avoiding duplication of code.[^(20)](#fn20)\
    \ When the `fetch()` function is called, the desired type of object to be returned\
    \ from the network API request is passed into the function.\n\n```\ne.g. service.fetch(_t:\
    \ IAP.self, url: url)\n```\n\n`OHHTTPStubs` library will be integrated into the\
    \ `init()` function to intercept the network API request and mock its response.\
    \ The Host name should be replaced with your own domain name. If you don’t currently\
    \ own one, the one used in the sample code can be used. All that is needed is\
    \ a variable to hold a “stub descriptor,” which will define a condition for intercepting\
    \ the request (e.g., host match), and a response using the JSON data previously\
    \ defined in `IAP.json`. The `onStubActivation()` callback can be used to monitor\
    \ the request being stubbed. The OHHTTPStubs frameworks will also need to be imported:\n\
    \n```swift\ninternal import OHHTTPStubs\ninternal import OHHTTPStubsSwift\n\n\
    class IAPService: StubAPIService {\n    public static let shared = IAPService()\n\
    \    weak var stubDesc: HTTPStubsDescriptor?\n    \n    private init() {\n   \
    \     stubDesc = stub(condition: isHost(\"graphixware.com\")) { request in\n \
    \           return HTTPStubsResponse(fileAtPath: OHPathForFile(\"IAP.json\", type(of:\
    \ self))!, statusCode: 200,\n                                     headers: [\"\
    Content-Type\":\"application/json\"]\n            )\n        }\n        stubDesc?.name\
    \ = \"IAP.json\"\n        HTTPStubs.onStubActivation { (request: URLRequest, stub:\
    \ HTTPStubsDescriptor, response: HTTPStubsResponse) in\n            print(\"IAPService.init():\
    \ Request to \\(request.url!) has been stubbed with \\((stub.name != nil) ? stub.name!\
    \ : \"?\")\")\n        }\n    }\n}\n```\n\n> **Note:** The `OHHTTPStubs` and `OHHTTPStubsSwift`\
    \ frameworks were imported using an internal access modifier to resolve a compiler\
    \ warning that the modules were not compiled using “library evolution support.”\
    \ Since an actual app would never be shipped with these test frameworks, resolving\
    \ the warnings is sufficient for this example.\n\nAdopt the `StubAPIService` protocol\
    \ and implement its required behavior:\n\n```swift\nfunc fetch<T: Decodable>(_t:\
    \ T.Type, url: URL) -> AnyPublisher<T, Error> {\n    return URLSession.shared.dataTaskPublisher(for:\
    \ url)\n        .mapError { error in\n            IAPError.network(message: error.localizedDescription)\n\
    \        }\n        .flatMap(maxPublishers: .max(1)) { pair in\n            self.decode(pair.data)\n\
    \        }\n        .eraseToAnyPublisher()\n}\n\nprivate func decode<T: Decodable>(_\
    \ data: Data) -> AnyPublisher<T, Error> {\n    let decoder = JSONDecoder()\n \
    \   decoder.dateDecodingStrategy = .secondsSince1970\n    return Just(data)\n\
    \        .decode(type: T.self, decoder: decoder)\n        .mapError { error in\n\
    \            IAPError.parsing(message: error.localizedDescription)\n        }\n\
    \        .eraseToAnyPublisher()\n}\n```\n\nThe return value of the `fetch` function\
    \ is defined as `AnyPublisher<T, Error>`. `AnyPublisher` is a concrete implementation\
    \ of `Publisher` that has no significant properties of its own and merely acts\
    \ as a pass-through object. A Publisher delivers elements to one or more Subscriber\
    \ instances. The subscriber’s `Input` and `Failure` associated types must match\
    \ the `Output` and `Failure` types declared by the publisher. The publisher implements\
    \ the `receive(subscriber:)` method to accept a subscriber.\n\n`mapError` will\
    \ convert any failure from the upstream publisher into a new error.\n\n`flatMap`\
    \ will transform elements from an upstream publisher into a new publisher up to\
    \ a maximum number of publishers you specify. In our example, `flatMap` decodes\
    \ the output from the upstream publisher using a specified decoder to produce\
    \ `IAP` models.\n\n`eraseToAnyPublisher` will wrap this publisher with a type\
    \ eraser to expose an instance of `AnyPublisher` to the downstream subscriber\
    \ rather than this publisher’s actual type."
  raw: '## Integrating OHHTTPStubs


    OHHTTPStubs^([^(18)](#fn18)) is a library that allows a network API request to
    be intercepted and mocked. It’s ideal for simulating network requests in reference
    apps. This chapter will use it to simulate the retrieval of available In-App-Purchases
    which are normally configured for an iOS app via App Store Connect. In an actual
    application, the StoreKit API^([^(19)](#fn19)) would be used instead.


    OHHTTPStubs can be installed using CocoaPods or the Swift Package Manager. **In
    order for this framework to remain as a** **.xcodeproj****, the Swift Package
    option will be used.**


    ![Screenshot of a software package manager interface displaying the “OHHTTPStubs”
    package. The interface shows the package’s repository link, version compatibility,
    and support for Swift, Carthage, and SPM. A description explains the package’s
    purpose in stubbing network requests and testing apps with fake network data.
    The interface includes options to add the package to a project and a notification
    indicating the project already depends on “ohhttpstubs.”](images/678928_1_En_4_Chapter/678928_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Swift Package Manager


    1.  Right-click in an empty area within the **Project Navigator** and select **Add
    Package Dependencies…**


    2.  Enter the following OHHTTPStubs URL in the Search field: [`https://github.com/AliSoftware/OHHTTPStubs`](https://github.com/AliSoftware/OHHTTPStubs)


    3.  Select **Add Package**, and then select **OHHTTPStubsSwift** for the Package
    Product in the corresponding pop-up (**Figure** [**4-1**](#678928_1_En_4_Chapter.xhtml#Fig1))


    ## Designing a Generic Service


    Create a new class named **IAPService.swift** to manage In-App Purchases. To prevent
    multiple instances of the class from being created, define it as a singleton:


    ```

    import Foundation

    class IAPService {

    public static let shared = IAPService()

    private init() {

    }

    }

    ```


    Create a protocol for the service (before the class definition), which will be
    used by the ViewModel:


    ```

    import Foundation

    import Combine

    protocol StubAPIService {

    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T: Decodable

    }

    ```


    As in the previous chapter, **fetch****()** will utilize **Swift** **Generics**
    to allow flexible, reusable functions and types to be created that can work with
    different types, avoiding duplication of code.^([^(20)](#fn20)) When the **fetch()**
    function is called, the desired type of object to be returned from the network
    API request is passed into the function.


    ```

    e.g. service.fetch(_t: IAP.self, url: url)

    ```


    OHHTTPStubs library will be integrated into the **init()** function to intercept
    the network API request and mock its response. The Host name should be replaced
    with your own domain name. If you don’t currently own one, the one used in the
    sample code can be used. All that is needed is a variable to hold a “stub descriptor,”
    which will define a condition for intercepting the request (e.g., host match),
    and a response using the JSON data previously defined in IAP.json. The **onStubActivation()**
    callback can be used to monitor the request being stubbed. The OHHTTPStubs frameworks
    will also need to be imported:


    ```

    internal import OHHTTPStubs

    internal import OHHTTPStubsSwift

    class IAPService: StubAPIService {

    public static let shared = IAPService()

    weak var stubDesc: HTTPStubsDescriptor?

    private init() {

    stubDesc = stub(condition: isHost("graphixware.com")) { request in

    return HTTPStubsResponse(fileAtPath: OHPathForFile("IAP.json", type(of: self))!,
    statusCode: 200,

    headers: ["Content-Type":"application/json"]

    )

    }

    stubDesc?.name = "IAP.json"

    HTTPStubs.onStubActivation { (request: URLRequest, stub: HTTPStubsDescriptor,
    response: HTTPStubsResponse) in

    print("IAPService.init(): Request to \(request.url!) has been stubbed with \((stub.name
    != nil) ? stub.name! : "?")")

    }

    }

    }

    ```


    Note


    The OHHTTPStubs and OHHTTPStubsSwift frameworks were imported using an internal
    access modifier to resolve a compiler warning that the modules were not compiled
    using “library evolution support.” Since an actual app would never be shipped
    with these test frameworks, resolving the warnings is sufficient for this example.


    Adopt the StubAPIService protocol and implement its required behavior:


    ```

    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T : Decodable {

    return URLSession.shared.dataTaskPublisher(for: url)

    .mapError { error in

    IAPError.network(message: error.localizedDescription)

    }

    .flatMap(maxPublishers: .max(1)) { pair in

    self.decode(pair.data)

    }

    .eraseToAnyPublisher()

    }

    private func decode(_ data: Data) -> AnyPublisher {

    let decoder = JSONDecoder()

    decoder.dateDecodingStrategy = .secondsSince1970

    return Just(data)

    .decode(type: T.self, decoder: decoder)

    .mapError { error in

    IAPError.parsing(message: error.localizedDescription)

    }

    .eraseToAnyPublisher()

    }

    ```


    The return value of the **fetch** function is defined as **AnyPublisher****<>**.
    **AnyPublisher** is a concrete implementation of **Publisher** that has no significant
    properties of its own and merely acts as a pass-through object. A Publisher delivers
    elements to one or more Subscriber instances. The subscriber’s Input and Failure
    associated types must match the Output and Failure types declared by the publisher.
    The publisher implements the receive(subscriber:) method to accept a subscriber.


    **mapError** will convert any failure from the upstream publisher into a new error.


    **flatMap** will transform elements from an upstream publisher into a new publisher
    up to a maximum number of publishers you specify. In our example, flatMap decodes
    the output from the upstream publisher using a specified decoder to produce **IAP**
    models.


    **eraseToAnyPublisher** will wrap this publisher with a type eraser to expose
    an instance of AnyPublisher to the downstream subscriber rather than this publisher’s
    actual type.'
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 集成 OHHTTPStubs\n\
    \n`OHHTTPStubs`¹⁸ 是一个可以拦截和模拟网络 API 请求的库。它非常适合在参考应用中模拟网络请求。本章将使用它来模拟获取应用内购买项，这些购买项通常是通过\
    \ App Store Connect 为 iOS 应用配置的。在实际应用中，则会使用 `StoreKit` API¹⁹。\n\n`OHHTTPStubs`\
    \ 可以通过 CocoaPods 或 Swift Package Manager 安装。为了使这个框架保持为 `.xcodeproj` 格式，将使用 Swift\
