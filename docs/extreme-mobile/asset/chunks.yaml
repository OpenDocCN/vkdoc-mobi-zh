- fmt: "# Creating a Property List for Branding\n\nA Property List (plist) will be\
    \ used to define and manage branding attributes, providing a centralized, human-readable,\
    \ and structured format that can be loaded at runtime to configure fonts, sizes,\
    \ and colors without the need for code changes. Translators or localization teams\
    \ can use this plist, or an equivalent CSV version, to brand attributes.\n\nCreate\
    \ a Property List in the `ScratchTraxApp2` project:\n\n1. Right-click the `ScratchTraxApp2`\
    \ folder within the `Project Navigator` and select `New File from Template…`\n\
    2. Select the `Property List` template under the `Resource` group and name it\
    \ `Theme.plist`\n3. Right-click `Theme.plist` in the Project Navigator and select\
    \ `Open As/Source Code`\n4. Replace `<dict/>` with the example branding attributes\
    \ below\n5. Right-click `Theme.plist` in the Project Navigator and select `Open\
    \ As/Property List`\n\n```\nbodyFontName\nSnellRoundhand\nbodyFontSize\n\nbodyFontColor\n\
    darkGray\ntitleFontName\nSnellRoundhand-Bold\ntitleFontSize\n\nbuttonBaseBackgroundColor\n\
    systemTeal\nbuttonBaseForegroundColor\nwhite\nbuttonCornerRadius\n\nbuttonStrokeColor\n\
    white\nbuttonStrokeWidth\n\nbuttonHighlightedColor\nsystemRed\nbuttonDisabledColor\n\
    systemGray\n\n```\n\n# Centralizing Branding Attributes Across Frameworks\n\n\
    The `AppDelegate` is an ideal place to read branding attributes from a plist to\
    \ populate `UserDefaults`, as it runs once when the app launches, before any views\
    \ or view controllers are loaded. This ensures that all UI elements and code that\
    \ rely on branding values, fonts, or other configuration settings have access\
    \ to the data from the very beginning. By initializing `UserDefaults` here, your\
    \ theming system is guaranteed to be ready app-wide, whether in UIKit components,\
    \ SwiftUI views, or other services, without needing to repeat setup in multiple\
    \ places.\n\nSelect the `AppDelegate` class under the `ScratchTraxApp2` folder\
    \ and replace `didFinishLaunchingWithOptions()` with the following:\n\n```\nfunc\
    \ application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:\
    \ [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n    if let url = Bundle.main.url(forResource:\
    \ \"Theme\", withExtension: \"plist\"),\n       let data = NSDictionary(contentsOf:\
    \ url) as? [String: Any] {\n        UserDefaults.standard.set(data, forKey: \"\
    Theme\")\n    }\n    return true\n}\n```\n\nThe code simply reads the plist dictionary\
    \ and propagates it across the app and frameworks via `UserDefaults`.\n\n# Creating\
    \ UIKit Class Extensions\n\nUsing **class extensions** is convenient for applying\
    \ branding attributes because they allow you to encapsulate styling logic in one\
    \ place without modifying individual view controllers. By extending classes like\
    \ `UILabel` or `UIButton`, you can automatically apply fonts, colors, and other\
    \ theme settings whenever a component is instantiated, ensuring consistency across\
    \ the app, reducing repetitive code, and making it easy to update branding in\
    \ the future.\n\nWhen creating UIKit class extensions, the branding attributes\
    \ will be applied to the component via `awakeFromNib()` and `didMoveToSuperView()`.\
    \ `awakeFromNib()` is called after the component is loaded from a storyboard or\
    \ XIB, so it's ideal for initializing fonts, colors, or other styling immediately\
    \ after the view exists but before it appears. `didMoveToSuperview()` is called\
    \ when the view is added to a view hierarchy, covering cases where the component\
    \ may be created programmatically.\n\nAdd the following class extensions to the\
    \ `AppDelegate` class to apply branding attributes circulated via `UserDefaults`\
    \ to `UILabel` components:\n\n```\npublic extension UILabel {\n    override func\
    \ awakeFromNib() {\n        super.awakeFromNib()\n        applyBrandedFont()\n\
    \    }\n    override func didMoveToSuperview() {\n        super.didMoveToSuperview()\n\
    \        applyBrandedFont()\n    }\n    private func applyBrandedFont() {\n  \
    \      guard let theme = UserDefaults.standard.dictionary(forKey: \"Theme\"),\n\
    \              let name = theme[\"bodyFontName\"] as? String,\n              let\
    \ size = theme[\"bodyFontSize\"] as? CGFloat else { return }\n        self.font\
    \ = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize: size)\n      \
    \  if let colorName = theme[\"bodyFontColor\"] as? String {\n            self.textColor\
    \ = UIColor(namedSystemOrHex: colorName) ?? .darkGray\n        }\n    }\n}\nextension\
    \ UIColor {\n    convenience init?(namedSystemOrHex name: String?) {\n       \
    \ guard let name = name else { return nil }\n        let systemColors: [String:\
    \ UIColor] = [\n            \"systemRed\": .systemRed,\n            \"systemBlue\"\
    : .systemBlue,\n            \"systemTeal\": .systemTeal,\n            \"systemGray\"\
    : .systemGray,\n            \"white\": .white,\n            \"black\": .black,\n\
    \            \"darkGray\": .darkGray,\n            \"lightGray\": .lightGray\n\
    \        ]\n        if let color = systemColors[name.lowercased()] {\n       \
    \     self.init(cgColor: color.cgColor)\n            return\n        }\n     \
    \   // Hex format: #RRGGBB\n        if name.hasPrefix(\"#\"), name.count == 7\
    \ {\n            let r = CGFloat(Int(name.dropFirst().prefix(2), radix: 16) ??\
    \ 0) / 255.0\n            let g = CGFloat(Int(name.dropFirst(3).prefix(2), radix:\
    \ 16) ?? 0) / 255.0\n            let b = CGFloat(Int(name.dropFirst(5).prefix(2),\
    \ radix: 16) ?? 0) / 255.0\n            self.init(red: r, green: g, blue: b, alpha:\
    \ 1.0)\n            return\n        }\n        return nil\n    }\n}\n```\n\nSince\
    \ `UILabel` doesn't support the `Configuration` feature, the font and text color\
    \ attributes will be applied directly to the component using the plist settings\
    \ exposed via `UserDefaults`.\n\nThe `UIColor` class extension is a convenience\
    \ class to create colors from either system color names (like `systemRed` or `systemTeal`)\
    \ or hex strings (like `#RRGGBB`). This allows branding attributes stored in the\
    \ plist to be applied dynamically, supporting both standard UIKit colors and custom\
    \ colors.\n\nAdd the following class extension to the `AppDelegate` class to apply\
    \ branding to `UIButton` components:\n\n```\npublic extension UIButton {\n   \
    \ override func awakeFromNib() {\n        super.awakeFromNib()\n        applyBrandedFont()\n\
    \    }\n    override func didMoveToSuperview() {\n        super.didMoveToSuperview()\n\
    \        applyBrandedFont()\n    }\n    private func applyBrandedFont() {\n  \
    \      guard let theme = UserDefaults.standard.dictionary(forKey: \"Theme\"),\n\
    \              let name = theme[\"titleFontName\"] as? String,\n             \
    \ let size = theme[\"titleFontSize\"] as? CGFloat else { return }\n        var\
    \ config = UIButton.Configuration.filled()\n        // Font\n        config.titleTextAttributesTransformer\
    \ = UIConfigurationTextAttributesTransformer { attrs in\n            var newAttrs\
    \ = attrs\n            newAttrs.font = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize:\
    \ size, weight: .bold)\n            return newAttrs\n        }\n        // Base\
    \ colors and styling\n        config.baseBackgroundColor = UIColor(namedSystemOrHex:\
    \ theme[\"buttonBaseBackgroundColor\"] as? String) ?? .systemTeal\n        config.baseForegroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonBaseForegroundColor\"] as? String)\
    \ ?? .white\n        config.background.cornerRadius = theme[\"buttonCornerRadius\"\
    ] as? CGFloat ?? 12\n        config.background.strokeColor = UIColor(namedSystemOrHex:\
    \ theme[\"buttonStrokeColor\"] as? String) ?? .white\n        config.background.strokeWidth\
    \ = theme[\"buttonStrokeWidth\"] as? CGFloat ?? 2\n        self.configuration\
    \ = config\n        // Dynamic state colors\n        self.configurationUpdateHandler\
    \ = { button in\n            var updated = button.configuration ?? UIButton.Configuration.filled()\n\
    \            if button.isHighlighted {\n                updated.baseBackgroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonHighlightedColor\"] as? String) ??\
    \ .systemRed\n            } else if !button.isEnabled {\n                updated.baseBackgroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonDisabledColor\"] as? String) ?? .systemGray\n\
    \            } else {\n                updated.baseBackgroundColor = UIColor(namedSystemOrHex:\
    \ theme[\"buttonBaseBackgroundColor\"] as? String) ?? .systemTeal\n          \
    \  }\n            button.configuration = updated\n        }\n    }\n}\n```\n\n\
    Since `UIButton` supports the `Configuration` feature, the font and text color\
    \ attributes will be applied to the component using this feature, using the plist\
    \ settings exposed via `UserDefaults`.\n\nThe `UIButton` class extension also\
    \ includes a `configurationUpdateHandler` to dynamically change the button text\
    \ and background for different action states."
  raw: '## Creating a Property List for Branding


    A Property List (plist) will be used to define and manage branding attributes,
    providing a centralized, human-readable, and structured format that can be loaded
    at runtime to configure fonts, sizes, and colors without the need for code changes.
    Translators or localization teams can use this plist, or an equivalent CSV version,
    to brand attributes.


    Create a Property List in the ScratchTraxApp2 project:


    1.  Right-click the **ScratchTraxApp2** folder within the **Project Navigator**
    and select **New File from Template…**


    2.  Select the **Property List** template under the **Resource** group and name
    it **Theme.plist**


    3.  Right-click **Theme.plist** in the Project Navigator and select **Open As/Source
    Code**


    4.  Replace **<dict/>** with the example branding attributes below


    5.  Right-click **Theme.plist** in the Project Navigator and select **Open As/Property
    List**


    ```

    bodyFontName

    SnellRoundhand

    bodyFontSize


    bodyFontColor

    darkGray

    titleFontName

    SnellRoundhand-Bold

    titleFontSize


    buttonBaseBackgroundColor

    systemTeal

    buttonBaseForegroundColor

    white

    buttonCornerRadius


    buttonStrokeColor

    white

    buttonStrokeWidth


    buttonHighlightedColor

    systemRed

    buttonDisabledColor

    systemGray


    ```


    ## Centralizing Branding Attributes Across Frameworks


    The AppDelegate is an ideal place to read branding attributes from a plist to
    populate UserDefaults, as it runs once when the app launches, before any views
    or view controllers are loaded. This ensures that all UI elements and code that
    rely on branding values, fonts, or other configuration settings have access to
    the data from the very beginning. By initializing UserDefaults here, your theming
    system is guaranteed to be ready app-wide, whether in UIKit components, SwiftUI
    views, or other services, without needing to repeat setup in multiple places.


    Select the AppDelegate class under the ScratchTraxApp2 folder and replace **didFinishLaunchingWithOptions()**
    with the following:


    ```

    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:
    [UIApplication.LaunchOptionsKey: Any]?) -> Bool {

    if let url = Bundle.main.url(forResource: "Theme", withExtension: "plist"),

    let data = NSDictionary(contentsOf: url) as? [String: Any] {

    UserDefaults.standard.set(data, forKey: "Theme")

    }

    return true

    }

    ```


    The code simply reads the plist dictionary and propagates it across the app and
    frameworks via UserDefaults.


    ## Creating UIKit Class Extensions


    Using **class extensions** is convenient for applying branding attributes because
    they allow you to encapsulate styling logic in one place without modifying individual
    view controllers. By extending classes like UILabel or UIButton, you can automatically
    apply fonts, colors, and other theme settings whenever a component is instantiated,
    ensuring consistency across the app, reducing repetitive code, and making it easy
    to update branding in the future.


    When creating UIKit class extensions, the branding attributes will be applied
    to the component via **awakeFromNib()** and **didMoveToSuperView()**. awakeFromNib()
    is called after the component is loaded from a storyboard or XIB, so it’s ideal
    for initializing fonts, colors, or other styling immediately after the view exists
    but before it appears. didMoveToSuperview() is called when the view is added to
    a view hierarchy, covering cases where the component may be created programmatically.


    Add the following class extensions to the AppDelegate class to apply branding
    attributes circulated via UserDefaults to UILabel components:


    ```

    public extension UILabel {

    override func awakeFromNib() {

    super.awakeFromNib()

    applyBrandedFont()

    }

    override func didMoveToSuperview() {

    super.didMoveToSuperview()

    applyBrandedFont()

    }

    private func applyBrandedFont() {

    guard let theme = UserDefaults.standard.dictionary(forKey: "Theme"),

    let name = theme["bodyFontName"] as? String,

    let size = theme["bodyFontSize"] as? CGFloat else { return }

    self.font = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize: size)

    if let colorName = theme["bodyFontColor"] as? String {

    self.textColor = UIColor(namedSystemOrHex: colorName) ?? .darkGray

    }

    }

    }

    extension UIColor {

    convenience init?(namedSystemOrHex name: String?) {

    guard let name = name else { return nil }

    let systemColors: [String: UIColor] = [

    "systemRed": .systemRed,

    "systemBlue": .systemBlue,

    "systemTeal": .systemTeal,

    "systemGray": .systemGray,

    "white": .white,

    "black": .black,

    "darkGray": .darkGray,

    "lightGray": .lightGray

    ]

    if let color = systemColors[name.lowercased()] {

    self.init(cgColor: color.cgColor)

    return

    }

    // Hex format: #RRGGBB

    if name.hasPrefix("#"), name.count == 7 {

    let r = CGFloat(Int(name.dropFirst().prefix(2), radix: 16) ?? 0) / 255.0

    let g = CGFloat(Int(name.dropFirst(3).prefix(2), radix: 16) ?? 0) / 255.0

    let b = CGFloat(Int(name.dropFirst(5).prefix(2), radix: 16) ?? 0) / 255.0

    self.init(red: r, green: g, blue: b, alpha: 1.0)

    return

    }

    return nil

    }

    }

    ```


    Since UILabel doesn’t support the Configuration feature, the font and text color
    attributes will be applied directly to the component using the plist settings
    exposed via UserDefaults.


    The UIColor class extension is a convenience class to create colors from either
    system color names (like systemRed or systemTeal) or hex strings (like `#RRGGBB`).
    This allows branding attributes stored in the plist to be applied dynamically,
    supporting both standard UIKit colors and custom colors.


    Add the following class extension to the AppDelegate class to apply branding to
    UIButton components:


    ```

    public extension UIButton {

    override func awakeFromNib() {

    super.awakeFromNib()

    applyBrandedFont()

    }

    override func didMoveToSuperview() {

    super.didMoveToSuperview()

    applyBrandedFont()

    }

    private func applyBrandedFont() {

    guard let theme = UserDefaults.standard.dictionary(forKey: "Theme"),

    let name = theme["titleFontName"] as? String,

    let size = theme["titleFontSize"] as? CGFloat else { return }

    var config = UIButton.Configuration.filled()

    // Font

    config.titleTextAttributesTransformer = UIConfigurationTextAttributesTransformer
    { attrs in

    var newAttrs = attrs

    newAttrs.font = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize: size,
    weight: .bold)

    return newAttrs

    }

    // Base colors and styling

    config.baseBackgroundColor = UIColor(namedSystemOrHex: theme["buttonBaseBackgroundColor"]
    as? String) ?? .systemTeal

    config.baseForegroundColor = UIColor(namedSystemOrHex: theme["buttonBaseForegroundColor"]
    as? String) ?? .white

    config.background.cornerRadius = theme["buttonCornerRadius"] as? CGFloat ?? 12

    config.background.strokeColor = UIColor(namedSystemOrHex: theme["buttonStrokeColor"]
    as? String) ?? .white

    config.background.strokeWidth = theme["buttonStrokeWidth"] as? CGFloat ?? 2

    self.configuration = config

    // Dynamic state colors

    self.configurationUpdateHandler = { button in

    var updated = button.configuration ?? UIButton.Configuration.filled()

    if button.isHighlighted {

    updated.baseBackgroundColor = UIColor(namedSystemOrHex: theme["buttonHighlightedColor"]
    as? String) ?? .systemRed

    } else if !button.isEnabled {

    updated.baseBackgroundColor = UIColor(namedSystemOrHex: theme["buttonDisabledColor"]
    as? String) ?? .systemGray

    } else {

    updated.baseBackgroundColor = UIColor(namedSystemOrHex: theme["buttonBaseBackgroundColor"]
    as? String) ?? .systemTeal

    }

    button.configuration = updated

    }

    }

    }

    ```


    Since UIButton supports the Configuration feature, the font and text color attributes
    will be applied to the component using this feature, using the plist settings
    exposed via UserDefaults.


    The UIButton class extension also includes a **configurationUpdateHandler** to
    dynamically change the button text and background for different action states.'
  trans: "\n# 为品牌化创建属性列表\n\n属性列表（plist）将用于定义和管理品牌化属性，提供一种集中式、人类可读且结构化的格式，可在运行时加载，以配置字体、字号和颜色，而无需更改代码。翻译人员或本地化团队可以使用此\
    \ plist 或等效的 CSV 版本来配置品牌属性。\n\n在 `ScratchTraxApp2` 项目中创建一个属性列表：\n\n1.  在 `项目导航器`\
    \ 中右键单击 `ScratchTraxApp2` 文件夹，然后选择 `从模板新建文件…`\n2.  在 `资源` 组下选择 `属性列表` 模板，并将其命名为\
    \ `Theme.plist`\n3.  在项目导航器中右键单击 `Theme.plist`，选择 `打开方式/源代码`\n4.  将 `<dict/>`\
    \ 替换为下面的示例品牌属性\n5.  在项目导航器中右键单击 `Theme.plist`，选择 `打开方式/属性列表`\n\n```\nbodyFontName\n\
    SnellRoundhand\nbodyFontSize\n\nbodyFontColor\ndarkGray\ntitleFontName\nSnellRoundhand-Bold\n\
    titleFontSize\n\nbuttonBaseBackgroundColor\nsystemTeal\nbuttonBaseForegroundColor\n\
    white\nbuttonCornerRadius\n\nbuttonStrokeColor\nwhite\nbuttonStrokeWidth\n\nbuttonHighlightedColor\n\
    systemRed\nbuttonDisabledColor\nsystemGray\n\n```\n\n# 跨框架集中管理品牌属性\n\n`AppDelegate`\
    \ 是从 plist 读取品牌属性以填充 `UserDefaults` 的理想位置，因为它在应用启动时运行一次，且在所有视图或视图控制器加载之前。这确保了所有依赖于品牌值、字体或其他配置设置的\
    \ UI 元素和代码从一开始就能访问这些数据。通过在此处初始化 `UserDefaults`，您的主题系统将保证在整个应用中准备就绪，无论是在 UIKit\
    \ 组件、SwiftUI 视图还是其他服务中，都无需在多个位置重复设置。\n\n选择 `ScratchTraxApp2` 文件夹下的 `AppDelegate`\
    \ 类，并将 `didFinishLaunchingWithOptions()` 替换为以下代码：\n\n```\nfunc application(_ application:\
    \ UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n    if let url = Bundle.main.url(forResource: \"Theme\", withExtension:\
    \ \"plist\"),\n       let data = NSDictionary(contentsOf: url) as? [String: Any]\
    \ {\n        UserDefaults.standard.set(data, forKey: \"Theme\")\n    }\n    return\
    \ true\n}\n```\n\n这段代码简单地读取了 plist 字典，并通过 `UserDefaults` 将其传播到整个应用和框架中。\n\n# 创建\
    \ UIKit 类扩展\n\n使用**类扩展**可以方便地应用品牌属性，因为它们允许您将样式逻辑封装在一个地方，而无需修改各个视图控制器。通过扩展 `UILabel`\
    \ 或 `UIButton` 等类，您可以在组件实例化时自动应用字体、颜色和其他主题设置，从而确保整个应用的一致性，减少重复代码，并使未来的品牌更新变得容易。\n\
    \n在创建 UIKit 类扩展时，品牌属性将通过 `awakeFromNib()` 和 `didMoveToSuperView()` 应用到组件上。`awakeFromNib()`\
    \ 在组件从故事板或 XIB 加载后调用，因此非常适合在视图存在后、显示前立即初始化字体、颜色或其他样式。`didMoveToSuperview()` 在视图添加到视图层级时调用，涵盖了组件可能以编程方式创建的情况。\n\
    \n将以下类扩展添加到 `AppDelegate` 类中，以将通过 `UserDefaults` 传播的品牌属性应用到 `UILabel` 组件：\n\n\
    ```\npublic extension UILabel {\n    override func awakeFromNib() {\n        super.awakeFromNib()\n\
    \        applyBrandedFont()\n    }\n    override func didMoveToSuperview() {\n\
    \        super.didMoveToSuperview()\n        applyBrandedFont()\n    }\n    private\
    \ func applyBrandedFont() {\n        guard let theme = UserDefaults.standard.dictionary(forKey:\
    \ \"Theme\"),\n              let name = theme[\"bodyFontName\"] as? String,\n\
    \              let size = theme[\"bodyFontSize\"] as? CGFloat else { return }\n\
    \        self.font = UIFont(name: name, size: size) ?? UIFont.systemFont(ofSize:\
    \ size)\n        if let colorName = theme[\"bodyFontColor\"] as? String {\n  \
    \          self.textColor = UIColor(namedSystemOrHex: colorName) ?? .darkGray\n\
    \        }\n    }\n}\nextension UIColor {\n    convenience init?(namedSystemOrHex\
    \ name: String?) {\n        guard let name = name else { return nil }\n      \
    \  let systemColors: [String: UIColor] = [\n            \"systemRed\": .systemRed,\n\
    \            \"systemBlue\": .systemBlue,\n            \"systemTeal\": .systemTeal,\n\
    \            \"systemGray\": .systemGray,\n            \"white\": .white,\n  \
    \          \"black\": .black,\n            \"darkGray\": .darkGray,\n        \
    \    \"lightGray\": .lightGray\n        ]\n        if let color = systemColors[name.lowercased()]\
    \ {\n            self.init(cgColor: color.cgColor)\n            return\n     \
    \   }\n        // 十六进制格式: #RRGGBB\n        if name.hasPrefix(\"#\"), name.count\
    \ == 7 {\n            let r = CGFloat(Int(name.dropFirst().prefix(2), radix: 16)\
    \ ?? 0) / 255.0\n            let g = CGFloat(Int(name.dropFirst(3).prefix(2),\
    \ radix: 16) ?? 0) / 255.0\n            let b = CGFloat(Int(name.dropFirst(5).prefix(2),\
    \ radix: 16) ?? 0) / 255.0\n            self.init(red: r, green: g, blue: b, alpha:\
    \ 1.0)\n            return\n        }\n        return nil\n    }\n}\n```\n\n由于\
    \ `UILabel` 不支持 `Configuration` 特性，字体和文本颜色属性将直接通过 `UserDefaults` 公开的 plist 设置应用到组件上。\n\
    \n`UIColor` 类扩展是一个便捷类，用于从系统颜色名称（如 `systemRed` 或 `systemTeal`）或十六进制字符串（如 `#RRGGBB`）创建颜色。这使得存储在\
    \ plist 中的品牌属性可以被动态应用，从而支持标准的 UIKit 颜色和自定义颜色。\n\n将以下类扩展添加到 `AppDelegate` 类中，以将品牌应用于\
    \ `UIButton` 组件：\n\n```\npublic extension UIButton {\n    override func awakeFromNib()\
    \ {\n        super.awakeFromNib()\n        applyBrandedFont()\n    }\n    override\
    \ func didMoveToSuperview() {\n        super.didMoveToSuperview()\n        applyBrandedFont()\n\
    \    }\n    private func applyBrandedFont() {\n        guard let theme = UserDefaults.standard.dictionary(forKey:\
    \ \"Theme\"),\n              let name = theme[\"titleFontName\"] as? String,\n\
    \              let size = theme[\"titleFontSize\"] as? CGFloat else { return }\n\
    \        var config = UIButton.Configuration.filled()\n        // 字体\n       \
    \ config.titleTextAttributesTransformer = UIConfigurationTextAttributesTransformer\
    \ { attrs in\n            var newAttrs = attrs\n            newAttrs.font = UIFont(name:\
    \ name, size: size) ?? UIFont.systemFont(ofSize: size, weight: .bold)\n      \
    \      return newAttrs\n        }\n        // 基础颜色和样式\n        config.baseBackgroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonBaseBackgroundColor\"] as? String)\
    \ ?? .systemTeal\n        config.baseForegroundColor = UIColor(namedSystemOrHex:\
    \ theme[\"buttonBaseForegroundColor\"] as? String) ?? .white\n        config.background.cornerRadius\
    \ = theme[\"buttonCornerRadius\"] as? CGFloat ?? 12\n        config.background.strokeColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonStrokeColor\"] as? String) ?? .white\n\
    \        config.background.strokeWidth = theme[\"buttonStrokeWidth\"] as? CGFloat\
    \ ?? 2\n        self.configuration = config\n        // 动态状态颜色\n        self.configurationUpdateHandler\
    \ = { button in\n            var updated = button.configuration ?? UIButton.Configuration.filled()\n\
    \            if button.isHighlighted {\n                updated.baseBackgroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonHighlightedColor\"] as? String) ??\
    \ .systemRed\n            } else if !button.isEnabled {\n                updated.baseBackgroundColor\
    \ = UIColor(namedSystemOrHex: theme[\"buttonDisabledColor\"] as? String) ?? .systemGray\n\
    \            } else {\n                updated.baseBackgroundColor = UIColor(namedSystemOrHex:\
    \ theme[\"buttonBaseBackgroundColor\"] as? String) ?? .systemTeal\n          \
    \  }\n            button.configuration = updated\n        }\n    }\n}\n```\n\n\
    由于 `UIButton` 支持 `Configuration` 特性，字体和文本颜色属性将使用此特性，并通过 `UserDefaults` 公开的 plist\
    \ 设置应用到组件上。\n\n`UIButton` 类扩展还包含一个 `configurationUpdateHandler`，用于针对不同的操作状态动态更改按钮文本和背景。\n"
- fmt: '# Running the App in a Simulator


    When the app is run in the iOS simulator, the Settings view will now display the
    Title, Name, Email Address, and Website labels using the branded styles (Figure
    [10-1](#678928_1_En_10_Chapter.xhtml#Fig1)).


    ![A screenshot of a development environment displaying an iOS app interface on
    an iPhone simulator. The app shows a settings page with text fields for “Name,”
    “Email Address,” and “Website,” filled with “Graphixware, LLC,” “gw@graphixware.com,”
    and “http:/graphixware.com” respectively. The development environment includes
    a project navigator with files and folders related to the app’s codebase.](images/678928_1_En_10_Chapter/678928_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Xcode Simulator


    # Creating SwiftUI Class Extensions and Environment Keys


    SwiftUI class extensions and Environment Keys will be used to centralize and streamline
    branding for SwiftUI components. Environment Keys allow font and style values
    loaded from the plist to be made globally accessible across all SwiftUI views.
    This approach ensures consistent styling, reduces repetitive code, and keeps the
    branding system decoupled from individual view implementations. The changes in
    this section will be made to the `RecordingsStoreFW` framework.


    Create a new Swift class, `ThemeEnvironment`, under the `RecordingsStoreFW` framework
    folder, and add the following environment keys and class extensions:


    ```

    import SwiftUI

    private struct AppBodyFontKey: EnvironmentKey {

    static let defaultValue: Font = .body

    }

    private struct AppButtonFontKey: EnvironmentKey {

    static let defaultValue: Font = .headline

    }

    public extension EnvironmentValues {

    var appBodyFont: Font {

    get { self[AppBodyFontKey.self] }

    set { self[AppBodyFontKey.self] = newValue }

    }

    var appButtonFont: Font {

    get { self[AppButtonFontKey.self] }

    set { self[AppButtonFontKey.self] = newValue }

    }

    }

    public extension View {

    /// Applies theme-based fonts from UserDefaults to the environment.

    func applyThemeEnvironment() -> some View {

    let theme = UserDefaults.standard.dictionary(forKey: "Theme")

    let bodyFont: Font = {

    if let name = theme?["bodyFontName"] as? String,

    let size = theme?["bodyFontSize"] as? CGFloat {

    return Font.custom(name, size: size, relativeTo: .body)

    }

    return .body

    }()

    let buttonFont: Font = {

    if let name = theme?["titleFontName"] as? String,

    let size = theme?["titleFontSize"] as? CGFloat {

    return Font.custom(name, size: size, relativeTo: .headline)

    }

    return .headline

    }()

    return self

    .environment(\.appBodyFont, bodyFont)

    .environment(\.appButtonFont, buttonFont)

    }

    }

    ```


    Replace the code in the `RecordingsStoreView` class with the following code, which
    makes minor changes to remove hard-coded fonts and styles and applies the themed
    branding using the environment variables:


    ```

    import SwiftUI

    struct RecordingsStoreView: View {

    @State private var selectedIAP: IAP?

    @State private var showAlert = false

    @State private var loaded = false

    @StateObject private var viewModel: IAPViewModel

    @StateObject private var dataManager = SwiftDataManager.shared

    init(viewModel: IAPViewModel) {

    _viewModel = StateObject(wrappedValue: viewModel)

    }

    var body: some View {

    NavigationView {

    List(selection: $selectedIAP) {

    ForEach(groupByCategory(viewModel.getIAPs()), id: \.0) { category in

    IAPCategorySectionView(

    category: category,

    isPurchased: isPurchased,

    selectAction: { iap in

    selectedIAP = iap

    showAlert = true

    }

    )

    }

    }

    .listStyle(.plain)

    .navigationBarTitle("Add Features", displayMode: .large)

    .alert("Add Features", isPresented: $showAlert) {

    Button("OK") {

    if let iap = selectedIAP {

    updateFeatures(type: iap.type)

    }

    }

    Button("Cancel", role: .cancel) {}

    } message: {

    AlertMessageText(message: "Do you want to purchase \"\(selectedIAP?.name ?? "?")\"")

    }

    }

    .onAppear {

    if !loaded {

    loaded = true

    viewModel.refresh()

    }

    }

    }

    private struct IAPRowView: View {

    let iap: IAP

    let isDisabled: Bool

    let action: () -> Void

    @Environment(\.appButtonFont) private var titleFont

    @Environment(\.appBodyFont) private var bodyFont

    var body: some View {

    HStack {

    Button(action: action) {

    Text("\(Image(systemName: "music.note")) \(iap.name)")

    .font(titleFont)

    }

    Spacer()

    Text(NumberFormatter.localizedString(from: NSNumber(value: iap.price), number:
    .currency))

    .font(bodyFont)

    }

    .listRowSeparator(.hidden)

    .disabled(isDisabled)

    }

    }

    private struct IAPCategorySectionView: View {

    let category: (String, [IAP])

    let isPurchased: (IAP) -> Bool

    let selectAction: (IAP) -> Void

    @Environment(\.appButtonFont) private var titleFont

    var body: some View {

    Section(header: Text(category.0).font(titleFont)) {

    ForEach(category.1) { item in

    IAPRowView(

    iap: item,

    isDisabled: isPurchased(item),

    action: { selectAction(item) }

    )

    }

    }

    }

    }

    private struct AlertMessageText: View {

    let message: String

    @Environment(\.appBodyFont) private var bodyFont

    var body: some View {

    Text(message)

    .font(bodyFont)

    }

    }

    private func groupByCategory(_ iaps: [IAP]) -> [(String, [IAP])] {

    let grouped = Dictionary(grouping: iaps, by: { $0.category })

    return grouped.sorted(by: { $0.key  Bool {

    if let features = UserDefaults.standard.object(forKey: "iaps") as? [String: Any]
    {

    switch iap.type {

    case .publishRecordings:

    return features["publishRecordings"] as? Bool ?? false

    case .twoTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 1 }

    return false

    case .threeTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 2 }

    return false

    case .fourTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 3 }

    return false

    }

    }

    return false

    }

    private func updateFeatures(type: IAPType) {

    guard let config = dataManager.configuration else {

    saveConfiguration(existing: nil, type: type)

    return

    }

    saveConfiguration(existing: config, type: type)

    }

    private func saveConfiguration(existing: Configuration?, type: IAPType) {

    var publishRecordings = false

    var trackCount: Int16 = 1

    switch type {

    case .publishRecordings:

    publishRecordings = true

    trackCount = existing?.trackCount ?? 1

    case .twoTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 2

    case .threeTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 3

    case .fourTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 4

    }

    dataManager.saveConfiguration(existing: existing, publishRecordings: publishRecordings,
    trackCount: trackCount)

    UserDefaults.standard.set(["publishRecordings": publishRecordings, "trackCount":
    trackCount], forKey: "iaps")

    }

    }

    struct RecordingsStoreView_Previews: PreviewProvider {

    static var previews: some View {

    RecordingsStoreView(

    viewModel: IAPViewModel(service: IAPService.shared, endpoint: .fetchInAppPurchases)

    )

    }

    }

    ```


    Replace the code in the `RecordingsStoreVC` class with the following code, which
    integrates the centralized fonts and styles into the SwiftUI components and views
    using the `.environment` feature:


    ```

    import SwiftUI

    import UIKit

    class RecordingsStoreVC: UIHostingController {

    required init?(coder: NSCoder) {

    let viewModel = IAPViewModel(

    service: IAPService.shared,

    endpoint: .fetchInAppPurchases

    )

    // Build the root view and apply environment values

    let view = RecordingsStoreView(viewModel: viewModel)

    .applyThemeEnvironment()

    .eraseToAnyView()

    super.init(coder: coder, rootView: view)

    }

    }

    private extension View {

    func eraseToAnyView() -> AnyView { AnyView(self) }

    }

    ```'
