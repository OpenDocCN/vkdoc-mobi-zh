- fmt: "# Creating an App Target User Interface\n\nWhen the app target is created,\
    \ a default set of files is generated. Some of these files are not needed, and\
    \ some will need to be modified to expose the framework’s functionality, and in\
    \ this case, the framework’s User Interface. Perform the following steps to create\
    \ an app target User Interface:\n\n1. Select `ViewController.swift` from within\
    \ the **Project Navigator** and delete it, as it’s not needed\n2. Select `Main.storyboard`\
    \ from within the **Project Navigator**, select the **View Controller Scene**\
    \ from within the **Storyboard Navigator**, and delete it\n3. Select the **Library**\
    \ icon near the bottom left of the **Interface Builder** (+ icon) and create a\
    \ **Tab Bar Controller**\n4. Delete **Item 1 Scene** and **Item 2 Scene**, as\
    \ they’re not needed\n\n# Designing an App Target User Interface\n\nPerform the\
    \ following steps to configure an app target User Interface:\n\n![Xcode interface\
    \ displaying a storyboard for an iOS app. The main window shows a “Tab Bar Controller”\
    \ with a placeholder for a tab bar. The left panel lists project files, including\
    \ Swift files and storyboards. The right panel displays properties for the view\
    \ controller, such as layout and transition settings. The top bar indicates the\
    \ project name “SettingsFW” and the build status as succeeded.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9 Storyboard Editor\n\n![Screenshot of an Xcode interface displaying\
    \ a project named “SettingsFW.” The left panel shows a file directory with folders\
    \ and Swift files, including “AppDelegate.swift” and “Main.storyboard.” The central\
    \ panel features a storyboard editor with a “Tab Bar Controller” layout for an\
    \ iPhone 17 Pro. The right panel contains properties for the selected “Tab Bar\
    \ Controller,” including class and storyboard settings. The interface includes\
    \ various toolbars and icons for navigation and editing.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8 Storyboard Editor\n\n1. Select the **Tab Bar Controller Scene** in\
    \ the Interface Builder\n2. Select **Show the Identity inspector** using the corresponding\
    \ top right icon\n3. Input a **Storyboard ID** in the corresponding field, e.g.,\
    \ `SettingsAppId` (**Figure** [**1-8**](#678928_1_En_1_Chapter.xhtml#Fig8))\n\
    4. Select **Show the Attributes Inspector** using the corresponding top right\
    \ icon and select **Is Initial View Controller** (**Figure** [**1-9**](#678928_1_En_1_Chapter.xhtml#Fig9))\n\
    \n# Adding an iOS Framework\n\nBefore integrating the iOS Framework into the app,\
    \ it needs to be added to the app target:\n\n![A screenshot of a development environment\
    \ interface showing a project named “SettingsFW” with a sidebar listing files\
    \ like “AppDelegate.swift” and “Main.storyboard.” A dialog box titled “Choose\
    \ frameworks and libraries to add” is open, displaying options such as “SettingsFW.framework”\
    \ and various Apple SDKs. The “SettingsFW.framework” is highlighted, and there\
    \ are buttons labeled “Add Other,” “Cancel,” and “Add” at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig10_HTML.jpg)\n\
    \nFigure 1-10 Add Frameworks\n\n1. Select the root node of the framework project\
    \ within the **Project Navigator**\n2. Select the `SettingsApp` target under the\
    \ **Targets** section\n3. Select the **General** tab and the **+** icon under\
    \ the **Frameworks, Libraries, and Embedded Content** section\n4. Add the framework\
    \ to the app target and it will appear under the **Frameworks, Libraries, and\
    \ Embedded Content** section with **Embed & Sign** (**Figure** [**1-10**](#678928_1_En_1_Chapter.xhtml#Fig10))\n\
    \n# Integrating an iOS Framework\n\nThe iOS Framework will need to be integrated\
    \ into the app from within the app’s `SceneDelegate.willConnectTo()` to instantiate\
    \ the framework’s User Interface using the protocol defined:\n\n```swift\nimport\
    \ SettingsFW\nfunc scene(_ scene: UIScene, willConnectTo session: UISceneSession,\
    \ options connectionOptions: UIScene.ConnectionOptions) {\n    guard let winScene\
    \ = (scene as? UIWindowScene) else { return }\n    if let storyboard = session.configuration.storyboard\
    \ {\n        if let tabBarController = storyboard.instantiateInitialViewController()\
    \ as? UITabBarController {\n            window = UIWindow(windowScene: winScene)\n\
    \            window?.rootViewController = tabBarController\n            window?.makeKeyAndVisible()\n\
    \            // Add framework User Interfaces via protocol...\n            var\
    \ tbcViewControllers = tabBarController.viewControllers ?? []\n            tbcViewControllers.append(SettingsProtocol().instantiateRootViewController(configuration:\
    \ [\"TestAttribute\" : true]))\n            tabBarController.setViewControllers(tbcViewControllers,\
    \ animated: false)\n            tabBarController.tabBar.isHidden = (tbcViewControllers.count\
    \ <= 1)\n        }\n    }\n}\n```\n\n# Running the App Target\n\nSet `SettingsApp`\
    \ as the active scheme in the scheme drop-down, build the app, and run it using\
    \ one of the Xcode simulators or an actual device. The app should compile and\
    \ run properly, exposing the corresponding framework features (**Figure** [**1-11**](#678928_1_En_1_Chapter.xhtml#Fig11)).\n\
    \n![Screenshot of a development environment displaying a mobile app simulator.\
    \ The simulator shows a “Settings” screen with details: Name as “Graphixware,\
    \ LLC,” Email as “gw@graphixware.com,” and Website as “https:/graphixware.com.”\
    \ The development environment includes a project file structure on the left and\
    \ build settings on the right.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig11_HTML.jpg)\n\
    \nFigure 1-11 Xcode Simulator\n\nIn this chapter, you learned how to design and\
    \ implement an iOS Framework with Swift protocols. You built a framework from\
    \ scratch, explored how to structure it for modularity and reusability, and integrated\
    \ it into a mobile app. By completing these steps, you gained practical experience\
    \ in creating frameworks that can simplify app architecture and promote code sharing\
    \ across projects.\n\nWith your first iOS Framework built and integrated into\
    \ an app, you’re ready to explore more advanced design techniques. In the next\
    \ chapter, we’ll apply modern architectural patterns to create scalable, maintainable\
    \ frameworks that can adapt to multiple apps and use cases.\n\nFootnotes [1](#678928_1_En_1_Chapter.xhtml#Fn1_source)\
    \ [2](#678928_1_En_1_Chapter.xhtml#Fn2_source)\n\n# 2. Applying Modern Design\
    \ Patterns for Scalable, Maintainable Frameworks\n\n## Designing the RecordingsFW\
    \ Framework\n\nThis chapter will delve into the intricacies of designing an iOS\
    \ Framework that can be utilized across different applications for various purposes.\
    \ It will showcase the efficacy of software reusability by demonstrating the integration\
    \ of a local file service into a User Interface using the Model-View-ViewModel\
    \ (MVVM) design pattern. The chapter will continue to reinforce the importance\
    \ of software decoupling, building upon the concepts introduced in the previous\
    \ chapter. As you progress through the book, this framework's protocol will be\
    \ replaced by a more versatile, generic solution that further enhances software\
    \ decoupling.\n\nFor individuals unfamiliar with the MVVM design pattern, it is\
    \ an architectural pattern in computer software that facilitates the separation\
    \ of the graphical user interface (view) from the business logic (model) such\
    \ that the view is not dependent upon any specific model platform.^([³](#fn3))\
    \ The internet offers an abundance of articles on this topic specifically tailored\
    \ for iOS mobile apps.\n\nIn this chapter, we’ll focus on designing the `RecordingsFW`\
    \ Framework with an emphasis on scalability, maintainability, and reusability.\
    \ You’ll see how to integrate a local file service into a User Interface using\
    \ the Model-View-ViewModel (MVVM) design pattern, reinforcing the principles of\
    \ software decoupling introduced earlier. As you progress, the framework’s protocol\
    \ will eventually evolve into a more versatile, generic solution, further enhancing\
    \ modularity and flexibility across different applications."
