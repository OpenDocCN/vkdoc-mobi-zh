    A Publisher will need to be created, as an extension in this example, to wait
    asynchronously for a publisher to emit a value that satisfies a given condition.
    It uses withCheckedContinuation to suspend the async function until the condition
    is met or a timeout occurs, making it easier to test @Published properties in
    an async context.


    Add the following code to the class:


    ```

    extension Publisher {

    func waitForValue(

    timeout: Duration = .seconds(1),

    condition: @escaping (Output) -> Bool

    ) async -> Output? {

    await withCheckedContinuation { continuation in

    var cancellable: AnyCancellable?

    let deadline = ContinuousClock.now + timeout

    cancellable = self.sink(

    receiveCompletion: { _ in

    continuation.resume(returning: nil)

    cancellable?.cancel()

    },

    receiveValue: { value in

    if condition(value) {

    continuation.resume(returning: value)

    cancellable?.cancel()

    }

    })

    Task {

    try? await Task.sleep(until: deadline, clock: .continuous)

    continuation.resume(returning: nil)

    cancellable?.cancel()

    }

    }

    }

    }

    ```


