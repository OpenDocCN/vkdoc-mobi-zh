- fmt: '# Configuring an External API


    Since the mode of operation for this framework is to show “published recordings,”
    they will need to be fetched remotely using a network API request. The sample
    code in this chapter doesn’t include an actual service to support this, so it
    will need to be simulated.


    There are various ways to simulate network API requests, including the use of
    Third-Party “stubbing” libraries such as `OHHTTPStubs`^([^(10)](#fn10)) and “mocking”
    services such as `Beeceptor`.^([^(11)](#fn11)) The sample code in this chapter
    will use `Beeceptor` to return the following JSON data representing audio recordings
    via network API request:


    ```json

    [

    {

    "bitrate": 131072,

    "copyright": "© 2025 Words and Music by John Doe",

    "date": "04/28/2025",

    "length": 270,

    "size": 5242880,

    "title": "My (Published) Electric Anthem",

    "type": "AAC Audio File",

    "url": "https://graphixware.com/MyElectricAnthem.aac"

    },

    {

    "bitrate": 131072,

    "copyright": "© 2025 Words and Music by John Doe",

    "date": "08/24/2025",

    "length": 228,

    "size": 10485760,

    "title": "My (Published) Acoustic Ballad",

    "type": "AAC Audio File",

    "url": "https://graphixware.com/MyAcousticBallad.aac"

    }

    ]

    ```


    Define an enum in `RecordingsProtocol.swift` to represent the endpoint:


    ```swift

    enum RecordingsEndpoint {

    case fetchRecordings

    var urlString: String {

    switch self {

    case .fetchRecordings:

    return "https://graphixware.free.beeceptor.com/scratchtrax/recordings"

    }

    }

    }

    ```


    The URL in this example is not guaranteed to remain valid, so now is a good time
    to create a free account, as well as your own endpoint, at `Beeceptor.com`.


    Define another enum in `RecordingsProtocol.swift` to handle simulated error conditions:


    ```swift

    enum RecordingsError: Error {

    case request(message: String)

    case network(message: String)

    case status(message: String)

    case parsing(message: String)

    case other(message: String)

    }

    ```


    ## Designing a Generic Service


    Create a new class called `PublishedRecordingsService` under the framework project
    to use as the remote service. This service will fetch recordings via network API
    and publish it to objects that have subscribed to change notifications, e.g.,
    `ViewModel`. To prevent multiple instances of the class from being created, it
    will be defined as a singleton:


    ```swift

    class PublishedRecordingsService {

    public static let shared = PublishedRecordingsService()

    private init() {

    }

    }

    ```


    Define a protocol for the remote service in `PublishedRecordingsService`. Any
    service that adheres to the protocol will be able to be injected into the `ViewModel`,
    without changes needed to the `ViewModel`. The protocol and implementation will
    utilize `Combine`, so the `Combine` framework will need to be imported as well:


    ```swift

    import Combine

    protocol StubAPIService {

    func fetch<T: Decodable>(_t: T.Type, url: URL) -> AnyPublisher<T, RecordingsError>

    }

    ```


    The `fetch()` function utilizes Swift Generics. Swift Generics allow flexible,
    reusable functions and types to be created that can work with different types,
    avoiding duplication of code.^([^(12)](#fn12))


    When the `fetch()` function is called, the desired type of object to be returned
    from the network API request will be passed into the function:


    ```swift

    service.fetch(_t: Recording.self, url: url)

    ```


    The return value of the `fetch` function is defined as `AnyPublisher<T, RecordingsError>`.
    `AnyPublisher` is a concrete implementation of `Publisher` that has no significant
    properties of its own and merely acts as a pass-through object. A `Publisher`
    delivers elements to one or more `Subscriber` instances. The subscriber’s `Input`
    and `Failure` associated types must match the `Output` and `Failure` types declared
    by the publisher. The publisher implements the `receive(subscriber:)` method to
    accept a subscriber.^([^(13)](#fn13))


    Adopt the protocol in `PublishedRecordingsService` and implement its required
    behavior:


    ```swift

    class PublishedRecordingsService: StubAPIService {

    public static let shared = PublishedRecordingsService()

    private init() {

    }

    func fetch<T: Decodable>(_t: T.Type, url: URL) -> AnyPublisher<T, RecordingsError>
    {

    return URLSession.shared.dataTaskPublisher(for: url)

    .mapError { error in

    RecordingsError.network(message: error.localizedDescription)

    }

    .flatMap(maxPublishers: .max(1)) { pair in

    self.decode(pair.data)

    }

    .eraseToAnyPublisher()

    }

    private func decode<T: Decodable>(_ data: Data) -> AnyPublisher<T, RecordingsError>
    {

    let decoder = JSONDecoder()

    decoder.dateDecodingStrategy = .secondsSince1970

    return Just(data)

    .decode(type: T.self, decoder: decoder)

    .mapError { error in

    RecordingsError.parsing(message: error.localizedDescription)

    }

    .eraseToAnyPublisher()

    }

    }

    ```


    `mapError` converts any failure from the upstream publisher into a new error.


    `flatMap` transforms elements from an upstream publisher into a new publisher
    up to a maximum number of publishers you specify. In this example, `flatMap` decodes
    the output from the upstream publisher using a specified decoder to produce `Recording`
    models.


    `eraseToAnyPublisher` wraps this publisher with a type eraser to expose an instance
    of `AnyPublisher` to the downstream subscriber rather than this publisher’s actual
    type.


    ## Designing a ViewModel with Dependency Injection


    Create a ViewModel named `PublishedRecordingsViewModel` to fetch published recordings
    and notify the View to update its treatment.


    `PublishedRecordingsViewModel` will adopt the `RefreshableViewModel` protocol
    to ensure the required behavior needed by the View is supported. The ViewModel
    will also adopt the `ObservableObject`^([^(14)](#fn14)) protocol to support “pre-publishing”
    a change.


    The `service` and `endpoint` variables will need to be defined to support Dependency
    Injection. Since these are external dependencies, they will be injected into the
    ViewModel via constructor to maintain decoupling within the ViewModel.


    The `recordings` variable will need to be defined using the `@Published` typealias.
    It will maintain transformed data returned from the service and publish change
    events to subscribers whenever set.


    The `fetch()` function will fetch the audio recording metadata generically using
    the injected service and endpoint, store it in the `recordings` variable, and
    notify subscribers of the change.


    Add the following code to the class:


    ```swift

    import Foundation

    import Combine

    class PublishedRecordingsViewModel: RefreshableViewModel, ObservableObject {

    // Dependency Injection...

    private let service: StubAPIService

    private let endpoint: RecordingsEndpoint

    private var disposables = Set<AnyCancellable>()

    @Published private(set) var recordings: [Recording] = []

    init(service: StubAPIService, endpoint: RecordingsEndpoint) {

    self.service = service

    self.endpoint = endpoint

    }

    func getRecordings() -> [Recording] {

    return recordings

    }

    func refresh() {

    fetch()

    }

    func fetch() {

    if let url = URL(string: endpoint.urlString) {

    service.fetch(_t: Recording.self, url: url)

    .receive(on: DispatchQueue.main)

    .sink { [weak self] value in

    switch value {

    case .failure:

    self?.recordings = []

    case .finished:

    break

    }

    } receiveValue: { [weak self] response in

    self?.recordings = response

    }

    .store(in: &disposables)

    }

    }

    }

    ```'
  raw: '## Configuring an External API


    Since the mode of operation for this framework is to show “published recordings,”
    they will need to be fetched remotely using a network API request. The sample
    code in this chapter doesn’t include an actual service to support this, so it
    will need to be simulated.


    There are various ways to simulate network API requests, including the use of
    Third-Party “stubbing” libraries such as OHHTTPStubs^([^(10)](#fn10)) and “mocking”
    services such as Beeceptor.^([^(11)](#fn11)) The sample code in this chapter will
    use Beeceptor to return the following JSON data representing audio recordings
    via network API request:


    ```

    [

    {

    "bitrate": 131072,

    "copyright": "© 2025 Words and Music by John Doe",

    "date": "04/28/2025",

    "length": 270,

    "size": 5242880,

    "title": "My (Published) Electric Anthem",

    "type": "AAC Audio File",

    "url": "https://graphixware.com/MyElectricAnthem.aac"

    },

    {

    "bitrate": 131072,

    "copyright": "© 2025 Words and Music by John Doe",

    "date": "08/24/2025",

    "length": 228,

    "size": 10485760,

    "title": "My (Published) Acoustic Ballad",

    "type": "AAC Audio File",

    "url": "https://graphixware.com/MyAcousticBallad.aac"

    }

    ]

    ```


    Define an enum in **RecordingsProtocol.swift** to represent the endpoint:


    ```

    enum RecordingsEndpoint {

    case fetchRecordings

    var urlString: String {

    switch self {

    case .fetchRecordings:

    return "https://graphixware.free.beeceptor.com/scratchtrax/recordings"

    }

    }

    }

    ```


    The URL in this example is not guaranteed to remain valid, so now is a good time
    to create a free account, as well as your own endpoint, at Beeceptor.com.


    Define another enum in **RecordingsProtocol.swift** to handle simulated error
    conditions:


    ```

    enum RecordingsError: Error {

    case request(message: String)

    case network(message: String)

    case status(message: String)

    case parsing(message: String)

    case other(message: String)

    }

    ```


    ## Designing a Generic Service


    Create a new class called **PublishedRecordingsService** under the framework project
    to use as the remote service. This service will fetch recordings via network API
    and publish it to objects that have subscribed to change notifications, e.g.,
    ViewModel. To prevent multiple instances of the class from being created, it will
    be defined as a singleton:


    ```

    class PublishedRecordingsService {

    public static let shared = PublishedRecordingsService()

    private init() {

    }

    }

    ```


    Define a protocol for the remote service in **PublishedRecordingsService**. Any
    service that adheres to the protocol will be able to be injected into the ViewModel,
    without changes needed to the ViewModel. The protocol and implementation will
    utilize Combine, so the Combine framework will need to be imported as well:


    ```

    import Combine

    protocol StubAPIService {

    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T: Decodable

    }

    ```


    The **fetch()** function utilizes **Swift** **Generics**. Swift Generics allow
    flexible, reusable functions and types to be created that can work with different
    types, avoiding duplication of code.^([^(12)](#fn12))


    When the **fetch()** function is called, the desired type of object to be returned
    from the network API request will be passed into the function:


    ```

    service.fetch(_t: Recording.self, url: url)

    ```


    The return value of the **fetch** function is defined as **AnyPublisher****<>**.
    **AnyPublisher** is a concrete implementation of **Publisher** that has no significant
    properties of its own and merely acts as a pass-through object. A Publisher delivers
    elements to one or more Subscriber instances. The subscriber’s Input and Failure
    associated types must match the Output and Failure types declared by the publisher.
    The publisher implements the receive(subscriber:) method to accept a subscriber.^([^(13)](#fn13))


    Adopt the protocol in **PublishedRecordingsService** and implement its required
    behavior:


    ```

    class PublishedRecordingsService: StubAPIService {

    public static let shared = PublishedRecordingsService()

    private init() {

    }

    func fetch(_t: T.Type, url: URL) -> AnyPublisher where T : Decodable {

    return URLSession.shared.dataTaskPublisher(for: url)

    .mapError { error in

    RecordingsError.network(message: error.localizedDescription)

    }

    .flatMap(maxPublishers: .max(1)) { pair in

    self.decode(pair.data)

    }

    .eraseToAnyPublisher()

    }

    private func decode(_ data: Data) -> AnyPublisher {

    let decoder = JSONDecoder()

    decoder.dateDecodingStrategy = .secondsSince1970

    return Just(data)

    .decode(type: T.self, decoder: decoder)

    .mapError { error in

    RecordingsError.parsing(message: error.localizedDescription)

    }

    .eraseToAnyPublisher()

    }

    }

    ```


    **mapError** converts any failure from the upstream publisher into a new error.


    **flatMap** transforms elements from an upstream publisher into a new publisher
    up to a maximum number of publishers you specify. In this example, flatMap decodes
    the output from the upstream publisher using a specified decoder to produce **Recording**
    models.


    **eraseToAnyPublisher** wraps this publisher with a type eraser to expose an instance
    of AnyPublisher to the downstream subscriber rather than this publisher’s actual
    type.


    ## Designing a ViewModel with Dependency Injection


    Create a ViewModel named **PublishedRecordingsViewModel** to fetch published recordings
    and notify the View to update its treatment.


    **PublishedRecordingsViewModel** will adopt the **RefreshableViewModel** protocol
    to ensure the required behavior needed by the View is supported. The ViewModel
    will also adopt the **ObservableObject**^([^(14)](#fn14)) protocol to support
    “pre-publishing” a change.


    The **service** and **endpoint** variables will need to be defined to support
    Dependency Injection. Since these are external dependencies, they will be injected
    into the ViewModel via constructor to maintain decoupling within the ViewModel.


    The **recordings** variable will need to be defined using the **@Published** typealias.
    It will maintain transformed data returned from the service and publish change
    events to subscribers whenever set.


    The **fetch****()** function will fetch the audio recording metadata generically
    using the injected service and endpoint, store it in the **recordings** variable,
    and notify subscribers of the change.


    Add the following code to the class:


    ```

    import Foundation

    import Combine

    class PublishedRecordingsViewModel: RefreshableViewModel, ObservableObject {

    // Dependency Injection...

    private let service: StubAPIService

    private let endpoint: RecordingsEndpoint

    private var disposables = Set()

    @Published private(set) var recordings: [Recording] = []

    init(service: StubAPIService, endpoint: RecordingsEndpoint) {

    self.service = service

    self.endpoint = endpoint

    }

    func getRecordings() -> [Recording] {

    return recordings

    }

    func refresh() {

    fetch()

    }

    func fetch() {

    if let url = URL(string: endpoint.urlString) {

    service.fetch(_t: Recording.self, url: url)

    .receive(on: DispatchQueue.main)

    .sink { [weak self] value in

    switch value {

    case .failure:

    self?.recordings = []

    case .finished:

    break

    }

    } receiveValue: { [weak self] response in

    self?.recordings = response

    }

    .store(in: &disposables)

    }

    }

    }

    ```'
