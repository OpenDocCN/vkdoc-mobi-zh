    ## 运行应用目标


    在方案下拉菜单中将该应用设置为活跃方案，构建应用，然后使用任一 Xcode 模拟器或实际设备运行它。应用应能正常编译和运行，并展示相应的框架功能（图 3-5）。


    ![开发环境截图，显示 iPhone 17 Pro Max 上的移动应用模拟。应用显示一个标题为"已发布录音"的列表，包含两个条目："我的（已发布）电子颂歌"和"我的（已发布）原声民谣"，均标注为
    John Doe 创作于 2023 年。开发界面左侧显示文件目录，包含多个 Swift 文件，右侧为项目设置。](img/678928_1_En_3_Fig5_HTML.jpg)


    图 3-5


    Xcode 模拟器


    现在，该框架能够在不修改代码的情况下，在不同的移动应用中同时显示本地和远程音频录音。


    在本章中，你增强了 `RecordingsFW` 框架以支持远程音频录音，并使用 `MVVM` 集成了网络 API。你应用了依赖注入来将 `ViewModel`
    与服务实现解耦，并使用 `Combine` 处理异步数据流。完成这些步骤后，你构建了一个灵活、可复用的框架，能够支持多个应用而无需修改核心代码，强化了可扩展
    `iOS` 开发的现代设计原则。


    随着 `RecordingsFW` 框架被扩展以支持远程录音，并通过依赖注入实现完全解耦，你已准备好探索动态功能启用。在下一章中，我们将设计一个能够在运行时暴露和管理功能的框架，包括通过应用内购买解锁的功能。


    脚注 1 2 3 4 5 6 7 8 9


    # 4. 为动态功能启用奠定基础


    设计 `RecordingsStoreFW` 框架


    本章将为 `iOS` 框架中的动态功能启用奠定架构基础。你将设计一个可扩展、模块化的框架，能够在运行时暴露、激活和管理功能。我们将利用模拟的应用内购买^(¹⁶)来演示如何解锁框架中已有的内置功能，以推动收入增长。


    应用内购买类似于数字商店，允许用户从应用内部购买内容和功能，而无需下载并安装新版本的应用。应用内购买使移动应用开发者能够将功能集设计为独立的实体，用户可以根据体验和需求进行购买。应用内购买由
    `Apple StoreKit` 框架以及 `App Store Connect` 门户提供支持。Apple 已对应用内购买的集成、配置和测试提供了详细的文档，因此本章不将重点放在这些方面。本章将重点介绍如何通过模拟的应用内购买来启用外部框架中的功能。


    在本章中，我们将构建 `RecordingsStoreFW` 框架，以支持 `iOS` 框架中的动态功能启用。你将创建一个可扩展、模块化的系统，能够在运行时暴露、激活和管理功能。通过使用模拟的应用内购买，我们将演示如何在不破坏解耦架构的前提下，解锁框架内的功能以推动收入。与之前一样，`MVVM`
    将构建框架结构，`SwiftData` 支持模型，`SwiftUI` 和 `Combine` 处理视图，依赖注入将桩 API 集成到 `ViewModel`
    中。`ViewModel` 也将通过依赖注入集成第三方桩 API。


    ## 设置 iOS 框架和项目


    需要创建一个新的 `iOS` 框架和项目并进行配置，类似于第 1 章。使用 `RecordingsStore` 前缀命名项目及对应的文件，例如 `RecordingsStoreFW`：


    1.  执行第 1 章中"创建 iOS 框架"部分列出的步骤。


    2.  执行第 1 章中"配置 iOS 框架"部分列出的步骤。

