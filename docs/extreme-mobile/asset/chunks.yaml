    Text File,” “SceneKit Catalog,” “SceneKit Scene File,” and “Settings Bundle.”
    A “Filter” search bar is at the top right. “Cancel,” “Previous,” and “Next” buttons
    are at the bottom.](images/678928_1_En_3_Chapter/678928_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    New File Template


    1.  Right-click the framework folder within the **Project Navigator** and select
    **New File from Template…**


    2.  Select the **Property List** template under the **Resource** group (**Figure** [**3-1**](#678928_1_En_3_Chapter.xhtml#Fig1))
    and **Next**


    3.  Save the file as **Recordings.plist**


