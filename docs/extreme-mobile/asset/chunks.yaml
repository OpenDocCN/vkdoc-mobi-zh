    guard let winScene = (scene as? UIWindowScene) else { return }

    if let storyboard = session.configuration.storyboard {

    if let tabBarController = storyboard.instantiateInitialViewController() as? UITabBarController
    {

    window = UIWindow(windowScene: winScene)

    window?.rootViewController = tabBarController

    window?.makeKeyAndVisible()

    // Add framework User Interfaces via protocol...

    var tbcViewControllers = tabBarController.viewControllers ?? []

    tbcViewControllers.append(SettingsProtocol().instantiateRootViewController(configuration:
    ["TestAttribute" : true]))

    tabBarController.setViewControllers(tbcViewControllers, animated: false)

    tabBarController.tabBar.isHidden = (tbcViewControllers.count <= 1)

    }

    }

    }

    ```


    ## Running the App Target


    Set **SettingsApp** as the active scheme in the scheme drop-down, build the app,
    and run it using one of the Xcode simulators or an actual device. The app should
    compile and run properly, exposing the corresponding framework features (**Figure** [**1-11**](#678928_1_En_1_Chapter.xhtml#Fig11)).


    ![Screenshot of a development environment displaying a mobile app simulator. The
    simulator shows a “Settings” screen with details: Name as “Graphixware, LLC,”
    Email as “gw@graphixware.com,” and Website as “https:/graphixware.com.” The development
    environment includes a project file structure on the left and build settings on
    the right.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Xcode Simulator


    In this chapter, you learned how to design and implement an iOS Framework with
    Swift protocols. You built a framework from scratch, explored how to structure
    it for modularity and reusability, and integrated it into a mobile app. By completing
    these steps, you gained practical experience in creating frameworks that can simplify
    app architecture and promote code sharing across projects.


    With your first iOS Framework built and integrated into an app, you’re ready to
    explore more advanced design techniques. In the next chapter, we’ll apply modern
    architectural patterns to create scalable, maintainable frameworks that can adapt
    to multiple apps and use cases.


    Footnotes [1](#678928_1_En_1_Chapter.xhtml#Fn1_source)   [2](#678928_1_En_1_Chapter.xhtml#Fn2_source)


    # 2. Applying Modern Design Patterns for Scalable, Maintainable Frameworks


    Designing the RecordingsFW Framework


    This chapter will delve into the intricacies of designing an iOS Framework that
    can be utilized across different applications for various purposes. It will showcase
    the efficacy of software reusability by demonstrating the integration of a local
    file service into a User Interface using the Model-View-ViewModel (MVVM) design
    pattern. The chapter will continue to reinforce the importance of software decoupling,
    building upon the concepts introduced in the previous chapter. As you progress
    through the book, this framework''s protocol will be replaced by a more versatile,
    generic solution that further enhances software decoupling.


    For individuals unfamiliar with the MVVM design pattern, it is an architectural
    pattern in computer software that facilitates the separation of the graphical
    user interface (view) from the business logic (model) such that the view is not
    dependent upon any specific model platform.^([³](#fn3)) The internet offers an
    abundance of articles on this topic specifically tailored for iOS mobile apps.


    In this chapter, we’ll focus on designing the RecordingsFW Framework with an emphasis
    on scalability, maintainability, and reusability. You’ll see how to integrate
    a local file service into a User Interface using the Model-View-ViewModel (MVVM)
    design pattern, reinforcing the principles of software decoupling introduced earlier.
    As you progress, the framework’s protocol will eventually evolve into a more versatile,
    generic solution, further enhancing modularity and flexibility across different
    applications.'
  trans: "\n# 创建应用目标用户界面\n\n创建应用目标时，会生成一组默认文件。其中部分文件无需使用，另一些则需要修改以暴露框架的功能，在本例中即框架的用户界面。请执行以下步骤来创建应用目标的用户界面：\n\
    \n1. 从**项目导航器**中选择 `ViewController.swift` 并删除，因为它不需要\n2. 从**项目导航器**中选择 `Main.storyboard`，然后从**故事板导航器**中选择**视图控制器场景**并删除\n\
    3. 选择**界面生成器**左下角附近的**库**图标（+ 图标），并创建一个**标签栏控制器**\n4. 删除**项目 1 场景**和**项目 2 场景**，因为它们不需要\n\
    \n# 设计应用目标用户界面\n\n请执行以下步骤来配置应用目标的用户界面：\n\n![Xcode 界面显示 iOS 应用的故事板。主窗口显示一个“标签栏控制器”，其中包含标签栏的占位符。左侧面板列出项目文件，包括\
