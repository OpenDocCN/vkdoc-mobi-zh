- fmt: '# Creating a Localization File for the App


    For the `SettingsFW` framework to display in the correct locale, the app containing
    the framework must also contain a localization file, albeit empty. Without doing
    so will result in the default locale, English, always being displayed.


    Create a localization file for `ScratchTraxApp2`:


    ![Screenshot of an Xcode project interface showing a file structure on the left
    with "Localizable.stringsdict" selected. The center panel displays a dictionary
    with a localized string key. The right panel shows file details, including name,
    location, and localization options for English, French, and Italian. The project
    is named "ScratchTraxApp2" for an iPhone 17 Pro Max.](images/678928_1_En_9_Chapter/678928_1_En_9_Fig3_HTML.jpg)


    **Figure 9-3** Stringsdict Editor


    1.  Right-click the `ScratchTraxApp2` folder within the `Project Navigator` and
    select `New File from Template…`

    2.  Select the `Stringsdict File (Legacy)` template under the `Resource` group
    and `Next`

    3.  Name the file `Localizable.xcstrings` and create the empty file

    4.  Select `Localizable.xcstrings` under the `ScratchTraxApp2` folder within the
    `Project Navigator` and select `Show the File inspector` on the right

    5.  Under the `Localization` section, check English, French, and Italian (**Figure**
    [**9-3**](#678928_1_En_9_Chapter.xhtml#Fig3))


    ## Configuring the Scheme


    Before running the app in an iOS simulator, the `App Language` and `App Region`
    settings for the `ScratchTraxApp2` Scheme need to be set to the desired language:


    ![Screenshot of a software development environment showing the "Options" tab for
    a project named "ScratchTraxApp2." The interface includes various configuration
    settings such as Core Location, App Data, GameKit Configuration, and more. Options
    like "Allow Location Simulation" and "Enable Debug Mode" are visible. The app
    language and region are set to French and France, respectively. The interface
    includes buttons for duplicating and managing schemes, and a "Close" button.](images/678928_1_En_9_Chapter/678928_1_En_9_Fig4_HTML.jpg)


    **Figure 9-4** Edit Scheme Options


    1.  Select `ScratchTraxApp2` in the scheme selection drop-down field above the
    editor

    2.  Select `Edit Scheme…` in the scheme selection drop-down field above the editor

    3.  Select the `Run` scheme in the Scheme navigator and the `Options` tab in the
    Scheme settings

    4.  Change `App Language` to French and the `App Region` to France (**Figure**
    [**9-4**](#678928_1_En_9_Chapter.xhtml#Fig4))


    ## Running the App in a Simulator


    When the app is run in the iOS simulator, the Settings view Title, Name, Email
    Address, and Website labels will be displayed in the French Locale (**Figure**
    [**9-5**](#678928_1_En_9_Chapter.xhtml#Fig5)).


    ![Screenshot of a development environment displaying an iPhone simulator with
    a "Settings" screen. The screen shows contact information for "Graphixware, LLC,"
    including an email address and website URL. The simulator is part of a project
    named "ScratchTraxApp2," with localization options for English, French, and Italian.
    The development interface includes a file directory and settings for localization
    and text indentation.](images/678928_1_En_9_Chapter/678928_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5** Xcode Simulator


    ## Running the App on a Device


    In order to run the app on a real device and receive the same results, the following
    steps will need to be performed:


    ![Screenshot of a development environment displaying an iPhone simulator with
    a "Settings" screen. The screen shows contact information for "Graphixware, LLC,"
    including an email address "gw@graphixware.com" and a website "https:/graphixware.com,"
    with Italian flags next to each item. The development environment includes a file
    directory on the left, showing various project files, and a panel on the right
    with localization settings for English, French, and Italian. The bottom of the
    simulator displays navigation icons for "Pro Features," "Recording Studio," "Recordings,"
    and "Settings."](images/678928_1_En_9_Chapter/678928_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** App Running on Device


    1.  Edit the Scheme again and set the `App Language` to `System Language`, `App
    Region` to `System Region`, and `Localization Debugging` to checked (SwiftUI automatically
    shows non-localized text in uppercase)

    2.  Select a real device under `Run Destinations` via Xcode and then select Run
    to install the app on the device

    3.  On the device, go to `Settings/General/Language & Region` and `Add Italian`
    (choose `Use Italian` when prompted)

    4.  After the device reboots, run the app on the device (outside of Xcode) to
    view the results (**Figure** [**9-6**](#678928_1_En_9_Chapter.xhtml#Fig6))


    In this chapter, you localized the `SettingsFW` Framework to support multiple
    languages, applying best practices for text adaptation. By completing this work,
    `ScratchTraxApp2` can now display settings in different languages, demonstrating
    how iOS frameworks can be prepared for international users while maintaining modularity
    and usability


    After preparing your frameworks for international audiences, you’re ready to explore
    how to make your apps visually flexible. In the next chapter, we’ll implement
    dynamic branding to allow consistent, centralized styling across frameworks without
    changing code.


    Footnotes [1](#678928_1_En_9_Chapter.xhtml#Fn1_source)


    # 10. Designing Dynamic Branding in iOS Frameworks


    Enhancing the `ScratchTraxApp2` App


    Branding involves creating a distinct and memorable identity for an app that ensures
    consistency across all platforms and materials. Key aspects of branding include
    the app icon, splash screen, color palette, typography, imagery, iconography,
    accessibility, and UI elements.


    Comprehensive documentation can be found on the Apple Developers website regarding
    Branding,^([^(30)](#fn30)) Human Interface Guidelines (HIG),^([^(31)](#fn31))
    `UIAppearance`,^([^(32)](#fn32)) and Configuration.^([^(33)](#fn33))


    In this chapter, we’ll enhance the `ScratchTraxApp2` App by implementing dynamic
    branding across frameworks. You’ll learn how to centralize font and style attributes
    for both `UIKit` and `SwiftUI` components, ensuring consistent app identity. By
    applying these techniques, your app will be able to update branding dynamically
    without modifying the underlying code.


    ## Dynamic Branding Techniques


    Dynamic branding will first be demonstrated with `UIKit` components, followed
    by `SwiftUI` components. `UIKit` elements will use the `Configuration` feature
    when available and alternative techniques otherwise. `SwiftUI` elements will leverage
    `Environment Keys`. Class, protocol, and struct extensions will be used to apply
    branding consistently. All dynamic branding will be managed from a centralized
    location to ensure uniform appearance across the app’s user interfaces, which
    are being provided by the frameworks.


    In iOS 26+, UIKit components that support the modern `Configuration` feature include
    `UIButton`, `UIBarButtonItem`, `UISegmentedControl`, `UIToolbar`, `UITabBarItem`,
    `UITabBar`, `UINavigationBar`, `UIStackView` buttons embedded in menus, and `UICollectionView`/`UITableView`
    cells via content configuration. Components that don’t support the `Configuration`
    feature and still require direct property settings, or use of the `UIAppearance`
    feature, include `UILabel`, `UITextField`, `UITextView`, `UIImageView`, `UISlider`,
    `UISwitch`, `UIProgressView`, `UIActivityIndicatorView`, and most custom `UIView`
    subclasses.


    `SwiftUI` components will be branded by defining `Environment Keys` for applicable
    component fonts. Extensions on `View` (like `.appBodyFont()` and `.appButtonFont()`)
    apply the fonts automatically, ensuring consistent branding across all `SwiftUI`
    components throughout the app.'
