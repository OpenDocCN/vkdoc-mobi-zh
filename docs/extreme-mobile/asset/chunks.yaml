    init() {

    }

    func getRecordings() -> [Recording] {

    return recordings

    }

    func refresh() {

    fetch()

    }

    private func fetch() {

    }

    }

    ```


    The **recordings** variable **didSet** will need to be overridden to provide a
    way to notify the view when recordings have changed. A compound (function) type^([⁵](#fn5))
    variable will also need to be defined to perform the notification. This will be
    set in the View and will bind the View to the ViewModel:


