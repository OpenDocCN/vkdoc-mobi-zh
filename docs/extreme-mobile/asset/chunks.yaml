    \ how to build flexible, scalable, and maintainable app architectures that can\
    \ easily incorporate modular frameworks. This approach provides a practical blueprint\
    \ for highly adaptable iOS applications.\n\nWith dynamic integration techniques\
    \ in place, you’re ready to unify multiple frameworks into a single, cohesive\
    \ app architecture. In the next chapter, we’ll combine the frameworks developed\
    \ so far into one app, demonstrating modular functionality and revenue-driven\
    \ features across the system.\n\nFootnotes [1](#678928_1_En_7_Chapter.xhtml#Fn1_source)\
    \   [2](#678928_1_En_7_Chapter.xhtml#Fn2_source)\n\n# 8. Unifying the Dynamic\
    \ Framework Architecture\n\nDesigning the ScratchTraxApp2 App\n\nThis chapter\
    \ brings together the frameworks developed throughout this book into a single,\
    \ cohesive architecture. Each framework is integrated to load dynamically at runtime,\
    \ building on the principles introduced in Chapter [7](#678928_1_En_7_Chapter.xhtml).\
    \ This unified system also incorporates In-App Purchases across frameworks, demonstrating\
    \ how dynamic feature enablement can drive modular functionality and revenue growth\
    \ within a scalable iOS architecture.\n\nThe RecordingsStoreFW and RecordingStudioFW\
    \ frameworks will need to be modified as in Chapter [7](#678928_1_En_7_Chapter.xhtml)\
    \ to allow them to be integrated dynamically. SettingsFW will continue to be loaded\
    \ using a protocol.\n\nIn this chapter, we’ll design the ScratchTraxApp2 App to\
    \ bring together all previously developed frameworks into a unified, dynamically\
    \ integrated system. In-App Purchases will showcase how dynamic feature enablement\
    \ can drive modular functionality and revenue growth while maintaining a scalable\
    \ and maintainable iOS architecture.\n\n## Creating Another iOS App\n\nA second\
    \ app will need to be created, **ScratchTraxApp2**, utilizing the frameworks developed\
    \ in the book:\n\n1.  Launch Xcode\n\n2.  Select **Create a new** **Xcode** **project**\n\
    \n3.  Select the **App** template under the **Application** group\n\n4.  Set Product\
    \ Name to **ScratchTraxApp2**\n\n5.  Set Interface to **Storyboard**\n\n6.  Set\
    \ Language to **Swift**"
  trans: "\n### 框架注册\n\n为了给框架提供充足的机会在应用中注册其用户界面视图控制器，它需要在应用生命周期的早期完成注册，最好是在框架加载时，并且在\
    \ `SceneDelegate.willConnectTo()` 执行之前。由于集成到应用中的所有框架都在应用启动其生命周期之前加载完毕，因此检测框架加载至关重要。\n\
    \n那么，在基于 Swift 的框架中如何实现这一点呢？简而言之，这实际上行不通。在 Objective-C 编程语言中，`NSObject` 有一个 `+load`\
    \ 方法，该方法在实例化 Objective-C 对象时，在其所有父类的 `+load` 方法都被调用后，会被自动调用。然而，在 Swift 类中，该方法并不会被自动调用。\n\
    \n这使框架注册过程变得复杂，实际上阻止了它的正常工作。但有一种替代方案。我们将把 Objective-C 与 Swift 桥接起来，让它作为框架加载的代理。\n\
    \n首先，创建一个 Objective-C 头文件：\n\n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n\
    2. 在**Source**组下选择**头文件**模板\n3. 将文件命名为 `RecordingsFWObjcLoader.h`\n\n将以下代码添加到头文件中，以定义\
    \ Objective-C 的类接口：\n\n```\n#ifndef RecordingsFWObjcLoader_h\n#define RecordingsFWObjcLoader_h\n\
    #import \nNS_ASSUME_NONNULL_BEGIN\n@interface RecordingsFWObjcLoader : NSObject\n\
    @end\nNS_ASSUME_NONNULL_END\n#endif /* RecordingsFWObjcLoader_h */\n```\n\n为该类创建一个\
    \ Objective-C 实现文件：\n\n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n\
    2. 在**Source**组下选择**Objective-C 文件**模板\n3. 将文件命名为 `RecordingsFWObjcLoader.m`\n\
    \n将以下代码添加到类文件中，以定义 Objective-C 类的实现，该类实现了用于注册钩子的 `+load()` 方法：\n\n```\n#import\
    \ \"RecordingsFWObjcLoader.h\"\n#import \"RecordingsFW/RecordingsFW-Swift.h\"\n\
    @implementation RecordingsFWObjcLoader\n+(void) load {\n    if ([[RecordingsFWSwiftLoader\
    \ alloc] init]) {\n        NSLog(@\"RecordingsFWObjcLoader.load() succeeded...\"\
    );\n    } else {\n        NSLog(@\"RecordingsFWObjcLoader.load() failed...\");\n\
    \    }\n}\n@end\n```\n\n由于 `RecordingsFW/RecordingsFW-Swift.h` 是一个不可见的桥接头文件，用于支持从\
    \ Objective-C 中引用 Swift 类，因此需要设置以下构建设置来强制编译器生成它：\n\n1. 在**项目导航器**中选择 `RecordingsFW`\
    \ 项目文件夹\n2. 选择 `RecordingsFW` 目标\n3. 选择**构建设置**选项卡，搜索**Install Generated Header**，并将其设置为**YES**\n\
    \n> **注意：** 在完成下一步之前，`RecordingsFWObjcLoader.m` 将无法编译。\n\n创建一个用于注册框架的 Swift 文件：\n\
    \n1. 在**项目导航器**中右键点击 `RecordingsFW` 项目文件夹，然后选择**从模板新建文件…**\n2. 在**Source**组下选择**Swift\
    \ 文件**模板\n3. 将文件命名为 `RecordingsFWSwiftLoader.swift`\n\n将以下代码添加到类中，以执行框架注册，从而让应用能够暴露框架的功能：\n\
    \n```\nimport Foundation\n\n@objcMembers public class RecordingsFWSwiftLoader:\
    \ NSObject {\n    override public init() {\n        super.init()\n        initViews()\n\
    \    }\n\n    func initViews() {\n        let config = [ \"bundle\": \"com.gw.RecordingsFW\"\
    , \"storyboard\": \"RecordingsUI\", \"view\": \"RecordingsNC\", \"title\": \"\
    Recordings\", \"icon\": \"music.note.list\"]\n        var configs: [[String:String]]\
    \ = []\n        if let persistedConfigs = UserDefaults.standard.object(forKey:\
    \ \"views\") as? [Dictionary], !persistedConfigs.isEmpty {\n            configs.append(contentsOf:\
    \ persistedConfigs)\n            if !findConfig(configs: persistedConfigs) {\n\
    \                configs.append(config)\n            }\n        } else {\n   \
    \         configs.append(config)\n        }\n        UserDefaults.standard.set(configs,\
    \ forKey: \"views\")\n    }\n\n    func findConfig(configs: [[String:String]])\
    \ -> Bool {\n        var found = false\n        for config in configs {\n    \
    \        if config[\"bundle\"] == \"com.gw.RecordingsFW\", config[\"storyboard\"\
    ] == \"RecordingsUI\", config[\"view\"] == \"RecordingsNC\" {\n              \
    \  found = true\n                break\n            }\n        }\n        return\
    \ found\n    }\n}\n```\n\n### 关键测试\n\n在方案下拉菜单中将应用设置为当前活动方案，构建应用，然后使用 Xcode 模拟器或真实设备运行它。代码应能正常编译和运行。结果应与**图\
    \ 7-4**中的截图一致。\n\n当框架被加载时，它会注册自己的视图控制器。应用随后从 `UserDefaults` 中检索此注册信息，实例化相应的视图控制器，将其集成到自己的用户界面中，并覆盖任何框架属性列表设置，以确保视图在“录音”功能中显示**已发布**的音频录音。\n\
    \n![开发环境截图，显示一个 iPhone 模拟器上运行着一个名为“Published Recordings”的应用。应用列出了两条录音：“My (Published)\
    \ Electric Anthem”和“My (Published) Acoustic Ballad”，作者均为 John Doe。模拟器周围是 Xcode\
    \ 中“ScratchTraxApp1”项目的代码编辑器及项目文件与设置，包括“AppDelegate.swift”和“Main.storyboard”等文件。](img/678928_1_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4** Xcode 模拟器\n\n在本章中，你成功地将一个框架动态集成到了 `ScratchTraxApp1` 应用中，没有使用协议，也没有修改应用底层代码（在为了能够集成而修改代码之后）。你探索了无代码框架集成的技术，展示了如何构建灵活、可扩展且易于维护的应用架构，能够轻松集成模块化框架。这种方法为构建高度可适配的\
    \ iOS 应用提供了一个实用的蓝图。\n\n掌握了动态集成技术后，你就可以将多个框架统一到一个单一的、内聚的应用架构中了。在下一章中，我们将把目前开发的所有框架合并到一个应用中，展示跨系统的模块化功能和驱动收入的功能。\n\
    \n# 8. 统一动态框架架构\n\n## 设计 ScratchTraxApp2 应用\n\n本章将把本书中开发的所有框架整合到一个统一、内聚的架构中。每个框架都基于第\
    \ 7 章中介绍的原则，在运行时动态加载集成。这个统一系统还跨框架集成了应用内购买，展示了动态功能启用在可扩展的 iOS 架构中如何驱动模块化功能和收入增长。\n\
    \n`RecordingsStoreFW` 和 `RecordingStudioFW` 框架需要像第 7 章中那样进行修改，以便它们能够被动态集成。`SettingsFW`\
    \ 将继续使用协议进行加载。\n\n在本章中，我们将设计 `ScratchTraxApp2` 应用，将之前开发的所有框架整合到一个统一的、动态集成的系统中。应用内购买将展示动态功能启用如何在保持可扩展和可维护的\
    \ iOS 架构的同时，驱动模块化功能和收入增长。\n\n### 创建另一个 iOS 应用\n\n需要创建第二个应用 `ScratchTraxApp2`，使用本书中开发的框架：\n\
    \n1. 启动 Xcode\n2. 选择**创建一个新的 Xcode 项目**\n3. 在**Application**组下选择**App**模板\n4.\
    \ 将产品名称设置为 `ScratchTraxApp2`\n5. 将界面设置为**Storyboard**\n6. 将语言设置为**Swift**\n"
- fmt: '### Creating a User Interface for the iOS App


    Again, the app will require a user interface to expose the features provided by
    the frameworks. Create and configure a Tab Bar Controller:


    1. Select `ViewController.swift` from within the **Project Navigator** and delete
    it.

    2. Select `Main.storyboard` from within the **Project Navigator** to display the
    **Interface Builder**.

    3. Select the **View Controller Scene** from within the **Storyboard Navigator**
    and delete it.

    4. Select the **Library** icon (+) at the bottom left of the **Interface Builder**
    and create a **Tab Bar Controller**.

    5. Delete **Item 1 Scene** and **Item 2 Scene** in the Storyboard Navigator.

    6. Select **Tab Bar Controller Scene** in the Storyboard Navigator.

    7. Show **Inspectors** using the top right icon.

    8. Select the **Identity Inspector** and input a **Storyboard ID**.

    9. Select the **Attributes Inspector** and select **Is Initial View Controller**.


    ### Creating a Property List for the iOS App


    A Property List will need to be added to the project to override the RecordingsFW
    framework Property List setting, `showPublished`, which controls the framework’s
    mode of operation:


    1. Right-click the folder within the **Project Navigator** and select **New File
    from Template…**.

    2. Select the **Property List** template under the **Resource** group and click
    **Next**.

    3. Name the file `ScratchTraxApp2.plist`.

    4. Select `ScratchTraxApp2.plist` from within the **Project Navigator**.

    5. Select the **+** icon in the Root row of the empty table (hover over the Root
    cell to make it visible).

    6. Create a variable called `showPublished`, with Type set to Boolean and Value
    set to NO.


    ### Creating an Xcode Workspace


    Again, an Xcode workspace will be used to structure the sets of projects needed
    to construct the mobile app in this chapter:


    1. Shut down Xcode if it’s running, launch it, and close the **Welcome to Xcode**
    screen (there’s no option for creating a Workspace so an Xcode menu will be used).

    2. Select the Xcode **File/New/Workspace...** menu.

    3. Name the workspace `ScratchTraxApp2` and save it to the root directory containing
    the other Xcode projects.

    4. Right-click an empty area within the Project Navigator and select **Add Files
    to “ScratchTraxApp2”…**.

    5. Navigate to the directory containing the ScratchTraxApp2 project and add `ScratchTraxApp2.xcodeproj`.

    6. Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**.

    7. Right-click an empty area within the Project Navigator and select **Add Files
    to “ScratchTraxApp2”…**.

    8. Navigate to the directory containing the RecordingsFW project and add `RecordingsFW.xcodeproj`.

    9. Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**.

    10. Right-click an empty area within the Project Navigator and select **Add Files
    to “ScratchTraxApp2”…**.

    11. Navigate to the directory containing the RecordingsFW project and add `RecordingsStoreFW.xcodeproj`.

    12. Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**.

    13. Right-click an empty area within the Project Navigator and select **Add Files
    to “ScratchTraxApp2”…**.

    14. Navigate to the directory containing the RecordingsFW project and add `RecordingStudioFW.xcodeproj`.

    15. Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**.

    16. Right-click an empty area within the Project Navigator and select **Add Files
    to “ScratchTraxApp2”…**.

    17. Navigate to the directory containing the RecordingsFW project and add `SettingsFW.xcodeproj`.

    18. Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**.


    **Add the frameworks to the app:**


    1. Select the root node of the **ScratchTraxApp2** project in the **Project Navigator**.

    2. Select **ScratchTraxApp2** under the **Targets** section.

    3. Select the **General** tab and the **+** icon under the **Frameworks, Libraries,
    and Embedded Content** section.

    4. Add `RecordingsFW.framework`, `RecordingsStoreFW.framework`, `RecordingStudioFW.framework`,
    and `SettingsFW.framework` to the app and verify they appear under the **Frameworks,
    Libraries, and Embedded Content** section with Embed & Sign.


    ### Integrating iOS Frameworks Dynamically


    As previously discussed in Chapter [7](#678928_1_En_7_Chapter.xhtml), the frameworks
    will be integrated into the app from within the `SceneDelegate` class. Select
    that class under the app’s folder, within the **Project Navigator**, and import
    the `SettingsFW` framework. It will be the only framework imported via public
    protocol.


    ```swift

    import SettingsFW

    ```


    As previously noted, a well-known data format will need to be defined. In order
    to instantiate, load, and integrate the framework’s User Interface view controllers,
    the app will need to know the framework Bundle ID, Storyboard Name, Storyboard
    Identifier, title, and icon. Each view registered by a framework will be added
    to a `UserDefaults` top-level “views” key. The following will be used in each
    of the corresponding framework’s registration:


    **RecordingsFW.framework:**


    ```swift

    let config = [ "bundle": "com.gw.RecordingsFW", "storyboard": "RecordingsUI",
    "view":

    "RecordingsNC", "title": "Recordings", "icon": "music.note.list"]

    ```


    **RecordingsStoreFW.framework:**


    ```swift

    let config = [ "bundle": "com.gw.RecordingsStoreFW", "storyboard": "RecordingsStoreUI",

    "view": "RecordingsStoreVC", "title": "Pro Features", "icon": "storefront"]

    ```


    **RecordingStudioFW.framework:**


    ```swift

    let config = [ "bundle": "com.gw.RecordingStudioFW", "storyboard": "RecordingStudioUI",

    "view": "RecordingStudioNC", "title": "Recording Studio", "icon": "music.note"]

    ```


    To implement the registration process for the app, `SceneDelegate.willConnectTo()`
    will need to search for a top-level “views” key via `UserDefaults`. If found,
    it will iterate through the array of registrations and add an instantiated view
    controller to its tab bar controller for each one found. Once completed, it will
    check for an app Property List setting that overrides a corresponding one in a
    framework, and if found, propagate it via `UserDefaults` for use in framework
    code.


    The framework protocol referenced in each framework’s internal App Target will
    no longer be needed. Instead, replace this app’s `SceneDelegate.willConnectTo()`
    in the `ScratchTraxApp2` project with the following registration code to dynamically
    add the frameworks to its UI:'
