  trans: '

    # 通过应用内购买驱动收入


    在本章中，`ScratchTraxApp2` 模拟了一个数字录音工作室。本地录音通过“录音”视图管理，而音频轨道管理和歌曲发布则通过“专业功能”视图控制。


    模拟的应用内购买将用于测试动态功能启用的正确集成。


    **用例 1：**


    ![一张开发环境的截图，显示 iPhone 17 Pro Max 模拟器上的 iOS 应用界面。该应用显示一个标题为“本地录音”的列表，包含两个条目：“我的原声吉他民谣”和“我的电吉他战歌”，两者均注明约翰·多伊作词作曲，时间
    2025 年。开发环境包含 Xcode 中“ScratchTraxApp2”的项目文件和设置，多个面板显示文件目录和项目配置。](img/678928_1_En_8_Fig3_HTML.jpg)


    图 8-3


    Xcode 模拟器


    ![一张 iOS 应用开发环境的截图，显示模拟的 iPhone 屏幕上的“添加功能”菜单。菜单列出了购买发布和录音功能的选项，价格从 0.99 美元到 2.99
    美元不等。开发界面包含名为“ScratchTraxApp2”的应用的项目文件和设置，可见多个文件夹和配置选项。](img/678928_1_En_8_Fig2_HTML.jpg)


    图 8-2


    Xcode 模拟器


    1.  选择“专业功能”标签页，购买“发布录音”应用内购买。该 IAP 将变为禁用状态，表示购买已完成。

    2.  导航到“录音”视图，选择导航控制器左侧的“发布录音”图标。将显示“发布录音”视图。

    3.  关闭并重新启动应用，确认 IAP 保持禁用状态，通过 `SwiftData` 验证持久化（**图** **8-2** 和 **图** **8-3**）。


    **用例 2：**


    ![一张 Xcode 开发环境的截图，显示名为“ScratchTraxApp2”的项目。主窗口显示一个模拟的 iPhone 界面，包含“新建录音”屏幕，上面有一个带有滑块和旋钮的数字音频混音器。左侧边栏列出项目文件，右侧面板显示项目设置。界面包含“专业功能”、“录音工作室”、“录音”和“设置”标签页。](img/678928_1_En_8_Fig5_HTML.jpg)


    图 8-5.


    ![一张 Xcode 中 iOS 应用开发环境的截图。主要焦点是一个模拟器，显示标题为“添加功能”的应用界面，列出购买功能的选项，例如“发布录音”售价 3.99
    美元，以及各种“录音轨道”售价分别为 0.99 美元、1.99 美元和 2.99 美元。Xcode 界面在左右两侧面板显示项目文件和设置，应用的代码和配置细节可见。](img/678928_1_En_8_Fig4_HTML.jpg)


    图 8-4.


    1.  选择“专业功能”标签页，购买“3 个录音轨道”应用内购买。该 IAP 将变为禁用状态，表示购买已完成。

    2.  导航到“录音工作室”视图，确认三个录音轨道现已启用。

    3.  关闭并重新启动应用，确认 IAP 保持禁用状态，通过 `SwiftData` 验证持久化（**图** **8-4** 和 **图** **8-5**）。


    在本章中，您成功地将多个框架通过动态运行时集成统一到了 `ScratchTraxApp2` 应用中。通过按需修改框架并在各模块间利用应用内购买，您构建了一个内聚、模块化且具备收入能力、无需修改代码的应用。本章强化了可扩展架构的原则，展示了动态框架如何无缝协同工作。


    现在多个框架已统一到单个应用中，您即可确保自己的应用能够触达全球受众。在下一章中，我们将探讨如何本地化框架以支持多语言，为不同语言和地区调整界面与内容。


    # 9. 国际化框架实现多语言支持


    ## 本地化 `SettingsFW` 框架


    国际化是一个复杂的主题，涵盖用户体验设计、用户界面开发、语言翻译、日期与时间格式、货币、文化敏感性、法律与法规合规性、字符编码与字体支持、键盘与输入法支持，以及无障碍性（ADA
    与无障碍标准）。


    本章将聚焦于 iOS 框架的本地化与最佳实践，使其能够自动适应不同的语言设置。


    完整的本地化多方面主题（包括文本、资源、布局以及导入/导出工具）可在 Apple 开发者文档中获取。^(²⁹)


    在本章中，我们将重点讨论本地化 `SettingsFW` 框架，以在 iOS 应用中提供多语言支持。您将学习使文本适应不同语言的最佳实践，确保无缝的用户体验。最终，`ScratchTraxApp2`
    将能够以多种语言显示“设置”视图，为您的框架走向国际受众做好准备。

