    ## 运行应用目标


    在运行应用目标之前，选择 `Recordings.plist`，并将 `showPublished` 设置为 NO，将 `enablePublishing`
    设置为 YES。这将模拟一个即将在后续章节中演示的实际应用内购买。


    在方案下拉菜单中选择该应用作为活动方案，构建应用，然后使用 Xcode 模拟器或实际设备运行它。应用应能正常编译并运行。


    表格视图现在显示了本地音频录制，并准备好发布，同时还有一个可见且已启用的“发布录制”按钮。选择该按钮将显示歌曲发布功能的用户界面（**图** **6-2**）。


    ![显示移动应用界面的开发环境截图，用于发布录制内容。应用屏幕包括输入歌曲标题、词曲作者和年份的字段。还有用于预览录制内容的播放控件，以及选择文件和发布的选项。开发环境左侧显示文件目录，右侧显示属性。](img/678928_1_En_6_Fig2_HTML.jpg)


    **图 6-2** Xcode 模拟器


    在本章中，你增强了 `RecordingsFW` 框架，以支持通过应用内购买实现收入驱动功能。通过在另一个框架中通过购买启用模拟的歌曲发布功能，你保持了模块间的解耦，同时演示了模块化框架如何协作以向上销售功能。此扩展巩固了你对可盈利、灵活且可重用的
    iOS 框架的理解。在扩展 `RecordingsFW` 框架以支持收入驱动功能后，你已经准备好了解框架如何动态集成到应用中。


    在下一章中，我们将探索无代码集成技术，这些技术允许框架动态扩展应用功能，而无需更改代码。


    # 启用动态框架集成


    ## 设计 ScratchTraxApp1 应用


    本章介绍了动态集成的概念，使之前章节中开发的框架能够无缝集成到移动应用中，而无需使用协议或更改代码。本章演示了动态、无代码的框架集成如何让 iOS 应用以更高的灵活性、可扩展性和效率进行扩展和适应，为高度模块化和可维护的架构提供了实用蓝图。


    框架需要进行修改，以便通过一系列创新技术实现动态集成。


    我们将设计 `ScratchTraxApp1` 应用来演示这种动态框架集成。你将学习如何将之前章节中开发的框架集成到移动应用中，而无需使用协议或进行代码更改。通过应用这些创新技术，你将创建出一个灵活、可扩展且可维护的应用架构，使框架能够动态地适应和扩展应用功能。

    '
- fmt: '## Creating an iOS App


    Up to this point, each framework was developed independently and executed using
    an App Target within its own framework project. The App Targets won’t be needed
    by the iOS apps being constructed in this chapter, but they remain to support
    future enhancements to the frameworks, independent of these iOS apps.


    Creating the `ScratchTraxApp1` app will be similar to creating an internal App
    Target, and the app will display a table of published audio recordings retrieved
    using a remote network request.


    Create a new project as follows:


    ![Screenshot of a software development interface for creating a new project. Tabs
    at the top include options for different platforms like iOS, macOS, and others.
    The “iOS” tab is selected. Below, under “Application,” icons for different app
    types are displayed, such as App, Document App, Game, and Augmented Reality App.
    The “App” option is highlighted. Under “Framework & Library,” options include
    Framework, Static Library, and Metal Library. Buttons for “Cancel,” “Previous,”
    and “Next” are at the bottom.](images/678928_1_En_7_Chapter/678928_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    New Project Template


    1.  Launch Xcode

    2.  Select **Create a new Xcode project**

    3.  Select the **App** template under the **Application** group (**Figure** [**7-1**](#678928_1_En_7_Chapter.xhtml#Fig1))

    4.  Set Product Name to `ScratchTraxApp1`

    5.  Set Interface to **Storyboard**

    6.  Set Language to **Swift**


    ## Creating a User Interface for the iOS App


    The iOS app being constructed in this chapter will need a User Interface to support
    features provided by the frameworks. A Tab Bar Controller will be used, like the
    one used with each framework App Target. Perform the following steps to create
    and configure the Tab Bar Controller:


    ![Screenshot of an Xcode interface showing a project named “ScratchTraxApp1” with
    a storyboard open. The main view displays a “Tab Bar Controller” for an iPhone
    17 Pro Max. The left panel lists project files, including “AppDelegate.swift”
    and “Main.storyboard.” The right panel shows properties for the view controller,
    such as layout and transition style settings. Various interface elements and options
    are visible, indicating a development environment for iOS applications.](images/678928_1_En_7_Chapter/678928_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Storyboard Editor


    1.  Select `ViewController.swift` from within the **Project Navigator** and delete
    it

    2.  Select `Main.storyboard` from within the **Project Navigator** to display
    the **Interface Builder**

    3.  Select the **View Controller Scene** from within the **Storyboard Navigator**
    and delete it

    4.  Select the **Library** icon (+) at the bottom left of the **Interface Builder**
    and create a **Tab Bar Controller**

    5.  Delete **Item 1 Scene** and **Item 2 Scene** in the Storyboard Navigator

    6.  Select **Tab Bar Controller Scene** in the Storyboard Navigator

    7.  Show **Inspectors** using the top right icon

    8.  Select the **Identity Inspector** and input a **Storyboard ID**

    9.  Select the **Attributes Inspector** and select **Is Initial View Controller**
    (**Figure** [**7-2**](#678928_1_En_7_Chapter.xhtml#Fig2))


    ## Creating a Property List for the iOS App


    A Property List will need to be added to the project to override the `RecordingsFW`
    framework Property List setting, `showPublished`, which controls the framework’s
    mode of operation:


    ![Screenshot of an Xcode interface displaying a project named “ScratchTraxApp1.”
    The left panel shows a file directory with various files, including “ScratchTraxApp1.plist”
    highlighted. The central panel displays the contents of this plist file, showing
    a dictionary with a key “showPublished” set to a Boolean value “YES.” The right
    panel provides details about the file, including its location and type.](images/678928_1_En_7_Chapter/678928_1_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Property List Editor


    1.  Right-click the folder within the **Project Navigator** and select **New File
    from Template…**

    2.  Select the **Property List** template under the **Resource** group and **Next**

    3.  Name the file `ScratchTraxApp1.plist`

    4.  Select `ScratchTraxApp1.plist` from within the **Project Navigator**

    5.  Select the **+** icon in the Root row of the empty table (hover over the Root
    cell to make it visible)

    6.  Create a variable called `showPublished`, with Type set to Boolean and Value
    set to YES (**Figure** [**7-3**](#678928_1_En_7_Chapter.xhtml#Fig3))


    ## Creating an Xcode Workspace


    An Xcode workspace will be used to structure the sets of projects needed to construct
    the mobile app in this chapter. When projects are added to a workspace, Xcode
    automatically detects dependencies between the targets in those projects and builds
    them in the correct order. Extensive details regarding workspaces can be found
    under the **Files and workspaces** topic of the **Projects and workspaces** website
    per Apple Developer documentation.^([^(27)](#fn27))


    **Create a new workspace:**


    1.  Shut down Xcode if it’s running, launch it, and close the **Welcome to Xcode**
    screen (there’s no option for creating a Workspace so an Xcode menu will be used)

    2.  Select the Xcode **File/New/Workspace...** menu

    3.  Name the workspace `ScratchTraxApp1` and save it to the root directory containing
    the other Xcode projects

    4.  Right-click an empty area within the Project Navigator and select **Add Files
    to ScratchTraxApp1…**

    5.  Navigate to the directory containing the `ScratchTraxApp1` project and add
    `ScratchTraxApp1.xcodeproj`

    6.  Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**

    7.  Right-click an empty area within the Project Navigator and select **Add Files
    to ScratchTraxApp1…**

    8.  Navigate to the directory containing the `RecordingsFW` project and add `RecordingsFW.xcodeproj`

    9.  Under **Choose options for adding File**, set the **Action** to **Reference
    files in place**


    **Add the RecordingsFW framework to the app:**


    1.  Select the root node of the `ScratchTraxApp1` project in the **Project Navigator**

    2.  Select `ScratchTraxApp1` under the **Targets** section

    3.  Select the **General** tab and the **+** icon under the **Frameworks, Libraries,
    and Embedded Content** section

    4.  Add `RecordingsFW.framework` to the app and verify it appears under the **Frameworks,
    Libraries, and Embedded Content** section with Embed & Sign'
