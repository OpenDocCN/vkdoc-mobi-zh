    URL。该模拟器属于名为 "ScratchTraxApp2" 的项目，具有英语、法语和意大利语的本地化选项。开发界面包括一个文件目录以及本地化和文本缩进设置。](img/678928_1_En_9_Fig5_HTML.jpg)


    **图 9-5** Xcode 模拟器


