    \ 和 SPM 的支持。描述说明了该包在模拟网络请求和使用虚假网络数据测试应用方面的用途。界面包括将包添加到项目的选项，以及一条通知，表明项目已依赖于“ohhttpstubs”。](img/678928_1_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1** Swift Package Manager\n\n1.  在**项目导航器**的空白区域右键单击，然后选择**添加包依赖项…**\n\
    2.  在搜索字段中输入以下 OHHTTPStubs URL：[`https://github.com/AliSoftware/OHHTTPStubs`](https://github.com/AliSoftware/OHHTTPStubs)\n\
    3.  选择**添加包**，然后在相应的弹出窗口（**图** **4-1**）中为包产品选择 **OHHTTPStubsSwift**\n\n### 设计通用服务\n\
    \n创建一个名为 `IAPService.swift` 的新类来管理应用内购买。为了防止创建该类的多个实例，将其定义为单例：\n\n```swift\nimport\
    \ Foundation\n\nclass IAPService {\n    public static let shared = IAPService()\n\
    \    private init() {\n    }\n}\n```\n\n为该服务创建一个协议（在类定义之前），ViewModel 将使用该协议：\n\
    \n```swift\nimport Foundation\nimport Combine\n\nprotocol StubAPIService {\n \
    \   func fetch<T: Decodable>(_t: T.Type, url: URL) -> AnyPublisher<T, Error>\n\
    }\n```\n\n与上一章一样，`fetch()` 将利用 **Swift 泛型**来创建灵活、可复用的函数和类型，这些函数和类型可以与不同的类型一起工作，从而避免代码重复。²⁰\
    \ 当调用 `fetch()` 函数时，需要将从网络 API 请求返回的所需对象类型传递给该函数。\n\n```\n例如: service.fetch(_t:\
    \ IAP.self, url: url)\n```\n\n`OHHTTPStubs` 库将被集成到 `init()` 函数中，用于拦截网络 API 请求并模拟其响应。主机名应替换为您自己的域名。如果您目前没有域名，可以使用示例代码中的域名。只需要一个变量来保存“存根描述符”，它将定义拦截请求的条件（例如，主机匹配），以及使用之前在\
    \ `IAP.json` 中定义的 JSON 数据的响应。`onStubActivation()` 回调可用于监视被存根的请求。还需要导入 OHHTTPStubs\
    \ 框架：\n\n```swift\ninternal import OHHTTPStubs\ninternal import OHHTTPStubsSwift\n\
    \nclass IAPService: StubAPIService {\n    public static let shared = IAPService()\n\
    \    weak var stubDesc: HTTPStubsDescriptor?\n    \n    private init() {\n   \
    \     stubDesc = stub(condition: isHost(\"graphixware.com\")) { request in\n \
    \           return HTTPStubsResponse(fileAtPath: OHPathForFile(\"IAP.json\", type(of:\
    \ self))!, statusCode: 200,\n                                     headers: [\"\
    Content-Type\":\"application/json\"]\n            )\n        }\n        stubDesc?.name\
    \ = \"IAP.json\"\n        HTTPStubs.onStubActivation { (request: URLRequest, stub:\
    \ HTTPStubsDescriptor, response: HTTPStubsResponse) in\n            print(\"IAPService.init():\
    \ 对 \\(request.url!) 的请求已被 \\((stub.name != nil) ? stub.name! : \"?\") 存根\")\n\
    \        }\n    }\n}\n```\n\n> **注意：** `OHHTTPStubs` 和 `OHHTTPStubsSwift` 框架是使用内部访问修饰符导入的，以解决编译器警告：模块未使用“库演进支持”进行编译。由于实际应用永远不会附带这些测试框架，因此解决警告对此示例而言已足够。\n\
    \n采用 `StubAPIService` 协议并实现其所需的行为：\n\n```swift\nfunc fetch<T: Decodable>(_t: T.Type,\
    \ url: URL) -> AnyPublisher<T, Error> {\n    return URLSession.shared.dataTaskPublisher(for:\
    \ url)\n        .mapError { error in\n            IAPError.network(message: error.localizedDescription)\n\
    \        }\n        .flatMap(maxPublishers: .max(1)) { pair in\n            self.decode(pair.data)\n\
    \        }\n        .eraseToAnyPublisher()\n}\n\nprivate func decode<T: Decodable>(_\
    \ data: Data) -> AnyPublisher<T, Error> {\n    let decoder = JSONDecoder()\n \
    \   decoder.dateDecodingStrategy = .secondsSince1970\n    return Just(data)\n\
    \        .decode(type: T.self, decoder: decoder)\n        .mapError { error in\n\
    \            IAPError.parsing(message: error.localizedDescription)\n        }\n\
    \        .eraseToAnyPublisher()\n}\n```\n\n`fetch` 函数的返回值定义为 `AnyPublisher<T,\
    \ Error>`。`AnyPublisher` 是 `Publisher` 的一个具体实现，它本身没有重要的属性，仅充当传递对象。发布者将元素传递给一个或多个订阅者实例。订阅者的\
    \ `Input` 和 `Failure` 关联类型必须与发布者声明的 `Output` 和 `Failure` 类型匹配。发布者实现 `receive(subscriber:)`\
    \ 方法来接受订阅者。\n\n`mapError` 会将上游发布者的任何失败转换为新的错误。\n\n`flatMap` 会将上游发布者的元素转换为一个新的发布者，最多转换您指定的最大发布者数量。在我们的示例中，`flatMap`\
    \ 使用指定的解码器解码上游发布者的输出，以生成 `IAP` 模型。\n\n`eraseToAnyPublisher` 将使用类型擦除器包装此发布者，向下游订阅者公开\
    \ `AnyPublisher` 的实例，而不是此发布者的实际类型。\n"
- fmt: "# Designing a ViewModel Using Dependency Injection\n\nOnce the stub remote\
    \ service has been created, a `ViewModel` will be needed to fetch the published\
    \ recording metadata and notify the View to update its User Interface treatment.\n\
    \nCreate a new protocol, `RefreshableViewModel`, in `IAP.swift`. The View will\
    \ rely on the protocol’s contract being fulfilled by the ViewModel to meet its\
    \ own requirements.\n\n```\nprotocol RefreshableViewModel {\n    func getIAPs()\
    \ -> [IAP]\n    func refresh()\n}\n```\n\nCreate an `enum` and `struct` to support\
    \ In-App Purchases to be displayed in the View. The `IAPType` enum will include\
    \ a case for each type of In-App Purchase. The `IAP` struct will include a category\
    \ to support a grouped table treatment in the View. The `IAP` struct will need\
    \ to be `Decodable` per the fetch protocol, `Hashable` per the SwiftUI `List`,\
    \ and `Identifiable` to satisfy the signature for a SwiftUI `ForEach`:\n\n```\n\
    enum IAPType: String, Decodable {\n    case publishRecordings = \"publishRecordings\"\
    \n    case twoTracks = \"twoTracks\"\n    case threeTracks = \"threeTracks\"\n\
    \    case fourTracks = \"fourTracks\"\n}\n\nstruct IAP: Hashable, Identifiable,\
    \ Decodable {\n    var id: String { name }\n    let category: String\n    let\
    \ name: String\n    let price: Double\n    let type: IAPType\n\n    init(category:\
    \ String, name: String, price: Double, type: IAPType) {\n        self.category\
    \ = category\n        self.name = name\n        self.price = price\n        self.type\
    \ = type\n    }\n}\n```\n\nThe following steps will need to be performed to define\
    \ the `IAPViewModel`. The actual code to support these steps will follow.\n\n\
    Create a new ViewModel class named `IAPViewModel.swift` and adopt the `RefreshableViewModel`\
    \ protocol to ensure the required behavior needed by the View is supported. The\
    \ ViewModel will also adopt the `ObservableObject` protocol to support “pre-publishing”\
    \ changes.\n\nCreate `service` and `endpoint` variables to support Dependency\
    \ Injection. Since these are external dependencies, they will be injected into\
    \ the ViewModel via constructor to maintain decoupling within the ViewModel.\n\
    \nDefine an `iaps` variable using the `@Published` typealias. It will maintain\
    \ the transformed data returned from the service and publish change events to\
    \ subscribers whenever it is set.\n\nCreate a `fetch()` function to fetch sample\
    \ metadata generically using the injected service and endpoint, store it in the\
    \ `iaps` variable, and notify subscribers of the change.\n\nAdd the following\
    \ code to the `IAPViewModel` class:\n\n```\nimport Foundation\nimport Combine\n\
    \nclass IAPViewModel: ObservableObject, RefreshableViewModel {\n    // Dependency\
    \ Injection...\n    private let service: StubAPIService\n    private let endpoint:\
    \ IAPEndpoint\n    private var disposables = Set<AnyCancellable>()\n\n    @Published\
    \ private(set) var iaps: [IAP] = []\n\n    init(service: StubAPIService, endpoint:\
    \ IAPEndpoint) {\n        self.service = service\n        self.endpoint = endpoint\n\
    \    }\n\n    func getIAPs() -> [IAP] {\n        return iaps\n    }\n\n    func\
    \ refresh() {\n        fetch()\n    }\n\n    private func fetch() {\n        if\
    \ let url = URL(string: endpoint.urlString) {\n            service.fetch(_t: IAP.self,\
    \ url: url)\n                .receive(on: DispatchQueue.main)\n              \
    \  .sink { [weak self] value in\n                    switch value {\n        \
    \            case .failure:\n                        self?.iaps = []\n       \
    \             case .finished:\n                        break\n               \
    \     }\n                } receiveValue: { [weak self] response in\n         \
    \           self?.iaps = response\n                }\n                .store(in:\
    \ &disposables)\n        }\n    }\n}\n```\n\n# Integrating the ViewModel into\
    \ the View\n\nIn order to complete the MVVM design pattern for this example, the\
    \ ViewModel will need to be integrated into the View. In this framework, the View\
    \ will be created using SwiftUI. To integrate a SwiftUI view into a UIKit view\
    \ hierarchy, the view will need to be embedded within a `UIHostingController`,\
    \ with the `UIHostingController` being specified as the root view controller of\
    \ the framework’s Storyboard.\n\nCreate a SwiftUI class named `RecordingsStoreView`\
    \ using the **SwiftUI** **View** template under the **User Interface** group.\
    \ The generated code will include a default View, as well as `#Preview`, which\
    \ Xcode uses to generate a preview of the View as it’s being designed in the SwiftUI\
    \ editor.\n\nCreate a UIKit class named `RecordingsStoreVC` using the **Cocoa\
    \ Touch** **Class** template under the **Source** group (the “**Subclass of:**”\
    \ field is arbitrary and will be changed to `UIHostController` after the class\
    \ has been created).\n\n`RecordingsStoreVC` will need to include a generic in\
    \ the class definition for the class type being embedded, e.g., `RecordingsStoreView`.\
    \ The View initialization will include a ViewModel input parameter:\n\n```\nimport\
    \ Foundation\nimport SwiftUI\n\nclass RecordingsStoreVC: UIHostingController<RecordingsStoreView>\
    \ {\n    required init?(coder: NSCoder) {\n        super.init(coder: coder, rootView:\
    \ RecordingsStoreView(viewModel:\n            IAPViewModel(service: IAPService.shared,\
    \ endpoint: .fetchInAppPurchases)))\n    }\n}\n```\n\n> **Note**: The code will\
    \ not compile until the `RecordingsStoreView` class has been created.\n\nCreate\
    \ a storyboard named `RecordingsStoreUI.storyboard` using the **Storyboard** template\
    \ under the **User Interface** group, and configure it to host a SwiftUI view:\n\
    \n1. Select `RecordingsStoreUI.storyboard` in the **Project Navigator**\n2. Select\
    \ the root view controller in the **Document Outline** of the **Interface Builder**\
    \ and delete it\n3. Select the **Library** icon in the **Interface Builder** and\
    \ add a **Hosting View Controller**\n4. Set **Class** under the **Custom Class**\
    \ section of the **Identity Inspector** to `RecordingsStoreVC`\n5. Set **Storyboard\
    \ ID** under the **Identity** section of the **Identity Inspector** to `RecordingsStoreVC`\n\
    6. Set **Is Initial View Controller** under the **View Controller** section of\
    \ the **Attributes Inspector** to checked"
  raw: '## Designing a ViewModel Using Dependency Injection


    Once the stub remote service has been created, a ViewModel will be needed to fetch
    the published recording metadata and notify the View to update its User Interface
    treatment.


    Create a new protocol, **RefreshableViewModel,** in **IAP****.swift**. The View
    will rely on the protocol’s contract being fulfilled by the ViewModel to meet
    its own requirements.


    ```

    protocol RefreshableViewModel {

    func getIAPs() -> [IAP]

    func refresh()

    }

    ```


    Create an enum and struct to support In-App Purchases to be displayed in the View.
    The **IAPType** enum will include a case for each type of In-App Purchase. The
    **IAP** struct will include a category to support a grouped table treatment in
    the View. The **IAP** struct will need to be **Decodable**^([^(21)](#fn21)) per
    the fetch protocol, **Hashable**^([^(22)](#fn22)) per the SwiftUI List, and **Identifiable**^([^(23)](#fn23))
    to satisfy the signature for a SwiftUI **ForEach**:


    ```

    enum IAPType: String, Decodable {

    case publishRecordings = "publishRecordings"

    case twoTracks = "twoTracks"

    case threeTracks = "threeTracks"

    case fourTracks = "fourTracks"

    }

    struct IAP: Hashable, Identifiable, Decodable {

    var id: String { name }

    let category: String

    let name: String

    let price: Double

    let type: IAPType

    init(category: String, name: String, price: Double, type: IAPType) {

    self.category = category

    self.name = name

    self.price = price

    self.type = type

    }

    }

    ```


    The following steps will need to be performed to define the IAPViewModel. The
    actual code to support these steps will follow.


    Create a new ViewModel class named **IAPViewModel.swift** and adopt the **RefreshableViewModel**
    protocol to ensure the required behavior needed by the View is supported. The
    ViewModel will also adopt the **ObservableObject** protocol to support “pre-publishing”
    changes.


    Create **service** and **endpoint** variables to support Dependency Injection.
    Since these are external dependencies, they will be injected into the ViewModel
    via constructor to maintain decoupling within the ViewModel.


    Define an **iaps** variable using the **@Published** typealias. It will maintain
    the transformed data returned from the service and publish change events to subscribers
    whenever it is set.


    Create a **fetch****()** function to fetch sample metadata generically using the
    injected service and endpoint, store it in the **iaps** variable, and notify subscribers
    of the change.


    Add the following code to the IAPViewModel class:


    ```

    import Foundation

    import Combine

    class IAPViewModel: ObservableObject, RefreshableViewModel {

    // Dependency Injection...

    private let service: StubAPIService

    private let endpoint: IAPEndpoint

    private var disposables = Set()

    @Published private(set) var iaps: [IAP] = []

    init(service: StubAPIService, endpoint: IAPEndpoint) {

    self.service = service

    self.endpoint = endpoint

    }

    func getIAPs() -> [IAP] {

    return iaps

    }

    func refresh() {

    fetch()

    }

    private func fetch() {

    if let url = URL(string: endpoint.urlString) {

    service.fetch(_t: IAP.self, url: url)

    .receive(on: DispatchQueue.main)

    .sink { [weak self] value in

    switch value {

    case .failure:

    self?.iaps = []

    case .finished:

    break

    }

    } receiveValue: { [weak self] response in

    self?.iaps = response

    }

    .store(in: &disposables)

    }

    }

    }

    ```


    ## Integrating the ViewModel into the View


    In order to complete the MVVM design pattern for this example, the ViewModel will
    need to be integrated into the View. In this framework, the View will be created
    using SwiftUI. To integrate a SwiftUI view into a UIKit view hierarchy, the view
    will need to be embedded within a UIHostingController, with the UIHostingController
    being specified as the root view controller of the framework’s Storyboard.


    Create a SwiftUI class named **RecordingsStoreView** using the **SwiftUI** **View**
    template under the **User Interface** group. The generated code will include a
    default View, as well as #Preview, which Xcode uses to generate a preview of the
    View as it’s being designed in the SwiftUI editor.


    Create a UIKit class named **RecordingsStoreVC** using the **Cocoa Touch** **Class**
    template under the **Source** group (the “**Subclass of:”** field is arbitrary
    and will be changed to UIHostController after the class has been created).


    **RecordingsStoreVC** will need to include a generic in the class definition for
    the class type being embedded, e.g., **RecordingsStoreView**. The View initialization
    will include a ViewModel input parameter:


    ```

    import Foundation

    import SwiftUI

    class RecordingsStoreVC: UIHostingController {

    required init?(coder: NSCoder) {

    super.init(coder: coder, rootView: RecordingsStoreView(viewModel:

    IAPViewModel(service: IAPService.shared, endpoint: .fetchInAppPurchases)))

    }

    }

    ```


    Note


    The code will not compile until the RecordingsStoreView class has been created.


    Create a storyboard named **RecordingsStoreUI.storyboard** using the **Storyboard**
    template under the **User Interface** group, and configure it to host a SwiftUI
    view:


    1.  Select **RecordingsStoreUI.storyboard** in the **Project Navigator**


    2.  Select the root view controller in the **Document Outline** of the **Interface
    Builder** and delete it


    3.  Select the **Library** icon in the **Interface Builder** and add a **Hosting**
    **View** **Controller**


    4.  Set **Class** under the **Custom Class** section of the **Identity Inspector**
    to **RecordingsStoreVC**


    5.  Set **Storyboard** **ID** under the **Identity** section of the **Identity
    Inspector** to **RecordingsStoreVC**


    6.  Set **Is Initial** **View** **Controller** under the **View Controller** section
    of the **Attributes** **Inspector** to checked'
  trans: "\n# 使用依赖注入设计 ViewModel\n\n创建存根远程服务后，需要一个 `ViewModel` 来获取已发布的录制元数据，并通知视图更新其用户界面处理方式。\n\
    \n在 `IAP.swift` 中创建一个新协议 `RefreshableViewModel`。视图将依赖 ViewModel 实现该协议的方法，以满足其自身需求。\n\
    \n```\nprotocol RefreshableViewModel {\n    func getIAPs() -> [IAP]\n    func\
    \ refresh()\n}\n```\n\n创建一个 `enum` 和 `struct` 以支持在视图中显示的应用内购买项目。`IAPType` 枚举将为每种应用内购买类型包含一个\
    \ case。`IAP` 结构体将包含一个类别，以支持在视图中进行分组表格处理。`IAP` 结构体需要遵循获取协议中的 `Decodable`、SwiftUI\
    \ `List` 所需的 `Hashable`，以及满足 SwiftUI `ForEach` 签名的 `Identifiable`：\n\n```\nenum\
    \ IAPType: String, Decodable {\n    case publishRecordings = \"publishRecordings\"\
    \n    case twoTracks = \"twoTracks\"\n    case threeTracks = \"threeTracks\"\n\
    \    case fourTracks = \"fourTracks\"\n}\n\nstruct IAP: Hashable, Identifiable,\
    \ Decodable {\n    var id: String { name }\n    let category: String\n    let\
    \ name: String\n    let price: Double\n    let type: IAPType\n\n    init(category:\
    \ String, name: String, price: Double, type: IAPType) {\n        self.category\
    \ = category\n        self.name = name\n        self.price = price\n        self.type\
    \ = type\n    }\n}\n```\n\n需要执行以下步骤来定义 `IAPViewModel`。支持这些步骤的实际代码将在后续给出。\n\n创建一个名为\
    \ `IAPViewModel.swift` 的新 ViewModel 类，并遵循 `RefreshableViewModel` 协议，以确保支持视图所需的必要行为。ViewModel\
    \ 还将遵循 `ObservableObject` 协议，以支持“预发布”更改。\n\n创建 `service` 和 `endpoint` 变量以支持依赖注入。由于这些是外部依赖项，它们将通过构造函数注入到\
    \ ViewModel 中，以保持 ViewModel 内部的解耦。\n\n使用 `@Published` 类型别名定义一个 `iaps` 变量。它将维护从服务返回的转换后数据，并在设置时向订阅者发布更改事件。\n\
    \n创建一个 `fetch()` 函数，用于使用注入的服务和端点泛型地获取样本元数据，将其存储在 `iaps` 变量中，并通知订阅者更改。\n\n将以下代码添加到\
    \ `IAPViewModel` 类中：\n\n```\nimport Foundation\nimport Combine\n\nclass IAPViewModel:\
    \ ObservableObject, RefreshableViewModel {\n    // 依赖注入...\n    private let service:\
    \ StubAPIService\n    private let endpoint: IAPEndpoint\n    private var disposables\
    \ = Set<AnyCancellable>()\n\n    @Published private(set) var iaps: [IAP] = []\n\
    \n    init(service: StubAPIService, endpoint: IAPEndpoint) {\n        self.service\
    \ = service\n        self.endpoint = endpoint\n    }\n\n    func getIAPs() ->\
    \ [IAP] {\n        return iaps\n    }\n\n    func refresh() {\n        fetch()\n\
    \    }\n\n    private func fetch() {\n        if let url = URL(string: endpoint.urlString)\
    \ {\n            service.fetch(_t: IAP.self, url: url)\n                .receive(on:\
    \ DispatchQueue.main)\n                .sink { [weak self] value in\n        \
    \            switch value {\n                    case .failure:\n            \
    \            self?.iaps = []\n                    case .finished:\n          \
    \              break\n                    }\n                } receiveValue: {\
    \ [weak self] response in\n                    self?.iaps = response\n       \
    \         }\n                .store(in: &disposables)\n        }\n    }\n}\n```\n\
    \n# 将 ViewModel 集成到视图中\n\n为了完成此示例的 MVVM 设计模式，需要将 ViewModel 集成到视图中。在此框架中，视图将使用\
    \ SwiftUI 创建。要将 SwiftUI 视图集成到 UIKit 视图层次结构中，需要将视图嵌入 `UIHostingController` 中，并将\
    \ `UIHostingController` 指定为框架 Storyboard 的根视图控制器。\n\n在 **User Interface** 组下，使用\
    \ **SwiftUI** **View** 模板创建一个名为 `RecordingsStoreView` 的 SwiftUI 类。生成的代码将包含一个默认视图以及\
    \ `#Preview`，Xcode 使用它在 SwiftUI 编辑器中设计视图时生成预览。\n\n在 **Source** 组下，使用 **Cocoa Touch**\
    \ **Class** 模板创建一个名为 `RecordingsStoreVC` 的 UIKit 类（“**Subclass of:**” 字段是任意的，在创建类后将更改为\
    \ `UIHostController`）。\n\n`RecordingsStoreVC` 需要在类定义中为嵌入的类类型（例如 `RecordingsStoreView`）包含一个泛型。视图初始化将包含一个\
    \ ViewModel 输入参数：\n\n```\nimport Foundation\nimport SwiftUI\n\nclass RecordingsStoreVC:\
    \ UIHostingController<RecordingsStoreView> {\n    required init?(coder: NSCoder)\
    \ {\n        super.init(coder: coder, rootView: RecordingsStoreView(viewModel:\n\
    \            IAPViewModel(service: IAPService.shared, endpoint: .fetchInAppPurchases)))\n\
    \    }\n}\n```\n\n> **注意**：在创建 `RecordingsStoreView` 类之前，代码将无法编译。\n\n在 **User\
    \ Interface** 组下，使用 **Storyboard** 模板创建一个名为 `RecordingsStoreUI.storyboard` 的 Storyboard，并将其配置为托管\
    \ SwiftUI 视图：\n\n1. 在 **Project Navigator** 中选择 `RecordingsStoreUI.storyboard`\n\
    2. 在 **Interface Builder** 的 **Document Outline** 中选择根视图控制器并将其删除\n3. 选择 **Interface\
    \ Builder** 中的 **Library** 图标并添加一个 **Hosting View Controller**\n4. 将 **Identity\
    \ Inspector** 中 **Custom Class** 部分的 **Class** 设置为 `RecordingsStoreVC`\n5. 将 **Identity\
    \ Inspector** 中 **Identity** 部分的 **Storyboard ID** 设置为 `RecordingsStoreVC`\n6.\
    \ 将 **Attributes Inspector** 中 **View Controller** 部分的 **Is Initial View Controller**\
    \ 设置为选中状态\n"
- fmt: '# Designing the SwiftUI View


    The following code will need to be added to the `RecordingsStoreView` class. Since
    it’s fairly involved, it will be documented around specific code snippets. The
    entire class can be copied using the code at the end of this section.


    Variables will be defined as `@State` property wrappers. State property wrappers
    can read and write values managed by SwiftUI. State is used as the “single source
    of truth” for a given value type stored in a view hierarchy.^([^(24)](#fn24))


    The ViewModel will be defined as a `StateObject` property wrapper. StateObject
    property wrappers can instantiate an observable object. StateObject is used as
    the “single source of truth” for a reference type stored in a view hierarchy.^([^(25)](#fn25))


    ```

    @State private var selectedIAP: IAP?

    @State private var showAlert = false

    @State private var loaded = false

    @StateObject private var viewModel: IAPViewModel

    init(viewModel: IAPViewModel) {

    _viewModel = StateObject(wrappedValue: viewModel)

    }

    ```


    `groupByCategory()` is a sorting algorithm that sorts In-App Purchases alphabetically
    by category.


    ```

    func groupByCategory(_ iaps: [IAP]) -> [(String, [IAP])] {

    let grouped = Dictionary(grouping: iaps, by: { $0.category })

    return grouped.sorted(by: { $0.key < $1.key })

    }

    ```


    The View body will be defined to be a SwiftUI `List`, which is comparable to a
    UIKit table view. Each row will correspond to an In-App Purchase. If an In-App
    Purchase has previously been made, the row will be disabled. Selecting a row will
    display a prompt to the user to proceed with the (simulated) purchase. If the
    user chooses to continue, the transaction will be persisted using SwiftData and
    propagated via UserDefaults.


    > **Note:** In an actual iOS app that integrates In-App Purchases, the StoreKit
    framework will be used to perform the transaction, receive transaction state changes,
    and validate the transaction receipt.


    ```

    var body: some View {

    NavigationView {

    List(selection: $selectedIAP) {

    ForEach(groupByCategory(viewModel.getIAPs()), id:\.0) { iap in

    Section(header: Text("\(iap.0)")

    .foregroundColor(.black)

    .font(.custom("HelveticaNeue-Bold", fixedSize: 20.0))

    ){

    ForEach(iap.1) { iap in

    HStack {

    Button("\(Image(systemName: "music.note")) \(iap.name)") {

    showAlert = true

    selectedIAP = iap

    }

    .font(.custom("HelveticaNeue", fixedSize: 16.0))

    Spacer()

    Text("\(NumberFormatter.localizedString(from: NSNumber(value: iap.price), number:
    .currency))")

    .font(.custom("HelveticaNeue-Bold", fixedSize: 16.0))

    }

    .listRowSeparator(.hidden)

    .disabled(isPurchased(iap: iap))

    }

    }

    }

    }

    .listStyle(.plain)

    .navigationBarTitle("Pro Features", displayMode: .large)

    .alert(isPresented: self.$showAlert) {

    Alert(

    title: Text("Pro Features"),

    message: Text("Do you want to purchase ''\(selectedIAP?.name ?? "?")''"),

    primaryButton: .default(Text("OK")) {

    if let iap = selectedIAP {

    updateFeatures(type: iap.type)

    }

    },

    secondaryButton: .default(Text("Cancel"))

    )

    }

    }

    }

    ```


    `onAppear()` will be used to fetch In-App Purchases when the view first appears
    by calling `viewModel.refresh()` to trigger the underlying service request:


    ```

    .onAppear {

    if !loaded {

    loaded = true

    viewModel.refresh()

    }

    }

    ```


    `isPurchased()` will utilize UserDefaults to reflect the state of In-App Purchase
    transactions persisted via SwiftData.


    ```

    func isPurchased(iap: IAP) -> Bool {

    if let features = UserDefaults.standard.object(forKey: "iaps") as? [String: Any]
    {

    switch iap.type {

    case .publishRecordings:

    return features["publishRecordings"] as? Bool ?? false

    case .twoTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 1 }

    return false

    case .threeTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 2 }

    return false

    case .fourTracks:

    if let trackCount = features["trackCount"] as? Int16 { return trackCount > 3 }

    return false

    }

    }

    return false

    }

    ```


    `updateFeatures()` will persist a new In-App Purchase transaction via SwiftData.


    ```

    func updateFeatures(type: IAPType) {

    guard let config = dataManager.configuration else {

    saveConfiguration(existing: nil, type: type)

    return

    }

    saveConfiguration(existing: config, type: type)

    }

    private func saveConfiguration(existing: Configuration?, type: IAPType) {

    var publishRecordings = false

    var trackCount: Int16 = 1

    switch type {

    case .publishRecordings:

    publishRecordings = true

    trackCount = existing?.trackCount ?? 1

    case .twoTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 2

    case .threeTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 3

    case .fourTracks:

    publishRecordings = existing?.publishRecordings ?? false

    trackCount = 4

    }

    dataManager.saveConfiguration(existing: existing, publishRecordings: publishRecordings,
    trackCount: trackCount)

    UserDefaults.standard.set(["publishRecordings": publishRecordings, "trackCount":
    trackCount], forKey: "iaps")

    }

    ```


