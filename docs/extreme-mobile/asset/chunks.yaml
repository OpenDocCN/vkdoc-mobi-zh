    Most iOS developers are familiar with Xcode tools available for creating tests,
    specifically those based on the XCTest framework. A new testing framework, Swift
    Testing, was introduced in Xcode 16\. When creating an Xcode project, the option
    for generating stub tests now includes XCTest and Swift Testing. Choosing either
    option will generate stub tests based on the framework selected, and a Test Plan.
    Tests created using Swift Testing are not automatically added to the Test Plan
    (as of Xcode 26), but they can be easily added by editing the Test Plan and selecting
    them.


    The main difference between **XCTest** and **Swift Testing** is how they’re structured
    and discovered. XCTest uses classes that inherit from XCTestCase, and Xcode automatically
    finds test methods starting with test, showing them in the Test navigator. Swift
    Testing, on the other hand, lets you write tests in structs using @Test and #expect,
    which is more “Swift-like” and works well with concurrency, but Xcode doesn’t
    automatically detect them. However, if you add your Swift Testing tests to a Test
    Plan, they will appear in the Test navigator, letting you run them inside Xcode
    just like XCTest tests.


    A comprehensive overview of writing Unit, Integration, and UI Tests using the
    XCTest and Swift Testing framework can be found on the Apple developer website.^([^(15)](#fn15))


    This chapter will demonstrate testing a ViewModel portion of a Model-View-ViewModel
    (MVVM) design pattern using a mock service. In an MVVM design, the service is
    mocked to isolate the ViewModel’s logic from external dependencies. Mocks provide
    predictable, hard-coded data or simulated errors, allowing tests to be fast, reliable,
    and repeatable without relying on network conditions or a live API. This also
    makes it easy to test edge cases, such as parsing failures or empty responses,
    ensuring the ViewModel handles all scenarios correctly while keeping tests focused
    purely on its behavior.


    Under the RecordingsFWTests folder (created when the project was created), select
    RecordingsFWTests.swift and import the Foundation and Combine frameworks (the
    Testing and RecordingsFW frameworks should already be imported, with RecordingsFW
    marked as @testable):


    ```

    import Foundation

    import Combine

    import Testing

    @testable import RecordingsFW

    ```


    A mock service based on the StubAPIService protocol (created earlier in the chapter)
    will be created to return canned data identical to that of the PublishedRecordingsService
    API. It will define a MockMode enum to simulate different scenarios (success,
    networkError, parsingError) and provide a hard-coded list of sample Recording
    objects similar to the API. The fetch method will return a Combine publisher that
    either emits the recordings or fails with a simulated error depending on the current
    mode, allowing tests to verify how the ViewModel handles various responses.


