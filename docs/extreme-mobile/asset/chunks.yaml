    "gw@graphixware.com" 和网站 "https:/graphixware.com"，每个项目旁边都有意大利国旗标志。开发环境左侧有一个文件目录，显示各种项目文件；右侧面板显示英语、法语和意大利语的本地化设置。模拟器底部显示
    "Pro Features"、"Recording Studio"、"Recordings" 和 "Settings" 的导航图标。](img/678928_1_En_9_Fig6_HTML.jpg)


