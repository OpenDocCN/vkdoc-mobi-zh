    ## 配置 Scheme


    在 iOS 模拟器中运行 App 之前，需要先将 `ScratchTraxApp2` Scheme 的 `App Language` 和 `App Region`
    设置切换为目标语言：


    ![软件开发环境截图，显示名为 "ScratchTraxApp2" 的项目的 "Options" 选项卡。界面包含各种配置设置，如 Core Location、App
