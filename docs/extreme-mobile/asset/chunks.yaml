- fmt: "# Creating an iOS Framework\n\nXcode provides a project template called `Framework`,\
    \ located under the `Frameworks & Libraries` group, for creating an iOS Framework.\
    \ Originally called Cocoa Touch Framework, the Framework template will provide\
    \ a default set of files for the project. You’ll add to those as you progress\
    \ through the chapter. Let’s get started!\n\nChoose a template for your new project:\n\
    \n![Screenshot of a software development interface for creating a new project.\
    \ Tabs at the top include options like Multiplatform, iOS, macOS, and others.\
    \ The iOS tab is selected. Below, there are sections for “Application” and “Framework\
    \ & Library.” The Application section shows icons for App, Document App, Game,\
    \ Augmented Reality App, and more. The Framework & Library section includes options\
    \ like Framework, Static Library, and Metal Library, with Framework selected.\
    \ Buttons for “Cancel,” “Previous,” and “Next” are at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1 New Project Template\n\n1. Launch `Xcode`\n2. Select `Create New\
    \ project`\n3. Select the `Framework` template under the `Framework & Library`\
    \ group (**Figure** [**1-1**](#678928_1_En_1_Chapter.xhtml#Fig1))\n4. Select `Next`\n\
    \nChoose options for the new project (**Figure** [**1-2**](#678928_1_En_1_Chapter.xhtml#Fig2)):\n\
    \n![Options screen for creating a new project in a software development environment.\
    \ Fields include “Product Name” set to “SettingsFW,” “Team” set to “Graphixware,\
    \ LLC,” “Organization Identifier” as “com.gw,” and “Bundle Identifier” as “com.gw.SettingsFW.”\
    \ The “Language” is set to “Swift,” and the “Testing System” is “Swift Testing.”\
    \ There is an option to “Include Documentation,” which is unchecked. Navigation\
    \ buttons “Cancel,” “Previous,” and “Next” are at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2 New Project Settings\n\n**Product Name:** Your new product’s name\n\
    \nThis will be the name of the framework project. A folder with the same name\
    \ will be created in the root directory of the project. Use `SettingsFW` for this\
    \ project.\n\n**Team:** Your development team\n\nThis field is a drop-down containing\
    \ code signing identities associated with your Apple ID. You’ll need to select\
    \ one to ensure the app comes from your organization when releasing it on the\
    \ Apple App Store. If you need to create a code signing identity, you can do so\
    \ after the framework has been created, using the corresponding Apple documentation.^([²](#fn2))\n\
    \n**Organization Identifier:** Your organization’s bundle identifier prefix\n\n\
    This value will be prepended to the Bundle Identifier.\n\n**Language:** Your primary\
    \ implementation language\n\nThis value should be set to `Swift`, as this book\
    \ provides code samples in Swift.\n\n**Testing System:** `XCTest` or `Swift Testing`\n\
    \nThis value should be set to `Swift Testing`, as this book provides code samples\
    \ using the Swift Testing framework.\n\nThe remaining settings are arbitrary.\n\
    \n## Configuring an iOS Framework\n\nThe `Framework` template sets most of the\
    \ necessary project settings. If you still need to associate a Team with your\
    \ framework, create one using the Apple documentation referenced in the previous\
    \ step, download it, and select it (**Figure** [**1-3**](#678928_1_En_1_Chapter.xhtml#Fig3)):\n\
    \n![Screenshot of an Xcode project window titled “SettingsFW.” The left panel\
    \ shows a file directory with “SettingsFW” and “SettingsFWTests” folders, each\
    \ containing a Swift file. The main panel displays the “Signing & Capabilities”\
    \ tab, showing settings for automatic signing, team name “Graphixware, LLC,” and\
    \ bundle identifiers for iOS and macOS. The iOS section lists a provisioning profile\
    \ as “None Required” and a signing certificate for Apple Development. The macOS\
    \ section shows similar details.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3 Signing & Capabilities Settings\n\n1. Select the `Xcode`/`Settings`\
    \ menu item\n2. Select the `Apple Accounts` tab. If you aren’t logged into your\
    \ Apple account, do so now, as this will automatically download your teams to\
    \ the Team section\n3. Close Settings and select the root node of the project\
    \ in the `Project Navigator`\n4. Select the default target under the `Show project\
    \ and target lists`\n5. Select the `Signing & Capabilities` tab\n6. Select `Automatically\
    \ manage signing` under the `Signing` section\n7. Select your team in the `Team`\
    \ drop-down list\n\nOnce the project has been created, the `DEFINES_MODULE` setting\
    \ under the `Build Settings`/`Packaging` section can be set to `YES` to package\
    \ the framework as a Swift module, allowing it to be imported with `import [framework\
    \ name]` in Swift code, as well as exposing any public Objective-C headers through\
    \ an umbrella header. If an umbrella header is needed to expose Objective-C headers,\
    \ the following steps will need to be performed:\n\n![Screenshot of a development\
    \ environment interface showing a project named “SettingsFW.” The left panel lists\
    \ files: “SettingsFW.h,” “SettingsFW.swift,” and “SettingsFWTests.swift.” The\
    \ right panel displays the “Build Phases” tab with sections for “Target Dependencies,”\
    \ “Run Build Tool Plug-ins,” and “Headers,” which includes public, private, and\
    \ project headers. The interface is set to an iPhone 17 Pro Max simulator, with\
    \ a status indicating readiness at 12:40 PM.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4 Build Phase Settings\n\n1. Right-click the framework folder within\
    \ the `Project Navigator` and select `New File from Template…`\n2. Choose the\
    \ `Header File` template under the `Source` section and `Next`\n3. Input a name\
    \ for the file, e.g., `SettingsFW.h`, and create the file\n4. Select the Root\
    \ node within the `Project Navigator`\n5. Select the `Build Phases` tab, expand\
    \ the `Headers` section, and drag the umbrella file to the `Public` list (**Figure**\
    \ [**1-4**](#678928_1_En_1_Chapter.xhtml#Fig4))\n6. Select the umbrella file within\
    \ the `Project Navigator` and insert the following (using the appropriate framework\
    \ name):\n\n```objc\n#import \n//! Project version number for SettingsFW.\nFOUNDATION_EXPORT\
    \ double SettingsFWVersionNumber;\n//! Project version string for SettingsFW.\n\
    FOUNDATION_EXPORT const unsigned char SettingsFWVersionString[];\n// MARK: - Public\
    \ Objective-C Headers\n// Import all headers you want visible to Swift here\n\
    // MARK: - Optional Swift Interop\n// Swift-only classes are automatically available,\
    \ no imports needed\n```\n\n**Fun Fact:** Previous versions of Xcode used to generate\
    \ this file automatically.\n\n## Creating a Storyboard\n\niOS Frameworks can provide\
    \ different types of functionality you may want to use in a mobile app, including\
    \ Swift class extensions, common utilities, Third-Party API integrations, and\
    \ feature sets. In this example, a User Interface Storyboard feature will be developed\
    \ using Interface Builder. Later in the book, a more involved SwiftUI User Interface\
    \ will be created.\n\n![Screenshot of a software interface for selecting a template\
    \ for a new file. The interface includes options for different operating systems\
    \ like iOS, macOS, watchOS, tvOS, visionOS, and DriverKit. Under “Source,” options\
    \ include Swift File, Cocoa Touch Class, Objective-C File, Header File, C++ File,\
    \ Metal File, and C File. Under “User Interface,” options include SwiftUI View,\
    \ Storyboard, View, Empty, and Launch Screen. The “Storyboard” option is highlighted,\
    \ and there are “Cancel,” “Previous,” and “Next” buttons at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5 New File Template Window\n\n1. Right-click on the framework folder\
    \ within the `Project Navigator` and select `New File from Template…`\n2. Select\
    \ the `Storyboard` template under the `User Interface` group (**Figure** [**1-5**](#678928_1_En_1_Chapter.xhtml#Fig5))\
    \ and `Next`\n3. Save the file as `SettingsUI.storyboard`"
  raw: "## Creating an iOS Framework\n\nXcode provides a project template called **Framework**,\
    \ located under the **Frameworks & Libraries** group, for creating an iOS Framework.\
    \ Originally called Cocoa Touch Framework, the Framework template will provide\
    \ a default set of files for the project. You’ll add to those as you progress\
    \ through the chapter. Let’s get started!\n\nChoose a template for your new project:\n\
    \n![Screenshot of a software development interface for creating a new project.\
    \ Tabs at the top include options like Multiplatform, iOS, macOS, and others.\
    \ The iOS tab is selected. Below, there are sections for “Application” and “Framework\
    \ & Library.” The Application section shows icons for App, Document App, Game,\
    \ Augmented Reality App, and more. The Framework & Library section includes options\
    \ like Framework, Static Library, and Metal Library, with Framework selected.\
    \ Buttons for “Cancel,” “Previous,” and “Next” are at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1\n\nNew Project Template\n\n1.  Launch Xcode\n\n2.  Select **Create\
    \ New project**\n\n3.  Select the **Framework** template under the **Framework\
    \ & Library** group (**Figure** [**1-1**](#678928_1_En_1_Chapter.xhtml#Fig1))\n\
    \n4.  Select **Next**\n\nChoose options for the new project (**Figure** [**1-2**](#678928_1_En_1_Chapter.xhtml#Fig2)):\n\
    \n![Options screen for creating a new project in a software development environment.\
    \ Fields include “Product Name” set to “SettingsFW,” “Team” set to “Graphixware,\
    \ LLC,” “Organization Identifier” as “com.gw,” and “Bundle Identifier” as “com.gw.SettingsFW.”\
    \ The “Language” is set to “Swift,” and the “Testing System” is “Swift Testing.”\
    \ There is an option to “Include Documentation,” which is unchecked. Navigation\
    \ buttons “Cancel,” “Previous,” and “Next” are at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2\n\nNew Project Settings\n\n**Product Name:** Your new product’s name\n\
    \nThis will be the name of the framework project. A folder with the same name\
    \ will be created in the root directory of the project. Use **SettingsFW** for\
    \ this project.\n\n**Team:** Your development team\n\nThis field is a drop-down\
    \ containing code signing identities associated with your Apple ID. You’ll need\
    \ to select one to ensure the app comes from your organization when releasing\
    \ it on the Apple App Store. If you need to create a code signing identity, you\
    \ can do so after the framework has been created, using the corresponding Apple\
    \ documentation.^([²](#fn2))\n\n**Organization Identifier:** Your organization’s\
    \ bundle identifier prefix\n\nThis value will be prepended to the Bundle Identifier.\n\
    \n**Language:** Your primary implementation language\n\nThis value should be set\
    \ to **Swift**, as this book provides code samples in Swift.\n\n**Testing System:**\
    \ XCTest or Swift Testing\n\nThis value should be set to **Swift Testing**, as\
    \ this book provides code samples using the Swift Testing framework.\n\nThe remaining\
    \ settings are arbitrary.\n\n## Configuring an iOS Framework\n\nThe **Framework**\
    \ template sets most of the necessary project settings. If you still need to associate\
    \ a Team with your framework, create one using the Apple documentation referenced\
    \ in the previous step, download it, and select it (**Figure** [**1-3**](#678928_1_En_1_Chapter.xhtml#Fig3)):\n\
    \n![Screenshot of an Xcode project window titled “SettingsFW.” The left panel\
    \ shows a file directory with “SettingsFW” and “SettingsFWTests” folders, each\
    \ containing a Swift file. The main panel displays the “Signing & Capabilities”\
    \ tab, showing settings for automatic signing, team name “Graphixware, LLC,” and\
    \ bundle identifiers for iOS and macOS. The iOS section lists a provisioning profile\
    \ as “None Required” and a signing certificate for Apple Development. The macOS\
    \ section shows similar details.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3\n\nSigning & Capabilities Settings\n\n1.  Select the **Xcode****/****Settings**\
    \ menu item\n\n2.  Select the **Apple** **Accounts** tab. If you aren’t logged\
    \ into your Apple account, do so now, as this will automatically download your\
    \ teams to the Team section\n\n3.  Close Settings and select the root node of\
    \ the project in the **Project Navigator**\n\n4.  Select the default target under\
    \ the **Show project and target lists**\n\n5.  Select the **Signing & Capabilities**\
    \ tab\n\n6.  Select **Automatically manage** **signing** under the **Signing**\
    \ section\n\n7.  Select your team in the **Team** drop-down list\n\nOnce the project\
    \ has been created, the **DEFINES_MODULE** setting under the Build Settings/Packaging\
    \ section can be set to **YES** to package the framework as a Swift module, allowing\
    \ it to be imported with “import [framework name]” in Swift code, as well as exposing\
    \ any public Objective-C headers through an umbrella header. If an umbrella header\
    \ is needed to expose Objective-C headers, the following steps will need to be\
    \ performed:\n\n![Screenshot of a development environment interface showing a\
    \ project named “SettingsFW.” The left panel lists files: “SettingsFW.h,” “SettingsFW.swift,”\
    \ and “SettingsFWTests.swift.” The right panel displays the “Build Phases” tab\
    \ with sections for “Target Dependencies,” “Run Build Tool Plug-ins,” and “Headers,”\
    \ which includes public, private, and project headers. The interface is set to\
    \ an iPhone 17 Pro Max simulator, with a status indicating readiness at 12:40\
    \ PM.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig4_HTML.jpg)\n\nFigure 1-4\n\
    \nBuild Phase Settings\n\n1.  Right-click the framework folder within the **Project\
    \ Navigator** and select **New File from Template…**\n\n2.  Choose the **Header\
    \ File** template under the **Source** section and **Next**\n\n3.  Input a name\
    \ for the file, e.g., **SettingsFW.h**, and create the file\n\n4.  Select the\
    \ Root node within the **Project Navigator**\n\n5.  Select the **Build Phases**\
    \ tab, expand the **Headers** section, and drag the umbrella file to the **Public**\
    \ list (**Figure** [**1-4**](#678928_1_En_1_Chapter.xhtml#Fig4))\n\n6.  Select\
    \ the umbrella file within the **Project Navigator** and insert the following\
    \ (using the appropriate framework name):\n\n    ```\n    #import \n    //! Project\
    \ version number for SettingsFW.\n    FOUNDATION_EXPORT double SettingsFWVersionNumber;\n\
    \    //! Project version string for SettingsFW.\n    FOUNDATION_EXPORT const unsigned\
    \ char SettingsFWVersionString[];\n    // MARK: - Public Objective-C Headers\n\
    \    // Import all headers you want visible to Swift here\n    // MARK: - Optional\
    \ Swift Interop\n    // Swift-only classes are automatically available, no imports\
    \ needed\n    ```\n\n**Fun Fact:** Previous versions of Xcode used to generate\
    \ this file automatically.\n\n## Creating a Storyboard\n\niOS Frameworks can provide\
    \ different types of functionality you may want to use in a mobile app, including\
    \ Swift class extensions, common utilities, Third-Party API integrations, and\
    \ feature sets. In this example, a User Interface Storyboard feature will be developed\
    \ using Interface Builder. Later in the book, a more involved SwiftUI User Interface\
    \ will be created.\n\n![Screenshot of a software interface for selecting a template\
    \ for a new file. The interface includes options for different operating systems\
    \ like iOS, macOS, watchOS, tvOS, visionOS, and DriverKit. Under “Source,” options\
    \ include Swift File, Cocoa Touch Class, Objective-C File, Header File, C++ File,\
    \ Metal File, and C File. Under “User Interface,” options include SwiftUI View,\
    \ Storyboard, View, Empty, and Launch Screen. The “Storyboard” option is highlighted,\
    \ and there are “Cancel,” “Previous,” and “Next” buttons at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nNew File Template Window\n\n1.  Right-click on the framework folder\
    \ within the **Project Navigator** and select **New File from Template…**\n\n\
    2.  Select the **Storyboard** template under the **User Interface** group (**Figure** [**1-5**](#678928_1_En_1_Chapter.xhtml#Fig5))\
    \ and **Next**\n\n3.  Save the file as **SettingsUI.storyboard**"
  trans: "\n# 创建 iOS 框架\n\nXcode 提供了一个名为 `Framework` 的项目模板，位于 `Frameworks & Libraries`\
    \ 分组下，用于创建 iOS 框架。该框架模板最初被称为 Cocoa Touch 框架，它将为项目提供一组默认文件。在你学习本章的过程中，将逐步向其中添加内容。让我们开始吧！\n\
    \n为你的新项目选择一个模板：\n\n![软件开发界面截图，用于创建新项目。顶部选项卡包括多平台、iOS、macOS 等选项，当前选中了 iOS 选项卡。下方有“应用程序”和“框架与库”部分。“应用程序”部分显示了\
    \ App、文档 App、游戏、增强现实 App 等图标。“框架与库”部分包括框架、静态库和 Metal 库等选项，其中框架被选中。底部有“取消”、“上一页”和“下一页”按钮。](img/678928_1_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1 新项目模板\n\n1. 启动 `Xcode`\n2. 选择 `创建新项目`\n3. 在 `框架与库` 分组下选择 `框架` 模板（**图**\
    \ **1-1**）\n4. 选择 `下一页`\n\n为新项目选择选项（**图** **1-2**）：\n\n![软件开发环境中创建新项目的选项界面。字段包括“产品名称”设置为“SettingsFW”，“团队”设置为“Graphixware,\
    \ LLC”，“组织标识符”为“com.gw”，“包标识符”为“com.gw.SettingsFW”。“语言”设置为“Swift”，“测试系统”为“Swift\
    \ Testing”。“包含文档”选项未被勾选。底部有“取消”、“上一页”和“下一页”导航按钮。](img/678928_1_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2 新项目设置\n\n**产品名称：** 你的新产品名称\n\n这将是框架项目的名称。项目根目录中会创建一个同名的文件夹。本项目中请使用 `SettingsFW`。\n\
    \n**团队：** 你的开发团队\n\n此字段是一个下拉菜单，包含与你的 Apple ID 关联的代码签名身份。你需要选择一个，以确保在 Apple App\
    \ Store 发布应用时，该应用来自你的组织。如果需要创建代码签名身份，可以在框架创建后，参考相应的 Apple 文档来完成。^(²)\n\n**组织标识符：**\
    \ 你组织的包标识符前缀\n\n该值将附加到包标识符之前。\n\n**语言：** 你的主要实现语言\n\n该值应设置为 `Swift`，因为本书提供的代码示例均使用\
    \ Swift。\n\n**测试系统：** `XCTest` 或 `Swift Testing`\n\n该值应设置为 `Swift Testing`，因为本书提供的代码示例使用了\
    \ Swift Testing 框架。\n\n其余设置可根据需要自行决定。\n\n## 配置 iOS 框架\n\n`Framework` 模板设置了大多数必要的项目设置。如果你仍需要为框架关联一个团队，请使用上一步中提到的\
    \ Apple 文档创建一个团队，下载并选中它（**图** **1-3**）：\n\n![Xcode 项目窗口截图，标题为“SettingsFW”。左侧面板显示文件目录，包含“SettingsFW”和“SettingsFWTests”文件夹，每个文件内各有一个\
    \ Swift 文件。主面板显示“签名与功能”选项卡，展示了自动签名设置、团队名称“Graphixware, LLC”以及 iOS 和 macOS 的包标识符。iOS\
    \ 部分列出了配置文件为“无需配置”，签名证书为 Apple Development。macOS 部分类似。](img/678928_1_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3 签名与功能设置\n\n1. 选择 `Xcode`/`设置` 菜单项\n2. 选择 `Apple 账户` 选项卡。如果你未登录 Apple 账户，请立即登录，这将自动将你的团队下载到“团队”部分\n\
    3. 关闭设置，并在 `项目导航器` 中选择项目的根节点\n4. 在 `显示项目与目标列表` 下选择默认目标\n5. 选择 `签名与功能` 选项卡\n6.\
    \ 在 `签名` 部分下选择 `自动管理签名`\n7. 在 `团队` 下拉列表中选择你的团队\n\n项目创建后，`构建设置`/`打包` 部分下的 `DEFINES_MODULE`\
    \ 设置可设为 `YES`，以便将框架打包为 Swift 模块，从而允许在 Swift 代码中使用 `import [框架名称]` 导入，并可通过伞头文件暴露任何公共\
    \ Objective-C 头文件。如果需要伞头文件来暴露 Objective-C 头文件，则需执行以下步骤：\n\n![开发环境界面截图，显示一个名为“SettingsFW”的项目。左侧面板列出文件：“SettingsFW.h”、“SettingsFW.swift”和“SettingsFWTests.swift”。右侧面板显示“构建阶段”选项卡，包含“目标依赖项”、“运行构建工具插件”和“头文件”等部分，其中头文件部分列出了公共、私有和项目头文件。界面设置为\
    \ iPhone 17 Pro Max 模拟器，状态栏显示时间 12:40 PM。](img/678928_1_En_1_Fig4_HTML.jpg)\n\n\
    图 1-4 构建阶段设置\n\n1. 在 `项目导航器` 中右键点击框架文件夹，选择 `从模板新建文件…`\n2. 在 `源` 部分下选择 `头文件` 模板，然后点击\
    \ `下一页`\n3. 输入文件名，例如 `SettingsFW.h`，并创建该文件\n4. 在 `项目导航器` 中选择根节点\n5. 选择 `构建阶段`\
    \ 选项卡，展开 `头文件` 部分，将伞头文件拖拽到 `公共` 列表中（**图** **1-4**）\n6. 在 `项目导航器` 中选择伞头文件，并插入以下内容（请使用相应的框架名称）：\n\
    \n```objc\n#import \n//! SettingsFW 的项目版本号。\nFOUNDATION_EXPORT double SettingsFWVersionNumber;\n\
    //! SettingsFW 的项目版本字符串。\nFOUNDATION_EXPORT const unsigned char SettingsFWVersionString[];\n\
    // MARK: - 公共 Objective-C 头文件\n// 在此处导入所有你希望 Swift 可见的头文件\n// MARK: - 可选的 Swift\
    \ 互操作性\n// 仅包含 Swift 代码的类会自动可用，无需导入\n```\n\n**趣闻：** 旧版本的 Xcode 会自动生成此文件。\n\n##\
    \ 创建故事板\n\niOS 框架可以提供不同类型的功能，你可以在移动应用中使用，包括 Swift 类扩展、常用工具、第三方 API 集成以及功能集。在本例中，将使用\
    \ Interface Builder 开发一个用户界面故事板功能。本书后续章节将创建一个更复杂的 SwiftUI 用户界面。\n\n![软件界面截图，用于选择新文件的模板。界面包含不同操作系统选项，如\
    \ iOS、macOS、watchOS、tvOS、visionOS 和 DriverKit。在“源”选项下，包括 Swift 文件、Cocoa Touch\
    \ 类、Objective-C 文件、头文件、C++ 文件、Metal 文件和 C 文件。在“用户界面”选项下，包括 SwiftUI 视图、故事板、视图、空文件和启动屏幕。其中“故事板”选项高亮显示，底部有“取消”、“上一页”和“下一页”按钮。](img/678928_1_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5 新文件模板窗口\n\n1. 在 `项目导航器` 中右键点击框架文件夹，选择 `从模板新建文件…`\n2. 在 `用户界面` 分组下选择 `故事板`\
    \ 模板（**图** **1-5**），然后点击 `下一页`\n3. 将文件保存为 `SettingsUI.storyboard`\n"
- fmt: '# Creating a User Interface


    This framework will represent account settings. You can practice developing this
    UI using Interface Builder, or you can download the source code from GitHub and
    replace the Storyboard file contents as follows:


    ![Screenshot of an Xcode interface displaying a storyboard for an iOS app. The
    storyboard includes two iPhone screens. The first screen shows a “Navigation Controller”
    with a placeholder for a title. The second screen is labeled “Settings” and contains
    a table view with static content, listing “General” information such as Name,
    Email, and Website with example entries: “Graphixware, LLC,” “graphixware@gmail.com,”
    and “https:/graphixware.com.” The left sidebar shows a file structure with files
    like “SettingsFW.h” and “SettingsUI.storyboard” highlighted.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig6_HTML.jpg)


    Figure 1-6 Storyboard Editor


    1. Right-click `SettingsUI.storyboard` in the `Project Navigator` and select Open
    As/Source Code

    2. Select the file contents and delete it

    3. Open the downloaded `SettingsUI.storyboard` file in a text editor and paste
    it into the project’s `.storyboard` file

    4. Right-click the storyboard file in the `Project Navigator` and select Open
    As/Interface Builder - Storyboard (**Figure** [1-6](#678928_1_En_1_Chapter.xhtml#Fig6))


    ## Creating a Cocoa Touch Class


    A Cocoa Touch class will need to be created to support the User Interface defined
    in the Storyboard:


    1. Right-click the folder within the `Project Navigator` and select **New File
    from Template…**

    2. Choose the **Cocoa Touch Class** template under the **Source** section and
    **Next**

    3. Input a name for the class, e.g., `SettingsTVC`, and set `UITableViewController`
    as the subclass

    4. Ensure **Also create XIB file** is unchecked and **Language** is Swift


    Replace the default generated code within `SettingsTVC.swift` with the following:


    ```

    import UIKit

    class SettingsTVC: UITableViewController {

    @IBOutlet weak var nameLabel: UILabel!

    @IBOutlet weak var nameValueLabel: UILabel!

    @IBOutlet weak var emailLabel: UILabel!

    @IBOutlet weak var emailValueLabel: UILabel!

    @IBOutlet weak var websiteLabel: UILabel!

    @IBOutlet weak var websiteValueLabel: UILabel!

    var configuration: Dictionary?

    func configure(configuration: Dictionary) {

    self.configuration = configuration

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    self.navigationController?.navigationBar.prefersLargeTitles = true

    self.navigationItem.largeTitleDisplayMode = .always

    // The following hard-coded values will be fetched from a backing store via API
    in an actual app...

    self.nameValueLabel.text = "Graphixware, LLC"

    self.emailValueLabel.text = "gw@graphixware.com"

    self.websiteValueLabel.text = "https://graphixware.com"

    }

    override func numberOfSections(in tableView: UITableView) -> Int {

    return 1

    }

    override func tableView(_ tableView: UITableView, heightForHeaderInSection section:
    Int) -> CGFloat {

    return 0

    }

    override func tableView(_ tableView: UITableView, numberOfRowsInSection section:
    Int) -> Int {

    return 3

    }

    override func tableView(_ tableView: UITableView, canEditRowAt indexPath: IndexPath)
    -> Bool {

    return false

    }

    }

    ```


    Since this class is only a static representation of arbitrary account settings,
    the numbers of sections and rows are fixed via `numberOfSections()` and `numberOfRowsInSection()`.


    The Dictionary variable `configuration` and the function `configure()` will allow
    the enablement and configuration of new features in the future, as they become
    available via framework enhancements. Additional code needed for `SettingsTVC`
    will be added throughout the chapter.


    ## Creating a Swift Protocol


    To enable the integration of a framework into an app, it is necessary to define
    a public interface that the app can utilize. While the framework could simply
    expose a public function in a Swift class without the use of a protocol, doing
    so would result in a tightly coupled relationship between the two entities and
    hinder the framework''s ability to modify its user interface in the future without
    impacting consuming apps. A better approach will be to define a public protocol
    to hide the implementation details, allowing the framework to change it in the
    future without requiring app changes and another App Store release. Perform the
    following steps to create the protocol:


    1. Right-click the folder within the `Project Navigator` and select **New File
    from Template…**

    2. Choose the **Swift File** template under the **Source** section and **Next**

    3. Name the file `SettingsProtocol.swift`


    A protocol function will need to be defined with a Dictionary parameter, which
    will be used in the future to expose, enable, and configure framework features
    as they become available:


    ```

    import Foundation

    import UIKit

    protocol DisplayableViewController {

    func instantiateRootViewController(configuration: Dictionary) -> UIViewController

    }

    ```


    The protocol will need to be implemented to instantiate the root view controller:


    ```

    public class SettingsProtocol: DisplayableViewController {

    public init() {}

    public func instantiateRootViewController(configuration: Dictionary) -> UIViewController
    {

    let storyboard = UIStoryboard(name: "SettingsUI", bundle: Bundle(for: SettingsTVC.self))

    let vc = storyboard.instantiateViewController(withIdentifier: "SettingsNC")

    if let navController = vc as? UINavigationController {

    if let settingsTVC = navController.topViewController as? SettingsTVC {

    settingsTVC.configure(configuration: configuration)

    }

    }

    return vc

    }

    }

    ```


    **Fun Fact:** A framework storyboard will not be found when referenced from an
    external app target unless the `UIStoryboard` initializer `Bundle(for: [class])`
    is used.


    **Fun Fact:** The framework view controller will not load properly unless a **Storyboard
    ID** has been assigned to it within the Storyboard, along with the corresponding
    class (the sample storyboard has set these already).


    **Fun Fact:** An access modifier was not used when defining the function protocol,
    but it must be made public when implemented in order for an external app target
    to integrate it properly.


    The code should compile cleanly up to this point.


    ## Creating an App Target


    In order to run the iOS Framework without integrating it into an external app
    (which will be done outside of the framework project), an app target needs to
    be created within the framework project to test it. Perform the following steps
    to create the app target:


    ![Screenshot of a software development interface for selecting a new target template.
    Options include platforms like iOS, macOS, and others. Application extensions
    listed are Spotlight Import, Sticker Pack, Thumbnail, Translation Provider, Unwanted
    Communication, URL Filter Network, Virtual Conference, and Widget Extension. Application
    options include App, Document App, App Clip, Game, and Augmented Reality App.
    A search filter is present, and navigation buttons for “Previous” and “Next” are
    at the bottom.](images/678928_1_En_1_Chapter/678928_1_En_1_Fig7_HTML.jpg)


    Figure 1-7 New Target Template


    1. Select the root node within the `Project Navigator`

    2. Select the **+** icon at the bottom of the **Targets Navigator** to create
    a new target

    3. Select the **App** template under the **Application** group (**Figure** [1-7](#678928_1_En_1_Chapter.xhtml#Fig7))
    and **Next**

    4. Set the **Project Name** to `SettingsApp`

    5. Set the **Interface** to **Storyboard**

    6. Set the **Language** to **Swift**


    The remaining settings are arbitrary.'
