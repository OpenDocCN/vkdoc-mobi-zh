    private(set) var recordings: [Recording]! {

    didSet {

    self.bindRecordingsViewModelToController()

    }

    }

    var bindRecordingsViewModelToController : (() -> ()) = {}

    ```


    The following code should be implemented in the **fetch****()** function to call
    the local service to read files from the device, create corresponding models,
    and set the **recordings** variable to trigger a notification to the View to update
    itself.


    Note


    The *fetch* function won’t compile until the RecordingsService class has been
    created, so it can be commented out until it has been created.


    ```

    private func fetch() {

    RecordingsService.shared.fetch() { [weak self] recordings, error in

    guard let strongSelf = self else { return }

    if let err = error {

    print("RecordingsViewModel.fetch(): error = \(err.localizedDescription)")

    } else {

    strongSelf.recordings = recordings

    }

    }

    }

    ```'
