    4.  将 `App Language` 更改为法语，`App Region` 更改为法国（**图** **9-4**）


    ## 在模拟器中运行 App


    当 App 在 iOS 模拟器中运行时，设置视图的标题、姓名、电子邮件地址和网站标签将按法语语言环境显示（**图** **9-5**）。


