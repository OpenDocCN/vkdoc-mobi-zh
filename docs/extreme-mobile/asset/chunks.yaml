    \ Xcode 中一个名为“ScratchTraxApp2”的应用的开发环境，包含项目文件和设置。](img/678928_1_En_8_Fig1_HTML.jpg)\n\
    \n**图 8-1: Xcode 模拟器**\n\n当框架被加载时，它们会注册自己的视图控制器。应用从 `UserDefaults` 中检索这些注册信息，实例化对应的视图控制器，将它们集成到自己的用户界面中，并根据需要覆盖框架的\
    \ Property List 设置。在此案例中，应用将在“录音”功能中显示**本地音频录音**。\n\n太棒了！现在使用相同的框架创建了两个截然不同的应用。两者都无需依赖协议即可动态加载框架，并且都不需要修改代码来支持不同的操作模式或功能。\n"
- fmt: '# Driving Revenue Through In-App Purchases


    In this chapter, `ScratchTraxApp2` simulates a digital recording studio. Local
    recordings are handled through the Recordings view, while audio track management
    and song publishing are controlled via the Pro Features view.


    Simulated In-App Purchases will be used to test the proper integration of dynamic
    feature enablement.


    **Use Case 1:**


    ![A screenshot of a development environment displaying an iOS app interface on
    an iPhone 17 Pro Max simulator. The app shows a list titled “Local Recordings”
    with two entries: “My Acoustic Guitar Ballad” and “My Electric Guitar Anthem,”
    both credited to John Doe for words and music in 2025\. The development environment
    includes project files and settings for “ScratchTraxApp2” in Xcode, with various
    panels showing file directories and project configurations.](images/678928_1_En_8_Chapter/678928_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Xcode Simulator


    ![A screenshot of an iOS app development environment showing a simulated iPhone
    screen with the “Add Features” menu. The menu lists options for purchasing publishing
    and recording features, with prices ranging from $0.99 to $2.99\. The development
    interface includes project files and settings for an app named “ScratchTraxApp2,”
    with various folders and configuration options visible.](images/678928_1_En_8_Chapter/678928_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Xcode Simulator


    1.  Select the Pro Features tab and purchase the “Publish Recordings” In-App Purchase.
    The IAP will become disabled, indicating the purchase was made.

    2.  Navigate to the Recordings view and select the Publish Recording icon on the
    left of the navigation controller. The Publish Recording view will be displayed.

    3.  Shut down and restart the app to confirm that the IAP remains disabled, verifying
    persistence through `SwiftData` (**Figure** [**8-2**](#678928_1_En_8_Chapter.xhtml#Fig2)
    and **Figure** [**8-3**](#678928_1_En_8_Chapter.xhtml#Fig3)).


    **Use Case 2:**


    ![A screenshot of an Xcode development environment displaying a project named
    “ScratchTraxApp2.” The main window shows a simulated iPhone interface with a “New
    Recording” screen featuring a digital audio mixer with sliders and knobs. The
    left sidebar lists project files, and the right panel displays project settings.
    The interface includes tabs for “Pro Features,” “Recording Studio,” “Recordings,”
    and “Settings.”](images/678928_1_En_8_Chapter/678928_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    ![A screenshot of an iOS app development environment in Xcode. The main focus
    is a simulator displaying an app interface titled “Add Features,” listing options
    for purchasing features like “Publish Recordings” for $3.99, and various “Recording
    Tracks” priced at $0.99, $1.99, and $2.99\. The Xcode interface shows project
    files and settings on the left and right panels, with the app’s code and configuration
    details visible.](images/678928_1_En_8_Chapter/678928_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    1.  Select the Pro Features tab and purchase the “3 Recording Tracks” In-App Purchase.
    The IAP will become disabled, indicating the purchase was made.

    2.  Navigate to the Recording Studio view and verify that three recording tracks
    are now enabled.

    3.  Shut down and restart the app to confirm that the IAP remains disabled, verifying
    persistence through `SwiftData` (**Figure** [**8-4**](#678928_1_En_8_Chapter.xhtml#Fig4)
    and **Figure** [**8-5**](#678928_1_En_8_Chapter.xhtml#Fig5)).


    In this chapter, you successfully unified multiple frameworks into the `ScratchTraxApp2`
    App using dynamic runtime integration. By modifying frameworks as needed and leveraging
    In-App Purchases across modules, you built a cohesive, modular, and revenue-capable
    app without changing code. This chapter reinforces scalable architecture principles,
    demonstrating how dynamic frameworks can work together seamlessly.


    With multiple frameworks now unified in a single app, you’re ready to ensure your
    applications can reach a global audience. In the next chapter, we’ll explore how
    to localize frameworks for multilingual support, adapting interfaces and content
    for different languages and regions.


    # 9. Internationalizing Frameworks for Multilingual Support


    ## Localizing the `SettingsFW` Framework


    Internationalization is a complex topic that spans User Experience Design, User
    Interface Development, Language Translation, Date and Time Formats, Currency,
    Cultural Sensitivity, Legal and Regulatory Compliance, Character Encoding and
    Font Support, Keyboard and Input Method Support, and Accessibility (ADA and Accessibility
    Standards).


    This chapter will focus on localization and best practices for developing iOS
    frameworks that automatically adjust to different language settings.


    A complete set of topics on the many facets of localization, including text, assets,
    layouts, and import/export tools, is available from the Apple Developer Documentation.^([^(29)](#fn29))


    In this chapter, we’ll focus on localizing the `SettingsFW` Framework to provide
    multilingual support in iOS apps. You’ll learn best practices for adapting text
    to different languages, ensuring a seamless user experience. By the end, `ScratchTraxApp2`
    will be able to display the Settings view in multiple languages, preparing your
    frameworks for international audiences.'
