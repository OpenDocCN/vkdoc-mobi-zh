    \ will be used to read files from a device and return metadata representing audio\
    \ files. Perform the following steps to create the service:\n\n1. Right-click\
    \ the folder within the **Project Navigator** and select **New File from Template…**\n\
    2. Choose the **Swift** **File** template under the **Source** section\n3. Create\
    \ a class called `RecordingsService.swift`\n\nCreate a **singleton**^([⁶](#fn6))\
    \ class for the service. A singleton is a common design pattern that prevents\
    \ multiple instances of a class from being instantiated. Once instantiated, the\
    \ same instance is used wherever it’s referenced.\n\n```swift\nimport Foundation\n\
    class RecordingsService {\n    public static let shared = RecordingsService()\n\
    }\n```\n\nDefine a completion handler as a compound (function) type, which the\
    \ service will call when data has been read from the file system and converted\
    \ to `Recording` models.\n\n```swift\ntypealias RecordingCompletionHandler = ([Recording]?,\
    \ Error?) -> ()\n```\n\nSince this framework reads files from a device and returns\
    \ metadata representing those files, sample data will need to be defined for use\
    \ when no files exist. The `init()` function will use the `title` attribute of\
    \ each `Recording` model to check for the existence of a corresponding file and\
    \ create the file if it doesn’t exist. Add the following code to the class:\n\n\
    ```swift\nprivate let recordings: [Recording] = [\n    Recording(bitrate: 131072,\
    \ copyright: \"© 2025 Words and Music by John Doe\", date: \"04/28/2025\", length:\
    \ 270, size: 5*1024*1024,\n              title: \"My Electric Guitar Anthem\"\
    , type: \"AAC Audio File\", url: \"https://graphixware.com/MyElectricAnthem.aac\"\
    ),\n    Recording(bitrate: 131072, copyright: \"© 2025 Words and Music by John\
    \ Doe\", date: \"08/24/2025\", length: 228, size: 10*1024*1024,\n            \
    \  title: \"My Acoustic Guitar Ballad\", type: \"AAC Audio File\", url: \"https://graphixware.com/MyAcousticBallad.aac\"\
    )\n]\n\nprivate init() {\n    let encoder = JSONEncoder()\n    encoder.outputFormatting\
    \ = .prettyPrinted\n    for recording in recordings {\n        do {\n        \
    \    let file = try FileManager.default.url(for: .documentDirectory, in: .userDomainMask,\
    \ appropriateFor: nil, create: true)\n                .appendingPathComponent(recording.title\
    \ + \".aac\")\n            if !FileManager.default.fileExists(atPath: file.lastPathComponent)\
    \ {\n                try encoder.encode(recording).write(to: file)\n         \
    \   }\n        } catch {\n            print(\"RecordingsService.init(): Error\
    \ = \\(error.localizedDescription)\")\n        }\n    }\n}\n```\n\nDefine a `fetch()`\
    \ function to be called by the ViewModel to fetch the data, which the View, in\
    \ turn, will display in its User Interface treatment.\n\n```swift\nfunc fetch(completion:\
    \ @escaping RecordingCompletionHandler) {\n    var recordingModels: [Recording]\
    \ = []\n    let fileManager = FileManager.default\n    let documentsURL = fileManager.urls(for:\
    \ .documentDirectory, in: .userDomainMask)[0]\n    do {\n        let fileURLs\
    \ = try fileManager.contentsOfDirectory(at: documentsURL, includingPropertiesForKeys:\
    \ nil)\n        for fileURL in fileURLs {\n            if let recording = read(type:\
    \ Recording.self, file: fileURL) {\n                recordingModels.append(recording)\n\
    \            }\n        }\n    } catch {\n        print(\"RecordingsService.fetch():\
    \ Error = \\(error.localizedDescription)\")\n    }\n    completion(recordingModels,\
    \ nil)\n}\n\nprivate func read<T: Decodable>(type: T.Type, file: URL) -> T? {\n\
    \    var data: Data?\n    do {\n        data = try Data(contentsOf: file)\n  \
    \  } catch {\n        print(\"RecordingsService.read(): Error = \\(error.localizedDescription)\"\
    )\n    }\n    guard let recordingData = data else { return nil }\n    do {\n \
    \       let decoder = JSONDecoder()\n        return try decoder.decode(T.self,\
    \ from: recordingData)\n    } catch {\n        print(\"RecordingsService.read():\
    \ Error = \\(error.localizedDescription)\")\n    }\n    return nil\n}\n```\n\n\
    **Note**\n\nSince the `RecordingsService` is now defined, uncomment the code that\
    \ was previously commented out in the `fetch()` function within the `RecordingsViewModel`,\
    \ so that the project will compile properly.\n\n# Integrating the ViewModel into\
    \ the View\n\nSelect `RecordingsTVC.swift` and define a variable called `viewModel`,\
    \ along with a function called `initLocalServiceVM()`, to instantiate the ViewModel,\
