    \ Objective-C 和 Swift 类，以便在加载时执行注册。`SettingsFW`框架将继续通过公共协议进行集成。\n\n### RecordingStudioFW\n\
    \n创建 Objective-C 头文件：\n\n1.  在**项目导航器**中右键单击`RecordingStudioFW`项目文件夹，然后选择**从模板新建文件...**\n\
    2.  在**源**组下选择**头文件**模板\n3.  将文件命名为`RecordingStudioFWObjcLoader.h`\n\n将以下代码添加到头文件以定义\
    \ Objective-C 类接口：\n\n```objc\n#ifndef RecordingStudioFWObjcLoader_h\n#define\
    \ RecordingStudioFWObjcLoader_h\n#import \n// NS_ASSUME_NONNULL_BEGIN: https://developer.apple.com/swift/blog/?id=25\n\
    NS_ASSUME_NONNULL_BEGIN\n@interface RecordingStudioFWObjcLoader : NSObject\n@end\n\
    NS_ASSUME_NONNULL_END\n#endif /* RecordingStudioFWObjcLoader_h */\n```\n\n为该类创建\
    \ Objective-C 实现文件：\n\n1.  在**项目导航器**中右键单击`RecordingStudioFW`项目文件夹，然后选择**从模板新建文件...**\n\
    2.  在**源**组下选择**Objective-C 文件**模板\n3.  将文件命名为`RecordingStudioFWObjcLoader.m`\n\
    \n将以下代码添加到类文件中以定义 Objective-C 类实现，该实现通过`+load()`方法实现注册钩子：\n\n```objc\n#import\
    \ \"RecordingStudioFWObjcLoader.h\"\n#import \"RecordingStudioFW/RecordingStudioFW-Swift.h\"\
    \n@implementation RecordingStudioFWObjcLoader\n// https://developer.apple.com/documentation/objectivec/nsobject/1418815-load\n\
    +(void) load {\n    if ([[RecordingStudioFWSwiftLoader alloc] init]) {\n     \
    \   NSLog(@\"RecordingStudioFWObjcLoader.load() 成功...\");\n    } else {\n    \
    \    NSLog(@\"RecordingStudioFWObjcLoader.load() 失败...\");\n    }\n}\n@end\n```\n\
    \n由于`RecordingStudioFW/RecordingStudioFW-Swift.h`是一个不可见的桥接头文件，用于支持在 Objective-C\
    \ 中引用 Swift 类，因此需要设置以下构建设置以强制编译器生成该文件：\n\n1.  在**项目导航器**中选择`RecordingStudioFW`项目文件夹\n\
    2.  选择`RecordingStudioFW`目标\n3.  选择**构建设置**选项卡，搜索**安装生成的头文件**，并将其设置为**YES**\n\n\
    > **注意：** 在完成下一步之前，`RecordingStudioFWObjcLoader.m`将无法编译。\n\n创建用于注册框架的 Swift 文件：\n\
    \n1.  在**项目导航器**中右键单击`RecordingsFW`项目文件夹，然后选择**从模板新建文件...**\n2.  在**源**组下选择**Swift\
    \ 文件**模板\n3.  将文件命名为`RecordingStudioFWSwiftLoader.swift`\n\n将以下代码添加到类中以执行框架注册，使应用能够暴露框架的功能：\n\
    \n```swift\nimport Foundation\n@objcMembers public class RecordingStudioFWSwiftLoader:\
    \ NSObject {\n    override public init() {\n        super.init()\n        initViews()\n\
    \    }\n    \n    func initViews() {\n        let config = [ \"bundle\": \"com.gw.RecordingStudioFW\"\
    , \"storyboard\": \"RecordingStudioUI\", \"view\": \"RecordingStudioNC\", \"title\"\
    : \"录音工作室\", \"icon\": \"music.note\"]\n        var configs: [[String:String]]\
    \ = []\n        if let persistedConfigs = UserDefaults.standard.object(forKey:\
    \ \"views\") as? [Dictionary], !persistedConfigs.isEmpty {\n            configs.append(contentsOf:\
    \ persistedConfigs)\n            if !findConfig(configs: persistedConfigs) {\n\
    \                configs.append(config)\n            }\n        } else {\n   \
    \         configs.append(config)\n        }\n        UserDefaults.standard.set(configs,\
    \ forKey: \"views\")\n    }\n    \n    func findConfig(configs: [[String:String]])\
    \ -> Bool {\n        var found = false\n        for config in configs {\n    \
    \        if config[\"bundle\"] == \"com.gw.RecordingStudioFW\", config[\"storyboard\"\
    ] == \"RecordingStudioUI\", config[\"view\"] == \"RecordingStudioNC\" {\n    \
    \            found = true\n                break\n            }\n        }\n \
    \       return found\n    }\n}\n```\n\n### RecordingsStoreFW\n\n创建 Objective-C\
    \ 头文件："
- fmt: "1.  Right-click the `RecordingsStoreFW` project folder within the **Project\
    \ Navigator** and select **New File from Template…**\n\n2.  Select the **Header\
    \ File** template under the **Source** group\n\n3.  Name the file `RecordingsStoreFWObjcLoader.h`\n\
    \nAdd the following code to the header file to define the Objective-C class interface:\n\
    \n```\n#ifndef RecordingsStoreFWObjcLoader_h\n#define RecordingsStoreFWObjcLoader_h\n\
    #import \n// NS_ASSUME_NONNULL_BEGIN: https://developer.apple.com/swift/blog/?id=25\n\
    NS_ASSUME_NONNULL_BEGIN\n@interface RecordingsStoreFWObjcLoader : NSObject\n@end\n\
    NS_ASSUME_NONNULL_END\n#endif /* RecordingsStoreFWObjcLoader_h */\n```\n\nCreate\
    \ the Objective-C implementation file for the class:\n\n1.  Right-click the `RecordingsStoreFW`\
    \ project folder within the **Project Navigator** and select **New File from Template…**\n\
    \n2.  Select the **Objective-C File** template under the **Source** group\n\n\
    3.  Name the file `RecordingsStoreFWObjcLoader.m`\n\nAdd the following code to\
    \ the class file to define the Objective-C class implementation, which implements\
    \ the `+load()` method for the registration hook:\n\n```\n#import \"RecordingsStoreFWObjcLoader.h\"\
    \n#import \"RecordingsStoreFW/RecordingsStoreFW-Swift.h\"\n@implementation RecordingsStoreFWObjcLoader\n\
    // https://developer.apple.com/documentation/objectivec/nsobject/1418815-load\n\
    +(void) load {\nif ([[RecordingsStoreFWSwiftLoader alloc] init]) {\nNSLog(@\"\
    RecordingsStoreFWObjcLoader.load() succeeded...\");\n} else {\nNSLog(@\"RecordingsStoreFWObjcLoader.load()\
    \ failed...\");\n}\n}\n@end\n```\n\nSince `RecordingsStoreFW/RecordingsStoreFW-Swift.h`\
    \ is a non-visible bridging header needed to support the referencing of Swift\
    \ classes from within Objective-C, the following build setting needs to be set\
    \ to force the compiler to generate it:\n\n1.  Select the `RecordingsStoreFW`\
    \ project folder within the **Project Navigator**\n\n2.  Select the `RecordingsStoreFW`\
    \ target\n\n3.  Select the **Build Settings** tab and search for **Install Generated\
    \ Header**, and set it to **YES**\n\n> **Note**: `RecordingsStoreFWObjcLoader.m`\
    \ will not compile until the next step has been completed.\n\nCreate the Swift\
    \ file for registering the framework:\n\n1.  Right-click the `RecordingsFW` project\
    \ folder within the **Project Navigator** and select **New File from Template…**\n\
    \n2.  Select the **Swift File** template under the **Source** group\n\n3.  Name\
    \ the file `RecordingsStoreFWSwiftLoader.swift`\n\nAdd the following code to the\
    \ class to perform the framework registration, so that the app can expose the\
    \ framework’s functionality:\n\n```\nimport Foundation\n@objcMembers public class\
    \ RecordingsStoreFWSwiftLoader: NSObject {\noverride public init() {\nsuper.init()\n\
    initViews()\n}\nfunc initViews() {\nlet config = [ \"bundle\": \"com.gw.RecordingsStoreFW\"\
    , \"storyboard\": \"RecordingsStoreUI\", \"view\": \"RecordingsStoreVC\", \"title\"\
    : \"Pro Features\", \"icon\": \"storefront\"]\nvar configs: [[String:String]]\
    \ = []\nif let persistedConfigs = UserDefaults.standard.object(forKey: \"views\"\
    ) as? [Dictionary], !persistedConfigs.isEmpty {\nconfigs.append(contentsOf: persistedConfigs)\n\
    if !findConfig(configs: persistedConfigs) {\nconfigs.append(config)\n}\n} else\
    \ {\nconfigs.append(config)\n}\nUserDefaults.standard.set(configs, forKey: \"\
    views\")\n}\nfunc findConfig(configs: [[String:String]]) -> Bool {\nvar found\
    \ = false\nfor config in configs {\nif config[\"bundle\"] == \"com.gw.RecordingsStoreFW\"\
    , config[\"storyboard\"] == \"RecordingsStoreUI\", config[\"view\"] == \"RecordingsStoreVC\"\
    \ {\nfound = true\nbreak\n}\n}\nreturn found\n}\n}\n```\n\nAdd `initFeatures()`\
    \ to `RecordingsStoreFWSwiftLoader` to fetch In-App Purchases persisted to Core\
    \ Data, so that they can be propagated via `UserDefaults`.\n\n```\nimport Foundation\n\
    @objcMembers public class RecordingsStoreFWSwiftLoader: NSObject {\noverride public\
    \ init() {\nsuper.init()\ninitViews()\ninitFeatures()\n}\nfunc initFeatures()\
    \ {\nvar publish = false\nvar tracks: Int16 = 1\nlet manager = SwiftDataManager.shared\n\
    if let config = manager.configuration {\npublish = config.publishRecordings\n\
    tracks = config.trackCount\n} else {\n// No existing configuration — create a\
    \ default one\nmanager.saveConfiguration(existing: nil, publishRecordings: false,\
    \ trackCount: 1)\nif let config = manager.configuration {\npublish = config.publishRecordings\n\
    tracks = config.trackCount\n}\n}\nUserDefaults.standard.set([\"publishRecordings\"\
    : publish, \"trackCount\": tracks], forKey: \"features\")\n}\n}\n```\n\n## Icing\
    \ on the Cake\n\nSet the app as the active scheme in the scheme drop-down, build\
    \ the app, and run it using one of the Xcode simulators or an actual device. The\
    \ code should compile and run properly. The results should match the screenshot\
    \ in **Figure 8-1**.\n\n![A screenshot of a mobile app interface displayed on\
    \ an iPhone 17 Pro Max. The app screen titled “Add Features” lists options for\
    \ purchasing features: “Publish Recordings” for $3.99, “2 Recording Tracks” for\
    \ $0.99, “3 Recording Tracks” for $1.99, and “4 Recording Tracks” for $2.99. The\
    \ bottom navigation bar includes icons labeled “Pro Features,” “Recording Studio,”\
    \ “Recordings,” and “Settings.” The background shows a development environment\
    \ with project files and settings for an app named “ScratchTraxApp2” in Xcode.](images/678928_1_En_8_Chapter/678928_1_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1: Xcode Simulator**\n\nWhen the frameworks are loaded, they register\
    \ their view controllers. The app retrieves these registrations from `UserDefaults`,\
    \ instantiates the corresponding view controllers, integrates them into its own\
    \ user interface, and overrides any framework Property List settings as needed.\
    \ In this case, the app will show **local audio recordings** in the Recordings\
    \ feature.\n\nAmazing! Two distinct apps have now been created using the same\
    \ frameworks. Both load the frameworks dynamically without relying on a protocol,\
    \ and neither requires code changes to support different operation modes or functionality."
