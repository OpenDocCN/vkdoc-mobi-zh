- fmt: "## Implementing the Classes\n\nNow that you understand the objects you are\
    \ going to be creating, you need to create your first object. To do so, you will\
    \ start with a new project.\n\n1. Launch Xcode. Select File ➤ New ➤ Project.\n\
    2. Select iOS on the top menu if it is not already selected. Under the Application\
    \ header, select Master-Detail App. For what you are doing in this chapter, you\
    \ could have selected any of the application types (see Figure 5-9). Click Next.\n\
    \n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig9_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9. Creating a new project\n\n3. Enter a product name for your project.\
    \ We will use the name of `BookStore`. You will also have to enter an organization\
    \ name and a company identifier. The company identifier is usually `com.companyname`\
    \ (i.e., `com.inno`). Leave the check boxes on this screen as they appear by default.\
    \ You will not be worrying about Core Data right now; it’s discussed in Chapter\
    \ 11. Also, leave the current language selection set to Swift. Click Next to select\
    \ a location to save your project and then save your project.\n4. Select the `BookStore`\
    \ folder from the Project navigator on the left side of the screen (see Figure\
    \ 5-10). This is where the majority of your code will reside.\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig10_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10. Selecting the BookStore project\n\n5. Select File ➤ New ➤ File.\n\
    6. From the pop-up window, make sure iOS is selected at the top and then click\
    \ the Cocoa Touch Class in the Source section (see Figure 5-11). Then click Next.\n\
    \n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig11_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11. Creating a new Swift class file\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig12_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12. Creating the file\n\n7. You will now be given the opportunity to\
    \ name your class (see Figure 5-12). For this exercise, you will create the `Customer`\
    \ class. Change the Subclass of dropdown to NSObject. Make sure the Language is\
    \ set to Swift. Click Next and save the file in the default location.\n\n**Note:**\
    \ For ease of use and for understanding your code, remember that class names should\
    \ always be capitalized in Swift. Object names should always start lowercase.\
    \ For example, `Book` would be an appropriate name for a class, and `book` would\
    \ be a great name for an object based on the `Book` class. For a two-word object,\
    \ such as the book’s author, an appropriate name would be `bookAuthor`. This type\
    \ of capitalization is called lower camel case.\n\n8. Now look in your main project\
    \ folder; you should have a new file. It is called `Customer.swift`.\n\n**Note:**\
    \ If you had created a class in Objective-C, `Customer.h` and `Customer.m` files\
    \ would have been created. The `.h` file is the header file that contains information\
    \ about your class. The header file lists all of the properties and methods in\
    \ your class, but it does actually contain the code related to them. The `.m`\
    \ file is the implementation file, which is where you write the code for your\
    \ methods. In Swift, the entire class is contained in a single file.\n\n9. The\
    \ `Customer.swift` file should now be selected, and you will see the window shown\
    \ in Figure 5-13. Notice it does not contain a lot of information currently. The\
    \ first part, with the double slashes (`//`), consists of comments and is not\
    \ considered part of the code. Comments allow you to tell those who might read\
    \ your code what each portion of code is meant to accomplish. The second part\
    \ of the file is your new Customer class. The new class declaration is as follows:\n\
    \n```\nclass Customer: NSObject {\n}\n```\n\n**Note:** In Swift, a class does\
    \ not need to be in its own file. Many classes can be defined in a single Swift\
    \ file, but this can be difficult to maintain when your project contains a lot\
    \ of classes. It is usually cleaner and more organized to have a separate file\
    \ for each class.\n\nNow let’s transfer the properties from the UML diagram to\
    \ the actual class.\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig13_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13. Your empty Customer class\n\nNow let’s transfer the properties\
    \ from the UML diagram to the actual class.\n\n**Tip:** Properties should always\
    \ start with a lowercase letter. There can be no spaces in a property name.\n\n\
    For the first property, First Name, add this line to your file:\n\n```\nvar firstName\
    \ = \"\"\n```\n\nThis creates an object in your class called `firstName`. Notice\
    \ you did not tell Swift what type of property `firstName` is. In Swift, you can\
    \ declare a property and not specify the type, and a property can be assigned\
    \ a type based on the value we initially assign it. By giving the property an\
    \ initial value of `\"\"`, you tell the Swift compiler to make `firstName` a String.\
    \ In Swift, all non-optional properties require a default value either when they\
    \ are declared or in the class initializer. We will discuss optionals later in\
    \ this book.\n\n**Note:** In Objective-C, all properties are required to declare\
    \ a type. For example, to create the same `firstName` property, you would use\
    \ the following code:\n\n```\nNSString *firstName;\n```\n\nThis declares an `NSString`\
    \ with the name `firstName`. In Swift, you can declare only a variable and allow\
    \ the system to determine the type.\n\nSince all of the properties will be vars,\
    \ you just need to repeat the same procedure for the other ones. When that is\
    \ complete, your Swift file should look like Figure 5-14.\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig14_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14. The Customer class interface with properties\n\nNow that the class\
    \ declaration is complete, you will need to add your method. Methods should be\
    \ contained in the same class file and location as the properties. You will add\
    \ a new method that returns an array. This code will look as follows:\n\n```\n\
    func listPurchaseHistory() -> [String] {\n    return [\"Purchase 1\", \"Purchase\
    \ 2\"]\n}\n```\n\nThis code might seem a little confusing. The empty parentheses\
    \ tell the compiler that no parameters are passed to the method. The `->` tells\
    \ the system what you return from your method. `[String]` tells you that you are\
    \ returning an array of strings. In the final version, you will actually want\
    \ to return purchase objects, but you are using `String` for now. In order for\
    \ the code to compile, you added a return of a simple array. Obviously, in a real\
    \ app, this would need to return dynamic purchase history. That is all that needs\
    \ to be done in the Swift file to create the class. Figure 5-15 shows the final\
    \ Swift file.\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig15_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15. The finished Customer class Swift file\n\n## Inheritance\n\nAnother\
    \ major quality of OOP is inheritance. Inheritance in programming is similar to\
    \ genetic inheritance. You might have inherited your eye color from your mother\
    \ or hair color from your father, or vice versa. Classes can, in a similar way,\
    \ inherit properties and methods from their parent classes, but unlike genetics,\
    \ you do not inherit the values of those properties. In OOP, a parent class is\
    \ called a superclass, and a child class is called a subclass."
