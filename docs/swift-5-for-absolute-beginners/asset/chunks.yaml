    ## 应用总结


    编译并运行该应用。您应该在 `delegate` 函数处设置断点以观察程序流程。这是一个很好的应用，用于了解如何利用委托将信息从一个视图传递到另一个视图。


    此外，您还可以通过使用 Core Data 或 `UserDefaults` 为应用添加功能，使信息持久化。


    ### 练习


    - 以原始程序为指导，向书店添加更多书籍。

    - 增强 `Book` 类，使其能够存储另一个属性——例如价格或 ISBN。

    - 通过使用 Core Data 或 `UserDefaults` 为应用添加持久化功能。


    # 15. Apple Watch 与 WatchKit


    2014 年 9 月，苹果公司发布了 Apple Watch，并将其视为苹果历史上的新篇章。这款手表不仅能处理电话和短信，还能通过追踪心率和运动来评估佩戴者的健康状况。同时，苹果宣布了
    WatchKit，这是一个专为开发 Apple Watch 应用而设计的框架。对于已经熟悉 UIKit 的开发者来说，WatchKit 会非常熟悉。


    最初，Apple Watch 在开发方面存在一些严重限制。手表充当着 iPhone 应用的附加屏幕。这要求手表靠近手机才能运行，也导致应用运行缓慢。2015
    年 6 月，苹果发布了 watchOS 2.0。这次更新包含了许多新功能，但对开发者来说最大的变化是能够创建代码在 Apple Watch 上运行而非在手机上运行的应用。开发者能够创建独立应用，这些应用性能更好，响应更迅速。现在，苹果已经发布了
    watchOS 4.0，为开发者带来了更多改进。


    ## 创建 watchOS 应用时的注意事项


    为 watchOS 进行开发的一大优势在于，所有开发工作都使用 Swift 或 Objective-C 完成，就像其他 iOS 设备一样。Apple Watch
    确实有一些不同之处，在开始开发之前需要考虑：


    - Apple Watch 的屏幕非常小。屏幕尺寸限制为 40 毫米或 44 毫米，具体取决于手表尺寸。这意味着您没有太多空间放置不必要的 UI 元素。您的界面需要紧凑且组织良好。此外，由于这两种尺寸相近，您需要创建一个界面，使其在两种尺寸上都能呈现良好效果。

    - 在手机和手表之间共享数据需要一些规划。随着 watchOS 3.0 及现在的 5.0 版本，苹果使数据共享变得更加容易。主要是苹果增强了 `WCSession`
    类。此类别的使用超出了本书的范围。

    - watchOS 5.0 的 WatchKit 提供了多种与用户交互的方式，不仅通过应用，还通过速览、可操作的通知和复杂功能。编写良好的应用可以在合理的范围内利用多种交互方式。这些交互方式超出了本书的范围。


    ## 创建 Apple Watch 应用


    第一步是在 Xcode 中创建一个新项目。在顶部，选择 watchOS 标题下的 Application 作为项目类型。然后选择 iOS App with
    WatchKit App，如图 15-1 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig1_HTML.jpg](img/341013_5_En_15_Fig1_HTML.jpg)


    **图 15-1.** 创建 watchOS 应用


    接下来，您将可以选择命名项目。我们将本章中的项目命名为 `BookStore`。您还会注意到 watchOS 应用与标准 iOS 应用有不同的选项。我们不会为此应用添加通知或复杂功能场景，因此请确保它们都未被选中，如图
    15-2 所示。'
- fmt: '### Note


    WatchKit provides additional interaction types that are not available in iOS apps.
    Glances are quick looks into your app. For example, a bookstore app might have
    a glance that shows the best sellers. Glances use a special interface on the watch.
    Complications allow your app to provide simple information on the watch face itself.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig2_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig2_HTML.jpg)


    Figure 15-2. watchOS App options


    Xcode will then prompt you to save your project. Once you’ve saved it, you will
    be presented with your new project. On the left side, you will notice two additional
    targets in your project. One is the BookStore WatchKit App, which contains the
    interface (storyboard and assets) for your app. The second new target is the BookStore
    WatchKit Extension. This will contain all of the code for your app to run on watchOS.
    See Figure [15-3](#341013_5_En_15_Chapter.xhtml#Fig3).


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig3_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig3_HTML.jpg)


    Figure 15-3. New watchOS targets


    Click the `Interface.storyboard` in the BookStore WatchKit App target, and you
    should see a screen similar to Figure [15-4](#341013_5_En_15_Chapter.xhtml#Fig4).
    This is your empty watchOS app storyboard. You will notice the size is significantly
    smaller than a standard iOS storyboard.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig4_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig4_HTML.jpg)


    Figure 15-4. Interface storyboard


    Since you are going to create a list of books for the watchOS app, you need to
    add a table to the storyboard. On the bottom right, search for table and drag
    the table into the Interface Controller Scene, as shown in Figure [15-5](#341013_5_En_15_Chapter.xhtml#Fig5).


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig5_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig5_HTML.jpg)


    Figure 15-5. Adding a table


    Xcode will now give you a Table Row as part of the table. This is similar to the
    prototype rows you used for creating table views in your iOS apps. You need to
    create a class to control it, but for now, you will add a label to it. Search
    for a label in the Object Library and drag one onto the row. See Figure [15-6](#341013_5_En_15_Chapter.xhtml#Fig6).


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig6_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig6_HTML.jpg)


    Figure 15-6. Adding a label to the table row


    By default, the label will be located in the top-left corner of the Table Row.
    Check the Attribute Inspector to make sure the height and width can grow in size
    to fit the content (see Figure [15-7](#341013_5_En_15_Chapter.xhtml#Fig7)). This
    will help ensure that your app runs well on multiple sizes of Apple Watches.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig7_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig7_HTML.jpg)


    Figure 15-7. Allowing the label to grow


    Now the label will expand to fit the entire row. By default, however, the label
    will only show one line of text. Since you are adding book titles, you may need
    multiple lines to fit all of the text you want to add. With the label selected,
    look in the Attributes Inspector on the right side. Find the `Lines` attribute
    and set it to 0, as shown in Figure [15-8](#341013_5_En_15_Chapter.xhtml#Fig8).
    Setting the number of lines to 0 tells Xcode that it can use as many lines as
    needed.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig8_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig8_HTML.jpg)


    Figure 15-8. Setting the Lines attribute


    Now you need to add some code to get the user interface working. On the left side,
    expand the BookStore WatchKit Extension folder and select the `InterfaceController.swift`
    file, as shown in Figure [15-9](#341013_5_En_15_Chapter.xhtml#Fig9). The `InterfaceController`
    is the default controller for the initial scene in a WatchKit storyboard.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig9_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig9_HTML.jpg)


    Figure 15-9. Opening the `InterfaceController.swift` file


    You will notice the default methods in the new controller file are different than
    they were for a standard `UIViewController`. `willActivate()` is equivalent to
    `viewWillAppear()`.


    The first thing you need to do is add a class definition for a row. To do this,
    add the following code to the bottom of the file outside of the close brace (`}`)
    for the `InterFaceController` class.


    ```

    1   class BookRow: NSObject {

    2       @IBOutlet weak var bookLabel: WKInterfaceLabel!

    4   }

    ```


    Line 1 declares a new class called `BookRow`. It is a subclass of `NSObject`.
    Line 2 creates a property called `bookLabel`. `bookLabel`’s class is `WKInterfaceLabel`.
    This is similar to a `UILabel` that you have used before, but it works with WatchKit.'
