    \ Finance Inc）。SSBM Finance Inc 是一家特拉华州公司。\n\n## 引言\n\n在过去的十年里，我们无数次听到以下说法：\n\n\
    *   “我从未编程过，但我对 iPhone 或 iPad 应用有一个绝妙的想法。”\n*   “我真的能学会为 iPhone 或 iPad 编程吗？”\n\
    \n对于后者，我们的回答是：“是的，但你必须相信自己能行。”只有你自己会告诉自己做不到。\n\n### 写给新手\n\n本书假设你可能从未编程过。本书也面向那些从未使用过面向对象编程（OOP）语言的人。市面上有许多\
    \ Swift 书籍，但所有这些书都假设你之前有编程经验，并且了解 OOP 和计算机逻辑。我们想写一本能够带领读者从对计算机编程和逻辑知之甚少，到能够在 Swift\
    \ 中编程的书。毕竟，Swift 是 iPhone、iPad 和 Mac 的原生编程语言。\n\n在过去的十年里，我们教会了成千上万名学生成为 iOS（iPhone/iPad）开发者。我们的许多学生已经在\
    \ App Store 中开发出了各自类别中最成功的 iOS 应用。我们将在前两门课程——“面向对象编程与逻辑入门”和“面向 iPhone/iPad 开发者的\
    \ Swift”——中学到的经验融入到了本书中。\n\n### 写给经验更丰富的开发者\n\n许多多年前编程过、或使用非 OOP 语言编程的开发者，在深入学习\
    \ Swift 之前，需要 OOP 和逻辑方面的背景知识。这本书正是为你准备的。我们会循序渐进地引导你了解 OOP 以及它在 iOS 开发中的使用方法，帮助你成为成功的\
    \ iOS 开发者。\n\n### 本书的组织方式\n\n你会注意到，我们在这本书中非常注重成功体验。我们在 Swift Playgrounds 中引入 OOP\
    \ 和逻辑概念，然后将这些概念迁移到 Xcode 中。许多学生是视觉型学习者或通过动手来学习。我们两种技巧都会用到。我们会通过视觉示例带你了解主题和概念，然后通过分步示例强化这些概念。\n\
    \n我们经常在不同章节重复某些主题，以巩固你所学到的内容，并以新的方式应用这些技能。这使得新手程序员能够重新运用开发技能，并在进步过程中获得成就感。如果你觉得某个主题还没有掌握，不用担心！继续前进！\n\
    \n### 成功公式\n\n学习编程是一个程序与你之间的互动过程。就像学习演奏乐器一样，你必须练习。你必须完成本书中的示例和练习。理解一个概念并不意味着你知道如何应用和使用它。\n\
    \n你将从此书中学到很多。你将从完成本书中的练习中学到很多。然而，当你调试程序时，你才会真正学到东西。花时间通读你的代码，并试图找出它为何没有按你预期的方式工作，这是一个无与伦比的学习过程。调试的缺点是新开发者可能会觉得特别沮丧。如果你从未想过要把电脑扔出窗外，那么你会有这种冲动。你会质疑自己为什么要这样做，以及自己是否足够聪明来解决这个问题。编程非常磨练心性，即使对最有经验的开发者来说也是如此。\n\
    \n就像音乐家一样，你练习得越多，就会变得越好。我们所说的练习，指的是编程！作为程序员，你可以做出一些了不起的事情。世界是你的牡蛎。在 App Store\
    \ 中看到你的应用是最令人满足的成就之一。然而，这是有代价的，这个代价就是花在编码和学习上的时间。\n\n在教会了许多学生成为 iOS 开发者之后，我们总结出了一套让学生成功的公式。以下是我们的成功公式：\n\
    \n*   相信自己能行。唯一会说你做不到的人就是你自己。所以不要这样告诉自己。\n*   完成书中所有的示例和练习。\n*   编码，编码，再编码。你编码越多，就会变得越好。\n\
    *   对自己要有耐心。如果你有幸是一个只需阅读就能记住材料的全优生，这在 Swift 编码中行不通。你必须花时间编码。\n*   你通过阅读本书来学习。你真正通过调试代码来学习。\n\
    *   不要放弃！\n\n### 开发技术栈\n\n我们将引导你理解 iOS 应用的开发过程以及你需要哪些技术。不过，简要地看一下所有技术组件是很有帮助的。以下是你需要了解的关键\
    \ iOS 开发技术，以便构建一个成功的应用并将其发布到 App Store：\n\n*   Apple 开发者网站\n*   应用分析\n*   iOS\
    \ SDK\n*   Swift\n*   面向对象编程与逻辑\n*   Xcode 集成开发环境（IDE）\n*   调试\n*   性能调优\n\n我们知道这有很多技术。别担心，我们会逐一讲解，并让你能够自如地使用它们。\n\
    \n### 所需软件、材料和设备\n\n开发 iOS 应用的一大好处是，几乎所有开发所需的东西都是免费的。\n\n*   Xcode\n*   Swift\n\
    *   macOS 10.14 或更高版本\n*   iOS SDK\n*   iOS 模拟器\n\n你需要的入门工具只是一台 Mac 电脑和知道在哪里下载所有东西。我们将介绍这一点。\n\
    \n### 操作系统和集成开发环境\n\n对于开发 iOS 应用，你必须在 Mac 上使用 Xcode。你可以从 Mac App Store 免费下载 Xcode（见图\
    \ 1）。\n\n![../images/341013_5_En_BookFrontmatter_Fig1_HTML.jpg](img/341013_5_En_BookFrontmatter_Fig1_HTML.jpg)\n\
    \n**图 1** 从 Mac App Store 下载 Xcode\n"
- fmt: '### Software Development Kits


    You will need to register as a developer. You can do this for free at [`https://developer.apple.com/ios`](https://developer.apple.com/ios)
    (see Figure [2](#341013_5_En_BookFrontmatter_OnlinePDF.xhtml#Fig2)).


    ![../images/341013_5_En_BookFrontmatter_Fig2_HTML.jpg](images/341013_5_En_BookFrontmatter_Fig2_HTML.jpg)


    Figure 2


    Apple Developer web site


    When you are ready to upload your app to the App Store, you will need to pay `$99/year`
    in order to publish it.


    ### Dual Monitors


    We recommend developers have a second monitor connected to their computer. It
    is great to step through your code and watch your output window and iOS simulator
    at the same time on dual independent monitors.


    Apple hardware makes this easy. Just plug your second monitor into the port of
    any Mac, with the correct adapter of course, and you have two monitors working
    independently of one another. See Figure [3](#341013_5_En_BookFrontmatter_OnlinePDF.xhtml#Fig3).
    Note that dual monitors are not required. You will just have to organize your
    open windows to fit on your screen if you don’t.


    ![../images/341013_5_En_BookFrontmatter_Fig3_HTML.jpg](images/341013_5_En_BookFrontmatter_Fig3_HTML.jpg)


    Figure 3


    Arranging dual monitors on a Mac


    ### About the Authors and About the Technical Reviewer


    ### About the Authors


    ### About the Technical Reviewer


    # 1. Becoming a Great iOS Developer


    Now that you’re ready to become a software developer and have read the introduction
    of this book, you need to become familiar with several key concepts. Your computer
    program will do exactly what you tell it to do—no more and no less. It will follow
    the programming rules that were defined by the operating system and the Swift
    programming language. Your program doesn’t care if you are having a bad day or
    how many times you ask it to perform something. Often, what you think you’ve told
    your program to do and what it actually does are two different things.


    ### Key to Success


    If you haven’t already, take a few minutes to read the introduction of this book
    for a number of tips on how to be successful developing your own iOS apps.


    Depending on your background, working with something absolutely black and white
    may be frustrating. Many times, programming students have lamented, “That’s not
    what I wanted it to do!” As you begin to gain experience and confidence in programming,
    you’ll begin to think like a programmer. You will understand software design and
    logic, experience having your programs perform exactly as you want, and the satisfaction
    associated with this.


    ## Thinking like a Developer


    Software development involves writing a computer program and then having a computer
    execute that program. A computer program is the set of instructions that you want
    the computer to perform. Before beginning to write a computer program, it is helpful
    to list the steps that you want your program to perform in the order you want
    them accomplished. This step-by-step process is called an algorithm.


    If you want to write a computer program to toast a piece of bread, you would first
    write an algorithm. The algorithm might look something like this:


    1.  Take the bread out of the bag.

    2.  Place a slice of bread in the toaster.

    3.  Press the “toast” button.

    4.  Wait for the toast to pop up.

    5.  Remove the toast from the toaster.


    At first glance, this algorithm seems to solve the problem. However, the algorithm
    leaves out many details and makes many assumptions. Here are some examples:


    - What kind of toast does the user want? Does the user want white bread, wheat
    bread, or some other kind of bread?

    - How does the user want the bread toasted? Light or dark?

    - What does the user want on the bread after it is toasted: butter, margarine,
    honey, or strawberry jam?

    - Does this algorithm work for all users in their cultures and languages? Some
    cultures may have another word for toast or not know what toast is.


    Now, you might be thinking this is getting too detailed for making a simple toast
    program. Over the years, software development has gained a reputation of taking
    too long, costing too much, and not being what the user wants. This reputation
    came to be because computer programmers often start writing their programs before
    they have actually thought through their algorithms.


    The key ingredients to making successful applications are design requirements.
    Design requirements can be formal and detailed or simple like a list on a piece
    of paper. Design requirements are important because they help the developer flesh
    out what the application should and should not do when complete. Design requirements
    should not be completed in a programmer’s vacuum, but should be produced as the
    result of collaboration between developers, users, and customers.


    Another key ingredient to your successful app is the **user interface** (UI) design.
    Apple recommends you spend more than 50 percent of the entire development process
    focusing on the UI design. The design can be done using simple pencil and paper
    or using Xcode’s storyboard feature to lay out your screen elements. Many software
    developers start with the UI design, and after laying out all the screen elements
    and having many users look at paper mock-ups, they write the design requirements
    from their screen layouts.


    ### Note


    If you take anything away from this chapter, let it be the importance of considering
    design requirements and user interface design before starting software development.
    This is the most effective (and least expensive) use of time in the software development
    cycle. Using a pencil and eraser is a lot easier and faster than making changes
    to code because you didn’t have others look at the designs before starting to
    program.


    After you have done your best to flesh out all the design requirements, laid out
    all the user interface screens, and had the clients or potential customers look
    at your design and give you feedback, you can begin coding. Once coding begins,
    design requirements and user interface screens can change, but the changes are
    typically minor and are easily accommodated by the development process. See Figures
    [1-1](#341013_5_En_1_Chapter.xhtml#Fig1) and [1-2](#341013_5_En_1_Chapter.xhtml#Fig2).


    Figure [1-1](#341013_5_En_1_Chapter.xhtml#Fig1) shows a mock-up of a rental report
    app screen prior to development. Developing mock-up screens along with design
    requirements forces developers to think through many of the application’s usability
    issues before coding begins. This enables the application development time to
    be shortened and makes for a better user experience and better reviews on the
    App Store. Figure [1-2](#341013_5_En_1_Chapter.xhtml#Fig2) shows how the view
    for the rental report app appears when completed. Notice how mock-up tools enable
    you to model the app to the real thing.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig2_HTML.png](images/341013_5_En_1_Chapter/341013_5_En_1_Fig2_HTML.png)


    Figure 1-2.


    This is the completed iPhone rental report app. This app is called `WalkAround`.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig1_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    This is a UI mock-up of the Log In screen for an iPhone mobile rental report app
    before development begins. This UI design mock-up was completed using `InVision`.'
