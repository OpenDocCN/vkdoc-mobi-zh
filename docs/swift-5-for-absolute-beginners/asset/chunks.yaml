    现在在库的搜索栏中搜索，如图 [6-13](#341013_5_En_6_Chapter.xhtml#Fig13) 所示。接着，将该对象拖到 iPhone
    视图上，如图 [6-14](#341013_5_En_6_Chapter.xhtml#Fig14) 所示。别担心，拖动对象并不会将其从实用工具视图的对象列表中移除。拖动操作会在
    iPhone 界面上创建该对象的一个新副本。


