    \ to a Swift iOS project. With Xcode playgrounds, you can do the following:\n\n\
    *   Design or modify an algorithm, observing the results every step of the way\n\
    \n*   Create new tests, verifying that they work before promoting them into your\
    \ test suite\n\nFirst, you’ll need to learn a little more about the Xcode user\
    \ interface. When you open an Xcode iOS project, you are presented with a screen\
    \ that looks like Figure [2-1](#341013_5_En_2_Chapter.xhtml#Fig1).\n\nThe Xcode\
    \ user interface is set up to help you efficiently write your Swift applications.\
    \ The user interface helps new programmers learn the user interface for an iOS\
    \ application. You will now explore the major sections of Xcode’s IDE workspace\
    \ and playgrounds.\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1.\n\nXcode Integrated Developer Environment with a Swift project\n\
    \n### Exploring the Workspace Window\n\nThe workspace window, shown in Figure\
    \ [2-2](#341013_5_En_2_Chapter.xhtml#Fig2), enables you to open and close files,\
    \ set your application preferences, develop and edit an app, and view the text\
    \ output and error console.\n\nThe workspace window is your primary interface\
    \ for creating and managing projects. The workspace window automatically adapts\
    \ itself to the task at hand, and you can further configure the window to fit\
    \ your work style. You can open as many workspace windows as you need.\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2.\n\nXcode’s workspace window\n\nThe workspace window has four main\
    \ areas: Editor, Navigator, Debug, and Utility.\n\nWhen you select a project file,\
    \ its contents appear in the Editor area, where Xcode opens the file in the appropriate\
    \ editor.\n\nYou hide or show the other three areas by using buttons in the view\
    \ selector in the toolbar. These buttons are in the top-right corner of the window.\n\
    \n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif)\
    \ Clicking this button shows or hides the Navigator area. This is where you view\
    \ and maneuver through files and other facets of your project.\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif)\
    \ Clicking this button shows or hides the Debug area. This is where you control\
    \ program execution and debug code.\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif)\
    \ Clicking this button shows or hides the Utility area. You use the Utility area\
    \ for several purposes, most commonly to view and modify attributes of a file."
  trans: "\n# 使用 Playground 界面\n\nPlayground 提供了一种极佳的方式，让你可以在不同时学习 Xcode 和 Swift 语言全部复杂性的前提下，使用刚才讨论的各种概念。只需花上几分钟熟悉\
    \ playground 界面，你就可以开始编写程序了。\n\n从技术角度来说，playground 界面并非像你编写 iOS 应用时使用的真正 IDE（集成开发环境），但它非常接近，并且学习起来容易得多。真正的\
    \ IDE 将一个应用程序的代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动功能整合在一起；参见图 1-6。然而，playground 提供了与你开发应用时所用的\
    \ Xcode IDE 相似的外观、感觉和功能。\n\n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig6_HTML.jpg](img/341013_5_En_1_Fig6_HTML.jpg)\n\
    \n**图 1-6.** 带有 iPhone 模拟器的 Xcode IDE\n\n在下一章中，你将详细了解 playground 界面并编写你的第一个程序。\n\
    \n## 本章小结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语非常重要，因为它们将在本书中反复出现：\n\n* 计算机程序\n* 算法\n* 设计需求\n\
    * 用户界面\n* 缺陷（Bug）\n* 质量保证（QA）\n* 调试\n* 面向对象编程（OOP）\n* 对象\n* 属性\n* 方法\n* 对象的状态\n\
    * 集成开发环境（IDE）\n\n## 下一步\n\n其余章节将提供你学习 Swift 和编写 iOS 应用所需的信息。术语和概念会一遍又一遍地被引入和强化，这样你会逐渐对它们更加熟悉。坚持下去，对自己要有耐心。\n\
    \n### 练习题\n\n* 回答以下问题：\n  * 为什么花时间在用户需求上如此重要？\n  * 设计需求和算法之间有什么区别？\n  * 方法和属性之间有什么区别？\n\
    \  * 什么是缺陷（bug）？\n  * 什么是状态？\n* 编写一个算法，描述一台自动售货机从投币到出货的工作过程。假设一瓶苏打水的价格为 80 美分。\n\
    * 编写一个用于运行该自动售货机的应用的设计需求。\n\n# 编程基础\n\n本章重点介绍成为一名优秀的 Swift 程序员所必需的构建模块。本章涵盖如何使用\
    \ playground 用户界面、如何编写你的第一个 Swift 程序，以及如何使用 Xcode 集成开发环境（IDE）。\n\n> **注意：** 我们将向你介绍如何使用\
    \ playground，这将使你能够立即开始编程，而无需担心 Xcode 项目的所有复杂性。我们使用这种方法来帮助你快速学习这些概念，避免挫败感，并为你打下坚实的基础。\n\
    \n## 初识 Xcode\n\nXcode 中的 Playground 让编写 Swift 代码变得异常简单且有趣。输入一行代码，结果会立即显示。如果你的代码需要运行一段时间，比如在循环或分支中，你可以通过时间线区域观察其执行过程。当你在\
    \ playground 中完成代码后，可以轻松地将代码迁移到 Swift iOS 项目中。使用 Xcode playground，你可以：\n\n* 设计或修改算法，并实时观察每一步的结果\n\
    * 创建新的测试，在将其纳入测试套件之前验证它们是否有效\n\n首先，你需要对 Xcode 用户界面有更多了解。当你打开一个 Xcode iOS 项目时，你会看到一个类似于图\
    \ 2-1 的屏幕。\n\nXcode 用户界面的设计旨在帮助你高效地编写 Swift 应用程序。该用户界面帮助新程序员学习 iOS 应用程序的用户界面。现在，你将探索\
    \ Xcode 的 IDE 工作区和 playground 的主要部分。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg](img/341013_5_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1.** 带有 Swift 项目的 Xcode 集成开发环境\n\n### 探索工作区窗口\n\n工作区窗口，如图 2-2 所示，使你能够打开和关闭文件、设置应用程序偏好设置、开发和编辑应用，以及查看文本输出和错误控制台。\n\
    \n工作区窗口是你创建和管理项目的主要界面。该窗口会自动适应当前的任务，你还可以进一步配置窗口以符合你的工作风格。你可以根据需要打开任意数量的工作区窗口。\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg](img/341013_5_En_2_Fig2_HTML.jpg)\n\
    \n**图 2-2.** Xcode 的工作区窗口\n\n工作区窗口有四个主要区域：**编辑器**、**导航器**、**调试**和**工具**。\n\n当你选择一个项目文件时，其内容会显示在**编辑器**区域，Xcode\
    \ 会在适当的编辑器中打开该文件。\n\n你可以通过工具栏中视图选择器的按钮来隐藏或显示其他三个区域。这些按钮位于窗口的右上角。\n\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif](img/341013_5_En_2_Figa_HTML.gif)\
    \ 点击此按钮可显示或隐藏**导航器**区域。在这里，你可以查看和浏览文件以及项目的其他方面。\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif](img/341013_5_En_2_Figb_HTML.gif)\
    \ 点击此按钮可显示或隐藏**调试**区域。在这里，你可以控制程序执行并调试代码。\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif](img/341013_5_En_2_Figc_HTML.gif)\
    \ 点击此按钮可显示或隐藏**工具**区域。你使用**工具**区域有多种用途，最常见的是查看和修改文件的属性。\n"
- fmt: "### Navigating Your Workspace\n\nYou can access files, symbols, unit tests,\
    \ diagnostics, and other features of your project from the Navigator area. In\
    \ the navigator selector bar, you choose the navigator suited to your task. The\
    \ content area of each navigator gives you access to relevant portions of your\
    \ project, and each navigator’s filter bar allows you to restrict the content\
    \ that is displayed.\n\nChoose from these options in the navigator selector bar:\n\
    \n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figd_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figd_HTML.gif)\
    \ *Project navigator*: Add, delete, group, and otherwise manage files in your\
    \ project; or choose a file to view or edit its contents in the editor area.\n\
    *   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fige_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Fige_HTML.gif)\
    \ *Source Control navigator*: View the detailed history of changes you have made\
    \ to your project files when using a Version Control System (VCS) like Git.\n\
    *   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figf_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figf_HTML.gif)\
    \ *Symbol navigator*: Browse the class hierarchy in your project.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figg_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figg_HTML.gif)\
    \ *Find navigator*: Use search options and filters to quickly find text within\
    \ your project.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figh_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figh_HTML.gif)\
    \ *Issue navigator*: View issues such as diagnostics, warnings, and errors found\
    \ when opening, analyzing, and building your project.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figi_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figi_HTML.gif)\
    \ *Test navigator*: Create, manage, run, and review unit tests.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figj_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figj_HTML.gif)\
    \ *Debug navigator*: Examine the running threads and associated stack information\
    \ at a specified point of time during program execution.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figk_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figk_HTML.gif)\
    \ *Breakpoint navigator*: Fine-tune breakpoints by specifying characteristics\
    \ such as triggering conditions and see all your project’s breakpoints in one\
    \ place.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figl_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figl_HTML.gif)\
    \ *Report navigator*: View the history of your builds.\n\n### Editing Your Project\
    \ Files\n\nMost development work in Xcode occurs in the Editor area, which is\
    \ the main area that is always visible within the workspace window. The editors\
    \ you will use most often are as follows:\n\n*   *Source editor*: Write and edit\
    \ Swift source code.\n*   *Interface builder*: Graphically create and edit user\
    \ interface files (see Figure [2-3](#341013_5_En_2_Chapter.xhtml#Fig3)).\n*  \
    \ *Project editor*: View and edit how your apps should be built, such as by specifying\
    \ build options, target architectures, and app entitlements.\n\nWhen you select\
    \ a file, Xcode opens the file in an appropriate editor. In Figure [2-3](#341013_5_En_2_Chapter.xhtml#Fig3),\
    \ the file `Main.storyboard` is selected in the Project navigator, and the file\
    \ is open in Interface Builder.\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig3_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. Xcode’s Interface Builder showing a storyboard file\n\nThe editor\
    \ offers three controls:\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figm_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figm_HTML.gif)\
    \ Clicking this button opens the Standard editor. You will see a single editor\
    \ pane with the contents of the selected file.\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fign_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Fign_HTML.gif)\
    \ Clicking this button opens the Assistant editor. You will see a separate editor\
    \ pane with content logically related to that in the Standard editor pane.\n*\
    \   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figo_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figo_HTML.gif)\
    \ Clicking this button opens the Version editor. You will see the differences\
    \ between the selected file in one pane and another version of that same file\
    \ in a second pane. Used when working with source control.\n\n## Creating Your\
    \ First Swift Playground Program\n\nNow that you have learned a little about Xcode,\
    \ it’s time to write your first Swift playground program and begin to understand\
    \ the Swift language, Xcode, and some syntax. First, you have to install Xcode.\n\
    \n### Installing and Launching Xcode 10.2\n\nXcode 10.2 is available for download\
    \ from the Mac App Store for free, as shown in Figure [2-4](#341013_5_En_2_Chapter.xhtml#Fig4).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig4_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4. Xcode 10.2 is available for download from the Mac App Store for\
    \ free\n\n### Note\n\nThis package has everything you need to write iOS, watchOS,\
    \ tvOS, and macOS apps. To publish apps on the iOS or macOS App Stores, you will\
    \ need to apply for the Apple Developer Program and pay $99 when you’re ready\
    \ to submit. Figure [2-5](#341013_5_En_2_Chapter.xhtml#Fig5) shows the Apple Developer\
    \ Program web site at [`https://developer.apple.com/`](https://developer.apple.com/).\n\
    \nNow that you have installed Xcode, let’s begin writing a Swift playground.\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig5_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5. The Apple Developer Program\n\nNow that you have installed  \n\n\
    Launch Xcode and click “Get started with a playground,” as shown in Figure [2-6](#341013_5_En_2_Chapter.xhtml#Fig6).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig6_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6. Creating your first Swift playground\n\n### Using Xcode 10.2\n\n\
    After a new Xcode window opens, follow these steps:\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig7_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7. Choosing a Blank iOS playground template\n\n1.  Select a Blank iOS\
    \ template and click Next, as shown in Figure [2-7](#341013_5_En_2_Chapter.xhtml#Fig7).\n\
    2.  Name the playground `HelloWorld` and create it in a folder of your choice,\
    \ like Documents or the Desktop.\n\nXcode does a lot of work for you and creates\
    \ a playground file with code ready for you to use. It also opens your playground\
    \ file in your Xcode editor so you can start, as shown in Figure [2-8](#341013_5_En_2_Chapter.xhtml#Fig8).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig8_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8. The playground window\n\nYou now need to become familiar with the\
    \ Xcode playground IDE. Let’s look at two of the most often used features:\n\n\
    *   The Editor area\n*   The Results area\n\n## Xcode Playground IDE: Editor and\
    \ Results Areas\n\nThe Editor area is the business end of the Xcode playground\
    \ IDE—where your dreams are turned into reality. It is where you write your code.\
    \ As you write your code, you will notice it changes color. Sometimes, Xcode will\
    \ even try to autocomplete words for you. The colors have meanings that will become\
    \ apparent as you use the IDE. The Editor area is also where you will debug your\
    \ code."
