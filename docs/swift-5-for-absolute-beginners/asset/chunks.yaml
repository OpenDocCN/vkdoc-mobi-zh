    \ into this book.\n\n### For the More Experienced\n\nMany developers who programmed\
    \ years ago or programmed in a non-OOP language need a background in OOP and Logic\
    \ before they dive into Swift. This book is for you. We gently walk you through\
    \ OOP and how it is used in iOS development to help make you a successful iOS\
    \ developer.\n\n### How This Book Is Organized\n\nYou’ll notice that we are all\
    \ about successes in this book. We introduce the OOP and Logic concepts in Swift\
    \ Playgrounds and then move those concepts to Xcode. Many students are visual\
    \ or learn by doing. We use both techniques. We’ll walk you through topics and\
    \ concepts with visual examples and then take you through step-by-step examples\
    \ reinforcing the concepts.\n\nWe often repeat topics in different chapters to\
    \ reinforce what you have learned and apply these skills in new ways. This enables\
    \ new programmers to reapply development skills and feel a sense of accomplishment\
    \ as they progress. Don’t worry if you feel you haven’t mastered a topic. Keep\
    \ moving forward!\n\n### The Formula for Success\n\nLearning to program is an\
    \ interactive process between your program and you. Just like learning to play\
    \ an instrument, you have to practice. You must work through the examples and\
    \ exercises in this book. Understanding a concept doesn’t mean you know how to\
    \ apply it and use it.\n\nYou will learn a lot from this book. You will learn\
    \ a lot from working through the exercises in this book. However, you will really\
    \ learn when you debug your programs. Spending time walking through your code\
    \ and trying to find out why it is not working the way you want is an unparalleled\
    \ learning process. The downside of debugging is a new developer can find it especially\
    \ frustrating. If you have never wanted to throw your computer out the window,\
    \ you will. You will question why you are doing this, and whether you are smart\
    \ enough to solve the problem. Programming is very humbling, even for the most\
    \ experienced developer.\n\nLike a musician, the more you practice the better\
    \ you get. By practicing, we mean programming! You can do some amazing things\
    \ as a programmer. The world is your oyster. Seeing your app in the App Store\
    \ is one of the most satisfying accomplishments. However, there is a price, and\
    \ that price is time spent coding and learning.\n\nHaving taught many students\
    \ to become iOS developers, we have put together a formula for what makes students\
    \ successful. Here is our formula for success:\n\n*   Believe you can do it. You’ll\
    \ be the only one who says you can’t do this. So don’t tell yourself that.\n*\
    \   Work through all the examples and exercises in this book.\n*   Code, code,\
    \ and keep coding. The more you code, the better you’ll get.\n*   Be patient with\
    \ yourself. If you were fortunate enough to have been a 4.0 student who can memorize\
    \ material just by reading it, this will not happen with Swift coding. You are\
    \ going to have to spend time coding.\n*   You learn by reading this book. You\
    \ really learn by debugging your code.\n*   Don’t give up!\n\n### The Development\
    \ Technology Stack\n\nWe will walk you through the process of understanding the\
