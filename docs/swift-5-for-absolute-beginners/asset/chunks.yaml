    \ First Swift Playground Program\n\nNow that you have learned a little about Xcode,\
    \ it’s time to write your first Swift playground program and begin to understand\
    \ the Swift language, Xcode, and some syntax. First, you have to install Xcode.\n\
    \n### Installing and Launching Xcode 10.2\n\nXcode 10.2 is available for download\
    \ from the Mac App Store for free, as shown in Figure [2-4](#341013_5_En_2_Chapter.xhtml#Fig4).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig4_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4.\n\nXcode 10.2 is available for download from the Mac App Store for\
    \ free\n\n### Note\n\nThis package has everything you need to write iOS, watchOS,\
    \ tvOS, and macOS apps. To publish apps on the iOS or macOS App Stores, you will\
    \ need to apply for the Apple Developer Program and pay $99 when you’re ready\
    \ to submit. Figure [2-5](#341013_5_En_2_Chapter.xhtml#Fig5) shows the Apple Developer\
    \ Program web site at [`https://developer.apple.com/`](https://developer.apple.com/)\
    \ .\n\nNow that you have installed Xcode, let’s begin writing a Swift playground.\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig5_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5.\n\nThe Apple Developer Program\n\nNow that you have installed\n\n\
    Launch Xcode and click “Get started with a playground,” as shown in Figure [2-6](#341013_5_En_2_Chapter.xhtml#Fig6).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig6_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6.\n\nCreating your first Swift playground\n\n### Using Xcode 10.2\n\
    \nAfter a new Xcode window opens, follow these steps:\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig7_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7.\n\nChoosing a Blank iOS playground template\n\n1.  Select a Blank\
    \ iOS template and click Next, as shown in Figure [2-7](#341013_5_En_2_Chapter.xhtml#Fig7).\n\
    \n2.  Name the playground **HelloWorld** and create it in a folder of your choice,\
    \ like Documents or the Desktop.\n\nXcode does a lot of work for you and creates\
    \ a playground file with code ready for you to use. It also opens your playground\
    \ file in your Xcode editor so you can start, as shown in Figure [2-8](#341013_5_En_2_Chapter.xhtml#Fig8).\n\
    \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig8_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig8_HTML.jpg)\n\
    \nFigure 2-8.\n\nThe playground window\n\nYou now need to become familiar with\
    \ the Xcode playground IDE. Let’s look at two of the most often used features:\n\
    \n*   The Editor area\n\n*   The Results area\n\n## Xcode Playground IDE: Editor\
    \ and Results Areas\n\nThe Editor area is the business end of the Xcode playground\
    \ IDE—where your dreams are turned into reality. It is where you write your code.\
    \ As you write your code, you will notice it changes color. Sometimes, Xcode will\
    \ even try to autocomplete words for you. The colors have meanings that will become\
    \ apparent as you use the IDE. The Editor area is also where you will debug your\
    \ code."
  trans: "\n### 导航您的工作区\n\n您可以从导航器区域访问项目中的文件、符号、单元测试、诊断信息及其他功能。在导航器选择栏中，您可以选择适合当前任务的导航器。每个导航器的内容区域让您能访问项目的相关部分，而各导航器的过滤栏则允许您限制显示的内容。\n\
    \n在导航器选择栏中，您可以选择以下选项：\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figd_HTML.gif](img/341013_5_En_2_Figd_HTML.gif)\
