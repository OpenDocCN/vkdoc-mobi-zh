    \ Materials, and Equipment\n\nOne of the great things about developing iOS apps\
    \ is just about everything is free to develop your app.\n\n*   Xcode\n*   Swift\n\
    *   macOS 10.14 or higher\n*   iOS SDK\n*   iOS Simulator\n\nAll you need to get\
    \ started is a Mac and knowledge of where to download everything. We will cover\
    \ this.\n\n### Operating System and IDE\n\nFor developing iOS apps, you have to\
    \ use Xcode on a Mac. You can download Xcode for free from the Mac App Store (see\
