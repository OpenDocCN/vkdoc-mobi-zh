    ## Summary


    You’ve reached the end of this chapter! Here is a summary of the topics covered:


    - *Understanding collection classes*: Collection classes are a powerful set of
    classes that come with Foundation and allow you to store and retrieve information
    efficiently.

    - *Using properties*: Properties are variables that are accessible once the class
    has been instantiated.

    - *Looping with `for...in`*: This feature offers a new way to iterate through
    an enumerated list of items.

    - *Building a Master-Detail application*: You used Xcode and the Master-Detail
    Application template to build a simple bookstore program to display books and
    the details of an individual book.

    - *Creating a simple data model*: Using the collection classes you learned about,
    you used an array to construct a `BookStore` object and used it as a data source
    in the BookStore app.

    - *Connecting data to the view*: You connected the `Book` object’s data to the
    interface fields using Xcode.


    ### Exercises


    - Add more books to the bookstore using the original program as a guide.

    - On the Master Scene, remove the Edit button as we will not be using it in this
    app.

    - Enhance the `Book` class so it can store another attribute—a price or genre,
    for example.

    - Modify the `DetailViewController` so that the new fields are displayed. Remember
    to connect an interface control to a property.

    - Change the `BookStore` object so that a separate method is called to initialize
    the list of `Book` objects (instead of putting it all in the `init` method).

    - There is another attribute to a `UITableViewCell` called the `detailTextLabel`.
    Try to make use of it by setting its `text` property to something.

    - Using Xcode to modify the interface, play with changing the background color
    of the `DetailViewController` in the storyboard file.


    For a tougher challenge:

    - Sort the books in the `BookStore` object so they appear in ascending order on
    the `MasterDetailView`.


    # 9. Comparing Data


    In this chapter, we will discuss one of the most basic and frequent operations
    you will perform as you program: comparing data. In the bookstore example, you
    may need to compare book titles if your clients are looking for a specific book.
    You may also need to compare authors if your clients are interested in purchasing
    books by a specific author. Comparing data is a common task performed by developers.
    Many of the loops you learned about in Chapter [8](#341013_5_En_8_Chapter.xhtml)
    will require you to compare data so that you know when your code should stop looping.


    Comparing data in programming is like using a scale. You have one value on one
    side and another value on the other side. In the middle, you have an operator.
    The operator determines what kind of comparison is being done. Examples of operators
    are “greater than,” “less than,” or “equal to.”


    The values on either side of the scale are usually variables. You learned about
    the different types of variables in Chapter [3](#341013_5_En_3_Chapter.xhtml).
    In general, the comparison functions for different variables will be slightly
    different. It is imperative that you become familiar with the functions and syntax
    to compare data because this will form the basis of your development.


    For the purposes of this chapter, we will use an example of a bookstore application.
    This application will allow users to log in to the application, search for books,
    and purchase them. We will cover the different ways of comparing data to show
    how they would be used in this type of application.


    ## Revisiting Boolean Logic


    In Chapter [4](#341013_5_En_4_Chapter.xhtml), we introduced Boolean logic. Because
    of its prevalence in programming, we will revisit this subject in this chapter
    and go into more detail.


    The most common comparisons that you will program your application to perform
    are comparisons using Boolean logic. Boolean logic usually comes in the form of
    *if/then* statements. Boolean logic can have only one of two answers: *yes* or
    *no*. The following are some good examples of Boolean questions that you will
    use in your applications:


    - Is 5 larger than 3?

    - Does *now* have more than five letters?

    - Is 6/1/2010 later than today?


    Notice that there are only two possible answers to these questions: *yes* and
    *no*. If you are asking a question that could have more than these two answers,
    that question will need to be worded differently for programming.


    Each of these questions will be represented by an *if/then* statement. (For example,
    “If 5 is greater than 3, then print a message to the user.”) Each *if* statement
    is required to have some sort of relational operator. A relational operator can
    be something like “is greater than” or “is equal to.”


    To start using these types of questions in your programs, you will first need
    to become familiar with the different relational operators available to you in
    the Swift language. We will cover them first. After that, you will learn how different
    variables can behave with these operators.'
