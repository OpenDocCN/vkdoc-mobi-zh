- fmt: "# Using Relational Operators\n\nSwift uses six standard comparison operators.\
    \ These are the standard algebraic operators with only one real change: In the\
    \ Swift language, as in most other programming languages, the “equal to” operator\
    \ is made by two equals signs (`==`). Table [9-1](#341013_5_En_9_Chapter.xhtml#Tab1)\
    \ describes the operators available to you as a developer.\n\n**Table 9-1.** Comparison\
    \ Operators\n\n| Operator | Description |\n| --- | --- |\n| `>` | Greater than\
    \ |\n| `<` | Less than |\n| `>=` | Greater than or equal to |\n| `<=` | Less than\
    \ or equal to |\n| `==` | Equal to |\n| `!=` | Not equal to |\n\n### Note\n\n\
    A single equals sign (`=`) is used to assign a value to a variable. Two equals\
    \ signs (`==`) are needed to compare two values. For example, `if(x=9)` will try\
    \ to assign the value of 9 to the variable `x`, but now Xcode throws an error\
    \ in this case. `if(x==9)` will do a comparison to see whether `x` equals 9.\n\
    \n## Comparing Numbers\n\nOne of the difficulties developers have is dealing with\
    \ different data types in comparisons. Earlier in this book, we discussed the\
    \ different types of variables. You may remember that 1 is an integer. If you\
    \ wanted to compare an integer with a float such as 1.2, this will cause some\
    \ issues. This is where type casting becomes handy.\n\n### Note\n\nType casting\
    \ is the conversion of an object or variable from one type to another.\n\nIn the\
    \ bookstore application, you will need to compare numbers in many ways. For example,\
    \ let’s say the bookstore offers a discount for people who spend more than $30\
    \ in a single transaction. You will need to add the total amount the person is\
    \ spending and then compare this to $30. If the amount spent is larger than $30,\
    \ you will need to calculate the discount. See the following example:\n\n```\n\
    var discountThreshold = 30\nvar discountPercent = 0\nvar totalSpent = calculateTotalSpent()\n\
    if totalSpent > discountThreshold {\ndiscountPercent = 10\n}\n```\n\nLet’s walk\
    \ through the code. First, you declare the variables (`discountThreshhold`, `discountPercent`,\
    \ and `totalSpent`) and assign a value to them. Notice you do not need to specify\
    \ the type of number for the variables. The type will be assigned when you assign\
    \ it a value. You know that `discountThreshold` and `discountPercent` will not\
    \ contain decimals, so the compiler will type them as `Int`s. In this example,\
    \ you can assume you have a function called `calculateTotalSpent`, which will\
    \ calculate the total spent in this current order and return the value as an `Int`.\
    \ You then simply check to see whether the total spent is larger than the discount\
    \ threshold; if it is, you set the discount percent. If we wanted a customer who\
    \ spent exactly $30 to get the same discount, we could use `>=` instead of `>`.\n\
    \nAnother action that requires the comparison of numbers is looping. As discussed\
    \ in Chapter [4](#341013_5_En_4_Chapter.xhtml), looping is a core action in development,\
    \ and many loop types require some sort of comparison to determine when to stop.\
    \ Let’s take a look at a `for` loop:\n\n```\nvar numberOfBooks: Int = 50\nfor\
    \ y in 0..<numberOfBooks {\ndoSomething()\n}\n```\n\nIn this example, you iterate,\
    \ or *loop*, through the total number of books in the bookstore. The `for` statement\
    \ is where the interesting stuff starts to happen. Let’s break it down.\n\nThe\
    \ `for` loop declares a variable with an initial value of 0 and will increment\
    \ it while it is less than `numberOfBooks`. This is a much quicker way of doing\
    \ `for` loops than was required in Objective-C.\n\n## Creating an Example Xcode\
    \ App\n\nNow let’s create an Xcode application so you can start comparing numeric\
    \ data.\n\n1. Launch Xcode and select **File** ➤ **New** ➤ **Playground** to create\
    \ a new playground. This chapter will use a playground to make it easier to play\
    \ around with comparisons.\n\n2. Select **Blank** as shown in Figure [9-1](#341013_5_En_9_Chapter.xhtml#Fig1).\
    \ Click **Next**.\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg)\n\
    \n   **Figure 9-1.** Creating a new playground\n\n3. On the next page, enter the\
    \ name of your playground. Here we used **Comparison** as the name, but you can\
    \ choose any name you like.\n\n   **Note:** Xcode Playgrounds, by default, are\
    \ saved in the `Documents` folder in your user home.\n\n4. Once the new playground\
    \ is created, you will see the standard Xcode window.\n\n5. Add the following\
    \ line after the default code in the playground:\n\n   ```\n   print(\"Hello World\"\
    )\n   ```\n\n   This line creates a new `String` with the contents `Hello World`\
    \ and passes it to the `print` function that is used for debugging.\n\nXcode will\
    \ automatically run the new line you added and show the result on the right-hand\
    \ side as seen in Figure [9-2](#341013_5_En_9_Chapter.xhtml#Fig2).\n\n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2.** Playground output\n\n6. Go to the beginning of the line that\
    \ begins with `print`. This is the line that is responsible for printing the `Hello\
    \ World` string. You are going to comment out this line by placing two forward\
    \ slashes (`//`) in front of the line of code. Commenting out code tells Xcode\
    \ to ignore it when it executes the code. In other words, code that is commented\
    \ out will not run.\n\n7. Once you comment out the line of code, the code will\
    \ no longer be run so Hello World will no longer show in the playground as seen\
    \ in Figure [9-3](#341013_5_En_9_Chapter.xhtml#Fig3).\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg)\n\
    \n   **Figure 9-3.** Playground output with commented out code\n\n8. We want to\
    \ use the log to output the results of comparisons. Add one line, as shown here:\n\
    \n   ```\n   print(\"The result is \\(6 > 5 ? \"True\" : \"False\")\")\n   ```\n\
    \n### Note\n\nThe previous code, `(6>5 ? \"True\" : \"False\")`, is called a *ternary*\
    \ operation. It is essentially just a simplified way of writing an `if/else` statement.\n\
    \n9. Place this line in your code. This line is telling your application to print\
    \ `The result is`. Then it will print `True` if 6 is greater than 5, or it will\
    \ print `False` if 5 is greater than 6. See Figure [9-4](#341013_5_En_9_Chapter.xhtml#Fig4).\n\
    \nBecause 6 is greater than 5, it will print “The result is `True`.”\n\n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4.** Ternary output\n\nYou can change this line to test any comparisons\
    \ we have already discussed in this chapter or any of the examples you will do\
    \ later.\n\nLet’s try another example.\n\n```\nvar i = 5\nvar y = 6\nprint(\"\
    The result is \\(y > i ? \"True\" : \"False\")\")\n```\n\nIn this example, you\
    \ create a variable and assign its value to 5. You then create another variable\
    \ and assign the value to 6. You then change the `print` example to compare the\
    \ variables `i` and `y` instead of using actual numbers.\n\n### Note\n\nYou may\
    \ get compiler warnings when using this code in an actual Xcode project. The compiler\
    \ will tell you that the false portion of the ternary operator will never be executed.\
    \ The compiler can look at the values while you are typing the code and know that\
    \ the comparison will always be true.\n\nYou will now explore other kinds of comparisons,\
    \ and then you will come back to the application and test some of them.\n\n##\
    \ Using Boolean Expressions\n\nA Boolean expression is the easiest of all comparisons.\
    \ Boolean expressions are used to determine whether a value is true or false.\
    \ Here’s an example:\n\n```\nvar j = 5\nif  j > 0 {\nsomeCode()\n}\n```\n\nThe\
    \ `if` statement will always evaluate to `true` because the variable `j` is greater\
    \ than zero. Because of that, the program will run the `someCode()` method."
