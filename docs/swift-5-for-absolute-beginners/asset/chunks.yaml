    ### 注意


    WatchKit 提供了 iOS 应用中不可用的额外交互类型。Glance 能让用户快速预览你的应用。例如，一个书店应用可以在 Glance 中显示畅销书排行榜。Glance
    使用手表上的特殊界面。Complication 则允许你的应用在表盘本身上提供简洁信息。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig2_HTML.jpg](img/341013_5_En_15_Fig2_HTML.jpg)


    图 15-2. watchOS 应用选项


    随后 Xcode 会提示你保存项目。保存后，你将看到新建的项目。在左侧，你会注意到项目中多了两个目标。一个是 BookStore WatchKit App，它包含应用的界面（故事板和资源）。第二个新目标是
    BookStore WatchKit Extension，它将包含应用在 watchOS 上运行所需的所有代码。参见图 15-3。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig3_HTML.jpg](img/341013_5_En_15_Fig3_HTML.jpg)


    图 15-3. 新的 watchOS 目标


    点击 BookStore WatchKit App 目标中的 `Interface.storyboard`，你应该会看到一个类似于图 15-4 的界面。这就是你空白的
    watchOS 应用故事板。你会注意到其尺寸比标准的 iOS 故事板明显小很多。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig4_HTML.jpg](img/341013_5_En_15_Fig4_HTML.jpg)


    图 15-4. 界面故事板


    因为你要为 watchOS 应用创建一个书籍列表，所以需要在故事板中添加一个表格。在右下角搜索“table”，然后将表格拖拽到“Interface Controller
    Scene”中，如图 15-5 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig5_HTML.jpg](img/341013_5_En_15_Fig5_HTML.jpg)


    图 15-5. 添加一个表格


    Xcode 现在会为你提供 Table Row 作为表格的一部分。这类似于你在 iOS 应用中创建表格视图时使用的原型行。你需要创建一个类来控制它，但目前，你只需添加一个标签。在对象库中搜索“label”，然后将一个标签拖拽到该行上。参见图
    15-6。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig6_HTML.jpg](img/341013_5_En_15_Fig6_HTML.jpg)


    图 15-6. 向表格行添加标签


    默认情况下，标签会位于 Table Row 的左上角。检查属性检查器，确保高度和宽度可以根据内容自动调整大小（参见图 15-7）。这将有助于确保你的应用能在多种尺寸的
    Apple Watch 上良好运行。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig7_HTML.jpg](img/341013_5_En_15_Fig7_HTML.jpg)


    图 15-7. 让标签自适应大小


    现在，标签会扩展以填满整行。但默认情况下，标签只显示一行文本。由于你要添加书名，可能需要多行才能容纳所有文本。选中标签后，在右侧的属性检查器中找到 `Lines`
    属性并将其设置为 0，如图 15-8 所示。将行数设置为 0 告诉 Xcode，它可以使用任意多的行数。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig8_HTML.jpg](img/341013_5_En_15_Fig8_HTML.jpg)


