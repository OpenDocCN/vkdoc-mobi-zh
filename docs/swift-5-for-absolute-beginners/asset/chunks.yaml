    ### 比较日期


    在任何编程语言中，日期都是一种相当复杂的变量类型，而不幸的是，根据你编写的应用程序类型，它们又很常见。Swift 4 拥有自己的原生 `Date` 类型。Swift
    的 `Date` 类提供了许多便捷的方法，使得比较日期变得简单。我们将重点介绍 `compare` 函数。`compare` 函数返回一个 `ComparisonResult`，它有三个可能的值：`orderedSame`、`orderedDescending`
    和 `orderedAscending`。


    ```

    // 今天的日期

    let today: Date = Date()

    // 促销日期 = 明天

    let timeToAdd: TimeInterval = 60∗60∗24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    var saleStarted = false

    let result: ComparisonResult  = today.compare(saleDate)

    switch result {

    case ComparisonResult.orderedAscending:

    // 促销日期在未来

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // 促销开始日期已过去，所以促销正在进行

    saleStarted = true

    default:

    // 促销开始日期就是现在

    saleStarted = true

    }

    ```


    仅仅为了比较一些日期，这看起来可能做了很多工作。让我们逐行分析代码，看看是否能理解它的含义。


    ```

    let today: Date = Date()

    let timeToAdd: TimeInterval = 60∗60∗24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    ```


    在这里，你声明了两个不同的 `Date` 对象。第一个名为 `today`，使用系统日期或你的设备日期进行初始化。在创建第二个日期之前，你需要为第一个日期添加一些时间。通过创建一个
    `TimeInterval` 来实现这一点。这是一个以秒为单位的数值。要增加一天，你需要添加 `60*60*24`。第二个日期名为 `saleDate`，使用未来的某个日期进行初始化。你将使用这个日期来判断促销是否已经开始。我们不会详细讨论
    `Date` 对象的初始化。


    使用 `Date` 对象的 `compare` 函数的结果是一个 `ComparisonResult`。你需要声明一个 `ComparisonResult`
    来捕获 `compare` 函数的输出。


    ```

    let result = today.compare(saleDate)

    ```


    这一行简单地将两个日期进行比较，并将结果 `ComparisonResult` 放入名为 `result` 的常量中。


    ```

    switch result {

    case ComparisonResult.orderedAscending:

    // 促销日期在未来

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // 促销开始日期已过去，所以促销正在进行

    saleStarted = true

    default:

    // 促销开始日期就是现在

    saleStarted = true

    }

    ```


    现在你需要查明变量 `result` 中的值是什么。为此，你执行一条 `switch` 语句，将结果与 `ComparisonResult` 的三种不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。你将变量
    `saleStarted` 设置为 `false`。下一行判断促销日期是否小于今天。如果是，则促销已开始，你将 `saleStarted` 变量设置为 `true`。下一行是
    `default`。这捕获了所有其他选项。不过，你知道唯一的其他选项是 `orderedSame`。这意味着两个日期和时间相同，因此促销刚刚开始。


    还有其他方法可以用于比较 `Date` 对象。每种方法在特定任务中效率更高。我们选择了 `compare` 方法，因为它能满足你大多数基本的日期比较需求。


    ### 注意


    请记住，`Date` 既包含日期也包含时间。这会影响你的日期比较，因为它比较的不仅是日期，还有时间。


    ### 组合比较


    如同第 4 章所讨论的，有时你需要比单一比较更复杂的条件。这时逻辑运算符就派上了用场。逻辑运算符允许你检查多个条件。例如，如果你为既是读书俱乐部会员*且*消费超过
    30 美元的人提供特别折扣，你可以编写一条语句来检查。


    ```

    var totalSpent = 31

    var discountThreshhold = 30

    var discountPercent = 0

    var clubMember = true

    if totalSpent > discountThreshhold && clubMember {

    discountPercent = 15

    }

    ```


    我们组合了前面展示的两个示例。新的比较行解读如下：“如果 `totalSpent` 大于 `discountThreshold` **且** `clubMember`
    为 `true`，则将 `discountPercent` 设置为 15。”要使此条件返回 `true`，两个条件都必须为真。你可以使用 `||` 替代 `&&`
    来表示“或”。你可以将上一行代码改为：


    ```

    if totalSpent > discountThreshhold || clubMember  {

    discountPercent = 15

    }

    ```


    现在这一行解读如下：“如果 `totalSpent` 大于 `discountThreshold` ***或*** `clubMember` 为 `true`，则将折扣百分比设置为
    15。”如果任一选项为 `true`，此条件将返回 `true`。


    你可以继续使用逻辑运算符，根据需要组合任意多个比较。在某些情况下，你可能需要使用括号对比较进行分组。


    ## 总结


    本章到此结束！以下是涵盖主题的总结：


    *   *比较*：比较数据是任何应用程序中不可或缺的一部分。

    *   *关系运算符*：你了解了六种标准关系运算符及其用法。

    *   *数字*：数字是最容易比较的信息类型。你学习了如何在程序中比较数字。

    *   *示例*：你创建了一个示例 playground，可以在其中测试你的比较并确保逻辑正确。然后你学习了如何修改 playground 以添加不同类型的比较。

    *   *布尔值*：你学习了如何检查布尔值。

    *   *字符串*：你了解了字符串与之前测试的其他信息类型的行为有何不同。

    *   *日期*：你了解到比较日期可能相当困难，并且必须小心以确保得到你所期望的结果。


    ### 练习


    *   修改示例 playground，比较一些字符串信息。

    *   编写一个 Swift 应用程序，判断以下年份是否为闰年：1800、1801、1899、1900、2000、2001、2003 和 2010。输出应按照以下格式写入控制台：`公元
    2000 年是闰年` 或 `公元 2001 年不是闰年`。判断年份是否为闰年的信息，请参见 [`http://en.wikipedia.org/wiki/Leap_year`](http://en.wikipedia.org/wiki/Leap_year)。


    # 创建用户界面


    Interface Builder 使 iOS 开发者能够使用强大的图形用户界面轻松创建其用户界面。它允许通过简单地将对象从 Interface Builder
    的库中拖拽到编辑器来构建用户界面。


    Interface Builder 将你的用户界面设计存储在一个或多个资源文件中，这些文件称为故事板。这些资源文件包含界面对象、它们的属性以及它们之间的关系。


    要构建用户界面，只需将对象从 Interface Builder 的对象库面板拖拽到你的视图或场景上。动作（Actions）和出口（Outlets）是 Interface
    Builder 的两个关键组件，有助于简化开发流程。


    你的对象会在视图中触发动作，而这些动作连接到应用代码中的方法。出口在你的 `.swift` 文件中声明，并作为属性连接到特定的控件。见图 10-1。


    ### 注意


    Interface Builder 曾经是一个独立的应用程序，开发者用来设计他们的用户界面。从 Xcode 4.0 开始，Interface Builder
    已集成到 Xcode 中。


    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig1_HTML.jpg](img/341013_5_En_10_Fig1_HTML.jpg)


    图 10-1. Interface Builder

