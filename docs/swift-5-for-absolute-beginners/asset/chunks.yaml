    ### 注意


    在 Swift 中，除非特别声明，否则没有超类。在本章的示例中，我们使用了 `NSObject` 作为超类。


    例如，你可以创建一个“印刷品”类，并为书籍、杂志和报纸创建子类。印刷品可能有许多共同之处，因此你可以在印刷品超类中定义属性，而不必在每个单独的类中重复定义这些属性。这样做可以进一步减少需要编写和调试的冗余代码量。


    在图 5-16 中，你将看到 `Printed Material` 超类的属性布局，以及它将如何影响 `Book`、`Magazine` 和 `Newspaper`
    这些子类。`Printed Material` 类的属性将被子类继承，因此无需在子类中显式定义它们。你会注意到 `Book` 类的属性显着减少了。通过使用超类，你将大幅减少程序中的冗余代码。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig16_HTML.jpg](img/341013_5_En_5_Fig16_HTML.jpg)


    图 5-16. 超类和子类的属性


    ## 为什么要使用 OOP？


    在本章中，我们讨论了什么是 OOP，甚至讨论了如何创建类和对象。然而，讨论为什么要在开发中使用 OOP 原则也同样重要。


    如果你看看当今流行的编程语言，你会发现它们都在一定程度上使用了 OOP 原则。Swift、Objective-C、C++、Visual Basic、C# 和
    Java 都要求程序员理解类和对象，才能成功使用这些语言进行开发。为了成为当今世界的一名开发者，你需要理解 OOP。但为什么要使用它呢？


    ### OOP 无处不在


    今天你选择的几乎任何开发工作，都需要你理解面向对象的原则。在 macOS 和 iOS 中，你与之交互的每样东西都是一个对象。例如，简单的窗口、按钮和文本框都是对象，并且拥有属性和方法。如果你想成为一名成功的程序员，你需要理解
    OOP。


    ### 消除冗余代码


    通过使用对象，你可以减少必须重新输入的代码量。如果你编写了在客户结账时打印收据的代码，当需要重新打印收据时，你希望同样的代码也能直接使用。如果你将打印收据的代码放在了
    `Sale` 类中，就不必再次重写这段代码了。这不仅节省了时间，还常常能帮助你消除错误。如果你不使用 OOP，并且发票有变动（哪怕是像图形更改这样简单的事情），你也必须确保在桌面应用和移动应用中同时进行更改。如果你遗漏了其中一个，就有可能导致两个界面的行为不一致。


    ### 易于调试


    通过将所有与图书相关的代码放在一个类中，当图书出现问题时，你就知道该去哪里查找。这对于小型应用来说可能不算什么大事，但当你的应用代码量达到几十万甚至上百万行时，这会为你节省大量时间。


    ### 易于替换


    如果你将所有代码都放在一个类中，那么随着应用中事物的变化，你可以替换掉某些类，并赋予新类完全不同的功能。然而，修改后的类仍然可以像原先的类一样，与应用的其余部分进行交互。这类似于汽车零件。如果你想更换汽车上的消音器，并不需要买一辆新车。如果你的发票相关代码散落在各处，那么修改一个类中的项目就会变得困难得多。


    ## 高级主题


    我们已经在整章中讨论了 OOP 的基础知识，但还有一些其他主题对你的理解也很重要。


    ### 接口


    正如本章所讨论的，其他对象与类交互的方式是通过方法。在 Swift 中，你可以为你的方法设置访问级别。将方法声明为 `private` 将使其只能被从其派生出的对象访问。默认情况下，Swift
    方法是 internal 的，可以被当前模块中的任何对象或方法访问。这通常被称为*接口*，因为它告诉其他对象如何与你的对象进行交互。在你的应用中实现标准接口，将允许你的代码以相似的方式与不同的对象交互。这将显着减少你需要编写的、特定于对象的代码量。


    ### 多态性


    *多态性*是指一个类的对象呈现为另一个类的对象并被像另一个类的对象一样使用的能力。这通常通过创建与另一个类相似的方法和属性来实现。你一直在使用的一个关于多态性的很好例子就是书店。在书店中，你有三个相似的类：`Book`、`Magazine`
    和 `Newspaper`。如果你想对全部库存进行一次大促销，你可以遍历所有书籍并打折，然后遍历所有杂志并打折，接着再遍历所有报纸并打折。这样做的工作量比实际需要的要多得多。更好的做法是确保所有类都有一个打折方法。然后你可以对所有对象调用该方法，而无需知道它们属于哪个类，只要它们是包含所需方法的类的子类即可。这将节省大量的时间和编码工作。


    在规划你的类时，要寻找不同类之间的共性以及可能适用于不止一种类型类的方法。从长远来看，这将节省你的时间并加速你的应用开发。


    ### 值导向编程


    Apple 最近为 iOS 开发者引入了一种新范式。Apple 称之为值导向编程。Apple 现在建议开发者在处理某些简单的数据片段时，使用结构体（Structs）而不是类。结构体与类类似，不同之处在于结构体是通过值传递给方法的，并且结构体不能从任何超类继承。这意味着创建结构体所涉及的开销比创建类要少。结构体的实例化和使用方式与类相同。图
    5-17 将本章中的客户类展示为结构体。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig17_HTML.jpg](img/341013_5_En_5_Fig17_HTML.jpg)


    图 5-17. 客户结构体


    决定使用结构体还是类，可能取决于多种因素。当不需要继承时，应该使用结构体。


    ## 总结


    你终于读完了这一章！以下是本章所涵盖内容的总结：


    *   *面向对象编程（OOP）*：你学习了 OOP 的重要性以及为什么所有现代代码都应该使用这种方法论。


    *   *对象*：你学习了 OOP 对象以及它们如何对应现实世界中的对象。你还学习了不对应现实世界对象的抽象对象。


    *   *类*：你学习了类决定了每个对象将拥有的数据类型（属性）和方法。每个对象都需要有一个类。它是对象的蓝图。


    *   *创建类*：你学习了如何规划你类的属性和方法。


    *   *创建类文件*：你使用 Xcode 创建了一个类文件。


    *   *编辑文件*：你编辑了 Swift 文件来添加你的属性和方法。

    '
