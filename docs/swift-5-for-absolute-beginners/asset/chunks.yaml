  raw: '### Note


    `IBOutlet` and `IBAction` both start with `IB`, which is an acronym from Interface
    Builder. Interface Builder is the tool used by NeXT and then Apple for building
    user interfaces.


    You now have the necessary code in place, but you don’t yet have an interface
    on the device. Next, you’re going to edit the interface and add two interface
    objects to your app.


    To edit the iPhone’s interface, you need to click the `Main.storyboard` file once.
    The `.storyboard` file contains all the information about a single window or view.
    Xcode 10 also supports `.xib` (pronounced *zib*) files.


    ### Note


    Each `.xib` file represents one screen on an iPhone or iPad. Apps that have multiple
    views will have multiple `.xib` files, but many different views can be stored
    in each storyboard file.


    You will use Xcode’s interface editor to *connect* a UI object, such as a Label
    object, to the code you just created. Connecting is as easy as clicking and dragging.


    Click the last view button in the upper-right part of the screen, as shown in
    Figure [6-12](#341013_5_En_6_Chapter.xhtml#Fig12). This opens the Utilities view
    for the interface. Among other things, this Utilities view shows you the various
    interface objects you can use in your app. You’re going to be concerned with only
    the rightmost objects: Button and Label. Figure [6-13](#341013_5_En_6_Chapter.xhtml#Fig13)
    shows the Object Library. There are other libraries available, but for now you
    will be using only the third one from the left.


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig13_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig13_HTML.jpg)


    Figure 6-13.


    The Object Library


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig12_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig12_HTML.jpg)


    Figure 6-12.


    The Interface you’re going to modify


    Click the library button on the toolbar. It looks like a square inside a circle.
    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Figa_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Figa_HTML.jpg)


    Now search in the library search bar as shown in Figure [6-13](#341013_5_En_6_Chapter.xhtml#Fig13).
    Next, drag the object to the iPhone view, as shown in Figure [6-14](#341013_5_En_6_Chapter.xhtml#Fig14).
    Don’t worry; dragging the object doesn’t remove it from the list of objects in
    the Utilities view. Dragging it creates a new copy of that object on the iPhone
    interface.


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig14_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig14_HTML.jpg)


    Figure 6-14.


    Moving a Button object onto the iPhone view


    Next, double-click the Button object that was just added to the iPhone interface.
    This allows you to change the title of the button, such as to `Name`, as shown
    in Figure [6-15](#341013_5_En_6_Chapter.xhtml#Fig15). Many different interface
    objects work just like this. Simply double-click, and the title of the object
    can be changed. This can also be done in the actual code, but it’s much simpler
    to do in Interface Builder.


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig15_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig15_HTML.jpg)


    Figure 6-15.


    Modifying the Button object’s title


    Once the title has been changed, drag a Label object to right below the button,
    as shown in Figure [6-16](#341013_5_En_6_Chapter.xhtml#Fig16).


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig16_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig16_HTML.jpg)


    Figure 6-16


    Adding a Label object to the iPhone interface


    For now, you can leave the label’s text as “Label” since this makes it easy to
    find on the interface. If you clear the label’s text, the object will still be
    there, but there is nothing visible to click in order to select it. Expand the
    size of the label by dragging the center white square to the right, as shown in
    Figure [6-17](#341013_5_En_6_Chapter.xhtml#Fig17).


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig17_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig17_HTML.jpg)


    Figure 6-17.


    Expanding the label’s size


    Now that you have a button and the label, you can connect these visual objects
    to your program. Start by right-clicking (or Ctrl-clicking) the Button control.
    This brings up a connection menu, as shown in Figure [6-18](#341013_5_En_6_Chapter.xhtml#Fig18).
    This is also available by clicking the button and selecting the Connections Inspector.


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig18_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig18_HTML.jpg)


    Figure 6-18.


    Connection menu for the Button object'
