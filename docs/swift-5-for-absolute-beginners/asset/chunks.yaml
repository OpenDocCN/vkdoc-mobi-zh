    ### 注意


    尽管在 Swift 中，单个文件可以包含多个不同的类，但程序员通常会将代码拆分到不同文件中，以便于访问。


    下面我们来看一个名为 `HelloWorld` 的 Swift 类的完整定义（图 6-2）。


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig2_HTML.jpg](img/341013_5_En_6_Fig2_HTML.jpg)


    图 6-2. `HelloWorld` 类


    在上述示例中，定义了一个名为 `HelloWorld` 的类。这个类只定义了一个方法：`logMessage`。这些奇怪的符号都代表什么意思？以行号为参考，你可以逐行审查这段代码。


    第 1 行包含一条编译器指令：`import Foundation`。为了让这个小程序能识别某些其他对象，你需要让编译器读取其他接口文件。在本例中，`Foundation`
    文件定义了 Foundation 框架的对象和接口。这个框架包含了 iOS 和 macOS 系统大部分非用户界面基类的定义。虽然在本例中不会用到任何 Foundation
    框架特有的对象，但它是所有新 Swift 文件的默认组成部分。


    对象的实际定义从第 4 行开始，如下所示：


    ```

    class HelloWorld {

    ```


    `HelloWorld` 就是类名。如果你想让 `HelloWorld` 成为你创建的一个日志类（例如 `LogFile`）的子类，你需要将声明修改如下：


    ```

    class HelloWorld: LogFile  {

    ```


    第 6 行包含了这个对象的一个方法定义，如下所示：


    ```

    func logMessage() {

    ```


    定义方法时，你必须决定该方法是类型方法还是实例方法。对于 `HelloWorld` 对象，使用的是默认的方法类型——实例方法。这个方法只能在对象创建*之后*使用。如果在
    `func` 前加上 `class` 关键字，该方法就变成了类型方法，可以在对象创建*之前*使用，但此时无法访问对象中的属性。如果要将 `logMessage`
    改为类型方法，则如下所示：


    ```

    class func logMessage() {

    ```


    第 7 行和第 8 行包含了方法的主体部分。关于这些语句的细节，你已经在前面章节中学过了。


    这就是 `HelloWorld` 类的完整描述；内容并不复杂。更复杂的对象无非是拥有更多的方法和属性。


    但别急，还有更多内容。既然你定义了一个新的 Swift 类，那么如何使用它呢？图 6-3 展示了一段使用这个新创建类的代码。


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig3_HTML.jpg](img/341013_5_En_6_Fig3_HTML.jpg)


    图 6-3. 调用 Swift 方法


    第一行定义了一个名为 `myHelloWorld` 的常量。然后，将这个常量赋值为 `HelloWorld` 类的一个实例。第二行简单调用了 `myHelloWorld`
    对象的 `logMessage` 方法。用过 Objective-C 的程序员会很快发现，在 Swift 中，无论是类的声明还是对象的创建，都更加简短高效。


    ### 注意


    实例化会将类变成计算机内存中一个真实的对象。类本身在没有实例化之前是无法实际使用的。以 SUV 为例，在工厂生产出一辆（实例化该类）之前，SUV 毫无意义。只有在那之后，SUV
    才能被使用。


    方法调用也可以接受多个参数。例如，`myCarObject.switchRadioBandTo(FM, 104.7)`。这里的方法名是 `switchRadioBandTo`。两个参数放在圆括号内。保持方法命名的一致性至关重要。


    ## 在 Xcode 中编写另一个程序


    当你首次打开 Xcode 时，会看到一个“欢迎使用 Xcode”屏幕。这个屏幕提供了一些方便的快捷方式，可以访问最近使用过的 Xcode 项目。在你熟悉 Xcode
    之前，请保持勾选“启动 Xcode 时显示此窗口”复选框。

