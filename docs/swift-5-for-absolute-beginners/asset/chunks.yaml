    `IBOutlet`和`IBAction`都以`IB`开头，这是 Interface Builder 的缩写。Interface Builder 是 NeXT
    和苹果公司用于构建用户界面的工具。


    现在代码已经就位，但你还没有在设备上看到界面。接下来，你将编辑界面，并往应用中添加两个界面对象。


    要编辑 iPhone 的界面，你只需点击`Main.storyboard`文件一次。`.storyboard`文件包含单个窗口或视图的全部信息。Xcode
    10 也支持`.xib`（读作*zib*）文件。


    ### Note


