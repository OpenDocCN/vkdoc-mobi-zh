  trans: "\n### 添加对象\n\n现在你可以添加新对象了。\n\n1.  首先，创建你的`RadioStation`对象。右键点击`RadioStations`文件夹，然后选择\
    \ New File（如图 7-4 所示）。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig4_HTML.jpg](img/341013_5_En_7_Fig4_HTML.jpg)\n\
    \n    图 7-4 添加新文件\n\n2.  下一个屏幕如图 7-5 所示，会询问新文件的类型。只需从 Source 组中选择 Cocoa Touch\
    \ Class，然后点击 Next。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig5_HTML.jpg](img/341013_5_En_7_Fig5_HTML.jpg)\n\
    \n    图 7-5 选择新文件类型\n\n3.  下一个屏幕会询问类的名称。输入`RadioStation`。将 Subclass 保持设置为`NSObject`，并确保\
    \ Language 设置为 Swift。参见图 7-6。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig6_HTML.jpg](img/341013_5_En_7_Fig6_HTML.jpg)\n\
    \n    图 7-6 命名新类\n\n4.  Xcode 不会提示你保存文件。默认位置在你的项目文件夹内。点击 Create 按钮将文件保存到默认位置。\n\
    \n5.  你的项目窗口现在应该如图 7-7 所示。点击`RadioStation.swift`文件。注意，你的新`RadioStation`类的框架已经存在。现在，填充空类，使其看起来如清单\
    \ 7-1 所示，即你的`RadioStation` Swift 文件。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig7_HTML.jpg](img/341013_5_En_7_Fig7_HTML.jpg)\n\
    \n    图 7-7 工作区窗口中你新创建的文件\n\n### 编写类\n\n现在你已经创建了文件和类，可以开始对其进行自定义了。\n\n1.  你将在此处使用的类文件与本章开头使用的文件相同，并且它非常适合电台应用程序。点击`RadioStation.swift`文件，并在你的类中输入代码，如图\
    \ 7-8 所示。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig8_HTML.jpg](img/341013_5_En_7_Fig8_HTML.jpg)\n\
    \n    图 7-8 RadioStation 类文件\n\n稍后我们会回到图 7-8 中的几个项目并进一步解释；不过，在定义了`RadioStation`类之后，你现在可以编写实际使用它的代码了。\n\
    \n1.  点击`ViewController.swift`文件。你需要为此类定义几个变量以供使用，如图 7-9 所示。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig9_HTML.jpg](img/341013_5_En_7_Fig9_HTML.jpg)\n\
    \n    图 7-9 向视图控制器添加 RadioStation 对象\n\n第 13–15 行将由你的 iOS 界面用来在屏幕上显示一些值（稍后详细介绍）。第\
    \ 17 行定义了类型为`RadioStation`的变量`myStation`。第 19–24 行包含必需的`init`方法。在 Swift 中，类不需要初始化方法，但这也是设置对象默认值的好地方。此方法设置了该类中使用的变量。另外，不要忘记包含花括号（`{\
    \ ... }`）。\n\n### 创建用户界面\n\n接下来，必须设置主窗口以显示你的电台信息。\n\n1.  点击`Main.storyboard`文件。此文件生成\
    \ iPhone 主屏幕。点击对象库图标，如图 7-10 所示。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig10_HTML.jpg](img/341013_5_En_7_Fig10_HTML.jpg)\n\
    \n    图 7-10 向 iPhone 屏幕添加标签对象\n\n2.  将三个标签对象拖放到屏幕上，如图 7-11 所示。这些标签可以任意对齐，或者按图\
    \ 7-11 所示的方式进行对齐。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig11_HTML.jpg](img/341013_5_En_7_Fig11_HTML.jpg)\n\
    \n    图 7-11 iPhone 屏幕上的所有三个标签对象\n\n3.  不过，你需要空间。将标签对象放到 iPhone 屏幕后，点击每个标签并拖动尺寸框以放大标签的尺寸，使\
    \ iPhone 屏幕看起来有点像图 7-11 所示。\n\n4.  接下来，向屏幕添加一个按钮对象，如图 7-12 所示。点击此按钮后，屏幕将更新为你的电台信息。\n\
    \n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig12_HTML.jpg](img/341013_5_En_7_Fig12_HTML.jpg)\n\
    \n    图 7-12 向屏幕添加按钮对象\n\n5.  与标签对象一样，只需双击按钮对象即可将其标题更改为 My Station。按钮应会自动调整大小以适合新标题。\n\
    \n6.  接下来，你需要添加用于保存电台信息的标签字段。这些字段位于现有标签对象的正后方。图 7-13 显示了第一个标签的放置位置。放置标签对象后，需要调整其大小，使其能够显示更多文本，如图\
    \ 7-14 所示。\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig14_HTML.jpg](img/341013_5_En_7_Fig14_HTML.jpg)\n\
    \n    图 7-14 拉伸标签对象\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig13_HTML.jpg](img/341013_5_En_7_Fig13_HTML.jpg)\n\
    \n    图 7-13 添加另一个标签对象\n\n    **注意** 拉伸标签对象允许标签的文本包含相当长的字符串。如果你没有调整标签对象的大小，文本可能会被截断（因为无法容纳），或者字体大小会变小。^(¹)\n\
    \n7.  在现有的频率和波段标签旁边重复添加和调整标签对象的大小，如图 7-15 所示。暂时将标签的默认文本保留为“Label”是可以的。\n\n   \
    \ ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig15_HTML.jpg](img/341013_5_En_7_Fig15_HTML.jpg)\n\
    \n    图 7-15 添加另一个标签对象\n"
- fmt: "### Hooking Up the Code\n\nNow that all the user interface objects are in\
    \ place, you can begin to hook up these interface elements to the variables in\
    \ your program. As you saw in Chapter [6](#341013_5_En_6_Chapter.xhtml), you do\
    \ this by *connecting* the user interface objects with the objects in your program.\n\
    \n1. Start by connecting the `Label` object to the right of Station Name to your\
    \ variable, as shown in Figure [7-16](#341013_5_En_7_Chapter.xhtml#Fig16). Right-click\
    \ (or Control-click) the View Controller object and drag it to the `Label` object\
    \ next to the Station Name text to bring up the list of outlets.\n\n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig16_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig16_HTML.jpg)\n\
    \n   Figure 7-16\n\n   Creating a connection\n\n2. When the connection is dropped\
    \ from the View Controller icon, another small menu will be shown. Click the property\
    \ name that you want to display in this `Label` object—in this case, you want\
    \ the `stationName` property, as shown in Figure [7-17](#341013_5_En_7_Chapter.xhtml#Fig17).\n\
    \n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig17_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig17_HTML.jpg)\n\
    \n   Figure 7-17\n\n   Connecting the `Label` to your `stationName` property\n\
    \n3. Now, the interface `Label` object is *connected* to the `stationName` property.\
    \ Whenever you set the property’s value, the screen will also be updated. Repeat\
    \ the previous connection steps for Frequency and Band.\n\n   To hook up your\
    \ button, you need a method in the `ViewController` class to handle this. You\
    \ could go to the `ViewController.swift` file and add it there. There is also\
    \ a shortcut to adding `@IBOutlet` properties and `@IBAction` methods. On the\
    \ right side of the Xcode toolbar, click the Assistant Editor icon shown in Figure\
    \ [7-18](#341013_5_En_7_Chapter.xhtml#Fig18) (it looks like two circles).\n\n\
    \   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig18_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig18_HTML.jpg)\n\
    \n   Figure 7-18\n\n   The Assistant Editor icon\n\nAfter clicking the Assistant\
    \ Editor icon, a second window will pop open showing the `ViewController` source.\
    \ Right-click (or Control-click) and drag the button to the code window, as shown\
    \ in Figure [7-19](#341013_5_En_7_Chapter.xhtml#Fig19).\n\n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig19_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig19_HTML.jpg)\n\
    \nFigure 7-19\n\nUsing the Assistant editor to create your method\n\n1. When you\
    \ release the mouse, a little window will pop up, as shown in Figure [7-20](#341013_5_En_7_Chapter.xhtml#Fig20).\n\
    \n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig20_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig20_HTML.jpg)\n\
    \n   Figure 7-20\n\n   Creating the action\n\nSelect Action and set the name to\
    \ `buttonClick`. Xcode will now create your method for you.\n\nFinish your method\
    \ by adding the code shown in Figure [7-21](#341013_5_En_7_Chapter.xhtml#Fig21).\n\
    \n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig21_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig21_HTML.jpg)\n\
    \nFigure 7-21\n\nFinished `buttonClick` method\n\nLet’s walk through the code\
    \ you just added. First, on line 39, you’ll notice the `IBAction` attribute. This\
    \ lets Xcode know that this method can be called as a result of an action. So,\
    \ when you go to connect an action to your application, you will see this method.\n\
    \nLines 40 and 41 both set the text fields to the values found in your `RadioStation`\
    \ class. Line 40 is as follows:\n\n```\nstationName.text = myStation.name\n```\n\
    \nThe `stationName` variable is what you just connected to the user interface\
    \ `Label` object, and `myStation.name` is used to return the name of the station.\n\
    \nLine 41 effectively does the same thing as line 40, but you have to first convert\
    \ the double value (the station’s frequency) to a `String`. The `\\(myStation.frequency)`\
    \ substitutes the value of the `frequency` property into the string.\n\nLines\
    \ 42–46 make use of both the instance variables and the Type Methods of the `RadioStation`\
    \ class. Here, you simply call the method `isBandFM()` on the `myStation` object.\
    \ If so, the station is an FM station and `isBandFM()` will return a 1; otherwise,\
    \ assume it’s the AM band. Lines 43 and 45 show the band value on the screen.\n\
    \n### Tip\n\nThe button sends the Touch Up Inside event whenever a user touches\
    \ the *inside* of the button and then releases—not until the user lifts their\
    \ finger is the event actually sent.\n\n### Running the Program\n\nOnce the connection\
    \ has been made, you’re ready to run and test your program! To do this, simply\
    \ click the Play button at the top left of the Xcode window, as shown in Figure\
    \ [7-22](#341013_5_En_7_Chapter.xhtml#Fig22).\n\n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig22_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig22_HTML.jpg)\n\
    \nFigure 7-22\n\nClick the Play button to run your program\n\nIf there are no\
    \ compile errors, the iPhone Simulator should come up, and you should see your\
    \ application. Simply click the My Station button, and the radio station information\
    \ will be displayed, as shown in Figure [7-23](#341013_5_En_7_Chapter.xhtml#Fig23).\n\
    \n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig23_HTML.png](images/341013_5_En_7_Chapter/341013_5_En_7_Fig23_HTML.png)\n\
    \nFigure 7-23\n\nShowing your radio station information\n\nIf things don’t quite\
    \ look or work right, retrace your steps and make sure all the code and connections\
    \ described in this chapter are in place.\n\n### Taking Type Methods to the Next\
    \ Level\n\nIn your program, you haven’t taken advantage of all the type methods\
    \ for `RadioStation`, but this chapter does describe what a type method is and\
    \ how it is used. Use that knowledge to try a few of the exercises mentioned at\
    \ the end of this chapter. Just play around with this simple working program by\
    \ adding or changing type or instance methods to get an idea of how they work.\n\
    \n## Accessing the Xcode Documentation\n\nThere is a wealth of information provided\
    \ in the Xcode developer documentation. When Xcode is opened, select Help ➤ Documentation\
    \ and API Reference (see Figure [7-24](#341013_5_En_7_Chapter.xhtml#Fig24)) to\
    \ open the Documentation window.\n\n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig24_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig24_HTML.jpg)\n\
    \nFigure 7-24\n\nThe Xcode Help menu\n\nOnce it’s opened, the search window can\
    \ be used to look up any of the Swift classes you’ve used in this chapter, including\
    \ the `String` class documentation, as shown in Figure [7-25](#341013_5_En_7_Chapter.xhtml#Fig25).\n\
    \n![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig25_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25\n\nXcode documentation\n\nThere are several different things to\
    \ discover about the `String` class shown in Figure [7-25](#341013_5_En_7_Chapter.xhtml#Fig25).\
    \ Go through the documentation and the various companion guides that Apple provides.\
    \ This will give you a more thorough understanding of the various classes and\
    \ the various methods supported by them.\n\n## Summary\n\nOnce again, congratulate\
    \ yourself for being able to single-handedly stuff your brain with a lot of information!\
    \ Here is a summary of what was covered in this chapter:\n\n* Swift classes review\n\
    \  * Type methods\n  * Instance methods\n* Creating a class\n  * Limitations of\
    \ using type methods vs. instance methods\n  * Initializing the class and making\
    \ use of the instance variables\n* Making use of your new `RadioStation` object\n\
    \  * Building an iPhone app that uses your new object\n  * Connecting interface\
    \ classes to properties\n  * Connecting user interface events to methods in your\
    \ class"
