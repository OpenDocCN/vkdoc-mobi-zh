- fmt: '### Note


    Even though in Swift a single file may contain many different classes, a programmer
    will want to separate the code into different files to make access easier.


    Let’s look at a complete definition of a Swift class called `HelloWorld` (Figure
    [6-2](#341013_5_En_6_Chapter.xhtml#Fig2)).


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig2_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig2_HTML.jpg)


    Figure 6-2. `HelloWorld` class


    In the preceding example, a class called `HelloWorld` is being defined. This class
    has only one method defined: `logMessage`. What do all these strange symbols mean?
    Using the line numbers as a reference, you can review this code line by line.


    Line 1 contains a compiler directive, `import Foundation`. For this little program
    to know about certain other objects, you need to have the compiler read other
    interface files. In this case, the `Foundation` file defines the objects and interfaces
    to the Foundation framework. This framework contains the definition of most non-user-interface
    base classes of the iOS and macOS systems. You will not be using any Foundation
    framework–specific objects in this example, but it is a default part of any new
    Swift file.


    The actual start of the object is on line 4, as follows:


    ```

    class HelloWorld {

    ```


    `HelloWorld` is the class. If you wanted `HelloWorld` to be a subclass of a logging
    class you had created, such as `LogFile`, you would change the declaration as
    follows:


    ```

    class HelloWorld: LogFile  {

    ```


    Line 6 contains a method definition for this object, as follows:


    ```

    func logMessage() {

    ```


    When you’re defining a method, you must decide whether you want the method to
    be a type or an instance method. In the case of the `HelloWorld` object, you are
    using the default method type, which is an instance. This method can only be used
    *after* an object is created. If the word `class` is added before the `func`,
    the method can be used *before* an object is created, but you will not have access
    to properties in the object. If you changed `logMessage` to a type method, it
    would be as follows:


    ```

    class func logMessage() {

    ```


    Lines 7 and 8 contain the body of the method. You learned about the details of
    the statements earlier in the chapter.


    That’s the complete description of class `HelloWorld`; there’s not a whole lot
    here. More complicated objects simply have more methods and more properties.


    But wait, there is more. Now that you have a new Swift class defined, how is it
    used? Figure [6-3](#341013_5_En_6_Chapter.xhtml#Fig3) shows another piece of code
    that uses the newly created class.


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig3_HTML.jpg](images/341013_5_En_6_Chapter/341013_5_En_6_Fig3_HTML.jpg)


    Figure 6-3. Calling a Swift method


    The first line defines a constant called `myHelloWorld`. It then assigns the constant
    to an instance of the `HelloWorld` class. The second line simply calls the `logMessage`
    method of the `myHelloWorld` object. Those who have spent time in Objective-C
    will quickly see how much shorter and efficient both the class declaration and
    the object creation are in Swift.


    ### Note


    Instantiation makes a class a real object in the computer’s memory. A class by
    itself is not really usable until there is an instance of it. Using the SUV example,
    an SUV means nothing until a factory builds one (instantiates the class). Only
    then can the SUV be used.


    Method calls can also accept multiple arguments. Consider, for example, `myCarObject.switchRadioBandTo(FM,
    104.7)`. The method here would be `switchRadioBandTo`. The two arguments are contained
    in the parentheses. Being consistent in naming methods is critical.


    ## Writing Another Program in Xcode


    When you first open Xcode, you will be presented with a Welcome to Xcode screen.
    This screen provides some nice shortcuts to access recently used Xcode projects.
    Until you are more comfortable with Xcode, keep the “Show this window when Xcode
    launches” check box selected.'
