    # 13. Introducing the Xcode Debugger


    Not only is Xcode provided free of charge on Apple’s developer site and the Mac
    App Store, but it is also a great tool. Aside from being able to use it to create
    the next great Mac, iPhone, iPad, AppleTV, and Apple Watch apps, Xcode has a debugger
    built right into the tool.


    What exactly is a debugger? Well, let’s get something straight—programs do *exactly*
    what they are written to do, but sometimes what is written isn’t exactly what
    the program is really meant to do. This can mean the program crashes or just doesn’t
    do something that is expected. Whatever the case, when a program doesn’t work
    as planned, the program is said to have ***bugs*** . The process of going through
    the code and fixing these problems is called ***debugging***.


    There is still some debate as to the real origin of the term *bug*, but one well-documented
    case from 1947 involved the late Rear Admiral Grace Hopper, a Naval reservist
    and programmer at the time. Hopper and her team were trying to solve a problem
    with the Harvard Mark II computer. One team member found a moth in the circuitry
    that was causing the problem with one of the relays. Hopper was later quoted as
    saying, “From then on, when anything went wrong with a computer, we said it had
    bugs in it.”^([²](#fn2))


    Regardless of the origin, the term stuck and programmers all over the world use
    debuggers, such as the one built into Xcode, to help find bugs in programs. But
    people are the real debuggers; debugging tools merely help programmers locate
    problems. No debugger, whatever the name might imply, fixes problems on its own.


    This chapter highlights some of the more important features of the Xcode debugger
    and explains how to use them. Once you are finished with this chapter, you should
    have a good enough understanding of the Xcode debugger and of the debugging process
    in general to allow you to search for and fix the majority of programming issues.


    ## Getting Started with Debugging


    If you’ve ever watched a movie in slow motion just so you can catch a detail you
    can’t see when the movie is played at full speed, you’ve used a tool to do something
    a little like debugging. The idea that playing the movie frame by frame will reveal
    the detail you are looking for is the same sort of idea you apply when debugging
    a program. With a program, sometimes it becomes necessary to slow things down
    a bit to see what’s happening. The debugger allows you to do this using two main
    features: setting a breakpoint and stepping through the program line by line—more
    on these two features in a bit. Let’s first look at how to get to the debugger
    and what it looks like.


    First, you need to load an application. The examples in this chapter use the `BookStore`
    project from Chapter [8](#341013_5_En_8_Chapter.xhtml), so open Xcode and load
    the `BookStore` project.


    Second, make sure the Debug build configuration is chosen for the Run scheme,
    as shown in Figure [13-1](#341013_5_En_13_Chapter.xhtml#Fig1). To edit the current
    scheme, choose Product ➤ Scheme ➤ Edit Scheme from the main menu. Debug is the
    default selection, so you probably won’t have to change this. This step is important
    because if the configuration is set to Release, debugging will not work at all.


    ![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig1_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig1_HTML.jpg)


    Figure 13-1.


    Selecting the Debug configuration


    While this book won’t discuss Xcode schemes, just know that by default Xcode provides
    both a Release configuration and a Debug configuration for any macOS, iOS, watchOS,
    or tvOS project you create. The main difference as it pertains to this chapter
    is that a Release configuration doesn’t add any program information that is necessary
    for debugging an application, whereas the Debug configuration does.'
