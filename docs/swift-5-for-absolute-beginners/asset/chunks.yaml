- fmt: '### Note


    Swift allows for multiple classes to be declared in the same Swift file. This
    works well when you are only using that class with the other classes in the file.
    In this case, we are only going to use the row class with the `InterfaceController`
    class.


    The `InterfaceController.swift` file will now look like Figure 15-10.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig10_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig10_HTML.jpg)


    *Figure 15-10. Modified InterfaceController.swift file*


    You can now connect the outlets to the interface. Select `Interface.storyboard`.
    Now select the Assistant Editor by selecting the icon with two circles in the
    top right of the Xcode window, as shown in Figure 15-11.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig11_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig11_HTML.jpg)


    *Figure 15-11. Opening the Assistant Editor*


    With the Assistant Editor, Xcode provides a quick way for developers to create
    objects and associate them with outlets in the interface. You will first need
    to create a table property representing the Table. Control-drag from the table
    in the Interface Controller Scene into the `InterfaceController` class on the
    right, as shown in Figure 15-12.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig12_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig12_HTML.jpg)


    *Figure 15-12. Control-dragging to create an outlet*


    Once you release the `Table` object on the `InterfaceController` class, Xcode
    will prompt you to enter the type of outlet you are creating. Leave the defaults
    as is, except change the Name to `mainTable`, as shown in Figure 15-13.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig13_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig13_HTML.jpg)


    *Figure 15-13. Naming your outlet*


    Select the “lines of text” icon in the top right of the Xcode window to return
    to the Standard Editor. Under the Interface Controller Scene, select the Table
    Row Controller, as shown in Figure 15-14.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig14_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig14_HTML.jpg)


    *Figure 15-14. Selecting the Table Row Controller*


    Set the class of the Table Row Controller by selecting the Identity Inspector
    on the right side and selecting `BookRow` in the Class drop-down menu, as shown
    in Figure 15-15.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig15_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig15_HTML.jpg)


    *Figure 15-15. Changing the table row class to `BookRow`*


    Now that your app knows the type of table row you are using in your code, you
    need to add an identifier for the row. This helps in the case where you have multiple
    row types for a single table. Select the Attributes Inspector and enter `MyBookRow`
    as the identifier, as shown in Figure 15-16.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig16_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig16_HTML.jpg)


    *Figure 15-16. Changing the table row identifier*


    You can now hook up the `WKInterfaceLabel` you created earlier. Under the Interface
    Controller Scene, control-drag from the book row to the label, as shown in Figure
    15-17.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig17_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig17_HTML.jpg)


    *Figure 15-17. Control-dragging from the row to the label*


    You will be prompted to select an outlet from the available outlets, as shown
    in Figure 15-18. There is currently only one available outlet, so select `bookLabel`.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig18_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig18_HTML.jpg)


    *Figure 15-18. Connecting the `bookLabel` outlet*


    Your table and label are now all hooked up. Now you need some data to display.
    You are going to reuse some data you created in Chapter 8. Using the Finder on
    your Mac, drag the `Book.swift` and `BookStore.swift` files from the Chapter 8
    folder into the BookStore WatchKit Extension folder in Xcode. Check the “Copy
    items if needed” check box to copy the files to the new project. Once you are
    done, you will have the `Book.swift` and `BookStore.swift` files in your target,
    as shown in Figure 15-19.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig19_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig19_HTML.jpg)


    *Figure 15-19. Adding in the data files*


    You have the data and interface complete. You now need to hook them up so the
    interface knows about the data. You need to declare a new property that will hold
    the `BookStore` object. Under your declaration of the `mainTable` object in the
    `InterfaceController.swift` file, you need to add the following line:


    ```

    var myBookStore: BookStore = BookStore()

    ```


    This creates a property of type `BookStore` called `myBookStore` and initializes
    it to an instance of `BookStore`.


    We will use the `configureTable()` method to set up the table. Add the following
    code to the class, outside of any of the other methods:


    ```

    1     func configureTable() {

    2         mainTable.setNumberOfRows(myBookStore.bookList.count, withRowType: "myBookRow")

    3         for index in 0..<myBookStore.bookList.count {

    4             if let myRow = mainTable.rowController(at: index) as? BookRow {

    5                 myRow.bookLabel.setText(myBookStore.bookList[index].title)

    6             }

    7         }

    8     }

    ```


    Line 1 declares the new method. Line 2 sets the number of rows in the table to
    the number of books in the bookstore. You’ll use `myBookStore.bookList.count`
    to get that number. We also tell the table which row identifier to use with the
    table. Line 3 is a loop that assigns the `index` to 0 and goes until it gets assigned
    to the number of books: 1. The reason you subtract 1 from the number of books
    is because Swift (and most modern programming languages) starts its arrays with
    0. This means if you have an array with two items, the items will be in positions
    0 and 1. If you try to look at position 2, you will receive an error.


    Line 4 tries to create a new row for the table using the `index` variable you
    created in the previous line. Line 5 takes the row and assigns the `Book` title
    to `bookLabel`. Now we need to call `configureTable()` when the view is being
    activated. Add the following line to the `willActivate` function:


    ```

    configureTable()

    ```


    After entering those lines, the `InterfaceController.swift` file will look like
    Figure 15-20.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig20_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig20_HTML.jpg)


    *Figure 15-20. InterfaceController.swift file*


    You now have enough in place to run the app. From the target menu, select BookStore
    WatchKitApp and then select the size of the Apple Watch you would like the simulator
    to use, as shown in Figure 15-21. If this is your first time launching the Watch
    Simulator, it may take some time and ask for permissions on the Phone Simulator
    before the app will run successfully.


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig21_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig21_HTML.jpg)


    *Figure 15-21. Selecting the WatchKit target*


    Once the app is launched, you will see a watch screen with the two books in the
    `myBookStore` object. You can go back to the `BookStore.swift` file and add more
    books if you want to play around with scrolling. The app should look like Figure
    15-22.'
