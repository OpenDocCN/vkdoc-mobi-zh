    \ `My Book` and adds the number of items in the array. Obviously, in real life,\
    \ you would want to set this to a name either given by the user or from some other\
    \ list. Lines 4–8 save the managed object context.\n\nIn Swift 3.0, Apple changed\
    \ error handling. Swift 4.0 has almost the same error handling as Swift 3.0. Now\
    \ you `try` and then `throw` an error when you perform an operation that might\
    \ cause an error. Line 9 tells the `UITableView` to reload itself to display the\
    \ newly added `Book`. Now build and run the application. Click the + button several\
