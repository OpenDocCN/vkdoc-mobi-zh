    \ 视图从堆栈中弹出（请参阅代码清单 12-5 中的第 55 行）。\n\n## 总结\n\n本章介绍了为什么 Swift 不使用多重继承，以及协议和委托的工作原理。当你想到委托时，可以想象成一个辅助类。当你的类遵循某个协议时，委托的函数可以帮助你的类。\n\
    \n你应该熟悉以下术语：\n\n*   多重继承\n*   协议\n*   委托\n\n### 练习\n\n*   将计算机猜测的随机数范围从 0–100\
    \ 改为 0–50。\n*   在主场景中，显示用户为猜测随机数而进行的尝试次数。\n*   在主场景中，显示用户已经玩过的游戏次数。\n\n# 13. Xcode\
    \ 调试器入门\n\nXcode 不仅在苹果开发者网站和 Mac App Store 上免费提供，而且本身也是一个出色的工具。除了能用来创建下一个伟大的 Mac、iPhone、iPad、Apple\
    \ TV 和 Apple Watch 应用之外，Xcode 还内置了调试器。\n\n调试器究竟是什么？好吧，让我们先明确一点——程序会 *精确地* 按照编写的指令执行，但有时编写的指令并非程序真正想要实现的目标。这可能导致程序崩溃或无法完成预期操作。无论哪种情况，当程序不能按计划工作时，我们就说程序存在\
    \ ***bug***。而检查代码并修复这些问题的过程被称为 ***调试***。\n\n关于 *bug* 这个术语的真正起源仍存在争议，但有一个 1947\
    \ 年有据可查的案例涉及已故的海军少将格蕾丝·赫柏，她当时是海军预备役军官和程序员。赫柏和她的团队当时正试图解决哈佛马克 II 型计算机的一个问题。一名团队成员在电路中找到了一只飞蛾，它导致其中一个继电器出现故障。赫柏后来有句名言：“从那时起，每当计算机出问题，我们就说里面有\
    \ bug。”^(²)\n\n无论起源如何，这个术语流传了下来，全世界的程序员都使用调试器（例如 Xcode 内置的调试器）来帮助查找程序中的 bug。但真正进行调试的是人；调试工具只是帮助程序员定位问题。没有任何调试器（无论其名称暗示什么）可以自行修复问题。\n\
    \n本章重点介绍 Xcode 调试器的一些更重要的功能，并解释如何使用它们。学完本章后，你将充分理解 Xcode 调试器以及一般的调试过程，从而能够查找并修复大部分的编程问题。\n\
    \n## 调试入门\n\n如果你曾为了捕捉到某个在全速播放时看不到的细节而慢速播放电影，那么你就使用了一种类似于调试的工具。逐帧播放电影以揭示你正在寻找的细节，这种思路与你调试程序时的思路类似。对于程序，有时也需要放慢速度来观察正在发生的事情。调试器允许你通过两个主要功能做到这一点：设置断点和逐行单步执行程序——稍后将详细介绍这两个功能。先来看看如何进入调试器以及它的界面。\n\
    \n首先，你需要加载一个应用程序。本章的示例使用第 8 章的 `BookStore` 项目，因此请打开 Xcode 并加载 `BookStore` 项目。\n\
    \n其次，确保为“运行”方案选择了“调试”构建配置，如图 13-1 所示。要编辑当前方案，请从主菜单中选择“产品”➤“方案”➤“编辑方案”。“调试”是默认选项，因此你可能无需更改。这一步很重要，因为如果配置设置为“发布”，调试将完全无法工作。\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig1_HTML.jpg](img/341013_5_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1.** 选择调试配置\n\n虽然本书不会讨论 Xcode 方案，但只需知道，默认情况下，Xcode 为你创建的任何 macOS、iOS、watchOS\
    \ 或 tvOS 项目都提供了发布配置和调试配置。就本章而言，主要区别在于发布配置不会添加调试应用程序所需的任何程序信息，而调试配置则会。\n"
- fmt: "# Setting Breakpoints\n\nTo see what’s going on in a program, you need to\
    \ make the program pause at certain points that you as a programmer are interested\
    \ in. A *breakpoint* allows you to do this. In Figure [13-2](#341013_5_En_13_Chapter.xhtml#Fig2),\
    \ there is a breakpoint on line 24 of the program. To set this, simply place the\
    \ mouse cursor over the line number (not the program text, but the number 24 to\
    \ the left of the program text) and click once. You will see a small blue arrow\
    \ behind the line number. This lets you know that a breakpoint is set.\n\nIf line\
    \ numbers are not being displayed, simply choose Xcode ➤ Preferences from the\
    \ main menu, click the Text Editing tab, and select the Line Numbers check box.\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig2_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2. Your first breakpoint\n\nThe breakpoint can be removed by dragging\
    \ the breakpoint to the left or right of the line number column and then dropping\
    \ it. You can also right-click (or Control-click) the breakpoint, and you will\
    \ be given the option to delete or disable a breakpoint. Figure [13-3](#341013_5_En_13_Chapter.xhtml#Fig3)\
    \ shows the right-click menu for a breakpoint. Disabling a breakpoint is convenient\
    \ if you think you might need it again in the future.\n\n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig3_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3. Right-clicking a breakpoint\n\nSetting and deleting breakpoints\
    \ are pretty straightforward tasks.\n\n# Using the Breakpoint Navigator\n\nWith\
    \ small projects, knowing the locations of all the breakpoints isn’t necessarily\
    \ difficult. However, once a project gets larger than, say, your small `BookStore`\
    \ application, managing all the breakpoints could be a little more difficult.\
    \ Fortunately, Xcode provides a simple method to list all the breakpoints in an\
    \ application; it’s called the Breakpoint Navigator. Just click the Breakpoint\
    \ Navigator icon in the navigation selector bar, as shown in Figure [13-4](#341013_5_En_13_Chapter.xhtml#Fig4).\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig4_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4. Accessing the Breakpoint Navigator in Xcode\n\nOnce you’ve clicked\
    \ the icon, the navigator will list all the breakpoints currently defined in the\
    \ application grouped by source file. You can use the disclosure arrows to show\
    \ or hide breakpoints. From here, clicking a breakpoint will take you to the source\
    \ file with the breakpoint. You can also easily delete and disable breakpoints\
    \ from here.\n\nTo disable/enable a breakpoint in the Breakpoint Navigator, click\
    \ the blue breakpoint icon in the list (or wherever it appears). Don’t click the\
    \ line; it has to be the little blue icon, as shown in Figure [13-5](#341013_5_En_13_Chapter.xhtml#Fig5).\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig5_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5. Using the Breakpoint Navigator to enable/disable a breakpoint\n\
    \nIt is sometimes handy to disable a breakpoint instead of deleting it, especially\
    \ if you plan to put the breakpoint back in the same place again. The debugger\
    \ will not stop on these faded breakpoints, but they remain in place so they can\
    \ be conveniently enabled and act as a marker to an important area in the code.\n\
    \nIt’s also possible to delete breakpoints from the Breakpoint Navigator. Simply\
    \ select one or more breakpoints and press the Delete key. Make sure you select\
    \ the correct breakpoints to delete since there is no undo feature.\n\nIt’s also\
    \ possible to select the file associated with the breakpoints. In this case, if\
    \ you delete the file listed in the Breakpoint Navigator and press Delete, all\
    \ breakpoints in that file will be deleted.\n\nNote that breakpoints are categorized\
    \ by the file that they appear in. In Figure [13-5](#341013_5_En_13_Chapter.xhtml#Fig5),\
    \ the files are `DetailViewController.swift` and `MasterViewController.swift`,\
    \ with the breakpoints listed below those file names. Figure [13-6](#341013_5_En_13_Chapter.xhtml#Fig6)\
    \ shows an example of what a file looks like with more than a single breakpoint.\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig6_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6. A file with several breakpoints\n\n# Debugging Basics\n\nSet a\
    \ breakpoint on the statement shown in Figure [13-2](#341013_5_En_13_Chapter.xhtml#Fig2).\
    \ Next, as shown in Figure [13-7](#341013_5_En_13_Chapter.xhtml#Fig7), click the\
    \ “Run” button to compile the project and start running it in the Xcode debugger.\n\
    \n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig7_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig7_HTML.jpg)\n\
    \nFigure 13-7. The Build and Run and Stop buttons in the Xcode toolbar\n\nOnce\
    \ the project builds, the debugger will start. The screen will show the debugging\
    \ windows, and the program will stop execution at the line with the breakpoint,\
    \ as shown in Figure [13-8](#341013_5_En_13_Chapter.xhtml#Fig8).\n\n![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig8_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8. The Debugger view with execution stopped on line 33\n\nThe Debugger\
    \ view adds some additional windows. The following are the different parts of\
    \ the Debugger view shown in Figure [13-8](#341013_5_En_13_Chapter.xhtml#Fig8):\n\
    \n- **Debugger controls (circled in Figure [13-8](#341013_5_En_13_Chapter.xhtml#Fig8))**:\
    \ The debugging controls can pause, continue, step over, step into, and step out\
    \ of statements in the program. The stepping controls are used most often. The\
    \ first button on the left is used to show or hide the debugger view. In Figure\
    \ [13-8](#341013_5_En_13_Chapter.xhtml#Fig8), the debugger view is shown. Figure\
    \ [13-9](#341013_5_En_13_Chapter.xhtml#Fig9) labels the different pieces of the\
    \ debugger view.\n\n    ![../images/341013_5_En_13_Chapter/341013_5_En_13_Fig9_HTML.jpg](images/341013_5_En_13_Chapter/341013_5_En_13_Fig9_HTML.jpg)\n\
    \n    Figure 13-9. The debugger locations\n\n- **Variables**: The Variables view\
    \ displays the variables currently in scope. Clicking the little triangle just\
    \ to the left of a variable name will expand it.\n\n- **Console**: The output\
    \ window will show useful information in the event of a crash or exception. Also,\
    \ any `NSLog` or `print` output goes here.\n\n- **Debug navigator**: The stack\
    \ trace shows the call stack as well as all the threads currently active in the\
    \ program. The stack is a hierarchical view of what methods are being called.\
    \ For example, `UIApplicationMain` calls the `UIViewController` class. These method\
    \ calls “stack” up until they finally return."
