  trans: '

    ### 说明


    Swift 允许在同一个 Swift 文件中声明多个类。当你仅在该文件内与其他类一起使用该类时，这种做法的效果很好。在本例中，我们只会将行类与 `InterfaceController`
    类一起使用。


    `InterfaceController.swift` 文件现在将如图 15-10 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig10_HTML.jpg](img/341013_5_En_15_Fig10_HTML.jpg)


    *图 15-10. 修改后的 InterfaceController.swift 文件*


    现在你可以将输出口连接到界面。选择 `Interface.storyboard`。然后选择 Xcode 窗口右上角带有两个圆圈的图标来打开助理编辑器，如图
    15-11 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig11_HTML.jpg](img/341013_5_En_15_Fig11_HTML.jpg)


    *图 15-11. 打开助理编辑器*


    借助助理编辑器，Xcode 为开发者提供了一种快速创建对象并将其与界面中的输出口关联的方法。你首先需要创建一个代表表格的表格属性。按住 Control 键并从“Interface
    Controller Scene”中的表格拖向右侧的 `InterfaceController` 类，如图 15-12 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig12_HTML.jpg](img/341013_5_En_15_Fig12_HTML.jpg)


    *图 15-12. 按住 Control 键拖动以创建输出口*


    当你在 `InterfaceController` 类上释放 `Table` 对象时，Xcode 会提示你输入正在创建的输出口类型。保持默认设置不变，只需将名称改为
    `mainTable`，如图 15-13 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig13_HTML.jpg](img/341013_5_En_15_Fig13_HTML.jpg)


    *图 15-13. 命名你的输出口*


    选择 Xcode 窗口右上角的“文本行”图标以返回到标准编辑器。在“Interface Controller Scene”下，选择“Table Row Controller”，如图
    15-14 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig14_HTML.jpg](img/341013_5_En_15_Fig14_HTML.jpg)


    *图 15-14. 选择 Table Row Controller*


    通过选择右侧的身份检查器，并在“Class”下拉菜单中选择 `BookRow`，来设置 Table Row Controller 的类，如图 15-15 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig15_HTML.jpg](img/341013_5_En_15_Fig15_HTML.jpg)


    *图 15-15. 将表格行类更改为 `BookRow`*


    既然你的应用知道了你在代码中使用的表格行类型，你需要为该行添加一个标识符。这在单个表格有多个行类型时会很有帮助。选择属性检查器，并输入 `MyBookRow`
    作为标识符，如图 15-16 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig16_HTML.jpg](img/341013_5_En_15_Fig16_HTML.jpg)


    *图 15-16. 更改表格行标识符*


    现在你可以连接之前创建的 `WKInterfaceLabel`。在“Interface Controller Scene”下，按住 Control 键从图书行拖向标签，如图
    15-17 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig17_HTML.jpg](img/341013_5_En_15_Fig17_HTML.jpg)


    *图 15-17. 按住 Control 键从行拖向标签*


    系统会提示你从可用的输出口中选择一个输出口，如图 15-18 所示。目前只有一个可用的输出口，所以选择 `bookLabel`。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig18_HTML.jpg](img/341013_5_En_15_Fig18_HTML.jpg)


    *图 15-18. 连接 `bookLabel` 输出口*


    你的表格和标签现在已经全部连接好了。现在你需要一些数据来显示。你将重用你在第 8 章中创建的一些数据。使用 Mac 上的“访达”，将第 8 章文件夹中的 `Book.swift`
    和 `BookStore.swift` 文件拖入 Xcode 中的 `BookStore WatchKit Extension` 文件夹。勾选“需要时拷贝项目”复选框，将文件复制到新项目中。完成后，你的目标中就会有
    `Book.swift` 和 `BookStore.swift` 文件，如图 15-19 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig19_HTML.jpg](img/341013_5_En_15_Fig19_HTML.jpg)


    *图 15-19. 添加数据文件*


    数据和界面都已经准备好了。现在你需要将它们连接起来，以便界面能够识别数据。你需要声明一个新的属性来持有 `BookStore` 对象。在 `InterfaceController.swift`
    文件中，`mainTable` 对象的声明下方，需要添加以下代码行：


    ```

    var myBookStore: BookStore = BookStore()

    ```


    这将创建一个类型为 `BookStore`、名为 `myBookStore` 的属性，并将其初始化为 `BookStore` 的一个实例。


    我们将使用 `configureTable()` 方法来设置表格。在类的其他方法之外，添加以下代码：


    ```

    1     func configureTable() {

    2         mainTable.setNumberOfRows(myBookStore.bookList.count, withRowType: "myBookRow")

    3         for index in 0..<myBookStore.bookList.count {

    4             if let myRow = mainTable.rowController(at: index) as? BookRow {

    5                 myRow.bookLabel.setText(myBookStore.bookList[index].title)

    6             }

    7         }

    8     }

    ```


    第 1 行声明了新方法。第 2 行将表格的行数设置为书店中书的总数。你将使用 `myBookStore.bookList.count` 来获取该数字。我们还告诉表格要使用哪个行标识符。第
    3 行是一个循环，它将 `index` 赋值为 0 并一直增加到书本数量减 1。之所以需要将书本数量减 1，是因为 Swift（以及大多数现代编程语言）的数组索引从
    0 开始。这意味着，如果你有一个包含两个元素的数组，元素将位于位置 0 和 1。如果你尝试访问位置 2，将会收到错误。


    第 4 行尝试使用你在上一行创建的 `index` 变量为表格创建一个新行。第 5 行获取该行并将 `Book` 的标题赋值给 `bookLabel`。现在我们需要在视图激活时调用
    `configureTable()`。在 `willActivate` 函数中添加以下代码行：


    ```

    configureTable()

    ```


    输入这些代码行后，`InterfaceController.swift` 文件将如图 15-20 所示。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig20_HTML.jpg](img/341013_5_En_15_Fig20_HTML.jpg)


    *图 15-20. InterfaceController.swift 文件*


    现在，你已经具备了运行应用所需的一切。在目标菜单中，选择 `BookStore WatchKitApp`，然后选择你希望模拟器使用的 Apple Watch
    尺寸，如图 15-21 所示。如果这是你第一次启动 Watch 模拟器，可能需要一些时间，并且应用在成功运行之前可能会在手机模拟器上请求权限。


    ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig21_HTML.jpg](img/341013_5_En_15_Fig21_HTML.jpg)


    *图 15-21. 选择 WatchKit 目标*


    一旦应用启动，你将看到一个手表屏幕，其中显示 `myBookStore` 对象中的两本书。如果你想体验滚动效果，可以返回 `BookStore.swift`
    文件并添加更多书籍。应用最终应如图 15-22 所示。

    '
- fmt: '![images/341013_5_En_15_Chapter/341013_5_En_15_Fig22_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig22_HTML.jpg)


    **Figure 15-22.** First WatchKit app launch


    ## Adding More Functionality


    In the last section, you created a WatchKit app, but it’s very limited in functionality.
    In this section, you will add a new scene to the app to show book detail when
    a book is selected. Because you will be adding a scene, you will use an additional
    controller file. Right-click the `BookStore WatchKit Extension` folder and select
    New File, as shown in Figure [15-23](#341013_5_En_15_Chapter.xhtml#Fig23).


    ![images/341013_5_En_15_Chapter/341013_5_En_15_Fig23_HTML.jpg](images/341013_5_En_15_Chapter/341013_5_En_15_Fig23_HTML.jpg)


    **Figure 15-23.** Adding new controller file


    Make sure the new file is a Swift file and name it `DetailController.swift`. It
    should now appear in your file list. Add the following code after the `import
    Foundation` line:


    ```

    10      import WatchKit


    13      class DetailController: WKInterfaceController {

    14           @IBOutlet var labelTitle: WKInterfaceLabel!

    15           @IBOutlet var labelAuthor: WKInterfaceLabel!

    16           @IBOutlet var labelDescription: WKInterfaceLabel!


    18           var book: Book!


    20           override func awake(withContext context: Any?) {

    21                super.awake(withContext: context)

    22                if let book = context as? Book {

    23                     labelTitle.setText(book.title)

    24                     labelAuthor.setText(book.author)

    25                     labelDescription.setText(book.description)

    26                }

    27           }

    28      }

    ```


    Line 10 imports the `WatchKit` framework. This is necessary when dealing with
    any WatchKit class such as `WKInterfaceController` or `WKInterfaceLabel`. Line
    13 declares a new `WKInterfaceController` subclass called `DetailController`.
    Lines 14–16 create the label outlets you will be using to display the book information.
    Line 18 declares the `Book` property called `book`. Line 20 is the `awakeWithContext`
    method. It is passed an object called `context`, which is of type `Any`. This
    is where the `Book` object will be passed. Line 22 takes the context and assigns
    it to a `book` object. Lines 23–25 take the pieces of information from the book
    and assign them to the labels.


    You now need to add the following method to the `InterfaceController` class:


    ```

    override func contextForSegue(withIdentifier segueIdentifier: String,

    in table: WKInterfaceTable,

    rowIndex: Int) -> Any? {

    return myBookStore.bookList[rowIndex]

    }

    ```


    This method passes the book to the `DetailController` when it receives the `rowIndex`
    of the selected row. Now you need to create the interface. Select `Interface.storyboard`
    on the left side. Drag an Interface Controller from the Object Library to the
    storyboard as shown in Figure [15-24](#341013_5_En_15_Chapter.xhtml#Fig24).


