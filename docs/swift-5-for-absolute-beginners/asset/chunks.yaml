    `MasterViewController`——这是应用导航的起点。以下代码已经存在于 Xcode 提供的模板中。你只需对其进行修改以添加你的数据模型。


    首先，你需要修改 `MasterViewController.swift` 文件。需要添加一个变量来持有 `Bookstore` 对象。代码清单 8-13
    显示第 15 行将实例变量作为属性添加。


    ```

