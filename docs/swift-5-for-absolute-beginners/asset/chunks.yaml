- fmt: '### Comparing Dates


    Dates are a fairly complicated variable type in any language, and unfortunately,
    depending on the type of application you are writing, they are common. Swift 4
    has its own native `Date` type. The Swift `Date` class has a lot of nice methods
    that make comparing dates easy. We will focus on the `compare` function. The `compare`
    function returns a `ComparisonResult`, which has three possible values: `orderedSame`,
    `orderedDescending`, and `orderedAscending`.


    ```

    // Today''s Date

    let today: Date = Date()

    // Sale Date = Tomorrow

    let timeToAdd: TimeInterval = 60∗60∗24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    var saleStarted = false

    let result: ComparisonResult  = today.compare(saleDate)

    switch result {

    case ComparisonResult.orderedAscending:

    // Sale Date is in the future

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // Sale Start Date is in the past so sale is on

    saleStarted = true

    default:

    // Sale Start Date is now

    saleStarted = true

    }

    ```


    This may seem like a lot of work just to compare some dates. Let’s walk through
    the code and see whether you can make sense of it.


    ```

    let today: Date = Date()

    let timeToAdd: TimeInterval = 60∗60∗24

    let saleDate: Date = today.addingTimeInterval(timeToAdd)

    ```


    Here, you declare two different `Date` objects. The first one, named `today`,
    is initialized with the system date or your device date. Before creating the second
    date, you need to add some time to the first date. You do this by creating a `TimeInterval`.
    This is a number in seconds. To add a day, you add `60*60*24`. The second date,
    named `saleDate`, is initialized with a date sometime in the future. You will
    use this date to see whether this sale has begun. We will not go into detail about
    the initialization of `Date` objects.


    The result of using the `compare` function of a `Date` object is a `ComparisonResult`.
    You have to declare a `ComparisonResult` to capture the output from the `compare`
    function.


    ```

    let result = today.compare(saleDate)

    ```


    This simple compares the two dates. It places the resulting `ComparisonResult`
    into the constant called `result`.


    ```

    switch result {

    case ComparisonResult.orderedAscending:

    // Sale Date is in the future

    saleStarted = false

    case ComparisonResult.orderedDescending:

    // Sale Start Date is in the past so sale is on

    saleStarted = true

    default:

    // Sale Start Date is now

    saleStarted = true

    }

    ```


    Now you need to find out what value is in the variable `result`. To accomplish
    this, you perform a `switch` statement that compares the result to the three different
    options for `ComparisonResult`. The first line finds out whether the sale date
    is greater than today’s date. This means that the sale date is in the future,
    and thus the sale has not started. You then set the variable `saleStarted` to
    `false`. The next line finds out whether the sale date is less than today. If
    it is, the sale has started, and you set the `saleStarted` variable to `true`.
    The next line just says `default`. This captures all other options. You know,
    though, that the only other option is `orderedSame`. This means the two dates
    and times are the same, and thus the sale is just beginning.


    There are other methods that you can use to compare `Date` objects. Each of these
    methods will be more efficient at certain tasks. We have chosen the `compare`
    method because it will handle most of your basic date comparison needs.


    ### Note


    Remember that a `Date` holds both a date and a time. This can affect your comparisons
    with dates because it compares not only the date but also the time.


    ### Combining Comparisons


    As discussed in Chapter [4](#341013_5_En_4_Chapter.xhtml), you’ll sometimes need
    something more complex than a single comparison. This is where logical operators
    come in. Logical operators enable you to check for more than one requirement.
    For example, if you have a special discount for people who are members of your
    book club *and* who spend more than $30, you can write one statement to check
    this.


    ```

    var totalSpent = 31

    var discountThreshhold = 30

    var discountPercent = 0

    var clubMember = true

    if totalSpent > discountThreshhold && clubMember {

    discountPercent = 15

    }

    ```


    We have combined two of the examples shown earlier. The new comparison line reads
    as follows: “If `totalSpent` is greater than `discountThreshold` AND `clubMember`
    is `true`, then set the `discountPercent` to 15.” For this to return `true`, both
    items need to be true. You can use `||` instead of `&&` to signify “or.” You can
    change the previous line to this:


    ```

    if totalSpent > discountThreshhold || clubMember  {

    discountPercent = 15

    }

    ```


    Now this reads as follows: “If `totalSpent` is greater than `discountThreshold`
    ***OR*** `clubMember` is `true`, then set the discount percent to 15.” This will
    return `true` if either of the options is `true`.


    You can continue to use the logical operations to combine as many comparisons
    together as you need. In some cases, you may need to group comparisons using parentheses.


    ## Summary


    You’ve reached the end of the chapter! Here is a summary of the topics that were
    covered:


    *   *Comparisons*: Comparing data is an integral part of any application.

    *   *Relational operators*: You learned about the six standard relational operators
    and how each is used.

    *   *Numbers*: Numbers are the easiest pieces of information to compare. You learned
    how to compare numbers in your programs.

    *   *Examples*: You created a sample playground where you could test your comparisons
    and make sure that you are correct in your logic. Then you learned how to change
    the playground to add different types of comparisons.

    *   *Boolean*: You learned how to check Boolean values.

    *   *Strings*: You learned how strings behave differently from other pieces of
    information you have tested.

    *   *Dates*: You learned how difficult it can be to compare dates and that you
    must be careful to make sure you are getting the response you desire.


    ### Exercises


    *   Modify the example playground to compare some string information.

    *   Write a Swift application that determines whether the following years are
    leap years: 1800, 1801, 1899, 1900, 2000, 2001, 2003, and 2010\. Output should
    be written to the console in the following format: `The year 2000 is a leap year`
    or `The year 2001 is not a leap year`. See [`http://en.wikipedia.org/wiki/Leap_year`](http://en.wikipedia.org/wiki/Leap_year)
    for information on determining whether a year is a leap year.


    # Creating User Interfaces


    Interface Builder enables iOS developers to easily create their user interfaces
    using a powerful graphical user interface. It provides the ability to build user
    interfaces by simply dragging objects from Interface Builder’s library to the
    editor.


    Interface Builder stores your user interface design in one or more resource files,
    called storyboards. These resource files contain the interface objects, their
    properties, and their relationships.


    To build a user interface, simply drag objects from Interface Builder’s Object
    Library pane onto your view or scene. Actions and outlets are two key components
    of Interface Builder that help you streamline the development process.


    Your objects trigger actions in your views, and the actions are connected to your
    methods in the app’s code. Outlets are declared in your `.swift` file and are
    connected to specific controls as properties. See Figure [10-1](#341013_5_En_10_Chapter.xhtml#Fig1).


    ### Note


    Interface Builder was once a stand-alone application that developers used to design
    their user interfaces. Starting with Xcode 4.0, Interface Builder has been integrated
    into Xcode.


    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig1_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig1_HTML.jpg)


    Figure 10-1. Interface Builder'
