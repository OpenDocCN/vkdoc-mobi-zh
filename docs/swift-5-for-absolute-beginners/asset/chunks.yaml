- fmt: '### Hexadecimal


    Often, it will be necessary to represent characters in another format that is
    recognized by computers, namely, the hexadecimal format. The hex format is simply
    a “compressed” version of binary, where instead of eight characters used to represent
    a byte (eight bits), you can use two characters, for example, `00` or `2A` or
    `FF`. You will encounter hexadecimal numbers when you are debugging your apps.
    The *hexadecimal* system is a base-16 number system. It uses 16 distinct symbols:
    0 to 9 to represent the values 0 to 9 and A to F to represent the values 10 to
    15. For example, the hexadecimal number `2AF3` is equal in decimal to `(2 × 16³)
    + (10 × 16²) + (15 × 16¹) + (3 × 16⁰)`, or 10,995. You may want to play with the
    Mac Calculator application in Programmer mode to see how hex relates to decimal
    and binary.


    Figure [3-2](#341013_5_En_3_Chapter.xhtml#Fig2) shows the ASCII table of characters.
    Because one byte can represent 256 characters, this works well for Western characters.
    For example, hexadecimal `20` represents a space. Hexadecimal `7D` represents
    a right curly brace (`}`). You can also see this by playing with the Mac Calculator
    app in Programmer mode as it can convert numerical values to ASCII.


    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig2_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig2_HTML.jpg)


    **Figure 3-2** ASCII characters


    ### Unicode


    Representing characters with a byte worked well for computers until about the
    1990s, when the personal computer became widely adopted in non-Western countries
    where languages have more than 256 characters. Instead of a one-byte character
    set, Unicode can have up to a four-byte character set.


    To facilitate faster adoption, the first 256 code points are identical to the
    ASCII character table. Unicode can have different character encodings. The most
    common encoding used for Western text is called UTF-8. The “8” is how many bits
    are used per character, so it’s one byte per character, like ASCII.


    As an iPhone developer, you will probably use this character encoding the most.


    ## Data Types


    Now that we’ve discussed how computers store data, we will cover an important
    concept called *data types*. Humans can generally just look at data and the context
    in which it is being used to determine what type of data it is and how it will
    be used. Computers need to be told how to do this. So, the programmer needs to
    tell the computer the type of data it is being given. Here’s an example: `2 +
    2 = 4`.


    The computer needs to know you want to add two numbers together. In this example,
    they are integers. You might first believe that adding these numbers is obvious
    to even the most casual observer, let alone a sophisticated computer. However,
    it is common for users of iOS apps to store data as a series of characters, not
    a calculation. For example, a text message might read “Everyone knows that 2 +
    2 = 4.”


    In this case, the example is a series of characters called a *string*. A data
    type is simply the declaration to your program that defines the data you want
    to store. A *variable* is used to store your data and is declared with an associated
    data type. All data is stored in a variable, and the variable has to have a variable
    type. For example, in Swift, the following are variable declarations with their
    associated data types:


    ```

    var x: Int = 10

    var y: Int = 2

    var z: Int = 0

    var submarineName: String = "USS Nevada SSBN-733"

    ```


    Data types cannot be mixed with one another. You cannot do the following:


    ```

    z = x + submarineName

    ```


    Mixing data types will cause either compiler warnings or compiler errors, and
    your app will not run.


    Table [3-5](#341013_5_En_3_Chapter.xhtml#Tab5) gives examples of the basic data
    types in Swift.


    **Table 3-5** Swift Data Types


    | Type | Examples |

    | --- | --- |

    | `Int` | 1, 5, 10, 100 |

    | `Float` or `Double` | 1.0, 2.222, 3.14159 |

    | `Bool` | `true`, `false` |

    | `String` | `"Star Wars"`, `"Star Trek"` |

    | `ClassName` | `UIView`, `UILabel`, and so on |


    ## Declaring Constants and Variables


    Swift constants and variables must be declared before they are used. You declare
    constants with the `let` keyword and variables with the `var` keyword. Constants
    never change after they have been initialized, but variables can be changed as
    many times as needed.


    There are two ways to declare constant and variable types: **explicitly** and
    **implicitly**.


    Here is the syntax for declaring a variable’s type **explicitly**:


    ```

    var name: type = value

    var firstNumber: Int = 5

    ```


    However, declaring the type is often unnecessary. Declaring the type implicitly
    shortens the code and makes it easier to type and ultimately maintain.


    Here is the syntax for declaring a variable’s type **implicitly**:


    ```

    var name = value

    var firstNumber = 5

    ```


    You can use implicit most of the time because Swift is smart enough to figure
    out what the variable is by what you assign to it.


    If a variable isn’t going to change, you should declare it as a *constant*. Constants
    never change. Constants start with the keyword `let`, as shown here:


    ```

    let secondNumber = 10

    ```


    To best understand how variables and constants are declared, here are two examples:


    ```

    let maximumNumberOfStudents = 30

    var currentNumberOfStudents = 5

    ```


    This code can be read as follows: “Declare a new constant called `maximumNumberOfStudents`,
    and give it a value of 30. Then, declare a new variable called `currentNumberOfStudents`,
    and give it an initial value of 5.”


    In this example, the maximum number of students is declared as a constant because
    the maximum value never changes. The current number of students is declared as
    a variable because this value must be incremented or decremented after the student
    enrollment changes.


    Most data you will use in your programs can be classified into four different
    kinds—Booleans, numbers, strings, and objects. We will discuss how to work with
    numbers and object data types in the remainder of this chapter. In Chapter [4](#341013_5_En_4_Chapter.xhtml),
    we will talk more about Boolean data types when you learn how to write apps with
    decision making.


    ### Note


    *Localizing* your app is the process of writing your app so users can buy and
    use it in their native language. This process is too advanced for this book, but
    it is a simple one to complete when you plan from the beginning. Localizing your
    app greatly expands the total number of potential customers and revenue for your
    app without your having to rewrite it for each language. Be sure to localize your
    app. It is not hard to do and can easily double or triple the number of people
    who buy it. For more information on localizing your app, visit Apple’s “Build
    Apps for the World” site: [`https://developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/).'
