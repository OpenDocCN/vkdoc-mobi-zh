  trans: '

    # 存储注意事项


    Mac 和 iPhone 在存储方面存在一些主要差异，这些差异会影响你处理数据的方式。我们首先讨论 Mac 以及你需要如何为其进行开发。


    在 Mac 上，默认情况下，应用程序存储在 `Applications` 文件夹中。每个用户都有自己的个人文件夹，用于存储与该用户相关的偏好设置和信息。并非所有用户都有权限写入
    `Applications` 文件夹或应用程序包本身。


    在 iPhone 和 iPad 上，开发者无需处理不同用户的问题。每个使用 iPhone 的人都拥有相同的权限和相同的文件夹。不过，iPhone 还有其他一些因素需要考虑。iOS
    设备上的每个应用程序都位于自己的沙盒中。这意味着一个应用写入的文件只能被该应用本身查看和使用。这为 iPhone、iPad、Apple TV 和 Apple
    Watch 提供了更安全的环境，但也带来了处理数据存储方式的某些变化。


    ## 警告


    敏感数据不应在未进行额外加密的情况下存储在偏好设置文件或数据库中。幸运的是，Apple 提供了一种存储敏感信息的方法，称为钥匙串。在钥匙串中保护数据超出了本书的讨论范围。


    ## 说明


    对于 macOS，偏好设置文件名为 `com.yourcompany.applicationname.plist`，位于 `/Users/username/Library/Preferences`
    文件夹中。在 iOS 上，偏好设置文件位于应用程序容器内的 `/Library/Preferences` 文件夹中。


    要写入偏好设置，你需要创建一个 `UserDefaults` 对象。这通过以下代码行完成：


    ```

    var prefs: UserDefaults = UserDefaults.standard

    ```


    这会实例化 `prefs` 对象，以便你使用它来设置偏好值。接下来，你需要为要保存的值设置偏好键。本章将使用 `BookStore` 应用示例来演示具体说明。在经营书店时，你可能希望将用户名保存在偏好设置中。你还可能希望保存诸如默认图书类别或最近搜索之类的信息。偏好设置文件是存储这类信息的绝佳位置，因为这类信息只需要在应用程序启动时读取。


    此外，在 iOS 上，通常需要保存当前状态。如果某人正在使用你的应用，然后接到一个电话，你希望能在他们通话结束后，将他们带回应用中之前所处的确切位置。随着多任务处理的实现，这已经不那么必要了，但如果你的应用能记住他们上次在使用时正在做什么，用户仍然会对此表示赞赏。


    一旦你实例化了对象，就可以调用 `set(_:forKey:)` 来设置一个对象。如果你想要保存用户名 `sherlock.holmes`，你可以调用以下代码行：


    ```

    prefs.set("sherlock.holmes", forKey: "username")

    ```


    过一段时间后，你的应用会自动将更改写入偏好设置文件。你可以通过调用 `synchronize` 函数来强制应用保存偏好设置，但这仅在你无法等待下一个同步间隔时使用，例如你的应用即将退出时。要调用
    `synchronize` 函数，你可以编写以下代码行：


    ```

    prefs.synchronize()

    ```


    只需三行代码，你就能创建一个偏好对象，设置一个偏好值，并写入偏好设置文件。这是一个简单且干净的过程。以下是所有代码：


    ```

    let prefs: UserDefaults = UserDefaults.standard

    prefs.set("sherlock.holmes", forKey: "username")

    prefs.set(10, forKey: "booksInList")

    prefs.synchronize()

    ```


    ## 数据库


    你已经学会了如何存储一些零散信息并在之后检索它们。如果你有更多需要存储的信息怎么办？如果你需要在这些信息中进行搜索或对其进行某种排序怎么办？这类情况就需要使用数据库。


    数据库是一种以易于搜索或检索的方式存储大量信息的工具。从数据库读取数据时，返回的是数据片段，而不是整个文件。你日常生活中使用的许多应用程序都基于某种数据库。你的网上银行应用从数据库中检索你的账户活动。你的超市使用数据库来检索不同商品的价格。数据库的一个简单示例是电子表格。你的电子表格中可能有很多列和很多行。电子表格中的列代表你要存储的不同类型的信息。在数据库中，这些被视为属性。电子表格中的行则被视为数据库中的不同记录。


    ## 在数据库中存储信息


    数据库对开发者来说通常是一个令人生畏的主题；大多数开发者会将数据库与企业级数据库服务器（如 Microsoft SQL Server 或 Oracle）联系在一起。这些应用程序需要花费时间来设置，并且需要持续管理。对于大多数开发者来说，像
    Oracle 这样的数据库系统可能过于庞大。幸运的是，Apple 在 iOS、macOS 和 tvOS 中内置了一个小巧高效的数据库引擎，名为 SQLite。这让你能够获得复杂数据库服务器的许多特性，而无需承担其开销。


    SQLite 将为你在应用中存储信息提供极大的灵活性。它将整个数据库存储在一个单一文件中。它快速、可靠，并且易于在你的应用中实现。SQLite 数据库的最大优点在于无需安装任何软件；Apple
    已经为你处理好了一切。


    然而，SQLite 确实存在一些限制，作为开发者你应该了解：


    *   SQLite 被设计为单用户数据库。你不应在需要多人同时访问同一数据库的环境中使用 SQLite，这可能导致数据丢失或损坏。


    *   在企业环境中，数据库可能变得非常庞大。数据库管理员处理高达半 TB 大小的数据库并不罕见，在某些情况下数据库甚至可能变得更大。SQLite 应该能够无问题地处理较小的数据库，但如果你的数据库开始变得过大，你就会开始遇到性能问题。


    *   SQLite 缺乏企业级数据库解决方案中的一些备份和数据恢复功能。


    就本章而言，你将专注于使用 SQLite 作为数据库引擎。如果你正在开发的应用程序中存在上述任何限制，你可能需要考虑企业级数据库解决方案，但此方案超出了本书的讨论范围。


    ### 说明


    SQLite（发音为“sequel-lite”）的名称来源于结构化查询语言（SQL，发音为“sequel”）。SQL 是用于向数据库输入、搜索和检索数据的语言。


    Apple 已经努力解决了数据库开发中的许多挑战。作为开发者，你无需熟悉 SQL，因为 Apple 已经通过一个名为 Core Data 的框架为你处理了直接的数据库交互，这使得与数据库的交互变得容易得多。Core
    Data 是 Apple 从 NeXT 的产品 Enterprise Object Framework 改编而来的，使用 Core Data 比直接与 SQLite
    数据库交互要容易得多。通过 SQL 直接访问数据库超出了本书的讨论范围。'
- fmt: "# Getting Started with Core Data\n\nLet’s start by creating a new Core Data\
    \ project.\n\n1.  Open Xcode and select File ➤ New ➤ Project. To create an iOS\
    \ Core Data project, select iOS from the menu on the top. Then select Single View\
    \ App, as shown in Figure [11-1](#341013_5_En_11_Chapter.xhtml#Fig1).\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig1_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig1_HTML.jpg)\n\
    \n    Figure 11-1. Creating a new project\n\n2.  Click the Next button when you’re\
    \ done. The next screen will allow you to enter the name you want to use. For\
    \ the purposes of this chapter, you will use the name `BookStore`.\n\n3.  Near\
    \ the bottom, you will see the check box called Use Core Data. Make sure this\
    \ is checked and then click Next, as shown in Figure [11-2](#341013_5_En_11_Chapter.xhtml#Fig2).\n\
    \n    **Note** Core Data can be added to any project at any point. Checking that\
    \ box when creating a project will add the Core Data frameworks and a default\
    \ data model to your application. If you know you are going to use Core Data,\
    \ checking this box will save you time.\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig2_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig2_HTML.jpg)\n\
    \n    Figure 11-2. Adding Core Data to your project\n\n4.  Select a location to\
    \ save the project and click Create.\n\nOnce you are done with that, your new\
    \ project will open. It will look similar to a standard application, except now\
    \ you will have a `BookStore.xcdatamodeld` file. This file is called a *data model*\
    \ and will contain the information about the data that you will be storing in\
    \ Core Data.\n\n## The Model\n\nClick the model file (`BookStore.xcdatamodeld`)\
    \ to open it. You will see a window similar to the one shown in Figure [11-3](#341013_5_En_11_Chapter.xhtml#Fig3).\n\
    \n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig3_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3. The blank model\n\nThe window is divided into two sections. On\
    \ the left, you have your entities. In more common terms, these are the objects\
    \ or items that you want to store in the database. Fetch Requests and Configurations\
    \ are beyond the scope of this book and could be covered in a more deep investigation\
    \ of CoreData. Fetch Requests allow you to create filters or queries for your\
    \ data.\n\nThe right section will contain the entity’s attributes once a new Entity\
    \ has been created. Attributes are pieces of information about the entities. For\
    \ example, a book would be an entity, and the title of the book would be an attribute\
    \ of that entity.\n\n### Note\n\nIn database terms, entities are your *tables*,\
    \ and the attributes of the entities are called *columns*. The objects created\
    \ from those entities are referred to as *rows*.\n\nThe panel on the right will\
    \ also show you all the relationships of an entity once one has been created.\
    \ A relationship connects one entity to another. For example, you will create\
    \ a `Book` entity and an `Author` entity. You will then relate them so that every\
    \ book can have an author.\n\nLet’s create an entity.\n\n1.  Click the Add Entity\
    \ button on the bottom of the window, or select Editor ➤ Add Entity from the menu,\
    \ as shown in Figure [11-4](#341013_5_En_11_Chapter.xhtml#Fig4).\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig4_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig4_HTML.jpg)\n\
    \n    Figure 11-4. Adding a new entity\n\n2.  On the left side, double-click the\
    \ Entity name and change the name to `Book`.\n\n    **Note** You must capitalize\
    \ your entities’ names.\n\n3.  Now let’s add some attributes. Attributes would\
    \ be considered the details of a book, so you will store the title, author, price,\
    \ and year the book was published. Obviously, in your own applications, you may\
    \ want to store more information, such as the publisher, page count, and genre,\
    \ but you want to start simple. Click the Add Attribute button at the bottom right\
    \ of the window, or select Editor ➤ Add Attribute, as shown in Figure [11-5](#341013_5_En_11_Chapter.xhtml#Fig5).\
    \ If you do not see the option to add an attribute, make sure you have selected\
    \ the `Book` entity on the left side.\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig5_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig5_HTML.jpg)\n\
    \n    Figure 11-5. Adding a new attribute\n\n4.  You will be given only two options\
    \ for your attribute: the name and the data type. Let’s call this attribute `title`.\
    \ Unlike entities, attribute names must be lowercase.\n\n5.  Now, you will need\
    \ to select a data type. Selecting the correct data type is important. It will\
    \ affect how your data is stored and retrieved from the database. The list has\
    \ 13 items in it and can be daunting. We will discuss the most common options\
    \ and, as you become more familiar with Core Data, you can experiment with the\
    \ other options. The most common options are `String`, `Integer 32`, `Decimal`,\
    \ and `Date`. For the title of the book, select `String`.\n\n    - `String`: This\
    \ is the type of attribute used to store text. This should be used to store any\
    \ kind of information that is not a number or a date. In this example, the book\
    \ title and author will be strings.\n    - `Integer 32`: There are three different\
    \ integer values possible for an attribute. Each of the integer types differs\
    \ only in the minimum and maximum values possible. `Integer 32` should cover most\
    \ of your needs when storing an integer. An integer is a number without a decimal.\
    \ If you try to save a decimal in an integer attribute, the decimal portion will\
    \ be truncated. In this example, the year published will be an integer.\n    -\
    \ `Decimal`: A decimal is a type of attribute that can store numbers with decimals.\
    \ A decimal is similar to a double attribute, but they differ in their minimum\
    \ and maximum values and precision. A decimal should be able to handle any currency\
    \ values. In this example, you will use a decimal to store the price of the book.\n\
    \    - `Date`: A date attribute is exactly what it sounds like. It allows you\
    \ to store a date and time and then performs searches and lookups based on these\
    \ values. You will not use this type in this example.\n\n6.  Let’s create the\
    \ rest of the attributes for the book. Now, add `price`. It should be a `Decimal`.\
    \ Add the year the book was published. For two-word attributes, it is standard\
    \ to make the first word lowercase and the second word start with a capital letter.\
    \ For example, an ideal name for the attribute for the year the book was published\
    \ would be `yearPublished`. Select `Integer 32` as the attribute type. Once you\
    \ have added all of your attributes, your screen should look like Figure [11-6](#341013_5_En_11_Chapter.xhtml#Fig6).\n\
    \n### Note\n\nAttribute names cannot contain spaces.\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig6_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig6_HTML.jpg)\n\
    \nFigure 11-6. The finished Book entity"
