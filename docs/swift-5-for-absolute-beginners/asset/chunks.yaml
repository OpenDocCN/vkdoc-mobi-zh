- fmt: '### Note


    Even if we’ve mentioned it already, it is worth saying again: You will learn Swift
    programming by reading this book, but you will *really* learn Swift by writing
    and debugging your code. Debugging is where developers learn and become great
    developers.


    Let’s add a line of code to see the power of Swift playgrounds. Add the following
    code at the end of the file, on line 4:


    ```

    print(str)

    ```


    As soon as you enter the line of code, Xcode automatically executes the line and
    shows the result, `"Hello, playground\n"`.


    When you write Swift code, everything is important—commas, capitalization, and
    parentheses. The collection of rules that enable the compiler to compile your
    code to an executable app is called *syntax*.


    Line 3 creates a string variable called `str` and assigns `"Hello, playground"`
    to the variable.


    Line 4 prints the `str` string variable to the Results Area.


    Let’s create a syntax error by changing line 4 to `print(stz)` as shown in Figure
    [2-9](#341013_5_En_2_Chapter.xhtml#Fig9).


    ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig9_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig9_HTML.jpg)


    Figure 2-9.


    The playground with a syntax error caught by the Swift compiler


    In Swift, `print` is a function that will print the contents of its parameters
    in the Results area. As you enter code, the Results area automatically updates
    with the results for each line of code that you entered.


    Now, let’s fix the app by spelling the `str` variable correctly, as shown in Figure
    [2-10](#341013_5_En_2_Chapter.xhtml#Fig10).


    ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig10_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig10_HTML.jpg)


    Figure 2-10.


    Syntax error fixed


    Feel free to play around and change the text that is printed. You may want to
    add multiple variables or add two strings together. Have fun!


    ## Summary


    In this chapter, you built your first basic Swift playground. We also covered
    new Xcode terms that are key to your understanding of Swift.


    The concepts that you should understand are as follows:


    *   Playground


    *   Editor area


    *   Results area


    ### Exercise


    *   Extend your playground by adding a line of code that prints any text of your
    choosing.


    # 3. It’s All About the Data


    As you probably know, data is stored as zeros and ones in your computer’s memory.
    However, zeros and ones are not very useful to developers or app users, so you
    need to know how your program uses data and how to work with the data that is
    stored.


    In this chapter, you look at how data is stored on computers and how you can manipulate
    that data. You then use playgrounds to learn more about data storage.


    ## Numbering Systems Used in Programming


    Computers work with information differently than humans do. This section covers
    the various ways information is stored, tallied, and manipulated by devices such
    as your iPhone and iPad.


    ### Bits


    A *bit* is defined as the basic unit of information used by computers to store
    and manipulate data. A bit has a value of either **0** or **1**. When computers
    were first introduced, transistors and microprocessors didn’t exist. Data was
    manipulated and stored by vacuum tubes being turned on or off. If the vacuum tube
    was on, the value of the bit was `1`; and if the vacuum tube was off, the value
    was `0`. The amount of data a computer was able to store and manipulate was directly
    related to how many vacuum tubes the computer had.


    The first recognized computer was called the Electronic Numerical Integrator and
    Computer (ENIAC). It took up more than 136 square meters and had 18,000 vacuum
    tubes. It was about as powerful as your handheld calculator.


    Today, computers use transistors to store and manipulate data. The power of a
    computer processor depends on how many transistors are placed on its chip or CPU.
    Like the vacuum tube, transistors have an off or on state. When the transistor
    is off, its value is `0`. If the transistor is on, its value is `1`. At the time
    of this writing, Apple’s A12 Bionic processor that powers the iPhone XS, iPhone
    XS Max, and iPhone XR, is a 6-core ARM processor with approximately 6.9 billion
    transistors, up from 149 million transistors within the A4 from the first iPad.
    Figure [3-1](#341013_5_En_3_Chapter.xhtml#Fig1) shows Apple’s latest iPhone processor,
    the A12 Bionic.


    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig1_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Apple’s proprietary A12 Bionic processor


    #### Moore’s Law


    The number of transistors within your iPhone’s or iPad’s processor is directly
    related to your device’s processing speed, graphics performance, memory capacity,
    and the sensors (accelerometer, gyroscope) available in the device. The more transistors
    there are, the more powerful your device is.


    In 1965, the cofounder of Intel, Gordon E. Moore, described the trend of transistors
    in a processor. He observed that the number of transistors in a processor doubled
    every 18 months from 1958 to 1965 and would likely continue “for at least 18 months.”
    The observation became famously known as Moore’s Law and has proven accurate for
    more than 60 years.


    ### Note


    There is a downside to Moore’s Law, and you have probably felt it in your wallet.
    The problem with rapidly increasing processing capability is that it renders technology
    obsolete quickly. So, when your iPhone’s two-year cell phone contract is up, the
    new iPhones on the market will be twice as powerful as the iPhone you had when
    you signed up. How convenient for everyone!


    ### Bytes


    A byte is another unit used to describe information storage on computers. A ***byte***
    is composed of eight bits. Whereas a bit can represent up to two different values,
    a byte can represent up to 2⁸, or 256, different values. A byte can contain values
    from `0` to `255`.


    The ***binary*** number system represents the numerical symbols `0` and `1`. To
    illustrate how the number **71** would be represented in binary, you can use a
    simple table of eight bits (1 byte), with each bit represented as a power of two.
    To convert the byte value **01000111** to decimal, simply add up the on bits,
    as shown in Table [3-1](#341013_5_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    The Number 71 Represented As a Byte (64 + 4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 1 | 0 | 0 | 0 | 1 | 1 | 1 |


    To represent the number **22** in binary, turn on the bits that add up to 22,
    or **00010110**, as shown in Table [3-2](#341013_5_En_3_Chapter.xhtml#Tab2).


    Table 3-2


    The Number 22 Represented As a Byte (16 + 4 + 2)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 1 | 0 | 1 | 1 | 0 |


    To represent the number **255** in binary, turn on the bits that add up to 255,
    or **11111111**, as shown in Table [3-3](#341013_5_En_3_Chapter.xhtml#Tab3).


    Table 3-3


    The Number 255 Represented As a Byte (128 + 64 + 32 + 16 + 8 + 4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 1 | 1 | 1 | 1 | 1 | 1 | 1 | 1 |


    To represent the number **0** in binary, turn on the bits that add up to 0, or
    **00000000**, as shown in Table [3-4](#341013_5_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    The Number 0 Represented As a Byte


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 0 | 0 | 0 | 0 | 0 |'
