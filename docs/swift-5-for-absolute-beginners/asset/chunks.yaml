    ## Using the Dictionary Class


    The Swift `Dictionary` class is also a useful type of collection class. It allows
    the storage of objects, just like the `Array` class, but `Dictionary` is different
    in that it allows a key to be associated with the entry. For example, you could
    create a dictionary that stores a list of attributes about someone such as a `firstName`,
    `lastName`, and so on. Instead of accessing the attributes with an index like
    with an array, the dictionary could use a `String` like `"firstName"`. However,
    all keys must be unique—that is, `"firstName"` cannot exist more than once. Depending
    on your program, finding unique names is normally not a problem.


    Here’s an example of how you create a dictionary:


    ```

    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    ```


    This creates a simple dictionary called `person`. The next part of the declaration
    tells the dictionary what kinds of objects the keys and the values will be. In
    this case, the keys are `String`s, and the values are `String`s. You then add
    two keys to the dictionary. The first key is `firstName`, and that key has a value
    of `John`. The second key is `lastName`, and that has a value of `Doe`. You can
    access the values in the dictionary by using a similar notation to arrays.


    ```

    print(person["firstName"])

    ```


    This code will print the name `Optional("John")` since that is the value for the
    key `firstName`. The `Optional` appears in the previous example because the value
    of a key in a dictionary is an optional value. You can use the same style of code
    to change the values in a dictionary. Let’s say, for this example, that John now
    likes to go by Joe instead. You can change the value in the dictionary with a
    simple line of code.


    ```

    person["firstName"] = "Joe"

    ```


    You can add a new key to a dictionary with the same notation.


    ```

    person["gender"] = "Male"

    ```


    If you decide you want to remove a key from a dictionary, such as the `gender`
    key you just added, you can do so by setting the value of that key to `nil`.


    ```

    person["gender"] = nil

    ```


    Now the dictionary will contain only `firstName` and `lastName`. Remember that
    dictionaries are not ordered. You cannot rely on the order, but there will be
    times when you need to iterate over a dictionary. This is done in a manner similar
    to arrays. The main difference is that in an array, you assign one variable, while
    in a dictionary, you need to assign the key and the value. See Listing [8-7](#341013_5_En_8_Chapter.xhtml#PC16).


    ```

    1    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    2    for (myKey, myValue) in person {

    3         print(myKey + ": " + myValue)

    4    }

    ```


    This example will print the following:


    ```

    firstName: John

    lastName: Doe

    ```


    Dictionaries are a great way to organize data that does not need to be ordered.
    It is also a great way to look up data based on a certain key. They are very flexible
    in Swift and should be used to organize and optimize your code.


