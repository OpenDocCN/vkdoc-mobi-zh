- fmt: "# Properties\n\nListing [7-1](#341013_5_En_7_Chapter.xhtml#PC3) shows a sample\
    \ class with two different properties: `name` and `frequency`. Line 1 imports\
    \ the `UIKit` class definitions (more on that in a bit) since this is the default\
    \ import added by Xcode when a new class is created. Line 3 starts the definition\
    \ of the class by defining its name (sometimes called the *type*). Lines 5 and\
    \ 6 define a couple of properties for the `RadioStation` class.\n\nWhenever the\
    \ `RadioStation` class is instantiated, the resulting `RadioStation` object has\
    \ access to these properties, which are only for specific instances. If there\
    \ are ten `RadioStation` objects, each object has its own variables independent\
    \ of the other objects. This is also referred to as *scope*, in that the object’s\
    \ variables are within the scope of each object.\n\nLines 13–19 also contain properties.\
    \ These properties are preceded by the word `static`. This means this value belongs\
    \ to a class and every object will maintain the same exact value of these properties.\n\
    \n# Methods\n\nAlmost every object has methods. In Swift, the most common way\
    \ to interact with an object is by calling a method, like so:\n\n```\nmyStation.isBandFM()\n\
    ```\n\nThe preceding line will call a method named `isBandFM` on an instance of\
    \ the `RadioStation` class object.\n\nMethods can also have parameters passed\
    \ along with them. Why pass parameters? Parameters are passed for several reasons.\
    \ First (and most common), the range of possibilities is too large to write as\
    \ separate methods. Second, the data you need to store in your object is variable—like\
    \ a radio station’s name. In the following example, you will see that it isn’t\
    \ practical to write a method for every possible radio frequency; instead, the\
    \ frequency is passed as a parameter. The same applies to the station name.\n\n\
    ```\nmyStation.setFrequency(104.7)\n```\n\nThe method name is `setFrequency`.\
    \ Method calls can have several parameters, as the following example illustrates:\n\
    \n```\nmyStation = RadioStation.init(name: \"KZZP\", frequency: 104.7)\n```\n\n\
    In the preceding example, the method call consists of two parameters: the station\
    \ name and its frequency. What’s interesting about Swift relative to other languages\
    \ is that the methods contain named parameters. If this were a C++ or Java program,\
    \ the call would be as follows:\n\n```\nmyObject = new RadioStation(\"KZZP\",\
    \ 104.7)\n```\n\nWhile a `RadioStation` object’s parameters might seem obvious,\
    \ having named parameters can be a bonus because they more or less state what\
    \ the parameters are.\n\n## Using Type Methods\n\nA class doesn’t always have\
    \ to be instantiated to be used. In some cases, classes have methods that can\
    \ actually perform some simple operations and return values before a class is\
    \ instantiated. These methods are called *type methods*. In Listing [7-1](#341013_5_En_7_Chapter.xhtml#PC3),\
    \ the method names that start with `static` are type methods.\n\nType methods\
    \ have limitations. One of their biggest limitations is that none of the instance\
    \ variables can be used. Being unable to use instance variables makes sense since\
    \ you haven’t instantiated anything. A type method can have its own local variables\
    \ within the method itself but can’t use any of the variables defined as instance\
    \ variables.\n\nA call to a type method would look like this:\n\n```\nRadioStation.minAMFrequency()\n\
    ```\n\nNotice that the call is similar to how a method is called on an instantiated\
    \ object. The big difference is that instead of an instance variable, the *class\
    \ name* is used. Type methods are used quite extensively in the macOS and iOS\
    \ frameworks. They are used mostly for returning some fixed or well-known type\
    \ of value or to return a new instance of an object. These types of type methods\
    \ are referred to as *initializers*. Here are some initializer method examples:\n\
    \n```\n1.  Date.addingTimeInterval()  // Returns a Date\n2.  String(format:\"\
    http://%@\", \"www.apple.com\")    // Returns a new String object\n3.  Dictionary()\
    \                   // Returns a new Dictionary object.\n```\n\nAll of the preceding\
    \ messages are Type Methods being called.\n\nLine 1 simply returns a value that\
    \ represents the number of seconds since January 1, 2001, which is the reference\
    \ date.\n\nLine 2 returns a new `String` object that has been formatted and has\
    \ a value of `http://1000`.\n\nLine 3 is a form that is commonly used because\
    \ it actually allocates a new object. Typically, the line is not used by itself,\
    \ but in a line like this:\n\n```\nvar myDict = Dictionary()\n```\n\nSo, when\
    \ would you use a type method? As a general rule, if the method returns information\
    \ that is *not* specific to any particular instance of the class, make the method\
    \ a type method. For example, the `minAMFrequency` in the preceding example would\
    \ be the same for all instances of any `RadioStation`.\n\nObject—this is a great\
    \ candidate for a type method. However, the station’s name or its assigned frequency\
    \ would be different for each instance of the class. These should not (and indeed\
    \ could not) be type methods. The reason for this is that type methods cannot\
    \ use any of the instance variables defined by the class.\n\n## Using Instance\
    \ Methods\n\nInstance methods (lines 29–35 in Listing [7-1](#341013_5_En_7_Chapter.xhtml#PC3))\
    \ are available only once a class has been instantiated. Here’s an example:\n\n\
    ```\n1   var myStation: RadioStation         // This declares a variable to hold\
    \ the RadioStation object.\n2   myStation = RadioStation()          // This creates\
    \ a new RadioStation object.\n3   var band = myStation.band()         // This\
    \ method returns the Band of the RadioStation.\n```\n\nLine 3 calls a method on\
    \ the `RadioStation` object. The method `band` returns a 1 for FM and a 0 for\
    \ AM. An instance method is any method that does not contain the class declaration\
    \ before it.\n\n# Using Your New Class\n\nYou’ve created a simple `RadioStation`\
    \ class, but by itself it doesn’t accomplish a whole lot. In this section, you\
    \ will create the `Radio` class and have it maintain a list of `RadioStation`\
    \ classes.\n\n## Creating Your Project\n\nLet’s start Xcode and create a new project\
    \ named `RadioStations`.\n\n1. Launch Xcode and select “Create a new Xcode project.”\n\
    \n2. Make sure you choose an iOS application and select the Single View App template,\
    \ as shown in Figure [7-1](#341013_5_En_7_Chapter.xhtml#Fig1).\n\n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig1_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig1_HTML.jpg)\n\
    \n   Figure 7-1\n   Selecting a template in the new project window\n\n3. Once\
    \ you’ve selected the template, click the Next button.\n\n4. Set the product name\
    \ (application name) to `RadioStations`.\n\n5. Set the company identifier (a pretend\
    \ company will do) and set the device family to iPhone (as shown in Figure [7-2](#341013_5_En_7_Chapter.xhtml#Fig2)).\
    \ Make sure Swift is selected in the Language drop-down list.\n\n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig2_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig2_HTML.jpg)\n\
    \n   Figure 7-2\n   Naming the new iOS application\n\n6. Click the Next button,\
    \ and Xcode will ask you where you want to save your new project. You can save\
    \ the project on your desktop or anywhere in your home folder. Once you’ve made\
    \ your choice, simply click the Create button.\n\n7. Once you’ve clicked the Create\
    \ button, the Xcode workspace window should be visible, as shown in Figure [7-3](#341013_5_En_7_Chapter.xhtml#Fig3).\n\
    \n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig3_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig3_HTML.jpg)\n\
    \n   Figure 7-3\n   The workspace window in Xcode"
