- fmt: "### Flowcharting\n\nAfter the design requirements discussed in previous chapters\
    \ are finalized, you can create pseudocode sections of your app to solve complex\
    \ development issues. **Flowcharting** is a common method of diagramming an algorithm.\
    \ An algorithm is represented as different types of boxes connected by lines and\
    \ arrows. Developers often use flowcharting to express code visually, as shown\
    \ in Figure [4-1](#341013_5_En_4_Chapter.xhtml#Fig1).\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. Sample flowchart showing common figures and their associated names\n\
    \nFlowcharts should always have a start and a stop. Branches should never come\
    \ to an end without a stop. This helps developers make sure all of the branches\
    \ in their code are accounted for and that they cleanly stop execution.\n\n###\
    \ Designing and Flowcharting an Example App\n\nWe have covered a lot of information\
    \ about decision making and program flow. It’s time to do what programmers do\
    \ best: write apps!\n\nThe app you have been assigned to write generates a random\
    \ number between 0 and 100 and asks the user to guess the number. Users have to\
    \ do this until the number is guessed. When users guess the correct answer, they\
    \ will be asked if they want to play again.\n\n### The App’s Design\n\nUsing your\
    \ design requirements, you can make a flowchart for your app. See Figure [4-2](#341013_5_En_4_Chapter.xhtml#Fig2).\n\
    \n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. Flowchart for guessing a random number app\n\nReviewing Figure [4-2](#341013_5_En_4_Chapter.xhtml#Fig2),\
    \ you’ll notice that as you approach the end of a block of logic in your flowchart,\
    \ there are arrows that go back to a previous section and repeat that section\
    \ until some condition is met. This is called **looping**. It enables you to repeat\
    \ sections of programming logic—without having to rewrite those sections of code\
    \ over—until a condition is met.\n\n### Using Loops to Repeat Program Statements\n\
    \nA **loop** is a sequence of program statements that is specified once but can\
    \ be repeated several times in succession. A loop can repeat a specified number\
    \ of times (count-controlled) or until some condition (condition-controlled) occurs.\n\
    \nIn this section, you’ll learn about count-controlled loops and condition-controlled\
    \ loops. You will also learn how to control your loops with Boolean logic.\n\n\
    #### Count-Controlled Loops\n\nA count-controlled loop repeats a specified number\
    \ of times. In Swift, this is a **for-in loop**. A `for-in` loop iterates over\
    \ sequences or collections of items, such as ranges of numbers, items in an array,\
    \ or characters in a string. See Listing [4-8](#341013_5_En_4_Chapter.xhtml#PC9).\n\
    \n```\nfor i in 0..<10 {\n    print(\"The index is: \\(i)\")\n}\n//....continue\n\
    Listing 4-8. A Count-Controlled Loop\n```\n\nThe loop in Listing [4-8](#341013_5_En_4_Chapter.xhtml#PC9)\
    \ will loop 10 times. The “half-open range operator” `..<` returns a sequence\
    \ of values from the “lower bound” value 0 up to, but not including, the “upper\
    \ bound” value 10, resulting in values of `i` between 0 and 9.\n\nAlternatively,\
    \ Listing [4-9](#341013_5_En_4_Chapter.xhtml#PC10) prints the first 10 entries\
    \ in the 10 times table by using the “closed range operator” `...` that returns\
    \ a sequence of values from the lower bound value 1 up to and including the upper\
    \ bound value 10, resulting in values of `i` between 1 and 10.\n\n```\nfor i in\
    \ 1...10 {\n    print(\"\\(i) times 10 is \\(i * 10)\")\n}\n//....continue\nListing\
    \ 4-9. A Count-Controlled Loop Using the Closed-Range Operator\n```\n\n#### Condition-Controlled\
    \ Loops\n\nSwift has the ability to repeat a loop until some condition changes.\
    \ You may want to repeat a section of your code until a false condition is reached\
    \ with one of your variables. This type of loop is called a `while` loop. A `while`\
    \ loop is a control flow statement that repeats based on a given Boolean condition.\
    \ You can think of a `while` loop as a repeating `if` statement. See Listing [4-10](#341013_5_En_4_Chapter.xhtml#PC11).\n\
    \n```\nvar isTrue = true\nwhile isTrue {\n    // do something\n    isTrue = false\
    \ // a condition occurs that sometimes sets isTrue to FALSE\n}\n//....continue\n\
    Listing 4-10. A Swift while Loop Repeating\n```\n\nThe `while` loop in Listing\
    \ [4-10](#341013_5_En_4_Chapter.xhtml#PC11) first checks whether the variable\
    \ `isTrue` is `true`—which it is—so the `{loop body}` is entered where the code\
    \ is executed. Eventually, some condition is reached that causes `isTrue` to become\
    \ `false`. After completing all the code in the loop body, the condition (`isTrue`)\
    \ is checked once more, and the loop is repeated. This process is repeated until\
    \ the variable `isTrue` is set to `false`.\n\n#### Infinite Loops\n\nAn infinite\
    \ loop repeats endlessly, either because of the loop not having a condition that\
    \ causes termination or because of the loop having a terminating condition that\
    \ can never be met.\n\nGenerally, infinite loops can cause apps to become unresponsive.\
    \ They are the result of a side effect of a bug in either the code or the logic.\n\
    \nListing [4-11](#341013_5_En_4_Chapter.xhtml#PC12) is an example of an infinite\
    \ loop caused by a terminating condition that can never be met. The variable `x`\
    \ will be checked with each iteration through the `while` loop but will never\
    \ be equal to 5. The variable `x` will always be an even number because it was\
    \ initialized to zero and incremented by two in the loop. This will cause the\
    \ loop to repeat endlessly. See Listing [4-12](#341013_5_En_4_Chapter.xhtml#PC13).\n\
    \n```\nwhile true {\n    // do something forever\n}\n//....continue\nListing 4-12.\
    \ An Example of an Infinite Loop Caused by a Terminating Condition That Can Never\
    \ Be Met\n```\n\n```\nvar x = 0\nwhile x != 5 {\n    // do something\n    x =\
    \ x + 2\n}\n//....continue\nListing 4-11. An Example of an Infinite Loop\n```"
  raw: '### Flowcharting


    After the design requirements discussed in previous chapters are finalized, you
    can create pseudocode sections of your app to solve complex development issues.
    ***Flowcharting*** is a common method of diagramming an algorithm. An algorithm
    is represented as different types of boxes connected by lines and arrows. Developers
    often use flowcharting to express code visually, as shown in Figure [4-1](#341013_5_En_4_Chapter.xhtml#Fig1).


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    Sample flowchart showing common figures and their associated names


    Flowcharts should always have a start and a stop. Branches should never come to
    an end without a stop. This helps developers make sure all of the branches in
    their code are accounted for and that they cleanly stop execution.


    ### Designing and Flowcharting an Example App


    We have covered a lot of information about decision making and program flow. It’s
    time to do what programmers do best: write apps!


    The app you have been assigned to write generates a random number between 0 and
    100 and asks the user to guess the number. Users have to do this until the number
    is guessed. When users guess the correct answer, they will be asked if they want
    to play again.


    ### The App’s Design


    Using your design requirements, you can make a flowchart for your app. See Figure
    [4-2](#341013_5_En_4_Chapter.xhtml#Fig2).


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    Flowchart for guessing a random number app


    Reviewing Figure [4-2](#341013_5_En_4_Chapter.xhtml#Fig2), you’ll notice that
    as you approach the end of a block of logic in your flowchart, there are arrows
    that go back to a previous section and repeat that section until some condition
    is met. This is called ***looping*** . It enables you to repeat sections of programming
    logic—without having to rewrite those sections of code over—until a condition
    is met.


    ### Using Loops to Repeat Program Statements


    A ***loop*** is a sequence of program statements that is specified once but can
    be repeated several times in succession. A loop can repeat a specified number
    of times (count-controlled) or until some condition (condition-controlled) occurs.


    In this section, you’ll learn about count-controlled loops and condition-controlled
    loops. You will also learn how to control your loops with Boolean logic.


    #### Count-Controlled Loops


    A count-controlled loop repeats a specified number of times. In Swift, this is
    a **for-in** **loop**. A `for-in` loop iterates over sequences or collections
    of items, such as ranges of numbers, items in an array, or characters in a string.
    See Listing [4-8](#341013_5_En_4_Chapter.xhtml#PC9).


    ```

    for i in 0..<10 {

    print("The index is: \(i)")

    }

    //....continue

    Listing 4-8

    A Count-Controlled Loop

    ```


    The loop in Listing [4-8](#341013_5_En_4_Chapter.xhtml#PC9) will loop 10 times.
    The “half-open range operator” ..< returns a sequence of values from the “lower
    bound” value 0 up to, but not including, the “upper bound” value 10, resulting
    in values of i between 0 and 9.


    Alternatively, Listing [4-9](#341013_5_En_4_Chapter.xhtml#PC10) prints the first
    10 entries in the 10 times table by using the “closed range operator” … that returns
    a sequence of values from the lower bound value 1 up to and including the upper
    bound value 10, resulting in values of i between 1 and 10.


    ```

    for i in 1...10 {

    print("\(i) times 10 is \(i ∗ 10)")

    }

    //....continue

    Listing 4-9

    A Count-Controlled Loop Using the Closed-Range Operator

    ```


    #### Condition-Controlled Loops


    Swift has the ability to repeat a loop until some condition changes. You may want
    to repeat a section of your code until a false condition is reached with one of
    your variables. This type of loop is called a `while` loop. A `while` loop is
    a control flow statement that repeats based on a given Boolean condition. You
    can think of a `while` loop as a repeating `if` statement. See Listing [4-10](#341013_5_En_4_Chapter.xhtml#PC11).


    ```

    var isTrue = true

    while isTrue {

    // do something

    isTrue = false // a condition occurs that sometimes sets isTrue to FALSE

    }

    //....continue

    Listing 4-10

    A Swift while Loop Repeating

    ```


    The `while` loop in Listing [4-10](#341013_5_En_4_Chapter.xhtml#PC11) first checks
    whether the variable `isTrue` is `true`—which it is—so the `{loop body}` is entered
    where the code is executed. Eventually, some condition is reached that causes
    `isTrue` to become `false`. After completing all the code in the loop body, the
    condition (`isTrue`) is checked once more, and the loop is repeated. This process
    is repeated until the variable `isTrue` is set to `false`.


    #### Infinite Loops


    An infinite loop repeats endlessly, either because of the loop not having a condition
    that causes termination or because of the loop having a terminating condition
    that can never be met.


    Generally, infinite loops can cause apps to become unresponsive. They are the
    result of a side effect of a bug in either the code or the logic.


    Listing [4-11](#341013_5_En_4_Chapter.xhtml#PC12) is an example of an infinite
    loop caused by a terminating condition that can never be met. The variable `x`
    will be checked with each iteration through the `while` loop but will never be
    equal to 5\. The variable `x` will always be an even number because it was initialized
    to zero and incremented by two in the loop. This will cause the loop to repeat
    endlessly. See Listing [4-12](#341013_5_En_4_Chapter.xhtml#PC13).


    ```

    while true {

    // do something forever

    }

    //....continue

    Listing 4-12

    An Example of an Infinite Loop Caused by a Terminating Condition That Can Never
    Be Met

    ```


    ```

    var x = 0

    while x != 5 {

    // do something

    x = x + 2

    }

    //....continue

    Listing 4-11

    An Example of an Infinite Loop

    ```'
  trans: "\n### 流程图\n\n在之前章节讨论的设计需求定稿后，你可以为应用创建伪代码段，以解决复杂的开发问题。**流程图**是绘制算法的一种常见方法。算法由不同类型的方框通过线条和箭头连接而成。开发者经常使用流程图来直观地表示代码，如图\
    \ 4-1 所示。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg](img/341013_5_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1. 示例流程图，展示常用图形及其对应名称\n\n流程图必须始终有开始和结束。分支绝不能没有结束节点。这有助于开发者确保代码中的所有分支都已处理妥当，并能干净地结束执行。\n\
    \n### 设计并绘制示例应用的流程图\n\n我们已经介绍了大量关于决策和程序流程的知识。现在该做程序员最擅长的事了：编写应用！\n\n你要编写的应用会生成一个\
    \ 0 到 100 之间的随机数，并要求用户猜这个数字。用户必须不断猜测，直到猜中为止。当用户猜中正确答案时，程序会询问他们是否想再玩一次。\n\n###\
    \ 应用设计\n\n根据你的设计需求，可以为应用绘制一个流程图。见图 4-2。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg](img/341013_5_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2. 猜随机数应用的流程图\n\n审视图 4-2，你会注意到，当流程图中的逻辑块接近末尾时，会有箭头指回之前的某个区域，并重复该区域，直到满足某个条件。这被称为**循环**。它让你能够重复执行程序逻辑的某些部分，而无需反复重写这些代码段，直到某个条件成立。\n\
    \n### 使用循环重复程序语句\n\n**循环**是一系列程序语句，这些语句只需定义一次，但可以连续重复执行多次。循环可以重复指定的次数（计数控制），也可以重复直到某个条件发生（条件控制）。\n\
    \n在本节中，你将学习计数控制循环和条件控制循环。你还将学习如何用布尔逻辑控制循环。\n\n#### 计数控制循环\n\n计数控制循环重复执行指定的次数。在\
    \ Swift 中，这就是**for-in 循环**。`for-in`循环会遍历序列或集合中的元素，例如数字范围、数组中的元素或字符串中的字符。见代码清单\
    \ 4-8。\n\n```\nfor i in 0..<10 {\n    print(\"索引值为：\\(i)\")\n}\n//....继续\n代码清单\
    \ 4-8. 计数控制循环\n```\n\n代码清单 4-8 中的循环将执行 10 次。“半开区间运算符”`..<`会返回一个从“下界”值 0 开始，到“上界”值\
    \ 10 结束（但不包括 10）的值序列，因此`i`的取值在 0 到 9 之间。\n\n另一种方式是，代码清单 4-9 通过使用“闭区间运算符”`...`来打印\
    \ 10 乘法表的前 10 项。该运算符会返回一个从下界值 1 开始，到上界值 10 结束（包括 10）的值序列，因此`i`的取值在 1 到 10 之间。\n\
    \n```\nfor i in 1...10 {\n    print(\"\\(i) 乘以 10 等于 \\(i * 10)\")\n}\n//....继续\n\
    代码清单 4-9. 使用闭区间运算符的计数控制循环\n```\n\n#### 条件控制循环\n\nSwift 能够重复执行循环，直到某个条件发生变化。你可能希望重复执行某段代码，直到某个变量达到假（false）条件。这种类型的循环称为`while`循环。`while`循环是一种控制流语句，它基于给定的布尔条件重复执行。你可以将`while`循环看作是一个重复执行的`if`语句。见代码清单\
    \ 4-10。\n\n```\nvar isTrue = true\nwhile isTrue {\n    // 执行某些操作\n    isTrue =\
    \ false // 某个条件发生，将 isTrue 设置为 FALSE\n}\n//....继续\n代码清单 4-10. 一个重复执行的 Swift while\
    \ 循环\n```\n\n代码清单 4-10 中的`while`循环首先检查变量`isTrue`是否为`true`——确实是——于是进入`{循环体}`并执行代码。最终，某个条件导致`isTrue`变为`false`。在循环体内的所有代码执行完毕后，会再次检查条件（`isTrue`），然后循环重复执行。这个过程会一直重复，直到变量`isTrue`被设置为`false`。\n\
    \n#### 无限循环\n\n无限循环会无休止地重复执行，其原因可能是循环没有终止条件，或者循环的终止条件永远无法满足。\n\n通常，无限循环会导致应用无响应。这通常是代码或逻辑中存在\
    \ bug 的副作用。\n\n代码清单 4-11 是一个因终止条件永远无法满足而导致的无限循环示例。变量`x`在每次`while`循环迭代时都会被检查，但永远不会等于\
    \ 5。变量`x`将始终是偶数，因为它被初始化为 0，并且在循环中每次递增 2。这将导致循环无休止地重复。见代码清单 4-12。\n\n```\nwhile\
    \ true {\n    // 永远执行某些操作\n}\n//....继续\n代码清单 4-12. 由永远无法满足的终止条件导致的无限循环示例\n```\n\
    \n```\nvar x = 0\nwhile x != 5 {\n    // 执行某些操作\n    x = x + 2\n}\n//....继续\n\
    代码清单 4-11. 一个无限循环示例\n```\n"
- fmt: "# Coding the Example App in Swift\n\nUsing your requirements and what you\
    \ learned, try writing your random number generator in Swift.\n\nTo program this\
    \ app, you have to leave the playground and do this as a Mac Console app. Unfortunately,\
    \ at this time, a playground doesn’t enable you to interact with a running app,\
    \ so you can’t capture keyboard input.\n\nYour Swift app will run from the command\
    \ line because it asks the user to guess a random number.\n\n1. Open Xcode and\
    \ select Create a new Xcode project. Choose the Command Line Tool macOS project\
    \ as seen in Figure [4-3](#341013_5_En_4_Chapter.xhtml#Fig3) and click Next.\n\
    \n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig3_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig3_HTML.jpg)\n\
    \n   Figure 4-3. Starting a new Command-Line Tool macOS project\n\n2. Call your\
    \ project **RandomNumber** (see Figure [4-4](#341013_5_En_4_Chapter.xhtml#Fig4)).\
    \ Ensure that the Language drop-down is Swift and click Next. Save the project\
    \ anywhere you prefer on your hard drive and click Create.\n\n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig4_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig4_HTML.jpg)\n\
    \n   Figure 4-4. Project options for `RandomNumber`\n\n3. Open the `main.swift`\
    \ file. Write the code in Listing [4-13](#341013_5_En_4_Chapter.xhtml#PC14).\n\
    \n```swift\n1 //\n2 //  main.swift\n3 //  RandomNumber\n4 //\n\n6 import Foundation\n\
    \n8 var randomNumber = 1\n9 var continueGuessing = true\n10 var keepPlaying =\
    \ true\n11 var input = \"\"\n\n13 while keepPlaying {\n14     // get a random\
    \ number between 0 - 100\n15     randomNumber = Int(arc4random_uniform(101))\n\
    16     print(\"The random number to guess is: \\(randomNumber)\")\n\n18     while\
    \ continueGuessing {\n19         print(\"Pick a number between 0 and 100.\")\n\
    20         // get keyboard input, and trim the new line\n21         input = String(bytes:\
    \ FileHandle.standardInput.availableData, encoding: .utf8)!\n22         input\
    \ = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\n24         if let\
    \ userGuess = Int(input) {\n25             if userGuess == randomNumber {\n26\
    \                 continueGuessing = false\n27                 print(\"Correct\
    \ number!\")\n28             } else if userGuess > randomNumber {\n29        \
    \         // user guessed too high\n30                 print(\"Your guess is too\
    \ high!\")\n31             } else{\n32                 // no reason to check if\
    \ userGuess < randomNumber. It has to be.\n33                 print(\"Your guess\
    \ is too low!\")\n34             }\n35         } else {\n36             print(\"\
    Invalid guess, please try again.\")\n37         }\n38     }\n\n40     print (\"\
    Play Again? Y or N\")\n41     input = String(bytes: FileHandle.standardInput.availableData,\
    \ encoding: .utf8)!\n42     input = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\
    \n44     if input == \"N\" || input == \"n\" {\n45         keepPlaying = false\n\
    46     }\n\n48     continueGuessing = true\n49 }\n```\n\nListing 4-13 Source Code\
    \ for Your Random Number Generator App\n\nIn Listing [4-13](#341013_5_En_4_Chapter.xhtml#PC14),\
    \ there is new code that we haven’t discussed before. The first new line of code\
    \ (line 15) is as follows:\n\n```swift\nrandomNumber = Int(arc4random_uniform(101))\n\
    ```\n\nThis line will produce a random number between 0 and 100. `arc4random_uniform()`\
    \ is a function that returns a random number.\n\nThe next line of new code is\
    \ on line 21:\n\n```swift\ninput = String(bytes: FileHandle.standardInput.availableData,\
    \ encoding: .utf8)!\n```\n\nThis enables you to get keyboard input for the user.\
    \ We will talk about this syntax in later chapters.\n\nThe next new line of code\
    \ is on line 24:\n\n```swift\nif let userGuess = Int(input)\n```\n\n`Int` takes\
    \ a string initializer and converts it to an integer.\n\n## Nested `if` Statements\
    \ and `else if` Statements\n\nSometimes, it is necessary to nest `if` statements.\
    \ This means that you need to have `if` statements nested inside an existing `if`\
    \ statement. Additionally, it is sometimes necessary to have a comparison as the\
    \ first step in the `else` section of the `if` statement. This is called an `else\
    \ if` statement (recall line 28 in Listing [4-13](#341013_5_En_4_Chapter.xhtml#PC14)).\n\
    \n```swift\nelse if userGuess > randomNumber\n```\n\n## Removing Extra Characters\n\
    \nLine 22 in Listing [4-13](#341013_5_En_4_Chapter.xhtml#PC14) is as follows:\n\
    \n```swift\ninput = input.trimmingCharacters(in: .whitespacesAndNewlines)\n```\n\
    \nReading keyboard input can be difficult. In this case, it leaves a remnant at\
    \ the end of your string, `\\n`, and you need to remove it. This is a *newline*\
    \ character that is generated when the users press the Return key on their keyboards.\
    \ The `trimmingCharacters(in: .whitespacesAndNewlines)` method returns a new string\
    \ with any blank space or newline characters removed from the beginning or end\
    \ of the original string.\n\n## Improving the Code Through Refactoring\n\nOften,\
    \ after you get your code to work, you examine the code and find more efficient\
    \ ways to write it. The process of rewriting your code to make it more efficient,\
    \ maintainable, and readable is called *code refactoring*.\n\nAs you review your\
    \ code in Swift, you will often notice that you can eliminate some unnecessary\
    \ code.\n\n> **Note**: As developers, we have found that the best line of code\
    \ is the line that you don’t have to write—less code means less to debug and maintain.\n\
    \n## Running the App\n\nTo run your app, click the Play button at the top left\
    \ of your screen in your Swift project. See Figure [4-5](#341013_5_En_4_Chapter.xhtml#Fig5).\
    \ (Note: If you are running Xcode 10.2 on a version of macOS earlier than 10.14.4,\
    \ you will first need to install the Swift 5 Runtime Support for Command Line\
    \ Tools available for download at [`https://developer.apple.com/download/more/`](https://developer.apple.com/download/more/).)\n\
    \n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig5_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5. The console output of the Swift random number generator app\n\n\
    > **Note**: If you’re not seeing the output console when you run your app, make\
    \ sure you have selected the same options at the top-right and bottom-right corners\
    \ of the editor (choose View ➤ Debug Area ➤ Activate Console)."
