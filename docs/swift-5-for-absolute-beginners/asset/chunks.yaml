- fmt: "# Creating an Example iPhone App with Interface Builder\n\nLet’s get started\
    \ by building an iPhone app that generates and displays a random number, as shown\
    \ in Figure [10-4](#341013_5_En_10_Chapter.xhtml#Fig4). This app will be similar\
    \ to the app you created in Chapter [4](#341013_5_En_10_Chapter.xhtml), but you’ll\
    \ see how much more interesting the app becomes with an iOS user interface (UI).\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig4_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. Completed iOS random number generator app\n\n1.  Open Xcode and\
    \ select Create a new Xcode project. Make sure you select Single View App for\
    \ iOS and then click Next, as shown in Figure [10-5](#341013_5_En_10_Chapter.xhtml#Fig5).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig5_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig5_HTML.jpg)\n\
    \n    Figure 10-5. Creating an iPhone app based on the Single View App template\n\
    \n2.  Name your project `RandomNumber`, select Swift for the language, and click\
    \ Next before creating your project, as shown in Figure [10-6](#341013_5_En_10_Chapter.xhtml#Fig6).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig6_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig6_HTML.jpg)\n\
    \n    Figure 10-6. Naming your new Swift project\n\n3.  Your project files and\
    \ settings are created and displayed, as shown in Figure [10-7](#341013_5_En_10_Chapter.xhtml#Fig7).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig7_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig7_HTML.jpg)\n\
    \n    Figure 10-7. Source files\n\nAlthough you have only one controller in this\
    \ project, it’s good programming practice to make your MVC groups at the beginning\
    \ of your development. This helps remind you to keep the MVC paradigm and not\
    \ put all of your code unnecessarily in your controller.\n\n1.  Right-click the\
    \ `RandomNumber` folder and then select New Group, as shown in Figure [10-8](#341013_5_En_10_Chapter.xhtml#Fig8).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig8_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig8_HTML.jpg)\n\
    \n    Figure 10-8. Creating new groups\n\n2.  Create a Models group, a Views group,\
    \ and a Controllers group.\n\n3.  Drag the `ViewController.swift` file to the\
    \ Controllers group. Drag the `Main.storyboard` and `LaunchScreen.storyboard`\
    \ files to the Views group. Having these groups reminds you to follow the MVC\
    \ design pattern as you develop your code and prevents you from placing all of\
    \ your code in the controllers, as shown in Figure [10-9](#341013_5_En_10_Chapter.xhtml#Fig9).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig9_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig9_HTML.jpg)\n\
    \n    Figure 10-9. MVC groups with controller and storyboard files organized\n\
    \n4.  Click the `Main.storyboard` file to open Interface Builder.\n\n## Using\
    \ Interface Builder\n\nThe most common way to launch Interface Builder and begin\
    \ working on your views is to click the associated storyboard file, as shown in\
    \ Figure [10-10](#341013_5_En_10_Chapter.xhtml#Fig10).\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig10_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig10_HTML.jpg)\n\
    \nFigure 10-10. Interface Builder in the workspace window\n\nWhen Interface Builder\
    \ opens, you can see your scenes displayed on the canvas. You are now able to\
    \ design your user interface. First, you need to understand some of the sub-windows\
    \ within Interface Builder.\n\n## The Document Outline\n\nThe storyboard shows\
    \ all the objects that your views contain. The following are some examples of\
    \ these objects:\n\n*   Buttons\n*   Labels\n*   Text fields\n*   Web views\n\
    *   Map views\n*   Picker views\n*   Table views\n\n### Note\n\nYou can expand\
    \ the width of the Document Outline to see a detailed list of all your objects,\
    \ as shown in Figure [10-10](#341013_5_En_10_Chapter.xhtml#Fig10). To get more\
    \ real estate for the canvas, you can shrink or hide your file navigator.\n\n\
    ## The Object Library\n\nThe Object Library is where you can exploit your creativity.\
    \ It’s a smorgasbord of objects that you can drag and drop into the View.\n\n\
    *   Clicking the Object Library Button displays the Object Library Popover. The\
    \ Object Library Popover can grow and shrink by resizing the popover window, as\
    \ shown in Figure [10-11](#341013_5_En_10_Chapter.xhtml#Fig11).\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig11_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig11_HTML.jpg)\n\
    \n    Figure 10-11. Expand the Object Library Popover to see more controls\n\n\
    Clicking the Icon View button in Figure [10-12](#341013_5_En_10_Chapter.xhtml#Fig12)\
    \ gives you a more compact view of the Object Library contents, as shown in Figure\
    \ [10-13](#341013_5_En_10_Chapter.xhtml#Fig13).\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig12_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig12_HTML.jpg)\n\
    \nFigure 10-12. Object Library Icon View button\n\nFor Cocoa Touch objects, the\
    \ Library contains the following:\n\n*   Controls\n*   Data views\n*   Gesture\
    \ recognizers\n*   Objects and controllers\n*   Window and bars\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig13_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13. Various Cocoa Touch objects in the Object Library\n\n## Inspector\
    \ Pane and Selector Bar\n\nThe Inspector pane enables you to change the properties\
    \ of the controls to make your objects follow your command. The Inspector pane\
    \ has six tabs across the top, as shown in Figure [10-14](#341013_5_En_10_Chapter.xhtml#Fig14):\n\
    \n*   File inspector\n*   Quick Help inspector\n*   Identity inspector\n*   Attributes\
    \ inspector\n*   Size inspector\n*   Connections inspector\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig14_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig14_HTML.jpg)\n\
    \nFigure 10-14. The Attributes inspector and Selector Bar\n\n## Creating the View\n\
    \nThe random number generator will have three objects in the view: one label and\
    \ two buttons. One button will generate the seed, another button will generate\
    \ the random number, and the label shows the random number generated by the app.\n\
    \n1.  Scroll through the Object Library and drag two Buttons and one Label to\
    \ the View Controller scene, as shown in Figure [10-15](#341013_5_En_10_Chapter.xhtml#Fig15).\n\
    \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig15_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig15_HTML.jpg)\n\
    \n    Figure 10-15. Placing objects in the view\n\n2.  Double-click the first\
    \ button, and change its title to \"Seed Random Number Generator,\" then double-click\
    \ the second button, and change its title to \"Generate Random Number\" as shown\
    \ in Figure [10-16](#341013_5_En_10_Chapter.xhtml#Fig16).\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig16_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig16_HTML.jpg)\n\
    \n    Figure 10-16. Renaming the button titles\n\nNow you get to use a great feature\
    \ of Xcode. You can quickly and easily connect your outlets and actions to your\
    \ code. Xcode actually goes one step further; it will create some of the code\
    \ for you. All you have to do is drag and drop.\n\n1.  Click the Assistant Editor\
    \ icon at the top right of the screen. This will display the associated `.swift`\
    \ file for the view selected in the storyboard, as shown in Figure [10-17](#341013_5_En_10_Chapter.xhtml#Fig17).\n\
    \n### Note\n\nIf the correct associated `.swift` file doesn’t appear when you\
    \ click the Assistant Editor icon, make sure you selected and highlighted the\
    \ view. Automatic also has to be selected in the Assistant Editor’s jump bar.\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig17_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig17_HTML.jpg)\n\
    \nFigure 10-17. Using the Assistant Editor to display the `.swift` file"
