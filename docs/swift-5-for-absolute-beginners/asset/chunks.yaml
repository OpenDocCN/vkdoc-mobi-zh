    \ new Swift project based on the Single View App template, name it `RandomNumberDelegate`,\
    \ and save it, as shown in Figure [12-5](#341013_5_En_12_Chapter.xhtml#Fig5).\n\
    \n   ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig5_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig5_HTML.jpg)\n\
    \n   Figure 12-5. Creating the project\n\n2. From the Document Outline, select\
    \ the `Main.storyboard`, and then select the View Controller Scene. Then select\
    \ Editor ➤ Embed In ➤ Navigation Controller. This embeds your View Controller\
