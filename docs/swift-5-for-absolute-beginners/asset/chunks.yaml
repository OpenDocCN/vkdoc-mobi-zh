    \ there, but all of these books assume you have programmed before and know OOP\
    \ and computer logic. We wanted to write a book that takes readers from knowing\
    \ little or nothing about computer programming and logic to being able to program\
    \ in Swift. After all, Swift is a native programming language for the iPhone,\
    \ iPad, and Mac.\n\nOver the last ten years, we have taught thousands of students\
