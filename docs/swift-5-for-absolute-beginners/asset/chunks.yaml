    \ it a value. You know that `discountThreshold` and `discountPercent` will not\
    \ contain decimals, so the compiler will type them as `Int`s. In this example,\
    \ you can assume you have a function called `calculateTotalSpent` , which will\
    \ calculate the total spent in this current order and return the value as an Int.\
    \ You then simply check to see whether the total spent is larger than the discount\
    \ threshold; if it is, you set the discount percent. If we wanted a customer who\
    \ spent exactly $30 to get the same discount, we could use `a >=` instead of `a\
    \ >`.\n\nAnother action that requires the comparison of numbers is looping. As\
    \ discussed in Chapter [4](#341013_5_En_4_Chapter.xhtml), looping is a core action\
    \ in development, and many loop types require some sort of comparison to determine\
    \ when to stop. Let’s take a look at a `for` loop:\n\n```\nvar numberOfBooks:\
    \ Int = 50\nfor y in 0..<numberOfBooks {\ndoSomething()\n}\n```\n\nIn this example,\
    \ you iterate, or *loop*, through the total number of books in the bookstore.\
    \ The `for` statement is where the interesting stuff starts to happen. Let’s break\
    \ it down.\n\nThe for loop declares a variable with an initial value of 0 and\
    \ will increment it while it is less than `numberOfBooks`. This is a much quicker\
    \ way of doing for loops than was required in Objective-C.\n\n### Creating an\
    \ Example Xcode App\n\nNow let’s create an Xcode application so you can start\
    \ comparing numeric data.\n\n1.  Launch Xcode and select File ➤ New ➤ Playground\
    \ to create a new playground. This chapter will use a playground to make it easier\
    \ to play around with comparisons.\n\n2.  Select Blank as shown in Figure [9-1](#341013_5_En_9_Chapter.xhtml#Fig1).\
    \ Click Next.\n\n    ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg)\n\
    \n    Figure 9-1.\n\n    Creating a new playground\n\n3.  On the next page, enter\
    \ the name of your playground. Here we used **Comparison** as the name, but you\
    \ can choose any name you like.\n\n    **Note** Xcode Playgrounds, by default,\
    \ are saved in the `Documents` folder in your user home.\n\n4.  Once the new playground\
    \ is created, you will see the standard Xcode window.\n\n5.  Add the following\
    \ line after the default code in the playground:\n\n```\nprint(\"Hello World\"\
    )\n```\n\nThis line creates a new `String` with the contents `Hello World` and\
    \ passes it to the `print` function that is used for debugging.\n\nXcode will\
    \ automatically run the new line you added and show the result on the right-hand\
    \ side as seen in Figure [9-2](#341013_5_En_9_Chapter.xhtml#Fig2).\n\n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2.\n\nPlayground output\n\n1.  Go to the beginning of the line that\
    \ begins with `print`. This is the line that is responsible for printing the `Hello\
    \ World` string. You are going to comment out this line by placing two forward\
    \ slashes (`//`) in front of the line of code. Commenting out code tells Xcode\
    \ to ignore it when it executes the code. In other words, code that is commented\
    \ out will not run.\n\n2.  Once you comment out the line of code, the code will\
    \ no longer be run so Hello World will no longer show in the playground as seen\
    \ in Figure [9-3](#341013_5_En_9_Chapter.xhtml#Fig3).\n\n    ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg)\n\
    \n    Figure 9-3.\n\n    Playground output with commented out code\n\n3.  We want\
    \ to use the log to output the results of comparisons. Add one line, as shown\
    \ here:\n\n    ```\n    print(\"The result is \\(6 > 5 ? \"True\" : \"False\"\
    )\")\n    ```\n\n### Note\n\nThe previous code, `(6>5 ? \"True\" : \"False\")`,\
    \ is called a *ternary* operation. It is essentially just a simplified way of\
    \ writing an `if/else` statement.\n\n1.  Place this line in your code. This line\
    \ is telling your application to print `The result is`. Then it will print `True`\
    \ if 6 is greater than 5, or it will print `False` if 5 is greater than 6\\. See\
    \ Figure [9-4](#341013_5_En_9_Chapter.xhtml#Fig4).\n\nBecause 6 is greater than\
    \ 5, it will print “The result is `True`.”\n\n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg](images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4.\n\nTernary output\n\nYou can change this line to test any comparisons\
    \ we have already discussed in this chapter or any of the examples you will do\
    \ later.\n\nLet’s try another example.\n\n```\nvar i = 5\nvar y = 6\nprint(\"\
    The result is \\(y > i ? \"True\" : \"False\")\")\nIn this example, you create\
    \ a variable and assign its value to 5\\. You then create another variable and\
    \ assign the value to 6\\. You then change the print example to compare the variables\
    \ I and y instead of using actual numbers.\n```\n\n### Note\n\nYou may get compiler\
    \ warnings when using this code in an actual Xcode project. The compiler will\
    \ tell you that the false portion of the ternary operator will never be executed.\
    \ The compiler can look at the values while you are typing the code and know that\
    \ the comparison will always be true.\n\nYou will now explore other kinds of comparisons\
    \ , and then you will come back to the application and test some of them.\n\n\
    ## Using Boolean Expressions\n\nA Boolean expression is the easiest of all comparisons.\
    \ Boolean expressions are used to determine whether a value is true or false.\
    \ Here’s an example:\n\n```\nvar j = 5\nif  j > 0 {\nsomeCode()\n}\n```\n\nThe\
    \ *if* statement will always evaluate to `true` because the variable `j` is greater\
    \ than zero. Because of that, the program will run the `someCode()` method."
  trans: "\n# 使用关系运算符\n\nSwift 提供了六个标准比较运算符。这些是标准的代数运算符，只有一处真正的区别：与大多数其他编程语言一样，Swift\
    \ 语言中，“等于”运算符由两个等号（`==`）组成。表 9-1 描述了可供开发人员使用的运算符。\n\n**表 9-1.** 比较运算符\n\n| 运算符\
    \ | 描述 |\n| --- | --- |\n| `>` | 大于 |\n| `<` | 小于 |\n| `>=` | 大于或等于 |\n| `<=`\
    \ | 小于或等于 |\n| `==` | 等于 |\n| `!=` | 不等于 |\n\n### 注意\n\n单个等号（`=`）用于给变量赋值。比较两个值则需要两个等号（`==`）。例如，`if(x=9)`\
    \ 会尝试将值 9 赋值给变量 `x`，但现在 Xcode 在这种情况下会报错。`if(x==9)` 则会进行比较以判断 `x` 是否等于 9。\n\n##\
    \ 比较数字\n\n开发人员面临的困难之一是在比较中处理不同的数据类型。本书前面讨论了不同的变量类型。你可能还记得 1 是一个整数。如果你想将整数与像 1.2\
    \ 这样的浮点数进行比较，就会引发一些问题。这时，类型转换就派上用场了。\n\n### 注意\n\n类型转换是将一个对象或变量从一种类型转换为另一种类型。\n\
    \n在书店应用程序中，你需要以多种方式比较数字。例如，假设书店为单笔消费超过 30 美元的顾客提供折扣。你需要将顾客的总消费金额加起来，然后与 30 美元进行比较。如果消费金额大于\
    \ 30 美元，就需要计算折扣。请看以下示例：\n\n```\nvar discountThreshold = 30\nvar discountPercent\
    \ = 0\nvar totalSpent = calculateTotalSpent()\nif totalSpent > discountThreshold\
    \ {\ndiscountPercent = 10\n}\n```\n\n我们来梳理一下这段代码。首先，你声明了变量（`discountThreshold`、`discountPercent`\
    \ 和 `totalSpent`）并为其赋值。注意，你无需指定这些变量的数字类型。类型会在你为其赋值时被确定。你知道 `discountThreshold`\
    \ 和 `discountPercent` 不会包含小数，因此编译器会将它们设定为 `Int` 类型。在这个例子中，可以假设有一个名为 `calculateTotalSpent`\
    \ 的函数，它会计算当前订单的总消费额并以 `Int` 类型返回值。然后你只需检查总消费额是否大于折扣阈值；如果是，就设置折扣百分比。如果想让恰好消费 30\
    \ 美元的顾客也享受同样的折扣，可以使用 `>=` 而不是 `>`。\n\n另一个需要数字比较的操作是循环。正如第 4 章所讨论的，循环是开发中的核心操作，许多循环类型都需要某种比较来确定何时停止。让我们看一个\
    \ `for` 循环：\n\n```\nvar numberOfBooks: Int = 50\nfor y in 0..<numberOfBooks {\n\
    doSomething()\n}\n```\n\n在这个例子中，你遍历（或称*循环*）书店中书籍的总数。`for` 语句就是有趣的事情开始发生的地方。我们来分解一下。\n\
    \n`for` 循环声明了一个初始值为 0 的变量，并且只要该变量小于 `numberOfBooks`，它就会递增。相比于 Objective-C 中 for\
    \ 循环的写法，这是一种快得多的方式。\n\n## 创建示例 Xcode 应用\n\n现在让我们创建一个 Xcode 应用程序，这样你就可以开始比较数值数据了。\n\
    \n1. 启动 Xcode 并选择 **File** ➤ **New** ➤ **Playground** 来创建一个新的 playground。本章将使用\
    \ playground，以便于你轻松实践比较操作。\n\n2. 如图 9-1 所示，选择 **Blank**。点击 **Next**。\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg](img/341013_5_En_9_Fig1_HTML.jpg)\n\
    \n   **图 9-1.** 创建新的 playground\n\n3. 在下一页，输入你的 playground 名称。这里我们使用了 **Comparison**\
    \ 作为名称，但你可以选择任何你喜欢的名字。\n\n   **注意：** Xcode Playgrounds 默认保存在用户主目录下的 `Documents`\
    \ 文件夹中。\n\n4. 新的 playground 创建完成后，你将看到标准的 Xcode 窗口。\n\n5. 在 playground 的默认代码之后添加以下代码行：\n\
    \n   ```\n   print(\"Hello World\")\n   ```\n\n   这行代码创建了一个内容为 `Hello World` 的新\
    \ `String`，并将其传递给用于调试的 `print` 函数。\n\nXcode 会自动运行你添加的新代码行，并在右侧显示结果，如图 9-2 所示。\n\
    \n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg](img/341013_5_En_9_Fig2_HTML.jpg)\n\
    \n**图 9-2.** Playground 输出\n\n6. 转到以 `print` 开头的代码行的开头。这一行负责打印 `Hello World` 字符串。你将通过在代码行前放置两个正斜杠（`//`）来注释掉这一行。注释代码是告诉\
    \ Xcode 在执行代码时忽略它。换句话说，被注释的代码将不会运行。\n\n7. 一旦你注释掉这行代码，该代码将不再运行，因此 \"Hello World\"\
    \ 将不再显示在 playground 中，如图 9-3 所示。\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg](img/341013_5_En_9_Fig3_HTML.jpg)\n\
    \n   **图 9-3.** 注释代码后的 Playground 输出\n\n8. 我们想使用日志来输出比较结果。添加一行代码，如下所示：\n\n   ```\n\
    \   print(\"The result is \\(6 > 5 ? \"True\" : \"False\")\")\n   ```\n\n### 注意\n\
    \n上面的代码 `(6>5 ? \"True\" : \"False\")` 被称为*三元*运算。它本质上只是编写 `if/else` 语句的一种简化方式。\n\
    \n9. 将这行代码放入你的代码中。这行代码告诉你的应用程序打印 `The result is`。然后，如果 6 大于 5，它会打印 `True`；如果 5\
    \ 大于 6，它会打印 `False`。见图 9-4。\n\n因为 6 大于 5，所以会打印出 \"The result is `True`。\"\n\n\
    ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg](img/341013_5_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4.** 三元输出\n\n你可以修改这行代码，来测试我们在本章已经讨论过的任何比较，或者你稍后将执行的任何示例。\n\n让我们试试另一个示例。\n\
    \n```\nvar i = 5\nvar y = 6\nprint(\"The result is \\(y > i ? \"True\" : \"False\"\
    )\")\n```\n\n在这个示例中，你创建了一个变量并将其值赋为 5。然后你创建了另一个变量并将其值赋为 6。接着你修改了 `print` 示例，使用变量\
    \ `i` 和 `y` 进行比较，而不是使用实际数字。\n\n### 注意\n\n在真实的 Xcode 项目中使用此代码时，你可能会收到编译器警告。编译器会告诉你三元运算符的\
    \ false 部分永远不会被执行。编译器在你输入代码时就能查看这些值，并知道该比较总会为 true。\n\n你现在将探索其他类型的比较，然后你会回到这个应用程序并测试其中的一些。\n\
    \n## 使用布尔表达式\n\n布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是 true 还是 false。示例如下：\n\n```\nvar\
    \ j = 5\nif  j > 0 {\nsomeCode()\n}\n```\n\n`if` 语句的计算结果总是 `true`，因为变量 `j` 大于零。因此，程序会运行\
    \ `someCode()` 方法。\n"
- fmt: "### Note\n\n在 Swift 中，如果变量是可选的，因此不能保证被赋值，你应该在变量声明后使用问号。例如，`var j` 变为 `var\
    \ j: Int?`。\n\n如果你将 `j` 的值改为 `0`，该语句将求值为 `false`，因为此时 `j` 为 `0`。\n\n```swift\n\
    var j = 0\nif j > 0 {\n    someCode()\n}\n```\n\n在布尔表达式前放置感叹号会将其值变为相反值（`false`\
    \ 变为 `true`，`true` 变为 `false`）。\n\n```swift\nvar j = 0\nif !(j > 0) {\n    someCode()\n\
    }\n```\n\n第二行现在询问“如果不满足 `j>0`”，在这种情况下，由于 `j` 等于 `0`，结果为 `true`。这是一个使用整数充当布尔变量的示例。如前所述，Swift\
    \ 也有名为 `Bool` 的变量，它只有两个可能的值：`true` 或 `false`。\n\n### Note\n\n与许多其他编程语言一样，Swift\
    \ 在给布尔变量赋值时也使用 `true` 或 `false`。\n\n让我们看一个与书店相关的示例。假设你有一个常客俱乐部，所有会员购书均可享受 15%\
    \ 的折扣。这很容易检查。你只需将变量 `clubMember` 设置为 `true`（如果该人是会员），否则设置为 `false`。以下代码将仅为俱乐部会员应用折扣：\n\
    \n```swift\nvar discountPercent = 0\nvar clubMember = false\nif clubMember {\n\
    \    discountPercent = 15\n}\n```\n\n### 比较字符串\n\n对于大多数 C 语言来说，字符串是一种复杂的数据类型。在\
    \ ANSI C（或标准 C）中，字符串只是一个字符数组。Objective-C 进一步推动了字符串的发展，将其变为一个名为 `NSString` 的对象。Swift\
    \ 则更进一步，使 `String` 类更易于使用。处理对象时，你可以使用更多的属性和方法。幸运的是，`String` 有许多用于比较数据的方法，这让你的工作更加轻松。\n\
    \n我们来看一个示例。这里，你在比较密码，以确定是否允许用户登录：\n\n```swift\nvar enteredPassword = \"Duck\"\n\
    var myPassword = \"duck\"\nvar continueLogin = false\nif enteredPassword == myPassword\
    \ {\n    continueLogin = true\n}\n```\n\n第一行声明了一个 `String` 并将其值设置为 `Duck`。下一行声明了另一个\
    \ `String` 并将其值设置为 `duck`。在你的实际代码中，你需要从用户处获取 `enteredPassword` 字符串。\n\n接下来是实际执行工作的代码部分。你只需比较这些字符串是否彼此相等。由于\
    \ `enteredPassword` 中的大写字母“D”与 `myPassword` 中的小写字母“d”不同，该示例代码的结果将始终为 `false`。\n\
    \n你可能还需要对字符串执行许多其他不同的比较。例如，你可能想检查某个字符串的长度。这很容易实现。\n\n```swift\nvar enteredPassword\
    \ = \"Duck\"\nvar myPassword = \"duck\"\nvar continueLogin = false\nif enteredPassword.count\
    \ > 5 {\n    continueLogin = true\n}\n```\n\n### Note\n\n`count` 是一个可用于计算字符串、数组和字典的属性。\n\
    \n此代码会检查输入的密码是否超过五个字符。\n\n在其他情况下，你需要在字符串内搜索某些数据。幸运的是，Swift 让这变得简单。`String` 提供了一个名为\
    \ `contains` 的函数，它允许你在一个字符串中搜索另一个字符串。函数 `contains` 只接受一个参数，即你要搜索的字符串。\n\n```swift\n\
    var searchTitle: String\nvar bookTitle: String\nsearchTitle = \"Sea\"\nbookTitle\
    \ = \"2000 Leagues Under the Sea\"\nif bookTitle.contains(searchTitle) {\n   \
    \ addToResults()\n}\n```\n\n此代码的起始部分与你见过的其他示例类似。我们创建了两个变量。然后，这个示例获取一个搜索词，并检查书名中是否包含该搜索词。如果包含，就将该书添加到结果中。这可以进行调整，以便用户搜索书名、作者甚至描述中的特定词汇。\n\
    \n有关 `String` 支持的方法的完整列表，请参阅 [`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/%2523the-swift-programming-language)\
    \ 处的 Apple 文档。\n\n## 使用 switch 语句\n\n到目前为止，你已经看到了几个通过简单地使用 `if` 语句来比较数据的示例。\n\n\
    ```swift\nif someValue == SOME_CONSTANT {\n    ...\n} else if someValue == SOME_OTHER_CONSTANT\
    \ {\n    ...\n} else if someValue == YET_SOME_OTHER_CONSTANT {\n    ...\n}\n```\n\
    \n如果你需要将一个变量与多个常量值进行比较，可以使用另一种方法来简化比较代码：`switch` 语句。\n\n### Note\n\n在 Objective-C\
    \ 中，你只能在 `switch` 语句中使用值进行比较。Swift 允许开发者在 `switch` 语句的使用上拥有更多自由。使用 Swift，开发者现在可以比较大多数对象，包括自定义对象。\n\
    \n`switch` 语句允许你将一个或多个值与另一个变量进行比较。\n\n```swift\nvar customerType = \"Repeat\"\n\
    switch customerType {     // switch 语句后面跟着一个左大括号\ncase \"Repeat\":           //\
    \ 等同于 if (customerType == \"Repeat\")\n    ...                  // 在 case 后面调用函数并放置其他语句。\n\
    \    ...\ncase \"New\":\n    ...\n    ...\ncase \"Seasonal\":\n    ...\n    ...\n\
    default:                 // Swift 要求 switch 语句覆盖所有可能性。\n}                    \
    \    // switch 语句的结束处\n```\n\n`switch` 语句功能强大，它简化并精简了与多个不同值的比较过程。\n\n在 Swift 中，`switch`\
    \ 语句是一个强大的语句，可用于简化重复的 `if/else` 语句。"
  raw: '### Note


    In Swift, if a variable is optional and therefore not guaranteed to be assigned
    a value, you should use a question mark after the variable declaration. For example,
    `var j` becomes `var j: Int?`.


    If you change the value of `j to 0`, the statement will evaluate to `false` because
    `j` is now 0.


    ```

    var j = 0

    if j > 0 {

    someCode()

    }

    ```


    Placing an exclamation point in front of a Boolean expression will change it to
    the opposite value (a `false` becomes a `true`, and a `true` becomes a `false`).


    ```

    var j = 0

    if !(j > 0) {

    someCode()

    }

    ```


    The second line now asks “If not `j>0`,” which, in this case, is `true` because
    `j` is equal to 0\. This is an example of using an integer to act as a Boolean
    variable. As discussed earlier, Swift also has variables called `Bool` that have
    only two possible values: `true` or `false`.


    ### Note


    Swift, like many other programming languages, uses `true` or `false` when assigning
    a value to a Boolean variable.


    Let’s look at an example related to the bookstore. Say you have a frequent buyers’
    club that entitles all members to a 15 percent discount on all books they purchase.
    This is easy to check. You simply set the variable `clubMember` to `true` if the
    person is a member and `false` if he or she is not. The following code will apply
    the discount only to club members:


    ```

    var discountPercent = 0

    var clubMember= false

    if clubMember {

    discountPercent = 15

    }

    ```


    ### Comparing Strings


    Strings are a difficult data type for most C languages. In ANSI C (or standard
    C), a string is just an array of characters. Objective-C took the development
    of the string even further and made it an object called `NSString`. Swift has
    taken the `String` class even further and made it easier to work with. Many more
    properties and methods are available to you when working with an object. Fortunately
    for you, `String` has many methods for comparing data, which makes your job much
    easier.


    Let’s look at an example. Here, you are comparing passwords to see whether you
    should allow a user to log in:


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword == myPassword {

    continueLogin = true

    }

    ```


    The first line just declares a `String` and sets it value to `Duck`. The next
    line declares another `String` and sets its value to `duck`. In your actual code,
    you will need to get the `enteredPassword` string from the user.


    The next line is the part of the code that actually does the work. You simply
    ask the strings if they are equal to each other. The example code will always
    be `false` because of the capital “D” in the `enteredPassword` vs. the lowercase
    “d” in the `myPassword`.


    There are many other different comparisons you might have to perform on strings.
    For example, you may want to check the length of a certain string. This is easy
    to do.


    ```

    var enteredPassword = "Duck"

    var myPassword = "duck"

    var continueLogin = false

    if enteredPassword.count > 5 {

    continueLogin = true

    }

    ```


    ### Note


    `count` is a property that can be used to count strings, arrays, and dictionaries.


    This code checks to see whether the entered password is longer than five characters.


    There will be other times when you will have to search within a string for some
    data. Fortunately, Swift makes this easy to do. `String` provides a function called
    `contains`, which allows you to search within a string for another string. The
    function `contains` takes only one argument, which is the string for which you
    are searching.


    ```

    var searchTitle: String

    var bookTitle: String

    searchTitle = "Sea"

    bookTitle = "2000 Leagues Under the Sea"

    if bookTitle.contains(searchTitle) {

    addToResults()

    }

    ```


    This code starts off similarly to other examples you have examined. We create
    two variables. This example then takes a search term and checks to see whether
    the book title has that same search term in it. If it does, it adds the book to
    the results. This can be adapted to allow users to search for specific terms in
    book titles, authors, or even descriptions.


    For a complete listing of the methods supported by `String`, see the Apple documentation
    at [`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/%2523the-swift-programming-language)
    `.`


    ## Using the switch Statement


    Up to this point, you’ve seen several examples of comparing data by simply using
    the *if* statement .


    ```

    if someValue == SOME_CONSTANT {

    ...

    } else if someValue == SOME_OTHER_CONSTANT {

    ...

    } else if someValue == YET_SOME_OTHER_CONSTANT {

    ...

    }

    ```


    If you need to compare a variable to several constant values, you can use a different
    method that can simplify the comparison code: the `switch` statement.


    ### Note


    In Objective-C, you could only use values to compare in a `switch` statement.
    Swift allows developers more freedom in using the `switch` statement. With Swift,
    developers can now compare most objects including custom objects.


    The `switch` statement allows you to compare one or more values against another
    variable.


    ```

    var customerType = "Repeat"

    switch  customerType {     // The switch statement followed by a begin brace

    case "Repeat":       // Equivalent to if (customerType == "Repeat")

    ...               // Call functions and put any other statements here after the
    case.

    ...

    case "New":

    ...

    ...

    case "Seasonal":                   ...

    ...

    default:             // Swift requires all possibilities of a switch statement
    to be covered.

    }  // End of the switch statement.

    ```


    The `switch` statement is powerful, and it simplifies and streamlines comparisons
    to several different values.


    In Swift, the `switch` statement is a powerful statement that can be used to simplify
    repeated *if/else* statements.'
