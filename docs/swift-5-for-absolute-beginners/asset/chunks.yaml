    选择好项目的保存位置后，Xcode 主屏幕就会出现（见图 6-6）。最左侧的窗格是源文件列表。屏幕右侧的三分之二是上下文相关的编辑器。点击一个源文件，编辑器会显示其源代码。点击一个
    `.storyboard` 文件则会显示屏幕界面编辑器。


