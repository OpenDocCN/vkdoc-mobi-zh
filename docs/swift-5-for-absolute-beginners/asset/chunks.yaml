    is off, its value is 0\. If the transistor is on, its value is 1\. At the time
    of this writing, Apple’s A12 Bionic processor that powers the iPhone XS, iPhone
    XS Max, and iPhone XR, is a 6-core ARM processor with approximately 6.9 billion
    transistors, up from 149 million transistors within the A4 from the first iPad.
    Figure [3-1](#341013_5_En_3_Chapter.xhtml#Fig1) shows Apple’s latest iPhone processor,
    the A12 Bionic.


    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig1_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Apple’s proprietary A12 Bionic processor


    #### Moore’s Law


    The number of transistors within your iPhone’s or iPad’s processor is directly
    related to your device’s processing speed, graphics performance, memory capacity,
    and the sensors (accelerometer, gyroscope) available in the device. The more transistors
    there are, the more powerful your device is.


    In 1965, the cofounder of Intel, Gordon E. Moore, described the trend of transistors
    in a processor. He observed that the number of transistors in a processor doubled
    every 18 months from 1958 to 1965 and would likely continue “for at least 18 months.”
    The observation became famously known as Moore’s Law and has proven accurate for
    more than 60 years.


    ### Note


    There is a downside to Moore’s Law, and you have probably felt it in your wallet.
    The problem with rapidly increasing processing capability is that it renders technology
    obsolete quickly. So, when your iPhone’s two-year cell phone contract is up, the
    new iPhones on the market will be twice as powerful as the iPhone you had when
    you signed up. How convenient for everyone!


    ### Bytes


    A byte is another unit used to describe information storage on computers. A ***byte***
    is composed of eight bits. Whereas a bit can represent up to two different values,
    a byte can represent up to 2⁸, or 256, different values. A byte can contain values
    from 0 to 255.


    The ***binary*** number system represents the numerical symbols 0 and 1\. To illustrate
    how the number **71** would be represented in binary, you can use a simple table
    of eight bits (1 byte), with each bit represented as a power of two. To convert
    the byte value **01000111** to decimal, simply add up the on bits, as shown in
    Table [3-1](#341013_5_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    The Number 71 Represented As a Byte (64 + 4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 1 | 0 | 0 | 0 | 1 | 1 | 1 |


    To represent the number **22** in binary, turn on the bits that add up to 22,
    or **00010110**, as shown in Table [3-2](#341013_5_En_3_Chapter.xhtml#Tab2).


    Table 3-2


    The Number 22 Represented As a Byte (16 + 4 + 2)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 1 | 0 | 1 | 1 | 0 |


    To represent the number **255** in binary, turn on the bits that add up to 255,
    or **11111111**, as shown in Table [3-3](#341013_5_En_3_Chapter.xhtml#Tab3).


    Table 3-3


    The Number 255 Represented As a Byte (128 + 64 + 32 + 16 + 8 + 4 + 2 + 1)


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 1 | 1 | 1 | 1 | 1 | 1 | 1 | 1 |


    To represent the number **0** in binary, turn on the bits that add up to 0, or
    **00000000**, as shown in Table [3-4](#341013_5_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    The Number 0 Represented As a Byte


    | Power of 2 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | Value for **“on”** bit | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |

    | Actual bit | 0 | 0 | 0 | 0 | 0 | 0 | 0 | 0 |'
