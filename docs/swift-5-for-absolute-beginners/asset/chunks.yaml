  trans: "\n# Core Data 入门指南\n\n让我们从创建一个新的 Core Data 项目开始。\n\n1.  打开 Xcode，依次选择“文件”➤“新建”➤“项目”。要创建\
    \ iOS Core Data 项目，请从顶部菜单中选择 iOS。然后选择“单视图应用”，如图 11-1 所示。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig1_HTML.jpg](img/341013_5_En_11_Fig1_HTML.jpg)\n\
    \n    图 11-1. 创建新项目\n\n2.  完成后点击“下一步”按钮。下一个屏幕将允许你输入要使用的项目名称。在本章中，你需使用 `BookStore`\
    \ 这个名称。\n\n3.  靠近底部，你会看到一个名为“使用 Core Data”的复选框。请确保勾选此框，然后点击“下一步”，如图 11-2 所示。\n\
    \n    **注意** Core Data 可以在任何时候添加到任何项目中。在创建项目时勾选该框，会将 Core Data 框架和一个默认数据模型添加到你的应用程序中。如果你确定要使用\
    \ Core Data，勾选此框可以节省时间。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig2_HTML.jpg](img/341013_5_En_11_Fig2_HTML.jpg)\n\
    \n    图 11-2. 向项目添加 Core Data\n\n4.  选择一个位置保存项目，然后点击“创建”。\n\n完成之后，新项目将会打开。它看起来与标准应用程序类似，不同的是现在你会看到一个\
    \ `BookStore.xcdatamodeld` 文件。这个文件被称为*数据模型*，它将包含你将存储在 Core Data 中的数据的相关信息。\n\n\
    ## 模型\n\n点击模型文件（`BookStore.xcdatamodeld`）将其打开。你将看到一个类似于图 11-3 所示的窗口。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig3_HTML.jpg](img/341013_5_En_11_Fig3_HTML.jpg)\n\
    \n图 11-3. 空白的模型\n\n窗口分为两个部分。左侧是实体。用更通俗的术语来说，这些是你想要存储在数据库中的对象或项目。获取请求和配置超出了本书的范围，可能会在更深入探讨\
    \ Core Data 时涉及。获取请求允许你为数据创建筛选条件或查询。\n\n右侧部分在创建新实体后将包含该实体的属性。属性是关于实体的信息片段。例如，一本书就是一个实体，而书名是该实体的一个属性。\n\
    \n### 注意\n\n在数据库术语中，实体就是你的*表*，实体的属性被称为*列*。从这些实体创建的对象被称为*行*。\n\n右侧面板还会在实体创建后显示该实体的所有关系。关系将一个实体连接到另一个实体。例如，你将创建一个\
    \ `Book` 实体和一个 `Author` 实体。然后你将它们关联起来，这样每本书都可以有一个作者。\n\n让我们创建一个实体。\n\n1.  点击窗口底部的“添加实体”按钮，或者从菜单中选择“编辑器”➤“添加实体”，如图\
    \ 11-4 所示。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig4_HTML.jpg](img/341013_5_En_11_Fig4_HTML.jpg)\n\
    \n    图 11-4. 添加新实体\n\n2.  在左侧，双击实体名称，并将其改为 `Book`。\n\n    **注意** 你必须将实体名称的首字母大写。\n\
    \n3.  现在让我们添加一些属性。属性可以被看作是一本书的详细信息，因此你将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想存储更多信息，比如出版商、页数和类型，但这里我们从简单的开始。点击窗口右下角的“添加属性”按钮，或者选择“编辑器”➤“添加属性”，如图\
    \ 11-5 所示。如果没有看到添加属性的选项，请确保你已在左侧选中了 `Book` 实体。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig5_HTML.jpg](img/341013_5_En_11_Fig5_HTML.jpg)\n\
    \n    图 11-5. 添加新属性\n\n4.  对于属性，你只需提供两个选项：名称和数据类型。我们把这个属性命名为 `title`。与实体不同，属性名称必须小写。\n\
    \n5.  现在，你需要选择一种数据类型。选择正确的数据类型很重要。它将影响数据的存储方式以及从数据库中的检索方式。列表中有 13 个选项，可能让人有些不知所措。我们将讨论最常见的选项，随着你对\
    \ Core Data 越来越熟悉，你可以尝试其他选项。最常见的选项是 `String`（字符串）、`Integer 32`（32 位整数）、`Decimal`（小数）和\
    \ `Date`（日期）。对于书名，选择 `String`。\n\n    - `String`：用于存储文本的属性类型。它应用于存储任何非数字或日期的信息。在本例中，书名和作者将是字符串。\n\
    \    - `Integer 32`：属性有三种不同的整数值类型。这些整数类型的区别仅在于其最小值和最大值。`Integer 32` 应该能满足你存储整数时的大部分需求。整数是不带小数的数字。如果你试图将小数保存到整数属性中，小数部分将被截断。在本例中，出版年份将是一个整数。\n\
    \    - `Decimal`：小数是一种可以存储带小数的数字的属性类型。`Decimal` 与双精度（`Double`）属性类似，但它们在最小值、最大值和精度上有所不同。`Decimal`\
    \ 应当能够处理任何货币值。在本例中，你将使用 `Decimal` 来存储书的价格。\n    - `Date`：日期属性正如其名。它允许你存储日期和时间，并基于这些值执行搜索和查找。在本例中你不会用到这个类型。\n\
    \n6.  让我们为这本书创建其余属性。现在，添加 `price`。它应该是 `Decimal` 类型。添加书的出版年份。对于由两个单词组成的属性，标准的命名方式是将第一个单词全部小写，第二个单词的首字母大写。例如，出版年份属性的理想名称是\
    \ `yearPublished`。选择 `Integer 32` 作为属性类型。添加完所有属性后，你的界面应如图 11-6 所示。\n\n### 注意\n\
    \n属性名称不能包含空格。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig6_HTML.jpg](img/341013_5_En_11_Fig6_HTML.jpg)\n\
    \n图 11-6. 完成后的 Book 实体\n"
- fmt: "### Note\n\nIf you are used to working with databases, you will notice that\
    \ you did not add a primary key. A primary key is a field (usually a number) that\
    \ is used to uniquely identify each record in a database. In Core Data databases,\
    \ there is no need to create primary keys. The Framework will manage all of that\
    \ for you.\n\nNow that you have finished the `Book` entity, let’s add an `Author`\
    \ entity.\n\n1. Add a new entity and call it `Author`.\n2. To this entity, add\
    \ `lastName` and `firstName`, both of which are strings.\n\nOnce this is done,\
    \ you should have two entities in your entity list. Now you need to add the relationships.\n\
    \n1. Click the `Book` entity, and then click and hold on the Add Attribute button\
    \ that is located on the bottom right of the screen. Select Add Relationship,\
    \ as shown in Figure [11-7](#341013_5_En_11_Chapter.xhtml#Fig7). (You can also\
    \ click the plus under the Relationships section of the Core Data model.)\n\n\
    \   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg)\n\
    \n   Figure 11-7. Adding a new relationship\n\n2. You will be given the opportunity\
    \ to name your relationship. You usually give a relationship the same name as\
    \ the entity that you are referencing. Type in `author` as the name and select\
    \ Author from the Destination drop-down menu.\n\n3. You have created one-half\
    \ of your relationship. To create the other half, click the `Author` entity. Click\
    \ and hold the Add Attribute button located at the bottom right of the screen\
    \ and select Add Relationship. You will use the entity name that you are connecting\
    \ to as the name of this relationship, so you will call it `books`. (You are adding\
    \ an *s* to the relationship name because an author can have many books.) Under\
    \ Destination, select Book, and under Inverse, select the `author` relationship\
    \ you made in the previous step. In the Utilities window on the right side of\
    \ the screen, select the Data Model Inspector. Select To Many for the type of\
    \ the relationship. Your model should now look like Figure [11-8](#341013_5_En_11_Chapter.xhtml#Fig8).\n\
    \n   ### Note\n\n   Sometimes in Xcode, when working with models, it is necessary\
    \ to press the Tab key for the names of entities, attributes, and relationships\
    \ to update. This little quirk can be traced all the way back to WebObjects tools.\n\
    \n   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg)\n\
    \n   Figure 11-8. The final relationship\n\nBy default, Xcode will now know and\
    \ be able to use your new entities. If you need to customize your Core Data objects\
    \ such as adding validation or custom calculated properties, you will need to\
    \ tell Xcode to generate `NSManagedObject` subclasses for you. For this chapter,\
    \ we will use Xcode’s default implementation. You can check to make sure that\
    \ Xcode will generate these files at runtime, by clicking the Entity and then\
    \ viewing the Data Model Inspector on the right as shown in Figure [11-9](#341013_5_En_11_Chapter.xhtml#Fig9).\
    \ Make sure that Codegen is set to Class Definition.\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9. Checking an Entity’s Codegen status\n\nWhen Xcode generates the\
    \ Class Definitions for your entities, it will then make subclasses of `NSManagedObject`.\
    \ `NSManagedObject` is an object that handles all of the Core Data database interaction.\
    \ It provides the methods and properties you will be using in this example.\n\n\
    ### Managed Object Context\n\nXcode will create a managed object class called\
    \ `Book`. In Core Data, every managed object should exist within a managed object\
    \ context. The context is responsible for tracking changes to objects, carrying\
    \ out undo operations, and writing the data to the database. This is helpful because\
    \ you can now save a bunch of changes at once rather than saving each individual\
    \ change. This speeds up the process of saving the records. As a developer, you\
    \ do not need to track when an object has been changed. The managed object context\
    \ will handle all of that for you."
  raw: "### Note\n\nIf you are used to working with databases, you will notice that\
    \ you did not add a primary key. A primary key is a field (usually a number) that\
    \ is used to uniquely identify each record in a database. In Core Data databases,\
    \ there is no need to create primary keys. The Framework will manage all of that\
    \ for you.\n\nNow that you have finished the `Book` entity , let’s add an `Author`\
    \ entity .\n\n1.  Add a new entity and call it **Author**.\n\n2.  To this entity,\
    \ add `lastName` and `firstName`, both of which are strings.\n\nOnce this is done,\
    \ you should have two entities in your entity list. Now you need to add the relationships.\n\
    \n1.  Click the `Book` entity, and then click and hold on the Add Attribue button\
    \ that is located on the bottom right of the screen. Select Add Relationship,\
    \ as shown in Figure [11-7](#341013_5_En_11_Chapter.xhtml#Fig7). (You can also\
    \ click the plus under the Relationships section of the Core Data model.)\n\n\
    \    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg)\n\
    \n    Figure 11-7.\n\n    Adding a new relationship\n\n2.  You will be given the\
    \ opportunity to name your relationship. You usually give a relationship the same\
    \ name as the entity that you are referencing. Type in `author` as the name and\
    \ select Author from the Destination drop-down menu.\n\n3.  You have created one-half\
    \ of your relationship. To create the other half, click the `Author` entity. Click\
    \ and hold the Add Attributebutton located at the bottom right of the screen and\
    \ select Add Relationship. You will use the entity name that you are connecting\
    \ to as the name of this relationship, so you will call it `books`. (You are adding\
    \ an *s* to the relationship name because an author can have many books.) Under\
    \ Destination, select Book, and under Inverse, select the author relationship\
    \ you made in the previous step. In the Utilities window on the right side of\
    \ the screen, select the Data Model Inspector. Select To Many for the type of\
    \ the relationship. Your model should now look like Figure [11-8](#341013_5_En_11_Chapter.xhtml#Fig8).\n\
    \n    ### Note\n\n    Sometimes in Xcode, when working with models, it is necessary\
    \ to press the Tab key for the names of entities, attributes, and relationships\
    \ to update. This little quirk can be traced all the way back to WebObjects tools.\n\
    \n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg)\n\
    \n    Figure 11-8\n\n    The final relationship\n\nBy default, Xcode will now\
    \ know and be able to use your new entities. If you need to customize your Core\
    \ Data objects such as adding validation or custom calculated properties, you\
    \ will need to tell Xcode to generate NSManagedObject subclasses for you. For\
    \ this chapter, we will use Xcode’s default implementation. You can check to make\
    \ sure that Xcode will generate these files at runtime, by clicking the Entity\
    \ and then viewing the Data Model Inspector on the right as shown in Figure [11-9](#341013_5_En_11_Chapter.xhtml#Fig9).\
    \ Make sure that Codegen is set to Class Definition.\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9.\n\nChecking an Entity’s Codegen status\n\nWhen Xcode generates\
    \ the Class Definitions for your entities, it will then make subclasses of NSManagedObject.\
    \ `NSManagedObject` is an object that handles all of the Core Data database interaction.\
    \ It provides the methods and properties you will be using in this example.\n\n\
    ### Managed Object Context\n\nXcode will create a managed object class called\
    \ `Book`. In Core Data, every managed object should exist within a managed object\
    \ context. The context is responsible for tracking changes to objects, carrying\
    \ out undo operations, and writing the data to the database. This is helpful because\
    \ you can now save a bunch of changes at once rather than saving each individual\
    \ change. This speeds up the process of saving the records. As a developer, you\
    \ do not need to track when an object has been changed. The managed object context\
    \ will handle all of that for you."
  trans: "\n### 注意事项\n\n如果你习惯使用数据库，会发现这里没有添加主键。主键是一个字段（通常是数字），用于唯一标识数据库中的每条记录。在 Core\
    \ Data 数据库中，无需创建主键，框架会为你处理这一切。\n\n现在你已完成了`Book`实体，让我们添加一个`Author`实体。\n\n1. 添加一个新实体，命名为`Author`。\n\
    2. 为该实体添加`lastName`和`firstName`，两者均为字符串类型。\n\n完成后，你的实体列表中应有两个实体。接下来需要添加关系。\n\n\
    1. 点击`Book`实体，然后长按屏幕右下角的“添加属性（Add Attribute）”按钮，选择“添加关系（Add Relationship）”，如图\
    \ 11-7 所示。（你也可以点击 Core Data 模型中“Relationships”部分下的加号。）\n\n   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg](img/341013_5_En_11_Fig7_HTML.jpg)\n\
    \n   图 11-7. 添加新关系\n\n2. 系统会要求你命名该关系。通常将关系命名为你所引用的实体名称。输入`author`作为名称，并从“Destination”下拉菜单中选择`Author`。\n\
    \n3. 你已创建了关系的一半。要创建另一半，请点击`Author`实体。长按屏幕右下角的“添加属性”按钮，选择“添加关系”。你将使用要关联的实体名称作为此关系的名称，因此命名为`books`。（在关系名称后加了字母\
    \ *s*，因为一位作者可以有多本书。）在“Destination”下选择`Book`，在“Inverse”下选择你上一步创建的`author`关系。在屏幕右侧的“Utilities”窗口中，选择“Data\
    \ Model Inspector”。将关系类型设置为“To Many”。此时你的模型应如图 11-8 所示。\n\n   ### 注意事项\n\n   有时在\
    \ Xcode 中操作模型时，需要按 Tab 键才能更新实体、属性和关系的名称。这个小毛病可以追溯到 WebObjects 工具时代。\n\n   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg](img/341013_5_En_11_Fig8_HTML.jpg)\n\
    \n   图 11-8. 最终的关系\n\n默认情况下，Xcode 现在会识别并使用你的新实体。如果你需要自定义 Core Data 对象（例如添加验证逻辑或自定义计算属性），则需告知\
    \ Xcode 为你生成`NSManagedObject`子类。本章我们将使用 Xcode 的默认实现。你可以通过点击实体并查看右侧的“Data Model\
    \ Inspector”（如图 11-9 所示）来确认 Xcode 会在运行时自动生成这些文件。请确保“Codegen”设置为“Class Definition”。\n\
    \n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg](img/341013_5_En_11_Fig9_HTML.jpg)\n\
    \n图 11-9. 检查实体的 Codegen 状态\n\n当 Xcode 为你的实体生成类定义时，它会创建`NSManagedObject`的子类。`NSManagedObject`是一个对象，负责处理所有\
    \ Core Data 数据库的交互。它提供了本示例中将用到的方法和属性。\n\n### 托管对象上下文\n\nXcode 将创建一个名为`Book`的托管对象类。在\
    \ Core Data 中，每个托管对象都应存在于一个托管对象上下文中。该上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。这非常有用，因为你可以一次性保存多组更改，而不是逐条单独保存，从而加快记录保存的速度。作为开发者，你无需跟踪对象何时被修改，托管对象上下文将为你处理所有这些工作。\n"
- fmt: '### Setting Up the Interface


    The following steps will assist you in setting up your interface:


    1.  In the `BookStore` folder in your project, you should have a `Main.storyboard`
    file. Click this file and Xcode will open it in the editing window, as shown in
    Figure [11-10](#341013_5_En_11_Chapter.xhtml#Fig10).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig10_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig10_HTML.jpg)


    Figure 11-10. Creating the interface


    2.  There should be a blank window. To add some functionality to your window,
    you need to add some objects from the Object Library. Click the Object Library
    button and type `table` into the search field. This should narrow the objects,
    and you should see Table View Controller and Table View. Drag the Table View to
    the view, as shown in Figure [11-11](#341013_5_En_11_Chapter.xhtml#Fig11).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig11_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig11_HTML.jpg)


    Figure 11-11. Adding the Table View


    3.  You now have a Table View. You will need to stretch the Table View to fill
    your view. Drag all four corners of the Table View so that it covers your entire
    view as shown in Figure [11-12](#341013_5_En_11_Chapter.xhtml#Fig12).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig12_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig12_HTML.jpg)


    Figure 11-12. Stretching the Table View


    4.  To create cells in your Table View, you need to add a `UITableViewCell`. Your
    current search of table should show a Table View Cell beneath the Table View object.
    Drag a Table View Cell to your table. You now have a table and a cell on your
    view, as shown in Figure [11-13](#341013_5_En_11_Chapter.xhtml#Fig13).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig13_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig13_HTML.jpg)


    Figure 11-13. Adding the Table View Cell


    5.  Select the cell, and in the Attributes Inspector in the utilities section
    set Style to Basic. Also, set the Identifier to `Cell`. The identifier is used
    for when your Table View contains multiple styles of cells. You will need to differentiate
    them with unique identifiers. For simple projects, you can set this to `Cell`
    and not worry about it, as shown in Figure [11-14](#341013_5_En_11_Chapter.xhtml#Fig14).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig14_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig14_HTML.jpg)


    Figure 11-14. Changing the style and identifier of the cell


    6.  When using a Table View, it is usually a good idea to put it in a Navigation
    Controller. You will be using the Navigation Controller to give you space to put
    an Add button on your Table View. To add a Navigation Controller, select your
    View Controller in the Scene list, which is the window to the left of your storyboard
    that shows your View Controllers (your View Controller will have a yellow icon
    next to it). From the Application menu, select `Editor` ➤ `Embed In` ➤ `Navigation
    Controller`, as shown in Figure [11-15](#341013_5_En_11_Chapter.xhtml#Fig15).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig15_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig15_HTML.jpg)


    Figure 11-15. Embedding in a Navigation Controller


    7.  You will now have a navigation bar at the top of your view. You will now add
    a button to the bar. This type of button is called a `UIBarButtonItem`. Search
    for `bar button` in your Object Library and drag a Bar Button item to the top
    right of your view on the navigation bar, as shown in Figure [11-16](#341013_5_En_11_Chapter.xhtml#Fig16).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig16_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig16_HTML.jpg)


    Figure 11-16. Adding a Bar Button Item to the navigation bar


    8.  Select the Bar Button Item and change the System Item from Custom to Add as
    shown in Figure [11-17](#341013_5_En_11_Chapter.xhtml#Fig17). This will change
    the look of your Bar Button Item from the word *Item* to a plus icon.'
