  trans: '

    ### 规划属性


    让我们来看看书店示例和一些你需要创建的类。首先，创建一个 `Bookstore` 类很重要。一个 `Bookstore` 类包含了每个 `Bookstore`
    对象所存储信息的蓝图，例如书店的名称、地址、电话号码和徽标（见图 5-2）。将这些信息放在类中，而不是在你的应用程序中进行硬编码，将使你将来能够轻松地更改这些信息。你将在本章后面了解使用面向对象方法论的原因。此外，如果你的书店取得了巨大的成功，并且你决定再开一家，你将做好准备，因为你可以创建另一个
    `Bookstore` 类的对象。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig2_HTML.png](img/341013_5_En_5_Fig2_HTML.png)


    图 5-2. Bookstore 类


    我们还来规划一个 `Customer` 类（见图 5-3）。注意名称是如何被分解为 `名` 和 `姓` 的。在你的项目中，有时你可能只想使用客户的名，如果没有提前规划，将名和姓分离开会很困难。假设你想给客户寄一封信，告知他们即将举行的促销活动。你肯定不希望问候语写成“亲爱的
    John Doe”。写成“亲爱的 John”会显得更个性化。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig3_HTML.png](img/341013_5_En_5_Fig3_HTML.png)


    图 5-3. Customer 类


    你还会注意到地址是如何被分解成不同部分，而不是全部组合在一起的。`地址行 1`、`地址行 2`、`城市`、`州` 和 `邮编` 是分开的。这一点很重要，并且会在你的应用程序中使用到。让我们回到你打算寄给客户关于即将举行促销活动的信函上。


    你可能不想把它寄给所有居住在不同州的客户。通过分离地址，你可以轻松地筛选出那些你不想包含在邮寄名单中的客户。


    我们还向 `Customer` 类添加了 `喜爱书籍类型` 这个属性。添加这个属性是为了向你展示如何在每个类中保存许多不同类型的信息。如果你有一本新的悬疑小说要出版，并且想发送一封电子邮件提醒那些对悬疑小说特别感兴趣的客户，那么这个字段可能会派上用场。通过存储这类信息，你将能够有针对性地定位客户群中的不同部分。


    创建书店时，还需要一个 `Book` 类（见图 5-4）。你将存储关于这本书的信息，例如作者、出版商、类型、页数和版次（如果有多个版本的话）。`Book`
    类还会包含这本书的价格。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig4_HTML.png](img/341013_5_En_5_Fig4_HTML.png)


    图 5-4. Book 类


    你可以再添加一个名为 `Sale` 的类（见图 5-5）。这个类比之前讨论的其他类更抽象，因为它描述的不是一个具体的对象。你会注意到我们向 `Sale` 类添加了对一个客户和一本书的引用。因为
    `Sale` 类将跟踪书籍的销售情况，你需要知道哪本书被卖给了哪个客户。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig5_HTML.png](img/341013_5_En_5_Fig5_HTML.png)


    图 5-5. Sale 类


    现在你了解了这些类的属性，接下来需要看看每个类将拥有的一些方法。


    ### 规划方法


    你现在不会添加所有的方法，但是在开始时规划得越多，以后就越容易。并非你所有的类都会有很多方法。有些类可能根本没有方法。


    > **注意：** 在规划方法时，请记住让它们专注于特定的任务。方法越具体，就越有可能被重用。


    目前，你不会向 `Book` 类或 `Bookstore` 类添加任何方法。你将专注于其他两个类。


    对于 `Customer` 类，你将添加方法来列出该客户的购买历史。未来可能还需要添加其他方法，但现在你只添加这一个。你完成的 `Customer` 类图应该如图
    5-6 所示。靠近底部的线将属性与方法分开。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig6_HTML.png](img/341013_5_En_5_Fig6_HTML.png)


    图 5-6. 完成的 Customer 类


    对于 `Sale` 类，我们添加了三个方法。我们添加了 `信用卡扣款`、`打印发票` 和 `结账`（见图 5-7）。目前，你不需要知道如何实现这些方法，但你需要知道你计划将它们添加到你的类中。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig7_HTML.png](img/341013_5_En_5_Fig7_HTML.png)


    图 5-7. 完成的 Sale 类


    现在你已经完成了对类以及将添加到其中的方法的规划，你便有了一个统一建模语言（UML）图的雏形。基本上，这是开发人员用来规划其类、属性和方法的一种图表。通过创建这样的图表来开始你的开发过程，从长远来看将对你大有裨益。对
    UML 图的深入讨论超出了本书的范围。如果你想了解关于这个主题的更多信息，`smartdraw.com` 提供了非常出色的详细概述；请参见 [`www.smartdraw.com/uml-diagram/`](http://www.smartdraw.com/uml-diagram/)。Omnigroup
    ([`www.omnigroup.com`](http://www.omnigroup.com)) 提供了一个适用于 macOS 的优秀 UML 图表程序，名为
    Omnigraffle。


    图 5-8 显示了完整的图表。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig8_HTML.jpg](img/341013_5_En_5_Fig8_HTML.jpg)


    图 5-8. 书店的完整 UML 图

