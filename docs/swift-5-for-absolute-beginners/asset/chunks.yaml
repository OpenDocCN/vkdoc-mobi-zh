  trans: "\n# 使用 Interface Builder 创建示例 iPhone 应用\n\n让我们开始构建一个生成并显示随机数的 iPhone 应用，如图\
    \ 10-4 所示。该应用与你之前在第四章中创建的应用类似，但你会看到，在添加了 iOS 用户界面（UI）后，这个应用变得有趣多了。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig4_HTML.jpg](img/341013_5_En_10_Fig4_HTML.jpg)\n\
    \n图 10-4. 完成的 iOS 随机数生成器应用\n\n1.  打开 Xcode，选择“Create a new Xcode project”。确保你选择了\
    \ **iOS** 下的“Single View App”，然后点击“Next”，如图 10-5 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig5_HTML.jpg](img/341013_5_En_10_Fig5_HTML.jpg)\n\
    \n    图 10-5. 基于 Single View App 模板创建 iPhone 应用\n\n2.  将你的项目命名为 `RandomNumber`，语言选择\
    \ **Swift**，然后点击“Next”创建项目，如图 10-6 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig6_HTML.jpg](img/341013_5_En_10_Fig6_HTML.jpg)\n\
    \n    图 10-6. 命名你的新 Swift 项目\n\n3.  你的项目文件和设置将被创建并显示出来，如图 10-7 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig7_HTML.jpg](img/341013_5_En_10_Fig7_HTML.jpg)\n\
    \n    图 10-7. 源文件\n\n尽管这个项目中只有一个控制器，但在开发初期就创建好你的 MVC 分组仍是一个良好的编程实践。这有助于提醒你遵循 MVC\
    \ 范式，避免将所有代码不必要地塞进你的控制器中。\n\n1.  右键点击 `RandomNumber` 文件夹，然后选择“New Group”，如图 10-8\
    \ 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig8_HTML.jpg](img/341013_5_En_10_Fig8_HTML.jpg)\n\
    \n    图 10-8. 创建新分组\n\n2.  创建一个 Models 分组、一个 Views 分组和一个 Controllers 分组。\n\n3.\
    \  将 `ViewController.swift` 文件拖到 Controllers 分组。将 `Main.storyboard` 和 `LaunchScreen.storyboard`\
    \ 文件拖到 Views 分组。拥有这些分组有助于在开发代码时提醒你遵循 MVC 设计模式，并防止你将所有代码都放在控制器中，如图 10-9 所示。\n\n\
    \    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig9_HTML.jpg](img/341013_5_En_10_Fig9_HTML.jpg)\n\
    \n    图 10-9. 已整理好控制器和故事板文件的 MVC 分组\n\n4.  点击 `Main.storyboard` 文件以打开 Interface\
    \ Builder。\n\n## 使用 Interface Builder\n\n启动 Interface Builder 并开始处理视图的最常见方法是点击相关联的故事板文件，如图\
    \ 10-10 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig10_HTML.jpg](img/341013_5_En_10_Fig10_HTML.jpg)\n\
    \n图 10-10. 工作区窗口中的 Interface Builder\n\n当 Interface Builder 打开时，你可以看到画布上显示的场景。现在你可以设计你的用户界面了。首先，你需要了解\
    \ Interface Builder 中的一些子窗口。\n\n## 文档大纲\n\n故事板显示了视图包含的所有对象。以下是这些对象的一些示例：\n\n*\
    \   按钮\n*   标签\n*   文本字段\n*   Web 视图\n*   地图视图\n*   选择器视图\n*   表格视图\n\n### 注意\n\
    \n你可以展开文档大纲的宽度，以查看所有对象的详细列表，如图 10-10 所示。为了给画布腾出更多空间，你可以缩小或隐藏文件导航器。\n\n## 对象库\n\
    \n对象库是你发挥创造力的地方。它是一个对象的大杂烩，你可以将这些对象拖放到视图中。\n\n*   点击对象库按钮会显示“对象库弹出窗口”。通过调整弹出窗口的大小，对象库弹出窗口可以放大或缩小，如图\
    \ 10-11 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig11_HTML.jpg](img/341013_5_En_10_Fig11_HTML.jpg)\n\
    \n    图 10-11. 展开对象库弹出窗口以查看更多控件\n\n点击图 10-12 中的“图标视图”按钮，可以让你以更紧凑的方式查看对象库的内容，如图\
    \ 10-13 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig12_HTML.jpg](img/341013_5_En_10_Fig12_HTML.jpg)\n\
    \n图 10-12. 对象库图标视图按钮\n\n对于 Cocoa Touch 对象，库中包含以下内容：\n\n*   控件\n*   数据视图\n*   手势识别器\n\
    *   对象和控制器\n*   窗口和栏\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig13_HTML.jpg](img/341013_5_En_10_Fig13_HTML.jpg)\n\
    \n图 10-13. 对象库中的各种 Cocoa Touch 对象\n\n## 检查器面板和选择器栏\n\n检查器面板允许你更改控件的属性，使你的对象听从你的指令。检查器面板顶部有六个标签，如图\
    \ 10-14 所示：\n\n*   文件检查器\n*   快速帮助检查器\n*   标识检查器\n*   属性检查器\n*   大小检查器\n*   连接检查器\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig14_HTML.jpg](img/341013_5_En_10_Fig14_HTML.jpg)\n\
    \n图 10-14. 属性检查器和选择器栏\n\n## 创建视图\n\n随机数生成器的视图中将包含三个对象：一个标签和两个按钮。一个按钮用于生成种子，另一个按钮用于生成随机数，标签则用于显示应用生成的随机数。\n\
    \n1.  在对象库中滚动，将两个按钮（Button）和一个标签（Label）拖到视图控制器场景中，如图 10-15 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig15_HTML.jpg](img/341013_5_En_10_Fig15_HTML.jpg)\n\
    \n    图 10-15. 在视图中放置对象\n\n2.  双击第一个按钮，将其标题改为 \"Seed Random Number Generator\"\
    ，然后双击第二个按钮，将其标题改为 \"Generate Random Number\"，如图 10-16 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig16_HTML.jpg](img/341013_5_En_10_Fig16_HTML.jpg)\n\
    \n    图 10-16. 重命名按钮标题\n\n现在，你将用到 Xcode 的一个强大功能。你可以快速轻松地将你的输出口（outlet）和动作（action）连接到代码。实际上，Xcode\
    \ 更进一步；它会为你创建部分代码。你只需拖放即可。\n\n1.  点击屏幕右上角的“助理编辑器”图标。这将显示故事板中选定视图关联的 `.swift` 文件，如图\
    \ 10-17 所示。\n\n### 注意\n\n如果点击助理编辑器图标后没有显示正确的关联 `.swift` 文件，请确保你已经选中并高亮了该视图。同时，必须在助理编辑器的跳转栏中选择“Automatic”。\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig17_HTML.jpg](img/341013_5_En_10_Fig17_HTML.jpg)\n\
    \n图 10-17. 使用助理编辑器显示 `.swift` 文件\n"
- fmt: "### Using Outlets\n\nNow you can connect your label to your code by creating\
    \ an outlet.\n\n1.  Control-drag from the label in the view to the top of your\
    \ class file, as shown in Figure [10-18](#341013_5_En_10_Chapter.xhtml#Fig18).\
    \ This is holding down the Control key on the keyboard while clicking and dragging\
    \ with the mouse. You can also right-click and drag.\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig18_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig18_HTML.jpg)\n\
    \n    **Figure 10-18.** Control-dragging to create an outlet\n\n2.  A pop-up window\
    \ will appear. This enables you to name and specify the type of outlet.\n\n3.\
    \  Name the outlet `randomNumberLabel` as shown in Figure [10-19](#341013_5_En_10_Chapter.xhtml#Fig19)\
    \ and click the **Connect** button.\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig19_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig19_HTML.jpg)\n\
    \n    **Figure 10-19.** Pop-up for `randomNumberLabel` outlet\n\nThe code is created\
    \ for the outlet, and the outlet is now connected to the `Label` object in your\
    \ `Main.storyboard` file. The shaded circle next to line 12 indicates the outlet\
    \ is connected to an object in the `Main.storyboard` file, as shown in Figure\
    \ [10-20](#341013_5_En_10_Chapter.xhtml#Fig20).\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig20_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig20_HTML.jpg)\n\
    \n**Figure 10-20.** Outlet property code generated and connected to the `Label`\
    \ object\n\nThere is a declaration that may be new to you called `IBOutlet`, commonly\
    \ referred to simply as an *outlet*. Outlets signal to your controller that this\
    \ property is connected to an object in Interface Builder. `IBOutlet` will enable\
    \ Interface Builder to see the outlet and enable you to connect the property to\
    \ the object in Interface Builder.\n\nUsing the analogy of an electrical wall\
    \ outlet, these property outlets are connected to objects. Using Interface Builder,\
    \ you can connect these properties to the appropriate object. When you change\
    \ the properties of a connected outlet, the object that it is connected to will\
    \ automatically change.\n\n### Using Actions\n\nUser interface object events,\
    \ also known as *actions*, trigger methods.\n\nNow you need to connect the object\
    \ actions to the buttons.\n\n1.  Control-drag from the Seed Random Number Generator\
    \ button to the bottom of your class. Complete the pop-up as indicated in Figure\
    \ [10-21](#341013_5_En_10_Chapter.xhtml#Fig21) and click the **Connect** button.\
    \ Make sure the connection type is an Action and not an Outlet.\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig21_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig21_HTML.jpg)\n\
    \n    **Figure 10-21.** Completing the pop-up for the Seed method\n\n2.  Repeat\
    \ the previous steps for the Generate Random Number button to create a `generateAction`\
    \ method in your `ViewController` class.\n\n### The Class\n\nAll that is left\
    \ is to complete the code for your outlet and actions in the `.swift` file for\
    \ the controller.\n\nOpen the `ViewController.swift` file and complete the `seedAction`\
    \ and `generateAction` methods, as shown in Figure [10-22](#341013_5_En_10_Chapter.xhtml#Fig22).\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig22_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig22_HTML.jpg)\n\
    \n**Figure 10-22.** The `seedAction` and `generateAction` methods completed\n\n\
    There is some code you should examine a bit further. The following line seeds\
    \ the random generator so that you get a random number each time you run the app.\
    \ There are easier ways of to do this, but for the purposes of this section, you\
    \ just want to see how actions and outlets work.\n\n```\nsrandom(UInt32(time(nil)))\n\
    ```\n\nIn the following code, the property `text` sets the `UILabel` value in\
    \ your view. The connection you established in Interface Builder from your outlet\
    \ to the `Label` object does all the work for you.\n\n```\nrandomNumberLabel.text\n\
    ```\n\nThere are just a few more things you need to do now to finish your app.\
    \ Select the `Main.storyboard` file and then select your View Controller scene.\
    \ Click and drag your mouse to select the two buttons and the label in your view,\
    \ as shown in Figure [10-23](#341013_5_En_10_Chapter.xhtml#Fig23). Then, click\
    \ the **Embed In** button and choose **Stack View**, grouping the three items\
    \ together.\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig23_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig23_HTML.jpg)\n\
    \n**Figure 10-23.** Embedding in a Stack View\n\nFinally, select the stack view,\
    \ click the **Align** button, check both the **Horizontally in Container** and\
    \ **Vertically in Container** checkboxes, and click the **Add 2 Constraints**\
    \ button, as shown in Figure [10-24](#341013_5_En_10_Chapter.xhtml#Fig24). This\
    \ will center your controls correctly in your view.\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig24_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig24_HTML.jpg)\n\
    \n**Figure 10-24.** Centering the Stack View\n\nThat’s it!\n\nTo run your iPhone\
    \ app in the iPhone simulator, click the **Play** button. Your app should launch\
    \ in the simulator, as shown in Figure [10-25](#341013_5_En_10_Chapter.xhtml#Fig25).\n\
    \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig25_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig25_HTML.jpg)\n\
    \n**Figure 10-25.** The completed random number generator app running in the iOS\
    \ simulator\n\nTo generate the random number, tap the **Generate Random Number**\
    \ button.\n\n## Summary\n\nGreat job! Interface Builder saves you a lot of time\
    \ when creating user interfaces. You have a powerful set of objects to use in\
    \ your application and are responsible for a minimal amount of coding.\n\nInterface\
    \ Builder handles many of the details you would normally have to deal with.\n\n\
    You should be familiar with the following terms:\n\n*   Storyboard and XIB files\n\
    *   Model-View-Controller\n*   Architectural patterns\n*   Human Interface Guidelines\
    \ (HIG)\n*   Outlets\n*   Actions\n\n### Exercises\n\n*   Extend the random number\
    \ generator app to show a date and time in a `Label` object when the app starts.\n\
    *   After showing a date and time label, add a button to update the data and time\
    \ label with the new time.\n\n# 11. Storing Information\n\nAs a developer, there\
    \ will be many different situations when you will need to store data. Users will\
    \ expect your app to remember preferences and other information each time they\
    \ launch it. Previous chapters discussed the `BookStore` app. With this app, users\
    \ will expect your application to remember all of the books in the bookstore.\
    \ Your application will need a way to store this information, retrieve it, and\
    \ possibly search and sort this data. Working with data can sometimes be difficult.\
    \ Fortunately, Apple has provided methods and frameworks to make this process\
    \ easier.\n\nThis chapter discusses two different formats in which data will need\
    \ to be stored. It discusses how to save a preference file for an iOS device and\
    \ then how to use a SQLite database in your application to store and retrieve\
    \ data."
