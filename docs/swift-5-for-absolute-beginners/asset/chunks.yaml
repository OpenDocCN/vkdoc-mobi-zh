  trans: "\n# 用 Swift 编写示例应用\n\n根据你的需求和所学知识，尝试用 Swift 编写一个随机数生成器。\n\n要编写这个应用，你需离开\
    \ Playground 并将其作为 Mac 控制台应用来实现。遗憾的是，目前 Playground 无法让你与运行中的应用交互，因此你无法捕捉键盘输入。\n\
    \n你的 Swift 应用将通过命令行运行，因为它会要求用户猜一个随机数。\n\n1. 打开 Xcode 并选择“创建新的 Xcode 项目”。选择 **命令行工具**\
    \ macOS 项目（如图 4-3 所示），然后点击“下一步”。\n\n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig3_HTML.jpg](img/341013_5_En_4_Fig3_HTML.jpg)\n\
    \n   图 4-3. 新建一个命令行工具 macOS 项目\n\n2. 将你的项目命名为 **RandomNumber**（见图 4-4）。确保“语言”下拉菜单选择的是\
    \ Swift，然后点击“下一步”。将项目保存在硬盘上你喜欢的任意位置，然后点击“创建”。\n\n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig4_HTML.jpg](img/341013_5_En_4_Fig4_HTML.jpg)\n\
    \n   图 4-4. `RandomNumber` 的项目选项\n\n3. 打开 `main.swift` 文件。写入代码清单 4-13 中的代码。\n\n\
    ```swift\n1 //\n2 //  main.swift\n3 //  RandomNumber\n4 //\n\n6 import Foundation\n\
    \n8 var randomNumber = 1\n9 var continueGuessing = true\n10 var keepPlaying =\
    \ true\n11 var input = \"\"\n\n13 while keepPlaying {\n14     // 获取一个 0 - 100\
    \ 之间的随机数\n15     randomNumber = Int(arc4random_uniform(101))\n16     print(\"\
    要猜的随机数是：\\(randomNumber)\")\n\n18     while continueGuessing {\n19         print(\"\
    选择一个 0 到 100 之间的数字。\")\n20         // 获取键盘输入，并去除换行符\n21         input = String(bytes:\
    \ FileHandle.standardInput.availableData, encoding: .utf8)!\n22         input\
    \ = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\n24         if let\
    \ userGuess = Int(input) {\n25             if userGuess == randomNumber {\n26\
    \                 continueGuessing = false\n27                 print(\"猜对了！\"\
    )\n28             } else if userGuess > randomNumber {\n29                 //\
    \ 用户猜得太高了\n30                 print(\"你猜得太高了！\")\n31             } else{\n32 \
    \                // 无需检查 userGuess < randomNumber，因为只能是这个情况\n33              \
    \   print(\"你猜得太低了！\")\n34             }\n35         } else {\n36            \
    \ print(\"无效的猜测，请重试。\")\n37         }\n38     }\n\n40     print(\"再玩一次？Y 或 N\"\
    )\n41     input = String(bytes: FileHandle.standardInput.availableData, encoding:\
    \ .utf8)!\n42     input = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\
    \n44     if input == \"N\" || input == \"n\" {\n45         keepPlaying = false\n\
    46     }\n\n48     continueGuessing = true\n49 }\n```\n\n代码清单 4-13 随机数生成器应用的源代码\n\
    \n在代码清单 4-13 中，有一些我们之前未讨论过的新代码。第一行新代码（第 15 行）如下：\n\n```swift\nrandomNumber = Int(arc4random_uniform(101))\n\
    ```\n\n这一行会生成一个 0 到 100 之间的随机数。`arc4random_uniform()` 是一个返回随机数的函数。\n\n下一行新代码位于第\
    \ 21 行：\n\n```swift\ninput = String(bytes: FileHandle.standardInput.availableData,\
    \ encoding: .utf8)!\n```\n\n这使你能够获取用户的键盘输入。我们将在后续章节中讨论这种语法。\n\n下一行新代码位于第 24 行：\n\
    \n```swift\nif let userGuess = Int(input)\n```\n\n`Int` 接受一个字符串初始化器并将其转换为整数。\n\
    \n## 嵌套的 `if` 语句和 `else if` 语句\n\n有时，需要嵌套 `if` 语句。这意味着你需要在已有的 `if` 语句内部嵌套 `if`\
    \ 语句。此外，有时需要在 `if` 语句的 `else` 部分的第一步进行一个比较。这被称为 `else if` 语句（回想代码清单 4-13 中的第 28\
    \ 行）。\n\n```swift\nelse if userGuess > randomNumber\n```\n\n## 移除多余字符\n\n代码清单\
    \ 4-13 中的第 22 行如下：\n\n```swift\ninput = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\
    ```\n\n读取键盘输入可能会有些棘手。在本例中，它会在字符串末尾留下一个残余字符 `\\n`，你需要将其移除。这是一个*换行*符，当用户按下键盘上的 Return\
    \ 键时会产生。`trimmingCharacters(in: .whitespacesAndNewlines)` 方法会返回一个新字符串，其中原字符串开头或结尾的任意空格或换行符都被移除。\n\
    \n## 通过重构改进代码\n\n通常，在代码运行成功后，你会检查代码并找到更高效的编写方式。重写代码使其更高效、更易维护和更易读的过程称为*代码重构*。\n\
    \n当你审查 Swift 代码时，经常会注意到可以删除一些不必要的代码。\n\n> **注意**：作为开发者，我们发现最好的代码行就是你无需编写的那一行——代码越少，调试和维护的工作量就越少。\n\
    \n## 运行应用\n\n要运行你的应用，请点击 Swift 项目屏幕左上角的“播放”按钮。见图 4-5。（注意：如果你在低于 10.14.4 版本的 macOS\
    \ 上运行 Xcode 10.2，你首先需要安装适用于命令行工具的 Swift 5 运行时支持，该支持可从 [`https://developer.apple.com/download/more/`](https://developer.apple.com/download/more/)\
    \ 下载。）\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig5_HTML.jpg](img/341013_5_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5. Swift 随机数生成器应用的控制台输出\n\n> **注意**：如果运行应用时未看到输出控制台，请确保在编辑器右上角和右下角选择了相同的选项（选择“视图”➤“调试区”➤“激活控制台”）。\n"
- fmt: '### Design Requirements


    As discussed in Chapter [1](#341013_5_En_1_Chapter.xhtml), the most expensive
    process in the software development life cycle is writing code. The least expensive
    process in the software development life cycle is gathering the requirements for
    your application; yet, this latter process is the most overlooked and least used
    in software development.


    Design requirements usually begin by asking clients, customers, and/or stakeholders
    how the application should work and what problems it should solve.


    With respect to apps, requirements can include long or short narrative descriptions,
    screen mock-ups, and formulas. It is far easier to open your word processor and
    change the requirements and screen mock-ups before coding begins than it is to
    modify an iOS app. The following is the design requirement for one view of an
    iPhone mobile banking app:


    - *View*: Accounts view.

    - *Description*: Displays the list of accounts the user has. The list of accounts
    will be in the following sections: Business Accounts, Personal Accounts and Car
    Loans, IRA, and Home Equity Loans.

    - *Cells*: Each cell will contain the account name, the last four digits of the
    account, the available balance, and the present balance.


    A picture is worth a thousand words. Screen mock-ups are helpful to developers
    and users because they can show how the views will look when they are completed.
    There are many tools that can quickly design mock-ups like Sketch and OmniGraffle.
    See Figure [4-6](#341013_5_En_4_Chapter.xhtml#Fig6) for an example of a screen
    mock-up used for design requirements generated by OmniGraffle.


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig6_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig6_HTML.jpg)


    Figure 4-6. Screen mock-up for a mobile banking app using OmniGraffle and the
    Ultimate iPhone Stencil plug-in. This mock-up was done for the original Woodforest
    Banking app in 2010.


    Many developers believe that design requirements take too long and are unnecessary.
    This is not the case. There is a lot of information presented on the Accounts
    screen in Figure [4-6](#341013_5_En_4_Chapter.xhtml#Fig6). Many business rules
    can determine how information is displayed to the users, along with all of the
    error handling when things go bad. When designing your app, working with all the
    business stakeholders at the beginning of the development process is critical
    to getting it right the first time.


    Figure [4-7](#341013_5_En_4_Chapter.xhtml#Fig7) is an example of all stakeholders
    being involved in your app’s development. Having all stakeholders involved in
    every view from the beginning will eliminate multiple rewrites and application
    bugs.


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig7_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig7_HTML.jpg)


    Figure 4-7. Woodforest Mobile Banking app as it appeared on the App Store in 2015;
    compare this with the app requirements Accounts screen in Figure [4-6](#341013_5_En_4_Chapter.xhtml#Fig6)


    Additionally, Apple recommends that developers spend at least 50 percent of their
    development time on the user interface’s design and development.


    Balsamiq also has great tools for laying out your iOS app’s look. See Figure [4-8](#341013_5_En_4_Chapter.xhtml#Fig8).


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig8_HTML.jpg](images/341013_5_En_4_Chapter/341013_5_En_4_Fig8_HTML.jpg)


    Figure 4-8. Balsamiq.com web site for creating wireframe mock-ups


    ## Summary


    This chapter covered a lot of important information on how to control your applications;
    program flow and decision-making are essential to every iOS app. Make sure you
    have completed the Swift example in this chapter. You might review these examples
    and think you understand everything without having to write this app. This will
    be a fatal mistake that will prevent you from becoming a successful iOS developer.
    You must spend time coding this example. Developers learn by doing, not by reading.


    The terms in this chapter are important. You should be able to describe the following:


    - `AND`

    - `OR`

    - `XOR`

    - `NAND`

    - `NOR`

    - `NOT`

    - Truth tables

    - Negation

    - All comparison operators

    - Application requirement

    - Logical `AND` (`&&`)

    - Logical `OR` (`||`)

    - Optionals and forced unwrapping

    - Optional binding

    - Implicitly unwrapped optionals

    - Flowchart

    - Loop

    - Count-controlled loops

    - For loop

    - Condition-controlled loops

    - Infinite loops

    - `While` loops

    - Nested `if` statements

    - Code refactoring


    ### Exercises


    - Extend the random number generator app to print to the console how many times
    the user guessed before guessing the correct random number.

    - Extend the random number generator app to print to the console how many times
    the user played the app. Print this value to the console when the user quits the
    app.


    # Object-Oriented Programming with Swift


    Over the past 17 years, the programming world focused on the development paradigm
    of object-oriented programming (OOP). Most modern development environments and
    languages implement OOP. Put simply, OOP forms the basis of everything you develop
    today.


    You may be asking yourself why we waited until Chapter [5](#341013_5_En_5_Chapter.xhtml)
    to present OOP using Swift if it is the primary development style of today. The
    simple answer is that it is not an easy concept for new developers. This chapter
    will go into detail about the different aspects of OOP and how they affect your
    development.


    Implementing OOP into your applications correctly will take some front-end planning,
    but you will save yourself a lot of time throughout the life of your projects.
    OOP has changed the way development is done. In this chapter, you will learn what
    OOP is. OOP was initially discussed in the first chapter of this book, but this
    chapter will go into more detail about it. You will revisit what objects are and
    how they relate to physical objects you find in the world. You will look into
    what classes are and how they relate to objects. You will also learn the steps
    you need to take when planning your classes and some visual tools you can use
    to accomplish these steps. When you have read this chapter and have worked through
    the exercises, you will have a better understanding of what OOP is and why it
    is necessary for you as a developer.


    At first, objects and object-oriented programming may seem difficult to understand,
    but the hope is that as you progress through this chapter, they will begin to
    make sense.'
