- fmt: '# Understanding Interface Builder


    Interface Builder saves the user interface file as a bundle that contains the
    interface objects and relationships used in the application. These bundles previously
    had the file extension `".nib"`. Version 3.0 of Interface Builder used a new XML
    file format, and the file extension changed to `".xib"`. However, developers still
    call these files *nib* files. Later Apple introduced storyboards. Storyboards
    enable you to have all of your views in one file with a `".storyboard"` extension.


    Unlike most other graphical user interface applications, XIBs and storyboards
    are often referred to as *freeze-dried* because they contain the archived objects
    themselves and are ready to run.


    The XML file format is used to facilitate storage with source control systems
    such as Subversion and Git.


    In the next section, we’ll discuss an app design pattern called Model-View-Controller.
    This design pattern enables developers to more easily maintain code and reuse
    objects over the life of an app.


    ## The Model-View-Controller Pattern


    Model-View-Controller (MVC) is the most prevalent architectural pattern used in
    iOS development, and learning about it will make your life as a developer much
    easier.


    Architectural patterns describe solutions to software design problems that developers
    can use in their code. The MVC pattern is not unique to iOS developers; it is
    being adopted by many makers of integrated development environments (IDEs), including
    those running on Windows and Linux platforms.


    Software development is considered an expensive and risky venture for businesses.
    Frequently, apps take longer than expected to write, come in over budget, and
    don’t work as promised. Object-oriented programming (OOP) produced a lot of hype
    and gave the impression that companies would realize savings if they adopted its
    methodology, primarily because of the reusability of objects and easier maintainability
    of the code. Initially, this didn’t happen.


    When engineers looked at why OOP wasn’t living up to these expectations, they
    discovered a key shortcoming with how developers were designing their objects:
    Developers were frequently mixing objects in such a way that the code became difficult
    to maintain as the application matured, the code moved to different platforms,
    or hardware displays changed.


    Objects were often designed so that if any of the following changed, it was difficult
    to isolate the objects that were impacted:


    *   Business rules

    *   User interfaces

    *   Client-server or Internet-based communication


    Objects can be broken down into three task-related categories. It is the responsibility
    of the developer to ensure that each of these categories keeps their objects from
    drifting across to other categories.


    As objects are categorized in these groups, apps can be developed and maintained
    more easily over time. The following are examples of objects and their associated
    MVC category for an iPhone banking application:


    **Model**


    *   Account balances

    *   User encryption

    *   Account transfers

    *   Account login


    **View**


    *   Account balances table cell

    *   Account login spinner control


    **Controller**


    *   Account balance view controller

    *   Account transfer view controller

    *   Logon view controller


    The easiest way to remember and classify your objects in the MVC design pattern
    is the following:


    *   *Model*: Unique business or application rules or code that represent the real
    world. This is where the data resides.

    *   *View*: Unique user interface code.

    *   *Controller*: Anything that controls or communicates with the model or view
    objects.


    Figure [10-2](#341013_5_En_10_Chapter.xhtml#Fig2) represents the MVC paradigm.


    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig2_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig2_HTML.jpg)


    Figure 10-2. MVC paradigm


    Neither `Xcode` nor `Interface Builder` forces developers to use the MVC design
    pattern. It is up to the developers to organize their objects in such a way to
    use this design pattern.


    It is worth mentioning that Apple strongly embraces the MVC design pattern, and
    all of the frameworks are designed to work in an MVC world. This means that if
    you also embrace the MVC design pattern, working with Apple’s classes will be
    much easier. If you don’t, you’ll be swimming upstream.


    ## Human Interface Guidelines


    Before you get too excited and begin designing dynamic user interfaces for your
    app, you need to learn some of the ground rules. Apple has developed one of the
    most advanced operating systems in the world with iOS. Additionally, Apple’s products
    are known for being intuitive and user friendly. Apple wants users to have the
    same experience from one app to the next.


    To ensure a consistent user experience, Apple provides developers with guidelines
    on how their apps should look and feel. These guidelines, called the Human Interface
    Guidelines (HIG), are available for iOS, macOS, watchOS, and tvOS. You can review
    these guidelines at `https://developer.apple.com/design/human-interface-guidelines/`,
    as shown in Figure [10-3](#341013_5_En_10_Chapter.xhtml#Fig3).


    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig3_HTML.jpg](images/341013_5_En_10_Chapter/341013_5_En_10_Fig3_HTML.jpg)


    Figure 10-3. Apple’s Human Interface Guidelines


    ### Note


    Apple’s HIG is more than recommendations or suggestions. Apple takes it very seriously.
    While the HIG doesn’t describe how to implement your user interface designs in
    code, it is great for understanding the proper way to implement your views and
    controls.


    The following are some of the top reasons apps are rejected in Apple’s App Store:


    *   The app crashes.

    *   The app violates the HIG.

    *   The app uses Apple’s private APIs.

    *   The app doesn’t function as advertised on the App Store.


    ### Note


    You can read, learn, and follow the HIG before you develop your app, or you can
    read, learn, and follow the HIG after your app gets rejected by Apple and you
    have to rewrite part or all of it. Either way, all iOS developers will end up
    becoming familiar with the HIG.


    Many new iOS developers find this out the hard way, but if you follow the HIG
    from day one, your iOS development will be a far more pleasurable experience.'
