  trans: "\n### 添加描述\n\n现在，您需要在视图中添加描述。描述略有不同，因为它可以跨越多行。为此，您将使用`Text View`对象。\n\n\
    1.  首先，将“描述：”标签添加到视图中，如图 8-12 所示。\n   ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig12_HTML.png](img/341013_5_En_8_Fig12_HTML.png)\n\
    \   图 8-12. 为描述添加新的`Label`对象\n\n2.  接下来，将`Text View`对象添加到详细场景中，如图 8-13 所示。`Text\
    \ View`对象的优势在于它能够轻松显示多行文本。虽然`Label`对象也可以显示多行，但不如`Text View`对象那么清晰。\n   **注意** 默认情况下，`Text\
    \ View`控件中填充了各种看似随机的文本。这种文本被称为*Lorem Ipsum*文本。如果您需要用文本填充页面，可以在网络上找到任意数量的 Lorem\
    \ Ipsum 生成器。至于`Text View`控件，这些文本可以保持不变，因为您将在运行时将其移除。此外，如果将其清空，在屏幕上准确找到`Text View`控件的位置会变得更加困难——它是白底白字！\n\
    \   ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig13_HTML.png](img/341013_5_En_8_Fig13_HTML.png)\n\
    \   图 8-13. 向详细视图中添加`Text View`\n\n3.  为了让程序能够利用`Text View`，您需要像为标题和描述创建输出口那样，为其创建一个输出口。只需像之前一样，按住\
    \ Control 键并将`Text View`拖拽到`DetailViewController`文件中。将此变量命名为`descriptionTextView`。`DetailViewController`中完成后的变量部分将如代码\
    \ 8-10 所示。\n   1. 注意，其类型是`UITextView`而非`UILabel`——这一点很重要。\n\n```\n1    import\
    \ UIKit\n3    class DetailViewController: UIViewController {\n5        @IBOutlet\
    \ weak var titleLabel: UILabel!\n6        @IBOutlet weak var authorLabel: UILabel!\n\
    8        @IBOutlet weak var descriptionTextView: UITextView!\n代码 8-10\n为 Text\
    \ View 添加输出口以保存描述\n```\n\n### 注意事项\n\n如前所述，将`descriptionTextView`属性设置为`UITextView`类型非常重要。例如，如果意外地将其设置为`UILabel`对象，那么在尝试将屏幕上的`Text\
    \ View`连接到输出口时，Xcode 将无法找到`descriptionTextView`输出口。为什么？因为 Xcode 知道该控件是一个`UITextView`，并正在寻找一个类型为`UITextView`的输出口。\n\
    \n### 创建一个简单的数据模型类\n\n为了使应用程序能够运行，它需要拥有一些要显示的数据。为此，您将使用之前创建的`BookStore`对象作为数据模型类。数据模型类并没有什么不同，只是其全部目的是允许应用程序通过对象访问数据。\n\
    \n修改`BookStore.swift`文件，使其内容如代码 8-11 所示。\n\n```\n1 //\n2 //  BookStore.swift\n\
    3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright ©\
    \ 2019 Innovativeware. All rights reserved.\n7 //\n9    import Foundation\n11\
    \    class BookStore {\n12        var bookList: [Book] = []\n13    }\n代码 8-11\n\
    修改 BookStore.swift 类以包含一个数组\n```\n\n在第 12 行，您添加了一个变量用于保存书籍列表；该属性被简单命名为`bookList`。请注意，`bookList`是一个数组，它允许您添加一系列对象，在本例中是一组`Book`对象。\n\
    \n接下来，让我们继续向 Swift 文件`BookStore.swift`中添加代码，如代码 8-12 所示。\n\n```\n1 //\n2 //  BookStore.swift\n\
    3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright ©\
    \ 2019 Innovativeware. All rights reserved.\n7 //\n9 import Foundation\n11 class\
    \ BookStore {\n12     var bookList: [Book] = []\n14     init() {\n15         var\
    \ newBook = Book()\n16         newBook.title = \"Swift for Absolute Beginners\"\
    \n17         newBook.author = \"Bennett and Lees\"\n18         newBook.description\
    \ = \"iOS Programming made easy.\"\n19         bookList.append(newBook)\n21  \
    \       newBook = Book()\n22         newBook.title = \"A Farewell to Arms\"\n\
    23         newBook.author = \"Ernest Hemingway\"\n24         newBook.description\
    \ = \"The story of an affair between an English nurse and an American soldier\
    \ on the Italian front during World War I.\"\n25         bookList.append(newBook)\n\
    26     }\n27 }\n代码 8-12\n实现 BookStore 数据对象\n```\n\n在代码 8-12 中，第 14 至 26 行定义了对象的`init`方法，该方法在对象首次初始化时被调用。在此方法中，您初始化了计划添加到书店中的两本书。第\
    \ 15 行是第一个`Book`对象被分配和初始化的地方。第 16 至 18 行为您的第一本书添加了标题、作者和描述。最后，第 19 行将新的`Book`对象添加到`bookList`数组中。这里需要注意的重要一点是，一旦对象被添加到数组中，代码就可以不再关心它；现在数组拥有了该对象的所有权。因此，第\
    \ 21 行不会出现问题。\n\n第 21 行分配了一个新的`Book`对象，覆盖了旧值。这告诉编译器您不再需要使用旧值。\n\n第 22 至 25 行简单地初始化了第二本书并将其添加到数组中。\n\
    \n就是这样！这就是定义一个简单数据模型类所需的全部内容。接下来，您需要修改`MasterViewController`以访问此类，使其能够开始显示一些数据。\n"
- fmt: '### Modifying the `MasterViewController`


    The simple application has two view controllers: the main view controller, which
    is called `MasterViewController`, and a secondary one called `DetailViewController`.
    View controllers are objects that simply control the behavior of a view. For the
    application to start displaying data from the data model, you need to first modify
    the `MasterViewController` —this is where the navigation of the application begins.
    The following code is already in place in the template that Xcode has provided.
    You’re just going to modify it to add your data model.


    First you’ll need to modify the `MasterViewController.swift` file. You need to
    add a variable to hold the `Bookstore` object. Listing [8-13](#341013_5_En_8_Chapter.xhtml#PC29)
    shows that the instance variable is added as a property on line 15.


    ```

    1 //

    2 //  MasterViewController.swift

    3 //  BookStore

    4 //

    5 //  Created by Thorn on 03/06/19.

    6 //  Copyright © 2019 Innovativeware. All rights reserved.

    7 //


    9 import UIKit


    11 class MasterViewController: UITableViewController {


    13     var detailViewController: DetailViewController? = nil

    14     var objects = [Any]()

    15     var myBookStore = BookStore()

    Listing 8-13

    Adding the BookStore Object

    ```


    Now that the `BookStore` object is initialized, you need to tell `MasterViewController`
    how to display the list of books—not the detail, just the book titles. To do this,
    you’ll need to modify a few methods. Fortunately, Xcode has provided a nice template,
    so the modifications are small.


    `MasterViewController` is a subclass of what’s called a `UITableViewController`
    class, which displays rows of data to the screen. In this case, these are rows
    of book titles (well, just two for this simple program but a list nonetheless).


    There are three main methods that control what and how data is displayed in a
    `UITableViewController`:


    *   The first is `numberOfSections(in:)`: Since the application has only one list,
    or section, this method returns 1.

    *   The second is `tableView(_:numberOfRowsInSection:)`: In this program, you
    return the number of books in the bookstore array. Since this is the only section,
    the code is straightforward.

    *   The third is `tableView(_:cellForRowAt:)`: This method is called for each
