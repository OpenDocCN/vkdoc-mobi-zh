    选择模板并点击 **Next** 按钮后，Xcode 会弹出一个对话框，要求输入项目名称和其他一些信息，如图 6-5 所示。在产品名称中输入 **Chapter6**。组织标识符（Organization
    identifier）必须填写一些内容，这里我们使用 `com.inno`。如果你计划在真实的 iOS 设备上运行此应用或将其提交到 App Store，则需要从下拉菜单中选择你的开发团队。如果现在不选择，也可以稍后添加到项目中。


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig5_HTML.jpg](img/341013_5_En_6_Fig5_HTML.jpg)


    图 6-5. 设置产品名称、公司标识和类型


    提供所有信息后，点击 **Next** 按钮。Xcode 会询问你保存项目的位置。你可以将其保存在任何地方，但桌面是个不错的选择，因为它总是可见的。


    ![../images/341013_5_En_6_Chapter/341013_5_En_6_Fig6_HTML.jpg](img/341013_5_En_6_Fig6_HTML.jpg)


