- fmt: "## Optionals\n\nSwift introduces an important concept called *optionals* that\
    \ developers need to understand. Even for experienced Objective-C iOS developers,\
    \ this concept is new. Optionals are not a hard topic to understand, but they\
    \ take some time to get used to.\n\nUse optionals when a value may be absent.\
    \ An optional says the following:\n\n*   A variable may or may not have a value\
    \ assigned to it.\n\nThere are times when a constant or variable might not have\
    \ a value. Listing [3-1](#341013_5_En_3_Chapter.xhtml#PC7) shows an example of\
    \ the integer initializer called `Int()`, which converts a `String` value to an\
    \ `Int`.\n\n```\n1 let myString = \"42\"\n2 let someInteger = Int(myString)\n\
    3 // someInteger is inferred to be of type \"Int?\", or \"optional Int\"\nListing\
    \ 3-1\nConverting a String to an Integer\n```\n\nThe constant `someInteger` is\
    \ assigned the integer value `42`. `someInteger` is also assigned the type of\
    \ `Int?`. The question mark indicates that it is an optional type, meaning that\
    \ the variable or constant’s value may be absent. See Listing [3-2](#341013_5_En_3_Chapter.xhtml#PC8).\n\
    \n```\n1 let myString = \"Hello World\"\n2 let someInteger = Int(myString)\n3\
    \ // someInteger's value is now absent\nListing 3-2\nUnable to Convert a String\
    \ to an Integer\n```\n\nLine 2 in Listing [3-2](#341013_5_En_3_Chapter.xhtml#PC8)\
    \ has a problem. It is not possible to convert “Hello World” from a `String` to\
    \ an `Int`. So, the value of `someInteger` is said to be absent or `nil` because\
    \ on line 2, `someInteger` is inferred to be an optional `Int`.\n\n### Note\n\n\
    Objective-C programmers may have used `nil` to return an object from a method,\
    \ with `nil` meaning “the absence of a valid object.” This works for objects but\
    \ not well for structures, basic C types, or enumeration values. Objective-C methods\
    \ typically return a special value, like `NSNotFound`, indicating the absence\
    \ of a valid object. This assumes that the method’s caller knows the special value\
    \ to test against. Optionals indicate the absence of a value for *any type at\
    \ all*, without using special constants.\n\nThe `Integer Int()` initializer might\
    \ fail to return a value, so the method returns an *optional* `Int`, rather than\
    \ an `Int`. Again, the question mark indicates that the value it contains is optional,\
    \ meaning that it might contain *some* `Int` value, or it may contain *no value\
    \ at all*. The value is either some `Int` or is nothing at all.\n\nSwift’s `nil`\
    \ is not the same as `nil` in Objective-C. With Objective-C, `nil` is a pointer\
    \ to a nonexistent object. In Swift, `nil` is not a pointer; it is the absence\
    \ of a value. Optionals of any type can be set to `nil`, not just object types.\n\
    \nIn Chapter [4](#341013_5_En_4_Chapter.xhtml), you will learn how to “unwrap”\
    \ optionals and check for the presence of a valid object.\n\n## Using Variables\
    \ in Playgrounds\n\nNow that you have learned about data types, let’s write your\
    \ code in a playground that adds two numbers and displays the sum\n\n1.  Open\
    \ Xcode and select “Get started with a playground,” as shown in Figure [3-3](#341013_5_En_3_Chapter.xhtml#Fig3).\n\
    \n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig3_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig3_HTML.jpg)\n\
    \n    Figure 3-3\n\n    Creating a playground\n\n2.  Select a Blank iOS template\
    \ and click Next, as shown in Figure [3-4](#341013_5_En_3_Chapter.xhtml#Fig4).\
    \ Finally, name your playground **DataTypes** and click Create.\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig4_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig4_HTML.jpg)\n\
    \n    Figure 3-4\n\n    Selecting a Blank iOS playground template\n\n3.  When\
    \ your playground is created, two lines of code are already placed in your code\
    \ for you, as shown in Figure [3-5](#341013_5_En_3_Chapter.xhtml#Fig5).\n\n  \
    \  ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig5_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig5_HTML.jpg)\n\
    \n    Figure 3-5\n\n    Two lines of code\n\n4.  Add the code to this playground,\
    \ as shown in Listing [3-3](#341013_5_En_3_Chapter.xhtml#PC9).\n\n```\n1 import\
    \ UIKit\n\n3 var str = \"Hello, playground\"\n\n5 var firstNumber = 2\n6 var secondNumber\
    \ = 3\n\n8 var totalSum = firstNumber + secondNumber\n\n10 firstNumber = firstNumber\
    \ + 1\n11 secondNumber = secondNumber + 1\n\n13 totalSum = firstNumber + secondNumber\n\
    \n15 print(\"totalSum = \\(totalSum)\")\nListing 3-3\nPlayground Adding\n```\n\
    \nYour playground should look like Figure [3-6](#341013_5_En_3_Chapter.xhtml#Fig6).\n\
    \n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig6_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6\n\nPlayground displaying the results of your Swift code\n\nOne of\
    \ the neat features of playgrounds is that as you type in your code, Swift executes\
    \ the line of code as you enter it so you can immediately view the results.\n\n\
    The `//` used in Swift programming enables programmers to make comments about\
    \ their code. Comments are not compiled by your applications and are used as notes\
    \ for the programmer or, more importantly, for programmers who follow the original\
    \ developer. Comments help both the original developer and later developers understand\
    \ how the app was developed.\n\nSometimes, it is necessary for comments to span\
    \ several lines or just part of a line. This can be accomplished with `/*` and\
    \ `*/`. All the text between `/*` and `*/` is treated as comments and is not compiled.\n\
    \n`print` is a function that can take one parameter and print its contents.\n\n\
    ### Note\n\nIf your editor doesn’t have the same menus or gutter (the left column\
    \ that contains the line numbers of the program) that you saw in the previous\
    \ screenshots, you can turn these settings in Xcode preferences. You can open\
    \ Xcode preferences by clicking the Xcode menu in the menu bar and then selecting\
    \ Preferences. See Figure [3-7](#341013_5_En_3_Chapter.xhtml#Fig7).\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig7_HTML.jpg](images/341013_5_En_3_Chapter/341013_5_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7\n\nAdding line numbers to the gutter\n\n## Summary\n\nIn this chapter,\
    \ you learned how data is used by your apps. You saw how to initialize variables\
    \ and how to assign data to them. We explained that when variables are declared,\
    \ they have a data type associated with them and that only data of the same type\
    \ can be assigned to variables. The differences between variables and constants\
    \ were also discussed, and we also introduced optionals.\n\nIn the next chapter,\
    \ we will be exploring how to use Boolean logic to control the flow of data within\
    \ your apps.\n\n### Exercises\n\n*   Write code within a Swift playground that\
    \ multiplies two integers and displays the result.\n\n*   Write code within a\
    \ Swift playground that squares a float. Display the resulting float.\n\n*   Write\
    \ code within a Swift playground that subtracts two floats, with the result being\
    \ stored as an integer. Note that rounding does not occur."
