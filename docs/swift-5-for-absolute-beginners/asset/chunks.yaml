    清单 8-6 的输出结果是 `One, Three`。这是因为你移除了索引为 1 的对象。请记住，这对应数组中的第二个对象，因为数组索引总是从 0 开始。


    你已经见识到 Swift 在处理数组交互方面有多么灵活。数组是强大的集合，作为程序员，你会经常用到它们。本节涵盖了数组的基础知识，但数组能做的事情远不止这些。


    ## 使用字典类


    Swift 的 `Dictionary` 类也是一种有用的集合类型。它与 `Array` 类一样允许存储对象，但 `Dictionary` 的不同之处在于，它允许将键与条目关联起来。例如，你可以创建一个字典来存储某人的属性列表，比如
    `firstName`、`lastName` 等。与使用索引访问数组不同，字典可以使用诸如 `"firstName"` 这样的 `String` 来访问属性。不过，所有键必须是唯一的——也就是说，`"firstName"`
    不能重复出现。根据你的程序需要，找到唯一的键名通常不是问题。


    以下是创建字典的一个示例：


    ```

    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    ```


    这会创建一个名为 `person` 的简单字典。声明的下一部分告诉字典键和值的对象类型。在这个例子中，键是 `String` 类型，值也是 `String`
    类型。然后你向字典添加了两个键。第一个键是 `firstName`，对应的值为 `John`。第二个键是 `lastName`，对应的值为 `Doe`。你可以使用与数组类似的符号来访问字典中的值。


    ```

    print(person["firstName"])

    ```


    这段代码会打印出名称 `Optional("John")`，因为这是键 `firstName` 对应的值。前面的示例中出现了 `Optional`，因为字典中某个键对应的值是可选值。你可以使用相同风格的代码来修改字典中的值。假设在这个例子中，John
    现在更喜欢让别人叫他 Joe。你可以通过一行简单的代码来修改字典中的值。


    ```

    person["firstName"] = "Joe"

    ```


    你可以使用相同的符号向字典添加新键。


    ```

    person["gender"] = "Male"

    ```


    如果你决定从字典中移除某个键，比如刚添加的 `gender` 键，可以通过将该键的值设置为 `nil` 来实现。


    ```

    person["gender"] = nil

    ```


    现在字典中将只包含 `firstName` 和 `lastName`。请注意，字典是无序的。你不能依赖其顺序，但有时你需要遍历字典。这可以通过与数组类似的方式实现。主要区别在于，数组中你只需分配一个变量，而在字典中你需要分配键和值。参见清单
    8-7。


    ```

    1    var person: [String: String] = ["firstName": "John", "lastName": "Doe"]

    2    for (myKey, myValue) in person {

    3         print(myKey + ": " + myValue)

    4    }

    ```


    这个示例会打印以下内容：


    ```

    firstName: John

    lastName: Doe

    ```


    字典是组织无序数据的绝佳方式，也是基于特定键查找数据的好方法。它们在 Swift 中非常灵活，应被用于组织和优化代码。


