- fmt: "# Working with the Playground Interface\n\nPlaygrounds offer a great approach\
    \ to using the concepts just discussed without all the complexity of learning\
    \ Xcode and the Swift language at the same time. It takes only a few minutes to\
    \ familiarize yourself with the playground interface and begin writing a program.\n\
    \nTechnically speaking, the playground interface is not a true IDE like you will\
    \ be using to write your iOS apps, but it is pretty close and much easier to learn\
    \ in. A true IDE combines code development, user interface layout, debugging tools,\
    \ documentation, and simulator/console launching for a single application; see\
    \ Figure [1-6](#341013_5_En_1_Chapter.xhtml#Fig6). However, playgrounds offer\
    \ a similar look, feel, and features to the Xcode IDE you develop apps with.\n\
    \n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig6_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6.** The Xcode IDE with the iPhone simulator\n\nIn the next chapter,\
    \ you will go through the playground interface and write your first program.\n\
    \n## Summary\n\nCongratulations, you have finished the first chapter of this book.\
    \ It is important that you have an understanding of the following terms because\
    \ they will be reinforced throughout this book:\n\n* Computer program\n* Algorithm\n\
    * Design requirements\n* User interface\n* Bug\n* Quality assurance (QA)\n* Debugging\n\
    * Object-oriented programming (OOP)\n* Object\n* Property\n* Method\n* State of\
    \ an object\n* Integrated development environment (IDE)\n\n## What’s Next\n\n\
    The remaining chapters provide the information you need to learn Swift and write\
    \ iOS applications. Terms and concepts are introduced and reinforced over and\
    \ over so you will begin to get more comfortable with them. Keep going and be\
    \ patient with yourself.\n\n### Exercises\n\n* Answer the following questions:\n\
    \  * Why is it so important to spend time on your user requirements?\n  * What\
    \ is the difference between design requirements and an algorithm?\n  * What is\
    \ the difference between a method and a property?\n  * What is a bug?\n  * What\
    \ is state?\n* Write an algorithm for how a soda machine works from the time a\
    \ coin is inserted until a soda is dispensed. Assume the price of a soda is 80\
    \ cents.\n* Write the design requirements for an app that will run the soda machine.\n\
    \n# Programming Basics\n\nThis chapter focuses on the building blocks that are\
    \ necessary to become a great Swift programmer. This chapter covers how to use\
    \ the playground user interface, how to write your first Swift program, and how\
    \ to use the Xcode Integrated Development Environment (IDE).\n\n> **Note:** We\
    \ will introduce you to using playgrounds, which will enable you to program right\
    \ away without worrying about all of the complexities of Xcode projects. We use\
    \ this approach to help you learn the concepts quickly, without discouragement,\
    \ and to give you a great foundation to build upon.\n\n## Touring Xcode\n\nPlaygrounds\
    \ in Xcode make writing Swift code incredibly simple and fun. Type a line of code,\
    \ and the result appears immediately. If your code runs over a period of time,\
    \ perhaps in a loop or branch, you can watch its progress in the timeline area.\
    \ When you’ve completed your code in the playground, it is easy to move your code\
    \ to a Swift iOS project. With Xcode playgrounds, you can do the following:\n\n\
    * Design or modify an algorithm, observing the results every step of the way\n\
    * Create new tests, verifying that they work before promoting them into your test\
    \ suite\n\nFirst, you’ll need to learn a little more about the Xcode user interface.\
    \ When you open an Xcode iOS project, you are presented with a screen that looks\
    \ like Figure [2-1](#341013_5_En_2_Chapter.xhtml#Fig1).\n\nThe Xcode user interface\
    \ is set up to help you efficiently write your Swift applications. The user interface\
    \ helps new programmers learn the user interface for an iOS application. You will\
    \ now explore the major sections of Xcode’s IDE workspace and playgrounds.\n\n\
    ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg)\n\
    \n**Figure 2-1.** Xcode Integrated Developer Environment with a Swift project\n\
    \n### Exploring the Workspace Window\n\nThe workspace window, shown in Figure\
    \ [2-2](#341013_5_En_2_Chapter.xhtml#Fig2), enables you to open and close files,\
    \ set your application preferences, develop and edit an app, and view the text\
    \ output and error console.\n\nThe workspace window is your primary interface\
    \ for creating and managing projects. The workspace window automatically adapts\
    \ itself to the task at hand, and you can further configure the window to fit\
    \ your work style. You can open as many workspace windows as you need.\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg](images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg)\n\
    \n**Figure 2-2.** Xcode’s workspace window\n\nThe workspace window has four main\
    \ areas: Editor, Navigator, Debug, and Utility.\n\nWhen you select a project file,\
    \ its contents appear in the Editor area, where Xcode opens the file in the appropriate\
    \ editor.\n\nYou hide or show the other three areas by using buttons in the view\
    \ selector in the toolbar. These buttons are in the top-right corner of the window.\n\
    \n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif)\
    \ Clicking this button shows or hides the Navigator area. This is where you view\
    \ and maneuver through files and other facets of your project.\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif)\
    \ Clicking this button shows or hides the Debug area. This is where you control\
    \ program execution and debug code.\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif](images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif)\
    \ Clicking this button shows or hides the Utility area. You use the Utility area\
    \ for several purposes, most commonly to view and modify attributes of a file."
