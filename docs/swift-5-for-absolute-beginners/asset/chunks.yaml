- fmt: "### Exercises\n\n- 修改创建`RadioStation`类的代码，使电台名称远长于屏幕可显示的长度。观察会发生什么？\n- 修改当前按钮，并添加一个新按钮。将按钮分别标记为\"\
    FM\"和\"AM\"。如果用户点击\"FM\"按钮，显示一个FM电台；如果用户点击\"AM\"按钮，则显示一个AM电台。（提示：你需要在`ViewController.swift`文件中添加第二个`RadioStation`对象。）\n\
    - 通过确保用户首次启动iPhone应用时看不到文本\"Label\"，来稍微清理界面。\n  - 使用界面工具修复此问题。\n  - 如何通过向应用添加代码来修复此问题？\n\
    - 为`@IBAction func buttonClick(_ sender: AnyObject)`方法添加更多验证逻辑。目前它仅验证FM范围而未验证AM范围。修复代码使其也能验证AM范围。\n\
    \  - 如果电台频率超出范围，使用现有标签显示某种错误信息。\n\n脚注[1](#341013_5_En_7_Chapter.xhtml#Fn1_source)\n\
    \n# 8. Swift编程基础\n\nSwift是一种优雅的语言。它将编译型语言的效率与许多脚本语言的灵活性和现代特性相结合。\n\n本章介绍Swift中一些更常见的概念，例如属性（properties）和集合类（collection\
    \ classes）。同时展示在Xcode中处理用户界面元素时，属性是如何被使用的。这听起来任务量很大，但Swift、Foundation框架和Xcode工具提供了丰富的对象和方法，使得构建应用程序变得轻而易举。\n\
    \n## 使用`let`与`var`\n\n如果你在Swift上花费了大量时间，你会看到关键字`var`出现在变量声明之前。你可能也在其他声明前看到过`let`。`var`用于定义变量，而`let`用于定义常量。这意味着如果你用`let`声明一个值，你将无法更改该值。以下代码定义了一个常量：\n\
    \n```\nlet myName = \"Brad\"\n```\n\n一旦你定义了常量，就无法更改其值。\n\n### 注意\n\n如果你声明了一个变量但从未更改其值，Xcode现在会发出警告，并建议使用`let`代替`var`。\n\
    \n```\nmyName = \"John\"\n```\n\n这将会报错。如果你想创建一个可变或可更改的变量，你需要使用`var`。例如，你可以这样操作：\n\
    \n```\nvar myName = \"Brad\"\nmyName = \"John\"\n```\n\n这不会产生任何错误，因为`myName`现在是一个变量。这不仅适用于`String`和`Int`类型，也适用于集合和其他对象。\n\
    \n变量提供了更大的灵活性，那么为什么还会有人想要使用常量呢？答案是性能。如果你知道某个值不会改变，编译器可以将该值优化为常量。\n\n## 理解集合\n\n\
    理解集合是学习Swift的基础部分。事实上，集合对象几乎是所有现代面向对象语言库中的基本结构（有时它们被称为*容器*）。简单来说，*集合*是一种能够持有和管理其他对象的类。集合的整个目的是提供一种通用的方式来高效地存储和检索对象。\n\
    \n集合有几种类型。虽然它们都满足能够持有其他对象的相同目的，但主要的区别在于对象的检索方式。Swift中最常用的集合是`Array`和`Dictionary`。\n\
    \n这两种集合都可以创建为常量或常规变量。如果你将集合创建为常量，则必须在创建时用对象填充它，之后无法修改。\n\n## 使用数组\n\n`Array`类与其他任何集合一样，允许程序员管理一组对象。数组是一种*有序*集合，这意味着对象以特定顺序进入数组，并以相同顺序被检索。\n\
    \n### 注意\n\n有一些处理数组的方法允许你更改对象的顺序，或在数组的特定位置添加对象。\n\n`Array`类允许通过对象在数组中的*索引*来检索对象。索引是对象在数组中占据的数值位置。例如，如果数组中有三个元素，则对象可以通过索引0到2来引用。与Swift及其他编程语言中的大部分情况一样，索引从0开始，而不是1。参见代码清单[8-1](#341013_5_En_8_Chapter.xhtml#PC4)。\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    print(myArray[0])\n\
    3    print(myArray[1])\n4    print(myArray[2])\n代码清单8-1\n访问数组中的对象\n```\n\n如你所见，数组中的对象可以通过其索引检索。索引从0开始，且不能超过数组大小减1。你可以通过访问`Array`对象的`count`属性轻松计算数组的大小，如下所示：\n\
    \n```\nvar entries = myArray.count\n```\n\n实际上，每一种集合类型，包括`Array`和`Dictionary`，都包含一个`count`属性。\n\
    \n向数组末尾添加元素很简单。你只需在数组上调用`append`方法，如代码清单[8-2](#341013_5_En_8_Chapter.xhtml#PC6)所示。\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray.append(\"\
    Four\")\n3    myArray.append(\"Five\")\n4    myArray.append(\"Six\")\n代码清单8-2\n\
    向数组添加对象\n```\n\nSwift提供了许多不同的方法用于向数组添加元素。如果你想向数组中添加多个对象，可以使用标准的`+=`（通常称为*加等于*）运算符。代码清单[8-3](#341013_5_En_8_Chapter.xhtml#PC7)创建了一个数组，然后在第二行向数组添加了三个`String`对象。注意新值放在方括号中而不是圆括号中。\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray\
    \ += [\"Four\", \"Five\", \"Six\"]\n代码清单8-3\n向数组添加多个对象\n```\n\n如前所述，数组实际上是有序的。数组中对象的顺序是重要的。有时你可能需要在数组的特定位置添加一个项目。你可以使用`insert(at:)`方法来实现，如代码清单[8-4](#341013_5_En_8_Chapter.xhtml#PC8)所示。\n\
    \n```\n1    var myArray: [String] = [\"Two\", \"Three\"]\n2    myArray.insert(\"\
    One\", at: 0)\n代码清单8-4\n在数组开头添加一个字符串\n```\n\n数组现在包含`One`、`Two`、`Three`。\n\n访问数组中的项目很简单。你可以使用标准方括号访问特定位置的对象。例如，`myArray[0]`会给你数组中的第一个对象。如果你想遍历数组中的每个项目，可以使用一种叫做*快速枚举*或*For-In循环*的方法。代码清单[8-5](#341013_5_En_8_Chapter.xhtml#PC9)是一个快速枚举的例子。\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    for myString\
    \ in myArray {\n3         print(myString)\n4    }\n代码清单8-5\n快速枚举\n```\n\n神奇之处发生在代码清单[8-5](#341013_5_En_8_Chapter.xhtml#PC9)的第二行。你告诉Swift将`myArray`的每个值赋给一个名为`myString`的新常量。然后你可以对`myString`做任何你想做的事情。在这个例子中，你只是打印它。它会遍历数组中的所有对象，而无需知道对象的总数。这是一种从数组中取出项目的快速有效的方式。\n\
    \n从数组中移除对象也很简单。你可以使用`remove(at:)`方法，如代码清单[8-6](#341013_5_En_8_Chapter.xhtml#PC10)所示。\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray.remove(at:\
    \ 1)\n3    for myString in myArray {\n4         print(myString)\n5    }\n代码清单8-6\n\
    移除一个对象\n```"
  raw: "### Exercises\n\n*   Change the code that creates your `RadioStation` class\
    \ and make the station’s name much longer than what can appear on the screen.\
    \ What happens?\n\n*   Change the current button and add a new button. Label the\
    \ buttons FM and AM. If the user clicks the FM button, show an FM station. If\
    \ the user clicks the AM button, display an AM station. (Hint: You’ll need to\
    \ add a second `RadioStation` object to the `ViewController.swift` file.)\n\n\
    *   Clean up the interface a little by making sure that the user doesn’t see the\
    \ text “Label” when the iPhone application first starts.\n    *   Fix the issue\
    \ by using the interface tool.\n\n    *   How could you fix this by adding code\
    \ to the application instead?\n\n*   Add more validation to the `@IBAction func\
    \ buttonClick(_ sender: AnyObject)` method. Right now, it validates FM ranges\
    \ but not AM ranges. Fix the code so that it also validates an AM range.\n   \
    \ *   If the radio station frequency is out of bounds, use the existing labels\
    \ to display some type of error message.\n\nFootnotes [1](#341013_5_En_7_Chapter.xhtml#Fn1_source)\n\
    \n# 8. Programming Basics in Swift\n\nSwift is an elegant language. It mixes the\
    \ efficiency of a compiled language with the flexibility and modern features of\
    \ many scripting languages.\n\nThis chapter introduces some of the more common\
    \ concepts in Swift, such as properties and collection classes. It also shows\
    \ how properties are used from within Xcode when dealing with user interface elements.\
    \ This sounds like a lot to accomplish, but Swift, the Foundation framework, and\
    \ the Xcode tool provide a wealth of objects and methods and a way to build applications\
    \ with ease.\n\n## Using let vs. var\n\nIf you have spent much time with Swift,\
    \ you have seen the word `var` appear before variable declarations. You may also\
    \ have seen `let` before other declarations. The word `var` is used to define\
    \ a variable, while the word `let` is used to define a constant. This means that\
    \ if you declare a value with `let`, you will not be able to change the value.\
    \ The following code defines a constant:\n\n```\nlet myName = \"Brad\"\n```\n\n\
    Once you define a constant, you cannot change the value.\n\n### Caution\n\nXcode\
    \ will now warn you if you declare a variable and never change its value. It will\
    \ recommend using `let` instead of `var`.\n\n```\nmyName = \"John\"\n```\n\nThis\
    \ will give you an error. It you want to create a mutable or changeable variable,\
    \ you need to use `var`. For example, you can do the following:\n\n```\nvar myName\
    \ = \"Brad\"\nmyName = \"John\"\n```\n\nThis will not give you any errors because\
    \ `myName` is now a variable. This does not relate to only `String`s and `Int`s,\
    \ but it can also be used with collections and other objects.\n\nVariables give\
    \ you more flexibility, so why would anyone ever want to use a constant? The quick\
    \ answer is performance. If you know that you have a value that will not change,\
    \ the compiler can optimize that value as a constant.\n\n## Understanding Collections\n\
    \nUnderstanding collections is a fundamental part of learning Swift. In fact,\
    \ collection objects are fundamental constructs of nearly every modern object-oriented\
    \ language library (sometimes they are referred to as *containers*). Simply put,\
    \ a *collection* is a type of class that can hold and manage other objects. The\
    \ whole purpose of a collection is that it provides a common way to store and\
    \ retrieve objects efficiently.\n\nThere are several types of collections. While\
    \ they all fulfill the same purpose of being able to hold other objects, they\
    \ differ mostly in the way objects are retrieved. The most common collections\
    \ used in Swift are the Array and the Dictionary.\n\nBoth of these collections\
    \ can be created as constants or regular variables. If you create a collection\
    \ as a constant, you must fill it with the objects at the time of creation. It\
    \ cannot be modified after that point.\n\n## Using Arrays\n\nThe `Array` class\
    \ is like any other collection, in that it allows the programmer to manage a group\
    \ of objects. An array is an *ordered* collection, which means that objects are\
    \ entered in an array in a certain order and retrieved in the same order.\n\n\
    ### Note\n\nThere are some methods for working with arrays that allow you to change\
    \ the order of the objects or to add an object at a specific location in the array.\n\
    \nThe `Array` class allows an object to be retrieved by its *index* in the array.\
    \ An index is the numeric position that an object would occupy in the array. For\
    \ example, if there are three elements in the array, the objects can be referenced\
    \ with indices from 0 to 2\\. Like with most things in Swift and other programming\
    \ languages, indices start at 0, not 1\\. See Listing [8-1](#341013_5_En_8_Chapter.xhtml#PC4).\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    print(myArray[0])\n\
    3    print(myArray[1])\n4    print(myArray[2])\nListing 8-1\nAccessing Objects\
    \ in an Array\n```\n\nAs you can see, objects in the array can be retrieved via\
    \ their index. The indices start at 0 and can’t exceed the size of the array minus\
    \ 1. You can easily calculate the size of the array by accessing the `count` property\
    \ of the `Array` object, as shown here:\n\n```\nvar entries = myArray.count\n\
    ```\n\nIn fact, every collection type, including, `Array` and `Dictionary`, contains\
    \ a `count` property.\n\nAdding items to the end of an array is simple. You can\
    \ just call the `append` method on the array. See Listing [8-2](#341013_5_En_8_Chapter.xhtml#PC6).\n\
    \n```\n1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray.append(\"\
    Four\")\n3    myArray.append(\"Five\")\n4    myArray.append(\"Six\")\nListing\
    \ 8-2\nAdding Objects to an Array\n```\n\nSwift provides you with many different\
    \ methods for adding items to an array. If you want to add multiple objects to\
    \ an array, you can use the standard `+=` (often called *plus equals*) operator.\
    \ Listing [8-3](#341013_5_En_8_Chapter.xhtml#PC7) creates an array and then adds\
    \ three more `String` objects to the array on line 2\\. Notice the new values\
    \ are in brackets instead of parentheses.\n\n```\n1    var myArray: [String] =\
    \ [\"One\", \"Two\", \"Three\"]\n2    myArray += [\"Four\", \"Five\", \"Six\"\
    ]\nListing 8-3\nAdding Multiple Objects to an Array\n```\n\nAs discussed earlier,\
    \ an array is actually ordered. The order of the objects in your array is important.\
    \ There may be times where you need to add an item at a certain position in the\
    \ array. You can accomplish this with the `insert(at:)` method, as shown in Listing\
    \ [8-4](#341013_5_En_8_Chapter.xhtml#PC8).\n\n```\n1    var myArray: [String]\
    \ = [\"Two\", \"Three\"]\n2    myArray.insert(\"One\", at: 0)\nListing 8-4\nAdding\
    \ a String to the Beginning of an Array\n```\n\nThe array now contains One, Two,\
    \ Three.\n\nAccessing items in an array is simple. You can use standard square\
    \ brackets to access an object at a certain position. For example, `myArray[0]`\
    \ would give you the first object in the array. If you want to loop through each\
    \ of the items in the array, you can use something called *fast enumeration* *or\
    \ For-In Loops*. Listing [8-5](#341013_5_En_8_Chapter.xhtml#PC9) is an example\
    \ of fast enumeration.\n\n```\n1    var myArray: [String] = [\"One\", \"Two\"\
    , \"Three\"]\n2    for myString in myArray {\n3         print(myString)\n4   \
    \ }\nListing 8-5\nFast Enumeration\n```\n\nThe magic happens in line 2 of Listing\
    \ [8-5](#341013_5_En_8_Chapter.xhtml#PC9). You tell Swift to assign each value\
    \ of `myArray` to a new constant called `myString`. You can then do whatever you\
    \ want to do with `myString`. In this case, you just print it. It will go through\
    \ all of the objects in the array without you having to know the total number\
    \ of objects. This is a fast and effective way to pull items out of an array.\n\
    \nRemoving objects from an array is simple too. You can use the `remove(at:)`\
    \ method, as shown in Listing [8-6](#341013_5_En_8_Chapter.xhtml#PC10).\n\n```\n\
    1    var myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray.remove(at:\
    \ 1)\n3    for myString in myArray {\n4         print(myString)\n5    }\nListing\
    \ 8-6\nRemoving an Object\n```"
