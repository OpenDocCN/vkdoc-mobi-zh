    2.  一切填写完毕后，点击 Next 按钮。Xcode 会提示你指定项目的保存位置。选择你能记住的位置即可——桌面是个好选择。


    3.  确定位置后，点击 Create 按钮创建新项目。这将创建基础的 `BookStore` 项目框架，如图 8-3 所示。


    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig3_HTML.jpg](img/341013_5_En_8_Fig3_HTML.jpg)


    4.  点击导航区域左下角的加号（**+**），为项目添加一个新对象。选择 New File。然后选择顶部的 iOS 部分，并在右侧选择 Swift File，如图
    8-4 所示。你也可以右键点击（或按住 Control 键点击）导航区域，然后选择 New File 菜单选项。这两种方式没有区别——选择你觉得更自然的方式即可。


    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig4_HTML.jpg](img/341013_5_En_8_Fig4_HTML.jpg)


    5.  你选择了一个普通的 Swift 文件，这将创建一个新的空 Swift 文件，你将用它来定义 `Book` 类。选择后，点击 Next 按钮。


    6.  Xcode 会询问你要给文件取什么名字。请使用名称 `Book`。Xcode 还会询问应将新文件保存到哪个文件夹。为简单起见，请选择项目中的 `BookStore`
    文件夹。项目中所有其他类文件也都存储在这里。


    7.  双击 `BookStore` 文件夹，然后点击 Create 按钮。你将在 Xcode 的主编辑窗口中看到新文件 `Book.swift`，它也会出现在导航区域中，如图
    8-5 所示。


    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig5_HTML.jpg](img/341013_5_En_8_Fig5_HTML.jpg)


    8.  重复之前的步骤，创建第二个名为 `BookStore` 的对象。这将生成一个 `BookStore.swift` 文件。本章稍后你将用到这个类。现在，我们先把注意力集中在
    `Book` 类上。


    9.  点击 `Book.swift` 文件，让我们开始定义这个新类！


    ### 创建你的类


    通过添加一个普通的 Swift 文件（而非 Cocoa Touch 类），Xcode 创建了一个空的 Swift 文件。你可以向这个文件添加多个类。Swift
    更加灵活，不要求每个文件只能有一个类。Xcode 允许你根据需要自由添加类。


