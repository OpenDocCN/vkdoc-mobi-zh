    # 12. Protocols and Delegates


    Congratulations! You are acquiring the skills to become an iOS developer! However,
    iOS developers need to understand two additional topics in order to be successful:
    ***protocols*** and ***delegates***. It is not uncommon for new developers to
    get overwhelmed by these topics, which is why we introduced the foundational topics
    of the Swift language first. After reading this chapter, you will see that protocols
    and delegates are really useful and not hard to understand and implement.


    ## Multiple Inheritance


    We discussed object inheritance in Chapter [5](#341013_5_En_5_Chapter.xhtml).
    In a nutshell, object inheritance means that a child can inherit all the characteristics
    of its parent, as shown in Figure [12-1](#341013_5_En_12_Chapter.xhtml#Fig1).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig1_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    Typical Swift inheritance


    C++, Perl, and Python all have a feature called *multiple inheritance* , which
    enables a class to inherit behaviors and features from more than one parent, as
    shown in Figure [12-2](#341013_5_En_12_Chapter.xhtml#Fig2).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig2_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Multiple inheritance


    Problems can arise with multiple inheritance because it allows for ambiguities
    to occur. Therefore, Swift does not implement multiple inheritances. Instead,
    it implements something called a ***protocol***.


    ## Understanding Protocols


    Apple defines a *protocol* as a list of function declarations, unattached to a
    class definition. A protocol is similar to a class with the exception that a protocol
    doesn’t provide an implementation for any of the requirements; it describes only
    what an implementation should look like.


    The protocol can be adopted by a class to provide an actual implementation of
    those requirements. Any type that satisfies the requirements of a protocol is
    said to *conform* to that protocol.


    ## Protocol Syntax


    Protocols are defined like classes are, as shown in Listing [12-1](#341013_5_En_12_Chapter.xhtml#PC1).


    ```

    protocol RandomNumberGenerator {

    var mustBeSettable: Int { get set }

    var doesNotNeedToBeSettable: Int { get }

    func random() -> Double

    }

    Listing 12-1.

    Protocol Definition

    ```


    If a class has a superclass, you list the superclass name before any protocols
    it adopts, followed by a comma, as shown in Listing [12-2](#341013_5_En_12_Chapter.xhtml#PC2).


    ```

    class MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol {

    // class definition goes here

    }

    Listing 12-2.

    Protocol Listed After Superclass

    ```


    The protocol also specifies whether each property must have a gettable or gettable
    *and* settable implementation. A gettable property is read-only, whereas a gettable
    and settable property is not (shown earlier in Listing [12-1](#341013_5_En_12_Chapter.xhtml#PC1)).


    Properties are always declared as variable properties, prefixed with `var`. Gettable
    and settable properties are indicated by `{ get set }` after their type declaration,
    and gettable properties are indicated by `{ get }`.


    ## Delegation


    ***Delegation*** is a design pattern that enables a class or structure to hand
    off (or *delegate*) some of its responsibilities to an instance of another type.
    This design pattern is implemented by defining a protocol that encapsulates the
    delegated responsibilities. Delegation can be used to respond to a particular
    action or to retrieve data from an external source without needing to know the
    underlying type of that source.


    Listing [12-3](#341013_5_En_12_Chapter.xhtml#PC3) defines two protocols for use
    with a random number guessing game.


    ```

    protocol RandomNumberGame {

    var machine: Machine { get }

    func play()

    }

    protocol RandomNumberGameDelegate {

    func gameDidStart(game: RandomNumberGame)

    func game(game: RandomNumberGame, didStartNewTurnWithGuess randomGuess: Int)

    func gameDidEnd(game: RandomNumberGame)

    }

    Listing 12-3

    Protocol Definitions

    ```


    The `RandomNumberGame` protocol can be adopted by any game that involves random
    number generating and guessing. The `RandomNumberGameDelegate` protocol can be
    adopted by any type of class to track the progress of a `RandomNumberGame` protocol.


    ## Protocol and Delegation Example


    This section shows you how to create a more sophisticated random number guessing
    app to illustrate how to use protocols and delegation. The app’s home view displays
    the user’s guess and whether the guess was high, low, or correct, as shown in
    Figure [12-3](#341013_5_En_12_Chapter.xhtml#Fig3).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig3_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    Guessing game app home view


    When the users tap the Guess Random Number button, they are taken to an input
    screen to enter their guess, as shown in Figure [12-4](#341013_5_En_12_Chapter.xhtml#Fig4).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig4_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig4_HTML.jpg)


    Figure 12-4.


    Guessing game app user input view


    When the users enter their guess, the delegate method passes the guess back to
    the home view, and the home view displays the result.'
  trans: "\n第 2 行根据 `Entity` 名称在数据库中为你的图书创建了一个新的 `Book` 对象，并将该对象插入到你之前创建的 `managedObjectContext`\
    \ 中。请记住，一旦对象被插入到托管对象上下文中，其更改就会被跟踪，并且可以被保存。第 3 行将图书标题设置为 `My Book`，并添加数组中项目的数量。显然，在实际应用中，你会希望将其设置为由用户提供或来自其他列表的名称。第\
    \ 4-8 行保存了托管对象上下文。\n\n在 Swift 3.0 中，苹果改变了错误处理方式。Swift 4.0 的错误处理方式与 Swift 3.0 几乎相同。现在，当你执行一个可能引发错误的操作时，你使用\
    \ `try` 关键字，然后抛出（`throw`）一个错误。第 9 行通知 `UITableView` 重新加载自身，以显示新添加的 `Book`。现在构建并运行应用程序。点击\
    \ + 按钮几次。你将向对象存储中添加新的 `Book` 对象，如图 11-23 所示。如果你退出应用并重新启动，你会发现数据仍然存在。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig23_HTML.png](img/341013_5_En_11_Fig23_HTML.png)\n\
    \n图 11-23.\n\n最终应用程序\n\n以上是对 iOS 中 Core Data 的简要介绍。Core Data 是一个强大的 API，但也需要花费大量时间来掌握。\n\
    \n## 本章小结\n\n以下是本章涵盖主题的总结：\n\n*   *偏好设置*：你学会了使用 `UserDefaults` 在 iOS、macOS、tvOS\
    \ 和 watchOS 上保存和读取来自文件的偏好设置。\n*   *数据库*：你了解了什么是数据库，以及为什么使用数据库比将信息保存在偏好设置文件中更可取。\n\
    *   *数据库引擎*：你了解了苹果集成到 macOS、tvOS 和 iOS 中的 SQLite 数据库引擎及其优点和局限性。\n*   *Core Data*：苹果提供了一个用于与\
    \ SQLite 数据库交互的框架。该框架使接口更易于使用。\n*   *书店应用*：你创建了一个简单的 Core Data 应用，并使用 Xcode 为你的书店创建了一个数据模型。你还学习了如何在两个实体之间创建关系。最后，你使用\
    \ Xcode 为你的 Core Data 模型创建了一个简单的界面。\n\n### 练习\n\n*   为应用添加一个新视图，允许用户输入书名。\n* \
    \  提供一种从列表中移除图书的方法。\n*   创建一个 `Author` 对象，并将其添加到一个 `Book` 对象中。\n\n# 12. 协议与委托\n\
    \n恭喜你！你正在掌握成为 iOS 开发者所需的技能！然而，iOS 开发者还需要理解另外两个主题才能成功：**协议** 和 **委托**。新开发者常常会被这些主题搞得不知所措，所以我们首先介绍了\
    \ Swift 语言的基础主题。阅读本章后，你会发现协议和委托非常有用，并且不难理解和实现。\n\n## 多重继承\n\n我们曾在第 5 章中讨论过对象继承。简而言之，对象继承意味着子类可以继承其父类的所有特征，如图\
    \ 12-1 所示。\n\n![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig1_HTML.jpg](img/341013_5_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1.\n\n典型的 Swift 继承\n\nC++、Perl 和 Python 都有一个名为 *多重继承* 的特性，它允许一个类从多个父类继承行为和特性，如图\
    \ 12-2 所示。\n\n![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig2_HTML.jpg](img/341013_5_En_12_Fig2_HTML.jpg)\n\
    \n图 12-2.\n\n多重继承\n\n多重继承可能会带来问题，因为它可能产生歧义。因此，Swift 没有实现多重继承。相反，它实现了一种称为 **协议**\
    \ 的机制。\n\n## 理解协议\n\n苹果将 *协议* 定义为一系列函数声明的列表，不附加到任何类定义上。协议类似于类，但区别在于协议不提供任何需求的实现；它只描述了一个实现应该是什么样子的。\n\
    \n一个类可以采用该协议，以提供这些需求的实际实现。任何满足协议需求的类型，我们都称之为 *遵循* 该协议。\n\n## 协议语法\n\n协议的定义方式类似于类，如代码清单\
    \ 12-1 所示。\n\n```\nprotocol RandomNumberGenerator {\n    var mustBeSettable: Int\
    \ { get set }\n    var doesNotNeedToBeSettable: Int { get }\n    func random()\
    \ -> Double\n}\n```\n\n代码清单 12-1. 协议定义\n\n如果一个类有父类，你需要在列出的任何协议之前先列出父类的名称，后跟逗号，如代码清单\
    \ 12-2 所示。\n\n```\nclass MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol\
    \ {\n    // 类定义写在这里\n}\n```\n\n代码清单 12-2. 协议列在父类之后\n\n协议还指定了每个属性必须具有可获取（gettable）或既可获取又可设置（gettable\
    \ *and* settable）的实现。可获取的属性是只读的，而既可获取又可设置的属性则不是（如前面的代码清单 12-1 所示）。\n\n属性总是声明为变量属性，并以\
    \ `var` 为前缀。可获取和可设置的属性在其类型声明后用 `{ get set }` 表示，而可获取的属性则用 `{ get }` 表示。\n\n##\
    \ 委托\n\n**委托** 是一种设计模式，它允许一个类或结构体将其部分职责移交给（或 *委托* 给）另一个类型的实例。这种设计模式通过定义一个封装了委托职责的协议来实现。委托可以用于响应特定操作，或从外部来源检索数据，而无需了解该来源的底层类型。\n\
    \n代码清单 12-3 定义了两个用于随机数字猜测游戏的协议。\n\n```\nprotocol RandomNumberGame {\n    var machine:\
    \ Machine { get }\n    func play()\n}\n\nprotocol RandomNumberGameDelegate {\n\
    \    func gameDidStart(game: RandomNumberGame)\n    func game(game: RandomNumberGame,\
    \ didStartNewTurnWithGuess randomGuess: Int)\n    func gameDidEnd(game: RandomNumberGame)\n\
    }\n```\n\n代码清单 12-3. 协议定义\n\n`RandomNumberGame` 协议可以被任何涉及随机数生成和猜测的游戏所采用。`RandomNumberGameDelegate`\
    \ 协议可以被任何类型的类采用，以跟踪 `RandomNumberGame` 协议的进展。\n\n## 协议与委托示例\n\n本节将向你展示如何创建一个更复杂的随机数字猜测应用，以说明如何使用协议和委托。该应用的主视图显示用户的猜测以及该猜测是高了、低了还是正确，如图\
    \ 12-3 所示。\n\n![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig3_HTML.jpg](img/341013_5_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3.\n\n猜测游戏应用主视图\n\n当用户点击“猜测随机数字”按钮时，他们会被带到输入屏幕以输入他们的猜测，如图 12-4 所示。\n\n\
    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig4_HTML.jpg](img/341013_5_En_12_Fig4_HTML.jpg)\n\
    \n图 12-4.\n\n猜测游戏应用用户输入视图\n\n当用户输入他们的猜测时，委托方法会将猜测传回主视图，然后主视图显示结果。\n"
