    This code can be read as follows: “Declare a new constant called `maximumNumberOfStudents`,
    and give it a value of 30\. Then, declare a new variable called `currentNumberOfStudents`,
    and give it an initial value of 5.”


    In this example, the maximum number of students is declared as a constant because
    the maximum value never changes. The current number of students is declared as
    a variable because this value must be incremented or decremented after the student
    enrollment changes.


    Most data you will use in your programs can be classified into four different
    kinds—Booleans, numbers, strings, and objects. We will discuss how to work with
    numbers and object data types in the remainder of this chapter. In Chapter [4](#341013_5_En_4_Chapter.xhtml),
    we will talk more about Boolean data types when you learn how to write apps with
    decision making.


    ### Note


    *Localizing* your app is the process of writing your app so users can buy and
    use it in their native language. This process is too advanced for this book, but
    it is a simple one to complete when you plan from the beginning. Localizing your
    app greatly expands the total number of potential customers and revenue for your
    app without your having to rewrite it for each language. Be sure to localize your
    app. It is not hard to do and can easily double or triple the number of people
    who buy it. For more information on localizing your app, visit Apple’s “Build
    Apps for the World” site: [`https://developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/)
    .'
  trans: '

    ### 十六进制


    通常，我们需要用计算机识别的另一种格式来表示字符，即十六进制格式。十六进制格式本质上就是二进制的“压缩”版本，用两个字符（例如 `00`、`2A` 或 `FF`）代替八个字符来表示一个字节（八位）。你在调试应用时会遇到十六进制数。*十六进制*系统是一种基数为
    16 的计数系统。它使用 16 个不同的符号：0 到 9 表示数值 0 到 9，A 到 F 表示数值 10 到 15。例如，十六进制数 `2AF3` 转换为十进制等于
    `(2 × 16³) + (10 × 16²) + (15 × 16¹) + (3 × 16⁰)`，即 10,995。你可以试试 Mac 计算器应用的“编程器”模式，看看十六进制如何与十进制和二进制相互关联。


    图 3-2 展示了 ASCII 字符表。由于一个字节可以表示 256 个字符，这非常适合西方字符。例如，十六进制 `20` 表示一个空格。十六进制 `7D`
    表示一个右花括号（`}`）。你也可以通过 Mac 计算器应用的“编程器”模式看到这一点，因为它能将数值转换为 ASCII 字符。


    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig2_HTML.jpg](img/341013_5_En_3_Fig2_HTML.jpg)


    **图 3-2** ASCII 字符


    ### Unicode


    用字节表示字符的方式在计算机领域一直运行良好，直到 20 世纪 90 年代左右，个人电脑在非西方国家广泛普及，而那里的语言包含超过 256 个字符。Unicode
    不再使用单字节字符集，而是最多可以使用四字节字符集。


    为了促进快速采用，前 256 个码点与 ASCII 字符表保持一致。Unicode 可以有不同的字符编码。西方文本最常用的编码称为 UTF-8。其中的“8”表示每个字符使用的位数，因此它像
    ASCII 一样，每个字符占用一个字节。


    作为一名 iPhone 开发者，你可能会最常使用这种字符编码。


    ## 数据类型


    既然我们已经讨论了计算机如何存储数据，接下来将介绍一个重要的概念，称为*数据类型*。人类通常可以直接查看数据及其使用上下文，来判断数据的类型以及如何使用它。但计算机需要被告知如何做这件事。因此，程序员需要告诉计算机它所接收的数据的类型。示例如下：`2
    + 2 = 4`。


    计算机需要知道你想要将两个数字相加。在这个例子中，它们是整数。你可能会认为，即使是最不经意的观察者也能明白这两个数相加的含义，更不用说一台先进的计算机了。然而，iOS
    应用的用户通常会将数据存储为一系列字符，而不是一个计算式。例如，一条短信可能写着：“每个人都知道 2 + 2 = 4。”


    在这种情况下，这个例子是一个由一系列字符组成的*字符串*。数据类型就是对程序的一种声明，用于定义你想要存储的数据。*变量*用于存储你的数据，并在声明时关联一个数据类型。所有数据都存储在变量中，并且变量必须有一个变量类型。例如，在
    Swift 中，以下是带有相关数据类型的变量声明：


    ```

    var x: Int = 10

    var y: Int = 2

    var z: Int = 0

    var submarineName: String = "USS Nevada SSBN-733"

    ```


    数据类型不能相互混合。你不能执行以下操作：


    ```

    z = x + submarineName

    ```


    混合数据类型会导致编译器警告或编译器错误，你的应用将无法运行。


    表 3-5 给出了 Swift 中基本数据类型的示例。


    **表 3-5** Swift 数据类型


    | 类型 | 示例 |

    | --- | --- |

    | `Int` | 1, 5, 10, 100 |

    | `Float` 或 `Double` | 1.0, 2.222, 3.14159 |

    | `Bool` | `true`, `false` |

    | `String` | `"Star Wars"`, `"Star Trek"` |

    | `ClassName` | `UIView`, `UILabel` 等 |


    ## 声明常量和变量


    Swift 的常量和变量必须在它们被使用之前声明。使用 `let` 关键字声明常量，使用 `var` 关键字声明变量。常量在初始化后永远不会改变，而变量可以根据需要多次更改。


    声明常量和变量类型有两种方式：**显式** 和 **隐式**。


    **显式**声明变量类型的语法如下：


    ```

    var name: type = value

    var firstNumber: Int = 5

    ```


    然而，声明类型往往不是必需的。隐式声明类型可以缩短代码，使其更易于输入并最终维护。


    **隐式**声明变量类型的语法如下：


    ```

    var name = value

    var firstNumber = 5

    ```


    你大部分时间都可以使用隐式声明，因为 Swift 足够智能，能够根据你赋予变量的值来推断其类型。


    如果一个变量不会改变，你应该将其声明为*常量*。常量永远不会改变。常量以关键字 `let` 开头，如下所示：


    ```

    let secondNumber = 10

    ```


    为了更好地理解变量和常量是如何声明的，这里有两个例子：


    ```

    let maximumNumberOfStudents = 30

    var currentNumberOfStudents = 5

    ```


    这段代码可以这样解读：“声明一个名为 `maximumNumberOfStudents` 的新常量，并赋值为 30。然后，声明一个名为 `currentNumberOfStudents`
    的新变量，并赋初始值 5。”


    在这个例子中，最大学生数被声明为常量，因为最大值永远不会改变。当前学生数被声明为变量，因为在学生注册情况变化后，这个值需要递增或递减。


    你在程序中使用的大部分数据可以分为四种不同类型——布尔值、数字、字符串和对象。在本章的剩余部分，我们将讨论如何使用数字和对象数据类型。在第 4 章中，当你学习编写带决策功能的应用时，我们将更多地讨论布尔数据类型。


    ### 说明


    *本地化*你的应用是指编写应用的过程，以便用户能够以他们的母语购买和使用它。这个过程对于本书来说过于高级，但如果你从一开始就计划好，它就是一个简单的步骤。本地化你的应用可以极大地扩大潜在客户总数和应用的收入，而无需你为每种语言重写应用。务必本地化你的应用。这并不难做，而且可以轻松使购买人数翻倍或增加两倍。有关本地化应用的更多信息，请访问
    Apple 的“为全世界构建应用”网站：[`https://developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/)。

