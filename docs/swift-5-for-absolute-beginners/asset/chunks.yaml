    ## 添加更多功能


    在上一节中，您创建了一个 WatchKit 应用，但其功能非常有限。在本节中，您将向应用添加一个新场景，以便在选中书籍时显示书籍详情。因为要添加一个场景，所以您将使用一个额外的控制器文件。右键点击
    `BookStore WatchKit Extension` 文件夹，选择“新建文件”，如图 15-23 所示。


    ![images/341013_5_En_15_Chapter/341013_5_En_15_Fig23_HTML.jpg](img/341013_5_En_15_Fig23_HTML.jpg)


    **图 15-23.** 添加新控制器文件


    确保新文件是 Swift 文件，并将其命名为 `DetailController.swift`。它现在应该出现在您的文件列表中。在 `import Foundation`
    行之后添加以下代码：


    ```

    10      import WatchKit


    13      class DetailController: WKInterfaceController {

    14           @IBOutlet var labelTitle: WKInterfaceLabel!

    15           @IBOutlet var labelAuthor: WKInterfaceLabel!

    16           @IBOutlet var labelDescription: WKInterfaceLabel!


    18           var book: Book!


    20           override func awake(withContext context: Any?) {

    21                super.awake(withContext: context)

    22                if let book = context as? Book {

    23                     labelTitle.setText(book.title)

    24                     labelAuthor.setText(book.author)

    25                     labelDescription.setText(book.description)

    26                }

    27           }

    28      }

    ```


    第 10 行导入了 `WatchKit` 框架。这在处理任何 WatchKit 类（例如 `WKInterfaceController` 或 `WKInterfaceLabel`）时是必需的。第
    13 行声明了一个新的 `WKInterfaceController` 子类，名为 `DetailController`。第 14-16 行创建了您将用于显示书籍信息的标签输出口。第
    18 行声明了名为 `book` 的 `Book` 属性。第 20 行是 `awakeWithContext` 方法。它接收一个名为 `context` 的对象，类型为
    `Any`。`Book` 对象将在此处被传递。第 22 行获取上下文并将其赋值给一个 `book` 对象。第 23-25 行从书中获取信息并将其赋值给标签。


    现在，您需要将以下方法添加到 `InterfaceController` 类中：


    ```

    override func contextForSegue(withIdentifier segueIdentifier: String,

    in table: WKInterfaceTable,

    rowIndex: Int) -> Any? {

    return myBookStore.bookList[rowIndex]

    }

    ```


    当此方法接收到选中行的 `rowIndex` 时，它负责将书籍传递给 `DetailController`。现在您需要创建界面。选择左侧的 `Interface.storyboard`。从对象库中拖拽一个
    Interface Controller 到故事板上，如图 15-24 所示。


