  trans: "\n## 可选类型\n\nSwift 引入了一个重要的概念，称为*可选类型*，开发者需要理解它。即使对于经验丰富的 Objective-C iOS\
    \ 开发人员来说，这也是一个新概念。可选类型并非难以理解的话题，但需要一些时间来适应。\n\n当某个值可能缺失时，可以使用可选类型。可选类型表示以下含义：\n\
    \n*   一个变量可能被赋值，也可能未被赋值。\n\n有时，常量或变量可能没有值。清单 3-1 展示了一个名为 `Int()` 的整数初始化器的示例，它可以将\
    \ `String` 值转换为 `Int`。\n\n```\n1 let myString = \"42\"\n2 let someInteger = Int(myString)\n\
    3 // someInteger 被推断为 \"Int?\" 类型，即 \"可选 Int\"\n清单 3-1\n将字符串转换为整数\n```\n\n常量 `someInteger`\
    \ 被赋值为整数值 `42`。`someInteger` 也被赋予了 `Int?` 类型。问号表示它是一个可选类型，意味着该变量或常量的值可能缺失。参见清单\
    \ 3-2。\n\n```\n1 let myString = \"Hello World\"\n2 let someInteger = Int(myString)\n\
    3 // someInteger 的值现在缺失了\n清单 3-2\n无法将字符串转换为整数\n```\n\n清单 3-2 中的第 2 行有一个问题。无法将\
    \ \"Hello World\" 从 `String` 转换为 `Int`。因此，`someInteger` 的值被认为是缺失的，即 `nil`，因为在第\
    \ 2 行，`someInteger` 被推断为可选 `Int` 类型。\n\n### 注意\n\nObjective-C 程序员可能曾使用 `nil` 从方法中返回一个对象，其中\
    \ `nil` 表示“缺少有效的对象”。这种做法适用于对象，但不适用于结构体、基础 C 类型或枚举值。Objective-C 方法通常会返回一个特殊值，比如\
    \ `NSNotFound`，来表示缺少有效的对象。这要求方法的调用者知道要检测的特殊值。可选类型指示了*任何类型*的值的缺失，而不需要使用特殊常量。\n\n\
    `Integer Int()` 初始化器可能无法返回值，因此该方法返回一个*可选* `Int`，而不是 `Int`。再次说明，问号表示其包含的值是可选的，意味着它可能包含*某个*\
    \ `Int` 值，也可能*完全没有值*。该值要么是某个 `Int`，要么什么都不是。\n\nSwift 的 `nil` 与 Objective-C 中的\
    \ `nil` 不同。在 Objective-C 中，`nil` 是指向一个不存在对象的指针。而在 Swift 中，`nil` 不是指针，它表示值的缺失。任何类型的可选值都可以被设置为\
    \ `nil`，而不仅仅是对象类型。\n\n在第 4 章中，你将学习如何“解包”可选类型，并检查是否存在有效的对象。\n\n## 在 Playground\
    \ 中使用变量\n\n现在你已经了解了数据类型，让我们在 playground 中编写代码来两个数字相加并显示结果。\n\n1.  打开 Xcode 并选择“Get\
    \ started with a playground”，如图 3-3 所示。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig3_HTML.jpg](img/341013_5_En_3_Fig3_HTML.jpg)\n\
    \n    图 3-3\n\n    创建 playground\n\n2.  选择一个空白的 iOS 模板，然后点击 Next，如图 3-4 所示。最后，将你的\
    \ playground 命名为 **DataTypes** 并点击 Create。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig4_HTML.jpg](img/341013_5_En_3_Fig4_HTML.jpg)\n\
    \n    图 3-4\n\n    选择空白 iOS playground 模板\n\n3.  当你的 playground 创建完成后，代码中已经为你放入了两行代码，如图\
    \ 3-5 所示。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig5_HTML.jpg](img/341013_5_En_3_Fig5_HTML.jpg)\n\
    \n    图 3-5\n\n    两行代码\n\n4.  向此 playground 中添加代码，如清单 3-3 所示。\n\n```\n1 import\
    \ UIKit\n\n3 var str = \"Hello, playground\"\n\n5 var firstNumber = 2\n6 var secondNumber\
    \ = 3\n\n8 var totalSum = firstNumber + secondNumber\n\n10 firstNumber = firstNumber\
    \ + 1\n11 secondNumber = secondNumber + 1\n\n13 totalSum = firstNumber + secondNumber\n\
    \n15 print(\"totalSum = \\(totalSum)\")\n清单 3-3\nPlayground 加法运算\n```\n\n你的 playground\
    \ 应如图 3-6 所示。\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig6_HTML.jpg](img/341013_5_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6\n\n显示 Swift 代码结果的 Playground\n\nPlayground 的其中一个巧妙功能是，当你输入代码时，Swift 会立即执行你输入的那行代码，这样你就可以立即查看结果。\n\
    \nSwift 编程中使用的 `//` 使程序员能够为他们的代码添加注释。注释不会被你的应用程序编译，而是用作程序员或（更重要的）后续开发者的笔记。注释有助于原始开发者及后来的开发者理解应用程序是如何开发的。\n\
    \n有时，注释需要跨越多行，或者仅覆盖一行的一部分。这可以通过 `/*` 和 `*/` 来实现。`/*` 和 `*/` 之间的所有文本都被视为注释，不会被编译。\n\
    \n`print` 是一个函数，它可以接受一个参数并打印其内容。\n\n### 注意\n\n如果你的编辑器没有之前截图中看到的相同菜单或装订线（包含程序行号的左列），你可以在\
    \ Xcode 偏好设置中开启这些设置。你可以通过点击菜单栏中的 Xcode 菜单，然后选择 Preferences 来打开 Xcode 偏好设置。参见图\
    \ 3-7。\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig7_HTML.jpg](img/341013_5_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7\n\n在装订线中添加行号\n\n## 总结\n\n在本章中，你学习了应用程序如何使用数据。你了解了如何初始化变量以及如何为它们赋值。我们解释道，当声明变量时，它们具有关联的数据类型，并且只有相同类型的数据才能赋值给变量。我们还讨论了变量和常量之间的区别，并介绍了可选类型。\n\
    \n在下一章中，我们将探索如何使用布尔逻辑来控制应用程序内的数据流。\n\n### 练习\n\n*   在一个 Swift playground 中编写代码，将两个整数相乘并显示结果。\n\
    \n*   在一个 Swift playground 中编写代码，计算一个浮点数的平方。显示得到的浮点数结果。\n\n*   在一个 Swift playground\
    \ 中编写代码，计算两个浮点数相减，并将结果存储为整数。注意，不会进行四舍五入。\n"
- fmt: '# 4. Making Decisions, Program Flow, and App Design


    One of the great things about being an iOS developer is you get to tell your devices
    exactly what you want them to do and they do it—your devices will do tasks over
    and over again without getting tired. That’s because iOS devices don’t care how
    hard they worked yesterday, and they don’t let feelings get in the way. These
    devices don’t need hugs.


    There is a downside to being a developer: you have to think of all the possible
    outcomes when it comes to your apps. Many developers love having this kind of
    control. They enjoy focusing on the many details of their apps; however, it can
    be frustrating having to handle so many details. As mentioned in the introduction
    to this book, there is a price to pay for developing apps, and that price is time.
    The more time you spend developing and debugging, the better you will get with
    all the details, and the better your apps will perform. You have to pay this price
    to become a successful developer.


    Computers are black and white; there are no shades of gray. Your devices produce
    results, many of which are based on true and false conditions.


    In this chapter, you learn about computer logic and controlling the flow of your
    apps. Processing information and arriving at results are at the heart of all apps.
    Your apps need to process data based on values and conditions. To do this, you
    need to understand how computers perform logical operations and execute code based
    on the information your apps have acquired.


    ## Boolean Logic


    *Boolean logic* is a system for logical operations. Boolean logic uses binary
    operators such as `AND` and `OR` and the unary operator `NOT` to determine whether
    your conditions have been met. Binary operators take two operands. Unary operators
    take one operand.


    We just introduced a couple of new terms that can sound confusing; however, you
    probably use Boolean logic every day. Let’s look at a couple of examples of Boolean
    logic with the binary operators `AND` and `OR` in a conversation parents sometimes
    have with their teenage children:


    “You can go to the movies tonight if your room is clean AND the dishes are put
    away.”


    “You can go to the movies tonight if your room is clean OR the dishes are put
    away.”


    Boolean operators’ results are either `TRUE` or `FALSE`. In Chapter [3](#341013_5_En_3_Chapter.xhtml),
    we briefly introduced the Boolean data type. A variable that is defined as Boolean
    can contain only the values `TRUE` and `FALSE`.


    ```

    var seeMovies: Bool = false

    ```


    In the preceding example, the `AND` operator takes two operands: one to the left
    and one to the right of the `AND`. Each operand can be evaluated independently
    with a `TRUE` or `FALSE`.


    For an `AND` operation to yield a `TRUE` result, both sides of the `AND` have
    to be `TRUE`. In the first example, the teenager has to clean his or her room
    `AND` have the dishes done. If either one of the conditions is `FALSE`, the result
    is `FALSE`—no movies for the teenager.


    For an `OR` operation to yield a `TRUE` result, only one operand has to be `TRUE`,
    or both conditions can be `TRUE` to yield a `TRUE` result. In the second example,
    just a clean bedroom would result in the ability to go to the movies.


    ### Note


    In Objective-C and other programming languages, Boolean variables can hold integer
    variables; `0` represents `FALSE`, and any nonzero value represents `TRUE`. Swift’s
    strong type checking doesn’t allow this. Boolean variables in Swift can be assigned
    only `true` or `false`.


    A `NOT` statement is a unary operator. It takes just one operand to yield a Boolean
    result. Here’s an example:


    “You can NOT go to the movies.”


    This example takes one operand. The `NOT` operator turns a `TRUE` operand to a
    `FALSE` and a `FALSE` operand to a `TRUE`. Here, the result is a `FALSE`.


    `AND`, `OR`, and `NOT` are three common Boolean operators. Occasionally, you need
    to use more complex operators. `XOR`, `NAND`, and `NOR` are other common operations
    for iOS developers.


    The Boolean operator `XOR` means *exclusive-or*. An easy way to remember how the
    `XOR` operator works is the `XOR` operator will return a `TRUE` result *if only
    one argument is TRUE, not both*.


    Swift does not have the `NAND` and `NOR` operators built in, but just know that
    they simply mean NOT AND and NOT OR, respectively. After evaluating the `AND`
    or `OR` arguments, simply negate the result.


    ### Truth Tables


    You can use a tool to help you evaluate all the Boolean operators called a *truth
    table*, and it is a mathematical table used in logic to evaluate Boolean operators.
    They are helpful when trying to determine all the possibilities of a Boolean operator.
    Let’s look at some common truth tables for `AND`, `OR`, `NOT`, `XOR`, `NAND`,
    and `NOR`.


    In an `AND` truth table, there are four possible combinations of `TRUE` and `FALSE`:


    - `TRUE AND TRUE` = `TRUE`

    - `TRUE AND FALSE` = `FALSE`

    - `FALSE AND TRUE` = `FALSE`

    - `FALSE AND FALSE` = `FALSE`


    Placing these combinations in a truth table results in Table 4-1.


    **Table 4-1** An AND Truth Table


    | A | B | A AND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `AND` truth table produces a `TRUE` result only if both of its operands are
    `TRUE`.


    Table 4-2 illustrates an `OR` truth table and all possible operands.


    **Table 4-2** An OR Truth Table


    | A | B | A OR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `TRUE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    An `OR` truth table produces a `TRUE` result if one or both of its operands are
    `TRUE`.


    Table 4-3 illustrates a `NOT` truth table and all possible operands.


    **Table 4-3** A NOT Truth Table


    | A | NOT A |

    | --- | --- |

    | `TRUE` | `FALSE` |

    | `FALSE` | `TRUE` |


    A `NOT` *flips the bit* or negates the original operand’s Boolean value.


    Table 4-4 illustrates an `XOR` (or exclusive-or) truth table and all possible
    operands.


    **Table 4-4** An XOR Truth Table


    | A | B | A XOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `FALSE` |


    The operator `XOR` yields a `TRUE` result if only one of the operands is `TRUE`.


    Table 4-5 illustrates a `NAND` truth table and all possible operands.


    **Table 4-5** A NAND Truth Table


    | A | B | A NAND B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `TRUE` |

    | `FALSE` | `TRUE` | `TRUE` |

    | `FALSE` | `FALSE` | `TRUE` |


    Table 4-6 illustrates a `NOR` truth table and all possible operands.


    **Table 4-6** A NOR Truth Table


    | A | B | A NOR B |

    | --- | --- | --- |

    | `TRUE` | `TRUE` | `FALSE` |

    | `TRUE` | `FALSE` | `FALSE` |

    | `FALSE` | `TRUE` | `FALSE` |

    | `FALSE` | `FALSE` | `TRUE` |


    The easiest way to look at the `NAND` and `NOR` operators is to simply negate
    the results from the `AND` and `OR` truth tables, respectively.


    ### Comparison Operators


    In software development, you can compare different data items using *comparison
    operators*. These operators produce a logical `TRUE` or `FALSE` result. Table
    4-7 shows the list of comparison operators.


    **Table 4-7** Comparison Operators


    | Operator | Definition |

    | --- | --- |

    | `>` | Greater than |

    | `<` | Less than |

    | `>=` | Greater than or equal to |

    | `<=` | Less than or equal to |

    | `==` | Exactly equal to |

    | `!=` | Not equal to |


    ### Note


    If you’re constantly forgetting which way the greater than and less than signs
    go, use a crutch we learned in grade school: if the greater than and less than
    signs represent the mouth of an alligator, the alligator always eats the bigger
    value. It may sound silly, but it works.'
