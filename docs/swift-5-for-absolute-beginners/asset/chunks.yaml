  trans: "\n### 使用 Outlet\n\n现在，你可以通过创建 Outlet 将标签连接到代码。\n\n1.  按住 Control 键，从视图中的标签拖拽到类文件的顶部，如图\
    \ 10-18 所示。这是在键盘上按住 Control 键的同时，用鼠标点击并拖拽。你也可以右键点击并拖拽。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig18_HTML.jpg](img/341013_5_En_10_Fig18_HTML.jpg)\n\
    \n    **图 10-18.** Control-拖拽以创建 Outlet\n\n2.  将会弹出一个窗口，让你可以命名并指定 Outlet 的类型。\n\
    \n3.  将 Outlet 命名为 `randomNumberLabel`，如图 10-19 所示，然后点击 **Connect** 按钮。\n\n  \
    \  ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig19_HTML.jpg](img/341013_5_En_10_Fig19_HTML.jpg)\n\
    \n    **图 10-19.** `randomNumberLabel` Outlet 的弹出窗口\n\nOutlet 的代码已创建，并且该 Outlet\
    \ 现在已连接到 `Main.storyboard` 文件中的 `Label` 对象。第 12 行旁边的阴影圆圈表示该 Outlet 已连接到 `Main.storyboard`\
    \ 文件中的一个对象，如图 10-20 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig20_HTML.jpg](img/341013_5_En_10_Fig20_HTML.jpg)\n\
    \n**图 10-20.** 已生成并连接到 `Label` 对象的 Outlet 属性代码\n\n这里有一个你可能不熟悉的声明叫做 `IBOutlet`，通常简称为\
    \ *outlet*。Outlet 向你的控制器表明，该属性已连接到 Interface Builder 中的一个对象。`IBOutlet` 将使 Interface\
    \ Builder 能够看到该 Outlet，并允许你将属性连接到 Interface Builder 中的对象。\n\n借用墙上电源插座的类比，这些属性\
    \ Outlet 连接到对象上。使用 Interface Builder，你可以将这些属性连接到合适的对象。当你更改已连接 Outlet 的属性时，它所连接的对象将自动发生改变。\n\
    \n### 使用 Action\n\n用户界面对象事件，也称为 *action*，可以触发方法。\n\n现在，你需要将对象操作连接到按钮上。\n\n1. \
    \ 按住 Control 键，从“种子随机数生成器”按钮拖拽到类文件的底部。按照图 10-21 所示完成弹出窗口的填写，然后点击 **Connect** 按钮。确保连接类型是\
    \ Action，而不是 Outlet。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig21_HTML.jpg](img/341013_5_En_10_Fig21_HTML.jpg)\n\
    \n    **图 10-21.** 完成种子方法的弹出窗口\n\n2.  对“生成随机数”按钮重复上述步骤，在 `ViewController` 类中创建一个\
    \ `generateAction` 方法。\n\n### 类\n\n剩下的工作就是为控制器的 `.swift` 文件中的 Outlet 和 Action\
    \ 补全代码。\n\n打开 `ViewController.swift` 文件，补全 `seedAction` 和 `generateAction` 方法，如图\
    \ 10-22 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig22_HTML.jpg](img/341013_5_En_10_Fig22_HTML.jpg)\n\
    \n**图 10-22.** 补全后的 `seedAction` 和 `generateAction` 方法\n\n有些代码需要你进一步研究。下面这行为随机数生成器设定了种子，这样每次运行应用程序时都能获得一个随机数。虽然有更简单的方法，但就本节而言，你只需要了解\
    \ Action 和 Outlet 是如何工作的。\n\n```\nsrandom(UInt32(time(nil)))\n```\n\n在下面的代码中，属性\
    \ `text` 设置了视图中的 `UILabel` 值。你在 Interface Builder 中从 Outlet 到 `Label` 对象建立的连接替你完成了所有工作。\n\
    \n```\nrandomNumberLabel.text\n```\n\n现在只需要再做几件事就能完成你的应用程序了。选择 `Main.storyboard`\
    \ 文件，然后选择你的视图控制器场景。点击并拖拽鼠标，选中视图中的两个按钮和标签，如图 10-23 所示。然后点击 **Embed In** 按钮，选择 **Stack\
    \ View**，将这三个元素组合在一起。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig23_HTML.jpg](img/341013_5_En_10_Fig23_HTML.jpg)\n\
    \n**图 10-23.** 嵌入 Stack View\n\n最后，选择该栈视图，点击 **Align** 按钮，勾选 **Horizontally in\
    \ Container** 和 **Vertically in Container** 两个复选框，然后点击 **Add 2 Constraints** 按钮，如图\
    \ 10-24 所示。这将使你的控件在视图中正确居中。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig24_HTML.jpg](img/341013_5_En_10_Fig24_HTML.jpg)\n\
    \n**图 10-24.** 居中 Stack View\n\n大功告成！\n\n要在 iPhone 模拟器中运行你的 iPhone 应用，请点击 **Play**\
    \ 按钮。你的应用应该会在模拟器中启动，如图 10-25 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig25_HTML.jpg](img/341013_5_En_10_Fig25_HTML.jpg)\n\
    \n**图 10-25.** 在 iOS 模拟器中运行的完整随机数生成器应用\n\n要生成随机数，请点击 **Generate Random Number**\
    \ 按钮。\n\n## 总结\n\n干得好！Interface Builder 在创建用户界面时为你节省了大量时间。你的应用程序中拥有了一套强大的对象可供使用，并且只需要编写极少的代码。\n\
    \nInterface Builder 处理了许多通常需要你自己处理的细节。\n\n你应该熟悉以下术语：\n\n*   Storyboard 和 XIB 文件\n\
    *   模型-视图-控制器\n*   架构模式\n*   人机界面指南 (HIG)\n*   Outlet\n*   Action\n\n### 练习\n\n\
    *   扩展随机数生成器应用，使其在应用启动时在 `Label` 对象中显示日期和时间。\n*   在显示日期和时间标签后，添加一个按钮，用于用新时间更新日期和时间标签。\n\
    \n# 11. 存储信息\n\n作为一名开发者，你会遇到许多需要存储数据的不同场景。用户会期望你的应用在每次启动时记住偏好设置和其他信息。之前的章节讨论了\
    \ `BookStore` 应用。对于这个应用，用户会期望你的应用记住书店里的所有书籍。你的应用需要一种方法来存储这些信息、检索它们，并可能对这些数据进行搜索和排序。处理数据有时可能会很困难。幸运的是，Apple\
    \ 提供了让这个过程更简便的方法和框架。\n\n本章讨论需要存储数据的两种不同格式。它讨论了如何为 iOS 设备保存偏好文件，以及如何在你的应用程序中使用\
    \ SQLite 数据库来存储和检索数据。\n"
- fmt: '# Storage Considerations


    There are some major storage differences between the Mac and the iPhone, and these
    differences will affect how you work with data. Let’s start by discussing the
    Mac and how you will need to develop for it.


    On the Mac, by default, applications are stored in the `Applications` folder.
    Each user has their own home folder where preferences and information related
    to that user are stored. Not all of the users will have access to write to the
    `Applications` folder or to the application bundle itself.


    On the iPhone and iPad, developers do not need to deal with different users. Every
    person who uses the iPhone has the same permissions and the same folders. There
    are some other factors to consider with the iPhone, though. Every application
    on an iOS device is in its own sandbox. This means that files written by an app
    can be seen and used only by that individual app. This makes for a more secure
    environment for the iPhone, iPad, Apple TV, and Apple Watch, but it also presents
    some changes in the way you work with data storage.


    ## Caution


    Sensitive data should not be stored in the preferences file or in a database without
    additional encryption. Luckily, Apple provides a way to store sensitive information.
    It is called the keychain. Securing data in the keychain is beyond the scope of
    this book.


    ## Note


    For macOS, the preferences file is named `com.yourcompany.applicationname.plist`
    and is located in the `/Users/username/Library/Preferences` folder. On iOS, the
    preferences file is located in your application’s container in the `/Library/Preferences`
    folder.


    All you need to do to write preferences is to create a `UserDefaults` object.
    This is done with the following line:


    ```

    var prefs: UserDefaults = UserDefaults.standard

    ```


    This instantiates the `prefs` object so you can use it to set preference values.
    Next, you need to set the preference keys for the values that you want to save.
    The `BookStore` app example will be used to demonstrate specific instructions
    throughout this chapter. When running a bookstore, you might want to save a username
    in the preferences. You also might want to save things such as a default book
    category or recent searches. The preferences file is a great place to store this
    type of information because this is the kind of information that needs to be read
    only when the application is launched.


    Also, on iOS, it is often necessary to save your current state. If a person is
    using your application and then gets a phone call, you want to be able to bring
    them back to the exact place they were in your application when they are done
    with their phone call. This is less necessary now with the implementation of multitasking,
    but your users will still appreciate it if your application remembers what they
    were doing the next time they launch.


    Once you have instantiated the object, you can just call `set(_:forKey:)` to set
    an object. If you wanted to save the username of `sherlock.holmes`, you would
    call the following line of code:


    ```

    prefs.set("sherlock.holmes", forKey: "username")

    ```


    After a certain period of time, your app will automatically write changes to the
    preferences file. You can force your app to save the preferences by calling the
    `synchronize` function, but this should only be used if you cannot wait for the
    next synchronization interval such as if your app is immediately going to exit.
    To call the `synchronize` function, you would write the following line:


    ```

    prefs.synchronize()

    ```


    With just three lines of code, you are able to create a preference object, set
    a preference value, and write the preferences file. It is an easy and clean process.
    Here is all of the code:


    ```

    let prefs: UserDefaults = UserDefaults.standard

    prefs.set("sherlock.holmes", forKey: "username")

    prefs.set(10, forKey: "booksInList")

    prefs.synchronize()

    ```


    ## Databases


    You have learned how to store some small pieces of information and retrieve them
    at a later point. What if you have more information that needs to be stored? What
    if you need to conduct a search within this information or put it in some sort
    of order? These kinds of situations call for a database.


    A database is a tool for storing a significant amount of information in a way
    that it can be easily searched or retrieved. When reading data from a database,
    pieces of data are returned rather than the entire file. Many applications you
    use in your daily life are based on databases of some sort. Your online banking
    application retrieves your account activity from a database. Your supermarket
    uses a database to retrieve prices for different items. A simple example of a
    database is a spreadsheet. You may have many columns and many rows in your spreadsheet.
    The columns in your spreadsheet represent different types of information you want
    to store. In a database, these are considered attributes. The rows in your spreadsheet
    would be considered different records in your database.


    ## Storing Information in a Database


    Databases are usually an intimidating subject for a developer; most developers
    associate databases with enterprise database servers such as Microsoft SQL Server
    or Oracle. These applications can take time to set up and require constant management.
    For most developers, a database system like Oracle would be too much to handle.
    Luckily, Apple has included a small and efficient database engine called SQLite
    in iOS, macOS, and tvOS. This allows you to gain many of the features of complex
    database servers without the overhead.


    SQLite will provide you with a lot of flexibility in storing information for your
    application. It stores the entire database in a single file. It is fast, reliable,
    and easy to implement in your application. The best thing about the SQLite database
    is that there is no need to install any software; Apple has taken care of that
    for you.


    However, SQLite does have some limitations that, as a developer, you should be
    aware of:


    *   SQLite was designed as a single-user database. You will not want to use SQLite
    in an environment where more than one person will be accessing the same database.
    This could lead to data loss or corruption.


    *   In the business world, databases can grow to become very large. It is not
    surprising for a database manager to handle databases as large as half a terabyte,
    and in some cases databases can become much larger than that. SQLite should be
    able to handle smaller databases without any issues, but you will begin to see
    performance issues if your database starts to get too large.


    *   SQLite lacks some of the backup and data restore features of the enterprise
    database solutions.


    For the purposes of this chapter, you will focus on using SQLite as your database
    engine. If any of the mentioned limitations are present in the application you
    are developing, you may need to look into an enterprise database solution, which
    is beyond the scope of this book.


    ### Note


    SQLite (pronounced “sequel-lite”) gets its name from Structured Query Language
    (SQL, pronounced “sequel”). SQL is the language used to enter, search, and retrieve
    data from a database.


    Apple has worked hard to iron out a lot of the challenges of database development.
    As a developer, you will not need to become familiar with SQL because Apple has
    taken care of the direct database interaction for you through a framework called
    Core Data, which makes interacting with the database much easier. Core Data has
    been adapted by Apple from a NeXT product called Enterprise Object Framework,
    and working with Core Data is a lot easier than interfacing directly with the
    SQLite database. Directly accessing a database via SQL is beyond the scope of
    this book.'
