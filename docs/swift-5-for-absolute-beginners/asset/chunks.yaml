- fmt: "### Note\n\nIt is still a good idea to keep your Swift classes in separate\
    \ files. This makes organizing and finding classes easier, especially when you’re\
    \ dealing with large projects, but there will be cases where a smaller class is\
    \ only used with another class and it makes sense to keep them in the same file.\n\
    \nLet’s create the `Book` class. Type the following code into the `Book.swift`\
    \ file:\n\n```\nclass Book {\n}\n```\n\nNow you have your class, as shown in Figure\
    \ [8-6](#341013_5_En_8_Chapter.xhtml#Fig6). That is all you need to do to create\
    \ a class.\n\n![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig6_HTML.jpg](images/341013_5_En_8_Chapter/341013_5_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. The empty Book class\n\n### Introducing Properties\n\nThe class\
    \ is simply called `Book`. True, you have a class, but it doesn’t *store* anything\
    \ at this point. For this class to be useful, it needs to be able to hold some\
    \ information, which is done with properties. When an object is used, it has to\
    \ be instantiated. Once the object is instantiated, it has access to its properties.\
    \ These variables are available to the object as long as the object stays in scope.\
    \ As you know from Chapter [7](#341013_5_En_7_Chapter.xhtml), scope defines the\
    \ context in which an object exists. In some cases, an object’s scope may be the\
    \ life of the program. In other cases, the scope might be just a function or method.\
    \ It all depends on where the object is declared and how it’s used. Scope will\
    \ be discussed in more detail later. For now, let’s add some properties to the\
    \ `Book` class to make it more useful.\n\n```\n1   //\n2   //  Book.swift\n3 \
    \  //  BookStore\n4   //\n5   //  Created by Thorn on 7/27/17.\n6   //  Copyright\
    \ © 2017 Innovativeware. All rights reserved.\n7   //\n\n9   import Foundation\n\
    \n11   class Book {\n12       var title: String = \"\"\n13       var author: String\
    \ = \"\"\n14       var description: String = \"\"\n15   }\nListing 8-8 Adding\
    \ Instance Variables to the Book.swift file\n```\n\nListing [8-8](#341013_5_En_8_Chapter.xhtml#PC19)\
    \ shows the same `Book` object from before, but now there are three new properties\
    \ placed inside the braces, on lines 12–14. These are all `String` objects, which\
    \ means they can hold text information for the `Book` object. So, the `Book` object\
    \ now has a place to store title, author, and description information. Notice,\
    \ the code assigns an initial value to the property. If an initial value is not\
    \ assigned, the class would need an `init` method to assign initial values.\n\n\
    ### Accessing Properties\n\nNow that you have some properties, how can you use\
    \ them? How are they accessed? Unfortunately, simply declaring a property doesn’t\
    \ necessarily give you access to it. There are two ways to access these variables:\n\
    \n*   One way, of course, is within the `Book` object.\n*   The second way is\
    \ from outside the object—that is, another part of the program that uses the `Book`\
    \ object.\n\nIf you are writing the code for a method within the `Book` object,\
    \ accessing its property is quite simple. For example, you could simply write\
    \ the following:\n\n```\ntitle = \"Test Title\"\n```\n\nFrom outside the object,\
    \ you can still access the `title` variable. This is done through the use of dot\
    \ notation.\n\n```\nmyBookObject.title = \"Test Title\"\n```\n\n## Finishing the\
    \ BookStore Program\n\nWith the understanding of properties, you are going to\
    \ now venture forth to create the actual bookstore program. The idea is simple\
    \ enough—create a class called `BookStore` that will be stocked with a few `Book`\
    \ objects.\n\n### Creating the View\n\nLet’s start by first getting the view ready.\
    \ If you need a refresher on how to build an interface in Xcode, refer to Chapter\
    \ [6](#341013_5_En_6_Chapter.xhtml).\n\n1.  Click the `Main.storyboard` file in\
    \ the Navigator area. This will display Xcode’s Interface Builder, as shown in\
    \ Figure [8-7](#341013_5_En_8_Chapter.xhtml#Fig7). You will see five scenes in\
    \ the `Main.storyboard` file. Navigate to the right to find the Detail Scene.\n\
    \n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig7_HTML.jpg](images/341013_5_En_8_Chapter/341013_5_En_8_Fig7_HTML.jpg)\n\
    \n    Figure 8-7. Preparing the Bookstore’s Detail View\n\n2.  By default, when\
    \ you create a blank Master-Detail application, Xcode adds a label with the text\
    \ “Detail View content goes here.” Select and delete this Label object because\
    \ you are going to add your own. You’re going to add some new fields to display\
    \ some details about a selected book. Since you deleted this control, you also\
    \ need to remove the code that references it.\n    1.  In the `DetailViewController.swift`\
    \ file, remove the following line:\n\n        ```\n        @IBOutlet weak var\
    \ detailDescriptionLabel: UILabel!\n        ```\n\n    2.  In the `var detailItem:\
    \ AnyObject?` property declaration, remove the following line:\n\n        ```\n\
    \        configureView()\n        ```\n\n    3.  In the method named `configureView`,\
    \ remove the following lines:\n\n        ```\n        // Update the user interface\
    \ for the detail item.\n        if let detail = detailItem {\n        if let label\
    \ = detailDescriptionLabel {\n        label.text = detail.description\n      \
    \  }\n        }\n        ```\n\n        Your `DetailViewController.swift` file\
    \ should now look like Figure [8-8](#341013_5_En_8_Chapter.xhtml#Fig8).\n\n  \
    \  ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig8_HTML.jpg](images/341013_5_En_8_Chapter/341013_5_En_8_Fig8_HTML.jpg)\n\
    \n    Figure 8-8. Modified DetailViewController\n\n3.  Drag some Label objects\
    \ from the Object Library onto the Detail View, as shown in Figure [8-9](#341013_5_En_8_Chapter.xhtml#Fig9).\
    \ Make sure that the lower Label controls are wider than the default. This is\
    \ so that they can hold a fairly large amount of text. The two Label objects with\
    \ the text “Label” in them are the ones you’re going to hook up to hold two of\
    \ the values from the `Book` object: `Title` and `Author`.\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig9_HTML.png](images/341013_5_En_8_Chapter/341013_5_En_8_Fig9_HTML.png)\n\
    \n    Figure 8-9. Adding some Label objects\n\n### Adding Properties\n\nNext,\
    \ you’ll add some properties to the `DetailViewController` class. These properties\
    \ will correspond to the Detail View’s Label objects.\n\n1.  Click the Assistant\
    \ Editor icon (it looks like two circles) in the top-right corner of Xcode to\
    \ open the Assistant editor. Make sure the `DetailViewController.swift` file is\
    \ showing in the editor.\n\n2.  Hold the Control key and drag the first blank\
    \ Label control to the code on the right side, as shown in Figure [8-10](#341013_5_En_8_Chapter.xhtml#Fig10).\
    \ Name the first one `titleLabel` (see Figure [8-11](#341013_5_En_8_Chapter.xhtml#Fig11))\
    \ and click Connect, and then repeat the process with the second one, naming it\
    \ `authorLabel`. This will add two variables to your `DetailViewController` class,\
    \ as seen in Listing [8-9](#341013_5_En_8_Chapter.xhtml#PC25), and hook them to\
    \ the Label controls in the interface.\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig11_HTML.jpg](images/341013_5_En_8_Chapter/341013_5_En_8_Fig11_HTML.jpg)\n\
    \n    Figure 8-11. Naming the new property\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig10_HTML.jpg](images/341013_5_En_8_Chapter/341013_5_En_8_Fig10_HTML.jpg)\n\
    \n    Figure 8-10. Creating variables\n\n```\n1        @IBOutlet weak var titleLabel:\
    \ UILabel!\n2        @IBOutlet weak var authorLabel: UILabel!\nListing 8-9 Modifying\
    \ the DetailViewController.swift File to Include the New Labels\n```"
