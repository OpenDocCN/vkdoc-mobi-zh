    Warnings indicate potential problems with the program. As mentioned, warnings
    won’t stop a program from building but may cause issues during program execution.
    It’s outside the scope of this book to cover those warnings that may or may not
    cause problems during program execution; however, it’s good practice to eliminate
    all warnings from a program.


