    19     static var maxFMFrequency: Double = 107.9


    21     func isBandFM() -> Int {

    22         if frequency >=

    RadioStation.minFMFrequency && frequency <= RadioStation.maxFMFrequency {

    23             return 1 //FM

    24         } else {

