  raw: '## Getting Started


    Follow these steps to create the app:


    1.  Create a new Swift project based on the Single View App template, name it
    `RandomNumberDelegate`, and save it, as shown in Figure [12-5](#341013_5_En_12_Chapter.xhtml#Fig5).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig5_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig5_HTML.jpg)


    Figure 12-5.


    Creating the project


    2.  From the Document Outline, select the Main.storyboard, and then select the
    View Controller Scene. Then select Editor ➤ Embed In ➤ Navigation Controller.
    This embeds your View Controller in a Navigation Controller and enables you to
    easily transition back and forth between other View Controllers, as shown in Figure
    [12-6](#341013_5_En_12_Chapter.xhtml#Fig6).


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig6_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig6_HTML.jpg)


    Figure 12-6.


    Embedding the View Controller in a Navigation Controller


    3.  In the View Controller, add two `Label` objects and two `Button` objects along
    with their four respective outlets to control the view, as shown in Figure [12-7](#341013_5_En_12_Chapter.xhtml#Fig7).
    (Be sure to embed the labels and buttons in a horizontally and vertically center-aligned
    stack view like you did in Chapter [10](#341013_5_En_10_Chapter.xhtml).)


    ![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig7_HTML.jpg](images/341013_5_En_12_Chapter/341013_5_En_12_Fig7_HTML.jpg)


    Figure 12-7.


    Outlets necessary to control the view


    4.  Next, connect the Action in Listing [12-4](#341013_5_En_12_Chapter.xhtml#PC4)
    to the playAgainButton.


    1.  Add the code in Listing [12-5](#341013_5_En_12_Chapter.xhtml#PC5) for the
    functions to handle when the user guesses a number and to handle creating a random
    number.


    ```

    22     // event triggered by playAgainButton

    23     @IBAction func playAgain(_ sender: Any) {

    24         createRandomNumber()

    25         // only show the button when the user guessed the right #

    26         playAgainButton.isHidden = true

    27         // show the button

    28         guessButton.isHidden = false

    29         resultLabel.text = ""

    30         userGuessLabel.text = "New Game"

    31         previousGuess = ""

    32     }

    Listing 12-4

    IBAction Function

    ```


    1.  Declare and initialize the two variables on lines 12 and 13 in Listing [12-6](#341013_5_En_12_Chapter.xhtml#PC6).


    ```

    34     // function called from the GuessInputViewController when the user

    35     // taps on the Save Button button

    36     func userDidFinish(_ controller: GuessInputViewController, guess:  String)
    {

    37         userGuessLabel.text = "The guess was " +  guess

    38         previousGuess = guess

    39         if let numberGuess = Int(guess) {

    40             if (numberGuess > randomNumber) {

    41                 resultLabel.text = "Guess too high"

    42             } else if (numberGuess < randomNumber) {

    43                 resultLabel.text = "Guess too low"

    44             } else {

    45                 resultLabel.text = "Guess is correct"

    46                 //show the play again button

    47                 playAgainButton.isHidden = false

    48                 //hide the guess again number

    49                 guessButton.isHidden = true

    50             }

    51         }


    53         // pops the GuessInputViewController off the stack

    54         if let navController = self.navigationController {

    55             navController.popViewController(animated: true)

    56         }

    57     }


    59     // creates the random number

    60     func createRandomNumber() {

    61         // get a random number between 0-100

    62         randomNumber = Int(arc4random_uniform(100))

    63         // lets us cheat :)

    64         print("The random number is: \(randomNumber)")

    65         return

    66     }

