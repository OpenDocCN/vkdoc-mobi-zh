    right of your view on the navigation bar, as shown in Figure [11-16](#341013_5_En_11_Chapter.xhtml#Fig16).


    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig16_HTML.jpg](images/341013_5_En_11_Chapter/341013_5_En_11_Fig16_HTML.jpg)


    Figure 11-16.


    Adding a Bar Button Item to the navigation bar


    8.  Select the Bar Button Item and change the System Item from Custom to Add as
