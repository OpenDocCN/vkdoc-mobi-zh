  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，对以下英文文本进行翻译。\n\n\n### 注意\n\n将 Swift 类保存在单独的文件中仍然是一个好主意。这有助于更容易地组织和查找类，尤其是在处理大型项目时。但有时，一个较小的类只与另一个类一起使用，将它们放在同一个文件中是合理的。\n\
    \n让我们创建 `Book` 类。将以下代码输入到 `Book.swift` 文件中：\n\n```\nclass Book {\n}\n```\n\n现在你就有了这个类，如图\
    \ 8-6 所示。这就是创建类所需要做的全部工作。\n\n![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig6_HTML.jpg](img/341013_5_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 空的 Book 类\n\n### 引入属性\n\n这个类简单地被命名为 `Book`。没错，你有了一个类，但目前它*不存储*任何东西。为了使这个类有用，它需要能够保存一些信息，这是通过属性来实现的。当使用一个对象时，它必须被实例化。一旦对象被实例化，它就可以访问其属性。只要对象保持在作用域内，这些变量就对对象可用。正如你在第\
    \ 7 章中所了解的，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是程序的整个生命周期。在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象在哪里声明以及如何使用。作用域将在后面更详细地讨论。现在，让我们给\
    \ `Book` 类添加一些属性，使其更有用。\n\n```\n1   //\n2   //  Book.swift\n3   //  BookStore\n\
    4   //\n5   //  Created by Thorn on 7/27/17.\n6   //  Copyright © 2017 Innovativeware.\
    \ All rights reserved.\n7   //\n\n9   import Foundation\n\n11   class Book {\n\
    12       var title: String = \"\"\n13       var author: String = \"\"\n14    \
    \   var description: String = \"\"\n15   }\n代码清单 8-8 向 Book.swift 文件添加实例变量\n```\n\
    \n代码清单 8-8 展示了与之前相同的 `Book` 对象，但现在第 12-14 行的大括号内添加了三个新属性。这些都是 `String` 对象，这意味着它们可以为\
    \ `Book` 对象保存文本信息。因此，`Book` 对象现在有了存储标题、作者和描述信息的地方。注意，代码给属性赋予了一个初始值。如果没有赋予初始值，该类将需要一个\
    \ `init` 方法来赋予初始值。\n\n### 访问属性\n\n现在你已经有了一些属性，那么如何使用它们呢？它们如何被访问？不幸的是，仅仅声明一个属性并不一定能让你访问它。有两种方式可以访问这些变量：\n\
    \n*   当然，一种方式是在 `Book` 对象内部。\n*   第二种方式是从对象外部——即程序中使用 `Book` 对象的其他部分。\n\n如果你正在为\
    \ `Book` 对象内部的一个方法编写代码，访问其属性非常简单。例如，你可以简单地编写以下代码：\n\n```\ntitle = \"Test Title\"\
    \n```\n\n从对象外部，你仍然可以访问 `title` 变量。这是通过使用点表示法来实现的。\n\n```\nmyBookObject.title =\
    \ \"Test Title\"\n```\n\n## 完成 BookStore 程序\n\n理解了属性之后，现在你将着手创建实际的图书店程序。想法很简单——创建一个名为\
    \ `BookStore` 的类，它将存放一些 `Book` 对象。\n\n### 创建视图\n\n让我们先准备好视图。如果你需要复习如何在 Xcode 中构建界面，请参考第\
    \ 6 章。\n\n1.  在导航区点击 `Main.storyboard` 文件。这将显示 Xcode 的界面构建器，如图 8-7 所示。你将在 `Main.storyboard`\
    \ 文件中看到五个场景。向右导航找到详细信息场景。\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig7_HTML.jpg](img/341013_5_En_8_Fig7_HTML.jpg)\n\
    \n    图 8-7. 准备图书店的详细信息视图\n\n2.  默认情况下，当你创建一个空的主-从应用程序时，Xcode 会添加一个文本为“Details\
    \ view content goes here.”的标签。选择并删除这个标签对象，因为你要添加自己的标签。你将添加一些新的字段来显示所选书籍的详细信息。由于你删除了这个控件，你也需要移除引用它的代码。\n\
    \    1.  在 `DetailViewController.swift` 文件中，移除下面一行：\n\n        ```\n        @IBOutlet\
    \ weak var detailDescriptionLabel: UILabel!\n        ```\n\n    2.  在 `var detailItem:\
    \ AnyObject?` 属性声明中，移除下面一行：\n\n        ```\n        configureView()\n        ```\n\
    \n    3.  在名为 `configureView` 的方法中，移除以下几行：\n\n        ```\n        // 更新详细信息项的用户界面。\n\
    \        if let detail = detailItem {\n        if let label = detailDescriptionLabel\
    \ {\n        label.text = detail.description\n        }\n        }\n        ```\n\
    \n        你的 `DetailViewController.swift` 文件现在应该看起来像图 8-8 所示。\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig8_HTML.jpg](img/341013_5_En_8_Fig8_HTML.jpg)\n\
    \n    图 8-8. 修改后的 DetailViewController\n\n3.  从对象库中拖动一些标签对象到详细信息视图上，如图 8-9 所示。确保下方的标签控件比默认的宽。这是为了让它们能够容纳相当多的文本。两个文本为“Label”的标签对象是你要连接起来的，用于保存\
    \ `Book` 对象中的两个值：`Title` 和 `Author`。\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig9_HTML.png](img/341013_5_En_8_Fig9_HTML.png)\n\
    \n    图 8-9. 添加一些标签对象\n\n### 添加属性\n\n接下来，你将向 `DetailViewController` 类添加一些属性。这些属性将对应于详细信息视图的标签对象。\n\
    \n1.  点击 Xcode 右上角的助理编辑器图标（看起来像两个圆圈）以打开助理编辑器。确保编辑器中显示的是 `DetailViewController.swift`\
    \ 文件。\n\n2.  按住 Control 键，将第一个空白标签控件拖拽到右侧的代码中，如图 8-10 所示。将第一个命名为 `titleLabel`（见图\
    \ 8-11），然后点击连接，接着对第二个重复此过程，将其命名为 `authorLabel`。这将向你的 `DetailViewController` 类添加两个变量，如代码清单\
    \ 8-9 所示，并将它们连接到界面中的标签控件。\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig11_HTML.jpg](img/341013_5_En_8_Fig11_HTML.jpg)\n\
    \n    图 8-11. 命名新属性\n\n    ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig10_HTML.jpg](img/341013_5_En_8_Fig10_HTML.jpg)\n\
    \n    图 8-10. 创建变量\n\n```\n1        @IBOutlet weak var titleLabel: UILabel!\n\
    2        @IBOutlet weak var authorLabel: UILabel!\n代码清单 8-9 修改 DetailViewController.swift\
    \ 文件以包含新的标签\n```\n"
- fmt: "### Adding a Description\n\nNow you need to add the description to the view.\
    \ The description is a little different in that it can span multiple lines. For\
    \ this, you’re going to use the `Text View` object.\n\n1. Start by adding the\
    \ “Description:” label to the view, as shown in Figure [8-12](#341013_5_En_8_Chapter.xhtml#Fig12).\n\
    \   ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig12_HTML.png](images/341013_5_En_8_Chapter/341013_5_En_8_Fig12_HTML.png)\n\
    \   Figure 8-12. Adding a new `Label` object for the description\n\n2. Next, add\
    \ the `Text View` object to the Detail Scene, as shown in Figure [8-13](#341013_5_En_8_Chapter.xhtml#Fig13).\
    \ The advantage the `Text View` object has is that it’s easy to display multiple\
    \ lines of text. While the `Label` object can display multiple lines, it’s not\
    \ as clean as the `Text View` object.\n   **Note** By default, the `Text View`\
    \ control is filled with all kinds of seemingly random text. This text is called\
    \ *Lorem Ipsum* text. If you ever need to fill up a page with text, you can find\
    \ any number of Lorem Ipsum generators on the Web. As for the `Text View` control,\
    \ the text can stay as it is since you’ll remove it during runtime. Plus, if it’s\
    \ cleared, it becomes a little more difficult spotting exactly where the `Text\
    \ View` control is on the screen—it’s white on white!\n   ![../images/341013_5_En_8_Chapter/341013_5_En_8_Fig13_HTML.png](images/341013_5_En_8_Chapter/341013_5_En_8_Fig13_HTML.png)\n\
    \   Figure 8-13. Adding a `Text View` to the Detail View\n\n3. For the program\
    \ to take advantage of the `Text View`, you’ll need to create an outlet for it,\
    \ just like you did for the title and description. Simply Control-drag the `Text\
    \ View` to your `DetailViewController` file, as you did earlier. Name this variable\
    \ `descriptionTextView`. The finished variable portion of `DetailViewController`\
    \ will look like Listing [8-10](#341013_5_En_8_Chapter.xhtml#PC26).\n   1. Notice\
    \ that the type is `UITextView` instead of `UILabel`—this is important.\n\n```\n\
    1    import UIKit\n3    class DetailViewController: UIViewController {\n5    \
    \    @IBOutlet weak var titleLabel: UILabel!\n6        @IBOutlet weak var authorLabel:\
    \ UILabel!\n8        @IBOutlet weak var descriptionTextView: UITextView!\nListing\
    \ 8-10\nAdding an Outlet for the Text View to Hold a Description\n```\n\n### Caution\n\
    \nAs mentioned, it’s important to make the `descriptionTextView` property a `UITextView`\
    \ type. If, for example, it was accidentally made a `UILabel` object, when trying\
    \ to connect the `Text View` from the screen to the outlet, Xcode wouldn’t be\
    \ able to find the `descriptionTextView` outlet. Why? Xcode knows that the control\
    \ is a `UITextView` and is looking for an outlet that is of type `UITextView`.\n\
    \n### Creating a Simple Data Model Class\n\nFor the application to work, it needs\
    \ to have some data to display. To do this, you’re going to use the `BookStore`\
    \ object you created earlier as the data model class. There’s nothing different\
    \ about a data model class except that its whole purpose is to allow an application\
    \ to access data via an object.\n\nModify the `BookStore.swift` file to look like\
    \ Listing [8-11](#341013_5_En_8_Chapter.xhtml#PC27).\n\n```\n1 //\n2 //  BookStore.swift\n\
    3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright ©\
    \ 2019 Innovativeware. All rights reserved.\n7 //\n9    import Foundation\n11\
    \    class BookStore {\n12        var bookList: [Book] = []\n13    }\nListing\
    \ 8-11\nModifying the BookStore.swift Class to Include an Array\n```\n\nOn line\
    \ 12, you add a variable that will hold the list of books; the property is simply\
    \ named `bookList`. Note that `bookList` is an array, which will allow you to\
    \ add a series of objects, in this case, a set of `Book` objects.\n\nNext, let’s\
    \ continue adding the code to the Swift file, `BookStore.swift`, as shown in Listing\
    \ [8-12](#341013_5_En_8_Chapter.xhtml#PC28).\n\n```\n1 //\n2 //  BookStore.swift\n\
    3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright ©\
    \ 2019 Innovativeware. All rights reserved.\n7 //\n9 import Foundation\n11 class\
    \ BookStore {\n12     var bookList: [Book] = []\n14     init() {\n15         var\
    \ newBook = Book()\n16         newBook.title = \"Swift for Absolute Beginners\"\
    \n17         newBook.author = \"Bennett and Lees\"\n18         newBook.description\
    \ = \"iOS Programming made easy.\"\n19         bookList.append(newBook)\n21  \
    \       newBook = Book()\n22         newBook.title = \"A Farewell to Arms\"\n\
    23         newBook.author = \"Ernest Hemingway\"\n24         newBook.description\
    \ = \"The story of an affair between an English nurse and an American soldier\
    \ on the Italian front during World War I.\"\n25         bookList.append(newBook)\n\
    26     }\n27 }\nListing 8-12\nImplementing the BookStore Data Object\n```\n\n\
    In Listing [8-12](#341013_5_En_8_Chapter.xhtml#PC28), lines 14–26 define the `init`\
    \ method of the object, which is called whenever the object is first initialized.\
    \ In this method, you initialize the two books you plan to add to your bookstore.\
    \ Line 15 is where the first `Book` object is allocated and initialized. Lines\
    \ 16–18 add a title, author, and description to your first book. Finally, line\
    \ 19 adds the new `Book` object to the `bookList` array. The important thing to\
    \ note here is that once the object is added to the array, the code can forget\
    \ about it; the array now owns that object. Because of this, line 21 is not a\
    \ problem.\n\nLine 21 allocates a new `Book` object overwriting the old value.\
    \ This tells the compiler that you’re no longer interested in using the old value.\n\
    \nLines 22–25 simply initialize and add the second book to the array.\n\nThat’s\
    \ it! That’s all you need to define a simple data model class. Next, you need\
    \ to modify `MasterViewController` to access this class so that it can start displaying\
    \ some data."
