  trans: "\n# 属性\n\n代码清单 7-1 展示了一个包含两个不同属性的示例类：`name` 和 `frequency`。第 1 行导入了 `UIKit`\
    \ 类定义（稍后会详细介绍），因为这是 Xcode 在创建新类时默认添加的导入。第 3 行通过定义类的名称（有时也称为*类型*）开始类的定义。第 5 行和第\
    \ 6 行为 `RadioStation` 类定义了两个属性。\n\n每当 `RadioStation` 类被实例化时，生成的 `RadioStation`\
    \ 对象都可以访问这些属性，而这些属性仅属于特定的实例。如果有十个 `RadioStation` 对象，每个对象都有自己独立的变量，互不影响。这也被称为*作用域*，即对象的变量位于每个对象的作用域内。\n\
    \n第 13–19 行也包含了一些属性。这些属性前面带有 `static` 关键字，意味着该值属于类本身，每个对象都将保持这些属性的完全相同的值。\n\n\
    # 方法\n\n几乎每个对象都有方法。在 Swift 中，与对象交互的最常见方式是通过调用方法，如下所示：\n\n```\nmyStation.isBandFM()\n\
    ```\n\n上面这行代码会在 `RadioStation` 类对象的一个实例上调用名为 `isBandFM` 的方法。\n\n方法也可以带有参数。为什么要传递参数？传递参数有几个原因。首先（也是最常见的），可能性范围太大，无法将它们写成独立的方法。其次，你需要存储在对象中的数据是可变的——比如电台的名称。在下面的例子中，你会看到为每一种可能的无线电频率编写一个方法并不实际；相反，频率是作为参数传递的。电台名称也是如此。\n\
    \n```\nmyStation.setFrequency(104.7)\n```\n\n方法名是 `setFrequency`。方法调用可以有多个参数，如下例所示：\n\
    \n```\nmyStation = RadioStation.init(name: \"KZZP\", frequency: 104.7)\n```\n\n\
    在上面的例子中，方法调用包含两个参数：电台名称及其频率。Swift 相对于其他语言的一个有趣之处在于，方法包含命名参数。如果这是一个 C++ 或 Java\
    \ 程序，调用方式会是：\n\n```\nmyObject = new RadioStation(\"KZZP\", 104.7)\n```\n\n虽然 `RadioStation`\
    \ 对象的参数可能看起来很明显，但拥有命名参数可以是一个优势，因为它们或多或少地说明了这些参数是什么。\n\n## 使用类型方法\n\n类并不总是必须实例化才能使用。在某些情况下，类拥有一些方法，它们可以在类实例化之前实际执行一些简单的操作并返回值。这些方法被称为*类型方法*。在代码清单\
    \ 7-1 中，以 `static` 开头的方法名就是类型方法。\n\n类型方法有局限性。它们最大的局限性之一是，不能使用任何实例变量。不能使用实例变量是合理的，因为你还没有实例化任何东西。一个类型方法可以在方法内部拥有自己的局部变量，但不能使用任何被定义为实例变量的变量。\n\
    \n对类型方法的调用如下所示：\n\n```\nRadioStation.minAMFrequency()\n```\n\n请注意，这个调用与在已实例化的对象上调用方法的方式类似。最大的区别在于，这里使用的是*类名*，而不是实例变量。类型方法在\
    \ macOS 和 iOS 框架中被广泛使用。它们主要用于返回一些固定的或众所周知类型的值，或者返回一个新的对象实例。这类类型方法被称为*初始化器*。以下是一些初始化器方法的例子：\n\
    \n```\n1.  Date.addingTimeInterval()  // 返回一个 Date 对象\n2.  String(format:\"http://%@\"\
    , \"www.apple.com\")    // 返回一个新的 String 对象\n3.  Dictionary()                \
    \   // 返回一个新的 Dictionary 对象\n```\n\n上面所有的消息都是在调用类型方法。\n\n第 1 行简单地返回一个值，该值表示自参考日期\
    \ 2001 年 1 月 1 日以来的秒数。\n\n第 2 行返回一个新的 `String` 对象，该对象已被格式化，其值为 `http://1000`。\n\
    \n第 3 行是一种常用的形式，因为它实际上分配了一个新对象。通常，这一行不会单独使用，而是会出现在像这样的代码行中：\n\n```\nvar myDict\
    \ = Dictionary()\n```\n\n那么，你什么时候会使用类型方法呢？作为一般规则，如果该方法返回的信息*不*特定于该类的任何特定实例，那么就让该方法成为一个类型方法。例如，前面例子中的\
    \ `minAMFrequency` 对于任何 `RadioStation` 的所有实例都是相同的。\n\n对象——这是使用类型方法的绝佳候选。然而，电台的名称或其分配的频率对于该类的每个实例来说是不同的。这些不该（实际上也*不能*）是类型方法。原因在于，类型方法不能使用该类定义的任何实例变量。\n\
    \n## 使用实例方法\n\n实例方法（代码清单 7-1 中的第 29–35 行）只有在类被实例化之后才可用。这里有一个例子：\n\n```\n1   var\
    \ myStation: RadioStation         // 这声明了一个变量来持有 RadioStation 对象。\n2   myStation\
    \ = RadioStation()          // 这创建了一个新的 RadioStation 对象。\n3   var band = myStation.band()\
    \         // 这个方法返回 RadioStation 的波段。\n```\n\n第 3 行在 `RadioStation` 对象上调用了一个方法。`band`\
    \ 方法为 FM 返回 1，为 AM 返回 0。实例方法是指任何在其前面没有类声明的方法。\n\n# 使用你的新类\n\n你已经创建了一个简单的 `RadioStation`\
    \ 类，但仅凭它本身并不能完成太多任务。在本节中，你将创建 `Radio` 类，并让它维护一个 `RadioStation` 类的列表。\n\n## 创建项目\n\
    \n让我们启动 Xcode 并创建一个名为 `RadioStations` 的新项目。\n\n1. 启动 Xcode 并选择“Create a new Xcode\
    \ project.”。\n\n2. 确保你选择了一个 iOS 应用程序，并选择 Single View App 模板，如图 7-1 所示。\n\n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig1_HTML.jpg](img/341013_5_En_7_Fig1_HTML.jpg)\n\
    \n   图 7-1\n   在新项目窗口中选定一个模板\n\n3. 选择模板后，点击 Next 按钮。\n\n4. 将产品名称（应用程序名称）设置为 `RadioStations`。\n\
    \n5. 设置公司标识符（可以使用一个虚构的公司），并将设备系列设置为 iPhone（如图 7-2 所示）。确保在语言下拉列表中选择了 Swift。\n\n\
    \   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig2_HTML.jpg](img/341013_5_En_7_Fig2_HTML.jpg)\n\
    \n   图 7-2\n   命名新的 iOS 应用程序\n\n6. 点击 Next 按钮，Xcode 会询问你想要将新项目保存在哪里。你可以将项目保存到桌面或\
    \ home 文件夹中的任何位置。做出选择后，只需点击 Create 按钮。\n\n7. 点击 Create 按钮后，Xcode 工作区窗口应该可见，如图\
    \ 7-3 所示。\n\n   ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig3_HTML.jpg](img/341013_5_En_7_Fig3_HTML.jpg)\n\
    \n   图 7-3\n   Xcode 中的工作区窗口\n"
- fmt: "### Adding Objects\n\nNow you can add your new objects.\n\n1.  First, create\
    \ your `RadioStation` object. Right-click the `RadioStations` folder and select\
    \ New File (as shown in Figure [7-4](#341013_5_En_7_Chapter.xhtml#Fig4)).\n\n\
    \    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig4_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4 Adding a new file\n\n2.  The next screen, shown in Figure [7-5](#341013_5_En_7_Chapter.xhtml#Fig5),\
    \ asks for the new file type. Simply choose Cocoa Touch Class from the Source\
    \ group, and then click Next.\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig5_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5 Selecting the new file type\n\n3.  The following screen will\
    \ ask you the name of the class. Enter `RadioStation`. Keep Subclass set to `NSObject`\
    \ and make sure Language is set to Swift. See Figure [7-6](#341013_5_En_7_Chapter.xhtml#Fig6).\n\
    \n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig6_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig6_HTML.jpg)\n\
    \n    Figure 7-6 Naming the New Class\n\n4.  Xcode will not prompt you to save\
    \ the file. The default location is inside your project’s folder. Click the Create\
    \ button to save the file in the default location.\n\n5.  Your project window\
    \ should now look like Figure [7-7](#341013_5_En_7_Chapter.xhtml#Fig7). Click\
    \ the `RadioStation.swift` file. Notice that the stub of your new `RadioStation`\
    \ class is already present. Now, fill in the empty class so it looks like Listing\
    \ [7-1](#341013_5_En_7_Chapter.xhtml#PC3), your `RadioStation` Swift file.\n\n\
    \    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig7_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig7_HTML.jpg)\n\
    \n    Figure 7-7 Your newly created file in the workspace window\n\n### Writing\
    \ the Class\n\nNow that you have created your file and your class, you are ready\
    \ to begin customizing it.\n\n1.  The class file you’ll use here is the same one\
    \ you used at the beginning of this chapter and it will work perfectly for the\
    \ radio station application. Click the `RadioStation.swift` file, and enter the\
    \ code in your class, as shown in Figure [7-8](#341013_5_En_7_Chapter.xhtml#Fig8).\n\
    \n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig8_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig8_HTML.jpg)\n\
    \n    Figure 7-8 The RadioStation class file\n\nWe will come back to a few items\
    \ in Figure [7-8](#341013_5_En_7_Chapter.xhtml#Fig8) and explain them further\
    \ in a moment; however, with the `RadioStation` class defined, you can now write\
    \ the code that will actually use it.\n\n1.  Click the `ViewController.swift`\
    \ file. You’ll need to define a few variables for this class to use, as shown\
    \ in Figure [7-9](#341013_5_En_7_Chapter.xhtml#Fig9).\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig9_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig9_HTML.jpg)\n\
    \n    Figure 7-9 Adding a RadioStation object to the View Controller\n\nLines\
    \ 13–15 are going to be used by your iOS interface to show some values on the\
    \ screen (more on these later). Line 17 defines the variable `myStation` of type\
    \ `RadioStation`. Lines 19–24 contain the required `init` method. In Swift, classes\
    \ do not require an initializer method, but it is a good place to set the default\
    \ values of your object. This method sets up the variables used in that class.\
    \ Also, don’t forget to include the curly braces (`{ ... }`).\n\n### Creating\
    \ the User Interface\n\nNext, the main window has to be set up in order to display\
    \ your station information.\n\n1.  Click the `Main.storyboard` file. This file\
    \ produces the main iPhone screen. Click the Object Library icon, as shown in\
    \ Figure [7-10](#341013_5_En_7_Chapter.xhtml#Fig10).\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig10_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig10_HTML.jpg)\n\
    \n    Figure 7-10 Adding a Label object to your iPhone screen\n\n2.  Drag and\
    \ drop three Label objects onto the screen, as shown in Figure [7-11](#341013_5_En_7_Chapter.xhtml#Fig11).\
    \ The labels can be aligned in any manner, or as shown in Figure [7-11](#341013_5_En_7_Chapter.xhtml#Fig11).\n\
    \n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig11_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig11_HTML.jpg)\n\
    \n    Figure 7-11 All three Label objects on the iPhone screen\n\n3.  You’re going\
    \ to need space, however. Once the Label objects are on the iPhone screen, click\
    \ each label and drag the size box to enlarge the size of the labels so that the\
    \ iPhone screen looks something like Figure [7-11](#341013_5_En_7_Chapter.xhtml#Fig11).\n\
    \n4.  Next, add a Button object to the screen, as shown in Figure [7-12](#341013_5_En_7_Chapter.xhtml#Fig12).\
    \ This button, when clicked, will cause the screen to be updated with your radio\
    \ station information.\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig12_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig12_HTML.jpg)\n\
    \n    Figure 7-12 Adding a Button object to the screen\n\n5.  Just like with the\
    \ Label object, simply double-click the Button object in order to change its Title\
    \ to My Station. The button should automatically resize to fit the new title.\n\
    \n6.  Next, you need to add the Label fields that will hold the radio station\
    \ information. These fields are situated just after the existing Label objects.\
    \ Figure [7-13](#341013_5_En_7_Chapter.xhtml#Fig13) shows the placement of the\
    \ first label. Once the Label object is placed, it needs to be resized so that\
    \ it can show more text, as shown in Figure [7-14](#341013_5_En_7_Chapter.xhtml#Fig14).\n\
    \n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig14_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig14_HTML.jpg)\n\
    \n    Figure 7-14 Stretching the Label object\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig13_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig13_HTML.jpg)\n\
    \n    Figure 7-13 Adding another Label object\n\n    **Note** Stretching the Label\
    \ object allows the Label’s text to contain a reasonably long string. If you didn’t\
    \ resize the Label object, the text would be cut off (since it wouldn’t fit),\
    \ or the font size would get smaller.^([¹](#fn1))\n\n7.  Repeat adding and sizing\
    \ a Label object next to the existing Frequency and Band Labels, as shown in Figure\
    \ [7-15](#341013_5_En_7_Chapter.xhtml#Fig15). It’s okay to leave the default text\
    \ of the label set to “Label” for now.\n\n    ![../images/341013_5_En_7_Chapter/341013_5_En_7_Fig15_HTML.jpg](images/341013_5_En_7_Chapter/341013_5_En_7_Fig15_HTML.jpg)\n\
    \n    Figure 7-15 Adding another Label object"
