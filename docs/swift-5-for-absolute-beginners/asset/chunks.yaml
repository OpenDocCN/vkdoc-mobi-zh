    ```

    class RadioStation

    ```


    这里，类名是`RadioStation`。默认情况下，Swift 类不从父类继承。如果你希望你的 Swift 类继承自另一个类，可以像这样操作：


    ```

    class RadioStation: Station

    ```


    在这个例子中，`RadioStation`现在是`Station`的子类，并将继承`Station`的所有属性和方法。代码清单[7-1](#341013_5_En_7_Chapter.xhtml#PC3)展示了一个类的完整定义。


