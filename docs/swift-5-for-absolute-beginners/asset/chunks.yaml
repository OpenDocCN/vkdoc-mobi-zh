  trans: '

    ### 设计要求


    正如第 1 章所讨论的，软件开发生命周期中最昂贵的环节是编写代码。而最便宜的环节则是收集应用程序的需求；然而，后者在软件开发中恰恰是最容易被忽视且运用最少的。


    设计需求通常始于向客户、用户和/或利益相关者询问应用程序应如何工作、应解决哪些问题。


    对于应用程序而言，需求可以包括长篇或短篇的叙述性描述、屏幕设计图稿以及公式。在编码开始前，打开文字处理软件修改需求和屏幕设计图稿，远比修改一个 iOS 应用要容易得多。以下是一个
    iPhone 手机银行应用某个视图的设计需求：


    - *视图*：账户视图。

    - *描述*：显示用户拥有的账户列表。账户列表将包含以下部分：商业账户、个人账户、汽车贷款、个人退休账户以及房屋净值贷款。

    - *单元格*：每个单元格将包含账户名称、账户后四位数字、可用余额和当前余额。


    一图胜千言。屏幕设计图稿对开发者和用户都很有帮助，因为它们能展示视图完成后的样子。有许多工具可以快速设计界面模型，比如 Sketch 和 OmniGraffle。有关使用
    OmniGraffle 生成的、用于设计需求的屏幕设计图稿示例，请参见图 4-6。


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig6_HTML.jpg](img/341013_5_En_4_Fig6_HTML.jpg)


    图 4-6. 使用 OmniGraffle 和 Ultimate iPhone Stencil 插件绘制的移动银行应用屏幕设计图稿。此设计图稿最初于 2010
    年为 Woodforest 银行应用制作。


    许多开发者认为设计需求耗时过长且不必要。事实并非如此。图 4-6 的“账户”屏幕上展示了大量信息。许多业务规则决定了信息如何展示给用户，以及在出现问题时所有错误处理的方式。在设计应用时，在开发过程初期就与所有业务利益相关者合作，对于第一次就做对至关重要。


    图 4-7 展示了所有利益相关者参与应用开发的例子。从一开始就让所有利益相关者参与到每个视图中，将能消除多次重写和应用错误。


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig7_HTML.jpg](img/341013_5_En_4_Fig7_HTML.jpg)


    图 4-7. 2015 年 App Store 上线的 Woodforest 移动银行应用；将此图与应用需求中的“账户”屏幕（图 4-6）进行比较


    此外，Apple 建议开发人员至少将 50%的开发时间用于用户界面的设计和开发。


    Balsamiq 也提供了出色的工具来规划你的 iOS 应用外观。参见图 4-8。


    ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig8_HTML.jpg](img/341013_5_En_4_Fig8_HTML.jpg)


    图 4-8. Balsamiq.com 网站，用于创建线框图模型


    ## 总结


    本章涵盖了关于如何控制应用程序的大量重要信息；程序流程和决策制定对每一个 iOS 应用都至关重要。请确保你已经完成了本章中的 Swift 示例。你可能会浏览这些示例并认为无需实际编写这个应用就能理解一切。这将是一个致命的错误，会阻碍你成为一名成功的
    iOS 开发者。你必须花时间编写这个示例的代码。开发者通过实践学习，而不是通过阅读。


    本章中的术语很重要。你应该能够描述以下内容：


    - `AND`

    - `OR`

    - `XOR`

    - `NAND`

    - `NOR`

    - `NOT`

    - 真值表

    - 否定

    - 所有比较运算符

    - 应用需求

    - 逻辑与 (`&&`)

    - 逻辑或 (`||`)

    - 可选类型与强制解包

    - 可选绑定

    - 隐式解包可选类型

    - 流程图

    - 循环

    - 计数控制循环

    - For 循环

    - 条件控制循环

    - 无限循环

    - `While` 循环

    - 嵌套 `if` 语句

    - 代码重构


    ### 练习


    - 扩展随机数生成器应用，使其在控制台打印出用户在猜中随机数之前尝试了多少次。

    - 扩展随机数生成器应用，使其在控制台打印出用户运行该应用的次数。当用户退出应用时，将此数值打印到控制台。


    # 使用 Swift 进行面向对象编程


    在过去的 17 年里，编程界一直专注于面向对象编程（OOP）这一开发范式。大多数现代开发环境和语言都实现了 OOP。简而言之，OOP 构成了你今天所开发一切的基础。


    你可能会问自己，既然 OOP 是当今主要的开发风格，为什么我们直到第 5 章才介绍使用 Swift 进行 OOP。简单的答案是，对于新手开发者来说，这并非一个容易理解的概念。本章将详细介绍
    OOP 的不同方面，以及它们如何影响你的开发工作。


    在你的应用程序中正确实施 OOP 需要进行一些前期规划，但在项目的整个生命周期中，你将因此节省大量时间。OOP 已经改变了开发的方式。在本章中，你将学习什么是
    OOP。本书第一章已经初步讨论了 OOP，但本章将对其进行更深入的探讨。你将重新审视什么是对象，以及它们如何与你现实世界中的物理对象相关联。你将探究什么是类，以及它们如何与对象相关联。你还将学习在规划类时需要采取的步骤，以及可以用来完成这些步骤的一些可视化工具。当你阅读完本章并完成了练习后，你将更好地理解什么是
    OOP，以及为什么它对你作为开发者来说是必要的。


    起初，对象和面向对象编程可能看起来难以理解，但希望随着你深入学习本章内容，它们会开始变得有意义。

    '
- fmt: '# The Object


    As discussed in Chapter [1](#341013_5_En_1_Chapter.xhtml), OOP is based on objects.
    Some of the discussion about objects will be a review, but it will also go into
    more depth. An *object* is anything that can be acted upon. To better understand
    what a programming object is, you will first look at some items in the physical
    world around you. A physical object can be anything around you that you can touch
    or feel. Take, for example, a television. Some characteristics of a television
    include type (plasma, LCD, or CRT), size (40 inches), brand (Sony or Vizio), weight,
    and cost. Televisions also have functions. They can be turned on or off. You can
    change the channel, adjust the volume, and change the brightness.


    Some of these characteristics and functions are unique to televisions, and some
    are not. For example, a couch in your house would probably not have the same characteristics
    as a television. You would want different information about a couch, such as material
    type, seating capability, and color. A couch might have only a few functions,
    such as converting to a bed or reclining.


    Now let’s talk specifically about objects as they relate to programming. An object
    is a specific item. It can describe something physical like a book, or it could
    be something such as a window for your application. Objects have properties and
    methods. Properties describe certain things about an object such as location,
    color, or name. Conversely, methods describe actions the object can perform such
    as close or recalculate. In this example, a `TV` object would have `type`, `size`,
    and `brand` properties, while a `Couch` object would have properties such as `color`,
    `material`, and `comfort level`. In programming terms, a property is a variable
    that is part of an object. For example, a TV would use a string variable to store
    the brand and an integer to store the height.


    Objects also have commands the programmer can use to control them. The commands
    are called *methods*. Methods are the way that other objects interact with a certain
    object. For example, with the television, a method would be any of the buttons
    on the remote control. Each of those buttons represents a way you can interact
    with your television. Methods can and often are used to change the values of properties,
    but methods do not store any values themselves.


    As described in Chapter [1](#341013_5_En_1_Chapter.xhtml), objects have a *state*,
    which is basically a snapshot of an object at any given point in time. A state
    would be the values of all the properties at a specific time.


    In Chapter [8](#341013_5_En_8_Chapter.xhtml), you will create a bookstore app.
    A bookstore contains many different objects. It contains book objects that have
    properties such as `title`, `author`, `page count`, and `publisher`. It also contains
    magazines with properties such as `title`, `issue`, `genre`, and `publisher`.
    A bookstore also has some nontangible objects such as a `sale`. A `sale` object
    would contain information about the books purchased, the customer, the amount
    paid, and the payment type. A `sale` object might also have some methods that
    calculate tax, print the receipt, or void the sale. A `sale` object does not represent
    a tangible object, but it is still an object and is necessary for creating an
    effective bookstore.


    Because the object is the basis of OOP, it is important to understand objects
    and how to interact with them. You will spend the rest of the chapter learning
    about objects and some of their characteristics.


    # What Is a Class?


    We cannot discuss OOP without discussing what a class is. A class defines which
    properties and methods an object will have. A class is basically a cookie cutter
    that can be used to create objects that have similar characteristics. All objects
    of a certain class will have the same properties (notice, the values of the properties
    many times will be different) and the same methods. The values of those properties
    will change from object to object.


    A class is similar to a species in the animal world. A species is not an individual
    animal, but it does describe many similar characteristics of the animal. To understand
    classes more, let’s look at an example of classes in nature. The `Dog` class has
    many properties that all dogs have in common. For example, a dog may have a name,
    an age, an owner, a weight and a favorite activity. An object that is of a certain
    class is called an *instance* of that class. If you look at Figure [5-1](#341013_5_En_5_Chapter.xhtml#Fig1),
    you can see the difference between the class and the actual objects that are instances
    of the class. For example, `Lassie` is an instance of the `Dog` class. In Figure
    [5-1](#341013_5_En_5_Chapter.xhtml#Fig1), you can see a `Dog` class that has four
    properties (`Breed`, `Age`, `Owner`, and `Favorite Activity`). In real life, a
    dog will have many more properties, but these four are for this demonstration.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png)


    Figure 5-1. An example of a class and its individual objects


    # Planning Classes


    Planning your classes is one of the most important steps in your development process.
    While it is possible to go back and add properties and methods after the fact
    (and you will definitely need to do this), it is important that you know which
    classes are going to be used in your application and which basic properties and
    methods they will have. Spending time planning your different classes is important
    at the beginning of the process.'
  raw: '## The Object


    As discussed in Chapter [1](#341013_5_En_1_Chapter.xhtml), OOP is based on objects.
    Some of the discussion about objects will be a review, but it will also go into
    more depth. An *object* is anything that can be acted upon. To better understand
    what a programming object is, you will first look at some items in the physical
    world around you. A physical object can be anything around you that you can touch
    or feel. Take, for example, a television. Some characteristics of a television
    include type (plasma, LCD, or CRT), size (40 inches), brand (Sony or Vizio), weight,
    and cost. Televisions also have functions. They can be turned on or off. You can
    change the channel, adjust the volume, and change the brightness.


    Some of these characteristics and functions are unique to televisions, and some
    are not. For example, a couch in your house would probably not have the same characteristics
    as a television. You would want different information about a couch, such as material
    type, seating capability, and color. A couch might have only a few functions,
    such as converting to a bed or reclining.


    Now let’s talk specifically about objects as they relate to programming. An object
    is a specific item. It can describe something physical like a book, or it could
    be something such as a window for your application. Objects have properties and
    methods. Properties describe certain things about an object such as location,
    color, or name. Conversely, methods describe actions the object can perform such
    as close or recalculate. In this example, a `TV` object would have `type`, `size`,
    and `brand` properties, while a `Couch` object would have properties such as `color,
    material`, and `comfort level`. In programming terms, a property is a variable
    that is part of an object. For example, a TV would use a string variable to store
    the brand and an integer to store the height.


    Objects also have commands the programmer can use to control them. The commands
    are called *methods*. Methods are the way that other objects interact with a certain
    object. For example, with the television, a method would be any of the buttons
    on the remote control. Each of those buttons represents a way you can interact
    with your television. Methods can and often are used to change the values of properties,
    but methods do not store any values themselves.


    As described in Chapter [1](#341013_5_En_1_Chapter.xhtml), objects have a *state*,
    which is basically a snapshot of an object at any given point in time. A state
    would be the values of all the properties at a specific time.


    In Chapter [8](#341013_5_En_8_Chapter.xhtml), you will create a bookstore app.
    A bookstore contains many different objects. It contains book objects that have
    properties such as `title, author, page count,` and `publisher`. It also contains
    magazines with properties such as `title, issue, genre,` and `publisher`. A bookstore
    also has some nontangible objects such as a `sale`. A `sale` object would contain
    information about the books purchased, the customer, the amount paid, and the
    payment type. A `sale` object might also have some methods that calculate tax,
    print the receipt, or void the sale. A `sale` object does not represent a tangible
    object, but it is still an object and is necessary for creating an effective bookstore.


    Because the object is the basis of OOP, it is important to understand objects
    and how to interact with them. You will spend the rest of the chapter learning
    about objects and some of their characteristics.


    ## What Is a Class?


    We cannot discuss OOP without discussing what a class is. A class defines which
    properties and methods an object will have. A class is basically a cookie cutter
    that can be used to create objects that have similar characteristics. All objects
    of a certain class will have the same properties (notice, the values of the properties
    many times will be different) and the same methods. The values of those properties
    will change from object to object.


    A class is similar to a species in the animal world. A species is not an individual
    animal, but it does describe many similar characteristics of the animal. To understand
    classes more, let’s look at an example of classes in nature. The `Dog` class has
    many properties that all dogs have in common. For example, a dog may have a name,
    an age, an owner, a weight and a favorite activity. An object that is of a certain
    class is called an *instance* of that class. If you look at Figure [5-1](#341013_5_En_5_Chapter.xhtml#Fig1),
    you can see the difference between the class and the actual objects that are instances
    of the class. For example, `Lassie` is an instance of the `Dog` class. In Figure
    [5-1](#341013_5_En_5_Chapter.xhtml#Fig1), you can see a `Dog` class that has four
    properties (`Breed`, `Age`, `Owner`, and `Favorite Activity`). In real life, a
    dog will have many more properties, but these four are for this demonstration.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png)


    Figure 5-1.


    An example of a class and its individual objects


    ## Planning Classes


    Planning your classes is one of the most important steps in your development process.
    While it is possible to go back and add properties and methods after the fact
    (and you will definitely need to do this), it is important that you know which
    classes are going to be used in your application and which basic properties and
    methods they will have. Spending time planning your different classes is important
    at the beginning of the process.'
  trans: '

    # 对象


    正如第 1 章所述，面向对象编程基于对象。关于对象的部分讨论将是回顾，但也会更深入探讨。*对象*是任何可以被操作的事物。为了更好地理解编程中的对象是什么，你首先来看一下周围物理世界中的一些物品。一个物理对象可以是你周围任何可以触摸或感知到的东西。以电视机为例。电视机的一些特征包括类型（等离子、液晶或显像管）、尺寸（40
    英寸）、品牌（索尼或 Vizio）、重量和价格。电视机还具有功能。它们可以打开或关闭。你可以切换频道、调节音量以及改变亮度。


    其中一些特征和功能是电视机独有的，另一些则不是。例如，你家中的沙发可能不具备与电视机相同的特征。你可能会想了解关于沙发的不同信息，例如材质类型、座位容量和颜色。沙发可能只有少数几个功能，例如转换成床或调节靠背。


    现在我们来专门讨论与编程相关的对象。对象是一个特定的条目。它可以描述像书这样的物理事物，也可以是像应用程序窗口这样的东西。对象具有属性和方法。属性描述了关于对象的某些特定信息，例如位置、颜色或名称。相反，方法描述了对象可以执行的动作，例如关闭或重新计算。在这个例子中，一个`TV`对象将拥有`type`、`size`和`brand`属性，而一个`Couch`对象将拥有诸如`color`、`material`和`comfort
    level`等属性。用编程术语来说，属性是对象的一部分的变量。例如，一台电视会使用字符串变量来存储品牌，并使用整数来存储高度。


    对象还具有程序员可以用来控制它们的命令。这些命令被称为*方法*。方法是其他对象与特定对象交互的方式。例如，对于电视机来说，方法可以是遥控器上的任何一个按钮。这些按钮中的每一个都代表一种你可以与电视机交互的方式。方法可以并且经常被用于改变属性的值，但方法本身不存储任何值。


    如第 1 章所述，对象具有*状态*，这基本上是在任何给定时间点对对象的快照。一个状态就是所有属性在特定时间点的值。


    在第 8 章中，你将创建一个书店应用程序。一家书店包含许多不同的对象。它包含书本对象，这些对象具有诸如`title`、`author`、`page count`和`publisher`等属性。它还包括杂志，其属性如`title`、`issue`、`genre`和`publisher`。书店还有一些非物质对象，例如`销售`。一个`Sale`对象将包含关于所购书籍、客户、支付金额和支付类型的信息。一个`Sale`对象可能还有一些方法，用于计算税费、打印收据或作废该笔销售。一个`Sale`对象并不代表一个有形物体，但它仍然是一个对象，并且对于创建一个高效的书店来说是必需的。


    因为对象是面向对象编程的基础，所以理解对象以及如何与之交互非常重要。本章剩余部分你将学习对象及其一些特征。


    # 什么是类


    我们讨论面向对象编程不能不讨论什么是类。一个类定义了对象将拥有哪些属性和方法。一个类基本上就是一个模具，可以用来创建具有相似特征的对象。某个特定类的所有对象将拥有相同的属性（请注意，属性的值很多时候是不同的）和相同的方法。这些属性的值会因对象而异。


    类类似于动物世界中的物种。一个物种不是个别的动物，但它确实描述了这个动物的许多相似特征。为了更深入地理解类，让我们看一下自然界中类的例子。`Dog`类具有所有狗都共同拥有的许多属性。例如，一只狗可能有名字、年龄、主人、体重和最喜欢的活动。一个属于某个特定类的对象被称为该类的一个*实例*。如果你查看图
    5-1，可以看到类与实际作为该类实例的对象之间的区别。例如，`来西`是`Dog`类的一个实例。在图 5-1 中，你可以看到一个具有四个属性（`品种`、`年龄`、`主人`和`最喜欢的活动`）的`Dog`类。在现实生活中，一只狗会有更多的属性，但这四个是用于此演示的。


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png](img/341013_5_En_5_Fig1_HTML.png)


    图 5-1. 一个类及其各个对象的示例


    # 规划类


    规划你的类是你开发过程中最重要的步骤之一。虽然事后回过头来添加属性和方法是可能的（而且你肯定需要这样做），但了解你的应用程序中将使用哪些类以及它们将拥有哪些基本属性和方法是至关重要的。在过程开始时花时间规划你的不同类非常重要。

    '
- fmt: '### Planning Properties


    Let’s look at the bookstore example and some of the classes you need to create.
    First, it is important to create a `Bookstore` class. A `Bookstore` class contains
    the blueprint of the information each `Bookstore` object stores, such as the bookstore’s
    name, address, phone number, and logo (see Figure [5-2](#341013_5_En_5_Chapter.xhtml#Fig2)).
    Placing this information in a class rather than hard-coding it in your application
    will allow you to easily make changes to this information in the future. You will
    learn the reasons for using OOP methodologies later in this chapter. Also, if
    your bookstore becomes a huge success and you decide to open another one, you
    will be prepared because you can create another object of class `Bookstore`.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig2_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig2_HTML.png)


    Figure 5-2. The Bookstore class


    Let’s also plan a `Customer` class (see Figure [5-3](#341013_5_En_5_Chapter.xhtml#Fig3)).
    Notice how the name has been broken into `First Name` and `Last Name`. There will
    be times in your project when you may want to use only the first name of a customer,
    and it would be hard to separate the first name from the last if you didn’t plan
    ahead. Let’s say you want to send a letter to a customer letting them know about
    an upcoming sale. You do not want your greeting to say, “Dear John Doe.” It would
    look much more personal to say, “Dear John.”


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig3_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig3_HTML.png)


    Figure 5-3. The Customer class


    You will also notice how the address is broken into its different parts instead
    of grouping it all together. The `Address Line 1`, `Address Line 2`, `City`, `State`,
    and `Zip` are separate. This is important and will be used in your application.
    Let’s go back to the letter you want to send to customers about an upcoming sale.


    You might not want to send it to all of the customers who live in different states.
    By separating the addresses, you can easily filter out those customers you do
    not want to include in your mailings.


    We have also added the attribute of `Favorite Book Genre` to the `Customer` class.
    We added this to show you how you can keep many different types of information
    in each class. This field may come in handy if you have a new mystery title coming
    out and you want to send an e-mail alerting customers who are especially interested
    in mysteries. By storing this type of information, you will be able to specifically
    target different portions of your customer base.


    A `Book` class is also necessary to create the bookstore (see Figure [5-4](#341013_5_En_5_Chapter.xhtml#Fig4)).
    You will store information about the book such as author, publisher, genre, page
    count, and edition number (in case there are multiple editions). The `Book` class
    will also have the price for the book.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig4_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig4_HTML.png)


    Figure 5-4. The Book class


    You can add another class called `Sale` (see Figure [5-5](#341013_5_En_5_Chapter.xhtml#Fig5)).
    This class is more abstract than the other classes discussed because it does not
    describe a tangible object. You will notice how we have added a reference to a
    customer and a book to the `Sale` class. Because the `Sale` class will track sales
    of books, you need to know which book was sold and to which customer.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig5_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig5_HTML.png)


    Figure 5-5. The Sale class


    Now that you know the properties of the classes, you need to look at some methods
    that each of the classes will have.


    ### Planning Methods


    You will not add all of the methods now, but the more planning you can do at the
    beginning, the easier it will be for you later. Not all of your classes will have
    many methods. Some may not have any methods at all.


    > **Note:** When planning your methods, remember to have them focus on a specific
    task. The more specific the method, the more likely it is that it can be reused.


    For the time being, you will not add any methods to the `Book` class or the `Bookstore`
    class. You will focus on your other two classes.


    For the `Customer` class, you will add methods to list the purchase history of
    that client. There may be other methods that you will need to add in the future,
    but you will add just that one for now. Your completed `Customer` class diagram
    should look like Figure [5-6](#341013_5_En_5_Chapter.xhtml#Fig6). The line near
    the bottom separates the properties from the methods.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig6_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig6_HTML.png)


    Figure 5-6. The completed Customer class


    For the `Sale` class, we have added three methods. We added `Charge Credit Card`,
    `Print Invoice`, and `Checkout` (see Figure [5-7](#341013_5_En_5_Chapter.xhtml#Fig7)).
    For the time being, you do not need to know how to implement these methods, but
    you need to know that you are planning on adding them to your class.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig7_HTML.png](images/341013_5_En_5_Chapter/341013_5_En_5_Fig7_HTML.png)


    Figure 5-7. The completed Sale class


    Now that you have finished mapping out the classes and the methods you are going
    to add to them, you have the beginnings of a Unified Modeling Language (UML) diagram.
    Basically, this is a diagram used by developers to plan their classes, properties,
    and methods. Starting your development process by creating such a diagram will
    help you significantly in the long run. An in-depth discussion of UML diagrams
    is beyond the scope of this book. If you would like more information about this
    subject, `smartdraw.com` has a great in-depth overview of them; see [`www.smartdraw.com/uml-diagram/`](http://www.smartdraw.com/uml-diagram/).
    Omnigroup ([`www.omnigroup.com`](http://www.omnigroup.com)) provides a great UML
    diagram program for macOS called Omnigraffle.


    Figure [5-8](#341013_5_En_5_Chapter.xhtml#Fig8) shows the complete diagram.


    ![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig8_HTML.jpg](images/341013_5_En_5_Chapter/341013_5_En_5_Fig8_HTML.jpg)


    Figure 5-8. The completed UML diagram for the bookstore'
