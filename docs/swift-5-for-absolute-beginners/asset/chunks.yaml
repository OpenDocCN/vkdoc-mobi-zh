    **图 15-25.** 设置新控制器类


    现在，将三个标签对象拖拽到界面上。这些标签将分别用于显示书籍标题、作者和描述。参见图 15-26。`watchOS` 并未提供 `iOS`、`tvOS` 或
    `macOS` 所具备的所有布局选项。作为开发者，您将需要花费时间设计简单的 `watchOS` 界面。


