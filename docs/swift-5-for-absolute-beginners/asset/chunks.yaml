- fmt: '# Completing the Development Cycle


    Now that you have the design requirements and user interface designs and have
    written your program, what’s next? After programming, you need to make sure your
    program matches the design requirements and user interface design and ensure that
    there are no errors. In programming vernacular, errors are called *bugs*. Bugs
    are undesired results of your programming and must be fixed before the app is
    released to the App Store. The process of finding bugs in programs and making
    sure the program meets the design requirements is called **testing**. Typically,
    someone who is experienced in software testing methodology and who didn’t write
    the app performs this testing. Software testing is commonly referred to as **quality
    assurance** (QA).


    ### Note


    When an application is ready to be submitted to the App Store, Xcode gives the
    file an `.app` or `.ipa` extension, for example, `appName.app`. That is why iPhone,
    iPad, and Mac applications are called **apps**. This book uses *program*, *application*,
    and *app* to mean the same thing.


    During the testing phase, the developer will need to work with the QA staff to
    determine why the application is not working as designed. The process is called
    *debugging*. It requires the developer to step through the program to find out
    why the application is not working as designed. Figure [1-3](#341013_5_En_1_Chapter.xhtml#Fig3)
    shows the complete software development cycle.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png](images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png)


    Figure 1-3. The typical software development cycle


    Frequently during testing and debugging, changes to the requirements (design)
    must occur to make the application more usable for the customers. After the design
    requirements and user interface changes are made, the process starts again.


    At some point, the application that everyone has been working so hard on must
    be shipped to the App Store. Many considerations are taken into account as to
    when in the cycle this happens:


    *   Cost of development

    *   Budget

    *   Stability of the application

    *   Return on investment


    There is always the give-and-take between developers and management. Developers
    want the app to be perfect, and management wants to start realizing revenue from
    the investment as soon as possible. If the release date were left up to the developers,
    the app would likely never ship to the App Store. Developers would continue to
    tweak the app forever, making it faster, more efficient, and more usable. At some
    point, however, the code needs to be pried from the developers’ hands and uploaded
    to the App Store so it can do what it was meant to do.


    # Introducing Object-Oriented Programming


    As discussed in detail in the introduction, playgrounds enable you to focus on
    **object-oriented programming** (OOP) without having to cover all the Swift programming
    syntax and complex Xcode development environment in one big step. Instead, you
    can focus on learning the basic principles of OOP and using those principles quickly
    to write your first programs.


    For decades, developers have been trying to figure out a better way to develop
    code that is reusable, manageable, and easily maintained over the life of a project.
    OOP was designed to help achieve code reuse and maintainability while reducing
    the cost of software development.


    OOP can be viewed as a collection of objects in a program. Actions are performed
    on these objects to accomplish the design requirements.


    An **object** is anything that can be acted on. For example, an airplane, person,
    or screen/view on the iPad can all be objects. You may want to act on the plane
    by making the plane bank. You may want the person to walk or to change the color
    of the screen of an app on the iPad.


    Playgrounds execute your code as you complete each line, such as the one shown
    in Figure [1-4](#341013_5_En_1_Chapter.xhtml#Fig4). When you run your playground
    applications, the user can apply actions to the objects in your application. Xcode
    is an **integrated development environment** (IDE) that enables you to run your
    application from within your programming environment. You can test your applications
    on your computer first before running them on your iOS devices by running the
    apps in Xcode’s simulator, as shown in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5).


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg)


    Figure 1-5. This sample iPhone app contains a table object to organize a list
    of groceries. Actions such as “rotate left” or “user did select row 3” can be
    applied to this object.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg)


    Figure 1-4. There are multiple objects in this playground view


    Actions that are performed on objects are called **methods**. Methods manipulate
    objects to accomplish what you want your app to do. For example, for a `jet` object,
    you might have the following methods:


    ```

    goUp

    goDown

    bankLeft

    turnOnAfterburners

    lowerLandingGear

    ```


    The `table` object in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5) is actually
    called `UITableView` when you use it in a program, and it could have the following
    methods:


    ```

    numberOfRowsInSection

    cellForRowAtIndexPath

    canEditRowAtIndexPath

    commitEditingStyle

    didSelectRowAtIndexPath

    ```


    Most objects have data that describes those objects. This data is defined as *properties*.
    Each property describes the associated object in a specific way. For example,
    the `jet` object’s properties might be as follows:


    ```

    altitude = 10,000 feet

    heading = North

    speed = 500 knots

    pitch = 10 degrees

    yaw = 20 degrees

    latitude = 33.575776

    longitude = -111.875766

    ```


    For the `UITableView` object in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5),
    the following might be the properties:


    ```

    backgroundColor = White

    selectedRow = 3

    animateView = No

    ```


    An object’s properties can be changed at any time when your program is running,
    when the user interacts with the app, or when the programmer designs the app to
    accomplish the design requirements. The values stored in the properties of an
    object at a specific time are collectively called the **state of an object**.


    **State** is an important concept in computer programming. When teaching students
    about state, we ask them to go over to a window and find an airplane in the sky.
    We then ask them to snap their fingers and make up some of the values that the
    plane’s properties might have at that specific time. Those values might be as
    follows:


    ```

    altitude = 10,000 feet

    latitude = 33.575776

    longitude = -111.875766

    ```


    Those values represent the *state* of the object at the specific time that they
    snapped their fingers.


    After waiting a couple of minutes, we ask the students to find that same plane,
    snap their fingers again, and record the plane’s possible state at that specific
    point in time.


    The values of the properties might then be something like the following:


    ```

    altitude = 10,500 feet

    latitude = 33.575665

    longitude = -111.875777

    ```


    Notice how the state of the object changes over time.'
  raw: '## Completing the Development Cycle


    Now that you have the design requirements and user interface designs and have
    written your program, what’s next? After programming, you need to make sure your
    program matches the design requirements and user interface design and ensure that
    there are no errors. In programming vernacular, errors are called *bugs*. Bugs
    are undesired results of your programming and must be fixed before the app is
    released to the App Store. The process of finding bugs in programs and making
    sure the program meets the design requirements is called **testing** . Typically,
    someone who is experienced in software testing methodology and who didn’t write
    the app performs this testing. Software testing is commonly referred to as **quality
    assurance** (QA) .


    ### Note


    When an application is ready to be submitted to the App Store, Xcode gives the
    file an `.app` or `.ipa` extension, for example, `appName.app`. That is why iPhone,
    iPad, and Mac applications are called **apps**. This book uses *program*, *application*,
    and *app* to mean the same thing.


    During the testing phase, the developer will need to work with the QA staff to
    determine why the application is not working as designed. The process is called
    *debugging* . It requires the developer to step through the program to find out
    why the application is not working as designed. Figure [1-3](#341013_5_En_1_Chapter.xhtml#Fig3)
    shows the complete software development cycle.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png](images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png)


    Figure 1-3.


    The typical software development cycle


    Frequently during testing and debugging, changes to the requirements (design)
    must occur to make the application more usable for the customers. After the design
    requirements and user interface changes are made, the process starts again.


    At some point, the application that everyone has been working so hard on must
    be shipped to the App Store. Many considerations are taken into account as to
    when in the cycle this happens:


    *   Cost of development


    *   Budget


    *   Stability of the application


    *   Return on investment


    There is always the give-and-take between developers and management . Developers
    want the app to be perfect, and management wants to start realizing revenue from
    the investment as soon as possible. If the release date were left up to the developers,
    the app would likely never ship to the App Store. Developers would continue to
    tweak the app forever, making it faster, more efficient, and more usable. At some
    point, however, the code needs to be pried from the developers’ hands and uploaded
    to the App Store so it can do what it was meant to do.


    ## Introducing Object-Oriented Programming


    As discussed in detail in the introduction, playgrounds enable you to focus on
    **object-oriented programming (OOP)** without having to cover all the Swift programming
    syntax and complex Xcode development environment in one big step. Instead, you
    can focus on learning the basic principles of OOP and using those principles quickly
    to write your first programs.


    For decades, developers have been trying to figure out a better way to develop
    code that is reusable, manageable, and easily maintained over the life of a project.
    OOP was designed to help achieve code reuse and maintainability while reducing
    the cost of software development.


    OOP can be viewed as a collection of objects in a program. Actions are performed
    on these objects to accomplish the design requirements.


    An **object** is anything that can be acted on. For example, an airplane, person,
    or screen/view on the iPad can all be objects. You may want to act on the plane
    by making the plane bank. You may want the person to walk or to change the color
    of the screen of an app on the iPad.


    Playgrounds execute your code as you complete each line, such as the one shown
    in Figure [1-4](#341013_5_En_1_Chapter.xhtml#Fig4). When you run your playground
    applications, the user can apply actions to the objects in your application. Xcode
    is an **integrated development environment** (IDE) that enables you to run your
    application from within your programming environment. You can test your applications
    on your computer first before running them on your iOS devices by running the
    apps in Xcode’s simulator, as shown in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5).


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    This sample iPhone app contains a table object to organize a list of groceries.
    Actions such as “rotate left” or “user did select row 3” can be applied to this
    object.


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg](images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg)


    Figure 1-4.


    There are multiple objects in this playground view


    Actions that are performed on objects are called **methods**. Methods manipulate
    objects to accomplish what you want your app to do. For example, for a `jet` object,
    you might have the following methods:


    ```

    goUp

    goDown

    bankLeft

    turnOnAfterburners

    lowerLandingGear

    ```


    The `table` object in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5) is actually
    called `UITableView` when you use it in a program, and it could have the following
    methods:


    ```

    numberOfRowsInSection

    cellForRowAtIndexPath

    canEditRowAtIndexPath

    commitEditingStyle

    didSelectRowAtIndexPath

    ```


    Most objects have data that describes those objects. This data is defined as *properties*
    . Each property describes the associated object in a specific way. For example,
    the `jet` object’s properties might be as follows:


    ```

    altitude = 10,000 feet

    heading = North

    speed = 500 knots

    pitch = 10 degrees

    yaw = 20 degrees

    latitude = 33.575776

    longitude = -111.875766

    ```


    For the `UITableView` object in Figure [1-5](#341013_5_En_1_Chapter.xhtml#Fig5),
    the following might be the properties:


    ```

    backgroundColor = White

    selectedRow = 3

    animateView = No

    ```


    An object’s properties can be changed at any time when your program is running,
    when the user interacts with the app, or when the programmer designs the app to
    accomplish the design requirements. The values stored in the properties of an
    object at a specific time are collectively called the **state of an object** .


    **State** is an important concept in computer programming. When teaching students
    about state, we ask them to go over to a window and find an airplane in the sky.
    We then ask them to snap their fingers and make up some of the values that the
    plane’s properties might have at that specific time. Those values might be as
    follows:


    ```

    altitude = 10,000 feet

    latitude = 33.575776

    longitude = -111.875766

    ```


    Those values represent the *state* of the object at the specific time that they
    snapped their fingers.


    After waiting a couple of minutes, we ask the students to find that same plane,
    snap their fingers again, and record the plane’s possible state at that specific
    point in time.


    The values of the properties might then be something like the following:


    ```

    altitude = 10,500 feet

    latitude = 33.575665

    longitude = -111.875777

    ```


    Notice how the state of the object changes over time.'
  trans: '

    # 完成开发周期


    现在你已经有了设计需求、用户界面设计并编写了程序，接下来该做什么呢？编程结束后，你需要确保程序符合设计需求和用户界面设计，并且不存在错误。在编程术语中，错误被称为
    *bug*（缺陷）。Bug 是编程中不希望出现的结果，必须在应用发布到 App Store 之前修复。在程序中查找 bug 并确保程序满足设计需求的过程称为
    **测试**。通常，测试工作由具备软件测试方法论经验、且未参与应用编写的人员执行。软件测试通常被称为 **质量保证**（QA）。


    ### 注


    当应用准备提交到 App Store 时，Xcode 会为文件添加 `.app` 或 `.ipa` 扩展名，例如 `appName.app`。这就是 iPhone、iPad
    和 Mac 应用被称为 **app** 的原因。本书中 *program*、*application* 和 *app* 指代相同的意思。


    在测试阶段，开发者需要与 QA 人员协作，确定应用无法按设计运行的原因。这个过程被称为 *调试*。调试要求开发者逐步检查程序，找出应用未能按设计运行的原因。图
    1-3 展示了完整的软件开发周期。


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png](img/341013_5_En_1_Fig3_HTML.png)


    图 1-3. 典型的软件开发周期


    在测试和调试过程中，常常需要修改需求（设计），以使应用对用户更易用。设计需求和用户界面修改完成后，整个周期再次开始。


    在某个时间点，所有人辛勤开发的应用必须提交到 App Store。关于周期中何时进行提交，需要考虑多种因素：


    *   开发成本

    *   预算

    *   应用的稳定性

    *   投资回报率


    开发者与管理层之间总存在权衡。开发者希望应用完美无缺，而管理层希望尽快从投资中获得收益。如果发布日期由开发者决定，应用可能永远无法提交到 App Store。开发者会不断调整应用，使其更快、更高效、更易用。然而，在某个时刻，必须将代码从开发者手中“夺走”并上传到
    App Store，以便它能实现其设计初衷。


    # 介绍面向对象编程


    如前文详细介绍，Playground 使你能够专注于**面向对象编程**（OOP），而无需一次性掌握所有 Swift 编程语法和复杂的 Xcode 开发环境。相反，你可以专注于学习
    OOP 的基本原则，并快速运用这些原则编写你的第一个程序。


    几十年来，开发者一直在探索更好的方式来开发可重用、可管理且易于在项目周期内维护的代码。OOP 旨在帮助实现代码复用和可维护性，同时降低软件开发成本。


    OOP 可以被视为程序中对象的集合。通过对这些对象执行操作来实现设计需求。


    **对象**是指任何可以被操作的东西。例如，飞机、人或者 iPad 上的屏幕/视图都可以是对象。你可能希望让飞机转弯来操控它，希望让人行走，或者改变 iPad
    上应用屏幕的颜色。


    Playground 在你完成每一行代码时就会执行它，如图 1-4 所示。当你运行 Playground 应用时，用户可以对应用中的对象施加操作。Xcode
    是一个**集成开发环境**（IDE），使你能够在编程环境中直接运行你的应用。你可以先在计算机上测试应用，然后通过 Xcode 的模拟器在 iOS 设备上运行，如图
    1-5 所示。


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg](img/341013_5_En_1_Fig5_HTML.jpg)


    图 1-5. 这个示例 iPhone 应用包含一个用于组织购物清单的表格对象。像“向左旋转”或“用户选中了第 3 行”这样的操作可以应用于该对象。


    ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg](img/341013_5_En_1_Fig4_HTML.jpg)


    图 1-4. 此 Playground 视图中有多个对象


    作用于对象上的操作被称为**方法**。方法操纵对象来实现你希望应用完成的功能。例如，对于一个 `jet`（喷气式飞机）对象，你可能有以下方法：


    ```

    goUp           // 上升

    goDown         // 下降

    bankLeft       // 左倾斜

    turnOnAfterburners  // 打开加力燃烧室

    lowerLandingGear   // 放下起落架

    ```


    图 1-5 中的 `table` 对象在程序中实际被称为 `UITableView`，它可能包含以下方法：


    ```

    numberOfRowsInSection          // 每个分区的行数

    cellForRowAtIndexPath           // 返回指定位置的单元格

    canEditRowAtIndexPath           // 是否可编辑指定行

    commitEditingStyle              // 提交编辑样式

    didSelectRowAtIndexPath         // 选中某行后的处理

    ```


    大多数对象都包含描述自身的数据。这些数据被定义为*属性*。每个属性以特定方式描述相关联的对象。例如，`jet` 对象的属性可能如下：


    ```

    altitude = 10,000 feet       // 高度 = 10,000 英尺

    heading = North              // 航向 = 北

    speed = 500 knots            // 速度 = 500 节

    pitch = 10 degrees           // 俯仰角 = 10 度

    yaw = 20 degrees             // 偏航角 = 20 度

    latitude = 33.575776         // 纬度 = 33.575776

    longitude = -111.875766      // 经度 = -111.875766

    ```


    对于图 1-5 中的 `UITableView` 对象，其属性可能如下：


    ```

    backgroundColor = White       // 背景颜色 = 白色

    selectedRow = 3               // 选中行 = 第 3 行

    animateView = No              // 是否动画视图 = 否

    ```


    当程序运行、用户与应用交互或程序员为满足设计需求而设计应用时，对象的属性可以随时更改。在特定时间点，对象属性中存储的值统称为**对象的状态**。


    **状态**是计算机编程中的一个重要概念。在教授学生有关状态的内容时，我们让他们走到窗边，在天空中找一架飞机。然后我们让他们打个响指，并列举出当时飞机属性可能具有的一些值。这些值可能如下：


    ```

    altitude = 10,000 feet       // 高度 = 10,000 英尺

    latitude = 33.575776         // 纬度 = 33.575776

    longitude = -111.875766      // 经度 = -111.875766

    ```


    这些值代表了他们打响指那一瞬间该*对象*的*状态*。


    等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录下该特定时刻飞机的可能状态。


    此时属性值可能变为如下：


    ```

    altitude = 10,500 feet       // 高度 = 10,500 英尺

    latitude = 33.575665         // 纬度 = 33.575665

    longitude = -111.875777      // 经度 = -111.875777

    ```


    注意对象的状态是如何随时间变化的。

