  ### 备注


  第 42 行的 `// MARK: - Segues` 有助于组织你的代码。


  `// MARK:` 被称为**地标**（landmark）。它是 Objective-C 中使用的 `#pragma mark` 的替代品。地标有助于在跳转栏中分割代码，让你能够快速定位到地标所指示的代码段。当你在
  `// MARK:` 后面输入内容时，Xcode 会将该地标放置在跳转栏的下拉列表中，如图 14-3 所示。如果只输入 `// MARK: -`，Xcode 会在跳转栏的下拉列表中添加一条分隔线。Swift
  还支持 `// TODO:` 和 `// FIXME:` 地标，用于注释代码，并使其显示在跳转栏中。


