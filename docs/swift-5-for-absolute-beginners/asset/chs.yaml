- "# 9. 比较数据\n\n在本章中，我们将讨论编程时最基础、最频繁的操作之一：比较数据。在图书商店示例中，如果你的客户正在查找特定书籍，你可能需要比较书名。如果客户有兴趣购买特定作者的书，你可能还需要比较作者。比较数据是开发人员执行的常见任务。你在第\
  \ 8 章学到的许多循环都需要你比较数据，以便知道代码何时应停止循环。\n\n编程中的比较数据就像使用天平一样。一边是一个值，另一边是另一个值。中间是一个运算符。运算符决定了进行何种类型的比较。运算符的例子包括“大于”、“小于”或“等于”。\n\
  \n天平两边的值通常是变量。你在第 3 章中了解了不同类型的变量。通常，不同变量的比较函数会略有不同。熟悉比较数据的函数和语法至关重要，因为这将是你的开发基础。\n\
  \n就本章而言，我们将以图书商店应用为例。该应用将允许用户登录应用、搜索图书并购买。我们将介绍比较数据的不同方式，以展示它们在此类应用中如何使用。\n\n##\
  \ 重温布尔逻辑\n\n在第 4 章中，我们介绍了布尔逻辑。由于它在编程中的普遍性，我们将在本章中再次探讨这个主题，并进行更详细的讨论。\n\n你在编程应用时最常进行的比较就是使用布尔逻辑的比较。布尔逻辑通常以\
  \ *if/then* 语句的形式出现。布尔逻辑只能有两种答案之一：*是*或*否*。以下是一些你在应用中会使用的布尔问题的好例子：\n\n- 5 是否大于 3？\n\
  - *now* 是否多于五个字母？\n- 2010 年 6 月 1 日是否晚于今天？\n\n注意，这些问题只有两种可能的答案：*是*和*否*。如果你提出的问题可能有超过这两种答案，那么为了编程，该问题需要以不同的方式措辞。\n\
  \n每个这些问题都将由一个 *if/then* 语句来表示。（例如，“如果 5 大于 3，则向用户打印一条消息。”）每个 *if* 语句都必须包含某种关系运算符。关系运算符可以是类似于“大于”或“等于”之类的。\n\
  \n要在你的程序中使用这类问题，你首先需要熟悉 Swift 语言中可用的不同关系运算符。我们将首先介绍它们。之后，你将学习不同的变量如何与这些运算符配合使用。\n\
  \n\n\n## 使用关系运算符\n\nSwift 提供了六个标准比较运算符。这些是标准的代数运算符，只有一处真正的区别：与大多数其他编程语言一样，Swift\
  \ 语言中，“等于”运算符由两个等号（`==`）组成。表 9-1 描述了可供开发人员使用的运算符。\n\n**表 9-1.** 比较运算符\n\n| 运算符 |\
  \ 描述 |\n| --- | --- |\n| `>` | 大于 |\n| `<` | 小于 |\n| `>=` | 大于或等于 |\n| `<=` | 小于或等于\
  \ |\n| `==` | 等于 |\n| `!=` | 不等于 |\n\n### 注意\n\n单个等号（`=`）用于给变量赋值。比较两个值则需要两个等号（`==`）。例如，`if(x=9)`\
  \ 会尝试将值 9 赋值给变量 `x`，但现在 Xcode 在这种情况下会报错。`if(x==9)` 则会进行比较以判断 `x` 是否等于 9。\n\n## 比较数字\n\
  \n开发人员面临的困难之一是在比较中处理不同的数据类型。本书前面讨论了不同的变量类型。你可能还记得 1 是一个整数。如果你想将整数与像 1.2 这样的浮点数进行比较，就会引发一些问题。这时，类型转换就派上用场了。\n\
  \n### 注意\n\n类型转换是将一个对象或变量从一种类型转换为另一种类型。\n\n在书店应用程序中，你需要以多种方式比较数字。例如，假设书店为单笔消费超过\
  \ 30 美元的顾客提供折扣。你需要将顾客的总消费金额加起来，然后与 30 美元进行比较。如果消费金额大于 30 美元，就需要计算折扣。请看以下示例：\n\n\
  ```\nvar discountThreshold = 30\nvar discountPercent = 0\nvar totalSpent = calculateTotalSpent()\n\
  if totalSpent > discountThreshold {\ndiscountPercent = 10\n}\n```\n\n我们来梳理一下这段代码。首先，你声明了变量（`discountThreshold`、`discountPercent`\
  \ 和 `totalSpent`）并为其赋值。注意，你无需指定这些变量的数字类型。类型会在你为其赋值时被确定。你知道 `discountThreshold` 和\
  \ `discountPercent` 不会包含小数，因此编译器会将它们设定为 `Int` 类型。在这个例子中，可以假设有一个名为 `calculateTotalSpent`\
  \ 的函数，它会计算当前订单的总消费额并以 `Int` 类型返回值。然后你只需检查总消费额是否大于折扣阈值；如果是，就设置折扣百分比。如果想让恰好消费 30 美元的顾客也享受同样的折扣，可以使用\
  \ `>=` 而不是 `>`。\n\n另一个需要数字比较的操作是循环。正如第 4 章所讨论的，循环是开发中的核心操作，许多循环类型都需要某种比较来确定何时停止。让我们看一个\
  \ `for` 循环：\n\n```\nvar numberOfBooks: Int = 50\nfor y in 0..<numberOfBooks {\n\
  doSomething()\n}\n```\n\n在这个例子中，你遍历（或称*循环*）书店中书籍的总数。`for` 语句就是有趣的事情开始发生的地方。我们来分解一下。\n\
  \n`for` 循环声明了一个初始值为 0 的变量，并且只要该变量小于 `numberOfBooks`，它就会递增。相比于 Objective-C 中 for\
  \ 循环的写法，这是一种快得多的方式。\n\n## 创建示例 Xcode 应用\n\n现在让我们创建一个 Xcode 应用程序，这样你就可以开始比较数值数据了。\n\
  \n1. 启动 Xcode 并选择 **File** ➤ **New** ➤ **Playground** 来创建一个新的 playground。本章将使用 playground，以便于你轻松实践比较操作。\n\
  \n2. 如图 9-1 所示，选择 **Blank**。点击 **Next**。\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig1_HTML.jpg](img/341013_5_En_9_Fig1_HTML.jpg)\n\
  \n   **图 9-1.** 创建新的 playground\n\n3. 在下一页，输入你的 playground 名称。这里我们使用了 **Comparison**\
  \ 作为名称，但你可以选择任何你喜欢的名字。\n\n   **注意：** Xcode Playgrounds 默认保存在用户主目录下的 `Documents`\
  \ 文件夹中。\n\n4. 新的 playground 创建完成后，你将看到标准的 Xcode 窗口。\n\n5. 在 playground 的默认代码之后添加以下代码行：\n\
  \n   ```\n   print(\"Hello World\")\n   ```\n\n   这行代码创建了一个内容为 `Hello World` 的新\
  \ `String`，并将其传递给用于调试的 `print` 函数。\n\nXcode 会自动运行你添加的新代码行，并在右侧显示结果，如图 9-2 所示。\n\n\
  ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig2_HTML.jpg](img/341013_5_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2.** Playground 输出\n\n6. 转到以 `print` 开头的代码行的开头。这一行负责打印 `Hello World` 字符串。你将通过在代码行前放置两个正斜杠（`//`）来注释掉这一行。注释代码是告诉\
  \ Xcode 在执行代码时忽略它。换句话说，被注释的代码将不会运行。\n\n7. 一旦你注释掉这行代码，该代码将不再运行，因此 \"Hello World\"\
  \ 将不再显示在 playground 中，如图 9-3 所示。\n\n   ![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig3_HTML.jpg](img/341013_5_En_9_Fig3_HTML.jpg)\n\
  \n   **图 9-3.** 注释代码后的 Playground 输出\n\n8. 我们想使用日志来输出比较结果。添加一行代码，如下所示：\n\n   ```\n\
  \   print(\"The result is \\(6 > 5 ? \"True\" : \"False\")\")\n   ```\n\n### 注意\n\
  \n上面的代码 `(6>5 ? \"True\" : \"False\")` 被称为*三元*运算。它本质上只是编写 `if/else` 语句的一种简化方式。\n\
  \n9. 将这行代码放入你的代码中。这行代码告诉你的应用程序打印 `The result is`。然后，如果 6 大于 5，它会打印 `True`；如果 5 大于\
  \ 6，它会打印 `False`。见图 9-4。\n\n因为 6 大于 5，所以会打印出 \"The result is `True`。\"\n\n![../images/341013_5_En_9_Chapter/341013_5_En_9_Fig4_HTML.jpg](img/341013_5_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4.** 三元输出\n\n你可以修改这行代码，来测试我们在本章已经讨论过的任何比较，或者你稍后将执行的任何示例。\n\n让我们试试另一个示例。\n\
  \n```\nvar i = 5\nvar y = 6\nprint(\"The result is \\(y > i ? \"True\" : \"False\"\
  )\")\n```\n\n在这个示例中，你创建了一个变量并将其值赋为 5。然后你创建了另一个变量并将其值赋为 6。接着你修改了 `print` 示例，使用变量\
  \ `i` 和 `y` 进行比较，而不是使用实际数字。\n\n### 注意\n\n在真实的 Xcode 项目中使用此代码时，你可能会收到编译器警告。编译器会告诉你三元运算符的\
  \ false 部分永远不会被执行。编译器在你输入代码时就能查看这些值，并知道该比较总会为 true。\n\n你现在将探索其他类型的比较，然后你会回到这个应用程序并测试其中的一些。\n\
  \n## 使用布尔表达式\n\n布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是 true 还是 false。示例如下：\n\n```\nvar\
  \ j = 5\nif  j > 0 {\nsomeCode()\n}\n```\n\n`if` 语句的计算结果总是 `true`，因为变量 `j` 大于零。因此，程序会运行\
  \ `someCode()` 方法。\n\n\n\n### 注意\n\n在 Swift 中，如果变量是可选的，因此不能保证被赋值，你应该在变量声明后使用问号。例如，`var\
  \ j` 变为 `var j: Int?`。\n\n如果你将 `j` 的值改为 `0`，该语句将求值为 `false`，因为此时 `j` 为 `0`。\n\n\
  ```swift\nvar j = 0\nif j > 0 {\n    someCode()\n}\n```\n\n在布尔表达式前放置感叹号会将其值变为相反值（`false`\
  \ 变为 `true`，`true` 变为 `false`）。\n\n```swift\nvar j = 0\nif !(j > 0) {\n    someCode()\n\
  }\n```\n\n第二行现在询问“如果不满足 `j>0`”，在这种情况下，由于 `j` 等于 `0`，结果为 `true`。这是一个使用整数充当布尔变量的示例。如前所述，Swift\
  \ 也有名为 `Bool` 的变量，它只有两个可能的值：`true` 或 `false`。\n\n### 注意\n\n与许多其他编程语言一样，Swift 在给布尔变量赋值时也使用\
  \ `true` 或 `false`。\n\n让我们看一个与书店相关的示例。假设你有一个常客俱乐部，所有会员购书均可享受 15% 的折扣。这很容易检查。你只需将变量\
  \ `clubMember` 设置为 `true`（如果该人是会员），否则设置为 `false`。以下代码将仅为俱乐部会员应用折扣：\n\n```swift\n\
  var discountPercent = 0\nvar clubMember = false\nif clubMember {\n    discountPercent\
  \ = 15\n}\n```\n\n### 比较字符串\n\n对于大多数 C 语言来说，字符串是一种复杂的数据类型。在 ANSI C（或标准 C）中，字符串只是一个字符数组。Objective-C\
  \ 进一步推动了字符串的发展，将其变为一个名为 `NSString` 的对象。Swift 则更进一步，使 `String` 类更易于使用。处理对象时，你可以使用更多的属性和方法。幸运的是，`String`\
  \ 有许多用于比较数据的方法，这让你的工作更加轻松。\n\n我们来看一个示例。这里，你在比较密码，以确定是否允许用户登录：\n\n```swift\nvar enteredPassword\
  \ = \"Duck\"\nvar myPassword = \"duck\"\nvar continueLogin = false\nif enteredPassword\
  \ == myPassword {\n    continueLogin = true\n}\n```\n\n第一行声明了一个 `String` 并将其值设置为\
  \ `Duck`。下一行声明了另一个 `String` 并将其值设置为 `duck`。在你的实际代码中，你需要从用户处获取 `enteredPassword`\
  \ 字符串。\n\n接下来是实际执行工作的代码部分。你只需比较这些字符串是否彼此相等。由于 `enteredPassword` 中的大写字母“D”与 `myPassword`\
  \ 中的小写字母“d”不同，该示例代码的结果将始终为 `false`。\n\n你可能还需要对字符串执行许多其他不同的比较。例如，你可能想检查某个字符串的长度。这很容易实现。\n\
  \n```swift\nvar enteredPassword = \"Duck\"\nvar myPassword = \"duck\"\nvar continueLogin\
  \ = false\nif enteredPassword.count > 5 {\n    continueLogin = true\n}\n```\n\n\
  ### 注意\n\n`count` 是一个可用于计算字符串、数组和字典的属性。\n\n此代码会检查输入的密码是否超过五个字符。\n\n在其他情况下，你需要在字符串内搜索某些数据。幸运的是，Swift\
  \ 让这变得简单。`String` 提供了一个名为 `contains` 的函数，它允许你在一个字符串中搜索另一个字符串。函数 `contains` 只接受一个参数，即你要搜索的字符串。\n\
  \n```swift\nvar searchTitle: String\nvar bookTitle: String\nsearchTitle = \"Sea\"\
  \nbookTitle = \"2000 Leagues Under the Sea\"\nif bookTitle.contains(searchTitle)\
  \ {\n    addToResults()\n}\n```\n\n此代码的起始部分与你见过的其他示例类似。我们创建了两个变量。然后，这个示例获取一个搜索词，并检查书名中是否包含该搜索词。如果包含，就将该书添加到结果中。这可以进行调整，以便用户搜索书名、作者甚至描述中的特定词汇。\n\
  \n有关 `String` 支持的方法的完整列表，请参阅 [`https://swift.org/documentation/#the-swift-programming-language`](https://swift.org/documentation/%2523the-swift-programming-language)\
  \ 处的 Apple 文档。\n\n## 使用 switch 语句\n\n到目前为止，你已经看到了几个通过简单地使用 `if` 语句来比较数据的示例。\n\n\
  ```swift\nif someValue == SOME_CONSTANT {\n    ...\n} else if someValue == SOME_OTHER_CONSTANT\
  \ {\n    ...\n} else if someValue == YET_SOME_OTHER_CONSTANT {\n    ...\n}\n```\n\
  \n如果你需要将一个变量与多个常量值进行比较，可以使用另一种方法来简化比较代码：`switch` 语句。\n\n### 注意\n\n在 Objective-C\
  \ 中，你只能在 `switch` 语句中使用值进行比较。Swift 允许开发者在 `switch` 语句的使用上拥有更多自由。使用 Swift，开发者现在可以比较大多数对象，包括自定义对象。\n\
  \n`switch` 语句允许你将一个或多个值与另一个变量进行比较。\n\n```swift\nvar customerType = \"Repeat\"\n\
  switch customerType {     // switch 语句后面跟着一个左大括号\ncase \"Repeat\":           //\
  \ 等同于 if (customerType == \"Repeat\")\n    ...                  // 在 case 后面调用函数并放置其他语句。\n\
  \    ...\ncase \"New\":\n    ...\n    ...\ncase \"Seasonal\":\n    ...\n    ...\n\
  default:                 // Swift 要求 switch 语句覆盖所有可能性。\n}                      \
  \  // switch 语句的结束处\n```\n\n`switch` 语句功能强大，它简化并精简了与多个不同值的比较过程。\n\n在 Swift 中，`switch`\
  \ 语句是一个强大的语句，可用于简化重复的 `if/else` 语句。\n\n\n\n### 比较日期\n\n在任何编程语言中，日期都是一种相当复杂的变量类型，而不幸的是，根据你编写的应用程序类型，它们又很常见。Swift\
  \ 4 拥有自己的原生 `Date` 类型。Swift 的 `Date` 类提供了许多便捷的方法，使得比较日期变得简单。我们将重点介绍 `compare` 函数。`compare`\
  \ 函数返回一个 `ComparisonResult`，它有三个可能的值：`orderedSame`、`orderedDescending` 和 `orderedAscending`。\n\
  \n```\n// 今天的日期\nlet today: Date = Date()\n// 促销日期 = 明天\nlet timeToAdd: TimeInterval\
  \ = 60∗60∗24\nlet saleDate: Date = today.addingTimeInterval(timeToAdd)\nvar saleStarted\
  \ = false\nlet result: ComparisonResult  = today.compare(saleDate)\nswitch result\
  \ {\ncase ComparisonResult.orderedAscending:\n// 促销日期在未来\nsaleStarted = false\n\
  case ComparisonResult.orderedDescending:\n// 促销开始日期已过去，所以促销正在进行\nsaleStarted = true\n\
  default:\n// 促销开始日期就是现在\nsaleStarted = true\n}\n```\n\n仅仅为了比较一些日期，这看起来可能做了很多工作。让我们逐行分析代码，看看是否能理解它的含义。\n\
  \n```\nlet today: Date = Date()\nlet timeToAdd: TimeInterval = 60∗60∗24\nlet saleDate:\
  \ Date = today.addingTimeInterval(timeToAdd)\n```\n\n在这里，你声明了两个不同的 `Date` 对象。第一个名为\
  \ `today`，使用系统日期或你的设备日期进行初始化。在创建第二个日期之前，你需要为第一个日期添加一些时间。通过创建一个 `TimeInterval` 来实现这一点。这是一个以秒为单位的数值。要增加一天，你需要添加\
  \ `60*60*24`。第二个日期名为 `saleDate`，使用未来的某个日期进行初始化。你将使用这个日期来判断促销是否已经开始。我们不会详细讨论 `Date`\
  \ 对象的初始化。\n\n使用 `Date` 对象的 `compare` 函数的结果是一个 `ComparisonResult`。你需要声明一个 `ComparisonResult`\
  \ 来捕获 `compare` 函数的输出。\n\n```\nlet result = today.compare(saleDate)\n```\n\n这一行简单地将两个日期进行比较，并将结果\
  \ `ComparisonResult` 放入名为 `result` 的常量中。\n\n```\nswitch result {\ncase ComparisonResult.orderedAscending:\n\
  // 促销日期在未来\nsaleStarted = false\ncase ComparisonResult.orderedDescending:\n// 促销开始日期已过去，所以促销正在进行\n\
  saleStarted = true\ndefault:\n// 促销开始日期就是现在\nsaleStarted = true\n}\n```\n\n现在你需要查明变量\
  \ `result` 中的值是什么。为此，你执行一条 `switch` 语句，将结果与 `ComparisonResult` 的三种不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。你将变量\
  \ `saleStarted` 设置为 `false`。下一行判断促销日期是否小于今天。如果是，则促销已开始，你将 `saleStarted` 变量设置为 `true`。下一行是\
  \ `default`。这捕获了所有其他选项。不过，你知道唯一的其他选项是 `orderedSame`。这意味着两个日期和时间相同，因此促销刚刚开始。\n\n\
  还有其他方法可以用于比较 `Date` 对象。每种方法在特定任务中效率更高。我们选择了 `compare` 方法，因为它能满足你大多数基本的日期比较需求。\n\n\
  ### 注意\n\n请记住，`Date` 既包含日期也包含时间。这会影响你的日期比较，因为它比较的不仅是日期，还有时间。\n\n### 组合比较\n\n如同第\
  \ 4 章所讨论的，有时你需要比单一比较更复杂的条件。这时逻辑运算符就派上了用场。逻辑运算符允许你检查多个条件。例如，如果你为既是读书俱乐部会员*且*消费超过\
  \ 30 美元的人提供特别折扣，你可以编写一条语句来检查。\n\n```\nvar totalSpent = 31\nvar discountThreshhold\
  \ = 30\nvar discountPercent = 0\nvar clubMember = true\nif totalSpent > discountThreshhold\
  \ && clubMember {\ndiscountPercent = 15\n}\n```\n\n我们组合了前面展示的两个示例。新的比较行解读如下：“如果\
  \ `totalSpent` 大于 `discountThreshold` **且** `clubMember` 为 `true`，则将 `discountPercent`\
  \ 设置为 15。”要使此条件返回 `true`，两个条件都必须为真。你可以使用 `||` 替代 `&&` 来表示“或”。你可以将上一行代码改为：\n\n```\n\
  if totalSpent > discountThreshhold || clubMember  {\ndiscountPercent = 15\n}\n```\n\
  \n现在这一行解读如下：“如果 `totalSpent` 大于 `discountThreshold` ***或*** `clubMember` 为 `true`，则将折扣百分比设置为\
  \ 15。”如果任一选项为 `true`，此条件将返回 `true`。\n\n你可以继续使用逻辑运算符，根据需要组合任意多个比较。在某些情况下，你可能需要使用括号对比较进行分组。\n\
  \n## 总结\n\n本章到此结束！以下是涵盖主题的总结：\n\n*   *比较*：比较数据是任何应用程序中不可或缺的一部分。\n*   *关系运算符*：你了解了六种标准关系运算符及其用法。\n\
  *   *数字*：数字是最容易比较的信息类型。你学习了如何在程序中比较数字。\n*   *示例*：你创建了一个示例 playground，可以在其中测试你的比较并确保逻辑正确。然后你学习了如何修改\
  \ playground 以添加不同类型的比较。\n*   *布尔值*：你学习了如何检查布尔值。\n*   *字符串*：你了解了字符串与之前测试的其他信息类型的行为有何不同。\n\
  *   *日期*：你了解到比较日期可能相当困难，并且必须小心以确保得到你所期望的结果。\n\n### 练习\n\n*   修改示例 playground，比较一些字符串信息。\n\
  *   编写一个 Swift 应用程序，判断以下年份是否为闰年：1800、1801、1899、1900、2000、2001、2003 和 2010。输出应按照以下格式写入控制台：`公元\
  \ 2000 年是闰年` 或 `公元 2001 年不是闰年`。判断年份是否为闰年的信息，请参见 [`http://en.wikipedia.org/wiki/Leap_year`](http://en.wikipedia.org/wiki/Leap_year)。\n\
  \n### 创建用户界面\n\nInterface Builder 使 iOS 开发者能够使用强大的图形用户界面轻松创建其用户界面。它允许通过简单地将对象从 Interface\
  \ Builder 的库中拖拽到编辑器来构建用户界面。\n\nInterface Builder 将你的用户界面设计存储在一个或多个资源文件中，这些文件称为故事板。这些资源文件包含界面对象、它们的属性以及它们之间的关系。\n\
  \n要构建用户界面，只需将对象从 Interface Builder 的对象库面板拖拽到你的视图或场景上。动作（Actions）和出口（Outlets）是 Interface\
  \ Builder 的两个关键组件，有助于简化开发流程。\n\n你的对象会在视图中触发动作，而这些动作连接到应用代码中的方法。出口在你的 `.swift` 文件中声明，并作为属性连接到特定的控件。见图\
  \ 10-1。\n\n### 注意\n\nInterface Builder 曾经是一个独立的应用程序，开发者用来设计他们的用户界面。从 Xcode 4.0 开始，Interface\
  \ Builder 已集成到 Xcode 中。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig1_HTML.jpg](img/341013_5_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1. Interface Builder\n\n\n\n## 理解 Interface Builder\n\nInterface Builder\
  \ 将用户界面文件保存为一个包，其中包含应用中使用的界面对象和关系。这些包最初的文件扩展名为 `\".nib\"`。Interface Builder 3.0\
  \ 版本采用了一种新的 XML 文件格式，文件扩展名也随之变为 `\".xib\"`。然而，开发者们仍然称这些文件为 *nib* 文件。后来 Apple 引入了故事板（storyboards）。故事板使您可以将所有视图放在一个扩展名为\
  \ `\".storyboard\"` 的文件中。\n\n与大多数其他图形用户界面应用程序不同，XIB 和故事板常被称为*冻干*文件，因为它们包含已归档的对象本身，并且已准备好运行。\n\
  \n这种 XML 文件格式便于与版本控制系统（如 Subversion 和 Git）配合进行存储。\n\n在下一节中，我们将讨论一种名为“模型-视图-控制器”的应用设计模式。这种设计模式使开发者能够更轻松地维护代码，并在应用的整个生命周期中重用对象。\n\
  \n## 模型-视图-控制器模式\n\n模型-视图-控制器（MVC）是在 iOS 开发中最流行的架构模式，学习它将会让您的开发者生涯轻松得多。\n\n架构模式描述了开发者可以在其代码中使用的、针对软件设计问题的解决方案。MVC\
  \ 模式并非 iOS 开发者独有；许多集成开发环境（IDE）的制造商都在采用它，包括那些运行在 Windows 和 Linux 平台上的 IDE。\n\n对于企业而言，软件开发被认为是一项昂贵且充满风险的投资。通常情况下，应用开发所花费的时间超出预期、预算超支，并且无法按承诺运行。面向对象编程（OOP）曾引起大量炒作，并给人们留下一种印象：只要采用其方法论，公司就能节省成本，这主要是因为对象的可重用性和代码更易于维护。但起初，这种情况并未发生。\n\
  \n当工程师们审视 OOP 为何未能达到这些预期时，他们发现了开发者在设计对象方面的一个关键缺陷：开发者经常将对象混在一起，导致随着应用程序的成熟、代码迁移到不同平台或硬件显示发生变化，代码变得难以维护。\n\
  \n对象的设计往往会导致以下任何一项发生变化时，很难隔离受到影响的对象：\n\n*   业务规则\n*   用户界面\n*   客户端-服务器或基于互联网的通信\n\
  \n对象可以被分解为三个与任务相关的类别。开发者的责任是确保每个类别都能使其对象不越界到其他类别。\n\n随着对象被归入这些类别，应用程序可以随着时间的推移更容易地被开发和维护。以下是一个\
  \ iPhone 银行应用程序中的对象及其关联的 MVC 类别示例：\n\n**模型**\n\n*   账户余额\n*   用户加密\n*   账户转账\n*\
  \   账户登录\n\n**视图**\n\n*   账户余额表格单元格\n*   账户登录转圈控件\n\n**控制器**\n\n*   账户余额视图控制器\n\
  *   账户转账视图控制器\n*   登录视图控制器\n\n在 MVC 设计模式中，记住并对对象进行分类的最简单方法如下：\n\n*   *模型*：代表现实世界的独特业务或应用规则及代码。数据驻留于此。\n\
  *   *视图*：独特的用户界面代码。\n*   *控制器*：任何控制模型或视图对象或与之通信的东西。\n\n图 10-2 展示了 MVC 范式。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig2_HTML.jpg](img/341013_5_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. MVC 范式\n\n无论是 `Xcode` 还是 `Interface Builder`，都不会强制开发者使用 MVC 设计模式。是否以这种方式组织对象以采用此设计模式，完全取决于开发者。\n\
  \n值得一提的是，Apple 非常推崇 MVC 设计模式，其所有框架都旨在 MVC 环境下工作。这意味着，如果您也采用 MVC 设计模式，使用 Apple 的类将会容易得多。如果您不这样做，那您就是在逆水行舟。\n\
  \n## 人机界面指南\n\n在您过于兴奋并开始为您的应用设计动态用户界面之前，您需要了解一些基本规则。Apple 通过 iOS 开发出了世界上最先进的操作系统之一。此外，Apple\
  \ 的产品以其直观和用户友好而闻名。Apple 希望用户在不同的应用之间拥有同样的体验。\n\n为了确保一致的用户体验，Apple 为开发者提供了关于应用外观和感觉的指南。这套指南称为“人机界面指南”（HIG），适用于\
  \ iOS、macOS、watchOS 和 tvOS。您可以在 `https://developer.apple.com/design/human-interface-guidelines/`\
  \ 查看这些指南，如图 10-3 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig3_HTML.jpg](img/341013_5_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. Apple 的人机界面指南\n\n### 注意\n\nApple 的 HIG 不仅仅是建议或提议。Apple 对此非常重视。虽然 HIG 没有描述如何在代码中实现您的用户界面设计，但它对于理解实现视图和控件的正确方法非常有帮助。\n\
  \n以下是一些导致应用在 Apple App Store 被拒绝的主要原因：\n\n*   应用崩溃。\n*   应用违反了 HIG。\n*   应用使用了 Apple\
  \ 的私有 API。\n*   应用的功能与 App Store 上宣传的不符。\n\n### 注意\n\n您可以在开发应用之前阅读、学习并遵循 HIG；也可以在应用被\
  \ Apple 拒绝后，不得不重写部分或全部代码时，再阅读、学习并遵循 HIG。无论哪种方式，所有 iOS 开发者最终都会熟悉 HIG。\n\n许多新的 iOS\
  \ 开发者是通过惨痛教训才认识到这一点的，但如果您从一开始就遵循 HIG，您的 iOS 开发体验将会愉快得多。\n\n\n\n## 使用 Interface Builder\
  \ 创建示例 iPhone 应用\n\n让我们开始构建一个生成并显示随机数的 iPhone 应用，如图 10-4 所示。该应用与你之前在第四章中创建的应用类似，但你会看到，在添加了\
  \ iOS 用户界面（UI）后，这个应用变得有趣多了。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig4_HTML.jpg](img/341013_5_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 完成的 iOS 随机数生成器应用\n\n1.  打开 Xcode，选择“Create a new Xcode project”。确保你选择了\
  \ **iOS** 下的“Single View App”，然后点击“Next”，如图 10-5 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig5_HTML.jpg](img/341013_5_En_10_Fig5_HTML.jpg)\n\
  \n    图 10-5. 基于 Single View App 模板创建 iPhone 应用\n\n2.  将你的项目命名为 `RandomNumber`，语言选择\
  \ **Swift**，然后点击“Next”创建项目，如图 10-6 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig6_HTML.jpg](img/341013_5_En_10_Fig6_HTML.jpg)\n\
  \n    图 10-6. 命名你的新 Swift 项目\n\n3.  你的项目文件和设置将被创建并显示出来，如图 10-7 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig7_HTML.jpg](img/341013_5_En_10_Fig7_HTML.jpg)\n\
  \n    图 10-7. 源文件\n\n尽管这个项目中只有一个控制器，但在开发初期就创建好你的 MVC 分组仍是一个良好的编程实践。这有助于提醒你遵循 MVC\
  \ 范式，避免将所有代码不必要地塞进你的控制器中。\n\n1.  右键点击 `RandomNumber` 文件夹，然后选择“New Group”，如图 10-8\
  \ 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig8_HTML.jpg](img/341013_5_En_10_Fig8_HTML.jpg)\n\
  \n    图 10-8. 创建新分组\n\n2.  创建一个 Models 分组、一个 Views 分组和一个 Controllers 分组。\n\n3. \
  \ 将 `ViewController.swift` 文件拖到 Controllers 分组。将 `Main.storyboard` 和 `LaunchScreen.storyboard`\
  \ 文件拖到 Views 分组。拥有这些分组有助于在开发代码时提醒你遵循 MVC 设计模式，并防止你将所有代码都放在控制器中，如图 10-9 所示。\n\n \
  \   ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig9_HTML.jpg](img/341013_5_En_10_Fig9_HTML.jpg)\n\
  \n    图 10-9. 已整理好控制器和故事板文件的 MVC 分组\n\n4.  点击 `Main.storyboard` 文件以打开 Interface\
  \ Builder。\n\n## 使用 Interface Builder\n\n启动 Interface Builder 并开始处理视图的最常见方法是点击相关联的故事板文件，如图\
  \ 10-10 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig10_HTML.jpg](img/341013_5_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. 工作区窗口中的 Interface Builder\n\n当 Interface Builder 打开时，你可以看到画布上显示的场景。现在你可以设计你的用户界面了。首先，你需要了解\
  \ Interface Builder 中的一些子窗口。\n\n## 文档大纲\n\n故事板显示了视图包含的所有对象。以下是这些对象的一些示例：\n\n*  \
  \ 按钮\n*   标签\n*   文本字段\n*   Web 视图\n*   地图视图\n*   选择器视图\n*   表格视图\n\n### 注意\n\n\
  你可以展开文档大纲的宽度，以查看所有对象的详细列表，如图 10-10 所示。为了给画布腾出更多空间，你可以缩小或隐藏文件导航器。\n\n## 对象库\n\n对象库是你发挥创造力的地方。它是一个对象的大杂烩，你可以将这些对象拖放到视图中。\n\
  \n*   点击对象库按钮会显示“对象库弹出窗口”。通过调整弹出窗口的大小，对象库弹出窗口可以放大或缩小，如图 10-11 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig11_HTML.jpg](img/341013_5_En_10_Fig11_HTML.jpg)\n\
  \n    图 10-11. 展开对象库弹出窗口以查看更多控件\n\n点击图 10-12 中的“图标视图”按钮，可以让你以更紧凑的方式查看对象库的内容，如图 10-13\
  \ 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig12_HTML.jpg](img/341013_5_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12. 对象库图标视图按钮\n\n对于 Cocoa Touch 对象，库中包含以下内容：\n\n*   控件\n*   数据视图\n*   手势识别器\n\
  *   对象和控制器\n*   窗口和栏\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig13_HTML.jpg](img/341013_5_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13. 对象库中的各种 Cocoa Touch 对象\n\n## 检查器面板和选择器栏\n\n检查器面板允许你更改控件的属性，使你的对象听从你的指令。检查器面板顶部有六个标签，如图\
  \ 10-14 所示：\n\n*   文件检查器\n*   快速帮助检查器\n*   标识检查器\n*   属性检查器\n*   大小检查器\n*   连接检查器\n\
  \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig14_HTML.jpg](img/341013_5_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14. 属性检查器和选择器栏\n\n## 创建视图\n\n随机数生成器的视图中将包含三个对象：一个标签和两个按钮。一个按钮用于生成种子，另一个按钮用于生成随机数，标签则用于显示应用生成的随机数。\n\
  \n1.  在对象库中滚动，将两个按钮（Button）和一个标签（Label）拖到视图控制器场景中，如图 10-15 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig15_HTML.jpg](img/341013_5_En_10_Fig15_HTML.jpg)\n\
  \n    图 10-15. 在视图中放置对象\n\n2.  双击第一个按钮，将其标题改为 \"Seed Random Number Generator\"，然后双击第二个按钮，将其标题改为\
  \ \"Generate Random Number\"，如图 10-16 所示。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig16_HTML.jpg](img/341013_5_En_10_Fig16_HTML.jpg)\n\
  \n    图 10-16. 重命名按钮标题\n\n现在，你将用到 Xcode 的一个强大功能。你可以快速轻松地将你的输出口（outlet）和动作（action）连接到代码。实际上，Xcode\
  \ 更进一步；它会为你创建部分代码。你只需拖放即可。\n\n1.  点击屏幕右上角的“助理编辑器”图标。这将显示故事板中选定视图关联的 `.swift` 文件，如图\
  \ 10-17 所示。\n\n### 注意\n\n如果点击助理编辑器图标后没有显示正确的关联 `.swift` 文件，请确保你已经选中并高亮了该视图。同时，必须在助理编辑器的跳转栏中选择“Automatic”。\n\
  \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig17_HTML.jpg](img/341013_5_En_10_Fig17_HTML.jpg)\n\
  \n图 10-17. 使用助理编辑器显示 `.swift` 文件\n\n\n\n### 使用 Outlet\n\n现在，你可以通过创建 Outlet 将标签连接到代码。\n\
  \n1.  按住 Control 键，从视图中的标签拖拽到类文件的顶部，如图 10-18 所示。这是在键盘上按住 Control 键的同时，用鼠标点击并拖拽。你也可以右键点击并拖拽。\n\
  \n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig18_HTML.jpg](img/341013_5_En_10_Fig18_HTML.jpg)\n\
  \n    **图 10-18.** Control-拖拽以创建 Outlet\n\n2.  将会弹出一个窗口，让你可以命名并指定 Outlet 的类型。\n\n\
  3.  将 Outlet 命名为 `randomNumberLabel`，如图 10-19 所示，然后点击 **Connect** 按钮。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig19_HTML.jpg](img/341013_5_En_10_Fig19_HTML.jpg)\n\
  \n    **图 10-19.** `randomNumberLabel` Outlet 的弹出窗口\n\nOutlet 的代码已创建，并且该 Outlet\
  \ 现在已连接到 `Main.storyboard` 文件中的 `Label` 对象。第 12 行旁边的阴影圆圈表示该 Outlet 已连接到 `Main.storyboard`\
  \ 文件中的一个对象，如图 10-20 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig20_HTML.jpg](img/341013_5_En_10_Fig20_HTML.jpg)\n\
  \n**图 10-20.** 已生成并连接到 `Label` 对象的 Outlet 属性代码\n\n这里有一个你可能不熟悉的声明叫做 `IBOutlet`，通常简称为\
  \ *outlet*。Outlet 向你的控制器表明，该属性已连接到 Interface Builder 中的一个对象。`IBOutlet` 将使 Interface\
  \ Builder 能够看到该 Outlet，并允许你将属性连接到 Interface Builder 中的对象。\n\n借用墙上电源插座的类比，这些属性 Outlet\
  \ 连接到对象上。使用 Interface Builder，你可以将这些属性连接到合适的对象。当你更改已连接 Outlet 的属性时，它所连接的对象将自动发生改变。\n\
  \n### 使用 Action\n\n用户界面对象事件，也称为 *action*，可以触发方法。\n\n现在，你需要将对象操作连接到按钮上。\n\n1.  按住\
  \ Control 键，从“种子随机数生成器”按钮拖拽到类文件的底部。按照图 10-21 所示完成弹出窗口的填写，然后点击 **Connect** 按钮。确保连接类型是\
  \ Action，而不是 Outlet。\n\n    ![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig21_HTML.jpg](img/341013_5_En_10_Fig21_HTML.jpg)\n\
  \n    **图 10-21.** 完成种子方法的弹出窗口\n\n2.  对“生成随机数”按钮重复上述步骤，在 `ViewController` 类中创建一个\
  \ `generateAction` 方法。\n\n### 类\n\n剩下的工作就是为控制器的 `.swift` 文件中的 Outlet 和 Action 补全代码。\n\
  \n打开 `ViewController.swift` 文件，补全 `seedAction` 和 `generateAction` 方法，如图 10-22 所示。\n\
  \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig22_HTML.jpg](img/341013_5_En_10_Fig22_HTML.jpg)\n\
  \n**图 10-22.** 补全后的 `seedAction` 和 `generateAction` 方法\n\n有些代码需要你进一步研究。下面这行为随机数生成器设定了种子，这样每次运行应用程序时都能获得一个随机数。虽然有更简单的方法，但就本节而言，你只需要了解\
  \ Action 和 Outlet 是如何工作的。\n\n```\nsrandom(UInt32(time(nil)))\n```\n\n在下面的代码中，属性\
  \ `text` 设置了视图中的 `UILabel` 值。你在 Interface Builder 中从 Outlet 到 `Label` 对象建立的连接替你完成了所有工作。\n\
  \n```\nrandomNumberLabel.text\n```\n\n现在只需要再做几件事就能完成你的应用程序了。选择 `Main.storyboard`\
  \ 文件，然后选择你的视图控制器场景。点击并拖拽鼠标，选中视图中的两个按钮和标签，如图 10-23 所示。然后点击 **Embed In** 按钮，选择 **Stack\
  \ View**，将这三个元素组合在一起。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig23_HTML.jpg](img/341013_5_En_10_Fig23_HTML.jpg)\n\
  \n**图 10-23.** 嵌入 Stack View\n\n最后，选择该栈视图，点击 **Align** 按钮，勾选 **Horizontally in Container**\
  \ 和 **Vertically in Container** 两个复选框，然后点击 **Add 2 Constraints** 按钮，如图 10-24 所示。这将使你的控件在视图中正确居中。\n\
  \n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig24_HTML.jpg](img/341013_5_En_10_Fig24_HTML.jpg)\n\
  \n**图 10-24.** 居中 Stack View\n\n大功告成！\n\n要在 iPhone 模拟器中运行你的 iPhone 应用，请点击 **Play**\
  \ 按钮。你的应用应该会在模拟器中启动，如图 10-25 所示。\n\n![../images/341013_5_En_10_Chapter/341013_5_En_10_Fig25_HTML.jpg](img/341013_5_En_10_Fig25_HTML.jpg)\n\
  \n**图 10-25.** 在 iOS 模拟器中运行的完整随机数生成器应用\n\n要生成随机数，请点击 **Generate Random Number**\
  \ 按钮。\n\n## 总结\n\n干得好！Interface Builder 在创建用户界面时为你节省了大量时间。你的应用程序中拥有了一套强大的对象可供使用，并且只需要编写极少的代码。\n\
  \nInterface Builder 处理了许多通常需要你自己处理的细节。\n\n你应该熟悉以下术语：\n\n*   Storyboard 和 XIB 文件\n\
  *   模型-视图-控制器\n*   架构模式\n*   人机界面指南 (HIG)\n*   Outlet\n*   Action\n\n### 练习\n\n\
  *   扩展随机数生成器应用，使其在应用启动时在 `Label` 对象中显示日期和时间。\n*   在显示日期和时间标签后，添加一个按钮，用于用新时间更新日期和时间标签。\n\
  \n"
- "# 11. 存储信息\n\n作为一名开发者，你会遇到许多需要存储数据的不同场景。用户会期望你的应用在每次启动时记住偏好设置和其他信息。之前的章节讨论了 `BookStore`\
  \ 应用。对于这个应用，用户会期望你的应用记住书店里的所有书籍。你的应用需要一种方法来存储这些信息、检索它们，并可能对这些数据进行搜索和排序。处理数据有时可能会很困难。幸运的是，Apple\
  \ 提供了让这个过程更简便的方法和框架。\n\n本章讨论需要存储数据的两种不同格式。它讨论了如何为 iOS 设备保存偏好文件，以及如何在你的应用程序中使用 SQLite\
  \ 数据库来存储和检索数据。\n\n\n\n## 存储注意事项\n\nMac 和 iPhone 在存储方面存在一些主要差异，这些差异会影响你处理数据的方式。我们首先讨论\
  \ Mac 以及你需要如何为其进行开发。\n\n在 Mac 上，默认情况下，应用程序存储在 `Applications` 文件夹中。每个用户都有自己的个人文件夹，用于存储与该用户相关的偏好设置和信息。并非所有用户都有权限写入\
  \ `Applications` 文件夹或应用程序包本身。\n\n在 iPhone 和 iPad 上，开发者无需处理不同用户的问题。每个使用 iPhone 的人都拥有相同的权限和相同的文件夹。不过，iPhone\
  \ 还有其他一些因素需要考虑。iOS 设备上的每个应用程序都位于自己的沙盒中。这意味着一个应用写入的文件只能被该应用本身查看和使用。这为 iPhone、iPad、Apple\
  \ TV 和 Apple Watch 提供了更安全的环境，但也带来了处理数据存储方式的某些变化。\n\n### 警告\n\n敏感数据不应在未进行额外加密的情况下存储在偏好设置文件或数据库中。幸运的是，Apple\
  \ 提供了一种存储敏感信息的方法，称为钥匙串。在钥匙串中保护数据超出了本书的讨论范围。\n\n### 说明\n\n对于 macOS，偏好设置文件名为 `com.yourcompany.applicationname.plist`，位于\
  \ `/Users/username/Library/Preferences` 文件夹中。在 iOS 上，偏好设置文件位于应用程序容器内的 `/Library/Preferences`\
  \ 文件夹中。\n\n要写入偏好设置，你需要创建一个 `UserDefaults` 对象。这通过以下代码行完成：\n\n```\nvar prefs: UserDefaults\
  \ = UserDefaults.standard\n```\n\n这会实例化 `prefs` 对象，以便你使用它来设置偏好值。接下来，你需要为要保存的值设置偏好键。本章将使用\
  \ `BookStore` 应用示例来演示具体说明。在经营书店时，你可能希望将用户名保存在偏好设置中。你还可能希望保存诸如默认图书类别或最近搜索之类的信息。偏好设置文件是存储这类信息的绝佳位置，因为这类信息只需要在应用程序启动时读取。\n\
  \n此外，在 iOS 上，通常需要保存当前状态。如果某人正在使用你的应用，然后接到一个电话，你希望能在他们通话结束后，将他们带回应用中之前所处的确切位置。随着多任务处理的实现，这已经不那么必要了，但如果你的应用能记住他们上次在使用时正在做什么，用户仍然会对此表示赞赏。\n\
  \n一旦你实例化了对象，就可以调用 `set(_:forKey:)` 来设置一个对象。如果你想要保存用户名 `sherlock.holmes`，你可以调用以下代码行：\n\
  \n```\nprefs.set(\"sherlock.holmes\", forKey: \"username\")\n```\n\n过一段时间后，你的应用会自动将更改写入偏好设置文件。你可以通过调用\
  \ `synchronize` 函数来强制应用保存偏好设置，但这仅在你无法等待下一个同步间隔时使用，例如你的应用即将退出时。要调用 `synchronize`\
  \ 函数，你可以编写以下代码行：\n\n```\nprefs.synchronize()\n```\n\n只需三行代码，你就能创建一个偏好对象，设置一个偏好值，并写入偏好设置文件。这是一个简单且干净的过程。以下是所有代码：\n\
  \n```\nlet prefs: UserDefaults = UserDefaults.standard\nprefs.set(\"sherlock.holmes\"\
  , forKey: \"username\")\nprefs.set(10, forKey: \"booksInList\")\nprefs.synchronize()\n\
  ```\n\n## 数据库\n\n你已经学会了如何存储一些零散信息并在之后检索它们。如果你有更多需要存储的信息怎么办？如果你需要在这些信息中进行搜索或对其进行某种排序怎么办？这类情况就需要使用数据库。\n\
  \n数据库是一种以易于搜索或检索的方式存储大量信息的工具。从数据库读取数据时，返回的是数据片段，而不是整个文件。你日常生活中使用的许多应用程序都基于某种数据库。你的网上银行应用从数据库中检索你的账户活动。你的超市使用数据库来检索不同商品的价格。数据库的一个简单示例是电子表格。你的电子表格中可能有很多列和很多行。电子表格中的列代表你要存储的不同类型的信息。在数据库中，这些被视为属性。电子表格中的行则被视为数据库中的不同记录。\n\
  \n## 在数据库中存储信息\n\n数据库对开发者来说通常是一个令人生畏的主题；大多数开发者会将数据库与企业级数据库服务器（如 Microsoft SQL Server\
  \ 或 Oracle）联系在一起。这些应用程序需要花费时间来设置，并且需要持续管理。对于大多数开发者来说，像 Oracle 这样的数据库系统可能过于庞大。幸运的是，Apple\
  \ 在 iOS、macOS 和 tvOS 中内置了一个小巧高效的数据库引擎，名为 SQLite。这让你能够获得复杂数据库服务器的许多特性，而无需承担其开销。\n\
  \nSQLite 将为你在应用中存储信息提供极大的灵活性。它将整个数据库存储在一个单一文件中。它快速、可靠，并且易于在你的应用中实现。SQLite 数据库的最大优点在于无需安装任何软件；Apple\
  \ 已经为你处理好了一切。\n\n然而，SQLite 确实存在一些限制，作为开发者你应该了解：\n\n*   SQLite 被设计为单用户数据库。你不应在需要多人同时访问同一数据库的环境中使用\
  \ SQLite，这可能导致数据丢失或损坏。\n\n*   在企业环境中，数据库可能变得非常庞大。数据库管理员处理高达半 TB 大小的数据库并不罕见，在某些情况下数据库甚至可能变得更大。SQLite\
  \ 应该能够无问题地处理较小的数据库，但如果你的数据库开始变得过大，你就会开始遇到性能问题。\n\n*   SQLite 缺乏企业级数据库解决方案中的一些备份和数据恢复功能。\n\
  \n就本章而言，你将专注于使用 SQLite 作为数据库引擎。如果你正在开发的应用程序中存在上述任何限制，你可能需要考虑企业级数据库解决方案，但此方案超出了本书的讨论范围。\n\
  \n### 说明\n\nSQLite（发音为“sequel-lite”）的名称来源于结构化查询语言（SQL，发音为“sequel”）。SQL 是用于向数据库输入、搜索和检索数据的语言。\n\
  \nApple 已经努力解决了数据库开发中的许多挑战。作为开发者，你无需熟悉 SQL，因为 Apple 已经通过一个名为 Core Data 的框架为你处理了直接的数据库交互，这使得与数据库的交互变得容易得多。Core\
  \ Data 是 Apple 从 NeXT 的产品 Enterprise Object Framework 改编而来的，使用 Core Data 比直接与 SQLite\
  \ 数据库交互要容易得多。通过 SQL 直接访问数据库超出了本书的讨论范围。\n\n\n## Core Data 入门指南\n\n让我们从创建一个新的 Core\
  \ Data 项目开始。\n\n1.  打开 Xcode，依次选择“文件”➤“新建”➤“项目”。要创建 iOS Core Data 项目，请从顶部菜单中选择 iOS。然后选择“单视图应用”，如图\
  \ 11-1 所示。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig1_HTML.jpg](img/341013_5_En_11_Fig1_HTML.jpg)\n\
  \n    图 11-1. 创建新项目\n\n2.  完成后点击“下一步”按钮。下一个屏幕将允许你输入要使用的项目名称。在本章中，你需使用 `BookStore`\
  \ 这个名称。\n\n3.  靠近底部，你会看到一个名为“使用 Core Data”的复选框。请确保勾选此框，然后点击“下一步”，如图 11-2 所示。\n\n\
  \    **注意** Core Data 可以在任何时候添加到任何项目中。在创建项目时勾选该框，会将 Core Data 框架和一个默认数据模型添加到你的应用程序中。如果你确定要使用\
  \ Core Data，勾选此框可以节省时间。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig2_HTML.jpg](img/341013_5_En_11_Fig2_HTML.jpg)\n\
  \n    图 11-2. 向项目添加 Core Data\n\n4.  选择一个位置保存项目，然后点击“创建”。\n\n完成之后，新项目将会打开。它看起来与标准应用程序类似，不同的是现在你会看到一个\
  \ `BookStore.xcdatamodeld` 文件。这个文件被称为*数据模型*，它将包含你将存储在 Core Data 中的数据的相关信息。\n\n##\
  \ 模型\n\n点击模型文件（`BookStore.xcdatamodeld`）将其打开。你将看到一个类似于图 11-3 所示的窗口。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig3_HTML.jpg](img/341013_5_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3. 空白的模型\n\n窗口分为两个部分。左侧是实体。用更通俗的术语来说，这些是你想要存储在数据库中的对象或项目。获取请求和配置超出了本书的范围，可能会在更深入探讨\
  \ Core Data 时涉及。获取请求允许你为数据创建筛选条件或查询。\n\n右侧部分在创建新实体后将包含该实体的属性。属性是关于实体的信息片段。例如，一本书就是一个实体，而书名是该实体的一个属性。\n\
  \n### 注意\n\n在数据库术语中，实体就是你的*表*，实体的属性被称为*列*。从这些实体创建的对象被称为*行*。\n\n右侧面板还会在实体创建后显示该实体的所有关系。关系将一个实体连接到另一个实体。例如，你将创建一个\
  \ `Book` 实体和一个 `Author` 实体。然后你将它们关联起来，这样每本书都可以有一个作者。\n\n让我们创建一个实体。\n\n1.  点击窗口底部的“添加实体”按钮，或者从菜单中选择“编辑器”➤“添加实体”，如图\
  \ 11-4 所示。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig4_HTML.jpg](img/341013_5_En_11_Fig4_HTML.jpg)\n\
  \n    图 11-4. 添加新实体\n\n2.  在左侧，双击实体名称，并将其改为 `Book`。\n\n    **注意** 你必须将实体名称的首字母大写。\n\
  \n3.  现在让我们添加一些属性。属性可以被看作是一本书的详细信息，因此你将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想存储更多信息，比如出版商、页数和类型，但这里我们从简单的开始。点击窗口右下角的“添加属性”按钮，或者选择“编辑器”➤“添加属性”，如图\
  \ 11-5 所示。如果没有看到添加属性的选项，请确保你已在左侧选中了 `Book` 实体。\n\n    ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig5_HTML.jpg](img/341013_5_En_11_Fig5_HTML.jpg)\n\
  \n    图 11-5. 添加新属性\n\n4.  对于属性，你只需提供两个选项：名称和数据类型。我们把这个属性命名为 `title`。与实体不同，属性名称必须小写。\n\
  \n5.  现在，你需要选择一种数据类型。选择正确的数据类型很重要。它将影响数据的存储方式以及从数据库中的检索方式。列表中有 13 个选项，可能让人有些不知所措。我们将讨论最常见的选项，随着你对\
  \ Core Data 越来越熟悉，你可以尝试其他选项。最常见的选项是 `String`（字符串）、`Integer 32`（32 位整数）、`Decimal`（小数）和\
  \ `Date`（日期）。对于书名，选择 `String`。\n\n    - `String`：用于存储文本的属性类型。它应用于存储任何非数字或日期的信息。在本例中，书名和作者将是字符串。\n\
  \    - `Integer 32`：属性有三种不同的整数值类型。这些整数类型的区别仅在于其最小值和最大值。`Integer 32` 应该能满足你存储整数时的大部分需求。整数是不带小数的数字。如果你试图将小数保存到整数属性中，小数部分将被截断。在本例中，出版年份将是一个整数。\n\
  \    - `Decimal`：小数是一种可以存储带小数的数字的属性类型。`Decimal` 与双精度（`Double`）属性类似，但它们在最小值、最大值和精度上有所不同。`Decimal`\
  \ 应当能够处理任何货币值。在本例中，你将使用 `Decimal` 来存储书的价格。\n    - `Date`：日期属性正如其名。它允许你存储日期和时间，并基于这些值执行搜索和查找。在本例中你不会用到这个类型。\n\
  \n6.  让我们为这本书创建其余属性。现在，添加 `price`。它应该是 `Decimal` 类型。添加书的出版年份。对于由两个单词组成的属性，标准的命名方式是将第一个单词全部小写，第二个单词的首字母大写。例如，出版年份属性的理想名称是\
  \ `yearPublished`。选择 `Integer 32` 作为属性类型。添加完所有属性后，你的界面应如图 11-6 所示。\n\n### 注意\n\n\
  属性名称不能包含空格。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig6_HTML.jpg](img/341013_5_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6. 完成后的 Book 实体\n\n\n\n### 注意事项\n\n如果你习惯使用数据库，会发现这里没有添加主键。主键是一个字段（通常是数字），用于唯一标识数据库中的每条记录。在\
  \ Core Data 数据库中，无需创建主键，框架会为你处理这一切。\n\n现在你已完成了`Book`实体，让我们添加一个`Author`实体。\n\n1.\
  \ 添加一个新实体，命名为`Author`。\n2. 为该实体添加`lastName`和`firstName`，两者均为字符串类型。\n\n完成后，你的实体列表中应有两个实体。接下来需要添加关系。\n\
  \n1. 点击`Book`实体，然后长按屏幕右下角的“添加属性（Add Attribute）”按钮，选择“添加关系（Add Relationship）”，如图\
  \ 11-7 所示。（你也可以点击 Core Data 模型中“Relationships”部分下的加号。）\n\n   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig7_HTML.jpg](img/341013_5_En_11_Fig7_HTML.jpg)\n\
  \n   图 11-7. 添加新关系\n\n2. 系统会要求你命名该关系。通常将关系命名为你所引用的实体名称。输入`author`作为名称，并从“Destination”下拉菜单中选择`Author`。\n\
  \n3. 你已创建了关系的一半。要创建另一半，请点击`Author`实体。长按屏幕右下角的“添加属性”按钮，选择“添加关系”。你将使用要关联的实体名称作为此关系的名称，因此命名为`books`。（在关系名称后加了字母\
  \ *s*，因为一位作者可以有多本书。）在“Destination”下选择`Book`，在“Inverse”下选择你上一步创建的`author`关系。在屏幕右侧的“Utilities”窗口中，选择“Data\
  \ Model Inspector”。将关系类型设置为“To Many”。此时你的模型应如图 11-8 所示。\n\n   ### 注意事项\n\n   有时在\
  \ Xcode 中操作模型时，需要按 Tab 键才能更新实体、属性和关系的名称。这个小毛病可以追溯到 WebObjects 工具时代。\n\n   ![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig8_HTML.jpg](img/341013_5_En_11_Fig8_HTML.jpg)\n\
  \n   图 11-8. 最终的关系\n\n默认情况下，Xcode 现在会识别并使用你的新实体。如果你需要自定义 Core Data 对象（例如添加验证逻辑或自定义计算属性），则需告知\
  \ Xcode 为你生成`NSManagedObject`子类。本章我们将使用 Xcode 的默认实现。你可以通过点击实体并查看右侧的“Data Model Inspector”（如图\
  \ 11-9 所示）来确认 Xcode 会在运行时自动生成这些文件。请确保“Codegen”设置为“Class Definition”。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig9_HTML.jpg](img/341013_5_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9. 检查实体的 Codegen 状态\n\n当 Xcode 为你的实体生成类定义时，它会创建`NSManagedObject`的子类。`NSManagedObject`是一个对象，负责处理所有\
  \ Core Data 数据库的交互。它提供了本示例中将用到的方法和属性。\n\n### 托管对象上下文\n\nXcode 将创建一个名为`Book`的托管对象类。在\
  \ Core Data 中，每个托管对象都应存在于一个托管对象上下文中。该上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。这非常有用，因为你可以一次性保存多组更改，而不是逐条单独保存，从而加快记录保存的速度。作为开发者，你无需跟踪对象何时被修改，托管对象上下文将为你处理所有这些工作。\n\
  \n\n\n### 设置界面\n\n以下步骤将帮助你完成界面设置：\n\n1.  在你的项目的 `BookStore` 文件夹中，应该有一个 `Main.storyboard`\
  \ 文件。点击该文件，Xcode 会在编辑窗口中将其打开，如图 11-10 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig10_HTML.jpg](img/341013_5_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10. 创建界面\n\n2.  此时应该会出现一个空白窗口。为了给窗口添加一些功能，你需要从对象库中添加一些对象。点击对象库按钮，并在搜索栏中输入\
  \ `table`。这应该会缩小对象范围，你会看到“Table View Controller”（表格视图控制器）和“Table View”（表格视图）。将“Table\
  \ View”拖拽到视图中，如图 11-11 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig11_HTML.jpg](img/341013_5_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11. 添加表格视图\n\n3.  现在你有了一个表格视图。你需要拉伸表格视图使其填满整个视图。拖拽表格视图的四个角，使其覆盖整个视图，如图 11-12\
  \ 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig12_HTML.jpg](img/341013_5_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12. 拉伸表格视图\n\n4.  为了在表格视图中创建单元格，你需要添加一个 `UITableViewCell`。在当前的 `table` 搜索结果中，表格视图对象下方应该会显示一个“Table\
  \ View Cell”（表格视图单元格）。将一个“Table View Cell”拖拽到你的表格中。现在你的视图上就有了一个表格和一个单元格，如图 11-13\
  \ 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig13_HTML.jpg](img/341013_5_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13. 添加表格视图单元格\n\n5.  选中该单元格，在实用工具区域的属性检查器中，将“Style”设置为“Basic”。同时，将“Identifier”设置为\
  \ `Cell`。当你的表格视图中包含多种样式的单元格时，需要使用标识符，并需要用唯一的标识符来区分它们。对于简单的项目，你可以将其设置为 `Cell` 而无需过多考虑，如图\
  \ 11-14 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig14_HTML.jpg](img/341013_5_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14. 修改单元格的样式和标识符\n\n6.  使用表格视图时，通常将其嵌入一个导航控制器中是个好主意。你将使用导航控制器来为你的表格视图腾出空间，以便放置一个“添加”按钮。要添加导航控制器，请在场景列表（即故事板左侧显示所有视图控制器的窗口，你的视图控制器旁边会有一个黄色图标）中选中你的视图控制器。从应用程序菜单中，选择\
  \ `Editor` ➤ `Embed In` ➤ `Navigation Controller`，如图 11-15 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig15_HTML.jpg](img/341013_5_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15. 嵌入导航控制器\n\n7.  现在，你的视图顶部会有一个导航栏。接下来，你要在导航栏上添加一个按钮。这种类型的按钮被称为 `UIBarButtonItem`。在对象库中搜索\
  \ `bar button`，然后将一个“Bar Button Item”（栏按钮项）拖拽到导航栏上视图的右上角，如图 11-16 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig16_HTML.jpg](img/341013_5_En_11_Fig16_HTML.jpg)\n\
  \n图 11-16. 在导航栏上添加栏按钮项\n\n8.  选中该栏按钮项，将“System Item”（系统项目）从“Custom”（自定义）更改为“Add”（添加），如图\
  \ 11-17 所示。这将使你的栏按钮项外观从*Item*（项目）文字变成一个加号图标。\n\n\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig17_HTML.jpg](img/341013_5_En_11_Fig17_HTML.jpg)\n\
  \n图 11-17. 更改栏按钮项\n\n9. 现在你已经创建了界面，需要将其与代码连接起来。按住 Control 键，将你的 Table View 拖拽到文档大纲中的\
  \ View Controller，如图 11-18 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig18_HTML.jpg](img/341013_5_En_11_Fig18_HTML.jpg)\n\
  \n图 11-18. 连接 Table View\n\n10. 将会出现一个弹出窗口，允许你选择 `dataSource` 或 `delegate`，如图 11-19\
  \ 所示。你需要将两者都分配给 View Controller。选择项目的顺序无关紧要，但你需要两次 Control-拖拽 Table View。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig19_HTML.jpg](img/341013_5_En_11_Fig19_HTML.jpg)\n\
  \n图 11-19. 连接 Table View\n\n11. 现在你的 Table View 应该可以正常使用了。你需要连接你的按钮，使其能够执行某些操作。在\
  \ Xcode 窗口的右上方，点击助手编辑器按钮（看起来像两个圆圈）。这将在右侧打开你的代码，并在左侧打开你的 storyboard。现在，Control-拖拽你的\
  \ Add 按钮到右侧的 View Controller 代码中，如图 11-20 所示。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig20_HTML.jpg](img/341013_5_En_11_Fig20_HTML.jpg)\n\
  \n图 11-20. 为你的按钮对象添加操作\n\n12. 只要将 Add 按钮放在你的类中且在任何方法之外，放在哪里并不重要。为了整洁，它应该放在你的类属性之后。当你松开时，系统会提示你正在创建的连接类型。将\
  \ Connection 设置为 Action。然后为你新方法添加一个名称，例如 `addNew`，如图 11-21 所示。点击 Connect 完成连接。\n\
  \n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig21_HTML.jpg](img/341013_5_En_11_Fig21_HTML.jpg)\n\
  \n图 11-21. 更改连接的类型和名称\n\n13. 你还需要为你的 Table View 创建一个 outlet。将 Table View 从 View\
  \ Controller 场景拖拽到代码顶部（就在类定义下方，如图 11-22 所示）。确保连接设置为 Outlet，并将 Table View 命名为 `myTableView`。稍后你将需要这个\
  \ outlet 来告诉你的 Table View 刷新。点击 Connect 完成连接。\n\n![../images/341013_5_En_11_Chapter/341013_5_En_11_Fig22_HTML.jpg](img/341013_5_En_11_Fig22_HTML.jpg)\n\
  \n图 11-22. 为 Table View 创建 outlet\n\n现在界面已经完成，但你仍然需要添加代码来使界面执行操作。回到标准编辑器（点击 Xcode\
  \ 工具栏右上角两个圆圈图标左侧的列表图标），然后从左侧文件列表中选择 `ViewController.swift` 文件。因为你现在有一个需要处理的 Table\
  \ View，所以你需要告诉你的类它可以处理 Table View。将文件顶部的类声明更改为以下内容：\n\n```\nclass ViewController:\
  \ UIViewController, UITableViewDelegate, UITableViewDataSource {\n```\n\n你在声明中添加了\
  \ `UITableViewDelegate` 和 `UITableViewDataSource`。这告诉你的控制器它可以充当表格视图的委托和数据源。这些被称为\
  \ ***协议***。协议告诉对象它们必须实现某些方法才能与其他对象交互。例如，要遵循 `UITableViewDataSource` 协议，你需要实现以下方法：\n\
  \n```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int\n```\n\n没有这个方法，Table View 将不知道要绘制多少行。\n\n在继续之前，你需要告诉你的 `ViewController.swift`\
  \ 文件关于 Core Data 的信息。为此，在文件顶部 `import UIKit` 下方添加以下行：\n\n```\nimport CoreData\n\
  ```\n\n你还需要向你的 `ViewController` 类中添加一个托管对象上下文。在 `class ViewController` 行之后立即添加以下行：\n\
  \n```\nvar managedObjectContext: NSManagedObjectContext!\n```\n\n既然你有了一个变量来保存你的\
  \ `NSManagedObjectContext`，你需要实例化它，以便可以向其中添加对象。为此，你需要将以下行添加到你的 `override func viewDidLoad()`\
  \ 方法中：\n\n```\nlet appDelegate: AppDelegate = UIApplication.shared.delegate as!\
  \ AppDelegate\nmanagedObjectContext = appDelegate.persistentContainer.viewContext\
  \ as NSManagedObjectContext\n```\n\n第一行创建了一个指向你的应用程序委托的常量。第二行将你的 `managedObjectContext`\
  \ 变量指向应用程序委托的 `managedObjectContext`。在整个应用程序中使用相同的托管对象上下文通常是一个好主意。\n\n你要添加的第一个新方法是查询数据库记录的方法。将此方法命名为\
  \ `loadBooks`。\n\n```\n1 func loadBooks() -> [Book] {\n2     let fetchRequest: NSFetchRequest\
  \ = Book.fetchRequest()\n3     var result: [Book] = []\n4     do {\n5          result\
  \ = try managedObjectContext.fetch(fetchRequest)\n6     } catch {\n7          NSLog(\"\
  My Error: %@\", error as NSError)\n8     }\n9     return result\n10 }\n```\n\n这段代码比你之前看到的稍微复杂一些，所以让我们逐步分析一下。第\
  \ 1 行声明了一个名为 `loadBooks` 的新函数，它返回一个 `Books` 的数组。然后，一旦加载完成，你就返回该数组。\n\n现在你需要为你的 Table\
  \ View 添加数据源方法。这些方法告诉你的 Table View 有多少个分区，每个分区有多少行，以及每个单元格应该是什么样子。将以下代码添加到你的 `ViewController.swift`\
  \ 文件中：\n\n```\n1 func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n2     return loadBooks().count\n3 }\n\n5 func tableView(_\
