  对象的 `logMessage` 方法。用过 Objective-C 的程序员会很快发现，在 Swift 中，无论是类的声明还是对象的创建，都更加简短高效。


  ### 注意


  实例化会将类变成计算机内存中一个真实的对象。类本身在没有实例化之前是无法实际使用的。以 SUV 为例，在工厂生产出一辆（实例化该类）之前，SUV 毫无意义。只有在那之后，SUV
  才能被使用。


  方法调用也可以接受多个参数。例如，`myCarObject.switchRadioBandTo(FM, 104.7)`。这里的方法名是 `switchRadioBandTo`。两个参数放在圆括号内。保持方法命名的一致性至关重要。


