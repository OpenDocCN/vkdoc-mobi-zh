- "# 12. 协议与委托\n\n恭喜你！你正在掌握成为 iOS 开发者所需的技能！然而，iOS 开发者还需要理解另外两个主题才能成功：**协议** 和 **委托**。新开发者常常会被这些主题搞得不知所措，所以我们首先介绍了\
  \ Swift 语言的基础主题。阅读本章后，你会发现协议和委托非常有用，并且不难理解和实现。\n\n## 多重继承\n\n我们曾在第 5 章中讨论过对象继承。简而言之，对象继承意味着子类可以继承其父类的所有特征，如图\
  \ 12-1 所示。\n\n![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig1_HTML.jpg](img/341013_5_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1.\n\n典型的 Swift 继承\n\nC++、Perl 和 Python 都有一个名为 *多重继承* 的特性，它允许一个类从多个父类继承行为和特性，如图\
  \ 12-2 所示。\n\n![../images/341013_5_En_12_Chapter/341013_5_En_12_Fig2_HTML.jpg](img/341013_5_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2.\n\n多重继承\n\n多重继承可能会带来问题，因为它可能产生歧义。因此，Swift 没有实现多重继承。相反，它实现了一种称为 **协议**\
  \ 的机制。\n\n## 理解协议\n\n苹果将 *协议* 定义为一系列函数声明的列表，不附加到任何类定义上。协议类似于类，但区别在于协议不提供任何需求的实现；它只描述了一个实现应该是什么样子的。\n\
  \n一个类可以采用该协议，以提供这些需求的实际实现。任何满足协议需求的类型，我们都称之为 *遵循* 该协议。\n\n## 协议语法\n\n协议的定义方式类似于类，如代码清单\
  \ 12-1 所示。\n\n```\nprotocol RandomNumberGenerator {\n    var mustBeSettable: Int\
  \ { get set }\n    var doesNotNeedToBeSettable: Int { get }\n    func random() ->\
  \ Double\n}\n```\n\n代码清单 12-1. 协议定义\n\n如果一个类有父类，你需要在列出的任何协议之前先列出父类的名称，后跟逗号，如代码清单\
  \ 12-2 所示。\n\n```\nclass MyClass: MySuperclass, RandomNumberGenerator, AnotherProtocol\
  \ {\n    // 类定义写在这里\n}\n```\n\n代码清单 12-2. 协议列在父类之后\n\n协议还指定了每个属性必须具有可获取（gettable）或既可获取又可设置（gettable\
  \ *and* settable）的实现。可获取的属性是只读的，而既可获取又可设置的属性则不是（如前面的代码清单 12-1 所示）。\n\n属性总是声明为变量属性，并以\
  \ `var` 为前缀。可获取和可设置的属性在其类型声明后用 `{ get set }` 表示，而可获取的属性则用 `{ get }` 表示。\n\n## 委托\n\
  \n**委托** 是一种设计模式，它允许一个类或结构体将其部分职责移交给（或 *委托* 给）另一个类型的实例。这种设计模式通过定义一个封装了委托职责的协议来实现。委托可以用于响应特定操作，或从外部来源检索数据，而无需了解该来源的底层类型。\n\
  \n代码清单 12-3 定义了两个用于随机数字猜测游戏的协议。\n\n```\nprotocol RandomNumberGame {\n    var machine:\
  \ Machine { get }\n    func play()\n}\n\nprotocol RandomNumberGameDelegate {\n \
  \   func gameDidStart(game: RandomNumberGame)\n    func game(game: RandomNumberGame,\
  \ didStartNewTurnWithGuess randomGuess: Int)\n    func gameDidEnd(game: RandomNumberGame)\n\
  }\n```\n\n代码清单 12-3. 协议定义\n\n`RandomNumberGame` 协议可以被任何涉及随机数生成和猜测的游戏所采用。`RandomNumberGameDelegate`\
  \ 协议可以被任何类型的类采用，以跟踪 `RandomNumberGame` 协议的进展。\n\n## 协议与委托示例\n\n本节将向你展示如何创建一个更复杂的随机数字猜测应用，以说明如何使用协议和委托。该应用的主视图显示用户的猜测以及该猜测是高了、低了还是正确，如图\
