  \ 方法来赋予初始值。\n\n### 访问属性\n\n现在你已经有了一些属性，那么如何使用它们呢？它们如何被访问？不幸的是，仅仅声明一个属性并不一定能让你访问它。有两种方式可以访问这些变量：\n\
