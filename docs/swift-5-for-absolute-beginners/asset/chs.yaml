  定义方法时，你必须决定该方法是类型方法还是实例方法。对于 `HelloWorld` 对象，使用的是默认的方法类型——实例方法。这个方法只能在对象创建*之后*使用。如果在
  `func` 前加上 `class` 关键字，该方法就变成了类型方法，可以在对象创建*之前*使用，但此时无法访问对象中的属性。如果要将 `logMessage`
  改为类型方法，则如下所示：


