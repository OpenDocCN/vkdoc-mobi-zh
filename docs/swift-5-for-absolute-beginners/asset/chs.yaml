  ## 总结


  本章的示例虽然简单，但希望能激发你使用 Swift 和 Xcode 开发更复杂应用程序的兴趣。在后续章节中，你将学习更多关于面向对象编程的知识，以及 Swift
  能实现的更多功能。值得表扬的是，你已经学到了很多内容。以下是本章讨论的主题总结：


  *   Swift 语言的起源及简史

  *   Swift 中常用的一些语言符号

  *   一个 Swift 类示例

  *   更深入地使用 Xcode，包括讨论`HelloWorld.swift`源文件

  *   将可视化界面对象与应用程序对象中的方法和变量进行连接


