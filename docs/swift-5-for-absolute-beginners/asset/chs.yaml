  \ Swift 类。本章还会教你如何针对解决问题所需的对象进行设计。本章涉及如何创建自定义对象，以及如何使用 Foundation 类中提供的现有对象。\n\n\
  本章扩展了第 6 章的主题，并介绍了第 8 章中会详细描述的一些概念。\n\n## 创建 Swift 类\n\n在 Swift 中，创建类很简单。通常，一个类会存放在其自身的文件中，但根据需要，单个文件也可以包含多个类。\n\
  \n下面是一个类声明第一行的示例：\n\n```\nclass RadioStation\n```\n\n这里，类名是`RadioStation`。默认情况下，Swift\
  \ 类不从父类继承。如果你希望你的 Swift 类继承自另一个类，可以像这样操作：\n\n```\nclass RadioStation: Station\n\
  ```\n\n在这个例子中，`RadioStation`现在是`Station`的子类，并将继承`Station`的所有属性和方法。代码清单 7-1 展示了一个类的完整定义。\n\
  \n```\n1 import UIKit\n\n3 class RadioStation: NSObject {\n\n5     var name: String\n\
  6     var frequency: Double\n\n8     override init() {\n9         name = \"Default\"\
  \n10         frequency = 100\n11     }\n\n13     static var minAMFrequency: Double\
  \ = 520.0\n\n15     static var maxAMFrequency: Double = 1610.0\n\n17     static\
  \ var minFMFrequency: Double = 88.3\n\n19     static var maxFMFrequency: Double\
  \ = 107.9\n\n21     func isBandFM() -> Int {\n22         if frequency >=\nRadioStation.minFMFrequency\
  \ && frequency <= RadioStation.maxFMFrequency {\n23             return 1 //FM\n\
  24         } else {\n25             return 0 //AM\n\n27         }\n\n29     }\n\
  30 }\n代码清单 7-1\n一个 Swift 类\n```\n\n\n\n## 属性\n\n代码清单 7-1 展示了一个包含两个不同属性的示例类：`name`\
  \ 和 `frequency`。第 1 行导入了 `UIKit` 类定义（稍后会详细介绍），因为这是 Xcode 在创建新类时默认添加的导入。第 3 行通过定义类的名称（有时也称为*类型*）开始类的定义。第\
  \ 5 行和第 6 行为 `RadioStation` 类定义了两个属性。\n\n每当 `RadioStation` 类被实例化时，生成的 `RadioStation`\
  \ 对象都可以访问这些属性，而这些属性仅属于特定的实例。如果有十个 `RadioStation` 对象，每个对象都有自己独立的变量，互不影响。这也被称为*作用域*，即对象的变量位于每个对象的作用域内。\n\
