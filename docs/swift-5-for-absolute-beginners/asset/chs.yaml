  \n图 3\n\n在 Mac 上布置双显示器\n\n### 关于作者与技术评审\n\n### 作者简介\n\n### 技术评审简介\n\n"
- "# 1. 成为一名出色的 iOS 开发者\n\n既然你已准备好成为一名软件开发者，并且已经阅读了本书的引言，那么你需要熟悉几个关键概念。你的计算机程序会完全按照你告诉它的指令执行——不多也不少。它将遵循操作系统和\
  \ Swift 编程语言定义的编程规则。你的程序不会在意你今天是否心情不好，也不会在意你要求它执行多少次。通常，你认为你告诉了程序去做什么，与程序实际所做的，是两码事。\n\
  \n### 成功的关键\n\n如果你还没读过，请花几分钟时间阅读本书的引言，获取一些关于如何成功开发你自己的 iOS 应用的建议。\n\n根据你的背景，处理这种绝对非黑即白的事物可能会令人沮丧。很多时候，编程学生都会抱怨：“这不是我想要它做的！”但随着你开始积累编程经验和信心，你会开始像程序员一样思考。你将理解软件设计和逻辑，体验到你的程序完全按照你想要的方式运行，以及随之而来的满足感。\n\
  \n## 像开发者一样思考\n\n软件开发涉及编写计算机程序，然后让计算机执行该程序。计算机程序是你希望计算机执行的一组指令。在开始编写计算机程序之前，最好按照你希望完成的顺序，列出你希望程序执行的步骤。这个分步过程被称为算法。\n\
  \n如果你要编写一个计算机程序来烤一片面包，你首先要写一个算法。这个算法可能看起来像这样：\n\n1.  从袋子里取出面包。\n2.  将一片面包放入烤面包机。\n\
  3.  按下“烘烤”按钮。\n4.  等待面包片弹出。\n5.  从烤面包机中取出烤好的面包片。\n\n乍一看，这个算法似乎解决了问题。然而，该算法遗漏了许多细节，并且做了很多假设。以下是一些例子：\n\
  \n-   用户想要什么样的面包？用户想要白面包、全麦面包还是其他种类的面包？\n-   用户希望面包烤到什么程度？浅色还是重色？\n-   面包烤好后，用户想在上面加什么：黄油、人造黄油、蜂蜜还是草莓酱？\n\
  -   这个算法对所有文化背景和语言的用户都适用吗？某些文化中可能对“烤面包”有其他叫法，或者根本不知道什么是烤面包。\n\n现在，你可能会想，对于制作一个简单的烤面包程序来说，这过于详细了。多年来，软件开发一直背负着耗时过长、成本过高、不符合用户需求的恶名。之所以会有这样的名声，是因为计算机程序员经常在还没有真正想清楚他们的算法之前，就开始编写程序了。\n\
  \n制作成功应用的关键要素是设计需求。设计需求可以是正式而详细的，也可以简单得像一张纸上的清单。设计需求之所以重要，是因为它们能帮助开发者明确应用在完成时应该做什么，不应该做什么。设计需求不应当在程序员的“真空”中完成，而应是开发者、用户和客户协作的成果。\n\
  \n你成功应用的另一个关键要素是**用户界面**（UI）设计。苹果公司建议你将整个开发过程 50% 以上的时间都花在 UI 设计上。可以使用简单的铅笔和纸张进行设计，或者使用\
  \ Xcode 的故事板功能来布局你的屏幕元素。许多软件开发者从 UI 设计开始，在布置完所有屏幕元素并让许多用户查看纸张原型后，再根据屏幕布局来编写设计需求。\n\
  \n### 注意\n\n如果本章只能让你记住一件事，那一定是在开始软件开发之前，充分考虑设计需求和用户界面设计的重要性。这是在软件开发周期中最有效（也成本最低）的时间利用方式。使用铅笔和橡皮擦来修改设计，远比因为没让别人在编程前审查设计而修改代码要容易和快速得多。\n\
  \n在你竭尽全力完善所有设计需求、布局所有用户界面屏幕，并让客户或潜在客户查看你的设计并给出反馈之后，你就可以开始编码了。一旦编码开始，设计需求和用户界面屏幕可能会发生变化，但这种变化通常是微小的，并且很容易被开发流程所适应。见图\
  \ 1-1 和图 1-2。\n\n图 1-1 展示了一个租赁报告应用在开发前的界面原型。开发原型屏幕以及设计需求，迫使开发者在编码开始前就思考应用许多可用性问题。这有助于缩短应用开发时间，并带来更好的用户体验，以及在\
  \ App Store 上获得更好的评价。图 1-2 展示了租赁报告应用的视图完成后的样子。注意原型工具是如何让你将应用模型与现实模型相匹配的。\n\n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig2_HTML.png](img/341013_5_En_1_Fig2_HTML.png)\n\
  \n图 1-2。\n\n这是已完成的 iPhone 租赁报告应用。这个应用被称为 `WalkAround`。\n\n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig1_HTML.jpg](img/341013_5_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1。\n\n这是一个 iPhone 移动租赁报告应用在开发开始前的登录屏幕 UI 原型。这个 UI 设计原型是用 `InVision` 完成的。\n\
  \n\n\n## 完成开发周期\n\n现在你已经有了设计需求、用户界面设计并编写了程序，接下来该做什么呢？编程结束后，你需要确保程序符合设计需求和用户界面设计，并且不存在错误。在编程术语中，错误被称为\
  \ *bug*（缺陷）。Bug 是编程中不希望出现的结果，必须在应用发布到 App Store 之前修复。在程序中查找 bug 并确保程序满足设计需求的过程称为\
  \ **测试**。通常，测试工作由具备软件测试方法论经验、且未参与应用编写的人员执行。软件测试通常被称为 **质量保证**（QA）。\n\n### 注\n\n\
  当应用准备提交到 App Store 时，Xcode 会为文件添加 `.app` 或 `.ipa` 扩展名，例如 `appName.app`。这就是 iPhone、iPad\
  \ 和 Mac 应用被称为 **app** 的原因。本书中 *program*、*application* 和 *app* 指代相同的意思。\n\n在测试阶段，开发者需要与\
  \ QA 人员协作，确定应用无法按设计运行的原因。这个过程被称为 *调试*。调试要求开发者逐步检查程序，找出应用未能按设计运行的原因。图 1-3 展示了完整的软件开发周期。\n\
  \n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig3_HTML.png](img/341013_5_En_1_Fig3_HTML.png)\n\
  \n图 1-3. 典型的软件开发周期\n\n在测试和调试过程中，常常需要修改需求（设计），以使应用对用户更易用。设计需求和用户界面修改完成后，整个周期再次开始。\n\
  \n在某个时间点，所有人辛勤开发的应用必须提交到 App Store。关于周期中何时进行提交，需要考虑多种因素：\n\n*   开发成本\n*   预算\n*\
  \   应用的稳定性\n*   投资回报率\n\n开发者与管理层之间总存在权衡。开发者希望应用完美无缺，而管理层希望尽快从投资中获得收益。如果发布日期由开发者决定，应用可能永远无法提交到\
  \ App Store。开发者会不断调整应用，使其更快、更高效、更易用。然而，在某个时刻，必须将代码从开发者手中“夺走”并上传到 App Store，以便它能实现其设计初衷。\n\
  \n## 介绍面向对象编程\n\n如前文详细介绍，Playground 使你能够专注于**面向对象编程**（OOP），而无需一次性掌握所有 Swift 编程语法和复杂的\
  \ Xcode 开发环境。相反，你可以专注于学习 OOP 的基本原则，并快速运用这些原则编写你的第一个程序。\n\n几十年来，开发者一直在探索更好的方式来开发可重用、可管理且易于在项目周期内维护的代码。OOP\
  \ 旨在帮助实现代码复用和可维护性，同时降低软件开发成本。\n\nOOP 可以被视为程序中对象的集合。通过对这些对象执行操作来实现设计需求。\n\n**对象**是指任何可以被操作的东西。例如，飞机、人或者\
  \ iPad 上的屏幕/视图都可以是对象。你可能希望让飞机转弯来操控它，希望让人行走，或者改变 iPad 上应用屏幕的颜色。\n\nPlayground 在你完成每一行代码时就会执行它，如图\
  \ 1-4 所示。当你运行 Playground 应用时，用户可以对应用中的对象施加操作。Xcode 是一个**集成开发环境**（IDE），使你能够在编程环境中直接运行你的应用。你可以先在计算机上测试应用，然后通过\
  \ Xcode 的模拟器在 iOS 设备上运行，如图 1-5 所示。\n\n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig5_HTML.jpg](img/341013_5_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5. 这个示例 iPhone 应用包含一个用于组织购物清单的表格对象。像“向左旋转”或“用户选中了第 3 行”这样的操作可以应用于该对象。\n\n\
  ![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig4_HTML.jpg](img/341013_5_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4. 此 Playground 视图中有多个对象\n\n作用于对象上的操作被称为**方法**。方法操纵对象来实现你希望应用完成的功能。例如，对于一个\
  \ `jet`（喷气式飞机）对象，你可能有以下方法：\n\n```\ngoUp           // 上升\ngoDown         // 下降\n\
  bankLeft       // 左倾斜\nturnOnAfterburners  // 打开加力燃烧室\nlowerLandingGear   // 放下起落架\n\
  ```\n\n图 1-5 中的 `table` 对象在程序中实际被称为 `UITableView`，它可能包含以下方法：\n\n```\nnumberOfRowsInSection\
  \          // 每个分区的行数\ncellForRowAtIndexPath           // 返回指定位置的单元格\ncanEditRowAtIndexPath\
  \           // 是否可编辑指定行\ncommitEditingStyle              // 提交编辑样式\ndidSelectRowAtIndexPath\
  \         // 选中某行后的处理\n```\n\n大多数对象都包含描述自身的数据。这些数据被定义为*属性*。每个属性以特定方式描述相关联的对象。例如，`jet`\
  \ 对象的属性可能如下：\n\n```\naltitude = 10,000 feet       // 高度 = 10,000 英尺\nheading = North\
  \              // 航向 = 北\nspeed = 500 knots            // 速度 = 500 节\npitch = 10\
  \ degrees           // 俯仰角 = 10 度\nyaw = 20 degrees             // 偏航角 = 20 度\n\
  latitude = 33.575776         // 纬度 = 33.575776\nlongitude = -111.875766      //\
  \ 经度 = -111.875766\n```\n\n对于图 1-5 中的 `UITableView` 对象，其属性可能如下：\n\n```\nbackgroundColor\
  \ = White       // 背景颜色 = 白色\nselectedRow = 3               // 选中行 = 第 3 行\nanimateView\
  \ = No              // 是否动画视图 = 否\n```\n\n当程序运行、用户与应用交互或程序员为满足设计需求而设计应用时，对象的属性可以随时更改。在特定时间点，对象属性中存储的值统称为**对象的状态**。\n\
  \n**状态**是计算机编程中的一个重要概念。在教授学生有关状态的内容时，我们让他们走到窗边，在天空中找一架飞机。然后我们让他们打个响指，并列举出当时飞机属性可能具有的一些值。这些值可能如下：\n\
  \n```\naltitude = 10,000 feet       // 高度 = 10,000 英尺\nlatitude = 33.575776    \
  \     // 纬度 = 33.575776\nlongitude = -111.875766      // 经度 = -111.875766\n```\n\
  \n这些值代表了他们打响指那一瞬间该*对象*的*状态*。\n\n等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录下该特定时刻飞机的可能状态。\n\n\
  此时属性值可能变为如下：\n\n```\naltitude = 10,500 feet       // 高度 = 10,500 英尺\nlatitude =\
  \ 33.575665         // 纬度 = 33.575665\nlongitude = -111.875777      // 经度 = -111.875777\n\
  ```\n\n注意对象的状态是如何随时间变化的。\n\n\n\n## 使用 Playground 界面\n\nPlayground 提供了一种极佳的方式，让你可以在不同时学习\
  \ Xcode 和 Swift 语言全部复杂性的前提下，使用刚才讨论的各种概念。只需花上几分钟熟悉 playground 界面，你就可以开始编写程序了。\n\n\
  从技术角度来说，playground 界面并非像你编写 iOS 应用时使用的真正 IDE（集成开发环境），但它非常接近，并且学习起来容易得多。真正的 IDE 将一个应用程序的代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动功能整合在一起；参见图\
  \ 1-6。然而，playground 提供了与你开发应用时所用的 Xcode IDE 相似的外观、感觉和功能。\n\n![../images/341013_5_En_1_Chapter/341013_5_En_1_Fig6_HTML.jpg](img/341013_5_En_1_Fig6_HTML.jpg)\n\
  \n**图 1-6.** 带有 iPhone 模拟器的 Xcode IDE\n\n在下一章中，你将详细了解 playground 界面并编写你的第一个程序。\n\
  \n## 本章小结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语非常重要，因为它们将在本书中反复出现：\n\n* 计算机程序\n* 算法\n* 设计需求\n\
  * 用户界面\n* 缺陷（Bug）\n* 质量保证（QA）\n* 调试\n* 面向对象编程（OOP）\n* 对象\n* 属性\n* 方法\n* 对象的状态\n\
  * 集成开发环境（IDE）\n\n## 下一步\n\n其余章节将提供你学习 Swift 和编写 iOS 应用所需的信息。术语和概念会一遍又一遍地被引入和强化，这样你会逐渐对它们更加熟悉。坚持下去，对自己要有耐心。\n\
  \n### 练习题\n\n* 回答以下问题：\n  * 为什么花时间在用户需求上如此重要？\n  * 设计需求和算法之间有什么区别？\n  * 方法和属性之间有什么区别？\n\
  \  * 什么是缺陷（bug）？\n  * 什么是状态？\n* 编写一个算法，描述一台自动售货机从投币到出货的工作过程。假设一瓶苏打水的价格为 80 美分。\n\
  * 编写一个用于运行该自动售货机的应用的设计需求。\n\n"
- "# 编程基础\n\n本章重点介绍成为一名优秀的 Swift 程序员所必需的构建模块。本章涵盖如何使用 playground 用户界面、如何编写你的第一个 Swift\
  \ 程序，以及如何使用 Xcode 集成开发环境（IDE）。\n\n> **注意：** 我们将向你介绍如何使用 playground，这将使你能够立即开始编程，而无需担心\
  \ Xcode 项目的所有复杂性。我们使用这种方法来帮助你快速学习这些概念，避免挫败感，并为你打下坚实的基础。\n\n## 初识 Xcode\n\nXcode\
  \ 中的 Playground 让编写 Swift 代码变得异常简单且有趣。输入一行代码，结果会立即显示。如果你的代码需要运行一段时间，比如在循环或分支中，你可以通过时间线区域观察其执行过程。当你在\
  \ playground 中完成代码后，可以轻松地将代码迁移到 Swift iOS 项目中。使用 Xcode playground，你可以：\n\n* 设计或修改算法，并实时观察每一步的结果\n\
  * 创建新的测试，在将其纳入测试套件之前验证它们是否有效\n\n首先，你需要对 Xcode 用户界面有更多了解。当你打开一个 Xcode iOS 项目时，你会看到一个类似于图\
  \ 2-1 的屏幕。\n\nXcode 用户界面的设计旨在帮助你高效地编写 Swift 应用程序。该用户界面帮助新程序员学习 iOS 应用程序的用户界面。现在，你将探索\
  \ Xcode 的 IDE 工作区和 playground 的主要部分。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig1_HTML.jpg](img/341013_5_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1.** 带有 Swift 项目的 Xcode 集成开发环境\n\n### 探索工作区窗口\n\n工作区窗口，如图 2-2 所示，使你能够打开和关闭文件、设置应用程序偏好设置、开发和编辑应用，以及查看文本输出和错误控制台。\n\
  \n工作区窗口是你创建和管理项目的主要界面。该窗口会自动适应当前的任务，你还可以进一步配置窗口以符合你的工作风格。你可以根据需要打开任意数量的工作区窗口。\n\n\
  ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig2_HTML.jpg](img/341013_5_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2.** Xcode 的工作区窗口\n\n工作区窗口有四个主要区域：**编辑器**、**导航器**、**调试**和**工具**。\n\n当你选择一个项目文件时，其内容会显示在**编辑器**区域，Xcode\
  \ 会在适当的编辑器中打开该文件。\n\n你可以通过工具栏中视图选择器的按钮来隐藏或显示其他三个区域。这些按钮位于窗口的右上角。\n\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figa_HTML.gif](img/341013_5_En_2_Figa_HTML.gif)\
  \ 点击此按钮可显示或隐藏**导航器**区域。在这里，你可以查看和浏览文件以及项目的其他方面。\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figb_HTML.gif](img/341013_5_En_2_Figb_HTML.gif)\
  \ 点击此按钮可显示或隐藏**调试**区域。在这里，你可以控制程序执行并调试代码。\n* ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figc_HTML.gif](img/341013_5_En_2_Figc_HTML.gif)\
  \ 点击此按钮可显示或隐藏**工具**区域。你使用**工具**区域有多种用途，最常见的是查看和修改文件的属性。\n\n\n\n### 导航您的工作区\n\n您可以从导航器区域访问项目中的文件、符号、单元测试、诊断信息及其他功能。在导航器选择栏中，您可以选择适合当前任务的导航器。每个导航器的内容区域让您能访问项目的相关部分，而各导航器的过滤栏则允许您限制显示的内容。\n\
  \n在导航器选择栏中，您可以选择以下选项：\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figd_HTML.gif](img/341013_5_En_2_Figd_HTML.gif)\
  \ *项目导航器*：添加、删除、分组以及管理项目中的文件；或选择文件以在编辑器区域查看或编辑其内容。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fige_HTML.gif](img/341013_5_En_2_Fige_HTML.gif)\
  \ *源代码控制导航器*：当使用像 Git 这样的版本控制系统 (VCS) 时，查看对项目文件所做更改的详细历史记录。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figf_HTML.gif](img/341013_5_En_2_Figf_HTML.gif)\
  \ *符号导航器*：浏览项目中的类层次结构。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figg_HTML.gif](img/341013_5_En_2_Figg_HTML.gif)\
  \ *查找导航器*：使用搜索选项和过滤器快速查找项目中的文本。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figh_HTML.gif](img/341013_5_En_2_Figh_HTML.gif)\
  \ *问题导航器*：查看在打开、分析及构建项目时发现的诊断信息、警告和错误等问题。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figi_HTML.gif](img/341013_5_En_2_Figi_HTML.gif)\
  \ *测试导航器*：创建、管理、运行和审查单元测试。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figj_HTML.gif](img/341013_5_En_2_Figj_HTML.gif)\
  \ *调试导航器*：检查程序执行过程中指定时间点的运行线程及相关的堆栈信息。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figk_HTML.gif](img/341013_5_En_2_Figk_HTML.gif)\
  \ *断点导航器*：通过指定触发条件等特性来微调断点，并在一个位置查看项目中的所有断点。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figl_HTML.gif](img/341013_5_En_2_Figl_HTML.gif)\
  \ *报告导航器*：查看构建历史记录。\n\n### 编辑项目文件\n\nXcode 中的大部分开发工作都在**编辑器**区域进行，该区域是工作区窗口中始终可见的主要区域。您最常使用的编辑器如下：\n\
  \n*   *源代码编辑器*：编写和编辑 Swift 源代码。\n*   *界面构建器*：以图形方式创建和编辑用户界面文件（参见图 2-3）。\n*   *项目编辑器*：查看和编辑如何构建应用，例如通过指定构建选项、目标架构和应用授权。\n\
  \n当您选择一个文件时，Xcode 会在相应的编辑器中打开它。在图 2-3 中，项目导航器中选中了 `Main.storyboard` 文件，该文件已在界面构建器中打开。\n\
  \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig3_HTML.jpg](img/341013_5_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3. Xcode 的界面构建器显示一个故事板文件\n\n该编辑器提供了三个控件：\n\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figm_HTML.gif](img/341013_5_En_2_Figm_HTML.gif)\
  \ 点击此按钮打开**标准编辑器**。您会看到一个单独的编辑器窗格，其中显示所选文件的内容。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Fign_HTML.gif](img/341013_5_En_2_Fign_HTML.gif)\
  \ 点击此按钮打开**助理编辑器**。您会看到一个单独的编辑器窗格，其中显示与标准编辑器窗格内容逻辑相关的内容。\n*   ![../images/341013_5_En_2_Chapter/341013_5_En_2_Figo_HTML.gif](img/341013_5_En_2_Figo_HTML.gif)\
  \ 点击此按钮打开**版本编辑器**。您会看到所选文件在一个窗格中与同一文件的另一个版本在第二个窗格中的差异。在配合源代码控制时使用。\n\n## 创建您的第一个\
  \ Swift Playground 程序\n\n既然您已经对 Xcode 有了一些了解，是时候编写您的第一个 Swift playground 程序，并开始理解\
  \ Swift 语言、Xcode 以及一些语法了。首先，您需要安装 Xcode。\n\n### 安装并启动 Xcode 10.2\n\nXcode 10.2 可从\
  \ Mac App Store 免费下载，如图 2-4 所示。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig4_HTML.jpg](img/341013_5_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4. Xcode 10.2 可从 Mac App Store 免费下载\n\n### 注意\n\n该软件包包含编写 iOS、watchOS、tvOS\
  \ 和 macOS 应用程序所需的一切。要在 iOS 或 macOS App Store 上发布应用，您需要申请 Apple Developer Program，并在准备提交时支付\
  \ $99。图 2-5 显示了 Apple Developer Program 网站 [`https://developer.apple.com/`](https://developer.apple.com/)。\n\
  \n现在您已安装 Xcode，让我们开始编写一个 Swift playground。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig5_HTML.jpg](img/341013_5_En_2_Fig5_HTML.jpg)\n\
  \n图 2-5. Apple Developer Program\n\n现在您已安装  \n\n启动 Xcode，然后点击“从 playground 开始”，如图\
  \ 2-6 所示。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig6_HTML.jpg](img/341013_5_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6. 创建您的第一个 Swift playground\n\n### 使用 Xcode 10.2\n\n在出现新的 Xcode 窗口后，请按照以下步骤操作：\n\
  \n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig7_HTML.jpg](img/341013_5_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7. 选择一个空白的 iOS playground 模板\n\n1.  选择一个空白的 iOS 模板，然后点击“下一步”，如图 2-7 所示。\n\
  2.  将 playground 命名为 `HelloWorld`，并创建在您选择的文件夹中，例如“文稿”或“桌面”。\n\nXcode 为您做了大量工作，并创建了一个包含可供使用代码的\
  \ playground 文件。它还会在 Xcode 编辑器中打开您的 playground 文件，以便您开始操作，如图 2-8 所示。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig8_HTML.jpg](img/341013_5_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8. playground 窗口\n\n现在您需要熟悉 Xcode playground IDE。让我们来看两个最常用的功能：\n\n*   编辑器区域\n\
  *   结果区域\n\n## Xcode Playground IDE：编辑器区域和结果区域\n\n编辑器区域是 Xcode playground IDE 的核心功能区——您在此将梦想变为现实。这里也是您编写代码的地方。编写代码时，您会注意到代码颜色会发生变化。有时，Xcode\
  \ 甚至会尝试为您自动补全单词。这些颜色具有含义，您在使用 IDE 时会逐渐明了。编辑器区域同样是您调试代码的地方。\n\n\n\n### 注意\n\n尽管我们已经提到过，但还是值得再说一遍：你将通过阅读本书学习\
  \ Swift 编程，但只有通过编写和调试代码，你才能*真正*学会 Swift。调试是开发者学习并成为优秀开发者的途径。\n\n让我们添加一行代码，来感受一下\
  \ Swift playgrounds 的强大之处。在文件末尾的第 4 行添加以下代码：\n\n```\nprint(str)\n```\n\n你一输入这行代码，Xcode\
  \ 就会自动执行它，并显示结果 `\"Hello, playground\\n\"`。\n\n当你编写 Swift 代码时，一切都很重要——逗号、大小写和括号。使编译器能够将代码编译成可执行应用的那套规则被称为*语法*。\n\
  \n第 3 行创建了一个名为 `str` 的字符串变量，并将 `\"Hello, playground\"` 赋值给该变量。\n\n第 4 行将 `str` 字符串变量打印到结果区域。\n\
  \n让我们通过将第 4 行改为 `print(stz)` 来创建一个语法错误，如图 2-9 所示。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig9_HTML.jpg](img/341013_5_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9. 被 Swift 编译器捕获到语法错误的 playground\n\n在 Swift 中，`print` 是一个函数，它会将其参数的内容打印在结果区域。当你输入代码时，结果区域会自动更新，显示你输入的每一行代码的结果。\n\
  \n现在，让我们通过正确拼写 `str` 变量来修复这个应用，如图 2-10 所示。\n\n![../images/341013_5_En_2_Chapter/341013_5_En_2_Fig10_HTML.jpg](img/341013_5_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10. 语法错误已修复\n\n请随意尝试并更改打印的文本。你也可以添加多个变量，或者将两个字符串拼接起来。祝你玩得开心！\n\n## 总结\n\n\
  在这一章中，你构建了你的第一个基本的 Swift playground。我们还介绍了一些对你理解 Swift 至关重要的新 Xcode 术语。\n\n你应该理解以下概念：\n\
  \n*   playground\n\n*   编辑器区域\n\n*   结果区域\n\n### 练习\n\n*   通过添加一行打印任意文本的代码来扩展你的\
  \ playground。\n\n"
- "# 3. 一切都与数据有关\n\n你可能知道，数据在计算机内存中是以 0 和 1 的形式存储的。然而，0 和 1 对开发者或应用用户来说并不实用，因此你需要了解程序如何使用数据，以及如何处理存储的数据。\n\
  \n在本章中，你将了解数据在计算机上是如何存储的，以及如何操作这些数据。然后，你将使用 playground 来了解更多关于数据存储的知识。\n\n## 编程中使用的数制\n\
  \n计算机处理信息的方式与人类不同。本节将介绍信息在 iPhone 和 iPad 等设备中存储、计数和操作的各种方式。\n\n### 位\n\n*位*被定义为计算机用于存储和操作数据的基本信息单位。一个位的值要么是\
  \ **0**，要么是 **1**。在计算机刚问世时，晶体管和微处理器还不存在。数据是通过真空管的开启或关闭来操作和存储的。如果真空管开启，该位的值就是 `1`；如果真空管关闭，该值就是\
  \ `0`。计算机能够存储和操作的数据量，直接取决于它拥有多少真空管。\n\n第一台被公认的计算机被称为电子数字积分计算机（ENIAC）。它占地超过 136 平方米，拥有\
  \ 18,000 个真空管。它的算力大约相当于你手中的科学计算器。\n\n如今，计算机使用晶体管来存储和操作数据。计算机处理器的性能取决于其芯片或 CPU 上集成了多少晶体管。与真空管类似，晶体管也有关闭或开启两种状态。当晶体管关闭时，其值为\
  \ `0`。若晶体管开启，其值为 `1`。在撰写本文时，为 iPhone XS、iPhone XS Max 和 iPhone XR 提供动力的苹果 A12 仿生处理器，是一款\
  \ 6 核 ARM 处理器，拥有大约 69 亿个晶体管，而第一款 iPad 的 A4 处理器仅有 1.49 亿个晶体管。图 3-1 展示了苹果最新的 iPhone\
  \ 处理器——A12 仿生。\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig1_HTML.jpg](img/341013_5_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1. 苹果专有的 A12 仿生处理器\n\n#### 摩尔定律\n\niPhone 或 iPad 处理器中的晶体管数量，直接关系到设备的处理速度、图形性能、内存容量以及设备可用的传感器（加速度计、陀螺仪）。晶体管越多，设备就越强大。\n\
  \n1965 年，英特尔联合创始人戈登·E·摩尔描述了处理器中晶体管的趋势。他观察到，从 1958 年到 1965 年，处理器中的晶体管数量每 18 个月翻一番，并且很可能“至少再持续\
  \ 18 个月”。这一观察结果后来广为人知，被称为摩尔定律，并且在超过 60 年的时间里被证明是准确的。\n\n### 注意\n\n摩尔定律也有不利的一面，你可能已经在钱包里感受到了。处理能力快速提升的问题在于，它会使技术迅速过时。所以，当你的\
  \ iPhone 两年合约结束时，市面上的新款 iPhone 的算力将是你签约时那台的两倍。这对大家来说是多么方便啊！\n\n### 字节\n\n字节是用于描述计算机信息存储的另一个单位。一个*字节*由八个位组成。一个位可以表示最多两种不同的值，而一个字节可以表示最多\
  \ 2⁸，即 256 种不同的值。一个字节可以包含从 `0` 到 `255` 的值。\n\n***二进制***数制用数字符号 `0` 和 `1` 来表示。为了说明数字\
  \ **71** 如何用二进制表示，你可以使用一个简单的八位（1 字节）表格，其中每一位都表示为 2 的幂次。要将字节值 **01000111** 转换为十进制，只需将开启的位相加，如表\
  \ 3-1 所示。\n\n表 3-1. 数字 71 表示为字节 (64 + 4 + 2 + 1)\n\n| 2 的幂次 | 2⁷ | 2⁶ | 2⁵ | 2⁴\
  \ | 2³ | 2² | 2¹ | 2⁰ |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n\
  | “开启”位的值 | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |\n| 实际位 | 0 | 1 | 0 | 0 | 0 | 1\
  \ | 1 | 1 |\n\n要在二进制中表示数字 **22**，请开启那些加起来等于 22 的位，即 **00010110**，如表 3-2 所示。\n\n\
  表 3-2. 数字 22 表示为字节 (16 + 4 + 2)\n\n| 2 的幂次 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ |\
  \ 2⁰ |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| “开启”位的值 | 128\
  \ | 64 | 32 | 16 | 8 | 4 | 2 | 1 |\n| 实际位 | 0 | 0 | 0 | 1 | 0 | 1 | 1 | 0 |\n\n\
  要在二进制中表示数字 **255**，请开启那些加起来等于 255 的位，即 **11111111**，如表 3-3 所示。\n\n表 3-3. 数字 255\
  \ 表示为字节 (128 + 64 + 32 + 16 + 8 + 4 + 2 + 1)\n\n| 2 的幂次 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³\
  \ | 2² | 2¹ | 2⁰ |\n| --- | --- | --- | --- | --- | --- | --- | --- | --- |\n| “开启”位的值\
  \ | 128 | 64 | 32 | 16 | 8 | 4 | 2 | 1 |\n| 实际位 | 1 | 1 | 1 | 1 | 1 | 1 | 1 | 1\
  \ |\n\n要在二进制中表示数字 **0**，请开启那些加起来等于 0 的位，即 **00000000**，如表 3-4 所示。\n\n表 3-4. 数字 0\
  \ 表示为字节\n\n| 2 的幂次 | 2⁷ | 2⁶ | 2⁵ | 2⁴ | 2³ | 2² | 2¹ | 2⁰ |\n| --- | --- | ---\
  \ | --- | --- | --- | --- | --- | --- |\n| “开启”位的值 | 128 | 64 | 32 | 16 | 8 | 4\
  \ | 2 | 1 |\n| 实际位 | 0 | 0 | 0 | 0 | 0 | 0 | 0 | 0 |\n\n\n\n### 十六进制\n\n通常，我们需要用计算机识别的另一种格式来表示字符，即十六进制格式。十六进制格式本质上就是二进制的“压缩”版本，用两个字符（例如\
  \ `00`、`2A` 或 `FF`）代替八个字符来表示一个字节（八位）。你在调试应用时会遇到十六进制数。*十六进制*系统是一种基数为 16 的计数系统。它使用\
  \ 16 个不同的符号：0 到 9 表示数值 0 到 9，A 到 F 表示数值 10 到 15。例如，十六进制数 `2AF3` 转换为十进制等于 `(2 × 16³)\
  \ + (10 × 16²) + (15 × 16¹) + (3 × 16⁰)`，即 10,995。你可以试试 Mac 计算器应用的“编程器”模式，看看十六进制如何与十进制和二进制相互关联。\n\
  \n图 3-2 展示了 ASCII 字符表。由于一个字节可以表示 256 个字符，这非常适合西方字符。例如，十六进制 `20` 表示一个空格。十六进制 `7D`\
  \ 表示一个右花括号（`}`）。你也可以通过 Mac 计算器应用的“编程器”模式看到这一点，因为它能将数值转换为 ASCII 字符。\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig2_HTML.jpg](img/341013_5_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2** ASCII 字符\n\n### Unicode\n\n用字节表示字符的方式在计算机领域一直运行良好，直到 20 世纪 90 年代左右，个人电脑在非西方国家广泛普及，而那里的语言包含超过\
  \ 256 个字符。Unicode 不再使用单字节字符集，而是最多可以使用四字节字符集。\n\n为了促进快速采用，前 256 个码点与 ASCII 字符表保持一致。Unicode\
  \ 可以有不同的字符编码。西方文本最常用的编码称为 UTF-8。其中的“8”表示每个字符使用的位数，因此它像 ASCII 一样，每个字符占用一个字节。\n\n\
  作为一名 iPhone 开发者，你可能会最常使用这种字符编码。\n\n## 数据类型\n\n既然我们已经讨论了计算机如何存储数据，接下来将介绍一个重要的概念，称为*数据类型*。人类通常可以直接查看数据及其使用上下文，来判断数据的类型以及如何使用它。但计算机需要被告知如何做这件事。因此，程序员需要告诉计算机它所接收的数据的类型。示例如下：`2\
  \ + 2 = 4`。\n\n计算机需要知道你想要将两个数字相加。在这个例子中，它们是整数。你可能会认为，即使是最不经意的观察者也能明白这两个数相加的含义，更不用说一台先进的计算机了。然而，iOS\
  \ 应用的用户通常会将数据存储为一系列字符，而不是一个计算式。例如，一条短信可能写着：“每个人都知道 2 + 2 = 4。”\n\n在这种情况下，这个例子是一个由一系列字符组成的*字符串*。数据类型就是对程序的一种声明，用于定义你想要存储的数据。*变量*用于存储你的数据，并在声明时关联一个数据类型。所有数据都存储在变量中，并且变量必须有一个变量类型。例如，在\
  \ Swift 中，以下是带有相关数据类型的变量声明：\n\n```\nvar x: Int = 10\nvar y: Int = 2\nvar z: Int\
  \ = 0\nvar submarineName: String = \"USS Nevada SSBN-733\"\n```\n\n数据类型不能相互混合。你不能执行以下操作：\n\
  \n```\nz = x + submarineName\n```\n\n混合数据类型会导致编译器警告或编译器错误，你的应用将无法运行。\n\n表 3-5 给出了\
  \ Swift 中基本数据类型的示例。\n\n**表 3-5** Swift 数据类型\n\n| 类型 | 示例 |\n| --- | --- |\n| `Int`\
  \ | 1, 5, 10, 100 |\n| `Float` 或 `Double` | 1.0, 2.222, 3.14159 |\n| `Bool` | `true`,\
  \ `false` |\n| `String` | `\"Star Wars\"`, `\"Star Trek\"` |\n| `ClassName` | `UIView`,\
  \ `UILabel` 等 |\n\n## 声明常量和变量\n\nSwift 的常量和变量必须在它们被使用之前声明。使用 `let` 关键字声明常量，使用 `var`\
  \ 关键字声明变量。常量在初始化后永远不会改变，而变量可以根据需要多次更改。\n\n声明常量和变量类型有两种方式：**显式** 和 **隐式**。\n\n**显式**声明变量类型的语法如下：\n\
  \n```\nvar name: type = value\nvar firstNumber: Int = 5\n```\n\n然而，声明类型往往不是必需的。隐式声明类型可以缩短代码，使其更易于输入并最终维护。\n\
  \n**隐式**声明变量类型的语法如下：\n\n```\nvar name = value\nvar firstNumber = 5\n```\n\n你大部分时间都可以使用隐式声明，因为\
  \ Swift 足够智能，能够根据你赋予变量的值来推断其类型。\n\n如果一个变量不会改变，你应该将其声明为*常量*。常量永远不会改变。常量以关键字 `let`\
  \ 开头，如下所示：\n\n```\nlet secondNumber = 10\n```\n\n为了更好地理解变量和常量是如何声明的，这里有两个例子：\n\n\
  ```\nlet maximumNumberOfStudents = 30\nvar currentNumberOfStudents = 5\n```\n\n\
  这段代码可以这样解读：“声明一个名为 `maximumNumberOfStudents` 的新常量，并赋值为 30。然后，声明一个名为 `currentNumberOfStudents`\
  \ 的新变量，并赋初始值 5。”\n\n在这个例子中，最大学生数被声明为常量，因为最大值永远不会改变。当前学生数被声明为变量，因为在学生注册情况变化后，这个值需要递增或递减。\n\
  \n你在程序中使用的大部分数据可以分为四种不同类型——布尔值、数字、字符串和对象。在本章的剩余部分，我们将讨论如何使用数字和对象数据类型。在第 4 章中，当你学习编写带决策功能的应用时，我们将更多地讨论布尔数据类型。\n\
  \n### 说明\n\n*本地化*你的应用是指编写应用的过程，以便用户能够以他们的母语购买和使用它。这个过程对于本书来说过于高级，但如果你从一开始就计划好，它就是一个简单的步骤。本地化你的应用可以极大地扩大潜在客户总数和应用的收入，而无需你为每种语言重写应用。务必本地化你的应用。这并不难做，而且可以轻松使购买人数翻倍或增加两倍。有关本地化应用的更多信息，请访问\
  \ Apple 的“为全世界构建应用”网站：[`https://developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/)。\n\
  \n\n\n## 可选类型\n\nSwift 引入了一个重要的概念，称为*可选类型*，开发者需要理解它。即使对于经验丰富的 Objective-C iOS 开发人员来说，这也是一个新概念。可选类型并非难以理解的话题，但需要一些时间来适应。\n\
  \n当某个值可能缺失时，可以使用可选类型。可选类型表示以下含义：\n\n*   一个变量可能被赋值，也可能未被赋值。\n\n有时，常量或变量可能没有值。清单 3-1\
  \ 展示了一个名为 `Int()` 的整数初始化器的示例，它可以将 `String` 值转换为 `Int`。\n\n```\n1 let myString =\
  \ \"42\"\n2 let someInteger = Int(myString)\n3 // someInteger 被推断为 \"Int?\" 类型，即\
  \ \"可选 Int\"\n清单 3-1\n将字符串转换为整数\n```\n\n常量 `someInteger` 被赋值为整数值 `42`。`someInteger`\
  \ 也被赋予了 `Int?` 类型。问号表示它是一个可选类型，意味着该变量或常量的值可能缺失。参见清单 3-2。\n\n```\n1 let myString\
  \ = \"Hello World\"\n2 let someInteger = Int(myString)\n3 // someInteger 的值现在缺失了\n\
  清单 3-2\n无法将字符串转换为整数\n```\n\n清单 3-2 中的第 2 行有一个问题。无法将 \"Hello World\" 从 `String` 转换为\
  \ `Int`。因此，`someInteger` 的值被认为是缺失的，即 `nil`，因为在第 2 行，`someInteger` 被推断为可选 `Int` 类型。\n\
  \n### 注意\n\nObjective-C 程序员可能曾使用 `nil` 从方法中返回一个对象，其中 `nil` 表示“缺少有效的对象”。这种做法适用于对象，但不适用于结构体、基础\
  \ C 类型或枚举值。Objective-C 方法通常会返回一个特殊值，比如 `NSNotFound`，来表示缺少有效的对象。这要求方法的调用者知道要检测的特殊值。可选类型指示了*任何类型*的值的缺失，而不需要使用特殊常量。\n\
  \n`Integer Int()` 初始化器可能无法返回值，因此该方法返回一个*可选* `Int`，而不是 `Int`。再次说明，问号表示其包含的值是可选的，意味着它可能包含*某个*\
  \ `Int` 值，也可能*完全没有值*。该值要么是某个 `Int`，要么什么都不是。\n\nSwift 的 `nil` 与 Objective-C 中的 `nil`\
  \ 不同。在 Objective-C 中，`nil` 是指向一个不存在对象的指针。而在 Swift 中，`nil` 不是指针，它表示值的缺失。任何类型的可选值都可以被设置为\
  \ `nil`，而不仅仅是对象类型。\n\n在第 4 章中，你将学习如何“解包”可选类型，并检查是否存在有效的对象。\n\n## 在 Playground 中使用变量\n\
  \n现在你已经了解了数据类型，让我们在 playground 中编写代码来两个数字相加并显示结果。\n\n1.  打开 Xcode 并选择“Get started\
  \ with a playground”，如图 3-3 所示。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig3_HTML.jpg](img/341013_5_En_3_Fig3_HTML.jpg)\n\
  \n    图 3-3\n\n    创建 playground\n\n2.  选择一个空白的 iOS 模板，然后点击 Next，如图 3-4 所示。最后，将你的\
  \ playground 命名为 **DataTypes** 并点击 Create。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig4_HTML.jpg](img/341013_5_En_3_Fig4_HTML.jpg)\n\
  \n    图 3-4\n\n    选择空白 iOS playground 模板\n\n3.  当你的 playground 创建完成后，代码中已经为你放入了两行代码，如图\
  \ 3-5 所示。\n\n    ![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig5_HTML.jpg](img/341013_5_En_3_Fig5_HTML.jpg)\n\
  \n    图 3-5\n\n    两行代码\n\n4.  向此 playground 中添加代码，如清单 3-3 所示。\n\n```\n1 import\
  \ UIKit\n\n3 var str = \"Hello, playground\"\n\n5 var firstNumber = 2\n6 var secondNumber\
  \ = 3\n\n8 var totalSum = firstNumber + secondNumber\n\n10 firstNumber = firstNumber\
  \ + 1\n11 secondNumber = secondNumber + 1\n\n13 totalSum = firstNumber + secondNumber\n\
  \n15 print(\"totalSum = \\(totalSum)\")\n清单 3-3\nPlayground 加法运算\n```\n\n你的 playground\
  \ 应如图 3-6 所示。\n\n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig6_HTML.jpg](img/341013_5_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n显示 Swift 代码结果的 Playground\n\nPlayground 的其中一个巧妙功能是，当你输入代码时，Swift 会立即执行你输入的那行代码，这样你就可以立即查看结果。\n\
  \nSwift 编程中使用的 `//` 使程序员能够为他们的代码添加注释。注释不会被你的应用程序编译，而是用作程序员或（更重要的）后续开发者的笔记。注释有助于原始开发者及后来的开发者理解应用程序是如何开发的。\n\
  \n有时，注释需要跨越多行，或者仅覆盖一行的一部分。这可以通过 `/*` 和 `*/` 来实现。`/*` 和 `*/` 之间的所有文本都被视为注释，不会被编译。\n\
  \n`print` 是一个函数，它可以接受一个参数并打印其内容。\n\n### 注意\n\n如果你的编辑器没有之前截图中看到的相同菜单或装订线（包含程序行号的左列），你可以在\
  \ Xcode 偏好设置中开启这些设置。你可以通过点击菜单栏中的 Xcode 菜单，然后选择 Preferences 来打开 Xcode 偏好设置。参见图 3-7。\n\
  \n![../images/341013_5_En_3_Chapter/341013_5_En_3_Fig7_HTML.jpg](img/341013_5_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n在装订线中添加行号\n\n## 总结\n\n在本章中，你学习了应用程序如何使用数据。你了解了如何初始化变量以及如何为它们赋值。我们解释道，当声明变量时，它们具有关联的数据类型，并且只有相同类型的数据才能赋值给变量。我们还讨论了变量和常量之间的区别，并介绍了可选类型。\n\
  \n在下一章中，我们将探索如何使用布尔逻辑来控制应用程序内的数据流。\n\n### 练习\n\n*   在一个 Swift playground 中编写代码，将两个整数相乘并显示结果。\n\
  \n*   在一个 Swift playground 中编写代码，计算一个浮点数的平方。显示得到的浮点数结果。\n\n*   在一个 Swift playground\
  \ 中编写代码，计算两个浮点数相减，并将结果存储为整数。注意，不会进行四舍五入。\n\n\n\n"
- "# 4. 决策、程序流程与应用设计\n\n作为 iOS 开发者的一大好处是，你可以让设备精确地按照你的指令行事，它们会不厌其烦地反复执行任务。这是因为 iOS\
  \ 设备不会在意昨天的辛劳，也不会被情绪左右。这些设备不需要拥抱。\n\n作为开发者也有一个缺点：你必须在设计应用时考虑到所有可能的结果。许多开发者喜欢拥有这种掌控感，他们乐于专注于应用中的诸多细节；然而，处理如此多的细节也可能令人沮丧。正如本书引言中提到的，开发应用需要付出代价，这个代价就是时间。你投入开发和调试的时间越多，就越能掌握所有细节，你的应用性能也会越好。要成为一名成功的开发者，你必须付出这个代价。\n\
  \n计算机的世界是非黑即白的，没有灰色地带。你的设备产生的结果，很多都基于真与假的条件。\n\n在本章中，你将学习计算机逻辑以及如何控制应用的流程。信息处理并得出结果是所有应用的核心。你的应用需要根据数值和条件来处理数据。为此，你需要理解计算机如何执行逻辑运算，并基于应用获取的信息来执行代码。\n\
  \n## 布尔逻辑\n\n*布尔逻辑*是一种用于逻辑运算的系统。布尔逻辑使用二元运算符（如 `AND` 和 `OR`）以及一元运算符 `NOT` 来判断你的条件是否满足。二元运算符需要两个操作数，一元运算符需要一个操作数。\n\
  \n我们刚引入的几个新术语听起来可能有些令人困惑；不过，你可能每天都会用到布尔逻辑。让我们看几个使用二元运算符 `AND` 和 `OR` 的布尔逻辑例子，这些例子来自父母有时会与青春期孩子进行的对话：\n\
  \n“如果你的房间收拾干净了，**而且**碗碟也收纳好了，今晚你就可以去看电影。”\n\n“如果你的房间收拾干净了，**或者**碗碟收纳好了，今晚你就可以去看电影。”\n\
  \n布尔运算符的结果要么是 `TRUE`，要么是 `FALSE`。在第 3 章中，我们简要介绍了布尔数据类型。定义为布尔类型的变量只能包含值 `TRUE` 和\
  \ `FALSE`。\n\n```\nvar seeMovies: Bool = false\n```\n\n在前面的例子中，`AND` 运算符需要两个操作数：一个位于\
  \ `AND` 的左侧，一个位于右侧。每个操作数都可以独立地被评估为 `TRUE` 或 `FALSE`。\n\n要使 `AND` 运算产生 `TRUE` 结果，`AND`\
  \ 的两边都必须为 `TRUE`。在第一个例子中，青少年必须打扫干净房间，并且把碗碟收纳好。只要其中一个条件为 `FALSE`，结果就是 `FALSE`——青少年无法去看电影。\n\
  \n要使 `OR` 运算产生 `TRUE` 结果，只需一个操作数为 `TRUE`，或者两个条件都为 `TRUE` 也可产生 `TRUE` 结果。在第二个例子中，只要卧室干净了，就能去看电影。\n\
  \n### 注意\n\n在 Objective-C 和其他编程语言中，布尔变量可以保存整数值；`0` 代表 `FALSE`，任何非零值代表 `TRUE`。Swift\
  \ 的强类型检查不允许这样做。在 Swift 中，布尔变量只能被赋值为 `true` 或 `false`。\n\n`NOT` 语句是一个一元运算符。它只需要一个操作数即可产生布尔结果。示例如下：\n\
  \n“你不可以去**看电影**。”\n\n这个例子只使用了一个操作数。`NOT` 运算符将 `TRUE` 操作数变为 `FALSE`，将 `FALSE` 操作数变为\
  \ `TRUE`。此处的结果是 `FALSE`。\n\n`AND`、`OR` 和 `NOT` 是三种常见的布尔运算符。有时，你需要使用更复杂的运算符。`XOR`、`NAND`\
  \ 和 `NOR` 是 iOS 开发者常用的其他运算。\n\n布尔运算符 `XOR` 表示*异或*。记住 `XOR` 运算符工作原理的一个简单方法是：`XOR`\
  \ 运算符*只有当且仅当一个参数为 TRUE（而非两个都为 TRUE）时*，才会返回 `TRUE` 结果。\n\nSwift 没有内置 `NAND` 和 `NOR`\
  \ 运算符，但只需知道它们分别表示“与非”和“或非”即可。在评估完 `AND` 或 `OR` 的参数后，直接对结果取反即可。\n\n### 真值表\n\n你可以使用一种叫做*真值表*的工具来帮助评估所有布尔运算符。真值表是逻辑学中用于评估布尔运算符的数学表格。在尝试确定布尔运算符的所有可能性时，它们非常有用。让我们看看\
  \ `AND`、`OR`、`NOT`、`XOR`、`NAND` 和 `NOR` 的一些常见真值表。\n\n在一个 `AND` 真值表中，有四种 `TRUE` 和\
  \ `FALSE` 的可能组合：\n\n- `TRUE AND TRUE` = `TRUE`\n- `TRUE AND FALSE` = `FALSE`\n-\
  \ `FALSE AND TRUE` = `FALSE`\n- `FALSE AND FALSE` = `FALSE`\n\n将这些组合放入真值表，结果如表 4-1\
  \ 所示。\n\n**表 4-1** AND 真值表\n\n| A | B | A AND B |\n| --- | --- | --- |\n| `TRUE`\
  \ | `TRUE` | `TRUE` |\n| `TRUE` | `FALSE` | `FALSE` |\n| `FALSE` | `TRUE` | `FALSE`\
  \ |\n| `FALSE` | `FALSE` | `FALSE` |\n\n一个 `AND` 真值表仅在其两个操作数都为 `TRUE` 时，才产生 `TRUE`\
  \ 结果。\n\n表 4-2 展示了一个 `OR` 真值表及其所有可能的操作数。\n\n**表 4-2** OR 真值表\n\n| A | B | A OR B\
  \ |\n| --- | --- | --- |\n| `TRUE` | `TRUE` | `TRUE` |\n| `TRUE` | `FALSE` | `TRUE`\
  \ |\n| `FALSE` | `TRUE` | `TRUE` |\n| `FALSE` | `FALSE` | `FALSE` |\n\n一个 `OR` 真值表在其一个或两个操作数为\
  \ `TRUE` 时，产生 `TRUE` 结果。\n\n表 4-3 展示了一个 `NOT` 真值表及其所有可能的操作数。\n\n**表 4-3** NOT 真值表\n\
  \n| A | NOT A |\n| --- | --- |\n| `TRUE` | `FALSE` |\n| `FALSE` | `TRUE` |\n\n`NOT`\
  \ *翻转比特位*，或者说取原始操作数布尔值的反值。\n\n表 4-4 展示了一个 `XOR`（或异或）真值表及其所有可能的操作数。\n\n**表 4-4**\
  \ XOR 真值表\n\n| A | B | A XOR B |\n| --- | --- | --- |\n| `TRUE` | `TRUE` | `FALSE`\
  \ |\n| `TRUE` | `FALSE` | `TRUE` |\n| `FALSE` | `TRUE` | `TRUE` |\n| `FALSE` | `FALSE`\
  \ | `FALSE` |\n\n运算符 `XOR` 仅当只有一个操作数为 `TRUE` 时，才产生 `TRUE` 结果。\n\n表 4-5 展示了一个 `NAND`\
  \ 真值表及其所有可能的操作数。\n\n**表 4-5** NAND 真值表\n\n| A | B | A NAND B |\n| --- | --- | ---\
  \ |\n| `TRUE` | `TRUE` | `FALSE` |\n| `TRUE` | `FALSE` | `TRUE` |\n| `FALSE` | `TRUE`\
  \ | `TRUE` |\n| `FALSE` | `FALSE` | `TRUE` |\n\n表 4-6 展示了一个 `NOR` 真值表及其所有可能的操作数。\n\
  \n**表 4-6** NOR 真值表\n\n| A | B | A NOR B |\n| --- | --- | --- |\n| `TRUE` | `TRUE`\
  \ | `FALSE` |\n| `TRUE` | `FALSE` | `FALSE` |\n| `FALSE` | `TRUE` | `FALSE` |\n\
  | `FALSE` | `FALSE` | `TRUE` |\n\n看待 `NAND` 和 `NOR` 运算符最简单的方式，就是分别对 `AND` 和 `OR`\
  \ 真值表中的结果直接取反。\n\n### 比较运算符\n\n在软件开发中，你可以使用*比较运算符*来比较不同的数据项。这些运算符会产生逻辑上的 `TRUE`\
  \ 或 `FALSE` 结果。表 4-7 展示了比较运算符列表。\n\n**表 4-7** 比较运算符\n\n| 运算符 | 定义 |\n| --- | ---\
  \ |\n| `>` | 大于 |\n| `<` | 小于 |\n| `>=` | 大于或等于 |\n| `<=` | 小于或等于 |\n| `==` | 完全等于\
  \ |\n| `!=` | 不等于 |\n\n### 注意\n\n如果你总是忘记大于号和小于号的方向，不妨用我们小学时学的一个小窍门：将大于号和小于号想象成鳄鱼的嘴巴，鳄鱼总是吃掉更大的数值。听起来可能有点傻，但很管用。\n\
  \n\n\n## 设计应用\n\n现在我们已经介绍了布尔逻辑和比较运算符，你可以开始设计自己的应用了。有时，向他人表达应用的全部或部分内容时，无需编写实际代码，这非常重要。\n\
  \n编写伪代码有助于开发者进行\"出声思考\"，并与其它开发者就代码中令人关注的部分进行头脑风暴。这有助于在编码开始之前分析问题和可能的解决方案。\n\n##\
  \ 伪代码\n\n**伪代码**指的是编写一种代码，它是对你试图解决的算法的高级描述。伪代码不包含编码所需的编程语法；但它确实表达了解决当前问题所需的算法。\n\
  \n伪代码可以手写在纸上（或白板上），也可以在计算机上输入。\n\n利用伪代码，你可以应用自己所了解的布尔数据类型、真值表和比较运算符。请参考清单 4-1 中的一些伪代码示例。\n\
  \n> **注意：** 伪代码用于表达和传授编程思想。伪代码无法执行！\n\n```\nx = 5\ny = 6\nisComplete = TRUE\nif\
  \ x < y\n{\n// 在此示例中，x 小于 6\n执行某些操作\n}\nelse\n{\n执行其他操作\n}\nif isComplete == TRUE\n\
  {\n// 在此示例中，isComplete 等于 TRUE\n执行某些操作\n}\nelse\n{\n执行其他操作\n}\n// 另一种检查 isComplete\
  \ == TRUE 的方法\nif isComplete\n{\n// 在此示例中，isComplete 为 TRUE\n执行某些操作\n}\n// 检查值是否为\
  \ false 的两种方法\nif isComplete == FALSE\n{\n执行某些操作\n}\nelse\n{\n// 在此示例中，isComplete\
  \ 为 TRUE，因此将执行 else 块\n执行其他操作\n}\n// 另一种检查 isComplete == FALSE 的方法\nif !isComplete\n\
  {\n执行某些操作\n}\nelse\n{\n// 在此示例中，isComplete 为 TRUE，因此将执行 else 块\n执行其他操作\n}\n清单 4-1\n\
  在 if-then-else 代码中使用条件运算符的伪代码示例\n```\n\n请注意，`!` 会翻转其所应用布尔值的状态，因此使用 `!` 可以将 `TRUE`\
  \ 变为 `FALSE`，并将 `FALSE` 变为 `TRUE`。这就是 Swift 中的逻辑非运算符。\n\n通常，需要组合多个比较测试。复合关系测试是指由一个或多个简单关系测试通过\
  \ `&&` 或 `||`（两个竖线字符）连接而成。\n\n`&&` 和 `||` 在 Swift 中分别代表逻辑与和逻辑或。清单 4-2 中的伪代码演示了逻辑与和逻辑或运算符。\n\
  \n```\nx = 5\ny = 6\nisComplete = TRUE\n// 使用逻辑与\nif x < y && isComplete == TRUE\n\
  {\n// 在此示例中，x 小于 6 且 isComplete == TRUE\n执行某些操作\n}\nif x < y || isComplete == FALSE\n\
  {\n// 在此示例中，x 小于 6。\n// 对于 OR 运算，只需一个操作数为 TRUE 即可得到 TRUE\n// 参见表 4-2 列 A OR 真值表\n\
  执行某些操作\n}\n// 另一种测试 TRUE 的方法\nif x < y && isComplete\n{\n// 在此示例中，x 小于 6 且 isComplete\
  \ == TRUE\n执行某些操作\n}\n// 另一种测试 FALSE 的方法\nif x < y && !isComplete\n{\n执行某些操作\n}\n\
  else\n{\n// isComplete == TRUE\n执行其他操作\n}\n清单 4-2\n使用 && 和 || 逻辑运算符的伪代码\n```\n\n\
  ## 可选类型与强制解包\n\n第 3 章介绍了可选类型。可选类型是可能不包含值的变量。由于可选类型可能不包含值，因此在访问它们之前需要检查一下。\n\n首先，你使用一个\
  \ `if` 语句，通过将可选类型与 `nil` 进行比较，来判断该可选类型是否包含值。如果可选类型有值，则被视为\"不等于\" `nil`，如清单 4-3 所示。\n\
  \n清单 4-3 中的第 4 行检查可选变量是否不等于 `nil`。在此示例中，`someInteger` 的值为空，并且等于 `nil`，因此执行了第 8 行的代码。\n\
  \n```\n1 var myString = \"Hello world\"\n2 let someInteger = Int(myString)\n3 //\
  \ someInteger 的值现在为空\n4 if someInteger != nil {\n5     print(\"someInteger 包含一个整数值。\"\
  )\n6 } else {\n7     print(\"someInteger 不包含整数值。\")\n8 }\n清单 4-3\n检查可选类型是否有值\n```\n\
  \n既然你已经添加了检查以确保可选类型有值或没有值，你可以通过在可选名称的末尾添加感叹号（`!`）来访问其值。`!` 意味着你已经检查过并确保可选变量有值，然后使用它。这称为可选值的**强制解包**。请参见清单\
  \ 4-4。\n\n```\n1 var myString = \"42\"\n2 let someInteger = Int(myString)\n3 //\
  \ someInteger 包含一个值\n4 if someInteger != nil {\n5     print(\"someInteger 包含一个值。它的值是：\\\
  (someInteger!)\")\n6 } else {\n7     print(\"someInteger 不包含整数值。\")\n8 }\n清单 4-4\n\
  强制解包\n```\n\n> **注意：** 在 `print` 函数中显示变量内容的语法是 `\\()`。\n\n### 可选绑定\n\n你可以通过一个操作来判断可选类型是否包含值，如果包含，则将该值赋给一个临时常量或变量。（参见清单\
  \ 4-5。）这称为**可选绑定**。可选绑定可以与 `if` 和 `while` 语句一起使用，以判断可选类型是否有值，如果有，则将该值提取到一个常量或变量中。\n\
  \n```\n1 let someOptional: String? = \"hello world\"\n2 if let constantName = someOptional\
  \ {\n3     print(\"constantName 包含一个值。它的值是：\\(constantName)\")\n4 }\n清单 4-5\n可选绑定到常量的语法\n\
  ```\n\n如果你想将可选值赋给一个变量以便操作该变量，你可以将可选值赋给 `var`，如清单 4-6 所示。\n\n```\n1 let someOptional:\
  \ String? = \"hello world\"\n2 if var variableName = someOptional {\n3    variableName\
  \ += \"!\"            // 在字符串末尾追加一个 \"!\"\n4     print(\"variableName 包含一个值。它的值是：\\\
  (variableName)\")\n5 }\n清单 4-6\n可选绑定到变量的语法\n```\n\n注意在清单 4-5 和 4-6 中，你不需要使用 `!`\
  \ 进行强制解包。如果转换成功，变量或常量会用可选类型中包含的值进行初始化，因此不需要 `!`。\n\n逻辑非运算符和强制解包运算符都使用 `!` 字符，这可能会造成混淆。只需记住，逻辑非运算符位于变量或常量之前，而强制解包运算符位于可选常量或变量之后。\n\
  \n### 隐式解包可选类型\n\n在你的代码中，有时你知道某个可选类型始终会有一个值。在这种情况下，移除每次访问可选类型时都需要检查和解包的过程会非常有用。这类可选类型称为**隐式解包可选类型**。\n\
  \n由于程序的结构，你知道可选类型有值，因此可以允许该可选类型在需要访问时被安全地自动解包。你不必在每次使用时都加 `!`；相反，你在声明可选类型时，在类型后面加上\
  \ `!`。清单 4-7 展示了可选 `String` 和隐式解包可选 `String` 之间的对比。\n\n```\n1 var optionalString:\
  \ String? = \"My optional string.\"\n2 var forcedUnWrappedString: String = optionalString!\
  \ // 需要 !\n\n4 var nextOptionalString: String! = \"An implicitly unwrapped optional.\"\
  \n5 var implicitUnwrappedString: String = nextOptionalString // 不需要 !\n清单 4-7\n\
  可选 String 与隐式解包可选 String 的对比\n```\n\n\n\n### 流程图\n\n在之前章节讨论的设计需求定稿后，你可以为应用创建伪代码段，以解决复杂的开发问题。**流程图**是绘制算法的一种常见方法。算法由不同类型的方框通过线条和箭头连接而成。开发者经常使用流程图来直观地表示代码，如图\
  \ 4-1 所示。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig1_HTML.jpg](img/341013_5_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 示例流程图，展示常用图形及其对应名称\n\n流程图必须始终有开始和结束。分支绝不能没有结束节点。这有助于开发者确保代码中的所有分支都已处理妥当，并能干净地结束执行。\n\
  \n### 设计并绘制示例应用的流程图\n\n我们已经介绍了大量关于决策和程序流程的知识。现在该做程序员最擅长的事了：编写应用！\n\n你要编写的应用会生成一个\
  \ 0 到 100 之间的随机数，并要求用户猜这个数字。用户必须不断猜测，直到猜中为止。当用户猜中正确答案时，程序会询问他们是否想再玩一次。\n\n### 应用设计\n\
  \n根据你的设计需求，可以为应用绘制一个流程图。见图 4-2。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig2_HTML.jpg](img/341013_5_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 猜随机数应用的流程图\n\n审视图 4-2，你会注意到，当流程图中的逻辑块接近末尾时，会有箭头指回之前的某个区域，并重复该区域，直到满足某个条件。这被称为**循环**。它让你能够重复执行程序逻辑的某些部分，而无需反复重写这些代码段，直到某个条件成立。\n\
  \n### 使用循环重复程序语句\n\n**循环**是一系列程序语句，这些语句只需定义一次，但可以连续重复执行多次。循环可以重复指定的次数（计数控制），也可以重复直到某个条件发生（条件控制）。\n\
  \n在本节中，你将学习计数控制循环和条件控制循环。你还将学习如何用布尔逻辑控制循环。\n\n#### 计数控制循环\n\n计数控制循环重复执行指定的次数。在 Swift\
  \ 中，这就是**for-in 循环**。`for-in`循环会遍历序列或集合中的元素，例如数字范围、数组中的元素或字符串中的字符。见代码清单 4-8。\n\n\
  ```\nfor i in 0..<10 {\n    print(\"索引值为：\\(i)\")\n}\n//....继续\n代码清单 4-8. 计数控制循环\n\
  ```\n\n代码清单 4-8 中的循环将执行 10 次。“半开区间运算符”`..<`会返回一个从“下界”值 0 开始，到“上界”值 10 结束（但不包括 10）的值序列，因此`i`的取值在\
  \ 0 到 9 之间。\n\n另一种方式是，代码清单 4-9 通过使用“闭区间运算符”`...`来打印 10 乘法表的前 10 项。该运算符会返回一个从下界值\
  \ 1 开始，到上界值 10 结束（包括 10）的值序列，因此`i`的取值在 1 到 10 之间。\n\n```\nfor i in 1...10 {\n  \
  \  print(\"\\(i) 乘以 10 等于 \\(i * 10)\")\n}\n//....继续\n代码清单 4-9. 使用闭区间运算符的计数控制循环\n\
  ```\n\n#### 条件控制循环\n\nSwift 能够重复执行循环，直到某个条件发生变化。你可能希望重复执行某段代码，直到某个变量达到假（false）条件。这种类型的循环称为`while`循环。`while`循环是一种控制流语句，它基于给定的布尔条件重复执行。你可以将`while`循环看作是一个重复执行的`if`语句。见代码清单\
  \ 4-10。\n\n```\nvar isTrue = true\nwhile isTrue {\n    // 执行某些操作\n    isTrue = false\
  \ // 某个条件发生，将 isTrue 设置为 FALSE\n}\n//....继续\n代码清单 4-10. 一个重复执行的 Swift while 循环\n\
  ```\n\n代码清单 4-10 中的`while`循环首先检查变量`isTrue`是否为`true`——确实是——于是进入`{循环体}`并执行代码。最终，某个条件导致`isTrue`变为`false`。在循环体内的所有代码执行完毕后，会再次检查条件（`isTrue`），然后循环重复执行。这个过程会一直重复，直到变量`isTrue`被设置为`false`。\n\
  \n#### 无限循环\n\n无限循环会无休止地重复执行，其原因可能是循环没有终止条件，或者循环的终止条件永远无法满足。\n\n通常，无限循环会导致应用无响应。这通常是代码或逻辑中存在\
  \ bug 的副作用。\n\n代码清单 4-11 是一个因终止条件永远无法满足而导致的无限循环示例。变量`x`在每次`while`循环迭代时都会被检查，但永远不会等于\
  \ 5。变量`x`将始终是偶数，因为它被初始化为 0，并且在循环中每次递增 2。这将导致循环无休止地重复。见代码清单 4-12。\n\n```\nwhile true\
  \ {\n    // 永远执行某些操作\n}\n//....继续\n代码清单 4-12. 由永远无法满足的终止条件导致的无限循环示例\n```\n\n```\n\
  var x = 0\nwhile x != 5 {\n    // 执行某些操作\n    x = x + 2\n}\n//....继续\n代码清单 4-11.\
  \ 一个无限循环示例\n```\n\n\n\n## 用 Swift 编写示例应用\n\n根据你的需求和所学知识，尝试用 Swift 编写一个随机数生成器。\n\n\
  要编写这个应用，你需离开 Playground 并将其作为 Mac 控制台应用来实现。遗憾的是，目前 Playground 无法让你与运行中的应用交互，因此你无法捕捉键盘输入。\n\
  \n你的 Swift 应用将通过命令行运行，因为它会要求用户猜一个随机数。\n\n1. 打开 Xcode 并选择“创建新的 Xcode 项目”。选择 **命令行工具**\
  \ macOS 项目（如图 4-3 所示），然后点击“下一步”。\n\n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig3_HTML.jpg](img/341013_5_En_4_Fig3_HTML.jpg)\n\
  \n   图 4-3. 新建一个命令行工具 macOS 项目\n\n2. 将你的项目命名为 **RandomNumber**（见图 4-4）。确保“语言”下拉菜单选择的是\
  \ Swift，然后点击“下一步”。将项目保存在硬盘上你喜欢的任意位置，然后点击“创建”。\n\n   ![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig4_HTML.jpg](img/341013_5_En_4_Fig4_HTML.jpg)\n\
  \n   图 4-4. `RandomNumber` 的项目选项\n\n3. 打开 `main.swift` 文件。写入代码清单 4-13 中的代码。\n\n\
  ```swift\n1 //\n2 //  main.swift\n3 //  RandomNumber\n4 //\n\n6 import Foundation\n\
  \n8 var randomNumber = 1\n9 var continueGuessing = true\n10 var keepPlaying = true\n\
  11 var input = \"\"\n\n13 while keepPlaying {\n14     // 获取一个 0 - 100 之间的随机数\n15\
  \     randomNumber = Int(arc4random_uniform(101))\n16     print(\"要猜的随机数是：\\(randomNumber)\"\
  )\n\n18     while continueGuessing {\n19         print(\"选择一个 0 到 100 之间的数字。\")\n\
  20         // 获取键盘输入，并去除换行符\n21         input = String(bytes: FileHandle.standardInput.availableData,\
  \ encoding: .utf8)!\n22         input = input.trimmingCharacters(in: .whitespacesAndNewlines)\n\
  \n24         if let userGuess = Int(input) {\n25             if userGuess == randomNumber\
  \ {\n26                 continueGuessing = false\n27                 print(\"猜对了！\"\
  )\n28             } else if userGuess > randomNumber {\n29                 // 用户猜得太高了\n\
  30                 print(\"你猜得太高了！\")\n31             } else{\n32              \
  \   // 无需检查 userGuess < randomNumber，因为只能是这个情况\n33                 print(\"你猜得太低了！\"\
  )\n34             }\n35         } else {\n36             print(\"无效的猜测，请重试。\")\n\
  37         }\n38     }\n\n40     print(\"再玩一次？Y 或 N\")\n41     input = String(bytes:\
  \ FileHandle.standardInput.availableData, encoding: .utf8)!\n42     input = input.trimmingCharacters(in:\
  \ .whitespacesAndNewlines)\n\n44     if input == \"N\" || input == \"n\" {\n45 \
  \        keepPlaying = false\n46     }\n\n48     continueGuessing = true\n49 }\n\
  ```\n\n代码清单 4-13 随机数生成器应用的源代码\n\n在代码清单 4-13 中，有一些我们之前未讨论过的新代码。第一行新代码（第 15 行）如下：\n\
  \n```swift\nrandomNumber = Int(arc4random_uniform(101))\n```\n\n这一行会生成一个 0 到 100\
  \ 之间的随机数。`arc4random_uniform()` 是一个返回随机数的函数。\n\n下一行新代码位于第 21 行：\n\n```swift\ninput\
  \ = String(bytes: FileHandle.standardInput.availableData, encoding: .utf8)!\n```\n\
  \n这使你能够获取用户的键盘输入。我们将在后续章节中讨论这种语法。\n\n下一行新代码位于第 24 行：\n\n```swift\nif let userGuess\
  \ = Int(input)\n```\n\n`Int` 接受一个字符串初始化器并将其转换为整数。\n\n### 嵌套的 `if` 语句和 `else if`\
  \ 语句\n\n有时，需要嵌套 `if` 语句。这意味着你需要在已有的 `if` 语句内部嵌套 `if` 语句。此外，有时需要在 `if` 语句的 `else`\
  \ 部分的第一步进行一个比较。这被称为 `else if` 语句（回想代码清单 4-13 中的第 28 行）。\n\n```swift\nelse if userGuess\
  \ > randomNumber\n```\n\n### 移除多余字符\n\n代码清单 4-13 中的第 22 行如下：\n\n```swift\ninput\
  \ = input.trimmingCharacters(in: .whitespacesAndNewlines)\n```\n\n读取键盘输入可能会有些棘手。在本例中，它会在字符串末尾留下一个残余字符\
  \ `\\n`，你需要将其移除。这是一个*换行*符，当用户按下键盘上的 Return 键时会产生。`trimmingCharacters(in: .whitespacesAndNewlines)`\
  \ 方法会返回一个新字符串，其中原字符串开头或结尾的任意空格或换行符都被移除。\n\n### 通过重构改进代码\n\n通常，在代码运行成功后，你会检查代码并找到更高效的编写方式。重写代码使其更高效、更易维护和更易读的过程称为*代码重构*。\n\
  \n当你审查 Swift 代码时，经常会注意到可以删除一些不必要的代码。\n\n> **注意**：作为开发者，我们发现最好的代码行就是你无需编写的那一行——代码越少，调试和维护的工作量就越少。\n\
  \n### 运行应用\n\n要运行你的应用，请点击 Swift 项目屏幕左上角的“播放”按钮。见图 4-5。（注意：如果你在低于 10.14.4 版本的 macOS\
  \ 上运行 Xcode 10.2，你首先需要安装适用于命令行工具的 Swift 5 运行时支持，该支持可从 [`https://developer.apple.com/download/more/`](https://developer.apple.com/download/more/)\
  \ 下载。）\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig5_HTML.jpg](img/341013_5_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5. Swift 随机数生成器应用的控制台输出\n\n> **注意**：如果运行应用时未看到输出控制台，请确保在编辑器右上角和右下角选择了相同的选项（选择“视图”➤“调试区”➤“激活控制台”）。\n\
  \n\n\n### 设计要求\n\n正如第 1 章所讨论的，软件开发生命周期中最昂贵的环节是编写代码。而最便宜的环节则是收集应用程序的需求；然而，后者在软件开发中恰恰是最容易被忽视且运用最少的。\n\
  \n设计需求通常始于向客户、用户和/或利益相关者询问应用程序应如何工作、应解决哪些问题。\n\n对于应用程序而言，需求可以包括长篇或短篇的叙述性描述、屏幕设计图稿以及公式。在编码开始前，打开文字处理软件修改需求和屏幕设计图稿，远比修改一个\
  \ iOS 应用要容易得多。以下是一个 iPhone 手机银行应用某个视图的设计需求：\n\n- *视图*：账户视图。\n- *描述*：显示用户拥有的账户列表。账户列表将包含以下部分：商业账户、个人账户、汽车贷款、个人退休账户以及房屋净值贷款。\n\
  - *单元格*：每个单元格将包含账户名称、账户后四位数字、可用余额和当前余额。\n\n一图胜千言。屏幕设计图稿对开发者和用户都很有帮助，因为它们能展示视图完成后的样子。有许多工具可以快速设计界面模型，比如\
  \ Sketch 和 OmniGraffle。有关使用 OmniGraffle 生成的、用于设计需求的屏幕设计图稿示例，请参见图 4-6。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig6_HTML.jpg](img/341013_5_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 使用 OmniGraffle 和 Ultimate iPhone Stencil 插件绘制的移动银行应用屏幕设计图稿。此设计图稿最初于 2010\
  \ 年为 Woodforest 银行应用制作。\n\n许多开发者认为设计需求耗时过长且不必要。事实并非如此。图 4-6 的“账户”屏幕上展示了大量信息。许多业务规则决定了信息如何展示给用户，以及在出现问题时所有错误处理的方式。在设计应用时，在开发过程初期就与所有业务利益相关者合作，对于第一次就做对至关重要。\n\
  \n图 4-7 展示了所有利益相关者参与应用开发的例子。从一开始就让所有利益相关者参与到每个视图中，将能消除多次重写和应用错误。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig7_HTML.jpg](img/341013_5_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7. 2015 年 App Store 上线的 Woodforest 移动银行应用；将此图与应用需求中的“账户”屏幕（图 4-6）进行比较\n\n\
  此外，Apple 建议开发人员至少将 50%的开发时间用于用户界面的设计和开发。\n\nBalsamiq 也提供了出色的工具来规划你的 iOS 应用外观。参见图\
  \ 4-8。\n\n![../images/341013_5_En_4_Chapter/341013_5_En_4_Fig8_HTML.jpg](img/341013_5_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8. Balsamiq.com 网站，用于创建线框图模型\n\n## 总结\n\n本章涵盖了关于如何控制应用程序的大量重要信息；程序流程和决策制定对每一个\
  \ iOS 应用都至关重要。请确保你已经完成了本章中的 Swift 示例。你可能会浏览这些示例并认为无需实际编写这个应用就能理解一切。这将是一个致命的错误，会阻碍你成为一名成功的\
  \ iOS 开发者。你必须花时间编写这个示例的代码。开发者通过实践学习，而不是通过阅读。\n\n本章中的术语很重要。你应该能够描述以下内容：\n\n- `AND`\n\
  - `OR`\n- `XOR`\n- `NAND`\n- `NOR`\n- `NOT`\n- 真值表\n- 否定\n- 所有比较运算符\n- 应用需求\n- 逻辑与\
  \ (`&&`)\n- 逻辑或 (`||`)\n- 可选类型与强制解包\n- 可选绑定\n- 隐式解包可选类型\n- 流程图\n- 循环\n- 计数控制循环\n\
  - For 循环\n- 条件控制循环\n- 无限循环\n- `While` 循环\n- 嵌套 `if` 语句\n- 代码重构\n\n### 练习\n\n- 扩展随机数生成器应用，使其在控制台打印出用户在猜中随机数之前尝试了多少次。\n\
  - 扩展随机数生成器应用，使其在控制台打印出用户运行该应用的次数。当用户退出应用时，将此数值打印到控制台。\n\n"
- "# 使用 Swift 进行面向对象编程\n\n在过去的 17 年里，编程界一直专注于面向对象编程（OOP）这一开发范式。大多数现代开发环境和语言都实现了 OOP。简而言之，OOP\
  \ 构成了你今天所开发一切的基础。\n\n你可能会问自己，既然 OOP 是当今主要的开发风格，为什么我们直到第 5 章才介绍使用 Swift 进行 OOP。简单的答案是，对于新手开发者来说，这并非一个容易理解的概念。本章将详细介绍\
  \ OOP 的不同方面，以及它们如何影响你的开发工作。\n\n在你的应用程序中正确实施 OOP 需要进行一些前期规划，但在项目的整个生命周期中，你将因此节省大量时间。OOP\
  \ 已经改变了开发的方式。在本章中，你将学习什么是 OOP。本书第一章已经初步讨论了 OOP，但本章将对其进行更深入的探讨。你将重新审视什么是对象，以及它们如何与你现实世界中的物理对象相关联。你将探究什么是类，以及它们如何与对象相关联。你还将学习在规划类时需要采取的步骤，以及可以用来完成这些步骤的一些可视化工具。当你阅读完本章并完成了练习后，你将更好地理解什么是\
  \ OOP，以及为什么它对你作为开发者来说是必要的。\n\n起初，对象和面向对象编程可能看起来难以理解，但希望随着你深入学习本章内容，它们会开始变得有意义。\n\
  \n\n\n## 对象\n\n正如第 1 章所述，面向对象编程基于对象。关于对象的部分讨论将是回顾，但也会更深入探讨。*对象*是任何可以被操作的事物。为了更好地理解编程中的对象是什么，你首先来看一下周围物理世界中的一些物品。一个物理对象可以是你周围任何可以触摸或感知到的东西。以电视机为例。电视机的一些特征包括类型（等离子、液晶或显像管）、尺寸（40\
  \ 英寸）、品牌（索尼或 Vizio）、重量和价格。电视机还具有功能。它们可以打开或关闭。你可以切换频道、调节音量以及改变亮度。\n\n其中一些特征和功能是电视机独有的，另一些则不是。例如，你家中的沙发可能不具备与电视机相同的特征。你可能会想了解关于沙发的不同信息，例如材质类型、座位容量和颜色。沙发可能只有少数几个功能，例如转换成床或调节靠背。\n\
  \n现在我们来专门讨论与编程相关的对象。对象是一个特定的条目。它可以描述像书这样的物理事物，也可以是像应用程序窗口这样的东西。对象具有属性和方法。属性描述了关于对象的某些特定信息，例如位置、颜色或名称。相反，方法描述了对象可以执行的动作，例如关闭或重新计算。在这个例子中，一个`TV`对象将拥有`type`、`size`和`brand`属性，而一个`Couch`对象将拥有诸如`color`、`material`和`comfort\
  \ level`等属性。用编程术语来说，属性是对象的一部分的变量。例如，一台电视会使用字符串变量来存储品牌，并使用整数来存储高度。\n\n对象还具有程序员可以用来控制它们的命令。这些命令被称为*方法*。方法是其他对象与特定对象交互的方式。例如，对于电视机来说，方法可以是遥控器上的任何一个按钮。这些按钮中的每一个都代表一种你可以与电视机交互的方式。方法可以并且经常被用于改变属性的值，但方法本身不存储任何值。\n\
  \n如第 1 章所述，对象具有*状态*，这基本上是在任何给定时间点对对象的快照。一个状态就是所有属性在特定时间点的值。\n\n在第 8 章中，你将创建一个书店应用程序。一家书店包含许多不同的对象。它包含书本对象，这些对象具有诸如`title`、`author`、`page\
  \ count`和`publisher`等属性。它还包括杂志，其属性如`title`、`issue`、`genre`和`publisher`。书店还有一些非物质对象，例如`销售`。一个`Sale`对象将包含关于所购书籍、客户、支付金额和支付类型的信息。一个`Sale`对象可能还有一些方法，用于计算税费、打印收据或作废该笔销售。一个`Sale`对象并不代表一个有形物体，但它仍然是一个对象，并且对于创建一个高效的书店来说是必需的。\n\
  \n因为对象是面向对象编程的基础，所以理解对象以及如何与之交互非常重要。本章剩余部分你将学习对象及其一些特征。\n\n## 什么是类\n\n我们讨论面向对象编程不能不讨论什么是类。一个类定义了对象将拥有哪些属性和方法。一个类基本上就是一个模具，可以用来创建具有相似特征的对象。某个特定类的所有对象将拥有相同的属性（请注意，属性的值很多时候是不同的）和相同的方法。这些属性的值会因对象而异。\n\
  \n类类似于动物世界中的物种。一个物种不是个别的动物，但它确实描述了这个动物的许多相似特征。为了更深入地理解类，让我们看一下自然界中类的例子。`Dog`类具有所有狗都共同拥有的许多属性。例如，一只狗可能有名字、年龄、主人、体重和最喜欢的活动。一个属于某个特定类的对象被称为该类的一个*实例*。如果你查看图\
  \ 5-1，可以看到类与实际作为该类实例的对象之间的区别。例如，`来西`是`Dog`类的一个实例。在图 5-1 中，你可以看到一个具有四个属性（`品种`、`年龄`、`主人`和`最喜欢的活动`）的`Dog`类。在现实生活中，一只狗会有更多的属性，但这四个是用于此演示的。\n\
  \n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig1_HTML.png](img/341013_5_En_5_Fig1_HTML.png)\n\
  \n图 5-1. 一个类及其各个对象的示例\n\n## 规划类\n\n规划你的类是你开发过程中最重要的步骤之一。虽然事后回过头来添加属性和方法是可能的（而且你肯定需要这样做），但了解你的应用程序中将使用哪些类以及它们将拥有哪些基本属性和方法是至关重要的。在过程开始时花时间规划你的不同类非常重要。\n\
  \n\n\n### 规划属性\n\n让我们来看看书店示例和一些你需要创建的类。首先，创建一个 `Bookstore` 类很重要。一个 `Bookstore` 类包含了每个\
  \ `Bookstore` 对象所存储信息的蓝图，例如书店的名称、地址、电话号码和徽标（见图 5-2）。将这些信息放在类中，而不是在你的应用程序中进行硬编码，将使你将来能够轻松地更改这些信息。你将在本章后面了解使用面向对象方法论的原因。此外，如果你的书店取得了巨大的成功，并且你决定再开一家，你将做好准备，因为你可以创建另一个\
  \ `Bookstore` 类的对象。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig2_HTML.png](img/341013_5_En_5_Fig2_HTML.png)\n\
  \n图 5-2. Bookstore 类\n\n我们还来规划一个 `Customer` 类（见图 5-3）。注意名称是如何被分解为 `名` 和 `姓` 的。在你的项目中，有时你可能只想使用客户的名，如果没有提前规划，将名和姓分离开会很困难。假设你想给客户寄一封信，告知他们即将举行的促销活动。你肯定不希望问候语写成“亲爱的\
  \ John Doe”。写成“亲爱的 John”会显得更个性化。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig3_HTML.png](img/341013_5_En_5_Fig3_HTML.png)\n\
  \n图 5-3. Customer 类\n\n你还会注意到地址是如何被分解成不同部分，而不是全部组合在一起的。`地址行 1`、`地址行 2`、`城市`、`州`\
  \ 和 `邮编` 是分开的。这一点很重要，并且会在你的应用程序中使用到。让我们回到你打算寄给客户关于即将举行促销活动的信函上。\n\n你可能不想把它寄给所有居住在不同州的客户。通过分离地址，你可以轻松地筛选出那些你不想包含在邮寄名单中的客户。\n\
  \n我们还向 `Customer` 类添加了 `喜爱书籍类型` 这个属性。添加这个属性是为了向你展示如何在每个类中保存许多不同类型的信息。如果你有一本新的悬疑小说要出版，并且想发送一封电子邮件提醒那些对悬疑小说特别感兴趣的客户，那么这个字段可能会派上用场。通过存储这类信息，你将能够有针对性地定位客户群中的不同部分。\n\
  \n创建书店时，还需要一个 `Book` 类（见图 5-4）。你将存储关于这本书的信息，例如作者、出版商、类型、页数和版次（如果有多个版本的话）。`Book`\
  \ 类还会包含这本书的价格。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig4_HTML.png](img/341013_5_En_5_Fig4_HTML.png)\n\
  \n图 5-4. Book 类\n\n你可以再添加一个名为 `Sale` 的类（见图 5-5）。这个类比之前讨论的其他类更抽象，因为它描述的不是一个具体的对象。你会注意到我们向\
  \ `Sale` 类添加了对一个客户和一本书的引用。因为 `Sale` 类将跟踪书籍的销售情况，你需要知道哪本书被卖给了哪个客户。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig5_HTML.png](img/341013_5_En_5_Fig5_HTML.png)\n\
  \n图 5-5. Sale 类\n\n现在你了解了这些类的属性，接下来需要看看每个类将拥有的一些方法。\n\n### 规划方法\n\n你现在不会添加所有的方法，但是在开始时规划得越多，以后就越容易。并非你所有的类都会有很多方法。有些类可能根本没有方法。\n\
  \n> **注意：** 在规划方法时，请记住让它们专注于特定的任务。方法越具体，就越有可能被重用。\n\n目前，你不会向 `Book` 类或 `Bookstore`\
  \ 类添加任何方法。你将专注于其他两个类。\n\n对于 `Customer` 类，你将添加方法来列出该客户的购买历史。未来可能还需要添加其他方法，但现在你只添加这一个。你完成的\
  \ `Customer` 类图应该如图 5-6 所示。靠近底部的线将属性与方法分开。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig6_HTML.png](img/341013_5_En_5_Fig6_HTML.png)\n\
  \n图 5-6. 完成的 Customer 类\n\n对于 `Sale` 类，我们添加了三个方法。我们添加了 `信用卡扣款`、`打印发票` 和 `结账`（见图\
  \ 5-7）。目前，你不需要知道如何实现这些方法，但你需要知道你计划将它们添加到你的类中。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig7_HTML.png](img/341013_5_En_5_Fig7_HTML.png)\n\
  \n图 5-7. 完成的 Sale 类\n\n现在你已经完成了对类以及将添加到其中的方法的规划，你便有了一个统一建模语言（UML）图的雏形。基本上，这是开发人员用来规划其类、属性和方法的一种图表。通过创建这样的图表来开始你的开发过程，从长远来看将对你大有裨益。对\
  \ UML 图的深入讨论超出了本书的范围。如果你想了解关于这个主题的更多信息，`smartdraw.com` 提供了非常出色的详细概述；请参见 [`www.smartdraw.com/uml-diagram/`](http://www.smartdraw.com/uml-diagram/)。Omnigroup\
  \ ([`www.omnigroup.com`](http://www.omnigroup.com)) 提供了一个适用于 macOS 的优秀 UML 图表程序，名为\
  \ Omnigraffle。\n\n图 5-8 显示了完整的图表。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig8_HTML.jpg](img/341013_5_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8. 书店的完整 UML 图\n\n\n\n## 实现类\n\n既然你已经了解了将要创建的对象，现在需要创建你的第一个对象。为此，你将从一个新项目开始。\n\
  \n1. 启动 Xcode。选择 文件 ➤ 新建 ➤ 项目。\n2. 如果顶部菜单未选中 iOS，请点击选中它。在“应用程序”标题下，选择“主从应用”。对于本章的操作，你可以选择任何应用类型（见图\
  \ 5-9）。点击“下一步”。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig9_HTML.jpg](img/341013_5_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9. 创建新项目\n\n3. 为你的项目输入产品名称。我们将使用 `BookStore` 这个名称。你还需输入组织名称和公司标识符。公司标识符通常是\
  \ `com.companyname`（例如 `com.inno`）。保持此屏幕上的复选框为默认状态。你现在无需关注 Core Data；它将在第 11 章讨论。同时，将当前语言选择保持为\
  \ Swift。点击“下一步”选择保存项目的位置，然后保存项目。\n4. 从屏幕左侧的项目导航器中选择 `BookStore` 文件夹（见图 5-10）。你的大部分代码将存放在这里。\n\
  \n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig10_HTML.jpg](img/341013_5_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10. 选择 BookStore 项目\n\n5. 选择 文件 ➤ 新建 ➤ 文件。\n6. 在弹出的窗口中，确保顶部选中了 iOS，然后在“源”部分点击“Cocoa\
  \ Touch 类”（见图 5-11）。然后点击“下一步”。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig11_HTML.jpg](img/341013_5_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11. 创建一个新的 Swift 类文件\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig12_HTML.jpg](img/341013_5_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12. 创建文件\n\n7. 现在你可以为类命名（见图 5-12）。在本练习中，你将创建 `Customer` 类。将“子类”下拉菜单改为 NSObject。确保语言设置为\
  \ Swift。点击“下一步”并将文件保存在默认位置。\n\n**注意：** 为方便使用和理解代码，请记住在 Swift 中类名应始终以大写字母开头。对象名应始终以小写字母开头。例如，`Book`\
  \ 是类的合适名称，而 `book` 是基于 `Book` 类的对象的好名字。对于由两个单词组成的对象，如书的作者，合适的名称是 `bookAuthor`。这种大小写格式称为小驼峰式。\n\
  \n8. 现在查看你的主项目文件夹；你应该会看到一个名为 `Customer.swift` 的新文件。\n\n**注意：** 如果你用 Objective-C\
  \ 创建了一个类，则会生成 `Customer.h` 和 `Customer.m` 文件。`.h` 文件是包含类信息的头文件。头文件列出了类中的所有属性和方法，但它并不实际包含相关代码。`.m`\
  \ 文件是实现文件，你在此处编写方法的代码。在 Swift 中，整个类都包含在一个文件中。\n\n9. 现在应选中 `Customer.swift` 文件，你会看到如图\
  \ 5-13 所示的窗口。注意它目前包含的信息不多。第一部分带有双斜杠（`//`）的是注释，不属于代码部分。注释可以让你向可能阅读你代码的人说明每段代码的作用。文件的第二部分是你的新\
  \ Customer 类。新类的声明如下：\n\n```\nclass Customer: NSObject {\n}\n```\n\n**注意：** 在 Swift\
  \ 中，一个类不需要独占一个文件。一个 Swift 文件中可以定义多个类，但当项目包含很多类时，这可能会难以维护。通常为每个类单独创建一个文件会更清晰、更有条理。\n\
  \n现在让我们将 UML 图中的属性转移到实际的类中。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig13_HTML.jpg](img/341013_5_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13. 空的 Customer 类\n\n现在让我们将 UML 图中的属性转移到实际的类中。\n\n**提示：** 属性应始终以小写字母开头。属性名中不能有空格。\n\
  \n对于第一个属性“名字”，将以下代码行添加到你的文件中：\n\n```\nvar firstName = \"\"\n```\n\n这会在你的类中创建一个名为\
  \ `firstName` 的对象。注意你没有告诉 Swift `firstName` 是什么类型。在 Swift 中，你可以声明一个属性而不指定类型，属性类型会根据我们初始赋值来推断。通过给属性赋初始值\
  \ `\"\"`，你告诉 Swift 编译器将 `firstName` 设为 String 类型。在 Swift 中，所有非可选属性都需要在声明时或在类初始化器中拥有默认值。我们将在本书后面讨论可选类型。\n\
  \n**注意：** 在 Objective-C 中，所有属性都必须声明类型。例如，要创建同样的 `firstName` 属性，你会使用以下代码：\n\n```\n\
  NSString *firstName;\n```\n\n这声明了一个名为 `firstName` 的 `NSString`。在 Swift 中，你可以只声明一个变量，让系统决定类型。\n\
  \n由于所有属性都是变量，你只需对其他属性重复相同的过程。完成后，你的 Swift 文件应如图 5-14 所示。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig14_HTML.jpg](img/341013_5_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14. 包含属性的 Customer 类接口\n\n类声明完成后，你需要添加方法。方法应包含在与属性相同的类文件和位置中。你将添加一个返回数组的新方法。代码如下所示：\n\
  \n```\nfunc listPurchaseHistory() -> [String] {\n    return [\"Purchase 1\", \"\
  Purchase 2\"]\n}\n```\n\n这段代码可能看起来有点令人困惑。空括号告诉编译器没有参数传递给该方法。`->` 告诉系统你从方法返回什么。`[String]`\
  \ 表示你返回的是一个字符串数组。在最终版本中，你实际上会希望返回购买对象，但暂时使用 `String`。为了让代码能编译，你添加了一个返回简单数组的语句。显然，在真实应用中，这需要返回动态的购买历史。在\
  \ Swift 文件中创建类只需完成这些。图 5-15 显示了最终的 Swift 文件。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig15_HTML.jpg](img/341013_5_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15. 完成的 Customer 类 Swift 文件\n\n## 继承\n\nOOP 的另一个主要特性是继承。编程中的继承类似于基因遗传。你可能从母亲那里继承了眼睛颜色，或从父亲那里继承了头发颜色，反之亦然。类可以以类似的方式继承父类的属性和方法，但与遗传学不同，你不会继承这些属性的值。在\
  \ OOP 中，父类称为超类，子类称为子类。\n\n\n\n### 注意\n\n在 Swift 中，除非特别声明，否则没有超类。在本章的示例中，我们使用了 `NSObject`\
  \ 作为超类。\n\n例如，你可以创建一个“印刷品”类，并为书籍、杂志和报纸创建子类。印刷品可能有许多共同之处，因此你可以在印刷品超类中定义属性，而不必在每个单独的类中重复定义这些属性。这样做可以进一步减少需要编写和调试的冗余代码量。\n\
  \n在图 5-16 中，你将看到 `Printed Material` 超类的属性布局，以及它将如何影响 `Book`、`Magazine` 和 `Newspaper`\
  \ 这些子类。`Printed Material` 类的属性将被子类继承，因此无需在子类中显式定义它们。你会注意到 `Book` 类的属性显着减少了。通过使用超类，你将大幅减少程序中的冗余代码。\n\
  \n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig16_HTML.jpg](img/341013_5_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16. 超类和子类的属性\n\n## 为什么要使用 OOP？\n\n在本章中，我们讨论了什么是 OOP，甚至讨论了如何创建类和对象。然而，讨论为什么要在开发中使用\
  \ OOP 原则也同样重要。\n\n如果你看看当今流行的编程语言，你会发现它们都在一定程度上使用了 OOP 原则。Swift、Objective-C、C++、Visual\
  \ Basic、C# 和 Java 都要求程序员理解类和对象，才能成功使用这些语言进行开发。为了成为当今世界的一名开发者，你需要理解 OOP。但为什么要使用它呢？\n\
  \n### OOP 无处不在\n\n今天你选择的几乎任何开发工作，都需要你理解面向对象的原则。在 macOS 和 iOS 中，你与之交互的每样东西都是一个对象。例如，简单的窗口、按钮和文本框都是对象，并且拥有属性和方法。如果你想成为一名成功的程序员，你需要理解\
  \ OOP。\n\n### 消除冗余代码\n\n通过使用对象，你可以减少必须重新输入的代码量。如果你编写了在客户结账时打印收据的代码，当需要重新打印收据时，你希望同样的代码也能直接使用。如果你将打印收据的代码放在了\
  \ `Sale` 类中，就不必再次重写这段代码了。这不仅节省了时间，还常常能帮助你消除错误。如果你不使用 OOP，并且发票有变动（哪怕是像图形更改这样简单的事情），你也必须确保在桌面应用和移动应用中同时进行更改。如果你遗漏了其中一个，就有可能导致两个界面的行为不一致。\n\
  \n### 易于调试\n\n通过将所有与图书相关的代码放在一个类中，当图书出现问题时，你就知道该去哪里查找。这对于小型应用来说可能不算什么大事，但当你的应用代码量达到几十万甚至上百万行时，这会为你节省大量时间。\n\
  \n### 易于替换\n\n如果你将所有代码都放在一个类中，那么随着应用中事物的变化，你可以替换掉某些类，并赋予新类完全不同的功能。然而，修改后的类仍然可以像原先的类一样，与应用的其余部分进行交互。这类似于汽车零件。如果你想更换汽车上的消音器，并不需要买一辆新车。如果你的发票相关代码散落在各处，那么修改一个类中的项目就会变得困难得多。\n\
  \n## 高级主题\n\n我们已经在整章中讨论了 OOP 的基础知识，但还有一些其他主题对你的理解也很重要。\n\n### 接口\n\n正如本章所讨论的，其他对象与类交互的方式是通过方法。在\
  \ Swift 中，你可以为你的方法设置访问级别。将方法声明为 `private` 将使其只能被从其派生出的对象访问。默认情况下，Swift 方法是 internal\
  \ 的，可以被当前模块中的任何对象或方法访问。这通常被称为*接口*，因为它告诉其他对象如何与你的对象进行交互。在你的应用中实现标准接口，将允许你的代码以相似的方式与不同的对象交互。这将显着减少你需要编写的、特定于对象的代码量。\n\
  \n### 多态性\n\n*多态性*是指一个类的对象呈现为另一个类的对象并被像另一个类的对象一样使用的能力。这通常通过创建与另一个类相似的方法和属性来实现。你一直在使用的一个关于多态性的很好例子就是书店。在书店中，你有三个相似的类：`Book`、`Magazine`\
  \ 和 `Newspaper`。如果你想对全部库存进行一次大促销，你可以遍历所有书籍并打折，然后遍历所有杂志并打折，接着再遍历所有报纸并打折。这样做的工作量比实际需要的要多得多。更好的做法是确保所有类都有一个打折方法。然后你可以对所有对象调用该方法，而无需知道它们属于哪个类，只要它们是包含所需方法的类的子类即可。这将节省大量的时间和编码工作。\n\
  \n在规划你的类时，要寻找不同类之间的共性以及可能适用于不止一种类型类的方法。从长远来看，这将节省你的时间并加速你的应用开发。\n\n### 值导向编程\n\n\
  Apple 最近为 iOS 开发者引入了一种新范式。Apple 称之为值导向编程。Apple 现在建议开发者在处理某些简单的数据片段时，使用结构体（Structs）而不是类。结构体与类类似，不同之处在于结构体是通过值传递给方法的，并且结构体不能从任何超类继承。这意味着创建结构体所涉及的开销比创建类要少。结构体的实例化和使用方式与类相同。图\
  \ 5-17 将本章中的客户类展示为结构体。\n\n![../images/341013_5_En_5_Chapter/341013_5_En_5_Fig17_HTML.jpg](img/341013_5_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17. 客户结构体\n\n决定使用结构体还是类，可能取决于多种因素。当不需要继承时，应该使用结构体。\n\n## 总结\n\n你终于读完了这一章！以下是本章所涵盖内容的总结：\n\
  \n*   *面向对象编程（OOP）*：你学习了 OOP 的重要性以及为什么所有现代代码都应该使用这种方法论。\n\n*   *对象*：你学习了 OOP 对象以及它们如何对应现实世界中的对象。你还学习了不对应现实世界对象的抽象对象。\n\
  \n*   *类*：你学习了类决定了每个对象将拥有的数据类型（属性）和方法。每个对象都需要有一个类。它是对象的蓝图。\n\n*   *创建类*：你学习了如何规划你类的属性和方法。\n\
  \n*   *创建类文件*：你使用 Xcode 创建了一个类文件。\n\n*   *编辑文件*：你编辑了 Swift 文件来添加你的属性和方法。\n\n\n\n\
