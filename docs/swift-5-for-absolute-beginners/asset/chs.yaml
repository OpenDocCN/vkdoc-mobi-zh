- '# 14. 一个 Swift 语言编写的 iPhone 应用


  在第 8 章中，您使用 Swift 创建了一个基本的书店 iPhone 应用。在本章中，您将为该应用添加一些功能，使其更加实用，并运用您在本中学到的许多技术，例如创建类、使用委托和协议、以及使用动作和出口。您还将学习一些新技术，如开关控制器、`UIAlertController`
  和地标。


