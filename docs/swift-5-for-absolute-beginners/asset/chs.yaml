- '# 15. Apple Watch 与 WatchKit


  2014 年 9 月，苹果公司发布了 Apple Watch，并将其视为苹果历史上的新篇章。这款手表不仅能处理电话和短信，还能通过追踪心率和运动来评估佩戴者的健康状况。同时，苹果宣布了
  WatchKit，这是一个专为开发 Apple Watch 应用而设计的框架。对于已经熟悉 UIKit 的开发者来说，WatchKit 会非常熟悉。


  最初，Apple Watch 在开发方面存在一些严重限制。手表充当着 iPhone 应用的附加屏幕。这要求手表靠近手机才能运行，也导致应用运行缓慢。2015 年
  6 月，苹果发布了 watchOS 2.0。这次更新包含了许多新功能，但对开发者来说最大的变化是能够创建代码在 Apple Watch 上运行而非在手机上运行的应用。开发者能够创建独立应用，这些应用性能更好，响应更迅速。现在，苹果已经发布了
  watchOS 4.0，为开发者带来了更多改进。


  ## 创建 watchOS 应用时的注意事项


  为 watchOS 进行开发的一大优势在于，所有开发工作都使用 Swift 或 Objective-C 完成，就像其他 iOS 设备一样。Apple Watch
  确实有一些不同之处，在开始开发之前需要考虑：


  - Apple Watch 的屏幕非常小。屏幕尺寸限制为 40 毫米或 44 毫米，具体取决于手表尺寸。这意味着您没有太多空间放置不必要的 UI 元素。您的界面需要紧凑且组织良好。此外，由于这两种尺寸相近，您需要创建一个界面，使其在两种尺寸上都能呈现良好效果。

  - 在手机和手表之间共享数据需要一些规划。随着 watchOS 3.0 及现在的 5.0 版本，苹果使数据共享变得更加容易。主要是苹果增强了 `WCSession`
  类。此类别的使用超出了本书的范围。

  - watchOS 5.0 的 WatchKit 提供了多种与用户交互的方式，不仅通过应用，还通过速览、可操作的通知和复杂功能。编写良好的应用可以在合理的范围内利用多种交互方式。这些交互方式超出了本书的范围。


  ## 创建 Apple Watch 应用


  第一步是在 Xcode 中创建一个新项目。在顶部，选择 watchOS 标题下的 Application 作为项目类型。然后选择 iOS App with WatchKit
  App，如图 15-1 所示。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig1_HTML.jpg](img/341013_5_En_15_Fig1_HTML.jpg)


  **图 15-1.** 创建 watchOS 应用


  接下来，您将可以选择命名项目。我们将本章中的项目命名为 `BookStore`。您还会注意到 watchOS 应用与标准 iOS 应用有不同的选项。我们不会为此应用添加通知或复杂功能场景，因此请确保它们都未被选中，如图
  15-2 所示。



  ### 注意


  WatchKit 提供了 iOS 应用中不可用的额外交互类型。Glance 能让用户快速预览你的应用。例如，一个书店应用可以在 Glance 中显示畅销书排行榜。Glance
  使用手表上的特殊界面。Complication 则允许你的应用在表盘本身上提供简洁信息。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig2_HTML.jpg](img/341013_5_En_15_Fig2_HTML.jpg)


  图 15-2. watchOS 应用选项


  随后 Xcode 会提示你保存项目。保存后，你将看到新建的项目。在左侧，你会注意到项目中多了两个目标。一个是 BookStore WatchKit App，它包含应用的界面（故事板和资源）。第二个新目标是
  BookStore WatchKit Extension，它将包含应用在 watchOS 上运行所需的所有代码。参见图 15-3。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig3_HTML.jpg](img/341013_5_En_15_Fig3_HTML.jpg)


  图 15-3. 新的 watchOS 目标


  点击 BookStore WatchKit App 目标中的 `Interface.storyboard`，你应该会看到一个类似于图 15-4 的界面。这就是你空白的
  watchOS 应用故事板。你会注意到其尺寸比标准的 iOS 故事板明显小很多。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig4_HTML.jpg](img/341013_5_En_15_Fig4_HTML.jpg)


  图 15-4. 界面故事板


  因为你要为 watchOS 应用创建一个书籍列表，所以需要在故事板中添加一个表格。在右下角搜索“table”，然后将表格拖拽到“Interface Controller
  Scene”中，如图 15-5 所示。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig5_HTML.jpg](img/341013_5_En_15_Fig5_HTML.jpg)


  图 15-5. 添加一个表格


  Xcode 现在会为你提供 Table Row 作为表格的一部分。这类似于你在 iOS 应用中创建表格视图时使用的原型行。你需要创建一个类来控制它，但目前，你只需添加一个标签。在对象库中搜索“label”，然后将一个标签拖拽到该行上。参见图
  15-6。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig6_HTML.jpg](img/341013_5_En_15_Fig6_HTML.jpg)


  图 15-6. 向表格行添加标签


  默认情况下，标签会位于 Table Row 的左上角。检查属性检查器，确保高度和宽度可以根据内容自动调整大小（参见图 15-7）。这将有助于确保你的应用能在多种尺寸的
  Apple Watch 上良好运行。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig7_HTML.jpg](img/341013_5_En_15_Fig7_HTML.jpg)


  图 15-7. 让标签自适应大小


  现在，标签会扩展以填满整行。但默认情况下，标签只显示一行文本。由于你要添加书名，可能需要多行才能容纳所有文本。选中标签后，在右侧的属性检查器中找到 `Lines`
  属性并将其设置为 0，如图 15-8 所示。将行数设置为 0 告诉 Xcode，它可以使用任意多的行数。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig8_HTML.jpg](img/341013_5_En_15_Fig8_HTML.jpg)


  图 15-8. 设置 Lines 属性


  现在你需要添加一些代码来让用户界面工作起来。在左侧，展开 BookStore WatchKit Extension 文件夹并选择 `InterfaceController.swift`
  文件，如图 15-9 所示。`InterfaceController` 是 WatchKit 故事板中初始场景的默认控制器。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig9_HTML.jpg](img/341013_5_En_15_Fig9_HTML.jpg)


  图 15-9. 打开 `InterfaceController.swift` 文件


  你会注意到这个新控制器文件中的默认方法与标准的 `UIViewController` 有所不同。`willActivate()` 等同于 `viewWillAppear()`。


  你需要做的第一件事是为行添加一个类定义。为此，将以下代码添加到文件底部，位于 `InterFaceController` 类的闭花括号（`}`）之外。


  ```

  1   class BookRow: NSObject {

  2       @IBOutlet weak var bookLabel: WKInterfaceLabel!

  4   }

  ```


  第 1 行声明了一个名为 `BookRow` 的新类。它是 `NSObject` 的子类。第 2 行创建了一个名为 `bookLabel` 的属性。`bookLabel`
  的类是 `WKInterfaceLabel`。这与你之前使用过的 `UILabel` 类似，但它是与 WatchKit 配合使用的。




  ### 说明


  Swift 允许在同一个 Swift 文件中声明多个类。当你仅在该文件内与其他类一起使用该类时，这种做法的效果很好。在本例中，我们只会将行类与 `InterfaceController`
  类一起使用。


  `InterfaceController.swift` 文件现在将如图 15-10 所示。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig10_HTML.jpg](img/341013_5_En_15_Fig10_HTML.jpg)


  *图 15-10. 修改后的 InterfaceController.swift 文件*


  现在你可以将输出口连接到界面。选择 `Interface.storyboard`。然后选择 Xcode 窗口右上角带有两个圆圈的图标来打开助理编辑器，如图 15-11
  所示。


  ![../images/341013_5_En_15_Chapter/341013_5_En_15_Fig11_HTML.jpg](img/341013_5_En_15_Fig11_HTML.jpg)


  *图 15-11. 打开助理编辑器*


  借助助理编辑器，Xcode 为开发者提供了一种快速创建对象并将其与界面中的输出口关联的方法。你首先需要创建一个代表表格的表格属性。按住 Control 键并从“Interface
  Controller Scene”中的表格拖向右侧的 `InterfaceController` 类，如图 15-12 所示。


