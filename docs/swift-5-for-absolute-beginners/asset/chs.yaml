  \ // 返回一个新的 Dictionary 对象\n```\n\n上面所有的消息都是在调用类型方法。\n\n第 1 行简单地返回一个值，该值表示自参考日期 2001\
  \ 年 1 月 1 日以来的秒数。\n\n第 2 行返回一个新的 `String` 对象，该对象已被格式化，其值为 `http://1000`。\n\n第 3\
  \ 行是一种常用的形式，因为它实际上分配了一个新对象。通常，这一行不会单独使用，而是会出现在像这样的代码行中：\n\n```\nvar myDict = Dictionary()\n\
  ```\n\n那么，你什么时候会使用类型方法呢？作为一般规则，如果该方法返回的信息*不*特定于该类的任何特定实例，那么就让该方法成为一个类型方法。例如，前面例子中的\
  \ `minAMFrequency` 对于任何 `RadioStation` 的所有实例都是相同的。\n\n对象——这是使用类型方法的绝佳候选。然而，电台的名称或其分配的频率对于该类的每个实例来说是不同的。这些不该（实际上也*不能*）是类型方法。原因在于，类型方法不能使用该类定义的任何实例变量。\n\
