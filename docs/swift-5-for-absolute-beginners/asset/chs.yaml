- "# 8. Swift 编程基础\n\nSwift 是一种优雅的语言。它将编译型语言的效率与许多脚本语言的灵活性和现代特性相结合。\n\n本章介绍 Swift\
  \ 中一些更常见的概念，例如属性（properties）和集合类（collection classes）。同时展示在 Xcode 中处理用户界面元素时，属性是如何被使用的。这听起来任务量很大，但\
  \ Swift、Foundation 框架和 Xcode 工具提供了丰富的对象和方法，使得构建应用程序变得轻而易举。\n\n## 使用`let`与`var`\n\
  \n如果你在 Swift 上花费了大量时间，你会看到关键字`var`出现在变量声明之前。你可能也在其他声明前看到过`let`。`var`用于定义变量，而`let`用于定义常量。这意味着如果你用`let`声明一个值，你将无法更改该值。以下代码定义了一个常量：\n\
  \n```\nlet myName = \"Brad\"\n```\n\n一旦你定义了常量，就无法更改其值。\n\n### 注意\n\n如果你声明了一个变量但从未更改其值，Xcode\
  \ 现在会发出警告，并建议使用`let`代替`var`。\n\n```\nmyName = \"John\"\n```\n\n这将会报错。如果你想创建一个可变或可更改的变量，你需要使用`var`。例如，你可以这样操作：\n\
  \n```\nvar myName = \"Brad\"\nmyName = \"John\"\n```\n\n这不会产生任何错误，因为`myName`现在是一个变量。这不仅适用于`String`和`Int`类型，也适用于集合和其他对象。\n\
  \n变量提供了更大的灵活性，那么为什么还会有人想要使用常量呢？答案是性能。如果你知道某个值不会改变，编译器可以将该值优化为常量。\n\n## 理解集合\n\n\
  理解集合是学习 Swift 的基础部分。事实上，集合对象几乎是所有现代面向对象语言库中的基本结构（有时它们被称为*容器*）。简单来说，*集合*是一种能够持有和管理其他对象的类。集合的整个目的是提供一种通用的方式来高效地存储和检索对象。\n\
  \n集合有几种类型。虽然它们都满足能够持有其他对象的相同目的，但主要的区别在于对象的检索方式。Swift 中最常用的集合是`Array`和`Dictionary`。\n\
  \n这两种集合都可以创建为常量或常规变量。如果你将集合创建为常量，则必须在创建时用对象填充它，之后无法修改。\n\n## 使用数组\n\n`Array`类与其他任何集合一样，允许程序员管理一组对象。数组是一种*有序*集合，这意味着对象以特定顺序进入数组，并以相同顺序被检索。\n\
  \n### 注意\n\n有一些处理数组的方法允许你更改对象的顺序，或在数组的特定位置添加对象。\n\n`Array`类允许通过对象在数组中的*索引*来检索对象。索引是对象在数组中占据的数值位置。例如，如果数组中有三个元素，则对象可以通过索引\
  \ 0 到 2 来引用。与 Swift 及其他编程语言中的大部分情况一样，索引从 0 开始，而不是 1。参见代码清单 8-1。\n\n```\n1    var\
  \ myArray: [String] = [\"One\", \"Two\", \"Three\"]\n2    print(myArray[0])\n3 \
  \   print(myArray[1])\n4    print(myArray[2])\n代码清单 8-1\n访问数组中的对象\n```\n\n如你所见，数组中的对象可以通过其索引检索。索引从\
  \ 0 开始，且不能超过数组大小减 1。你可以通过访问`Array`对象的`count`属性轻松计算数组的大小，如下所示：\n\n```\nvar entries\
  \ = myArray.count\n```\n\n实际上，每一种集合类型，包括`Array`和`Dictionary`，都包含一个`count`属性。\n\n\
  向数组末尾添加元素很简单。你只需在数组上调用`append`方法，如代码清单 8-2 所示。\n\n```\n1    var myArray: [String]\
  \ = [\"One\", \"Two\", \"Three\"]\n2    myArray.append(\"Four\")\n3    myArray.append(\"\
  Five\")\n4    myArray.append(\"Six\")\n代码清单 8-2\n向数组添加对象\n```\n\nSwift 提供了许多不同的方法用于向数组添加元素。如果你想向数组中添加多个对象，可以使用标准的`+=`（通常称为*加等于*）运算符。代码清单\
  \ 8-3 创建了一个数组，然后在第二行向数组添加了三个`String`对象。注意新值放在方括号中而不是圆括号中。\n\n```\n1    var myArray:\
  \ [String] = [\"One\", \"Two\", \"Three\"]\n2    myArray += [\"Four\", \"Five\"\
  , \"Six\"]\n代码清单 8-3\n向数组添加多个对象\n```\n\n如前所述，数组实际上是有序的。数组中对象的顺序是重要的。有时你可能需要在数组的特定位置添加一个项目。你可以使用`insert(at:)`方法来实现，如代码清单\
  \ 8-4 所示。\n\n```\n1    var myArray: [String] = [\"Two\", \"Three\"]\n2    myArray.insert(\"\
  One\", at: 0)\n代码清单 8-4\n在数组开头添加一个字符串\n```\n\n数组现在包含`One`、`Two`、`Three`。\n\n访问数组中的项目很简单。你可以使用标准方括号访问特定位置的对象。例如，`myArray[0]`会给你数组中的第一个对象。如果你想遍历数组中的每个项目，可以使用一种叫做*快速枚举*或*For-In\
  \ 循环*的方法。代码清单 8-5 是一个快速枚举的例子。\n\n```\n1    var myArray: [String] = [\"One\", \"\
  Two\", \"Three\"]\n2    for myString in myArray {\n3         print(myString)\n4\
  \    }\n代码清单 8-5\n快速枚举\n```\n\n神奇之处发生在代码清单 8-5 的第二行。你告诉 Swift 将`myArray`的每个值赋给一个名为`myString`的新常量。然后你可以对`myString`做任何你想做的事情。在这个例子中，你只是打印它。它会遍历数组中的所有对象，而无需知道对象的总数。这是一种从数组中取出项目的快速有效的方式。\n\
  \n从数组中移除对象也很简单。你可以使用`remove(at:)`方法，如代码清单 8-6 所示。\n\n```\n1    var myArray: [String]\
  \ = [\"One\", \"Two\", \"Three\"]\n2    myArray.remove(at: 1)\n3    for myString\
  \ in myArray {\n4         print(myString)\n5    }\n代码清单 8-6\n移除一个对象\n```\n\n\n\n\
  \n清单 8-6 的输出结果是 `One, Three`。这是因为你移除了索引为 1 的对象。请记住，这对应数组中的第二个对象，因为数组索引总是从 0 开始。\n\
  \n你已经见识到 Swift 在处理数组交互方面有多么灵活。数组是强大的集合，作为程序员，你会经常用到它们。本节涵盖了数组的基础知识，但数组能做的事情远不止这些。\n\
  \n## 使用字典类\n\nSwift 的 `Dictionary` 类也是一种有用的集合类型。它与 `Array` 类一样允许存储对象，但 `Dictionary`\
  \ 的不同之处在于，它允许将键与条目关联起来。例如，你可以创建一个字典来存储某人的属性列表，比如 `firstName`、`lastName` 等。与使用索引访问数组不同，字典可以使用诸如\
  \ `\"firstName\"` 这样的 `String` 来访问属性。不过，所有键必须是唯一的——也就是说，`\"firstName\"` 不能重复出现。根据你的程序需要，找到唯一的键名通常不是问题。\n\
  \n以下是创建字典的一个示例：\n\n```\nvar person: [String: String] = [\"firstName\": \"John\"\
  , \"lastName\": \"Doe\"]\n```\n\n这会创建一个名为 `person` 的简单字典。声明的下一部分告诉字典键和值的对象类型。在这个例子中，键是\
  \ `String` 类型，值也是 `String` 类型。然后你向字典添加了两个键。第一个键是 `firstName`，对应的值为 `John`。第二个键是\
  \ `lastName`，对应的值为 `Doe`。你可以使用与数组类似的符号来访问字典中的值。\n\n```\nprint(person[\"firstName\"\
  ])\n```\n\n这段代码会打印出名称 `Optional(\"John\")`，因为这是键 `firstName` 对应的值。前面的示例中出现了 `Optional`，因为字典中某个键对应的值是可选值。你可以使用相同风格的代码来修改字典中的值。假设在这个例子中，John\
  \ 现在更喜欢让别人叫他 Joe。你可以通过一行简单的代码来修改字典中的值。\n\n```\nperson[\"firstName\"] = \"Joe\"\n\
  ```\n\n你可以使用相同的符号向字典添加新键。\n\n```\nperson[\"gender\"] = \"Male\"\n```\n\n如果你决定从字典中移除某个键，比如刚添加的\
  \ `gender` 键，可以通过将该键的值设置为 `nil` 来实现。\n\n```\nperson[\"gender\"] = nil\n```\n\n现在字典中将只包含\
  \ `firstName` 和 `lastName`。请注意，字典是无序的。你不能依赖其顺序，但有时你需要遍历字典。这可以通过与数组类似的方式实现。主要区别在于，数组中你只需分配一个变量，而在字典中你需要分配键和值。参见清单\
  \ 8-7。\n\n```\n1    var person: [String: String] = [\"firstName\": \"John\", \"\
  lastName\": \"Doe\"]\n2    for (myKey, myValue) in person {\n3         print(myKey\
  \ + \": \" + myValue)\n4    }\n```\n\n这个示例会打印以下内容：\n\n```\nfirstName: John\nlastName:\
  \ Doe\n```\n\n字典是组织无序数据的绝佳方式，也是基于特定键查找数据的好方法。它们在 Swift 中非常灵活，应被用于组织和优化代码。\n\n##\
