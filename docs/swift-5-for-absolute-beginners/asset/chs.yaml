  \n### 创建一个简单的数据模型类\n\n为了使应用程序能够运行，它需要拥有一些要显示的数据。为此，您将使用之前创建的`BookStore`对象作为数据模型类。数据模型类并没有什么不同，只是其全部目的是允许应用程序通过对象访问数据。\n\
  \n修改`BookStore.swift`文件，使其内容如代码 8-11 所示。\n\n```\n1 //\n2 //  BookStore.swift\n3\
  \ //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright © 2019\
  \ Innovativeware. All rights reserved.\n7 //\n9    import Foundation\n11    class\
  \ BookStore {\n12        var bookList: [Book] = []\n13    }\n代码 8-11\n修改 BookStore.swift\
  \ 类以包含一个数组\n```\n\n在第 12 行，您添加了一个变量用于保存书籍列表；该属性被简单命名为`bookList`。请注意，`bookList`是一个数组，它允许您添加一系列对象，在本例中是一组`Book`对象。\n\
  \n接下来，让我们继续向 Swift 文件`BookStore.swift`中添加代码，如代码 8-12 所示。\n\n```\n1 //\n2 //  BookStore.swift\n\
  3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright © 2019\
  \ Innovativeware. All rights reserved.\n7 //\n9 import Foundation\n11 class BookStore\
  \ {\n12     var bookList: [Book] = []\n14     init() {\n15         var newBook =\
  \ Book()\n16         newBook.title = \"Swift for Absolute Beginners\"\n17      \
  \   newBook.author = \"Bennett and Lees\"\n18         newBook.description = \"iOS\
  \ Programming made easy.\"\n19         bookList.append(newBook)\n21         newBook\
  \ = Book()\n22         newBook.title = \"A Farewell to Arms\"\n23         newBook.author\
  \ = \"Ernest Hemingway\"\n24         newBook.description = \"The story of an affair\
  \ between an English nurse and an American soldier on the Italian front during World\
  \ War I.\"\n25         bookList.append(newBook)\n26     }\n27 }\n代码 8-12\n实现 BookStore\
  \ 数据对象\n```\n\n在代码 8-12 中，第 14 至 26 行定义了对象的`init`方法，该方法在对象首次初始化时被调用。在此方法中，您初始化了计划添加到书店中的两本书。第\
  \ 15 行是第一个`Book`对象被分配和初始化的地方。第 16 至 18 行为您的第一本书添加了标题、作者和描述。最后，第 19 行将新的`Book`对象添加到`bookList`数组中。这里需要注意的重要一点是，一旦对象被添加到数组中，代码就可以不再关心它；现在数组拥有了该对象的所有权。因此，第\
  \ 21 行不会出现问题。\n\n第 21 行分配了一个新的`Book`对象，覆盖了旧值。这告诉编译器您不再需要使用旧值。\n\n第 22 至 25 行简单地初始化了第二本书并将其添加到数组中。\n\
  \n就是这样！这就是定义一个简单数据模型类所需的全部内容。接下来，您需要修改`MasterViewController`以访问此类，使其能够开始显示一些数据。\n\
  \n\n\n### 修改 `MasterViewController`\n\n这个简单应用包含两个视图控制器：主视图控制器 `MasterViewController`\
  \ 和辅助视图控制器 `DetailViewController`。视图控制器是用于控制视图行为的对象。为了让应用开始从数据模型中显示数据，你需要首先修改 `MasterViewController`——这是应用导航的起点。以下代码已经存在于\
  \ Xcode 提供的模板中。你只需对其进行修改以添加你的数据模型。\n\n首先，你需要修改 `MasterViewController.swift` 文件。需要添加一个变量来持有\
  \ `Bookstore` 对象。代码清单 8-13 显示第 15 行将实例变量作为属性添加。\n\n```\n1 //\n2 //  MasterViewController.swift\n\
  3 //  BookStore\n4 //\n5 //  Created by Thorn on 03/06/19.\n6 //  Copyright © 2019\
  \ Innovativeware. All rights reserved.\n7 //\n\n9 import UIKit\n\n11 class MasterViewController:\
  \ UITableViewController {\n\n13     var detailViewController: DetailViewController?\
  \ = nil\n14     var objects = [Any]()\n15     var myBookStore = BookStore()\n代码清单\
  \ 8-13\n添加 BookStore 对象\n```\n\n现在 `BookStore` 对象已经初始化，你需要告诉 `MasterViewController`\
  \ 如何显示书籍列表——不是详细信息，只是书籍标题。为此，你需要修改几个方法。幸运的是，Xcode 已经提供了一个不错的模板，因此修改量很小。\n\n`MasterViewController`\
  \ 是 `UITableViewController` 类的子类，该类负责在屏幕上显示数据行。在本例中，这些行是书籍标题（虽然对于这个简单程序只有两行，但依然是一个列表）。\n\
  \n控制 `UITableViewController` 中数据显示内容和方式的主要方法有三个：\n\n*   第一个是 `numberOfSections(in:)`：由于该应用只有一个列表（即一个分区），该方法返回\
  \ 1。\n*   第二个是 `tableView(_:numberOfRowsInSection:)`：在该程序中，你返回 bookstore 数组中的书籍数量。由于这是唯一的分区，代码逻辑很直接。\n\
  *   第三个是 `tableView(_:cellForRowAt:)`：该方法针对屏幕上需要显示的每一行依次调用。\n\n代码清单 8-14 详细列出了让视图显示书籍列表所需的修改。修改从源文件的第\
  \ 63 行开始。\n\n```\n64      override func numberOfSections(in tableView: UITableView)\
  \ -> Int {\n65         return 1\n66     }\n\n68     override func tableView(_ tableView:\
  \ UITableView, numberOfRowsInSection section: Int) -> Int {\n69         return myBookStore.bookList.count\n\
  70     }\n\n72     override func tableView(_ tableView: UITableView, cellForRowAt\
  \ indexPath: IndexPath) -> UITableViewCell {\n73         let cell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"Cell\", for: indexPath)\n74         cell.textLabel!.text = myBookStore.bookList[indexPath.row].title\n\
  75         cell.accessoryType = .disclosureIndicator\n76         return cell\n77\
  \     }\n代码清单 8-14\n设置视图以显示书籍\n```\n\n在这段代码中，你只需修改几行。其他所有代码可以保持不变。这是使用 Xcode 模板的优势之一。第\
  \ 68 行原本只返回 1；你需要将其改为返回 `BookStore` 类中的项目数量。\n\n第 74 行看起来稍微复杂一些。基本上，`UITableView`\
  \ 的每一行就是一个所谓的“*单元格*”（具体来说是 `UITableViewCell`）。第 74 行将单元格的文本设置为书籍的标题。我们来更具体地分析一下这段代码：\n\
