  \ 7 章中所了解的，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是程序的整个生命周期。在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象在哪里声明以及如何使用。作用域将在后面更详细地讨论。现在，让我们给\
