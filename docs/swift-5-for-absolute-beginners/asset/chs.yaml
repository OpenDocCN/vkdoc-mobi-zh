  \ Swift 类的内容。通过本章的学习，你将能更深入地理解 Swift 语言，并掌握如何使用基础知识编写简单程序。最好的学习方法是拿小项目并用 Swift 编写（或重写）它们，以观察语言的工作方式。\n\
