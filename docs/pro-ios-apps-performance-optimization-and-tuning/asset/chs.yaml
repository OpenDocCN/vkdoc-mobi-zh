  ```\n\n## 第 6 章\n\n## 使用多线程技术优化并行数据访问\n\n本章将学习：\n\n- 线程与多线程的概念。\n- 如何在 iPhone 应用中编写和管理带锁的线程。\n\
  - 多线程环境的相关通用概念。\n  - 安全性：程序应产生预期结果。\n  - 活性：预期结果最终必须能在某一时刻生成。\n  - 性能：预期结果必须能快速生成。\n\
  - 判断何时使用线程。\n- 了解线程与 Apple 提供的其他内置解决方案之间的多种替代方案。\n\n当今计算设备拥有越来越多处理器。iPhone 也不例外；迟早\
  \ iPhone 会配备多处理器；事实上，Android 已有一些双核设备。因此，掌握如何利用多处理器系统的需求日益增长。这只是学习多线程的众多原因之一。线程通道还能帮助解决其他问题，如异步代码、文件与网络输入/输出、或耗时计算过程。\n\
  \n## 什么是线程与多线程？\n\n线程最简单的形式是供操作系统（OS）运行的一系列指令。不同线程可在同一处理器（CPU）或不同处理器上运行；这由操作系统决定，如图\
  \ 6-1 所示。\n\n通常，操作系统启动新应用程序时仅使用一个线程——即从头到尾的一条指令序列。当系统并行或并发运行多个指令序列时，便形成了多线程。在多处理器系统中，每个线程可在各自处理器上同时执行，如图\
  \ 6-1 所示。\n\n![images](img/0601.jpg)\n\n**图 6-1.** *三处理器系统运行三个线程*\n\n![images](img/0602.jpg)\n\
  \n**图 6-2.** *单处理器系统运行三个线程*\n\n然而在单处理器系统中，CPU 会在切换线程前执行完当前线程的部分指令。如图 6-2 所示，CPU\
  \ 在线程 1 中执行若干指令后跳转到线程 2，再执行线程 2 的指令后跳转到线程 3。\n\n在运行过程中，不同线程可调用不同对象的不同方法，如图 6-3 所示。线程\
  \ 1 和线程 2 可同时使用同一对象并调用同一方法，例如它们同时调用 `对象 1` 的 `方法 1` 和 `对象 3` 的 `方法 3`。但线程 1 和线程\
  \ 2 也可调用不同对象的不同方法，例如线程 1 调用 `对象 2` 的 `方法 2` ，线程 2 调用 `对象 4` 的 `方法 4`。\n\n![images](img/0603.jpg)\n\
  \n**图 6-3.** *两个线程调用不同对象的不同方法*\n\n在同一个应用程序中使用多个线程既有优势也有劣势。以下章节将详细讨论。多线程应用最重要的优势之一，是将其他任务与主用户界面（UI）进程解耦，从而避免\
  \ UI 被阻塞或冻结。\n\n## 线程术语\n\n以下是重要的线程术语定义：\n\n- 术语**线程**指代代码的独立指令/执行序列。\n- 术语**进程**指代正在运行的可执行文件，可包含多个线程。\n\
  - 术语**任务**指代需要执行的抽象工作概念。\n\n如果线程和进程都用于并发执行逻辑，它们有什么区别？进程与线程在以下方面存在差异：\n\n- 进程是资源分配单元，拥有自己的资源、堆内存和权限。线程仅仅是执行单元，拥有自己的栈和程序计数器。\n\
  - 一个进程包含多个线程，每个线程只能属于一个进程。\n- 线程与其所属进程内的其他线程共享数据。两个进程之间不共享数据，通常使用进程间通信传输数据（进程间通信不在本章讨论范围内）。\n\
  - 操作系统必须为进程分配特定资源，且进程间无法共享资源，因此进程被认为是重量级的。而线程共享资源，因此操作系统可以在同一进程内创建任意数量的线程。\n\n\n\
  \n\n## 第一个示例\n\n此示例将演示 IO 性能方面的一些问题。后续我会运用多线程技术来加速代码运行。我的示例代码很简单：\n\n-   **在第一个基准测试中**：我将加载并展示一个表格视图中的图片列表。随后，我会向你展示滚动体验有多糟糕：在当前状态下的所有图片返回之前，你无法滚动表格。\n\
  -   **在第二个基准测试中**：我将使用多线程来加速程序。你会看到，在等待图片加载的过程中，滚动体验会好很多。\n\n**注意：** 在这两种情况下，我的示例项目都*不会*缓存图片，以便让你清晰地看到两种情况的差异。\n\
  \n表 6–1 展示了基于 Core Animation 工具的各项测试基准结果，这样你就能看到该工具在实际场景中的应用。\n\n![图片](img/t0601.jpg)\n\
