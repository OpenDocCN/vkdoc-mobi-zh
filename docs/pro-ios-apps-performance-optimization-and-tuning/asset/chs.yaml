  \n在第一个基准测试中，我在返回表格视图单元格的方法内部加入了获取图片的代码。通过这一行代码，iOS 会停止并等待，直到图片从网络返回。之后，它才会继续返回单元格并将其显示在界面上。这种等待会导致整个应用程序停止，这就是为什么在第一个基准测试中你无法快速滚动表格视图的原因。\n\
  \n对于第二个基准测试，我使用了异步代码，这实际上是多线程的另一种形式，但底层库会为你处理多线程代码。使用这种代码，主进程无需等待下载过程完成。因此，在第二个基准测试中，你可以毫无问题地滚动表格视图。\n\
  \n## 多线程的优势\n\n在某些情况下，你可能会考虑在 iPhone 应用程序中使用线程。\n\n-   *充分利用所有核心和处理器*：（一个处理器内部可以有多个核心，而核心是实际的计算单元。）目前，iPhone\
  \ 4 只有一个处理器和一个核心，但 iPhone 5 可能拥有多个核心，你希望你的应用能够利用所有可用的处理器来提升性能。\n-   *建模*：你可以尝试模拟现实世界中的实际行为。例如，考虑这种情况：你需要完成\
  \ 12 种不同类型的任务（修复 Bug、面试系统管理员候选人、为下一个产品演示创建幻灯片等），而另一种情况是只有一项复杂的任务（修复 12 个 Bug）。当你只需要处理一个工作队列时，后一种情况更容易实现。前一种情况比较复杂，你可以将每个线程分配来处理一个任务。\n\
  -   *处理 I/O 处理任务*：通常，I/O（包括文件 I/O 和网络 I/O）需要花费时间才能将数据返回给应用程序。因此，如果你只用一个线程来处理它，你的应用程序可能会停止工作，花费时间等待数据。使用多线程可以帮助你将\
  \ I/O 线程分离出来，直到它接收到所有数据再合并回主线程。\n-   *更灵敏的 UI*：像 iPhone 应用程序这样的 GUI 应用程序只从一个线程启动，这意味着所有应用程序代码都通过一个*主事件循环*（也称为*主运行循环*）执行。事件循环是指应用程序接收来自用户的输入事件（例如点击、滑动或双击），然后运行与输入事件对应的逻辑。应用程序在一个事件循环内执行的时间越长，UI\
  \ 的响应就越不灵敏。\n-   *在后台处理某些逻辑*：这也是 iPhone 应用程序代码的重要组成部分。在某些情况下，你可能需要大量处理数据，例如运行 XML\
  \ 解析算法来提取其中的一些数据。这与 UI 的响应速度有关；在 UI 线程中做更少的工作将使程序提供更好的用户体验。\n\n## 如何编写多线程应用程序\n\n\
  既然你已经知道多线程应用程序可以多么强大，以及它如何帮助你解决许多问题，那么如何编写一个好的多线程应用程序呢？我将向你展示为 iPhone 编写/处理良好的多线程应用程序的主要技术。\n\
  \n### 创建线程\n\n要创建线程，你可以使用以下任何一种方法：\n\n-   `NSThread`\n-   `POSIX` 线程\n-   使用 `NSObject`\
  \ 创建新线程\n-   `NSOperation` 和 `NSOperationQueue`\n\n我会逐一介绍它们，并给出示例，因为它们各有利弊。在本节末尾，我将提供一个对比表格，确保你能够区分它们，并为你的特定需求选择正确的方法。\n\
  \n\n\n#### NSThread\n\n要使用 `NSThread` 创建新线程，只需调用：\n\n```\n[NSThread detachNewThreadSelector:@selector(threadMethod:)\
  \ toTarget:self withObject:nil];\n```\n\n此方法将为你的应用创建一个新的分离线程。*分离线程* 是指当该线程退出时，其所有资源将由系统回收。\n\
  \n有一些属性你需要了解。\n\n```\n+(void)detachNewThreadSelector:(SEL)aSelector toTarget:(id)aTarget\
  \ withObject:(id)anArgument\n```\n\n- `aSelector`：线程启动时将在目标对象上调用的方法。根据苹果文档，该选择器仅接受一个参数且无返回值。\n\
  - `aTarget`：将执行 `aSelector` 参数中指定方法的对象。\n- `anArgument`：唯一的参数，在线程启动时会传递给 `aSelector`\
  \ 方法。\n\n如果你想创建一个线程但暂时不启动它，可以使用以下机制：\n\n```\nNSThread* myThread = [[NSThread alloc]\n\
  \                        initWithTarget:self\n                              selector:@selector(myThreadMainMethod:)\n\
  \                                object:nil];\n[myThread start];  // 实际创建线程\n```\n\
  \n如你所见，在第一行中，你可以创建一个新线程，然后在你选择的任何后续时间，对该对象调用 `start` 来创建并启动新线程。如果只想传递 `myThread`\
  \ 对象，而不需要传递 `selector`、`target` 和 `argument`，这种方式很好。\n\n使用 `NSThread` 对象的另一种好方法是使用以下方法向该线程对象发送消息：\n\
  \n```\n-(void)performSelector:(SEL)aSelector onThread:(NSThread *)thr withObject:(id)arg\
  \ waitUntilDone:(BOOL)wait\n```\n\n此方法会将选择器排队到另一个线程上。当系统自动运行该线程时，线程会从队列中取出消息并调用\
  \ `aSelector` 变量中指定的方法。\n\n#### 使用 POSIX 线程\n\n这种机制主要用于 iPhone 应用程序中的 C 语言编程。在第\
  \ 9 章中，我将深入介绍 C 语言编程以及它如何在许多情况下帮助你提升 iPhone 应用的性能。因此，如果你还不了解 C 语言编程，这部分可能对你帮助不大。如果你确实了解\
  \ C 语言编程，代码清单 6-3 展示了相关代码并附有解释。\n\n**代码清单 6-3.** *POSIX 线程*\n\n```\n#include <assert.h>\n\
  #include <pthread.h>\n\nvoid* ThreadMethod(void* data)\n{\n   // 你的主要逻辑写在这里。\n \
  \  return NULL;\n}\n\nvoid LaunchThread()\n{\n   // 使用 POSIX 例程创建线程。\n   pthread_attr_t\
  \  attr;\n   pthread_t       posixThreadID;\n   int             returnVal;\n\n \
  \  // 初始化并检查新线程是否初始化成功\n   returnVal = pthread_attr_init(&attr);\n   assert(!returnVal);\n\
  \n   // 为新线程设置属性分离状态\n   returnVal = pthread_attr_setdetachstate(&attr, PTHREAD_CREATE_DETACHED);\n\
  \   assert(!returnVal);\n\n   // 创建并运行新线程\n   int     threadError = pthread_create(&posixThreadID,\
  \ &attr, &ThreadMethod, NULL);\n\n   returnVal = pthread_attr_destroy(&attr);\n\
  \   assert(!returnVal);\n   if (threadError != 0)\n   {\n       // 报告错误。\n   }\n\
  }\n```\n\n#### NSObject\n\n所有对象都有能力创建并分离一个新线程来执行这些对象的选择器。你可以使用下面这行代码，在后台线程中运行 `doSomething`\
  \ 方法：\n\n```\n[myObj performSelectorInBackground:@selector(doSomething) withObject:nil];\n\
  ```\n\n调用此方法的效果与下面这行代码相同：\n\n```\n[NSThread detachNewThreadSelector:@selector(doSomething)\
  \ toTarget:myObj withObject:nil]\n```\n\n此方法是分离并创建新线程来运行后台任务的便捷缩写形式。\n\n#### NSOperationQueue\n\
  \n`NSOperationQueue` 类是一种管理和并发运行任务的机制。`NSOperationQueue` 的一个优点是，它可以将系统内部并发操作的数量限制在给定范围内，从而使系统负载保持在可接受的水平。由于这种线程数量上限的限制，`NSOperationQueue`\
  \ 实例数量更多并不一定意味着系统中同时运行的并发线程会更多。\n\n你可以向队列中添加操作，但不能移除它们。不过，你可以取消队列中所有现有且未运行的操作。表\
  \ 6-2 展示了一些在使用 `NSOperationQueue` 时你会觉得非常有用的其他方法。\n\n![图片](img/t0602.jpg)\n\n你可以通过三种不同的类来使用\
  \ `NSOperationQueue`。\n\n- `NSInvocationOperation`：如果你已经有一个对象和一个方法要放入并发线程中，这是一种简单的封装。它也不需要子类化，因此你可以通过此类创建一个简单的\
  \ `NSOperation` 对象。`NSInvocationOperation` 是 `NSOperation` 的子类。\n- `NSBlockOperation`：这是另一种封装，用于执行一个或多个代码块，而无需为每个要执行的代码块都创建单独的\
  \ `NSOperation` 对象。当执行多个代码块时，只有当内部的所有代码块都执行完毕，`NSBlockOperation` 才被视为完成。\n- 自定义的\
  \ `NSOperation` 对象：`NSOperation` 是一个基类。通过对其子类化，你可以完全控制 `NSOperation` 对象的整个实现，包括操作执行和报告状态的默认方式。\n\
  \n要使用 `NSOperationQueue` 创建多线程应用，你需要通过这三种方法之一创建特定的对象，并将新创建的 `NSOperation` 添加到你的队列中。然后，队列会为你维护并运行这些操作。\n\
  \n以下是一段代码片段，可以帮助你创建 `NSOperationQueue` 并将单独的操作对象添加其中，从而创建多线程环境：\n\n```\nNSOperationQueue*\
  \ myOperationQueue = [[NSOperationQueue alloc] init];\n[myOperationQueue addOperation:myOperation];\
  \ // 添加单个操作\n[myOperationQueue addOperations:arrayOfOperations waitUntilFinished:NO];\
  \ // 添加多个操作\n[aQueue addOperationWithBlock:^{\n  /* 执行一些操作。 */\n}];\n```\n\n现在我将详细介绍如何使用前面提到的每种方法来创建新的操作。\n\
  \n##### NSInvocationOperation\n\n`NSInvocationOperation` 对象被运行时，会执行在创建该对象时指定的方法。在以下情况下，你可能需要使用该对象：\n\
  \n- 你想避免在应用内部创建过多的自定义操作类。\n- 你正在添加或维护一个已有应用，其中的类已经定义完善，并且你不想修改该类来将其子类化为 `NSOperation`。\n\
  - 选择器可能根据用户输入而变化。在这种情况下，你只需使用选定的选择器创建一个新的 `NSInvocationOperation` 对象即可。\n\n创建 `NSInvocationOperation`\
  \ 对象的代码如下：\n\n```\nNSInvocationOperation* theOp = [[NSInvocationOperation alloc]\
  \ initWithTarget:self\n                                                        \
  \            selector:@selector(myTaskMethod:) object:data];\n```\n\n这与使用 `NSThread`\
  \ 创建并分离新线程时的情况类似。你传递目标对象、想要调用的选择器，以及你希望选择器在执行时拥有的参数。\n\n\n\n```markdown\n##### NSBlockOperation\n\
  \n`NSBlockOperation`是`NSOperation`的另一个子类。当你创建一个块操作时，你必须在操作对象内添加至少一个块。之后，你可以向该操作对象中添加更多要执行的块。当操作队列执行此块操作时，它会在该块操作完成前执行其内部的所有块。因此，你可以使用此操作对象来跟踪一组块，然后合并或处理相关结果。\n\
  \n要创建块操作对象，可以使用以下代码：\n\n```\nNSBlockOperation* theOp = [NSBlockOperation blockOperationWithBlock:\
  \ ^{\n      NSLog(@\"Beginning operation.\\n\");\n      // Do some work.\n}];\n\
  ```\n\n然后，稍后你可以通过调用以下代码向此操作添加另一个块：\n\n```\n[theOp addExecutionBlock:[NSBlockOperation\
  \ blockOperationWithBlock: ^{\n      NSLog(@\"Beginning operation.\\n\");\n    \
  \  // Do some work.\n}];\n```\n\n##### NSOperation\n\n`NSOperation`是一个供你通过子类化来自定义的类。要子类化`NSOperation`，你需要创建一个包含两个推荐（但非强制）方法的类。\n\
  \n- *自定义初始化方法*：用于接收数据以及在类内部进行逻辑处理所需的属性。例如，你可以有一个`init`方法来接收用于下载图片的 URL，如下所示：\n\n\
  ```\n- (id)initWithData:(id)data {\n    if ((self = [super init]))\n      myData\
  \ = data;\n    return self;\n}\n```\n\n- `main` *方法*：一个必需的方法，当任务启动时会被调用。\n\n要创建一个并发的`NSOperation`子类，你需要重写更多方法，以帮助`NSOperationQueue`对象处理调用者的多线程请求。\n\
  \n- `start` *或* `main`：你需要重写此方法或`main`方法，以便在线程启动你的操作时执行你的逻辑。默认情况下，此方法除了调用`main`方法外什么都不做。因此，你可以重写此方法或`main`方法。\n\
  - `isExecuting` *和* `isFinished`：你的操作必须向外部客户端报告其当前状态。两个最重要的状态是你的操作是否已开始执行以及是否已完成。因此，你需要通过属性或实例变量跟踪当前的操作状态，并在此处报告这些状态。\n\
  - `isConcurrent`：你必须重写此方法以返回`YES`。\n\n其他方法不是强制的，但通常你需要它们。\n\n- *其他逻辑处理方法*：除非你想将所有代码都放在`main`方法中，否则你还需要其他方法来包含你的逻辑处理代码。\n\
  \nListing 6–4 展示了一个自定义并发`NSOperation`类的完整代码示例。\n\n**Listing 6–4.** 一个自定义并发的`NSOperation`类\n\
  \n```\n@interface ConcurrentOperation: NSOperation {\n   BOOL        executing;\n\
  \   BOOL        finished;\n   NSURL      *url;\n}\n\n@property (nonatomic, strong)\
  \ NSURL *url;\n@property (nonatomic, weak) id delegate;\n\n@end\n\n@implementation\
  \ ConcurrentOperation\n\n@synthesize url;\n\n// put your necessary data and arguments\
  \ in the custom initilization code\n- (id)initWithURL:(NSURL *)aURL operationDelegate:(id)aDelegate\
  \ {\n   self = [super init];\n   if (self) {\n       executing = NO;\n       finished\
  \ = NO;\n       self.url = aURL;\n       self.delegate = aDelegate;\n   }\n   return\
  \ self;\n}\n// remember to always override this method and return YES\n- (BOOL)isConcurrent\
  \ {\n   return YES;\n}\n\n- (BOOL)isExecuting {\n   return executing;\n}\n\n- (BOOL)isFinished\
  \ {\n   return finished;\n}\n\n// here, we choose to override the main method to\
  \ download the image and send it back to\n// the main selector.\n- (void)main {\n\
  \    NSData *loadedData = [[NSData alloc] initWithContentsOfURL:self.url];\n   \
  \ UIImage *myImage = [UIImage imageWithData:loadedData];\n\n    [self.delegate performSelectorOnMainThread:@selector(imageLoaded:)\n\
  \                                    withObject:myImage\n                      \
  \           waitUntilDone:YES];\n}\n\n@end\n```\n\nListing 6–4 展示了如何编写一个自定义的`NSOperation`，通过多线程从网络下载图片。\n\
  \n**注意：** 如果你以前做过 Java 编程，你可能会发现`NSOperation`与`Thread`类或`Runnable`接口有相似之处。在`Thread`类中，你可以扩展`Thread`类并重写`run`方法。对于`Runnable`接口也是一样，你需要实现`Runnable`接口并重写`run`方法。你可以将`NSOperation`的`main`方法视为\
  \ Java 中`Thread`类和`Runnable`接口中的`run`方法。\n\n### 配置线程\n\n有几个选项可以用来正确配置你的线程，以便在不过载的情况下充分利用系统资源，特别是在像\
  \ iPhone 这样受限的运行时环境中。\n\n- *栈大小*：每当创建新线程时，操作系统都会为该线程分配一块默认大小的内存作为栈来执行。如果你不了解栈，可以查阅第\
  \ 5 章。线程内部的栈将存储局部变量以及线程运行时调用的方法。要为线程设置栈大小，你必须在分离线程之前设置该大小。对于`NSThread`，这意味着你使用如下初始化方法：\n\
  \n```\nNSThread* myThread = [[NSThread alloc]\n                        initWithTarget:self\n\
  \                              selector:@selector(myThreadMainMethod:)\n       \
  \                         object:nil];\n[myThread setStackSize:40960]; // 40KB here,\
  \ the size is in bytes and multiple of 4KB\n[myThread start];  // Actually create\
  \ the thread\n```\n\n- *线程本地存储*：每个线程都有一个用于存储数据的键值对字典，这些数据可以在线程内部的任何地方访问。你可以使用这个字典来存储那些希望在线程执行期间持久化的数据，而无需在代码中创建全局变量。你可以通过`[aThread\
  \ threadDictionary]`来调用这个字典。\n- *线程优先级*：线程优先级涉及操作系统选择执行某个线程的可能性。优先级越高，线程运行的可能性就越大。然而，优先级并不保证任何事情，例如在操作系统切换到另一个线程之前该线程的执行时间。它也不保证高优先级线程总是被选中，而不是其他低优先级线程。\n\
  \n### 你的线程入口点\n\n当你启动线程时，你需要有一些代码来管理该线程的当前状态、线程执行时创建的内存以及线程内部可能抛出的任何异常。原因是你新创建的线程有自己的栈，这与默认栈不同，如图\
  \ 6–4 所示。因此，你的线程使用的内存与主线程使用的内存区域不同。异常也是类似的；它只会存储在你的栈中，而不会返回给主栈和主线程。\n\n![images](img/0604.jpg)\n\
  \n**图 6–4.** 两个线程有不同的栈来管理它们的执行\n\n有几件事情你需要记住：\n\n- **自动释放池**：用于管理自动释放的对象。\n- `ExceptionHandler`：用于管理线程运行时抛出的异常。\n\
  - `RunLoop`：用于创建事件处理代码。\n\n我将讨论为什么需要实现它们中的每一个，以及如何正确地做到这一点。\n\n表 6–3 提供了一个简短摘要，帮助你回顾创建和配置线程的主要技术及其优缺点。\n\
  \n![Images](img/t0603.jpg)\n```\n\n\n\n## 自动释放池\n\n在应用程序的每个线程中，你都应该始终拥有一个`Autorelease\
  \ Pool`，方法是将代码放在`@autoreleasepool`块内。该池包含线程运行时所有自动释放的对象。如果你从未调用过返回自动释放对象的方法，最好还是包含它，因为底层框架和库可能会创建并返回自动释放的对象。如果你有`@autoreleasepool`但从未使用自动释放，一切仍然可以正确运行。\n\
  \n如果你查看 XCode 提供的任何应用程序模板中的`main`方法，你会看到以下代码：\n\n```\nint main(int argc, char *argv[])\
  \ {\n    @autoreleasepool {\n        int retVal = UIApplicationMain(argc, argv,\
  \ nil, nil);\n    }\n    return retVal;\n}\n```\n\n这个`@autoreleasepool`将处理该线程内的所有自动释放对象。正如你可能已经知道的，自动释放对象是你不再需要使用但还不希望释放的对象。它也可以由工厂方法（如`[NSMutableArray\
  \ array];`）作为自动释放对象返回。这些对象将在运行循环结束时随池一起释放。\n\n因此，如果你创建了一个新线程，请确保将代码包装在`@autoreleasepool`块内，如下所示：\n\
  \n```\n- (void)myThreadMethod {\n    @autoreleasepool { // 顶级池\n        // 在此处执行线程工作\n\
  \    }\n}\n```\n\n### 异常处理器\n\n在处理线程时，异常非常重要。因为每个线程都有自己的栈，当引发异常时，它会遍历栈的方法到达顶部。这可能导致你的线程停止运行。主线程中的任何异常处理程序也将被忽略。\n\
  \n以下是处理异常的一些基本代码：\n\n```\nNSObject *myObject = nil;\n@try {\n    // 访问数组中的一些对象\n\
  \    myObject = [myArray objectAtIndex:2];     \n}\n@catch ( NSException *e ) {\n\
  \    NSLog(@\"数组元素少于 3 个\");\n}\n@finally {\n    // 在此处编写清理代码\n}\n```\n\n### 运行循环\n\
  \n当你创建一个新线程时，有两种方式可以执行该线程。\n\n- 你编写代码执行线程内的逻辑，直到任务完成且几乎没有中断，例如之前显示的从 URL 下载图像的代码。这很简单，正如你所见。\n\
  - 你希望线程在有动态事件进入时做出响应，例如监听网络上的某些套接字或某个时间触发的事件。这与第一种情况不同，需要你编写代码来创建新的运行循环。\n\n以下是一些简单的`RunLoop`代码，用于监听输入流：\n\
  \n```\nNSRunLoop *runLoop = [NSRunLoop currentRunLoop];\n[iStream setDelegate:self];\n\
  [iStream scheduleInRunLoop:runLoop forMode:NSDefaultRunLoopMode];\n```\n\n**注意：**如果在没有运行循环的线程上调用了`[NSRunLoop\
  \ currentRunLoop]`，此方法将导致创建一个新的运行循环。\n\n如果你希望运行循环在开始运行前等待一段时间，可以使用`NSTimer`来完成此任务：\n\
  \n```\n[NSTimer scheduledTimerWithTimeInterval:2.0\n                           \
  \      target:self\n                               selector:@selector(doStuff)\n\
  \                               userInfo:nil\n                                repeats:YES];\n\
  ```\n\n然而，在某些情况下你不应该使用`RunLoop`，例如在主线程中，你有事件处理代码如`NSInputStream`或`NSTimer`，它们执行一些需要很长时间才能完成的重任务。因为像我的例子这样的事件处理代码最终会在创建它的线程上工作，你的线程无法继续处理其他事件处理代码，直到旧事件被处理并完成。如果你在该线程内创建定时器或输入流运行循环，可能会损害你的主\
  \ UI 线程。主要问题是它会使你的 UI 响应速度变慢。\n\n## 线程的风险\n\n在多线程环境中运行时，你总是需要注意一件事：你无法控制线程的执行顺序。例如，如果你有两个线程，线程\
  \ 1 和线程 2，CPU 会在一定时间内处理线程 1，然后切换到线程 2 并继续运行另一段时间。问题是你不知道 CPU 何时切换，也不知道它会为特定线程分配多少时间。这些时间量对于每个线程和每次运行并不相等。\n\
  \n为了演示难以控制输出的危险性，我将向你展示一个示例。该示例包含两个线程：线程 1 和线程 2。线程 1 打印奇数整数，线程 2 打印偶数整数。这些整数的范围是\
  \ 1 到 20。线程 1 将先启动，然后线程 2 启动。该示例将运行三次。\n\n清单 6–5 显示了示例代码。\n\n**清单 6–5.** *不受控制的输出与多线程*\n\
  \n```\n- (void)printOddIntegers {\n   for (int i = 0; i < 20; i++) {\n        //\
  \ 打印奇数整数\n       if (i % 2 == 1) {\n           NSLog(@\"%d\", i);\n       }\n  \
  \ }\n}\n\n- (void)printEvenIntegers {\n   for (int i = 0; i < 20; i++) {\n     \
  \  // 打印偶数整数\n       if (i % 2 == 0) {\n           NSLog(@\"%d\", i);\n       }\n\
  \   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   [NSThread detachNewThreadSelector:@selector(printOddIntegers)\
  \ toTarget:self\nwithObject:nil];\n   [NSThread detachNewThreadSelector:@selector(printEvenIntegers)\
  \ toTarget:self\nwithObject:nil];\n}\n```\n\n如你所见，我首先调用打印奇数整数，然后调用打印偶数整数。因此你可能期望看到：\n\
  \n- 一些奇数整数先被打印。\n- 奇数整数和偶数整数被均匀打印，例如两个奇数整数，然后两个偶数整数。\n\n然而，这两种假设都不正确，如表 6–4 所示，该表显示了三次运行的结果。\n\
  \n![Images](img/t0604.jpg)\n\n正如你在第二次运行中所见，数字 0 首先被打印，而在其他运行中数字 1 首先被打印。奇数整数和偶数整数的打印并不均匀；此外，在偶数整数被打印之前，奇数整数被打印的数量没有规律。\n\
  \n因此，在多线程环境中，你无法控制线程的执行顺序。多线程是一把双刃剑。实现多线程应用程序的开发人员必须意识到三个主要风险。\n\n- **安全性**：该标准意味着在多线程环境下，输出应如预期正确。换句话说，程序可以以不同的顺序多次运行，但最终输出应符合预期且正确。“永远不会发生坏事。”\n\
  - **活跃性**：这与安全性不同。一个定义是“最终发生了好事。”例如，假设线程 A 必须等待线程 B 的结果，但不知何故这些结果从未返回。因此线程 A 永远无法计算最终结果。你通常听到的这个问题的术语是*死锁*。\n\
  - **性能**：iPhone 应用的重要目标之一是拥有更好的性能和更响应的 UI。因此，必须达到你的性能目标。活跃性只关心最终发生好事；它不关心那个好结果发生的速度有多快。\n\
  \n我将在后续部分通过示例介绍每个标准，以便你理解是什么导致了不良标准，以及如何修复它以确保你的应用程序以高性能运行。\n\n\n\n### 线程安全\n\n\
  线程安全是指，在多线程环境中运行的程序，应当像在单线程环境中运行一样，产生正确且预期的结果。我将讨论一个在多线程环境中常见的问题：当两个或多个线程访问同一份数据时可能发生的状况。\n\
  \n#### 问题\n\n图 6-5 描述了两个线程试图获取同一个数据项如何导致应用程序崩溃。在图 6-5 中，线程 1 尝试将一个数据项推入当前栈。接着，线程\
  \ 2 和线程 3 都想要取出这个数据项，并先检查栈中是否有数据项。然而，在两个线程都检查完成后，线程 2 抢先执行并取出了数据项。糟糕！正如你所见，已经没有数据项留给线程\
  \ 3 了。这可能导致你的应用程序崩溃。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *执行多线程检查时发生崩溃*\n\n\
  你可以从 `ThreadSafety` 项目中获取示例代码，但代码清单 6-6 展示了该问题的代码示例。请注意，这个问题并非每次都会发生，但如果代码运行足够长的时间，它就会出现。代码中使用了一个\
  \ `NSMutableArray` 变量 `storages`，以便客户端代码可以向其中添加和删除数据。\n\n**代码清单 6-6.** *线程安全*\n\n\
  ```\n- (void)pushData {\n      @autoreleasepool {\n         while (YES) {\n    \
  \         // storages 属性是一个用于存储数据的 NSMutableArray\n             [self.storages addObject:[[NSObject\
  \ alloc] init]];\n             [NSThread sleepForTimeInterval:0.1];\n         }\n\
  \     }\n}\n\n- (void)popData {\n   @autoreleasepool {\n      while (YES) {\n  \
  \       if ([self.storages count] > 0) {\n            NSObject *object = [self.storages\
  \ objectAtIndex:0];\n            NSLog(@\"object: %@\", object);\n            [self.storages\
  \ removeObjectAtIndex:0];\n         }\n         [NSThread sleepForTimeInterval:0.1];\n\
  \      }\n   }   \n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   self.storages\
  \ = [NSMutableArray array];\n   [NSThread detachNewThreadSelector:@selector(pushData)\
  \ toTarget:self\nwithObject:nil];\n   [NSThread detachNewThreadSelector:@selector(popData)\
  \ toTarget:self withObject:nil];\n\n   [NSThread detachNewThreadSelector:@selector(popData)\
  \ toTarget:self withObject:nil];\n}\n```\n\n当你运行上述代码一段时间后，会收到以下信息：\n\n```\n2011-05-19\
  \ 18:53:15.540 ThreadSafety[2130:7103] object: <NSObject: 0x4e1d5e0>\n2011-05-19\
  \ 18:53:15.540 ThreadSafety[2130:6b03] object: <NSObject: 0x4e1d5e0>\n2011-05-19\
  \ 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating app due to uncaught\nexception\
  \ 'NSRangeException', reason: '*** -[NSMutableArray removeObjectAtIndex:]: index\n\
  0 beyond bounds for empty array'\n*** Call stack at first throw:\n(\n   0   CoreFoundation\
  \       0x00dc75a9 __exceptionPreprocess + 185\n   1   libobjc.A.dylib      0x00f1b313\
  \ objc_exception_throw + 44\n   2   CoreFoundation       0x00dc049f -[__NSArrayM\
  \ removeObjectAtIndex:] + 415\n   3   ThreadSafety         0x000022b1 -[ThreadSafetyViewController\
  \ popData] + 251\n   4   Foundation           0x00021cf4 -[NSThread main] + 81\n\
  \   5   Foundation           0x00021c80 __NSThread__main__ + 1387\n   6   libSystem.B.dylib\
  \    0x95486819 _pthread_start + 345\n   7   libSystem.B.dylib    0x9548669e thread_start\
  \ + 34\n)\nterminate called after throwing an instance of 'NSException'\n```\n\n\
  错误信息是：\n\n```\n2011-05-19 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating app\
  \ due to uncaught\nexception 'NSRangeException', reason: '*** -[NSMutableArray removeObjectAtIndex:]:\
  \ index\n0 beyond bounds for empty array'\n```\n\n这告诉你，你试图从一个空数组中删除一个对象。这在移除第一个对象之前，你已经检查过数组非空的情况下是不应该发生的。而且你甚至打印出结果，确认数组里还有最后一个对象。\n\
  \n现在，如果你再看一下图 6-4，就应该明白为什么这会导致崩溃了——因为在线程 1 检查并打印出最后一个对象之后，线程 1 停止并轮到线程 2 执行了。\n\n\
  \n\n#### 解决方案\n\n我对此问题的解决方案是锁定方法，直到线程完成。锁是一种机制，用于确保一次只有一个线程能访问特定的代码块。想象一下，你正在参加一个需要与许多人直接竞争的竞赛。你和你的对手们会得到一个问题，谁先按铃谁就能回答。在第一个选手回答完毕后，其他人才能再次按铃。在第一个选手回答时，铃是锁定的。这里的线程也是如此。你可以创建一个像铃铛一样工作的锁：第一个获得锁（类似于按铃）的线程会阻塞所有其他线程，直到它完成。第一个线程完成后，锁被打开（类似于其他人可以按铃）；其他线程可以尝试先获得锁，然后过程重复。\n\
  \n基本要点是，锁定机制确保当某个线程正在处理任务时，没有其他线程可以中断。例如，如果线程 1 正在获取对象并打印它，线程 2 必须等待，直到线程 1 完成从数组中获取并移除该对象。\n\
  \n锁将在某个对象上创建。如果线程 1 获得了对象 A 的锁，那么没有其他线程能再获得对象 A 的锁，这些后来的线程必须等待，直到线程 1 完成并将锁归还给对象\
  \ A。\n\n获取对象 A 锁的最简单方法是使用 `@synchronized(objA)`，如 代码清单 6–7 所示。\n\n**代码清单 6–7.**\
  \ *锁的代码*\n\n```\n@synchronized(anObj) {\n  // 这里的所有内容都被对象 A 上的 @synchronized 指令锁定\n\
  }\n```\n\n我们的代码将变为：\n\n```\n- (void)pushData {\n   @autoreleasepool {\n       while\
  \ (YES) {\n          @synchronized(lockedObj) {\n             [self.storages addObject:[NSObject\
  \ new]];\n          }\n          [NSThread sleepForTimeInterval:0.1];\n      }\n\
  \   }\n}\n\n- (void)popData {\n   @autoreleasepool {\n       while (YES) {\n   \
  \       @synchronized(lockedObj) {\n              if ([self.storages count] > 0)\
  \ {\n                  NSObject *object = [self.storages objectAtIndex:0];\n   \
  \               NSLog(@\"object: %@\", object);\n                  [self.storages\
  \ removeObjectAtIndex:0];\n              }\n          }\n          [NSThread sleepForTimeInterval:0.1];\n\
  \       }\n   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   self.storages =\
  \ [NSMutableArray array];\n   self.lockedObj = [NSObject new];\n   [NSThread detachNewThreadSelector:@selector(pushData)\
  \ toTarget:self withObject:nil];    \n   [NSThread detachNewThreadSelector:@selector(popData)\
  \ toTarget:self withObject:nil];\n   [NSThread detachNewThreadSelector:@selector(popData)\
  \ toTarget:self withObject:nil]; \n}\n```\n\n**注意：** 在许多情况下，你可以使用 `self` 作为锁对象，效果是一样的。你只需要确保在想要一起锁定的地方使用同一个锁对象。例如，如果你有\
  \ 2 个不同的 `storages` 变量，你可以考虑为不同的 `storages` 使用不同的锁。\n\n图 6–6 可视化了 `@synchronized`\
  \ 在线程上的工作方式。\n\n![images](img/0606.jpg)\n\n**图 6–6.** *锁在多线程中的工作原理*\n\n你对 `push`\
  \ 和 `pop` 数据方法都进行了同步，因为如果你只锁定一个方法，那么在检查弹出操作时，存储区可能会推入更多数据，从而导致你无法获取所需的对象。为了防止这种情况，你需要使用同一个\
  \ `lockedObj` 锁定它们两个，这样一次只能运行一个方法。\n\n你的代码是安全的，但还有两个关于多线程的重要属性需要讨论。\n\n### 活性\n\n\
  *活性*指的是“一件好事最终发生”。例如，如果你的代码目标是确保你能持续地从数组中推入和弹出对象，那么问题就是这个过程是否会永远进行下去。锁定的问题在于它可能导致系统中所有正在工作的线程一直等待——换句话说，就是死锁。如果你能保证应用程序的活性，死锁就永远不会发生。\n\
  \n#### 问题\n\n想象一下你有两个线程：A 和 B。A 在等待 B 完成其工作后，A 才能开始。然而，线程 B 又在等待线程 A 完成其工作后，它才能继续。\n\
  \n举一个实际的例子，你可以回顾 代码清单 6–7 中的代码。注意，push 和 pop 线程被同一个对象 `lockedObj` 锁定。图 6–7 显示了锁定在同一个对象上的两个线程如何互相无限等待。\n\
  \n![images](img/0607.jpg)\n\n**图 6–7.** *线程互相等待*\n\n正如你在这个新示例中看到的，因为 storages 计数为\
  \ 0，pop 线程一直在 while 循环中等待。而 push 线程无法向数组中添加新对象，因为那段代码被对象 `lockedObj` 锁定了。push 线程现在必须等待，直到\
  \ pop 线程完成并将锁归还给 `lockedObj`。因此，这两个线程停止并永远互相等待。以下是解决这种死锁问题的一些可能方案。\n\n如果你的代码容易死锁，你就不能再使用\
  \ `@synchronized(lockedObj)` 了，因为这个指令不支持任何避免死锁的机制。你可以使用另外两种可能的机制来避免死锁。\n\n* `NSLock`：你可以用它来保护对代码段的并发访问，就像使用\
  \ `@synchronized(obj)` 一样，但你可以控制何时锁定和解除锁定那段代码。\n* `NSCondition`：这对于生产者/消费者模型（如前文所示的\
  \ push/pop 示例）非常有用。\n\n#### NSLock 解决方案\n\n你可以通过两种方式使用它：`lock` 或 `tryLock`。使用 `lock`\
  \ 方法时，无法获取锁的方法会停止并等待，直到它获得锁。然而，使用 `tryLock` 方法时，如果 `tryLock` 方法返回 `NO`，则表示该锁已经被另一个线程拥有，调用线程无法获取。\n\
  \n**Lock 示例：**\n\n```\nNSLock *testLock = [[NSLock alloc] init];\n[testLock lock];\n\
  \nif ([self.storages count] > 0) {\n  NSObject *object = [self.storages objectAtIndex:0];\n\
  \  NSLog(@\"object: %@\", object);\n  [self.storages removeObjectAtIndex:0];\n}\n\
  [NSThread sleepForTimeInterval:0.1];\n[testLock unlock];\n```\n\n这段代码的工作方式与之前示例中的\
  \ `@synchronized(obj)` 类似，你在代码开头获取锁，并在末尾解除锁定。然而，`tryLock` 方法的运行方式会有所不同。\n\n**TryLock\
  \ 示例：**\n\n```\nNSLock *testLock = [[NSLock alloc] init];\nif([testLock tryLock])\n\
  \  // storages 是一个 NSMutableArray 成员变量属性，用于存储数据。\n  if ([self.storages count] >\
  \ 0) {\n    NSObject *object = [self.storages objectAtIndex:0];\n    NSLog(@\"object:\
  \ %@\", object);\n    [self.storages removeObjectAtIndex:0];\n  }\n  [NSThread sleepForTimeInterval:0.1];\n\
  }\n[testLock unlock];\n```\n\n它会测试你是否能获取锁，然后继续执行。如果你没有获取到锁，一切正常，线程会继续运行其余代码，而不会被阻塞。\n\
  \n\n\n#### NSCondition 解决方案\n\n使用 `NSLock` 时，你会发现，在通过 `[testLock lock];` 获取锁之后，无法停止或挂起线程来等待某个条件。你唯一能做的就是继续执行，直到解锁，以便其他线程可以进入。\n\
  \n回顾一下 push/pop 示例。反复运行线程来检查数组中是否有项目，这效率并不高。在循环中，如果线程发现数组中没有项目，它应该停止并等待，直到有项目出现，然后再进入并取出该项目。这种方法的好处在于，你可以挂起线程，而不会白白浪费过多的系统资源。\n\
  \n要让线程停止、等待，并同时释放锁，你需要使用 `NSCondition`。代码清单 6–8 演示了如何在 push/pop 示例中使用 `NSCondition`。\n\
  \n**代码清单 6–8.** *NSCondition 示例*\n\n```\n- (void)pushData {\n   @autoreleasepool\
  \ {\n\n      while (YES) {\n         // condition 是类的一个 NSCondition 成员变量，这样你可以与其他方法/代码块共享此条件\n\
  \         [condition lock];\n\n         // storages 是用于存储数据的 NSMutableArray 成员变量属性\n\
  \         [self.storages addObject:[NSObject new]];\n         [NSThread sleepForTimeInterval:0.1];\n\
  \         [condition signal];\n         [condition unlock];\n      }\n   }\n}\n\n\
  - (void)popData {\n   @autoreleasepool {\n      while (YES) {\n         // condition\
  \ 是类的一个 NSCondition 成员变量，这样你可以与其他方法/代码块共享此条件\n        [condition lock];\n\n    \
  \     // storages 是用于存储数据的 NSMutableArray 成员变量属性\n         while([self.storages\
  \ count] <= 0)\n            [condition wait];\n         NSObject *object = [self.storages\
  \ objectAtIndex:0];\n         NSLog(@\"object: %@\", object);\n         [self.storages\
  \ removeObjectAtIndex:0];\n         [condition unlock];\n      }\n   }\n}\n```\n\
  \n还有其他锁定机制，比如 `NSRecursiveLock` 和 `NSConditionLock`，但在大多数情况下，使用 `NSLock` 和 `NSCondition`\
  \ 通常就足够了。对于线程处理，你应该始终力求简单，因为多线程可能会在代码中引入难以察觉的 bug。\n\n**注意：** 如果你有一个线程想要多次获取锁而不引起死锁，`NSRecursiveLock`\
  \ 会很有用。`NSRecursiveLock` 仍然会阻止其他线程访问该代码块。\n\n#### 死锁\n\n使用这些锁可能会在代码中引发死锁问题。死锁看起来像是我最初向你介绍的问题，但它更多地与这样一种场景相关：当你有两个或多个锁，而线程在相互等待时。\n\
  \n图 6–8 演示了一种情况：线程 1 获取了对象 1 上的锁，线程 2 获取了对象 2 上的锁。然后线程 1 想要获取对象 2 的锁，但必须等待线程 2 释放锁。与此同时，线程\
  \ 2 想要获取对象 1 的锁，但必须等待线程 1 释放锁。如你所见，两个线程最终都在相互等待，没有一个线程能够继续工作。\n\n![images](img/0608.jpg)\n\
  \n**图 6–8.** *多线程如何陷入死锁*\n\n有一些方法可以用来解决这种死锁情况，例如：重新排列线程；最小化锁定；使用更大的锁；`tryLock`；以及锁定超时。这些机制实现起来并不困难；下面的图将帮助你了解如何操作。\n\
  \n在图 6–9 中，最简单的方法是重新排列线程和锁定的顺序，这样只有当某个线程完成对锁 2 的锁定后，其他线程才能获取该锁并继续其工作。\n\n然而，如果你的方法结构是固定的，或者某些代码属于第三方库，那么重新排列锁或修改代码就很困难了。\n\
  \n![images](img/0609.jpg)\n\n**图 6–9.** *线程重新排序*\n\n下一种方法是只在你真正需要锁定某部分时才进行锁定。这样可以将锁定的范围最小化，如图\
  \ 6–10 所示。\n\n![images](img/0610.jpg)\n\n**图 6–10.** *最小化锁定范围*\n\n只有在你拥有代码，或者能设法分离出不需要锁定的部分时，才能轻松做到这一点。请注意，这可能会使你的代码看起来更复杂。\n\
  \n另一种实现方法是，在现有锁之上实现一个更大的锁。这将允许其他线程尝试同时访问同一个锁。例如，在图 6–11 中，由于新的更大锁的存在，线程 2 现在必须等待线程\
  \ 1 完成，之后才能获取任何锁或运行任何必要的代码。在常规代码中，如果你能移除较小的锁并用一个更大的锁替换，并且这样做能降低代码复杂度，那么就应该这么做。这种机制通常用于需要防止死锁，而你又无法或不想修改库代码的情况。\n\
  \n![images](img/0611.jpg)\n\n**图 6–11.** *一个更大的主锁*\n\n你也可以尝试前面提到的 `tryLock`。使用 `tryLock`，如果线程无法获取锁，它不会停止并等待。该线程可以继续执行线程内的其他逻辑。以下是使用\
  \ `tryLock` 的示例代码：\n\n```\nNSLock *testLock = [[NSLock alloc] init];\nif([testLock\
  \ tryLock])\n  if ([self.storages count] > 0) {\n    NSObject *object = [self.storages\
  \ objectAtIndex:0];\n    NSLog(@\"object: %@\", object);\n    [self.storages removeObjectAtIndex:0];\n\
  \  }\n  [testLock unlock];\n}\n[NSThread sleepForTimeInterval:0.1];\n```\n\n我要提到的最后一种方法（尽管还有许多其他防止死锁的方法）是使用超时。在\
  \ Objective-C 中，你可以指定线程等待，直到它能获取锁，或者等待指定的时间结束。使用 `lockBeforeDate` 方法将帮助你实现这一目标。调用此方法的线程将被阻塞，直到它能获取锁。如果参数中指定的\
  \ `NSDate` 实例超时，而线程仍然无法获取锁，它就会继续执行。这有助于应对死锁情况；你的线程可以继续运行，虽带有少许风险，但永远不会发生死锁。\n\n\n\
  \n### 性能\n\n性能是在应用中使用多线程的主要原因。然而，如你所见，如果使用不当，你的应用将面临诸多问题。正如我先前所示，若无法驾驭多线程的安全风险，应用将频繁崩溃。此外，部分功能会因线程阻塞或永久相互等待而失效。因此，在将多线程集成到应用中时，必须优先确保应用正常运行，之后再考虑性能问题。\n\
  \n鉴于上述问题，你应当仔细考量应用是否真的需要借助多线程来提升运行速度。要判断某项计算或运算是否需要分散到多个独立线程执行，需自问该任务是 CPU 密集型还是\
  \ I/O 密集型。\n\nCPU 密集型任务是指大部分或全部时间都在占用 CPU 并使其持续繁忙的任务。以下是 CPU 密集型任务的一些示例：\n\n- 复杂算法，例如在计算游戏逻辑时合并两个数组。\n\
  - 从内存中（已加载并存储在内存中）的较大字符串中扫描指定字符串。\n\n相比之下，I/O 密集型任务则大部分时间都在等待其他来源的数据。例如，若需从文件或远程服务器读取并加载图像，线程大部分时间会处于空闲状态，仅等待远程服务器的数据。这类任务称为\
  \ I/O 任务，应在独立线程中执行。\n\n为什么不应该将 CPU 密集型任务拆分为多个线程？这样做是否有助于加快计算速度？请参阅图 6–12 以详细了解。\n\
  \n如图 6–12 所示，当 CPU 需要在线程间切换时，会消耗一定的时间和资源。因此，任何多线程应用都存在开销成本。如果你的任务仅是 CPU 密集型，那么 CPU\
  \ 完成整个任务所需时间会更长，因为任务数量相同，但 CPU 还需应对额外开销。不过，如果未来 iPhone 确实增加了更多的 CPU 核心，将任务拆分才是有意义的。\n\
  \n![images](img/0612.jpg)\n\n**图 6–12.** *CPU 在线程切换上消耗的时间*\n\n在 I/O 任务中，情况则有所不同。如果\
  \ CPU 不切换到其他线程，它只会原地等待数据，无所事事。因此，对于 I/O 任务，应始终将其放入另一个线程，以便 CPU 能处理其他事务，而不是空等数据。\n\
  \n换句话说，想象一家超市。你的任务是服务所有顾客。以下两种场景有助于解释这两个概念：\n\n- 如果所有顾客都相同，且频繁到来，你可以选择将他们安排到多个类似的结账通道，或让他们排在同一个队列中。若将顾客分散到多个通道，但你只有一位收银员，他就需要在各个收银台之间来回切换服务。但如果让他们排在同一队列，收银员就无需来回移动。这类似于\
  \ CPU 密集型任务。\n- 然而，如果有不同类型的顾客，且他们不常光顾，情况就不同了。例如，你可以设置一个客服柜台、一个自助结账区和结账通道区。如果顾客不常来结账通道，收银员就只能站在那里等待，无所事事。或者他可以在不同区域间频繁切换：在客服柜台解答问题，在自助结账区提供协助。你无需雇用三位收银员，也无法将顾客安排到同一队列。这类似于\
  \ I/O 密集型任务，即数据并非同类，也不会频繁进入同一队列。\n\n你还需要考虑用户响应性。如果你的 CPU 密集型计算耗时过长，整个用户界面将被阻塞且失去响应。因此，如果是主线程（或\
  \ UI 线程），你需要将任何繁重的计算（无论是 CPU 密集型还是 I/O 密集型）都移出该线程。\n\n在设计多线程应用时，还需留意其他性能问题。查看以下代码，看看能否发现其中的问题：\n\
  \n```\n+ (void)saveImage:(NSData *)imageData {\n   @synchronized (self) {\n    \
  \   @autoreleasepool {\n          NSString *filePath = @\"\"; // 某默认路径\n       \
  \   [imageData writeToFile:filePath atomically:YES];\n       }\n    }\n}\n\n+ (void)caller\
  \ {\n   NSData *imageData = nil;\n   [NSThread detachNewThreadSelector:@selector(saveImage:)\
  \ toTarget:self\nwithObject:imageData];\n}\n```\n\n你或许能发现，问题在于 `@synchronized (self);`\
  \ 这一行。你正在使用多线程，但每次只允许一个线程访问这段代码。在这种情况下，多线程的优势何在？因此，使用锁时必须格外谨慎。你采用多线程是为了确保 I/O 密集型任务能受益于无需长时间等待或阻塞线程。如果线程使用不当，所有线程在开始执行任务前仍需要相互等待。\n\
  \n\n\n### 线程同步\n\n现在，我们来谈谈多线程中其他一些重要的部分。由于每个线程都在自己的栈中运行并创建属于自己的对象，那么你的线程如何在应用程序内部的不同线程之间通信和共享数据呢？如前所述，当你在多个线程之间共享数据结构或对象时，就存在多个线程试图修改该对象或数据结构的风险。\n\
  \n首先，我想介绍一个新术语：*线程安全*。线程安全的类（或函数）是指你无需担心之前提到的任何安全问题的类。这些类要么会自行处理锁定过程，要么是不可变类（它们无法被修改）。以下是线程安全类或函数的列表：\n\
  \n- `NSArray`\n- `NSConnection`\n- `NSData`\n- `NSDate`\n- `NSDictionary`\n- `NSNumber`\n\
  - `NSObject`\n- `NSSet`\n- `NSString`\n\n以及其他通常可变的、非线程安全的类：\n\n- `NSMutableArray`\n\
  - `NSMutableAttributedString`\n- `NSMutableCharacterSet`\n- `NSMutableData`\n- `NSMutableDictionary`\n\
  - `NSMutableSet`\n- `NSMutableString`\n\n为什么你应该优先选择线程安全的类，而不是非线程安全的类呢？为什么你不直接使用可变类，同时确保做好锁定呢？让我给你举一个例子，展示当你通过线程访问并修改对象时可能遇到的锁定问题：\n\
  \n```\nNSMutableArray* myArray = GetSharedArray();\nid anObject;\n\nif ([myArray\
  \ count] > 0) {\n  anObject = [myArray objectAtIndex:0];\n}\n\n[anObject doSomething];\n\
  ```\n\n这个例子非常简单，但它能帮助你理解一个非常重要的概念。你看出这段代码有什么问题了吗？在代码检查完数组长度之后，另一个线程可能会修改这个数组，并且此时数组中可能已经没有对象了，因为另一个线程可能已经移除了所有对象。于是，你通过添加锁进行了一点改进，但这仍然不是一个完美的解决方案。\n\
  \n```\nNSLock* arrayLock =[[NSLock alloc] init];\nNSMutableArray* myArray = GetSharedArray();\n\
  id anObject;\n\n[arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray\
  \ objectAtIndex:0];\n}\n[arrayLock unlock];\n\n[anObject doSomething];\n```\n\n\
  这样好一些了，但仍然存在一些问题，例如你取出的对象可能会被其他线程更改或修改。因此，下一步是把 `[anObject doSomething];` 这一行也放入锁定区域。\n\
  \n```\nNSLock* arrayLock =[[NSLock alloc] init];\nNSMutableArray* myArray = GetSharedArray();\n\
  id anObject;\n\n[arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray\
  \ objectAtIndex:0];\n   [anObject doSomething];\n}\n\n[arrayLock unlock];\n```\n\
  \n如果你拥有的 `myArray` 对象是一个 `NSArray` 而不是 `NSMutableArray`，那么你可能根本不需要锁。你可以直接正常调用它们。\n\
  \n```\nNSArray* myArray = GetSharedArray();\nid anObject;\n\nanObject = [myArray\
  \ objectAtIndex:0];\n[anObject doSomething];\n```\n\n这就是使用不可变对象优于可变对象的好处。你可以确信，在处理这些对象时，没有其他人能够更改或修改它们的属性。\n\
  \n## 线程的替代方案\n\n有时你不想处理线程带来的难题，或者不想自己创建和管理独立的线程。例如，如果你想要一个定时器每 2 秒调用你的方法，你可能需要编写一个持续循环、休眠\
  \ 2 秒然后调用方法的线程。或者你可能想编写代码来处理异步行为，比如从网络下载文件。或者你只想在 iPhone 空闲时继续执行一个繁重的计算过程。这些操作很难正确实现或获得良好的性能。我将讨论一些解决方案。\n\
  \n### NSTimer\n\n`NSTimer` 并不能保证非常精确；如果你将触发时间设置为 0.5 秒，定时器可能会在 0.55 秒甚至 0.6 秒时触发。但是，如果你只需要一个相对精确的调度机制，它仍然是一个好用的机制。\n\
  \n#### 重复定时器与非重复定时器\n\n你可以调度一个重复定时器或一个非重复定时器。对于重复定时器，定时器会根据你指定的时间间隔不断触发，并且永远不会自动失效。如果你希望它停止，需要手动使重复定时器失效。对于非重复定时器，它只会触发一次事件，然后自动失效。在这两种情况下，一旦定时器失效，就不能再重复使用；你需要创建另一个定时器。\n\
  \n要创建定时器，你可以选择调用\n\n`+ scheduledTimerWithTimeInterval:target:selector:userInfo:\
  \ repeats:`\n\n或\n\n`+ timerWithTimeInterval:target:selector:userInfo:repeats:`\n\
  \n第一个方法会创建一个新的定时器，将其添加到当前的运行循环中，并将定时器对象返回给你。第二个方法只会创建一个新的定时器；你需要自己调用 `[runLoop addTimer:forMode:]`\
  \ 将其添加到运行循环中。\n\n当使用重复定时器并需要使其失效时，你需要使用 `invalidate` 方法，如下所示：`[aTimer invalidate];`\n\
  \n**注意：** 在没有运行循环的线程上，`NSTimer` 根本无法工作。\n\n\n\n### 异步函数\n\n在许多情况下，异步函数可能比线程更轻量级。例如，iPhone\
  \ 环境可以重用线程池中的线程来处理异步函数。此外，如果你需要处理 100 个异步函数，操作系统可能只需创建 10 个线程，因为一个线程可以处理多个异步函数。唯一的问题是，有时它看起来可能比创建一些线程并使用同步请求来处理它们更复杂。\n\
  \n代码清单 6-9 是一个创建向服务器发送异步请求并将结果合并以创建完整数据对象的代码块。\n\n**代码清单 6-9.** *异步调用*\n\n`MyFetcher.h`\n\
  \n```objc\n#import <Foundation/Foundation.h>\n\n@interface MyFetcher : NSObject\
  \ {\n@private\n    NSURLRequest *request;\n    NSMutableData *data;\n    UIImage\
  \ *image;\n    NSURL *imageURL;\n}\n\n@property (nonatomic, strong) NSURLRequest\
  \ *request;\n@property (nonatomic, strong) NSMutableData *data;\n@property (nonatomic,\
  \ strong) IBOutlet UIImage *image;\n@property (nonatomic, strong) NSURL *imageURL;\n\
  \n- (void)loadImageWithURL:(NSURL *)url;\n\n@end\n```\n\n`MyFetcher.m`\n\n```objc\n\
  #import \"MyFetcher.h\"\n\n@implementation MyFetcher\n@synthesize request;\n@synthesize\
  \ data;\n@synthesize image;\n@synthesize imageURL;\n\n- (void)loadImageWithURL:(NSURL\
  \ *)url {\n    self.request = [NSURLRequest requestWithURL:url];\n    NSURLConnection\
  \ *connection = [NSURLConnection connectionWithRequest:self.request delegate:self];\n\
  \    if (connection) {\n        self.data = [NSMutableData data];\n    }\n}\n\n\
  - (void)connection:(NSURLConnection *)conn didReceiveResponse:(NSURLResponse *)response_\
  \ {\n    [data setLength:0];\n}\n\n- (void)connection:(NSURLConnection *)conn didReceiveData:(NSData\
  \ *)data_ {\n    [data appendData:data_];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection\
  \ *)connection {\n    self.image = [UIImage imageWithData:self.data];\n}\n\n- (void)connection:(NSURLConnection\
  \ *)connection didFailWithError:(NSError *)error {\n    self.data = nil;\n    self.image\
  \ = nil;\n}\n\n@end\n```\n\n将其与这个简单的线程和同步解决方案进行比较：\n\n```objc\n@autoreleasepool\
  \ {\n    NSData *imageData = [NSData dataWithContentsOfURL:imageURL];\n}\n```\n\n\
  你可以看到，在某些情况下，可能需要编写更多代码才能获得更好的性能。你只需确保自己的操作能真正带来收益即可。\n\n如果你要执行同步 HTTP 请求，则必须在后台线程中运行它。根据\
  \ iOS 的策略，如果应用程序长时间无响应，就会被终止。这肯定会给用户留下不好的印象。\n\n**注意：** 如果有太多并发的 HTTP 调用，可以考虑创建单独的线程来处理异步调用，以避免对主线程造成任何影响。\n\
  \n### 空闲时间通知\n\n有些操作你只想在系统空闲时执行。例如，如果你希望将一些反馈从 iPhone 发送到服务器，当其他进程正在运行或仍有其他用户与设备交互时，你可能不希望发送它。只有当用户或设备没有其他事情要做时，你才应该发送它。靠你自己完成这件事会非常困难。幸运的是，苹果为此提供了相应功能。你可以使用\
  \ `NSNotificationQueue` 以 `NSPostWhenIdle` 样式发布通知，如下代码所示：\n\n```objc\n- (void)notificationMethod\
  \ {\n    // 在此处执行某些操作\n}\n\n- (void)registerForNotification {\n    [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \ selector:@selector(notificationMethod)\n                                     \
  \            name:@\"my_notification\"\n                                       \
  \        object:nil];\n    NSNotification *notification = [NSNotification notificationWithName:@\"\
  my_notification\" object:nil];\n    [[NSNotificationQueue defaultQueue] enqueueNotification:notification\n\
  \                                              postingStyle:NSPostWhenIdle];\n}\n\
  ```\n\n如你所见，它的工作方式与你使用 `NSNotificationCenter` 的正常方式类似；你需要将对象和方法添加为观察者和选择器。然后，你可以向队列发布一个新通知，以便在系统处于空闲状态时处理该方法。\n\
  \n## iPhone 的线程分析工具\n\n第 2 章 已经讨论过线程分析工具，因此 图 6-13 只是一个提醒你该工具的简单图示。\n\n![images](img/0613.jpg)\n\
  \n**图 6-13** *iPhone 的线程分析工具*\n\n该工具除了显示应用程序内部正在运行的线程的当前状态外，不会提供太多信息。这可以帮助你了解是否因运行过多线程而导致系统过载，或者是否有任何线程挂起并等待过长时间，这是死锁的信号。\n\
  \n## 总结\n\n在本章中，你学习了如何使用多线程来提高应用程序的性能。概念非常简单：创建一个新线程来处理一些计算。然而，为了确保应用程序的正确性和安全性，你需要了解许多不同的陷阱。你还需要了解\
  \ CPU 密集型任务和 I/O 密集型任务的概念，以确保你的操作能真正提升应用程序的性能，而不是使其变慢。你学习了如何以不同方式创建、管理和运行线程。你还学习了\
  \ Objective-C 风格及其语法来处理锁和线程同步问题，这些都非常重要。\n\n**练习**\n\n1.  编写一个完整的程序，从 Internet 下载图像并将其显示到\
  \ `UIImageView` 中。你可以使用 XCode 中名为“基于视图的应用程序”的模板。\n2.  使用 `NSLock` 重写 `ThreadLock`\
  \ 示例，使其没有死锁问题。\n3.  重写示例项目 MultiThreadingSample，使用线程处理同步请求而不是异步请求。\n\n## 第 7 章\n\
  \n## 优化内存使用以获得更好的性能\n\n在本章中，你将学习以下内容：\n\n- 回顾旧的手动内存管理策略\n- 对象所有权策略\n- 基于旧的手动内存管理的全新自动内存管理\n\
  - 什么是对象复制以及如何使用它\n- 如何正确使用 `autorelease` 和 `release` 方法\n- 回顾内存分析工具\n\niPhone 是一个内存有限的环境。然而，许多开发人员要么低估要么高估了这一事实，因此他们没有利用\
  \ iPhone 中所有可用的内存来提升性能。另一些开发人员则对 iPhone 的内存和性能过于担心，以至于进行了大量过早优化，这损害了代码的可读性，并使后续维护代码库变得困难。\n\
  \n为了在不让应用程序崩溃的情况下，利用内存获得更好的性能和可读性，你需要了解 iPhone 环境的内存结构。你需要学习如何避免在内存中持有过多对象，这可能会导致内存警告，进而崩溃。你还需要学习何时应该保留或释放对象；如果在内存中持有的对象太少，可能会使计算运行得更慢，因为你需要重建对象或从文件系统加载它。\n\
  \n## 简要回顾\n\n这部分将帮助你顺利过渡到新的自动引用计数 (ARC) 机制。有些人对过渡到新的学习体验感到困惑。我希望这部分可以帮助你顺利、毫无问题地过渡到新的\
  \ ARC 机制。\n\n\n\n## 旧版对象所有权策略\n\n这个旧概念是指：如果你的对象 A 对另一个对象 B 持有强引用，那么对象 A 需要手动释放对象\
  \ B。当对象 A 通过 `alloc`、`copy`、`mutableCopy`、`new` 或 `retain` 方法获取对象 B 时，对象 A 就对对象\
  \ B 持有强引用。反之，如果对象 A 没有调用对象 B 的这些方法，那么对象 A 仅持有对对象 B 的弱引用。\n\n对于旧版内存管理机制，如果你的对象或方法对另一个对象\
  \ B 持有强引用，那么它有责任负责 `release` 或 `autorelease` 该对象 B。每次对对象 B 的强引用都会使其引用计数增加 1。如果没有任何对象再持有对对象\
  \ B 的强引用，换句话说，其引用计数为 0，那么对象 B 就会被释放（代码清单 7.1）。\n\n**代码清单 7.1.** 如果持有强引用，需释放对象\n\n\
  ```\n- (void)doSomething {\n  NSObject *obj = [[NSObject alloc] init];\n  NSLog(@\"\
  obj: %@\", obj);\n  [obj release];\n}\n```\n\n## 自动释放\n\n`autorelease` 方法的作用是将对象发送到一个池中，并声明该对象将在稍后被释放。使用此方法时，你不再想持有该对象的强引用，但又不希望它立即被释放。请看代码清单\
  \ 7.2。\n\n**代码清单 7.2.** 内存问题\n\n```\n- (NSObject *)getObj {\n  NSObject *obj = [[NSObject\
  \ alloc] init];\n  return obj;\n}\n\n- (void)anotherMethod {\n  NSObject *myObj\
  \ = [self getObj];\n  // 执行一些操作\n  // 我应该在这里释放该对象吗？\n  [myObj release];\n}\n```\n\
  \n现在，当你处理完对象后，需要思考是否应该立即释放你的 `myObj`。通常你会认为必须释放它；否则，没有人会释放那个 `myObj`，从而导致内存泄漏。然而，因为你的\
  \ `anotherMethod` 并没有持有对 `myObj` 的强引用，所以它无法释放 `myObj`。唯一的办法是像代码清单 7.3 那样使用 `autorelease`。\n\
  \n**代码清单 7.3.** 使用自动释放解决该问题\n\n```\n- (NSObject *)getObj {\n  NSObject *obj = [[NSObject\
  \ alloc] init];\n  return [obj autorelease];\n}\n\n- (void)anotherMethod {\n  NSObject\
  \ *myObj = [self getObj];\n  // 执行一些操作\n}\n```\n\n**注意：** 方法 `anotherMethod` 不持有强引用。\n\
  \n## 自动释放池\n\n我先快速概述一下自动释放池，然后深入解释这个概念，以便你理解自动释放池与显式释放之间的区别。\n\n自动释放池是存储所有自动释放对象的地方。当这个自动释放池被释放时，所有自动释放的对象也会收到一条\
  \ `release` 消息。如果某个对象的引用计数为 0，那么该对象就会被释放。\n\n自动释放池会在事件生命周期的结束时被释放。例如，当用户点击 UI 时，会创建一个新的事件生命周期来处理点击事件，然后处理与该点击事件相关的所有逻辑，最后将结果显示给用户。这就是一个事件生命周期。对于那个事件生命周期，你会有一个自动释放池。\n\
  \n主要的自动释放池在 `main` 方法中创建，如下代码所示：\n\n```\nint main(int argc, char *argv[]) {\n  \
  \ @autoreleasepool {\n      int retVal = UIApplicationMain(argc, argv, nil, nil);\n\
  \   }  \n   return retVal;\n}\n```\n\n如代码所示，在方法开始时，会创建一个新的自动释放池，然后通过 `UIApplicationMain`\
  \ 执行主要逻辑；在该事件循环结束后，池被释放。这个循环过程如图 7–1 所示。\n\n![images](img/0701.jpg)\n\n**图 7–1.**\
  \ *自动释放循环*\n\n## 自动引用计数\n\n上述过程的问题在于，当你总是需要记住何时使用 `retain`、`release` 或 `autorelease`\
  \ 的规则时，情况会变得非常复杂。因此，在新的 Xcode（Xcode 4.2）中，苹果发布了一种新机制，使得 `retain`、`release` 和 `autorelease`\
  \ 的流程实现自动化。上述所有策略在新版本中仍然适用于代码。但 Xcode 会为你追加所有必要的代码来管理内存。\n\n为了让你快速了解，我将再次编写代码清单\
  \ 7.1 和代码清单 7.3 中的代码。\n\n**代码清单 7.4.** 为新的 ARC 机制重写代码\n\n```\n对于代码清单 7.1：\n- (void)doSomething\
  \ {\n         NSObject *obj = [[NSObject alloc] init];\n        NSLog(@\"obj: %@\"\
  , obj);\n}\n\n对于代码清单 7.3：\n- (NSObject *)getObj {\n        NSObject *obj = [[NSObject\
  \ alloc] init];\n        return obj;\n}\n```\n\n就是这样！不再需要 `release` 或 `autorelease`。当你编译代码时，Xcode\
  \ 会自动为你添加所有必要的 `release`/`autorelease` 调用。在编译器添加这些调用之后，代码将与代码清单 7.1 和代码清单 7.3 完全相同。\n\
  \n## 如何在 Xcode 中设置你的项目？\n\n进入你的项目设置，找到**Objective-C 自动引用计数**这一行，查看其是否设置为 **YES**。你可以从图\
  \ 7–2 看到该设置行的位置：\n\n![images](img/0702.jpg)\n\n**图 7–2.** *为你的项目设置 ARC*\n\n如果你的项目是一个包含旧版\
  \ `retain`/`release`/`autorelease` 调用的现有项目，你可以使用 Xcode 的迁移工具来移除项目中那些不必要的调用，如图 7–3\
  \ 所示。\n\n![images](img/0703.jpg)\n\n**图 7–3.** *将旧代码转换为 Objective-C ARC*\n\n###\
  \ ARC 策略\n\n你需要遵循一些新规则，以确保你的项目与 ARC 兼容：\n\n- 你不能使用或调用旧的内存管理方法：`retain`、`release`、`autorelease`\
  \ 和 `retainCount`。你可以重写 `dealloc` 方法以进行所需的任何清理，但绝不能调用任何 `dealloc` 方法，例如不允许调用 `[super\
  \ dealloc]`。\n\n  此规则在你设置属性时也会强制执行：\n\n  `@property (nonatomic, retain) NSString\
  \ *myName; // 这是不允许的。`\n\n- 你不能在 C 语言中使用对象指针，如果你想将 C 代码集成到项目中，这可能会带来一些问题，详见第 9 章。\n\
  - 你不能使用 `NSAutoreleasePool` 对象，而必须使用 `@autoreleasepool`。\n\n  不要使用：\n\n  ```\n \
  \ NSAutoreleasePool *myPool = [[NSAutoreleasePool alloc] init];\n  // 你的代码\n  [pool\
  \ release];\n  ```\n\n  你必须使用：\n\n  ```\n  @autoreleasepool {\n     // 你的代码\n  }\n\
  \  ```\n\n### 用于 ARC 的新限定符\n\n根据新的 ARC 策略，你现在需要包含新的生命周期限定符，以在代码库中强制执行 ARC 的新规则。\n\
  \n- `strong`：这表示你想对该变量保持强引用。只要存在对对象 A 的 `strong` 引用，对象 A 就不会被释放。\n- `weak`：它的作用类似于\
  \ assign，如果你只是想要一个指向该对象的引用，而不明确拥有该对象。因此，你不需要管理该对象的生命周期。好处是，如果对象 A 持有对对象 B 的 `weak`\
  \ 引用，并且对象 B 被释放，该引用会变为 `nil`。这使得当引用的对象已被释放时，你不会持有指向它的引用，从而更加安全。\n- `unsafe_unretained`：这类似于\
  \ `weak`，区别在于，如果对象 A 引用的对象 B 被释放，该引用将指向一个已被释放的对象，这可能导致应用程序崩溃。\n- `autoreleasing`：如果你有一个方法需要传递引用参数，可以考虑使用此限定符。该方法将负责在返回时自动释放该参数。\n\
  \n\n\n#### 对象属性\n\n现在，你需要修改对象属性的声明方式。不再使用旧版中的旧内存管理机制：`@property (retain) NSString\
  \ *myString`，你将遵循一套新的规则。\n\n如果你想要拥有该对象的所有权：\n\n```\n// 这类似于 @property (retain) NSString\
  \ *myString\n@property(strong) NSString *myString;\n```\n\n如果你只想要对该对象的引用，而不拥有所有权：\n\
  \n```\n// 这类似于 @property (assign) UIViewController *myViewController;\n// 区别在于，如果\
  \ myViewController 对象被释放，\n// 该引用会变为 nil。\n@property(weak) UIViewController*myString;\n\
  ```\n\n**注意：** 如果你的应用需要在 iOS4 上运行，你不能使用 `weak`，你需要使用 `unsafe_unretained` 并自己将引用设为\
  \ nil。\n\n#### 变量声明\n\n要在方法内部使用这些限定符，你需要在它们前面加上 `__`。例如，你将使用 `__strong` 或 `__weak`。在方法中，`__strong`\
  \ 限定符是默认限定符。\n\n使用 `__strong` 限定符可以保证你的对象在方法结束前依然存活。请谨慎使用 `__weak` 或 `__unsafe_unretained`。如果没有对对象的强引用，你的对象会立即被释放。例如：\n\
  \n```\nNSString __weak *myString = @\"hello world\";\nNSLog (@\"myString: %@\",\
  \ myString);\n```\n\n将会打印出 `(null)`，因为在打印 `myString` 对象时，已经没有对它的强引用了。\n\n`__autoreleasing`\
  \ 限定符用于接收按引用传递参数的方法。\n\n```\n- (BOOL)performTaskWithError:(NSError *__autoreleasing\
  \ *)error;\n```\n\n你可以像这样正常地调用该方法：\n\n```\nNSError *error = nil;\n[self performTaskWithError:&error];\n\
  ```\n\n默认情况下，error 对象是用强引用限定符声明的，但编译器会添加代码来使方法调用 `[self performTaskWithError:&error]`。\n\
  \n**注意：** 对于所有返回对象的方法，并且方法名不包含 `new`、`alloc` 或 `copy` 时，返回的对象将自动被自动释放。\n\n## 高级内存问题\n\
  \n现在你已经学习了最基本的内存技术，我将向你介绍一些高级内存主题。\n\n### 保留/循环引用\n\n在旧的内存管理体系中，如果对象 A 拥有对象 B，那么当对象\
  \ A 被释放时，它必须释放对象 B。然而，如果对象 A 拥有对象 B，同时对象 B 也拥有对象 A，会发生什么？\n\n你希望通过调用 `release` 方法并设置引用为\
  \ nil 来释放对象 A。但是，因为对象 B 仍然拥有对象 A，所以对象 A 的引用计数大于 0。同样，当你释放对象 B 时，它的引用计数仍然大于 0，因为对象\
  \ A 仍然拥有对象 B。\n\n这个过程会持续下去，不会有任何对象被释放，如图 7-4 所示。\n\n![images](img/0704.jpg)\n\n\
  **图 7–4.** *保留循环*\n\n对于新的 ARC 机制也同样如此：如果有两个对象彼此持有强引用，那么这两个对象都会泄漏。\n\n那么，如果你想让两个对象彼此拥有，该怎么做？你需要使用弱引用。\n\
  \n### UIViewController\n\n所有 iPhone 应用都需要你与 `UIViewController` 打交道（否则你如何拥有用户界面呢？）。因此，理解\
  \ `UIViewController` 的生命周期将帮助你处理许多重要的事情，例如：\n\n- 更好地利用内存。\n- 避免任何内存泄漏。\n- 提高响应速度。\n\
  \n根据我在教学和培训许多开发者时的观察，许多人因为不理解视图控制器对象的管理生命周期而犯下严重错误。在 iPhone 环境中，控制视图控制器对象生命周期的主要管理过程有：\n\
  \n- 加载视图。\n- 当系统需要回收内存时卸载视图。\n- 释放视图。\n- 从 UI 中显示或隐藏视图。\n\n#### 加载视图过程\n\n当视图控制器需要它的视图时，它会检查该视图是否已加载到内存中。如果没有，那么它会加载该视图，然后调用\
  \ `viewDidLoad` 方法。图 7-6 展示了加载视图的过程。\n\n![images](img/0706.jpg)\n\n**图 7–6.** *加载视图过程*\n\
  \n关于这个加载视图过程，有一些性能方面的注意事项需要你记住：\n\n- 如果你重写了 `loadView` 方法，你需要创建要显示到 UI 的视图层次结构。这可能会带来稍好的性能，因为它不需要从\
  \ nib 文件中加载视图。\n- 如果你没有重写 `loadView` 方法，iOS 环境将自动查找你指定的 nib 文件或与视图控制器文件同名的 nib 文件。使用\
  \ nib 文件更易于维护，并且支持拖放功能。\n- 如果没有任何匹配，iOS 环境将创建一个新的空视图并返回该空视图。\n\n#### 卸载视图过程\n\n\
  这个过程对内存和性能非常重要。主要原因在于，当你的应用收到内存警告并需要回收内存资源时，此过程就会运行。在这个过程中，`didReceiveMemoryWarning`\
  \ 方法会首先被调用，然后 `viewDidUnload` 方法会被调用。屏幕上的视图不会被卸载。你可以在图 7-7 中看到这个过程。\n\n![images](img/0707.jpg)\n\
  \n**图 7–7.** *卸载视图过程*\n\n在这个卸载视图过程中，有几个性能和内存方面的问题你需要记住：\n\n- 确保当 `didReceiveMemoryWarning`\
  \ 方法被调用时，你清除了重量级对象的内存缓存，例如所有图片缓存。如果你不这样做，iOS 环境可能会强制关闭你的应用，这将带来非常糟糕的用户体验。\n- 你不应该在此处清除或释放任何视图，因为这可能是不安全的。相反，你应该调用\
  \ `[super didReceiveMemoryWarning]`，这样超类就可以检查释放子视图是否安全。\n- 如果释放其视图是安全的，则将调用 `viewDidUnload`\
  \ 方法。你可以选择重写此方法，对你的视图及其层次结构进行所需的清理工作。\n\n**注意：** 当你重写诸如 `init`、`loadView` 和 `viewDidLoad`\
  \ 等加载方法时，对超类的调用必须在方法的开头。然而，如果你重写诸如 `didReceiveMemoryWarning`、`viewDidUnload` 或 `dealloc`\
  \ 等清理方法，对超类的调用必须在方法的末尾。\n\n在 `viewDidUnload` 中，有几个关键点常常让开发者感到困惑。\n\n- `viewDidLoad`\
  \ 和 `viewDidUnload` 并不是一一对应的关系。`viewDidLoad` 方法在视图控制器对象被初始化并且视图被请求之后调用。`viewDidUnload`\
  \ 在收到内存警告后调用。调用 `viewDidUnload` 之后，不会调用视图控制器对象的 `dealloc` 方法。被卸载的视图将会被释放。\n- 在 `viewDidUnload`\
  \ 中，你只清理你的视图；所有其他对象将在 `didReceiveMemoryWarning` 中被清理或释放。\n\n\n\n#### 在用户界面中显示与隐藏视图\n\
  \n在用户界面中显示和隐藏视图的过程与内存的关系不大，但与 iOS 应用的性能以及用户对性能的体验密切相关。\n\n视图控制器生命周期中有四种主要方法，用于表示视图在显示和隐藏时的四种不同状态。\n\
  \n- `viewWillAppear`：此方法在你的视图显示之前被调用。只有在此方法执行完毕后，你的视图才会显示出来。为了营造应用流畅的良好体验，这里的所有计算都必须非常迅速。否则，用户对你的导航和动画的感知将会非常差。一个良好的实践是设置视图的属性（例如，背景色或文字颜色）。\n\
  \    - 例如，用户按下返回按钮回到视图 A。但是，在视图 A 的 `viewDidAppear` 方法内部，有一个需要耗时的计算。结果需要几秒钟才能得出，但在此期间，UI\
  \ 线程被阻塞来处理视图 A 内部的逻辑，导致无法显示视图 A。\n- `viewDidAppear`：此方法在你的视图显示之后立即被调用，因此你可以在此处放置逻辑处理代码。然而，如果你的处理过程完成后对视图做了较大改动，用户可能会感到困惑，这不是一种积极的体验。\n\
  \    - 例如，你有一个排序算法需要对表格视图进行排序。当用户看到视图 A 时，旧的表格仍然显示着。然后突然间，所有行在没有预先警告或任何解释的情况下发生了变化。\n\
  - `viewWillDisappear`：此方法在视图从 UI 中消失之前调用。任何你想展示给用户的、属于该视图的内容，都应该放在这里。请注意，你不应该在此处放置过多逻辑处理代码。如果放置了过多处理代码，将导致新视图的显示耗时过长。\n\
  - `viewDidDisappear`：此方法在你的视图消失之后被调用。你无法向用户展示任何视图或 UI 效果。\n\n关于应该将逻辑处理代码放在哪里，并没有硬性规定。我为你提供了所有基本概念，你可以利用它们来创造用户对你应用性能的最佳感知。\n\
  \n## 对象拷贝\n\n那么，为什么需要了解对象拷贝，以及为什么需要执行它呢？如果你不想改变旧对象，因为那可能会影响程序的其他部分，那么拷贝对象就很有用。在某些情况下，你根本无法更改对象，所以你需要复制该对象的内容以便进行修改。\n\
  \n### 浅拷贝 vs. 深拷贝\n\n*浅拷贝* 在 Objective-C 中实际上与*保留* 的含义相同。因为浅拷贝意味着将对象的指针复制到一个新变量，所以浅拷贝和保留之间没有区别。\n\
  \n另一方面，*深拷贝* 意味着你实际创建了一个新对象，并将旧对象中的所有数据和实例变量复制到新对象中。\n\n为了说明 Objective-C 中浅拷贝和深拷贝的区别，请考虑每种情况的代码示例：\n\
  \n浅拷贝：\n\n```\n- (void)setMyObj:(NSObject *)newObj {\n  if (newObj != myObj) {\n\
  \    myObj = newObj;\n  }\n}\n```\n\n深拷贝：\n\n```\n- (void)setMyObj:(NSObject *)newObj\
  \ {\n  if (newObj != myObj) {\n    myObj = [newObj copy];\n  }\n}\n```\n\n在第一种情况下，你将变量指向新对象并保留该对象。在\
  \ Objective-C 中，这就是浅拷贝。在深拷贝的情况下，代码实际上将 `newObj` 内部的值和实例变量复制到 `myObj` 中。\n\n### 实现深拷贝\n\
  \n如果你想要进行真正的深拷贝，你必须遍历整个对象的层次结构。\n\n- 你需要创建一个新对象。\n- 你将旧对象的所有实例变量复制到新对象中。\n- 如果实例变量是原始数据类型，例如\
  \ `float`、`int` 或 `double`，你只需要复制该值。`Boolean` 不是原始数据类型，但你同样只需复制 `Boolean` 实例变量的值。\n\
  - 对于每个是指针类型的实例变量，你将需要同时复制它们的实例变量。\n- 这个过程一直持续到结束。\n\n这个过程可能既漫长又难以实现。一些内置对象和库不支持深拷贝。因此，你应该始终在浅拷贝和深拷贝之间找到一个折衷方案。例如，你不会想要深拷贝一个委托，这可能导致之前讨论过的*保留环*问题，即对象\
  \ A 拥有对象 B，并且对象 B 也拥有对象 A。此外，你通常不希望复制你的委托，因为最终你要回调的是那个委托，而不是新委托。\n\n这是一个介于浅拷贝和深拷贝之间的混合方法的示例：\n\
  \n```\n@interface Item : NSObject {\n   NSString *itemName;\n   CGFloat price;\n\
  \   id delegate;\n}\n\n@property (nonatomic,  copy) NSString *itemName;\n@property\
  \ (nonatomic, weak) CGFloat price;\n@property (nonatomic, weak) id delegate;\n\n\
  @end\n```\n\n在这个例子中，你可以看到有三个实例变量。第一个是 `itemName`（它是一个指针对象），第二个是原始数据，最后一个是委托。\n\n\
  ![images](img/0708.jpg)\n\n**图 7–8.** *对象的深拷贝*\n\n如 图 7–8 所示，委托对象将保持不变，并在原始 item\
  \ 和新 item 之间共享。`itemName` 对象将被复制并拥有一个新的内存地址（0x9124 替代了 0x8028），但具有相同的值 “egg”。原始变量，例如\
  \ `price`，将被复制过来且没有内存地址。\n\n### 将拷贝方法集成到对象中\n\n要实现对对象的深拷贝，你通常需要重写 `copyWithZone:`\
  \ 方法。当向对象发送 `copy` 消息时，此方法将被调用。以下是重写此方法的一些代码。你需要通过 `alloc` 和 `init` 创建一个新对象，然后使用\
  \ `set` 方法为实例变量设置值。\n\n```\n- (id)copyWithZone:(NSZone *)zone {\n   Item *copy =\
  \ [[Item allocWithZone: zone] initWithName:self.itemName];\n   copy.price = self.price;\n\
  \   copy.delegate = self.delegate;\n   return copy;\n}\n```\n\n如前所述，如果你的 `Item`\
  \ 类内部还有其他自定义类型的实例变量，你也需要为它们实现拷贝。在我的例子中，为简单起见，代码没有创建一个新的 `itemName` 对象。\n\n## 高级自动释放池\n\
  \n在本章的前面部分，你已经学习了几种关于内存的基本技术。本节将介绍使用自动释放池的更高级技术，并向你展示在受限情况下应该在哪里使用它以获得高性能。\n\n在每个线程中，你必须有一个自动释放池来收集和存储所有自动释放的对象。如果你在每个线程中没有自动释放池，所有自动释放的对象都将泄漏，你将面临严重的内存泄漏。自动释放池在栈内组织；这将在下一节中解释。\n\
  \n\n\n### 自动释放池与栈\n\n`Autorelease` 池存储在栈中，通常被认为是可嵌套的。每当你创建一个新的 `autorelease` 池时，它会被推入栈顶。所有新加入\
  \ `autoreleased` 的对象也会被推入这个新的 `autorelease` 池。\n\n如以下代码所示，方法 `doSomething` 内部的对象（如\
  \ `myArray` 和 `myString`）将被存储在 `myPool` 中，而不是应用的默认主池：\n\n```\n- (void)doSomething\
  \ {\n  @autoreleasepool {\n    NSArray *myArray = [NSArray array];\n    NSString\
  \ *myString = [NSString string];\n  }\n}\n```\n\n而主池则照常位于 `main` 方法内部：\n\n```\n\
  int main(int argc, char *argv[]) {\n  @autoreleasepool {\n    int retVal = UIApplicationMain(argc,\
  \ argv, nil, nil);\n  }\n  return retVal;\n}\n```\n\n在 `@autoreleasepool` 块的末尾，所有存储在该池中的\
  \ `autoreleased` 对象将在事件生命周期结束时被释放。\n\n图 7–9 展示了这一概念。这是一个关乎良好性能的重要概念——学会尽快释放对象。\n\
  \n![images](img/0709.jpg)\n\n**图 7–9.** 栈中的自动释放池\n\n### 自动释放池与线程\n\n当创建一个新线程时，你需要同时创建一个新的\
  \ `autorelease` 池对象，并将该池关联到新线程。因此，当线程停止时，你的 `autorelease` 池会被释放，所有 `autoreleased`\
  \ 对象也会随之释放。我在第 6 章中深入讨论过这个主题，如果你需要帮助理解此概念，请回顾该章节。\n\n### 自动释放池对性能的影响\n\n对于使用 ARC\
  \ 编写的代码，旧的内存管理规则依然适用。如果你调用的方法名称中不包含 `new`、`alloc` 和 `copy`，那么该返回对象已经是被 `autoreleased`\
  \ 的。如果你运行一个循环，并创建了过多的 `autoreleased` 对象，很快就会耗尽内存。\n\n以下代码演示了在循环中执行内存管理的最佳实践：\n\n\
  ```\n- (void)doSomethingWithAutoRelease {\n  for (int i = 0; i < 1000; i++) {\n\
  \    @autoreleasepool {\n      Product *product = [Product productWithItemID:@\"\
  \"];\n      // 在此处处理和展示产品\n    }\n  }\n}\n```\n\n在循环结束后以及 `@autoreleasepool` 块的末尾，所有\
  \ `autoreleased` 的对象都会被释放。这样，你就可以控制并释放所有未使用的对象，从而回收内存。\n\n## 工具（Instruments）\n\n\
  `Instruments` 在第 2 章讨论使用设备和模拟器进行基准测试时已有介绍。在本节中，我将简要讨论常见问题以及一些更高级的问题，这些问题会影响你应该选择哪种内存管理方法。\n\
  \n大多数情况下，你需要使用以下四种主要工具：\n\n- 静态分析器 (Static Analyzer)\n- 泄漏检测工具 (Leaks Instrument)\n\
  - 僵尸对象检测 (Zombie)\n- 对象分配追踪 (Object allocation)\n\n### 静态分析器\n\n静态分析器非常适合快速检查小型、明显的内存泄漏。例如，如果你\
  \ `alloc` 了一个新对象但在该方法中没有释放它，如图 图 7–10 所示，静态分析器可以快速识别出来。\n\n![images](img/0710.jpg)\n\
  \n**图 7–10.** 静态分析器显示的内存泄漏\n\n### 泄漏检测工具\n\n泄漏检测工具更为复杂，运行和分析需要一些时间，但能根据你的操作给出最佳结果。当它追踪所有运行时数据时，可以检测到大部分内存泄漏。\n\
  \n![images](img/0711.jpg)\n\n**图 7–11.** 泄漏检测工具的分析结果\n\n泄漏检测工具能提供泄漏对象的详细列表结果，如 图\
  \ 7–11 所示。\n\n![images](img/0712.jpg)\n\n**图 7–12.** 泄漏检测工具显示的泄漏详情\n\n它还能指出导致泄漏的确切代码行（图\
  \ 7–12）。\n\n### 僵尸对象检测\n\n`Zombie` 能帮助你检查导致应用崩溃（`EXEC_BAD_ACCESS`）的代码部分。如果你的应用持续崩溃，而你又无法通过日志记录或代码验证发现问题，这个工具非常有用。\n\
  \n如 图 7–13 所示，当应用崩溃时，`Zombie` 会显示一系列操作，包括 `malloc`、`autorelease`、`retain` 和 `release`。你可以使用\
  \ `Zombie` 追踪 `autorelease` 和 `release` 方法。\n\n![images](img/0713.jpg)\n\n**图 7–13.**\
  \ Zombie 工具追踪到的崩溃结果\n\n`Zombie` 可以显示每个操作的所在位置，例如对象在何处被分配，以及对象在何处被 `autoreleased`\
  \ 或释放。\n\n### 对象分配追踪\n\n对象分配追踪是我想在这里介绍的最后一个与内存相关的工具。它显示应用运行时所有内存使用量的变化情况。当内存使用量增长过大，你需要追溯到创建大量内存的那组代码行时，这个工具非常有用。\n\
  \n![images](img/0714.jpg)\n\n**图 7–14.** 对象分配追踪的内存使用结果\n\n图 7–14 向你展示了代码行、对象创建时间以及创建对象的调用者。\n\
  \n### 内存警告级别\n\n我想讨论的最后一个关于内存的话题是内存警告。当你的内存使用量增长到一定程度时，iOS 环境会尝试通过调用视图控制器对象上的 `didReceiveMemoryWarning`\
  \ 方法来通知你。你必须通过释放部分内存来响应此内存警告。\n\n**注意：** 还有其他方式可以在应用内部接收内存警告：应用代理会接收内存警告并调用其他对象中的适当方法，或者你的对象可以通过\
  \ `NSNotification` 注册以接收内存警告。\n\n第一次内存警告（内存警告级别 1）是最重要的：它意味着你的代码必须快速减少内存使用量。否则，你的应用将收到内存警告级别\
  \ 2，而且这几乎肯定会导致崩溃。\n\n## 总结\n\n内存对应用的性能有很大影响。如果使用不当，还可能导致应用崩溃。在本章中，你学习了 Objective-C\
  \ 中关于内存管理的重要概念，这些概念将帮助你避免内存泄漏问题和应用崩溃。`UIViewController` 的生命周期同样重要，因为它关系到管理和控制内存使用，也影响用户对应用性能和体验的感受。最后，你学习了在处理内存问题时\
  \ `autorelease` 和 `release` 之间的区别，以及何时应该使用其中一个而非另一个。\n\n**练习**\n\n1.  列出 `autorelease`\
  \ 和 `release` 方法之间的区别。\n\n2.  在真实场景中使用本章介绍的检测工具。\n\n3.  为你项目中的现有对象实现 `copy` 方法。\n\
  \n"
- '# 第 8 章


  '
- "# 集成多线程与高效内存使用以提升多任务应用性能\n\n在本章中，你将学习：\n\n- Apple 对多任务的理解。\n- 多任务生命周期以及如何处理其利弊。\n\
  - 不同的后台服务，例如：\n  - 音频\n  - VOIP\n  - 定位\n  - 后台处理\n- 为使你的应用良好地支持多任务，你需要了解的内容。\n\n\
  在本章中，你将学习如何利用 iPhone 的多任务处理能力，使得应用程序能够在用户无感知的情况下在后台处理数据。这必须与尽可能少地消耗 CPU 处理时间或内存相平衡；否则，你可能会严重影响电池寿命，或者更糟——被\
  \ iOS 系统终止。\n\n\n\n### iPhone 中的多任务是什么？\n\n从用户角度看，多任务意味着她同时使用多个应用程序，并可以随意从一个应用切换到另一个。在\
  \ iOS 3.2 及更低版本中，当用户退出应用时，应用会关闭，再次打开时需要重新加载。这会导致两个问题：等待时间长，并且应用会忘记用户刚才的操作（参见图 8–1）。\n\
  \n![images](img/0801.jpg)\n\n**图 8–1.** *旧版 iOS 中应用在用户退出并重新打开时的行为*\n\n自 iOS 4.0\
  \ 起，应用不再从头加载，因此用户在不同应用间切换时不会花费太多时间。苹果希望用户感受到的多任务功能，其强大程度能与桌面应用媲美。从开发者角度来看，应用实际上被置于后台，并且所有状态都被保存下来。如图\
  \ 8–2 所示，当用户再次打开应用时，状态和数据会快速加载并恢复到先前的位置。\n\n![images](img/0802.jpg)\n\n**图 8–2.**\
  \ *iOS 4.0 中应用在用户退出并重新打开时的行为*\n\n### 多任务生命周期\n\n了解旧版 iOS 的进程对你很有帮助，这有助于你理解 iOS4\
  \ 及以上版本的当前机制。我将首先解释多任务功能出现之前的旧机制。应用通过调用 `application:didFinishLaunchingWithOptions:`\
  \ 启动，然后运行事件循环以捕获所有事件并显示 UI（参见图 8–3）。当用户退出应用时，整个应用关闭，并调用 `applicationWillTerminate`\
  \ 方法。下次用户打开应用时，会再次调用 `application:didFinishLaunchingWithOptions:` 方法。\n\n![images](img/0803.jpg)\n\
  \n**图 8–3.** *旧版 iOS 环境下的应用生命周期*\n\niOS4 要求更复杂的实现，而且很容易误解整个过程。如图 8–4 所示，当用户退出应用时，它进入后台，并调用\
  \ `application:didEnterBackground` 方法。当用户能看到应用运行时，应用处于前台状态；用户看不到应用时，它处于后台状态。当应用重新启动时，会涉及许多方法和通知，你必须了解应用的不同状态才能正确响应这些通知。以下是需要了解的应用状态：\n\
  \n- 未运行：从未打开，或者打开后已终止。\n- 非活跃：应用在前台但未接收事件，例如用户锁定屏幕时。\n- 活跃：应用在前台并正在接收事件。\n\n![images](img/0804.jpg)\n\
  \n**图 8–4.** *iOS4 的应用生命周期*\n\n开发者经常混淆最后两种状态：后台和挂起。后台状态发生在挂起状态之前。当用户退出应用或跳转到另一个应用时，应用会进入后台状态。它会在后台状态停留一小段时间，之后应用被挂起。这段时间的长短取决于应用及其在后台想执行的操作。我将更详细地解释应用在此状态下能做什么。\n\
  \n有两种主要情况会导致应用生命周期不同。第一种情况是用户因接听电话或操作系统其他中断而退出应用。第二种情况是用户按下 Home 键，应用进入后台。每种情况都有其自身的应用生命周期。\n\
  \n![images](img/0805.jpg)\n\n**图 8–5.** *两种不同情况的示意图：电话中断与 Home 键*\n\n如图 8–5 所示，在第一种情况下，当用户接到电话或短信时，应用通过\
  \ `applicationWillResignActive:` 方法进入非活跃模式。如果用户选择 `No`（不接听电话），则调用 `applicationDidBecomeActive`\
  \ 方法；否则，调用 `applicationDidEnterBackground` 方法。因此，在 `applicationDidBecomeActive`\
  \ 部分，你可能不需要重新加载所有数据和视图。与点击 Home 键的情况相比，你应谨慎处理这一部分。\n\n当用户按下 Home 键时，应用直接进入后台，并调用委托方法\
  \ `applicationDidEnterBackground:`。\n\n#### 多任务处理程序方法\n\n图 8–4 和 8–5 向你展示了生命周期中某些方法被调用的时机。表\
  \ 8–1 提供了在应用委托和其他视图控制器类中需要处理的完整方法列表，以便正确响应生命周期事件。\n\n![image](img/t0801.jpg)\n\n\
  ![image](img/t0801a.jpg)\n\n**注 1**\n\n要接收事件通知，你的视图控制器或对象可以像以下代码片段所示进行注册：\n\n```\n\
  [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(someMethod:)\n\
  name:UIApplicationDidBecomeActiveNotification object:nil];\n```\n\n不要忘记清理工作！在 `dealloc`\
  \ 中，记得移除观察者，如下所示：\n\n```\n[[NSNotificationCenter defaultCenter] removeObserver:self];\n\
  ```\n\n方法 `someMethod:` 可以（但不是必须）接受一个 `NSNotification` 作为参数。在这个 `NSNotification`\
  \ 内部，你可能会找到更多用户信息或需要处理的数据。你可以像往常一样处理这个 `NSNotification`；这里没有什么特别的。\n\n**注 2**\n\n\
  - 无论用户是首次启动你的应用，还是从后台再次启动，都会调用 `applicationDidBecomeActive:` 方法。\n- 首次启动时会始终调用 `applicationDidFinishLaunching:`\
  \ 方法，但从后台启动时不会调用。\n- 当应用从后台返回前台时，始终会调用 `applicationWillEnterForeground:` 方法。\n\n\
  你可以利用这些事实将多任务功能集成到你的应用中，从而正确响应应用的不同状态。\n\n#### 多任务的收益与成本\n\n如果你不想在应用中使用多任务功能，该怎么办？为了确保应用工作正常，需要维护所有这些不同状态和复杂代码，这有哪些收益和成本呢？\n\
  \n使用多任务功能有很多好处。以下是两点：\n\n- 用户可以继续使用应用的现有状态，而无需从头开始导航。\n- 你的应用可以与后台服务并行工作，例如从互联网下载数据、播放音频或接收\
  \ GPS 位置通知。\n\n如你所知，在整个多任务生命周期中，你需要付出一些代价：\n\n- 如之前所示，遍历应用生命周期时逻辑更加复杂。\n- 你的应用可能被强制在后台退出，导致应用数据不一致。由于这种不一致性，当用户重新打开应用时，你的应用可能会崩溃。\n\
  \n因此，在某些情况下，你可能不想在应用中使用多任务功能。在这种情况下，你可以配置 `info.plist` 文件来禁止使用多任务功能。步骤如下：\n\n- 打开你的\
  \ `info.plist` 文件。\n- 添加键 `UIApplicationExitsOnSuspend` 或选择 `Application does not\
  \ run in background.`\n- 将新键设置为 `YES` 或勾选复选框。\n\n你可以在图 8–6 中看到这一点。\n\n![images](img/0806.jpg)\n\
  \n**图 8–6.** *如何设置无多任务选项*\n\n\n\n### 后台服务\n\n如前面几节所示，有许多服务可以在后台运行，以处理数据并向用户提供服务。以下是在\
  \ iOS4 中可以在后台执行的操作列表：\n\n*   **音频**：你的应用可以在后台播放音频。\n*   **隐私保护**：当你的应用被重新启动时，让操作系统显示一个启动画面。如果你的应用正在显示一些敏感信息，这会很有用。\n\
  *   **定位**：你的应用可以在后台接收显著的位置变化。\n*   **网络电话（VOIP）**：用户可以在你的应用处于后台时拨打电话。\n*   **本地通知**：你的应用可以请求系统安排在特定时间向用户弹出消息。\n\
  *   **任务完成**：你的应用可以向系统请求额外的时间来完成给定的任务。这是一个重要的特性，我将在本章后面更详细地介绍。\n\n这些是特定的服务，可以通过利用\
  \ iOS 的多任务处理功能来帮助你加速程序。音频和网络电话并不会加速你的应用，但它们有助于提升用户体验，并使你的应用更易用。如果使用得当，定位、任务完成和本地通知都是提升应用性能的好工具。考虑到定位是移动技术中最强大的功能之一，许多应用现在都想集成它，以便更好地服务用户。\n\
  \n#### 音频服务\n\n在后台启用音频服务的最简单方法是在 `info.plist` 中包含一个键，然后正确设置音频配置，以便在你的应用进入后台后，音频能继续播放。\n\
  \n你需要添加一个名为 `UIBackgroundModes` 的新键，其值为 `audio`，如 图 8–7 所示。结果将在数组中显示“Required background\
  \ modes”。\n\n![images](img/0807.jpg)\n\n**图 8–7.** 设置音频在后台播放。\n\n如果你查看苹果的文档，它并没有提及任何关于配置音频设置以使其持续播放的内容。许多开发者对此有抱怨，所以你应该注意这个问题。你需要添加以下代码片段，然后才能播放音频：\n\
  \n```\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayback\
  \ error:nil];\nAVAudioPlayer *backgroundMusicPlayer = [[AVAudioPlayer alloc]\n \
  \                                          initWithContentsOfURL:YOUR_AUDIO_URL\n\
  \                                                           error:nil];\n[backgroundMusicPlayer\
  \ play];\n```\n\n**注意：** 你需要添加 AVFoundation 框架并在你的文件中导入它，才能使这段代码编译通过。\n\n这种方法的问题是，你只能在后台播放一首歌。那首歌播放完毕后，你的应用就会进入后台模式。要在后台播放一个歌曲列表，你必须编写代码来实现一个长时间运行的后台任务。\n\
  \n有时你想停止在后台下载/流式传输音频/视频，以节省用户的流量。你可以使用 `applicationDidEnterBackground` 方法来停止所有视频/音频流传输，如下所示：\n\
  \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application {\n  [backgroundMusicPlayer\
  \ stop];\n}\n```\n\n#### 显示启动画面\n\n当你的应用进入后台时，iOS 环境会对其当前视图进行截图。当用户重新启动你的应用时，在应用仍在加载的过程中，iOS\
  \ 环境会显示这张截图。这会在用户心中营造一种你的应用加载非常快速的错觉，从而提升用户体验。然而，在某些情况下，你可能希望在数据完全加载之前隐藏一些敏感信息。以下是一个支持此功能的简单方法（你也可以通过在\
  \ `applicationDidEnterBackground` 中直接操作你的视图来实现，但过程会更复杂）：\n\n```\n- (void)applicationDidEnterBackground:(UIApplication\
  \ *)application{\n    if (appHasSecret) { // 如果你的应用有需要隐藏的内容\n        UIImageView\
  \ *splashView = [[UIImageView alloc] initWithFrame:CGRectMake(0,0, 320, 480)];\n\
  \        splashView.image = [UIImage imageNamed:@\"YOUR_DEFAULT_PICTURE\"];\n  \
  \      [window addSubview:splashView];\n    }\n}\n```\n\n你的 `Default.png` 可以是用户在等待你的应用加载视图和数据时所能看到的任何图像。这样，当用户重新启动你的应用时，他会先看到这个“默认图像”，然后才看到你的视图。\n\
  \n#### 定位服务\n\n如今基于位置的社交网络非常热门，许多服务都需要用户的位置。问题在于，用户不会为了让你了解她当前的位置而一直保持应用打开。因此，苹果为你提供了一种机制，使你的应用在后台时也能获取最新位置。\n\
  \n要获取用户的当前位置，你的应用可以选择以下几种实现方式：\n\n*   **使用标准定位服务**：你的应用可以随时向 iOS 环境请求当前用户的位置。这种方法非常耗电，并且应用查询数据需要时间。另一个问题是，如果应用在后台运行，则无法使用此服务获取位置。\n\
  *   **注册显著位置变化**：你的应用也可以注册位置事件和通知。当用户的位置发生显著变化时，你的应用会收到通知。当设备从一个基站移动到另一个基站时，通常会触发此调用。这种方法更为被动，但可以节省电量。这种方法的另一个好处是，即使你的应用在后台，iOS\
  \ 也会通知你的应用。\n*   **连续后台位置更新**：这种方法对你的应用来说是最好的，但对用户的电池续航来说是最差的。无论你的应用是在后台还是前台，它都可以持续从\
  \ iOS 获取位置更新。\n\n\n##### 标准定位服务\n\n这是一种大多数应用都会使用的常见定位服务，因为在旧版 iOS 中就已存在。要使用此服务，你需要在调用\
  \ `startUpdatingLocation()` 之前设置精度和过滤属性。如果你没有进行配置，iOS 将直接使用以下默认配置：\n\n```\nCLLocationManager\
  \ *locationManager = [[CLLocationManager alloc] init];\nlocationManager.delegate\
  \ = self;\n[locationManager startUpdatingLocation];\n```\n\n**注意：** 你需要在文件中添加 CoreLocation\
  \ 框架并导入 `CoreLocation`。`self` 对象所代表的类必须实现 `CLLocationManagerDelegate` 协议。\n\n这段代码非常简单。你可以设置一些配置参数来获取更准确的定位数据。这些属性都属于\
  \ `CLLocationManager` 类：\n\n```\n@property(nonatomic, weak) CLLocationAccuracy desiredAccuracy\n\
  ```\n\n设置定位检测的精度级别。默认值为最佳；但如果你的应用可以接受较低的精度级别，建议使用后者。“最佳”配置的问题在于，请求定位会消耗更多时间和电量。它提供了以下精度级别（这些名称不言自明）：\n\
  \n*   `kCLLocationAccuracyBestForNavigation`（导航最佳精度）\n*   `kCLLocationAccuracyBest`（最佳精度，默认值）\n\
  *   `kCLLocationAccuracyNearestTenMeters`（最近十米精度）\n*   `kCLLocationAccuracyHundredMeters`（百米精度）\n\
  *   `kCLLocationAccuracyKilometer`（千米精度）\n*   `kCLLocationAccuracyThreeKilometers`（三千米精度）\n\
  \n`CLLocationManager` 类的另一个可设置属性是：\n\n```\n@property(nonatomic, weak) CLLocationDistance\
  \ distanceFilter\n```\n\n你可以设置 `kCLDistanceFilterNone`（默认值）或任何你想要的 double 值。该属性指定了用户需要移动多远的距离（以米为单位），你的应用才会收到新位置的更新通知。`kCLDistanceFilterNone`\
  \ 表示只要用户发生移动，你的应用就会收到所有通知。\n\n本节仅描述了如何向操作系统请求位置更新。关于返回值以及后续操作的细节将在后面简要介绍。\n\n#####\
  \ 重大位置变化\n\n有两种不同的机制可以基于特定条件进行更新：\n\n*   当用户位置发生重大变化时。\n*   当用户进入或离开特定区域时。\n\n第一种机制与标准位置更新非常相似，都是通过初始化对象然后进行配置来实现。唯一的区别在于，这里需要调用\
  \ `startMonitoringSignificantLocationChanges()`。\n\n一个重要提示：如果你使用这种重大位置变化机制，当新的位置数据到达时，你的应用将被唤醒或启动。即使你的应用已经被挂起或终止，这种情况也会发生。由于此机制可以唤醒你的应用，你无需处理后台处理代码，也不必担心丢失位置数据。然而，你的应用在后台处理这些位置数据的时间很有限。你的应用可能没有足够的时间处理大量的网络数据，但你仍然可以完成许多其他有用的工作。\n\
  \n在介绍区域机制之前，以下代码将说明如何接收位置更新并处理这些位置数据：\n\n```\n// 来自 CLLocationManagerDelegate 协议的代理方法。\n\
  - (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
  \ *)newLocation\n    fromLocation:(CLLocation *)oldLocation {\n\n    NSLog(@\"latitude\
  \ %f, longitude: %f\\n\",\n            newLocation.coordinate.latitude,\n      \
  \      newLocation.coordinate.longitude);\n\n}\n```\n\n如你所见，你只需要包含一个代理方法 `(void)locationManager:didUpdateToLocation:fromLocation:`。在\
  \ `newLocation` 对象中，有两个重要的数据点：`latitude`（纬度）和 `longitude`（经度）。\n\n基于区域的机制与重大位置变化机制类似，你需要通过指定中心和半径来注册一个特定的圆形区域。代码块同样十分简单：\n\
  \n```\n  // 创建区域并开始监控。\n  // radius 以米为单位\n   CLRegion* region = [[CLRegion alloc]\n\
  \  initCircularRegionWithCenter:destinationLocation.coordinate\n               \
  \         radius:radius identifier:@\"YOUR_REGION_ID\"];\n\n  [self.locationMananager\
  \ startMonitoringForRegion:region\n                   desiredAccuracy:kCLLocationAccuracyHundredMeters];\n\
  ```\n\n通常，此机制会与 MapKit 集成，以便用户可以注册他们的目的地，并在他们到达该区域附近时收到通知。\n\n你还需要实现以下两个方法来接收与区域相关的事件：\n\
  \n```\n- (void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
  \ *)region\n- (void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion\
  \ *)region\n```\n\n##### 持续后台位置更新\n\n最后一种机制适用于需要从 iOS 环境获取持续更新的应用程序。对于那些即使在后台或未运行时也需要每次新位置更新的应用来说，这是一种很好的机制。要实现此功能，你需要将\
  \ `UIBackgroundModes` 键的值设置为 `location`，这与上一节介绍的后台音频播放类似。\n\n![images](img/0808.jpg)\n\
  \n**图 8–8.** *应用注册位置更新*\n\n如图 8–8 所示，你的应用现已注册了位置更新。这种机制有许多优点和缺点。以下是其中两个。\n\n优点：\n\
  \n*   你可以频繁地获取位置服务更新，即使是微小的位置变化。\n\n缺点：\n\n*   它会大量消耗用户的电池电量。\n\n### 本地通知\n\n这是\
  \ iOS4 的一项新功能，允许应用在特定时间设置通知。此功能对于基于时间的应用（如闹钟或日历）非常有用。如果用户需要等待特定时间以执行某些特定事件，这将非常方便。这些事件可以基于用户设置或服务器设置。这也有助于将用户的注意力吸引到应用上。\n\
  \n你需要创建一个新的本地通知对象，并正确设置日期和时间，如下所示：\n\n```\n// 创建一个新通知。\nUILocalNotification* alarm\
  \ = [[UILocalNotification alloc] init];\nif (alarm) {\n   alarm.fireDate = theDate;\n\
  \   alarm.timeZone = [NSTimeZone defaultTimeZone];\n   alarm.repeatInterval = kCFCalendarUnitDay;\n\
  \   alarm.alertBody = @\"Time to wake up!\";\n   [[UIApplication sharedApplication]\
  \ scheduleLocalNotification:alarm];\n}\n```\n\n### 网络语音电话 (VOIP)\n\n网络语音电话主要用于 Skype\
  \ 等语音聊天应用。这是新 iOS4 中多任务处理的另一项功能；然而，它超出了本章的讨论范围，因此我在此不作介绍。大多数应用完全不需要使用 VOIP。\n\n\n\
  \n### 后台执行\n\n后台执行是 iOS 开发人员的一项重要技术。这项技术自 iOS4 起推出，帮助开发者争取更多时间来完成关键任务，因此应用可以在一定程度上更好地控制其生命周期。\n\
  \n例如，假设你正在向服务器上传图片/视频。在上传过程中，用户突然退出应用，导致图片只上传了一半。下次用户回到应用时，她将不得不等待整个上传过程重新开始。另一种选择是强制用户等待图片上传完成后再关闭应用，但这并非良好的用户体验。\n\
  \n在另一种场景中，有一些来自服务器的重要帖子或下载任务需要确保完成。后台执行对于帮助开发者处理这些任务至关重要。你可以将上传过程封装在后台任务中，并启动该任务，具体如下：\n\
  \n```\nUIApplication* app = [UIApplication sharedApplication];\nUIBackgroundTaskIdentifier\
  \ bgTask = [app beginBackgroundTaskWithExpirationHandler:^{\n  [self.imageUploadService\
  \ uploadImage:image];\n  [app endBackgroundTask:bgTask];\n}];\n// 启动长时间运行的任务并立即返回。\n\
  dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0), ^{\n\
  \  // 执行与该任务相关的工作。\n  [app endBackgroundTask:bgTask];\n});\n```\n\n如代码所示，要启动一个新的后台任务，你需要调用\
  \ `beginBackgroundTaskWithExpirationHandler:` 方法，该方法会返回一个后台任务标识符，你可以在之后使用它来结束该后台任务。通过\
  \ `beginBackgroundTaskWithExpirationHandler:` 方法，你告知 iOS，即使应用被移至后台状态，在应用被挂起之前，你希望这个任务能够完成。`endBackgroundTask:`\
  \ 方法则告知 iOS，你的应用任务已完成，使其能够在必要时将你的应用移至挂起状态。如果应用始终处于前台，那么这些调用不会产生任何效果，因此使用它们并无坏处。\n\
  \n你需要知道，后台任务并不能在后台无限期地运行；换句话说，应用必须在有限的时间（通常最多 10 分钟）内完成任务。否则，iOS 会不等任务完成就直接挂起应用。`beginBackgroundTaskWithExpirationHandler:`\
  \ 中的过期处理器部分是一个代码块（就像一个没有名称的方法），用于指定在任务超时时的清理代码。作为后台任务执行的代码不得进行任何 UI 更新或 OpenGL 调用（因为应用已在屏幕之外）。\n\
  \n你可以在代码的任何位置使用 `beginBackgroundTaskWithExpirationHandler:` 方法来启动一个新的后台任务。我用它来封装图片上传过程，确保即使应用被用户立即关闭，上传过程也能成功完成。许多人还结合\
  \ `applicationDidEnterBackground:` 方法来使用它，以便让应用运行更长时间，完成所有最终的计算或网络处理。\n\n如前所述，你也可以使用后台服务来播放音频。使用这项后台服务，你可以播放一个歌曲列表，而不仅仅是单首歌曲。你可以使用以下代码框架来实现这一点；请注意，你可能需要补充其他必要的代码部分才能使其正常工作。你可以将此作为一个练习，以更好地理解后台任务的工作方式。\n\
  \n```\nUIBackgroundTaskIdentifier bgTaskId;\n// AVAudioPlayer *backgroundMusicPlayer\n\
  if ([backgroundMusicPlayer play]) {\n  bgTaskId = [[UIApplication sharedApplication]\
  \ beginBackgroundTaskWithExpirationHandler:NULL];\n}\n\n- (void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
  \ *)player successfully:(BOOL)success\n{\n    UIBackgroundTaskIdentifier newTaskId\
  \ = UIBackgroundTaskInvalid;\n\n   if (self.haveMoreAudioToPlay) {\n        newTaskId\
  \ = [[UIApplication sharedApplication] beginBackgroundTaskWithExpirationHandler:NULL];\n\
  \        [self playNextAudioFile];\n    }\n\n    if (bgTaskId != UIBackgroundTaskInvalid)\
  \ {\n        [[UIApplication sharedApplication] endBackgroundTask: bgTaskId];\n\
  \    }\n\n    bgTaskId = newTaskId;\n}\n```\n\n正如你在代码中看到的，通过使用后台服务，你可以注册委托事件；然后在那个委托方法内部，你可以简单地播放下一个文件。（请注意，你的应用播放音频的总时长最多为\
  \ 10 分钟。）我希望这能有效地演示如何高效地使用后台服务。\n\n### 在后台运行时的注意事项\n\n以下是 Apple 提供的一份简短清单，用于确保你的应用在后台能良好运行且不影响其他应用：\n\
  \n-   将已占用的内存降至最低水平。\n-   释放所有共享资源，例如日历。\n-   适当响应应用生命周期事件。\n-   不要更新你的 UI 或调用消耗\
  \ CPU 和电池过多的代码。\n-   正确地在后台运行。\n-   响应后台的系统变化。\n\n如果你的应用能够严格遵循这些指南，它将运行良好，并充分利用多任务处理特性。它也不会在后台被系统终止。在后台保持应用处于活跃状态以便快速重新启动，是良好用户体验的重要组成部分。\n\
  \n#### 内存\n\n如前所述，在 iOS4 中，你的应用可以在后台服务中运行，并且在应用处于后台时仍会驻留在 RAM 中。然而，RAM 系统有其限制，在像\
  \ iOS 这样资源有限的环境中，这些限制甚至更为严重，正如你在第 7 章中所了解到的。因此，Apple 对应用在后台时的内存使用有严格的政策。由于会有多个应用同时驻留在后台，这些应用可能会迅速消耗大量内存。当设备内存耗尽时，iOS\
  \ 会找出消耗内存最多的应用并首先将其终止。\n\n为了减少内存使用，你需要清除内存中的缓存，尤其是图片缓存。你可能还需要移除不必要的子视图，因为当你的应用进入后台时，这些子视图也会被保存到内存中。实际上，你需要保存关键数据并清除所有不必要的数据，以避免你的应用被\
  \ iOS 挂起。\n\n#### 共享资源\n\n有些应用程序会共享数据，例如日历数据库和通讯录。如果你的应用在运行时使用了这些资源，那么在它进入后台时就必须停止使用这些资源。如果系统发现你的应用在进入后台时正在使用或尚未释放这些共享资源，它会被立即终止。原因在于所有这些共享资源都属于前台应用。\n\
  \n\n\n### 应用程序生命周期事件\n\n如前所述，你需要负责正确处理和响应应用程序的生命周期事件。如果你不进行测试以确保生命周期正确无误，就可能面临数据丢失或行为异常的风险。例如，你需要在应用程序进入后台前保存数据，并在应用切换到非活跃状态时暂停当前流程。\n\
  \n你不能过分依赖后台的内存存储。因为当 iOS 内存不足时，它可以随时挂起你的应用，而你可能没有机会对此事件做出反应，所以在进入后台之前，你应当始终保存所有必要的数据。\n\
  \n你或许只有很少的时间在后台运行，但 iOS 同样可以在内存或 CPU 周期耗尽时随时终止你的后台进程。因此，在后台进程中，你需要快速行动，并在可能的情况下使用多线程。你是在与\
  \ iOS 的时间限制赛跑。\n\n此时，当应用进入后台时，iOS 会为你的视图拍摄一张快照。这样做的目的是在视图和数据加载期间，向用户短暂显示这张快照，从而提升用户体验。但是，你应该隐藏那些不想被截取到屏幕快照中的敏感信息，例如出生日期、密码或用户的私人照片。\n\
  \n### 后台的用户界面更新与进程\n\n当应用程序处于后台时，一条通用规则是避免不必要的进程，而 UI 更新就是其中之一。如果你在后台需要额外的时间或更多的\
  \ CPU 处理能力，你可能需要明确请求权限。以下是一份简要清单，如果你的应用处于后台，应当处理这些事项：\n\n*   不要在你的代码中调用 OpenGL ES。\n\
  *   取消所有与 Bonjour 相关的服务。\n*   处理应用程序后台运行时出现的任何连接或网络故障。你可以稍后在应用重新变为活跃状态时恢复这些连接。\n\
  *   避免更新窗口和视图。用户无法看到你的视图，因此没有理由更新它们。你的应用程序不应在后台更新窗口和视图，因为这会消耗 CPU 周期，并可能影响前台应用。\n\
  *   在进入后台前清理所有警告或弹出消息，以免造成用户困惑。你应该关闭这些警告，并在必要时稍后再次显示它们。\n*   在后台执行最小化的工作。尽量使用 Apple\
  \ 提供的服务，例如后台音频或监控重要的位置变化。\n\n### 系统变更通知\n\n当你的应用程序处于后台时，系统可能会经历许多变化，并且会通知你这些变化，因此你应该为此做好准备。这些变化包括设备方向、时间、电池电量或系统区域设置的变更。表\
  \ 8–2 列出了重要的通知。\n\n![图片](img/t0802.jpg)\n\n当你的应用从后台恢复时，你会收到一个通知队列。你可能需要快速处理这些通知，尤其是设置和区域设置的变更，因为用户总是希望这些变化能立即生效。\n\
  \n## 处理不同 iOS 版本\n\n据估计，大约有 5% 到 20% 的设备仍在使用 iOS3，包括 iPad 1、旧款 iPod 和 iPhone 设备。那么，如何确保你的应用在\
  \ iOS3 上运行时不出问题呢？\n\n你需要在 `applicationDidTerminate` 中存储所有数据和用户信息，并在 `application:didFinishLaunchingWithOptions:`\
  \ 方法中正确地重新构建所有数据。因为在 iOS4 中，`applicationWillTerminate:` 方法仅在应用程序被终止时调用，所以你这样做是没问题的。\n\
  \n旧系统不支持后台执行，因此你不能依赖这种机制来保存用户数据。如果你有任何重要的数据需要保存、上传或从服务器下载，你可以在终止方法或启动方法中完成这些操作。\n\
  \n在旧设备上，你可以尝试通过归档方法创造出多任务（或快速应用切换）的体验。在这种方法中，你在应用程序关闭时保存所有视图控制器的状态，并在应用重新启动时恢复它们。这是一个复杂的过程，我不建议你花费宝贵的时间和精力在上面。\n\
  \n如果你的应用程序之前是为 iOS3 发布的，那么你需要支持这两个 iOS 版本；否则，你的用户可能会反应不佳，并在 Apple App Store 中给你一星评价。如果你的应用是全新发布的，你可以直接针对\
  \ iOS4 开发，无需顾虑。\n\n## 总结\n\n多任务是 iOS4 中的一个新概念。大多数情况下，你需要跟踪应用的状态和生命周期，以确保你的应用程序响应正确。\n\
  \n你可以通过修改 `Info.plist` 文件中的某些属性，选择从应用程序中移除多任务支持。你也可以通过在 `Info.plist` 文件中添加 `UIBackgroundModes`\
  \ 键，来为某些后台服务请求特殊权限。\n\n你可以请求额外的时间来处理重要的计算和服务（最多 10 分钟）。你需要清理所有资源和缓存数据以减少内存占用；否则，iOS\
  \ 可能会在后台终止你的应用程序。这通常意味着你失去了多任务应用的全部优势。\n\n**练习**\n\n1.  编写一个在后台播放音频的应用程序。\n2.  编写一个监控用户重要位置变化的应用程序。\n\
  3.  编写一个在应用程序进入后台前将数据发布到网络服务的应用程序。你可以将代码放在 `applicationDidEnterBackground:` 中。\n\
  \n"
- '# 第 9 章


  '
- "# 使用原生 C/C++ 提升性能\n\n在本章中，你将学习：\n\n*   将 C/C++ 代码集成到你的 iPhone 应用程序中的好处和代价。\n* \
  \  C 语言编程的基本概念\n    *   数据类型\n    *   指针\n    *   内存管理\n*   C++ 编程的基本概念\n    * \
  \  类\n    *   内存管理\n    *   继承\n    *   模板\n*   如何通过一个使用具有 C API 的数据库 SQLite 的真实示例进行实践。\n\
  *   如何将 C++ 和 Objective-C++ 集成到你的 iPhone 应用程序中。\n\n在本章中，你将学习使用 C/C++ 进行底层编程，这对于高性能应用程序至关重要。确实，Objective-C\
  \ 是 C 的超集，也是一种原生编程语言，但 Objective-C 在 C 语言之上添加了一层封装，这降低了性能。如果你曾接触过游戏和动画，你就会知道使用 OpenGL\
  \ 配合 C/C++ 能提供更好的性能。\n\nApple 也支持 C++。你大部分的基础应用程序都不需要接触任何 C/C++ 代码；但是，当你的应用需要更高性能时，你应该考虑这个选项。此外，你不需要编写大量的\
  \ C/C++ 代码，但你需要理解 C/C++ 代码才能正确调用库。你可能还需要修改开源库以满足自己的需求。\n\n由于 Objective-C 是 C 的超集，在\
  \ C 中能做的一切，在 Objective-C 中也能做到。两者存在语法差异和新概念，但我将在本章中介绍它们。C++ 和 Objective-C 也有很多不同的概念，因此学习\
  \ C++ 可能比学习 C 更难。\n\n实际上，Objective-C 的概念是有限的，你在 iPhone 开发环境中看到的大部分类和框架支持都来自 Cocoa\
  \ Touch。为简单起见，我将使用 Objective-C 作为 Objective-C 及来自 Cocoa Touch 框架的所有支持的统称。\n\n\n\n\
  ## 收益与成本\n\n在深入探讨 C/C++编程的思想之前，我想快速分析一下在 iOS 应用中使用 C/C++代码的收益与成本。\n\n收益：\n\n-  \
  \ C/C++编写了一些专用库，例如动画库或音频库。这些库通常使用 C/C++编写，以实现高性能和可移植性。\n-   你的应用程序可以相对轻松地移植到 Android\
  \ 平台。\n-   通过使用 C/C++代码，你可能会提升应用的性能。\n\n成本：\n\n-   C/C++的语法与 Objective-C 不同，将它们混合使用会使代码更难理解。\n\
  -   C/C++的内存管理机制与 Objective-C 不同，因此你需要小心内存泄漏或应用崩溃的问题。\n\n因此，在了解了收益与成本之后，你就可以决定是否要将\
  \ C/C++集成到你的 iPhone 应用中。即使你只是使用另一个开源库或编写自己的代码，你也应该先理解 C/C++。许多出现的问题可能非常隐蔽，以至于 iPhone\
  \ 的检测工具也难以帮上大忙。花一个小时集成一个库很容易——但随后可能要花一整天来修复其中的一个 bug。\n\nObjective-C 已经是一种原生编程语言，所以如果你试图用\
  \ C/C++编写所有代码，可能不会获得显著的性能提升。然而，有许多用 C/C++编写的高性能库，你可以充分利用并将其集成到你的应用中。\n\n## 基础 C\
  \ 和 C++编程\n\n我将通过一些 C/C++的基础课程来引导你，让你对这门语言有一个扎实的基本理解。Objective-C 与 C/C++有许多共同之处，因此你在本章中可能不需要学习太多新概念。了解\
  \ C/C++也能帮助你写出更好的 Objective-C 代码，因为 Objective-C 是 C 的超集。\n\n### C 编程\n\nC++也是 C\
  \ 的超集，因此你将先学习如何使用 C，然后在下一节中学习 C++。我仅讨论 C 编程中那些在 iPhone 编程中不常用的部分。\n\n#### 基本数据类型与函数\n\
  \nC 的数据类型非常少：整型、浮点型、双精度浮点型以及字符型。每种数据类型使用的位数在不同操作系统中是不同的，甚至在 iOS 系列中也是如此。以下是每种数据类型取值范围的一个示例，但你不应过分依赖这些信息来做重要决策：\n\
  \n-   `char`：-128 到 127\n-   `int`：-32768 到 +32767\n-   `float`：3.4e-38 到 3.4e+38\n\
  -   `double`：1.7e-308 到 1.7e+308\n\n有一些限定符可以应用于这些基本类型；例如，`short`和`long`可以应用于`int`。\n\
  \n```\nshort int sh;\nlong int counterLong;\n```\n\n这些限定符的目的是为`int`提供更短或更长的取值范围；例如，`short`可以是\
  \ 16 位，而`long`可以是 32 位。iOS 编译器保证`short`不会长于`int`，而`int`不会长于`long`。\n\n你还可以应用`signed`和`unsigned`限定符。如果你未指定任何`signed`或`unsigned`限定符，编译器将默认使用`signed`。使用`unsigned`限定符可以让你拥有双倍的数据范围。例如，`int`的取值范围可以是\
  \ 0 到 65535。\n\n通常你只需要使用`int`。如果你需要存储一个非常大的整数，请添加`long`限定符。使用`short`代替`int`是一种非常微小的内存优化，你完全可以忽略它。\n\
  \n**注意：**如果你使用 Objective-C，应该使用`NSInteger`、`NSUInteger`和`CGFloat`。这些是苹果公司提供的内置包装器，用于封装实际底层数据结构。\n\
  \nC 语言没有布尔数据类型，但 Objective-C 有。在 C 语言中，如果布尔表达式返回真，则值为 1；否则为 0。例如，`2 == 2`会返回 1，而`2\
  \ == 3`会返回 0。为了代码可读性，你可能需要定义两个布尔值，如下所示：\n\n```\n#define TRUE 1\n#define FALSE 0\n\
  int t = (1 == 1);\nif (t == TRUE) {\n   // 在这里执行你的工作\n}\n```\n\n尽管 C 函数看起来与 Objective-C\
  \ 方法不同，但你仍然需要返回值并接受参数。以下是两个 C 函数的示例：\n\n```\nint pi_value() {\n   return 3.14;\n\
  }\n\nint add_number(int n1, int n2) {\n   return n1 + n2;\n}\n```\n\n#### 指针\n\n\
  指针是 C 编程中的一个重要概念。在 Objective-C 中，你通常会在其中看到相同的指针概念和语法，例如`NSMutableArray *myArray\
  \ = [NSMutableArray array]`。然而，你通常不需要在底层处理内存，因此 Objective-C 中的指针概念作为对象来理解很容易。但在\
  \ C 语言中，你可以做更多的事情，指针的概念也更复杂。\n\n**内存指向概念**\n\n主内存可以被视为一个由单元格组成的数组，每个单元格是一个字节，每个数据项都存储在一组单元格内。一个`char`存储在一个单元格中，一个`int`可以存储在两个单元格中，而`long`可以存储在四个单元格中。每个单元格都可以编号，因此每个变量都会有一个存储数据的内存地址。\n\
  \n![图片](img/0901.jpg)\n\n**图 9-1.** *内存指针概念*\n\n指针是一个变量，它可以保存另一个变量的内存地址。例如，图 9-1\
  \ 中变量`p`内部的数据存储了变量`c`的内存地址。因此，如果说`p`指向`c`，你可以用语句`p = &c;`来表示。`&`运算符返回`c`的内存地址并将其赋值给`p`。`&`运算符仅适用于变量、数组和内存中的对象，不适用于表达式或常量。另一个指针运算符是`*`；当它应用于指针时，该运算符返回给定地址处的内存内容。这个过程通常被称为解引用。以下是一些展示其工作原理的源码：\n\
  \n```\nint x = 1, y = 2, a[3];\nint *ip; // ip 是一个只能指向整型的指针\n\nip = &x; // ip 现在指向\
  \ x\ny = *ip; // y 现在是 1，因为你返回了 ip 指向的数据\n*ip = 0; // x 现在是 0，我将 p 指向的数据设置为 0\n\
  ip = &a[0]; // ip 现在指向数组 a 的第一个元素\n```\n\n**传值与传引用**\n\n在 C 编程中，你可以通过值或引用将参数传递给函数。传值是向函数传递参数的常规方式。\n\
  \n```\nint add(int t1, int t2) {\n  return t1 + t2;\n}\n```\n\n然而，如果你想在下面的`swap`函数中交换两个变量的值，传值将不起作用：\n\
  \n```\nvoid swap(int x, int y) {\n   int temp;\n   temp = x;\n   x = y;\n   y =\
  \ temp;\n}\n\nint main() {\n  int x = 3, y = 4;\n  swap (x, y);\n}\n```\n\n问题在于，方法返回后，变量内部的值不会被交换。当调用`swap`方法时，`x`和`y`内部的值被复制并作为`swap(3,\
  \ 4)`传入函数。因此，原始变量不会改变。\n\n如果你想改变存储在变量`x`和`y`中的数据，你需要通过引用传递。通过引用传递时，传入的是`x`和`y`的内存地址。有了`x`和`y`的内存地址，你就可以简单地更改存储在这些地址中的值。\n\
  \n```\nvoid swap(int *px, int *py) {\n  int temp;\n  temp = *px; // 临时存储 x 内存中的值\n\
  \  *px = *py; // 设置 x 内存中的值\n  *py = temp; // 设置 y 内存中的值\n}\n\nint main() {\n  int\
  \ x = 3, y = 4;\n  swap (&x, &y);\n}\n```\n\n图 9-2 能让你更好地理解这个过程。\n\n![图片](img/0902.jpg)\n\
  \n**图 9-2.** *传引用*\n\n\n\n#### 高级数据类型\n\nC 语言中有一些高级数据结构：`array`、`string` 和 `struct`。这些在\
  \ Objective-C 中均受支持，但应谨慎使用，因为它们会使代码在未来更难理解和维护。Objective-C 中所有这些数据结构都有相应的封装器，以使代码更加面向对象。然而，在许多情况下，你仍需要使用\
  \ C 语言的数据结构来提高性能或处理调用 C/C++ 库时的结果。\n\n##### 数组\n\n在 Objective-C 中，你通常会使用 `NSArray`\
  \ 或 `NSMutableArray` 对象来表示数组。但在 C 语言中，没有这些概念，因此你需要完全专注于原始的数组概念。要在 C 语言中定义数组，你需要预先知道数组的长度，并按如下方式定义：\n\
  \n```\nint a [10]; // 一个最多包含十个元素的数组\n```\n\n`a[0]`、`a[1]`、`a[2]` … `a[9]` 分别是数组的第一、第二……第十个元素。\n\
  \n指针与数组关系密切。\n\n```\nint *pa;\npa = &a[0];\n```\n\n这段指针赋值代码会将 `pa` 设置为指向数组的第一个元素。如指针部分所述，赋值语句\
  \ `x = *pa` 会将 `x` 设置为 `a[0]` 中包含的值。\n\n你可以使用简单的算术运算符将指针移动到数组内的不同元素：`(pa + 1)` 将返回下一个元素的地址，而\
  \ `(pa - 1)` 将返回前一个元素的地址。图 9–3 展示了数组内部的指针算术运算。\n\n![images](img/0903.jpg)\n\n**图\
  \ 9–3.** *指针算术运算*\n\n这些计算不依赖于数组 `a` 内部变量的类型或大小。因此，`(pa + i)` 将始终返回第 `i` 个元素的地址。数组和指针之间的另一个重要关系是，你可以使用\
  \ `*(a + i)` 引用 `a[i]` 内的数据。\n\n数组名和指针之间存在一个区别：指针是一个变量，因此 `pa = a` 和 `pa++` 是可接受的。然而，`a\
  \ = pa` 和 `a++` 是不可接受的。\n\n##### 字符串\n\nC 语言中的字符串常量，例如 `\"I am Khang\"`，是一个以空字符\
  \ `'\\0'` 结尾的字符数组，这样程序才能找到数组的末尾。因为字符串是字符数组，你可以轻松地将其赋值给指针。\n\n```\nchar *pmessage;\n\
  pmessage = \"I am Khang\";\n```\n\n你可以像操作普通数组或指针一样操作字符串，例如以下源代码所示：\n\n```\nvoid\
  \ my_string_copy (char *s, char *t) {\n   while (*s++ = *t++) ;\n}\n```\n\n`my_string_copy`\
  \ 函数很简单；它只接受两个字符指针，并将字符串 `t`（由字符指针 `t` 表示）中每个字符的值赋给其自身的字符元素。\n\n**注意：**当将数组作为参数传递给函数时，C\
  \ 语言会自动将该数组转换为相同类型的指针。\n\n下面是另一个使用字符数组（但未使用指针）的示例，用以说明数组与指针的可互换性：\n\n```\nint my_string_length(char\
  \ *s) {\n  int i = 0;\n  while (s[i] != '\\0') {\n    i++;\n  }\n  return i;\n}\n\
  ```\n\n##### 结构体\n\nC 语言没有面向对象编程的概念。因此，要创建复杂的数据结构（而不是仅使用基本类型和数组），需要使用结构体。在某些 Objective-C\
  \ 代码中，你甚至可以看到在需要节省内存的领域大量使用结构体。例如，`CGPoint`、`CGRect` 和 `CGSize` 都是结构体。Apple 开发者将它们定义为结构体，是因为它们在构建\
  \ iPhone 界面时被大量使用。你可以像在 Objective-C 中一样使用结构体。\n\n```\nstruct point {\n  int x;\n\
  \  int y;\n};\n\nstruct point add_point(struct point p1, struct point p2) {\n  p1.x\
  \ += p2.x;\n  p1.y += p2.y;\n  return p1;\n}\n```\n\n如果将较大的数据结构传递给函数，可以考虑将指向该结构体的指针传递给函数，这样可以避免复制整个结构体（因为是通过值传递）。你可以像在其他正常情况中一样使用\
  \ `struct` 指针。\n\n```\nstruct point origin;\nstruct point *porigin;\nporigin = &origin;\n\
  printf(\"origin is (%d, %d) \\n\" , (*porigin).x , (*porigin).y );\n```\n\n#####\
  \ 动态内存分配\n\nC 语言中的内存管理与 Objective-C 既有相似之处，也有不同之处。在 C 语言中，你同样可以创建对象并为其分配内存；如果你为对象分配了内存，则需要手动取消分配/释放该对象以回收内存。Objective-C\
  \ 中没有 `autorelease` 或自动释放池的概念。\n\n要掌握 C 语言良好的内存管理机制，需要记住四个函数，如表 9–1 所示。\n\n![images](img/t0901.jpg)\n\
  \n*   **`Malloc`**：你可以请求一块指定大小的内存，并返回一个 void 类型的指针。然后，你可以将此指针转换为你需要的特定类型并使用它，例如：\n\
  \    ```\n    my_ptr = (cast_type *)malloc(number_of_bytes); // 通用格式\n    my_ptr\
  \ = (int *)malloc (100  * sizeof(int)); // 分配一个大小为\n         // 100 个整数的整数指针\n \
  \   ```\n*   **`Calloc`** 通常用于请求多个内存块，每块大小相同，然后将所有字节设置为零。\n    ```\n    my_ptr =\
  \ (cast_type *)calloc(number_of_elements, size_of_element); // 通用格式\n    my_ptr\
  \ = (int *)calloc (100, sizeof(int)); // 分配一个大小为\n       // 100 个整数的整数指针\n    ```\n\
  *   **`Free`**：此处的内存管理机制与 Objective-C 类似：你分配的内存，需要释放。你可以使用 C 语言中的 `free()` 方法来实现。\n\
  \    ```\n    free(my_ptr);\n    ```\n*   **`Realloc`**：有时你为对象或数组分配的内存不够用，因此你可能需要借助函数\
  \ `realloc()` 来更改内存大小。\n    ```\n    realloc(my_ptr, 200 * sizeof(int));\n    ```\n\
  \n**注意：**你不能再次使用函数 `malloc()`/`calloc()`，因为这会清除指针指向的内存中存储的所有数据。\n\n##### 链表示例\n\n\
  是时候从理论学习中稍作休息，开始编写代码了。你将运用所学知识处理一个使用链表存储数据的问题。你已经在第 5 章中学习了 Objective-C 中的链表实现。现在，你将学习如何用\
  \ C 语言编写链表，该链表在许多情况下可以提供更高的性能。\n\n```\n#include <stdio.h>\n#include <stdlib.h>\n\
  \nstruct Node {\n int number;\n struct Node *next;\n};\n```\n\n要拥有一个链表，你需要一个能够引用自身的结构体。在本例中，`Node`\
  \ 结构体需要有一个指向链表中下一个结构体的链接。在 C 语言中，你可以在头文件或实现文件中声明方法接口。\n\n```\nvoid append_node(struct\
  \ Node *list, int num);\nvoid display_list(struct Node *list);\n\nint main(void)\
  \ {\n struct Node *list;\n\n list = (struct Node *)malloc(sizeof(struct Node));\n\
  \ list->number = 0;\n list->next = NULL;\n\n append_node(list, 1);\n append_node(list,\
  \ 5);\n append_node(list, 3);\n\n display_list(list);\n\n // 在此处删除列表。free(list)\
  \ 不起作用\n return(0);\n}\n\nvoid delete_list(struct Node *list) {\n  // 作为练习，由你完成\n\
  }\n\nvoid display_list(struct Node *list) {\n // 遍历列表以打印出值。\n while(list->next !=\
  \ NULL) {\n  printf(\"%d \", list->number);\n  list = list->next;\n }\n\n printf(\"\
  %d\", list->number);\n}\n\nvoid append_node(struct Node *list, int num) {\n // 进入列表末尾\n\
  \ while(list->next != NULL)\n  list = list->next;\n\n // 为最后一个 Node 对象设置 next 属性。\n\
  \ list->next = (struct Node *)malloc(sizeof(struct Node));\n list->next->number\
  \ = num;\n list->next->next = NULL;\n}\n```\n\n\n\n您可以看到，由于链表没有固定大小，您始终需要使用`malloc`来分配新元素。使用完链表后，请删除您的列表。您需要记住内存管理规则：每调用一次`malloc`或`calloc`，就需要调用一次`free`函数；否则就会发生内存泄漏。正如代码中的注释所警告的，简单地调用`free(list)`会导致程序中出现一些内存泄漏。我将把`delete_list`的实现留作您的练习。\n\
  \n##### 函数指针\n\n在 C 语言中，函数并不是变量，但您可以像定义指向整型或结构体的指针一样，定义指向函数的指针。您可以将这些函数指针放入数组，并将它们作为参数传递给其他函数。这与\
  \ Objective-C 中的`selector`非常相似。\n\n接下来，您将看一个简单的例子，通过实现一个比较方法来填充快速排序算法。`qsort`是 C\
  \ 语言中的一个内置函数，它可以接受一个函数指针，并使用快速排序算法对数组进行排序。\n\n以下是`qsort`的接口：\n\n```c\nvoid qsort\
  \ (void *array, int number_of_elements, int size_of_element, int (* comparator)\n\
  (const void *, const void *) );\n```\n\n因此，您需要一个比较器函数，它接受两个指针并返回一个整数，指示哪个值更大。\n\n\
  ```c\nint compare (const void * a, const void * b){\n  return ( *(int*)a - *(int*)b\
  \ );\n}\n```\n\n然后，您可以将其作为参数传递给`qsort`函数。\n\n```c\nint main (){\n  int values[]\
  \ = { 40, 10, 100, 90, 20, 25 };\n  qsort (values, 6, sizeof(int), compare); //\
  \ 在此处传入比较函数。\n  return 0;\n}\n```\n\n##### 位运算符\n\n位运算符可能比加法和减法运算符稍快，并且比乘法和除法运算快得多。您可能会在库中看到大量使用位运算符的代码，尤其是在为旧微处理器编写的库中。\n\
  \n了解位运算符可以帮助您操作位，并在密集计算中大幅提升性能。有几个位运算符和位移运算符需要记住：`NOT`、`AND`、`OR`、`XOR`、左移和右移。\n\
  \n*   `NOT`是取反运算符，将位中的 0 变为 1，反之亦然。`NOT 0111 = 1000`\n*   `AND`接受两个长度相等的二进制表示，并对每一对对应位执行`AND`操作。如果位\
  \ 1 和位 2 都为 1，则结果为 1；否则为 0。\n    ```\n    0 1 0 1\n    AND 0 0 1 1\n      = 0 0\
  \ 0 1\n    ```\n*   `OR`接受两个长度相等的二进制表示，并对每一对对应位执行`OR`操作。如果两者中有一个为 1 或两者都为 1，则结果为\
  \ 1；否则为 0。\n    ```\n      0 0 1 0\n    OR 1 0 0 0\n      = 1 0 1 0\n    ```\n*\
  \   `XOR`接受两个长度相等的二进制表示，并对每一对对应位执行`XOR`操作。如果两个位不同，则结果为 1；否则为 0。\n    ```\n     \
  \ 0 1 0 1\n    XOR 0 0 1 1\n      = 0 1 1 0\n    ```\n\n使用这些位运算符，您可以快速地更改位值。如果您不习惯使用显式的位运算符，这一切可能看起来很奇怪。我将用\
  \ Objective-C 为您演示。以下是您已经熟悉的 Cocoa Touch 框架内部位运算符的一个应用：`NSCalendar`。\n\n在`NSCalendar`中，您可以根据输入参数获取特定日期的日期组件列表。例如，如果您想要一个仅包含所需日期组件的`NSDateComponent`对象，您可以使用以下源代码：\n\
  \n```objectivec\nNSUInteger unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit\
  \ | NSDayCalendarUnit;\nNSDateComponents *dateComponents = [calendar components:unitFlags\n\
  \                                               fromDate:startDate\n           \
  \                                      toDate:endDate\n                        \
  \                       options:0];\n```\n\n当使用`unitFlags`调用方法`[calendar components:fromDate:toDate:options]`时，它将检查调用者需要日期的哪些组件，并只返回那些组件。像这样编写代码非常方便，只使用了`OR`运算符。\n\
  \n在方法`[calendar components:fromDate:toDate:options]`内部，它将使用`AND`运算符检查`unitFlags`。\n\
  \n```objectivec\nBOOL hasYear = (unitFlags & NSYearCalendarUnit) != 0;\nBOOL hasMonth\
  \ = (unitFlags & NSMonthCalendarUnit) != 0;\nBOOL hasWeek = (unitFlags & NSWeeCalendarUnit)\
  \ != 0;\n…\n```\n\n现在，我将为您详细解释这些运算符内部发生了什么以及它们如何工作。首先，每个标志（`NSYearCalendarUnit`、`NSMonthCalendarUnit`等）都被分配了一个唯一的二进制表示，格式为：`0100`、`1000`。\n\
  \n当您对三个标志执行`OR`操作时，您会得到类似`1011`的结果。您将其传递给`[calendar components:fromDate:toDate:options]`方法。在该方法内部，它会与每个标志执行`AND`操作，以查看其中存储了哪个标志。\n\
  \n```\n1011 & 0100 = 0100 → 存在 NSYearCalendarUnit。\n1011 & 1000 = 1000 → 存在 NSMonthCalendarUnit\n\
  ```\n\n与其他常见方法相比，使用这种方法可以提高应用程序的性能。其他方法要么传递过多参数，要么使用大型枚举来存储情况，要么需要大量循环来检查数据。\n\n\
  *   **位移**：当您将数字乘以或除以 2 的幂时，可以将位向左或向右移动。例如，如果您将数字乘以或除以 2、4、8、16…，可以考虑使用位移，其运行时性能比直接进行乘除运算更高。位移只能对整数进行操作。\n\
  \n有两种位移运算符：左移和右移。整数以二进制形式存储，包含一系列位，例如`0000 0110`（十进制 6）。应用位移操作的结果因操作而异：\n\n*   **左移**：将所有位向左移动，并从右侧用零填充。如果将位向左移动\
  \ n 位，也意味着将其乘以 2^n。`0000 0110 << 1 = 0000 1100`（十进制 12）\n*   **右移**：将所有位向右移动，并从左侧用零填充。如果将位向右移动\
  \ n 位，也意味着将该数除以 2^n。`0000 0110 >> 1 = 0000 0011`（十进制 3）\n\n### C++ 编程\n\nC++是 C\
  \ 的超集，因此您将在这里学习一些额外的技术。C++有一些与 Objective-C 不同的概念和语法，尽管两者都是面向对象的编程语言。有几个重要的区别：类、指针、多重继承、内存管理和模板。\n\
  \n\n\n#### 类\n\nC++ 与 Objective-C 类似，每个类都有两个文件：一个用于头文件，一个用于实现。你也可以指定私有和公有的成员/方法。以下是声明类头文件的标准方式：\n\
  \n```\nclass Cat {\n  public:\n       // 公开访问器\n     unsigned int GetAge();\n  \
  \   void SetAge(unsigned int Age);\n     Cat ();\n     Cat (int initialAge);   \
  \  // 构造函数\n     ~Cat();                   // 析构函数\n\n     // 公开成员函数\n     void\
  \ Meow();\n\n      // 私有成员数据\n   private:\n     unsigned int  itsAge;\n};\n\n//\
  \ GetAge, 公开访问器函数\n// 返回 itsAge 成员的值\nunsigned int Cat::GetAge() {\n     return\
  \ itsAge;\n}\n\n// 设置 itsAge 成员\nvoid Cat::SetAge(unsigned int age) {\n     // 将成员变量\
  \ itsAge 设置为\n     // 参数 age 传入的值\n     itsAge = age;\n}\n\n// 动作：在屏幕上打印 \"meow\"\
  \nvoid Cat::Meow() {\n     cout << \"Meow.\\n\";\n}\n\nint main() {\n  Cat cat;\n\
  \  cat.Meow();\n}\n```\n\n可以看到，要声明公有和私有成员，你需要将它们分区并放入限定符 `private` 和 `public`，就像在\
  \ Objective-C 中定义头文件时使用相同的限定符 `@private` 和 `@public` 一样。对于类的实现，你需要在方法实现前加上类名，以声明该方法属于该类。\n\
  \n对于访问器和修改器，你需要显式声明它们：\n\n```\nunsigned int GetAge();\nvoid SetAge(unsigned int\
  \ Age);\n```\n\n要创建一个新的 `Cat` 对象，你可以直接声明 `Cat cat;`，然后调用方法 `cat.Meow();`。不过，该对象只存在于函数的局部作用域内。\n\
  \n对于内存管理，你可能需要同时声明构造函数和析构函数。如果你不声明自己的构造函数，编译器会假定它使用不带任何参数的默认构造函数。\n\n**注意：** 如果你声明了自己的构造函数，请记得也要声明你的析构函数，即使它什么都不做。这是一个良好的编程惯例。要使用\
  \ `Cat cat` 创建一个新的 `Cat` 对象，你需要一个默认构造函数。\n\n#### 指针与内存管理\n\n如果你想在程序的其他地方使用新创建的对象，你需要在\
  \ C++ 的**自由存储区**上分配内存。该对象将一直保留在内存区域中，直到你显式调用 `delete` 释放那块内存，这与 C 语言编程类似。要声明一个指向包含整数的内存地址的指针，可以像下面这段代码这样操作：\n\
  \n```\nint *pInt;\npInt = new int;\n*pInt = 72;\n```\n\n要为对象分配和释放内存，你可以使用 `new`\
  \ 和 `delete` 关键字。\n\n```\nCat *pCat = new Cat;\npCat->SetAge(5);\ndelete pCat;\n\
  pCat = 0;\n```\n\n**注意：** 如果你对同一个指针调用了两次 `delete`，你的应用程序将会崩溃。如果在重新分配指针之前没有先将其声明（并释放），则会发生内存泄漏。\n\
  \n#### 继承\n\nC++ 中的继承与 Objective-C 相比，有一些复杂的概念。你可以像往常一样实现继承、重写和多态。唯一的区别在于虚方法和纯虚方法的概念。\n\
  \n```\nclass Dog : Mammal {\n}\n```\n\n`Dog` 类将继承 `Mammal` 类的所有属性和方法，并且它可以拥有自己的属性和方法。当创建一个\
  \ `Dog` 对象时，会先调用 `Mammal` 的构造函数，然后才执行 `Dog` 类构造函数中的任何其他代码。\n\nC++ 继承中有一个重要的概念：你只能重写那些被声明为\
  \ **virtual** 的方法。对于其他方法，你只能继承它们，而不能重写。你可以在父类和子类中拥有两个同名的方法，但这不会发生重写和多态。而使用虚方法，子类被提示在必要时重写该方法。C++\
  \ 方法的默认限定符是非虚的。虚方法有两种：虚方法和纯虚方法。\n\n```\n#include \"stdafx.h\"\n#include \"stdio.h\"\
  \n\nusing namespace System;\n\nclass Animal {\n public:\n  virtual void Speak()\
  \ = 0;\n  virtual void Eat();\n  void Run();\n};\n\nvoid Animal::Eat()\n{\n    \
  \    printf(\"Animal eats\\n\");\n}\n\nvoid Animal::Run()\n{\n        printf(\"\
  Animal runs\\n\");\n}\n\nclass Dog : Animal\n{\npublic:\n        void Eat();\n \
  \       void Speak();\n        void Run();\n};\n\nvoid Dog::Eat()\n{\n        printf(\"\
  Dog eats\\n\");\n}\n\nvoid Dog::Run()\n{\n        printf(\"Dog runs\\n\");\n}\n\n\
  void Dog::Speak()\n{\n        printf(\"Dog speaks\\n\");\n}\n\nint main()\n{\n \
  \       Animal *dog1 = (Animal *) new Dog;\n    dog1->Run();\n    dog1->Speak();\n\
  \    dog1->Eat();\n        getchar();\n}\n```\n\n对于虚方法，你必须在父类中提供它的实现；而对于纯虚方法，你只需声明方法签名即可。`Eat`\
  \ 方法是一个虚方法，而 `Speak` 是一个纯虚方法。这两个方法都需要在子类中被重写。\n\n因为 `Run` 方法不是虚方法，所以它没有被子类重写。因此，`main`\
  \ 方法的输出将是：\n\n```\nAnimal Runs\nDog Speaks\nDog Eats\n```\n\n#### 多重继承\n\n在 C++\
  \ 中，你的类可以继承自多个父类，因此你可以复用更多的属性和方法。例如，你的 `Teacher` 类可以同时继承自 `Employee` 和 `Person`\
  \ 类，如图 9-4 所示。\n\n![images](img/0904.jpg)\n\n**图 9–4.** *多重继承*\n\n你可以通过以下方式声明你的类继承多个类：\n\
  \n```\nclass Teacher : public Person, public Employee {\n}\n```\n\n多重继承有一个常见问题：当两个父类共享同一个方法时。例如，`GetIncome`\
  \ 可以同时从 `Person` 和 `Employee` 类中声明。因此，当你调用 `Teacher` 对象的 `GetIncome` 方法时，你需要指定是从哪个父类中调用它。\n\
  \n如果你简单地写成：\n\n```\nint currentIncome = pTeacher->GetIncome();\n```\n\n你会得到一个编译器错误：\n\
  \n`Member is ambiguous: ‘Person::GetIncome’ and ‘Employee::GetIncome’`\n\n你需要通过显式调用你想调用的父类函数来解决这个歧义。\n\
  \n```\nint currentIncome = pTeacher->Employee::GetIncome();\n```\n\n#### 模板\n\n\
  在 C++ 中，你可以定义类或方法只接收特定类型的对象。例如，你可以定义一个只接收两个相同类型数据进行比较并返回结果的方法。\n\n```\ntemplate\
  \ <class T>\nT GetMax (T a, T b) {\n return (a>b)? a : b;\n}\n\nint main () {\n\
  \ int i=5, j=6, k;\n long l=10, m=5, n;\n k=GetMax<int>(i,j);\n n=GetMax<long>(l,m);\n\
  \ return 0;\n}\n```\n\n通过定义模板方法，你可以确保 `a` 和 `b` 具有相同的类类型并且可以相互比较。你也可以在模板类中执行相同的操作，而没有任何问题。\n\
  \n```\ntemplate <class T>\nclass mypair {\n   T a, b;\n public:\n   mypair (T first,\
  \ T second)\n     {a=first; b=second;}\n   T getmax () {\nreturn a>b? a : b;\n \
  \  }\n};\n\nint main () {\n mypair <int> myobject (100, 75);\n cout << myobject.getmax();\n\
  \ return 0;\n}\n```\n\n## 一个实际示例\n\n我将通过一些例子来指导你如何将 C/C++ 库集成到 Objective-C 代码中。一个例子是与\
  \ SQLite 库的集成，另一个例子是一个将 C++ 代码与 Objective-C 代码混合使用的示例应用程序。\n\n\n\n### SQLite\n\n\
  SQLite 是 CoreData 的底层实现。在性能方面，SQLite 表现稍好，因为它更轻量、更直接。然而，CoreData 能为你提供更好的对象映射模型、撤销和重做功能、批量处理以及线程支持。\n\
  \nSQLite 的主要优势在于，如果你的团队已经熟悉关系型数据库和关系型 SQL，那么学习曲线会很平缓。SQLite 也更易于移植到 Android 上，这样你就可以在\
  \ iPhone 和 Android 应用之间共享相同的数据层。\n\n你可以在 `SQLiteSample project` 项目中阅读源代码示例。这里我只给你讲解重点。\n\
  \n你需要通过打开终端并输入 `sqlite3 students.sql` 来创建一个 SQL 数据库。这将创建一个新的数据库，你可以在其中创建表、插入和查询数据。你可以像平常一样使用\
  \ SQL 来创建表和插入数据。\n\n```\nsqlite> CREATE TABLE students (pk INTEGER PRIMARY KEY,\
  \ name VARCHAR(25));\nsqlite> INSERT INTO students (name) VALUES ('khang');\nsqlite>\
  \ INSERT INTO students (name) VALUES ('vo');\nsqlite> INSERT INTO students (name)\
  \ VALUES ('duy');\nsqlite> .quit\n```\n\n图 9-5 更清晰地展示了终端内发生的事情。\n\n![images](img/0905.jpg)\n\
  \n**图 9-5.** *SQLite 数据库*\n\n然后，你可以在你的`Home`文件夹（如果你在终端中没有切换到任何文件夹，这是默认文件夹）中找到 `students.sql`\
  \ 文件。你需要将该文件添加到 Xcode 中，然后添加库 `libsqlite3.0.dylib`。\n\n```objective-c\n- (void)viewDidAppear:(BOOL)animated\
  \ {\n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"students\" ofType:@\"\
  sql\"];\n\n    if (sqlite3_open([path UTF8String], &database) == SQLITE_OK) {\n\
  \        // 获取所有书籍的主键。\n        const char *sql = \"SELECT pk, name FROM students\"\
  ;\n        sqlite3_stmt *statement;\n\n        // 准备语句会将 SQL 查询编译成 SQLite 库中的字节码程序。\n\
  \        // 第三个参数是 SQL 字符串的长度，或者为 -1 表示读取到第一个空终止符。\n        if (sqlite3_prepare_v2(database,\
  \ sql, -1, &statement, NULL) == SQLITE_OK) {\n            // 我们“逐步”遍历结果——每行一次。\n\
  \            while (sqlite3_step(statement) == SQLITE_ROW) {\n                const\
  \ unsigned char *name = sqlite3_column_text(statement, 1);\n                NSString\
  \ *nameString = [NSString stringWithCString:(char *)name\n                     \
  \                                     encoding:NSASCIIStringEncoding];\n       \
  \     }\n        }\n\n        // “终结”该语句——释放与该语句关联的资源。\n        sqlite3_finalize(statement);\n\
  \    } else {\n        // 即使打开失败，也要调用 close 以正确清理资源。\n        sqlite3_close(database);\n\
  \        NSAssert1(0, @\"打开数据库失败，消息为 '%s'。\", sqlite3_errmsg(database));\n    }\n\
  \n    [self.tableView reloadData];\n}\n```\n\n有几个你需要记住的方法：\n\n- `sqlite3_open([path\
  \ UTF8String], &database) == SQLITE_OK` 初始化新的数据库对象并将其赋值给你的指针。\n- `sqlite3_prepare_v2(database,\
  \ sql, -1, &statement, NULL) == SQLITE_OK` 执行你的 SQL 命令并将结果放入 statement。\n- `while\
  \ (sqlite3_step(statement) == SQLITE_ROW):` 逐步遍历执行语句后得到的结果。\n\n### 将 C++ 集成到你的应用程序中\n\
  \n将 C 集成到你的应用程序中几乎不费吹灰之力，因为 Objective-C 是 C 的超集。但是，当你将 C++ 集成到应用程序中时，需要注意一些细节。\n\
  \n首先，你需要像平常一样在普通的头文件和实现文件（`.h 和 .cpp 文件`）中创建你的 C++ 类。然后，你需要用一个扩展名为 `.mm` 的 Objective-C\
  \ 文件来包装你的 C++ 文件（这告诉 iOS 环境这些文件是 Objective-C++ 文件）。任何想要使用这些 `.mm` 文件的文件也必须是 `.mm`\
  \ 文件。\n\n你可以查看示例项目 `TestC_CPlus`。首先，你可以看到有两个文件，`Foo_Cpp.h` 和 `Foo_Cpp.cpp`，它们声明了\
  \ `Foo_Cpp C++ 类`。然后，你通过名为 `MyObject.h 和 MyObject.m` 的 Objective-C++ 文件来包装这个文件。\n\
  \n最后一步是将这些后台逻辑集成到视图控制器中。你可以像往常一样在项目中的任何位置调用对象 MyObject。你只需要将调用文件重命名，以 `.mm` 结尾即可。\n\
  \n## 总结\n\n编程世界中有大量高性能且专用于特定任务的 C/C++ 库。你不应该重新发明轮子，或者费力地将所有这些 C/C++ 代码转换为 Objective-C\
  \ 代码，这会花费很长时间。理解 C/C++ 可以帮助你更好地理解这些库，以便将它们集成到你现有的应用程序中。\n\nObjective-C 是 C 的超集，因此你可能已经了解许多\
  \ C 的特性。我讨论了 C 编程中的主要重点，包括指针概念。你还学习了函数指针和位运算，这让你能够充分发挥 C 语言的高性能特性。\n\n如果你没有编程经验，C++\
  \ 会更难学习和理解。我只讨论了 C++ 的要点以及 C++ 和 Objective-C 之间的主要区别。这可能不足以编写一个大型的 C++ 应用程序，但足以让你将现有的\
  \ C++ 库集成（并在必要时修改）到你的 iPhone 应用程序中。\n\n在最后一节中，我使用了一个 SQLite 的实际示例来演示 C 在 Objective-C\
  \ 中的用法。除了语法和内存管理上的一些差异外，这样做并不太难。我没有深入探讨 C++ 库；只是演示了如何让你的 iPhone 应用程序中包含 C++ 代码。\n\
  \n**练习题**\n\n1. 用 C 语言编写一个函数，比较两个字符串 s1 和 s2。如果 s1 < s2，返回负数；s1 = s2，返回 0；s1 > s2，返回正数。\n\
  2. 用 C 语言编写一个函数，将字符串 s2 追加到字符串 s1 的末尾。\n3. 通过填写 `delete_list` 方法，完成该 C 语言链表程序。\n\
  \n## 第 10 章\n\n\n\n## 比较 Android 与 Windows Phone 的性能问题\n\n在本章中，你将学习以下内容：\n\n-  \
  \ 智能手机开发中三个平台及三种编程语言的通用知识与差异。\n-   如何将你在 iOS 上学到的诸多应用性能优化要点应用于 Android 和 Windows\
  \ Phone，例如：\n    -   如何对 Android 和 Windows Phone 应用进行基准测试。\n    -   如何优化滚动性能。\n\
  \    -   缓存与数据存储的差异。\n    -   针对三个平台的数据结构与算法简析。\n    -   针对三个平台的多线程简析。Android 与其他两个平台有所不同。\n\
  \    -   关于内存限制的要点。\n    -   这些平台处理多任务的不同方式。\n    -   如何将 C/C++ 代码集成到你的 Android\
  \ 应用中。\n\n本章将为你勾勒出未来三大主要智能手机平台——iPhone、Android 和 Windows Phone——的总体面貌。它们正在不断发展并大力创新，以保持相对于竞争对手的竞争优势。对于一些基础且简单的应用，你或许不愿为每个平台投入大量时间和精力去优化性能，此时可以编写跨平台应用以节省时间。\n\
  \n不出所料，跨平台版本的发布通常会比主 SDK 晚数周甚至数月。此外，与主要 API 相比，它也会缺少某些精细化功能。因此，要想在这三个平台市场中取得成功，你必须使用主要语言及其特性来优化性能，并充分利用该平台的先进功能和\
  \ API。\n\n我将概述 Android 和 Windows Phone 性能方面的主要难点。通过本书各章节（工具、模拟器、列表视图、缓存、存储、数据结构与算法、多线程、多任务、内存管理以及原生\
  \ C/C++ 编程支持）的引导，可以简化这些问题的理解。限于篇幅，我无法覆盖每个平台的所有细节，也不会妄加评判哪个平台最好。阅读本章后，你将了解每个平台最重要的难点，从而能够轻松地切换和学习新平台。\n\
  \n## 通用知识\n\niPhone 使用 Objective-C 作为 iOS 开发的主要编程语言。它没有垃圾回收器，而是依靠 ARC 来协助内存管理。仅有三种设备运行\
  \ iOS：iPod Touch、iPhone 和 iPad，它们有两种不同的屏幕分辨率。\n\nAndroid 使用 Java 作为主要编程语言，并提供垃圾回收以简化内存管理。Android\
  \ 拥有众多屏幕尺寸和硬件规格各异的设备。有些设备采用双核芯片，而有些设备则性能较弱（处理器速度慢、内存有限）。\n\nWindows Phone 使用 C#\
  \ 作为主要编程语言，并使用 Silverlight 作为用户界面框架。C# 具备垃圾回收功能。支持 Windows Phone 的设备很多，但都必须满足必要的硬件要求。\n\
  \n## 在模拟器和设备上进行基准测试\n\n在 iOS 中，正如你在第 2 章所了解到的，模拟器远快于真机，因此有些情况下你需要使用真机来测试性能是否达标。iOS、Android\
  \ 和 Windows Phone 的模拟器与真机架构差异很大，因此每个平台进行基准测试的方法也各不相同。\n\n### 模拟器与设备\n\nAndroid 模拟器（图\
  \ 10-1）运行速度非常慢。你可以将其作为性能测试的最低基准。此外，Android 设备型号众多，要让所有 Android 用户对性能满意并非易事。你可能需要在不同设备上进行测试，以了解性能结果的范围。\n\
  \n![images](img/1001.jpg)\n\n**图 10-1.** *Android 模拟器*\n\nWindows Phone 模拟器（图 10-2）运行性能正常，几乎与真机无异。如果你想像开发\
  \ iOS 应用那样，通过快速模拟器来运行测试，那么提升模拟器性能是可行的；你可以在互联网上轻松找到相关信息。\n\n![images](img/1002.jpg)\n\
  \n**图 10-2.** *Windows Phone 模拟器*\n\n正如第 2 章所述，iPhone 模拟器的运行速度远快于真机，因此很难在模拟器上检测到性能问题。\n\
  \n### 基准测试\n\n了解在需要进行基准测试时可以使用哪些工具至关重要。Android 提供的工具集较为有限，而 Windows Phone 则提供了更广泛的工具来帮助你查找性能问题。这些工具中的许多功能与\
  \ iOS 提供的工具类似；它们支持对内存、CPU 使用率和用户界面处理进行基准测试。\n\n### Android\n\n用于 Android 开发的 Eclipse\
  \ 并未像 Xcode 为 iPhone 提供的那样提供一整套检测工具。它主要提供四种检测工具用于跟踪性能：线程、堆、对象分配和文件访问。你可以将这些工具与日志记录（使用\
  \ `Debug.trace()`）结合使用，来测量应用的整体性能。\n\n虽然 Android 提供了垃圾回收，但它也有缺点。当垃圾回收运行时，它会暂停你的应用。这会导致你的用户界面停止响应几毫秒，或者至少无法渲染足够的帧数（良好的渲染帧率应在\
  \ 16-30 毫秒/帧左右）。\n\n图 10-3 和图 10-4 展示了 Android 的堆和分配跟踪器。你可以使用这些工具来查看在哪些类或方法中创建了最多对象。\n\
  \n![images](img/1003.jpg)\n\n**图 10-3.** *堆检测工具*\n\n![images](img/1004.jpg)\n\n\
  **图 10-4.** *分配检测工具*\n\n### Windows Phone\n\nWindows Phone 提供了性能更出色的性能分析工具。图 10-5\
  \ 展示了运行 Windows Phone 性能分析工具并获取数据后的结果。\n\n![images](img/1005.jpg)\n\n**图 10-5.**\
  \ *分配检测工具*\n\n该性能工具支持多种不同的性能基准测试指标：帧率、CPU 使用率、内存使用率、图像加载和垃圾回收事件。这有助于你定位性能瓶颈，从而更轻松地解决问题。\n\
  \n\n\n## ListView 性能优化\n\n所有 iOS、Android 和 Windows Phone 平台上的 `ListView`（或 `TableView`）都面临相似的性能问题。你始终需要尽快将数据返回给列表；否则，用户在滚动列表时会看到明显的卡顿。图片加载必须采用异步方式，这样用户才能流畅滚动列表并先看到数据。当图片加载完成后，再在列表中显示。\n\
  \n以下是三个平台在视图渲染方面常见的共同问题：\n\n*   应始终尽可能使用不透明视图。\n*   不应使用复杂的嵌套列表视图结构，因为这会导致显示速度变慢。\n\
  \n针对 `ListView` 滚动问题，每个平台都有其特定的处理方式。要实现自定义 `ListView`，Android 和 Windows Phone 采用不同的方法将数据显示到\
  \ `ListView` 中。Android 的处理方式类似于 iPhone，只在必要时返回数据和视图。Windows Phone 则使用一种自动绑定机制将数据绑定到视图。这种方式对开发者来说更易于实现，但相比\
  \ Android 的方式，会引发更多的性能问题。\n\n对于 Windows Phone 而言，当你拥有一个大型对象数组时，很快就会遇到内存和性能问题，因为操作系统无法在内存中存储更多对象并将其取出绑定到\
  \ `ListView`。这是 iPhone、Android 和 Windows Phone 中 `ListView` 的主要区别。在前两个平台中，你只需决定列表的大小；在滚动时，你可以获取数据并进行显示。对于\
  \ iOS 的 `TableView`，当你能够丢弃数组中未使用的对象并只存储必要对象时，内存不应成为问题。我将简要解释这两个平台的实现方式以及如何解决各自的问题。\n\
  \n### Android\n\n在 Android 中，你可以毫无困难地将数据映射到默认布局。\n\n```java\nString [] cities= new\
  \ String[] {\"墨尔本\", \"维多利亚\", \"阿德莱德\"};\nthis.setListAdapter(new ArrayAdapter<String>(this,\
  \ R.layout.list_item, cities));\n```\n\n然而，如果你需要实现更复杂的布局，你可以使用自己的适配器将数据映射到视图。\n\n\
  ```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n        android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\">\n        <ImageView android:id=\"\
  @+id/icon\" android:layout_height=\"wrap_content\"\n                android:src=\"\
  @drawable/icon\" android:layout_width=\"22px\">\n        </ImageView>\n        <TextView\
  \ android:text=\"@+id/TextView01\" android:layout_width=\"wrap_content\"\n     \
  \           android:layout_height=\"wrap_content\" android:id=\"@+id/label\"\n \
  \               android:textSize=\"30px\"></TextView>\n</LinearLayout>\n```\n\n\
  我的示例应用在左侧包含一个图像视图，右侧包含一个文本视图，类似于 iOS 中 `UITableView` 的默认单元格。\n\n```java\npublic\
  \ class MySimpleArrayAdapter extends ArrayAdapter<String> {\n   @Override\n    \
  \  public View getView(int position, View convertView, ViewGroup parent) {\n   \
  \    LayoutInflater inflater = context.getLayoutInflater();\n        View rowView\
  \ = inflater.inflate(R.layout.rowlayout, null, true);\n\n        TextView textView\
  \ = (TextView) rowView.findViewById(R.id.label);\n        ImageView imageView =\
  \ (ImageView) rowView.findViewById(R.id.icon);\n        textView.setText(names[position]);\n\
  \n        // 为 Windows 和 iPhone 更改图标\n       imageView.setImageResource(R.drawable.ok);\n\
  \n     return rowView;\n   }\n}\n```\n\n创建 Java 对象（尤其是 `View` 对象）会消耗时间和 CPU，因此 Android\
  \ 会重用不再显示的行。例如，如果某行从视图的顶部或底部消失，Android 会将该视图作为参数 `convertView` 返回给 `Adapter` 方法。要在你的方法中使用它，你必须首先检查\
  \ `convertView` 是否不为 null，然后才能使用它来显示下一个数据项。\n\n另一个需要注意的重要优化点是：由于 `findViewByID()`\
  \ 方法是一种开销很大的操作，应尽可能避免使用。相反，你应该使用 `setTag()` 和 `getTag()` 方法来获取所需的视图。\n\n考虑到这些因素，你可以将之前的源代码重写如下：\n\
  \n```java\n@Override\npublic View getView(int position, View convertView, ViewGroup\
  \ parent) {\n   // ViewHolder 将缓冲对行布局中各个字段的访问\n\n   ViewHolder holder;\n   // 如果作为参数传递，则重用现有视图\n\
  \   // 这将节省 Android 上的内存和时间\n   // 这仅在所有类的基本布局相同时有效\n   View rowView = convertView;\n\
  \   if (rowView == null) {\n       LayoutInflater inflater = context.getLayoutInflater();\n\
  \       rowView = inflater.inflate(R.layout.rowlayout, null, true);\n       holder\
  \ = new ViewHolder();\n\n       // 仅在第一次时调用 findViewByID()，然后使用 setTag()\n     \
  \  holder.textView = (TextView) rowView.findViewById(R.id.label);\n       holder.imageView\
  \ = (ImageView) rowView.findViewById(R.id.icon);\n\n       rowView.setTag(holder);\n\
  \n    } else {\n       holder = (ViewHolder) rowView.getTag();\n    }\n\n    holder.textView.setText(names[position]);\n\
  \n    // 为 Windows 和 iPhone 更改图标\n    String s = names[position];\n    holder.imageView.setImageResource(R.drawable.ok);\n\
  \n     return rowView;\n}\n```\n\n如你所见，`convertView` 被重用了，所以如果它不为 null，你可以直接使用它。你还可以看到我创建了一个包装器来包含文本视图和图像视图。你可以根据需要在视图持有者中包含任意多个视图，并将参数命名为任何名称。你可以将视图持有者想象成一个映射，以属性为键，并将其他视图作为值。\n\
  \n### Windows Phone\n\nWindows Phone 使用不同的方式实现数据绑定，这导致了严重的性能和内存问题。在 Windows Phone\
  \ 中，UI 仍然会被重用，就像在 Android 和 iOS 中一样；但是，数据是直接绑定的。这意味着，如果你需要在 `ListView`（在 Windows\
  \ Phone 中称为 `ListBox`）中显示 1000 个项目，那么所有 1000 个项目都必须被创建并加载到内存中。这对于 Silverlight 桌面应用程序来说是可以正常工作的。但是在\
  \ Windows Phone 中，内存更加有限，因此手机无法承受加载所有 1000 个项目。\n\n当前 Windows Phone 绑定的主要问题在于它绑定到\
  \ `IEnumerables` 接口。这可以通过使用另一个实现了 `IList` 接口的数据绑定来解决，该接口已经支持 `Count` 和 `IndexOf`\
  \ 方法。\n\n```csharp\n  public class MyDataSource : IList\n  {\n    const int MAX_ITEMS\
  \ = 1000;\n\n    public int Count\n    {\n      get { return MAX_ITEMS; }\n    }\n\
  \n    public int IndexOf(object value)\n    {\n      if (value == null)\n      {\n\
  \        Debug.WriteLine(\"IndexOf(null)\");\n        return -1;\n      }\n\n  \
  \    DataItem item = (DataItem)value;\n      return item.Index;\n    }\n\n    public\
  \ object this[int index]\n    {\n      get\n      {\n        DataItem itemToReturn\
  \ = new DataItem { Index = index, Text = \"新项目\" };\n        return itemToReturn;\n\
  \      }\n      set\n      {\n        throw new NotImplementedException();\n   \
  \   }\n    }\n\n    // 数据虚拟化不需要 IList 的其他任何内容\n    #region 未实现的部分\n    // 在此处填写未实现的方法\n\
  \    #endregion\n  }\n\n  public class DataItem\n  {\n    public int Index { get;\
  \ internal set; }\n    public string Text { get; set; }\n    public override string\
  \ ToString()\n    {\n      return Text + \" [\" + Index + \"]\";\n    }\n  }\n```\n\
  \n作为练习，你应该将此代码与你用于 UI 的 `ListBox` 主代码集成。\n\n\n\n## 数据缓存\n\n你在 第 3 章 中为 iOS 编程学习到的所有算法和术语，都可以毫无问题地应用于\
  \ Android 和 Windows Phone。你应当学习的是与 Windows Phone 和 Android 直接相关的技术，例如在哪里存储缓存数据、缓存的频率以及缓存数据的格式。\n\
  \n内存缓存部分也应该与 iOS 没有区别，因为这三个平台的硬件规格并没有不同。你可以采用与 iOS 相同的内存缓存算法。我将重点介绍如何利用文件存储来获得最佳性能。\n\
  \n### Android\n\n有很多地方可以存储缓存数据。\n\n*   **`SharedPreferences`**：这与 `NSUserDefaults`\
  \ 完全相同。你可以在此存储原始数据。它通常用于设置存储或轻量级数据存储。\n*   **内部存储**：你可以在设备存储中存储私有数据。它实际上是内部存储中的一个文件区域。其他应用程序无法访问此存储。\n\
  *   **外部存储**：在大多数 Android 手机中，用户可以通过可移动存储介质（例如 SD 卡）获得更多存储空间。保存在此处的文件对全局公开，甚至可以被用户修改。用户可以启用\
  \ USB 大容量存储来将文件传输到他们的计算机。\n*   **`SQLite`**：这是一个数据库，你可以像往常一样使用 Java 和 SQL 访问它，没有太大区别。这就是为什么如果你选择在\
  \ iPhone 的 SQLite 数据库中存储数据，你实际上可以在此处重用它。\n\n#### 内部存储\n\n文件在此处长期存储，并且仅对你的应用程序私有。你可以通过以下代码在此存储区域中存储文件：\n\
  \n```\nString FILENAME = \"hello_file\";\nString string = \"hello world!\";\n\n\
  FileOutputStream fos = openFileOutput(FILENAME, Context.MODE_PRIVATE);\nfos.write(string.getBytes());\n\
  fos.close();\n```\n\n此代码将字符串写入文件，然后保存该文件。\n\n要将数据保存在缓存文件夹中（该文件夹通常会被操作系统在不通知你的情况下删除），请使用\
  \ `getCacheDir()` 内的路径。\n\n**注意：**要像 iOS 中的应用包一样将文件保存到应用程序中，你可以保存到项目目录 `res/raw/`。你可以使用\
  \ `openRawResource()` 读取文件，但不能写入这些文件。\n\n#### 外部存储\n\n这是可移动存储，因此你需要检查该存储介质是否已连接到当前设备。\n\
  \n```\nString state = Environment.getExternalStorageState();\nif (Environment.MEDIA_MOUNTED.equals(state))\
  \ {\n  // 你可以读取和写入数据\n} else if (Environment.MEDIA_MOUNTED_READ_ONLY.equals(state))\
  \ {\n  // 你只能读取数据\n} else {\n  // 你既不能读取也不能写入数据\n}\n```\n\n这种介质具有更大的存储容量，因此你可以存储更多数据。但是，用户可能会误删除数据，或者未将介质连接到设备。卸载你的应用程序时，这些文件也会被删除。如果你不希望发生这种情况，或者希望与其他应用程序共享数据，可以将它们保存到根目录下的目录中，方法是调用\
  \ `getExternalStoragePublicDirectory()`。在外部介质中，你还有一个特定的缓存目录，用于保存不重要的缓存数据：`getExternalCacheDir()`。\n\
  \n#### SQLite 数据库\n\n存储在数据库中可能会导致复杂的问题，但它也有助于解决许多性能问题。有很多技巧可以帮助你提高数据库访问的性能，例如更好的索引、数据库分区和唯一键。我不会深入讨论数据库优化，因为它是一个非常庞大且专门的课题。可以说，SQLite\
  \ 与任何其他 SQL 数据库大致相似。\n\n### Windows Phone\n\n微软发布了一个包含本地数据库的 Windows Phone 更新。如果你开始构建一个新应用程序并且想要使用数据库，现在就可以这样做。否则，如果你的应用程序密集使用其他存储机制，你可以选择优化它，而不是重建整个数据库。\n\
  \n在 Windows Phone 中，也有四种主要的文件存储方法。\n\n*   **`IsolatedStorageSettings`**：键值存储，与 `NSUserDefaults`\
  \ 完全相同。\n    ```\n    IsolatedStorageSettings appSettings = IsolatedStorageSettings.ApplicationSettings;\n\
  \    appSettings.Add(\"email\", \"myemail@gmail.com\");\n    var myEmail = (string)appSettings[\"\
  email\"];\n    ```\n*   **`IsolatedStorageFile`**：在 Windows Phone 中用于将文件存储到文件系统。它没有像\
  \ Cache 或 Public 这样用于特定目的的默认目录。你需要创建自己的目录来处理存储过程。\n*   **XML 存储**：对于旧版应用程序，如果你没有数据库支持，你可能需要选择\
  \ XML 作为主要的存储机制。\n*   **本地数据库**：包含 Mango 的新版本将为 Windows Phone 提供本地数据库支持。本地存储性能的许多问题将随此新版本得到解决。\n\
  \n#### IsolatedStorageFile\n\nWindows Phone 中的文件存储很简单；你可以使用整个应用程序目录来做任何你想做的事情。操作系统不会处理任何事情，例如自动删除或限制此目录的存储限制。\n\
  \n```\nIsolatedStorageFile myStore = IsolatedStorageFile.GetUserStoreForApplication();\n\
  myStore.CreateDirectory(\"Cache\");\n\n// 指定文件路径和选项。\nusing (var isoFileStream =\
  \ new IsolatedStorageFileStream(\"Text1.txt\", FileMode.OpenOrCreate, myStore))\n\
  {\n  // 写入数据\n  using (var isoFileWriter = new StreamWriter(isoFileStream))\n  {\n\
  \    isoFileWriter.WriteLine(txtWrite.Text);\n  }\n}\n```\n\n要读取文件，请使用以下代码：\n\n\
  ```\nusing (var isoFileStream = new IsolatedStorageFileStream(\"Cache\\\\Text1.txt\
  \ \", FileMode.Open, myStore))\n{\n  // 读取数据。\n  using (var isoFileReader = new\
  \ StreamReader(isoFileStream))\n  {\n    txtRead.Text = isoFileReader.ReadLine();\n\
  \  }\n}\n```\n\n你需要指定想要执行读取、写入或追加数据操作的读/写权限。\n\n#### XML 存储\n\n使用 XML 进行存储，然后使用\
  \ LINQ to XML 进行读写，这是一个痛苦的过程，并且会显著损害你的 Windows Phone 应用程序的性能。\n\n使用 LINQ to XML\
  \ 进行存储的主要性能问题在于，每次需要修改或读取数据时，都需要加载或保存整个 XML。这是因为 LINQ 使用 DOM 来访问数据。当你将整个大型 XML 文件加载到内存中以访问它时，还会导致内存问题。如果你有一个小的\
  \ XML 文件，这不会带来任何麻烦。\n\n开发者有两种方法可以解决这个 XML 问题。\n\n*   你有一个主文件，包含所有数据的主要结构。然后，你有几个较小的文件来存储关于每个主要数据项的数据。例如，对于一个\
  \ RSS 阅读器，你可以将所有频道信息存储在主文件中，然后为每个频道单独创建一个文件。\n*   你仅缓存最新数据。任何超过 10 天的数据都可能被删除。这将减少本地\
  \ XML 文件中的数据量，并降低你工作的复杂性。缺点是，如有必要，你需要重新下载旧数据。\n\n#### 数据库支持\n\n随着新的 Mango 版本发布，Windows\
  \ Phone 将支持本地数据库存储。你很快就能拥有索引、分区、键和对数据库随机访问的所有强大功能。借助此新版本，你应该使用 LINQ to SQL 来实现良好的代码重用，因为\
  \ LINQ to SQL 和 LINQ to XML 共享许多代码库元素。\n\n\n\n## 数据结构与算法\n\n`C#`、`Java` 和 `Objective-C`\
  \ 拥有相似的内置数据结构，用于支持三种主要的对象集合类型：集合、数组和映射。表 10-1 总结了这些集合类型、它们的子类型以及如何自行实现。  \n![images](img/t1001.jpg)\
  \  \n还有一些不太重要的数据结构，比如栈和队列，但你总是可以根据在第 5 章中学到的知识自行实现。\n\n对于 XML 解析器，Android 默认同时支持`SAX`和`DOM\
  \ XML`解析器，因此你无需额外添加其他库。对于 Windows Phone 上的`C#`，在大多数情况下你需要使用`LINQ over XML`来处理相关工作，因为它提供了更好的代码可维护性，并且实际上比`DOM`更快。如果遇到非常大的\
  \ XML 文件，请考虑使用`XmlReader`。\n\n## 多线程\n\n在多线程管理方面，`C#`和`Java`是功能强大的编程语言。与 iOS 的多线程类似，更新\
  \ UI 的任务需要在 UI 线程上完成；其他长时间运行的操作则需要在后台线程中进行。\n\n这三种平台的线程锁定机制相似，都基于通知机制。不过，各平台在实现多线程机制的具体方式及其特定规则上，存在一些重要差异。\n\
  \n### Android\n\nJava 拥有多线程机制，但 Android 更倾向于使用自己的多线程管理机制。在 Android 中，对于 UI 线程有一个非常严格的规定。如果\
  \ UI 线程被阻塞超过几秒钟（目前为 5 秒），用户将会看到著名的“应用程序无响应”弹窗。之后，你的应用程序将被强制关闭。\n\n在 Java 中，你可以通过继承`Thread`类或实现`Runnable`接口来创建线程。最简单的方法之一是使用匿名内部类。\n\
  \n```\nnew Thread(new Runnable() {\n   public void run() {\n     // 你的后台代码。\n  \
  \ }\n}).start();\n```\n\n如果你创建了一个继承`Thread`类的新类，可以直接调用`newThread().start()`。如果类\
  \ B 实现了`Runnable`接口，那么你可以使用`new Thread(B).start()`。\n\n有几种方法可以在 UI 线程中更新 UI，类似于调用以下\
  \ iOS 方法的方式：\n\n```\n[obj performSelectorOnMainThread:mySelector withObject:nil\
  \ waitUntilDone:YES];\n```\n\nAndroid 提供了以下几种更新 UI 线程的方法：\n\n*   `Activity.runOnUiThread(Runnable)`\n\
  *   `View.post(Runnable)`\n*   `View.postDelayed(Runnable, long)`\n*   `Handler`\n\
  \n例如，你可以使用以下代码在后台线程获取图像，然后更新 UI 线程：\n\n```\npublic void loadImage() {\n new Thread(new\
  \ Runnable() {\n   public void run() {\n     final Bitmap bitmapImage = loadBitmapImage();\n\
  \     myImageView.post(new Runnable() {\n       public void run() {\n         myImageView.setImageBitmap(bitmapImage);\n\
  \       }\n     });\n   }\n }).start();\n}\n```\n\n如果你的线程内部和 UI 更新代码中需要执行大量处理逻辑，代码会变得复杂。你也可以创建一个实现`Runnable`接口的类，并调用该类的`run()`方法。Android\
  \ 还提供了一种更简单的方法来处理复杂的线程处理逻辑：`AsyncTask`类。这是一个更好的线程管理结构，用于处理线程问题。\n\n```\nprivate\
  \ class myAsyncTask extends AsyncTask<X, Y, Z>\n  protected void onPreExecute(){\n\
  \  }\n\n  protected Z doInBackground(X...x){\n  }\n\n  protected void onProgressUpdate(Y\
  \ y){\n  }\n\n  protected void onPostExecute(Z z){\n  }\n}\n```\n\n*   `onPreExecute`：该方法在你的后台线程执行之前被调用。\n\
  *   `doInBackground`：主方法在后台线程中运行。\n*   `onProgressUpdate`：当你需要根据后台线程的当前进度在主线程中更新视图时使用。\n\
  *   `onPostExecute`：当你的后台线程完成时，该方法会在 UI 线程中被调用，你可以根据后台线程的结果更新 UI。\n\n从类结构可以看出，你可以定义三个泛型类型参数：`X`、`Y`和`Z`。\n\
  \n*   `X`：你传递给后台线程的参数类型。你可以将类型为`X`的对象数组传递给后台任务。\n*   `Y`：你将在`onProgressUpdate`方法中使用的参数类型。当你在`doInBackground()`方法内部调用`publishProgress(Y)`时，会调用此方法。例如，你想通过进度条显示操作的进度。\n\
  *   `Z`：你在后台进程中执行操作后得到的结果参数类型。\n\n之前展示的图像下载示例源代码可以重写为：\n\n```\npublic void loadImage()\
  \ {\n new DownloadImageTask().execute(\"http://example.com/image.png\");\n}\n\n\
  private class DownloadImageTask extends AsyncTask<String, Void, Bitmap> {\n    protected\
  \ void onPreExecute(){\n    }\n\n    protected Bitmap doInBackground(String... urls)\
  \ {\n        return loadImageFromNetwork(urls[0]);\n    }\n\n    protected void\
  \ onPostExecute(Bitmap result) {\n        mImageView.setImageBitmap(result);\n \
  \   }\n}\n```\n\n为了锁定线程以避免竞态条件和死锁，你可以使用类似于 iOS 编程中的机制，即`wait()`、`notify()`和`notifyAll()`方法。以下是这些方法与你在第\
  \ 6 章中学到的`NSCondition`方法之间的相似之处：\n\n*   `wait()`：类似于`[condition lock]`，它会锁定方法或代码块。\n\
  *   `notify()` 和 `notifyAll()`：分别类似于`[condition signal]`和`[condition unlock]`，它们会解锁该方法并通知其他线程进入。`notify()`和`notifyAll()`的区别在于，前者会随机选择一个线程让其运行，而`notifyAll()`会让所有线程都运行。\n\
  \n### Windows Phone\n\n在 Windows Phone 中启动一个新线程的方式如下：\n\n```\npublic void loadImageFromNetwork()\n\
  {\n}\nThread t = new Thread (loadImageFromNetwork);\nt.Start();\n```\n\n通常情况下，你需要在\
  \ UI 线程中更新用户界面。这可以通过调用以下方法完成：\n\n```\nDispatcher.BeginInvoke(() => UpdateUI());\n\
  ```\n\n我使用了普通的 lambda 表达式。如果你不理解，就照着示例代码做，把你的方法调用放进去即可。\n\n为了避免竞态条件和死锁，你需要使用锁定机制，与\
  \ Java 中的方式相同：\n\n*   `obj.notify()` => `Monitor.Pulse(obj)`\n*   `obj.notifyAll()`\
  \ => `Monitor.PulseAll(obj)`\n*   `obj.wait()` => `Monitor.Wait(obj)`\n\n#### 异步下载\n\
  \n在 Windows Phone 中，由于 API 限制，你只能使用异步请求从互联网下载数据。你需要使用`WebClient`或`HttpWebRequest`向服务器发起请求。以下是发起新\
  \ Web 请求并接收返回数据的代码：\n\n```\nWebClient webClient = new WebClient();\nwebClient.OpenReadCompleted\
  \ += new OpenReadCompletedEventHandler(wc_OpenReadCompleted);\nwebClient.OpenReadAsync(new\
  \ Uri(arbitraryImageUriThatKeepsChanging), webClient);\n\nvoid wc_OpenReadCompleted(object\
  \ sender, OpenReadCompletedEventArgs e)\n{\n  if (e.Error == null && !e.Cancelled)\n\
  \ {\n     try\n     {\n        BitmapImage image = new BitmapImage();\n        image.SetSource(e.Result);\n\
  \        imgContent.Source = image;\n     }\n     catch (Exception ex)\n     {\n\
  \         //根据你的应用适当处理异常\n     }\n }\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式要求，处理给定的英文文本。\n\
  \n\n## 内存管理\n\nAndroid 和 Windows Phone 都有自己的垃圾回收器，因此在很多情况下，你无需过多担心内存管理。由于 Android\
  \ 和 Windows Phone 的垃圾回收总体方法相似，我将先阐述垃圾回收的通用要点，然后深入介绍 Android 的一些具体细节和案例。\n\n对于智能手机这类资源有限的环境（尤其是只有\
  \ 32MB 内存的 Android 手机），确保每次使用最少的内存是你的职责。如果你不需要在内存中缓存一张图片，就释放它。你可以通过将对象设置为 `null`\
  \ 来释放图片，垃圾回收器会完成它的工作。\n\n只有当你为整个应用程序生命周期设置了一个对象的引用，却没有在合适的时候将其设置为 `null` 时，才会发生内存泄漏。除非你的视图生命周期很长，并且在运行时包含了过多的对象，否则你无需担心。\n\
  \n我将以下面的章节详细讨论每个平台相关的特定问题。\n\n### Android\n\nAndroid 拥有 iOS 和 Windows Phone 不具备的特定平台特性：多任务处理和\
  \ `TabView`。Android 的多任务处理与 iOS 的不同。Android 应用程序可以启动服务，这些服务会在后台无限期运行，直到某些服务被销毁。\n\
  \n#### 上下文（Context）Activity 泄漏\n\n在 Android 中，你有一个在不同 Activity 之间共享的上下文（Context），这个上下文内部存储了数据和整个视图层次结构。问题在于，这个上下文会被传递给需要它的对象和方法，例如当你初始化一个文本视图时。\n\
  \n`TextView myTextView = new TextView(myContext);`\n\n所以，如果 `myTextView` 泄漏了，整个上下文\
  \ Activity 就会泄漏。现在，考虑一种情况：当手机方向改变时，你需要保持你的背景图片。当你的应用程序改变方向时，它会销毁 Activity 以及该 Activity\
  \ 内的所有数据，包括你的背景图片。因此，最佳实践是将图片保持为静态。\n\n```\nprivate static Drawable sBackground;\n\
  \n@Override\nprotected void onCreate(Bundle state) {\n  super.onCreate(state);\n\
  \n  TextView label = new TextView(myContext);\n  label.setText(\"Leaks are bad\"\
  );\n\n  if (sBackground == null) {\n    sBackground = getDrawable(R.drawable.large_bitmap);\n\
  \  }\n  label.setBackgroundDrawable(sBackground);\n\n  setContentView(label);\n\
  }\n```\n\n现在你可以看到，背景图片持有了对标签（label）的引用，而标签又持有了对上下文 `myContext` 的引用。并且因为背景图片是静态的，它永远不会被释放，所以你将会泄漏整个上下文和旧的视图层次结构。\n\
  \n#### 多任务处理中的内存\n\n在 Android 中，因为所有应用程序可以随时在后台运行，内存变得更为受限。如果你的应用程序使用了太多内存，它将迫使操作系统杀死其他应用程序以回收内存。这就是为什么良好的内存管理和使用对于你正确处理变得至关重要。\n\
  \n#### TabView\n\n在 `TabView` 方面，Android 和 iPhone 有相似之处。如果你正在使用一个 `TabView`，你在所有选项卡中的所有视图都会被加载到内存中，即使它们没有被显示出来。当视图是最消耗内存的元素时，这通常会给各种应用程序带来巨大的内存问题。在决定使用\
  \ `TabView` 之前，请三思。\n\n### Windows Phone\n\nWindows Phone 没有多任务处理功能，所以你的应用程序可以利用所有可能的内存并以高性能运行。然而，如果使用不当，某些视图层次结构问题可能会影响你的内存。\n\
  \n#### Panorama 和 Pivot\n\nWindows Phone 有两个主要的视图层次结构：`Pivot` 和 `Panorama`。你也可以使用其他方式创建具有普通视图的\
  \ Windows Phone 应用程序。尽管 UI 概念不同，但 `Pivot` 和 `Panorama` 彼此相似。`Pivot` 更多地用于具有相似视图但用途不同的应用程序，例如，不同地点的天气（伦敦、巴黎、纽约、加利福尼亚）；请参见\
  \ 图 10–6。`Panorama` 更多地用于需要显示同一事物的大图的应用程序，如 图 10–7 所示。\n\n![images](img/1006.jpg)\n\
  \n**图 10–6.** *Pivot 应用程序*\n\n![images](img/1007.jpg)\n\n**图 10–7.** *Panorama 应用程序*\n\
  \nPanorama 应用程序存在一个巨大的性能问题：即使不显示，你也需要将整个视图加载到内存中。视图越长，你需要加载的内容就越多，很快就会导致你的应用程序内存不足。这无疑是一个重要的考量因素。如果你使用全景视图，你应该只使用一个简短的视图；不要加载过多的数据或子视图。\n\
  \n## 多任务处理\n\n多任务处理对于所有智能手机平台来说总是一个问题，因为电池电量会很快耗尽。正如在第 8 章中所讨论的，iOS 的多任务处理并非真正的多任务处理。它是快速应用切换和一些有限的、受限制的后台服务的组合。\n\
  \nAndroid 通过不同的方法提供多任务处理，允许应用程序在后台有更多的时间和自由度来运行和执行计算。Windows Phone 目前还不允许你的应用程序在后台运行；你可能需要等到\
  \ Mango 版本发布才能实现。\n\n### Android\n\n在 Android 中，要创建一个后台进程，你需要使用 `Service` 类。需要澄清的是，使用\
  \ `Service` 并不意味着一个单独的线程或一个单独的进程。当你调用此服务时，它会告诉系统你的应用程序在后台有事要做。你也可以将一些其他服务暴露给其他应用程序。\n\
  \n要启动一个新的 `Service`，你需要扩展 `Service` 类并实现必要的方法。\n\n```\npublic class MyService extends\
  \ Service {\n  private static final String TAG = \"MyService\";\n\n  @Override\n\
  \    public IBinder onBind(Intent intent) {\n    return null;\n    }\n\n    @Override\n\
  \    public void onCreate() {\n      Log.d(TAG, \"onCreate\");\n    }\n\n    @Override\n\
  \    public void onDestroy() {\n      Log.d(TAG, \"onDestroy\");\n\n    }\n\n  \
  \  @Override\n    public void onStart(Intent intent, int startid) {\n      Log.d(TAG,\
  \ \"onStart\");\n    }\n  }\n\n  public void onClick(View src) {\n    switch (src.getId())\
  \ {\n      case R.id.buttonStart:\n        startService(new Intent(this, MyService.class));\n\
  \        break;\n      case R.id.buttonStop:\n        stopService(new Intent(this,\
  \ MyService.class));\n        break;\n  }\n}\n```\n\n如示例源代码所示，你需要了解四个主要方法。当通过方法\
  \ `startService(new Intent(this, MyService.class))` 启动新服务时，`onCreate()` 方法会被调用，然后会调用\
  \ `onStart()`。当通过 `stopService(new Intent(this, MyService.class))` 停止服务时，`onDestroy()`\
  \ 方法会被调用。\n\n你需要将主要逻辑代码放在 `onStart()` 方法中，并让后台进程从这里开始运行。\n\n\n\n## C/C++ 编程支持\n\n\
  你可以在 Android 应用内部编写 C/C++ 代码，但这需要你了解 JNI（Java 本地接口）以及如何与 NDK（原生开发工具包）交互。交互的方式类似于使用\
  \ Objective-C 代码与 C/C++ 代码交互。你可能需要小心内存管理问题，并且不要把事情搞得太糟。使用 Java 可以让你拥有垃圾回收机制，而使用\
  \ C/C++ 则需要你手动管理内存。\n\n然而，Windows Phone 除了 C# 之外，不支持任何其他编程语言。如果你想开发游戏，你需要使用 XNA\
  \ 与 C/C++ 结合。通过 NDK 从 Java 添加并调用 C/C++ 代码非常容易；只需编写一些包装代码即可。你需要一个包装方法来在 C 和 Java\
  \ 之间进行转换。\n\n```\n#include <jni.h>\n#include <string.h>\n#include <android/log.h>\n\
  \nvoid Java_com_packagename_classname_helloLog(JNIEnv * env, jobject this, jstring\
  \ myLog)\n{\n    jboolean isCopy;\n    const char * szLogThis = (*env)->GetStringUTFChars(env,\
  \ logThis, &isCopy);\n    (*env)->ReleaseStringUTFChars(env, logThis, szLogThis);\n\
  }\n```\n\n长函数名是有原因的：第一个词是“Java”，后面跟着包名、类名和方法名。当你需要调用这个方法时，你可以使用以下格式进行调用：\n\n`helloLog(\"\
  This will log to LogCat via the native call.\");`\n\n你需要在你的类中定义方法接口，以便 Android 能够正确地调用它。这将帮助\
  \ Android 将此接口与已编译原生代码中的实现链接起来。\n\n`private native void helloLog(String logThis);`\n\
  \n最后，你需要加载该库。事实上，一旦加载了类，就应该立即加载该库。\n\n```\nstatic {\n    System.loadLibrary(\"ndk1\"\
  );\n}\n```\n\n## 总结\n\n在本章中，你了解了三个主要平台（iOS、Android 和 Windows Phone）在性能优化方面的差异。它们之间存在许多类似的问题，因为这三个平台都受到移动设备限制的影响。\n\
  \n对于 `ListView` 以及如何正确复用视图的问题，这三个平台以类似的方式解决——通过尝试减少加载所有数据，并尽可能复用视图。\n\n这三个平台的缓存和数据存储方式不同，因为它们选择了不同的方式来实现应用程序的数据存储和文件结构。iOS\
  \ 目前拥有最强大的数据库存储形式——`CoreData`，而 Android 可以利用外部存储的优势。Windows Phone 的 SQL 数据库版本预计将在明年秋季发布，这是所有\
  \ Windows Phone 开发者所期待的。\n\n在实现相同功能（例如多任务处理）时，这些平台之间也存在巨大差异。iOS 的多任务处理更侧重于快速应用切换，Android\
  \ 通过允许进程在后台运行来实现真正的多任务处理，而 Windows Phone 在此版本中不支持任何多任务处理。\n\n**练习**\n\n**1.** 使用我提供的虚拟化数据示例代码实现\
  \ `ListView`。\n\n**2.** 创建一个至少包含 20 页的 Windows Phone 全景视图，在你的设备上运行它，看看是否有任何内存影响。对\
  \ Windows Phone 的 `Pivot` 控件执行相同操作。\n\n**3.** 实现一个 Android 后台服务，从互联网下载一张图片，然后关闭应用程序。\n\
  \n"
