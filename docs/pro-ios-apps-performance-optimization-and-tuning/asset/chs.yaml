  \ NO;\n}\n\n@end\n```\n\n从 代码清单 5–6 可以看出，`LinkedList` 对象能够按正向或反向顺序从列表中获取对象，并且能够向链表的头部或尾部添加对象。由于其他方法类似或易于自行实现，我将仅展示主要的实现方法。\n\
  \n在实现链表时，你需要考虑六个主要方法：`init`、添加对象、获取对象、`count`、移除对象以及释放整个链表。\n\n#### Init\n\n```\n\
  - (id)initWithHead:(NSObject *)value {\n   if ((self = [super init]) != nil) {\n\
  \       head = [[ListNode alloc] initWithObject:value];\n   }\n   return self; }\n\
  ```\n\n你需要先分配链表的头部；这个头部将持有下一个元素。\n\n#### 添加对象\n\n```\n- (void)addToFront:(NSObject\
  \ *)value {\n   ListNode *node = [[ListNode alloc] initWithObject:value];\n   //\
  \ 新元素成为头节点\n   node.next = head;\n   head.pre = node;\n   self.head = node;\n}\n\
  ```\n\n向链表头部添加元素既简单又快速；你只需要将 `LinkedList` 对象与新节点重新链接即可。向尾部添加类似，我将其留作你的练习。\n\n要在头部添加新节点，你需要移除所需位置周围对象的链接，并将它们与新元素重新链接，如\
  \ 图 5–16 所示。\n\n![images](img/0516.jpg)\n\n**图 5–16.** *向数组中间插入新对象*\n\n要将元素插入到列表中的当前位置，可以使用以下代码片段：\n\
  \n```\n- (void)insertObject:(NSObject *)object atIndex:(NSInteger)index {\n   ListNode\
  \ *currentNode = self.head;\n   ListNode *previousNode = nil;\n   ListNode *nextNode\
  \ = nil;\n\n   // 找到需要添加对象的两个相邻元素\n   for (int i = 1; i <= index; i++) {\n     \
  \  currentNode = currentNode.next;\n       if (i == index - 1) {\n           previousNode\
  \ = currentNode;\n       } else if (i == index) {\n           nextNode = currentNode;\n\
  \       }\n   }\n\n   // 插入你的对象\n   ListNode *newNode = [[ListNode alloc] initWithObject:object];\n\
  \   if (!previousNode) {\n       self.head = newNode;\n   } else {\n       previousNode.next\
  \ = newNode;\n       newNode.pre = previousNode;\n\n       nextNode.pre = newNode;\n\
  \       newNode.next = nextNode;\n   }\n}\n```\n\n要在链表的随机位置或中间插入对象，你需要确定节点的放置位置。因此，代码的第一部分是通过循环遍历当前链表，找到要插入对象位置的前一个节点和后一个节点。之后，将新节点与周围的节点链接起来。\n\
  \n\n\n#### 获取对象\n\n`- (NSObject *)first {`\n`   return self.head.value;`\n`}`\n\
  `- (NSObject *)currentValue {`\n`   return self.current.value;`\n`}`\n`- (NSObject\
  \ *)next {`\n`   self.current = self.current.next;`\n`   return self.current.value;`\n\
  `}`\n`- (NSObject *)previous {`\n`   self.current = self.current.pre;`\n`   return\
  \ self.current.value;`\n`}`\n`- (NSObject *)objectAtIndex:(NSInteger)index {`\n\
  `   ListNode *currentNode = self.head;`\n`   for (int i = 1; i < index; i++) {`\n\
  `       currentNode = currentNode.next;`\n`   }`\n`   return currentNode.value;`\n\
  `}`\n\n要获取链表的当前对象或下一个对象很简单，你只需使用 `current` 属性。`current`、`next` 和 `previous` 等方法主要用于迭代（遍历整个链表）。我把迭代留作练习给你完成。\n\
  \n另一种随机访问对象的方式是使用 `objectAtIndex`。它会一直循环，直到到达正确的索引位置并返回。\n\n#### 计数\n\n`- (NSUInteger)count\
  \ {`\n`   if (!self.head) {`\n`       return 0;`\n`   }`\n\n`   ListNode *currentNode\
  \ = self.head;`\n`   int i = 1;`\n`   while (currentNode.next) {`\n`       currentNode\
  \ = currentNode.next;`\n`       i++;`\n`   }`\n`   return i;`\n`}`\n\n要计算链表中的项目数量，你只需遍历整个链表直到找到一个\
  \ `nil` 对象。然后返回计数结果。\n\n#### 移除对象\n\n此操作与添加对象操作类似，因此我将其留作练习供你实践。如果遇到任何问题，可以查看我的\
  \ `LinkedList` 示例项目中的完整源代码。\n\n#### 性能分析\n\n**插入/删除：**\n*   性能取决于插入/删除的位置，以及你是否拥有想要在其之前或之后插入节点的当前节点。如果需要遍历整个链表来找到插入对象的位置，那么性能与数组相同：O(n)。然而，如果你已经拥有了当前节点，那么性能会非常快：O(1)。\n\
  \n**搜索：**\n*   搜索时，你需要遍历链表，因此性能为 O(n)。\n\n**访问：**\n*   基于索引的随机访问需要遍历链表直到找到你想要的节点，因此性能为\
  \ O(n)。\n\n**排序：**\n*   你可以像排序数组一样对`链表`进行排序。然而，对于`链表`，由于它不是内建的数据结构，你必须自己编写排序方法。你能获得的最佳性能是\
  \ O(n * log(n))。\n\n### 栈与队列\n\n栈和队列是特殊的数据结构，用于限制对这些数据结构所持有数据允许执行的操作。这些数据结构既可以通过数组实现，也可以通过链表实现，如前面各节所示。这些限制有助于你更好地管理数据，或确保数据以正确的顺序被处理。\n\
  \n#### 栈\n\n栈只允许访问一个数据项：最后一项。如果你要从栈中插入、检索或移除项，你都必须从最后一项开始操作。图 5–17 和 5–18 展示了栈的工作原理。\n\
  \n![images](img/0517.jpg)\n\n**图 5–17.** *将一个新项压入栈*\n\n![images](img/0518.jpg)\n\
  \n**图 5–18.** *将最近的一项从栈中弹出*\n\n有一个类比可以帮助你理解栈的概念：\n\n*   *洗碗*：你从上到下洗碗；你绝不会从中间随便抽出一个盘子，否则整摞盘子会倒塌。\n\
  \n将一个项放在栈顶称为*压入*操作。将其从栈顶移除称为*弹出*操作。这种机制的计算机科学术语是后进先出（LIFO），因为最后插入的项是最先被移除的。\n\n\
  我将留给你一个小练习，让你自己使用数组和链表两种方式实现一个栈。你的栈应该支持以下必要方法：\n\n*   `init` // 用于创建栈\n*   `push`\n\
  *   `pop`\n*   `peek` // 用于从栈中检索一个项，但不将其从栈中移除\n*   `isEmpty`\n*   `isFull` // 如果你的栈可以像\
  \ `NSMutableArray` 那样自动增长大小，则此方法总是返回 `false`\n\n另一个练习实践是使用栈来反转一个字符串。\n\n#### 队列\n\
  \n队列和栈类似，都限制了对数据的随机访问。然而，它的机制是第一个插入队列的是第一个离开队列的；换句话说，即先进先出（FIFO）。队列的工作方式就像一队人排队买票，如图\
  \ 5–19 所示。\n\n![images](img/0519.jpg)\n\n**图 5–19.** *访问链表中的倒数第三项*\n\n你在队列内部操作数据的方式与处理栈的方式相反。图\
  \ 5–20 和 5–21 说明了这些过程。\n\n![images](img/0520.jpg)\n\n**图 5–20.** *将最后一项插入队列*\n\n\
  ![images](img/0521.jpg)\n\n**图 5–21.** *将第一项从队列中移除*\n\n同样，我将留给你一个小练习，让你自己使用数组和链表两种方式实现一个队列。你的队列应该支持以下必要方法：\n\
  \n*   `init`\n*   `insert`\n*   `remove`\n*   `peek` // 用于从队列中检索一个项，但不将其从队列中移除\n\
  *   `isEmpty`\n*   `isFull` // 如果你的队列可以像 `NSMutableArray` 那样自动增长大小，则此方法总是返回 `false`\n\
  \n使用栈或队列可能不会比使用数组或链表带来特定的性能提升。然而，这可以为你节省大量思考如何限制数据访问的时间，或者帮助你理解有助于解决特定问题的概念。\n\n\
  ### 二叉树\n\n接下来，我将讨论二叉树。但首先，我要简单提一下排序和搜索算法的主要问题；这将帮助你理解为什么可能需要使用二叉树。\n\n## 排序算法\n\
  \n在 iPhone 开发中，你不应该自己编写排序算法。你应该理解排序算法的工作原理以及它们为什么那样工作。然而，由于框架和库的抽象和封装，大多数时候，你不需要知道\
  \ Cocoa Touch 框架使用的是哪种算法。因此，在本节中，我将只介绍一些著名的算法，以及如何将数据结构转换为已排序的数据数组。\n\n大多数时候，你需要为框架提供一种方法来确定如何比较数组中的两个对象。以下是一个利用\
  \ `NSArray` 内部排序算法的简单代码片段：\n\n`MyItem`\n`- (NSComparisonResult)compareWithItem:(MyItem\
  \ *)item {`\n`   return [self.name compare:item.name];`\n`}`\n`- (void)viewDidLoad\
  \ {`\n`   myArray = [myArray sortedArrayUsingSelector:@selector(compareWithItem:)];`\n\
  \n`}`\n\n大多数时候，你会将当前的数据结构转换为数组，对这个数组进行排序，然后使用结果。这是一种方法。另一种始终保持已排序数组的方法是使用二叉树，我将在后面的章节中讨论。\n\
  \n\n\n## 搜索\n\n我们来探讨数据结构中的搜索策略，例如 `array`（数组）、`linked list`（链表）、`set`（集合）和 `dictionary`（字典）。如前所述，`set`\
  \ 和 `dictionary` 是基于哈希表构建的，因此对这些数据结构的搜索需要拥有一个对象，其键和哈希值恰与我们正在搜索的相匹配。对这些数据结构的搜索耗时仅为\
  \ `O(1)`（这意味着速度极快）。\n\n对于 `array` 和 `linked list`，问题则更复杂。如果需要进行搜索，可以使用以下两种策略之一：\n\
  \n*   遍历整个数组或链表，直到找到所需的元素。其性能为 `O(n)`。\n*   对数组或链表进行排序，然后使用一种最优搜索策略（二分查找，稍后将讨论）。其性能为\
  \ `O(n * log(n)) + O(log n)`，即等同于 `O(n * log(n))`，因为你只关心增长最快的项。\n\n因此，正如你所见，如果你有一个始终有序的数组，找到所需元素只需\
  \ `O(log n)` 的时间。我将在“二叉树”部分展示如何创建一个始终保持有序的数据结构。\n\n### 二分查找\n\n还记得小时候玩的游戏吗？一个朋友让你猜他心中想的一个介于\
  \ 1 到 20 之间的数字。当你猜一个数字时，他会告诉你三种结果：你猜的数字比实际数字大、相等或小。\n\n最好的开始方式是什么？是从 1 开始一直猜到 20\
  \ 吗？还是应该从 5 开始，然后根据提示判断下一步方向？\n\n如果你猜 10，朋友说你的数字比实际数字小，那么你就知道实际数字在 10 到 20 之间。太棒了！你一次性把范围缩小了一半，现在只需要再猜\
  \ 10 个数字即可。再经过三四步，你就能确定这个数字。\n\n如果你从 1 到 20 依次猜测，在最坏的情况下，你需要猜 20 次。在大多数情况下，你需要猜超过\
  \ 5 次。只有 5 种情况，你可以在少于 5 次猜测时猜对。如图 5–22 所示。\n\n![images](img/0522.jpg)\n\n**图 5–22.**\
  \ *在有序数组中进行二分查找*\n\n这就是二分查找；它其实非常简单。以下是一段实现其在数组中应用的代码片段：\n\n```\n- (void)methodToCall\
  \ {\n    NSMutableArray *myArray = [NSMutableArray array];\n    for (int i = 0;\
  \ i < 20; i++) {\n        [myArray addObject:[NSNumber numberWithInt:i]];\n    }\n\
  \    // 查找数字 15。\n    NSInteger index = [self indexForNumber:[NSNumber numberWithInt:15]\
  \ inArray:myArray];\n    NSLog(@\"索引: %d\", index);\n}\n\n// 注意：此方法仅在数组已排序时有效\n\
  - (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray *)array {\n    int\
  \ firstIndex = 0;\n    int uptoIndex = [array count];\n\n    while (firstIndex <\
  \ uptoIndex) {\n        int mid = (firstIndex + uptoIndex) / 2;   // 计算中点。\n   \
  \     if ([number intValue] < [[array objectAtIndex:mid] intValue]) {\n        \
  \    uptoIndex = mid;      // 在下半部分重复搜索。\n        } else if ([number intValue] >\
  \ [[array objectAtIndex:mid] intValue]) {\n            firstIndex = mid + 1;  //\
  \ 在上半部分重复搜索。\n        } else {\n            return mid;      // 找到，返回位置\n      \
  \  }\n    }\n    return -1;     // 查找失败\n}\n```\n\n该算法的主要工作在于查看数组的中间元素。如果中间元素的值小于你要查找的数据值，算法就将数组分成两半；然后取前半部分继续处理，直到只剩下一个元素。如果中间元素的值大于你要查找的数据值，它就取后半部分。\n\
  \n**注意：** 二分查找仅适用于已排序的数组或列表。它假设右侧的数据总是大于左侧的数据，因此它可以将数据数组分成两半。\n\n### 二叉树\n\n二叉树在内部结合了另外两种结构：有序数组、链表和二分查找算法。\n\
  \n二叉树有很多用途：\n\n*   它始终以快速的方式保持有序。添加新对象的性能是 `O(log n)`。\n*   它可以始终与二分查找一起使用，无需任何额外的计算（因为它始终是有序的）。\n\
  \n如果你想要一个始终按顺序排列的数组或链表（换句话说，一个有序的数组或链表），你可能需要选择以下方法之一：\n\n*   对于已排序的数组：当你需要在数组中间插入新项时，你需要找到插入位置，然后将所有后续项向右移动。这需要花费\
  \ `O(n)` 的时间。性能问题体现在当你需要将所有项向右移动以插入（或向左移动以删除）时。\n*   对于已排序的链表：在链表内部插入或删除对象的速度非常快。然而，即使链表已排序，你仍需遍历该列表以找到插入新对象的位置。这种遍历的性能是\
  \ `O(n)`。\n*   在需要搜索或检索数据之前，先将新项添加到末尾，然后对数组或链表进行排序。排序操作需要 `O(n * log(n))` 的时间才能完成。\n\
  \n因此，二叉树是实现有序集合的最佳方式，如此你就能在 `O(log n)` 的性能内轻松找到所需项。\n\n我已经讨论了为什么应该使用二叉树，但你可能还有一些疑问。什么是树？什么是二叉树？在回答这些问题之前，我想先向你介绍*节点*和*边*的概念。\n\
  \n#### 节点和边\n\n节点用图 5–23 中的圆圈表示，而线条则代表边。节点可以用名称或数字进行标记，以使其在树中唯一。每条边由其两端的两个节点界定。\n\
  \n![images](img/0523.jpg)\n\n**图 5–23.** *顶点与边示意图*\n\n#### 树\n\n树是由一系列点（通常称为节点）以及这些点之间的连接（通常称为边）组成的集合。树有一个节点作为根节点，树内部的节点通过有向边相互连接。树内的每个节点最多只能有一个父节点，并且不允许存在环。图\
  \ 5–24 展示了一个简单的示例。\n\n![images](img/0524.jpg)\n\n**图 5–24.** *树的示例*\n\n二叉树是一种每个节点有\
  \ 0、1 或 2 个子节点的树。图 5–24 展示的也是一个二叉树。图 5–25 展示了一个非树的例子，因为它在内部形成了一个环，并且节点 5 有两个父节点：2\
  \ 和 4。\n\n![images](img/0525.jpg)\n\n**图 5–25.** *非树的示例*\n\n在二叉树中，每个节点的两个子节点分别称为左子节点和右子节点，如图\
  \ 5–26 所示。\n\n![images](img/0526.jpg)\n\n**图 5–26.** *左子节点和右子节点*\n\n二叉搜索树是一种二叉树，对于从中任意选取的三个节点，始终满足右节点大于其直接父节点，且父节点大于左节点。这就是我一直在讨论的二叉树的专业名称。为简单起见，我将用*二叉树*来指代*二叉搜索树*。图\
  \ 5–27 展示了一个示例。\n\n![images](img/0527.jpg)\n\n**图 5–27.** *二叉搜索树*\n\n\n\n### 二叉树如何工作？\n\
  \n二叉树的插入/删除和搜索机制是相似的。所有方法都需要你遍历二叉树，直到找到要插入/删除的位置或要搜索的项目。图 5–28 展示了一个将项目插入到二叉树正确位置的示例。\n\
  \n![images](img/0528.jpg)\n\n**图 5–28.** *向二叉树中插入一个项目*\n\n二叉树是基于链表的思路实现的。由于我已经讨论过如何实现链表，因此本节我将只编写二叉树的骨架和\
  \ API。代码清单 5–7 仅包含接口文件；你需要补充实现文件使其生效。\n\n**代码清单 5–7.** *二叉搜索树*\n\n```\nTreeNode.h\n\
  @interface TreeNode : NSObject {\n @private\n   NSObject *object;\n   SEL compareSelector;\n\
  \   TreeNode *leftChild;\n   TreeNode *rightChild;\n}\n\n@property (nonatomic,strong)\
  \ NSObject *object;\n@property (nonatomic, strong) TreeNode *leftChild;\n@property\
  \ (nonatomic, strong) TreeNode *rightChild;\n@property (nonatomic, weak) SEL compareSelector;\n\
  \n@end\n\nTree.h\n#import \"TreeNode.h\"\n@interface Tree : NSObject {\n @private\n\
  \   TreeNode *root;\n}\n- (id)initWithObject:(NSObject *)obj compareSelector:(SEL)selector;\n\
  - (BOOL)find:(NSObject *)obj;\n- (void)insertObject:(NSObject *)newObj;\n- (void)deleteObject:(NSObject\
  \ *)obj;\n\n@end\n```\n\n要实现这段代码，你应该将二叉树理解为一种特殊的链表：你有一个`tree`对象，它持有一个`root`对象，然后`root`对象自身持有其子节点。这与链表的工作方式相同：你有一个`LinkedList`对象，它包含头节点，而该头节点本身又包含下一个节点。\n\
  \n你应该通过实现我提供的 API 来练习二叉树的运用。你还应该复习二分查找，确保你透彻理解了这个概念，并知道如何在此场景下应用它。如果你在任何一个地方卡住了，可以查看我的示例项目`BinarySearchTree`。\n\
  \n### 图\n\n图是一种数据结构，它看起来像树，但形式更为通用。当前，随着数据挖掘和数据可视化需求的日益增长，图形可视化问题对开发者来说越来越常见。在本节中，我将展示图数据结构的基本概念，以及解决图中最重要问题之一——搜索——的两种算法。我不会深入探讨源代码，因为你可能不会大量使用这种数据结构和具体的代码。然而，你确实需要理解图的概念，因为它可以用来解决许多重要的问题。\n\
  \n一些常见和流行的术语：\n\n*   **顶点和边**：顶点的概念与树中节点的概念相同，图中的边概念与树中的边概念完全一致。你可以回顾图 5–23 查看顶点和边的图示。“顶点”这个术语主要用于图的概念，而“节点”则更常用于树的概念。\n\
  *   **路径**：路径是可以穿过一系列节点的一系列边的序列。例如，在图 5–29 中，你可以看到同一对节点有两条路径：ACD 和 ABD。\n\n    ![images](img/0529.jpg)\n\
  \n    **图 5–29.** *路径*\n\n*   **连通图**：从图中任意挑选一对顶点，它们之间都存在一条路径。例如，图 5–30 展示了一个连通图，如果你任意选择两个顶点，你都可以通过某条路径从一个到达另一个。然而，在图\
  \ 5–31 中，你无法通过任何路径从 A 到达 C，所以它不是连通图。\n\n    ![images](img/0530.jpg)\n\n    **图 5–30.**\
  \ *连通图*\n\n    ![images](img/0531.jpg)\n\n    **图 5–31.** *非连通图*\n\n*   **有向图**：如果图中的每条边都有一个方向，如图\
  \ 5–32 中所示，用从一个顶点指向另一个顶点的箭头表示，那么这个图就是有向图。如果边没有方向，你可以沿着它们双向通行。但如果边有方向，你只能沿着箭头所示的方向走。\n\
  \n    ![images](img/0532.jpg)\n\n    **图 5–32.** *有向图*\n\n*   **加权图**：如果图中的每条边都被赋予一个权重，如图\
  \ 5–33 中带有标签的边所示，该边可以表示从一个顶点到另一个顶点的任何成本或通行价值。这样的图被称为加权图。加权图可以用来表示国内城市间的航班，边显示的是飞行成本。\n\
  \n    ![images](img/0533.jpg)\n\n    **图 5–33.** *加权图*\n\n在图中进行搜索非常重要。计算机科学中的图论里有许多著名的搜索问题。想象一个简单的场景：你想从纽约旅行到加利福尼亚。你可以直接乘飞机，但可能花费很高；或者你可以乘火车途经多个城市，最终到达目的地，但总费用比直飞便宜得多。\n\
  \n这是另一个搜索问题。你想从当前所在城市出发，沿着图中的边移动，访问所有城市。常见的好处是获取每个城市的信息，并一览所有城市的面貌。有两种实现方法：深度优先搜索和广度优先搜索。\n\
  \n\n\n### 深度优先搜索\n\n如图 5-34 所示，沿着箭头方向遍历图，当到达最后一个节点时，再沿虚线箭头返回。\n\n![images](img/0534.jpg)\n\
  \n**图 5-34.** *深度优先搜索遍历顺序*\n\n这种深度优先搜索算法的一种常见实现是使用栈，并遵循以下四个步骤：\n\n1.  在图中选择一个顶点作为初始顶点，将其压入栈中；同时将其标记为已访问。你可以通过设置属性\
  \ `wasVisited` 为 `YES` 来追踪已访问的顶点，如代码清单 5-7 所示。\n2.  如果可能，从栈顶最后一个顶点出发，访问任意一个未被访问的邻接顶点，将其标记为已访问，并压入栈中。\n\
  3.  如果无法执行步骤 2，则尽可能从栈中弹出一个顶点，然后重复步骤 2。\n4.  如果无法执行步骤 1 和步骤 2，则算法结束。\n\n为了便于理解，请参考表\
  \ 5-6 查看这四个规则如何应用于图 5-34。\n\n![images](img/t0506.jpg)\n\n![images](img/t0506a.jpg)\n\
  \n代码清单 5-8 包含了代码解释。\n\n**代码清单 5-8.** *深度优先搜索*\n\n```\n@interface Vertex : NSObject\
  \ {\n @private\n   NSString *label;\n   BOOL wasVisited;\n   NSMutableSet *adjacentVertices;\n\
  }\n@property (nonatomic, copy) NSString *label;\n@property (nonatomic, weak) BOOL\
  \ wasVisited;\n@property (nonatomic, strong) NSMutableSet *adjacentVertices;\n```\n\
  \n顶点对象将包含一个 `label`（标签）、一个用于标记是否已访问的标记，以及一个存储其周围顶点列表的属性。\n\n```\n@interface Graph\
  \ : NSObject {\n @private\n   NSMutableArray *vertices;\n}\n@property (nonatomic,\
  \ strong) NSMutableArray *vertices;\n- (void)addVertex:(Vertex *)vertex;\n- (void)addEdgeForVertex:(Vertex\
  \ *)vertex1 andVertex:(Vertex *)vertex2;\n- (void)depthFirstSearch;\n@end\n```\n\
  \n图对象包含一个顶点列表。由于每个顶点都维护了一个邻接顶点列表，图本身不需要管理边。\n\n```\n- (void)depthFirstSearch {\n\
     if ([self.vertices count] == 0) {\n       NSLog(@\"There is no vertex in graph\"\
  );\n       return;\n   }\n\n   Vertex *firstVertex = [self.vertices objectAtIndex:0];\n\
     firstVertex.wasVisited = YES;\n   [self display:firstVertex];\n\n   Stack *stack\
  \ = [[Stack alloc] init];\n   [stack push:firstVertex];\n   while (![stack isEmpty])\
  \ {\n       Vertex *lastVertex = [stack peek];\n\n       BOOL isAddNewVertex = NO;\n\
  \n       for (Vertex *adjacentVertex in lastVertex.adjacentVertices) {\n           if\
  \ (!adjacentVertex.wasVisited) {\n               [stack push:adjacentVertex];\n\
                 adjacentVertex.wasVisited = YES;\n               isAddNewVertex =\
  \ YES;\n               [self display:adjacentVertex];\n\n               break;\n\
             }\n       }\n\n       if (!isAddNewVertex) {\n           [stack pop];\n\
         }\n   }\n}\n```\n\n深度优先搜索算法的主要代码在代码清单 5-8 中。首先，检查图中是否包含顶点，然后将第一个顶点压入栈中。循环代码将持续执行前面描述的规则，直到弹出最后一个顶点并检查完所有邻接节点为止。如果存在未被访问的节点，则将其压入栈中，标记该节点，并打印该节点。如果找不到任何邻接顶点，则将其从栈中弹出。\n\
  \n### 广度优先搜索\n\n如图 5-35 所示，沿着箭头方向遍历图。遍历顺序是先到达第一层，然后是第二层，最后是最后一层。这与深度优先搜索的遍历顺序不同。\n\
  \n![images](img/0535.jpg)\n\n**图 5-35.** *广度优先搜索遍历顺序*\n\n1.  这种广度优先搜索算法的一种常见实现是使用队列，并遵循以下四个步骤，具体解释见表\
  \ 5-7：\n2.  在图中选择一个顶点作为当前顶点，并将其标记为已访问。\n3.  如果可能，从当前顶点出发，访问任意一个未被访问的邻接顶点，将其标记为已访问，并插入队列中。\n\
  4.  如果无法执行步骤 2，则尽可能从队列中移除一个顶点，将其设为当前顶点，然后重复步骤 2。\n5.  如果无法执行步骤 1 和步骤 2，则算法结束。\n\n\
  ![images](img/t0507.jpg)\n\n![images](img/t0507a.jpg)\n\n至于代码实现，建议你将广度优先搜索算法作为练习自行编写。\n\
  \n## 其他算法与问题解决方法\n\n我已经介绍了最重要的数据结构及其相关算法；这些知识将显著提升你代码的运行速度。然而，作为一名 iPhone 开发者，你还需要了解一些额外的算法和问题解决方法。你可能已经知道如何用递归解决问题。第二种是用于解析\
  \ `XML` 的 `SAX`/`DOM` 解析器。在 iPhone 开发中，当你需要从网络下载和获取数据时，`XML` 会被大量使用。\n\n\n\n###\
  \ 递归\n\n递归是一种编程技术，指方法（函数）调用自身。这是编程中最有趣的技术之一。我将展示一些可以通过递归技术立即解决的问题场景。\n\n然而，递归有一个缺点：性能可能比直接使用循环慢。如果只调用几次递归而非数千次，这种性能损耗可以忽略不计。但如果反复调用方法，需要存储数据和堆栈跟踪时，会消耗更多内存。\n\
  \n递归技术可用于实现许多高性能算法，如归并排序或二分查找。为了在 Objective-C 中演示该技术，我将展示两个示例问题：阶乘计算和二分查找。然后你可以将这种二分查找版本与之前展示的循环版本进行比较。\n\
  \n什么是阶乘？`n` 的阶乘等于 `n` 乘以 `n-1` 的阶乘。换句话说，`factorial(n) = n * factorial(n-1)`。这非常适合使用递归，因为其定义本身已经暗示了递归的使用。\n\
  \n```\n- (NSInteger)factorial:(NSInteger) n {\n   if ( n <= 1 ) {\n       return\
  \ 1;\n   } else {\n       return n * [self factorial:(n - 1)];\n   }\n}\n```\n\n\
  非常简单直接，对吧？现在，我将讨论一个更难的二分查找问题。以下是使用简单循环实现二分查找的原始方法：\n\n```\n- (NSInteger)indexForNumber:(NSNumber\
  \ *)number inArray:(NSArray *)array {\n   int firstIndex = 0;\n   int uptoIndex\
  \ = [array count];\n\n   while (firstIndex < uptoIndex) {\n       int mid = (firstIndex\
  \ + uptoIndex) / 2;  // 计算中点\n       if ([number intValue] < [[array objectAtIndex:mid]\
  \ intValue]) {\n           uptoIndex = mid;     // 在下半部分继续搜索\n       } else if ([number\
  \ intValue] > [[array objectAtIndex:mid] intValue]) {\n           firstIndex = mid\
  \ + 1;  // 在上半部分继续搜索\n       } else {\n           return mid;     // 找到目标，返回位置\n\
  \       }\n   }\n   return -1;    // 未找到目标\n}\n```\n\n以下是使用递归的实现：\n\n```\n- (NSInteger)indexForNumber:(NSNumber\
  \ *)number inArray:(NSArray *)array lowerBound:(NSInteger)lowerBound upperBound:(NSInteger)upperBound\
  \ {\n   int mid = (lowerBound + upperBound) / 2;\n   if([[array objectAtIndex:mid]\
  \ intValue] == [number intValue]) {\n       return mid; // 找到目标\n   } else if (lowerBound\
  \ > upperBound) {\n       return -1;  // 无法找到目标\n   } else { // 分割范围\n       if\
  \ ([[array objectAtIndex:mid] intValue] < [number intValue]) {\n           // 目标在上半部分\n\
  \           return [self indexForNumber:number inArray:array lowerBound:(mid + 1)\
  \ upperBound:upperBound];\n       } else {\n           // 目标在下半部分\n           return\
  \ [self indexForNumber:number inArray:array lowerBound:lowerBound upperBound:(mid\
  \ - 1)];\n       }\n   }\n}\n```\n\n### 用于 XML 解析的 SAX/DOM 解析器\n\n当 iPhone 开发者需要从网络检索数据时，XML\
  \ 解析非常重要；大部分数据会以 XML 格式返回。处理 XML 时有一个重要的考量：SAX vs. DOM。我将讨论 SAX 和 DOM 的两个主要区别，以及何时应该选择其中一种方案。\n\
  \n`SAX` 是一种逐行读取文件或 XML 字符串以查找或解析所需数据的方式。使用 `SAX` 解析整个 XML 文件的速度非常快。但问题是，如果需要在 XML\
  \ 文件中查找简单的数据片段，逻辑可能会变得非常复杂。不过它消耗的内存并不多。\n\n`DOM` 与 `SAX` 相反：你将整个 XML 结构存储在内存中，这使得检索所需数据变得非常容易。然而，相比\
  \ `SAX` 方法，将数据结构存储在内存中需要更多的时间和内存。\n\n现在让我们在代码中比较这两种方法。要使用 `SAX` 方法，我选择使用 `NSXMLParser`；还需要实现两个方法，以便接收\
  \ XML 事件：开始元素事件和结束元素事件。\n\n```\n@interface XMLParser : NSObject <NSXMLParserDelegate>\
  \ {\n @private\n   NSMutableArray* strings;\n}\n\n@property (nonatomic, strong)\
  \ NSMutableArray *strings;\n- (NSString *)parseDemonstration;\n\n@end\n```\n\n```\n\
  #import \"XMLParser.h\"\n\n@implementation XMLParser\n@synthesize strings;\n\n-\
  \ (void)parser:(NSXMLParser *)parser didStartElement:(NSString *)elementName\n namespaceURI:(NSString\
  \ *)namespaceURI qualifiedName:(NSString *)qName\n   attributes:(NSDictionary *)attributeDict\
  \ {\n  // 你需要实现此方法来获取元素\n}\n\n- (void)parser:(NSXMLParser *)parser didEndElement:(NSString\
  \ *)elementName\n namespaceURI:(NSString *)namespaceURI qualifiedName:(NSString\
  \ *)qName {\n  // 你需要实现此方法来获取元素\n}\n\n- (void)parser:(NSXMLParser*)parser foundCharacters:(NSString*)string\
  \ {\n  // 你需要实现此方法来获取元素的内容\n}\n\n- (NSString *)parseDemonstration {\n   self.strings\
  \ = [[NSMutableArray alloc] init];\n   NSString *filePath = [[NSBundle mainBundle]\
  \ pathForResource:@\"books\" ofType:@\"xml\"];\n   NSString *text = [[NSString alloc]\
  \ initWithContentsOfFile:filePath encoding:NSASCIIStringEncoding error:nil];\n \
  \  NSData*       data      = [text dataUsingEncoding:NSASCIIStringEncoding];\n \
  \  NSXMLParser*  parser    = [[NSXMLParser alloc] initWithData:data];\n   parser.delegate\
  \ = self;\n   [parser parse];\n\n   NSString* result = [self.strings componentsJoinedByString:@\"\
  \"];\n\n   return result;\n}\n\n@end\n```\n\n对于 DOM 方法，你只需要知道元素名称：\n\n```\n[myXMLDoc\
  \ nodesForXPath:[NSString stringWithFormat:@\"//%@:links\", @\"myNameSpace\"]\n\
  \                              namespaceMappings:namespaceDic error:nil];\n```\n\
  \n\n\n## 本章小结\n\n本章从理论和实践两方面介绍了主要的数据结构与算法。理论方式作为讨论算法或数据结构概念时的基准，我通过它来比较不同的算法与数据结构。不过在实际应用中，别忘了借助工具获取真实的基准测试数据。\n\
