  \ **康·沃** 是一位软件工程师兼企业家，热衷于研究最新技术与产品。自 2009 年起，他便一直从事 `iOS` 平台开发工作。他乐于分享和探讨技术与商业的不同方面，致力于为消费者创造新价值。在苹果\
  \ App Store 和 Android 市场上开发并销售各类应用程序是他的主要业务。他目前是卡内基梅隆大学的硕士研究生。  \n\n## 关于技术审校  \n\
  \n![image](img/evan_coyne_maloney.jpg) **埃文·科因·马洛尼** 在继承了一台 Apple IIe 电脑之后，通过自学掌握了编程。80\
  \ 年代中期，十几岁的他发布了一款名为 FoscilDOS 的 Apple II 系列操作系统，该作品得到了《Byte》和《A+》杂志的重点报道。1994 年，埃文开始编写互联网软件，创建了\
  \ KeepTalking 聊天系统，这是首个纯基于浏览器、实现实时更新的聊天系统。1996 年，埃文为 MSNBC.com 编写了基于网页的政治竞选模拟游戏\
  \ DarkHorse。在当年的总统竞选期间，该游戏累计了数百万小时的游玩时长，甚至被多所高中和大学的政治学课程所采用。自 2001 年以来，埃文将开发工作重点放在移动内容分发与商务领域。他构思并构建了路透社屡获殊荣的\
  \ iPhone 和 iPad 应用程序 News Pro 系列的最初几个版本。埃文于 2010 年加入在线零售商 Gilt Groupe，目前担任该公司备受赞誉且排名靠前的\
  \ iOS 应用程序的首席工程师。  \n\n\n\n"
- '# 前言


  本书旨在帮助你精进 iOS 开发在特定领域——性能优化——的技能。本书面向已具备 iOS 开发基础技能，并希望为用户打造最佳应用的开发者。


  受应用程序性能之道的启发，我花费了大量时间在 Web 和智能手机等不同平台上进行实践、学习和分享性能优化相关的知识。我热衷于与他人探讨这一话题。在花时间浏览诸如
  Stack Overflow 和 Apple Developer Forum 等论坛及 iOS 社区后，我很快意识到，大多数 iOS 开发者对于如何提升应用程序性能都存在着相同的疑问。我认为，将所有这些常见问题汇编成一本结构清晰、行文流畅的书籍会很有帮助，这样人们就能轻松掌握
  iOS 性能优化问题的全貌。这促使我撰写本书，并尽力涵盖了开发者遇到的最常见的问题和错误。


  此外，我还观察并记录了 iOS、Android 和 Windows Phone 之间存在的许多相似问题，并将其收录在自己的笔记中。最后一章便是基于这些笔记撰写而成，我认为这一章对于任何想要在这三个平台工作或从一个平台转向另一个平台的开发者来说都极具价值。


  在应对性能瓶颈时，多角度审视问题，并在应用性能与解决方案的实现难度之间取得平衡，不失为良策。有些问题很微妙，除非开发者事先了解解决方案，否则很容易犯错。我希望本书能帮助你避免这些错误，将时间投入到优化应用上，从而为你的用户创造更佳的体验。


  '
- "# 第一章：iOS 性能优化简介\n\n本章将介绍本书的总体信息，包括以下内容：\n\n- 本书的最佳受众\n- 本书涵盖的主题\n- 本书的整体结构和风格\n\
  \n## 智能手机的新时代\n\n目前市场上存在着数十万的 iOS 应用和数亿的 iOS 用户，这为任何公司或开发者都提供了一个巨大的市场。这个市场已经持续增长多年，并在未来几年内将继续增长，对有趣且功能强大的应用的需求也将随之增长。如果你有一个关于新应用的好想法，你需要确保这个想法得到良好的实现；这包括创造良好的用户体验。由于智能手机环境独特的技术限制，出色的性能对应用来说至关重要。人们希望应用能对他们的操作快速响应，能够立即计算数据并将其可视化。\n\
  \n## 为什么性能至关重要\n\n性能不仅仅关乎算法、数据结构和内存。它还关乎让人们感觉应用能尽可能快地响应任何交互。因此，优化你的 iPhone 应用性能非常重要。用户必须感觉到他们正在与真正的代理交互，这些代理接收他们的指令并几乎立即执行。如果你点击一个按钮，两秒钟后你才看到效果，你会对这个性能满意吗？如果你不满意，你的用户可能会更加沮丧。\n\
  \n当然，你可以将大部分存储和处理任务转移到云端，那里有成千上万的服务器可以快速计算并返回结果。但是，仅仅将所有数据和计算都放到云端是不够的。网络数据传输是棘手的，你的用户可能仍然需要等待几秒钟才能收到数据。\n\
  \n无论你是游戏开发者还是通用应用开发者，你都可能会在提升应用性能方面遇到困难。\n\n## 谁应该阅读本书？\n\n本书主要面向已经掌握基本 iPhone 编程知识的初中级\
  \ iPhone 开发者编写。如果你热爱性能，并且希望在这个新平台上创建出响应迅速、具备市场竞争力且富有创新性的应用，那么本书适合你。即使是高级 iOS 开发者也能从本书中获益。\n\
  \n如果你想深入智能手机应用编程领域，本书将提供足够的知识，使你能够将 iOS 所学应用到 Android 和 Windows Phone 环境中。\n\n##\
  \ 我的教学风格\n\n我相信“做中学”的原则是程序员培养技能的最佳途径。本书正是基于这一理念编写的。我讨论的通用和深入实践方法，直接源于我大约两年的 iPhone\
  \ 开发经验以及多年的 Java 开发经验和培训经历。我为你提出的问题将帮助你避免或修复 iPhone 开发中的许多性能错误。这些问题是我根据经验以及对论坛和社交网络（如\
  \ Stack Overflow）上流行问题的研究而选择的。我识别了常见的陷阱，并提供了避免这些错误所需的信息。\n\n本书融合了三个要素：基本概念、故事说明和示例源代码。我不仅提供针对特定问题的临时解决方案，更希望为你提供可在日常\
  \ iPhone 编程中应用的扎实技能。我采用不同的方法来传达概念：有时一张图胜过千言万语，有些概念最好通过示例代码来解释，有些则需要那千言万语。\n\n开始学习性能的最佳方式之一是开发一个你喜爱的酷应用。这种实践经验比一些不切实际且极易遗忘的例子能教你更多。\n\
  \n你不需要了解很多关于 Cocoa Touch Framework 的知识，因为我会解释提升应用性能所需的基本语法和类。每一章都包含一个独立的主题，其中一些你可能已经熟悉。你也可以将本书作为通用参考书；当你遇到特定问题时，可以查阅并阅读相关解决方案。\n\
  \n每一章都遵循一个简单的格式：先简要概述本章内容，然后是主要章节和小节。每章末尾都有一个总结，帮助你巩固知识并提醒你重要的经验教训，随后是一些基础且实际的练习，让你可以快乐地实践所学内容。\n\
  \n## 你需要什么？\n\n作为一名 iOS 开发者，你需要一台安装了 Xcode 的 Mac OS 系统。你可以从 iOS 开发者帐户获取免费的 Xcode\
  \ 版本，或者直接从 Apple Mac AppStore 下载。你还需要一本本书以及所有示例代码，这些代码可以从 Apress 网站下载。示例项目已在 Xcode\
  \ 4.2 上、开启 ARC 的情况下进行了充分测试，因此你可以毫无顾虑地在那个环境中运行我的示例项目。\n\n你可以且应该运行每一个示例，以更深入地理解所阐述的概念。还有一些不与任何项目关联的简短代码块；你也应该运行这些代码。\n\
  \n\n\n### 如何使用本书\n\n虽然各章节之间关联性不大，但从头到尾阅读本书将确保您全面掌握 iPhone 性能、优化技巧和技术。章节之间可能存在一些依赖和引用关系。后续章节的编写基于一个前提，即您已经阅读或了解前面的某些章节。\n\
  \n我还建议您从头到尾逐章阅读。每一章开篇都会对主题进行简要的概念性介绍；随后理论与实践相结合，通过 iPhone 示例帮助您深入理解该主题。\n\n您应仔细阅读总结部分，因为它提醒您需要牢记的关键知识点。我也建议您完成所有练习，这有助于巩固您的新知识。\n\
  \n### 本书概述\n\n本书巧妙融合了基础概念与实践知识、技术和技巧，将助您在竞争激烈的 iOS 开发领域脱颖而出。全书共九章，涵盖了解决 iOS 开发中性能问题的九种不同方法。\n\
  \n- *第 2 章:* 介绍一系列工具和检测仪器，让您了解如何以及何时使用它们。许多开发者未能正确使用这些工具，仅仅是因为他们不知道这些工具的存在。\n- *第\
  \ 3 章:* 作为 iOS 开发者，您几乎在所有项目中（从简单到复杂）都会使用 `TableView` 来展示数据列表或选项。`UITableView` 架构的问题在于，一旦您开始对其进行自定义，滚动性能就会受到影响。您一定会遇到这个问题，即使是以一种微妙的方式。本章提供了一系列工具和技术来改善您的\
  \ `TableView` 滚动性能。\n- *第 4 章:* 您可能认为大多数性能问题都可以通过云计算和向系统添加更多服务器来解决。即使如此，网络数据传输始终是个问题。在未来数年里，数据传输仍将是瓶颈。您应该了解如何在\
  \ iOS 这样的受限环境中进行本地缓存和内存缓存。\n- *第 5 章:* iOS 开发环境中的数据结构与算法既与其他环境相似，又有所不同。您从框架中获得的支持级别很高，框架提供了许多基本数据结构，如数组、集合和字典。对于某些任务，您可以直接将其交由云端处理；但对于其他任务，尤其是为了生成良好的可视化效果而收集和处理数据时，您仍需依赖\
  \ iOS 环境。\n- *第 6 章:* 提升应用程序性能也意味着让应用更快地响应用户交互。这意味着不要阻塞主 UI 线程。多线程可以帮助解决这个问题——不仅是为了改善用户响应能力，也是为了提升应用程序的整体性能。多线程对任何平台来说都是一个难点，您将通过本书中的一系列插图、示例和清晰讲解来学习它。\n\
  - *第 7 章:* 随着一款使内存管理自动化的新工具的发布，开发者现在可以利用它来避免常见的内存问题，如内存泄漏和崩溃。本章重点介绍如何最佳地利用内存，以及何时将数据加载到内存中和何时从内存中卸载数据。本章还涵盖了新版\
  \ SDK 中的自动引用计数 (ARC) 机制，以确保您能理解并正确使用它。\n- *第 8 章:* 对于 iOS 4 及更高版本，所有应用程序都可以利用多任务处理来改善用户体验。事实上，它并非真正的多任务，而是一种结合了某些特殊后台处理的快速应用切换机制（应用无法在后台运行）。本章将帮助您了解\
  \ iOS 支持哪些功能，以及您可以处理和运行哪些后台任务。\n- *第 9 章:* 在许多 iPhone 应用程序中，您无需使用任何 C/C++ 代码来实现功能。然而，当您确实需要用到它时，尤其是为了集成库，您就会遇到大麻烦。您可能不需要用\
  \ C/C++ 编写整个应用程序，但您确实需要了解这些语言如何工作，以便进行必要的故障排除。\n- *第 10 章:* 至此，您应该已经全面掌握了 iPhone\
  \ 性能的各个方面。您很有可能很快会考虑将您的应用移植到 Android 和 Windows Phone 平台。因此，在最后一章中，我为您提供了关于 iOS、Android\
  \ 和 Windows Phone 之间性能问题相似性的全局视角。这将有助于您平滑地学习新平台。\n\n### 源代码\n\n您应该从 Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的页面下载示例源代码，并自行尝试运行。\n\
  \n### 联系作者\n\n如果您有任何问题，请发送电子邮件至 `vodkhang@gmail.com`，或访问我的网站 [`http://vodkhang.com`](http://vodkhang.com)。我很乐意与您探讨\
  \ iPhone 性能问题。\n\n## 第 2 章\n\n## 使用工具对应用进行基准测试：模拟器与真机测试\n\n在本章中，您将了解以下内容：\n\n- 模拟器与真机测试环境的区别。\n\
  - 内存管理如何影响应用的性能。\n- 对应用性能进行基准测试的工具和技术，包括：\n    - 用于测量内存和性能的基本工具。\n    - 用于测量内存管理不同方面（如内存泄漏和坏内存访问）的复杂工具。\n\
  \    - 用于测量计算机处理性能不同方面（如电池、文件加载和显示信息）的复杂工具。\n    - 如何将程序划分为更小的部分，以便轻松识别性能瓶颈的位置。\n\
  \n为了提升性能，您需要仔细运行基准测试，以找出问题所在。要进行有效的基准测试，您必须理解程序或代码段运行缓慢的各种原因。\n\n从最开始，您就应意识到两个基本选择：模拟器与真机环境，以及内存优化与性能优化之间的权衡取舍。\n\
  \n首先，您需要了解模拟器与设备环境之间的区别。\n\n\n\n## 模拟器与真机\n\niPhone 应用程序性能的主要问题在于它们运行在受限且处理速度较慢的环境中。iPhone\
  \ 开发环境中的模拟器运行速度比真实环境快得多；事实上，模拟器的运行速度可以等同于其所在机器的速度。\n\n因此，当程序在模拟器环境中运行飞快，但在真实环境中却慢得多时，你可能会遭遇一个大惊喜。我观察到很多人将应用程序性能缓慢归咎于手机的网络问题。在某些情况下，这确实是事实。然而，在许多情况下，应用性能的大幅下降是由于代码本身的实现问题，而非网络问题。因此，使用基础工具和标准环境对你的应用进行仔细测试和基准评测，会让你对应用的性能和用户体验更有信心。\n\
  \n为了展示模拟器与真机之间的显著差异，我在 iPhone 模拟器环境和真实 iPhone 环境中测试了一个程序。结果令人惊讶。\n\n-   在 iPhone\
  \ 模拟器中完成主要计算需要 **0.5 秒**。\n-   在 iPhone 真机上完成相同计算需要 **7 秒**。\n\n程序很简单：我用两个数组进行了一个简单测试，每个数组各有\
  \ 1000 个元素。然后，代码遍历这两个数组以查找相同的数字并打印 \"hello\"。在现实中，你可能不需要处理数组中的 1000 个元素，或者你可能不会选择遍历数组来查找相同的数字。然而，这不是重点。我选择这些操作是为了演示真实的\
  \ iPhone 环境比 iPhone 模拟器慢得多。\n\n这引出了我在本书中会多次提到的一个观点：你总是需要在模拟器和真机上都测试应用。那么，为什么不在真机上测试呢？因为模拟器有以下显著优点：\n\
  \n-   在模拟器中运行测试更快，这意味着开发者的等待时间更短。\n-   对于测试内存泄漏和内存分配问题来说，它已经足够好了。\n\n## 内存与性能\n\n\
  内存和性能是不同的。内存通常指 RAM 存储，它关乎你使用了多少存储空间以及还剩多少。性能则关乎你的应用运行某个特定功能的速度。\n\n内存对性能有显著影响。当设备拥有更多\
  \ RAM 和更多存储空间时，你可以在其中预加载和缓存更多数据。与文件存储和网络相比，RAM 是快速访问存储。通过在 RAM 上预加载和缓存更多数据，你可以在许多情况下显著加快程序速度。例如，如果你的应用是一个需要加载大量图片的游戏，更多的内存很重要，因为你可以预加载图片并在需要时显示它们。从\
  \ RAM 加载比从文件系统加载快 10 倍。\n\n然而，更好地使用内存并不总是意味着更好的性能。有些应用不需要使用太多内存；因此，你对内存的优化只能到一定程度，性能将不再提升。反之亦然：一个应用可能为了获得良好性能而耗尽所有内存，但随后应用就会耗尽内存。\n\
  \n因此，你始终应该仔细地对内存和运行时性能进行基准测试，以确保在内存储存和运行效率之间取得良好的平衡。\n\n## 工具\n\n工具主要分为以下三大类：\n\n\
  -   基础工具，不含 Xcode Instruments。\n-   内存工具，用于验证内存使用的正确性并衡量其效率。\n-   性能工具，用于测量程序各部分运行的速度并定位任何瓶颈。\n\
  \n### 基础工具\n\n在这部分，我将讨论日志记录，作为一种测量代码块之间运行时间的基础工具。\n\n#### 记录运行时间\n\n最基础的工具之一是记录代码块开始和结束之间的时间差。通常，日志记录是通过\
  \ `NSLog` 实现的。有了这个基础工具，开发者可以测量每一行代码或代码块，以了解该代码块的运行速度。\n\n##### 例如，运行这段代码\n\n```\n\
  NSDate *date1 = [NSDate date];\nfor (int i = 0; i < 1000; i++) {\n  // 在此处进行计算\n\
  }\nNSDate *date2 = [NSDate date];\nNSLog (@\"时间: %f\", [date2 timeIntervalSinceDate:date1]);\n\
  ```\n\n会返回这个结果\n\n```\n时间: 0.0123（以秒为单位）\n```\n\n优点：\n\n-   衡量性能的一种简单直接的方法。\n- \
  \  你可以测量代码行或代码块的性能。\n\n缺点：\n\n-   你无法衡量 UI 性能（即 UI 线程的渲染时间）。\n-   你可能会过度优化（花太多时间在一个非常特定的代码块上，仅仅是为了优化一点点）。\n\
  -   在模拟器中运行应用程序通常很快，在这种快速水平下，`NSLog` 无法帮助你区分运行时性能的差异。另外，虽然 `NSLog` 在设备上很慢，但它可以帮助你检测运行时性能的差异。\n\
  \n用法：\n\n-   当你需要一个无需过多规划即可立即使用的测量工具时。\n-   当你需要一个能快速返回结果的工具时。\n-   当你需要隔离一小段代码来验证某个性能假设时。\n\
  \n### 内存工具\n\n对于内存问题，你主要关心的只有一点：高内存使用率。对于遗留代码，还有一些次要问题：内存泄漏和内存垃圾。对于新项目，你应该直接使用新的自动引用计数（简称\
  \ `ARC`）支持。对于某些旧项目，你可以尝试使用 Xcode 的转换工具进行转换。\n\n然而，并非所有项目都能被转换；存在许多问题和内存管理策略阻碍你进行转换。尝试遵守新的管理策略可能会给你带来更多麻烦。因此，我主要与你讨论用于对象分配的内存工具，并简要介绍用于内存泄漏和内存垃圾的工具。\n\
  \n**注意：**  我在此介绍的所有内存工具（以及我介绍的所有 Apple 内存工具）都可以在模拟器中运行。模拟器的好处是它运行非常快，并且应用程序安装迅速。但是，小心！我强烈建议你也在真机上测试你的应用，因为模拟器和真机并非总是一致的。它们构建方式不同，架构也不同。\n\
  \n#### 内存分配\n\n内存分配有助于你了解自己使用了多少对象分配。这可能意味着你分配并保留了太多对象。这些对象尚未释放，因为它们仍在使用中。\n\n\n\
  \n#### 分配\n\n选择 `Product` > `Profile`，然后在打开的窗口中选择 `Allocations`（如图 2-1 所示）。\n\n\
  ![images](img/0201.jpg)\n\n**图 2-1.** *在 Profile 窗口中选择 Allocation*\n\n选择 `Allocations`\
  \ 工具后，系统会显示一个主 `Allocation` 面板，其中包含所有必要信息，如图 2-2 所示。\n\n`Allocations` 面板（图 2-2）会显示“已创建且仍存活”的作业，以便你可以查看哪些对象仍存在于内存中，以及哪些对象消耗了最多的内存。如果你开始收到来自\
  \ iOS 环境的许多警告，例如“收到内存警告，级别 =1”，则应使用此工具。\n\n详细信息会显示在哪个时间点，哪些代码行和哪个类负责创建和处理这些对象。有了这些信息，你可以轻松找出如何处理内存问题。这是跟踪缓存算法和方法的良好工具（详见第\
  \ 4 章）。\n\n![images](img/0202.jpg)\n\n**图 2-2.** 主分配面板\n\n图 2-3 和 2-4 向你展示了关于哪些对象在你的应用程序中存活着并消耗最多内存的更多细节。在图\
  \ 2-3 中，你会看到在你的应用程序中创建并存活的对象详细信息列表。\n\n![images](img/0203.jpg)\n\n**图 2-3.** 分配结果\n\
  \n在图 2-4 中，你可以看到是哪些方法调用来创建这些对象的。\n\n![images](img/0204.jpg)\n\n**图 2-4.** 分配详情\n\
  \n**优点：**\n\n-   精确度高，并提供有关应用程序消耗最多内存的时间和情况的许多细节。\n-   还能让你很好地概览对象在应用程序整个生命周期内的生命周期。\n\
  \n**缺点：**\n\n-   结果取决于开发者如何运行应用程序。这需要准备良好的测试套件，以覆盖尽可能多的场景。\n-   创建良好的测试用例可能需要花费时间和精力，以帮助开发者找出应用程序消耗最多内存的位置和时间。\n\
  -   你需要在真机上测试，才能收到内存警告消息。模拟器几乎永远不会给出内存警告消息。使用模拟器的问题是，你的电脑有 2-4GB 的 RAM，而你的设备可能少得多。\n\
  \n**用途：**\n\n-   如果你在测试应用程序时收到内存警告，这应该是你先用的工具之一。\n\n### 遗留代码\n\n在此版本中，将手动内存管理项目自动转换为新\
  \ ARC 项目的工具可能会失败。该工具可能会要求你修复当前代码中的许多地方，以确保项目可以转换为 ARC 项目。你的开源库可能无法转换为新的 ARC 风格，而你又不愿去改动它。因此，我认为了解一些关于手动内存管理的背景知识对你是有好处的。\n\
  \n#### 内存泄漏\n\n当你创建新的内存对象但没有正确释放它时，就会发生内存泄漏。该对象将在整个应用程序生命周期内驻留在内存中。结果是你的应用程序没有足够的内存来快速运行，更糟糕的是，iOS\
  \ 会强制关闭你的应用程序。\n\n### 静态分析器\n\n这是一个简单直接的用于测量内存泄漏的工具。如图 2-5 和 2-6 所示，该工具会指出哪一行或哪一段代码**可能**正在导致内存泄漏。\n\
  \n![images](img/0205.jpg)\n\n**图 2-5.** *选择 `Product` > `Analyze`*\n\n如图 2-5 所示，你需要选择\
  \ `Product` > `Analyze` 或按 `Command + Shift + B`。\n\n![images](img/0206.jpg)\n\n\
  **图 2-6.** *静态分析器报告了第 19 行对象分配的潜在泄漏，该对象存储在 `str` 中。*\n\n如图 2-6 所示，第 19 行的 `str`\
  \ 对象从未被释放；在这种情况下，静态分析器给出了正确的警告。\n\n**优点：**\n\n-   它能让你快速概览可能发生内存泄漏的潜在位置。\n-   处理过程非常快速：它仅需构建并查看源代码。静态分析器无需运行程序。\n\
  -   该工具对开发者无需额外操作；只需点击 `Build and Analyze`。\n\n**缺点：**\n\n-   有时它不够准确。它可能会给出错误的警告，或者没有指出存在内存泄漏的地方。\n\
  \n**用途：**\n\n-   开发者应该首先使用此工具来测量内存泄漏，因为它快速且几乎无需额外操作。\n\n##### Leaks 检测工具\n\n这是一个更好的工具，它能在运行时（应用程序运行时）测量内存泄漏。这确保了对象确实泄漏了；如果一个对象泄漏了，它将被报告给用户。你可以继续尝试应用程序的不同功能，Leaks\
  \ 检测工具会报告内存泄漏的位置。\n\n你需要查看 Leaks 水平条显示垂直柱状图的位置。柱状图的高度表示该时刻应用程序泄漏了多少内存（见图 2-7）。\n\
  \n![images](img/0207.jpg)\n\n**图 2-7.** 显示运行代码后发生了多少次泄漏\n\n然后，当你进入泄漏的详细信息时，可能会看到代码中发生的一系列泄漏。通过按负责库排序并查找你的应用名称（本例中为\
  \ `LeaksViewController`），你将看到两个泄漏的对象。快速查看可知，你在类 `RootViewController` 中泄漏了两个图片。\n\
  \n![images](img/0208.jpg)\n\n**图 2-8.** 程序内部泄漏列表\n\n如图 2-8 所示，地址旁边有一个小箭头；点击它，Leaks\
  \ 检测工具会将你引导至应用程序中导致该泄漏的正确位置（见图 2-9）。\n\n![images](img/0209.jpg)\n\n**图 2-9.** 导致泄漏的代码行\n\
  \n此时，你可以观察创建内存泄漏的代码行。通常，Leaks 检测工具会提供关于内存泄漏发生位置的确切细节，以便你轻松修复。\n\n**优点：**\n\n-  \
  \ Leaks 检测工具非常准确和详细。\n\n**缺点：**\n\n-   结果取决于开发者如何运行应用程序。这需要准备良好的测试套件，以覆盖尽可能多的场景。\n\
  -   可能会比较慢，因为开发者需要运行几次才能看到应用程序在许多不同情况下的表现。\n\n**用途：**\n\n-   此工具应在使用静态分析器之后使用。它将覆盖静态分析器遗漏的所有其他小型和特定场景。\n\
  \n我建议你先运行静态分析器。如果你仍然对内存使用有所顾虑，或者收到了来自 iOS 运行时环境的内存警告，则应使用 Leaks 检测工具。\n\n#### 内存垃圾\n\
  \n乍一看，内存垃圾似乎与性能无关。然而，应用程序崩溃比性能缓慢更糟糕，因为它会彻底中止性能，并毁掉你想要创造的用户体验。因此，你应该知道如何充分利用内存。\n\
  \n\n#### 僵尸对象\n\n你选择 `产品` → `分析` → `分配`。\n\n系统将显示一个正在运行的检测工具。问题是该工具此时并未测量任何内容，也无法帮助你解决僵尸对象问题，因此你需要先停止它。然后，你需要配置\
  \ `分配` 工具以处理僵尸对象。换句话说，当崩溃发生时，检测工具会报告崩溃发生的位置。\n\n![images](img/0210.jpg)\n\n**图 2–10.**\
  \ 分配检测工具的界面\n\n目前，你无需关心图 2–10 下半部分的数据，只需要了解如何配置分配检测工具来检查僵尸对象崩溃。图 2–11 将告诉你操作方法。\n\
  \n![images](img/0211.jpg)\n\n**图 2–11.** 分配检测工具的主要配置\n\n配置完成后，你需要再次运行记录操作；这将启动 iPhone\
  \ 模拟器或真机设备。\n\n接着，你持续运行并尝试应用的不同功能，直到它崩溃。此时，分配检测工具会显示类似于图 2–10 中的信息。\n\n![images](img/0212.jpg)\n\
  \n**图 2–12.** 僵尸对象崩溃信息\n\n如果点击箭头查看详情，下半部分会列出针对特定对象的内存操作列表，例如 `malloc`、`autorelease`、`retain`、`release`（如图\
  \ 2–13 所示）。你的示例项目名为 `ZombieDebug`，因此只需查看第二、第三和第四行。\n\n![images](img/0213.jpg)\n\n\
  **图 2–13.** 内存操作列表，例如 `malloc`、`autorelease`、`retain` 和 `release`\n\n图 2–14 显示了与图\
  \ 2–13 中选定语句对应的代码块。\n\n![images](img/0214.jpg)\n\n**图 2–14.** 与检测工具中 `malloc`/`autorelease`/`retain`/`release`\
  \ 语句对应的代码块。\n\n**优点：**\n\n- 提供内存崩溃发生的精确细节。\n- 可在模拟器上进行测试。\n\n**缺点：**\n\n- 结果取决于应用的运行方式。错误访问有时仅在特定条件下发生。\n\
  \n**用法：**\n\n- 仅当收到 `EXEC_BAD_ACCESS` 错误时使用此工具。\n\n### 性能工具\n\n内存并非性能问题的唯一根源。还有其他提升应用性能的技术：更高效地处理文件系统与网络的数据读写、改善用户界面响应速度以及利用多线程。要衡量应用的性能优劣，可以测量\
  \ CPU 使用率、时间占用以及电池能耗。此外，这些指标相互关联，我将解释它们之间的关系。\n\nCPU 问题与最坏情况下 CPU 同时需要处理的任务量有关。最坏情况是\
  \ CPU 任务过多或持续运行。通常，当没有任务时，CPU 不应运行，它可能仅以事件驱动的方式在用户与应用交互时运行。然而，当大量任务同时涌入，例如处理用户输入、读取文件和网络操作时，CPU\
  \ 不应有空闲时间。如果任务繁重但 CPU 有空闲时间，则意味着 CPU 利用率不高。在面临密集处理时，为充分利用 CPU，你可能需要使用多线程，我将重点介绍一些跟踪线程使用情况的工具。\n\
  \n文件 I/O 和网络访问是耗时任务，因为你需要将文件读取到内存中。因此，为了良好的性能平衡，你需要始终制定良好的文件与网络访问策略。如果频繁或过晚读取文件与网络，用户将长时间等待数据加载。但如果过早读取并存储过多数据到内存，又会很快耗尽内存或导致其他任务内存不足。因此，衡量文件与网络活动对开发者而言是一项重要任务。\n\
  \n应用实际运行得好与用户感知到的性能之间存在巨大差异。应用可能内存使用完美、数据处理算法极快，但用户仍觉得应用运行迟缓或对交互无响应。原因在于 UI 线程过于繁忙，无法处理或接收用户交互。你可以测量不同情况下\
  \ UI 线程的工作状态。\n\niOS 有一个独特之处。通常，智能手机系统依赖电池供电。能源对这类系统至关重要，因为用户无法整天为其充电。此外，系统空间有限，无法像笔记本电脑那样配备大容量电池。台式机和服务器则完全不同，因为它们始终连接电源，提供无限电力，因此开发者无需过多关注能耗。笔记本电脑比移动设备更稳定，电池续航也更久。因此，你需要仔细测量应用的能耗情况。\n\
  \n#### 检测工具应用\n\n你可以选择 `运行` → `分析`，或按下 `Command + Space` 并输入 `Instrument` 来打开检测工具应用。macOS\
  \ 将显示图 2–15 所示的选项。\n\n![images](img/0215.jpg)\n\n**图 2–15.** 检测工具面板\n\n检测工具主要分为两类：用于\
  \ iOS 模拟器的工具和用于 iOS 真机的工具。部分工具可在两种环境下运行，但需注意结果有时可能不同。如前所述，iOS 模拟器与 iOS 真机存在显著差异。\n\
  \n#### CPU 测量\n\nCPU 测量工具是最重要的检测工具之一。CPU 测量工具会显示应用执行时不同 CPU 活动的运行情况。它们能展示应用内特定任务的\
  \ CPU 活动强度与持续时间。\n\n\n\n#### CPU 采样器\n\n该工具会按固定时间间隔对目标应用进行采样；默认间隔为 10 毫秒，但你可以将其更改为其他值。每次\
  \ CPU 采样时，该工具还会记录一个堆栈跟踪。样本和堆栈跟踪通常足以让你识别出应用中需要修复的瓶颈。\n\n![images](img/0216.jpg)\n\
  \n**图 2–16.** CPU 采样器主面板\n\n如图 2–16 所示，CPU 采样器为你提供关于**系统负载**和**用户负载**的数据。系统负载是由文件、网络和逻辑处理等系统操作引起的加载时间，而用户负载则与\
  \ UI 以及用户与应用之间的交互有关。\n\n图 2–16 显示，系统负载和用户负载的常规使用情况随时间推移保持稳定，但在某些时间点会略有上升，并在采样时间结束时显著增加。不过，这些信息通常不足以找出问题所在。因此，你需要进一步查看主区域。\n\
  \n在继续之前，你应该配置采样器，通过勾选名为“隐藏系统库”的复选框，使其仅显示与你的代码直接相关的区域，如图 2–17 所示。\n\n![images](img/0217.jpg)\n\
  \n**图 2–17.** CPU 采样器主面板\n\n然后，在主列表结果中，你将看到类似图 2–18 的内容——一个被调用的主要函数列表、它们在采样时间内被调用的次数，以及与总进程相比调用次数的百分比。\n\
  \n![images](img/0218.jpg)\n\n**图 2–18.** 每个函数调用的运行次数和百分比\n\n你也可以将运行次数切换为运行时间，以显示每个函数完成执行所需的时间，如图\
  \ 2–19 所示。\n\n![images](img/0219.jpg)\n\n**图 2–19.** 每个函数调用的运行时间和百分比\n\n实际上，你可以通过展开左侧的小箭头，查看每个函数调用在其自身堆栈跟踪中的更多详细信息，如图\
  \ 2–20 所示。\n\n![images](img/0220.jpg)\n\n**图 2–20.** 堆栈跟踪中函数的详细运行时间\n\n**优点：**\n\
  \n-   该工具精确且能提供详细信息，让你了解应用在哪个时间点、哪种情况下消耗了最多的处理时间。\n\n**缺点：**\n\n-   结果取决于开发者如何运行应用。这可能取决于优先级以及哪个函数被首先调用。\n\
  -   创建覆盖所有函数的良好测试用例可能需要花费时间和精力。\n-   如果你希望在 iOS 运行时环境中查看每个函数的精确运行时间，则需要在真实设备上进行测试。\n\
  \n**用途：**\n\n-   当开发者已经知晓哪个区域可能存在瓶颈，并希望进行测试以验证或了解有关瓶颈的更多细节，或者确定导致瓶颈的具体函数或一组函数时使用。\n\
  \n#### 活动监视器\n\n该工具用于显示在 iOS 设备上运行时的 CPU 时间、物理内存、虚拟内存和线程数。当应用在操作系统上运行时，它能提供整个应用的良好概览。因此，你可以了解应用何时需要最多的\
  \ CPU 时间、实际内存和虚拟内存（见图 2–21）。这些数字应与其它后台运行的应用以及 iOS 的通用规范进行比较。最新的 iPhone 4 仅有 500\
  \ MB 的 RAM，因此你不能超过该数值。最好将此测试与 CPU 采样器和分配工具结合使用，以获得应用性能的完整图景。\n\n![images](img/0221.jpg)\n\
  \n**图 2–21.** 堆栈跟踪中函数的详细运行时间\n\n**优点：**\n\n-   提供应用运行时性能的总体视图，包括将你的应用与其它应用以及标准 iOS\
  \ 环境进行比较。\n\n**缺点：**\n\n-   缺乏关于应用内部每个函数如何运行的详细信息。\n-   开发者无法确定瓶颈所在，但可以在操作应用时进行猜测，观察内存或\
  \ `%CPU` 是否上升。\n\n**用途：**\n\n-   该工具应与 CPU 采样器或分配工具等其他详细工具结合使用。\n\n#### 时间测量\n\n\
  现在让我们讨论另一个关于性能的重要主题：时间。通常，当用户抱怨你的应用时，他们只会告诉你应用在某个地方运行缓慢。因此，你需要测量应用执行特定任务所需的时间。\n\
  \n##### 时间分析器\n\n与 CPU 采样器的运行方式类似，时间分析器提供应用在时间方面如何运行的总体概览，特别是应用运行的最长持续时间以及应用内部哪些函数花费了最多的运行时间（见图\
  \ 2–22）。时间分析器和 CPU 采样器之间的唯一区别在于，前者关注的是函数运行所花费的时间，而非运行函数所消耗的 CPU 使用率。\n\n![images](img/0222.jpg)\n\
  \n**图 2–22.** 时间分析器界面\n\n![images](img/0223.jpg)\n\n**图 2–23.** 每个函数的运行时间\n\n如图\
  \ 2–23 所示，时间分析器看起来与 CPU 采样器相似，显示每个函数，并且你实际上可以进入每个函数，检查该函数在堆栈跟踪中的运行时间。\n\n**优点：**\n\
  \n-   时间分析器提供准确且详细的信息，告诉你每个任务执行所需的时间。\n\n**缺点：**\n\n-   结果取决于开发者如何运行应用。这可能取决于优先级以及哪个函数被首先调用。\n\
  -   创建覆盖所有函数的良好测试用例可能需要花费时间和精力。\n-   如果你希望在 iOS 运行时环境中查看每个函数的精确运行时间，则需要在真实设备上进行测试。\n\
  \n**用途：**\n\n-   当开发者已经知晓哪个区域存在瓶颈，并希望进行测试以验证或了解有关瓶颈的更多细节，或者确定导致瓶颈的具体函数或一组函数时使用。\n\
  \n### 用户界面响应时间测量\n\n想象一下，你的应用以完美的效率运行，但用户仍然认为它运行缓慢，或者它对用户的交互无响应，甚至更糟的是，它没有在正确的时间更新\
  \ UI。根据 CPU 采样器或时间分析器的结果，你的函数运行完美。然而，当你运行应用时，它仍然对你的事件响应不佳。如果是这种情况，极有可能是 UI 线程没有很好地渲染你的\
  \ UI。因此，你可能需要使用另一个与 UI 相关的工具来检查 UI 中的渲染时间是否可以接受。Core Animation 和 OpenGL ES Driver\
  \ 工具是 iPhone 上用于测量和测试应用的两个好工具。\n\n\n\n#### 核心动画\n\n`Core Animation`主要用于衡量 UI 线程每秒能向用户渲染（即绘制）多少帧画面。UI\
  \ 线程也是负责处理用户交互的主线程。\n\n![images](img/0224.jpg)\n\n**图 2–24.** `Core Animation` 结果中的三个主要面板\n\
  \n如图 2–24 所示，有三个主要面板需要您关注，以了解 UI 渲染性能。第一个是第一个水平单元格中的图表。该图表显示了每秒帧数的变化。右侧最大的数字显示当前的每秒帧数；这个绝对值应尽可能高，最高值为每秒\
  \ 60 帧（60 FPS）。\n\n第二个图表是特定时间内的每秒帧数采样器；10 秒是 `Core Animation` 的默认值。\n\n![images](img/0225.jpg)\n\
  \n**图 2–25.** 每秒帧数列表\n\n图 2–25 实际上提供了过去 10 次运行时间内的每秒帧数列表。通常，如果在测试过程中您仍与应用交互并期望其流畅运行，则该数字应在\
  \ 55-60 之间。如果数字较小，则可能意味着两种情况之一：要么您的 UI 线程没有内容需要绘制，要么它无法获得 CPU 时间来绘制。如果是后一种情况，则存在严重的性能问题，导致\
  \ UI 线程过于繁忙而无法绘制任何内容。\n\n![images](img/0226.jpg)\n\n**图 2–26.** 配置 `Core Animation`\
  \ 的选项列表\n\n图 2–26 中的选项列表将在您运行工具时提供更多信息。\n\n*   `Color Blended Layers` 为不透明视图添加绿色层，为不透明视图添加红色层。这对于您将在第\
  \ 3 章中看到的滚动性能非常重要。使所有视图不透明将加快渲染性能，因为 GPU 无需在同一位置进行两次绘制。颜色将如图 2–27 所示显示。\n\n![images](img/0227.jpg)\n\
  \n**图 2–27.** 带有颜色混合层的 `Core Animation` 工具\n\n优点：\n\n*   `CoreAnimation` 提供了关于 UI\
  \ 线程渲染/绘制应用 UI 过程及速度的总体概览。\n*   您可以通过在 `Core Animation Instrument` 内部配置选项来获取更多细节。\n\
  \n缺点：\n\n*   您绝对需要在真机上运行此工具。\n*   它不提供与特定代码相关问题的详细信息。\n\n用途：\n\n*   当应用程序运行缓慢时，开发者应始终检查\
  \ UI 渲染，因为问题可能存在于渲染代码中，而非逻辑处理代码。\n\n#### OpenGL ES 驱动\n\n`OpenGL ES Driver Instrument`\
  \ 提供的信息与 `Core Animation` 工具几乎相同，因此此处不再重复举例。然而，`OpenGL` 和 `Core Animation` 之间有一个显著区别。`Core\
  \ Animation` 是比 `OpenGL` 更高层次的框架，因此 `Core Animation` 实际上使用了 `OpenGL`。但是，如果您的代码没有直接使用任何\
  \ `OpenGL` 代码，则无需使用 `OpenGL ES Driver Instrument`。它仅对使用 `OpenGL` 框架的应用或游戏有效。\n\n\
  优点：\n\n*   与 `Core Animation` 相同。\n\n缺点：\n\n*   与 `Core Animation` 相同。\n\n用途：\n\n\
  *   适用于使用 `OpenGL` 代码的应用程序。\n\n### 文件和网络访问测量\n\n就性能而言，所有开发者都需要记住一个重要的关键问题，那就是文件和网络\
  \ I/O。这个过程很慢，因为在 I/O 中，您需要处理或等待比处理器指令慢得多的事件。因此，除非高效执行，否则您的应用可能会浪费大量时间。您将在第 4 章中了解更多关于文件和网络缓存的知识，以便在执行文件和网络\
  \ I/O 处理时节省时间。要衡量文件和网络 I/O 的性能，您有两个主要工具：`System Usage` 和 `File Activity`。\n\n####\
  \ 系统使用情况\n\n![images](img/0228.jpg)\n\n**图 2–28.** 系统 I/O 性能\n\n`System Usage` 用于测试\
  \ iOS 运行时环境中的文件和网络 I/O。如图 2–28 所示，某些时刻 I/O 活动会急剧增加。如果此文件处理耗时较长，要求用户等待其完成，这可能会成为性能的潜在问题。\n\
  \n![images](img/0229.jpg)\n\n**图 2–29.** 系统活动的详细列表\n\n图 2–29 显示了文件和网络 I/O 处理的详细列表。如果仔细观察列表，您会发现文件\
  \ `TableCellViewController.nib` 不断从文件系统加载。这可能是一个潜在问题。因此，一个小的优化措施是缓存该文件或将对象保存在内存中，这样就不需要多次加载。\n\
  \n从 `System Activity` 和 `Object Allocations` 收集的信息应结合起来，以确保在性能和内存之间取得良好平衡。当内存非常有限时，您不能简单地缓存所需的任何文件。\n\
  \n优点：\n\n*   提供关于加载了哪个文件、文件大小以及文件加载频率的详细信息。\n\n缺点：\n\n*   需要在真机上运行测试。\n\n用途：\n\n\
  *   它帮助开发者就缓存文件或减少文件加载（直到需要时才加载）做出正确决策。它还有助于决定是否提前加载文件，以确保当应用需要该文件时，它已经在内存中，这将显著减少用户的等待时间。\n\
  \n#### 文件活动\n\n`File Activity Instrument` 的工作原理类似于 `System Usage Instrument`，但它提供了更多关于文件以及库读取的详细信息。如图\
  \ 2–30 所示，该工具提供了关于文件活动、读取/写入、文件属性和目录 I/O 的非常详细的信息。\n\n![images](img/0230.jpg)\n\n\
  **图 2–30.** `File Activity` 工具的主列表\n\n您通常会比关注其他部分更关注文件活动和读取/写入，因为这些属性与我们正在讨论的性能问题相关。\n\
  \n![images](img/0231.jpg)\n\n**图 2–31.** 文件活动的详细列表\n\n从图 2–31 中，您可以看到 `File Activity`\
  \ 提供了有关 `AddressBook` 读取的信息。这是 `System Usage Instrument` 未提供的信息。\n\n优点：\n\n*   提供关于加载了哪个文件、文件大小以及文件加载频率的详细信息。\n\
  *   包含更多关于目录、文件属性以及执行了多少次读取和写入的信息。\n\n缺点：\n\n*   模拟器上的数据可能不准确。\n\n用途：\n\n*   该工具应与\
  \ `System Usage` 结合使用。\n\n\n\n### 测量线程性能\n\niPhone 中的线程测量功能对于测量性能的实际帮助并不大。然而，它能提供关于应用中每个线程状态的极佳信息。例如，它可以告诉你某些线程是否阻塞时间过长，或者是否已经创建了过多的线程（参见图\
  \ 2-32）。线程阻塞是代码存在问题的显著迹象。通常，当你希望利用操作系统的能力时，会创建许多线程来并行处理任务。这时问题就会出现，你需要使用 `Threads`\
  \ 工具来测量线程。\n\n![images](img/0232.jpg)\n\n**图 2-32.** 应用运行时的线程列表及其状态\n\n优点：\n\n-\
  \   它为你提供了关于线程及其状态的概览。\n-   你可以在模拟器上运行此工具。尽管 iOS 与模拟器架构存在差异，但许多问题在两种架构上仍会以相似方式发生。\n\
  \n缺点：\n\n-   它没有提供每个线程的太多细节。\n\n用途：\n\n-   它有助于你发现任何线程问题，尤其是在你通过应用多线程技术进行大量优化以提升性能时。\n\
  \n### 电池功耗测量\n\n在 iOS 设备的性能测量中，最后一项至关重要的指标是电池。电池是移动设备中的一个大问题，因为你不能在与朋友外出时一直为它充电。这个问题在移动设备上比在笔记本电脑上更为突出。拥有移动设备的用户总是希望设备具有高度的移动性和敏捷性。\n\
  \n![images](img/0233.jpg)\n\n**图 2–33.** iOS 设备中关于电池的主要关注点列表\n\n在这个 `Energy` 工具有一些重要的测量项。它包括能耗、CPU\
  \ 活动、显示亮度、睡眠/唤醒、蓝牙、Wi-Fi 和 GPS。这些都是耗能的任务。图 2-33 并未清晰显示每个测量项内部的变化。然而，如果你长时间持续测试设备，你将看到这些项目内部的变化；例如，Wi-Fi\
  \ 会消耗一些内存，而 GPS 可能是最耗能的任务。\n\n![images](img/0234.jpg)\n\n**图 2–34.** 消耗最多电池电量的 CPU\
  \ 活动\n\n图 2-34 显示了最耗电的功能——前台应用活动、音频处理和图形处理。基于这些信息，你可以判定你的应用消耗了多少电量。\n\n![images](img/0235.jpg)\n\
  \n**图 2–35.** 亮度测量\n\n图 2-35 展示了能耗的另一个重要方面：设备的亮度级别。\n\n优点：\n\n-   它为你提供了所有耗能任务的总体视图。\n\
  \n缺点：\n\n-   你需要在设备上运行测试一段时间以收集信息。\n\n用途：\n\n-   如果应用程序严重依赖 Wi-Fi、蓝牙、GPS、图形和音频，你应该关注能量测量，以确保应用不会消耗过多电量。\n\
  \n### 工具组合\n\n到目前为止，你已经了解了各个工具的工作原理以及它们如何为你的性能基准测试过程做出贡献。但你可能会想，如何将它们全部一起测量，或者组合使用它们来进行测量。这将为你节省大量时间。因此，我将展示如何在\
  \ `Instruments` 中实现这一点。\n\n如图 2-36 所示，你首先需要打开 `Instruments` 应用程序并选择 `Blank` 模板。\n\
  \n![images](img/0236.jpg)\n\n**图 2–36.** 选择空白模板\n\n你会看到这里除了一个小方框提示你打开库列表之外，什么也没有。当你点击那个小箭头时，右侧会显示所有可用工具的列表，帮助你向模板中添加必要的测试工具（参见图\
  \ 2-37）。\n\n![images](img/0237.jpg)\n\n**图 2–37.** *可用工具列表*\n\n将所有必要的工具拖入模板后，你可以像之前使用任何工具一样开始正常测试它们。\n\
  \n![images](img/0238.jpg)\n\n**图 2–38.** 所有工具的结果\n\n如图 2-38 所示，你现在可以同时查看结果的列表。凭借这一优势，你可以知道性能提升（通过\
  \ `CPU Sampler` 或 `Time Profiler` 测量）是否也意味着内存使用量的增加（通过 `Object Allocations` 测量）。让它们保持平衡状态，以确保你的应用程序完美运行。\n\
  \n优点：\n\n-   你可以同时观察所有工具的结果。\n\n缺点：\n\n-   如果添加了太多工具，这种方法会导致应用程序运行非常缓慢。如果您用十个工具进行测试，应用程序将会运行得极其糟糕。因此，请谨慎控制添加的工具数量。\n\
  \n用途：\n\n-   它帮助你获得一个总体概览。在你识别出所有性能瓶颈并修复它们之后，同时使用多个工具进行测试是很好的做法。\n\n### 所有工具汇总\n\
  \n表 2-1 总结了所有工具。\n\n![images](img/t0201.jpg)\n\n![images](img/t0201a.jpg)\n\n##\
  \ 本章小结\n\n本章带你了解了可能的工具列表，并提供了每个工具的详细信息以及优缺点的总结。\n\n这些工具被分为三大类，每个大类下又包含子类别：基础工具、内存工具和性能工具。\n\
  \n内存和性能密切相关；你必须仔细测量每一个，以确定你的问题属于内存问题还是性能问题。\n\n在性能问题中，我将工具细分为 CPU、文件处理、用户界面渲染、线程和能耗等子类别。每个因素都可能影响应用程序的其他属性；换句话说，一个区域的瓶颈可能掩盖了另一个区域的瓶颈。因此，你需要仔细测量每个方面以确保你修复了正确的问题。例如，如果问题出在\
  \ iPhone 的缓慢渲染过程上，那么你在 CPU、逻辑和数据处理方面能做的不多。在这种情况下，你需要直接深入显示代码，并可能从使用 `Interface Builder`\
  \ 切换到自定义代码来绘制 UI。\n\n**练习**\n\n1.  运用本章讨论的内存工具测试你现有应用程序的内存使用情况，并找出可以改进的地方。\n2. \
  \ 在你的 iPod/iPhone/iPad 上选择一个游戏，并使用合适的工具测试其消耗的电量、蓝牙、Wi-Fi 或 3G 网络情况。\n3.  选择一个包含复杂\
  \ `UITableView` 的应用，并使用合适的工具测试该 `UITableView` 的滚动性能。\n\n## 第 3 章\n\n\n\n"
- "# 提升并优化 UITableView 性能\n\n在本章中，你将进行以下操作：\n\n- 在实际示例中使用你在第 2 章中看到的基准测试工具。\n- 通过滚动性能优化的示例，逐步实践。\n\
  - 使用多种技术优化 `UITableView` 性能。\n    - 优化 `UITableView` 中简单基础单元格的基本技巧。\n    - 使用代码实际绘制单元格内部视图的高阶技巧。\n\
  \    - 针对需要动画效果的单元格（如编辑、重排）的基础优化技巧。\n    - 开发者需要了解的其他基本技巧。\n\niPhone 应用通常以列表形式展示数据。Apple\
  \ 为基础开发者提供了出色的工具：`UITableView` 和 `UITableViewCell`。如果开发者只想使用基本功能来显示左侧的小图片和中间的文本，那么默认的\
  \ Apple 控件应该能很好地工作。然而，当你需要对列表顺序进行大量自定义，比如在不同的位置放置两到三张图片和文本时，你就会遇到问题。迟早，你会遇到 `UITableView`\
  \ 滚动卡顿的性能问题，尤其是在 iPhone 3G 这样的旧设备上。\n\n## 示例简介\n\n在本练习中，我将根据两个主要因素来衡量性能：`tableView`\
  \ 出列、创建新单元格或将其返回给操作系统（OS）的速度；以及操作系统渲染你的单元格并在屏幕上显示的速度。前者可以通过 `NSLog` 轻松测量；后者则更为复杂，只能通过\
  \ `CoreAnimation` 来测量。\n\n为了演示，我将带你了解两个不同的示例。一个只包含头像和文本块；另一个则包含复杂的视图，其中有许多子视图。通过这两个示例，你将看到多种优化\
  \ `UITableView` 滚动性能的不同方法。\n\n在本章结尾，我还会列出一些我没来得及在本章详细讨论的其他要点。这些并非常见错误，但如果开发者不小心犯了其中之一，那么他可能需要花上一整天的时间进行基准测试和调试才能找出问题。我希望确保你拥有足够的技能和知识，能够应对任何情况。\n\
  \n有时，优化非常简单，只需要在代码中进行一些零星的改动。然而，在其他情况下，比如第二个示例，优化可能需要重写整个代码库，以适应更优、更高效的模型。我希望在讲解完示例后，你能对程序结构有清晰的认识，从而从一开始就做出正确的决策，避免后续重写整个代码库。\n\
  \n## 回顾 Instrument 工具\n\n在本章中，你将使用 `CoreAnimation` 工具对 iPhone OS 的渲染性能进行基准测试。这将帮助你判断问题是出在计算过程还是显示过程。第\
  \ 2 章已经介绍过这个工具，因此本章仅做简要回顾。\n\n图 3-1 展示了 `CoreAnimation` 工具的主视图，其中包含运行该工具时需要关注的三个部分。图\
  \ 3-2 则展示了性能读数。\n\n![images](img/0301.jpg)\n\n**图 3-1.** *CoreAnimation 工具的主要部分*\n\
  \n![images](img/0302.jpg)\n\n**图 3-2.** *最近的显示性能*\n\n## 第一个示例\n\n第一个示例将向你展示优化 `UITableView`\
  \ 滚动性能的逐步过程。初始版本的源代码包含了许多我从不同开发者那里收集到的性能错误。在这个过程中，你会看到每实现一个优化步骤，性能都会随之提升。\n\n###\
  \ 第一个示例简介\n\n如图 3-3 所示，你面临的是一个通用且实际的问题：你需要开发一个 `UITableView`，其中每个单元格包含一张图片和一个文本块。我将带你了解这个示例的源代码。让我们看看像\
  \ Facebook 这样的通用应用；应用需要一张头像图片和一张用户分享链接内容的图片。此外，应用还可能包含其他小图片来表示单元格中的图标。对于这第一次基准测试，请参考名为\
  \ `SlowPerformanceTableView` 的项目。\n\n![images](img/0303.jpg)\n\n**图 3-3.** *第一个示例的应用程序*\n\
  \n### 标准基准测试\n\n在开始任何项目之前，你必须明确最终目标；在这个案例中，目标是你希望达到什么样的性能，从而在用户滚动和使用应用时提供良好的体验。因此，通过运行一个标准的、未定制的\
  \ `UITableViewCell`（需要简单的图片加载并复用图片），表 3-1 显示了来自我日志的运行时间。\n\n![images](img/t0301.jpg)\n\
  \n`CoreAnimation` 测得的 `每秒帧数 (fps)` 最佳性能为 `60 fps`（数值越高，性能越好）。对于标准的 `UITableViewCell`，通常速度在\
  \ `55-60 fps` 左右；这应该是你的目标之一。另一个目标是确保准备时间足够短。当总时间减少时，单元格的准备时间也会相应减少。不过，减少单元格准备时间相对更容易，因此在这个示例中，我将首先专注于减少它。\n\
  \n### 初始基准测试\n\n对于第一个示例，我运行了一次初始基准测试，并得到了六个单元格滚动的随机结果。表 3-2 显示了使用 `NSLog` 和 `CoreAnimation`\
  \ 等工具进行性能基准测试的结果。\n\n![images](img/t0302.jpg)\n\n因此，从结果可以看出，通常需要 10 毫秒来返回一个单元格进行绘制。由于这个巨大的延迟，整体测量值（fps）也显著下降。因此，我的首要目标是减少单元格准备时间的过程。\n\
  \n源代码中有一条关于 `[UIImage imageNamed:name]` 和 `[[UIImage alloc] initWithContentsOfFile:name]`\
  \ 区别的注释。稍后我将解释这个区别，以及为什么你会使用 `imageNamed` 而不是 `initWithContentsOfFile`。\n\n### 复用\
  \ `UITableViewCell`\n\n优化 `UITableView` 通常很简单；你需要做的就是仔细检查你是否以正确的方式复用了 `UITableViewCell`。在\
  \ iOS 中创建 `UITableViewCell` 是一个 CPU 密集型的过程。因此，如果每次用户上下滚动到新单元格时，CPU 都需要创建一个新的单元格，那么整体性能将会下降。Apple\
  \ 的标准（也是默认）改进方法是，每当单元格移出屏幕时，就对其进行复用。\n\n#### 标准 TableView 单元格\n\n对于标准的 `UITableViewCell`，生成的代码应该能很好地工作，并提供快速、高流畅的滚动性能。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
  \ (cell == nil) {\n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier:CellIdentifier];\n    }\n```\n\n请注意 `reuseIdentifier:CellIdentifier`\
  \ 和 `dequeueReusableCellWithIdentifier:CellIdentifier` 的使用。这两部分将帮助你正确地复用 `UITableViewCell`。\n\
  \n创建新的自定义单元格主要有两种方式：一种是使用 `InterfaceBuilder`，另一种是直接通过调用 `addSubview:` 方法编写自定义代码。\n\
  \n\n\n#### 通过 Interface Builder 自定义 TableView Cell\n\n使用 `InterfaceBuilder` 时，开发者常常忘记设置标识符，这确实很容易发生。标识符可以通过打开\
  \ xib 文件、进入第一个选项卡、并修改第一行来修改，如图 图 3–4 所示。\n\n![images](img/0304.jpg)\n\n**图 3–4.**\
  \ *设置 Cell 的重用标识符*\n\n现在，在 Cell 的初始化代码中，你需要使用完全相同的标识符。\n\n```\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\
  \ {\n   static NSString *CellIdentifier = @\"CellIdentifier\"; // 必须与 InterfaceBuilder\
  \ 中的一致\n\n   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \   if (cell == nil) {\n       cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  \                                      reuseIdentifier:CellIdentifier];\n   }\n\
  ```\n\n#### 通过代码自定义 TableView Cell\n\n如果你通过编码自行构建自定义 Cell，而不使用任何界面构建器，则可以在自定义类 `ReuseTableViewCell`\
  \ 内部返回它。\n\n```\n        TableCellViewController.h\n@interface TableCellViewController\
  \ : UITableViewCell {\n}\n@end\n\n        TableCellViewController.m\n#import \"\
  TableCellViewController.h\"\n\n@implementation TableCellViewController\n\n- (NSString\
  \ *)reuseIdentifier {\n        return @”CellIdentifier”;\n}\n@end\n```\n\n**注意：**\
  \ 这两种方法的主要区别在于加载和初始化 `UITableViewCell` 的方式。为了确保你能理解并区分这两个示例，我将展示一些主要代码。\n\n### 从\
  \ Nib 文件加载 Cell\n\n首先，你需要编写代码将 nib 文件从文件系统加载到内存，然后解析以获取 `UITableView` 对象。\n\n```\n\
  - (UITableViewCell *)cellWithTableView:(UITableView *)tableView cellIdentifier:(NSString\
  \ *)cellIdentifier nibName:(NSString *)nibName {\n   UITableViewCell *textCell =\
  \  [tableView dequeueReusableCellWithIdentifier:cellIdentifier];\n   if (textCell\
  \ == nil) {\n       NSArray *topLevelObjects = [[NSBundle mainBundle] loadNibNamed:nibName\n\
  \                                                                owner:nil\n   \
  \                                                           options:nil];\n\n  \
  \     for (id currentObject in topLevelObjects) {\n           if ([currentObject\
  \ isKindOfClass:[UITableViewCell class]]) {\n               textCell = (UITableViewCell\
  \ *)currentObject;\n               break;\n           }\n       }\n   }\n   return\
  \ textCell;\n}\n```\n\n你可以调用方法 `cellWithTableView:cellIdentifier:nibName:` 从 nib\
  \ 文件 `TableViewController` 加载表格视图，代码如下：\n\n```\nReuseTableViewCell *cell = (ReuseTableViewCell\
  \ *) [self\ngetCellWithTableView:tableView\ncellIdentifier:CellIdentifier\nnibName:@\"\
  ReuseTableViewCell\"];\n```\n\n这段代码并不完美；你需要自己修改 nib 文件以确保一切正常运行。不过，我的目的是让你能够区分这两种方法，因此我不会深入细节。\n\
  \n### 从自定义代码加载 Cell\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
  \ *)reuseIdentifier {\n   self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
  \   if (self != nil) {\n       UIImageView *imageView = [[UIImageView alloc] initWithFrame:CGRectMake(20,\
  \ 20, 30, 30)];\n       [self.contentView addSubview:imageView];\n   }\n   return\
  \ self;\n}\n```\n\n给你一个小练习：创建一个新项目，尝试制作一个自定义 Cell；然后检查一切，确保你正确重用了 Cell。\n\n### 再次运行基准测试\n\
  \n重用 Cell 后，你可以再次对滚动性能进行基准测试。如 表 3–3 所示，正确重用 Cell 后，性能提升了一倍。\n\n![images](img/t0303.jpg)\n\
  \n这表明你的方向是正确的；不过，当前性能仍然不够理想。你总是希望性能能达到 `around 0.0006-0.0001`；正如我在第一部分展示的那样，这是标准\
  \ `UITableViewCell` 的正常性能。因此，你将进入下一部分，学习如何重用图像，而不是在每次调用时都创建新图像。\n\n以下是你应该始终重用 Cell\
  \ 的原因。操作系统创建和加载一个新 Cell 到内存需要时间和内存。这就是为什么 `tableView` 会在 Cell 移出屏幕时始终将其放入队列以待重用的原因。如果你重用了那个\
  \ Cell，操作系统就不需要创建新 Cell 来显示；它只需要获取旧 Cell，更改一些属性，然后重新显示该 Cell 即可。这个过程远比操作系统需要创建新\
  \ Cell 的速度要快得多。\n\n\n\n### 重用图片\n\n显示图片的一个普遍问题是，无论是通过`文件系统`的文件 I/O 还是网络 I/O，加载时间都非常长。当\
  \ iOS 无法返回单元格进行 UI 渲染时，这个加载过程也可能影响用户的滚动体验。\n\n关于本节内容，请参考名为`ReuseImageViewController`的项目。我先解释一下为什么在这些示例中不选择使用`[UIImage\
  \ imageNamed:@\"\"]`。`imageNamed`方法有一个重要的作用：它会在内存中为你缓存图片，并且当你再次请求时会复用该图片。但这个方法的问题是，它只能从你的\
  \ bundle 中获取图片——换句话说，只能获取应用源代码自带的图片。你无法通过这种方式从网络获取图片并加载到内存中。通常，你需要调用`[[UIImage alloc]\
  \ initWithContentsOfFile:@\"\"]`或`[UIImage alloc initWithData:Data]`方法。使用这些方法时，操作系统不会自动为应用将图片缓存到内存中。\n\
  \n因此，我希望你通过使用一个小型字典将图片存储在内存中，来自行缓存图片（请参见第 4 章）。处理图片的另一个重要部分是多线程（请参见第 6 章）。利用这一技术，你可以将繁重的处理任务移出当前处理线程。在我当前的示例中，我不会使用多线程，因为那会要求你一次性吸收太多新概念。你应该在章节末尾自己尝试练习一下。\n\
  \n以下是将图片存储在`NSDictionary`中的主要代码（请不要在你的应用中使用这种方式存储图片，因为它会导致内存警告问题）。\n\n```\n    \
  \  // 将图片存储到字典中的代码\n      - (UIImage *)imageWithName:(NSString *)name {\n\n    \
  \     if ([self.imageDictionary objectForKey:name]) {\n             return [self.imageDictionary\
  \ objectForKey:name];\n         }\n\n         UIImage *image = [[UIImage alloc]\
  \ initWithContentsOfFile:name];\n         [self.imageDictionary setObject:image\
  \ forKey:name];\n         return image;\n      }\n```\n\n以下是提取最新图片的主要代码。\n\n```\n\
  // 自定义表格视图单元格的外观。\n- (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n   static NSString *CellIdentifier = @\"CellIdentifier\";\n   ReuseTableViewCell\
  \ *cell = (ReuseTableViewCell *) [self\n                        getCellWithTableView:tableView\
  \ cellIdentifier:CellIdentifier\n                                     nibName:@\"\
  ReuseTableViewCell\"];\n   NSString *avatarFile = [NSString stringWithFormat:@\"\
  a0\"];\n   NSString *avatarName = [[NSBundle mainBundle] pathForResource:avatarFile\
  \ ofType:@\"jpeg\"];\n   cell.avatar.image = [self imageWithName:avatarName];\n\
  \   cell.userName.text = [NSString stringWithFormat:@\"hi here: %d\", indexPath.row];\n\
  \      // 配置单元格。\n   return cell;\n}\n```\n\n使用更新后的代码，你可以再次运行基准测试。正如你从表 3–4 中看到的，结果好了很多。现在平均运行时间为\
  \ 0.002，总体性能`fps`更接近 60。与之前使用`ReuseTableViewCell`相比，性能提升显著。\n\n![图片](img/t0304.jpg)\n\
  \n完美！现在`fps`速率几乎达到了 60，准备时间也相当合理。如果你的应用能达到这个水平，就无需再担心滚动性能了；它应该是流畅的。通常来说，对于一个包含多个子视图的普通、简单的`UITableViewCell`而言，这已经是良好的性能。这是一件好事，因为你从一开始就不需要做太多工作。然而，如果滚动性能仍然卡顿，你可能需要使用更好但也更复杂的方法来获得同样的性能。\n\
  \n正如第 1 章和第 2 章中已经提到的，你应该时刻注意避免过度优化。为了微小的性能提升而花费大量时间进行优化是不值得的。因此，此时，只有当你在滚动性能方面仍然遇到问题时，才应该继续进入第二个示例，即使用`UITableViewCell`进行绘制技术。\n\
  \n### 减少准备时间\n\n通常，我希望通过缓存图片来重用它们，并希望减少初始化过程。当操作系统需要为`TableView`渲染一个新单元格时，它会通过调用以下方法来请求一个新单元格：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n        // 在此处初始化并返回单元格\n}\n```\n\n因此，如果你长时间阻塞这个方法，`UserInterface`渲染过程就会被阻塞；它无法做任何事情，也无法显示任何新内容。这就是用户会看到滚动永远停在某个地方的部分原因。\n\
  \n为了尽可能加快这一过程，你可以移除逻辑、延迟计算、以及缓存可以重用的数据和图片。另一种方法是首先使用默认图片和数据来重用单元格。你也可以使用多线程，这样当你获取到图片/数据后，后续再填入单元格。从用户的角度来看，这种方法可以实现更平滑的滚动和更快的图片加载。\n\
  \n\n\n### `SecondExample`\n\n当您拥有大量子视图或使用旧设备时，绘制自定义单元格可以提升应用性能。对于 iPhone 4 及以上机型，性能提升非常显著，因此使用绘制自定义单元格技术会带来很大不同。\n\
  \n在本例中，我将通过添加来自真实应用、包含图片和文本的多达 10 个子视图来增加单元格的复杂度。这样您就能看到，在某些真实应用（例如我们试图模仿的 Facebook）中，复杂的子视图结构会显著影响滚动性能。我将进行基准测试的应用，其用户界面将如图\
  \ 3-5 所示。\n\n![images](img/0305.jpg)\n\n**图 3-5.** *第二个示例应用*\n\n应用内的每个单元格都包含头像、用户名，以及带有图片、标题和内容的帖子。它还会显示哪个应用在什么时间发布了该帖子。基准测试的结果见表\
  \ 3-5。\n\n![images](img/t0305.jpg)\n\n表 3-6 展示了使用自定义绘制代码再次运行代码后的基准测试结果。\n\n![images](img/t0306.jpg)\n\
  \n从表 3-5 和表 3-6 中可以看出，使用自定义绘制代码显著增加了渲染时间。对于复杂的子视图，这样的性能已经足够好，因此无需进一步优化。\n\n对于尚未优化的单元格，它由多个组件和子视图构成。请查看图\
  \ 3-5 以确保您理解该问题。\n\n![images](img/0306.jpg)\n\n**图 3-6.** *单元格*\n\n`图 3-6` 中的 `TableViewCell`\
  \ 包含四个图像和一个不同颜色的子视图。当开发者需要设置不同背景颜色或更轻松地管理内部视图组件时，这种子视图是一种常用方法。这种方法会导致表格视图滚动性能问题，因此应尽量避免。\n\
  \n现在，让我们进入新方法的源代码，在这里我将自己绘制视图，并且不再使用子视图。您将看到实现此行为所需的步骤，然后我将总结不同技术的优缺点。示例源代码来自 `DrawingCellViewController`\
  \ 项目。以下是主要源代码。\n\n对于 `UITableViewController`：\n\n```\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   static NSString\
  \ *CellIdentifier = @\"CellIdentifier\";\n   CustomDrawingTableViewCell *cell =\
  \ (CustomDrawingTableViewCell *) [self.tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  \n   if (cell == nil) {\n       cell = [[CustomDrawingTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier];\n   }\n\n   [cell updateMyCell];\n   return cell;\n\
  }\n```\n\n可以看到，`UITableViewController` 中的主要代码变化不大。它与标准 `UITableViewCell` 的唯一区别在于单元格的初始化方式。例如：\n\
  \n```\n[[CustomDrawingTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:CellIdentifier];\n```\n\n与之相对的是：\n\n```\n[[UITableViewCell alloc]\
  \ initWithStyle:UITableViewCellStyleDefault reuseIdentifier:CellIdentifier];\n```\n\
  \n在自定义 `UITableViewCell`（即 `CustomDrawingTableViewCell`）中：\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style\
  \ reuseIdentifier:(NSString *)reuseIdentifier {\n\n        if (self = [super initWithStyle:UITableViewCellStyleDefault\
  \ reuseIdentifier:reuseIdentifier]) {\n                CGRect subFrame = CGRectMake(0.0,\
  \ 0.0,\nself.contentView.bounds.size.width, self.contentView.bounds.size.height);\n\
  \n                drawingView = [[CustomDrawingView alloc] initWithFrame:subFrame];\n\
                  drawingView.autoresizingMask = UIViewAutoresizingFlexibleWidth |\n\
  UIViewAutoresizingFlexibleHeight;\n                [self.contentView addSubview:drawingView];\n\
         }\n       return self;\n}\n```\n\n现在到了最重要的部分：如何在视图中绘制文本、图像和控件。\n\n`CustomDrawingView.m`：\n\
  \n```\n- (void)drawRect:(CGRect)rect {\n   self.backgroundColor = [UIColor whiteColor];\n\
     // 绘制代码。\n   [self.userName drawInRect:CGRectMake(70,0, 95, 21) withFont:userNameFont\
  \ lineBreakMode:UILineBreakModeTailTruncation\n                   alignment:UIBaselineAdjustmentAlignBaselines];\n\
  \n   // 绘制图像\n   [self.avatarImage drawInRect:CGRectMake(20, 5, 36, 34)];\n\n   //\
  \ 绘制按钮\n   [self.button drawInRect:CGRectMake(50, 5, 36, 34)];\n}\n```\n\n简而言之，在\
  \ `UITableViewController` 中构建自定义 `UITableViewCell` 的方式与之前相同：只需在单元格为 nil 时将其出队，然后初始化一个新对象。在初始化方法中，您需要向单元格内容添加一个子视图。对于该子视图，您需要重写\
  \ `drawRect` 方法，然后通过 `drawInRect` 方法绘制文本或图像。\n\n绘制代码之所以比从 nib 文件加载或直接创建并添加子视图运行得更快，是因为\
  \ GPU（图形处理单元）会执行绘制代码。GPU 在渲染和显示 UI 方面非常高效；因此，绘制代码是处理复杂子视图最快的方法。\n\n**注意：** 需要记住的一个重要事项是将\
  \ `CustomDrawingView` 的背景色设置为白色。默认颜色是黑色。\n\n### 从这些示例中能学到什么？\n\n从上述两个示例中，有一些基本经验教训应始终牢记。\n\
  \n*   使用 `ReuseIdentifier`。这有助于提升性能。\n*   尽量减少单元格准备过程中的工作，尤其是从文件 IO/网络 IO 加载图像所需的时间和精力。这样能在最短时间内显示图像。\n\
  *   如果应用有太多子视图和/或复杂的结构，请考虑通过代码绘制。这将让 GPU 加速处理过程。\n\n**警告：** 从基准测试结果可以看出，fps 结果显著改善，甚至更接近完美的\
  \ 60 帧/秒。然而，使用此方法，您将无法利用 `InterfaceBuilder` 构建 UI 的优势。您需要自行计算位置和尺寸，并将这些信息写入 `drawRect`。从维护和功能膨胀（向应用中添加更多功能）的角度来看，这很快就会让人头疼。因此，请谨慎使用\
  \ `drawRect` 并避免过度优化。\n\n## 其他技术\n\n我已经讨论了提升表格视图滚动性能的重要技术。还有一些您通常不需要用到的小技巧，但我也在此一并介绍。如果您能理解其概念，便可将相同技术应用于其他场景。\n\
  \n### 缓存高度\n\n您需要缓存行的高度，因为 `TableView` 在需要创建新单元格时都会请求此信息。如果单元格高度固定，则无需担心。但如果不固定，则需要确保高度计算足够迅速。\n\
  \n尝试这样做：\n\n```\n- (CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n   return 80;\n}\n```\n\n并尽量避免这样做：\n\n```\n- (CGFloat)tableView:(UITableView\
  \ *)tableView heightForRowAtIndexPath:(NSIndexPath *)indexPath {\n  for (int i =\
  \ 0; i < 100; i++) {\n    // 找到行可能的最小高度\n  }\n\n   return smallestHeight;\n}\n```\n\
  \n当操作系统需要渲染单元格或在动画过程中编辑/重新排序单元格时，它会多次运行第一个代码片段。而像这样在方法内部包含循环，操作系统每次需要知道单元格高度时，都必须运行一个重复\
  \ 100 次的循环。\n\n\n\n### 不透明度\n\n尽可能让 `UITableViewCell` 的所有层和子视图都不透明。当视图透明时，iOS 需要将一个像素渲染两次或更多次，因为该像素同时属于多个子视图。这可能是一个耗时过程。\n\
  \n这一部分可以通过代码或 `InterfaceBuilder` 轻松完成。开发人员应仔细检查，确保所有子视图都不透明。图 3–7 展示了如何设置单元格内子视图的“不透明”复选框。\n\
  \n![images](img/0307.jpg)\n\n**图 3–7.** *为子视图设置不透明*\n\n对于自定义代码，你也可以通过代码进行设置，如下所示：\n\
  \n`view.opaque = YES;`\n\n### 避免图形效果\n\n避免使用 `UIImage` 中尚未包含的复杂图形效果（如渐变）。你应该通过使用\
  \ CoreAnimation 并进行一些小型配置来检查图形效果和问题，如图 3–8 和 3–9 所示。\n\n![images](img/0308.jpg)\n\
  \n**图 3–8.** *用于设置调试选项的 CoreAnimation 选项*\n\n![images](img/0309.jpg)\n\n**图 3–9.**\
  \ *启用颜色混合的 CoreAnimation 仪器工具*\n\n### 编辑/重排序性能\n\n在前面的章节中，我向你展示了通过直接绘制，可以显著优化应用的性能。然而，绘制方法在动画和重排序性能方面也存在一些严重问题。\n\
  \n当你使用子视图时，动画会变得更快，因为 `UIKit` 在动画过程中无需重绘或更改任何内容。因此，如果你使用子视图而不是通过代码绘制视图，对于 `UIKit`\
  \ 来说通常会更快。如果在动画编辑或重排序中通过代码绘制视图，则必须重新绘制视图以适应新的布局。这会在创建和维护代码方面增加工作量。\n\n当你遇到 `UITableViewController`\
  \ 的性能问题时，这始终是需要权衡的方面。我的建议是，如果你确定不会有太多子视图，或者你需要允许用户对单元格进行编辑/重排序，那么始终以子视图为起点。这可能会让应用运行稍慢，但仍然足够流畅。\n\
  \n## 总结\n\n通过结合源代码的示例，你学习了许多提升应用性能的重要技巧。\n\n*   **使用 NSLog 和 CoreAnimation 仔细进行基准测试**：我让你看到了一个实际使用\
  \ Instruments 和基准测试工具来高效理解问题本质以及每次优化后性能提升程度的例子。\n*   **正确复用单元格**：这是第一步，也是最重要的一步。实现单元格复用很容易，但许多应用却忽略了这一步。因此，如果存在任何性能问题，请务必再次检查这一点。\n\
  *   **正确缓存/复用图像与数据**：另一个重要步骤是减少加载数据以及在返回显示用单元格时进行逻辑处理的时间。\n*   **减少总加载和计算时间**：不仅仅是\
  \ I/O 过程会减慢并阻塞 UI 线程；任何一种数据处理都可能减慢此过程。因此，你应该始终尽可能减少这种处理。\n*   **自定义绘制单元格**：为了在渲染表格视图时充分利用\
  \ CPU 的计算能力，你可能需要考虑直接使用绘制方法。这将极大地提升渲染过程并提高性能指标；帧率几乎可以达到最大值。你可以通过重写 `drawRect` 方法，并使用不同的绘制方法自行绘制每个\
  \ UI 元素，来绘制自定义单元格。\n*   **不透明度**：当开发人员将用户界面元素放置到视图中时，会遇到这个小问题。如果没有将每个视图设置为不透明（即透明），渲染过程将需要遍历每个点两次来重绘同一个点。\n\
  *   **缓存高度**：这是开发人员常犯的另一个小错误。每次请求单元格时都会调用两个主要方法。\n*   **避免图形效果**：单元格上的图形效果越多，渲染过程就越慢。因此，你也应该对此进行测试。你完全可以借助\
  \ CoreAnimation 来查看每个 UI 元素的渲染效果。\n*   **编辑/重排序性能**：优化滚动性能可能会导致编辑和重排序出现性能问题，因为 `UIKit`\
  \ 和动画框架针对子视图进行了优化。如果你自己绘制单元格，这些框架的优化将失效。\n\n**练习题**\n\n1.  理论\n    1.  创建一个检查清单，以确保你遵循所有必要和基本的步骤，从而获得性能出色的\
  \ `UITableViewCell`。\n2.  实践\n    1.  编写一个使用 `drawRect` 的小应用，观察它在编辑/重排序控制下的行为。\n\
  \    2.  完成“复用图像”部分的练习。尝试使用多线程技术从文件加载图像进行显示。\n    3.  练习使用以下方法自行创建自定义 `UITableViewCell`：\n\
  \        *   `InterfaceBuilder`\n        *   添加子视图代码\n        *   使用绘制代码\n\n## 第\
  \ 4 章\n\n## 使用图像与数据缓存技术提升应用性能\n\n在本章中，你将了解：\n\n*   网络和文件 IO 处理如何影响应用性能。\n*   与缓存算法相关的常见问题和技术。\n\
  *   iPhone 缓存技术中的特定问题。\n    *   你应该缓存什么。\n    *   你应该何时缓存。\n    *   如何实现缓存。\n  \
  \  *   你应该在何处缓存数据和图像。\n*   内存消耗与性能之间的权衡。\n\n对于当今大多数 iPhone 应用来说，开发者通常要么从自己的服务器加载数据，要么使用第三方服务的数据。少数应用的数据存储在文件系统中，并在需要时加载显示给用户。极少数应用完全不使用任何网络或文件\
  \ IO 处理。因此，理解这些处理类型的影响有助于你更容易地发现问题并解决它们。\n\n## 网络、文件与内存处理的性能差异\n\n让我们看看从文件系统加载图像到内存，以及从给定服务器加载图像到内存各需要多长时间。当然，结果会因服务器处理请求的速度、网络速度以及服务器与测试机器之间的距离而异。然而，我想展示一个重要观点：通过网络加载图像比从文件加载慢得多，而从文件加载图像又比图像已存在于内存中慢得多。我基于加载一张\
  \ 50kb 的图像测试了性能。结果如下：\n\n`文件加载时间： 0.001147`\n`网络加载时间： 4.160634`\n\n从文件系统加载图像耗时 1\
  \ 毫秒，而从网络加载则耗时 4 秒——差异巨大！1 毫秒在性能上似乎微不足道；然而，想象一下，如果你需要同时加载 10-20 张图像，并且其中一些图像尺寸较大——高达几百\
  \ KB。加载所有这些图像的总时间将超过几秒。\n\n\n\n## 如何识别性能瓶颈\n\n从文件或网络加载数据主要存在两个问题。\n\n- 用户必须等待很长时间，应用才能显示图像。这个时间可能会随着图像数量的增加而成比例增长。如果用户界面（UI）需要在运行诸如\
  \ `UITableView` 之类的组件时加载大量图像，用户每次向下滚动查看更多信息时都不得不等待。\n- 它可能会阻塞 UI，导致用户无法正常与 UI 交互。这一点在第\
  \ 6 章中也有提及。\n\n因此，由于从文件/网络加载比在内存中加载和处理数据/图像花费的时间多得多，这个加载过程通常会成为你的性能瓶颈。如果你的应用必须等待网络数据，那么所有其他进程也必须等待。所以，当遇到性能问题时，测试文件/网络加载应该始终是你的首要任务。正如你在第\
  \ 2 章中所见，你可以通过 `System Activity` 和 `File Activity` 来观察数据加载过程。图 4-1 展示了这些工具的界面。\n\
  \n![images](img/0401.jpg)\n\n**图 4-1.** `File Activity` 工具\n\n![images](img/0402.jpg)\n\
  \n**图 4-2.** `File Activity` 的结果列表\n\n图 4-1 展示了文件活动，包括加载和写入文件/目录以及读取文件属性。图 4-2 则展示了每项活动的更多细节，帮助你了解哪些类型的文件活动运行得最频繁。\n\
  \n![images](img/0403.jpg)\n\n**图 4-3.** `System Usage` 工具\n\n![images](img/0404.jpg)\n\
  \n**图 4-4.** `System Usage` 的结果列表\n\n图 4-3 和 4-4 更详细地展示了 `System Usage`，它更为通用，涵盖了更多的数据类型。正如你在图\
  \ 4-4 中所见，其中包含了与 `plist` 和 `nib` 文件相关的活动。\n\n## 缓存入门\n\n本节将解释缓存中许多重要的术语和概念，并介绍一些适用于通用环境（如\
  \ Web 和桌面应用程序）的基本缓存算法。这些算法中有很多可以应用于 iPhone 环境；本章后续部分将会详细说明。\n\n我将解释以下概念：缓存命中、缓存未命中、检索成本、存储成本、失效、替换策略以及缓存衡量。然后，我将解释一些最常用的缓存算法：Belady\
  \ 算法、随机替换、先进先出（FIFO）、最不经常使用（LFU）、简单基于时间的、最近最少使用（LRU）以及自适应替换缓存（ARC）。\n\n### 什么是缓存？\n\
  \n缓存是指将一部分数据集/图像存储在更近的层级中。例如，如果原始图像来自网络，你可以将数据/图像存储在文件系统中，这样下次你的应用就无需再通过网络来获取这些数据/图像。同样，如果数据/图像已在文件系统中，你可以将其存储在内存中，以便在需要时能立即进行计算或显示。\n\
  \n### 缓存命中\n\n缓存命中发生在你的应用查找特定数据/图像时，它在缓存中找到了该数据/图像，并直接从中加载。这是一件好事，因为它无需从原始来源加载。换句话说，它节省了时间。\n\
  \n缓存命中率通常用于判断你的算法是优是劣。该指标通常会结合每次缓存命中时节省的容量大小来考量。例如，如果你决定存储较小的图像（每张 4KB），并且缓存命中率约为\
  \ 90%，那么你已经节省了 3.6KB。这种节省有助于改善从网络和文件活动中加载的时间。然而，如果你存储大图像（每张 200KB），且缓存命中率约为 10%，那么你已经节省了加载\
  \ 20KB 的成本。另一个需要考虑的角度是用户对性能的感受：如果用户知道他们将收到一张大图像，并且愿意等待网络加载，那么不经常缓存该图像也是可以的。\n\n\
  ### 缓存未命中\n\n缓存未命中发生在你的应用查找特定图像/数据时，在缓存中找不到它，因此需要从原始位置检索。这对你的应用来说可能是一件坏事，例如，当应用未连接到互联网时。当应用未连接到互联网且发生大量缓存未命中时，应用可能会向用户显示空白图像/数据。为了避免这种情况，你通常需要在应用联网时缓存大量图像和数据，以便在离线时显示它们。\n\
  \n### 检索成本\n\n检索成本是指将图像/数据从网络/文件加载到下一个数据层级所需的开销。这可以分成两种情况。\n\n- **从网络加载到文件**：如之前的例子所示，与从文件和内存加载相比，这消耗的时间最多。网络数据的检索成本很高。\n\
  - **从文件加载到内存**：从文件加载到内存消耗的时间较少，因此这种情况下的检索成本较低。\n\n### 存储成本\n\n存储成本也分为两种情况：存储在文件和存储在内存中。\n\
  \n- 文件系统通常比内存系统大；因此你可以在文件系统中存储更多的数据/图像。iPhone 文件系统根据设备本身的不同，最多可容纳 8、16 或 32GB。如果你使用\
  \ RSS 阅读器阅读新闻，并且该阅读器持续存储新闻中的所有图像，你的存储空间很快就会用满 8GB。你必须记住，在这 8GB 中，用户还存储着他们的音乐、视频以及所有其他应用的缓存。你的应用只应使用最多几百兆字节；否则，用户可能很快就会删除你的应用。\n\
  - iPhone 4 设备中的内存系统确实有限，最多只能存储 512MB，并且其中大部分内存被后台运行的其他应用和操作系统占用。一个应用可用于存储自身内部数据以进行处理的最大内存约为\
  \ 256MB。较旧的 iPhone 设备，如 iPhone 3GS 或 iPhone 3G，最多只能使用 64 或 128MB。此外，别忘了在显示应用时，你还需要显示和存储的所有\
  \ nib 文件和视图控制器。最后，对于最新的 iPhone，你大约可以存储 50 张 1MB 大小的图像。与 iPhone App Store 中许多消耗内存的应用和游戏相比，这实际上并不多。\n\
  \n\n\n### 缓存失效\n\n> “计算机科学领域只有两大难题：缓存失效和命名。”\n> \n> — 菲尔·卡尔顿\n\n正如这句话所言，缓存失效是一个难题。当开发者缓存图片/数据时，它们可能很快就会过时。问题在于，如何判断图片/数据是否过时，以及何时检查最新数据。\n\
  \n对于图片，如果每张图片都通过`URL`/名称进行唯一命名，那么当该`URL`/名称发生变化时（例如，用户更换了头像），你的应用会立即知道该图片已过时，并可以获取新图片。\n\
  \n然而，如果图片的`URL`/名称没有改变，你可以设置一个特定时间段（例如 3-7 天）后再获取新图片。幸运的是，大多数网络服务都会处理这个问题，并在图片实际更改时改变其`URL`。\n\
  \n对于数据，就更难了。如果你将数据缓存在文件系统中（通过使用数据库或纯文本；本章稍后会详细解释），那么你可能永远不知道数据是否过时。如果每次使用数据时都必须通过网络检查服务器上是否有新数据，那就失去了在文件系统中缓存数据的所有优势。\n\
  \n有几种方法可以解决这个缓存失效问题。\n\n*   接受你的数据有时会过时，并且你必须使用这些数据来计算并展示给用户。在特定时间段后，应用会检查最新数据，并用新数据替换整个数据。\n\
  *   尽最大可能从网络快速获取数据。\n*   根据用户的请求使缓存失效。\n\n通常开发者会结合使用第一种和第三种方法，因为这样更合理。你只能将数据大小缩减到一定程度；在那之后，就无法再缩减了。第三种方法可以通过一个刷新按钮轻松实现，并且应用可以在打开或关闭时重新加载新数据，这也很容易实现。\n\
  \n### 替换策略\n\n替换策略是一种策略（通常由特定算法实现），用于决定在必要时删除哪条数据/哪张图片。它还能告诉你应该在什么时间检查并删除缓存，以保持缓存库的新鲜度。在选择一种替换策略而非其他策略时，你始终需要考虑以下四个主要方面。\n\
  \n*   **缓存命中率**：如前所述，它表示你的应用在缓存中找到特定数据/图片的次数，与应用向缓存请求数据的次数的比例。这个数字越高越好。\n*   **延迟**：通常指两种不同类型的延迟。第一种含义是缓存命中时从缓存加载数据所需的时间。第二种含义是缓存未命中时从原始源加载数据所需的时间。你需要考虑是缓存最大的项目（例如\
  \ 1MB 及以上），还是缓存较小的项目（小于 10KB）。较小的项目会带来更高的缓存命中率，但可能无法像大项目那样节省带宽和时间。\n*   **存储限制**：这通常需要与缓存命中率进行权衡，因为在\
  \ iPhone 上可用的空间（包括内存和文件空间）是有限的，所以你必须仔细考虑。否则，为了增加缓存命中率，你可以想存多少就存多少。\n*   **算法复杂度**：实现与你偏好的策略相匹配的算法有多难？在许多算法中，你可能需要跟踪特定的文件或数据库，以记录你所使用的每条数据/每张图片的使用情况，从而优化你的缓存。这是一个很大的权衡；你会使用更多内存，并且应用需要花费\
  \ CPU 和时间来执行算法，以决定是否应该删除某条缓存。请注意，算法越复杂，你需要在构建、维护和修复算法自身漏洞上花费的精力就越多。\n\n### 缓存算法\n\
  \n我将介绍一些非常基础且易于实现的算法，例如随机替换、先进先出和简单的基于时间的算法，以及更复杂的算法，如最近最少使用和最不经常使用。\n\n#### 贝拉迪算法\n\
  \n这是一种理论算法，它指出如果某条信息将来不需要，应用应该直接将其删除。为什么我说这是一种理论算法呢？因为在许多现实场景中，你永远不知道那条信息将来是否会被需要。例如，假设网站将图片换成了新图片，应用发现不再需要使用旧图片了。啪！图片被删除了。然后网页设计师改变了主意，又把旧图片换了回来。现在应用又需要重新加载旧图片。因此，大多数时候（但并非总是），贝拉迪算法并不实用，实际上也无法用真实代码实现。然而，该算法被用作基准来比较其他算法。\n\
  \n#### 随机替换\n\n这种算法没什么好说的。你基于某种随机访问来删除缓存。\n\n**优点：**\n\n*   实现该算法几乎不需要任何精力。\n\n\
  **缺点：**\n\n*   在缓存命中率和缓存失效方面，可能带来不了太多好处。该算法可能会错误地删除一些仍然需要的文件，同时长时间保留未使用的文件。\n\n\
  **实现：**\n\n文件：\n\n```objc\n    // 文件随机替换\n    NSFileManager *fileManager = [NSFileManager\
  \ defaultManager];\n    NSString *filePath = NSTemporaryDirectory();\n    NSDirectoryEnumerator\
  \ *fileNames = [fileManager enumeratorAtPath:filePath];\n    NSString *firstFileName\
  \ = @\"\";\n    for (NSString *fileName in fileNames) {\n        firstFileName =\
  \ fileName;\n        break;\n    }\n    [fileManager removeItemAtPath:firstFileName\
  \ error:nil];\n```\n\n内存：对于内存缓存，你通常会使用一个字典，将唯一的 URL/名称绑定到对象上。通过向字典传递唯一的 `URL`/名称，可以轻松检索数据。在这个例子中，我使用\
  \ `cacheDictionary` 来存储内存数据。\n\n```objc\n    // cacheDictionary 是一个字典，用于存储图片名称与图片本身之间的映射\n\
  \n    NSObject *firstObj = nil;\n    for (NSObject *obj in [cacheDictionary allKeys])\
  \ {\n        firstObj = obj;\n        break;\n    }\n    [cacheDictionary removeObjectForKey:firstObj];\n\
  ```\n\n\n\n#### 先进先出（FIFO）\n\n简而言之，此算法的规则是：最先进入缓存的项，将最先被删除。\n\n优点：\n\n*   该算法非常简单，几乎无需费力进行计算和比较。\n\
  *   如果你认为缓存项存在的时间越长，被删除的可能性就越大，那么它能带来一些好处。\n\n缺点：\n\n*   它没有考虑到哪些缓存项被请求得最频繁，或者未来被请求的可能性更高。\n\
  \n实现方式：\n\n文件：你需要基于文件的创建日期。你需要找到所有文件的创建日期，然后获取最早创建的日期以进行删除。\n\n```\nNSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
  NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\nNSString\
  \ *smallestDateFilePath = @\"\";\nfor (NSString *fileName in fileNames) {\n    NSString\
  \ *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n    NSDictionary*\
  \ attributes = [fileManager attributesOfItemAtPath:uniquePath error:nil];\n    NSDate\
  \ *createdDate = [attributes objectForKey:NSFileCreationDate];\n// 我会把寻找最早创建日期的任务交给你作为一个小练习\n\
  //  if (createdDate is smallest) {\n//     smallestDateFilePath = uniquePath;\n\
  // }\n}\n[fileManager removeItemAtPath:smallestDateFilePath error:nil];\n```\n\n\
  内存：可以通过一个字典来跟踪所有数据/图片，并使用一个数组来记录数据/图片的顺序。我使用一个 `cacheOrders` 数组来存储图片的唯一名称列表。该数组按顺序存储数据：最旧的项位于索引\
  \ 0，最新的项位于数组末尾。\n\n```\n// cacheDictionary 是一个字典，用于存储图片名称与图片本身的映射关系\nNSString *firstName\
  \ = [cacheOrders objectAtIndex:0];\n[cacheDictionary removeObjectForKey:firstName];\n\
  [cacheOrders removeObjectAtIndex:0];\n```\n\n#### 简单基于时间\n\n此算法主要基于时间。你为缓存指定一个基本时间段。在该特定时间段过后，应用会检查缓存已存在多长时间（缓存的寿命）。如果缓存的时长超过特定期限（例如\
  \ 14 天），缓存会被自动删除。\n\n优点：\n\n*   它非常简单——甚至比 FIFO 还要简单。\n*   它不需要花费太多时间和 CPU 来计算每个缓存的寿命。\n\
  *   你不需要跟踪额外的信息（例如 FIFO 中的缓存顺序）。\n\n缺点：\n\n*   它通常会导致删除过多或过少，这意味着你可能会删除超出需求的缓存。例如，如果你只需要删除文件系统中\
  \ 10MB 的图片以释放更多空间，但其中有 20MB 的图片早于特定日期，你就可能过度删除了。\n\n实现方式：通常用于文件系统缓存，而非内存缓存。\n\n\
  文件：你需要基于文件的创建日期。你需要找到所有文件的创建日期，并筛选出创建日期早于你指定日期的文件，然后删除这些文件。\n\n```\nNSFileManager\
  \ *fileManager = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
  NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\nNSTimeInterval\
  \ maximumTimeInterval = 7 * 24 * 3600;  // 7 天缓存\nfor (NSString *fileName in fileNames)\
  \ {\n    NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n\
  \n    NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath\
  \ error:nil];\n    NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];\n\
  \n    if ([createdDate timeIntervalSinceDate:[NSDate date]] > maximumTimeInterval)\
  \ {\n        [fileManager removeItemAtPath:uniquePath error:nil];\n    }\n}\n```\n\
  \n接下来是更复杂的缓存算法，你可能永远都无需使用。根据我个人的经验，文件存储空间可能非常大，而你或许只需每几个月删除一次数据，使用简单的基于时间的算法即可。对于内存来说，虽然其存储容量非常有限，但访问速度快，你可能需要使用\
  \ FIFO 或 LFU。\n\n#### 最近最少使用（LRU）\n\n此算法比之前介绍的算法更复杂。假设你有一个项目列表。每当某个相同项目被请求时，你就将该项目放到列表的头部。当你需要删除一个项目时，你从列表的尾部删除一个项目。表\
  \ 4-1 展示了一个包含四个项目的示例数组。\n\n![images](img/t0401.jpg)\n\n如步骤 5 所示，由于新项目（称为 5）进来了，而列表中只能存储四个项目，因此我必须删除项目\
  \ 3。但在后续步骤中，项目 3 被请求了，而我没有足够的空间来缓存它，于是我删除了项目 1。\n\n优点：\n\n*   它基于更优的策略来删除缓存。该策略基于这样一个假设：如果一个缓存长时间未被请求，那就应该将其删除。\n\
  \n缺点：\n\n*   它不太关心缓存被请求的频率。在这个例子中，如果项目 1 被连续请求了三四次，然后在接下来的三步中未被请求，你是应该删除它还是保留它？本章后面会介绍另一种试图解决此问题的算法。\n\
  \n实现方式：它既可以在文件中实现，也可以在内存中实现。但如前所述，除非你需要在文件系统中存储大量数据（尤其是图片/视频）并频繁地访问/删除它们，否则你不会需要使用此算法。\n\
  \n内存：我只展示实现此算法的一种方式，这或许并非最佳方法。但我希望你能领会核心思想。\n\n```\n// cacheArrays 是一个数组，用于存储缓存项，其目的是让最近最少使用的对象排在数组末尾。\n\
  NSString *requestedItem = @\"5\";\nif ([cacheArrays containsObject:requestedItem])\
  \ {\n\n    // 如果调用者请求一个已存在的项，我将该项添加到数组的顶部\n    [cacheArrays removeObject:requestedItem];\n\
  \    [cacheArrays insertObject:requestedItem atIndex:0];\n} else {\n    // 如果代码请求一个不存在的新项，我将移除最后一个项（如果\
  \ cacheArrays 已满），\n    // 然后将新项添加到数组的顶部。\n    [cacheArrays removeLastObject];\n\
  \    [cacheArrays insertObject:requestedItem atIndex:0];\n}\n```\n\n\n\n#### 最不经常使用（LFU）算法\n\
  \n该算法与最近最少使用算法略有不同。它关注的是某个项目被请求的频率。如果一个项目比其他项目被请求得更频繁，它就应该被保留在缓存中。表 4-2 演示了最不经常使用算法。\n\
  \n![images](img/t0402.jpg)\n\n正如你所见，使用相同的初始列表和相同的项目请求列表，这两种算法最终产生了不同的结果。\n\n优点：\n\
  \n- 它实际上将**缓存命中率**纳入策略考量，以决定某个项目是应该保留在缓存中还是从缓存中删除。\n\n缺点：\n\n- 考虑如下场景：项目 1 在开始时被访问了\
  \ 100 次。然而，从长远来看，它再也没有被访问过。问题是，项目 1 仍然会被保留在缓存中，因为没有其他项目被访问超过 100 次。\n\n实现方式：可以通过文件或内存来实现。但如前所述，除非你需要在文件系统中存储大量数据（尤其是图片/视频）并且需要频繁访问/删除它们，否则你不需要使用这个算法。\n\
  \n内存：作为一项快速练习，请编写一段简短的 Objective-C 代码来实现该算法。在查看下面的提示之前，请先自行完成算法。\n\n再次强调，在进入下一页查看提示之前，请将其作为练习自行完成。\n\
  \n**提示**：你应该使用两个字典，一个用于记录缓存中名称 → 对象的映射，另一个用于记录名称 → 访问次数的映射。每当有新的请求到来时，你就增加该名称的访问次数，并检查是否需要删除旧的缓存。如果需要删除旧的缓存，那么你应该选择访问次数最少的缓存名称。\n\
  \n## 衡量缓存\n\n让我们通过一些示例练习来演示几个要点。正如在置换策略中所述，在决定缓存策略时，你需要面对四个主要问题：缓存命中率、延迟、存储限制和算法复杂度。算法复杂度取决于你的能力；如果你是一名优秀的开发者，它与其他因素相比，对决策的影响可能不大。\n\
  \n假设你有两个与缓存命中率和检索约束相关的文件缓存场景。\n\n- 一种策略是尝试缓存 1000 个小项目（每个项目小于 30KB）。你的缓存命中率是 70%。\n\
  - 另一种策略是缓存 60 个大项目（每个项目大约 500KB）。你的缓存命中率是 10%。\n\n如你所见，两种策略的存储成本是相同的：30MB。第一种策略的缓存命中率为你节省了\
  \ 21KB 的检索成本，而第二种策略则为你节省了 50KB。就检索成本而言，第二种策略为你节省了更多的带宽和加载时间。\n\n表 4-3 为你刚刚学到的术语提供了快速总结。\n\
  \n![images](img/t0403.jpg)\n\n### 你应该缓存什么\n\n开发者只应关注缓存少量内容：图片、视频、数据，或者有时是 HTML 文件，以便它们可以在\
  \ `UIWebView` 中快速加载。我将它们分为两种主要类型：要么缓存整个文件，要么缓存数据以及数据之间的关系。对于每种类型，我将向你展示在存储这些文件时需要记住的一些重要特性。\n\
  \n#### 你应该将图片存储在哪里？\n\n对于你不存储在应用程序包中的文件，你必须考虑应该将它们存储在哪里。换句话说，你应该将文件缓存到哪里，以便能够检索它们并且不必担心其生命周期？有几个经典位置可以存储你的文件：临时目录、缓存目录、文档目录、相册（仅限图片/视频）以及应用程序包。每个位置都有其独特的特性，你需要了解并记住。\n\
  \n##### 临时目录\n\n你可以通过调用 `NSTemporaryDirectory();` 来访问和存储此目录中的数据。\n\n优点：\n\n- 它不会被备份。实际上，操作系统会在某个不确定的时间将其删除。当用户重启\
  \ iOS 设备时，临时目录也将被删除。\n- 你无需担心何时删除这些文件，因为这是操作系统的责任。\n\n缺点：\n\n- 当此目录被删除时，应用程序可能无法运行；因此，你无法对删除过程进行任何操作或控制。\n\
  - 如果你后来决定从此目录中检索文件/图片，它们很可能已经不存在了。\n\n用途：\n\n- 如果你需要快速且临时地存储某些内容。例如，你想存储应用程序的一些截图，以便在用户等待时展示给他们看。因为这些截图与应用程序状态相关，所以你不太关心需要长期存储它们。\n\
  \n##### 缓存目录\n\n你可以通过使用以下代码片段来访问和存储此目录中的数据：\n\n```\n+ (NSString *)userCacheDirectory\
  \ {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSCachesDirectory,\
  \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\n优点：\n\n\
  - 它不会被备份。这有助于加快用户将应用与 iTunes 同步时的备份过程。\n- 它不会被 iOS 自动删除。你可以控制存储哪些文件以及何时存储。\n\n缺点：\n\
  \n- 你需要确保此目录不会增长过大。换句话说，你需要确保它不会消耗用户过多的硬盘空间。\n\n用途：\n\n- 这是存储缓存文件的主目录。它是存储图片/视频/文件的理想位置，以便日后展示给用户。\n\
  \n##### 文档目录\n\n你可以通过使用以下代码片段来访问和存储此目录中的数据：\n\n```\n+ (NSString *)userCacheDirectory\
  \ {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
  \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\n优点：\n\n\
  - 它会被备份。因此，你存储在其中的文件/图片可能永远不会丢失。\n- 它不会被操作系统删除。\n\n缺点：\n\n- 你需要自己管理这个文件夹，并确保它不会增长过大。我见过许多应用程序将数据存储在此文件夹中，导致备份整个设备需要数小时。主要时间都花在了存储文档目录中的图片上。\n\
  - 如果你的应用允许通过 iTunes 进行文件共享，那么你存储在此处的任何文件都会在 iTunes 中显示（参见图 4-5）。因此，请注意不要使用会让用户混淆的愚蠢文件名。\n\
  \n    ![images](img/0405.jpg)\n\n    **图 4-5.** *文档文件夹内的文档列表*\n\n用途：\n\n- 如果你希望文件被备份且日后不丢失，那么你应该考虑使用这个\
  \ `Document` 目录。它是存放从 Web 服务下载的、用户希望永久保留的文档或照片的好地方。\n\n\n\n### 相册\n\n此目录归属于操作系统，并会被多个应用程序共享。您可以在这些相册中存储照片和视频。用户在\
  \ iOS 设备上查看所有照片和视频的主要应用是“照片”应用，如图 4–6 所示。\n\n![images](img/0406.jpg)\n\n**图 4–6.**\
  \ *“照片”应用中的图像和视频*\n\n要将照片和视频存储到“照片”应用中，请使用相应的代码片段。\n\n对于图像：\n\n`UIImageWriteToSavedPhotosAlbum\
  \ (imageToSave, nil, nil, nil).`\n\n请注意，`imageToSave` 是一个 `UIImage` 类型的变量。\n\n对于视频：\n\
  \n```\n// 假设此视频将从网络下载\nNSData *videoData = [self getVideoDataFromNetwork];\nNSString\
  \ *moviePath = [NSTemporaryDirectory()stringByAppendingPathComponent: @”video.mp4”];\n\
  UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil)\n```\n\n优势：\n\n-\
  \   数据会被备份。\n-   数据可以与其他应用共享。\n\n劣势：\n\n-   将照片和视频保存到相册后，您无法删除它们。\n-   保存图像和视频后，它们将完全脱离您应用的控制。\n\
  \n用途：\n\n-   当您希望将应用生成或从网络服务获取的图像和视频分享给其他应用，以便用户查看时，此方法很适用。\n\n### 应用程序包\n\n当您开发应用时，图像和视频将被打包到应用中，并随应用一同安装，如图\
  \ 4–7 所示。\n\n![images](img/0407.jpg)\n\n**图 4–7.** *与应用程序绑定的图像*\n\n要获取文件，您可以使用以下代码片段：\n\
  \n图像：\n\n`UIImage *image = [UIImage imageNamed:@\"check_icon.png\"];`\n\n其他文件：\n\
  \n```\nNSString *path = [[NSBundle mainBundle] bundlePath];\nNSString *questionsPath\
  \ = [path stringByAppendingPathComponent:@\"Questions.plist\"];\nNSArray *questionData\
  \ = [NSArray arrayWithContentsOfFile:questionsPath];\n```\n\n优势：\n\n-   文件随应用发布。\n\
  \n劣势：\n\n-   这些图像/视频是静态的，因此您无法更改、添加或删除任何内容。\n-   如果在应用程序包中放入过多文件，应用会变得非常臃肿。用户将需要等待很长时间才能下载和安装。\n\
  -   更改图像或视频的唯一方法是发布新版本更新。\n\n用途：\n\n-   适用于您确定会在应用中频繁使用的静态图像和视频。这些通常是您会在应用内反复展示的图标或视频。\n\
  \n## 数据缓存\n\n对于数据缓存，您可能需要处理结构化数据；由您自行决定如何以及在哪里存储这些数据。以下是存储数据的主要方式。\n\n### 存储在 plist/xml/json\
  \ 中\n\n您可以使用 plist 或 XML 格式以简单的形式存储结构化数据；这样可以轻松地可视化数据，如图 4–8 所示。\n\n![images](img/0408.jpg)\n\
  \n**图 4–8.** *数据可以轻松存储和可视化*\n\n您还可以以 XML 格式查看数据，如图 4–9 所示。\n\n![images](img/0409.jpg)\n\
  \n**图 4–9.** *plist 数据可以以 XML 格式查看和编辑*\n\n您可以使用以下代码加载和解析 plist 文件：\n\n```\nNSString\
  \ *path = [[NSBundle mainBundle] bundlePath];\nNSString *questionsPath = [path stringByAppendingPathComponent:@\"\
  Questions.plist\"];\nNSArray *questionsData = [NSArray arrayWithContentOfFile:questionsPath];\n\
  ```\n\n优势：\n\n-   易于可视化以及添加/编辑/更改数据。\n-   解析数据很容易，因为所有数据都会被转换为 `NSArray`、`NSDictionary`、`NSString`、`NSNumber`\
  \ 等类型。\n\n劣势：\n\n-   加载 plist 文件时需要加载整个文件，这非常耗时且占用 CPU。\n-   无法使用 plist 创建复杂的对象模型。\n\
  \n用途：\n\n-   为您的应用创建初始的静态数据。\n\n### 存储在 CoreData 中\n\nCoreData 是苹果提供的一个强大且功能丰富的内置框架，旨在帮助开发者轻松管理和控制数据。它在数据之间的关系问题之上创建了一个面向对象的抽象层。您可以通过拖拽来创建对象关系模型。图\
  \ 4–10 展示了一个关于问题、答案及其分类的 CoreData 模型示例。\n\n![images](img/0410.jpg)\n\n**图 4–10.**\
  \ *CoreData 对象关系模型*\n\nCoreData 还会自动生成代码。图 4–11 和 4–12 展示了图 4–10 中问题对象所生成的代码。CoreData\
  \ 会处理从存储、检索到管理对象间关系的所有操作。如果您对使用 CoreData 存储数据的更多信息感兴趣，市场上有很多关于它的优秀书籍。\n\n![images](img/0411.jpg)\n\
  \n**图 4–11.** *为对象的头文件生成的代码*\n\n![images](img/0412.jpg)\n\n**图 4–12.** *为对象的实现文件生成的代码*\n\
  \n优势：\n\n-   帮助您创建面向对象的模型。\n-   您无需通过代码担心存储、管理或更新数据。CoreData 会处理这一切。\n-   实际上，它提供了比\
  \ SQLite 更佳的性能。根据我个人的经验和测试，CoreData 在许多情况下运行速度都比 SQLite 快。\n\n劣势：\n\n-   数据可视化不太容易。没有用于管理初始数据的用户界面。\n\
  -   有时您可能不需要单独的对象模型。\n\n用途：\n\n-   它是管理动态数据的强大工具。在大多数情况下，您应该使用它来缓存数据。\n\n### 存储在\
  \ SQLite 中\n\nCoreData 使用 SQLite 作为其后端存储。然而，CoreData 也可以与其他 SQL 数据库框架一起实现，因此很难说\
  \ CoreData 是否比 SQLite 更强大。使用 SQLite 就像使用其他 SQL 数据库框架一样，只需做一些微小的改动。\n\n优势：\n\n- \
  \  它是一个关系型数据库。如果您熟悉关系型数据库，应该没有任何问题。\n\n劣势：\n\n-   很难可视化 SQLite 数据库中的所有数据。\n-   您可能需要编写更多\
  \ SQL 语句来实现所需的所有功能。\n\n用途：\n\n-   您希望在不同的平台之间拥有一个可移植的数据库：iPhone、Blackberry、Android\
  \ 和 Windows Phone。因为 SQLite 完全是用 C 语言编写的。而 CoreData 与 Cocoa 和 Cocoa Touch 框架紧密关联。\n\
  \n\n\n### 何时检查并删除缓存？\n\n一般来说，我无法提供任何关于何时检查缓存的具体技巧或建议。这个决定取决于你所工作的环境；换句话说，iOS 环境不同于\
  \ Web 环境。在 Web 服务器中，你可以循环运行检查方法，查看是否有缓存过期并将其删除。在 iOS 环境中，这既耗时又消耗 CPU。\n\n何时检查并删除缓存内容，很大程度上取决于你用于缓存所选的算法。例如，如果你主要使用\
  \ FIFO、LRU 或 LFU，那么你可能需要等到新的请求到来。或者，你可以检查缓存是否已满；如果已满，则根据你的算法删除旧缓存。这种方法通常用于内存缓存，此时你需要更精确的算法并有严格的存储限制。\n\
  \n对于文件缓存，你通常会选择简单的基于时间的算法。文件缓存不像内存那样有严格的有限存储容量。使用简单的基于时间的算法，你无需过度担心每一个文件，因为你可以同时删除一组文件。\n\
  \n如果你预计检查缓存属性时不需要花费太多时间进行计算或检索文件信息，你甚至可能完全不必担心何时检查和删除它们。这里有一个重要的教训：不要过度优化。如果你认为你的方法可能导致瓶颈，可以尝试对其进行基准测试。如果当前方法运行良好，那么你的应用是在启动时、结束时，还是首次请求并存储新缓存时检查和删除缓存，都无关紧要。\n\
  \n以下是一些主要方法：\n\n- **应用启动时**：这可能会略微减慢启动过程，但如果你使用多线程，则不会有任何问题。\n- **应用关闭时**：如果使用多线程需小心——应用可能在检查和删除缓存过程完成前就结束。如果你不使用多线程，应用关闭所需的时间会更长。\n\
  - **存储新缓存时**：首次请求该缓存时可能会变慢，但后续尝试会更快。在这种情况下，我建议不要使用多线程，因为你可能会删除另一个线程正在读取的文件。\n\n\
  ### 内存缓存\n\n以下是一些关于如何进行内存缓存的细节，以及在 iOS 环境中进行内存缓存时可能遇到的特定问题。\n\n由于内存有严格的存储限制，你不能也不应该在这里缓存太多图片。如果这样做，iOS\
  \ 运行时环境会持续发出内存警告，直到你的应用被强制关闭。\n\n一些人因为内存环境有限而害怕使用内存缓存。不必担心：你确实有内存可用；你只需要学习如何利用并最大化你的内存能力来提升性能。如果你有顾虑，请不要忘记通过你从第\
  \ 2 章学到的工具，如图 4–13 所示，仔细检查你使用的内存是过少还是过多。\n\n![images](img/0413.jpg)\n\n**图 4–13.**\
  \ *内存分配与使用*\n\n如果你发现与内存环境的容量相比，你使用的内存过少，不要犹豫，可以多用一些。你在内存中缓存的数据和图片越多，应用的性能就会越好。然而，如果你使用了过多内存，请注意你的应用可能会收到内存警告或被强制关闭。\n\
  \n### 全局访问 vs. 严格访问\n\n对于内存缓存，你可能需要考虑希望该缓存可供应用内的任何类和方法访问，还是仅严格限于某些类和方法。如果是全局访问，任何人都可以随时更改缓存。但是，如果你将缓存数据保持得非常私有且难以访问，缓存就会变得无用，因为某些类或方法可能需要这些数据，而只能再次从服务器请求。实际的软件工程术语是*数据封装*，这意味着你应该保护你的数据，并且只与需要它的类/方法共享。\n\
  \n**全局访问**：\n\n你可能需要使用 `static` 来定义全局对象。\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
  \ MyObject {\n}\n\nstatic NSMutableDictionary *imagesCaching;\n\n@end\n```\n\n**严格访问**：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface RootViewController : UITableViewController\
  \ {\n @private\n   NSMutableDictionary *imageCaches; } - (void)cacheImage:(UIImage\
  \ *)image withName:(NSString *)uniqueURL;\n- (void)getCacheImageWithName:(NSString\
  \ *)uniqueURL;\n@end\n\n#import \"RootViewController.h\"\n@implementation RootViewController\n\
  - (void)cacheImage:(UIImage *)image withName:(NSString *)uniqueURL {\n   // 主要代码写在这里\n\
  }\n- (void)getCacheImageWithName:(NSString *)uniqueURL {\n   // 主要代码写在这里\n}\n@end\n\
  ```\n\n### 预加载 vs. 即时加载\n\n预加载是指在实际需要之前就加载图像。这样做的优点是，当实际需要显示文件/图像时可以节省时间。困难之处在于你可能需要猜测是否需要预加载图像。这里有一个你可能需要预加载图像以提升性能的简单案例（图\
  \ 4–14）。\n\n![images](img/0414.jpg)\n\n**图 4–14.** *分页视图的预加载图像*\n\n如图 4–14 所示，对于像\
  \ PageView 这样用户希望获得流畅滚动体验的视图，将图像预加载到缓存中是保持滚动流畅的最佳方式。否则，用户要么必须在滚动到视图后等待（对于多线程或在视图停止后加载图像的情况），要么滚动体验会卡顿。\n\
  \n另一种将图像加载到缓存中的方法称为即时加载。这种方法可以节省实际的带宽或 CPU 加载过程，直到你确定确实需要这些数据/图像。其缺点是可能会降低速度，让用户等待数据。如果你需要加载会消耗大量内存的非常大的数据/图像，并且你的用户愿意等待几秒钟，那么这种方法是不错的选择。\n\
  \n![images](img/0415.jpg)\n\n**图 4–15.** *大图像视图*\n\n图 4–15 是一个示例，用户知道他可能需要等待几秒钟才能获得大图像视图。如果你从文件加载到内存再显示，加载时间会相当快；因此你可能无需担心将图像预加载到内存中。另一个问题是，如果图像很大，将其预加载到内存中会消耗你的应用大量的内存。\n\
  \n\n\n## 总结\n\n根据我的测试，可以看到网络性能远低于文件性能，而文件性能又远低于内存性能。你应该始终尝试使用分析工具找出瓶颈，而不是花费过多时间优化某些部分。换句话说，请避免过度优化。\n\
  \n你已经了解了缓存的基本主题，例如缓存命中、缓存未命中、存储成本、检索成本、替换策略以及几种著名的算法。其中一些算法非常简单但效率不高；另一些可能很高效，但实现起来耗时费力。你可能会使用随机替换算法以求简单，而在复杂情况下使用\
  \ LRU 或 LFU。\n\n你还学习了所有可能的缓存存储方式以及每种方法的使用场景。你可以根据需求的特定目的，将数据存储在临时文件夹、缓存文件夹或文档文件夹中。你也可以选择使用相册，以便轻松与其他应用程序共享。你还学习了在应用内部存储/缓存数据的技术，以及不同结果、优点和缺点。\n\
  \n最后，你学习了内存缓存。你应该允许对内存缓存数据进行全局访问还是严格访问？你应该将数据预加载到内存中，还是即时加载？两者都有优点和缺点，在做出决定之前你需要仔细考虑。\n\
  \n**练习**\n\n1.  自己实现 LFU 缓存算法。如果遇到问题，可以查看我的提示。\n2.  使用适当的工具对两种不同的算法（FIFO 和 LRU）进行基准测试。\n\
  3.  编写一个简单的程序来获取 plist 文件并将其解析为相应的结构化数据。\n4.  获取程序内附带的 plist 文件（`Questions.plist`），并将其转换为\
  \ CoreData 中的数据。\n\n## 第 5 章\n\n## 使用算法和数据结构优化你的应用\n\n在本章中，你将学习：\n\n*   糟糕的算法和数据结构会如何影响应用性能。\n\
  *   衡量算法的理论问题。\n*   应用性能的实际测量。\n*   主要的数据结构和算法：\n    *   iPhone 数据结构：`NSSet`、`NSArray`和`NSDictionary`。\n\
  \    *   其他重要的数据结构及其实现。\n    *   其他算法和问题解决方法：\n        *   递归\n        *   XML 解析中的\
  \ SAX 与 DOM\n\n你也许听说过，在手机开发中由于服务器端的计算能力强大，你不需要担心算法和数据结构。然而，正如上一章关于缓存问题所提到的，特别是当你的手机离线时，你应该将数据本地存储并在手机环境中进行计算。问题就在这里：你的手机环境不如服务器环境强大。换句话说，你没有云计算或数据中心的能力。\n\
  \n## 第一个示例\n\n第一个示例将向你展示，当一个糟糕的算法在严格的手机环境中运行时，会如何影响你的程序。\n\n我的示例代码很简单：\n\n*   在第一个基准测试中，示例包含两个数组，每个数组包含\
  \ 1000 个元素。第一个和第二个数组在元素数量上是相同的。我遍历两个数组来检查两者之间有多少个公共元素。\n*   在第二个基准测试中，示例包含两个集合，每个集合包含\
  \ 1000 个元素。我使用`NSSet` API 中的一个特殊方法来获取两个原始集合之间的公共元素集合。\n\n然后，我分别在模拟器、新设备（安装了 iOS4\
  \ 的 iPhone 4）和旧设备（安装了 iOS3 的 iPhone 3G）上对它们进行了基准测试。结果如表 5-1 所示。\n\n![图片](img/t0501.jpg)\n\
  \n表 5-1 显示第二个基准测试比第一个基准测试快 100 倍。考虑到在处理真实应用时，1000 个元素并不算多，5.44 秒对于新设备来说可能不算什么。但是，请记住，市面上有很多性能较弱的旧设备，而这些设备的所有者可能不会很快升级它们。如此看来，5.44\
  \ 秒在旧设备上运行实际上是一个显著的延迟。\n\n接下来，在深入解释一些概念之前，我们先看看初始源代码和一些简要说明。\n\n代码清单 5-1 和 5-2 的目的是统计第一个数组/集合中有多少对象也属于第二个数组/集合。代码清单\
  \ 5-1 通过使用数组和循环解决问题，而代码清单 5-2 通过使用集合解决问题。\n\n**代码清单 5-1.** *使用数组和循环的第一个基准测试*\n\n\
  ```\n// [self defaultData] 返回一个包含 1000 个不同 NSObject 对象的数组\nNSArray *myFirstArray\
  \ = [NSArray arrayWithArray:[self defaultData]];\nNSArray *mySecondArray = [NSArray\
  \ arrayWithArray:[self defaulData]];\nNSDate *date1 = [NSDate date];\nint i = 0;\n\
  for (NSObject *obj in myFirstArray) {\n    for (NSObject *secondObj in mySecondArray)\
  \ {\n        if ([secondObj isEqual:obj]) {\n            i++;\n            break;\n\
  \        }\n    }\n}\n\nNSDate *date2 = [NSDate date];\nNSLog(@\"time: %f\", [date2\
  \ timeIntervalSinceDate:date1]);\nNSLog(@\"i: %d\", i);\n```\n\n**代码清单 5-2.** *使用集合的第二个基准测试*\n\
  \n```\n- (void)secondBenchmark {\n    NSArray *defaultArray = [self defaultData];\n\
  \    NSMutableSet *myFirstSet = [NSMutableSet setWithArray:defaultArray];\n    NSMutableSet\
  \ *mySecondSet = [NSMutableSet setWithArray:defaultArray];\n\n    NSDate *date1\
  \ = [NSDate date];\n\n    [myFirstSet intersectSet:mySecondSet];\n\n    NSDate *date2\
  \ = [NSDate date];\n    NSLog(@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n\
  \    NSLog(@\"count: %d\", [myFirstSet count]);\n}\n```\n\n对于第一个基准测试，我将 1000 个元素放入每个数组，然后遍历两个数组来查找是否有任何两个元素相同。为了避免重复计数，程序在第二个数组中找到该元素后，就会停止遍历第二个数组。\n\
  \n第二种方法简单得多；通过使用`NSSet`，你只需要将所有元素存储在`NSSet`中，并调用正确的方法来为你完成工作。`intersect`方法会找出两个集合中的相同元素，并将它们放入变量`myFirstSet`中。\n\
  \n正如你所见，错误的方法可能比正确的方法慢 100 倍。此外，正确的方法可能为你节省几个小时的编码时间，因为你不需要重复造轮子，可以直接复用所有必要的数据结构和算法。因此，从一开始就选择正确的方法是个好主意。\n\
  \n## 衡量算法性能的理论问题\n\n我已经在代码清单 5-1 和 5-2 中向你展示了一种使用`NSLog`和`NSDate`来衡量算法性能的方法。然而，在计算机科学中，人们不会使用`NSLog`或分析工具来讨论一个算法相对于其他算法有多快。计算机科学需要精确的数据和标准来确保某些算法确实优于其他算法。\n\
  \n人们通常使用大 O 表示法来描述一个算法在最坏情况下的扩展（性能）情况。（计算机科学中使用的其他术语和定义，我在此不展开讨论。）例如，如果你有一个性能为`O(N)`的算法，那么该算法对一个包含\
  \ 25 个元素的数组进行操作时，需要执行 25 步；相比之下，对一个包含 5 个元素的数组，只需要执行 5 步。因此，25 个元素的数组完成任务所需时间是 5\
  \ 个元素数组的 5 倍。\n\n\n\n### 如何衡量 Big-O\n\n要确定一个算法的 Big-O，你需要观察输入规模如何影响算法的执行时间。另一种方法是通过逻辑推理来思考算法的执行过程。代码清单\
  \ 5–3 将帮助你理解这个概念。\n\n**代码清单 5–3.** *如何衡量 Big-O*\n\n```objectivec\n   int myFirstCount\
  \ = 0;\n   int mySecondCount = 0;\n   // 外层循环\n   for (int i = 0; i < [myFirstArray\
  \ count]; i++) {\n        // 内层循环\n       for (int i = 0; i < [mySecondArray count];\
  \ i++) {\n           myFirstCount++;\n           mySecondCount++;\n       }\n  \
  \     NSLog(@\"my first Count: %d\", myFirstCount++);\n       NSLog(@\"my second\
  \ Count: %d\", mySecondCount++);\n   }\n```\n\n为了便于说明，代码清单 5–3 包含了两个变量 `myFirstCount`\
  \ 和 `mySecondCount` 的重复代码，它们执行的操作完全相同。我稍后会进一步解释。\n\n那么，逐行查看代码，你会发现两个主要的计算逻辑是 `myFirstCount++;`\
  \ 和 `mySecondCount++;`。还有一些其他的计算逻辑，比如 `NSLog(@\"my first Count: %d\", myFirstCount);`\
  \ 和 `NSLog(@\"my second Count: %d\", mySecondCount);`。\n\n在这部分，`m` 和 `n` 分别代表 `myFirstArray`\
  \ 和 `mySecondArray` 中的元素数量。从程序逻辑来看，在外层循环结束后，`myFirstCount` 和 `mySecondCount` 的值都为\
  \ (m * n + m)。它们的总和则为 2 * m * n + 2 * m。\n\n下面的解释将详细说明为什么总结果是 2 * m * n + 2 * m。这将帮助你无需使用实际计数代码就能自行进行性能分析。\n\
  \n外层循环（遍历 `myFirstArray` 的循环）执行了 `m` 次。因为外层循环执行了 `m` 次，所以外层循环内部的每个计算逻辑也都会执行 `m`\
  \ 次。因此，外层循环的计算次数是 `m * (外层循环内部的计算次数)`。\n\n为了计算外层循环内部的计算次数，我需要考虑内层循环和两个 `NSLog` 行。对于外层循环的每一次迭代，内层循环和两个\
  \ `NSLog` 行都会运行一次。所以，外层循环的计算次数是 `m * (内层循环的计算次数 + 2)`。 ( * )\n\n然后，我令 `n` 为 `mySecondArray`\
  \ 中的元素数量。与之前的情况类似，内层循环执行了 `n` 次，并且内层循环内部的每个计算逻辑也都运行了 `n` 次。内层循环内部只有两个计算逻辑：`myFirstCount++`\
  \ 和 `mySecondCount++`。因此，内层循环内部的计算逻辑次数是 `2 * n`。将这个结果代入 ( * ) 式，你得到 `m * (2 * n\
  \ + 2) = 2 * m * n + 2 * m`。\n\n因此，总的计算次数是 `2 * m * n + 2 * m`。\n\n为了简化计算，我令 `m\
  \ = n`。通过用 `n` 替换 `m`，可以重写为 `2 * n * n + 2 * n`。它进一步简化为 `2n² + 2n`。下一步是保留公式中最高阶的项（或增长最快的项），因此只剩下\
  \ `2n²`。最后一步是移除公式中的所有常数，因此只剩下 `n²`，你可以用理论格式将其写作 `O(n²)`。\n\n**注意：** 你现在可以看到为什么我在代码清单\
  \ 5–3 中放入了重复代码；它证明了最终结果并不严重依赖于任何常数。使用 `n²` 还是 `2n²` 没有任何区别。\n\n每种操作都有其自身的增长率。以下是操作增长率的一个示例：`log(n)`，`n`，`n²`。\n\
  \n当 `n = 1` 时，有 `log(1) = 0`，`n = 1`，并且 `n² = 1`。\n\n当 `n = 10` 时，有 `log(10) = 1`，`n\
  \ = 10`，并且 `n² = 100`。你可以看到，当 `n` 增加 9 个单位时，`log(n)` 仅增加 1 个单位，`n` 增加 9 个单位，而 `n²`\
  \ 增加了 99 个单位。\n\n当 `n = 100` 时，有 `log(100) = 2`，`n = 100`，并且 `n² = 10,000`。你可以看到，当\
  \ `n` 增加 9 个单位时，`log(n)` 仅增加 1 个单位，`n` 增加 9 个单位，而 `n²` 增加了 99 个单位。\n\n因此，在增加相同单位数量的情况下，不同操作的增长率不同。图\
  \ 5–1 显示了当你增加 `n` 时，每种操作（`log(n)`，`n`，`n²`，和 `n³`）的增长速度。\n\n![images](img/0501.jpg)\n\
  \n**图 5–1.** *当输入（变量 n）增加时，各 Big-O 记法的结果*\n\n### 实现细节\n\nBig-O 记法不涉及任何实现细节；它既不能告诉你实现一个算法需要多少内存，也不能说明在你的系统中实现该算法有多困难。它也不会告诉你哪些算法可能在输入规模小但重复次数多的情况下表现更好。例如，在小规模情况下，插入排序会比快速排序快；当重复\
  \ 100 次时，插入排序的整体性能将胜过快速排序。因此，Big-O 记法为你提供了对算法的一般性理解，你可以用它来快速比较不同的算法和方法。\n\n**注意：**\
  \ 在这个记法体系中，还有其他用于描述平均情况和最好情况性能的记法。这些记法表明，在考虑具体情况时，每个算法的表现如何。\n\n### 著名算法的 Big-O\n\
  \n为了让你更好地理解 Big-O，表 5–2 列出了著名的算法及其对应的 Big-O 记法，以便你了解这些算法在理论上的表现。\n\n![images](img/t0502.jpg)\n\
  \n你可能会对理解 Big-O 记法的顺序感到困惑。顺序是这样的：`O(log(n)) < O(n) < O(n * log(n)) < O(n²)`。\n\n\
  如果你看一下表 5–2，这意味着：\n\n*   冒泡排序比归并排序和快速排序慢。\n*   线性搜索比二分搜索慢。\n\n因此，由于归并排序和快速排序运行速度比冒泡排序快，在大多数情况下你应该优先选择这些排序算法而不是冒泡排序。\n\
  \n## 实际测量\n\n在实际使用中，你需要将一些关于 Big-O 的理论与第 2 章中介绍的检测工具和分析工具结合起来。以下是用于衡量算法和数据结构性能的重要工具的快速回顾：CPU\
  \ 采样器和时间分析器。\n\n![images](img/0502.jpg)\n\n**图 5–2.** *在程序上运行 CPU 采样器的结果*\n\n![images](img/0503.jpg)\n\
  \n**图 5–3.** *程序内部每个方法和函数的详细结果*\n\n图 5–2 展示了 CPU 采样器的使用情况，显示了程序运行时的系统负载、用户负载和总负载。图\
  \ 5–3 提供了程序内部每个方法的更多细节，例如每个方法被调用的频率以及完成一个方法所需的时间。\n\n![images](img/0504.jpg)\n\n\
  **图 5–4.** *时间分析器工具*\n\n![images](img/0505.jpg)\n\n**图 5–5.** *时间分析器的详细结果*\n\n时间分析器（图\
  \ 5–4）更侧重于程序的运行时间。图 5–5 显示了从时间角度出发的详细结果。\n\n你应该使用检测工具来确定哪些方法实际需要优化。所有方法都可能运行缓慢或需要优化，但你应该只关注那些在程序生命周期中频繁运行的方法。你只有有限的时间和资源来优化该方法的算法和数据结构。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n## 数据结构与算法\n\niOS 环境的\
  \ Cocoa Touch 框架为你提供了三种主要的数据结构，以满足大多数使用场景：`NSSet`、`NSArray` 和 `NSDictionary`。每一种都有其优势与最佳使用场景。我将讨论这些在\
  \ iPhone 上的主要数据结构，然后通过代码和示例，带你了解其他一些重要的数据结构：链表、二叉树、栈、队列和图，以便你在需要性能更优的数据结构时能够自行构建。\n\
  \n在讨论数据结构时，我们不能将数据结构内部使用的算法剥离出来单独讨论。例如，在不了解哈希函数作用的情况下，讨论 `NSDictionary` 和哈希表是没有意义的。同样，不理解二分查找，就难以理解平衡二叉树。因此，我将并行讨论它们；我会介绍数据结构以及它们为加速性能所使用的算法。在最后几节中，我会单独介绍数据结构之间通用的常见算法。\n\
  \n## Cocoa Touch 数据结构\n\n实际上，你会用到 `NSMutableArray` 和 `NSArray`、`NSMutableSet` 和\
  \ `NSSet`、`NSMutableDictionary` 和 `NSDictionary`。`NSMutable` 类与 `NS` 类的区别在于，你可以更改\
  \ `NSMutable` 类的内容，但不能更改 `NS` 类的内容。后者的优势在于保护数据，确保任何能接触到数据的代码都无法更改其内容。由于你不能修改 `NSArray`，我将在示例中使用\
  \ `NSMutableArray` 的案例。\n\n讨论数据结构时，我将从以下几个主要方面来阐述其性能：插入、删除、搜索、访问和排序。我将使用大 O 表示法来让你了解每种数据结构在插入、删除、搜索或排序操作下的速度表现。\n\
  \n### NSMutableArray\n\n数组是最简单的数据结构形式。因此，理解数组在检索、插入、更新或删除数据时的工作原理，将有助于你提升应用的性能。\n\
  \n![images](img/0506.jpg)\n\n**图 5–6.** *数组图示*\n\n数组是一组独立项集合，存放在一个数据块中，如图 图 5–6\
  \ 所示，块编号从 0 到数组长度。`NSArray` 按顺序存储数据，因此不允许你在任意位置插入数据。`NSArray` 还允许你在数组中存储重复数据。\n\n\
  插入/删除:\n\n*   如果在数组末尾插入/删除，速度非常快：`O(1)`。\n*   如果在数组中间或开头插入，所有数据都需要向右移动，如图 图 5–7\
  \ 所示：`O(n)`。\n\n    ![images](img/0507.jpg)\n\n    **图 5–7.** *向数组的第二个位置插入一项*\n\n\
  搜索:\n\n*   每次查找一个元素时，都需要遍历整个数组：`O(n)`。此过程如图 图 5–8 所示。数组内部搜索的一个类似问题是确定该数组是否包含某个特定元素。\n\
  \n    ![images](img/0508.jpg)\n\n    **图 5–8.** *在数组中搜索特定项*\n\n访问:\n\n*   你可以非常快速地访问数组内的任何索引：`O(1)`。\n\
  \n排序:\n\n*   通常，数组中的排序通过归并排序或快速排序实现。`NSMutableArray` 的排序性能应为 `O(n * log(n))`。\n\n\
  表 5–3 涵盖了 `NSMutableArray` 的常用方法和 API。\n\n![images](img/t0503.jpg)\n\n### 哈希\n\n\
  哈希是计算机科学和软件工程中的一项重要技术。它用于提升存储集合的性能。在 iPhone 应用中，哈希在 `NSSet` 和 `NSDictionary` 内部实现。要完全理解为什么\
  \ `NSSet` 和 `NSDictionary` 在搜索项时如此之快，你首先需要理解哈希。\n\n哈希函数的一般任务是确保为每个不同的项创建一个唯一的哈希值。并且相同的项应始终返回相同的哈希值。\n\
  \n例如，`@\"khang\"` 和 `@\"vo\"`（我的名字）是两个不同的字符串；因此，哈希函数应为每个字符串生成不同的值。真正的哈希算法很复杂，需要大量优化，因此我将用一个简单的哈希计算作为示例。对于字符串，我可以使用字母表中每个字符的整数值以及字符的位置来计算字符串的哈希值（图\
  \ 5–9）。\n\n![images](img/0509.jpg)\n\n**图 5–9.** *字符串内所有字符的位置*\n\n```\n=> @\"khang\"\
  \ = 11 * 10 ^ 4 + 8 * 10 ^ 3 + 0 * 10 ^ 2 + 14 * 10 ^ 1 + 7 = 110,000 + 8,000 +\n\
  0 + 140 + 7 = 118147\n```\n\n对“vo”执行类似操作，你将得到哈希值 `22 * 10¹ + 15 = 235`。\n\n使用这个哈希函数，你可以看到为两个不同的项创建了两个唯一的哈希值。哈希函数的目的是为特定数据生成一个唯一的值。稍后，我将探讨拥有这种数据唯一表示形式的好处。\n\
  \n### Objective-C 中的 isEqual 和 Hash 方法\n\n在 Objective-C 中，如同其他面向对象编程语言一样，每个对象都有两个重要的方法：`isEqual:`\
  \ 和 `hash`。我们刚刚讨论过哈希，所以你对 `hash` 函数的作用应该有了清晰的认识。在讨论 `isEqual` 方法之后，我将讨论如何在 Objective-C\
  \ 中实现/重写 `hash` 方法。\n\n#### isEqual\n\n在大多数面向对象编程语言中，当人们谈论两个对象的相等性时，他们指的是两种情况之一：内存中的确切对象，以及语义相等（意义上的相等）。默认情况下，对于单个对象，这两种情况是相同的。第一种相等性讨论的是变量是否指向内存中的同一个对象，通过\
  \ `obj1 == obj2` 来检查。然而，对于后者，两个对象的相等性通过方法 `[object1 isEqual:object2]` 来检查；如果该方法返回\
  \ `YES`，则两个对象相等，这与检查内存引用是不同的。\n\n为了更清楚，这里有一个类 `MyItem`，它重写了 `isEqual:` 方法，如下所示：\n\
  \n```\nMyItem.h\n@interface MyItem : NSObject {\n @private\n   NSString *identifier;\n\
  }\n\n@property (nonatomic, copy) NSString *identifier;\n\n- (id)initWithIdentifier:(NSString\
  \ *)anIdentifier;\n\n@end\n\nMyItem.m\n@implementation MyItem\n@synthesize identifier;\n\
  \n- (id)initWithIdentifier:(NSString *)anIdentifier {\n   if (self = [super init])\
  \ {\n       self.identifier = anIdentifier;\n   }\n   return self;\n}\n\n- (BOOL)isEqual:(id)object\
  \ {\n\n   // 默认情况下，如果两个变量指向内存中的同一个对象，则它们应始终相等\n   if (object == self) {\n      return\
  \ YES;\n   }\n\n   if (![object isKindOfClass:[MyItem class]]) {\n       return\
  \ NO;\n   }\n\n   MyItem *myItem = (MyItem *)object;\n   return [myItem.identifier\
  \ isEqual:self.identifier];\n}\n\n- (NSUInteger)hash {\n   return [self.identifier\
  \ hash];\n}\n\n@end\n```\n\n对于这个类，你可以通过给予相同的标识符，轻松创建一个与特定对象相等的模拟对象。例如，如果第一个对象由 `MyItem\
  \ *item1 = [[MyItem alloc] initWithIdentifier:@\"1\"];` 创建，另一个对象由 `MyItem *item2\
  \ = [[MyItem alloc] initWithIdentifier:@\"1\"];` 创建，那么\n\n```\n[item1 isEqual:item2]\
  \ 返回 YES 而 item1 == item2 返回 NO;\n```\n\n\n\n#### 哈希方法\n\n如前所述，两个相等的对象必须具有相同的哈希值。因此，人们通常使用重写的\
  \ `isEqual` 方法来实现 `hash` 方法。如果你的 `isEqual` 方法由变量 `identifier` 决定，那么你的哈希方法应该类似于代码清单\
  \ 5–4 所示。\n\n**代码清单 5–4.** *哈希方法*\n\n```\n- (NSUInteger)hash {\n   int hash =0;\n\
  \   hash = 37 * [self.identifier hash];\n   return hash:[self.identifier1 hash];\n\
  }\n```\n\n这里随意选取了数字 37，但你选择的任何数字都必须是质数整数。因此，如果你没有严重的性能问题，可以选择相同的数字或任何质数整数，都不会有问题。\n\
  \n**注意：** 在代码清单 5–4 中，我演示了如何自行编写哈希算法，因此我基于字符串的哈希值计算了一个新的哈希值。在像这样简单的情况下，你只需直接返回 `[self.identifier\
  \ hash];` 即可。\n\n### NSMutableSet\n\n`NSSet` 是苹果公司对抽象概念“集合”的实现。集合是一个无序的容器，不包含重复元素。换句话说，`NSSet`\
  \ 中不存在任何一对元素 `e1` 和 `e2` 使得 `[e1 isEqual:e2];` 返回 `YES`。\n\n基于集合的唯一性特征，人们通常基于哈希算法来实现集合。哈希算法将使得集合能够非常轻松地找到其中的任何元素。\n\
  \n现在，想象你有一个如图 5–10 所示的集合。你的集合容量为七个元素。\n\n![图片](img/0510.jpg)\n\n**图 5–10.** *使用哈希方法在集合中查找元素*\n\
  \n一个新元素“vo”到达了，你想要将其添加到集合中。由于你的集合不能包含重复元素，首要任务是检查集合中是否已包含元素“vo”。如图 5–8 所示，如果使用数组来实现，你必须遍历该数组来检查相等性。但是，使用集合则简单得多。\n\
  \n第一步：哈希运算\n\n`@”vo”` ![图片](img/arrow2.jpg)`118147 mod 13 = 1` （使用 `mod 13` 是因为集合的容量应为质数整数，这里我选择\
  \ 13 作为集合容量的示例。）\n\n第二步：你检查索引位置 1 处的元素，如图 5–11 所示。\n\n![图片](img/0511.jpg)\n\n**图\
  \ 5–11.** *使用哈希方法在集合中查找元素*\n\n这样你就找到了它。如果集合中已经包含元素 `@”vo”`，则不应添加重复项。如果该索引位置没有任何内容，那么\
  \ `@”vo”` 应被添加到此索引位置。（为简化起见，我不讨论两个不同元素具有相同哈希值时的情形，尽管这在现实中是可能发生的。）\n\n插入/删除：\n\n\
  *   如前例所示，插入/删除操作可以通过哈希函数即时完成，并将元素添加到正确的索引位置。性能为：`O(1)`。但是，你无法确定插入的位置。\n\n搜索：\n\n\
  *   如果你要搜索一个对象，可能有三个目的。第一个目的是检查该对象是否包含在集合中。第二个目的是在集合中找到一个与你手头对象相等的对象。最后一个目的是查看集合中的对象是否具有满足某个条件的特定属性。\n\
  \    *   对于第一个目的，你可以直接使用 `[set containsObject:obj1];` 方法，它会非常快速地返回结果：`O(1)`。\n \
  \   *   对于第二个目的，你需要创建一个与你正在查找的对象相等的模拟对象。例如，在 `isEqual:` 部分，你可以创建一个新对象，使得 `[newObj\
  \ isEqual:oldObject]` 返回 `YES`。好处是创建新对象的成本很低，或者你无需知道太多信息。之后，你可以调用 `MyItem *oldObject\
  \ = [set member:newObject];`，从而获得包含完整信息的旧对象。这种情况下性能为：`O(1)`。\n    *   最后一个目的是查找某个属性，例如以字符“k”开头的名称。你需要像在数组中一样遍历所有元素。这种情况下性能为：`O(n)`。\n\
  \n访问：\n\n*   你不能像在数组中那样通过索引直接访问任何元素。搜索部分讨论的一种访问元素的方法是创建一个与你想要访问的对象 `isEqual:` 的模拟对象。性能为\
  \ `O(1)`。\n\n排序：\n\n*   Cocoa Touch 框架没有提供对 `NSMutableSet` 排序的好方法。它只提供了一个返回排序后数组的方法。基于数组的排序性能，我可以估计集合排序的性能为：`O(nlogn)`。\n\
  \n表 5–4 *展示了 NSMutableSet 的常用方法和 API。*\n\n![图片](img/t0504.jpg)\n\n![图片](img/t0504a.jpg)\n\
  \n**注意：** 使用 `NSMutableSet` 和 `NSSet` 的一个重要因素是其丰富的集合操作 API。就像数学中的集合概念一样，你可能需要使用特殊的运算，如并集、交集和差集。如果你需要大量操作具有唯一数据的集合，并且关心并集、交集或差集运算，那么集合是最佳选择。\n\
  \n例如，你得到两个列表：一个是打网球的人的列表，另一个是踢足球的人的列表。现在，你需要找出三个列表：\n\n*   既打网球又踢足球的人。\n*   只打网球的人。\n\
  *   只踢足球的人。\n\n我将把这个作为练习留给你去实践。你应该分别用数组方法和集合方法尝试实现。\n\n\n\n##### `NSMutableDictionary`\n\
  \n`NSDictionary`和`NSMutableDictionary`是计算机科学中哈希表概念的具体实现。哈希表的规范是：你有一个唯一键的列表，每个键对应一个值，该值不需要是唯一的。哈希表利用哈希概念来确保其拥有一组唯一的键。\n\
  \n如图 5–12 所示，`NSMutableDictionary`包含一个键/值对列表。键与一个对象关联，并且可以通过该键访问该对象。\n\n当你有一对新的（键值）要添加到`NSMutableDictionary`时，你需要计算哈希值并将其添加进去，方式与上述`NSMutableSet`相同。键集合类似于一个集合，只能包含唯一项。经过哈希函数处理后，你可以确定该键在键集合中的索引，然后将键和值都插入到正确的位置。\n\
  \n![images](img/0512.jpg)\n\n**图 5–12.** *字典概念说明*\n\n在最简单的情况下，如果键是一个整数，你可以将`NSMutableDictionary`的工作方式理解为一个数组，左侧是索引，右侧是值。对于字典而言，主要区别在于键会被哈希处理以生成一个索引。\n\
  \n现在，让我们分析`NSMutableDictionary`在每个操作（插入/删除、搜索、访问和排序）中的性能。\n\n**插入/删除：**\n\n*   与集合的情况一样，字典的插入/删除通过确定键的正确位置而立即完成。性能为`O(1)`。\n\
  \n**搜索：**\n\n*   与集合的情况相同，你需要创建一个对象，对该对象调用`[newObj isEqual:oldObj]`返回`YES`，并使用该对象来查找值。性能为`O(1)`。\n\
  \n**访问：**\n\n*   在字典中，你只关心访问某个键的值。如果你已经知道键，那么访问值的性能为`O(1)`。\n\n**排序：**\n\n*   你无法对字典进行排序，因此你可以选择对键集合或值集合进行排序。无论哪种方式，你都需要从字典中创建一个新数组，然后对其进行排序。性能与对数组排序相同：`O(nlogn)`。\n\
  \n表 5–5 展示了`NSMutableDictionary`的常用方法和 API。\n\n![images](img/t0505.jpg)\n\n**注意：**\
  \ 要将一个对象作为键放入`NSMutableDictionary`，相应的类必须遵循`NSCopying`协议，并实现`copyWithZone:`方法。例如，`NSString`遵循`NSCopying`协议，但`UIView`不遵循。因此，你不能在`NSDictionary`内将`UIView`用作键。\n\
  \n我已经介绍了 Cocoa Touch 框架免费提供的三个主要的重要数据结构及其 API。这些类及其方法将在合理的时间内处理你的大多数问题。接下来，我将介绍针对特定情况的其他重要且有用的数据结构。在花费时间构建新的数据结构之前，请记得对你的应用性能进行基准测试和测试。使用这些内置且经过充分测试的数据结构应始终是你的首选。\n\
  \n## 其他数据结构\n\n如果你需要考虑超越基本的内置类，这里有一些其他的基本数据结构：\n\n*   **链表：** 当你需要进行大量插入/删除操作并希望保持像数组一样的有序集合时，链表非常适用。\n\
  *   **二叉树：** 当你需要一个始终排序的集合时，二叉树非常适用。这不同于每当你向数组中插入一个新项就需要再次对整个数组进行排序。在`NSArray`（即使是已排序的数组）中进行搜索，总是需要线性搜索，因为无法知道数组是否已经排序。当你需要对项目进行二分查找时，二叉树更好。二分查找与线性查找相比，性能为`O(logn)`对比`O(n)`。\n\
  *   **栈和队列：** 当你需要构建一个只允许在末尾添加并从末尾取出（栈），或者在末尾添加并从开头取出（队列）的 API 时，它们非常适用。你可以通过链表或普通数组轻松实现它们。\n\
  *   **图：** 这是数学和计算机科学中用于演示复杂问题的一个概念。尽管许多问题会在服务器端解决，但了解图论将帮助你解决 iPhone 端的许多问题。\n\n\
  \n\n### 链表\n\n在许多情况下，链表和数组的规格说明及支持的公开方法（API）通常是相同的。你可以向链表中的任意位置添加对象、从链表内的任意索引处检索对象、检查链表中是否存在某个对象，以及对链表进行排序。然而，链表与数组的主要区别如\
  \ 图 5–13 所示。\n\n![images](img/0513.jpg)\n\n**图 5–13.** *数组与链表的比较*\n\n如图所示，在数组中，你将元素存储在带有索引的位置上，并且可以使用索引访问数组中的任意元素。然而，在链表中，持有列表的主要\
  \ `List` 对象仅保存第一个和最后一个元素。（为简单起见，我不讨论可以向前和向后移动的双向链表）。要访问链表内的任意对象，你必须从两端之一开始：第一个元素或最后一个元素。如果从第一个元素开始，就逐个向前移动，直到到达所需的索引。如果从最后一个元素开始，就逐个向后移动，直到到达所需的索引。图\
  \ 5–14 和 5–15 说明了这一过程。\n\n![images](img/0514.jpg)\n\n**图 5–14.** *访问链表中索引为 2（第三个元素）的元素*\n\
  \n![images](img/0515.jpg)\n\n**图 5–15.** *访问链表中倒数第三个元素*\n\n我将为链表提供一个示例实现；它并非完美的实现，但在大多数情况下可以使用。你应该下载源代码项目\
