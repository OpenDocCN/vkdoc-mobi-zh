    \ of a fast application, all calculations here have to be really fast. Otherwise,\
    \ what the user perceives about your navigation and animation is really weak.\
    \ A good practice is to setup views' attributes (for example, background color\
    \ or text color).\n    *   For example, a user presses a Back button to go back\
    \ to a view A. However, inside the method `viewDidAppear` of view A, there is\
    \ a calculation that takes time. The result takes a few seconds, but in the meantime\
    \ the UI thread is blocked to process the logic inside view A and can't display\
    \ view A.\n*   `viewDidAppear`: This method is called right after your view is\
    \ displayed, so you can put logic processing here. However, if your process changes\
    \ the view quite a bit after it finishes, the user can get confused, which is\
    \ not a positive experience.\n    *   For example, you have a sort algorithm to\
    \ sort your table view. When user gets sees view A, the old table is still displayed.\
    \ And then suddenly all rows change without any warning or an explanation as to\
    \ why this just happened.\n*   `viewWillDisappear`: This is called right before\
    \ the view disappears from the UI. Anything belonging to the view that you want\
    \ to show to your users should be put here. Note that you should not put too much\
    \ logic processing code here. If you do put a lot of processing code here, it\
    \ will take too much time for a new view to be displayed.\n*   `viewDidDisappear`:\
    \ This is called right after your view disappears. You can't show any view or\
    \ any UI effects to user.\n\nThere is no hard and fast rule as to where you should\
    \ put your logic processing. I give you all basic concepts and you can use them\
    \ to create the best user perception about your app's performance.\n\n### Object\
    \ Copy\n\nSo why do you need to know about object copying and why do you need\
    \ to it? Copying an object is useful if you don't want to change the old object\
    \ because it could affect other parts of the program. In some cases, you can't\
    \ change the object at all, so you copy the content of that object in order to\
    \ modify it.\n\n#### Shallow vs. Deep Copy\n\n*Shallow copying* actually means\
    \ the same as *retaining* in objective-C. Because shallow copying means copying\
    \ the pointer of the object to a new variable, there is no difference between\
    \ shallow copying and retaining.\n\n*Deep copying*, on the other hand, means you\
    \ actually create a new object, and copy all data and instance variables from\
    \ the old object into the new object.\n\nTo illustrate the differences between\
    \ shallow copy and deep copy in objective-C, consider these code examples for\
    \ each case:\n\nShallow copying:\n\n`- (void)setMyObj:(NSObject *)newObj {`\n\
    `  if (newObj != myObj) {`\n`    myObj = newObj;`\n`  }`\n`}`\n\nDeep copying:\n\
    \n`- (void)setMyObj:(NSObject *)newObj {`\n`  if (newObj != myObj) {`\n`    myObj\
    \ = [newObj copy];`\n`  }`\n`}`\n\nIn the first case, you assign the variable\
    \ to the new object and retain the object. In objective-C, this is a shallow copy.\
    \ In the deep copy case, the code actually copies the value and instance variables\
    \ inside the `newObj` into `myObj`.\n\n#### Implementing a Deep Copy\n\nIf you\
    \ want to do a truly deep copy, you have to follow the whole hierarchy of the\
    \ object.\n\n*   You need to create a new object.\n*   You copy all instance variables\
    \ of the old object into the new object.\n*   If the instance variable is a primitive\
    \ data type like `float`, `int`, or `double`, you just need to copy that value.\
    \ `Boolean` is not a primitive data type but you also only copy the value of a\
    \ `Boolean` instance variable.\n*   For each instance variable that is a pointer\
    \ type, you will need to copy their instance variable as well.\n*   The process\
    \ continues to the end.\n\nThis process can be long and hard to implement. Some\
    \ built-in objects and libraries don't support deep copying. Therefore, you should\
    \ always find a compromise between shallow and deep copying. For example, you\
    \ won't want to deep copy a delegate, which can cause a retain cycle, discuss\
    \ previously, where object A owns object B and object B also owns object A. Moreover,\
    \ you usually don't want to copy your delegate because at the end you want to\
    \ callback to that delegate, not the new delegate.\n\nThis is an example of a\
    \ mixed approach between shallow and deep copy:\n\n`@interface Item : NSObject\
    \ {`\n`   NSString *itemName;`\n`   CGFloat price;`\n`   id delegate;`\n`}`\n\n\
    `@property (nonatomic,  copy) NSString *itemName;`\n`@property (nonatomic, weak)\
    \ CGFloat price;`\n`@property (nonatomic, weak) id delegate;`\n\n`@end`\n\nIn\
    \ this example, you can see that there are three instance variables. The first\
    \ one is `itemName` (which is a pointer object), the second one is a primitive\
    \ data, and the last one is a delegate.\n\n![images](images/0708.jpg)\n\n**Figure\
    \ 7–8.** *Deep copy of an object*\n\nAs you can see in [Figure 7–8](#Chapter07.html#fig_7_8),\
    \ the delegate object will be kept the same and shared between the original item\
    \ and new item. The `itemName` object will be copied and have a new memory address\
    \ (0x9124 instead of 0x8028) but have the same value of “egg”. The primitive variables,\
    \ such as `price,` will be copied over and have no memory address.\n\n#### Integrating\
    \ a Copy Method into an Object\n\nTo have a deep copy of an object, you will usually\
    \ have to override the method `copyWithZone:.` When an object is sent a `copy`\
    \ message, this method will be called. Here is some code for overriding this method.\
    \ You will need to create a new object by `alloc` and `init` and then use the\
    \ `set` method to set the value for instance variables.\n\n`- (id)copyWithZone:(NSZone\
    \ *)zone {`\n`   Item *copy = [[Item allocWithZone: zone] initWithName:self.itemName];`\n\
    `   copy.price = self.price;`\n`   copy.delegate = self.delegate;`\n`   return\
    \ copy;`\n`}`\n\nAs stated previously, if there are other custom type instance\
    \ variables inside your Item class, you need to implement the copy for those as\
    \ well. In my example, for the sake of simplicity, the code doesn't create a new\
    \ `itemName` object.\n\n### Advanced Autorelease Pool\n\nYou learned several basic\
    \ techniques about memory in the previous sections of this chapter. This section\
    \ will cover more advanced techniques for using the autorelease pool and show\
    \ you where you should use it to have high performance in restricted cases.\n\n\
    In every thread, you must have an autorelease pool to collect and store all autoreleased\
    \ objects. If you don't have an autorelease pool in every thread, all autoreleased\
    \ objects will be leaked and you will have a big memory leak. The autorelease\
    \ pool is organized inside stacks; this is explained in the following section."
  trans: "\n# 在用户界面中显示与隐藏视图\n\n在用户界面中显示和隐藏视图的过程与内存的关系不大，但与 iOS 应用的性能以及用户对性能的体验密切相关。\n\
    \n视图控制器生命周期中有四种主要方法，用于表示视图在显示和隐藏时的四种不同状态。\n\n- `viewWillAppear`：此方法在你的视图显示之前被调用。只有在此方法执行完毕后，你的视图才会显示出来。为了营造应用流畅的良好体验，这里的所有计算都必须非常迅速。否则，用户对你的导航和动画的感知将会非常差。一个良好的实践是设置视图的属性（例如，背景色或文字颜色）。\n\
    \    - 例如，用户按下返回按钮回到视图 A。但是，在视图 A 的 `viewDidAppear` 方法内部，有一个需要耗时的计算。结果需要几秒钟才能得出，但在此期间，UI\
    \ 线程被阻塞来处理视图 A 内部的逻辑，导致无法显示视图 A。\n- `viewDidAppear`：此方法在你的视图显示之后立即被调用，因此你可以在此处放置逻辑处理代码。然而，如果你的处理过程完成后对视图做了较大改动，用户可能会感到困惑，这不是一种积极的体验。\n\
    \    - 例如，你有一个排序算法需要对表格视图进行排序。当用户看到视图 A 时，旧的表格仍然显示着。然后突然间，所有行在没有预先警告或任何解释的情况下发生了变化。\n\
    - `viewWillDisappear`：此方法在视图从 UI 中消失之前调用。任何你想展示给用户的、属于该视图的内容，都应该放在这里。请注意，你不应该在此处放置过多逻辑处理代码。如果放置了过多处理代码，将导致新视图的显示耗时过长。\n\
    - `viewDidDisappear`：此方法在你的视图消失之后被调用。你无法向用户展示任何视图或 UI 效果。\n\n关于应该将逻辑处理代码放在哪里，并没有硬性规定。我为你提供了所有基本概念，你可以利用它们来创造用户对你应用性能的最佳感知。\n\
    \n## 对象拷贝\n\n那么，为什么需要了解对象拷贝，以及为什么需要执行它呢？如果你不想改变旧对象，因为那可能会影响程序的其他部分，那么拷贝对象就很有用。在某些情况下，你根本无法更改对象，所以你需要复制该对象的内容以便进行修改。\n\
    \n### 浅拷贝 vs. 深拷贝\n\n*浅拷贝* 在 Objective-C 中实际上与*保留* 的含义相同。因为浅拷贝意味着将对象的指针复制到一个新变量，所以浅拷贝和保留之间没有区别。\n\
    \n另一方面，*深拷贝* 意味着你实际创建了一个新对象，并将旧对象中的所有数据和实例变量复制到新对象中。\n\n为了说明 Objective-C 中浅拷贝和深拷贝的区别，请考虑每种情况的代码示例：\n\
    \n浅拷贝：\n\n```\n- (void)setMyObj:(NSObject *)newObj {\n  if (newObj != myObj) {\n\
    \    myObj = newObj;\n  }\n}\n```\n\n深拷贝：\n\n```\n- (void)setMyObj:(NSObject *)newObj\
    \ {\n  if (newObj != myObj) {\n    myObj = [newObj copy];\n  }\n}\n```\n\n在第一种情况下，你将变量指向新对象并保留该对象。在\
    \ Objective-C 中，这就是浅拷贝。在深拷贝的情况下，代码实际上将 `newObj` 内部的值和实例变量复制到 `myObj` 中。\n\n###\
    \ 实现深拷贝\n\n如果你想要进行真正的深拷贝，你必须遍历整个对象的层次结构。\n\n- 你需要创建一个新对象。\n- 你将旧对象的所有实例变量复制到新对象中。\n\
    - 如果实例变量是原始数据类型，例如 `float`、`int` 或 `double`，你只需要复制该值。`Boolean` 不是原始数据类型，但你同样只需复制\
    \ `Boolean` 实例变量的值。\n- 对于每个是指针类型的实例变量，你将需要同时复制它们的实例变量。\n- 这个过程一直持续到结束。\n\n这个过程可能既漫长又难以实现。一些内置对象和库不支持深拷贝。因此，你应该始终在浅拷贝和深拷贝之间找到一个折衷方案。例如，你不会想要深拷贝一个委托，这可能导致之前讨论过的*保留环*问题，即对象\
    \ A 拥有对象 B，并且对象 B 也拥有对象 A。此外，你通常不希望复制你的委托，因为最终你要回调的是那个委托，而不是新委托。\n\n这是一个介于浅拷贝和深拷贝之间的混合方法的示例：\n\
    \n```\n@interface Item : NSObject {\n   NSString *itemName;\n   CGFloat price;\n\
    \   id delegate;\n}\n\n@property (nonatomic,  copy) NSString *itemName;\n@property\
    \ (nonatomic, weak) CGFloat price;\n@property (nonatomic, weak) id delegate;\n\
    \n@end\n```\n\n在这个例子中，你可以看到有三个实例变量。第一个是 `itemName`（它是一个指针对象），第二个是原始数据，最后一个是委托。\n\
    \n![images](img/0708.jpg)\n\n**图 7–8.** *对象的深拷贝*\n\n如 图 7–8 所示，委托对象将保持不变，并在原始\
    \ item 和新 item 之间共享。`itemName` 对象将被复制并拥有一个新的内存地址（0x9124 替代了 0x8028），但具有相同的值 “egg”。原始变量，例如\
    \ `price`，将被复制过来且没有内存地址。\n\n### 将拷贝方法集成到对象中\n\n要实现对对象的深拷贝，你通常需要重写 `copyWithZone:`\
    \ 方法。当向对象发送 `copy` 消息时，此方法将被调用。以下是重写此方法的一些代码。你需要通过 `alloc` 和 `init` 创建一个新对象，然后使用\
    \ `set` 方法为实例变量设置值。\n\n```\n- (id)copyWithZone:(NSZone *)zone {\n   Item *copy\
    \ = [[Item allocWithZone: zone] initWithName:self.itemName];\n   copy.price =\
    \ self.price;\n   copy.delegate = self.delegate;\n   return copy;\n}\n```\n\n\
    如前所述，如果你的 `Item` 类内部还有其他自定义类型的实例变量，你也需要为它们实现拷贝。在我的例子中，为简单起见，代码没有创建一个新的 `itemName`\
    \ 对象。\n\n## 高级自动释放池\n\n在本章的前面部分，你已经学习了几种关于内存的基本技术。本节将介绍使用自动释放池的更高级技术，并向你展示在受限情况下应该在哪里使用它以获得高性能。\n\
    \n在每个线程中，你必须有一个自动释放池来收集和存储所有自动释放的对象。如果你在每个线程中没有自动释放池，所有自动释放的对象都将泄漏，你将面临严重的内存泄漏。自动释放池在栈内组织；这将在下一节中解释。\n"
- fmt: "# Autorelease Pool and Stacks\n\n`Autorelease` pools are stored inside a stack\
    \ and are commonly understood to be nested. Whenever you create a new `autorelease`\
    \ pool, it will be pushed on the top of the stack. And all new objects that are\
    \ `autoreleased` will be pushed into that new `autorelease` pool.\n\nAs you can\
    \ see in the following code, the objects (such as `myArray` and `myString`) inside\
    \ the method `doSomething` will be stored in `myPool`, not the main pool of the\
    \ application:\n\n```\n- (void)doSomething {\n  @autoreleasepool {\n    NSArray\
    \ *myArray = [NSArray array];\n    NSString *myString = [NSString string];\n \
    \ }\n}\n```\n\nHere is the main pool is inside the `main` method, as usual:\n\n\
    ```\nint main(int argc, char *argv[]) {\n  @autoreleasepool {\n    int retVal\
    \ = UIApplicationMain(argc, argv, nil, nil);\n  }\n  return retVal;\n}\n```\n\n\
    At the end of the `@autoreleasepool` block, all `autoreleased` objects are stored\
    \ inside that pool will be released when the event life cycle ends.\n\n[Figure\
    \ 7–9](#Chapter07.html#fig_7_9) demonstrates this concept. This is an important\
    \ concept for good performance—knowing to release the object as soon as possible.\n\
    \n![images](images/0709.jpg)\n\n**Figure 7–9.** Autorelease pool in stacks\n\n\
    ## Autorelease Pools and Threads\n\nWhen a new thread is created, you need to\
    \ create a new `autorelease` pool object and associate that pool with the new\
    \ thread. So when the thread stops, your `autorelease` pool gets deallocated and\
    \ all the `autoreleased` objects are deallocated as well. I covered this topic\
    \ in depth in [Chapter 6](#Chapter06.html#ch6), so please review it if you need\
    \ some help understanding this concept.\n\n## Autorelease Pool's Effect on Performance\n\
    \nThe old rule of memory management still applies for code that is written with\
    \ ARC. If you call a method that does not have `new`, `alloc`, and `copy` in its\
    \ name, that object is already `autoreleased`. If you run a loop that creates\
    \ too many `autoreleased` objects, you will soon run out of memory.\n\nThis code\
    \ demonstrates the best way to do memory management in looping:\n\n```\n- (void)doSomethingWithAutoRelease\
    \ {\n  for (int i = 0; i < 1000; i++) {\n    @autoreleasepool {\n      Product\
    \ *product = [Product productWithItemID:@\"\"];\n      // process and display\
    \ the product here\n    }\n  }\n}\n```\n\nAfter the loop finishes and at the end\
    \ of the `@autoreleasepool` block, all of `autoreleased` objects are released.\
    \ This way you can control and release all unused objects and take your memory\
    \ back.\n\n# Instruments\n\n`Instruments` were covered in [Chapter 2](#Chapter02.html#ch2)\
    \ when I discussed benchmarking using devices and simulators. In this section,\
    \ I will briefly discuss common problems plus some more advanced problems that\
    \ can affect what memory management approach you should choose.\n\nThere are four\
    \ main instruments that you need to use most of the time.\n\n- Static Analyzer\n\
    - Leaks Instrument\n- Zombie\n- Object allocation\n\n## Static Analyzer\n\nStatic\
    \ Analyzer is good to quickly check for small and obvious memory leaks. For example,\
    \ if you `alloc` a new object and you don't release it inside that method, as\
    \ shown in [Figure 7–10](#Chapter07.html#fig_7_10), the Static Analyzer can figure\
    \ it out quickly.\n\n![images](images/0710.jpg)\n\n**Figure 7–10.** Static Analyzer\
    \ shows a memory leak\n\n## Leak Instrument\n\nThe Leaks Instrument is more complicated\
    \ and takes some time to run and analyze but it gives you the best results according\
    \ to your actions. It can detect most of memory leaks when it keeps track of all\
    \ data in running time.\n\n![images](images/0711.jpg)\n\n**Figure 7–11.** Leak\
    \ results from the instrument\n\nThe Leaks Instrument can give you detailed results\
    \ of list of leaked objects, as shown in [Figure 7–11](#Chapter07.html#fig_7_11).\n\
    \n![images](images/0712.jpg)\n\n**Figure 7–12.** Leak details shown by Leaks Instrument\n\
    \nIt can also show the exact line of code that causes the leaks ([Figure 7–12](#Chapter07.html#fig_7_12)).\n\
    \n## Zombie\n\n`Zombie` helps you check for the part of the code that caused a\
    \ crash, `EXEC_BAD_ACCESS` for your application. This is really useful if your\
    \ application keeps crashing but you can't discover the problem through logging\
    \ or verifying your code.\n\nAs shown in [Figure 7–13](#Chapter07.html#fig_7_13),\
    \ `Zombie` will show you a list of actions, including `malloc`, `autorelease`,\
    \ `retain`, and `release` when the app crashes. You can track the `autorelease`\
    \ and `release` methods using `Zombie`.\n\n![images](images/0713.jpg)\n\n**Figure\
    \ 7–13.** Results from a crash tracked by Zombie Instrument\n\n`Zombie` can show\
    \ you the place for each action, such as where the object is allocated and where\
    \ the object is `autoreleased` or released.\n\n## Object Allocation\n\nObject\
    \ allocation is the last tool related to memory that I want to introduce here.\
    \ It shows all the memory usage over time when your application is running. This\
    \ tool is really helpful when the memory usage grows so much and you need to trace\
    \ back to the group of lines that created so much memory.\n\n![images](images/0714.jpg)\n\
    \n**Figure 7–14.** Results of memory usage from object allocations\n\n[Figure\
    \ 7–14](#Chapter07.html#fig_7_14) shows you the line of code, time the object\
    \ is created, and the caller that creates the object.\n\n## Memory Warning Levels\n\
    \nThe last thing I want to discuss about memory is memory warnings. When your\
    \ memory usage grows to a certain point, the iOS environment will try to tell\
    \ you this by calling the `didReceiveMemoryWarning` method on view controller\
    \ objects. You will have to react to this memory warning by freeing some memory.\n\
    \n**NOTE:** There are other ways to receive memory warnings from inside your application:\
    \ the application delegate receives the memory warning and calls appropriate methods\
    \ in other objects or your objects can register to receive memory warning via\
    \ `NSNotification`.\n\nThe first memory warning (memory warning level 1) is the\
    \ most important one: it means that your code has to reduce memory usage fast.\
    \ Otherwise, your app will receive a memory warning level 2 and it will almost\
    \ certainly crash.\n\n# Summary\n\nMemory has a big effect on the performance\
    \ of your app. It can also make your app crash if you don't use it properly. In\
    \ this chapter, you learned important concepts about memory management in Objective-C\
    \ that will help you avoid memory leak issues and application crashes. The `UIViewController`\
    \ life cycle is also important as it relates to managing and controlling memory\
    \ usage. It also affects how users feel about the performance and experience of\
    \ the application. Finally, you learned the differences between `autorelease`\
    \ and `release` when dealing with memory and when you should use one instead of\
    \ the other.\n\n**EXERCISES**\n\n1. List the differences between the `autorelease`\
    \ and `release` methods.\n\n2. Use the instruments covered in this chapter in\
    \ a real-world situation.\n\n3. Implement the `copy` method for an existing object\
    \ in your project.\n\n# Chapter 8\n\n# Integrate Multithreading and Efficient\
    \ Memory Usage for Multitasking Apps Performance\n\nIn this chapter, you will\
    \ learn about:\n\n- What Apple means by multitasking.\n- The multitasking life\
    \ cycle and how to handle the benefits and costs.\n- Different background services,\
    \ such as:\n  - Audio\n  - VOIP\n  - Location\n  - Background processing\n- What\
    \ you should know to make your app multitask well.\n\nIn this chapter, you will\
    \ learn how to take advantage of multitasking in iPhone so that the application\
    \ can process data in background without the user's notice. This must be balanced\
    \ with using as little CPU processing time or memory as possible; otherwise, you\
    \ may severely impact the battery life or worse—be killed by the iOS."
