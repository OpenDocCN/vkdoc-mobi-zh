  trans: "\n### 本章小结\n\n本章从理论和实践两方面介绍了主要的数据结构与算法。理论方式作为讨论算法或数据结构概念时的基准，我通过它来比较不同的算法与数据结构。不过在实际应用中，别忘了借助工具获取真实的基准测试数据。\n\
    \n你还掌握了 Cocoa Touch 框架内置的三种重要数据结构。正确使用它们能帮你提升应用性能，无需重新发明轮子。但当你需要更出色的性能时，应考虑链表、二叉搜索树等优秀替代方案，以及栈和队列等抽象概念。递归和\
    \ XML 解析也是必备的重要技能。\n\n### 练习题\n\n1.  完成本章练习：\n\n    现有两个列表：一个名单记录打网球的人，另一个记录踢足球的人。你需要找出以下三个列表：\n\
    \n    - 既打网球又踢足球的人\n    - 只打网球的人\n    - 只踢足球的人\n\n    请分别使用 `NSMutableSet` 和 `NSMutableArray`\
    \ 来实现。\n\n2.  实现链表中的删除元素功能。\n3.  实现在链表末尾插入元素的功能。\n4.  实现链表的迭代功能并给出示例代码。\n5.  实现二叉搜索树。\n\
    6.  实现广度优先搜索算法。\n7.  使用 SAX 和 DOM 两种方式解析以下 XML 文档，获取每本书的标题、价格和作者全名。你可以使用 `XMLParser`\
    \ 项目获取 XML 文件而无需重新输入。DOM 解析可使用 TouchXML（通过 [`https://github.com/mrevilme/TouchXML`](https://github.com/mrevilme/TouchXML)），SAX\
    \ 解析可使用 Apple 内置库 `NSXMLParser`：\n\n```\n<?xml version=\"1.0\"?>\n<catalog>\n\
    \  <book id=\"bk101\">\n     <author>\n        <firstName>Gambardella</firstName>\n\
    \        <lastName>Matthew</lastName>\n     </author>\n     <title>XML Developer's\
    \ Guide</title>\n     <genre>Computer</genre>\n     <price>44.95</price>\n   \
    \  <publish_date>2000-10-01</publish_date>\n     <description>An in-depth look</description>\n\
    \  </book>\n  <book id=\"bk102\">\n     <author>\n        <firstName>Ralls</firstName>\n\
    \        <lastName>Kim</lastName>\n     </author>\n     <title>Midnight Rain</title>\n\
    \     <genre>Fantasy</genre>\n     <price>5.95</price>\n     <publish_date>2000-12-16</publish_date>\n\
    \     <description>A former architect battles corporate</description>\n  </book>\n\
    \  <book id=\"bk103\">\n     <author>\n        <firstName>Galos</firstName>\n\
    \        <lastName>Mike</lastName>\n     </author>\n     <title>Visual Studio\
    \ 7: A Comprehensive Guide</title>\n     <genre>Computer</genre>\n     <price>49.95</price>\n\
    \     <publish_date>2001-04-16</publish_date>\n     <description>Microsoft Visual\
    \ Studio 7</description>\n  </book>\n</catalog>\n```\n\n## 第 6 章\n\n## 使用多线程技术优化并行数据访问\n\
    \n本章将学习：\n\n- 线程与多线程的概念。\n- 如何在 iPhone 应用中编写和管理带锁的线程。\n- 多线程环境的相关通用概念。\n  - 安全性：程序应产生预期结果。\n\
    \  - 活性：预期结果最终必须能在某一时刻生成。\n  - 性能：预期结果必须能快速生成。\n- 判断何时使用线程。\n- 了解线程与 Apple 提供的其他内置解决方案之间的多种替代方案。\n\
    \n当今计算设备拥有越来越多处理器。iPhone 也不例外；迟早 iPhone 会配备多处理器；事实上，Android 已有一些双核设备。因此，掌握如何利用多处理器系统的需求日益增长。这只是学习多线程的众多原因之一。线程通道还能帮助解决其他问题，如异步代码、文件与网络输入/输出、或耗时计算过程。\n\
    \n### 什么是线程与多线程？\n\n线程最简单的形式是供操作系统（OS）运行的一系列指令。不同线程可在同一处理器（CPU）或不同处理器上运行；这由操作系统决定，如图\
    \ 6-1 所示。\n\n通常，操作系统启动新应用程序时仅使用一个线程——即从头到尾的一条指令序列。当系统并行或并发运行多个指令序列时，便形成了多线程。在多处理器系统中，每个线程可在各自处理器上同时执行，如图\
    \ 6-1 所示。\n\n![images](img/0601.jpg)\n\n**图 6-1.** *三处理器系统运行三个线程*\n\n![images](img/0602.jpg)\n\
    \n**图 6-2.** *单处理器系统运行三个线程*\n\n然而在单处理器系统中，CPU 会在切换线程前执行完当前线程的部分指令。如图 6-2 所示，CPU\
    \ 在线程 1 中执行若干指令后跳转到线程 2，再执行线程 2 的指令后跳转到线程 3。\n\n在运行过程中，不同线程可调用不同对象的不同方法，如图 6-3\
    \ 所示。线程 1 和线程 2 可同时使用同一对象并调用同一方法，例如它们同时调用 `对象 1` 的 `方法 1` 和 `对象 3` 的 `方法 3`。但线程\
    \ 1 和线程 2 也可调用不同对象的不同方法，例如线程 1 调用 `对象 2` 的 `方法 2` ，线程 2 调用 `对象 4` 的 `方法 4`。\n\n\
    ![images](img/0603.jpg)\n\n**图 6-3.** *两个线程调用不同对象的不同方法*\n\n在同一个应用程序中使用多个线程既有优势也有劣势。以下章节将详细讨论。多线程应用最重要的优势之一，是将其他任务与主用户界面（UI）进程解耦，从而避免\
    \ UI 被阻塞或冻结。\n\n### 线程术语\n\n以下是重要的线程术语定义：\n\n- 术语**线程**指代代码的独立指令/执行序列。\n- 术语**进程**指代正在运行的可执行文件，可包含多个线程。\n\
    - 术语**任务**指代需要执行的抽象工作概念。\n\n如果线程和进程都用于并发执行逻辑，它们有什么区别？进程与线程在以下方面存在差异：\n\n- 进程是资源分配单元，拥有自己的资源、堆内存和权限。线程仅仅是执行单元，拥有自己的栈和程序计数器。\n\
    - 一个进程包含多个线程，每个线程只能属于一个进程。\n- 线程与其所属进程内的其他线程共享数据。两个进程之间不共享数据，通常使用进程间通信传输数据（进程间通信不在本章讨论范围内）。\n\
    - 操作系统必须为进程分配特定资源，且进程间无法共享资源，因此进程被认为是重量级的。而线程共享资源，因此操作系统可以在同一进程内创建任意数量的线程。\n\n"
- fmt: "### First Example\n\nThis example will demonstrate some problems with IO performance.\
    \ I will speed up the code later by using some multithreading techniques. My sample\
    \ code is simple:\n\n- In the first benchmark, I will load and display a list\
    \ of images inside a table view. Then, I will show you how the scrolling experience\
    \ suffers: you can't scroll the table until all images in the current state are\
    \ returned.\n- In the second benchmark, I will use multithreading to speed up\
    \ the program. You can see that the scrolling experience while you're waiting\
    \ for the image loading process is much better.\n\n**NOTE:** For both cases, my\
    \ sample project will not cache the images to let you see the differences between\
    \ two cases clearly.\n\n[Table 6–1](#Chapter06.html#tab_6_1) shows the benchmark\
    \ results of each test based on the Core Animation instrument so you can see the\
    \ application of the instrument into a real world situation.\n\n![Images](images/t0601.jpg)\n\
    \n[Table 6–1](#Chapter06.html#tab_6_1) shows you the frame per second (fps) that\
    \ the iPhone OS loads when processing and running the application. You can see\
    \ that using multithreading significantly speeds up the loading process. The problem\
    \ with not using multithreading in this case is that the loading process will\
    \ block the UI and your application will appear to have hung.\n\nI will give you\
    \ a look at the source code and offer a few explanations before I explain the\
    \ concepts in-depth. [Listing 6–1](#Chapter06.html#list_6_1) shows the code for\
    \ the first benchmark.\n\n**Listing 6–1.** First Benchmark; This Code Runs Inside\
    \ the `UITableViewDataSource`’s Method.\n\n```objc\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath {\n  static NSString\
    \ *CellIdentifier = @\"Cell\";\n  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \  if (cell == nil) {\n      cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n  }\n  NSURL *imageURL = [NSURL URLWithString:[self.imagesArray\
    \ objectAtIndex:indexPath.row]];\n  cell.imageView.image = [UIImage imageWithData:[NSData\
    \ dataWithContentsOfURL:imageURL]];\n  // Configure the cell.\n  return cell;\n\
    }\n```\n\nThe [Listing 6–2](#Chapter06.html#list_6_2) only shows the general approach\
    \ to retrieving the image in the asynchronous code and sending the image into\
    \ the `UIImageView` after it finishes retrieving it. For simplicity, the actual\
    \ asynchronous code is not displayed or discussed here.\n\n**Listing 6–2.** Second\
    \ Benchmark—Getting the Image Through a Background Thread\n\n```objc\n// Customize\
    \ the appearance of table view cells.\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   static NSString\
    \ *CellIdentifier = @\"Cell\";\n   ImageCell *cell = (ImageCell *) [UIUtilities\
    \ getCellWithTableView:tableView\n                                           \
    \           cellIdentifier:CellIdentifier\n                                  \
    \                           nibName:@\"ImageCell\"];\n   // Configure the cell.\n\
    \   NSURL *imageURL = [NSURL URLWithString:[self.imagesArray\nobjectAtIndex:indexPath.row]];\n\
    \   [cell.contentImage displayImageWithURL:imageURL];\n   return cell;\n}\n```\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"ImageFetcher.h\"\n\n@interface\
    \ UIImageView (Network) <ImageFetcherDelegate>\n\n- (void)displayImageWithURL:(NSURL\
    \ *)url;\n@end\n\n#import \"UIImageView+Network.h\"\n#import \"ImageFetcher.h\"\
    \n\n@implementation UIImageView (Network)\n\n- (void)imageFetcherFinished:(ImageFetcher\
    \ *)fetcher {\n   self.image = fetcher.image;\n}\n\n- (void)displayImageWithURL:(NSURL\
    \ *)url {\n   self.image = nil;\n   if (url) {\n       // This code will run in\
    \ the background thread and callback when it retrieves\n       //   image\n  \
    \     [ImageFetcher loadImageWithURL:url delegate:self];\n   }\n}\n\n@end\n```\n\
    \nIn the first benchmark, inside the method to return the cell for the table view,\
    \ I put in code to get the image there. With this line of code, the iOS will stop\
    \ and wait until the image is returned from the network. After that, it continues\
    \ to return the cell and display that cell to the UI. This waiting makes the whole\
    \ application stop and that is the reason why you can't quickly scroll the table\
    \ view in the first benchmark.\n\nFor the second benchmark, I use asynchronous\
    \ code, which is actually another form of multithreading, but the low-level library\
    \ will handle the multithreading code for you. With this code, the main process\
    \ is free from waiting for the downloading process to be finished. Therefore,\
    \ in the second benchmark, you can scroll the table view without any problem.\n\
    \n### Benefits of Multithreading\n\nThere are some cases where you might consider\
    \ using threads inside an iPhone application.\n\n- *Exploiting all the cores and\
    \ processors*: (One processor can always have multiple cores inside and the core\
    \ is the actual computing unit.) Currently, the iPhone 4 only has one processor\
    \ and one core but iPhone 5 may have more than one core and you will want your\
    \ app to utilize all available processors to speed up performance.\n- *Modeling*:\
    \ You may try to model real behaviors from the real world. For example, consider\
    \ a situation where you have 12 different types of tasks to do (fix bugs, interview\
    \ candidates for system administration, and create slides for your next product\
    \ presentation, etc.) versus having only one complicated task (fix 12 bugs). The\
    \ latter situation is easier to do when you only have a queue of work to finish.\
    \ The first case is a sophisticated situation where you can assign each thread\
    \ to handle with each task.\n- *Handling I/O processing task*: Usually, I/O (both\
    \ file and networking I/O) takes time to return data back to the application.\
    \ Therefore, if you use only one thread to handle it, your application may stop\
    \ working and spend time waiting for the data. Using multithreading helps you\
    \ split the I/O thread out until it receives all data and merges back to the main\
    \ thread.\n- *More responsive UI*: GUI applications like iPhone applications start\
    \ with only one thread, which means that all application code executes through\
    \ a *main event loop* (also called a *main run loop*). An event loop is when an\
    \ application receives an input event (such as a tap, a swipe, or a double-tap)\
    \ from a user and then runs the logic corresponding to that input event. The longer\
    \ it takes for an application to execute within an event loop, the less responsive\
    \ the UI.\n- *Working in some logic processing in background*: This is also an\
    \ important part of iPhone application code. There may be some cases where you\
    \ need to process data heavily, such as running an XML parsing algorithm to extract\
    \ out some data inside. This is related to the responsiveness of the UI; less\
    \ work in the UI thread will make the program offer a better user experience.\n\
    \n### How to Write Multithreaded Applications\n\nSo now that you know how good\
    \ a multithreaded application can be and how it can help you solve many problems,\
    \ how do you write a good multithreaded application? I will show you the main\
    \ techniques to write/handle a good multithreaded application for the iPhone.\n\
    \n#### Create a Thread\n\nTo create a thread, you can use any of the following:\n\
    \n- `NSThread`\n- `POSIX` Threads\n- `NSObject` to create a new thread\n- `NSOperation`\
    \ and `NSOperationQueue`\n\nI will go over each of them and give you examples\
    \ because each has its own advantages and disadvantages. At the end of this section\
    \ I will give you a table comparison to make sure you can differentiate between\
    \ them and pick the right one for your particular needs."
  raw: '### First Example


    This example will demonstrate some problems with IO performance. I will speed
    up the code later by using some multithreading techniques. My sample code is simple:


    *   In the first benchmark, I will load and display a list of images inside a
    table view. Then, I will show you how the scrolling experience suffers: you can’t
    scroll the table until all images in the current state are returned.

    *   In the second benchmark, I will use multithreading to speed up the program.
    You can see that the scrolling experience while you’re waiting for the image loading
    process is much better.


    **NOTE:** For both cases, my sample project will not cache the images to let you
    see the differences between two cases clearly.


    [Table 6–1](#Chapter06.html#tab_6_1) shows the benchmark results of each test
    based on the Core Animation instrument so you can see the application of the instrument
    into a real world situation.


    ![Images](images/t0601.jpg)


    [Table 6–1](#Chapter06.html#tab_6_1) shows you the frame per second (fps) that
    the iPhone OS loads when processing and running the application. You can see that
    using multithreading significantly speeds up the loading process. The problem
    with not using multithreading in this case is that the loading process will block
    the UI and your application will appear to have hung.


    I will give you a look at the source code and offer a few explanations before
    I explain the concepts in-depth. [Listing 6–1](#Chapter06.html#list_6_1) shows
    the code for the first benchmark.


    **Listing 6–1.** First Benchmark; This Code Runs Inside the UITableViewDataSource’s
    Method.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`


    ` static NSString *CellIdentifier = @"Cell";`


    ` UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    ` if (cell == nil) {`

    `     cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault`

    `reuseIdentifier:CellIdentifier];`

    ` }`


    ` NSURL *imageURL = [NSURL URLWithString:[self.imagesArray objectAtIndex:indexPath.row]];`

    ` cell.imageView.image = [UIImage imageWithData:[NSData dataWithContentsOfURL:imageURL]];`


    ` // Configure the cell.`

    ` return cell;`

    `}`


    The [Listing 6–2](#Chapter06.html#list_6_2) only shows the general approach to
    retrieving the image in the asynchronous code and sending the image into the `UIImageView`
    after it finishes retrieving it. For simplicity, the actual asynchronous code
    is not displayed or discussed here.


    **Listing 6–2.** Second Benchmark—Getting the Image Through a Background Thread


    `// Customize the appearance of table view cells.`

    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`


    `   static NSString *CellIdentifier = @"Cell";`


    `   ImageCell *cell = (ImageCell *) [UIUtilities getCellWithTableView:tableView`

    `                                                      cellIdentifier:CellIdentifier`

    `                                                             nibName:@"ImageCell"];`


    `   // Configure the cell.`

    `   NSURL *imageURL = [NSURL URLWithString:[self.imagesArray`

    `objectAtIndex:indexPath.row]];`

    `   [cell.contentImage displayImageWithURL:imageURL];`


    `   return cell;`

    `}`

    `#import <Foundation/Foundation.h>`

    `#import "ImageFetcher.h"`


    `@interface UIImageView (Network) <ImageFetcherDelegate>`


    `- (void)displayImageWithURL:(NSURL *)url;`

    `@end`


    `#import "UIImageView+Network.h"`

    `#import "ImageFetcher.h"`


    `@implementation UIImageView (Network)`


    `- (void)imageFetcherFinished:(ImageFetcher *)fetcher {`

    `   self.image = fetcher.image;`

    `}`


    `- (void)displayImageWithURL:(NSURL *)url {`

    `   self.image = nil;`

    `   if (url) {`

    `       // This code will run in the background thread and callback when it retrieves`

    `       //   image`

    `       [ImageFetcher loadImageWithURL:url delegate:self];`

    `   }`

    `}`


    `@end`


    In the first benchmark, inside the method to return the cell for the table view,
    I put in code to get the image there. With this line of code, the iOS will stop
    and wait until the image is returned from the network. After that, it continues
    to return the cell and display that cell to the UI. This waiting makes the whole
    application stop and that is the reason why you can’t quickly scroll the table
    view in the first benchmark.


    For the second benchmark, I use asynchronous code, which is actually another form
    of multithreading, but the low-level library will handle the multithreading code
    for you. With this code, the main process is free from waiting for the downloading
    process to be finished. Therefore, in the second benchmark, you can scroll the
    table view without any problem.


    ### Benefits of Multithreading


    There are some cases where you might consider using threads inside an iPhone application.


    *   *Exploiting all the cores and processors*: (One processor can always have
    multiple cores inside and the core is the actual computing unit.) Currently, the
    iPhone 4 only has one processor and one core but iPhone 5 may have more than one
    core and you will want your app to utilize all available processors to speed up
    performance.

    *   *Modeling*: You may try to model real behaviors from the real world. For example,
    consider a situation where you have 12 different types of tasks to do (fix bugs,
    interview candidates for system administration, and create slides for your next
    product presentation, etc.) versus having only one complicated task (fix 12 bugs).
    The latter situation is easier to do when you only have a queue of work to finish.
    The first case is a sophisticated situation where you can assign each thread to
    handle with each task.

    *   *Handling I/O processing task*: Usually, I/O (both file and networking I/O)
    takes time to return data back to the application. Therefore, if you use only
    one thread to handle it, your application may stop working and spend time waiting
    for the data. Using multithreading helps you split the I/O thread out until it
    receives all data and merges back to the main thread.

    *   *More responsive UI*: GUI applications like iPhone applications start with
    only one thread, which means that all application code executes through a *main
    event loop* (also called a *main run loop*). An event loop is when an application
    receives an input event (such as a tap, a swipe, or a double-tap) from a user
    and then runs the logic corresponding to that input event. The longer it takes
    for an application to execute within an event loop, the less responsive the UI.

    *   *Working in some logic processing in background*: This is also an important
    part of iPhone application code. There may be some cases where you need to process
    data heavily, such as running an XML parsing algorithm to extract out some data
    inside. This is related to the responsiveness of the UI; less work in the UI thread
    will make the program offer a better user experience.


    ### How to Write Multithreaded Applications


    So now that you know how good a multithreaded application can be and how it can
    help you solve many problems, how do you write a good multithreaded application?
    I will show you the main techniques to write/handle a good multithreaded application
    for the iPhone.


    #### Create a Thread


    To create a thread, you can use any of the following:


    *   `NSThread`

    *   `POSIX` Threads

    *   `NSObject` to create a new thread

    *   `NSOperation` and `NSOperationQueue`


    I will go over each of them and give you examples because each has its own advantages
    and disadvantages. At the end of this section I will give you a table comparison
    to make sure you can differentiate between them and pick the right one for your
    particular needs.'
  trans: "\n### 第一个示例\n\n此示例将演示 IO 性能方面的一些问题。后续我会运用多线程技术来加速代码运行。我的示例代码很简单：\n\n-  \
    \ **在第一个基准测试中**：我将加载并展示一个表格视图中的图片列表。随后，我会向你展示滚动体验有多糟糕：在当前状态下的所有图片返回之前，你无法滚动表格。\n\
    -   **在第二个基准测试中**：我将使用多线程来加速程序。你会看到，在等待图片加载的过程中，滚动体验会好很多。\n\n**注意：** 在这两种情况下，我的示例项目都*不会*缓存图片，以便让你清晰地看到两种情况的差异。\n\
    \n表 6–1 展示了基于 Core Animation 工具的各项测试基准结果，这样你就能看到该工具在实际场景中的应用。\n\n![图片](img/t0601.jpg)\n\
    \n表 6–1 向你展示了 iPhone OS 在处理和运行应用程序时加载的每秒帧数（fps）。可以看到，使用多线程显著加快了加载过程。在此案例中不使用多线程的问题在于，加载过程会阻塞\
    \ UI，导致你的应用看起来像是卡住了。\n\n在深入解释这些概念之前，我会先让你看一下源代码，并做一些简单说明。代码清单 6–1 展示了第一个基准测试的代码。\n\
    \n**代码清单 6–1.** 第一个基准测试；此代码运行在 `UITableViewDataSource` 的方法内部。\n\n```objc\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\
    \ {\n  static NSString *CellIdentifier = @\"Cell\";\n  UITableViewCell *cell =\
    \ [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n  if (cell ==\
    \ nil) {\n      cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    reuseIdentifier:CellIdentifier];\n  }\n  NSURL *imageURL = [NSURL URLWithString:[self.imagesArray\
    \ objectAtIndex:indexPath.row]];\n  cell.imageView.image = [UIImage imageWithData:[NSData\
    \ dataWithContentsOfURL:imageURL]];\n  // 配置单元格。\n  return cell;\n}\n```\n\n代码清单\
    \ 6–2 仅展示了在异步代码中获取图片，并在获取完成后将图片发送到 `UIImageView` 的通用方法。为简单起见，此处未显示或讨论实际的异步代码。\n\
    \n**代码清单 6–2.** 第二个基准测试——通过后台线程获取图片\n\n```objc\n// 自定义表格视图单元格的外观。\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\
    \ {\n   static NSString *CellIdentifier = @\"Cell\";\n   ImageCell *cell = (ImageCell\
    \ *) [UIUtilities getCellWithTableView:tableView\n                           \
    \                           cellIdentifier:CellIdentifier\n                  \
    \                                           nibName:@\"ImageCell\"];\n   // 配置单元格。\n\
    \   NSURL *imageURL = [NSURL URLWithString:[self.imagesArray\nobjectAtIndex:indexPath.row]];\n\
    \   [cell.contentImage displayImageWithURL:imageURL];\n   return cell;\n}\n```\n\
    \n```objc\n#import <Foundation/Foundation.h>\n#import \"ImageFetcher.h\"\n\n@interface\
    \ UIImageView (Network) <ImageFetcherDelegate>\n\n- (void)displayImageWithURL:(NSURL\
    \ *)url;\n@end\n\n#import \"UIImageView+Network.h\"\n#import \"ImageFetcher.h\"\
    \n\n@implementation UIImageView (Network)\n\n- (void)imageFetcherFinished:(ImageFetcher\
    \ *)fetcher {\n   self.image = fetcher.image;\n}\n\n- (void)displayImageWithURL:(NSURL\
    \ *)url {\n   self.image = nil;\n   if (url) {\n       // 这段代码将在后台线程中运行，并在获取到图片时回调\n\
    \       [ImageFetcher loadImageWithURL:url delegate:self];\n   }\n}\n\n@end\n\
    ```\n\n在第一个基准测试中，我在返回表格视图单元格的方法内部加入了获取图片的代码。通过这一行代码，iOS 会停止并等待，直到图片从网络返回。之后，它才会继续返回单元格并将其显示在界面上。这种等待会导致整个应用程序停止，这就是为什么在第一个基准测试中你无法快速滚动表格视图的原因。\n\
    \n对于第二个基准测试，我使用了异步代码，这实际上是多线程的另一种形式，但底层库会为你处理多线程代码。使用这种代码，主进程无需等待下载过程完成。因此，在第二个基准测试中，你可以毫无问题地滚动表格视图。\n\
    \n### 多线程的优势\n\n在某些情况下，你可能会考虑在 iPhone 应用程序中使用线程。\n\n-   *充分利用所有核心和处理器*：（一个处理器内部可以有多个核心，而核心是实际的计算单元。）目前，iPhone\
    \ 4 只有一个处理器和一个核心，但 iPhone 5 可能拥有多个核心，你希望你的应用能够利用所有可用的处理器来提升性能。\n-   *建模*：你可以尝试模拟现实世界中的实际行为。例如，考虑这种情况：你需要完成\
    \ 12 种不同类型的任务（修复 Bug、面试系统管理员候选人、为下一个产品演示创建幻灯片等），而另一种情况是只有一项复杂的任务（修复 12 个 Bug）。当你只需要处理一个工作队列时，后一种情况更容易实现。前一种情况比较复杂，你可以将每个线程分配来处理一个任务。\n\
    -   *处理 I/O 处理任务*：通常，I/O（包括文件 I/O 和网络 I/O）需要花费时间才能将数据返回给应用程序。因此，如果你只用一个线程来处理它，你的应用程序可能会停止工作，花费时间等待数据。使用多线程可以帮助你将\
    \ I/O 线程分离出来，直到它接收到所有数据再合并回主线程。\n-   *更灵敏的 UI*：像 iPhone 应用程序这样的 GUI 应用程序只从一个线程启动，这意味着所有应用程序代码都通过一个*主事件循环*（也称为*主运行循环*）执行。事件循环是指应用程序接收来自用户的输入事件（例如点击、滑动或双击），然后运行与输入事件对应的逻辑。应用程序在一个事件循环内执行的时间越长，UI\
    \ 的响应就越不灵敏。\n-   *在后台处理某些逻辑*：这也是 iPhone 应用程序代码的重要组成部分。在某些情况下，你可能需要大量处理数据，例如运行\
    \ XML 解析算法来提取其中的一些数据。这与 UI 的响应速度有关；在 UI 线程中做更少的工作将使程序提供更好的用户体验。\n\n### 如何编写多线程应用程序\n\
    \n既然你已经知道多线程应用程序可以多么强大，以及它如何帮助你解决许多问题，那么如何编写一个好的多线程应用程序呢？我将向你展示为 iPhone 编写/处理良好的多线程应用程序的主要技术。\n\
    \n#### 创建线程\n\n要创建线程，你可以使用以下任何一种方法：\n\n-   `NSThread`\n-   `POSIX` 线程\n-   使用\
    \ `NSObject` 创建新线程\n-   `NSOperation` 和 `NSOperationQueue`\n\n我会逐一介绍它们，并给出示例，因为它们各有利弊。在本节末尾，我将提供一个对比表格，确保你能够区分它们，并为你的特定需求选择正确的方法。\n"
- fmt: "### NSThread\n\nTo create a new thread with `NSThread`, you can simply call:\n\
    \n```\n[NSThread detachNewThreadSelector:@selector(threadMethod:) toTarget:self\
    \ withObject:nil];\n```\n\nThis method will create a new detached thread for your\
    \ application. A *detached thread* is one that will have all of its resources\
    \ reclaimed by the system when that thread exists.\n\nThere are some attributes\
    \ that you need to know.\n\n```\n+(void)detachNewThreadSelector:(SEL)aSelector\
    \ toTarget:(id)aTarget withObject:(id)anArgument\n```\n\n- `aSelector`: The method\
    \ that will be called on the target object when the thread begins. According to\
    \ Apple documentation, this selector takes only one parameter and has no return\
    \ value.\n- `aTarget`: The object that will execute the method specified in the\
    \ `aSelector` parameter.\n- `anArgument`: The only argument; it will be passed\
    \ to the `aSelector` method when the thread begins.\n\nIf you want to create a\
    \ thread but don’t want to start it yet, you can use the following mechanism:\n\
    \n```\nNSThread* myThread = [[NSThread alloc]\n                        initWithTarget:self\n\
    \                              selector:@selector(myThreadMainMethod:)\n     \
    \                           object:nil];\n[myThread start];  // Actually create\
    \ the thread\n```\n\nAs you can see, in the first line, you can create a new thread\
    \ and then later, whenever you choose, you can call `start` on that object to\
    \ create and start a new thread. This is good if you only want to pass the `myThread`\
    \ object around instead of passing the `selector`, `target` and `argument` around.\n\
    \nAnother good way to use an `NSThread` object is to send a message to that thread\
    \ object using\n\n```\n-(void)performSelector:(SEL)aSelector onThread:(NSThread\
    \ *)thr withObject:(id)arg waitUntilDone:(BOOL)wait\n```\n\nThis method will queue\
    \ the selector on another thread. When the system automatically runs that thread,\
    \ the thread will dequeue the message and call the desired method specified inside\
    \ the `aSelector` variable.\n\n### Using POSIX Threads\n\nThis mechanism is mainly\
    \ used for C programming in iPhone applications. In [Chapter 9](#Chapter09.html#ch9),\
    \ I will cover C programming in depth and how it can help you improve your iPhone\
    \ apps performance in many situations. So this part may not help you much if you\
    \ don’t already know C programming. If you do know C programming, [Listing 6–3](#Chapter06.html#list_6_3)\
    \ shows the code and an explanation follows.\n\n**Listing 6–3.** *POSIX Thread*\n\
    \n```\n#include <assert.h>\n#include <pthread.h>\n\nvoid* ThreadMethod(void* data)\n\
    {\n   // Your main logic comes here.\n   return NULL;\n}\n\nvoid LaunchThread()\n\
    {\n   // Create the thread using POSIX routines.\n   pthread_attr_t  attr;\n \
    \  pthread_t       posixThreadID;\n   int             returnVal;\n\n   // init\
    \ and check if init a new thread successful\n   returnVal = pthread_attr_init(&attr);\n\
    \   assert(!returnVal);\n\n   // set attribute detach state for new thread\n \
    \  returnVal = pthread_attr_setdetachstate(&attr, PTHREAD_CREATE_DETACHED);\n\
    \   assert(!returnVal);\n\n   // create and run the new thread\n   int     threadError\
    \ = pthread_create(&posixThreadID, &attr, &ThreadMethod, NULL);\n\n   returnVal\
    \ = pthread_attr_destroy(&attr);\n   assert(!returnVal);\n   if (threadError !=\
    \ 0)\n   {\n       // Report an error.\n   }\n}\n```\n\n### NSObject\n\nAll objects\
    \ have the ability to create and detach a new thread to execute these objects’\
    \ selectors. You can use the following line of code to run the method `doSomething`\
    \ in a background thread:\n\n```\n[myObj performSelectorInBackground:@selector(doSomething)\
    \ withObject:nil];\n```\n\nThe effect of calling this method is the same as the\
    \ following line of code:\n\n```\n[NSThread detachNewThreadSelector:@selector(doSomething)\
    \ toTarget:myObj withObject:nil]\n```\n\nThis method is good as a short form for\
    \ detaching and creating a new thread to run the background task.\n\n### NSOperationQueue\n\
    \n`NSOperationQueue` class is a mechanism to manage and run tasks concurrently.\
    \ A good thing about `NSOperationQueue` is that it can restrict the number of\
    \ concurrent operations inside the system within a given limit to keep the system\
    \ load at an acceptable level. Because of this restriction of the maximum number\
    \ of threads, a higher number of instances of `NSOperationQueue` may not lead\
    \ to more concurrent threads running in the system at the same time.\n\nYou can\
    \ add operations into the queue but you can’t remove them. However, you can cancel\
    \ all of the existing and non-running operations inside the queue. [Table 6–2](#Chapter06.html#tab_6_2)\
    \ shows some other methods that you will find really useful when using `NSOperationQueue`.\n\
    \n![Images](images/t0602.jpg)\n\nYou can use `NSOperationQueue` with three different\
    \ classes.\n\n- `NSInvocationOperation`: This is a simple wrapping if you already\
    \ have an object and a method to put into a concurrent thread. It also requires\
    \ no subclassing, so you can create a simple `NSOperation` object by this class.\
    \ `NSInvocationOperation` is a subclass of `NSOperation`.\n- `NSBlockOperation`:\
    \ This is another wrapping to execute one or more blocks without having to create\
    \ a separate `NSOperation` object to have each of blocks executed. When executing\
    \ more than one block, the `NSBlockOperation` is considered finished only when\
    \ all of the inside blocks have finished executing.\n- Custom `NSOperation` Object:\
    \ `NSOperation` is a base class. By subclassing it, you can have complete control\
    \ over the whole implementation of the `NSOperation` objects, including the default\
    \ way in which your operation executes and reports its status.\n\nTo make a multithreading\
    \ app with `NSOperationQueue`, you need to create a specific object by one of\
    \ these three methods and add the newly created `NSOperation` into your queue.\
    \ Then the queue will maintain and run those operations for you.\n\nHere is a\
    \ code snippet that will help you to create an `NSOperationQueue` and add separate\
    \ operation objects into it to create a multithreading environment:\n\n```\nNSOperationQueue*\
    \ myOperationQueue = [[NSOperationQueue alloc] init];\n[myOperationQueue addOperation:myOperation];\
    \ // Add a single operation\n[myOperationQueue addOperations:arrayOfOperations\
    \ waitUntilFinished:NO]; // Add multiple operations\n[aQueue addOperationWithBlock:^{\n\
    \  /* Do Something. */\n}];\n```\n\nNow I will go into details of how you create\
    \ new operations using each of the previously mentioned methods.\n\n#### NSInvocationOperation\n\
    \nThe `NSInvocationOperation` object is run to execute the method that was specified\
    \ when a new `NSInvocationOperation` object was created. You may want to use this\
    \ object if\n\n- You want to avoid creating too many custom operation classes\
    \ inside your application.\n- You are adding or maintaining an existing application\
    \ in which the classes are well defined and you don’t want to modify that class\
    \ to subclass `NSOperation`.\n- The selector can change depending on the user\
    \ input. In this case, you just create a new `NSInvocationOperation` object with\
    \ the selected selector.\n\nThe code to create an `NSInvocationOperation` object\
    \ is as following:\n\n```\nNSInvocationOperation* theOp = [[NSInvocationOperation\
    \ alloc] initWithTarget:self\n                                               \
    \                     selector:@selector(myTaskMethod:) object:data];\n```\n\n\
    It is similar to when you create and detach a new thread using `NSThread`. You\
    \ pass the target object, the selector that you want to call, and an argument\
    \ that you want the selector to have when it is executed."
