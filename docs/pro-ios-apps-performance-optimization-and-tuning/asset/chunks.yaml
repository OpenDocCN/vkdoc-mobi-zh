  trans: "\n###### 哈希方法\n\n如前所述，两个相等的对象必须具有相同的哈希值。因此，人们通常使用重写的 `isEqual` 方法来实现 `hash`\
    \ 方法。如果你的 `isEqual` 方法由变量 `identifier` 决定，那么你的哈希方法应该类似于代码清单 5–4 所示。\n\n**代码清单\
    \ 5–4.** *哈希方法*\n\n```\n- (NSUInteger)hash {\n   int hash =0;\n   hash = 37 *\
    \ [self.identifier hash];\n   return hash:[self.identifier1 hash];\n}\n```\n\n\
    这里随意选取了数字 37，但你选择的任何数字都必须是质数整数。因此，如果你没有严重的性能问题，可以选择相同的数字或任何质数整数，都不会有问题。\n\n**注意：**\
    \ 在代码清单 5–4 中，我演示了如何自行编写哈希算法，因此我基于字符串的哈希值计算了一个新的哈希值。在像这样简单的情况下，你只需直接返回 `[self.identifier\
    \ hash];` 即可。\n\n##### NSMutableSet\n\n`NSSet` 是苹果公司对抽象概念“集合”的实现。集合是一个无序的容器，不包含重复元素。换句话说，`NSSet`\
    \ 中不存在任何一对元素 `e1` 和 `e2` 使得 `[e1 isEqual:e2];` 返回 `YES`。\n\n基于集合的唯一性特征，人们通常基于哈希算法来实现集合。哈希算法将使得集合能够非常轻松地找到其中的任何元素。\n\
    \n现在，想象你有一个如图 5–10 所示的集合。你的集合容量为七个元素。\n\n![图片](img/0510.jpg)\n\n**图 5–10.** *使用哈希方法在集合中查找元素*\n\
    \n一个新元素“vo”到达了，你想要将其添加到集合中。由于你的集合不能包含重复元素，首要任务是检查集合中是否已包含元素“vo”。如图 5–8 所示，如果使用数组来实现，你必须遍历该数组来检查相等性。但是，使用集合则简单得多。\n\
    \n第一步：哈希运算\n\n`@”vo”` ![图片](img/arrow2.jpg)`118147 mod 13 = 1` （使用 `mod 13` 是因为集合的容量应为质数整数，这里我选择\
    \ 13 作为集合容量的示例。）\n\n第二步：你检查索引位置 1 处的元素，如图 5–11 所示。\n\n![图片](img/0511.jpg)\n\n\
    **图 5–11.** *使用哈希方法在集合中查找元素*\n\n这样你就找到了它。如果集合中已经包含元素 `@”vo”`，则不应添加重复项。如果该索引位置没有任何内容，那么\
    \ `@”vo”` 应被添加到此索引位置。（为简化起见，我不讨论两个不同元素具有相同哈希值时的情形，尽管这在现实中是可能发生的。）\n\n插入/删除：\n\n\
    *   如前例所示，插入/删除操作可以通过哈希函数即时完成，并将元素添加到正确的索引位置。性能为：`O(1)`。但是，你无法确定插入的位置。\n\n搜索：\n\
    \n*   如果你要搜索一个对象，可能有三个目的。第一个目的是检查该对象是否包含在集合中。第二个目的是在集合中找到一个与你手头对象相等的对象。最后一个目的是查看集合中的对象是否具有满足某个条件的特定属性。\n\
    \    *   对于第一个目的，你可以直接使用 `[set containsObject:obj1];` 方法，它会非常快速地返回结果：`O(1)`。\n\
    \    *   对于第二个目的，你需要创建一个与你正在查找的对象相等的模拟对象。例如，在 `isEqual:` 部分，你可以创建一个新对象，使得 `[newObj\
    \ isEqual:oldObject]` 返回 `YES`。好处是创建新对象的成本很低，或者你无需知道太多信息。之后，你可以调用 `MyItem *oldObject\
    \ = [set member:newObject];`，从而获得包含完整信息的旧对象。这种情况下性能为：`O(1)`。\n    *   最后一个目的是查找某个属性，例如以字符“k”开头的名称。你需要像在数组中一样遍历所有元素。这种情况下性能为：`O(n)`。\n\
    \n访问：\n\n*   你不能像在数组中那样通过索引直接访问任何元素。搜索部分讨论的一种访问元素的方法是创建一个与你想要访问的对象 `isEqual:`\
    \ 的模拟对象。性能为 `O(1)`。\n\n排序：\n\n*   Cocoa Touch 框架没有提供对 `NSMutableSet` 排序的好方法。它只提供了一个返回排序后数组的方法。基于数组的排序性能，我可以估计集合排序的性能为：`O(nlogn)`。\n\
    \n表 5–4 *展示了 NSMutableSet 的常用方法和 API。*\n\n![图片](img/t0504.jpg)\n\n![图片](img/t0504a.jpg)\n\
    \n**注意：** 使用 `NSMutableSet` 和 `NSSet` 的一个重要因素是其丰富的集合操作 API。就像数学中的集合概念一样，你可能需要使用特殊的运算，如并集、交集和差集。如果你需要大量操作具有唯一数据的集合，并且关心并集、交集或差集运算，那么集合是最佳选择。\n\
    \n例如，你得到两个列表：一个是打网球的人的列表，另一个是踢足球的人的列表。现在，你需要找出三个列表：\n\n*   既打网球又踢足球的人。\n*   只打网球的人。\n\
    *   只踢足球的人。\n\n我将把这个作为练习留给你去实践。你应该分别用数组方法和集合方法尝试实现。\n"
- fmt: '##### `NSMutableDictionary`


    `NSDictionary`和`NSMutableDictionary`是计算机科学中哈希表概念的具体实现。哈希表的规范是：你有一个唯一键的列表，每个键对应一个值，该值不需要是唯一的。哈希表利用哈希概念来确保其拥有一组唯一的键。


    如[图5–12](#Chapter05.html#fig_5_12)所示，`NSMutableDictionary`包含一个键/值对列表。键与一个对象关联，并且可以通过该键访问该对象。


    当你有一对新的（键值）要添加到`NSMutableDictionary`时，你需要计算哈希值并将其添加进去，方式与上述`NSMutableSet`相同。键集合类似于一个集合，只能包含唯一项。经过哈希函数处理后，你可以确定该键在键集合中的索引，然后将键和值都插入到正确的位置。


    ![images](images/0512.jpg)


    **图5–12.** *字典概念说明*


    在最简单的情况下，如果键是一个整数，你可以将`NSMutableDictionary`的工作方式理解为一个数组，左侧是索引，右侧是值。对于字典而言，主要区别在于键会被哈希处理以生成一个索引。


    现在，让我们分析`NSMutableDictionary`在每个操作（插入/删除、搜索、访问和排序）中的性能。


    **插入/删除：**


    *   与集合的情况一样，字典的插入/删除通过确定键的正确位置而立即完成。性能为`O(1)`。


    **搜索：**


    *   与集合的情况相同，你需要创建一个对象，对该对象调用`[newObj isEqual:oldObj]`返回`YES`，并使用该对象来查找值。性能为`O(1)`。


    **访问：**


    *   在字典中，你只关心访问某个键的值。如果你已经知道键，那么访问值的性能为`O(1)`。


    **排序：**


    *   你无法对字典进行排序，因此你可以选择对键集合或值集合进行排序。无论哪种方式，你都需要从字典中创建一个新数组，然后对其进行排序。性能与对数组排序相同：`O(nlogn)`。


    [表5–5](#Chapter05.html#tab_5_5)展示了`NSMutableDictionary`的常用方法和API。


    ![images](images/t0505.jpg)


    **注意：** 要将一个对象作为键放入`NSMutableDictionary`，相应的类必须遵循`NSCopying`协议，并实现`copyWithZone:`方法。例如，`NSString`遵循`NSCopying`协议，但`UIView`不遵循。因此，你不能在`NSDictionary`内将`UIView`用作键。


    我已经介绍了 Cocoa Touch 框架免费提供的三个主要的重要数据结构及其API。这些类及其方法将在合理的时间内处理你的大多数问题。接下来，我将介绍针对特定情况的其他重要且有用的数据结构。在花费时间构建新的数据结构之前，请记得对你的应用性能进行基准测试和测试。使用这些内置且经过充分测试的数据结构应始终是你的首选。


    ### 其他数据结构


    如果你需要考虑超越基本的内置类，这里有一些其他的基本数据结构：


    *   **链表：** 当你需要进行大量插入/删除操作并希望保持像数组一样的有序集合时，链表非常适用。

    *   **二叉树：** 当你需要一个始终排序的集合时，二叉树非常适用。这不同于每当你向数组中插入一个新项就需要再次对整个数组进行排序。在`NSArray`（即使是已排序的数组）中进行搜索，总是需要线性搜索，因为无法知道数组是否已经排序。当你需要对项目进行二分查找时，二叉树更好。二分查找与线性查找相比，性能为`O(logn)`对比`O(n)`。

    *   **栈和队列：** 当你需要构建一个只允许在末尾添加并从末尾取出（栈），或者在末尾添加并从开头取出（队列）的API时，它们非常适用。你可以通过链表或普通数组轻松实现它们。

    *   **图：** 这是数学和计算机科学中用于演示复杂问题的一个概念。尽管许多问题会在服务器端解决，但了解图论将帮助你解决iPhone端的许多问题。'
  raw: '##### NSMutableDictionary


    NSDictionary and NSMutableDictionaryare specific implementations of the hash table
    concept in computer science. The specification for a hash table is you have a
    list of unique keys and that each key corresponds to a value, which does not need
    to be unique. The hash table utilizes the hash concept to make sure that it has
    a list of unique keys.


    As [Figure 5–12](#Chapter05.html#fig_5_12) shows, your NSMutableDictionary contains
    a list of key/value pairs. The key is associated with an object, and that object
    can be accessed through the key.


    When you have a new pair of (key values) that you want to add into the NSMutableDictionary,
    you need to calculate the hash and add them in, like the way you did with NSMutableSet
    above. The key collection is like a set and can only contain unique items. After
    the hashing function, you can determine the index of the key in the key collection,
    and then you insert both the key and value into the correct position.


    ![images](images/0512.jpg)


    **Figure 5–12.** *Illustration for the Dictionary concept*


    In the simplest case where the key is an integer, you can understand that the
    NSMutableDictionary works similarly to an array, with the index in the left and
    the value on the right. In the case of a dictionary, the main difference is that
    the key will be hashed to create an index.


    Now, let''s analyze the performance of NSMutableDictionary in each operation (insert/delete,
    search, access and sort).


    Insert/Delete:


    *   As in the set case, the insert/delete for dictionary will happen instantly
    by determining the correct key position. The performance is O(1).


    Search:


    *   The same as the set case, you need to create an object for which the call
    of `[newObjisEqual:oldObj]` returns YES, and use that object to look up the value.
    The performance is O(1).


    Access:


    *   In dictionary, you only care about accessing the value of a pair. If you already
    know the key, then the performance for accessing the value isO(1).


    Sort:


    *   You can''t sort a dictionary, so you can choose to either sort the key collection
    or the value collection. Either way will make you create a new array from the
    dictionary and then sort it. The performance is the same as if you sort an array:
    O(nlogn).


    [Table 5–5](#Chapter05.html#tab_5_5) shows the common methods and APIs for NSMutableDictionary.


    ![images](images/t0505.jpg)


    **NOTE:** For an object to be put as a key into a NSMutableDictionary, the corresponding
    class has to conform to nscopying protocol, and implement the method `copyWithZone`:.
    For example, NSString conforms to NSCopying protocol but `UIView` does not. Therefore,
    you can''t use a `UIView` as a key inside NSDictionary.


    I have finished the three main important data structures and their APIs that Cocoa
    Touch framework provides free as built-in data structures. These classes and their
    methods will handle most of your problems in a reasonable amount of time. Next,
    I will introduce other important and useful data structures for specific cases.
    Remember to benchmark and test your app''s performance before spending your time
    building a new data structure. Using these built-in and well-tested data structures
    should always be your first choice.


    #### Other Data Structures


    If you need to think beyond basic built-in classes, here are some other basic
    data structures:


    *   Linked list: Good when you need to do a lot of insert/delete and want to keep
    an ordered collection like array.

    *   Binary tree: Good when you need a collection that always sorted. This is different
    than whenever you insert a new item into an array and you need to sort the array
    again. Searching in NSArray, even a sorted array, will always require a linear
    search because there is no way to know that the array is already sorted. Binary
    tree is better when you need to do a binary search for the item. Binary search
    compared to linear search is O(logn) compare to O(n).

    *   Stack and queue: These are good when you need to build an API that only allows
    you to add at the end and get out from the end (stack), or add at the end and
    get out from the beginning (queue). You can easily implement them by a linked
    list or a normal array.

    *   Graph: This is an important concept in mathematics and computer science to
    demonstrate difficult problems. Although many problems will be solved in server
    side, knowing about the graph will help you with many problems on the iPhone side.'
