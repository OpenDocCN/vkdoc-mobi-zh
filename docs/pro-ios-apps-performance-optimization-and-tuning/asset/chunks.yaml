- fmt: '# Preface


    The book is meant to help you sharpen your iOS development skills in a specific
    area: performance optimization. The book is intended for people who already have
    basic skills in iOS development and want to make the best application for users.


    Inspired by the art of application performance, I spend time practicing, learning,
    and sharing a lot about performance optimization in different platforms such as
    the web and smartphones. I love discussing this topic with people. While spending
    lots of time in forums and iOS communities like Stack Overflow and the Apple Developer
    Forum, I soon recognized that the majority of iOS developers have the same questions
    on how to improve the performance of their applications. I thought it would be
    useful to put all common issues together in a well-written and well-structured
    book so people can easily get the whole picture of the iOS performance optimization
    problem. That motivated me to write this book, and I tried my best to cover the
    most common problems and mistakes met by developers.


    Moreover, I observed and recorded in my own notes many similar problems between
    iOS, Android, and Windows phones. The final chapter is written based on these
    notes, and I think this chapter will be really useful for anybody who wants to
    work in these three platforms or shift from one platform to another.


    When approaching a performance bottleneck, it is good to see it in different ways
    and strike a balance between the performance of the application and the difficulty
    of implementing the solution. There are subtle problems that cause people to make
    mistakes unless they know about the solutions beforehand. My hope is that this
    text will help you to avoid those mistakes, spend your time improving your application,
    and create a better experience for your users.


    # Chapter 1: Introduction to iOS Performance Optimization


    This chapter will introduce general information about the book, including the
    following:


    - Who this book will best serve

    - The topics this book will cover

    - The general structure and style of the book


    ## A New Era of Smartphone


    There are currently hundreds of thousands of iOS applications on the market and
    hundreds of millions of iOS users, making this a big market for any company or
    developer to explore. This market has been growing for many years and will keep
    growing in the next few years, as will the need for interesting and powerful applications.
    If you have a good idea for a new app, you need to make sure that the idea is
    implemented well; this includes creating a good user experience. Because of the
    unique technical limits of the Smartphone environment, good performance is a must
    for your application. People want an app that responds quickly to their interactions,
    one that can compute data and visualize it immediately.


    ## Why Performance Matters


    Performance is not just about algorithms, data structure, and memory. It''s about
    making people feel that the application responds to any interaction as fast as
    possible. Therefore, performance optimization in your iPhone application is important.
    Users have to feel that they are interacting with real agents that receive their
    command and execute it almost immediately. What if you tap a button and two long
    seconds later, you see the effect. Are you happy with this performance? If you''re
    not happy, your users are probably even more frustrated.


    Of course, you can shift much of your storage and processing into the cloud where
    there are thousands of servers that can compute and return the result quickly.
    However, it''s not enough to just put all your data and every computation into
    the cloud. Network data transfers are tricky and your users will still probably
    need to wait for a couple of seconds before their data arrives.


    Whether you are a game developer or a general application developer, you are likely
    to experience difficulties in improving the performance of your applications.


    ## Who Should Use This Book?


    This book is written mainly for beginner and intermediate iPhone developers who
    already know basic iPhone programming. If you''re a performance lover and want
    to create an application on this new platform that is responsive and market-ready
    as well as innovative, this book is for you. Even advanced iOS developers can
    benefit from this book.


    If you intend to go deeply into the Smartphone application programming world,
    this book teaches you enough so that you can apply what you know with iOS to Android
    and Windows Phone environment.


    ## My Teaching Style


    I believe that the learn-by-doing principle is the best way for a programmer to
    develop skills. This book is based on that idea. I discuss general and deep practices
    that stem directly from around two years of iPhone development experience and
    many years of Java development experience and training. The problems that I put
    before you will help you to avoid or fix many of your performance mistakes in
    iPhone development. I have chosen these problems based on experience and research
    into the issues popular on forums and social networks (such as Stack Overflow).
    I''ve identified common pitfalls and provide the information you need to avoid
    these errors.


    The book is a combination of three things: basic concepts, story illustrations,
    and sample source code. Instead of just supplying an ad-hoc tool for your specific
    problem, I hope to provide you with strong skills to use in your daily iPhone
    programming life. I employ different approaches to communicating concepts: sometimes
    an image is worth a thousand words, some concepts are best explained by sample
    code, and some require those thousand words.


    One of the best ways to start learning about performance is to develop a cool
    application that you love. This practical experience will teach you more than
    some non-realistic and very forgettable examples.


    You don''t need to know a lot about Cocoa Touch Framework because I explain the
    basic syntax and classes that you''ll need to improve your application''s performance.
    Each chapter consists of a separate topic, some of which may already be familiar
    to you. You can also use this book as a general reference; whenever you have a
    specific problem, you can look it up and read about the solution.


    Every chapter follows a simple format: a short overview about what that chapter
    delivers followed by the main sections and subsections. Each chapter concludes
    with a summary that helps consolidate your knowledge and reminds you of the important
    lessons, followed by some basic and realistic exercises so that you can have fun
    practicing what you just learned.


    ## What Do You Need?


    As an iOS developer, you need a Mac OS with Xcode installed. There is a free Xcode
    version from the iOS Developer Account, or you can download it directly from Apple
    Mac AppStore. You also need a copy of this book plus all of the sample code, which
    you can download from the Apress website. The sample projects were well tested
