  trans: "\n### 总结\n\n根据我的测试，可以看到网络性能远低于文件性能，而文件性能又远低于内存性能。你应该始终尝试使用分析工具找出瓶颈，而不是花费过多时间优化某些部分。换句话说，请避免过度优化。\n\
    \n你已经了解了缓存的基本主题，例如缓存命中、缓存未命中、存储成本、检索成本、替换策略以及几种著名的算法。其中一些算法非常简单但效率不高；另一些可能很高效，但实现起来耗时费力。你可能会使用随机替换算法以求简单，而在复杂情况下使用\
    \ LRU 或 LFU。\n\n你还学习了所有可能的缓存存储方式以及每种方法的使用场景。你可以根据需求的特定目的，将数据存储在临时文件夹、缓存文件夹或文档文件夹中。你也可以选择使用相册，以便轻松与其他应用程序共享。你还学习了在应用内部存储/缓存数据的技术，以及不同结果、优点和缺点。\n\
    \n最后，你学习了内存缓存。你应该允许对内存缓存数据进行全局访问还是严格访问？你应该将数据预加载到内存中，还是即时加载？两者都有优点和缺点，在做出决定之前你需要仔细考虑。\n\
    \n**练习**\n\n1.  自己实现 LFU 缓存算法。如果遇到问题，可以查看我的提示。\n2.  使用适当的工具对两种不同的算法（FIFO 和 LRU）进行基准测试。\n\
    3.  编写一个简单的程序来获取 plist 文件并将其解析为相应的结构化数据。\n4.  获取程序内附带的 plist 文件（`Questions.plist`），并将其转换为\
    \ CoreData 中的数据。\n\n## 第 5 章\n\n## 使用算法和数据结构优化你的应用\n\n在本章中，你将学习：\n\n*   糟糕的算法和数据结构会如何影响应用性能。\n\
    *   衡量算法的理论问题。\n*   应用性能的实际测量。\n*   主要的数据结构和算法：\n    *   iPhone 数据结构：`NSSet`、`NSArray`和`NSDictionary`。\n\
    \    *   其他重要的数据结构及其实现。\n    *   其他算法和问题解决方法：\n        *   递归\n        *   XML\
    \ 解析中的 SAX 与 DOM\n\n你也许听说过，在手机开发中由于服务器端的计算能力强大，你不需要担心算法和数据结构。然而，正如上一章关于缓存问题所提到的，特别是当你的手机离线时，你应该将数据本地存储并在手机环境中进行计算。问题就在这里：你的手机环境不如服务器环境强大。换句话说，你没有云计算或数据中心的能力。\n\
    \n### 第一个示例\n\n第一个示例将向你展示，当一个糟糕的算法在严格的手机环境中运行时，会如何影响你的程序。\n\n我的示例代码很简单：\n\n* \
    \  在第一个基准测试中，示例包含两个数组，每个数组包含 1000 个元素。第一个和第二个数组在元素数量上是相同的。我遍历两个数组来检查两者之间有多少个公共元素。\n\
    *   在第二个基准测试中，示例包含两个集合，每个集合包含 1000 个元素。我使用`NSSet` API 中的一个特殊方法来获取两个原始集合之间的公共元素集合。\n\
    \n然后，我分别在模拟器、新设备（安装了 iOS4 的 iPhone 4）和旧设备（安装了 iOS3 的 iPhone 3G）上对它们进行了基准测试。结果如表\
    \ 5-1 所示。\n\n![图片](img/t0501.jpg)\n\n表 5-1 显示第二个基准测试比第一个基准测试快 100 倍。考虑到在处理真实应用时，1000\
    \ 个元素并不算多，5.44 秒对于新设备来说可能不算什么。但是，请记住，市面上有很多性能较弱的旧设备，而这些设备的所有者可能不会很快升级它们。如此看来，5.44\
    \ 秒在旧设备上运行实际上是一个显著的延迟。\n\n接下来，在深入解释一些概念之前，我们先看看初始源代码和一些简要说明。\n\n代码清单 5-1 和 5-2\
    \ 的目的是统计第一个数组/集合中有多少对象也属于第二个数组/集合。代码清单 5-1 通过使用数组和循环解决问题，而代码清单 5-2 通过使用集合解决问题。\n\
    \n**代码清单 5-1.** *使用数组和循环的第一个基准测试*\n\n```\n// [self defaultData] 返回一个包含 1000 个不同\
    \ NSObject 对象的数组\nNSArray *myFirstArray = [NSArray arrayWithArray:[self defaultData]];\n\
    NSArray *mySecondArray = [NSArray arrayWithArray:[self defaulData]];\nNSDate *date1\
    \ = [NSDate date];\nint i = 0;\nfor (NSObject *obj in myFirstArray) {\n    for\
    \ (NSObject *secondObj in mySecondArray) {\n        if ([secondObj isEqual:obj])\
    \ {\n            i++;\n            break;\n        }\n    }\n}\n\nNSDate *date2\
    \ = [NSDate date];\nNSLog(@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n\
    NSLog(@\"i: %d\", i);\n```\n\n**代码清单 5-2.** *使用集合的第二个基准测试*\n\n```\n- (void)secondBenchmark\
    \ {\n    NSArray *defaultArray = [self defaultData];\n    NSMutableSet *myFirstSet\
    \ = [NSMutableSet setWithArray:defaultArray];\n    NSMutableSet *mySecondSet =\
    \ [NSMutableSet setWithArray:defaultArray];\n\n    NSDate *date1 = [NSDate date];\n\
    \n    [myFirstSet intersectSet:mySecondSet];\n\n    NSDate *date2 = [NSDate date];\n\
    \    NSLog(@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n    NSLog(@\"\
    count: %d\", [myFirstSet count]);\n}\n```\n\n对于第一个基准测试，我将 1000 个元素放入每个数组，然后遍历两个数组来查找是否有任何两个元素相同。为了避免重复计数，程序在第二个数组中找到该元素后，就会停止遍历第二个数组。\n\
    \n第二种方法简单得多；通过使用`NSSet`，你只需要将所有元素存储在`NSSet`中，并调用正确的方法来为你完成工作。`intersect`方法会找出两个集合中的相同元素，并将它们放入变量`myFirstSet`中。\n\
    \n正如你所见，错误的方法可能比正确的方法慢 100 倍。此外，正确的方法可能为你节省几个小时的编码时间，因为你不需要重复造轮子，可以直接复用所有必要的数据结构和算法。因此，从一开始就选择正确的方法是个好主意。\n\
    \n### 衡量算法性能的理论问题\n\n我已经在代码清单 5-1 和 5-2 中向你展示了一种使用`NSLog`和`NSDate`来衡量算法性能的方法。然而，在计算机科学中，人们不会使用`NSLog`或分析工具来讨论一个算法相对于其他算法有多快。计算机科学需要精确的数据和标准来确保某些算法确实优于其他算法。\n\
    \n人们通常使用大 O 表示法来描述一个算法在最坏情况下的扩展（性能）情况。（计算机科学中使用的其他术语和定义，我在此不展开讨论。）例如，如果你有一个性能为`O(N)`的算法，那么该算法对一个包含\
    \ 25 个元素的数组进行操作时，需要执行 25 步；相比之下，对一个包含 5 个元素的数组，只需要执行 5 步。因此，25 个元素的数组完成任务所需时间是\
    \ 5 个元素数组的 5 倍。\n"
- fmt: '#### How to Measure Big-O


    To determine the Big-O of an algorithm, you need to look at how the size of the
    input affects the time it takes the algorithm to execute. Another way to accomplish
    this is to logically think through the algorithm execution. [Listing 5–3](#Chapter05.html#list_5_3)
    should help you understand this concept.


    **Listing 5–3.** *How to Measure Big-O*


    ```objectivec

       int myFirstCount = 0;

       int mySecondCount = 0;

       // Outer Loop

       for (int i = 0; i < [myFirstArray count]; i++) {

            // Inner Loop

           for (int i = 0; i < [mySecondArray count]; i++) {

               myFirstCount++;

               mySecondCount++;

           }

           NSLog(@"my first Count: %d", myFirstCount++);

           NSLog(@"my second Count: %d", mySecondCount++);

       }

    ```


    For the purposes of illustration, [Listing 5–3](#Chapter05.html#list_5_3) contains
    duplicate code of two variables, `myFirstCount` and `mySecondCount`, which do
    exactly the same thing. I will explain them further later.


    So, looking through each line of code, you can see that the two main computation
    logics is `myFirstCount++;` and `mySecondCount++;`. There are other computing
    logics like `NSLog(@"my first Count: %d", myFirstCount);` and `NSLog(@"my second
    Count: %d", mySecondCount);`.


    In this part, `m` and `n` are the number of elements in `myFirstArray` and `mySecondArray`
    respectively. Programmatically, after the outer loop, `myFirstCount` and `mySecondCount`
    each has the value of (m * n + m). The sum of them will have the value of 2 *
    m * n + 2 * m.


    The following explanation will give you the details of why the total result is
    2 * m * n + 2 * m. This helps you do performance analysis yourself without using
    the actual counting code.


    The outer loop (the loop that runs over `myFirstArray`) runs `m` times. Because
    the outer loop runs `m` times, every computation logic inside the outer loop runs
    `m` times as well. So the number of computation of the outer loop is `m * (the
    number of computation inside the outer loop)`.


    To calculate the number of computation inside the outer loop, I consider the inner
    loop and the two `NSLog` lines. For each cycle of the loop, the inner loop and
    two `NSLog` lines run once. So, the number of computation of the outer loop is
    `m * (the number of computation of the inner loop + 2)`. ( * )


    Then, I let `n` be the number of elements in `mySecondArray`. Similarly to the
    previous situation, the inner loop runs `n` times, and every computation logic
    inside the inner loop runs `n` times. There are only two computation logics inside
    the inner loop, `myFirstCount++` and `mySecondCount++`. Therefore, the number
    of computation logic inside the inner loop is `2 * n`. Place this result into
    the ( * ) equation and you have `m * (2 * n + 2) = 2 * m * n + 2 * m`.


    Therefore, the total calculation is `2 * m * n + 2 * m`.


    To make the calculation simple, I will let `m = n`. It can be rewritten as `2
    * n * n + 2 * n` by replacing `m` with `n`. It can be further simplified as `2n²
    + 2n`. The next step is to keep the most significant term (or the fastest growing
    term) in the formula, so you have only `2n²` left. The last step is to remove
    all constants in the formula, so you have `n²` left, which you can write in the
    theoretical format as `O(n²)`.


    **NOTE:** You can see why I put duplicate code into [Listing 5–3](#Chapter05.html#list_5_3);
    it demonstrates that the final result doesn''t depend much on any constants. Using
    either `n²` or `2n²` doesn''t make any difference.


    Each of the operations has its own growth rate. Here''s an example of the growth
    rate of operations: `log(n)`, `n`, `n²`.


    For `n = 1`, you have `log(1) = 0`, `n = 1`, and `n² = 1`.


    For `n = 10`, you have `log(10) = 1`, `n = 10`, and `n² = 100`. You can see that
    by increasing `n` by 9 units, the `log(n)` only increases 1 unit, `n` increases
    9 units, and `n²` increases 99 units.


    For `n = 100`, you have `log(100) = 2`, `n = 100`, and `n² = 10,000`. You can
    see that by increasing `n` by 9 units, the `log(n)` only increases 1 unit, `n`
    increases 9 units, and `n²` increases 99 units.


    Thus by increasing the same number of units, different operations grow differently.
    [Figure 5–1](#Chapter05.html#fig_5_1) shows how fast each operation (`log(n)`,
    `n`, `n²`, and `n³`) grows when you increase `n`.


    ![images](images/0501.jpg)


    **Figure 5–1.** *Results of each Big-O notation when the input (variable n) increases*


    #### Implementation Details


    The Big-O notation doesn''t mention anything about implementation details; it
    neither tells you how much memory you need to embody an algorithm nor how difficult
    it will be to implement such an algorithm into your system. It also doesn''t tell
    you which algorithms may be better in a small scale input but repeated many times.
    For example, in a small scale, an insertion sort will be faster than a quick sort;
    when repeated 100 times, the total performance of insertion sort will beat the
    quick sort. Therefore, Big-O notation gives you a general understanding about
    algorithms, which you can use to quickly compare different algorithms and approaches.


    **NOTE:** There are other notations in the family of notations to describe average
    and best cases performance. These notations indicate how good each algorithm is
    when you take individual circumstances into consideration.


    #### Big-O of Famous Algorithms


    To give you a better understanding of Big-O, [Table 5–2](#Chapter05.html#tab_5_2)
    lists famous algorithms and their corresponding Big-O notation so that you can
    see how these algorithms will behave theoretically.


    ![images](images/t0502.jpg)


    You may get confused about the order in which you should understand the Big-O
    notation. The order is like this: `O(log(n)) < O(n) < O(n * log(n)) < O(n²)`.


    If you take a look at [Table 5–2](#Chapter05.html#tab_5_2), this means that:


    * Bubble sort is slower than merge sort and quick sort.

    * Linear search is slower than binary search.


    Thus, because merge sort and quick sort run faster than bubble sort, you should
    choose these sorting algorithms over bubble sort in most cases.


    ### Practical Measurement


    In practical use, you will need to combine some theory about Big-O with the instruments
    and analysis tools covered in [Chapter 2](#Chapter02.html#ch2). Here''s a quick
    review of the important tools for measuring the performance of your algorithms
    and data structure: CPU Sampler and Time Profiler.


    ![images](images/0502.jpg)


    **Figure 5–2.** *Results of running CPU Sampler over the program*


    ![images](images/0503.jpg)


    **Figure 5–3.** *Detailed results of each method and function inside the program*


    [Figure 5–2](#Chapter05.html#tab_5_2) shows the usage of CPU Sampler showing system
    load, user load, and total load when the program is running. [Figure 5–3](#Chapter05.html#fig_5_3)
    provides more details about each method inside the program, such as how often
    each method is called and how long it takes for a method to finish.


    ![images](images/0504.jpg)


    **Figure 5–4.** *The Time Profiler instrument*


    ![images](images/0505.jpg)


    **Figure 5–5.** *Detailed results of the Time Profiler*


    The Time Profiler ([Figure 5–4](#Chapter05.html#fig_5_4)) focuses more on the
    running time of your program. [Figure 5–5](#Chapter05.html#fig_5_5) shows the
    detailed results of the time perspective.


    You should use the instruments to figure out which method you actually need to
    optimize. All methods may run slowly or need optimizing but you should only focus
    on methods that run frequently through your program''s life cycle. You have limited
    time and resources to optimize the algorithms and data structure for that method.'
