- fmt: '### CPU Sampler


    The tool samples the target application at fixed intervals; the default interval
    is 10ms but you can change it to something else. Each time the CPU is sampled,
    the tool also records a stack trace. The sample and stack trace is usually enough
    for you to recognize the bottlenecks that need fixing inside your app.


    ![images](images/0216.jpg)


    **Figure 2–16.** The main CPU sampler panel


    As shown in [Figure 2–16](#Chapter02.html#fig_2_16), the CPU Sampler gives you
    the data about System Load and User Load. System Load is the loading time by system
    such as file, networking, and logic processing while user load relates to the
    UI and the interaction between the user and the app.


    [Figure 2–16](#Chapter02.html#fig_2_16) shows that the general usage and loading
    for system and user is stable over time but goes up a little bit at some points
    and significantly at the end of the sample time. This information is normally
    not enough to figure out any problems, though. So you will need to look further
    into the main area.


    Before I continue, you should configure your Sampler to show only areas directly
    related to your code by checking the box named Hide System Libraries, as shown
    in [Figure 2–17](#Chapter02.html#fig_2_17).


    ![images](images/0217.jpg)


    **Figure 2–17.** The main CPU sampler panel


    Then, in the main list result, you will see something like [Figure 2–18](#Chapter02.html#fig_2_18)—a
    list of main functions called, how many times they are called inside the sample
    time, and the percentage of number of times compared to the general process.


    ![images](images/0218.jpg)


    **Figure 2–18.** The running count and percentage of each function call


    You can also switch the running count to be the running time to show how much
    time each function takes to finish, as shown in [Figure 2–19](#Chapter02.html#fig_2_19).


    ![images](images/0219.jpg)


    **Figure 2–19.** The running time and percentage of each function call


    You can actually view more details of each function call inside its own stack
    trace by opening the small arrows in the left, as shown in [Figure 2–20](#Chapter02.html#fig_2_20).


    ![images](images/0220.jpg)


    **Figure 2–20.** The detailed running time of functions inside the stack trace


    **Advantages:**


    - The tool is accurate and gives you details on which time and which case the
    application consumes the most processing time.


    **Disadvantages:**


    - The results depend on how developers run the app. It may depend on the priority
    and which function is called first.

    - It can take time and effort to create a good test case to cover all the functions.

    - You need to test on the real device if you want to see the exact running time
    of each function in iOS runtime environment.


    **Usages:**


    - If developers already know which area will have the bottleneck and want to test
    to verify or know more details about the bottleneck or which exact function or
    a group of functions caused the bottleneck.


    ### Activity Monitor


    This is the tool to show the CPU time, physical memory, virtual memory, and number
    of threads when running on the iOS device. It gives a good overview on the whole
    app when the app is running on the operating system. Therefore, you can know when
    it requires the most CPU time, real memory, and virtual memory (see [Figure 2–21](#Chapter02.html#fig_2_21)).
    This number should be compared to other background-running apps as well as the
    general specification of the iOS. The latest iPhone 4 only has 500 MB of RAM so
    you can''t exceed that number. It''s good to combine this test with CPU Sampler
    and Allocations Instrument to get the whole picture about your app''s performance.


    ![images](images/0221.jpg)


    **Figure 2–21.** The detailed running time of functions inside the stack trace


    **Advantages:**


    - Provides a general view of the app''s runtime performance, including comparing
    your app to others as well as to the standard iOS environment.


    **Disadvantages:**


    - Lacks details on how each function inside the app is running.

    - Developers can''t know for certain where the bottleneck is, but they can guess
    when playing with the app to see if the memory or `%CPU` goes up or not.


    **Usages:**


    - The tool should be used in combination with other detailed tools like CPU Sampler
    or Allocations Instrument.


    ### Time Measurement


    Now let''s discuss another important topic regarding performance: time. Generally,
    when users complain about your application, they will only tell you that the application
    runs slowly here and there. Therefore, you need to measure how long it takes for
    your application to perform a specific task.


    #### Time Profiler


    Similar to the way CPU Sampler runs, Time Profiler gives you a general overview
    of how your app is running in regards to time, specifically the longest duration
    that your app is running and which functions inside your app take the most time
    to run (see [Figure 2–22](#Chapter02.html#fig_2_22)). The only difference between
    Time Profiler and CPU Sampler is that the former is about the time it takes the
    functions to run, not the CPU usage it takes to run a function.


    ![images](images/0222.jpg)


    **Figure 2–22.** The Time Profiler Interface


    ![images](images/0223.jpg)


    **Figure 2–23.** The running time of each function


    As you can see in [Figure 2–23](#Chapter02.html#fig_2_23), the Time Profiler looks
    like the CPU Sampler in that it shows each function and you can actually go into
    each function to examine the running time for that function on the stack trace.


    **Advantages:**


    - Time Profiler gives you accurate and detailed information on how much time each
    task takes to execute.


    **Disadvantages:**


    - The results depend on how developers run the app. It may depend on the priority
    and which function is called first.

    - It can take time and effort to create a good test case to cover all the functions.

    - You need to test on the real device if you want to see the exact running time
    of each function in iOS runtime environment.


    **Usages:**


    - If the developer already knows which area has bottlenecks and she wants to test
    to verify or know more details about the bottleneck or what exact function or
    a group of functions caused the bottleneck.


    ### User Interface Response Time Measurement


    Imagine that your application is running with perfect efficiency, yet the users
    still think that it runs slowly or it doesn''t respond to the users'' interaction,
    or even worse, it does not change the UI in the correct time. According to CPU
    Sampler or Time Profiler, your functions are running perfectly. However, when
    you run the app, it still does not respond well to your event. If this is the
    case, there is a big chance that the UI thread does not render your UI well. Therefore,
    you may need to use another UI-related tool to check if the rendering time in
    the UI is acceptable. Core Animation and OpenGL ES Driver Instruments are two
    good tools in iPhone to measure and test your application.'
