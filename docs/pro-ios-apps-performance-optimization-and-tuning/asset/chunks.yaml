- fmt: "#### Cache Invalidation\n\n> “There are only two hard problems in Computer\
    \ Science: cache invalidation and naming things.”\n> \n> — Phil Karlton\n\nAs\
    \ this statement suggests, cache invalidation is a hard problem. When developers\
    \ cache images/data, it can become out of date quickly. The problem is how to\
    \ know if images/data are out of date and when to check for the latest data.\n\
    \nFor images, if every image is uniquely named by a `URL`/name, then when that\
    \ `URL`/name changes (e.g., user changes his avatar), your application will immediately\
    \ know that the image is out of date and the application can get the new image.\n\
    \nHowever, if the `URL`/name of image doesn't change, you can set a specific period\
    \ of time after which you get a new image, such as 3-7 days. Happily, most web\
    \ services will take care of this and will change the `URL` when the image is\
    \ actually changed.\n\nFor data, it’s harder. If you cache the data in your file\
    \ system (by using a database or plain text; I will explain more about this later\
    \ in this chapter), then you may never know if your data is out of date. If every\
    \ time you use the data you have to go to the network to check if there is new\
    \ data in the server, you lose all the benefits of caching data within your file\
    \ system.\n\nThere are a couple of ways to solve this cache invalidation problem.\n\
    \n* Accept that your data will sometimes be out of date and that you have to use\
    \ that data to calculate and display to the user. After some specific period of\
    \ time, the app will check for latest data and replace the whole data with new\
    \ data.\n* Do your best to get data from network as fast as possible.\n* Invalidate\
    \ the cache based on users’ requests.\n\nUsually developers use a combination\
    \ of the first and third approach because it makes more sense. You can only reduce\
    \ the size of data so much; after that, you can’t reduce it any more. The third\
    \ approach can be done easily with a refresh button, and the app can reload for\
    \ new data when the app is open or is closed, which can also be done easily.\n\
    \n#### Replacement Policy\n\nReplacement policy is a strategy (usually implemented\
    \ by a specific algorithm) to determine which piece of data/image will get deleted\
    \ if necessary. It can also tell you at what time you should check to delete cache\
    \ to keep a fresh cache base. There are four main things you should always consider\
    \ when you pick one replacement policy over other policies.\n\n* **Cache hit ratio**:\
    \ As already explained, this tells you how often your app can find a specific\
    \ data/image in the cache compared to the number of times the app requests data\
    \ from cache. The higher this number, the better.\n* **Latency**: Usually refers\
    \ to two different types of latency. The first meaning is the time it takes to\
    \ load data from the cache in case you have a cache hit. The second meaning is\
    \ the time it takes to load data from the original source in case you have a cache\
    \ miss. You will have to consider if you want to cache the heaviest items (such\
    \ as 1MB and above) or if you want to cache smaller items (less than 10KB). The\
    \ smaller item will give you a higher cache hit ratio, but it may not save bandwidth\
    \ and time like the heavier item.\n* **Storage constraint**: This is usually a\
    \ trade-off with cache hit ratio because you only have limited available space\
    \ (both memory and file space) in an iPhone, so you have to consider it carefully.\
    \ Otherwise, you can store as much as you want in order to increase the cache\
    \ hit ratio.\n* **Algorithm complexity**: How hard will it be to implement the\
    \ algorithm to match your favorite policy? In many algorithms, you may need to\
    \ keep track of a specific file or database to track the usage of each of piece\
    \ of data/image you use to optimize your cache. This is a big trade-off; you will\
    \ use more memory, and the app needs to spend CPU and time to execute the algorithm\
    \ to determine if it should delete a piece of cache. Note that the more complex\
    \ the algorithm, the more you will need to spend to build, maintain, and fix any\
    \ bugs inside your own algorithm.\n\n#### Caching Algorithms\n\nI will cover some\
    \ very basic and easy-to-implement algorithms like random replacement, first in\
    \ first out and simple time-based plus more complex algorithms like least recently\
    \ used and least frequently used.\n\n##### Belady’s Algorithm\n\nThis is a theoretical\
    \ algorithm that states that if a piece of information is not necessary in the\
    \ future, the app should go ahead and delete it. Why do I say that this is a theoretical\
    \ algorithm? Because in many real-world cases, you never know if that piece of\
    \ information will be necessary in the future or not. For example, say the web\
    \ site changes the image to some new image and the app figures out that it doesn’t\
    \ need to use the old image anymore. Bing! The image gets deleted. Then the web\
    \ designer changes his mind and replaces back the old image. Now the app needs\
    \ to reload the old image. Therefore, most of time (but not always), Belady’s\
    \ algorithm is not practical and actually impossible to implement with real code.\
    \ However, this algorithm is used as a benchmark to compare other algorithms.\n\
    \n##### Random Replacement\n\nThere is not much to tell about this algorithm.\
    \ You delete cache based on some random access.\n\n**Advantage:**\n\n* It requires\
    \ almost no effort to implement the algorithm.\n\n**Disadvantage:**\n\n* It may\
    \ not offer much benefit in terms of cache hit and cache invalidation. The algorithm\
    \ may mistakenly delete some files that are still necessary while keeping an unused\
    \ file for a long time.\n\n**Implementation:**\n\nFile:\n\n```objc\n    // File\
    \ Random Replacement\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n\
    \    NSString *filePath = NSTemporaryDirectory();\n    NSDirectoryEnumerator *fileNames\
    \ = [fileManager enumeratorAtPath:filePath];\n    NSString *firstFileName = @\"\
    \";\n    for (NSString *fileName in fileNames) {\n        firstFileName = fileName;\n\
    \        break;\n    }\n    [fileManager removeItemAtPath:firstFileName error:nil];\n\
    ```\n\nMemory: For memory caching, you will usually use a dictionary that binds\
    \ a unique URL/name to the object. This helps you retrieve the data easily by\
    \ passing the unique `URL`/name to the dictionary. In this sample, I use `cacheDictionary`\
    \ to store the memory data.\n\n```objc\n    // cacheDictionary is a dictionary\
    \ to store a map between a name of image and the\n    // image itself\n\n    NSObject\
    \ *firstObj = nil;\n    for (NSObject *obj in [cacheDictionary allKeys]) {\n \
    \       firstObj = obj;\n        break;\n    }\n    [cacheDictionary removeObjectForKey:firstObj];\n\
    ```"
  raw: "#### Cache Invalidation\n\n> *“There are only two hard problems in Computer\
    \ Science: cache invalidation and naming things.”*\n> \n> — Phil Karlton\n\nAs\
    \ this statement suggests, cache invalidation is a hard problem. When developers\
    \ cache images/data, it can become out of date quickly. The problem is how to\
    \ know if images/data are out of date and when to check for the latest data.\n\
    \nFor images, if every image is uniquely named by aURL/name, then when that URL/name\
    \ changes (e.g. user changes his avatar), your application will immediately know\
    \ that the image is out of date and the application can get the new image.\n\n\
    However, if the URL/name of image doesn't change, you can set a specific period\
    \ of time after which you get a new image, such as 3-7 days. Happily, most web\
    \ services will take care of this and will change the URL when the image is actually\
    \ changed.\n\nFor data, it's harder. If you cache the data in your file system\
    \ (by using a database or plain text; I will explain more about this later in\
    \ this chapter), then you may never know if your data is out of date. If every\
    \ time you use the data you have to go to the network to check if there is new\
    \ data in the server, you lose all the benefits of caching data within your file\
    \ system.\n\nThere are a couple of ways to solve this cache invalidation problem.\n\
    \n*   Accept that your data will sometimes be out of date and that you have to\
    \ use that data to calculate and display to the user. After some specific period\
    \ of time, the app will check for latest data and replace the whole data with\
    \ new data.\n*   Do your best to get data from network as fast as possible.\n\
    *   Invalidate the cache based on users' requests.\n\nUsually developers use a\
    \ combination of the first and third approach because it makes more sense. You\
    \ can only reduce the size of data so much; after that, you can't reduce it any\
    \ more. The third approach can be done easily with a refresh button, and the app\
    \ can reload for new data when the app is open or is closed, which can also be\
    \ done easily.\n\n#### Replacement Policy\n\nReplacement policy is a strategy\
    \ (usually implemented by a specific algorithm) to determine which piece of data/image\
    \ will get deleted if necessary. It can also tell you at what time you should\
    \ check to delete cache to keep a fresh cache base. There are four main things\
    \ you should always consider when you pick one replacement policy over other policies.\n\
    \n*   *Cache hit ratio*: As already explained, this tells you how often your app\
    \ can find a specific data/image in the cache compared to the number of times\
    \ the app requests data from cache. The higher this number, the better.\n*   *Latency*:\
    \ Usually refers to two different types of latency. The first meaning is the time\
    \ it takes to load data from the cache in case you have a cache hit. The second\
    \ meaning is the time it takes to load data from the original source in case you\
    \ have a cache miss. You will have to consider if you want to cache the heaviest\
    \ items (such as 1MB and above) or if you want to cache smaller items (less than\
    \ 10KB). The smaller item will give you a higher cache hit ratio, but it may not\
    \ save bandwidth and time like the heavier item.\n*   *Storage constraint*: This\
    \ is usually a trade-off with cache hit ratio because you only have limited available\
    \ space (both memory and file space) in an iPhone, so you have to consider it\
    \ carefully. Otherwise, you can store as much as you want in order to increase\
    \ the cache hit ratio.\n*   *Algorithm complexity*: How hard will it be to implement\
    \ the algorithm to match your favorite policy? In many algorithms, you may need\
    \ to keep track of a specific file or database to track the usage of each of piece\
    \ of data/image you use to optimize your cache. This is a big trade-off; you will\
    \ use more memory, and the app needs to spend CPU and time to execute the algorithm\
    \ to determine if it should delete a piece of cache. Note that the more complex\
    \ the algorithm, the more you will need to spend to build, maintain, and fix any\
    \ bugs inside your own algorithm.\n\n#### Caching Algorithms\n\nI will cover some\
    \ very basic and easy-to-implement algorithms like random replacement, first in\
    \ first out and simple time-based plus more complex algorithms like least recently\
    \ used and least frequently used.\n\n##### Belady's Algorithm\n\nThis is a theoretical\
    \ algorithm that states that if a piece of information is not necessary in the\
    \ future, the app should go ahead and delete it. Why do I say that this is a theoretical\
    \ algorithm? Because in many real-world cases, you never know if that piece of\
    \ information will be necessary in the future or not. For example, say the web\
    \ site changes the image to some new image and the app figures out that it doesn't\
    \ need to use the old image anymore. Bing! The image gets deleted. Then the web\
    \ designer changes his mind and replaces back the old image. Now the app needs\
    \ to reload the old image. Therefore, most of time (but not always), Belady's\
    \ algorithm is not practical and actually impossible to implement with real code.\
    \ However, this algorithm is used as a benchmark to compare other algorithms.\n\
    \n##### Random Replacement\n\nThere is not much to tell about this algorithm.\
    \ You delete cache based on some random access.\n\nAdvantage:\n\n*   It requires\
    \ almost no effort to implement the algorithm.\n\nDisadvantage:\n\n*   It may\
    \ not offer much benefit in terms of cache hit and cache invalidation. The algorithm\
    \ may mistakenly delete some files that are still necessary while keeping an unused\
    \ file for a long time.\n\nImplementation:\n\nFile:\n\n`  // File Random Replacement`\n\
    `  NSFileManager *fileManager = [NSFileManager defaultManager];`\n`   NSString\
    \ *filePath = NSTemporaryDirectory();`\n`   NSDirectoryEnumerator *fileNames =\
    \ [fileManager enumeratorAtPath:filePath];`\n`   NSString *firstFileName = @\"\
    \";`\n`   for (NSString *fileName in fileNames) {`\n`       firstFileName = fileName;`\n\
    `       break;`\n`   }`\n`     [fileManager removeItemAtPath:firstFileName error:nil];`\n\
    \nMemory: For memory caching, you will usually use a dictionary that binds a unique\
    \ URL/name to the object. This helps you retrieve the data easily by passing the\
    \ unique URL/name to the dictionary. In this sample, I use `cacheDictionary` to\
    \ store the memory data.\n\n`   // cacheDictionary is a dictionary to store a\
    \ map between a name of image and the`\n`   // image itself`\n\n`   NSObject *firstObj\
    \ = nil;`\n`   for (NSObject *obj in [cacheDictionary allKeys]) {`\n`       firstObj\
    \ = obj;`\n`       break;`\n`   }`\n`   [cacheDictionary removeObjectForKey:firstObj];`"
  trans: "\n#### 缓存失效\n\n> “计算机科学领域只有两大难题：缓存失效和命名。”\n> \n> — 菲尔·卡尔顿\n\n正如这句话所言，缓存失效是一个难题。当开发者缓存图片/数据时，它们可能很快就会过时。问题在于，如何判断图片/数据是否过时，以及何时检查最新数据。\n\
    \n对于图片，如果每张图片都通过`URL`/名称进行唯一命名，那么当该`URL`/名称发生变化时（例如，用户更换了头像），你的应用会立即知道该图片已过时，并可以获取新图片。\n\
    \n然而，如果图片的`URL`/名称没有改变，你可以设置一个特定时间段（例如 3-7 天）后再获取新图片。幸运的是，大多数网络服务都会处理这个问题，并在图片实际更改时改变其`URL`。\n\
    \n对于数据，就更难了。如果你将数据缓存在文件系统中（通过使用数据库或纯文本；本章稍后会详细解释），那么你可能永远不知道数据是否过时。如果每次使用数据时都必须通过网络检查服务器上是否有新数据，那就失去了在文件系统中缓存数据的所有优势。\n\
    \n有几种方法可以解决这个缓存失效问题。\n\n*   接受你的数据有时会过时，并且你必须使用这些数据来计算并展示给用户。在特定时间段后，应用会检查最新数据，并用新数据替换整个数据。\n\
    *   尽最大可能从网络快速获取数据。\n*   根据用户的请求使缓存失效。\n\n通常开发者会结合使用第一种和第三种方法，因为这样更合理。你只能将数据大小缩减到一定程度；在那之后，就无法再缩减了。第三种方法可以通过一个刷新按钮轻松实现，并且应用可以在打开或关闭时重新加载新数据，这也很容易实现。\n\
    \n#### 替换策略\n\n替换策略是一种策略（通常由特定算法实现），用于决定在必要时删除哪条数据/哪张图片。它还能告诉你应该在什么时间检查并删除缓存，以保持缓存库的新鲜度。在选择一种替换策略而非其他策略时，你始终需要考虑以下四个主要方面。\n\
    \n*   **缓存命中率**：如前所述，它表示你的应用在缓存中找到特定数据/图片的次数，与应用向缓存请求数据的次数的比例。这个数字越高越好。\n*   **延迟**：通常指两种不同类型的延迟。第一种含义是缓存命中时从缓存加载数据所需的时间。第二种含义是缓存未命中时从原始源加载数据所需的时间。你需要考虑是缓存最大的项目（例如\
    \ 1MB 及以上），还是缓存较小的项目（小于 10KB）。较小的项目会带来更高的缓存命中率，但可能无法像大项目那样节省带宽和时间。\n*   **存储限制**：这通常需要与缓存命中率进行权衡，因为在\
    \ iPhone 上可用的空间（包括内存和文件空间）是有限的，所以你必须仔细考虑。否则，为了增加缓存命中率，你可以想存多少就存多少。\n*   **算法复杂度**：实现与你偏好的策略相匹配的算法有多难？在许多算法中，你可能需要跟踪特定的文件或数据库，以记录你所使用的每条数据/每张图片的使用情况，从而优化你的缓存。这是一个很大的权衡；你会使用更多内存，并且应用需要花费\
    \ CPU 和时间来执行算法，以决定是否应该删除某条缓存。请注意，算法越复杂，你需要在构建、维护和修复算法自身漏洞上花费的精力就越多。\n\n#### 缓存算法\n\
    \n我将介绍一些非常基础且易于实现的算法，例如随机替换、先进先出和简单的基于时间的算法，以及更复杂的算法，如最近最少使用和最不经常使用。\n\n#####\
    \ 贝拉迪算法\n\n这是一种理论算法，它指出如果某条信息将来不需要，应用应该直接将其删除。为什么我说这是一种理论算法呢？因为在许多现实场景中，你永远不知道那条信息将来是否会被需要。例如，假设网站将图片换成了新图片，应用发现不再需要使用旧图片了。啪！图片被删除了。然后网页设计师改变了主意，又把旧图片换了回来。现在应用又需要重新加载旧图片。因此，大多数时候（但并非总是），贝拉迪算法并不实用，实际上也无法用真实代码实现。然而，该算法被用作基准来比较其他算法。\n\
    \n##### 随机替换\n\n这种算法没什么好说的。你基于某种随机访问来删除缓存。\n\n**优点：**\n\n*   实现该算法几乎不需要任何精力。\n\
    \n**缺点：**\n\n*   在缓存命中率和缓存失效方面，可能带来不了太多好处。该算法可能会错误地删除一些仍然需要的文件，同时长时间保留未使用的文件。\n\
    \n**实现：**\n\n文件：\n\n```objc\n    // 文件随机替换\n    NSFileManager *fileManager = [NSFileManager\
    \ defaultManager];\n    NSString *filePath = NSTemporaryDirectory();\n    NSDirectoryEnumerator\
    \ *fileNames = [fileManager enumeratorAtPath:filePath];\n    NSString *firstFileName\
    \ = @\"\";\n    for (NSString *fileName in fileNames) {\n        firstFileName\
    \ = fileName;\n        break;\n    }\n    [fileManager removeItemAtPath:firstFileName\
    \ error:nil];\n```\n\n内存：对于内存缓存，你通常会使用一个字典，将唯一的 URL/名称绑定到对象上。通过向字典传递唯一的 `URL`/名称，可以轻松检索数据。在这个例子中，我使用\
    \ `cacheDictionary` 来存储内存数据。\n\n```objc\n    // cacheDictionary 是一个字典，用于存储图片名称与图片本身之间的映射\n\
    \n    NSObject *firstObj = nil;\n    for (NSObject *obj in [cacheDictionary allKeys])\
    \ {\n        firstObj = obj;\n        break;\n    }\n    [cacheDictionary removeObjectForKey:firstObj];\n\
    ```\n"
- fmt: "### First In First Out (FIFO)\n\nIn short, this algorithm tells you that the\
    \ first one come into the cache will be the first one gets deleted.\n\nAdvantages:\n\
    \n* It's really simple and requires almost no effort to calculate and compare.\n\
    * It can provide a slight benefit if you assume that the older the cached item,\
    \ the more likely it should be deleted.\n\nDisadvantage:\n\n* It doesn't take\
    \ into account which piece of cache get requested most often or has a higher chance\
    \ to be requested in the future.\n\nImplementation:\n\nFile: You need to base\
    \ it on the creation date of the files. You will need to find the creation date\
    \ of all files and get the oldest creation date to delete.\n\n```\nNSFileManager\
    \ *fileManager = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
    NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\n\
    NSString *smallestDateFilePath = @\"\";\nfor (NSString *fileName in fileNames)\
    \ {\n    NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n\
    \    NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath\
    \ error:nil;\n    NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];\n\
    // I will let you find the smallest createdDate yourself as a small exercise\n\
    //  if (createdDate is smallest) {\n//     smallestDateFilePath = uniquePath;\n\
    // }\n}\n[fileManager removeItemAtPath:smallestDateFilePath error:nil];\n```\n\
    \nMemory: It can be built with a dictionary to keep track of all data/images and\
    \ an array to keep track the order of the data/image. I use an array `cacheOrders`\
    \ to store the list of unique names of images. This array stores data in an ordered\
    \ manner: the oldest item is at index 0 and the newest item is at the end of the\
    \ array.\n\n```\n// cacheDictionary is a dictionary to store a map between a name\
    \ of image and the\n// image itself\nNSString *firstName = [cacheOrders objectAtIndex:0];\n\
    [cacheDictionary removeObjectForKey:firstName];\n[cacheOrders removeObjectAtIndex:0];\n\
    ```\n\n### Simple Time-Based\n\nThis algorithm is based mainly on time. You specify\
    \ a basic period of time for a cache. After that specific period of time, the\
    \ app checks how long a cache exists (the age of the cache). If the cache is older\
    \ than a specific age (for example, 14 days), the cache is automatically deleted.\n\
    \nAdvantages:\n\n* It is really simple—even simpler than FIFO.\n* It doesn't take\
    \ much time and CPU to calculate the age of every cache.\n* You don't need to\
    \ keep track of more information (like the order of cache in FIFO).\n\nDisadvantages:\n\
    \n* It usually leads to either deleting too much or too little, which means you\
    \ may delete more caches than you need to delete. For example, if you only need\
    \ to delete 10MB of images in file system to have more space, and 20MB of the\
    \ images are older than a specific data, you may over-delete.\n\nImplementation:\
    \ Usually used with file system cache rather than memory cache.\n\nFile: You need\
    \ to base it on the creation date of the files. You will need to find the creation\
    \ date of all files and extract the files that have creation date older than your\
    \ specified date. Then you delete those files.\n\n```\nNSFileManager *fileManager\
    \ = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
    NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\n\
    NSTimeInterval maximumTimeInterval = 7 * 24 * 3600;  // 7 days caching\nfor (NSString\
    \ *fileName in fileNames) {\n    NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n\
    \n    NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath\
    \ error:nil;\n    NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];\n\
    \n    if ([createdDate timeIntervalSinceDate:[NSDate date]] > maximumTimeInterval)\
    \ {\n        [fileManager removeItemAtPath:uniquePath error:nil];\n    }\n}\n\
    ```\n\nNext are the more difficult caching algorithms that you probably won't\
    \ ever need to use. From my own experience, because the file storage can be really\
    \ big, and you may only need to delete it once per several months, you can just\
    \ use the simple time-based algorithm. For memory, because the memory is really\
    \ limited in terms of storage but fast in terms of retrieval, you may need to\
    \ use FIFO or LFU.\n\n### Least Recently Used (LRU)\n\nThis algorithm is more\
    \ complex than the algorithms covered up to this point. Imagine that you have\
    \ a list of items. Whenever the same item is requested, you put that item at the\
    \ head of the list. When you need to delete an item, you delete an item from the\
    \ tail of the list. [Table 4-1](#Chapter04.html#tab_4_1) displays an example array\
    \ of four items.\n\n![images](images/t0401.jpg)\n\nAs you can see in step 5, because\
    \ a new item comes in (called 5) and I can only store four items inside the list,\
    \ I have to delete item 3. But in a later step, item 3 is requested, and I don't\
    \ have enough space to cache it, so I delete item 1.\n\nAdvantage:\n\n* It deletes\
    \ the cache based on a better policy. The policy is based on the assumption that\
    \ if a cache hasn't had a request in a long time, it should be deleted.\n\nDisadvantage:\n\
    \n* It doesn't care much about how often a cache is requested. In this example,\
    \ if item 1 is requested three or four times in a row and then isn't requested\
    \ in the next three steps, should you delete it or keep it? I will cover another\
    \ algorithm that will try to approach this issue later in this chapter\n\nImplementation:\
    \ It can be implemented both with file and memory. But as mentioned, unless you\
    \ need to store lots of data (especially images/videos) in file system and frequently\
    \ need to access/delete them, you will not need to use this algorithm.\n\nMemory:\
    \ I'm only showing you one way to implement this algorithm so that, but it might\
    \ not be the best way to do it. However, I hope that you get the main idea.\n\n\
    ```\n// cacheArrays is an array that stores cached items in an attempt to make\
    \ the least\n//   recently used object to be at the end of the array.\nNSString\
    \ *requestedItem = @\"5\";\nif ([cacheArrays containsObject:requestedItem]) {\n\
    \n    // If the caller requests an existing item, I add that item to the top of\
    \ the\n    //    array\n    [cacheArrays removeObject:requestedItem];\n    [cacheArrays\
    \ insertObject:requestedItem atIndex:0];\n} else {\n    // If the code requests\
    \ a new item that does not exist, I remove the last item\n    // (if  the cacheArrays\
    \ is full) and add that new item into the top of the array.\n    [cacheArrays\
    \ removeLastObject];\n    [cacheArrays insertObject:requestedItem atIndex:0];\n\
    }\n```"
