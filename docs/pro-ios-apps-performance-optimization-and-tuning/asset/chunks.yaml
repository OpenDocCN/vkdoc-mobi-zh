  trans: "\n### 不透明度\n\n尽可能让 `UITableViewCell` 的所有层和子视图都不透明。当视图透明时，iOS 需要将一个像素渲染两次或更多次，因为该像素同时属于多个子视图。这可能是一个耗时过程。\n\
    \n这一部分可以通过代码或 `InterfaceBuilder` 轻松完成。开发人员应仔细检查，确保所有子视图都不透明。图 3–7 展示了如何设置单元格内子视图的“不透明”复选框。\n\
    \n![images](img/0307.jpg)\n\n**图 3–7.** *为子视图设置不透明*\n\n对于自定义代码，你也可以通过代码进行设置，如下所示：\n\
    \n`view.opaque = YES;`\n\n### 避免图形效果\n\n避免使用 `UIImage` 中尚未包含的复杂图形效果（如渐变）。你应该通过使用\
    \ CoreAnimation 并进行一些小型配置来检查图形效果和问题，如图 3–8 和 3–9 所示。\n\n![images](img/0308.jpg)\n\
    \n**图 3–8.** *用于设置调试选项的 CoreAnimation 选项*\n\n![images](img/0309.jpg)\n\n**图 3–9.**\
    \ *启用颜色混合的 CoreAnimation 仪器工具*\n\n### 编辑/重排序性能\n\n在前面的章节中，我向你展示了通过直接绘制，可以显著优化应用的性能。然而，绘制方法在动画和重排序性能方面也存在一些严重问题。\n\
    \n当你使用子视图时，动画会变得更快，因为 `UIKit` 在动画过程中无需重绘或更改任何内容。因此，如果你使用子视图而不是通过代码绘制视图，对于 `UIKit`\
    \ 来说通常会更快。如果在动画编辑或重排序中通过代码绘制视图，则必须重新绘制视图以适应新的布局。这会在创建和维护代码方面增加工作量。\n\n当你遇到 `UITableViewController`\
    \ 的性能问题时，这始终是需要权衡的方面。我的建议是，如果你确定不会有太多子视图，或者你需要允许用户对单元格进行编辑/重排序，那么始终以子视图为起点。这可能会让应用运行稍慢，但仍然足够流畅。\n\
    \n### 总结\n\n通过结合源代码的示例，你学习了许多提升应用性能的重要技巧。\n\n*   **使用 NSLog 和 CoreAnimation 仔细进行基准测试**：我让你看到了一个实际使用\
    \ Instruments 和基准测试工具来高效理解问题本质以及每次优化后性能提升程度的例子。\n*   **正确复用单元格**：这是第一步，也是最重要的一步。实现单元格复用很容易，但许多应用却忽略了这一步。因此，如果存在任何性能问题，请务必再次检查这一点。\n\
    *   **正确缓存/复用图像与数据**：另一个重要步骤是减少加载数据以及在返回显示用单元格时进行逻辑处理的时间。\n*   **减少总加载和计算时间**：不仅仅是\
    \ I/O 过程会减慢并阻塞 UI 线程；任何一种数据处理都可能减慢此过程。因此，你应该始终尽可能减少这种处理。\n*   **自定义绘制单元格**：为了在渲染表格视图时充分利用\
    \ CPU 的计算能力，你可能需要考虑直接使用绘制方法。这将极大地提升渲染过程并提高性能指标；帧率几乎可以达到最大值。你可以通过重写 `drawRect`\
    \ 方法，并使用不同的绘制方法自行绘制每个 UI 元素，来绘制自定义单元格。\n*   **不透明度**：当开发人员将用户界面元素放置到视图中时，会遇到这个小问题。如果没有将每个视图设置为不透明（即透明），渲染过程将需要遍历每个点两次来重绘同一个点。\n\
    *   **缓存高度**：这是开发人员常犯的另一个小错误。每次请求单元格时都会调用两个主要方法。\n*   **避免图形效果**：单元格上的图形效果越多，渲染过程就越慢。因此，你也应该对此进行测试。你完全可以借助\
    \ CoreAnimation 来查看每个 UI 元素的渲染效果。\n*   **编辑/重排序性能**：优化滚动性能可能会导致编辑和重排序出现性能问题，因为\
    \ `UIKit` 和动画框架针对子视图进行了优化。如果你自己绘制单元格，这些框架的优化将失效。\n\n**练习题**\n\n1.  理论\n    1.\
    \  创建一个检查清单，以确保你遵循所有必要和基本的步骤，从而获得性能出色的 `UITableViewCell`。\n2.  实践\n    1.  编写一个使用\
    \ `drawRect` 的小应用，观察它在编辑/重排序控制下的行为。\n    2.  完成“复用图像”部分的练习。尝试使用多线程技术从文件加载图像进行显示。\n\
    \    3.  练习使用以下方法自行创建自定义 `UITableViewCell`：\n        *   `InterfaceBuilder`\n\
    \        *   添加子视图代码\n        *   使用绘制代码\n\n## 第 4 章\n\n## 使用图像与数据缓存技术提升应用性能\n\
    \n在本章中，你将了解：\n\n*   网络和文件 IO 处理如何影响应用性能。\n*   与缓存算法相关的常见问题和技术。\n*   iPhone 缓存技术中的特定问题。\n\
    \    *   你应该缓存什么。\n    *   你应该何时缓存。\n    *   如何实现缓存。\n    *   你应该在何处缓存数据和图像。\n\
    *   内存消耗与性能之间的权衡。\n\n对于当今大多数 iPhone 应用来说，开发者通常要么从自己的服务器加载数据，要么使用第三方服务的数据。少数应用的数据存储在文件系统中，并在需要时加载显示给用户。极少数应用完全不使用任何网络或文件\
    \ IO 处理。因此，理解这些处理类型的影响有助于你更容易地发现问题并解决它们。\n\n### 网络、文件与内存处理的性能差异\n\n让我们看看从文件系统加载图像到内存，以及从给定服务器加载图像到内存各需要多长时间。当然，结果会因服务器处理请求的速度、网络速度以及服务器与测试机器之间的距离而异。然而，我想展示一个重要观点：通过网络加载图像比从文件加载慢得多，而从文件加载图像又比图像已存在于内存中慢得多。我基于加载一张\
    \ 50kb 的图像测试了性能。结果如下：\n\n`文件加载时间： 0.001147`\n`网络加载时间： 4.160634`\n\n从文件系统加载图像耗时\
    \ 1 毫秒，而从网络加载则耗时 4 秒——差异巨大！1 毫秒在性能上似乎微不足道；然而，想象一下，如果你需要同时加载 10-20 张图像，并且其中一些图像尺寸较大——高达几百\
    \ KB。加载所有这些图像的总时间将超过几秒。\n"
- fmt: '### How to Identify the Bottleneck


    There are two main problems with loading from a file or the network.


    - Users have to wait a long time before the app shows the image. This time may
    increase proportionally with the number of images. If the user interface (UI)
    needs to load many images while running something like `UITableView`, users will
    have to wait every time they scroll down to see more information.

    - It can block the UI, thus user can''t interact with the UI properly. This is
    also covered in [Chapter 6](#Chapter06.html#ch6).


    Thus, because loading from file/network takes much more time than loading and
    processing data/images in memory, this loading process is usually your performance
    bottleneck. If your app has to wait for the data from the network, all other processes
    must wait as well. So testing for file/network loading should always be the first
    thing you do when you run into performance issues. As you saw in Chapter 2, you
    can observe the data loading process with `System Activity` and `File Activity`.
    [Figure 4–1](#Chapter04.html#fig_4_1) shows the UI of those instruments.


    ![images](images/0401.jpg)


    **Figure 4–1.** `File Activity` instrument


    ![images](images/0402.jpg)


    **Figure 4–2.** List of results from `File Activity`


    [Figure 4–1](#Chapter04.html#fig_4_1) shows the file activities including loading
    and writing file/directory and reading the file attributes. [Figure 4–2](#Chapter04.html#fig_4_2)
    shows more details about each activity, which helps you to see what kinds of file
    activities are running most often.


    ![images](images/0403.jpg)


    **Figure 4–3.** `System Usage` instrument


    ![images](images/0404.jpg)


    **Figure 4–4.** List of results from `System Usage`


    [Figure 4–3](#Chapter04.html#fig_4_3) and [4–4](#Chapter04.html#fig_4_4) shows
    more about `System Usage`, which is more general and covers more data types. As
    you can see in [Figure 4–4](#Chapter04.html#fig_4_4), there are activities with
    the `plist` and `nib` files.


    ### Introduction to Caching


    This section will explain many important terms and concepts in caching and will
    introduce some basic algorithms for caching in general environments such as web
    and desktop applications. Many of these algorithms can be applied to the iPhone
    environment; these will be explained in subsequent sections of this chapter.


    I will explain the following concepts: cache hit, cache miss, storage cost, retrieval
    cost, invalidation, replacement policy, and measuring cache. Then I will explain
    some of the most used caching algorithms: Belady''s algorithms, random replacement,
    first in first out (FIFO), least frequently used (LFU), simple time-based, least
    recently used (LRU), and adaptive replacement cache (ARC).


    #### What is Caching?


    Caching is when you store part of a set of data/images in a nearer level. For
    example, if the original images come from the network, you would store data/images
    in your file system so that next time your app won''t need to go through the network
    to get the data/images again. Likewise, if the data/images are already on the
    file system, you would store it in memory so that your app can calculate or display
    these data/images immediately when necessary.


    #### Cache Hit


    Cache hit happens when your app looks for a specific data/image and it finds it
    in the cache and loads it directly from there. This is a good thing because it
    doesn''t require loading it from the original source. In other words, it saves
    time.


    The cache hit ratio is usually used to determine if your algorithm is a good or
    bad one. It is usually combined with how much size you save whenever a cache hit
    happens. For example, if you decide to store small images with 4KB per image and
    you have a cache hit around 90%, then you already save 3.6KB. This savings helps
    you to improve the loading time from both network and file activities. However,
    if you save big images (200KB per image) and you have a cache hit around 10%,
    you already save the cost of loading 20KB. Another perspective to consider is
    how your users feel about the performance: if users know that they will be receiving
    a big image and are willing to wait for the network, then it''s fine to not cache
    that image often.


    #### Cache Miss


    Cache miss happens when your app looks for a specific image/data and it can''t
    find it in the cache and so needs to retrieve it from the original place. This
    can be a bad thing for your app, for example, when the app is not connected to
    the Internet. When the app is not connected to the Internet and many cache misses
    happen, the app may show blank image/data to users. To avoid this, you usually
    need to cache many images and data when the app is online to show them offline.


    #### Retrieval Cost


    Retrieval cost is the cost to load image/data from network/file to the next data
    level. This can be separated into two cases.


    - **Loading from network to file**: As shown in the previous example, this consumes
    the highest amount of time compared to loading from file and memory. The retrieval
    cost for the network data is high.

    - **Loading from file to memory**: This consumes less time to load from a file
    to memory so the retrieval cost in this case is low.


    #### Storage Cost


    Storage cost is also divided into two cases: storing in file and storing in memory.


    - The file system is usually bigger than the memory system; therefore you can
    store more data/images inside the file system. The iPhone file system can contain
    up to 8, 16, or 32GB, depending on the device itself. If you use an RSS reader
    to read news and this reader keeps storing all the images from the news, you will
    get to 8GB quickly. You have to remember that within that 8GB, the user is storing
    their music, videos, and all other apps'' caching. Your app should only use up
    to a few hundred megabytes; otherwise, the user may delete your app soon.

    - The memory system in the iPhone 4 device is really limited to storing up to
    512MB, and most of that memory is consumed by other background-running apps and
    the operating system. The maximum memory that an app can use to store its own
    internal data to process is around 256MB. Old iPhone devices like iPhone 3GS or
    iPhone 3G can only use up to 64 or 128 MB. Also, don''t forget all the nibs and
    view controllers that you need to display and store when displaying the app. Finally,
    for the latest iPhone, you can store around 50 1MB images. This is actually not
    much compared to many of the memory-consuming apps and games in the iPhone App
    Store.'
