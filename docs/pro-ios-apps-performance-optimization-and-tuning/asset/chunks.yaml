- fmt: "# Increase and Optimize UITableView Performance\n\nIn this chapter, you will\
    \ do the following:\n\n- Use the benchmark tools you saw in [Chapter 2](#Chapter02.html#ch2)\
    \ in a real example.\n- Work step by step with an example of scrolling performance\
    \ optimization.\n- Use techniques to optimize `UITableView` performance.\n   \
    \ - Basic techniques to optimize simple and basic cells in `UITableView`.\n  \
    \  - Hardcore techniques using code to actually draw the view inside the cell.\n\
    \    - Basic optimization techniques for cells need animation like editing and\
    \ reordering.\n    - Other basic techniques that developers need to know.\n\n\
    iPhone apps usually display data in the list format. Apple provides excellent\
    \ tools for basic developers: `UITableView` and `UITableViewCell`. If developers\
    \ only want to use basic features to display a small image on the left and text\
    \ in the center, the default Apple control should work well. However, when you\
    \ have to do lots of customization to the listing order to have two or three images\
    \ and text in different places, you'll run into problems. Sooner or later, you'll\
    \ run into performance problems with jerky scrolling of the `UITableView`, especially\
    \ on old devices like iPhone 3G.\n\n## Introduction to the Examples\n\nFor this\
    \ exercise, I will measure the performance based on two main factors: the speed\
    \ the `tableView` dequeues, creates a new cell, or returns the cell back for the\
    \ operating system (OS); and how fast the OS can render your cell to display it\
    \ to the machine. The first one can be measured by `NSLog` easily enough; the\
    \ second one is more complicated and can only be measured by `CoreAnimation`.\n\
    \nTo demonstrate, I will walk you through two different examples. One just contains\
    \ an avatar and a text block; the other one has complicated views with many subviews\
    \ inside. By going through these two examples, you will see many different ways\
    \ to optimize the scrolling performance of a `UITableView`.\n\nAt the end of this\
    \ chapter, I will also list other important points that I don't have time to cover\
    \ in detail in this chapter. These are not usual mistakes, but if a developer\
    \ is careless enough to make one of these mistakes, it will cost him a whole day\
    \ of benchmarking and testing to figure out the problem. I want to make sure that\
    \ you have enough skills and knowledge under your belt to handle any situation.\n\
    \nSometimes, optimization is so simple that it only requires a few changes here\
    \ and there inside the code. However, in other cases, like in the second example,\
    \ optimization will require rewriting the whole code base to fit into a better,\
    \ more optimized model. I hope that after I go over the examples, you will have\
    \ a clear idea of the program's structure so you can make the right decisions\
    \ at the beginning and will not need to rewrite the whole code base.\n\n## Reviewing\
    \ the Instrument Tool\n\nFor this chapter, you will use the `CoreAnimation` tool\
    \ to benchmark the render performance of iPhone OS. This will help you to know\
    \ if the problem is within the computing process or in the displaying process.\
    \ [Chapter 2](#Chapter02.html#ch2) covered this tool, so this chapter only provides\
    \ a brief review.\n\n[Figure 3–1](#Chapter03.html#fig_3_1) shows the main view\
    \ of the `CoreAnimation` tool with the three parts that you need to look at when\
    \ running the tool and [Figure 3–2](#Chapter03.html#fig_3_2) shows the performance\
    \ readings.\n\n![images](images/0301.jpg)\n\n**Figure 3–1.** *Main parts in the\
    \ CoreAnimation tool*\n\n![images](images/0302.jpg)\n\n**Figure 3–2.** *Recent\
    \ display performance*\n\n## First Example\n\nThe first example will show you\
    \ the step-by-step process to optimize the scrolling performance of the `UITableView`.\
    \ The initial version of the source code contains many performance errors that\
    \ I gathered from many developers. In the process, you can see that the performance\
    \ goes up after every step you implement to optimize the performance.\n\n### Introduction\
    \ to the First Example\n\nAs [Figure 3–3](#Chapter03.html#fig_3_3) shows, your\
    \ problem is a general and practical one where you need to develop a `UITableView`\
    \ with one image and one text block in each cell. I will walk you through the\
    \ source code of this example. Let's look at general apps like Facebook; the app\
    \ would need one image for the avatar and one image for the content of the link\
    \ that users share there. The app can also have other small images to represent\
    \ icons in the cell. For this first benchmark, please refer to the project called\
    \ `SlowPerformanceTableView`.\n\n![images](images/0303.jpg)\n\n**Figure 3–3.**\
    \ *The application for the first example*\n\n### Standard Benchmark\n\nBefore\
    \ you start any project, you must know your final goal; in this case, it's what\
    \ performance you want to achieve so that you can give your users a good user\
    \ experience when scrolling and using your app. So, by running a normal, non-custom\
    \ `UITableViewCell` with simple image loading needs and reusing images, [Table\
    \ 3–1](#Chapter03.html#tab_3_1) shows the running time from my log.\n\n![images](images/t0301.jpg)\n\
    \nThe best performance for `frames per second (fps)` by `CoreAnimation` is `60\
    \ fps` (the higher number, the better the performance). For a standard `UITableViewCell`,\
    \ the usual speed will be around `55-60 fps`; this should be one of your goals.\
    \ The other goal is to make sure the preparation time is small enough. When the\
    \ general time is reduced, the cell preparation time is also reduced. However,\
    \ reducing the cell preparation time is easier, so I will focus on reducing it\
    \ first in this example.\n\n### Initial Benchmark\n\nFor the first example, I\
    \ run an initial benchmark test and get a random result of six cells scrolling.\
    \ [Table 3–2](#Chapter03.html#tab_3_2) shows the results of benchmarking the performance\
    \ using tools like `NSLog` and `CoreAnimation`.\n\n![images](images/t0302.jpg)\n\
    \nSo, from the result, you can see that generally it takes 10 milliseconds to\
    \ return a cell for drawing. Due to this huge delay, the general measurement (fps)\
    \ also drops down significantly. Therefore, my first goal is to reduce the cell\
    \ preparation time process.\n\nThere is one note in the source code about the\
    \ difference between `[UIImage imageNamed:name]` and `[[UIImage alloc] initWithContentsOfFile:name]`.\
    \ I will explain this difference later and why you will use `imageNamed` instead\
    \ of `initWithContentsOfFile`.\n\n### Reusing `UITableViewCell`\n\nOptimizing\
    \ the `UITableView` is often easy; what you need to do is double check that you\
    \ reuse the `UITableViewCell` in the correct manner. Creating a `UITableViewCell`\
    \ for iOS is a CPU-intensive process. So, if the CPU needs to create a new cell\
    \ every time user scrolls up and down to a new cell, the whole performance will\
    \ decrease. Apple's standard (and default) way to improve this process is to reuse\
    \ the cell whenever the cell is out of the screen.\n\n#### Standard TableView\
    \ Cell\n\nFor the standard `UITableViewCell`, the generated code should work really\
    \ well and give you a fast, high scrolling performance.\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\
    \ {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if (cell\
    \ == nil) {\n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
    \            reuseIdentifier:CellIdentifier];\n    }\n```\n\nNote the use of `reuseIdentifier:CellIdentifier`\
    \ and `dequeueReusableCellWithIdentifier:CellIdentifier`. These two parts will\
    \ help you reuse the `UITableViewCell` correctly.\n\nThere are two main ways to\
    \ create a new custom cell, either by using `InterfaceBuilder` or by writing the\
    \ custom code directly by calling the `addSubview:` method."
