- fmt: "###  Recursion\n\nRecursion is a programming technique in which a method (function)\
    \ calls itself. This is one of the most interesting techniques in programming.\
    \ I will show you scenarios that you can solve immediately using a recursion technique.\n\
    \nHowever, there is one drawback with recursion: the performance may be slower\
    \ than using a direct loop. This performance loss may be insignificant if you\
    \ only call recursion a few times, not thousands of times. It can cost you more\
    \ memory when you need to store data and stack trace if you are calling the methods\
    \ over and over again.\n\nThe recursion technique can be used to implement many\
    \ high performance algorithms like merge sort or binary search. To illustrate\
    \ the technique in Objective-C, I will show you two sample problems: a factorial\
    \ calculation and a binary search. Then you can compare this version of binary\
    \ search with the version using the loop that I showed previously.\n\nWhat is\
    \ a factorial? A factorial of `n` is found by multiplying `n` by the factorial\
    \ of `n-1`. In other words, `factorial(n) = n * factorial(n-1)`. This is perfect\
    \ for a recursion because the definition already suggests to use recursion.\n\n\
    ```\n- (NSInteger)factorial:(NSInteger) n {\n   if ( n <= 1 ) {\n       return\
    \ 1;\n   } else {\n       return n * [self factorial:(n - 1)];\n   }\n}\n```\n\
    \nIt is very simple and straightforward, right? Now, I will discuss a more difficult\
    \ problem with binary search. Here is the original approach with a simple loop\
    \ for a binary search:\n\n```\n- (NSInteger)indexForNumber:(NSNumber *)number\
    \ inArray:(NSArray *)array {\n   int firstIndex = 0;\n   int uptoIndex = [array\
    \ count];\n\n   while (firstIndex < uptoIndex) {\n       int mid = (firstIndex\
    \ + uptoIndex) / 2;  // Compute mid point.\n       if ([number intValue] < [[array\
    \ objectAtIndex:mid] intValue]) {\n           uptoIndex = mid;     // repeat search\
    \ in bottom half.\n       } else if ([number intValue] > [[array objectAtIndex:mid]\
    \ intValue]) {\n           firstIndex = mid + 1;  // repeat search in top half.\n\
    \       } else {\n           return mid;     // Found it. return position\n  \
    \     }\n   }\n   return -1;    // Failed to find key\n}\n```\n\nHere is an implementation\
    \ for recursion:\n\n```\n- (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray\
    \ *)array lowerBound:(NSInteger)lowerBound upperBound:(NSInteger)upperBound {\n\
    \   int mid = (lowerBound + upperBound) / 2;\n   if([[array objectAtIndex:mid]\
    \ intValue] == [number intValue]) {\n       return mid; // found it\n   } else\
    \ if (lowerBound > upperBound) {\n       return -1;  // can't find it\n   } else\
    \ { // divide range\n       if ([[array objectAtIndex:mid] intValue] < [number\
    \ intValue]) {\n           // it is in upper half\n           return [self indexForNumber:number\
    \ inArray:array lowerBound:(mid + 1) upperBound:upperBound];\n       } else {\n\
    \           // it is in lower half\n           return [self indexForNumber:number\
    \ inArray:array lowerBound:lowerBound upperBound:(mid - 1)];\n       }\n   }\n\
    }\n```\n\n###  SAX/DOM Parser for XML Parsing\n\nXML parsing is important for\
    \ iPhone developers when they need to retrieve data from network; much of it will\
    \ return in the XML format. There is one important consideration when dealing\
    \ with XML: SAX vs. DOM. I will discuss the two main differences between SAX and\
    \ DOM and when you should choose one over the other.\n\n`SAX` is a way to read\
    \ the file or the XML string line by line to find or parse the data you need.\
    \ Parsing through the whole XML file with `SAX` can be done very quickly. The\
    \ problem is that the logic can be really complicated if you need to find a simple\
    \ piece of data inside the XML file. It does not consume much memory as well.\n\
    \n`DOM` is opposite to `SAX`: you store the whole XML structure in memory, making\
    \ it very easy to retrieve the data that you need. However, it takes more time\
    \ and memory to store the data structure in memory than the `SAX` approach.\n\n\
    Now let's compare the two methods in code. To use `SAX` Method, I choose to use\
    \ `NSXMLParser`; I also need to implement two methods so that I can receive the\
    \ XML events: the start element event and end element event.\n\n```\n@interface\
    \ XMLParser : NSObject <NSXMLParserDelegate> {\n @private\n   NSMutableArray*\
    \ strings;\n}\n\n@property (nonatomic, strong) NSMutableArray *strings;\n- (NSString\
    \ *)parseDemonstration;\n\n@end\n```\n\n```\n#import \"XMLParser.h\"\n\n@implementation\
    \ XMLParser\n@synthesize strings;\n\n- (void)parser:(NSXMLParser *)parser didStartElement:(NSString\
    \ *)elementName\n namespaceURI:(NSString *)namespaceURI qualifiedName:(NSString\
    \ *)qName\n   attributes:(NSDictionary *)attributeDict {\n  // you need to implement\
    \ this method to get the element out\n}\n\n- (void)parser:(NSXMLParser *)parser\
    \ didEndElement:(NSString *)elementName\n namespaceURI:(NSString *)namespaceURI\
    \ qualifiedName:(NSString *)qName {\n  // you need to implement this method to\
    \ get the element out\n}\n\n- (void)parser:(NSXMLParser*)parser foundCharacters:(NSString*)string\
    \ {\n  // you need to implement this method to get the element's content out\n\
    }\n\n- (NSString *)parseDemonstration {\n   self.strings = [[NSMutableArray alloc]\
    \ init];\n   NSString *filePath = [[NSBundle mainBundle] pathForResource:@\"books\"\
    \ ofType:@\"xml\"];\n   NSString *text = [[NSString alloc] initWithContentsOfFile:filePath\
    \ encoding:NSASCIIStringEncoding error:nil];\n   NSData*       data      = [text\
    \ dataUsingEncoding:NSASCIIStringEncoding];\n   NSXMLParser*  parser    = [[NSXMLParser\
    \ alloc] initWithData:data];\n   parser.delegate = self;\n   [parser parse];\n\
    \n   NSString* result = [self.strings componentsJoinedByString:@\"\"];\n\n   return\
    \ result;\n}\n\n@end\n```\n\nFor the DOM method, all you need to know is the element\
    \ names:\n\n```\n[myXMLDoc nodesForXPath:[NSString stringWithFormat:@\"//%@:links\"\
    , @\"myNameSpace\"]\n                              namespaceMappings:namespaceDic\
    \ error:nil];\n```"
  raw: '#### Recursion


    Recursion is a programming technique in which a method (function) calls itself.
    This is one of the most interesting techniques in programming. I will show you
    scenarios that you can solve immediately using a recursion technique.


    However, there is one drawback with recursion: the performance may be slower than
    using a direct loop. This performance loss may be insignificant if you only call
    recursion a few times, not thousands of times. It can cost you more memory when
    you need to store data and stack trace if you are calling the methods over and
    over again.


    The recursion technique can be used to implement many high performance algorithms
    like merge sort or binary search. To illustrate the technique in objective-C,
    I will show you two sample problems: a factorial calculation and a binary search.
    Then you can compare this version of binary search with the version using the
    loop that I showed previously.


    What is a factorial? A factorial of n is found by multiplying n by the factorial
    of n-1\. In other words, factorial (n) = n * factorial (n-1). This is perfect
    for a recursion because the definition already suggests to use recursion.


    `- (NSInteger)factorial:(NSInteger) n {`

    `   if ( n <= 1 ) {`

    `       return 1;`

    `   } else {`

    `       return n * [self factorial:(n - 1)];`

    `   }`

    `}`


    It is very simple and straightforward, right? Now, I will discuss a more difficult
    problem with binary search. Here is the original approach with a simple loop for
    a binary search:


    `- (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray *)array {`

    `   int firstIndex = 0;`

    `   int uptoIndex = [array count];`


    `   while (firstIndex < uptoIndex) {`

    `       int mid = (firstIndex + uptoIndex) / 2;  // Compute mid point.`

    `       if ([number intValue] < [[array objectAtIndex:mid] intValue]) {`

    `           uptoIndex = mid;     // repeat search in bottom half.`

    `       } else if ([number intValue] > [[array objectAtIndex:mid] intValue]) {`

    `           firstIndex = mid + 1;  // repeat search in top half.`

    `       } else {`

    `           return mid;     // Found it. return position`

    `       }`

    `   }`

    `   return -1;    // Failed to find key`

    `}`


    Here is an implementation for recursion:


    `- (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray *)array lowerBound:(NSInteger)lowerBound
    upperBound:(NSInteger)upperBound {`

    `   int mid = (lowerBound + upperBound) / 2;`

    `   if([[array objectAtIndex:mid] intValue] == [number intValue]) {`

    `       return mid; // found it`

    `   } else if (lowerBound > upperBound) {`

    `       return -1;  // can''t find it`

    `   } else { // divide range`

    `       if ([[array objectAtIndex:mid] intValue] < [number intValue]) {`

    `           // it is in upper half`

    `           return [self indexForNumber:number inArray:array lowerBound:(mid +
    1) upperBound:upperBound];`

    `       } else {`

    `           // it is in lower half`

    `           return [self indexForNumber:number inArray:array lowerBound:lowerBound
    upperBound:(mid - 1)];`

    `       }`

    `   }`

    `}`


    #### SAX/DOM Parser for XML Parsing


    XML parsing is important for iPhone developers when they need to retrieve data
    from network; much of it will return in the XML format. There is one important
    consideration when dealing with XML: SAX vs. DOM. I will discuss the two main
    differences between SAX and DOM and when you should choose one over the other.


    SAX is a way to read the file or the XML string line by line to find or parse
    the data you need. Parsing through the whole XML file with SAX can be done very
    quickly. The problem is that the logic can be really complicated if you need to
    find a simple piece of data inside the XML file. It does not consume much memory
    as well.


    DOM is opposite to SAX: you store the whole XML structure in memory, making it
    very easy to retrieve the data that you need. However, it takes more time and
    memory to store the data structure in memory than the SAX approach.


    Now let''s compare the two methods in code. To use SAX Method, I choose to use
    NSXML Parser; I also need to implement two methods so that I can receive the XML
    events: the start element event and end element event.


    `@interface XMLParser : NSObject <NSXMLParserDelegate> {`

    ` @private`

    `   NSMutableArray* strings;`

    `}`


    `@property (nonatomic, strong) NSMutableArray *strings;`

    `- (NSString *)parseDemonstration;`


    `@end`


    `#import "XMLParser.h"`


    `@implementation XMLParser`

    `@synthesize strings;`


    `- (void)parser:(NSXMLParser *)parser didStartElement:(NSString *)elementName`

    ` namespaceURI:(NSString *)namespaceURI qualifiedName:(NSString *)qName`

    `   attributes:(NSDictionary *)attributeDict {`

    `  // you need to implement this method to get the element out`

    `}`


    `- (void)parser:(NSXMLParser *)parser didEndElement:(NSString *)elementName`

    ` namespaceURI:(NSString *)namespaceURI qualifiedName:(NSString *)qName {`

    `  // you need to implement this method to get the element out`

    `}`


    `- (void)parser:(NSXMLParser*)parser foundCharacters:(NSString*)string {`

    `  // you need to implement this method to get the element''s content out`

    `}`


    `- (NSString *)parseDemonstration {`

    `   self.strings = [[NSMutableArray alloc] init];`

    `   NSString *filePath = [[NSBundle mainBundle] pathForResource:@"books" ofType:@"xml"];`

    `   NSString *text = [[NSString alloc] initWithContentsOfFile:filePath encoding:NSASCIIStringEncoding
    error:nil];`

    `   NSData*       data      = [text dataUsingEncoding:NSASCIIStringEncoding];`

    `   NSXMLParser*  parser    = [[NSXMLParser alloc] initWithData:data];`

    `   parser.delegate = self;`

    `   [parser parse];`


    `   NSString* result = [self.strings componentsJoinedByString:@""];`


    `   return result;`

    `}`


    `@end`


    For the DOM method, all you need to know is the element names:


    `[myXMLDoc nodesForXPath:[NSString stringWithFormat:@"//%@:links", @"myNameSpace"]`

    `                              namespaceMappings:namespaceDic error:nil];`'
  trans: "\n### 递归\n\n递归是一种编程技术，指方法（函数）调用自身。这是编程中最有趣的技术之一。我将展示一些可以通过递归技术立即解决的问题场景。\n\
    \n然而，递归有一个缺点：性能可能比直接使用循环慢。如果只调用几次递归而非数千次，这种性能损耗可以忽略不计。但如果反复调用方法，需要存储数据和堆栈跟踪时，会消耗更多内存。\n\
    \n递归技术可用于实现许多高性能算法，如归并排序或二分查找。为了在 Objective-C 中演示该技术，我将展示两个示例问题：阶乘计算和二分查找。然后你可以将这种二分查找版本与之前展示的循环版本进行比较。\n\
    \n什么是阶乘？`n` 的阶乘等于 `n` 乘以 `n-1` 的阶乘。换句话说，`factorial(n) = n * factorial(n-1)`。这非常适合使用递归，因为其定义本身已经暗示了递归的使用。\n\
    \n```\n- (NSInteger)factorial:(NSInteger) n {\n   if ( n <= 1 ) {\n       return\
    \ 1;\n   } else {\n       return n * [self factorial:(n - 1)];\n   }\n}\n```\n\
    \n非常简单直接，对吧？现在，我将讨论一个更难的二分查找问题。以下是使用简单循环实现二分查找的原始方法：\n\n```\n- (NSInteger)indexForNumber:(NSNumber\
    \ *)number inArray:(NSArray *)array {\n   int firstIndex = 0;\n   int uptoIndex\
    \ = [array count];\n\n   while (firstIndex < uptoIndex) {\n       int mid = (firstIndex\
    \ + uptoIndex) / 2;  // 计算中点\n       if ([number intValue] < [[array objectAtIndex:mid]\
    \ intValue]) {\n           uptoIndex = mid;     // 在下半部分继续搜索\n       } else if\
    \ ([number intValue] > [[array objectAtIndex:mid] intValue]) {\n           firstIndex\
    \ = mid + 1;  // 在上半部分继续搜索\n       } else {\n           return mid;     // 找到目标，返回位置\n\
    \       }\n   }\n   return -1;    // 未找到目标\n}\n```\n\n以下是使用递归的实现：\n\n```\n- (NSInteger)indexForNumber:(NSNumber\
    \ *)number inArray:(NSArray *)array lowerBound:(NSInteger)lowerBound upperBound:(NSInteger)upperBound\
    \ {\n   int mid = (lowerBound + upperBound) / 2;\n   if([[array objectAtIndex:mid]\
    \ intValue] == [number intValue]) {\n       return mid; // 找到目标\n   } else if\
    \ (lowerBound > upperBound) {\n       return -1;  // 无法找到目标\n   } else { // 分割范围\n\
    \       if ([[array objectAtIndex:mid] intValue] < [number intValue]) {\n    \
    \       // 目标在上半部分\n           return [self indexForNumber:number inArray:array\
    \ lowerBound:(mid + 1) upperBound:upperBound];\n       } else {\n           //\
    \ 目标在下半部分\n           return [self indexForNumber:number inArray:array lowerBound:lowerBound\
    \ upperBound:(mid - 1)];\n       }\n   }\n}\n```\n\n### 用于 XML 解析的 SAX/DOM 解析器\n\
    \n当 iPhone 开发者需要从网络检索数据时，XML 解析非常重要；大部分数据会以 XML 格式返回。处理 XML 时有一个重要的考量：SAX vs.\
    \ DOM。我将讨论 SAX 和 DOM 的两个主要区别，以及何时应该选择其中一种方案。\n\n`SAX` 是一种逐行读取文件或 XML 字符串以查找或解析所需数据的方式。使用\
    \ `SAX` 解析整个 XML 文件的速度非常快。但问题是，如果需要在 XML 文件中查找简单的数据片段，逻辑可能会变得非常复杂。不过它消耗的内存并不多。\n\
    \n`DOM` 与 `SAX` 相反：你将整个 XML 结构存储在内存中，这使得检索所需数据变得非常容易。然而，相比 `SAX` 方法，将数据结构存储在内存中需要更多的时间和内存。\n\
    \n现在让我们在代码中比较这两种方法。要使用 `SAX` 方法，我选择使用 `NSXMLParser`；还需要实现两个方法，以便接收 XML 事件：开始元素事件和结束元素事件。\n\
    \n```\n@interface XMLParser : NSObject <NSXMLParserDelegate> {\n @private\n  \
    \ NSMutableArray* strings;\n}\n\n@property (nonatomic, strong) NSMutableArray\
    \ *strings;\n- (NSString *)parseDemonstration;\n\n@end\n```\n\n```\n#import \"\
    XMLParser.h\"\n\n@implementation XMLParser\n@synthesize strings;\n\n- (void)parser:(NSXMLParser\
    \ *)parser didStartElement:(NSString *)elementName\n namespaceURI:(NSString *)namespaceURI\
    \ qualifiedName:(NSString *)qName\n   attributes:(NSDictionary *)attributeDict\
    \ {\n  // 你需要实现此方法来获取元素\n}\n\n- (void)parser:(NSXMLParser *)parser didEndElement:(NSString\
    \ *)elementName\n namespaceURI:(NSString *)namespaceURI qualifiedName:(NSString\
    \ *)qName {\n  // 你需要实现此方法来获取元素\n}\n\n- (void)parser:(NSXMLParser*)parser foundCharacters:(NSString*)string\
    \ {\n  // 你需要实现此方法来获取元素的内容\n}\n\n- (NSString *)parseDemonstration {\n   self.strings\
    \ = [[NSMutableArray alloc] init];\n   NSString *filePath = [[NSBundle mainBundle]\
    \ pathForResource:@\"books\" ofType:@\"xml\"];\n   NSString *text = [[NSString\
    \ alloc] initWithContentsOfFile:filePath encoding:NSASCIIStringEncoding error:nil];\n\
    \   NSData*       data      = [text dataUsingEncoding:NSASCIIStringEncoding];\n\
    \   NSXMLParser*  parser    = [[NSXMLParser alloc] initWithData:data];\n   parser.delegate\
    \ = self;\n   [parser parse];\n\n   NSString* result = [self.strings componentsJoinedByString:@\"\
    \"];\n\n   return result;\n}\n\n@end\n```\n\n对于 DOM 方法，你只需要知道元素名称：\n\n```\n[myXMLDoc\
    \ nodesForXPath:[NSString stringWithFormat:@\"//%@:links\", @\"myNameSpace\"]\n\
    \                              namespaceMappings:namespaceDic error:nil];\n```\n"
- fmt: "### Summary\n\nIn this chapter, I covered the main data structures and algorithms,\
    \ both theoretically and practically. The theoretical way is used as a benchmark\
    \ when talking about the concept of algorithms or data structures. I used it to\
    \ compare the different algorithms and data structures. However, in practice,\
    \ don't forget to use the instruments to get a real benchmark.\n\nYou also know\
    \ how to use three main important data structures, which are built in to the Cocoa\
    \ Touch framework. Knowing how to use them properly will help you boost the performance\
    \ of your app without reinventing the whole wheel. However, when you really need\
    \ better performance, you should consider good alternatives like linked list,\
    \ binary search tree, and other abstract concepts like stack and queue. Recursion\
    \ and XML parsing are more important skills that you will need.\n\n### Exercise\n\
    \n1.  Finish the exercise in the chapter:\n\n    You are given two lists: one\
    \ of people who play tennis and one of people who play football. Now, you need\
    \ to find three lists:\n\n    - People who play both tennis and football.\n  \
    \  - People who only play tennis.\n    - People who only play football.\n\n  \
    \  You should try to implement both ways, using a `NSMutableSet` and a `NSMutableArray`.\n\
    \n2.  Implement the remove item in the linked list.\n3.  Implement the insert\
    \ item into the end of the linked list.\n4.  Implement iteration for the linked\
    \ list and give sample code.\n5.  Implement the binary search tree.\n6.  Implement\
    \ the breadth-first search algorithm.\n7.  Parse the following XML document two\
    \ ways: SAX and DOM to get the title, the price, and the author's full name of\
    \ every book. You can use the project `XMLParser` to get the XML file without\
    \ the need to retype it. For DOM, you can use TouchXML (via [`https://github.com/mrevilme/TouchXML`](https://github.com/mrevilme/TouchXML))\
    \ and for SAX, you can use `NSXMLParser` (built-in Apple Library):\n\n```\n<?xml\
    \ version=\"1.0\"?>\n<catalog>\n  <book id=\"bk101\">\n     <author>\n       \
    \ <firstName>Gambardella</firstName>\n        <lastName>Matthew</lastName>\n \
    \    </author>\n     <title>XML Developer's Guide</title>\n     <genre>Computer</genre>\n\
    \     <price>44.95</price>\n     <publish_date>2000-10-01</publish_date>\n   \
    \  <description>An in-depth look</description>\n  </book>\n  <book id=\"bk102\"\
    >\n     <author>\n        <firstName>Ralls</firstName>\n        <lastName>Kim</lastName>\n\
    \     </author>\n     <title>Midnight Rain</title>\n     <genre>Fantasy</genre>\n\
    \     <price>5.95</price>\n     <publish_date>2000-12-16</publish_date>\n    \
    \ <description>A former architect battles corporate</description>\n  </book>\n\
    \  <book id=\"bk103\">\n     <author>\n        <firstName>Galos</firstName>\n\
    \        <lastName>Mike</lastName>\n     </author>\n     <title>Visual Studio\
    \ 7: A Comprehensive Guide</title>\n     <genre>Computer</genre>\n     <price>49.95</price>\n\
    \     <publish_date>2001-04-16</publish_date>\n     <description>Microsoft Visual\
    \ Studio 7</description>\n  </book>\n</catalog>\n```\n\n## Chapter 6\n\n## Improve\
    \ Parallel Data Access using Multithreading Techniques\n\nIn this chapter, you\
    \ will learn about:\n\n- Threads and multithreading.\n- How to write and manage\
    \ threads with locks in iPhone applications.\n- General concepts related to the\
    \ multithreading environment.\n  - Safety: The program should generate the expected\
    \ result.\n  - Liveness: The expected result has to be finally generated at some\
    \ point.\n  - Performance: The expected result has to be quickly generated.\n\
    - Knowing when to use threads.\n- Knowing many different alternatives between\
    \ threads and some other built-in solutions provided by Apple.\n\nToday’s computing\
    \ devices have more and more processors. The iPhone is no exception; sooner or\
    \ later, the iPhone will have multiprocessors; in fact, Android already had some\
    \ devices with dual-core. Therefore, the need to know how to exploit the multiprocessor\
    \ system is increasing. This is just one of the reasons for learning about multithreading.\
    \ Thread canals help you with other issues such as asynchronous code, file and\
    \ network I/O, or slow calculating processes.\n\n### What Are Threads and Multithreading?\n\
    \nA thread, in its simplest form, is a sequence of commands for the operating\
    \ system (OS) to run. Different threads can run in the same processor (CPU) or\
    \ in different processors; this is determined by the OS, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\
    \nNormally, the OS starts a new application with only one thread—in other words,\
    \ one sequence of commands from the beginning to the end. Multiple threads are\
    \ when the system has more than one sequence of commands running in parallel or\
    \ concurrently. In a multi-processor system, each thread can be executed at the\
    \ same time in each processor, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\
    \n![images](images/0601.jpg)\n\n**Figure 6–1.** *A three-processor system running\
    \ with three threads*\n\n![images](images/0602.jpg)\n\n**Figure 6–2.** *A single-processor\
    \ system running with three threads*\n\nHowever, in a single-process system, the\
    \ CPU will process some commands in one thread before switching to another thread.\
    \ In [Figure 6–2](#Chapter06.html#fig_6_2), the CPU executes some commands in\
    \ thread 1 before jumping into thread 2. Then the CPU executes commands in thread\
    \ 2 before jumping into thread 3.\n\nAlong the processing road, different threads\
    \ can call different methods from different objects, as in [Figure 6–3](#Chapter06.html#fig_6_3).\
    \ Thread 1 and thread 2 can use the same object and call the same method at the\
    \ same time as thread 1 and thread 2 call `Method 1` of `Object 1` and `Method\
    \ 3` of `Object 3`. However, thread 1 and thread 2 can call different methods\
    \ and different objects when thread 1 calls `Method 2` of `Object 2` and thread\
    \ 2 calls `Method 4` of `Object 4`.\n\n![images](images/0603.jpg)\n\n**Figure\
    \ 6–3.** *Two threads call different methods from different objects*\n\nThere\
    \ are some advantages and disadvantages to having multiple threads inside the\
    \ same application. The following sections will discuss all of them. One of the\
    \ most important advantages of multithreading applications is the decoupling of\
    \ other tasks from the main User Interface (UI) process so that the UI isn’t blocked\
    \ or frozen.\n\n### Threading Terminology\n\nHere are the important threading\
    \ terms defined:\n\n- The term **thread** is used to refer to a separate sequence\
    \ of commands/execution for code.\n- The term **process** is used to refer to\
    \ a running executable, which can encompass multiple threads.\n- The term **task**\
    \ is used to refer to the abstract concept of work that needs to be performed.\n\
    \nWhat is the difference between a thread and a process if both of them are used\
    \ to execute logic concurrently? A process is different than a thread in the following\
    \ aspects:\n\n- A process is a unit of allocation; it has its own resources, heap\
    \ memory, and privileges. A thread is only a unit of execution with its own stack\
    \ and program counter.\n- A process contains many threads, and each thread can\
    \ belong to only one process.\n- A thread shares data with other threads inside\
    \ the process that these threads belong to. Two processes do not share data with\
    \ each other; they usually use interprocess communication to transfer data. (Interprocess\
    \ communication is out of the scope of this chapter.)\n- An OS has to allocate\
    \ a specific resource, and processes can’t share resources, so a process is considered\
    \ heavyweight. Threads, though, share resources, so an OS can create as many threads\
    \ as it wants inside the same process."
