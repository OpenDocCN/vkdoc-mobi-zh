    \n**注意：** 如果你以前做过 Java 编程，你可能会发现`NSOperation`与`Thread`类或`Runnable`接口有相似之处。在`Thread`类中，你可以扩展`Thread`类并重写`run`方法。对于`Runnable`接口也是一样，你需要实现`Runnable`接口并重写`run`方法。你可以将`NSOperation`的`main`方法视为\
    \ Java 中`Thread`类和`Runnable`接口中的`run`方法。\n\n#### 配置线程\n\n有几个选项可以用来正确配置你的线程，以便在不过载的情况下充分利用系统资源，特别是在像\
    \ iPhone 这样受限的运行时环境中。\n\n- *栈大小*：每当创建新线程时，操作系统都会为该线程分配一块默认大小的内存作为栈来执行。如果你不了解栈，可以查阅第\
    \ 5 章。线程内部的栈将存储局部变量以及线程运行时调用的方法。要为线程设置栈大小，你必须在分离线程之前设置该大小。对于`NSThread`，这意味着你使用如下初始化方法：\n\
    \n```\nNSThread* myThread = [[NSThread alloc]\n                        initWithTarget:self\n\
    \                              selector:@selector(myThreadMainMethod:)\n     \
    \                           object:nil];\n[myThread setStackSize:40960]; // 40KB\
    \ here, the size is in bytes and multiple of 4KB\n[myThread start];  // Actually\
    \ create the thread\n```\n\n- *线程本地存储*：每个线程都有一个用于存储数据的键值对字典，这些数据可以在线程内部的任何地方访问。你可以使用这个字典来存储那些希望在线程执行期间持久化的数据，而无需在代码中创建全局变量。你可以通过`[aThread\
    \ threadDictionary]`来调用这个字典。\n- *线程优先级*：线程优先级涉及操作系统选择执行某个线程的可能性。优先级越高，线程运行的可能性就越大。然而，优先级并不保证任何事情，例如在操作系统切换到另一个线程之前该线程的执行时间。它也不保证高优先级线程总是被选中，而不是其他低优先级线程。\n\
    \n#### 你的线程入口点\n\n当你启动线程时，你需要有一些代码来管理该线程的当前状态、线程执行时创建的内存以及线程内部可能抛出的任何异常。原因是你新创建的线程有自己的栈，这与默认栈不同，如图\
    \ 6–4 所示。因此，你的线程使用的内存与主线程使用的内存区域不同。异常也是类似的；它只会存储在你的栈中，而不会返回给主栈和主线程。\n\n![images](img/0604.jpg)\n\
    \n**图 6–4.** 两个线程有不同的栈来管理它们的执行\n\n有几件事情你需要记住：\n\n- **自动释放池**：用于管理自动释放的对象。\n- `ExceptionHandler`：用于管理线程运行时抛出的异常。\n\
    - `RunLoop`：用于创建事件处理代码。\n\n我将讨论为什么需要实现它们中的每一个，以及如何正确地做到这一点。\n\n表 6–3 提供了一个简短摘要，帮助你回顾创建和配置线程的主要技术及其优缺点。\n\
    \n![Images](img/t0603.jpg)\n```\n"
- fmt: "### Autorelease Pool\n\n在应用程序的每个线程中，你都应该始终拥有一个`Autorelease Pool`，方法是将代码放在`@autoreleasepool`块内。该池包含线程运行时所有自动释放的对象。如果你从未调用过返回自动释放对象的方法，最好还是包含它，因为底层框架和库可能会创建并返回自动释放的对象。如果你有`@autoreleasepool`但从未使用自动释放，一切仍然可以正确运行。\n\
    \n如果你查看 XCode 提供的任何应用程序模板中的`main`方法，你会看到以下代码：\n\n```\nint main(int argc, char\
    \ *argv[]) {\n    @autoreleasepool {\n        int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n    }\n    return retVal;\n}\n```\n\n这个`@autoreleasepool`将处理该线程内的所有自动释放对象。正如你可能已经知道的，自动释放对象是你不再需要使用但还不希望释放的对象。它也可以由工厂方法（如`[NSMutableArray\
    \ array];`）作为自动释放对象返回。这些对象将在运行循环结束时随池一起释放。\n\n因此，如果你创建了一个新线程，请确保将代码包装在`@autoreleasepool`块内，如下所示：\n\
    \n```\n- (void)myThreadMethod {\n    @autoreleasepool { // Top-level pool\n  \
    \      // Do thread work here.\n    }\n}\n```\n\n### ExceptionHandler\n\n在处理线程时，异常非常重要。因为每个线程都有自己的栈，当引发异常时，它会遍历栈的方法到达顶部。这可能导致你的线程停止运行。主线程中的任何异常处理程序也将被忽略。\n\
    \n以下是处理异常的一些基本代码：\n\n```\nNSObject *myObject = nil;\n@try {\n    // access to\
    \ some objects inside an array\n    myObject = [myArray objectAtIndex:2];    \
    \ \n}\n@catch ( NSException *e ) {\n    NSLog(@\"Array has fewer than 3 items\"\
    );\n}\n@finally {\n    // clean up code here\n}\n```\n\n### Run Loop\n\n当你创建一个新线程时，有两种方式可以执行该线程。\n\
    \n- 你编写代码执行线程内的逻辑，直到任务完成且几乎没有中断，例如之前显示的从 URL 下载图像的代码。这很简单，正如你所见。\n- 你希望线程在有动态事件进入时做出响应，例如监听网络上的某些套接字或某个时间触发的事件。这与第一种情况不同，需要你编写代码来创建新的运行循环。\n\
    \n以下是一些简单的`RunLoop`代码，用于监听输入流：\n\n```\nNSRunLoop *runLoop = [NSRunLoop currentRunLoop];\n\
    [iStream setDelegate:self];\n[iStream scheduleInRunLoop:runLoop forMode:NSDefaultRunLoopMode];\n\
    ```\n\n**注意：**如果在没有运行循环的线程上调用了`[NSRunLoop currentRunLoop]`，此方法将导致创建一个新的运行循环。\n\
    \n如果你希望运行循环在开始运行前等待一段时间，可以使用`NSTimer`来完成此任务：\n\n```\n[NSTimer scheduledTimerWithTimeInterval:2.0\n\
    \                                 target:self\n                              \
    \ selector:@selector(doStuff)\n                               userInfo:nil\n \
    \                               repeats:YES];\n```\n\n然而，在某些情况下你不应该使用`RunLoop`，例如在主线程中，你有事件处理代码如`NSInputStream`或`NSTimer`，它们执行一些需要很长时间才能完成的重任务。因为像我的例子这样的事件处理代码最终会在创建它的线程上工作，你的线程无法继续处理其他事件处理代码，直到旧事件被处理并完成。如果你在该线程内创建定时器或输入流运行循环，可能会损害你的主\
    \ UI 线程。主要问题是它会使你的 UI 响应速度变慢。\n\n### 线程的风险\n\n在多线程环境中运行时，你总是需要注意一件事：你无法控制线程的执行顺序。例如，如果你有两个线程，线程\
    \ 1 和线程 2，CPU 会在一定时间内处理线程 1，然后切换到线程 2 并继续运行另一段时间。问题是你不知道 CPU 何时切换，也不知道它会为特定线程分配多少时间。这些时间量对于每个线程和每次运行并不相等。\n\
    \n为了演示难以控制输出的危险性，我将向你展示一个示例。该示例包含两个线程：线程 1 和线程 2。线程 1 打印奇数整数，线程 2 打印偶数整数。这些整数的范围是\
    \ 1 到 20。线程 1 将先启动，然后线程 2 启动。该示例将运行三次。\n\n[Listing 6–5](#Chapter06.html#list_6_5)\
    \ 显示了示例代码。\n\n**Listing 6–5.** *Uncontrolled Output and Multithreading*\n\n```\n\
    - (void)printOddIntegers {\n   for (int i = 0; i < 20; i++) {\n        // print\
    \ odd integers\n       if (i % 2 == 1) {\n           NSLog(@\"%d\", i);\n    \
    \   }\n   }\n}\n\n- (void)printEvenIntegers {\n   for (int i = 0; i < 20; i++)\
    \ {\n       // print even integers\n       if (i % 2 == 0) {\n           NSLog(@\"\
    %d\", i);\n       }\n   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   [NSThread\
    \ detachNewThreadSelector:@selector(printOddIntegers) toTarget:self\nwithObject:nil];\n\
    \   [NSThread detachNewThreadSelector:@selector(printEvenIntegers) toTarget:self\n\
    withObject:nil];\n}\n```\n\n如你所见，我首先调用打印奇数整数，然后调用打印偶数整数。因此你可能期望看到：\n\n- 一些奇数整数先被打印。\n\
    - 奇数整数和偶数整数被均匀打印，例如两个奇数整数，然后两个偶数整数。\n\n然而，这两种假设都不正确，如[Table 6–4](#Chapter06.html#tab_6_4)所示，该表显示了三次运行的结果。\n\
    \n![Images](images/t0604.jpg)\n\n正如你在第二次运行中所见，数字 0 首先被打印，而在其他运行中数字 1 首先被打印。奇数整数和偶数整数的打印并不均匀；此外，在偶数整数被打印之前，奇数整数被打印的数量没有规律。\n\
    \n因此，在多线程环境中，你无法控制线程的执行顺序。多线程是一把双刃剑。实现多线程应用程序的开发人员必须意识到三个主要风险。\n\n- **安全性**：该标准意味着在多线程环境下，输出应如预期正确。换句话说，程序可以以不同的顺序多次运行，但最终输出应符合预期且正确。“永远不会发生坏事。”\n\
    - **活跃性**：这与安全性不同。一个定义是“最终发生了好事。”例如，假设线程 A 必须等待线程 B 的结果，但不知何故这些结果从未返回。因此线程 A 永远无法计算最终结果。你通常听到的这个问题的术语是*死锁*。\n\
    - **性能**：iPhone 应用的重要目标之一是拥有更好的性能和更响应的 UI。因此，必须达到你的性能目标。活跃性只关心最终发生好事；它不关心那个好结果发生的速度有多快。\n\
    \n我将在后续部分通过示例介绍每个标准，以便你理解是什么导致了不良标准，以及如何修复它以确保你的应用程序以高性能运行。"
  raw: '##### Autorelease Pool


    In every thread of the application, you should always have an `Autorelease Pool`,
    by putting the code inside the `@autoreleasepool` block. This pool contains all
    autoreleased objects when that thread is running. If you have never called a method
    that returns an autoreleased object, it is still better to include it because
    the underlying frameworks and libraries can create and return autoreleased objects.
    If you have an `@autoreleasepool` and you never use autorelease, everything still
    runs correctly.


    If you look at the `main` method of any application template provided by XCode,
    you will see the following code:


    `int main(int argc, char *argv[]) {`

    `    @autoreleasepool {`

    `        int retVal = UIApplicationMain(argc, argv, nil, nil);`

    `    }`

    `    return retVal;`

    `}`


    This `@autoreleasepool` will handle all autoreleased objects inside that thread.
    As you may already know, an autoreleased object is an object that you don’t need
    to use anymore but you don’t want to release it yet. It can also be returned as
    an autoreleased object by a factory method like `[NSMutableArray array];.` These
    objects will be released with the pool at the end of the run loop.


    So, if you create a new thread, make sure you wrap your code inside the `@autoreleasepool`
    block, like so:


    `- (void)myThreadMethod {`

    `    @autoreleasepool { // Top-level pool`

    `        // Do thread work here.`


    `    }`

    `}`


    ##### ExceptionHandler


    Exceptions are important when dealing with threads. Because each thread has its
    own stack, when an exception is raised, it will travel over the stacks’ methods
    to reach to the top. This can cause your thread to stop running. Any exception
    handler in the main thread will also be ignored.


    Here is some basic code to handle an exception:


    `      NSObject *myObject = nil;`

    `      @try {`

    `         // access to some objects inside an array`

    `         myObject = [myArray objectAtIndex:2];     `

    `       }`

    `       @catch ( NSException *e ) {`

    `        NSLog(@"Array has fewer than 3 items");`

    `       }`

    `       @finally {`

    `           // clean up code here`

    `       }`


    ##### Run Loop


    When you create a new thread, you have two ways to execute that thread.


    *   You write code to execute the logic inside the thread until the task performed
    is finished with little or no interruption, such as the code to download the image
    from a URL, shown previously. This is easy, as you can see.

    *   You want your thread to respond when there dynamic events come into your thread,
    such as listening to some socket from the network or some events triggered at
    certain time. This is different than the first situation and requires you to write
    code to create a new run loop.


    The following is some simple code for a `RunLoop` to listen to an input stream:


    `NSRunLoop *runLoop = [NSRunLoop currentRunLoop];`

    `[iStream setDelegate:self];`

    `[iStream scheduleInRunLoop:runLoop forMode:NSDefaultRunLoopMode];`


    **NOTE:** If the method `[NSRunLoop currentRunLoop]` is called on a thread without
    a run loop, this method will cause a new run loop to be created.


    And if you want a runloop to wait for an interval of time before start running,
    you can use `NSTimer` for this task:


    `[NSTimer scheduledTimerWithTimeInterval:2.0`

    `                                 target:self`

    `                               selector:@selector(doStuff)`

    `                               userInfo:nil`

    `                                repeats:YES];`


    However, there are some cases when you should not use `RunLoop`, such as if in
    your main thread you have event-handling code such as `NSInputStream` or `NSTimer`
    work on some intensive task that takes too long to finish. Because event-handling
    code like my example will finally work on the thread that created it, your thread
    can’t continue to work with other event-handling code until the old event has
    been processed and finished. This can harm your main UI thread if you create timer
    or input stream run loop inside that thread. The main problem is that it makes
    your UI less responsive.


    #### Risks of Threads


    When running in a multithreaded environment, there is something you always need
    to be careful about: you can’t control the order of thread execution. For example,
    if you have two threads, thread 1 and thread 2, the CPU will work on thread 1
    for a certain time and then it will switch to thread 2 and continue to run another
    amount of time. The problem is that you don’t know when the CPU will switch and
    how much time it will allocate to a specific thread. These amounts of time are
    not equal for every thread and for every run.


    To demonstrate the danger of output that can’t be controlled easily, I will show
    you an example. The example will contain two threads: thread 1 and thread 2\.
    Thread 1 prints the odd integer and thread 2 prints the even integer. These integers
    range from 1 to 20\. Thread 1 will start first and then thread 2 will start. The
    example will run three times.


    [Listing 6–5](#Chapter06.html#list_6_5) shows the sample code.


    **Listing 6–5.** *Uncontrolled Output and Multithreading*


    `- (void)printOddIntegers {`

    `   for (int i = 0; i < 20; i++) {`

    `        // print odd integers`

    `       if (i % 2 == 1) {`

    `           NSLog(@"%d", i);`

    `       }`

    `   }`

    `}`


    `- (void)printEvenIntegers {`

    `   for (int i = 0; i < 20; i++) {`

    `       // print even integers`

    `       if (i % 2 == 0) {`

    `           NSLog(@"%d", i);`

    `       }`

    `   }`

    `}`


    `- (void)viewDidAppear:(BOOL)animated {`


    `   [NSThread detachNewThreadSelector:@selector(printOddIntegers) toTarget:self`

    `withObject:nil];`


    `   [NSThread detachNewThreadSelector:@selector(printEvenIntegers) toTarget:self`

    `withObject:nil];`


    `}`


    As you can see, I called to print odd integers first and then called to print
    even integers. So you may have expected to see


    *   Some odd integers printed first.

    *   The odd and even integers printed evenly, such as two odd integers and then
    two even integers.


    However, both of these assumptions are not correct, as you can see in [Table 6–4](#Chapter06.html#tab_6_4),
    which shows the results of the three runs.


    ![Images](images/t0604.jpg)


    As you can see in the second time, the number 0 is printed first while in other
    times number 1 is printed first. The printing of odd and even integers are not
    distributed evenly; moreover, there is no pattern of how many odd integers are
    printed before even integers are printed.


    So, in multithreading environment, you can’t control the order in which the threads
    will be executed. Multithreading is a double-edged sword. Developers implementing
    a multithreading application must be aware of three main risks.


    *   *Safety*: This criteria means that under the multithreading environment, the
    output should be correct as expected. In other words, the program can be run in
    different order many times, but the final output should be as expected and correct.
    “Nothing bad ever happens.”

    *   *Liveness*: This is different than safety. One definition is “something good
    finally happens.” For example, say thread A has to wait for the results from thread
    B, and somehow those results are never returned. So thread A can never calculate
    the final result. The term you usually hear for this problem is *deadlock*.

    *   *Performance*: One of important goals for iPhone apps is to have a better
    performance and a more responsive UI. So, your performance goal has to be reached.
    Liveness is only concerned with something good finally happening; it doesn’t care
    about how fast that good result will occur.


    I will cover each criterion in following parts with examples so you can understand
    what leads to a bad criterion and how you can fix it to make sure your application
    runs with high performance.'
