  trans: "\n# 提升并优化 UITableView 性能\n\n在本章中，你将进行以下操作：\n\n- 在实际示例中使用你在第 2 章中看到的基准测试工具。\n\
    - 通过滚动性能优化的示例，逐步实践。\n- 使用多种技术优化 `UITableView` 性能。\n    - 优化 `UITableView` 中简单基础单元格的基本技巧。\n\
    \    - 使用代码实际绘制单元格内部视图的高阶技巧。\n    - 针对需要动画效果的单元格（如编辑、重排）的基础优化技巧。\n    - 开发者需要了解的其他基本技巧。\n\
    \niPhone 应用通常以列表形式展示数据。Apple 为基础开发者提供了出色的工具：`UITableView` 和 `UITableViewCell`。如果开发者只想使用基本功能来显示左侧的小图片和中间的文本，那么默认的\
    \ Apple 控件应该能很好地工作。然而，当你需要对列表顺序进行大量自定义，比如在不同的位置放置两到三张图片和文本时，你就会遇到问题。迟早，你会遇到 `UITableView`\
    \ 滚动卡顿的性能问题，尤其是在 iPhone 3G 这样的旧设备上。\n\n## 示例简介\n\n在本练习中，我将根据两个主要因素来衡量性能：`tableView`\
    \ 出列、创建新单元格或将其返回给操作系统（OS）的速度；以及操作系统渲染你的单元格并在屏幕上显示的速度。前者可以通过 `NSLog` 轻松测量；后者则更为复杂，只能通过\
    \ `CoreAnimation` 来测量。\n\n为了演示，我将带你了解两个不同的示例。一个只包含头像和文本块；另一个则包含复杂的视图，其中有许多子视图。通过这两个示例，你将看到多种优化\
    \ `UITableView` 滚动性能的不同方法。\n\n在本章结尾，我还会列出一些我没来得及在本章详细讨论的其他要点。这些并非常见错误，但如果开发者不小心犯了其中之一，那么他可能需要花上一整天的时间进行基准测试和调试才能找出问题。我希望确保你拥有足够的技能和知识，能够应对任何情况。\n\
    \n有时，优化非常简单，只需要在代码中进行一些零星的改动。然而，在其他情况下，比如第二个示例，优化可能需要重写整个代码库，以适应更优、更高效的模型。我希望在讲解完示例后，你能对程序结构有清晰的认识，从而从一开始就做出正确的决策，避免后续重写整个代码库。\n\
    \n## 回顾 Instrument 工具\n\n在本章中，你将使用 `CoreAnimation` 工具对 iPhone OS 的渲染性能进行基准测试。这将帮助你判断问题是出在计算过程还是显示过程。第\
    \ 2 章已经介绍过这个工具，因此本章仅做简要回顾。\n\n图 3-1 展示了 `CoreAnimation` 工具的主视图，其中包含运行该工具时需要关注的三个部分。图\
    \ 3-2 则展示了性能读数。\n\n![images](img/0301.jpg)\n\n**图 3-1.** *CoreAnimation 工具的主要部分*\n\
    \n![images](img/0302.jpg)\n\n**图 3-2.** *最近的显示性能*\n\n## 第一个示例\n\n第一个示例将向你展示优化\
    \ `UITableView` 滚动性能的逐步过程。初始版本的源代码包含了许多我从不同开发者那里收集到的性能错误。在这个过程中，你会看到每实现一个优化步骤，性能都会随之提升。\n\
    \n### 第一个示例简介\n\n如图 3-3 所示，你面临的是一个通用且实际的问题：你需要开发一个 `UITableView`，其中每个单元格包含一张图片和一个文本块。我将带你了解这个示例的源代码。让我们看看像\
    \ Facebook 这样的通用应用；应用需要一张头像图片和一张用户分享链接内容的图片。此外，应用还可能包含其他小图片来表示单元格中的图标。对于这第一次基准测试，请参考名为\
    \ `SlowPerformanceTableView` 的项目。\n\n![images](img/0303.jpg)\n\n**图 3-3.** *第一个示例的应用程序*\n\
    \n### 标准基准测试\n\n在开始任何项目之前，你必须明确最终目标；在这个案例中，目标是你希望达到什么样的性能，从而在用户滚动和使用应用时提供良好的体验。因此，通过运行一个标准的、未定制的\
    \ `UITableViewCell`（需要简单的图片加载并复用图片），表 3-1 显示了来自我日志的运行时间。\n\n![images](img/t0301.jpg)\n\
    \n`CoreAnimation` 测得的 `每秒帧数 (fps)` 最佳性能为 `60 fps`（数值越高，性能越好）。对于标准的 `UITableViewCell`，通常速度在\
    \ `55-60 fps` 左右；这应该是你的目标之一。另一个目标是确保准备时间足够短。当总时间减少时，单元格的准备时间也会相应减少。不过，减少单元格准备时间相对更容易，因此在这个示例中，我将首先专注于减少它。\n\
    \n### 初始基准测试\n\n对于第一个示例，我运行了一次初始基准测试，并得到了六个单元格滚动的随机结果。表 3-2 显示了使用 `NSLog` 和 `CoreAnimation`\
    \ 等工具进行性能基准测试的结果。\n\n![images](img/t0302.jpg)\n\n因此，从结果可以看出，通常需要 10 毫秒来返回一个单元格进行绘制。由于这个巨大的延迟，整体测量值（fps）也显著下降。因此，我的首要目标是减少单元格准备时间的过程。\n\
    \n源代码中有一条关于 `[UIImage imageNamed:name]` 和 `[[UIImage alloc] initWithContentsOfFile:name]`\
    \ 区别的注释。稍后我将解释这个区别，以及为什么你会使用 `imageNamed` 而不是 `initWithContentsOfFile`。\n\n###\
    \ 复用 `UITableViewCell`\n\n优化 `UITableView` 通常很简单；你需要做的就是仔细检查你是否以正确的方式复用了 `UITableViewCell`。在\
    \ iOS 中创建 `UITableViewCell` 是一个 CPU 密集型的过程。因此，如果每次用户上下滚动到新单元格时，CPU 都需要创建一个新的单元格，那么整体性能将会下降。Apple\
    \ 的标准（也是默认）改进方法是，每当单元格移出屏幕时，就对其进行复用。\n\n#### 标准 TableView 单元格\n\n对于标准的 `UITableViewCell`，生成的代码应该能很好地工作，并提供快速、高流畅的滚动性能。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n    static NSString *CellIdentifier = @\"Cell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n    if\
    \ (cell == nil) {\n        cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
    \            reuseIdentifier:CellIdentifier];\n    }\n```\n\n请注意 `reuseIdentifier:CellIdentifier`\
    \ 和 `dequeueReusableCellWithIdentifier:CellIdentifier` 的使用。这两部分将帮助你正确地复用 `UITableViewCell`。\n\
    \n创建新的自定义单元格主要有两种方式：一种是使用 `InterfaceBuilder`，另一种是直接通过调用 `addSubview:` 方法编写自定义代码。\n"
- fmt: "# Custom TableView Cell by Interface Builder\n\nWhile using the `InterfaceBuilder`,\
    \ developers usually forget to set the identifier, which is really easy to do.\
    \ The identifier can be modified by open the xib file, going to the first tab,\
    \ and changing the first row, as shown in [Figure 3–4](#Chapter03.html#fig_3_4).\n\
    \n![images](images/0304.jpg)\n\n**Figure 3–4.** *Setting the Reuse Identifier\
    \ for the Cell*\n\nNow, inside the initialization code for cell, you need to use\
    \ exactly the same identifier.\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   static NSString\
    \ *CellIdentifier = @\"CellIdentifier\"; // must match the one inInterfaceBuilder\n\
    \n   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \   if (cell == nil) {\n       cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier];\n   }\n\
    ```\n\n# Custom TableView Cell by Code\n\nIf you build your own custom cell by\
    \ coding without any interface builder, you can return it inside your custom class\
    \ `ReuseTableViewCell`.\n\n```\n        TableCellViewController.h\n@interface\
    \ TableCellViewController : UITableViewCell {\n}\n@end\n\n        TableCellViewController.m\n\
    #import \"TableCellViewController.h\"\n\n@implementation TableCellViewController\n\
    \n- (NSString *)reuseIdentifier {\n        return @”CellIdentifier”;\n}\n@end\n\
    ```\n\n**NOTE:** The main difference between these two approaches is the way you\
    \ load and initialize your `UITableViewCell`. To make sure that you can understand\
    \ and differentiate between these two examples, I'll show you some main code.\n\
    \n## Loading Cell from Nib File\n\nFirst, you need the code to load the nib file\
    \ from file system to memory and then parse to get the `UITableView` object out.\n\
    \n```\n- (UITableViewCell *)cellWithTableView:(UITableView *)tableView cellIdentifier:(NSString\
    \ *)cellIdentifier nibName:(NSString *)nibName {\n   UITableViewCell *textCell\
    \ =  [tableView dequeueReusableCellWithIdentifier:cellIdentifier];\n   if (textCell\
    \ == nil) {\n       NSArray *topLevelObjects = [[NSBundle mainBundle] loadNibNamed:nibName\n\
    \                                                                owner:nil\n \
    \                                                             options:nil];\n\n\
    \       for (id currentObject in topLevelObjects) {\n           if ([currentObject\
    \ isKindOfClass:[UITableViewCell class]]) {\n               textCell = (UITableViewCell\
    \ *)currentObject;\n               break;\n           }\n       }\n   }\n   return\
    \ textCell;\n}\n```\n\nYou can call the method `cellWithTableView:cellIdentifier:nibName:`\
    \ to load the table view from the nib `TableViewController` with the following\
    \ code:\n\n```\nReuseTableViewCell *cell = (ReuseTableViewCell *) [self\ngetCellWithTableView:tableView\n\
    cellIdentifier:CellIdentifier\nnibName:@\"ReuseTableViewCell\"];\n```\n\nThis\
    \ code is not perfect; you need to change the nib file yourself to make sure that\
    \ everything runs well. However, my purpose is to make sure that you can differentiate\
    \ between two approaches, so I won't go into the details.\n\n## Loading Cell from\
    \ Custom Code\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier {\n   self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \   if (self != nil) {\n       UIImageView *imageView = [[UIImageView alloc] initWithFrame:CGRectMake(20,\
    \ 20, 30, 30)];\n       [self.contentView addSubview:imageView];\n   }\n   return\
    \ self;\n}\n```\n\nA small exercise for you is to create a new project and try\
    \ to make a custom cell; then you should check everything to make sure that you\
    \ reuse the cell correctly.\n\n# Running Benchmarks Again\n\nAfter reusing the\
    \ cell, you can benchmark the scrolling performance again. As you can see in [Table\
    \ 3–3](#Chapter03.html#tab_3_3), the performance doubles after you reuse the cell\
    \ correctly.\n\n![images](images/t0303.jpg)\n\nThis shows you that you are going\
    \ in the right way; however, the current performance is still not good enough.\
    \ You always want the performance to go up to `around 0.0006-0.0001`; this is\
    \ a normal performance for a standard `UITableViewCell`, as I showed in the first\
    \ section. So you will go to the next section to learn how to reuse images instead\
    \ of creating new image every time it's called.\n\nHere is the reason why you\
    \ should always reuse the cell. It takes time and memory for the OS to create\
    \ and load a new cell into the memory. This is why the `tableView` will always\
    \ queue the cell for reuse whenever the cell is out of the screen. If you reuse\
    \ that cell, the OS doesn't need to create a new cell to display; it just needs\
    \ to get the old cell, change some attributes, and then redisplay that cell. This\
    \ process is much faster than when the OS needs to create a new cell."
  raw: '###### Custom TableView Cell by Interface Builder


    While using the `InterfaceBuilder`, developers usually forget to set the identifier,
    which is really easy to do. The identifier can be modified by open the xib file,
    going to the first tab, and changing the first row, as shown in [Figure 3–4](#Chapter03.html#fig_3_4).


    ![images](images/0304.jpg)


    **Figure 3–4.** *Setting the Reuse Identifier for the Cell*


    Now, inside the initialization code for cell, you need to use exactly the same
    identifier.


    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`

    `   static NSString *CellIdentifier = @"CellIdentifier"; // must match the one
    inInterfaceBuilder`


    `   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];`

    `   if (cell == nil) {`

    `       cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault`

    `                                      reuseIdentifier:CellIdentifier];`

    `   }`


    ###### Custom TableView Cell by Code


    If you build your own custom cell by coding without any interface builder, you
    can return it inside your custom class `ReuseTableViewCell.`


    `        TableCellViewController.h`

    `@interface TableCellViewController : UITableViewCell {`

    `}`

    `@end`


    `        TableCellViewController.m`

    `#import "TableCellViewController.h"`


    `@implementation TableCellViewController`


    `- (NSString *)reuseIdentifier {`

    `        return @”CellIdentifier”;`

    `}`

    `@end`


    **NOTE:** The main difference between these two approaches is the way you load
    and initialize your `UITableViewCell.` To make sure that you can understand and
    differentiate between these two examples, I''ll show you some main code.


    **Loading Cell from Nib File**


    First, you need the code to load the nib file from file system to memory and then
    parse to get the `UITableView` object out.


    `- (UITableViewCell *)cellWithTableView:(UITableView *)tableView cellIdentifier:(NSString
    *)cellIdentifier nibName:(NSString *)nibName {`

    `   UITableViewCell *textCell =  [tableView dequeueReusableCellWithIdentifier:cellIdentifier];`

    `   if (textCell == nil) {`

    `       NSArray *topLevelObjects = [[NSBundle mainBundle] loadNibNamed:nibName`

    `                                                                owner:nil`

    `                                                              options:nil];`


    `       for (id currentObject in topLevelObjects) {`

    `           if ([currentObject isKindOfClass:[UITableViewCell class]]) {`

    `               textCell = (UITableViewCell *)currentObject;`

    `               break;`

    `           }`

    `       }`

    `   }`

    `   return textCell;`

    `}`


    You can call the method `cellWithTableView:cellIdentifier:nibName:` to load the
    table view from the nib `TableViewController` with the following code:


    `ReuseTableViewCell` **`*cell = (`** `ReuseTableViewCell` **`*) [self`**

    **`getCellWithTableView:tableView`**

    **`cellIdentifier:CellIdentifier`**

    **`nibName:@"ReuseTableViewCell"];`**


    This code is not perfect; you need to change the nib file yourself to make sure
    that everything runs well. However, my purpose is to make sure that you can differentiate
    between two approaches, so I won''t go into the details.


    ###### Loading Cell from Custom Code


    `- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier
    {`

    `   self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];`

    `   if (self != nil) {`

    `       UIImageView *imageView = [[UIImageView alloc] initWithFrame:CGRectMake(20,
    20, 30, 30)];`

    `       [self.contentView addSubview:imageView];`

    `   }`

    `   return self;`

    `}`


    A small exercise for you is to create a new project and try to make a custom cell;
    then you should check everything to make sure that you reuse the cell correctly.


    ###### Running BenchmarksAgain


    After reusing the cell, you can benchmark the scrolling performance again. As
    you can see in [Table 3–3](#Chapter03.html#tab_3_3), the performance doubles after
    you reuse the cell correctly.


    ![images](images/t0303.jpg)


    This shows you that you are going in the right way; however, the current performance
    is still not good enough. You always want the performance to go up to `around
    0.0006-0.0001;` this is a normal performance for a standard `UITableViewCell`,
    as I showed in the first section. So you will go to the next section to learn
    how to reuse images instead of creating new image every time it''s called.


    Here is the reason why you should always reuse the cell. It takes time and memory
    for the OS to create and load a new cell into the memory. This is why the `tableView`
    will always queue the cell for reuse whenever the cell is out of the screen. If
    you reuse that cell, the OS doesn''t need to create a new cell to display; it
    just needs to get the old cell, change some attributes, and then redisplay that
    cell. This process is much faster than when the OS needs to create a new cell.'
  trans: "\n# 通过 Interface Builder 自定义 TableView Cell\n\n使用 `InterfaceBuilder` 时，开发者常常忘记设置标识符，这确实很容易发生。标识符可以通过打开\
    \ xib 文件、进入第一个选项卡、并修改第一行来修改，如图 图 3–4 所示。\n\n![images](img/0304.jpg)\n\n**图 3–4.**\
    \ *设置 Cell 的重用标识符*\n\n现在，在 Cell 的初始化代码中，你需要使用完全相同的标识符。\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\
    \ {\n   static NSString *CellIdentifier = @\"CellIdentifier\"; // 必须与 InterfaceBuilder\
    \ 中的一致\n\n   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \   if (cell == nil) {\n       cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
    \                                      reuseIdentifier:CellIdentifier];\n   }\n\
    ```\n\n# 通过代码自定义 TableView Cell\n\n如果你通过编码自行构建自定义 Cell，而不使用任何界面构建器，则可以在自定义类 `ReuseTableViewCell`\
    \ 内部返回它。\n\n```\n        TableCellViewController.h\n@interface TableCellViewController\
    \ : UITableViewCell {\n}\n@end\n\n        TableCellViewController.m\n#import \"\
    TableCellViewController.h\"\n\n@implementation TableCellViewController\n\n- (NSString\
    \ *)reuseIdentifier {\n        return @”CellIdentifier”;\n}\n@end\n```\n\n**注意：**\
    \ 这两种方法的主要区别在于加载和初始化 `UITableViewCell` 的方式。为了确保你能理解并区分这两个示例，我将展示一些主要代码。\n\n##\
    \ 从 Nib 文件加载 Cell\n\n首先，你需要编写代码将 nib 文件从文件系统加载到内存，然后解析以获取 `UITableView` 对象。\n\n\
    ```\n- (UITableViewCell *)cellWithTableView:(UITableView *)tableView cellIdentifier:(NSString\
    \ *)cellIdentifier nibName:(NSString *)nibName {\n   UITableViewCell *textCell\
    \ =  [tableView dequeueReusableCellWithIdentifier:cellIdentifier];\n   if (textCell\
    \ == nil) {\n       NSArray *topLevelObjects = [[NSBundle mainBundle] loadNibNamed:nibName\n\
    \                                                                owner:nil\n \
    \                                                             options:nil];\n\n\
    \       for (id currentObject in topLevelObjects) {\n           if ([currentObject\
    \ isKindOfClass:[UITableViewCell class]]) {\n               textCell = (UITableViewCell\
    \ *)currentObject;\n               break;\n           }\n       }\n   }\n   return\
    \ textCell;\n}\n```\n\n你可以调用方法 `cellWithTableView:cellIdentifier:nibName:` 从 nib\
    \ 文件 `TableViewController` 加载表格视图，代码如下：\n\n```\nReuseTableViewCell *cell = (ReuseTableViewCell\
    \ *) [self\ngetCellWithTableView:tableView\ncellIdentifier:CellIdentifier\nnibName:@\"\
    ReuseTableViewCell\"];\n```\n\n这段代码并不完美；你需要自己修改 nib 文件以确保一切正常运行。不过，我的目的是让你能够区分这两种方法，因此我不会深入细节。\n\
    \n## 从自定义代码加载 Cell\n\n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier {\n   self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \   if (self != nil) {\n       UIImageView *imageView = [[UIImageView alloc] initWithFrame:CGRectMake(20,\
    \ 20, 30, 30)];\n       [self.contentView addSubview:imageView];\n   }\n   return\
    \ self;\n}\n```\n\n给你一个小练习：创建一个新项目，尝试制作一个自定义 Cell；然后检查一切，确保你正确重用了 Cell。\n\n# 再次运行基准测试\n\
    \n重用 Cell 后，你可以再次对滚动性能进行基准测试。如 表 3–3 所示，正确重用 Cell 后，性能提升了一倍。\n\n![images](img/t0303.jpg)\n\
    \n这表明你的方向是正确的；不过，当前性能仍然不够理想。你总是希望性能能达到 `around 0.0006-0.0001`；正如我在第一部分展示的那样，这是标准\
    \ `UITableViewCell` 的正常性能。因此，你将进入下一部分，学习如何重用图像，而不是在每次调用时都创建新图像。\n\n以下是你应该始终重用\
    \ Cell 的原因。操作系统创建和加载一个新 Cell 到内存需要时间和内存。这就是为什么 `tableView` 会在 Cell 移出屏幕时始终将其放入队列以待重用的原因。如果你重用了那个\
    \ Cell，操作系统就不需要创建新 Cell 来显示；它只需要获取旧 Cell，更改一些属性，然后重新显示该 Cell 即可。这个过程远比操作系统需要创建新\
    \ Cell 的速度要快得多。\n"
- fmt: "### Reusing Images\n\nThe general problem with displaying images is that the\
    \ loading time, either by file I/O from the `File System` or by networking I/O,\
    \ takes so long. This loading process may also affect users' scrolling experience\
    \ when the iOS cannot return the cell to render the UI.\n\nFor this section, please\
    \ refer to the project named `ReuseImageViewController`. Let me explain first\
    \ why I choose not to use `[UIImage imageNamed:@\"\"]` for these samples. The\
    \ `imageNamed` does an important job: it will cache the image for you in memory\
    \ and it will reuse it when you ask for it again. The problem with this method\
    \ is that it can only get the image from your bundle—in other words, just images\
    \ that come with the source code of the app. You can't get images from the Internet\
    \ and load them to memory this way. Usually, what you have to do is call the method\
    \ `[[UIImage alloc] initWithContentsOfFile:@\"\"]` or `[UIImage alloc initWithData:Data]`.\
    \ With these methods, the OS will not automatically cache the image in the memory\
    \ for the app.\n\nSo, I want you to cache the images yourself by using a small\
    \ dictionary to store the image in memory (see [Chapter 4](#Chapter04.html#ch4)).\
    \ Another important part of dealing with images is multithreading (see [Chapter\
    \ 6](#Chapter06.html#ch6)). Using this technique, you can put the heavy processing\
    \ jobs out of the current processing thread. In my current example, I will not\
    \ use multithreading because it would be asking you to assimilate too many new\
    \ ideas at once. You should try it yourself as an exercise at the end of the chapter.\n\
    \nHere is the main code to store images in an `NSDictionary` (please do not use\
    \ this way to store images in your app because it will cause memory warning issue).\n\
    \n```\n      // Code to store the image in the dictionary\n      - (UIImage *)imageWithName:(NSString\
    \ *)name {\n\n         if ([self.imageDictionary objectForKey:name]) {\n     \
    \        return [self.imageDictionary objectForKey:name];\n         }\n\n    \
    \     UIImage *image = [[UIImage alloc] initWithContentsOfFile:name];\n      \
    \   [self.imageDictionary setObject:image forKey:name];\n         return image;\n\
    \      }\n```\n\nHere is the main code to extract the latest image out.\n\n```\n\
    // Customize the appearance of table view cells.\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   static NSString\
    \ *CellIdentifier = @\"CellIdentifier\";\n   ReuseTableViewCell *cell = (ReuseTableViewCell\
    \ *) [self\n                        getCellWithTableView:tableView cellIdentifier:CellIdentifier\n\
    \                                     nibName:@\"ReuseTableViewCell\"];\n   NSString\
    \ *avatarFile = [NSString stringWithFormat:@\"a0\"];\n   NSString *avatarName\
    \ = [[NSBundle mainBundle] pathForResource:avatarFile ofType:@\"jpeg\"];\n   cell.avatar.image\
    \ = [self imageWithName:avatarName];\n   cell.userName.text = [NSString stringWithFormat:@\"\
    hi here: %d\", indexPath.row];\n      // Configure the cell.\n   return cell;\n\
    }\n```\n\nWith the updated code, you can run the benchmark again. As you can see\
    \ from [Table 3–4](#Chapter03.html#tab_3_4), you get a much better result. The\
    \ average running time is now 0.002 and the general performance `fps` is now nearer\
    \ 60. You're getting a much faster performance than previously with `ReuseTableViewCell`.\n\
    \n![images](images/t0304.jpg)\n\nPerfect! The `fps` rate now is almost 60, and\
    \ the preparation time is decent. If your apps can reach to this level, you don't\
    \ have to worry about scrolling performance anymore; it should be smooth. Generally,\
    \ this is good performance for a normal, simple `UITableViewCell` with many subviews\
    \ inside. It is a good thing because you don't have to do much work from the beginning.\
    \ If the scrolling performance is still jerky, however, you may need to use a\
    \ much better but also much more complicated way to get the same performance.\n\
    \nAs already stated in [Chapter 1](#Chapter01.html#ch1) and [Chapter 2](#Chapter02.html#ch2),\
    \ you should always be careful to avoid over-optimization. It's not worth the\
    \ effort to spend too much time optimizing for a small improvement of performance.\
    \ So, at this point, only if you're still suffering from poor scrolling performance\
    \ should you move forward to the second example, which is using the `UITableViewCell`\
    \ for drawing techniques.\n\n### Reducing Preparation Time\n\nGenerally, I want\
    \ to reuse the images by caching them and I want to reduce the initialization\
    \ process. When the OS needs to render a new cell for the `TableView`, it will\
    \ ask for a new cell by calling the following method:\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath *)indexPath\
    \ {\n        // Initialize and return the Cell here\n}\n```\n\nSo, if you block\
    \ it for a long period of time, the `UserInterface` rendering process will be\
    \ blocked; it can't do anything or display anything new. This is part of the reason\
    \ why users will see that the scrolling just stops at one place forever.\n\nTo\
    \ make this process as fast as possible, you can remove logic, delay calculation,\
    \ and cache data and images that you can reuse them. Another approach is to reuse\
    \ a cell with default image and data first. You can also use multithreading so\
    \ when you get the image/data, you can fill in the cell later. From the users'\
    \ perspective, this approach results in smoother scrolling and images that load\
    \ quickly."
  raw: '##### Reusing Images


    The general problem with displaying images is that the loading time, either by
    `file I/O` from the `File System` or by networking I/O, takes so long. This loading
    process may also affect users'' scrolling experience when the iOS cannot return
    the cell to render the UI.


    For this section, please refer to the project named `ReuseImageViewController.`
    Let me explain first why Ichoose not to use `[UIImageimageNamed:@""]` for these
    samples. The `imageNamed` does an important job: it will cache the image for you
    in memory and it will reuse it when you ask for it again. The problem with this
    method is that it can only get the image from your bundle—in other words, just
    images that come with the source code of the app. You can''t get images from the
    Internet and load them to memory this way. Usually, what you have to do is call
    the method `[[UIImagealloc] initWithContentsOfFile:@""]; or [UIImagealloc [initWithData:Data]].`
    With these methods, the OS will not automatically cache the image in the memory
    for the app.


    So, Iwant you to cache the images yourself by using a small dictionary to store
    the image in memory (see [Chapter 4](#Chapter04.html#ch4)). Another important
    part of dealing with images is multithreading (see [Chapter 6](#Chapter06.html#ch6)).
    Using this technique, you can put the heavy processing jobs out of the current
    processing thread. In my current example, I will not use multithreading because
    it would be asking you to assimilate too many new ideas at once. You should try
    it yourself as an exercise at the end of the chapter.


    Here is the main code to store images in an `NSDictionary` (please do not use
    this way to store images in your app because it will cause memory warning issue).


    `      // Code to store the image in the dictionary`

    `      - (UIImage *)imageWithName:(NSString *)name {`


    `         if ([self.imageDictionary objectForKey:name]) {`

    `             return [self.imageDictionary objectForKey:name];`

    `         }`


    `         UIImage *image = [[UIImage alloc] initWithContentsOfFile:name];`

    `         [self.imageDictionary setObject:image forKey:name];`

    `         return image;`

    `      }`


    Here is the main code to extract the latest image out.


    `// Customize the appearance of table view cells.`

    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`

    `   static NSString *CellIdentifier = @"CellIdentifier";`

    `   ReuseTableViewCell *cell = (ReuseTableViewCell *) [self`

    `                        getCellWithTableView:tableView cellIdentifier:CellIdentifier`

    `                                     nibName:@"ReuseTableViewCell"];`

    `   NSString *avatarFile = [NSString stringWithFormat:@"a0"];`

    `   NSString *avatarName = [[NSBundle mainBundle] pathForResource:avatarFile ofType:@"jpeg"];`

    `   cell.avatar.image = [self imageWithName:avatarName];`

    `   cell.userName.text = [NSString stringWithFormat:@"hi here: %d", indexPath.row];`

    `      // Configure the cell.`

    `   return cell;`

    `}`


    With the updated code, you can run the benchmark again. As you can see from [Table
    3–4](#Chapter03.html#tab_3_4), you get a much better result. The average running
    time is now 0.002 and the general performance `fps` is now nearer 60\. You''re
    getting a much faster performance than previously with ReuseTableViewCell.


    ![images](images/t0304.jpg)


    Perfect! The fps rate now is almost 60, and the preparation time is decent. If
    your apps can reach to this level, you don''t have to worry about scrolling performance
    anymore; it should be smooth. Generally, this is good performance for a normal,
    simple `UITableViewCell` with many subviews inside. It is a good thing because
    you don''t have to do much work from the beginning. If the scrolling performance
    is still jerky, however, you may need to use a much better but also much more
    complicated way to get the same performance.


    As already stated in [Chapter 1](#Chapter01.html#ch1) and [Chapter 2](#Chapter02.html#ch2),
    you should always be careful to avoid over-optimization. It''s not worth the effort
    to spend too much time optimizing for a small improvement of performance. So,
    at this point, only if you''re still suffering from poor scrolling performance
    should you move forward to the second example, which is using the `UITableViewCell`
    for drawing techniques.


    ##### Reducing Preparation Time


    Generally, I want to reuse the images by caching them and I want to reduce the
    initialization process. When the OS needs to render a new cell for the `TableView`,
    it will ask for a new cell by calling the following method:


    `- (UITableViewCell *)tableView:(UITableView *)tableView`

    `cellForRowAtIndexPath:(NSIndexPath *)indexPath {`

    `        // Initialize and return the Cell here`

    `}`


    So, if you block it for a long period of time, the `UserInterface` rendering process
    will be blocked; it can''t do anything or display anything new. This is part of
    the reason why users will see that the scrolling just stops at one place forever.


    To make this process as fast as possible, you can remove logic, delay calculation,
    and cache data and images that you can reuse them. Another approach is to reuse
    a cell with default image and data first. You can also use multithreading so when
    you get the image/data, you can fill in the cell later. From the users'' perspective,
    this approach results in smoother scrolling and images that load quickly.'
  trans: "\n### 重用图片\n\n显示图片的一个普遍问题是，无论是通过`文件系统`的文件 I/O 还是网络 I/O，加载时间都非常长。当 iOS 无法返回单元格进行\
    \ UI 渲染时，这个加载过程也可能影响用户的滚动体验。\n\n关于本节内容，请参考名为`ReuseImageViewController`的项目。我先解释一下为什么在这些示例中不选择使用`[UIImage\
    \ imageNamed:@\"\"]`。`imageNamed`方法有一个重要的作用：它会在内存中为你缓存图片，并且当你再次请求时会复用该图片。但这个方法的问题是，它只能从你的\
    \ bundle 中获取图片——换句话说，只能获取应用源代码自带的图片。你无法通过这种方式从网络获取图片并加载到内存中。通常，你需要调用`[[UIImage\
    \ alloc] initWithContentsOfFile:@\"\"]`或`[UIImage alloc initWithData:Data]`方法。使用这些方法时，操作系统不会自动为应用将图片缓存到内存中。\n\
    \n因此，我希望你通过使用一个小型字典将图片存储在内存中，来自行缓存图片（请参见第 4 章）。处理图片的另一个重要部分是多线程（请参见第 6 章）。利用这一技术，你可以将繁重的处理任务移出当前处理线程。在我当前的示例中，我不会使用多线程，因为那会要求你一次性吸收太多新概念。你应该在章节末尾自己尝试练习一下。\n\
    \n以下是将图片存储在`NSDictionary`中的主要代码（请不要在你的应用中使用这种方式存储图片，因为它会导致内存警告问题）。\n\n```\n  \
    \    // 将图片存储到字典中的代码\n      - (UIImage *)imageWithName:(NSString *)name {\n\n\
    \         if ([self.imageDictionary objectForKey:name]) {\n             return\
    \ [self.imageDictionary objectForKey:name];\n         }\n\n         UIImage *image\
    \ = [[UIImage alloc] initWithContentsOfFile:name];\n         [self.imageDictionary\
    \ setObject:image forKey:name];\n         return image;\n      }\n```\n\n以下是提取最新图片的主要代码。\n\
    \n```\n// 自定义表格视图单元格的外观。\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
    cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   static NSString *CellIdentifier\
    \ = @\"CellIdentifier\";\n   ReuseTableViewCell *cell = (ReuseTableViewCell *)\
    \ [self\n                        getCellWithTableView:tableView cellIdentifier:CellIdentifier\n\
    \                                     nibName:@\"ReuseTableViewCell\"];\n   NSString\
    \ *avatarFile = [NSString stringWithFormat:@\"a0\"];\n   NSString *avatarName\
    \ = [[NSBundle mainBundle] pathForResource:avatarFile ofType:@\"jpeg\"];\n   cell.avatar.image\
    \ = [self imageWithName:avatarName];\n   cell.userName.text = [NSString stringWithFormat:@\"\
    hi here: %d\", indexPath.row];\n      // 配置单元格。\n   return cell;\n}\n```\n\n使用更新后的代码，你可以再次运行基准测试。正如你从表\
    \ 3–4 中看到的，结果好了很多。现在平均运行时间为 0.002，总体性能`fps`更接近 60。与之前使用`ReuseTableViewCell`相比，性能提升显著。\n\
    \n![图片](img/t0304.jpg)\n\n完美！现在`fps`速率几乎达到了 60，准备时间也相当合理。如果你的应用能达到这个水平，就无需再担心滚动性能了；它应该是流畅的。通常来说，对于一个包含多个子视图的普通、简单的`UITableViewCell`而言，这已经是良好的性能。这是一件好事，因为你从一开始就不需要做太多工作。然而，如果滚动性能仍然卡顿，你可能需要使用更好但也更复杂的方法来获得同样的性能。\n\
    \n正如第 1 章和第 2 章中已经提到的，你应该时刻注意避免过度优化。为了微小的性能提升而花费大量时间进行优化是不值得的。因此，此时，只有当你在滚动性能方面仍然遇到问题时，才应该继续进入第二个示例，即使用`UITableViewCell`进行绘制技术。\n\
    \n### 减少准备时间\n\n通常，我希望通过缓存图片来重用它们，并希望减少初始化过程。当操作系统需要为`TableView`渲染一个新单元格时，它会通过调用以下方法来请求一个新单元格：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath {\n        // 在此处初始化并返回单元格\n}\n```\n\n因此，如果你长时间阻塞这个方法，`UserInterface`渲染过程就会被阻塞；它无法做任何事情，也无法显示任何新内容。这就是用户会看到滚动永远停在某个地方的部分原因。\n\
    \n为了尽可能加快这一过程，你可以移除逻辑、延迟计算、以及缓存可以重用的数据和图片。另一种方法是首先使用默认图片和数据来重用单元格。你也可以使用多线程，这样当你获取到图片/数据后，后续再填入单元格。从用户的角度来看，这种方法可以实现更平滑的滚动和更快的图片加载。\n"
- fmt: '### `SecondExample`


    Drawing a custom cell can improve your application''s performance when you have
    many subviews or are using an old device. For iPhone 4 and above, there is a significant
    performance improvement, so you''ll see a big difference with the drawing custom
    cell technique.


    In this example, I will increase the complexity of the cells by adding up to 10
    subviews with images and text from a real application. Thus, you can see that
    in some real applications (like Facebook, the one we are trying to emulate), scrolling
    performance can be significantly affected by the complicated subviews structure.
    The app that I benchmark will have a user interface like the one you see in [Figure
    3–5](#Chapter03.html#fig_3_5).


    ![images](images/0305.jpg)


    **Figure 3–5.** *The second example application*


    Every cell inside the app will have an avatar, a username, and a post with image,
    title, and content. It also shows which application made the post at what time.
    The results for the benchmarks are in [Table 3–5](#Chapter03.html#tab_3_5).


    ![images](images/t0305.jpg)


    [Table 3–6](#Chapter03.html#tab_3_6) shows the benchmark results from running
    the code again with the custom drawing code.


    ![images](images/t0306.jpg)


    From [Tables 3–5](#Chapter03.html#tab_3_5) and [3–6](#Chapter03.html#tab_3_6),
    you can see that the use of custom drawing code increases rendering time quite
    markedly. At this point, with a complicated subview, this performance is good
    enough so you don''t need any more optimization.


    For the cell that is not optimized yet, it will be made up by a number of components
    and subviews. Look at [Figure 3–5](#Chapter03.html#fig_3_5) to make sure you understand
    the problem.


    ![images](images/0306.jpg)


    **Figure 3–6.** *The cell*


    The `TableViewCell` in [`Figure 3–6`](#Chapter03.html#fig_3_6) has four images
    and one subview in a different color. The subview is a general approach that developers
    use if you want to have a different background color or to manage a view component
    inside easier. This approach causes performance issue for table view scrolling,
    so you want to avoid it.


    Now, let''s go into the source code for the new approach, where I will draw the
    view myself and there will be no subview anymore. You will see what you need to
    do to implement this behavior, then I will sum up the advantages and disadvantages
    of the different techniques. The sample source code comes from the project `DrawingCellViewController`.
    Here is the main source code.


    For `UITableViewController`:


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath {

       static NSString *CellIdentifier = @"CellIdentifier";

       CustomDrawingTableViewCell *cell = (CustomDrawingTableViewCell *) [self.tableView
    dequeueReusableCellWithIdentifier:CellIdentifier];


       if (cell == nil) {

           cell = [[CustomDrawingTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault
    reuseIdentifier:CellIdentifier];

       }


       [cell updateMyCell];

       return cell;

    }

    ```


    So, as you can see, the main code in the `UITableViewController` does not change
    much. The only difference between this and the standard `UITableViewCell` is how
    you initialize your cell. For example,


    ```

    [[CustomDrawingTableViewCell alloc] initWithStyle:UITableViewCellStyleDefault
    reuseIdentifier:CellIdentifier];

    ```


    compared to


    ```

    [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault reuseIdentifier:CellIdentifier];

    ```


    Within the custom `UITableViewCell` (i.e. `CustomDrawingTableViewCell`):


    ```

    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier
    {


            if (self = [super initWithStyle:UITableViewCellStyleDefault reuseIdentifier:reuseIdentifier])
    {

                    CGRect subFrame = CGRectMake(0.0, 0.0,

    self.contentView.bounds.size.width, self.contentView.bounds.size.height);


                    drawingView = [[CustomDrawingView alloc] initWithFrame:subFrame];

                    drawingView.autoresizingMask = UIViewAutoresizingFlexibleWidth
    |

    UIViewAutoresizingFlexibleHeight;

                    [self.contentView addSubview:drawingView];

           }

           return self;

    }

    ```


    And now you get to the most important part: how to draw text, image and control
    into the view.


    `CustomDrawingView.m`:


    ```

    - (void)drawRect:(CGRect)rect {

       self.backgroundColor = [UIColor whiteColor];

       // Drawing code.

       [self.userName drawInRect:CGRectMake(70,0, 95, 21) withFont:userNameFont lineBreakMode:UILineBreakModeTailTruncation

                       alignment:UIBaselineAdjustmentAlignBaselines];


       // Drawing Image

       [self.avatarImage drawInRect:CGRectMake(20, 5, 36, 34)];


       // Drawing button

       [self.button drawInRect:CGRectMake(50, 5, 36, 34)];

    }

    ```


    In short, constructing a custom `UITableViewCell` in the `UITableViewController`
    is the same as before; you just need to dequeue it if it is nil, and then initialize
    a new object for it. Inside the initialize method, you have to add a subview into
    the cell content. For the subview, you need to override the `drawRect` method
    and then draw the text or image by method `drawInRect`.


    The reason why the drawing code will run much faster than loading from nib files
    or from creating and adding subview directly is the GPU (Graphic Processing Unit)
    will run the drawing code. The GPU is quite fast at rendering and displaying the
    UI; therefore, the drawing code is the fastest way to deal with complicated subviews.


    **NOTE:** One important thing to remember is to set the background color of `CustomDrawingView`
    to white. The default color is black.


    ### What Can You Learn from These Examples?


    From the two preceding examples, there are some basic lessons you should always
    remember.


    *   Use `ReuseIdentifier`. It will help speed up performance.

    *   Try to reduce the work inside the cell preparation process, especially the
    time and effort to load an image from file IO/network IO. This will display the
    image in the shortest amount of time.

    *   If the app has too many subviews and/or a complicated structure, consider
    drawing it by code. This will allow the GPU to speed up the process.


    **WARNING:** As you can see from the benchmark results, the fps result becomes
    much better and even closer to the perfect number of 60. However, by using this
    method, you don''t get the advantage of `InterfaceBuilder` to construct the UI.
    You always need to calculate the position and the size yourselves and put that
    information into `drawRect`. This will quickly cause a headache in terms of maintenance
    and feature bloat (adding more features into your application). So, be careful
    with `drawRect` and with over-optimization.


    ## Other Techniques


    I''ve discussed the important techniques to improve the performance for table
    view scrolling. There are other small techniques that you usually don''t need
    to use, but I include them here anyway. If you can understand the concept, you
    can apply the same technique to other cases.


    ### Caching the Height


    You need to cache the height of the rows because `TableView` requests this information
    whenever it needs to create a new cell. If your cell''s height is fixed, you don''t
    need to worry. However, if it''s not fixed, you need to make sure your cell calculation
    is fast enough.


    Try something like this:


    ```

    - (CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath
    *)indexPath {

       return 80;

    }

    ```


    And try to avoid something like this:


    ```

    - (CGFloat)tableView:(UITableView *)tableView heightForRowAtIndexPath:(NSIndexPath
    *)indexPath {

      for (int i = 0; i < 100; i++) {

        // find the smallest possible height for the row

      }


       return smallestHeight;

    }

    ```


    The OS will run the first code snippet a couple of times when it needs to render
    the cell or when it needs to edit/reorder the cell in the animation process. With
    a loop inside like this, the OS will need to run a loop that repeats 100 times
    whenever it needs to know the height of the cell.'
