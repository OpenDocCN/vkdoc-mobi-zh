- fmt: "# Displaying and Hiding Views in the User Interface\n\nThe process of displaying\
    \ and hiding views in UI has very little to do with memory. However, it is related\
    \ to the performance and the user's experience of the performance of an iOS app.\n\
    \nThere are four main methods in the view controller life cycle to represent the\
    \ four different states of a view when it is being displayed and being hidden.\n\
    \n- `viewWillAppear`: This method is called before your view is displayed. Only\
    \ after this method finishes is your view displayed. To create a good experience\
    \ of a fast application, all calculations here have to be really fast. Otherwise,\
    \ what the user perceives about your navigation and animation is really weak.\
    \ A good practice is to setup views' attributes (for example, background color\
    \ or text color).\n    - For example, a user presses a Back button to go back\
    \ to a view A. However, inside the method `viewDidAppear` of view A, there is\
    \ a calculation that takes time. The result takes a few seconds, but in the meantime\
    \ the UI thread is blocked to process the logic inside view A and can't display\
    \ view A.\n- `viewDidAppear`: This method is called right after your view is displayed,\
    \ so you can put logic processing here. However, if your process changes the view\
    \ quite a bit after it finishes, the user can get confused, which is not a positive\
    \ experience.\n    - For example, you have a sort algorithm to sort your table\
    \ view. When user gets sees view A, the old table is still displayed. And then\
    \ suddenly all rows change without any warning or an explanation as to why this\
    \ just happened.\n- `viewWillDisappear`: This is called right before the view\
    \ disappears from the UI. Anything belonging to the view that you want to show\
    \ to your users should be put here. Note that you should not put too much logic\
    \ processing code here. If you do put a lot of processing code here, it will take\
    \ too much time for a new view to be displayed.\n- `viewDidDisappear`: This is\
    \ called right after your view disappears. You can't show any view or any UI effects\
    \ to user.\n\nThere is no hard and fast rule as to where you should put your logic\
    \ processing. I give you all basic concepts and you can use them to create the\
    \ best user perception about your app's performance.\n\n## Object Copy\n\nSo why\
    \ do you need to know about object copying and why do you need to it? Copying\
    \ an object is useful if you don't want to change the old object because it could\
    \ affect other parts of the program. In some cases, you can't change the object\
    \ at all, so you copy the content of that object in order to modify it.\n\n###\
    \ Shallow vs. Deep Copy\n\n*Shallow copying* actually means the same as *retaining*\
    \ in objective-C. Because shallow copying means copying the pointer of the object\
    \ to a new variable, there is no difference between shallow copying and retaining.\n\
    \n*Deep copying*, on the other hand, means you actually create a new object, and\
    \ copy all data and instance variables from the old object into the new object.\n\
    \nTo illustrate the differences between shallow copy and deep copy in objective-C,\
    \ consider these code examples for each case:\n\nShallow copying:\n\n```\n- (void)setMyObj:(NSObject\
    \ *)newObj {\n  if (newObj != myObj) {\n    myObj = newObj;\n  }\n}\n```\n\nDeep\
    \ copying:\n\n```\n- (void)setMyObj:(NSObject *)newObj {\n  if (newObj != myObj)\
    \ {\n    myObj = [newObj copy];\n  }\n}\n```\n\nIn the first case, you assign\
    \ the variable to the new object and retain the object. In objective-C, this is\
    \ a shallow copy. In the deep copy case, the code actually copies the value and\
    \ instance variables inside the `newObj` into `myObj`.\n\n### Implementing a Deep\
    \ Copy\n\nIf you want to do a truly deep copy, you have to follow the whole hierarchy\
    \ of the object.\n\n- You need to create a new object.\n- You copy all instance\
    \ variables of the old object into the new object.\n- If the instance variable\
    \ is a primitive data type like `float`, `int`, or `double`, you just need to\
    \ copy that value. `Boolean` is not a primitive data type but you also only copy\
    \ the value of a `Boolean` instance variable.\n- For each instance variable that\
    \ is a pointer type, you will need to copy their instance variable as well.\n\
    - The process continues to the end.\n\nThis process can be long and hard to implement.\
    \ Some built-in objects and libraries don't support deep copying. Therefore, you\
    \ should always find a compromise between shallow and deep copying. For example,\
    \ you won't want to deep copy a delegate, which can cause a retain cycle, discuss\
    \ previously, where object A owns object B and object B also owns object A. Moreover,\
    \ you usually don't want to copy your delegate because at the end you want to\
    \ callback to that delegate, not the new delegate.\n\nThis is an example of a\
    \ mixed approach between shallow and deep copy:\n\n```\n@interface Item : NSObject\
    \ {\n   NSString *itemName;\n   CGFloat price;\n   id delegate;\n}\n\n@property\
    \ (nonatomic,  copy) NSString *itemName;\n@property (nonatomic, weak) CGFloat\
    \ price;\n@property (nonatomic, weak) id delegate;\n\n@end\n```\n\nIn this example,\
    \ you can see that there are three instance variables. The first one is `itemName`\
    \ (which is a pointer object), the second one is a primitive data, and the last\
    \ one is a delegate.\n\n![images](images/0708.jpg)\n\n**Figure 7–8.** *Deep copy\
    \ of an object*\n\nAs you can see in [Figure 7–8](#Chapter07.html#fig_7_8), the\
    \ delegate object will be kept the same and shared between the original item and\
    \ new item. The `itemName` object will be copied and have a new memory address\
    \ (0x9124 instead of 0x8028) but have the same value of “egg”. The primitive variables,\
    \ such as `price`, will be copied over and have no memory address.\n\n### Integrating\
    \ a Copy Method into an Object\n\nTo have a deep copy of an object, you will usually\
    \ have to override the method `copyWithZone:`. When an object is sent a `copy`\
    \ message, this method will be called. Here is some code for overriding this method.\
    \ You will need to create a new object by `alloc` and `init` and then use the\
    \ `set` method to set the value for instance variables.\n\n```\n- (id)copyWithZone:(NSZone\
    \ *)zone {\n   Item *copy = [[Item allocWithZone: zone] initWithName:self.itemName];\n\
    \   copy.price = self.price;\n   copy.delegate = self.delegate;\n   return copy;\n\
    }\n```\n\nAs stated previously, if there are other custom type instance variables\
    \ inside your `Item` class, you need to implement the copy for those as well.\
    \ In my example, for the sake of simplicity, the code doesn't create a new `itemName`\
    \ object.\n\n## Advanced Autorelease Pool\n\nYou learned several basic techniques\
    \ about memory in the previous sections of this chapter. This section will cover\
    \ more advanced techniques for using the autorelease pool and show you where you\
    \ should use it to have high performance in restricted cases.\n\nIn every thread,\
    \ you must have an autorelease pool to collect and store all autoreleased objects.\
    \ If you don't have an autorelease pool in every thread, all autoreleased objects\
    \ will be leaked and you will have a big memory leak. The autorelease pool is\
    \ organized inside stacks; this is explained in the following section."
