  trans: "\n### 二叉树如何工作？\n\n二叉树的插入/删除和搜索机制是相似的。所有方法都需要你遍历二叉树，直到找到要插入/删除的位置或要搜索的项目。图\
    \ 5–28 展示了一个将项目插入到二叉树正确位置的示例。\n\n![images](img/0528.jpg)\n\n**图 5–28.** *向二叉树中插入一个项目*\n\
    \n二叉树是基于链表的思路实现的。由于我已经讨论过如何实现链表，因此本节我将只编写二叉树的骨架和 API。代码清单 5–7 仅包含接口文件；你需要补充实现文件使其生效。\n\
    \n**代码清单 5–7.** *二叉搜索树*\n\n```\nTreeNode.h\n@interface TreeNode : NSObject {\n\
    \ @private\n   NSObject *object;\n   SEL compareSelector;\n   TreeNode *leftChild;\n\
    \   TreeNode *rightChild;\n}\n\n@property (nonatomic,strong) NSObject *object;\n\
    @property (nonatomic, strong) TreeNode *leftChild;\n@property (nonatomic, strong)\
    \ TreeNode *rightChild;\n@property (nonatomic, weak) SEL compareSelector;\n\n\
    @end\n\nTree.h\n#import \"TreeNode.h\"\n@interface Tree : NSObject {\n @private\n\
    \   TreeNode *root;\n}\n- (id)initWithObject:(NSObject *)obj compareSelector:(SEL)selector;\n\
    - (BOOL)find:(NSObject *)obj;\n- (void)insertObject:(NSObject *)newObj;\n- (void)deleteObject:(NSObject\
    \ *)obj;\n\n@end\n```\n\n要实现这段代码，你应该将二叉树理解为一种特殊的链表：你有一个`tree`对象，它持有一个`root`对象，然后`root`对象自身持有其子节点。这与链表的工作方式相同：你有一个`LinkedList`对象，它包含头节点，而该头节点本身又包含下一个节点。\n\
    \n你应该通过实现我提供的 API 来练习二叉树的运用。你还应该复习二分查找，确保你透彻理解了这个概念，并知道如何在此场景下应用它。如果你在任何一个地方卡住了，可以查看我的示例项目`BinarySearchTree`。\n\
    \n### 图\n\n图是一种数据结构，它看起来像树，但形式更为通用。当前，随着数据挖掘和数据可视化需求的日益增长，图形可视化问题对开发者来说越来越常见。在本节中，我将展示图数据结构的基本概念，以及解决图中最重要问题之一——搜索——的两种算法。我不会深入探讨源代码，因为你可能不会大量使用这种数据结构和具体的代码。然而，你确实需要理解图的概念，因为它可以用来解决许多重要的问题。\n\
    \n一些常见和流行的术语：\n\n*   **顶点和边**：顶点的概念与树中节点的概念相同，图中的边概念与树中的边概念完全一致。你可以回顾图 5–23 查看顶点和边的图示。“顶点”这个术语主要用于图的概念，而“节点”则更常用于树的概念。\n\
    *   **路径**：路径是可以穿过一系列节点的一系列边的序列。例如，在图 5–29 中，你可以看到同一对节点有两条路径：ACD 和 ABD。\n\n  \
    \  ![images](img/0529.jpg)\n\n    **图 5–29.** *路径*\n\n*   **连通图**：从图中任意挑选一对顶点，它们之间都存在一条路径。例如，图\
    \ 5–30 展示了一个连通图，如果你任意选择两个顶点，你都可以通过某条路径从一个到达另一个。然而，在图 5–31 中，你无法通过任何路径从 A 到达 C，所以它不是连通图。\n\
    \n    ![images](img/0530.jpg)\n\n    **图 5–30.** *连通图*\n\n    ![images](img/0531.jpg)\n\
    \n    **图 5–31.** *非连通图*\n\n*   **有向图**：如果图中的每条边都有一个方向，如图 5–32 中所示，用从一个顶点指向另一个顶点的箭头表示，那么这个图就是有向图。如果边没有方向，你可以沿着它们双向通行。但如果边有方向，你只能沿着箭头所示的方向走。\n\
    \n    ![images](img/0532.jpg)\n\n    **图 5–32.** *有向图*\n\n*   **加权图**：如果图中的每条边都被赋予一个权重，如图\
    \ 5–33 中带有标签的边所示，该边可以表示从一个顶点到另一个顶点的任何成本或通行价值。这样的图被称为加权图。加权图可以用来表示国内城市间的航班，边显示的是飞行成本。\n\
    \n    ![images](img/0533.jpg)\n\n    **图 5–33.** *加权图*\n\n在图中进行搜索非常重要。计算机科学中的图论里有许多著名的搜索问题。想象一个简单的场景：你想从纽约旅行到加利福尼亚。你可以直接乘飞机，但可能花费很高；或者你可以乘火车途经多个城市，最终到达目的地，但总费用比直飞便宜得多。\n\
    \n这是另一个搜索问题。你想从当前所在城市出发，沿着图中的边移动，访问所有城市。常见的好处是获取每个城市的信息，并一览所有城市的面貌。有两种实现方法：深度优先搜索和广度优先搜索。\n"
- fmt: '### Depth-First Search


    As in [Figure 5–34](#Chapter05.html#fig_5_34), you travel along the graph as shown
    by the arrow and when you reach the last node, you travel back by the dashed-line
    arrow.


    ![images](images/0534.jpg)


    **Figure 5–34.** *Depth-first search traverse orders*


    One of the common implementation of this depth-first search algorithm is using
    a stack and following these four steps:


    1.  Pick one vertex in the graph and push it into the stack as the initial vertex;
    also mark it as visited. You can track visited vertices by setting a property
    `wasVisited` as `YES`, as shown in [Listing 5–7](#Chapter05.html#list_5_7).

    2.  If possible, from the last vertex of the stack, visit any adjacent unvisited
    vertex, mark it as visited, and push it on the stack.

    3.  If you can''t follow step 2, then if possible, pop a vertex off the stack,
    and then repeat step 2.

    4.  If you can''t follow step 1 and step 2, you''re done.


    To make it easier to understand, follow [Table 5–6](#Chapter05.html#tab_5_6) to
    see how the four rules are applied to [Figure 5–34](#Chapter05.html#fig_5_34).


    ![images](images/t0506.jpg)


    ![images](images/t0506a.jpg)


    [Listing 5–8](#Chapter05.html#list_5_8) contains the code explanation.


    **Listing 5–8.** *Depth-First Search*


    ```

    @interface Vertex : NSObject {

     @private

       NSString *label;

       BOOL wasVisited;

       NSMutableSet *adjacentVertices;

    }

    @property (nonatomic, copy) NSString *label;

    @property (nonatomic, weak) BOOL wasVisited;

    @property (nonatomic, strong) NSMutableSet *adjacentVertices;

    ```


    The vertex object will have a `label`, a mark for visited or not, and a list of
    vertices around it.


    ```

    @interface Graph : NSObject {

     @private

       NSMutableArray *vertices;

    }

    @property (nonatomic, strong) NSMutableArray *vertices;

    - (void)addVertex:(Vertex *)vertex;

    - (void)addEdgeForVertex:(Vertex *)vertex1 andVertex:(Vertex *)vertex2;

    - (void)depthFirstSearch;

    @end

    ```


    The graph has a list of vertices. Because every vertex keeps a list of adjacent
    vertices, graph doesn''t need to take care of the edges.


    ```

    - (void)depthFirstSearch {

       if ([self.vertices count] == 0) {

           NSLog(@"There is no vertex in graph");

           return;

       }


       Vertex *firstVertex = [self.vertices objectAtIndex:0];

       firstVertex.wasVisited = YES;

       [self display:firstVertex];


       Stack *stack = [[Stack alloc] init];

       [stack push:firstVertex];

       while (![stack isEmpty]) {

           Vertex *lastVertex = [stack peek];


           BOOL isAddNewVertex = NO;


           for (Vertex *adjacentVertex in lastVertex.adjacentVertices) {

               if (!adjacentVertex.wasVisited) {

                   [stack push:adjacentVertex];

                   adjacentVertex.wasVisited = YES;

                   isAddNewVertex = YES;

                   [self display:adjacentVertex];


                   break;

               }

           }


           if (!isAddNewVertex) {

               [stack pop];

           }

       }

    }

    ```


    The main code for the depth-first search algorithm is in [Listing 5–8](#Chapter05.html#list_5_8).
    First, I checked to make sure that there are some vertices inside the graph, and
    then I pushed the first vertex into the stack. The loop code will continue the
    rules explained previously until it gets out the last vertex and checks all the
    adjacent nodes. If there is a node that is not visited, it pushes the nodes into
    the stack, marks that node, and prints that node out. If it can''t find any adjacent
    vertex, then it is popped out of the stack.


    ### Breadth-First Search


    As in [Figure 5–35](#Chapter05.html#fig_5_35), you travel along the graph as shown
    by the arrow. You travel by reaching the first layer and then the second layer
    and finally the last layer. It is different than the order you traveled with the
    depth-first search.


    ![images](images/0535.jpg)


    **Figure 5–35.** *Breadth-first search traverse orders*


    1.  One of common implementation for this breadth-first search algorithm is using
    queue and following these four steps, which are also explained in [Table 5–7](#Chapter05.html#tab_5_7):

    2.  Pick one vertex in the graph as the current vertex; mark it as visited.

    3.  If possible, from the current vertex, visit any adjacent unvisited vertex,
    mark it as visited, and insert it into the queue.

    4.  If you can''t follow step 2, then if possible, remove a vertex from the queue,
    make it the current vertex, and then repeat step 2.

    5.  If you can''t follow step1 and step 2, you''re done.


    ![images](images/t0507.jpg)


    ![images](images/t0507a.jpg)


    For code, you should implement the breadth-first search algorithm yourself as
    an exercise.


    ### Other Algorithms and Problem-Solving Approaches


    I have introduced the most important data structures and their related algorithms;
    these will help speed up your code significantly. However, for an iPhone developer,
    there are a few more algorithms and problem-solving approaches you should know.
    You may already know about how to solve a problem with recursion. The second one
    is `SAX`/`DOM` parser for `XML` parsing. `XML` is heavily used in iPhone development
    when you need to download and get data from the network.'
  raw: '##### Depth-First Search


    As in [Figure 5–34](#Chapter05.html#fig_5_34), you travel along the graph as shown
    by the arrow and when you reach the last node, you travel back by the dashed-line
    arrow.


    ![images](images/0534.jpg)


    **Figure 5–34.** *Depth-first search traverse orders*


    One of the common implementation of this depth-first search algorithm is using
    a stack and following these four steps:


    1.  Pick one vertex in the graph and push it into the stack as the initial vertex;
    also mark it as visited. You can track visited vertices by setting a property
    was Visited as YES, as shown in [Listing 5–7](#Chapter05.html#list_5_7).

    2.  If possible, from the last vertex of the stack, visit any adjacent unvisited
    vertex, mark it as visited, and push it on the stack.

    3.  If you can''t follow step 2, then if possible, pop a vertex off the stack,
    and then repeat step 2.

    4.  If you can''t follow step 1 and step 2, you''re done.


    To make it easier to understand, follow [Table 5–6](#Chapter05.html#tab_5_6) to
    see how the four rules are applied to [Figure 5–34](#Chapter05.html#fig_5_34).


    ![images](images/t0506.jpg)


    ![images](images/t0506a.jpg)


    [Listing 5–8](#Chapter05.html#list_5_8) contains the code explanation.


    **Listing 5–8.** *Depth-First Search*


    `@interface Vertex : NSObject {`

    ` @private`

    `   NSString *label;`

    `   BOOL wasVisited;`

    `   NSMutableSet *adjacentVertices;`

    `}`

    `@property (nonatomic,  copy) NSString *label;`

    `@property (nonatomic, weak) BOOL wasVisited;`

    `@property (nonatomic, strong) NSMutableSet *adjacentVertices;`


    The vertex object will have a label, a mark for visited or not, and a list of
    vertices around it.


    `@interface Graph : NSObject {`

    ` @private`

    `   NSMutableArray *vertices;`

    `}`

    `@property (nonatomic, strong) NSMutableArray *vertices;`

    `- (void)addVertex:(Vertex *)vertex;`

    `- (void)addEdgeForVertex:(Vertex *)vertex1 andVertex:(Vertex *)vertex2;`

    `- (void)depthFirstSearch;`

    `@end`


    The graph has a list of vertices. Because every vertex keeps a list of adjacent
    vertices, graph doesn''t need to take care of the edges.


    `- (void)depthFirstSearch {`

    `   if ([self.vertices count] == 0) {`

    `       NSLog(@"There is no vertex in graph");`

    `       return;`

    `   }`


    `   Vertex *firstVertex = [self.vertices objectAtIndex:0];`

    `   firstVertex.wasVisited = YES;`

    `   [self display:firstVertex];`


    `   Stack *stack = [[Stack alloc] init];`

    `   [stack push:firstVertex];`

    `   while (![stack isEmpty]) {`

    `       Vertex *lastVertex = [stack peek];`


    `       BOOL isAddNewVertex = NO;`


    `       for (Vertex *adjacentVertex in lastVertex.adjacentVertices) {`

    `           if (!adjacentVertex.wasVisited) {`

    `               [stack push:adjacentVertex];`

    `               adjacentVertex.wasVisited = YES;`

    `               isAddNewVertex = YES;`

    `               [self display:adjacentVertex];`


    `               break;`

    `           }`

    `       }`


    `       if (!isAddNewVertex) {`

    `           [stack pop];`

    `       }`

    `   }`

    `}`


    The main code for the depth-first search algorithm is in [Listing 5–8](#Chapter05.html#list_5_8).
    First, I checked to make sure that there are some vertices inside the graph, and
    then I pushed the first vertex into the stack. The loop code will continue the
    rules explained previously until it gets out the last vertex and checks all the
    adjacent nodes. If there is a node that is not visited, it pushes the nodes into
    the stack, marks that node, and prints that node out. If it can''t find any adjacent
    vertex, then it is popped out of the stack.


    ##### Breadth-First Search


    As in [Figure 5–35](#Chapter05.html#fig_5_35), you travel along the graph as shown
    by the arrow. You travel by reaching the first layer and then the second layer
    and finally the last layer.  It is different than the order you traveled with
    the depth-first search.


    ![images](images/0535.jpg)


    **Figure 5–35.** *Breadth-first search traverse orders*


    1.  One of common implementation for this breadth-first search algorithm is using
    queue and following these four steps, which are also explained in [Table 5–7](#Chapter05.html#tab_5_7):

    2.  Pick one vertex in the graph as the current vertex; mark it as visited.

    3.  If possible, from the current vertex, visit any adjacent unvisited vertex,
    mark it as visited, and insert it into the queue.

    4.  If you can''t follow step 2, then if possible, remove a vertex from the queue,
    make it the current vertex, and then repeat step 2.

    5.  If you can''t follow step1 and step 2, you''re done.


    ![images](images/t0507.jpg)


    ![images](images/t0507a.jpg)


    For code, you should implement the breadth-first search algorithm yourself as
    an exercise.


    ### Other Algorithms and Problem-Solving Approaches


    I have introduced the most important data structures and their related algorithms;
    these will help speed up your code significantly. However, for an iPhone developer,
