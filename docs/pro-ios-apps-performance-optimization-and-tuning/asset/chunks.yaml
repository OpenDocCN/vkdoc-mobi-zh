  trans: "\n#### 如何衡量 Big-O\n\n要确定一个算法的 Big-O，你需要观察输入规模如何影响算法的执行时间。另一种方法是通过逻辑推理来思考算法的执行过程。代码清单\
    \ 5–3 将帮助你理解这个概念。\n\n**代码清单 5–3.** *如何衡量 Big-O*\n\n```objectivec\n   int myFirstCount\
    \ = 0;\n   int mySecondCount = 0;\n   // 外层循环\n   for (int i = 0; i < [myFirstArray\
    \ count]; i++) {\n        // 内层循环\n       for (int i = 0; i < [mySecondArray count];\
    \ i++) {\n           myFirstCount++;\n           mySecondCount++;\n       }\n\
    \       NSLog(@\"my first Count: %d\", myFirstCount++);\n       NSLog(@\"my second\
    \ Count: %d\", mySecondCount++);\n   }\n```\n\n为了便于说明，代码清单 5–3 包含了两个变量 `myFirstCount`\
    \ 和 `mySecondCount` 的重复代码，它们执行的操作完全相同。我稍后会进一步解释。\n\n那么，逐行查看代码，你会发现两个主要的计算逻辑是 `myFirstCount++;`\
    \ 和 `mySecondCount++;`。还有一些其他的计算逻辑，比如 `NSLog(@\"my first Count: %d\", myFirstCount);`\
    \ 和 `NSLog(@\"my second Count: %d\", mySecondCount);`。\n\n在这部分，`m` 和 `n` 分别代表\
    \ `myFirstArray` 和 `mySecondArray` 中的元素数量。从程序逻辑来看，在外层循环结束后，`myFirstCount` 和 `mySecondCount`\
    \ 的值都为 (m * n + m)。它们的总和则为 2 * m * n + 2 * m。\n\n下面的解释将详细说明为什么总结果是 2 * m * n +\
    \ 2 * m。这将帮助你无需使用实际计数代码就能自行进行性能分析。\n\n外层循环（遍历 `myFirstArray` 的循环）执行了 `m` 次。因为外层循环执行了\
    \ `m` 次，所以外层循环内部的每个计算逻辑也都会执行 `m` 次。因此，外层循环的计算次数是 `m * (外层循环内部的计算次数)`。\n\n为了计算外层循环内部的计算次数，我需要考虑内层循环和两个\
    \ `NSLog` 行。对于外层循环的每一次迭代，内层循环和两个 `NSLog` 行都会运行一次。所以，外层循环的计算次数是 `m * (内层循环的计算次数\
    \ + 2)`。 ( * )\n\n然后，我令 `n` 为 `mySecondArray` 中的元素数量。与之前的情况类似，内层循环执行了 `n` 次，并且内层循环内部的每个计算逻辑也都运行了\
    \ `n` 次。内层循环内部只有两个计算逻辑：`myFirstCount++` 和 `mySecondCount++`。因此，内层循环内部的计算逻辑次数是\
    \ `2 * n`。将这个结果代入 ( * ) 式，你得到 `m * (2 * n + 2) = 2 * m * n + 2 * m`。\n\n因此，总的计算次数是\
    \ `2 * m * n + 2 * m`。\n\n为了简化计算，我令 `m = n`。通过用 `n` 替换 `m`，可以重写为 `2 * n * n +\
    \ 2 * n`。它进一步简化为 `2n² + 2n`。下一步是保留公式中最高阶的项（或增长最快的项），因此只剩下 `2n²`。最后一步是移除公式中的所有常数，因此只剩下\
    \ `n²`，你可以用理论格式将其写作 `O(n²)`。\n\n**注意：** 你现在可以看到为什么我在代码清单 5–3 中放入了重复代码；它证明了最终结果并不严重依赖于任何常数。使用\
    \ `n²` 还是 `2n²` 没有任何区别。\n\n每种操作都有其自身的增长率。以下是操作增长率的一个示例：`log(n)`，`n`，`n²`。\n\n\
    当 `n = 1` 时，有 `log(1) = 0`，`n = 1`，并且 `n² = 1`。\n\n当 `n = 10` 时，有 `log(10) = 1`，`n\
    \ = 10`，并且 `n² = 100`。你可以看到，当 `n` 增加 9 个单位时，`log(n)` 仅增加 1 个单位，`n` 增加 9 个单位，而\
    \ `n²` 增加了 99 个单位。\n\n当 `n = 100` 时，有 `log(100) = 2`，`n = 100`，并且 `n² = 10,000`。你可以看到，当\
    \ `n` 增加 9 个单位时，`log(n)` 仅增加 1 个单位，`n` 增加 9 个单位，而 `n²` 增加了 99 个单位。\n\n因此，在增加相同单位数量的情况下，不同操作的增长率不同。图\
    \ 5–1 显示了当你增加 `n` 时，每种操作（`log(n)`，`n`，`n²`，和 `n³`）的增长速度。\n\n![images](img/0501.jpg)\n\
    \n**图 5–1.** *当输入（变量 n）增加时，各 Big-O 记法的结果*\n\n#### 实现细节\n\nBig-O 记法不涉及任何实现细节；它既不能告诉你实现一个算法需要多少内存，也不能说明在你的系统中实现该算法有多困难。它也不会告诉你哪些算法可能在输入规模小但重复次数多的情况下表现更好。例如，在小规模情况下，插入排序会比快速排序快；当重复\
    \ 100 次时，插入排序的整体性能将胜过快速排序。因此，Big-O 记法为你提供了对算法的一般性理解，你可以用它来快速比较不同的算法和方法。\n\n**注意：**\
    \ 在这个记法体系中，还有其他用于描述平均情况和最好情况性能的记法。这些记法表明，在考虑具体情况时，每个算法的表现如何。\n\n#### 著名算法的 Big-O\n\
    \n为了让你更好地理解 Big-O，表 5–2 列出了著名的算法及其对应的 Big-O 记法，以便你了解这些算法在理论上的表现。\n\n![images](img/t0502.jpg)\n\
    \n你可能会对理解 Big-O 记法的顺序感到困惑。顺序是这样的：`O(log(n)) < O(n) < O(n * log(n)) < O(n²)`。\n\
    \n如果你看一下表 5–2，这意味着：\n\n*   冒泡排序比归并排序和快速排序慢。\n*   线性搜索比二分搜索慢。\n\n因此，由于归并排序和快速排序运行速度比冒泡排序快，在大多数情况下你应该优先选择这些排序算法而不是冒泡排序。\n\
    \n### 实际测量\n\n在实际使用中，你需要将一些关于 Big-O 的理论与第 2 章中介绍的检测工具和分析工具结合起来。以下是用于衡量算法和数据结构性能的重要工具的快速回顾：CPU\
    \ 采样器和时间分析器。\n\n![images](img/0502.jpg)\n\n**图 5–2.** *在程序上运行 CPU 采样器的结果*\n\n\
    ![images](img/0503.jpg)\n\n**图 5–3.** *程序内部每个方法和函数的详细结果*\n\n图 5–2 展示了 CPU 采样器的使用情况，显示了程序运行时的系统负载、用户负载和总负载。图\
    \ 5–3 提供了程序内部每个方法的更多细节，例如每个方法被调用的频率以及完成一个方法所需的时间。\n\n![images](img/0504.jpg)\n\
    \n**图 5–4.** *时间分析器工具*\n\n![images](img/0505.jpg)\n\n**图 5–5.** *时间分析器的详细结果*\n\
    \n时间分析器（图 5–4）更侧重于程序的运行时间。图 5–5 显示了从时间角度出发的详细结果。\n\n你应该使用检测工具来确定哪些方法实际需要优化。所有方法都可能运行缓慢或需要优化，但你应该只关注那些在程序生命周期中频繁运行的方法。你只有有限的时间和资源来优化该方法的算法和数据结构。\n"
- fmt: "### Data Structure and Algorithms\n\nCocoa Touch framework of iOS environment\
    \ gives you three main data structures for most usages: `NSSet`, `NSArray`, and\
    \ `NSDictionary`. Each of them has benefits and best usage scenarios. I will discuss\
    \ each of these main data structures for iPhone, then I will walk you through\
    \ some other important data structures via code and samples so you can build your\
    \ own in case you need a better performance data structure: linked list, binary\
    \ tree, stack, queue, and graph.\n\nWhen discussing data structures, you can't\
    \ separate the algorithms used inside the data structure out to a separate part.\
    \ For example, there is no use in talking about `NSDictionary` and hash table\
    \ without knowing what a hash function does. Similarly, it's hard to understand\
    \ about a balanced binary tree without understanding binary search. Therefore,\
    \ I will discuss them in parallel; I will talk about data structures and what\
    \ algorithms they use to speed up their performance. In the last sections, I talk\
    \ separately about common algorithms shared between data structures.\n\n### Cocoa\
    \ Touch Data Structures\n\nActually, you will have `NSMutableArray` and `NSArray`,\
    \ `NSMutableSet` and `NSSet`, `NSMutableDictionary` and `NSDictionary`. The difference\
    \ between the `NSMutable` kind of classes and `NS` kind of classes is that you\
    \ can change the content of `NSMutable` classes but you can't change the content\
    \ of `NS` classes. The advantage of the latter is to protect the data and make\
    \ sure that any code that can touch the data can't change its content. Because\
    \ you can't modify `NSArray`, I will use cases of `NSMutableArray` in my examples.\n\
    \nWhen discussing data structures, I will talk about their performance in terms\
    \ of these main issues: insert, delete, search, access, and sort. I use the Big-O\
    \ notation to give you the idea of how fast each data structure performs under\
    \ each insertion, deletion, search, or sort.\n\n#### NSMutableArray\n\nAn array\
    \ is the simplest form of data structure. So, understanding how an array works\
    \ when you retrieve, insert, update, or delete data from it will help you improve\
    \ your app's performance.\n\n![images](images/0506.jpg)\n\n**Figure 5–6.** *Array\
    \ illustration*\n\nAn array is a collection of individual items put into a block,\
    \ like in [Figure 5–6](#Chapter05.html#fig_5_6), where each block is numbered\
    \ from 0 to the length of the array. `NSArray` stores data in an order and so\
    \ won't let you insert data just anywhere. `NSArray` also allows you to store\
    \ duplicate data in the array.\n\nInsert/Delete:\n\n*   If you insert/delete into\
    \ the end of the array, it's quite fast: `O(1)`.\n*   If you insert into the middle\
    \ or the beginning of the array, all data has to be shifted to the right, as in\
    \ [Figure 5–7](#Chapter05.html#fig_5_7): `O(n)`.\n\n    ![images](images/0507.jpg)\n\
    \n    **Figure 5–7.** *Inserting an item into the second position of the array*\n\
    \nSearch:\n\n*   Every time you search for an element, you need to loop over the\
    \ whole array: `O(n)`. The process is shown in [Figure 5–8](#Chapter05.html#fig_5_8).\
    \ A similar problem with searching inside an array is determining if that array\
    \ contains a particular element.\n\n    ![images](images/0508.jpg)\n\n    **Figure\
    \ 5–8.** *Searching for a specific item inside the array*\n\nAccess:\n\n*   You\
    \ can access to any index inside the array really quickly: `O(1)`.\n\nSort:\n\n\
    *   Generally, sorting in an array is implemented by merge sort or quick sort.\
    \ The sort performance for `NSMutableArray` sort should be `O(n * log(n))`.\n\n\
    [Table 5–3](#Chapter05.html#tab_5_3) covers common methods and APIs for `NSMutableArray`.\n\
    \n![images](images/t0503.jpg)\n\n#### Hashing\n\nHashing is an important technique\
    \ in computer science and software engineering. It's used to improve the performance\
    \ of storage collections. In iPhone apps, hashing is implemented inside `NSSet`\
    \ and `NSDictionary`. To fully understand why `NSSet` and `NSDictionary` run so\
    \ fast when searching for items, you need to understand hashing first.\n\nThe\
    \ general task of a hashing function is to make sure that it creates a unique\
    \ hash value for each distinct item. And the same item should always return the\
    \ same hash value.\n\nFor example, `@\"khang\"` and `@\"vo\"` (my names) are two\
    \ different strings; therefore, the hash functions should try to create a different\
    \ value for each string. A real hashing algorithm is complicated and requires\
    \ lots of optimization, so I will use an easy hash calculation as an example.\
    \ With a string, I can use the integer value of each character in the alphabet\
    \ table and the position of the character to compute the hash value of the string\
    \ ([Figure 5–9](#Chapter05.html#fig_5_9)).\n\n![images](images/0509.jpg)\n\n**Figure\
    \ 5–9.** *Positions of all characters inside the string*\n\n```\n=> @\"khang\"\
    \ = 11 * 10 ^ 4 + 8 * 10 ^ 3 + 0 * 10 ^ 2 + 14 * 10 ^ 1 + 7 = 110,000 + 8,000\
    \ +\n0 + 140 + 7 = 118147\n```\n\nDo a similar job for \"vo\" and you will get\
    \ the hash value of `22 * 10^1 + 15 = 235`.\n\nUsing this hash function, you can\
    \ see that you created two unique hash values of two distinct items. The purpose\
    \ of the hash function is to generate a unique value for a specific piece of data.\
    \ Later, I will examine the benefits of having this unique representation of data.\n\
    \n#### isEqual and Hash Methods in Objective-C\n\nIn Objective-C, as in other\
    \ object-oriented programming languages, every object has two important methods:\
    \ `isEqual:` and `hash`. Hash was just discussed so you should have a clear picture\
    \ of what the `hash` function does. I will discuss how you should implement/override\
    \ the `hash` method in Objective-C after discussing the `isEqual` method.\n\n\
    ##### isEqual\n\nIn most object-oriented programming languages, when people talk\
    \ about the equality of two objects, they mean one of two things: the exact object\
    \ in memory, and semantic equality (equality of meaning). By default for a single\
    \ object, these two things are the same. The first equality is talking about if\
    \ variables hold the same object in the memory, checked by `obj1 == obj2`. However,\
    \ for the latter, the equality of two objects is checked by the method `[object1\
    \ isEqual:object2]`; so if the method returns `YES`, then the two objects are\
    \ equal, which is different than checking the memory reference.\n\nTo make it\
    \ clear, here is a class `MyItem` that overrides the `isEqual:` method, as follows:\n\
    \n```\nMyItem.h\n@interface MyItem : NSObject {\n @private\n   NSString *identifier;\n\
    }\n\n@property (nonatomic, copy) NSString *identifier;\n\n- (id)initWithIdentifier:(NSString\
    \ *)anIdentifier;\n\n@end\n\nMyItem.m\n@implementation MyItem\n@synthesize identifier;\n\
    \n- (id)initWithIdentifier:(NSString *)anIdentifier {\n   if (self = [super init])\
    \ {\n       self.identifier = anIdentifier;\n   }\n   return self;\n}\n\n- (BOOL)isEqual:(id)object\
    \ {\n\n   // By default, if two variables point to the same object in memory,\
    \ it should always be\n   //  equal\n   if (object == self) {\n      return YES;\n\
    \   }\n\n   if (![object isKindOfClass:[MyItem class]]) {\n       return NO;\n\
    \   }\n\n   MyItem *myItem = (MyItem *)object;\n   return [myItem.identifier isEqual:self.identifier];\n\
    }\n\n- (NSUInteger)hash {\n   return [self.identifier hash];\n}\n\n@end\n```\n\
    \nFor this class, you can easily create a mock object that is equal to a specific\
    \ object by giving them the same identifier. For example, if the first object\
    \ is created by `MyItem *item1 = [[MyItem alloc] initWithIdentifier:@\"1\"];`\
    \ and another object is created by `MyItem *item2 = [[MyItem alloc] initWithIdentifier:@\"\
    1\"];` then\n\n```\n[item1 isEqual:item2] returns YES while item1 == item2 returns\
    \ NO;\n```"
