- fmt: "### When Should You Check and Delete Cache?\n\nIn general, I can’t provide\
    \ any techniques or offer any advice on when you should check the cache. This\
    \ decision depends on the environment in which you are working; in other words,\
    \ an iOS environment is different than a web environment. In a web server, you\
    \ can run a check method in a loop to see if any cache is outdated and delete\
    \ it. In an iOS environment, this is time- and CPU-consuming.\n\nWhen you should\
    \ check cache contents and delete them depends much on the selected algorithm\
    \ that you use to cache them. For example, if you mainly use FIFO, LRU, or LFU,\
    \ you may need to wait until a new request comes in. Or you can check if the cache\
    \ is full; if it’s full, you can delete the old cache based on your algorithm.\
    \ This approach is usually used for memory caching where you need more precise\
    \ algorithm and have a strict storage constraint.\n\nFor file caching, you will\
    \ usually choose a simple time-based algorithm. File caching does not have a strict\
    \ limited storage capacity like memory does. With a simple time-based algorithm,\
    \ you don’t need to worry too much about every single file because you may delete\
    \ a set of files at the same time.\n\nIf you expect that you won’t need much time\
    \ to do calculations or when retrieving file information to check for the attributes\
    \ of the cache, you may not need to worry about when you check and delete them\
    \ at all. Again, here is an important lesson: don’t over-optimize. If you think\
    \ your approach can cause a bottleneck, you can try to benchmark it. If the current\
    \ approach runs well, it doesn’t matter if your app checks and deletes cache right\
    \ at the beginning, at the end, or the first time the app requests and stores\
    \ some new cache.\n\nHere are some main approaches:\n\n- **When the app starts**:\
    \ It may slow down the start process a little bit, but if you use multithreading\
    \ it won’t be any problem.\n- **When the app closes**: Be careful if you use multithreading—the\
    \ app may end before you finish the checking and deleting cache process. If you\
    \ don’t use multithreading, the time for the app to close takes longer.\n- **When\
    \ you store a new piece of cache**: It may be slow the first time you request\
    \ that piece of cache, but it will be faster on subsequent tries. I recommend\
    \ not using multithreading in this case because you may delete a file that another\
    \ thread is reading.\n\n### Memory Caching\n\nHere are some specific details about\
    \ how to do memory caching and the specific problems you may encounter when you\
    \ do memory caching in iOS environment.\n\nBecause there is a strict storage constraint\
    \ in memory, you can’t and shouldn’t cache too many images here. If you do, the\
    \ iOS run-time environment will keep giving you memory warnings until your app\
    \ is forced to close.\n\nSome people are scared of storing in memory because of\
    \ the limited memory environment. Not to worry: you do have memory to use; you\
    \ just need to learn how to utilize and maximize your memory capability to improve\
    \ your performance. If you’re concerned, don’t forget to double check if you are\
    \ using too little or too much memory via the instruments you learned about in\
    \ [Chapter 2](#Chapter02.html#ch2), as shown in [Figure 4–13](#Chapter04.html#fig_4_13).\n\
    \n![images](images/0413.jpg)\n\n**Figure 4–13.** *Memory allocations and usage*\n\
    \nIf you see that you are using too little memory compared to the capability of\
    \ the memory environment, don’t hesitate to use more. The more you can cache data\
    \ and images in memory, the better performance your app will get. However, if\
    \ you are using too much memory, be aware that your app may get memory warning\
    \ or to be forced to close.\n\n### Global Access vs. Strict Access\n\nFor memory\
    \ caching, you may need to think about whether you want this caching to be available\
    \ to any class and methods within your application or only strictly to some classes\
    \ and methods. If this is global access, anybody can change the cache whenever\
    \ they want. However, if you keep the caching data so private and hard to access,\
    \ the cache becomes useless because some classes or methods may need the data\
    \ and will just request it from the server again. The actual software engineering\
    \ term is *data encapsulation*, which means you should protect your data and only\
    \ share it with the classes/methods that need it.\n\n**Global Access**:\n\nYou\
    \ may need to use static to define global object.\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface MyObject {\n}\n\nstatic NSMutableDictionary *imagesCaching;\n\n@end\n\
    ```\n\n**Strict Access**:\n\n```\n#import <UIKit/UIKit.h>\n\n@interface RootViewController\
    \ : UITableViewController {\n @private\n   NSMutableDictionary *imageCaches; }\
    \ - (void)cacheImage:(UIImage *)image withName:(NSString *)uniqueURL;\n- (void)getCacheImageWithName:(NSString\
    \ *)uniqueURL;\n@end\n\n#import \"RootViewController.h\"\n@implementation RootViewController\n\
    - (void)cacheImage:(UIImage *)image withName:(NSString *)uniqueURL {\n   // main\
    \ code goes here\n}\n- (void)getCacheImageWithName:(NSString *)uniqueURL {\n \
    \  // main code goes here\n}\n@end\n```\n\n### Preload vs. Just In Time\n\nPreloading\
    \ is when you load the image before you actually need it. The good thing about\
    \ this is that it saves time when you actually need to display the file/image.\
    \ The difficult part is that you may need to guess if you need to preload the\
    \ images. Here’s a simple case where you may need to preload images for faster\
    \ performance ([Figure 4–14](#Chapter04.html#fig_4_14)).\n\n![images](images/0414.jpg)\n\
    \n**Figure 4–14.** *Preloaded image for paging view*\n\nAs [Figure 4–14](#Chapter04.html#fig_4_14)\
    \ shows, for a view like PageView where user wants to have a smooth scrolling\
    \ experience, preloading images into cache is the best way to keep the scrolling\
    \ smooth. Otherwise, the user either has to wait after scrolling to the view (for\
    \ multithreading or loading the image after stopping in the view) or they have\
    \ a stuck scrolling experience.\n\nAnother way to load the images into cache is\
    \ called just in time. This saves the actual bandwidth or CPU-loading process\
    \ until you are sure that you really need that data/images. The bad part about\
    \ this is that it may slow down and keep your users waiting for the data. This\
    \ approach is good if you need really big data/images that will consume a lot\
    \ of memory and your users are willing to wait for a couple of seconds.\n\n![images](images/0415.jpg)\n\
    \n**Figure 4–15.** *Big image view*\n\n[Figure 4–15](#Chapter04.html#fig_4_15)\
    \ is an example where the user knows that he may need to wait for a couple of\
    \ seconds in order to get the big image view. If you load from file to memory\
    \ to display, the loading time will be quite fast; therefore you may not need\
    \ to worry about preloading the images into memory. Another problem is if the\
    \ image is big, preloading it into memory will cost your app a huge amount of\
    \ memory."
  raw: '##### When Should You Check and Delete Cache?


    In general, I can''t provide any techniques or offer any advice on when you should
    check the cache. This decision depends on the environment in which you are working;
    in other words, an iOS environment is different than a web environment. In a web
    server, you can run a check method in a loop to see if any cache is outdated and
    delete it. In an iOS environment, this is time- and CPU-consuming.


    When you should check cache contents and delete them depends much on the selected
    algorithm that you use to cache them. For example, if you mainly use FIFO, LRU,
    or LFU, you may need to wait until a new request comes in. Or you can check if
    the cache is full; if it''s full, you can delete the old cache based on your algorithm.
    This approach is usually used for memory caching where you need more precise algorithm
    and have a strict storage constraint.


    For file caching, you will usually choose a simple time-based algorithm. File
    caching does not have a strict limited storage capacity like memory does. With
    a simple time-based algorithm, you don''t need to worry too much about every single
    file because you may delete a set of files at the same time.


    If you expect that you won''t need much time to do calculations or when retrieving
    file information to check for the attributes of the cache, you may not to worry
    about when you check and delete them at all. Again, here is an important lesson:
    don''t over-optimize. If you think your approach can cause a bottleneck, you can
    try to benchmark it. If the current approach runs well, it doesn''t matter if
    your app checks and deletes cache right at the beginning, at the end, or the first
    time the app requests and stores some new cache.


    Here are some main approaches:


    *   *When the app starts*: It may slow down the start process a little bit, but
    if you use multithreading it won''t be any problem.

    *   *When the app closes*: Be careful if you use multithreading—the app may end
    before you finish the checking and deleting cache process. If you don''t use multithreading,
    the time for the app to close takes longer.

    *   *When you store a new piece of cache*: It may be slow the first time you request
    that piece of cache, but it will be faster on subsequent tries. I recommend not
    using multithreading in this case because you may delete a file that another thread
    is reading.


    #### Memory Caching


    Here are some specific details about how to do memory caching and the specific
    problems you may encounter when you do memory caching in iOS environment.


    Because there is a strict storage constraint in memory, you can''t and shouldn''t
    cache too many images here. If you do, the iOS run-time environment will keep
    giving you memory warnings until your app is forced to close.


    Some people are scared of storing in memory because of the limited memory environment.
    Not to worry: you do have memory to use; you just need to learn how to utilize
    and maximize your memory capability to improve your performance. If you''re concerned,
    don''t forget to double check if you are using too little or too much memory via
    the instruments you learned about in [Chapter 2](#Chapter02.html#ch2), as shown
    in [Figure 4–13](#Chapter04.html#fig_4_13).


    ![images](images/0413.jpg)


    **Figure 4–13.** *Memory allocations and usage*


    If you see that you are using too little memory compared to the capability of
    the memory environment, don''t hesitate to use more. The more you can cache data
    and images in memory, the better performance your app will get. However, if you
    are using too much memory, be aware that your app may get memory warning or to
    be forced to close.


    ##### Global Access vs. Strict Access


    For memory caching, you may need to think about whether you want this caching
    to be available to any class and methods within your application or only strictly
    to some classes and methods. If this is global access, anybody can change the
    cache whenever they want. However, if you keep the caching data so private and
    hard to access, the cache becomes useless because some classes or methods may
    need the data and will just request it from the server again. The actual software
    engineering term is *data encapsulation*, which means you should protect your
    data and only share it with the classes/methods that need it.


    Global Access:


    You may need to use static to define global object.


    `#import <UIKit/UIKit.h>`


    `@interface MyObject {`

    `}`


    `static NSMutableDictionary *imagesCaching;`


    `@end`


    Strict Access:


    `#import <UIKit/UIKit.h>`


    `@interface RootViewController : UITableViewController {`

    ` @private`

    `   NSMutableDictionary *imageCaches; } - (void)cacheImage:(UIImage *)image withName:(NSString
    *)uniqueURL;`

    `- (void)getCacheImageWithName:(NSString *)uniqueURL;`

    `@end`


    `#import "RootViewController.h"`

    `@implementation RootViewController`

    `- (void)cacheImage:(UIImage *)image withName:(NSString *)uniqueURL {`

    `   // main code goes here`

    `}`

    `- (void)getCacheImageWithName:(NSString *)uniqueURL {`

    `   // main code goes here`

    `}`

    `@end`


    ##### Preload vs. Just In Time


    Preloading is when you load the image before you actually need it. The good thing
    about this is that it saves time when you actually need to display the file/image.
    The difficult part is that you may need to guess if you need to preload the images.
    Here''s a simple case where you may need to preload images for faster performance
    ([Figure 4–14](#Chapter04.html#fig_4_14)).


    ![images](images/0414.jpg)


    **Figure 4–14.** *Preloaded image for paging view*


    As [Figure 4–14](#Chapter04.html#fig_4_14) shows, for a view like PageView where
    user wants to have a smooth scrolling experience, preloading images into cache
    is the best way to keep the scrolling smooth. Otherwise, the user either has to
    wait after scrolling to the view (for multithreading or loading the image after
    stopping in the view) or they have a stuck scrolling experience


    Another way to load the images into cache is called just in time. This saves the
    actual bandwidth or CPU-loading process until you are sure that you really need
    that data/images. The bad part about this is that it may slow down and keep your
    users waiting for the data. This approach is good if you need really big data/images
    that will consume a lot of memory and your users are willing to wait for a couple
    of seconds.


    ![images](images/0415.jpg)


    **Figure 4–15.** *Big image view*


    [Figure 4–15](#Chapter04.html#fig_4_15) is an example where the user knows that
    he may need to wait for a couple of seconds in order to get the big image view.
    If you load from file to memory to display, the loading time will be quite fast;
    therefore you may not need to worry about preloading the images into memory. Another
    problem is if the image is big, preloading it into memory will cost your app a
    huge amount of memory.'
  trans: "\n### 何时检查并删除缓存？\n\n一般来说，我无法提供任何关于何时检查缓存的具体技巧或建议。这个决定取决于你所工作的环境；换句话说，iOS\
    \ 环境不同于 Web 环境。在 Web 服务器中，你可以循环运行检查方法，查看是否有缓存过期并将其删除。在 iOS 环境中，这既耗时又消耗 CPU。\n\n\
    何时检查并删除缓存内容，很大程度上取决于你用于缓存所选的算法。例如，如果你主要使用 FIFO、LRU 或 LFU，那么你可能需要等到新的请求到来。或者，你可以检查缓存是否已满；如果已满，则根据你的算法删除旧缓存。这种方法通常用于内存缓存，此时你需要更精确的算法并有严格的存储限制。\n\
    \n对于文件缓存，你通常会选择简单的基于时间的算法。文件缓存不像内存那样有严格的有限存储容量。使用简单的基于时间的算法，你无需过度担心每一个文件，因为你可以同时删除一组文件。\n\
    \n如果你预计检查缓存属性时不需要花费太多时间进行计算或检索文件信息，你甚至可能完全不必担心何时检查和删除它们。这里有一个重要的教训：不要过度优化。如果你认为你的方法可能导致瓶颈，可以尝试对其进行基准测试。如果当前方法运行良好，那么你的应用是在启动时、结束时，还是首次请求并存储新缓存时检查和删除缓存，都无关紧要。\n\
    \n以下是一些主要方法：\n\n- **应用启动时**：这可能会略微减慢启动过程，但如果你使用多线程，则不会有任何问题。\n- **应用关闭时**：如果使用多线程需小心——应用可能在检查和删除缓存过程完成前就结束。如果你不使用多线程，应用关闭所需的时间会更长。\n\
    - **存储新缓存时**：首次请求该缓存时可能会变慢，但后续尝试会更快。在这种情况下，我建议不要使用多线程，因为你可能会删除另一个线程正在读取的文件。\n\n\
    ### 内存缓存\n\n以下是一些关于如何进行内存缓存的细节，以及在 iOS 环境中进行内存缓存时可能遇到的特定问题。\n\n由于内存有严格的存储限制，你不能也不应该在这里缓存太多图片。如果这样做，iOS\
    \ 运行时环境会持续发出内存警告，直到你的应用被强制关闭。\n\n一些人因为内存环境有限而害怕使用内存缓存。不必担心：你确实有内存可用；你只需要学习如何利用并最大化你的内存能力来提升性能。如果你有顾虑，请不要忘记通过你从第\
    \ 2 章学到的工具，如图 4–13 所示，仔细检查你使用的内存是过少还是过多。\n\n![images](img/0413.jpg)\n\n**图 4–13.**\
    \ *内存分配与使用*\n\n如果你发现与内存环境的容量相比，你使用的内存过少，不要犹豫，可以多用一些。你在内存中缓存的数据和图片越多，应用的性能就会越好。然而，如果你使用了过多内存，请注意你的应用可能会收到内存警告或被强制关闭。\n\
    \n### 全局访问 vs. 严格访问\n\n对于内存缓存，你可能需要考虑希望该缓存可供应用内的任何类和方法访问，还是仅严格限于某些类和方法。如果是全局访问，任何人都可以随时更改缓存。但是，如果你将缓存数据保持得非常私有且难以访问，缓存就会变得无用，因为某些类或方法可能需要这些数据，而只能再次从服务器请求。实际的软件工程术语是*数据封装*，这意味着你应该保护你的数据，并且只与需要它的类/方法共享。\n\
    \n**全局访问**：\n\n你可能需要使用 `static` 来定义全局对象。\n\n```\n#import <UIKit/UIKit.h>\n\n@interface\
    \ MyObject {\n}\n\nstatic NSMutableDictionary *imagesCaching;\n\n@end\n```\n\n\
    **严格访问**：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface RootViewController : UITableViewController\
    \ {\n @private\n   NSMutableDictionary *imageCaches; } - (void)cacheImage:(UIImage\
    \ *)image withName:(NSString *)uniqueURL;\n- (void)getCacheImageWithName:(NSString\
    \ *)uniqueURL;\n@end\n\n#import \"RootViewController.h\"\n@implementation RootViewController\n\
    - (void)cacheImage:(UIImage *)image withName:(NSString *)uniqueURL {\n   // 主要代码写在这里\n\
    }\n- (void)getCacheImageWithName:(NSString *)uniqueURL {\n   // 主要代码写在这里\n}\n\
    @end\n```\n\n### 预加载 vs. 即时加载\n\n预加载是指在实际需要之前就加载图像。这样做的优点是，当实际需要显示文件/图像时可以节省时间。困难之处在于你可能需要猜测是否需要预加载图像。这里有一个你可能需要预加载图像以提升性能的简单案例（图\
    \ 4–14）。\n\n![images](img/0414.jpg)\n\n**图 4–14.** *分页视图的预加载图像*\n\n如图 4–14 所示，对于像\
    \ PageView 这样用户希望获得流畅滚动体验的视图，将图像预加载到缓存中是保持滚动流畅的最佳方式。否则，用户要么必须在滚动到视图后等待（对于多线程或在视图停止后加载图像的情况），要么滚动体验会卡顿。\n\
    \n另一种将图像加载到缓存中的方法称为即时加载。这种方法可以节省实际的带宽或 CPU 加载过程，直到你确定确实需要这些数据/图像。其缺点是可能会降低速度，让用户等待数据。如果你需要加载会消耗大量内存的非常大的数据/图像，并且你的用户愿意等待几秒钟，那么这种方法是不错的选择。\n\
    \n![images](img/0415.jpg)\n\n**图 4–15.** *大图像视图*\n\n图 4–15 是一个示例，用户知道他可能需要等待几秒钟才能获得大图像视图。如果你从文件加载到内存再显示，加载时间会相当快；因此你可能无需担心将图像预加载到内存中。另一个问题是，如果图像很大，将其预加载到内存中会消耗你的应用大量的内存。\n"
- fmt: "### Summary\n\nBased on my tests, you can see that the performance from network\
    \ is much slower than performance from file and the performance from file is much\
    \ slower than performance from memory. You should always try to identify the bottleneck\
    \ with instrument tools before spending too much of your time to optimize some\
    \ parts. In other words, please avoid over-optimization.\n\nYou learned about\
    \ basic topics in caching such as cache hit, cache miss, storage cost, retrieval\
    \ cost, replacement policy, and several well-known algorithms. Some of them are\
    \ really basic but not efficient; some of them can be efficient but cost time\
    \ and effort to implement. You will probably use the random replacement algorithm\
    \ for simplicity and LRU or LFU for complex cases.\n\nYou also learned about all\
    \ the possible ways to store cache and the scenarios in which to use each approach.\
    \ You can store your data in the temporary folder, the cache folder, or document\
    \ folder based on the specific purpose of your requirement. You may also choose\
    \ to use the photos album so you can easily share it with other applications.\
    \ You also learned the techniques to store/cache data inside your app and the\
    \ different results, advantages, and disadvantages.\n\nLastly, you learned about\
    \ memory caching. Should you allow global access or strict access to your memory\
    \ cache data? Should you preload data into memory or load them just in time? Both\
    \ offer benefits and drawbacks that you will need to consider carefully before\
    \ making your decision.\n\n**EXERCISES**\n\n1.  Implement the LFU caching algorithm\
    \ yourself. If you have any problems, you can look at my hints.\n2.  Benchmark\
    \ two different algorithms (FIFO and LRU) by using appropriate instruments.\n\
    3.  Write a simple program to get a plist file and parse it to a corresponding\
    \ structured data.\n4.  Take the plist file (`Questions.plist`) attached inside\
    \ the program and convert it into data inside CoreData.\n\n## Chapter 5\n\n##\
    \ Tune Your App Using Algorithms and Data Structures\n\nIn this chapter, you will\
    \ learn about:\n\n*   How bad algorithms and data structure can affect your app's\
    \ performance.\n*   Theoretical issues of measuring your algorithms.\n*   Practical\
    \ measurement of your app's performance.\n*   Main data structures and algorithms:\n\
    \    *   iPhone data structures: `NSSet`, `NSArray`, and `NSDictionary`.\n   \
    \ *   Other important data structures and their implementations.\n    *   Other\
    \ algorithms and problem-solving approaches:\n        *   Recursion\n        *\
    \   SAX vs. DOM in XML parsing\n\nYou may hear that in mobile phone development\
    \ you don't need to worry about algorithms and data structure due to the computing\
    \ power of the server side. However, as mentioned with regards to caching issues\
    \ in the previous chapter, especially when your phone is offline, you should store\
    \ your data locally and compute it within the phone environment. Here is the issue:\
    \ your phone environment is not as powerful as your server environment. In other\
    \ words, you don't have the power of cloud computing or a data center.\n\n###\
    \ First Example\n\nThis first example will show you how a bad algorithm can affect\
    \ your program when it runs in the strict mobile phone environment.\n\nMy sample\
    \ code is simple:\n\n*   In the first benchmark, the example contains two arrays,\
    \ each of which contains 1,000 elements. The first and second arrays are the same\
    \ in terms of the number of elements. I loop through two arrays to check how many\
    \ common elements are contained between the two arrays.\n*   In the second benchmark,\
    \ the example contains two sets, each of which contains 1,000 elements. I use\
    \ a special method inside the `NSSet` API to get the set of common elements between\
    \ the two original sets.\n\nThen, I benchmark each of them based on a simulator,\
    \ a new device (iPhone 4 with iOS4), and an old device (iPhone 3G with iOS3).\
    \ The results are shown in [Table 5-1](#Chapter05.html#tab_5_1).\n\n![images](images/t0501.jpg)\n\
    \n[Table 5–1](#Chapter05.html#tab_5_1) shows that the second benchmark is 100\
    \ times faster than the first benchmark. Considering that 1,000 items is not practical\
    \ when you deal with real applications, 5.44 seconds may not be much for new devices.\
    \ However, remember that there are many old devices with less power out there,\
    \ and their owners may not update these devices any time soon. In that light,\
    \ 5.44 seconds is actually a significant delay when running in those old devices.\n\
    \nWhat follows is a look at the initial source code and few explanations before\
    \ I move on to explain some concepts in-depth.\n\nThe purpose of [Listings 5–1](#Chapter05.html#list_5_1)\
    \ and [5–2](#Chapter05.html#list_5_2) is to count how many objects inside the\
    \ first array/set also belong to the second array/set. [Listing 5–1](#Chapter05.html#list_5_1)\
    \ solves the problem by using an array and loop while [Listing 5–2](#Chapter05.html#list_5_2)\
    \ solves the problem by using a set.\n\n**Listing 5–1.** *First Benchmark Using\
    \ an Array and Loop*\n\n```\n// [self defaultData] returns an array with 1000\
    \ thousands different NSObjects\nNSArray *myFirstArray = [NSArray arrayWithArray:[self\
    \ defaultData]];\nNSArray *mySecondArray = [NSArray arrayWithArray:[self defaulData]];\n\
    NSDate *date1 = [NSDate date];\nint i = 0;\nfor (NSObject *obj in myFirstArray)\
    \ {\n    for (NSObject *secondObj in mySecondArray) {\n        if ([secondObj\
    \ isEqual:obj]) {\n            i++;\n            break;\n        }\n    }\n}\n\
    \nNSDate *date2 = [NSDate date];\nNSLog(@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n\
    NSLog(@\"i: %d\", i);\n```\n\n**Listing 5–2.** *Second Benchmark Using a Set*\n\
    \n```\n- (void)secondBenchmark {\n    NSArray *defaultArray = [self defaultData];\n\
    \    NSMutableSet *myFirstSet = [NSMutableSet setWithArray:defaultArray];\n  \
    \  NSMutableSet *mySecondSet = [NSMutableSet setWithArray:defaultArray];\n\n \
    \   NSDate *date1 = [NSDate date];\n\n    [myFirstSet intersectSet:mySecondSet];\n\
    \n    NSDate *date2 = [NSDate date];\n    NSLog(@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n\
    \    NSLog(@\"count: %d\", [myFirstSet count]);\n}\n```\n\nFor the first benchmark,\
    \ I put 1,000 elements into each array and then looped through the two arrays\
    \ to find if any two items are the same. To avoid a duplicate count, after the\
    \ program finds the item in the second array, the program stops looping over the\
    \ second array.\n\nThe second approach is much simpler; with the use of `NSSet`,\
    \ you only need to store all elements inside the `NSSet` and call the correct\
    \ method to do the job for you. The `intersect` method will find same items inside\
    \ two sets and put them into the variable `myFirstSet`.\n\nAs you can see, a wrong\
    \ approach can be 100 times slower than a correct approach. Moreover, the correct\
    \ approach may save you a few hours of coding when trying to reuse all the necessary\
    \ data structures and algorithms. Therefore, it's a good idea to choose the correct\
    \ approach the first time.\n\n### Theoretical Issues of Measuring Algorithmic\
    \ Performance\n\nI've shown you one way to measure the algorithm's performance\
    \ using `NSLog` and `NSDate` in Listings 5–1 and 5–2. However, in computer science,\
    \ people don't use `NSLog` or the instruments tool to talk about how fast an algorithm\
    \ is compared to other algorithms. Computer science requires exact data and standards\
    \ to make sure that some algorithms are actually better than others.\n\nPeople\
    \ usually use Big-O notation to describe how an algorithm scales (performs) in\
    \ the worst case scenario. (There are other terms and definitions used in computer\
    \ science that I will not cover here.) For example, if you have an algorithm with\
    \ the performance `O(N)`, then that algorithm when working on an array of 25 elements\
    \ will take 25 steps, compared to 5 steps for an array with 5 elements. So, it\
    \ takes 5 times longer for the 25–element array to finish the task."
