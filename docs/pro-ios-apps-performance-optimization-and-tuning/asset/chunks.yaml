    \ `NSOperation` 对象。当执行多个代码块时，只有当内部的所有代码块都执行完毕，`NSBlockOperation` 才被视为完成。\n- 自定义的\
    \ `NSOperation` 对象：`NSOperation` 是一个基类。通过对其子类化，你可以完全控制 `NSOperation` 对象的整个实现，包括操作执行和报告状态的默认方式。\n\
    \n要使用 `NSOperationQueue` 创建多线程应用，你需要通过这三种方法之一创建特定的对象，并将新创建的 `NSOperation` 添加到你的队列中。然后，队列会为你维护并运行这些操作。\n\
    \n以下是一段代码片段，可以帮助你创建 `NSOperationQueue` 并将单独的操作对象添加其中，从而创建多线程环境：\n\n```\nNSOperationQueue*\
    \ myOperationQueue = [[NSOperationQueue alloc] init];\n[myOperationQueue addOperation:myOperation];\
    \ // 添加单个操作\n[myOperationQueue addOperations:arrayOfOperations waitUntilFinished:NO];\
    \ // 添加多个操作\n[aQueue addOperationWithBlock:^{\n  /* 执行一些操作。 */\n}];\n```\n\n现在我将详细介绍如何使用前面提到的每种方法来创建新的操作。\n\
    \n#### NSInvocationOperation\n\n`NSInvocationOperation` 对象被运行时，会执行在创建该对象时指定的方法。在以下情况下，你可能需要使用该对象：\n\
    \n- 你想避免在应用内部创建过多的自定义操作类。\n- 你正在添加或维护一个已有应用，其中的类已经定义完善，并且你不想修改该类来将其子类化为 `NSOperation`。\n\
    - 选择器可能根据用户输入而变化。在这种情况下，你只需使用选定的选择器创建一个新的 `NSInvocationOperation` 对象即可。\n\n创建\
    \ `NSInvocationOperation` 对象的代码如下：\n\n```\nNSInvocationOperation* theOp = [[NSInvocationOperation\
    \ alloc] initWithTarget:self\n                                               \
    \                     selector:@selector(myTaskMethod:) object:data];\n```\n\n\
    这与使用 `NSThread` 创建并分离新线程时的情况类似。你传递目标对象、想要调用的选择器，以及你希望选择器在执行时拥有的参数。\n"
- fmt: "```markdown\n###### NSBlockOperation\n\n`NSBlockOperation`是`NSOperation`的另一个子类。当你创建一个块操作时，你必须在操作对象内添加至少一个块。之后，你可以向该操作对象中添加更多要执行的块。当操作队列执行此块操作时，它会在该块操作完成前执行其内部的所有块。因此，你可以使用此操作对象来跟踪一组块，然后合并或处理相关结果。\n\
    \n要创建块操作对象，可以使用以下代码：\n\n```\nNSBlockOperation* theOp = [NSBlockOperation blockOperationWithBlock:\
    \ ^{\n      NSLog(@\"Beginning operation.\\n\");\n      // Do some work.\n}];\n\
    ```\n\n然后，稍后你可以通过调用以下代码向此操作添加另一个块：\n\n```\n[theOp addExecutionBlock:[NSBlockOperation\
    \ blockOperationWithBlock: ^{\n      NSLog(@\"Beginning operation.\\n\");\n  \
    \    // Do some work.\n}];\n```\n\n###### NSOperation\n\n`NSOperation`是一个供你通过子类化来自定义的类。要子类化`NSOperation`，你需要创建一个包含两个推荐（但非强制）方法的类。\n\
    \n- *自定义初始化方法*：用于接收数据以及在类内部进行逻辑处理所需的属性。例如，你可以有一个`init`方法来接收用于下载图片的URL，如下所示：\n\n\
    ```\n- (id)initWithData:(id)data {\n    if ((self = [super init]))\n      myData\
    \ = data;\n    return self;\n}\n```\n\n- `main` *方法*：一个必需的方法，当任务启动时会被调用。\n\n要创建一个并发的`NSOperation`子类，你需要重写更多方法，以帮助`NSOperationQueue`对象处理调用者的多线程请求。\n\
    \n- `start` *或* `main`：你需要重写此方法或`main`方法，以便在线程启动你的操作时执行你的逻辑。默认情况下，此方法除了调用`main`方法外什么都不做。因此，你可以重写此方法或`main`方法。\n\
    - `isExecuting` *和* `isFinished`：你的操作必须向外部客户端报告其当前状态。两个最重要的状态是你的操作是否已开始执行以及是否已完成。因此，你需要通过属性或实例变量跟踪当前的操作状态，并在此处报告这些状态。\n\
    - `isConcurrent`：你必须重写此方法以返回`YES`。\n\n其他方法不是强制的，但通常你需要它们。\n\n- *其他逻辑处理方法*：除非你想将所有代码都放在`main`方法中，否则你还需要其他方法来包含你的逻辑处理代码。\n\
    \n[Listing 6–4](#Chapter06.html#list_6_4) 展示了一个自定义并发`NSOperation`类的完整代码示例。\n\n\
    **Listing 6–4.** 一个自定义并发的`NSOperation`类\n\n```\n@interface ConcurrentOperation:\
    \ NSOperation {\n   BOOL        executing;\n   BOOL        finished;\n   NSURL\
    \      *url;\n}\n\n@property (nonatomic, strong) NSURL *url;\n@property (nonatomic,\
    \ weak) id delegate;\n\n@end\n\n@implementation ConcurrentOperation\n\n@synthesize\
    \ url;\n\n// put your necessary data and arguments in the custom initilization\
    \ code\n- (id)initWithURL:(NSURL *)aURL operationDelegate:(id)aDelegate {\n  \
    \ self = [super init];\n   if (self) {\n       executing = NO;\n       finished\
    \ = NO;\n       self.url = aURL;\n       self.delegate = aDelegate;\n   }\n  \
    \ return self;\n}\n// remember to always override this method and return YES\n\
    - (BOOL)isConcurrent {\n   return YES;\n}\n\n- (BOOL)isExecuting {\n   return\
    \ executing;\n}\n\n- (BOOL)isFinished {\n   return finished;\n}\n\n// here, we\
    \ choose to override the main method to download the image and send it back to\n\
    // the main selector.\n- (void)main {\n    NSData *loadedData = [[NSData alloc]\
    \ initWithContentsOfURL:self.url];\n    UIImage *myImage = [UIImage imageWithData:loadedData];\n\
    \n    [self.delegate performSelectorOnMainThread:@selector(imageLoaded:)\n   \
    \                                 withObject:myImage\n                       \
    \          waitUntilDone:YES];\n}\n\n@end\n```\n\n[Listing 6–4](#Chapter06.html#list_6_4)\
    \ 展示了如何编写一个自定义的`NSOperation`，通过多线程从网络下载图片。\n\n**注意：** 如果你以前做过Java编程，你可能会发现`NSOperation`与`Thread`类或`Runnable`接口有相似之处。在`Thread`类中，你可以扩展`Thread`类并重写`run`方法。对于`Runnable`接口也是一样，你需要实现`Runnable`接口并重写`run`方法。你可以将`NSOperation`的`main`方法视为Java中`Thread`类和`Runnable`接口中的`run`方法。\n\
    \n#### 配置线程\n\n有几个选项可以用来正确配置你的线程，以便在不过载的情况下充分利用系统资源，特别是在像iPhone这样受限的运行时环境中。\n\n\
    - *栈大小*：每当创建新线程时，操作系统都会为该线程分配一块默认大小的内存作为栈来执行。如果你不了解栈，可以查阅[第5章](#Chapter05.html#ch5)。线程内部的栈将存储局部变量以及线程运行时调用的方法。要为线程设置栈大小，你必须在分离线程之前设置该大小。对于`NSThread`，这意味着你使用如下初始化方法：\n\
    \n```\nNSThread* myThread = [[NSThread alloc]\n                        initWithTarget:self\n\
    \                              selector:@selector(myThreadMainMethod:)\n     \
    \                           object:nil];\n[myThread setStackSize:40960]; // 40KB\
    \ here, the size is in bytes and multiple of 4KB\n[myThread start];  // Actually\
    \ create the thread\n```\n\n- *线程本地存储*：每个线程都有一个用于存储数据的键值对字典，这些数据可以在线程内部的任何地方访问。你可以使用这个字典来存储那些希望在线程执行期间持久化的数据，而无需在代码中创建全局变量。你可以通过`[aThread\
    \ threadDictionary]`来调用这个字典。\n- *线程优先级*：线程优先级涉及操作系统选择执行某个线程的可能性。优先级越高，线程运行的可能性就越大。然而，优先级并不保证任何事情，例如在操作系统切换到另一个线程之前该线程的执行时间。它也不保证高优先级线程总是被选中，而不是其他低优先级线程。\n\
    \n#### 你的线程入口点\n\n当你启动线程时，你需要有一些代码来管理该线程的当前状态、线程执行时创建的内存以及线程内部可能抛出的任何异常。原因是你新创建的线程有自己的栈，这与默认栈不同，如[图6–4](#Chapter06.html#fig_6_4)所示。因此，你的线程使用的内存与主线程使用的内存区域不同。异常也是类似的；它只会存储在你的栈中，而不会返回给主栈和主线程。\n\
    \n![images](images/0604.jpg)\n\n**图6–4.** 两个线程有不同的栈来管理它们的执行\n\n有几件事情你需要记住：\n\n\
    - **自动释放池**：用于管理自动释放的对象。\n- `ExceptionHandler`：用于管理线程运行时抛出的异常。\n- `RunLoop`：用于创建事件处理代码。\n\
    \n我将讨论为什么需要实现它们中的每一个，以及如何正确地做到这一点。\n\n[表6–3](#Chapter06.html#tab_6_3) 提供了一个简短摘要，帮助你回顾创建和配置线程的主要技术及其优缺点。\n\
    \n![Images](images/t0603.jpg)\n```"
  raw: "###### NSBlockOperation\n\nThe `NSBlockOperation` is another subclass of `NSOperation`.\
    \ When you create a block operation, you have to add at least one block inside\
    \ this operation object. Then later you can add more blocks to be executed within\
    \ this operation object. When the operation queue executes this block operation,\
    \ it will execute all the blocks inside the block operation before this block\
    \ operation finishes. Therefore, you can use this operation object to keep track\
    \ of a group of blocks and then you can merge or deal with related results.\n\n\
    To create a block operation object, you can use the following code:\n\n`NSBlockOperation*\
    \ theOp = [NSBlockOperation blockOperationWithBlock: ^{`\n`      NSLog(@\"Beginning\
    \ operation.\\n\");`\n`      // Do some work.`\n`}];`\n\nYou then later add another\
    \ block into this operation by calling\n\n`[theOp addExecutionBlock:[NSBlockOperation\
    \ blockOperationWithBlock: ^{`\n`      NSLog(@\"Beginning operation.\\n\");`\n\
    `      // Do some work.`\n`}];`\n\n###### NSOperation\n\n`NSOperation` is a class\
    \ for you to customize by subclassing. To subclass `NSOperation`, you create a\
    \ class with two recommended (but not compulsory) methods.\n\n*   *Custom initialization\
    \ method*: To receive data and necessary attributes for logic processing within\
    \ the class. For example, you can have an `init` method to receive a url to download\
    \ an image, like so: `- (id)initWithData:(id)data {`\n    `  if ((self = [super\
    \ init]))`\n    `    myData = data;`\n    `  return self;`\n    `}`\n*   `Main`\
    \ *method*: A necessary method and will be called when the task is started.\n\n\
    To make a concurrent `NSOperation` subclass, you have to override more methods\
    \ to help the `NSOperationQueue` object handle multithreading requests from caller.\n\
    \n*   `start` *or* `main`: You will need to either override this method or the\
    \ `main` method in order to execute your logic when the thread starts your operations.\
    \ By default, this method does nothing except call the `main` method. Therefore,\
    \ you can override this method or the `main` method.\n*   `isExecuting` *and*\
    \ `isFinished:` Your operation must report its current status to outside clients.\
    \ The two most important status states are if your operation has started executing\
    \ and if it has finished its operation. So you need to keep track of your current\
    \ operation status by using properties or instance variables and report these\
    \ statuses here.\n*   `isConcurrent:` You have to override this method to return\
    \ `YES.`\n\nOther methods are not compulsory but you will usually need them.\n\
    \n*   *Other logic processing methods*: Unless you want to put all of your code\
    \ inside the `main` method, you will need other methods to contain your logic\
    \ processing code as well.\n\n[Listing 6–4](#Chapter06.html#list_6_4) shows the\
    \ complete code example for a custom and concurrent `NSOperation` class.\n\n**Listing\
    \ 6–4.** *A Custom and Concurrent NSOperation Class*\n\n`@interface ConcurrentOperation:\
    \ NSOperation {`\n`   BOOL        executing;`\n`   BOOL        finished;`\n`   NSURL      *url;`\n\
    `}`\n\n`@property (nonatomic, strong) NSURL *url;`\n`@property (nonatomic, weak)\
    \ id delegate;`\n\n`@end`\n\n`@implementation ConcurrentOperation`\n\n`@synthesize\
    \ url;`\n\n`// put your necessary data and arguments in the custom initilization\
    \ code`\n`- (id)initWithURL:(NSURL *)aURL operationDelegate:(id)aDelegate {`\n\
    `   self = [super init];`\n`   if (self) {`\n`       executing = NO;`\n`       finished\
    \ = NO;`\n`       self.url = aURL;`\n`       self.delegate = aDelegate;`\n`   }`\n\
    `   return self;`\n`}`\n`// remember to always override this method and return\
    \ YES`\n`- (BOOL)isConcurrent {`\n`   return YES;`\n`}`\n\n`- (BOOL)isExecuting\
    \ {`\n`   return executing;`\n`}`\n\n`- (BOOL)isFinished {`\n`   return finished;`\n\
    `}`\n\n`// here, we choose to override the main method to download the image and\
    \ send it back to`\n`// the main selector.`\n`- (void)main {`\n`    NSData *loadedData\
    \ = [[NSData alloc] initWithContentsOfURL:self.url];`\n`    UIImage *myImage =\
    \ [UIImage imageWithData:loadedData];`\n\n`    [self.delegate performSelectorOnMainThread:@selector(imageLoaded:)`\n\
    `                                    withObject:myImage`\n`                                 waitUntilDone:YES];`\n\
    `}`\n\n`@end`\n\n[Listing 6–4](#Chapter06.html#list_6_4) shows how you can write\
    \ a custom `NSOperation` to download an image from the web using multithreading\n\
    \n**NOTE:** If you have done Java programming before, you may see that there is\
    \ a similarity between `NSOperation` and `Thread` class or `Runnable` interface.\
    \ In `Thread` class, you can extend the `Thread` class and override the `run`\
    \ method. It is the same for the `Runnable` interface, where you implement the\
    \ `Runnable` interface and override the `run` method as well. You can see the\
    \ `main` method of `NSOperation` as the `run` method in `Thread` class and `Runnable`\
    \ interface in Java.\n\n#### Configuring a Thread\n\nThere are a few options that\
    \ you can use to configure your thread properly to utilize your system resources\
    \ well without overloading them, especially in a restricted runtime environment\
    \ like iPhone.\n\n*   *Stack size*: Whenever a new thread is created, the OS allocates\
    \ a default amount of memory as a stack for that thread to execute. If you don’t\
    \ know what a stack is, you can look at [Chapter 5](#Chapter05.html#ch5). A stack\
    \ inside the thread will store local variables and the methods called when the\
    \ thread operates. To set up the stack size for a thread, you have to set that\
    \ size before detaching the thread. In case of `NSThread`, this means that you\
    \ use the initialize method as follows: `NSThread* myThread = [[NSThread alloc]`\n\
    \    `                        initWithTarget:self`\n    `                              selector:@selector(myThreadMainMethod:)`\n\
    \    `                                object:nil];`\n    `[myThread setStackSize:40960];\
    \ // 40KB here, the size is in bytes and multiple of 4KB`\n    `[myThread start];  //\
    \ Actually create the thread`\n*   *Thread-local storage*: Every thread has a\
    \ dictionary of key-value pairs to store data that can be accessed from anywhere\
    \ inside the thread. You can use this dictionary to store data that you want to\
    \ be persistent across the thread execution without creating a global variable\
    \ inside the code. You can call the dictionary by using `[aThread threadDictionary]`\n\
    *   *Thread priority*: Thread priorities are about the likelihood a thread is\
    \ chosen to execute by the OS. The higher the priority, the more likely thread\
    \ runs. However, the priority does not guarantee you anything like the time the\
    \ thread executes before the OS switches to another thread. It also does not guarantee\
    \ that a higher thread will always be chosen rather than other low priority thread.\n\
    \n#### Your Thread Entry\n\nWhen you start your thread, you need to have some\
    \ code to manage the current state of that thread, the memory that thread creates\
    \ when it executes, and any exception that can be thrown inside the thread. The\
    \ reason is that your newly created thread will have its own stack, which is different\
    \ than the default stack, as illustrated in [Figure 6–4](#Chapter06.html#fig_6_4).\
    \ Therefore, the memory that your thread uses is different than the memory area\
    \ that the main thread uses. The exception is similar; it will only be stored\
    \ in your stack and not returned back to the main stack and main thread.\n\n![images](images/0604.jpg)\n\
    \n**Figure 6–4.** *Two threads have different stacks to manage their execution*\n\
    \nThere are couples of things that you need to remember:\n\n*   **Autorelease\
    \ Pool**: To manage autoreleased object.\n*   `ExceptionHandler`: To manage exceptions\
    \ thrown when the thread runs.\n*   `RunLoop`: To create event-handling code.\n\
    \nI will discuss why you need to implement each of them and how to do it properly.\n\
    \n[Table 6–3](#Chapter06.html#tab_6_3) provides a short summary to let you review\
    \ the main techniques of creating and configuring threads plus their advantages\
    \ and disadvantages.\n\n![Images](images/t0603.jpg)"
