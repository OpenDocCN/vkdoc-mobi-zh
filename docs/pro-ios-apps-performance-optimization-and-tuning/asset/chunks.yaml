    \ 图 5–13 所示。\n\n![images](img/0513.jpg)\n\n**图 5–13.** *数组与链表的比较*\n\n如图所示，在数组中，你将元素存储在带有索引的位置上，并且可以使用索引访问数组中的任意元素。然而，在链表中，持有列表的主要\
    \ `List` 对象仅保存第一个和最后一个元素。（为简单起见，我不讨论可以向前和向后移动的双向链表）。要访问链表内的任意对象，你必须从两端之一开始：第一个元素或最后一个元素。如果从第一个元素开始，就逐个向前移动，直到到达所需的索引。如果从最后一个元素开始，就逐个向后移动，直到到达所需的索引。图\
    \ 5–14 和 5–15 说明了这一过程。\n\n![images](img/0514.jpg)\n\n**图 5–14.** *访问链表中索引为 2（第三个元素）的元素*\n\
    \n![images](img/0515.jpg)\n\n**图 5–15.** *访问链表中倒数第三个元素*\n\n我将为链表提供一个示例实现；它并非完美的实现，但在大多数情况下可以使用。你应该下载源代码项目\
    \ `LinkedList` 以获取完整示例版本。我将简要解释最重要的部分，以确保你完全理解链表的概念。\n\n实现中包含两个主要对象：`Node` 和 `List`。`List`\
    \ 对象保存第一个和最后一个节点，如 图 5–12 所示。每个 `Node` 对象包含三个部分：`Node` 内部存储的元素、下一个元素以及上一个元素。对于第一个元素，上一个元素指向\
    \ `nil` 对象；类似地，对于最后一个元素，下一个元素指向 `nil` 对象；请参见 代码清单 5–5 和 5–6。\n\n**代码清单 5–5.**\
    \ *ListNode*\n\n**`ListNode.h`**\n\n```\n// Structure representing a\n// doubly-linked\
