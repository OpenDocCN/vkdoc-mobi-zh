    `@end`


    As you can see from [Listing 5–6](#Chapter05.html#list_5_6), the `LinkedList`
    object has the capability to get objects from the list in the forward or backward
    order, as well as to add to the first or the end of the linked list. I will show
    you only the main implementation methods because others are similar or easy to
    implement yourself.


    There are six main methods that you will need to think about when implementing
    a linked list: init, add object, get object, count, remove object, and release
    the whole list.


    ###### Init


    `- (id)initWithHead:(NSObject *)value {`

    `   if ((self = [super init]) != nil) {`

    `       head = [[ListNode alloc] initWithObject:value];`

    `   }`

    `   return self; }`


    You need to allocate the head of the list first; this head will hold the next
    item.


    ###### Add Object


    `- (void)addToFront:(NSObject *)value {`

    `   ListNode *node = [[ListNode alloc] initWithObject:value];`

    `   // new element becomes the head node`

    `   node.next = head;`

    `   head.pre = node;`

    `   self.head = node;`

    `}`


    Adding into the first spot of the linked list is easy and fast; you just need
    to relink the `LinkedList` object with the new node. Adding to the end is similar
    and I leave it as an exercise for you.


    To add a new node the beginning, you need to remove the link of objects around
    the position you desire and relink them with the new element, as shown in [Figure
    5–16](#Chapter05.html#fig_5_16).


    ![images](images/0516.jpg)


    **Figure 5–16.** *Inserting new object to the middle of the array*


    To insert an element into a current position in the list, you can use the following
    code snippet:


    `- (void)insertObject:(NSObject *)object atIndex:(NSInteger)index {`

    `   ListNode *currentNode = self.head;`

    `   ListNode *previousNode = nil;`

    `   ListNode *nextNode = nil;`


    `   // find two items around the place that you need to add an object in`

    `   for (int i = 1; i <= index; i++) {`

    `       currentNode = currentNode.next;`

    `       if (i == index - 1) {`

    `           previousNode = currentNode;`

    `       } else if (i == index) {`

    `           nextNode = currentNode;`

    `       }`

    `   }`


    `   // add your object in`

    `   ListNode *newNode = [[ListNode alloc] initWithObject:object];`

    `   if (!previousNode) {`

    `       self.head = newNode;`

    `   } else {`

    `       previousNode.next = newNode;`

    `       newNode.pre = previousNode;`


    `       nextNode.pre = newNode;`

    `       newNode.next = nextNode;`

    `   }`

    `}`


    To insert an object at random position or in the middle of the linked list, you
    need to figure out where to put your node. Therefore, the first part of the code
    is to loop through the current linked list and find the previous node as well
    as the next node to insert an object in between. After that, you link nodes around
    the place with the new node.'
