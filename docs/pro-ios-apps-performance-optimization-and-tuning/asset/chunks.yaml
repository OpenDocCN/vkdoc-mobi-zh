    \ find the information easily on the Internet.\n\n![images](images/1002.jpg)\n\
    \n**Figure 10–2.** *Windows Phone emulator*\n\nThe iPhone simulator runs extremely\
    \ fast compared to the real device, as mentioned in [Chapter 2](#Chapter02.html#ch2),\
    \ so it's hard to detect any performance issues in it.\n\n#### Benchmarking\n\n\
    It is important to know which tools are available to you when you need to run\
    \ benchmarking. Android provides a limited set of tools while Windows Phone provides\
    \ a wider range of tools that help you to find the performance problem. Many of\
    \ these tools cover the same functionality as tools supplied by the iOS; they\
    \ support benchmarking of memory, CPU usage, and user interface processing.\n\n\
    ##### Android\n\nEclipse for Android doesn't provide a complete list of instrument\
    \ tools as Xcode does for iPhone. It provides four main instrument tools that\
    \ you can use to track your performance: thread, heap, object allocation, and\
    \ file access. You can combine these tools with logging (using `Debug.trace()`)\
    \ to measure the general performance of your application.\n\nAlthough Android\
    \ provides garbage collection, it has its disadvantages. When the garbage collection\
    \ runs, it stops your application. This will make your UI cease responding for\
    \ a couple of milliseconds, or at least not render enough frames (a good rendering\
    \ frame rate should be around 16-30ms/frame).\n\n[Figure 10–3](#Chapter10.html#fig_10_3)\
    \ and [10–4](#Chapter10.html#fig_10_4) shows the heap and allocation tracker for\
    \ Android. You can use these tools to see in what classes or methods you create\
    \ the most objects.\n\n![images](images/1003.jpg)\n\n**Figure 10–3.** *Heap instrument*\n\
    \n![images](images/1004.jpg)\n\n**Figure 10–4.** *Allocation instrument*\n\n#####\
    \ Windows Phone\n\nWindows Phone offers a much better performance profiling tool.\
    \ [Figure 10–5](#Chapter10.html#fig_10_5) shows the result of running the Windows\
    \ Phone profiling tool and getting the data back.\n\n![images](images/1005.jpg)\n\
    \n**Figure 10–5.** *Allocation instrument*\n\nThe performance tool supports many\
    \ different metrics for performance benchmarking: frame rate, CPU usage, memory\
    \ usage, image loads and garbage collection events. This helps you locate the\
    \ performance bottleneck so you can solve it more easily."
  trans: "\n## 比较 Android 与 Windows Phone 的性能问题\n\n在本章中，你将学习以下内容：\n\n-   智能手机开发中三个平台及三种编程语言的通用知识与差异。\n\
    -   如何将你在 iOS 上学到的诸多应用性能优化要点应用于 Android 和 Windows Phone，例如：\n    -   如何对 Android\
    \ 和 Windows Phone 应用进行基准测试。\n    -   如何优化滚动性能。\n    -   缓存与数据存储的差异。\n    -   针对三个平台的数据结构与算法简析。\n\
    \    -   针对三个平台的多线程简析。Android 与其他两个平台有所不同。\n    -   关于内存限制的要点。\n    -   这些平台处理多任务的不同方式。\n\
    \    -   如何将 C/C++ 代码集成到你的 Android 应用中。\n\n本章将为你勾勒出未来三大主要智能手机平台——iPhone、Android\
    \ 和 Windows Phone——的总体面貌。它们正在不断发展并大力创新，以保持相对于竞争对手的竞争优势。对于一些基础且简单的应用，你或许不愿为每个平台投入大量时间和精力去优化性能，此时可以编写跨平台应用以节省时间。\n\
    \n不出所料，跨平台版本的发布通常会比主 SDK 晚数周甚至数月。此外，与主要 API 相比，它也会缺少某些精细化功能。因此，要想在这三个平台市场中取得成功，你必须使用主要语言及其特性来优化性能，并充分利用该平台的先进功能和\
    \ API。\n\n我将概述 Android 和 Windows Phone 性能方面的主要难点。通过本书各章节（工具、模拟器、列表视图、缓存、存储、数据结构与算法、多线程、多任务、内存管理以及原生\
    \ C/C++ 编程支持）的引导，可以简化这些问题的理解。限于篇幅，我无法覆盖每个平台的所有细节，也不会妄加评判哪个平台最好。阅读本章后，你将了解每个平台最重要的难点，从而能够轻松地切换和学习新平台。\n\
    \n### 通用知识\n\niPhone 使用 Objective-C 作为 iOS 开发的主要编程语言。它没有垃圾回收器，而是依靠 ARC 来协助内存管理。仅有三种设备运行\
    \ iOS：iPod Touch、iPhone 和 iPad，它们有两种不同的屏幕分辨率。\n\nAndroid 使用 Java 作为主要编程语言，并提供垃圾回收以简化内存管理。Android\
    \ 拥有众多屏幕尺寸和硬件规格各异的设备。有些设备采用双核芯片，而有些设备则性能较弱（处理器速度慢、内存有限）。\n\nWindows Phone 使用 C#\
    \ 作为主要编程语言，并使用 Silverlight 作为用户界面框架。C# 具备垃圾回收功能。支持 Windows Phone 的设备很多，但都必须满足必要的硬件要求。\n\
    \n### 在模拟器和设备上进行基准测试\n\n在 iOS 中，正如你在第 2 章所了解到的，模拟器远快于真机，因此有些情况下你需要使用真机来测试性能是否达标。iOS、Android\
    \ 和 Windows Phone 的模拟器与真机架构差异很大，因此每个平台进行基准测试的方法也各不相同。\n\n#### 模拟器与设备\n\nAndroid\
    \ 模拟器（图 10-1）运行速度非常慢。你可以将其作为性能测试的最低基准。此外，Android 设备型号众多，要让所有 Android 用户对性能满意并非易事。你可能需要在不同设备上进行测试，以了解性能结果的范围。\n\
    \n![images](img/1001.jpg)\n\n**图 10-1.** *Android 模拟器*\n\nWindows Phone 模拟器（图\
    \ 10-2）运行性能正常，几乎与真机无异。如果你想像开发 iOS 应用那样，通过快速模拟器来运行测试，那么提升模拟器性能是可行的；你可以在互联网上轻松找到相关信息。\n\
    \n![images](img/1002.jpg)\n\n**图 10-2.** *Windows Phone 模拟器*\n\n正如第 2 章所述，iPhone\
    \ 模拟器的运行速度远快于真机，因此很难在模拟器上检测到性能问题。\n\n#### 基准测试\n\n了解在需要进行基准测试时可以使用哪些工具至关重要。Android\
    \ 提供的工具集较为有限，而 Windows Phone 则提供了更广泛的工具来帮助你查找性能问题。这些工具中的许多功能与 iOS 提供的工具类似；它们支持对内存、CPU\
    \ 使用率和用户界面处理进行基准测试。\n\n##### Android\n\n用于 Android 开发的 Eclipse 并未像 Xcode 为 iPhone\
    \ 提供的那样提供一整套检测工具。它主要提供四种检测工具用于跟踪性能：线程、堆、对象分配和文件访问。你可以将这些工具与日志记录（使用 `Debug.trace()`）结合使用，来测量应用的整体性能。\n\
    \n虽然 Android 提供了垃圾回收，但它也有缺点。当垃圾回收运行时，它会暂停你的应用。这会导致你的用户界面停止响应几毫秒，或者至少无法渲染足够的帧数（良好的渲染帧率应在\
    \ 16-30 毫秒/帧左右）。\n\n图 10-3 和图 10-4 展示了 Android 的堆和分配跟踪器。你可以使用这些工具来查看在哪些类或方法中创建了最多对象。\n\
    \n![images](img/1003.jpg)\n\n**图 10-3.** *堆检测工具*\n\n![images](img/1004.jpg)\n\n\
    **图 10-4.** *分配检测工具*\n\n##### Windows Phone\n\nWindows Phone 提供了性能更出色的性能分析工具。图\
    \ 10-5 展示了运行 Windows Phone 性能分析工具并获取数据后的结果。\n\n![images](img/1005.jpg)\n\n**图\
    \ 10-5.** *分配检测工具*\n\n该性能工具支持多种不同的性能基准测试指标：帧率、CPU 使用率、内存使用率、图像加载和垃圾回收事件。这有助于你定位性能瓶颈，从而更轻松地解决问题。\n"
- fmt: "# ListView Performance\n\nAll `ListView` (or `TableView`) in iOS, Android,\
    \ and Windows Phone share similar performance issues. You always need to return\
    \ data back to the list as soon as possible; otherwise, user will see a lot of\
    \ jerkiness when scrolling down. Loading images will need to be asynchronous so\
    \ user can scroll the list smoothly and see data first. Whenever the image is\
    \ loaded, it will be displayed in the list later.\n\nThere are some common issues\
    \ with view rendering for all three platforms:\n\n* You should always use opaque\
    \ views whenever possible.\n* You should not use a complicated, nested list view\
    \ structure because it starts to display slowly.\n\nThere are specific issues\
    \ for each platform when it comes to this `ListView` scrolling issue. To have\
    \ a customized `ListView`, Android and Windows Phone use a different approach\
    \ to displaying data into the `ListView`. The way Android does it is similar to\
    \ iPhone where you return data and view only if necessary. Windows Phone uses\
    \ an automatic binding mechanism to bind data into the view. The Windows Phone\
    \ way is easier to implement for developers but it causes more performance issues\
    \ than the Android way.\n\nWith Windows Phone, when you have a big array of objects,\
    \ you will soon have a problem with memory and performance because the operating\
    \ system can't store more objects into the memory and fetch them out to bind with\
    \ the `ListView`. This is the main difference between `ListView` in iPhone, Android,\
    \ and Windows Phone. In the first two platforms, you only need to decide the size\
    \ of the list; while scrolling, you can get data to display. Memory should not\
    \ be an issue with iOS `TableView` when you can discard the unused objects in\
    \ the array and only store necessary objects. I will explain briefly how both\
    \ platforms are implemented and how to solve the problems with both platforms.\n\
    \n## Android\n\nIn Android, you can map your data with the default layout without\
    \ any difficulty.\n\n```java\nString [] cities= new String[] {\"Melbourne\", \"\
    Victoria\", \"Adealide\"};\nthis.setListAdapter(new ArrayAdapter<String>(this,\
    \ R.layout.list_item, cities);\n```\n\nHowever, if you need to come up with a\
    \ more complex layout, you can use your own adapter to map the data with the view.\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\">\n        <ImageView android:id=\"\
    @+id/icon\" android:layout_height=\"wrap_content\"\n                android:src=\"\
    @drawable/icon\" android:layout_width=\"22px\">\n        </ImageView>\n      \
    \  <TextView android:text=\"@+id/TextView01\" android:layout_width=\"wrap_content\"\
    \n                android:layout_height=\"wrap_content\" android:id=\"@+id/label\"\
    \n                android:textSize=\"30px\"></TextView>\n</LinearLayout>\n```\n\
    \nMy sample application includes an image view in the left and a text view in\
    \ the right, as the default cell in `UITableView` of iOS.\n\n```java\npublic class\
    \ MySimpleArrayAdapter extends ArrayAdapter<String> {\n   @Override\n      public\
    \ View getView(int position, View convertView, ViewGroup parent) {\n       LayoutInflater\
    \ inflater = context.getLayoutInflater();\n        View rowView = inflater.inflate(R.layout.rowlayout,\
    \ null, true);\n\n        TextView textView = (TextView) rowView.findViewById(R.id.label);\n\
    \        ImageView imageView = (ImageView) rowView.findViewById(R.id.icon);\n\
    \        textView.setText(names[position]);\n\n        // Change the icon for\
    \ Windows and iPhone\n       imageView.setImageResource(R.drawable.ok);\n\n  \
    \   return rowView;\n   }\n}\n```\n\nCreating Java objects (especially `View`\
    \ objects) consumes time and CPU, so Android reuses rows that are not displayed\
    \ any more. For example, if a row disappears off the top or the bottom of the\
    \ view, Android gives this view back to the `Adapter method` as a parameter `convertView`.\
    \ To use this in your method, you have to check first if `convertView` is not\
    \ null, then you can use it to display the next data item.\n\nAnother important\
    \ optimization to note: since the method `findViewByID()` is an expensive operation,\
    \ you should avoid using it whenever possible. Instead, you should use `setTag()`\
    \ and `getTag()` method to retrieve the necessary view.\n\nTaking into account\
    \ these facts, you can rewrite the previous source code as the following:\n\n\
    ```java\n@Override\npublic View getView(int position, View convertView, ViewGroup\
    \ parent) {\n   // ViewHolder will buffer the assess to the individual fields\
    \ of the row\n   // layout\n\n   ViewHolder holder;\n   // Recycle existing view\
    \ if passed as parameter\n   // This will save memory and time on Android\n  \
    \ // This only works if the base layout for all classes are the same\n   View\
    \ rowView = convertView;\n   if (rowView == null) {\n       LayoutInflater inflater\
    \ = context.getLayoutInflater();\n       rowView = inflater.inflate(R.layout.rowlayout,\
    \ null, true);\n       holder = new ViewHolder();\n\n       // Only findViewByID()\
    \ at the first time, then use setTag()\n       holder.textView = (TextView) rowView.findViewById(R.id.label);\n\
    \       holder.imageView = (ImageView) rowView.findViewById(R.id.icon);\n\n  \
    \     rowView.setTag(holder);\n\n    } else {\n       holder = (ViewHolder) rowView.getTag();\n\
    \    }\n\n    holder.textView.setText(names[position]);\n\n    // Change the icon\
    \ for Windows and iPhone\n    String s = names[position];\n    holder.imageView.setImageResource(R.drawable.ok);\n\
    \n     return rowView;\n}\n```\n\nAs you can see, `convertView` is reused so if\
    \ it's not null, you can use it as-is. You can also see that I created a wrapper\
    \ to contain the text view and the image view. You can contain as many views inside\
    \ the view holder as you want and name the parameter to be anything. You can imagine\
    \ the view holder as a map that has the attributes as the keys and put other views\
    \ as values.\n\n## Windows Phone\n\nWindows Phones use data binding in a different\
    \ way, which creates a huge performance and memory problem. In Windows Phone,\
    \ the UI is still reused, just as in Android and iOS; however, the data is bound\
    \ directly. This means that if you need to display 1,000 items into the `ListView`\
    \ (called `ListBox` in Windows Phone), all 1,000 items need to be created and\
    \ loaded into the memory. This works fine for a Silverlight desktop application.\
    \ But in Windows Phone the memory is more limited, so the phone can't afford to\
    \ load all 1,000 items.\n\nThe main issue with the current Windows Phone binding\
    \ is that it binds to `IEnumerables`. This can be solved using another data bind\
    \ that implements `IList`, which already supports `Count` and `IndexOf` method.\n\
    \n```csharp\n  public class MyDataSource : IList\n  {\n    const int MAX_ITEMS\
    \ = 1000;\n\n    public int Count\n    {\n      get { return MAX_ITEMS; }\n  \
    \  }\n\n    public int IndexOf(object value)\n    {\n      if (value == null)\n\
    \      {\n        Debug.WriteLine(\"IndexOf(null)\");\n        return -1;\n  \
    \    }\n\n      DataItem item = (DataItem)value;\n      return item.Index;\n \
    \   }\n\n    public object this[int index]\n    {\n      get\n      {\n      \
    \  DataItem itemToReturn = new DataItem { Index = index, Text = \"NEW ITEM\" };\n\
    \        return itemToReturn;\n      }\n      set\n      {\n        throw new\
    \ NotImplementedException();\n      }\n    }\n\n    // None of the other IList\
    \ stuff is necessary for data virtualization\n    #region Unimplemented stuff\n\
    \    // Fill in non-implemented methods here\n    #endregion\n  }\n\n  public\
    \ class DataItem\n  {\n    public int Index { get; internal set; }\n    public\
    \ string Text { get; set; }\n    public override string ToString()\n    {\n  \
    \    return Text + \" [\" + Index + \"]\";\n    }\n  }\n```\n\nAs an exercise,\
    \ you should integrate this code with the main `ListBox` code that you use on\
    \ the UI."
  raw: '### ListView Performance


    All ListViews (or TableViews) in iOS, Android, and Windows Phone share similar
    performance issues. You always need to return data back to the list as soon as
    possible; otherwise, user will see a lot of jerkiness when scrolling down. Loading
    images will need to be asynchronous so user can scroll the list smoothly and see
    data first. Whenever the image is loaded, it will be displayed in the list later.


    There are some common issues with view rendering for all three platforms:


    *   You should always use opaque views whenever possible.

    *   You should not use a complicated, nested list view structure because it starts
    to display slowly.


    There are specific issues for each platform when it comes to this ListView scrolling
    issue. To have a customized ListView, Android and Windows Phone use a different
    approach to displaying data into the ListView. The way Android does it is similar
    to iPhone where you return data and view only if necessary. Windows Phone uses
    an automatic binding mechanism to bind data into the view. The Windows Phone way
    is easier to implement for developers but it causes more performance issues than
    the Android way.


    With Windows Phone, when you have a big array of objects, you will soon have a
    problem with memory and performance because the operating system can''t store
    more objects into the memory and fetch them out to bind with the ListView. This
    is the main difference between ListView in iPhone, Android, and Windows Phone.
    In the first two platforms, you only need to decide the size of the list; while
    scrolling, you can get data to display. Memory should not be an issue with iOS
    TableView when you can discard the unused objects in the array and only store
    necessary objects. I will explain briefly how both platforms are implemented and
    how to solve the problems with both platforms.


    #### Android


    In Android, you can map your data with the default layout without any difficulty.


    `String [] cities= new String[] {"Melbourne", "Victoria", "Adealide"};`

    `this.setListAdapter(new ArrayAdapter<String>(this, R.layout.list_item, cities);`


    However, if you need to come up with a more complex layout, you can use your own
    adapter to map the data with the view.


    `<?xml version="1.0" encoding="utf-8"?>`

    `<LinearLayout`

    `        android:layout_width="wrap_content" android:layout_height="wrap_content">`

    `        <ImageView android:id="@+id/icon" android:layout_height="wrap_content"`

    `                android:src="@drawable/icon" android:layout_width="22px">`

    `        </ImageView>`

    `        <TextView android:text="@+id/TextView01" android:layout_width="wrap_content"`

    `                android:layout_height="wrap_content" android:id="@+id/label"`

    `                android:textSize="30px"></TextView>`

    `</LinearLayout>`


    My sample application includes an image view in the left and a text view in the
    right, as the default cell in `UITableView` of iOS.


    `public class MySimpleArrayAdapter extends ArrayAdapter<String> {`

    `   @Override`

    `      public View getView(int position, View convertView, ViewGroup parent) {`

    `       LayoutInflater inflater = context.getLayoutInflater();`

    `        View rowView = inflater.inflate(R.layout.rowlayout, null, true);`


    `        TextView textView = (TextView) rowView.findViewById(R.id.label);`

    `        ImageView imageView = (ImageView) rowView.findViewById(R.id.icon);`

    `        textView.setText(names[position]);`


    `        // Change the icon for Windows and iPhone`

    `       imageView.setImageResource(R.drawable.ok);`


    `     return rowView;`

    `   }`

    `}`


    Creating Java objects (especially View objects) consumes time and CPU, so Android
    reuses rows that are not displayed any more. For example, if a row disappears
    off the top or the bottom of the view, Android gives this view back to the `Adapter
    method` as a parameter `convertView.` To use this in your method, you have to
    check first if `convertView` is not null, then you can use it to display the next
    data item.


    Another important optimization to note: since the method `findViewByID()` is an
    expensive operation, you should avoid using it whenever possible. Instead, you
    should use `setTag()` and `getTag()` method to retrieve the necessary view.


    Taking into account these facts, you can rewrite the previous source code as the
    following:


    `@Override`

    `public View getView(int position, View convertView, ViewGroup parent) {`

    `   // ViewHolder will buffer the assess to the individual fields of the row`

    `   // layout`


    `   ViewHolder holder;`

    `   // Recycle existing view if passed as parameter`

    `   // This will save memory and time on Android`

    `   // This only works if the base layout for all classes are the same`

    `   View rowView = convertView;`

    `   if (rowView == null) {`

    `       LayoutInflater inflater = context.getLayoutInflater();`

    `       rowView = inflater.inflate(R.layout.rowlayout, null, true);`

    `       holder = new ViewHolder();`


    `       // Only findViewByID() at the first time, then use setTag()`

    `       holder.textView = (TextView) rowView.findViewById(R.id.label);`

    `       holder.imageView = (ImageView) rowView.findViewById(R.id.icon);`


    `       rowView.setTag(holder);`


    `    } else {`

    `       holder = (ViewHolder) rowView.getTag();`

    `    }`


    `    holder.textView.setText(names[position]);`


    `    // Change the icon for Windows and iPhone`

    `    String s = names[position];`

    `    holder.imageView.setImageResource(R.drawable.ok);`


    `     return rowView;`

    `}`


    As you can see, `convertView` is reused so if it''s not null, you can use it as-is.
    You can also see that I created a wrapper to contain the text view and the image
    view. You can contain as many views inside the view holder as you want and name
    the parameter to be anything. You can imagine the view holder as a map that has
    the attributes as the keys and put other views as values.


    #### Windows Phone


    Windows Phones use data binding in a different way, which creates a huge performance
    and memory problem. In Windows Phone, the UI is still reused, just as in Android
    and iOS; however, the data is bound directly. This means that if you need to display
    1,000 items into the ListView (called ListBox in Windows Phone), all 1,000 items
    need to be created and loaded into the memory. This works fine for a Silverlight
    desktop application. But in Windows Phone the memory is more limited, so the phone
    can''t afford to load all 1,000 items.


    The main issue with the current Windows Phone binding is that it binds to `IEnumerables`.
    This can be solved using another data bind that implements `IList`, which already
    supports `Count` and `IndexOf` method.


    `  public class MyDataSource : IList`

    `  {`

    `    const int MAX_ITEMS = 1000;`


    `    public int Count`

    `    {`

    `      get { return MAX_ITEMS; }`

    `    }`


    `    public int IndexOf(object value)`

    `    {`

    `      if (value == null)`

    `      {`

    `        Debug.WriteLine("IndexOf(null)");`

    `        return -1;`

    `      }`


    `      DataItem item = (DataItem)value;`

    `      return item.Index;`

    `    }`


    `    public object this[int index]`

    `    {`

    `      get`

    `      {`

    `        DataItem itemToReturn = new DataItem { Index = index, Text = "NEW ITEM"
    };`

    `        return itemToReturn;`

    `      }`

    `      set`

    `      {`

    `        throw new NotImplementedException();`

    `      }`

    `    }`


    `    // None of the other IList stuff is necessary for data virtualization`

    `    #region Unimplemented stuff`

    `    // Fill in non-implemented methods here`

    `    #endregion`

    `  }`


    `  public class DataItem`

    `  {`

    `    public int Index { get; internal set; }`

    `    public string Text { get; set; }`

    `    public override string ToString()`

    `    {`

    `      return Text + " [" + Index + "]";`

    `    }`

    `  }`


    As an exercise, you should integrate this code with the main ListBox code that
    you use on the UI.'
  trans: "\n# ListView 性能优化\n\n所有 iOS、Android 和 Windows Phone 平台上的 `ListView`（或 `TableView`）都面临相似的性能问题。你始终需要尽快将数据返回给列表；否则，用户在滚动列表时会看到明显的卡顿。图片加载必须采用异步方式，这样用户才能流畅滚动列表并先看到数据。当图片加载完成后，再在列表中显示。\n\
    \n以下是三个平台在视图渲染方面常见的共同问题：\n\n*   应始终尽可能使用不透明视图。\n*   不应使用复杂的嵌套列表视图结构，因为这会导致显示速度变慢。\n\
    \n针对 `ListView` 滚动问题，每个平台都有其特定的处理方式。要实现自定义 `ListView`，Android 和 Windows Phone\
    \ 采用不同的方法将数据显示到 `ListView` 中。Android 的处理方式类似于 iPhone，只在必要时返回数据和视图。Windows Phone\
    \ 则使用一种自动绑定机制将数据绑定到视图。这种方式对开发者来说更易于实现，但相比 Android 的方式，会引发更多的性能问题。\n\n对于 Windows\
    \ Phone 而言，当你拥有一个大型对象数组时，很快就会遇到内存和性能问题，因为操作系统无法在内存中存储更多对象并将其取出绑定到 `ListView`。这是\
    \ iPhone、Android 和 Windows Phone 中 `ListView` 的主要区别。在前两个平台中，你只需决定列表的大小；在滚动时，你可以获取数据并进行显示。对于\
    \ iOS 的 `TableView`，当你能够丢弃数组中未使用的对象并只存储必要对象时，内存不应成为问题。我将简要解释这两个平台的实现方式以及如何解决各自的问题。\n\
    \n## Android\n\n在 Android 中，你可以毫无困难地将数据映射到默认布局。\n\n```java\nString [] cities=\
    \ new String[] {\"墨尔本\", \"维多利亚\", \"阿德莱德\"};\nthis.setListAdapter(new ArrayAdapter<String>(this,\
    \ R.layout.list_item, cities));\n```\n\n然而，如果你需要实现更复杂的布局，你可以使用自己的适配器将数据映射到视图。\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n        android:layout_width=\"\
    wrap_content\" android:layout_height=\"wrap_content\">\n        <ImageView android:id=\"\
    @+id/icon\" android:layout_height=\"wrap_content\"\n                android:src=\"\
    @drawable/icon\" android:layout_width=\"22px\">\n        </ImageView>\n      \
    \  <TextView android:text=\"@+id/TextView01\" android:layout_width=\"wrap_content\"\
    \n                android:layout_height=\"wrap_content\" android:id=\"@+id/label\"\
    \n                android:textSize=\"30px\"></TextView>\n</LinearLayout>\n```\n\
    \n我的示例应用在左侧包含一个图像视图，右侧包含一个文本视图，类似于 iOS 中 `UITableView` 的默认单元格。\n\n```java\npublic\
    \ class MySimpleArrayAdapter extends ArrayAdapter<String> {\n   @Override\n  \
    \    public View getView(int position, View convertView, ViewGroup parent) {\n\
    \       LayoutInflater inflater = context.getLayoutInflater();\n        View rowView\
    \ = inflater.inflate(R.layout.rowlayout, null, true);\n\n        TextView textView\
    \ = (TextView) rowView.findViewById(R.id.label);\n        ImageView imageView\
    \ = (ImageView) rowView.findViewById(R.id.icon);\n        textView.setText(names[position]);\n\
    \n        // 为 Windows 和 iPhone 更改图标\n       imageView.setImageResource(R.drawable.ok);\n\
    \n     return rowView;\n   }\n}\n```\n\n创建 Java 对象（尤其是 `View` 对象）会消耗时间和 CPU，因此\
    \ Android 会重用不再显示的行。例如，如果某行从视图的顶部或底部消失，Android 会将该视图作为参数 `convertView` 返回给 `Adapter`\
    \ 方法。要在你的方法中使用它，你必须首先检查 `convertView` 是否不为 null，然后才能使用它来显示下一个数据项。\n\n另一个需要注意的重要优化点是：由于\
    \ `findViewByID()` 方法是一种开销很大的操作，应尽可能避免使用。相反，你应该使用 `setTag()` 和 `getTag()` 方法来获取所需的视图。\n\
    \n考虑到这些因素，你可以将之前的源代码重写如下：\n\n```java\n@Override\npublic View getView(int position,\
    \ View convertView, ViewGroup parent) {\n   // ViewHolder 将缓冲对行布局中各个字段的访问\n\n\
    \   ViewHolder holder;\n   // 如果作为参数传递，则重用现有视图\n   // 这将节省 Android 上的内存和时间\n \
    \  // 这仅在所有类的基本布局相同时有效\n   View rowView = convertView;\n   if (rowView == null)\
    \ {\n       LayoutInflater inflater = context.getLayoutInflater();\n       rowView\
    \ = inflater.inflate(R.layout.rowlayout, null, true);\n       holder = new ViewHolder();\n\
    \n       // 仅在第一次时调用 findViewByID()，然后使用 setTag()\n       holder.textView = (TextView)\
    \ rowView.findViewById(R.id.label);\n       holder.imageView = (ImageView) rowView.findViewById(R.id.icon);\n\
    \n       rowView.setTag(holder);\n\n    } else {\n       holder = (ViewHolder)\
    \ rowView.getTag();\n    }\n\n    holder.textView.setText(names[position]);\n\n\
    \    // 为 Windows 和 iPhone 更改图标\n    String s = names[position];\n    holder.imageView.setImageResource(R.drawable.ok);\n\
    \n     return rowView;\n}\n```\n\n如你所见，`convertView` 被重用了，所以如果它不为 null，你可以直接使用它。你还可以看到我创建了一个包装器来包含文本视图和图像视图。你可以根据需要在视图持有者中包含任意多个视图，并将参数命名为任何名称。你可以将视图持有者想象成一个映射，以属性为键，并将其他视图作为值。\n\
    \n## Windows Phone\n\nWindows Phone 使用不同的方式实现数据绑定，这导致了严重的性能和内存问题。在 Windows Phone\
    \ 中，UI 仍然会被重用，就像在 Android 和 iOS 中一样；但是，数据是直接绑定的。这意味着，如果你需要在 `ListView`（在 Windows\
    \ Phone 中称为 `ListBox`）中显示 1000 个项目，那么所有 1000 个项目都必须被创建并加载到内存中。这对于 Silverlight\
    \ 桌面应用程序来说是可以正常工作的。但是在 Windows Phone 中，内存更加有限，因此手机无法承受加载所有 1000 个项目。\n\n当前 Windows\
    \ Phone 绑定的主要问题在于它绑定到 `IEnumerables` 接口。这可以通过使用另一个实现了 `IList` 接口的数据绑定来解决，该接口已经支持\
    \ `Count` 和 `IndexOf` 方法。\n\n```csharp\n  public class MyDataSource : IList\n\
    \  {\n    const int MAX_ITEMS = 1000;\n\n    public int Count\n    {\n      get\
    \ { return MAX_ITEMS; }\n    }\n\n    public int IndexOf(object value)\n    {\n\
    \      if (value == null)\n      {\n        Debug.WriteLine(\"IndexOf(null)\"\
    );\n        return -1;\n      }\n\n      DataItem item = (DataItem)value;\n  \
    \    return item.Index;\n    }\n\n    public object this[int index]\n    {\n \
    \     get\n      {\n        DataItem itemToReturn = new DataItem { Index = index,\
    \ Text = \"新项目\" };\n        return itemToReturn;\n      }\n      set\n      {\n\
    \        throw new NotImplementedException();\n      }\n    }\n\n    // 数据虚拟化不需要\
    \ IList 的其他任何内容\n    #region 未实现的部分\n    // 在此处填写未实现的方法\n    #endregion\n  }\n\
    \n  public class DataItem\n  {\n    public int Index { get; internal set; }\n\
    \    public string Text { get; set; }\n    public override string ToString()\n\
    \    {\n      return Text + \" [\" + Index + \"]\";\n    }\n  }\n```\n\n作为练习，你应该将此代码与你用于\
    \ UI 的 `ListBox` 主代码集成。\n"
- fmt: "### Data Caching\n\nAll algorithms and terms that you learned in [Chapter\
    \ 3](#Chapter03.html#ch3) for iOS programming can be applied for Android and Windows\
    \ Phone without any problems. What you should learn are techniques related directly\
    \ to Windows Phone and Android, such as where to store your cache, how often you\
    \ should cache, and in what format you should cache your data.\n\nThe memory caching\
    \ part should be no different from iOS either because the hardware specifications\
    \ for the three platforms are not different. You can have the same memory caching\
    \ algorithms as the iOS approach. I will focus on how to utilize the file storage\
    \ to get the best performance.\n\n#### Android\n\nThere are many places where\
    \ you can store the cache data.\n\n*   **`SharedPreferences`**: This is exactly\
    \ the same as `NSUserDefaults`. You can store primitive data here. It is usually\
    \ used for settings storage or lightweight storage.\n*   **Internal storage**:\
    \ You can store private data in device's storage. It's actually a file area inside\
    \ the internal storage. Other applications can't access this storage.\n*   **External\
    \ storage**: In most Android phones, users can have more storage by having a removable\
    \ storage media (such as an SD card). Files saved here are public to the world\
    \ and can be modified even by the user. The user can enable USB mass storage to\
    \ transfer files to their computers.\n*   **`SQLite`**: This is a database, and\
    \ you access it using Java and SQL as normal without any much difference. That's\
    \ why if you choose to store your data in SQLite Database in iPhone, you can actually\
    \ reuse it here.\n\n##### Internal Storage\n\nFiles are stored here for longer\
    \ term and are private to only your application. You can store a file in this\
    \ storage area by using the following code:\n\n```\nString FILENAME = \"hello_file\"\
    ;\nString string = \"hello world!\";\n\nFileOutputStream fos = openFileOutput(FILENAME,\
    \ Context.MODE_PRIVATE);\nfos.write(string.getBytes());\nfos.close();\n```\n\n\
    This code writes the string into the file and then saves that file.\n\nTo save\
    \ data in a cache folder that can be deleted usually by the operating system without\
    \ letting you know, use the path inside `getCacheDir()`.\n\n**NOTE:** To save\
    \ your files into the application, similar to the way the application bundle does\
    \ in iOS, you can save into the project directory `res/raw/`. You can read the\
    \ file by using `openRawResource()` but you can't write into these files.\n\n\
    ##### External Storage\n\nThis is removable storage so you will need to check\
    \ if that storage media is attached to the current device or not.\n\n```\nString\
    \ state = Environment.getExternalStorageState();\nif (Environment.MEDIA_MOUNTED.equals(state))\
    \ {\n  // YOU CAN READ AND WRITE DATA\n} else if (Environment.MEDIA_MOUNTED_READ_ONLY.equals(state))\
    \ {\n  // YOU CAN ONLY READ\n} else {\n  // YOU CAN NEITHER READ OR WRITE\n}\n\
    ```\n\nThis media has a much bigger storage capacity so you can save more data\
    \ in it. However, user can mistakenly delete data, or not attach the media to\
    \ the device. These files will also be deleted when your application is uninstalled.\
    \ If you don't want that to happen or you want to share the data with other applications,\
    \ you can save them into directories at the root by calling `getExternalStoragePublicDirectory()`.\
    \ You also have a specific cache directory in the external media where you should\
    \ save unimportant cache data: `getExternalCacheDir()`.\n\n##### SQLite Database\n\
    \nStoring in a database can lead to complex problems but it can also help solve\
    \ many performance issues. There are many techniques to help you improve the performance\
    \ of database access, such as better indexing, partitioning database, and unique\
    \ key. I won't cover database optimization in depth, as it is a very large and\
    \ specialized topic. Suffice it to say that SQLite is broadly similar to any other\
    \ SQL database.\n\n#### Windows Phone\n\nMicrosoft released a new update to Windows\
    \ Phone that includes a local database. If you start building a new application\
    \ and want to use a database, you can now do so. Otherwise, if your application\
    \ is using some other storage mechanism intensively, you may choose to optimize\
    \ it rather than rebuilding the whole database.\n\nIn Windows Phone, there are\
    \ also four main approaches to storing files.\n\n*   **`IsolatedStorageSettings`**:\
    \ Key value storage, exactly the same as `NSUserDefaults`.\n    ```\n    IsolatedStorageSettings\
    \ appSettings = IsolatedStorageSettings.ApplicationSettings;\n    appSettings.Add(\"\
    email\", \"myemail@gmail.com\");\n    var myEmail = (string)appSettings[\"email\"\
    ];\n    ```\n*   **`IsolatedStorageFile`**: Used in Windows Phone to store files\
    \ into the file system. It doesn't have a default directory for specific purpose\
    \ like Cache or Public. You need to create your own directory to handle the storage\
    \ process.\n*   **XML storage**: For the old applications, you may need to choose\
    \ the XML as your main storage mechanism if you don't have database support.\n\
    *   **Local database**: The new release with Mango will have local database support\
    \ for Windows Phone. Many problems with local storage performance will be solved\
    \ with this new release.\n\n##### IsolatedStorageFile\n\nFile storage in Windows\
    \ Phone is simple; you have the whole application directory to do whatever you\
    \ want. The operating system will not take care of anything like automatically\
    \ deleting or restricting the storage limit on this directory.\n\n```\nIsolatedStorageFile\
    \ myStore = IsolatedStorageFile.GetUserStoreForApplication();\nmyStore.CreateDirectory(\"\
    Cache\");\n\n// Specify the file path and options.\nusing (var isoFileStream =\
    \ new IsolatedStorageFileStream(\"Text1.txt\", FileMode.OpenOrCreate, myStore))\n\
    {\n  //Write the data\n  using (var isoFileWriter = new StreamWriter(isoFileStream))\n\
    \  {\n    isoFileWriter.WriteLine(txtWrite.Text);\n  }\n}\n```\n\nTo read the\
    \ file, use this code:\n\n```\nusing (var isoFileStream = new IsolatedStorageFileStream(\"\
    Cache\\\\Text1.txt \", FileMode.Open, myStore))\n{\n  // Read the data.\n  using\
    \ (var isoFileReader = new StreamReader(isoFileStream))\n  {\n    txtRead.Text\
    \ = isoFileReader.ReadLine();\n  }\n}\n```\n\nYou need to specify the read/write\
    \ permission that you want to read, write, or append data in.\n\n##### XML Storage\n\
    \nUsing XML to store and then LINQ XML to read/write to the XML format is a painful\
    \ process and can significantly hurt the performance of your Windows Phone application.\n\
    \nThe main performance issue with storage using LINQ for XML is that you need\
    \ to load or save the whole XML every time you need to modify or read your data.\
    \ This is because LINQ uses DOM to access the data. It also causes memory issues\
    \ when you store the whole big XML file into the memory to access it. If you have\
    \ a small XML file, it's not any trouble.\n\nThere are two ways developers work\
    \ around this XML issue.\n\n*   You have a main file containing the main structure\
    \ of all of your data. Then you have several smaller files to store data about\
    \ each main data item. For example, to have an RSS reader, you can store all the\
    \ channel information into the main file, then have a separate file for each channel.\n\
    *   You only cache the most recent data. Any data that is older than 10 days may\
    \ be deleted. This will reduce the amount of data you have in your local XML file\
    \ and reduce the complexity of your work. The drawback is that you need to redownload\
    \ the old data if necessary.\n\n##### Database Support\n\nWith the new Mango release,\
    \ Windows Phone will have support for local database storage. You will soon have\
    \ all the powers of indexing, partitioning, key, and random access to the database.\
    \ With this new release, you should use LINQ to SQL to have good code reuse, because\
    \ LINQ to SQL and LINQ to XML share many codebase items."
