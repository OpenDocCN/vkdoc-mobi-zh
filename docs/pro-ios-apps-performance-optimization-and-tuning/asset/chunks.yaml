    \ that object is already autoreleased. If you run a loop that creates too many\
    \ autoreleased objects, you will soon run out of memory.\n\nThis code demonstrates\
    \ the best way to do memory management in looping:\n\n`- (void)doSomethingWithAutoRelease\
    \ {`\n`      for (int i = 0; i < 1000; i++) {`\n`         @autoreleasepool {`\n\
    `         Product *product = [Product productWithItemID:@\"\"];`\n`         //\
    \ process and display the product here`\n`         }`\n`      }   `\n`}`\n\nAfter\
    \ the loop finishes and at the end of the `@autoreleasepool` block, all of autoreleased\
    \ objects are released. This way you can control and release all unused objects\
    \ and take your memory back.\n\n### Instruments\n\nInstruments were covered in\
    \ [Chapter 2](#Chapter02.html#ch2) when I discussed benchmarking using devices\
    \ and simulators. In this section, I will briefly discuss common problems plus\
    \ some more advanced problems that can affect what memory management approach\
    \ you should choose.\n\nThere are four main instruments that you need to use most\
    \ of the time.\n\n*   Static Analyzer\n*   Leaks Instrument\n*   Zombie\n*   Object\
    \ allocation\n\n#### Static Analyzer\n\nStatic Analyzer is a good to quickly check\
    \ for small and obvious memory leaks. For example, if you alloc a new object and\
    \ you don't release it inside that method, as shown in [Figure 7–10](#Chapter07.html#fig_7_10),\
    \ the Static Analyzer can figure it out quickly.\n\n![images](images/0710.jpg)\n\
    \n**Figure 7–10.** Static Analyzer shows a memory leak\n\n#### Leak Instrument\n\
    \nThe Leaks Instrument is more complicated and takes some time to run and analyze\
    \ but it gives you the best results according to your actions. It can detect most\
    \ of memory leaks when it keeps track of all data in running time\n\n![images](images/0711.jpg)\n\
    \n**Figure 7–11.** *Leak results from the instrument*\n\nThe Leaks Instrument\
    \ can give you detailed results of list of leaked objects, as shown in [Figure\
    \ 7–11](#Chapter07.html#fig_7_11).\n\n![images](images/0712.jpg)\n\n**Figure 7–12.**\
    \ *Leak details shown by Leaks Instrument*\n\nIt can also show the exact line\
    \ of code that causes the leaks ([Figure 7–12](#Chapter07.html#fig_7_12)).\n\n\
    #### Zombie\n\nZombie helps you check for the part of the code that caused a crash,\
    \ `EXEC_BAD_ACCESS` for your application. This is really useful if your application\
    \ keeps crashing but you can't discover the problem through logging or verifying\
    \ your code.\n\nAs shown in [Figure 7–13](#Chapter07.html#fig_7_13), Zombie will\
    \ show you a list of actions, including `malloc`, `autorelease`, `retain`, and\
    \ `release` when the app crashes. You can track the `autorelease` and `release`\
    \ methods using Zombie.\n\n![images](images/0713.jpg)\n\n**Figure 7–13.** *Results\
    \ from a crash tracked by Zombie Instrument*\n\nZombie can show you the place\
    \ for each action, such as where the object is allocated and where the object\
    \ is autoreleased or released.\n\n#### Object Allocation\n\nObject allocation\
    \ is the last tool related to memory that I want to introduce here. It shows all\
    \ the memory usage over time when your application is running. This tool is really\
    \ helpful when the memory usage grows so much and you need to trace back to the\
    \ group of lines that created so much memory.\n\n![images](images/0714.jpg)\n\n\
    **Figure 7–14.** *Results of memory usage from object allocations*\n\n[Figure\
    \ 7–14](#Chapter07.html#fig_7_14) shows you the line of code, time the object\
    \ is created, and the caller that creates the object.\n\n#### Memory Warning Levels\n\
    \nThe last thing I want to discuss about memory is memory warnings. When your\
    \ memory usage grows to a certain point, the iOS environment will try to tell\
    \ you this by calling the `didReceiveMemoryWarning` method on view controller\
    \ objects. You will have to react to this memory warning by freeing some memory.\n\
    \n**NOTE:** There are other ways to receive memory warnings from inside your application:\
    \ the application delegate receives the memory warning and calls appropriate methods\
    \ in other objects or your objects can register to receive memory warning via\
    \ `NSNotification.`\n\nThe first memory warning (memory warning level 1) is the\
    \ most important one: it means that your code has to reduce memory usage fast.\
    \ Otherwise, your app will receive a memory warning level 2 and it will almost\
    \ certainly crash.\n\n### Summary\n\nMemory has a big effect on the performance\
    \ of your app. It can also make your app crash if you don't use it properly. In\
    \ this chapter, you learned important concepts about memory management in objective-C\
    \ that will help you avoid memory leak issues and application crashes. The `UIViewController`\
    \ life cycle is also important as it relates to managing and controlling memory\
    \ usage. It also affects how users feel about the performance and experience of\
    \ the application. Finally, you learned the differences between `autorelease`\
    \ and `release` when dealing with memory and when you should use one instead of\
    \ the other.\n\n**EXERCISES**\n\n**1.** 1\\. List the differences between the\
    \ `autorelease` and `release` methods.\n\n**2.** 2\\. Use the instruments covered\
    \ in this chapter in a real-world situation.\n\n**3.** 3\\. Implement the `copy`\
    \ method for an existing object in your project.\n\n## Chapter 8\n\n## Integrate\
    \ Multithreading and Efficient Memory Usage for Multitasking Apps Performance\n\
    \nIn this chapter, you will learn about:\n\n*   What Apple means by multitasking.\n\
    *   The multitasking life cycle and how to handle the benefits and costs\n*  \
    \ Different background services, such as\n    *   Audio\n    *   VOIP\n    * \
    \  Location\n    *   Background processing\n*   What you should know to make your\
    \ app multitask well.\n\nIn this chapter, you will learn how to take advantage\
    \ of multitasking in iPhone so that the application can process data in background\
    \ without the user’s notice. This must be balanced with using as little CPU processing\
    \ time or memory as possible; otherwise, you may severely impact the battery life\
    \ or worse—be killed by the iOS."
  trans: "\n# 自动释放池与栈\n\n`Autorelease` 池存储在栈中，通常被认为是可嵌套的。每当你创建一个新的 `autorelease` 池时，它会被推入栈顶。所有新加入\
    \ `autoreleased` 的对象也会被推入这个新的 `autorelease` 池。\n\n如以下代码所示，方法 `doSomething` 内部的对象（如\
    \ `myArray` 和 `myString`）将被存储在 `myPool` 中，而不是应用的默认主池：\n\n```\n- (void)doSomething\
    \ {\n  @autoreleasepool {\n    NSArray *myArray = [NSArray array];\n    NSString\
    \ *myString = [NSString string];\n  }\n}\n```\n\n而主池则照常位于 `main` 方法内部：\n\n```\n\
    int main(int argc, char *argv[]) {\n  @autoreleasepool {\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil, nil);\n  }\n  return retVal;\n}\n```\n\n在 `@autoreleasepool` 块的末尾，所有存储在该池中的\
    \ `autoreleased` 对象将在事件生命周期结束时被释放。\n\n图 7–9 展示了这一概念。这是一个关乎良好性能的重要概念——学会尽快释放对象。\n\
    \n![images](img/0709.jpg)\n\n**图 7–9.** 栈中的自动释放池\n\n## 自动释放池与线程\n\n当创建一个新线程时，你需要同时创建一个新的\
    \ `autorelease` 池对象，并将该池关联到新线程。因此，当线程停止时，你的 `autorelease` 池会被释放，所有 `autoreleased`\
    \ 对象也会随之释放。我在第 6 章中深入讨论过这个主题，如果你需要帮助理解此概念，请回顾该章节。\n\n## 自动释放池对性能的影响\n\n对于使用 ARC\
    \ 编写的代码，旧的内存管理规则依然适用。如果你调用的方法名称中不包含 `new`、`alloc` 和 `copy`，那么该返回对象已经是被 `autoreleased`\
    \ 的。如果你运行一个循环，并创建了过多的 `autoreleased` 对象，很快就会耗尽内存。\n\n以下代码演示了在循环中执行内存管理的最佳实践：\n\
    \n```\n- (void)doSomethingWithAutoRelease {\n  for (int i = 0; i < 1000; i++)\
    \ {\n    @autoreleasepool {\n      Product *product = [Product productWithItemID:@\"\
    \"];\n      // 在此处处理和展示产品\n    }\n  }\n}\n```\n\n在循环结束后以及 `@autoreleasepool` 块的末尾，所有\
    \ `autoreleased` 的对象都会被释放。这样，你就可以控制并释放所有未使用的对象，从而回收内存。\n\n# 工具（Instruments）\n\n\
    `Instruments` 在第 2 章讨论使用设备和模拟器进行基准测试时已有介绍。在本节中，我将简要讨论常见问题以及一些更高级的问题，这些问题会影响你应该选择哪种内存管理方法。\n\
    \n大多数情况下，你需要使用以下四种主要工具：\n\n- 静态分析器 (Static Analyzer)\n- 泄漏检测工具 (Leaks Instrument)\n\
    - 僵尸对象检测 (Zombie)\n- 对象分配追踪 (Object allocation)\n\n## 静态分析器\n\n静态分析器非常适合快速检查小型、明显的内存泄漏。例如，如果你\
    \ `alloc` 了一个新对象但在该方法中没有释放它，如图 图 7–10 所示，静态分析器可以快速识别出来。\n\n![images](img/0710.jpg)\n\
    \n**图 7–10.** 静态分析器显示的内存泄漏\n\n## 泄漏检测工具\n\n泄漏检测工具更为复杂，运行和分析需要一些时间，但能根据你的操作给出最佳结果。当它追踪所有运行时数据时，可以检测到大部分内存泄漏。\n\
    \n![images](img/0711.jpg)\n\n**图 7–11.** 泄漏检测工具的分析结果\n\n泄漏检测工具能提供泄漏对象的详细列表结果，如\
    \ 图 7–11 所示。\n\n![images](img/0712.jpg)\n\n**图 7–12.** 泄漏检测工具显示的泄漏详情\n\n它还能指出导致泄漏的确切代码行（图\
    \ 7–12）。\n\n## 僵尸对象检测\n\n`Zombie` 能帮助你检查导致应用崩溃（`EXEC_BAD_ACCESS`）的代码部分。如果你的应用持续崩溃，而你又无法通过日志记录或代码验证发现问题，这个工具非常有用。\n\
    \n如 图 7–13 所示，当应用崩溃时，`Zombie` 会显示一系列操作，包括 `malloc`、`autorelease`、`retain` 和 `release`。你可以使用\
    \ `Zombie` 追踪 `autorelease` 和 `release` 方法。\n\n![images](img/0713.jpg)\n\n**图\
    \ 7–13.** Zombie 工具追踪到的崩溃结果\n\n`Zombie` 可以显示每个操作的所在位置，例如对象在何处被分配，以及对象在何处被 `autoreleased`\
    \ 或释放。\n\n## 对象分配追踪\n\n对象分配追踪是我想在这里介绍的最后一个与内存相关的工具。它显示应用运行时所有内存使用量的变化情况。当内存使用量增长过大，你需要追溯到创建大量内存的那组代码行时，这个工具非常有用。\n\
    \n![images](img/0714.jpg)\n\n**图 7–14.** 对象分配追踪的内存使用结果\n\n图 7–14 向你展示了代码行、对象创建时间以及创建对象的调用者。\n\
    \n## 内存警告级别\n\n我想讨论的最后一个关于内存的话题是内存警告。当你的内存使用量增长到一定程度时，iOS 环境会尝试通过调用视图控制器对象上的 `didReceiveMemoryWarning`\
    \ 方法来通知你。你必须通过释放部分内存来响应此内存警告。\n\n**注意：** 还有其他方式可以在应用内部接收内存警告：应用代理会接收内存警告并调用其他对象中的适当方法，或者你的对象可以通过\
    \ `NSNotification` 注册以接收内存警告。\n\n第一次内存警告（内存警告级别 1）是最重要的：它意味着你的代码必须快速减少内存使用量。否则，你的应用将收到内存警告级别\
    \ 2，而且这几乎肯定会导致崩溃。\n\n# 总结\n\n内存对应用的性能有很大影响。如果使用不当，还可能导致应用崩溃。在本章中，你学习了 Objective-C\
    \ 中关于内存管理的重要概念，这些概念将帮助你避免内存泄漏问题和应用崩溃。`UIViewController` 的生命周期同样重要，因为它关系到管理和控制内存使用，也影响用户对应用性能和体验的感受。最后，你学习了在处理内存问题时\
    \ `autorelease` 和 `release` 之间的区别，以及何时应该使用其中一个而非另一个。\n\n**练习**\n\n1.  列出 `autorelease`\
    \ 和 `release` 方法之间的区别。\n\n2.  在真实场景中使用本章介绍的检测工具。\n\n3.  为你项目中的现有对象实现 `copy` 方法。\n\
    \n# 第 8 章\n\n# 集成多线程与高效内存使用以提升多任务应用性能\n\n在本章中，你将学习：\n\n- Apple 对多任务的理解。\n- 多任务生命周期以及如何处理其利弊。\n\
    - 不同的后台服务，例如：\n  - 音频\n  - VOIP\n  - 定位\n  - 后台处理\n- 为使你的应用良好地支持多任务，你需要了解的内容。\n\
    \n在本章中，你将学习如何利用 iPhone 的多任务处理能力，使得应用程序能够在用户无感知的情况下在后台处理数据。这必须与尽可能少地消耗 CPU 处理时间或内存相平衡；否则，你可能会严重影响电池寿命，或者更糟——被\
    \ iOS 系统终止。\n"
- fmt: '### What is Multitasking in iPhone?


    From the user’s perspective, multitasking means that she is using several applications
    at the same time and can switch from one to another at will. In iOS 3.2 and below,
    whenever a user quit an app, the app closed, and when user opened it again, the
    app needed to reload. This was a problem for two reasons: the wait was long and
    the app forgot whatever she just did ([Figure 8–1](#Chapter08.html#fig_8_1)).


    ![images](images/0801.jpg)


    **Figure 8–1.** *How an app in older versions of iOS behaves when a user quits
    and reopens*


    Since iOS 4.0, the app is not loaded again from the start so it doesn’t take much
    time for the user to switch from one app to another. Apple hopes that the user
    will perceive the multitasking feature to be as powerful as that of a desktop
    app. From the developer’s side, the app is actually put into the background and
    all states are saved. As you can see in [Figure 8–2](#Chapter08.html#fig_8_2),
    when the user opens the app again, the state and data are quickly loaded and restored
    to the previous position.


    ![images](images/0802.jpg)


    **Figure 8–2.** *How an app in iOS 4.0 behaves when a user quits and reopens*


    ### Multitasking Life Cycle


    It would be useful for you to know the process of the old iOS, which can help
    you to understand about the current mechanism of the iOS4 and above. I will first
    explain the previous mechanism where multitasking didn’t exist. The app is started
    by calling `application:didFinishLaunchingWithOptions:`, and then the event loop
    is run to catch all the events and to display the UI (see [Figure 8–3](#Chapter08.html#fig_8_3)).
    When the user quits the application, the whole app is closed and the method `applicationWillTerminate`
    is called. The next time the user opens the application, the method `application:didFinishLaunchingWithOptions:`
    is called again.


    ![images](images/0803.jpg)


    **Figure 8–3.** *Application life cycle for the old iOS environment*


    iOS4 requires a more complicated implementation and it’s easy to misunderstand
    this whole process. As shown in [Figure 8–4](#Chapter08.html#fig_8_4), when the
    user quits the app, it enters the background and method `application:didEnterBackground`
    is called. The application is in foreground state when users can see it running;
    users don’t see the application when it is in background. When it relaunches,
    many methods and notifications are involved and you have to understand different
    states of the application to respond properly to them. Here are the application
    states that you need to know about.


    - Not running: Never opened, or opened and then terminated.

    - Inactive: The app is in foreground but not receiving events, such as when the
    user locks the screen.

    - Active: The app is in foreground and is receiving events.


    ![images](images/0804.jpg)


    **Figure 8–4.** *Application life cycle for iOS4*


    Developers often confuse these last two states: background and suspend. The background
    state happens before the suspend state. When the user quits the app or jumps to
    another app, the application is brought into the background state. It stays there
    for a short period of time, after which the application is suspended. The period
    of time depends on the application and what it wants to do in the background.
    I will explain in more detail what the application can do in this state.


    There are two main situations for which the application life cycle will be different.
    The first situation is when user quits the app by answering a phone call or another
    interruption from the operating system. The second situation is when users press
    the Home button and the app goes into the background. Each situation has its own
    application life cycle.


    ![images](images/0805.jpg)


    **Figure 8–5.** *Diagram for two different cases: phone interruption and home
    button.*


    As you can see in [Figure 8–5](#Chapter08.html#fig_8_5), in the first case, when
    the user receives a phone call or SMS message, the app is put into inactive mode
    with the `applicationWillResignActive:` method. If the user chooses `No` (doesn’t
    answer the phone) the method `applicationDidBecomeActive` is called; otherwise,
    `applicationDidEnterBackground` is called. So, in the `applicationDidBecomeActive`
    section, you may not need to reload all data and views again. You should be careful
    with this part when comparing it to clicking on the Home button.


    When users press the Home button, the application goes directly into the background
    and the delegate method `applicationDidEnterBackground:` is called.


    #### Multitasking Handler Methods


    [Figures 8–4](#Chapter08.html#fig_8_4) and [8–5](#Chapter08.html#fig_8_5) showed
    you when certain methods are called in the lifecycle. [Table 8–1](#Chapter08.html#tab_8_1)
    provides a complete list of methods to handle in your application delegate and
    other view controller classes to respond properly to the life cycle events.


    ![image](images/t0801.jpg)


    ![image](images/t0801a.jpg)


    **NOTE 1**


    To receive the notification for events, your view controller or object can register
    it as shown in the following code snippet:


    ```

    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(someMethod:)

    name:UIApplicationDidBecomeActiveNotification object:nil];

    ```


    Don''t forget to clean up after yourself! In `dealloc`, remember to remove yourself
    as the observer, like so:


    ```

    [[NSNotificationCenter defaultCenter] removeObserver:self];

    ```


    The method `someMethod:` may (but is not required to) accept an `NSNotification`
    as a parameter. Inside this `NSNotification`, you may find more user information
    or data to process. You can work with this `NSNotification` as usual; there is
    nothing special here.


    **NOTE 2**


    - The method `applicationDidBecomeActive:` will always be called, either when
    users first launch your application or launch it again from the background.

    - The method `applicationDidFinishLaunching:` will always be called on the first
    launch, not on launches from background.

    - The method `applicationWillEnterForeground:` will always be called when the
    application comes back from the background.


    You can use these facts to integrate multitasking into your application so that
    you can respond properly to different states of the application.


    #### Multitasking Benefits and Costs


    What should you do if you don’t want to have multitasking in your application?
    What are the benefits and costs if you have to maintain all these different states
    and complex code in order to make sure your application works well?


    There are many benefits of using multitasking. Here are two:


    - Users can continue working with the existing state of your application without
    navigating back from the beginning any more.

    - Your application can continue to work in parallel with background services like
    downloading data from the Internet, playing audio, or receiving GPS location notification.


    As you already learned, over the whole life cycle of multitasking, there are couple
    of costs that you have to pay for:


    - More complicated logic while walking through the application life cycle, as
    shown previously.

    - Your app may be forced to quit in the background and leave the application data
    inconsistent. Due to this inconsistency, your app can crash when user reopens
    it.


    So, in some cases, you may not want to use multitasking in your application. In
    these cases, you can configure your `info.plist` file to not use multitasking.
    Here are the steps to do so:


    - Open your `info.plist` file.

    - Add the key `UIApplicationExitsOnSuspend` or select `Application does not run
    in background.`

    - Set the new key to `YES` or tick in the tick box.


    You can see this in [Figure 8–6](#Chapter08.html#fig_8_6).


    ![images](images/0806.jpg)


    **Figure 8–6.** *How to set up the no multitasking option*'
