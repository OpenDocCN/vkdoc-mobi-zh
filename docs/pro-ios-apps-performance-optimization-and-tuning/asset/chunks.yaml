    \nnode and edge, [120](#Chapter05.html#page_120)\n\nO(log(n)) performance, [119](#Chapter05.html#page_119)\n\
    \nsearch strategy, [117](#Chapter05.html#page_117)–[118](#Chapter05.html#page_118)\n\
