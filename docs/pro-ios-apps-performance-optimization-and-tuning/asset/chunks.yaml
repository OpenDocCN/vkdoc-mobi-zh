- fmt: '### Measure Thread Performance


    The Thread Measurement in iPhone is not really useful in measuring performance.
    However, it delivers very good information the state of each thread running in
    your application. For example, it will tell you if some threads are blocked for
    too long or if you have already created too many threads (see [Figure 2–32](#Chapter02.html#fig_2_32)).
    Blocked threads are a significant sign that something is wrong in your code. Usually,
    when you want to utilize the operating system''s capability, you will create many
    threads to handle the processing in parallel. This is when the problems happen
    and when you need to use `Threads` instrument to measure the threads.


    ![images](images/0232.jpg)


    **Figure 2–32.** List of threads and their states when the application is running


    Advantages:


    - It gives you a general view about threads and their states.

    - You can run the instrument on the simulator. Although there are some differences
    between iOS and simulator architecture, many problems still happen in a similar
    way on both architectures.


    Disadvantages:


    - It does not give much detail about each thread.


    Usages:


    - It helps you figure out any problems with threads, especially when you do a
    lot of optimization to boost the performance by applying multithreading techniques.


    ### Battery Power Measurement


    One of the last important measurements regarding performance in iOS devices is
    the battery. Battery is a huge issue in mobile devices because you can''t keep
    charging it when you are out with your friends. This problem is even more pronounced
    with mobile devices than with laptops. People with mobile devices always want
    to have a high mobile and agile capability for the device.


    ![images](images/0233.jpg)


    **Figure 2–33.** List of main concerns about the battery in iOS devices


    There are some important measurements in this `Energy` instrument. It includes
    energy usage, CPU activity, display brightness, sleep/wake, Bluetooth, Wi-Fi,
    and GPS. These are energy-consuming tasks. [Figure 2–33](#Chapter02.html#fig_2_33)
    does not clearly show the changes inside each measurement. However, if you keep
    testing the device for the long time, you will see changes inside each of them;
    for example, Wi-Fi will consume some memory and GPS may be the most energy-consuming
    task.


    ![images](images/0234.jpg)


    **Figure 2–34.** CPU activities that consume the most battery power


    [Figure 2–34](#Chapter02.html#fig_2_34) shows the features that consume the most
    battery—foreground app activity, audio processing, and graphics. Based on this
    information, you can make decision about how much energy your application is consuming.


    ![images](images/0235.jpg)


    **Figure 2–35.** Brightness Measurement


    [Figure 2–35](#Chapter02.html#fig_2_35) shows another important aspect of energy
    consumption: the brightness level of the device.


    Advantages:


    - It gives you a general view about all energy-consuming tasks.


    Disadvantages:


    - You need to run the test on the device for a specific time to gather information.


    Usages:


    - If the application depends much on Wi-Fi, Bluetooth, GPS, graphics, and audio,
    you should pay attention to energy measurements to make sure that the app does
    not consume too much battery.


    ### Combination of Tools


    So far, you have seen how each of the instruments works and contributes to your
    performance benchmarking process. But you may be wondering how to measure them
    all together or combine groups of them to measure. This will save you a ton of
    time. So I will show how you can do that within `Instruments`.


    As [Figure 2–36](#Chapter02.html#fig_2_36) shows, you first need to open the `Instruments`
    Application and choose the `Blank` Template.


    ![images](images/0236.jpg)


    **Figure 2–36.** Choose the Blank Template


    You will see that there is nothing here but the small box tells you to open the
    Library List. When you select that small arrow, a list of all possible instruments
    appears on the right hand side to help you to add the necessary instruments into
    the template for testing (see [Figure 2–37](#Chapter02.html#fig_2_37)).


    ![images](images/0237.jpg)


    **Figure 2–37.** *List of available Instrument Tools*


    After dragging all the necessary instruments into your template, you can start
    testing them normally with any instrument that you have been working on until
    now.


    ![images](images/0238.jpg)


    **Figure 2–38.** All instrument results


    As [Figure 2–38](#Chapter02.html#fig_2_38) shows, you now can see a list of results
    at the same time. With this advantage, you can know if an increase in performance
    (measured by `CPU Sampler` or `Time Profiler`) means an increase in memory usage
    (measured by `Object Allocations`) as well. Keep them in a balance mode to make
    sure your application runs perfectly.


    Advantages:


    - You can observe all the instrument results at the same time.


    Disadvantages:


    - This approach can lead to a really slow app if you add too many instruments.
    If you test with ten instruments, the app will run terribly. So, be careful about
    the number of instruments you add.


    Usages:


    - It helps you get a general overview. It is good to test with several instruments
    simultaneously after you have identified all the bottlenecks and fixed them.


    ### All Instruments


    [Table 2–1](#Chapter02.html#tab_2_1) summarizes all instruments.


    ![images](images/t0201.jpg)


    ![images](images/t0201a.jpg)


    ## Summary


    This chapter walks you through the list of possible instruments and gives you
    the details and the summary of the advantages and disadvantages of each instrument.


    The tools were divided into three main categories with subcategories inside: basic
    tools, memory tools, and performance tools.


    Memory and performance are highly related to each other; you have to measure each
    carefully to see if the problem you have belongs to a memory or a performance
    problem.


    Within performance problems, I divided the tools into subcategories like CPU,
    File Processing, User Interface Rendering, Threading, and Energy. Each of them
    can affect to other properties of application; in other words, a bottleneck in
    one area can hide a bottleneck in another area. Therefore, you need to measure
    each aspect carefully to make sure that you fix the right problem. For example,
    if the problem is the slow rendering process of iPhone, there is not much thing
    you can do with CPU, logic, and data processing. In that case, you need to jump
    right into the displaying code and possibly change from `Interface Builder` to
    custom code to draw the UI.


    **EXERCISE**


    1.  Use memory tools discussed in this chapter to test the memory usage of your
    existing applications and figure out what you can do to improve them.

    2.  Choose a game inside your current iPod/iPhone/iPad and test to see how much
    energy, Bluetooth, Wi-Fi, or 3G it uses with an appropriate instrument tool.

    3.  Choose an app with some complicated `UITableView` and use the appropriate
    tool to test the scrolling performance of that `UITableView`.


