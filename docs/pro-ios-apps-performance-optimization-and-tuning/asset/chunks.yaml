    \ selector:@selector(doStuff)\n                               userInfo:nil\n \
    \                               repeats:YES];\n```\n\n然而，在某些情况下你不应该使用`RunLoop`，例如在主线程中，你有事件处理代码如`NSInputStream`或`NSTimer`，它们执行一些需要很长时间才能完成的重任务。因为像我的例子这样的事件处理代码最终会在创建它的线程上工作，你的线程无法继续处理其他事件处理代码，直到旧事件被处理并完成。如果你在该线程内创建定时器或输入流运行循环，可能会损害你的主\
    \ UI 线程。主要问题是它会使你的 UI 响应速度变慢。\n\n### 线程的风险\n\n在多线程环境中运行时，你总是需要注意一件事：你无法控制线程的执行顺序。例如，如果你有两个线程，线程\
    \ 1 和线程 2，CPU 会在一定时间内处理线程 1，然后切换到线程 2 并继续运行另一段时间。问题是你不知道 CPU 何时切换，也不知道它会为特定线程分配多少时间。这些时间量对于每个线程和每次运行并不相等。\n\
    \n为了演示难以控制输出的危险性，我将向你展示一个示例。该示例包含两个线程：线程 1 和线程 2。线程 1 打印奇数整数，线程 2 打印偶数整数。这些整数的范围是\
    \ 1 到 20。线程 1 将先启动，然后线程 2 启动。该示例将运行三次。\n\n清单 6–5 显示了示例代码。\n\n**清单 6–5.** *不受控制的输出与多线程*\n\
    \n```\n- (void)printOddIntegers {\n   for (int i = 0; i < 20; i++) {\n       \
    \ // 打印奇数整数\n       if (i % 2 == 1) {\n           NSLog(@\"%d\", i);\n       }\n\
    \   }\n}\n\n- (void)printEvenIntegers {\n   for (int i = 0; i < 20; i++) {\n \
    \      // 打印偶数整数\n       if (i % 2 == 0) {\n           NSLog(@\"%d\", i);\n  \
    \     }\n   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   [NSThread detachNewThreadSelector:@selector(printOddIntegers)\
    \ toTarget:self\nwithObject:nil];\n   [NSThread detachNewThreadSelector:@selector(printEvenIntegers)\
    \ toTarget:self\nwithObject:nil];\n}\n```\n\n如你所见，我首先调用打印奇数整数，然后调用打印偶数整数。因此你可能期望看到：\n\
    \n- 一些奇数整数先被打印。\n- 奇数整数和偶数整数被均匀打印，例如两个奇数整数，然后两个偶数整数。\n\n然而，这两种假设都不正确，如表 6–4 所示，该表显示了三次运行的结果。\n\
    \n![Images](img/t0604.jpg)\n\n正如你在第二次运行中所见，数字 0 首先被打印，而在其他运行中数字 1 首先被打印。奇数整数和偶数整数的打印并不均匀；此外，在偶数整数被打印之前，奇数整数被打印的数量没有规律。\n\
    \n因此，在多线程环境中，你无法控制线程的执行顺序。多线程是一把双刃剑。实现多线程应用程序的开发人员必须意识到三个主要风险。\n\n- **安全性**：该标准意味着在多线程环境下，输出应如预期正确。换句话说，程序可以以不同的顺序多次运行，但最终输出应符合预期且正确。“永远不会发生坏事。”\n\
    - **活跃性**：这与安全性不同。一个定义是“最终发生了好事。”例如，假设线程 A 必须等待线程 B 的结果，但不知何故这些结果从未返回。因此线程 A 永远无法计算最终结果。你通常听到的这个问题的术语是*死锁*。\n\
    - **性能**：iPhone 应用的重要目标之一是拥有更好的性能和更响应的 UI。因此，必须达到你的性能目标。活跃性只关心最终发生好事；它不关心那个好结果发生的速度有多快。\n\
    \n我将在后续部分通过示例介绍每个标准，以便你理解是什么导致了不良标准，以及如何修复它以确保你的应用程序以高性能运行。\n"
- fmt: "##### Safety\n\nSafety refers to the requirement that a program running within\
    \ the multithreaded environment should produce a correct and expected result as\
    \ if it is running within a single threaded environment. I will discuss a potential\
    \ problem that usually happens in a multithreaded environment when two or more\
    \ threads access to the same data.\n\n###### Problem\n\n[Figure 6–5](#Chapter06.html#fig_6_5)\
    \ describes how two threads trying to retrieve the same item can cause an application\
    \ crash. In [Figure 6–5](#Chapter06.html#fig_6_5), thread 1 tries to push the\
    \ item into the current stack. Then both thread 2 and thread 3 want to get that\
    \ item out and do a check to make sure that there is an item inside the stack.\
    \ However, after both threads check, thread 2 runs in first and gets the item\
    \ out. Oops! As you can see, there is no item left for thread 3 to get out. This\
    \ can lead to a crash for your application.\n\n![images](images/0605.jpg)\n\n\
    **Figure 6–5.** *A crash happens when running multithreading checks*\n\nYou can\
    \ get the sample code from the project `ThreadSafety`, but [Listing 6–6](#Chapter06.html#list_6_6)\
    \ shows a code illustration for the problem. Notice that this problem does not\
    \ always happen but it will happen if you run the code for enough time. The code\
    \ uses a `NSMutableArray` variable, `storages`, so client’s code can add in and\
    \ remove data from it.\n\n**Listing 6–6.** *Thread Safety*\n\n```\n- (void)pushData\
    \ {\n      @autoreleasepool {\n         while (YES) {\n             // The storages\
    \ property is a NSMutableArray used to store data\n             [self.storages\
    \ addObject:[[NSObject alloc] init]];\n             [NSThread sleepForTimeInterval:0.1];\n\
    \         }\n     }\n}\n\n- (void)popData {\n   @autoreleasepool {\n      while\
    \ (YES) {\n         if ([self.storages count] > 0) {\n            NSObject *object\
    \ = [self.storages objectAtIndex:0];\n            NSLog(@\"object: %@\", object);\n\
    \            [self.storages removeObjectAtIndex:0];\n         }\n         [NSThread\
    \ sleepForTimeInterval:0.1];\n      }\n   }   \n}\n\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n   self.storages = [NSMutableArray array];\n   [NSThread detachNewThreadSelector:@selector(pushData)\
    \ toTarget:self\nwithObject:nil];\n   [NSThread detachNewThreadSelector:@selector(popData)\
    \ toTarget:self withObject:nil];\n\n   [NSThread detachNewThreadSelector:@selector(popData)\
    \ toTarget:self withObject:nil];\n}\n```\n\nWhen you run the above code for a\
    \ couple time, you will receive the below messages:\n\n```\n2011-05-19 18:53:15.540\
    \ ThreadSafety[2130:7103] object: <NSObject: 0x4e1d5e0>\n2011-05-19 18:53:15.540\
    \ ThreadSafety[2130:6b03] object: <NSObject: 0x4e1d5e0>\n2011-05-19 18:53:15.546\
    \ ThreadSafety[2130:6b03] *** Terminating app due to uncaught\nexception 'NSRangeException',\
    \ reason: '*** -[NSMutableArray removeObjectAtIndex:]: index\n0 beyond bounds\
    \ for empty array'\n*** Call stack at first throw:\n(\n   0   CoreFoundation \
    \      0x00dc75a9 __exceptionPreprocess + 185\n   1   libobjc.A.dylib      0x00f1b313\
    \ objc_exception_throw + 44\n   2   CoreFoundation       0x00dc049f -[__NSArrayM\
    \ removeObjectAtIndex:] + 415\n   3   ThreadSafety         0x000022b1 -[ThreadSafetyViewController\
    \ popData] + 251\n   4   Foundation           0x00021cf4 -[NSThread main] + 81\n\
    \   5   Foundation           0x00021c80 __NSThread__main__ + 1387\n   6   libSystem.B.dylib\
    \    0x95486819 _pthread_start + 345\n   7   libSystem.B.dylib    0x9548669e thread_start\
    \ + 34\n)\nterminate called after throwing an instance of 'NSException'\n```\n\
    \nThe error message is\n\n```\n2011-05-19 18:53:15.546 ThreadSafety[2130:6b03]\
    \ *** Terminating app due to uncaught\nexception 'NSRangeException', reason: '***\
    \ -[NSMutableArray removeObjectAtIndex:]: index\n0 beyond bounds for empty array'\n\
    ```\n\nWhat this tells you is that you tried to remove an object in an empty array,\
    \ which should not happen when you already checked for empty array before removing\
    \ the first object. And you even printed it out to see that there was a last object\
    \ there.\n\nNow, if you look at the [Figure 6–4](#Chapter06.html#fig_6_4) again,\
    \ you should understand why this creates a crash—because after the first thread\
    \ checks and prints out the last object, the first thread stops and the second\
    \ thread runs."
  raw: '##### Safety


    Safety refers to the requirement that a program running within the multithreaded
    environment should produce a correct and expected result as if it is running within
    a single threaded environment. I will discuss a potential problem that usually
    happens in a multithreaded environment when two or more threads access to the
    same data.


    ###### Problem


    [Figure 6–5](#Chapter06.html#fig_6_5) describes how two threads trying to retrieve
    the same item can cause an application crash. In [Figure 6–5](#Chapter06.html#fig_6_5),
    thread 1 tries to push the item into the current stack. Then both thread 2 and
    thread 3 want to get that item out and do a check to make sure that there is an
    item inside the stack. However, after both threads check, thread 2 runs in first
    and gets the item out. Oops! As you can see, there is no item left for thread
    3 to get out. This can lead to a crash for your application.


    ![images](images/0605.jpg)


    **Figure 6–5.** *A crash happens when running multithreading checks*


    You can get the sample code from the project ThreadSafety, but [Listing 6–6](#Chapter06.html#list_6_6)
    shows a code illustration for the problem. Notice that this problem does not always
    happen but it will happen if you run the code for enough time. The code uses a
    `NSMutableArray` variable, `storages,` so client’s code can add in and remove
    data from it.


    **Listing 6–6.** *Thread Safety*


    `- (void)pushData {`

    `      @autoreleasepool {`

    `         while (YES) {`

    `             // The storages property is a NSMutableArray used to store data`

    `             [self.storages addObject:[[NSObject alloc] init]];`

    `             [NSThread sleepForTimeInterval:0.1];`

    `         }`

    `     }`

    `}`


    `- (void)popData {`

    `   @autoreleasepool {`

    `      while (YES) {`

    `         if ([self.storages count] > 0) {`

    `            NSObject *object = [self.storages objectAtIndex:0];`

    `            NSLog(@"object: %@", object);`

    `            [self.storages removeObjectAtIndex:0];`

    `         }`

    `         [NSThread sleepForTimeInterval:0.1];`

    `      }`

    `   }   `

    `}`


    `- (void)viewDidAppear:(BOOL)animated {`

    `   self.storages = [NSMutableArray array];`

    `   [NSThread detachNewThreadSelector:@selector(pushData) toTarget:self`

    `withObject:nil];`

    `   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];`


    `   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];`

    `}`


    When you run the above code for a couple time, you will receive the below messages:


    `2011-05-19 18:53:15.540 ThreadSafety[2130:7103] object: <NSObject: 0x4e1d5e0>`

    `2011-05-19 18:53:15.540 ThreadSafety[2130:6b03] object: <NSObject: 0x4e1d5e0>`

    `2011-05-19 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating app due to uncaught`

    `exception ''NSRangeException'', reason: ''*** -[NSMutableArray removeObjectAtIndex:]:
    index`

    `0 beyond bounds for empty array''`

    `*** Call stack at first throw:`

    `(`

    `   0   CoreFoundation       0x00dc75a9 __exceptionPreprocess + 185`

    `   1   libobjc.A.dylib      0x00f1b313 objc_exception_throw + 44`

    `   2   CoreFoundation       0x00dc049f -[__NSArrayM removeObjectAtIndex:] + 415`

    `   3   ThreadSafety         0x000022b1 -[ThreadSafetyViewController popData]
    + 251`

    `   4   Foundation           0x00021cf4 -[NSThread main] + 81`

    `   5   Foundation           0x00021c80 __NSThread__main__ + 1387`

    `   6   libSystem.B.dylib    0x95486819 _pthread_start + 345`

    `   7   libSystem.B.dylib    0x9548669e thread_start + 34`

    `)`

    `terminate called after throwing an instance of ''NSException''`


    The error message is


    `2011-05-19 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating app due to uncaught`

    `exception ''NSRangeException'', reason: ''*** -[NSMutableArray removeObjectAtIndex:]:
    index`

    `0 beyond bounds for empty array''`


    What this tells you is that you tried to remove an object in an empty array, which
    should not happen when you already checked for empty array before removing the
    first object. And you even printed it out to see that there was a last object
    there.


    Now, if you look at the [Figure 6–4](#Chapter06.html#fig_6_4) again, you should
    understand why this creates a crash—because after the first thread checks and
    prints out the last object, the first thread stops and the second thread runs.'
  trans: "\n##### 线程安全\n\n线程安全是指，在多线程环境中运行的程序，应当像在单线程环境中运行一样，产生正确且预期的结果。我将讨论一个在多线程环境中常见的问题：当两个或多个线程访问同一份数据时可能发生的状况。\n\
    \n###### 问题\n\n图 6-5 描述了两个线程试图获取同一个数据项如何导致应用程序崩溃。在图 6-5 中，线程 1 尝试将一个数据项推入当前栈。接着，线程\
    \ 2 和线程 3 都想要取出这个数据项，并先检查栈中是否有数据项。然而，在两个线程都检查完成后，线程 2 抢先执行并取出了数据项。糟糕！正如你所见，已经没有数据项留给线程\
    \ 3 了。这可能导致你的应用程序崩溃。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *执行多线程检查时发生崩溃*\n\
    \n你可以从 `ThreadSafety` 项目中获取示例代码，但代码清单 6-6 展示了该问题的代码示例。请注意，这个问题并非每次都会发生，但如果代码运行足够长的时间，它就会出现。代码中使用了一个\
    \ `NSMutableArray` 变量 `storages`，以便客户端代码可以向其中添加和删除数据。\n\n**代码清单 6-6.** *线程安全*\n\
    \n```\n- (void)pushData {\n      @autoreleasepool {\n         while (YES) {\n\
    \             // storages 属性是一个用于存储数据的 NSMutableArray\n             [self.storages\
    \ addObject:[[NSObject alloc] init]];\n             [NSThread sleepForTimeInterval:0.1];\n\
    \         }\n     }\n}\n\n- (void)popData {\n   @autoreleasepool {\n      while\
    \ (YES) {\n         if ([self.storages count] > 0) {\n            NSObject *object\
    \ = [self.storages objectAtIndex:0];\n            NSLog(@\"object: %@\", object);\n\
    \            [self.storages removeObjectAtIndex:0];\n         }\n         [NSThread\
    \ sleepForTimeInterval:0.1];\n      }\n   }   \n}\n\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n   self.storages = [NSMutableArray array];\n   [NSThread detachNewThreadSelector:@selector(pushData)\
    \ toTarget:self\nwithObject:nil];\n   [NSThread detachNewThreadSelector:@selector(popData)\
    \ toTarget:self withObject:nil];\n\n   [NSThread detachNewThreadSelector:@selector(popData)\
    \ toTarget:self withObject:nil];\n}\n```\n\n当你运行上述代码一段时间后，会收到以下信息：\n\n```\n2011-05-19\
    \ 18:53:15.540 ThreadSafety[2130:7103] object: <NSObject: 0x4e1d5e0>\n2011-05-19\
    \ 18:53:15.540 ThreadSafety[2130:6b03] object: <NSObject: 0x4e1d5e0>\n2011-05-19\
    \ 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating app due to uncaught\nexception\
    \ 'NSRangeException', reason: '*** -[NSMutableArray removeObjectAtIndex:]: index\n\
    0 beyond bounds for empty array'\n*** Call stack at first throw:\n(\n   0   CoreFoundation\
    \       0x00dc75a9 __exceptionPreprocess + 185\n   1   libobjc.A.dylib      0x00f1b313\
    \ objc_exception_throw + 44\n   2   CoreFoundation       0x00dc049f -[__NSArrayM\
    \ removeObjectAtIndex:] + 415\n   3   ThreadSafety         0x000022b1 -[ThreadSafetyViewController\
    \ popData] + 251\n   4   Foundation           0x00021cf4 -[NSThread main] + 81\n\
    \   5   Foundation           0x00021c80 __NSThread__main__ + 1387\n   6   libSystem.B.dylib\
    \    0x95486819 _pthread_start + 345\n   7   libSystem.B.dylib    0x9548669e thread_start\
    \ + 34\n)\nterminate called after throwing an instance of 'NSException'\n```\n\
    \n错误信息是：\n\n```\n2011-05-19 18:53:15.546 ThreadSafety[2130:6b03] *** Terminating\
    \ app due to uncaught\nexception 'NSRangeException', reason: '*** -[NSMutableArray\
    \ removeObjectAtIndex:]: index\n0 beyond bounds for empty array'\n```\n\n这告诉你，你试图从一个空数组中删除一个对象。这在移除第一个对象之前，你已经检查过数组非空的情况下是不应该发生的。而且你甚至打印出结果，确认数组里还有最后一个对象。\n\
    \n现在，如果你再看一下图 6-4，就应该明白为什么这会导致崩溃了——因为在线程 1 检查并打印出最后一个对象之后，线程 1 停止并轮到线程 2 执行了。\n"
- fmt: "###### Solution\n\nMy solution for this problem is to lock the method until\
    \ the thread is done. A lock is the mechanism to guarantee that only one thread\
    \ has access to the specific block of code at a time. Imagine that you are now\
    \ in a contest that requires direct competition with many people. You and your\
    \ competitors are given a question and whoever rings the bell first can answer.\
    \ After the first one finishes, another can ring the bell. The bell is locked\
    \ while the first one is giving answer. It is the same for the thread here. You\
    \ can create a lock that works like your bell: the thread that first gets the\
    \ lock (similar to ringing the bell) blocks all other threads until it is finished.\
    \ After the first thread finishes, the lock is opened (similar to when everybody\
    \ else can ring the bell); the other threads can try to get to the lock first\
    \ and the process repeats.\n\nThe basic point is that the lock mechanism makes\
    \ sure that when one is working on the task, nobody else can interrupt. For example,\
    \ if thread 1 is getting the object and printing it out, thread 2 will have to\
    \ wait until thread 1 finishes getting and removing the object out of the array.\n\
    \nThe lock will be created on an object. If thread 1 gets the lock for object\
    \ A, no other threads can get the lock for object A anymore and these later threads\
    \ have to wait until thread 1 finishes and returns the lock back to object A.\n\
    \nThe simplest way to get a lock for an object A is using `@synchronized(objA)`,\
    \ as in the code in [Listing 6–7](#Chapter06.html#list_6_7).\n\n**Listing 6–7.**\
    \ *Code for Locks*\n\n```\n@synchronized(anObj) {\n  // Everything here is locked\
    \ by the @synchronized directive on object A\n}\n```\n\nAnd our code will become:\n\
    \n```\n- (void)pushData {\n   @autoreleasepool {\n       while (YES) {\n     \
    \     @synchronized(lockedObj) {\n             [self.storages addObject:[NSObject\
    \ new]];\n          }\n          [NSThread sleepForTimeInterval:0.1];\n      }\n\
    \   }\n}\n\n- (void)popData {\n   @autoreleasepool {\n       while (YES) {\n \
    \         @synchronized(lockedObj) {\n              if ([self.storages count]\
    \ > 0) {\n                  NSObject *object = [self.storages objectAtIndex:0];\n\
    \                  NSLog(@\"object: %@\", object);\n                  [self.storages\
    \ removeObjectAtIndex:0];\n              }\n          }\n          [NSThread sleepForTimeInterval:0.1];\n\
    \       }\n   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   self.storages\
    \ = [NSMutableArray array];\n   self.lockedObj = [NSObject new];\n   [NSThread\
    \ detachNewThreadSelector:@selector(pushData) toTarget:self withObject:nil]; \
    \   \n   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];\n\
    \   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];\
    \ \n}\n```\n\n**NOTE:** In many cases you can use `self` as the lock for, things\
    \ will work the same way. You only need to be sure that you use the same lock\
    \ object for places that you want to lock them together. For example, if you have\
    \ 2 different `storages` variable, you may consider using separate locks for separate\
    \ `storages`.\n\n[Figure 6–6](#Chapter06.html#fig_6_6) visualizes how the `@synchronized`\
    \ works on threads.\n\n![images](images/0606.jpg)\n\n**Figure 6–6.** *How lock\
    \ works in multithreading*\n\nYou synchronized both the `push` and `pop` data\
    \ methods because if you only lock one method, there’s a risk that when you are\
    \ checking for a pop, the storage pushes more data in and you won’t get the correct\
    \ object that you want. To prevent this, you need to lock both of them by using\
    \ the same `lockedObj` so that only one method at the time can run.\n\nYour code\
    \ is safe, but there are still two more important attributes of multithreading\
    \ to discuss.\n\n##### Liveness\n\n*Liveness* is when “a good thing finally happens.”\
    \ For example, if your code’s goal is to make sure that you can continuously push\
    \ and pop objects out of the array, the question is whether this process will\
    \ work forever. The problem with locking is the lock can cause all threads that\
    \ are working in your system to keep waiting—in other words, deadlock. If you\
    \ can guarantee the liveness of your application, deadlock should never happen.\n\
    \n###### Problem\n\nImagine that you have two threads: A and B. A is waiting for\
    \ B to finish its work before A can start. However, thread B is waiting for thread\
    \ A to finish its work before it can continue.\n\nFor an actual example, you can\
    \ look back the code in [Listing 6–7](#Chapter06.html#list_6_7). Note that the\
    \ push and pop threads are locked by the same object, `lockedObj`. [Figure 6–7](#Chapter06.html#fig_6_7)\
    \ shows how two threads that are locked on the same object can wait for each other\
    \ forever.\n\n![images](images/0607.jpg)\n\n**Figure 6–7.** *Threads keep waiting\
    \ for each other*\n\nAs you can see in this new example, the pop thread keeps\
    \ waiting on the while loop because the storages count is 0. And the push thread\
    \ can’t add another object into the array because that code is locked by the object\
    \ `lockedObj`. The push thread now has to wait until the pop thread gets done\
    \ and gives the lock back to the `lockedObj`. Therefore, these two threads stop\
    \ and wait for each other forever. Here are some possible solutions to solve this\
    \ deadlock issue.\n\nIf your code is prone to deadlock, you can’t use `@synchronized(lockedObj)`\
    \ anymore because this directive doesn’t support any mechanism to avoid the deadlock\
    \ issue. There are two other possible mechanisms that you can use to avoid deadlock.\n\
    \n* `NSLock`: You can use this to protect concurrent access to sections of code,\
    \ like the way `@synchronized(obj)` is used, but you can control when to lock\
    \ and unlock that section of code.\n* `NSCondition`: This is useful for the producer/consumer\
    \ model like the push/pop example shown previously.\n\n###### NSLock Solution\n\
    \nYou can use it in two ways, `lock` or `tryLock`. With the `lock` method, the\
    \ method that can’t acquire the lock will stop and wait until it gets the lock.\
    \ With the `tryLock`, method, however, if the `tryLock` method returns `NO`, that\
    \ means lock is already owned by another thread and can’t be acquired by the calling\
    \ thread.\n\n**Lock example:**\n\n```\nNSLock *testLock = [[NSLock alloc] init];\n\
    [testLock lock];\n\nif ([self.storages count] > 0) {\n  NSObject *object = [self.storages\
    \ objectAtIndex:0];\n  NSLog(@\"object: %@\", object);\n  [self.storages removeObjectAtIndex:0];\n\
    }\n[NSThread sleepForTimeInterval:0.1];\n[testLock unlock];\n```\n\nThis section\
    \ of code works just like the `@synchronized(obj)` at the previous example where\
    \ you acquire the lock at the beginning of the code and unlock it at the end.\
    \ However, the `tryLock` method will run differently.\n\n**TryLock example:**\n\
    \n```\nNSLock *testLock = [[NSLock alloc] init];\nif([testLock tryLock])\n  //\
    \ storages is a NSMutableArray member variable property to store data.\n  if ([self.storages\
    \ count] > 0) {\n    NSObject *object = [self.storages objectAtIndex:0];\n   \
    \ NSLog(@\"object: %@\", object);\n    [self.storages removeObjectAtIndex:0];\n\
    \  }\n  [NSThread sleepForTimeInterval:0.1];\n}\n[testLock unlock];\n```\n\nIt\
    \ tests if you can acquire the lock and then continues. If you don’t acquire the\
    \ lock, everything is fine and the thread just continues to run the rest of the\
    \ code without getting blocked."
  raw: '###### Solution


    My solution for this problem is to lock the method until the thread is done. A
    lock is the mechanism to guarantee that only one thread has access to the specific
    block of code at a time. Imagine that you are now in a contest that requires direct
    competition with many people. You and your competitors are given a question and
    whoever rings the bell first can answer. After the first one finishes, another
    can ring the bell. The bell is locked while the first one is giving answer. It
    is the same for the thread here. You can create a lock that works like your bell:
    the thread that first gets the lock (similar to ringing the bell) blocks all other
    threads until it is finished. After the first thread finishes, the lock is opened
    (similar to when everybody else can ring the bell); the other threads can try
    to get to the lock first and the process repeats.


    The basic point is that the lock mechanism makes sure that when one is working
    on the task, nobody else can interrupt. For example, if thread 1 is getting the
    object and printing it out, thread 2 will have to wait until thread 1 finishes
    getting and removing the object out of the array.


    The lock will be created on an object. If thread 1 gets the lock for object A,
    no other threads can get the lock for object A anymore and these later threads
    have to wait until thread 1 finishes and returns the lock back to object A.


    The simplest way to get a lock for an object A is using `@synchronized(objA)`,
    as in the code in [Listing 6–7](#Chapter06.html#list_6_7).


    **Listing 6–7.** *Code for Locks*


    `@synchronized(anObj) {`

    `  // Everything here is locked by the @synchronized directive on object A`

    `}`


    And our code will become:


    `- (void)pushData {`

    `   @autoreleasepool {`

    `       while (YES) {`

    `          @synchronized(lockedObj) {`

    `             [self.storages addObject:[NSObject new]];`

    `          }`

    `          [NSThread sleepForTimeInterval:0.1];`

    `      }`

    `   }`

    `}`


    `- (void)popData {`

    `   @autoreleasepool {`

    `       while (YES) {`

    `          @synchronized(lockedObj) {`

    `              if ([self.storages count] > 0) {`

    `                  NSObject *object = [self.storages objectAtIndex:0];`

    `                  NSLog(@"object: %@", object);`

    `                  [self.storages removeObjectAtIndex:0];`

    `              }`

    `          }`

    `          [NSThread sleepForTimeInterval:0.1];`

    `       }`

    `   }`

    `}`


    `- (void)viewDidAppear:(BOOL)animated {`

    `   self.storages = [NSMutableArray array];`

    `   self.lockedObj = [NSObject new];`

    `   [NSThread detachNewThreadSelector:@selector(pushData) toTarget:self`

    `withObject:nil];    [NSThread detachNewThreadSelector:@selector(popData) toTarget:self`

    `withObject:nil];`

    `   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];
    }`


    **NOTE:** In many cases you can use `self` as the lock for, things will work the
    same way. You only need to be sure that you use the same lock object for places
    that you want to lock them together. For example, if you have 2 different `storages`
    variable, you may consider using separate locks for separate `storages`**.**


    [Figure 6–6](#Chapter06.html#fig_6_6) visualizes how the `@synchronized` works
    on threads.


    ![images](images/0606.jpg)


    **Figure 6–6.** *How lock works in multithreading*


    You synchronized both the `push` and `pop` data methods because if you only lock
    one method, there’s a risk that when you are checking for a pop, the storage pushes
    more data in and you won’t get the correct object that you want. To prevent this,
    you need to lock both of them by using the same `lockedObj` so that only one method
    at the time can run.


    Your code is safe, but there are still two more important attributes of multithreading
    to discuss.


    ##### Liveness


    *Liveness* is when “a good thing finally happens.” For example, if your code’s
    goal is to make sure that you can continuously push and pop objects out of the
    array, the question is whether this process will work forever. The problem with
    locking is the lock can cause all threads that are working in your system to keep
    waiting—in other words, deadlock. If you can guarantee the liveness of your application,
    deadlock should never happen.


    ###### Problem


    Imagine that you have two threads: A and B. A is waiting for B to finish its work
    before A can start. However, thread B is waiting for thread A to finish its work
    before it can continue.


    For an actual example, you can look back the code in [Listing 6–7](#Chapter06.html#list_6_7).
    Note that the push and pop threads are locked by the same object, `lockedObj`.
    [Figure 6–7](#Chapter06.html#fig_6_7) shows how two threads that are locked on
    the same object can wait for each other forever.


    ![images](images/0607.jpg)


    **Figure 6–7.** *Threads keep waiting for each other*


    As you can see in this new example, the pop thread keeps waiting on the while
    loop because the storages count is 0\. And the push thread can’t add another object
    into the array because that code is locked by the object `lockedObj`. The push
    thread now has to wait until the pop thread gets done and gives the lock back
    to the `lockedObj`. Therefore, these two threads stop and wait for each other
    forever. Here are some possible solutions to solve this deadlock issue.


    If your code is prone to deadlock, you can’t use `@synchronized(lockedObj)` anymore
    because this directive doesn’t support any mechanism to avoid the deadlock issue.
    There are two other possible mechanisms that you can use to avoid deadlock.


    *   `NSLock`: You can use this to protect concurrent access to sections of code,
    like the way `@synchronized(obj)` is used, but you can control when to lock and
    unlock that section of code.

    *   `NSCondition`: This is useful for the producer/consumer model like the push/pop
    example shown previously.


    ###### NSLock Solution


    You can use it in two ways, `lock` or `tryLock`. With the `lock` method, the method
    that can’t acquire the lock will stop and wait until it gets the lock. With the
    `tryLock`, method, however, if the `tryLock` method returns `NO`, that means lock
    is already owned by another thread and can’t be acquired by the calling thread.


    **Lock example:**


    `NSLock *testLock = [[NSLock alloc] init];`

    `[testLock lock];`


    `if ([self.storages count] > 0) {`

    `  NSObject *object = [self.storages objectAtIndex:0];`

    `  NSLog(@"object: %@", object);`

    `  [self.storages removeObjectAtIndex:0];`

    `}`

    `[NSThread sleepForTimeInterval:0.1];`

    `[testLock unlock];`


    This section of code works just like the `@synchronized(obj)` at the previous
    example where you acquire the lock at the beginning of the code and unlock it
    at the end. However, the `tryLock` method will run differently.


    **TryLock example:**


    `NSLock *testLock = [[NSLock alloc] init];`

    `if([testLock tryLock])`

    `  // storages is a NSMutableArray member variable property to store data.`

    `  if ([self.storages count] > 0) {`

    `    NSObject *object = [self.storages objectAtIndex:0];`

    `    NSLog(@"object: %@", object);`

    `    [self.storages removeObjectAtIndex:0];`

    `  }`

    `  [NSThread sleepForTimeInterval:0.1];`

    `}`

    `[testLock unlock];`


    It tests if you can acquire the lock and then continues. If you don’t acquire
    the lock, everything is fine and the thread just continues to run the rest of
    the code without getting blocked.'
  trans: "\n###### 解决方案\n\n我对此问题的解决方案是锁定方法，直到线程完成。锁是一种机制，用于确保一次只有一个线程能访问特定的代码块。想象一下，你正在参加一个需要与许多人直接竞争的竞赛。你和你的对手们会得到一个问题，谁先按铃谁就能回答。在第一个选手回答完毕后，其他人才能再次按铃。在第一个选手回答时，铃是锁定的。这里的线程也是如此。你可以创建一个像铃铛一样工作的锁：第一个获得锁（类似于按铃）的线程会阻塞所有其他线程，直到它完成。第一个线程完成后，锁被打开（类似于其他人可以按铃）；其他线程可以尝试先获得锁，然后过程重复。\n\
    \n基本要点是，锁定机制确保当某个线程正在处理任务时，没有其他线程可以中断。例如，如果线程 1 正在获取对象并打印它，线程 2 必须等待，直到线程 1 完成从数组中获取并移除该对象。\n\
    \n锁将在某个对象上创建。如果线程 1 获得了对象 A 的锁，那么没有其他线程能再获得对象 A 的锁，这些后来的线程必须等待，直到线程 1 完成并将锁归还给对象\
    \ A。\n\n获取对象 A 锁的最简单方法是使用 `@synchronized(objA)`，如 代码清单 6–7 所示。\n\n**代码清单 6–7.**\
    \ *锁的代码*\n\n```\n@synchronized(anObj) {\n  // 这里的所有内容都被对象 A 上的 @synchronized 指令锁定\n\
    }\n```\n\n我们的代码将变为：\n\n```\n- (void)pushData {\n   @autoreleasepool {\n      \
    \ while (YES) {\n          @synchronized(lockedObj) {\n             [self.storages\
    \ addObject:[NSObject new]];\n          }\n          [NSThread sleepForTimeInterval:0.1];\n\
    \      }\n   }\n}\n\n- (void)popData {\n   @autoreleasepool {\n       while (YES)\
    \ {\n          @synchronized(lockedObj) {\n              if ([self.storages count]\
    \ > 0) {\n                  NSObject *object = [self.storages objectAtIndex:0];\n\
    \                  NSLog(@\"object: %@\", object);\n                  [self.storages\
    \ removeObjectAtIndex:0];\n              }\n          }\n          [NSThread sleepForTimeInterval:0.1];\n\
    \       }\n   }\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n   self.storages\
    \ = [NSMutableArray array];\n   self.lockedObj = [NSObject new];\n   [NSThread\
    \ detachNewThreadSelector:@selector(pushData) toTarget:self withObject:nil]; \
    \   \n   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];\n\
    \   [NSThread detachNewThreadSelector:@selector(popData) toTarget:self withObject:nil];\
    \ \n}\n```\n\n**注意：** 在许多情况下，你可以使用 `self` 作为锁对象，效果是一样的。你只需要确保在想要一起锁定的地方使用同一个锁对象。例如，如果你有\
    \ 2 个不同的 `storages` 变量，你可以考虑为不同的 `storages` 使用不同的锁。\n\n图 6–6 可视化了 `@synchronized`\
    \ 在线程上的工作方式。\n\n![images](img/0606.jpg)\n\n**图 6–6.** *锁在多线程中的工作原理*\n\n你对 `push`\
    \ 和 `pop` 数据方法都进行了同步，因为如果你只锁定一个方法，那么在检查弹出操作时，存储区可能会推入更多数据，从而导致你无法获取所需的对象。为了防止这种情况，你需要使用同一个\
    \ `lockedObj` 锁定它们两个，这样一次只能运行一个方法。\n\n你的代码是安全的，但还有两个关于多线程的重要属性需要讨论。\n\n##### 活性\n\
    \n*活性*指的是“一件好事最终发生”。例如，如果你的代码目标是确保你能持续地从数组中推入和弹出对象，那么问题就是这个过程是否会永远进行下去。锁定的问题在于它可能导致系统中所有正在工作的线程一直等待——换句话说，就是死锁。如果你能保证应用程序的活性，死锁就永远不会发生。\n\
    \n###### 问题\n\n想象一下你有两个线程：A 和 B。A 在等待 B 完成其工作后，A 才能开始。然而，线程 B 又在等待线程 A 完成其工作后，它才能继续。\n\
    \n举一个实际的例子，你可以回顾 代码清单 6–7 中的代码。注意，push 和 pop 线程被同一个对象 `lockedObj` 锁定。图 6–7 显示了锁定在同一个对象上的两个线程如何互相无限等待。\n\
    \n![images](img/0607.jpg)\n\n**图 6–7.** *线程互相等待*\n\n正如你在这个新示例中看到的，因为 storages\
    \ 计数为 0，pop 线程一直在 while 循环中等待。而 push 线程无法向数组中添加新对象，因为那段代码被对象 `lockedObj` 锁定了。push\
    \ 线程现在必须等待，直到 pop 线程完成并将锁归还给 `lockedObj`。因此，这两个线程停止并永远互相等待。以下是解决这种死锁问题的一些可能方案。\n\
    \n如果你的代码容易死锁，你就不能再使用 `@synchronized(lockedObj)` 了，因为这个指令不支持任何避免死锁的机制。你可以使用另外两种可能的机制来避免死锁。\n\
    \n* `NSLock`：你可以用它来保护对代码段的并发访问，就像使用 `@synchronized(obj)` 一样，但你可以控制何时锁定和解除锁定那段代码。\n\
    * `NSCondition`：这对于生产者/消费者模型（如前文所示的 push/pop 示例）非常有用。\n\n###### NSLock 解决方案\n\n\
    你可以通过两种方式使用它：`lock` 或 `tryLock`。使用 `lock` 方法时，无法获取锁的方法会停止并等待，直到它获得锁。然而，使用 `tryLock`\
    \ 方法时，如果 `tryLock` 方法返回 `NO`，则表示该锁已经被另一个线程拥有，调用线程无法获取。\n\n**Lock 示例：**\n\n```\n\
    NSLock *testLock = [[NSLock alloc] init];\n[testLock lock];\n\nif ([self.storages\
    \ count] > 0) {\n  NSObject *object = [self.storages objectAtIndex:0];\n  NSLog(@\"\
    object: %@\", object);\n  [self.storages removeObjectAtIndex:0];\n}\n[NSThread\
    \ sleepForTimeInterval:0.1];\n[testLock unlock];\n```\n\n这段代码的工作方式与之前示例中的 `@synchronized(obj)`\
    \ 类似，你在代码开头获取锁，并在末尾解除锁定。然而，`tryLock` 方法的运行方式会有所不同。\n\n**TryLock 示例：**\n\n```\n\
    NSLock *testLock = [[NSLock alloc] init];\nif([testLock tryLock])\n  // storages\
    \ 是一个 NSMutableArray 成员变量属性，用于存储数据。\n  if ([self.storages count] > 0) {\n    NSObject\
    \ *object = [self.storages objectAtIndex:0];\n    NSLog(@\"object: %@\", object);\n\
    \    [self.storages removeObjectAtIndex:0];\n  }\n  [NSThread sleepForTimeInterval:0.1];\n\
    }\n[testLock unlock];\n```\n\n它会测试你是否能获取锁，然后继续执行。如果你没有获取到锁，一切正常，线程会继续运行其余代码，而不会被阻塞。\n"
- fmt: "# NSCondition Solution\n\nWith `NSLock`, you can see that after you acquire\
    \ a lock by using `[testLock lock];` you can’t stop or suspend your thread to\
    \ wait for some condition. The only way you can do so is to continue until you\
    \ unlock so other threads can come in.\n\nTake a look back at the push/pop example.\
    \ Keep running the thread over and over again to check if there is an item in\
    \ the array that is not efficient. In a loop, if the thread sees that there is\
    \ no item in the array, it should stop and wait there until there are some items\
    \ and then go in and get that item out. The good thing about this approach is\
    \ that you can suspend your thread and not waste too many system resources for\
    \ nothing.\n\nTo let a thread stop, wait, and return the lock at the same time\
    \ you need to use `NSCondition`. [Listing 6–8](#Chapter06.html#list_6_8) demonstrates\
    \ how you can use `NSCondition` for a push/pop sample.\n\n**Listing 6–8.** *NSCondition\
    \ Example*\n\n```\n- (void)pushData {\n   @autoreleasepool {\n\n      while (YES)\
    \ {\n         // condition is a NSCondition member variable of the class so you\
    \ can share\n         //  this condition with other methods/blocks of code\n \
    \        [condition lock];\n\n         // storages is a NSMutableArray member\
    \ variable property to store data.\n         [self.storages addObject:[NSObject\
    \ new]];\n         [NSThread sleepForTimeInterval:0.1];\n         [condition signal];\n\
    \         [condition unlock];\n      }\n   }\n}\n\n- (void)popData {\n   @autoreleasepool\
    \ {\n      while (YES) {\n         // condition is a NSCondition member variable\
    \ of the class so you can share\n         //  this condition with other methods/blocks\
    \ of code\n        [condition lock];\n\n         // storages is a NSMutableArray\
    \ member variable property to store data.\n         while([self.storages count]\
    \ <= 0)\n            [condition wait];\n         NSObject *object = [self.storages\
    \ objectAtIndex:0];\n         NSLog(@\"object: %@\", object);\n         [self.storages\
    \ removeObjectAtIndex:0];\n         [condition unlock];\n      }\n   }\n}\n```\n\
    \nThere are other locking mechanisms, such as `NSRecursiveLock` and `NSConditionLock`,\
    \ but using `NSLock` and `NSCondition` is usually enough for most cases. For threading,\
    \ you should always try to make it simple because multithreading can introduce\
    \ subtle bugs in your code.\n\n**NOTE:** `NSRecursiveLock` is useful if you have\
    \ a thread that wants to acquire the lock multiple times without causing any deadlock.\
    \ `NSRecursiveLock` still blocks other threads to access into the block of code.\n\
    \n# Deadlock\n\nUsing these locks can raise the issue of deadlock in your code.\
    \ Deadlock looks like the first issue I introduced to you, but it is more related\
    \ to the scenario when you have two or more locks and the threads are waiting\
    \ for each other.\n\n[Figure 6–8](#Chapter06.html#fig_6_8) demonstrates a situation\
    \ where thread 1 acquires the lock on the object 1 and thread 2 acquires the lock\
    \ on object 2. Then thread 1 wants to acquire the lock for object 2 but has to\
    \ wait for thread 2 to release the lock. At the same time, thread 2 wants to acquire\
    \ the lock for object 1 but has to wait for thread 1 to release the lock. As you\
    \ can see, both threads end up waiting for each other and no thread can continue\
    \ to work.\n\n![images](images/0608.jpg)\n\n**Figure 6–8.** *How multithreads\
    \ can be deadlocked*\n\nThere are some methods that you can use to fix this deadlock\
    \ situation, such as reordering threads; minimize locking; a bigger lock; `tryLock`;\
    \ and time out for locking. These mechanisms are not hard to implement; the figures\
    \ that follow will help you understand how to do it.\n\nIn [Figure 6–9](#Chapter06.html#fig_6_9),\
    \ the simplest way is to reorder the thread and locking order so that only when\
    \ a thread is done with locking on lock 2, the other thread can get the lock and\
    \ continue its work.\n\nHowever, if your method structure is fixed and some code\
    \ belongs to a third-party library, it is hard to reorder the lock or modify the\
    \ code.\n\n![images](images/0609.jpg)\n\n**Figure 6–9.** *Thread reordering*\n\
    \nThe next way is to try to only lock when you really need to lock that part.\
    \ This way you will minimize the locking part, as shown in [Figure 6–10](#Chapter06.html#fig_6_10).\n\
    \n![images](images/0610.jpg)\n\n**Figure 6–10.** *Minimize locking*\n\nThis can\
    \ only be done easily if you have the code or you can find some way to separate\
    \ out the part that you don’t need to lock. Note that it may also make your code\
    \ look more complicated.\n\nAnother way for you to do this is to implement another\
    \ bigger lock over the other locks. This will allow other threads to try to access\
    \ the same lock at the same time. For example, in [Figure 6–11](#Chapter06.html#fig_6_11),\
    \ due to the new bigger lock, thread 2 now has to wait for thread 1 to finish\
    \ before it can obtain any lock or run any necessary code. In normal code, if\
    \ you can remove smaller locks and replace them with a bigger lock, you should\
    \ do so when it reduces code complexity. This mechanism is usually used in cases\
    \ where you need to prevent deadlock in libraries that you can’t or don’t want\
    \ to modify the library code.\n\n![images](images/0611.jpg)\n\n**Figure 6–11.**\
    \ *A bigger, master lock*\n\nYou could also try the aforementioned `tryLock`.\
    \ Using `tryLock`, if a thread can’t obtain the lock, it will not stop and wait.\
    \ That thread can just continue to run the other logic inside the thread. Here\
    \ is sample code for using `tryLock`:\n\n```\nNSLock *testLock = [[NSLock alloc]\
    \ init];\nif([testLock tryLock])\n  if ([self.storages count] > 0) {\n    NSObject\
    \ *object = [self.storages objectAtIndex:0];\n    NSLog(@\"object: %@\", object);\n\
    \    [self.storages removeObjectAtIndex:0];\n  }\n  [testLock unlock];\n}\n[NSThread\
    \ sleepForTimeInterval:0.1];\n```\n\nThe last method that I will mention here\
    \ (although there are many other methods to prevent deadlock) is to use timeout.\
    \ In Objective-C, you can specify the thread to wait until it can acquire the\
    \ lock or the time for it to wait ends. Using the `lockBeforeDate` method will\
    \ help you achieve this goal. The thread that calls this method will be blocked\
    \ until it can obtain the lock. If the specified `NSDate` instance in the argument\
    \ happens but the thread still can’t obtain the lock, it will just continue. This\
    \ will help in case you have deadlock; your thread can continue with a little\
    \ bit of risk but no deadlock will ever happen."
  raw: '###### NSCondition Solution


    With `NSLock`, you can see that after you acquire a lock by using `[testLock lock];`
    you can’t stop or suspend your thread to wait for some condition. The only way
    you can do so is to continue until you unlock so other threads can come in.


    Take a look back at the push/pop example. Keep running the thread over and over
    again to check if there is an item in the array that is not efficient. In a loop,
    if the thread sees that there is no item in the array, it should stop and wait
    there until there are some items and then go in and get that item out. The good
    thing about this approach is that you can suspend your thread and not waste too
    many system resources for nothing.


    To let a thread stop, wait, and return the lock at the same time you need to use
    `NSCondition`. [Listing 6–8](#Chapter06.html#list_6_8) demonstrates how you can
    use `NSCondition` for a push/pop sample.


    **Listing 6–8.** *NSCondition Example*


    `- (void)pushData {`

    `   @autoreleasepool {`


    `      while (YES) {`

    `         // condition is a NSCondition member variable of the class so you can
    share`

    `         //  this condition with other methods/blocks of code`

    `         [condition lock];`


    `         // storages is a NSMutableArray member variable property to store data.`

    `         [self.storages addObject:[NSObject new]];`

    `         [NSThread sleepForTimeInterval:0.1];`

    `         [condition signal];`

    `         [condition unlock];`

    `      }`

    `   }`

    `}`


    `- (void)popData {`

    `   @autoreleasepool {`

    `      while (YES) {`

    `         // condition is a NSCondition member variable of the class so you can
    share`

    `         //  this condition with other methods/blocks of code`

    `        [condition lock];`


    `         // storages is a NSMutableArray member variable property to store data.`

    `         while([self.storages count] <= 0)`

    `            [condition wait];`

    `         NSObject *object = [self.storages objectAtIndex:0];`

    `         NSLog(@"object: %@", object);`

    `         [self.storages removeObjectAtIndex:0];`

    `         [condition unlock];`

    `      }`

    `   }`

    `}`

    `There are other locking mechanisms, such as NSRecursiveLock and NSConditionLock,
    but`

    `using NSLock and NSCondition is usually enough for most cases. For threading,
    you should`

    `always try to make it simple because multithreading can introduce subtle bugs
    in your`

    `code.`


    **NOTE:** `NSRecursiveLock` is useful if you have a thread that wants to acquire
    the lock multiple times without causing any deadlock. `NSRecursiveLock` still
    blocks other threads to access into the block of code


    ###### Deadlock


    Using these locks can raise the issue of deadlock in your code. Deadlock looks
    like the first issue I introduced to you, but it is more related to the scenario
    when you have two or more locks and the threads are waiting for each other.


    [Figure 6–8](#Chapter06.html#fig_6_8) demonstrates a situation where thread 1
    acquires the lock on the object 1 and thread 2 acquires the lock on object 2\.
    Then thread 1 wants to acquire the lock for object 2 but has to wait for thread
    2 to release the lock. At the same time, thread 2 wants to acquire the lock for
    object 1 but has to wait for thread 1 to release the lock. As you can see, both
    threads end up waiting for each other and no thread can continue to work.


    ![images](images/0608.jpg)


    **Figure 6–8.** *How multithreads can be deadlocked*


    There are some methods that you can use to fix this deadlock situation, such as
    reordering threads; minimize locking; a bigger lock; tryLock; and time out for
    locking. These mechanisms are not hard to implement; the figures that follow will
    help you understand how to do it.


    In [Figure 6–9](#Chapter06.html#fig_6_9), the simplest way is to reorder the thread
    and locking order so that only when a thread is done with locking on lock 2, the
    other thread can get the lock and continue its work.


    However, if your method structure is fixed and some code belongs to a third-party
    library, it is hard to reorder the lock or modify the code.


    ![images](images/0609.jpg)


    **Figure 6–9.** *Thread reordering*


    The next way is to try to only lock when you really need to lock that part. This
    way you will minimize the locking part, as shown in [Figure 6–10](#Chapter06.html#fig_6_10).


    ![images](images/0610.jpg)


    **Figure 6–10.** *Minimize locking*


    This can only be done easily if you have the code or you can find some way to
    separate out the part that you don’t need to lock. Note that it may also make
    your code look more complicated.


    Another way for you to do this is to implement another bigger lock over the other
    locks. This will allow other threads to try to access the same lock at the same
    time. For example, in [Figure 6–11](#Chapter06.html#fig_6_11), due to the new
    bigger lock, thread 2 now has to wait for thread 1 to finish before it can obtain
    any lock or run any necessary code. In normal code, if you can remove smaller
    locks and replace them with a bigger lock, you should do so when it reduces code
    complexity. This mechanism is usually used in cases where you need to prevent
    deadlock in libraries that you can’t or don’t want to modify the library code.


    ![images](images/0611.jpg)


    **Figure 6–11.** *A bigger, master lock*


    You could also try the aforementioned `tryLock`. Using `tryLock`, if a thread
    can’t obtain the lock, it will not stop and wait. That thread can just continue
    to run the other logic inside the thread. Here is sample code for using `tryLock`:


    `NSLock *testLock = [[NSLock alloc] init];`

    `if([testLock tryLock])`

    `  if ([self.storages count] > 0) {`

    `    NSObject *object = [self.storages objectAtIndex:0];`

    `    NSLog(@"object: %@", object);`

    `    [self.storages removeObjectAtIndex:0];`

    `  }`

    `  [testLock unlock];`

    `}`

    `[NSThread sleepForTimeInterval:0.1];`


    The last method that I will mentioned here (although there are many other methods
    to prevent deadlock) is to use timeout. In objective-C, you can specify the thread
    to wait until it can acquire the lock or the time for it to wait ends. Using the
    `lockBeforeDate` method will help you achieve this goal. The thread that calls
    this method will be blocked until it can obtain the lock. If the specified `NSDate`
    instance in the argument happens but the thread still can’t obtain the lock, it
    will just continue. This will help in case you have deadlock; your thread can
    continue with a little bit of risk but no deadlock will ever happen.'
  trans: "\n# NSCondition 解决方案\n\n使用 `NSLock` 时，你会发现，在通过 `[testLock lock];` 获取锁之后，无法停止或挂起线程来等待某个条件。你唯一能做的就是继续执行，直到解锁，以便其他线程可以进入。\n\
    \n回顾一下 push/pop 示例。反复运行线程来检查数组中是否有项目，这效率并不高。在循环中，如果线程发现数组中没有项目，它应该停止并等待，直到有项目出现，然后再进入并取出该项目。这种方法的好处在于，你可以挂起线程，而不会白白浪费过多的系统资源。\n\
    \n要让线程停止、等待，并同时释放锁，你需要使用 `NSCondition`。代码清单 6–8 演示了如何在 push/pop 示例中使用 `NSCondition`。\n\
    \n**代码清单 6–8.** *NSCondition 示例*\n\n```\n- (void)pushData {\n   @autoreleasepool\
    \ {\n\n      while (YES) {\n         // condition 是类的一个 NSCondition 成员变量，这样你可以与其他方法/代码块共享此条件\n\
    \         [condition lock];\n\n         // storages 是用于存储数据的 NSMutableArray 成员变量属性\n\
    \         [self.storages addObject:[NSObject new]];\n         [NSThread sleepForTimeInterval:0.1];\n\
    \         [condition signal];\n         [condition unlock];\n      }\n   }\n}\n\
    \n- (void)popData {\n   @autoreleasepool {\n      while (YES) {\n         // condition\
    \ 是类的一个 NSCondition 成员变量，这样你可以与其他方法/代码块共享此条件\n        [condition lock];\n\n  \
    \       // storages 是用于存储数据的 NSMutableArray 成员变量属性\n         while([self.storages\
    \ count] <= 0)\n            [condition wait];\n         NSObject *object = [self.storages\
    \ objectAtIndex:0];\n         NSLog(@\"object: %@\", object);\n         [self.storages\
    \ removeObjectAtIndex:0];\n         [condition unlock];\n      }\n   }\n}\n```\n\
    \n还有其他锁定机制，比如 `NSRecursiveLock` 和 `NSConditionLock`，但在大多数情况下，使用 `NSLock` 和 `NSCondition`\
    \ 通常就足够了。对于线程处理，你应该始终力求简单，因为多线程可能会在代码中引入难以察觉的 bug。\n\n**注意：** 如果你有一个线程想要多次获取锁而不引起死锁，`NSRecursiveLock`\
    \ 会很有用。`NSRecursiveLock` 仍然会阻止其他线程访问该代码块。\n\n# 死锁\n\n使用这些锁可能会在代码中引发死锁问题。死锁看起来像是我最初向你介绍的问题，但它更多地与这样一种场景相关：当你有两个或多个锁，而线程在相互等待时。\n\
    \n图 6–8 演示了一种情况：线程 1 获取了对象 1 上的锁，线程 2 获取了对象 2 上的锁。然后线程 1 想要获取对象 2 的锁，但必须等待线程 2\
    \ 释放锁。与此同时，线程 2 想要获取对象 1 的锁，但必须等待线程 1 释放锁。如你所见，两个线程最终都在相互等待，没有一个线程能够继续工作。\n\n\
    ![images](img/0608.jpg)\n\n**图 6–8.** *多线程如何陷入死锁*\n\n有一些方法可以用来解决这种死锁情况，例如：重新排列线程；最小化锁定；使用更大的锁；`tryLock`；以及锁定超时。这些机制实现起来并不困难；下面的图将帮助你了解如何操作。\n\
    \n在图 6–9 中，最简单的方法是重新排列线程和锁定的顺序，这样只有当某个线程完成对锁 2 的锁定后，其他线程才能获取该锁并继续其工作。\n\n然而，如果你的方法结构是固定的，或者某些代码属于第三方库，那么重新排列锁或修改代码就很困难了。\n\
    \n![images](img/0609.jpg)\n\n**图 6–9.** *线程重新排序*\n\n下一种方法是只在你真正需要锁定某部分时才进行锁定。这样可以将锁定的范围最小化，如图\
    \ 6–10 所示。\n\n![images](img/0610.jpg)\n\n**图 6–10.** *最小化锁定范围*\n\n只有在你拥有代码，或者能设法分离出不需要锁定的部分时，才能轻松做到这一点。请注意，这可能会使你的代码看起来更复杂。\n\
    \n另一种实现方法是，在现有锁之上实现一个更大的锁。这将允许其他线程尝试同时访问同一个锁。例如，在图 6–11 中，由于新的更大锁的存在，线程 2 现在必须等待线程\
    \ 1 完成，之后才能获取任何锁或运行任何必要的代码。在常规代码中，如果你能移除较小的锁并用一个更大的锁替换，并且这样做能降低代码复杂度，那么就应该这么做。这种机制通常用于需要防止死锁，而你又无法或不想修改库代码的情况。\n\
    \n![images](img/0611.jpg)\n\n**图 6–11.** *一个更大的主锁*\n\n你也可以尝试前面提到的 `tryLock`。使用\
    \ `tryLock`，如果线程无法获取锁，它不会停止并等待。该线程可以继续执行线程内的其他逻辑。以下是使用 `tryLock` 的示例代码：\n\n```\n\
    NSLock *testLock = [[NSLock alloc] init];\nif([testLock tryLock])\n  if ([self.storages\
    \ count] > 0) {\n    NSObject *object = [self.storages objectAtIndex:0];\n   \
    \ NSLog(@\"object: %@\", object);\n    [self.storages removeObjectAtIndex:0];\n\
    \  }\n  [testLock unlock];\n}\n[NSThread sleepForTimeInterval:0.1];\n```\n\n我要提到的最后一种方法（尽管还有许多其他防止死锁的方法）是使用超时。在\
    \ Objective-C 中，你可以指定线程等待，直到它能获取锁，或者等待指定的时间结束。使用 `lockBeforeDate` 方法将帮助你实现这一目标。调用此方法的线程将被阻塞，直到它能获取锁。如果参数中指定的\
    \ `NSDate` 实例超时，而线程仍然无法获取锁，它就会继续执行。这有助于应对死锁情况；你的线程可以继续运行，虽带有少许风险，但永远不会发生死锁。\n"
- fmt: "# Performance\n\nPerformance is the main reason to use multithreading in applications.\
    \ However, as you can see, if you don’t use it properly, your application will\
    \ have many problems. Your application will crash frequently if you can’t control\
    \ the safety risk of multithreading, as I showed you previously. Moreover, some\
    \ of the functions won’t work because some of threads are blocked or have to wait\
    \ for each other forever. So if you integrate multithreading into your application,\
    \ you must make sure that your application runs properly before you worry about\
    \ the performance.\n\nWith the aforementioned issues in mind, you should considering\
    \ carefully if your application needs to have multithreading to run faster. To\
    \ determine if a calculation or a computation needs to work on many separate threads,\
    \ you need to ask yourself if that calculation is a CPU-bound or I/O-bound task.\n\
    \nA CPU-bound task is one that works most or all of the time on the CPU and keeps\
    \ the CPU busy. The following are some examples of CPU-bound tasks:\n\n- Complex\
    \ algorithms, such as merging two arrays together when calculating some logic\
    \ for a game.\n- Scanning the big string from memory (already loaded and stored\
    \ in memory) for a given string.\n\nIn contrast, an I/O-bound task is one that\
    \ spends most of the time waiting for data from other sources. For example, if\
    \ you need to read and load an image from a file or remote server, most of the\
    \ time your thread will sit there doing nothing but waiting for data from a remote\
    \ server. These tasks are called I/O tasks and they need to be called on a separate\
    \ thread.\n\nWhy should you not separate a CPU-bound task into many threads? Does\
    \ it help to calculate things faster? Let [Figure 6–12](#Chapter06.html#fig_6_12)\
    \ explain this in detail.\n\nAs you can see in [Figure 6–12](#Chapter06.html#fig_6_12),\
    \ when a CPU needs to switch from a thread to another thread, it takes some time\
    \ and resources for it to do so. Therefore, there is an overhead cost for any\
    \ multithreading application. If your task is just a CPU-bound task, it would\
    \ take more time for the CPU to finish the whole task because the number of tasks\
    \ is the same but CPU needs to deal with overhead cost. However, if, in the future,\
    \ iPhone does have additional CPU cores, it would make sense to separate a task\
    \ out.\n\n![images](images/0612.jpg)\n\n**Figure 6–12.** *Switching the thread\
    \ cost time from CPU*\n\nIn I/O tasks, the situation is different. If CPU doesn’t\
    \ switch to another thread, it just sits there, waiting for data and doing nothing\
    \ at all. Therefore, in the case of I/O tasks, you should always put it into another\
    \ thread so that CPU can do something else instead of waiting for data.\n\nIn\
    \ other words, imagine a supermarket. Your task is to serve all customers. Here\
    \ are two scenarios that will help explain both concepts:\n\n- If all customers\
    \ are the same, and they come in frequently, you can choose to put them in many\
    \ similar checkout lines or put them in the same queue. If you put your customers\
    \ into many lines and you have only one cashier, he needs to switch from counter\
    \ to counter to serve all the customers. However, if you allow them to be in the\
    \ same queue, then your cashier doesn’t need to move around. This is a CPU-bound\
    \ task.\n- However, it’s different if you have different kinds of customers and\
    \ they don’t come in frequently. For example, you can have a customer service\
    \ booth, an area for self-checkout, and an area for checkout lines. Now, if the\
    \ customers don’t come to checkout lines often, your cashier will have to stand\
    \ there, wait, and do nothing. Or he can switch frequently from area to area,\
    \ answering questions at the customer service booth and assisting others at the\
    \ self-checkout counter. You don’t need to hire three cashiers and you can’t put\
    \ your customers into the same queue. This is similar to an I/O-bound task where\
    \ your data is not the same and does not come frequently into one queue.\n\nYou\
    \ also need to take into account user responsiveness. If your CPU-bound calculation\
    \ takes too much time to finish, the whole UI will be blocked and become unresponsive.\
    \ Therefore, if it’s the main thread (or UI thread), you need to put off any heavy\
    \ calculations, either CPU-bound or I/O-bound, out of this thread.\n\nThere are\
    \ other performance issues that you may need to be careful about when you design\
    \ your multithreading application. Look at the following code and see if you can\
    \ figure out what’s wrong with it:\n\n```\n+ (void)saveImage:(NSData *)imageData\
    \ {\n   @synchronized (self) {\n       @autoreleasepool {\n          NSString\
    \ *filePath = @\"\"; // some default path here\n          [imageData writeToFile:filePath\
    \ atomically:YES];\n       }\n    }\n}\n\n+ (void)caller {\n   NSData *imageData\
    \ = nil;\n   [NSThread detachNewThreadSelector:@selector(saveImage:) toTarget:self\n\
    withObject:imageData];\n}\n```\n\nAs you may or may not see, the problem is with\
    \ `@synchronized (self);` line. You are doing multithreading and you block only\
    \ one thread to access to that piece of code at the time. What is the benefit\
    \ of multithreading in this case? So, you have to be careful with locks. You are\
    \ doing multithreading to make sure that your I/O-bound tasks get the benefit\
    \ of not waiting or blocking a thread for a long time. If you don’t use threads\
    \ in a proper way, all your threads still need to wait for each other before they\
    \ can start their tasks."
  raw: '##### Performance


    Performance is the main reason to use multithreading in applications. However,
    as you can see, if you don’t use it properly, your application will have many
    problems. Your application will crash frequently if you can’t control the safety
    risk of multithreading, as I showed you previously. Moreover, some of the functions
    won’t work because some of threads are blocked or have to wait for each other
    forever. So if you integrate multithreading into your application, you must make
    sure that your application runs properly before you worry about the performance.


    With the aforementioned issues in mind, you should considering carefully if your
    application needs to have multithreading to run faster. To determine if a calculation
    or a computation needs to work on many separate threads, you need to ask yourself
    if that calculation is a CPU-bound or I/O-bound task.


    A CPU-bound task is one that works most or all of the time on the CPU and keeps
    the CPU busy. The following are some examples of CPU-bound tasks:


    *   Complex algorithms, such as merging two arrays together when calculating some
    logic for a game.

    *   Scanning the big string from memory (already loaded and stored in memory)
    for a given string.


    In contrast, an I/O-bound task is one that spends most of the time waiting for
    data from other sources. For example, if you need to read and load an image from
    a file or remote server, most of the time your thread will sit there doing nothing
    but waiting for data from a remote server. These tasks are called I/O tasks and
    they need to be called on a separate thread.


    Why should you not separate a CPU-bound task into many threads? Does it help to
    calculate things faster? Let [Figure 6–12](#Chapter06.html#fig_6_12) explain this
    in detail.


    As you can see in [Figure 6–12](#Chapter06.html#fig_6_12), when a CPU needs to
    switch from a thread to another thread, it takes some time and resources for it
    to do so. Therefore, there is an overhead cost for any multithreading application.
    If your task is just a CPU-bound task, it would take more time for the CPU to
    finish the whole task because the number of tasks is the same but CPU needs to
    deal with overhead cost. However, if, in the future, iPhone does have additional
    CPU cores, it would make sense to separate a task out.


    ![images](images/0612.jpg)


    **Figure 6–12.** *Switching the thread cost time from CPU*


    In I/O tasks, the situation is different. If CPU doesn’t switch to another thread,
    it just sits there, waiting for data and doing nothing at all. Therefore, in the
    case of I/O tasks, you should always put it into another thread so that CPU can
    do something else instead of waiting for data.


    In other words, imagine a supermarket. Your task is to serve all customers. Here
    are two scenarios that will help explain both concepts:


    *   If all customers are the same, and they come in frequently, you can choose
    to put them in many similar checkout lines or put them in the same queue. If you
    put your customers into many lines and you have only one cashier, he needs to
    switch from counter to counter to serve all the customers. However, if you allow
    them to be in the same queue, then your cashier doesn’t need to move around. This
    is a CPU-bound task.

    *   However, it’s different if you have different kinds of customers and they
    don’t come in frequently. For example, you can have a customer service booth,
    an area for self-checkout, and an area for checkout lines. Now, if the customers
    don’t come to checkout lines often, your cashier will have to stand there, wait,
    and do nothing. Or he can switch frequently from area to area, answering questions
    at the customer service booth and assisting others at the self-checkout counter.
    You don’t need to hire three cashiers and you can’t put your customers into the
    same queue. This is similar to an I/O-bound task where your data is not the same
    and does not come frequently into one queue.


    You also need to take into account user responsiveness. If your CPU-bound calculation
    takes too much time to finish, the whole UI will be blocked and become unresponsive.
    Therefore, if it’s the main thread (or UI thread), you need to put off any heavy
    calculations, either CPU-bound or I/O-bound, out of this thread.


    There are other performance issues that you may need to be careful about when
    you design your multithreading application. Look at the following code and see
    if you can figure out what’s wrong with it:


    `+ (void)saveImage:(NSData *)imageData {`

    `   @synchronized (self) {`

    `       @autoreleasepool {`

    `          NSString *filePath = @""; // some default path here`

    `          [imageData writeToFile:filePath atomically:YES];`

    `       }`

    `    }`

    `}`


    `+ (void)caller {`

    `   NSData *imageData = nil;`

    `   [NSThread detachNewThreadSelector:@selector(saveImage:) toTarget:self`

    `withObject:imageData];`

    `}`


    As you may or may not see, the problem is with `@synchronized (self);` line. You
    are doing multithreading and you block only one thread to access to that piece
    of code at the time. What is the benefit of multithreading in this case? So, you
    have to be careful with locks. You are doing multithreading to make sure that
    your I/O-bound tasks get the benefit of not waiting or blocking a thread for a
    long time. If you don’t use threads in a proper way, all your threads still need
    to wait for each other before they can start their tasks.'
  trans: "\n# 性能\n\n性能是在应用中使用多线程的主要原因。然而，如你所见，如果使用不当，你的应用将面临诸多问题。正如我先前所示，若无法驾驭多线程的安全风险，应用将频繁崩溃。此外，部分功能会因线程阻塞或永久相互等待而失效。因此，在将多线程集成到应用中时，必须优先确保应用正常运行，之后再考虑性能问题。\n\
    \n鉴于上述问题，你应当仔细考量应用是否真的需要借助多线程来提升运行速度。要判断某项计算或运算是否需要分散到多个独立线程执行，需自问该任务是 CPU 密集型还是\
    \ I/O 密集型。\n\nCPU 密集型任务是指大部分或全部时间都在占用 CPU 并使其持续繁忙的任务。以下是 CPU 密集型任务的一些示例：\n\n-\
    \ 复杂算法，例如在计算游戏逻辑时合并两个数组。\n- 从内存中（已加载并存储在内存中）的较大字符串中扫描指定字符串。\n\n相比之下，I/O 密集型任务则大部分时间都在等待其他来源的数据。例如，若需从文件或远程服务器读取并加载图像，线程大部分时间会处于空闲状态，仅等待远程服务器的数据。这类任务称为\
    \ I/O 任务，应在独立线程中执行。\n\n为什么不应该将 CPU 密集型任务拆分为多个线程？这样做是否有助于加快计算速度？请参阅图 6–12 以详细了解。\n\
    \n如图 6–12 所示，当 CPU 需要在线程间切换时，会消耗一定的时间和资源。因此，任何多线程应用都存在开销成本。如果你的任务仅是 CPU 密集型，那么\
    \ CPU 完成整个任务所需时间会更长，因为任务数量相同，但 CPU 还需应对额外开销。不过，如果未来 iPhone 确实增加了更多的 CPU 核心，将任务拆分才是有意义的。\n\
    \n![images](img/0612.jpg)\n\n**图 6–12.** *CPU 在线程切换上消耗的时间*\n\n在 I/O 任务中，情况则有所不同。如果\
    \ CPU 不切换到其他线程，它只会原地等待数据，无所事事。因此，对于 I/O 任务，应始终将其放入另一个线程，以便 CPU 能处理其他事务，而不是空等数据。\n\
    \n换句话说，想象一家超市。你的任务是服务所有顾客。以下两种场景有助于解释这两个概念：\n\n- 如果所有顾客都相同，且频繁到来，你可以选择将他们安排到多个类似的结账通道，或让他们排在同一个队列中。若将顾客分散到多个通道，但你只有一位收银员，他就需要在各个收银台之间来回切换服务。但如果让他们排在同一队列，收银员就无需来回移动。这类似于\
    \ CPU 密集型任务。\n- 然而，如果有不同类型的顾客，且他们不常光顾，情况就不同了。例如，你可以设置一个客服柜台、一个自助结账区和结账通道区。如果顾客不常来结账通道，收银员就只能站在那里等待，无所事事。或者他可以在不同区域间频繁切换：在客服柜台解答问题，在自助结账区提供协助。你无需雇用三位收银员，也无法将顾客安排到同一队列。这类似于\
    \ I/O 密集型任务，即数据并非同类，也不会频繁进入同一队列。\n\n你还需要考虑用户响应性。如果你的 CPU 密集型计算耗时过长，整个用户界面将被阻塞且失去响应。因此，如果是主线程（或\
    \ UI 线程），你需要将任何繁重的计算（无论是 CPU 密集型还是 I/O 密集型）都移出该线程。\n\n在设计多线程应用时，还需留意其他性能问题。查看以下代码，看看能否发现其中的问题：\n\
    \n```\n+ (void)saveImage:(NSData *)imageData {\n   @synchronized (self) {\n  \
    \     @autoreleasepool {\n          NSString *filePath = @\"\"; // 某默认路径\n   \
    \       [imageData writeToFile:filePath atomically:YES];\n       }\n    }\n}\n\
    \n+ (void)caller {\n   NSData *imageData = nil;\n   [NSThread detachNewThreadSelector:@selector(saveImage:)\
    \ toTarget:self\nwithObject:imageData];\n}\n```\n\n你或许能发现，问题在于 `@synchronized\
    \ (self);` 这一行。你正在使用多线程，但每次只允许一个线程访问这段代码。在这种情况下，多线程的优势何在？因此，使用锁时必须格外谨慎。你采用多线程是为了确保\
    \ I/O 密集型任务能受益于无需长时间等待或阻塞线程。如果线程使用不当，所有线程在开始执行任务前仍需要相互等待。\n"
- fmt: "# Thread Synchronization\n\nNow, let’s move to some other important parts\
    \ of multithreading. Since every thread runs in its own stack and create its own\
    \ objects, how can your threads communicate and share data between different threads\
    \ inside your application? As mentioned, when you share your data structure or\
    \ objects between multiple threads, there’s a risk that many threads are trying\
    \ to change that object or data structure.\n\nFirst, I want to introduce a new\
    \ term called *thread-safe*. Thread-safe classes (or functions) are classes where\
    \ you don’t have to worry about any of the previously mentioned safety issues.\
    \ These classes will either take care of the locking process or they are immutable\
    \ classes (they can’t be changed). Here is a list of thread-safe classes or functions:\n\
    \n- `NSArray`\n- `NSConnection`\n- `NSData`\n- `NSDate`\n- `NSDictionary`\n- `NSNumber`\n\
    - `NSObject`\n- `NSSet`\n- `NSString`\n\nAnd other, usually mutable, thread-unsafe\
    \ classes:\n\n- `NSMutableArray`\n- `NSMutableAttributedString`\n- `NSMutableCharacterSet`\n\
    - `NSMutableData`\n- `NSMutableDictionary`\n- `NSMutableSet`\n- `NSMutableString`\n\
    \nWhy should you prefer thread-safe classes to thread-unsafe classes? Why don’t\
    \ you just use mutable classes but make sure about locking? Let me give you an\
    \ example of locking issues that you may have with changing objects when accessing\
    \ by threads:\n\n```\nNSMutableArray* myArray = GetSharedArray();\nid anObject;\n\
    \nif ([myArray count] > 0) {\n  anObject = [myArray objectAtIndex:0];\n}\n\n[anObject\
    \ doSomething];\n```\n\nThis example is very simple but it will help you understand\
    \ a very important concept. Do you see what’s wrong with this code? After your\
    \ code checks for the length of the array, another thread can modify that array,\
    \ and there may be no object in the array anymore because the other thread can\
    \ remove all the objects out. So, you improve it a little bit by adding lock in,\
    \ but this is not a perfect solution yet.\n\n```\nNSLock* arrayLock =[[NSLock\
    \ alloc] init];\nNSMutableArray* myArray = GetSharedArray();\nid anObject;\n\n\
    [arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray objectAtIndex:0];\n\
    }\n[arrayLock unlock];\n\n[anObject doSomething];\n```\n\nThat’s better, but there\
    \ are still some issues, such as the fact that the object you get out can be changed\
    \ or modified by some other thread. Therefore, the next step is to put the line\
    \ `[anObject doSomething];` into the lock area as well.\n\n```\nNSLock* arrayLock\
    \ =[[NSLock alloc] init];\nNSMutableArray* myArray = GetSharedArray();\nid anObject;\n\
    \n[arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray objectAtIndex:0];\n\
    \   [anObject doSomething];\n}\n\n[arrayLock unlock];\n```\n\nIf the `myArray`\
    \ object you have is an `NSArray` without an `NSMutableArray`, you may not need\
    \ the lock at all. You can just call them normally.\n\n```\nNSArray* myArray =\
    \ GetSharedArray();\nid anObject;\n\nanObject = [myArray objectAtIndex:0];\n[anObject\
    \ doSomething];\n```\n\nThis is the good thing about using immutable objects rather\
    \ than mutable objects. You can be sure that while you are processing these objects,\
    \ nobody else can change or modify their properties.\n\n# Alternatives to Threads\n\
    \nSometimes you don’t want the headache of threads or you don’t want to create\
    \ and manage separate threads yourself. For example, if you want to have a timer\
    \ to call your method every 2 seconds, you may have to write a thread that keeps\
    \ looping, sleeps 2 seconds, and then calls the methods. Or you may want to write\
    \ code to handle asynchronous behaviors like downloading a file to the network.\
    \ Or you simply want to continue a heavy calculation process when your iPhone\
    \ is free from working. These are not easy to implement properly or with decent\
    \ performance. I will discuss some solutions.\n\n## NSTimer\n\n`NSTimer` doesn’t\
    \ promise to be really precise; if you set a firing time to be 0.5 seconds, the\
    \ timer can fire at 0.55 or even 0.6 seconds. However, it is a good mechanism\
    \ if you only want a relatively precise mechanism for scheduling.\n\n### Repeating\
    \ vs. Non-Repeating Timers\n\nYou can schedule a repeating timer or a non-repeating\
    \ timer. For a repeating timer, the timer will fire after every interval of time\
    \ that you specify and never get invalidated. You need to manually invalidate\
    \ the repeating timer if you want it to stop. For a non-repeating timer, it will\
    \ only fire the event once and then get invalidated automatically. For both cases,\
    \ once a timer is invalidated, it can’t be reused; you will need to create another\
    \ timer.\n\nTo create a timer, you may choose to call either\n\n`+ scheduledTimerWithTimeInterval:target:selector:userInfo:\
    \ repeats:`\n\nor\n\n`+ timerWithTimeInterval:target:selector:userInfo:repeats:`\n\
    \nThe first line will create a new timer, add it to the current run loop, and\
    \ return the timer object back to you. The second method will just create a new\
    \ timer; you’ll need to add it the run loop yourself by calling `[runLoop addTimer:forMode:]`.\n\
    \nTo invalidate a timer when using the repeating timer, you need to use `invalidate`\
    \ method as in the following: `[aTimer invalidate];`\n\n**NOTE:** On a thread\
    \ without the runloop, `NSTimer` doesn’t work at all."
  raw: '#### Thread Synchronization


    Now, let’s move to some other important parts of multithreading. Since every thread
    runs in its own stack and create its own objects, how can your threads communicate
    and share data between different threads inside your application? As mentioned,
    when you share your data structure or objects between multiple threads, there’s
    a risk that many threads are trying to change that object or data structure.


    First, I want to introduce a new term called *thread-safe*. Thread-safe classes
    (or functions) are classes where you don’t have to worry about any of the previously
    mentioned safety issues. These classes will either take care of the locking process
    or they are immutable classes (they can’t be changed). Here is a list of thread-safe
    classes or functions:


    *   `NSArray`

    *   `NSConnection`

    *   `NSData`

    *   `NSDate`

    *   `NSDictionary`

    *   `NSNumber`

    *   `NSObject`

    *   `NSSet`

    *   `NSString`


    And other, usually mutable, thread-unsafe classes:


    *   `NSMutableArray`

    *   `NSMutableAttributedString`

    *   `NSMutableCharacterSet`

    *   `NSMutableData`

    *   `NSMutableDictionary`

    *   `NSMutableSet`

    *   `NSMutableString`


    Why should you prefer thread-safe classes to thread-unsafe classes? Why don’t
    you just use mutable classes but make sure about locking? Let me give you an example
    of locking issues that you may have with changing objects when accessing by threads:


    `NSMutableArray* myArray = GetSharedArray();`

    `id anObject;`


    `if ([myArray count] > 0) {`

    `  anObject = [myArray objectAtIndex:0];`

    `}`


    `[anObject doSomething];`


    This example is very simple but it will help you understand a very important concept.
    Do you see what’s wrong with this code? After your code checks for the length
    of the array, another thread can modify that array, and there may be no object
    in the array anymore because the other thread can remove all the objects out.
    So, you improve it a little bit by adding lock in, but this is not a perfect solution
    yet.


    `NSLock* arrayLock =[[NSLock alloc] init];`

    `NSMutableArray* myArray = GetSharedArray();`

    `id anObject;`


    `[arrayLock lock];`

    `if ([myArray count] > 0) {`

    `   anObject = [myArray objectAtIndex:0];`

    `}`

    `[arrayLock unlock];`


    `[anObject doSomething];`


    That’s better, but there are still some issues, such as the fact that the object
    you get out can be changed or modified by some other thread. Therefore, the next
    step is to put the line `[anObject doSomething];` into the lock area as well.


    `NSLock* arrayLock =[[NSLock alloc] init];`

    `NSMutableArray* myArray = GetSharedArray();`

    `id anObject;`


    `[arrayLock lock];`

    `if ([myArray count] > 0) {`

    `   anObject = [myArray objectAtIndex:0];`

    `   [anObject doSomething];`

    `}`


    `[arrayLock unlock];`


    If the `myArray` object you have is an `NSArray` without an `NSMutableArray`,
    you may not need the lock at all. You can just call them normally.


    `NSArray* myArray = GetSharedArray();`

    `id anObject;`


    `anObject = [myArray objectAtIndex:0];`

    `[anObject doSomething];`


    This is the good thing about using immutable objects rather than mutable objects.
    You can be sure that while you are processing these objects, nobody else can change
    or modify their properties.


    #### Alternatives to Threads


    Sometimes you don’t want the headache of threads or you don’t want to create and
    manage separate threads yourself. For example, if you want to have a timer to
    call your method every 2 seconds, you may have to write a thread that keeps looping,
    sleeps 2 seconds, and then calls the methods. Or you may want to write code to
    handle asynchronous behaviors like downloading a file to the network. Or you simply
    want to continue a heavy calculation process when your iPhone is free from working.
    These are not easy to implement properly or with decent performance. I will discuss
    some solutions.


    ##### NSTimer


    `NSTimer` doesn’t promise to be really precise; if you set a firing time to be
    0.5 seconds, the timer can fire at 0.55 or even 0.6 seconds. However, it is a
    good mechanism if you only want a relatively precise mechanism for scheduling.


    ###### Repeating vs. Non-Repeating Timers


    You can schedule a repeating timer or a non-repeating timer. For a repeating timer,
    the timer will fire after every interval of time that you specify and never get
    invalidated. You need to manually invalidate the repeating timer if you want it
    to stop. For a non-repeating timer, it will only fire the event once and then
    get invalidated automatically. For both cases, once a timer is invalidated, it
    can’t be reused; you will need to create another timer.


    To create a timer, you may choose to call either


    `+ scheduledTimerWithTimeInterval:target:selector:userInfo: repeats:`


    or


    `+ timerWithTimeInterval:target:selector:userInfo:repeats:`


    The first line will create a new timer, add it to the current run loop, and return
    the timer object back to you. The second method will just create a new timer;
    you’ll need to add it the run loop yourself by calling `[runLoop addTimer:forMode:].`


    To invalidate a timer when using the repeating timer, you need to use `invalidate`
    method as in the following: `[aTimer invalidate];`


    **NOTE:** On a thread without the runloop, `NSTimer` doesn’t work at all.'
  trans: "\n# 线程同步\n\n现在，我们来谈谈多线程中其他一些重要的部分。由于每个线程都在自己的栈中运行并创建属于自己的对象，那么你的线程如何在应用程序内部的不同线程之间通信和共享数据呢？如前所述，当你在多个线程之间共享数据结构或对象时，就存在多个线程试图修改该对象或数据结构的风险。\n\
    \n首先，我想介绍一个新术语：*线程安全*。线程安全的类（或函数）是指你无需担心之前提到的任何安全问题的类。这些类要么会自行处理锁定过程，要么是不可变类（它们无法被修改）。以下是线程安全类或函数的列表：\n\
    \n- `NSArray`\n- `NSConnection`\n- `NSData`\n- `NSDate`\n- `NSDictionary`\n- `NSNumber`\n\
    - `NSObject`\n- `NSSet`\n- `NSString`\n\n以及其他通常可变的、非线程安全的类：\n\n- `NSMutableArray`\n\
    - `NSMutableAttributedString`\n- `NSMutableCharacterSet`\n- `NSMutableData`\n\
    - `NSMutableDictionary`\n- `NSMutableSet`\n- `NSMutableString`\n\n为什么你应该优先选择线程安全的类，而不是非线程安全的类呢？为什么你不直接使用可变类，同时确保做好锁定呢？让我给你举一个例子，展示当你通过线程访问并修改对象时可能遇到的锁定问题：\n\
    \n```\nNSMutableArray* myArray = GetSharedArray();\nid anObject;\n\nif ([myArray\
    \ count] > 0) {\n  anObject = [myArray objectAtIndex:0];\n}\n\n[anObject doSomething];\n\
    ```\n\n这个例子非常简单，但它能帮助你理解一个非常重要的概念。你看出这段代码有什么问题了吗？在代码检查完数组长度之后，另一个线程可能会修改这个数组，并且此时数组中可能已经没有对象了，因为另一个线程可能已经移除了所有对象。于是，你通过添加锁进行了一点改进，但这仍然不是一个完美的解决方案。\n\
    \n```\nNSLock* arrayLock =[[NSLock alloc] init];\nNSMutableArray* myArray = GetSharedArray();\n\
    id anObject;\n\n[arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray\
    \ objectAtIndex:0];\n}\n[arrayLock unlock];\n\n[anObject doSomething];\n```\n\n\
    这样好一些了，但仍然存在一些问题，例如你取出的对象可能会被其他线程更改或修改。因此，下一步是把 `[anObject doSomething];` 这一行也放入锁定区域。\n\
    \n```\nNSLock* arrayLock =[[NSLock alloc] init];\nNSMutableArray* myArray = GetSharedArray();\n\
    id anObject;\n\n[arrayLock lock];\nif ([myArray count] > 0) {\n   anObject = [myArray\
    \ objectAtIndex:0];\n   [anObject doSomething];\n}\n\n[arrayLock unlock];\n```\n\
    \n如果你拥有的 `myArray` 对象是一个 `NSArray` 而不是 `NSMutableArray`，那么你可能根本不需要锁。你可以直接正常调用它们。\n\
    \n```\nNSArray* myArray = GetSharedArray();\nid anObject;\n\nanObject = [myArray\
    \ objectAtIndex:0];\n[anObject doSomething];\n```\n\n这就是使用不可变对象优于可变对象的好处。你可以确信，在处理这些对象时，没有其他人能够更改或修改它们的属性。\n\
    \n# 线程的替代方案\n\n有时你不想处理线程带来的难题，或者不想自己创建和管理独立的线程。例如，如果你想要一个定时器每 2 秒调用你的方法，你可能需要编写一个持续循环、休眠\
    \ 2 秒然后调用方法的线程。或者你可能想编写代码来处理异步行为，比如从网络下载文件。或者你只想在 iPhone 空闲时继续执行一个繁重的计算过程。这些操作很难正确实现或获得良好的性能。我将讨论一些解决方案。\n\
    \n## NSTimer\n\n`NSTimer` 并不能保证非常精确；如果你将触发时间设置为 0.5 秒，定时器可能会在 0.55 秒甚至 0.6 秒时触发。但是，如果你只需要一个相对精确的调度机制，它仍然是一个好用的机制。\n\
    \n### 重复定时器与非重复定时器\n\n你可以调度一个重复定时器或一个非重复定时器。对于重复定时器，定时器会根据你指定的时间间隔不断触发，并且永远不会自动失效。如果你希望它停止，需要手动使重复定时器失效。对于非重复定时器，它只会触发一次事件，然后自动失效。在这两种情况下，一旦定时器失效，就不能再重复使用；你需要创建另一个定时器。\n\
    \n要创建定时器，你可以选择调用\n\n`+ scheduledTimerWithTimeInterval:target:selector:userInfo:\
    \ repeats:`\n\n或\n\n`+ timerWithTimeInterval:target:selector:userInfo:repeats:`\n\
    \n第一个方法会创建一个新的定时器，将其添加到当前的运行循环中，并将定时器对象返回给你。第二个方法只会创建一个新的定时器；你需要自己调用 `[runLoop\
    \ addTimer:forMode:]` 将其添加到运行循环中。\n\n当使用重复定时器并需要使其失效时，你需要使用 `invalidate` 方法，如下所示：`[aTimer\
    \ invalidate];`\n\n**注意：** 在没有运行循环的线程上，`NSTimer` 根本无法工作。\n"
- fmt: "### Asynchronous Functions\n\nIn many cases, asynchronous functions can be\
    \ more lightweight than threads. For example, the iPhone environment can reuse\
    \ threads from the thread pool to handle the asynchronous functions. Moreover,\
    \ if you need to handle 100 asynchronous functions, the OS may only need to create\
    \ 10 threads because one thread can handle multiple asynchronous functions. The\
    \ only problem is that sometimes it may look more complicated than if you just\
    \ create some threads and a synchronous request to handle them.\n\n[Listing 6–9](#Chapter06.html#list_6_9)\
    \ is a block of code to create an asynchronous request to the server and merge\
    \ result back to create a complete data object.\n\n**Listing 6–9.** *Asynchronous\
    \ Calling*\n\n`MyFetcher.h`\n\n```objc\n#import <Foundation/Foundation.h>\n\n\
    @interface MyFetcher : NSObject {\n@private\n    NSURLRequest *request;\n    NSMutableData\
    \ *data;\n    UIImage *image;\n    NSURL *imageURL;\n}\n\n@property (nonatomic,\
    \ strong) NSURLRequest *request;\n@property (nonatomic, strong) NSMutableData\
    \ *data;\n@property (nonatomic, strong) IBOutlet UIImage *image;\n@property (nonatomic,\
    \ strong) NSURL *imageURL;\n\n- (void)loadImageWithURL:(NSURL *)url;\n\n@end\n\
    ```\n\n`MyFetcher.m`\n\n```objc\n#import \"MyFetcher.h\"\n\n@implementation MyFetcher\n\
    @synthesize request;\n@synthesize data;\n@synthesize image;\n@synthesize imageURL;\n\
    \n- (void)loadImageWithURL:(NSURL *)url {\n    self.request = [NSURLRequest requestWithURL:url];\n\
    \    NSURLConnection *connection = [NSURLConnection connectionWithRequest:self.request\
    \ delegate:self];\n    if (connection) {\n        self.data = [NSMutableData data];\n\
    \    }\n}\n\n- (void)connection:(NSURLConnection *)conn didReceiveResponse:(NSURLResponse\
    \ *)response_ {\n    [data setLength:0];\n}\n\n- (void)connection:(NSURLConnection\
    \ *)conn didReceiveData:(NSData *)data_ {\n    [data appendData:data_];\n}\n\n\
    - (void)connectionDidFinishLoading:(NSURLConnection *)connection {\n    self.image\
    \ = [UIImage imageWithData:self.data];\n}\n\n- (void)connection:(NSURLConnection\
    \ *)connection didFailWithError:(NSError *)error {\n    self.data = nil;\n   \
    \ self.image = nil;\n}\n\n@end\n```\n\nCompare that with this simple threading\
    \ and synchronous solution:\n\n```objc\n@autoreleasepool {\n    NSData *imageData\
    \ = [NSData dataWithContentsOfURL:imageURL];\n}\n```\n\nYou can see that in some\
    \ cases, you may need to write more code to have better performance. You just\
    \ need to make sure what you are doing will actually benefit you.\n\nIf you are\
    \ doing synchronous HTTP request, you have to run it on a background thread. It\
    \ is the iOS’s policy to kill your application if it becomes non-responsive for\
    \ a long time. That would certainly create a bad impression about your application.\n\
    \n**NOTE:** If you have too many simultaneous HTTP calls, you may consider creating\
    \ a separate thread to handle asynchronous calls to avoid any impact on the main\
    \ thread.\n\n### Idle-Time Notifications\n\nThere are things you want to do only\
    \ when the system is idle. For example, if you want to send some feedback from\
    \ the iPhone to your server, you may not want to send it when other processes\
    \ are running or other users are still interacting with the device. You should\
    \ only send it if the user or the device has nothing else to do. This would be\
    \ a really hard job to do it on your own. Happily, Apple has provides a function\
    \ for it. You can use `NSNotificationQueue` to post a notification with the style\
    \ `NSPostWhenIdle`, as in the following code:\n\n```objc\n- (void)notificationMethod\
    \ {\n    // do something here\n}\n\n- (void)registerForNotification {\n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \   selector:@selector(notificationMethod)\n                                 \
    \                name:@\"my_notification\"\n                                 \
    \              object:nil];\n    NSNotification *notification = [NSNotification\
    \ notificationWithName:@\"my_notification\" object:nil];\n    [[NSNotificationQueue\
    \ defaultQueue] enqueueNotification:notification\n                           \
    \                   postingStyle:NSPostWhenIdle];\n}\n```\n\nAs you can see, it\
    \ works just like the normal way you use `NSNotificationCenter`; you add the object\
    \ and method as observer and selector. Then you can post a new notification to\
    \ the queue so that the method is processed when the system is in the idle state.\n\
    \n### Thread Instrument for iPhone\n\nThe thread instrument was discussed in [Chapter\
    \ 2](#Chapter02.html#ch2) so [Figure 6–13](#Chapter06.html#fig_6_13) is just a\
    \ simple figure to remind you about the instrument.\n\n![images](images/0613.jpg)\n\
    \n**Figure 6–13** *Thread Instrument for iPhone*\n\nThe instrument doesn’t give\
    \ you much information except the current state of running threads inside your\
    \ application. This can help you know if you are overloading the system by having\
    \ too many running threads or any threads that suspend and wait for too long,\
    \ which is a signal of a deadlock.\n\n### Summary\n\nIn this chapter, you learned\
    \ how to improve the performance of your app using multithreading. The concept\
    \ is really simple: you create a new thread to handle some calculations. However,\
    \ to make it correct and safe for the application, you need to be aware of many\
    \ different pitfalls. You also need to know about the concept of CPU-bound tasks\
    \ and I/O-bound tasks to make sure what you are doing will really boost the performance\
    \ of your application up, not make it slower. You learned how to create, manage,\
    \ and run threads in different ways. You also learned objective-C style and its\
    \ syntax to deal with lock and thread synchronization issues, which are really\
    \ important.\n\n**EXERCISES**\n\n1. Write a complete program to download and display\
    \ an image from the Internet into a `UIImageView`. You can use the template called\
    \ View-based application in XCode.\n2. Rewrite the `ThreadLock` example using\
    \ `NSLock` so that it doesn’t have the deadlock issue.\n3. Rewrite the sample\
    \ project MultiThreadingSample to use threading with synchronous requests instead\
    \ of asynchronous requests.\n\n## Chapter 7\n\n## Optimize Memory Usage for Better\
    \ Performance\n\nIn this chapter, you will learn the following:\n\n- Review the\
    \ old manual memory management policies\n- Object ownership policy\n- The new\
    \ Automatic Memory Management bases on the old manual memory management.\n- What\
    \ object copying is and how to use it.\n- How to use `autorelease` and `release`\
    \ methods properly.\n- A review of memory instruments.\n\niPhone is a constrained\
    \ environment with a limited amount of memory. However, many developers either\
    \ underestimate or overestimate that fact, so they don't take advantage of all\
    \ the available memory in the iPhone to boost performance. Others are so scared\
    \ of memory and performance in iPhone that they do lots of premature optimization,\
    \ which harms the readability of the code and makes it hard to maintain the code\
    \ base later.\n\nTo utilize the memory for better performance and better readability\
    \ without making the application crash, you need to understand the memory structure\
    \ of the iPhone environment. You need to learn how to avoid holding too many objects\
    \ in memory, which can cause a memory warning and then a crash. You also need\
    \ to learn when you should retain an object or release an object; if you hold\
    \ too few objects in memory, it can make your calculation run slower because you\
    \ need to reconstruct the object or load it from the file system.\n\n### A Little\
    \ Review\n\nThis part gives you a good transition to the new automatic reference\
    \ counting (ARC) mechanism. Some people got confused about the transition to a\
    \ new learning experience. I hope that this part can help you to move smoothly\
    \ without any problems to the new ARC mechanism."
  raw: '##### Asynchronous Functions


    In many cases, asynchronous functions can be more lightweight than threads. For
    example, the iPhone environment can reuse threads from the thread pool to handle
    the asynchronous functions. Moreover, if you need to handle 100 asynchronous functions,
    the OS may only need to create 10 threads because one thread can handle multiple
    asynchronous functions. The only problem is that sometimes it may look more complicated
    than if you just create some threads and a synchronous request to handle them.


    [Listing 6–9](#Chapter06.html#list_6_9) is a block of code to create an asynchronous
    request to the server and merge result back to create a complete data object.


    **Listing 6–9.** *Asynchronous Calling*


    `MyFetcher.h`


    `#import <Foundation/Foundation.h>`


    `@interface MyFetcher : NSObject {`

    ` @private`

    `   NSURLRequest *request;`

    `   NSMutableData *data;`

    `   UIImage *image;    `

    `   NSURL *imageURL;`

    `}`


    `@property (nonatomic, strong) NSURLRequest *request;`

    `@property (nonatomic, strong) NSMutableData *data;`

    `@property (nonatomic, strong) IBOutlet UIImage *image;`

    `@property (nonatomic, strong) NSURL *imageURL;`


    `- (void)loadImageWithURL:(NSURL *)url;`


    `@end`


    `MyFetcher.m`


    `#import "MyFetcher.h"`


    `@implementation MyFetcher`

    `@synthesize request;`

    `@synthesize data;`

    `@synthesize image;`

    `@synthesize imageURL;`


    `- (void)loadImageWithURL:(NSURL *)url {`

    `   self.request = [NSURLRequest requestWithURL:url];`

    `   NSURLConnection *connection = [NSURLConnection connectionWithRequest:self.request`

    `delegate:self];`

    `   if (connection) {`

    `       self.data = [NSMutableData data];`

    `   }`

    `}`


    `- (void)connection:(NSURLConnection *)conn didReceiveResponse:(NSURLResponse
    *)response_ {`

    `   [data setLength:0];`

    `}`


    `- (void)connection:(NSURLConnection *)conn didReceiveData:(NSData *)data_ {`

    `   [data appendData:data_];`

    `}`


    `- (void)connectionDidFinishLoading:(NSURLConnection *)connection {`

    `   self.image = [UIImage imageWithData:self.data];`

    `}`


    `- (void)connection:(NSURLConnection *)connection didFailWithError:(NSError *)error
    {`

    `   self.data = nil;`

    `   self.image = nil;`

    `}`


    `@end`


    Compare that with this simple threading and synchronous solution:


    `@autoreleasepool {`

    `   NSData *imageData = [NSData dataWithContentsOfURL:imageURL];`

    `}`


    You can see that in some cases, you may need to write more code to have better
    performance. You just need to make sure what you are doing will actually benefit
    you.


    If you are doing synchronous HTTP request, you have to run it on a background
    thread. It is the iOS’s policy to kill your application if it becomes non-responsive
    for a long time. That would certainly create a bad impression about your application.


    **NOTE:** If you have too many simultaneous HTTP calls, you may consider creating
    a separate thread to handle asynchronous calls to avoid any impact on the main
    thread.


    ##### Idle-Time Notifications


    There are things you want to do only when the system is idle. For example, if
    you want to send some feedback from the iPhone to your server, you may not want
    to send it when other processes are running or other users are still interacting
    with the device. You should only send it if the user or the device has nothing
    else to do. This would be a really hard job to do it on your own. Happily, Apple
    has provides a function for it. You can use `NSNotificationQueue` to post a notification
    with the style `NSPostWhenIdle,` as in the following code:


    `- (void)notificationMethod {`

    `   // do something here`

    `}`


    `- (void)registerForNotification {`

    `   [[NSNotificationCenter defaultCenter] addObserver:self`

    `                                            selector:@selector(notificationMethod)`

    `                                                name:@"my_notification"`

    `                                              object:nil];`

    `   NSNotification *notification = [NSNotification`

    `notificationWithName:@"my_notification" object:nil];`

    `   [[NSNotificationQueue defaultQueue] enqueueNotification:notification`

    `postingStyle:NSPostWhenIdle];`

    `}`


    As you can see, it works just like the normal way you use `NSNotificationCenter`;
    you add the object and method as observer and selector. Then you can post a new
    notification to the queue so that the method is processed when the system is in
    the idle state.


    ### Thread Instrument for iPhone


    The thread instrument was discussed in [Chapter 2](#Chapter02.html#ch2) so [Figure
    6–13](#Chapter06.html#fig_6_13) is just a simple figure to remind you about the
    instrument.


    ![images](images/0613.jpg)


    **Figure 6–13***Thread Instrument for iPhone*


    The instrument doesn’t give you much information except the current state of running
    threads inside your application. This can help you know if you are overloading
    the system by having too many running threads or any threads that suspend and
    wait for too long, which is a signal of a deadlock.


    ### Summary


    In this chapter, you learned how to improve the performance of your app using
    multithreading. The concept is really simple: you create a new thread to handle
    some calculations. However, to make it correct and safe for the application, you
    need to be aware of many different pitfalls. You also need to know about the concept
    of CPU-bound tasks and I/O-bound tasks to make sure what you are doing will really
    boost the performance of your application up, not make it slower. You learned
    how to create, manage, and run threads in different ways. You also learned objective-C
    style and its syntax to deal with lock and thread synchronization issues, which
    are really important.


    **EXERCISES**


    1.  Write a complete program to download and display an image from the Internet
    into a `UIImageView`. You can use the template called View-based application in
    XCode.

    2.  Rewrite the `ThreadLock` example using `NSLock` so that it doesn’t have the
    deadlock issue.

    3.  Rewrite the sample project MultiThreadingSample to use threading with synchronous
    requests instead of asynchronous requests.


    ## Chapter 7


    ## Optimize Memory Usage for Better Performance


    In this chapter, you will learn the following:


    *   Review the old manual memory management policies

    *   Object ownership policy

    *   The new Automatic Memory Management bases on the old manual memory management.

    *   What object copying is and how to use it.

    *   How to use `autorelease` and `release` methods properly.

    *   A review of memory instruments.


    iPhone is a constrained environment with a limited amount of memory. However,
    many developers either underestimate or overestimate that fact, so they don''t
    take advantage of all the available memory in the iPhone to boost performance.
    Others are so scared of memory and performance in iPhone that they do lots of
    premature optimization, which harms the readability of the code and makes it hard
    to maintain the code base later.


    To utilize the memory for better performance and better readability without making
    the application crash, you need to understand the memory structure of the iPhone
    environment. You need to learn how to avoid holding too many objects in memory,
    which can cause a memory warning and then a crash. You also need to learn when
    you should retain an object or release an object; if you hold too few objects
    in memory, it can make your calculation run slower because you need to reconstruct
    the object or load it from the file system.


    ### A Little Review


    This part gives you a good transition to the new automatic reference counting
    (ARC) mechanism. Some people got confused about the transition to a new learning
    experience. I hope that this part can help you to move smoothly without any problems
    to the new ARC mechanism.'
  trans: "\n### 异步函数\n\n在许多情况下，异步函数可能比线程更轻量级。例如，iPhone 环境可以重用线程池中的线程来处理异步函数。此外，如果你需要处理\
    \ 100 个异步函数，操作系统可能只需创建 10 个线程，因为一个线程可以处理多个异步函数。唯一的问题是，有时它看起来可能比创建一些线程并使用同步请求来处理它们更复杂。\n\
    \n代码清单 6-9 是一个创建向服务器发送异步请求并将结果合并以创建完整数据对象的代码块。\n\n**代码清单 6-9.** *异步调用*\n\n`MyFetcher.h`\n\
    \n```objc\n#import <Foundation/Foundation.h>\n\n@interface MyFetcher : NSObject\
    \ {\n@private\n    NSURLRequest *request;\n    NSMutableData *data;\n    UIImage\
    \ *image;\n    NSURL *imageURL;\n}\n\n@property (nonatomic, strong) NSURLRequest\
    \ *request;\n@property (nonatomic, strong) NSMutableData *data;\n@property (nonatomic,\
    \ strong) IBOutlet UIImage *image;\n@property (nonatomic, strong) NSURL *imageURL;\n\
    \n- (void)loadImageWithURL:(NSURL *)url;\n\n@end\n```\n\n`MyFetcher.m`\n\n```objc\n\
    #import \"MyFetcher.h\"\n\n@implementation MyFetcher\n@synthesize request;\n@synthesize\
