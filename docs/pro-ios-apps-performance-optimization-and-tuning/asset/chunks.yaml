    ## About the Authors


    ![image](images/khang_vo.jpg) **Khang Vo** is a software engineer and entrepreneur
    who loves working on the latest technologies and products. He has been developing
    on the `iOS` platform since 2009\. He loves sharing and discussing different aspects
    of technology and business that help to create new value for consumers. Making
    and selling different applications in the Apple App Store and Android Market have
    been his main business. He is a Master''s student at Carnegie Mellon University.


    ## About the Technical Reviewer


    ![image](images/evan_coyne_maloney.jpg)**Evan Coyne Maloney** taught himself how
    to program after inheriting an Apple IIe computer. As a young teen in the mid-1980s,
    he published an operating system for the Apple II line called FoscilDOS that was
    highlighted by both *Byte* and *A+* magazines. Evan began writing Internet software
    in 1994, creating the KeepTalking chat system, the first purely browser-based
    live-updating chat system. In 1996, Evan wrote the web-based political campaign
    simulation game DarkHorse for MSNBC.com. During the presidential campaign that
    year, the game logged many millions of hours of play and was even used in political
    science classes at various high schools and colleges. Since 2001, Evan has put
    his development efforts towards mobile content delivery and commerce. He conceived
    of and built the first several versions of the award-winning News Pro line of
    iPhone and iPad applications from the Reuters news agency. Evan joined online
    retailer Gilt Groupe in 2010, where he is now the principal engineer for the company''s
    critically acclaimed and highly ranked iOS applications.'
