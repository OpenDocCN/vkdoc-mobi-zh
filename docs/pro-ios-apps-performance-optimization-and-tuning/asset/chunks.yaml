  trans: "\n### C/C++ 编程支持\n\n你可以在 Android 应用内部编写 C/C++ 代码，但这需要你了解 JNI（Java 本地接口）以及如何与\
    \ NDK（原生开发工具包）交互。交互的方式类似于使用 Objective-C 代码与 C/C++ 代码交互。你可能需要小心内存管理问题，并且不要把事情搞得太糟。使用\
    \ Java 可以让你拥有垃圾回收机制，而使用 C/C++ 则需要你手动管理内存。\n\n然而，Windows Phone 除了 C# 之外，不支持任何其他编程语言。如果你想开发游戏，你需要使用\
    \ XNA 与 C/C++ 结合。通过 NDK 从 Java 添加并调用 C/C++ 代码非常容易；只需编写一些包装代码即可。你需要一个包装方法来在 C 和\
    \ Java 之间进行转换。\n\n```\n#include <jni.h>\n#include <string.h>\n#include <android/log.h>\n\
    \nvoid Java_com_packagename_classname_helloLog(JNIEnv * env, jobject this, jstring\
    \ myLog)\n{\n    jboolean isCopy;\n    const char * szLogThis = (*env)->GetStringUTFChars(env,\
    \ logThis, &isCopy);\n    (*env)->ReleaseStringUTFChars(env, logThis, szLogThis);\n\
    }\n```\n\n长函数名是有原因的：第一个词是“Java”，后面跟着包名、类名和方法名。当你需要调用这个方法时，你可以使用以下格式进行调用：\n\n`helloLog(\"\
    This will log to LogCat via the native call.\");`\n\n你需要在你的类中定义方法接口，以便 Android\
    \ 能够正确地调用它。这将帮助 Android 将此接口与已编译原生代码中的实现链接起来。\n\n`private native void helloLog(String\
    \ logThis);`\n\n最后，你需要加载该库。事实上，一旦加载了类，就应该立即加载该库。\n\n```\nstatic {\n    System.loadLibrary(\"\
    ndk1\");\n}\n```\n\n### 总结\n\n在本章中，你了解了三个主要平台（iOS、Android 和 Windows Phone）在性能优化方面的差异。它们之间存在许多类似的问题，因为这三个平台都受到移动设备限制的影响。\n\
    \n对于 `ListView` 以及如何正确复用视图的问题，这三个平台以类似的方式解决——通过尝试减少加载所有数据，并尽可能复用视图。\n\n这三个平台的缓存和数据存储方式不同，因为它们选择了不同的方式来实现应用程序的数据存储和文件结构。iOS\
    \ 目前拥有最强大的数据库存储形式——`CoreData`，而 Android 可以利用外部存储的优势。Windows Phone 的 SQL 数据库版本预计将在明年秋季发布，这是所有\
    \ Windows Phone 开发者所期待的。\n\n在实现相同功能（例如多任务处理）时，这些平台之间也存在巨大差异。iOS 的多任务处理更侧重于快速应用切换，Android\
    \ 通过允许进程在后台运行来实现真正的多任务处理，而 Windows Phone 在此版本中不支持任何多任务处理。\n\n**练习**\n\n**1.**\
    \ 使用我提供的虚拟化数据示例代码实现 `ListView`。\n\n**2.** 创建一个至少包含 20 页的 Windows Phone 全景视图，在你的设备上运行它，看看是否有任何内存影响。对\
    \ Windows Phone 的 `Pivot` 控件执行相同操作。\n\n**3.** 实现一个 Android 后台服务，从互联网下载一张图片，然后关闭应用程序。\n\
    \n## 索引\n\n### ![image](img/square1.jpg)A\n\n**Android**\n\n基准测试, 244, 245\n\n\
    数据缓存, 250\n\n模拟器, 242–243\n\n`ListViews` 性能, 246–248\n\n内存管理, 259–260\n\n多任务处理,\
    \ 261–262\n\n多线程, 255–257\n\n编程语言, 242\n\n**自动引用计数 (ARC)**\n\n编码, 180\n\n限定符\n\
    \n自动释放, 183\n\n对象属性, 183\n\n强引用, 182\n\n不安全的非保留引用, 183\n\n变量声明, 183\n\n弱引用, 182\n\
    \n规则, 182\n\nXcode, 181\n\n### ![image](img/square1.jpg)B\n\n**贝拉迪算法**, 65\n\n\
    **大 O 表示法**\n\n计算逻辑, 90, 91\n\nCPU 采样器, 93, 94\n\n通用性能分析, 93\n\n插入排序性能, 92\n\n\
    `myFirstArray` 和 `mySecondArray` 元素, 90\n\n`myFirstCount` 和 `mySecondCount` 变量,\
    \ 90\n\n时间分析器, 93–95\n\n**二叉树**, 106\n\n插入/删除机制, 121\n\n左子节点和右子节点, 121\n\n节点和边,\
    \ 120\n\nO(log(n)) 性能, 119\n\n搜索策略, 117–118\n\n*搜索树*, 121, 123\n\n排序算法, 116\n\n\
    用途, 119\n\n**瓶颈**\n\n文件活动检测工具, 60, 61\n\n文件/网络加载测试, 60\n\n系统使用情况检测工具, 61\n"
