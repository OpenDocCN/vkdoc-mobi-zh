  trans: "\n### 数据缓存\n\n你在 第 3 章 中为 iOS 编程学习到的所有算法和术语，都可以毫无问题地应用于 Android 和 Windows\
    \ Phone。你应当学习的是与 Windows Phone 和 Android 直接相关的技术，例如在哪里存储缓存数据、缓存的频率以及缓存数据的格式。\n\
    \n内存缓存部分也应该与 iOS 没有区别，因为这三个平台的硬件规格并没有不同。你可以采用与 iOS 相同的内存缓存算法。我将重点介绍如何利用文件存储来获得最佳性能。\n\
    \n#### Android\n\n有很多地方可以存储缓存数据。\n\n*   **`SharedPreferences`**：这与 `NSUserDefaults`\
    \ 完全相同。你可以在此存储原始数据。它通常用于设置存储或轻量级数据存储。\n*   **内部存储**：你可以在设备存储中存储私有数据。它实际上是内部存储中的一个文件区域。其他应用程序无法访问此存储。\n\
    *   **外部存储**：在大多数 Android 手机中，用户可以通过可移动存储介质（例如 SD 卡）获得更多存储空间。保存在此处的文件对全局公开，甚至可以被用户修改。用户可以启用\
    \ USB 大容量存储来将文件传输到他们的计算机。\n*   **`SQLite`**：这是一个数据库，你可以像往常一样使用 Java 和 SQL 访问它，没有太大区别。这就是为什么如果你选择在\
    \ iPhone 的 SQLite 数据库中存储数据，你实际上可以在此处重用它。\n\n##### 内部存储\n\n文件在此处长期存储，并且仅对你的应用程序私有。你可以通过以下代码在此存储区域中存储文件：\n\
    \n```\nString FILENAME = \"hello_file\";\nString string = \"hello world!\";\n\n\
    FileOutputStream fos = openFileOutput(FILENAME, Context.MODE_PRIVATE);\nfos.write(string.getBytes());\n\
    fos.close();\n```\n\n此代码将字符串写入文件，然后保存该文件。\n\n要将数据保存在缓存文件夹中（该文件夹通常会被操作系统在不通知你的情况下删除），请使用\
    \ `getCacheDir()` 内的路径。\n\n**注意：**要像 iOS 中的应用包一样将文件保存到应用程序中，你可以保存到项目目录 `res/raw/`。你可以使用\
    \ `openRawResource()` 读取文件，但不能写入这些文件。\n\n##### 外部存储\n\n这是可移动存储，因此你需要检查该存储介质是否已连接到当前设备。\n\
    \n```\nString state = Environment.getExternalStorageState();\nif (Environment.MEDIA_MOUNTED.equals(state))\
    \ {\n  // 你可以读取和写入数据\n} else if (Environment.MEDIA_MOUNTED_READ_ONLY.equals(state))\
    \ {\n  // 你只能读取数据\n} else {\n  // 你既不能读取也不能写入数据\n}\n```\n\n这种介质具有更大的存储容量，因此你可以存储更多数据。但是，用户可能会误删除数据，或者未将介质连接到设备。卸载你的应用程序时，这些文件也会被删除。如果你不希望发生这种情况，或者希望与其他应用程序共享数据，可以将它们保存到根目录下的目录中，方法是调用\
    \ `getExternalStoragePublicDirectory()`。在外部介质中，你还有一个特定的缓存目录，用于保存不重要的缓存数据：`getExternalCacheDir()`。\n\
    \n##### SQLite 数据库\n\n存储在数据库中可能会导致复杂的问题，但它也有助于解决许多性能问题。有很多技巧可以帮助你提高数据库访问的性能，例如更好的索引、数据库分区和唯一键。我不会深入讨论数据库优化，因为它是一个非常庞大且专门的课题。可以说，SQLite\
    \ 与任何其他 SQL 数据库大致相似。\n\n#### Windows Phone\n\n微软发布了一个包含本地数据库的 Windows Phone 更新。如果你开始构建一个新应用程序并且想要使用数据库，现在就可以这样做。否则，如果你的应用程序密集使用其他存储机制，你可以选择优化它，而不是重建整个数据库。\n\
    \n在 Windows Phone 中，也有四种主要的文件存储方法。\n\n*   **`IsolatedStorageSettings`**：键值存储，与\
    \ `NSUserDefaults` 完全相同。\n    ```\n    IsolatedStorageSettings appSettings = IsolatedStorageSettings.ApplicationSettings;\n\
    \    appSettings.Add(\"email\", \"myemail@gmail.com\");\n    var myEmail = (string)appSettings[\"\
    email\"];\n    ```\n*   **`IsolatedStorageFile`**：在 Windows Phone 中用于将文件存储到文件系统。它没有像\
    \ Cache 或 Public 这样用于特定目的的默认目录。你需要创建自己的目录来处理存储过程。\n*   **XML 存储**：对于旧版应用程序，如果你没有数据库支持，你可能需要选择\
    \ XML 作为主要的存储机制。\n*   **本地数据库**：包含 Mango 的新版本将为 Windows Phone 提供本地数据库支持。本地存储性能的许多问题将随此新版本得到解决。\n\
    \n##### IsolatedStorageFile\n\nWindows Phone 中的文件存储很简单；你可以使用整个应用程序目录来做任何你想做的事情。操作系统不会处理任何事情，例如自动删除或限制此目录的存储限制。\n\
    \n```\nIsolatedStorageFile myStore = IsolatedStorageFile.GetUserStoreForApplication();\n\
    myStore.CreateDirectory(\"Cache\");\n\n// 指定文件路径和选项。\nusing (var isoFileStream\
    \ = new IsolatedStorageFileStream(\"Text1.txt\", FileMode.OpenOrCreate, myStore))\n\
    {\n  // 写入数据\n  using (var isoFileWriter = new StreamWriter(isoFileStream))\n\
    \  {\n    isoFileWriter.WriteLine(txtWrite.Text);\n  }\n}\n```\n\n要读取文件，请使用以下代码：\n\
    \n```\nusing (var isoFileStream = new IsolatedStorageFileStream(\"Cache\\\\Text1.txt\
    \ \", FileMode.Open, myStore))\n{\n  // 读取数据。\n  using (var isoFileReader = new\
    \ StreamReader(isoFileStream))\n  {\n    txtRead.Text = isoFileReader.ReadLine();\n\
    \  }\n}\n```\n\n你需要指定想要执行读取、写入或追加数据操作的读/写权限。\n\n##### XML 存储\n\n使用 XML 进行存储，然后使用\
    \ LINQ to XML 进行读写，这是一个痛苦的过程，并且会显著损害你的 Windows Phone 应用程序的性能。\n\n使用 LINQ to XML\
    \ 进行存储的主要性能问题在于，每次需要修改或读取数据时，都需要加载或保存整个 XML。这是因为 LINQ 使用 DOM 来访问数据。当你将整个大型 XML\
    \ 文件加载到内存中以访问它时，还会导致内存问题。如果你有一个小的 XML 文件，这不会带来任何麻烦。\n\n开发者有两种方法可以解决这个 XML 问题。\n\
    \n*   你有一个主文件，包含所有数据的主要结构。然后，你有几个较小的文件来存储关于每个主要数据项的数据。例如，对于一个 RSS 阅读器，你可以将所有频道信息存储在主文件中，然后为每个频道单独创建一个文件。\n\
    *   你仅缓存最新数据。任何超过 10 天的数据都可能被删除。这将减少本地 XML 文件中的数据量，并降低你工作的复杂性。缺点是，如有必要，你需要重新下载旧数据。\n\
    \n##### 数据库支持\n\n随着新的 Mango 版本发布，Windows Phone 将支持本地数据库存储。你很快就能拥有索引、分区、键和对数据库随机访问的所有强大功能。借助此新版本，你应该使用\
    \ LINQ to SQL 来实现良好的代码重用，因为 LINQ to SQL 和 LINQ to XML 共享许多代码库元素。\n"
- fmt: "### Data Structure and Algorithms\n\n`C#`, `Java`, and `Objective-C` have\
    \ similar built-in data structures to support the three main types of object collections:\
    \ set, array, and map. [Table 10–1](#Chapter10.html#tab_10_1) provides a summary\
    \ of these types of collections, their subtype, and how you can implement one\
    \ yourself.  \n![images](images/t1001.jpg)  \nThere are some less important data\
    \ structures such as stack and queue but you can always implement them yourself\
    \ based on what you learned in [Chapter 5](#Chapter05.html#ch5).\n\nFor XML parser,\
    \ Android supports both `SAX` and `DOM XML` parser by default so you won't need\
    \ to add another library just to support it. For `C#` on Windows Phone, you will\
    \ need to use `LINQ over XML` to handle the work in most cases because it provides\
    \ much better code maintenance and is actually faster than `DOM`. In case of a\
    \ really big XML files, consider using `XmlReader`.\n\n### Multithreading\n\n\
    `C#` and `Java` are powerful programming languages when it comes to managing multithreading.\
    \ Similar to iOS multithreading, the jobs for updating the UI will need to be\
    \ done on the UI thread; other long running operations need to be done in the\
    \ background thread.\n\nThe thread locking mechanisms for the three platforms\
    \ are similar, based on the notification mechanism. There are, though, some important\
    \ differences in the way each platform implements and sets specific rules for\
    \ its multithreading mechanism.\n\n#### Android\n\nJava has a multithreading mechanism\
    \ but Android prefers to use its own multithreading management mechanism. In Android,\
    \ there is a really strict rule for the UI thread. If the UI thread is blocked\
    \ for more than a few seconds (5 seconds currently), the user is presented with\
    \ the well-known pop up saying “Application not responding”. After that, your\
    \ application is forced to close.\n\nIn Java, you can create a thread simply by\
    \ subclassing the `Thread` class or implementing the `Runnable` interface. One\
    \ of the simplest ways is to use an anonymous method.\n\n```\nnew Thread(new Runnable()\
    \ {\n   public void run() {\n     // Your background code.\n   }\n}).start();\n\
    ```\n\nIf you create new class, which extends the `Thread` class, you can simply\
    \ call `newThread().start()`. If class B implements the `Runnable` interface,\
    \ then you can have `new Thread(B).start()`.\n\nThere are several ways that you\
    \ can update the UI in the UI thread, similar to the way the following iOS method\
    \ is called:\n\n```\n[obj performSelectorOnMainThread:mySelector withObject:nil\
    \ waitUntilDone:YES];\n```\n\nAndroid offers this list of ways you can update\
    \ the UI thread:\n\n*   `Activity.runOnUiThread(Runnable)`\n*   `View.post(Runnable)`\n\
    *   `View.postDelayed(Runnable, long)`\n*   `Handler`\n\nFor example, you can\
    \ use the following code to get the image in the background thread and then update\
    \ the UI thread:\n\n```\npublic void loadImage() {\n new Thread(new Runnable()\
    \ {\n   public void run() {\n     final Bitmap bitmapImage = loadBitmapImage();\n\
    \     myImageView.post(new Runnable() {\n       public void run() {\n        \
    \ myImageView.setImageBitmap(bitmapImage);\n       }\n     });\n   }\n }).start();\n\
    }\n```\n\nThe code can become more complex if inside your thread and inside the\
    \ UI update code you do a lot of processing. You can also create a class that\
    \ implements the `Runnable` interface and calls the `run()` method of this class.\
    \ Android also offers a simpler way to handle a complex thread processing logic:\
    \ the `AsyncTask` class. It's a better thread management structure to handle your\
    \ threading issues.\n\n```\nprivate class myAsyncTask extends AsyncTask<X, Y,\
    \ Z>\n  protected void onPreExecute(){\n  }\n\n  protected Z doInBackground(X...x){\n\
    \  }\n\n  protected void onProgressUpdate(Y y){\n  }\n\n  protected void onPostExecute(Z\
    \ z){\n  }\n}\n```\n\n*   `onPreExecute`: This method is called before your background\
    \ thread is executed.\n*   `doInBackground`: The main method runs in background\
    \ thread.\n*   `onProgressUpdate`: When you need to update the view in the main\
    \ thread with the current progress of the background thread.\n*   `onPostExecute`:\
    \ When your background thread finishes, this method is called on the UI thread,\
    \ and you can update your UI with the result of the background thread.\n\nAs you\
    \ can see from the class structure, you can define three generic type parameters:\
    \ `X`, `Y` and `Z`.\n\n*   `X`: The parameter type that you pass into the background\
    \ thread. You can pass an array of objects with type `X` into the background task.\n\
    *   `Y`: The parameter type you are going to enter in the `onProgressUpdate` method.\
    \ This method is called when you call `publishProgress(Y)` inside the `doInBackground()`\
    \ method. For example, you want to show the progress of the operation by a progress\
    \ bar.\n*   `Z`: The parameter type of the result from the operations you have\
    \ done in the background process.\n\nThe image download sample source code shown\
    \ previously can be rewritten as:\n\n```\npublic void loadImage() {\n new DownloadImageTask().execute(\"\
    http://example.com/image.png\");\n}\n\nprivate class DownloadImageTask extends\
    \ AsyncTask<String, Void, Bitmap> {\n    protected void onPreExecute(){\n    }\n\
    \n    protected Bitmap doInBackground(String... urls) {\n        return loadImageFromNetwork(urls[0]);\n\
    \    }\n\n    protected void onPostExecute(Bitmap result) {\n        mImageView.setImageBitmap(result);\n\
    \    }\n}\n```\n\nFor a locking thread to avoid thread race condition and avoid\
    \ deadlock, you can use a similar mechanism as iOS programming with the `wait()`,\
    \ `notify()` and `notifyAll()` methods. Here are similarities between these methods\
    \ and `NSCondition` methods you learned in [Chapter 6](#Chapter06.html#ch6):\n\
    \n*   `wait()`: Similar to `[condition lock]`, it locks the method or block of\
    \ code.\n*   `notify()` and `notifyAll()`: Similar to `[condition signal]` and\
    \ `[condition unlock]`, it unlocks the method and tells the other threads to come\
    \ in. The difference between `notify()` and `notifyAll()` is the first one will\
    \ randomly pick a thread to let it run while `notifyAll()` will let all threads\
    \ run.\n\n#### Windows Phone\n\nYou start a new thread in Windows Phone with:\n\
    \n```\npublic void loadImageFromNetwork()\n{\n}\nThread t = new Thread (loadImageFromNetwork);\n\
    t.Start();\n```\n\nAs normal, you will need to update your user interface in the\
    \ UI thread. This can be done by calling:\n\n```\nDispatcher.BeginInvoke(() =>\
    \ UpdateUI());\n```\n\nI used a normal lambda expression. If you don't understand\
    \ it, just leave it like the sample source code and put your method call in.\n\
    \nTo avoid race condition and deadlock, you will need to use locking mechanism,\
    \ the same way as in Java:\n\n*   `obj.notify()` => `Monitor.Pulse(obj)`\n*  \
    \ `obj.notifyAll()` => `Monitor.PulseAll(obj)`\n*   `obj.wait()` => `Monitor.Wait(obj)`\n\
    \n##### Asynchronous Download\n\nIn Windows Phone, because of the API restriction,\
    \ you can only use an asynchronous request to download the data from the Internet.\
    \ You will need to use `WebClient` or `HttpWebRequest` to make the request to\
    \ the server. The following is code to initiate a new web request and receive\
    \ back data:\n\n```\nWebClient webClient = new WebClient();\nwebClient.OpenReadCompleted\
    \ += new OpenReadCompletedEventHandler(wc_OpenReadCompleted);\nwebClient.OpenReadAsync(new\
    \ Uri(arbitraryImageUriThatKeepsChanging), webClient);\n\nvoid wc_OpenReadCompleted(object\
    \ sender, OpenReadCompletedEventArgs e)\n{\n  if (e.Error == null && !e.Cancelled)\n\
    \ {\n     try\n     {\n        BitmapImage image = new BitmapImage();\n      \
    \  image.SetSource(e.Result);\n        imgContent.Source = image;\n     }\n  \
    \   catch (Exception ex)\n     {\n         //Exception handle appropriately for\
    \ your app\n     }\n }\n}\n```"
  raw: '### Data Structure and Algorithms


    C#, Java, and Objective-C have similar built-in data structures to support the
    three main types of object collections: set, array, and map. [Table 10–1](#Chapter10.html#tab_10_1)
    provides a summary of these types of collections, their subtype, and how you can
    implement one yourself.


    ![images](images/t1001.jpg)


    There are some less important data structures such as stack and queue but you
    can always implement them yourself based on what you learned in [Chapter 5](#Chapter05.html#ch5).


    For XML parser, Android supports both `SAX and DOM XML` parser by default so you
    won''t need to add another library just to support it. For `C#` on Windows Phone,
    you will need to use `LINQ over XML` to handle the work in most cases because
    it provides much better code maintenance and is actually faster than `DOM`. In
    case of a really big XML files, consider using `XmlReader.`


    ### Multithreading


    C# and Java are powerful programming languages when it comes to managing multithreading.
    Similar to iOS multithreading, the jobs for updating the UI will need to be done
    on the UI thread; other long running operations need to be done in the background
    thread.


    The thread locking mechanisms for the three platforms are similar, based on the
    notification mechanism. There are, though, some important differences in the way
    each platform implements and sets specific rules for its multithreading mechanism.


    #### Android


    Java has a multithreading mechanism but Android prefers to use its own multithreading
    management mechanism. In Android, there is a really strict rule for the UI thread.
    If the UI thread is blocked for more than a few seconds (5 seconds currently),
    the user is presented with the well-known pop up saying “Application not responding”.
    After that, your application is forced to close.


    In Java, you can create a thread simply by subclassing the `Thread` class or implementing
    the Runnable interface. One of the simplest ways is to use an anonymous method.


    ` new Thread(new Runnable() {`

    `   public void run() {`

    `     // Your background code.`

    `   }`

    ` }).start();`


    If you create new class, which extends the `Thread` class, you can simply call
    `newThread().start`. If class B implements the Runnable interface, then you can
    have `newThread(B).start`.


    There are several ways that you can update the UI in the UI thread, similar to
    the way the following iOS method is called:


    `[obj performSelectorOnMainThread:mySelector withObject:nil waitUntilDone:YES];`


    Android offers this list of ways you can update the UI thread:


    *   `Activity.runOnUiThread(Runnable)`

    *   `View.post(Runnable)`

    *   `View.postDelayed(Runnable, long)`

    *   `Handler`


    For example, you can use the following code to get the image in the background
    thread and then update the UI thread:


    `public void loadImage() {`

    ` new Thread(new Runnable() {`

    `   public void run() {`

    `     final Bitmap bitmapImage = loadBitmapImage();`

    `     myImageView.post(new Runnable() {`

    `       public void run() {`

    `         myImageView.setImageBitmap(bitmapImage);`

    `       }`

    `     });`

    `   }`

    ` }).start();`

    `}`


    The code can become more complex if inside your thread and inside the UI update
    code you do a lot of processing. You can also create a class that implements the
    Runnable interface and calls the run method of this class. Android also offers
    a simpler way to handle a complex thread processing logic: the AsyncTask class.
    It''s a better thread management structure to handle your threading issues.


    `private class myAsyncTask extends AsyncTask<X, Y, Z>`

    `  protected void onPreExecute(){`

    `  }`


    `  protected Z doInBackground(X...x){`

    `  }`


    `  protected void onProgressUpdate(Y y){`

    `  }`


    `  protected void onPostExecute(Z z){`

    `  }`

    `}`


    *   `onPreExecute`: This method is called before your background thread is executed.

    *   `doInBackground`: The main method runs in background thread.

    *   `onProgressUpdate`: When you need to update the view in the main thread with
    the current progress of the background thread.

    *   `onPostExecute`: When your background thread finishes, this method is called
    on the UI thread, and you can update your UI with the result of the background
    thread.


    As you can see from the class structure, you can define three generic type parameters:
    X, Y and Z.


    *   X: The parameter type that you pass into the background thread. You can pass
    an array of objects with type X into the background task.

    *   Y: The parameter type you are going to enter in the `onProgressUpdate` method.
    This method is called when you call `publishProgress(Y`) inside the doInBackground
    method. For example, you want to show the progress of the operation by a progress
    bar.

    *   Z: The parameter type of the result from the operations you have done in the
    background process.


    The image download sample source code shown previously can be rewritten as


    `public void loadImage() {`

    ` new DownloadImageTask().execute("http://example.com/image.png");`

    `}`


    `private class DownloadImageTask extends AsyncTask<String, Void, Bitmap> {`

    `    protected void onPreExecute(){`

    `    }`


    `    protected Bitmap doInBackground(String... urls) {`

    `        return loadImageFromNetwork(urls[0]);`

    `    }`


    `    protected void onPostExecute(Bitmap result) {`

    `        mImageView.setImageBitmap(result);`

    `    }`

    `}`


    For a locking thread to avoid thread race condition and avoid deadlock, you can
    use a similar mechanism as iOS programming with the `wait, notify` and `notifyAll`
    methods. Here are similarities between these methods and `NSCondition` methods
    you learned in [Chapter 6](#Chapter06.html#ch6):


    *   `wait:` Similar to `[condition lock],` it locks the method or block of code.

    *   `notify and notifyAll:` Similar to `[condition signal]` and `[condition unlock],`
    it unlocks the method and tells the other threads to come in. The difference between
    `notify` and `notifyAll` is the first one will randomly pick a thread to let it
    run while `notifyAll` will let all threads run.


    #### Windows Phone


    You start a new thread in Windows Phone with


    `public void loadImageFromNetwork()`

    `{`

    `}`

    `Thread t = new Thread (loadImageFromNetwork);`

    `t.Start();`


    As normal, you will need to update your user interface in the UI thread. This
    can be done by calling


    `Dispatcher.BeginInvoke(() => UpdateUI());`


    I used a normal lambda expression. If you don''t understand it, just leave it
    like the sample source code and put your method call in.


    To avoid race condition and deadlock, you will need to use locking mechanism,
    the same way as in Java:


    `obj.notify() => Monitor.Pulse(obj)`

    `obj.notifyAll() => Monitor.PulseAll(obj)`

    `obj.wait() =>  Monitor.Wait(obj)`


    ##### Asynchronous Download


    In Windows Phone, because of the API restriction, you can only use an asynchronous
    request to download the data from the Internet. You will need to use WebClient
    or HttpWebRequest to make the request to the server. The following is code to
    initiate a new web request and receive back data:


    `WebClient webClient = new WebClient();`

    `webClient.OpenReadCompleted += new OpenReadCompletedEventHandler(wc_OpenReadCompleted);`

    `webClient.OpenReadAsync(new Uri(arbitraryImageUriThatKeepsChanging), webClient);`


    `void wc_OpenReadCompleted(object sender, OpenReadCompletedEventArgs e)`

    `{`

    `  if (e.Error == null && !e.Cancelled)`

    ` {`

    `     try`

    `     {`

    `        BitmapImage image = new BitmapImage();`

    `        image.SetSource(e.Result);`

    `        imgContent.Source = image;`

    `     }`

    `     catch (Exception ex)`

    `     {`

    `         //Exception handle appropriately for your app`

    `     }`

    ` }`

    `}`'
  trans: "\n### 数据结构与算法\n\n`C#`、`Java` 和 `Objective-C` 拥有相似的内置数据结构，用于支持三种主要的对象集合类型：集合、数组和映射。表\
    \ 10-1 总结了这些集合类型、它们的子类型以及如何自行实现。  \n![images](img/t1001.jpg)  \n还有一些不太重要的数据结构，比如栈和队列，但你总是可以根据在第\
    \ 5 章中学到的知识自行实现。\n\n对于 XML 解析器，Android 默认同时支持`SAX`和`DOM XML`解析器，因此你无需额外添加其他库。对于\
    \ Windows Phone 上的`C#`，在大多数情况下你需要使用`LINQ over XML`来处理相关工作，因为它提供了更好的代码可维护性，并且实际上比`DOM`更快。如果遇到非常大的\
    \ XML 文件，请考虑使用`XmlReader`。\n\n### 多线程\n\n在多线程管理方面，`C#`和`Java`是功能强大的编程语言。与 iOS\
    \ 的多线程类似，更新 UI 的任务需要在 UI 线程上完成；其他长时间运行的操作则需要在后台线程中进行。\n\n这三种平台的线程锁定机制相似，都基于通知机制。不过，各平台在实现多线程机制的具体方式及其特定规则上，存在一些重要差异。\n\
    \n#### Android\n\nJava 拥有多线程机制，但 Android 更倾向于使用自己的多线程管理机制。在 Android 中，对于 UI 线程有一个非常严格的规定。如果\
    \ UI 线程被阻塞超过几秒钟（目前为 5 秒），用户将会看到著名的“应用程序无响应”弹窗。之后，你的应用程序将被强制关闭。\n\n在 Java 中，你可以通过继承`Thread`类或实现`Runnable`接口来创建线程。最简单的方法之一是使用匿名内部类。\n\
    \n```\nnew Thread(new Runnable() {\n   public void run() {\n     // 你的后台代码。\n\
    \   }\n}).start();\n```\n\n如果你创建了一个继承`Thread`类的新类，可以直接调用`newThread().start()`。如果类\
    \ B 实现了`Runnable`接口，那么你可以使用`new Thread(B).start()`。\n\n有几种方法可以在 UI 线程中更新 UI，类似于调用以下\
    \ iOS 方法的方式：\n\n```\n[obj performSelectorOnMainThread:mySelector withObject:nil\
    \ waitUntilDone:YES];\n```\n\nAndroid 提供了以下几种更新 UI 线程的方法：\n\n*   `Activity.runOnUiThread(Runnable)`\n\
    *   `View.post(Runnable)`\n*   `View.postDelayed(Runnable, long)`\n*   `Handler`\n\
    \n例如，你可以使用以下代码在后台线程获取图像，然后更新 UI 线程：\n\n```\npublic void loadImage() {\n new Thread(new\
    \ Runnable() {\n   public void run() {\n     final Bitmap bitmapImage = loadBitmapImage();\n\
    \     myImageView.post(new Runnable() {\n       public void run() {\n        \
    \ myImageView.setImageBitmap(bitmapImage);\n       }\n     });\n   }\n }).start();\n\
    }\n```\n\n如果你的线程内部和 UI 更新代码中需要执行大量处理逻辑，代码会变得复杂。你也可以创建一个实现`Runnable`接口的类，并调用该类的`run()`方法。Android\
    \ 还提供了一种更简单的方法来处理复杂的线程处理逻辑：`AsyncTask`类。这是一个更好的线程管理结构，用于处理线程问题。\n\n```\nprivate\
    \ class myAsyncTask extends AsyncTask<X, Y, Z>\n  protected void onPreExecute(){\n\
    \  }\n\n  protected Z doInBackground(X...x){\n  }\n\n  protected void onProgressUpdate(Y\
    \ y){\n  }\n\n  protected void onPostExecute(Z z){\n  }\n}\n```\n\n*   `onPreExecute`：该方法在你的后台线程执行之前被调用。\n\
    *   `doInBackground`：主方法在后台线程中运行。\n*   `onProgressUpdate`：当你需要根据后台线程的当前进度在主线程中更新视图时使用。\n\
    *   `onPostExecute`：当你的后台线程完成时，该方法会在 UI 线程中被调用，你可以根据后台线程的结果更新 UI。\n\n从类结构可以看出，你可以定义三个泛型类型参数：`X`、`Y`和`Z`。\n\
    \n*   `X`：你传递给后台线程的参数类型。你可以将类型为`X`的对象数组传递给后台任务。\n*   `Y`：你将在`onProgressUpdate`方法中使用的参数类型。当你在`doInBackground()`方法内部调用`publishProgress(Y)`时，会调用此方法。例如，你想通过进度条显示操作的进度。\n\
    *   `Z`：你在后台进程中执行操作后得到的结果参数类型。\n\n之前展示的图像下载示例源代码可以重写为：\n\n```\npublic void loadImage()\
    \ {\n new DownloadImageTask().execute(\"http://example.com/image.png\");\n}\n\n\
    private class DownloadImageTask extends AsyncTask<String, Void, Bitmap> {\n  \
    \  protected void onPreExecute(){\n    }\n\n    protected Bitmap doInBackground(String...\
    \ urls) {\n        return loadImageFromNetwork(urls[0]);\n    }\n\n    protected\
    \ void onPostExecute(Bitmap result) {\n        mImageView.setImageBitmap(result);\n\
    \    }\n}\n```\n\n为了锁定线程以避免竞态条件和死锁，你可以使用类似于 iOS 编程中的机制，即`wait()`、`notify()`和`notifyAll()`方法。以下是这些方法与你在第\
    \ 6 章中学到的`NSCondition`方法之间的相似之处：\n\n*   `wait()`：类似于`[condition lock]`，它会锁定方法或代码块。\n\
    *   `notify()` 和 `notifyAll()`：分别类似于`[condition signal]`和`[condition unlock]`，它们会解锁该方法并通知其他线程进入。`notify()`和`notifyAll()`的区别在于，前者会随机选择一个线程让其运行，而`notifyAll()`会让所有线程都运行。\n\
    \n#### Windows Phone\n\n在 Windows Phone 中启动一个新线程的方式如下：\n\n```\npublic void loadImageFromNetwork()\n\
    {\n}\nThread t = new Thread (loadImageFromNetwork);\nt.Start();\n```\n\n通常情况下，你需要在\
    \ UI 线程中更新用户界面。这可以通过调用以下方法完成：\n\n```\nDispatcher.BeginInvoke(() => UpdateUI());\n\
    ```\n\n我使用了普通的 lambda 表达式。如果你不理解，就照着示例代码做，把你的方法调用放进去即可。\n\n为了避免竞态条件和死锁，你需要使用锁定机制，与\
    \ Java 中的方式相同：\n\n*   `obj.notify()` => `Monitor.Pulse(obj)`\n*   `obj.notifyAll()`\
    \ => `Monitor.PulseAll(obj)`\n*   `obj.wait()` => `Monitor.Wait(obj)`\n\n#####\
    \ 异步下载\n\n在 Windows Phone 中，由于 API 限制，你只能使用异步请求从互联网下载数据。你需要使用`WebClient`或`HttpWebRequest`向服务器发起请求。以下是发起新\
    \ Web 请求并接收返回数据的代码：\n\n```\nWebClient webClient = new WebClient();\nwebClient.OpenReadCompleted\
    \ += new OpenReadCompletedEventHandler(wc_OpenReadCompleted);\nwebClient.OpenReadAsync(new\
    \ Uri(arbitraryImageUriThatKeepsChanging), webClient);\n\nvoid wc_OpenReadCompleted(object\
    \ sender, OpenReadCompletedEventArgs e)\n{\n  if (e.Error == null && !e.Cancelled)\n\
    \ {\n     try\n     {\n        BitmapImage image = new BitmapImage();\n      \
    \  image.SetSource(e.Result);\n        imgContent.Source = image;\n     }\n  \
    \   catch (Exception ex)\n     {\n         //根据你的应用适当处理异常\n     }\n }\n}\n```\n"
- fmt: "# Memory Management\n\nAndroid and Windows Phone have their own garbage collectors,\
    \ so in many cases, you won't need to worry too much about memory management.\
    \ Because the general approach to garbage collection of Android and Windows Phone\
    \ look similar to each other, I will illustrate the general point of garbage collection\
    \ and then I will go into some specific details and cases for Android.\n\nFor\
    \ limited environments like Smartphones (especially the Android phones that only\
    \ have 32MB of memory), it's your job to make sure that you use the least memory\
    \ every time. If you don't need to cache an image in memory, release that image.\
    \ You can release an image by setting the object to `null`, and the garbage collector\
    \ will do its job.\n\nYou will only have memory leak if you set a reference to\
    \ an object for the whole application lifecycle without setting it to `null` at\
    \ the appropriate time. Unless your view has a long lifecycle and contains too\
    \ many objects when it's running, you shouldn't worry.\n\nThere are specific issues\
    \ related to each platform that I will discuss in detail in the following sections.\n\
    \n## Android\n\nAndroid has specific platform features that iOS and Windows Phone\
    \ don't really have: multitasking and `TabView`. Multitasking in Android is different\
    \ than multitasking in iOS. Android applications can start services, and these\
    \ services run in background forever until some of them get destroyed.\n\n###\
    \ Context Activity Leak\n\nIn Android, you have a context that is shared between\
    \ different activities, and this context stores data and the whole view hierarchy\
    \ inside. The problem is that this context is passed around objects and methods\
    \ that need to have it, like when you initiated a text view.\n\n`TextView myTextView\
    \ = new TextView(myContext);`\n\nSo, if the `myTextView` leaks, the whole context\
    \ activity is leaky. Now, consider a case where you need to maintain your background\
    \ image when the phone changes orientation. When your application changes orientation,\
    \ it destroys the activity and all the data inside that activity, including your\
    \ background image. So, the best practice is to keep the image static.\n\n```\n\
    private static Drawable sBackground;\n\n@Override\nprotected void onCreate(Bundle\
    \ state) {\n  super.onCreate(state);\n\n  TextView label = new TextView(myContext);\n\
    \  label.setText(\"Leaks are bad\");\n\n  if (sBackground == null) {\n    sBackground\
    \ = getDrawable(R.drawable.large_bitmap);\n  }\n  label.setBackgroundDrawable(sBackground);\n\
    \n  setContentView(label);\n}\n```\n\nNow you can see that the background has\
    \ a reference to the label, and the label has a reference to the context `myContext`.\
    \ And because the background image is static, it will never be released, so you\
    \ will simply leak the whole context and the old view hierarchy.\n\n### Memory\
    \ in Multitasking\n\nIn Android, because all applications can run in background\
    \ at any time, memory becomes even more restricted. If your application uses too\
    \ much memory, it will force the operating system to kill other applications to\
    \ get back memory. This is why good memory management and usage can become significant\
    \ for you to handle properly.\n\n### TabView\n\nThere is a similarity between\
    \ Android and iPhone when it comes to `TabView`. If you're using a `TabView`,\
    \ all of your views in all tabs are loaded into memory, even if they don't get\
    \ displayed. This usually causes a huge memory issue for all kinds of applications\
    \ when views are the most memory consuming elements. Think twice before you go\
    \ for a `TabView`.\n\n## Windows Phone\n\nWindows Phone doesn't have a multitasking\
    \ feature so your application can utilize all possible memory and run with high\
    \ performance. There are, however, some view hierarchy issues that can affect\
    \ your memory if you don't use them properly.\n\n### Panorama and Pivot\n\nThere\
    \ are two main important view hierarchies in Windows Phone: `Pivot` and `Panorama`.\
    \ You can use other ways to create a Windows Phone application with a normal view.\
    \ `Pivot` and `Panorama` are similar to each other although the UI concepts are\
    \ different. `Pivot` is used more for applications with similar views but for\
    \ different purpose, for example, weather in different places (London, Paris,\
    \ New York, California); see [Figure 10–6](#Chapter10.html#fig_10_6). `Panorama`\
    \ is used more for applications that need to display a large picture of the same\
    \ thing, as shown in [Figure 10–7](#Chapter10.html#fig_10_7).\n\n![images](images/1006.jpg)\n\
    \n**Figure 10–6.** *Pivot application*\n\n![images](images/1007.jpg)\n\n**Figure\
    \ 10–7.** *Panorama application*\n\nThere is a big performance problem with panorama\
    \ applications: you need to load the whole view into the memory even without displaying\
    \ it. The longer the view is, the more you need to load and it will soon put your\
    \ application out of memory. This is certainly a major consideration. If you use\
    \ a panorama view, you should only use a short view; don't load too much data\
    \ or subviews.\n\n# Multitasking\n\nMultitasking is always an issue with all Smartphone\
    \ platforms because the battery can drain quickly. As discussed in [Chapter 8](#Chapter08.html#ch8),\
    \ iOS multitasking is not exactly multitasking. It's a combination of fast application\
    \ switching and some limited background services.\n\nAndroid offers multitasking\
    \ via a different approach, allowing more time and freedom for applications to\
    \ run and do computation in background. Windows Phone doesn't allow your applications\
    \ to run in background yet; you may need to wait until the Mango release for that.\n\
    \n## Android\n\nIn Android, to create a background process, you need to use the\
    \ `Service` class. To clarify, using `Service` doesn't mean a separate thread\
    \ or a separate process. When you call this service, it will tell the system that\
    \ your application has something to do in the background. You can also expose\
    \ some other services to other applications.\n\nTo start a new `Service`, you\
    \ need to extend the `Service` class and implement the necessary methods.\n\n\
    ```\npublic class MyService extends Service {\n  private static final String TAG\
    \ = \"MyService\";\n\n  @Override\n    public IBinder onBind(Intent intent) {\n\
    \    return null;\n    }\n\n    @Override\n    public void onCreate() {\n    \
    \  Log.d(TAG, \"onCreate\");\n    }\n\n    @Override\n    public void onDestroy()\
    \ {\n      Log.d(TAG, \"onDestroy\");\n\n    }\n\n    @Override\n    public void\
    \ onStart(Intent intent, int startid) {\n      Log.d(TAG, \"onStart\");\n    }\n\
    \  }\n\n  public void onClick(View src) {\n    switch (src.getId()) {\n      case\
    \ R.id.buttonStart:\n        startService(new Intent(this, MyService.class));\n\
    \        break;\n      case R.id.buttonStop:\n        stopService(new Intent(this,\
    \ MyService.class));\n        break;\n  }\n}\n```\n\nThere are four main methods\
    \ that you need to know, as shown in the sample source code. When the new service\
    \ is started by method `startService(new Intent(this, MyService.class))`, the\
    \ method `onCreate()` will be called, and then `onStart()` will be called. When\
    \ a service is stopped by `stopService(new Intent(this, MyService.class))`, the\
    \ method `onDestroy()` will be called.\n\nYou will need to put your main logic\
    \ code in the `onStart()` method and let the background process run from here."
  raw: '### Memory Management


    Android and Windows Phone have their own garbage collectors, so in many cases,
    you won''t need to worry too much about memory management. Because the general
    approach to garbage collection of Android and Windows Phone look similar to each
    other, I will illustrate the general point of garbage collection and then I will
    go into some specific details and cases for Android.


    For limited environments like Smartphones (especially the Android phones that
    only have 32MB of memory), it''s your job to make sure that you use the least
    memory every time. If you don''t need to cache an image in memory, release that
    image. You can release an image by setting the object to null, and the garbage
    collector will do its job.


    You will only have memory leak if you set a reference to an object for the whole
    application lifecycle without setting it to null at the appropriate time. Unless
    your view has a long lifecycle and contains too many objects when it''s running,
    you shouldn''t worry.


    There are specific issues related to each platform that I will discuss in detail
    in the following sections.


    #### Android


    Android has specific platform features that iOS and Windows Phone don''t really
    have: multitasking and TabView. Multitasking in Android is different than multitasking
    in iOS. Android applications can start services, and these services run in background
    forever until some of them get destroyed.


    ##### Context Activity Leak


    In Android, you have a context that is shared between different activities, and
    this context stores data and the whole view hierarchy inside. The problem is that
    this context is passed around objects and methods that need to have it, like when
    you initiated a text view.


    `TextView myTextView = new TextView(myContext);`


    So, if the `myTextView` leaks, the whole context activity is leaky. Now, consider
    a case where you need to maintain your background image when the phone changes
    orientation. When your application changes orientation, it destroys the activity
    and all the data inside that activity, including your background image. So, the
    best practice is to keep the image static.


    `private static Drawable sBackground;`


    `@Override`

    `protected void onCreate(Bundle state) {`

    `  super.onCreate(state);`


    `  TextView label = new TextView(myContext);`

    `  label.setText("Leaks are bad");`


    `  if (sBackground == null) {`

    `    sBackground = getDrawable(R.drawable.large_bitmap);`

    `  }`

    `  label.setBackgroundDrawable(sBackground);`


    `  setContentView(label);`

    `}`


    Now you can see that the background has a reference to the label, and the label
    has a reference to the context `myContext.` And because the background image is
    static, it will never be released, so you will simply leak the whole context and
    the old view hierarchy.


    ##### Memory in Multitasking


    In Android, because all applications can run in background at any time, memory
    becomes even more restricted. If your application uses too much memory, it will
    force the operating system to kill other applications to get back memory. This
    is why good memory management and usage can become significant for you to handle
    properly.


    ##### TabView


    There is a similarity between Android and iPhone when it comes to TabView. If
    you''re using a TabView, all of your views in all tabs are loaded into memory,
    even if they don''t get displayed. This usually causes a huge memory issue for
    all kinds of applications when views are the most memory consuming elements. Think
    twice before you go for a TabView.


    #### Windows Phone


    Windows Phone doesn''t have a multitasking feature so your application can utilize
    all possible memory and run with high performance. There are, however, some view
    hierarchy issues that can affect your memory if you don''t use them properly.


    ##### Panorama and Pivot


    There are two main important view hierarchies in Windows Phone: Pivot and Panorama.
    You can use other ways to create a Windows Phone application with a normal view.
    Pivot and Panorama are similar to each other although the UI concepts are different.
    Pivot is used more for applications with similar views but for different purpose,
    for example, weather in different places (London, Paris, New York, California);
    see [Figure 10–6](#Chapter10.html#fig_10_6). Panorama is used more for applications
    that need to display a large picture of the same thing, as shown in [Figure 10–7](#Chapter10.html#fig_10_7).


    ![images](images/1006.jpg)


    **Figure 10–6.** *Pivot application*


    ![images](images/1007.jpg)


    **Figure 10–7.** *Panorama application*


    There is a big performance problem with panorama applications: you need to load
    the whole view into the memory even without displaying it. The longer the view
    is, the more you need to load and it will soon put your application out of memory.
    This is certainly a major consideration. If you use a panorama view, you should
    only use a short view; don''t load too much data or subviews.


    ### Multitasking


    Multitasking is always an issue with all Smartphone platforms because the battery
    can drain quickly. As discussed in [Chapter 8](#Chapter08.html#ch8), iOS multitasking
    is not exactly multitasking. It''s a combination of fast application switching
    and some limited background services.


    Android offers multitasking via a different approach, allowing more time and freedom
    for applications to run and do computation in background. Windows Phone doesn''t
    allow your applications to run in background yet; you may need to wait until the
    Mango release for that.


    #### Android


    In Android, to create a background process, you need to use the `Service` class.
    To clarify, using `Service` doesn''t mean a separate thread or a separate process.
    When you call this service, it will tell the system that your application has
    something to do in the background. You can also expose some other services to
    other applications.


    To start a new `Service`, you need to extend the `Service` class and implement
    the necessary methods.


    `public class MyService extends Service {`

    `  private static final String TAG = "MyService";`


    `  @Override`

    `    public IBinder onBind(Intent intent) {`

    `    return null;`

    `    }`


    `    @Override`

    `    public void onCreate() {`

    `      Log.d(TAG, "onCreate");`

    `    }`


    `    @Override`

    `    public void onDestroy() {`

    `      Log.d(TAG, "onDestroy");`


    `    }`


    `    @Override`

    `    public void onStart(Intent intent, int startid) {`

    `      Log.d(TAG, "onStart");`

    `    }`

    `  }`


    `  public void onClick(View src) {`

    `    switch (src.getId()) {`

    `      case R.id.buttonStart:`

    `        startService(new Intent(this, MyService.class));`

    `        break;`

    `      case R.id.buttonStop:`

    `        stopService(new Intent(this, MyService.class));`

    `        break;`

    `  }`

    `}`


    There are four main methods that you need to know, as shown in the sample source
    code. When the new service is started by method `startService(new Intent(this,
    MyService.class)),` the method `onCreate()` will be called, and then `onStart()
    will` be called. When a service is stopped by `stopService(new Intent(this, MyService.class));,`
    the method `onDestroy()` will be called.


    You will need to put your main logic code in the onStart() method and let the
    background process run from here.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式要求，处理给定的英文文本。\n\n\n# 内存管理\n\nAndroid 和 Windows\
    \ Phone 都有自己的垃圾回收器，因此在很多情况下，你无需过多担心内存管理。由于 Android 和 Windows Phone 的垃圾回收总体方法相似，我将先阐述垃圾回收的通用要点，然后深入介绍\
    \ Android 的一些具体细节和案例。\n\n对于智能手机这类资源有限的环境（尤其是只有 32MB 内存的 Android 手机），确保每次使用最少的内存是你的职责。如果你不需要在内存中缓存一张图片，就释放它。你可以通过将对象设置为\
    \ `null` 来释放图片，垃圾回收器会完成它的工作。\n\n只有当你为整个应用程序生命周期设置了一个对象的引用，却没有在合适的时候将其设置为 `null`\
    \ 时，才会发生内存泄漏。除非你的视图生命周期很长，并且在运行时包含了过多的对象，否则你无需担心。\n\n我将以下面的章节详细讨论每个平台相关的特定问题。\n\
    \n## Android\n\nAndroid 拥有 iOS 和 Windows Phone 不具备的特定平台特性：多任务处理和 `TabView`。Android\
    \ 的多任务处理与 iOS 的不同。Android 应用程序可以启动服务，这些服务会在后台无限期运行，直到某些服务被销毁。\n\n### 上下文（Context）Activity\
    \ 泄漏\n\n在 Android 中，你有一个在不同 Activity 之间共享的上下文（Context），这个上下文内部存储了数据和整个视图层次结构。问题在于，这个上下文会被传递给需要它的对象和方法，例如当你初始化一个文本视图时。\n\
    \n`TextView myTextView = new TextView(myContext);`\n\n所以，如果 `myTextView` 泄漏了，整个上下文\
    \ Activity 就会泄漏。现在，考虑一种情况：当手机方向改变时，你需要保持你的背景图片。当你的应用程序改变方向时，它会销毁 Activity 以及该\
    \ Activity 内的所有数据，包括你的背景图片。因此，最佳实践是将图片保持为静态。\n\n```\nprivate static Drawable sBackground;\n\
    \n@Override\nprotected void onCreate(Bundle state) {\n  super.onCreate(state);\n\
    \n  TextView label = new TextView(myContext);\n  label.setText(\"Leaks are bad\"\
    );\n\n  if (sBackground == null) {\n    sBackground = getDrawable(R.drawable.large_bitmap);\n\
    \  }\n  label.setBackgroundDrawable(sBackground);\n\n  setContentView(label);\n\
    }\n```\n\n现在你可以看到，背景图片持有了对标签（label）的引用，而标签又持有了对上下文 `myContext` 的引用。并且因为背景图片是静态的，它永远不会被释放，所以你将会泄漏整个上下文和旧的视图层次结构。\n\
    \n### 多任务处理中的内存\n\n在 Android 中，因为所有应用程序可以随时在后台运行，内存变得更为受限。如果你的应用程序使用了太多内存，它将迫使操作系统杀死其他应用程序以回收内存。这就是为什么良好的内存管理和使用对于你正确处理变得至关重要。\n\
    \n### TabView\n\n在 `TabView` 方面，Android 和 iPhone 有相似之处。如果你正在使用一个 `TabView`，你在所有选项卡中的所有视图都会被加载到内存中，即使它们没有被显示出来。当视图是最消耗内存的元素时，这通常会给各种应用程序带来巨大的内存问题。在决定使用\
    \ `TabView` 之前，请三思。\n\n## Windows Phone\n\nWindows Phone 没有多任务处理功能，所以你的应用程序可以利用所有可能的内存并以高性能运行。然而，如果使用不当，某些视图层次结构问题可能会影响你的内存。\n\
    \n### Panorama 和 Pivot\n\nWindows Phone 有两个主要的视图层次结构：`Pivot` 和 `Panorama`。你也可以使用其他方式创建具有普通视图的\
    \ Windows Phone 应用程序。尽管 UI 概念不同，但 `Pivot` 和 `Panorama` 彼此相似。`Pivot` 更多地用于具有相似视图但用途不同的应用程序，例如，不同地点的天气（伦敦、巴黎、纽约、加利福尼亚）；请参见\
    \ 图 10–6。`Panorama` 更多地用于需要显示同一事物的大图的应用程序，如 图 10–7 所示。\n\n![images](img/1006.jpg)\n\
    \n**图 10–6.** *Pivot 应用程序*\n\n![images](img/1007.jpg)\n\n**图 10–7.** *Panorama\
    \ 应用程序*\n\nPanorama 应用程序存在一个巨大的性能问题：即使不显示，你也需要将整个视图加载到内存中。视图越长，你需要加载的内容就越多，很快就会导致你的应用程序内存不足。这无疑是一个重要的考量因素。如果你使用全景视图，你应该只使用一个简短的视图；不要加载过多的数据或子视图。\n\
    \n# 多任务处理\n\n多任务处理对于所有智能手机平台来说总是一个问题，因为电池电量会很快耗尽。正如在第 8 章中所讨论的，iOS 的多任务处理并非真正的多任务处理。它是快速应用切换和一些有限的、受限制的后台服务的组合。\n\
    \nAndroid 通过不同的方法提供多任务处理，允许应用程序在后台有更多的时间和自由度来运行和执行计算。Windows Phone 目前还不允许你的应用程序在后台运行；你可能需要等到\
    \ Mango 版本发布才能实现。\n\n## Android\n\n在 Android 中，要创建一个后台进程，你需要使用 `Service` 类。需要澄清的是，使用\
    \ `Service` 并不意味着一个单独的线程或一个单独的进程。当你调用此服务时，它会告诉系统你的应用程序在后台有事要做。你也可以将一些其他服务暴露给其他应用程序。\n\
    \n要启动一个新的 `Service`，你需要扩展 `Service` 类并实现必要的方法。\n\n```\npublic class MyService\
    \ extends Service {\n  private static final String TAG = \"MyService\";\n\n  @Override\n\
    \    public IBinder onBind(Intent intent) {\n    return null;\n    }\n\n    @Override\n\
    \    public void onCreate() {\n      Log.d(TAG, \"onCreate\");\n    }\n\n    @Override\n\
    \    public void onDestroy() {\n      Log.d(TAG, \"onDestroy\");\n\n    }\n\n\
    \    @Override\n    public void onStart(Intent intent, int startid) {\n      Log.d(TAG,\
    \ \"onStart\");\n    }\n  }\n\n  public void onClick(View src) {\n    switch (src.getId())\
    \ {\n      case R.id.buttonStart:\n        startService(new Intent(this, MyService.class));\n\
    \        break;\n      case R.id.buttonStop:\n        stopService(new Intent(this,\
    \ MyService.class));\n        break;\n  }\n}\n```\n\n如示例源代码所示，你需要了解四个主要方法。当通过方法\
    \ `startService(new Intent(this, MyService.class))` 启动新服务时，`onCreate()` 方法会被调用，然后会调用\
    \ `onStart()`。当通过 `stopService(new Intent(this, MyService.class))` 停止服务时，`onDestroy()`\
    \ 方法会被调用。\n\n你需要将主要逻辑代码放在 `onStart()` 方法中，并让后台进程从这里开始运行。\n"
- fmt: "### Support of C/C++ Programming\n\nYou can write C/C++ code inside your Android\
    \ applications, but that requires you to know about JNI (Java Native Interface)\
    \ and how to interact with NDK (Native Development Kit). The way you interact\
    \ is similar to the way you use Objective-C code to interact with C/C++ code.\
    \ You may need to be careful about memory management problems and should not mess\
    \ things up too much. Using Java will allow you to have garbage collection, while\
    \ using C/C++ requires you to manage memory manually.\n\nWindows Phone, though,\
    \ doesn't support any programming languages except C#. If you want to develop\
    \ games, you will need to use XNA with C/C++. Adding and calling C/C++ code from\
    \ Java using NDK is really easy; just write a little wrapper code. You need to\
    \ have a wrapper method to convert between C and Java.\n\n```\n#include <jni.h>\n\
    #include <string.h>\n#include <android/log.h>\n\nvoid Java_com_packagename_classname_helloLog(JNIEnv\
    \ * env, jobject this, jstring myLog)\n{\n    jboolean isCopy;\n    const char\
    \ * szLogThis = (*env)->GetStringUTFChars(env, logThis, &isCopy);\n    (*env)->ReleaseStringUTFChars(env,\
    \ logThis, szLogThis);\n}\n```\n\nThere is a reason for the long function name:\
    \ the first word is \"Java\", followed by the package name, the class name, and\
    \ the method name. When you need to call this method, you can call it with the\
    \ following format:\n\n`helloLog(\"This will log to LogCat via the native call.\"\
    );`\n\nYou need to define the method interface inside your class so that Android\
    \ can call it appropriately. This will help Android link this interface with the\
    \ implementation inside the compiled native code.\n\n`private native void helloLog(String\
    \ logThis);`\n\nFinally, you need to load the library. In fact, you should load\
    \ the library as soon as you load the class.\n\n```\nstatic {\n    System.loadLibrary(\"\
    ndk1\");\n}\n```\n\n### Summary\n\nIn this chapter, you learned about differences\
    \ in performance optimization for three main platforms: iOS, Android, and Windows\
    \ Phone. There are many similar issues between them because all three platforms\
    \ are limited by the mobile devices constraint.\n\nHaving the same problem with\
    \ the `ListView` and how to reuse the view properly, the three platforms solve\
    \ the problem in a similar way—by trying to reduce loading all data and reusing\
    \ the view as much as possible.\n\nCaching and data storage in the three platforms\
    \ is different because they choose different ways to implement the data storage\
    \ and file structure for the application. iOS has the strongest database storage\
    \ currently with `CoreData`, while Android can utilize the strength of using external\
    \ storage. The SQL database release for Windows Phone is expected by any Windows\
    \ Phone developer in the next fall.\n\nThere are also big differences in the way\
    \ the platforms choose to implement the same functionality, such as multitasking.\
    \ Multitasking in iOS is more focused on fast app switching, Android focuses on\
    \ real multitasking by allowing processes to run in the background, and Windows\
    \ Phone doesn't support any multitasking in this version.\n\n**Exercise**\n\n\
    **1.** Implement the `ListView` using Virtualized Data sample code that I gave.\n\
    \n**2.** Create a Windows Phone panorama with at least 20 pages, run it on your\
    \ device to see if you have any memory effects. Do the same for Windows Phone\
    \ `Pivot`.\n\n**3.** Implement an Android background service to download an image\
    \ from the Internet and then turn off the application.\n\n## Index\n\n### ![image](images/square1.jpg)A\n\
    \n**Android**\n\nbenchmarking, [244](#Chapter10.html#page_244), [245](#Chapter10.html#page_245)\n\
    \ndata caching, [250](#Chapter10.html#page_250)\n\nemulator, [242](#Chapter10.html#page_242)–[243](#Chapter10.html#page_243)\n\
    \n`ListViews` performance, [246](#Chapter10.html#page_246)–[248](#Chapter10.html#page_248)\n\
    \nmemory management, [259](#Chapter10.html#page_259)–[260](#Chapter10.html#page_260)\n\
    \nmultitasking, [261](#Chapter10.html#page_261)–[262](#Chapter10.html#page_262)\n\
    \nmultithreading, [255](#Chapter10.html#page_255)–[257](#Chapter10.html#page_257)\n\
    \nprogramming language, [242](#Chapter10.html#page_242)\n\n**Automatic reference\
    \ counting (ARC)**\n\ncoding, [180](#Chapter07.html#page_180)\n\nqualifiers\n\n\
    autoreleasing, [183](#Chapter07.html#page_183)\n\nobject property, [183](#Chapter07.html#page_183)\n\
    \nstrong reference, [182](#Chapter07.html#page_182)\n\nunsafe_unretained reference,\
    \ [183](#Chapter07.html#page_183)\n\nvariable declarations, [183](#Chapter07.html#page_183)\n\
    \nweak reference, [182](#Chapter07.html#page_182)\n\nrules, [182](#Chapter07.html#page_182)\n\
    \nXcode, [181](#Chapter07.html#page_181)\n\n### ![image](images/square1.jpg)B\n\
    \n**Belady's algorithm**, [65](#Chapter04.html#page_65)\n\n**Big-O notation**\n\
    \ncomputation logics, [90](#Chapter05.html#page_90), [91](#Chapter05.html#page_91)\n\
    \nCPU Sampler, [93](#Chapter05.html#page_93), [94](#Chapter05.html#page_94)\n\n\
    general performance analysis, [93](#Chapter05.html#page_93)\n\ninsertion sort\
    \ performance, [92](#Chapter05.html#page_92)\n\n`myFirstArray` and `mySecondArray`\
    \ elements, [90](#Chapter05.html#page_90)\n\n`myFirstCount` and `mySecondCount`\
