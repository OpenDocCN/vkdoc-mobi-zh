  raw: '#### SQLite


    SQLite is an underlying implementation for CoreData. In terms of performance,
    SQLite offers slightly better performance because it is lighter and more direct.
    However, CoreData supports you with a better object mapping model, undo and redo
    features, working in batch, and thread.


    The main advantage of SQLite is that if your team is already strong with relational
    database and relational SQL, the learning curve is slight. SQLite is also easier
    to port into Android and then you can share the same data layer between iPhone
    and Android applications.


    You can read the source code example in `SQLiteSample project.` I will give you
    only the important points here.


    You need to create a SQL database by opening your terminal and typing `sqlite3
    students.sql. This` will create a new database where you can create a table, insert,
    and select data inside. You can create table and insert data as normal by using
    SQL.


    `sqlite> CREATE TABLE students (pk INTEGER PRIMARY KEY, name VARCHAR(25));`

    `sqlite> INSERT INTO students (name) VALUES (''khang'');`

    `sqlite> INSERT INTO students (name) VALUES (''vo'');`

    `sqlite> INSERT INTO students (name) VALUES (''duy'');`

    `sqlite> .quit`


    [Figure 9–5](#Chapter09.html#fig_9_5) demonstrates more clearly what happens inside
    the terminal.


    ![images](images/0905.jpg)


    **Figure 9–5.** *SQLite database*


    Then, you can find the `students.sql` file in your `Home` folder (which is the
    default folder if you don''t change to any folder in terminal). You need to add
    that file into Xcode and then add the library `libsqlite3.0.dylib.`


    `- (void)viewDidAppear:(BOOL)animated {`

    `   NSString *path = [[NSBundle mainBundle] pathForResource:@"students" ofType:@"sql"];`


    `   if (sqlite3_open([path UTF8String], &database) == SQLITE_OK) {`

    `       // Get the primary key for all books.`

    `       const char *sql = "SELECT pk, name FROM students";`

    `       sqlite3_stmt *statement;`


    `       // Preparing a statement compiles the SQL query into a byte-code program
    in the SQLite library.`

    `       // The third parameter is either the length of the SQL string or -1 to
    read up to the first null terminator.`

    `       if (sqlite3_prepare_v2(database, sql, -1, &statement, NULL) == SQLITE_OK)
    {`

    `           // We "step" through the results - once for each row.`

    `           while (sqlite3_step(statement) == SQLITE_ROW) {`

    `               const unsigned char *name = sqlite3_column_text(statement, 1);`

    `               NSString *nameString = [NSString stringWithCString:(char *)name`

    `encoding:NSASCIIStringEncoding];`

    `           }`

    `       }`


    `       // "Finalize" the statement - releases the resources associated with the`

    `statement.`

    `       sqlite3_finalize(statement);`

    `   } else {`


    `       // Even though the open failed, call close to properly clean up resources.`

    `       sqlite3_close(database);`

    `       NSAssert1(0, @"Failed to open database with message ''%s''.",`

    `sqlite3_errmsg(database));`


    `   }`


    `   [self.tableView reloadData];`

    `}`


    There are a couple of methods that you need to remember:


    *   `sqlite3_open([path UTF8String], &database) == SQLITE_OK` initializes and
    assigns the new database object to your pointer.

    *   `sqlite3_prepare_v2(database, sql, -1, &statement, NULL) == SQLITE_OK` executes
    your sql command and puts the result into the statement.

    *   `while (sqlite3_step(statement) == SQLITE_ROW):` Step over the results from
    executing the statement.


    #### Integrate C++ into Your Application


    It takes almost no effort to integrate C into your application because Objective-C
    is the superset of C. However, you need to be careful about some details when
    you integrate C++ into your application.


    Firstly, you need to create your C++ class inside the normal header and implementation
    files as normal `(.h and .cpp files).` And then, you need to wrap your C++ file
    by an Objective-C file with the extension `.mm` (which tells iOS environment that
    these files are Objective-C++ files). Any file that wants to use these .mm files
    need to be a .mm file as well.


    You can look at the sample project `TestC_CPlus.` First, you can see that there
    are two files, `Foo_Cpp.h` and `Foo_Cpp.cpp,` that declare the `Foo_Cpp C++ Class.`
    Then, you wrap this file over by Objective-C++ files called `MyObject.h and MyObject.m.`


    The last step is to integrate these behind logic into the view controller. You
    can call the object MyObject anywhere in the project as normal. You only need
    to rename the calling files to end with `.mm.`


    ### Summary


    There are plenty of high-performance and task-specialized C/C++ libraries available
    in the programming world. You should not reinvent the wheel or try hard to convert
    all this C/C++ code into Objective-C code, which would take forever. Understanding
    C/C++ can help you understand the libraries better so you can integrate them into
    your existing applications.


    Objective-C is a superset of C so there are many C features that you may already
    know. I discussed the main important points of C programming, including the pointer
    concept. You also learned about function pointers and bitwise operations, which
    give you the best capabilities to leverage the high performance features of C.


    C++ is harder to learn and understand if you have no experience with coding. I
    discussed only the main points of C++ and main differences between C++ and Objective-C.
    It may not be enough information to write a big-scale C++ application, but it''s
    enough for you to integrate (and modify if necessary) the existing C++ libraries
    into your iPhone applications.


    In the last section, I used a real example with SQLite to demonstrate the usage
    of C in Objective-C. It''s not too hard to do so, except for some differences
    in syntax and memory management. I don''t go too deeply into a C++ library; I
    just demonstrated how you can have C++ code inside your iPhone application.


    **Exercises**


    **1.** 1\. Write a function in C to compare two string, s1 and s2\. If s1 < s2
    returns negative, s1 = s2 returns 0, s1 > s2, returns positive.


    **2.** 2\. Write a function in C to append the string s2 to the end of string
    s1.


    **3.** 3\. Finish the linked list C-program by filling the method `delete_list`.


    ## Chapter 10'
  trans: "\n### SQLite\n\nSQLite 是 CoreData 的底层实现。在性能方面，SQLite 表现稍好，因为它更轻量、更直接。然而，CoreData\
    \ 能为你提供更好的对象映射模型、撤销和重做功能、批量处理以及线程支持。\n\nSQLite 的主要优势在于，如果你的团队已经熟悉关系型数据库和关系型 SQL，那么学习曲线会很平缓。SQLite\
    \ 也更易于移植到 Android 上，这样你就可以在 iPhone 和 Android 应用之间共享相同的数据层。\n\n你可以在 `SQLiteSample\
    \ project` 项目中阅读源代码示例。这里我只给你讲解重点。\n\n你需要通过打开终端并输入 `sqlite3 students.sql` 来创建一个\
    \ SQL 数据库。这将创建一个新的数据库，你可以在其中创建表、插入和查询数据。你可以像平常一样使用 SQL 来创建表和插入数据。\n\n```\nsqlite>\
    \ CREATE TABLE students (pk INTEGER PRIMARY KEY, name VARCHAR(25));\nsqlite> INSERT\
    \ INTO students (name) VALUES ('khang');\nsqlite> INSERT INTO students (name)\
    \ VALUES ('vo');\nsqlite> INSERT INTO students (name) VALUES ('duy');\nsqlite>\
    \ .quit\n```\n\n图 9-5 更清晰地展示了终端内发生的事情。\n\n![images](img/0905.jpg)\n\n**图 9-5.**\
    \ *SQLite 数据库*\n\n然后，你可以在你的`Home`文件夹（如果你在终端中没有切换到任何文件夹，这是默认文件夹）中找到 `students.sql`\
    \ 文件。你需要将该文件添加到 Xcode 中，然后添加库 `libsqlite3.0.dylib`。\n\n```objective-c\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"students\"\
    \ ofType:@\"sql\"];\n\n    if (sqlite3_open([path UTF8String], &database) == SQLITE_OK)\
    \ {\n        // 获取所有书籍的主键。\n        const char *sql = \"SELECT pk, name FROM students\"\
    ;\n        sqlite3_stmt *statement;\n\n        // 准备语句会将 SQL 查询编译成 SQLite 库中的字节码程序。\n\
    \        // 第三个参数是 SQL 字符串的长度，或者为 -1 表示读取到第一个空终止符。\n        if (sqlite3_prepare_v2(database,\
    \ sql, -1, &statement, NULL) == SQLITE_OK) {\n            // 我们“逐步”遍历结果——每行一次。\n\
    \            while (sqlite3_step(statement) == SQLITE_ROW) {\n               \
    \ const unsigned char *name = sqlite3_column_text(statement, 1);\n           \
    \     NSString *nameString = [NSString stringWithCString:(char *)name\n      \
    \                                                    encoding:NSASCIIStringEncoding];\n\
    \            }\n        }\n\n        // “终结”该语句——释放与该语句关联的资源。\n        sqlite3_finalize(statement);\n\
    \    } else {\n        // 即使打开失败，也要调用 close 以正确清理资源。\n        sqlite3_close(database);\n\
    \        NSAssert1(0, @\"打开数据库失败，消息为 '%s'。\", sqlite3_errmsg(database));\n   \
    \ }\n\n    [self.tableView reloadData];\n}\n```\n\n有几个你需要记住的方法：\n\n- `sqlite3_open([path\
    \ UTF8String], &database) == SQLITE_OK` 初始化新的数据库对象并将其赋值给你的指针。\n- `sqlite3_prepare_v2(database,\
    \ sql, -1, &statement, NULL) == SQLITE_OK` 执行你的 SQL 命令并将结果放入 statement。\n- `while\
    \ (sqlite3_step(statement) == SQLITE_ROW):` 逐步遍历执行语句后得到的结果。\n\n### 将 C++ 集成到你的应用程序中\n\
    \n将 C 集成到你的应用程序中几乎不费吹灰之力，因为 Objective-C 是 C 的超集。但是，当你将 C++ 集成到应用程序中时，需要注意一些细节。\n\
    \n首先，你需要像平常一样在普通的头文件和实现文件（`.h 和 .cpp 文件`）中创建你的 C++ 类。然后，你需要用一个扩展名为 `.mm` 的 Objective-C\
    \ 文件来包装你的 C++ 文件（这告诉 iOS 环境这些文件是 Objective-C++ 文件）。任何想要使用这些 `.mm` 文件的文件也必须是 `.mm`\
    \ 文件。\n\n你可以查看示例项目 `TestC_CPlus`。首先，你可以看到有两个文件，`Foo_Cpp.h` 和 `Foo_Cpp.cpp`，它们声明了\
    \ `Foo_Cpp C++ 类`。然后，你通过名为 `MyObject.h 和 MyObject.m` 的 Objective-C++ 文件来包装这个文件。\n\
    \n最后一步是将这些后台逻辑集成到视图控制器中。你可以像往常一样在项目中的任何位置调用对象 MyObject。你只需要将调用文件重命名，以 `.mm` 结尾即可。\n\
    \n### 总结\n\n编程世界中有大量高性能且专用于特定任务的 C/C++ 库。你不应该重新发明轮子，或者费力地将所有这些 C/C++ 代码转换为 Objective-C\
    \ 代码，这会花费很长时间。理解 C/C++ 可以帮助你更好地理解这些库，以便将它们集成到你现有的应用程序中。\n\nObjective-C 是 C 的超集，因此你可能已经了解许多\
    \ C 的特性。我讨论了 C 编程中的主要重点，包括指针概念。你还学习了函数指针和位运算，这让你能够充分发挥 C 语言的高性能特性。\n\n如果你没有编程经验，C++\
    \ 会更难学习和理解。我只讨论了 C++ 的要点以及 C++ 和 Objective-C 之间的主要区别。这可能不足以编写一个大型的 C++ 应用程序，但足以让你将现有的\
    \ C++ 库集成（并在必要时修改）到你的 iPhone 应用程序中。\n\n在最后一节中，我使用了一个 SQLite 的实际示例来演示 C 在 Objective-C\
    \ 中的用法。除了语法和内存管理上的一些差异外，这样做并不太难。我没有深入探讨 C++ 库；只是演示了如何让你的 iPhone 应用程序中包含 C++ 代码。\n\
    \n**练习题**\n\n1. 用 C 语言编写一个函数，比较两个字符串 s1 和 s2。如果 s1 < s2，返回负数；s1 = s2，返回 0；s1 >\
    \ s2，返回正数。\n2. 用 C 语言编写一个函数，将字符串 s2 追加到字符串 s1 的末尾。\n3. 通过填写 `delete_list` 方法，完成该\
    \ C 语言链表程序。\n\n## 第 10 章\n"
- fmt: "## Comparing Android and Windows Phone Performance Problems\n\nIn this chapter,\
    \ you will learn the following:\n\n- General knowledge and differences between\
    \ the three platforms and three programming languages used in Smartphone development.\n\
    - How to revise many important aspects of application performance that you learned\
    \ for iOS to apply to Android and Windows Phone, such as:\n    - How to benchmark\
    \ applications for Android and Windows Phone.\n    - How to optimize the scrolling\
    \ performance.\n    - The differences in caching and data storage.\n    - A brief\
    \ lesson in data structure and algorithms for the three platforms.\n    - A brief\
    \ lesson in multithreading on the three platforms. Android is different than the\
    \ other two platforms.\n    - Lessons about memory constraints.\n    - The different\
    \ ways these platforms handle multitasking.\n    - How to integrate C/C++ code\
    \ into your Android application.\n\nThis chapter will provide a general vision\
    \ of the three main important Smartphone platforms in the near future: iPhone,\
    \ Android, and Windows Phone. They are growing up and making huge innovations\
    \ to keep a competitive advantage against their competitors. For some basic and\
    \ trivial applications, you won't care to optimize performance for each platform\
    \ because it takes so much time and effort; you can write a cross-platform application\
    \ to save time.\n\nUnsurprisingly, cross platform release has a significant delay\
    \ of up to several weeks or months after the main SDK is released. It also lacks\
    \ some of the detailed features compared to the main APIs. Therefore, to succeed\
    \ in any of these three platform markets, you will need to use the main language\
    \ and features to optimize performance and take advantage of advanced features\
    \ and APIs for that platform.\n\nI will provide an overview of the main difficulties\
    \ regarding Android and Windows Phone performance. The approach is simplified\
    \ by going through the chapters of this book: instruments, the emulator, list\
    \ view, caching, storage, data structure and algorithms, multithreading, multitasking,\
    \ memory management, and native C/C++ programming support. For reasons of space,\
    \ I can't cover all details of each platform nor conjecture which platform is\
    \ the best. After reading this chapter, you will be aware of the most important\
    \ difficulties for each platform so that switching and learning a new platform\
    \ will be easy.\n\n### General Knowledge\n\niPhone uses Objective-C as a main\
    \ programming language for iOS development. It has no garbage collector but ARC\
    \ to help with memory management. Only three devices use iOS: iPod Touch, iPhone,\
    \ and iPad with two different screen resolutions.\n\nAndroid uses Java as a main\
    \ programming language and it provides garbage collection for easy memory management.\
    \ Android has many screen sizes and device hardware specifications. There are\
    \ some devices with core-duo chips and there are some really weak (much slower\
    \ processor and limited memory) devices.\n\nWindows Phone uses C# as a main programming\
    \ language and Silverlight as a user interface framework. C# has garbage collection.\
    \ There are many devices that support Windows Phone but all must meet the necessary\
    \ hardware requirements.\n\n### Benchmarking on Emulator and Devices\n\nIn iOS,\
    \ as you learned in [Chapter 2](#Chapter02.html#ch2), the simulator is far faster\
    \ than the device so there are cases where you need to use the device to test\
    \ that things work well. The architectures of the simulator and the devices of\
    \ iOS, Android, and Windows Phone are quite different so there are different approaches\
    \ to running benchmark tests on each of the platform.\n\n#### Emulator and Devices\n\
    \nThe Android emulator ([Figure 10–1](#Chapter10.html#fig_10_1)) is really slow.\
    \ You can use it as the lowest benchmark for performance testing. Android also\
    \ has so many different devices, so for performance, it is hard to keep all Android\
    \ users happy. You may need to test on different devices to see the range of performance\
    \ results.\n\n![images](images/1001.jpg)\n\n**Figure 10–1.** *Android emulator*\n\
    \nThe Windows Phone emulator ([Figure 10–2](#Chapter10.html#fig_10_2)) runs at\
    \ a normal performance, so it's is almost the same as a real device. If you want\
    \ a fast simulator so you can run a quick test in the same way you develop iOS\
    \ application, it's possible to improve the performance of the emulator; you can\
    \ find the information easily on the Internet.\n\n![images](images/1002.jpg)\n\
    \n**Figure 10–2.** *Windows Phone emulator*\n\nThe iPhone simulator runs extremely\
    \ fast compared to the real device, as mentioned in [Chapter 2](#Chapter02.html#ch2),\
    \ so it's hard to detect any performance issues in it.\n\n#### Benchmarking\n\n\
    It is important to know which tools are available to you when you need to run\
    \ benchmarking. Android provides a limited set of tools while Windows Phone provides\
    \ a wider range of tools that help you to find the performance problem. Many of\
    \ these tools cover the same functionality as tools supplied by the iOS; they\
    \ support benchmarking of memory, CPU usage, and user interface processing.\n\n\
    ##### Android\n\nEclipse for Android doesn't provide a complete list of instrument\
    \ tools as Xcode does for iPhone. It provides four main instrument tools that\
    \ you can use to track your performance: thread, heap, object allocation, and\
    \ file access. You can combine these tools with logging (using `Debug.trace()`)\
    \ to measure the general performance of your application.\n\nAlthough Android\
    \ provides garbage collection, it has its disadvantages. When the garbage collection\
    \ runs, it stops your application. This will make your UI cease responding for\
    \ a couple of milliseconds, or at least not render enough frames (a good rendering\
    \ frame rate should be around 16-30ms/frame).\n\n[Figure 10–3](#Chapter10.html#fig_10_3)\
    \ and [10–4](#Chapter10.html#fig_10_4) shows the heap and allocation tracker for\
    \ Android. You can use these tools to see in what classes or methods you create\
    \ the most objects.\n\n![images](images/1003.jpg)\n\n**Figure 10–3.** *Heap instrument*\n\
    \n![images](images/1004.jpg)\n\n**Figure 10–4.** *Allocation instrument*\n\n#####\
    \ Windows Phone\n\nWindows Phone offers a much better performance profiling tool.\
    \ [Figure 10–5](#Chapter10.html#fig_10_5) shows the result of running the Windows\
    \ Phone profiling tool and getting the data back.\n\n![images](images/1005.jpg)\n\
    \n**Figure 10–5.** *Allocation instrument*\n\nThe performance tool supports many\
    \ different metrics for performance benchmarking: frame rate, CPU usage, memory\
    \ usage, image loads and garbage collection events. This helps you locate the\
    \ performance bottleneck so you can solve it more easily."
