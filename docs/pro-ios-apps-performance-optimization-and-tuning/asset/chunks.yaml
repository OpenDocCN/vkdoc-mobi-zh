    ##### NSObject


    All objects have the ability to create and detach a new thread to execute these
    objects’ selectors. You can use the following line of code to run the method `doSomething`
    in a background thread:


    `[myObj performSelectorInBackground:@selector(doSomething) withObject:nil];`


    The effect of calling this method is the same as the following line of code:


    `[NSThread detachNewThreadSelector:@selector(doSomething) toTarget:myObj withObject:nil]`


    This method is good as a short form for detaching and creating a new thread to
    run the background task.


    ##### NSOperationQueue


    `NSOperationQueue` class is a mechanism to manage and run tasks concurrently.
    A good thing about `NSOperationQueue` is that it can restrict the number of concurrent
    operations inside the system within a given limit to keep the system load at an
    acceptable level. Because of this restriction of the maximum number of threads,
    a higher number of instances of `NSOperationQueue` may not lead to more concurrent
    threads running in the system at the same time.


    You can add operations into the queue but you can’t remove them. However, you
    can cancel all of the existing and non-running operations inside the queue. [Table
    6–2](#Chapter06.html#tab_6_2) shows some other methods that you will find really
    useful when using `NSOperationQueue`.


    ![Images](images/t0602.jpg)


    You can use NSOperationQueue with three different classes.


    *   `NSInvocationOperation:` This is a simple wrapping if you already have an
    object and a method to put into a concurrent thread. It also requires no subclassing,
    so you can create a simple NSOperation object by this class. `NSInvocationOperation`
    is a subclass of `NSOperation.`

    *   `NSBlockOperation`: This is another wrapping to execute one or more blocks
    without having to create a separate `NSOperation` object to have each of blocks
    executed. When executing more than one block, the `NSBlockOperation` is considered
    finished only when all of the inside blocks have finished executing.

    *   Custom `NSOperation` Object: `NSOperation` is a base class. By subclassing
    it, you can have complete control over the whole implementation of the `NSOperation`
    objects, including the default way in which your operation executes and reports
    its status.


    To make a multithreading app with `NSOperationQueue`, you need to create a specific
    object by one of these three methods and add the newly created `NSOperation` into
    your queue. Then the queue will maintain and run those operations for you.


    Here is a code snippet that will help you to create a `NSOperationQueue` and add
    separate operation objects into it to create a multithreading environment:


    `NSOperationQueue* myOperationQueue = [[NSOperationQueue alloc] init];`

    `[myOperationQueue addOperation:myOperation]; // Add a single operation`

    `[myOperationQueue addOperations:arrayOfOperations waitUntilFinished:NO]; // Add
    multiple`

