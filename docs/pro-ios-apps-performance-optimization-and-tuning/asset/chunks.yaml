  raw: '### Support of C/C++ Programming


    You can write C/C++ code inside your Android applications but that requires you
    to know about JNI (Java Native Interface) and how to interact with NDK (Native
    Development Kit). The way you interact is similar to the way you use Objective-C
    code to interact with C/C++ code. You may need to be careful about memory management
    problems and should not mess things up too much. Using Java will allow you to
    have garbage collection while using C/C++ requires you to manage memory manually.


    Windows Phone, though, doesn''t support any programming languages except C#. If
    you want to develop games, you will need to use XNA with C/C++. Adding and calling
    C/C++ code from Java using NDK is really easy; just write a little wrapper code.
    You need to have a wrapper method to convert between C and Java.


    `#include <jni.h>`

    `#include <string.h>`

    `#include <android/log.h>`


    `void Java_com_packagename_classname_helloLog(JNIEnv * env, jobject this, jstring
    myLog)`

    `{`

    `    jboolean isCopy;`

    `    const char * szLogThis = (*env)->GetStringUTFChars(env, logThis, &isCopy);`

    `    (*env)->ReleaseStringUTFChars(env, logThis, szLogThis);`

    `}  `


    There is a reason for the long function name: the first word is “Java”, followed
    by the package name, the class name, and the method name. When you need to call
    this method, you can call it with the following format:


    `helloLog("This will log to LogCat via the native call.");  `


    You need to define the method interface inside your class so that Android can
    call it appropriately. This will help Android link this interface with the implementation
    inside the compiled native code.


    `private native void helloLog(String logThis);  `


    Finally, you need to load the library. In fact, you should load the library as
    soon as you load the class.


    `static {`

    `    System.loadLibrary("ndk1");`

    `}  `


    ### Summary


    In this chapter, you learned about differences in performance optimization for
    three main platforms: iOS, Android, and Windows Phone. There are many similar
    issues between them because all three platforms are limited by the mobile devices
    constraint.


    Having the same problem with the ListView and how to reuse the view properly,
    the three platforms solve the problem in a similar way—by trying to reduce loading
    all data and reusing the view as much as possible.


    Caching and data storage in the three platforms is different because they choose
    different ways to implement the data storage and file structure for the application.
    iOS has the strongest database storage currently with CoreData while Android can
    utilize the strength of using external storage. The SQL database release for Windows
    Phone is expected by any Windows Phone developer in the next fall.


    There are also big differences in the way the platforms choose to implement the
    same functionality, such as multitasking. Multitasking in iOS is more focused
    on fast app switching, Android focus on real multitasking by allowing process
    to run in the background, and Windows Phone doesn''t support any multitasking
    in this version.


    **Exercise**


    **1.** 1\. Implement the ListView using Virtualized Data sample code that I gave.


    **2.** 2\. Create a Windows Phone panorama with at least 20 pages, run it on your
    device to see if you have any memory effects. Do the same for Windows Phone Pivot.


    **3.** 3\. Implement an Android background service to download an image from the
    Internet and then turn off the application.


