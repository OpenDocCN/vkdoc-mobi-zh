- fmt: "### Opaque\n\nIf possible, make all layers and subviews of the `UITableViewCell`\
    \ opaque. When a view is transparent, the iOS will need to render one pixel twice\
    \ or more because that one pixel belongs to many subviews at the same time. This\
    \ can be a time-consuming process.\n\nThis part can be done easily through code\
    \ or through `InterfaceBuilder`. Developers should double-check to see that all\
    \ the subviews are opaque. [Figure 3–7](#Chapter03.html#fig_3_7) shows how to\
    \ set the opaque checkbox for the subview inside the cell.\n\n![images](images/0307.jpg)\n\
    \n**Figure 3–7.** *Set opaque for the subviews*\n\nFor the custom code, you can\
    \ also set it by code, as follows:\n\n`view.opaque = YES;`\n\n### Avoid Graphical\
    \ Effects\n\nAvoid complicated graphical effects (such as gradients) that are\
    \ not already in the `UIImage`. You should check for graphical effects and problems\
    \ by using the CoreAnimation with some small configuration, as shown in [Figures\
    \ 3–8](#Chapter03.html#fig_3_8) and [3–9](#Chapter03.html#fig_3_9).\n\n![images](images/0308.jpg)\n\
    \n**Figure 3–8.** *CoreAnimation options to set up debug options*\n\n![images](images/0309.jpg)\n\
    \n**Figure 3–9.** *CoreAnimation Instrument with color blended*\n\n### Performance\
    \ for Editing/Reordering\n\nIn the previous sections, I showed you that by drawing\
    \ directly, you can optimize the performance of your apps significantly. However,\
    \ the drawing approach also has some serious problems in animation and reordering\
    \ performance.\n\nWhen you use subviews, the animation will become faster and\
    \ `UIKit` does not have to redraw or change anything during the animation. Therefore,\
    \ it is usually faster for `UIKit` if you use subviews and don't draw the view\
    \ by code. If you draw the view by code in the animation edit or reordering, you\
    \ then have to draw the view again to fit into the new view. This makes for more\
    \ work, both in creating and maintaining the code.\n\nThis is a tradeoff that\
    \ you always have to think about when you have performance issue with `UITableViewController`.\
    \ My recommendation is to always start with a subview if you are sure that you\
    \ will not have too many subviews, or you will have to allow users to do some\
    \ editing/reordering of the cell. This can make the app run slower but still well\
    \ enough.\n\n### Summary\n\nBy going through examples with source code, you learned\
    \ a number of important techniques to improve application performance.\n\n*  \
    \ **Benchmark carefully with NSLog and CoreAnimation**: I let you see a real example\
    \ of using the Instrument and benchmark tools efficiently to understand the nature\
    \ of the problem and how much improvement you make after every optimization step.\n\
    *   **Reuse the Cell properly**: This is the first and most important step. It\
    \ is easy to implement cell reuse but many applications lack this step. So, if\
    \ you have any performance problems, make sure to double check this.\n*   **Cache/reuse\
    \ the images/data correctly**: Another important step is to reduce the time to\
    \ load data and do logic processing while returning a cell for displaying.\n*\
    \   **Reduce the total loading and calculating time**: It's not just the I/O process\
    \ that will slow down and block the UI thread; any kind of data processing can\
    \ slow this process. Therefore, you should always try to reduce this processing\
    \ as much as possible.\n*   **Custom drawing the cell**: To utilize the full computing\
    \ capacity of the CPU while rendering the table view, you may need to consider\
    \ using drawing methods directly. This will boost the rendering process a lot\
    \ and increase the performance measurements; the fps rate becomes almost maximal.\
    \ You can draw your custom cell by overriding the `drawRect` method and drawing\
    \ every UI element yourself with different drawing methods inside each element.\n\
    *   **Opaque**: This small problem is encountered when developers position their\
    \ user interface elements into the view. If they don't set each of the views to\
    \ opaque (i.e. not transparent), the rendering process will need to run through\
    \ each point twice to redraw the same point.\n*   **Caching the height**: This\
    \ is another small mistake that developers often make. There are two main methods\
    \ called every time a cell is requested.\n*   **Avoid graphical effects**: The\
    \ more graphical effects you have on a cell, the slower the rendering process.\
    \ Therefore, you should test for this as well. You can definitely use the CoreAnimation\
    \ to see the rendering effect of each UI element.\n*   **Edit/reordering performance**:\
    \ Optimizing the performance for scrolling can cause performance problems for\
    \ editing and reordering because the `UIKit` and animation framework is optimized\
    \ to work well with subviews. If you draw the cell yourself, those framework optimizations\
    \ will become ineffective.\n\n**EXERCISES**\n\n1.  Theory\n    1.  Create a checklist\
    \ to make sure you follow all the necessary and basic steps to have a good, high\
    \ performance `UITableViewCell`.\n2.  Practice\n    1.  Write a small app using\
    \ `drawRect` to see how it behaves under the editing/reordering control.\n   \
    \ 2.  Do the exercise from the “Reusing Images” section. Try it with multithreading\
    \ technique to load images from file to display.\n    3.  Practice creating a\
    \ custom `UITableViewCell` yourself using the following:\n        *   `InterfaceBuilder`\n\
    \        *   Adding subview code\n        *   Using drawing code\n\n## Chapter\
    \ 4\n\n## Increase App Performance Using Image and Data Caching Techniques\n\n\
    In this chapter, you will learn about:\n\n*   How network and file IO processing\
    \ affect app performance.\n*   Common problems and techniques related to caching\
    \ algorithms.\n*   Specific problems in iPhone Caching techniques.\n    *   What\
    \ you should cache.\n    *   When you should cache.\n    *   How to implement\
    \ caching.\n    *   Where you should cache data and images.\n*   The tradeoff\
    \ between memory consumption and performance.\n\nFor most iPhone apps today, developers\
    \ usually either load data from their own servers or consume data from third-party\
    \ services. A minority of apps have data stored in the file system and load it\
    \ to display to users when necessary. Very few apps do not use any kind of network\
    \ or file IO processing. Therefore, understanding the impact of these types of\
    \ processing helps you to figure out problems and solve them easier.\n\n### Differences\
    \ in Performance Between Network, File, and Memory Processing\n\nLet's see how\
    \ long it takes to load an image from file system to memory and from a given server\
    \ to memory. Of course, the results will vary depending on how quickly the server\
    \ processes the request, the speed of the network, and how far the server is from\
    \ the testing machine. However, I want to demonstrate the important idea that\
    \ loading an image across the network is much slower than loading it from a file\
    \ and that loading it from a file is much slower than having the image already\
    \ in memory. I tested the performance based on loading a 50kb image. Here are\
    \ the results:\n\n`File Loading Time:  0.001147`\n`Network Loading Time:  4.160634`\n\
    \nLoading the image from the file system took 1 millisecond, while loading from\
    \ network took 4 seconds—a huge difference! The 1 millisecond doesn't seem like\
    \ much in terms of performance; however, imagine if you needed to load 10-20 images\
    \ at a time and some of the images were large in size—up to few hundred kbs. The\
    \ total time for loading all those images would be more than couple of seconds."
