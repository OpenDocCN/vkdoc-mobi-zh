- fmt: "### Background Services\n\nAs shown in the previous sections, there are many\
    \ services that you can run in the background to process data and provide services\
    \ to the user. Here is a list of things you can do in the background in iOS4:\n\
    \n*   Audio: Your app can play audio while it is in the background.\n*   Privacy:\
    \ Let the OS show a splash screen when your application is relaunched. This is\
    \ useful if your app is showing some sensitive information.\n*   Location: Your\
    \ app can receive significant changes in location while in background.\n*   VOIP:\
    \ The user can make phone calls while your app is in background.\n*   Local notifications:\
    \ Your application can ask the system to schedule a specific time to pop up a\
    \ message to the user.\n*   Task completion: Your app can ask the system for extra\
    \ time to complete a given task. This is an important feature that I will cover\
    \ in more detail later in this chapter.\n\nThese are specific services that can\
    \ help you speed up your program by utilizing the multitasking features of the\
    \ iOS. Audio and VOIP don’t speed up your app but they help make the user feel\
    \ better and make your application more usable. Location, task completion, and\
    \ local notifications are good tools for your application’s performance when done\
    \ properly. Considering that location is one of the most powerful features in\
    \ mobile technology, many apps now want to incorporate it in order to serve the\
    \ user better.\n\n#### Audio Service\n\nThe most trivial way to enable your audio\
    \ service in background is to include a key in the `info.plist` and then set up\
    \ the audio settings properly to let the audio keep playing in the background\
    \ after your application enters background.\n\nYou need to add a new key called\
    \ `UIBackgroundModes` with the value `audio`, as shown in [Figure 8–7](#Chapter08.html#fig_8_7).\
    \ The result will show “Required background modes” in the array.\n\n![images](images/0807.jpg)\n\
    \n**Figure 8–7.** Set the audio to play in the background.\n\nIf you look at Apple’s\
    \ documentation, it doesn’t say anything about configuring your audio setting\
    \ so that it can keep playing. Many developers complain about this, so you should\
    \ be aware of this issue. You need to add the following code snippet before you\
    \ can play the audio:\n\n```\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\nAVAudioPlayer *backgroundMusicPlayer = [[AVAudioPlayer alloc]\n\
    \                                           initWithContentsOfURL:YOUR_AUDIO_URL\n\
    \                                                           error:nil];\n[backgroundMusicPlayer\
    \ play];\n```\n\n**NOTE:** You need to add the AVFoundation framework and import\
    \ it in your file to make this code compile.\n\nThe problem with this approach\
    \ is that you can only play one song in the background. After that song ends,\
    \ your application enters into background mode. To play a list of songs in the\
    \ background, you have to write code to implement a long-running background job.\n\
    \nSometimes you want to stop downloading/streaming audio/video in the background\
    \ to save the traffic for the user. You can use the `applicationDidEnterBackground`\
    \ method to stop all video/audio streaming, like so:\n\n```\n- (void)applicationDidEnterBackground:(UIApplication\
    \ *)application {\n  [backgroundMusicPlayer stop];\n}\n```\n\n#### Show Splash\
    \ Screen\n\nWhen your application enters the background, the iOS environment will\
    \ take a screenshot of its current view. When the user relaunches your application,\
    \ the iOS environment will display this screenshot while your application is still\
    \ loading. This creates a perception within the user’s mind that your application\
    \ is loading really quickly, which boosts the user experience. However, in some\
    \ cases, there is some sensitive information that you may want to hide until all\
    \ the data is loaded. Here is a simple method to support this (you can also do\
    \ this by directly manipulating your views in the `applicationDidEnterBackground`,\
    \ but it’s a more complicated process):\n\n```\n- (void)applicationDidEnterBackground:(UIApplication\
    \ *)application{\n    if (appHasSecret) { // if your application has something\
    \ to hide\n        UIImageView *splashView = [[UIImageView alloc] initWithFrame:CGRectMake(0,0,\
    \ 320, 480)];\n        splashView.image = [UIImage imageNamed:@\"YOUR_DEFAULT_PICTURE\"\
    ];\n        [window addSubview:splashView];\n    }\n}\n```\n\nYour `Default.png`\
    \ can be anything that the user can view while he is waiting for your app to load\
    \ its view and data. So, when the user relaunches your app, he sees this `default\
    \ image` first and then your view.\n\n#### Location Service\n\nLocation-based\
    \ social networking is hot these days, and there are plenty of services that need\
    \ the user’s location. The problem is that your user won’t want to keep your application\
    \ open all the time to let your app knows her current location. Therefore, Apple\
    \ provides you a mechanism so your application can find the latest location while\
    \ staying in background.\n\nTo get the user’s current location, here are some\
    \ ways your app can choose to implement:\n\n*   Use Standard Location Service:\
    \ Your application can ask the iOS environment for the current user’s location\
    \ whenever the app wants. This approach consumes a lot of battery power and takes\
    \ time for the application to query data. Another problem is that the app can’t\
    \ get a location using this service if it’s running in background.\n*   Register\
    \ for significant location changes: Your application can also register for location\
    \ events and notifications. Your application will be notified whenever the user\
    \ changes his location significantly. This often gets called when the device moves\
    \ from one cell tower to another. Using this approach is more passive but it saves\
    \ battery life. Another benefit of this approach is the iOS notifies your application\
    \ even if your application is in background.\n*   Continuous background location\
    \ update: This approach is the best for your application but the worst for your\
    \ user’s battery life. Your application can constantly get location updates from\
    \ the iOS, whether in the background or foreground."
  raw: '### Background Services


    As shown in the previous sections, there are many services that you can run in
    the background to process data and provide services to the user. Here is a list
    of things you can do in the background in iOS4:


    *   Audio: Your app can play audio while it is in the background.

    *   Privacy: Let the OS show a splash screen when your application is relaunched.
    This is useful if your app is showing some sensitive information.

    *   Location: Your app can receive significant changes in location while in background.

    *   VOIP: The user can make phone calls while your app is in background.

    *   Local notifications: Your application can ask the system to schedule a specific
    time to pop up a message to the user.

    *   Task completion: Your app can ask the system for extra time to complete a
    given task. This is an important feature that I will cover in more detail later
    in this chapter.


    These are specific services that can help you speed up your program by utilizing
    the multitasking features of the iOS. Audio and VOIP don’t speed up your app but
    they help make the user feel better and make your application more usable. Location,
    task completion, and local notifications are good tools for your application’s
    performance when done properly. Considering that location is one of the most powerful
    features in mobile technology, many apps now want to incorporate it in order to
    serve the user better.


    #### Audio Service


    The most trivial way to enable your audio service in background is to include
    a key in the `info.plist` and then set up the audio settings properly to let the
    audio keep playing in the background after your application enters background.


    You need to add a new key called `UIBackgroundModes` with the value `audio,` as
    shown in [Figure 8–7](#Chapter08.html#fig_8_7). The result will show “Required
    background modes” in the array.


    ![images](images/0807.jpg)


    **Figure 8–7.** Set the audio to play in the background.


    If you look at Apple’s documentation, it doesn’t say anything about configuring
    your audio setting so that it can keep playing. Many developers complain about
    this, so you should be aware of this issue. You need to add the following code
    snippet before you can play the audio:


    `[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayback error:nil];`

    `AVAudioPlayer *backgroundMusicPlayer = [[AVAudioPlayer alloc]`

    `                                           initWithContentsOfURL:YOUR_AUDIO_URL`

    `                                                           error:nil];`

    `[backgroundMusicPlayer play];`


    **NOTE:** You need to add the AVFoundation framework and import it in your file
    to make this code compile.


    The problem with this approach is that you can only play one song in the background.
    After that song ends, your application enters into background mode. To play a
    list of songs in the background, you have to write code to implement a long-running
    background job.


    Sometimes you want to stop downloading/streaming audio/video in the background
    to save the traffic for the user. You can use the `applicationDidEnterBackground`
    method to stop all video/audio streaming, like so:


    `- (void)applicationDidEnterBackground:(UIApplication *)application {`

    `  [backgroundMusicPlayer stop];`

    `}`


    #### Show Splash Screen


    When your application enters the background, the iOS environment will take a screenshot
    of its current view. When the user relaunches your application, the iOS environment
    will display this screenshot while your application is still loading. This creates
    a perception within the user’s mind that your application is loading really quickly,
    which boosts the user experience. However, in some cases, there is some sensitive
    information that you may want to hide until all the data is loaded. Here is a
    simple method to support this (you can also do this by directly manipulating your
    views in the `applicationDidEnterBackground`, but it’s a more complicated process):


    `- (void)applicationDidEnterBackground:(UIApplication *)application{`

    `    if (appHasSecret) { // if your application has something to hide`

    `        UIImageView *splashView = [[UIImageView alloc] initWithFrame:CGRectMake(0,0,
    320, 480)];`

    `        splashView.image = [UIImage imageNamed:@"YOUR_DEFAULT_PICTURE"];`

    `        [window addSubview:splashView];`

    `    }`

    `}`


    Your `Default.png` can be anything that the user can view while he is waiting
    for your app to load its view and data. So, when the user relaunches your app,
    he sees this `default image` first and then your view.


    #### Location Service


    Location-based social networking is hot these days, and there are plenty of services
    that need the user’s location. The problem is that your user won’t want to keep
    your application open all the time to let your app knows her current location.
    Therefore, Apple provides you a mechanism so your application can find the latest
    location while staying in background.


    To get the user’s current location, here are some ways your app can choose to
    implement:


    *   Use Standard Location Service: Your application can ask the iOS environment
    for the current user’s location whenever the app wants. This approach consumes
    a lot of battery power and takes time for the application to query data. Another
    problem is that the app can’t get a location using this service if it’s running
    in background.

    *   Register for significant location changes: Your application can also register
    for location events and notifications. Your application will be notified whenever
    the user changes his location significantly. This often gets called when the device
    moves from one cell tower to another. Using this approach is more passive but
    it saves battery life. Another benefit of this approach is the iOS notifies your
    application even if your application is in background.

    *   Continuous background location update: This approach is the best for your
    application but the worst for your user’s battery life. Your application can constantly
    get location updates from the iOS, whether in the background or foreground.'
  trans: "\n### 后台服务\n\n如前面几节所示，有许多服务可以在后台运行，以处理数据并向用户提供服务。以下是在 iOS4 中可以在后台执行的操作列表：\n\
    \n*   **音频**：你的应用可以在后台播放音频。\n*   **隐私保护**：当你的应用被重新启动时，让操作系统显示一个启动画面。如果你的应用正在显示一些敏感信息，这会很有用。\n\
    *   **定位**：你的应用可以在后台接收显著的位置变化。\n*   **网络电话（VOIP）**：用户可以在你的应用处于后台时拨打电话。\n*   **本地通知**：你的应用可以请求系统安排在特定时间向用户弹出消息。\n\
    *   **任务完成**：你的应用可以向系统请求额外的时间来完成给定的任务。这是一个重要的特性，我将在本章后面更详细地介绍。\n\n这些是特定的服务，可以通过利用\
    \ iOS 的多任务处理功能来帮助你加速程序。音频和网络电话并不会加速你的应用，但它们有助于提升用户体验，并使你的应用更易用。如果使用得当，定位、任务完成和本地通知都是提升应用性能的好工具。考虑到定位是移动技术中最强大的功能之一，许多应用现在都想集成它，以便更好地服务用户。\n\
    \n#### 音频服务\n\n在后台启用音频服务的最简单方法是在 `info.plist` 中包含一个键，然后正确设置音频配置，以便在你的应用进入后台后，音频能继续播放。\n\
    \n你需要添加一个名为 `UIBackgroundModes` 的新键，其值为 `audio`，如 图 8–7 所示。结果将在数组中显示“Required\
    \ background modes”。\n\n![images](img/0807.jpg)\n\n**图 8–7.** 设置音频在后台播放。\n\n如果你查看苹果的文档，它并没有提及任何关于配置音频设置以使其持续播放的内容。许多开发者对此有抱怨，所以你应该注意这个问题。你需要添加以下代码片段，然后才能播放音频：\n\
    \n```\n[[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryPlayback\
    \ error:nil];\nAVAudioPlayer *backgroundMusicPlayer = [[AVAudioPlayer alloc]\n\
    \                                           initWithContentsOfURL:YOUR_AUDIO_URL\n\
    \                                                           error:nil];\n[backgroundMusicPlayer\
    \ play];\n```\n\n**注意：** 你需要添加 AVFoundation 框架并在你的文件中导入它，才能使这段代码编译通过。\n\n这种方法的问题是，你只能在后台播放一首歌。那首歌播放完毕后，你的应用就会进入后台模式。要在后台播放一个歌曲列表，你必须编写代码来实现一个长时间运行的后台任务。\n\
    \n有时你想停止在后台下载/流式传输音频/视频，以节省用户的流量。你可以使用 `applicationDidEnterBackground` 方法来停止所有视频/音频流传输，如下所示：\n\
    \n```\n- (void)applicationDidEnterBackground:(UIApplication *)application {\n\
    \  [backgroundMusicPlayer stop];\n}\n```\n\n#### 显示启动画面\n\n当你的应用进入后台时，iOS 环境会对其当前视图进行截图。当用户重新启动你的应用时，在应用仍在加载的过程中，iOS\
    \ 环境会显示这张截图。这会在用户心中营造一种你的应用加载非常快速的错觉，从而提升用户体验。然而，在某些情况下，你可能希望在数据完全加载之前隐藏一些敏感信息。以下是一个支持此功能的简单方法（你也可以通过在\
    \ `applicationDidEnterBackground` 中直接操作你的视图来实现，但过程会更复杂）：\n\n```\n- (void)applicationDidEnterBackground:(UIApplication\
    \ *)application{\n    if (appHasSecret) { // 如果你的应用有需要隐藏的内容\n        UIImageView\
    \ *splashView = [[UIImageView alloc] initWithFrame:CGRectMake(0,0, 320, 480)];\n\
    \        splashView.image = [UIImage imageNamed:@\"YOUR_DEFAULT_PICTURE\"];\n\
    \        [window addSubview:splashView];\n    }\n}\n```\n\n你的 `Default.png` 可以是用户在等待你的应用加载视图和数据时所能看到的任何图像。这样，当用户重新启动你的应用时，他会先看到这个“默认图像”，然后才看到你的视图。\n\
    \n#### 定位服务\n\n如今基于位置的社交网络非常热门，许多服务都需要用户的位置。问题在于，用户不会为了让你了解她当前的位置而一直保持应用打开。因此，苹果为你提供了一种机制，使你的应用在后台时也能获取最新位置。\n\
    \n要获取用户的当前位置，你的应用可以选择以下几种实现方式：\n\n*   **使用标准定位服务**：你的应用可以随时向 iOS 环境请求当前用户的位置。这种方法非常耗电，并且应用查询数据需要时间。另一个问题是，如果应用在后台运行，则无法使用此服务获取位置。\n\
    *   **注册显著位置变化**：你的应用也可以注册位置事件和通知。当用户的位置发生显著变化时，你的应用会收到通知。当设备从一个基站移动到另一个基站时，通常会触发此调用。这种方法更为被动，但可以节省电量。这种方法的另一个好处是，即使你的应用在后台，iOS\
    \ 也会通知你的应用。\n*   **连续后台位置更新**：这种方法对你的应用来说是最好的，但对用户的电池续航来说是最差的。无论你的应用是在后台还是前台，它都可以持续从\
    \ iOS 获取位置更新。"
- fmt: "### Standard Location Services\n\nThis is a common location service that most\
    \ apps use because it was available in the old iOS. To use this service, you may\
    \ want to set the accuracy and filter properties before calling `startUpdatingLocation()`.\
    \ If you don’t have a configuration set, the iOS will simply use these default\
    \ configurations:\n\n```\nCLLocationManager *locationManager = [[CLLocationManager\
    \ alloc] init];\nlocationManager.delegate = self;\n[locationManager startUpdatingLocation];\n\
    ```\n\n**NOTE:** You need to add the CoreLocation framework and import `CoreLocation`\
    \ in your file. The class represented by `self` object must implement the `CLLocationManagerDelegate`.\n\
    \nThe code is really straightforward. You can set some configuration parameters\
    \ to get better location data. These properties belong to `CLLocationManager`\
    \ class:\n\n```\n@property(nonatomic, weak) CLLocationAccuracy desiredAccuracy\n\
    ```\n\nSet the accuracy level for the location detection. The default value is\
    \ best; however, if your application accepts the lower accuracy level, you should\
    \ go with that. The problem with the \"best\" configuration is that it takes more\
    \ time and more battery energy to request the location. It offers the following\
    \ accuracy levels (these names are self-explanatory):\n\n*   `kCLLocationAccuracyBestForNavigation`\n\
    *   `kCLLocationAccuracyBest` (Default Value)\n*   `kCLLocationAccuracyNearestTenMeters`\n\
    *   `kCLLocationAccuracyHundredMeters`\n*   `kCLLocationAccuracyKilometer`\n*\
    \   `kCLLocationAccuracyThreeKilometers`\n\nAnother property of class `CLLocationManager`\
    \ that you can set is:\n\n```\n@property(nonatomic, weak) CLLocationDistance distanceFilter\n\
    ```\n\nYou can set either `kCLDistanceFilterNone` (default) or any double value\
    \ that you want. The property specifies the distance (measured in meters) that\
    \ your users have to move before your application receives notification about\
    \ the new location. The `kCLDistanceFilterNone` means your application can receive\
    \ all notifications whenever user has a movement.\n\nThis section only describes\
    \ how you can ask the operating system for a location update. The details about\
    \ the return value and what to do will be briefly described later.\n\n### Significant\
    \ Location Changes\n\nThere are two different mechanisms to update based on certain\
    \ conditions:\n\n*   When there are significant changes in the user's location.\n\
    *   When the user enters or quits a specific region.\n\nThe first mechanism is\
    \ really like the Standard Location Update and happens by initializing the object\
    \ and then setting up configurations. The only difference is that now you call\
    \ `startMonitoringSignificantLocationChanges()`.\n\nOne important note is that\
    \ if you use this Significant Location Change mechanism, your application will\
    \ be invoked or will wake up when new location data arrives. This will also happen\
    \ if your application is already suspended or terminated. Because your app can\
    \ be awakened with this mechanism, you don't need to handle background processing\
    \ code or worry about missing location data. However, your application is only\
    \ given a small amount of time in background to process this location data. Your\
    \ application may not have time to process very much network data but you can\
    \ still do a lot of other useful stuff.\n\nBefore moving to the region mechanism,\
    \ the following code will explain how to receive the location update and process\
    \ this location data:\n\n```\n// Delegate method from the CLLocationManagerDelegate\
    \ protocol.\n- (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
    \ *)newLocation\n    fromLocation:(CLLocation *)oldLocation {\n\n    NSLog(@\"\
    latitude %f, longitude: %f\\n\",\n            newLocation.coordinate.latitude,\n\
    \            newLocation.coordinate.longitude);\n\n}\n```\n\nAs you can see, all\
    \ you need to do is to include a delegate method, `(void)locationManager:didUpdateToLocation:fromLocation:`.\
    \ Inside the `newLocation` object, you have two important data points, `latitude`\
    \ and `longitude`.\n\nThe Region-based mechanism is also similar to the Significant\
    \ Location Change mechanism in that you register for a specific circular region\
    \ by a center and its radius. The code block is as simple as the following:\n\n\
    ```\n  // Create the region and start monitoring it.\n  // radius is measured\
    \ in meters\n   CLRegion* region = [[CLRegion alloc]\n  initCircularRegionWithCenter:destinationLocation.coordinate\n\
    \                        radius:radius identifier:@\"YOUR_REGION_ID\"];\n\n  [self.locationMananager\
    \ startMonitoringForRegion:region\n                   desiredAccuracy:kCLLocationAccuracyHundredMeters];\n\
    ```\n\nUsually, this mechanism is integrated with a MapKit so users can register\
    \ for their destination and get notified when they are around that region.\n\n\
    You also need to implement the following two methods to receive events about the\
    \ regions:\n\n```\n- (void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
    \ *)region\n- (void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion\
    \ *)region\n```\n\n### Continuous Background Location Update\n\nThe last mechanism\
    \ is for applications that require a continuous update from the iOS environment.\
    \ This is a good mechanism for an application that requires every new location\
    \ update even when the app is in background and not running. To do this, you need\
    \ to add the key `UIBackgroundModes` with the value location, similar to the audio\
    \ playing in background (covered in previous sections).\n\n![images](images/0808.jpg)\n\
    \n**Figure 8–8.** *App registers for location updates*\n\nAs you can see in [Figure\
    \ 8–8](#Chapter08.html#fig_8_8), your application now is registered with location\
    \ updates. There are many advantages and disadvantages with this mechanism. Here\
    \ are two.\n\nAdvantage:\n\n*   You can get updates to the location service frequently,\
    \ even with small changes.\n\nDisadvantages:\n\n*   It can consume lots of your\
    \ user's battery power.\n\n### Local Notification\n\nThis is a new feature of\
    \ iOS4 that allows applications to set up notifications at a specific time. This\
    \ feature is useful for time-based application like alarms or calendars. This\
    \ can be helpful if the user needs to wait for a specific time for some specific\
    \ events. The events can be based on user settings or server settings. This also\
    \ helps to get the user's attention to the application.\n\nYou need to have a\
    \ new local notification object and set up the date and time properly, like so:\n\
    \n```\n// Create a new notification.\nUILocalNotification* alarm = [[UILocalNotification\
    \ alloc] init];\nif (alarm) {\n   alarm.fireDate = theDate;\n   alarm.timeZone\
    \ = [NSTimeZone defaultTimeZone];\n   alarm.repeatInterval = kCFCalendarUnitDay;\n\
    \   alarm.alertBody = @\"Time to wake up!\";\n   [[UIApplication sharedApplication]\
    \ scheduleLocalNotification:alarm];\n}\n```\n\n### Voice Over IP (VOIP)\n\nVoice\
    \ Over IP is mainly used for voice chat applications like Skype. This is another\
    \ feature of multitasking in the new iOS4; however, it's beyond the scope of this\
    \ chapter, so I won't cover it here. Most applications don't need to use VOIP\
    \ at all."
  raw: '##### Standard Location Services


    This is a common location service that most apps use because it was available
    in the old iOS. To use this service, you may want to set the accuracy and filter
    properties before calling `startUpdatingLocation.` If you don’t have a configuration
    set, the iOS will simply use these default configurations `:`


    `CLLocationManager *locationManager = [[CLLocationManager alloc] init];`

    `locationManager.delegate = self;`

    `[locationManager startUpdatingLocation];`


    **NOTE:** You need to add the CoreLocation framework and import `CoreLocation`
    in your file. The class represented by `self` object must implement the `CLLocationManagerDelegate`.


    The code is really straightforward. You can set some configuration parameters
    to get better location data. These properties belong to `CLLocationManager` class:


    `@property(nonatomic, weak) CLLocationAccuracy desiredAccuracy`


    Set the accuracy level for the location detection. The default value is best;
    however, if your application accepts the lower accuracy level, you should go with
    that. The problem with the “best” configuration is that it takes more time and
    more battery energy to request the location. It offers the following accuracy
    levels (these names are self-explanatory):


    *   kCLLocationAccuracyBestForNavigation

    *   kCLLocationAccuracyBest (Default Value)

    *   kCLLocationAccuracyNearestTenMeters

    *   kCLLocationAccuracyHundredMeters

    *   kCLLocationAccuracyKilometer

    *   kCLLocationAccuracyThreeKilometers


    Another property of class `CLLocationManager` that you can set is


    `@property(nonatomic, weak) CLLocationDistance distanceFilter`


    You can set either `kCLDistanceFilterNone` (default) or any double value that
    you want. The property specifies the distance (measured in meters) that your users
    have to move before your application receives notification about the new location.
    The `kCLDistanceFilterNone` means your application can receive all notifications
    whenever user has a movement.


    This section only describes how you can ask the operating system for a location
    update. The details about the return value and what to do will be briefly described
    later.


    ##### Significant Location Changes


    There are two different mechanisms to update based on certain conditions:


    *   When there are significant changes in the user’s location.

    *   When the user enters or quits a specific region.


    The first mechanism is really like the Standard Location Update and happens by
    initializing the object and then setting up configurations. The only difference
    is that now you call `startMonitoringSignificantLocationChanges.`


    One important note is that if you use this Significant Location Change mechanism,
    your application will be invoked or will wake up when new location data arrives.
    This will also happen if your application is already suspended or terminated.
    Because your app can be awakened with this mechanism, you don’t need to handle
    background processing code or worry about missing location data. However, your
    application is only given a small amount of time in background to process this
    location data. Your application may not have time to process very much network
    data but you can still do a lot of other useful stuff.


    Before moving to the region mechanism, the following code will explain how to
    receive the location update and process this location data:


    `// Delegate method from the CLLocationManagerDelegate protocol.`

    `- (void)locationManager:(CLLocationManager *)manager`

    `    didUpdateToLocation:(CLLocation *)newLocation`

    `    fromLocation:(CLLocation *)oldLocation {`


    `    NSLog(@"latitude %f, longitude: %f\n",`

    `            newLocation.coordinate.latitude,`

    `            newLocation.coordinate.longitude);`


    `}`


    As you can see, all you need to do is to include a delegate method, `(void)locationManager:didUpdateToLocation:fromLocation:.`
    Inside the `newLocation` object, you have two important data points, `latitude`
    and `longitude.`


    The Region-based mechanism is also similar to the Significant Location Change
    mechanism in that you register for a specific circular region by a center and
    its radius. The code block is as simple as the following:


    `  // Create the region and start monitoring it.`

    `  // radius is measured in meters`

    `   CLRegion* region = [[CLRegion alloc]`

    `  initCircularRegionWithCenter:destinationLocation.coordinate`

    `                        radius:radius identifier:@"YOUR_REGION_ID";`


    `  [self.locationMananager startMonitoringForRegion:region`

    `                   desiredAccuracy:kCLLocationAccuracyHundredMeters];`


    Usually, this mechanism is integrated with a MapKit so users can register for
    their destination and get notified when they are around that region.


    You also need to implement the following two methods to receive events about the
    regions:


    `- (void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion
    *)region`

    `- (void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion
    *)region`


    ##### Continuous Background Location Update


    The last mechanism is for applications that require a continuous update from the
    iOS environment. This is a good mechanism for an application that requires every
    new location update even when the app is in background and not running. To do
    this, you need to add the key `UIBackgroundModes` with the value location, similar
    to the audio playing in background (covered in previous sections).


    ![images](images/0808.jpg)


    **Figure 8–8.** *App registers for location updates*


    As you can see in [Figure 8–8](#Chapter08.html#fig_8_8), your application now
    is registered with location updates. There are many advantages and disadvantages
    with this mechanism. Here are two.


    Advantage:


    *   You can get updates to the location service frequently, even with small changes.


    Disadvantages:


    *   It can consume lots of your user’s battery power.


    #### Local Notification


    This is a new feature of iOS4 that allows applications to set up notifications
    at a specific time. This feature is useful for time-based application like alarms
    or calendars. This can be helpful if the user needs to wait for a specific time
    for some specific events. The events can be based on user settings or server settings.
    This also helps to get the user’s attention to the application.


    You need to have a new local notification object and set up the date and time
    properly, like so:


    `// Create a new notification.`

    `UILocalNotification* alarm = [[UILocalNotification alloc] init];`

    `if (alarm) {`

    `   alarm.fireDate = theDate;`

    `   alarm.timeZone = [NSTimeZone defaultTimeZone];`

    `   alarm.repeatInterval = kCFCalendarUnitDay;`

    `   alarm.alertBody = @"Time to wake up!";`

    `   [[UIApplication sharedApplication] scheduleLocalNotification:alarm];`

    `}`


    #### Voice Over IP (VOIP)


    Voice Over IP is mainly used for voice chat applications like Skype. This is another
    feature of multitasking in the new iOS4; however, it’s beyond the scope of this
    chapter, so I won’t cover it here. Most applications don’t need to use VOIP at
    all.'
  trans: "\n### 标准定位服务\n\n这是一种大多数应用都会使用的常见定位服务，因为在旧版 iOS 中就已存在。要使用此服务，你需要在调用 `startUpdatingLocation()`\
    \ 之前设置精度和过滤属性。如果你没有进行配置，iOS 将直接使用以下默认配置：\n\n```\nCLLocationManager *locationManager\
    \ = [[CLLocationManager alloc] init];\nlocationManager.delegate = self;\n[locationManager\
    \ startUpdatingLocation];\n```\n\n**注意：** 你需要在文件中添加 CoreLocation 框架并导入 `CoreLocation`。`self`\
    \ 对象所代表的类必须实现 `CLLocationManagerDelegate` 协议。\n\n这段代码非常简单。你可以设置一些配置参数来获取更准确的定位数据。这些属性都属于\
    \ `CLLocationManager` 类：\n\n```\n@property(nonatomic, weak) CLLocationAccuracy\
    \ desiredAccuracy\n```\n\n设置定位检测的精度级别。默认值为最佳；但如果你的应用可以接受较低的精度级别，建议使用后者。“最佳”配置的问题在于，请求定位会消耗更多时间和电量。它提供了以下精度级别（这些名称不言自明）：\n\
    \n*   `kCLLocationAccuracyBestForNavigation`（导航最佳精度）\n*   `kCLLocationAccuracyBest`（最佳精度，默认值）\n\
    *   `kCLLocationAccuracyNearestTenMeters`（最近十米精度）\n*   `kCLLocationAccuracyHundredMeters`（百米精度）\n\
    *   `kCLLocationAccuracyKilometer`（千米精度）\n*   `kCLLocationAccuracyThreeKilometers`（三千米精度）\n\
    \n`CLLocationManager` 类的另一个可设置属性是：\n\n```\n@property(nonatomic, weak) CLLocationDistance\
    \ distanceFilter\n```\n\n你可以设置 `kCLDistanceFilterNone`（默认值）或任何你想要的 double 值。该属性指定了用户需要移动多远的距离（以米为单位），你的应用才会收到新位置的更新通知。`kCLDistanceFilterNone`\
    \ 表示只要用户发生移动，你的应用就会收到所有通知。\n\n本节仅描述了如何向操作系统请求位置更新。关于返回值以及后续操作的细节将在后面简要介绍。\n\n\
    ### 重大位置变化\n\n有两种不同的机制可以基于特定条件进行更新：\n\n*   当用户位置发生重大变化时。\n*   当用户进入或离开特定区域时。\n\
    \n第一种机制与标准位置更新非常相似，都是通过初始化对象然后进行配置来实现。唯一的区别在于，这里需要调用 `startMonitoringSignificantLocationChanges()`。\n\
    \n一个重要提示：如果你使用这种重大位置变化机制，当新的位置数据到达时，你的应用将被唤醒或启动。即使你的应用已经被挂起或终止，这种情况也会发生。由于此机制可以唤醒你的应用，你无需处理后台处理代码，也不必担心丢失位置数据。然而，你的应用在后台处理这些位置数据的时间很有限。你的应用可能没有足够的时间处理大量的网络数据，但你仍然可以完成许多其他有用的工作。\n\
    \n在介绍区域机制之前，以下代码将说明如何接收位置更新并处理这些位置数据：\n\n```\n// 来自 CLLocationManagerDelegate\
    \ 协议的代理方法。\n- (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
    \ *)newLocation\n    fromLocation:(CLLocation *)oldLocation {\n\n    NSLog(@\"\
    latitude %f, longitude: %f\\n\",\n            newLocation.coordinate.latitude,\n\
    \            newLocation.coordinate.longitude);\n\n}\n```\n\n如你所见，你只需要包含一个代理方法\
    \ `(void)locationManager:didUpdateToLocation:fromLocation:`。在 `newLocation` 对象中，有两个重要的数据点：`latitude`（纬度）和\
    \ `longitude`（经度）。\n\n基于区域的机制与重大位置变化机制类似，你需要通过指定中心和半径来注册一个特定的圆形区域。代码块同样十分简单：\n\
    \n```\n  // 创建区域并开始监控。\n  // radius 以米为单位\n   CLRegion* region = [[CLRegion alloc]\n\
    \  initCircularRegionWithCenter:destinationLocation.coordinate\n             \
    \           radius:radius identifier:@\"YOUR_REGION_ID\"];\n\n  [self.locationMananager\
    \ startMonitoringForRegion:region\n                   desiredAccuracy:kCLLocationAccuracyHundredMeters];\n\
    ```\n\n通常，此机制会与 MapKit 集成，以便用户可以注册他们的目的地，并在他们到达该区域附近时收到通知。\n\n你还需要实现以下两个方法来接收与区域相关的事件：\n\
    \n```\n- (void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
    \ *)region\n- (void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion\
    \ *)region\n```\n\n### 持续后台位置更新\n\n最后一种机制适用于需要从 iOS 环境获取持续更新的应用程序。对于那些即使在后台或未运行时也需要每次新位置更新的应用来说，这是一种很好的机制。要实现此功能，你需要将\
    \ `UIBackgroundModes` 键的值设置为 `location`，这与上一节介绍的后台音频播放类似。\n\n![images](img/0808.jpg)\n\
    \n**图 8–8.** *应用注册位置更新*\n\n如图 8–8 所示，你的应用现已注册了位置更新。这种机制有许多优点和缺点。以下是其中两个。\n\n优点：\n\
    \n*   你可以频繁地获取位置服务更新，即使是微小的位置变化。\n\n缺点：\n\n*   它会大量消耗用户的电池电量。\n\n### 本地通知\n\n\
    这是 iOS4 的一项新功能，允许应用在特定时间设置通知。此功能对于基于时间的应用（如闹钟或日历）非常有用。如果用户需要等待特定时间以执行某些特定事件，这将非常方便。这些事件可以基于用户设置或服务器设置。这也有助于将用户的注意力吸引到应用上。\n\
    \n你需要创建一个新的本地通知对象，并正确设置日期和时间，如下所示：\n\n```\n// 创建一个新通知。\nUILocalNotification* alarm\
    \ = [[UILocalNotification alloc] init];\nif (alarm) {\n   alarm.fireDate = theDate;\n\
    \   alarm.timeZone = [NSTimeZone defaultTimeZone];\n   alarm.repeatInterval =\
    \ kCFCalendarUnitDay;\n   alarm.alertBody = @\"Time to wake up!\";\n   [[UIApplication\
    \ sharedApplication] scheduleLocalNotification:alarm];\n}\n```\n\n### 网络语音电话 (VOIP)\n\
    \n网络语音电话主要用于 Skype 等语音聊天应用。这是新 iOS4 中多任务处理的另一项功能；然而，它超出了本章的讨论范围，因此我在此不作介绍。大多数应用完全不需要使用\
    \ VOIP。\n"
- fmt: "### Background Execution\n\nBackground execution is an important technique\
    \ for iOS developers. This technique is new as of iOS4 and helps developers get\
    \ more time to finish critical tasks, so the app can control its lifetime a little\
    \ bit more.\n\nFor example, imagine that you are uploading an image/video to your\
    \ server. In the middle of the uploading process, the user suddenly quits the\
    \ app, leaving the image half uploaded. The next the user goes back to your app,\
    \ she will have to wait again for the whole uploading process. The other option\
    \ is to force the user to wait for the image to finish uploading before the app\
    \ closes, but this is not a great user experience.\n\nIn another scenario, there\
    \ are important posts or downloads from your server, which you definitely want\
    \ to complete. Background execution is important to in helping developers with\
    \ these tasks. You can wrap your uploading process within the background task\
    \ and start that task, like so:\n\n```\nUIApplication* app = [UIApplication sharedApplication];\n\
    UIBackgroundTaskIdentifier bgTask = [app beginBackgroundTaskWithExpirationHandler:^{\n\
    \  [self.imageUploadService uploadImage:image];\n  [app endBackgroundTask:bgTask];\n\
    }];\n// Start the long-running task and return immediately.\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n  // Do the work associated with the task.\n  [app endBackgroundTask:bgTask];\n\
    });\n```\n\nAs shown in the code, to initiate a new background task, you will\
    \ need to call method `beginBackgroundTaskWithExpirationHandler:`, which will\
    \ return a background task identifier that you can use to end the background task\
    \ later. With method `beginBackgroundTaskWithExpirationHandler:`, you tell iOS\
    \ that your app would like this task to complete even if the app is moved into\
    \ the background state, before the app becomes suspended. The `endBackgroundTask:`\
    \ method tells iOS that your app's task has completed, allowing it to move your\
    \ app to the suspended state if necessary. If the app remains in the foreground\
    \ the whole time then these calls have no effect, so it doesn't hurt to use them.\n\
    \nYou need to be aware that background tasks don’t get an unlimited amount of\
    \ time to run in the background; in other words, the application has to finish\
    \ its tasks in a limited time (usually up to 10 minutes). Otherwise, the iOS will\
    \ suspend the app without waiting for the task to finish. The expiration handler\
    \ part of `beginBackgroundTaskWithExpirationHandler:` is a block (it’s just like\
    \ a method without the name) specifying your cleanup code if the task outlives\
    \ its lifetime. Code executing as a background task must not make any UI updates\
    \ or openGL calls (as the app is offscreen).\n\nYou can use this `beginBackgroundTaskWithExpirationHandler:`\
    \ method to initiate a new background task in any place in your code. I use it\
    \ to wrap an upload image process that makes sure that, even if the user quits\
    \ the app immediately, the uploading process is still successful. Many people\
    \ also use this method along with `applicationDidEnterBackground:` to make the\
    \ app run for a little longer in order to finish all the final calculations or\
    \ networking processes.\n\nAs mentioned, you can also use background services\
    \ to play audio. Using this background service, you can play a list of songs instead\
    \ of only one. You can use the following code skeleton to implement this; note\
    \ that you may need to fill in other necessary parts of the code to make it work.\
    \ You should do this as an exercise to understand more about how the background\
    \ task works.\n\n```\nUIBackgroundTaskIdentifier bgTaskId;\n// AVAudioPlayer *backgroundMusicPlayer\n\
    if ([backgroundMusicPlayer play]) {\n  bgTaskId = [[UIApplication sharedApplication]\
    \ beginBackgroundTaskWithExpirationHandler:NULL];\n}\n\n- (void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
    \ *)player successfully:(BOOL)success\n{\n    UIBackgroundTaskIdentifier newTaskId\
    \ = UIBackgroundTaskInvalid;\n\n   if (self.haveMoreAudioToPlay) {\n        newTaskId\
    \ = [[UIApplication sharedApplication] beginBackgroundTaskWithExpirationHandler:NULL];\n\
    \        [self playNextAudioFile];\n    }\n\n    if (bgTaskId != UIBackgroundTaskInvalid)\
    \ {\n        [[UIApplication sharedApplication] endBackgroundTask: bgTaskId];\n\
    \    }\n\n    bgTaskId = newTaskId;\n}\n```\n\nAs you can see in the code, by\
    \ using background services you can register the delegate events; then inside\
    \ that delegate method, you can simply play the next file. (Note that the total\
    \ time your application can play audio is up to 10 minutes.) I hope this is a\
    \ helpful demonstration of how to use background services efficiently.\n\n###\
    \ What to Notice when Running in Background\n\nThe following is a small checklist\
    \ from Apple to make sure that your application behaves and runs well in the background\
    \ and doesn’t affect any other apps:\n\n- Reduce your stored memory to the lowest\
    \ level.\n- Release all shared resources, such as Calendar.\n- Respond properly\
    \ to the application life cycle events.\n- Don’t update your UI or call code that\
    \ consumes CPU and battery excessively.\n- Run in the background correctly.\n\
    - Respond to system changes in background.\n\nIf your application can strictly\
    \ follow these guidelines, it will run well and it will get the most out of the\
    \ multitasking feature. It also won’t get killed in the background. Keeping your\
    \ application alive in the background so it relaunches quickly is an important\
    \ part of a good user experience.\n\n#### Memory\n\nAs mentioned, in iOS4, your\
    \ application can run in background services and will still reside in the RAM\
    \ while the application is in background. However, the RAM system has its limits\
    \ and these are even worse in limited environments like iOS, as you learned in\
    \ [Chapter 7](#Chapter07.html#ch7). Therefore, Apple has a strict policy about\
    \ the memory usage of an application when it is in background. Because there will\
    \ be several apps residing in the background at the same time, these apps could\
    \ eat a huge amount of memory quickly. When the device runs out of memory, iOS\
    \ will find the application that consumed the most memory and kill that app first.\n\
    \nTo reduce your memory usage, you need to clear your caches in memory, especially\
    \ image caches. You may also need to remove unnecessary subviews because these\
    \ subviews also are saved into memory when your application goes into background.\
    \ Actually, you need to save your critical data and clear out all unnecessary\
    \ data to avoid your application being suspended by the iOS.\n\n#### Shared Resources\n\
    \nThere are some applications that share data, such as the calendar database and\
    \ the address book. If your application uses this resource while running, it has\
    \ to stop while it enters the background. If your application is found to use\
    \ or has not yet released these shared resources when the application enters the\
    \ background, it is killed immediately. The reason is that all these shared resources\
    \ belong to the foreground application."
  raw: '#### Background Execution


    Background execution is an important technique for iOS developers. This technique
    is new as of iOS4 and helps developers get more time to finish critical tasks,
    so the app can control its lifetime a little bit more.


    For example, imagine that you are uploading an image/video to your server. In
    the middle of the uploading process, the user suddenly quits the app, leaving
    the image half uploaded. The next the user goes back to your app, she will have
    to wait again for the whole uploading process. The other option is to force the
    user to wait for the image to finish uploading before the app closes, but this
    is not a great user experience.


    In another scenario, there are important posts or downloads from your server,
    which you definitely want to complete. Background execution is important to in
    helping developers with these tasks. You can wrap your uploading process within
    the background task and start that task, like so:


    `UIApplication* app = [UIApplication sharedApplication];`

    `UIBackgroundTaskIdentifier bgTask = [app beginBackgroundTaskWithExpirationHandler:^{`

    `  [self.imageUploadService uploadImage:image];`

    `  [app endBackgroundTask:bgTask];`

    `}];`

    `// Start the long-running task and return immediately.`

    `dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    ^{`

    `  // Do the work associated with the task.`

    `  [app endBackgroundTask:bgTask];`

    `});`


    As shown in the code, to initiate a new background task, you will need to call
    method `beginBackgroundTaskWithExpirationHandler:, which` will return a background
    task identifier that you can use to end the background task later. With method
    `beginBackgroundTaskWithExpirationHandler`:, you tell iOS that your app would
    like this task to complete even if the app is moved into the background state,
    before the app becomes suspended. The `endBackgroundTask:` method tellsiOS that
    your app''s task has completed, allowing it to move your app to the suspended
    state if necessary. If the app remains in the foreground the whole time then these
    calls have no effect, so it doesn''t hurt to use them.


    You need to be aware that background tasks don’t get an unlimited amount of time
    to run in the background; in other words, the application has to finish its tasks
    in a limited time (usually up to 10 minutes). Otherwise, the iOS will suspend
    the app without waiting for the task to finish. The expiration handler part of
    `beginBackgroundTaskWithExpirationHandler`: is a block (it’s just like a method
    without the name) specifying your cleanup code if the task outlives its lifetime.
    Code executing as a background task must not make any UI updates or openGL calls
    (as the app is offscreen).


    You can use this `beginBackgroundTaskWithExpirationHandler:` method to initiate
    a new background task in any place in your code. I use it to wrap an upload image
    process that makes sure that, even if the user quits the app immediately, the
    uploading process is still successful. Many people also use this method along
    with `applicationDidEnterBackground:` to make the app run for a little longer
    in order to finish all the final calculations or networking processes.


    As mentioned, you can also use background services to play audio. Using this background
    service, you can play a list of songs instead of only one. You can use the following
    code skeleton to implement this; note that you may need to fill in other necessary
    parts of the code to make it work. You should do this as an exercise to understand
    more about how the background task works.


    `UIBackgroundTaskIdentifier bgTaskId;`

    `// AVAudioPlayer *backgroundMusicPlayer`

    `if ([backgroundMusicPlayer play]) {`

    `  bgTaskId = [[UIApplication sharedApplication] beginBackgroundTaskWithExpirationHandler:NULL];`

    `}`


    `- (void)audioPlayerDidFinishPlaying:(AVAudioPlayer *)player successfully:(BOOL)success`

    `{`

    `    UIBackgroundTaskIdentifier newTaskId = UIBackgroundTaskInvalid;`


    `   if (self.haveMoreAudioToPlay) {`

    `        newTaskId = [[UIApplication sharedApplication] beginBackgroundTaskWithExpirationHandler:NULL];`

    `        [self playNextAudioFile];`

    `    }`


    `    if (bgTaskId != UIBackgroundTaskInvalid) {`

    `        [[UIApplication sharedApplication] endBackgroundTask: bgTaskId];`

    `    }`


    `    bgTaskId = newTaskId;`

    `}`


    As you can see in the code, by using background services you can register the
    delegate events; then inside that delegate method, you can simply play the next
    file. (Note that the total time your application can play audio is up to 10 minutes.)
    I hope this is a helpful demonstration of how to use background services efficiently.


    #### What to Notice when Running in Background


    The following is a small checklist from Apple to make sure that your application
    behaves and runs well in the background and doesn’t affect any other apps:


    *   Reduce your stored memory to the lowest level.

    *   Release all shared resources, such as Calendar.

    *   Respond properly to the application life cycle events.

    *   Don’t update your UI or call code that consumes CPU and battery excessively.

    *   Run in the background correctly.

    *   Respond to system changes in background.


    If your application can strictly follow these guidelines, it will run well and
    it will get the most out of the multitasking feature. It also won’t get killed
    in the background. Keeping your application alive in the background so it relaunches
    quickly is an important part of a good user experience.


    ##### Memory


    As mentioned, in iOS4, your application can run in background services and will
    still reside in the RAM while the application is in background. However, the RAM
    system has its limits and these are even worse in limitedenvironments like iOS,
    as you learned in [Chapter 7](#Chapter07.html#ch7). Therefore, Apple has a strict
    policy about the memory usage of an application when it is in background. Because
    there will be several apps residing in the background at the same time, these
    apps could eat a huge amount of memory quickly. When the device runs out of memory,
    iOS will find the application that consumed the most memory and kill that app
    first.


    To reduce your memory usage, you need to clear your caches in memory, especially
    image caches. You may also need to remove unnecessary subviews because these subviews
    also are saved into memory when your application goes into background. Actually,
    you need to save your critical data and clear out all unnecessary data to avoid
    your application being suspended by the iOS.


    ##### Shared Resources


    There are some applications that share data, such as the calendar database and
    the address book. If your application uses this resource while running, it has
    to stop while it enters the background. If your application is found to use or
    has not yet released these shared resources when the application enters the background,
    it is killed immediately. The reason is that all these shared resources belong
    to the foreground application.'
  trans: "\n### 后台执行\n\n后台执行是 iOS 开发人员的一项重要技术。这项技术自 iOS4 起推出，帮助开发者争取更多时间来完成关键任务，因此应用可以在一定程度上更好地控制其生命周期。\n\
    \n例如，假设你正在向服务器上传图片/视频。在上传过程中，用户突然退出应用，导致图片只上传了一半。下次用户回到应用时，她将不得不等待整个上传过程重新开始。另一种选择是强制用户等待图片上传完成后再关闭应用，但这并非良好的用户体验。\n\
    \n在另一种场景中，有一些来自服务器的重要帖子或下载任务需要确保完成。后台执行对于帮助开发者处理这些任务至关重要。你可以将上传过程封装在后台任务中，并启动该任务，具体如下：\n\
    \n```\nUIApplication* app = [UIApplication sharedApplication];\nUIBackgroundTaskIdentifier\
    \ bgTask = [app beginBackgroundTaskWithExpirationHandler:^{\n  [self.imageUploadService\
    \ uploadImage:image];\n  [app endBackgroundTask:bgTask];\n}];\n// 启动长时间运行的任务并立即返回。\n\
    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),\
    \ ^{\n  // 执行与该任务相关的工作。\n  [app endBackgroundTask:bgTask];\n});\n```\n\n如代码所示，要启动一个新的后台任务，你需要调用\
    \ `beginBackgroundTaskWithExpirationHandler:` 方法，该方法会返回一个后台任务标识符，你可以在之后使用它来结束该后台任务。通过\
    \ `beginBackgroundTaskWithExpirationHandler:` 方法，你告知 iOS，即使应用被移至后台状态，在应用被挂起之前，你希望这个任务能够完成。`endBackgroundTask:`\
    \ 方法则告知 iOS，你的应用任务已完成，使其能够在必要时将你的应用移至挂起状态。如果应用始终处于前台，那么这些调用不会产生任何效果，因此使用它们并无坏处。\n\
    \n你需要知道，后台任务并不能在后台无限期地运行；换句话说，应用必须在有限的时间（通常最多 10 分钟）内完成任务。否则，iOS 会不等任务完成就直接挂起应用。`beginBackgroundTaskWithExpirationHandler:`\
    \ 中的过期处理器部分是一个代码块（就像一个没有名称的方法），用于指定在任务超时时的清理代码。作为后台任务执行的代码不得进行任何 UI 更新或 OpenGL\
    \ 调用（因为应用已在屏幕之外）。\n\n你可以在代码的任何位置使用 `beginBackgroundTaskWithExpirationHandler:`\
    \ 方法来启动一个新的后台任务。我用它来封装图片上传过程，确保即使应用被用户立即关闭，上传过程也能成功完成。许多人还结合 `applicationDidEnterBackground:`\
    \ 方法来使用它，以便让应用运行更长时间，完成所有最终的计算或网络处理。\n\n如前所述，你也可以使用后台服务来播放音频。使用这项后台服务，你可以播放一个歌曲列表，而不仅仅是单首歌曲。你可以使用以下代码框架来实现这一点；请注意，你可能需要补充其他必要的代码部分才能使其正常工作。你可以将此作为一个练习，以更好地理解后台任务的工作方式。\n\
    \n```\nUIBackgroundTaskIdentifier bgTaskId;\n// AVAudioPlayer *backgroundMusicPlayer\n\
    if ([backgroundMusicPlayer play]) {\n  bgTaskId = [[UIApplication sharedApplication]\
    \ beginBackgroundTaskWithExpirationHandler:NULL];\n}\n\n- (void)audioPlayerDidFinishPlaying:(AVAudioPlayer\
    \ *)player successfully:(BOOL)success\n{\n    UIBackgroundTaskIdentifier newTaskId\
    \ = UIBackgroundTaskInvalid;\n\n   if (self.haveMoreAudioToPlay) {\n        newTaskId\
    \ = [[UIApplication sharedApplication] beginBackgroundTaskWithExpirationHandler:NULL];\n\
    \        [self playNextAudioFile];\n    }\n\n    if (bgTaskId != UIBackgroundTaskInvalid)\
    \ {\n        [[UIApplication sharedApplication] endBackgroundTask: bgTaskId];\n\
    \    }\n\n    bgTaskId = newTaskId;\n}\n```\n\n正如你在代码中看到的，通过使用后台服务，你可以注册委托事件；然后在那个委托方法内部，你可以简单地播放下一个文件。（请注意，你的应用播放音频的总时长最多为\
    \ 10 分钟。）我希望这能有效地演示如何高效地使用后台服务。\n\n### 在后台运行时的注意事项\n\n以下是 Apple 提供的一份简短清单，用于确保你的应用在后台能良好运行且不影响其他应用：\n\
    \n-   将已占用的内存降至最低水平。\n-   释放所有共享资源，例如日历。\n-   适当响应应用生命周期事件。\n-   不要更新你的 UI 或调用消耗\
    \ CPU 和电池过多的代码。\n-   正确地在后台运行。\n-   响应后台的系统变化。\n\n如果你的应用能够严格遵循这些指南，它将运行良好，并充分利用多任务处理特性。它也不会在后台被系统终止。在后台保持应用处于活跃状态以便快速重新启动，是良好用户体验的重要组成部分。\n\
    \n#### 内存\n\n如前所述，在 iOS4 中，你的应用可以在后台服务中运行，并且在应用处于后台时仍会驻留在 RAM 中。然而，RAM 系统有其限制，在像\
    \ iOS 这样资源有限的环境中，这些限制甚至更为严重，正如你在第 7 章中所了解到的。因此，Apple 对应用在后台时的内存使用有严格的政策。由于会有多个应用同时驻留在后台，这些应用可能会迅速消耗大量内存。当设备内存耗尽时，iOS\
    \ 会找出消耗内存最多的应用并首先将其终止。\n\n为了减少内存使用，你需要清除内存中的缓存，尤其是图片缓存。你可能还需要移除不必要的子视图，因为当你的应用进入后台时，这些子视图也会被保存到内存中。实际上，你需要保存关键数据并清除所有不必要的数据，以避免你的应用被\
    \ iOS 挂起。\n\n#### 共享资源\n\n有些应用程序会共享数据，例如日历数据库和通讯录。如果你的应用在运行时使用了这些资源，那么在它进入后台时就必须停止使用这些资源。如果系统发现你的应用在进入后台时正在使用或尚未释放这些共享资源，它会被立即终止。原因在于所有这些共享资源都属于前台应用。\n"
- fmt: "### Application Life Cycle Events\n\nAs mentioned, you are responsible for\
    \ handling and responding correctly to the application life cycle events. If you\
    \ don’t test to make sure that your life cycle is correct, you run the risk of\
    \ data loss or improper behavior. For example, you need to save your application\
    \ data before it goes to background and you need to pause the current flow when\
    \ the application moves to inactive state.\n\nYou can’t depend too much on the\
    \ memory storage in the background. Because the iOS can suspend your app whenever\
    \ the it runs out of memory, and you may not have a chance to react to that event,\
    \ you should always save all the necessary data before you go into background.\n\
    \nYou may have a little bit time to run in background, but the iOS can also stop\
    \ your background process whenever it runs out of memory or CPU cycles. So, in\
    \ the background process, you need to act fast and use multithreading if possible.\
    \ You are running against the iOS time.\n\nAt this point, when moving into the\
    \ background, the iOS will take a snapshot of your view. The purpose of this is\
    \ to briefly show that snapshot to the user while your view and data are loading,\
    \ which improves the user experience. However, you should hide sensitive information\
    \ that you don’t want to be captured as part of the screenshot, such as date of\
    \ birth, a password, or your user’s private photos.\n\n### User Interface Update\
    \ and Process in Background\n\nA general rule when your application is in background\
    \ is to avoid unnecessary processes. And UI update is one of those processes.\
    \ If you need extra time or extra CPU processing while in background, you may\
    \ need to explicitly request permission. Here is a short list of things that you\
    \ should address if your application is in background:\n\n*   Don’t make OpenGL\
    \ ES calls from your code.\n*   Cancel any Bonjour-related services.\n*   Handle\
    \ any connection or networking failures while your application is in background.\
    \ You can always resume these connections later when your application becomes\
    \ active again.\n*   Avoid updating windows and views. Users can’t see your views,\
    \ so there’s no reason to update them. Your application should not update windows\
    \ and views in background because this consume CPU cycles and may affect foreground\
    \ applications.\n*   Clean up any alerts or pop up messages before moving to background\
    \ to avoid confusing the user. You should dismiss your alerts and show them again\
    \ later if necessary.\n*   Do minimal work in background. Try your best to use\
    \ services provided by Apple, such as audio in background or monitoring significant\
    \ location changes.\n\n### System Changes Notification\n\nWhile your application\
    \ is in background, the system can experience many changes and it will notify\
    \ you of these, so you should be prepared for changes. These changes include device\
    \ orientation, time changes, battery changes, or locale changes while the application\
    \ is in background. [Table 8–2](#Chapter08.html#tab_8_2) shows a list of important\
    \ notifications.\n\n![image](images/t0802.jpg)\n\nYou will receive a queue of\
    \ notifications when your app resumes from background. You may need to quickly\
    \ deal with these notifications, especially the settings and locale changes, because\
    \ the user always want to see these changes happen immediately.\n\n## Dealing\
    \ with iOS Versions\n\nIt’s estimated that anywhere from 5 to 20% of devices are\
    \ still using iOS3, including iPad 1, old iPod, and iPhone devices. So how do\
    \ you make sure that nothing goes wrong with your application when it runs in\
    \ iOS3?\n\nYou need to store all data and user information in `applicationDidTerminate`\
    \ and correctly reinstruct all data in the method `application:didFinishLaunchingWithOptions:`.\
    \ Because in iOS4, the method `applicationWillTerminate:` is called only when\
    \ the application is terminated, you should be okay.\n\nYou won’t have support\
    \ for background executions, so you can’t rely on this mechanism to save the user’s\
    \ data. If you have any important data to save, upload, or download from server,\
    \ you can do it in either the termination or launching methods.\n\nIn old devices,\
    \ you can try to create the feeling of multitasking (or fast app switching) by\
    \ using an archiving approach. In this approach, you save all the view controllers’\
    \ states when the application closes and restore all of them when the application\
    \ relaunches. This is a complicated process and I don’t recommend you spend your\
    \ valuable time and effort on it.\n\nIf your application was previously released\
    \ for iOS3, you will need to support both iOS versions; otherwise, your users\
    \ might react poorly and give you one star rating in the Apple App Store. If your\
    \ application is newly released, you can go straight to iOS4 without worrying.\n\
    \n## Summary\n\nMultitasking is a new concept in iOS4. Most of the time, you will\
    \ need to keep track of your states and life cycles to make sure that your application\
    \ is responding correctly.\n\nYou can choose to remove the multitasking support\
    \ from your application by changing some properties in the `Info.plist` file.\
    \ You can also request special permissions for some background services by adding\
    \ `UIBackgroundModes` key into the `Info.plist` file.\n\nYou can request an extra\
    \ amount of time to process important calculations and services (up to 10 minutes).\
    \ You need to clean up all resources and cache data to reduce the memory footprint;\
    \ otherwise, iOS can kill your application in the background. This generally means\
    \ you lost all the benefits of a multitasking application.\n\n**EXERCISES**\n\n\
    1.  Write an application to play audio in the background.\n2.  Write an application\
    \ to monitor significant location changes of the user.\n3.  Write an application\
    \ to post data into a web service before your application moves to background.\
    \ You can put your code in `applicationDidEnterBackground:`.\n\n# Chapter 9\n\n\
    # Improve Performance with Native C/C++\n\nIn this chapter, you will learn about:\n\
    \n*   The benefits and costs to integrating C/C++ code into your iPhone application.\n\
    *   Basic concepts in C programming\n    *   Data types\n    *   Pointer\n   \
    \ *   Memory management\n*   Basic concepts in C++ programming\n    *   Class\n\
    \    *   Memory management\n    *   Inheritance\n    *   Template\n*   How to\
    \ work through a real example with SQLite, a database that has a C API.\n*   How\
    \ to integrate C++ and Objective-C++ into your iPhone application.\n\nIn this\
    \ chapter, you will learn about low-level programming with C/C++, which is important\
    \ for high performance applications. It's true that Objective-C is a superset\
    \ of C and also a native programming language, but Objective-C adds a wrapper\
    \ over the C language that reduces performance. If you have ever worked with games\
    \ and animations, you know that using OpenGL with C/C++ provides much better performance.\n\
    \nC++ is also supported by Apple. Most of your basic applications will not need\
    \ to touch any C/C++ code; however, when your application requires better performance,\
    \ you should consider this option. Moreover, you don't need to write lots of C/C++\
    \ code but you do need to understand C/C++ code to call the library correctly.\
    \ You may also need to modify open source libraries to fit your needs.\n\nBecause\
    \ Objective-C is a superset of C, everything you can do in C, you can do in Objective-C.\
    \ There are syntax differences and new concepts, but I'll cover them in this chapter.\
    \ C++ and Objective-C have many differing concepts as well, so it may be harder\
    \ for you to learn C++ than C.\n\nActually, the concept of Objective-C is limited,\
    \ and most of the classes and supports you see in the iPhone development environment\
    \ come from Cocoa Touch. For simplicity, I will use Objective-C as a symbol for\
    \ Objective-C and all the supports from Cocoa Touch Frameworks."
  raw: "##### Application Life Cycle Events\n\nAs mentioned, you are responsible for\
    \ handling and responding correctly to the application life cycle events. If you\
    \ don’t test to make sure that your life cycle is correct, you run the risk of\
    \ data loss or improper behavior. For example, you need to save your application\
    \ data before it goes to background and you need to pause the current flow when\
    \ the application moves to inactive state.\n\nYou can’t depend too much on the\
    \ memory storage in the background. Because the iOS can suspend your app whenever\
    \ the it runs out of memory, and you may not have a chance to react to that event,\
    \ you should always save all the necessary data before you go into background.\n\
    \nYou may have a little bit time to run in background, but the iOS can also stop\
    \ your background process whenever it runs out of memory or CPU cycles. So, in\
    \ the background process, you need to act fast and use multithreading if possible.\
    \ You are running against the iOS time.\n\nAt this point, when moving into the\
    \ background, the iOS will take a snapshot of your view. The purpose of this is\
    \ to briefly show that snapshot to the user while your view and data are loading,\
    \ which improves the user experience. However, you should hide sensitive information\
    \ that you don’t want to be captured as part of the screenshot, such as date of\
    \ birth, a password, or your user’s private photos.\n\n##### User Interface Update\
    \ and Process in Background\n\nA general rule when your application is in background\
    \ is to avoid unnecessary processes. And UI update is one of those processes.\
    \ If you need extra time or extra CPU processing while in background, you may\
    \ need to explicitly request permission. Here is a short list of things that you\
    \ should address if your application is in background:\n\n*   Don’t make OpenGL\
    \ ES calls from your code.\n*   Cancel any Bonjour-related services.\n*   Handle\
    \ any connection or networking failures while your application is in background.\
    \ You can always resume these connections later when your application becomes\
    \ active again.\n*   Avoid updating windows and views. Users can’t see your views,\
    \ so there’s no reason to update them. Your application should not update windows\
    \ and views in background because this consume CPU cycles and may affect foreground\
    \ applications.\n*   Clean up any alerts or pop up messages before moving to background\
    \ to avoid confusing the user. You should dismiss your alerts and show them again\
    \ later if necessary.\n*   Do minimal work in background. Try your best to use\
    \ services provided by Apple, such as audio in background or monitoring significant\
    \ location changes.\n\n#### System Changes Notification\n\nWhile your application\
    \ is in background, the system can experience many changes and it will notify\
    \ you of these, so you should be prepared for changes. These changes include device\
    \ orientation, time changes, battery changes, or locale changes while the application\
    \ is in background. [Table 8–2](#Chapter08.html#tab_8_2) shows a list of important\
    \ notifications.\n\n![image](images/t0802.jpg)\n\nYou will receive a queue of\
    \ notifications when your app resumes from background. You may need to quickly\
    \ deal with these notifications, especially the settings and locale changes, because\
    \ the user always want to see these changes happen immediately.\n\n### Dealing\
    \ with iOS Versions\n\nIt’s estimated that anywhere from 5 to 20% of devices are\
    \ still using iOS3, including iPad 1, old iPod, and iPhone devices. So how do\
    \ you make sure that nothing goes wrong with your application when it runs in\
    \ iOS3?\n\nYou need to store all data and user information in `applicationDidTerminate`\
    \ and correctly reinstruct all data in the method `application:didFinishLaunchingWithOptions:.`\
    \ Because in iOS4, the method `applicationWillTerminate:` is called only when\
    \ the application is terminated, you should be okay.\n\nYou won’t have support\
    \ for background executions, so you can’t rely on this mechanism to save the user’s\
    \ data. If you have any important data to save, upload, or download from server,\
    \ you can do it in either the termination or launching methods.\n\nIn old devices,\
    \ you can try to create the feeling of multitasking (or fast app switching) by\
    \ using an archiving approach. In this approach, you save all the view controllers’\
    \ states when the application closes and restore all of them when the application\
    \ relaunches. This is a complicated process and I don’t recommend you spend your\
    \ valuable time and effort on it.\n\nIf your application was previously released\
    \ for iOS3, you will need to support both iOS versions; otherwise, your users\
    \ might react poorly and give you one star rating in the Apple App Store. If your\
    \ application is newly released, you can go straight to iOS4 without worrying.\n\
    \n### Summary\n\nMultitasking is a new concept in iOS4\\. Most of the time, you\
    \ will need to keep track of your states and life cycles to make sure that your\
    \ application is responding correctly.\n\nYou can choose to remove the multitasking\
    \ support from your application by changing some properties in the `Info.plist`\
    \ file. You can also request special permissions for some background services\
    \ by adding `UIBackgroundModes` key into the `Info.plist` file.\n\nYou can request\
    \ an extra amount of time to process important calculations and services (up to\
    \ 10 minutes). You need to clean up all resources and cache data to reduce the\
    \ memory footprint; otherwise, iOS can kill your application in the background.\
    \ This generally means you lost all the benefits of a multitasking application.\n\
    \n**EXERCISES**\n\n1.  Write an application to play audio in the background.\n\
    2.  Write an application to monitor significant location changes of the user.\n\
    3.  Write an application to post data into a web service before your application\
    \ moves to background. You can put your code in `applicationDidEnterBackground.`\n\
    \n## Chapter 9\n\n## Improve Performance with Native C/C++\n\nIn this chapter,\
    \ you will learn about:\n\n*   The benefits and costs to integrating C/C++ code\
    \ into your iPhone application.\n*   Basic concepts in C programming\n    *  \
    \ Data types\n    *   Pointer\n    *   Memory management\n*   Basic concepts in\
    \ C++ programming\n    *   Class\n    *   Memory management\n    *   Inheritance\n\
    \    *   Template\n*   How to work through a real example with SQLite, a database\
    \ that has a C API.\n*   How to integrate C++ and Objective-C++ into your iPhone\
    \ application.\n\nIn this chapter, you will learn about low-level programming\
    \ with C/C++, which is important for high performance applications. It's true\
    \ that Objective-C is a superset of C and also a native programming language,\
    \ but Objective-C adds a wrapper over the C language that reduces performance.\
    \ If you have ever worked with games and animations, you know that using OpenGL\
    \ with C/C++ provides much better performance.\n\nC++ is also supported by Apple.\
    \ Most of your basic applications will not need to touch any C/C++ code; however,\
    \ when your application requires better performance, you should consider this\
    \ option. Moreover, you don't need to write lots of C/C++ code but you do need\
    \ to understand C/C++ code to call the library correctly. You may also need to\
    \ modify open source libraries to fit your needs.\n\nBecause Objective-C is a\
    \ superset of C, everything you can do in C, you can do in Objective-C. There\
    \ are syntax differences and new concepts, but I'll cover them in this chapter.\
    \ C++ and Objective-C have many differing concepts as well, so it may be harder\
    \ for you to learn C++ than C.\n\nActually, the concept of Objective-C is limited,\
    \ and most of the classes and supports you see in the iPhone development environment\
    \ come from Cocoa Touch. For simplicity, I will use Objective-C as a symbol for\
    \ Objective-C and all the supports from Cocoa Touch Frameworks."
  trans: "\n### 应用程序生命周期事件\n\n如前所述，你需要负责正确处理和响应应用程序的生命周期事件。如果你不进行测试以确保生命周期正确无误，就可能面临数据丢失或行为异常的风险。例如，你需要在应用程序进入后台前保存数据，并在应用切换到非活跃状态时暂停当前流程。\n\
    \n你不能过分依赖后台的内存存储。因为当 iOS 内存不足时，它可以随时挂起你的应用，而你可能没有机会对此事件做出反应，所以在进入后台之前，你应当始终保存所有必要的数据。\n\
    \n你或许只有很少的时间在后台运行，但 iOS 同样可以在内存或 CPU 周期耗尽时随时终止你的后台进程。因此，在后台进程中，你需要快速行动，并在可能的情况下使用多线程。你是在与\
    \ iOS 的时间限制赛跑。\n\n此时，当应用进入后台时，iOS 会为你的视图拍摄一张快照。这样做的目的是在视图和数据加载期间，向用户短暂显示这张快照，从而提升用户体验。但是，你应该隐藏那些不想被截取到屏幕快照中的敏感信息，例如出生日期、密码或用户的私人照片。\n\
    \n### 后台的用户界面更新与进程\n\n当应用程序处于后台时，一条通用规则是避免不必要的进程，而 UI 更新就是其中之一。如果你在后台需要额外的时间或更多的\
    \ CPU 处理能力，你可能需要明确请求权限。以下是一份简要清单，如果你的应用处于后台，应当处理这些事项：\n\n*   不要在你的代码中调用 OpenGL\
    \ ES。\n*   取消所有与 Bonjour 相关的服务。\n*   处理应用程序后台运行时出现的任何连接或网络故障。你可以稍后在应用重新变为活跃状态时恢复这些连接。\n\
    *   避免更新窗口和视图。用户无法看到你的视图，因此没有理由更新它们。你的应用程序不应在后台更新窗口和视图，因为这会消耗 CPU 周期，并可能影响前台应用。\n\
    *   在进入后台前清理所有警告或弹出消息，以免造成用户困惑。你应该关闭这些警告，并在必要时稍后再次显示它们。\n*   在后台执行最小化的工作。尽量使用\
    \ Apple 提供的服务，例如后台音频或监控重要的位置变化。\n\n### 系统变更通知\n\n当你的应用程序处于后台时，系统可能会经历许多变化，并且会通知你这些变化，因此你应该为此做好准备。这些变化包括设备方向、时间、电池电量或系统区域设置的变更。表\
    \ 8–2 列出了重要的通知。\n\n![图片](img/t0802.jpg)\n\n当你的应用从后台恢复时，你会收到一个通知队列。你可能需要快速处理这些通知，尤其是设置和区域设置的变更，因为用户总是希望这些变化能立即生效。\n\
    \n## 处理不同 iOS 版本\n\n据估计，大约有 5% 到 20% 的设备仍在使用 iOS3，包括 iPad 1、旧款 iPod 和 iPhone 设备。那么，如何确保你的应用在\
    \ iOS3 上运行时不出问题呢？\n\n你需要在 `applicationDidTerminate` 中存储所有数据和用户信息，并在 `application:didFinishLaunchingWithOptions:`\
    \ 方法中正确地重新构建所有数据。因为在 iOS4 中，`applicationWillTerminate:` 方法仅在应用程序被终止时调用，所以你这样做是没问题的。\n\
    \n旧系统不支持后台执行，因此你不能依赖这种机制来保存用户数据。如果你有任何重要的数据需要保存、上传或从服务器下载，你可以在终止方法或启动方法中完成这些操作。\n\
    \n在旧设备上，你可以尝试通过归档方法创造出多任务（或快速应用切换）的体验。在这种方法中，你在应用程序关闭时保存所有视图控制器的状态，并在应用重新启动时恢复它们。这是一个复杂的过程，我不建议你花费宝贵的时间和精力在上面。\n\
    \n如果你的应用程序之前是为 iOS3 发布的，那么你需要支持这两个 iOS 版本；否则，你的用户可能会反应不佳，并在 Apple App Store 中给你一星评价。如果你的应用是全新发布的，你可以直接针对\
    \ iOS4 开发，无需顾虑。\n\n## 总结\n\n多任务是 iOS4 中的一个新概念。大多数情况下，你需要跟踪应用的状态和生命周期，以确保你的应用程序响应正确。\n\
    \n你可以通过修改 `Info.plist` 文件中的某些属性，选择从应用程序中移除多任务支持。你也可以通过在 `Info.plist` 文件中添加 `UIBackgroundModes`\
    \ 键，来为某些后台服务请求特殊权限。\n\n你可以请求额外的时间来处理重要的计算和服务（最多 10 分钟）。你需要清理所有资源和缓存数据以减少内存占用；否则，iOS\
    \ 可能会在后台终止你的应用程序。这通常意味着你失去了多任务应用的全部优势。\n\n**练习**\n\n1.  编写一个在后台播放音频的应用程序。\n2.\
    \  编写一个监控用户重要位置变化的应用程序。\n3.  编写一个在应用程序进入后台前将数据发布到网络服务的应用程序。你可以将代码放在 `applicationDidEnterBackground:`\
    \ 中。\n\n# 第 9 章\n\n# 使用原生 C/C++ 提升性能\n\n在本章中，你将学习：\n\n*   将 C/C++ 代码集成到你的 iPhone\
    \ 应用程序中的好处和代价。\n*   C 语言编程的基本概念\n    *   数据类型\n    *   指针\n    *   内存管理\n*   C++\
    \ 编程的基本概念\n    *   类\n    *   内存管理\n    *   继承\n    *   模板\n*   如何通过一个使用具有 C API\
    \ 的数据库 SQLite 的真实示例进行实践。\n*   如何将 C++ 和 Objective-C++ 集成到你的 iPhone 应用程序中。\n\n\
    在本章中，你将学习使用 C/C++ 进行底层编程，这对于高性能应用程序至关重要。确实，Objective-C 是 C 的超集，也是一种原生编程语言，但 Objective-C\
    \ 在 C 语言之上添加了一层封装，这降低了性能。如果你曾接触过游戏和动画，你就会知道使用 OpenGL 配合 C/C++ 能提供更好的性能。\n\nApple\
    \ 也支持 C++。你大部分的基础应用程序都不需要接触任何 C/C++ 代码；但是，当你的应用需要更高性能时，你应该考虑这个选项。此外，你不需要编写大量的\
    \ C/C++ 代码，但你需要理解 C/C++ 代码才能正确调用库。你可能还需要修改开源库以满足自己的需求。\n\n由于 Objective-C 是 C 的超集，在\
    \ C 中能做的一切，在 Objective-C 中也能做到。两者存在语法差异和新概念，但我将在本章中介绍它们。C++ 和 Objective-C 也有很多不同的概念，因此学习\
    \ C++ 可能比学习 C 更难。\n\n实际上，Objective-C 的概念是有限的，你在 iPhone 开发环境中看到的大部分类和框架支持都来自 Cocoa\
    \ Touch。为简单起见，我将使用 Objective-C 作为 Objective-C 及来自 Cocoa Touch 框架的所有支持的统称。\n"
- fmt: "### Benefits and Costs\n\nBefore going into the ideas of C/C++ programming,\
    \ I want to quickly analyze the benefits and costs of using C/C++ code inside\
    \ your iOS application.\n\nBenefits:\n\n- There are specialized libraries written\
    \ in C/C++ such as animation or sound libraries. These libraries are usually written\
    \ in C/C++ for high performance and portability.\n- Your application can be ported\
    \ to Android without much effort.\n- You may improve application performance by\
    \ using C/C++ code.\n\nCost:\n\n- C/C++ has a different syntax than Objective-C,\
    \ and mixing them up makes the code harder to understand.\n- C/C++ has a different\
    \ memory management mechanism than Objective-C, so you need to be careful about\
    \ memory leaks or application crashes.\n\nSo, knowing both benefits and costs,\
    \ you can make the decision if you want to integrate C/C++ into your iPhone application\
    \ or not. Even if you are using another open source library or write your own\
    \ code, you should understand C/C++ before doing so. Many of the problems that\
    \ arise can be so subtle that iPhone instruments can't help you much. It's easy\
    \ to spend an hour integrating a library—and then spend the whole day fixing a\
    \ bug inside.\n\nObjective-C is already a native programming language, so you\
    \ may not get much better performance if you try to write all code in C/C++. However,\
    \ there are many high performance libraries written in C/C++ that you can take\
    \ advantage of and integrate into your application.\n\n### Basic C and C++ programming\n\
    \nI will guide you through some simple lessons in C/C++ to give you a good basic\
    \ understanding of the language. Objective-C and C/C++ have many things in common,\
    \ so you may not need to learn many new concepts in this chapter. Knowing C/C++\
    \ also helps you to write better Objective-C code because Objective-C is a superset\
    \ of C.\n\n#### C Programming\n\nC++ is also a superset of C so you will learn\
    \ how to use C first and then learn about C++ in the next section. I will only\
    \ discuss the parts in C programming that are not commonly used in iPhone programming.\n\
    \n##### Basic Data Types and Functions\n\nC has very few data types: integer,\
    \ floating point, double precision floating point, and characters. The number\
    \ of bits used for each data type is different in every operating system, even\
    \ in the iOS family. The following is a sample of range value for each data type,\
    \ but you should not depend too much on this information to make important decisions:\n\
    \n- `char`: -128 to 127\n- `integer`: -32768 to +32767\n- `float`: 3.4 e-38 to\
    \ 3.4 e+38\n- `double`: 1.7 e-308 to 1.7 e+308\n\nThere are a number of qualifiers\
    \ that can be applied to these basic types; for example, `short` and `long` are\
    \ applied to `integer`.\n\n```\nshort int sh;\nlong int counterLong;\n```\n\n\
    The intent of these qualifiers is to provide a shorter or longer value range for\
    \ `integer`; for example `short` can be 16 bits and `long` can be 32 bits. The\
    \ iOS compiler guarantees that `short` is not longer than `int`, which is not\
    \ longer than `long`.\n\nYou can also apply `signed` and `unsigned` qualifiers.\
    \ If you don't specify any `signed` or `unsigned` qualifiers, the compiler will\
    \ default to `signed`. Using `unsigned` qualifier will let you have a double data\
    \ range. For example, `integer` can have from 0 to 65535.\n\nUsually you just\
    \ need to use `integer`. If you need to store a really big `integer`, add the\
    \ `long` quantifier. Using `short` over `int` is such a small memory optimization\
    \ that you can just skip it.\n\n**Note:** if you use Objective-C, you should use\
    \ `NSInteger`, `NSUInteger`, and `CGFloat`. These are built-in wrappers of Apple\
    \ to encapsulate the real underlying data structure.\n\nC does not have a Boolean\
    \ data type, but Objective-C does. In C, if a Boolean statement returns true,\
    \ the value is 1; otherwise, it is 0\\. For example `2 == 2` will return 1, while\
    \ `2 == 3` will return 0\\. To have readable code, you may need to define two\
    \ Boolean values, like so:\n\n```\n#define TRUE 1\n#define FALSE 0\nint t = (1\
    \ == 1);\nif (t == TRUE) {\n   // do your work here\n}\n```\n\nAlthough C functions\
    \ look different from Objective-C methods, you still need to return value and\
    \ accept parameters. Here are two examples of functions in C:\n\n```\nint pi_value()\
    \ {\n   return 3.14;\n}\n\nint add_number(int n1, int n2) {\n   return n1 + n2;\n\
    }\n```\n\n##### Pointer\n\nPointers are an important concept in C programming.\
    \ In Objective-C, you usually see the same pointer concept and syntax in Objective-C,\
    \ for instance `NSMutableArray *myArray = [NSMutableArray array]`. However, you\
    \ don't usually need to work at a low level with memory so the pointer concept\
    \ in Objective-C is easy to understand as an object. However, you can do more\
    \ with C, and the concept of pointers is more complicated.\n\n**Memory Pointing\
    \ Concepts**\n\nMain memory can be viewed as an array of cells, each cell as a\
    \ byte, and every data item is stored inside a group of cells. A `char` is stored\
    \ in one cell, an `integer` can be stored in two cells, and `long` can be stored\
    \ in four cells. Each cell can be numbered so every variable will have a memory\
    \ address to store data.\n\n![images](images/0901.jpg)\n\n**Figure 9–1.** *Memory\
    \ pointer concept*\n\nA pointer is a variable that can hold the memory address\
    \ of another variable. For example, data inside variable `p` in Figure 9–1 stores\
    \ the memory address of variable `c`. So if `p` is said to point to `c`, you can\
    \ represent it with the statement `p = &c;`. The `&` operator returns the memory\
    \ address of `c` and assign that to `p`. The `&` operator only applies to variables,\
    \ arrays, and objects in memory, not expression or constants. Another pointer\
    \ operator is `*`; when it applies to a pointer, the pointer operator returns\
    \ the contents of the memory at the given address. This process is commonly called\
    \ de-referencing. Here is some source code to show how this works:\n\n```\nint\
    \ x = 1, y = 2, a[3];\nint *ip; // ip is a pointer that can only point to integer\n\
    \nip = &x; // ip now points to x\ny = *ip; // y is now 1, because you return the\
    \ data pointed by ip\n*ip = 0; // x is now 0, I set the data pointed by p to be\
    \ 0\nip = &a[0]; // ip now points to the first element of array a\n```\n\n**Pass\
    \ by Value and Pass by Reference**\n\nIn C programming, you can pass arguments\
    \ to functions by value or by reference. By value is the normal way you pass arguments\
    \ into functions.\n\n```\nint add(int t1, int t2) {\n  return t1 + t2;\n}\n```\n\
    \nHowever, pass by value will not work if you want to swap the value between two\
    \ variables in the following `swap` function:\n\n```\nvoid swap(int x, int y)\
    \ {\n   int temp;\n   temp = x;\n   x = y;\n   y = temp;\n}\n\nint main() {\n\
    \  int x = 3, y = 4;\n  swap (x, y);\n}\n```\n\nThe problem is that after the\
    \ method returns, the value inside the variable will not be swapped. When the\
    \ method `swap` is called, the values inside `x` and `y` are copied and passed\
    \ into the function as `swap (3, 4)`. Thus, the original variable does not change.\n\
    \nIf you want to change the data stored inside the variables `x` and `y`, you\
    \ need to pass by reference. With passing by reference, the memory address of\
    \ `x` and `y` are passed in. Having the memory address of `x` and `y`, you can\
    \ simply change the value stored inside these addresses.\n\n```\nvoid swap(int\
    \ *px, int *py) {\n  int temp;\n  temp = *px; // temporarily store the value inside\
    \ the memory of x\n  *px = *py; // set the value inside the memory of x.\n  *py\
    \ = temp; // set the value inside the memory of y.\n}\n\nint main() {\n  int x\
    \ = 3, y = 4;\n  swap (&x, &y);\n}\n```\n\nFigure 9–2 gives you a better understanding\
    \ of the process.\n\n![images](images/0902.jpg)\n\n**Figure 9–2.** *Pass by reference*"
  raw: '### Benefits and Costs


    Before going into the ideas of C/C++ programming, I want to quickly analyze the
    benefits and costs of using C/C++ code inside your iOS application.


    Benefits:


    *   There are specialized libraries written in C/C++ such as animation or sound
    libraries. These libraries are usually written in C/C++ for high performance and
    portability.

    *   Your application can be ported to Android without much effort.

    *   You may improve application performance by using C/C++ code.


    Cost:


    *   C/C++ has a different syntax than Objective-C, and mixing them up makes the
    code harder to understand.

    *   C/C++ has a different memory management mechanism than Objective-C, so you
    need to be careful about memory leaks or application crashes.


    So, knowing both benefits and costs, you can make the decision if you want to
    integrate C/C++ into your iPhone application or not. Even if you are using another
    open source library or write your own code, you should understand C/C++ before
    doing so. Many of the problems that arise can be so subtle that iPhone instruments
    can''t help you much. It''s easy to spend an hour integrating a library—and then
    spend the whole day fixing a bug inside.


    Objective-C is already a native programming language, so you may not get much
    better performance if you try to write all code in C/C++. However, there are many
    high performance libraries written in C/C++ that you can take advantage of and
    integrate into your application.


    ### Basic C and C++ programming


    I will guide you through some simple lessons in C/C++ to give you a good basic
    understanding of the language. Objective-C and C/C++ have many things in common,
    so you may not need to learn many new concepts in this chapter. Knowing C/C++
    also helps you to write better Objective-C code because Objective-C is a superset
    of C.


    #### C Programming


    C++ is also a superset of C so you will learn how to use C first and then learn
    about C++ in the next section. I will only discuss the parts in C programming
    that are not commonly used in iPhone programming.


    ##### Basic Data Types and Functions


    C has very few data types: integer, floating point, double precision floating
    point, and characters. The number of bits used for each data type is different
    in every operating system, even in the iOS family. The following is a sample of
    range value for each data type, but you should not depend too much on this information
    to make important decisions:


    *   `char:` -128 to 127

    *   `integer`: -32768 to +32767

    *   `float`: 3.4 e-38 to 3.4 e+38

    *   `double`: 1.7 e-308 to 1.7 e+308


    There are a number of qualifiers that can be applied to these basic types; for
    example, short and long are applied to integer.


    `short int sh;`

    `long int counterLong;`


    The intent of these qualifiers is to provide a shorter or longer value range for
    `integer`; for example `short` can be 16 bits and `long` can be 32 bits. The iOS
    compiler guarantees that `short` is not longer than `int`, which is not longer
    than `long`.


    You can also apply `signed` and `unsigned` qualifiers. If you don''t specify any
    `signed` or `unsigned` qualifiers, the compiler will default to `signed.` Using
    `unsigned` qualifier will let you have a double data range. For example, `integer`
    can have from 0 to 65535.


    Usually you just need to use `integer`. If you need to store a really big `integer`,
    add the `long` quantifier. Using `short` over `int` is such a small memory optimization
    that you can just skip it.


    **NOTE:** if you use Objective-C, you should use NSInteger, NSUInteger, and CGFloat.
    These are built-in wrappers of Apple to encapsulate the real underlying data structure.


    C does not have a Boolean data type, but Objective-C does. In C, if a Boolean
    statement returns true, the value is 1; otherwise, it is 0\. For example 2 ==
    2 will return 1, while 2 == 3 will return 0\. To have readable code, you may need
    to define two Boolean values, like so:


    `#define TRUE 1`

    `#define FALSE 0`

    `int t = (1 == 1);`

    `if (t == TRUE) {`

    `   // do your work here`

    `}`


    Although C functions look different from Objective-C methods, you still need to
    return value and accept parameters. Here are two examples of functions in C:


    `int pi_value() {`

    `   return 3.14;`

    `}`


    `int add_number(int n1, int n2) {`

    `   return n1 + n2;`

    `}`


    ##### Pointer


    Pointers are an important concept in C programming. In Objective-C, you usually
    see the same pointer concept and syntax in Objective-C, for instance `NSMutableArray
    *myArray = [NSMutableArray array]`. However, you don''t usually need to work at
    a low level with memory so the pointer concept in Objective-C is easy to understand
    as an object. However, you can do more with C, and the concept of pointers is
    more complicated.


    Memory Pointing Concepts


    Main memory can be viewed as an array of cells, each cell as a byte, and every
    data item is stored inside a group of cells. A char is stored in one cell, an
    integer can be stored in two cells, and long can be stored in four cells. Each
    cell can be numbered so every variable will have a memory address to store data.


    ![images](images/0901.jpg)


    **Figure 9–1.** *Memory pointer concept*


    A pointer is a variable that can hold the memory address of another variable.
    For example, data inside variable `p` in [Figure 9–1](#Chapter09.html#fig_9_1)
    stores the memory address of variable `c`. So if `p` is said to point to c, you
    can represent it with the statement `p = &c;.` The `&` operator returns the memory
    address of `c` and assign that to `p`. The `&` operator only applies to variables,
    arrays, and objects in memory, not expression or constants. Another pointer operator
    is `*;` when it applies to a pointer, the pointer operator returns the contents
    of the memory at the given address. This process is commonly called de-referencing.
    Here is some source code to show how this works:


    `int x = 1, y = 2, a[3];`

    `int *ip; // ip is a pointer that can only point to integer`


    `ip = &x; // ip now points to x`

    `y = *ip; // y is now 1, because you return the data pointed by ip`

    `*ip = 0; // x is now 0, I set the data pointed by p to be 0`

    `ip = &a[0]; // ip now points to the first element of array a`


    Pass by Value and pass by Reference


    In C programming, you can pass arguments to functions by value or by reference.
    By value is the normal way you pass arguments into functions.


    `int add(int t1, int t2) {`

    `  return t1 + t2;`

    `}`


    However, pass by value will not work if you want to swap the value between two
    variables in the following swap function:


    `void swap(int x, int y) {`

    `   int temp;`

    `   temp = x;`

    `   x = y;`

    `   y = temp;`

    `}`


    `int main() {`

    `  int x = 3, y = 4;`

    `  swap (x, y);`

    `}`


    The problem is that after the method returns, the value inside the variable will
    not be swapped. When the method `swap` is called, the values inside `x` and `y`
    are copied and passed into the function as `swap (3, 4).` Thus, the original variable
    does not change.


    If you want to change the data stored inside the variables `x` and `y`, you need
    to pass by reference. With passing by reference, the memory address of `x` and
    `y` are passed in. Having the memory address of `x` and `y`, you can simply change
    the value stored inside these addresses.


    `void swap(int *px, int *py) {`

    `  int temp;`

    `  temp = *px; // temporarily store the value inside the memory of x`

    `  *px = *py; // set the value inside the memory of x.`

    `  *py = temp; // set the value inside the memory of y.`

    `}`


    `int main() {`

    `  int x = 3, y = 4;`

    `  swap (&x, &y);`

    `}`


    [Figure 9–2](#Chapter09.html#fig_9_2) gives you a better understanding of the
    process.


    ![images](images/0902.jpg)


    **Figure 9–2.** *Pass by reference*'
  trans: "\n### 收益与成本\n\n在深入探讨 C/C++编程的思想之前，我想快速分析一下在 iOS 应用中使用 C/C++代码的收益与成本。\n\n\
    收益：\n\n-   C/C++编写了一些专用库，例如动画库或音频库。这些库通常使用 C/C++编写，以实现高性能和可移植性。\n-   你的应用程序可以相对轻松地移植到\
    \ Android 平台。\n-   通过使用 C/C++代码，你可能会提升应用的性能。\n\n成本：\n\n-   C/C++的语法与 Objective-C\
    \ 不同，将它们混合使用会使代码更难理解。\n-   C/C++的内存管理机制与 Objective-C 不同，因此你需要小心内存泄漏或应用崩溃的问题。\n\
    \n因此，在了解了收益与成本之后，你就可以决定是否要将 C/C++集成到你的 iPhone 应用中。即使你只是使用另一个开源库或编写自己的代码，你也应该先理解\
    \ C/C++。许多出现的问题可能非常隐蔽，以至于 iPhone 的检测工具也难以帮上大忙。花一个小时集成一个库很容易——但随后可能要花一整天来修复其中的一个\
    \ bug。\n\nObjective-C 已经是一种原生编程语言，所以如果你试图用 C/C++编写所有代码，可能不会获得显著的性能提升。然而，有许多用 C/C++编写的高性能库，你可以充分利用并将其集成到你的应用中。\n\
    \n### 基础 C 和 C++编程\n\n我将通过一些 C/C++的基础课程来引导你，让你对这门语言有一个扎实的基本理解。Objective-C 与 C/C++有许多共同之处，因此你在本章中可能不需要学习太多新概念。了解\
    \ C/C++也能帮助你写出更好的 Objective-C 代码，因为 Objective-C 是 C 的超集。\n\n#### C 编程\n\nC++也是\
    \ C 的超集，因此你将先学习如何使用 C，然后在下一节中学习 C++。我仅讨论 C 编程中那些在 iPhone 编程中不常用的部分。\n\n##### 基本数据类型与函数\n\
    \nC 的数据类型非常少：整型、浮点型、双精度浮点型以及字符型。每种数据类型使用的位数在不同操作系统中是不同的，甚至在 iOS 系列中也是如此。以下是每种数据类型取值范围的一个示例，但你不应过分依赖这些信息来做重要决策：\n\
    \n-   `char`：-128 到 127\n-   `int`：-32768 到 +32767\n-   `float`：3.4e-38 到 3.4e+38\n\
    -   `double`：1.7e-308 到 1.7e+308\n\n有一些限定符可以应用于这些基本类型；例如，`short`和`long`可以应用于`int`。\n\
    \n```\nshort int sh;\nlong int counterLong;\n```\n\n这些限定符的目的是为`int`提供更短或更长的取值范围；例如，`short`可以是\
    \ 16 位，而`long`可以是 32 位。iOS 编译器保证`short`不会长于`int`，而`int`不会长于`long`。\n\n你还可以应用`signed`和`unsigned`限定符。如果你未指定任何`signed`或`unsigned`限定符，编译器将默认使用`signed`。使用`unsigned`限定符可以让你拥有双倍的数据范围。例如，`int`的取值范围可以是\
    \ 0 到 65535。\n\n通常你只需要使用`int`。如果你需要存储一个非常大的整数，请添加`long`限定符。使用`short`代替`int`是一种非常微小的内存优化，你完全可以忽略它。\n\
    \n**注意：**如果你使用 Objective-C，应该使用`NSInteger`、`NSUInteger`和`CGFloat`。这些是苹果公司提供的内置包装器，用于封装实际底层数据结构。\n\
    \nC 语言没有布尔数据类型，但 Objective-C 有。在 C 语言中，如果布尔表达式返回真，则值为 1；否则为 0。例如，`2 == 2`会返回 1，而`2\
    \ == 3`会返回 0。为了代码可读性，你可能需要定义两个布尔值，如下所示：\n\n```\n#define TRUE 1\n#define FALSE\
    \ 0\nint t = (1 == 1);\nif (t == TRUE) {\n   // 在这里执行你的工作\n}\n```\n\n尽管 C 函数看起来与\
    \ Objective-C 方法不同，但你仍然需要返回值并接受参数。以下是两个 C 函数的示例：\n\n```\nint pi_value() {\n  \
    \ return 3.14;\n}\n\nint add_number(int n1, int n2) {\n   return n1 + n2;\n}\n\
    ```\n\n##### 指针\n\n指针是 C 编程中的一个重要概念。在 Objective-C 中，你通常会在其中看到相同的指针概念和语法，例如`NSMutableArray\
    \ *myArray = [NSMutableArray array]`。然而，你通常不需要在底层处理内存，因此 Objective-C 中的指针概念作为对象来理解很容易。但在\
    \ C 语言中，你可以做更多的事情，指针的概念也更复杂。\n\n**内存指向概念**\n\n主内存可以被视为一个由单元格组成的数组，每个单元格是一个字节，每个数据项都存储在一组单元格内。一个`char`存储在一个单元格中，一个`int`可以存储在两个单元格中，而`long`可以存储在四个单元格中。每个单元格都可以编号，因此每个变量都会有一个存储数据的内存地址。\n\
    \n![图片](img/0901.jpg)\n\n**图 9-1.** *内存指针概念*\n\n指针是一个变量，它可以保存另一个变量的内存地址。例如，图 9-1\
    \ 中变量`p`内部的数据存储了变量`c`的内存地址。因此，如果说`p`指向`c`，你可以用语句`p = &c;`来表示。`&`运算符返回`c`的内存地址并将其赋值给`p`。`&`运算符仅适用于变量、数组和内存中的对象，不适用于表达式或常量。另一个指针运算符是`*`；当它应用于指针时，该运算符返回给定地址处的内存内容。这个过程通常被称为解引用。以下是一些展示其工作原理的源码：\n\
    \n```\nint x = 1, y = 2, a[3];\nint *ip; // ip 是一个只能指向整型的指针\n\nip = &x; // ip\
    \ 现在指向 x\ny = *ip; // y 现在是 1，因为你返回了 ip 指向的数据\n*ip = 0; // x 现在是 0，我将 p 指向的数据设置为\
    \ 0\nip = &a[0]; // ip 现在指向数组 a 的第一个元素\n```\n\n**传值与传引用**\n\n在 C 编程中，你可以通过值或引用将参数传递给函数。传值是向函数传递参数的常规方式。\n\
    \n```\nint add(int t1, int t2) {\n  return t1 + t2;\n}\n```\n\n然而，如果你想在下面的`swap`函数中交换两个变量的值，传值将不起作用：\n\
    \n```\nvoid swap(int x, int y) {\n   int temp;\n   temp = x;\n   x = y;\n   y\
    \ = temp;\n}\n\nint main() {\n  int x = 3, y = 4;\n  swap (x, y);\n}\n```\n\n\
    问题在于，方法返回后，变量内部的值不会被交换。当调用`swap`方法时，`x`和`y`内部的值被复制并作为`swap(3, 4)`传入函数。因此，原始变量不会改变。\n\
    \n如果你想改变存储在变量`x`和`y`中的数据，你需要通过引用传递。通过引用传递时，传入的是`x`和`y`的内存地址。有了`x`和`y`的内存地址，你就可以简单地更改存储在这些地址中的值。\n\
    \n```\nvoid swap(int *px, int *py) {\n  int temp;\n  temp = *px; // 临时存储 x 内存中的值\n\
    \  *px = *py; // 设置 x 内存中的值\n  *py = temp; // 设置 y 内存中的值\n}\n\nint main() {\n\
    \  int x = 3, y = 4;\n  swap (&x, &y);\n}\n```\n\n图 9-2 能让你更好地理解这个过程。\n\n![图片](img/0902.jpg)\n\
    \n**图 9-2.** *传引用*\n"
- fmt: "# Advanced Data Types\n\nThere are some advanced data structures in C: `array`,\
    \ `string`, and `struct`. These all are supported in Objective-C but you should\
    \ use them sparingly because they make the code harder to understand and maintain\
    \ in future. All these data structures in Objective-C have corresponding wrappers\
    \ to make the code more object-oriented. However, in many cases you still need\
    \ to use C data structures to improve performance or process the result from calling\
    \ C/C++ libraries.\n\n## Array\n\nIn Objective-C, you will usually use an `NSArray`\
    \ or `NSMutableArray` object to represent an array. However, in C, you don't have\
    \ those concepts, so you focus entirely on the primitive array concept. To define\
    \ an array in C, you need to know the length of the array ahead of time and define\
    \ it like this:\n\n```\nint a [10]; // an array with maximum ten elements\n```\n\
    \n`a[0]`, `a[1]`, `a[2]` … `a[9]` is the first, second … tenth elements of the\
    \ array\n\nPointer has a close relationship with array.\n\n```\nint *pa;\npa =\
    \ &a[0];\n```\n\nThis pointer assignment code will set `pa` to point to the first\
    \ element of the array. As explained in the pointer part, the assignment `x =\
    \ *pa` will set `x` to the value contained inside the `a[0]`.\n\nYou can move\
    \ the pointer to different elements inside the array by using simple arithmetic\
    \ operators: `(pa + 1)` will return the address of the next element and `(pa -\
    \ 1)` will return the address of the previous element. [Figure 9–3](#Chapter09.html#fig_9_3)\
    \ demonstrates the pointer arithmetic inside the array.\n\n![images](images/0903.jpg)\n\
    \n**Figure 9–3.** *Pointer arithmetic*\n\nThese calculations don't depend on the\
    \ type or the size of variables inside array `a`. So `(pa + i)` will always return\
    \ the address of `ith` element. Another important relationship between array and\
    \ pointer is you can refer the data inside `a[i]` by using `*(a + i)`.\n\nThere\
    \ is one difference between an array name and a pointer: a pointer is a variable\
    \ so `pa = a` and `pa++` is acceptable. However, `a = pa` and `a++` are unacceptable.\n\
    \n## String\n\nA string constant in C, such as `\"I am Khang\"`, is an array of\
    \ characters terminated by a null character `'\\0'` so that programs can find\
    \ the end of an array. Because string is an array of characters, you can assign\
    \ it to the pointer easily.\n\n```\nchar *pmessage;\npmessage = \"I am Khang\"\
    ;\n```\n\nYou can manipulate the string as a normal array or with pointers, as\
    \ in this source code:\n\n```\nvoid my_string_copy (char *s, char *t) {\n   while\
    \ (*s++ = *t++) ;\n}\n```\n\nThe `my_string_copy` function is simple; it just\
    \ takes two character pointers and assigns the value of each character in string\
    \ `t` (represented by character pointer `t`) to its own character element.\n\n\
    **NOTE:** When you pass an array into a function as a parameter, C will automatically\
    \ convert that array to be a pointer of the same type.\n\nHere is another example\
    \ using an array of characters, but not using a pointer, to illustrate the interchangeable\
    \ nature of array and pointer:\n\n```\nint my_string_length(char *s) {\n  int\
    \ i = 0;\n  while (s[i] != '\\0') {\n    i++;\n  }\n  return i;\n}\n```\n\n##\
    \ Struct\n\nC has no concept of object-oriented programming. So to create a complex\
    \ data structure (rather than just primitive types and arrays), you use struct.\
    \ In some Objective-C code, you can even see the struct used intensively in areas\
    \ that need to save memory. For example, `CGPoint`, `CGRect`, and `CGSize` are\
    \ structs. Apple developers put them as struct because they are used intensively\
    \ for building views in iPhone. You can use struct as in Objective-C.\n\n```\n\
    struct point {\n  int x;\n  int y;\n};\n\nstruct point add_point(struct point\
    \ p1, struct point p2) {\n  p1.x += p2.x;\n  p1.y += p2.y;\n  return p1;\n}\n\
    ```\n\nIf you pass a big data structure into a function, you may consider passing\
    \ the pointer to that struct to the function, which will avoid copying the whole\
    \ structure (because of passing by value). You use the `struct` pointers as in\
    \ other normal cases.\n\n```\nstruct point origin;\nstruct point *porigin;\nporigin\
    \ = &origin;\nprintf(\"origin is (%d, %d) \\n\" , (*porigin).x , (*porigin).y\
    \ );\n```\n\n## Dynamic Memory Allocation\n\nMemory management in C has some similarities\
    \ and differences to that in Objective-C. In C, you can also create and allocate\
    \ memory to objects; if you allocate an object to memory, you need to manually\
    \ deallocate/free that object to reclaim the memory. There is no concept of `autorelease`\
    \ or Autorelease Pool in Objective-C.\n\nThere are four functions to remember\
    \ to have a good memory management mechanism in C, as shown in [Table 9–1](#Chapter09.html#tab_9_1).\n\
    \n![images](images/t0901.jpg)\n\n*   **`Malloc`**: You can request a block of\
    \ memory of specific size and return a pointer of type void. You then can cast\
    \ this pointer to your specific type and use it, like so:\n    ```\n    my_ptr\
    \ = (cast_type *)malloc(number_of_bytes); // General format\n    my_ptr = (int\
    \ *)malloc (100  * sizeof(int)); // allocate a pointer of integer with size\n\
    \         //  of 100 integer\n    ```\n*   **`Calloc`** is usually used to request\
    \ multiple blocks of memory, each of the same size, and then set all bytes to\
    \ zero.\n    ```\n    my_ptr = (cast_type *)calloc(number_of_elements, size_of_element);\
    \ // General format\n    my_ptr = (int *)calloc (100, sizeof(int)); // allocate\
    \ a pointer of integer with size\n       //  of 100 integer\n    ```\n*   **`Free`**:\
    \ The memory management mechanism here is similar to Objective-C: the memory you\
    \ allocate, you need to release. You can use the `free()` method in C to do so.\n\
    \    ```\n    free(my_ptr);\n    ```\n*   **`Realloc`**: Sometimes the memory\
    \ you allocated for the object or array is insufficient, so you may need to change\
    \ the memory size with the help of function `realloc()`.\n    ```\n    realloc(my_ptr,\
    \ 200 * sizeof(int));\n    ```\n\n**NOTE:** You can't use the function `malloc()`/`calloc()`\
    \ again because that will erase all data stored in the memory that your pointer\
    \ points to.\n\n## Linked List Example\n\nIt's time to take a break from all the\
    \ theory and start coding. You will apply what you learned to a problem using\
    \ linked list to store data. You already learned the linked list implementation\
    \ in Objective-C in [Chapter 5](#Chapter05.html#ch5). Now, you will learn how\
    \ to write a linked list in C, which can provide much higher performance in many\
    \ cases.\n\n```\n#include <stdio.h>\n#include <stdlib.h>\n\nstruct Node {\n int\
    \ number;\n struct Node *next;\n};\n```\n\nTo have a linked list, you need a struct\
    \ that can reference itself. In your case, the `Node` struct needs to have a link\
    \ to the next struct inside the linked list. In C, you can declare the method\
    \ interface in both the header or implementation files.\n\n```\nvoid append_node(struct\
    \ Node *list, int num);\nvoid display_list(struct Node *list);\n\nint main(void)\
    \ {\n struct Node *list;\n\n list = (struct Node *)malloc(sizeof(struct Node));\n\
    \ list->number = 0;\n list->next = NULL;\n\n append_node(list, 1);\n append_node(list,\
    \ 5);\n append_node(list, 3);\n\n display_list(list);\n\n // delete a list here.\
    \ free(list) will not work\n return(0);\n}\n\nvoid delete_list(struct Node *list)\
    \ {\n  // do it as your exercise\n}\n\nvoid display_list(struct Node *list) {\n\
    \ // loop over the list to print the value out.\n while(list->next != NULL) {\n\
    \  printf(\"%d \", list->number);\n  list = list->next;\n }\n\n printf(\"%d\"\
    , list->number);\n}\n\nvoid append_node(struct Node *list, int num) {\n // go\
    \ into the end of the list\n while(list->next != NULL)\n  list = list->next;\n\
    \n // set the next property for the last Node object.\n list->next = (struct Node\
    \ *)malloc(sizeof(struct Node));\n list->next->number = num;\n list->next->next\
    \ = NULL;\n}\n```"
  raw: "##### Advanced Data Types\n\nThere are some advanced data structures in C:\
    \ `array`, `string`, and `struct.` These all are supported in Objective-C but\
    \ you should use them sparingly because they make the code harder to understand\
    \ and maintain in future. All these data structures in Objective-C have corresponding\
    \ wrappers to make the code more object-oriented. However, in many cases you still\
    \ need to use C data structures to improve performance or process the result from\
    \ calling C/C++ libraries.\n\nArray\n\nIn Objective-C, you will usually use an\
    \ `NSArray` or `NSMutableArray` object to represent an array. However, in C, you\
    \ don't have those concepts, so you focus entirely on the primitive array concept.\
    \ To define an array in C, you need to know the length of the array ahead of time\
    \ and define it like this:\n\n`int a [10]; // an array with maximum ten elements`\n\
    \n`a[0], a[1], a[2] … a[9]` is the first, second … tenth elements of the array\n\
    \nPointer has a close relationship with array.\n\n`int *pa;`\n`pa = &a[0];`\n\n\
    This pointer assignment code will set `pa` to point to the first element of the\
    \ array. As explained in the pointer part, the assignment `x = *pa` will set x\
    \ to the value contained inside the `a[0]`.\n\nYou can move the pointer to different\
    \ elements inside the array by using simple arithmetic operators: `(pa + 1)` will\
    \ return the address of the next element and (`pa – 1)` will return the address\
    \ of the previous element. [Figure 9–3](#Chapter09.html#fig_9_3) demonstrates\
    \ the pointer arithmetic inside the array.\n\n![images](images/0903.jpg)\n\n**Figure\
    \ 9–3.** *Pointer arithmetic*\n\nThese calculations don't depend on the type or\
    \ the size of variables inside array a. So `(pa + i )` will always return the\
    \ address of `ith` element. Another important relationship between array and pointer\
    \ is you can refer the data inside a[i] by using `*( a + i ).`\n\nThere is one\
    \ difference between an array name and a pointer: a pointer is a variable so `pa\
    \ = a` and `pa++` is acceptable. However, `a = pa` and `a++` are unacceptable.\n\
    \nString\n\nA string constant in C, such as “I am Khang,” is an array of characters\
    \ terminated by a null character `‘\\0’` so that programs can find the end of\
    \ an array. Because string is an array of characters, you can assign it to the\
    \ pointer easily.\n\n`char *pmessage;`\n`pmessage = \"I am Khang\";`\n\nYou can\
    \ manipulate the string as a normal array or with pointers, as in this source\
    \ code:\n\n`void my_string_copy (char *s, char *t) {`\n`   while (*s++ = *t++)\
    \ ;`\n`}`\n\nThe `my_string_copy` function is simple; it just takes two character\
    \ pointers and assigns the value of each character in string t (represented by\
    \ character pointer t) to its own character element.\n\n**NOTE:** When you pass\
    \ an array into a function as a parameter, C will automatically convert that array\
    \ to be a pointer of the same type.\n\nHere is another example using an array\
    \ of characters, but not using a pointer, to illustrate the interchangeable nature\
    \ of array and pointer:\n\n`int my_string_length(char *s) {`\n`  int i = 0;`\n\
    `  while (s[i] != '\\0') {`\n`    i++;`\n`  }`\n`  return i;`\n`}`\n\nStruct\n\
    \nC has no concept of object-oriented programming. So to create a complex data\
    \ structure (rather than just primitive types and arrays), you use struct. In\
    \ some Objective-C code, you can even see the struct used intensively in areas\
    \ that need to save memory. For example, `CGPoint, CGRect, and CGSize` are structs.\
    \ Apple developers put them as struct because they are used intensively for building\
    \ views in iPhone. You can use struct as in Objective-C.\n\n`struct point {`\n\
    `  int x;`\n`  int y;`\n`};`\n\n`struct point add_point(struct point p1, struct\
    \ point p2) {`\n`  p1.x += p2.x;`\n`  p1.y += p2.y;`\n`  return p1;`\n`}`\n\n\
    If you pass a big data structure into a function, you may consider passing the\
    \ pointer to that struct to the function, which will avoid copying the whole structure\
    \ (because of passing by value). You use the `struct pointers` as in other normal\
    \ cases.\n\n`struct point origin;`\n`struct point *porigin;`\n`porigin = &origin;`\n\
    `printf(\"origin is (%d, %d) \\n\" , (*porigin).x , (*porigin).y );`\n\nDynamic\
    \ Memory Allocation\n\nMemory management in C has some similarities and differences\
    \ to that in Objective-C. In C, you can also create and allocate memory to objects;\
    \ if you allocate an object to memory, you need to manually deallocate/free that\
    \ object to reclaim the memory. There is no concept of `autorelease` or Autorelease\
    \ Pool in Objective-C.\n\nThere are four functions to remember to have a good\
    \ memory management mechanism in C, as shown in [Table 9–1](#Chapter09.html#tab_9_1).\n\
    \n![images](images/t0901.jpg)\n\n*   **`Malloc`**: You can request a block of\
    \ memory of specific size and return a pointer of type void. You then can cast\
    \ this pointer to your specific type and use it, like so: `my_ptr = (cast_type\
    \ *)malloc(number_of_bytes); // General format`\n    `my_ptr = (int *)malloc (100  *\
    \ sizeof(int)); // allocate a pointer of integer with size`\n    `     //  of\
    \ 100 integer`\n*   **`Calloc`** is usually used to request multiple blocks of\
    \ memory, each of the same size, and then set all bytes to zero. `my_ptr = (cast_type\
    \ *)calloc(number_of_elements, size_of_element); // General format`\n    `my_ptr\
    \ = (int *)calloc (100, sizeof(int)); // allocate a pointer of integer with size`\n\
    \    `   //  of 100 integer`\n*   **`Free`**: The memory management mechanism\
    \ here is similar to Objective-C:the memory you allocate, you need to release.\
    \ You can use the `free` method in C to do so. **`fre`**`e(my_ptr);`\n*   **Realloc**:\
    \ Sometimes the memory you allocated for the object or array is insufficient,\
    \ so you may need to change the memory size with the help of function `realloc.`\
    \ `realloc(my_ptr, 200 * sizeof(int));`\n\n**NOTE:** `You can't use the function\
    \ malloc/calloc again because that will erase all data stored in the memory that\
    \ your pointer points to.`\n\nLinked List Example\n\nIt's time to take a break\
    \ from all the theory and start coding. You will apply what you learned to a problem\
    \ using linked list to store data. You already learned the linked list implementation\
    \ in Objective-C in [Chapter 5](#Chapter05.html#ch5). Now, you will learn how\
    \ to write a linked list in C, which can provide much higher performance in many\
    \ cases.\n\n`#include <stdio.h>`\n`#include <stdlib.h>`\n\n`struct Node {`\n` int\
    \ number;`\n` struct Node *next;`\n`};`\n\nTo have a linked list, you need a struct\
    \ that can reference itself. In your case, the Node struct needs to have a link\
    \ to the next struct inside the linked list. In C, you can declare the method\
    \ interface in both the header or implementation files.\n\n`void append_node(struct\
    \ Node *list, int num);`\n`void display_list(struct Node *list);`\n\n`int main(void)\
    \ {`\n` struct Node *list;`\n\n` list = (struct Node *)malloc(sizeof(struct Node));`\n\
    ` list->number = 0;`\n` list->next = NULL;`\n\n` append_node(list, 1);`\n` append_node(list,\
    \ 5);`\n` append_node(list, 3);`\n\n` display_list(list);`\n\n` // delete a list\
    \ here. free(list) will not work`\n` return(0);`\n`}`\n\n`void` **`delete_list(struct\
    \ Node *list) {`**\n`  // do it as your exercise`\n**`}`**\n\n`void display_list(struct\
    \ Node *list) {`\n` // loop over the list to print the value out.`\n` while(list->next\
    \ != NULL) {`\n`  printf(\"%d \", list->number);`\n`  list = list->next;`\n` }`\n\
    \n` printf(\"%d\", list->number);`\n`}`\n\n`void append_node(struct Node *list,\
    \ int num) {`\n` // go into the end of the list`\n` while(list->next != NULL)`\n\
    `  list = list->next;`\n\n` // set the next property for the last Node object.`\n\
    ` list->next = (struct Node *)malloc(sizeof(struct Node));`\n` list->next->number\
    \ = num;`\n` list->next->next = NULL;`\n`}`"
  trans: "\n# 高级数据类型\n\nC 语言中有一些高级数据结构：`array`、`string` 和 `struct`。这些在 Objective-C\
    \ 中均受支持，但应谨慎使用，因为它们会使代码在未来更难理解和维护。Objective-C 中所有这些数据结构都有相应的封装器，以使代码更加面向对象。然而，在许多情况下，你仍需要使用\
    \ C 语言的数据结构来提高性能或处理调用 C/C++ 库时的结果。\n\n## 数组\n\n在 Objective-C 中，你通常会使用 `NSArray`\
    \ 或 `NSMutableArray` 对象来表示数组。但在 C 语言中，没有这些概念，因此你需要完全专注于原始的数组概念。要在 C 语言中定义数组，你需要预先知道数组的长度，并按如下方式定义：\n\
    \n```\nint a [10]; // 一个最多包含十个元素的数组\n```\n\n`a[0]`、`a[1]`、`a[2]` … `a[9]` 分别是数组的第一、第二……第十个元素。\n\
    \n指针与数组关系密切。\n\n```\nint *pa;\npa = &a[0];\n```\n\n这段指针赋值代码会将 `pa` 设置为指向数组的第一个元素。如指针部分所述，赋值语句\
    \ `x = *pa` 会将 `x` 设置为 `a[0]` 中包含的值。\n\n你可以使用简单的算术运算符将指针移动到数组内的不同元素：`(pa + 1)`\
    \ 将返回下一个元素的地址，而 `(pa - 1)` 将返回前一个元素的地址。图 9–3 展示了数组内部的指针算术运算。\n\n![images](img/0903.jpg)\n\
    \n**图 9–3.** *指针算术运算*\n\n这些计算不依赖于数组 `a` 内部变量的类型或大小。因此，`(pa + i)` 将始终返回第 `i` 个元素的地址。数组和指针之间的另一个重要关系是，你可以使用\
    \ `*(a + i)` 引用 `a[i]` 内的数据。\n\n数组名和指针之间存在一个区别：指针是一个变量，因此 `pa = a` 和 `pa++` 是可接受的。然而，`a\
    \ = pa` 和 `a++` 是不可接受的。\n\n## 字符串\n\nC 语言中的字符串常量，例如 `\"I am Khang\"`，是一个以空字符 `'\\\
    0'` 结尾的字符数组，这样程序才能找到数组的末尾。因为字符串是字符数组，你可以轻松地将其赋值给指针。\n\n```\nchar *pmessage;\n\
    pmessage = \"I am Khang\";\n```\n\n你可以像操作普通数组或指针一样操作字符串，例如以下源代码所示：\n\n```\nvoid\
    \ my_string_copy (char *s, char *t) {\n   while (*s++ = *t++) ;\n}\n```\n\n`my_string_copy`\
    \ 函数很简单；它只接受两个字符指针，并将字符串 `t`（由字符指针 `t` 表示）中每个字符的值赋给其自身的字符元素。\n\n**注意：**当将数组作为参数传递给函数时，C\
    \ 语言会自动将该数组转换为相同类型的指针。\n\n下面是另一个使用字符数组（但未使用指针）的示例，用以说明数组与指针的可互换性：\n\n```\nint\
    \ my_string_length(char *s) {\n  int i = 0;\n  while (s[i] != '\\0') {\n    i++;\n\
    \  }\n  return i;\n}\n```\n\n## 结构体\n\nC 语言没有面向对象编程的概念。因此，要创建复杂的数据结构（而不是仅使用基本类型和数组），需要使用结构体。在某些\
    \ Objective-C 代码中，你甚至可以看到在需要节省内存的领域大量使用结构体。例如，`CGPoint`、`CGRect` 和 `CGSize` 都是结构体。Apple\
    \ 开发者将它们定义为结构体，是因为它们在构建 iPhone 界面时被大量使用。你可以像在 Objective-C 中一样使用结构体。\n\n```\nstruct\
    \ point {\n  int x;\n  int y;\n};\n\nstruct point add_point(struct point p1, struct\
    \ point p2) {\n  p1.x += p2.x;\n  p1.y += p2.y;\n  return p1;\n}\n```\n\n如果将较大的数据结构传递给函数，可以考虑将指向该结构体的指针传递给函数，这样可以避免复制整个结构体（因为是通过值传递）。你可以像在其他正常情况中一样使用\
    \ `struct` 指针。\n\n```\nstruct point origin;\nstruct point *porigin;\nporigin =\
    \ &origin;\nprintf(\"origin is (%d, %d) \\n\" , (*porigin).x , (*porigin).y );\n\
    ```\n\n## 动态内存分配\n\nC 语言中的内存管理与 Objective-C 既有相似之处，也有不同之处。在 C 语言中，你同样可以创建对象并为其分配内存；如果你为对象分配了内存，则需要手动取消分配/释放该对象以回收内存。Objective-C\
    \ 中没有 `autorelease` 或自动释放池的概念。\n\n要掌握 C 语言良好的内存管理机制，需要记住四个函数，如表 9–1 所示。\n\n![images](img/t0901.jpg)\n\
    \n*   **`Malloc`**：你可以请求一块指定大小的内存，并返回一个 void 类型的指针。然后，你可以将此指针转换为你需要的特定类型并使用它，例如：\n\
    \    ```\n    my_ptr = (cast_type *)malloc(number_of_bytes); // 通用格式\n    my_ptr\
    \ = (int *)malloc (100  * sizeof(int)); // 分配一个大小为\n         // 100 个整数的整数指针\n\
    \    ```\n*   **`Calloc`** 通常用于请求多个内存块，每块大小相同，然后将所有字节设置为零。\n    ```\n    my_ptr\
    \ = (cast_type *)calloc(number_of_elements, size_of_element); // 通用格式\n    my_ptr\
    \ = (int *)calloc (100, sizeof(int)); // 分配一个大小为\n       // 100 个整数的整数指针\n   \
    \ ```\n*   **`Free`**：此处的内存管理机制与 Objective-C 类似：你分配的内存，需要释放。你可以使用 C 语言中的 `free()`\
    \ 方法来实现。\n    ```\n    free(my_ptr);\n    ```\n*   **`Realloc`**：有时你为对象或数组分配的内存不够用，因此你可能需要借助函数\
    \ `realloc()` 来更改内存大小。\n    ```\n    realloc(my_ptr, 200 * sizeof(int));\n   \
    \ ```\n\n**注意：**你不能再次使用函数 `malloc()`/`calloc()`，因为这会清除指针指向的内存中存储的所有数据。\n\n## 链表示例\n\
    \n是时候从理论学习中稍作休息，开始编写代码了。你将运用所学知识处理一个使用链表存储数据的问题。你已经在第 5 章中学习了 Objective-C 中的链表实现。现在，你将学习如何用\
    \ C 语言编写链表，该链表在许多情况下可以提供更高的性能。\n\n```\n#include <stdio.h>\n#include <stdlib.h>\n\
    \nstruct Node {\n int number;\n struct Node *next;\n};\n```\n\n要拥有一个链表，你需要一个能够引用自身的结构体。在本例中，`Node`\
    \ 结构体需要有一个指向链表中下一个结构体的链接。在 C 语言中，你可以在头文件或实现文件中声明方法接口。\n\n```\nvoid append_node(struct\
    \ Node *list, int num);\nvoid display_list(struct Node *list);\n\nint main(void)\
    \ {\n struct Node *list;\n\n list = (struct Node *)malloc(sizeof(struct Node));\n\
    \ list->number = 0;\n list->next = NULL;\n\n append_node(list, 1);\n append_node(list,\
    \ 5);\n append_node(list, 3);\n\n display_list(list);\n\n // 在此处删除列表。free(list)\
    \ 不起作用\n return(0);\n}\n\nvoid delete_list(struct Node *list) {\n  // 作为练习，由你完成\n\
    }\n\nvoid display_list(struct Node *list) {\n // 遍历列表以打印出值。\n while(list->next\
    \ != NULL) {\n  printf(\"%d \", list->number);\n  list = list->next;\n }\n\n printf(\"\
    %d\", list->number);\n}\n\nvoid append_node(struct Node *list, int num) {\n //\
    \ 进入列表末尾\n while(list->next != NULL)\n  list = list->next;\n\n // 为最后一个 Node 对象设置\
    \ next 属性。\n list->next = (struct Node *)malloc(sizeof(struct Node));\n list->next->number\
    \ = num;\n list->next->next = NULL;\n}\n```\n"
- fmt: "您可以看到，由于链表没有固定大小，您始终需要使用`malloc`来分配新元素。使用完链表后，请删除您的列表。您需要记住内存管理规则：每调用一次`malloc`或`calloc`，就需要调用一次`free`函数；否则就会发生内存泄漏。正如代码中的注释所警告的，简单地调用`free(list)`会导致程序中出现一些内存泄漏。我将把`delete_list`的实现留作您的练习。\n\
    \n## 函数指针\n\n在C语言中，函数并不是变量，但您可以像定义指向整型或结构体的指针一样，定义指向函数的指针。您可以将这些函数指针放入数组，并将它们作为参数传递给其他函数。这与Objective-C中的`selector`非常相似。\n\
    \n接下来，您将看一个简单的例子，通过实现一个比较方法来填充快速排序算法。`qsort`是C语言中的一个内置函数，它可以接受一个函数指针，并使用快速排序算法对数组进行排序。\n\
    \n以下是`qsort`的接口：\n\n```c\nvoid qsort (void *array, int number_of_elements, int\
    \ size_of_element, int (* comparator)\n(const void *, const void *) );\n```\n\n\
    因此，您需要一个比较器函数，它接受两个指针并返回一个整数，指示哪个值更大。\n\n```c\nint compare (const void * a, const\
    \ void * b){\n  return ( *(int*)a - *(int*)b );\n}\n```\n\n然后，您可以将其作为参数传递给`qsort`函数。\n\
    \n```c\nint main (){\n  int values[] = { 40, 10, 100, 90, 20, 25 };\n  qsort (values,\
    \ 6, sizeof(int), compare); // 在此处传入比较函数。\n  return 0;\n}\n```\n\n## 位运算符\n\n\
    位运算符可能比加法和减法运算符稍快，并且比乘法和除法运算快得多。您可能会在库中看到大量使用位运算符的代码，尤其是在为旧微处理器编写的库中。\n\n了解位运算符可以帮助您操作位，并在密集计算中大幅提升性能。有几个位运算符和位移运算符需要记住：`NOT`、`AND`、`OR`、`XOR`、左移和右移。\n\
    \n*   `NOT`是取反运算符，将位中的0变为1，反之亦然。`NOT 0111 = 1000`\n*   `AND`接受两个长度相等的二进制表示，并对每一对对应位执行`AND`操作。如果位1和位2都为1，则结果为1；否则为0。\n\
    \    ```\n    0 1 0 1\n    AND 0 0 1 1\n      = 0 0 0 1\n    ```\n*   `OR`接受两个长度相等的二进制表示，并对每一对对应位执行`OR`操作。如果两者中有一个为1或两者都为1，则结果为1；否则为0。\n\
    \    ```\n      0 0 1 0\n    OR 1 0 0 0\n      = 1 0 1 0\n    ```\n*   `XOR`接受两个长度相等的二进制表示，并对每一对对应位执行`XOR`操作。如果两个位不同，则结果为1；否则为0。\n\
    \    ```\n      0 1 0 1\n    XOR 0 0 1 1\n      = 0 1 1 0\n    ```\n\n使用这些位运算符，您可以快速地更改位值。如果您不习惯使用显式的位运算符，这一切可能看起来很奇怪。我将用Objective-C为您演示。以下是您已经熟悉的Cocoa\
    \ Touch框架内部位运算符的一个应用：`NSCalendar`。\n\n在`NSCalendar`中，您可以根据输入参数获取特定日期的日期组件列表。例如，如果您想要一个仅包含所需日期组件的`NSDateComponent`对象，您可以使用以下源代码：\n\
    \n```objectivec\nNSUInteger unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit\
    \ | NSDayCalendarUnit;\nNSDateComponents *dateComponents = [calendar components:unitFlags\n\
    \                                               fromDate:startDate\n         \
    \                                        toDate:endDate\n                    \
    \                           options:0];\n```\n\n当使用`unitFlags`调用方法`[calendar components:fromDate:toDate:options]`时，它将检查调用者需要日期的哪些组件，并只返回那些组件。像这样编写代码非常方便，只使用了`OR`运算符。\n\
    \n在方法`[calendar components:fromDate:toDate:options]`内部，它将使用`AND`运算符检查`unitFlags`。\n\
    \n```objectivec\nBOOL hasYear = (unitFlags & NSYearCalendarUnit) != 0;\nBOOL hasMonth\
    \ = (unitFlags & NSMonthCalendarUnit) != 0;\nBOOL hasWeek = (unitFlags & NSWeeCalendarUnit)\
    \ != 0;\n…\n```\n\n现在，我将为您详细解释这些运算符内部发生了什么以及它们如何工作。首先，每个标志（`NSYearCalendarUnit`、`NSMonthCalendarUnit`等）都被分配了一个唯一的二进制表示，格式为：`0100`、`1000`。\n\
    \n当您对三个标志执行`OR`操作时，您会得到类似`1011`的结果。您将其传递给`[calendar components:fromDate:toDate:options]`方法。在该方法内部，它会与每个标志执行`AND`操作，以查看其中存储了哪个标志。\n\
    \n```\n1011 & 0100 = 0100 → 存在 NSYearCalendarUnit。\n1011 & 1000 = 1000 → 存在 NSMonthCalendarUnit\n\
    ```\n\n与其他常见方法相比，使用这种方法可以提高应用程序的性能。其他方法要么传递过多参数，要么使用大型枚举来存储情况，要么需要大量循环来检查数据。\n\
    \n*   **位移**：当您将数字乘以或除以2的幂时，可以将位向左或向右移动。例如，如果您将数字乘以或除以2、4、8、16…，可以考虑使用位移，其运行时性能比直接进行乘除运算更高。位移只能对整数进行操作。\n\
    \n有两种位移运算符：左移和右移。整数以二进制形式存储，包含一系列位，例如`0000 0110`（十进制6）。应用位移操作的结果因操作而异：\n\n*  \
    \ **左移**：将所有位向左移动，并从右侧用零填充。如果将位向左移动n位，也意味着将其乘以2^n。`0000 0110 << 1 = 0000 1100`（十进制12）\n\
    *   **右移**：将所有位向右移动，并从左侧用零填充。如果将位向右移动n位，也意味着将该数除以2^n。`0000 0110 >> 1 = 0000 0011`（十进制3）\n\
    \n## C++ 编程\n\nC++是C的超集，因此您将在这里学习一些额外的技术。C++有一些与Objective-C不同的概念和语法，尽管两者都是面向对象的编程语言。有几个重要的区别：类、指针、多重继承、内存管理和模板。"
  raw: "You can see that because your linked list doesn't have a fixed size, you always\
    \ need to use `malloc` to allocate new element. After you finish with the linked\
    \ list, delete your list. You need to remember the memory management rule: for\
    \ every `malloc or calloc` you call, you need to call a `free` function; otherwise,\
    \ you have a memory leak. As the comment in the code warns, a simple call to `free\
    \ (list)` will cause some memory leaks in your program. I will leave the implementation\
    \ for `delete_list` as your exercise.\n\n###### Function Pointers\n\nIn C, a function\
    \ is not a variable but you can define pointers to functions as you define pointers\
    \ to integer or struct. You can put these function pointers into an array, and\
    \ pass these function pointers as arguments into other functions. It is really\
    \ similar to `selector` in Objective-C.\n\nNext you will look at a simple example\
    \ to implement a comparison method to fill in the quick sort algorithm. The `qsort`\
    \ is a built-in function in C that can accept a function pointer and uses the\
    \ quick sort algorithm to sort the array.\n\nHere is the `qsort` interface:\n\n\
    `void qsort (void *array, int number_of_elements, int size_of_element, int (*\
    \ comparator)`\n`(const void *, const void *) );`\n\nSo, you need a comparator\
    \ function that accepts two pointers and returns an integer indicating what value\
    \ is bigger.\n\n`int compare (const void * a, const void * b){`\n`  return ( *(int*)a\
    \ - *(int*)b );`\n`}`\n\nAnd then you can pass it as a parameter to your `qsort`\
    \ function.\n\n`int main (){`\n\n`  int values[] = { 40, 10, 100, 90, 20, 25 };`\n\
    `  qsort (values, 6, sizeof(int), compare); // pass in the compare function here.`\n\
    `  return 0;`\n`}`\n\nBitwise Operators\n\nBitwise operators can be slightly faster\
    \ than addition and subtraction operators and significantly faster than multiplication\
    \ and division operations. You may see code using bitwise operators a lot in libraries,\
    \ especially ones written with the old microprocessors.\n\nKnowing bitwise operators\
    \ can help you to manipulate the bits and boost the performance much faster in\
    \ intensive calculations. There are a few bitwise operators and bit shift operators\
    \ that you need to remember: `NOT, AND, OR, XOR, left shift, and right shift.`\n\
    \n*   NOT is a complement operator that make bits with 0 become 1 and vice versa.\
    \ `NOT 0111 = 1 000`\n*   AND takes two binary representations of equal length\
    \ and performs the AND operation on each pair of corresponding bits. The result\
    \ is 1 if bit 1 and bit 2 are 1; otherwise it is 0. `0 1 0 1`\n    `AND     0\
    \ 0 1 1`\n    `        =  0 0 0 1`\n*   OR takes two binary representations of\
    \ equal length and performs the OR operation on each pair of corresponding bits.\
    \ The result is 1 if either of them is 1 or both are 1; otherwise it is 0. `       0\
    \ 0 1 0`\n    `OR     1 0 0 0`\n    `     = 1 0 1 0`\n*   XOR takes two binary\
    \ representations of equal length and performs the XOR operation on each pair\
    \ of corresponding bits. The result is 1 if two bits are different; otherwise\
    \ it is 0. `       0 1 0 1`\n    `XOR    0 0 1 1`\n    `     = 0 1 1 0`\n\nUsing\
    \ these bit operators, you can change the bit value quickly. This may all look\
    \ strange if you are not used to explicit bit operators. I will give you an illustration\
    \ in Objective-C. Here is an application of bitwise operators inside Cocoa Touch\
    \ framework that you are already familiar with: `NSCalendar`.\n\nIn an `NSCalendar`,\
    \ you can get a list of date components of a specific date based on an input parameter.\
    \ For example, if you want to have an `NSDateComponent` object that contains only\
    \ date components you want, you can use this source code:\n\n`NSUInteger unitFlags\
    \ = NSYearCalendarUnit | NSMonthCalendarUnit | NSDayCalendarUnit;`\n`NSDateComponents\
    \ *dateComponents = [calendar components:unitFlags`\n`                                               fromDate:startDate`\n\
    `                                                 toDate:endDate`\n`                                               options:0];`\n\
    \nWhen the method `[calendar components:fromDate:toDate:options]` is called with\
    \ the unitFlags, it will check to see what components of a date the caller needs\
    \ and return exactly those ones. It is convenient to read and write code like\
    \ this, with only OR operator needed.\n\nWithin the method `[calendar components:fromDate:toDate:options],`\
    \ it will check the unitFlags by using an `AND` operator.\n\n`BOOL hasYear = (unitFlags\
    \ & NSYearCalendarUnit) != 0;`\n`BOOL hasMonth = (unitFlags & NSMonthCalendarUnit)\
    \ != 0;`\n`BOOL hasWeek = (unitFlags & NSWeeCalendarUnit) != 0;`\n`…`\n\nNow,\
    \ I will explain to you in detail what happens inside these operators and how\
    \ this works. Firstly, each flag `(NSYearCalendarUnit, NSMonthCalendarUnit, etc.)`\
    \ is assigned with a unique binary representation with format: `0100, 1000.`\n\
    \nWhen you do an `OR` operation over three flags, you will receive something like\
    \ `1011.` You pass this to the method `[calendar components:fromDate:toDate:options].`\
    \ Inside this method, it will do an `AND` operator with each flag to see what\
    \ flag is stored inside.\n\n`1011 & 0100 = 0100` ![images](images/U003.jpg) `there\
    \ is a NSYearCalendarUnit.`\n`1011 & 1000 = 1000` ![images](images/U003.jpg)`  there\
    \ is a NSMonthCalendarUnit`\n\nUsing this approach will improve your application's\
    \ performance compared to other normal approaches, which either pass in too many\
    \ arguments, use a big enum to store case, or need a big loop to check for data.\n\
    \n*   **Bit shift**: You can shift the bit to left and right when you multiply\
    \ or divide your number by a factor of 2\\. For example, if you multiply or divide\
    \ your number by 2, 4, 8, 16…, you can consider using bitshift, which has higher\
    \ runtime performance than doing the multiply or divide directly. You can only\
    \ do bit shift on integers.\n\nThere are two bit shift operators: left shift and\
    \ right shift. Integers are stored in binary, with a series of bits such as 0000\
    \ 0110 (6 in decimal). The results for applying the bit shift operations vary\
    \ on each operation:\n\n*   **Left shift**: You move all the bits to left and\
    \ fill with zeros from the right. If you shift n bits to the left, it also means\
    \ you multiply with 2^n. `0000 0110 << 1 = 0000 1100 (12 in decimal)`\n*   **Right\
    \ shift**: You move all bits to the right and fill with zeros from the left. If\
    \ you shift n bits to the right, it also means you divide the number by 2^n. `0000\
    \ 0110 >> 1 = 0000 0011 (3 in decimal)`\n\n#### C++ Programming\n\nC++ is a superset\
    \ of C, so you will learn a couple more techniques here. C++ has some different\
    \ concepts and syntax than Objective-C, although both of them are object-oriented\
    \ programming language. There are a couple of important differences: class, pointers,\
    \ multiple inheritance, memory management, and template."
  trans: "\n您可以看到，由于链表没有固定大小，您始终需要使用`malloc`来分配新元素。使用完链表后，请删除您的列表。您需要记住内存管理规则：每调用一次`malloc`或`calloc`，就需要调用一次`free`函数；否则就会发生内存泄漏。正如代码中的注释所警告的，简单地调用`free(list)`会导致程序中出现一些内存泄漏。我将把`delete_list`的实现留作您的练习。\n\
    \n## 函数指针\n\n在 C 语言中，函数并不是变量，但您可以像定义指向整型或结构体的指针一样，定义指向函数的指针。您可以将这些函数指针放入数组，并将它们作为参数传递给其他函数。这与\
    \ Objective-C 中的`selector`非常相似。\n\n接下来，您将看一个简单的例子，通过实现一个比较方法来填充快速排序算法。`qsort`是\
    \ C 语言中的一个内置函数，它可以接受一个函数指针，并使用快速排序算法对数组进行排序。\n\n以下是`qsort`的接口：\n\n```c\nvoid qsort\
    \ (void *array, int number_of_elements, int size_of_element, int (* comparator)\n\
    (const void *, const void *) );\n```\n\n因此，您需要一个比较器函数，它接受两个指针并返回一个整数，指示哪个值更大。\n\
    \n```c\nint compare (const void * a, const void * b){\n  return ( *(int*)a - *(int*)b\
    \ );\n}\n```\n\n然后，您可以将其作为参数传递给`qsort`函数。\n\n```c\nint main (){\n  int values[]\
    \ = { 40, 10, 100, 90, 20, 25 };\n  qsort (values, 6, sizeof(int), compare); //\
    \ 在此处传入比较函数。\n  return 0;\n}\n```\n\n## 位运算符\n\n位运算符可能比加法和减法运算符稍快，并且比乘法和除法运算快得多。您可能会在库中看到大量使用位运算符的代码，尤其是在为旧微处理器编写的库中。\n\
    \n了解位运算符可以帮助您操作位，并在密集计算中大幅提升性能。有几个位运算符和位移运算符需要记住：`NOT`、`AND`、`OR`、`XOR`、左移和右移。\n\
    \n*   `NOT`是取反运算符，将位中的 0 变为 1，反之亦然。`NOT 0111 = 1000`\n*   `AND`接受两个长度相等的二进制表示，并对每一对对应位执行`AND`操作。如果位\
    \ 1 和位 2 都为 1，则结果为 1；否则为 0。\n    ```\n    0 1 0 1\n    AND 0 0 1 1\n      = 0\
    \ 0 0 1\n    ```\n*   `OR`接受两个长度相等的二进制表示，并对每一对对应位执行`OR`操作。如果两者中有一个为 1 或两者都为 1，则结果为\
    \ 1；否则为 0。\n    ```\n      0 0 1 0\n    OR 1 0 0 0\n      = 1 0 1 0\n    ```\n\
    *   `XOR`接受两个长度相等的二进制表示，并对每一对对应位执行`XOR`操作。如果两个位不同，则结果为 1；否则为 0。\n    ```\n   \
    \   0 1 0 1\n    XOR 0 0 1 1\n      = 0 1 1 0\n    ```\n\n使用这些位运算符，您可以快速地更改位值。如果您不习惯使用显式的位运算符，这一切可能看起来很奇怪。我将用\
    \ Objective-C 为您演示。以下是您已经熟悉的 Cocoa Touch 框架内部位运算符的一个应用：`NSCalendar`。\n\n在`NSCalendar`中，您可以根据输入参数获取特定日期的日期组件列表。例如，如果您想要一个仅包含所需日期组件的`NSDateComponent`对象，您可以使用以下源代码：\n\
    \n```objectivec\nNSUInteger unitFlags = NSYearCalendarUnit | NSMonthCalendarUnit\
    \ | NSDayCalendarUnit;\nNSDateComponents *dateComponents = [calendar components:unitFlags\n\
    \                                               fromDate:startDate\n         \
    \                                        toDate:endDate\n                    \
    \                           options:0];\n```\n\n当使用`unitFlags`调用方法`[calendar components:fromDate:toDate:options]`时，它将检查调用者需要日期的哪些组件，并只返回那些组件。像这样编写代码非常方便，只使用了`OR`运算符。\n\
    \n在方法`[calendar components:fromDate:toDate:options]`内部，它将使用`AND`运算符检查`unitFlags`。\n\
    \n```objectivec\nBOOL hasYear = (unitFlags & NSYearCalendarUnit) != 0;\nBOOL hasMonth\
    \ = (unitFlags & NSMonthCalendarUnit) != 0;\nBOOL hasWeek = (unitFlags & NSWeeCalendarUnit)\
    \ != 0;\n…\n```\n\n现在，我将为您详细解释这些运算符内部发生了什么以及它们如何工作。首先，每个标志（`NSYearCalendarUnit`、`NSMonthCalendarUnit`等）都被分配了一个唯一的二进制表示，格式为：`0100`、`1000`。\n\
    \n当您对三个标志执行`OR`操作时，您会得到类似`1011`的结果。您将其传递给`[calendar components:fromDate:toDate:options]`方法。在该方法内部，它会与每个标志执行`AND`操作，以查看其中存储了哪个标志。\n\
    \n```\n1011 & 0100 = 0100 → 存在 NSYearCalendarUnit。\n1011 & 1000 = 1000 → 存在 NSMonthCalendarUnit\n\
    ```\n\n与其他常见方法相比，使用这种方法可以提高应用程序的性能。其他方法要么传递过多参数，要么使用大型枚举来存储情况，要么需要大量循环来检查数据。\n\
    \n*   **位移**：当您将数字乘以或除以 2 的幂时，可以将位向左或向右移动。例如，如果您将数字乘以或除以 2、4、8、16…，可以考虑使用位移，其运行时性能比直接进行乘除运算更高。位移只能对整数进行操作。\n\
    \n有两种位移运算符：左移和右移。整数以二进制形式存储，包含一系列位，例如`0000 0110`（十进制 6）。应用位移操作的结果因操作而异：\n\n* \
    \  **左移**：将所有位向左移动，并从右侧用零填充。如果将位向左移动 n 位，也意味着将其乘以 2^n。`0000 0110 << 1 = 0000 1100`（十进制\
    \ 12）\n*   **右移**：将所有位向右移动，并从左侧用零填充。如果将位向右移动 n 位，也意味着将该数除以 2^n。`0000 0110 >> 1\
    \ = 0000 0011`（十进制 3）\n\n## C++ 编程\n\nC++是 C 的超集，因此您将在这里学习一些额外的技术。C++有一些与 Objective-C\
    \ 不同的概念和语法，尽管两者都是面向对象的编程语言。有几个重要的区别：类、指针、多重继承、内存管理和模板。\n"
- fmt: "# Class\n\nIt is similar to Objective-C in that you have two files for one\
    \ class: one for header and one for implementation. You can also specify the private\
    \ and public members/methods. Here is a standard way to declare a class header:\n\
    \n```\nclass Cat {\n  public:\n       // public accessors\n     unsigned int GetAge();\n\
    \     void SetAge(unsigned int Age);\n     Cat ();\n     Cat (int initialAge);\
    \     // constructor\n     ~Cat();                   // destructor\n\n     //\
    \ public member functions\n     void Meow();\n\n      // private member data\n\
    \   private:\n     unsigned int  itsAge;\n};\n\n// GetAge, Public accessor function\n\
    // returns value of itsAge member\nunsigned int Cat::GetAge() {\n     return itsAge;\n\
    }\n\n// returns sets itsAge member\nvoid Cat::SetAge(unsigned int age) {\n   \
    \  // set member variable its age to\n     // value passed in by parameter age\n\
    \     itsAge = age;\n}\n\n// action: Prints \"meow\" to screen\nvoid Cat::Meow()\
    \ {\n     cout << \"Meow.\\n\";\n}\n\nint main() {\n  Cat cat;\n  cat.Meow();\n\
    }\n```\n\nYou can see that to declare public and private, you separate them out\
    \ into areas and put qualifiers `private` and `public` in, just as in Objective-C\
    \ with the same qualifiers `@private` and `@public` when you define your header.\
    \ For the class implementation, you need to put class name before the method implementation\
    \ to declare that the method belongs to the class.\n\nFor the accessors and mutators,\
    \ you need to explicit declare them as\n\n```\nunsigned int GetAge();\nvoid SetAge(unsigned\
    \ int Age);\n```\n\nTo create a new object of `Cat`, you can just declare `Cat\
    \ cat;` and then call the method `cat.Meow();`. The object, though, only exists\
    \ inside the local scope of the function.\n\nFor memory management, you may need\
    \ to declare both constructor and destructor. If you don't declare your own constructor,\
    \ the compiler assumes that it will use the default constructor without any argument.\n\
    \n**NOTE:** If you declare your own constructor, please remember to declare your\
    \ destructor as well, even if it doesn't do anything. It is a good convention\
    \ to follow. To create a new object of `Cat` with `Cat cat`, you need a default\
    \ constructor.\n\n# Pointers and Memory Management\n\nIf you want to use the newly\
    \ created object elsewhere in your program, you need to allocate memory on the\
    \ free store in C++. The object will always stay in the memory area until you\
    \ explicitly call to delete that memory, similar to programming in C. To declare\
    \ a pointer to a memory address containing integer you can do as this code does:\n\
    \n```\nint *pInt;\npInt = new int;\n*pInt = 72;\n```\n\nTo allocate and delete\
    \ for an object, you can use the `new` and `delete` keywords.\n\n```\nCat *pCat\
    \ = new Cat;\npCat->SetAge(5);\ndelete pCat;\npCat = 0;\n```\n\n**NOTE:** If you\
    \ call `delete` twice in the same pointer, your application will crash. If you\
    \ don't declare the pointer before reallocating it, you will have a memory leak.\n\
    \n# Inheritance\n\nThe inheritance in C++ has some complicated concepts compared\
    \ to Objective-C. You can have inheritance, overriding, and polymorphism as normal.\
    \ The only difference is the concept of virtual and pure virtual methods.\n\n\
    ```\nclass Dog : Mammal {\n}\n```\n\nThe `Dog` class will inherit all the attributes\
    \ and methods of the `Mammal` class, and it can have its own attribute and methods.\
    \ When a `Dog` object is created, the constructor of the `Mammal` is called first\
    \ before any other code inside the constructor of the `Dog` class.\n\nThere is\
    \ an important concept in C++ inheritance: you can only override the methods that\
    \ are virtual. With other methods, you can only inherit without overriding that\
    \ method. You can have two methods with the same name in superclass and subclass\
    \ but there is no overriding and no polymorphism. With virtual methods, your subclass\
    \ is suggested to override the method if necessary. The default qualifier for\
    \ C++ method is non-virtual. There are two kinds of virtual methods: virtual methods\
    \ and pure virtual methods.\n\n```\n#include \"stdafx.h\"\n#include \"stdio.h\"\
    \n\nusing namespace System;\n\nclass Animal {\n public:\n  virtual void Speak()\
    \ = 0;\n  virtual void Eat();\n  void Run();\n};\n\nvoid Animal::Eat()\n{\n  \
    \      printf(\"Animal eats\\n\");\n}\n\nvoid Animal::Run()\n{\n        printf(\"\
    Animal runs\\n\");\n}\n\nclass Dog : Animal\n{\npublic:\n        void Eat();\n\
    \        void Speak();\n        void Run();\n};\n\nvoid Dog::Eat()\n{\n      \
    \  printf(\"Dog eats\\n\");\n}\n\nvoid Dog::Run()\n{\n        printf(\"Dog runs\\\
    n\");\n}\n\nvoid Dog::Speak()\n{\n        printf(\"Dog speaks\\n\");\n}\n\nint\
    \ main()\n{\n        Animal *dog1 = (Animal *) new Dog;\n    dog1->Run();\n  \
    \  dog1->Speak();\n    dog1->Eat();\n        getchar();\n}\n```\n\nFor virtual\
    \ method, you have to have the implementation for it inside the superclass; for\
    \ pure virtual method, you can just declare the method signature. The `Eat` method\
    \ is a virtual method while `Speak` is a pure virtual method. Both methods needed\
    \ to be overridden inside the subclass.\n\nBecause the `Run` method is not virtual,\
    \ it isn't overridden by the subclass. So the output of the main method will be\n\
    \n```\nAnimal Runs\nDog Speaks\nDog Eats\n```\n\n# Multiple Inheritance\n\nIn\
    \ C++, your class can inherit from many superclasses, so you can reuse more properties\
    \ and methods. For example, your `Teacher` class can inherit from both `Employee\
    \ and Person` class, as in [Figure 9–4](#Chapter09.html#fig_9_4).\n\n![images](images/0904.jpg)\n\
    \n**Figure 9–4.** *Multiple inheritance*\n\nYou can declare your class to inherit\
    \ multiple classes by using\n\n```\nclass Teacher : public Person, public Employee\
    \ {\n}\n```\n\nThere is one common problem with multiple inheritance: when two\
    \ superclasses share the same method. For example, `GetIncome` can be declared\
    \ from both `Person and Employee` class. So, when you call your `Teacher` object\
    \ to get its income, you need to specify the superclass that you call it from.\n\
    \nIf you simply write\n\n```\nint currentIncome = pTeacher->GetIncome();\n```\n\
    \nyou will get a compiler error\n\n`Member is ambiguous: ‘Person::GetIncome’ and\
    \ ‘Employee::GetIncome’`\n\nYou need to resolve this ambiguity by explicitly calling\
    \ the superclass's function you want to invoke.\n\n```\nint currentIncome = pTeacher->Employee::GetIncome();\n\
    ```\n\n# Template\n\nIn C++, you can define classes or methods to receive a specific\
    \ type of objects only. For example, you can define a method that only receives\
    \ two data of the same type to compare and return results.\n\n```\ntemplate <class\
    \ T>\nT GetMax (T a, T b) {\n return (a>b)? a : b;\n}\n\nint main () {\n int i=5,\
    \ j=6, k;\n long l=10, m=5, n;\n k=GetMax<int>(i,j);\n n=GetMax<long>(l,m);\n\
    \ return 0;\n}\n```\n\nBy defining a template method, you can make sure that `a`\
    \ and `b` have the same class type and can be compared with each other. You can\
    \ do the same with template class without any issue.\n\n```\ntemplate <class T>\n\
    class mypair {\n   T a, b;\n public:\n   mypair (T first, T second)\n     {a=first;\
    \ b=second;}\n   T getmax () {\nreturn a>b? a : b;\n   }\n};\n\nint main () {\n\
    \ mypair <int> myobject (100, 75);\n cout << myobject.getmax();\n return 0;\n\
    }\n```\n\n## A Practical Example\n\nI will guide you through some examples to\
    \ integrate C/C++ library inside the Objective-C code. One example is to integrate\
    \ with SQLite libraries, the other is a sample application to mix C++ code to\
    \ Objective-C code."
  raw: '##### Class


    It is similar to Objective-C in that you have two files for one class: one for
    header and one for implementation. You can also specify the private and public
    members/methods. Here is a standard way to declare a class header:


    `class Cat {`

    `  public:`

    `       // public accessors`

    `     unsigned int GetAge();`

    `     void SetAge(unsigned int Age);`

    `     Cat ();`

    `     Cat (int initialAge);     // constructor`

    `     ~Cat();                   // destructor`


    `     // public member functions`

    `     void Meow();`


    `      // private member data`

    `   private:`

    `     unsigned int  itsAge;`

    `};`


    `// GetAge, Public accessor function`

    `// returns value of itsAge member`

    `unsigned int Cat::GetAge() {`

    `     return itsAge;`

    `}`


    `// returns sets itsAge member`

    `void Cat::SetAge(unsigned int age) {`

    `     // set member variable its age to`

    `     // value passed in by parameter age`

    `     itsAge = age;`

    `}`


    `// action: Prints "meow" to screen`

    `void Cat::Meow() {`

    `     cout << "Meow.\n";`

    `}`


    `int main() {`

    `  Cat cat;`

    `  cat.Meow();`

    `}`


    You can see that to declare public and private, you separate them out into areas
    and put qualifiers `private` and `public` in, just as in Objective-C with the
    same qualifiers `@private` and `@public` when you define your header. For the
    class implementation, you need to put class name before the method implementation
    to declare that the method belongs to the class.


    For the accessors and mutators, you need to explicit declare them as


    `unsigned int GetAge();`

    `void SetAge(unsigned int Age);`


    To create a new object of Cat, you can just declare `Cat cat;` and then call the
    method `cat.Meow();` The object, though, only exists inside the local scope of
    the function.


    For memory management, you may need to declare both constructor and destructor.
    If you don''t declare your own constructor, the compiler assumes that it will
    use the default constructor without any argument.


    **NOTE:** If you declare your own constructor, please remember to declare your
    destructor as well, even if it doesn''t do anything. It is a good convention to
    follow. To create a new object of `Cat` with `Cat cat`, you need a default constructor.


    ##### Pointers and Memory Management


    If you want to use the newly created object elsewhere in your program, you need
    to allocate memory on the free store in C++. The object will always stay in the
    memory area until you explicitly call to delete that memory, similar to programming
    in C. To declare a pointer to a memory address containing integer you can do as
    this code does:


    `int *pInt;`

    `pInt = new int;`

    `*pInt = 72;`


    To allocate and delete for an object, you can use the `new` and `delete` keywords.


    `Cat *pCat = new Cat;`

    `pCat->SetAge(5);`

    `delete pCat;`

    `pCat = 0;`


    **NOTE:** If you call delete twice in the same pointer, your application will
    crash. If you don''t delete the pointer before reallocating it, you will have
    a memory leak.


    ##### Inheritance


    The inheritance in C++ has some complicated concepts compared to Objective-C.
    You can have inheritance, overriding, and polymorphism as normal. The only difference
    is the concept of virtual and pure virtual methods.


    `class Dog : Mammal {`

    `}`


    The `Dog` class will inherit all the attributes and methods of the `Mammal` class,
    and it can have its own attribute and methods. When a `Dog` object is created,
    the constructor of the `Mammal` is called first before any other code inside the
    constructor of the `Dog` class.


    There is an important concept in C++ inheritance: you can only override the methods
    that are virtual. With other methods, you can only inherit without overriding
    that method. You can have two methods with the same name in superclass and subclass
    but there is no overriding and no polymorphism. With virtual methods, your subclass
    is suggested to override the method if necessary. The default qualifier for C++
    method is non-virtual. There are two kinds of virtual methods: virtual methods
    and pure virtual methods.


    `#include "stdafx.h"`

    `#include "stdio.h"`


    `using namespace System;`


    `class Animal {`

    ` public:`

    `  virtual void Speak() = 0;`

    `  virtual void Eat();`

    `  void Run();`

    `};`


    `void Animal::Eat()`

    `{`

    `        printf("Animal eats\n");`

    `}`


    `void Animal::Run()`

    `{`

    `        printf("Animal runs\n");`

    `}`


    `class Dog : Animal`

    `{`

    `public:`

    `        void Eat();`

    `        void Speak();`

    `        void Run();`

    `};`


    `void Dog::Eat()`

    `{`

    `        printf("Dog eats\n");`

    `}`


    `void Dog::Run()`

    `{`

    `        printf("Dog runs\n");`

    `}`


    `void Dog::Speak()`

    `{`

    `        printf("Dog speaks\n");`

    `}`


    `int main()`

    `{`

    `        Animal *dog1 = (Animal *) new Dog;`

    `    dog1->Run();`

    `    dog1->Speak();`

    `    dog1->Eat();`

    `        getchar();`

    `}`


    For virtual method, you have to have the implementation for it inside the superclass;
    for pure virtual method, you can just declare the method signature. The `Eat`
    method is a virtual method while `Speak` is a pure virtual method. Both methods
    needed to be overridden inside the subclass.


    Because the `Run` method is not virtual, it isn''t overridden by the subclass.
    So the output of the main method will be


    `Animal Runs`

    `Dog Speaks`

    `Dog Eats`


    ##### Multiple Inheritance


    In C++, your class can inherit from many superclasses, so you can reuse more properties
    and methods. For example, your `Teacher` class can inherit from both `Employee
    and Person` class, as in [Figure 9–4](#Chapter09.html#fig_9_4).


    ![images](images/0904.jpg)


    **Figure 9–4.** *Multiple inheritance*


    You can declare your class to inherit multiple classes by using


    `class Teacher : public Person, public Employee {`

    `}`


    There is one common problem with multiple inheritance: when two superclasses share
    the same method. For example, G `etIncome` can be declared from both `Person and
    Employee` class. So, when you call your `Teacher` object to get its income, you
    need to specify the superclass that you call it from.


    If you simply write


    `int currentIncome = pTeacher`![images](images/U003.jpg)`GetIncome();`


    you will get a compiler error


    `Member is ambiguous: ‘Person::GetIncome’ and ‘Employee::GetIncome’`


    You need to resolve this ambiguity by explicitly calling the superclass''s function
    you want to invoke.


    `int currentIncome = pTeacher`![images](images/U003.jpg)`Employee::GetIncome();`


    ##### Template


    In C++, you can define classes or methods to receive a specific type of objects
    only. For example, you can define a method that only receives two data of the
    same type to compare and return results.


    `template <class T>`

    `T GetMax (T a, T b) {`

    ` return (a>b)? a : b;`

    `}`


    `int main () {`

    ` int i=5, j=6, k;`

    ` long l=10, m=5, n;`

    ` k=GetMax<int>(i,j);`

    ` n=GetMax<long>(l,m);`

    ` return 0;`

    `}`


    By defining a template method, you can make sure that a and b have the same class
    type and can be compared with each other. You can do the same with template class
    without any issue.


    `template <class T>`

    `class mypair {`

    `   T a, b;`

    ` public:`

    `   mypair (T first, T second)`

    `     {a=first; b=second;}`

    `   T getmax () {`

    `return a>b? a : b;`

    `   }`

    `};`


    `int main () {`

    ` mypair <int> myobject (100, 75);`

    ` cout << myobject.getmax();`

    ` return 0;`

    `}`


    ### A Practical Example


    I will guide you through some examples to integrate C/C++ library inside the Objective-C
    code. One example is to integrate with SQLite libraries, the other is a sample
    application to mix C++ code to Objective-C code.'
  trans: "\n# 类\n\nC++ 与 Objective-C 类似，每个类都有两个文件：一个用于头文件，一个用于实现。你也可以指定私有和公有的成员/方法。以下是声明类头文件的标准方式：\n\
    \n```\nclass Cat {\n  public:\n       // 公开访问器\n     unsigned int GetAge();\n\
    \     void SetAge(unsigned int Age);\n     Cat ();\n     Cat (int initialAge);\
    \     // 构造函数\n     ~Cat();                   // 析构函数\n\n     // 公开成员函数\n    \
    \ void Meow();\n\n      // 私有成员数据\n   private:\n     unsigned int  itsAge;\n};\n\
    \n// GetAge, 公开访问器函数\n// 返回 itsAge 成员的值\nunsigned int Cat::GetAge() {\n     return\
    \ itsAge;\n}\n\n// 设置 itsAge 成员\nvoid Cat::SetAge(unsigned int age) {\n     //\
    \ 将成员变量 itsAge 设置为\n     // 参数 age 传入的值\n     itsAge = age;\n}\n\n// 动作：在屏幕上打印\
    \ \"meow\"\nvoid Cat::Meow() {\n     cout << \"Meow.\\n\";\n}\n\nint main() {\n\
    \  Cat cat;\n  cat.Meow();\n}\n```\n\n可以看到，要声明公有和私有成员，你需要将它们分区并放入限定符 `private`\
    \ 和 `public`，就像在 Objective-C 中定义头文件时使用相同的限定符 `@private` 和 `@public` 一样。对于类的实现，你需要在方法实现前加上类名，以声明该方法属于该类。\n\
    \n对于访问器和修改器，你需要显式声明它们：\n\n```\nunsigned int GetAge();\nvoid SetAge(unsigned int\
    \ Age);\n```\n\n要创建一个新的 `Cat` 对象，你可以直接声明 `Cat cat;`，然后调用方法 `cat.Meow();`。不过，该对象只存在于函数的局部作用域内。\n\
    \n对于内存管理，你可能需要同时声明构造函数和析构函数。如果你不声明自己的构造函数，编译器会假定它使用不带任何参数的默认构造函数。\n\n**注意：** 如果你声明了自己的构造函数，请记得也要声明你的析构函数，即使它什么都不做。这是一个良好的编程惯例。要使用\
    \ `Cat cat` 创建一个新的 `Cat` 对象，你需要一个默认构造函数。\n\n# 指针与内存管理\n\n如果你想在程序的其他地方使用新创建的对象，你需要在\
    \ C++ 的**自由存储区**上分配内存。该对象将一直保留在内存区域中，直到你显式调用 `delete` 释放那块内存，这与 C 语言编程类似。要声明一个指向包含整数的内存地址的指针，可以像下面这段代码这样操作：\n\
    \n```\nint *pInt;\npInt = new int;\n*pInt = 72;\n```\n\n要为对象分配和释放内存，你可以使用 `new`\
    \ 和 `delete` 关键字。\n\n```\nCat *pCat = new Cat;\npCat->SetAge(5);\ndelete pCat;\n\
    pCat = 0;\n```\n\n**注意：** 如果你对同一个指针调用了两次 `delete`，你的应用程序将会崩溃。如果在重新分配指针之前没有先将其声明（并释放），则会发生内存泄漏。\n\
    \n# 继承\n\nC++ 中的继承与 Objective-C 相比，有一些复杂的概念。你可以像往常一样实现继承、重写和多态。唯一的区别在于虚方法和纯虚方法的概念。\n\
    \n```\nclass Dog : Mammal {\n}\n```\n\n`Dog` 类将继承 `Mammal` 类的所有属性和方法，并且它可以拥有自己的属性和方法。当创建一个\
    \ `Dog` 对象时，会先调用 `Mammal` 的构造函数，然后才执行 `Dog` 类构造函数中的任何其他代码。\n\nC++ 继承中有一个重要的概念：你只能重写那些被声明为\
    \ **virtual** 的方法。对于其他方法，你只能继承它们，而不能重写。你可以在父类和子类中拥有两个同名的方法，但这不会发生重写和多态。而使用虚方法，子类被提示在必要时重写该方法。C++\
    \ 方法的默认限定符是非虚的。虚方法有两种：虚方法和纯虚方法。\n\n```\n#include \"stdafx.h\"\n#include \"stdio.h\"\
    \n\nusing namespace System;\n\nclass Animal {\n public:\n  virtual void Speak()\
    \ = 0;\n  virtual void Eat();\n  void Run();\n};\n\nvoid Animal::Eat()\n{\n  \
    \      printf(\"Animal eats\\n\");\n}\n\nvoid Animal::Run()\n{\n        printf(\"\
    Animal runs\\n\");\n}\n\nclass Dog : Animal\n{\npublic:\n        void Eat();\n\
    \        void Speak();\n        void Run();\n};\n\nvoid Dog::Eat()\n{\n      \
    \  printf(\"Dog eats\\n\");\n}\n\nvoid Dog::Run()\n{\n        printf(\"Dog runs\\\
    n\");\n}\n\nvoid Dog::Speak()\n{\n        printf(\"Dog speaks\\n\");\n}\n\nint\
    \ main()\n{\n        Animal *dog1 = (Animal *) new Dog;\n    dog1->Run();\n  \
    \  dog1->Speak();\n    dog1->Eat();\n        getchar();\n}\n```\n\n对于虚方法，你必须在父类中提供它的实现；而对于纯虚方法，你只需声明方法签名即可。`Eat`\
    \ 方法是一个虚方法，而 `Speak` 是一个纯虚方法。这两个方法都需要在子类中被重写。\n\n因为 `Run` 方法不是虚方法，所以它没有被子类重写。因此，`main`\
    \ 方法的输出将是：\n\n```\nAnimal Runs\nDog Speaks\nDog Eats\n```\n\n# 多重继承\n\n在 C++ 中，你的类可以继承自多个父类，因此你可以复用更多的属性和方法。例如，你的\
    \ `Teacher` 类可以同时继承自 `Employee` 和 `Person` 类，如图 9-4 所示。\n\n![images](img/0904.jpg)\n\
    \n**图 9–4.** *多重继承*\n\n你可以通过以下方式声明你的类继承多个类：\n\n```\nclass Teacher : public Person,\
    \ public Employee {\n}\n```\n\n多重继承有一个常见问题：当两个父类共享同一个方法时。例如，`GetIncome` 可以同时从\
    \ `Person` 和 `Employee` 类中声明。因此，当你调用 `Teacher` 对象的 `GetIncome` 方法时，你需要指定是从哪个父类中调用它。\n\
    \n如果你简单地写成：\n\n```\nint currentIncome = pTeacher->GetIncome();\n```\n\n你会得到一个编译器错误：\n\
    \n`Member is ambiguous: ‘Person::GetIncome’ and ‘Employee::GetIncome’`\n\n你需要通过显式调用你想调用的父类函数来解决这个歧义。\n\
    \n```\nint currentIncome = pTeacher->Employee::GetIncome();\n```\n\n# 模板\n\n在\
    \ C++ 中，你可以定义类或方法只接收特定类型的对象。例如，你可以定义一个只接收两个相同类型数据进行比较并返回结果的方法。\n\n```\ntemplate\
    \ <class T>\nT GetMax (T a, T b) {\n return (a>b)? a : b;\n}\n\nint main () {\n\
    \ int i=5, j=6, k;\n long l=10, m=5, n;\n k=GetMax<int>(i,j);\n n=GetMax<long>(l,m);\n\
    \ return 0;\n}\n```\n\n通过定义模板方法，你可以确保 `a` 和 `b` 具有相同的类类型并且可以相互比较。你也可以在模板类中执行相同的操作，而没有任何问题。\n\
    \n```\ntemplate <class T>\nclass mypair {\n   T a, b;\n public:\n   mypair (T\
    \ first, T second)\n     {a=first; b=second;}\n   T getmax () {\nreturn a>b? a\
    \ : b;\n   }\n};\n\nint main () {\n mypair <int> myobject (100, 75);\n cout <<\
    \ myobject.getmax();\n return 0;\n}\n```\n\n## 一个实际示例\n\n我将通过一些例子来指导你如何将 C/C++\
    \ 库集成到 Objective-C 代码中。一个例子是与 SQLite 库的集成，另一个例子是一个将 C++ 代码与 Objective-C 代码混合使用的示例应用程序。\n"
- fmt: "### SQLite\n\nSQLite is an underlying implementation for CoreData. In terms\
    \ of performance, SQLite offers slightly better performance because it is lighter\
    \ and more direct. However, CoreData supports you with a better object mapping\
    \ model, undo and redo features, working in batch, and thread.\n\nThe main advantage\
    \ of SQLite is that if your team is already strong with relational database and\
    \ relational SQL, the learning curve is slight. SQLite is also easier to port\
    \ into Android and then you can share the same data layer between iPhone and Android\
    \ applications.\n\nYou can read the source code example in `SQLiteSample project`.\
    \ I will give you only the important points here.\n\nYou need to create a SQL\
    \ database by opening your terminal and typing `sqlite3 students.sql`. This will\
    \ create a new database where you can create a table, insert, and select data\
    \ inside. You can create table and insert data as normal by using SQL.\n\n```\n\
    sqlite> CREATE TABLE students (pk INTEGER PRIMARY KEY, name VARCHAR(25));\nsqlite>\
    \ INSERT INTO students (name) VALUES ('khang');\nsqlite> INSERT INTO students\
    \ (name) VALUES ('vo');\nsqlite> INSERT INTO students (name) VALUES ('duy');\n\
    sqlite> .quit\n```\n\n[Figure 9–5](#Chapter09.html#fig_9_5) demonstrates more\
    \ clearly what happens inside the terminal.\n\n![images](images/0905.jpg)\n\n\
    **Figure 9–5.** *SQLite database*\n\nThen, you can find the `students.sql` file\
    \ in your `Home` folder (which is the default folder if you don't change to any\
    \ folder in terminal). You need to add that file into Xcode and then add the library\
    \ `libsqlite3.0.dylib`.\n\n```objective-c\n- (void)viewDidAppear:(BOOL)animated\
    \ {\n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"students\"\
    \ ofType:@\"sql\"];\n\n    if (sqlite3_open([path UTF8String], &database) == SQLITE_OK)\
    \ {\n        // Get the primary key for all books.\n        const char *sql =\
    \ \"SELECT pk, name FROM students\";\n        sqlite3_stmt *statement;\n\n   \
    \     // Preparing a statement compiles the SQL query into a byte-code program\
    \ in the SQLite library.\n        // The third parameter is either the length\
    \ of the SQL string or -1 to read up to the first null terminator.\n        if\
    \ (sqlite3_prepare_v2(database, sql, -1, &statement, NULL) == SQLITE_OK) {\n \
    \           // We \"step\" through the results - once for each row.\n        \
    \    while (sqlite3_step(statement) == SQLITE_ROW) {\n                const unsigned\
    \ char *name = sqlite3_column_text(statement, 1);\n                NSString *nameString\
    \ = [NSString stringWithCString:(char *)name\n                               \
    \                           encoding:NSASCIIStringEncoding];\n            }\n\
    \        }\n\n        // \"Finalize\" the statement - releases the resources associated\
    \ with the statement.\n        sqlite3_finalize(statement);\n    } else {\n  \
    \      // Even though the open failed, call close to properly clean up resources.\n\
    \        sqlite3_close(database);\n        NSAssert1(0, @\"Failed to open database\
    \ with message '%s'.\", sqlite3_errmsg(database));\n    }\n\n    [self.tableView\
    \ reloadData];\n}\n```\n\nThere are a couple of methods that you need to remember:\n\
    \n- `sqlite3_open([path UTF8String], &database) == SQLITE_OK` initializes and\
    \ assigns the new database object to your pointer.\n- `sqlite3_prepare_v2(database,\
    \ sql, -1, &statement, NULL) == SQLITE_OK` executes your sql command and puts\
    \ the result into the statement.\n- `while (sqlite3_step(statement) == SQLITE_ROW):`\
    \ Step over the results from executing the statement.\n\n### Integrate C++ into\
    \ Your Application\n\nIt takes almost no effort to integrate C into your application\
    \ because Objective-C is the superset of C. However, you need to be careful about\
    \ some details when you integrate C++ into your application.\n\nFirstly, you need\
    \ to create your C++ class inside the normal header and implementation files as\
    \ normal (`(.h and .cpp files)`). And then, you need to wrap your C++ file by\
    \ an Objective-C file with the extension `.mm` (which tells iOS environment that\
    \ these files are Objective-C++ files). Any file that wants to use these `.mm`\
    \ files need to be a `.mm` file as well.\n\nYou can look at the sample project\
    \ `TestC_CPlus`. First, you can see that there are two files, `Foo_Cpp.h` and\
    \ `Foo_Cpp.cpp`, that declare the `Foo_Cpp C++ Class`. Then, you wrap this file\
