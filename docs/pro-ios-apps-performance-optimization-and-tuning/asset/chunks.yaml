  trans: '

    ###### 核心动画


    `Core Animation`主要用于衡量 UI 线程每秒能向用户渲染（即绘制）多少帧画面。UI 线程也是负责处理用户交互的主线程。


    ![images](img/0224.jpg)


    **图 2–24.** `Core Animation` 结果中的三个主要面板


    如图 2–24 所示，有三个主要面板需要您关注，以了解 UI 渲染性能。第一个是第一个水平单元格中的图表。该图表显示了每秒帧数的变化。右侧最大的数字显示当前的每秒帧数；这个绝对值应尽可能高，最高值为每秒
    60 帧（60 FPS）。


    第二个图表是特定时间内的每秒帧数采样器；10 秒是 `Core Animation` 的默认值。


    ![images](img/0225.jpg)


    **图 2–25.** 每秒帧数列表


    图 2–25 实际上提供了过去 10 次运行时间内的每秒帧数列表。通常，如果在测试过程中您仍与应用交互并期望其流畅运行，则该数字应在 55-60 之间。如果数字较小，则可能意味着两种情况之一：要么您的
    UI 线程没有内容需要绘制，要么它无法获得 CPU 时间来绘制。如果是后一种情况，则存在严重的性能问题，导致 UI 线程过于繁忙而无法绘制任何内容。


    ![images](img/0226.jpg)


    **图 2–26.** 配置 `Core Animation` 的选项列表


    图 2–26 中的选项列表将在您运行工具时提供更多信息。


    *   `Color Blended Layers` 为不透明视图添加绿色层，为不透明视图添加红色层。这对于您将在第 3 章中看到的滚动性能非常重要。使所有视图不透明将加快渲染性能，因为
    GPU 无需在同一位置进行两次绘制。颜色将如图 2–27 所示显示。


    ![images](img/0227.jpg)


    **图 2–27.** 带有颜色混合层的 `Core Animation` 工具


    优点：


    *   `CoreAnimation` 提供了关于 UI 线程渲染/绘制应用 UI 过程及速度的总体概览。

    *   您可以通过在 `Core Animation Instrument` 内部配置选项来获取更多细节。


    缺点：


    *   您绝对需要在真机上运行此工具。

    *   它不提供与特定代码相关问题的详细信息。


    用途：


    *   当应用程序运行缓慢时，开发者应始终检查 UI 渲染，因为问题可能存在于渲染代码中，而非逻辑处理代码。


    ###### OpenGL ES 驱动


    `OpenGL ES Driver Instrument` 提供的信息与 `Core Animation` 工具几乎相同，因此此处不再重复举例。然而，`OpenGL`
    和 `Core Animation` 之间有一个显著区别。`Core Animation` 是比 `OpenGL` 更高层次的框架，因此 `Core Animation`
    实际上使用了 `OpenGL`。但是，如果您的代码没有直接使用任何 `OpenGL` 代码，则无需使用 `OpenGL ES Driver Instrument`。它仅对使用
    `OpenGL` 框架的应用或游戏有效。


    优点：


    *   与 `Core Animation` 相同。


    缺点：


    *   与 `Core Animation` 相同。


    用途：


    *   适用于使用 `OpenGL` 代码的应用程序。


    ##### 文件和网络访问测量


    就性能而言，所有开发者都需要记住一个重要的关键问题，那就是文件和网络 I/O。这个过程很慢，因为在 I/O 中，您需要处理或等待比处理器指令慢得多的事件。因此，除非高效执行，否则您的应用可能会浪费大量时间。您将在第
    4 章中了解更多关于文件和网络缓存的知识，以便在执行文件和网络 I/O 处理时节省时间。要衡量文件和网络 I/O 的性能，您有两个主要工具：`System
    Usage` 和 `File Activity`。


    ###### 系统使用情况


    ![images](img/0228.jpg)


    **图 2–28.** 系统 I/O 性能


    `System Usage` 用于测试 iOS 运行时环境中的文件和网络 I/O。如图 2–28 所示，某些时刻 I/O 活动会急剧增加。如果此文件处理耗时较长，要求用户等待其完成，这可能会成为性能的潜在问题。


    ![images](img/0229.jpg)


    **图 2–29.** 系统活动的详细列表


    图 2–29 显示了文件和网络 I/O 处理的详细列表。如果仔细观察列表，您会发现文件 `TableCellViewController.nib` 不断从文件系统加载。这可能是一个潜在问题。因此，一个小的优化措施是缓存该文件或将对象保存在内存中，这样就不需要多次加载。


    从 `System Activity` 和 `Object Allocations` 收集的信息应结合起来，以确保在性能和内存之间取得良好平衡。当内存非常有限时，您不能简单地缓存所需的任何文件。


    优点：


    *   提供关于加载了哪个文件、文件大小以及文件加载频率的详细信息。


    缺点：


    *   需要在真机上运行测试。


    用途：


    *   它帮助开发者就缓存文件或减少文件加载（直到需要时才加载）做出正确决策。它还有助于决定是否提前加载文件，以确保当应用需要该文件时，它已经在内存中，这将显著减少用户的等待时间。


    ###### 文件活动


    `File Activity Instrument` 的工作原理类似于 `System Usage Instrument`，但它提供了更多关于文件以及库读取的详细信息。如图
    2–30 所示，该工具提供了关于文件活动、读取/写入、文件属性和目录 I/O 的非常详细的信息。


    ![images](img/0230.jpg)


    **图 2–30.** `File Activity` 工具的主列表


    您通常会比关注其他部分更关注文件活动和读取/写入，因为这些属性与我们正在讨论的性能问题相关。


    ![images](img/0231.jpg)


    **图 2–31.** 文件活动的详细列表


    从图 2–31 中，您可以看到 `File Activity` 提供了有关 `AddressBook` 读取的信息。这是 `System Usage Instrument`
    未提供的信息。


    优点：


    *   提供关于加载了哪个文件、文件大小以及文件加载频率的详细信息。

    *   包含更多关于目录、文件属性以及执行了多少次读取和写入的信息。


    缺点：


    *   模拟器上的数据可能不准确。


    用途：


    *   该工具应与 `System Usage` 结合使用。

