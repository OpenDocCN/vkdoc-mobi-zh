  trans: "\n# 最不经常使用（LFU）算法\n\n该算法与最近最少使用算法略有不同。它关注的是某个项目被请求的频率。如果一个项目比其他项目被请求得更频繁，它就应该被保留在缓存中。表\
    \ 4-2 演示了最不经常使用算法。\n\n![images](img/t0402.jpg)\n\n正如你所见，使用相同的初始列表和相同的项目请求列表，这两种算法最终产生了不同的结果。\n\
    \n优点：\n\n- 它实际上将**缓存命中率**纳入策略考量，以决定某个项目是应该保留在缓存中还是从缓存中删除。\n\n缺点：\n\n- 考虑如下场景：项目\
    \ 1 在开始时被访问了 100 次。然而，从长远来看，它再也没有被访问过。问题是，项目 1 仍然会被保留在缓存中，因为没有其他项目被访问超过 100 次。\n\
    \n实现方式：可以通过文件或内存来实现。但如前所述，除非你需要在文件系统中存储大量数据（尤其是图片/视频）并且需要频繁访问/删除它们，否则你不需要使用这个算法。\n\
    \n内存：作为一项快速练习，请编写一段简短的 Objective-C 代码来实现该算法。在查看下面的提示之前，请先自行完成算法。\n\n再次强调，在进入下一页查看提示之前，请将其作为练习自行完成。\n\
    \n**提示**：你应该使用两个字典，一个用于记录缓存中名称 → 对象的映射，另一个用于记录名称 → 访问次数的映射。每当有新的请求到来时，你就增加该名称的访问次数，并检查是否需要删除旧的缓存。如果需要删除旧的缓存，那么你应该选择访问次数最少的缓存名称。\n\
    \n## 衡量缓存\n\n让我们通过一些示例练习来演示几个要点。正如在置换策略中所述，在决定缓存策略时，你需要面对四个主要问题：缓存命中率、延迟、存储限制和算法复杂度。算法复杂度取决于你的能力；如果你是一名优秀的开发者，它与其他因素相比，对决策的影响可能不大。\n\
    \n假设你有两个与缓存命中率和检索约束相关的文件缓存场景。\n\n- 一种策略是尝试缓存 1000 个小项目（每个项目小于 30KB）。你的缓存命中率是 70%。\n\
    - 另一种策略是缓存 60 个大项目（每个项目大约 500KB）。你的缓存命中率是 10%。\n\n如你所见，两种策略的存储成本是相同的：30MB。第一种策略的缓存命中率为你节省了\
    \ 21KB 的检索成本，而第二种策略则为你节省了 50KB。就检索成本而言，第二种策略为你节省了更多的带宽和加载时间。\n\n表 4-3 为你刚刚学到的术语提供了快速总结。\n\
    \n![images](img/t0403.jpg)\n\n### 你应该缓存什么\n\n开发者只应关注缓存少量内容：图片、视频、数据，或者有时是 HTML\
    \ 文件，以便它们可以在 `UIWebView` 中快速加载。我将它们分为两种主要类型：要么缓存整个文件，要么缓存数据以及数据之间的关系。对于每种类型，我将向你展示在存储这些文件时需要记住的一些重要特性。\n\
    \n#### 你应该将图片存储在哪里？\n\n对于你不存储在应用程序包中的文件，你必须考虑应该将它们存储在哪里。换句话说，你应该将文件缓存到哪里，以便能够检索它们并且不必担心其生命周期？有几个经典位置可以存储你的文件：临时目录、缓存目录、文档目录、相册（仅限图片/视频）以及应用程序包。每个位置都有其独特的特性，你需要了解并记住。\n\
    \n##### 临时目录\n\n你可以通过调用 `NSTemporaryDirectory();` 来访问和存储此目录中的数据。\n\n优点：\n\n- 它不会被备份。实际上，操作系统会在某个不确定的时间将其删除。当用户重启\
    \ iOS 设备时，临时目录也将被删除。\n- 你无需担心何时删除这些文件，因为这是操作系统的责任。\n\n缺点：\n\n- 当此目录被删除时，应用程序可能无法运行；因此，你无法对删除过程进行任何操作或控制。\n\
    - 如果你后来决定从此目录中检索文件/图片，它们很可能已经不存在了。\n\n用途：\n\n- 如果你需要快速且临时地存储某些内容。例如，你想存储应用程序的一些截图，以便在用户等待时展示给他们看。因为这些截图与应用程序状态相关，所以你不太关心需要长期存储它们。\n\
    \n##### 缓存目录\n\n你可以通过使用以下代码片段来访问和存储此目录中的数据：\n\n```\n+ (NSString *)userCacheDirectory\
    \ {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSCachesDirectory,\
    \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\n优点：\n\
    \n- 它不会被备份。这有助于加快用户将应用与 iTunes 同步时的备份过程。\n- 它不会被 iOS 自动删除。你可以控制存储哪些文件以及何时存储。\n\
    \n缺点：\n\n- 你需要确保此目录不会增长过大。换句话说，你需要确保它不会消耗用户过多的硬盘空间。\n\n用途：\n\n- 这是存储缓存文件的主目录。它是存储图片/视频/文件的理想位置，以便日后展示给用户。\n\
    \n##### 文档目录\n\n你可以通过使用以下代码片段来访问和存储此目录中的数据：\n\n```\n+ (NSString *)userCacheDirectory\
    \ {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\n优点：\n\
    \n- 它会被备份。因此，你存储在其中的文件/图片可能永远不会丢失。\n- 它不会被操作系统删除。\n\n缺点：\n\n- 你需要自己管理这个文件夹，并确保它不会增长过大。我见过许多应用程序将数据存储在此文件夹中，导致备份整个设备需要数小时。主要时间都花在了存储文档目录中的图片上。\n\
    - 如果你的应用允许通过 iTunes 进行文件共享，那么你存储在此处的任何文件都会在 iTunes 中显示（参见图 4-5）。因此，请注意不要使用会让用户混淆的愚蠢文件名。\n\
    \n    ![images](img/0405.jpg)\n\n    **图 4-5.** *文档文件夹内的文档列表*\n\n用途：\n\n- 如果你希望文件被备份且日后不丢失，那么你应该考虑使用这个\
    \ `Document` 目录。它是存放从 Web 服务下载的、用户希望永久保留的文档或照片的好地方。\n"
- fmt: '### Photo Album


    This directory belongs to the OS and will be shared between many applications.
    You are allowed to store photos and videos inside these albums. The main application
    for users to see all photos and videos in an iOS device is the Photos app, as
    shown in [Figure 4–6](#Chapter04.html#fig_4_6).


    ![images](images/0406.jpg)


    **Figure 4–6.** *Images and videos inside the Photos app*


    To store photos and videos inside the Photos app, use the appropriate code snippet.


    For images:


    `UIImageWriteToSavedPhotosAlbum (imageToSave, nil, nil, nil).`


    Note that the `imageToSave` is an `UIImage` variable.


    For videos:


    ```

    // I assume that this video will be downloaded from the Internet

    NSData *videoData = [self getVideoDataFromNetwork];

    NSString *moviePath = [NSTemporaryDirectory()stringByAppendingPathComponent: @”video.mp4”];

    UISaveVideoAtPathToSavedPhotosAlbum (moviePath, nil, nil, nil)

    ```


    Advantages:


    - It will be backed up.

    - It can be shared with other apps.


    Disadvantages:


    - You have no way to delete these photos and videos after you save them into the
    photos album.

    - After you save the images and videos, they are absolutely out of your application''s
    control.


    Usage:


    - This is good if you want to share images and videos that your app generates
    or gets from a web service to other apps so user can view them.


    ### Application Bundle


    Images and videos will be bundled to your app when you develop the app and will
    be installed with the app, as shown in [Figure 4–7](#Chapter04.html#fig_4_7).


    ![images](images/0407.jpg)


    **Figure 4–7.** *Images bundled with the application*


    To get files, you can use the following code snippets:


    Images:


    `UIImage *image = [UIImage imageNamed:@"check_icon.png"];`


    Other Files:


    ```

    NSString *path = [[NSBundle mainBundle] bundlePath];

    NSString *questionsPath = [path stringByAppendingPathComponent:@"Questions.plist"];

    NSArray *questionData = [NSArray arrayWithContentsOfFile:questionsPath];

    ```


    Advantages:


    - It goes with your application.


    Disadvantages:


    - These images/videos are static so you can''t change, add, or delete any.

    - If you put too many files into the application bundle, it will become too heavy.
    Users will have to wait too long for it to download and install.

    - The only way to change the image or video is to release a new update.


    Usage:


    - For static images and videos that you know for sure you will use often in your
    app. These are generally icons or videos that you will show again and again inside
    your app.


    ## Data Caching


    For data caching, you may have to handle structured data; it''s up to you to decide
    how and where to store that data. Here are the main ways to store your data.


    ### Storing in plist/xml/json


    You can store your structured data in a simple form with the plist or XML format;
    this can be visualized easily, as shown in [Figure 4–8](#Chapter04.html#fig_4_8).


    ![images](images/0408.jpg)


    **Figure 4–8.** *Data can be stored easily and visualized*


    You can also see the data in XML format, as shown in [Figure 4–9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    **Figure 4–9.** *DPlist Data can be viewed and edited in XML format*


    You can load and parse the plist file by using the following code:


    ```

    NSString *path = [[NSBundle mainBundle] bundlePath];

    NSString *questionsPath = [path stringByAppendingPathComponent:@"Questions.plist"];

    NSArray *questionsData = [NSArray arrayWithContentOfFile:questionsPath];

    ```


    Advantages:


    - It''s easy to visualize and add/edit/change your data.

    - It is easy to parse data because all data will be translated to `NSArray`, `NSDictionary`,
    `NSString`, `NSNumber`, etc.


    Disadvantages:


    - When you need to load the plist file, you need to load the whole file, which
    is very time- and CPU-consuming.

    - You can''t create a complicated object model with plist.


    Usage:


    - To create an initial and static data for your application to use.


    ### Storing in CoreData


    CoreData is a strong and powerful built-in framework provided by Apple to help
    developers manage and control their data easily. It creates a layer of object-oriented
    abstraction over the relational relationship problem between data. You can create
    your object relational model using drag and drop. [Figure 4–10](#Chapter04.html#fig_4_10)
    shows an example of a CoreData model between questions, answers, and their categories.


    ![images](images/0410.jpg)


    **Figure 4–10.** *CoreData object relational model*


    CoreData will also generate code automatically. [Figures 4–11](#Chapter04.html#fig_4_11)
    and [4–12](#Chapter04.html#fig_4_12) show you the code that is generated for the
    object question in [Figure 4–10](#Chapter04.html#fig_4_10). CoreData will take
    care of all actions from storing, retrieving, and managing relationship between
    objects. There are great books on CoreData if you''re interested in more information
    on using it to store data.


    ![images](images/0411.jpg)


    **Figure 4–11.** *Code generated for the header file of the object*


    ![images](images/0412.jpg)


    **Figure 4–12.** *Code generated for the implementation file of the object*


    Advantages:


    - It can help you to create an object-oriented model.

    - You don''t need to worry about storing, managing, or updating your data with
    code. CoreData will take care of it.

    - It offers better performance than SQLite, actually. From my own experience and
    testing, CoreData runs faster than SQLite in many cases.


    Disadvantages:


    - It''s not easy to visualize your data. You do not have a UI to manage the initial
    data.

    - Sometimes you don''t need to have a separate object model.


    Usage:


    - It''s a powerful tool to manage your dynamic data. You should use this to cache
    your data in most cases.


    ### Storing in SQLite


    CoreData uses SQLite as its backend storage. However, CoreData can be implemented
    with other SQL database frameworks, so it''s hard to say if CoreData is more powerful
    than SQLite. Using SQLite is just like using other SQL database frameworks, with
    a few minor changes here and there.


    Advantages:


    - It''s a relational database. If you''re familiar with relational databases,
    you should have no problem.


    Disadvantages:


    - It''s hard to visualize all the data inside your SQLite database.

    - You may need to write more SQL to implement all features you need.


    Usage:


    - You want to have a portable database between different platforms: iPhone, Blackberry,
    Android, and Windows Phone. Because SQLite is written purely in C. CoreData has
    a tight relationship with Cocoa and Cocoa Touch Framework.'
