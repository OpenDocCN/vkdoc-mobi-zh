- fmt: "# Linked List\n\nThe specification and supported public methods (API) of a\
    \ linked list and an array are usually the same in many cases. You can add an\
    \ object in anywhere into a linked list, retrieve object from any index inside\
    \ the linked list, check for the existing object inside the linked list, and sort\
    \ the linked list. However, the main difference between a linked list and an array\
    \ is shown in [Figure 5–13](#Chapter05.html#fig_5_13).\n\n![images](images/0513.jpg)\n\
    \n**Figure 5–13.** *Comparison between an array and a linked list*\n\nAs you can\
    \ see, in an array, you store items in an indexed position and you can access\
    \ any item inside the array using the index. However, in linked list, the main\
    \ `List` object that holds the List will only hold the first and the last item.\
    \ (For simplicity, I won't discuss the doubly linked list inside which you can\
    \ go forward and backward). To access any object inside the linked list, you have\
    \ to go from one of two sides: the first item or the last item. If you go by the\
    \ first item, you move forward one by one item until you reach the index that\
    \ you want. If you go by the last item, you move backwards one by one item until\
    \ you reach the index that you want. [Figures 5–14](#Chapter05.html#fig_5_14)\
    \ and [5–15](#Chapter05.html#fig_5_15) illustrate the process.\n\n![images](images/0514.jpg)\n\
    \n**Figure 5–14.** *Accessing the item at index 2 (third item) in the linked list*\n\
    \n![images](images/0515.jpg)\n\n**Figure 5–15.** *Accessing the third last item\
    \ in the linked list*\n\nI will give you a sample implementation for linked list;\
    \ it's not a perfect implementation but you can use it in most cases. You should\
    \ download the source code project `LinkedList` for a full version of the sample.\
    \ I shall briefly explain the most important parts to make sure you fully understand\
    \ the linked list concepts.\n\nThere are two main objects in the implementation,\
    \ `Node` and `List`. The `List` object holds the first and the last node, as shown\
    \ in [Figure 5–12](#Chapter05.html#fig_5_12). Every `Node` object contains three\
    \ items: the item inside the `Node`, the next item, and the previous item. For\
    \ the first item, the previous item will point to a `nil` object; similarly, for\
    \ the last item, the next item will point to a `nil` object; see [Listings 5–5](#Chapter05.html#list_5_5)\
    \ and [5–6](#Chapter05.html#list_5_6).\n\n**Listing 5–5.** *ListNode*\n\n**`ListNode.h`**\n\
    \n```\n// Structure representing a\n// doubly-linked list node\n@interface ListNode\
    \ : NSObject {\n @private\n   NSObject *value;\n   ListNode *next;\n   ListNode\
    \ *pre;\n}\n@property (nonatomic, strong) NSObject *value;\n@property (nonatomic,\
    \ strong) ListNode *next;\n@property (nonatomic, strong) ListNode *pre;\n\n- (id)initWithObject:(NSObject\
    \ *)object;\n\n@end\n```\n\n**`ListNode.m`**\n\n```\n@implementation ListNode\n\
    \n@synthesize value;\n@synthesize next;\n@synthesize pre;\n\n- (id)initWithObject:(NSObject\
    \ *)object {\n   if (self = [super init]) {\n       self.value = object;\n   }\n\
    \   return self;\n}\n\n@end\n```\n\n**Listing 5–6.** *Linked List*\n\n**`LinkedList.h`**\n\
    \n```\n@interface LinkedList : NSObject {\n @private\n   ListNode *head;\n   ListNode\
    \ *tail;\n   ListNode *current;\n}\n\n@property (nonatomic, strong) ListNode *head;\n\
    @property (nonatomic, strong) ListNode *current;\n@property (nonatomic, strong)\
    \ ListNode *tail;\n\n- (id)initWithHead:(NSObject *)value;\n- (void)addToFront:(NSObject\
    \ *)value;\n- (void)addToBack:(NSObject *)value;\n- (void)insertObjectAtIndex:(NSInteger)index;\n\
    - (NSObject *)first;\n- (NSObject *)currentValue;\n- (NSObject *)next;\n- (NSObject\
    \ *)previous;\n\n- (NSUInteger)count;\n- (NSObject *)objectAtIndex:(NSInteger)index;\n\
    \n- (BOOL)removeCurrent;\n- (BOOL)removeObjectAtIndex:(NSInteger)index;\n\n@end\n\
    ```\n\n**`LinkedList.m`**\n\n```\n@implementation LinkedList\n@synthesize current;\n\
    @synthesize head;\n@synthesize tail;\n\n- (id)initWithHead:(NSObject *)value {\n\
    \  // to be implemented and explained later\n  return nil;\n}\n- (void)addToFront:(NSObject\
    \ *)value {\n  // to be implemented and explained later\n}\n\n- (void)addToBack:(NSObject\
    \ *)value {\n  // to be implemented and explained later\n}\n\n- (void)insertObject:(NSObject\
    \ *)object atIndex:(NSInteger)index {\n  // to be implemented and explained later\n\
    }\n\n- (NSObject *)first {\n  // to be implemented and explained later\n  return\
    \ nil;\n}\n- (NSObject *)currentValue {\n  // to be implemented and explained\
    \ later\n  return nil;\n}\n- (NSObject *)next {\n  // to be implemented and explained\
    \ later\n  return nil;\n}\n- (NSObject *)previous {\n// to be implemented and\
    \ explained later\n  return nil;\n}\n- (NSObject *)objectAtIndex:(NSInteger)index\
    \ {\n// to be implemented and explained later\n  return nil;\n}\n- (NSUInteger)count\
    \ {\n  // to be implemented and explained later\n  return -1;\n}\n- (BOOL)removeCurrent\
    \ {\n  // to be implemented and explained later\n  return NO;\n}\n\n- (BOOL)removeObjectAtIndex:(NSInteger)index\
    \ {\n  // to be implemented and explained later\n  return NO;\n}\n\n@end\n```\n\
    \nAs you can see from [Listing 5–6](#Chapter05.html#list_5_6), the `LinkedList`\
    \ object has the capability to get objects from the list in the forward or backward\
    \ order, as well as to add to the first or the end of the linked list. I will\
    \ show you only the main implementation methods because others are similar or\
    \ easy to implement yourself.\n\nThere are six main methods that you will need\
    \ to think about when implementing a linked list: `init`, add object, get object,\
    \ `count`, remove object, and release the whole list.\n\n### Init\n\n```\n- (id)initWithHead:(NSObject\
    \ *)value {\n   if ((self = [super init]) != nil) {\n       head = [[ListNode\
    \ alloc] initWithObject:value];\n   }\n   return self; }\n```\n\nYou need to allocate\
    \ the head of the list first; this head will hold the next item.\n\n### Add Object\n\
    \n```\n- (void)addToFront:(NSObject *)value {\n   ListNode *node = [[ListNode\
    \ alloc] initWithObject:value];\n   // new element becomes the head node\n   node.next\
    \ = head;\n   head.pre = node;\n   self.head = node;\n}\n```\n\nAdding into the\
    \ first spot of the linked list is easy and fast; you just need to relink the\
    \ `LinkedList` object with the new node. Adding to the end is similar and I leave\
    \ it as an exercise for you.\n\nTo add a new node the beginning, you need to remove\
    \ the link of objects around the position you desire and relink them with the\
    \ new element, as shown in [Figure 5–16](#Chapter05.html#fig_5_16).\n\n![images](images/0516.jpg)\n\
    \n**Figure 5–16.** *Inserting new object to the middle of the array*\n\nTo insert\
    \ an element into a current position in the list, you can use the following code\
    \ snippet:\n\n```\n- (void)insertObject:(NSObject *)object atIndex:(NSInteger)index\
    \ {\n   ListNode *currentNode = self.head;\n   ListNode *previousNode = nil;\n\
    \   ListNode *nextNode = nil;\n\n   // find two items around the place that you\
    \ need to add an object in\n   for (int i = 1; i <= index; i++) {\n       currentNode\
    \ = currentNode.next;\n       if (i == index - 1) {\n           previousNode =\
    \ currentNode;\n       } else if (i == index) {\n           nextNode = currentNode;\n\
    \       }\n   }\n\n   // add your object in\n   ListNode *newNode = [[ListNode\
    \ alloc] initWithObject:object];\n   if (!previousNode) {\n       self.head =\
    \ newNode;\n   } else {\n       previousNode.next = newNode;\n       newNode.pre\
    \ = previousNode;\n\n       nextNode.pre = newNode;\n       newNode.next = nextNode;\n\
    \   }\n}\n```\n\nTo insert an object at random position or in the middle of the\
    \ linked list, you need to figure out where to put your node. Therefore, the first\
    \ part of the code is to loop through the current linked list and find the previous\
    \ node as well as the next node to insert an object in between. After that, you\
    \ link nodes around the place with the new node."
  raw: '##### Linked List


    The specification and supported public methods (API) of a linked list and an array
    are usually the same in many cases. You can add an object in anywhere into a linked
    list, retrieve object from any index inside the linked list, check for the existing
    object inside the linked list, and sort the linked list. However, the main difference
    between a linked list and an array is shown in [Figure 5–13](#Chapter05.html#fig_5_13).


    ![images](images/0513.jpg)


    **Figure 5–13.** *Comparison between an array and a linked list*


    As you can see, in an array, you store items in an indexed position and you can
    access any item inside the array using the index. However, in linked list, the
    main `List` object that holds the List will only hold the first and the last item.
    (For simplicity, I won''t discuss the doubly linked list inside which you can
    go forward and backward). To access any object inside the linked list, you have
    to go from one of two sides: the first item or the last item. If you go by the
    first item, you move forward one by one item until you reach the index that you
    want. If you go by the last item, you move backwards one by one item until you
    reach the index that you want. [Figures 5–14](#Chapter05.html#fig_5_14) and [5–15](#Chapter05.html#fig_5_15)
    illustrate the process.


    ![images](images/0514.jpg)


    **Figure 5–14.** *Accessing the item at index 2 (third item) in the linked list*


    ![images](images/0515.jpg)


    **Figure 5–15.** *Accessing the third last item in the linked list*


    I will give you a sample implementation for linked list; it''s not a perfect implementation
    but you can use it in most cases. You should download the source code project
    `LinkedList` for a full version of the sample. I shall briefly explain the most
    important parts to make sure you fully understand the linked list concepts.


    There are two main objects in the implementation, `Node` and `List`. The `List`
    object holds the first and the last node, as shown in [Figure 5–12](#Chapter05.html#fig_5_12).
    Every `Node` object contains three items: the item inside the Node, the next item,
    and the previous item. For the first item, the previous item will point to a nil
    object; similarly, for the last item, the next item will point to a nil object;
    see [Listings 5–5](#Chapter05.html#list_5_5) and [5–6](#Chapter05.html#list_5_6).


    **Listing 5–5.** *ListNode*


    **`ListNode.h`**

