    \ starts with character “k.” You will need to loop over all the elements as in\
    \ the array. The performance for this case is: O(n).\n\nAccess:\n\n*   You can't\
    \ access any item directly by its index, like in array. One way to access the\
    \ element discussed in the search section is by creating a mock object that isEqual:\
    \ to the object you want to access. The performance is O(1).\n\nSort:\n\n*   Cocoa\
    \ Touch framework doesn't provide a good way to sort an NSMutableSet. It only\
    \ provides you with a method to return a sorted array. Based on the sorting performance\
    \ of an array, I can estimate that the performance for a sorting in set is: O(nlogn).\n\
    \n[Table 5–4](#Chapter05.html#tab_5_4) *shows the common methods and APIs for\
    \ NSMutableSet.*\n\n![images](images/t0504.jpg)\n\n![images](images/t0504a.jpg)\n\
    \n**NOTE:** One important factor for in using NSMutableSet and NSSet is their\
