  trans: '

    ### 如何识别性能瓶颈


    从文件或网络加载数据主要存在两个问题。


    - 用户必须等待很长时间，应用才能显示图像。这个时间可能会随着图像数量的增加而成比例增长。如果用户界面（UI）需要在运行诸如 `UITableView` 之类的组件时加载大量图像，用户每次向下滚动查看更多信息时都不得不等待。

    - 它可能会阻塞 UI，导致用户无法正常与 UI 交互。这一点在第 6 章中也有提及。


    因此，由于从文件/网络加载比在内存中加载和处理数据/图像花费的时间多得多，这个加载过程通常会成为你的性能瓶颈。如果你的应用必须等待网络数据，那么所有其他进程也必须等待。所以，当遇到性能问题时，测试文件/网络加载应该始终是你的首要任务。正如你在第
    2 章中所见，你可以通过 `System Activity` 和 `File Activity` 来观察数据加载过程。图 4-1 展示了这些工具的界面。


    ![images](img/0401.jpg)


    **图 4-1.** `File Activity` 工具


    ![images](img/0402.jpg)


    **图 4-2.** `File Activity` 的结果列表


    图 4-1 展示了文件活动，包括加载和写入文件/目录以及读取文件属性。图 4-2 则展示了每项活动的更多细节，帮助你了解哪些类型的文件活动运行得最频繁。


    ![images](img/0403.jpg)


    **图 4-3.** `System Usage` 工具


    ![images](img/0404.jpg)


    **图 4-4.** `System Usage` 的结果列表


    图 4-3 和 4-4 更详细地展示了 `System Usage`，它更为通用，涵盖了更多的数据类型。正如你在图 4-4 中所见，其中包含了与 `plist`
    和 `nib` 文件相关的活动。


    ### 缓存入门


    本节将解释缓存中许多重要的术语和概念，并介绍一些适用于通用环境（如 Web 和桌面应用程序）的基本缓存算法。这些算法中有很多可以应用于 iPhone 环境；本章后续部分将会详细说明。


    我将解释以下概念：缓存命中、缓存未命中、检索成本、存储成本、失效、替换策略以及缓存衡量。然后，我将解释一些最常用的缓存算法：Belady 算法、随机替换、先进先出（FIFO）、最不经常使用（LFU）、简单基于时间的、最近最少使用（LRU）以及自适应替换缓存（ARC）。


    #### 什么是缓存？


    缓存是指将一部分数据集/图像存储在更近的层级中。例如，如果原始图像来自网络，你可以将数据/图像存储在文件系统中，这样下次你的应用就无需再通过网络来获取这些数据/图像。同样，如果数据/图像已在文件系统中，你可以将其存储在内存中，以便在需要时能立即进行计算或显示。


    #### 缓存命中


    缓存命中发生在你的应用查找特定数据/图像时，它在缓存中找到了该数据/图像，并直接从中加载。这是一件好事，因为它无需从原始来源加载。换句话说，它节省了时间。


    缓存命中率通常用于判断你的算法是优是劣。该指标通常会结合每次缓存命中时节省的容量大小来考量。例如，如果你决定存储较小的图像（每张 4KB），并且缓存命中率约为
    90%，那么你已经节省了 3.6KB。这种节省有助于改善从网络和文件活动中加载的时间。然而，如果你存储大图像（每张 200KB），且缓存命中率约为 10%，那么你已经节省了加载
    20KB 的成本。另一个需要考虑的角度是用户对性能的感受：如果用户知道他们将收到一张大图像，并且愿意等待网络加载，那么不经常缓存该图像也是可以的。


    #### 缓存未命中


    缓存未命中发生在你的应用查找特定图像/数据时，在缓存中找不到它，因此需要从原始位置检索。这对你的应用来说可能是一件坏事，例如，当应用未连接到互联网时。当应用未连接到互联网且发生大量缓存未命中时，应用可能会向用户显示空白图像/数据。为了避免这种情况，你通常需要在应用联网时缓存大量图像和数据，以便在离线时显示它们。


    #### 检索成本


    检索成本是指将图像/数据从网络/文件加载到下一个数据层级所需的开销。这可以分成两种情况。


    - **从网络加载到文件**：如之前的例子所示，与从文件和内存加载相比，这消耗的时间最多。网络数据的检索成本很高。

    - **从文件加载到内存**：从文件加载到内存消耗的时间较少，因此这种情况下的检索成本较低。


    #### 存储成本


    存储成本也分为两种情况：存储在文件和存储在内存中。


    - 文件系统通常比内存系统大；因此你可以在文件系统中存储更多的数据/图像。iPhone 文件系统根据设备本身的不同，最多可容纳 8、16 或 32GB。如果你使用
    RSS 阅读器阅读新闻，并且该阅读器持续存储新闻中的所有图像，你的存储空间很快就会用满 8GB。你必须记住，在这 8GB 中，用户还存储着他们的音乐、视频以及所有其他应用的缓存。你的应用只应使用最多几百兆字节；否则，用户可能很快就会删除你的应用。

    - iPhone 4 设备中的内存系统确实有限，最多只能存储 512MB，并且其中大部分内存被后台运行的其他应用和操作系统占用。一个应用可用于存储自身内部数据以进行处理的最大内存约为
    256MB。较旧的 iPhone 设备，如 iPhone 3GS 或 iPhone 3G，最多只能使用 64 或 128MB。此外，别忘了在显示应用时，你还需要显示和存储的所有
    nib 文件和视图控制器。最后，对于最新的 iPhone，你大约可以存储 50 张 1MB 大小的图像。与 iPhone App Store 中许多消耗内存的应用和游戏相比，这实际上并不多。

