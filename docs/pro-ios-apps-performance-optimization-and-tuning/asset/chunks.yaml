- fmt: "# Search\n\nLet's talk about the search strategy in data structures, such\
    \ as `array`, `linked list`, `set`, and `dictionary`. As mentioned, `set` and\
    \ `dictionary` are built based on a hash table, so searching for these data structures\
    \ requires having an object that has a key and a hash value equal to the ones\
    \ you are searching. Searching for these data structures is done in the time of\
    \ `O(1)` (which means really fast).\n\nFor `array` and `linked list`, the problem\
    \ is harder. If you want to search, you can use one of two strategies:\n\n* Traverse\
    \ through the array/linked list until you find the item you want. The performance\
    \ is `O(n)`.\n* Sort the array or linked list and then use an optimal search strategy\
    \ (binary search, which I will discuss later). The performance is `O(n * log(n))\
    \ + O(log n)`, which means `O(n * log(n))`, because you only care about the fastest\
    \ growing term.\n\nSo, as you can see, if you have an array that is always sorted,\
    \ it takes you `O(log n)` to find the item you want. I will show you how to create\
    \ a data structure that is always sorted in the “Binary Tree” section.\n\n## Binary\
    \ Search\n\nRemember the childhood game where a friend asks you to guess a number\
    \ he's thinking of between 1 and 20? When you guess a number, he tells you three\
    \ things: your guess is larger, equal, or smaller than the actual number in his\
    \ head.\n\nWhat's the best way to start? Do you start from 1 and continue to 20?\
    \ Or should you start to 5 and then know which way to go next?\n\nIf you go with\
    \ 10 and your friend says that your guess is smaller than the actual number, then\
    \ you know that the actual number is between 10 and 20. Amazing! You just divided\
    \ the set by half and now you only need to guess 10 more numbers. In three or\
    \ four more steps you will figure out the number.\n\nIf you go sequentially from\
    \ 1 to 20, in the worst case, you need to guess 20 times. In most cases, you will\
    \ need to guess more than five times. There are only five times that you can guess\
    \ correctly with less than five guesses. This is illustrated by [Figure 5–22](#Chapter05.html#fig_5_22).\n\
    \n![images](images/0522.jpg)\n\n**Figure 5–22.** *Binary Search in a sorted array*\n\
    \nThat is binary search; it's really quite simple. Here is a code snippet for\
    \ you to implement it on an array:\n\n```\n- (void)methodToCall {\n    NSMutableArray\
    \ *myArray = [NSMutableArray array];\n    for (int i = 0; i < 20; i++) {\n   \
    \     [myArray addObject:[NSNumber numberWithInt:i]];\n    }\n    // find number\
    \ 15.\n    NSInteger index = [self indexForNumber:[NSNumber numberWithInt:15]\
    \ inArray:myArray];\n    NSLog(@\"index: %d\", index);\n}\n\n// Note that this\
    \ method only works if the array is already sorted\n- (NSInteger)indexForNumber:(NSNumber\
    \ *)number inArray:(NSArray *)array {\n    int firstIndex = 0;\n    int uptoIndex\
    \ = [array count];\n\n    while (firstIndex < uptoIndex) {\n        int mid =\
    \ (firstIndex + uptoIndex) / 2;   // Compute mid point.\n        if ([number intValue]\
    \ < [[array objectAtIndex:mid] intValue]) {\n            uptoIndex = mid;    \
    \  // repeat search in bottom half.\n        } else if ([number intValue] > [[array\
    \ objectAtIndex:mid] intValue]) {\n            firstIndex = mid + 1;  // repeat\
    \ search in top half.\n        } else {\n            return mid;      // Found\
    \ it. return position\n        }\n    }\n    return -1;     // Failed to find\
    \ key\n}\n```\n\nThe main job of the algorithm is to look into the middle of the\
    \ array. If the value of the middle element is less than the value of the data\
    \ you are finding, the algorithm divides the array by half; it then takes the\
    \ first half and continues with that first half until only one item is left. If\
    \ the value of the middle element is greater than the value of the data you are\
    \ finding, it will take the second half.\n\n**NOTE:** Binary search only works\
    \ with sorted array or list. It assumes that the data in the right is always greater\
    \ than the data in the left, so it can divide the data array by half.\n\n### Binary\
    \ Tree\n\nBinary tree combines two other structures inside: an ordered array,\
    \ a linked list, and the binary search algorithm.\n\nThere are many uses for a\
    \ binary tree:\n\n* It is always sorted in a fast way. The performance to add\
    \ in a new object is `O(log n)`.\n* It can always be used with binary search without\
    \ any necessary calculations (because it is always sorted).\n\nIf you want an\
    \ array/linked list that is always arranged in order (in other words, an ordered\
    \ array/linked list), you may need to choose one of these approaches:\n\n* For\
    \ an already sorted array: When you need to insert new item in middle of the array,\
    \ you need to look for the position and then shift all items to the right. This\
    \ will take `O(n)` to run. The performance problem is when you need to shift all\
    \ the items to the right to insert (or left to delete).\n* For an already sorted\
    \ linked list: With the insert/delete object inside, the linked list is really\
    \ fast. However, although the linked list is already sorted, you have to traverse\
    \ the list to find a place to insert the new object. The performance of this traverse\
    \ is `O(n)`.\n* Adding to the end until you need to search or retrieve data, and\
    \ then sort the array/linked list. The sort operation will take `O(n * log(n))`\
    \ to complete.\n\nSo, binary tree is a best way to implement a sorted collection\
    \ so you can find the item easily within `O(log n)` performance.\n\nI've discussed\
    \ why you should use a binary tree, but you may still have some questions. What\
    \ is a tree? What is a binary tree? Before I answer those questions, I want to\
    \ introduce to you the concept of *node* and *edge*.\n\n#### Node and Edge\n\n\
    Nodes are shown by the circles in [Figure 5–23](#Chapter05.html#fig_5_23), while\
    \ the lines show the edges. Nodes can be labeled with a name or number to make\
    \ them unique in the tree. Each edge is bounded by the two nodes at its ends.\n\
    \n![images](images/0523.jpg)\n\n**Figure 5–23.** *Vertex and edge illustration*\n\
    \n#### Tree\n\nA tree is a collection of points (usually called nodes) and connections\
    \ (usually called edges) between these points. The tree has a node as the root,\
    \ and nodes inside a tree are connected with each other by directed edges. Every\
    \ node inside a tree must have at most one parent and no cycles are allowed. A\
    \ simple illustration is shown in [Figure 5–24](#Chapter05.html#fig_5_24).\n\n\
    ![images](images/0524.jpg)\n\n**Figure 5–24.** *Tree example*\n\nA binary tree\
    \ is a tree in which each node has 0, 1, or 2 children. [Figure 5–24](#Chapter05.html#fig_5_24)\
    \ also represents a binary tree. [Figure 5–25](#Chapter05.html#fig_5_25) shows\
    \ a non-tree because it creates a cycle inside it and node 5 has two parent nodes:\
    \ 2 and 4.\n\n![images](images/0525.jpg)\n\n**Figure 5–25.** *Non-tree example*\n\
    \nThe two children of each node in a binary tree are called the left child and\
    \ the right child, as shown in [Figure 5–26](#Chapter05.html#fig_5_26).\n\n![images](images/0526.jpg)\n\
    \n**Figure 5–26.** *Left and right child*\n\nA binary search tree is a binary\
    \ tree in which the right node is greater than the direct parent and the parent\
    \ is greater than the left node for any three nodes that you pick from the binary\
    \ tree. This is the technical name of the binary tree that I always talk about.\
    \ For simplicity, I will use *binary tree* to talk about the *binary search tree*.\
    \ [Figure 5–27](#Chapter05.html#fig_5_27) illustrates an example.\n\n![images](images/0527.jpg)\n\
    \n**Figure 5–27.** *Binary Search Tree*"
  raw: '###### Search


    Let''s talk about the search strategy in data structures, such as array, linked
    list, set, and dictionary. As mentioned, set and dictionary are built based on
    a hash table, so searching for these data structures requires having an object
    that has a key and a hash value equal to the ones you are searching. Searching
    for these data structures is done in the time of O(1) (which means really fast).


    For array and linked list, the problem is harder. If you want to search, you can
    use one of two strategies:


    *   Traverse through the array/linked list until you find the item you want. The
    performance is O(n).

    *   Sort the array or linked list and then use an optimal search strategy (binary
    search, which I will discuss later). The performance is O(n * log(n)) + O(logn),
    which means O(n * log(n)), because you only care about the fastest growing term.


    So, as you can see, if you have an array that is always sorted, it takes you O(logn)
    to find the item you want. I will show you how to create a data structure that
    is always sorted in the “Binary Tree” section.


    **Binary Search**


    Remember the childhood game where a friend asks you to guess a number he''s thinking
    of between 1 and 20? When you guess a number, he tells you three things: your
    guess is larger, equal, or smaller than the actual number in his head.


    What''s the best way to start? Do you start from 1 and continue to 20? Or should
    you start to 5 and then know which way to go next?


    If you go with 10 and your friend says that your guess is smaller than the actual
    number, then you know that the actual number is between 10 and 20\. Amazing! You
    just divided the set by half and now you only need to guess 10 more numbers. In
    three or four more steps you will figure out the number.


    If you go sequentially from 1 to 20, in the worst case, you need to guess 20 times.
    In most cases, you will need to guess more than five times. There are only five
    times that you can guess correctly with less than five guesses. This is illustrated
    by [Figure 5–22](#Chapter05.html#fig_5_22).


    ![images](images/0522.jpg)


    **Figure 5–22.** *Binary Search in a sorted array*


    That is binary search; it''s really quite simple. Here is a code snippet for you
    to implement it on an array:


    `- (void)methodToCall {`

    `   NSMutableArray *myArray = [NSMutableArray array];`

    `   for (int i = 0; i < 20; i++) {`

    `       [myArray addObject:[NSNumber numberWithInt:i]];`

    `   }`

    `   // find number 15.`

    `   NSInteger index = [self indexForNumber:[NSNumber numberWithInt:15] inArray:myArray];`

    `   NSLog(@"index: %d", index);`

    `}`


    `// Note that this method only works if the array is already sorted`

    `- (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray *)array {`

    `   int firstIndex = 0;`

    `   int uptoIndex = [array count];`


    `   while (firstIndex < uptoIndex) {`

    `       int mid = (firstIndex + uptoIndex) / 2;  // Compute mid point.`

    `       if ([number intValue] < [[array objectAtIndex:mid] intValue]) {`

    `           uptoIndex = mid;     // repeat search in bottom half.`

    `       } else if ([number intValue] > [[array objectAtIndex:mid] intValue]) {`

    `           firstIndex = mid + 1;  // repeat search in top half.`

    `       } else {`

    `           return mid;     // Found it. return position`

    `       }`

    `   }`

    `   return -1;    // Failed to find key`

    `}`


    The main job of the algorithm is to look into the middle of the array. If the
    value of the middle element is less than the value of the data you are finding,
    the algorithm divides the array by half; it then takes the first half and continues
    with that first half until only one item is left. If the value of the middle element
    is greater than the value of the data you are finding, it will take the second
    half.


    **NOTE:** Binary search only works with sorted array or list. It assumes that
    the data in the right is always greater than the data in the left, so it can divide
    the data array by half.


    #### Binary Tree


    Binary tree combines two other structures inside: an ordered array, a linked list,
    and the binary search algorithm.


    There are many uses for a binary tree:


    *   It is always sorted in a fast way. The performance to add in a new object
    is O (logn).

    *   It can always be used with binary search without any necessary calculations
    (because it is always sorted).


    If you want an array/linked list that is always arranged in order (in other words,
    an ordered array/linked list), you may need to choose one of these approaches:


    *   For an already sorted array: When you need to insert new item in middle of
    the array, you need to look for the position and then shift all items to the right.
    This will take O(n) to run. The performance problem is when you need to shift
    all the items to the right to insert (or left to delete).

    *   For an already sorted linked list: With the insert/delete object inside, the
    linked list is really fast. However, although the linked list is already sorted,
    you have to traverse the list to find a place to insert the new object. The performance
    of this traverse is O(n).

    *   Adding to the end until you need to search or retrieve data, and then sort
    the array/linked list. The sort operation will take O(n * log(n))to complete.


    So, binary tree is a best way to implement a sorted collection so you can find
    the item easily within O(log(n)) performance.


    I''ve discussed why you should use a binary tree, but you may still have some
    questions. What is a tree? What is a binary tree? Before I answer those questions,
    I want to introduce to you the concept of *node* and *edge*.


    ##### Node and Edge


    Nodes are shown by the circles in [Figure 5–23](#Chapter05.html#fig_5_23), while
    the lines show the edges. Nodes can be labeled with a name or number to make them
    unique in the tree. Each edge is bounded by the two nodes at its ends.


    ![images](images/0523.jpg)


    **Figure 5–23.** *Vertex and edge illustration*


    ##### Tree


    A tree is a collection of points (usually called nodes) and connections (usually
    called edges) between these points. The tree has a node as the root, and nodes
    inside a tree are connected with each other by directed edges. Every node inside
    a tree must have at most one parent and no cycles are allowed. A simple illustration
    is shown in [Figure 5–24](#Chapter05.html#fig_5_24).


    ![images](images/0524.jpg)


    **Figure 5–24.** *Tree example*


    A binary tree is a tree in which each node has 0, 1, or 2 children. [Figure 5–24](#Chapter05.html#fig_5_24)
    also represents a binary tree. [Figure 5–25](#Chapter05.html#fig_5_25) shows a
    non-tree because it creates a cycle inside it and node 5has two parent nodes:
    2 and 4.


    ![images](images/0525.jpg)


    **Figure 5–25.** *Non-tree example*


    The two children of each node in a binary tree are called the left child and the
    right child, as shown in [Figure 5–26](#Chapter05.html#fig_5_26).


    ![images](images/0526.jpg)


    **Figure 5–26.** *Left and right child*


    A binary search tree is a binary tree in which the right node is greater than
    the direct parent and the parent is greater than the left node for any three nodes
    that you pick from the binary tree. This is the technical name of the binary tree
    that I always talk about. For simplicity, I will use *binary tree* to talk about
    the *binary search tree*. [Figure 5–27](#Chapter05.html#fig_5_27) illustrates
    an example.


    ![images](images/0527.jpg)


    **Figure 5–27.** *Binary Search Tree*'
  trans: "\n# 搜索\n\n我们来探讨数据结构中的搜索策略，例如 `array`（数组）、`linked list`（链表）、`set`（集合）和 `dictionary`（字典）。如前所述，`set`\
    \ 和 `dictionary` 是基于哈希表构建的，因此对这些数据结构的搜索需要拥有一个对象，其键和哈希值恰与我们正在搜索的相匹配。对这些数据结构的搜索耗时仅为\
    \ `O(1)`（这意味着速度极快）。\n\n对于 `array` 和 `linked list`，问题则更复杂。如果需要进行搜索，可以使用以下两种策略之一：\n\
    \n*   遍历整个数组或链表，直到找到所需的元素。其性能为 `O(n)`。\n*   对数组或链表进行排序，然后使用一种最优搜索策略（二分查找，稍后将讨论）。其性能为\
    \ `O(n * log(n)) + O(log n)`，即等同于 `O(n * log(n))`，因为你只关心增长最快的项。\n\n因此，正如你所见，如果你有一个始终有序的数组，找到所需元素只需\
    \ `O(log n)` 的时间。我将在“二叉树”部分展示如何创建一个始终保持有序的数据结构。\n\n## 二分查找\n\n还记得小时候玩的游戏吗？一个朋友让你猜他心中想的一个介于\
    \ 1 到 20 之间的数字。当你猜一个数字时，他会告诉你三种结果：你猜的数字比实际数字大、相等或小。\n\n最好的开始方式是什么？是从 1 开始一直猜到\
    \ 20 吗？还是应该从 5 开始，然后根据提示判断下一步方向？\n\n如果你猜 10，朋友说你的数字比实际数字小，那么你就知道实际数字在 10 到 20\
    \ 之间。太棒了！你一次性把范围缩小了一半，现在只需要再猜 10 个数字即可。再经过三四步，你就能确定这个数字。\n\n如果你从 1 到 20 依次猜测，在最坏的情况下，你需要猜\
    \ 20 次。在大多数情况下，你需要猜超过 5 次。只有 5 种情况，你可以在少于 5 次猜测时猜对。如图 5–22 所示。\n\n![images](img/0522.jpg)\n\
    \n**图 5–22.** *在有序数组中进行二分查找*\n\n这就是二分查找；它其实非常简单。以下是一段实现其在数组中应用的代码片段：\n\n```\n\
    - (void)methodToCall {\n    NSMutableArray *myArray = [NSMutableArray array];\n\
    \    for (int i = 0; i < 20; i++) {\n        [myArray addObject:[NSNumber numberWithInt:i]];\n\
    \    }\n    // 查找数字 15。\n    NSInteger index = [self indexForNumber:[NSNumber\
    \ numberWithInt:15] inArray:myArray];\n    NSLog(@\"索引: %d\", index);\n}\n\n//\
    \ 注意：此方法仅在数组已排序时有效\n- (NSInteger)indexForNumber:(NSNumber *)number inArray:(NSArray\
    \ *)array {\n    int firstIndex = 0;\n    int uptoIndex = [array count];\n\n \
    \   while (firstIndex < uptoIndex) {\n        int mid = (firstIndex + uptoIndex)\
    \ / 2;   // 计算中点。\n        if ([number intValue] < [[array objectAtIndex:mid]\
    \ intValue]) {\n            uptoIndex = mid;      // 在下半部分重复搜索。\n        } else\
    \ if ([number intValue] > [[array objectAtIndex:mid] intValue]) {\n          \
    \  firstIndex = mid + 1;  // 在上半部分重复搜索。\n        } else {\n            return\
    \ mid;      // 找到，返回位置\n        }\n    }\n    return -1;     // 查找失败\n}\n```\n\
    \n该算法的主要工作在于查看数组的中间元素。如果中间元素的值小于你要查找的数据值，算法就将数组分成两半；然后取前半部分继续处理，直到只剩下一个元素。如果中间元素的值大于你要查找的数据值，它就取后半部分。\n\
    \n**注意：** 二分查找仅适用于已排序的数组或列表。它假设右侧的数据总是大于左侧的数据，因此它可以将数据数组分成两半。\n\n### 二叉树\n\n二叉树在内部结合了另外两种结构：有序数组、链表和二分查找算法。\n\
    \n二叉树有很多用途：\n\n*   它始终以快速的方式保持有序。添加新对象的性能是 `O(log n)`。\n*   它可以始终与二分查找一起使用，无需任何额外的计算（因为它始终是有序的）。\n\
    \n如果你想要一个始终按顺序排列的数组或链表（换句话说，一个有序的数组或链表），你可能需要选择以下方法之一：\n\n*   对于已排序的数组：当你需要在数组中间插入新项时，你需要找到插入位置，然后将所有后续项向右移动。这需要花费\
    \ `O(n)` 的时间。性能问题体现在当你需要将所有项向右移动以插入（或向左移动以删除）时。\n*   对于已排序的链表：在链表内部插入或删除对象的速度非常快。然而，即使链表已排序，你仍需遍历该列表以找到插入新对象的位置。这种遍历的性能是\
    \ `O(n)`。\n*   在需要搜索或检索数据之前，先将新项添加到末尾，然后对数组或链表进行排序。排序操作需要 `O(n * log(n))` 的时间才能完成。\n\
    \n因此，二叉树是实现有序集合的最佳方式，如此你就能在 `O(log n)` 的性能内轻松找到所需项。\n\n我已经讨论了为什么应该使用二叉树，但你可能还有一些疑问。什么是树？什么是二叉树？在回答这些问题之前，我想先向你介绍*节点*和*边*的概念。\n\
    \n#### 节点和边\n\n节点用图 5–23 中的圆圈表示，而线条则代表边。节点可以用名称或数字进行标记，以使其在树中唯一。每条边由其两端的两个节点界定。\n\
    \n![images](img/0523.jpg)\n\n**图 5–23.** *顶点与边示意图*\n\n#### 树\n\n树是由一系列点（通常称为节点）以及这些点之间的连接（通常称为边）组成的集合。树有一个节点作为根节点，树内部的节点通过有向边相互连接。树内的每个节点最多只能有一个父节点，并且不允许存在环。图\
    \ 5–24 展示了一个简单的示例。\n\n![images](img/0524.jpg)\n\n**图 5–24.** *树的示例*\n\n二叉树是一种每个节点有\
    \ 0、1 或 2 个子节点的树。图 5–24 展示的也是一个二叉树。图 5–25 展示了一个非树的例子，因为它在内部形成了一个环，并且节点 5 有两个父节点：2\
    \ 和 4。\n\n![images](img/0525.jpg)\n\n**图 5–25.** *非树的示例*\n\n在二叉树中，每个节点的两个子节点分别称为左子节点和右子节点，如图\
    \ 5–26 所示。\n\n![images](img/0526.jpg)\n\n**图 5–26.** *左子节点和右子节点*\n\n二叉搜索树是一种二叉树，对于从中任意选取的三个节点，始终满足右节点大于其直接父节点，且父节点大于左节点。这就是我一直在讨论的二叉树的专业名称。为简单起见，我将用*二叉树*来指代*二叉搜索树*。图\
    \ 5–27 展示了一个示例。\n\n![images](img/0527.jpg)\n\n**图 5–27.** *二叉搜索树*\n"
- fmt: "### How Does a Binary Tree Work?\n\nThe mechanisms for insert/delete and search\
    \ in a binary tree are similar. All methods require you to traverse the binary\
    \ tree until you find a place to insert/delete or search for the item that you\
    \ want. [Figure 5–28](#Chapter05.html#fig_5_28) shows an example that inserts\
    \ the item into the correct place in the binary tree.\n\n![images](images/0528.jpg)\n\
    \n**Figure 5–28.** *Inserting an item into a binary tree*\n\nThe binary tree is\
    \ implemented based on the idea of a linked list. Because I have already discussed\
    \ how to implement a linked list, in this section I will only write the skeleton\
    \ and APIs for the binary tree. [Listing 5–7](#Chapter05.html#list_5_7) only contains\
    \ the interface file; you need to fill in the implementation file to make it work.\n\
    \n**Listing 5–7.** *Binary Search Tree*\n\n```\nTreeNode.h\n@interface TreeNode\
    \ : NSObject {\n @private\n   NSObject *object;\n   SEL compareSelector;\n   TreeNode\
    \ *leftChild;\n   TreeNode *rightChild;\n}\n\n@property (nonatomic,strong) NSObject\
    \ *object;\n@property (nonatomic, strong) TreeNode *leftChild;\n@property (nonatomic,\
    \ strong) TreeNode *rightChild;\n@property (nonatomic, weak) SEL compareSelector;\n\
    \n@end\n\nTree.h\n#import \"TreeNode.h\"\n@interface Tree : NSObject {\n @private\n\
    \   TreeNode *root;\n}\n- (id)initWithObject:(NSObject *)obj compareSelector:(SEL)selector;\n\
    - (BOOL)find:(NSObject *)obj;\n- (void)insertObject:(NSObject *)newObj;\n- (void)deleteObject:(NSObject\
    \ *)obj;\n\n@end\n```\n\nTo implement this code, you should understand a binary\
    \ tree as a special linked list where you have a `tree` object that holds a `root`\
    \ object, and then the `root` object hold its children itself. This is the same\
    \ way a linked list works: you have a `LinkedList` object that contains the head\
    \ node, and that head node contains the next node itself.\n\nYou should practice\
    \ with binary tree by implementing the APIs that I gave you. You should also review\
    \ binary search to make sure that you understand the concept well and know how\
    \ to apply in this case. If you get stuck in any point, you can look at my sample\
    \ project, `BinarySearchTree`.\n\n### Graph\n\nGraph is a data structure that\
    \ looks like tree but in a more general format. Currently, with the growing demand\
    \ for data mining and data visualization, graph visualization problems are becoming\
    \ more common to developers. In this section, I will show you the basic concept\
    \ of a graph data structure and two algorithms to solve one of the most important\
    \ problems with graph: searching. I will not go too deeply into the source code\
    \ because you may not use this data structure and specific code that much. However,\
    \ you really do need to understand the concepts of the graph because it can be\
    \ used to solve many important problems.\n\nSome common and popular terms:\n\n\
    *   **Vertex and edge**: The vertex concept is the same as the node concept in\
    \ the tree, and the edge concept for the graph is exactly the same as the edge\
    \ concept in the tree. You can look back [Figure 5–23](#Chapter05.html#fig_5_23)\
    \ for the illustration of vertices and edges. The term “vertex” is mostly used\
    \ in the graph concept while the term “node” is more frequently used in the tree\
    \ concept.\n*   **Path**: A path is a sequence of edges that can go through a\
    \ sequence of nodes. For example, in [Figure 5–29](#Chapter05.html#fig_5_29),\
    \ you can see two paths from the same pair of nodes: ACD and ABD.\n\n    ![images](images/0529.jpg)\n\
    \n    **Figure 5–29.** *Path*\n\n*   **Connected graph**: There is a path between\
    \ any pair of vertices that you pick out from the graph. For example, [Figure\
    \ 5–30](#Chapter05.html#fig_5_30) shows a connected graph where if you pick every\
    \ two vertices, you can go from one to the other by some path. However, in [Figure\
    \ 5–31](#Chapter05.html#fig_5_31), you can't go from A to C by any path, so it's\
    \ not a connected graph.\n\n    ![images](images/0530.jpg)\n\n    **Figure 5–30.**\
    \ *Connected graph*\n\n    ![images](images/0531.jpg)\n\n    **Figure 5–31.**\
    \ *Not a connected graph*\n\n*   **Directed graph**: If every edge inside the\
    \ graph has a direction, as shown by an arrow from one vertex to another vertex\
    \ as in [Figure 5–32](#Chapter05.html#fig_5_32), the graph is a directed graph.\
    \ If the edges don't have any direction, you can go either way on them. However,\
    \ if the edges have directions, you can only follow the path shown by the arrow.\n\
    \n    ![images](images/0532.jpg)\n\n    **Figure 5–32.** *Directed graph*\n\n\
    *   **Weighted graph**: If every edge inside the graph is given a weight, as shown\
    \ by an edge with label as in [Figure 5–33](#Chapter05.html#fig_5_33), the edge\
    \ can show any cost or value of travel from one vertex to another vertex. The\
    \ graph then is called weighted graph. Weighted graphs can be used to represent\
    \ the airline flights between cities in the country with edge showing the cost.\n\
    \n    ![images](images/0533.jpg)\n\n    **Figure 5–33.** *Weighted graph*\n\n\
    Searching within the graph is important. There are many famous search problems\
    \ in graph theory in computer science. Imagine a simple case: you want to travel\
    \ from New York to California. You can travel directly by plane but it may cost\
    \ a lot, or you can travel by train to many cities and finally reach your goal\
    \ but the total cost was much cheaper than flying directly.\n\nHere's another\
    \ search problem. You want to travel to all the cities starting from your current\
    \ city by moving along edges inside the graph. Common benefits are to get information\
    \ on every city and to see every city. There are two ways to do this: depth-first\
    \ search and breadth-first search."
