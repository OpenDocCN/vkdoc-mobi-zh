  raw: '## Preface


    The book is meant to help you to sharpen your iOS development skills in a specific
    area: performance optimization. The book is intended for people who already have
    basic skills in iOS development and want to make the best application for users.


    Insipired by the art of application performance, I spend time practicing, learning,
    and sharing a lot about performance optimization in different platforms such as
    the web and smartphones. I love discussing this topic with people. While spending
    lots of time in forums and iOS communities like Stack Overflow and the Apple Developer
    Forum, I soon recognized that the majority of iOS developers have the same questions
    on how to improve the performance of their applications. I thought it would be
    useful to put all common issues together in a well-written and well-structured
    book so people can easily get the whole picture of the iOS performance optimization
    problem. That motivated me to write this book, and I tried my best to cover the
    most common problems and mistakes met by developers.


    Moreover, I observed and record in my own notes many similar problems between
    iOS, Android, and Windows phones. The final chapter is written based on these
    notes, and I think this chapter will be really useful for anybody who wants to
    work in these three platforms or shift from one platform to another.


    When approaching a performance bottleneck, it is good to see it in different ways
    and strike a balance between the performance of the application and the difficulty
    of implementing the solution. There are subtle problems that cause people to make
    mistakes unless they know about the solutions beforehand. My hope is that this
    text will help you to avoid those mistakes, spend your time improving your application,
    and create a better experience for your users.


    ## Chapter 1


    ## Introduction to iOS Performance Optimization


    This chapter will introduce general information about the book, including the
    following:


    *   Who this book will best serve

    *   The topics this book will cover

    *   The general structure and style of the book


    ### A New Era of Smartphone


    There are currently hundreds of thousands of iOS applications on the market and
    hundreds of millions of iOS users, making this a big market for any company or
    developer to explore. This market has been growing for many years and will keep
    growing in the next few years, as will the need for interesting and powerful applications.
    If you have a good idea for a new app, you need to make sure that the idea is
    implemented well; this includes creating a good user experience. Because of the
    unique technical limits of the Smartphone environment, good performance is a must
    for your application. People want an app that responds quickly to their interactions,
    one that can compute data and visualize it immediately.


    ### Why Performance Matters


    Performance is not just about algorithms, data structure, and memory. It''s about
    making people feel that the application responds to any interaction as fast as
    possible. Therefore, performance optimization in your iPhone application is important.
    Users have to feel that they are interacting with real agents that receive their
    command and execute it almost immediately. What if you tap a button and two long
    seconds later, you see the effect. Are you happy with this performance? If you''re
    not happy, your users are probably even more frustrated.


    Of course, you can shift much of your storage and processing into the cloud where
    there are thousands of servers that can compute and return the result quickly.
    However, it''s not enough to just put all your data and every computation into
    the cloud. Network data transfers are tricky and your users will still probably
    need to wait for couple of seconds before their data arrives.


    Whether you are a game developer or a general application developer, you are likely
    to experience difficulties in improving the performance of your applications.


    ### Who Should Use This Book?


    This book is written mainly for beginner and intermediate iPhone developers who
    already know basic iPhone programming. If you''re a performance lover and want
    to create an application on this new platform that is responsive and market-ready
    as well as innovative, this book is for you. Even advanced iOS developers can
    benefit from this book.


    If you intend to go deeply into the Smartphone application programming world,
    this book teaches you enough so that you can apply what you know with iOS to Android
    and Windows Phone environment.


    ### My Teaching Style


    I believe that the learn-by-doing principle is the best way for a programmer to
    develop skills. This book is based on that idea. I discuss general and deep practices
    that stem directly from around two years of iPhone development experience and
    many years of Java development experience and training. The problems that I put
    before you will help you to avoid or fix many of your performance mistakes in
    iPhone development. I have chosen these problems basedonexperience and research
    into the issues popular on forums and social networks(such asStack Overflow).
    I''ve identified common pitfalls and provide the information you need to avoid
    these errors.


    The book is a combination of three things: basic concepts, story illustrations,
    and sample source code. Instead of just supplying an adhoc tool for your specific
    problem, I hope to provide you with strong skills to use in your daily iPhone
    programming life. I employ different approaches to communicating concepts: sometimes
    an image is worth a thousand of words, some concepts are best explained by sample
    code, and some require those thousand words.


    One of the best ways to start learning about performance is to develop a cool
    application that you love. This practical experience will teach you more than
    some non-realistic and very forgettable examples.


    You don''t need to know a lot about Cocoa Touch Framework because I explain the
    basic syntax and classes that you''ll need to improve your application''s performance.
    Each chapter consists of a separate topic, some of which may already be familiar
    to you. You can also use this book as a general reference; whenever you have a
    specific problem, you can look it up and read about the solution.


    Every chapter follows a simple format: a short overview about what that chapter
    delivers followed by the main sections and subsections. Each chapter concludes
    with a summary that helps consolidate your knowledge and reminds you of the important
    lessons, followed by some basic and realistic exercises so that you can have fun
    practicing what you just learned.


    ### What Do You Need?


    As an iOS developer, you need a Mac OS with Xcode installed. There is a free Xcode
    version from the iOS Developer Account, or you can download it directly from Apple
    Mac AppStore. You also need a copy of this book plus all of the sample code, which
    you can download from the Apress website. The sample projects were well tested
    on Xcode 4.2, with ARC turned on, so you can run my sample projects in that environment
    without any concern.


    You can and should run every example to understand more about the illustrated
    concepts. There are some short blocks of code that aren''t associated with any
    project; you should run that code, too.'
  trans: '

    # 前言


    本书旨在帮助你精进 iOS 开发在特定领域——性能优化——的技能。本书面向已具备 iOS 开发基础技能，并希望为用户打造最佳应用的开发者。


    受应用程序性能之道的启发，我花费了大量时间在 Web 和智能手机等不同平台上进行实践、学习和分享性能优化相关的知识。我热衷于与他人探讨这一话题。在花时间浏览诸如
    Stack Overflow 和 Apple Developer Forum 等论坛及 iOS 社区后，我很快意识到，大多数 iOS 开发者对于如何提升应用程序性能都存在着相同的疑问。我认为，将所有这些常见问题汇编成一本结构清晰、行文流畅的书籍会很有帮助，这样人们就能轻松掌握
    iOS 性能优化问题的全貌。这促使我撰写本书，并尽力涵盖了开发者遇到的最常见的问题和错误。


    此外，我还观察并记录了 iOS、Android 和 Windows Phone 之间存在的许多相似问题，并将其收录在自己的笔记中。最后一章便是基于这些笔记撰写而成，我认为这一章对于任何想要在这三个平台工作或从一个平台转向另一个平台的开发者来说都极具价值。


    在应对性能瓶颈时，多角度审视问题，并在应用性能与解决方案的实现难度之间取得平衡，不失为良策。有些问题很微妙，除非开发者事先了解解决方案，否则很容易犯错。我希望本书能帮助你避免这些错误，将时间投入到优化应用上，从而为你的用户创造更佳的体验。


    # 第一章：iOS 性能优化简介


    本章将介绍本书的总体信息，包括以下内容：


    - 本书的最佳受众

    - 本书涵盖的主题

    - 本书的整体结构和风格


    ## 智能手机的新时代


    目前市场上存在着数十万的 iOS 应用和数亿的 iOS 用户，这为任何公司或开发者都提供了一个巨大的市场。这个市场已经持续增长多年，并在未来几年内将继续增长，对有趣且功能强大的应用的需求也将随之增长。如果你有一个关于新应用的好想法，你需要确保这个想法得到良好的实现；这包括创造良好的用户体验。由于智能手机环境独特的技术限制，出色的性能对应用来说至关重要。人们希望应用能对他们的操作快速响应，能够立即计算数据并将其可视化。


    ## 为什么性能至关重要


    性能不仅仅关乎算法、数据结构和内存。它还关乎让人们感觉应用能尽可能快地响应任何交互。因此，优化你的 iPhone 应用性能非常重要。用户必须感觉到他们正在与真正的代理交互，这些代理接收他们的指令并几乎立即执行。如果你点击一个按钮，两秒钟后你才看到效果，你会对这个性能满意吗？如果你不满意，你的用户可能会更加沮丧。


    当然，你可以将大部分存储和处理任务转移到云端，那里有成千上万的服务器可以快速计算并返回结果。但是，仅仅将所有数据和计算都放到云端是不够的。网络数据传输是棘手的，你的用户可能仍然需要等待几秒钟才能收到数据。


    无论你是游戏开发者还是通用应用开发者，你都可能会在提升应用性能方面遇到困难。


    ## 谁应该阅读本书？


    本书主要面向已经掌握基本 iPhone 编程知识的初中级 iPhone 开发者编写。如果你热爱性能，并且希望在这个新平台上创建出响应迅速、具备市场竞争力且富有创新性的应用，那么本书适合你。即使是高级
    iOS 开发者也能从本书中获益。


    如果你想深入智能手机应用编程领域，本书将提供足够的知识，使你能够将 iOS 所学应用到 Android 和 Windows Phone 环境中。


    ## 我的教学风格


    我相信“做中学”的原则是程序员培养技能的最佳途径。本书正是基于这一理念编写的。我讨论的通用和深入实践方法，直接源于我大约两年的 iPhone 开发经验以及多年的
    Java 开发经验和培训经历。我为你提出的问题将帮助你避免或修复 iPhone 开发中的许多性能错误。这些问题是我根据经验以及对论坛和社交网络（如 Stack
    Overflow）上流行问题的研究而选择的。我识别了常见的陷阱，并提供了避免这些错误所需的信息。


    本书融合了三个要素：基本概念、故事说明和示例源代码。我不仅提供针对特定问题的临时解决方案，更希望为你提供可在日常 iPhone 编程中应用的扎实技能。我采用不同的方法来传达概念：有时一张图胜过千言万语，有些概念最好通过示例代码来解释，有些则需要那千言万语。


    开始学习性能的最佳方式之一是开发一个你喜爱的酷应用。这种实践经验比一些不切实际且极易遗忘的例子能教你更多。


    你不需要了解很多关于 Cocoa Touch Framework 的知识，因为我会解释提升应用性能所需的基本语法和类。每一章都包含一个独立的主题，其中一些你可能已经熟悉。你也可以将本书作为通用参考书；当你遇到特定问题时，可以查阅并阅读相关解决方案。


    每一章都遵循一个简单的格式：先简要概述本章内容，然后是主要章节和小节。每章末尾都有一个总结，帮助你巩固知识并提醒你重要的经验教训，随后是一些基础且实际的练习，让你可以快乐地实践所学内容。


    ## 你需要什么？


    作为一名 iOS 开发者，你需要一台安装了 Xcode 的 Mac OS 系统。你可以从 iOS 开发者帐户获取免费的 Xcode 版本，或者直接从 Apple
    Mac AppStore 下载。你还需要一本本书以及所有示例代码，这些代码可以从 Apress 网站下载。示例项目已在 Xcode 4.2 上、开启 ARC
    的情况下进行了充分测试，因此你可以毫无顾虑地在那个环境中运行我的示例项目。


    你可以且应该运行每一个示例，以更深入地理解所阐述的概念。还有一些不与任何项目关联的简短代码块；你也应该运行这些代码。

    '
- fmt: "### How to Use This Book\n\nAlthough the chapters are not closely related,\
    \ reading the book from beginning to end will ensure that you have a solid knowledge\
    \ of iPhone performance, optimization skills, and techniques. There may be some\
    \ dependencies and references between chapters. The later chapters were written\
    \ with the assumption that you have read or know about some previous chapters.\n\
    \nI also recommend reading each chapter from beginning to end. Each chapter opens\
    \ with a quick conceptual introduction to the topic; then theory and practical\
    \ iPhone samples are combined to help you to understand the topic thoroughly.\n\
    \nYou should read the summary section carefully because it reminds you of the\
    \ key knowledge that you should retain. I also recommend finishing all of the\
    \ exercises as these will help cement your new knowledge.\n\n### An Overview of\
    \ the Book\n\nThis book contains a good mix of basic concepts plus practical knowledge,\
    \ techniques, and tips that will help you to be successful in the competitive\
    \ iOS development world. The book's nine chapters cover nine different approaches\
    \ to solving performance problems in iOS development.\n\n- *[Chapter 2](#Chapter02.html#ch2):*\
    \ The introduction to a range of tools and instruments so that you know how and\
    \ when to use them. Many developers don't use these tools correctly because they\
    \ simply don't know that they exist.\n- *[Chapter 3](#Chapter03.html#ch3):* As\
    \ an iOS developer, you will definitely use `TableView` in almost all of your\
    \ projects, from trivial ones to complex ones, to display a list of data or options.\
    \ The problem with the architecture of `UITableView` is that when you start customizing\
    \ it, the scrolling performance suffers. You will definitely have this issue,\
    \ even if in a subtle way. This chapter gives you a list of tools and techniques\
    \ to improve your `TableView` scrolling.\n- *[Chapter 4](#Chapter04.html#ch4):*\
    \ You may believe that most performance issues can be solved using cloud computing\
    \ and by simply adding more servers to your system. Even if that's true, network\
    \ data transfer will always be an issue. Data transfer will remain a bottleneck\
    \ for years. You should understand how to cache data locally and in memory with\
    \ a limited environment like iOS.\n- *[Chapter 5](#Chapter05.html#ch5):* Data\
    \ structures and algorithms in the iOS development environment are similar and\
    \ different than in other environments. You have a high level of support from\
    \ the framework with many basic data structures like arrays, sets, and dictionaries.\
    \ For some tasks, you can simply put it to the cloud, but for other tasks, especially\
    \ gathering and processing data to make a good visualization, you still need to\
    \ depend on the iOS environment.\n- *[Chapter 6](#Chapter06.html#ch6):* Improving\
    \ the performance of the application also means making the application respond\
    \ to users' interaction faster. This means not blocking the main UI thread. Multithreading\
    \ can help—not just to improve the user responsiveness but also to improve the\
    \ general performance of your application. Multithreading is a difficult topic\
    \ for any platform, and you will learn it here through a range of illustrations,\
    \ examples, and clear explanation.\n- *[Chapter 7](#Chapter07.html#ch7):* With\
    \ the release of a new tool to make memory management automatic, developers now\
    \ can take advantage of it to avoid common memory problems like memory leaks and\
    \ crash. This chapter focuses on how you can best use your memory, and when you\
    \ should load data in and unload data out of your memory. It also covers the new\
    \ Automatic Reference Counting (ARC) mechanism of the new SDK to make sure you\
    \ can understand and use it correctly.\n- *[Chapter 8](#Chapter08.html#ch8):*\
    \ With iOS 4 and above, all applications can take advantage of multitasking to\
    \ improve the user experience. In fact, it's not actually multitasking but rather\
    \ a fast app-switching mechanism (applications can't run in background) with some\
    \ special background processing. This chapter will help you understand what features\
    \ the iOS will support and what tasks you can process and run in background.\n\
    - *[Chapter 9](#Chapter09.html#ch9):* In many iPhone applications, you don't need\
    \ to use any C/C++ code to implement features. However, when you actually need\
    \ it, especially for library integration, you will be in serious trouble. You\
    \ may not need to write your whole application in C/C++ but you do need to understand\
    \ how these languages work for any necessary troubleshooting.\n- *[Chapter 10](#Chapter10.html#ch10):*\
    \ By now you should have a complete picture of all the different aspects of iPhone\
    \ performance. You will definitely consider porting your application to Android\
    \ and Windows Phone soon, so in this final chapter, I give you the whole picture\
    \ on similarities between performance problems in iOS, Android, and Windows Phone.\
    \ This will help to smooth your learning experience for new platforms.\n\n###\
    \ Source Code\n\nYou should download the sample source code from the book's page\
    \ on the Apress web site ([`www.apress.com`](http://www.apress.com)) and try it\
    \ on your own.\n\n### Contact the Author\n\nIf you have any questions, please\
    \ email me at `vodkhang@gmail.com` or visit my web site at [`http://vodkhang.com`](http://vodkhang.com).\
    \ I shall be happy to have a chat about iPhone performance problems.\n\n## Chapter\
    \ 2\n\n## Benchmark Your Apps with Tools: Simulators and Real Device Test\n\n\
    In this chapter, you will learn about the following:\n\n- The differences between\
    \ a simulator and real device test environment.\n- How memory management affects\
    \ the performance of an app.\n- Tools and techniques to benchmark your app's performance\
    \ including the following:\n    - Basic tools to measure the memory and performance.\n\
    \    - Complicated tools to measure different aspects of memory management such\
    \ as memory leaks and bad access.\n    - Complicated tools to measure different\
    \ aspects of performance in computer processing such as battery, file loading,\
    \ and display information.\n    - How to divide your program into smaller parts\
    \ to easily identify the location of the performance bottleneck.\n\nTo improve\
    \ performance, you need to carefully run benchmark tests to see where the problems\
    \ lie. To carry out a useful benchmark test, you have to understand the different\
    \ reasons that a program or a segment of code might run slowly.\n\nRight at the\
    \ outset, you should be aware of two fundamental choices: simulator versus real\
    \ device environment, and the trade-offs between memory optimization and performance\
    \ optimization.\n\nFirst, you need to know the difference between the simulator\
    \ and device environment."
