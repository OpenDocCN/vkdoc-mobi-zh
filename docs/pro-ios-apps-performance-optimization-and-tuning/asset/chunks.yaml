  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n### 数据结构与算法\n\n\
    iOS 环境的 Cocoa Touch 框架为你提供了三种主要的数据结构，以满足大多数使用场景：`NSSet`、`NSArray` 和 `NSDictionary`。每一种都有其优势与最佳使用场景。我将讨论这些在\
    \ iPhone 上的主要数据结构，然后通过代码和示例，带你了解其他一些重要的数据结构：链表、二叉树、栈、队列和图，以便你在需要性能更优的数据结构时能够自行构建。\n\
    \n在讨论数据结构时，我们不能将数据结构内部使用的算法剥离出来单独讨论。例如，在不了解哈希函数作用的情况下，讨论 `NSDictionary` 和哈希表是没有意义的。同样，不理解二分查找，就难以理解平衡二叉树。因此，我将并行讨论它们；我会介绍数据结构以及它们为加速性能所使用的算法。在最后几节中，我会单独介绍数据结构之间通用的常见算法。\n\
    \n### Cocoa Touch 数据结构\n\n实际上，你会用到 `NSMutableArray` 和 `NSArray`、`NSMutableSet`\
    \ 和 `NSSet`、`NSMutableDictionary` 和 `NSDictionary`。`NSMutable` 类与 `NS` 类的区别在于，你可以更改\
    \ `NSMutable` 类的内容，但不能更改 `NS` 类的内容。后者的优势在于保护数据，确保任何能接触到数据的代码都无法更改其内容。由于你不能修改 `NSArray`，我将在示例中使用\
    \ `NSMutableArray` 的案例。\n\n讨论数据结构时，我将从以下几个主要方面来阐述其性能：插入、删除、搜索、访问和排序。我将使用大 O 表示法来让你了解每种数据结构在插入、删除、搜索或排序操作下的速度表现。\n\
    \n#### NSMutableArray\n\n数组是最简单的数据结构形式。因此，理解数组在检索、插入、更新或删除数据时的工作原理，将有助于你提升应用的性能。\n\
    \n![images](img/0506.jpg)\n\n**图 5–6.** *数组图示*\n\n数组是一组独立项集合，存放在一个数据块中，如图 图 5–6\
    \ 所示，块编号从 0 到数组长度。`NSArray` 按顺序存储数据，因此不允许你在任意位置插入数据。`NSArray` 还允许你在数组中存储重复数据。\n\
    \n插入/删除:\n\n*   如果在数组末尾插入/删除，速度非常快：`O(1)`。\n*   如果在数组中间或开头插入，所有数据都需要向右移动，如图 图\
    \ 5–7 所示：`O(n)`。\n\n    ![images](img/0507.jpg)\n\n    **图 5–7.** *向数组的第二个位置插入一项*\n\
    \n搜索:\n\n*   每次查找一个元素时，都需要遍历整个数组：`O(n)`。此过程如图 图 5–8 所示。数组内部搜索的一个类似问题是确定该数组是否包含某个特定元素。\n\
    \n    ![images](img/0508.jpg)\n\n    **图 5–8.** *在数组中搜索特定项*\n\n访问:\n\n*   你可以非常快速地访问数组内的任何索引：`O(1)`。\n\
    \n排序:\n\n*   通常，数组中的排序通过归并排序或快速排序实现。`NSMutableArray` 的排序性能应为 `O(n * log(n))`。\n\
    \n表 5–3 涵盖了 `NSMutableArray` 的常用方法和 API。\n\n![images](img/t0503.jpg)\n\n#### 哈希\n\
    \n哈希是计算机科学和软件工程中的一项重要技术。它用于提升存储集合的性能。在 iPhone 应用中，哈希在 `NSSet` 和 `NSDictionary`\
    \ 内部实现。要完全理解为什么 `NSSet` 和 `NSDictionary` 在搜索项时如此之快，你首先需要理解哈希。\n\n哈希函数的一般任务是确保为每个不同的项创建一个唯一的哈希值。并且相同的项应始终返回相同的哈希值。\n\
    \n例如，`@\"khang\"` 和 `@\"vo\"`（我的名字）是两个不同的字符串；因此，哈希函数应为每个字符串生成不同的值。真正的哈希算法很复杂，需要大量优化，因此我将用一个简单的哈希计算作为示例。对于字符串，我可以使用字母表中每个字符的整数值以及字符的位置来计算字符串的哈希值（图\
    \ 5–9）。\n\n![images](img/0509.jpg)\n\n**图 5–9.** *字符串内所有字符的位置*\n\n```\n=> @\"\
    khang\" = 11 * 10 ^ 4 + 8 * 10 ^ 3 + 0 * 10 ^ 2 + 14 * 10 ^ 1 + 7 = 110,000 +\
    \ 8,000 +\n0 + 140 + 7 = 118147\n```\n\n对“vo”执行类似操作，你将得到哈希值 `22 * 10¹ + 15 = 235`。\n\
    \n使用这个哈希函数，你可以看到为两个不同的项创建了两个唯一的哈希值。哈希函数的目的是为特定数据生成一个唯一的值。稍后，我将探讨拥有这种数据唯一表示形式的好处。\n\
    \n#### Objective-C 中的 isEqual 和 Hash 方法\n\n在 Objective-C 中，如同其他面向对象编程语言一样，每个对象都有两个重要的方法：`isEqual:`\
    \ 和 `hash`。我们刚刚讨论过哈希，所以你对 `hash` 函数的作用应该有了清晰的认识。在讨论 `isEqual` 方法之后，我将讨论如何在 Objective-C\
    \ 中实现/重写 `hash` 方法。\n\n##### isEqual\n\n在大多数面向对象编程语言中，当人们谈论两个对象的相等性时，他们指的是两种情况之一：内存中的确切对象，以及语义相等（意义上的相等）。默认情况下，对于单个对象，这两种情况是相同的。第一种相等性讨论的是变量是否指向内存中的同一个对象，通过\
    \ `obj1 == obj2` 来检查。然而，对于后者，两个对象的相等性通过方法 `[object1 isEqual:object2]` 来检查；如果该方法返回\
    \ `YES`，则两个对象相等，这与检查内存引用是不同的。\n\n为了更清楚，这里有一个类 `MyItem`，它重写了 `isEqual:` 方法，如下所示：\n\
    \n```\nMyItem.h\n@interface MyItem : NSObject {\n @private\n   NSString *identifier;\n\
    }\n\n@property (nonatomic, copy) NSString *identifier;\n\n- (id)initWithIdentifier:(NSString\
    \ *)anIdentifier;\n\n@end\n\nMyItem.m\n@implementation MyItem\n@synthesize identifier;\n\
    \n- (id)initWithIdentifier:(NSString *)anIdentifier {\n   if (self = [super init])\
    \ {\n       self.identifier = anIdentifier;\n   }\n   return self;\n}\n\n- (BOOL)isEqual:(id)object\
    \ {\n\n   // 默认情况下，如果两个变量指向内存中的同一个对象，则它们应始终相等\n   if (object == self) {\n    \
    \  return YES;\n   }\n\n   if (![object isKindOfClass:[MyItem class]]) {\n   \
    \    return NO;\n   }\n\n   MyItem *myItem = (MyItem *)object;\n   return [myItem.identifier\
    \ isEqual:self.identifier];\n}\n\n- (NSUInteger)hash {\n   return [self.identifier\
    \ hash];\n}\n\n@end\n```\n\n对于这个类，你可以通过给予相同的标识符，轻松创建一个与特定对象相等的模拟对象。例如，如果第一个对象由\
    \ `MyItem *item1 = [[MyItem alloc] initWithIdentifier:@\"1\"];` 创建，另一个对象由 `MyItem\
    \ *item2 = [[MyItem alloc] initWithIdentifier:@\"1\"];` 创建，那么\n\n```\n[item1 isEqual:item2]\
    \ 返回 YES 而 item1 == item2 返回 NO;\n```\n"
- fmt: "###### Hash Method\n\nAs mentioned, two objects that are equal must have the\
    \ same hash value. Therefore, people usually use the overridden method of the\
    \ `isEqual` method to write the `hash` method. If your `isEqual` method is determined\
    \ by a variable `identifier`, your hash should be something like that in [Listing\
    \ 5–4](#Chapter05.html#list_5_4).\n\n**Listing 5–4.** *Hash Method*\n\n```\n-\
    \ (NSUInteger)hash {\n   int hash =0;\n   hash = 37 * [self.identifier hash];\n\
    \   return hash:[self.identifier1 hash];\n}\n```\n\nThe number 37 was picked randomly\
    \ in this case, but whatever number you choose must be a prime integer. Therefore,\
    \ if you don't have a big performance issue, you can pick the same number or any\
    \ prime integer without any issue.\n\n**NOTE:** In [Listing 5–4](#Chapter05.html#list_5_4),\
    \ I wanted to demonstrate how to write a hash algorithm yourself so I calculated\
    \ a new hash value based on the string hash value. In a simple case like this,\
    \ you can just return `[self.identifier hash];` directly.\n\n##### NSMutableSet\n\
    \n`NSSet` is an Apple implementation for an abstract concept, set. A set is an\
    \ unordered collection that contains no duplicate elements. In other words, `NSSet`\
    \ contains no pair of elements `e1` and `e2` such that `[e1 isEqual:e2];` return\
    \ `YES`.\n\nBased on the unique characteristics of a set, people usually implement\
    \ a set based on a hashing algorithm. The hashing algorithm will make it really\
    \ easy for a set to find any elements inside.\n\nNow, imagine that you have a\
    \ set like that in [Figure 5–10](#Chapter05.html#fig_5_10). Your set has the capacity\
    \ to contain seven elements.\n\n![images](images/0510.jpg)\n\n**Figure 5–10.**\
    \ *Finding an item inside a set using the hash method*\n\nA new item, called “vo”\
    \ arrives and you want to add it into the set. Because your set can't contain\
    \ duplicate elements, the first task is to see if your set contains the item “vo”\
    \ already. As shown in [Figure 5–8](#Chapter05.html#fig_5_8), if you want to do\
    \ this with an array, you have to loop over that array to check for equality.\
    \ However, with a set, it's simpler.\n\nFirst step: Hashing\n\n`@”vo”` ![images](images/arrow2.jpg)`118147\
    \ mod 13 = 1` (I get `mod 13` because the capacity of a set should be a prime\
    \ integer, and I choose 13 as an example for a capacity of a set here.)\n\nSecond\
    \ step: You check the item into the index 1 spot, as in [Figure 5–11](#Chapter05.html#fig_5_11).\n\
    \n![images](images/0511.jpg)\n\n**Figure 5–11.** *Finding an item inside a set\
    \ using the hash method*\n\nSo you've found it. If the set already contains the\
    \ element `@”vo”`, it shouldn't add a duplicate. If it doesn't contain anything\
    \ in that index, then `@”vo”` should be added into that index position. (For simplicity,\
    \ I won't discuss what happens if two distinct elements have the same hash, which\
    \ can happen in reality.)\n\nInsert/Delete:\n\n*   As shown in the previous example,\
    \ insert/delete will perform instantly with the hash functions and add it into\
    \ the correct index position. The performance is: `O(1)`. However, you can't determine\
    \ the position of insertion.\n\nSearch:\n\n*   If you want to search for an object,\
    \ you probably have three purposes. The first purpose is to check if that object\
    \ is contained inside the set. The second purpose is to find an object in the\
    \ set that is equal to the object you have in hand. The last purpose is to see\
    \ if the object inside the set has a specific property that satisfies a condition.\n\
    \    *   For the first purpose, you can just use the method `[set containsObject:obj1];`\
    \ and it will return your item really fast: `O(1)`.\n    *   For the second purpose,\
    \ you need to create a mock object that is equal to the object you are finding.\
    \ As an example, in the `isEqual:` part, you can create the new object such that\
    \ `[newObjisEqual:oldObject]` returns `YES`. The good thing is that the cost of\
    \ creating the new object is either cheap or you don't need to know much information.\
    \ After that, you can call `MyItem *oldObject = [set member:newObject];` and you\
    \ have your old object with full information. The performance for this case is\
    \ `:` `O(1)`.\n    *   The last purpose is to find a property, such as a name\
    \ that starts with character “k.” You will need to loop over all the elements\
    \ as in the array. The performance for this case is: `O(n)`.\n\nAccess:\n\n* \
    \  You can't access any item directly by its index, like in array. One way to\
    \ access the element discussed in the search section is by creating a mock object\
    \ that is `isEqual:` to the object you want to access. The performance is `O(1)`.\n\
    \nSort:\n\n*   Cocoa Touch framework doesn't provide a good way to sort an `NSMutableSet`.\
    \ It only provides you with a method to return a sorted array. Based on the sorting\
    \ performance of an array, I can estimate that the performance for a sorting in\
    \ set is: `O(nlogn)`.\n\n[Table 5–4](#Chapter05.html#tab_5_4) *shows the common\
    \ methods and APIs for NSMutableSet.*\n\n![images](images/t0504.jpg)\n\n![images](images/t0504a.jpg)\n\
    \n**NOTE:** One important factor for in using `NSMutableSet` and `NSSet` is their\
    \ rich API for set manipulation. Like a set concept in mathematics, you may need\
    \ to use a special calculation like union, intersect, and minus. If you need to\
    \ manipulate collections with unique data a lot and are concerned with union,\
    \ intersect, or minus, set is the best choice.\n\nFor example, you are given two\
    \ lists: one of people who play tennis and the other of people who play football.\
    \ Now, you need to find three lists:\n\n*   People who play both tennis and football.\n\
    *   People who only play tennis.\n*   People who only play football.\n\nI will\
    \ leave this as an exercise for you to practice. You should try it with both approaches:\
    \ an array approach and a set approach."
