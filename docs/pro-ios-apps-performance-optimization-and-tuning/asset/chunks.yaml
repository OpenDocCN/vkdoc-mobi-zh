  trans: "\n### 如何使用本书\n\n虽然各章节之间关联性不大，但从头到尾阅读本书将确保您全面掌握 iPhone 性能、优化技巧和技术。章节之间可能存在一些依赖和引用关系。后续章节的编写基于一个前提，即您已经阅读或了解前面的某些章节。\n\
    \n我还建议您从头到尾逐章阅读。每一章开篇都会对主题进行简要的概念性介绍；随后理论与实践相结合，通过 iPhone 示例帮助您深入理解该主题。\n\n您应仔细阅读总结部分，因为它提醒您需要牢记的关键知识点。我也建议您完成所有练习，这有助于巩固您的新知识。\n\
    \n### 本书概述\n\n本书巧妙融合了基础概念与实践知识、技术和技巧，将助您在竞争激烈的 iOS 开发领域脱颖而出。全书共九章，涵盖了解决 iOS 开发中性能问题的九种不同方法。\n\
    \n- *第 2 章:* 介绍一系列工具和检测仪器，让您了解如何以及何时使用它们。许多开发者未能正确使用这些工具，仅仅是因为他们不知道这些工具的存在。\n\
    - *第 3 章:* 作为 iOS 开发者，您几乎在所有项目中（从简单到复杂）都会使用 `TableView` 来展示数据列表或选项。`UITableView`\
    \ 架构的问题在于，一旦您开始对其进行自定义，滚动性能就会受到影响。您一定会遇到这个问题，即使是以一种微妙的方式。本章提供了一系列工具和技术来改善您的 `TableView`\
    \ 滚动性能。\n- *第 4 章:* 您可能认为大多数性能问题都可以通过云计算和向系统添加更多服务器来解决。即使如此，网络数据传输始终是个问题。在未来数年里，数据传输仍将是瓶颈。您应该了解如何在\
    \ iOS 这样的受限环境中进行本地缓存和内存缓存。\n- *第 5 章:* iOS 开发环境中的数据结构与算法既与其他环境相似，又有所不同。您从框架中获得的支持级别很高，框架提供了许多基本数据结构，如数组、集合和字典。对于某些任务，您可以直接将其交由云端处理；但对于其他任务，尤其是为了生成良好的可视化效果而收集和处理数据时，您仍需依赖\
    \ iOS 环境。\n- *第 6 章:* 提升应用程序性能也意味着让应用更快地响应用户交互。这意味着不要阻塞主 UI 线程。多线程可以帮助解决这个问题——不仅是为了改善用户响应能力，也是为了提升应用程序的整体性能。多线程对任何平台来说都是一个难点，您将通过本书中的一系列插图、示例和清晰讲解来学习它。\n\
    - *第 7 章:* 随着一款使内存管理自动化的新工具的发布，开发者现在可以利用它来避免常见的内存问题，如内存泄漏和崩溃。本章重点介绍如何最佳地利用内存，以及何时将数据加载到内存中和何时从内存中卸载数据。本章还涵盖了新版\
    \ SDK 中的自动引用计数 (ARC) 机制，以确保您能理解并正确使用它。\n- *第 8 章:* 对于 iOS 4 及更高版本，所有应用程序都可以利用多任务处理来改善用户体验。事实上，它并非真正的多任务，而是一种结合了某些特殊后台处理的快速应用切换机制（应用无法在后台运行）。本章将帮助您了解\
    \ iOS 支持哪些功能，以及您可以处理和运行哪些后台任务。\n- *第 9 章:* 在许多 iPhone 应用程序中，您无需使用任何 C/C++ 代码来实现功能。然而，当您确实需要用到它时，尤其是为了集成库，您就会遇到大麻烦。您可能不需要用\
    \ C/C++ 编写整个应用程序，但您确实需要了解这些语言如何工作，以便进行必要的故障排除。\n- *第 10 章:* 至此，您应该已经全面掌握了 iPhone\
    \ 性能的各个方面。您很有可能很快会考虑将您的应用移植到 Android 和 Windows Phone 平台。因此，在最后一章中，我为您提供了关于 iOS、Android\
    \ 和 Windows Phone 之间性能问题相似性的全局视角。这将有助于您平滑地学习新平台。\n\n### 源代码\n\n您应该从 Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的页面下载示例源代码，并自行尝试运行。\n\
    \n### 联系作者\n\n如果您有任何问题，请发送电子邮件至 `vodkhang@gmail.com`，或访问我的网站 [`http://vodkhang.com`](http://vodkhang.com)。我很乐意与您探讨\
    \ iPhone 性能问题。\n\n## 第 2 章\n\n## 使用工具对应用进行基准测试：模拟器与真机测试\n\n在本章中，您将了解以下内容：\n\n\
    - 模拟器与真机测试环境的区别。\n- 内存管理如何影响应用的性能。\n- 对应用性能进行基准测试的工具和技术，包括：\n    - 用于测量内存和性能的基本工具。\n\
    \    - 用于测量内存管理不同方面（如内存泄漏和坏内存访问）的复杂工具。\n    - 用于测量计算机处理性能不同方面（如电池、文件加载和显示信息）的复杂工具。\n\
    \    - 如何将程序划分为更小的部分，以便轻松识别性能瓶颈的位置。\n\n为了提升性能，您需要仔细运行基准测试，以找出问题所在。要进行有效的基准测试，您必须理解程序或代码段运行缓慢的各种原因。\n\
    \n从最开始，您就应意识到两个基本选择：模拟器与真机环境，以及内存优化与性能优化之间的权衡取舍。\n\n首先，您需要了解模拟器与设备环境之间的区别。\n"
- fmt: "### Simulator and Device\n\nThe main problem with the performance of iPhone\
    \ applications is that they are running in a restricted, slow-processing environment.\
    \ The iPhone development environment simulator runs much faster than the real\
    \ environment; in fact, the simulator's environment can be as fast as the machine\
    \ running it.\n\nAs a result, you can get a big and unpleasant surprise when the\
    \ program runs really fast in the simulator environment but runs much slower in\
    \ the real environment. I have observed many people blaming slow application performance\
    \ on the phone's network. This is certainly true in some cases. However, in many\
    \ cases the app's performance can drop down a lot because of the code implementation\
    \ itself, not because of a network problem. Therefore, careful testing and benchmarking\
    \ your app against basic tools and standard environments will make you more confident\
    \ about your app's performance and the user experience.\n\nTo demonstrate the\
    \ significant differences between the simulator and real device, I tested a program\
    \ in the iPhone simulator environment and the real iPhone environment. The results\
    \ are surprising.\n\n- It takes 0.5 seconds to finish the main calculation in\
    \ the iPhone simulator.\n- It takes 7 seconds to finish the same calculation on\
    \ the iPhone device.\n\nThe program was simple: I did a simple test with two arrays,\
    \ each with 1000 elements. Then, the code loops over both arrays to find the same\
    \ number and print \"hello.\" In the real world, you may not need to process 1000\
    \ items in an array or you may not choose to loop over arrays to find same number.\
    \ However, this is not the point. I picked these actions to demonstrate that real\
    \ iPhone environment is much slower than in the iPhone simulator.\n\nThis brings\
    \ me to a point that I will mention many times in this book: you always need to\
    \ test the app on both simulator and the real device. Well, why not just test\
    \ on the device? Because simulator has the following significant benefits:\n\n\
    - It is faster to run the test in the simulator, which means less delay time for\
    \ developers.\n- It is good enough to test for memory leaks and memory allocation\
    \ problems.\n\n### Memory and Performance\n\nMemory and performance are different.\
    \ Memory usually means the RAM storage, and it refers to how much storage you\
    \ use and how much you have left. Performance is about how fast your app runs\
    \ a specific feature.\n\nMemory can have a significant effect on performance.\
    \ When the device has more RAM and more storage space, you can preload and cache\
    \ more data on it. RAM is fast access storage compared to file storage and the\
    \ network. By preloading and caching more data on RAM, you can significantly speed\
    \ up your program in many cases. For example, if your app is a game that needs\
    \ to load many images, more memory is important to because you can preload the\
    \ images and display them when necessary. Loading from RAM is 10 times faster\
    \ than loading from the file system.\n\nHowever, better use of memory does not\
    \ always mean better performance. Some apps don't need to use much memory; therefore,\
    \ you can optimize the memory only so far and the performance will not go up anymore.\
    \ The inverse is not much better: an app can use up all the memory in order to\
    \ achieve good performance, but then the app runs out of memory.\n\nTherefore,\
    \ you should always carefully benchmark both the memory and runtime performance\
    \ to make sure that you strike a good balance between memory usage and runtime\
    \ performance.\n\n### Tools\n\nThe tools fall into the following three main categories:\n\
    \n- Basic tools, without XCode instruments.\n- Memory tools, which verify the\
    \ correctness and measure the efficiency of your memory usage.\n- Performance\
    \ tools, which measure how fast each part of your program runs and pinpoint any\
    \ bottlenecks.\n\n#### Basic Tools\n\nIn this part, I discuss about logging as\
    \ a basic tool to measure the running time between blocks of code.\n\n##### Logging\
    \ the Running Time\n\nOne of the most basic tools is logging the time difference\
    \ between the start and end of a block of code. Usually, logging is implemented\
    \ with `NSLog`. With this basic tool, developers can measure every line of code\
    \ or block of code to see how fast that block of code runs.\n\n##### For example,\
    \ running this block of code\n\n```\nNSDate *date1 = [NSDate date];\nfor (int\
    \ i = 0; i < 1000; i++) {\n  // Do calculation here\n}\nNSDate *date2 = [NSDate\
    \ date];\nNSLog (@\"time: %f\", [date2 timeIntervalSinceDate:date1]);\n```\n\n\
    returns this result\n\n```\ntime: 0.0123 (measured in seconds)\n```\n\nAdvantages:\n\
    \n- A straightforward and easy way to measure the performance.\n- You can measure\
    \ the performance of lines of code or blocks of code.\n\nDisadvantages:\n\n- You\
    \ can't measure the UI performance (i.e., the rendering time of the UI thread).\n\
    - You can over-optimize (spend too much time on a very specific block of code\
    \ just to optimize it a little bit).\n- Running the application in simulator is\
    \ usually fast, and at this fast level, `NSLog` can't help you distinguish between\
    \ a difference in runtime performance. Otherwise, although `NSLog` is slow in\
    \ the device, it can help you to detect the differences in runtime performance.\n\
    \nUsage:\n\n- When you need an immediate tool to measure without much planning.\n\
    - When you need a tool that can return a result quickly.\n- When you need to isolate\
    \ a small block of code to verify a performance assumption.\n\n### Memory Tools\n\
    \nWith memory problems, you have only one main concern: high memory usage. There\
    \ are minor concerns with legacy code: memory leak and memory garbage. For the\
    \ new projects, you should go straight with the new Automatic Reference Counting\
    \ (`ARC` in short) support. For some old projects, you can try to convert them\
    \ using the convert tool of Xcode.\n\nHowever, not every project can be converted;\
    \ there are many issues and memory management policies that prevent you from conversion.\
    \ Trying to comply with the new management policy may cause you more troubles.\
    \ So, I discuss mainly with you about the memory tools for object allocation and\
    \ briefly about tools for memory leaks and memory garbage.\n\n**NOTE:** All the\
    \ memory tools that I introduce here (and I introduce all Apple's tools for memory)\
    \ can be run with simulator. The good thing about the simulator is that it runs\
    \ really fast and installs apps quickly. However, be careful! I strongly recommend\
    \ that you also test your apps on the device because the simulator and device\
    \ are not always the same. They are built differently and have different architectures.\n\
    \n#### Memory Allocation\n\nMemory Allocation helps you to understand how much\
    \ object allocations you use. This may mean that you allocate and keep in memory\
    \ so many objects. These objects are not released yet because they are still in\
    \ use."
  raw: '### Simulator and Device


    The main problem with the performance of iPhone applicationsis that they are running
    in a restricted, slow-processing environment. The iPhone development environment
    simulator runs much faster than the real environment; in fact, the simulator''s
    environment can be as fast as the machine running it.


    As a result, you can get a big and unpleasant surprise when the program runs really
    fast in the simulator environment but runs much slower in the real environment.
    I have observed many people blaming slow application performance on the phone''s
    network. This is certainly true in some cases. However, in many cases the app''s
    performance can drop down a lot because of the code implementation itself, not
    because of a network problem. Therefore, careful testing and benchmarking your
    app against basic tools and standard environments will make you more confident
    about your app''s performance and the user experience.


    To demonstrate the significant differences between the simulator and real device,
    I tested a program in the iPhone simulator environment and the real iPhone environment.
    The results are surprising.


    *   It takes 0.5 seconds to finish the main calculation in the iPhone simulator.

    *   It takes 7 seconds to finish the same calculation on the iPhone device.


    The program was simple: Idid a simple test withtwo arrays, each with 1000 elements.
    Then, the code loops over both arrays to find the same number and print “hello.”
    In the real world, you may not need to process 1000 items in an array or you may
    not choose to loop over arrays to find same number. However, this is not the point.
    Ipicked these actions to demonstrate that real iPhone environment is much slower
    than in the iPhone simulator.


    This brings me to a point that Iwill mention many times in this book: you always
    need to test the app on both simulator and the real device. Well, why not just
    test on the device? Because simulator has the following significant benefits:


    *   It is faster to run the test in the simulator, which means less delay time
    for developers.

    *   It is good enough to test for memory leaks and memory allocation problems.


    ### Memory and Performance


    Memory and performance are different. Memory usually means the RAM storage, and
    it refers to how much storage you use and how much you have left. Performance
    is about how fast your app runs a specific feature.


    Memory can have a significant effect on performance. When the device has more
    RAM and more storage space, you can preload and cache more data on it. RAM is
    fast access storage compared to file storage and the network. By preloading and
    caching more data on RAM, you can significantly speed up your program in many
    cases. For example, if your app is a game that needs to load many images, more
    memory is important to because you can preload the images and display them when
    necessary. Loading from RAM is 10 times faster than loading from the file system.


    However, better use of memory does not always mean better performance. Some apps
    don''t need to use much memory; therefore, you can optimize the memory only so
    far and the performance will not go up anymore. The inverse is not much better:
    an app can use up all the memory in order to achieve good performance, but then
    the app runs out of memory.


    Therefore, you should always carefully benchmark both the memory and runtime performance
    to make sure that you strike a good balance between memory usage and runtime performance.


    ### Tools


    The tools fall into the following three main categories:


    *   Basic tools, without XCode instruments.

    *   Memory tools, which verify the correctness and measure the efficiency of your
    memory usage.

    *   Performance tools, which measure how fast each part of your program runs and
    pinpoint any bottlenecks.


    #### Basic Tools


    In this part, I discuss about logging as a basic tool to measure the running time
    between blocks of code.


    ##### Logging the RunningTime


    One of the most basic tools is logging the time difference between the start and
    end of a block of code. Usually, logging is implemented with NSLog. With this
    basic tool, developers can measure every line of code or block of code to see
    how fast that block of code runs.


    ##### For example, running this block of code


    `NSDate *date1 = [NSDate date ;`

    `for (int i = 0; i < 1000; i++) {`

    `  // Do calculation here`

    `}`

    `NSDate *date2 = [NSDate date ;`

    `NSLog (@”time: %f”, [date2 timeIntervalSinceDate:date1 );`


    returns this result


    `time: 0.0123 (measured in seconds)`


    Advantages:


    *   A straightforward and easy way to measure the performance.

    *   You can measure the performance of lines of code or blocks of code.


    Disadvantages:


    *   You can''t measure the UI performance (i.e. the rendering time of the UI thread).

    *   You can over-optimize (spend too much time on a very specific block of code
    just to optimize it a little bit).

    *   Running the application in simulator is usually fast, and at this fast level,
    NSLog can''t help you distinguish between a difference in runtime performance.
    Otherwise, although NSLog is slow in the device, it can help you to detect the
    differences in runtime performance.


    Usage:


    *   When you need an immediate tool to measure without much planning.

    *   When you need a tool that can return a result quickly.

    *   When you need to isolate a small block of code to verify a performance assumption.


    ### Memory Tools


    With memory problems, you have only one main concern: high memory usage. There
    are minor concerns with legacy code: memory leak and memory garbage. For the new
    projects, you should go straight with the new Automatic Reference Counting (ARC
    in short) support. For some old projects, you can try to convert them using the
    convert tool of Xcode.


    However, not every project can be converted, there are many issues and memory
    management policy that prevents you from conversion. Trying to comply with the
    new management policy may cause you more troubles. So, I discuss mainly with you
    about the memory tools for object allocation and briefly about tools for memory
    leaks and memory garbage.


    **NOTE:** All the memory tools that I introduce here (and I introduce all Apple''s
    tools for memory) can be run with simulator. The good thing about the simulator
    is that it runs really fast and installs apps quickly. However, be careful! I
    strongly recommend that you also test your apps on the device because the simulator
    and device are not always the same. They are built differently and have different
    architectures.


    #### Memory Allocation


    Memory Allocation helps you to understand how much object allocations you use.
    This may mean that you allocate and keep in memory so many objects. These objects
    are not released yet because it is still in use.'
  trans: "\n### 模拟器与真机\n\niPhone 应用程序性能的主要问题在于它们运行在受限且处理速度较慢的环境中。iPhone 开发环境中的模拟器运行速度比真实环境快得多；事实上，模拟器的运行速度可以等同于其所在机器的速度。\n\
    \n因此，当程序在模拟器环境中运行飞快，但在真实环境中却慢得多时，你可能会遭遇一个大惊喜。我观察到很多人将应用程序性能缓慢归咎于手机的网络问题。在某些情况下，这确实是事实。然而，在许多情况下，应用性能的大幅下降是由于代码本身的实现问题，而非网络问题。因此，使用基础工具和标准环境对你的应用进行仔细测试和基准评测，会让你对应用的性能和用户体验更有信心。\n\
    \n为了展示模拟器与真机之间的显著差异，我在 iPhone 模拟器环境和真实 iPhone 环境中测试了一个程序。结果令人惊讶。\n\n-   在 iPhone\
    \ 模拟器中完成主要计算需要 **0.5 秒**。\n-   在 iPhone 真机上完成相同计算需要 **7 秒**。\n\n程序很简单：我用两个数组进行了一个简单测试，每个数组各有\
    \ 1000 个元素。然后，代码遍历这两个数组以查找相同的数字并打印 \"hello\"。在现实中，你可能不需要处理数组中的 1000 个元素，或者你可能不会选择遍历数组来查找相同的数字。然而，这不是重点。我选择这些操作是为了演示真实的\
    \ iPhone 环境比 iPhone 模拟器慢得多。\n\n这引出了我在本书中会多次提到的一个观点：你总是需要在模拟器和真机上都测试应用。那么，为什么不在真机上测试呢？因为模拟器有以下显著优点：\n\
    \n-   在模拟器中运行测试更快，这意味着开发者的等待时间更短。\n-   对于测试内存泄漏和内存分配问题来说，它已经足够好了。\n\n### 内存与性能\n\
    \n内存和性能是不同的。内存通常指 RAM 存储，它关乎你使用了多少存储空间以及还剩多少。性能则关乎你的应用运行某个特定功能的速度。\n\n内存对性能有显著影响。当设备拥有更多\
    \ RAM 和更多存储空间时，你可以在其中预加载和缓存更多数据。与文件存储和网络相比，RAM 是快速访问存储。通过在 RAM 上预加载和缓存更多数据，你可以在许多情况下显著加快程序速度。例如，如果你的应用是一个需要加载大量图片的游戏，更多的内存很重要，因为你可以预加载图片并在需要时显示它们。从\
    \ RAM 加载比从文件系统加载快 10 倍。\n\n然而，更好地使用内存并不总是意味着更好的性能。有些应用不需要使用太多内存；因此，你对内存的优化只能到一定程度，性能将不再提升。反之亦然：一个应用可能为了获得良好性能而耗尽所有内存，但随后应用就会耗尽内存。\n\
    \n因此，你始终应该仔细地对内存和运行时性能进行基准测试，以确保在内存储存和运行效率之间取得良好的平衡。\n\n### 工具\n\n工具主要分为以下三大类：\n\
    \n-   基础工具，不含 Xcode Instruments。\n-   内存工具，用于验证内存使用的正确性并衡量其效率。\n-   性能工具，用于测量程序各部分运行的速度并定位任何瓶颈。\n\
    \n#### 基础工具\n\n在这部分，我将讨论日志记录，作为一种测量代码块之间运行时间的基础工具。\n\n##### 记录运行时间\n\n最基础的工具之一是记录代码块开始和结束之间的时间差。通常，日志记录是通过\
    \ `NSLog` 实现的。有了这个基础工具，开发者可以测量每一行代码或代码块，以了解该代码块的运行速度。\n\n##### 例如，运行这段代码\n\n```\n\
    NSDate *date1 = [NSDate date];\nfor (int i = 0; i < 1000; i++) {\n  // 在此处进行计算\n\
    }\nNSDate *date2 = [NSDate date];\nNSLog (@\"时间: %f\", [date2 timeIntervalSinceDate:date1]);\n\
    ```\n\n会返回这个结果\n\n```\n时间: 0.0123（以秒为单位）\n```\n\n优点：\n\n-   衡量性能的一种简单直接的方法。\n\
    -   你可以测量代码行或代码块的性能。\n\n缺点：\n\n-   你无法衡量 UI 性能（即 UI 线程的渲染时间）。\n-   你可能会过度优化（花太多时间在一个非常特定的代码块上，仅仅是为了优化一点点）。\n\
    -   在模拟器中运行应用程序通常很快，在这种快速水平下，`NSLog` 无法帮助你区分运行时性能的差异。另外，虽然 `NSLog` 在设备上很慢，但它可以帮助你检测运行时性能的差异。\n\
    \n用法：\n\n-   当你需要一个无需过多规划即可立即使用的测量工具时。\n-   当你需要一个能快速返回结果的工具时。\n-   当你需要隔离一小段代码来验证某个性能假设时。\n\
    \n### 内存工具\n\n对于内存问题，你主要关心的只有一点：高内存使用率。对于遗留代码，还有一些次要问题：内存泄漏和内存垃圾。对于新项目，你应该直接使用新的自动引用计数（简称\
    \ `ARC`）支持。对于某些旧项目，你可以尝试使用 Xcode 的转换工具进行转换。\n\n然而，并非所有项目都能被转换；存在许多问题和内存管理策略阻碍你进行转换。尝试遵守新的管理策略可能会给你带来更多麻烦。因此，我主要与你讨论用于对象分配的内存工具，并简要介绍用于内存泄漏和内存垃圾的工具。\n\
    \n**注意：**  我在此介绍的所有内存工具（以及我介绍的所有 Apple 内存工具）都可以在模拟器中运行。模拟器的好处是它运行非常快，并且应用程序安装迅速。但是，小心！我强烈建议你也在真机上测试你的应用，因为模拟器和真机并非总是一致的。它们构建方式不同，架构也不同。\n\
    \n#### 内存分配\n\n内存分配有助于你了解自己使用了多少对象分配。这可能意味着你分配并保留了太多对象。这些对象尚未释放，因为它们仍在使用中。\n"
- fmt: '### Allocation


    Choose `Product` > `Profile` and then choose `Allocations` in the open window
    (as shown in [Figure 2–1](#Chapter02.html#fig_2_1)).


    ![images](images/0201.jpg)


    **Figure 2–1.** *Choose Allocation in Profile Window*


    After choosing the `Allocations` instrument, you will be shown a main `Allocation`
    panel, which gives you all the necessary information, as you can see in [Figure
    2–2](#Chapter02.html#fig_2_2).


    The `Allocations` panel ([Figure 2–2](#Chapter02.html#fig_2_2)) shows you “created
    and still living” jobs so that you can see what objects are still in memory and
    what objects consume the most memory. You should use this tool if you start receiving
    many warnings from the iOS environment like “Received memory warning. Level =1”.


    The details will show you at which time which lines of code and which class is
    responsible for creating and handling the objects. With this information, you
    can easily figure out how to deal with memory. This is a good tool for tracking
    caching algorithms and methods (see [Chapter 4](#Chapter04.html#ch4) for more
    details).


    ![images](images/0202.jpg)


    **Figure 2–2.** The main allocations panel


    [Figure 2–3](#Chapter02.html#fig_2_3) and [2–4](#Chapter02.html#fig_2_4) show
    you more details about what objects are living and consuming the most memory for
    your application. In [Figure 2–3](#Chapter02.html#fig_2_3), you see the list of
    details about objects that are created and live inside your application.


    ![images](images/0203.jpg)


    **Figure 2–3.** The allocation results


    In [Figure 2–4](#Chapter02.html#fig_2_4), you can see which methods are calling
    to create these objects.


    ![images](images/0204.jpg)


    **Figure 2–4.** The allocation details


    **Advantages:**


    - It is accurate and provides many details on the time and situation in which
    the application consumes the most memory.

    - It can also give you a good overview of the object''s lifecycle over the application
    lifetime.


    **Disadvantages:**


    - The results depend on how developers run the app. It requires a good test suite
    preparation to cover as many cases as possible.

    - It can take time and effort to create a good test case that helps developers
    to figure out the place and time the application consumes the most memory.

    - You need to test on the real device so that you can receive a memory warning
    message. The simulator will almost never give the memory warning message. The
    problem with using the simulator is that your computer will have 2–4GB of RAM
    and your device probably has much less.


    **Usages:**


    - If you test your app and receive a memory warning, this is one of the first
    tools you should reach for.


    ### Legacy Code


    At this release, the tool to automatically convert from a manual memory management
    project to a new ARC project may fail. The tool may ask you to fix lots of places
    in your current code to make sure the project can be converted into an ARC project.
    It may be that your open source library fails to convert into a new ARC style
    and you would not want to touch it. So, I think it is good for you to understand
    some background about manual memory management.


    #### Memory Leaks


    Memory leaks happen when you create a new object in memory and you don''t release
    it properly. That object will stay in memory for the whole application life. The
    result is that your application doesn''t have enough memory to run fast, or even
    worse, the iOS will force your application to close.


    ##### Static Analyzer


    This is a simple and straightforward tool to measure memory leaks. As shown in
    Figures 2–5 and 2–6, the tool will show you which line or block of code may **possibly**
    be causing the memory leak.


    ![images](images/0205.jpg)


    **Figure 2–5.** *Choose `Product` > `Analyze`*


    As shown in [Figure 2–5](#Chapter02.html#fig_2_5), you need to choose `Product`
    > `Analyze` or press `Command + Shift + B`.


    ![images](images/0206.jpg)


    **Figure 2–6.** *Static Analyzer reports a potential leak of an object allocation
    on line 19 and stored in `str`.*


    As you can see in [Figure 2–6](#Chapter02.html#fig_2_6), the `str` object in line
    19 is never released; in this case, Static Analyzer provides a correct warning.


    **Advantages:**


    - It gives you a quick and general look at possible places where memory leaks
    can happen.

    - It has a really fast process: it only builds and looks at the source code. Static
    Analyzer doesn''t need to run the program.

    - This tool requires no effort from the developer; you just click on `Build and
    Analyze`.


    **Disadvantages:**


    - Sometimes it''s not accurate. It can give an incorrect warning or not indicate
    places where there is a memory leak.


    **Usage:**


    - Developers should use this tool first to measure memory leak because it''s fast
    and requires almost no effort.


    ##### Leaks Instrument


    This is a better instrument that measures memory leak in runtime (when the app
    is running). This makes sure that the object is really leaked out; if an object
    is leaked out, it will have to be reported to the user. You keep trying different
    features of the app, and the Leaks Instrument will report memory leak places.


    You will need to look for places where the Leaks horizontal bar shows a vertical
    column. The height of the column will show how much memory the app has leaked
    at that time (see [Figure 2–7](#Chapter02.html#fig_2_7)).


    ![images](images/0207.jpg)


    **Figure 2–7.** Shows how many leaks you have had from running the code


    Then, when you go inside the details of the leaks, you may see a list of leaks
    happening in your code. By sorting by responsible library and looking for your
    app name (in this case, `LeaksViewController`), you will see two leaked objects.
    A quick look tells you that you leaked two images inside the class `RootViewController`.


    ![images](images/0208.jpg)


    **Figure 2–8.** A list of leaks inside your program


    As shown in [Figure 2–8](#Chapter02.html#fig_2_8), next to the address is a small
    arrow; by clicking on it, the Leaks Instrument will guide you to the correct place
    in the app that caused that leak (see [Figure 2–9](#Chapter02.html#fig_2_9)).


    ![images](images/0209.jpg)


    **Figure 2–9.** Lines of code that created the leaks


    At this point, you can observe the line of code that created the memory leak.
    Usually, the Leaks Instrument will give you exact details about where the memory
    leak happened so that you can easily fix it.


    **Advantages:**


    - The Leaks Instrument is very accurate and detailed.


    **Disadvantages:**


    - The results depend on how developers run the app. It requires a good test suite
    preparation to cover as many cases as possible.

    - It can be slow because developers need to run it a few times to see how the
    app performs in many different cases.


    **Usages:**


    - This tool should be used after the Static Analyzer is used. It will cover all
    other small and niche cases that the Static Analyzer missed.


    I recommend that you run Static Analyzer first. If you still have some concerns
    over memory usage or receive a memory warning from the iOS runtime environment,
    you should use the Leaks Instrument.


    #### Memory Garbage


    At first look, memory garbage may not seem to be related to performance issues.
    However, having your application crash is even worse than slow performance as
    it stops performance cold and kills the whole user experience that you want to
    create. Therefore, you should know how to make the best use of memory.'
