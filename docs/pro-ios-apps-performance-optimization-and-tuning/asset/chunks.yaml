  trans: '

    ### 分配


    选择 `Product` > `Profile`，然后在打开的窗口中选择 `Allocations`（如图 2-1 所示）。


    ![images](img/0201.jpg)


    **图 2-1.** *在 Profile 窗口中选择 Allocation*


    选择 `Allocations` 工具后，系统会显示一个主 `Allocation` 面板，其中包含所有必要信息，如图 2-2 所示。


    `Allocations` 面板（图 2-2）会显示“已创建且仍存活”的作业，以便你可以查看哪些对象仍存在于内存中，以及哪些对象消耗了最多的内存。如果你开始收到来自
    iOS 环境的许多警告，例如“收到内存警告，级别 =1”，则应使用此工具。


    详细信息会显示在哪个时间点，哪些代码行和哪个类负责创建和处理这些对象。有了这些信息，你可以轻松找出如何处理内存问题。这是跟踪缓存算法和方法的良好工具（详见第
    4 章）。


    ![images](img/0202.jpg)


    **图 2-2.** 主分配面板


    图 2-3 和 2-4 向你展示了关于哪些对象在你的应用程序中存活着并消耗最多内存的更多细节。在图 2-3 中，你会看到在你的应用程序中创建并存活的对象详细信息列表。


    ![images](img/0203.jpg)


    **图 2-3.** 分配结果


    在图 2-4 中，你可以看到是哪些方法调用来创建这些对象的。


    ![images](img/0204.jpg)


    **图 2-4.** 分配详情


    **优点：**


    -   精确度高，并提供有关应用程序消耗最多内存的时间和情况的许多细节。

    -   还能让你很好地概览对象在应用程序整个生命周期内的生命周期。


    **缺点：**


    -   结果取决于开发者如何运行应用程序。这需要准备良好的测试套件，以覆盖尽可能多的场景。

    -   创建良好的测试用例可能需要花费时间和精力，以帮助开发者找出应用程序消耗最多内存的位置和时间。

    -   你需要在真机上测试，才能收到内存警告消息。模拟器几乎永远不会给出内存警告消息。使用模拟器的问题是，你的电脑有 2-4GB 的 RAM，而你的设备可能少得多。


    **用途：**


    -   如果你在测试应用程序时收到内存警告，这应该是你先用的工具之一。


    ### 遗留代码


    在此版本中，将手动内存管理项目自动转换为新 ARC 项目的工具可能会失败。该工具可能会要求你修复当前代码中的许多地方，以确保项目可以转换为 ARC 项目。你的开源库可能无法转换为新的
    ARC 风格，而你又不愿去改动它。因此，我认为了解一些关于手动内存管理的背景知识对你是有好处的。


    #### 内存泄漏


    当你创建新的内存对象但没有正确释放它时，就会发生内存泄漏。该对象将在整个应用程序生命周期内驻留在内存中。结果是你的应用程序没有足够的内存来快速运行，更糟糕的是，iOS
    会强制关闭你的应用程序。


    ##### 静态分析器


    这是一个简单直接的用于测量内存泄漏的工具。如图 2-5 和 2-6 所示，该工具会指出哪一行或哪一段代码**可能**正在导致内存泄漏。


    ![images](img/0205.jpg)


    **图 2-5.** *选择 `Product` > `Analyze`*


    如图 2-5 所示，你需要选择 `Product` > `Analyze` 或按 `Command + Shift + B`。


    ![images](img/0206.jpg)


    **图 2-6.** *静态分析器报告了第 19 行对象分配的潜在泄漏，该对象存储在 `str` 中。*


    如图 2-6 所示，第 19 行的 `str` 对象从未被释放；在这种情况下，静态分析器给出了正确的警告。


    **优点：**


    -   它能让你快速概览可能发生内存泄漏的潜在位置。

    -   处理过程非常快速：它仅需构建并查看源代码。静态分析器无需运行程序。

    -   该工具对开发者无需额外操作；只需点击 `Build and Analyze`。


    **缺点：**


    -   有时它不够准确。它可能会给出错误的警告，或者没有指出存在内存泄漏的地方。


    **用途：**


    -   开发者应该首先使用此工具来测量内存泄漏，因为它快速且几乎无需额外操作。


    ##### Leaks 检测工具


    这是一个更好的工具，它能在运行时（应用程序运行时）测量内存泄漏。这确保了对象确实泄漏了；如果一个对象泄漏了，它将被报告给用户。你可以继续尝试应用程序的不同功能，Leaks
    检测工具会报告内存泄漏的位置。


    你需要查看 Leaks 水平条显示垂直柱状图的位置。柱状图的高度表示该时刻应用程序泄漏了多少内存（见图 2-7）。


    ![images](img/0207.jpg)


    **图 2-7.** 显示运行代码后发生了多少次泄漏


    然后，当你进入泄漏的详细信息时，可能会看到代码中发生的一系列泄漏。通过按负责库排序并查找你的应用名称（本例中为 `LeaksViewController`），你将看到两个泄漏的对象。快速查看可知，你在类
    `RootViewController` 中泄漏了两个图片。


    ![images](img/0208.jpg)


    **图 2-8.** 程序内部泄漏列表


    如图 2-8 所示，地址旁边有一个小箭头；点击它，Leaks 检测工具会将你引导至应用程序中导致该泄漏的正确位置（见图 2-9）。


    ![images](img/0209.jpg)


    **图 2-9.** 导致泄漏的代码行


    此时，你可以观察创建内存泄漏的代码行。通常，Leaks 检测工具会提供关于内存泄漏发生位置的确切细节，以便你轻松修复。


    **优点：**


    -   Leaks 检测工具非常准确和详细。


    **缺点：**


    -   结果取决于开发者如何运行应用程序。这需要准备良好的测试套件，以覆盖尽可能多的场景。

    -   可能会比较慢，因为开发者需要运行几次才能看到应用程序在许多不同情况下的表现。


    **用途：**


    -   此工具应在使用静态分析器之后使用。它将覆盖静态分析器遗漏的所有其他小型和特定场景。


    我建议你先运行静态分析器。如果你仍然对内存使用有所顾虑，或者收到了来自 iOS 运行时环境的内存警告，则应使用 Leaks 检测工具。


    #### 内存垃圾


    乍一看，内存垃圾似乎与性能无关。然而，应用程序崩溃比性能缓慢更糟糕，因为它会彻底中止性能，并毁掉你想要创造的用户体验。因此，你应该知道如何充分利用内存。'
- fmt: '# Zombie


    You choose `Product` → `Profile` → `Allocations`.


    You will be shown a running instrument. The problem is that this instrument does
    not measure anything or help you with the Zombie issue, so you need to stop it.
    Then, you need to configure the `Allocations` to work with the Zombie. In other
    words, when a crash happens, the Instrument will report where the crash happens.


    ![images](images/0210.jpg)


    **Figure 2–10.** The screen for Allocations Instrument


    For now, you do not need to care about the data in the lower part of [Figure 2–10](#Chapter02.html#fig_2_10);
    you only need to care about how to configure the Allocations Instrument to check
    for Zombie crash. [Figure 2–11](#Chapter02.html#fig_2_11) shows you how.


    ![images](images/0211.jpg)


    **Figure 2–11.** The main configuration for Allocations


    After configuring Allocations, you need to run the record action again; this will
    run the iPhone Simulator or device.


    Then, you just keep running and trying different features of the app until it
    crashes. The Allocations Instrument should give you a message like that in [Figure
    2–10](#Chapter02.html#fig_2_10).


    ![images](images/0212.jpg)


    **Figure 2–12.** The Zombie crash message


    If you click the arrow to go into the details, the lower part will show you a
    list of memory action on the specific object, like `malloc`, `autorelease`, `retain`,
    `release` (as shown in [Figure 2–13](#Chapter02.html#fig_2_13)). Your sample project
    is called `ZombieDebug`, so you only need to look at the second, third, and fourth
    lines.


    ![images](images/0213.jpg)


    **Figure 2–13.** The list of memory actions, like `malloc`, `autorelease`, `retain`
    and `release`


    [Figure 2–14](#Chapter02.html#fig_2_14) shows the corresponding block of code
    for the chosen statement in [Figure 2–13](#Chapter02.html#fig_2_13).


    ![images](images/0214.jpg)


    **Figure 2–14.** The code block that corresponds to the `malloc`/`autorelease`/`retain`/`release`
    statement in the instrument.


    **Advantages:**


    - It provides exact details about where the memory crash happened.

    - It can be tested on simulator.


    **Disadvantages:**


    - The result depends on how you run the app. Bad access may sometimes happen under
    specific conditions.


    **Usages:**


    - This tool should only be used when you receive a `EXEC_BAD_ACCESS` error.


    ## Performance Tools


    Memory is not the only source of performance problems. There are other techniques
    to improve application performance: better handling of reading and writing data
    from the file system and network, improving user interface responsiveness, and
    utilizing multithreading. To measure how good the performance of the application
    is, you can measure CPU usage, time usage, and battery energy usage. Moreover,
    these are all interrelated and I shall explain their relationships.


    CPU problems are related to how much your CPU has to process at one time in the
    worst scenario. The worst scenario is when CPU has too many tasks or it runs continuously.
    Generally, when there is no task, the CPU should not run, and it may only run
    in an event-oriented way when users interact with the app. However, when there
    are lots of tasks coming at the same time, such as processing user input, reading
    from file, and networking, the CPU should not have idle time. When there are lots
    of tasks and CPU has idle time, it means that CPU is not being used efficiently.
    To utilize the CPU when it comes to an intensive processing, you may need to use
    multithreading, and I will highlight some tools to keep track of thread usage.


    File I/O and network access is a time-consuming task when you need to read from
    a file to the memory. Therefore, for a good performance balance, you always need
    to have a good strategy for accessing files and the network. If you often read
    from a file and the network or read from it too late, users will have to wait
    a long time until data is displayed. However, if you read from them too early
    and store too much in memory, you will soon run out of memory or lack enough memory
    for other tasks. Therefore, measuring the file and network activity is an important
    task for developers.


    There is a huge difference between how well the app runs and how users perceive
    the performance of the app. The app can run with perfect memory usage or really
    fast data processing algorithms but users still feel that the app does not work
    or respond to their interactivity well. The reason is that the UI thread is too
    busy to respond or receive any user interactivity. You can measure how well the
    UI thread works in different cases.


    There is one unique thing about iOS. Generally, the Smartphone system is based
    on battery power. Energy is really important for these systems because users can''t
    keep charging them all day. Also, the system doesn''t have room for a big battery,
    like you find in a laptop. Desktops and servers are really different because they
    are always plugged in, which provides unlimited power, so developers don''t need
    to care much about energy. Laptops are more stable and have bigger battery life
    than mobile and handheld devices. Therefore, you will have to measure the energy
    usage of your app carefully.


    ### Instrument Applications


    You can choose `Run` → `Profile` or you should open the Instrument Application
    by typing `Command + Space` and then typing `Instrument`. The MacOS should give
    you the options shown in [Figure 2–15](#Chapter02.html#fig_2_15).


    ![images](images/0215.jpg)


    **Figure 2–15.** The Instrument Panel


    There are two main categories of instruments: instruments for iOS Simulator and
    ones for iOS Devices. Some of them can run in both environments but you have to
    be careful because the results can be sometimes different. As I already explained,
    the iOS Simulator is really different than the iOS device.


    ### CPU Measurement


    One of the most important instruments is the CPU Measurement Instruments. The
    CPU Measurement Instruments will tell you how different CPU activities run when
    your application is executing. They can show you how intensive and how long a
    CPU activity is running for a specific task in your application.'
