- fmt: '###### Core Animation


    `Core Animation` mainly measures how many frames per second the UI thread can
    render (in other words, draw) your UI to the user. UI thread is also the main
    thread to take care of the interaction of your users.


    ![images](images/0224.jpg)


    **Figure 2–24.** Three main panels in `Core Animation` results


    As you can see from [Figure 2–24](#Chapter02.html#fig_2_24), there are three main
    panels that you may need to look at to figure out the UI rendering performance.
    The first one is the graph in the first horizontal cell. This graph shows the
    changes in number of frames per second. The biggest number in the right shows
    the current number of frames per second; this absolute value should be as high
    as possible, and the highest value is 60 frames per second (60 FPS).


    The second graph is the sampler of the frames per second over a specific time;
    10 seconds is the default value of `Core Animation`.


    ![images](images/0225.jpg)


    **Figure 2–25.** The list of number of frames per second


    [Figure 2–25](#Chapter02.html#fig_2_25) actually gives you the list of number
    of frames per second over the last 10 running times. Generally, if inside the
    test you still interact with your application and expect it to run smoothly, the
    number should be around 55-60. If the number is small, it could mean one of two
    things. Either your UI thread has nothing to draw or it can''t get any CPU time
    to draw. In the later case, you have a serious performance problem that is keeping
    the UI thread so busy that it can''t draw anything.


    ![images](images/0226.jpg)


    **Figure 2–26.** The list of options to configure the `Core Animation`


    The list of options in [Figure 2–26](#Chapter02.html#fig_2_26) will give you more
    information when you run the instruments.


    *   `Color Blended Layers` adds a green layer for views that are opaque and red
    for those that are not opaque. This is important for the scrolling performance
    that you will see in [Chapter 3](#Chapter03.html#ch3). Making your view all opaque
    will make the rendering performance faster because the GPU does not need to draw
    twice in the same point. The colors will be displayed as shown in [Figure 2–27](#Chapter02.html#fig_2_27).


    ![images](images/0227.jpg)


    **Figure 2–27.** `Core Animation` instrument with color blended


    Advantages:


    *   `CoreAnimation` provides a general overview about the UI thread renders/draws
    the UI of your app and how fast the process is.

    *   You can gain more details by configuring the option inside the `Core Animation
    Instrument`.


    Disadvantages:


    *   You definitely need to run this tool on the device.

    *   It does not offer details about specific code-related problems.


    Usages:


    *   When the application runs slowly, developers should always check for UI rendering
    because the problem may lie inside rendering code, not in the logic processing
    code.


    ###### OpenGL ES Driver


    The `OpenGL ES Driver Instrument` will give you almost the same information as
    the `Core Animation` instrument so I won''t show the example to you again. However,
    there is one significant difference between `OpenGL` and `Core Animation`. `Core
    Animation` is a higher level framework than `OpenGL` so `Core Animation` actually
    uses `OpenGL`. However, if your code does not use any direct `OpenGL` code, you
    don''t need to use the `OpenGL ES Driver Instrument`. It''s good only for applications
    or games that use `OpenGL` framework.


    Advantages:


    *   Same as `Core Animation`.


    Disadvantages:


    *   Same as `Core Animation`.


    Usages:


    *   For applications that use `OpenGL` code.


    ##### File and Network Access Measurement


    For performance, there is one main important issue that all developers need to
    remember. That is file and network I/O. This process is slow because in I/O, you
    need to handle or wait for events that happen far slower than the processor instructions.
    So, unless it is done efficiently, it is possible that your application will waste
    a huge amount of time. You will learn more about file and network caching to save
    time when performing file and network I/O processing in [Chapter 4](#Chapter04.html#ch4).
    To measure the performance of the file and network I/O, you have two main tools:
    `System Usage` and `File Activity`.


    ###### System Usage


    ![images](images/0228.jpg)


    **Figure 2–28.** System I/O Performance


    `System Usage` is used to test the file and network I/O in the iOS runtime environment.
    As you can see in [Figure 2–28](#Chapter02.html#fig_2_28), there is some point
    that the I/O activity spikes. This can be a potential problem for performance
    if this file processing takes a long time, thus requiring users to wait for it
    to finish.


    ![images](images/0229.jpg)


    **Figure 2–29.** Detail List for System Activity


    [Figure 2–29](#Chapter02.html#fig_2_29) shows a detailed list of the file and
    network I/O processing. If you observe the list carefully, you will see that the
    file `TableCellViewController.nib` keeps loading from the file system. This can
    be a potential problem. So, a small optimization would be to cache the file or
    keep the object in the memory so that you don''t need to load it too many times.


    The information collected from `System Activity` and `Object Allocations` should
    be combined together to make sure that you have a good balance between performance
    and memory. You can''t simply cache any file you need when you have a really limited
    memory.


    Advantages:


    *   It provides detailed information about which file is loaded, how big the file
    is, and how often the file is loaded.


    Disadvantages:


    *   You need to run the test on the device.


    Usages:


    *   It helps developers make the right decision about caching files or reducing
    the file loading until they need the file. It can help with decisions about early-loading
    files to make sure that when the application needs the file, it''s already there,
    which will significantly reduce the waiting time for users.


    ###### File Activity


    The `File Activity Instrument` works like the `System Usage Instrument`, but it
    gives more details about the file as well as the library reading. As [Figure 2–30](#Chapter02.html#fig_2_30)
    shows, the Instrument gives really good details about file activity, reads/writes,
    file attributes, and directory I/O.


    ![images](images/0230.jpg)


    **Figure 2–30.** Main list of the `File Activity` instrument


    You will usually be more concerned about file activity and reads/writes than other
    parts because these attributes relate to the performance issues we are discussing.


    ![images](images/0231.jpg)


    **Figure 2–31.** Detailed list of file activities


    From [Figure 2–31](#Chapter02.html#fig_2_31), you can see that `File Activity`
    provides information about the `AddressBook` reading. This is not offered by the
    `System Usage Instrument`.


    Advantages:


    *   It provides detailed information about which file is loaded, the size of the
    file, and how often the file is loaded.

    *   It has more information about directory, file attributes, and how much read
    and write are executed.


    Disadvantages:


    *   The data on simulator may not be accurate.


    Usages:


    *   The tool should be combined with `System Usage`.'
