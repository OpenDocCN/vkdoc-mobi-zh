    `   NSTimeInterval maximumTimeInterval = 7 * 24 * 3600;  // 7 days caching`

    `   for (NSString *fileName in fileNames) {`

    `       NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];`


    `       NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath
    error:nil;`

    `       NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];`


    `       if ([createdDate timeIntervalSinceDate:[NSDate date]] > maximumTimeInterval)
    {`

    `           [fileManager removeItemAtPath:uniquePath error:nil];`

    `       }`

    `   }`


    Next are the more difficult caching algorithms that you probably won''t ever need
    to use. From my own experience, because the file storage can be really big, and
    you may only need to delete it once per several months, you can just use the simple
    time-based algorithm. For memory, because the memory is really limited in terms
    of storage but fast in terms of retrieval, you may need to use FIFO or LFU.


    ##### Least Recently Used (LRU)


    This algorithm is more complex than the algorithms covered up to this point. Imagine
    that you have a list of items. Whenever the same item is requested, you put that
    item at the head of the list. When you need to delete an item, you delete an item
    from the tail of the list. [Table 4-1](#Chapter04.html#tab_4_1) displays an example
    array of four items.


    ![images](images/t0401.jpg)


    As you can see in step 5, because a new item comes in (called 5) and I can only
    store four items inside the list, I have to delete item 3. But in a later step,
    item 3 is requested, and I don''t have enough space to cache it, so I delete item
    1.


    Advantage:


    *   It deletes the cache based on a better policy. The policy is based on the
    assumption that if a cache hasn''t had a request in a long time, it should be
    deleted.


    Disadvantage:


    *   It doesn''t care much about how often a cache is requested. In this example,
    if item 1 is requested three or four times in a row and then isn''t requested
    in the next three steps, should you delete it or keep it? I will cover another
    algorithm that will try to approach this issue later in this chapter


    Implementation: It can be implemented both with file and memory. But as mentioned,
    unless you need to store lots of data (especially images/videos) in file system
    and frequently need to access/delete them, you will not need to use this algorithm.


    Memory: I''m only showing you one way to implement this algorithm so that, but
    it might not be the best way to do it. However, I hope that you get the main idea.


    `   // cacheArrays is an array that stores cached items in an attempt to make
    the least`

    `   //   recently used object to be at the end of the array.`

    `   NSString *requestedItem = @"5";`

    `   if ([cacheArrays containsObject:requestedItem]) {`


    `       // If the caller requests an existing item, I add that item to the top
    of the`

    `       //    array`

    `       [cacheArrays removeObject:requestedItem];`

    `       [cacheArrays insertObject:requestedItem atIndex:0];`

    `   } else {`

    `       // If the code requests a new item that does not exist, I remove the last
    item`

    `       // (if  the cacheArrays is full) and add that new item into the top of
    the array.`

    `       [cacheArrays removeLastObject];`

    `       [cacheArrays insertObject:requestedItem atIndex:0];`

    `   }`'
  trans: "\n### 先进先出（FIFO）\n\n简而言之，此算法的规则是：最先进入缓存的项，将最先被删除。\n\n优点：\n\n*   该算法非常简单，几乎无需费力进行计算和比较。\n\
    *   如果你认为缓存项存在的时间越长，被删除的可能性就越大，那么它能带来一些好处。\n\n缺点：\n\n*   它没有考虑到哪些缓存项被请求得最频繁，或者未来被请求的可能性更高。\n\
    \n实现方式：\n\n文件：你需要基于文件的创建日期。你需要找到所有文件的创建日期，然后获取最早创建的日期以进行删除。\n\n```\nNSFileManager\
    \ *fileManager = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
    NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\n\
    NSString *smallestDateFilePath = @\"\";\nfor (NSString *fileName in fileNames)\
    \ {\n    NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n\
    \    NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath\
    \ error:nil];\n    NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];\n\
    // 我会把寻找最早创建日期的任务交给你作为一个小练习\n//  if (createdDate is smallest) {\n//     smallestDateFilePath\
    \ = uniquePath;\n// }\n}\n[fileManager removeItemAtPath:smallestDateFilePath error:nil];\n\
    ```\n\n内存：可以通过一个字典来跟踪所有数据/图片，并使用一个数组来记录数据/图片的顺序。我使用一个 `cacheOrders` 数组来存储图片的唯一名称列表。该数组按顺序存储数据：最旧的项位于索引\
    \ 0，最新的项位于数组末尾。\n\n```\n// cacheDictionary 是一个字典，用于存储图片名称与图片本身的映射关系\nNSString\
    \ *firstName = [cacheOrders objectAtIndex:0];\n[cacheDictionary removeObjectForKey:firstName];\n\
    [cacheOrders removeObjectAtIndex:0];\n```\n\n### 简单基于时间\n\n此算法主要基于时间。你为缓存指定一个基本时间段。在该特定时间段过后，应用会检查缓存已存在多长时间（缓存的寿命）。如果缓存的时长超过特定期限（例如\
    \ 14 天），缓存会被自动删除。\n\n优点：\n\n*   它非常简单——甚至比 FIFO 还要简单。\n*   它不需要花费太多时间和 CPU 来计算每个缓存的寿命。\n\
    *   你不需要跟踪额外的信息（例如 FIFO 中的缓存顺序）。\n\n缺点：\n\n*   它通常会导致删除过多或过少，这意味着你可能会删除超出需求的缓存。例如，如果你只需要删除文件系统中\
    \ 10MB 的图片以释放更多空间，但其中有 20MB 的图片早于特定日期，你就可能过度删除了。\n\n实现方式：通常用于文件系统缓存，而非内存缓存。\n\n\
    文件：你需要基于文件的创建日期。你需要找到所有文件的创建日期，并筛选出创建日期早于你指定日期的文件，然后删除这些文件。\n\n```\nNSFileManager\
    \ *fileManager = [NSFileManager defaultManager];\nNSString *filePath = NSTemporaryDirectory();\n\
    NSDirectoryEnumerator *fileNames = [fileManager enumeratorAtPath:filePath];\n\
    NSTimeInterval maximumTimeInterval = 7 * 24 * 3600;  // 7 天缓存\nfor (NSString *fileName\
    \ in fileNames) {\n    NSString *uniquePath = [filePath stringByAppendingPathComponent:fileName];\n\
    \n    NSDictionary* attributes = [fileManager attributesOfItemAtPath:uniquePath\
    \ error:nil];\n    NSDate *createdDate = [attributes objectForKey:NSFileCreationDate];\n\
    \n    if ([createdDate timeIntervalSinceDate:[NSDate date]] > maximumTimeInterval)\
    \ {\n        [fileManager removeItemAtPath:uniquePath error:nil];\n    }\n}\n\
    ```\n\n接下来是更复杂的缓存算法，你可能永远都无需使用。根据我个人的经验，文件存储空间可能非常大，而你或许只需每几个月删除一次数据，使用简单的基于时间的算法即可。对于内存来说，虽然其存储容量非常有限，但访问速度快，你可能需要使用\
    \ FIFO 或 LFU。\n\n### 最近最少使用（LRU）\n\n此算法比之前介绍的算法更复杂。假设你有一个项目列表。每当某个相同项目被请求时，你就将该项目放到列表的头部。当你需要删除一个项目时，你从列表的尾部删除一个项目。表\
    \ 4-1 展示了一个包含四个项目的示例数组。\n\n![images](img/t0401.jpg)\n\n如步骤 5 所示，由于新项目（称为 5）进来了，而列表中只能存储四个项目，因此我必须删除项目\
    \ 3。但在后续步骤中，项目 3 被请求了，而我没有足够的空间来缓存它，于是我删除了项目 1。\n\n优点：\n\n*   它基于更优的策略来删除缓存。该策略基于这样一个假设：如果一个缓存长时间未被请求，那就应该将其删除。\n\
    \n缺点：\n\n*   它不太关心缓存被请求的频率。在这个例子中，如果项目 1 被连续请求了三四次，然后在接下来的三步中未被请求，你是应该删除它还是保留它？本章后面会介绍另一种试图解决此问题的算法。\n\
    \n实现方式：它既可以在文件中实现，也可以在内存中实现。但如前所述，除非你需要在文件系统中存储大量数据（尤其是图片/视频）并频繁地访问/删除它们，否则你不会需要使用此算法。\n\
    \n内存：我只展示实现此算法的一种方式，这或许并非最佳方法。但我希望你能领会核心思想。\n\n```\n// cacheArrays 是一个数组，用于存储缓存项，其目的是让最近最少使用的对象排在数组末尾。\n\
    NSString *requestedItem = @\"5\";\nif ([cacheArrays containsObject:requestedItem])\
    \ {\n\n    // 如果调用者请求一个已存在的项，我将该项添加到数组的顶部\n    [cacheArrays removeObject:requestedItem];\n\
    \    [cacheArrays insertObject:requestedItem atIndex:0];\n} else {\n    // 如果代码请求一个不存在的新项，我将移除最后一个项（如果\
    \ cacheArrays 已满），\n    // 然后将新项添加到数组的顶部。\n    [cacheArrays removeLastObject];\n\
    \    [cacheArrays insertObject:requestedItem atIndex:0];\n}\n```\n"
- fmt: "# Least Frequently Used (LFU)\n\nThis algorithm is a little bit different\
    \ than the least recently used algorithm. It focuses on how often an item is requested.\
    \ If an item is requested more often than other items, it should be kept on the\
    \ cache. [Table 4-2](#Chapter04.html#tab_4_2) demonstrates the least frequently\
    \ used algorithm.\n\n![images](images/t0402.jpg)\n\nAs you can see, with the same\
    \ initial list and the same list of item requests, these two algorithms generate\
    \ different results at the end.\n\nAdvantage:\n\n- It actually involves the cache\
    \ hit ratio into the policy to determine if an item should be kept or deleted\
    \ from cache.\n\nDisadvantage:\n\n- Think about the following scenario: Item 1\
    \ is accessed 100 times right at the beginning. However, in the long term, it's\
    \ no longer accessed. The problem is that the item 1 will still be kept in the\
    \ cache because no other item has been accessed more than 100 times.\n\nImplementation:\
    \ It can be implemented both with file and memory. But, as mentioned, unless you\
    \ need to store lots of data (especially images/videos) in file system and frequently\
    \ need to access/delete them, you won't need to use this algorithm.\n\nMemory:\
    \ As a quick exercise, write a small objective-C code to implement the algorithm.\
    \ Don't look at the hints below and finish the algorithm yourself.\n\nAgain, try\
    \ to do it yourself as an exercise before moving to the next page to see the hints.\n\
    \n**HINTS**: You should use two dictionaries, one to keep track of the name →\
    \ object of the cache and the other of the name → count of access. Whenever a\
    \ new request comes in, you increase the count and check if you need to delete\
    \ the old cache. If you need to delete the old cache, then you should choose the\
    \ cache name with the smallest count of access.\n\n## Measuring Cache\n\nLet's\
    \ try some sample exercises to demonstrate some important points. As stated in\
    \ the replacement policy, you will have to face four main issues when deciding\
    \ your caching policy: cache hit ratio, latency, storage constraint, and algorithm\
    \ complexity. The algorithm complexity depends on your capability; if you are\
    \ a good developer, it may not have much effect on the decision over other factors.\n\
    \nImagine that you have two file-caching scenarios related to cache hit ratio\
    \ and retrieval constraint.\n\n- One strategy is that you try to cache 1,000 small\
    \ items (less than 30KB/item). Your cache hit ratio is 70%.\n- Another strategy\
    \ is that you cache 60 big items (about 500KB/item). Your cache hit ratio is 10%.\n\
    \nAs you can see, the storage cost for both strategies is the same: 30MB. The\
    \ cache hit ratio of the first strategy gives you 21KB while the other strategy\
    \ gives you 50KB. In terms of retrieval cost, you already saved more bandwidth\
    \ and loading time with the second strategy.\n\n[Table 4-3](#Chapter04.html#tab_4_3)\
    \ offers a quick summary of the terms you just learned.\n\n![images](images/t0403.jpg)\n\
    \n### What You Should Cache\n\nDevelopers should only care about caching few things:\
    \ images, videos, data, or sometimes HTML files so they can be loaded quickly\
    \ in `UIWebView`. I separate them out into two main types: either you cache the\
    \ whole file or you cache data and the relationship between that data. For each\
    \ kind, I will show you some important features that you need to remember when\
    \ you store those files.\n\n#### Where Should You Store Your Images?\n\nFor files\
    \ that you don't store inside your bundle, you have to think about where you should\
    \ store your files. In other words, where should you cache your files so that\
    \ you can retrieve them and not worry about its lifetime? There are some classic\
    \ locations where you can store your files: tmp directory, cache directory, documents\
    \ directory, photo albums (for images/videos only), and application bundle. Each\
    \ of them has a unique characteristic that you need to know and remember.\n\n\
    ##### Temporary Directory\n\nYou can access and store data inside this directory\
    \ by calling `NSTemporaryDirectory();`\n\nAdvantages:\n\n- It won't get backed\
    \ up. In fact, it will be deleted by the OS at some indeterminate time. The temporary\
    \ directory will also be deleted when the user restarts their iOS device.\n- You\
    \ don't need to worry about when to delete these files because it's the responsibility\
    \ of the OS.\n\nDisadvantages:\n\n- The application may not run when this directory\
    \ get deleted; therefore, you can't do anything or have any control over the deleting\
    \ process.\n- If you decide later that you want to retrieve files/images from\
    \ this directory, they most likely won't be there.\n\nUsage:\n\n- If you want\
    \ to store something quickly and temporarily. For example, you want to store some\
    \ screenshots of the app to show to users while they are waiting. Because the\
    \ screenshots are specific to the application state, you don't care too much about\
    \ storing them for long time.\n\n##### Cache Directory\n\nYou can access and store\
    \ data inside this directory by using the following code snippet:\n\n```\n+ (NSString\
    \ *)userCacheDirectory {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSCachesDirectory,\
    \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\nAdvantages:\n\
    \n- It won't be backed up. This will help the backup process faster when your\
    \ user syncs the app with his iTunes.\n- It won't be deleted automatically by\
    \ the iOS. You have control over what and when you store your files.\n\nDisadvantages:\n\
    \n- You need to make sure that this directory doesn't grow too much. In other\
    \ words, you need to make sure it doesn't consume too much of your users' hard\
    \ drive.\n\nUsage:\n\n- The main directory for you to store your caching files.\
    \ It's a perfect place to store images/videos/files that you can later display\
    \ to users.\n\n##### Documents Directory\n\nYou can access and store data inside\
    \ this directory by using the following code snippet:\n\n```\n+ (NSString *)userCacheDirectory\
    \ {\n   NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n   return [paths objectAtIndex:0];\n}\n```\n\nAdvantages:\n\
    \n- It will be backed up. Therefore, you may never lose the files/images you store\
    \ inside this folder.\n- It won't be deleted by the OS.\n\nDisadvantages:\n\n\
    - You have to take care of the folder and make sure that it doesn't grow too much.\
    \ I have seen many apps store data in this folder and it takes hours to back up\
    \ my whole device. The main time is spent storing images inside the documents\
    \ directory.\n- If your app allows file sharing through iTunes, any file that\
    \ you stored here will be shown in iTunes (see [Figure 4–5](#Chapter04.html#fig_4_5)).\
    \ Therefore, be careful that you don't store files with stupid names that confuse\
    \ users.\n\n    ![images](images/0405.jpg)\n\n    **Figure 4–5.** *List of documents\
    \ inside the document folder*\n\nUsage:\n\n- If you want your files to be backed\
    \ up and not to be lost later, then you should consider using this `Document`\
    \ directory. It's a good place to download documents or photos from a web service\
    \ that users always want to keep with them."
