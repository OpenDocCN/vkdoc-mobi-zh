    \ {\n    self.data = nil;\n    self.image = nil;\n}\n\n@end\n```\n\n将其与这个简单的线程和同步解决方案进行比较：\n\
    \n```objc\n@autoreleasepool {\n    NSData *imageData = [NSData dataWithContentsOfURL:imageURL];\n\
    }\n```\n\n你可以看到，在某些情况下，可能需要编写更多代码才能获得更好的性能。你只需确保自己的操作能真正带来收益即可。\n\n如果你要执行同步 HTTP\
    \ 请求，则必须在后台线程中运行它。根据 iOS 的策略，如果应用程序长时间无响应，就会被终止。这肯定会给用户留下不好的印象。\n\n**注意：** 如果有太多并发的\
    \ HTTP 调用，可以考虑创建单独的线程来处理异步调用，以避免对主线程造成任何影响。\n\n### 空闲时间通知\n\n有些操作你只想在系统空闲时执行。例如，如果你希望将一些反馈从\
    \ iPhone 发送到服务器，当其他进程正在运行或仍有其他用户与设备交互时，你可能不希望发送它。只有当用户或设备没有其他事情要做时，你才应该发送它。靠你自己完成这件事会非常困难。幸运的是，苹果为此提供了相应功能。你可以使用\
    \ `NSNotificationQueue` 以 `NSPostWhenIdle` 样式发布通知，如下代码所示：\n\n```objc\n- (void)notificationMethod\
    \ {\n    // 在此处执行某些操作\n}\n\n- (void)registerForNotification {\n    [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \   selector:@selector(notificationMethod)\n                                 \
    \                name:@\"my_notification\"\n                                 \
    \              object:nil];\n    NSNotification *notification = [NSNotification\
    \ notificationWithName:@\"my_notification\" object:nil];\n    [[NSNotificationQueue\
    \ defaultQueue] enqueueNotification:notification\n                           \
    \                   postingStyle:NSPostWhenIdle];\n}\n```\n\n如你所见，它的工作方式与你使用 `NSNotificationCenter`\
    \ 的正常方式类似；你需要将对象和方法添加为观察者和选择器。然后，你可以向队列发布一个新通知，以便在系统处于空闲状态时处理该方法。\n\n### iPhone\
    \ 的线程分析工具\n\n第 2 章 已经讨论过线程分析工具，因此 图 6-13 只是一个提醒你该工具的简单图示。\n\n![images](img/0613.jpg)\n\
    \n**图 6-13** *iPhone 的线程分析工具*\n\n该工具除了显示应用程序内部正在运行的线程的当前状态外，不会提供太多信息。这可以帮助你了解是否因运行过多线程而导致系统过载，或者是否有任何线程挂起并等待过长时间，这是死锁的信号。\n\
    \n### 总结\n\n在本章中，你学习了如何使用多线程来提高应用程序的性能。概念非常简单：创建一个新线程来处理一些计算。然而，为了确保应用程序的正确性和安全性，你需要了解许多不同的陷阱。你还需要了解\
    \ CPU 密集型任务和 I/O 密集型任务的概念，以确保你的操作能真正提升应用程序的性能，而不是使其变慢。你学习了如何以不同方式创建、管理和运行线程。你还学习了\
    \ Objective-C 风格及其语法来处理锁和线程同步问题，这些都非常重要。\n\n**练习**\n\n1.  编写一个完整的程序，从 Internet\
    \ 下载图像并将其显示到 `UIImageView` 中。你可以使用 XCode 中名为“基于视图的应用程序”的模板。\n2.  使用 `NSLock` 重写\
    \ `ThreadLock` 示例，使其没有死锁问题。\n3.  重写示例项目 MultiThreadingSample，使用线程处理同步请求而不是异步请求。\n\
    \n## 第 7 章\n\n## 优化内存使用以获得更好的性能\n\n在本章中，你将学习以下内容：\n\n- 回顾旧的手动内存管理策略\n- 对象所有权策略\n\
    - 基于旧的手动内存管理的全新自动内存管理\n- 什么是对象复制以及如何使用它\n- 如何正确使用 `autorelease` 和 `release` 方法\n\
    - 回顾内存分析工具\n\niPhone 是一个内存有限的环境。然而，许多开发人员要么低估要么高估了这一事实，因此他们没有利用 iPhone 中所有可用的内存来提升性能。另一些开发人员则对\
    \ iPhone 的内存和性能过于担心，以至于进行了大量过早优化，这损害了代码的可读性，并使后续维护代码库变得困难。\n\n为了在不让应用程序崩溃的情况下，利用内存获得更好的性能和可读性，你需要了解\
    \ iPhone 环境的内存结构。你需要学习如何避免在内存中持有过多对象，这可能会导致内存警告，进而崩溃。你还需要学习何时应该保留或释放对象；如果在内存中持有的对象太少，可能会使计算运行得更慢，因为你需要重建对象或从文件系统加载它。\n\
    \n### 简要回顾\n\n这部分将帮助你顺利过渡到新的自动引用计数 (ARC) 机制。有些人对过渡到新的学习体验感到困惑。我希望这部分可以帮助你顺利、毫无问题地过渡到新的\
    \ ARC 机制。\n"
- fmt: "### Old Object Ownership Policy\n\nThis old concept relates to if your object\
    \ A has a strong reference to another object B, your object A needs to manually\
    \ release this object B. Object A has a strong reference to object B if object\
    \ A `alloc`, `copy`, `mutableCopy`, `new` or `retain` object B. On the other hand,\
    \ if your object A does not call those methods in object B, object A only has\
    \ a weak reference to object B.\n\nFor the old memory management mechanism, if\
    \ your object or method has a strong reference to another object B, it is responsible\
    \ to `release` or `autorelease` that object B. Every strong reference to object\
    \ B will increase its retain count by 1. If no object has a strong reference to\
    \ object B anymore, in other words, the retain count is 0, object B is deallocated\
    \ (Listing 7.1).\n\n**Listing 7.1.** Release the Object if You Have a Strong Reference\n\
    \n```\n- (void)doSomething {\n  NSObject *obj = [[NSObject alloc] init];\n  NSLog(@\"\
    obj: %@\", obj);\n  [obj release];\n}\n```\n\n### Autorelease\n\nThe `autorelease`\
    \ method's job is to send the object to a pool and declare that this object will\
    \ later be released. Using this method, you don't want to have a strong reference\
    \ to the object anymore but you don't want it to be deallocated. Take a look at\
    \ Listing 7.2.\n\n**Listing 7.2.** Memory Issue\n\n```\n- (NSObject *)getObj {\n\
    \  NSObject *obj = [[NSObject alloc] init];\n  return obj;\n}\n\n- (void)anotherMethod\
    \ {\n  NSObject *myObj = [self getObj];\n  // do something\n  // Should I release\
    \ the object here?\n  [myObj release];\n}\n```\n\nNow, after you have finished\
    \ working with the object, you should ask yourself if you should release your\
    \ `myObj` now or not. Basically, you will think you have to release it; otherwise,\
    \ nobody will release that `myObj` and a memory leak will happen. However, because\
    \ your `anotherMethod` does not have a strong reference to `myObj`, it cannot\
    \ release `myObj`. The only way is to use `autorelease` as in Listing 7.3.\n\n\
    **Listing 7.3.** Use Autorelease to Solve the Problem\n\n```\n- (NSObject *)getObj\
    \ {\n  NSObject *obj = [[NSObject alloc] init];\n  return [obj autorelease];\n\
    }\n\n- (void)anotherMethod {\n  NSObject *myObj = [self getObj];\n  // do something\n\
    }\n```\n\n**NOTE:** The method `anotherMethod` does not have a strong reference.\n\
    \n### Autorelease Pool\n\nI will give a quick overview of autorelease pools and\
    \ then explain the concept in depth so you can understand the differences between\
    \ autorelease pool and release explicitly.\n\nThe autorelease pool is where all\
    \ of your autoreleased objects are stored. When this autorelease pool is released,\
    \ all the autoreleased objects will also be sent a `release` message. If the retain\
    \ count of an object is 0, that object will be deallocated.\n\nAn autorelease\
    \ pool will be released at the end of the event life cycle. For example, when\
    \ user taps into the UI, a new event life cycle is created to process the tap\
    \ event, then it processes all the logic related to that tap event, and finally\
    \ it displays the results back to user. This is one event life cycle. For that\
    \ event life cycle, you will have an autorelease pool.\n\nThe main autorelease\
    \ pool, which is created in the `main` method as the following code shows:\n\n\
    ```\nint main(int argc, char *argv[]) {\n   @autoreleasepool {\n      int retVal\
    \ = UIApplicationMain(argc, argv, nil, nil);\n   }  \n   return retVal;\n}\n```\n\
    \nAs you can see in the code, at the beginning of the method, a new autorelease\
    \ pool is created, then the main logic is executed using the `UIApplicationMain`;\
    \ after that event loop, the pool is released. This cycle is shown in Figure 7–1.\n\
    \n![images](images/0701.jpg)\n\n**Figure 7–1.** *Autorelease cycle*\n\n## Automatic\
    \ Reference Counting\n\nThe problem with the above process is that it gets more\
    \ complicated when you always need to remember the rules and when you need to\
    \ put `retain`, `release` or `autorelease` in. So, in the new Xcode (Xcode 4.2),\
    \ Apple released a new mechanism, which makes the process of `retain`, `release`\
    \ and `autorelease` to be automatic. All policies above still apply to the code\
    \ in the new version. But Xcode will append all the necessary code for you to\
    \ manage the memory.\n\nTo give you a quick picture, I will write the code in\
    \ Listing 7.1 and Listing 7.3 again.\n\n**Listing 7.4.** Rewrite Code for the\
    \ New ARC Mechanism\n\n```\nFor Listing 7.1:\n- (void)doSomething {\n        \
    \ NSObject *obj = [[NSObject alloc] init];\n        NSLog(@\"obj: %@\", obj);\n\
    }\n\nFor Listing 7.3:\n- (NSObject *)getObj {\n        NSObject *obj = [[NSObject\
    \ alloc] init];\n        return obj;\n}\n```\n\nThat's it! No more `release` or\
    \ `autorelease` is necessary. When you compile the code, Xcode will automatically\
    \ add all the necessary `release`/`autorelease` calls for you. After the compiler\
    \ adds these calls, the code will be exactly the same as Listing 7.1 and Listing\
    \ 7.3.\n\n## How to Set Up Your Project in Xcode?\n\nGo into your project settings,\
    \ find if the line **Objective-C Automatic Reference Counting** is set to **YES**\
    \ or not. You can see Figure 7–2 for the position of the setting line:\n\n![images](images/0702.jpg)\n\
    \n**Figure 7–2.** *Set up your project for ARC*\n\nIf your project is an existing\
    \ project with the old `retain`/`release`/`autorelease` call, you can use a migration\
    \ tool of Xcode to remove those unnecessary calls for your project as shown in\
    \ Figure 7–3.\n\n![images](images/0703.jpg)\n\n**Figure 7–3.** *Convert the old\
    \ code to Objective-C ARC*\n\n### ARC Policy\n\nYou need to follow some new rules\
    \ to make sure that your project is compatible with ARC:\n\n- You cannot use or\
    \ call the old memory management methods: `retain`, `release`, `autorelease` and\
    \ `retainCount`. You can override the `dealloc` method to do any clean up that\
    \ you need, but you must not call any `dealloc` method, for example `[super dealloc]`\
    \ is not allowed.\n\n  This rule also enforces you when setting up your properties:\n\
    \n  `@property (nonatomic, retain) NSString *myName; // This is not allowed.`\n\
    \n- You cannot use object pointers in C, this may create some problems for you\
    \ if you want to integrate C code into your project, as described in Chapter 9.\n\
    - You cannot use `NSAutoreleasePool` objects, and you must use `@autoreleasepool`.\n\
    \n  Instead of using:\n\n  ```\n  NSAutoreleasePool *myPool = [[NSAutoreleasePool\
    \ alloc] init];\n  // your code here\n  [pool release];\n  ```\n\n  You have to\
    \ use:\n\n  ```\n  @autoreleasepool {\n     // your code here\n  }\n  ```\n\n\
    ### New Qualifier for ARC\n\nAs the new ARC policy, you now need to include new\
    \ lifetime qualifiers to enforce new rules of ARC into the codebase.\n\n- `strong`\
    \ : This is to indicate that you want to keep a strong reference to this variable.\
    \ As long as there is a `strong` reference to an object A, object A will not be\
    \ deallocated.\n- `weak` : This works like assign, if you just want a reference\
    \ to the object, without explicitly own that object. Therefore, you do not need\
    \ to manage the lifetime of that object. The good thing is that if object A has\
    \ a `weak` reference to object B and object B is deallocated, the reference becomes\
    \ `nil`. This makes it safer when you will not have a reference to a deallocated\
    \ object.\n- `unsafe_unretained` : This is similar to `weak`, the difference is\
    \ that if the object B, which is referenced by object A, gets deallocated, the\
    \ reference will point to a deallocated object, which can cause a crash for your\
    \ application.\n- `autoreleasing` : If you have a method that needs to have a\
    \ pass-by-reference argument, you can consider using this qualifier. The method\
    \ will be responsible to autorelease the argument when it returns."
  raw: "#### Old Object Ownership Policy\n\nThis old concept relates to if your object\
    \ A has a strong reference to another object B, your object A needs to manually\
    \ release this object B. Object A has a strong reference to object B if object\
    \ A **`alloc, copy, mutableCopy, new or retain`** object B. On the other hand,\
    \ if your object A does not call those methods in object B, object A only has\
    \ a weak reference to object B.\n\nFor the old memory management mechanism, if\
    \ your object or method has a strong reference to another object B, it is responsible\
    \ to **`release`** or **`autorelease`** that object B. Every strong reference\
    \ to object B will increase its retain count by 1\\. If no object has a strong\
    \ reference to object B anymore, in other words, the retain count is 0, object\
    \ B is deallocated ([Listing 7.1](#Chapter07.html#list_7_1)).\n\n**Listing 7.1.**\
    \ Release the Object if You Have a Strong Reference\n\n`- (void)doSomething {`\n\
    `  NSObject *obj = [[NSObject alloc] init];`\n`  NSLog(@\"obj: %@\", obj);`\n\
    `  [obj release];`\n`}`\n\n#### Autorelease\n\nThe autorelease method's job is\
    \ to send the object to a pool and declare that this object will later be released.\
    \ Using this method, you don't want to have a strong reference to the object anymore\
    \ but you don't want it to be deallocated. Take a look at [Listing 7.2.](#Chapter07.html#list_7_2)\n\
    \n**Listing 7.2.** Memory Issue\n\n`- (NSObject *)getObj {`\n`  NSObject *obj\
    \ = [[NSObject alloc] init];`\n`  return obj;`\n`}`\n\n`- (void)anotherMethod\
    \ {`\n`  NSObject *myObj = [self getObj];`\n`  // do something`\n`  // Should\
    \ I release the object here?`\n`  [myObj release];`\n`}`\n\nNow, after you have\
    \ finished working with the object, you should ask yourself if you should release\
    \ your `myObj` now or not. Basically, you will think you have to release it; otherwise,\
    \ nobody will release that `myObj` and a memory leak will happen. However, because\
    \ your `anotherMethod` does not have a strong reference to `myObj`, it cannot\
    \ release `myObj`. The only way is to use `autorelease` as in [Listing 7.3](#Chapter07.html#list_7_3).\n\
    \n**Listing 7.3.** Use Autorelease to Solve the Problem\n\n`- (NSObject *)getObj\
    \ {`\n`  NSObject *obj = [[NSObject alloc] init];`\n`  return [obj autorelease];`\n\
    `}`\n\n`- (void)anotherMethod {`\n`  NSObject *myObj = [self getObj];`\n`  //\
    \ do something`\n`}`\n\n**NOTE:** The method `anotherMethod` does not have a strong\
    \ reference\n\n#### Autorelease Pool\n\nI will give a quick overview of autoreleasepools\
    \ and then explain the concept in depth so you can understand the differences\
    \ between autorelease pool and release explicitly.\n\nThe autorelease pool is\
    \ where all of your autoreleased objects are stored. When this autorelease pool\
    \ is released, all the autoreleased objects will also be sent a release message.\
    \ If the retain count of an object is 0, that object will be deallocated.\n\n\
    An autoreleasepool will be released at the end of the event life cycle. For example,\
    \ when user taps into the UI, a new event life cycle is created to process the\
    \ tap event, then it processes all the logic related to that tap event, and finally\
    \ it displays the results back to user. This is one event life cycle. For that\
    \ event life cycle, you will have an autorelease pool.\n\nThe main autorelease\
    \ pool, which is created in the `main` method as the following code shows:\n\n\
    `int main(int argc, char *argv[]) {`\n\n`   @autoreleasepool {`\n`      int retVal\
    \ = UIApplicationMain(argc, argv, nil, nil);`\n`   }  `\n`   return retVal;`\n\
    `}`\n\nAs you can see in the code, at the beginning of the method, a new autorelease\
    \ pool is created, then the main logic is executed using the `UIApplicationMain`;\
    \ after that event loop, the pool is released. This cycle is shown in [Figure\
    \ 7–1](#Chapter07.html#fig_7_1).\n\n![images](images/0701.jpg)\n\n**Figure 7–1.**\
    \ *Autorelease cycle*\n\n### Automatic Reference Counting\n\nThe problem with\
    \ the above process is that it gets more complicated when you always need to remember\
    \ the rules and when you need to put `retain, release or autorelease` in. So,\
    \ in the new Xcode (Xcode 4.2), Apple released a new mechanism, which makes the\
    \ process of `retain, release and autorelease` to be automatic. All policies above\
    \ still apply to the code in the new version. But Xcode will append all the necessary\
    \ code for you to manage the memory.\n\nTo give you a quick picture, I will write\
    \ the code in [Listing 7.1](#Chapter07.html#list_7_1) and [Listing 7.3](#Chapter07.html#list_7_3)\
    \ again.\n\n**Listing 7.4.** Rewrite Code for the New ARC mechanism\n\n`For Listing\
    \ 7.1:`\n`- (void)doSomething {`\n`         NSObject *obj = [[NSObject alloc]\
    \ init];`\n`        NSLog(@\"obj: %@\", obj);`\n`}`\n\n`For Listing 7.3:`\n`-\
    \ (NSObject *)getObj {`\n`        NSObject *obj = [[NSObject alloc] init];`\n\
    `        return obj;`\n`}`\n\nThat's it! No more `release` or `autorelease` is\
    \ necessary. When you compile the code, Xcode will automatically add all the necesary\
    \ `release/autorelease` calls for you. After the compiler adds these calls, the\
    \ code will be exactly the same as [Listing 7.1](#Chapter07.html#list_7_1) and\
    \ [Listing 7.3](#Chapter07.html#list_7_3).\n\n### How to Set Up Your Project in\
    \ Xcode?\n\nGo into your project settings, find if the line **Objective-C Automatic\
    \ Reference Counting** is set to **YES** or not. You can see [Figure 7–2](#Chapter07.html#fig_7_2)\
    \ for the position of the setting line:\n\n![images](images/0702.jpg)\n\n**Figure\
    \ 7–2.** *Set up your project for ARC*\n\nIf your project is an existing project\
    \ with the old `retain/release/autorelease` call, you can use a migration tool\
    \ of Xcode to remove those unnecessary calls for your project as shown in [Figure\
    \ 7–3](#Chapter07.html#fig_7_3).\n\n![images](images/0703.jpg)\n\n**Figure 7–3.**\
    \ *Convert the old code to Objective-C ARC*\n\n#### ARC Policy\n\nYou need to\
    \ follow some new rules to make sure that your project is compatible with ARC:\n\
    \n*   You cannot use or call the old memory management methods: `retain`, `release,\
    \ autorelease` and `retainCount`. You can override the `dealloc` method to do\
    \ any clean up that you need, but you must not call any `dealloc` method, for\
    \ example `[super dealloc]` is not allowed.\n\n    This rule also enforces you\
    \ when setting up your properties:\n\n    **`@property (nonatomic, retain) NSString\
    \ *myName; // This is not allowed.`**\n*   You cannot use object pointers in C,\
    \ this may create some problems for you if you want to integrate C code into your\
    \ project, as described in [Chapter 9](#Chapter09.html#ch9).\n*   You cannot use\
    \ `NSAutoreleasePool` objects, and you must use @`autoreleasepool`.\n\n    Instead\
    \ of using:\n\n    `NSAutoreleasePool *myPool = [[NSAutoreleasePool alloc] init];`\n\
    \    `// your code here`\n    `[pool release];`\n\n    You have to use:\n\n  \
    \  `@autoreleasepool {`\n    `   // your code here`\n    `}`\n\n#### New Qualifier\
    \ for ARC\n\nAs the new ARC policy, you now need to include new lifetime qualifiers\
    \ to enforce new rules of ARC into the codebase.\n\n*   `strong` : This is to\
    \ indicate that you want to keep a strong reference to this variable. As long\
    \ as there is a `strong` reference to an object A, object A will not be deallocated.\n\
    *   `weak` : This works like assign, if you just want a reference to the object,\
    \ without explicitly own that object. Therefore, you do not need to manage the\
    \ lifetime of that object. The good thing is that if object A has a `weak` reference\
    \ to object B and object B is deallocated, the reference becomes nil. This makes\
    \ it safer when you will not have a reference to a deallocated object.\n*   `unsafe_unretained:`\
    \ This is similar to `weak,` the difference is that if the object B, which is\
    \ referenced by object A, gets deallocated, the reference will point to a deallocated\
    \ object, which can cause a crash for your application.\n*   `autoreleasing:`\
    \ If you have a method that needs to have a pass-by-reference argument, you can\
    \ consider using this qualifier. The method will be responsible to autorelease\
    \ the argument when it returns."
  trans: "\n### 旧版对象所有权策略\n\n这个旧概念是指：如果你的对象 A 对另一个对象 B 持有强引用，那么对象 A 需要手动释放对象 B。当对象\
    \ A 通过 `alloc`、`copy`、`mutableCopy`、`new` 或 `retain` 方法获取对象 B 时，对象 A 就对对象 B 持有强引用。反之，如果对象\
    \ A 没有调用对象 B 的这些方法，那么对象 A 仅持有对对象 B 的弱引用。\n\n对于旧版内存管理机制，如果你的对象或方法对另一个对象 B 持有强引用，那么它有责任负责\
    \ `release` 或 `autorelease` 该对象 B。每次对对象 B 的强引用都会使其引用计数增加 1。如果没有任何对象再持有对对象 B 的强引用，换句话说，其引用计数为\
    \ 0，那么对象 B 就会被释放（代码清单 7.1）。\n\n**代码清单 7.1.** 如果持有强引用，需释放对象\n\n```\n- (void)doSomething\
    \ {\n  NSObject *obj = [[NSObject alloc] init];\n  NSLog(@\"obj: %@\", obj);\n\
    \  [obj release];\n}\n```\n\n### 自动释放\n\n`autorelease` 方法的作用是将对象发送到一个池中，并声明该对象将在稍后被释放。使用此方法时，你不再想持有该对象的强引用，但又不希望它立即被释放。请看代码清单\
    \ 7.2。\n\n**代码清单 7.2.** 内存问题\n\n```\n- (NSObject *)getObj {\n  NSObject *obj =\
    \ [[NSObject alloc] init];\n  return obj;\n}\n\n- (void)anotherMethod {\n  NSObject\
    \ *myObj = [self getObj];\n  // 执行一些操作\n  // 我应该在这里释放该对象吗？\n  [myObj release];\n\
    }\n```\n\n现在，当你处理完对象后，需要思考是否应该立即释放你的 `myObj`。通常你会认为必须释放它；否则，没有人会释放那个 `myObj`，从而导致内存泄漏。然而，因为你的\
    \ `anotherMethod` 并没有持有对 `myObj` 的强引用，所以它无法释放 `myObj`。唯一的办法是像代码清单 7.3 那样使用 `autorelease`。\n\
    \n**代码清单 7.3.** 使用自动释放解决该问题\n\n```\n- (NSObject *)getObj {\n  NSObject *obj =\
    \ [[NSObject alloc] init];\n  return [obj autorelease];\n}\n\n- (void)anotherMethod\
    \ {\n  NSObject *myObj = [self getObj];\n  // 执行一些操作\n}\n```\n\n**注意：** 方法 `anotherMethod`\
    \ 不持有强引用。\n\n### 自动释放池\n\n我先快速概述一下自动释放池，然后深入解释这个概念，以便你理解自动释放池与显式释放之间的区别。\n\n自动释放池是存储所有自动释放对象的地方。当这个自动释放池被释放时，所有自动释放的对象也会收到一条\
    \ `release` 消息。如果某个对象的引用计数为 0，那么该对象就会被释放。\n\n自动释放池会在事件生命周期的结束时被释放。例如，当用户点击 UI\
    \ 时，会创建一个新的事件生命周期来处理点击事件，然后处理与该点击事件相关的所有逻辑，最后将结果显示给用户。这就是一个事件生命周期。对于那个事件生命周期，你会有一个自动释放池。\n\
    \n主要的自动释放池在 `main` 方法中创建，如下代码所示：\n\n```\nint main(int argc, char *argv[]) {\n\
    \   @autoreleasepool {\n      int retVal = UIApplicationMain(argc, argv, nil,\
    \ nil);\n   }  \n   return retVal;\n}\n```\n\n如代码所示，在方法开始时，会创建一个新的自动释放池，然后通过 `UIApplicationMain`\
    \ 执行主要逻辑；在该事件循环结束后，池被释放。这个循环过程如图 7–1 所示。\n\n![images](img/0701.jpg)\n\n**图 7–1.**\
    \ *自动释放循环*\n\n## 自动引用计数\n\n上述过程的问题在于，当你总是需要记住何时使用 `retain`、`release` 或 `autorelease`\
    \ 的规则时，情况会变得非常复杂。因此，在新的 Xcode（Xcode 4.2）中，苹果发布了一种新机制，使得 `retain`、`release` 和 `autorelease`\
    \ 的流程实现自动化。上述所有策略在新版本中仍然适用于代码。但 Xcode 会为你追加所有必要的代码来管理内存。\n\n为了让你快速了解，我将再次编写代码清单\
    \ 7.1 和代码清单 7.3 中的代码。\n\n**代码清单 7.4.** 为新的 ARC 机制重写代码\n\n```\n对于代码清单 7.1：\n- (void)doSomething\
    \ {\n         NSObject *obj = [[NSObject alloc] init];\n        NSLog(@\"obj:\
    \ %@\", obj);\n}\n\n对于代码清单 7.3：\n- (NSObject *)getObj {\n        NSObject *obj\
    \ = [[NSObject alloc] init];\n        return obj;\n}\n```\n\n就是这样！不再需要 `release`\
    \ 或 `autorelease`。当你编译代码时，Xcode 会自动为你添加所有必要的 `release`/`autorelease` 调用。在编译器添加这些调用之后，代码将与代码清单\
    \ 7.1 和代码清单 7.3 完全相同。\n\n## 如何在 Xcode 中设置你的项目？\n\n进入你的项目设置，找到**Objective-C 自动引用计数**这一行，查看其是否设置为\
    \ **YES**。你可以从图 7–2 看到该设置行的位置：\n\n![images](img/0702.jpg)\n\n**图 7–2.** *为你的项目设置\
    \ ARC*\n\n如果你的项目是一个包含旧版 `retain`/`release`/`autorelease` 调用的现有项目，你可以使用 Xcode 的迁移工具来移除项目中那些不必要的调用，如图\
    \ 7–3 所示。\n\n![images](img/0703.jpg)\n\n**图 7–3.** *将旧代码转换为 Objective-C ARC*\n\
    \n### ARC 策略\n\n你需要遵循一些新规则，以确保你的项目与 ARC 兼容：\n\n- 你不能使用或调用旧的内存管理方法：`retain`、`release`、`autorelease`\
    \ 和 `retainCount`。你可以重写 `dealloc` 方法以进行所需的任何清理，但绝不能调用任何 `dealloc` 方法，例如不允许调用 `[super\
    \ dealloc]`。\n\n  此规则在你设置属性时也会强制执行：\n\n  `@property (nonatomic, retain) NSString\
    \ *myName; // 这是不允许的。`\n\n- 你不能在 C 语言中使用对象指针，如果你想将 C 代码集成到项目中，这可能会带来一些问题，详见第 9\
    \ 章。\n- 你不能使用 `NSAutoreleasePool` 对象，而必须使用 `@autoreleasepool`。\n\n  不要使用：\n\n\
    \  ```\n  NSAutoreleasePool *myPool = [[NSAutoreleasePool alloc] init];\n  //\
    \ 你的代码\n  [pool release];\n  ```\n\n  你必须使用：\n\n  ```\n  @autoreleasepool {\n\
    \     // 你的代码\n  }\n  ```\n\n### 用于 ARC 的新限定符\n\n根据新的 ARC 策略，你现在需要包含新的生命周期限定符，以在代码库中强制执行\
    \ ARC 的新规则。\n\n- `strong`：这表示你想对该变量保持强引用。只要存在对对象 A 的 `strong` 引用，对象 A 就不会被释放。\n\
    - `weak`：它的作用类似于 assign，如果你只是想要一个指向该对象的引用，而不明确拥有该对象。因此，你不需要管理该对象的生命周期。好处是，如果对象\
    \ A 持有对对象 B 的 `weak` 引用，并且对象 B 被释放，该引用会变为 `nil`。这使得当引用的对象已被释放时，你不会持有指向它的引用，从而更加安全。\n\
    - `unsafe_unretained`：这类似于 `weak`，区别在于，如果对象 A 引用的对象 B 被释放，该引用将指向一个已被释放的对象，这可能导致应用程序崩溃。\n\
    - `autoreleasing`：如果你有一个方法需要传递引用参数，可以考虑使用此限定符。该方法将负责在返回时自动释放该参数。\n"
- fmt: '#### Object Property


    Now, you need to change the object property declaration. Instead of using old
    memory management mechanism: `@property (retain) NSString *myString` as in the
    previous version, you now have a new set of rules.


    If you want to have an ownership to the object:


    ```

    // This is similar to @property (retain) NSString *myString

    @property(strong) NSString *myString;

    ```


    If you just want a reference to the object, without the ownership:


    ```

    // This is similar to @property (assign) UIViewController *myViewController;

    //  except that if myViewController object is deallocated,

    //  the reference becomes nil.

    @property(weak) UIViewController*myString;

    ```


    **NOTE:** If you want your application to run in iOS4, you cannot use `weak`,
    you need to use `unsafe_unretained` and set the reference to nil yourself.


    ##### Variable Declarations


    To use the qualifier inside the methods, you need to add `__` into the beginning
    of it. For example, you will have `__strong` or `__weak`. In methods, `__strong`
    qualifier is the default qualifier.


    Using `__strong` qualifier guarantees that your object is still alive until the
    end of the method, and be careful with using `__weak` or `__unsafe_unretained`.
    If there is no strong reference to your object, your object will be deallocated
    immediately. For example:


    ```

    NSString __weak *myString = @"hello world";

    NSLog (@"myString: %@", myString);

    ```


    Will print out `(null)` because at the time the `myString` object is printed,
    there is no strong reference to it.


    The `__autoreleasing` qualifier is used for methods receiving a pass by reference
    argument.


    ```

    - (BOOL)performTaskWithError:(NSError *__autoreleasing *)error;

    ```


    You can call that method normally using:


    ```

    NSError *error = nil;

    [self performTaskWithError:&error];

    ```


    By default, the error object is declared with strong qualifier, but the compiler
    will add code in to make the method call `[self performTaskWithError:&error]`.


    **NOTE:** For all methods that return an object, and the name does not contain
    `new`, `alloc`, or `copy`, the object will automatically be autoreleased on return.


    ### Advanced Memory Issues


    Now that you have learned the most basic memory techniques, I will introduce you
    to some advanced memory topics.


    #### Retain/Relationship Cycles


    In the old memory management world, if object A owns object B, then object A has
    to release object B when object A gets deallocated. However, what happens if object
    A owns object B and objects B also owns object A?


    You want to release object A by calling `release` method on it and setting your
    reference to nil. However, because object B still owns object A, the retain count
    of object A is greater than 0. It''s the same when you release object B; its retain
    count is still greater than 0 because object A still owns object B.


    This sequence keeps going on like this without any object getting deallocated,
    as illustrated by Figure 7–4.


    ![images](images/0704.jpg)


    **Figure 7–4.** *Retain cycle*


    This still holds true for the new ARC mechanism, if you have 2 objects having
    strong reference to each other, both objects get leaked.


    So what do you need to do if you want both objects to own each other? You need
    weak references.


    ### UIViewController


    All iPhone apps require that you work with the `UIViewController` (how else can
    you have your UI?). Therefore, understanding the `UIViewController` life cycle
    will help you with many important things, such as:


    - Utilizing your memory better.

    - Avoiding any memory leaks.

    - Improving responsiveness.


    From my observation when teaching and conduct training for many developers, many
    of them make a serious mistake by not understanding the management life cycle
    of a view controller object. There are some main management processes in the iPhone
    environment to control the life cycle of a view controller object, such as:


    - Loading the view.

    - Unloading the view when the system needs to reclaim memory.

    - Releasing the view.

    - Displaying or hiding the view from the UI.


    #### Load View Process


    When a view controller is asked for its view, it checks if its view is loaded
    into the memory or not. If not, then it will load that view and then the method
    `viewDidLoad` is called. Figure 7–6 shows the process of loading the view.


    ![images](images/0706.jpg)


    **Figure 7–6.** *Loading view process*


    There are some notes about performance that you should remember about this loading
    view process:


    - If you override the `loadView` method, you need to create the view hierarchy
    to display to the UI. This can lead to slightly better performance because it
    doesn''t need to load the view from a nib file.

    - If you don''t override the `loadView` method, the iOS environment will automatically
    look for the nib file that you specify or a nib file that has the same name as
    the view controller file. Using a nib file is better for maintenance and is a
    drag and drop feature.

    - If nothing is matched, the iOS environment will create a new and empty view
    and return that empty view.


    #### Unload View Process


    This process is really important for memory and performance. The main reason is
    that this process is running when your application has a memory warning and needs
    to reclaim the memory resource. In this process, the `didReceiveMemoryWarning`
    method will be called first and then the `viewDidUnload` method is called. Views
    that are on the screen will not get unloaded. You can see the process in Figure
    7–7.


    ![images](images/0707.jpg)


    **Figure 7–7.** *Unloading view process*


    In this unloading view process, there are a couple of performance and memory issues
    you need to remember:


    - Make sure that when the method `didReceiveMemoryWarning` is called, you clear
    the memory cache for your heavy objects, such as all image cache. If you don''t
    do so, the iOS environment can force your app to close, which is a really bad
    user experience.

    - You shouldn''t clear or release any view here because it may be unsafe to do
    so. Instead, you should call `[super didReceiveMemoryWarning]` so the superclass
    can check if it is safe to release the subview or not.

    - If it is safe to release its view, the method `viewDidUnload` will be called.
    You can choose to override this method to do any clean up required for your views
    and hierarchy.


    **NOTE:** When you override loading methods such as `init`, `loadView`, and `viewDidLoad`,
    the call to the superclass must be at the beginning of the method. However, if
    you override cleaning methods, such as `didReceiveMemoryWarning`, `viewDidUnload`
    or `dealloc`, the call to the superclass has to be at the end of the method.


    There are some key points in `viewDidUnload` that confuse many developers.


    - `viewDidLoad` and `viewDidUnload` do not correspond to each other. The `viewDidLoad`
    method is called after the view controller object is initialized and a view is
    requested. `viewDidUnload` is called after a memory warning is received. After
    calling `viewDidUnload`, there is no call to the `dealloc` method of the view
    controller object. The view that is unloaded will be deallocated.

    - In `viewDidUnload`, you only clean up your views; all other objects will be
    cleaned up or released in `didReceiveMemoryWarning`.'
  raw: '#### Object Property


    Now, you need to change the object property declaration. Instead of using old
    memory management mechanism: `@property (retain) NSString *myString` as in the
    previous version, you now have a new set of rules.


    If you want to have an ownership to the object


    `// This is similar to @property (retain) NSString *myString`

    `@property(strong) NSString *myString;`


    If you just want a reference to the object, without the ownership


    `// This is similar to @property (assign) UIViewController *myViewController;`

    `//  except that if myViewController object is deallocated,`

    `//  the reference becomes nil.`

    `@property(weak) UIViewController*myString;`


    **NOTE:** If you want your application to run in iOS4, you cannot use `weak`,
    you need to use `unsafe_unretained` and set the reference to nil yourself.


    ##### Variable Declarations


    To use the qualifier inside the methods, you need to add `__` into the beginning
    of it. For example, you will have `__strong` or `__weak`. In methods, `__strong`
    qualifier is the default qualifier.


    Using `__strong` qualifier guarantees that your object is still alive until the
    end of the method, and be careful with using `__weak` or `__unsafe_unretained.`
    If there is no strong reference to your object, your object will be deallocated
    immediately. For example:


    `NSString __weak *myString = @"hello world";`

    `NSLog (@"myString: %@", myString);`


    Will print out `(null)` because at the time the `myString` object is printed,
    there is no strong reference to it.


    The `__autoreleasing` qualifier is used for methods receiving a pass by reference
    argument.


    `- (BOOL)performTaskWithError:(NSError *__autoreleasing *)error;`


    You can call that method normally using:


    `NSError *error = nil;`

    `[self performTaskWithError:&error];`


    By default, the error object is declared with strong qualifier, but the compiler
    will add code in to make the method call `[self performTaskWithError:&error];`


    **NOTE:** For all methods that return an object, and the name does not contain
    `new, alloc`, or `copy`, the object will automatically be autoreleased on return.


    ### Advanced Memory Issues


    Now that you have learned the most basic memory techniques, I will introduce you
    to some advanced memory topics.


    #### Retain/Relationship Cycles


    In the old memory management world, if object A owns object B, then object A has
    to release object B when object A gets deallocated. However, what happens if object
    A owns object B and objects B also owns object A?


    You want to release object A by calling release method on it and setting your
    reference to nil. However, because object B still owns object A, the retain count
    of object A is greater than 0\. It''s the same when you release object B; its
    retain count is still greater than 0 because object A still owns object B.


    This sequence keeps going on like this without any object getting deallocated,
    as illustrated by [Figure 7–4](#Chapter07.html#fig_7_4).


    ![images](images/0704.jpg)


    **Figure 7–4.** *Retain cycle*


    This still holds true for the new ARC mechanism, if you have 2 objects having
    strong reference to each other, both objects get leaked.


    So what do you need to do if you want both objects to own each other? You need
    weak references.


    ### UIViewController


    All iPhone apps require that you work with the `UIViewController` (how else can
    you have your UI?). Therefore, understanding the `UIViewController` life cycle
    will help you with many important things, such as:


    *   Utilizing your memory better.

    *   Avoiding any memory leaks.

    *   Improving responsiveness.


    From my observation when teaching and conduct training for many developers, many
    of them make a serious mistake by not understanding the management life cycle
    of a view controller object. There are some main management processes in the iPhone
    environment to control the life cycle of a view controller object, such as:


    *   Loading the view.

    *   Unloading the view when the system needs to reclaim memory.

    *   Releasing the view.

    *   Displaying or hiding the view from the UI.


    #### Load View Process


    When a view controller is asked for its view, it checks if its view is loaded
    into the memory or not. If not, then it will load that view and then the method
    `viewDidLoad` is called. [Figure 7–6](#Chapter07.html#fig_7_6) shows the process
    of loading the view.


    ![images](images/0706.jpg)


    **Figure 7–6.** *Loading view process*


    There are some notes about performance that you should remember about this loading
    view process:


    *   If you override the `loadView` method, you need to create the view hierarchy
    to display to the UI. This can lead to slightly better performance because it
    doesn''t need to load the view from a nib file.

    *   If you don''t override the `loadView` method, the iOS environment will automatically
    look for the nib file that you specify or a nib file that has the same name as
    the view controller file. Using a nib file is better for maintenance and is a
    drag and drop feature.

    *   If nothing is matched, the iOS environment will create a new and empty view
    and return that empty view.


    #### Unload View Process


    This process is really important for memory and performance. The main reason is
    that this process is running when your application has a memory warning and needs
    to reclaim the memory resource. In this process, the `didReceiveMemoryWarning`
    method will be called first and then the `viewDidUnload` method is called. Views
    that are on the screen will not get unloaded. You can see the process in [Figure
    7–7](#Chapter07.html#fig_7_7).


    ![images](images/0707.jpg)


    **Figure 7–7.** *Unloading view process*


    In this unloading view process, there are a couple of performance and memory issues
    you need to remember:


    *   Make sure that when the method `didReceiveMemoryWarning` is called, you clear
    the memory cache for your heavy objects, such as all image cache. If you don''t
    do so, the iOS environment can force your app to close, which is a really bad
    user experience.

    *   You shouldn''t clear or release any view here because it may be unsafe to
    do so. Instead, you should call `[super didReceiveMemoryWarning]` so the superclass
    can check if it is safe to release the subview or not.

    *   If it is safe to release its view, the method `viewDidUnload` will be called.
    You can choose to override this method to do any clean up required for your views
    and hierarchy.


    **NOTE:** When you override loading methods such as `init`, `loadView`, and `viewDidLoad`,
    the call to the superclass must be at the beginning of the method. However, if
    you override cleaning methods, such as `didReceiveMemoryWarning`, `viewDidUnload`
    or `dealloc`, the call to the superclass has to be at the end of the method.


    There are some key points in `viewDidUnload` that confuse many developers.


    *   `viewDidLoad` and `viewDidUnload` do not correspond to each other. The `viewDidLoad`
    method is called after the view controller object is initialized and a view is
    requested. `viewDidUnload` is called after a memory warning is received. After
    calling `viewDidUnload,` there is no call to the `dealloc` method of the view
    controller object. The view that is unloaded will be deallocated.

    *   In `viewDidUnload`, you only clean up your views; all other objects will be
    cleaned up or released in `didReceiveMemoryWarning`.'
  trans: '

    #### 对象属性


    现在，你需要修改对象属性的声明方式。不再使用旧版中的旧内存管理机制：`@property (retain) NSString *myString`，你将遵循一套新的规则。


    如果你想要拥有该对象的所有权：


    ```

    // 这类似于 @property (retain) NSString *myString

    @property(strong) NSString *myString;

    ```


    如果你只想要对该对象的引用，而不拥有所有权：


    ```

    // 这类似于 @property (assign) UIViewController *myViewController;

    // 区别在于，如果 myViewController 对象被释放，

    // 该引用会变为 nil。

    @property(weak) UIViewController*myString;

    ```


    **注意：** 如果你的应用需要在 iOS4 上运行，你不能使用 `weak`，你需要使用 `unsafe_unretained` 并自己将引用设为 nil。


    ##### 变量声明


    要在方法内部使用这些限定符，你需要在它们前面加上 `__`。例如，你将使用 `__strong` 或 `__weak`。在方法中，`__strong` 限定符是默认限定符。


    使用 `__strong` 限定符可以保证你的对象在方法结束前依然存活。请谨慎使用 `__weak` 或 `__unsafe_unretained`。如果没有对对象的强引用，你的对象会立即被释放。例如：


    ```

    NSString __weak *myString = @"hello world";

    NSLog (@"myString: %@", myString);

    ```


    将会打印出 `(null)`，因为在打印 `myString` 对象时，已经没有对它的强引用了。


    `__autoreleasing` 限定符用于接收按引用传递参数的方法。


    ```

    - (BOOL)performTaskWithError:(NSError *__autoreleasing *)error;

    ```


    你可以像这样正常地调用该方法：


    ```

    NSError *error = nil;

    [self performTaskWithError:&error];

    ```


    默认情况下，error 对象是用强引用限定符声明的，但编译器会添加代码来使方法调用 `[self performTaskWithError:&error]`。


    **注意：** 对于所有返回对象的方法，并且方法名不包含 `new`、`alloc` 或 `copy` 时，返回的对象将自动被自动释放。


    ### 高级内存问题


    现在你已经学习了最基本的内存技术，我将向你介绍一些高级内存主题。


    #### 保留/循环引用


    在旧的内存管理体系中，如果对象 A 拥有对象 B，那么当对象 A 被释放时，它必须释放对象 B。然而，如果对象 A 拥有对象 B，同时对象 B 也拥有对象
    A，会发生什么？


    你希望通过调用 `release` 方法并设置引用为 nil 来释放对象 A。但是，因为对象 B 仍然拥有对象 A，所以对象 A 的引用计数大于 0。同样，当你释放对象
    B 时，它的引用计数仍然大于 0，因为对象 A 仍然拥有对象 B。


    这个过程会持续下去，不会有任何对象被释放，如图 7-4 所示。


    ![images](img/0704.jpg)


    **图 7–4.** *保留循环*


    对于新的 ARC 机制也同样如此：如果有两个对象彼此持有强引用，那么这两个对象都会泄漏。


    那么，如果你想让两个对象彼此拥有，该怎么做？你需要使用弱引用。


    ### UIViewController


    所有 iPhone 应用都需要你与 `UIViewController` 打交道（否则你如何拥有用户界面呢？）。因此，理解 `UIViewController`
    的生命周期将帮助你处理许多重要的事情，例如：


    - 更好地利用内存。

    - 避免任何内存泄漏。

    - 提高响应速度。


    根据我在教学和培训许多开发者时的观察，许多人因为不理解视图控制器对象的管理生命周期而犯下严重错误。在 iPhone 环境中，控制视图控制器对象生命周期的主要管理过程有：


    - 加载视图。

    - 当系统需要回收内存时卸载视图。

    - 释放视图。

    - 从 UI 中显示或隐藏视图。


    #### 加载视图过程


    当视图控制器需要它的视图时，它会检查该视图是否已加载到内存中。如果没有，那么它会加载该视图，然后调用 `viewDidLoad` 方法。图 7-6 展示了加载视图的过程。


    ![images](img/0706.jpg)


    **图 7–6.** *加载视图过程*


    关于这个加载视图过程，有一些性能方面的注意事项需要你记住：


    - 如果你重写了 `loadView` 方法，你需要创建要显示到 UI 的视图层次结构。这可能会带来稍好的性能，因为它不需要从 nib 文件中加载视图。

    - 如果你没有重写 `loadView` 方法，iOS 环境将自动查找你指定的 nib 文件或与视图控制器文件同名的 nib 文件。使用 nib 文件更易于维护，并且支持拖放功能。

    - 如果没有任何匹配，iOS 环境将创建一个新的空视图并返回该空视图。


    #### 卸载视图过程


    这个过程对内存和性能非常重要。主要原因在于，当你的应用收到内存警告并需要回收内存资源时，此过程就会运行。在这个过程中，`didReceiveMemoryWarning`
    方法会首先被调用，然后 `viewDidUnload` 方法会被调用。屏幕上的视图不会被卸载。你可以在图 7-7 中看到这个过程。


    ![images](img/0707.jpg)


    **图 7–7.** *卸载视图过程*


    在这个卸载视图过程中，有几个性能和内存方面的问题你需要记住：


    - 确保当 `didReceiveMemoryWarning` 方法被调用时，你清除了重量级对象的内存缓存，例如所有图片缓存。如果你不这样做，iOS 环境可能会强制关闭你的应用，这将带来非常糟糕的用户体验。

    - 你不应该在此处清除或释放任何视图，因为这可能是不安全的。相反，你应该调用 `[super didReceiveMemoryWarning]`，这样超类就可以检查释放子视图是否安全。

    - 如果释放其视图是安全的，则将调用 `viewDidUnload` 方法。你可以选择重写此方法，对你的视图及其层次结构进行所需的清理工作。


    **注意：** 当你重写诸如 `init`、`loadView` 和 `viewDidLoad` 等加载方法时，对超类的调用必须在方法的开头。然而，如果你重写诸如
    `didReceiveMemoryWarning`、`viewDidUnload` 或 `dealloc` 等清理方法，对超类的调用必须在方法的末尾。


    在 `viewDidUnload` 中，有几个关键点常常让开发者感到困惑。


    - `viewDidLoad` 和 `viewDidUnload` 并不是一一对应的关系。`viewDidLoad` 方法在视图控制器对象被初始化并且视图被请求之后调用。`viewDidUnload`
    在收到内存警告后调用。调用 `viewDidUnload` 之后，不会调用视图控制器对象的 `dealloc` 方法。被卸载的视图将会被释放。

    - 在 `viewDidUnload` 中，你只清理你的视图；所有其他对象将在 `didReceiveMemoryWarning` 中被清理或释放。

