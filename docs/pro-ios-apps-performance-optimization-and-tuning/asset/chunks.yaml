    Developers often confuse these last two states: background and suspend. The background
    state happens before the suspend state. When the user quits the app or jumps to
    another app, the application is brought into the background state. It stays there
    for a short period of time, after which the application is suspended. The period
    of time depends on the application and what it wants to do in the background.
    I will explain in more detail what the application can do in this state.


    There are two main situations for which the application life cycle will be different.
    The first situation is when user quits the app by answering a phone call or another
    interruption from the operating system. The second situation is when users press
    the Home button and the app goes into the background. Each situation has its own
    application life cycle.


    ![images](images/0805.jpg)


    **Figure 8–5.** *Diagram for two different cases: phone interruption and home
    button.*


    As you can see in [Figure 8–5](#Chapter08.html#fig_8_5), in the first case, when
    the user receives a phone call or SMS message, the app is put into inactive mode
    with the `applicationWillResignActive:` method. If the user chooses `No (doesn’t`
    answer the phone) the method `applicationDidBecomeActive` is called; otherwise`,
    applicationDidEnterBackground` is called. So, in the `applicationDidBecomeActive`
    section, you may not need to reload all data and views again. You should be careful
    with this part when comparing it to clicking on the Home button.


    When users press the Home button, the application goes directly into the background
    and the delegate method `applicationDidEnterBackground:` is called.


    #### Multitasking Handler Methods


    [Figures 8–4](#Chapter08.html#fig_8_4) and [8–5](#Chapter08.html#fig_8_5) showed
    you when certain methods are called in the lifecycle. [Table 8–1](#Chapter08.html#tab_8_1)
    provides a complete list of methods to handle in your application delegate and
    other view controller classes to respond properly to the life cycle events.


    ![image](images/t0801.jpg)


    ![image](images/t0801a.jpg)


    **NOTE 1**


    To receive the notification for events, your view controller or object can register
    it as shown in the following code snippet:


    `[[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(someMethod:)`

    `name:UIApplicationDidBecomeActiveNotification object:nil];`


    Don''t forget to clean up after yourself! In dealloc, remember to remove yourself
    as the observer, like so:


    `[[NSNotificationCenter defaultCenter] removeObserver:self];`


    The method `someMethod:` may (but is not required to) accept an `NSNotification`
    as a parameter. Inside this `NSNotification`, you may find more user information
    or data to process. You can work with this `NSNotification` as usual; there is
    nothing special here.


    **NOTE 2**


    *   The method `applicationDidBecomeActive:` will always be called, either when
    users first launch your application or launch it again from the background.

    *   The method `applicationDidFinishLaunching:` will always be called on the first
    launch, not on launches from background.

    *   The method `applicationWillEnterForeground:` will always be called when the
    application comes back from the background.


    You can use these facts to integrate multitasking into your application so that
    you can respond properly to different states of the application.


    #### Multitasking Benefits and Costs


    What should you do if you don’t want to have multitasking in your application?
    What are the benefits and costs if you have to maintain all these different states
    and complex code in order to make sure your application works well?


    There are many benefits of using multitasking. Here are two:


    *   Users can continue working with the existing state of your application without
    navigating back from the beginning any more.

    *   Your application can continue to work in parallel with background services
    like downloading data from the Internet, playing audio, or receiving GPS location
    notification.


    As you already learned, over the whole life cycle of multitasking, there are couple
    of costs that you have to pay for:


    *   More complicated logic while walking through the application life cycle, as
    shown previously.

    *   Your app may be forced to quit in the background and leave the application
    data inconsistent. Due to this inconsistency, your app can crash when user reopens
    it.


    So, in some cases, you may not want to use multitasking in your application. In
    these cases, you can configure your `info.plist` file to not use multitasking.
    Here are the steps to do so:


    *   Open your info.plist file.

    *   Add the key `UIApplicationExitsOnSuspend` or select `Application does not
    run in background.`

    *   Set the new key to `YES` or tick in the tick box.


    You can see this in [Figure 8–6](#Chapter08.html#fig_8_6).


    ![images](images/0806.jpg)


    **Figure 8–6.** *How to set up the no multitasking option*'
  trans: '

    ### iPhone 中的多任务是什么？


    从用户角度看，多任务意味着她同时使用多个应用程序，并可以随意从一个应用切换到另一个。在 iOS 3.2 及更低版本中，当用户退出应用时，应用会关闭，再次打开时需要重新加载。这会导致两个问题：等待时间长，并且应用会忘记用户刚才的操作（参见图
    8–1）。


    ![images](img/0801.jpg)


    **图 8–1.** *旧版 iOS 中应用在用户退出并重新打开时的行为*


    自 iOS 4.0 起，应用不再从头加载，因此用户在不同应用间切换时不会花费太多时间。苹果希望用户感受到的多任务功能，其强大程度能与桌面应用媲美。从开发者角度来看，应用实际上被置于后台，并且所有状态都被保存下来。如图
    8–2 所示，当用户再次打开应用时，状态和数据会快速加载并恢复到先前的位置。


    ![images](img/0802.jpg)


    **图 8–2.** *iOS 4.0 中应用在用户退出并重新打开时的行为*


    ### 多任务生命周期


    了解旧版 iOS 的进程对你很有帮助，这有助于你理解 iOS4 及以上版本的当前机制。我将首先解释多任务功能出现之前的旧机制。应用通过调用 `application:didFinishLaunchingWithOptions:`
    启动，然后运行事件循环以捕获所有事件并显示 UI（参见图 8–3）。当用户退出应用时，整个应用关闭，并调用 `applicationWillTerminate`
    方法。下次用户打开应用时，会再次调用 `application:didFinishLaunchingWithOptions:` 方法。


    ![images](img/0803.jpg)


    **图 8–3.** *旧版 iOS 环境下的应用生命周期*


    iOS4 要求更复杂的实现，而且很容易误解整个过程。如图 8–4 所示，当用户退出应用时，它进入后台，并调用 `application:didEnterBackground`
    方法。当用户能看到应用运行时，应用处于前台状态；用户看不到应用时，它处于后台状态。当应用重新启动时，会涉及许多方法和通知，你必须了解应用的不同状态才能正确响应这些通知。以下是需要了解的应用状态：


    - 未运行：从未打开，或者打开后已终止。

    - 非活跃：应用在前台但未接收事件，例如用户锁定屏幕时。

    - 活跃：应用在前台并正在接收事件。


    ![images](img/0804.jpg)


    **图 8–4.** *iOS4 的应用生命周期*


    开发者经常混淆最后两种状态：后台和挂起。后台状态发生在挂起状态之前。当用户退出应用或跳转到另一个应用时，应用会进入后台状态。它会在后台状态停留一小段时间，之后应用被挂起。这段时间的长短取决于应用及其在后台想执行的操作。我将更详细地解释应用在此状态下能做什么。


    有两种主要情况会导致应用生命周期不同。第一种情况是用户因接听电话或操作系统其他中断而退出应用。第二种情况是用户按下 Home 键，应用进入后台。每种情况都有其自身的应用生命周期。


    ![images](img/0805.jpg)


    **图 8–5.** *两种不同情况的示意图：电话中断与 Home 键*


    如图 8–5 所示，在第一种情况下，当用户接到电话或短信时，应用通过 `applicationWillResignActive:` 方法进入非活跃模式。如果用户选择
    `No`（不接听电话），则调用 `applicationDidBecomeActive` 方法；否则，调用 `applicationDidEnterBackground`
    方法。因此，在 `applicationDidBecomeActive` 部分，你可能不需要重新加载所有数据和视图。与点击 Home 键的情况相比，你应谨慎处理这一部分。


    当用户按下 Home 键时，应用直接进入后台，并调用委托方法 `applicationDidEnterBackground:`。


    #### 多任务处理程序方法


    图 8–4 和 8–5 向你展示了生命周期中某些方法被调用的时机。表 8–1 提供了在应用委托和其他视图控制器类中需要处理的完整方法列表，以便正确响应生命周期事件。


    ![image](img/t0801.jpg)


    ![image](img/t0801a.jpg)


    **注 1**


    要接收事件通知，你的视图控制器或对象可以像以下代码片段所示进行注册：


    ```

    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(someMethod:)

    name:UIApplicationDidBecomeActiveNotification object:nil];

    ```


    不要忘记清理工作！在 `dealloc` 中，记得移除观察者，如下所示：


    ```

    [[NSNotificationCenter defaultCenter] removeObserver:self];

    ```


    方法 `someMethod:` 可以（但不是必须）接受一个 `NSNotification` 作为参数。在这个 `NSNotification` 内部，你可能会找到更多用户信息或需要处理的数据。你可以像往常一样处理这个
    `NSNotification`；这里没有什么特别的。


    **注 2**


    - 无论用户是首次启动你的应用，还是从后台再次启动，都会调用 `applicationDidBecomeActive:` 方法。

    - 首次启动时会始终调用 `applicationDidFinishLaunching:` 方法，但从后台启动时不会调用。

    - 当应用从后台返回前台时，始终会调用 `applicationWillEnterForeground:` 方法。


    你可以利用这些事实将多任务功能集成到你的应用中，从而正确响应应用的不同状态。


    #### 多任务的收益与成本


    如果你不想在应用中使用多任务功能，该怎么办？为了确保应用工作正常，需要维护所有这些不同状态和复杂代码，这有哪些收益和成本呢？


    使用多任务功能有很多好处。以下是两点：


    - 用户可以继续使用应用的现有状态，而无需从头开始导航。

    - 你的应用可以与后台服务并行工作，例如从互联网下载数据、播放音频或接收 GPS 位置通知。


    如你所知，在整个多任务生命周期中，你需要付出一些代价：


    - 如之前所示，遍历应用生命周期时逻辑更加复杂。

    - 你的应用可能被强制在后台退出，导致应用数据不一致。由于这种不一致性，当用户重新打开应用时，你的应用可能会崩溃。


    因此，在某些情况下，你可能不想在应用中使用多任务功能。在这种情况下，你可以配置 `info.plist` 文件来禁止使用多任务功能。步骤如下：


    - 打开你的 `info.plist` 文件。

    - 添加键 `UIApplicationExitsOnSuspend` 或选择 `Application does not run in background.`

    - 将新键设置为 `YES` 或勾选复选框。


    你可以在图 8–6 中看到这一点。


    ![images](img/0806.jpg)


    **图 8–6.** *如何设置无多任务选项*

