- fmt: '# Get Object


    `- (NSObject *)first {`

    `   return self.head.value;`

    `}`

    `- (NSObject *)currentValue {`

    `   return self.current.value;`

    `}`

    `- (NSObject *)next {`

    `   self.current = self.current.next;`

    `   return self.current.value;`

    `}`

    `- (NSObject *)previous {`

    `   self.current = self.current.pre;`

    `   return self.current.value;`

    `}`

    `- (NSObject *)objectAtIndex:(NSInteger)index {`

    `   ListNode *currentNode = self.head;`

    `   for (int i = 1; i < index; i++) {`

    `       currentNode = currentNode.next;`

    `   }`

    `   return currentNode.value;`

    `}`


    To get the current or next object of the linked list is easy; you use the `current`
    property. Methods like `current`, `next`, and `previous` are mainly used for iteration
    (looping through the whole linked list). I will leave the iteration for you as
    an exercise.


    Another way to get random access to an object is to use `objectAtIndex`. It will
    loop until it reaches the correct index and return.


    # Count


    `- (NSUInteger)count {`

    `   if (!self.head) {`

    `       return 0;`

    `   }`


    `   ListNode *currentNode = self.head;`

    `   int i = 1;`

    `   while (currentNode.next) {`

    `       currentNode = currentNode.next;`

    `       i++;`

    `   }`

    `   return i;`

    `}`


    To count the number of items inside the linked list, you just need to loop over
    the list until you find a `nil` object. Then you return the count.


    # Remove Object


    This action is similar to the add object action, so I leave it as an exercise
    to practice. If you have any problems, you can look at the complete source code
    in my `LinkedList` sample project.


    # Performance Analysis


    **Insert/Delete:**

    *   It depends on where you insert/delete and if you have the current node that
    you want to add after or before that node. If you need to traverse the whole list
    to find the place to add object in, the performance is the same as array: O(n).
    However, if you already have the current node, then the performance is really
    fast: O(1).


    **Search:**

    *   For searching, you need to traverse the list, so the performance is O(n).


    **Access:**

    *   For random access based on the index, you need to traverse the list until
    you read the node you want, so the performance is O(n).


    **Sort:**

    *   You can sort the `linked list` the same way you sort an array. However, for
    a `linked list`, because it is not a built-in data structure, you have to write
    the sort method yourself. The best performance you can get is O(n * log(n)).


    # Stack and Queue


    Stack and queue are special data structures to limit the permissible operations
    over the data that these data structures hold. These data structures can be implemented
    either by an array or by a linked list, as shown in the previous sections. These
    restrictions will help you manage your data better or make sure that the data
    is processed in the correct order.


    ## Stack


    Stack allows access to only one data item: the last item. If you insert, retrieve,
    or remove item from the stack, you have to do it from the last item. [Figures
    5–17](#Chapter05.html#fig_5_17) and [5–18](#Chapter05.html#fig_5_18) show you
    how a stack works.


    ![images](images/0517.jpg)


    **Figure 5–17.** *Pushing a new item into the stack*


    ![images](images/0518.jpg)


    **Figure 5–18.** *Popping the latest item out of the stack*


    There is an analogy that will help you to understand the concept of stack:


    *   *Washing dishes*: You wash the dish from the top to the bottom; you don''t
    ever take out an arbitrary dish in middle or the whole dish stack will collapse.


    Placing an item on the top of the stack is called *pushing* it. Removing it from
    the top of the stack is called *popping* it. The computer science term for this
    mechanism is Last-In First-Out (LIFO) because the last item inserted is the first
    one to be removed.


    I will leave you with a small exercise to implement a stack yourself using both
    an array and a linked list. Your stack should support these necessary methods:


    *   `init` // to create the stack

    *   `push`

    *   `pop`

    *   `peek` // to retrieve an item from the stack without removing it out of the
    stack

    *   `isEmpty`

    *   `isFull` // if your stack can automatically grow its size, similar to the
    way `NSMutableArray` grows, this method always returns `false`


    Another practice exercise is to reverse a string by using a stack.


    ## Queue


    Queue is similar to stack in the way it restricts random access to the data. However,
    its mechanism is that the first one inserted to the queue is the first one get
    out of the queue; in other words, First-In First-Out (FIFO). A queue works like
    a line of people waiting to buy a ticket, as shown in [Figure 5–19](#Chapter05.html#fig_5_19).


    ![images](images/0519.jpg)


    **Figure 5–19.** *Access to third last item in the linked list*


    The way you manipulate data inside a queue is the opposite of the way you deal
    with a stack. [Figures 5–20](#Chapter05.html#fig_5_20) and [5–21](#Chapter05.html#fig_5_21)
    illustrate the processes.


    ![images](images/0520.jpg)


    **Figure 5–20.** *Inserting the last item into a queue*


    ![images](images/0521.jpg)


    **Figure 5–21.** *Removing the first item out of a queue*


    Again, I will leave you with a small exercise to implement a queue yourself using
    both array and linked list. Your queue should support these necessary methods:


    *   `init`

    *   `insert`

    *   `remove`

    *   `peek` // to retrieve an item from the queue without removing it out of the
    queue

    *   `isEmpty`

    *   `isFull` // if your queue can automatically grow its size, similar to the
    way `NSMutableArray` grows, this method always returns `false`


    There may be no specific performance gain in using a stack or queue rather than
    an array or linked list. However, this can save you a ton of time thinking about
    restricting access to your data or an understanding concept that helps you to
    solve specific problems.


    # Binary Tree


    Next, I will talk about binary trees. However, I will first take a short aside
    to discuss the main problems with sorting and searching algorithms; this will
    help you understand why you might want to use a binary tree.


    ## Sorting Algorithms


    In iPhone development, you shouldn''t write the sorting algorithms yourself. You
    should understand how the sorting algorithms work and why they work that way.
    However, because of the abstraction and encapsulation of the frameworks and libraries,
    most of the time, you don''t need to know which algorithms the Cocoa Touch framework
    is using. So, in this section I will just cover some famous algorithms and how
    to convert data structures into a sorted array of data.


    Most of the time, you need to provide the framework a method to determine how
    to compare two objects inside your array. Here is a simple code snippet to take
    advantage of the sort algorithms inside `NSArray`:


    `MyItem`

    `- (NSComparisonResult)compareWithItem:(MyItem *)item {`

    `   return [self.name compare:item.name];`

    `}`

    `- (void)viewDidLoad {`

    `   myArray = [myArray sortedArrayUsingSelector:@selector(compareWithItem:)];`


    `}`


    Most of the time you will convert your current data structure into an array, sort
    this array, and use the results. This is one approach. The other approach to having
    a sorted array all the time is to use a binary tree, which I will discuss in later
    sections.'
