    set      NSSet *colors = [NSSet setWithObjects:@"Red", @"Green", @"Blue", nil];
         // Checking membership      BOOL containsRed = [colors containsObject:@"Red"];
    // YES      // Iterating through elements      for (NSString *color in colors)
    {      NSLog(@"Color: %@", color);      }   NSSet ensures uniqueness of elements
    and is immutable once initialized.'
  trans: "\n# Objective-C 中的内存管理\n\n请谨慎使用 `unsafe_unretained`（非 ARC 环境）或 `__unsafe_unretained`（ARC\
    \ 环境）引用，因为当对象被释放时，它们不会自动将引用置为 nil。\n\n## 3. 避免强引用循环\n\n留意对象之间的关系，通过适当使用 `weak`\
    \ 或 `unsafe_unretained` 引用来避免创建保留循环。\n\n## 4. 为临时对象使用自动释放池\n\n在非 ARC 代码中，通过使用\
    \ `@autoreleasepool { ... }` 包裹代码块来管理临时对象，以便在对象不再需要时释放它们。\n\n## 5. 谨慎处理委托和块引用\n\
    \n为委托使用 `weak` 引用以防止强引用循环。为块使用 `copy` 来管理其内存生命周期，因为块通常在栈上创建，需要拷贝到堆上。\n\n## 6.\
    \ 使用 Instruments 进行内存分析\n\n使用 Xcode Instruments 来分析内存使用情况、识别内存泄漏，并优化 Objective-C\
    \ 应用中的内存性能。\n\nObjective-C 中的高效内存管理涉及理解保留循环、使用弱引用打破循环，以及遵循内存分配和释放的最佳实践。通过采用自动引用计数并适当使用\
    \ `strong`、`weak` 和 `unowned` 引用，开发者可以确保高效的内存使用，并避免保留循环和内存泄漏等常见陷阱。理解这些原则并应用最佳实践，能够确保\
    \ Objective-C 应用的健壮和稳定。\n\n---\n\n# 第 7 章：使用集合\n\n## 数组\n\nObjective-C 中的数组是对象的有序集合。它们可以容纳任何\
    \ Objective-C 类的多个对象，包括包装在 `NSNumber` 中的基本类型。数组分为不可变数组（`NSArray`）和可变数组（`NSMutableArray`）。\n\
    \n### 示例 - NSArray：\n\n```objectivec\n// 创建不可变数组\nNSArray *fruits = @[@\"Apple\"\
    , @\"Banana\", @\"Orange\"];\n\n// 访问元素\nNSString *firstFruit = fruits[0]; //\
    \ Apple\nNSString *secondFruit = [fruits objectAtIndex:1]; // Banana\n\n// 遍历元素\n\
    for (NSString *fruit in fruits) {\n    NSLog(@\"Fruit: %@\", fruit);\n}\n```\n\
    \n### 示例 - NSMutableArray：\n\n```objectivec\n// 创建可变数组\nNSMutableArray *mutableFruits\
    \ = [NSMutableArray arrayWithObjects:@\"Apple\", @\"Banana\", @\"Orange\", nil];\n\
    \n// 修改元素\n[mutableFruits addObject:@\"Grapes\"]; // 添加元素\n[mutableFruits removeObjectAtIndex:1];\
    \ // 移除元素\n\n// 遍历元素\nfor (NSString *fruit in mutableFruits) {\n    NSLog(@\"\
    Fruit: %@\", fruit);\n}\n```\n\n`NSArray` 一旦初始化就是不可变的，而 `NSMutableArray` 允许添加、移除或替换元素。\n\
    \n## Objective-C 中的字典和 NSMutableDictionary\n\n### 字典\n\nObjective-C 中的字典是键值对的无序集合。键必须是唯一对象，而值可以是任何\
    \ Objective-C 类的对象，包括包装在 `NSNumber` 中的基本类型。\n\n字典分为不可变字典（`NSDictionary`）和可变字典（`NSMutableDictionary`）。\n\
    \n#### 示例 - NSDictionary：\n\n```objectivec\n// 创建不可变字典\nNSDictionary *person =\
    \ @{@\"name\": @\"John\", @\"age\": @30};\n\n// 访问值\nNSString *name = person[@\"\
    name\"]; // John\nNSNumber *age = [person objectForKey:@\"age\"]; // 30\n\n//\
    \ 遍历键值对\nfor (NSString *key in person) {\n    NSLog(@\"Key: %@, Value: %@\", key,\
    \ person[key]);\n}\n```\n\n#### 示例 - NSMutableDictionary：\n\n```objectivec\n//\
    \ 创建可变字典\nNSMutableDictionary *mutablePerson = [NSMutableDictionary dictionary];\n\
    [mutablePerson setObject:@\"Alice\" forKey:@\"name\"]; // 设置值\n[mutablePerson\
    \ setObject:@25 forKey:@\"age\"];\n\n// 修改值\n[mutablePerson setObject:@26 forKey:@\"\
    age\"]; // 更新年龄\n\n// 遍历键值对\nfor (NSString *key in mutablePerson) {\n    NSLog(@\"\
    Key: %@, Value: %@\", key, mutablePerson[key]);\n}\n```\n\n`NSDictionary` 一旦初始化就是不可变的，而\
    \ `NSMutableDictionary` 允许添加、移除或修改键值对。\n\n## 最佳实践：数组和字典\n\n### 不可变与可变\n\n- 当集合在初始化后不需要更改时，使用不可变版本（`NSArray`、`NSDictionary`），以确保数据完整性和线程安全。\n\
    - 可变集合（`NSMutableArray`、`NSMutableDictionary`）更灵活，但可能因动态调整大小而带来性能开销。\n\n### 访问\n\
    \n- 使用下标语法（`array[index]`、`dictionary[key]`）以求简单和可读性。\n- 使用快速枚举（`for-in` 循环）来遍历元素，既高效又简洁。\n\
    \n数组（`NSArray`、`NSMutableArray`）和字典（`NSDictionary`、`NSMutableDictionary`）是 Objective-C\
    \ 中分别用于存储和管理对象集合及键值对的基本数据结构。理解何时使用不可变或可变版本、高效地访问元素以及使用快速枚举遍历集合，是在 Objective-C\
    \ 应用中有效使用这些数据结构的关键方面。通过遵循最佳实践，开发者可以在处理数组和字典时确保高效的内存使用和优化的性能。\n\n## 集合与 NSMutableSet\n\
    \nObjective-C 中的集合是唯一对象的无序集合，不包含重复元素。集合通过 `NSSet`（不可变）和 `NSMutableSet`（可变）实现。\n\
    \n### 示例 - NSSet：\n\n```objectivec\n// 创建不可变集合\nNSSet *colors = [NSSet setWithObjects:@\"\
    Red\", @\"Green\", @\"Blue\", nil];\n\n// 检查成员关系\nBOOL containsRed = [colors containsObject:@\"\
    Red\"]; // YES\n\n// 遍历元素\nfor (NSString *color in colors) {\n    NSLog(@\"Color:\
    \ %@\", color);\n}\n```\n\n`NSSet` 确保元素的唯一性，且一旦初始化就是不可变的。\n"
- fmt: "### Example - `NSMutableSet`\n\n```objective-c\n// Creating a mutable set\n\
    NSMutableSet *mutableColors = [NSMutableSet setWithObjects:@\"Red\", @\"Green\"\
    , @\"Blue\", nil];\n// Adding and removing elements\n[mutableColors addObject:@\"\
    Yellow\"]; // Add element\n[mutableColors removeObject:@\"Green\"]; // Remove\
    \ element\n// Iterating through elements\nfor (NSString *color in mutableColors)\
    \ {\n    NSLog(@\"Color: %@\", color);\n}\n```\n\n`NSMutableSet` allows adding,\
    \ removing, or replacing elements and provides mutable behavior for sets.\n\n\
    ### Iterating Through Collections in Objective-C\n\n#### Fast Enumeration\n\n\
    `for-in` loop (Fast Enumeration) is the preferred method for iterating through\
    \ collections (`NSArray`, `NSDictionary`, `NSSet`, etc.) in Objective-C. It provides\
    \ efficient and concise syntax for accessing each element sequentially.\n\n**Example\
    \ - Fast Enumeration:**\n\n```objective-c\nNSArray *fruits = @[@\"Apple\", @\"\
    Banana\", @\"Orange\"];\nfor (NSString *fruit in fruits) {\n    NSLog(@\"Fruit:\
    \ %@\", fruit);\n}\n```\n\nFast enumeration iterates through each element of the\
    \ collection without needing an explicit index variable.\n\n#### Enumerating with\
    \ Blocks\n\nObjective-C collections (`NSArray`, `NSDictionary`, `NSSet`) support\
    \ enumeration using blocks for more complex iteration scenarios. Blocks provide\
    \ flexibility for applying operations to each element or key-value pair in the\
    \ collection.\n\n**Example - Enumeration with Blocks:**\n\n```objective-c\nNSArray\
    \ *numbers = @[@1, @2, @3, @4];\n[numbers enumerateObjectsUsingBlock:^(NSNumber\
    \ *number, NSUInteger idx, BOOL *stop) {\n    NSLog(@\"Number at index %lu: %@\"\
    , (unsigned long)idx, number);\n}];\n```\n\nBlock-based enumeration (`enumerateObjectsUsingBlock:`)\
    \ allows performing operations on each object in the collection, accessing both\
    \ the object and its index.\n\n### Best Practices\n\n#### Iterating Through Collections\n\
    \n- **Use Fast Enumeration (for-in loops)** for simple iteration tasks, as they\
    \ are efficient and easy to read.\n- **Use Blocks** for complex logic: use enumeration\
    \ methods with blocks (`enumerateObjectsUsingBlock:`, `enumerateKeysAndObjectsUsingBlock:`)\
    \ when you need to perform operations on each element or key-value pair with more\
    \ complex logic.\n\n#### Immutable vs. Mutable\n\n- Use immutable collections\
    \ (`NSSet`, `NSArray`, `NSDictionary`) when the collection does not need to change\
    \ after initialization to ensure data integrity and thread safety.\n\n---\n\n\
    Sets (`NSSet`, `NSMutableSet`) and iteration techniques (`for-in` loop, block-based\
    \ enumeration) are essential components of Objective-C for managing unique collections\
    \ of objects and iterating through them efficiently. Understanding the differences\
    \ between immutable and mutable collections, selecting appropriate iteration methods\
    \ for different scenarios, and following best practices ensure effective usage\
    \ of sets and efficient iteration through collections in Objective-C applications.\
    \ By leveraging these features, developers can write clean, readable code and\
    \ optimize performance when working with collections in their Objective-C projects.\n\
    \n---\n\n# Collection Manipulation Techniques\n\nCollection manipulation techniques\
    \ in Objective-C involve various operations to modify, filter, or transform collections\
    \ such as arrays, dictionaries, and sets. These techniques are crucial for data\
    \ processing, filtering data based on conditions, transforming data into different\
    \ formats, and more. Here are some common collection manipulation techniques:\n\
    \n### 1. Filtering Collections\n\nFiltering involves selecting elements from a\
    \ collection based on specific criteria.\n\n**Example - Filtering an Array:**\n\
    \n```objective-c\nNSArray *numbers = @[@1, @2, @3, @4, @5, @6];\n// Filter numbers\
    \ greater than 3\nNSPredicate *predicate = [NSPredicate predicateWithFormat:@\"\
    self > %@\", @3];\nNSArray *filteredNumbers = [numbers filteredArrayUsingPredicate:predicate];\n\
    NSLog(@\"Filtered Numbers: %@\", filteredNumbers); // Output: [4, 5, 6]\n```\n\
    \nIn this example, `filteredArrayUsingPredicate:` filters the `numbers` array\
    \ based on the predicate (`self > 3`) and stores matching elements in `filteredNumbers`.\n\
    \n### 2. Mapping and Transforming Collections\n\nMapping transforms each element\
    \ of a collection according to a provided closure or function.\n\n**Example -\
    \ Mapping an Array:**\n\n```objective-c\nNSArray *names = @[@\"Alice\", @\"Bob\"\
    , @\"Charlie\"];\n// Map names to uppercase\nNSArray *uppercaseNames = [names\
    \ valueForKeyPath:@\"uppercaseString\"];\nNSLog(@\"Uppercase Names: %@\", uppercaseNames);\
    \ // Output: [ALICE, BOB, CHARLIE]\n```\n\n`valueForKeyPath:` transforms each\
    \ element (`NSString`) in `names` to its uppercase version, producing `uppercaseNames`.\n\
    \n### 3. Sorting Collections\n\nSorting rearranges elements in a collection based\
    \ on a specified order (ascending or descending).\n\n**Example - Sorting an Array:**\n\
    \n```objective-c\nNSArray *fruits = @[@\"Banana\", @\"Apple\", @\"Orange\"];\n\
    // Sort fruits alphabetically\nNSArray *sortedFruits = [fruits sortedArrayUsingSelector:@selector(localizedCaseInsensitiveCompare:)];\n\
    NSLog(@\"Sorted Fruits: %@\", sortedFruits); // Output: [Apple, Banana, Orange]\n\
    ```\n\n`sortedArrayUsingSelector:` sorts `fruits` alphabetically using `localizedCaseInsensitiveCompare:`\
    \ method.\n\n### 4. Reducing Collections\n\nReducing combines all elements of\
    \ a collection into a single value based on a closure or function.\n\n**Example\
    \ - Reducing an Array:**\n\n```objective-c\nNSArray *numbers = @[@1, @2, @3, @4,\
    \ @5];\n// Calculate sum of numbers\nNSNumber *sum = [numbers valueForKeyPath:@\"\
    @sum.self\"];\nNSLog(@\"Sum of Numbers: %@\", sum); // Output: 15\n```\n\n`valueForKeyPath:@\"\
    @sum.self\"` calculates the sum of all numbers in `numbers` array.\n\n### 5. Combining\
    \ Collections\n\nCombining merges multiple collections into one, concatenating\
    \ or interleaving elements."
