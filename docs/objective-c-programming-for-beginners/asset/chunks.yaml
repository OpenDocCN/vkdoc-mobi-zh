    \ x = 10;\nint y = 5;\nint max = (x > y) ? x : y;  // max 将被赋值为 x 和 y 中较大的值\n\
    ```\n\n#### 8. 优先级和结合性\n运算符具有优先级和结合性规则，用于决定表达式中各部分的求值顺序。可以使用圆括号（`()`）覆盖这些规则。\n\
    \n示例：\n```objective\nint result = 5 + 10 * 2;   // result = 25（乘法优先于加法）\nint result2\
    \ = (5 + 10) * 2; // result2 = 30（用括号强制先进行加法）\n```\n\n运算符和表达式是 Objective-C 的基本组成部分，允许你进行计算、做出决策并控制程序流程。了解如何使用不同类型的运算符以及构建表达式，将使你能够为各种应用程序编写高效且功能性的代码。\n\
    \n### 输入和输出\n\n输入和输出操作对于与用户交互以及在编程语言中显示信息至关重要。\n\n在 Objective-C 中，你可以使用 C 语言提供的标准输入和输出函数，以及\
    \ Objective-C 特定的输入和格式化输出方法。\n\n#### 1. 输出（打印到控制台）\n在 Objective-C 中，可以使用 `NSLog`\
    \ 函数将信息输出到控制台，该函数是 Foundation 框架的一部分。\n\n示例：\n```objective\n#import <Foundation/Foundation.h>\n\
    int main(int argc, const char * argv[]) {\n    @autoreleasepool {\n        NSLog(@\"\
    Hello, World!\");\n        int number = 10;\n        NSLog(@\"The value of number\
    \ is %d\", number);\n        float pi = 3.14159;\n        NSLog(@\"The value of\
    \ pi is %.2f\", pi); // %.2f 指定保留两位小数\n    }\n    return 0;\n}\n```\n\n`NSLog`\
    \ 将格式化输出打印到控制台。它支持格式说明符（`%d` 用于整数，`%f` 用于浮点数，`%@` 用于像 `NSString` 这样的对象等），类似于 C\
    \ 语言中的 `printf`。\n\n#### 2. 输入（从控制台读取）\nObjective-C 没有像 C 语言中的 `scanf` 那样的内置标准输入函数用于从控制台读取。相反，对于更复杂的输入场景，你通常会通过\
    \ `NSLog` 和 `NSInputStream` 来与输入交互。这里有一个基本示例：\n\n```objective\n#import <Foundation/Foundation.h>\n\
    int main(int argc, const char * argv[]) {\n    @autoreleasepool {\n        NSLog(@\"\
    请输入您的姓名：\");\n        NSFileHandle *input = [NSFileHandle fileHandleWithStandardInput];\n\
    \        NSData *inputData = [input availableData];\n        NSString *name =\
    \ [[NSString alloc] initWithData:inputData encoding:NSUTF8StringEncoding];\n \
    \       NSLog(@\"Hello, %@\", name);\n    }\n    return 0;\n}\n```\n\n在这个示例中，使用\
    \ `NSFileHandle` 从标准输入（`stdin`）读取输入。`availableData` 获取用户输入的数据，然后使用 UTF-8 编码将其转换为\
    \ `NSString`。\n\n#### 3. 格式化输出（`NSString`）\n对于格式化输出和更复杂的字符串操作，你可以使用 `NSString`\
    \ 及其方法。\n\n示例：\n```objective\n#import <Foundation/Foundation.h>\nint main(int\
    \ argc, const char * argv[]) {\n    @autoreleasepool {\n        NSString *name\
    \ = @\"John\";\n        int age = 30;\n        NSString *greeting = [NSString\
    \ stringWithFormat:@\"Hello, %@! You are %d years old.\", name, age];\n      \
    \  NSLog(@\"%@\", greeting);\n    }\n    return 0;\n}\n```\n\n`NSString` 的 `stringWithFormat:`\
    \ 方法允许你使用格式说明符（`%@` 用于对象，`%d` 用于整数，`%f` 用于浮点数等）创建格式化字符串。\n\n#### 4. 文件输入和输出\n\
    Objective-C 从 Foundation 框架（`NSFileManager`，`NSFileHandle` 等）中提供了类，用于处理文件输入和输出操作。\n\
    \n示例：写入文件：\n```objective\n#import <Foundation/Foundation.h>\nint main(int argc,\
    \ const char * argv[]) {\n    @autoreleasepool {\n        NSString *filePath =\
    \ @\"/Users/username/Desktop/output.txt\";\n        NSString *content = @\"Hello,\
    \ File Output!\";\n    }\n}\n```\n"
