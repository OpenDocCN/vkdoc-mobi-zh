    \n在 Objective-C 中，输入和输出操作涉及使用 `NSLog` 将信息输出到控制台，使用 `NSInputStream` 处理更复杂的输入场景，以及使用\
    \ `NSString` 进行格式化输出和文件输入/输出操作。掌握这些技术后，你可以在 Objective-C 应用程序中有效地与用户交互、处理数据和管理文件。\n\
    \n# 第 3 章：控制结构\n\n条件语句（`if`、`else`、`switch`）和循环（`for`、`while`、`do-while`）是 Objective-C\
    \ 中基本的控制结构。它们允许你根据条件控制程序的执行流程，并多次重复执行代码块。让我们通过示例逐一探讨这些结构。\n\n## 1. 条件语句\n\n###\
    \ `if`、`else` 语句\n\n`if` 语句在指定条件为真时执行一段代码。可选地，可以使用 `else` 语句在条件为假时执行另一段代码。\n\n\
    **示例：**\n\n```objectivec\nint age = 30;\nif (age >= 18) {\n    NSLog(@\"You are\
    \ an adult.\");\n} else {\n    NSLog(@\"You are not yet an adult.\");\n}\n```\n\
    \n### `else if` 语句\n\n你可以使用 `else if` 设置多个条件，以顺序检查多个条件。\n\n**示例：**\n\n```objectivec\n\
    int score = 85;\nif (score >= 90) {\n    NSLog(@\"Grade: A\");\n} else if (score\
    \ >= 80) {\n    NSLog(@\"Grade: B\");\n} else if (score >= 70) {\n    NSLog(@\"\
    Grade: C\");\n} else {\n    NSLog(@\"Grade: D\");\n}\n```\n\n### `switch` 语句\n\
    \n`switch` 语句计算一个表达式，并根据匹配的 case 标签执行相应的代码块。\n\n**示例：**\n\n```objectivec\nint\
    \ day = 2;\nswitch (day) {\n    case 1:\n        NSLog(@\"Monday\");\n       \
    \ break;\n    case 2:\n        NSLog(@\"Tuesday\");\n        break;\n    case\
    \ 3:\n        NSLog(@\"Wednesday\");\n        break;\n    default:\n        NSLog(@\"\
    Other day\");\n        break;\n}\n```\n\n`break` 语句用于终止 `switch` 语句，并将控制权转移到 switch\
    \ 块之后的语句。\n\n## 2. 循环\n\n### `for` 循环\n\n`for` 循环将代码块重复执行指定的次数。\n\n**示例：**\n\n\
    ```objectivec\nfor (int i = 1; i <= 5; i++) {\n    NSLog(@\"%d\", i);\n}\n```\n\
    \n该循环将 `i` 初始化为 1，只要 `i` 小于或等于 5 就执行循环体，每次迭代后 `i` 增加 1。\n\n### `while` 循环\n\n\
    `while` 循环在指定条件为真时重复执行代码块。\n\n**示例：**\n\n```objectivec\nint count = 1;\nwhile\
    \ (count <= 5) {\n    NSLog(@\"%d\", count);\n    count++;\n}\n```\n\n只要 `count`\
    \ 小于或等于 5，循环就会继续执行，每次迭代后 `count` 增加 1。\n\n### `do-while` 循环\n\n`do-while` 循环与\
    \ `while` 循环类似，但它保证代码块在检查条件之前至少执行一次。\n\n**示例：**\n\n```objectivec\nint num = 1;\n\
    do {\n    NSLog(@\"%d\", num);\n    num++;\n} while (num <= 5);\n```\n\n该循环首先执行代码块，然后检查条件（`num\
    \ <= 5`），只要条件为真就继续执行。\n\n条件语句（`if`、`else`、`switch`）允许你在 Objective-C 程序中根据条件做出决策。循环（`for`、`while`、`do-while`）使你能够根据指定条件多次重复执行代码块。理解和掌握这些控制结构对于编写高效且功能完善的\
    \ Objective-C 代码至关重要，它们能让你控制程序流程并有效处理重复任务。\n\n## 使用 `break` 和 `continue`\n\n在\
    \ Objective-C 中，`break` 和 `continue` 是用于循环（`for`、`while`、`do-while`）中的控制流语句，用于改变默认的执行流程。它们提供了操作循环的灵活性和控制能力，对于处理特定条件或提前退出循环至关重要。\n\
    \n### 1. 使用 `break`\n\n`break` 语句终止当前循环或 switch 语句，并将控制权转移到终止语句之后的语句。\n\n**示例\
    \ - 在 `for` 循环中使用 `break`：**\n\n```objectivec\nfor (int i = 1; i <= 10; i++) {\n\
    \    NSLog(@\"%d\", i);\n    if (i == 5) {\n        break; // 当 i 等于 5 时退出循环\n\
    \    }\n}\n```\n\n在此示例中，循环打印数字从 1 到 5。当 `i` 等于 5 时，遇到 `break` 语句，循环立即终止。\n"
- fmt: "## Example - Using `break` in a `while` loop\n\n```objectivec\nint num = 1;\n\
    while (num <= 10) {\n    NSLog(@\"%d\", num);\n    num++;\n    if (num == 6) {\n\
    \        break; // Exit the loop when num reaches 6\n    }\n}\n```\n\nThis loop\
    \ prints numbers from 1 to 5 and exits when `num` equals 6 due to the `break`\
    \ statement.\n\n## Using `continue`\n\nThe `continue` statement skips the rest\
    \ of the current iteration of a loop and continues with the next iteration.\n\n\
    ### Example - Using `continue` in a `for` loop\n\n```objectivec\nfor (int i =\
    \ 1; i <= 5; i++) {\n    if (i == 3) {\n        continue; // Skip iteration when\
    \ i equals 3\n    }\n    NSLog(@\"%d\", i);\n}\n```\n\nIn this example, the loop\
    \ skips printing the number 3 due to the `continue` statement and continues with\
    \ the next iteration.\n\n### Example - Using `continue` in a `while` loop\n\n\
    ```objectivec\nint num = 0;\nwhile (num < 5) {\n    num++;\n    if (num % 2 ==\
    \ 0) {\n        continue; // Skip even numbers\n    }\n    NSLog(@\"%d\", num);\n\
    }\n```\n\nThis loop prints odd numbers (1, 3, 5) because the `continue` statement\
    \ skips even numbers (`num % 2 == 0` condition).\n\n## Nested Control Structures\
    \ in Objective-C\n\nNested control structures involve placing one control structure\
    \ inside another, such as placing a loop inside another loop or an `if` statement\
    \ inside another `if` statement. This technique is used to handle complex conditions\
    \ and scenarios where multiple levels of decision-making are required.\n\n###\
    \ Example - Nested `for` loops\n\n```objectivec\nfor (int i = 1; i <= 3; i++)\
    \ {\n    NSLog(@\"Outer loop iteration %d\", i);\n    for (int j = 1; j <= 2;\
    \ j++) {\n        NSLog(@\"Inner loop iteration %d\", j);\n    }\n}\n```\n\nIn\
    \ this example, the outer loop (`i`) executes three times, and for each iteration\
    \ of the outer loop, the inner loop (`j`) executes twice. This results in a total\
    \ of 6 iterations (3 * 2).\n\n### Example - Nested `if-else` statements\n\n```objectivec\n\
    int x = 10;\nint y = 20;\nif (x > 5) {\n    if (y > 15) {\n        NSLog(@\"Both\
    \ conditions are true\");\n    } else {\n        NSLog(@\"First condition is true,\
    \ second condition is false\");\n    }\n} else {\n    NSLog(@\"First condition\
    \ is false\");\n}\n```\n\nIn this example, the outer `if` statement checks if\
    \ `x` is greater than 5. If true, it evaluates the inner `if-else` statements\
    \ based on the value of `y`.\n\n`break` and `continue` statements provide ways\
    \ to alter the flow of execution within loops in Objective-C. `break` terminates\
    \ the current loop or switch statement, while `continue` skips the current iteration\
    \ and proceeds with the next iteration of the loop. Nested control structures,\
    \ such as nested loops and nested `if` statements, allow you to handle complex\
    \ conditions and control flow scenarios effectively. Mastering these techniques\
    \ enables you to write more efficient and flexible Objective-C code, tailored\
    \ to handle various programming challenges and requirements.\n\n# Chapter 4: Functions\
    \ and Methods\n\nFunctions are reusable blocks of code that perform a specific\
    \ task.\n\nIn Objective-C, functions are defined using a specific syntax and can\
    \ have parameters for input and a return type for output. Understanding how to\
    \ define and call functions is fundamental for structuring and organizing your\
    \ code effectively.\n\n## 1. Defining Functions\n\nIn Objective-C, functions are\
    \ defined using the following syntax:\n\n```objectivec\nreturnType functionName(parameter1Type\
    \ parameter1Name, parameter2Type parameter2Name, ...) {\n    // Function body\n\
    \    // Statements\n    return returnValue; // Optional return statement\n}\n\
    ```\n\n- `returnType`: Specifies the data type of the value that the function\
    \ returns. Use `void` if the function does not return a value.\n- `functionName`:\
    \ Name of the function.\n- `parameters`: Optional list of parameters (inputs)\
    \ the function accepts, each defined by a data type and name.\n- `returnValue`:\
    \ Optional value returned by the function (if `returnType` is not `void`).\n\n\
    ### Example - Function without parameters and return value\n\n```objectivec\n\
    // Function declaration\nvoid greet() {\n    NSLog(@\"Hello, World!\");\n}\n\n\
    // Function call\ngreet(); // Output: Hello, World!\n```\n\n### Example - Function\
    \ with parameters and return value\n\n```objectivec\n// Function declaration\n\
    int sum(int a, int b) {\n    return a + b;\n}\n\n// Function call\nint result\
    \ = sum(3, 5); // result is 8\nNSLog(@\"Sum: %d\", result); // Output: Sum: 8\n\
    ```\n\n## 2. Function Parameters and Return Types\n\n### Function Parameters\n\
    \nParameters allow you to pass values to a function for it to work with. They\
    \ are defined within the parentheses following the function name.\n\n#### Example\
    \ - Function with parameters\n\n```objectivec\n// Function declaration\nvoid greetUser(NSString\
    \ *name) {\n    NSLog(@\"Hello, %@\", name);\n}\n\n// Function call\ngreetUser(@\"\
    Alice\"); // Output: Hello, Alice\n```\n\n### Return Types\n\nReturn types specify\
    \ the data type of the value returned by the function. Use `void` if the function\
    \ does not return a value.\n\n#### Example - Function with return type\n\n```objectivec\n\
    // Function declaration\nint square(int number) {\n    return number * number;\n\
    }\n\n// Function call\nint result = square(5); // result is 25\nNSLog(@\"Square:\
    \ %d\", result); // Output: Square: 25\n```\n\nFunctions are essential for organizing\
    \ code into manageable blocks, enhancing reusability, and promoting modular design\
    \ in Objective-C programs. By defining functions with appropriate parameters and\
    \ return types, you can encapsulate logic and tasks, making your code more readable,\
    \ maintainable, and efficient. Understanding how to define functions, pass parameters,\
    \ and handle return values is crucial for developing robust and scalable Objective-C\
    \ applications.\n\n## Methods in Objective-C\n\nIn Objective-C, methods are similar\
    \ to functions in other programming languages but are associated with classes\
    \ and objects."
