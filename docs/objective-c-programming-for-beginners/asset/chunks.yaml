    = 1 << 2  // 0100      };      You can then combine these values using bitwise
    OR:      Example:      objective      FilePermissions permissions = FilePermissionRead
    | FilePermissionWrite;      Constants and enumerations are powerful tools in Objective-C
    that help make your code more understandable and less prone to errors. Constants
    provide a way to define immutable values, while enumerations allow you to define
    a set of related values with meaningful names. By effectively using these constructs,
    you can improve the readability, maintainability, and robustness of your Objective-C
    programs.   Operators and Expressions        Operators and expressions are fundamental
    components of any programming language, including Objective-C. They allow you
    to perform computations, manipulate data, and control the flow of your program.
    Understanding how to use operators and construct expressions effectively is crucial
    for writing efficient and functional code.   1\. Arithmetic Operators   Arithmetic
    operators are used to perform mathematical operations such as addition, subtraction,
    multiplication, division, and modulus.      Example:      objective      int a
    = 10;      int b = 5;      int sum = a + b;    // Addition      int difference
    = a - b; // Subtraction      int product = a * b;   // Multiplication      float
    quotient = (float)a / b; // Division (casting to float for accurate result)      int
    remainder = a % b;  // Modulus (remainder of division)   2\. Relational Operators
      Relational operators are used to compare two values and return a boolean result
