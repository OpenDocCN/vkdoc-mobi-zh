    in the program. Local Variables declared inside a function, method, or block are
    only accessible within that particular scope. Instance Variable Instance variables
    (also known as member variables) are declared within a class interface and are
    accessible to all instance methods of that class. Class Variable Class variables
    (also known as static variables) are declared using the static keyword within
    a class interface and are shared among all instances of the class.   2\. Lifetime
    of Variables   Lifetime refers to the duration for which a variable exists in
    memory.


    In Objective-C:   Local Exist only within the block, function, or method in which
    they are declared. They are created when the block is entered and destroyed when
    the block is exited. Instance Exist as long as the object (instance of a class)
    exists. They are initialized when the object is created using alloc and init methods
    and are deallocated when the object is destroyed (usually when reference count
    drops to zero). Class Exist for the duration of the program''s execution. They
    are initialized when the class is loaded into memory and are destroyed when the
    program terminates.   Example - Scope and Lifetime of Variables:   objective      @interface
    MyClass : NSObject {      int instanceVariable; // Instance variable      }      @end
         @implementation MyClass      - (void)exampleMethod {      int localVar =
    10; // Local variable      // Accessing instance variable      instanceVariable
    = 20;      // Printing local variable      NSLog(@"Local variable: %d", localVar);
         }      @end   In this example, instanceVariable is an instance variable accessible
    to all instance methods of MyClass. localVar is a local variable with scope limited
    to the exampleMethod.        Methods in Objective-C are essential for encapsulating
    behavior within objects, facilitating object-oriented programming principles such
    as encapsulation, abstraction, and inheritance. Understanding the scope and lifetime
    of variables helps you manage data effectively within your programs, ensuring
    proper memory management and logical structure. By mastering methods, scope, and
    variable lifetimes, you can develop robust and efficient Objective-C applications
    that are modular and scalable.   Recursive Functions        Recursive functions
    are functions that call themselves directly or indirectly in order to solve a
    problem. They are useful for solving problems that can be broken down into smaller,
    similar sub-problems. Understanding recursive functions is essential for tackling
    tasks involving repetitive or nested structures.   1\. Basics of Recursive Functions
      Recursive functions typically have two main parts:   Base The condition under
    which the function stops calling itself recursively. It prevents infinite recursion
    and defines the smallest instance of the problem that can be solved directly.
    Recursive The part of the function where it calls itself with a smaller or simpler
    instance of the problem.   2\. Example of a Recursive Function   Example - Calculating
    Factorial      The factorial of a non-negative integer n, denoted as n!, is the
    product of all positive integers less than or equal to n.      objective      #import
    <foundation foundation.h=""></foundation>     // Function declaration      int
    factorial(int n) {      // Base case: factorial of 0 is 1      if (n == 0) {      return
    1;      }      // Recursive case: n! = n * (n-1)!'
  trans: "\n# Objective-C 中的方法\n\n它们封装了对象内部的行为与功能，使对象之间能够相互通信和交互。理解方法是掌握 Objective-C\
    \ 面向对象编程的基础。\n\n## 1. 定义方法\n\nObjective-C 中的方法定义在类的 `@interface` 和 `@implementation`\
    \ 代码块中。\n\n### 实例方法\n\n实例方法是作用于类实例（即对象）的方法。它们在类的 `@interface` 和 `@implementation`\
    \ 部分进行声明和实现。\n\n**示例 - 声明并实现一个实例方法：**\n\n```\n// 接口部分（头文件 .h）\n@interface MyClass\
    \ : NSObject\n- (void)printMessage; // 实例方法声明\n@end\n\n// 实现部分（实现文件 .m）\n@implementation\
    \ MyClass\n- (void)printMessage { // 实例方法定义\n    NSLog(@\"来自实例方法的问候！\");\n}\n\
    @end\n```\n\n### 类方法\n\n类方法，在其他语言中也称为静态方法，是隶属于类本身而非类实例的方法。它们以 `+` 号作为前缀。\n\n**示例\
    \ - 声明并实现一个类方法：**\n\n```\n// 接口部分（头文件 .h）\n@interface MyClass : NSObject\n+ (void)printStaticMessage;\
    \ // 类方法声明\n@end\n\n// 实现部分（实现文件 .m）\n@implementation MyClass\n+ (void)printStaticMessage\
    \ { // 类方法定义\n    NSLog(@\"来自类方法的问候！\");\n}\n@end\n```\n\n## 2. 调用方法\n\n方法通过方括号\
    \ `[]` 在对象上（针对实例方法）或直接在类上（针对类方法）进行调用。\n\n**示例 - 调用实例方法和类方法：**\n\n```\n// 使用实例方法\n\
    MyClass *obj = [[MyClass alloc] init]; // 创建 MyClass 的一个实例\n[obj printMessage];\
    \ // 在 obj 上调用实例方法\n\n// 使用类方法\n[MyClass printStaticMessage]; // 直接在 MyClass 上调用类方法\n\
    ```\n\n# 理解 Objective-C 中变量的作用域与生命周期\n\n## 1. 变量的作用域\n\n作用域指的是变量在程序中的可见性和可访问性。在\
    \ Objective-C 中，根据变量声明的位置不同，它们拥有不同的作用域：\n\n- **全局变量**：在任何函数或方法外部声明的变量，可以在程序的任何位置被访问。\n\
    - **局部变量**：在函数、方法或代码块内部声明的变量，仅在该特定作用域内可访问。\n- **实例变量**：实例变量（也称为成员变量）在类接口中声明，并且可被该类的所有实例方法访问。\n\
    - **类变量**：类变量（也称为静态变量）在类接口中使用 `static` 关键字声明，并在该类的所有实例之间共享。\n\n## 2. 变量的生命周期\n\
    \n生命周期指的是变量在内存中存在的时间长度。\n\n在 Objective-C 中：\n\n- **局部变量**：仅存在于声明它们的代码块、函数或方法中。在进入代码块时创建，在退出代码块时销毁。\n\
    - **实例变量**：只要对象（类的实例）存在，它就存在。在通过 `alloc` 和 `init` 方法创建对象时被初始化，在对象被销毁时（通常当引用计数降至零时）被释放。\n\
    - **类变量**：在程序执行的整个期间都存在。当类被加载到内存时被初始化，在程序终止时被销毁。\n\n**示例 - 变量的作用域与生命周期：**\n\n\
    ```\n@interface MyClass : NSObject {\n    int instanceVariable; // 实例变量\n}\n@end\n\
    \n@implementation MyClass\n- (void)exampleMethod {\n    int localVar = 10; //\
    \ 局部变量\n    // 访问实例变量\n    instanceVariable = 20;\n    // 打印局部变量\n    NSLog(@\"\
    局部变量: %d\", localVar);\n}\n@end\n```\n\n在此例中，`instanceVariable` 是一个实例变量，可被 `MyClass`\
    \ 的所有实例方法访问。`localVar` 是一个局部变量，其作用域仅限于 `exampleMethod` 方法。\n\nObjective-C 中的方法对于将行为封装在对象内部至关重要，有助于实现面向对象编程原则，例如封装、抽象和继承。理解变量的作用域和生命周期有助于你在程序中高效地管理数据，确保合理的内存管理和逻辑结构。通过掌握方法、作用域和变量生命周期，你可以开发出模块化且可扩展的健壮高效的\
    \ Objective-C 应用程序。\n\n# 递归函数\n\n递归函数是直接或间接调用自身以解决问题的函数。它们适用于解决可以分解为更小、更相似的子问题的问题。理解递归函数对于处理涉及重复或嵌套结构的任务至关重要。\n\
    \n## 1. 递归函数的基础\n\n递归函数通常包含两个主要部分：\n\n- **基线条件**：函数停止递归调用自身的条件。它防止无限递归，并定义了可以直接解决的最小问题实例。\n\
    - **递归条件**：函数调用自身来处理更小或更简单问题实例的部分。\n\n## 2. 递归函数示例\n\n**示例 - 计算阶乘**\n\n非负整数 `n`\
    \ 的阶乘，记作 `n!`，是所有小于或等于 `n` 的正整数的乘积。\n\n```\n#import <Foundation/Foundation.h>\n\
    \n// 函数声明\nint factorial(int n) {\n    // 基线条件：0 的阶乘是 1\n    if (n == 0) {\n \
    \       return 1;\n    }\n    // 递归条件：n! = n * (n-1)!\n    return n * factorial(n\
    \ - 1);\n}\n```\n"
- fmt: "```objectivec\nreturn n * factorial(n - 1);\n}\nint main(int argc, const char\
    \ * argv[]) {\n    @autoreleasepool {\n        int number = 5;\n        int result\
    \ = factorial(number);\n        NSLog(@\"Factorial of %d is %d\", number, result);\
    \ // Output: Factorial of 5 is 120\n    }\n    return 0;\n}\n```\n\nIn this example,\
    \ `factorial` is a recursive function that calculates the factorial of a number\
    \ `n`. The base case (`n == 0`) returns `1`, and the recursive case calculates\
    \ `n * factorial(n - 1)`.\n\n## 3. Important Considerations\n\n- **Base**: Ensure\
    \ that every recursive function has a base case that will eventually terminate\
    \ the recursion.\n- **Stack**: Recursive functions use the call stack to store\
    \ intermediate results and function calls. Excessive recursion can lead to stack\
    \ overflow if not managed properly.\n- Recursive functions can be less efficient\
    \ than iterative solutions for some problems due to the overhead of function calls\
    \ and stack management.\n\n## 4. Example of a Recursive Function with Multiple\
    \ Calls\n\n### Example - Fibonacci Sequence\n\nThe Fibonacci sequence is a series\
    \ of numbers where each number is the sum of the two preceding ones, usually starting\
    \ with `0` and `1`.\n\n```objectivec\n#import <Foundation/Foundation.h>\n\n//\
    \ Function declaration\nint fibonacci(int n) {\n    // Base cases\n    if (n ==\
    \ 0) {\n        return 0;\n    }\n    if (n == 1) {\n        return 1;\n    }\n\
    \    // Recursive case: Fibonacci(n) = Fibonacci(n-1) + Fibonacci(n-2)\n    return\
    \ fibonacci(n - 1) + fibonacci(n - 2);\n}\n\nint main(int argc, const char * argv[])\
    \ {\n    @autoreleasepool {\n        int number = 6;\n        int result = fibonacci(number);\n\
    \        NSLog(@\"Fibonacci of %d is %d\", number, result); // Output: Fibonacci\
    \ of 6 is 8\n    }\n    return 0;\n}\n```\n\nIn this example, `fibonacci` is a\
    \ recursive function that calculates the n-th Fibonacci number. It has two base\
    \ cases (`n == 0` and `n == 1`) and a recursive case that computes `fibonacci(n\
    \ - 1) + fibonacci(n - 2)`.\n\nRecursive functions in Objective-C provide an elegant\
    \ way to solve problems by breaking them down into smaller, manageable sub-problems.\
    \ They are powerful tools but require careful design to ensure they terminate\
    \ correctly and efficiently handle stack usage. By understanding the principles\
    \ and examples of recursive functions, you can leverage this technique to solve\
    \ a wide range of programming challenges effectively.\n\n# Chapter 5 Object-Oriented\
    \ Programming Concepts\n\nObject-Oriented Programming (OOP) is a programming paradigm\
    \ that organizes software design around objects rather than functions and logic.\
    \ It emphasizes the following principles:\n\n- **Encapsulation**: Bundling data\
    \ (attributes) and methods (functions) that operate on the data into a single\
    \ unit (object).\n- **Abstraction**: Simplifying complex systems by modeling classes\
    \ and objects at the appropriate level of detail.\n- **Inheritance**: Allowing\
    \ classes to inherit attributes and methods from other classes.\n- **Polymorphism**:\
    \ Providing a way to perform a single action in different ways, depending on the\
    \ object that is calling it.\n\n## Classes and Objects in Objective-C\n\n### 1.\
    \ Classes\n\nIn Objective-C, a class is a blueprint or template for creating objects.\
    \ It defines the properties (attributes) and methods (functions) that all objects\
    \ of that class will have.\n\n#### Example - Declaring a Class:\n\n```objectivec\n\
    // Interface section (header file .h)\n@interface Car : NSObject\n\n// Properties\
    \ (attributes)\n@property (nonatomic, strong) NSString *model;\n@property (nonatomic)\
    \ int year;\n\n// Methods (functions)\n- (void)startEngine;\n- (void)drive;\n\n\
    @end\n```\n\nIn this example, `Car` is a class that inherits from `NSObject`.\
    \ It declares two properties (`model` and `year`) and two methods (`startEngine`\
    \ and `drive`).\n\n### 2. Objects\n\nObjects are instances of classes. They represent\
    \ specific instances of data and behavior defined by the class.\n\n#### Example\
    \ - Creating and Using Objects:\n\n```objectivec\n// Implementation section (implementation\
    \ file .m)\n@implementation Car\n\n- (void)startEngine {\n    NSLog(@\"Engine\
    \ started.\");\n}\n\n- (void)drive {\n    NSLog(@\"Car is driving.\");\n}\n\n\
    @end\n\n// Main program\nint main(int argc, const char * argv[]) {\n    @autoreleasepool\
    \ {\n        // Creating an object of class Car\n        Car *myCar = [[Car alloc]\
    \ init];\n        \n        // Using object properties and methods\n        myCar.model\
    \ = @\"Toyota\";\n        myCar.year = 2020;\n        NSLog(@\"Car model: %@,\
    \ year: %d\", myCar.model, myCar.year);\n        \n        [myCar startEngine];\
    \ // Output: Engine started.\n        [myCar drive];       // Output: Car is driving.\n\
    \    }\n    return 0;\n}\n```\n\nIn this example, `myCar` is an object of class\
    \ `Car`. Properties (`model` and `year`) are set and methods (`startEngine` and\
    \ `drive`) are called on `myCar`.\n\n## Inheritance and Polymorphism in Objective-C\n\
    \n### 1. Inheritance\n\nInheritance allows one class (subclass) to inherit the\
    \ properties and methods of another class (superclass). It promotes code reusability\
    \ and hierarchical organization of classes.\n\n#### Example - Inheritance:\n\n\
    ```objectivec\n// Base class: Vehicle\n@interface Vehicle : NSObject\n@property\
    \ (nonatomic, strong) NSString *brand;\n- (void)start;\n@end\n\n@implementation\
    \ Vehicle\n- (void)start {\n    NSLog(@\"Vehicle started.\");\n}\n@end\n\n// Subclass:\
    \ Car (inherits from Vehicle)\n@interface Car : Vehicle\n@property (nonatomic,\
    \ strong) NSString *model;\n- (void)drive;\n@end\n\n@implementation Car\n- (void)drive\
    \ {\n    NSLog(@\"Car is driving.\");\n}\n@end\n```\n\nIn this example, `Vehicle`\
    \ is a base class with a `brand` property and a `start` method. `Car` inherits\
    \ from `Vehicle` and adds its own property (`model`) and method (`drive`).\n\n\
    ### 2. Polymorphism\n\nPolymorphism allows objects of different classes to be\
    \ treated as objects of a common superclass. It enables flexibility in method\
    \ invocation based on the actual object that is calling it."
