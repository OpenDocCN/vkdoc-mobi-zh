    height = 5.9f;      double weight = 70.5;      char initial = ''A'';      BOOL
    isStudent = YES;   2\. Derived Data Types   Derived data types are constructed
    from primitive types:   Pointers: Used to store the memory address of a variable.
    Arrays: Collection of variables of the same type. Structures: Group of variables
