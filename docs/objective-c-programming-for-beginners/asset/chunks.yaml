  trans: "\n## 示例 - 多态\n\n```objective\n// 如上定义的 Vehicle 和 Car 类的接口\n// 演示多态的函数\n\
    void driveAnyVehicle(Vehicle *vehicle) {\n    [vehicle drive]; // 根据实际对象类型（Vehicle\
    \ 或 Car）调用 drive 方法\n}\n\n// 主程序\nint main(int argc, const char * argv[]) {\n\
    \    @autoreleasepool {\n        Vehicle *myVehicle = [[Vehicle alloc] init];\n\
    \        Car *myCar = [[Car alloc] init];\n        driveAnyVehicle(myVehicle);\
    \ // 输出：Vehicle started.\n        driveAnyVehicle(myCar);     // 输出：Car is driving.\n\
    \    }\n    return 0;\n}\n```\n\n在此示例中，`driveAnyVehicle` 函数将 `Vehicle` 对象作为参数接收。由于多态性，它可以接受\
    \ `Vehicle` 和 `Car` 对象，并根据实际对象类型调用相应的 `drive` 方法。\n\nObjective-C 中的面向对象编程（OOP）围绕类和对象、封装、继承以及多态展开。类定义了对象的结构和行为，而对象是类的实例，它们通过方法和属性相互交互。理解这些概念对于在\
    \ Objective-C 中构建模块化、可扩展且可维护的软件系统至关重要。\n\n## 封装与抽象\n\n封装是将数据（属性）和操作数据的函数（方法）捆绑到单个单元（对象）中的过程。它允许隐藏数据，仅暴露必要的接口来与对象交互。在\
    \ Objective-C 中，封装通过类和访问修饰符来实现。\n\n### 示例 - 封装\n\n```objective\n// 接口部分（头文件 .h）\n\
    @interface Car : NSObject\n// 私有属性（已封装）\n@property (nonatomic, strong) NSString\
    \ *model;\n@property (nonatomic) int year;\n// 公开方法（与对象交互的接口）\n- (void)startEngine;\n\
    - (void)drive;\n@end\n\n// 实现部分（实现文件 .m）\n@implementation Car\n- (void)startEngine\
    \ {\n    NSLog(@\"Engine started.\");\n}\n- (void)drive {\n    NSLog(@\"Car is\
    \ driving.\");\n}\n@end\n```\n\n在此示例中，`Car` 将属性（`model` 和 `year`）和方法（`startEngine`\
    \ 和 `drive`）封装在单个单元中。实现细节对外部代码隐藏，仅公开接口（方法）可访问。\n\n### 抽象\n\n抽象是指通过在适当的细节层次上建模类和对象，来简化复杂系统的过程。它关注本质特征，忽略无关细节。在\
    \ Objective-C 中，抽象通过类接口和方法声明来实现。\n\n#### 示例 - 抽象\n\n```objective\n// 接口部分（头文件\
    \ .h）\n@interface Shape : NSObject\n- (void)draw; // 抽象方法声明\n@end\n\n// 实现部分（实现文件\
    \ .m）\n@implementation Shape\n- (void)draw {\n    // 抽象方法实现因子类而异\n    NSLog(@\"\
    Abstract method implementation\");\n}\n@end\n```\n\n在此示例中，`Shape` 是一个抽象类，包含抽象方法\
    \ `draw`。`Shape` 的子类（例如 `Circle`、`Rectangle`）为每种形状提供了具体的 `draw` 实现。\n\n## Objective-C\
    \ 中的分类与协议\n\n### 分类\n\n分类允许你向现有类添加方法，而无需对其创建子类。它们提供了一种扩展类功能的方式，特别适用于向内置类或第三方库添加方法。\n\
    \n#### 示例 - 分类\n\n```objective\n// 分类接口（头文件 .h）\n@interface NSString (CustomString)\n\
    - (NSString *)reverse;\n@end\n\n// 分类实现（实现文件 .m）\n@implementation NSString (CustomString)\n\
    - (NSString *)reverse {\n    NSMutableString *reversedString = [NSMutableString\
    \ stringWithCapacity:[self length]];\n    for (NSInteger i=[self length]-1; i>=0;\
    \ i--) {\n        [reversedString appendString:[NSString stringWithFormat:@\"\
    %c\", [self characterAtIndex:i]]];\n    }\n    return reversedString;\n}\n@end\n\
    ```\n\n在此示例中，`NSString` 通过分类 `CustomString` 进行了扩展，添加了一个用于反转字符串的 `reverse` 方法。\n\
    \n### 协议\n\n协议声明了任何类都可以实现的方法。它们定义了类必须遵循的方法蓝图。协议提供了一种实现多态性的方式，并支持不同继承层次结构中的类之间进行通信。\n\
    \n#### 示例 - 协议\n\n```objective\n// 协议声明（头文件 .h）\n@protocol PrinterProtocol\n-\
    \ (void)print;\n@end\n\n// 采用协议的类\n@interface Printer : NSObject\n@end\n\n// 协议实现（实现文件\
    \ .m）\n@implementation Printer\n- (void)print {\n    NSLog(@\"Printing...\");\n\
    }\n@end\n```\n\n在此示例中，`PrinterProtocol` 定义了一个 `print` 方法，任何采用该协议的类都必须实现它。`Printer`\
    \ 采用了 `PrinterProtocol`，并提供了 `print` 方法的实现。\n\n## 结论\n\n封装和抽象是面向对象编程（OOP）中的基本原则，它们促进了代码的模块化、可维护性和可重用性。Objective-C\
    \ 中的分类和协议提供了扩展和增强类功能、以及定义支持对象间通信的接口的机制。理解并应用这些概念和机制，能让开发者编写出高效、可扩展且结构良好的 Objective-C\
    \ 代码。\n\n---\n\n## 第 6 章：内存管理\n\nObjective-C 中的内存分配涉及管理内存，以动态存储对象和数据结构。这对于高效使用内存以及防止内存泄漏或崩溃至关重要。\n"
- fmt: "Objective-C provides two main approaches to memory management: Manual Reference\
    \ Counting (`MRC`) and Automatic Reference Counting (`ARC`).\n\n## Memory Allocation\
    \ Basics\n\nLocal variables and function call information are stored here. Variables\
    \ declared inside functions are allocated on the stack. Memory for dynamically\
    \ allocated objects and structures is managed here. Objects created using `alloc`,\
    \ `init`, `new`, or `copy` methods are allocated on the heap.\n\n## Manual Reference\
    \ Counting (`MRC`)\n\nManual Reference Counting (`MRC`) requires developers to\
    \ explicitly manage the lifecycle of objects by incrementing and decrementing\
    \ their reference counts using `retain`, `release`, `autorelease`, and `dealloc`\
    \ methods.\n\n**Example -** `MRC`**:**\n\n```objective\n// MRC example\n@interface\
    \ Person : NSObject\n@property (nonatomic, strong) NSString *name;\n@end\n\n@implementation\
    \ Person\n- (void)dealloc {\n    [_name release]; // Release retained properties\n\
    \    [super dealloc]; // Call superclass's dealloc method\n}\n@end\n\n// Usage\
    \ example\nPerson *person = [[Person alloc] init]; // Allocate memory\nperson.name\
    \ = @\"Alice\"; // Assign property\n[person release]; // Release memory when done\
    \ using the object\n```\n\nIn `MRC`, developers are responsible for managing object\
    \ lifecycles, ensuring to release objects when they are no longer needed to free\
    \ up memory.\n\n## Automatic Reference Counting (`ARC`)\n\nAutomatic Reference\
    \ Counting (`ARC`) is a compiler feature introduced in Objective-C that automatically\
    \ manages the lifecycle of Objective-C objects. It inserts `retain`, `release`,\
    \ and `autorelease` calls at compile-time, reducing the likelihood of memory leaks\
    \ and crashes.\n\n**Example -** `ARC`**:**\n\n```objective\n// ARC example\n@interface\
    \ Person : NSObject\n@property (nonatomic, strong) NSString *name;\n@end\n\n@implementation\
    \ Person\n@end\n\n// Usage example\nPerson *person = [[Person alloc] init]; //\
    \ Memory is automatically managed\nperson.name = @\"Bob\"; // No need to manage\
    \ retain/release manually\n// ARC handles releasing memory when object is no longer\
    \ referenced\n```\n\nIn `ARC`, developers no longer need to manually insert `retain`/`release`\
    \ calls. The compiler automatically manages memory by inserting these calls based\
    \ on the object's scope and ownership.\n\n## Key Differences and Considerations\n\
    \nIn `MRC`, developers explicitly declare ownership and manage retain counts.\
    \ In `ARC`, ownership is inferred by the compiler based on variable scope and\
    \ annotations (`strong`, `weak`, `copy`, etc.). Ease of `ARC` reduces boilerplate\
    \ code and simplifies memory management, making code cleaner and less error-prone\
    \ compared to `MRC`. `ARC` is backward compatible with existing `MRC` code, allowing\
    \ gradual adoption and migration to `ARC`.\n\nUnderstanding memory allocation,\
    \ Manual Reference Counting (`MRC`), and Automatic Reference Counting (`ARC`)\
    \ is essential for developing robust and efficient Objective-C applications.\n\
    \n`MRC` requires explicit management of retain counts and memory deallocation,\
    \ while `ARC` automates these tasks at compile-time, reducing developer overhead\
    \ and improving code safety. Choosing between `MRC` and `ARC` depends on project\
    \ requirements, legacy code compatibility, and developer preferences for manual\
    \ versus automatic memory management.\n\n## Retain Cycles and Weak References\n\
    \nA retain cycle occurs when two or more objects hold strong references to each\
    \ other, preventing them from being deallocated. This can lead to memory leaks\
    \ because the reference count of each object never reaches zero, even when they\
    \ are no longer needed.\n\n**Example - Retain Cycle:**\n\n```objective\n@interface\
    \ Person : NSObject\n@property (nonatomic, strong) NSString *name;\n@property\
    \ (nonatomic, strong) Person *friend; // Strong reference\n@end\n\n@implementation\
    \ Person\n@end\n\n// Usage example\nPerson *person1 = [[Person alloc] init];\n\
    Person *person2 = [[Person alloc] init];\nperson1.friend = person2;\nperson2.friend\
    \ = person1;\n```\n\nIn this example, `person1` and `person2` hold strong references\
    \ to each other (`friend` property), creating a retain cycle. As a result, neither\
    \ object can be deallocated because their retain counts never drop to zero.\n\n\
    ## Weak References\n\nTo break retain weak references are used. A weak reference\
    \ does not retain the object it refers to, allowing the referenced object to be\
    \ deallocated when no other strong references exist. Weak references are typically\
    \ used in situations where objects have a parent-child relationship or in delegate\
    \ patterns.\n\n**Example - Weak Reference:**\n\n```objective\n@interface Person\
    \ : NSObject\n@property (nonatomic, strong) NSString *name;\n@property (nonatomic,\
    \ weak) Person *friend; // Weak reference\n@end\n\n@implementation Person\n@end\n\
    \n// Usage example\nPerson *person1 = [[Person alloc] init];\nPerson *person2\
    \ = [[Person alloc] init];\nperson1.friend = person2;\nperson2.friend = person1;\
    \ // Use weak reference to avoid retain cycle\n```\n\nIn this corrected example,\
    \ `friend` property of `Person` class is declared as `weak`. This breaks the retain\
    \ cycle between `person1` and `person2`, allowing them to be deallocated properly\
    \ when their strong references are released.\n\n## Best Practices for Memory Management\
    \ in Objective-C\n\n### 1. Use `ARC` Whenever Possible\n\nAutomatic Reference\
    \ Counting (`ARC`) reduces manual errors and simplifies memory management by automatically\
    \ managing retain counts at compile-time.\n\n### 2. Identify Ownership with `Strong`,\
    \ `Weak`, and `Unowned` References\n\nUse `strong` references for ownership relationships\
    \ where the object should not be deallocated as long as there are strong references\
    \ to it. Use `weak` references to break retain cycles and avoid strong reference\
    \ cycles between objects."
  raw: 'Objective-C provides two main approaches to memory management: Manual Reference
    Counting (MRC) and Automatic Reference Counting (ARC).   1\. Memory Allocation
    Basics   Local variables and function call information are stored here. Variables
    declared inside functions are allocated on the stack. Memory for dynamically allocated
    objects and structures is managed here. Objects created using alloc, init, new,
    or copy methods are allocated on the heap.   2\. Manual Reference Counting (MRC)
      Manual Reference Counting (MRC) requires developers to explicitly manage the
    lifecycle of objects by incrementing and decrementing their reference counts using
    retain, release, autorelease, and dealloc methods.      Example - MRC:      objective
         // MRC example      @interface Person : NSObject      @property (nonatomic,
    strong) NSString *name;      @end      @implementation Person      - (void)dealloc
    {      [_name release]; // Release retained properties      [super dealloc]; //
    Call superclass''s dealloc method      }      @end      // Usage example      Person
    *person = [[Person alloc] init]; // Allocate memory      person.name = @"Alice";
    // Assign property      [person release]; // Release memory when done using the
    object   In MRC, developers are responsible for managing object lifecycles, ensuring
    to release objects when they are no longer needed to free up memory.   3\. Automatic
    Reference Counting (ARC)   Automatic Reference Counting (ARC) is a compiler feature
    introduced in Objective-C that automatically manages the lifecycle of Objective-C
    objects. It inserts retain, release, and autorelease calls at compile-time, reducing
    the likelihood of memory leaks and crashes.      Example - ARC:      objective
         // ARC example      @interface Person : NSObject      @property (nonatomic,
    strong) NSString *name;      @end      @implementation Person      @end      //
    Usage example      Person *person = [[Person alloc] init]; // Memory is automatically
    managed      person.name = @"Bob"; // No need to manage retain/release manually
         // ARC handles releasing memory when object is no longer referenced   In
    ARC, developers no longer need to manually insert retain/release calls. The compiler
    automatically manages memory by inserting these calls based on the object''s scope
    and ownership.   Key Differences and Considerations   In MRC, developers explicitly
    declare ownership and manage retain counts. In ARC, ownership is inferred by the
    compiler based on variable scope and annotations (strong, weak, copy, etc.). Ease
    of ARC reduces boilerplate code and simplifies memory management, making code
    cleaner and less error-prone compared to MRC. ARC is backward compatible with
    existing MRC code, allowing gradual adoption and migration to ARC.   Understanding
    memory allocation, Manual Reference Counting (MRC), and Automatic Reference Counting
    (ARC) is essential for developing robust and efficient Objective-C applications.


    MRC requires explicit management of retain counts and memory deallocation, while
    ARC automates these tasks at compile-time, reducing developer overhead and improving
    code safety. Choosing between MRC and ARC depends on project requirements, legacy
    code compatibility, and developer preferences for manual versus automatic memory
    management.   Retain Cycles and Weak References        A retain cycle occurs when
    two or more objects hold strong references to each other, preventing them from
    being deallocated. This can lead to memory leaks because the reference count of
