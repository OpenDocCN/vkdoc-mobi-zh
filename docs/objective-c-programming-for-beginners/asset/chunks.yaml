    - Retain Cycle:      objective      @interface Person : NSObject      @property
    (nonatomic, strong) NSString *name;      @property (nonatomic, strong) Person
    *friend; // Strong reference      @end      @implementation Person      @end      //
    Usage example      Person *person1 = [[Person alloc] init];      Person *person2
    = [[Person alloc] init];      person1.friend = person2;      person2.friend =
    person1;   In this example, person1 and person2 hold strong references to each
    other (friend property), creating a retain cycle. As a result, neither object
    can be deallocated because their retain counts never drop to zero.   Weak References
      To break retain weak references are used. A weak reference does not retain the
    object it refers to, allowing the referenced object to be deallocated when no
    other strong references exist. Weak references are typically used in situations
    where objects have a parent-child relationship or in delegate patterns.      Example
    - Weak Reference:      objective      @interface Person : NSObject      @property
    (nonatomic, strong) NSString *name;      @property (nonatomic, weak) Person *friend;
    // Weak reference      @end      @implementation Person      @end      // Usage
    example      Person *person1 = [[Person alloc] init];      Person *person2 = [[Person
