    \n# Chapter 3: Control Structures\n\nConditional statements (`if`, `else`, `switch`)\
    \ and loops (`for`, `while`, `do-while`) are fundamental control structures in\
    \ Objective-C. They allow you to control the flow of your program based on conditions\
    \ and repeat execution of a block of code multiple times. Let's explore each of\
    \ these structures with examples.\n\n## 1. Conditional Statements\n\n### `if`,\
    \ `else` Statements\n\nThe `if` statement executes a block of code if a specified\
    \ condition is true. Optionally, an `else` statement can be used to execute a\
    \ block of code if the condition is false.\n\n**Example:**\n\n```objectivec\n\
    int age = 30;\nif (age >= 18) {\n    NSLog(@\"You are an adult.\");\n} else {\n\
    \    NSLog(@\"You are not yet an adult.\");\n}\n```\n\n### `else if` Statement\n\
    \nYou can use multiple conditions with `else if` to check for multiple conditions\
    \ sequentially.\n\n**Example:**\n\n```objectivec\nint score = 85;\nif (score >=\
    \ 90) {\n    NSLog(@\"Grade: A\");\n} else if (score >= 80) {\n    NSLog(@\"Grade:\
    \ B\");\n} else if (score >= 70) {\n    NSLog(@\"Grade: C\");\n} else {\n    NSLog(@\"\
    Grade: D\");\n}\n```\n\n### `switch` Statement\n\nThe `switch` statement evaluates\
    \ an expression and executes code blocks based on matching case labels.\n\n**Example:**\n\
    \n```objectivec\nint day = 2;\nswitch (day) {\n    case 1:\n        NSLog(@\"\
    Monday\");\n        break;\n    case 2:\n        NSLog(@\"Tuesday\");\n      \
    \  break;\n    case 3:\n        NSLog(@\"Wednesday\");\n        break;\n    default:\n\
    \        NSLog(@\"Other day\");\n        break;\n}\n```\n\nThe `break` statement\
    \ terminates the `switch` statement and transfers control to the statement following\
    \ the switch block.\n\n## 2. Loops\n\n### `for` Loop\n\nThe `for` loop repeats\
    \ a block of code a specified number of times.\n\n**Example:**\n\n```objectivec\n\
    for (int i = 1; i <= 5; i++) {\n    NSLog(@\"%d\", i);\n}\n```\n\nThe loop initializes\
    \ `i` to 1, executes the loop body as long as `i` is less than or equal to 5,\
    \ increments `i` by 1 after each iteration.\n\n### `while` Loop\n\nThe `while`\
    \ loop repeats a block of code as long as a specified condition is true.\n\n**Example:**\n\
    \n```objectivec\nint count = 1;\nwhile (count <= 5) {\n    NSLog(@\"%d\", count);\n\
    \    count++;\n}\n```\n\nThe loop continues to execute as long as `count` is less\
    \ than or equal to 5. It increments `count` by 1 after each iteration.\n\n###\
    \ `do-while` Loop\n\nThe `do-while` loop is similar to the `while` loop, but it\
    \ guarantees that the block of code is executed at least once before checking\
    \ the condition.\n\n**Example:**\n\n```objectivec\nint num = 1;\ndo {\n    NSLog(@\"\
    %d\", num);\n    num++;\n} while (num <= 5);\n```\n\nThe loop first executes the\
    \ block of code and then checks the condition (`num <= 5`). It continues to execute\
    \ as long as the condition is true.\n\nConditional statements (`if`, `else`, `switch`)\
    \ allow you to make decisions in your Objective-C programs based on conditions.\
    \ Loops (`for`, `while`, `do-while`) enable you to repeat blocks of code multiple\
    \ times based on specified conditions. Understanding and mastering these control\
    \ structures is essential for writing efficient and functional Objective-C code,\
    \ enabling you to control the flow of your programs and handle repetitive tasks\
    \ effectively.\n\n## Using `break` and `continue`\n\nIn Objective-C, `break` and\
    \ `continue` are control flow statements used within loops (`for`, `while`, `do-while`)\
    \ to alter the default flow of execution. They provide flexibility and control\
    \ over how loops operate and are essential for handling specific conditions or\
    \ exiting loops prematurely.\n\n### 1. Using `break`\n\nThe `break` statement\
    \ terminates the current loop or switch statement and transfers control to the\
    \ statement immediately following the terminated statement.\n\n**Example - Using\
    \ `break` in a `for` loop:**\n\n```objectivec\nfor (int i = 1; i <= 10; i++) {\n\
    \    NSLog(@\"%d\", i);\n    if (i == 5) {\n        break; // Exit the loop when\
    \ i reaches 5\n    }\n}\n```\n\nIn this example, the loop prints numbers from\
    \ 1 to 5. When `i` equals 5, the `break` statement is encountered, and the loop\
    \ terminates immediately."
