  trans: "\n## 示例——在 `while` 循环中使用 `break`\n\n```objectivec\nint num = 1;\nwhile (num\
    \ <= 10) {\n    NSLog(@\"%d\", num);\n    num++;\n    if (num == 6) {\n      \
    \  break; // 当 num 等于 6 时退出循环\n    }\n}\n```\n\n此循环会打印数字 1 到 5，并在 `num` 等于 6 时因\
    \ `break` 语句而退出。\n\n## 使用 `continue`\n\n`continue` 语句会跳过当前循环迭代的剩余部分，并继续执行下一次迭代。\n\
    \n### 示例——在 `for` 循环中使用 `continue`\n\n```objectivec\nfor (int i = 1; i <= 5; i++)\
    \ {\n    if (i == 3) {\n        continue; // 当 i 等于 3 时跳过该次迭代\n    }\n    NSLog(@\"\
    %d\", i);\n}\n```\n\n在此示例中，循环因 `continue` 语句而跳过打印数字 3，并继续执行下一次迭代。\n\n### 示例——在\
    \ `while` 循环中使用 `continue`\n\n```objectivec\nint num = 0;\nwhile (num < 5) {\n\
    \    num++;\n    if (num % 2 == 0) {\n        continue; // 跳过偶数\n    }\n    NSLog(@\"\
    %d\", num);\n}\n```\n\n此循环打印奇数（1, 3, 5），因为 `continue` 语句跳过了偶数（满足 `num % 2 == 0`\
    \ 条件）。\n\n## Objective-C 中的嵌套控制结构\n\n嵌套控制结构是指将一个控制结构放置在另一个控制结构内部，例如将一个循环放在另一个循环内，或在一个\
    \ `if` 语句内再放置一个 `if` 语句。这种技术用于处理需要多层次决策的复杂条件和场景。\n\n### 示例——嵌套的 `for` 循环\n\n```objectivec\n\
    for (int i = 1; i <= 3; i++) {\n    NSLog(@\"外层循环迭代 %d\", i);\n    for (int j\
    \ = 1; j <= 2; j++) {\n        NSLog(@\"内层循环迭代 %d\", j);\n    }\n}\n```\n\n在此示例中，外层循环\
    \ (`i`) 执行了三次，而外层循环的每一次迭代中，内层循环 (`j`) 都会执行两次。因此总共执行了 6 次迭代（3 * 2）。\n\n### 示例——嵌套的\
    \ `if-else` 语句\n\n```objectivec\nint x = 10;\nint y = 20;\nif (x > 5) {\n    if\
    \ (y > 15) {\n        NSLog(@\"两个条件都为真\");\n    } else {\n        NSLog(@\"第一个条件为真，第二个条件为假\"\
    );\n    }\n} else {\n    NSLog(@\"第一个条件为假\");\n}\n```\n\n在此示例中，外层的 `if` 语句检查 `x`\
    \ 是否大于 5。如果为真，则根据 `y` 的值评估内层的 `if-else` 语句。\n\n`break` 和 `continue` 语句提供了在 Objective-C\
    \ 中改变循环内执行流程的方式。`break` 会终止当前循环或 `switch` 语句，而 `continue` 则跳过当前迭代并继续循环的下一次迭代。嵌套控制结构，如嵌套循环和嵌套的\
    \ `if` 语句，允许你有效地处理复杂条件和控制流程场景。掌握这些技术能让你编写更高效、更灵活的 Objective-C 代码，以满足各种编程挑战和需求。\n\
    \n# 第 4 章：函数与方法\n\n函数是可重用的代码块，用于执行特定任务。\n\n在 Objective-C 中，函数使用特定的语法定义，并且可以有输入参数和输出返回类型。理解如何定义和调用函数是有效组织和构建代码的基础。\n\
    \n## 1. 定义函数\n\n在 Objective-C 中，函数使用以下语法定义：\n\n```objectivec\nreturnType functionName(parameter1Type\
    \ parameter1Name, parameter2Type parameter2Name, ...) {\n    // 函数体\n    // 语句\n\
    \    return returnValue; // 可选的返回语句\n}\n```\n\n- `returnType`：指定函数返回值的类型。如果函数不返回值，则使用\
    \ `void`。\n- `functionName`：函数名称。\n- `parameters`：函数接受的参数（输入）的可选列表，每个参数由数据类型和名称定义。\n\
    - `returnValue`：函数返回的可选值（如果 `returnType` 不是 `void`）。\n\n### 示例——无参数和无返回值的函数\n\n\
    ```objectivec\n// 函数声明\nvoid greet() {\n    NSLog(@\"Hello, World!\");\n}\n\n\
    // 函数调用\ngreet(); // 输出：Hello, World!\n```\n\n### 示例——带参数和返回值的函数\n\n```objectivec\n\
    // 函数声明\nint sum(int a, int b) {\n    return a + b;\n}\n\n// 函数调用\nint result\
    \ = sum(3, 5); // result 的值为 8\nNSLog(@\"Sum: %d\", result); // 输出：Sum: 8\n```\n\
    \n## 2. 函数参数和返回类型\n\n### 函数参数\n\n参数允许你将值传递给函数进行处理。它们定义在函数名后面的括号内。\n\n#### 示例——带参数的函数\n\
    \n```objectivec\n// 函数声明\nvoid greetUser(NSString *name) {\n    NSLog(@\"Hello,\
    \ %@\", name);\n}\n\n// 函数调用\ngreetUser(@\"Alice\"); // 输出：Hello, Alice\n```\n\
    \n### 返回类型\n\n返回类型指定函数返回值的类型。如果函数不返回值，则使用 `void`。\n\n#### 示例——带返回类型的函数\n\n```objectivec\n\
    // 函数声明\nint square(int number) {\n    return number * number;\n}\n\n// 函数调用\n\
    int result = square(5); // result 的值为 25\nNSLog(@\"Square: %d\", result); // 输出：Square:\
    \ 25\n```\n\n函数对于将代码组织成可管理的块、增强可重用性以及促进 Objective-C 程序中的模块化设计至关重要。通过定义带有适当参数和返回类型的函数，你可以封装逻辑和任务，使代码更易读、可维护且高效。理解如何定义函数、传递参数以及处理返回值，对于开发健壮且可扩展的\
    \ Objective-C 应用程序至关重要。\n\n## Objective-C 中的方法\n\n在 Objective-C 中，方法类似于其他编程语言中的函数，但它们与类和对象相关联。\n"
- fmt: "# Methods in Objective-C\n\nThey encapsulate behavior and functionality within\
    \ objects, enabling objects to communicate and interact with each other. Understanding\
    \ methods is fundamental for object-oriented programming in Objective-C.\n\n##\
    \ 1. Defining Methods\n\nMethods in Objective-C are defined within the `@interface`\
    \ and `@implementation` blocks of a class.\n\n### Instance Methods\n\nInstance\
    \ methods are methods that operate on instances of a class (objects). They are\
    \ declared and implemented within the `@interface` and `@implementation` sections\
    \ of a class.\n\n**Example - Declaring and implementing an instance method:**\n\
    \n```\n// Interface section (header file .h)\n@interface MyClass : NSObject\n\
    - (void)printMessage; // Instance method declaration\n@end\n\n// Implementation\
    \ section (implementation file .m)\n@implementation MyClass\n- (void)printMessage\
    \ { // Instance method definition\n    NSLog(@\"Hello from instance method!\"\
    );\n}\n@end\n```\n\n### Class Methods\n\nClass methods, also known as static methods\
    \ in other languages, are methods that belong to the class itself rather than\
    \ instances of the class. They are prefixed with a `+` sign.\n\n**Example - Declaring\
    \ and implementing a class method:**\n\n```\n// Interface section (header file\
    \ .h)\n@interface MyClass : NSObject\n+ (void)printStaticMessage; // Class method\
    \ declaration\n@end\n\n// Implementation section (implementation file .m)\n@implementation\
    \ MyClass\n+ (void)printStaticMessage { // Class method definition\n    NSLog(@\"\
    Hello from class method!\");\n}\n@end\n```\n\n## 2. Calling Methods\n\nMethods\
    \ are called on objects (for instance methods) or directly on the class (for class\
    \ methods) using square brackets `[]`.\n\n**Example - Calling instance and class\
    \ methods:**\n\n```\n// Using instance method\nMyClass *obj = [[MyClass alloc]\
    \ init]; // Create an instance of MyClass\n[obj printMessage]; // Call instance\
    \ method on obj\n\n// Using class method\n[MyClass printStaticMessage]; // Call\
    \ class method directly on MyClass\n```\n\n# Understanding Scope and Lifetime\
    \ of Variables in Objective-C\n\n## 1. Scope of Variables\n\nScope refers to the\
    \ visibility and accessibility of variables within a program. In Objective-C,\
    \ variables have different scopes depending on where they are declared:\n\n- **Global\
    \ Variables**: Variables declared outside of any function or method can be accessed\
    \ from anywhere in the program.\n- **Local Variables**: Variables declared inside\
    \ a function, method, or block are only accessible within that particular scope.\n\
    - **Instance Variable**: Instance variables (also known as member variables) are\
    \ declared within a class interface and are accessible to all instance methods\
    \ of that class.\n- **Class Variable**: Class variables (also known as static\
    \ variables) are declared using the `static` keyword within a class interface\
    \ and are shared among all instances of the class.\n\n## 2. Lifetime of Variables\n\
    \nLifetime refers to the duration for which a variable exists in memory.\n\nIn\
    \ Objective-C:\n\n- **Local Variables**: Exist only within the block, function,\
    \ or method in which they are declared. They are created when the block is entered\
    \ and destroyed when the block is exited.\n- **Instance Variables**: Exist as\
    \ long as the object (instance of a class) exists. They are initialized when the\
    \ object is created using `alloc` and `init` methods and are deallocated when\
    \ the object is destroyed (usually when reference count drops to zero).\n- **Class\
    \ Variables**: Exist for the duration of the program's execution. They are initialized\
    \ when the class is loaded into memory and are destroyed when the program terminates.\n\
    \n**Example - Scope and Lifetime of Variables:**\n\n```\n@interface MyClass :\
    \ NSObject {\n    int instanceVariable; // Instance variable\n}\n@end\n\n@implementation\
    \ MyClass\n- (void)exampleMethod {\n    int localVar = 10; // Local variable\n\
    \    // Accessing instance variable\n    instanceVariable = 20;\n    // Printing\
    \ local variable\n    NSLog(@\"Local variable: %d\", localVar);\n}\n@end\n```\n\
    \nIn this example, `instanceVariable` is an instance variable accessible to all\
    \ instance methods of `MyClass`. `localVar` is a local variable with scope limited\
    \ to the `exampleMethod`.\n\nMethods in Objective-C are essential for encapsulating\
    \ behavior within objects, facilitating object-oriented programming principles\
    \ such as encapsulation, abstraction, and inheritance. Understanding the scope\
    \ and lifetime of variables helps you manage data effectively within your programs,\
    \ ensuring proper memory management and logical structure. By mastering methods,\
    \ scope, and variable lifetimes, you can develop robust and efficient Objective-C\
    \ applications that are modular and scalable.\n\n# Recursive Functions\n\nRecursive\
    \ functions are functions that call themselves directly or indirectly in order\
    \ to solve a problem. They are useful for solving problems that can be broken\
    \ down into smaller, similar sub-problems. Understanding recursive functions is\
    \ essential for tackling tasks involving repetitive or nested structures.\n\n\
    ## 1. Basics of Recursive Functions\n\nRecursive functions typically have two\
    \ main parts:\n\n- **Base Case**: The condition under which the function stops\
    \ calling itself recursively. It prevents infinite recursion and defines the smallest\
    \ instance of the problem that can be solved directly.\n- **Recursive Case**:\
    \ The part of the function where it calls itself with a smaller or simpler instance\
    \ of the problem.\n\n## 2. Example of a Recursive Function\n\n**Example - Calculating\
    \ Factorial**\n\nThe factorial of a non-negative integer `n`, denoted as `n!`,\
    \ is the product of all positive integers less than or equal to `n`.\n\n```\n\
    #import <Foundation/Foundation.h>\n\n// Function declaration\nint factorial(int\
    \ n) {\n    // Base case: factorial of 0 is 1\n    if (n == 0) {\n        return\
    \ 1;\n    }\n    // Recursive case: n! = n * (n-1)!\n    return n * factorial(n\
    \ - 1);\n}\n```"
