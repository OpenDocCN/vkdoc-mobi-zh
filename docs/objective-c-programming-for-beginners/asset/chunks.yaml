      Data Types and Variables        Objective-C, being a superset of C, supports
    both the standard C data types and additional types introduced for object-oriented
    programming. Understanding these data types and how to declare and use variables
    is crucial for effective programming in Objective-C.   1\. Primitive Data Types
      Objective-C supports the basic C data types:   int: Represents integer values.
    float: Represents single-precision floating-point values. double: Represents double-precision
    floating-point values.


    char: Represents a single character. BOOL: Represents a boolean value (YES or
