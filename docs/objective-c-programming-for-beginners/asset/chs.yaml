  : @\"John\", @\"age\": @30};\nNSNumber *luckyNumber = @7;\n```\n\n### 4. 变量作用域与生命周期\n\
  \n变量的作用域和生命周期决定了它在哪里可以被访问以及在内存中存在多长时间：\n\n- **局部变量**：在函数或代码块内声明，仅在该作用域内可访问。它们仅在函数或代码块执行期间存在。\n\
  - **实例变量**：在类的接口中声明，可在该类内部访问。它们与对象实例共存亡。\n- **全局变量**：在任何函数或类外部声明，可从程序的任何部分访问。它们在程序的整个生命周期内存在。\n\
