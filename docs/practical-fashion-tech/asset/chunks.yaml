    idea of what the costume is trying to convey.


    ![A371637_1_En_2_Fig1_HTML.jpg](A371637_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Lyn working on school musical costumes


    I have often relied on donations from parents and lots of shopping trips to secondhand
    stores to create entire costume plots for a production. It is fairly easy and
    a lot of fun to add trim or other things to a dress or robe, and invent an entirely
    different look. The piece I am working on in Figure [2-1](#A371637_1_En_2_Chapter.html#Fig1)
    is a secondhand velour robe. I am sewing a gold garland on as trim for a Father
    Christmas character in A Coney Island Christmas.


    Some of my best costumes have been garments that I had to deconstruct and resurrect
    as something new. I used a 1950s-era pink prom dress and added lots of lace and
    frills for Glinda the Good Witch in a production of The Wizard of Oz. For the
    Wicked Witch of the West, I used a black taffeta cocktail dress from the 1960s,
    removed the glamorous parts, and added rubber snakes, spiders, and other evil
    things. I think these two are among my favorite creations. Unfortunately, they
    were loaned out a few times and never found their way home . . . heavy sigh.


    It is possible to costume an entire production on a small budget. It just takes
    some planning and work, but it can be quite spectacular and rewarding, especially
    when students help to brainstorm and cut and sew.


    It is also a lot of fun to build a costume from the ground up. A few of my favorites
    were two polka dotted 1960s Twiggy-style dresses for a production of The Odd Couple,
    the costumes for Lola in Damn Yankees, several 1940s tap-pant sets for Anything
    Goes, and a turkey for A Coney Island Christmas.


    Take a garment and turn it into something entirely different from its original
    incarnation. Give your brain the freedom to explore. Be bold and brave in your
    choices. Sometimes it fails, but other times it is spectacular. I have learned
    a lot from every piece altered or created, especially the ones that had problems
    and turned out to be less than fabulous.'
