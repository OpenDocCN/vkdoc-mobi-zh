  raw: '# Part IV

    Where to Go From Here


    Where to Go From Here


    In this Part we take a broader view than the previous Parts. In Chapter [12](#A371637_1_En_12_Chapter.html),
    we show you some other technologies, like laser cutting, foam armor creation,
    and vacuum forming, that are frequenly used by cosplayers to replicate things
    that are not supposed to be made of cloth. Chapter [13](#A371637_1_En_13_Chapter.html)
    concludes the main part of the book by looking at where all of this can lead,
    with examples of high-end fashion designers that are using these technologies
    now and some speculation as to how these techniques may enter the mainstream sooner
    than you might think.


    We have also included two appendices that will help you explore the topics in
    this book some more. In Appendix A, we give you the benefit of our experience
    with designing a high school pilot class which had fashion tech components (both
    what worked well, and what we would do differently). Appendix B captures all the
    links in the book in one ready reference.


    # 12. Other Technologies


    One of the challenges of writing a book like this is knowing when to stop. If
    you go to a large public library to look at their section of sewing, fashion,
    and similar craft books, you most likely will find shelf after shelf of books
    on those topics. This book focuses on the overlap of sewing and electronics, with
    a bit of an introduction to 3D printing thrown in.


    This chapter gives a brief introduction to a few more tools and techniques that
    are becoming common, particularly in the cosplay community. Some of these involve
    tools that are not really available for home use yet, but that are probably available
    in a makerspace or community college if you have access to resources like those.


    ## Cutting Tools


    In this first section we talk about ways of cutting things. Chapter [9](#A371637_1_En_9_Chapter.html)
    introduces 3D printing, which creates objects by building them up a layer at a
    time. Laser cutters and CNC (computer numerically controlled) tools both work
    more traditionally, by removing material from an initial piece of raw material.
    Neither machine is particularly suitable for home use, although smaller CNC machines
    are now on the market.


    ### Laser Cutting


    A laser cutter uses a laser to burn through (or melt) a piece to cut it into desired
    shapes. Laser cutting can be used to make very intricate things, as a search online
    for “laser cut art” will quickly reveal. The minus is that laser cutters are not
    really home machines, for safety, cost, and logistical (for example, size, noise,
    and air quality) reasons.


    When a laser cuts something it creates both smoke and some fumes from whatever
    is burning away, so laser cutters need to be vented, either to the outside or
    to an air scrubber. Laser cutters can produce very toxic fumes if you cut the
    wrong thing, which can damage both the laser cutter and the person running it.
    The cutter has to be monitored closely to make sure that the object being cut
    does not catch fire, and regular maintenance is needed. Given all that, most facilities
    will either do the job for you or make you take some training, so we will not
    get into details here beyond covering some concepts about what is possible and
    how to create a file for laser cutting.


    #### Cutting Fabric


    Laser cutters can cut many kinds of cloth. Some fabrics will melt around the edges,
    which can either mean you have a nice sealed edge or your fabric melted away,
    depending on the skill of the operator that sets it up. Cotton cuts cleanly but
    can discolor a little from the cutting (burning) process. Figure [12-1](#A371637_1_En_12_Chapter.html#Fig1)
    shows a laser cutter set up to cut fabric, and Figure [12-2](#A371637_1_En_12_Chapter.html#Fig2)
    displays some examples of laser cut test pieces. If you can, try a very small
    test first in case it does not work out well. That way you can still fall back
    on using scissors without ruining your fabric.


    ![A371637_1_En_12_Fig2_HTML.jpg](A371637_1_En_12_Fig2_HTML.jpg)


    Figure 12-2.


    Test pieces of various fabrics after laser cutting (the green one was cut in the
    setup of Figure [12-1](#A371637_1_En_12_Chapter.html#Fig1))


    ![A371637_1_En_12_Fig1_HTML.jpg](A371637_1_En_12_Fig1_HTML.jpg)


    Figure 12-1.


    Laser cutter setup after cutting small oval of fabric


    #### Designing for a Laser Cutter


    Like a 3D printer (see Chapter [9](#A371637_1_En_9_Chapter.html)), a laser cutter
    only works from a computer file—you cannot “draw” with it. Unlike a 3D printer,
    a laser cutter works from a two-dimensional drawing. Usually this is a file in
    Scalable Vector Graphics (SVG) format that you create in a drawing program such
    as Adobe Illustrator or even Tinkercad (see Chapter [9](#A371637_1_En_9_Chapter.html)).
    You can specify whether you want to have a cut go all the way through or just
    engrave a piece. Engraving light fabric probably will not succeed, because cutting
    through it takes so little energy, but you can engrave leather, denim, acrylics,
    and similar heftier materials.


    Vector graphics are different from photographs and other raster images. A raster
    image (sometimes called bitmap) is made up of a series of pixels that are all
    the same size and laid out in a grid pattern. In other words, raster images are
    like most digital images you see. The only information the image contains about
    each pixel is its color. If you scale these images up, those pixels just get bigger,
    and the image looks blocky because there''s no information about what''s between
    the pixels.


    Vector images, on the other hand, have lines, arcs, and curves that follow mathematical
    rules so that a computer can always tell what the features should look like when
    you look closer. The complex shading of a photo would be nearly impossible to
    represent this way without simplifying it to create a stylized effect (Figure
    [12-3](#A371637_1_En_12_Chapter.html#Fig3) shows an example), but things like
    letters, geometric shapes, and line drawings can be represented with nearly infinite
    precision in a vector image.


    ![A371637_1_En_12_Fig3_HTML.jpg](A371637_1_En_12_Fig3_HTML.jpg)


    Figure 12-3.


    A self-portrait of Rich done in a vector format. Notice the stylized appearance
    created by the vector shapes


    Cutting with a laser cutter requires a file with vector lines for the laser to
    follow. You can make these lines in a program like Adobe Illustrator, either by
    drawing them directly or by tracing lines in a raster image (Illustrator comes
    with automated tools that can help with this).


    As mentioned, you can also use a laser cutter to etch or engrave the surface of
    a material, and you can do this with vector or raster images. In these cases,
    the laser will darken (or, depending on the material, possibly lighten) the surface
    where the laser hits it, allowing you to make a monochrome image. Etching may
    also remove the top layer of a surface (such as a layer of paint) to reveal a
    different color below it.


    You’re not stuck with Illustrator. You can also create a vector file for cutting
    with a CAD program. TinkerCAD has an option to download an SVG for laser cutting
    (found in the Download for 3D Printing menu) that will create lines wherever your
    design is intersecting the workplane. Other CAD programs commonly let you create
    2D drawings that you can export in DXF or DWG format. You will need to find out
    what formats the laser cutter’s software accepts, but all programs that run a
    laser cutter should work with SVG. Inkscape ( [`https://inkscape.org/en/`](https://inkscape.org/en/)
    ) is a free and open source alternative to Adobe Illustrator, and although it
    is not as full-featured, you may at least find it useful for converting one vector
    format to another.


    Tip


    Laser cutting is a great way to make multiple copies of a cutout pattern. Lyn
    had students laser cut cloth fish for a production, making the fish all consistent
    while allowing for a lot of variation of color and details.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n# 第四部分\n接下来该怎么做\n\
    \n在本部分中，我们将比前几部分更广泛地探讨。在第 12 章中，我们向您展示了一些其他技术，例如激光切割、泡沫盔甲制作和真空成型，这些技术经常被角色扮演者用来复制那些不应该由布料制成的物品。第\
    \ 13 章通过介绍高端时装设计师现在正在使用这些技术的例子，并推测这些技术如何可能比你想象的更快地进入主流，从而结束本书的主要部分。\n\n我们还包含了两个附录，它们将帮助您进一步探索本书中的主题。在附录\
    \ A 中，我们为您提供了我们设计一个包含时尚科技内容的高中试点课程的经验（包括哪些做得好，以及我们会做出哪些不同的改变）。附录 B 将本书中的所有链接整理成一个便捷的参考。\n\
    \n# 12. 其他技术\n\n编写这样一本书的挑战之一是知道何时收尾。如果你去一个大型公共图书馆查看他们的缝纫、时尚和类似手工艺书籍的区域，你很可能会发现一排又一排的书籍。本书重点介绍缝纫和电子学的交叉领域，并附带介绍了\
    \ 3D 打印。\n\n本章简要介绍了一些正变得常见，特别是在角色扮演社区中常见的工具和技术。其中一些工具目前还不太适合家庭使用，但如果你能接触到类似创客空间或社区学院等资源，这些工具可能在这些地方可以使用。\n\
    \n## 切割工具\n\n在第一部分中，我们讨论切割东西的方法。第 9 章介绍了 3D 打印，它通过逐层构建来创建物体。激光切割机和 CNC（计算机数控）工具则更传统地工作，它们从初始的原材料上去除材料。这两种机器都不太适合家庭使用，尽管现在市场上已经有较小的\
    \ CNC 机床。\n\n### 激光切割\n\n激光切割机使用激光来烧穿（或熔化）一块材料，将其切割成所需形状。激光切割可用于制作非常精细的物品，在网上搜索“激光切割艺术”很快就能发现这一点。缺点是激光切割机并非真正的家用机器，原因涉及安全、成本和后勤（例如尺寸、噪音和空气质量）方面。\n\
    \n当激光切割某物时，它会产生烟雾和燃烧物释放的烟气，因此激光切割机需要通风，要么排到室外，要么连接到空气净化器。如果你切错了材料，激光切割机可能会产生剧毒烟雾，从而损坏激光切割机和操作者。必须密切监控切割机，以确保被切割的物体不会着火，并且需要定期维护。鉴于所有这一切，大多数设施要么为你完成这项工作，要么让你接受一些培训，因此我们在此不会深入细节，仅涵盖一些关于可能性的概念以及如何为激光切割创建文件。\n\
    \n#### 切割布料\n\n激光切割机可以切割多种布料。有些面料会在边缘熔化，这可能意味着你得到了一个漂亮的密封边缘，或者你的面料被熔化掉了，这取决于操作者的设置技巧。棉布切割得很干净，但可能会因切割（燃烧）过程而稍微变色。图\
    \ 12-1 展示了一台设置好用于切割布料的激光切割机，图 12-2 展示了一些激光切割测试样片的例子。如果可以的话，先尝试一个非常小的测试，以防效果不佳。这样，你仍然可以退一步使用剪刀，而不会毁了你的布料。\n\
    \n![A371637_1_En_12_Fig2_HTML.jpg](img/A371637_1_En_12_Fig2_HTML.jpg)\n\n图 12-2.\
    \ 激光切割后各种布料的测试样片（绿色那块是在图 12-1 的设置中切割的）\n\n![A371637_1_En_12_Fig1_HTML.jpg](img/A371637_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1. 切割完小椭圆布料后的激光切割机设置\n\n#### 为激光切割机进行设计\n\n像 3D 打印机一样（见第 9 章），激光切割机只能根据计算机文件工作——你无法“手绘”它。与\
    \ 3D 打印机不同，激光切割机根据二维图纸工作。通常这是一个可缩放矢量图形（SVG）格式的文件，你在诸如`Adobe Illustrator`甚至`Tinkercad`（见第\
    \ 9 章）等绘图程序中创建。你可以指定是想要完全切穿还是仅仅雕刻一块材料。在轻薄织物上雕刻可能不会成功，因为切穿它所需的能量太少，但你可以雕刻皮革、牛仔布、亚克力和类似较厚的材料。\n\
    \n矢量图形与照片和其他光栅图像不同。光栅图像（有时称为位图）由一系列像素组成，这些像素大小相同并按网格排列。换句话说，光栅图像就像你看到的大多数数字图像。图像包含的关于每个像素的唯一信息就是它的颜色。如果你将这些图像放大，这些像素只会变大，图像看起来会呈块状，因为图像没有包含像素之间内容的信息。\n\
    \n另一方面，矢量图像具有遵循数学规则的线条、弧线和曲线，这样计算机总能在你靠近时判断出这些特征应该是什么样子。照片的复杂阴影几乎不可能以此方式呈现，除非将其简化以创建风格化的效果（图\
    \ 12-3 显示了一个例子），但字母、几何形状和线条图等内容可以在矢量图像中以近乎无限的精度呈现。\n\n![A371637_1_En_12_Fig3_HTML.jpg](img/A371637_1_En_12_Fig3_HTML.jpg)\n\
    \n图 12-3. Rich 的矢量格式自画像。注意矢量形状产生的风格化外观\n\n使用激光切割机切割需要一个包含矢量线的文件，以便激光跟随。你可以在像`Adobe\
    \ Illustrator`这样的程序中创建这些线条，方法是直接绘制它们，或者追踪光栅图像中的线条（`Illustrator`带有自动工具可以帮助完成此操作）。\n\
    \n如上所述，你也可以使用激光切割机来蚀刻或雕刻材料的表面，你可以使用矢量或光栅图像来完成。在这些情况下，激光会使激光照射到的表面变暗（或者，取决于材料，可能变亮），从而允许你制作单色图像。蚀刻也可能去除表面的顶层（例如一层油漆），以露出下面不同的颜色。\n\
    \n你不必局限于`Illustrator`。你也可以使用 CAD 程序创建用于切割的矢量文件。`TinkerCAD`有一个下载用于激光切割的 SVG 的选项（在“下载用于\
    \ 3D 打印”菜单中找到），它会在你的设计与工作平面相交的任何地方创建线条。其他 CAD 程序通常允许你创建可以导出为`DXF`或`DWG`格式的 2D\
    \ 图纸。你需要找出激光切割机软件接受哪些格式，但所有运行激光切割机的程序都应该支持`SVG`。`Inkscape`（ [`https://inkscape.org/en/`](https://inkscape.org/en/)\
    \ ）是`Adobe Illustrator`的免费开源替代品，尽管它功能没有那么全面，但至少你会发现它对于将一种矢量格式转换为另一种矢量格式很有用。\n\n\
    > **提示**\n> \n> 激光切割是制作多个裁片图案副本的好方法。Lyn 曾让学生为一场演出激光切割布料鱼，这使得鱼类保持一致，同时允许颜色和细节有大量变化。\n"
- fmt: '### CNC Milling


    A `CNC` mill is a computer-controlled cutting machine. It moves a cutting tool
    around in three dimensions to remove material, similar to the way a 3D printer
    adds material. `CNC` mills can work with more materials than laser cutters or
    3D printers, with possibilities ranging from `EVA` foam to some metals, but it
    is a much messier process that involves throwing tiny pieces of cut material out
    of the way. Even so, these machines may be more amenable to a home workshop than
    a laser cutter because rather than release smoke and fumes, they create the kind
    of mess than can be cleaned up with a broom or a wet-dry shop vacuum cleaner.


    `CNC` milling may need to be very slow when working with hard materials like metal,
    but with softer materials like foam or machining wax, it may be faster than 3D
    printing for large pieces. `CNC` mill prices also generally start lower than a
    laser cutter of comparable size, but can range pretty high upward for industrial
    machines designed to cut intricate shapes out of metal. `Othermill`, `Inventables`,
    and `Carbide 3D` are popular brands for hobbyist-level machines.


    ## Construction Techniques


    You can use a variety of materials to build up prop pieces or costume armor—complex
    shapes that might be far too large to 3D print. In this section we introduce you
    to some common construction techniques practiced in the cosplay community. Obviously
    there are many craft materials available, from wood to aluminum foil and duct
    tape. We just touch on some of the more “techie” ones here.


    ### Foam Armor


    Cosplayers often want to create make-believe armor or weaponry. A common way to
    do that is to cut and bend sheets of ethylene vinyl acetate (`EVA`) foam, commonly
    used for floor mats. One of the best-known practitioners of the art is Bill Doran,
    who founded Punished Props (`www.punishedprops.com`) in 2012 with his wife, Brittany.
    They have extensive resources including a YouTube channel (`www.youtube.com/user/punishedprops`)
    and the `Foamsmith` series of books available on their site.


    Punished Props started out doing commission work, and now Doran mostly trains
    people to use these techniques. His personal favorite cosplay outfit that he and
    his wife made for themselves was from the video game `Skyrim`. They were Drauger
    Deathlords, with old rusty armor, skeleton faces, and glowing eyes. He enthuses
    that they looked “inhuman.”


    Doran says that the key to a good cosplay costume is to “pick a character that
    [you] really love, and make sure it is something you are obsessed with.” He also
    says that it can take months to make a full set of foam armor, so you really do
    need to want to wear these costumes!


    The process involves starting with `EVA` foam (either in the form of floor mats
    or bought in large rolls) and cutting it out to desired shapes (see Figure `12-4`)
    using patterns similar to those used for sewing. You then use a variety of tools
    to bend and finish it. `EVA` foam cuts easily with a razor knife (though Bill
    warns that it dulls the blade quickly), a band saw, or even a laser cutter. You
    can do the detail work with a rotary tool, such as those made by `Dremel`.


    ![A371637_1_En_12_Fig4_HTML.jpg](A371637_1_En_12_Fig4_HTML.jpg)


    Figure 12-4. `EVA` foam costume piece, early in the process (photo courtesy of
    Bill Doran/Punished Props)


    Bill says a lot of the techniques involve ways of strapping the pieces to the
    wearer’s body, knowing what to wear under it, and figuring out how to glue pieces
    together. The finished and painted prop pieces can be quite spectacular (see Figures
    `12-5` and `12-6`).


    ![A371637_1_En_12_Fig6_HTML.jpg](A371637_1_En_12_Fig6_HTML.jpg)


    Figure 12-6. A finished, painted `EVA` helmet (photo courtesy of Bill Doran/Punished
    Props)


    ![A371637_1_En_12_Fig5_HTML.jpg](A371637_1_En_12_Fig5_HTML.jpg)


    Figure 12-5. A finished, painted `EVA` sword (photo courtesy of Bill Doran/Punished
    Props)


    ### Vacuum Forming


    Thermoforming is the process of heating thin sheets of plastic so that they can
    be stretched and formed to the shape of a mold. A common form of thermoforming
    is vacuum forming, in which the heated plastic is first stretched over a mold
    or form and then sealed down to a vacuum table with a frame so that the air can
    be sucked out, forcing the plastic against the surface before it re-hardens. This
    a common way to make things like masks, and is how almost all Star Wars stormtrooper
    cosplay armor is made.


    Clear face or eye covers can be made as part of a larger costume by vacuum forming
    a clear plastic. Many hobbyists build their own vacuum forming tables by making
    a box with holes in the top and connecting a wet-dry vacuum to the side to suck
    the air out. More professional vacuum formers include a heating element for the
    plastic, but others may require you to heat the framed plastic in an oven before
    transferring it to the vacuum former.


    ### Worbla


    There are also plastics that are designed to be formed without a mold. Products
    like `Worbla`, `Sintra`, `Wonderflex`, and `Terraflex` can be made soft with a
    heat gun and then formed by hand into complex shapes. These can be used to make
    props and armor, or just to make detail pieces to be attached to a larger piece.
    There are several books (including *The Book of Cosplay Armor Making with Worbla
    and Wonderflex* by Svetlana Quindt) listed at `www.worbla.com/?cat=33`, and the
    author has a YouTube channel at `www.youtube.com/user/Mogrymillian`.


    > **Caution**: As always, be sure to follow the manufacturer’s directions on ventilation
    and other protective gear when you are working with the materials in this chapter.


    ## Other Ideas


    There are numberless craft materials and tools out there for experimentation.
    Here are a couple of other techniques and tools that might be valuable for you
    to know about:


    - `Pepakura` is a technique for creating solid objects by making a cutout paper
    pattern that can be folded to create a surface. (This is a little different from
    origami, which creates more delicate creations starting from a square of paper.)
    Various software packages can do this, such as `Autodesk 123D Make` (`www.123dapp.com/make`).
    Items made this way are not very strong, but can be interesting shapes. A laser
    cutter is a good way to cut out a `pepakura` pattern.

    - A vinyl cutter is what it sounds like: a computer-controlled knife that cuts
    out shapes from a thin vinyl roll. It is useful if you want to have a thin-surface,
    colored, cut-out design on something, like fancy lettering.'
