  trans: '

    ## 切片与打印


    不过，创建（或下载）3D 模型仅仅是第一步。一旦你获得了`STL`文件，你仍需通过一个程序来运行它，该程序会为你的打印机生成详细的指令以实际制造物体，并且你还需要将这个文件传输到打印机。大多数打印机可通过
    USB 连接，部分还支持无线连接。另一些则可以使用 SD（或 microSD）卡，将可打印文件从你运行此软件的电脑传输到 3D 打印机本身。这些步骤因打印机而异，但一些标准已经出现。


    一个兼容多种打印机的程序是开源软件 `MatterControl`（[`www.mattercontrol.com`](http://www.mattercontrol.com)）。`MatterControl`（或你打印机的等效软件）接收`STL`文件，并输出一个`G-code`文件。`G-code`格式（或等效格式，如`X3G`）才是实际在打印机上运行的格式。如果你的打印机使用专有软件，该软件可能会也可能不会向用户显示此文件。


    你可以通过查看制造商的说明来检查你的打印机是否支持 `MatterControl`。如果你的打印机使用自己的专有软件，它很可能在执行与我们此处描述类似的操作，但细节会有所不同。


    **提示**


    如果你想了解关于 3D 打印过程的更多细节，并重点关注开源打印机，可以考虑阅读 Joan 的著作《掌握 3D 打印》（Apress，2014）。这本书还包括了打印后处理的内容。如果你想特别专注于使用
    `MatterControl` 软件，并希望获得更详细的用户指南，可以阅读 Joan 和 Rich 合著的《使用 MatterControl 进行 3D 打印》（Apress，2015）。这两本书都回顾了如何开始
    3D 打印，包括创建模型。由于这个主题庞大而复杂，我们在此只给出过程的大致轮廓，让你了解涉及的内容和可能性。在 [`www.mattercontrol.com`](http://www.mattercontrol.com)
    上也有相关文档，你的打印机制造商也可能提供一些链接或手册来帮助你入门。


    ### MatterControl


    消费级 3D 打印机大致分为两种类型：开源和专有。开源打印机在一定程度上可追溯到本章前面提到的 Adrian Bowyer 的 `RepRap` 打印机，而这些打印机正是
    `MatterControl` 旨在支持的机型。`MatterControl` 也是一个开源、免费的程序，它接收`STL`文件并将其转换为在支持它的 3D
    打印机上运行的命令（`G-code`）。`MatterControl` 需要：


    *   一个定义打印机的文件（对于官方支持的打印机，可通过下拉菜单提供）。

    *   一个`STL`文件。

    *   针对特定`STL`文件的设置。例如，可以选择让打印机生成支撑结构或不生成，针对不同材料使用不同的温度设置，等等。


    其中一些设置可能始终或大部分时间保持不变，而另一些则可能频繁变化（例如模型是否需要支撑）。目前的工艺水平是，为了打印出好的作品，需要对该过程有一定的了解。前面“提示”中建议的资源可以帮助你入门。


    `MatterControl` 还具备将打印作业发送到连接到运行 `MatterControl` 的计算机上的打印机的功能。创建 `MatterControl`
    的公司 `MatterHackers` 还销售一种平板电脑（`MatterControl Touch`），它可以运行兼容的 3D 打印机，从而无需占用一台电脑。


    ### 专有 3D 打印机


    其他制造商选择从头开始构建自己的软件和文件格式，而不是加入开源 3D 打印机社区。如果你的打印机附带专有软件，你应该查阅其文档。


    **警告**


    我们建议在通风良好的区域使用 3D 打印机（但不要在室外或窗户正前方）。请遵循制造商关于打印机环境的建议。


    ## 3D 打印材料


    消费级 3D 打印机使用多种材料。最常见的可能是聚乳酸（`PLA`），这是一种通常由糖/淀粉制成的塑料（在北美，通常来自玉米）。`PLA` 是最容易打印的材料之一，并且不像其他一些材料那样需要加热打印平台。然而，它在夏天炎热汽车内的温度下会变软，因此如果你要用
    `PLA` 制作任何结构性物品，必须小心，以免最终得到一件意外超现实的连衣裙。


    丙烯腈-丁二烯-苯乙烯共聚物（`ABS`）用于制造许多玩具，因此常被称为乐高塑料。它更难打印；它需要加热的打印平台以防止在打印过程中从平台剥离，以及需要能够处理比
    `PLA` 更高温度的挤出机。好处是，`ABS` 在温暖温度下不易变软。


    尼龙丝材对于时尚科技应用来说是一个有趣的选择。当打印成细长部件时它很柔韧，但如果打印得更厚则相当坚硬。它可以用适合尼龙的染料进行染色。然而，与 `ABS`
    类似，它必须在某些打印机无法承受的高温下打印，并且需要一个专为尼龙设计的打印平台。


    还有许多其他类型的丝材，并且不断有新品出现。`PET`（一种常用于水瓶的透明塑料）相当透明，其耐温性介于 `PLA` 和 `ABS` 之间。还有一些丝材含有木屑或金属粉末，打印出来看起来像木头或金属，有些还能在黑暗中发光。然而，这些丝材由于含有细小颗粒，往往容易堵塞和磨损喷嘴。还有一些柔性丝材材料（例如热塑性弹性体，或
    `TPEs`），打印起来具有挑战性，但能产生柔韧的效果。


    **警告**


    有些打印机只能打印一种类型的材料。请务必购买与你的机器兼容的丝材。另外，请注意丝材通常有 1.75 毫米和 3.0 毫米两种直径，二者不可互换。


    ## 应用


    既然我们已经了解了 3D 打印可能带来挑战的一些方面，为什么要在时尚科技项目中使用它呢？3D 打印的主要优势在于其灵活性，以及能够非常快速地以几乎任意形状创建实体物体的能力。


    3D 打印的直接应用包括打印装饰部件，这些部件旨在被粘合或缝制在衣物上，例如纽扣或装饰件（如本章前面所示）。3D 打印部件也可用于电池和控制线缆走向的支撑结构，或补充传统的骨架支撑（连衣裙的结构支撑）。然而，消费级
    3D 打印部件体积较小，这可能会限制其在骨架支撑中的实用性，除非你将多个部件粘合在一起或将它们粘合到服装上。


    **提示**


    Lyn 偏爱 Aleene 的纺织品胶水。该公司网站（[`www.ilovetocreate.com`](http://www.ilovetocreate.com)）提供了大量关于针对不同情况应使用何种产品的信息。根据
    Lyn 的经验，她使用过的胶水粘合效果非常好，但可能无法经受大量洗涤。

    '
- fmt: '### Making a Mold or Casting Pattern


    Another way that 3D printing can be useful in fashion is to create a mold for
    casting some other substance. The traditional sand-casting method, for example,
    starts with a positive mold (the same shape as what you ultimately want) and makes
    a hollow in a sand-oil mixture that is then filled with molten metal. These positives
    (called patterns in this application) have traditionally been made of wood, but
    because they are only used to press down sand, plastic works as well.


    Another traditional casting method, the lost-wax process, also starts with a positive,
    traditionally made of wax. This model is then encased in plaster or another high-temperature
    material and the combination is heated up so the wax melts and flows away. Metal
    can then be poured into the void. People have tried “lost-PLA” casting, substituting
    PLA 3D-printed models for the wax ones.


    **Caution**


    Because these processes involve molten metal, they are not typically do-it-at-home
    enterprises, but we note them here for interest.


    ### Using a 3D-Printing Pen


    Moving from metalsmithing to crafting, in principle one could use a 3D-printing
    pen to draw on fabric. These pens are not computer-controlled; they put out a
    plastic stream similar to a short section from a 3D printer, but the user just
    draws with them freehand. We have not tried this ourselves, but it is not that
    different from using hot glue on cloth.


    ## 3D Printing on Fabric


    We were curious about how it might work to try to 3D print nylon on nylon, with
    an eye to creating some texture in a garment. This is not something that a consumer
    3D printer is designed to do, and as a rule of thumb if you did not assemble your
    printer yourself (and thus know its mechanics very well), you probably should
    not attempt this. In particular, if your printer has an autoleveling feature,
    you may hit the binder clips. In our experiments we have found that we pretty
    much have to stand and watch the process the whole time, or the material can get
    dragged into the printer mechanisms.


    In our case, we have a printer that has a very exposed platform. We just stretched
    fabric on the platform with small binder clips. Figure [9-5](#A371637_1_En_9_Chapter.html#Fig5)
    shows the same design printed on three different fabrics, most using nylon filament,
    but one using PLA. The PLA stuck quite well to the cotton duck, although attaching
    the stiff duck to a platform was tricky. Perhaps someday someone will create a
    3D printer just for this application. Right now it is very hard to print on anything
    other than a rectangle of fabric that just covers the platform, or a long strip
    that is hitched along for each iteration, as in the project in Figure 9-6\. In
    the meantime, you might print structures and glue them onto fabric.


    ![A371637_1_En_9_Fig5_HTML.jpg](A371637_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    The same pattern printed with nylon filament on a thin, stretchy 95% nylon/5%
    spandex (top), nylon filament on nylon (possibly blend) fabric that stretches
    more in one direction than the other (middle), PLA on stiff cotton duck (bottom
    left), and nylon on cotton duck (bottom right).


    `Make` magazine tried a somewhat different tack in its article on the topic (
    [`http://makezine.com/projects/how-to-3d-print-on-tulle-net-or-lace-fabrics/`](http://makezine.com/projects/how-to-3d-print-on-tulle-net-or-lace-fabrics/)
    ) that involved printing part of a design, spreading the fabric on top of that
    print, and then continuing the print. This has the advantage that you will know
    exactly where your design will go on the fabric, but is more complex to implement.
    If your printer platform is enclosed or is tightly packed with other components,
