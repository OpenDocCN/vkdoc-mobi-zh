- fmt: "### Loading the Code and Using the Hat\n\nTo send the Arduino sketch to the\
    \ Flora, plug the Flora into your computer via USB and upload it (Chapter [6](#A371637_1_En_6_Chapter.html)).\
    \ Plug it into the battery and click the reset button on the Flora. You should\
    \ see it flash red and then turn off if you hold it still. Shaking it up and down\
    \ should give you green lights in the NeoPixel ring, and side to side should give\
    \ you red. If you like giving monosyllabic answers, now you can do so from across\
    \ the room!\n\n## The Light-up 60s Mod Dress\n\nThe other project in this chapter\
    \ takes a very different approach from the first one. In this section, Lyn walks\
    \ you through a project that requires creating a pattern from her specifications,\
    \ sewing a dress, and then adding some electroluminescent (EL) ribbon for effect.\
    \ EL wire ( [`https://en.wikipedia.org/wiki/Electroluminescent_wire`](https://en.wikipedia.org/wiki/Electroluminescent_wire)\
    \ ) is a conductive wire with a phosphor painted on it. When alternating current\
    \ is applied, the phosphor glows. EL ribbon is a flat version of EL wire that\
    \ is good for attaching to costumes for light-up effects. Lyn first talks about\
    \ the heritage of the design and goes over how to create a pattern and measure\
    \ yourself. Then she walks through how to sew the dress and add the EL ribbon.\n\
    \n### The Design\n\nIn 1965 Yves St. Laurent designed a collection of dresses\
    \ that were A-line, almost shapeless shifts with blocks of white and primary colors\
    \ separated by black lines. They were made from wool jersey and heavy silk, which\
    \ allowed them to keep their shape without draping the body of the wearer. It\
    \ was called the Mondrian Collection—an homage to the modern artist Piet Mondrian\
    \ and to modern art in general. Throughout the rest of the 1960s, variations on\
    \ this look appeared everywhere, and it became iconic of the era.\n\nI won’t be\
    \ using wool or silk, and the dress will have a fuller cut with a more comfortable\
    \ neckline. We are updating the look a bit, but trying to keep the feel of the\
    \ original dress. This is a great 1960s costume and is an intermediate level sewing\
    \ project. Figure [11-4](#A371637_1_En_11_Chapter.html#Fig4) shows the completed\
    \ outfit.\n\n![A371637_1_En_11_Fig4_HTML.jpg](A371637_1_En_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4. The completed mod dress, with the EL ribbon illuminated\n\nThere\
    \ are several patterns available for this style dress, like this one: [`https://betsyvintage.com/index.php?main_page=product_info&products_id=120`](https://betsyvintage.com/index.php%3Fmain_page=product_info%26products_id=120)\
    \ .\n\n### Materials and Tools\n\nTo make the dress, you will need the following:\n\
    \n- Fabric (this pattern is designed for stretch knit fabric only—recommended\
    \ fabrics include interlock, matte jersey, fabrics with spandex, cotton t-shirt\
    \ fabric).\n- Thread.\n- Straight pins/cushion.\n- Scissors.\n- Sewing machine.\n\
    - Butcher or pattern paper.\n- Tailor’s chalk or water-soluble pen.\n- Measuring\
    \ tape.\n- Two pieces of EL ribbon (also known as EL tape), each one meter long,\
    \ with a connector on each end (most EL ribbon comes with two connectors, one\
    \ on either end).\n- Two inverters/battery holders intended for use with EL ribbon/tape\
    \ and rated for at least 1 meter of EL tape, which is equivalent to 4 meters of\
    \ EL wire. (If the description mentions a length of EL wire, divide that number\
    \ by 4 to get the rating for tape.)\n- Batteries (typically AA or AAA).\n- Male-female\
    \ connectors from inverter to EL ribbon, one long enough to get from the blue\
    \ band to the upper horizontal strip. If your inverter doesn’t have multiple outputs,\
    \ you will also need a “Y” connector that can attach two strips, unless you want\
    \ to have three inverters. (Look carefully at the connectors on the EL ribbon\
    \ and battery/inverters you get, to be sure you get the right kind.)\n\nThe dress\
    \ is a sleeveless, A-line pullover garment with no zippers or buttons. That is\
    \ why it is very important to use stretch knits. You will not be able to put it\
    \ on if you use fabric with less than 35% stretch across the grain (ask the people\
    \ in the fabric store for advice, or order online with this specification).\n\n\
    I am playing with the original design and colors to make it our own. We are going\
    \ to use white EL ribbon to enhance the seams, so the lines on our dress will\
    \ be white. EL ribbon will be inside white fabric channels that divide the color\
    \ blocks on the piece.\n\nI chose red, blue, and yellow as the primary colors,\
    \ but they can be any color you like. I also used black for the back, upper right\
    \ chest, left mid-torso, and lower skirt portions. I added a dropped waist or\
    \ hip band, which enabled me to create pockets for the electronics and batteries\
    \ that would power the EL ribbon.\n\nTo make the dress washable, I made channels\
    \ out of the white fabric. These make it easy to slip the EL ribbon in and out.\n\
    \n> **Caution**  \n> EL wire and ribbon generate a high-pitched tone that upsets\
    \ some pets and people who can hear it. To lessen this, avoid powering too much\
    \ wire with one power supply. They can also generate RF interference, so don’t\
    \ use in environments where RF interference could cause an issue, such as around\
    \ medical devices or scientific hardware. For theatrical applications, test this\
    \ (and other electronics) out carefully in full dress rehearsal.\n\n### Taking\
    \ Your Measurements and Creating the Pattern\n\nThe first thing you need to do\
    \ is to measure yourself carefully. Figure [11-4](#A371637_1_En_11_Chapter.html#Fig4)\
    \ is a sketch that labels each of the measurement points you will use in the following\
    \ directions.\n\n> **Tip**  \n> If these instructions get too intimidating, you\
    \ can also buy a plain A-line black dress that fits you and add on some of these\
    \ pieces by folding and pressing under at the edges and topstitching them on.\
    \ Or, you could just add EL ribbon to another dress, but you will need to find\
    \ a place to store the inverter and batteries (or attach them to a belt).\n\n\
    #### Measurements for the Front of the Dress\n\nFirst we will take all the measurements\
    \ for the front of the dress. The next section will take care of the back. The\
    \ letters refer to the labels on Figure [11-4](#A371637_1_En_11_Chapter.html#Fig4).\n\
    \nFor the upper chest and yoke sections, measure from\n\n- The top of the shoulder\
    \ to just above the bust line (A to B).\n- The left side of the body (where side\
    \ seam would normally be on a slightly loose-fitting t-shirt) to directly under\
    \ the left clavicle (C to D).\n- The right side seam to directly under the left\
    \ clavicle (D to E).\n\nFor the mid-torso sections, measure from\n\n- Just above\
    \ the bust line to the hip (F to K).\n- The left hip at the side seam to the hipline\
    \ under the left clavicle (K to N).\n- The right side seam to meet the left side\
    \ measurement (K to N on the other side).\n\nFor the skirt sections and lower\
    \ band, measure\n\n- From the hip line to the mid-thigh (K to Q).\n- Around the\
    \ hips and add 3 inches (for seam allowance and a loose fit, at a level roughly\
    \ that labeled P in Figure [11-5](#A371637_1_En_11_Chapter.html#Fig5)).\n\n![A371637_1_En_11_Fig5_HTML.jpg](A371637_1_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5. Measurement labels for the front of the dress\n\n- The bottom of\
    \ the front and back skirt pieces to be the width you want them to be. Cut one\
    \ piece of fabric 4 inches wide by this measurement for the bottom band (the piece\
    \ marked S in Figure [11-5](#A371637_1_En_11_Chapter.html#Fig5))."
