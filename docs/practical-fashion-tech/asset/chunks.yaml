  raw: '### Materials


    Tanisa noted that with sewing projects, the commonest beginner mistake is to go
    for “really pretty, shiny fabrics,” that may not be the right quality, or fabrics
    with no body or texture, that show many mistakes. In this book we try to keep
    you away from that one by recommending fabrics for the projects. Our aim though
    is not to guide you through specific projects for their own sake but to make you
    able to go on from here. Thus, we give reasons for what we recommend so you can
    expand on it. But do not be afraid to experiment, especially on unwanted garments
    and secondhand store purchases. Those are terrific and inexpensive ways to learn
    to work with different fabrics, trims, and garments.


    When professionals get together, they talk about materials and how to put them
    together, and share experiences with glues and similar substances. That type of
    folklore is not something you can learn overnight, but take advantage of the interactions
    you do have when you buy things to try to learn more. This is one of the advantages
    of going to a brick and mortar store versus always buying online. The same applies
    to the electronics and software world too, but the equivalent of a physical store
    in that case would probably be hanging around at a hackerspace.


    Note


    One of the challenges with projects like those in this book is that you might
    be trying to integrate electronics with materials like those shown in Figure [2-5](#A371637_1_En_2_Chapter.html#Fig5).
    Crossing over styles and disciplines is some of the fun part, but be sure to think
    through possibly incompatible materials early in a project.


    ![A371637_1_En_2_Fig5_HTML.jpg](A371637_1_En_2_Fig5_HTML.jpg)


    Figure 2-5.


    The feather boa stock at costuming store Make Believe


    ### Estimating Time


    When professionals are creating a costume, the time they spend is important since
    they have a business to run. A cosplayer might spend a year making a costume for
    a convention, but obviously, if stores did that they would go out of business.


    Tip


    When you think about designing your own costume using the techniques in this book,
    we suggest that you estimate about how long you think it will take to try something
    out, and then multiply your best estimate by three. That is a typical number to
    cover the time for you to learn all the other things that you have to sort out
    first while making something. But with most of these things the only way to learn
    and make techniques your own is to try things. As we say, `#testcase`!


    ### Do Not Go It Alone


    Professional costumers often specialize in one aspect of the design and will hire
    others to do a part of it. When you are learning, team up with friends. If you
    are teaching this as a class, perhaps one of your colleagues has some experience
    that can help. But do not be afraid to experiment with a look, alone or with friends!


    ## Summary


    This chapter covers some of the philosophy behind a good costume, based on Lyn’s
    experience as well as the insights of some professionals in the field. Lyn reviews
    some of her favorite costumes, and the chapter covers a few key design points
    to keep in mind during the design of costumes for student theater productions
    in particular.


    # Part II

    The Basics


    The Basics


    In Chapters [3](#A371637_1_En_3_Chapter.html) through [7](#A371637_1_En_7_Chapter.html)
    we introduce the key skills needed for fashion tech. Chapter [3](#A371637_1_En_3_Chapter.html)
    covers hand and machine sewing basics, with many references to other resources.
    Chapter [4](#A371637_1_En_4_Chapter.html) focuses on the art of creating and using
    a sewing pattern.


    In Chapter [5](#A371637_1_En_5_Chapter.html) we switch over to the tech side and
    give an introduction to electronic components. In Chapter [6](#A371637_1_En_6_Chapter.html)
    we see how to program these devices.


    Finally, in Chapter [7](#A371637_1_En_7_Chapter.html) we bring it all together
    in a comprehensive but manageable project to create a hostess apron with a built-in
    timer that flashes a red light on the apron when the timer is counting down, and
    a green one when time is up. These chapters are enough to create “blinky” projects—garments
    that light up with some minimal ability to control the lights.


    # 3. How to Sew


    One of the challenging things about wearable tech is that you need to learn to
    do a lot of different things that would not typically be in the skill sets of
    one person. You can, of course, collaborate, as your three authors have done.
    In this book we try to give you all the key basics so that you can in principle
    do projects end to end yourself, or with your students.


    This chapter covers the basic elements of hand and machine sewing, starting you
    off with hand sewing and then moving to machine sewing. This is Lyn speaking in
    this chapter. I’ve taught sewing and costuming for many years, and so I know all
    the mistakes you are likely to make and can help you skip some of them.


    Using inexpensive fabric to learn and to perfect your skills is a good idea because
    mistakes can become quite expensive when you have to replace fabric. There have
    been times when I have had to redo a seam several times, which left visible needle
    holes in the piece. I have had to cut out a new piece from more fabric after too
    many mistakes.


    Note


    Don’t be afraid of making mistakes. It is almost inevitable when you are learning
    new things. When I began to sew, I would make the same mistake several times in
    a row, and it would make me crazy. I had to discover when I was too distracted
    to continue and take a break. Almost every time I was making something with sleeves,
    I would attach the first one correctly and then attach the other one inside out.
    I had to make sure I was completely focused before I attempted the second sleeve.
    It was a matter of discovering my foibles and how to prevent them. I still make
    mistakes, but fewer of them, and I have become better at fixing them.


    Figure [3-1](#A371637_1_En_3_Chapter.html#Fig1) shows me with my first wearable
    project—a vest with lights and sensors that we talked about back in Chapter [1](#A371637_1_En_1_Chapter.html)
    and deconstruct in detail in Chapter [10](#A371637_1_En_10_Chapter.html). Joan
    and Rich say that if you are coming at this from the electronics side and have
    never sewn, you will probably find it to be both more forgiving and requiring
    more design decisions than the technology you are used to. (Color and drape do
    not come up in circuit design very often!)


    ![A371637_1_En_3_Fig1_HTML.jpg](A371637_1_En_3_Fig1_HTML.jpg)


    Figure 3-1.


    Lyn and her first wearables project'
  trans: "\n### 材料\n\nTanisa 指出，在缝纫项目中，初学者最常见的错误是选择“非常漂亮、有光泽的面料”，但这些面料可能质量不佳，或者缺乏挺括感和纹理，容易暴露出许多瑕疵。本书会为各个项目推荐合适的面料，尽力帮你避免这一问题。不过，我们的目标并非引导你为了完成项目而机械地执行，而是让你能够举一反三，继续深入。因此，我们会解释推荐每种面料的原因，以便你在此基础上拓展。但请不要害怕尝试，尤其是在废旧衣物和二手店购买的物品上进行实验。这些是学习处理不同面料、饰边和服装的绝佳且廉价的途径。\n\
    \n专业人士聚在一起时，会讨论各种材料及其组合方式，并分享使用胶水及类似材料的经验。这类经验技巧并非一夜之间就能学会，但你可以利用购买材料时与人交流的机会来增长见识。这是实体店购物相对于网购的优势之一。同样的道理也适用于电子和软件领域，只不过，在那些领域，相当于实体店的地方可能就是混迹于创客空间了。\n\
    \n**注意**  \n像本书这类项目的一个挑战在于，你可能需要将电子元件与图 2-5 中所示的材料整合在一起。跨领域、跨学科的融合正是乐趣所在，但务必在项目初期就仔细考虑不同材料之间可能存在的兼容性问题。\n\
    \n![A371637_1_En_2_Fig5_HTML.jpg](img/A371637_1_En_2_Fig5_HTML.jpg)  \n图 2-5.\
    \ 服装道具店 Make Believe 的羽毛围巾库存\n\n### 估算时间\n\n专业人士在制作戏服时，时间至关重要，因为他们的生意需要维持。一位角色扮演者可能会花一年时间为某个展会制作一套服装，但显然，如果店铺也这么做，它们就得关门大吉了。\n\
    \n**提示**  \n当你考虑运用本书中的技巧设计自己的戏服时，我们建议你预估一下尝试完成它需要多长时间，然后将最佳预估时间乘以三。这个倍数通常涵盖了你在制作过程中必须先解决其他问题所需的学习时间。不过，对于大多数这类事情，学习和掌握技巧的唯一途径就是亲身尝试。正如我们所说的：`#testcase`（动手尝试）！\n\
    \n### 不要独自硬撑\n\n专业戏服设计师通常专注于设计的某个方面，并会聘请其他人来完成其他部分。在你学习的时候，可以和朋友们组队合作。如果你是在课堂上教授这门课，你的某位同事可能有一些可以帮上忙的经验。但无论是独自一人还是和朋友一起，都不要害怕去尝试某种造型。\n\
    \n## 本章总结\n\n本章基于 Lyn 的经验以及该领域一些专业人士的见解，介绍了优秀戏服背后的一些设计理念。Lyn 回顾了她最喜爱的一些戏服，本章还特别强调了在学生戏剧制作戏服设计过程中需要牢记的几个关键设计要点。\n\
    \n# 第二部分  \n基础篇\n\n基础篇\n\n在第 3 章到第 7 章中，我们将介绍时尚科技所需的关键技能。第 3 章涵盖手缝和机缝的基础知识，并提供了丰富的其他参考资料。第\
    \ 4 章专注于制作和使用缝纫纸样（版型）的艺术。\n\n在第 5 章中，我们将转向科技领域，介绍电子元件的基本知识。在第 6 章中，我们将学习如何对这些设备进行编程。\n\
    \n最后，在第 7 章中，我们将所有知识整合到一个全面且易于管理的项目中：制作一条带内置计时器的女式围裙。计时器倒计时时，围裙上的红灯闪烁；时间到时，绿灯亮起。掌握这几章的内容，就足以完成“闪烁”项目——那些能够发光并具备一些基本灯光控制能力的服装。\n\
    \n# 3. 如何缝纫\n\n可穿戴技术的一个挑战在于，你需要学习做许多通常不属于一个人技能范畴的不同事情。当然，你也可以像我们三位作者一样进行合作。在本书中，我们力求为你提供所有关键基础，使你原则上能够独立完成（或与你的学生一起完成）各个项目。\n\
    \n本章涵盖手缝和机缝的基本要素，先从手缝开始，再过渡到机缝。本章由 Lyn 主讲。我教授缝纫和戏服制作多年，因此知道你可能会犯的所有错误，并能帮你避免其中一部分。\n\
    \n使用廉价面料来学习和磨练技艺是个好主意，因为一旦出错需要更换面料，成本可能会很高。有些时候，我不得不反复拆改一条缝线，导致布料上留下了明显的针孔。在犯了太多错误之后，我不得不从备料中裁剪出一块新的布料。\n\
    \n**注意**  \n不要害怕犯错。在学习新事物时，犯错几乎是不可避免的。刚开始学缝纫时，我常常连续犯同样的错误，这让我抓狂。我后来发现，当我过于分心时就应该停下来休息一下。几乎每次制作带袖子的东西时，我都会正确地装上第一只袖子，然后把第二只袖子装反（里外颠倒）。我必须确保自己在尝试安装第二只袖子前完全集中注意力。这其实就是发现自己的缺点并设法预防它们的过程。我现在仍然会犯错，但少多了，而且我更善于修正错误了。\n\
    \n图 3-1 展示的是我和我的第一个可穿戴项目——一件背心，上面带有我们在第 1 章中讨论过、并在第 10 章中详细拆解的光线和传感器。Joan 和 Rich\
    \ 说，如果你是从电子领域转过来，并且从未缝过纫，你可能会发现缝纫比你习惯的技术要更宽容，同时也需要做出更多的设计决策。（颜色和垂坠感在电路设计中并不常见！）\n\
    \n![A371637_1_En_3_Fig1_HTML.jpg](img/A371637_1_En_3_Fig1_HTML.jpg)  \n图 3-1.\
    \ Lyn 和她的第一个可穿戴项目\n"
- fmt: '# Basic Hand Sewing Tools and Techniques


    Sewing has been around a long time—since the Paleolithic era (there is a nice
    history at [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)).
    Hand sewing in the machine era is a way of creating one-of-a-kind objects, and
    at the moment is the only real way for a home hobbyist to attach sewn components
    to fabric. It does not take a lot to get started.


    I teach sewing, costuming, and design in a class setting, which means when students
    have questions, or problems occur, I am there to answer and correct. If you are
    an absolute beginner at sewing of any kind, I recommend asking someone to coach
    you, or watching some online videos for specific stitches or questions you may
    have. Here are some sites to check out to get started from zero: [`www.Instructables.com/id/How-to-Sew`](http://www.Instructables.com/id/How-to-Sew)
    or [`www.wikihow.com/sew`](http://www.wikihow.com/sew) or the video at [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0).
    There are short videos of making many types of stitches on the `Instructables`
    site, such as the slip stitch that we describe in this chapter (`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch/`).


    Alternatively, just search for “How to Sew” or “How to sew by hand or machine.”
    Sometimes it may take more than one picture or description to visualize what is
    being described and explained. Figure [3-2](#A371637_1_En_3_Chapter.html#Fig2)
    shows the things that you will need to practice the various stitches described
    in this section. You will also need them to create your projects:


    ![A371637_1_En_3_Fig2_HTML.jpg](A371637_1_En_3_Fig2_HTML.jpg)


    Figure 3-2.


    Items you will need


    - Light to medium weight cotton fabric.

    - Sharp hand sewing needle (for light–medium weight fabrics).

    - Sewing shears or scissors (usually found in a fabric store).

    - All-purpose thread. There are many brands of thread to choose from. I like Gutermann’s
    polyester thread, which has a bit of stretch and doesn’t easily break. For practicing
    stitches, using a contrasting color of thread relative to your fabric makes it
    easier to see your stitches on the fabric.

    - Straight pins (to hold fabric pieces together while sewing) and a pin cushion
    (to hold the pins).

    - Measuring tape. (A cloth tape is best for measuring your body. If you don’t
    have one, use string or ribbon to wrap around what you are measuring and then
    use a ruler to measure the string.)

    - Tailor’s chalk or water-soluble marker (to mark the fabric showing notches,
    darts, or other symbols from the pattern).

    - Seam ripper (to take out stitches if you make a mistake).

    - Iron (to flatten seams you have sewn and get rid of wrinkles).


    The following items are also nice to have, but not essential:


    - Cutting mat or cardboard (to protect surfaces and keep fabric clean)

    - Needle threader

    - Magnifying glass

    - Thimble (to protect your fingers)

    - Beeswax (described later in this chapter)


    To begin your first sewing experiment, choose a small piece of light to medium
    weight all-purpose cotton fabric. There are many types of fabric. Cotton is an
    easy one to learn on and practice basic skills. You can use something like a bandanna
    or flour-sack kitchen towel, or buy some remnants from a fabric store (remnants
    are leftover bits of fabric from the ends of bolts and are usually inexpensive).


    Tip


    You can buy fabric online, but if you aren’t familiar with the various properties
    of fabric, it may be wiser to go to a bricks-and-mortar fabric store at first.
    There you can feel the fabric and ask questions about the weight or amount of
    stretch and what type of needle you might need to sew it with on a sewing machine.


    ## Threading a Needle


    Take your sharp needle and a contrasting color of thread, as noted earlier, to
    make it easier to see your stitches on the fabric. Later on, when you are creating
    a garment, you usually will want the thread to match the fabric. However, there
    are times you may want to use contrasting thread as a design accent.


    Hold the needle with the eye facing you. Cut a small bit from the end of the thread
    to make sure it isn’t frayed, poke it through the eye until you can grab the end
    from the back, and pull about 3–4 inches through. Alternatively, you can use a
    needle threader (Figure [3-3](#A371637_1_En_3_Chapter.html#Fig3)). Hold onto the
    eye of the needle and the thread, pull about 12–18 inches of thread off the spool,
    and cut the end.


    ![A371637_1_En_3_Fig3_HTML.jpg](A371637_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    Using a needle threader


    Caution


    You will rapidly discover that the ends of the thread tend to fray. Steel conductive
    thread is particularly hard to deal with this way. Use a bit of beeswax on the
    end of the thread to keep the ends of the thread from fraying and to make threading
    needles easier. For cotton thread, you can also moisten the end of the thread
    with your mouth, if that doesn’t seem too gross. Don’t do that with conductive
    thread—both because it won’t work and because the ends are a bit sharp.


    ## Knotting the Thread


    Make sure you hold onto the eye of the needle and the thread or push it into a
    pincushion (it is easy to pull the thread out of the needle, and you have to rethread
    it, which becomes tedious). Using the longest side of thread, hold the end between
    your index finger and thumb, wrap around your finger once, and push the loop off
    your finger while holding securely onto the end and twisting between your thumb
    and forefinger (Figure [3-4](#A371637_1_En_3_Chapter.html#Fig4)). With any luck,
    you will have a knot.


    ![A371637_1_En_3_Fig4_HTML.jpg](A371637_1_En_3_Fig4_HTML.jpg)


    Figure 3-4.


    Making a knot


    Sometimes it is best to repeat this process for a slightly larger and more secure
    knot. If you have a knot that is too small for the weave of the fabric, it will
    pull through and you must retie the knot and begin again—sometimes again and again.
    Sewing can try your patience when you are a newbie, but there are ways to correct
    mistakes and carry on. Deep breathing and a brief walk around the room, house,
    or block may help.


    Tip


    If the fabric has a very coarse weave, it may be a good idea to take a small stitch,
    pull it almost all the way through, and then tie the thread together into a knot.
    We will be using conductive thread in other projects in this book. Conductive
    thread is made from thin, braided wire, which makes it difficult to create a tight
    knot. After knotting conductive thread (but not regular thread), I use a drop
    of clear nail polish to keep the knot tied.


    Distinguishing Between the Right and Wrong Side


    The top or most colorful side of the fabric is called the right side. The underneath
    or less vibrant side is called the wrong side. When using fabrics with a nap (fabric
    which has a different appearance depending on which way it is rubbed), such as
    corduroy, velvet, and velour, the plush side is the right side. Sweatshirt fabric
    uses the flat side, not the fuzzy side, as the right side.


    ## Using Different Stitches


    This section talks about the different ways you can stitch something together.
    Stitches are your sewing tools, and it helps to have a lot of them at your disposal.


    Tip


    Always hold onto the needle and thread together at the base of the needle to avoid
    pulling the thread out of the eye. This will help you avoid constant rethreading.'
