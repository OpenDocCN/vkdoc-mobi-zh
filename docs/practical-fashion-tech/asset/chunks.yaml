    \nBabbage’s Analytical Engine: [`https://en.wikipedia.org/wiki/Analytical_Engine`](https://en.wikipedia.org/wiki/Analytical_Engine)\n\
    \nRenaissance Faires: [`www.renfaire.com`](http://www.renfaire.com)\n\n### Chapter\
    \ [2](#A371637_1_En_2_Chapter.html) . Practical Costume Design\n\nMake Believe\
    \ costume shop: [`www.makebelieveinccostumes.com`](http://www.makebelieveinccostumes.com)\n\
    \nBurbank Makerspace: [`www.burbankmakerspace.com`](http://www.burbankmakerspace.com)\n\
    \n### Chapter [3](#A371637_1_En_3_Chapter.html) . How to Sew\n\nHistory of sewing:\
    \ [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)\n\
    \nHow to sew: [`www.instructables.com/id/How-to-Sew`](http://www.instructables.com/id/How-to-Sew)\
    \ `./` and [`www.wikihow.com/sew`](http://www.wikihow.com/sew)\n\nHand sewing\
    \ basics: [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0)\n\
    \nHand Sewing: Basic Slip Stitch (Blind Stitch) on Instructables: [`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch`](http://www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch)\
    \ /\n\n### Chapter [4](#A371637_1_En_4_Chapter.html) . Making and Using Sewing\
    \ Patterns\n\nSewing pattern companies: [`www.mccall.com`](http://www.mccall.com)\
    \ and [`www.sewingpatterns.com`](http://www.sewingpatterns.com)\n\nCrafts: [`www.craftsy.com`](http://www.craftsy.com)\n\
    \nOnline craft marketplace: [`www.etsy.com`](http://www.etsy.com)\n\nJoann Fabrics:\
    \ [`www.joann.com`](http://www.joann.com)\n\nHow-to-sew sites: [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com)\
    \ and [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)\n\
