  trans: '

    # 第一部分


    宏观视角


    前两章为打造优秀的戏服（或其他服装）设计提供了一些背景知识。第 1 章介绍了时尚科技，并简要说明了本书其余部分的编排方式。第 2 章则聚焦于优秀戏服的构成要素，并提出了在服装设计中值得思考的一些方面。


    # 1. 时尚科技


    *电子补充材料* 本章的在线版本（doi:[10.1007/978-1-4842-1662-0_1](http://dx.doi.org/10.1007/978-1-4842-1662-0_1)）包含仅供授权用户使用的补充材料。


    时尚科技是一个跨学科领域，它将传统时尚与纺织品同现代电子技术、软件及其他技术相融合。在本书中，我们认为时尚科技指的是那些包含电子元件的互动式服装或配饰，或是利用
    3D 打印等数字制造技术创作的作品。得益于电子制造领域的进步，计算机、传感器以及可嵌入日常物品的发光元件的成本得以降低，这类技术直到最近才在消费级层面普及。本章将介绍时尚科技，并讲述如何利用本书开启这一新兴领域的实践之旅。


    ## 时尚科技简史


    自古以来，制作衣物以抵御恶劣天气一直是技术发展的灵感源泉。工具从用于在皮革上打孔的骨锥，发展到用于纺纱的纺锤，再到能够以工业规模生产大量布料的织机。图 1-1
    展示了一张 1875 年的立体照片，拍摄的是阿莫斯基格（新罕布什尔州）方格花布厂的织布车间。（这张立体图像在 [`stereo.nypl.org/view/14480`](http://stereo.nypl.org/view/14480)
    上还有动画版本。）


    ![A371637_1_En_1_Fig1_HTML.jpg](img/A371637_1_En_1_Fig1_HTML.jpg)


    **图 1-1.** 约 1875 年的织布场景。图片来自纽约公共图书馆（ [`digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99`](http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99)
    ）


    对制作精美图案织物的渴望，促成了 1801 年提花织机的诞生。织布工制作了打有孔的卡片，这些卡片通过一个精巧的轻张力弹簧与金属线系统，控制着织机所织出的图案。这使得诸如锦缎等极为复杂的图案得以自动生成。


    然而，用于窗帘和婚纱的华丽织物并非故事的全部。英国数学家兼发明家查尔斯·巴贝奇看到了提花织机的穿孔卡片，并思考是否可以用类似的系统来制造一种更通用的、用于解决数学问题的计算器，他称之为分析机。


    巴贝奇于 1837 年首次描述了这台机器；但这台完整的机器实际上从未被制造出来（ [`en.wikipedia.org/wiki/Analytical_Engine`](https://en.wikipedia.org/wiki/Analytical_Engine)
    ）。尽管如此，巴贝奇仍被广泛认为是通用计算机的发明者，而其穿孔卡片的后续形式一直使用到 20 世纪 70 年代。因此，计算机诞生于维多利亚时代的时尚科技之中！


    **提示** 如果你对纺织技术的历史感兴趣，可以访问 [www.cs.arizona.edu/patterns/weaving/index.html](http://www.cs.arizona.edu/patterns/weaving/index.html)
    这个网站，那里有一个令人惊叹的历史档案库，包含许多插图和原始文献。更具体地说，如果你想要下载一本关于如何为提花织机制作卡片的维多利亚时代书籍，E. A. 波塞尔特的《提花织机分析与解读》（Posselt,
    1893）现已进入公共领域，可从 Hathi Trust 数字图书馆获取，网址为 [`hdl.handle.net/2027/gri.ark:/13960/t26b0d33d`](http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d)。


    20 世纪 50 年代末集成电路的问世及其快速发展，现已带来价格低廉、大小与硬币相当的计算机。已故的戈登·摩尔在 1965 年预测，基于技术进步，计算机芯片的性能大约每两年翻一番；这条后来被称为“摩尔定律”的预测（迄今为止）惊人地准确。这意味着，20
    世纪 80 年代初期的超级计算机，其性能已被 2016 年那些仅几英寸见方、售价 5 美元的单板计算机所超越。


    其他数字电子产品也紧随其后，为智能手机、相机及其他设备开发的微型处理器和传感器，如今使得将相当于 20 世纪 80 年代需要专人维护的处理能力，不显眼地集成到一顶帽子或一条围裙中成为可能。从提花织机开始，这一发展经历了一个循环，如今将电路编织进衣物中已成为现实。（我们将在第
    13 章讨论谷歌的 Project Jacquard。）


    能够接触到廉价、易编程的电子产品还带来了另一个副作用：基于机器人的消费产品兴起，例如低成本消费级 3D 打印机和电脑化的家用缝纫机。3D 打印机反过来使得快速、低成本地制作实体物体原型变得容易，并正引领着更多创新。功能丰富的家用缝纫机能够完成复杂的项目，而这些项目在过去对于业余爱好者来说可能过于繁重。


    总而言之，你可以利用一系列令人惊叹的技术来制作酷炫的项目。在本书中，我们聚焦于将数字电子技术及相关技术（例如 3D 打印）应用于时尚领域，例如制作戏服和其他互动式可穿戴作品。

