  trans: '

    ### 穿戴者的环境


    如第 2 章所述，你还需要深入思考穿戴者将要做什么，以及他们在穿着服装时所处的环境。例如，本书中的项目都设计为在干燥的室内环境中穿着。尽管其中有一个围裙项目，但我们设想它更多是用于在派对上端菜时给朋友留下深刻印象，而不是在烹饪或手湿时使用。


    ### 原型制作与测试


    在规划项目时，要思考在项目开发中的哪些环节可以拼凑出迷你原型。对于缝纫部分，你可以制作一个白坯样衣——用非常便宜的布料制作的项目版本，这样即使需要拆线和反复重缝也不会心疼。在制作电子部分时，你最初可以使用鳄鱼夹（用于临时连接电路的夹子）来搭建一个最终要用导电线缝制的电路。而在编程时，则应当考虑如何创建一些简单的阶梯式项目，逐步构建最终功能。随着本书的深入，我们会介绍这些技巧。当你构思想要实现的目标时，考虑如何让部分功能可以独立测试，这样就不会最终陷入一个可能存在多重交互问题的复杂项目。


    但最重要的是，先确定你想要服装是什么样子，然后再添加技术或动画元素。接下来，林将分享她的一些最佳创作经验。


    ### 林的服装故事


    在我参与过的每一部作品中，似乎总有一两套服装很难做到位。要么概念过于抽象难以理解或完善，要么试穿过程麻烦重重，要么遭遇各种其他问题。为《康尼岛的圣诞节》制作火鸡服装时就遇到了这种情况。


    这部作品中的一些服装尤其具有挑战性，因为故事背景设定在 20 世纪 30 年代的布朗克斯区。剧中还有一出戏中戏，其中的服装应该看起来像是大萧条时期纽约的孩子们和他们的父母手工制作的。我想要一种俗气的效果，特别是对于出现在感恩节庆典场景中的那只火鸡。我们找到的大多数服装都过于现代化了。那个时代的色彩不应如此鲜艳和霓虹，我希望面料的外观能具有真实感。


    在与导演进行大量头脑风暴后，我在网上购买了一套火鸡服装。收到后，我拿起剪刀就动手了。我剪掉了袖子，并修剪了上衣的大部分前片和后片。这样我就可以让女演员穿上肩带或背带。服装的下半身是填充的，这部分我想保留下来。我没有使用腿部套，因为她要把它穿在裙子外面。


    当我对整体服装的造型感到满意后，我开始用卷曲的彩色纸条覆盖下半部分来表现羽毛。我使用柔和的棕色、橙色和黄色纸条，将它们绕在铅笔上卷曲，然后成排地粘在火鸡身体上。服装的尾部形状很漂亮，所以我只是用彩色纸羽毛覆盖了它，这是我最喜欢的部分（图
    1-5）。


    ![A371637_1_En_1_Fig5_HTML.jpg](img/A371637_1_En_1_Fig5_HTML.jpg)


    **图 1-5.** 彩色纸火鸡尾部特写


    卷曲和粘贴纸羽毛非常耗时且有点繁琐，但我对最终的效果很满意。至于肉垂和喙，我剪了两张相应形状的彩色纸，用双面胶将它们固定在女演员的脸上。


    我还将卷曲的彩色纸羽毛用于天使加百列的翅膀。从硬纸板上裁剪出翅膀形状，覆盖上白色羽毛，绑在演员背上，并确保他侧身通过门口，这是这套服装成功且迷人的解决方案。大多数时候我都是用布料来制作和修改服装，所以这部作品让我耳目一新，回归了本源。


    就探索疯狂古怪想法的自由度而言，《绿野仙踪》的制作可能是我最喜欢的作品。导演、另一位服装师和我花了很多时间琢磨一些与常规版本略有不同的角色方案。我们让邪恶女巫穿着滑雪靴站在一个由她的飞猴拉动的滚动平台上。这样她可以不用走路就移动，并以一种非常威胁的方式前倾。为了让她在舞台上熔化，我们在她的女巫裙子下面加了一条裙撑，她可以慢慢扭动，蹲得非常低，缩成一团，留下中间凹陷的裙撑站立着。


    飞猴们穿着染成棕色的保暖内衣，上面缝着毛茸茸的斑块和尾巴。铁皮人有金属烟囱管做的胳膊和腿，胆小狮的鬃毛是用拖把头做的。芒奇金人是最有趣的创作。我在一家廉价商店找到了一些非常难看且色彩鲜艳的扎染连体衣。然后我使用了亮色的普通舞蹈紧身裤，在里面塞满棉絮，为每位演员将两对扭在一起，固定在他们的头上。当房子降落在奥兹国时，藏起来的芒奇金人看起来就像一片奇奇怪怪的根茎。


    经过多年的服装制作经验，我发现通常在制作初期看似失败的作品，到了首演之夜反而会成为最好的——至少是评论最多的。在任何演出中，我最喜欢的时刻就是与制作团队在初期进行头脑风暴、探索和实验。发散思维，收集新意见和不同观点，这令人无比振奋。


    **注**


    阅读林的故事时，有几件事可能会引起你的注意。其一，听起来很有趣。好的设计不能太严肃。要充满玩心，尝试一些不协调的东西。这不是我们在书中能教会你的技能，但我们会在书中不时穿插一些像林这样的侧边栏，为你提供成功实践的范例。第
    2 章会深入探讨什么构成一件好的服装，并对类似林刚刚分享的那些经验进行解构。


    ## 总结


    在本章中，我们定义了时尚科技，并简要介绍了构成这一跨学科领域的交叉领域的历史。接着，我们介绍了可能应用这些技术的不同服装制作场景。我们讨论了如何使用本书，并阐述了我们的设计理念。我们还列举了几个关于优秀服装的案例研究，这些服装明显是低技术含量的，目的是为了说明：好的服装本身就会大放异彩，而设计是一个好项目中最核心的要素。在下一章中，我们将更广泛地讨论什么构成一件好的服装。

    '
- fmt: '# 2. Practical Costume Design


    In this book we teach you a bit about a lot of things: sewing, pattern-making,
    electronics, and writing computer code. For many readers, though, the point will
    be to make a costume to wear. People have always dressed up and masqueraded, but
    recently cosplay has been popular. Cosplay, which has spawned many conventions
    for devotees, can be loosely defined as dressing up (sometimes in incredible detail)
    as your favorite character from a movie, video game, or other story. Or cosplayers
    might start with a style (like steampunk, a mashup of Victorian clothing and quasi-period
    mechanical decorations) and create something from there.


    The skills are important, but it is also just as critical to think about what
    the final project is for. If you are using this book as the basis for a class
    to teach these skills, then perhaps each project can be a small exercise building
    up to a final project to wear or maybe to hang on the wall.


    If, however, you are reading this book because you want to create costumes for
    yourself or perhaps your local theater group, then you need to think a bit about
    the design issues about what makes a good costume. Lyn has been creating costumes
    for many years, and the next section is a distillation of her experiences. She
    and Joan also chatted with past and current owners of a professional costume-making
    and rental store in Santa Monica, California, to get their take on what makes
    a good costume.


    ## What Is a Costume?


    Costumes not only play a very important role in the performing arts, but they
    are also significant in our daily lives. What you choose to wear and when can
    inform your family and friends with many details about your mood or where you
    are going. These choices define how we present ourselves to the world. Whether
    it is haute couture, workout attire, or quirky combinations, our clothes make
    a statement about who we are or want to be, and how we want the world to perceive
    us. A good costume can inform an audience about the nature of a character before
    a word has been spoken.


    ### The Power of Costume Design


    Costumes can grab an audience and engage it in the story in a subtle way, or distract
    the audience from the plot of the story. Cosplay costumes are often very specific
    to certain characters, but can also be created to introduce new characters or
    ideas.


    Characters, social status, and time periods help to define what a costume should
    look like. Is the costume for a man, woman, animal, alien, or some combination
    of these? What type of character is being created? How is this character different
    or the same as others? How old is this being, and what time period do they live
    in? How much physical activity must be performed by this character in this costume?
    Is the costume being used realistically in a play or story, or is it used in an
    exaggerated or stylized performance?


    Costumers and designers must research how people of all classes and genders have
    dressed throughout history. Historically, a person’s sex has been clearly distinguished
    by their clothing. But in today’s world, all bets are off. Men and women choose
    many of the same items, colors, and styles. Almost everything is acceptable and
    experimented with.


    A costume can set a character in a historical time period, certain location, and
    specific country. Most time periods have very definite looks, styles, and shapes,
    and a costume may also show the climate or the season the character is inhabiting.


    How a character is dressed may reveal the nature of a character or how this character
    wants to be seen, which may be opposite his true nature. A villainous character
    might attempt to appear simple and honest. Or perhaps a meek, shy type may pretend
    to be cool and hip. Consider Odette and Odile in Swan Lake—the good and evil swan,
    typically played by the same person, but identified by the switch from white to
    black tutu. You can also think about the white or black cowboy hat in classic
    Westerns used as shorthand for “the good guy” and “the bad guy.” And, of course,
    there is Darth Vader versus Luke Skywalker.


    ### Lyn’s Tips for Student Theatrical Costuming


    If you are in a school theater department, you will also likely have constraints
    of time and cost and may have one person making, adding to, or altering many pieces
    (as I am doing in Figure [2-1](#A371637_1_En_2_Chapter.html#Fig1)). Regardless
    of the resources you have to make a costume, the key part is to start with a clear
    idea of what the costume is trying to convey.


    ![A371637_1_En_2_Fig1_HTML.jpg](A371637_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Lyn working on school musical costumes


    I have often relied on donations from parents and lots of shopping trips to secondhand
    stores to create entire costume plots for a production. It is fairly easy and
    a lot of fun to add trim or other things to a dress or robe, and invent an entirely
    different look. The piece I am working on in Figure [2-1](#A371637_1_En_2_Chapter.html#Fig1)
    is a secondhand velour robe. I am sewing a gold garland on as trim for a Father
    Christmas character in A Coney Island Christmas.


    Some of my best costumes have been garments that I had to deconstruct and resurrect
    as something new. I used a 1950s-era pink prom dress and added lots of lace and
    frills for Glinda the Good Witch in a production of The Wizard of Oz. For the
    Wicked Witch of the West, I used a black taffeta cocktail dress from the 1960s,
    removed the glamorous parts, and added rubber snakes, spiders, and other evil
    things. I think these two are among my favorite creations. Unfortunately, they
    were loaned out a few times and never found their way home . . . heavy sigh.


    It is possible to costume an entire production on a small budget. It just takes
    some planning and work, but it can be quite spectacular and rewarding, especially
    when students help to brainstorm and cut and sew.


    It is also a lot of fun to build a costume from the ground up. A few of my favorites
    were two polka dotted 1960s Twiggy-style dresses for a production of The Odd Couple,
    the costumes for Lola in Damn Yankees, several 1940s tap-pant sets for Anything
    Goes, and a turkey for A Coney Island Christmas.


    Take a garment and turn it into something entirely different from its original
    incarnation. Give your brain the freedom to explore. Be bold and brave in your
    choices. Sometimes it fails, but other times it is spectacular. I have learned
    a lot from every piece altered or created, especially the ones that had problems
    and turned out to be less than fabulous.'
