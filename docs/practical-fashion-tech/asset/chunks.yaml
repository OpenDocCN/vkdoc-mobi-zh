    #### 注释


    程序通常并不像小说那样仅供阅读，尽管 Rich 和其他资深程序员坚称他们的代码是“自我文档化”的。为了让读者理解代码逻辑，人们会插入注释供后续阅读。代码编译时（即从人类可读形式转换为计算机硬件可读形式），计算机会忽略这些注释。单行注释以双斜杠开头。


    ```

    // 这是一个注释。

    ```


    惯例是在程序顶部添加一段注释块，说明程序功能、作者、编写时间以及复制限制。注释也便于为自己留下关于某些操作原因的笔记。你可以通过 `//` 暂时“注释掉”部分代码——在需要编译器忽略的每一行开头添加
    `//`。此外，还可以使用多行注释，以 `/*` 开头并以 `*/` 结尾，如下所示：


    ```

    /* 这是一个注释

    内容内容

    在此结束 */

    ```


    编译器会忽略 `/*` 和 `*/` 之间的所有内容，因此 Arduino 或其他处理器不会读取它们。


    #### 变量与循环


    程序包含变量——Joan 喜欢将它们视为存储物品的盒子。在 C++ 中，变量需要指定类型——它是整数、浮点数、字符还是其他类型？你可以在 [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage)
    了解 Arduino 支持的变量类型。正如本章前面所述，变量名区分大小写，`APPLE`、`apple` 和 `Apple` 是三个不同的变量。为变量指定类型的方法如下：


    ```

    int apples = 15;

    ```


    这段代码创建了整数类型的变量 `apples`，并将其初始值设为 15。注意，只需定义变量类型一次，在整个代码中该类型即固定。你也可以仅指定类型：


    ```

    int apples;

    ```


    或者将类型嵌入更复杂的代码中：


    ```

    for (int apples = 0; apples < 10; apples++) {

    // 在此处插入你想运行十次的代码

    } // 结束 apples 循环

    ```


    这个代码段是要执行十次的代码片段。首次运行时，`apples` 等于 0。每次执行循环内的代码后，变量 `apples` 增加 1（`apples++` 即实现此功能）。程序会将
    `apples` 设为 0，执行花括号内的代码，增加 `apples`，然后检查 `apples` 是否小于 10。此过程会重复直到条件不成立，之后继续执行循环后的代码。这里的变量
    `apples` 被称为循环计数器——用于跟踪循环内操作执行次数的变量。


    变量还具有作用域。变量作用域指代码中能识别该变量的范围。如果在 `setup()` 和 `loop()` 函数之前（即不在它们的花括号内）的代码顶部定义变量，这些变量将成为全局变量，对整个程序可见。如果在函数开始和结束的花括号内定义变量，则只有该函数能识别该变量。


    全局变量通常可能有些危险，因为如果在不同函数间切换并假设某个变量的值时，可能会丢失该变量当前赋值的跟踪。但像哪个引脚是输入、哪个是输出等通常被设为全局变量。否则，变量的作用域仅限于定义它的函数内。如果你在
    `setup()` 中定义了 `int apples;`，然后在 `loop()` 中使用它，就会报错，如图 6-3 所示。


    ![A371637_1_En_6_Fig3_HTML.jpg](img/A371637_1_En_6_Fig3_HTML.jpg)


    图 6-3. 作用域编译器错误


    #### 保留字


    Arduino 定义了一些实用的保留字。`HIGH`、`LOW`、`true` 和 `false` 均已定义。完整列表参见 [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage)。此外，还有一些
    Arduino 特有的约定，例如引脚名称（数字以及 A0 到 A5）始终被视为 `int` 变量，即使它们包含字母。Arduino 草图会自动将这些特殊值转换为整数。


    #### 函数


    函数是一组需要重复执行的命令，或者为了隔离这些命令以便在某些情况下替换为其他内容。你可以通过预定义的方式向函数传递值。内置函数 `setup()` 和 `loop()`
    是“void”函数——它们执行时不会向代码返回任何值。


    函数调用如下所示：


    ```

    digitalWrite(pin, value);

    ```


    这个函数调用表示使用为函数 `digitalWrite` 定义的命令，并传入两个输入参数 `pin` 和 `value`。函数输入的作用通常会在注释中说明。对于
    Arduino 内置函数，其定义见本章前面引用的 Arduino 标准页面。你也可以创建自己的函数。当需要重复执行某项操作但使用不同值时（例如，旋转机械臂到不同的角度），这非常实用。


    #### 赋值、比较与基础数学


    计算机程序中的某些约定与代数课不同。在编程中，等号是赋值运算符——等号两侧的内容并不相同。例如，以下代码表示“取变量 `a` 的当前值，加 1，然后覆盖 `a`
    的当前值以存储结果”：


    ```

    a = a + 1;

    ```


    或者等价地：


    ```

    a = a++;

    ```


    或者简写为：


    ```

    a++;

    ```


    以下是检查 `a` 是否等于 1 的比较：


    ```

    a == 1

    ```


    以下是检查 `a` 是否不等于 1 的比较：


    ```

    a != 1

    ```


    其他常见比较包括小于（`<`）、小于等于（`<=`）、大于（`>`）和大于等于（`>=`）。


    在编程语言中，乘法通常用星号表示，除法用斜杠表示，如下例所示：`a = b * c; a = b / c;` 对于更复杂的数学函数，你可能需要在代码中添加库。请参阅本章后面关于库的章节。


    #### If、Else 与 While


    你可以让程序在满足特定条件时执行一个操作，否则执行另一个操作。以下代码段检查变量 `darkness` 是否大于 3。如果是，代码调用函数 `light()`
    执行某些操作；否则，将变量 `alternate` 设为 2：


    ```

    darkness = 5;

    if (darkness > 3) {

    light();

    } // 结束 darkness 条件判断

    else alternate = 2;

    ```


    你也可以让循环在条件成立时持续执行。以下代码段在 `darkness` 大于等于 3 时，持续调用函数 `light()` 和 `spin()`。注意，要使此循环结束，代码中需要在某处将变量
    `darkness` 设为小于 3：


    ```

    while (darkness >= 3) { // darkness 大于等于 3

    light();

    spin();

    }

    ```

