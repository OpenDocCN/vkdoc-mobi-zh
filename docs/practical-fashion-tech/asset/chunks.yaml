- fmt: "### How It Turned Out\n\nAs with many grand ideas, the project did not entirely\
    \ work out as planned. The original design used an accelerometer to detect a grand\
    \ gesture that would start and reset all of the components, but unfortunately\
    \ we ran out of time to implement this. We lowered our expectations to having\
    \ the wearer push the reset button on the `Flora`. In the end we wound up just\
    \ showing the dress as a demonstration on a dress form (as you can see in Figures\
    \ [10-2](#A371637_1_En_10_Chapter.html#Fig2) and [10-3](#A371637_1_En_10_Chapter.html#Fig3)),\
    \ so this was less of an issue than it would have been in the original theatrical\
    \ concept.\n\nThe fans did not provide enough wind to billow the skirt from inside\
    \ their pockets, so we removed them before the final presentation. In hindsight,\
    \ we should have run a few tests with more fabric, rather than a brief test with\
    \ one layer of the cloth.\n\nThe servo on the left shoulder only wanted to work\
    \ about half of the time because of some electrical issue that popped up at the\
    \ last minute, and we did not have time to debug it. But the right-side servo\
    \ and the `NeoPixels` were terrific.\n\n> **Note**  \n> We have not provided the\
    \ `Flora` sketch for the dress in this book because the project was never quite\
    \ completed or debugged. We have referenced (simpler!) `NeoPixel` and servo examples\
    \ in Chapters [6](#A371637_1_En_6_Chapter.html) and [8](#A371637_1_En_8_Chapter.html),\
    \ respectively. We provided this example to show the pluses and minuses of trying\
    \ something “too hard” the first time out, and as a bit of a cautionary tale.\n\
    \nIn the rest of this chapter we will revisit the decisions we made in this project,\
    \ plus talk about a lot of other “system design” issues that did not come up in\
    \ this project but that you will encounter.\n\n## What We Learned\n\nThe first\
    \ thing we took away from this experience is that it is essential to make a sort\
    \ of map of your garment before beginning—at a minimum, create a butcher paper\
    \ pattern and sketch out what goes where. (We say garment in this chapter, though\
    \ you may be making anything from a stuffed toy penguin to a hat to an evening\
    \ gown.) This pattern will allow you to figure out where to hide components, determine\
    \ the path to run the wires, and make the most effective and efficient connections.\
    \ It is a way to eliminate some of the mistakes before you put the piece together.\n\
    \n> **Tip**  \n> To lay out a simple sewable circuit, you can use the `Fritzing`\
    \ software package (Chapter [5](#A371637_1_En_5_Chapter.html)) to create a full-scale\
    \ drawing of the circuit layout. You can then either hold the drawing next to\
    \ what you are sewing or use it as a guide to draw with tailor’s chalk on the\
    \ garment.\n\nCreating some sort of minimalist model will allow you to make mistakes,\
    \ correct them, and discover the best places to hide batteries and the most efficient\
    \ and comfortable paths for running wires before you create the final project.\
    \ I did not do this for the dress project, and consequently had to redo many of\
    \ my first attempts.\n\n> **Tip**  \n> When you sew together your circuit, you\
    \ might want to sew some of the conductive thread runs or lay wire inside the\
    \ garment, which means you may be using the pattern in the mirror image of the\
    \ way you drew it. It is very easy to sew parts of the circuit backward that way,\
    \ so be sure you are projecting the pattern onto the fabric maintaining things\
    \ the right way round, where that matters (like signal and power into a `NeoPixel`\
    \ - Chapter [5](#A371637_1_En_5_Chapter.html)).\n\n### Materials Considerations\n\
    \nNext, we realized that the type of fabric and notions will help make your project\
    \ successful (or not). For the Haunted Dress, I used chiffon and taffeta—in retrospect,\
    \ not the best fabric choices. Chiffon can be difficult to sew because it is a\
    \ fine fabric and frays easily, and taffeta is a stiff fabric that shows every\
    \ stitch you have to take out as a visible hole. It also frays easily. I had to\
    \ alter the circuit several times, which caused fraying on the chiffon and visible\
    \ holes from removed seams on the taffeta. I learned a lot, but would have had\
    \ a better end product if I had created a muslin prototype first, as noted earlier.\n\
    \nGood fabrics to use include lightweight cotton (particularly for beginners)\
    \ or t-shirt fabric (a bit harder, since it is stretchy). It depends a bit on\
    \ what you are making, of course. Nylon or any kind of poly-cotton-rayon mix is\
    \ good. Avoid very stretchy materials because they can be challenging for a beginner\
    \ to sew.\n\nHook and loop fastener tape (that is, `Velcro`) is sewable and will\
    \ not cause shorts in your circuits. Snaps are easy to use, but make sure they\
    \ don’t interfere with any conductive thread, fabric, or soldered bits. Creating\
    \ channels for wire runs out of lining fabric or lightweight cotton is a good\
    \ idea, but they should open up easily to allow for access if there is a problem\
    \ or short circuit. If you line the garment, you can attach the channel to the\
    \ lining so it is not visible from the outside, or hand stitch the channel fabric\
    \ in strategic places like seams or hems. A hot glue gun is handy for insulating\
    \ any soldered joints. Just a drop will help protect the connection.\n\n> **Tip**\
    \  \n> A pin or magnetic closure hand sewn onto fabric or glued onto the back\
    \ of a 3D-printed object makes a great fashion accessory. You can add servos for\
    \ movement or `NeoPixels` to make it light up. Voila!\n\n### Hiding and Supporting\
    \ Batteries and Mechanisms\n\nBelts, shoulder pads, epaulettes, bustles, pockets,\
    \ and facings are handy ways to hide batteries, connectors, switches, controllers,\
    \ and other parts you do not want visible. You can also incorporate these into\
    \ your design with appliques or embroidery, or let them appear just as they are\
    \ if they are interesting and/or you like the look.\n\n> **Caution**  \n> It is\
    \ important to remember to create a secure and protected place for the batteries\
    \ and controllers that also allows for easy access for recharging and/or replacing.\
    \ See the discussions of battery issues in Chapter [5](#A371637_1_En_5_Chapter.html).\n\
    \nThe sidebar about the chiffon sleeves described how we supported batteries in\
    \ shoulder pads. These batteries are a bit heavy, so putting them in the shoulders\
    \ helped to give them some support.\n\n> **Tip**  \n> If something has to actually\
    \ move, it will probably take a fair amount of power, which may mean hiding a\
    \ lot of mechanisms and batteries. You may be able to avoid having a costume part\
    \ move with clever attachments to another body part (like something attached to\
    \ a shoe that moves as the person walks). In some cases, this might be simpler\
    \ than trying to be high tech.\n\n### Conductive Thread, Wires, and Cables\n\n\
    Conductive thread is a little harder to work with than regular sewing thread because\
    \ it is stiffer and thicker. It is made from wire, after all. It likes to kink\
    \ up and twist itself around, so use a fairly short length when you sew. Use just\
    \ enough to complete each run separately and then rethread your needle. It requires\
    \ patience and attention to each stitch, but you will get the hang of it fairly\
    \ quickly.\n\nThe stitches need to be tight enough to create a secure connection\
    \ without distorting the fabric and/or garment. The stitches you make with conductive\
    \ thread can be longer than you might make with regular sewing thread, but they\
    \ should not be too long or they will become too loose for an adequate connection.\n\
    \nAs you are sewing a run of conductive thread, keep checking the previous stitches,\
    \ making them taut without pulling the fabric out of shape. After you have finished\
    \ the project and it is working, move the areas with conductive thread a bit to\
    \ make sure the connection is strong enough to allow for the movement. If it works\
    \ intermittently with the movement, you may need to pull some of the stitches\
    \ a bit tighter.\n\nThe bigger issues come into play because you are wiring up\
    \ a circuit, which has more exacting rules to follow than normal sewing of a garment\
    \ does. This section suggests some good practices to follow."
  raw: '### How It Turned Out


    As with many grand ideas, the project did not entirely work out as planned. The
    original design used an accelerometer to detect a grand gesture that would start
    and reset all of the components, but unfortunately we ran out of time to implement
    this. We lowered our expectations to having the wearer push the reset button on
    the Flora. In the end we wound up just showing the dress as a demonstration on
    a dress form (as you can see in Figures [10-2](#A371637_1_En_10_Chapter.html#Fig2)
    and [10-3](#A371637_1_En_10_Chapter.html#Fig3)), so this was less of an issue
    than it would have been in the original theatrical concept.


    The fans did not provide enough wind to billow the skirt from inside their pockets,
    so we removed them before the final presentation. In hindsight, we should have
    run a few tests with more fabric, rather than a brief test with one layer of the
    cloth.


    The servo on the left shoulder only wanted to work about half of the time because
    of some electrical issue that popped up at the last minute, and we did not have
    time to debug it. But the right-side servo and the NeoPixels were terrific.


    Note


    We have not provided the Flora sketch for the dress in this book because the project
    was never quite completed or debugged. We have referenced (simpler!) NeoPixel
    and servo examples in Chapters [6](#A371637_1_En_6_Chapter.html) and [8](#A371637_1_En_8_Chapter.html),
    respectively. We provided this example to show the pluses and minuses of trying
    something “too hard” the first time out, and as a bit of a cautionary tale.


    In the rest of this chapter we will revisit the decisions we made in this project,
    plus talk about a lot of other “system design” issues that did not come up in
    this project but that you will encounter.


    ## What We Learned


    The first thing we took away from this experience is that it is essential to make
    a sort of map of your garment before beginning—at a minimum, create a butcher
    paper pattern and sketch out what goes where. (We say garment in this chapter,
    though you may be making anything from a stuffed toy penguin to a hat to an evening
    gown.) This pattern will allow you to figure out where to hide components, determine
    the path to run the wires, and make the most effective and efficient connections.
    It is a way to eliminate some of the mistakes before you put the piece together.


    Tip


    To lay out a simple sewable circuit, you can use the Fritzing software package
    (Chapter [5](#A371637_1_En_5_Chapter.html)) to create a full-scale drawing of
    the circuit layout. You can then either hold the drawing next to what you are
    sewing or use it as a guide to draw with tailor’s chalk on the garment.


    Creating some sort of minimalist model will allow you to make mistakes, correct
    them, and discover the best places to hide batteries and the most efficient and
    comfortable paths for running wires before you create the final project. I did
    not do this for the dress project, and consequently had to redo many of my first
    attempts.


    Tip


    When you sew together your circuit, you might want to sew some of the conductive
    thread runs or lay wire inside the garment, which means you may be using the pattern
    in the mirror image of the way you drew it. It is very easy to sew parts of the
    circuit backward that way, so be sure you are projecting the pattern onto the
    fabric maintaining things the right way round, where that matters (like signal
    and power into a NeoPixel - Chapter [5](#A371637_1_En_5_Chapter.html)).


    ### Materials Considerations


    Next, we realized that the type of fabric and notions will help make your project
    successful (or not). For the Haunted Dress, I used chiffon and taffeta—in retrospect,
    not the best fabric choices. Chiffon can be difficult to sew because it is a fine
    fabric and frays easily, and taffeta is a stiff fabric that shows every stitch
    you have to take out as a visible hole. It also frays easily. I had to alter the
    circuit several times, which caused fraying on the chiffon and visible holes from
    removed seams on the taffeta. I learned a lot, but would have had a better end
    product if I had created a muslin prototype first, as noted earlier.


    Good fabrics to use include lightweight cotton (particularly for beginners) or
    t-shirt fabric (a bit harder, since it is stretchy). It depends a bit on what
    you are making, of course. Nylon or any kind of poly-cotton-rayon mix is good.
    Avoid very stretchy materials because they can be challenging for a beginner to
    sew.


    Hook and loop fastener tape (that is, Velcro) is sewable and will not cause shorts
    in your circuits. Snaps are easy to use, but make sure they don’t interfere with
    any conductive thread, fabric, or soldered bits. Creating channels for wire runs
    out of lining fabric or lightweight cotton is a good idea, but they should open
    up easily to allow for access if there is a problem or short circuit. If you line
    the garment, you can attach the channel to the lining so it is not visible from
    the outside, or hand stitch the channel fabric in strategic places like seams
    or hems. A hot glue gun is handy for insulating any soldered joints. Just a drop
    will help protect the connection.


    Tip


    A pin or magnetic closure hand sewn onto fabric or glued onto the back of a 3D-printed
    object makes a great fashion accessory. You can add servos for movement or NeoPixels
    to make it light up. Voila!


    ### Hiding and Supporting Batteries and Mechanisms


    Belts, shoulder pads, epaulettes, bustles, pockets, and facings are handy ways
    to hide batteries, connectors, switches, controllers, and other parts you do not
    want visible. You can also incorporate these into your design with appliques or
    embroidery, or let them appear just as they are if they are interesting and/or
    you like the look.


    Caution


    It is important to remember to create a secure and protected place for the batteries
    and controllers that also allows for easy access for recharging and/or replacing.
    See the discussions of battery issues in Chapter [5](#A371637_1_En_5_Chapter.html).


    The sidebar about the chiffon sleeves described how we supported batteries in
    shoulder pads. These batteries are a bit heavy, so putting them in the shoulders
    helped to give them some support.


    Tip


    If something has to actually move, it will probably take a fair amount of power,
    which may mean hiding a lot of mechanisms and batteries. You may be able to avoid
    having a costume part move with clever attachments to another body part (like
    something attached to a shoe that moves as the person walks). In some cases, this
    might be simpler than trying to be high tech.


    ### Conductive Thread, Wires, and Cables


    Conductive thread is a little harder to work with than regular sewing thread because
    it is stiffer and thicker. It is made from wire, after all. It likes to kink up
    and twist itself around, so use a fairly short length when you sew. Use just enough
    to complete each run separately and then rethread your needle. It requires patience
    and attention to each stitch, but you will get the hang of it fairly quickly.


    The stitches need to be tight enough to create a secure connection without distorting
    the fabric and/or garment. The stitches you make with conductive thread can be
    longer than you might make with regular sewing thread, but they should not be
    too long or they will become too loose for an adequate connection.


    As you are sewing a run of conductive thread, keep checking the previous stitches,
    making them taut without pulling the fabric out of shape. After you have finished
    the project and it is working, move the areas with conductive thread a bit to
    make sure the connection is strong enough to allow for the movement. If it works
    intermittently with the movement, you may need to pull some of the stitches a
    bit tighter.


    The bigger issues come into play because you are wiring up a circuit, which has
    more exacting rules to follow than normal sewing of a garment does. This section
    suggests some good practices to follow.'
  trans: "\n### 最终结果如何\n\n与许多宏大构想一样，这个项目并未完全按计划进行。最初的设计使用加速度计来检测一个大幅动作，以此启动并重置所有组件，但不幸的是，我们没来得及实现这个功能。我们降低了期望，改为让穿戴者按下`Flora`上的重置按钮。最终，我们只是在一个人体模型上展示了这条裙子（如图\
    \ 10-2 和图 10-3 所示），因此，与最初戏剧化的构想相比，这个问题就没那么严重了。\n\n风扇提供的风力不足以从口袋里吹起裙摆，所以我们在最终展示前将它们移除了。事后看来，我们本应该用更多的布料进行几次测试，而不是只用一层布料做一次简短的测试。\n\
    \n由于最后关头出现的一些电气问题，左肩的舵机大约只有一半时间能正常工作，而我们没有时间进行调试。但右侧的舵机和`NeoPixels`则表现得非常出色。\n\
    \n> **注意**  \n> 我们在本书中没有提供这件裙子的`Flora`程序草图，因为这个项目从未真正完成或调试完毕。我们分别在第 6 章和第 8 章中引用了（更简单的！）`NeoPixel`和舵机示例。提供这个例子的目的是为了展示初次尝试“过于困难”的事情的利弊，同时也是一个小小的警示故事。\n\
    \n在本章的其余部分，我们将重新审视在这个项目中做出的决策，并讨论许多在这个项目中未出现但你将会遇到的其他“系统设计”问题。\n\n## 我们学到的经验\n\
    \n我们从这次经历中学到的第一件事是，在开始之前，必须为你的服装制作一张某种形式的“地图”——至少要用屠夫纸画一个纸样，并草图勾勒出各个部件的位置。（本章中我们说的是服装，但你制作的可能是从毛绒玩具企鹅到帽子再到晚礼服等任何东西。）这个纸样能让你搞清楚在哪里隐藏组件、确定导线的走向，并建立最有效、最高效的连接。这是一种在将各个部分组装在一起之前消除一些错误的方法。\n\
    \n> **提示**  \n> 要布局一个简单的可缝纫电路，你可以使用`Fritzing`软件包（第 5 章）来创建电路布局的全尺寸图纸。然后，你可以将图纸放在你正在缝纫的物件旁边，或者将其作为指导，用裁缝粉笔在服装上划线。\n\
    \n创建某种最小化的模型能让你犯错误、修正它们，并在制作最终项目之前发现隐藏电池的最佳位置以及走线最有效、最舒适的路径。对于这件裙子项目，我没有这样做，结果导致我不得不重做许多最初的尝试。\n\
    \n> **提示**  \n> 当你在缝纫电路时，你可能需要将一些导电缝纫线迹缝在服装内部或者布线，这意味着你使用的纸样可能与绘制时的方向是镜像的。这样很容易把电路的一部分缝反。因此，务必要确保你在将纸样投射到布料上时，保持关键部分（如输入到`NeoPixel`的信号和电源\
    \ - 第 5 章）的方向正确。\n\n### 材料考量\n\n其次，我们意识到面料的类型和辅料将决定你的项目是否成功。对于幽灵裙，我使用了雪纺和塔夫绸——回想起来，这并不是最佳的面料选择。雪纺很难缝纫，因为它是一种精细的面料且容易磨损；而塔夫绸是一种硬挺的面料，每一条不得不拆掉的线迹都会留下可见的针孔。它也很容易磨损。我不得不多次修改电路，这导致雪纺磨损，并在塔夫绸上留下了拆除缝线后的可见针孔。我学到了很多，但如果我像前面提到的那样，先用白棉布做一个原型，最终成品的效果会更好。\n\
    \n适合使用的面料包括轻质棉（特别适合初学者）或 T 恤布（稍难一些，因为它有弹性）。当然，这在一定程度上取决于你在制作什么。尼龙或任何涤棉人造丝混纺面料都很好。避免使用弹性很大的材料，因为初学者缝纫起来会比较困难。\n\
    \n魔术贴（即`Velcro`）是可缝的，并且不会在你的电路中引起短路。按扣易于使用，但要确保它们不会干扰到任何导电缝纫线、导电布或焊接点。用里布或轻质棉为导线创建通道是个好主意，但这些通道应该易于打开，以便在出现故障或短路时能够检修。如果你给服装加了里衬，可以将通道固定在里衬上，这样从外面就看不见了，或者用手工将通道布缝在接缝或折边等关键位置。热熔胶枪对于绝缘任何焊接点非常有用。只需一滴就能帮助保护连接。\n\
    \n> **提示**  \n> 手工缝在布料上或粘在 3D 打印物体背面的别针或磁吸扣，可以成为很棒的时尚配饰。你可以添加舵机来实现运动，或者添加`NeoPixels`使其发光。瞧！\n\
    \n### 隐藏并支撑电池和机械装置\n\n腰带、垫肩、肩章、裙撑、口袋和门襟是隐藏电池、连接器、开关、控制器和其他你不想暴露在外部件的便捷方法。你也可以通过贴花或刺绣将它们融入设计，或者如果它们本身足够有趣或你喜欢它们的样子，也可以让它们直接显露出来。\n\
    \n> **警告**  \n> 务必记住为电池和控制器创造一个安全且受保护的位置，同时也要便于充电和/或更换。请参阅第 5 章中关于电池问题的讨论。\n\n\
    关于雪纺袖子的侧边栏描述了我们在垫肩中如何支撑电池。这些电池有点重，所以把它们放在肩膀上可以提供一些支撑。\n\n> **提示**  \n> 如果某个部件必须实际移动，它可能需要相当大的功率，这可能意味着要隐藏大量的机械装置和电池。你也许可以通过巧妙地将服装部件连接到身体其他部位（例如，将某物连接到鞋子上，随着人走路而移动）来避免让服装部件运动。在某些情况下，这可能比尝试使用高技术手段更简单。\n\
    \n### 导电缝纫线、导线和线缆\n\n导电缝纫线比普通缝纫线更难操作，因为它更硬、更粗。毕竟它是由金属丝制成的。它容易打结和缠绕，所以缝纫时要使用相当短的长度。每次各自完成一条单独的走线，刚好够用就行，然后重新穿针。这需要耐心和对每一针的关注，但你很快就能掌握窍门。\n\
    \n针脚需要足够紧，以建立牢固的连接，同时又不能使面料和/或服装变形。你用导电缝纫线缝制的针脚可以比普通缝纫线更长，但不应过长，否则会变得太松而无法形成良好的连接。\n\
    \n在缝纫一段导电缝纫线时，要不断检查之前的针脚，使其绷紧，但不要拉扯面料导致变形。当项目完成并能正常工作后，稍微移动一下带有导电缝纫线的区域，以确保连接足够牢固，能够经受住活动。如果移动时连接时断时续，你可能需要将一些针脚拉得更紧一些。\n\
    \n更大的问题在于你是在连接一个电路，它比普通服装缝纫需要遵循更严格的规则。本节提出了一些值得遵循的良好实践方法。\n"
- fmt: "### Avoiding Short Circuits\n\nTo avoid short circuits (having conductive\
    \ thread create paths for electricity to flow where you did not intend it to),\
    \ you need to plan where you will sew each run of conductive thread. The thread\
    \ is not insulated like coated wires are, so if it touches another run of conductive\
    \ thread as the garment moves, it will short out the circuit.\n\nCreating a map\
    \ for the layout of your wire and conductive thread runs will help eliminate some\
    \ frustrating issues with your project. `Fritzing` (Chapter [5](#A371637_1_En_5_Chapter.html))\
    \ is good for this because it is easy and creates a clear picture or map to the\
    \ right scale. You may also draw a circuit plan freehand, but it is easy to forget\
    \ things or to sketch vaguely and then realize you have problems. Either way,\
    \ it is best to do it before you put the pieces together, whether you are soldering\
    \ or sewing.\n\n> **Caution**  \n> Pay particularly careful attention to any directional\
    \ connections (like those for LEDs in general or NeoPixels in particular), which\
    \ only work in one direction in a circuit. At best the circuit will not work,\
    \ and at worst you might fry a component. It is frustrating and time-consuming\
    \ when you have to take out stitches and replace parts that are glued or sewn\
    \ on. `Fritzing` diagrams can be time savers and mood stabilizers.\n\n### Routing\
    \ Physical Control Cables\n\nIf you are using a control cable to pull on something\
    \ (like the fishing line used in the Haunted Dress sleeves) you have to manage\
    \ routing that as well. Obviously movement of something made of fabric can loosen\
    \ connections, so it is important to keep the controllers, servos, and other components\
    \ stable relative to their electrical connections when you push or pull part of\
    \ the garment.\n\nMapping out the route your wiring will take gives you a chance\
    \ to really think about what parts move the most and where your components and\
    \ wiring runs will best serve the project and be most comfortable for the wearer.\
    \ Using lining, or similar lightweight fabrics, you can create sleeves or channels\
    \ for your wire runs and pockets or straps for the components.\n\n### Wire vs.\
    \ Conductive Thread\n\nIf you were creating an Arduino circuit on a breadboard,\
    \ you would probably use insulated wire. Sewable circuits, though, might most\
    \ simply be attached to a garment by sewing them on with conductive thread (typically\
    \ steel). Wire is not as flexible as conductive thread, so for most garments,\
    \ the thread is a better choice. Some connections really need to be soldered and\
    \ insulated. For instance, it is best to use insulated wire for circuits carrying\
    \ too much current for the conductive thread, or if the circuits are connected\
    \ directly to a battery that will allow too much current to flow if they short\
    \ out. Keep in mind where the connections will be, how much movement the area\
    \ will have, and whether shorts will be a problem if the circuit is moving around\
    \ on the garment.\n\n> **Tip**  \n> A hot glue gun is very handy to reinforce\
    \ and insulate key connections. Clear nail polish is great for securing knots\
    \ in the conductive thread and adding some protection on top of some connections.\
    \ It is also easier to use in tight areas than a glue gun.\n\n### Attaching Servos\n\
    \nIntegrating servos (Chapter [8](#A371637_1_En_8_Chapter.html)) into a wearable\
    \ project poses some particular issues. If the servo is pushing on or pulling\
    \ something, it must be securely attached to something stable. For example, as\
    \ described earlier in the chapter, the servos in the Haunted Dress project were\
    \ attached to the shoulder seams on the outside of the jacket of the Haunted Dress\
    \ to give it a bit of a steampunk feel. More complex or heavier mechanisms might\
    \ need the wearer to have some sort of harness or more significant support for\
    \ the mechanisms.\n\n### Placing Switches and Sensors\n\nPlacing switches and\
    \ sensors is very project-dependent (and sensor-dependent). Chapter [8](#A371637_1_En_8_Chapter.html)\
    \ covers the details of including sensors or switches from a circuitry point of\
    \ view. From a project-construction perspective, the main thing to consider is\
    \ whether where you attached your sensor or switch might be prone to false readings.\n\
    \nIf a sensor is measuring a person’s movement, you might not want to attach it\
    \ to a swishy skirt. Our basic advice here is to think through what the sensor’s\
    \ environment will be (motion, light, whatever else might be relevant) and then\
    \ be sure that its data will not be corrupted somehow.\n\nThere are many different\
    \ ways to trigger a function on your controller, as Chapter [8](#A371637_1_En_8_Chapter.html)\
    \ discusses. In a pinch, the reset button on your processor can do the job. However,\
    \ that button is small, and fumbling with it might ruin the effect you are seeking.\n\
    \n### Resistance-Varying Components\n\nThere may be times when you may want to\
    \ control something with more options than just on and off, or when you may want\
    \ to take action based on an analog input. A rather sophisticated (in terms of\
    \ fabrication difficulty) way to implement that is to use a metal zipper as a\
    \ voltage divider (see the discussion of voltage dividers in Chapter [5](#A371637_1_En_5_Chapter.html)).\
    \ For example, you might want to create a purse that has a light that goes on\
    \ when you open it; we mention it here as another option for a switch. As you\
    \ open the zipper, you can arrange to have the resistance in part of your control\
    \ circuit change. We say it is sophisticated, though, because it can be pretty\
    \ fiddly to get to work and to control.\n\n### Fiber Optics\n\nChapter [5](#A371637_1_En_5_Chapter.html)\
    \ covers LEDs and NeoPixels in particular, as well as EL wire, at the component\
    \ level. But you may want to move light around passively—with fiber optics.\n\n\
    Because the middle school was doing a performance of *The Little Mermaid*, we\
    \ were looking for sea-creature projects that could be incorporated into the production.\
    \ We found the project [Fiber Optic Jellyfish Skirt by Linawassong](http://www.instructables.com/id/Jellyfish-Skirt/)\
    \ and decided to use it as a starting point to create a jellyfish costume. The\
    \ student playing the jellyfish wore the skirt and a black leotard and walked\
    \ across a dark stage. Because this was meant to be worn only in the dark (by\
    \ a middle-schooler) we made it a bit sturdier than the delicate concept in the\
    \ Instructable. The skirt was created with fiber optics, (a lot of) hot glue,\
    \ a NeoPixel strip, a leather belt to support the weight of all the components,\
    \ a `Gemma` board, a lipstick battery, and a chiffon overskirt cut into strips.\n\
    \nIt had a lot of components that could be worked on separately and then brought\
    \ together to assemble. Therefore it was a good project to occupy several students\
    \ and it created a lot of excitement when we brought them all together for the\
    \ finished product.\n\nGluing together the fiber optic strands took a very long\
    \ time and a great deal of hot glue. We had considered a purely mechanical attachment\
    \ from the skirt to make it pulse as the wearer walked, but this turned out to\
    \ be too complex to finish by showtime and was not really needed, since all the\
    \ loose ends floated around anyway."
  raw: '#### Avoiding Short Circuits


    To avoid short circuits (having conductive thread create paths for electricity
    to flow where you did not intend it to), you need to plan where you will sew each
    run of conductive thread. The thread is not insulated like coated wires are, so
    if it touches another run of conductive thread as the garment moves, it will short
    out the circuit.


    Creating a map for the layout of your wire and conductive thread runs will help
    eliminate some frustrating issues with your project. Fritzing (Chapter [5](#A371637_1_En_5_Chapter.html))
    is good for this because it is easy and creates a clear picture or map to the
    right scale. You may also draw a circuit plan freehand, but it is easy to forget
    things or to sketch vaguely and then realize you have problems. Either way, it
    is best to do it before you put the pieces together, whether you are soldering
    or sewing.


    Caution


    Pay particularly careful attention to any directional connections (like those
    for LEDs in general or NeoPixels in particular), which only work in one direction
    in a circuit. At best the circuit will not work, and at worst you might fry a
    component. It is frustrating and time-consuming when you have to take out stitches
    and replace parts that are glued or sewn on. Fritzing diagrams can be time savers
    and mood stabilizers.


    #### Routing Physical Control Cables


    If you are using a control cable to pull on something (like the fishing line used
    in the Haunted Dress sleeves) you have to manage routing that as well. Obviously
    movement of something made of fabric can loosen connections, so it is important
    to keep the controllers, servos, and other components stable relative to their
    electrical connections when you push or pull part of the garment.


    Mapping out the route your wiring will take gives you a chance to really think
    about what parts move the most and where your components and wiring runs will
    best serve the project and be most comfortable for the wearer. Using lining, or
    similar lightweight fabrics, you can create sleeves or channels for your wire
    runs and pockets or straps for the components.


    #### Wire vs. Conductive Thread


    If you were creating an Arduino circuit on a breadboard, you would probably use
    insulated wire. Sewable circuits, though, might most simply be attached to a garment
    by sewing them on with conductive thread (typically steel). Wire is not as flexible
    as conductive thread, so for most garments, the thread is a better choice. Some
    connections really need to be soldered and insulated. For instance, it is best
    to use insulated wire for circuits carrying too much current for the conductive
    thread, or if the circuits are connected directly to a battery that will allow
    too much current to flow if they short out. Keep in mind where the connections
    will be, how much movement the area will have, and whether shorts will be a problem
    if the circuit is moving around on the garment.


    Tip


    A hot glue gun is very handy to reinforce and insulate key connections. Clear
    nail polish is great for securing knots in the conductive thread and adding some
    protection on top of some connections. It is also easier to use in tight areas
    than a glue gun.


    ### Attaching Servos


    Integrating servos (Chapter [8](#A371637_1_En_8_Chapter.html)) into a wearable
    project poses some particular issues. If the servo is pushing on or pulling something,
    it must be securely attached to something stable. For example, as described earlier
    in the chapter, the servos in the Haunted Dress project were attached to the shoulder
    seams on the outside of the jacket of the Haunted Dress to give it a bit of a
    steampunk feel. More complex or heavier mechanisms might need the wearer to have
    some sort of harness or more significant support for the mechanisms.


    ### Placing Switches and Sensors


    Placing switches and sensors is very project-dependent (and sensor-dependent).
    Chapter [8](#A371637_1_En_8_Chapter.html) covers the details of including sensors
    or switches from a circuitry point of view. From a project-construction perspective,
    the main thing to consider is whether where you attached your sensor or switch
    might be prone to false readings.


    If a sensor is measuring a person’s movement, you might not want to attach it
    to a swishy skirt. Our basic advice here is to think through what the sensor’s
    environment will be (motion, light, whatever else might be relevant) and then
    be sure that its data will not be corrupted somehow.


    There are many different ways to trigger a function on your controller, as Chapter
    [8](#A371637_1_En_8_Chapter.html) discusses. In a pinch, the reset button on your
    processor can do the job. However, that button is small, and fumbling with it
    might ruin the effect you are seeking.


    ### Resistance-Varying Components


    There may be times when you may want to control something with more options than
    just on and off, or when you may want to take action based on an analog input.
    A rather sophisticated (in terms of fabrication difficulty) way to implement that
    is to use a metal zipper as a voltage divider (see the discussion of voltage dividers
    in Chapter [5](#A371637_1_En_5_Chapter.html)). For example, you might want to
    create a purse that has a light that goes on when you open it; we mention it here
    as another option for a switch. As you open the zipper, you can arrange to have
    the resistance in part of your control circuit change. We say it is sophisticated,
    though, because it can be pretty fiddly to get to work and to control.


    ### Fiber Optics


    Chapter [5](#A371637_1_En_5_Chapter.html) covers LEDs and NeoPixels in particular,
    as well as EL wire, at the component level. But you may want to move light around
    passively—with fiber optics.


    Because the middle school was doing a performance of The Little Mermaid, we were
    looking for sea-creature projects that could be incorporated into the production.
    We found the project Fiber Optic Jellyfish Skirt by Linawassong `(` [`www.instructables.com/id/Jellyfish-Skirt/`](http://www.instructables.com/id/Jellyfish-Skirt/)
    ) and decided to use it as a starting point to create a jellyfish costume. The
    student playing the jellyfish wore the skirt and a black leotard and walked across
    a dark stage. Because this was meant to be worn only in the dark (by a middle-schooler)
    we made it a bit sturdier than the delicate concept in the Instructable. The skirt
    was created with fiber optics, (a lot of) hot glue, a NeoPixel strip, a leather
    belt to support the weight of all the components, a Gemma board, a lipstick battery,
    and a chiffon overskirt cut into strips.


    It had a lot of components that could be worked on separately and then brought
    together to assemble. Therefore it was a good project to occupy several students
    and it created a lot of excitement when we brought them all together for the finished
    product.


    Gluing together the fiber optic strands took a very long time and a great deal
    of hot glue. We had considered a purely mechanical attachment from the skirt to
    make it pulse as the wearer walked, but this turned out to be too complex to finish
    by showtime and was not really needed, since all the loose ends floated around
    anyway.'
  trans: "\n### 避免短路\n\n为了避免短路（即导电缝线无意中形成电流通路），你需要规划好每一条导电缝线的缝制路径。这种缝线不像包覆绝缘层的导线那样具有绝缘性，因此如果衣服活动时它接触到另一条导电缝线，就会导致电路短路。\n\
    \n为你的导线和导电缝线布局绘制一张路线图，有助于消除项目中一些令人头疼的问题。`Fritzing`（第 5 章）在这方面非常有用，因为它使用简单，并能生成清晰、比例准确的示意图。你也可以徒手绘制电路计划，但这样容易遗漏细节，或画得模棱两可，之后才发现问题。无论采用哪种方式，最好在将各部分组装起来之前就做好规划，无论你是要焊接还是缝制。\n\
    \n> **注意**  \n> 要特别留意任何有方向性要求的连接（比如一般的 LED 灯，尤其是 NeoPixel 灯珠），它们在电路中只能单向工作。最好的情况是电路不工作，最坏的情况则可能烧毁元件。当你不得不拆掉缝线、更换已粘合或缝制的部件时，会非常令人沮丧且耗时。`Fritzing`\
    \ 图示既能节省时间，又能稳定情绪。\n\n### 路由物理控制线\n\n如果你使用控制线来牵引某物（比如“鬼魅连衣裙”袖子中使用的钓鱼线），你同样需要管理好它的走线路径。显然，织物制成的物品在运动中可能会使连接松动，因此，在推拉服装的某个部分时，确保控制器、舵机和其他元件相对于其电气连接保持稳定至关重要。\n\
    \n绘制出线路的走线路线，能让你有机会真正思考哪些部件运动最频繁，以及你的元件和线路布局如何能最好地服务于项目，同时让穿着者感到最舒适。利用衬里或类似的轻质面料，你可以为线路制作线槽或通道，为元件制作口袋或绑带。\n\
    \n### 导线 vs. 导电缝线\n\n如果你在面包板上搭建 Arduino 电路，你可能会使用绝缘导线。然而，可缝纫电路最简单的连接方式，可能是直接用导电缝线（通常是钢质）将它们缝到服装上。导线的柔韧性不如导电缝线，因此对于大多数服装而言，缝线是更好的选择。但某些连接确实需要焊接并进行绝缘处理。例如，对于导电缝线无法承载过大电流的电路，或者直接连接到电池（一旦短路会导致过大电流）的电路，最好使用绝缘导线。要时刻牢记连接点的位置、该区域的活动幅度，以及当电路在服装上运动时，短路是否会成为问题。\n\
    \n> **提示**  \n> 热熔胶枪对于加固和绝缘关键连接点非常实用。透明指甲油在固定导电缝线的线结以及为某些连接点提供额外保护方面效果很好，而且在狭小空间内使用起来比胶枪更方便。\n\
    \n### 安装舵机\n\n将舵机（第 8 章）集成到可穿戴项目中会带来一些特殊问题。如果舵机在推拉某物，它必须牢固地固定在稳定的物体上。例如，正如本章前面所述，“鬼魅连衣裙”项目中的舵机被固定在夹克外侧的肩缝上，以营造些许蒸汽朋克风格。更复杂或更重的机构可能需要穿着者佩戴某种形式的背带或其他更结实的支撑结构。\n\
    \n### 放置开关和传感器\n\n放置开关和传感器在很大程度上取决于具体项目（以及传感器类型）。第 8 章从电路原理的角度详细介绍了如何集成传感器或开关。从项目构建的角度来看，主要需要考虑的是，你安装传感器或开关的位置是否容易产生误读。\n\
    \n如果传感器是用来测量人体运动的，你可能不想把它安装在一件飘动的裙子上。我们在这里的基本建议是：仔细思考传感器所处的环境（运动、光线及其他可能相关的因素），然后确保其数据不会以某种方式被干扰。\n\
    \n如第 8 章所述，有许多不同的方式可以触发控制器上的某项功能。在紧要关头，处理器上的复位按钮也能胜任。然而，这个按钮很小，笨拙地摸索它可能会破坏你追求的效果。\n\
    \n### 可变电阻元件\n\n有时你可能希望控制的对象不仅仅是简单的开关（开/关），或者需要根据模拟输入信号采取行动。一种实现方式相当复杂（就制作难度而言），即使用金属拉链作为分压器（参见第\
    \ 5 章关于分压器的讨论）。例如，你可能想制作一个打开时灯光会亮起的钱包；我们在这里提到它，是作为开关的另一种选择。当你拉开拉链时，可以安排控制电路中的电阻值发生变化。我们说它复杂，是因为要让其正常工作并实现可控，可能会非常棘手。\n\
    \n### 光纤\n\n第 5 章在元件层面介绍了 LED 灯、特别是 NeoPixel 灯珠以及 EL 冷光线。但你可能希望被动地传输光——这时就需要用到光纤。\n\
    \n因为一所中学正在演出《小美人鱼》，我们正在寻找可以融入该剧的海洋生物主题项目。我们找到了[Linawassong 制作的光纤水母裙项目](http://www.instructables.com/id/Jellyfish-Skirt/)，并决定以此为基础创作一件水母服装。扮演水母的学生穿着这条裙子和一件黑色连体衣，走过昏暗的舞台。由于这套服装只打算在暗处穿着（由一名中学生穿着），所以我们把它做得比\
    \ Instructable 教程中那个精致的概念款更结实一些。这条裙子是用光纤、（大量）热熔胶、一条 NeoPixel 灯带、一条用于支撑所有元件重量的皮带、一块`Gemma`控制板、一个口红电池，以及一条剪成条状的雪纺外裙制成的。\n\
    \n它包含许多可以单独制作、最后再拼装起来的部件。因此，这是一个很适合让多个学生参与的项目，当我们把所有部件组装成成品时，大家兴奋不已。\n\n将光纤丝粘合在一起花费了很长时间，也用了大量的热熔胶。我们曾考虑过纯粹的机械连接方式，让裙子随着穿着者行走而脉动，但这被证明过于复杂，无法在演出前完成，而且实际上也并非必需，因为所有松散的纤维末端本来就会随风飘动。\n"
- fmt: '# Wearing Tech


    Student theater groups are natural partners for wearable tech classes in an academic
    environment. In our first year we were fortunate that the middle school musical
    (The Little Mermaid) lent itself to light-up costuming. As we thought about projects,
    there were things we avoided doing just because we were concerned that there might
    be issues. Thus, these are things we consciously did not do and thus did not encounter.
    With some thought, you might find ways around these—we list them here in no particular
    order as things you should consider (and avoid to keep things simpler) if you
    are building a costume.


    People sweat and they use hairspray and makeup, and water might get tossed around
    during a performance. All of that needs planning for before and during the performance.
    Do a dress rehearsal with the costume on to be sure you do not interfere with
    wireless microphones or other stage electronics. For costumes that will be worn
    for multiple performances, consider attaching the circuitry to an overgarment
    that will not need frequent washing.


    Costumes for dance numbers have particular issues. The dancers might connect to
    each other with considerable force, and any controls, batteries, and so on have
    to be someplace that will not be in the dancer’s (or her partner’s) way. Heavy
    hardware might rip off in a jump or a fouetté turn. A stately jellyfish pulsing
    slowly back and forth in a straight line across the stage is more achievable.


    Finally, like putting together furniture in a room and discovering you cannot
    get it back out the door, it is easy to forget that people have to get in and
    out of costumes. This can require some thought and strategic snaps and nonconductive
    closures.


    All that said, some people have done some stunning projects, notably Lisia Trubat’s
    E-traces project. She put Lilypad processors (similar to Floras) and accelerometers
    on a ballet dancer’s pointe shoes and then captured the dancer’s motion in an
    art piece ( [http://cargocollective.com/lesiatrubat/E-TRACES-memories-of-dance](http://cargocollective.com/lesiatrubat/E-TRACES-memories-of-dance)
    ).


    # Designing a Testable Project


    One of the things that can be overwhelming in a wearable tech project is how many
    things have to go right for it to work. You need to do physical assembly of the
    garment/piece, plan paths for control circuits, create a circuit, write code,
    and so on. How can you avoid drowning in all that detail when things do not work?
    Some of it is just experience, but here we talk about some good design practices
    that may help.


    First, see if you can find ways to have your overall project be a collection of
    smaller parts, particularly smaller parts that you can test incrementally. Sometimes
    that is not possible, but consider whether, for instance, if you have a servo
    and lights, you can build just one or the other, test that much, and then add
    the other. For the code part, save incremental versions and create a clear naming
    convention.


    For example, you might name something `JoanProjectLightsWork.ino`, save that much,
    and then rename the next version `JoanProjectLightsServo.ino` to continue from
    there. That way you can always backtrack to something that did work. Keeping tidy
    computer file folders helps a lot, as does creating Fritzing diagrams ahead of
    time and using them. It is very easy to sew things on backwards or to create shorts
    if you do not plan your conductive thread runs carefully.


    Never assume that any particular component, USB cable, or computer port is working.
    If something should work based on all your understanding, try swapping out components
    that are easy to swap out. We have had a lot of time wasted by low-quality USB
    cables that appear fine but are not. The earlier chapters in this book have advice
    on debugging individual aspects, and you should refer there for particular components.
    Generally, though, never assume that anything must be working. Consider whether
    your batteries or other power source is putting out the right voltage and can
    supply enough current (Chapter [5](#A371637_1_En_5_Chapter.html)).


    Similarly, if you get in trouble and things are not working, be systematic. Change
    just one thing at a time, rather than five things, and save intermediary versions
    of any code with clear filenames (and/or good code comments.) If something was
    working and stops working, think very carefully about what changed. The weather?
    Vibration? Those things may not be the cause, but they may be correlated with
    it.


    And most of all, if you just cannot see what is wrong, step away from the project,
    even for a few minutes. When you get back, talk it through with someone, even
    if they know nothing at all about electronics or coding. Sometimes just the process
    of talking it through to someone else will show you the problem. Even if you don’t
    have anyone to discuss it with, you can engage in rubber duck debugging, which
    is where you figure out why your project isn’t working as expected by explaining
    what it’s doing, in detail, to a rubber duck.


    # Summary


    In this chapter we covered a case study of an overly ambitious first wearable
    tech project of ours. Then we extracted some ways to make projects like this easier.
    In particular we focused on creating the non-electronics part of a garment in
    a way that makes laying out the electronics as easy as possible. We talked about
    ways to integrate components that might be relatively heavy into garments using
    strategic pockets or shoulder pads, and how to avoid short circuits. We have some
    pointers back to details in the earlier component-level chapters, as well as some
    forward to the next chapter on example projects you can attempt on your own.


    # 11. Two Bigger Projects


    So far in this book, we have talked about different aspects of a fashion tech
    project. Chapter [7](#A371637_1_En_7_Chapter.html) walks you through a relatively
    simple project, and Chapter [10](#A371637_1_En_10_Chapter.html) tells a cautionary
    tale about an overly complex one. In this chapter we give you two challenging
    but not extremely difficult projects that you can use to stretch yourself a little.


    The first project uses a hat that you buy and moderately complex circuit attachment
    and coding. The second project is a fairly sophisticated sewing project involving
    creating a pattern based on your measurements. It requires plugging electroluminescent
    (EL) wire into an inverter/charger box, without any coding at all. Depending on
    whether you have more issues with sewing or programming, you might pick one or
    the other to start with. If you are teaching a class, these might be two types
    of examples for final projects where students can pick one or the other path.
    Joan and Rich guide you through the hat, and Lyn talks you through the dress.


    ## The Yes-No Hat


    We thought it would be fun to create a project that used a pre-existing garment
    rather than creating one, but which would be interactive and flashy. We came up
    with the yes-no hat: if the wearer shakes her head from side to side to say “no”
    (in most cultures, anyway), a NeoPixel ring lights up red. If the wearer moves
    her head up and down (nodding “yes”), the ring lights up green. Figure [11-1](#A371637_1_En_11_Chapter.html#Fig1)
    shows the completed hat.


    ![A371637_1_En_11_Fig1_HTML.jpg](A371637_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. The yes-no hat (with NeoPixel ring off)'
