- fmt: '## Slicing and Printing


    Creating (or downloading) a 3D model is just the first step, though. Once you
    have the `STL` file, you still need to run it through a program that will create
    the detailed commands for your printer to actually make the object, and you also
    need to transfer this file to your printer. Most printers can be connected via
    USB, and some also have a wireless option. Others can use an SD (or microSD) card
    to transfer the printable file from the computer where you run this software to
    the 3D printer itself. These steps vary somewhat from printer to printer, but
    some standards have emerged.


    One program that works on a wide variety of printers is the open source program
    `MatterControl` （[`www.mattercontrol.com`](http://www.mattercontrol.com)）。 `MatterControl`
    (or your printer’s equivalent software) takes in an `STL` file and outputs a `G-code`
    file. The `G-code` format (or an equivalent format, such as `X3G`) is what actually
    runs on your printer. If your printer uses proprietary software, that software
    may or may not reveal this file to the user.


    You can check whether or not `MatterControl` is supported on your printer by looking
    at your manufacturer’s instructions. If your printer uses its own proprietary
    software, it is likely doing something similar to what we describe here, but the
    details will be different.


    **Tip**


    If you want more detail about the 3D-printing process, with a focus on open source
    printers, you might consider Joan’s book *Mastering 3D Printing* (Apress, 2014).
    This book also includes material on post-processing your prints. If you want to
    focus on using the `MatterControl` software in particular and want more of a detailed
    user guide, you can instead get Joan and Rich’s *3D Printing with MatterControl*
    (Apress, 2015). Both books review how to get started in 3D printing, including
    creating models. Because the subject is large and complex, we are only giving
    the general outline of the process here to give you an idea of what is involved
    and what is possible. There is documentation at [`www.mattercontrol.com`](http://www.mattercontrol.com)
    as well, and your printer manufacturer may provide some links or a manual to get
    you started.


    ### MatterControl


    Consumer 3D printers fall into two broad types: open source and proprietary. Open
    source printers have some heritage back to Adrian Bowyer’s `RepRap` printer mentioned
    earlier in the chapter, and these printers are the ones that `MatterControl` is
    designed to support. `MatterControl` is also an open source, free program that
    takes an `STL` file and turns it into the commands (`G-code`) that run on the
    3D printers that support it. `MatterControl` requires:


    *   A file that defines your printer (provided in a drop-down menu for the printers
    that are officially supported).

    *   An `STL` file.

    *   Settings for the specific `STL` file. For example, one might have the printer
    generate support structures or not, might use different temperature settings for
    different materials, and so on.


    Some of these settings may be the same all or most of the time, and some may change
    frequently (such as whether or not a model needs support). The state of the art
    is that some knowledge of the process is necessary to produce a good print. The
    resources suggested in the preceding Tip can get you started.


    `MatterControl` also has some capabilities to send a print job to a printer connected
    to a computer running `MatterControl`. `MatterHackers`, the company that created
    `MatterControl`, also sells a tablet computer (the `MatterControl Touch`) that
    can run compatible 3D printers instead of tying up a computer.


    ### Proprietary 3D Printers


    Other manufacturers have elected to build their own software and file formats
    from the ground up rather than be a part of the open source 3D-printer community.
    If your printer comes with proprietary software, you should refer to its documentation.


    **Caution**


    We recommend using a 3D printer in a well-ventilated area (but not outside or
    directly in front of a window). Follow the manufacturer’s suggestions for your
    printer’s environment.


    ## 3D-Printing Materials


    Consumer 3D printers use a variety of materials. Probably the commonest one is
    polylactic acid (`PLA`), a plastic typically made from sugar/starch (in North
    America, usually from corn). `PLA` is one of the easiest materials to print and
    does not require that the printer’s platform be heated, as some others do. However,
    it becomes soft at the kind of temperatures you will encounter in a hot car in
    summer, so you have to be careful that you do not end up with an unintentionally
    surrealistic dress if you are making anything structural out of `PLA`.


    Acrylonitrile butadiene styrene (`ABS`) is used to make many toys, and thus is
    often called Lego plastic. It is harder to print; it requires a heated printer
    platform to keep it from peeling away from the bed during printing and an extruder
    that can handle higher temperatures than those required for `PLA`. On the plus
    side, `ABS` is less vulnerable to getting soft in warm temperatures.


    Nylon filament is an interesting choice for fashion tech applications. It is flexible
    when printed in slender parts, but quite stiff if printed thicker. It can be dyed
    with dyes appropriate for nylon. However, like `ABS`, it has to be printed at
    temperatures that are too high for some printers, and it requires a bed designed
    for nylon.


    There are many other types of filament, with more appearing all the time. `PET`
    (a clear plastic often used for water bottles) is pretty transparent and has a
    temperature tolerance somewhere between those of `PLA` and `ABS`. There are also
    filaments that have sawdust or metal dust in the filament, and so print to look
    like wood or metal, and some glow in the dark. However, these filaments can have
    a tendency to clog and abrade nozzles since they contain small particles. There
    are also flexible filament materials (such as thermoplastic elastomers, or `TPEs`)
    that are challenging to print but give a result that is flexible.


    **Caution**


    Some printers can only print one type of material. Be sure you purchase filament
    that is compatible with your machine. Also, note that filament commonly comes
    in diameters of 1.75 mm and 3.0 mm, and the two are not interchangeable.


    ## Applications


    Now that we have gone through some of the ways in which 3D printing can be challenging,
    why would you want to use it in a fashion tech project? The key advantages of
    3D printing are its flexibility and the ability to create a physical object in
    a pretty arbitrary shape very quickly.


    Straightforward applications for 3D printing can include printing ornamental pieces
    intended to be glued or sewn on, such as buttons or decorative pieces (like those
    shown earlier in this chapter). 3D-printed pieces can also be useful in support
    structures for batteries and control wire routing or to supplement traditional
    boning (dress structural support). The small size of consumer 3D-printed pieces
    can limit its utility in boning, however, unless you glue pieces together or glue
    them onto the garment.


    **Tip**


    Lyn is partial to Aleene’s textile glues. The company website （[`www.ilovetocreate.com`](http://www.ilovetocreate.com)）
    has a lot of information about what product to use for different situations. Lyn’s
    experience is that the glues she has used will hold very well, but may not survive
    a ton of washing.'
