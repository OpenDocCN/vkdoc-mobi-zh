  trans: '

    ### 规划程序：流程图


    如果你在我们刚才建议的机器人编程思维实验中稍微深入一些，可能已经发现，在写一行代码之前，详细规划一个编程项目是多么重要。否则，你可能永远无法让程序正常运行。规划代码的一种常见方法是使用流程图，如图
    6-1 所示。这个图展示了一个程序：它启动后，先进行一些设置和定义，然后只要没有事情让它停止，它就会一直运行。


    ![A371637_1_En_6_Fig1_HTML.jpg](img/A371637_1_En_6_Fig1_HTML.jpg)


    图 6-1. 一个流程图


    琼喜欢先绘制一个高层次的代码流程图，然后在手绘草图上写下一些注释。对于较大的项目，她会在开始编码前先列出所有函数，然后可能会寻找一个示例，从中提取出她想要实现的功能的片段。对于
    Arduino 项目，里奇通常从网上搜索开始，找到一个与他的需求接近的现有开源示例，然后进行改编，或者将几个这样的示例结合起来。作为一名初学者，你可能会混合使用这些方法。


    ## Arduino 代码规范


    图 6-1 中的流程图实际上就是 Arduino 代码的布局方式。所有程序都包含`setup()`和`loop()`，它们都是函数，或者说是一些特殊的预定义词汇。


    > **注意：** 实际上，所有现代计算机代码都是区分大小写的。`Setup()`和`setup()`没有任何关系，把非常相似的东西命名混用是个坏主意，因为很容易把自己搞糊涂。


    Arduino 中的`setup()`函数包含了所有只需要执行一次的操作。这可能包括设置一些需要从零开始的事物，告诉 Arduino 哪些引脚用于读取数据或写入数据，以及进行类似的初始化工作。`loop()`函数是程序运行的核心。Arduino
    会不断地循环执行`loop()`中的代码（当代码执行到底部时，会从顶部重新开始），直到某些事件中断它（比如断电、按下复位按钮等）。


    出于历史原因，在 Arduino 上运行的程序有些人称之为草图（sketches），另一些人则直接称为程序。我们将使用的编程环境叫做 IDE（发音为“eye-dee-eee”），是集成开发环境（Integrated
    Development Environment）的缩写。这个环境会在“后台”提供一些结构来加载和运行你的程序。Arduino IDE 是免费且开源的，可以从
    [`www.arduino.cc`](http://www.arduino.cc) 获取，同时网站上还提供了安装指南。


    Arduino IDE 最初源自一个名为 Processing 的编程环境，该环境旨在快速绘制图形和制作动画（因此有了将程序视为“草图”的理念）。Processing
    至今仍然存在（同样免费且开源），可以从 [`www.processing.org`](http://www.processing.org) 获取。图 6-2
    展示了 IDE 的屏幕截图。市场上有各种不同类型的 Arduino 兼容板，IDE 会为不同的板子生成不同的代码。我们将在本章后面讨论这个问题。


    ![A371637_1_En_6_Fig2_HTML.jpg](img/A371637_1_En_6_Fig2_HTML.jpg)


    图 6-2. Arduino IDE 的默认草图。请注意，它在右下角会显示它认为你正在使用的板子类型。


    > **注意：** 在此，我们想要停下来，感谢所有为创造共享的 Arduino 生态系统付出时间和精力的人们。你可以在 `Arduino.cc` 上阅读更多关于其历史和相应许可协议的信息。


    ### 格式惯例


    大多数编程语言都遵循一些你必须学习的惯例，就像学习一门新语言的词汇一样。我们展示一些示例来帮助你入门。一般来说，从一个示例开始，然后通过编辑它，直到语法成为你的第二天性，这是一个好主意。你可以考虑为自己创建一个总是以它开头的模板，就像下面这样（我们稍后会解释什么是注释）：


    ```

    // 在这里写注释，说明代码的功能

    // 说明代码作者以及最后一次编辑的时间

    // 列出许可条款或关于复制限制的任何规定

    void setup() {

    // 此处放置只执行一次的代码

    }// 结束 setup()

    void loop() {

    // 此处放置需要重复执行的代码

    }// 结束 loop()

    //结束

    ```


    你可以在图 6-2 中看到类似的草图在 Arduino IDE 中是什么样子。


    ### 让人感到望而生畏的地方


    人们看到计算机代码时常常会感到恐慌，因为它看起来相当晦涩难懂，而且他们害怕会弄坏什么东西。如果你有条不紊地学习，并掌握程序结构的惯例，你就能相当快地掌握它。如果你把它看作是人类创造的一门外语，而不是由机器人霸主降下的东西，你可能会学得更快。


    #### 语法的严格性


    计算机不知道你的意思，它们非常刻板。代码中的拼写错误通常会导致代码执行出你不希望的结果。一些问题会被编译器（你用来将人类可读的代码转换成机器能理解的程序的工具）捕捉到，但并非所有问题都能被发现。从示例中输入代码时要非常小心。在诸如
    FORTRAN 和 Python 之类的语言中，格式、制表符和换行的位置会影响代码的执行。幸运的是，Arduino 编程所基于的 C++语言没有这些问题。


    请注意，花括号`{`和`}`表示：“这两个括号之间的所有内容都属于同一个代码块。”不同的人对于如何使用和放置括号、命名变量等有不同的习惯。通常，用一种方式学习的人很难与用另一种方式学习的人合作，尽管这听起来微不足道。有时，像`loop()`这样的函数结束位置可能与起始位置相隔数页，琼养成了始终用注释标明每个结束括号所闭合的代码块的惯例（如前例所示）。另一方面，里奇学会了通过精确而一致地使用缩进和空白来跟踪这些事物。良好的编程实践包括：


    - 选择一种格式标准并坚持下去。如果你与其他人一起编写代码，请在开始之前制定一个风格指南，以避免日后出现争论。例如，里奇和琼在一致使用对方的惯例方面都做得非常差，我们必须互相检查以避免错误。

    - 提前绘制流程图并做好规划；不要直接跳进去开始编码。通常，没有规划就写出来的东西都需要扔掉，尤其是在初期。也要检查是否已经存在开源版本，或者可能有一个库（更多内容见后面章节）。

    - 避免使用单字母变量名；使用能说明变量功能的名称，比如`inputPin`。唯一的例外是循环计数器（我们将在本章后面讲到），按传统它们通常使用单个字母。

    - 绝不要在变量名或函数名中使用`1`或`0`，因为它们很难与字母`l`和`o`区分。

    - 变量名中不能包含空格。人们通常使用下划线或“驼峰命名法”（例如`cornerValue`，或中间有“驼峰”的`inputFile`）来避免这个问题。

    - 为你的代码添加注释。未来的你一定会感谢现在的你！


    ### 编程词汇与概念


    正如我们提到的，Arduino 使用的是 C++编程语言的一个变体，它是其他一些语言（如 C、Java 和 Python）的近亲。我们在此提供一份简短的词汇课程，然后继续讲解示例。

