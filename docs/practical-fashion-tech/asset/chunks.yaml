    in this book (the link is on the copyright page of the book), you should be good
    to go.


    Joan and Rich take you through this chapter. Joan learned to code in traditional
    classes and then worked on and managed some quite large programming projects.
    Rich has more of a maker background. When the two of us diverge on approaches,
    we may show you more than one way to think about something and let you decide
    what approach fits your style.


    This chapter is in three parts. First we give a general introduction to programming.
    Then we show you how to find examples for the regular (not sewable) Arduino boards
    and make a few points about programming those. Finally, we move into the sewable
    boards.


    ## Programming Basics


    Programming can seem intimidating because the actual code looks arcane and there
    seem to be a lot of rules to learn. However, once you know why those rules are
    there, anticipating the right way to develop a program becomes easier. Programming
    is just coming up with a very detailed set of instructions for the Arduino to
    use to do something in a particular sequence, such as turning on LEDs if a button
    is pushed, taking sensor data and turning something toward a light source, and
    so on.


    Another way to think about a program is that it is a detailed script for a computer
    (or a processor like an Arduino) to carry out. If you were writing a script with
    stage direction for an experienced actor, you might not put in very much detail.
    But if you were explaining stage direction to kindergarteners for the school holiday
    pageant, you would likely break it down into small steps. Programming is like
    writing a script for preschoolers, because a computer does not know what you meant
    to do, nor does it have knowledge of the real world beyond what you tell it.


    Tip


    The classic way to introduce programming to beginners of any age is to have them
    write a very detailed set of instructions for a robot to do something, like make
    a peanut butter and jelly sandwich. Typically one person writes down the instructions
    and then someone else plays the “robot,” following the instructions very literally.
    If you have never coded before, you might do this as an exercise just to think
    about the steps. How might you define “above” and “below” and “turn the lid” in
    terms a computer without a vision system or any force feedback can understand?


    ### Open vs. Closed-loop Control


    A closed-loop system checks that whatever the Arduino (or other computer) commanded
    something in the real world to do actually happened. So, one might check turns
    of a wheel, the angle of a lever, the temperature of a heating element, and so
    on.


    Open-loop control systems do not check things like this. You might be surprised
    to know that most consumer 3D printers are managed by an Arduino or something
    roughly equivalent, and run almost entirely open loop. Stepper motor precision
    (discussed in Chapter [8](#A371637_1_En_8_Chapter.html)) is good enough that you
    can get away with not checking where you are, though there are “end stops” on
    some axes to allow the machine to find its starting position.'
  trans: '

    # 其他组件


    还有几种其他杂项组件类型你应该了解，以免在你决定尝试的项目中遇到它们。


    有些组件可能配有扩展板或分线板。扩展板实际上仅适用于传统的 Arduino 板，因为它们被设计为夹在引脚顶部（这无法在可穿戴设备的焊盘连接器上工作）。而分线板则旨在接收传感器或其他设备的一组输出，并将其（直接或间接）路由到
    Arduino。如果还没有可缝制的版本，你可能需要发挥创意，弄清楚如何将这些板连接到可穿戴设备上。


    `电容器` 是用于储存少量能量或平滑电流尖峰的组件。如果你因某种原因（例如电机或大量 LED 同时点亮）预料到项目中会出现电压尖峰，就可能用得上它。


    电致发光（EL）线是一种带有涂层的导线，当交流电通过时会发光。需要逆变器将 Arduino 电压升压至 EL 线使用的更高值（但电流非常低）。有时会使用序列器在
    EL 线片段之间切换，以产生运动效果，就像老式的动画霓虹灯标志一样。我们在第 11 章中有一个 EL 线项目。


    ## 我需要学习焊接吗？


    你将能够完成本书中提供说明的所有项目，而无需进行焊接。然而，你可能会发现非常想使用某些传感器或其他组件，但用缝制或其他非永久性连接方式并不实用。网上有许多学习焊接的教程和线下课程，如果你想转向更复杂的项目，我们建议你了解一下这些内容。


    ## 洗涤


    如果你正在制作一件打算穿着的作品，迟早需要清洗它。有些组件可以手洗，但其他组件则不行。你可以将电路放在可拆卸的襟翼上，将不可清洗的部件放在可以滑出的口袋或肩垫中，以此类推。你的部件制造商网站上很可能有关于此问题的说明。请注意，干洗实际上并非“干燥”，干洗液可能会损坏组件。


    注意


    切勿清洗或干洗电池、逆变器、序列器或其他敏感部件。设计你的作品时，应确保电池、EL 线以及任何未特别标明可清洗的部件都能轻松拆卸。


    ## 总结


    本章回顾了 Arduino 平台及其产品生态系统中的组件。我们讨论了如何确定电阻的尺寸以及如何搭建基本电路原型。在下一章中，我们将学习如何编写代码，使其在我们本章讨论的电路上运行。我们将在
    Arduino IDE（软件环境）中编写一些程序，既用于可缝制板，也用于其通用的非可缝制组件。


    # 6. 可穿戴设备编程


    人们在启动 Arduino 项目时感到畏惧的事情之一是，你确实需要学习编程，至少是学一点。好消息是，学习计算机编程的一个好方法是查看示例，而且网上有很多基本的
    Arduino 编程示例。


    与我们的缝纫和电子章节类似，我们这里只能帮你入门，你可能需要使用其他资源来补充一些细节。Arduino 使用一种名为 C++ 的编程语言，它是 Java、Python
    和 C 等其他编程语言的近亲。有许多优秀的 C++ 编程书籍；例如，[`www.apress.com/programming/c-c?p=1`](http://www.apress.com/programming/c-c?p=1)
    上就有很多。你也可以学习 C++ 或 C++ 所基于的更简单、更古老的语言 C 的等效在线教程，以作为我们在本章提供的快速概览的补充。就本书其余部分而言，如果你能学会修改现有示例（无论是在线提供的，还是本书可下载材料中的，链接在本书版权页上），那么你应该就足够了。


    琼和里奇将带你完成本章。琼通过传统课程学习编程，然后参与并管理过一些相当大的编程项目。里奇则有更多的创客背景。当我们两人的方法出现分歧时，我们可能会向你展示不止一种思考某事的方式，让你自行决定哪种方法适合你的风格。


    本章分为三个部分。首先，我们给出编程的一般性介绍。然后，我们向你展示如何为常规（不可缝制）Arduino 板寻找示例，并就这些板的编程提出几点建议。最后，我们将转向可缝制板。


    ## 编程基础


    编程可能看起来令人生畏，因为实际代码看起来深奥难懂，而且似乎有很多规则要学习。然而，一旦你知道了这些规则存在的原因，预想出开发程序的正确方法就会变得更容易。编程只是为
    Arduino 制定一套非常详细的指令，让它按特定顺序执行某件事，例如：如果按下按钮则点亮 LED，获取传感器数据并将某物转向光源等。


    将程序视为供计算机（或像 Arduino 这样的处理器）执行的详细脚本，是另一种思考方式。如果你是为经验丰富的演员编写带有舞台指导的脚本，可能不会加入太多细节。但如果你是为学校的节日盛会向幼儿园孩子解释舞台指导，你可能会将其分解成很小的步骤。编程就像为学龄前儿童写脚本，因为计算机不知道你想做什么，它也不知道你告诉它之外的现实世界知识。


    提示


    向任何年龄的初学者介绍编程的经典方法是让他们为机器人做某事（比如制作花生酱果酱三明治）编写一套非常详细的指令。通常，一个人写下指令，然后另一个人扮演“机器人”，严格按照指令执行。如果你从未写过代码，你可以将此作为练习，仅仅思考其中的步骤。你如何以没有视觉系统或任何力反馈的计算机能够理解的方式来定义“上面”、“下面”和“转动盖子”？


    ## 开环控制 vs. 闭环控制


    闭环系统会检查 Arduino（或其他计算机）命令现实世界中的某物所执行的操作是否真的发生了。因此，可能会检查车轮的转动、杠杆的角度、加热元件的温度等等。


    开环控制系统则不会检查这类事情。你可能会惊讶地知道，大多数消费级 3D 打印机由 Arduino 或大致等效的东西管理，并且几乎完全以开环方式运行。步进电机精度（在第
    8 章中讨论）足够高，可以不用检查当前所在位置，尽管在某些轴上有“限位开关”以允许机器找到其起始位置。

