  trans: "\n### 使用光电二极管\n\n人们通常以相对的方式使用光电二极管——判断某物是否“足够暗”或“足够亮”以改变状态，或者向明亮处移动。因此，我们并不真正关心输出的精确值——我们只想知道它是如何变化的。这意味着在编写\
    \ Arduino 程序（清单 8-2）时，我们需要调整一些变量。图 8-4 展示了 Fritzing 中的电路，图 8-5 则展示了光电二极管被遮挡时点亮\
    \ LED 的情形。\n\n![A371637_1_En_8_Fig5_HTML.jpg](img/A371637_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5 光电二极管被遮挡以点亮 LED\n\n![A371637_1_En_8_Fig4_HTML.jpg](img/A371637_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4 光电二极管与 LED 夜灯 Fritzing 示意图\n\n```\n// 一个示例：当光电二极管检测到环境变暗时点亮 LED\n#define\
    \ PHOTOPIN A0 // 连接光电二极管阴极，阳极接 GND\n#define LEDPIN 9\n#define THRESHOLD 1010 //\
    \ 0-1023，使用较高值可在更暗时触发\n// 如果灯一直亮，说明 THRESHOLD 过高；如果一直灭，则说明过低\nint photoRead(int\
    \ pin) {\n  digitalWrite(pin, HIGH); // 向模拟引脚写入高电平\n  pinMode(pin, OUTPUT);  \
    \  // 充分充电光电二极管的内部电容\n  delay(1);\n  pinMode(pin, INPUT);     // 切换为输入模式，启用上拉电阻\n\
    \  // 光电二极管电流会通过 200k 上拉电阻缓慢释放电容。\n  // 光线越强，电压下降越快。\n  delay(2);\n  return analogRead(pin);\
    \  // 查看 2ms 后电压下降了多少\n}\nvoid setup() {\n  Serial.begin(9600);\n  pinMode(PHOTOPIN,\
    \ INPUT);\n  digitalWrite(PHOTOPIN, HIGH);\n  pinMode(LEDPIN, OUTPUT);\n  digitalWrite(LEDPIN,\
    \ LOW);\n} // setup 结束\nvoid loop() {\n  int darkness = photoRead(PHOTOPIN);\n\
    \  Serial.print(\"光电二极管读数: \");\n  Serial.println(darkness);\n  delay(20);\n \
    \ // 若黑暗程度超过阈值则点亮 LED\n  if (darkness > THRESHOLD) digitalWrite(LEDPIN, HIGH);\n\
    \  else digitalWrite(LEDPIN, LOW);\n} // loop 结束\n清单 8-2 Arduino 夜灯程序\n```\n\n\
    ### 在项目中使用多个传感器\n\n如果使用多个传感器，通常应将它们的电路隔离到不同的引脚上（类似于示例中对 LED 和传感器的处理），而不是将它们串联起来。注意不要从\
    \ Arduino 中消耗超过其能提供的功率，但这通常不会成为限制因素。\n\n**提示** 许多类型的传感器（及其他硬件）在 [`http://playground.arduino.cc/Main/interfacingWithHardware`](http://playground.arduino.cc/Main/interfacingWithHardware)\
    \ 有详细介绍。\n\n## 让物体动起来\n\nArduino（包括可缝纫版本）可以通过以下方式控制运动部件：\n\n*   **小型直流电机**：用于移动物体，无需特别精确地控制运动位置或速度。如果你想让玩具车旋转轮子并四处奔跑，通常会使用这种电机。\n\
    *   **步进电机**：这类电机用于 3D 打印机以及其他需要精确控制速度和位置的场合；它们以已知大小的微小步长（因此得名）移动，其位置可通过计数步数来控制。\n\
    *   **舵机**：这种电机希望保持特定的编程位置。你可以将其与合适的传感器配合，将某物固定在特定位置。航模舵机具有内部反馈回路，能够寻找并保持指定位置。舵机自带控制电路，因此最容易连接到\
    \ Arduino 上。在需要精确移动物体时，它们也常用于机器人技术。\n\n如果你对电机总体感兴趣，可以查阅一本关于 Arduino 控制机器人的书，例如\
    \ Warren、Adams 和 Molle 合著的 *Arduino Robotics*（Apress, 2011）。将运动部件融入服装会带来一些挑战，我们在第\
    \ 10 章中会讨论。任何电机都必须牢固固定，以确保要移动的物体安全且按预期运动，而不是在电机连接点下堆起织物。\n\n**提示** 在 [`http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical`](http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical)\
    \ 有一个很长的电机列表，以及针对不同情况选择电机的建议。\n\n### 电源管理\n\n与 Arduino 能做的几乎所有其他事情相比，控制电机需要消耗大量电能——通常远高于\
    \ Arduino 直接提供的功率。如果尝试用 Arduino 直接为电机供电，Arduino 可能会“掉电”并行为失控，或者元件过热而损坏。\n\n为避免这种情况，请使用独立于\
    \ Arduino 之外的电源。将这个外部电源直接连接到电机上。同时需要在电机附近某处隐藏电池。“口红”式 USB 可充电电池现在已经相当容易获得，但你仍然需要为它们找一个安放位置以及连接方式。\n\
    \n将普通（不可缝纫）Arduino 连接到电机的最简单方法是购买一个合适的扩展板。这是一块可插入 Arduino 的电路板，对于电机扩展板，通常还允许你接入独立电源和电机。截至撰写本文时，尚无等效的可缝纫板，因此你只能依靠涉及焊接的解决方案，或者设法使用带有扩展板的普通\
    \ Arduino 板——不过这可能会有点笨重。\n"
- fmt: '### Servos


    A servo is a small motor that turns its shaft to one particular angular position.
    Usually a servo comes with a variety of small plastic pieces, called horns, that
    you can use to attach a string or something else you are using the servo to push
    or to pull. Figure [8-6](#A371637_1_En_8_Chapter.html#Fig6) shows a servo with
    a horn attached. This particular horn has two long arms and two shorter ones,
    but they come in a variety of shapes, and most hobby servos include several different
    options. Most likely this is the type of motor you would use on a wearable to
    animate some feature or to react to conditions detected by a sensor (to close
    up something when it gets dark, for example.)


    ![A371637_1_En_8_Fig6_HTML.jpg](A371637_1_En_8_Fig6_HTML.jpg)


    Figure 8-6. A servo


    Powering both a servo and an Arduino can be tricky. A servo can draw significant
    current, especially when it is prevented from reaching its target position (known
    as stall current). Trying to draw more current than your power source can provide
    usually results in a current drop (or in some cases, a blown fuse, which may be
    self-resetting or may need to be replaced).


    To use a servo, you want to avoid having the power come through the Arduino’s
    voltage regulator, a chip on the board that manages power. This would happen if
    the motor were plugged in to the Arduino power bus. It may be too much current
    for the regulator to handle, causing the controller to brown out and reset.


    To avoid this problem, most Arduinos have a connection that will allow them to
    plug into the wall or a battery. Connect your servo using the `Vin` pin for the
    positive voltage (V+) side to bypass the regulator, and then plug in the power
    adapter before plugging in the USB connector. Finally, plug in the USB connector
    so that you can download a sketch to control the servo with the Arduino. (Servo
    control examples are in the set that is downloaded with the IDE—see File ➤ Examples
    ➤ Servo.)


    In Figure [8-6](#A371637_1_En_8_Chapter.html#Fig6), note the three wires coming
    out of the servo. The convention is that brown connects to ground (`GND`), red
    connects to 5 V, and orange is the signal (control) wire. (Sometimes black is
    used for ground and white for the signal wire.) How you hook this up will depend
    a lot on what you are trying to do exactly and how much power you will need. Take
    a look at example projects out there that look like yours and see how they did
    it, bearing in mind the caveats we just reviewed.


    ## Summary


    In this chapter we give the general principles behind hooking up a sensor to an
    Arduino, with details on two examples. We also talk you through how to find more
    information for a particular sensor, and how to deal with it if a sensor is not
    available in wearable form. We also give a brief introduction to the different
    types of motors that an Arduino can control, and include a tutorial on using a
    servo motor for simple mechanical control. In Chapter [10](#A371637_1_En_10_Chapter.html)
    we have more complex examples of both, and in Chapter [11](#A371637_1_En_11_Chapter.html)
    we use a gyroscope to track head motion.


    # 9. 3D Printing


    3D printing has entered haute couture in a big way lately (as we touch on in Chapter
    [13](#A371637_1_En_13_Chapter.html)), but much of that has used higher-tech machinery
    than the consumer 3D printers that are now broadly available. In this chapter
    Joan and Rich give a quick tour of 3D printing and show you some pragmatic and
    decorative uses for it.


    ## How 3D Printing Works


    In brief, 3D printing technologies create an object by laying it up one thin layer
    at a time in a process controlled by a computer model. What is being laid up varies
    by the type of printer (whether it starts with a powder, liquid resin, or spool
    of filament), but fundamentally all the processes are similar. The layers typically
    are around 0.2 millimeters thick—which, according to Wikipedia, is twice the diameter
    of an average human hair or thickness of a coat of paint, or about the length
    of an average single-celled life form like a paramecium ( [`https://en.wikipedia.org/wiki/100_micrometres`](https://en.wikipedia.org/wiki/100_micrometres)
    ).


    3D printing is not new. It has been around in some form since the 1980s, and the
    first company, 3D Systems, was formed by Chuck Hall in 1986. However, until the
    mid-2000s, the 3D-printing process was covered by patents, and the patent holders
    elected to keep it an expensive technology aimed at industrial users.


    When the key patents expired, Adrian Bowyer, then at University of Bath in England,
    created a design for a 3D printer that could produce other 3D printers, with the
    addition of some parts that could be purchased at a hardware store. Then, he put
    this design out as open source (meaning it was available to anyone to build on,
    as long as they, too, put out their improvements for everyone) so that everyone
    could build on it.


    This started the RepRap (REPlicating RAPid prototyper, [`www.reprap.org`](http://www.reprap.org)
    ) printer revolution that led to the array of existing consumer printers, fueled
    by freely available technology and later by the fact that the historical accident
    that crowdfunding also came along shortly thereafter.


    **Note**


    The term 3D printing is somewhat misleading because people immediately make an
    analogy to printing a document on paper, and the processes do not really have
    all that much in common. The more generic additive manufacturing is more descriptive
    and accurate, although perhaps not as catchy.


    Consumer printers, for the most part, use spools of filament made of plastic (see
    the section “3D-Printing Materials” later in the chapter). Figure [9-1](#A371637_1_En_9_Chapter.html#Fig1)
    shows a typical small 3D consumer printer and its spool of filament. This printer,
    as it happens, was designed by Rich. It has four small motors: one to drive mechanisms
    in each of three dimensions, and one to push the filament through the extruder.


    ![A371637_1_En_9_Fig1_HTML.jpg](A371637_1_En_9_Fig1_HTML.jpg)


    Figure 9-1. A consumer 3D printer


    The extruder consists of two pieces. One is the drive mechanism (which includes
    a motor and parts that grip the filament). The other is the hot end, where the
    filament is melted and put out through a nozzle (in this case, half a millimeter
    in diameter) that lays down a fine stream of melted plastic. The object builds
    up a layer at a time on the platform (the area covered by blue tape in Figure
    [9-1](#A371637_1_En_9_Chapter.html#Fig1).) Like many consumer printers, this one
    is controlled by a microprocessor that is more or less an Arduino with some custom
    features added.


    Resin printers use light to selectively harden a light-sensitive liquid resin.
    The consumer-priced ones are becoming more common and are particularly useful
    for jewelry and fine prints, but the resin is messy and requires some careful
    handling. Printers using powder use either a laser to sinter particles together
    or an inkjet that deposits a binding agent (like a glue or solvent) to make them
    stick. These create relatively smooth-looking products, but they are expensive,
    and the materials-handling issues are far more challenging than with filament.
    We focus on applications of filament-based printers in this chapter and talk a
    little about the higher-end applications in Chapter [13](#A371637_1_En_13_Chapter.html).'
