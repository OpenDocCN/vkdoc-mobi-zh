    \ circuits will go with an alligator clip version of the circuit than with a Fritzing\
    \ diagram, even if the clipped circuit can be a little unwieldy sometimes. Rich\
    \ does not agree, so these things are a matter of style and visualization skills.\
    \ You will develop your own path with experience.\n\nBecause this was going to\
    \ be used in an environment where we would want to protect the Gemma, we decided\
    \ to hold the Gemma and its connections on a little tab that could slide into\
    \ a pocket, along with the batteries. The “saucepan button” required some careful\
