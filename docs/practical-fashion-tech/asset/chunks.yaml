    # 穿引缝纫机线


    学习手工缝纫或许已经让人望而生畏，但现代缝纫机实际上是相当复杂的自动化设备。由于缝纫机非常耐用，如果你拥有一台机器，它可能是 60 年前的老型号（比如图 3-11
    中那台 1953 年生产的铸铁款 Singer Featherweight），也可能是现代机型（图 3-12）。以下说明将尽可能涵盖各种型号的机器。


    ![A371637_1_En_3_Fig12_HTML.jpg](img/A371637_1_En_3_Fig12_HTML.jpg)


    图 3-12. 2015 年款 Brother 自动缝纫机


    ![A371637_1_En_3_Fig11_HTML.jpg](img/A371637_1_En_3_Fig11_HTML.jpg)


    图 3-11. 一台 1953 年生产的 Singer Featherweight 缝纫机，至 2015 年仍可正常使用。（感谢 Rich 的妹妹 Rachel
    Cameron 为图片提供模特并审阅说明。）


    根据机型不同，缝纫机可通过转动旋钮或按下按钮选择多种线迹。最常见的是直线线迹、Z 字形线迹和刺绣线迹。你可以通过旋钮或电脑屏幕菜单调整线迹的长度和宽度。功能更复杂的机型甚至提供更多线迹选择。机器还配有按钮或开关可实现倒缝。


    如果你有一台新机器，通常会附带使用手册，其中包含穿线所需的步骤说明（如果找不到手册，也可在线查找）。许多机器本身也会以某种方式显示穿线路径（图 3-13）。


    ![A371637_1_En_3_Fig13_HTML.jpg](img/A371637_1_En_3_Fig13_HTML.jpg)


    图 3-13. 图 3-12 中机器顶部的穿线示意图


    如果你从未尝试过，给缝纫机穿线可能会令人困惑。但一旦学会，在大多数标准机型上只需几秒钟，你就可以准备开始缝纫了。你必须能看清机针细小的针眼并具备相当好的瞄准能力，因此如果看近处需要眼镜，务必戴上。许多机器配有穿线器，有助于解决视力模糊或手抖的问题。


    > **注意**

    > 缝纫机针的针眼位于尖端，而手缝针的针眼在针尾。切勿将两者混用。


    你需要准备一些测试布料、一卷缝纫线（与手缝同理，如果想练习并轻松看到线迹，建议使用与布料颜色对比明显的线）。此外，还需准备缝纫机针和一个绕好线的梭芯——它为布料底部的线迹提供底线。在给机器上半部分穿线之前，大多数缝纫机需要先给梭芯绕线。请将以下说明（以两台机器为例展示常见差异）作为指导，并查阅你的机器手册了解具体细节。


    ## 绕制梭芯


    使用你选择的缝纫线，给梭芯绕线，使线迹的顶线和底线颜色一致。当你缝制其他项目时，可以收集绕有不同颜色线的梭芯，这样就不需要每次都重新绕线。


    首先，左手握住手轮，右手转动内侧旋钮将其松开。将线轴插在机器顶部的线轴钉上。如果机器没有内侧轮，顶部可能有一个释放按钮。将线从梭芯内侧的孔穿到外侧，然后将梭芯放在梭芯绕线轴上。将绕线轴向右推。捏住线头，缓慢踩下脚踏控制器，在梭芯上绕几圈线。图
    3-14 显示了此过程的状态。


    ![A371637_1_En_3_Fig14_HTML.jpg](img/A371637_1_En_3_Fig14_HTML.jpg)


    图 3-14. 绕制梭芯


    接着，停止机器，将靠近梭芯顶部孔的线头剪断。再次踩下脚踏控制器，直到梭芯绕满。停止机器，将梭芯绕线轴向左移回原位。剪断线。现代机型中，位于图 3-12 主梭线轴前方的装置即为等效的梭芯座。


    ## 安装机针


    将机针平面朝下放在平面上，检查它是否笔直。机针与平面之间的间隙应均匀，且针尖必须锋利。安装机针时，朝自己的方向（逆时针）转动手轮，将针杆组件升至最高位置，并抬起压脚——即针周围压住布料的部件。你的机器应有释放机制，例如压脚附近的杠杆。图
    3-15 展示了此步骤（图中机器已完成上半部分穿线）。


    ![A371637_1_En_3_Fig15_HTML.jpg](img/A371637_1_En_3_Fig15_HTML.jpg)


    图 3-15. 压脚


    松开针夹螺丝，将一枚机针插入针夹，确保机针的平面朝外。务必将机针向上推至最大限度。用机器配备的相应机构拧紧机针。


    ## 为机器上半部分穿线


    朝自己的方向（逆时针）转动手轮，将挑线杆升至最高位置。确保压脚处于抬起状态。将线轴插在机器顶部的线轴钉上。如果线轴钉是水平放置的，用随附的线轴盖固定线轴。用锋利的剪刀将线头剪出一个干净利落的端头。捏住线头，穿过顶部导线器。将线头绕过上方导线器（图
    3-16）。


    ![A371637_1_En_3_Fig16_HTML.jpg](img/A371637_1_En_3_Fig16_HTML.jpg)


    图 3-16. 上方导线器


    在线轴附近捏住线，将线头向下绕过夹线簧座或张力组件。张力组件位于图 3-16 中机器的顶部，用于控制线的流量。用力将线向上拉，然后根据机器上的数字或图示，穿过机器可能配备的其他夹线装置。某些情况下，如图
    3-16 中的机器，导线器周围的区域可以打开，以便操作。


    将线向下穿过机器上剩余的导线器，并将其滑入针杆导线器——即针上方的一个小夹子，在图 3-17 中隐约可见。从机针前方向后穿线，将线拉过针眼几英寸，并引向左侧（你的机器可能是从右向左穿——请参照机器上的图示）。


    ![A371637_1_En_3_Fig17_HTML.jpg](img/A371637_1_En_3_Fig17_HTML.jpg)


    图 3-17. 穿好线的机针

    '
- fmt: '### Inserting the Bobbin


    On a more modern machine, follow the diagram on the machine for inserting the
    bobbin thread, with the bobbin in place in its cavity under the needle (Figure
    [3-18](#A371637_1_En_3_Chapter.html#Fig19)). On some machines, the cavity may
    be tucked onto the front or side of the bottom (Figure [3-19](#A371637_1_En_3_Chapter.html#Fig20)).
    Machines vary in their arrangement, but you can get the general idea from these
    two examples.


    ![A371637_1_En_3_Fig19_HTML.jpg](A371637_1_En_3_Fig19_HTML.jpg)


    Figure 3-19. Bobbin placement on front, near the bottom, on a differently designed
    machine


    ![A371637_1_En_3_Fig18_HTML.jpg](A371637_1_En_3_Fig18_HTML.jpg)


    Figure 3-18. Bobbin threading directions on one modern machine


    Place the full bobbin in the bobbin case inside the cavity, making sure the thread
    feeds in the direction specified by the diagram for your machine.


    Holding the latch on the bobbin case, push the case into position on the machine
    and release the latch. The bobbin case should lock into place when you release
    the latch. A few inches of bobbin thread should be pulled out.


    With the presser foot in the up position, hold the thread from the needle lightly
    with your left hand. Turn the hand wheel toward you (counterclockwise) for one
    complete turn, until the needle disappears into the bobbin case. Keep holding
    onto the thread and move the handwheel until the needle is once again at its highest
    position. As the needle rises, a loop of bobbin thread will come up as well. Pull
    the thread out toward your left to draw the bobbin thread loop further out of
    the bobbin case. Pull both threads 4 to 6 inches away from you, pulling both the
    thread from the needle and from the bobbin straight back away from you. You can
    see a threaded needle at this point in the process back in Figure [3-17](#A371637_1_En_3_Chapter.html#Fig17).
    You are (finally) ready to sew!


    ## Trying Out Machine Sewing


    It is a good idea to practice using the machine before you begin any project.
    With the list of basic stitches that follows and some scraps of fabric, practice
    putting the fabric under the presser foot, lowering the needle by hand-turning
    the wheel, lowering the presser foot, (with the lever you used to raise it before)
    sewing, changing stitches, using reverse, removing the fabric, and snipping the
    threads. Most sewing machines have a thread cutter next to the needle—or use sharp
    scissors.


    To remove the needle from the fabric, turn the knob toward you until the needle
    is in the up position and out of the fabric, raise the presser foot, and pull
    the fabric out from under the foot. Leave a 4- to 6-inch trail of thread for next
    time.


    ### Changing Seam Direction


    Some projects will require changing the direction of a seam. To do so, make a
    seam a few inches long. Stop the machine with the needle in the fabric (lower
    it by hand if it is up). Lift the presser foot, turn the fabric 90 degrees, and
    lower the presser foot. Continue sewing for a few inches (Figure [3-20](#A371637_1_En_3_Chapter.html#Fig21)).
    Practice pinning fabric together and creating seams. Cut a curve and sew a seam
    along it, and practice clipping the curve. Clipping means to make little notch
    cuts from the edge of the fabric to the seam to make the seam lay flatter.


    ![A371637_1_En_3_Fig20_HTML.jpg](A371637_1_En_3_Fig20_HTML.jpg)


    Figure 3-20. Changing seam direction


    ### Trying Out Types of Stitches


    If your machine has a variety of stitches available, go ahead and try them all.
    Some stitches may require different presser feet and/or needles.


    #### Double or Stay Stitch


    After sewing the stitch on the seam line, sew it again 1/4 inch inside away from
    the first stitch in the seam allowance using a straight or zigzag stitch (Figure
    [3-21](#A371637_1_En_3_Chapter.html#Fig22)).


    ![A371637_1_En_3_Fig21_HTML.jpg](A371637_1_En_3_Fig21_HTML.jpg)


    Figure 3-21. Stay stitch


    #### Ease or Gather Stitch


    Sew along the seamline using long straight stitches, leaving 3 to 4 inches of
    thread at each end of the seam. Pull the thread ends to adjust for fit (Figure
    [3-22](#A371637_1_En_3_Chapter.html#Fig23)).


    ![A371637_1_En_3_Fig22_HTML.jpg](A371637_1_En_3_Fig22_HTML.jpg)


    Figure 3-22. Ease (or gather) stitch


    #### Edge Stitch


    Stitch close to the edge of the fabric and cover the edge with your stitching
    (Figure [3-23](#A371637_1_En_3_Chapter.html#Fig24)).


    ![A371637_1_En_3_Fig23_HTML.jpg](A371637_1_En_3_Fig23_HTML.jpg)


    Figure 3-23. Edge stitch


    #### Top Stitch


    On the right or outside of the fabric, stitch very close to the seam. Use the
    presser foot as a guide (Figure [3-24](#A371637_1_En_3_Chapter.html#Fig25)).


    ![A371637_1_En_3_Fig24_HTML.jpg](A371637_1_En_3_Fig24_HTML.jpg)


    Figure 3-24. Top stitch


    #### Back Stitch


    After sewing a seam to complete a piece, stop the machine, put the machine in
    reverse, and make a few stitches along the same seam line. Then go forward again
    to the end of the piece. Figure [3-25](#A371637_1_En_3_Chapter.html#Fig26) shows
    the “reverse” button on a machine—typically it is a button or lever like the one
    shown. (It is the button on the right with the arrow turning around “over the
    top.”)


    ![A371637_1_En_3_Fig25_HTML.jpg](A371637_1_En_3_Fig25_HTML.jpg)


    Figure 3-25. The reverse button (on top right)


    There are many more types of stitches. The best way to see them in context is
    to take a pattern and try actually making something.


    ### Stitches in Context


    Figure [3-26](#A371637_1_En_3_Chapter.html#Fig27) is a sketch of a vest you will
    make in Chapter [4](#A371637_1_En_4_Chapter.html). You can see where I will use
    some of the stitches. Even something as simple as a vest has a few pieces that
    are not obvious and that require a variety of stitches.


    ![A371637_1_En_3_Fig26_HTML.jpg](A371637_1_En_3_Fig26_HTML.jpg)


    Figure 3-26. Stitches for the vest in Chapter [4](#A371637_1_En_4_Chapter.html)


    In Chapter [4](#A371637_1_En_4_Chapter.html) you will see more of this stitching
    in action. Most of the time there is no “right” way to stitch something. You can
    try different things to see what will work. For example, in Chapter [4](#A371637_1_En_4_Chapter.html)
    we topstitched a few places just to show the effect (not shown here).


    ## Summary


    This chapter introduced the basics of sewing by hand and with a standard sewing
    machine. It also discussed what you will need to begin to sew, showed several
    common stitches, and talked about how to thread a standard sewing machine and
    common sewing terms. It will be helpful to practice sewing straight stitches,
    sewing a curve, edge stitching, and finishing a seam on scraps of fabric before
    you begin your first project in the next chapter.'
  raw: '### Inserting the Bobbin


    On a more modern machine, follow the diagram on the machine for inserting the
    bobbin thread, with the bobbin in place in its cavity under the needle (Figure
    [3-18](#A371637_1_En_3_Chapter.html#Fig19)). On some machines, the cavity may
    be tucked onto the front or side of the bottom (Figure [3-19](#A371637_1_En_3_Chapter.html#Fig20)).
    Machines vary in their arrangement, but you can get the general idea from these
    two examples.


    ![A371637_1_En_3_Fig19_HTML.jpg](A371637_1_En_3_Fig19_HTML.jpg)


    Figure 3-19.


    Bobbin placement on front, near the bottom, on a differently designed machine


    ![A371637_1_En_3_Fig18_HTML.jpg](A371637_1_En_3_Fig18_HTML.jpg)


    Figure 3-18.


    Bobbin threading directions on one modern machine


    Place the full bobbin in the bobbin case inside the cavity, making sure the thread
    feeds in the direction specified by the diagram for your machine.


    Holding the latch on the bobbin case, push the case into position on the machine
    and release the latch. The bobbin case should lock into place when you release
    the latch. A few inches of bobbin thread should be pulled out.


    With the presser foot in the up position, hold the thread from the needle lightly
    with your left hand. Turn the hand wheel toward you (counterclockwise) for one
    complete turn, until the needle disappears into the bobbin case. Keep holding
    onto the thread and move the handwheel until the needle is once again at its highest
    position. As the needle rises, a loop of bobbin thread will come up as well. Pull
    the thread out toward your left to draw the bobbin thread loop further out of
    the bobbin case. Pull both threads 4 to 6 inches away from you, pulling both the
    thread from the needle and from the bobbin straight back away from you. You can
    see a threaded needle at this point in the process back in Figure [3-17](#A371637_1_En_3_Chapter.html#Fig17).
    You are (finally) ready to sew!


    ## Trying Out Machine Sewing


    It is a good idea to practice using the machine before you begin any project.
    With the list of basic stitches that follows and some scraps of fabric, practice
    putting the fabric under the presser foot, lowering the needle by hand-turning
    the wheel, lowering the presser foot, (with the lever you used to raise it before)
    sewing, changing stitches, using reverse, removing the fabric, and snipping the
    threads. Most sewing machines have a thread cutter next to the needle—or use sharp
    scissors.


    To remove the needle from the fabric, turn the knob toward you until the needle
    is in the up position and out of the fabric, raise the presser foot, and pull
    the fabric out from under the foot. Leave a 4- to 6-inch trail of thread for next
    time.


    ### Changing Seam Direction


    Some projects will require changing the direction of a seam. To do so, make a
    seam a few inches long. Stop the machine with the needle in the fabric (lower
    it by hand if it is up). Lift the presser foot, turn the fabric 90 degrees, and
    lower the presser foot. Continue sewing for a few inches (Figure [3-20](#A371637_1_En_3_Chapter.html#Fig21)).
    Practice pinning fabric together and creating seams. Cut a curve and sew a seam
    along it, and practice clipping the curve. Clipping means to make little notch
    cuts from the edge of the fabric to the seam to make the seam lay flatter.


    ![A371637_1_En_3_Fig20_HTML.jpg](A371637_1_En_3_Fig20_HTML.jpg)


    Figure 3-20.


    Changing seam direction


    ### Trying Out Types of Stitches


    If your machine has a variety of stitches available, go ahead and try them all.
    Some stitches may require different presser feet and/or needles.


    #### Double or Stay Stitch


    After sewing the stitch on the seam line, sew it again 1/4 inch inside away from
    the first stitch in the seam allowance using a straight or zigzag stitch (Figure
    [3-21](#A371637_1_En_3_Chapter.html#Fig22)).


    ![A371637_1_En_3_Fig21_HTML.jpg](A371637_1_En_3_Fig21_HTML.jpg)


    Figure 3-21.


    Stay stitch


    #### Ease or Gather Stitch


    Sew along the seamline using long straight stitches, leaving 3 to 4 inches of
    thread at each end of the seam. Pull the thread ends to adjust for fit (Figure
    [3-22](#A371637_1_En_3_Chapter.html#Fig23)).


    ![A371637_1_En_3_Fig22_HTML.jpg](A371637_1_En_3_Fig22_HTML.jpg)


    Figure 3-22.


    Ease (or gather) stitch


    #### Edge Stitch


    Stitch close to the edge of the fabric and cover the edge with your stitching
    (Figure [3-23](#A371637_1_En_3_Chapter.html#Fig24)).


    ![A371637_1_En_3_Fig23_HTML.jpg](A371637_1_En_3_Fig23_HTML.jpg)


    Figure 3-23.


    Edge stitch


    #### Top Stitch


    On the right or outside of the fabric, stitch very close to the seam. Use the
    presser foot as a guide (Figure [3-24](#A371637_1_En_3_Chapter.html#Fig25)).


    ![A371637_1_En_3_Fig24_HTML.jpg](A371637_1_En_3_Fig24_HTML.jpg)


    Figure 3-24.


    Top stitch


    #### Back Stitch


    After sewing a seam to complete a piece, stop the machine, put the machine in
    reverse, and make a few stitches along the same seam line. Then go forward again
    to the end of the piece. Figure [3-25](#A371637_1_En_3_Chapter.html#Fig26) shows
    the “reverse” button on a machine—typically it is a button or lever like the one
    shown. (It is the button on the right with the arrow turning around “over the
    top.”)


    ![A371637_1_En_3_Fig25_HTML.jpg](A371637_1_En_3_Fig25_HTML.jpg)


    Figure 3-25.


    The reverse button (on top right)


    There are many more types of stitches. The best way to see them in context is
    to take a pattern and try actually making something.


    ### Stitches in Context


    Figure [3-26](#A371637_1_En_3_Chapter.html#Fig27) is a sketch of a vest you will
    make in Chapter [4](#A371637_1_En_4_Chapter.html). You can see where I will use
    some of the stitches. Even something as simple as a vest has a few pieces that
    are not obvious and that require a variety of stitches.


    ![A371637_1_En_3_Fig26_HTML.jpg](A371637_1_En_3_Fig26_HTML.jpg)


    Figure 3-26.


    Stitches for the vest in Chapter [4](#A371637_1_En_4_Chapter.html)


    In Chapter [4](#A371637_1_En_4_Chapter.html) you will see more of this stitching
    in action. Most of the time there is no “right” way to stitch something. You can
    try different things to see what will work. For example, in Chapter [4](#A371637_1_En_4_Chapter.html)
    we topstitched a few places just to show the effect (not shown here).


    ## Summary


    This chapter introduced the basics of sewing by hand and with a standard sewing
    machine. It also discussed what you will need to begin to sew, showed several
    common stitches, and talked about how to thread a standard sewing machine and
    common sewing terms. It will be helpful to practice sewing straight stitches,
    sewing a curve, edge stitching, and finishing a seam on scraps of fabric before
    you begin your first project in the next chapter.'
  trans: '

    ### 安装梭芯


    在较新型号的缝纫机上，请按照机器上的图示安装梭芯，将梭芯放入机针下方的梭芯套内（图 3-18）。在某些机器上，梭芯套可能位于机身前侧或底部侧面（图 3-19）。不同机器的布局虽有差异，但通过这两个示例可以了解基本原理。


    ![A371637_1_En_3_Fig19_HTML.jpg](img/A371637_1_En_3_Fig19_HTML.jpg)


    图 3-19. 在另一款设计的机器上，梭芯位于机身前侧靠近底部的位置


    ![A371637_1_En_3_Fig18_HTML.jpg](img/A371637_1_En_3_Fig18_HTML.jpg)


    图 3-18. 一台现代缝纫机上的梭芯穿线方向


    将绕满线的梭芯放入梭芯套内的梭芯腔中，确保线按照机器图示指定的方向送出。


    握住梭芯套上的锁扣，将梭芯套推入机器上的安装位置，然后松开锁扣。松开锁扣后，梭芯套应能锁定到位。拉出几英寸的梭芯线。


    将压脚抬起，用左手轻轻捏住机针的线。朝自己的方向（逆时针）转动手轮一整圈，直到机针没入梭芯套中。继续捏住线并转动手轮，直到机针再次升至最高位置。当机针上升时，梭芯线也会形成一个线环。将线向左拉出，将梭芯线环从梭芯套中进一步拉出。将机针线和梭芯线一起向后拉出
    4 到 6 英寸（约 10 到 15 厘米），远离自己。此时，你可以在之前的图 3-17 中看到已经穿好线的机针。现在，你（终于）可以开始缝纫了！


    ## 试机缝纫


    在开始任何项目之前，最好先练习使用缝纫机。利用下面列出的基本针法以及一些碎布头，练习将布料放在压脚下方、手动转轮降下机针、放下压脚（使用之前抬起压脚的同一杠杆）、缝纫、更换针法、使用倒缝、移除布料以及剪断线头。大多数缝纫机在机针旁边都配有切线刀——或者使用锋利剪刀。


    要将机针从布料中取出，朝自己的方向转动旋钮，直到机针处于最高位置并离开布料，抬起压脚，然后将布料从压脚下拉出。留出 4 到 6 英寸（约 10 到 15 厘米）的线头，以备下次使用。


    ### 改变缝纫方向


    有些项目需要改变缝线的方向。操作方法如下：先缝几英寸长的线迹。当机针在布料中时停止机器（如果机针抬起，则手动将其降下）。抬起压脚，将布料旋转 90 度，然后放下压脚。继续缝几英寸（图
    3-20）。练习将布料别在一起并制作缝线。剪出一条曲线并沿着曲线缝纫，同时练习在曲线上剪牙口。"剪牙口"指的是从布料边缘向缝线处剪出小的 V 形切口，以使缝线更平整。


    ![A371637_1_En_3_Fig20_HTML.jpg](img/A371637_1_En_3_Fig20_HTML.jpg)


    图 3-20. 改变缝纫方向


    ### 尝试不同类型的针法


    如果你的缝纫机有多样化的针法可选，不妨全部尝试一下。某些针法可能需要不同的压脚和/或机针。


    #### 双针缝纫或加固缝


    沿缝线缝完第一道线后，在缝份内距第一道线 1/4 英寸（约 6 毫米）处，使用直线针迹或之字形针迹再缝一道线（图 3-21）。


    ![A371637_1_En_3_Fig21_HTML.jpg](img/A371637_1_En_3_Fig21_HTML.jpg)


    图 3-21. 加固缝


    #### 缩缝针迹


    沿缝线使用长直线针迹缝纫，在线缝两端各留下 3 到 4 英寸（约 7.5 到 10 厘米）的线头。拉动线头来调整松紧度（图 3-22）。


    ![A371637_1_En_3_Fig22_HTML.jpg](img/A371637_1_En_3_Fig22_HTML.jpg)


    图 3-22. 缩缝针迹


    #### 边缘缝


    贴近布料边缘缝纫，用针迹覆盖边缘（图 3-23）。


    ![A371637_1_En_3_Fig23_HTML.jpg](img/A371637_1_En_3_Fig23_HTML.jpg)


    图 3-23. 边缘缝


    #### 面缝


    在布料的正面或外侧，紧贴缝线进行缝纫。以压脚作为引导（图 3-24）。


    ![A371637_1_En_3_Fig24_HTML.jpg](img/A371637_1_En_3_Fig24_HTML.jpg)


    图 3-24. 面缝


    #### 倒针缝


    当完成一片衣片的缝纫后，停止机器，将机器设置为倒缝模式，沿同一条缝线缝几针。然后再向前缝至衣片末端。图 3-25 展示了机器上的“倒缝”按钮——通常是一个类似图中所示的按钮或杠杆（即右侧那个带有“绕过头顶”箭头图案的按钮）。


    ![A371637_1_En_3_Fig25_HTML.jpg](img/A371637_1_En_3_Fig25_HTML.jpg)


    图 3-25. 倒缝按钮（位于右上角）


    还有更多种类的针法。要了解它们在实际中的应用，最好的方法是拿一个纸样，尝试真正制作一件东西。


    ### 针法的实际应用


    图 3-26 是你在第 4 章中将要制作的一件背心的草图。你可以看到其中一些针法将用在何处。即使是一件简单的背心，也包含几块不显眼却需要用到多种针法的部件。


    ![A371637_1_En_3_Fig26_HTML.jpg](img/A371637_1_En_3_Fig26_HTML.jpg)


    图 3-26. 第 4 章背心所使用的针法


    在第 4 章中，你将看到这些针法的更多实际运用。大多数情况下，缝纫并没有绝对的“正确”方法。你可以尝试不同的方法来观察效果。例如，在第 4 章中，我们就在几个位置进行了面缝，以展示其效果（此处未显示）。


    ## 本章小结


    本章介绍了手工缝纫和使用标准缝纫机进行缝纫的基础知识。还讨论了开始缝纫所需准备的事项，展示了几种常见针法，并讲解了如何穿引标准缝纫机的线以及常用缝纫术语。在开始下一章的第一个项目之前，先在碎布头上练习缝直线、缝曲线、边缘缝以及处理缝线末端，将会很有帮助。

