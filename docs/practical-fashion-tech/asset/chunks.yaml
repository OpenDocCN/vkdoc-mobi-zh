  trans: '

    ### CNC 铣削


    `CNC` 铣床是一种计算机控制的切割机器。它在三维空间中移动切割刀具以去除材料，类似于 3D 打印机添加材料的方式。与激光切割机或 3D 打印机相比，`CNC`
    铣床可以加工更多种类的材料，范围从`EVA`泡沫到某些金属，但这是一个更脏乱的过程，涉及将切下的小块材料抛到一边。即便如此，这些机器可能比激光切割机更适合家庭工作室，因为它们不会释放烟雾和有害气体，只会产生那种可以用扫帚或干湿两用吸尘器清理的杂物。


    当加工金属等硬质材料时，`CNC` 铣削可能需要非常慢速，但对于泡沫或机加工蜡等较软的材料，加工大型零件时它可能比 3D 打印更快。`CNC` 铣床的价格通常也低于同等尺寸的激光切割机，但对于设计用于从金属上切割复杂形状的工业机器来说，价格可能会相当高。`Othermill`、`Inventables`
    和 `Carbide 3D` 是爱好者级机器的热门品牌。


    ## 构建技术


    你可以使用多种材料来制作道具或戏服盔甲——这些复杂的形状可能太大而无法 3D 打印。在本节中，我们将向你介绍一些在角色扮演社群中常用的构建技术。显然，从木材到铝箔和管道胶带，有无数种工艺材料可供选择。我们这里只涉及一些更具“技术含量”的材料。


    ### 泡沫盔甲


    角色扮演者通常想要制作想象中的盔甲或武器。一种常见的方法是切割和弯曲乙烯-醋酸乙烯酯（`EVA`）泡沫板，这种材料常用于地垫。这项技艺最知名的实践者之一是比尔·多兰，他于
    2012 年与妻子布列塔尼共同创立了 Punished Props（`www.punishedprops.com`）。他们拥有丰富的资源，包括一个 YouTube
    频道（`www.youtube.com/user/punishedprops`）以及在其网站上出售的《`Foamsmith`》系列书籍。


    Punished Props 最初承接委托制作，如今多兰主要培训人们使用这些技术。他和妻子为自己制作的最喜欢的个人角色扮演服装来自电子游戏《`Skyrim`》。他们扮演的是尸鬼死亡领主，身披锈迹斑斑的旧盔甲，骷髅面孔，眼睛发光。他热情洋溢地说，他们看起来“非人类”。


    多兰说，一件好的角色扮演服装的关键是“选择一个你真正热爱的角色，并确保这是你痴迷的东西。”他还说，制作一整套泡沫盔甲可能需要数月时间，所以你真的需要非常想穿上这些服装！


    这个过程包括从`EVA`泡沫（可以是地垫形式或购买的大卷材）开始，然后使用类似于缝纫用的纸样将其切割成所需形状（见图`12-4`）。之后，你使用各种工具来弯曲和修饰它。`EVA`泡沫可以很容易地用剃刀刀片切割（尽管比尔警告说这会很快使刀片变钝）、带锯甚至激光切割机切割。你可以使用旋转工具（例如`Dremel`生产的工具）进行细节加工。


    ![A371637_1_En_12_Fig4_HTML.jpg](img/A371637_1_En_12_Fig4_HTML.jpg)


    图 12-4. 制作初期的`EVA`泡沫服装部件（图片由 Bill Doran / Punished Props 提供）


    比尔说，很多技术都涉及如何将这些部件绑在穿着者身上、了解下面该穿什么，以及弄清楚如何将部件粘合在一起。完成并上漆的道具部件可能会非常壮观（见图`12-5`和图`12-6`）。


    ![A371637_1_En_12_Fig6_HTML.jpg](img/A371637_1_En_12_Fig6_HTML.jpg)


    图 12-6. 完成并上漆的`EVA`头盔（图片由 Bill Doran / Punished Props 提供）


    ![A371637_1_En_12_Fig5_HTML.jpg](img/A371637_1_En_12_Fig5_HTML.jpg)


    图 12-5. 完成并上漆的`EVA`剑（图片由 Bill Doran / Punished Props 提供）


    ### 真空成型


    热成型是将塑料薄片加热，使其能够拉伸并成型为模具形状的过程。一种常见的热成型形式是真空成型，其过程是先将加热的塑料片拉伸覆盖在模具或成型件上，然后用框架将其密封在真空台上，以便抽走空气，在塑料重新硬化之前将其紧压在模具表面上。这是制作面具等物品的常用方法，几乎所有《星球大战》暴风兵角色扮演盔甲都是这样制成的。


    透明的面部或眼部罩面可以通过对透明塑料进行真空成型，作为较大服装的一部分来制作。许多爱好者通过制作一个顶部带孔的箱子，并在侧面连接一个干湿两用吸尘器来抽气，从而搭建自己的真空成型台。更专业的真空成型机包含用于加热塑料的加热元件，但其他机型可能需要你先将装有塑料的框架在烤箱中加热，然后再转移到真空成型机上。


    ### Worbla


    还有一些塑料被设计为无需模具即可成型。像`Worbla`、`Sintra`、`Wonderflex` 和 `Terraflex` 这类产品可以用热风枪软化，然后手工塑造成复杂的形状。这些材料可用于制作道具和盔甲，或者仅仅用来制作要附着在较大部件上的细节部分。有几本书（包括
    Svetlana Quindt 所著的《*The Book of Cosplay Armor Making with Worbla and Wonderflex*》）列在`www.worbla.com/?cat=33`，该书的作者也有一个
    YouTube 频道`www.youtube.com/user/Mogrymillian`。


    > **注意**：一如既往，在使用本章所述材料时，务必遵守制造商关于通风和其他防护装备的说明。


    ## 其他想法


    还有无数的工艺材料和工具可供尝试。以下是另外几种也许对你有用的技术和工具：


    - `Pepakura` 是一种通过制作可折叠形成曲面的裁剪纸样来创建实物的技术。（这与折纸略有不同，折纸是从一张正方形纸开始制作更精致的作品。）各种软件包都可以实现这一点，例如
    `Autodesk 123D Make`（`www.123dapp.com/make`）。用这种方法制作的物品不是很坚固，但形状可能很有趣。激光切割机是切割
    `pepakura` 纸样的好工具。

    - 乙烯基切割机顾名思义：一种计算机控制的刀具，可从薄薄的乙烯基卷材上切割出形状。如果你想在某物上（比如花哨的字体）拥有薄表面、彩色的剪裁设计，它会很有用。

    '
- fmt: '# Painting


    Once you have made something out of plastic or foam, it will probably still look
    like it’s made of plastic or foam. Assuming that is not what you’re going for,
    it is now time to paint. Making your creation look scratched and dirty (known
    as weathering) can make it look even more real.


    Paints for these applications are usually sprayed on, either with an aerosol paint
    can (known as a rattle can) or with an airbrush, to create an even look without
    brush strokes. You will usually want to use a primer first and then apply the
    color of your base layer. Depending on the effect you want, you may lay down many
    layers of paint, and you can mask off different areas while spraying to get sharp
    boundaries between sprayed and un-sprayed areas.


    Weathering can involve techniques like brushing on paint and then removing it,
    intentionally spilling coffee on your shiny new thing, and painting the edges
    with metallic paints so that it looks like paint has chipped off of those areas.


    Once it is all done and dry, you’ll probably want to put a clear coat over everything
    so that your fake damage does not fall prey to real damage. For more on painting
    and weathering, we recommend *Painting and Weathering for Props & Replicas* by
    Harrison Krix of Volpin Props, which you can find at [`www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/`](http://www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/).


    **Tip**: To paint 3D-printed pieces (other than weathering them), acrylic paint
    works on `PLA` or `ABS`. Nylon can be dyed with appropriate (nylon) fabric dye.


    # Summary


    This chapter covered other tools and techniques that are not talked about in depth
    in other chapters. First we reviewed cutting tools like laser cutters and CNC
    machines. Next, we explored structural techniques like making armor from foam,
    vacuum forming, forming with `Worbla`, and vacuum forming. Finally, we introduced
    `pepakura` and vinyl cutting, and wound things up with some thoughts about painting
    your creations.


    # 13. A Look Ahead


    In this book so far the three of us have presented projects that we feel are within
    reach of beginners, or for those who may be a bit more advanced in just one aspect
    of the triad of sewing, electronics, and programming. In this final chapter we
    wind up the book with some more aspirational projects, showing what professional
    designers and artists can do with some of these technologies. We also speculate
    a little on where the technology may go from here, featuring a few examples from
    the research lab.


    ## 3D-Printed High Fashion


    Fashion items using 3D printing have become commonplace at the haute couture end
    of the spectrum. Industry website `3Ders.org` recently compiled a list of their
    top 15 choices at [`www.3ders.org/articles/20160225-3ders-top-15-list-of-our-favorite-3d-printed-dresses.html`](http://www.3ders.org/articles/20160225-3ders-top-15-list-of-our-favorite-3d-printed-dresses.html).
    You can see the wide range of styles by clicking through their list. Or, if you
    search online for the phrase “3D printed dress,” you will find things both beautiful
    and cringeworthy.


    ### The Dita von Teese Dress


    In 2013, one of the first examples of an entirely 3D-printed dress was designed
    by Michael Schmidt and Francis Bitoni for Dita von Teese ([`www.michaelschmidtstudios.com/dita-von-teese.html`](http://www.michaelschmidtstudios.com/dita-von-teese.html)).
    Schmidt describes himself on his website as a “wardrobing and jewelry designer”
    with a roster of celebrity clients. The von Teese dress was created of tiny, articulated,
    interconnected nylon parts, sort of like chain mail, that were printed on nylon
    powder printers and then dyed black. There is a good “making of” video on the
    `Shapeways` website: [`www.shapeways.com/blog/archives/1952-revealing-dita-von-teese-in-a-fully-articulated-3d-printed-gown.html`](http://www.shapeways.com/blog/archives/1952-revealing-dita-von-teese-in-a-fully-articulated-3d-printed-gown.html).


    ### Nervous System


    Jessica Rosenkrantz and Jesse Louis-Rosenberg cofounded `Nervous System` ([`http://nervo.us`](http://nervo.us)),
    a “generative studio,” in 2007. Their vision is: “Drawing inspiration from natural
    phenomena, we write computer programs based on processes and patterns found in
    nature and use those programs to create unique and affordable art, jewelry, and
    housewares.” The implementation of that vision is spectacular.


    Their `Kinematics` dresses are printed by a nylon powder printer, like the Von
    Teese dress. Their key innovation, though, is that `Nervous System` developed
    software that creates their designs custom for a particular wearer. Figure 13-1
    shows their `Kinematics Dress 2`, worn by Rosenkrantz.


    ![A371637_1_En_13_Fig1_HTML.jpg](A371637_1_En_13_Fig1_HTML.jpg)


    **Figure 13-1.** The `Kinematics Dress 2` worn by its designer. Image courtesy
    of `Nervous System`.


    The dresses are made from structures (like those in Figure 13-2) that can articulate
    freely. They come out of the 3D printer already assembled and (after blowing off
    the excess powder) ready to wear.


    ![A371637_1_En_13_Fig2_HTML.jpg](A371637_1_En_13_Fig2_HTML.jpg)


    **Figure 13-2.** Swatch of `Kinematics` structure showing hinge details. Image
    courtesy of `Nervous System`.


    Another `Nervous System` innovation was the software used to create a 3D-printable
    model of the dress. This model is tightly folded and printed in one piece in a
    selective laser sintering (`SLS`, powder-based) 3D printer. Figure 13-3 shows
    what one of the `Kinematics` line of dresses looked like when pulled from the
    printer before the excess powder was removed. By the way, if you were wondering,
    `Nervous System` says that `Kinematics` pieces can be hand-washed using mild soap
    and water and a soft-bristled brush.


    ![A371637_1_En_13_Fig3_HTML.jpg](A371637_1_En_13_Fig3_HTML.jpg)


    **Figure 13-3.** The `Kinematics Dress 1` before all the excess powder was removed.
    Image courtesy of `Nervous System`.


    Pieces like this cannot be printed on filament-based 3D printers like those we
    talk about in Chapter 9; the shapes are so complex and delicate that the support
    needed for filament printing would be prohibitive to remove. `SLS` printers have
    the virtue that the powder acts as a support that can just be blown away at the
    end. The drawback is that the powder is very fine and hard to manage. `SLS` printers
    are still industrial machines at the moment, and the prints are expensive as of
    this writing, but who knows how technologies will evolve.


    The pair has continued to innovate, and in 2016 they created the `Kinematic Petals
    Dress` (Figure 13-4), commissioned by the Museum of Fine Arts in Boston. Of this
    dress they say, “Inspired by petals, feathers, and scales, we developed a new
    textile language for `Kinematics` where the interconnected elements are articulated
    as imbricating shells. Like our previous garments, this dress can be customized
    to the wearer’s body through a 3D scan, and additionally, each element is now
    individually customizable: varying in direction, length, and shape.” They note
    that they had to develop new software to allow for the overlapping petals when
    the design is folded for 3D printing. Spend some time on the `Nervous System`
    website if you want to be truly intimidated by what world-class designers can
    do with this technology.


    ![A371637_1_En_13_Fig4_HTML.jpg](A371637_1_En_13_Fig4_HTML.jpg)


    **Figure 13-4.** The `Kinematics Petals Dress`. Image courtesy of `Nervous System`.


    ## Electronic Fashion


    In another era, gowns were encrusted with jewels. Now `LEDs`, sensors, and mechanisms
    seem to be taking their place. Some of these creations have been developed as
    technology demonstrations, but others are becoming mainstream red-carpet attire.'
  raw: '## Painting


    Once you have made something out of plastic or foam, it will probably still look
    like it’s made of plastic or foam. Assuming that is not what you’re going for,
    it is now time to paint. Making your creation look scratched and dirty (known
    as weathering) can make it look even more real.


    Paints for these applications are usually sprayed on, either with an aerosol paint
    can (known as a rattle can) or with an airbrush, to create an even look without
    brush strokes. You will usually want to use a primer first and then apply the
    color of your base layer. Depending on the effect you want, you may lay down many
    layers of paint, and you can mask off different areas while spraying to get sharp
    boundaries between sprayed and un-sprayed areas.


    Weathering can involve techniques like brushing on paint and then removing it,
    intentionally spilling coffee on your shiny new thing, and painting the edges
    with metallic paints so that it looks like paint has chipped off of those areas.


    Once it is all done and dry, you’ll probably want to put a clear coat over everything
    so that your fake damage does not fall prey to real damage. For more on painting
    and weathering, we recommend Painting and Weathering for Props & Replicas by Harrison
    Krix of Volpin Props, which you can find at [`www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/`](http://www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/)
    .


    Tip


    To paint 3D-printed pieces (other than weathering them), acrylic paint works on
    PLA or ABS. Nylon can be dyed with appropriate (nylon) fabric dye.


