    \ discover that you cannot find a library that matches your particular board and\
    \ sensor hardware. In our case, for this example we went back to the [`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)\
    \ page we started on. There were several examples there. We decided to try the\
    \ final one because it seemed to be clear about what its assumptions were and\
    \ it was easy to check that the assumptions were right by cross-checking with\
    \ the Wikipedia page that described the equaiton; we thank the author of this\
    \ page for putting his or her Arduino sketch out freely.\n\nListing [8-1](#A371637_1_En_8_Chapter.html#Par44)\
    \ shows this Arduino sketch, with an additional piece that turns on an LED in\
    \ the circuit if the temperature is between a given range.\n\n```\n// A sketch\
    \ that turns on an LED attached to LEDPIN\n// If the thermistor at THERMPIN is\
    \ in a given temperature range\n// Thermistor calibration from\n// playground.arduino.cc/ComponentLib/Thermistor2\n\
    // modified to make a bit more general and add output\n#include \n#define THERMPIN\
    \ A0\n#define LEDPIN 9\n// enumerating 3 major temperature scales\nenum {\nT_KELVIN=0,\n\
