- fmt: '### Planning a Program: Flowcharting


    If you get a little ways into the robot coding thought experiment we just suggested,
    you might have already discovered the importance of planning out a coding project
    in meticulous detail before writing a line of code. Otherwise you may never get
    something to work. A common way to plan out code is with a flowchart, like the
    one in Figure [6-1](#A371637_1_En_6_Chapter.html#Fig1). This diagram shows a program
    that starts, has some things set up and defined, and then runs as long as nothing
    makes it stop.


    ![A371637_1_En_6_Fig1_HTML.jpg](A371637_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. A flowchart


    Joan likes to draw out a high-level flowchart of code first and then write some
    notes on the hand-drawn sketch. For bigger projects, she will list out all the
    functions first before starting to code, and then might look for an example to
    pull pieces out of for what she wants to do once she gets to that stage. For Arduino
    projects, Rich usually starts by searching online to find a pre-existing open
    source example that is close to what he wants and then adapts it, or combines
    several such examples. As a beginner, you will probably use a mix of these styles.


    ## Arduino Code Conventions


    The flowchart in Figure [6-1](#A371637_1_En_6_Chapter.html#Fig1) actually is how
    Arduino code is laid out. All programs contain `setup()` and `loop()`, which are
    functions, or pre-defined words that are special.


    > **Note:** Virtually all modern computer code is case-sensitive. `Setup()` has
    nothing to do with `setup()`, and it is a bad idea to mix names of things that
    are very similar because it is easy to confuse yourself.


    The `setup()` function in an Arduino includes everything you do once. That might
    include setting up things that need to start at zero, telling the Arduino which
    pins it might be reading data from or writing data to, and doing similar housekeeping.
    The `loop()` function is where the action is. The Arduino will keep going around
    and around in `loop()` (starting over at the top of the code when it gets to the
    bottom) until something interrupts it (turning off the power, hitting the reset
    button, and so on).


    For historical reasons, programs to run on Arduinos are called sketches by some
    people, and just programs by others. The environment we will program in is called
    the IDE (pronounced “eye-dee-eee”), short for Integrated Development Environment.
    This environment provides some structures “behind your back” to load and run your
    programs. Free and open source, the IDE is available at [`www.arduino.cc`](http://www.arduino.cc),
    along with instructions for installing it.


    The Arduino IDE originated as a programming environment called Processing, which
    was designed to do quick drawings and animations (hence the idea of programs as
    sketches). Processing is still around (also free and open source) and available
    at [`www.processing.org`](http://www.processing.org). A screen shot of the IDE
    is shown in Figure [6-2](#A371637_1_En_6_Chapter.html#Fig2). There are various
    different types of Arduino-compatible boards, and the IDE will create different
    code for different boards. We talk about this later in the chapter.


    ![A371637_1_En_6_Fig2_HTML.jpg](A371637_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. The Arduino IDE default sketch. Note that it tells you on the bottom
    right what type board it thinks that you are using.


    > **Note:** At this point we want to stop and acknowledge all the people who have
    put time and effort into the Creative Commons Arduino ecosystem. You can read
    more about its history and appropriate licensing for it at `Arduino.cc`.


    ### Format Conventions


    Most programming languages follow some conventions that you just have to learn,
    like vocabulary in a new language. We show some examples to get you started. In
    general, it is a good idea to start with an example and edit it until syntax is
    second nature. You might consider making yourself a little template that you always
    start with, like the following (we explain what a comment is in a minute):


    ```

    // Write comments here about what the code does

    // Say who wrote it and when the last edit was

    // List license terms or any restrictions on how this can be copied

    void setup() {

    // code to be done once here

    }// end setup()

    void loop() {

    // code to be repeated here

    }// end loop()

    //end

    ```


    You can see what a similar sketch looks like in the Arduino IDE in Figure [6-2](#A371637_1_En_6_Chapter.html#Fig2).


    ### Things People Find Intimidating


    People often look at computer code and panic, because it looks pretty obscure
    and they are afraid of breaking something. If you are orderly about it and learn
    the conventions of how programs are constructed, you will pick it up reasonably
    quickly. If you think of it as a foreign language created by people rather than
    something dropped down by robot overlords, you may get there faster.


    #### Syntax Pickiness


    Computers do not know what you mean, and they are very literal. Typos in code
    will generally cause the code to do something you did not intend. Some problems
    are caught by the compiler (the program you run to turn your human-readable code
    into something the machine can understand), but not everything. Be very careful
    typing in code from examples. In some languages like FORTRAN and Python, formatting
    and the position of tabs and line breaks matters to the code execution. The C++
    language underlying Arduino coding, fortunately, does not have these issues.


    Notice that the curly brackets `{` and `}` say, “Everything between these brackets
    is part of the same block of code.” Different people have different ways they
    like to use and lay out brackets, name variables, and so on. It is often very
    hard for people who learn one way to work with people who have learned another,
    trivial though it sounds. Sometimes the end of a function like `loop()` may be
    pages away from the start, and Joan learned the convention (shown in the preceding
    example) of always noting with a comment what piece of code each ending bracket
    closes. Rich, on the other hand, learned to keep track of these things with precise
    and consistent use of indentation and white space. Good programming practices
    include:


    - Pick a formatting standard and stick to it. If you are writing code with someone
    else, come up with a style guide before you start to avoid arguments later on.
    For example, Rich and Joan are both really bad at consistently using each other’s
    conventions, and we have to cross-check to avoid errors.

    - Flowchart and plan ahead; do not just jump in and start coding. Usually whatever
    you write without planning needs to be thrown away, particularly in the beginning.
    Look to see if an open source version already exists, too, or perhaps a library
    (more about that in a later section).

    - Avoid single-letter variable names; use names that say what the variable does,
    like `inputPin`. The lone exception to this is for loop counters (which we get
    to later in this chapter), which are often, by tradition, single letters.

    - Never use a `1` or a `0` in a variable or function name because it is hard to
    distinguish from the letters `l` and `o`.

    - Variable names cannot have spaces in them. People get around this with underscores
    or by using “camel case” (names like `cornerValue`, or `inputFile` with a “hump”
    in the middle).

    - Comment your code. Your future self will thank you!


    ### Programming Vocabulary and Ideas


    As we mentioned, the Arduino uses a variant of the C++ programming language, which
    is a relative of some other languages like C, Java, and Python. We give a brief
    vocabulary lesson here and then go on to examples.'
