- fmt: '### Making a Pattern


    It may turn out that either you are inventing something that does not exist yet,
    or you just can’t find a pattern you like. In that case, there are many costume
    books and websites that include simple pattern drawings and instructions for enlarging
    the pattern. Some that I like include Barbara and Cletus Anderson’s book *Costume
    Design, 2nd Edition* (Harcourt Brace College Publishers, 1999); Shirley Dearing’s
    *Elegant Frugal Costumes* (Meriwether Publishing, 1992); Sheila Jackson’s *Costumes
    for the Stage, Second Edition* (New Amsterdam Books, 2001); and Nancy Bradfield’s
    *Costume in Detail 1730–1930* (Costume and Fashion Press, an imprint of Quite
    Specific Media Group, 1997). I am also a fan of the websites [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com)
    and [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns).


    Another way to create a pattern is to carefully deconstruct a piece of clothing.
    You can reuse older garments that fit as a pattern for a new piece. Choose a piece
    you would like to duplicate and use a seam ripper to undo the seams. It is probably
    best to use something that is old and worn, or that you no longer want. Buying
    something from a secondhand store just for this purpose is also an option. Use
    the pieces as a pattern, or use them to make a paper pattern.


    After you learn how the garment is put together, you may want to alter parts for
    other costumes—for example, making shorter or longer skirts, dresses, or pants,
    or adding longer or blousier sleeves or different collars.


    Pattern tissue can be found online and in fabric stores, but you may also use
    butcher paper, brown paper bags (as I did for the example in this chapter), or
    any other paper that you can draw on, pin to the fabric, and cut out. Newspaper
    is not recommended because the ink smears and it is difficult to see any markings
    you make.


    **Note**


    As laser cutters become more common in public makerspaces, you may want to create
    a pattern that you can use on one of those machines. Laser cutters can create
    very complex shapes very easily. For example, the Adobe Illustrator software package
    (`www.adobe.com/products/illustrator.html`) is a good tool for creating electronic
    sewing patterns, although it has a significant learning curve. You will want to
    create a file with 2D vector graphics (as opposed to raster graphics) to be able
    to cut on a laser cutter.


    Because readily available laser cutters are quite new, this is an area that will
    probably expand significantly in the near future (try searching on “digital sewing
    pattern”). Note, though, that the electronic patterns intended for downloading,
    printing out in pieces, and sewing on a sewing machine likely will not be useful
    for laser cutting. Even if the format is correct, some work on the file will be
    needed to cut the correct lines.


    ### Basic Pattern Shapes and Pieces


    Pants and shirts are created from a few basic shapes. Pants can be made with one
    pattern piece, cutting it out of two pieces of fabric and adding elastic to the
    waist or creating a waistband. It can be upgraded by adding a placket for a zipper,
    hook and loop closures, buttons, or snaps.


    Shirts can be made with as little as three pattern pieces—front, back, and sleeves.
    A more elaborate shirt or blouse will have collar, cuff, and button tabs or zippers.


    ### Choosing Fabric


    The back of the pattern envelope will list recommended fabrics for the best results.
    It is best to choose a fabric from these to ensure that your project fits and
    hangs properly on your body. For the vest project, do not use stretch knits. There
    will also be a list of notions needed: thread, zippers, buttons, snaps, and so
    on.


    **Tip**


    Most fabric has sizing in or on it when you purchase it. Sizing is a solution
    that is used to keep fabric looking crisp and unwrinkled on the bolt. I recommend
    washing and drying the fabric, in whatever temperature you will normally wash
    the garment after it is completed, before cutting out the pattern. This will preshrink
    the fabric and eliminate the chance of the completed garment not fitting properly.
    Of course, if you are using a fabric that should not be washed, don’t wash it.
    Dry clean it when necessary.


    ### Figuring Out How Much Fabric You Need


    Patterns come with an estimate of how much fabric to buy. If you are creating
    your own pattern, you can determine how much to buy by first measuring the pattern
    pieces you are going to use, or the body or object you intend to cover. Fabric
    comes in different widths. In the United States, the most common widths are 40
    and 60 inches wide. Remember all the pattern pieces need to run in the same direction.
    If you cut things out all over the place just because they fit on the fabric and
    you want to use as little fabric as possible, the garment or item will look odd
    and not fit very well. If the fabric has a stripe or pattern you want to match
    on the front or back, you will need a bit extra to be able to match it up evenly.


    ## Using a Pattern


    Once you have a pattern and fabric and are ready to go, you will need to lay the
    pattern out on the fabric and then cut it. This section talks about that in general,
    and you can see more photos in the vest creation example later on.'
