- fmt: '### Walking Through Some Examples


    To download the Arduino IDE on your computer, follow the instructions at [`www.arduino.cc/en/Main/Software`](http://www.arduino.cc/en/Main/Software).
    Download the appropriate Mac, Linux, or Windows version. On a Windows machine,
    you may also need to install drivers corresponding to the type of board you’re
    using. When you launch it, the IDE creates a window that you can use to edit code,
    like the one in Figure [6-2](#A371637_1_En_6_Chapter.html#Fig2).


    You can also get a lot of examples from the `File ➤ Examples` menu and look at
    them without having a physical Arduino board attached. To fake it out that you
    have a board attached for compiling purposes, go to the `Tools ➤ Board` menu and
    select `Arduino/Genuino Uno`, which is a pretty generic board.


    We suggest you take a look at the code in the following examples to see the code
    syntax and get the general idea:


    - `File ➤ Examples ➤ 01.Basics ➤ Blink`

    - `File ➤ Examples ➤ 05.Control ➤ ForLoopIteration`

    - `File ➤ Examples ➤ 05.Control ➤ IfStatementConditional`


    In the next section, we get into code for one regular Arduino example and transition
    into the wearables from there.


    ## Programming an Arduino


    You load programs from your computer onto your Arduino with a USB cable. To tell
    your computer what sort of Arduino you have, go to the `Tools ➤ Board` menu to
    set the board. If you do not see yours listed, use the `Tools ➤ Board ➤ Board
    Manager` to find and install specifications for it (you need to be connected to
    the Internet for this to work).


    You may also need to set port with `Tools ➤ Port` and, in a few cases, you may
    need to change other settings with `Tools ➤ Programmer`. The Arduino download
    page referenced earlier in the chapter offers a lot of assistance for specific
    circumstances.


    ### How the Arduino Thinks


    As mentioned, an Arduino can only do one thing at a time. Unlike a full computer
    (or even a Raspberry Pi), which can share resources to effectively go back and
    forth among a lot of tasks running more or less at the same time, an Arduino can
    just keep track of one program.


    An Arduino program comes in three parts. The first part does not have an official
    name, but it is the code ahead of the `setup()` function. This is where you define
    "global" variables (see the "Variables and Loops" section earlier in this chapter).
    This part does things like bring in libraries of code that someone else has already
    written, or perhaps defines things to be used later. You can create and set variables
    in this area, but you cannot do things like turn pins on and off.


    The next part of the code is in a function called `setup()`. This is for all the
    things that are done once and is generally where you''ll want to set the modes
    and initial states for your pins.


    Finally, we need to run the `loop()` code. This is where the Arduino does whatever
    you want it to do on an ongoing basis—for example, monitor a sensor, run a 3D
    printer, or wait for a button to be pressed.


    ### Compiling, Loading, Running


    To compile a program and just check that it works, click the check mark icon on
    the IDE (where the arrow points in Figure [6-4](#A371637_1_En_6_Chapter.html#Fig4)).
    To compile and load a program onto the Arduino, click the run arrow icon next
    to the check mark icon. Compiling takes the text version of the code you wrote
    and converts it to commands the computer can understand.


    ![A371637_1_En_6_Fig4_HTML.jpg](A371637_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. Click the check mark icon to compile code and check that it works.


    To run a program on an Arduino, attach a USB cable from your computer to your
    board. Be sure you set the `Board` and `Port` (and, for some wearable boards,
    the `Programmer`) settings correctly according to the specs for the board, as
    discussed at the beginning of the "Programming an Arduino" section. Click the
    "compile and load" right-pointing arrow icon (to the right of the check mark icon)
    to compile and check the code and upload it to your board.


    **Note**: Once you upload a program onto an Arduino, it is there until you load
    in something else. Disconnecting the power or resetting the Arduino does not erase
    code, though pushing the reset button does run `setup()` again.


    ### Adding Libraries


    Code libraries are collections of code that someone has already written and is
    sharing under some terms of use. You can use code libraries in your own code.
    There is some background at [`www.arduino.cc/en/Guide/Libraries`](http://www.arduino.cc/en/Guide/Libraries)
    that you may find helpful.


    The IDE has a Library Manager that can help you add libraries to your code. If
    you have a component that says it needs an outside library, go to `Sketch ➤ Include
    Libraries ➤ Manage Libraries` and search on what you need. For example, if we
    search on "Adafruit NeoPixel" (which we use later in the book), we get the window
    shown in Figure [6-5](#A371637_1_En_6_Chapter.html#Fig5) (note that you need to
    be connected to the Internet for this).


    ![A371637_1_En_6_Fig5_HTML.jpg](A371637_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. Installing a library


    If you click one of the library options that come up as the result of a search,
    you will have an option to install it if you have not already done so. Clicking
    Install will download the library for you to use on that computer (whether you
    are connected to the Internet or not). To add it to your code, use the following
    syntax:


    ```

    #include <LibraryName.h>

    ```


    For example, add the Adafruit NeoPixel library to your code by putting the following
    line at the top of your file (above anything other than other `#include` lines):


    ```

    #include <Adafruit_NeoPixel.h>

    ```


    **Tip**: Installing a library will also often add more examples to the `File ➤
    Examples` menu that you can use to see how to use the library. If no examples
    appear, clicking the link for more information will usually take you to a Github
    repository where you can look for a Readme file that may explain how to use the
    library.


    ### Using Preprocessor Directives


    You may have seen code that looks like this at the top of a sketch:


    ```

    #define PIN 3

    ```


    Lines like that are called preprocessor directives, or sometimes simply pound
    defines. This construct in this case replaces every instance of `PIN` (case sensitive)
    with `3`. That is convenient if you want to be able to set a pin number or similar
    constant everywhere. But it can be a little hazardous. If you had a variable named
    `PINAWAY`, it would become `3AWAY`, for example, because every time the string
    `PIN` appeared in the code it would be replaced with `3`. For this reason, it
    is common practice to use all-caps for names in preprocessor directives, and not
    for anything else.


    Why would you want to use a preprocessor directive, given the hazards? You may
    want to avoid it as a beginner, because of the possibility of unintended consequences.
    But for advanced coders, it can be an efficient way to make something that appears
    in a lot of different places in the code easy to change.'
