- fmt: "### Scheduling\n\nThe class schedule has to be somewhat flexible, since the\
    \ same project may take different students very different amounts of time to complete.\
    \ One student may start a project in week 3 and finish it in week 7, whereas another\
    \ may finish in week 5 and start something else that will finish in week 10. A\
    \ faculty member will need to be comfortable with students learning both from\
    \ her and from each other, lecturing infrequently but more often introducing material\
    \ one-on-one as a project needs it.\n\nThe class can also be built around just-in-time\
    \ learning—the first student who needs to learn something for his or her project\
    \ later passes it on to others, or others stop working and watch when someone\
    \ else learns something. This style works well in a small pilot class, but scaling\
    \ it up may require some thought. Thus, rather than a week-by-week specific schedule,\
    \ we describe a suggested mix of projects. A large class might require more structure.\n\
    \nThis class is difficult to run in hour-long chunks, since it takes a lot of\
    \ that time just to pull out the materials of the day and then put them away.\
    \ If possible we suggest scheduling it as a back-to-back double period or a scheduled\
    \ class with required after-school/Saturday time intensively for a few weeks of\
    \ the year (for example, to support building costumes for the school theater productions).\n\
    \n### Sharing Materials\n\nFor a large class, many people will need to share resources\
    \ like sewing machines, cutting tables, soldering stations, and so on. Phasing\
    \ projects so that people are working on different things helps with this sharing.\
    \ Think through how you will use your room when people start to get out of phase\
    \ or (perhaps more problematic) if they all get to the same point at the same\
    \ time.\n\nAlso think about where to store works-in-progress. If more than one\
    \ section is sharing materials, it may be frustrating or impractical to tear down\
    \ and dismantle circuits at the end of each class, so you may need a separate\
    \ set of materials for each class.\n\nBetween classes, though, that material needs\
    \ to live somewhere, and in our experience student projects always seem to expand\
    \ to fill all the available space plus an additional 10% that you wish you had.\
    \ Also, consider how to display (and how to select for display) exemplary projects.\n\
    \n### Classroom Environment\n\nProviding facilities for a fashion tech class can\
    \ be a challenge. Lab benches with stools that work well for electronics might\
    \ not work well for sewing, since sewing machines have foot pedals that might\
    \ not be reachable from a lab stool. If the class will be in an electronics room\
    \ or a sewing room, actually try out the activity that does not normally happen\
    \ in that room. For example, try sewing in the electronics room before the students\
    \ arrive.\n\nIt is difficult to show how to sew or assemble electronics so that\
    \ students in the whole room can actually see what you are doing. Consider emailing\
    \ students photos ahead of time or otherwise share them electronically. We have\
    \ experimented with a webcam and document cam, but one’s fingers tend to get in\
    \ the way.\n\n> **Tip**  \n> Be sure you have good task lighting for both electronics\
    \ and sewing.\n\n### Budget\n\nMaterials for this class can get pricey, depending\
    \ on whether you have every student build a project or have them work in teams,\
    \ and whether students can take their projects home or have to undo their sewn\
    \ circuits to recover the electronics. Your capital equipment budget (for sewing\
    \ machines and 3D printers) might be outstripped by the cumulative cost of small\
    \ electronics and fabric, notions, training, and machine maintenance.\n\n## Course\
    \ Resources\n\nMany students have trouble with open-ended design and invention.\
    \ The resources offered in this section may help. Define a project start point\
    \ that is neither too broad nor too narrow. Suggesting that students create a\
    \ simple prop or costume piece for an upcoming show, for instance, might be focused\
    \ enough to get students started.\n\nTeaching others to design requires a delicate\
    \ balance between direction and encouragement of self-expression. There are many\
    \ good books on this topic from the design education literature, but most are\
    \ aimed at undergraduates for in-class use. For college students, or for a high\
    \ school instructor’s background and preparation, we suggest:\n\n*   Donald Norman’s\
    \ classic *The Design of Everyday Things* (Basic Books, 2002)\n*   Henry Petroski’s\
    \ books, notably *To Engineer is Human* (Vintage Books, 1992)\n*   Peter Forbes’s\
    \ *The Gecko’s Foot* (Norton, 2005) for biomimetic ideas (a good source of possible\
    \ projects)\n*   Horvath and Cameron’s *The New Shop Class* (Apress, 2015)\n\n\
    Learning to sew and create/use patterns (theater oriented):\n\n*   Barbara and\
    \ Cletus Anderson’s book *Costume Design*, 2nd Edition (Harcourt Brace College\
    \ Publishers, 1999)\n*   Shirley Dearing’s *Elegant Frugal Costumes* (Meriwether\
    \ Publishing, Ltd., 1992)\n*   Sheila Jackson’s *Costumes for the Stage*, 2nd\
    \ Edition (New Amsterdam Books, 2001)\n*   Nancy Bradfield’s *Costume in Detail\
    \ 1730–1930* (Costume and Fashion Press, an imprint of Quite Specific Media Group,\
    \ Ltd., 1997)\n*   `http://sewing.craftgossip.com` and `www.wikihow.com/sew-using-patterns`.\n\
    \nElectronics background:\n\n*   Becky Stern and Tyler Cooper, *Getting Started\
    \ with Adafruit Flora* (Maker Media, 2015)\n*   Kate Hartman, *Wearable Electronics*\
    \ (Maker Media, 2014)\n*   Tutorials at `https://learn.adafruit.com`, `https://learn.sparkfun.com/tutorials`,\
    \ and `www.instructables.com`.\n\n## Course Content Outline\n\nThis section suggests\
    \ a list of projects to be completed by students in a one-year class, tied to\
    \ items in this book. This class takes significant prep time; walk through exactly\
    \ what the students are building just before they do, using the equipment they\
    \ will use. It is easy to lose time to software not being available, or to a small\
    \ component being in short supply, and so on.\n\nThis outline assumes that the\
    \ students know nothing about sewing, coding, and electronics. Particularly in\
    \ a larger class, this may not be the case, and students with more background\
    \ can be recruited to help less-experienced ones. Students with some background\
    \ may skip some of the suggested projects and either tutor their fellow students\
    \ during that time or move on to a more advanced project.\n\n> **Tip**  \n> Time\
    \ allowed will vary a lot based on student experience and class size. Obviously\
    \ the major projects could be quarter or semester projects instead. Allow time\
    \ to fix problems and deal with the unexpected, particularly the first time you\
