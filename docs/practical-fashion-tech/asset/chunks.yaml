  trans: '

    # 制作电路


    现在，我们将使用之前介绍的一些元件来制作一个电路。回顾图 5-2，我们看到一个简单的串联电路，其中包含一个 470 Ω 电阻、一个 LED 和一个按钮。


    首先需要注意，从 Arduino 的 5 V 引脚连接到面包板垂直电源轨的一根长红色导线，以及从 Arduino 的 GND（接地）引脚连接到旁边电源轨的一根较短导线，正如我们在本章前面的“面包板”一节中所讨论的那样。


    从上到下追踪这个电路，我们有一个 470 Ω 的电阻与一个红色 LED 和一个按钮串联。查阅本章“LED”一节中引用的网站，我们看到红色 LED 两端固有压降为
    1.8 V，误差范围为 ±0.2 V。


    Arduino 输出 5 伏电压。如果我们使用前面讨论欧姆定律时的例子，我们会发现 470 Ω 的电阻足够大，可以保护 LED。如果你将这个电路插入兼容电脑的
    USB 端口并按下按钮，那么当按钮按下时，你应该会看到 LED 亮起。


    如果按下按钮，LED 通过电阻连接到 5 V，并通过按钮连接到 GND。这意味着有足够的电流流过 LED，它将亮起。如果按钮断开，LED 的一端连接到 5
    V，另一端则连接到未知的、未设定的电压上。这被称为浮空状态。在本章中我们不必关心这一点，因为我们并不试图使用电路中的任何电压来控制其他东西。然而，在第 6
    章中我们将关注这一点，并在此引入一些概念来开始解释它。


    在图 5-7 中，我们展示了一种不同的电路。如果 Arduino 仅仅被用作电源，并且你按下按钮，什么也不会发生。LED 仅连接到地，并通过引脚 12 弱连接到一个未知电压。按钮则位于一个独立的电路中。在第
    6 章中，我们将把它作为下拉电阻的一个例子来研究。我们在这里引入它，是为了展示你可以在硬件中创建未连接的电路，而这些电路需要通过软件连接才能发挥作用。


    ![A371637_1_En_5_Fig7_HTML.jpg](img/A371637_1_En_5_Fig7_HTML.jpg)


    图 5-7. 带下拉电阻的电路


    图 5-7 中的电路在本章中不起任何作用，因为我们只是将 Arduino 用作电源，并且按钮和 LED 之间没有直接的电气连接。在第 6 章中，我们将展示如何使用代码让
    Arduino 通过按钮来控制 LED 的亮灭。按钮与第二个 10 kΩ 电阻构成了一个分压器。如果按下按钮，它的电阻非常小。如果按钮未按下，则其电阻为无穷大。


    当按钮未按下时，引脚 2 弱连接到 5 V——“弱”是因为它是通过一个阻值较大的电阻连接的，而分压器的“另一半”（断开的按钮）具有无穷大的电阻——因此没有明显的电流流动。引脚
    2 将检测到 Arduino 会解释为 `HIGH` 的电压（将在下一章讨论）。


    如果按下按钮，按钮的电阻几乎为零。引脚 2 现在将连接到（几乎）接地。我们称“几乎”，是因为大部分压降将发生在 10 kΩ 电阻上，而不是按钮连接处的小电阻上。因此，引脚
    2 将检测到 Arduino 会解释为 `LOW` 的电压。


    在后面的章节中，我们将这样做，在我们用来观察电路状态的引脚上创建定义好的 `HIGH` 和 `LOW` 电压。这称为使用下拉电阻，因为该电阻将输出下拉到一个已知值，而不是让其处于浮空状态。在按钮按下之前，引脚
    2 连接到 5 V，但当你按下按钮时，它会建立一个到 GND 的强连接，并允许少量电流（与电阻值成反比）流过。


    **提示**


    上拉和下拉电阻的值不应小于 1 kΩ，最大可达 100 kΩ。阻值过高的电阻可能使连接过弱，导致反应过慢或易受干扰。Arduino 使用的芯片具有内部上拉（但无内部下拉）电阻，可以通过将输入引脚写为
    `HIGH` 来激活。


    ## Fritzing


    Fritzing 程序允许你整洁地绘制电路图，从而可以清晰明了地与他人分享电路。你可以分享漫画式的“面包板”视图（我们到目前为止在本文中使用的视图），或者将电路显示为原理图，或者在制作专用电路板时显示其印刷电路板
    (PCB) 布局的外观。你可以从 [`www.fritzing.org`](http://www.fritzing.org) 免费下载该程序，并且可以在 [`http://fritzing.org/learning/`](http://fritzing.org/learning/)
    找到相关教程。


    ### 使用检查器


    要更改元件详细信息或查看默认设置，请单击一个元件，然后转到“窗口”菜单项，确保勾选了 `检查器`，这将显示检查器窗口。在这个例子中，我们选择了一个电阻。当我们查看右下角的检查器窗格时，我们看到可以从下拉菜单中选择电阻值，它将会使显示出的元件上的色环变为该电阻的正确值。这对于电阻来说特别方便，但也适用于其他元件。


    ### 添加新元件


    Fritzing 附带了一套标准元件。要添加更多元件，你可能需要四处搜索，看看是否有人创建了其他元件。例如，要了解如何添加 Adafruit 元件，请参阅
    [`https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github`](https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github)
    或，对于 Sparkfun 元件，请参阅 [`https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts`](https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts)。


    ### Fritzing 专家提示


    要在面包板视图中添加更多元件，请转到右上角并单击放大镜图标。你可以输入要查找的内容（制造商、元件类型等）来查找元件。


    在元件上右键单击（在 Mac 上是 Control 单击）也会弹出其他可以更改的选项（例如导线颜色）。


    **注意**


    我们很容易忘记，任何给定的物理电路都可以运行不同的软件，反之亦然。你的电路及其软件所实现的功能是这两个方面共同作用的结果，并且通常有许多方法可以创建电路来完成你想要做的事情。你可能会考虑先尝试一种方法，拍照，然后再尝试另一种。这些照片是防止你无法找到另一种方法的保障。

