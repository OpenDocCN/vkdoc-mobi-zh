  trans: '

    ### 添加后片


    将前片与后片在侧缝处用珠针固定并缝合。你可能需要稍微拉伸布料，以使两侧沿整个侧缝线贴合。这是正常现象，当你自行设计和裁剪纸样时，这是可以预见的。注意不要过度拉伸布料，否则会扭曲裙子的形状。图
    11-14 展示了此步骤从反面观察的视图。


    ![A371637_1_En_11_Fig14_HTML.jpg](img/A371637_1_En_11_Fig14_HTML.jpg)


    图 11-14.


    刚刚将后片与前片缝合后的样子（裙子处于反面状态）


    将底部的（黄色）布带用珠针固定并缝合，形成一个环状布片。修剪缝份并将其熨开。将布片对折，标记前中心线，该位置应位于你刚缝合的缝线的对侧。换句话说，黄色布带的缝线将位于后中心线处。将布带用珠针别在裙摆底部，从裙子后中心处的缝线开始对齐，并将前中心标记对准裙子的前中心。在将布带其余部分别到裙子上时，稍微抚平并拉伸布料。确保它看起来均匀，不要在某处拉伸过度或布料堆积。缝合这条缝线，修剪缝份并熨开。图
    11-15 显示了我们现在所处的位置，此时裙子是正面朝外的。


    ![A371637_1_En_11_Fig15_HTML.jpg](img/A371637_1_En_11_Fig15_HTML.jpg)


    图 11-15.


    添加黄色布带后的组合状态


    ### 低腰口袋


    将低腰腰带布片（蓝色）正面相对对折，缝合较短的缝线以形成一个环形布圈（如图 11-16 所示）。将布料翻到正面，然后将布片纵向对折。按照与下裙布带相同的方法标记前中心线。将布带的折叠边用珠针别在裙子中段与裙摆相接的缝线上。从裙子的后中心与布带的缝线对齐开始，然后将裙子的前中心与布带的前中心对齐。


    ![A371637_1_En_11_Fig16_HTML.jpg](img/A371637_1_En_11_Fig16_HTML.jpg)


    图 11-16.


    将作为电子元件口袋的蓝色布带别在黑色裙摆布带顶部


    继续均匀地将蓝色布带沿裙子整圈别好。将布带的底部沿裙摆整圈均匀地拉伸并贴合地别好。将布带底部缝合到裙摆上，确保它不产生褶皱或过度拉伸。在布带前部标记你想要的两个口袋开口位置，你将在此处分别插入电池/逆变器组。这两个区域将保持不缝合。沿布带顶部整圈缝合，留下口袋部分不缝（图
    11-17）。检查你手头的逆变器/电池组是否能放入口袋中（图 11-18）。


    ![A371637_1_En_11_Fig18_HTML.jpg](img/A371637_1_En_11_Fig18_HTML.jpg)


    图 11-18.


    检查电池组/逆变器是否能放入其口袋中


    ![A371637_1_En_11_Fig17_HTML.jpg](img/A371637_1_En_11_Fig17_HTML.jpg)


    图 11-17.


    缝合蓝色布带，为口袋留出开口


    ### EL 电光带套管


    测量裙子前部的水平接缝（即育克与衣身连接处，以及衣身与裙摆连接处）。裁剪两条白色布料，宽 3 英寸，长度比每条水平接缝长 2 英寸。


    接下来，测量从领口到低腰腰带顶部的纵向接缝。裁剪一块白色布料，宽 3 英寸，长度比这段纵向接缝长度长 2 英寸。如果你需要为从上部 EL 电光带向下延伸到逆变器口袋的导线设置一个线槽，则再裁剪一块黑色布料，长度与纵向白色布料相同。


    对于每根 EL 电光带套管，将白色布料纵向对折并用珠针固定，然后在距边缘约 1/4 英寸处缝合这道缝线。在套管一端使用一个安全别针，将套管翻到正面（图 11-19
    和 11-20）。


    ![A371637_1_En_11_Fig20_HTML.jpg](img/A371637_1_En_11_Fig20_HTML.jpg)


    图 11-20.


    将 EL 电光带套管翻到正面


    ![A371637_1_En_11_Fig19_HTML.jpg](img/A371637_1_En_11_Fig19_HTML.jpg)


    图 11-19.


    制作 EL 电光带套管，用别针将其翻到正面


    将两个水平套管用珠针别在裙子前部的正确位置并缝合。缝线要非常靠近每条白色布条的两侧，保持两端开口。这将使你能够根据需要插入和取出 EL 电光带。


    将纵向套管用珠针别在前面并缝合，确保在每个水平白色布条的顶部停止缝合，并从水平布条的底部重新开始缝合。如果间隙过大，你可以用几针手缝将纵向布条固定在适当位置。


    将电光带套管用珠针别在裙子上并缝合。每根套管的一端保持开放，用于插入导线。确保在套管交叉处保留开口。你可能需要调整导线以及你希望如何布置 EL 线的末端——当我为图
    11-21 拍照时，我以为我们会将导线放在一侧，但我改变了主意。你应该在决定黑色导线线槽的位置之前，先把整件裙子组装起来。在这个案例中，我发现红色布料比另一侧更具弹性，所以我希望将大部分电池重量置于弹性较小的一侧。


    ![A371637_1_En_11_Fig21_HTML.jpg](img/A371637_1_En_11_Fig21_HTML.jpg)


    图 11-21.


    将电光带套管放置在裙子上并试验导线走线（最终我从另一侧走线） 注意


    这件由弹性布料制成的裙子存在一个问题，即难以保持色块平直。在每个步骤中仔细检查你的缝线是否笔直。


    试穿裙子并标记你想要的下摆位置，或者如果裙子不太长，只需将其向内折边即可。用缝纫机或手工缝合下摆。如果布料不会脱丝，你可以直接在下摆线处裁剪。（如果你已按照说明将黄色布带纵向对折并缝合，则无需再缝下摆。）


    将领口和袖窿向内折边 1/4 英寸（或者，如果你也想制作这些纸样部件，可以用贴边处理——参见第 4 章）。缝上一个黑色线槽或其他固定装置，用于固定上水平 EL
    电光带的电源线——请先查阅“收尾工作”一节，了解你可能需要参考的其他选择。

    '
- fmt: '### EL Ribbon and Wiring the Dress


    Now we will prepare the EL ribbon. You can cut EL ribbon with scissors, but you
    need to end up with a connector on each piece or it will not work. In the case
    of the ribbon in Figure [11-22](#A371637_1_En_11_Chapter.html#Fig22), I cut a
    1-meter piece into two pieces (one slightly longer than the other), and that was
    about right for the two horizontal bands.


    ![A371637_1_En_11_Fig22_HTML.jpg](A371637_1_En_11_Fig22_HTML.jpg)


    Figure 11-22. EL ribbon before cutting


    EL ribbon requires an inverter and a battery pack to power it. You can run two
    short strips like this on one of the bigger (4-battery) packs shown in Figure
    [11-23](#A371637_1_En_11_Chapter.html#Fig23). You run two from one pack with a
    Y-shaped connector cable. I used two of these for the dress.


    ![A371637_1_En_11_Fig23_HTML.jpg](A371637_1_En_11_Fig23_HTML.jpg)


    Figure 11-23. Inverter/battery packs and cabling you will need (with two connectors)


    The EL ribbon comes with a paper backing that covers a sticky layer, with the
    idea being that you might want to just stick it onto whatever you are illuminating.
    However, this backing is not very secure, so peel it off and replace it with a
    layer of regular adhesive tape. Trim the end of the wire to be a bit rounded so
    it will go into the casing easily (Figure [11-24](#A371637_1_En_11_Chapter.html#Fig24)).
    Finally, insert the EL ribbon into its casings (Figure [11-25](#A371637_1_En_11_Chapter.html#Fig25)).


    ![A371637_1_En_11_Fig25_HTML.jpg](A371637_1_En_11_Fig25_HTML.jpg)


    Figure 11-25. Inserting the EL ribbon into its casing


    ![A371637_1_En_11_Fig24_HTML.jpg](A371637_1_En_11_Fig24_HTML.jpg)


    Figure 11-24. Covering the sticky side of the ribbon with tape


    Insert the lower horizontal EL ribbon into its casing, and finally the vertical
    one. Be careful not to sew shut any of the casings where they cross. Tuck the
    inverters into their pockets on the blue section of the dress (Figures [11-26](#A371637_1_En_11_Chapter.html#Fig26)
    and [11-27](#A371637_1_En_11_Chapter.html#Fig27)). Try on the dress and see how
    things hang.


    ![A371637_1_En_11_Fig27_HTML.jpg](A371637_1_En_11_Fig27_HTML.jpg)


    Figure 11-27. The inverters before they were fully tucked in


    ![A371637_1_En_11_Fig26_HTML.jpg](A371637_1_En_11_Fig26_HTML.jpg)


    Figure 11-26. Attaching one inverter to the two horizontal EL ribbons, and the
    other (on your right) to the vertical one


    ### Finishing Up


    At this point, try on the dress and gently move around in it. The EL ribbon wants
    to slide out of the casing, so you may need to sew on a few loops to hold it in
    place. You may want to sew on a channel for the power wires if you are going to
    be moving around a lot. Once you are happy with fine adjustments, you can remove
    the EL wire and add a wire conduit. Or come up with a wire-management solution
    that works for you, bearing in mind that the wire will not stretch, but the dress
    will. Be careful sitting down!


    If the costume is just going to be worn theatrically once, you might just put
    a few loops for the wire. Have the power off when you do this and remember that
    you might need to cut off some of this to wash the garment. Remove the EL ribbon
    and power sources before washing the garment.


    You can add snaps or other closures to keep the pockets containing the inverters
    from hanging open.


    ### Pillbox Hat Construction


    This is my take on the standard 60s pillbox hat, designed to match and compliment
    the dress. This hat as constructed is 6 1/2 inches in diameter (20 inches in circumference)
    and 2 inches high, which seems to be pretty stable if you have short hair. You
    will need the following:


    - Fabric (use the leftovers from your dress, or buy additional fabric if needed).
    I used 4 1/2 inches by 16 inches for the black, and 4 1/2 inches by 7 for the
    yellow, and I needed a circle 8 1/2 inches in diameter to cover the crown (with
    enough left over to turn over to tape or glue the edges down).

    - A circle of medium weight cardboard 6 1/2 inches in diameter for the crown.

    - One piece of buckram that is 21 inches by 2 inches, or one 21-inch by 8-inch
    piece of heavy duty interfacing fabric (folded into a 21-inch by 2-inch strip).
    Note that buckram is the stiff material used to make hats. Find it or the heavy-duty
    interfacing online or at a fabric store.

    - Tape, textile glue, or hot glue gun and glue sticks.

    - Sewing machine.

    - Hand sewing needle and thread.

    - Heavy-duty scissors.

    - Ruler and measuring tape.

    - Pencil or marker.


    #### Cutting the Pieces


    I used a 6 1/2-inch diameter circle for the crown of the hat. Draw the circle
    for the crown onto the cardboard and cut it out with scissors. Cut a circle of
    the fabric 2 inches larger than the crown circle. To keep the fabric neatly in
    place, make small cuts in several places around the circle of fabric and overlap
    them on the underside of the base material circle (Figure [11-28](#A371637_1_En_11_Chapter.html#Fig28)).
    Glue or tape in place and allow to dry (if glued). If you used buckram, you could
    sew it instead. Do not try to sew cardboard.


    ![A371637_1_En_11_Fig28_HTML.jpg](A371637_1_En_11_Fig28_HTML.jpg)


    Figure 11-28. Clipping the edges of the top fabric for the hat


    Cut a strip of buckram 21 inches by 2 inches to give a 2-inch-high hat. I will
    need fabric strips 4 1/2 inches by 16 inches for the black, and 4 1/2 inches by
    7 inches for the yellow. This will make a quarter of the hat yellow and make a
    sharp fashion statement that ties the dress and hat together with the yellow accents.


    #### Assembling the Hat


    Sew the yellow and black portions of the hat side together and press the seam
    down. Take the strip of buckram, or pin the interfacing into a strip as shown
    in Figure [11-29](#A371637_1_En_11_Chapter.html#Fig29), fold the fabric over the
    strip, and pin. If using interfacing, remove the pins from it as you pin the fabric
    over it (Figure [11-30](#A371637_1_En_11_Chapter.html#Fig30)). Hand sew the seam
    along the inside of the hat.


    ![A371637_1_En_11_Fig30_HTML.jpg](A371637_1_En_11_Fig30_HTML.jpg)


    Figure 11-30. Assembling the side of the hat, continued


    ![A371637_1_En_11_Fig29_HTML.jpg](A371637_1_En_11_Fig29_HTML.jpg)


    Figure 11-29. Assembling the side of the hat


    Finally, hand sew the top of the hat to the sides and sew the side seam (Figure
    [11-31](#A371637_1_En_11_Chapter.html#Fig31)). You now have a pillbox hat (Figure
    [11-32](#A371637_1_En_11_Chapter.html#Fig32))!


    ![A371637_1_En_11_Fig32_HTML.jpg](A371637_1_En_11_Fig32_HTML.jpg)


    Figure 11-32. The completed hat


    ![A371637_1_En_11_Fig31_HTML.jpg](A371637_1_En_11_Fig31_HTML.jpg)


    Figure 11-31. Connecting the top and sides of the hat


    ### Options


    The completed outfit is shown in Figure [11-33](#A371637_1_En_11_Chapter.html#Fig33).
    You can see that the dress sags a bit with the weight of the electronics. You
    might want to create an alternate design that carries the batteries in a mod-style
    belt popular in the 1960s, or possibly reinforce the dress a little with a few
    strategic strips of buckram from the shoulder to the blue dropped waist band to
    prevent sagging. You could also make the front one piece and sew the colored panes
    on top. Wire management is a challenge with this design, and you should experiment
    a bit with the best way to get a good balance between the drape of the dress,
    the stiffness of the EL ribbon, and the weight of the battery packs.


    ![A371637_1_En_11_Fig33_HTML.jpg](A371637_1_En_11_Fig33_HTML.jpg)


    Figure 11-33. The full effect


    ## Summary


    This chapter covered two very different final projects: one that used a pre-existing
    hat and added some electronics, and another that did not require any programming
    but did require some fancy sewing. The intent was that these two projects between
    them cover the application of what you have learned in the book about construction
    techniques. The final chapters will review other technologies you might consider
    looking into and give some speculations on what will come in the future.'
