    end of that summer, which gave us a deadline to aim for. It helped me prepare
    for my first full-year costuming and wearable tech class, but it was certainly
    a baptism by fire that consumed a lot of my summer. Tackling a complex project
    does force you to learn all the aspects at once and quickly.


    ### The Haunted Dress—the Original Idea


    The “Haunted Dress” was intended to be a dress that would be a little performance
    piece. I wanted to evoke a dress coming to life around a surprised wearer. The
    sequence would start when the wearer made a gesture to start up the dress. Then,
    lights would flash down the front of the dress (to evoke lightning). Next, fans
    would kick in under the skirt to blow it around. Then as the wearer looked down
    at the skirt, the sleeves would begin to pull up on their own.


    The dress was designed as a steampunk/Victorian long chiffon skirt with a bustle
    overskirt of taffeta and a taffeta short jacket with chiffon sleeves. Figure [10-2](#A371637_1_En_10_Chapter.html#Fig2)
    shows the dress in early development. (Our first mistake was that we assembled
    most of it before putting on the electronics.) Figure [10-3](#A371637_1_En_10_Chapter.html#Fig3)
    shows the completed dress, and Figure [10-4](#A371637_1_En_10_Chapter.html#Fig4)
    is a closeup of the top as the servos on the shoulders were being added.


    ![A371637_1_En_10_Fig4_HTML.jpg](A371637_1_En_10_Fig4_HTML.jpg)


    Figure 10-4.


    The dress jacket showing NeoPixels, Flora, and some of the servo/fishing line
    attachments


    ![A371637_1_En_10_Fig3_HTML.jpg](A371637_1_En_10_Fig3_HTML.jpg)


    Figure 10-3.


    (right) The finished dress


    ![A371637_1_En_10_Fig2_HTML.jpg](A371637_1_En_10_Fig2_HTML.jpg)


    Figure 10-2.


    (left) The dress in early construction


    The sketch in Figure [10-5](#A371637_1_En_10_Chapter.html#Fig5) lays out the key
    parts of the jacket, which supported most of the electronics. I decided to use
    a Flora(see Chapter [5](#A371637_1_En_5_Chapter.html) for more on the Flora hardware
    and Chapter [6](#A371637_1_En_6_Chapter.html) for software) as the dress microcontroller
    and NeoPixel multi-color LEDs for the lightning effect. Small fans were mounted
    under the skirt to blow it around, and a mechanism with servos (see Chapter [8](#A371637_1_En_8_Chapter.html))
    and string pulled up the sleeves. (I decided that pulling them up was not too
    hard, but dropping them back down again would be too difficult.) The bustle would
    be a good place to hide batteries and anything else large, and shoulder pads would
    hide the mechanisms for the sleeves. I was all set—or so I thought.


    ![A371637_1_En_10_Fig5_HTML.jpg](A371637_1_En_10_Fig5_HTML.jpg)


    Figure 10-5.


    Sketch of the jacket of the Haunted Dress, showing the Flora (A), servo (B), and
    elastic strap that holds the servo on top of the shoulder (C). Inside the jacket
    is shoulder pad (E, shown on other shoulder for clarity). Fishing line to pull
    up the sleeves is spooled on a bobbin glued to the servo and pulled through triangular
    guides (D).


    There are shoulder pads in the jacket, which hold lipstick batteries to power
    the servos. A sewing bobbin is glued to the top of the servo and is wound with
    enough nylon fishing line to reach the end of the sleeve, plus a bit more. Two
    small triangle-shaped loops are sewn onto approximately three inches of bias tape.
    The bias tape is sewn to the inside of the chiffon sleeve, and the triangles create
    a channel for the nylon line, which is knotted and hand-sewn to the edge of the
    sleeve.


    The Flora board is hand-sewn to the front of the jacket, where a button would
    go, with hook and loop tape on the inside to fasten the jacket. The NeoPixels
    are hand-sewn onto the lapel, and conductive thread is used to connect them to
    the Flora. Conductive thread is also used to attach the wires from the servos
    and lipstick batteries to the Flora. The wires run from the shoulder pads inside
    of the jacket.


    ### Mistakes


    My biggest mistake on the Haunted Dress was making the skirts and jacket before
    I fully understood all the other aspects of the project. As an advanced seamstress,
    I am used to diving in and adapting projects a bit as I go along, but these projects
    take a lot of up-front planning.


    For example, I did not allow for a clean wire run from the servos to the Flora.
    Consequently, the finished product was quite sloppy, and I even dripped hot solder
    onto the chiffon skirt. Not a very pretty look!


    I also had to take the taffeta bustle apart in several places to create the pocket
    for the LiPo battery and have it in the best place to allow for movement. In hindsight,
    I would have created channels for the wiring inside the jacket out of lightweight
    cotton or lining fabric for a more finished look and a more comfortable feel while
    wearing it.


    Tip


    I wish I had made a muslin version of the overskirt to figure out where the other
    elements should live before using the expensive (and fragile) taffeta. Lightweight,
    inexpensive cotton muslin is a great fabric to use for creating a prototype of
    a garment, figuring out the best route for wires, and discovering the best locations
    for the other components. It allows for mistakes on an inexpensive fabric before
    cutting and sewing the final version, which may be a more expensive fabric. It
    is often used by designers to create the first mockup of a piece, which is why
    a mockup is often called a “muslin.” Those from the electronics world might think
    of it as the equivalent of putting together a breadboard or alligator-clip version
    of a circuit before you create a permanent, soldered one.'
  trans: '

    # 过于宏大的首个项目


    我对可穿戴技术的初次尝试既令人兴奋又令人恐惧。我几乎不具备焊接电线、为微控制器编写代码或使用众多可用组件制作这些作品所需的知识。但我多年来一直在制作和修改戏服，因此相当自信能搞定一些事情。幸运的是，我有琼和里奇这样两位出色且支持我的导师。


    有些事简单得让我惊讶，而另一些事则难得出奇。这改变了我的思维方式，拓展了我自认能够胜任的领域——至少是自认能够学习和发展新技能的领域。在完成一些 Arduino
    教程的过程中，我开始理解一些代码的含义及其背后的原因。这既让我震撼，也让我深受启发。


    犯下或大或小的错误，是学习什么可行、什么不可行的好方法。它甚至能激发新的创意和/或解决方案。我犯过一些愚蠢的错误，也犯过一些可怕的错误（比如图 10-1 中的布线），但嘿，活到老学到老。


    ![A371637_1_En_10_Fig1_HTML.jpg](img/A371637_1_En_10_Fig1_HTML.jpg)


    图 10-1. 计划外的布线失控


    我在这里描述的第一个项目源自一个戏服设计课的头脑风暴会议。学生们被要求将可穿戴技术融入某种蒸汽朋克风格的作品中。（蒸汽朋克是一种科幻小说类型，其基本设定是世界以某种方式回到了维多利亚时代的英国，并混合了不同时代的技术，但拥有蒸汽动力机械和仅限于比空气轻的飞行器。）全班最终聚焦的第一个项目是一件拥有自我意识的蒸汽朋克“鬼魅连衣裙”。


    最终，这个项目拖到了学年结束之后，成了我个人的夏季项目，也是我自学可穿戴技术的教程。我们知道将在那个夏末的一次教育创客技术会议上展示它，这给了我们一个必须赶上的截止日期。这帮助我为我第一个全年的戏服设计和可穿戴技术课程做好了准备，但这无疑是一场消耗了我大半个夏天的“战火洗礼”。处理一个复杂的项目确实迫使你同时快速学习所有方面。


    ## 鬼魅连衣裙——最初构想


    “鬼魅连衣裙”旨在成为一件小型表演作品。我想营造出一条裙子在一个惊讶的穿着者周围活过来的感觉。流程将从穿着者做出一个启动裙子的手势开始。接着，灯光会沿着裙身前部闪烁（以模拟闪电效果）。然后，裙摆下的风扇会启动，吹动裙摆。当穿着者低头看向裙摆时，袖子会开始自行向上拉起。


    这条裙子被设计为一条蒸汽朋克/维多利亚风格的雪纺长裙，配以塔夫绸的臀垫式罩裙，以及一件带有雪纺袖子的塔夫绸短夹克。图 10-2 显示了早期开发阶段的裙子。（我们的第一个错误是，在装上电子元件之前，我们就已经组装好了大部分部件。）图
    10-3 显示了完成后的裙子，而图 10-4 是在添加肩部舵机时上衣部分的特写。


    ![A371637_1_En_10_Fig4_HTML.jpg](img/A371637_1_En_10_Fig4_HTML.jpg)


    图 10-4. 裙子的夹克部分，展示了 NeoPixel 灯带、Flora 主控板以及部分舵机/钓鱼线连接件


    ![A371637_1_En_10_Fig3_HTML.jpg](img/A371637_1_En_10_Fig3_HTML.jpg)


    图 10-3. (右图) 完成后的裙子


    ![A371637_1_En_10_Fig2_HTML.jpg](img/A371637_1_En_10_Fig2_HTML.jpg)


    图 10-2. (左图) 早期构建阶段的裙子


    图 10-5 中的示意图展示了夹克的关键部分，它支撑了大部分电子元件。我决定使用 Flora（关于 Flora 硬件详见第 5 章，软件详见第 6 章）作为裙子的微控制器，并使用
    NeoPixel 多色 LED 来实现闪电效果。裙摆下安装了小型风扇来吹动裙摆，还有一个带有舵机（见第 8 章）和绳线的机构来拉起袖子。（我认为把袖子拉起来不算太难，但再放下来就太难了）。臀垫是隐藏电池和其他大件物品的好地方，而肩垫则能隐藏袖子用的机械装置。我以为万事俱备了——至少当时这么想。


    ![A371637_1_En_10_Fig5_HTML.jpg](img/A371637_1_En_10_Fig5_HTML.jpg)


    图 10-5. 鬼魅连衣裙夹克的示意图，展示了 Flora (A)、舵机 (B) 以及将舵机固定在肩部的弹性带 (C)。夹克内部是肩垫 (E，为清晰起见，显示在另一个肩膀上)。用于拉起袖子的钓鱼线缠绕在一个粘在舵机上的线轴上，并穿过三角形导向环
    (D)。


    夹克内有肩垫，用于放置为舵机供电的口红电池。一个缝纫用的线轴被粘在舵机顶部，并缠绕了足够长（加上一些余量）的尼龙钓鱼线，以便到达袖口。两个小三角形环被缝在大约三英寸长的斜纹带子上。斜纹带子被缝在雪纺袖子的内侧，这些三角形环为尼龙线形成了一个通道，尼龙线的末端打结并手工缝制在袖口边缘。


    Flora 主控板被手工缝制在夹克前部，通常纽扣所在的位置，内侧用魔术贴来固定夹克。NeoPixel 灯带被手工缝在翻领上，并用导电缝纫线连接到 Flora。导电缝纫线也用来将舵机和口红电池的导线连接到
    Flora。这些导线从夹克内部的肩垫中穿出。


    ## 错误


    在鬼魅连衣裙这个项目上，我最大的错误是在完全理解项目所有其他方面之前就制作了裙子和夹克。作为一名资深裁缝，我习惯于一头扎进去并在制作过程中随时调整项目，但这些项目需要大量前期规划。


    例如，我没有为从舵机到 Flora 的整洁走线留出空间。结果，成品相当凌乱，我甚至将热焊锡滴到了雪纺裙子上。这可不是什么好看的景象！


    我还不得不将塔夫绸臀垫拆开几处，以便为锂电池缝制一个口袋，并将其安置在最适合活动的位置。事后看来，我本应在夹克内部用轻质棉布或里衬布制作导线通道，以获得更整洁的外观和更舒适的穿着体验。


    **提示**


    我真希望当时先用平纹细布做一件罩裙的样衣，来确定其他元件应该放在哪里，然后再使用昂贵（且易损）的塔夫绸。轻质、廉价的棉质平纹细布是一种很好的面料，可以用来制作服装原型，找出导线的最佳路径，以及发现其他组件的最佳位置。在裁剪和缝制最终版本（可能使用更昂贵的面料）之前，它允许你在廉价面料上犯错。设计师常用它来制作一件作品的第一件模型，这就是为什么模型（mockup）常被称为“平纹细布样衣”（muslin）。来自电子领域的人可能会把它等同于在制作永久性焊接电路之前，先搭建一个面包板版或鳄鱼夹版的电路。'
- fmt: '### Flora and NeoPixel Placement


    I used conductive thread to sew four NeoPixels on each side of the lapel. The
    thread ran from the board to the first NeoPixel and then to each of the others
    in turn. It ran up the right side, around the back of the neck, and down the left
    side of the lapel, as shown in Figure [10-5](#A371637_1_En_10_Chapter.html#Fig5).


    It was a long run, so I had to make sure the thread was tight enough to make a
    connection, but not tight enough to pull the lapel out of shape. It took some
    experimentation to get it right.


    In a first iteration, the jacket had NeoPixels sewn onto conductive ribbon, which
    was sewn around the lapel. The conductive ribbon was attached to the points on
    the Flora with conductive thread. I did not connect the ribbon to the NeoPixels
    and Flora correctly, so only some of them worked. I then took the ribbon off the
    lapel, sewed the NeoPixels on individually, and connected them to the Flora and
    each other with conductive thread. This worked better.


    **Caution**


    Using conductive ribbon (Chapter [5](#A371637_1_En_5_Chapter.html)) can be a time
    saver, but make sure to connect the proper wires in the ribbon with conductive
    thread to your components. My first attempt at attaching NeoPixels to conductive
    ribbon was pretty clumsy and time-consuming. I was making a long run around the
    lapel of the jacket for the Haunted Dress. The NeoPixels ran up the right side
    of the lapel. After a gap around the back of the collar, they then ran down the
    left side of the lapel. NeoPixels (Chapter [5](#A371637_1_En_5_Chapter.html))
    are directional, so for signal to come out of one and into the next, you need
    to make sure to cut the middle two sections of the ribbon so that the signal in
    and out paths are maintained from NeoPixel to NeoPixel. I attached them to each
    other along the ribbon, following the arrows and using conductive thread to attach
    them to the Flora board. When I tried to light them up, only the right side worked.
    Arrrgh! That was because I had sewn the last NeoPixel on the left side in the
    in the wrong direction! It was easy to solve, but quite frustrating for a while
    until we figured out my mistake.


    ### The Magical Sleeve


    I used fishing line, spooled up on a sewing-machine bobbin, to automatically draw
    up the jacket sleeves. I ran the line down the sleeve through small triangle-shaped
    rings and attached it at the edge of the sleeve. I used continuous rotation servo
    motors, with a sewing-machine bobbin glued to the top to reel in the fishing line.
    The servos were a bit heavy to balance there, so I attached a sturdy piece of
    black elastic on the outside of the jacket shoulders to hold the servos in place.
    This also allowed for movement of the bobbin, and for easy removal if needed (Figure
    [10-6](#A371637_1_En_10_Chapter.html#Fig6)).


    ![A371637_1_En_10_Fig6_HTML.jpg](A371637_1_En_10_Fig6_HTML.jpg)


    Figure 10-6. Servo attached to the jacket


    I used two small triangle-shaped loops sewn to a 3” piece of bias tape and attached
    along the sleeve as a channel for the fishing line. By knotting the end of the
    line and using clear nail polish on the knot, I was able to hand sew the line
    to the edge of the sleeve. I also attached a decorative piece of an old necklace
    at the end of each sleeve to add weight to the sleeve and help bring the sleeve
    back into place after the servo had drawn it up (Figure [10-7](#A371637_1_En_10_Chapter.html#Fig7)).


    ![A371637_1_En_10_Fig7_HTML.jpg](A371637_1_En_10_Fig7_HTML.jpg)


    Figure 10-7. The sleeve mechanism and servo


    The lipstick batteries to drive the servos were hidden in pockets in the shoulder
    pads (you can see the white USB cable going into the battery in Figure [10-6](#A371637_1_En_10_Chapter.html#Fig6))
    and the USB plugs were soldered to wire from the servos. The servos were also
    wired to the Flora board.


    **Integrating Heavy Components in a Chiffon Sleeve**


    USB cables have an A side (the side that normally plugs into a computer) and a
    B side (the connector that in our case would normally be plugged into the Flora,
    Gemma, or other board). The batteries needed a USB connector, so Rich jumped in
    and stripped the B side of the cables and then soldered it to wires running to
    the servos. Normally you would not do this; see Chapter [8](#A371637_1_En_8_Chapter.html)
    for the more typical case. Rich and I used this approach here because we needed
    to deliver a lot of power to the servos and wanted to give them their own power
    source to ensure that they would not cause the microcontroller to brown-out. We
    ran wire down the inside of the jacket from the battery to the servo. We used
    conductive thread to stitch the wires in place and connect the servos and the
    Flora to signal and ground connections, as you can see in Figures [10-6](#A371637_1_En_10_Chapter.html#Fig6)
    and [10-7](#A371637_1_En_10_Chapter.html#Fig7).


    For the Haunted Dress, I wanted to hide the lipstick batteries in the shoulder
    pads. Shoulder pads are usually made from cotton batting or foam and covered with
    a lightweight fabric. I made a cover for the pads from black taffeta to match
    the bodice of the jacket. Leaving a small opening in the taffeta, I was able to
    hand stitch the pouches that had come with the batteries inside the shoulder pad
    covers (Figure [10-8](#A371637_1_En_10_Chapter.html#Fig8)).


    ![A371637_1_En_10_Fig8_HTML.jpg](A371637_1_En_10_Fig8_HTML.jpg)


    Figure 10-8. The shoulder pads used to contain the lipstick battery


    I attached the shoulder pads inside the shoulders of the jacket by tacking them
    down in two places on the shoulder seam. Tacking means to take a few stitches
    in the same spot to hold things in place.


    ### The Billowing Skirt


    The three of us wanted the chiffon skirt to billow as if a draft of wind were
    blowing by. We chose to use two small radial blower fans, and they needed a place
    to live that would allow them to move the chiffon from inside the skirt while
    staying away from the person wearing it. I made a small pocket for each one and
    attached them to the underside of the chiffon (Figures [10-9](#A371637_1_En_10_Chapter.html#Fig9)
    and [10-10](#A371637_1_En_10_Chapter.html#Fig10)).


    ![A371637_1_En_10_Fig10_HTML.jpg](A371637_1_En_10_Fig10_HTML.jpg)


    Figure 10-10. The fan being slipped out of its pocket


    ![A371637_1_En_10_Fig9_HTML.jpg](A371637_1_En_10_Fig9_HTML.jpg)


    Figure 10-9. The pocket for the fans


    I used two layers of chiffon, one navy blue and one a brighter blue, to make the
    skirt a bit more opaque (see the pictures of the dress in Figures [10-2](#A371637_1_En_10_Chapter.html#Fig2)
    and [10-3](#A371637_1_En_10_Chapter.html#Fig3)). This was also intended to minimize
    blockage of the fans’ intakes. The wires from the fans were soldered to connectors
    and attached to a battery. The other wires were soldered to the Flora board. The
    wires ran between the skirt and the overskirt. I made another pocket inside the
    front of the overskirt for the battery, which also powered the Flora.


    ### Software


    By browsing many tutorials from `Arduino.cc` and `Adafruit.com`, I learned a teeny
    bit about coding (Chapter [6](#A371637_1_En_6_Chapter.html)) and was able to program
    the Flora to control the NeoPixels. The servos (Chapter [8](#A371637_1_En_8_Chapter.html))
    and fans were more sophisticated, and Rich and Joan stepped in to coach and debug.
    I have learned more about coding since that first attempt, but still have a lot
    more to learn.'
