    Maya（[`www.autodesk.com/products/maya`](http://www.autodesk.com/products/maya)），可以制作出非常复杂的模型。然而，它们的学习曲线很长，并且需要特别注意模型的构建方式，因为它们并不是为了制作可
    3D 打印的模型而设计的。


    如果您想制作工程类的零件（带尺寸的机械部件），可以考虑 Onshape（[`www.onshape.com`](http://www.onshape.com)），这是一个相对较新的程序，其新颖之处在于它是一个价格相对实惠的工程程序。

