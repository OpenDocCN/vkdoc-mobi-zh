- fmt: '### Writing Code For Figure [5-7](#A371637_1_En_5_Chapter.html#Fig7)


    In Chapter [5](#A371637_1_En_5_Chapter.html), the example circuit in Figure [5-7](#A371637_1_En_5_Chapter.html#Fig7)
    did nothing. The LED did not light up when the circuit was plugged in, because
    it was only connected to ground. Pushing the button did nothing. Now we are going
    to add code to the same circuit to make an inverting circuit—if you push the button,
    the light goes on. If you are not touching the button, the LED is off.


    As noted back in Chapter [5](#A371637_1_En_5_Chapter.html), this circuit requires
    a pullup resistor so that the voltage that pin 2 will see is known even when the
    button is open. Until the button is pushed, the pin is connected weakly to VCC,
    but pushing the button creates a strong connection to GND and allows a small amount
    of current (inversely proportional to the value of the resistor) to flow. The
    chip used by the Arduino board has internal pullup resistors (about 200 kΩ) that
    you can activate by writing `HIGH` to a pin that’s in input mode. Listing [6-1](#A371637_1_En_6_Chapter.html#Par94)
    shows the code.


    ```cpp

    //Code will turn on the LED if the button is pressed.

    //Otherwise the LED is off except for initializing it on

    int buttonPin = 2;

    int ledPin = 10;

    int press = 0;

    void setup() {

    pinMode(ledPin, OUTPUT);

    digitalWrite(ledPin, HIGH);

    pinMode(buttonPin, INPUT);

    digitalWrite(buttonPin, HIGH); // activates internal pull-up resistor

    } // end setup

    void loop() {

    press = digitalRead(buttonPin);

    if (press == HIGH) digitalWrite(ledPin, LOW); // button NOT pushed, off

    else digitalWrite(ledPin, HIGH);

    }// end loop

    ```


    *Listing 6-1. Program to Run the Circuit in Figure 5-7*


    ## Arduino Input and Output


    Arduinos need to both be able to read the voltage on their pins and write out
    a voltage to make things happen, as we just saw in the previous example. Note
    that in and out are from the Arduino board’s perspective (that is, out is writing
    to a pin, and in is reading from one). This means that if a sensor is sending
    data to an Arduino, it is a digital `INPUT` to the Arduino, which Joan feels is
    backwards. But there it is.


    Before doing anything else with a pin, you should tell the Arduino whether you
    want to use it as an input or an output using the `pinMode()` function (this is
    typically done in `setup()`). There are several different kinds of input and output
    on an Arduino. You tell the Arduino which pins you are using with the `digitalRead`,
    `digitalWrite`, `analogRead`, and `analogWrite` functions.


    ### Digital Read and Write


    You can configure any numbered pin on the Arduino to send or receive a digital
    signal. A digital signal can have just two values—in this case, called `HIGH`
    and `LOW`—as opposed to an analog signal, which can be any voltage between some
    upper and lower bounds.


    Pins defined as an output can be set to `HIGH` (which connects the pin to the
    Arduino VCC) or `LOW` (connects the pin to the Arduino GND). Writing a value to
    a pin can be used to change the voltage across another component (for example,
    to turn an LED off and on). It can be used in specific patterns to send control
    signals to other devices, though in most cases a library handles this communication
    protocol for you.


    If a pin is defined as an input, you can use it to read a voltage, which will
    be either `HIGH` (close to VCC) or `LOW` (close to GND). This can be used to do
    things like check the state of something like a button or switch. A digital input
    may also be used (again, usually by a library) to receive digital signals back
    from other components, such as a sensor, or sometimes a device that sends a response
    back after a digital signal has been sent to it. For instance, an Arduino may
    write data to an SD card and request data back from the card.


    ### Analog Read and PWM


    An Arduino can read an analog voltage on its analog pins. These pins are referred
    to as A0, A1, and so forth. They can be used as input pins that do not just read
    `HIGH` or `LOW`, but can read a range of voltages between VCC and GND using a
    built-in analog-to-digital converter (ADC). Most Arduinos have a 10-bit ADC, which
    means they can read 1024 (2 to the 10th power) distinct voltages ranging from
    0 at GND to 1023 at the analog reference voltage. By default, the Arduino uses
    a reference voltage that is equal to VCC, though it can be configured to use a
    different reference voltage using the built-in Arduino function `analogReference()`.


    There is also an analog write function, though the Arduino does not actually have
    a digital-to-analog converter (DAC). Instead, the `analogWrite()` function generates
    a pulse-width modulation (PWM) signal that is often even better. The PWM signal
    sent by `analogWrite()` is an oscillation between VCC and GND hundreds of times
    per second, and the analog value specifies the proportion of the time that the
    voltage is `HIGH` in each cycle (known as the duty cycle). The PWM function takes
    an 8-bit value, with 256 distinct values (0–255). A value of 0 represents a 0%
    duty cycle (`LOW` all the time), and 255 represents a 100% duty cycle (`HIGH`
    all the time). Giving it a value of 127 would result in a 50% duty cycle (`HIGH`
    half the time, and `LOW` the rest of the time).


    A PWM signal can be used to do things like dim an LED or signal a motor to turn
    more slowly. This is actually more useful than sending a lower voltage because
    PWM has a more linear relationship to LED brightness or motor speed. PWM can also
    be used to signal devices such as hobby servos that expect a PWM signal (servos
    expect a pulse 1–2 milliseconds long every 20 milliseconds to determine their
    position).


    The Arduino can maintain these pulses while the program is doing other things
    when the `analogWrite()` function is used, but only on certain pins. On most Arduinos,
    pins 3, 5, 6, 9, 10, and 11 (and sometimes others, depending on which chip is
    used) can be used for PWM, and they are usually marked with a tilde symbol (∼)
    next to their pin number.


    ### Writing to the Serial Port


    Sometimes it is handy to see what values a particular pin is getting as input.
    You can write that out to your computer over the USB cable by enabling the serial
    port. To do that, you click on the magnifying glass icon on the right side of
    the IDE (you can see it on Figure [6-4](#A371637_1_En_6_Chapter.html#Fig4)). Add
    the following line to the `setup()` function of your Arduino program:


    ```cpp

    Serial.begin(9600);

    ```


    Then, at the point in your `loop()` function where you want to see the output,
    add `Serial.print()` or `Serial.println()` (adds a line feed after whatever you
    want to print). `Serial.print()` or `Serial.println()` can transmit one number
    or string (set of letters) at a time. You can see a full example at File ➤ Examples
    ➤ 03.Analog ➤ AnalogInOutSerial. Once your program is running while your Arduino
    is connected over USB, click the serial window icon (the magnifying glass) to
    open the serial monitor, and be sure that the baud rate at the bottom of the window
    matches the number you used in `Serial.begin()`.'
