    to do with any particular sensor. In this chapter, we walk through examples of
    the process.


    Chapter [11](#A371637_1_En_11_Chapter.html) has an example of a gyroscope in a
    hat that knows the angle of the wearer’s head. We talk about gyroscopes, accelerometers,
    and magnetometers briefly in this chapter and then in Chapter [11](#A371637_1_En_11_Chapter.html)
    we apply some of that knowledge.


    Note


    We avoid needing to solder in the projects in this book. However, if you want
    to use sensors other than the ones we describe here, soldering might be the most
    practical option. We will show some ways to prototype without it, but the resulting
    circuits will be fragile. If you want to do a lot of work with sensors or (more
    so) with motors, you probably should find an online tutorial on soldering (for
    example, [`https://learn.sparkfun.com/tutorials/how-to-solder---through-hole-soldering`](https://learn.sparkfun.com/tutorials/how-to-solder%2D%2D-through-hole-soldering)
    ) or perhaps a class at a makerspace near you.


    ### Creating a Circuit with a Sensor


    Depending on the sensor, you may need to know a bit about how a sensor works before
    you start searching for specifics, since there may be a standard equation to use
    to convert the signal the sensor reads to the actual temperature, pressure, or
    whatever the quantity of interest is. Many sensors (including thermistors and
    another similar type of resistive sensor called a photoresistor) change resistance
    in response to their environment—in the case of a photoresistor, to light levels.


    Because of that, they can act as part of a voltage divider. The sensor is placed
    in series with a known resistor (usually specified by the device’s manufacturer),
    and one reads an output voltage at a point between the two resistors. However,
    it can be a little tricky, because the voltage drop across a sensor that is a
    variable resistor is a function of both the series resistor’s resistance and whatever
    the sensor’s own resistance is at the moment (as well as the fixed voltage across
    the whole divider).


    The only voltage drop it “sees” (the voltage difference between its two leads)
    is the one it is creating, determined by whatever it is sensing. This makes picking
    the right series resistor (the “other resistor in the voltage divider”) crucial.
    Fortunately, there are some standards to help us.


    Other sensors work differently. A photodiode, for example, produces a small current
    in response to light. We will see one of these in action shortly.'
  trans: '

    # 8. 传感器与其他硬件


    会发光的配件已经很酷了，但我们还能更进一步。在本章中，Joan 和 Rich 将为你介绍几种不同类型的传感器——这些组件能够检测现实世界的某些属性，例如温度或光照强度。然后你可以对
    Arduino 进行编程，使其读取传感器数据并根据数据执行相应操作。例如，在第 11 章中，我们将教你如何制作一顶根据头部倾斜角度变换不同颜色的帽子。在本章中，Joan
    和 Rich 将带你了解一些常见的传感器及其使用方法。


    你还可以制作能够自主移动的软质物品或服装——第 10 章中描述的“幽灵连衣裙”就是一个例子。但正如我们在那一章中指出的，制作可移动的服装颇具挑战性。使用电机比我们想在本书中详细介绍的内容要更复杂（主要是因为供电需求），但我们会在本章的“让物体动起来”部分概述相关问题，并推荐一些深入学习的资源。


    ## 传感器


    现在市面上有许多兼容 Arduino 的传感器，这些设备可以测量从环境温度和光照强度到周围空气中甲烷百分比等各种参数。Adafruit 和 Sparkfun
    销售多种不同类型的传感器，而像亚马逊这样的在线零售商也提供各种选择。不过，一个挑战在于，与这些传感器所面向的消费产品市场相比，业余 DIY 用户（也就是我们！）的规模微乎其微，因此相关文档有时可能非常粗略。


    可缝纫的传感器则少得多，而且现有的通常相对昂贵。不过，可穿戴传感器专为缝纫设计，可能更坚固耐用，文档也更详细。你的选择将在很大程度上取决于具体应用、经验水平和预算。


    我们将尝试使用光电二极管（用于测量环境光）和热敏电阻（用于测量温度）。要弄清楚如何操作任何特定传感器，都需要进行一些探索。在本章中，我们将逐步讲解整个过程的示例。


    第 11 章中有一个关于陀螺仪帽子的示例，它可以感知佩戴者头部的倾斜角度。在本章中，我们将简要介绍陀螺仪、加速度计和磁力计，然后在第 11 章中运用这些知识。


    **注**


    本书中的项目我们尽量避免使用焊接。但是，如果你想使用我们这里描述之外的传感器，焊接可能是最实用的选择。我们将介绍一些无需焊接的原型制作方法，但这样得到的电路会比较脆弱。如果你想大量使用传感器（或者更频繁地使用电机），建议你查找在线焊接教程（例如，`https://learn.sparkfun.com/tutorials/how-to-solder---through-hole-soldering`），或者在你附近的创客空间参加相关课程。


    ### 创建带传感器的电路


    根据传感器的不同，在开始搜索具体信息之前，你可能需要先了解一些传感器的工作原理，因为可能需要使用标准公式将传感器读取的信号转换为实际的温度、压力或其它感兴趣的量。许多传感器（包括热敏电阻和另一种类似的电阻式传感器——光敏电阻）会随着环境变化而改变电阻——例如，光敏电阻会因光照强度而变化。


    因此，它们可以充当分压电路的一部分。传感器与一个已知电阻（通常由设备制造商指定）串联，然后读取两个电阻之间的输出电压。然而，这可能会有点棘手，因为作为可变电阻的传感器上的电压降，既取决于串联电阻的阻值，也取决于传感器自身在当前时刻的电阻值（以及整个分压器上的固定电压）。


    它“感知”到的唯一电压降（其两个引脚之间的电压差）正是它自身产生的，该电压降由它正在感测的物理量决定。这使得选择正确的串联电阻（“分压器中的另一个电阻”）变得至关重要。幸运的是，有一些标准可以帮助我们。


    其他传感器的工作原理则不同。例如，光电二极管会在光照下产生一个小电流。我们稍后将看到一个实际应用的例子。

    '
- fmt: '### Sewable Sensor Alternatives


    In this chapter we lay out our two examples with a “regular” Arduino (not a sewable
    one) and low-cost breadboard plugin components, because that way it is a lot easier
    to see what is going on, and because as of this writing a lot more sensors are
    available in this format. If there is a sewable version of the sensor, there will
    likely be a very explicit tutorial telling you what pins to use to connect it
    and a sample Arduino sketch you can start with. Typically, the wearable sensors
    include the series resistor we talk about here as part of the component, and there
    may be other simplifications.


    If there is no wearable version, you have a few options. If you are not actually
    wearing the project (if it is a piece of cloth art, or a theater prop, or a nightlight)
    you might just use a regular non-sewable Arduino and create a base or some other
    enclosure to hide the electronics and sensors. When designing such an enclosure,
    though, bear in mind that the sensor will need to be exposed to the ambient temperature
    or light or whatever environmental thing you are trying to measure. In that case
    you can either breadboard the circuit, as shown in this chapter, or create an
    equivalent soldered circuit.


    But if you want to have a sewable circuit with non-sewable components, you can
    use a sewable electronics board (a Gemma, Flora, or Lilypad). Curl up the leads
    of the resistors and LEDs into loops and sew them onto the fabric. Or you can
    solder the circuit together and find a way to support it on the fabric, depending
    on your particular design (see our examples in other chapters for ideas). Be careful
    with these connections, though, because wire-to-board soldering with stranded
    wire can be brittle. Stranded wires may break where they are soldered, though
    a little hot glue to anchor the insulation will help. If you use solid-core wire
    instead in your soldered construction, it will tend to break with repeated flexing,
    and may break in the middle of a cable. Solid wire is better for applications
    where flexing is not required.


    **Caution**


    Although there is “an” Arduino standard, some of the wearable boards depart slightly
    from it, or the libraries for the sensors might use a capability that is not compatible
    with some of the sewable boards. For example, the chip used by the Gemma board
    is not, as of this writing, supported by the communications library underlying
    the libraries for most of the Flora sensors. Before you buy a board and a sensor
    that is not explicitly branded as working together with it, you might do a bit
    of online searching to see whether there are known problems (or ways to work around
    known problems). Not all sensor libraries (which we get to in a minute) support
    all Arduino-derived boards.


    Many sensors have resistance that changes in response to their environment. In
    the first example, we use a thermistor, which is a resistor that changes resistance
    as the ambient temperature changes (hence the name, therm(al) res(istor)).


    In the second example, we use a photodiode to see whether the surrounding atmosphere
    is dark enough to turn on an LED nightlight. A photodiode is a simple sensor that
    is essentially an LED in reverse—it generates current when a light shines on it,
    rather than lights up when you run an external current through. We will read the
    amount of current being produced by putting it in series with the Arduino’s internal
    pullup resistor and seeing how much it has changed a voltage after a short delay.


    Both sensors (and a force-sensitive resistor, described in the next section) are
    shown in Figure 8-1. The main issue with these in a classroom setting is avoiding
    losing them, as you can imagine. Pill bottles or boxes with separators for sorting
    work well to store them once they are out of the original packaging.


    ![A371637_1_En_8_Fig1_HTML.jpg](A371637_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1.** A force-sensitive resistor, photodiode, and thermistor


    **Tip**


    It is important to keep track of where you ordered your parts from so you can
    track down spec sheets or examples of how to use them. Take a screenshot or bookmark
    the page and develop a filing system to keep these so you can go back to them.


    ### Some Other Common Sensors


    There are too many sensors for the Arduino environment available now for us to
    list them all. This section can only give you a taste of some of the common types
    of sensors.


    Infrared sensors are photodiodes or phototransistors (another type of light-sensitive
    semiconductor that may provide a stronger signal) that are tuned to respond to
    lower frequencies than visible light. They are usually dark in color to filter
    out visible light. These are the types of sensors used by most TV remote controls
    and can create a simple way for one device to communicate with another. Other
    types of infrared sensors can be used to detect heat at a distance, like the ones
    used in non-contact thermometers.


    Force or pressure can be sensed by several types of devices. A force-sensitive
    resistor (FSR) is a simple pad of a conductive plastic or rubber that becomes
    more conductive when it is compressed. Though an FSR is not precise enough to
    measure weight or the magnitude of a force, it can be used to determine whether
    a force is present or not, like a big button. FSRs do not handle continuous force
    well, though, so if you’re planning to stand on top of one all day, it may break
    down prematurely. A variation on an FSR is a soft potentiometer, which will give
    you a different resistance depending on where you press on it.


    If you start searching online for Arduino sensors, you will discover exotic fare
    like tilt switches, vibration sensors, gravity/acceleration sensors, magnetic
    field sensors, distance sensors, humidity sensors, muscle sensors, heartbeat sensors,
    radiation sensors, and many more.


    **Note**


    In Chapter 11 we use a sewable sensor—a gyroscope that can detect motion. We decided
    it would be easier to understand in context of a project and so this chapter does
    not go into it. If you want to read about detecting and acting on motion of a
    garment, see the hat example in Chapter 11.


    ## Thermistor


    A thermistor is a resistor that varies a lot in resistance with temperature (usually
    a bad thing, if you were counting on your resistor keeping its value at different
    temperatures). When you buy a thermistor, you usually get a model number, something
    called a B (or beta) value, the maximum power it is rated for (usually not relevant
    when used in a voltage divider because the current is negligible), and a value
    for its reference resistance at a particular temperature (usually 25 degrees C).


    In the case of the Negative Temperature Coefficient (NTC) Thermistor MF52-103
    we use in this example, the rated power is 0.05 watts; it has a resistance of
    10 kΩ at 25 degrees C; and the B value is 3950 K. But what does all that mean?


    To proceed from here, you could search online for the type of product and “Arduino.”
    This approach has a lot of obvious problems:


    - What you find might be wrong.

    - You might not find anything.

    - It might not be clear enough what the Arduino sketch out there is doing to feel
    comfortable that the sensor will work predictably.


    As a rule, more expensive sensors (the ones that cost about $15 each, versus the
    ones that are one hundredth or so that price) will come with better documentation
    and libraries. We have the cheap ones here to illustrate the process.'
