- fmt: '#### Comments


    Programs usually are not meant to be read like a novel, despite the protestations
    of Rich and other strong coders who claim their code is “self-documenting.” To
    understand what is going on, people insert comments for later readers. The computer
    ignores these when the code is compiled, that is, translated from human-readable
    to computer-hardware-readable form. Comments start with a double slash if they
    are all on one line.


    ```

    // This is a comment.

    ```


    It is conventional to have a block of comments at the top of a program that says
    what it does, who wrote it and when, and any restrictions on copying it. Comments
    are useful to leave yourself notes about why you did something, too. You can “comment
    out” parts of a piece of code by putting `//` at the beginning of each line you
    want the compiler to temporarily ignore. Alternatively you can have a multiline
    comment by starting your comment with `/*` and ending it with `*/`, like this:


    ```

    /* This is a comment

    Blah blah

    Which ends here */

    ```


    The compiler ignores anything between `/*` and `*/` and so the Arduino or other
    processor does not see it.


    #### Variables and Loops


    A program has variables—which Joan likes to think of as boxes where things will
    be stored. In C++, a variable needs to be given a type—is it an integer, floating
    point, character, or some other type of variable? You can read about variable
    types that are supported for Arduinos at [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage).
    As we note earlier in the chapter, variable names are case-sensitive, and `APPLE`,
    `apple`, and `Apple` are all different variables from each other. Giving a variable
    a type looks like this:


    ```

    int apples = 15;

    ```


    That code creates the variable `apples` as the integer type and sets its value
    initially to 15. Note that you only have to define a variable’s type once, and
    then it is set for the entire code. Alternatively you can just give it a type:


    ```

    int apples;

    ```


    Or you can build the type into more complex code:


    ```

    for (int apples = 0; apples < 10; apples++) {

    // insert code here you want to run ten times

    } // end apples loop

    ```


    This fragment is a piece of code that we want to execute ten times. The first
    time it runs, `apples` would equal 0. Every time we run the code inside the loop,
    the variable `apples` is incremented by 1 (that is what the `apples++` does).
    The program will set `apples` to 0, run the code between the curly brackets, increment
    `apples`, then check whether `apples` is less than 10\. It will repeat that process
    until the answer is no and then it will continue executing whatever comes after
    the loop. The variable `apples` here is what is known as a loop counter— a variable
    that keeps track of how many times we have done something inside a loop.


    Variables have a scope as well. The scope of a variable refers to how much of
    the code will recognize it. If you define a variable up at the top of the code
    before (not inside the curly brackets of) your `setup()` and `loop()` functions,
    they will be global variables and visible to your whole program. If you define
    a variable inside the curly brackets that start and end a function, only that
    function will know about that variable.


    Global variables can be a little dangerous in general because you might lose track
    of what the variable is being set equal to if you are bouncing around between
    different functions and making assumptions about the value of a particular variable.
    But things like which pin is an input and an output and similar things are typically
    set to be global variables. Otherwise, a variable’s scope is within the function
    where it is defined. If you define `int apples;` inside `setup()`, you will get
    an error if you then use it in `loop()`, as you can see in Figure [6-3](#A371637_1_En_6_Chapter.html#Fig3).


    ![A371637_1_En_6_Fig3_HTML.jpg](A371637_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Scope compiler error


    #### Reserved Words


    Arduinos define a few words that are handy to have around. `HIGH`, `LOW`, `true`,
    and `false` are all defined. The full set is on [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage).
    There are also a few oddball conventions just for Arduino, like the fact that
    names of pins (numbers as well as A0 through A5) are always considered to be `int`
    variables, even though they contain letters. Arduino sketches convert these special
    values into integers for you.


    #### Functions


    Functions are sets of commands that you want to do over and over again, or that
    you want to isolate so that you can pull those commands out and replace them with
    something else in some circumstances. You can pass a value to a function in very
    predefined ways. The built-in functions `setup()` and `loop()` are “void” functions—they
    do not return any values to their code when they start.


    A function call looks like this:


    ```

    digitalWrite(pin, value);

    ```


    This function call says to use the commands defined for the function `digitalWrite`
    with two inputs, `pin` and `value`. What function inputs do is usually laid out
    in the comments. For Arduino built-in functions, the definitions are on the Arduino
    standards page cited earlier in the chapter. You can also create your own functions.
    This is handy if you have to do something over and over, but with different values
    (for example, rotating an arm a variable number of degrees).


    #### Assignments, Comparisons, and Basic Math


    Some conventions in computer programs are different than those in algebra class.
    In programming, an equals sign is an assignment operator—the two sides of the
    equal sign are not the same. For example, the following means “take whatever value
    `a` is, add one to it, and overwrite the current value of `a` to store the result
    in it”:


    ```

    a = a + 1;

    ```


    Or equivalently:


    ```

    a = a++;

    ```


    Or simply:


    ```

    a++;

    ```


    Here is a comparison which is asking whether `a` is equal to 1:


    ```

    a == 1

    ```


    Here is a comparison asking whether `a` is not equal to 1:


    ```

    a != 1

    ```


    Other common comparisons are less than (`<`), less than or equal to (`<=`), greater
    than (`>`), and greater than or equal to (`>=`).


    In programming languages, multiplication is typically shown by an asterisk, and
    division with a slash, as in the following respective examples: `a = b * c; a
    = b / c;` For more complex math functions, you may need to add a library to your
    code. See the section on libraries farther along in this chapter.


    #### If, Else, and While


    You can have a program do one thing if a certain thing happens, and do something
    else otherwise. The following code fragment checks to see whether the variable
    `darkness` is greater than 3\. If so, the code calls the function `light()` which
    does something. Otherwise, we set the variable `alternate` equal to 2:


    ```

    darkness = 5;

    if (darkness > 3) {

    light();

    } // end darkness conditional

    else alternate = 2;

    ```


    You can also have something happen while a condition holds. The next code fragment
    calls the functions `light()` and `spin()` as long as `darkness` is greater than
    or equal to 3\. Note that for this to ever end, somewhere else in the code the
    variable `darkness` would need to get set to less than 3:


    ```

    while (darkness >= 3) { // darkness greater than or equal to 3

    light();

    spin();

    }

    ```'
