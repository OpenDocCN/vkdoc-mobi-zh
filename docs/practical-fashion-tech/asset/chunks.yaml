  trans: '

    # 基础手缝工具与技巧


    缝纫的历史源远流长——可追溯至旧石器时代（可以在 [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)
    找到一段有趣的历史）。在机器时代，手缝是创造独一无二物品的一种方式，并且目前是家庭手工爱好者将缝纫部件附着到布料上的唯一真正可行途径。入门并不需要太多东西。


    我在课堂教学中教授缝纫、服装设计和制版，这意味着当学生有疑问或出现问题时，我能在现场解答和纠正。如果你是完全零基础的缝纫新手，我建议找个人指导你，或者观看一些在线视频来学习特定针法或解决疑问。以下是一些适合从零开始的网站：[`www.Instructables.com/id/How-to-Sew`](http://www.Instructables.com/id/How-to-Sew)
    或 [`www.wikihow.com/sew`](http://www.wikihow.com/sew) ，或视频 [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0)。在
    `Instructables` 网站上还有制作多种针法的短视频，例如本章中描述的暗缝针法（`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch/`）。


    或者，直接搜索“如何缝纫”或“如何手动或机器缝纫”。有时需要多看几张图片或几种描述才能理解所讲解的内容。图 3-2 展示了练习本节所述各种针法所需的工具。完成你的作品也会用到它们：


    ![A371637_1_En_3_Fig2_HTML.jpg](img/A371637_1_En_3_Fig2_HTML.jpg)


    图 3-2.


    你需要的物品


    - 轻至中等重量的棉布。

    - 锋利的手缝针（适用于轻至中等重量布料）。

    - 缝纫剪或剪刀（通常在布店能买到）。

    - 通用缝纫线。有很多品牌可供选择。我喜欢古特曼（Gutermann）的涤纶线，它有一定弹性且不易断裂。练习针法时，使用与布料颜色对比鲜明的线，能让你更容易看清布面上的针迹。

    - 直针（缝纫时用于固定布片）和针插（用于插放缝针）。

    - 卷尺。（测量身体时，布卷尺最佳。如果没有，可以用绳子或缎带绕被测部位一周，然后用尺子测量绳长。）

    - 裁缝粉笔或水溶性记号笔（用于在布料上标记剪口、省道或纸样上的其他符号）。

    - 拆线器（用于拆掉缝错的部分）。

    - 熨斗（用于熨平缝好的接缝并去除褶皱）。


    以下物品也很有用，但并非必需：


    - 切割垫或硬纸板（保护台面并保持布料清洁）

    - 穿针器

    - 放大镜

    - 顶针（保护手指）

    - 蜂蜡（本章后面会介绍）


    开始你的第一次缝纫实验时，选择一小块轻至中等重量的通用棉布。布料种类繁多，棉布是学习和练习基础技能容易上手的选择。你可以用一条大手帕、面粉袋厨房毛巾，或者从布店买些零头布（零头布是布匹末端的剩余布料，通常价格便宜）。


    小贴士


    你可以在线购买布料，但如果你不熟悉布料的各种特性，最初去实体布店可能会更明智。在那里你能亲手触摸布料，并咨询关于重量、弹力大小以及用缝纫机缝制时需要何种型号缝针等问题。


    ## 穿针


    如前面所述，拿好你的锋利缝针和对比色的线，以便更容易看清布料上的针迹。以后当你制作成衣时，通常希望线的颜色与布料相匹配。不过，有时你可能也会想用对比色线来作为设计点缀。


    手持缝针，针眼朝向自己。剪掉线头的一小段，确保它没有分叉，然后穿过针眼，直到能从背面捏住线头，再拉出约 3-4 英寸。或者，你可以使用穿针器（图 3-3）。握住针眼和线，从线轴上拉出约
    12-18 英寸的线，然后剪断线头。


    ![A371637_1_En_3_Fig3_HTML.jpg](img/A371637_1_En_3_Fig3_HTML.jpg)


    图 3-3.


    使用穿针器


    注意


    你很快就会发现线头容易分叉。导电线尤其难以这样处理。在线头上涂一点蜂蜡可以防止线头分叉，并使穿针更容易。对于棉线，如果你觉得不恶心，也可以用嘴湿润线头。但不要对导电线这样做——既不管用，也因为线头有点锋利。


    ## 打结


    确保握紧针眼和线，或者将其插入针插（线很容易从针上滑脱，需要重新穿针，这会很烦人）。使用较长的那段线，将线头捏在食指和拇指之间，绕手指一圈，然后一边牢牢捏住线头，一边用拇指和食指搓转线圈并将其从手指上推下（图
    3-4）。运气好的话，你就能打成一个结。


    ![A371637_1_En_3_Fig4_HTML.jpg](img/A371637_1_En_3_Fig4_HTML.jpg)


    图 3-4.


    打结


    有时最好重复这个过程一次，以得到一个稍大且更牢固的结。如果结相对于布料织纹来说太小，它会从布面脱出，你就必须重新打结再开始——有时需要反复尝试。刚开始学习缝纫时，这会考验你的耐心，但总有办法纠正错误并继续下去。深呼吸，或者在房间里、屋子周围或街区内短暂走走，可能会有所帮助。


    小贴士


    如果布料织纹非常稀疏，一个好方法是先缝一小针，将线几乎全部拉出，然后将线头打个结。我们在本书的其他项目中会用到导电线。导电线由细小的编织金属丝制成，很难打出牢固的结。给导电线打结后（普通线则不必），我会滴一滴透明指甲油来固定结头。


    区分正面和反面


    布料顶面或颜色更鲜艳的一面称为正面。底面或颜色较暗淡的一面称为反面。使用有绒毛的布料（因摩擦方向不同而呈现不同外观的布料），如灯芯绒、天鹅绒和丝绒时，绒毛面为正面。卫衣布料则用光滑的一面作为正面，而非起毛的一面。


    ## 使用不同的针法


    本节将介绍将物品缝在一起的不同方法。针法是你的缝纫工具，掌握多种针法会大有裨益。


    小贴士


    始终捏住缝针靠近针眼处的针体与线，以防止线从针眼滑脱。这能帮你避免反复穿针。

    '
- fmt: '### Running Stitch


    Put the two right sides of the fabric together. Holding the needle and thread,
    poke the tip of the needle up from the bottom side (the two right sides will be
    together) and pull it through both pieces of fabric until the knot hits the fabric.
    Approximately a quarter of an inch from where it came up, push the needle through
    from the top side and pull until the thread is pulled all the way through and
    the stitch is flat. For clarity, Figure [3-5](#A371637_1_En_3_Chapter.html#Fig5)
    just shows the stitch through one thickness of fabric.


    ![A371637_1_En_3_Fig5a_HTML.jpg](A371637_1_En_3_Fig5a_HTML.jpg)![A371637_1_En_3_Fig5b_HTML.jpg](A371637_1_En_3_Fig5b_HTML.jpg)


    Figure 3-5. The running stitch in progress


    Continue these steps to make a straight line of stitches. You can make the stitches
    on the wrong side (or bottom) slightly longer than the right side (or top), or
    you can make them the same length. Experiment with different sizes until you are
    comfortable with the technique and able to keep the stitches neat.


    ### Basting Stitch


    This stitch is the same as the running stitch but each stitch is quite a bit longer.
    It is a temporary stitch that usually holds pieces together without pins for machine
    sewing, for quick hems and other repairs or temporary fixes.


    ### Backstitch


    This is the strongest stitch, and perhaps easiest to keep straight. Make a stitch
    in the fabric, and when you bring the needle up through the fabric for a second
    stitch, instead of taking a stitch away from the first one, poke the needle through
    at the end of the first stitch on top and pull the thread through the fabric (Figure
    [3-6](#A371637_1_En_3_Chapter.html#Fig6)). The next stitch will be longer on the
    bottom, pull through to the top, and back stitch to the end of the previous stitch.
    Carry on with this technique, or use a few running stitches in between each backstitch.


    ![A371637_1_En_3_Fig6a_HTML.jpg](A371637_1_En_3_Fig6a_HTML.jpg)![A371637_1_En_3_Fig6b_HTML.jpg](A371637_1_En_3_Fig6b_HTML.jpg)![A371637_1_En_3_Fig6c_HTML.jpg](A371637_1_En_3_Fig6c_HTML.jpg)


    Figure 3-6. Creating a backstitch


    ### Slip Stitch or Blind Stitch


    This stitch is a bit complicated, but it’s a nice way to give your garment or
    project a professional look. It is an almost invisible stitch, and once you learn
    to slip stitch, it is a fairly quick finish.


    To practice the slip stitch, cut out a small square of fabric and fold it in half.
    Open, and fold each side into the center line, press, and then fold down the center
    line (this and the next sequence of steps are shown in Figure [3-7](#A371637_1_En_3_Chapter.html#Fig7)).


    ![A371637_1_En_3_Fig7a_HTML.jpg](A371637_1_En_3_Fig7a_HTML.jpg)![A371637_1_En_3_Fig7b_HTML.jpg](A371637_1_En_3_Fig7b_HTML.jpg)


    Figure 3-7. Folding the fabric for slip stitch


    Pull the needle through the top of the fabric by sticking it through the top folded
    edge until the knot catches. Now move the needle to the bottom fold, stick the
    needle into the crease horizontally, and push it along behind the fabric for about
    1/4 inch. Then pull the needle through and go back up to the top fold. Push the
    needle horizontally through the top fold and pull through. Continue in this way
    until the end (see Figure [3-8](#A371637_1_En_3_Chapter.html#Fig8)).


    ![A371637_1_En_3_Fig8a_HTML.jpg](A371637_1_En_3_Fig8a_HTML.jpg)![A371637_1_En_3_Fig8b_HTML.jpg](A371637_1_En_3_Fig8b_HTML.jpg)![A371637_1_En_3_Fig8c_HTML.jpg](A371637_1_En_3_Fig8c_HTML.jpg)![A371637_1_En_3_Fig8d_HTML.jpg](A371637_1_En_3_Fig8d_HTML.jpg)


    Figure 3-8. Stitching with blind stitch


    At the end, make a small stitch in the fold opposite your last long stitch. Pull
    the thread until it forms a small loop and put your needle through the loop. Pull
    the thread to form a knot. Do this three times to create a strong end knot. This
    stitch can be used to connect two pieces of fabric or on a single piece of fabric
    as an edging.


    ### Blanket Stitch


    The blanket stitch is also intended to connect an edge. Start as you did for the
    blind stitch—pull the thread through from the back to the front near the edge
    of the fabric. Then place the needle diagonally to the direction you are stitching
    and go to the back of the fabric. Do not pull the thread tight. Rather, stick
    your needle through this loop first and then pull the thread to create a 90-degree
    angle. Continue until you have finished the edge. At the end, move the needle
    to the right of the last vertical line the thread forms, bring it up through the
    fabric, and form a loop. Put the needle through the loop and pull tight three
    times to form the end knot (Figure [3-9](#A371637_1_En_3_Chapter.html#Fig9)).
    Just like the slip stitch, the blanket stitch can connect two pieces of fabric
    or be used as an edge on a single piece.


    ![A371637_1_En_3_Fig9_HTML.jpg](A371637_1_En_3_Fig9_HTML.jpg)


    Figure 3-9. Blanket stitch


    ### Whip Stitch


    Fold a piece of fabric in half and pin it together. Insert the needle through
    the fold from the inside (Figure [3-10a](#A371637_1_En_3_Chapter.html#Fig10))
    so that it comes out the front side (Figure [3-10b](#A371637_1_En_3_Chapter.html#Fig11)).
    Push the needle through the back and to the front so that it comes out level to
    the first stitch (Figure [3-10c](#A371637_1_En_3_Chapter.html#Fig11)). Continue
    to the end (Figure [3-10d](#A371637_1_En_3_Chapter.html#Fig11)) and create a finishing
    knot.


    ![A371637_1_En_3_Fig10c_HTML.jpg](A371637_1_En_3_Fig10c_HTML.jpg)![A371637_1_En_3_Fig10d_HTML.jpg](A371637_1_En_3_Fig10d_HTML.jpg)


    Figure 3-10c. (top) and d (bottom). Whip stitch steps c and d


    ![A371637_1_En_3_Fig10a_HTML.jpg](A371637_1_En_3_Fig10a_HTML.jpg)![A371637_1_En_3_Fig10b_HTML.jpg](A371637_1_En_3_Fig10b_HTML.jpg)


    Figure 3-10a. (top) and b (bottom). Whip stitch steps a and b


    **Tip:** Use the pictures for reference to help you understand the instructions.
    These stitches should look the same on both sides of the fabric.'
