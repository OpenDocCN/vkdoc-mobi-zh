  trans: '

    ### 伺服电机


    伺服电机是一种小型马达，能够将其转轴旋转到特定的角度位置。通常，伺服电机附带各种称为舵臂的小塑料件，你可以用它来连接需要推动或拉动的绳索或其他物品。图 8-6
    展示了一个安装有舵臂的伺服电机。这个特定的舵臂有两个长臂和两个短臂，但它们有各种不同的形状，大多数业余伺服电机都包含几种不同的可选配件。这种电机很可能是你在可穿戴设备上用来驱动某些部件运动，或对传感器检测到的条件做出反应（例如，在天黑时合上某物）时使用的类型。


    ![A371637_1_En_8_Fig6_HTML.jpg](img/A371637_1_En_8_Fig6_HTML.jpg)


    **图 8-6.** 一个伺服电机


    同时为伺服电机和 Arduino 供电可能会有些棘手。伺服电机可能会消耗相当大的电流，尤其是在它被阻止到达目标位置时（这被称为堵转电流）。尝试从电源获取超出其提供能力的电流，通常会导致电流下降（或者在某些情况下，会烧断保险丝——该保险丝可能是自恢复式的，也可能需要更换）。


    要使用伺服电机，你应该避免让电流通过 Arduino 的电压调节器（即电路板上管理电源的芯片）。如果将电机连接到 Arduino 的电源总线上，就会发生这种情况。这可能导致电流超出调节器的处理能力，从而使控制器电压过低并复位。


    为避免此问题，大多数 Arduino 开发板都配备了一个可用于连接墙式电源或电池的接口。请使用 `Vin` 引脚连接伺服电机的正电压（V+）侧，以绕过稳压器，然后在插入
    USB 连接器之前先插入电源适配器。最后，再插入 USB 连接器，这样你就可以下载程序（sketch）来用 Arduino 控制伺服电机了。（伺服电机控制示例包含在与
    IDE 一起下载的示例集中，请参阅文件 ➤ 示例 ➤ Servo。）


    在图 8-6 中，请注意伺服电机引出的三根导线。惯例是：棕色线连接地（`GND`），红色线连接 5V，橙色线是信号（控制）线。（有时使用黑色线作为地线，白色线作为信号线。）如何连接这些线，很大程度上取决于你具体要做什么以及你需要多少功率。请查阅与你项目相似的现有示例项目，看看它们是如何连接的，同时务必牢记我们刚才提到的注意事项。


    ## 本章小结


    在本章中，我们给出了将传感器连接到 Arduino 的一般原则，并详细介绍了两个示例。我们还介绍了如何查找特定传感器的更多信息，以及当传感器没有可穿戴形式可用时该如何处理。此外，我们简要介绍了
    Arduino 可以控制的不同类型的电机，并包含了一个关于如何使用伺服电机进行简单机械控制的教程。在第 10 章中，我们将展示更复杂的传感器和电机示例，在第
    11 章中，我们将使用陀螺仪来追踪头部运动。


    # 9. 3D 打印


    近来，3D 打印已大规模进入高级时装领域（正如我们在第 13 章中提到的），但其中大部分使用的是比现在广泛普及的消费级 3D 打印机更先进的技术。在本章中，Joan
    和 Rich 将快速介绍 3D 打印，并向你展示它的一些实用和装饰性用途。


    ## 3D 打印的工作原理


    简而言之，3D 打印技术通过计算机模型控制，一次一层薄层地堆积材料来制造物体。堆积的材料因打印机类型而异（无论是从粉末、液态树脂还是线材卷开始），但所有过程从根本上讲都是相似的。这些层通常约
    0.2 毫米厚——根据维基百科的说法，这个厚度是平均人类头发直径或油漆涂层厚度的两倍，大约相当于一个平均大小的单细胞生物（如草履虫）的长度（ [`https://en.wikipedia.org/wiki/100_micrometres`](https://en.wikipedia.org/wiki/100_micrometres)
    ）。


    3D 打印并非新鲜事物。自 20 世纪 80 年代以来，它就一直以某种形式存在，第一家公司 3D Systems 由 Chuck Hall 于 1986 年创立。然而，直到
    21 世纪中期，3D 打印过程一直受专利保护，而专利持有者选择将其作为一项面向工业用户的昂贵技术。


    当关键专利过期后，时任英国巴斯大学的 Adrian Bowyer 设计了一款 3D 打印机，该打印机能够利用一些在五金店就能买到的零件，制造出其他的 3D
    打印机。随后，他将此设计以开源方式发布（意味着任何人都可以在此基础上进行开发，前提是他们也必须将自己的改进公之于众），以便每个人都能在其基础上进行构建。


    这引发了 RepRap（REPlicating RAPid prototyper，自我复制快速原型机，[`www.reprap.org`](http://www.reprap.org)
    ）打印机革命，最终促成了现有各种消费级打印机的出现。这一革命得益于可自由获取的技术，以及随后不久出现的众筹这一历史巧合。


    **注意**


    “3D 打印”这个术语有些误导性，因为人们会立刻将其与在纸上打印文档相类比，但实际上这两个过程并没有太多共同之处。更通用的术语“增材制造”描述更准确，尽管可能不那么朗朗上口。


    消费级打印机大多使用塑料线材卷（请参阅本章稍后的“3D 打印材料”部分）。图 9-1 展示了一台典型的小型消费级 3D 打印机及其线材卷。这台打印机恰好是由
    Rich 设计的。它有四个小型电机：一个用于驱动三个维度中每个维度的机械结构，一个用于将线材推入挤出机。


    ![A371637_1_En_9_Fig1_HTML.jpg](img/A371637_1_En_9_Fig1_HTML.jpg)


    **图 9-1.** 一台消费级 3D 打印机


    挤出机由两部分组成。一部分是驱动机构（包括一个电机和夹紧线材的零件）。另一部分是热端，线材在此处熔化并通过一个喷嘴（本例中直径为 0.5 毫米）挤出，喷出精细的熔融塑料流。物体在平台上（图
    9-1 中被蓝色胶带覆盖的区域）逐层堆积而成。与许多消费级打印机一样，这台打印机由一个微处理器控制，该微处理器本质上是一个添加了一些定制功能的 Arduino。


    树脂打印机使用光线选择性地固化光敏液态树脂。价格适合消费者的树脂打印机正变得越来越普遍，它们对于珠宝和精细打印尤其有用，但树脂处理起来比较麻烦，需要小心操作。使用粉末的打印机则使用激光烧结颗粒，或使用喷墨打印头沉积粘合剂（如胶水或溶剂）使它们粘合。这些打印机可以制造出表面相对光滑的产品，但价格昂贵，并且材料处理方面的挑战远大于线材打印机。本章我们将重点介绍基于线材的打印机的应用，并在第
    13 章中简要讨论高端应用。

    '
- fmt: '# 在3D打印机上制作物品的步骤


    在3D打印机上制作物品需要几个步骤。首先，您需要使用3D CAD（计算机辅助设计）程序创建一个3D模型。接下来，您使用切片计算机程序将该模型转换为打印机制作各层的命令。最后，您将该文件加载到打印机上（这可能是通过从计算机将文件写入`SD`卡，或者通过`USB`电缆或无线方式连接计算机来实现），然后打印您的物品。接下来的章节将更详细地介绍这些步骤中的每一步。


    ## 基于线材的3D打印机的限制


    基于线材的3D打印机制作的模型都是单一颜色的——即线材的颜色。有些打印机有多个挤出机，可以使用的颜色数量与挤出机数量相同。还有一些使用其他技术的多色打印机，但在撰写本文时，它们尚未达到消费者的价格水平。


    关于基于线材的3D打印机的局限性，您需要了解以下几点：


    *   打印任何东西都需要一段时间。即使是小物件也可能需要半小时，而大型打印则可能需要数天。大多数打印机在过程中途出现问题后无法重新启动。

    *   3D打印的零件通常很小。打印机的打印面积从每边4或5英寸到大约两倍大小不等。能够构建任何维度超过一英尺物体的打印机，其价格会迅速变得昂贵。

    *   能够可靠制造的最小特征尺寸大约为1毫米，我们通常建议细节不要小于这个尺寸。原因是打印机挤出的线材线条可以接近这个尺寸——它就像是蛋糕装饰用的挤压喷嘴的缩小版。我们在本章演示中所用打印机的喷嘴开口为`0.5
    mm`，但它会挤压其制作的线条，使其在垂直方向上更薄，因此它挤出的线条比`0.5 mm`更粗。

    *   打印件从底部开始构建，如果它们有悬空的部分，需要以某种方式支撑起来，然后这些支撑物之后必须被切掉。有一些程序可以处理创建支撑物，但提前考虑好这一点是良好的设计实践。同样，打印件需要与构建平台有足够的接触面积，以防止在打印过程中被撞掉。

    *   3D打印需要进行调整、维护，以及偶尔清理堵塞。购买前请查看用户评论，以了解打印机的可靠性和故障排除的难易程度。


    ## 3D建模


    3D打印过程的第一步是下载或创建一个3D计算机模型。有很多网站提供免费的可下载模型，包括[`www.thingiverse.com`](http://www.thingiverse.com)和[`www.youmagine.com`](http://www.youmagine.com)。免费下载网站存在一个问题：任何人都可以（并且确实会）上传模型，其中许多模型打印效果不佳或根本无法打印。寻找那些下载量大且附有样品打印图片的模型。


    如果您想创建自己的模型，有多种选择，其中许多是免费和/或开源的。本节将介绍其中两种，但还有很多其他选择。建模过程将生成一个以`.stl`结尾的文件，通常称为“`STL`文件”。`STL`代表立体光刻（stereolithography），这是树脂打印机使用的工艺。`STL`格式是消费级3D可打印模型的事实标准。某些版本的`Windows`不喜欢`.stl`扩展名，并认为它是某种安全文件，因此在您保存`STL`文件时，`Windows`可能会给出一些奇怪的警告。


    > **注意**：除了`STL`之外，还有其他一些3D建模标准——特别是许多图形程序使用的`OBJ`，以及尚未被广泛支持但旨在取代`STL`并能跟踪模型中不同材料使用的`AMF`，但在本章中，我们将重点介绍如何创建`STL`文件。


    ### TinkerCAD 及其他 123D 应用


    Autodesk 拥有一整套CAD软件（[`www.123dapp.com`](http://www.123dapp.com)），其中最简单的是Tinkercad（[`www.tinkercad.com`](http://www.tinkercad.com)）。Tinkercad允许进行拖放式设计。这很好，因为您可以非常快速地设计东西。在手绘方面它有些局限，尽管有办法可以绕过。如果您可以通过从各种基本形状构建来创建您想要建模的东西，那么Tinkercad是一个不错的选择。


    有许多社区贡献的形状，包括一个允许您以3D格式打印文本的实用程序，以及另一个打印齿轮的实用程序。图[9-2](#fig2)是一个在Tinkercad中开发的简单小吊坠。此处显示它在3D打印机上带有一个brim（一种辅助模型牢固粘附在打印机上的几圈3D打印线条），以及从打印机上取下后，以显示有多少打印部分是brim（图[9-3](#fig3)）。您可以在特写镜头中看到层纹，并看到特征尺寸的限制。这个吊坠最宽处约50毫米，可在[`https://tinkercad.com/things/kQD9mpZ1BLf`](https://tinkercad.com/things/kQD9mpZ1BLf)公开获取。


    ![图 9-3. Tinkercad 制作的吊坠](A371637_1_En_9_Fig3_HTML.jpg)


    ![图 9-2. 打印机上的 Tinkercad 吊坠，brim 仍附着](A371637_1_En_9_Fig2_HTML.jpg)


    如果您只是想让一个艺术班快速制作一个小玩意作为别针或吊坠，Tinkercad可能是一个不错的选择。字母、数字和一些符号（如本例中的星形）都是可用的，如果您进入社区选择，您可以找到从用户指定的齿轮到各种字体的文本等东西。


    > **提示**：Tinkercad在其网站上提供了很好的教程，应该可以帮助您快速上手。


    ### OpenSCAD


    `OpenSCAD`程序允许您以一种类似于C/Java/Python编程语言家族的风格来开发模型。它是免费且开源的，我们要感谢Marius Kintel以及该程序的许多其他贡献者和维护者。您可以从[`www.openscad.org`](http://www.openscad.org)下载`OpenSCAD`，一份优秀的用户手册可在[`www.openscad.org/documentation.html`](http://www.openscad.org/documentation.html)找到。


    根据下载站点上的说明下载并安装`OpenSCAD`。`OpenSCAD`提供适用于Linux/UNIX、Windows和Mac OS X的版本。图[9-4](#fig4)展示了Rich在`OpenSCAD`中创建的一些“宝石”。如果您懂一点编程，或者从一个现有的示例开始，您可以创建相当复杂的模型。许多可下载且可用户修改的模型都是用`OpenSCAD`编写的。


    ![图 9-4. 在 OpenSCAD 中创建的“宝石”](A371637_1_En_9_Fig4_HTML.jpg)


    ### 其他 CAD 程序


    市面上还有很多其他的CAD程序。一些为动画设计的程序，例如免费的、开源的Blender（[`www.blender.org`](http://www.blender.org)）或商业程序Maya（[`www.autodesk.com/products/maya`](http://www.autodesk.com/products/maya)），可以制作出非常复杂的模型。然而，它们的学习曲线很长，并且需要特别注意模型的构建方式，因为它们并不是为了制作可3D打印的模型而设计的。


    如果您想制作工程类的零件（带尺寸的机械部件），可以考虑Onshape（[`www.onshape.com`](http://www.onshape.com)），这是一个相对较新的程序，其新颖之处在于它是一个价格相对实惠的工程程序。'
  raw: 'Making something on a 3D printer requires several steps. First, you need to
    create a 3D model using a 3D CAD (computer-aided design) program. Next, you take
    that model and use a slicing computer program to convert the CAD file into commands
    for the printer to create the layers. Finally, you load that file onto the printer
    (which might happen by writing the file from a computer onto an SD card or by
    connecting a computer via a USB cable or wirelessly) and print your object. The
    next sections look at each of these steps in a bit more detail.


    Filament-based 3D printers create models all in one color—the color of the filament.
    There are some printers that have more than one extruder, which can use as many
    colors as they have extruders. There are multi-color printers using other technologies,
    but they are, as of this writing, not at the consumer price point.


    Here are a few things you should know about the limitations of filament-based
    3D printing:


    *   It takes a while to print anything. Even small objects can take half an hour,
    and big prints can take days. Most printers cannot restart if they have an issue
    partway through.

    *   3D-printed pieces are usually pretty small. Printers have print areas ranging
    from 4 or 5 inches on a side up to about twice that. Printers that can build objects
    more than a foot in any dimension get expensive rapidly.

    *   The smallest feature size one can make reliably is about a millimeter, and
    we usually suggest that details not get that small. The reason is that the line
    of filament the printer puts down can approach that size—it is like a scaled-down
    version of a cake-decorating squeeze nozzle. The nozzle opening in the printer
    we use for our demonstrations in this chapter has a 0.5 mm nozzle, but it squishes
    down the lines it makes to have them thinner in the vertical direction, so the
    lines it puts down are thicker than that.

    *   Prints build up from the bottom, and if they have parts hanging out in space
    they need to be supported somehow, and then this support has to be cut off later.
    There are programs that handle creating support, but it is good design practice
    to think this through ahead of time. Similarly, prints need to have some hefty
    amount of contact with the build platform so that they do not get knocked off
    during the process.

    *   3D printing takes tweaking, maintenance, and the occasional cleanout of a
    clog. Look at user reviews before you buy to get a sense of a printer’s reliability
    and ease of troubleshooting.


    ## 3D Modeling


    The first step in the 3D-printing process is to either download or create a 3D
    computer model. There are a lot of sites with free downloadable models, including
    [`www.thingiverse.com`](http://www.thingiverse.com) and [`www.youmagine.com`](http://www.youmagine.com)
    . Free download sites have the issue that anyone can (and does) upload models,
    and many of these will not print well or at all. Look for models that have a lot
    of downloads and some sample prints posted.


    If you want to create your own models, you have a variety of options, many of
    them free and/or open source. This section goes over two of them, but there are
    many more. The modeling process will produce a file ending in .stl, normally referred
    to as “an STL file.” STL stands for stereolithography, which is the process used
    by resin printers. The STL format is a de facto standard for consumer 3D-printable
    models. Some vintages of Windows do not like the .stl extension and think it is
    some sort of security file, so you may get some strange complaints from Windows
    when you save STL files.


    Note


    There are some other 3D-modeling standards around besides STL—notably OBJ, used
    by many graphics programs, and AMF, which is not yet widely supported but is designed
    to replace STL and can track the use of different materials in a model, but in
    this chapter we will focus on creating an STL file.


    ### TinkerCAD and the Other 123D Apps


    Autodesk has a whole suite of CAD software ( [`www.123dapp.com`](http://www.123dapp.com)
    ), the simplest of which is Tinkercad ( [`www.tinkercad.com`](http://www.tinkercad.com)
    ). Tinkercad allows for drag-and-drop design. This is good because you can design
    things very quickly. It is a little limiting in the area of drawing freehand,
    although there are ways around it. If you can create what you want to model by
    building it up from a variety of basic shapes, Tinkercad is a good choice.


    There are many community-contributed shapes, including a utility that allows you
    to print text in 3D and another that prints gears. Figure [9-2](#A371637_1_En_9_Chapter.html#Fig2)
    is a simple little pendant that was developed in Tinkercad. It is shown here on
    a 3D printer with a brim, a few 3D-printed lines that help the model stick to
    the printer securely, and then off the printer to show how much of the print was
    the brim (Figure [9-3](#A371637_1_En_9_Chapter.html#Fig3)). You can see the layer
    lines in the closeups, and see the limitations on feature size. This pendant is
    about 50 mm across at its widest point and is publicly available at [`https://tinkercad.com/things/kQD9mpZ1BLf`](https://tinkercad.com/things/kQD9mpZ1BLf)
    .


    ![A371637_1_En_9_Fig3_HTML.jpg](A371637_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Tinkercad-created pendant


    ![A371637_1_En_9_Fig2_HTML.jpg](A371637_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Tinkercad pendant on the printer, with brim still attached


    If you just want to have an art class whip up a little piece to make into a pin
    or pendant, Tinkercad may be a good choice. Letters, numbers, and some symbols
    (like the star in this example) are available, and if you go into the Community
    selections you can find things from user-specified gears to text in various fonts.


    Tip


    Tinkercad offers good tutorials on its website that should help get you up and
    running quickly.


    ### OpenSCAD


    The OpenSCAD program allows you to develop models in a style that sort of looks
    like the C/Java/Python family of programming languages. It is free and open source,
    and we want to acknowledge and thank Marius Kintel and the many other contributors
    and maintainers of the program. You can download OpenSCAD from [`www.openscad.org`](http://www.openscad.org)
    , and an excellent user manual is available at [`www.openscad.org/documentation.html`](http://www.openscad.org/documentation.html)
    .


    Download OpenSCAD and install it per the instructions on the download site. OpenSCAD
    is available in versions for Linux/UNIX, Windows, and Mac OS X. Figure [9-4](#A371637_1_En_9_Chapter.html#Fig4)
    shows a few “jewels” Rich generated in OpenSCAD. You can create quite complex
    models if you know a little bit of programming, or start from an existing example.
    Many downloadable models that are user-changeable are written in OpenSCAD.


    ![A371637_1_En_9_Fig4_HTML.jpg](A371637_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    “Jewels” created in OpenSCAD


    ### Other CAD Programs


    There are a lot of other CAD programs out there as well. Some of the programs
    designed for animation, like the free, open source program Blender ( [`www.blender.org`](http://www.blender.org)
    ) or the commercial program Maya ( [`www.autodesk.com/products/maya`](http://www.autodesk.com/products/maya)
    ), can make very sophisticated models. However, they have long learning curves
    and require special attention to how your model is constructed because they are
    not intended to make models that are 3D printable.


    If you want to make engineering-type parts (dimensioned mechanical pieces), you
    might consider Onshape ( [`www.onshape.com`](http://www.onshape.com) ), which
    is a relatively new program and novel in being a relatively affordable engineering
    program.'
