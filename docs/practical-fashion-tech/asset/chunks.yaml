    literature, but most are aimed at undergraduates for in-class use. For college
    students, or for a high school instructor’s background and preparation, we suggest:


    *   Donald Norman’s classic The Design of Everyday Things (Basic Books, 2002)

    *   Henry Petroski’s books, notably To Engineer is Human (Vintage Books, 1992)

    *   Peter Forbes’s The Gecko’s Foot (Norton, 2005) for biomimetic ideas (a good
    source of possible projects)

    *   Horvath and Cameron’s The New Shop Class (Apress, 2015)


    Learning to sew and create/use patterns (theater oriented):


    *   Barbara and Cletus Anderson’s book Costume Design , 2nd Edition (Harcourt
    Brace College Publishers, 1999)

    *   Shirley Dearing’s Elegant Frugal Costumes (Meriwether Publishing, Ltd., 1992)

    *   Sheila Jackson’s Costumes for the Stage , 2nd Edition (New Amsterdam Books,
    2001)

    *   Nancy Bradfield’s Costume in Detail 1730–1930 (Costume and Fashion Press,
    an imprint of Quite Specific Media Group, Ltd., 1997)

    *   [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com) and [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)
    .


    Electronics background:


    *   Becky Stern and Tyler Cooper, Getting Started with Adafruit Flora (Maker Media,
    2015)

    *   Kate Hartman, Wearable Electronics (Maker Media, 2014)

    *   Tutorials at [`https://learn.adafruit.com`](https://learn.adafruit.com) ,
    [`https://learn.sparkfun.com/tutorials`](https://learn.sparkfun.com/tutorials)
    , and [`www.instructables.com`](http://www.instructables.com) .


    ### Course Content Outline


    This section suggests a list of projects to be completed by students in a one-year
    class, tied to items in this book. This class takes significant prep time; walk
    through exactly what the students are building just before they do, using the
    equipment they will use. It is easy to lose time to software not being available,
    or to a small component being in short supply, and so on.


    This outline assumes that the students know nothing about sewing, coding, and
    electronics. Particularly in a larger class, this may not be the case, and students
    with more background can be recruited to help less-experienced ones. Students
    with some background may skip some of the suggested projects and either tutor
    their fellow students during that time or move on to a more advanced project.


    Tip


    Time allowed will vary a lot based on student experience and class size. Obviously
    the major projects could be quarter or semester projects instead. Allow time to
    fix problems and deal with the unexpected, particularly the first time you teach
    it.'
  trans: "\n### 课程安排\n\n课程安排需要具备一定的灵活性，因为同一个项目可能让不同的学生花费截然不同的时间去完成。一名学生可能会在第 3 周开始一个项目并在第\
    \ 7 周完成，而另一名学生可能在第 5 周完成项目，然后开始另一项工作并于第 10 周完成。教师需要适应学生既向自己学习、也向彼此学习的方式；教师无需频繁授课，但更常在项目需要时进行一对一的指导。\n\
    \n这门课也可以围绕“即时学习”来构建——第一个为了自己的项目需要学习某样东西的学生，之后会将知识传授给其他人；或者当有人在学习新东西时，其他人暂停手头工作并观摩学习。这种模式在小规模的试点班级中运行良好，但要扩大规模可能需要仔细考量。因此，我们不会列出每周的详细安排，而是建议一组混合的项目。如果是大班教学，可能需要更结构化的安排。\n\
    \n这门课很难在一小时的课时内进行，因为光是拿出和收起当天的材料就会耗费大量时间。如果可能，我们建议将其安排为两节连上的大课，或者在一年中的几周内（例如，为支持学校戏剧制作而制作服装时）安排带有强制性课后或周六时间的集中课程。\n\
    \n### 材料共享\n\n对于大班来说，许多人需要共享资源，比如缝纫机、裁剪台、焊接工位等等。分阶段安排项目，让不同的人做不同的事，有助于实现这种共享。需要提前想好，当人们的工作进度出现差异时，或者（可能更麻烦的是）当所有人同时进入同一个阶段时，你将如何利用你的教室空间。\n\
    \n同时，也要考虑半成品（进行中的作品）的存放位置。如果有多个班级共享材料，那么在每节课结束时拆解和拆除电路可能会令人沮丧或不切实际，因此你可能需要为每个班级准备一套独立的材料。\n\
    \n不过，在课间，这些材料需要有地方存放。根据我们的经验，学生的项目似乎总会不断扩张，填满所有可用的空间，此外再多出 10%你希望拥有的空间。另外，还要考虑如何展示（以及如何选择）优秀的项目作品。\n\
    \n### 教室环境\n\n为时尚科技课提供设施可能是一项挑战。配有高脚凳、适合电子实验的实验台可能不适合缝纫，因为缝纫机有脚踏板，坐在实验高脚凳上可能够不着。如果课程将在电子实验室或缝纫室进行，请务必实际尝试一下该房间通常不进行的活动。例如，在学生到达之前，先在电子实验室里试着缝纫。\n\
    \n很难让整个教室的学生都能看清你如何演示缝纫或组装电子器件。可以考虑提前通过电子邮件将照片发给学生，或者以电子方式分享它们。我们尝试过用网络摄像头和视频展示台，但你的手指往往会挡住视线。\n\
    \n> **提示**  \n> 确保你拥有良好的工作照明，无论是对电子操作还是缝纫都是如此。\n\n### 预算\n\n这门课的材料费可能会变得很昂贵，这取决于你是让每个学生独立制作一个项目，还是让他们组队合作，以及学生能否将项目带回家，还是必须拆解他们的缝纫电路以回收电子零件。小型电子元件、布料、辅料、培训和机器维护的累计成本，可能要高于你的资本设备预算（用于缝纫机和\
    \ 3D 打印机）。\n\n## 课程资源\n\n许多学生难以应对开放式设计和发明。本节提供的资源可能会有所帮助。应定义一个既不太宽泛也不太狭窄的项目起点。例如，建议学生为即将到来的演出制作一个简单的道具或戏服部件，这可能足够聚焦，能让学生顺利启动。\n\
    \n教导他人设计需要在引导和鼓励自我表达之间取得微妙的平衡。设计教育文献中有许多关于这一主题的优秀书籍，但大多针对大学本科生的课堂使用。对于大学生，或作为高中教师的背景准备，我们推荐：\n\
    \n*   唐纳德·诺曼的经典之作《设计心理学》（Basic Books, 2002）\n*   亨利·佩卓斯基的著作，尤其是《工程师的思维方式》（Vintage\
    \ Books, 1992）\n*   彼得·福布斯的《壁虎之足》（Norton, 2005），提供仿生学思路（是项目灵感的良好来源）\n*   霍瓦特和卡梅隆的《新车间课程》（Apress,\
    \ 2015）\n\n学习缝纫和制作/使用纸样（戏剧方向）：\n\n*   芭芭拉与克莱图斯·安德森的《戏服设计》第二版（Harcourt Brace College\
    \ Publishers, 1999）\n*   雪莉·迪林的《优雅节俭戏服》（Meriwether Publishing, Ltd., 1992）\n*\
    \   希拉·杰克逊的《舞台戏服》第二版（New Amsterdam Books, 2001）\n*   南希·布拉德菲尔德的《1730–1930 年戏服细节》（Costume\
    \ and Fashion Press, 隶属于 Quite Specific Media Group, Ltd., 1997）\n*   `http://sewing.craftgossip.com`\
    \ 和 `www.wikihow.com/sew-using-patterns`\n\n电子学背景知识：\n\n*   贝基·斯特恩和泰勒·库珀，《Adafruit\
    \ Flora 入门指南》（Maker Media, 2015）\n*   凯特·哈特曼，《可穿戴电子设备》（Maker Media, 2014）\n* \
    \  教程网站：`https://learn.adafruit.com`、`https://learn.sparkfun.com/tutorials` 和\
    \ `www.instructables.com`\n\n## 课程内容大纲\n\n本节建议了在为期一年的课程中学生需要完成的一系列项目，这些项目与本书中的内容相关联。这门课需要大量的准备时间；在让学生开始之前，教师应亲自使用他们将要使用的设备，完整地走一遍学生将要构建的流程。很容易因为软件不可用、某个小零件短缺等原因而浪费时间。\n\
    \n本大纲假设学生对缝纫、编程和电子学一无所知。尤其是在大班中，情况可能并非如此，这时可以招募基础较好的学生来帮助经验不足的同学。有一定基础的学生可以跳过一些建议的项目，利用这段时间辅导其他同学，或者转而进行更高级的项目。\n\
    \n> **提示**  \n> 所需时间会根据学生经验和班级规模而有很大差异。显然，（大纲中的）主要项目也可以调整为季度或学期项目。请预留出解决问题和应对意外情况的时间，特别是当你第一次教授这门课时。\n"
- fmt: "### Projects\n\nThe first project should be a simple one that does not require\
    \ any significant amount of fitting. It could either be the apron in Chapter [7](#A371637_1_En_7_Chapter.html)\
    \ or just a small stuffed animal with a light-up eye. Or you can start with an\
    \ existing garment (like a hat) and add a `NeoPixel` circuit to it. Either way,\
    \ the pattern development should be minimal.\n\nThe project in the second major\
    \ time period (weeks 10–15) can be a garment that requires significant fitting\
    \ and adapting of a pattern, plus more complex assembly. The vest from Chapter\
    \ [4](#A371637_1_En_4_Chapter.html) can be a simple version of this, or you can\
    \ embellish it.\n\nAfter those two projects are under the students’ belts, the\
    \ remaining time (or another semester, if you have 13 or 15 week periods to work\
    \ with) can be used to incorporate 3D printing (Chapter [9](#A371637_1_En_9_Chapter.html)\
    \ ), other techniques, if the school has the tools and facilities (Chapter [12](#A371637_1_En_12_Chapter.html)\
    \ ), or a project incorporating sensors (Chapters [8](#A371637_1_En_8_Chapter.html)\
    \ and [11](#A371637_1_En_11_Chapter.html) ).\n\nIf you want to get really fancy,\
    \ you can think about some biomimetic projects—creating fabric and electronics\
    \ projects that mimic nature in some way, or an art piece with sensors that react\
    \ to touch (something a step up from the apron’s saucepan in Chapter [7](#A371637_1_En_7_Chapter.html)\
    \ ).\n\n### Schedule\n\nA notional schedule for a year-long (or two-semester)\
    \ course using this book as a text might be something like this:\n\n- **Weeks\
    \ 1–9**: Simple project with a light-up component. This project should not require\
    \ students to take extensive measurements. One choice might be the Chapter [7](#A371637_1_En_7_Chapter.html)\
    \ ’s apron project. Faculty should read Chapter [10](#A371637_1_En_10_Chapter.html)\
    \ for tips on what not to do and create a few demonstration projects to show students\
    \ what is coming.\n    - **Weeks 1–2**: Review good design practices. Design,\
    \ sketch, create pattern. Read Chapters [1](#A371637_1_En_1_Chapter.html) – [4](#A371637_1_En_4_Chapter.html)\
    \ and [7](#A371637_1_En_7_Chapter.html) .\n    - **Week 3**: Select fabric and\
    \ cut out pattern.\n    - **Weeks 4-5**: Machine sew garment seams, hand sew details.\n\
    \    - **Week 6**: Introduce `Fritzing`, lay out circuit with alligator clips.\
    \ Read Chapter [5](#A371637_1_En_5_Chapter.html) .\n    - **Weeks 7–8**: Sew on\
    \ circuit and run code. Read Chapter [6](#A371637_1_En_6_Chapter.html) .\n   \
    \ - **Week 9**: Finish up and document the project.\n- **Weeks 10–15**: A next\
    \ project could involve a garment that is simple but still requires some amount\
    \ of fitting for the wearer. An example might be the vest in Chapter [4](#A371637_1_En_4_Chapter.html)\
    \ . Historical aspects might be incorporated here.\n    - **Week 10**: Select\
    \ store-bought pattern for the garment (or create one), add design components,\
    \ fit to wearer.\n    - **Week 11–12**: Select fabric, cut out pattern.\n    -\
    \ **Week 13–14**: Machine sew and hand finish, and document the project.\n- **Weeks\
    \ 16 through end of year**\n    - More-complex projects, such as costumes for\
    \ school production or other projects. Read Chapters [9](#A371637_1_En_9_Chapter.html)\
    \ – [13](#A371637_1_En_13_Chapter.html) .\n    - Research historical background\
    \ of social influences on costuming, or more depth in the area of principles of\
    \ fashion design.\n    - Group critiques.\n    - Field trips, outside speakers.\n\
    \nThe first nine weeks have a bit of everything, so if you wanted to instead run\
    \ a “sampler” one-quarter or one-semester class, you could sensibly stop there.\
    \ The second six-week segment looks in more depth at how to make a garment that\
    \ requires some fitting that could incorporate some aspects of proper fit and\
    \ other clothing design issues. Those first 15 weeks could be a semester class.\
    \ Any remaining time would be dedicated to student projects.\n\n## Appendix B:\
    \ Links\n\nThis appendix aggregates all the links in the book in one place for\
    \ convenient reference. If a link appears in more than one chapter, it is listed\
    \ here under the chapter in which it first appears.\n\n### About the Authors\n\
    \n- Nonscriptum LLC: [`www.nonscriptum.com`](http://www.nonscriptum.com)\n\n###\
    \ Chapter [1](#A371637_1_En_1_Chapter.html) . Fashion Tech\n\n- Stereoscopic animation\
    \ of the Amoskeag (New Hampshire) Gingham Mill weaving room: [`http://stereo.nypl.org/view/14480`](http://stereo.nypl.org/view/14480)\n\
    - History of textile technologies: [`www.cs.arizona.edu/patterns/weaving/index.html`](http://www.cs.arizona.edu/patterns/weaving/index.html)\n\
    - Jacquard Machine Analyzed and Explained (Posselt, 1893): [`http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d`](http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d)\n\
    - Stereoscopic image of the Amoskeag (New Hampshire) Gingham Mill weaving room:\
    \ [`http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99`](http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99)\n\
    - Babbage’s Analytical Engine: [`https://en.wikipedia.org/wiki/Analytical_Engine`](https://en.wikipedia.org/wiki/Analytical_Engine)\n\
    - Renaissance Faires: [`www.renfaire.com`](http://www.renfaire.com)\n\n### Chapter\
    \ [2](#A371637_1_En_2_Chapter.html) . Practical Costume Design\n\n- Make Believe\
    \ costume shop: [`www.makebelieveinccostumes.com`](http://www.makebelieveinccostumes.com)\n\
    - Burbank Makerspace: [`www.burbankmakerspace.com`](http://www.burbankmakerspace.com)\n\
    \n### Chapter [3](#A371637_1_En_3_Chapter.html) . How to Sew\n\n- History of sewing:\
    \ [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)\n\
    - How to sew: [`www.instructables.com/id/How-to-Sew`](http://www.instructables.com/id/How-to-Sew)`./`\
    \ and [`www.wikihow.com/sew`](http://www.wikihow.com/sew)\n- Hand sewing basics:\
    \ [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0)\n\
    - Hand Sewing: Basic Slip Stitch (Blind Stitch) on Instructables: [`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch`](http://www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch)\
    \ /\n\n### Chapter [4](#A371637_1_En_4_Chapter.html) . Making and Using Sewing\
    \ Patterns\n\n- Sewing pattern companies: [`www.mccall.com`](http://www.mccall.com)\
    \ and [`www.sewingpatterns.com`](http://www.sewingpatterns.com)\n- Crafts: [`www.craftsy.com`](http://www.craftsy.com)\n\
    - Online craft marketplace: [`www.etsy.com`](http://www.etsy.com)\n- Joann Fabrics:\
    \ [`www.joann.com`](http://www.joann.com)\n- How-to-sew sites: [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com)\
    \ and [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)\n\
    - Adobe Illustrator: [`www.adobe.com/products/illustrator.html`](http://www.adobe.com/products/illustrator.html)"
