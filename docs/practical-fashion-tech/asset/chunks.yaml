- fmt: '### Ohm’s Law


    To design a circuit, you need to know a little bit about how electricity works.
    One fundamental rule that underlies a lot of what we are talking about in this
    chapter is Ohm’s Law. Ohm’s Law can be stated very simply: voltage equals current
    times resistance, usually written `V = I * R`. (We use`*`to show multiplication,
    as is the convention in computer code.)


    **Note**


    According to Wikipedia, current is `I` because Ampere, after whom the unit of
    current was named, was French, and he referred to current magnitude as “intensité
    de courant.” The unit of current is the ampere (typically just called amps and
    denoted with a capital `A`). The unit of voltage is the volt, usually shown as
    a capital `V`. The unit of resistance is the ohm, usually symbolized by the Greek
    letter omega, `Ω`. Sometimes `R` is used instead of `Ω` in online situations where
    people either do not want to figure out how to type a Greek letter or are afraid
    that it will not survive text encoding conversion.


    Very often we need to talk about a large or small voltage, or current, or resistance.
    Then we introduce prefixes like milli-. A millivolt (`mV`) is 1/1000th of a volt,
    and a milliamp (`mA`) is 1/1000th of an amp. Other prefixes include the following:


    - mega (`M`) = times 1,000,000

    - kilo (`k`) = times 1,000

    - micro (`μ`) = 1/1,000,000


    Voltage varies throughout a circuit and is measured relative to an arbitrary level
    (referred to as ground). Because voltages are denoted in reference to ground,
    ground is, by definition, zero volts. In most circuits like the ones in our breadboard,
    it is the lowest voltage in the circuit, thus avoiding negative numbers. Because
    voltage varies depending on where you are in the circuit, it is a property of
    a particular point in a circuit, not a whole circuit. Actually, it is better to
    think about how voltage changes across a component, called the voltage drop. Obviously,
    this is easier to calculate if the low side of the component is zero volts, which
    is why most circuits are arranged this way.


    ### Circuit Components


    A difference in voltage between two points results in a current flowing between
    those points. If you want to limit the current flowing to a part of a circuit
    while keeping the voltage across it the same, you need to add resistance to the
    circuit. Not surprisingly, components that only add resistance to a circuit are
    called resistors. (Other components add resistance too, but resistors have this
    as their only function.)


    Resistors (and other components) can either be in series—arranged so that current
    flows first through one, and then through the next—or in parallel, so that current
    at some point forks and goes through two parts of the circuit at once.


    If two paths in a parallel circuit have different resistances, current wants to
    take the path of least resistance, and more current will flow through that side
    of the fork. That is, more current will flow across the lower-resistance part
    of the circuit, but both parts of the circuit will have the same voltage drop.


    In a series circuit (say, two resistors one after the other), all the current
    has to flow through the one path. The same amount of current will flow through
    both resistors, but each will have its own voltage drop proportional to its part
    of the total resistance of the circuit.


    #### Resistors


    Because resistors are pretty small components, we need some way of labeling them
    that scales way down, too. A system of colored bands on resistors is in common
    use. The four-banded resistor in Figure [5-3](#A371637_1_En_5_Chapter.html#Fig3),
    for example, has brown-black-red stripes followed by a small gap and then a gold
    stripe.


    ![A371637_1_En_5_Fig3_HTML.jpg](A371637_1_En_5_Fig3_HTML.jpg)


    Figure 5-3. A four-banded and five-banded resistor


    The two main conventions, as shown in Figure [5-3](#A371637_1_En_5_Chapter.html#Fig3),
    are resistors with four bands and ones with five. You can see a good explanation
    of what the colors mean at [`https://en.wikipedia.org/wiki/Electronic_color_code`](https://en.wikipedia.org/wiki/Electronic_color_code),
    or search online for “resistor color chart.” We will calculate the values of the
    two resistors in Figure [5-3](#A371637_1_En_5_Chapter.html#Fig3) to give you the
    idea.


    On a four-banded resistor, the first two bands give the first two digits of the
    resistor’s value, and the third band tells you how many factors of ten to multiply
    it by. Brown stands for 1 and black stands for 0. Red stands for 2. So brown-black-red
    means the value is `10` times `10²`, or that this is a `1000 Ω` resistor. The
    gold stripe is the tolerance band, which shows how close the nominal resistance
    this particular one is guaranteed to be—plus or minus 5%, in the case of a gold
    band.


    The five-banded one is yellow-purple-black-black-brown, which turns out to be
    `470 Ω` plus and minus 1%. (Yellow is 4, purple is 7, and black is 0, so this
    is `470` times `10⁰`. Any number raised to the zeroth power equals one, by convention.)
    The brown tolerance band means that this is a plus and minus 1% resistor. Note
    that in both the four- and five-band cases, the multiplier band is not the number
    of digits in the final resistor—it’s not scientific notation, if you have seen
    that before. In the case of the four-banded resistor, you are multiplying a two-digit
    number by some factor of ten; in the five-banded ones, you multiply a three-digit
    number by some factor of ten.


    The tolerance band is at the top of the four-band resistor in Figure [5-3](#A371637_1_En_5_Chapter.html#Fig3),
    and at the bottom of the five-band resistor. We arranged it that way to show how
    hard it can be to tell. Experience will give you a sense of what resistors are
    in common use. Look carefully when you take some out of the packaging for the
    first time so that you learn. Hypothetically, there is a gap between the last
    band of the resistor’s bands denoting the value of the resistor and the tolerance
    band, but often it is hard to see.


    Here are some common four-banded resistors (ignoring their tolerance bands):


    - 1 kΩ: Brown black red

    - 10 kΩ: Brown black orange

    - 470Ω: Yellow purple brown


    #### LEDs


    Light-emitting diodes (LEDs) are low-powered lights that illuminate when current
    is passed through them in one direction (but not in the other). LEDs have one
    leg that is longer than the other. The longer side of a freestanding LED should
    go on the `+` (`HIGH`, connected to `Vcc` or `3.3 V`) side of the circuit. NeoPixels
    have separate connectors for power (`+`) and ground (`–`). The NeoPixel also has
    a signal-in and signal-out pad that we talk about in Chapter [6](#A371637_1_En_6_Chapter.html).
    Figure [5-4](#A371637_1_En_5_Chapter.html#Fig4) shows one of each.


    ![A371637_1_En_5_Fig4_HTML.jpg](A371637_1_En_5_Fig4_HTML.jpg)


    Figure 5-4. A sewable NeoPixel 3-LED set (left) and a regular single LED (right)


    Different-colored LEDs will create specific, fixed voltage drops across them.
    There is a table explaining these at [`https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials`](https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials).
    Generally, the values are between 2 and 4 volts. An LED will not survive too high
    a current across it and will block a current going the wrong way.'
