  trans: "\n### 项目\n\n第一个项目应是一个简单的、不需要大量合体调整的项目。可以是第 7 章中的围裙，或者是一个带有发光眼睛的小型填充动物玩具。你也可以从现有的服装（比如一顶帽子）开始，为其添加一个`NeoPixel`电路。无论哪种方式，样板开发的工作量都应该是最小的。\n\
    \n第二个主要阶段（第 10-15 周）的项目可以是一件需要大量合体调整和样板修改的服装，并且组装过程更复杂。第 4 章的背心可以作为一个简单版本，或者你也可以对其进行装饰。\n\
    \n在学生们掌握了这两个项目之后，剩余时间（或者另一个学期，如果你的课程是 13 或 15 周的话）可以用来整合 3D 打印（第 9 章），如果学校有相应的工具和设施（第\
    \ 12 章），也可以使用其他技术，或者开展包含传感器的项目（第 8 和 11 章）。\n\n如果你想做得更别出心裁，可以考虑一些仿生项目——以某种方式模仿自然的织物和电子项目，或者制作一件带有触摸感应传感器的艺术品（比第\
    \ 7 章的围裙上的平底锅更进一步）。\n\n### 课程安排\n\n对于一门以本书为教材、为期一年（或两个学期）的课程，一个暂定的安排如下：\n\n- \
    \  **第 1-9 周**：包含发光组件的简单项目。此项目不应要求学生进行大量测量。一个选择可能是第 7 章的围裙项目。教师应阅读第 10 章，了解应避免的注意事项，并制作一些示范项目，向学生展示后续内容。\n\
    \    -   **第 1-2 周**：回顾良好设计实践。设计、绘制草图、制作样板。阅读第 1 至 4 章和第 7 章。\n    -   **第 3 周**：选择面料并裁剪样板。\n\
    \    -   **第 4-5 周**：机缝服装接缝，手缝细节。\n    -   **第 6 周**：介绍`Fritzing`，使用鳄鱼夹布置电路。阅读第\
    \ 5 章。\n    -   **第 7-8 周**：缝制电路并运行代码。阅读第 6 章。\n    -   **第 9 周**：完成项目并记录归档。\n\
    -   **第 10-15 周**：下一个项目可以是一件简单但仍需为穿着者进行一定合体调整的服装。一个例子是第 4 章的背心。这里可以融入历史方面的内容。\n\
    \    -   **第 10 周**：选择市售的服装样板（或自创一个），添加设计元素，为穿着者进行试穿调整。\n    -   **第 11-12 周**：选择面料，裁剪样板。\n\
    \    -   **第 13-14 周**：机缝和手工收尾，并记录归档项目。\n-   **第 16 周至学年末**\n    -   更复杂的项目，例如学校演出的戏服或其他项目。阅读第\
    \ 9 至 13 章。\n    -   研究社会影响对戏装发展的历史背景，或更深入地探讨时装设计原理领域。\n    -   小组点评。\n    - \
    \  实地考察，邀请外部讲师。\n\n前九周内容涵盖了方方面面，所以如果你想开设一个“体验式”的学季或学期课程，完全可以完成这些内容后结束。第二个六周阶段则更深入地探讨了如何制作一件需要合体调整的服装，并且可以融入合体性以及其它服装设计问题的考量。这前\
    \ 15 周可以构成一个学期的课程。剩余时间将用于学生的自选项目。\n\n## 附录 B：链接\n\n本附录将本书中所有链接汇总在一处，方便参考。如果一个链接在多个章节中出现，则将其列在首次出现的章节下。\n\
    \n### 关于作者\n\n-   Nonscriptum LLC： [`www.nonscriptum.com`](http://www.nonscriptum.com)\n\
    \n### 第 1 章 时尚科技\n\n-   Amoskeag（新罕布什尔州）格子呢磨坊织布车间的立体动画： [`http://stereo.nypl.org/view/14480`](http://stereo.nypl.org/view/14480)\n\
    -   纺织技术史： [`www.cs.arizona.edu/patterns/weaving/index.html`](http://www.cs.arizona.edu/patterns/weaving/index.html)\n\
    -   《提花机解析与说明》（Posselt, 1893）： [`http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d`](http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d)\n\
    -   Amoskeag（新罕布什尔州）格子呢磨坊织布车间的立体图片： [`http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99`](http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99)\n\
    -   巴贝奇分析机： [`https://en.wikipedia.org/wiki/Analytical_Engine`](https://en.wikipedia.org/wiki/Analytical_Engine)\n\
    -   文艺复兴博览会： [`www.renfaire.com`](http://www.renfaire.com)\n\n### 第 2 章 实用戏服设计\n\
    \n-   Make Believe 戏服店： [`www.makebelieveinccostumes.com`](http://www.makebelieveinccostumes.com)\n\
    -   伯班克创客空间： [`www.burbankmakerspace.com`](http://www.burbankmakerspace.com)\n\
    \n### 第 3 章 如何缝纫\n\n-   缝纫史： [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)\n\
    -   如何缝纫： [`www.instructables.com/id/How-to-Sew`](http://www.instructables.com/id/How-to-Sew)`./`\
    \ 以及 [`www.wikihow.com/sew`](http://www.wikihow.com/sew)\n-   手缝基础知识： [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0)\n\
    -   Instructables 上的手缝：基本暗缝： [`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch`](http://www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch)\
    \ /\n\n### 第 4 章 制作与使用缝纫样板\n\n-   缝纫样板公司： [`www.mccall.com`](http://www.mccall.com)\
    \ 和 [`www.sewingpatterns.com`](http://www.sewingpatterns.com)\n-   手工艺： [`www.craftsy.com`](http://www.craftsy.com)\n\
    -   在线手工艺市场： [`www.etsy.com`](http://www.etsy.com)\n-   Joann 布料店： [`www.joann.com`](http://www.joann.com)\n\
    -   如何缝纫网站： [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com) 和\
    \ [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)\n\
    -   Adobe Illustrator： [`www.adobe.com/products/illustrator.html`](http://www.adobe.com/products/illustrator.html)\n"
