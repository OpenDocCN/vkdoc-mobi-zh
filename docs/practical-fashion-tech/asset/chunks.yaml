    at the end of each sleeve to add weight to the sleeve and help bring the sleeve
    back into place after the servo had drawn it up (Figure [10-7](#A371637_1_En_10_Chapter.html#Fig7)).


    ![A371637_1_En_10_Fig7_HTML.jpg](A371637_1_En_10_Fig7_HTML.jpg)


    Figure 10-7.


    The sleeve mechanism and servo


    The lipstick batteries to drive the servos were hidden in pockets in the shoulder
    pads (you can see the white USB cable going into the battery in Figure [10-6](#A371637_1_En_10_Chapter.html#Fig6))
    and the USB plugs were soldered to wire from the servos. The servos were also
    wired to the Flora board.


    Integrating Heavy Components in a Chiffon Sleeve


    USB cables have an A side (the side that normally plugs into a computer) and a
    B side (the connector that in our case would normally be plugged into the Flora,
    Gemma, or other board). The batteries needed a USB connector, so Rich jumped in
    and stripped the B side of the cables and then soldered it to wires running to
    the servos. Normally you would not do this; see Chapter [8](#A371637_1_En_8_Chapter.html)
    for the more typical case. Rich and I used this approach here because we needed
    to deliver a lot of power to the servos and wanted to give them their own power
    source to ensure that they would not cause the microcontroller to brown-out. We
    ran wire down the inside of the jacket from the battery to the servo. We used
    conductive thread to stitch the wires in place and connect the servos and the
    Flora to signal and ground connections, as you can see in Figures [10-6](#A371637_1_En_10_Chapter.html#Fig6)
    and [10-7](#A371637_1_En_10_Chapter.html#Fig7).


    For the Haunted Dress, I wanted to hide the lipstick batteries in the shoulder
    pads. Shoulder pads are usually made from cotton batting or foam and covered with
    a lightweight fabric. I made a cover for the pads from black taffeta to match
    the bodice of the jacket. Leaving a small opening in the taffeta, I was able to
    hand stitch the pouches that had come with the batteries inside the shoulder pad
    covers (Figure [10-8](#A371637_1_En_10_Chapter.html#Fig8)).


    ![A371637_1_En_10_Fig8_HTML.jpg](A371637_1_En_10_Fig8_HTML.jpg)


    Figure 10-8.


    The shoulder pads used to contain the lipstick battery


    I attached the shoulder pads inside the shoulders of the jacket by tacking them
    down in two places on the shoulder seam. Tacking means to take a few stitches
    in the same spot to hold things in place.


    ### The Billowing Skirt


    The three of us wanted the chiffon skirt to billow as if a draft of wind were
    blowing by. We chose to use two small radial blower fans, and they needed a place
    to live that would allow them to move the chiffon from inside the skirt while
    staying away from the person wearing it. I made a small pocket for each one and
    attached them to the underside of the chiffon (Figures [10-9](#A371637_1_En_10_Chapter.html#Fig9)
    and [10-10](#A371637_1_En_10_Chapter.html#Fig10)).


    ![A371637_1_En_10_Fig10_HTML.jpg](A371637_1_En_10_Fig10_HTML.jpg)


    Figure 10-10.


    The fan being slipped out of its pocket


    ![A371637_1_En_10_Fig9_HTML.jpg](A371637_1_En_10_Fig9_HTML.jpg)


    Figure 10-9.


    The pocket for the fans


    I used two layers of chiffon, one navy blue and one a brighter blue, to make the
    skirt a bit more opaque (see the pictures of the dress in Figures [10-2](#A371637_1_En_10_Chapter.html#Fig2)
    and [10-3](#A371637_1_En_10_Chapter.html#Fig3)). This was also intended to minimize
    blockage of the fans’ intakes. The wires from the fans were soldered to connectors
    and attached to a battery. The other wires were soldered to the Flora board. The
    wires ran between the skirt and the overskirt. I made another pocket inside the
    front of the overskirt for the battery, which also powered the Flora.


    ### Software


    By browsing many tutorials from `Arduino.cc` and `Adafruit.com`, I learned a teeny
    bit about coding (Chapter [6](#A371637_1_En_6_Chapter.html)) and was able to program
    the Flora to control the NeoPixels. The servos (Chapter [8](#A371637_1_En_8_Chapter.html))
    and fans were more sophisticated, and Rich and Joan stepped in to coach and debug.
    I have learned more about coding since that first attempt, but still have a lot
    more to learn.'
  trans: '

    ### 花朵与 NeoPixel 的布局


    我用导电线在翻领的每一边分别缝了四个 NeoPixel。电线从电路板出发，依次连接到第一个 NeoPixel，然后再连接到后续的每一个。导线沿着右侧向上延伸，绕过颈后，再沿翻领左侧向下，如图
    10-5 所示。


    这是一段很长的走线，所以我必须确保导线足够紧以保证连接，但又不能太紧以至于拉扯翻领使其变形。经过一些反复试验才找到了合适的松紧度。


    在第一个迭代版本中，夹克的 NeoPixel 是缝在导电线带上的，而导电线带则缝制在翻领周围。导电线带通过导电线连接到 Flora 板上的触点。由于我没有正确地将线带连接到
    NeoPixel 和 Flora，因此只有部分 NeoPixel 能正常工作。随后，我把线带从翻领上拆下，将 NeoPixel 逐个缝上，并用导电线将它们相互连接并连接到
    Flora。这次效果就好多了。


    **注意**


    使用导电线带（第 5 章）可以节省时间，但一定要确保使用导电线将线带中正确的导线连接到你的组件上。我第一次尝试将 NeoPixel 连接到导电线带时非常笨拙且耗时。当时我正在为幽灵连衣裙的夹克翻领上布置一段长线路。NeoPixel
    沿着翻领右侧向上排列，在绕过衣领后部后，再沿着翻领左侧向下排列。NeoPixel（第 5 章）是有方向性的，因此为了让信号从一个 NeoPixel 输出并传入下一个，你必须确保切断线带中间的两个部分，从而在
    NeoPixel 之间保持信号的输入输出路径。我沿着线带将它们相互连接，遵循箭头指示，并使用导电线将它们连接到 Flora 电路板。当我尝试点亮它们时，只有右侧能正常工作。啊！这是因为我把左侧最后一个
    NeoPixel 缝反了方向！解决起来倒不难，但在我们弄清楚错误之前，确实让人相当沮丧了一阵子。


    ### 神奇的袖子


    我使用了绕在缝纫机梭芯上的钓鱼线，来自动收拢夹克的袖子。我将钓鱼线穿过小的三角形环沿着袖子向下引，并将其固定在袖口边缘。我使用了连续旋转舵机，并在其顶部粘了一个缝纫机梭芯来卷收钓鱼线。舵机有点重，难以保持平衡，所以我将一块结实的黑色松紧带固定在夹克肩部外侧来固定舵机。这同时也允许梭芯活动，并且便于在需要时拆卸（图
    10-6）。


    ![A371637_1_En_10_Fig6_HTML.jpg](img/A371637_1_En_10_Fig6_HTML.jpg)


    图 10-6. 固定在夹克上的舵机


    我用了两个缝在 3 英寸长斜纹带上的小三角形环，并沿着袖子固定，作为钓鱼线的通道。通过在线末端打结并在结上涂抹透明指甲油，我得以将线手工缝制到袖口边缘。我还在每个袖口末端固定了一片旧项链的装饰片，以增加袖子的重量，帮助袖子在舵机收线后恢复原位（图
    10-7）。


    ![A371637_1_En_10_Fig7_HTML.jpg](img/A371637_1_En_10_Fig7_HTML.jpg)


    图 10-7. 袖子机械结构和舵机


    用于驱动舵机的口红电池隐藏在肩垫的口袋中（你可以在图 10-6 中看到白色的 USB 线接入电池），USB 插头则焊接到舵机的导线上。舵机也连接到了 Flora
    电路板。


    **在雪纺袖中集成重型组件**


    USB 线缆有 A 端（通常插入电脑的一端）和 B 端（在我们的案例中，通常插入 Flora、Gemma 或其他电路板的连接器）。电池需要 USB 连接器，所以
    Rich 介入进来，剥掉线缆的 B 端，然后将其焊接到通往舵机的导线上。通常情况下你不会这么做；更典型的案例请参见第 8 章。Rich 和我之所以在这里采用这种方法，是因为我们需要为舵机提供大量电力，并希望为它们提供独立的电源，以确保它们不会导致微控制器电压骤降。我们沿着夹克内部从电池到舵机走线。我们使用导电线将导线缝合固定到位，并将舵机和
    Flora 连接到信号和接地连接上，如图 10-6 和图 10-7 所示。


    对于幽灵连衣裙，我想把口红电池藏在肩垫里。肩垫通常由棉絮或泡沫制成，并覆以轻质面料。我用黑色塔夫绸为肩垫制作了外套，以匹配夹克的紧身胸衣。在塔夫绸上留一个小开口，我得以将电池附带的收纳袋手工缝合到肩垫套内部（图
    10-8）。


    ![A371637_1_En_10_Fig8_HTML.jpg](img/A371637_1_En_10_Fig8_HTML.jpg)


    图 10-8. 用于容纳口红电池的肩垫


    我通过在肩缝线上钉缝两处，将肩垫固定在夹克的肩部内侧。钉缝是指在同一个点上缝几针以固定物件。


    ### 鼓起的裙摆


    我们三个人希望雪纺裙摆能鼓起来，仿佛一阵风吹过。我们选择使用两个小型径流式鼓风机，它们需要有一个安放之处，既能从裙子内部吹动雪纺，又能远离穿着者。我为每个风扇做了一个小口袋，并将它们固定在雪纺的背面（图
    10-9 和图 10-10）。


    ![A371637_1_En_10_Fig10_HTML.jpg](img/A371637_1_En_10_Fig10_HTML.jpg)


    图 10-10. 风扇从其口袋中滑出


    ![A371637_1_En_10_Fig9_HTML.jpg](img/A371637_1_En_10_Fig9_HTML.jpg)


    图 10-9. 风扇口袋


    我用了两层雪纺，一层海军蓝和一层更亮的蓝色，使裙子稍微厚实一些（参见图 10-2 和图 10-3 中的连衣裙照片）。这也旨在最大限度地减少对风扇进风口的阻挡。风扇的导线被焊接到连接器上，并连接到电池。另一组导线焊接到
    Flora 电路板上。导线在裙子和外裙之间走线。我在外裙前部内侧为电池做了另一个口袋，该电池同时也为 Flora 供电。


    ### 软件


    通过浏览`Arduino.cc`和`Adafruit.com`上的许多教程，我学到了一点关于编程的知识（第 6 章），并能够对 Flora 进行编程以控制
    NeoPixel。舵机（第 8 章）和风扇则更为复杂，于是 Rich 和 Joan 介入进行指导和调试。自从第一次尝试以来，我学到了更多关于编程的知识，但仍然还有很多需要学习。

