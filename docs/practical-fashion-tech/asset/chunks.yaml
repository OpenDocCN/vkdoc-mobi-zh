- fmt: '# Sewable Components


    Arduinos come in various shapes and sizes. The ones in this chapter to this point
    are good for applications where you might want to build something on a tabletop.
    But suppose you want to have the components built into something you want to wear?
    You would want to use sewable components, put together with conductive thread.
    There are Arduino-based microprocessors that are flat, round, and intended to
    be sewn onto a garment.


    Figure [5-8](#A371637_1_En_5_Chapter.html#Fig8) is the apron project we create
    in Chapter [7](#A371637_1_En_7_Chapter.html). The saucepan is made of two layers
    of conductive fabric separated by a piece of felt with a hole in it. The processor
    is an Adafruit Gemma (Arduino-compatible board) with a NeoPixel multicolor LED
    in the “steam.” If you tap the saucepan, the LED flashes red for a time set by
    the programmer and then turns green for another settable period of time. You will
    see how to put this together in great detail in Chapter [7](#A371637_1_En_7_Chapter.html).


    ![A371637_1_En_5_Fig8_HTML.jpg](A371637_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    The electronic apron from Chapter [7](#A371637_1_En_7_Chapter.html)


    ## Sewable Arduino Boards


    Several sewable Arduino boards are available. As of this writing, the Flora, Gemma,
    and Lilypad boards are in common use. The Gemma is a cheaper, smaller board than
    the other two, but it has some operational limitations that we discuss in Chapter
    [6](#A371637_1_En_6_Chapter.html). The small round board in Figure [5-8](#A371637_1_En_5_Chapter.html#Fig8)
    is a Gemma.


    Figure [5-9](#A371637_1_En_5_Chapter.html#Fig9) shows a Flora processor from Adafruit
    ( [`www.adafruit.com`](http://www.adafruit.com) ). Instead of female pins, there
    are pads with big holes that are meant to be sewn with either conductive thread
    (to create a circuit) or with regular thread (to hold it onto the garment). For
    prototyping purposes, you can put together a circuit temporarily with alligator
    clips (Figure [5-10](#A371637_1_En_5_Chapter.html#Fig10)). Convention is to call
    these pads (with holes) pins in analogy with the traditional Arduino board. There
    are also boards with snaps, and by the time you read this there may be other variations.


    ![A371637_1_En_5_Fig10_HTML.jpg](A371637_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Alligator clips


    ![A371637_1_En_5_Fig9_HTML.jpg](A371637_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    The Flora board


    ## Prototyping with Sewable Arduino Boards


    Fundamentally a wearable board (we will demonstrate here with an Adafruit Flora)
    is the same as an Arduino, although it may leave off some pins. Where the differences
    start to arise, though, is in the smaller components—the LEDs, sensors, and so
    on that are made specifically to be sewable.


    Figure [5-11](#A371637_1_En_5_Chapter.html#Fig11) shows a Flora board with a NeoPixel
    LED board, which has a red, green, and blue pixel—and appropriate current-limiting
    circuitry—all in one package. Figure [5-12](#A371637_1_En_5_Chapter.html#Fig12)
    shows this circuit prototyped with alligator clips. Resistors that you would have
    to size for a regular Arduino are often built-in to the sewable counterparts.
    The bad news is that sewable components by and large are a lot more expensive
    than their traditional counterparts.


    ![A371637_1_En_5_Fig12_HTML.jpg](A371637_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Flora and NeoPixel circuit, with alligator clips


    ![A371637_1_En_5_Fig11_HTML.jpg](A371637_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Fritzing diagram of a Flora and NeoPixel circuit


    If you have a Flora and NeoPixel handy, use alligator clips to connect the following:


    *   `GND` on the Flora to the `–` on the NeoPixel

    *   `Vbatt` on the Flora to the `+` on the NeoPixel

    *   `D6` on the Flora to the `->` on the NeoPixel


    In Chapter [6](#A371637_1_En_6_Chapter.html) we write the code to make this circuit
    do more than have the NeoPixel light up brightly when the USB is plugged in. Once
    you are happy that your circuit works, after stringing it together with alligator
    clips and testing out the software we discuss in Chapter [6](#A371637_1_En_6_Chapter.html),
    you can sew the circuit with conductive thread. See Chapter [7](#A371637_1_En_7_Chapter.html)’s
    discussion of the apron development to see how much thought this may require ahead
    of time. It can be challenging to avoid having your conductive thread make contacts
    only where you want it to in a squashy garment.


    ## Batteries


    You will most likely power a circuit during development by plugging the Arduino
    board into a USB port. Once you are wearing a piece or using it in the field,
    you will most likely need a battery. If a project is just running a few NeoPixels
    and a board (like the apron project), you can probably get away with coin cell
    batteries—the small flat metal cells you have seen in watches and other small
    electronics. These batteries fit well into small cases (Figure [5-12](#A371637_1_En_5_Chapter.html#Fig12)),
    and the batteries are then pretty easy to remove. AAA batteries (in an appropriate
    holder with connectors) might be an option too.


    Look on the battery’s packaging to see what voltage and power are delivered and
    analyze the circuitry in your project to see what you will need. Many smaller
    batteries are alkaline batteries that deliver 1.5 V. To drive a component needing
    three volts, you would hook up two of these in series. Obtain battery packs that
    arrange this for you. The battery connector is connected to a voltage regulator
    that requires the input voltage to be higher (as much as 1.5 V higher for some
    regulators, known as the drop-out voltage) than the output voltage. In this case,
    we are using two 3 V lithium coin cell batteries.


    Caution


    Do not use the “pillow” type LiPo (lithium polymer) batteries in wearable projects.
    They are fragile and can break and catch fire. You may see older designs online
    using these, but avoid them and use newer, safer, and better-contained batteries.
    Read the manufacturer’s charging instructions if your batteries are rechargeable.


    ![A371637_1_En_5_Fig13_HTML.jpg](A371637_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Coin cell battery case (open, with a battery next to it) designed to attach to
    a sewable processor’s connector


    ## Conductive Ribbon and Thread


    To connect up a sewable circuit, you need to use some sort of conductive material.
    You can sew the circuit on by hand; the projects we will show are best done this
    way. There are, however, other products out there, like ribbon with five parallel
    connectors, which you might want to try. Lyn preferred sewing by hand to using
    ribbon because she found it too easy to short out circuits on the closely spaced
    conductors running along the ribbon.'
  raw: '## Sewable Components


    Arduinos come in various shapes and sizes. The ones in this chapter to this point
    are good for applications where you might want to build something on a tabletop.
    But suppose you want to have the components built into something you want to wear?
    You would want to use sewable components, put together with conductive thread.
    There are Arduino-based microprocessors that are flat, round, and intended to
    be sewn onto a garment.


    Figure [5-8](#A371637_1_En_5_Chapter.html#Fig8) is the apron project we create
    in Chapter [7](#A371637_1_En_7_Chapter.html). The saucepan is made of two layers
    of conductive fabric separated by a piece of felt with a hole in it. The processor
    is an Adafruit Gemma (Arduino-compatible board) with a NeoPixel multicolor LED
    in the “steam.” If you tap the saucepan, the LED flashes red for a time set by
    the programmer and then turns green for another settable period of time. You will
    see how to put this together in great detail in Chapter [7](#A371637_1_En_7_Chapter.html).


    ![A371637_1_En_5_Fig8_HTML.jpg](A371637_1_En_5_Fig8_HTML.jpg)


    Figure 5-8.


    The electronic apron from Chapter [7](#A371637_1_En_7_Chapter.html)


    ### Sewable Arduino Boards


    Several sewable Arduino boards are available. As of this writing, the Flora, Gemma,
    and Lilypad boards are in common use. The Gemma is a cheaper, smaller board than
    the other two, but it has some operational limitations that we discuss in Chapter
    [6](#A371637_1_En_6_Chapter.html). The small round board in Figure [5-8](#A371637_1_En_5_Chapter.html#Fig8)
    is a Gemma.


    Figure [5-9](#A371637_1_En_5_Chapter.html#Fig9) shows a Flora processor from Adafruit
    ( [`www.adafruit.com`](http://www.adafruit.com) ). Instead of female pins, there
    are pads with big holes that are meant to be sewn with either conductive thread
    (to create a circuit) or with regular thread (to hold it onto the garment). For
    prototyping purposes, you can put together a circuit temporarily with alligator
    clips (Figure [5-10](#A371637_1_En_5_Chapter.html#Fig10)). Convention is to call
    these pads (with holes) pins in analogy with the traditional Arduino board. There
    are also boards with snaps, and by the time you read this there may be other variations.


    ![A371637_1_En_5_Fig10_HTML.jpg](A371637_1_En_5_Fig10_HTML.jpg)


    Figure 5-10.


    Alligator clips


    ![A371637_1_En_5_Fig9_HTML.jpg](A371637_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.


    The Flora board


    ### Prototyping with Sewable Arduino Boards


    Fundamentally a wearable board (we will demonstrate here with an Adafruit Flora)
    is the same as an Arduino, although it may leave off some pins. Where the differences
    start to arise, though, is in the smaller components—the LEDs, sensors, and so
    on that are made specifically to be sewable.


    Figure [5-11](#A371637_1_En_5_Chapter.html#Fig11) shows a Flora board with a NeoPixel
    LED board, which has a red, green, and blue pixel—and appropriate current-limiting
    circuitry—all in one package. Figure [5-12](#A371637_1_En_5_Chapter.html#Fig12)
    shows this circuit prototyped with alligator clips. Resistors that you would have
    to size for a regular Arduino are often built-in to the sewable counterparts.
    The bad news is that sewable components by and large are a lot more expensive
    than their traditional counterparts.


    ![A371637_1_En_5_Fig12_HTML.jpg](A371637_1_En_5_Fig12_HTML.jpg)


    Figure 5-12.


    Flora and NeoPixel circuit, with alligator clips


    ![A371637_1_En_5_Fig11_HTML.jpg](A371637_1_En_5_Fig11_HTML.jpg)


    Figure 5-11.


    Fritzing diagram of a Flora and NeoPixel circuit


    If you have a Flora and NeoPixel handy, use alligator clips to connect the following:


    *   GND on the Flora to the – on the NeoPixel

    *   Vbatt on the Flora to the + on the NeoPixel

    *   D6 on the Flora to the - > on the NeoPixel


    In Chapter [6](#A371637_1_En_6_Chapter.html) we write the code to make this circuit
    do more than have the NeoPixel light up brightly when the USB is plugged in. Once
    you are happy that your circuit works, after stringing it together with alligator
    clips and testing out the software we discuss in Chapter [6](#A371637_1_En_6_Chapter.html),
    you can sew the circuit with conductive thread. See Chapter [7](#A371637_1_En_7_Chapter.html)’s
    discussion of the apron development to see how much thought this may require ahead
    of time. It can be challenging to avoid having your conductive thread make contacts
    only where you want it to in a squashy garment.


    ## Batteries


    You will most likely power a circuit during development by plugging the Arduino
    board into a USB port. Once you are wearing a piece or using it in the field,
    you will most likely need a battery. If a project is just running a few NeoPixels
    and a board (like the apron project), you can probably get away with coin cell
    batteries—the small flat metal cells you have seen in watches and other small
    electronics. These batteries fit well into small cases (Figure [5-12](#A371637_1_En_5_Chapter.html#Fig12)),
    and the batteries are then pretty easy to remove. AAA batteries (in an appropriate
    holder with connectors) might be an option too.


    Look on the battery’s packaging to see what voltage and power are delivered and
    analyze the circuitry in your project to see what you will need. Many smaller
    batteries are alkaline batteries that deliver 1.5 V. To drive a component needing
    three volts, you would hook up two of these in series. Obtain battery packs that
    arrange this for you. The battery connector is connected to a voltage regulator
    that requires the input voltage to be higher (as much as 1.5 V higher for some
    regulators, known as the drop-out voltage) than the output voltage. In this case,
    we are using two 3 V lithium coin cell batteries.


    Caution


    Do not use the “pillow” type LiPo (lithium polymer) batteries in wearable projects.
    They are fragile and can break and catch fire. You may see older designs online
    using these, but avoid them and use newer, safer, and better-contained batteries.
    Read the manufacturer’s charging instructions if your batteries are rechargeable.


    ![A371637_1_En_5_Fig13_HTML.jpg](A371637_1_En_5_Fig13_HTML.jpg)


    Figure 5-13.


    Coin cell battery case (open, with a battery next to it) designed to attach to
    a sewable processor’s connector


    ## Conductive Ribbon and Thread


    To connect up a sewable circuit, you need to use some sort of conductive material.
    You can sew the circuit on by hand; the projects we will show are best done this
    way. There are, however, other products out there, like ribbon with five parallel
    connectors, which you might want to try. Lyn preferred sewing by hand to using
    ribbon because she found it too easy to short out circuits on the closely spaced
    conductors running along the ribbon.'
  trans: '

    # 可缝纫组件


    Arduino 电路板有各种形状和尺寸。到目前为止，本章介绍的那些更适合在桌面上搭建项目。但如果你想把组件嵌入到可穿戴物品中呢？这时你就会想使用可缝纫组件，并用导电缝线将它们连接起来。有一些基于
    Arduino 的微处理器是扁平、圆形的，旨在缝制到衣物上。


    图 5-8 是我们将在第 7 章中制作的围裙项目。锅身由两层导电织物制成，中间夹着一块带孔的电工垫。处理器是一块 Adafruit Gemma（Arduino
    兼容板），在“蒸汽”部分带有一个 NeoPixel 多色 LED。轻敲锅身时，LED 会闪烁红色，持续时间由编程者设定，然后变为绿色，持续另一个可设置的时长。你将在第
    7 章中详细了解如何组装这个项目。


    ![A371637_1_En_5_Fig8_HTML.jpg](img/A371637_1_En_5_Fig8_HTML.jpg)


    图 5-8.


    来自第 7 章的电子围裙


    ## 可缝纫 Arduino 电路板


    市面上有多种可缝纫 Arduino 电路板。在撰写本文时，Flora、Gemma 和 Lilypad 电路板是常用的型号。Gemma 比其他两款更便宜、更小巧，但它有一些操作上的限制，我们将在第
    6 章中讨论。图 5-8 中的小型圆形电路板就是一块 Gemma。


    图 5-9 展示的是来自 Adafruit（[`www.adafruit.com`](http://www.adafruit.com)）的 Flora 处理器。它没有排针，而是带有大孔的焊盘，这些焊盘可以用导电缝线（用于创建电路）或普通缝线（用于固定在衣物上）进行缝制。出于原型设计的目的，你可以暂时用鳄鱼夹将电路连接起来（图
    5-10）。按照惯例，这些（带孔的）焊盘也被称为“引脚”，以类比传统 Arduino 电路板。现在也有带按扣的电路板，当你读到本书时，可能还有其他变种。


    ![A371637_1_En_5_Fig10_HTML.jpg](img/A371637_1_En_5_Fig10_HTML.jpg)


    图 5-10.


    鳄鱼夹


    ![A371637_1_En_5_Fig9_HTML.jpg](img/A371637_1_En_5_Fig9_HTML.jpg)


    图 5-9.


    Flora 电路板


    ## 使用可缝纫 Arduino 电路板进行原型开发


    从根本上说，可穿戴电路板（此处我们以 Adafruit Flora 为例）和 Arduino 是相同的，不过它可能减少了一些引脚。然而，差异开始显现的地方在于更小的组件——即专门为可缝纫而制造的
    LED、传感器等。


    图 5-11 展示了一块连接了 NeoPixel LED 电路板的 Flora 电路板，该 LED 板在一个封装内集成了红、绿、蓝像素以及合适的限流电路。图
    5-12 展示了用鳄鱼夹搭建的这个电路原型。在普通 Arduino 上需要自行选配的电阻，在可缝纫对应产品中通常是内置的。坏消息是，可缝纫组件通常比它们的传统对应产品要昂贵得多。


    ![A371637_1_En_5_Fig12_HTML.jpg](img/A371637_1_En_5_Fig12_HTML.jpg)


    图 5-12.


    用鳄鱼夹连接的 Flora 和 NeoPixel 电路


    ![A371637_1_En_5_Fig11_HTML.jpg](img/A371637_1_En_5_Fig11_HTML.jpg)


    图 5-11.


    Flora 和 NeoPixel 电路的 Fritzing 连线图


    如果你手头有 Flora 和 NeoPixel，请使用鳄鱼夹进行如下连接：


    *   Flora 上的 `GND` 连接到 NeoPixel 上的 `–`

    *   Flora 上的 `Vbatt` 连接到 NeoPixel 上的 `+`

    *   Flora 上的 `D6` 连接到 NeoPixel 上的 `->`


    在第 6 章中，我们将编写代码，使这个电路的功能不仅仅是当 USB 插入时让 NeoPixel 亮起。当你用鳄鱼夹连接好电路，并测试完我们在第 6 章中讨论的软件后，如果对电路工作正常感到满意，就可以用导电缝线缝合电路了。请参见第
    7 章关于围裙开发的讨论，了解这需要提前多少规划。在柔软的衣物上，避免导电缝线在非预期位置接触可能颇具挑战性。


    ## 电池


    在开发过程中，你最可能通过将 Arduino 电路板插入 USB 端口来供电。一旦你穿戴好成品或在现场使用它时，很可能需要一块电池。如果项目只是运行几个 NeoPixel
    和一个电路板（比如围裙项目），你可能可以使用纽扣电池——就是你在手表和其他小型电子产品中见过的那种扁平金属小电池。这些电池很适合放入小电池盒（图 5-12），并且电池很容易取出。AAA
    电池（放在合适的带连接器的电池盒中）也可能是一个选择。


    查看电池包装上的说明，了解其提供的电压和功率，并分析你的项目中的电路，以确定你需要什么。许多较小的电池是碱性电池，提供 1.5 V 电压。要驱动一个需要三伏电压的组件，你需要将两个这样的电池串联起来。购买已为你安排好的电池组。电池连接器连接到电压调节器，该调节器要求输入电压高于输出电压（对于某些调节器，可能高出
    1.5 V，这被称为压差电压）。在这种情况下，我们使用两块 3 V 锂纽扣电池。


    注意


    不要在可穿戴项目中使用“枕头”型锂聚合物电池。它们很脆弱，可能会破裂并起火。你可能会在网上看到使用这些电池的旧设计，但请避免使用它们，并使用更新、更安全且封装更好的电池。如果你使用可充电电池，请阅读制造商的充电说明。


    ![A371637_1_En_5_Fig13_HTML.jpg](img/A371637_1_En_5_Fig13_HTML.jpg)


    图 5-13.


    设计用于连接到可缝纫处理器连接器的纽扣电池盒（打开状态，旁边放有一块电池）


    ## 导电丝带和缝线


    要连接可缝纫电路，你需要使用某种导电材料。你可以手工缝制电路；我们将展示的项目最好用这种方法完成。然而，市面上也有其他产品，比如带有五条并行导线的丝带，你可能想尝试一下。相对于使用丝带，Lyn
    更偏好手工缝制，因为她发现用丝带时，在紧密排列的并行导体上很容易造成电路短路。

    '
- fmt: '# Other Components


    There are a few other miscellaneous component types that you should know about
    in case they come up in projects you decide to try.


    Some components may come with shields or breakout boards. Shields are really only
    applicable to traditional Arduino boards, since they are designed to clip on top
    of the pins (which will not work on the wearable’s pad connectors). Breakout boards,
    however, are designed to take a set of outputs from a sensor or other device and
    route them (directly or indirectly) to the Arduino. You may need to get creative
    to figure out how to connect these boards to a wearable, if there is not yet a
    sewable version.


    `Capacitors` are components that are used to store small amounts of energy, or
    to smooth out spikes in current. You might use one if you anticipate voltage spikes
    in your project for some reason (such as a motor or a large number of LEDs turning
    on at once).


    Electroluminescent (EL) wire is wire with a coating that glows when an alternating
    current is passed through it. An inverter is required to step up the Arduino voltage
    to the higher values (but very low current) used by EL wire. Sequencers are sometimes
    used to switch between pieces of EL wire to give an appearance of motion, like
    an old-fashioned animated neon sign. We have an EL wire project in Chapter [11](#A371637_1_En_11_Chapter.html).


    ## Do I Need to Learn How to Solder?


    You will be able to do all the projects we give instructions for in this book
    without needing to solder. However, you may find sensors or other components that
    you would really like to use, but are impractical to connect with sewn or other
    non-permanent connections. There are many learn-to-solder tutorials online and
    in-person classes, and we suggest you look into one of those if you want to move
    on to more complex projects.


    ## Laundry


    If you are making a piece that you plan to wear, sooner or later you will need
    to wash it. Some components can be hand-washed, but others should not be. You
    can put a circuit on a placket that you attach in a removable way, have non-washable
    pieces in a pocket or shoulder pad that they can be slipped out of, and so on.
    The manufacturer of your part likely has something on its website about this issue.
    Note that dry cleaning is actually not “dry,” and dry cleaning fluid can damage
    components.


    Caution


    Never wash or dry-clean batteries, inverters, sequencers, or other sensitive parts.
    Design your piece so that batteries, EL wire, and any parts not specifically noted
    as washable can be removed easily.


    ## Summary


    This chapter reviewed the Arduino platform and components in its ecosystem of
    products. We talked about how to size resistors and how to prototype basic circuits.
    In the next chapter we will see how to write code that runs on the circuits we
    talked about in this chapter. We will write some programs in the Arduino IDE (software
    environment) both for the sewable boards and their generic non-sewable components.


    # 6. Programming Wearables


    One of the things that people find intimidating when starting up Arduino projects
    is that you do need to learn to program, at least a little. The good news is that
    a good way to learn computer programming is to look at examples, and there are
    many examples out there for basic Arduino programming.


    As with our sewing and electronics chapters, we only have the space to get you
    started here, and you will probably need some details fleshed out using other
    resources. Arduinos use a programming language called C++, a close relative of
    other programming languages like Java, Python, and C. There are many good C++
    programming books; for example, there are many available at [`www.apress.com/programming/c-c?p=1`](http://www.apress.com/programming/c-c?p=1).
    You can also follow equivalent online tutorials on C++ or the simpler, older language
    C that C++ is based on to back up the quick tour we provide in this chapter. For
    the purposes of the rest of this book, if you can figure out how to tinker with
    existing examples that are available online or in the downloadable material in
    this book (the link is on the copyright page of the book), you should be good
    to go.


    Joan and Rich take you through this chapter. Joan learned to code in traditional
    classes and then worked on and managed some quite large programming projects.
    Rich has more of a maker background. When the two of us diverge on approaches,
    we may show you more than one way to think about something and let you decide
    what approach fits your style.


    This chapter is in three parts. First we give a general introduction to programming.
    Then we show you how to find examples for the regular (not sewable) Arduino boards
    and make a few points about programming those. Finally, we move into the sewable
    boards.


    ## Programming Basics


    Programming can seem intimidating because the actual code looks arcane and there
    seem to be a lot of rules to learn. However, once you know why those rules are
    there, anticipating the right way to develop a program becomes easier. Programming
    is just coming up with a very detailed set of instructions for the Arduino to
    use to do something in a particular sequence, such as turning on LEDs if a button
    is pushed, taking sensor data and turning something toward a light source, and
    so on.


    Another way to think about a program is that it is a detailed script for a computer
    (or a processor like an Arduino) to carry out. If you were writing a script with
    stage direction for an experienced actor, you might not put in very much detail.
    But if you were explaining stage direction to kindergarteners for the school holiday
    pageant, you would likely break it down into small steps. Programming is like
    writing a script for preschoolers, because a computer does not know what you meant
    to do, nor does it have knowledge of the real world beyond what you tell it.


    Tip


    The classic way to introduce programming to beginners of any age is to have them
    write a very detailed set of instructions for a robot to do something, like make
    a peanut butter and jelly sandwich. Typically one person writes down the instructions
    and then someone else plays the “robot,” following the instructions very literally.
    If you have never coded before, you might do this as an exercise just to think
    about the steps. How might you define “above” and “below” and “turn the lid” in
    terms a computer without a vision system or any force feedback can understand?


    ## Open vs. Closed-loop Control


    A closed-loop system checks that whatever the Arduino (or other computer) commanded
    something in the real world to do actually happened. So, one might check turns
    of a wheel, the angle of a lever, the temperature of a heating element, and so
    on.


    Open-loop control systems do not check things like this. You might be surprised
    to know that most consumer 3D printers are managed by an Arduino or something
    roughly equivalent, and run almost entirely open loop. Stepper motor precision
    (discussed in Chapter [8](#A371637_1_En_8_Chapter.html)) is good enough that you
    can get away with not checking where you are, though there are “end stops” on
    some axes to allow the machine to find its starting position.'
