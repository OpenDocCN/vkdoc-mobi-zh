  trans: '

    # 戏服制作


    如今，在家中制作更精致、更专业的戏服已成为可能。因此，角色扮演——装扮并扮演喜爱的虚构人物——已然成为一种亚文化现象（最初在日本兴起，并迅速传播到美国及其他地区），这并不令人惊讶。科幻及其他类型的展会活动上，经常有粉丝身着戏服扮演自己钟爱的角色。动漫和电子游戏角色是热门主题。有鉴于此，许多场合都需要营造出超脱尘世的效果，而本书中介绍的技术，或许正是将角色扮演戏服提升到新高度的关键。


    历史戏服一直很受欢迎。文艺复兴博览会（[`www.renfaire.com`](http://www.renfaire.com)）普及了对伊丽莎白时代晚期活动的历史重演，以及装扮成那个时代的人物。可见的电子设备可能会显得与角色不符，但你手臂上可能有一条眼睛发光的龙，或者一个会朝向光线的头。


    你阅读本书，可能是为了寻找增强戏剧效果戏服的灵感，无论是用于学校演出（正如琳在本章后面所谈到的），还是用于专业用途。在学校层面，戏服可能需要预算低廉、快速组装，并且对于一个患有舞台恐惧症的十岁孩子来说，穿脱要方便。一些由电子技术驱动的战略性特效，能让一套戏服令人难忘。例如，琳和她的学生们为了《小美人鱼》的演出，为鱼添加了可编程的发光眼睛。


    最后，还有用于派对、节日等场合的普通装扮戏服。图 1-2 展示了定制的、真空成型（第 13 章）的塑料盔甲在盒子里的样子，而在图 1-3 中，它短暂地将里奇爵士变身为他真正的游侠骑士身份。


    ![A371637_1_En_1_Fig3_HTML.jpg](img/A371637_1_En_1_Fig3_HTML.jpg)


    图 1-3. 盔甲穿在我们的骑士作者身上


    ![A371637_1_En_1_Fig2_HTML.jpg](img/A371637_1_En_1_Fig2_HTML.jpg)


    图 1-2. 盒子里的塑料盔甲


    一些戏服元素，比如面具（图 1-4）或某个时代的服装，能将人带到另一个时空。如果你已经有了奇幻戏服，何不将它混搭起来，使其具有互动性呢？（盔甲和面具由加利福尼亚州圣莫尼卡的
    Make Believe 公司提供；我们将在第 2 章中进一步讨论。）


    ![A371637_1_En_1_Fig4_HTML.jpg](img/A371637_1_En_1_Fig4_HTML.jpg)


    图 1-4. 面具


    也许你并非要制作一件戏服本身，而是想做些有实用功能的东西——比如在黑暗中能自动亮起作为小夜灯的墙饰，或者在包里布置一些巧妙的 LED 灯，以便在晚上能找到钥匙。


    我们想表达的核心观点是，应用本书技术的第一步，是思考你要做什么以及你希望它看起来是什么样。人们常常一开始就为了技术本身而想使用某项技术，但结果往往不尽如人意。仅仅因为有可能制作一件互动服装或艺术品，你就应该这么做吗？


    如果你正在阅读本书，你可能正打算制作像我们刚才描述的那些戏服。或者，你可能是被要求为高中生或大学生开发一门课程。如果你是老师或家长，时尚科技项目可以是一个很好的方式，去说服那些原本可能对电子或编程望而却步的学生，让他们在最终产品的激励下，尝试一下这些领域。


    # 我们的设计理念


    我们三人（琼、里奇和琳）是从截然不同的方向进入这个领域的。里奇是千禧一代，从小就开始设计电子项目（包括当今消费级 3D 打印机的前身之一，以及一款精巧的小型
    3D 打印机，里奇和琼曾任职的公司至今仍在销售它——你可以在第 9 章看到它）。他喜欢为了创造而创造，这是通常对黑客的定义。（在我们所处的圈子里，黑客并没有负面含义。那些利用技能做坏事的人被称为黑帽黑客）。里奇非常注重细节，对本书中涉及的硬件和软件拥有百科全书般的知识。


    琼则是前火箭科学家转型而来，她的角色是把握全局，并思考如何避免在任何一个技术领域陷入过多的细节。她曾参与其他行星的航天器项目，在那里一个微小的错误都可能导致灾难。因此，她带来了处理复杂系统的结构化方法和经验，同时也希望将解释尽可能简化（同时保持正确性）。


    琳则拥有多年为初中和高中演出制作戏服的丰富经验。除了似乎能凭空（以及一堆布料）变出戏服的能力之外，她还有幽默感，并且对于什么小细节可能带来天壤之别有着敏锐的眼光。她还在课堂上教授过缝纫，因此了解可能出现的各种陷阱。


    我们三人轮流引导你阅读本书，并且在本书的大部分内容中，当聚焦于某一个人的特定专长时，我们会切换成第一人称。有时我们合作得过于紧密，以至于无法由某一个人来主导，这时（就像此处这样）我们就会使用“我们”。


    我们在此介绍我们的背景（本书前面的“作者简介”部分还有更多内容），是因为我们建议你组建一个团队来完成你的第一个项目，这个团队应具备所有这些方面的能力，尽管不一定像我们三人这样恰好分布在团队中。良好的默契和幽默感对于一个团队来说也非常重要。有时候事情看起来就是很傻，你必须笑一笑，找出哪里出了问题，并且不再重蹈覆辙。其他时候，你可能需要让你团队中的某个成员独自在角落里尝试一段时间。但是，如果我们中的任何一个人卡住了，我们发现向其他人清晰地阐述问题非常有价值，这样我们就可以回到基本原理，思考我们最初想要达成什么目标。


    # 规划你的项目


    市面上有许多书籍涵盖了制作时尚科技项目的不同方面，互联网上也有很多你可以尝试的项目。我们感觉缺少一条循序渐进的路径，从缝纫基础，再加上电子硬件和软件开始，以便让那些对所需技能知之甚少的人也能开始项目制作。


    我们始终强调系统设计的概念。很容易为项目的某个部分想出一个绝妙的主意，但如果你不考虑它要整合到可穿戴物品中，而以孤立的方式去做那个部分，那么最终的做法可能与你开始将其整合到连衣裙或帽子中时应采取的方式大相径庭。我们无论如何强调提前端到端地规划一个复杂项目的必要性都不为过。第
    10 章讲述了我们共同完成的第一个项目的故事，在那个项目中，我们很大程度上忽略了这一原则——尽管我们三人都知道不应该这样。


    在本书中，我们将涵盖缝纫（包括制作和使用纸样）、创建电子电路以及编程的基础知识。这些是大多数时尚科技项目的核心技能，我们会对每一项进行相当深入的探讨。我们按照你最有可能创建项目的顺序来安排章节：先缝纫，然后设计电路，最后（如果需要的话）进行编程。我们将指导你如何管理项目中的复杂性，并为你提供技巧，帮助你在项目遇到问题时避免不知所措。

    '
- fmt: '### The Wearer’s Environment


    As Chapter [2](#A371637_1_En_2_Chapter.html) advises, you also need to think hard
    about what the wearer is going to be doing and what environment they will be in
    when they are wearing the garment. For example, the projects in this book are
    all intended to be worn indoors, in a dry environment. Even though one project
    is an apron, we imagine it as more something one would wear to impress friends
    while serving food at a party, and not so much when cooking or with wet hands.


    ### Prototyping and Testing


    As you plan out projects, think about where in the project development you might
    be able to cobble together mini-prototypes. For the sewing portion, you might
    make a muslin—a version of the project in a very cheap fabric that you will not
    mind taking stitches out of and resewing multiple times if necessary. When creating
    electronics, you might initially use alligator clips (clips to hold together a
    circuit temporarily) to create a circuit that you will ultimately sew on with
    conductive thread. And when programming, you should consider how to create some
    simple stepping-stone projects that build up the ultimate functionality one part
    at a time. As we go through the book, we will suggest these techniques. As you
    are coming up with ideas about what you want to do, consider how to make some
    parts of it independently testable so you are not left with a complex project
    that might have multiple interacting problems.


    The most important thing, though, is to figure out what you want the costume to
    be first, and add the technology or animation second. Lyn will now step up and
    talk about a few of her best creative experiences.


    ### Lyn Costume Stories


    In every production I have worked on, there seems to be at least one costume that
    is difficult to get right. The concept was too abstract to understand and/or perfect,
    or the fitting was troublesome, or it suffered from numerous other issues. This
    was the case for a turkey for A Coney Island Christmas.


    Some of the costumes in this production were a particular challenge because the
    play is set in the Bronx in the 1930s. There is a play-within-the-play in which
    costumes are supposed to look homemade by children and their parents in Depression-era
    New York. I wanted a kitsch factor, especially for a turkey that appears in a
    Thanksgiving Pageant scene. Most of the costumes we found were way too modern.
    The colors were too vibrant and neon for the time period, and I wanted the look
    of the fabrics to be authentic.


    After much brainstorming with the director, I purchased a turkey costume online.
    When it arrived I took my scissors to it. I cut the sleeves off and trimmed away
    most of the front and back of the torso. This allowed me to have straps or suspenders
    over the shoulders of the actress. It had a stuffed lower body, which I wanted
    to preserve. I didn’t use the leg covers because she would be wearing it over
    a dress.


    After I was satisfied with the shape of the overall costume, I began to cover
    the bottom half with curled construction paper strips to represent feathers. Using
    muted brown, orange, and yellow strips of paper, I curled them around a pencil
    and glued them in rows onto the turkey body. The tailpiece of the costume was
    a nice shape, so I just covered it with construction paper feathers, and it was
    my favorite part (Figure [1-5](#A371637_1_En_1_Chapter.html#Fig5)).


    ![A371637_1_En_1_Fig5_HTML.jpg](A371637_1_En_1_Fig5_HTML.jpg)


    **Figure 1-5.** Close-up of the construction-paper turkey tail


    The curling and gluing of the paper feathers was time consuming and a bit tedious,
    but I was pleased with the outcome and effect. For the wattle and beak, I cut
    two pieces of construction paper in the shapes needed and used double-sided tape
    to hold them in place on the actress’s face.


    I also used the curled construction paper feathers for the wings of the angel
    Gabriel. Cutting the wing shapes from cardboard, covering them with white feathers,
    strapping them to the back of the actor, and making sure he went through doorways
    sideways, was a successful and charming solution for this costume. Most of the
    time I am working with fabric to create and alter costumes, so this was a refreshing
    and back-to-basics show to work on.


    A production of The Wizard of Oz was perhaps my favorite show in terms of the
    freedom to explore wild and zany ideas. The director, another costumer, and I
    spent a lot of time tinkering with plans for some of the characters that were
    a bit different from the usual versions. We put the Wicked Witch in ski boots
    on a rolling platform pulled by one of her monkeys. She could move without walking
    and lean forward in a very menacing way. To allow her to melt onstage, we added
    a hoop skirt under her witchy dress and she could slowly writhe and squat down
    very small into a heap, leaving the hoop standing with a sunken center.


    The monkeys wore thermal underwear dyed brown with furry patches and tails sewn
    onto them. The Tin Man had metal stovepipe arms and legs, and the Cowardly Lion’s
    mane was made from a mop head. The Munchkins were the most fun to create. I found
    some pretty ugly and colorful tie-dyed jumpsuits at a budget store. Then I used
    regular dance tights in bright colors, stuffed them with batting, twisted two
    pair together for each actor, and attached them to their heads. When the Munchkins
    were hiding as the house landed in Oz, they looked like a field of strange and
    wonderful roots.


    I have discovered through many years of costuming that often the pieces that seem
    to be failures at the start of a production turn out to be the best by opening
    night, or at least the most commented on. My favorite moments of any show are
    the brainstorming, exploring, and experimenting in the beginning with the production
    team. Bounce ideas around and gathering new input and different points of view
    are exhilarating.


    **Note**


    As you read Lyn’s stories, a few things probably stood out. One was that it sounded
    like fun. Good design cannot take itself too seriously. Be playful and try incongruous
    things. That’s not a skill we can teach you in a book, but we will intersperse
    sidebars like Lyn’s here and there in the book to give you examples of exercises
    that went well. Chapter [2](#A371637_1_En_2_Chapter.html) goes into some depth
    about what makes a good costume, deconstructing more experiences like those that
    Lyn just shared.


    ## Summary


    In this chapter we defined fashion tech and gave a brief history of the converging
    fields that comprise this interdisciplinary endeavor. From there we moved to introducing
    different costuming situations that might apply these technologies. We talked
    about how to use the book and described our design philosophy. We also mentioned
    a few case studies about great costumes that were decidedly low-tech, to make
    the point that a good costume will shine through and design is the most important
    element in a good project. In the next chapter we talk more broadly about what
    makes a good costume.'
  raw: '### The Wearer’s Environment


    As Chapter [2](#A371637_1_En_2_Chapter.html) advises, you also need to think hard
    about what the wearer is going to be doing and what environment they will be in
    when they are wearing the garment. For example, the projects in this book are
    all intended to be worn indoors, in a dry environment. Even though one project
    is an apron, we imagine it as more something one would wear to impress friends
    while serving food at a party, and not so much when cooking or with wet hands.


    ### Prototyping and Testing


    As you plan out projects, think about where in the project development you might
    be able to cobble together mini-prototypes. For the sewing portion, you might
    make a muslin—a version of the project in a very cheap fabric that you will not
    mind taking stitches out of and resewing multiple times if necessary. When creating
    electronics, you might initially use alligator clips (clips to hold together a
    circuit temporarily) to create a circuit that you will ultimately sew on with
    conductive thread. And when programming, you should consider how to create some
    simple stepping-stone projects that build up the ultimate functionality one part
    at a time. As we go through the book, we will suggest these techniques. As you
    are coming up with ideas about what you want to do, consider how to make some
    parts of it independently testable so you are not left with a complex project
    that might have multiple interacting problems.


    The most important thing, though, is to figure out what you want the costume to
    be first, and add the technology or animation second. Lyn will now step up and
    talk about a few of her best creative experiences.


    Lyn Costume Stories


    In every production I have worked on, there seems to be at least one costume that
    is difficult to get right. The concept was too abstract to understand and/or perfect,
    or the fitting was troublesome, or it suffered from numerous other issues. This
    was the case for a turkey for A Coney Island Christmas.


    Some of the costumes in this production were a particular challenge because the
    play is set in the Bronx in the 1930s. There is a play-within-the-play in which
    costumes are supposed to look homemade by children and their parents in Depression-era
    New York. I wanted a kitsch factor, especially for a turkey that appears in a
    Thanksgiving Pageant scene. Most of the costumes we found were way too modern.
    The colors were too vibrant and neon for the time period, and I wanted the look
    of the fabrics to be authentic.


    After much brainstorming with the director, I purchased a turkey costume online.
    When it arrived I took my scissors to it. I cut the sleeves off and trimmed away
    most of the front and back of the torso. This allowed me to have straps or suspenders
    over the shoulders of the actress. It had a stuffed lower body, which I wanted
    to preserve. I didn’t use the leg covers because she would be wearing it over
    a dress.


    After I was satisfied with the shape of the overall costume, I began to cover
    the bottom half with curled construction paper strips to represent feathers. Using
    muted brown, orange, and yellow strips of paper, I curled them around a pencil
    and glued them in rows onto the turkey body. The tailpiece of the costume was
    a nice shape, so I just covered it with construction paper feathers, and it was
    my favorite part (Figure [1-5](#A371637_1_En_1_Chapter.html#Fig5)).


    ![A371637_1_En_1_Fig5_HTML.jpg](A371637_1_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    Close-up of the construction-paper turkey tail


    The curling and gluing of the paper feathers was time consuming and a bit tedious,
    but I was pleased with the outcome and effect. For the wattle and beak, I cut
    two pieces of construction paper in the shapes needed and used double-sided tape
    to hold them in place on the actress’s face.


    I also used the curled construction paper feathers for the wings of the angel
    Gabriel. Cutting the wing shapes from cardboard, covering them with white feathers,
    strapping them to the back of the actor, and making sure he went through doorways
    sideways, was a successful and charming solution for this costume. Most of the
    time I am working with fabric to create and alter costumes, so this was a refreshing
    and back-to-basics show to work on.


    A production of The Wizard of Oz was perhaps my favorite show in terms of the
    freedom to explore wild and zany ideas. The director, another costumer, and I
    spent a lot of time tinkering with plans for some of the characters that were
    a bit different from the usual versions. We put the Wicked Witch in ski boots
    on a rolling platform pulled by one of her monkeys. She could move without walking
    and lean forward in a very menacing way. To allow her to melt onstage, we added
    a hoop skirt under her witchy dress and she could slowly writhe and squat down
    very small into a heap, leaving the hoop standing with a sunken center.


    The monkeys wore thermal underwear dyed brown with furry patches and tails sewn
    onto them. The Tin Man had metal stovepipe arms and legs, and the Cowardly Lion’s
    mane was made from a mop head. The Munchkins were the most fun to create. I found
    some pretty ugly and colorful tie-dyed jumpsuits at a budget store. Then I used
    regular dance tights in bright colors, stuffed them with batting, twisted two
    pair together for each actor, and attached them to their heads. When the Munchkins
    were hiding as the house landed in Oz, they looked like a field of strange and
    wonderful roots.


    I have discovered through many years of costuming that often the pieces that seem
    to be failures at the start of a production turn out to be the best by opening
    night, or at least the most commented on. My favorite moments of any show are
    the brainstorming, exploring, and experimenting in the beginning with the production
    team. Bounce ideas around and gathering new input and different points of view
    are exhilarating.


    Note


    As you read Lyn’s stories, a few things probably stood out. One was that it sounded
    like fun. Good design cannot take itself too seriously. Be playful and try incongruous
    things. That’s not a skill we can teach you in a book, but we will intersperse
    sidebars like Lyn’s here and there in the book to give you examples of exercises
