- fmt: "# Creating the Pockets\n\nUsing tailor’s chalk, measure and mark where you\
    \ want the pocket s to be on the front side of the apron. Remember to add half\
    \ an inch on all sides that you will fold over when hemming around the edges of\
    \ the pockets. First, sew around all the edges of the pockets to prevent the fabric\
    \ from fraying. Then, fold the top edge of the pockets down half an inch on the\
    \ wrong side of the fabric and press. Sew across the edges. Turn the fabric right\
    \ side out, using the tip of your scissors or something with a tip to gently poke\
    \ the corners out. Press the sides and bottom with an iron to create a half an\
    \ inch hem (see Figure [7-8](#A371637_1_En_7_Chapter.html#Fig8)).\n\n![A371637_1_En_7_Fig8_HTML.jpg](A371637_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8.\n\nThe finished-off piece—this will be the inside of the large pocket.\n\
    \nPin the pockets in place on the apron. Sew from the top of one side of each\
    \ pocket to the bottom and turn the fabric without removing it from the machine.\
    \ Sew across the bottom, turn the fabric again, and sew up the other side. Remember\
    \ to add a few back and forward stitches when you begin on the first side and\
    \ when you finish sewing the other side (Figure [7-9](#A371637_1_En_7_Chapter.html#Fig9)).\n\
    \n![A371637_1_En_7_Fig9_HTML.jpg](A371637_1_En_7_Fig9_HTML.jpg)\n\nFigure 7-9.\n\
    \nSewing on the pocket near the bottom—the other pocket goes on the same way\n\
    \n# Hemming the Edges\n\nSew around the edges of the whole apron with a zigzag\
    \ stitch to prevent fraying (a zigzag is shown in Figure [7-8](#A371637_1_En_7_Chapter.html#Fig8)).\
    \ Press the edge under half an inch all the way around the apron. Sew a straight\
    \ stitch to secure it.\n\n# Sewing the Ties and Neck Strap\n\nFold the edges of\
    \ the ties and strap into the center, fold them over again lengthwise (Figures\
    \ [7-10](#A371637_1_En_7_Chapter.html#Fig10) and [7-11](#A371637_1_En_7_Chapter.html#Fig11)),\
    \ and tuck them under similarly at the ends. Sew the edges and the ends of the\
    \ ties and the strap. Pin them in place and sew them onto the apron. It is a good\
    \ idea to sew over the attached edges several times to prevent them from coming\
    \ off.\n\n![A371637_1_En_7_Fig11_HTML.jpg](A371637_1_En_7_Fig11_HTML.jpg)\n\n\
    Figure 7-11.\n\nThe final fold (it will be stitched on one side to finish)\n\n\
    ![A371637_1_En_7_Fig10_HTML.jpg](A371637_1_En_7_Fig10_HTML.jpg)\n\nFigure 7-10.\n\
    \nThe first fold of the ties or strap\n\nIf you use cotton webbing for the strap\
    \ and ties, cut them to the same length as the fabric versions and hem all the\
    \ ends. Pin them to the apron and sew them on.\n\n# Assembling the Saucepan Button\n\
    \nTake the pieces of conductive fabric and the piece of felt in the shape of the\
    \ saucepan that you cut and set aside earlier. Trim the felt to be slightly smaller\
    \ than the conductive fabric version. Cut one more piece of conductive fabric\
    \ without the handle of the saucepan and trim it to be slightly smaller than the\
    \ felt piece. Cut a hole out of the center of the felt saucepan. This will be\
    \ your button to add time to the timer. Hand sew the bottom layer of the saucepan\
    \ pieces (the one without the handle) onto the apron. You can see the pieces back\
    \ in Figure [7-6](#A371637_1_En_7_Chapter.html#Fig6) and on the apron as I finish\
    \ up in Figure [7-12](#A371637_1_En_7_Chapter.html#Fig12).\n\n![A371637_1_En_7_Fig12_HTML.jpg](A371637_1_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12.\n\nFinishing up the saucepan (assembling the pieces in Figure [7-6](#A371637_1_En_7_Chapter.html#Fig6))\n\
    \n# Sewing on the Electronics and Circuit\n\nCut a small rectangle of the apron\
    \ fabric 2.5 inches by 4.5 inches. Using a zigzag stitch, sew around all of the\
    \ edges, turn each edge under a quarter inch, press down and hem with a straight\
    \ stitch. This will create a placket to hold the Gemma and will allow it to slip\
    \ in and out of the pocket for easy access (Figure [7-13](#A371637_1_En_7_Chapter.html#Fig6)).\n\
    \nUse the `3Vo` and `D1` holes (which we are not otherwise going to use) to sew\
    \ the Gemma onto the placket with regular—not conductive—thread. Figure [7-13](#A371637_1_En_7_Chapter.html#Fig6)\
    \ shows the apron with all the rows of conductive thread that this section describes.\n\
    \nThe NeoPixel will attach to the wearer’s right of the pocket that will hold\
    \ the Gemma and batteries. Using the “arrow out” hole in the NeoPixel, use regular\
    \ (not conductive) thread to sew the component onto the apron. The `–`, `+`, and\
    \ “in arrow” will be sewn with conductive thread later on.\n\nUsing the Fritzing\
    \ diagram back in Figure [7-2](#A371637_1_En_7_Chapter.html#Fig2), lay out your\
    \ components on the apron bib and lightly draw your circuits with tailor’s chalk\
    \ onto your fabric. These will be the paths you sew to connect the components\
    \ with conductive thread.\n\n> **Note**  \n> This circuit requires a pullup resistor\
    \ on pin `D1`, because we want the input on `D1` to be `HIGH` until the button\
    \ (saucepan) has been pushed, and `LOW` (at ground voltage) when the button is\
    \ pushed. In other words, we want to complete the circuit when the button has\
    \ been pushed. We write the input pin `HIGH` in the code to enable the chip’s\
    \ internal pullup resistor (this would not work if we tried to connect the button\
    \ to `3Vo`, because the chip does not have an internal pulldown). See Chapters\
    \ [5](#A371637_1_En_5_Chapter.html) and [6](#A371637_1_En_6_Chapter.html) for\
    \ more on this.\n\nYou are going to connect the components as follows:\n\n*  \
    \ Bottom layer of conductive fabric to `D1` on the Gemma\n*   Top layer of conductive\
    \ fabric to `GND` on Gemma\n*   “In” Arrow on the NeoPixel to `D2` on the Gemma\n\
    *   `+` on the NeoPixel to `Vout` on the Gemma\n*   `–` on the NeoPixel to the\
    \ top layer of the button (which is connected to `GND`)\n\nWe will now walk through\
    \ each of these conductive thread runs in turn. All the runs are visible in Figure\
    \ [7-13](#A371637_1_En_7_Chapter.html#Fig13) except for the connections that run\
    \ on the inside of the apron or under the placket.\n\n![A371637_1_En_7_Fig13_HTML.jpg](A371637_1_En_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13.\n\nLayout of the electronics placket, battery holder, Gemma, NeoPixel,\
    \ and conductive hand stitching\n\n## First Conductive Thread Run\n\nThis run\
    \ connects the bottom of the saucepan button to `D1` on the Gemma. Thread your\
    \ needle with conductive thread and tie two or three knots at the end of the long\
    \ side of the thread. Stick your needle up through the edge of the saucepan closest\
    \ to the Gemma placket and pull the thread through until the knot is tight. Do\
    \ not sew too close to the edge of the conductive fabric because it will cause\
    \ the fabric to fray.\n\nUsing small, straight stitches sew a path to the top\
    \ of the placket and sew down the side to the `D1` pin on the Gemma. Stick your\
    \ needle up through the hole and pull the thread taut. Stick the needle down through\
    \ the placket very close to the edge of the Gemma pad and pull the thread taut.\
    \ Make two or three stitches like this to create a secure connection. Do not attach\
    \ the placket to the pocket.\n\nWhen you are making these stitching runs with\
    \ conductive thread, make sure to pull the thread tight around the connection\
    \ to the Gemma and NeoPixel, but not tight enough to pull the fabric out of shape.\
    \ A connection that is too loose will not work properly.\n\nMake a knot on the\
    \ underside of the placket by making three tiny stitches in the same place. Cut\
    \ the conductive thread, leaving a small tail. After all the connections are made,\
    \ use clear nail polish to seal the knots (conductive thread is made from wire\
    \ and does not like to stay in a tight knot). Allow the nail polish to dry and\
    \ cut off any tails of thread."
  raw: '### Creating the Pockets


    Using tailor’s chalk, measure and mark where you want the pocket s to be on the
    front side of the apron. Remember to add half an inch on all sides that you will
    fold over when hemming around the edges of the pockets. First, sew around all
    the edges of the pockets to prevent the fabric from fraying. Then, fold the top
    edge of the pockets down half an inch on the wrong side of the fabric and press.
    Sew across the edges. Turn the fabric right side out, using the tip of your scissors
    or something with a tip to gently poke the corners out. Press the sides and bottom
    with an iron to create a half an inch hem (see Figure [7-8](#A371637_1_En_7_Chapter.html#Fig8)).


    ![A371637_1_En_7_Fig8_HTML.jpg](A371637_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    The finished-off piece—this will be the inside of the large pocket.


    Pin the pockets in place on the apron. Sew from the top of one side of each pocket
    to the bottom and turn the fabric without removing it from the machine. Sew across
    the bottom, turn the fabric again, and sew up the other side. Remember to add
    a few back and forward stitches when you begin on the first side and when you
    finish sewing the other side (Figure [7-9](#A371637_1_En_7_Chapter.html#Fig9)).


    ![A371637_1_En_7_Fig9_HTML.jpg](A371637_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Sewing on the pocket near the bottom—the other pocket goes on the same way


    ### Hemming the Edges


    Sew around the edges of the whole apron with a zigzag stitch to prevent fraying
    (a zigzag is shown in Figure [7-8](#A371637_1_En_7_Chapter.html#Fig8)). Press
    the edge under half an inch all the way around the apron. Sew a straight stitch
    to secure it.


    ### Sewing the Ties and Neck Strap


    Fold the edges of the ties and strap into the center, fold them over again lengthwise
    (Figures [7-10](#A371637_1_En_7_Chapter.html#Fig10) and [7-11](#A371637_1_En_7_Chapter.html#Fig11)),
    and tuck them under similarly at the ends. Sew the edges and the ends of the ties
    and the strap. Pin them in place and sew them onto the apron. It is a good idea
    to sew over the attached edges several times to prevent them from coming off.


    ![A371637_1_En_7_Fig11_HTML.jpg](A371637_1_En_7_Fig11_HTML.jpg)


    Figure 7-11.


    The final fold (it will be stitched on one side to finish)


    ![A371637_1_En_7_Fig10_HTML.jpg](A371637_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    The first fold of the ties or strap


    If you use cotton webbing for the strap and ties, cut them to the same length
    as the fabric versions and hem all the ends. Pin them to the apron and sew them
    on.


    ### Assembling the Saucepan Button


    Take the pieces of conductive fabric and the piece of felt in the shape of the
    saucepan that you cut and set aside earlier. Trim the felt to be slightly smaller
    than the conductive fabric version. Cut one more piece of conductive fabric without
    the handle of the saucepan and trim it to be slightly smaller than the felt piece.
    Cut a hole out of the center of the felt saucepan. This will be your button to
    add time to the timer. Hand sew the bottom layer of the saucepan pieces (the one
    without the handle) onto the apron. You can see the pieces back in Figure [7-6](#A371637_1_En_7_Chapter.html#Fig6)
    and on the apron as I finish up in Figure [7-12](#A371637_1_En_7_Chapter.html#Fig12).


    ![A371637_1_En_7_Fig12_HTML.jpg](A371637_1_En_7_Fig12_HTML.jpg)


    Figure 7-12.


    Finishing up the saucepan (assembling the pieces in Figure [7-6](#A371637_1_En_7_Chapter.html#Fig6))


    ## Sewing on the Electronics and Circuit


    Cut a small rectangle of the apron fabric 2.5 inches by 4.5 inches. Using a zigzag
    stitch, sew around all of the edges, turn each edge under a quarter inch, press
    down and hem with a straight stitch. This will create a placket to hold the Gemma
    and will allow it to slip in and out of the pocket for easy access (Figure [7-13](#A371637_1_En_7_Chapter.html#Fig6)).


    Use the 3Vo and D1 holes (which we are not otherwise going to use) to sew the
    Gemma onto the placket with regular—not conductive—thread. Figure [7-13](#A371637_1_En_7_Chapter.html#Fig6)
    shows the apron with all the rows of conductive thread that this section describes.


    The NeoPixel will attach to the wearer’s right of the pocket that will hold the
    Gemma and batteries. Using the “arrow out” hole in the NeoPixel, use regular (not
    conductive) thread to sew the component onto the apron. The –, +, and “in arrow”
    will be sewn with conductive thread later on.


    Using the Fritzing diagram back in Figure [7-2](#A371637_1_En_7_Chapter.html#Fig2),
    lay out your components on the apron bib and lightly draw your circuits with tailor’s
    chalk onto your fabric. These will be the paths you sew to connect the components
    with conductive thread.


    Note


    This circuit requires a pullup resistor on pin D1, because we want the input on
    D1 to be `HIGH` until the button (saucepan) has been pushed, and `LOW` (at ground
    voltage) when the button is pushed. In other words, we want to complete the circuit
    when the button has been pushed. We write the input pin `HIGH` in the code to
    enable the chip’s internal pullup resistor (this would not work if we tried to
    connect the button to 3Vo, because the chip does not have an internal pulldown).
    See Chapters [5](#A371637_1_En_5_Chapter.html) and [6](#A371637_1_En_6_Chapter.html)
    for more on this.


    You are going to connect the components as follows:


    *   Bottom layer of conductive fabric to D1 on the Gemma

    *   Top layer of conductive fabric to GND on Gemma

    *   “In” Arrow on the NeoPixel to D2 on the Gemma

    *   + on the NeoPixel to Vout on the Gemma

    *   – on the NeoPixel to the top layer of the button (which is connected to GND)


    We will now walk through each of these conductive thread runs in turn. All the
    runs are visible in Figure [7-13](#A371637_1_En_7_Chapter.html#Fig13) except for
    the connections that run on the inside of the apron or under the placket.


    ![A371637_1_En_7_Fig13_HTML.jpg](A371637_1_En_7_Fig13_HTML.jpg)


    Figure 7-13.


    Layout of the electronics placket, battery holder, Gemma, NeoPixel, and conductive
    hand stitching


    ### First Conductive Thread Run


    This run connects the bottom of the saucepan button to D1 on the Gemma. Thread
    your needle with conductive thread and tie two or three knots at the end of the
    long side of the thread. Stick your needle up through the edge of the saucepan
    closest to the Gemma placket and pull the thread through until the knot is tight.
    Do not sew too close to the edge of the conductive fabric because it will cause
    the fabric to fray.


    Using small, straight stitches sew a path to the top of the placket and sew down
    the side to the D1 pin on the Gemma. Stick your needle up through the hole and
    pull the thread taut. Stick the needle down through the placket very close to
    the edge of the Gemma pad and pull the thread taut. Make two or three stitches
    like this to create a secure connection. Do not attach the placket to the pocket.


    When you are making these stitching runs with conductive thread, make sure to
    pull the thread tight around the connection to the Gemma and NeoPixel, but not
    tight enough to pull the fabric out of shape. A connection that is too loose will
    not work properly.


    Make a knot on the underside of the placket by making three tiny stitches in the
    same place. Cut the conductive thread, leaving a small tail. After all the connections
    are made, use clear nail polish to seal the knots (conductive thread is made from
    wire and does not like to stay in a tight knot). Allow the nail polish to dry
    and cut off any tails of thread.'
  trans: "\n# 制作口袋\n\n使用裁缝粉笔，在围裙正面测量并标记出你想要口袋的位置。记住，在口袋边缘折边时，所有边都要额外增加半英寸。首先，沿着口袋的所有边缘进行缝合，防止布料脱线。然后，将口袋的顶部边缘向布料反面折下半英寸并熨平。沿着边缘缝线。将布料翻到正面，用剪刀尖或类似尖物轻轻将角落顶出。用熨斗熨烫侧面和底部，制作出半英寸的折边（见图\
    \ 7-8）。\n\n![A371637_1_En_7_Fig8_HTML.jpg](img/A371637_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8.\n\n完成后的布片——这将成为大口袋的内侧。\n\n将口袋用珠针固定在围裙上。从一个口袋的顶部缝到底部，无需取下布料，直接在机器上转动布料。缝过底部，再次转动布料，然后缝上另一侧。记住，在开始缝第一侧和完成另一侧缝合时，都要增加几针来回缝线（图\
    \ 7-9）。\n\n![A371637_1_En_7_Fig9_HTML.jpg](img/A371637_1_En_7_Fig9_HTML.jpg)\n\
    \n图 7-9.\n\n缝制靠近底部的口袋——另一个口袋以同样方式缝制\n\n# 包边处理\n\n用曲折线迹沿着整个围裙的边缘进行缝合，防止脱线（曲折线迹如图\
    \ 7-8 所示）。将整条围裙的边缘向反面折进半英寸并熨平。用直线线迹缝合固定。\n\n# 缝制系带和颈带\n\n将系带和颈带的边缘向中间折叠，再纵向对折（图\
    \ 7-10 和 7-11），并将末端同样折入内侧。缝合系带和颈带的边缘及末端。将它们用珠针固定在围裙上并缝合。建议在缝合处多缝几道，以防脱落。\n\n![A371637_1_En_7_Fig11_HTML.jpg](img/A371637_1_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11.\n\n最后一次折叠（将在其一侧缝合以完成制作）\n\n![A371637_1_En_7_Fig10_HTML.jpg](img/A371637_1_En_7_Fig10_HTML.jpg)\n\
    \n图 7-10.\n\n系带或颈带的第一次折叠\n\n如果你使用棉质织带制作颈带和系带，将它们剪裁成与布料版本相同的长度，并对所有末端进行折边处理。用珠针固定在围裙上并缝合。\n\
    \n# 组装平底锅按钮\n\n取出你之前裁剪并放好的平底锅形状的导电布片和毛毡片。将毛毡片修剪得比导电布片略小。再裁剪一片不带手柄的导电布片，并修剪得比毛毡片略小。在毛毡平底锅的中心剪一个洞。这将成为你为计时器增加时间的按钮。用手缝针将平底锅部件的底层（不带手柄的那片）缝到围裙上。你可以在图\
    \ 7-6 中看到这些布片，在我完成图 7-12 时，它们已在围裙上。\n\n![A371637_1_En_7_Fig12_HTML.jpg](img/A371637_1_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12.\n\n完成平底锅制作（组装图 7-6 中的部件）\n\n# 缝制电子元件和电路\n\n从围裙布料上裁剪一块 2.5 英寸 x 4.5 英寸的小矩形。用曲折线迹沿所有边缘缝合，将每个边缘向内折进四分之一英寸，熨平后用直线线迹包边。这将制作一个用来放置\
    \ Gemma 的罩布，方便它从口袋中取放（图 7-13）。\n\n使用 `3Vo` 和 `D1` 孔（我们其他情况下不会用到它们），用普通线（非导电线程）将\
    \ Gemma 缝到罩布上。图 7-13 显示了带有本节所述的全部导电线程行的围裙。\n\nNeoPixel 将连接到穿戴者右侧的口袋上，该口袋将容纳 Gemma\
    \ 和电池。使用 NeoPixel 上的“箭头出”孔，用普通线（非导电线程）将元件缝到围裙上。`–`、`+` 和“箭头入”将稍后用导电线程缝制。\n\n参考图\
    \ 7-2 中的 Fritzing 图，将你的元件摆放在围裙胸片上，并用裁缝粉笔在布料上轻轻画出你的电路路径。这些路径就是你用导电线程连接元件时要缝合的路线。\n\
    \n> **注**  \n> 该电路需要在引脚 `D1` 上设置一个上拉电阻，因为我们希望 `D1` 上的输入在按钮（平底锅）被按下前保持 `HIGH`，当按钮按下时为\
    \ `LOW`（接地电压）。换句话说，我们希望在按钮按下时完成电路。我们在代码中将输入引脚设为 `HIGH`，以启用芯片的内部上拉电阻（如果我们试图将按钮连接到\
    \ `3Vo`，这将无法工作，因为芯片没有内部下拉电阻）。更多信息请参见第 5 章和第 6 章。\n\n接下来，你需要按以下方式连接元件：\n\n*   导电布底层连接到\
    \ Gemma 的 `D1`\n*   导电布顶层连接到 Gemma 的 `GND`\n*   NeoPixel 上的“输入”箭头连接到 Gemma 的 `D2`\n\
    *   NeoPixel 上的 `+` 连接到 Gemma 的 `Vout`\n*   NeoPixel 上的 `–` 连接到按钮的顶层（该层已连接到 `GND`）\n\
    \n我们现在将依次介绍每次导电线程的走线。所有走线在图 7-13 中均可见，除非这些连接位于围裙内侧或罩布下方。\n\n![A371637_1_En_7_Fig13_HTML.jpg](img/A371637_1_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13.\n\n电子元件罩布、电池盒、Gemma、NeoPixel 及手工导电缝线的布局\n\n## 第一道导电线程走线\n\n这条走线连接平底锅按钮的底部到\
    \ Gemma 的 `D1`。将导电线程穿入针中，在线的长端末尾打两到三个结。将针从平底锅最靠近 Gemma 罩布的边缘处向上刺入布料，拉紧线程直到线结绷紧。不要缝得太靠近导电布的边缘，否则会导致布料脱线。\n\
    \n用小而直的针迹，缝出一条路径到罩布的顶部，然后沿着侧面缝到 Gemma 的 `D1` 引脚。将针向上穿过孔并拉紧线。将针向下穿过罩布，位置紧邻 Gemma\
    \ 焊盘的边缘，并拉紧线。这样缝两三针以建立牢固的连接。不要将罩布缝到口袋上。\n\n当你用导电线程进行这些缝合走线时，确保在连接到 Gemma 和 NeoPixel\
    \ 的位置将线拉紧，但不要过紧以致布料变形。连接太松会导致无法正常工作。\n\n在罩布的背面打结，方法是在同一位置缝三个小针迹。剪断导电线程，留一个小线头。所有连接完成之后，用透明指甲油密封线结（导电线程由金属丝制成，不易保持紧结）。让指甲油干燥，然后剪掉所有线头。\n"
- fmt: '### Second Conductive Thread Run


    This one goes from the top of saucepan to Ground (`GND`) on the `Gemma`. Use the
    same techniques from the previous run for knotting the conductive thread and sewing
    the connection from the edge of the top layer of the pan to the top of the placket.
    Make this run parallel to the first one, without allowing the conductive thread
    runs to touch each other. Sew down the top of the placket to the `GND` pin on
    the `Gemma`, attach to the pad, and create a knot.


    **Note**: The holes on the `NeoPixel` are smaller than the holes on the `Gemma`.
    Check to see that your needle will pass through them with conductive thread before
    you start the next run.


    ### Third Conductive Thread Run


    This run goes from the `"in"` arrow on the `NeoPixel` to `D2` on the `Gemma`,
    and is a little tricky because it needs to pass under the `Gemma` on the placket.
    Knot the thread, stick the needle up through the `"in"` arrow pin from the wrong
    side of the apron, pull it taut, and stick it down through the fabric very close
    to the pad. Repeat this action two or three times. Using small stitches, create
    a run to the top of the placket above the center of the `Gemma`, making sure it
    does not touch the other runs already created. Sew down to the `Gemma` and under
    it to the bottom `D2` pin. Do not allow the stitches to go through the pocket.
    Attach to the pin and create a knot.


    ### Fourth Conductive Thread Run


    This run connects the `+` on the `NeoPixel` to `Vout` on the `Gemma`. Repeat the
    same process as in the third run, sewing a run to the top of the placket and down
    to the `Vout` pin on the `Gemma`. You do not need to sew underneath the `Gemma`
    for this connection. Attach to the pin and knot the thread.


    ### Fifth Conductive Thread Run


    Finally, you will connect the `–` on the `NeoPixel` to the top layer of the saucepan.
    Attach to the `–` pin and make a short run of thread straight down to the top
    layer of the saucepan. Make sure you only sew through the top layer of conductive
    fabric, not through the felt or bottom layers. Create a knot at the edge of the
    pan.


    ### Finishing It Off


    Draw a swirl of steam onto the apron with tailor’s chalk. Using an embroidery
    needle and white embroidery thread, follow the chalk lines with small, straight
    stitches to create the steam effect. You could also use black embroidery thread
    to create details on the saucepan. However, we were concerned both about making
    spurious connections through the button and also about causing the conductive
    fabric to fray, so we left well enough alone.


    Check your connections to make sure they are tight enough and not touching any
    other connection. Use clear nail polish to secure all the knots and trim any tails
    of conductive thread.


    Put the coin batteries into the holder, plug it into the `Gemma` board, and check
    to see if everything is working. If it isn’t, double-check for any areas of possible
    shorts in the conductive thread runs and the conductive fabric. Push the reset
    button on the `Gemma` (assuming you loaded the code onto it before you sewed it,
    as summarized in the earlier Note in this chapter). Voila! An apron with a timer—nice
    work!


    ## Practicalities


    We built this example around an apron because it is easy to sew and we thought
    it would be fun to show off if you were entertaining. The same circuit will work
    for sports applications where you might want to show a couple of colors for lap
    split times or other timing applications.


    If you really used this as an apron (and therefore would want to wash it a lot),
    you would sew the circuitry onto a placket with snaps or hook and loop attachments
    so you could wash the rest of the apron while keeping the electronics out of it.
    Adafruit says its `Gemma` processor can be washed as long as you remove batteries;
    check your manufacturer’s specs if you use hardware other than that shown here.
    The apron should not get wet when the battery is attached, so you should consider
    it more as something to wear as a conversation piece rather than something to
    wear in the thick of messy cooking.


    This simplistic code will eat a battery faster than is necessary because it never
    goes into any sort of sleep mode. Sleep mode is tricky on a `Gemma` because it
    has a limited ability to handle interrupts (signals that tell it to stop what
    it was doing and resume doing something else).


    `Arduinos` in general are not really computers—they can only do one thing at a
    time, unlike your laptop or desktop, which can be sharing resources across different
    programs at once. `Gemmas` have a particularly difficult time dealing with multitasking,
    for a variety of technical reasons. It would also be interesting to try to add
    more time by pushing the button repeatedly, but that would require filtering out
    spurious button presses (known as debouncing), which is outside the scope of this
    chapter.


    ## Summary


    This chapter walked you through a simple example that used skills from the previous
    chapters on sewing (Chapters [3](#A371637_1_En_3_Chapter.html) and [4](#A371637_1_En_4_Chapter.html)),
    electronics (Chapter [5](#A371637_1_En_5_Chapter.html)), and coding (Chapter [6](#A371637_1_En_6_Chapter.html)).
    The key takeaway is that the order in which you do a project is important. Certainly
    you should do some planning first, but you should also decide in detail what the
    project is going to do, lay out any circuits with alligator clips, and write and
    test the code—in that order.


    Only then should you start cutting fabric, because once you understand what your
    electronics are going to do and how circuits will need to be routed, it is likely
    that you will need to adjust the garment. We talked through all these steps in
    detail for an apron that incorporates a timer which lights a `NeoPixel` one color
    while the timer is running, and another when time is up. This project should give
    you an appreciation of the issues you will need to consider in the upcoming chapters
    covering more complex components and projects.


    # Part III

    Beyond the Basics


    Chapters [8](#A371637_1_En_8_Chapter.html) through [11](#A371637_1_En_11_Chapter.html)
    explore more sophisticated topics than those covered in the earlier chapters.
    Chapter [8](#A371637_1_En_8_Chapter.html) shows you how to use a few different
    types of sensors to make your creation react to its environment, and shows you
    where to go next if you want your project to be able to move on its own.


    Chapter [9](#A371637_1_En_9_Chapter.html) summarizes the 3D-printing process and
    gives pointers on where to learn about it in detail. Chapter [10](#A371637_1_En_10_Chapter.html)
    shows you what can go wrong (and did, for us) when an overly-ambitious first project
    tries to do too much at once.


    Finally, in Chapter [11](#A371637_1_En_11_Chapter.html), you will find two bigger
    projects that come at wearable tech from opposite directions. The first is a big
    sewing project (the dress on the cover) that uses electroluminescent (`EL`) ribbon
    to light up the boundaries between fabric blocks, but requires no coding and minimal
    circuit design. The other project requires more circuit design and a substantial
    piece of code, but minimal sewing. It takes an off-the-shelf hat and adds a sewn
    circuit to make it light up red if you shake your head no and green if you nod
    yes. Thus you can pick a substantial project based on where you feel most secure.'
