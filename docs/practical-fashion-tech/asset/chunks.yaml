- fmt: "# Programming Sewable Boards\n\nThe common Arduino-derived sewable boards\
    \ (like the Flora, Gemma, and Lilypad) work more or less like a basic Arduino.\
    \ In the case of the Gemma and some other smaller boards, there are some tricks\
    \ to uploading code, which we describe shortly.\n\nA bigger difference involves\
    \ the components, which are more sophisticated by and large than their non-sewable\
    \ counterparts. They tend to come with appropriate resistors built-in, for starters.\n\
    \nYou can use non-sewable sensors and the like in a wearable piece by curling\
    \ up the ends of the leads you would have pushed into breadboard holes and sewing\
    \ on the resulting loops. Obviously, you need to think about things like being\
    \ able to remove these non-washable components, but on the other hand they are\
    \ a lot cheaper.\n\nThe NeoPixel sewable LEDs (which we use in later chapters)\
    \ are coming down in price and are good for incredible effects, since both their\
    \ brightness and color (they are really sets of three tiny LEDs, one each of red,\
    \ green, and blue) can be controlled for many pixels using a single digital pin.\
    \ More recent Flora boards have an integral NeoPixel attached to pin 8.\n\n> **Note**\
    \  \n> Getting code onto a Gemma is a little tricky. You need to connect the USB\
    \ cable and press the reset button (a tiny black button on the board). When the\
    \ red light on the board is flashing, you can upload code. If it is not flashing,\
    \ you cannot.\n\nTo use NeoPixels, you must bring in the Adafruit library for\
    \ the NeoPixels. To find it you, will need to select “All” in both pulldown menus\
    \ in the Library Manager (see Figure 6-5). Once you have downloaded the libraries\
    \ and the board definition, click **Tools** > **Board** > **Adafruit Flora**,\
    \ **Port** > **(Flora port)** so your computer will recognize the board. If the\
    \ Flora is not shown as an option, use the Board Manager to find it as described\
    \ in the section “Programming an Arduino.”\n\nWhen you bring in the Adafruit NeoPixel\
    \ libraries, you will get some pretty complicated examples. Listing 6-2 shows\
    \ a simpler one you can play with which is pretty close to the minimum code that\
    \ will change the color of the NeoPixel in a systematic way.\n\nYou change the\
    \ color and brightness by changing the values of `i`, `j`, and `k` in the function\
    \ `pixels.setPixelColor(0, pixels.Color(i, j, k))`. The value of `i` corresponds\
    \ to how bright (from 0 to 255) the red LED should be. The value of `j` sets the\
    \ green, and `k` sets the blue.\n\nAn equal mix of all three colors gives you\
    \ white light. For example, `pixels.setPixelColor(0, pixels.Color(100, 100, 100));`\
    \ will give you white light, whereas `pixels.setPixelColor(0, pixels.Color(0,\
    \ 0, 200));` will give you bright blue light. After each time you use the `pixels.setPixelColor`\
    \ function, you also need to use `pixels.show()` to command the NeoPixel to actually\
    \ display the color you picked.\n\n```cpp\n#define PIN   6\n#define PIXELCOUNT\
    \   1\n#include <Adafruit_NeoPixel.h>\nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT,\
    \ PIN, NEO_GRB + NEO_KHZ800);\nint persist = 50; //keep pixel lit for 50 ms\n\
    void setup() {\n  pixels.begin(); // This initializes the NeoPixel library.\n\
    \  Serial.begin(9600);\n}\nvoid loop() {\n  //Do a test with just one\n  pixels.setPixelColor(0,\
    \ pixels.Color(0,0,200)); //bright blue\n  pixels.show(); // Pushes the value\
    \ just set out to the pixel\n  delay(5000); // Delay for a period of time (in\
    \ milliseconds)\n  for(int i = 0; i < 50; i = i + 5){ //red\n    for(int j = 0;\
    \ j < 50; j = j + 5){ // green\n      for(int k = 0; k < 50; k = k + 5){ // blue\n\
    \        // pixels.Color takes RGB values, from 0,0,0 up to 255, 255, 255\n  \
    \      // Next three lines were for debugging\n        Serial.print(i);\n    \
    \    Serial.print(j);\n        Serial.println(k);\n        pixels.setPixelColor(0,\
    \ pixels.Color(i, j, k));\n        pixels.show(); // Pushes the value just set\
    \ out to the pixel\n        delay(persist); // Delay for a period of time (in\
    \ milliseconds).\n      } // end k\n    } // end j\n  } // end i\n} // end loop\n\
    ```\n**Listing 6-2.** Flora and NeoPixel Example\n\nSimilar code using this same\
    \ function can control a series of NeoPixels. The `0` in the example in Listing\
    \ 6-2 means that you are controlling pixel number 0 (in this case, there is only\
    \ pixel 0). If you had two pixels (as in Listing 6-3), you would have values `pixels.setPixelColor(0,\
    \ pixels.Color(0, 200, 0))` and `pixels.setPixelColor(1, pixels.Color(200, 0,\
    \ 0))`. This would turn the first pixel in the series green (0, 200, 0) and the\
    \ second, blue (0, 0, 200).\n\nThis code is shown in Listing 6-3. Note that every\
    \ NeoPixel needs to be separately connected back to VCC and GND. The signal connections\
    \ are chained one behind the other, so that the in arrow of one connects to the\
    \ out arrow of the previous one.\n\n```cpp\n#define PIN  6\n#define PIXELCOUNT\
    \   2\n#include <Adafruit_NeoPixel.h>\nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT,\
    \ PIN, NEO_GRB + NEO_KHZ800);\nvoid setup() {\n  pixels.begin(); // This initializes\
    \ the NeoPixel library.\n  Serial.begin(9600);\n}\nvoid loop() {\n  // Test using\
    \ two pixels.\n  // The in arrow of pixel 0 should be connected to pin 6\n  //\
    \ The in arrow of pixel 1 should be connected to out arrow of pixel 0\n  pixels.setPixelColor(0,\
    \ pixels.Color(0, 200, 0));  //bright green\n  pixels.show(); // Pushes the value\
    \ just set out to the pixel\n  delay(5000); // Delay for a period of time (in\
    \ milliseconds)\n  pixels.setPixelColor(1, pixels.Color(0, 0, 200));  //bright\
    \ blue\n  pixels.show(); // Pushes the value just set out to the pixel\n  delay(5000);\
    \ // Delay for a period of time (in milliseconds)\n} // end loop\n```\n**Listing\
    \ 6-3.** Driving Two NeoPixels in Series\n\n## Summary\n\nIn this chapter we went\
    \ over how to program a wearable Arduino. We started off by introducing how to\
    \ write computer code in the first place and then discussed programming an Arduino\
    \ in particular. We ended with some ideas on how to program a wearable piece,\
    \ and went over some issues with this type of board.\n\n# Your First Project\n\
    \nCreating a wearable electronics project requires you to juggle several different\
    \ areas of expertise at once. Chapters 3 and 4 focus on sewing techniques, and\
    \ Chapters 5 and 6 introduce electronics and software. This chapter walks you\
    \ through a (relatively!) simple project that you can adapt to a variety of different\
    \ applications and that combines aspects of all those chapters. For the most part,\
    \ Lyn leads you through this chapter, although Joan and Rich chime in some with\
    \ suggestions for circuit design and programming.\n\nIn this chapter you will\
    \ learn how to make an apron with an embedded one-minute timer. It is a relatively\
    \ simple circuit, but it brings up a lot of design issues that you will need to\
    \ think about in general. The one thing we want you to take away from this chapter\
    \ is that planning out the project before you do anything is the key to success.\
    \ In Chapter 10 (after we teach you about sensors and 3D printing) we talk you\
    \ through an overly ambitious first wearable project that we just jumped into\
    \ without planning very much ahead of time. This chapter is the sober, more realistic\
    \ version of a first project, designed knowing what we know now."
  raw: "## Programming Sewable Boards\n\nThe common Arduino-derived sewable boards\
    \ (like the Flora, Gemma, and Lilypad) work more or less like a basic Arduino.\
    \ In the case of the Gemma and some other smaller boards, there are some tricks\
    \ to uploading code, which we describe shortly.\n\nA bigger difference involves\
    \ the components, which are more sophisticated by and large than their non-sewable\
    \ counterparts. They tend to come with appropriate resistors built-in, for starters.\n\
    \nYou can use non-sewable sensors and the like in a wearable piece by curling\
    \ up the ends of the leads you would have pushed into breadboard holes and sewing\
    \ on the resulting loops. Obviously, you need to think about things like being\
    \ able to remove these non-washable components, but on the other hand they are\
    \ a lot cheaper.\n\nThe NeoPixel sewable LEDs (which we use in later chapters)\
    \ are coming down in price and are good for incredible effects, since both their\
    \ brightness and color (they are really sets of three tiny LEDs, one each of red,\
    \ green, and blue) can be controlled for many pixels using a single digital pin.\
    \ More recent Flora boards have an integral NeoPixel attached to pin 8.\n\nNote\n\
    \nGetting code onto a Gemma is a little tricky. You need to connect the USB cable\
    \ and press the reset button (a tiny black button on the board). When the red\
    \ light on the board is flashing, you can upload code. If it is not flashing,\
    \ you cannot.\n\nTo use NeoPixels, you must bring in the Adafruit library for\
    \ the NeoPixels. To find it you, will need to select “All” in both pulldown menus\
    \ in the Library Manager (see Figure [6-5](#A371637_1_En_6_Chapter.html#Fig5)).\
    \ Once you have downloaded the libraries and the board definition, click Tools\
    \ ➤ Board ➤ Adafruit Flora, Port ➤ (Flora port) so your computer will recognize\
    \ the board. If the Flora is not shown as an option, use the Board Manager to\
    \ find it as described in the section “Programming an Arduino.”\n\nWhen you bring\
    \ in the Adafruit NeoPixel libraries, you will get some pretty complicated examples.\
    \ Listing [6-2](#A371637_1_En_6_Chapter.html#Par117) shows a simpler one you can\
    \ play with which is pretty close to the minimum code that will change the color\
    \ of the NeoPixel in a systematic way.\n\nYou change the color and brightness\
    \ by changing the values of `i, j,` and `k` in the function `pixels.setPixelColor(0,\
    \ pixels.Color(i, j, k))`. The value of `i` corresponds to how bright (from 0\
    \ to 255) the red LED should be. The value of `j` sets the green, and `k` sets\
    \ the blue.\n\nAn equal mix of all three colors gives you white light. For example,\
    \ `pixels.setPixelColor(0, pixels.Color(100,100,100);` will give you white light,\
    \ whereas `pixels.setPixelColor(0, pixels.Color(0,0,200);` will give you bright\
    \ blue light. After each time you use the `pixels.setPixelColor` function, you\
    \ also need to use `pixels.show()` to command the NeoPixel to actually display\
    \ the color you picked.\n\n```\n#define PIN   6\n#define PIXELCOUNT   1\n#include\
    \ \nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT, PIN, NEO_GRB + NEO_KHZ800);\n\
    int persist = 50; //keep pixel lit for 50 ms\nvoid setup() {\npixels.begin();\
    \ // This initializes the NeoPixel library.\nSerial.begin(9600);\n}\nvoid loop()\
    \ {\n//Do a test with just one\npixels.setPixelColor(0, pixels.Color(0,0,200));\
    \ //bright blue\npixels.show(); // Pushes the value just set out to the pixel\n\
    delay(5000); // Delay for a period of time (in milliseconds)\nfor(int i = 0; i\
    \ < 50; i = i + 5){ //red\nfor(int j = 0; j < 50;j = j + 5){ // green\nfor(int\
    \ k = 0;k < 50; k = k + 5){// blue\n// pixels.Color takes RGB values, from 0,0,0\
    \ up to 255, 255, 255\n// Next three lines were for debugging\nSerial.print(i);\n\
    Serial.print(j);\nSerial.println(k);\npixels.setPixelColor(0, pixels.Color(i,\
    \ j, k));\npixels.show(); // Pushes the value just set out to the pixel\ndelay(persist);\
    \ // Delay for a period of time (in milliseconds).\n} // end k\n}// end j\n}//\
    \ end i\n}// end loop\nListing 6-2.\nFlora and NeoPixel Example\n```\n\nSimilar\
    \ code using this same function can control a series of NeoPixels. The `0` in\
    \ the example in Listing [6-2](#A371637_1_En_6_Chapter.html#Par117) means that\
    \ you are controlling pixel number 0 (in this case, there is only pixel 0). If\
    \ you had two pixels (as in Listing [6-3](#A371637_1_En_6_Chapter.html#Par120)),\
    \ you would have values `pixels.setPixelColor(0`, `pixels.Color(0, 200, 0))`,\
    \ and `pixels.setPixelColor(1, pixels.Color(200, 0, 0))` would turn the first\
    \ pixel in the series green (0, 200, 0) and the second, blue (0, 0, 200).\n\n\
    This code is shown in Listing [6-3](#A371637_1_En_6_Chapter.html#Par120). Note\
    \ that every NeoPixel needs to be separately connected back to VCC and GND. The\
    \ signal connections are chained one behind the other, so that the in arrow of\
    \ one connects to the out arrow of the previous one.\n\n```\n#define PIN  6\n\
    #define PIXELCOUNT   2\n#include \nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT,\
    \ PIN, NEO_GRB + NEO_KHZ800);\nvoid setup() {\npixels.begin(); // This initializes\
    \ the NeoPixel library.\nSerial.begin(9600);\n}\nvoid loop() {\n// Test using\
    \ two pixels.\n// The in arrow of pixel 0 should be connected to pin 6\n// The\
    \ in arrow of pixel 1 should be connected to out arrow of pixel 0\npixels.setPixelColor(0,\
    \ pixels.Color(0, 200, 0));  //bright green\npixels.show(); // Pushes the value\
    \ just set out to the pixel\ndelay(5000); // Delay for a period of time (in milliseconds)\n\
    pixels.setPixelColor(1, pixels.Color(0, 0, 200));  //bright blue\npixels.show();\
    \ // Pushes the value just set out to the pixel\ndelay(5000); // Delay for a period\
    \ of time (in milliseconds)\n}// end loop\nListing 6-3.\nDriving Two NeoPixels\
    \ in Series\n```\n\n## Summary\n\nIn this chapter we went over how to program\
    \ a wearable Arduino. We started off by\n\nintroducing how to write computer code\
    \ in the first place and then discussed programming an Arduino in particular.\
    \ We ended with some ideas on how to program a wearable piece, and went over some\
    \ issues with this type of board.\n\n# 7. Your First Project\n\nCreating a wearable\
    \ electronics project requires you to juggle several different areas of expertise\
    \ at once. Chapters [3](#A371637_1_En_3_Chapter.html) and [4](#A371637_1_En_4_Chapter.html)\
    \ focus on sewing techniques, and Chapters [5](#A371637_1_En_5_Chapter.html) and\
    \ [6](#A371637_1_En_6_Chapter.html) introduce electronics and software. This chapter\
    \ walks you through a (relatively!) simple project that you can adapt to a variety\
    \ of different applications and that combines aspects of all those chapters. For\
    \ the most part, Lyn leads you through this chapter, although Joan and Rich chime\
    \ in some with suggestions for circuit design and programming.\n\nIn this chapter\
    \ you will learn how to make an apron with an embedded one-minute timer. It is\
    \ a relatively simple circuit, but it brings up a lot of design issues that you\
    \ will need to think about in general. The one thing we want you to take away\
    \ from this chapter is that planning out the project before you do anything is\
    \ the key to success. In Chapter [10](#A371637_1_En_10_Chapter.html) (after we\
    \ teach you about sensors and 3D printing) we talk you through an overly ambitious\
    \ first wearable project that we just jumped into without planning very much ahead\
    \ of time. This chapter is the sober, more realistic version of a first project,\
    \ designed knowing what we know now."
  trans: "\n# 可缝纫开发板编程\n\n常见的 Arduino 衍生可缝纫开发板（如 Flora、Gemma 和 Lilypad）的工作方式与基础 Arduino\
    \ 大同小异。对于 Gemma 及部分更小型开发板，上传代码有一些特殊技巧，我们稍后会进行说明。\n\n更大的差异在于元件方面：总体而言，这些可缝纫元件比其非缝纫版本更为精密。首先，它们通常会内置合适的电阻。\n\
    \n你可以在可穿戴作品中继续使用非缝纫类传感器等元件，只需将原本要插入面包板的引线末端卷成环状，然后将这些环缝在织物上即可。显然，你需要考虑如何拆卸这些不可水洗的元件，但另一方面，它们的价格要便宜得多。\n\
    \n我们将在后续章节中使用的 NeoPixel 可缝纫 LED 价格正在下降，并且能实现令人惊叹的效果——因为其亮度和颜色（实际上它们是由三个微小的 LED\
    \ 组成，分别对应红、绿、蓝三种颜色）都能通过单个数字引脚进行控制，从而驱动众多像素。较新的 Flora 开发板在引脚 8 上集成了一个 NeoPixel。\n\
    \n> **注意**  \n> 将代码上传到 Gemma 有点复杂。你需要连接 USB 线，然后按下重置按钮（开发板上一个微小的黑色按钮）。当开发板上的红灯闪烁时，你就可以上传代码了。如果红灯不闪，则无法上传。\n\
    \n要使用 NeoPixel，你必须引入 Adafruit 的 NeoPixel 库。要找到该库，你需要在库管理器（见图 6-5）的两个下拉菜单中都选择“全部”。下载完库文件和开发板定义后，点击\
    \ **工具** > **开发板** > **Adafruit Flora**，**端口** > **（Flora 端口）**，这样你的电脑就能识别该开发板了。如果\
    \ Flora 没有作为选项出现，请使用“开发板管理器”查找它，方法如“编程 Arduino”一节所述。\n\n当你引入 Adafruit NeoPixel\
    \ 库后，会得到一些非常复杂的示例。清单 6-2 展示了一个更简单的示例供你尝试，它非常接近能系统性改变 NeoPixel 颜色的最小化代码。\n\n你可以通过修改函数\
    \ `pixels.setPixelColor(0, pixels.Color(i, j, k))` 中 `i`、`j` 和 `k` 的值来改变颜色和亮度。`i`\
    \ 的值对应红色 LED 的亮度（范围 0 到 255）。`j` 的值设置绿色，`k` 的值设置蓝色。\n\n三种颜色等量混合会得到白光。例如，`pixels.setPixelColor(0,\
    \ pixels.Color(100, 100, 100));` 会产生白光，而 `pixels.setPixelColor(0, pixels.Color(0,\
    \ 0, 200));` 会产生亮蓝色光。每次使用完 `pixels.setPixelColor` 函数后，你还需要使用 `pixels.show()` 来命令\
    \ NeoPixel 实际显示你选择的颜色。\n\n```cpp\n#define PIN   6\n#define PIXELCOUNT   1\n#include\
    \ <Adafruit_NeoPixel.h>\nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT,\
    \ PIN, NEO_GRB + NEO_KHZ800);\nint persist = 50; //像素点亮持续 50 毫秒\nvoid setup()\
    \ {\n  pixels.begin(); // 初始化 NeoPixel 库。\n  Serial.begin(9600);\n}\nvoid loop()\
    \ {\n  // 用单个像素进行测试\n  pixels.setPixelColor(0, pixels.Color(0,0,200)); //亮蓝色\n\
    \  pixels.show(); // 将刚刚设置的值推送到像素上\n  delay(5000); // 延时一段时间（单位毫秒）\n  for(int\
    \ i = 0; i < 50; i = i + 5){ //红色\n    for(int j = 0; j < 50; j = j + 5){ // 绿色\n\
    \      for(int k = 0; k < 50; k = k + 5){ // 蓝色\n        // pixels.Color 接收 RGB\
    \ 值，范围从 0,0,0 到 255,255,255\n        // 接下来三行用于调试\n        Serial.print(i);\n\
    \        Serial.print(j);\n        Serial.println(k);\n        pixels.setPixelColor(0,\
    \ pixels.Color(i, j, k));\n        pixels.show(); // 将刚刚设置的值推送到像素上\n        delay(persist);\
    \ // 延时一段时间（单位毫秒）。\n      } // k 循环结束\n    } // j 循环结束\n  } // i 循环结束\n} // loop\
    \ 结束\n```\n**清单 6-2.** Flora 与 NeoPixel 示例\n\n使用相同函数的类似代码可以控制一系列 NeoPixel。清单 6-2\
    \ 示例中的 `0` 表示你在控制第 0 号像素（本例中只有像素 0）。如果你有两个像素（如清单 6-3 所示），你将使用 `pixels.setPixelColor(0,\
    \ pixels.Color(0, 200, 0))` 和 `pixels.setPixelColor(1, pixels.Color(200, 0, 0))`。这会将系列中的第一个像素变为绿色\
    \ (0, 200, 0)，第二个像素变为蓝色 (200, 0, 0)。\n\n此代码如清单 6-3 所示。注意每个 NeoPixel 都需要单独连接回 VCC\
    \ 和 GND。信号连接采用链式结构，一个像素的输入箭头连接到前一个像素的输出箭头。\n\n```cpp\n#define PIN  6\n#define\
    \ PIXELCOUNT   2\n#include <Adafruit_NeoPixel.h>\nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT,\
    \ PIN, NEO_GRB + NEO_KHZ800);\nvoid setup() {\n  pixels.begin(); // 初始化 NeoPixel\
    \ 库。\n  Serial.begin(9600);\n}\nvoid loop() {\n  // 使用两个像素进行测试。\n  // 像素 0 的输入箭头应连接到引脚\
    \ 6\n  // 像素 1 的输入箭头应连接到像素 0 的输出箭头\n  pixels.setPixelColor(0, pixels.Color(0,\
    \ 200, 0));  //亮绿色\n  pixels.show(); // 将刚刚设置的值推送到像素上\n  delay(5000); // 延时一段时间（单位毫秒）\n\
    \  pixels.setPixelColor(1, pixels.Color(0, 0, 200));  //亮蓝色\n  pixels.show();\
    \ // 将刚刚设置的值推送到像素上\n  delay(5000); // 延时一段时间（单位毫秒）\n} // loop 结束\n```\n**清单 6-3.**\
    \ 驱动两个串联的 NeoPixel\n\n## 本章小结\n\n本章我们讨论了如何对可穿戴 Arduino 进行编程。我们首先介绍了如何从头编写计算机代码，然后具体讨论了如何对\
    \ Arduino 进行编程。最后，我们提出了一些关于如何编程可穿戴作品的思路，并讨论了此类开发板存在的一些问题。\n\n# 你的第一个项目\n\n创建一个可穿戴电子项目需要你同时协调多个专业领域。第\
    \ 3 章和第 4 章侧重于缝纫技术，第 5 章和第 6 章介绍了电子和软件。本章将引导你完成一个（相对！）简单的项目，该项目可以适配多种不同的应用，并且整合了上述所有章节的内容。在大多数情况下，本章由\
    \ Lyn 带领你完成，不过 Joan 和 Rich 也会就电路设计和编程提出一些建议。\n\n在本章中，你将学习如何制作一个带有嵌入式一分钟计时器的围裙。这是一个相对简单的电路，但它会引发许多你在一般情况下需要考虑的设计问题。我们最希望你从本章中学到的是：在动手之前规划好项目是成功的关键。在第\
    \ 10 章（在我们教你传感器和 3D 打印之后）中，我们将会带你回顾一个过于雄心勃勃的第一个可穿戴项目，当时我们事先没有做太多规划就贸然开始了。而本章是第一个项目的冷静、更现实的版本，其设计基于我们现已掌握的经验教训。\n"
- fmt: "# The Egg-Timer Apron\n\nYou are holding a party for friends and want to keep\
    \ track of things you have cooking in the kitchen. Wouldn’t it be nice to have\
    \ something you could just tap lightly to time something for one minute? For our\
    \ simple example we will create an apron with a built-in timer. When you tap a\
    \ bit of conductive cloth, a NeoPixel will turn red while the timer is running,\
    \ then turn green for a period of time you specify once the time is elapsed, and\
    \ then turn off. The whole thing is controlled by an Adafruit Gemma processor,\
    \ which is something of a stripped-down Arduino (see Chapter [5](#A371637_1_En_5_Chapter.html)\
    \ for details) powered by two coin cell batteries. Figure [7-1](#A371637_1_En_7_Chapter.html#Fig1)\
    \ is what the apron looks like when it is done, with the Gemma and its battery\
    \ in their protective pocket.\n\n![A371637_1_En_7_Fig1_HTML.jpg](A371637_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. The completed egg-timer apron\n\nThe saucepan on the apron is made\
    \ of three layers: a top layer of conductive fabric, a middle layer made of felt\
    \ with a hole in the middle, and a bottom layer also of conductive fabric. When\
    \ you press on the top layer, it connects to the bottom layer through the hole\
    \ in the felt. This allows for a very imprecise ability to start the timer with\
    \ your wrist or anything dry. (Note that the apron should not get wet while you\
    \ have it turned on.)\n\nFor this project, you will need the following materials\
    \ and tools:\n\n* 1 to 1.5 yards of light to medium weight cotton fabric\n* Spool\
    \ of thread and bobbin\n* Paper for pattern and/or tailor’s chalk\n* Scissors\n\
    * Measuring tape\n* Cotton webbing for ties (optional)\n* Bias tape (optional)\n\
    * Embroidery needle\n* White and black embroidery thread\n* Small piece of felt\n\
    * Gemma microprocessor\n* NeoPixel LED\n* Conductive fabric\n* Conductive thread\n\
    * Two (3-volt) coin cell batteries\n* Battery holder (designed for two coin cell\
    \ batteries)\n* Five alligator clip leads (for testing purposes)\n\n> **Note**\
    \  \n> This chapter runs through a simple way of doing this project. In Chapter\
    \ [11](#A371637_1_En_11_Chapter.html) we talk about several projects and give\
    \ you some tips about ways to make this project power efficient. We focus the\
    \ implementation here on being easy to create, debug, and understand. However,\
    \ this project will use up batteries pretty quickly unless you disconnect them\
    \ (we guess a couple of days, depending on how often you push the button).\n\n\
    ## Planning the Project\n\nThe temptation with a wearable project is to just start\
    \ sewing something. However, it is best to resist that impulse and first figure\
    \ out what you want your control circuit to do. Then you can lay out the circuit,\
    \ first with Fritzing (see Chapter [5](#A371637_1_En_5_Chapter.html)) and then\
    \ with alligator clips, and write the code.\n\nWe suggest doing all that before\
    \ you start sewing, in case you realize you need another component (and a place\
    \ to attach it) or realize the circuit is going to need to be laid out in a particular\
    \ way that might be more convenient when the garment is not assembled yet.\n\n\
    > **Tip**  \n> Joan and Lyn both find it a lot easier to visualize where the circuits\
    \ will go with an alligator clip version of the circuit than with a Fritzing diagram,\
    \ even if the clipped circuit can be a little unwieldy sometimes. Rich does not\
    \ agree, so these things are a matter of style and visualization skills. You will\
    \ develop your own path with experience.\n\nBecause this was going to be used\
    \ in an environment where we would want to protect the Gemma, we decided to hold\
    \ the Gemma and its connections on a little tab that could slide into a pocket,\
    \ along with the batteries. The “saucepan button” required some careful design\
    \ to make it easy to push but hard to push accidentally.\n\n## Control Design\
    \ and Software\n\nIn this case, we wanted the circuit to do nothing as long as\
    \ the timer had not been started. Once the timer is started, the NeoPixel glows\
    \ red. When the timer has finished, the NeoPixel glows green for a second amount\
    \ of time. Both amounts of time are specified at the top of the code in `#define`\
    \ statements. If you wanted to have the circuit do more—maybe cycle through several\
    \ colors for different amounts of time—you could add more calls to the two Adafruit\
    \ library functions (see Chapter [6](#A371637_1_En_6_Chapter.html)):\n\n```\n\
    pixels.setPixelColor(0, pixels.Color(r, g, b));\npixels.show();\n```\n\n`r`, `g`,\
    \ and `b` are numbers between 0 and 255 that determine how bright a red, green,\
    \ or blue pixel illumination you want. Note that the relative brightness of these\
    \ three primary colors determines the hue of the resulting color. The entire Gemma\
    \ sketch is shown in Listing [7-1](#A371637_1_En_7_Chapter.html#Par32).\n\n> **Note**\
    \  \n> Listing [7-1](#A371637_1_En_7_Chapter.html#Par32) has the timer set to\
    \ run for just one second and then leaves the NeoPixel on for two seconds. We\
    \ suggest you leave it that way for the debugging process and then make it whatever\
    \ value you want (a minute would be 60,000 milliseconds). `TIMER_DELAY` is the\
    \ length of the timer countdown (during which the NeoPixel is red) in milliseconds;\
    \ `PERSISTENCE_DELAY` is the amount of time that the NeoPixel stays green after\
    \ the timer is done.\n\n```\n// Program to turn on a neopixel red when a button\
    \ is pushed\n// And then green after a specified delay passes\n// And finally\
    \ turns off after a second specified delay\n#include <Adafruit_NeoPixel.h>\n#define\
    \ NEOPIXEL_PIN 2 // pin controlling the Neopixel\n#define BUTTON_PIN 1 // pin\
    \ reading the state of the button\n#define TIMER_DELAY 1000\n// in milliseconds\
    \ - one second for the demo\n#define PERSISTENCE_DELAY 2000\n//time to wait before\
    \ turning off, in milliseconds\nAdafruit_NeoPixel pixels =\nAdafruit_NeoPixel(1,\
    \ NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800);\n/*\nLast parameter depends on the neopixel\
    \ version you have\nSee https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library\n\
    Remember for Gemma you need to push reset button\nto load in your program (no\
    \ loading after red light stops flashing)\n*/\nvoid setup() {\npixels.begin();\n\
    pinMode(BUTTON_PIN, INPUT);\ndigitalWrite(BUTTON_PIN, HIGH);\n/*\nBUTTON_PIN is\
    \ set to INPUT with the\ninternal pull-up enabled and is\nconnected to the first\
    \ layer of the button (one closest to apron fabric).\nWhen the button is pressed,\n\
    this pin is connected to GND and goes LOW,\nand the circult begins its countdown.\n\
    Here we use pin D1 which will light up the red LED\nwhen D1 is HIGH (the button\
    \ is NOT pushed)\n*/\n} // end setup\nvoid loop() {\nif (digitalRead(BUTTON_PIN)\
    \ == LOW) {\npixels.setPixelColor(0, pixels.Color(0, 150, 0));\npixels.show();\n\
    // first have red light while timer is counting down\n// this lets you know button\
    \ was pushed and the timer is running\ndelay(TIMER_DELAY);\npixels.setPixelColor(0,\
    \ pixels.Color(150, 0, 0));\npixels.show();\ndelay(PERSISTENCE_DELAY);\n// turn\
    \ green after timer is done\n//and stay green for PERSISTENCE_DELAY seconds\n\
    } else {\npixels.setPixelColor(0, pixels.Color(0, 0, 0));\npixels.show();\n//\
    \ pixels turned off\n}\n} // end loop\n```\n\nListing 7-1. Apron Program"
