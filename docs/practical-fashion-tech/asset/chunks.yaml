- fmt: '# 4. Making and Using Sewing Patterns


    This chapter talks you through the ins and outs of sewing patterns. This is Lyn
    writing again, now taking you into using the stitches and techniques introduced
    in Chapter [3](#A371637_1_En_3_Chapter.html).


    The first time you use a standard sewing pattern, it is important to read and
    follow the instructions that come with it, and to understand and follow the markings
    printed on the pattern pieces. As with a new cooking recipe, it is best to read
    the steps through to the end before beginning your work. Commercial patterns come
    printed on tissue paper and stuffed into an envelope. A pattern envelope is like
    a magic hat full of scarves in that it seems like you keep pulling out piece after
    piece—so many that they could not possibly have fit in that small envelope. I
    can never seem to get all the pieces back in neatly after using the pattern.


    There is usually a section in the instructions explaining fabric cutting layouts
    and symbols. Again, like a recipe, once you understand the steps, you can adjust
    and/or alter them to suit your style and abilities. Pinning all the pattern pieces
    you will need onto the fabric first and double-checking all directions and symbols
    before cutting will help prevent some mistakes.


    You can cut out the smaller pieces first in order to make sure you are cutting
    on the correct lines and cutting out the proper notches. Those are easier to recut
    if you make a mistake, and you will not waste a large piece of fabric.


    In this chapter we will create a simple, unlined vest (Figure [4-1](#A371637_1_En_4_Chapter.html#Fig1)).
    It does not require a lot of fabric and has a basic shape that is fairly easy
    to sew and finish. It is possible to sew the entire vest by hand, but sewing seams
    with a machine is much quicker. You may want to hem the vest by hand if you need
    some more practice hand sewing.


    ![A371637_1_En_4_Fig1_HTML.jpg](A371637_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. The finished version of the vest we will create in this chapter


    ## Measuring


    The first step in using or creating a pattern is to decide what it is you are
    going to make. After that you will need to measure the person who will wear it
    (if it is clothing), the piece of furniture it will cover, or whatever else it
    needs to fit. In the case of a person, use a fabric measuring tape because it
    is flexible and will go around the curves of a body. Here are some tips on how
    to measure various body dimensions:


    - Bust (female): Wrap the tape around the bust and back at the nipple line. Make
    sure it is even all the way around the body. If you are measuring yourself, a
    mirror is handy.

    - Chest (male): Wrap the tape around the front and back directly underneath the
    nipple, making sure it is even all the way around the body.

    - Waist: Use the narrowest place on the torso and wrap the tape around the body
    about an inch above the navel. Make sure it is even all the way around. Note that
    this may not be where you wear your pants or skirts. Today’s styles are worn much
    lower than the traditional waistline. But this is where the waist measurement
    is taken regardless of the style.

    - Hips: Use the fullest part of the buttocks and wrap the tape around the front
    and back. Make sure it is even all the way around.

    - Crotch: Hold the end of the measuring tape at the navel; pull the tape between
    the legs and up to the back even with the navel.

    - Thighs: Wrap the tape around the fullest part of the thigh, keeping it even.

    - Calves: Wrap the tape around the fullest part of the calf, keeping it even.

    - Upper arm: Wrap around the fullest part of the bicep.

    - Wrist: Wrap around the wrist bones.

    - Length of arm: Holding the arm straight out to the side, place the end of the
    tape at the front of the armpit, hold it there, and measure to the wrist.

    - Center front (torso): Hold the end of the tape at the notch between the clavicles
    (top of the sternum), and measure down to the navel.

    - Center back (torso): Hold the end of the tape on the spine, just below the neck,
    and measure down to the level of the navel on the back.


    Note: If you prefer, you can also measure with string. To do this, wrap a piece
    of string or ribbon around the part you are measuring, hold onto or mark the place,
    and then measure the string with a ruler or yardstick. Some people have also used
    tape (layered on over an old t-shirt or plastic wrap, then the whole thing cut
    off) to create a custom dress form. None of the authors has tried the latter process,
    but you can find descriptions and pictures of it online.


    ## Choosing a Pattern


    If this were a class just in learning how to sew, I would probably not talk about
    making a pattern from scratch. However, in a wearable tech project, it is more
    likely that you will be using a mix of fabric, 3D-printed pieces, and electronics
    and so will need to make your own pattern or modify an existing one. I will deconstruct
    how patterns work here so that you can make a choice about whether you buy or
    make a pattern for your project.


    ### Buying a Pattern


    Sewing patterns are available online, in fabric stores, and on many websites such
    as [`www.mccall.com`](http://www.mccall.com), `sewingpatterns.com`, [`www.craftsy.com`](http://www.craftsy.com),
    and `Etsy.com`. Joann Fabrics ([`www.joann.com`](http://www.joann.com)) is a national
    store in the United States and has an online store as well. There may be local
    fabric stores in your area that stock patterns.


    Note: By and large, patterns are still sold as physical envelopes full of tissue
    paper (as opposed to being made available for download) because of the practical
    issues of printing out a person-sized pattern on many pieces of taped-together
    paper. Unfortunately, this means that it is difficult to get an electronic pattern
    suitable for laser cutting, if you wanted to use a laser cutter to cut out your
    fabric. I talk about ways around that later in this chapter.


    Most patterns have a level of difficulty labeled on the pattern envelope. Choosing
    a basic or beginner level pattern is best for a first project. By choosing a basic
    pattern you will learn terminology and basic skills without the frustration of
    complicated techniques and instructions. Patterns are printed with a cutting line
    and a 5/8-inch (1.6 cm) sewing margin or seam allowance line. Make sure you understand
    which is which, or your completed project will not fit properly (Figure [4-2](#A371637_1_En_4_Chapter.html#Fig2)).
    Note that in Chapter [3](#A371637_1_En_3_Chapter.html) and other places where
    I created a pattern from scratch, I used 1-inch margins just to give more room
    for error. Printed patterns usually have 5/8 inch though.


    ![A371637_1_En_4_Fig2_HTML.jpg](A371637_1_En_4_Fig2_HTML.jpg)


    Figure 4-2. Sewing and cutting lines on a purchased pattern


    Commercial patterns usually are made so that several sizes of garment can be made
    from the same pattern. Different lines on the pattern (Figure [4-3](#A371637_1_En_4_Chapter.html#Fig3))
    show where you would cut for several different sizes. In this case, the pattern
    covers sizes 6 through 10.


    ![A371637_1_En_4_Fig3_HTML.jpg](A371637_1_En_4_Fig3_HTML.jpg)


    Figure 4-3. Sizing lines


    Tip: You may want to cut the pattern pieces out in the size you will be using
    before you pin it to the fabric. This can help eliminate the chance that you will
    cut on the wrong lines and have a resulting garment that will not fit.'
