    \ 10000.0f, 10000.0f);\nSerial.print(\"Temperature in degrees F = \\t\");\nSerial.println(sensorData);\n\
    Serial.println();\ndelay(500);\n//turn on LED if the temperature data is between\
    \ 50 and 75\nif (sensorData > 50 && sensorData < 75) digitalWrite(LEDPIN, HIGH);\n\
    else digitalWrite(LEDPIN, LOW);\n}// end loop\nListing 8-1.\nThermistor\n```\n\
    \n## Photodiode: Night Light Example\n\nA photodiode creates a current when light\
    \ shines on it, making it essentially an LED (see Chapter [5](#A371637_1_En_5_Chapter.html))\
    \ acting in reverse. Reading this current is a little trickier than reading a\
    \ resistance, but it can be done with a simpler circuit.\n\nTo figure out how\
    \ to use a photodiode, searching online for “photodiode Arduino” is a good place\
    \ to start. You will find a few examples, mostly pointing out that really, a photodiode\
    \ is just an LED that you are sort of running backwards. Instead of running current\
    \ through it to make it light up, you light it up and a small amount of current\
    \ will run in the opposite direction than an LED would.\n\nMany of these examples\
    \ involve using a transistor (a component that can amplify a signal) to amplify\
    \ the output. This would be a difficult circuit to build with conductive thread,\
    \ so we are going to use a simpler solution. A photodiode has an internal capacitance\
    \ (ability to hold a small charge). If we charge up this capacitance by putting\
    \ a reverse voltage across the LED, then the current created by the photodiode\
    \ will discharge the capacitor. If we slow down this discharge with a resistor,\
    \ we can measure the speed (by sampling voltage after a set time or by measuring\
    \ the time before it reaches a set voltage) to find out how much light the photodiode\
    \ is seeing."
  trans: "\n# 使用热敏电阻\n\n在搜索引擎中搜索“thermistor”和“Arduino”，会跳转到一个非常有用的网站[`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)。该网站告诉我们，热敏电阻的电路就是一个分压器（第\
    \ 5 章）。我们将热敏电阻与另一个 10 kΩ 电阻串联，组成一个分压器，如图 8-2 的电路图所示，以及图 8-3 的电路实物照片所示。\n\n![A371637_1_En_8_Fig3_HTML.jpg](img/A371637_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3. 实际的热敏电阻电路\n\n![A371637_1_En_8_Fig2_HTML.jpg](img/A371637_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2. 热敏电阻电路的 Fritzing 连线图\n\n在刚才提到的 Arduino Playground 网站上，我们了解到热敏电阻的阻值由 Steinhart-Hart\
    \ 方程（[`https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation`](https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation)）定义，该方程使用三个标准参数，将电阻值转换为温度：\n\
    \n*   B，以开尔文温度 K 为单位（在此例中为 3950 K）\n*   基准温度（以开尔文温度为单位，即相对于绝对零度的温度——通常基准温度为 25\
    \ 摄氏度，即 25 + 273.15 = 298.15 K）\n*   传感器在该温度下的电阻值（即热敏电阻的标称电阻，此处为 10 kΩ）。\n\n本例中，我们还添加了一个\
    \ LED，当热敏电阻报告的温度在指定范围内时，该 LED 会点亮。图 8-3 中的电路由一个 330 Ω 电阻和一个红色 LED 串联组成。红色 LED\
    \ 电路连接到 9 号引脚和地线。当 9 号引脚为 `HIGH` 时，LED 将点亮。\n\n分压器（参见第 5 章）的电压值在 10 kΩ 参考电阻和热敏电阻之间读取。其电压值从两者之间的节点引出，作为输入发送到\
    \ Arduino 的 `A0` 引脚。这是一个示例，展示了如何设置一个传感器，从而点亮一盏灯或让 Arduino 执行其他操作。请注意，传感器输出到模拟引脚，这是获取引脚上除\
    \ `LOW` 和 `HIGH` 之外的其他值所必需的。\n\n我们希望从这个传感器中获取实际的温度值，而不仅仅是一个相对数值，因此正确进行实际转换至关重要。对于其他类型的传感器，我们可能只关心某个值相对于某个任意值的范围（例如房间内的光照水平，或者传感器在过去一分钟内的平均值），因此可能无需计算特定单位的精确值。\n\
    \n# 与热敏电阻交互的 Arduino 程序\n\n现在我们知道了如何连接电路，我们可以采用两种方式。我们可以进入 Arduino IDE（参见第 6 章），查看是否能找到一个已经创建好此\
    \ Arduino 程序的库。我们可以通过以下步骤操作：点击 程序 菜单 ➤ 包含库 ➤ 管理库，然后按照第 6 章所述搜索“thermistor”。\n\n\
    如果找到了相关内容，您可以选择安装该库。如果出现多个选项，您可以先点击“More info”链接，看看哪个更符合您的需求，或者查看它的 ReadMe 文件（如果有的话）。大多数情况下，这些“More\
    \ info”链接会跳转到一个 GitHub 仓库，这是一种常见的共享 Arduino 程序的开源方式。Joan 喜欢详细查看此类内容的源代码，因此通常会选择那些在处理过程中看起来最透明的库。\n\
    \n当您安装库时，如果顺利的话，它也会安装一些示例程序。要确认是否如此，请在安装库后，点击 文件 ➤ 示例。\n\n这听起来可能都不错，但您可能会发现找不到与您的特定开发板和传感器硬件相匹配的库。在本例中，我们又回到了最初的那个网站\
    \ [`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)。该页面提供了几个示例。我们决定尝试最后一个，因为它清晰地说明了其假设条件，并且通过对照描述该方程的维基百科页面进行交叉验证，很容易检查这些假设是否正确；我们感谢该页面的作者免费发布了他的\
    \ Arduino 程序。\n\n清单 8-1 展示了这个 Arduino 程序，其中增加了一段代码，用于在温度处于给定范围内时点亮电路中的 LED。\n\n\
    ```\n// 一个程序，如果连接在 THERMPIN 引脚的热敏电阻\n// 测得的温度在指定范围内，则点亮连接到 LEDPIN 引脚的 LED\n//\
    \ 热敏电阻校准数据来自\n// playground.arduino.cc/ComponentLib/Thermistor2\n// 已修改，使其更具通用性并增加了输出功能\n\
    #include <math.h>\n#define THERMPIN A0\n#define LEDPIN 9\n// 列举三种主要的温度单位\nenum\
    \ {\n  T_KELVIN=0,\n  T_CELSIUS,\n  T_FAHRENHEIT\n};\n// 温度函数输出浮点数，即实际温度\n// 温度函数输入参数：\n\
    // 1. AnalogInputNumber - 要读取的模拟输入引脚\n// 2. OuputUnit - 输出单位：摄氏度、开尔文或华氏度\n// 3.\
    \ Thermistor B parameter - 热敏电阻 B 参数（来自数据手册）\n// 4. Manufacturer T0 parameter\
    \ - 制造商提供的 T0 参数（开尔文，来自数据手册）\n// 5. Manufacturer R0 parameter - 制造商提供的 R0 参数（欧姆，来自数据手册）\n\
    // 6. Your balance resistor resistance in ohms - 您的平衡电阻阻值（欧姆）\nfloat Temperature(int\
    \ AnalogInputNumber, int OutputUnit, float B,\n  float T0, float R0, float R_Balance)\
    \ {\n  float R, T;\n  R = R_Balance * (1023.0f / (float)(1023 - analogRead(AnalogInputNumber))\
    \ - 1);\n  //提醒：在 C 语言中，log 是自然对数 ln，log10 是以 10 为底的对数，所以这里没问题\n  T = 1.0f / (1.0f\
    \ / T0 + (1.0f / B) * log(R / R0));\n  switch(OutputUnit) {\n    case T_CELSIUS\
    \ :\n      T-=273.15f;\n      break;\n    case T_FAHRENHEIT :\n      T=9.0f*(T-273.15f)/5.0f+32.0f;\n\
    \      break;\n    default:\n      break;\n  };\n  return T;\n}\nvoid setup()\
    \ {\n  Serial.begin(9600);\n  pinMode(THERMPIN, INPUT);\n  pinMode(LEDPIN, OUTPUT);\n\
    } // setup 函数结束\nvoid loop() {\n  float sensorData = Temperature(THERMPIN, T_FAHRENHEIT,\n\
    \    3950.0f, 298.15f, 10000.0f, 10000.0f);\n  Serial.print(\"华氏度温度 = \\t\");\n\
    \  Serial.println(sensorData);\n  Serial.println();\n  delay(500);\n  //如果温度数据在\
    \ 50 到 75 华氏度之间，则点亮 LED\n  if (sensorData > 50 && sensorData < 75) digitalWrite(LEDPIN,\
    \ HIGH);\n  else digitalWrite(LEDPIN, LOW);\n}// loop 函数结束\n```\n\n清单 8-1. 热敏电阻\n\
    \n# 光电二极管：夜灯示例\n\n当光照射到光电二极管上时，它会产生电流，这本质上就像一个反向工作的 LED（参见第 5 章）。读取该电流比读取电阻值要稍微复杂一些，但可以用一个更简单的电路来实现。\n\
    \n要弄清楚如何使用光电二极管，可以先上网搜索“photodiode Arduino”。您会找到一些示例，大多数都指出，光电二极管实际上就是一个反向连接的\
    \ LED。不是让电流通过它来发光，而是让它受光照，然后会有少量电流以与 LED 相反的方向流过。\n\n许多这些示例都涉及使用晶体管（一种可以放大信号的元件）来放大输出。这对于用导电线来构建电路来说比较困难，因此我们将使用一个更简单的解决方案。光电二极管具有内部电容（存储少量电荷的能力）。如果我们通过在\
    \ LED 两端施加反向电压来给这个电容充电，那么光电二极管产生的电流就会使电容放电。如果我们用一个电阻来减缓这个放电过程，我们就可以通过测量放电速度（在设定时间后采样电压，或者测量达到设定电压所需的时间）来了解光电二极管接收到的光照量。\n"
- fmt: '### Using a Photodiode


    People tend to use photodiodes in a relative way—to see if something is “dark
    enough” or “bright enough” to change the state, or to move toward something bright.
    So we do not really care what the output is, exactly—we just want to know how
    it is changing. This means we have to play with setting some variables when we
    create the Arduino sketch (Listing [8-2](#A371637_1_En_8_Chapter.html#Par49)).
    Figure [8-4](#A371637_1_En_8_Chapter.html#Fig4) shows the circuit in Fritzing,
    and Figure [8-5](#A371637_1_En_8_Chapter.html#Fig5) shows the photodiode being
    shadowed to light up the LED.


    ![A371637_1_En_8_Fig5_HTML.jpg](A371637_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. The photodiode shadowed to light up the LED


    ![A371637_1_En_8_Fig4_HTML.jpg](A371637_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Fritzing diagram of photodiode and LED nightlight


    ```

    // A sketch to light up an LED if a photodiode registers

    // that it is getting dark

    #define PHOTOPIN A0 //connected to photodiode cathode, anode to GND

    #define LEDPIN 9

    #define THRESHOLD 1010 //0-1023, use a higher value to trigger when darker

    // if the light is always on, THRESHOLD is too high. If it''s always off, too
    low

    int photoRead(int pin) {

    digitalWrite(pin, HIGH); // write high to analog pin

    pinMode(pin, OUTPUT); // fully charge the photodiode''s internal capacitance

    delay(1);

    pinMode(pin, INPUT); // switch to input with pullup enabled

    // photodiode current will discharge the capacitor, slowed by the 200 k pullup.

    // More light makes the voltage drop faster.

    delay(2);

    return analogRead(pin); // see how far the voltage has dropped after 2 ms

    }

    void setup() {

    Serial.begin(9600);

    pinMode(PHOTOPIN, INPUT);

    digitalWrite(PHOTOPIN, HIGH);

    pinMode(LEDPIN, OUTPUT);

    digitalWrite(LEDPIN, LOW);

    } // end setup

    void loop() {

    int darkness = photoRead(PHOTOPIN);

    Serial.print("Photodiode reading: ");

    Serial.println(darkness);

    delay(20);

    //turn on LED if darkness is above threshold

    if (darkness > THRESHOLD) digitalWrite(LEDPIN, HIGH);

    else digitalWrite(LEDPIN, LOW);

    }// end loop

    Listing 8-2. Night Light Arduino Sketch

    ```


    ### Using More Than One Sensor in a Project


    If you are using more than one sensor, normally you will isolate their circuits
    on separate pins (similar to what you did with the LED and the sensor in these
    examples) rather than have them in series. Be careful that you do not draw more
    power from the Arduino than it can provide, but that will not normally be a limiting
    factor.


    **Tip** Many types of sensors (and other hardware) are covered at [`http://playground.arduino.cc/Main/interfacingWithHardware`](http://playground.arduino.cc/Main/interfacingWithHardware).


    ## Making Things Move


    An Arduino (including the sewable versions) can control moving parts with one
    of the following:


    *   Small direct-current (DC) motor: This is used to move something without particularly
    precise control over where or how fast the motion will be. If you wanted to have
    a toy car just rotate its wheels and race around, you would probably do it with
    one of these.

    *   Stepper motor: These are the motors used in 3D printers and other places where
    precise speed and position control are needed; these motors move in tiny steps
    (hence the name) of a known size, and their position can be controlled by counting
    steps.

    *   Servo: This motor wants to hold a particular programmed position. You might
    couple it with appropriate sensors to hold something in a particular position.
    A hobby servo has an internal feedback loop that allows it to seek and hold a
    specified position. Servos contain their own control circuitry and are thus simplest
    to hook up to an Arduino. They are also commonly used in robotics, when you want
    to move something precisely.


    If you are interested in motors in general, you might look into a book about Arduino-controlled
    robotics, such as *Arduino Robotics*, by Warren, Adams, and Molle (Apress, 2011).
    Incorporating moving parts into a garment poses some challenges, as we talk about
    in Chapter [10](#A371637_1_En_10_Chapter.html). You need to have any motor anchored
    firmly so that the thing you are trying to move does so safely and as expected,
    rather than just bunching up the fabric under the motor’s attach point.


    **Tip** There is a long list of motors and advice on which one(s) to use for various
    circumstances at [`http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical`](http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical).


    ### Power Management


    Compared to just about anything else you would do with an Arduino, controlling
    a motor takes a lot of power—typically too much to be delivered directly from
    the Arduino. If you try to power a motor with an Arduino, the Arduino can “brown
    out” and act unpredictably, or components can get too hot and fail.


    To avoid this, use an independent power source other than the Arduino itself.
    You connect this other power source directly to the motor. You also need to hide
    batteries somewhere nearby the motor. “Lipstick” USB–connectable rechargeable
    batteries have become pretty easy to come by now, but you still need a place to
    put them and a way to connect them.


    The easiest way to connect a regular (not sewable) Arduino to a motor is to purchase
    an appropriate shield. This is a circuit board that plugs into the Arduino, and,
    in the case of motor shields, usually also will let you plug in an independent
    power source plus the motor. There are no (as of this writing) equivalent sewable
    boards, so you are somewhat stuck with solutions that involve soldering, or you
    need to find a way to use a regular Arduino board with a shield on it, which can
    be a little bulky.'
