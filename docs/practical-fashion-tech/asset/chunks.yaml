  trans: '

    ### 为图 5-7 编写代码


    在第 5 章中，图 5-7 里的示例电路没有任何作用。电路接通后 LED 不会亮，因为它仅仅连接到了地线。按下按钮也没有任何反应。现在，我们要为同一个电路添加代码，使其成为一个反相电路——按下按钮时，灯亮；不碰按钮时，LED
    熄灭。


    正如第 5 章中提到的，这个电路需要一个上拉电阻，这样即使按钮断开，引脚 2 上的电压也是已知的。在按下按钮之前，该引脚会通过微弱连接接到 VCC，但按下按钮会建立一条到
    GND 的强连接，并允许少量电流（与电阻值成反比）流过。Arduino 板使用的芯片内部有上拉电阻（约 200 kΩ），你可以通过向一个处于输入模式的引脚写入
    `HIGH` 来激活它们。代码清单 6-1 展示了这段代码。


    ```cpp

    //按下按钮时，代码将点亮 LED。

    //否则，除了初始化时点亮外，LED 熄灭。

    int buttonPin = 2;

    int ledPin = 10;

    int press = 0;

    void setup() {

    pinMode(ledPin, OUTPUT);

    digitalWrite(ledPin, HIGH);

    pinMode(buttonPin, INPUT);

    digitalWrite(buttonPin, HIGH); // 激活内部上拉电阻

    } // 结束 setup

    void loop() {

    press = digitalRead(buttonPin);

    if (press == HIGH) digitalWrite(ledPin, LOW); // 按钮未按下，熄灭

    else digitalWrite(ledPin, HIGH);

    }// 结束 loop

    ```


    *代码清单 6-1. 用于运行图 5-7 中电路的程序*


    ## Arduino 输入与输出


    正如我们在上一个例子中所见，Arduino 需要既能读取其引脚上的电压，又能输出电压来使各种事情发生。请注意，输入和输出是从 Arduino 板的角度来定义的（也就是说，输出是向引脚写入，输入是从引脚读取）。这意味着，如果一个传感器向
    Arduino 发送数据，对 Arduino 而言它就是数字 `INPUT`，Joan 认为这有点反直觉。但事实就是如此。


    在对引脚进行任何其他操作之前，你应该使用 `pinMode()` 函数告诉 Arduino 你希望将其用作输入还是输出（这通常在 `setup()` 中完成）。Arduino
    上有几种不同类型的输入和输出。你可以通过 `digitalRead`、`digitalWrite`、`analogRead` 和 `analogWrite`
    函数来指定你正在使用的引脚。


    ### 数字读取与写入


    你可以配置 Arduino 上任何带编号的引脚来发送或接收数字信号。数字信号只有两个值——在本例中，称为 `HIGH` 和 `LOW`——这与模拟信号不同，后者可以是某一上下限之间的任意电压。


    定义为输出的引脚可以设置为 `HIGH`（将引脚连接到 Arduino 的 VCC）或 `LOW`（将引脚连接到 Arduino 的 GND）。向引脚写入一个值可用于改变另一个元器件两端的电压（例如，打开或关闭
    LED）。它还可以按特定模式使用，向其他设备发送控制信号，不过在大多数情况下，会有库为你处理这种通信协议。


    如果引脚被定义为输入，你可以用它来读取电压，该电压要么是 `HIGH`（接近 VCC），要么是 `LOW`（接近 GND）。这可用于检查按钮或开关之类元器件的状态。数字输入也可以（通常也是通过库）用于接收来自其他元器件的数字信号，例如传感器，或者有时是向某个设备发送数字信号后接收其回应的设备。例如，Arduino
    可以向 SD 卡写入数据，并从卡中请求数据。


    ### 模拟读取与 PWM


    Arduino 可以在其模拟引脚上读取模拟电压。这些引脚被标记为 A0、A1 等。它们可以用作输入引脚，不仅能够读取 `HIGH` 或 `LOW`，还能通过内置的模数转换器（ADC）读取
    VCC 与 GND 之间的一个电压范围。大多数 Arduino 都有一个 10 位 ADC，这意味着它可以读取 1024（2 的 10 次方）个不同的电压值，范围从
    GND 的 0 到模拟参考电压的 1023。默认情况下，Arduino 使用的参考电压等于 VCC，不过也可以通过内置的 Arduino 函数 `analogReference()`
    配置使用不同的参考电压。


    还有一个模拟写入函数，尽管 Arduino 实际上并没有数模转换器（DAC）。相反，`analogWrite()` 函数会生成一个脉冲宽度调制（PWM）信号，这通常效果甚至更好。`analogWrite()`
    发送的 PWM 信号是在 VCC 和 GND 之间每秒振荡数百次，而模拟值指定了每个周期中电压为 `HIGH` 的时间比例（称为占空比）。PWM 函数接收一个
    8 位值，有 256 个不同的值（0-255）。值 0 表示 0% 的占空比（始终为 `LOW`），255 表示 100% 的占空比（始终为 `HIGH`）。给它赋值为
    127 将得到 50% 的占空比（一半时间为 `HIGH`，其余时间为 `LOW`）。


    PWM 信号可用于调暗 LED 或让电机减速转动等操作。这实际上比发送较低电压更有用，因为 PWM 与 LED 亮度或电机速度具有更线性的关系。PWM 还可以用于向诸如期望
    PWM 信号的业余伺服电机等设备发送信号（伺服电机期望每 20 毫秒有一个 1-2 毫秒长的脉冲来确定其位置）。


    当使用 `analogWrite()` 函数时，Arduino 可以在程序处理其他事情的同时维持这些脉冲，但这仅限于某些引脚。在大多数 Arduino 上，引脚
    3、5、6、9、10 和 11（有时还有其他引脚，取决于所使用的芯片）可用于 PWM，它们通常在其引脚编号旁边标有一个波浪符号（∼）。


    ### 写入串口


    有时，了解某个特定引脚接收到的输入值会非常方便。你可以通过启用串口，将数据通过 USB 线缆发送到你的计算机上。为此，请点击 IDE 右侧的放大镜图标（你可以在图
    6-4 中看到它）。在你的 Arduino 程序的 `setup()` 函数中添加以下一行：


    ```cpp

    Serial.begin(9600);

    ```


    然后，在你 `loop()` 函数中想要查看输出的位置，添加 `Serial.print()` 或 `Serial.println()`（会在你打印的内容后面添加一个换行符）。`Serial.print()`
    或 `Serial.println()` 一次可以传输一个数字或字符串（一组字母）。你可以在 文件 ➤ 示例 ➤ 03.模拟 ➤ AnalogInOutSerial
    中看到一个完整的示例。程序运行且 Arduino 通过 USB 连接后，点击串口窗口图标（放大镜）打开串口监视器，并确保窗口底部的波特率与你在 `Serial.begin()`
    中使用的数字匹配。


