- fmt: '# Costume Design Principles


    When asked, “What makes a good costume?” Tanisa Fatchett’s quick response was
    that it had to be immediately obvious what the wearer was supposed to be. Tanisa
    has just taken over the reins of `Make Believe` ([`www.makebelieveinccostumes.com`](http://www.makebelieveinccostumes.com)),
    a costuming creation and rental store in Santa Monica, near Los Angeles.


    `Make Believe` was founded in the early 1980s, initially as a sort of quasi-captive
    costuming department for a nearby theater. Founders `Doug Spesert` and `Ruth Talley`
    built up the business to its current inventory of what Tanisa estimates to be
    thousands of costumes (Figure [2-2](#A371637_1_En_2_Chapter.html#Fig2)).


    ![A371637_1_En_2_Fig2_HTML.jpg](A371637_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Professional costuming inventory


    Founder `Ruth Talley` recently retired but was kind enough to send Lyn some of
    her key criteria for a good stage costume. Her key points were the following:


    - “Costumes only work if they are part of the overall design of the set, the lighting,
    the make-up, hair, the props, and so on. When it all comes together, it''s magic.
    The costume must fit the period and within that it must fit the actor. I''ve “cheated”
    at times with some historical inaccuracies if the actor ended up looking ridiculous.
    Maybe the bustle has to come in a bit, or the codpiece not quite so padded, or
    the myriad of buttons top stitched on Velcro for an easy on and off.”

    - “The costume also has to work for the actor. If they need to stand out, the
    color, fabric, trims all need to stand out. If they need to be unnoticed, then
    muted is the way to go. If it’s a rip-away skirt, it has to look effortless, or
    accidental. In period pieces, the audience has to feel that the undergarments
    are period too, and some of those undergarments can change posture and movement,
    which adds to the historical feel.”

    - “The audience should be able to tell very quickly what decade you are in, be
    it 1840 or 1940, and they should be able to identify class, royalty, and maybe
    occupation. The audience should be able to determine time of year and time of
    day or night. If you get all of this spot on, then you have a great costume.”


    Ruth also sees parallels throughout history between the fashion and architecture
    of a period. She says, “I wanted to study buildings and clothes of different eras
    to make comparisons on the silhouettes, austerity, or grandeur. Fashion can tell
    us a great deal about the times we are living in and times past. I think the transition
    of the teens to the Roaring Twenties is a great example of a liberal movement
    in dress, thought, behavior, literature, and how representative was the flapper
    in this? It’s hard to separate the influence of fashion designers on artists and
    vice versa. Think `Erte`. Think `Mod 60s`. Think `Pop art`. Then there’s the music
    . . . were the Beatles wearing costumes on `The Ed Sullivan Show` that became
    mainstream fashion? Now it’s the costumer’s job to capture that on the stage.
    Establishment, hippies, mods, and nerds. And so it goes for so many eras. It is
    the costumer’s challenge to make the French look French and the English look English
    in `The Tale of Two Cities` and `The Three Musketeers`. And how about `Malvolio`?
    What is he without his crossed garters?”


    ### Making a Costume Work for You


    The most important thing for a person to look good in a costume is that they have
    to be comfortable in it, Tanisa advises. By this she means physical comfort, and
    that the costume is sturdy and not falling apart around the wearer. But she also
    means that in a slightly more subtle way. One might imagine that a professional
    costumer might spend most of her time gently talking people out of age-inappropriate
    attire.


    However, apparently it is common that people think they are not good-looking enough
    to pull off a particular look. People have to “let down their guard” to wear a
    costume effectively, Tanisa says, and not everyone can or will do that. And they
    have to “decide what kind of attention they want to get.”


    It is important to try all the physical movement that is required of the character
    in the costume as it is being created. If you wait until it is finished, you may
    have to do a lot of alterations.


    ### Costume Development Time and Effort


    One of Tanisa’s favorite costumes of all time is a period gown (shown in Figure
    [2-3](#A371637_1_En_2_Chapter.html#Fig3)). Tanisa estimates that there are hundreds
    of work-hours in this costume. The beaded fabric can be bought, but is very expensive
    and so has to be used carefully so as to avoid wasting it.


    ![A371637_1_En_2_Fig3_HTML.jpg](A371637_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. Tanisa Fatchett and a favorite gown with accessories


    Beyond the incredible surface detail, there is a lot of infrastructure under the
    hood, so to speak (see Figure [2-4](#A371637_1_En_2_Chapter.html#Fig4)). Elaborate
    costumes like this have a lot of layers, and experience guides what kinds of fabrics
    to make things out of so that they can be altered for different wearers without
    being destroyed in the process.


    ![A371637_1_En_2_Fig4_HTML.jpg](A371637_1_En_2_Fig4_HTML.jpg)


    Figure 2-4. Some of the infrastructure for the gown in Figure [2-3](#A371637_1_En_2_Chapter.html#Fig3)


    ### What Will You Make?


    Before you get too far into this book, think about what kind of project you want
    to do ultimately. This may change as you learn more about what is possible, but
    having a goal will both motivate you and keep you from going down too many isolated
    tech explorations, resulting in never having a cool finished product. Flip through
    the project chapters (Chapters [7](#A371637_1_En_7_Chapter.html) and [11](#A371637_1_En_11_Chapter.html))
    to see if something jumps out at you.


    If you are a teacher laying out a class, you might want to come up with a few
    types of final projects that will narrow down the possibilities a little. For
    example, you might suggest that they create props for some part of a school theater
    production that happens near the end of the course.


    Alternatively, the whole class can work on one historical costume piece that has
    a lot of detail and accessories. They can all participate in different levels
    of its creation. It is inspiring to work as a group, and they can learn to collaborate
    and express their ideas. Another good final project is to have each student choose
    one character in one scene from a play, design the costume and accessories, and
    then build the entire look.


    ## Beginner Mistakes


    In Chapter [10](#A371637_1_En_10_Chapter.html) we tell you about our first major
    wearable tech project, in which we were far too ambitious. Tanisa agreed that
    a common error among the inexperienced was to try to do too many things at once.
    When asked to think of a costume that had failed, though, she could not come up
    with an example. “There’s something to learn from everything,” she says. This
    is an attitude remarkably close to that of our friend `Metalnat Hayes`, cofounder
    of `Burbank Makerspace` ([`www.burbankmakerspace.com`](http://www.burbankmakerspace.com)),
    who is fond of the hashtag `#testcase` to describe something that went kerplooie
    but which he learned something from just the same.'
