  trans: '

    ### 平针缝


    将两块布料的正面对齐。手持针线，从底部（两个正面相对的那一面）将针尖向上刺入，穿过两层布料，直到线结抵住布料。在距穿出点约四分之一英寸处，从顶面将针穿过，并拉紧线，直至线完全穿过且针脚平整。为清晰起见，图
    3-5 仅展示了穿过一层布料的针脚。


    ![A371637_1_En_3_Fig5a_HTML.jpg](img/A371637_1_En_3_Fig5a_HTML.jpg)![A371637_1_En_3_Fig5b_HTML.jpg](img/A371637_1_En_3_Fig5b_HTML.jpg)


    图 3-5. 进行中的平针缝


    继续重复这些步骤，形成一条直线针脚。你可以让内侧（或底部）的针脚比外侧（或顶部）稍长一些，也可以让它们长度相等。尝试不同大小的针脚，直到熟练掌握技巧并能保持针脚整洁。


    ### 疏缝针


    这种针法和平针缝相同，但每个针脚要长得多。它是一种临时针法，通常用于在机器缝合前将布料固定在一起，无需别针，也可用于快速锁边、其他修补或临时固定。


    ### 倒针缝


    这是最牢固的针法，或许也是最容易保持直线的一种。先在布料上缝一针，当针从布料穿出准备缝第二针时，不要远离第一针下针，而是将针从第一针末端的上方刺入，并穿过布料（图
    3-6）。下一针在底部会更长，将线拉至顶部，然后倒回前一针的末端。继续使用这种技法，或在每个倒针之间加入几个平针。


    ![A371637_1_En_3_Fig6a_HTML.jpg](img/A371637_1_En_3_Fig6a_HTML.jpg)![A371637_1_En_3_Fig6b_HTML.jpg](img/A371637_1_En_3_Fig6b_HTML.jpg)![A371637_1_En_3_Fig6c_HTML.jpg](img/A371637_1_En_3_Fig6c_HTML.jpg)


    图 3-6. 制作倒针缝


    ### 暗缝针或藏针缝


    这种针法稍复杂些，但能让你的衣物或作品呈现出专业的外观。它几乎是看不见的针脚，一旦学会暗缝针，就能快速完成收尾。


    练习暗缝针时，剪下一小块方布，对折。打开，将两侧向中线折叠并熨平，然后沿中线再次对折（此步骤及后续步骤如图 3-7 所示）。


    ![A371637_1_En_3_Fig7a_HTML.jpg](img/A371637_1_En_3_Fig7a_HTML.jpg)![A371637_1_En_3_Fig7b_HTML.jpg](img/A371637_1_En_3_Fig7b_HTML.jpg)


    图 3-7. 为暗缝针折叠布料


    将针从布料顶部刺入，穿过折叠的上边缘，直至线结卡住。然后将针移至下方折叠处，将针水平刺入折痕，沿布料内侧推进约 1/4 英寸。接着将针拉出，再回到上方折叠处。将针水平穿过上方折叠并拉出线。依此继续直至末端（见图
    3-8）。


    ![A371637_1_En_3_Fig8a_HTML.jpg](img/A371637_1_En_3_Fig8a_HTML.jpg)![A371637_1_En_3_Fig8b_HTML.jpg](img/A371637_1_En_3_Fig8b_HTML.jpg)![A371637_1_En_3_Fig8c_HTML.jpg](img/A371637_1_En_3_Fig8c_HTML.jpg)![A371637_1_En_3_Fig8d_HTML.jpg](img/A371637_1_En_3_Fig8d_HTML.jpg)


    图 3-8. 藏针缝步骤


    在末端，于最后一个长针脚对面的折叠处缝一个小针脚。拉线形成一个线圈，将针穿过线圈，再拉紧打一个结。重复此操作三次，以形成一个牢固的尾结。这种针法可用于连接两块布料，或作为单块布料的边缘处理。


    ### 包边缝


    包边缝同样用于连接边缘。起针方法与暗缝针相同——将线从布料背面穿至正面靠近边缘处。然后将针斜向朝向缝纫方向刺入布料背面。不要将线拉紧，而是先将针穿过这个线圈，然后拉线形成
    90 度角。继续操作直至完成边缘。在末端，将针移至线形成的最后一个垂直线右侧，从布料中穿出并形成一个线圈。将针穿过线圈并拉紧三次以形成尾结（图 3-9）。与暗缝针一样，包边缝可用于连接两块布料，或作为单块布料的边缘处理。


    ![A371637_1_En_3_Fig9_HTML.jpg](img/A371637_1_En_3_Fig9_HTML.jpg)


    图 3-9. 包边缝


    ### 卷针缝


    将一块布料对折并用别针固定。从内侧将针穿过折痕（图 3-10a），使其从正面穿出（图 3-10b）。将针从背面刺入并穿回正面，使其与第一针平齐（图 3-10c）。继续重复至末端（图
    3-10d），并打一个收尾结。


    ![A371637_1_En_3_Fig10c_HTML.jpg](img/A371637_1_En_3_Fig10c_HTML.jpg)![A371637_1_En_3_Fig10d_HTML.jpg](img/A371637_1_En_3_Fig10d_HTML.jpg)


    图 3-10c. (上) 和 d (下). 卷针缝步骤 c 和 d


    ![A371637_1_En_3_Fig10a_HTML.jpg](img/A371637_1_En_3_Fig10a_HTML.jpg)![A371637_1_En_3_Fig10b_HTML.jpg](img/A371637_1_En_3_Fig10b_HTML.jpg)


    图 3-10a. (上) 和 b (下). 卷针缝步骤 a 和 b


    **提示：** 参考图片有助于理解说明文字。这些针法在布料的两面应看起来相同。

    '
- fmt: '# Threading a Sewing Machine


    Figuring out how to sew by hand may seem daunting enough, but modern sewing machines
    are pretty complex robots. Since sewing machines last a very long time, if you
    have a machine, it may be anywhere from 60 years old (like the cast-iron 1953
    Singer Featherweight in Figure [3-11](#A371637_1_En_3_Chapter.html#Fig12)) to
    a modern equivalent (Figure [3-12](#A371637_1_En_3_Chapter.html#Fig13)). The instructions
    that follow try to cover this spread of machines wherever possible.


    ![A371637_1_En_3_Fig12_HTML.jpg](A371637_1_En_3_Fig12_HTML.jpg)


    Figure 3-12. A 2015 Brother automated sewing machine


    ![A371637_1_En_3_Fig11_HTML.jpg](A371637_1_En_3_Fig11_HTML.jpg)


    Figure 3-11. A 1953 Singer Featherweight, still working perfectly in 2015. (Thanks
    to Rich’s sister, Rachel Cameron, for modeling for the pictures and reviewing
    these instructions.)


    Sewing machines have several types of stitches available by turning a knob or
    pressing a button, depending on the machine. They are, most commonly, straight,
    zigzag, and embroidery stitches. You can adjust the length and width of them with
    a dial or computer-screen menu. The more elaborate machines have even more stitches
    available. The machine can also go in reverse with a button or switch.


    If you have a new machine, it came with a manual that explains the steps necessary
    to thread it (if you can’t find the manual, it may be available online). Many
    machines also show the path of the thread on the machine itself in some way (Figure
    [3-13](#A371637_1_En_3_Chapter.html#Fig14)).


    ![A371637_1_En_3_Fig13_HTML.jpg](A371637_1_En_3_Fig13_HTML.jpg)


    Figure 3-13. The threading diagram on the top of the machine in Figure [3-12](#A371637_1_En_3_Chapter.html#Fig12)


    Threading a sewing machine can be confusing if you’ve never attempted it. But
    once you learn how, it will take only a few seconds on most standard machines,
    and you’ll be ready to begin sewing. You must be able to see the small eye of
    the needle and have fairly good aim, so get your glasses if you need them to see
    up close. Many machines have a needle threader attached, which can help with the
    issues of fuzzy eyesight or shaky hands.


    > **Caution**

    > The eye of a sewing machine needle is at the pointy end, and the eye of a hand
    sewing needle is at the top. Do not try to use the wrong kind for your purpose.


    You will need some test fabric, a spool of thread (as with hand sewing, use a
    contrasting color to that of your fabric if you want to practice and easily see
    the stitches). You will also need sewing machine needles and a threaded sewing
    bobbin, a second spool of thread that feeds the stitches on the bottom of the
    fabric. On most sewing machines you fill the bobbin with thread before threading
    the top part of the machine. Treat the following instructions (which use two machines
    examples so you can see some typical variation) as guidelines, and consult your
    manual for details.


    ## Winding the Bobbin


    Using the spool of thread you have chosen, fill the bobbin so you have the same
    color of thread on the top and bottom of the stitch. If you sew other projects,
    you will create a collection of bobbins with various colors of thread so that
    you do not need to start over each time.


    To get started, hold the hand wheel with your left hand and turn the inner knob
    with your right to loosen it. Place the spool of thread on the spool pin at the
    top of your machine. If your machine does not have an inner wheel, it may have
    a release button on top instead. Insert the thread through the hole in the bobbin
    from the inside to the outside and place the bobbin on the bobbin winder spindle.
    Push the spindle to the right. Hold the end of the thread and depress the foot
    control slowly to wind a few inches of thread around the bobbin. Figure [3-14](#A371637_1_En_3_Chapter.html#Fig15)
    shows this point in the process.


    ![A371637_1_En_3_Fig14_HTML.jpg](A371637_1_En_3_Fig14_HTML.jpg)


    Figure 3-14. Bobbin-winding


    Next, stop the machine and cut the end of the thread close to the hole in the
    top of the bobbin. Depress the foot control again until the bobbin is full. Stop
    the machine and return the bobbin winder spindle to its original position by moving
    it to the left. Cut the thread. The equivalent spool holder for the modern machine
    is just ahead of the main spool of thread in Figure [3-12](#A371637_1_En_3_Chapter.html#Fig12).


    ## Installing the Needle


    Check the needle to see if it is straight by laying it flat side down on a flat
    surface. The gap between the needle and the surface should be consistent and the
    needle should be sharp. To install a needle, raise the needle holder assembly
    to its highest position by turning the handwheel toward you (counterclockwise),
    and lowering the presser foot, the foot that holds down the fabric around the
    needle. Your machine will have a mechanism to release it, such as a lever near
    the foot. Figure [3-15](#A371637_1_En_3_Chapter.html#Fig16) shows this step (in
    a machine that is already threaded on top).


    ![A371637_1_En_3_Fig15_HTML.jpg](A371637_1_En_3_Fig15_HTML.jpg)


    Figure 3-15. The presser foot


    Loosen the needle clamp screw and insert a needle into the needle clamp with the
    flat side away from you. Be sure to push the needle up as far as it will go. Tighten
    the needle with the mechanism your machine has for the purpose.


    ## Threading the Top of the Machine


    Raise the thread take-up lever to its highest position by turning the hand wheel
    toward you (counterclockwise). Make sure the presser foot is in the up position.
    Place the spool of thread on the spool pin at the top of your machine. If the
    spindle sits horizontally, secure the spool of thread with the cap provided. Snip
    the end of the thread with sharp scissors to make a clean end. Take the thread
    end and pass it through the top thread guide. Draw the end of the thread around
    the upper thread guide (Figure [3-16](#A371637_1_En_3_Chapter.html#Fig17)).


    ![A371637_1_En_3_Fig16_HTML.jpg](A371637_1_En_3_Fig16_HTML.jpg)


    Figure 3-16. The upper thread guide


    Holding the thread near the spool, draw the end of the thread down around the
    check spring holder or tension assembly. The tension assembly is located on the
    top of the machine in Figure [3-16](#A371637_1_En_3_Chapter.html#Fig17) and controls
    the flow of thread. Firmly draw the thread up and then follow the numbers or diagram
    to go through any other clips your machine may have. In some cases, like the machine
    in Figure [3-16](#A371637_1_En_3_Chapter.html#Fig17), the area around the thread
    guides can be opened to give you better access.


    Draw the thread down through the remaining thread guides on your machine and slide
    it behind the needle bar guide—a clip just above the needle, barely visible in
    Figure [3-17](#A371637_1_En_3_Chapter.html#Fig18). Thread the needle from front
    to back and pull a few inches through the eye of the needle and to your left.
    (Yours may be right to left—see diagram on your machine.)


    ![A371637_1_En_3_Fig17_HTML.jpg](A371637_1_En_3_Fig17_HTML.jpg)


    Figure 3-17. The threaded needle'
  raw: '## Threading a Sewing Machine


    Figuring out how to sew by hand may seem daunting enough, but modern sewing machines
    are pretty complex robots. Since sewing machines last a very long time, if you
    have a machine, it may be anywhere from 60 years old (like the cast-iron 1953
    Singer Featherweight in Figure [3-11](#A371637_1_En_3_Chapter.html#Fig12)) to
    a modern equivalent (Figure [3-12](#A371637_1_En_3_Chapter.html#Fig13)). The instructions
    that follow try to cover this spread of machines wherever possible.


    ![A371637_1_En_3_Fig12_HTML.jpg](A371637_1_En_3_Fig12_HTML.jpg)


    Figure 3-12.


    A 2015 Brother automated sewing machine


    ![A371637_1_En_3_Fig11_HTML.jpg](A371637_1_En_3_Fig11_HTML.jpg)


    Figure 3-11.


    A 1953 Singer Featherweight, still working perfectly in 2015\. (Thanks to Rich’s
    sister, Rachel Cameron, for modeling for the pictures and reviewing these instructions.)


    Sewing machines have several types of stitches available by turning a knob or
    pressing a button, depending on the machine. They are, most commonly, straight,
    zigzag, and embroidery stitches. You can adjust the length and width of them with
    a dial or computer-screen menu. The more elaborate machines have even more stitches
    available. The machine can also go in reverse with a button or switch.


    If you have a new machine, it came with a manual that explains the steps necessary
    to thread it (if you can’t find the manual, it may be available online). Many
    machines also show the path of the thread on the machine itself in some way (Figure
    [3-13](#A371637_1_En_3_Chapter.html#Fig14)).


    ![A371637_1_En_3_Fig13_HTML.jpg](A371637_1_En_3_Fig13_HTML.jpg)


    Figure 3-13.


    The threading diagram on the top of the machine in Figure [3-12](#A371637_1_En_3_Chapter.html#Fig12)


    Threading a sewing machine can be confusing if you’ve never attempted it. But
    once you learn how, it will take only a few seconds on most standard machines,
    and you’ll be ready to begin sewing. You must be able to see the small eye of
    the needle and have fairly good aim, so get your glasses if you need them to see
    up close. Many machines have a needle threader attached, which can help with the
    issues of fuzzy eyesight or shaky hands.


    Caution


    The eye of a sewing machine needle is at the pointy end, and the eye of a hand
    sewing needle is at the top. Do not try to use the wrong kind for your purpose.


    You will need some test fabric, a spool of thread (as with hand sewing, use a
    contrasting color to that of your fabric if you want to practice and easily see
    the stitches). You will also need sewing machine needles and a threaded sewing
    bobbin, a second spool of thread that feeds the stitches on the bottom of the
    fabric. On most sewing machines you fill the bobbin with thread before threading
    the top part of the machine. Treat the following instructions (which use two machines
    examples so you can see some typical variation) as guidelines, and consult your
    manual for details.


    ### Winding the Bobbin


    Using the spool of thread you have chosen, fill the bobbin so you have the same
    color of thread on the top and bottom of the stitch. If you sew other projects,
    you will create a collection of bobbins with various colors of thread so that
    you do not need to start over each time.


