- fmt: '# Part I


    The Big Picture


    These first two chapters provide some background about what makes a good costume
    (or other garment) design. Chapter [1](#A371637_1_En_1_Chapter.html) introduces
    fashion tech and talks a bit about how the rest of the book is arranged. Chapter
    [2](#A371637_1_En_2_Chapter.html) focuses on what makes a good costume and suggests
    things to think about in garment design in general.


    # 1. Fashion Tech


    *Electronic supplementary material* The online version of this chapter (doi:[10.1007/978-1-4842-1662-0_1](http://dx.doi.org/10.1007/978-1-4842-1662-0_1))
    contains supplementary material, which is available to authorized users.


    Fashion tech is an interdisciplinary field that merges traditional fashion and
    textiles with modern electronics, software, and other technologies. In this book,
    we consider fashion tech to mean interactive garments or accessories that incorporate
    electronic components, or that were created using digital fabrication technologies
    like 3D printing. Technologies like these have only recently become available
    at the consumer level because of advances in the production of electronics that
    have lowered the cost of computers, sensors, and light-up components that can
    be embedded into everyday objects. This chapter introduces fashion tech and talks
    about how you can use this book to get started as a practitioner in this new field.


    ## A Brief History of Fashion Tech


    Creating clothing to protect ourselves from the weather has been an inspiration
    for technology development since antiquity. Tools have gone from bone awls for
    punching holes in leather, to spindles for creating yarn, to the looms that could
    produce vast amounts of fabric at industrial scale. Figure [1-1](#A371637_1_En_1_Chapter.html#Fig1)
    shows an 1875 stereoscopic photograph of the Amoskeag (New Hampshire) Gingham
    Mill weaving room. (There is an animation of this stereo image at [http://stereo.nypl.org/view/14480](http://stereo.nypl.org/view/14480)).


    ![A371637_1_En_1_Fig1_HTML.jpg](A371637_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1.** Weaving, circa 1875. From the New York Public Library ( [http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99](http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99)
    )


    The desire to create elaborately patterned fabrics led to the development of the
    Jacquard loom in 1801. A weaver created cards with holes in them that controlled
    (through an ingenious system of lightly tensioned springs and wires) the patterns
    the loom was creating. This allowed automatic generation of very elaborate patterns
    such as brocades.


    Fancy fabrics for drapes and wedding gowns is not the end of the story, though.
    English mathematician and inventor Charles Babbage saw the Jacquard loom punch
    cards and wondered if a similar system could be used to create a more general
    computing machine for mathematical problems, which he called the Analytical Engine.


    Babbage first described the machine in 1837; the full machine was never actually
    created ( [https://en.wikipedia.org/wiki/Analytical_Engine](https://en.wikipedia.org/wiki/Analytical_Engine)
    ). Nevertheless, Babbage is widely seen as the inventor of the general-purpose
    computer, and the descendants of its punched cards were in use well into the 1970s.
    And so, the computer has its birth in Victorian fashion tech!


    **Tip** If you are interested in the history of textile technologies, check out
    the amazing historical archive with many illustrations and original documents
    at [www.cs.arizona.edu/patterns/weaving/index.html](http://www.cs.arizona.edu/patterns/weaving/index.html).
    More specifically, if you would like to download a Victorian-era book on how to
    create the cards for a Jacquard machine, E. A. Posselt’s *The Jacquard Machine
    Analyzed and Explained* (Posselt, 1893) is now in the public domain and available
    from the Hathi Trust Digital Library at [http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d](http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d).


    The introduction of the integrated circuit in the late 1950s and its rapid evolution
    have now resulted in affordable computers that are comparable in size to coins.
    The late Gordon Moore predicted in 1965 that the performance of computer chips
    would roughly double every two years based on technology improvements; Moore’s
    Law, as it came to be called, has been remarkably accurate (so far). This means
    that early-1980s supercomputers are outclassed by 2016 single-board computers
    that are a few inches across and cost $5.


    Other digital electronics have kept pace, and tiny processors and sensors developed
    for smartphones, cameras, and other devices now make it possible to unobtrusively
    include as part of a hat or apron processing power that would have had been ministered
    to by dedicated staff in the 1980s. Coming full circle from the Jacquard loom,
    it is now possible to have circuits woven into clothing. (We talk about Google’s
    Project Jacquard in Chapter [13](#A371637_1_En_13_Chapter.html).)


    Another side effect of access to cheap, easy-to-program electronics has been the
    rise of robotics-based consumer products, like low-cost consumer 3D printers and
    computerized home sewing machines. 3D printers in turn make it easy to prototype
    physical objects quickly and cheaply, and are leading to even more innovation.
    Feature-laden home sewing machines can enable complex projects that would have
    been too much for the hobbyist in the past.


    The bottom line of all this is that you have access to a fantastic array of technologies
    to make cool projects. In this book we focus on using digital electronics and
    related technologies (such as 3D printing) in fashion applications like creating
    costumes and other interactive wearable pieces.'
