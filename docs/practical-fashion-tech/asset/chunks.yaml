    ### 制作纸样


    你可能正在发明某种尚不存在的东西，或者只是找不到喜欢的纸样。在这种情况下，有许多服装书籍和网站提供了简单的纸样图样及放大说明。我个人偏爱的资源包括：芭芭拉和克莱图斯·安德森的《*服装设计*》第二版（Harcourt
    Brace College Publishers，1999 年）；雪莉·迪林的《*优雅节俭服装*》（Meriwether Publishing，1992 年）；希拉·杰克逊的《*舞台服装*》第二版（New
    Amsterdam Books，2001 年）；以及南希·布拉德菲尔德的《*1730–1930 服饰细节*》（Costume and Fashion Press，隶属
    Quite Specific Media Group）。此外，我也是网站 [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com)
    和 [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)
    的忠实粉丝。


    另一种制作纸样的方法是仔细拆解一件衣物。你可以利用合身的旧衣服作为新作品的纸样。选择一件你想复制的衣服，用拆线器拆开接缝。最好使用已经破旧或不再想要的衣物。也可以专门从二手店购买一件用于此目的。将拆下的衣片用作纸样，或者用它们来制作纸质纸样。


    在了解衣物的构造方式后，你可能会想为其他服装修改某些部分——例如，缩短或加长裙子、连衣裙或裤子，或者增加更长、更宽松的袖子或不同的领型。


    纸样用纸可以在网上和布料店找到，但你也可以使用屠夫纸、牛皮纸袋（就像我本章示例中所用的那样），或者其他任何你能在上面画图、将其别在布料上并进行裁剪的纸张。不建议使用报纸，因为油墨会弄脏布料，而且难以看清你做的任何标记。


    **注意**


    随着激光切割机在公共创客空间越来越普及，你可能想制作一份能在这些机器上使用的纸样。激光切割机可以非常轻松地切割出复杂的形状。例如，Adobe Illustrator
    软件包（`www.adobe.com/products/illustrator.html`）就是创建电子缝纫纸样的好工具，尽管其学习曲线较为陡峭。你需要创建一个包含二维矢量图形（而非光栅图形）的文件，以便在激光切割机上切割。


    由于易于获得的激光切割机是相当新的设备，这一领域在不久的将来可能会显著扩展（尝试搜索"数字缝纫纸样"）。不过请注意，那些专为下载、分页打印并用于缝纫机缝合的电子纸样，很可能无法用于激光切割。即使格式正确，也需要对文件进行一些处理才能切割出正确的线条。


    ### 基本纸样形状与部件


    裤子和衬衫是由几种基本形状构成的。裤子可以用一块纸样制作，从两块布料上剪出，并添加腰部松紧带或制作腰头。还可以通过增加拉链门襟、魔术贴、纽扣或按扣进行升级。


    衬衫只需三块纸样即可制作——前片、后片和袖子。更精良的衬衫或女式衬衫则会包含领口、袖口以及纽扣襻或拉链。


    ### 选择布料


    纸样信封的背面会列出推荐布料以获得最佳效果。最好从这些推荐中选择布料，以确保你的作品合身且垂坠自然。对于马甲项目，请勿使用弹性针织面料。同时还会列出所需辅料清单：缝线、拉链、纽扣、按扣等。


    **提示**


    购买布料时，大部分布料上都含有或浸有浆料。浆料是一种用于保持布料在卷筒上挺括无皱的溶液。我建议在裁剪纸样之前，先用你将来洗涤成品衣物的水温将布料进行清洗和烘干。这能预缩布料，并消除成品不合身的可能性。当然，如果你使用的是不能水洗的布料，就不要水洗。必要时进行干洗。


    ### 计算所需布料用量


    纸样通常会附带需要购买多少布料的估算。如果你在自制纸样，可以通过先测量要使用的纸样部件，或测量要覆盖的身体或物体尺寸，来确定所需布料量。布料的幅宽各不相同。在美国，最常见的幅宽是
    40 英寸和 60 英寸。请记住，所有纸样部件必须朝同一方向排列。如果你只是为了能放下所有部件而随意裁剪，想尽量少用布料，那么制成的服装或物品看起来会很奇怪，而且非常不合身。如果布料带有条纹或图案，且你希望前后片纹路对齐，那么就需要额外多买一些布料以便均匀对花。


    ## 使用纸样


    一旦你备好了纸样和布料，准备开工，就需要将纸样铺在布料上进行裁剪。本节对此进行概述，你可以在稍后的马甲制作示例中看到更多照片。

    '
- fmt: '### Laying Out the Pattern


    Lay the fabric out on a table, cutting board, or floor. It should be folded with
    the selvage (finished, not the cut) edges together (Figure [4-4](#A371637_1_En_4_Chapter.html#Fig4)).
    In Figure [4-4](#A371637_1_En_4_Chapter.html#Fig4) the selvage edge runs along
    the bottom of the picture. You can see where I folded it back so that the right
    side of the fabric is folded inward. The demonstration fabric has some sparkly
    bits on the right side and a matte finish on the wrong side (inside of the garment).


    ![A371637_1_En_4_Fig4_HTML.jpg](A371637_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Folded fabric, ready to cut—selvage on bottom, cut edge on the right Caution


    If the fabric has a nap (like corduroy or velvet), the arrows should be parallel
    to the nap, not horizontally across it. The same goes for a fabric with a strong
    pattern. Normally the pattern or nap would be parallel to the selvage anyway.


    You will be cutting through two layers of fabric. If there is a piece that you
    only need one of, it will be on the fold of the fabric, and the pattern piece
    will only represent half of the finished piece. For example, the back of the vest
    we will make later on in this chapter lies on the fold. Others will need to be
    placed so that you are making two of them. Figure [4-5](#A371637_1_En_4_Chapter.html#Fig5)
    shows the vest pattern that I made by drawing freehand on cut-up grocery bags
    as it appears pinned on the fabric. The fabric is laid out on a cardboard cutting
    board, which in this case we are going to use on the floor. If you have a table
    that is big enough, you may find it more convenient to put it there.


    ![A371637_1_En_4_Fig5_HTML.jpg](A371637_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    The vest pattern (on a fabric without a nap) pinned on fabric on a cutting board.
    The fold is at the bottom, selvage on top.


    I did not try to optimize laying out pieces all that much here; if you have expensive
    fabric and you sew a lot of clothes, it can be worth it to play around with the
    pieces a bit before pinning. That way you can have as much fabric as possible
    left over for other projects.


    You will notice that there are a lot of pieces on the fabric that do not have
    immediately obvious uses. These are facing pieces—used to finish off armholes,
    necklines, and other pieces instead of just hemming them. In this case, there
    is one facing piece (for the back of neckline) on the fold, and three that will
    be created with two copies apiece.


    There are arrows on the pattern pieces indicating the straight grain of the fabric
    (see the arrow on the sketched pattern in Figure [4-2](#A371637_1_En_4_Chapter.html#Fig2)
    and again in Figure [4-5](#A371637_1_En_4_Chapter.html#Fig5)). The straight grain
    runs parallel with the selvage edge.


    Patterns are made with notches (pieces that stick out of the cutting line of the
    garment, as in Figure [4-6](#A371637_1_En_4_Chapter.html#Fig6)) to help you assemble
    the garment and avoid getting confused. I drew the pattern we will be using in
    this chapter freehand based on experience, but even so, I put in a few notches
    of different shapes to help us keep track of what goes where. It can otherwise
    be very easy to assemble things partially inside-out or otherwise incorrectly.
    These notches poke out of the cutting line of the garment—some patterns will have
    them indented from the cutting line.


    ![A371637_1_En_4_Fig6_HTML.jpg](A371637_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    A notch


    ### Pinning and Cutting the Pieces


    After you are happy with the layout of the pattern pieces on the folded fabric,
    pin the pattern in place with straight pins. Be sure the pins do not stick out
    where you are going to cut.


    When you are cutting, lean on the fabric with your other hand to hold it still
    (Figure [4-7](#A371637_1_En_4_Chapter.html#Fig7)). Otherwise (particularly with
    stretchy fabrics) you can find yourself cutting away from the pattern lines. This
    usually means you are continuously moving around as one hand maneuvers the scissors
    and the other holds the fabric still.


    ![A371637_1_En_4_Fig7_HTML.jpg](A371637_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    Leaning on the fabric to cut a notch Tip


    When cutting, follow the cutting lines, not the seam allowance lines. Use long,
    even scissor strokes, and cut out the notches. It is a good idea to use your fabric
    scissors only on fabric. They become dull quickly if they are used to cut paper
    or other things. If you have dull scissors, it is harder to cut the fabric cleanly.


    ### Marking the Fabric


    Using tailor’s chalk or a washable pen, you can transfer all markings and lines
    of construction you will use onto the “wrong” side of the fabric before removing
    the pattern. Remember, the wrong side is the back (the part that will not be visible
    when the garment is worn, although some of the facing will not normally be visible
    either). For a simple construction, like the vest example in this chapter, you
    would normally not worry about doing that.


    ## Creating a Simple Vest


    Now I will walk you through creating a simple, unlined vest. We are making a vest
    first because it is a fairly small article of clothing and requires less fabric
    than a pair of pants or a shirt. That means if you make a terrible mistake, you
    will not have ruined a large piece of expensive fabric. It involves using a standard
    pattern and sewing by hand and machine.


    A vest can be convenient for wearables projects because it can be dropped over
    other clothing and is a bit easier to handle than an entire dress or complex costume.
    The tools required, illustrated in Figure [4-8](#A371637_1_En_4_Chapter.html#Fig8),
    are as follows:


    ![A371637_1_En_4_Fig8_HTML.jpg](A371637_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Materials to make the vest, other than the sewing machine, fabric, pattern, and
    cutting board. The latter three are shown in Figure [4-5](#A371637_1_En_4_Chapter.html#Fig5).


    *   A sewing machine

    *   Sewing machine needle

    *   Spool of thread

    *   Simple vest pattern (see suggestions in Tip that follows)

    *   Bobbin with the same thread as the spool

    *   Sharp scissors

    *   Straight pins

    *   Pin cushion

    *   Seam ripper

    *   Fabric

    *   Cutting board (optional)


    Tip


    When using a standard sewing pattern for the first time, it is important to read
    and follow the instructions that come with it and to understand and follow the
    markings printed on the pattern pieces. The example here uses a pattern that I
    drew from scratch, but I suggest you buy a simple pattern for your first time
    out. Some basic vest patterns you could buy to follow along with these instructions
    are McCall’s M6228 (men’s and women’s vests), McCall’s M2260 (unlined women’s
    vests), and Kwik Sew K3899 (easy women’s vests).


    This vest is a basic design, with few pieces to attach to complete it. You can
    make it a more advanced project by adding pockets, lapels, lining, buttons, snaps,
    ties, or other design elements. We show you different electronic elements you
    might want to add to it in later chapters.


    ### Choosing Fabric


    For your first outing here, I suggest you get some very low-cost cotton fabric
    since it is likely that things will go wrong and there is no point in wasting
    a lot of money on fancy fabric. Take a look at the discussion earlier in the chapter
    to see how much fabric to buy. The fabric used here is a light polyester, with
    a bit of sparkly stuff on the right side.'
