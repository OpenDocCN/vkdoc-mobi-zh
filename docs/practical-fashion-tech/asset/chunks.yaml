    Apress Media, LLC is a California LLC and the sole member (owner) is Springer
    Science + Business Media Finance Inc (SSBM Finance Inc). SSBM Finance Inc is a
    Delaware corporation. This book is dedicated to Lyn Hoge’s family, biological
    and extended, for the laughter, adventure, support, and love. They have been there
    through the good and the bad and have always generously shared their intelligence,
    joy, and creative ideas. Introduction


    This book is a collaboration between two technologists (Joan and Rich) and a veteran
    teacher, costumer, and choreographer (Lyn). The three of us take turns narrating
    different chapters and sections. Fashion tech can require skills in design, pattern-making,
    sewing, electronics, programming, and 3D printing. Besides the tech skills, making
    a good costume or accessory also requires knowledge of the intangibles of what
    makes a good costume. We know that people come to fashion tech and wearable electronics
    from a variety of directions, and that any given reader may know a lot about one
    part already. We have structured the book so that you can easily skip a chapter
    or two if you are very experienced in that particular art already.


    There are many books in this space that present sets of projects. We have those
    too, but we wanted to focus on showing why things are done a certain way so that
    you can figure out how the techniques might apply in other situations. The technology
    is changing fast, and there are many new components to play with all the time;
    the key thing is to know the general assumptions behind how they are designed,
    and where you are most likely to find information on how to use the latest thing.
    There are many good resources out there on how to sew, how to 3D print, and how
    to use an Arduino. We felt that the missing part was bringing them together in
    one readable volume.


    We wrote this book with several audiences in mind. First, if you are already someone
    interested in creating great costumes for theater, or you like to go to cosplay
    conventions, you will be able to use the material in this book to make your creations
    interactive, illuminated, or wherever you choose to go with the technologies.
    If, on the other hand, you are passingly familiar with Arduino electronics but
    have no idea how to sew or assemble a garment, you can fill in your gaps and learn
    how to design the overall project.


    If you are a high school or college teacher who needs to create a “Fashion Tech,”
    “Costume Tech,” or “Wearable Electronics” course, Appendix A has some suggestions
    that you could use to get started. The material in this book would also work well
    as the basis for a summer camp session that would mix traditional sewing and crafting
    with some electronics and coding. One caveat is that the electronic components
    are delicate and pricey compared to traditional craft materials—they are not toys.
    Most manufacturers suggest a minimum age of 13 or so to use their products, with
    adult supervision, and we suggest the same.


    One of the challenges in fashion tech is that you need a lot of stuff. First,
    you need a sewing machine, or you need to stick to projects that start from an
    existing garment or that are small enough to hand sew.) You will need to purchase
    the electronic components required, and you will need access to 3D-printing services
    for those projects. We have tried to design the projects so that you can try things
    out with as little hardware as possible for any given project.


    The big temptation in doing a first project is to do something big and complicated.
    That is a bad idea, because without experience it can be very hard to debug projects
    that mix sewing, electronic circuits, and software. We devote almost a whole chapter
    (Chapter [10](#A371637_1_En_10_Chapter.html) ) to deconstructing our first collective
    project, which was far too ambitious, it turns out. To reduce the temptation,
    we provide first projects that are fun and open-ended so that you can add more
    if you would like, or stop when you feel you have a product you are happy with.'
