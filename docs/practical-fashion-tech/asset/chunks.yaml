    # 阿努克·维普雷希特


    荷兰设计师阿努克·维普雷希特（http://anoukwipprecht.nl）是在其作品中使用 3D 打印部件和材料的先驱。她近期设计的 Spider Dress
    2.0 在一定程度上是对英特尔爱迪生芯片的展示，该芯片用于控制这件连衣裙。裙子上装有传感器，当他人过于靠近时，传感器会发出信号，此时机械臂会做出威胁性的移动来驱赶闯入者。维普雷希特早期的作品包括法拉第连衣裙，该裙允许穿着者在舞台上与特斯拉线圈产生的高压进行互动，以及她网站上展示的众多其他作品。


    # 2016 年纽约大都会艺术博物馆慈善舞会


    纽约大都会艺术博物馆 2016 年的 Met Gala 主题与该博物馆服装学院的展览"Manus x Machina"（http://www.metmuseum.org/exhibitions/listings/2016/manus-x-machina）相呼应。这场年度盛会上展示了众多令人炫目的礼服和西装，展示了在一件礼服中使用大量部件所能达到的惊人效果。克莱尔·丹尼斯身着由欧根纱和光纤制成的惊艳的浅蓝色礼服，这件礼服在黑暗中会发光。它在灯光下美轮美奂，在黑暗中更是充满魔幻般的乐趣。这是一件由扎克·波森设计的独一无二的手工缝制精品。林非常想知道这件作品的制作动用了多少人力、耗时多久！


    该展览中的另一件作品由 Marchesa 品牌的设计师乔治娜·查普曼和凯伦·克雷格与 IBM 沃森超级计算机合作创作。这件作品由模特卡罗莱娜·库尔科娃展示，旨在成为一件"富有同情心的连衣裙"。其
    150 个 LED 灯会根据 Twitter 上粉丝的输入改变颜色。我们建议您花些时间浏览上一段中提到的大都会博物馆网站，从中获取灵感。


    # 纺织科技


    要实现真正的革命性变革，创新可能需要以活性织物的形式深入到纺织品层面。尽管这个术语可以表示许多不同的事物。一种可能性是嵌入微小的致动器，使其能够在织物内部产生运动，就像我们在第
    8 章中讨论的伺服电机在微观尺度上的版本。或者，一种活性织物可能从一开始就将电路编织其中。以下是一些更具前瞻性的创新实例。


    ## 生物逻辑


    假设人们可以拥有活的织物会怎样？在石井裕教授指导下，麻省理工学院有形媒体实验室的生物逻辑团队（http://tangible.media.mit.edu/project/biologic/）发现，枯草芽孢杆菌纳豆亚种会随大气湿度变化而膨胀和收缩。这种细菌在日本已被使用了一千年来制作豆制品纳豆，因此它并非新奇的外来生物体。


    该团队正利用这一特性来制造对湿度做出反应的织物。他们收获活细胞，然后将其生物打印成"合成生物皮肤"。采用这种生物皮肤设计的织物（图 13-5）会通过打开冷却通风口来对热量和湿气做出反应。因此，如果有人穿着由这种材料制成的功能性服装，它会在需要时自动打开通风口。该网站称，该团队正与运动服装制造商
    New Balance 合作。


    ```

    ![A371637_1_En_13_Fig5_HTML.jpg](img/A371637_1_En_13_Fig5_HTML.jpg)

    ```


    图 13-5. 生物逻辑织物。图片由麻省理工学院媒体实验室有形媒体集团提供。


    该团队还创造了一些更具奇思妙想的应用，例如干燥时折叠闭合且颜色暗淡的织物花朵（图 13-6），在被水喷洒后会改变颜色和形状（图 13-7）。


    ```

    ![A371637_1_En_13_Fig7_HTML.jpg](img/A371637_1_En_13_Fig7_HTML.jpg)

    ```


    图 13-7. 喷水后，图 13-6 中的花朵形状和颜色均发生变化。图片由麻省理工学院媒体实验室有形媒体集团提供。


    ```

    ![A371637_1_En_13_Fig6_HTML.jpg](img/A371637_1_En_13_Fig6_HTML.jpg)

    ```


    图 13-6. 干燥状态下的生物混合花朵。图片由麻省理工学院媒体实验室有形媒体集团提供。


    ## 雅卡尔项目


    谷歌的雅卡尔项目（https://atap.google.com/jacquard/）正将织物和服装转变为触摸屏。该项目由伊万·普皮列夫主导，正在创造一种新型的编织导电线。这种导线有多种颜色，可用于现有的工业织机和缝纫机，以实现服装的大规模生产。导电线连接到一个使用标准手表电池的小型蓝牙控制器，控制器可存放在口袋中。这使得织物或服装能够与各种设备协同工作，包括触摸屏、智能手机、其他媒体设备以及室内灯或恒温器。触摸传感器网格可以直接编织到服装中，这样用户就可以通过滑动袖子来发送信号，同时还可以控制
    LED 灯以引起穿着者的注意。


    # 服装遇上物联网


    在服装中乃至嵌入人体使用技术的想法，在科幻小说中已存在已久。尼尔·斯蒂芬森的著作《钻石时代：或，一位年轻女士的插图版入门书》（Bantam Spectra,
    1995）中描绘了用于制作服装（或任何东西）的"物质编译器"。在亚瑟·C·克拉克、弗兰克·赫伯特、雷·布拉德伯里等人的作品中还有更多例子。


    在电影《回到未来 2》中，马蒂·麦克弗莱拥有自动系带的鞋子和自动烘干的夹克。耐克公司终于在去年凭借其 HyperAdapt 自动系带鞋（http://news.nike.com/news/hyperadapt-adaptive-lacing）赶上了科幻潮流。


    如果自动化服装受到远程控制（或感知），事情会变得更加复杂。所谓的物联网（IoT）有多种定义。我们在此说明，物联网涉及世界上的某个物体（如鞋子、连衣裙、冰箱或恒温器）上的传感器或致动器，这些传感器或致动器连接到互联网，以便在远距离采取行动或报告数据。


    可穿戴设备和物联网的未来不仅限于健身、娱乐和时尚领域，还涉及健康和医疗领域。通信和界面开发的创新正在改善患者监测健康状况的能力。健身追踪器是这方面的早期例子，但更先进的设备已开始获批用于医疗用途，例如连续血糖监测仪，它可以无线传输糖尿病患者的血糖状态给佩戴者，并在需要时传输给护理人员（http://www.dexcom.com/products）。谷歌已经开发出嵌入芯片以感测葡萄糖水平的隐形眼镜。


    持续监测和通信的设备引发了一些隐私问题，但也可能使某些疾病患者过上更安全、更独立的生活。在我们看来，为独立生活的老年人设计的可穿戴传感器是一个特别有前景的领域。

