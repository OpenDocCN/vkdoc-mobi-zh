- fmt: '# Anouk Wipprecht


    Dutch designer Anouk Wipprecht (http://anoukwipprecht.nl) is a pioneer in the
    use of 3D-printed parts and materials in her creations. Her recent Spider Dress
    2.0 was partly a demonstration of the Intel Edison chip, which was used to control
    it. The dress involved sensors that could tell when others were too close, in
    which case robotic arms moved menacingly to fend off the interloper. Wipprecht’s
    earlier work included the Faraday Dress, which allowed the wearer to interact
    with the high voltage of a Tesla coil onstage, and a variety of other creations
    that can be viewed on her website.


    # The 2016 Met Gala


    The Metropolitan Museum of Art’s 2016 Met Gala was themed to align with the Costume
    Institute’s exhibit at the museum, Manus x Machina (http://www.metmuseum.org/exhibitions/listings/2016/manus-x-machina).
    This annual celebration was filled with dazzling gowns and suits showing what
    spectacular effects can be obtained by using large numbers of components in one
    dress. Claire Danes wore a stunningly beautiful light blue gown made from organza
    and fiber optics that lit up in the dark. It was lovely in the light and a magical
    delight in the dark. It was a one-of-a-kind, hand sewn confection designed by
    Zac Posen. Lyn would love to know how many people and hours it took to create!


    Another piece in this exhibition was created by Marchesa designers Georgina Chapman
    and Keren Craig in collaboration with the IBM Watson supercomputer. It was worn
    by model Karolina Kurkova and was meant to be a “compassionate dress.” Its 150
    LED lights would change color depending on fan input from Twitter. We suggest
    you spend some time perusing the Met’s website noted in the previous paragraph
    to get your own inspiration.


    # Textile Technologies


    For truly radical change, innovation may need to move down to the textile level
    in the form of active fabrics. That term can mean many different things though.
    One could embed tiny actuators that have the ability to make something move within
    the fabric, like microscopic versions of the servos we talk about in Chapter 8.
    Or perhaps an active fabric will just have circuits woven into it from the beginning.
    Here are a few examples of these farther-out innovations.


    ## bioLogic


    Suppose one could have living fabric? MIT’s Tangible Media Lab’s bioLogic team
    (http://tangible.media.mit.edu/project/biologic/) under the direction of Professor
    Hiroshi Ishii, has discovered that the bacterium Bacillus subtilis natto expand
    and contract relative to atmospheric moisture. This bacterium has been used for
    a thousand years in Japan to make the soy dish natto, so it is not an exotic new
    organism.


    The team is using this behavior to create fabric that responds to moisture. Living
    cells are harvested and then bio-printed into a “synthetic bio-skin.” Fabric that
    has been designed with this bio-skin (Figure 13-5) reacts to heat and moisture
    by opening cooling vents. So if someone is wearing performance clothing made of
    this material, it automatically opens up the vents when needed. The website says
    the team is collaborating with sports clothing maker New Balance.


    ```

    ![A371637_1_En_13_Fig5_HTML.jpg](A371637_1_En_13_Fig5_HTML.jpg)

    ```


    Figure 13-5. The bioLogic fabric. Photo courtesy of Tangible Media Group, MIT
    Media Lab.


    The group has also created more whimsical applications, like fabric flowers that
    are folded up and pale when dry (Figure 13-6) and change both color and shape
    when sprayed with water (Figure 13-7).


    ```

    ![A371637_1_En_13_Fig7_HTML.jpg](A371637_1_En_13_Fig7_HTML.jpg)

    ```


    Figure 13-7. After they are sprayed with water, the flowers in Figure 13-6 change
    both shape and color. Photo courtesy Tangible Media Group, MIT Media Lab.


    ```

    ![A371637_1_En_13_Fig6_HTML.jpg](A371637_1_En_13_Fig6_HTML.jpg)

    ```


    Figure 13-6. Bio-hybrid flower, dry. Photo courtesy Tangible Media Group, MIT
    Media Lab.


    ## Project Jacquard


    Google’s Project Jacquard (https://atap.google.com/jacquard/) is turning fabric
    and apparel into touchscreens. Headed by Ivan Poupyrev, the project is creating
    a new kind of braided, conductive thread. It comes in many colors and can be used
    in existing industrial looms and sewing machines to mass-produce clothing. The
    conductive thread is connected to a small Bluetooth controller, which uses a standard
    watch battery and can be kept in a pocket. This gives the fabric or garment the
    ability to work with all kinds of gadgets, including touchscreens, smartphones,
    other media devices, and house lights or thermostats. Touch sensor grids can be
    woven directly into clothing, so that a user can swipe a sleeve to send a signal,
    and LEDs and be controlled to get the wearer’s attention.


    # Clothing Meets the Internet of Things


    The idea of using technology in clothing and even embedded in the human body has
    been around for a long time in science fiction. Neal Stephenson’s book The Diamond
    Age:or, A Young Lady’s Illustrated Primer (Bantam Spectra, 1995) featured “matter
    compilers” to make clothes (or anything else). There are many more examples in
    books by Arthur C. Clarke, Frank Herbert, Ray Bradbury, and many others.


    In the movie Back to the Future Part II, Marty McFly has self-tying shoes and
    a self-drying jacket. Nike finally caught up to the sci-fi genre this year with
    its HyperAdapt self-tying shoes (http://news.nike.com/news/hyperadapt-adaptive-lacing).


    Things can get even more complicated if the automated clothing is controlled (or
    sensed) remotely. There are many definitions of the so-called Internet of Things
    (IoT). We will say here that the IoT involves sensors or actuators on something
    in the world (like a shoe, dress, refrigerator, or thermostat) that is then connected
    to the Internet to either take action or report data at a distance.


    The future of wearables and the IoT is not just in the areas of fitness, entertainment,
    and fashion, but also in the health and medical fields. Innovations in communication
    and interface development are improving patient’s abilities to monitor health
    conditions. Fitness trackers are the early examples of this, but more advanced
    devices are starting to be approved for medical use, like continuous glucose monitors
    that share a diabetic’s status wirelessly with the wearer and, if desired, caregivers
    (http://www.dexcom.com/products). Google has developed contact lenses with embedded
    chips to sense glucose levels.


    Devices that monitor and communicate continuously raise some privacy issues, but
    also may lead to safer, more independent living for those with certain medical
    conditions. Wearable sensors for the independent elderly seems to us to be an
    area of particular promise.'
