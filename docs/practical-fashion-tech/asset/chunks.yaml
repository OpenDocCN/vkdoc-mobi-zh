    ### Course Resources


    Many students have trouble with open-ended design and invention. The resources
    offered in this section may help. Define a project start point that is neither
    too broad nor too narrow. Suggesting that students create a simple prop or costume
    piece for an upcoming show, for instance, might be focused enough to get students
    started.


