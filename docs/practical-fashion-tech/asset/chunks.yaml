  trans: '

    ### 第二根导电线行程


    这根线从锅的顶部连接到`Gemma`上的接地（`GND`）引脚。使用与上一行程相同的技术来打结导电线，并缝制从锅顶层边缘到门襟顶部的连接。使此行程与第一根线平行，且不要让导电线行程相互接触。将门襟顶部缝制到`Gemma`的`GND`引脚上，连接到焊盘并打结。


    **注意**：`NeoPixel`上的孔比`Gemma`上的孔小。在开始下一行程之前，请检查你的针能否带着导电线穿过这些孔。


    ### 第三根导电线行程


    这根线从`NeoPixel`上的`“in”`箭头连接到`Gemma`的`D2`引脚，操作起来有点棘手，因为它需要从门襟上`Gemma`的下方穿过。将线打结，从围裙的背面将针穿过`“in”`箭头引脚，拉紧，然后紧贴焊盘将针刺入织物。重复此动作两到三次。使用小针脚，绣出一条通往`Gemma`中心上方门襟顶部的路线，确保它不与已创建的其他路线接触。将线缝至`Gemma`下方，并连接到底部的`D2`引脚。不要让针脚穿过口袋。连接到引脚并打结。


    ### 第四根导电线行程


    这根线将`NeoPixel`上的`+`连接到`Gemma`的`Vout`。重复与第三行程相同的过程，将线缝至门襟顶部，再缝至`Gemma`的`Vout`引脚。此连接无需在`Gemma`下方缝线。连接到引脚并打结。


    ### 第五根导电线行程


    最后，将`NeoPixel`上的`–`连接到锅的顶层。连接到`–`引脚，然后将线直直地向下缝到锅的顶层。确保只缝穿导电织物的顶层，而不是毛毡或底层。在锅的边缘打结。


    ### 收尾工作


    用裁缝粉笔在围裙上画出一道蒸汽旋涡。使用绣花针和白色绣花线，沿着粉笔线用小而直的针脚绣出蒸汽效果。你也可以用黑色绣花线为锅增添细节。不过，我们担心这可能会通过纽扣造成意外连接，也可能导致导电织物磨损，因此决定保持原样。


    检查你的连接，确保它们足够牢固且未与其他任何连接接触。使用透明指甲油固定所有线结，并修剪导电线多余的部分。


    将纽扣电池装入电池座，插入`Gemma`板，检查是否一切正常。如果不行，请仔细检查导电线行程和导电织物中可能短路的地方。按下`Gemma`上的复位按钮（假设你在缝制前已按本章前文提示将代码烧录到板上）。瞧！一个带计时器的围裙——干得漂亮！


    ## 实际应用


    我们以围裙为示例构建此项目，因为它易于缝制，并且我们认为在待客时展示它会很有趣。同样的电路也适用于体育场景，例如你可能想用几种颜色来显示单圈分段时间，或其他计时应用。


    如果你真的把它当作围裙使用（因此需要经常清洗），你可以将电路缝制在带有按扣或魔术贴的门襟上，这样你就可以清洗围裙的其余部分，同时使电子部件保持干燥。Adafruit
    表示，只要取出电池，它的`Gemma`处理器就可以清洗；如果你使用的是此处示例之外的硬件，请查阅制造商的规格说明。围裙在连接电池时不应弄湿，因此应更多地将其视为一件用于展示谈资的单品，而非在油污烹饪现场穿着的工作服。


    这段简化的代码会比实际需要更快地耗尽电池电量，因为它从未进入任何形式的睡眠模式。睡眠模式在`Gemma`上比较棘手，因为它处理中断（指示其停止当前工作并恢复做其他事情的信号）的能力有限。


    `Arduinos` 总体而言并非真正的计算机——它们一次只能做一件事，不像你的笔记本电脑或台式机，可以同时在多个程序间共享资源。由于各种技术原因，`Gemmas`在应对多任务处理方面尤为困难。尝试通过反复按下按钮来增加更多时间也会很有趣，但这需要过滤掉杂散按钮按下信号（即去抖），这超出了本章的范围。


    ## 总结


    本章通过一个简单示例，引导你运用了前几章关于缝纫（第 3 章和第 4 章）、电子（第 5 章）和编程（第 6 章）的技巧。关键要点是，项目执行的顺序很重要。当然，你应该先做一些规划，但你还应该详细确定项目要实现什么功能，用鳄鱼夹布置好电路，并编写和测试代码——按此顺序进行。


    只有在此之后，你才能开始裁剪布料，因为一旦你了解了你的电子元件将要做什么以及电路需要如何走线，你很可能会需要调整服装。我们详细讨论了所有这些步骤，制作了一个集成计时器的围裙，计时器运行时点亮`NeoPixel`一种颜色，时间到时则变为另一种颜色。这个项目应能让你体会到在接下来的章节中处理更复杂组件和项目时需要考虑的问题。


    # 第三部分

    进阶内容


    第 8 章至第 11 章将探讨比前几章更复杂的主题。第 8 章向你展示如何使用几种不同类型的传感器，使你的创作对周围环境做出反应，并为你指出若想让项目自主移动下一步该怎么做。


    第 9 章总结了 3D 打印流程，并给出了在哪里可以详细了解它的建议。第 10 章则展示了当一个过于雄心勃勃的第一个项目试图同时做太多事情时，可能会出现什么问题（我们确实遇到了）。


    最后，在第 11 章中，你将找到两个从相反方向着手制作的可穿戴技术大项目。第一个是大型缝纫项目（封面上的裙子），它使用电致发光（`EL`）带来照亮织物块之间的边界，但无需编程且电路设计需求最低。另一个项目则需要更多的电路设计和大量的代码，但缝纫量极少。它以一个现成的帽子为基础，添加一个缝制电路，使其在你摇头时亮红灯，点头时亮绿灯。因此，你可以根据自己最擅长的领域来选择一个有分量的项目。

    '
- fmt: '# 8. Sensors and Other Hardware


    Accessories that light up are pretty cool, but we can go a step farther. In this
    chapter Joan and Rich introduce you to a few different types of sensors—components
    that can detect some property of the real world, like temperature or light level.
    You can then program your Arduino to take the sensor reading and do something
    based on it. For example, in Chapter [11](#A371637_1_En_11_Chapter.html) we teach
    you how to make a hat that lights up different colors based on the angle of your
    head. In this chapter Joan and Rich talk you through some common sensors and how
    you might use them.


    You can also make soft objects or clothing that can move on its own—the “haunted
    dress” described in Chapter [10](#A371637_1_En_10_Chapter.html) is an example
    of this. But as we point out in that chapter, clothing that moves is pretty challenging.
    Using motors is more difficult than we really want to get into in detail in this
    book (mostly because of the power requirements), but we give you an overview of
    the issues and suggest some places to learn more in the “Making Things Move” section
    of this chapter.


    ## Sensors


    There are now many Arduino-compatible sensors on the market, devices that measure
    anything from ambient temperature and light levels through percentage of methane
    present in the surrounding air. Adafruit and Sparkfun sell many different kinds,
    and online retailers like Amazon offer a variety as well. One challenge, though,
    is that the hobbyist DIY user (that would be us!) is a miniscule market compared
    to the consumer products that these sensors are intended for, so the documentation
    sometimes can be sketchy at best.


    There are far fewer sewable sensors, and the ones that exist tend to be relatively
    expensive. However, the wearables are intended to be sewn on, and may be sturdier
    and more appropriately documented. What you decide to do will depend heavily on
    your application, experience level, and budget.


    We try out a photodiode, used for measuring ambient light, and a thermistor, for
    measuring temperature. Some amount of hunting around is involved to find out what
    to do with any particular sensor. In this chapter, we walk through examples of
    the process.


    Chapter [11](#A371637_1_En_11_Chapter.html) has an example of a gyroscope in a
    hat that knows the angle of the wearer’s head. We talk about gyroscopes, accelerometers,
    and magnetometers briefly in this chapter and then in Chapter [11](#A371637_1_En_11_Chapter.html)
    we apply some of that knowledge.


    **Note**


    We avoid needing to solder in the projects in this book. However, if you want
    to use sensors other than the ones we describe here, soldering might be the most
    practical option. We will show some ways to prototype without it, but the resulting
    circuits will be fragile. If you want to do a lot of work with sensors or (more
    so) with motors, you probably should find an online tutorial on soldering (for
    example, `https://learn.sparkfun.com/tutorials/how-to-solder---through-hole-soldering`)
    or perhaps a class at a makerspace near you.


    ### Creating a Circuit with a Sensor


    Depending on the sensor, you may need to know a bit about how a sensor works before
    you start searching for specifics, since there may be a standard equation to use
    to convert the signal the sensor reads to the actual temperature, pressure, or
    whatever the quantity of interest is. Many sensors (including thermistors and
    another similar type of resistive sensor called a photoresistor) change resistance
    in response to their environment—in the case of a photoresistor, to light levels.


    Because of that, they can act as part of a voltage divider. The sensor is placed
    in series with a known resistor (usually specified by the device’s manufacturer),
    and one reads an output voltage at a point between the two resistors. However,
    it can be a little tricky, because the voltage drop across a sensor that is a
    variable resistor is a function of both the series resistor’s resistance and whatever
    the sensor’s own resistance is at the moment (as well as the fixed voltage across
    the whole divider).


    The only voltage drop it “sees” (the voltage difference between its two leads)
    is the one it is creating, determined by whatever it is sensing. This makes picking
    the right series resistor (the “other resistor in the voltage divider”) crucial.
    Fortunately, there are some standards to help us.


    Other sensors work differently. A photodiode, for example, produces a small current
    in response to light. We will see one of these in action shortly.'
