  trans: "\n### 加载代码与使用感应帽\n\n要将 Arduino 草稿代码上传到 Flora 板，请通过 USB 将 Flora 板连接到电脑并上传（参见第\
    \ 6 章）。然后将其接入电池，并按下 Flora 板上的重置按钮。如果保持静止，你会看到它闪烁红色，然后熄灭。上下摇动时，NeoPixel 环应显示绿色灯光；左右摇动则应显示红色。如果你喜欢用单音节词回答问题，现在即使在房间另一头也能做到了！\n\
    \n## 发光 60 年代摩登连衣裙\n\n本章中的另一个项目采用了与第一个项目截然不同的方法。在这一部分，Lyn 将带你完成一个项目：根据她的规格制作纸样、缝制连衣裙，再添加一些电致发光（EL）丝带作为装饰效果。EL\
    \ 线（ [`https://en.wikipedia.org/wiki/Electroluminescent_wire`](https://en.wikipedia.org/wiki/Electroluminescent_wire)\
    \ ）是一种涂有磷光体的导线。通入交流电时，磷光体会发光。EL 丝带是 EL 线的扁平版本，适合附着在戏服上以产生发光效果。Lyn 首先会介绍设计的历史渊源，并讲解如何制作纸样以及为自己量体。接着，她会指导你如何缝制连衣裙并添加\
    \ EL 丝带。\n\n### 设计\n\n1965 年，伊夫·圣·罗兰设计了一系列连衣裙，采用 A 字版型，近乎无形状的宽松款式，以黑色线条分隔白色与三原色色块。这些连衣裙由羊毛针织布和厚重的丝绸制成，能够保持廓形而不紧贴穿着者身体。这一系列被称为“蒙德里安系列”——向现代艺术家皮特·蒙德里安以及整个现代艺术致敬。在\
    \ 20 世纪 60 年代的剩余时间里，这种造型的变体随处可见，并成为了那个时代的标志性风格。\n\n我不会使用羊毛或丝绸，连衣裙的剪裁会更宽松，领口也更舒适。我们会在保留原版连衣裙感觉的前提下，略微更新造型。这是一款极佳的\
    \ 20 世纪 60 年代风格戏服，属于中级缝纫项目。图 11-4 展示了制作完成的服装。\n\n![A371637_1_En_11_Fig4_HTML.jpg](img/A371637_1_En_11_Fig4_HTML.jpg)\n\
    \n图 11-4. 制作完成的摩登连衣裙，EL 丝带已点亮\n\n这种款式的连衣裙有多款纸样可供选择，例如这款：[`https://betsyvintage.com/index.php?main_page=product_info&products_id=120`](https://betsyvintage.com/index.php%3Fmain_page=product_info%26products_id=120)。\n\
    \n### 材料与工具\n\n制作这条连衣裙，你需要以下物品：\n\n-   布料（此纸样仅适用于弹力针织面料——推荐面料包括双面针织布、哑光平纹针织布、含氨纶的面料、纯棉\
    \ T 恤面料）。\n-   缝纫线。\n-   直针/针插。\n-   剪刀。\n-   缝纫机。\n-   牛皮纸或纸样纸。\n-   裁缝粉笔或水消笔。\n\
    -   软尺。\n-   两段 EL 丝带（也称为 EL 胶带），每段长一米，两端各带一个连接器（大多数 EL 丝带两端各配有一个连接器）。\n-   两个用于\
    \ EL 丝带/胶带的逆变器/电池盒，额定功率至少能驱动 1 米 EL 胶带，这相当于 4 米 EL 线的功率。（如果产品描述中提到的是 EL 线的长度，请将该数字除以\
    \ 4 以获得胶带的额定值。）\n-   电池（通常为 AA 或 AAA 型）。\n-   从逆变器连接到 EL 丝带的公母连接器，其中一个连接器长度需足以从蓝色带子连接到上方的水平条。如果你的逆变器没有多个输出端口，你还需要一个能连接两条\
    \ EL 丝带的“Y”形连接器，除非你想用三个逆变器。（仔细检查你购买的 EL 丝带和电池/逆变器上的连接器，以确保买到正确的型号。）\n\n这款连衣裙是一款无袖、A\
    \ 字版型的套头衫，没有拉链或纽扣。因此，使用弹力针织面料至关重要。如果你使用的面料在横纹方向上的弹性低于 35%，你将无法穿上它（请咨询面料店的工作人员，或按此规格在线订购）。\n\
    \n我在原版设计和色彩的基础上进行发挥，使其成为我们自己的作品。我们将使用白色 EL 丝带来强调接缝，因此连衣裙上的线条将是白色的。EL 丝带将置于白色布料制成的通道内，这些通道将连衣裙上的色块分隔开。\n\
    \n我选择了红色、蓝色和黄色作为三原色，但你可以选择任何你喜欢的颜色。我还使用了黑色来制作后背、右前胸上部、左中躯干以及裙摆下部的部分。我增加了一条低腰线或臀围带，这样就能为驱动\
    \ EL 丝带的电子元件和电池制作口袋。\n\n为了使连衣裙可水洗，我用白色布料制作了通道。这样就能轻松地将 EL 丝带穿入或抽出。\n\n> **注意**\
    \  \n> EL 线和丝带会产生高频音调，这可能会让一些宠物和能听到此声音的人感到不适。为减轻此影响，请避免用一个电源驱动过多的线材。它们还可能产生射频干扰，因此不要在射频干扰可能造成问题的环境中使用，例如医疗设备或科学硬件附近。对于舞台应用，请在完整的彩排中仔细测试这一点（以及其他电子元件）。\n\
    \n### 测量尺寸与制作纸样\n\n首先你需要仔细测量自己的尺寸。图 11-4 是一张示意图，标示了你将要在以下步骤中使用的各个测量点。\n\n> **提示**\
    \  \n> 如果这些说明过于复杂，你也可以购买一件合身的纯黑色 A 字版型连衣裙，并通过折叠、熨烫边缘然后明缝的方式，添加一些这些部件。或者，你也可以直接将\
    \ EL 丝带添加到另一条连衣裙上，但你需要找个地方放置逆变器和电池（或者将它们固定在腰带上）。\n\n#### 连衣裙前片尺寸\n\n首先我们将测量连衣裙前片的所有尺寸。下一节将处理后片的尺寸。字母对应图\
    \ 11-4 上的标签。\n\n对于上胸部和过肩部分，测量从\n\n-   肩顶到胸围线上方（A 点到 B 点）。\n-   身体左侧（通常是一件略微宽松\
    \ T 恤的侧缝位置）到左锁骨正下方（C 点到 D 点）。\n-   右侧缝到左锁骨正下方（D 点到 E 点）。\n\n对于中躯干部分，测量从\n\n- \
    \  胸围线上方到臀部（F 点到 K 点）。\n-   侧缝处的左臀到左锁骨下方的臀围线（K 点到 N 点）。\n-   右侧缝与左侧测量值相接（另一侧的\
    \ K 点到 N 点）。\n\n对于裙摆部分和低腰带，测量\n\n-   从臀围线到大腿中部（K 点到 Q 点）。\n-   测量臀围并加 3 英寸（作为缝份和宽松量，大约在图\
    \ 11-5 中标为 P 的位置）。\n\n![A371637_1_En_11_Fig5_HTML.jpg](img/A371637_1_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 连衣裙前片的测量标签\n\n-   将前片和后片裙摆的底边宽度设为你想要的宽度。裁剪一块 4 英寸宽、长度等于此测量值的长方形布料，作为底边带（图\
    \ 11-5 中标为 S 的部分）。\n"
- fmt: '#### Measurements for the Back of the Dress


    The back of the dress is pretty simple. You only need one measurement, really,
    from the neckline you want in the back to mid-thigh (shown in Figure [11-5](#A371637_1_En_11_Chapter.html#Fig5)).
    But make sure the back and the front measurements together allow for correct fit
    on the person wearing the dress by measuring all the way around the body and checking
    that the pieces collectively will fit (shown in Figure [11-6](#A371637_1_En_11_Chapter.html#Fig6)).
    If in doubt, make them a little larger and you can trim later after checking fit
    partway through.


    ![A371637_1_En_11_Fig6_HTML.jpg](A371637_1_En_11_Fig6_HTML.jpg)


    Figure 11-6.


    Measurement labels for the back of the dress Tip


    I bought about 1 yard of black fabric, 1/2 yard of red, 1/4 yard of blue, 1/4
    yard of yellow, and 1/2 yard of white. Buy a bit more than you need in case of
    mistakes.


    ### Creating the Pattern Pieces


    After taking all the measurements mentioned so far, use the drawings in Figures
    [11-7](#A371637_1_En_11_Chapter.html#Fig7) through [11-12](#A371637_1_En_11_Chapter.html#Fig12)
    to draw the pattern pieces onto butcher paper or other suitable paper. Make sure
    to add a seam allowance (5/8 inch or 1 inch, whichever is easier for you) on the
    paper before cutting it out and pinning the pattern pieces to the fabric. Note
    that the A and B labels on the front and back do not indicate the same point on
    the garment.


    ![A371637_1_En_11_Fig7_HTML.jpg](A371637_1_En_11_Fig7_HTML.jpg)


    Figure 11-7.


    Pattern pieces for the yoke: top piece black, bottom piece blue Tip


    Cut out the pattern pieces on paper and try lightly taping them together to see
    whether you like the effect before you commit to cutting out the pattern on fabric.
    Or you can try creating a smaller paper version to tinker with (at 1/12 scale,
    for instance) to see if you want to make modifications. See Chapter [4](#A371637_1_En_4_Chapter.html)
    for details on using a pattern.


    The neckline on this dress is somewhat higher than the dress shown in Figure [11-4](#A371637_1_En_11_Chapter.html#Fig4).
    I designed it so that you can either have a relatively conservative neckline or
    trim it some to be a little more rakish.


    Tip


    Unless otherwise stated, always pin and sew the fabric pieces with the right sides
    together. Always trim any seams that are more than 1/4 inch.


    ![A371637_1_En_11_Fig8_HTML.jpg](A371637_1_En_11_Fig8_HTML.jpg)


    Figure 11-8.


    Pattern piece for mid-torso: top piece red, bottom piece black


    ![A371637_1_En_11_Fig9_HTML.jpg](A371637_1_En_11_Fig9_HTML.jpg)


    Figure 11-9.


    Pattern piece for dropped waist band (blue) for pockets to hold electronics


    ![A371637_1_En_11_Fig10_HTML.jpg](A371637_1_En_11_Fig10_HTML.jpg)


    Figure 11-10.


    Pattern piece for skirt (black, will be under blue pocket band)


    ![A371637_1_En_11_Fig11_HTML.jpg](A371637_1_En_11_Fig11_HTML.jpg)


    Figure 11-11.


    Pattern piece for lower skirt band (yellow)


    A few special notes are in order for measuring the back. In addition to the measures
    shown in Figure [11-12](#A371637_1_En_11_Chapter.html#Fig12), also measure from
    side seam to side seam at mid back and across hips. Add 1 to 2 inches at the bust
    level for side seams and about 3 inches for seam and a bit of room at the hips.
    The back is cut on the fold so there is no back seam.


    ![A371637_1_En_11_Fig12_HTML.jpg](A371637_1_En_11_Fig12_HTML.jpg)


    Figure 11-12.


    Pattern piece for the back of the dress (black). Note that the A and B labels
    here are different from those in the front


    ### Making the Casings for the EL Ribbon and Wire


    The dress needs three casings for the three strips of EL wire. However, it is
    easiest to measure those later, when the dress is nearly assembled, but make sure
    you buy enough fabric for all three. You may also want to create a conduit for
    the wire that will run from the upper EL ribbon band to its battery/inverter in
    the blue band pocket—or you may just want to use some other means of managing
    that wire, depending on how often and how long you plan to wear it with the EL
    ribbon there. Other alternatives for the black casing might be just some loops
    to keep it from moving around too much (which is what I did in this demo dress),
    but a conduit would be more secure.


    ### Organizing the Pieces


    At this point, you should have all the pieces for the dress and the EL wire casings.
    Figure [11-13](#A371637_1_En_11_Chapter.html#Fig13) shows the major pieces and
    one of the casings in a test layout. Note that the blue band near the bottom of
    the skirt will be a patch pocket on top of the black band. In other words, the
    black band is sewn to the yellow band on the bottom and the red and black sections
    above it. The blue will ride as an additional double thickness on top of that,
    as a pocket to hold the batteries. You may want to review Chapters [3](#A371637_1_En_3_Chapter.html)
    and [4](#A371637_1_En_4_Chapter.html) if any of the steps here seem unfamiliar.


    ![A371637_1_En_11_Fig13_HTML.jpg](A371637_1_En_11_Fig13_HTML.jpg)


    Figure 11-13.


    Laying out the front of the dress


    ### Sewing the Front


    For the upper chest (yoke) pieces, pin the two pieces together along the front
    seam and sew them together using a straight stitch. Trim the seam and press it
    open. Next, pin and sew the mid-torso sections together along the front seam.
    Trim that seam and press it open.


    Match the vertical seam on the yoke and the vertical seam on the mid-torso piece
    and pin them together along the horizontal seam (with right sides together). Check
    that the sides of your pieces match when the vertical seams are lined up. If you
    need to trim a bit, that’s fine. But if your side seams don’t line up because
    one is smaller than the other, you may need to take one of the vertical seams
    out and redo it, or take one of them in a bit more—whichever way will make the
    garment fit is the right choice.


    Hold the pieces up to you in front of a mirror to check for appropriate fit. Once
    you are happy with it, pin and sew the yoke section to the mid-torso along the
    horizontal seam. Trim the seam and press it open. To finish the front, pin and
    sew the front skirt section to the mid-torso section along the horizontal seamline,
    and as always trim the seam and press it open. Pin and sew the front to the back
    at the shoulder seams. Trim and press the seams open.


    Note


    The neckline shown in the pattern is quite a bit higher than that in the dress
    demonstration we show here. You can start with this one and always trim a little
    if you want a lower neckline. We recommend the higher one for dress stability.'
