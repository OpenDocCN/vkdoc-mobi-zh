- fmt: '# Costuming


    Now that it is possible to make a more elaborate and professional-appearing costume
    at home, it is not surprising that cosplay—dressing up as and role-playing a favorite
    fictional character—has become something of a subculture, initially in Japan but
    rapidly spreading to the United States and elsewhere. Science fiction and other
    kinds of conventions often have cosplay fans attend as their favorite character.
    Anime and video game characters are favorite subjects. Given that, there are many
    opportunities where an otherworldly effect is desired, and the technologies in
    this book might be just the thing to take a cosplay costume to the next level.


    Historical costuming has always been popular. Renaissance Faires ([`www.renfaire.com`](http://www.renfaire.com))
    have popularized historical re-enactment of activities of the late Elizabethan
    era and dressing up as a person from that time. Visible electronics might be out
    of character, but there could be a dragon on your arm with glowing eyes or a head
    that turns toward the light.


    You may be reading this book for ideas on enhanced theatrical costumes, either
    for school productions (as Lyn talks about later in this chapter) or for professional
    use. At the school level, costumes likely need to be low-budget, assembled quickly,
    and easy to get in and out of for a ten-year-old with stagefright. A few strategic
    special effects enabled by electronics can make a costume memorable. For example,
    Lyn and her students added programmable glowing eyes to fish for The Little Mermaid.


    Finally, there are just plain dress-up costumes for parties, holidays, and so
    on. Figure [1-2](#A371637_1_En_1_Chapter.html#Fig2) shows custom-made, vacuum-formed
    (Chapter [13](#A371637_1_En_13_Chapter.html)) plastic armor as it looks in a box,
    and in Figure [1-3](#A371637_1_En_1_Chapter.html#Fig3) it briefly transforms Sir
    Rich to his true knight-errant identity.


    ![A371637_1_En_1_Fig3_HTML.jpg](A371637_1_En_1_Fig3_HTML.jpg)


    Figure 1-3. The armor fitted on our knight-author


    ![A371637_1_En_1_Fig2_HTML.jpg](A371637_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. Plastic armor in its box


    Some costume elements such as masks (Figure [1-4](#A371637_1_En_1_Chapter.html#Fig4))
    or a period dress can take a person to another place and time. If you have a fantasy
    costume anyway, why not mix it up and make it interactive? (Armor and masks courtesy
    of Make Believe in Santa Monica, California; we talk more about them in Chapter
    [2](#A371637_1_En_2_Chapter.html).)


    ![A371637_1_En_1_Fig4_HTML.jpg](A371637_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Masks


    Maybe you are not looking to make a costume, per se, but are looking to do something
    functional—a wall hanging that lights up as a night light when it gets dark, maybe,
    or strategic LEDs inside a bag so you can find your keys at night.


    Our point in all this is that the first step in applying the technologies in this
    book is to think about what you are trying to do and how you want it to look.
    Too often people start out wanting to use a technology for its own sake, but that
    often does not end well. Just because it is possible to make an interactive garment
    or art piece, why should you?


    If you are reading this book you may be planning to build costumes like those
    we just described. Or you may have been asked to develop a class for high school
    or college students. If you are a teacher or parent, fashion tech projects can
    be a good way to convince students who otherwise might have been scared off electronics
    or programming to give them a try, motivated by the final product.


    # Our Design Philosophy


    We (Joan, Rich, and Lyn) came into this field from very different directions.
    Rich is a Millennial who grew up designing electronic projects (including one
    of the forerunners of today’s consumer 3D printers and a small, elegant 3D printer
    still being sold by a company Rich and Joan used to work for—you can see one in
    Chapter [9](#A371637_1_En_9_Chapter.html)). He likes to make things for their
    own sake, the usual definition of a hacker. (In the circles we travel in, hacker
    does not have a negative connotation. The people who do bad things with their
    skills are called black-hat hackers.) Rich is very detail-oriented and has encyclopedic
    knowledge of the hardware and software we cover in this book.


    Joan comes to this as a recovering rocket scientist, and her role is to keep the
    big picture in mind and think about how to avoid going into too much detail in
    any one technical area. She worked on spacecraft to other planets, where one tiny
    mistake could cause disaster. So she brings structure and experience working on
    complicated systems, and also the desire to make explanations as simple as possible
    (while still being correct).


    Lyn comes with long experience making costumes for middle and high school productions.
    Besides the ability to apparently whip up costumes out of a pile of fabric plus
    thin air, she has a sense of humor and a keen eye for when a small detail might
    make all the difference. She has also taught sewing in a classroom and so knows
    what pitfalls might arise.


    The three of us take turns guiding you through the book and switch into first
    person for much of the book when we focus on one person’s particular expertise.
    Sometimes we collaborate too closely for any one of us to take the lead, and there
    (as we do here) we will just say we.


    We are walking through our backgrounds here (there is more in the “About the Authors”
    section at the front of the book) because we suggest that you build a team to
    work on your first projects that has all these aspects, though not necessarily
    spread across the team the way it happens to be with the three of us. Good chemistry
    and a sense of humor are also important for a team to have. Sometimes things just
    come out looking silly, and you have to laugh, figure out what went wrong, and
    not do that again. At other times you may need to let one of your team members
    go off in a corner and try things for a while. But if one of us got stuck, we
    found it valuable to articulate what the problem was to the others, and we could
    go back to first principles and try to think about what we were trying to accomplish.


    # Planning Your Projects


    There are many books out there that cover different aspects of making a fashion
    tech project, and many projects on the Internet that you can try. We felt an orderly
    path was missing, starting with the basics of sewing, plus electronics hardware
    and software, to allow someone who knows very little about the skills needed to
    get started on projects.


    We always emphasize the idea of system design. It is very easy to come up with
    a great idea for part of a project, but doing that part the way that you would
    if it was not incorporated into something wearable might be very different than
    the way you should start out to incorporate it into a dress or hat. We cannot
    emphasize enough the need to plan out a complex project end-to-end ahead of time.
    Chapter [10](#A371637_1_En_10_Chapter.html) tells the story of the first project
    we did together in which we largely ignored this principle—even though all three
    of us knew better.


    In this book we cover the basics of sewing (including making and using patterns),
    creating electronic circuits, and programming. These are the core skills of most
    fashion tech projects, and we go into considerable depth on each one. We have
    laid the chapters out in the order you would most likely create a project: sewing
    first, then figuring out the circuitry, and then programming it if needed. We
    guide you in managing complexity in your projects and give you tips on how to
    avoid being overwhelmed if your project does not work.'
  raw: '## Costuming


    Now that it is possible to make a more elaborate and professional-appearing costume
    at home, it is not surprising that cosplay—dressing up as and role-playing a favorite
    fictional character—has become something of a subculture, initially in Japan but
    rapidly spreading to the United States and elsewhere. Science fiction and other
    kinds of conventions often have cosplay fans attend as their favorite character.
    Anime and video game characters are favorite subjects. Given that, there are many
    opportunities where an otherworldly effect is desired, and the technologies in
    this book might be just the thing to take a cosplay costume to the next level.


    Historical costuming has always been always popular. Renaissance Faires ( [`www.renfaire.com`](http://www.renfaire.com)
    ) have popularized historical re-enactment of activities of the late Elizabethan
    era and dressing up as a person from that time. Visible electronics might be out
    of character, but there could be a dragon on your arm with glowing eyes or a head
    that turns toward the light.


    You may be reading this book for ideas on enhanced theatrical costumes, either
    for school productions (as Lyn talks about later in this chapter) or for professional
    use. At the school level, costumes likely need to be low-budget, assembled quickly,
    and easy to get in and out of for a ten-year-old with stagefright. A few strategic
    special effects enabled by electronics can make a costume memorable. For example,
    Lyn and her students added programmable glowing eyes to fish for The Little Mermaid.


    Finally, there are just plain dress-up costumes for parties, holidays, and so
    on. Figure [1-2](#A371637_1_En_1_Chapter.html#Fig2) shows custom-made, vacuum-formed
