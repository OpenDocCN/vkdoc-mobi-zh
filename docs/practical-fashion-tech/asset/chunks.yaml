- fmt: '# A Few Last Words


    As adoption of new technologies becomes faster and faster, one of the biggest
    challenges in all areas is making and keeping the technology useful, efficient,
    and desirable. As electronic components become smaller and smarter, it is easier
    to use them in everyday garments and accessories. It is important, though, to
    keep the person wearing your garment or accessory in mind.


    One of the things we have tried to emphasize in this book is to think through
    ahead of time how the garment will be used and whether the technology you are
    thinking about will work in the environment where it will be used.


    We started this book with some philosophy about wearable tech and what makes a
    good costume. Then we moved on to teaching basic skills in the areas you need
    for wearable tech, concluding in our apron project. Next we took you through sensors,
    3D printing, and a cautionary tale about what could go wrong if your first project
    was overly ambitious. In the latter chapters we laid out more ambitious projects,
    discussed other technologies you can use, and offered a glimpse at where researchers
    may lead us next.


    Even after all that, though, some basic principles from the first chapters still
    apply. Whether you are making a stuffed animal that lights up to make a friend
    laugh or a complex art piece, think about the following points as you lay out
    your design:


    * Is it as simple as it can be? There is a temptation to make things more complicated
    than they need to be.

    * Walk through how someone will move in the garment in detail and think about
    what might catch, break, wear out, or short. The projects in this book were designed
    for indoor use; consider the overall environment and how you can remove electronics
    and batteries for weather and laundry.

    * Do you know how to finish your project, or are there things you need to learn?
    If there are things in your project that are just an abyss to you now, you may
    want to learn some of those things first and then do the familiar things. Often
    people do not finish something because they do the part they know about first
    and discover they should have done that part differently to accommodate the new
    component. Then the whole thing lies in a corner for years.

    * Try to work in teams. It is hard to be awesome at sewing, electronics, and coding.
    Some people are, but most people need a few helpers to get by. If you are in a
    city with a makerspace doing this sort of stuff, you might consider joining it.
    The three of us were able to create projects that none of us could have considered
    alone.

    * Share your ideas! Most of the technologies we talk about in this book are primarily
    based on the work of open source communities. We link to those communities in
    the book where we encounter them. The best way to thank people who have done all
    that work in the past is to build on it and share when you do.


    We hope you have enjoyed this book and feel that you have learned a lot. Now go
    out there and make something cool—and then teach someone else how to make it,
    too.


    # Summary


    In this chapter we looked at professional fashion applications of technologies
    discussed elsewhere in this book. We also introduced new textile-level technologies
    that could make embedding actuators or sensors literally seamless. Finally, we
    ended with a few ideas about good design practices, looking back at the path the
    book has taken.


    # Appendix A: Teaching Fashion Tech


    For those who want to teach a fashion tech class that covers much of the material
    in this book, this appendix lays out some of the things you might want to think
    about. We also have laid out some sample course details based on the projects
    in this book.


    The material in this appendix is based on lessons learned by Lyn over many years
    of teaching a variety of classes at the high school level, and on Joan’s experience
    teaching undergrads and grad students. We are also drawing on anecdotal evidence
    the three authors have of the results of various colleagues’ experiments, as well
    as on a pilot version of a fashion tech costuming class that Lyn taught with Joan
    and Rich as consultants.


    ## Course Objectives and Grading


    A year-long class at the high school level or a two-semester college elective
    might have a course description, learning objectives, and grading criteria something
    like that covered in this section. A good way to structure a class like this is
    to teach through progressively more difficult projects. Lecture in isolation does
    not work all that well. Teaching project-based curricula also allows students
    to move at their own pace and enables more-experienced students to do harder projects
    (or coach less-experienced students).


    ### Course Description


    Participants create a series of projects, theoretical and practical, to help understand
    the processes involved in designing and creating costumes. Students will develop
    and improve skills in conceptualizing and rendering that will facilitate ways
    of thinking about costuming and how it relates to a dramatic production. They
    will also be required to learn the basics of circuits and coding, including implementing
    at least one fashion tech project. Each project will pass through several iterations
    and presentations for discussion and critique by faculty and peers, perhaps supplemented
    by external reviewers.


    ### Learning Objectives


    In a fashion tech class, students will accomplish some or all of the following
    learning objectives. For a college class, one might go heavier on the principles,
    and in a high school class, lean more on the hands-on assembly.


    * Learn the fundamentals of hand and machine sewing.

    * Understand elements of circuit design and programming for creating wearables
    using Arduino-compatible electronics.

    * Learn the process of designing and 3D printing custom objects.

    * Appreciate the process of costume design and its historical context.

    * Learn what techniques are suitable for the beginning designer/maker and how
    to acquire skills not necessarily explicitly taught in the class.

    * Learn how to approach and solve design challenges and problems, and how to interpret
    and apply the principles and elements of good design and construction to creating
    costumes and other projects.


    ### Grading Criteria


    It is always a challenge to grade how well students have met learning objectives
    like the ones just mentioned. Quizzes or skill demonstration could work for the
    skill sections, but by and large projects seem to us to be a better way of seeing
    how well skills have been learned. In addition to regular, formal evaluation,
    a lot of learning happens during critique and sharing of constructive criticism
    on each iteration of a project, by both the faculty member and the students.


    With subjective course objectives like these, it is challenging to come up with
    any one-size-fits-all rubrics other than the general criteria noted. A faculty
    member can also evaluate a student’s effort based on class participation, attendance,
    and the level of craftsmanship and improvement exhibited in a student’s completed
    projects.


    **Tip**


    “Success” may not mean a perfect project. Students start at different places,
    so they need to feel successful if they have grown over the year, without being
    compared to other students who are at a more advanced level.


    ## Logistics Issues


    Project-based classes—particularly ones that might span multiple departments—often
    pose logistical challenges. In this section we suggest some things to think about
