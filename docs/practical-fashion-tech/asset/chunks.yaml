- fmt: '# Fashion Tech Considerations


    Allow space for wiring, batteries, and other components as you are planning, cutting
    out, and sewing your garment. You may want to add a pocket, a channel of fabric,
    or some other way to conceal and contain the tech pieces.


    Pre-planning the run of any wiring will help prevent some mistakes and, hopefully,
    allow you to solder or connect them without ripping out seams. Even making a mockup
    of the piece first with cheaper fabric or scraps will allow you to keep the final
    garment in good shape.


    It is important, too, to consider whether you will need to prevent your runs of
    conductive thread or fabric from shorting out your circuit. Beware of drapey or
    loose clothing with a lot of circuit lines.


    ## Summary


    This chapter discussed choosing patterns, various types of fabric, and how to
    measure for correct fit, and suggested some websites and stores where you can
    buy supplies. We also discussed how to pin and cut out sewing patterns and basic
    shapes of garment pieces for creating patterns. It included the directions for
    making the simple, unlined vest—our first project.


    # 5. Wearable Tech Electronics


    In Chapters [3](#A371637_1_En_3_Chapter.html) and [4](#A371637_1_En_4_Chapter.html),
    Lyn gives you a tutorial on sewing and the skills to make the fabric “wearable”
    part of a project. In this chapter and Chapter [6](#A371637_1_En_6_Chapter.html)
    Joan and Rich introduce you to the “tech” part of a wearable tech endeavor. This
    chapter introduces the fundamentals of the electronics hardware you will need
    for projects later in the book. Chapter [6](#A371637_1_En_6_Chapter.html) adds
    the software basics about how these electronics operate.


    **Note**


    If you want to learn to sew (as Lyn describes in Chapter [3](#A371637_1_En_3_Chapter.html))
    there are good video tutorials, and the skills are somewhat separable and easier
    to learn in bite-sized gulps. Here, however, you need a certain minimal base to
    get going on the electronics side of wearable tech design. Rich and Joan give
    an overview in this chapter, but there are many (too many?) resources out there
    you can look at for more. In particular, [`http://arduino.cc`](http://arduino.cc)
    and [`www.instructables.com`](http://www.instructables.com) are good places to
    learn about the basics of the Arduino ecosystem, and many manufacturers, such
    as Adafruit ([`http://learn.adafruit.com`](http://learn.adafruit.com)) and SparkFun
    ([`http://learn.sparkfun.com`](http://learn.sparkfun.com)), provide extensive
    tutorials supporting their basic products. A basic electronics textbook might
    help, too; you might check your local library for what they have on hand and see
    what fits your current level of knowledge.


    ## Circuit Design


    The first thing that happens when you start to learn any new field is that you
    have to learn a lot of vocabulary in a hurry. Neither of us is particularly a
    fan of lists of words, so in this section we will define key concepts by talking
    about them in context.


    The first word you need to know is `Arduino`. (And yes, it really is named after
    a bar in Ivrea, Italy). It is an open source platform (a standard other people
    can design on top of) that includes a family of microcontroller boards and Integrated
    Design Environment (IDE) software that you will learn in Chapter [6](#A371637_1_En_6_Chapter.html).
    Figure [5-1](#A371637_1_En_5_Chapter.html#Fig1) shows one of the common `Arduino`
    boards. Figure [5-2](#A371637_1_En_5_Chapter.html#Fig2) is a version from the
    `Fritzing` program (discussed later in the chapter) along with a breadboard and
    some circuit components. We will talk about breadboards in a minute.


    ![A371637_1_En_5_Fig2_HTML.jpg](A371637_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. An `Arduino` (blue circuit board) and a circuit on a breadboard


    ![A371637_1_En_5_Fig1_HTML.jpg](A371637_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. An `Arduino`


    A microcontroller like an `Arduino` is not quite a computer like the Mac, Windows,
    or Linux machine you are used to. Microcontrollers typically control something
    that is not overly complicated. Although there are ways around it, normally they
    just execute one set of instructions over and over, and cannot switch back and
    forth between several programs or apps the way your laptop or smartphone can.
    However, this capability is plenty to run your item of clothing.


    An `Arduino` has `pins`, electrical contacts on the circuit board. Female headers
    are permanently attached to the board so that you can insert jumper wires or male
    pins from other boards. (Boards intended to be soldered have different arrangements.)


    An `Arduino` board also has a `USB` connector that can be used both to power the
    board and to send code to it. You will learn a lot more about these `pins` and
    how they work in Chapter [6](#A371637_1_En_6_Chapter.html). For the moment, we
    are just going to use the `Arduino` as a glorified power supply to run a circuit.


    ### Breadboards


    The white rectangular thing with holes in it in Figure [5-2](#A371637_1_En_5_Chapter.html#Fig2)
    is called a breadboard. A breadboard is intended to make it easy for you to create
    circuits—combinations of electronic components that do something.


    The groupings of holes on a breadboard represent electrical connections. Circuits
    work by flowing electricity through components and wires. Voltage is the difference
    in electrical energy between a given place in a circuit and a reference level
    (which, if you were trained as a physicist, you might want to think of as a difference
    in potential energy between those points). (The Figure [5-2](#A371637_1_En_5_Chapter.html#Fig2)
    diagram and others in this chapter were created in the `Fritzing` software—see
    [`www.fritzing.org`](http://www.fritzing.org).)


    Current is the flow of electricity from one point in a circuit to another point
    at a different voltage. Resistance to a current can cause a voltage drop between
    two points. Voltage, current, and resistance are connected together by an equation
    called Ohm’s Law, which we talk about in the next section.


    The power rail (or power bus) and ground rail (or ground bus) on a breadboard
    are the vertical groupings of holes usually marked `+` and `–`, respectively,
    or with red and blue vertical lines as in Figure [5-2](#A371637_1_En_5_Chapter.html#Fig2).
    They are used as places with standard voltages that we will call HIGH (typically
    5 volts, labeled `5 V` on the `Arduino`) and LOW (ground, or zero volts, abbreviated
    `GND` on the `Arduino`).


    The horizontal rows of five pins each are only connected within these sets of
    five pins. There is no connection between the five pins on either side of the
    gap. The gap is there so that you can put the pins of dual in-line package (DIP)
    components (a common format for integrated circuit chips) across it. Here you
    can see a black button crossing the gap.


    We go over all the other components you can see here—jumper wires, an LED, a button
    switch—in the upcoming sections.


    **Note**


    You may have a wearable electronics board like a `Gemma`, `Flora`, or `Lilypad`
    that is “Arduino compatible” and looks different from the board in Figure [5-1](#A371637_1_En_5_Chapter.html#Fig1).
    Some of the basic concepts are easier to see with a traditional `Arduino` and
    a breadboard than on the wearable boards, where some of the problems we are about
    to describe are hidden from you most of the time. We are preparing you for those
    other times when you will need to know what the board is trying to do so you can
    work around it. It is not necessary to have a standard `Arduino` board and breadboard
    to follow along with this chapter, but if you want to, you might buy a beginner
    `Arduino` kit (so you get all the parts you will need) from a supplier like [`www.sparkfun.com`](http://www.sparkfun.com)
    or [`www.adafruit.com`](http://www.adafruit.com). Otherwise, just follow along
    here and you will be better prepared to appreciate what your wearable components
    are doing for you.'
