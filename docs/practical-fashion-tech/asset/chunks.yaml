  trans: '

    ### EL 彩带与礼服布线


    现在我们来准备 EL 彩带。你可以用剪刀裁剪 EL 彩带，但每段末端都需要有一个连接器，否则无法工作。以图 11-22 中的彩带为例，我将一根 1 米长的彩带剪成了两段（一段稍长于另一段），这对于两条水平带状装饰来说长度刚好合适。


    ![A371637_1_En_11_Fig22_HTML.jpg](img/A371637_1_En_11_Fig22_HTML.jpg)


    图 11-22. 裁剪前的 EL 彩带


    EL 彩带需要逆变器和电池组来供电。你可以用图 11-23 所示的一个较大（4 节电池）电池组来驱动这样两条短彩带。通过一根 Y 形连接线，一个电池组可以驱动两条彩带。这件礼服我用了两个这样的电池组。


    ![A371637_1_En_11_Fig23_HTML.jpg](img/A371637_1_En_11_Fig23_HTML.jpg)


    图 11-23. 所需的逆变器/电池组及连接线（带两个连接器）


    EL 彩带背面有一层带胶的离型纸，设计初衷是让你可以直接将其粘贴到需要照明的物体上。然而，这层离型纸并不牢固，因此建议将其撕掉，换上一层普通胶带。将彩带线的末端修剪得稍微圆润一些，以便更容易插入外壳中（图
    11-24）。最后，将 EL 彩带插入其外壳中（图 11-25）。


    ![A371637_1_En_11_Fig25_HTML.jpg](img/A371637_1_En_11_Fig25_HTML.jpg)


    图 11-25. 将 EL 彩带插入外壳


    ![A371637_1_En_11_Fig24_HTML.jpg](img/A371637_1_En_11_Fig24_HTML.jpg)


    图 11-24. 用胶带覆盖彩带的粘性面


    先将下方的水平 EL 彩带插入其外壳，最后再插入垂直的那条。注意不要缝合任何交叉处的外壳。将逆变器塞入礼服蓝色部分的口袋中（图 11-26 和 11-27）。试穿礼服，观察各部分的下垂效果。


    ![A371637_1_En_11_Fig27_HTML.jpg](img/A371637_1_En_11_Fig27_HTML.jpg)


    图 11-27. 逆变器完全塞入前的状态


    ![A371637_1_En_11_Fig26_HTML.jpg](img/A371637_1_En_11_Fig26_HTML.jpg)


    图 11-26. 将一个逆变器连接到两条水平 EL 彩带上，另一个（在你的右侧）连接到垂直彩带上


    ### 收尾工作


    此时，试穿礼服并轻轻活动。EL 彩带容易从外壳中滑出，因此你可能需要缝上几个线圈来固定它。如果你需要大幅度活动，可能还需要为电源线缝制一个通道。当你对微调效果满意后，可以取下
    EL 线并添加一个线管。或者，想出适合你的线材管理方案，但要记住线材不会拉伸，而礼服会。坐下时要小心！


    如果这套服装仅用于一次戏剧演出，你可以只为线材缝几个线圈。操作时请关闭电源，并记住可能需要剪掉部分线材以便清洗衣物。清洗衣物前，请取下 EL 彩带和电源。


    你可以添加按扣或其他闭合件，以防止装有逆变器的口袋敞开。


    ### 药盒帽的制作


    这是我对标准 60 年代药盒帽的诠释，旨在与礼服搭配并相得益彰。按此方法制作的帽子直径为 6.5 英寸（周长 20 英寸），高 2 英寸，如果你的头发较短，佩戴起来应该相当稳固。你需要以下材料：


    -   布料（使用礼服的剩余布料，或根据需求另购）。我使用了 4.5 英寸 × 16 英寸的黑色布料，和 4.5 英寸 × 7 英寸的黄色布料，另外还需要一个直径
    8.5 英寸的圆形布料来覆盖帽顶（布料要足够，以便留出边缘用胶带或胶水固定）。

    -   一个直径 6.5 英寸的中等厚度圆形硬纸板，用作帽顶。

    -   一块 21 英寸 × 2 英寸的硬衬布，或一块 21 英寸 × 8 英寸的高强度衬布（折叠成 21 英寸 × 2 英寸的条状）。注意，硬衬布是一种用于制帽的硬挺材料。请在网上或布料店寻找这种材料或高强度衬布。

    -   胶带、纺织胶水或热熔胶枪及胶棒。

    -   缝纫机。

    -   手缝针和线。

    -   强力剪刀。

    -   直尺和卷尺。

    -   铅笔或记号笔。


    #### 裁剪部件


    我用一个直径 6.5 英寸的圆形作为帽顶。在硬纸板上画出帽顶圆形并用剪刀剪下。剪一块比帽顶圆形大 2 英寸的圆形布料。为使布料整齐贴合，在布料圆形边缘的几处剪几个小口，然后将它们重叠在基底材料圆形的背面（图
    11-28）。用胶水或胶带固定，并晾干（如果用胶水的话）。如果你使用的是硬衬布，也可以用缝纫代替。不要尝试缝纫硬纸板。


    ![A371637_1_En_11_Fig28_HTML.jpg](img/A371637_1_En_11_Fig28_HTML.jpg)


    图 11-28. 修剪帽子顶部布料的边缘


    裁剪一条 21 英寸 × 2 英寸的硬衬布条，以制成 2 英寸高的帽子。我需要 4.5 英寸 × 16 英寸的黑色布料条，和 4.5 英寸 × 7 英寸的黄色布料条。这样帽子将有四分之一是黄色的，形成一个鲜明的时尚声明，通过黄色点缀将礼服和帽子联系起来。


    #### 组装帽子


    将帽子侧面的黄色和黑色部分缝合在一起，并熨平接缝。拿起硬衬布条，或将衬布折叠成条状并别针固定，如图 11-29 所示。将布料覆盖在布条上并别针固定。如果使用衬布，在布料覆盖上去别针的同时，取下衬布上的别针（图
    11-30）。沿帽子内侧手缝接缝。


    ![A371637_1_En_11_Fig30_HTML.jpg](img/A371637_1_En_11_Fig30_HTML.jpg)


    图 11-30. 继续组装帽子侧面


    ![A371637_1_En_11_Fig29_HTML.jpg](img/A371637_1_En_11_Fig29_HTML.jpg)


    图 11-29. 组装帽子侧面


    最后，将帽子顶部手缝到侧面，并缝合侧边接缝（图 11-31）。现在，你就拥有了一顶药盒帽（图 11-32）！


    ![A371637_1_En_11_Fig32_HTML.jpg](img/A371637_1_En_11_Fig32_HTML.jpg)


    图 11-32. 制作完成的帽子


    ![A371637_1_En_11_Fig31_HTML.jpg](img/A371637_1_En_11_Fig31_HTML.jpg)


    图 11-31. 连接帽子的顶部和侧面


    ### 其他方案


    完整的套装如图 11-33 所示。你可以看到，礼服的电子设备重量使其有些下垂。你可以考虑另一种设计，将电池放在 20 世纪 60 年代流行的摩登风格腰带中，或者通过在从肩膀到蓝色低腰腰带的几个关键位置添加硬衬布条来加固礼服，以防止下垂。你也可以将前片做成一体式，然后将彩色面料块缝在上面。线材管理是此设计的一个挑战，你应多尝试几种方法，找到在礼服垂坠感、EL
    彩带硬度和电池组重量之间取得最佳平衡的方案。


    ![A371637_1_En_11_Fig33_HTML.jpg](img/A371637_1_En_11_Fig33_HTML.jpg)


    图 11-33. 整体效果


    ## 总结


    本章介绍了两个截然不同的最终项目：一个使用现成的帽子并添加了一些电子元件，另一个则无需任何编程，但需要一些精巧的缝纫技艺。这两个项目的意图是涵盖你在本书中学到的关于构造技术的应用。最后几章将回顾你可能考虑探索的其他技术，并对未来的发展进行一些展望。

