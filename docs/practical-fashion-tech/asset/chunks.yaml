- fmt: '# The Sensor


    This project uses a sensor that has a three-axis gyroscope, accelerometer, and
    magnetometer. That means it can sense rotation around any of three axes at right
    angles to each other, whether that rotation is getting faster in any direction
    at the moment, and its absolute direction (relative to north, if there is no interference
    from other things). The way the sensor was mounted, any one of these three types
    of sensors could have been used, but the gyro turned out to be the easiest by
    far because it did not require comparing new data to previous data. We use the
    sensor in a way that does not count on knowing the values output by the sensor
    to any great precision, but rather on knowing whether the garment is rotating
    in one of two axes (corresponding to shaking one’s head “yes” or “no.”) The sensor
    needs to be at the front center of the hat, oriented vertically, as shown in Figures
    [11-1](#A371637_1_En_11_Chapter.html#Fig1) and [11-2](#A371637_1_En_11_Chapter.html#Fig2),
    for this sketch to work properly.


    ![A371637_1_En_11_Fig2_HTML.jpg](A371637_1_En_11_Fig2_HTML.jpg)


    Figure 11-2. Orientation of the sensor and circuit layout on the hat


    # Materials


    The hat requires the following materials:


    *   A hat of substantial canvas or cotton (not conductive fabric).

    *   An Adafruit 16 NeoPixel ring (a strip of 16 pixels or a smaller number of
    individual sewable pixels would work too).

    *   A Flora microcontroller board.

    *   Conductive thread and a needle.

    *   Ordinary (nonconductive) sturdy thread and a needle.

    *   USB cable to connect the Flora to a computer (to upload the program).

    *   A Flora sewable LSM9DS0 accelerometer, gyro, and magnetometer 9-degree-of-freedom
    sensor.

    *   A battery that can plug into the Flora (with a micro USB output) that can
    deliver 5 V and at least 400 mA. Here we used a small, flat micro USB power bank,
    but you could also use a lipstick USB battery (you will need a USB-to-micro USB
    cable).


    **Tip:** For more on this sensor, see [`https://learn.adafruit.com/adafruit-lsm9ds0-accelerometer-gyro-magnetometer-9-dof-breakouts/pinouts`](https://learn.adafruit.com/adafruit-lsm9ds0-accelerometer-gyro-magnetometer-9-dof-breakouts/pinouts).


    # Creating the Circuit


    This sewable sensor is pretty simple to use. However, you will need to put it
    in the orientation shown in Figure [11-2](#A371637_1_En_11_Chapter.html#Fig2)
    for it to work correctly. The `z` axis marking should be at the lowest point,
    and the sensor should be on the hat such that it will be straight up and down
    when the hat is worn. Figure [11-2](#A371637_1_En_11_Chapter.html#Fig2) shows
    the circuit layout as sewn, and Figure [11-3](#A371637_1_En_11_Chapter.html#Fig3)
    gives a Fritzing diagram of the connections.


    ![A371637_1_En_11_Fig3_HTML.jpg](A371637_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. Fritzing diagram of the hat


    First sew the Flora, NeoPixel, and gyroscope onto the hat with regular, nonconductive
    thread, using some of the holes you will not be using for electrical connections.
    You can use your judgment on this, based on where the hat is simplest to sew.
    The only critical thing is to maintain the orientation of the gyro such that it
    will be straight up and down when the hat is worn, and the axis marking (a circle
    and a `Z`) is at the bottom.


    To make the circuit (shown in a Fritzing diagram in Figure [11-3](#A371637_1_En_11_Chapter.html#Fig3)),
    make the following connections by sewing with conductive thread. Think it through
    first, look at Figure [11-2](#A371637_1_En_11_Chapter.html#Fig2) and the Fritzing
    diagram, and perhaps draw it out with chalk to be sure you do not cross any wire
    leads:


    *   `Vbatt` on the Flora to `Vcc` on the NeoPixel ring

    *   `D12` on the Flora to `IN` on the NeoPixel ring

    *   `GND` on the Flora to `gnd` on the gyroscope

    *   `gnd` on the gyroscope to `GND` on the NeoPixel ring

    *   `SCL` on the Flora to `SCL` on the gyroscope

    *   `SDA` on the Flora to `SDA` on the gyroscope

    *   `3.3 V` on the Flora to `3 V` on the gyroscope


    You are connecting up the circuit such that the `SCL` (serial clock) and `SDA`
    (serial data) pins on the Flora are receiving data from the gyroscope, and the
    Flora processes that data and then sends out a signal on pin `D12` to the NeoPixel
    ring about what color the pixels should display. The Arduino sketch for this is
    shown in Listing [11-1](#A371637_1_En_11_Chapter.html#Par30).


    # Attaching a Battery


    Once you are happy with how the circuit is sewn, punch a small hole in the hat
    next to the Flora to pass through the power cord from the battery holder—on the
    micro USB side if you are using that type of battery, or the power connection
    (white connector) side if your battery case has that type of connector.


    Depending on the hat, you will need to invent some way (tape or maybe sewing a
    small pocket on the inside) to keep the battery pack you select in place in the
    crown. Use only sturdy consumer batteries for this application because they are
    going to be banged around a lot and against your head.


    # Libraries


    This hat requires the Adafruit NeoPixel, Adafruit LSM9DS0, and Adafruit Unified
    Sensor libraries. As always, go to **Sketch** > **Include Libraries** > **Manage
    Libraries…** and search on the library name. Note that it usually does not work
    to search on the name in the `.h` file; sometimes it is the same, but often it
    is not.


    **Caution:** Not all libraries for this project are supported on a Gemma. You
    may be tempted to try and make this project smaller, but the libraries for the
    sensor are not supported on the Gemma.


    ```

    // This sketch reads the values from an LSM9DS0 Adafruit gyro

    // and turns a NeoPixel ring green if there is rotation about the x axis (gyro[0])

    // and red if there is rotation about the y axis (gyro[1])

    // Axes are relative to the sensor board orientation, NOT gravity

    // i.e. relative and not absolute orientation

    #include  // from "Adafruit NeoPixel" library

    #include   // from "Adafruit LSM9DS0 Library"

    #include    // From "Adafruit Unified Sensor" library

    #define SERIALDEBUG

    #define PIN 12       //output pin for NeoPixel controls

    #define NUMPIXELS 16 //number of pixels in ring

    #define MAXBRIGHTNESS 30

    int delayval = 200; // milliseconds between samples

    int gyro[] = {0, 0, 0};

    Adafruit_LSM9DS0 lsm = Adafruit_LSM9DS0();

    Adafruit_NeoPixel pixels = Adafruit_NeoPixel(NUMPIXELS, PIN, NEO_GRB + NEO_KHZ800);

    //Adafruit sensor setup routine definition

    void setupSensor() {

    lsm.setupAccel(lsm.LSM9DS0_ACCELRANGE_2G);   // set up accelerometer

    lsm.setupMag(lsm.LSM9DS0_MAGGAIN_2GAUSS);    // set up magnetometer

    lsm.setupGyro(lsm.LSM9DS0_GYROSCALE_245DPS); // set up gyro

    }

    void setup() {

    Serial.begin(9600);

    pixels.begin(); // initialize the NeoPixel object

    while (!lsm.begin()) { // blink red if sensor initialization fails

    for(int j = 0; j < 2; j++) {

    for(uint16_t i = 0; i < NUMPIXELS; ++i)

    pixels.setPixelColor(i, j * 10, 0, 0);

    pixels.show();

    delay(500);

    }

    }

    for(int i = 0; i < NUMPIXELS; ++i)

    pixels.setPixelColor(i, 0, 0, 0);  // turn pixels off

    pixels.show();

    }// end setup

    void loop() {

    lsm.read();  // read the value of the gyro

    gyro[0] = abs((int)lsm.gyroData.x / 1024);

    gyro[1] = abs((int)lsm.gyroData.y / 1024);

    gyro[2] = abs((int)lsm.gyroData.z / 1024);

    for(int i = 0; i < NUMPIXELS; ++i)

    pixels.setPixelColor(i,

    constrain(gyro[1], 0, MAXBRIGHTNESS), //check one axis for red

    constrain(gyro[0], 0, MAXBRIGHTNESS), //check other axis for green

    );

    pixels.show();

    delay(delayval);

    // Rest of the code puts out debugging values to serial port

    #ifdef SERIALDEBUG

    Serial.print("Gyro X: "); Serial.print(gyro[0]);

    Serial.print("     Y: "); Serial.print(gyro[1]);

    Serial.print("     Z: "); Serial.println(gyro[2]);

    #endif

    } // end loop

    ```


    Listing 11-1. Sketch for the Hat'
