  trans: '

    ### 可缝制传感器替代方案


    本章我们将使用“常规”Arduino（非可缝制型）和低成本面包板插件元件来展示两个示例，因为这样更容易理解原理，且截至目前，这种格式的传感器种类更为丰富。如果存在可缝制版本的传感器，通常会有非常详细的教程，告诉你应使用哪些引脚进行连接，并附带一个可供你参考的
    Arduino 示例草图。通常，可穿戴传感器会内置本章讨论的串联电阻作为其组成部分，并且可能还有其他简化设计。


    如果没有可穿戴版本，你有几种选择。如果你并非真正需要佩戴该项目（例如它是一件布料艺术品、一个剧院道具或一盏小夜灯），你可以直接使用常规非可缝制 Arduino，并制作一个底座或其他外壳来隐藏电子元件和传感器。但在设计此类外壳时，请记住，传感器需要暴露在环境温度、光线或任何你想要测量的环境变量中。这种情况下，你可以像本章展示的那样在面包板上搭建电路，或者制作一个等效的焊接电路。


    但如果你希望用非可缝制组件制作可缝制电路，你可以使用可缝制电子板（如 Gemma、Flora 或 Lilypad）。将电阻和 LED 的引脚卷成环状，然后缝到织物上。或者，你也可以将电路焊接在一起，并找到一种方法将其固定在织物上，具体取决于你的特定设计（有关创意，请参考其他章节中的示例）。不过，要小心这些连接，因为用多股线进行板对线焊接可能会很脆弱。多股线在焊接处可能断裂，不过用一点热熔胶固定绝缘层会有所帮助。如果你在焊接结构中使用实心线，它会在反复弯折下断裂，甚至可能在线缆中间断裂。实心线更适合无需弯折的应用场景。


    **警告**


    尽管存在“一个”Arduino 标准，但一些可穿戴板卡会略有偏离，或者传感器库可能使用了与某些可缝制板卡不兼容的功能。例如，截至本文撰写时，Gemma 板卡所使用的芯片并未得到大多数
    Flora 传感器库底层通信库的支持。在购买一块板卡和一个未明确标注与其兼容的传感器之前，你最好先上网搜索一下，看看是否存在已知问题（或解决已知问题的变通方法）。并非所有传感器库（我们稍后会谈到）都支持所有
    Arduino 衍生的板卡。


    许多传感器的电阻会随其环境的变化而改变。在第一个示例中，我们使用了一个热敏电阻，这是一种电阻值会随环境温度变化而改变的电阻器（因此得名热(敏)电(阻)）。


    在第二个示例中，我们使用光电二极管来判断周围环境是否足够暗，从而点亮 LED 小夜灯。光电二极管是一种简单的传感器，本质上是一个反向的 LED——当光线照射时它会产生电流，而不是像普通
    LED 那样通过外部电流来发光。我们将它与 Arduino 的内部上拉电阻串联，读取其产生的电流量，并在短暂延迟后观察它使电压改变了多少。


    这两个传感器（以及下一节中描述的压力传感器）如 图 8-1 所示。在课堂环境中，使用它们的主要问题是如何避免丢失，这一点你可以想象。一旦它们脱离原始包装，使用药瓶或带隔板的收纳盒进行分类存放效果很好。


    ![A371637_1_En_8_Fig1_HTML.jpg](img/A371637_1_En_8_Fig1_HTML.jpg)


    **图 8-1.** 压力传感器、光电二极管和热敏电阻


    **提示**


    务必记录好你订购零件的来源，以便能够找到规格书或使用示例。对相关页面进行截图或添加书签，并建立一个归档系统来保存这些信息，以便日后查阅。


    ### 其他常见传感器


    目前可用于 Arduino 环境的传感器种类繁多，我们无法在此一一列举。本节仅能介绍几种常见类型的传感器，让你有所了解。


    红外传感器是经过调校的光电二极管或光电晶体管（另一种类型的感光半导体，可能提供更强的信号），用于响应比可见光频率更低的光线。它们通常呈深色以过滤掉可见光。大多数电视遥控器使用的就是这类传感器，可以作为一种简单方式实现设备间的通信。其他类型的红外传感器可用于远距离检测热量，例如非接触式温度计中使用的那些。


    压力或力的感测可通过多种类型的器件实现。一个力敏电阻（FSR）就是一个由导电塑料或橡胶制成的简单垫片，当它被压缩时导电性会增强。虽然 FSR 的精度不足以测量重量或力的大小，但它可以用于判断是否有力作用，就像一个大型按钮。不过，FSR
    不擅长承受持续的压力，如果你打算整天站在上面，它可能会过早损坏。FSR 的一个变体是软电位器，它会根据你按压的位置给出不同的电阻值。


    如果你开始在线搜索 Arduino 传感器，你会发现各种新奇的产品，例如倾斜开关、振动传感器、重力/加速度传感器、磁场传感器、距离传感器、湿度传感器、肌肉传感器、心跳传感器、辐射传感器等等。


    **注意**


    在第 11 章中，我们将使用一个可缝制传感器——一个可以检测运动的陀螺仪。我们认为结合具体项目更容易理解，因此本章不深入介绍。如果你想了解如何检测服装的运动并做出响应，请参阅第
    11 章中的帽子示例。


    ## 热敏电阻


    热敏电阻是一种电阻值随温度变化而发生显著变化的电阻器（如果你原本期望电阻在不同温度下保持恒定值，这通常是一件坏事）。当你购买一个热敏电阻时，通常会得到一个型号、一个称为
    B（或 beta）值的参数、额定最大功率（在分压器中使用时通常无关紧要，因为电流可忽略不计），以及在特定温度（通常是 25 摄氏度）下的参考电阻值。


    以本例中使用的负温度系数（NTC）热敏电阻 MF52-103 为例，其额定功率为 0.05 瓦；在 25 摄氏度时电阻为 10 kΩ；B 值为 3950 K。但这到底意味着什么呢？


    从这里开始，你可以在线搜索该产品型号和“Arduino”。这种方法有几个明显的问题：


    - 你找到的信息可能是错误的。

    - 你可能什么也找不到。

    - 网络上现有的 Arduino 草图可能不够清晰，让你无法确信传感器能按预期工作。


    通常，更昂贵的传感器（单价约 15 美元的，相对于那些价格只有其百分之一左右的）会附带更好的文档和库文件。我们这里使用廉价的传感器来说明整个过程。

    '
- fmt: "# Using the Thermistor\n\nSearching on “thermistor” and “Arduino” takes us\
    \ to the very useful website [`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2).\
    \ The site tells us that the circuit for the thermistor is just a voltage divider\
    \ (Chapter [5](#A371637_1_En_5_Chapter.html)). We will put the thermistor in series\
    \ with another 10 kΩ resistor to form a voltage divider, as shown in Figure [8-2](#A371637_1_En_8_Chapter.html#Fig2)\
    \ in diagram form and in Figure [8-3](#A371637_1_En_8_Chapter.html#Fig3) as a\
    \ photograph of the circuit.\n\n![A371637_1_En_8_Fig3_HTML.jpg](A371637_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3. The thermistor circuit in real life\n\n![A371637_1_En_8_Fig2_HTML.jpg](A371637_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2. Fritzing diagram of thermistor circuit\n\nOn the Arduino Playground\
    \ website just mentioned, we learn that thermistors have a resistance defined\
    \ by the Steinhart-Hart equation ([`https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation`](https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation))\
    \ which uses three standard parameters for an equation that converts resistance\
    \ into temperature:\n\n*   B, measured in units of degrees Kelvin, K (in this\
    \ case, 3950 K)\n*   Baseline temperature (in degrees Kelvin, which really means\
    \ degrees above absolute zero—usually the baseline temperature is 25 degrees Celsius,\
    \ which is 25 + 273.15 = 298.15 K)\n*   The sensor’s resistance at that temperature\
    \ (this is the nominal resistance of the thermistor, in this case, 10 kΩ).\n\n\
    For the example here, we have also added an LED that will be on when the thermistor\
    \ reports a temperature within a given range. The circuit in Figures [8-3](#A371637_1_En_8_Chapter.html#Fig3)\
    \ consists of a 330 Ω resistor in series with a red LED. The red LED circuit is\
    \ connected to pin 9 and ground. When pin 9 is `HIGH`, the LED will come on.\n\
    \nThe voltage divider (see Chapter [5](#A371637_1_En_5_Chapter.html)) is read\
    \ between the 10 kΩ reference resistor and the thermistor. Its value is picked\
    \ off between the two and sent as input to the Arduino on the `A0` pin. This is\
    \ an example of how you might set up a sensor to turn on a light or otherwise\
    \ send a signal to do something to the Arduino. Note that the sensor is outputting\
    \ to an analog pin, which is necessary to have values other than just `LOW` and\
    \ `HIGH` on the pins.\n\nWe want to get an actual temperature out of this sensor\
    \ and not just a relative number, so getting the actual conversion right is important.\
    \ For other types of sensors, we may only care where a value falls relative to\
    \ some arbitrary value (like the light level in a room, or the sensor’s own average\
    \ values over the last minute), so calculating the correct value in specific units\
    \ may not be necessary.\n\n# Arduino Sketch to Interface with the Thermistor\n\
    \nNow that we know how to hook up the circuit, we can go two ways. We can go into\
    \ our Arduino IDE (see Chapter [6](#A371637_1_En_6_Chapter.html)) and see if we\
    \ can find a library where someone has already created this Arduino sketch. We\
    \ can do that by going to Sketch ➤ Include Library ➤ Manage Libraries and searching\
    \ on “thermistor” as described in Chapter [6](#A371637_1_En_6_Chapter.html).\n\
    \nIf you find something, you can then choose to Install the library. If several\
    \ choices appear, you might click the “More info” link first to see which of several\
    \ choices you like better, or look at the ReadMe file if it has one. Most of the\
    \ time these “More info” links take you to a Github repository, a common open\
    \ source way to share an Arduino sketch. Joan likes to see the source for such\
    \ things in detail and so will usually pick the one that seems the most transparent\
    \ in what it is doing.\n\nWhen you install the library, with luck it will also\
    \ install some examples. To establish whether this is the case, after you install\
    \ the library, click File ➤ Examples.\n\nThis may all sound good, but you may\
    \ discover that you cannot find a library that matches your particular board and\
    \ sensor hardware. In our case, for this example we went back to the [`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)\
    \ page we started on. There were several examples there. We decided to try the\
    \ final one because it seemed to be clear about what its assumptions were and\
    \ it was easy to check that the assumptions were right by cross-checking with\
    \ the Wikipedia page that described the equation; we thank the author of this\
    \ page for putting his or her Arduino sketch out freely.\n\nListing [8-1](#A371637_1_En_8_Chapter.html#Par44)\
    \ shows this Arduino sketch, with an additional piece that turns on an LED in\
    \ the circuit if the temperature is between a given range.\n\n```\n// A sketch\
    \ that turns on an LED attached to LEDPIN\n// If the thermistor at THERMPIN is\
    \ in a given temperature range\n// Thermistor calibration from\n// playground.arduino.cc/ComponentLib/Thermistor2\n\
    // modified to make a bit more general and add output\n#include <math.h>\n#define\
    \ THERMPIN A0\n#define LEDPIN 9\n// enumerating 3 major temperature scales\nenum\
    \ {\n  T_KELVIN=0,\n  T_CELSIUS,\n  T_FAHRENHEIT\n};\n// Temperature function\
    \ outputs float, the actual temperature\n// Temperature function inputs:\n// 1.\
    \ AnalogInputNumber - analog input to read from\n// 2. OuputUnit - output in celsius,\
    \ kelvin or fahrenheit\n// 3. Thermistor B parameter - found in datasheet\n//\
    \ 4. Manufacturer T0 parameter - found in datasheet (kelvin)\n// 5. Manufacturer\
    \ R0 parameter - found in datasheet (ohms)\n// 6. Your balance resistor resistance\
    \ in ohms\nfloat Temperature(int AnalogInputNumber, int OutputUnit, float B,\n\
    \  float T0, float R0, float R_Balance) {\n  float R, T;\n  R = R_Balance * (1023.0f\
    \ / (float)(1023 - analogRead(AnalogInputNumber)) - 1);\n  //reminder: in C, log\
    \ is ln and log10 is base 10 log, so this is ok\n  T = 1.0f / (1.0f / T0 + (1.0f\
    \ / B) * log(R / R0));\n  switch(OutputUnit) {\n    case T_CELSIUS :\n      T-=273.15f;\n\
    \      break;\n    case T_FAHRENHEIT :\n      T=9.0f*(T-273.15f)/5.0f+32.0f;\n\
    \      break;\n    default:\n      break;\n  };\n  return T;\n}\nvoid setup()\
    \ {\n  Serial.begin(9600);\n  pinMode(THERMPIN, INPUT);\n  pinMode(LEDPIN, OUTPUT);\n\
    } // end setup\nvoid loop() {\n  float sensorData = Temperature(THERMPIN, T_FAHRENHEIT,\n\
    \    3950.0f, 298.15f, 10000.0f, 10000.0f);\n  Serial.print(\"Temperature in degrees\
    \ F = \\t\");\n  Serial.println(sensorData);\n  Serial.println();\n  delay(500);\n\
    \  //turn on LED if the temperature data is between 50 and 75\n  if (sensorData\
    \ > 50 && sensorData < 75) digitalWrite(LEDPIN, HIGH);\n  else digitalWrite(LEDPIN,\
    \ LOW);\n}// end loop\n```\n\nListing 8-1. Thermistor\n\n# Photodiode: Night Light\
    \ Example\n\nA photodiode creates a current when light shines on it, making it\
    \ essentially an LED (see Chapter [5](#A371637_1_En_5_Chapter.html)) acting in\
    \ reverse. Reading this current is a little trickier than reading a resistance,\
    \ but it can be done with a simpler circuit.\n\nTo figure out how to use a photodiode,\
    \ searching online for “photodiode Arduino” is a good place to start. You will\
    \ find a few examples, mostly pointing out that really, a photodiode is just an\
    \ LED that you are sort of running backwards. Instead of running current through\
    \ it to make it light up, you light it up and a small amount of current will run\
    \ in the opposite direction than an LED would.\n\nMany of these examples involve\
    \ using a transistor (a component that can amplify a signal) to amplify the output.\
    \ This would be a difficult circuit to build with conductive thread, so we are\
    \ going to use a simpler solution. A photodiode has an internal capacitance (ability\
    \ to hold a small charge). If we charge up this capacitance by putting a reverse\
    \ voltage across the LED, then the current created by the photodiode will discharge\
    \ the capacitor. If we slow down this discharge with a resistor, we can measure\
    \ the speed (by sampling voltage after a set time or by measuring the time before\
    \ it reaches a set voltage) to find out how much light the photodiode is seeing."
