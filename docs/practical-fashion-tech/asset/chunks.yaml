- fmt: '### Laying Out and Cutting the Pattern


    Figure [4-5](#A371637_1_En_4_Chapter.html#Fig5) shows the overall layout of the
    vest pattern on the fabric. The back of the vest pattern piece will be pinned
    onto the fabric with the center back edge on the folded edge of the fabric (Figure
    [4-9](#A371637_1_En_4_Chapter.html#Fig9)).


    ![A371637_1_En_4_Fig9_HTML.jpg](A371637_1_En_4_Fig9_HTML.jpg)


    Figure 4-9. The vest pattern back piece


    The front of the vest pattern piece will be pinned onto the fabric close to the
    fabric edge, not on the fold. The facing (internal finishing) pieces will be laid
    out the same way as the pieces they are finishing. One facing is on the fold,
    and the others away from it (again, you can see the big picture in Figure [4-5](#A371637_1_En_4_Chapter.html#Fig5)).


    ### Sewing the Vest


    After cutting out and marking your vest pattern, remove the pattern tissue from
    the front and back pieces of fabric. With right sides together, pin the front
    pieces to the back piece at the shoulder seams (Figure [4-10](#A371637_1_En_4_Chapter.html#Fig10)).
    Notice how the notches line up across these two pieces when the orientation is
    correct.


    ![A371637_1_En_4_Fig10_HTML.jpg](A371637_1_En_4_Fig10_HTML.jpg)


    Figure 4-10. Pinning the front of the vest to the back


    #### Make the Shoulders


    If you have not already done so, thread your sewing machine and fill the bobbin
    (as described in Chapter [3](#A371637_1_En_3_Chapter.html)). This example uses
    contrasting thread so you can see what I am doing, but normally you would use
    thread that matched your fabric. Place the shoulder seam on the sewing machine
    (Figure [4-11](#A371637_1_En_4_Chapter.html#Fig11)) and lower the presser foot
    onto the material.


    ![A371637_1_En_4_Fig11_HTML.jpg](A371637_1_En_4_Fig11_HTML.jpg)


    Figure 4-11. Placing the shoulder seam on the sewing machine


    Manually (usually with hand wheel) lower the needle into the fabric before you
    start machine sewing. Select a short straight stitch (with short, close-together
    stitches) and sew along the seam line on each shoulder. Remove the pins as you
    sew, or after you have finished. (If you leave the pins in when sewing, be careful
    to sew over the pin, not onto it—that is an easy way to break the sewing machine
    needle.) Figure [4-12](#A371637_1_En_4_Chapter.html#Fig12) shows the result.


    ![A371637_1_En_4_Fig12_HTML.jpg](A371637_1_En_4_Fig12_HTML.jpg)


    Figure 4-12. The first pass of the shoulder seam


    **Caution:** It is very easy to sew together more layers of fabric than you had
    in mind. Be sure you are keeping the rest of the vest clear as you sew along one
    seam.


    One line of stitches really is not enough for a garment seam, though. If we just
    left it like this, it might unravel. To prevent that, I did another line of zigzag
    stitching (Figure [4-13](#A371637_1_En_4_Chapter.html#Fig13)) between the seam
    we just did and the cut edge of the fabric.


    ![A371637_1_En_4_Fig13_HTML.jpg](A371637_1_En_4_Fig13_HTML.jpg)


    Figure 4-13. Adding zigzag strengthening


    Finally, I trimmed the seam a bit so that it would lie flatter (Figure [4-14](#A371637_1_En_4_Chapter.html#Fig14)).
    Do not get carried away here. Leaving a little less margin than your zigzag width
    is appropriate.


    ![A371637_1_En_4_Fig14_HTML.jpg](A371637_1_En_4_Fig14_HTML.jpg)


    Figure 4-14. Trimming the shoulder seam


    #### Make the Side Seams


    To make the side seams join the back and two front pieces of the vest, pin, sew
    (with a single stitch), and then double stitch (two lines of straight stitching)
    these pieces together. Trim the seams and press them open (Figure [4-15](#A371637_1_En_4_Chapter.html#Fig15)).
    You can do this with an iron or just by flattening by hand as I am doing in Figure
    [4-15](#A371637_1_En_4_Chapter.html#Fig15).


    ![A371637_1_En_4_Fig15_HTML.jpg](A371637_1_En_4_Fig15_HTML.jpg)


    Figure 4-15. Sew and then press open the seams


    #### Assemble the Front Facing


    Remove the pattern pieces from the pieces of facing. With the right sides together,
    pin and sew the front facings to the back facing. Trim the seams and press them
    open. Then, with the right sides together, pin the facing to the vest along the
    seam line (Figure [4-16](#A371637_1_En_4_Chapter.html#Fig16)). Using the same
    stitches as before, sew along the seam line. Be careful along the curves. I recommend
    going slowly and stopping the machine to adjust the angle if necessary.


    ![A371637_1_En_4_Fig16_HTML.jpg](A371637_1_En_4_Fig16_HTML.jpg)


    Figure 4-16. Pinning the facing to the vest


    After sewing the facing to the vest, make tiny clips with sharp scissors at the
    curves, where necessary, to create a flat seam (Figure [4-17](#A371637_1_En_4_Chapter.html#Fig17)).
    Trim the seam and turn the facing inside the vest with wrong sides together. Press
    the facing down neatly.


    ![A371637_1_En_4_Fig17_HTML.jpg](A371637_1_En_4_Fig17_HTML.jpg)


    Figure 4-17. Trimming a curved seam


    Finally, I am going to topstitch this seam. That means I will sew over the facing
    and the outer part of the vest to create a visible line of stitching parallel
    to the seam (Figure [4-18](#A371637_1_En_4_Chapter.html#Fig18)). Topstitching
    can be decorative with a different color thread (as I did here) or merely structural
    if the thread matches the fabric more closely.


    ![A371637_1_En_4_Fig18_HTML.jpg](A371637_1_En_4_Fig18_HTML.jpg)


    Figure 4-18. Topstitching a seam


    #### Assemble the Armhole Facing


    Figure [4-19](#A371637_1_En_4_Chapter.html#Fig19) shows how one end of the two
    parts of the armhole facing goes together. Remove the pattern from the armhole
    facings. With right sides together, sew the ends of the facing together to create
    two donut shapes—one for each armhole.


    ![A371637_1_En_4_Fig19_HTML.jpg](A371637_1_En_4_Fig19_HTML.jpg)


    Figure 4-19. Armhole facing assembly


    With right sides together, pin the armhole facing to the vest armholes. Stitch
    carefully along the seam line around the entire armhole. Go slowly and stop to
    adjust for the curve. Clip the curves with sharp scissors and trim the seam. Turn
    the facing to the inside and press.


    #### Hem


    Sew along the bottom edge of the vest with a longer or zigzag stitch (Figure [4-20](#A371637_1_En_4_Chapter.html#Fig20)).
    Turn the hem edge of the vest under 1/4-inch (.64 cm) and press. Hand or machine
    sew the hem (Figure [4-21](#A371637_1_En_4_Chapter.html#Fig21)).


    ![A371637_1_En_4_Fig21_HTML.jpg](A371637_1_En_4_Fig21_HTML.jpg)


    Figure 4-21. Second pass on finishing


    ![A371637_1_En_4_Fig20_HTML.jpg](A371637_1_En_4_Fig20_HTML.jpg)


    Figure 4-20. First zigzag on the hem—note the facing double stitching.


    ### Other Finishing


    You have now finished a basic vest. Go back to Figure [4-1](#A371637_1_En_4_Chapter.html#Fig1)
    to see my final result of this process. At this point you could add buttons or
    snaps or other decoration as you see fit.


    ## Things That Go Wrong


    It is easy to make silly mistakes that can become very frustrating. Try to make
    sure you are attaching the correct pieces at the correct places, and that the
    right sides of the fabric are facing each other, before sewing. Double-checking
    before beginning to cut or sew is helpful, especially cutting out the larger pieces
    because it is possible to waste a lot of fabric if you cut it too small.


    I have been sewing for a long time and I still catch myself making goofy mistakes
    because I’m trying to hurry or am just spacing out. Particular places to pay attention
    to are where the facings attach to each other, where they attach to the vest,
    and what stitch you are using. If you have to rip out a seam and do it again,
    it will be fine. Just pull out all the bits of old thread before you begin again.'
