    The voltage divider (see Chapter [5](#A371637_1_En_5_Chapter.html)) is read between\
    \ the 10 kΩreference resistor and the thermistor. Its value is picked off between\
    \ the two and sent as input to the Arduino on the A0 pin. This is an example of\
