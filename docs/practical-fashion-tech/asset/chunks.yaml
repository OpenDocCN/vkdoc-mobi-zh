- fmt: '### Adding the Back


    Pin and sew the front to the back at the side seams. You may have to stretch the
    fabric slightly to make the sides fit together all along the side seamlines. That
    is normal and to be expected when you are creating and cutting out your own pattern.
    Be careful not to overstretch the fabric because it will distort the shape of
    the dress. Figure [11-14](#A371637_1_En_11_Chapter.html#Fig14) shows an inside-out
    view of this stage.


    ![A371637_1_En_11_Fig14_HTML.jpg](A371637_1_En_11_Fig14_HTML.jpg)


    Figure 11-14.


    Right after sewing the back to the front (dress is inside-out)


    Pin and sew the bottom (yellow) band to create a circular piece. Trim seams and
    press them open. Fold the piece in half and mark the center-front, which will
    be at the opposite side of the seam you have just sewn. In other words, the seam
    of the yellow band will be at center back. Pin the piece to the bottom of the
    skirt, starting with the seam at the center-back of the skirt and the center-front
    mark at the center-front of the skirt. Ease and stretch the fabric a bit as you
    pin the rest of the band to the skirt. Make sure it looks even, not too stretched
    in one place or too bunched up in another. Sew this seam, trim, and press open.
    Figure [11-15](#A371637_1_En_11_Chapter.html#Fig15) shows where we are now, right-side-out.


    ![A371637_1_En_11_Fig15_HTML.jpg](A371637_1_En_11_Fig15_HTML.jpg)


    Figure 11-15.


    Assembly after adding the yellow band


    ### The Dropped-Waistband Pockets


    Fold the dropped waistband piece (blue) in half with right sides together and
    sew the short seam to make a loop of fabric (shown in Figure [11-16](#A371637_1_En_11_Chapter.html#Fig16)).
    Turn the fabric right-side-out and fold the piece in half lengthwise. Mark the
    center-front the same way you did for the lower skirt band. Pin the fold of the
    band to the skirt at the seam line of the mid-torso and skirt sections. Start
    with the center-back of the dress and the seam of the band together, then pin
    the center-front of the skirt and the band together.


    ![A371637_1_En_11_Fig16_HTML.jpg](A371637_1_En_11_Fig16_HTML.jpg)


    Figure 11-16.


    The blue band that will be the electronics pocket pinned to the top of the black
    skirt band


    Continue pinning the blue band evenly all the way around the dress. Pin the bottom
    of the band in place all the way around the skirt, stretching and fitting it evenly.
    Sew the bottom of the band to the skirt, making sure it doesn’t bunch up or overstretch.
    Mark the top of the band on the front where you want the openings for the two
    pockets, where you will insert each of the battery/inverter packs. These two areas
    will not be sewn closed. Sew all the way around the top of the band, leaving the
    pocket sections open (Figure [11-17](#A371637_1_En_11_Chapter.html#Fig17)). Check
    that the inverter/battery pack you have will fit into the pockets (Figure [11-18](#A371637_1_En_11_Chapter.html#Fig18)).


    ![A371637_1_En_11_Fig18_HTML.jpg](A371637_1_En_11_Fig18_HTML.jpg)


    Figure 11-18.


    Checking that the battery pack/inverter will fit into its pocket


    ![A371637_1_En_11_Fig17_HTML.jpg](A371637_1_En_11_Fig17_HTML.jpg)


    Figure 11-17.


    Attaching the blue band, leaving open space for pockets


    ### The EL Ribbon Casings


    Measure the horizontal seams on the front of the dress (where the yoke and torso
    attach and where the torso and skirt attach). Cut two strips of white fabric 3
    inches wide and 2 inches longer than each horizontal seam.


    Next, measure the vertical seam from the neckline to the top of the dropped waistband.
    Cut one piece of white fabric 3 inches wide and 2 inches longer than this vertical
    seam measurement. If you want a conduit for the wire from the upper strip of EL
    ribbon down to the pocket with the inverter, cut another piece of black fabric
    the same length as the vertical white one.


    For each EL ribbon casing, fold and pin the white fabric in half lengthwise and
    stitch this seam about 1/4 inch from the edge. Use a safety pin at one end to
    turn the casings right-side-out (Figures [11-19](#A371637_1_En_11_Chapter.html#Fig19)
    and [11-20](#A371637_1_En_11_Chapter.html#Fig20)).


    ![A371637_1_En_11_Fig20_HTML.jpg](A371637_1_En_11_Fig20_HTML.jpg)


    Figure 11-20.


    Turning the EL ribbon casing right-side out


    ![A371637_1_En_11_Fig19_HTML.jpg](A371637_1_En_11_Fig19_HTML.jpg)


    Figure 11-19.


    Creating the EL ribbon casing, with a pin to turn it right-side out


    Pin and sew the two horizontal casings to the front of the dress in the correct
    locations. Sew very close to each side of each white strip, leaving the ends open.
    This will allow you to insert and remove the EL ribbon as needed.


    Pin and sew the vertical casing to the front, making sure to stop sewing at the
    top of each horizontal white strip and start sewing again at the bottom of the
    horizontal strips. You will be able to tack the vertical piece in place with a
    few stitches of hand sewing if it is too large a gap.


    Pin the ribbon casings to the dress and sew them down. Leave one end of each open
    to insert the wires. Be sure that you leave open the places where the casings
    cross each other. You may fiddle with the wires and how you want to arrange the
    EL wire ends a little—when I photographed Figure [11-21](#A371637_1_En_11_Chapter.html#Fig21)
    I thought we’d have the wires on one side, but changed my mind. You should probably
    assemble the whole dress before deciding where your black wire conduit will be.
    In this case, I discovered that the red fabric was stretchier than the other side,
    so I wanted to have most of the battery weight on the less-stretchy side.


    ![A371637_1_En_11_Fig21_HTML.jpg](A371637_1_En_11_Fig21_HTML.jpg)


    Figure 11-21.


    Placing the ribbon casings on the dress and experimenting with wire routing (ultimately
    I routed from the other side) Caution


    One issue with this dress of stretchy fabric is that it is hard to keep the color
    blocks straight. Check carefully at each step that your seams are straight.


    Try the dress on and mark where you want the hem, or just turn it under if it
    is not too long. Sew a hem with the machine or by hand. If it is a fabric that
    will not fray, you can just cut it at the hemline. (If you have folded the yellow
    band in half lengthwise and sewn it on, as in the instructions, you will not need
    to hem it.)


    Turn under the neckline and armholes 1/4 inch (or finish them off with facing,
    if you want to create those pattern pieces as well—see Chapter [4](#A371637_1_En_4_Chapter.html)).
    Sew on a black channel or other means of holding down the power wire that runs
    to the upper horizontal EL ribbon—see the “Finishing Up” section for other options
    that you may want to look at first.'
