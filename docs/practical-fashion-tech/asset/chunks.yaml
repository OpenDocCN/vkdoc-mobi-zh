  trans: '

    ### 排版与裁剪纸样


    图 4-5 展示了背心纸样在面料上的整体排布。背心后片纸样将被固定到面料上，后中边缘对齐面料的折叠边缘（图 4-9）。


    ![A371637_1_En_4_Fig9_HTML.jpg](img/A371637_1_En_4_Fig9_HTML.jpg)


    图 4-9. 背心后片纸样


    背心前片纸样将被固定到靠近面料边缘的位置，而非折叠处。贴边（内部饰面）的排布方式与其所饰面的部件相同。一片贴边位于折叠处，其余贴边则远离折叠处（同样，你可以在图
    4-5 中看到整体布局）。


    ### 缝制背心


    裁剪并标记好纸样后，从面料的前片和后片上取下纸样。将前片与后片正面相对，在肩缝处用珠针固定（图 4-10）。注意观察当方向正确时，两片布料上的剪口是如何对齐的。


    ![A371637_1_En_4_Fig10_HTML.jpg](img/A371637_1_En_4_Fig10_HTML.jpg)


    图 4-10. 将背心前片固定到后片上


    #### 缝制肩部


    如果还没准备好，请给缝纫机穿好线并绕好梭芯（如第 3 章所述）。本例使用对比色线以便看清操作，但通常应选用与面料匹配的缝线。将肩缝放置到缝纫机上（图 4-11），然后将压脚放下压住布料。


    ![A371637_1_En_4_Fig11_HTML.jpg](img/A371637_1_En_4_Fig11_HTML.jpg)


    图 4-11. 将肩缝放到缝纫机上


    在开始机缝之前，先手动（通常使用手轮）将机针扎入布料。选择短直线线迹（针距短且紧密），沿着每条肩缝的缝线进行缝合。可以在缝合过程中或缝完后拆除珠针。（如果缝合时留着珠针，请注意要跨过珠针缝合，而不是直接扎在珠针上——这很容易导致缝纫机针断裂。）图
    4-12 展示了缝合效果。


    ![A371637_1_En_4_Fig12_HTML.jpg](img/A371637_1_En_4_Fig12_HTML.jpg)


    图 4-12. 肩缝的第一道线迹


    **注意：** 很容易不小心缝合比预期更多的面料层。缝合一道缝线时，务必确保背心的其余部分远离针下。


    不过，单一道线迹对服装接缝来说确实不够。如果就这样放着不处理，它可能会脱线。为了防止这种情况，我在刚缝好的线迹与布料裁边之间又加了一道之字形线迹（图 4-13）。


    ![A371637_1_En_4_Fig13_HTML.jpg](img/A371637_1_En_4_Fig13_HTML.jpg)


    图 4-13. 增加之字形加固线迹


    最后，我将缝份修剪了一下，使其更平整（图 4-14）。注意不要修剪过度，留出的缝份宽度略窄于之字形线迹的宽度即可。


    ![A371637_1_En_4_Fig14_HTML.jpg](img/A371637_1_En_4_Fig14_HTML.jpg)


    图 4-14. 修剪肩缝缝份


    #### 缝制侧缝


    为了缝制侧缝，将后片与前片的两片连接起来：用珠针固定，缝一道直线线迹，然后再缝一道双线加固（两道平行的直线线迹）。修剪缝份并将其熨开（图 4-15）。你可以使用熨斗，或者像我图
    4-15 中那样直接用手抚平。


    ![A371637_1_En_4_Fig15_HTML.jpg](img/A371637_1_En_4_Fig15_HTML.jpg)


    图 4-15. 缝合后熨开缝份


    #### 组装前贴边


    从贴边布片上取下纸样。将前贴边与后贴边正面相对，用珠针固定并缝合。修剪缝份并熨开。然后，将贴边与背心正面相对，沿缝线用珠针固定（图 4-16）。使用与之前相同的线迹沿缝线缝合。过弯位时要小心。我建议放慢速度，必要时停机调整角度。


    ![A371637_1_En_4_Fig16_HTML.jpg](img/A371637_1_En_4_Fig16_HTML.jpg)


    图 4-16. 将贴边固定到背心上


    将贴边缝到背心上后，在弯位处用锋利的剪刀剪出小剪口（必要时），以便形成平整的接缝（图 4-17）。修剪缝份，然后将贴边翻到背心内侧，使反面相对。将贴边整齐地熨平。


    ![A371637_1_En_4_Fig17_HTML.jpg](img/A371637_1_En_4_Fig17_HTML.jpg)


    图 4-17. 修剪弧形缝份


    最后，我要对这条缝线进行明缝。这意味着我将沿着贴边和背心外层缝合，形成一条与接缝平行的可见线迹（图 4-18）。明缝可以使用不同颜色的线作为装饰（像我这里做的），或者如果线色与面料更匹配，则仅作结构加固之用。


    ![A371637_1_En_4_Fig18_HTML.jpg](img/A371637_1_En_4_Fig18_HTML.jpg)


    图 4-18. 明缝一道缝线


    #### 组装袖窿贴边


    图 4-19 展示了袖窿贴边两部分的其中一端如何连接。从袖窿贴边上取下纸样。将贴边两端正面相对缝合，形成两个环形——每个袖窿一个。


    ![A371637_1_En_4_Fig19_HTML.jpg](img/A371637_1_En_4_Fig19_HTML.jpg)


    图 4-19. 袖窿贴边组装


    将袖窿贴边与背心袖窿正面相对，用珠针固定。沿着整个袖窿的缝线仔细缝合。放慢速度，过弯时停机调整。用锋利的剪刀在弯位剪出剪口并修剪缝份。将贴边翻到内侧并熨平。


    #### 下摆


    沿着背心下摆边缘，用长线迹或之字形线迹缝合（图 4-20）。将下摆边缘内折 1/4 英寸（0.64 厘米）并熨平。用手缝或机缝的方式缝好下摆（图 4-21）。


    ![A371637_1_En_4_Fig21_HTML.jpg](img/A371637_1_En_4_Fig21_HTML.jpg)


    图 4-21. 第二道收尾工序


    ![A371637_1_En_4_Fig20_HTML.jpg](img/A371637_1_En_4_Fig20_HTML.jpg)


    图 4-20. 下摆的第一道之字形线迹——注意贴边的双线加固。


    ### 其他收尾工作


    至此，你已经完成了一件基础款背心。回顾图 4-1 查看我的最终成品效果。此时，你可以根据自己的想法添加纽扣、按扣或其他装饰。


    ## 常见问题


    很容易犯一些愚蠢的错误，这可能会让人非常沮丧。缝合前，请务必确认你在正确的位置连接了正确的部件，并且面料正面相对。在开始裁剪或缝合之前进行双重检查很有帮助，尤其是在裁剪大块面料时，因为一旦裁得太小，可能会浪费很多布料。


    我做缝纫已经很久了，但有时因为想赶进度或走神，仍然会犯一些愚蠢的错误。需要特别注意的地方包括：贴边之间如何连接、贴边与背心如何连接，以及你正在使用的线迹类型。如果不得不拆掉一道缝线重新缝，也没关系。重新开始前，只需把所有的旧线头清理干净即可。

