  trans: '

    ### 欧姆定律


    要设计电路，你需要对电的工作原理有一定了解。本章讨论的许多内容都基于一个基本法则——欧姆定律。欧姆定律可以非常简单地表述为：电压等于电流乘以电阻，通常写作
    `V = I * R`。（这里使用 `*` 表示乘法，与计算机代码中的惯例一致。）


    **注意**


    根据维基百科，电流用 `I` 表示，是因为电流的单位“安培”以法国人安培（André-Marie Ampère）命名，他将电流大小称为“intensité
    de courant”。电流的单位是安培（通常简称为安，用大写 `A` 表示）。电压的单位是伏特，通常用大写 `V` 表示。电阻的单位是欧姆，通常用希腊字母欧米伽
    `Ω` 表示。在网络上，当人们不想费力输入希腊字母，或担心文本编码转换后丢失时，有时会用 `R` 代替 `Ω`。


    我们经常需要讨论非常大或非常小的电压、电流或电阻，这时会引入像毫（milli-）这样的前缀。一毫伏（`mV`）等于千分之一伏，一毫安（`mA`）等于千分之一安。其他前缀包括：


    - 兆（`M`）= 乘以 1,000,000

    - 千（`k`）= 乘以 1,000

    - 微（`μ`）= 1/1,000,000


    电压在整个电路中会发生变化，并且是相对于一个任意基准点（称为地）来测量的。由于电压是相对于地来标定的，因此地被定义为零伏。在大多数电路，比如我们面包板上搭建的电路中，地是电路中的最低电压，这样可以避免出现负数。由于电压会随着你在电路中的位置不同而改变，因此它是电路特定点上的属性，而不是整个电路的属性。实际上，更好的思考方式是关注电压在元器件两端的差异，即电压降。显然，如果元器件低电位一端是零伏，计算起来会更简单，这正是大多数电路如此布置的原因。


    ### 电路元件


    两点之间的电压差会导致电流在这两点之间流动。如果你想在保持电路某部分两端电压不变的情况下，限制流经该部分的电流，就需要在电路中增加电阻。毫不意外，只增加电阻的元件被称为电阻器。（其他元件也会增加电阻，但电阻器只有这一种功能。）


    电阻器（以及其他元件）可以串联——即电流先流经一个，再流经下一个——也可以并联，即电流在某一点分流，同时流经电路的两个部分。


    如果并联电路中的两条路径电阻不同，电流倾向于选择电阻最小的路径，并且在分流点的那一侧会有更多电流流过。也就是说，会有更多电流流过电路中电阻较低的部分，但这两个部分会有相同的电压降。


    在串联电路中（比如两个电阻依次相连），所有电流都必须流经同一条路径。相同的电流会流过两个电阻，但每个电阻会有各自的电压降，该电压降与其在电路总电阻中所占的份额成比例。


    #### 电阻器


    由于电阻器是相当小的元件，我们需要一种也能按比例缩小的标记方法。电阻器上通用的是一种色环系统。例如，在图 5-3 中的四环电阻器上，有棕-黑-红条纹，然后是一个小间隔，接着是金色条纹。


    ![A371637_1_En_5_Fig3_HTML.jpg](img/A371637_1_En_5_Fig3_HTML.jpg)


    图 5-3. 一个四环电阻器和一个五环电阻器


    如图 5-3 所示，两种主要惯例是四环电阻器和五环电阻器。你可以在 [`https://en.wikipedia.org/wiki/Electronic_color_code`](https://en.wikipedia.org/wiki/Electronic_color_code)
    上找到关于颜色含义的详细解释，也可以在线搜索“resistor color chart”（电阻色环表）。我们将计算图 5-3 中两个电阻器的阻值，以便让你有个概念。


    在四环电阻器上，前两个色环给出电阻值的前两位数字，第三个色环告诉你需要乘以 10 的多少次方。棕色代表 1，黑色代表 0，红色代表 2。因此棕-黑-红表示阻值为
    `10` 乘以 `10²`，即这是一个 `1000 Ω` 的电阻器。金色条纹是误差环，它标明了该电阻器标称阻值的实际保证范围——对于金色环来说，是正负 5%。


    五环电阻器是黄-紫-黑-黑-棕，计算结果为 `470 Ω`，误差为正负 1%。（黄色是 4，紫色是 7，黑色是 0，所以这是 `470` 乘以 `10⁰`。按照惯例，任何数的零次方都等于
    1。）棕色误差环表示这是一个正负 1% 精度的电阻器。注意，无论是四环还是五环电阻器，乘数环并不表示最终电阻值的数字位数——它与科学记数法不同（如果你之前接触过的话）。在四环电阻器中，是将一个两位数乘以
    10 的某次方；在五环电阻器中，是将一个三位数乘以 10 的某次方。


    在图 5-3 中，误差环位于四环电阻器的顶部，五环电阻器的底部。我们这样摆放松是为了展示区分它们可能有多困难。经验会让你对常用电阻器有所感知。第一次从包装中取出电阻器时要仔细观察，以便学习辨认。理论上，在表示阻值的最后一环与误差环之间应该有一个间隔，但通常很难看出来。


    以下是一些常见的四环电阻器（忽略其误差环）：


    - 1 kΩ: 棕黑红

    - 10 kΩ: 棕黑橙

    - 470Ω: 黄紫棕


    #### LED


    发光二极管（LED）是一种低功耗光源，当电流沿一个方向（而非相反方向）通过时它会发光。LED 有一条腿比另一条长。独立 LED 较长的一侧应连接到电路的 `+`（`HIGH`，接
    `Vcc` 或 `3.3 V`）端。NeoPixel 灯珠有独立的电源（`+`）和地（`–`）接头。NeoPixel 还有信号输入和信号输出焊盘，我们将在第
    6 章讨论。图 5-4 展示了这两种类型各一个。


    ![A371637_1_En_5_Fig4_HTML.jpg](img/A371637_1_En_5_Fig4_HTML.jpg)


    图 5-4. 一套可缝纫的 NeoPixel 3-LED 灯组（左）和一个普通单颗 LED（右）


    不同颜色的 LED 会产生特定且固定的电压降。在 [`https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials`](https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials)
    上有一个表格对此进行了说明。通常，这些值在 2 到 4 伏之间。LED 无法承受过高的电流通过，并且会阻止电流以错误方向流过。

    '
- fmt: "### Sizing Resistors\n\nSuppose we wanted to create a circuit that would light\
    \ up an LED without making it blow out. First, looking at the numbers that are\
    \ usually listed on websites where you buy LEDs, or just by knowing common values\
    \ for LEDs, we would discover that the maximum current a red LED wants to see\
    \ is about 35 mA (or 0.035 amps). An Arduino usually puts out 5 volts at about\
    \ 20 mA max. So we need to put a resistor in series with the LED so that we do\
    \ not damage it or the Arduino pin controlling it. But how big a resistor?\n\n\
    Ohm’s Law says `V = I * R`, or we can make this `R = V / I`. The LED will drop\
    \ a fixed voltage of about 2 volts. That means that we will drop about 3 volts\
    \ (5 minus 2) across our unknown resistor.\n\nThe maximum current we want to run\
    \ through the LED is 35 mA, which is more than the Arduino’s max output of 20\
    \ mA (20 mA = 20/1000 A = 0.02 A). We use the lesser of the maximum current that\
    \ would be okay for the LED and the current that might damage the Arduino’s pin\
    \ (20 mA). Thus, the resistance we want is `R = V / I = 3 / 0.02 = 150 Ω`. So\
    \ we want a resistor at least this large. In this case, bigger is okay too (it\
    \ will just reduce the brightness of the LED).\n\n**Caution**  \nMore complex\
    \ components have resistance too, but it might vary depending on what the component\
    \ is doing at the time. Do not assume that only resistors have finite resistance.\n\
    \n### Jumper Wires\n\nTo connect points on a breadboard to each other or to an\
    \ Arduino, we use jumper wires. They are just wires that are insulated in the\
    \ middle and have exposed stiff wire on either end. Figure [5-5](#A371637_1_En_5_Chapter.html#Fig5)\
    \ shows both the common garden variety and the less common “pre-formed” flat jumpers\
    \ that look like giant staples.\n\n![A371637_1_En_5_Fig5_HTML.jpg](A371637_1_En_5_Fig5_HTML.jpg)\n\
    \n*Figure 5-5. Regular jumper wires and pre-formed ones*\n\nThe staple-like ones\
    \ have the virtue that it is a lot easier for a beginner to trace what is going\
    \ on. Both of these types are called male/male jumpers because there is a male\
    \ connector on each end. Other types of connectors come up from time to time (male-female\
    \ jumpers, for instance).\n\n## Voltage Divider\n\nA voltage divider is a piece\
    \ of a circuit in which two or more resistors are used to alter the voltage in\
    \ parts of the circuit connected to the circuit input or output. When two or more\
    \ resistors are wired in series, their resistances are added to figure out the\
    \ total resistance.\n\nWhen voltage drops across a series of resistors, intermediate\
    \ voltages are created between them. Typically, the arrangement is something like\
    \ that shown in Figure [5-6](#A371637_1_En_5_Chapter.html#Fig6) (where we show\
    \ that resistors can also be drawn as a squiggly line—the two drawings are equivalent).\n\
    \n![A371637_1_En_5_Fig6_HTML.jpg](A371637_1_En_5_Fig6_HTML.jpg)\n\n*Figure 5-6.\
    \ The voltage divider*\n\n### Interfacing the Analog and Digital\n\nAn Arduino\
    \ circuit can use current to do two things (perhaps simultaneously): power a component,\
    \ or cause a voltage to change as seen by a particular pin on an Arduino. The\
    \ latter are often called logic signals, and typically the circuit is designed\
    \ so that a voltage on a digital pin (more about this in Chapter [6](#A371637_1_En_6_Chapter.html))\
    \ is either unambiguously HIGH or LOW.\n\nVoltage dividers are useful when a digital\
    \ input needs to “see” a certain voltage reliably to use that voltage as the basis\
    \ for an action. For example, a pin being HIGH or LOW may cause a program running\
    \ on an Arduino to take an action. A button or switch with a pullup or pulldown\
    \ resistor is also a type of voltage divider. In this case, one of the resistors\
    \ (the button) switches from an infinite resistance to zero resistance when pressed\
    \ (or when released, in the case of a normally closed switch). We talk a lot about\
    \ this in Chapter [6](#A371637_1_En_6_Chapter.html). Many sensors are used in\
    \ circuits like this, so you can look in Chapter [8](#A371637_1_En_8_Chapter.html)\
    \ for examples, too.\n\nVoltage dividers can be used to change the voltage of\
    \ a logic signal to allow a component like an Arduino with 5-volt output to communicate\
    \ with another device (such as an accelerometer) that expects data to be sent\
    \ with a 3-volt HIGH signal.\n\nHowever, you cannot use a voltage divider to produce\
    \ the 3 volts needed to power the other device. Because the device draws current\
    \ to power itself, it acts as another resistor in parallel to one of the ones\
    \ in the divider, changing the effective resistance. Theoretically, putting the\
    \ right resistor in series with the device should limit the current and drop the\
    \ voltage appropriately, but in reality, the device needs a constant voltage even\
    \ when the current flowing through it changes (which is likely to happen, for\
    \ instance, as its outputs turn off and on).\n\nVoltage regulators are used to\
    \ produce a constant output voltage for this purpose, and most Arduino boards\
    \ have 5-volt and/or 3.3-volt regulators built in.\n\n### Potentiometers\n\nSometimes\
    \ it is useful to vary the voltage at a particular point in a circuit. When one\
    \ or both of the resistors in a voltage divider can change its value, you get\
    \ a variable voltage that can be read by the analog input pins on an Arduino.\n\
    \nThe most common form of this is a potentiometer, also sometimes called a pot,\
    \ which is a variable resistor, or a rheostat. A potentiometer is one big resistor\
    \ with a wiper that can make a conductive connection anywhere along the resistor.\n\
    \nThis means that from one end to the other, the potentiometer may measure 10\
    \ kΩ, but the wiper could be 0 kΩ on one side and 10 kΩ on the other, or it could\
    \ be 4 kΩ / 6 kΩ, or 8.73 kΩ / 1.27 kΩ, or any other ratio. Thus, if you connect\
    \ the two ends of the potentiometer to 5 V and ground, you can turn the knob on\
    \ the potentiometer to get any voltage on the wiper between those two.\n\nAn Arduino\
    \ can read this voltage to know the position of the potentiometer or equivalent\
    \ devices (like sensors in Chapter [8](#A371637_1_En_8_Chapter.html)) that are\
    \ used like voltage dividers.\n\n### Example\n\nIf the series of resistors is\
    \ between two different voltage levels, commonly 5 V and ground (zero V), the\
    \ total voltage drop across the series of resistors will be equal to the difference\
    \ between those two voltages, but the voltage drop across any particular resistor\
    \ in the series will be proportional to its fraction of the total resistance.\
    \ So, with a 2.2 kΩ resistor and a 3.3 kΩ resistor, the 2.2 kΩ will drop 2 volts,\
    \ and the 3.3 kΩ resistor will drop 3 volts. If the 2.2 kΩ resistor is connected\
    \ to 5 V and the 3.3 kΩ resistor is connected to ground, the voltage at the point\
    \ where the two connect to each other will be 3 V.\n\nWhen making a voltage divider,\
    \ you generally want to use resistors with values of several kΩ, because current\
    \ will always be running through the divider. In the earlier example, the total\
    \ resistance is 5.5 kΩ, so the current is 5 V / 5500 Ω = 0.91 mA. If instead we\
    \ had used 2.2 Ω and 3.3 Ω, the current would be about 910 mA (which may be more\
    \ than the power source can provide—a Flora, for instance, only has a 250 mA regulator)\
    \ and there would be 4.55 watts of power being dissipated between the two resistors\
    \ (1.82 on the 2.2 kΩ and 2.73 on the 3.3 kΩ). (A watt is a unit of power, computed\
    \ as current times voltage. That is, a resistor with a voltage drop of 1 V and\
    \ a current of 1 amp will dissipate 1 watt.)\n\nNot only is this wasteful, but\
    \ the resistors that you use on a breadboard are usually only rated for a quarter\
    \ watt and would burn out if they tried to dissipate that much power.\n\nOn the\
    \ other hand, if you used a value of several hundred megaohms (MΩ), your signal\
    \ might be very noisy because radio waves picked up by the wires between the resistors\
    \ might induce nearly as much current as the voltage across the divider. The total\
    \ resistance of a voltage divider should generally be somewhere in the range of\
    \ 1 to 100 kΩ."
  raw: '#### Sizing Resistors


    Suppose we wanted to create a circuit that would light up an LED without making
    it blow out. First, looking at the numbers that are usually listed on websites
    where you buy LEDs, or just by knowing common values for LEDs, we would discover
    that the maximum current a red LED wants to see is about 35 mA (or 0.035 amps).
    An Arduino usually puts out 5 volts at about 20 mA max. So we need to put a resistor
    in series with the LED so that we do not damage it or the Arduino pin controlling
    it. But how big a resistor?


    Ohm’s Law says V = I * R, or we can make this R = V / I. The LED will drop a fixed
    voltage of about 2 volts. That means that we will drop about 3 volts (5 minus
    2) across our unknown resistor.


    The maximum current we want to run through the LED is 35 mA, which is more than
    the Arduino’s max output of 20 mA (20 mA = 20/1000 A = 0.02 A). We use the lesser
    of the maximum current that would be okay for the LED and the current that might
    damage the Arduino’s pin (20 mA). Thus, the resistance we want is R = V / I =
    3 / 0.02 = 150 Ω. So we want a resistor at least this large. In this case, bigger
    is okay too (it will just reduce the brightness of the LED).


    Caution


    More complex components have resistance too, but it might vary depending on what
    the component is doing at the time. Do not assume that only resistors have finite
    resistance.


    #### Jumper Wires


    To connect points on a breadboard to each other or to an Arduino, we use jumper
    wires. They are just wires that are insulated in the middle and have exposed stiff
    wire on either end. Figure [5-5](#A371637_1_En_5_Chapter.html#Fig5) shows both
    the common garden variety and the less common “pre-formed” flat jumpers that look
    like giant staples.


    ![A371637_1_En_5_Fig5_HTML.jpg](A371637_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Regular jumper wires and pre-formed ones


    The staple-like ones have the virtue that it is a lot easier for a beginner to
    trace what is going on. Both of these types are called male/male jumpers because
    there is a male connector on each end. Other types of connectors come up from
    time to time (male-female jumpers, for instance).


    ## Voltage Divider


    A voltage divider is a piece of a circuit in which two or more resistors are used
    to alter the voltage in parts of the circuit connected to the circuit input or
    output. When two or more resistors are wired in series, their resistances are
    added to figure out the total resistance.


    When voltage drops across a series of resistors, intermediate voltages are created
    between them. Typically, the arrangement is something like that shown in Figure
    [5-6](#A371637_1_En_5_Chapter.html#Fig6) (where we show that resistors can also
    be drawn as a squiggly line—the two drawings are equivalent).


    ![A371637_1_En_5_Fig6_HTML.jpg](A371637_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    The voltage divider Interfacing the Analog and Digital


    An Arduino circuit can use current to do two things (perhaps simultaneously):
    power a component, or cause a voltage to change as seen by a particular pin on
    an Arduino. The latter are often called logic signals, and typically the circuit
    is designed so that a voltage on a digital pin (more about this in Chapter [6](#A371637_1_En_6_Chapter.html))
    is either unambiguously HIGH or LOW.


    Voltage dividers are useful when a digital input needs to “see” a certain voltage
    reliably to use that voltage as the basis for an action. For example, a pin being
    HIGH or LOW may cause a program running on an Arduino to take an action. A button
    or switch with a pullup or pulldown resistor is also a type of voltage divider.
    In this case, one of the resistors (the button) switches from an infinite resistance
    to zero resistance when pressed (or when released, in the case of a normally closed
    switch). We talk a lot about this in Chapter [6](#A371637_1_En_6_Chapter.html).
    Many sensors are used in circuits like this, so you can look in Chapter [8](#A371637_1_En_8_Chapter.html)
    for examples, too.


    Voltage dividers can be used to change the voltage of a logic signal to allow
    a component like an Arduino with 5-volt output to communicate with another device
    (such as an accelerometer) that expects data to be sent with a 3-volt HIGH signal.


    However, you cannot use a voltage divider to produce the 3 volts needed to power
    the other device. Because the device draws current to power itself, it acts as
    another resistor in parallel to one of the ones in the divider, changing the effective
    resistance. Theoretically, putting the right resistor in series with the device
    should limit the current and drop the voltage appropriately, but in reality, the
    device needs a constant voltage even when the current flowing through it changes
    (which is likely to happen, for instance, as its outputs turn off and on).


    Voltage regulators are used to produce a constant output voltage for this purpose,
    and most Arduino boards have 5-volt and/or 3.3-volt regulators built in.


    ### Potentiometers


    Sometimes it is useful to vary the voltage at a particular point in a circuit.
    When one or both of the resistors in a voltage divider can change its value, you
    get a variable voltage that can be read by the analog input pins on an Arduino.


    The most common form of this is a potentiometer, also sometimes called a pot,
    which is a variable resistor, or a rheostat. A potentiometer is one big resistor
    with a wiper that can make a conductive connection anywhere along the resistor.


    This means that from one end to the other, the potentiometer may measure 10 kΩ,
    but the wiper could be 0 kΩ on one side and 10 kΩ on the other, or it could be
    4 kΩ / 6 kΩ, or 8.73 kΩ / 1.27 kΩ, or any other ratio. Thus, if you connect the
    two ends of the potentiometer to 5 V and ground, you can turn the knob on the
    potentiometer to get any voltage on the wiper between those two.


    An Arduino can read this voltage to know the position of the potentiometer or
    equivalent devices (like sensors in Chapter [8](#A371637_1_En_8_Chapter.html))
    that are used like voltage dividers.


    ### Example


    If the series of resistors is between two different voltage levels, commonly 5
    V and ground (zero V), the total voltage drop across the series of resistors will
    be equal to the difference between those two voltages, but the voltage drop across
    any particular resistor in the series will be proportional to its fraction of
    the total resistance. So, with a 2.2 kΩ resistor and a 3.3 kΩ resistor, the 2.2
    kΩ will drop 2 volts, and the 3.3 kΩ resistor will drop 3 volts. If the 2.2 kΩ
    resistor is connected to 5 V and the 3.3 kΩ resistor is connected to ground, the
    voltage at the point where the two connect to each other will be 3 V.


    When making a voltage divider, you generally want to use resistors with values
    of several kΩ, because current will always be running through the divider. In
    the earlier example, the total resistance is 5.5 kΩ, so the current is 5 V / 5500
    Ω = 0.91 mA. If instead we had used 2.2 Ω and 3.3 Ω, the current would be about
    910 mA (which may be more than the power source can provide—a Flora, for instance,
    only has a 250 mA regulator) and there would be 4.55 watts of power being dissipated
    between the two resistors (1.82 on the 2.2 kΩ and 2.73 on the 3.3 kΩ). (A watt
    is a unit of power, computed as current times voltage. That is, a resistor with
    a voltage drop of 1 V and a current of 1 amp will dissipate 1 watt.)


    Not only is this wasteful, but the resistors that you use on a breadboard are
    usually only rated for a quarter watt and would burn out if they tried to dissipate
    that much power.


    On the other hand, if you used a value of several hundred megaohms (MΩ), your
    signal might be very noisy because radio waves picked up by the wires between
    the resistors might induce nearly as much current as the voltage across the divider.
    The total resistance of a voltage divider should generally be somewhere in the
    range of 1 to 100 kΩ.'
  trans: "\n### 电阻选型\n\n假设我们要创建一个能让 LED 点亮而又不会烧毁它的电路。首先，查看通常在购买 LED 的网站上列出的数值，或者仅凭对\
    \ LED 常见值的了解，我们会发现一个红色 LED 能承受的最大电流约为 35 mA（即 0.035 安培）。Arduino 通常最大输出 5 伏特电压、约\
    \ 20 mA 电流。因此，我们需要在 LED 电路中串联一个电阻，以免损坏 LED 或控制它的 Arduino 引脚。但电阻要多大呢？\n\n欧姆定律指出\
    \ `V = I * R`，或者我们可以将其变形为 `R = V / I`。LED 会固定降低约 2 伏特的电压。这意味着我们的未知电阻上将下降约 3 伏特（5\
    \ 伏特减去 2 伏特）。\n\n我们希望通过 LED 的最大电流是 35 mA，这超过了 Arduino 的最大输出 20 mA（20 mA = 20/1000\
    \ A = 0.02 A）。我们选择对 LED 安全的最大电流与可能损坏 Arduino 引脚（20 mA）的电流中较小的那个值。因此，我们需要的电阻为 `R\
    \ = V / I = 3 / 0.02 = 150 Ω`。所以我们至少需要一个这么大的电阻。在这种情况下，电阻值更大一些也是可以的（它只会降低 LED 的亮度）。\n\
    \n**注意**  \n更复杂的元器件也有电阻，但其阻值可能会根据该元器件当时的工作状态而变化。不要想当然地认为只有电阻器才有有限的电阻。\n\n### 杜邦线\n\
    \n为了连接面包板上的各个点，或者将面包板与 Arduino 相连，我们使用杜邦线。它们就是中间有绝缘层、两端露出硬质金属丝的导线。图 5-5 展示了常见的普通类型以及不太常见的“预成型”扁平跳线，它们看起来像巨大的订书钉。\n\
    \n![A371637_1_En_5_Fig5_HTML.jpg](img/A371637_1_En_5_Fig5_HTML.jpg)\n\n*图 5-5.\
    \ 普通杜邦线与预成型杜邦线*\n\n像订书钉那种类型的优点在于，对于初学者来说追踪线路走向要容易得多。这两种类型都称为公对公跳线，因为两端都是公头连接器。其他类型的连接器偶尔也会用到（例如公对母跳线）。\n\
    \n## 分压器\n\n分压器是电路的一部分，其中使用两个或多个电阻来改变连接到电路输入或输出端的电路部分的电压。当两个或多个电阻串联时，它们的电阻值相加得到总电阻。\n\
    \n当电压在一系列串联电阻上下降时，它们之间会产生中间电压。典型的结构类似于图 5-6 所示（图中展示电阻也可以用波浪线表示——这两种画法是等效的）。\n\n\
    ![A371637_1_En_5_Fig6_HTML.jpg](img/A371637_1_En_5_Fig6_HTML.jpg)\n\n*图 5-6. 分压器*\n\
    \n### 模拟与数字的接口\n\nArduino 电路可以使用电流做两件事（可能同时进行）：为元器件供电，或者使 Arduino 特定引脚上的电压发生变化。后者通常被称为逻辑信号，电路设计通常使得数字引脚上的电压（更多内容见第\
    \ 6 章）要么明确为高电平，要么明确为低电平。\n\n当数字输入需要“看到”某个可靠的电压，并以此电压作为执行操作的基础时，分压器就很有用。例如，一个引脚为高电平或低电平可能会使\
    \ Arduino 上运行的程序执行某个操作。带有上拉或下拉电阻的按钮或开关也是一种分压器。在这种情况下，其中一个电阻（按钮）在按下时（对于常闭开关，则是释放时）会从无穷大电阻变为零电阻。我们在第\
    \ 6 章中对此进行了大量讨论。许多传感器都用在这样的电路中，因此你也可以在第 8 章中查找相关示例。\n\n分压器可用于改变逻辑信号的电压，以便让诸如输出为\
    \ 5 伏特的 Arduino 这类元器件与另一个期望以 3 伏特高电平信号发送数据的设备（例如加速度计）进行通信。\n\n但是，你不能使用分压器来产生为其他设备供电所需的\
    \ 3 伏特电压。因为设备需要汲取电流来自我供电，它相当于在分压器中的一个电阻上并联了另一个电阻，从而改变了有效电阻。理论上，在设备上串联一个合适的电阻应该能限制电流并适当降低电压，但实际上，即使流过设备的电流发生变化（例如，当其输出端开启和关闭时很可能发生这种情况），设备也需要一个恒定的电压。\n\
    \n为此，需要使用电压调节器来产生恒定的输出电压，大多数 Arduino 板都内置有 5 伏特和/或 3.3 伏特的电压调节器。\n\n### 电位器\n\n\
    有时，改变电路中特定点的电压是很有用的。当分压器中的一个或两个电阻可以改变其阻值时，你会得到一个可变电压，该电压可以被 Arduino 上的模拟输入引脚读取。\n\
    \n最常见的形式是电位器，有时也称为可变电阻器或变阻器。电位器是一个大的电阻器，带有一个滑动端，可以在电阻器的任意位置建立导电连接。\n\n这意味着从一端到另一端，电位器可能测得\
    \ 10 kΩ，但滑动端的一侧可能是 0 kΩ，另一侧是 10 kΩ，也可能是 4 kΩ / 6 kΩ，或者 8.73 kΩ / 1.27 kΩ，或者任何其他比例。因此，如果你将电位器的两端分别连接到\
    \ 5 V 和地线，你可以转动电位器的旋钮，在滑动端上获得介于这两者之间的任意电压。\n\nArduino 可以读取这个电压，从而知道电位器或用作分压器的等效设备（如第\
    \ 8 章中的传感器）的位置。\n\n### 示例\n\n如果电阻串联电路位于两个不同的电压电平之间，通常是 5 V 和地线（0 V），那么整个串联电阻上的总电压降将等于这两个电压之差，但串联电路中任何一个特定电阻上的电压降将与其占总电阻的比例成正比。因此，对于一个\
    \ 2.2 kΩ 的电阻和一个 3.3 kΩ 的电阻，2.2 kΩ 电阻将分得 2 伏特电压，3.3 kΩ 电阻将分得 3 伏特电压。如果 2.2 kΩ 电阻连接到\
    \ 5 V，而 3.3 kΩ 电阻连接到地线，那么两个电阻连接点的电压将为 3 V。\n\n在制作分压器时，通常应使用阻值为几千欧姆的电阻，因为电流会一直流过分压器。在前面的示例中，总电阻为\
    \ 5.5 kΩ，因此电流为 5 V / 5500 Ω = 0.91 mA。如果我们改用 2.2 Ω 和 3.3 Ω 的电阻，电流将约为 910 mA（这可能超出了电源的提供能力——例如，Flora\
    \ 只有 250 mA 的调节器），并且两个电阻之间会耗散 4.55 瓦的功率（2.2 kΩ 电阻上 1.82 瓦，3.3 kΩ 电阻上 2.73 瓦）。（瓦特是功率单位，计算方式为电流乘以电压。也就是说，电压降为\
    \ 1 V、电流为 1 安的电阻会耗散 1 瓦功率。）\n\n这不仅浪费，而且你在面包板上使用的电阻通常额定功率仅为四分之一瓦，如果试图耗散那么多功率，它们就会烧毁。\n\
    \n另一方面，如果你使用几百兆欧姆（MΩ）的阻值，你的信号可能会非常嘈杂，因为电阻之间导线上拾取的无线电波所产生的感应电流可能几乎与分压器两端的电压相当。分压器的总电阻通常应大致在\
    \ 1 kΩ 到 100 kΩ 的范围内。\n"
- fmt: '# Creating a Circuit


    Now we will take some of the components that we have described so far and create
    a circuit. If we look back at Figure [5-2](#A371637_1_En_5_Chapter.html#Fig2),
    we see a simple series circuit with a 470 Ω resistor, an LED, and a button.


    The first thing to notice is the long red wire going from 5 V on the Arduino to
    a vertical rail of the breadboard, and a shorter wire going from the GND (ground)
    Arduino pin to the rail next to it, as we talked about in the “Breadboard” section
    earlier in this chapter.


    Tracing the circuit from top to bottom, we have a 470 Ω resistor in series with
    a red LED and a button. When we look it up at the site referenced in the “LED”
    section of this chapter, we see that red LEDs have an inherent 1.8 V drop across
    them, plus or minus 0.2 V.


    The Arduino is putting out 5 volts. If we use the example earlier in the discussion
    of Ohm’s Law, we see that the 470 Ω resistor is plenty big enough to protect the
    LED. If you plugged this into the USB port of a compatible computer and pushed
    the button, you would expect the LED to light up if the button is pushed.


    If the button is pushed, the LED is connected to 5 V through the resistor and
    to GND through the button. This means that adequate current will flow through
    the LED, and it will light up. If the button is open, the LED is connected to
    5 V on one side and to an unknown, un-set voltage on the other. It is said to
    be floating. We do not care in this chapter, because we are not trying to use
    any of the voltages in the circuit to control something else. In Chapter [6](#A371637_1_En_6_Chapter.html)
    we will care, however, and we will introduce some concepts here to start to explain
    that.


    In Figure [5-7](#A371637_1_En_5_Chapter.html#Fig7), we show a different kind of
    circuit. If the Arduino is just being used as a power supply and you push the
    button, nothing happens. The LED is connected only to ground and weakly to an
    unknown voltage from pin 12. The button is on a separate circuit. In Chapter [6](#A371637_1_En_6_Chapter.html)
    we will look at this as an example of a pulldown resistor. We introduce it here
    to show that you can create unconnected circuits in hardware that you will need
    to connect in software to do something.


    ![A371637_1_En_5_Fig7_HTML.jpg](A371637_1_En_5_Fig7_HTML.jpg)


    Figure 5-7. A circuit with a pulldown resistor


    The circuit in Figure [5-7](#A371637_1_En_5_Chapter.html#Fig7) does nothing in
    this chapter, since we are just using the Arduino as a power supply and there
    is no direct electrical connection between the button and the LED. In Chapter
    [6](#A371637_1_En_6_Chapter.html) we will show the code to have the Arduino manage
    turning the LED on or off using the button. The button forms a voltage divider
    with the second 10 kΩ resistor. If the button is pushed, it has a very low resistance
    resistor. If the button is not pushed, its resistance is infinite.


    When the button is not pushed, pin 2 is weakly connected to 5 V—weakly because
    it is connected through a significant resistance, and the “other half” of the
    voltage divider (the open button) has an infinite resistance—thus no appreciable
    current is flowing. Pin 2 would see what the Arduino would interpret as a `HIGH`
    voltage (discussed in the next chapter).


    If the button is pushed, the button will have almost no resistance. Pin 2 will
    now be connected to (almost) ground. We say “almost” because most of the voltage
    drop will occur across the 10 kΩ resistor, not across the small resistance of
    the button connection. Pin 2 would thus see what the Arduino would interpret as
    a `LOW` voltage.


    In later chapters we will do things like this to create `HIGH` and `LOW` defined
    voltages on pins we use to see what is going on in a circuit. This is called using
    a pulldown resistor because the resistor pulls down the output to a known value
    instead of leaving it to float. Until the button is pushed, pin 2 is connected
    to 5 V, but when you push the button, it creates a strong connection to GND and
    allows a small amount of current (inversely proportional to the value of the resistor)
    to flow.


    **Tip**


    Pullup and pulldown resistors should have values of no less than 1 kΩ and may
    be as much as 100 kΩ. Higher values may create a connection that is too weak and
    may react too slowly or be vulnerable to interference. The chip used by an Arduino
    has internal pullup (but not pulldown) resistors that can be activated by writing
    an input pin `HIGH`.


    ## Fritzing


    The Fritzing program allows you to draw diagrams of circuits neatly so that you
    can share circuits with others in a clean and lucid way. You can share either
    cartoon “breadboard” views (what we have used in this document so far), or show
    the circuit as a schematic or how it would look as a printed circuit board (PCB)
    layout if you had a special-purpose board created. You can download the program
    (which is free) at [`www.fritzing.org`](http://www.fritzing.org), and there are
    tutorials at [`http://fritzing.org/learning/`](http://fritzing.org/learning/).


    ### Using the Inspector


    To change component details or to see what the defaults are, click on a component
    and then go to the Window menu item and be sure that `Inspector` is checked, which
    will display the Inspector window. In this example we have selected a resistor.
    When we look in the Inspector pane on the lower right, we see that we can select
    the resistor resistance value from a dropdown menu, and it will change the color
    bands on the displayed part to the correct values for that resistance. This is
    particularly handy for resistors, but it applies to other components too.


    ### Adding New Components


    Fritzing comes with a standard set of components. To add more, you may need to
    search around a bit to see if someone has created other components. To see how
    to add the Adafruit components, for example, see [`https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github`](https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github)
    or, for Sparkfun components, [`https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts`](https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts).


    ### Fritzing Expert Tips


    To add more components in breadboard view, go to the upper right and click on
    the spyglass. You can type in what you want (a manufacturer, a type of component,
    and so on) to find a component.


    Right-clicking (Control-clicking on a Mac) on a component brings up other options
    you can change, too (like wire color).


    **Note**


    It is easy to forget that any given physical circuit can run different software
    and vice versa. What your circuit and its software do is a result of both of these
    aspects, and there usually are many ways to create a circuit to do something you
    want to do. You might consider figuring out something one way, taking photos,
    and then trying a different one. The photos are insurance in case you cannot figure
    out another way.'
