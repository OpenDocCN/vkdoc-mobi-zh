  trans: "\n# 定时器围裙\n\n你正在为朋友们举办一场派对，并想时刻留意厨房里正在烹饪的食物。要是能有个东西，你只需轻敲一下就能为一分钟计时，那该多好啊？在本例中，我们将制作一条带有内置定时器的围裙。当你轻敲一小块导电布时，计时器开始运行，此时一个\
    \ NeoPixel 灯会亮起红色；计时结束后，NeoPixel 灯会变成绿色并持续一段你设定的时间，然后熄灭。整个装置由一块 Adafruit Gemma\
    \ 处理器控制，它类似于一个精简版的 Arduino（详见第 5 章），由两节纽扣电池供电。图 7-1 展示了完成后的围裙，Gemma 及其电池被放置在保护口袋中。\n\
    \n![A371637_1_En_7_Fig1_HTML.jpg](img/A371637_1_En_7_Fig1_HTML.jpg)\n\n图 7-1.\
    \ 完成后的定时器围裙\n\n围裙上的平底锅由三层构成：顶层是导电布，中间层是中间带孔的毛毡，底层也是导电布。当你按压顶层时，它会通过毛毡上的孔与底层连通。这就提供了一种非常不精确的方式，让你可以用手腕或任何干燥的物体来启动定时器。（请注意，在通电状态下，围裙不应弄湿。）\n\
    \n制作这个项目，你需要以下材料和工具：\n\n*   1 至 1.5 码轻到中等重量的棉布\n*   一卷缝纫线和梭芯\n*   用于纸样和/或裁缝粉笔的纸张\n\
    *   剪刀\n*   卷尺\n*   用于系带的棉质织带（可选）\n*   斜纹镶边带（可选）\n*   刺绣针\n*   白色和黑色绣花线\n*   一小块毛毡\n\
    *   Gemma 微处理器\n*   NeoPixel LED 灯\n*   导电布\n*   导电缝纫线\n*   两节（3 伏）纽扣电池\n*   电池盒（专为两节纽扣电池设计）\n\
    *   五根鳄鱼夹测试线（用于测试目的）\n\n> **注意**  \n> 本章介绍了一种制作该项目的简单方法。在第 11 章中，我们会讨论几个项目，并给出一些关于如何使本项目更省电的建议。在这里，我们侧重于让实现过程易于制作、调试和理解。但是，除非你断开电池连接，否则本项目会很快耗尽电池电量（我们估计能用几天时间，取决于你按按钮的频率）。\n\
    \n## 项目规划\n\n对于可穿戴项目，人们总忍不住直接开始缝制。然而，最好先克制住这种冲动，首先弄清楚你希望控制电路实现什么功能。然后，你可以先用 Fritzing（详见第\
    \ 5 章）设计电路布局，再用鳄鱼夹搭建测试电路，最后编写代码。\n\n我们建议在开始缝制之前完成所有这些工作，以防你发现还需要另一个元件（以及安装它的位置），或者意识到电路需要以某种特定方式布局，而这种布局在衣服尚未缝合时可能更方便实现。\n\
    \n> **提示**  \n> 琼（Joan）和林恩（Lyn）都发现，与 Fritzing 原理图相比，使用鳄鱼夹搭建的电路版本能更直观地想象电路的走向，尽管夹出来的电路有时可能会有点笨拙。里奇（Rich）不同意这种看法，所以这些事关乎个人风格和可视化能力。随着经验的积累，你会形成自己的方法。\n\
    \n由于这个项目要在需要保护 Gemma 的环境中使用，我们决定将 Gemma 及其连接线固定在一个小标签上，这样它就可以和电池一起滑入口袋。“平底锅按钮”需要精心设计，既要使其易于按压，又要防止误触。\n\
    \n## 控制设计及软件\n\n在这个案例中，我们希望只要定时器未被启动，电路就什么也不做。一旦定时器启动，NeoPixel 灯亮起红色。计时结束时，NeoPixel\
    \ 灯变成绿色并持续另一段时间。这两段时间都在代码顶部的`#define`语句中指定。如果你希望电路做更多事情——比如按不同时间长度循环显示几种颜色——你可以添加更多对\
    \ Adafruit 两个库函数的调用（详见第 6 章）：\n\n```\npixels.setPixelColor(0, pixels.Color(r,\
    \ g, b));\npixels.show();\n```\n\n`r`, `g`, `b`是 0 到 255 之间的数值，用于决定你想要的红色、绿色或蓝色像素的亮度。请注意，这三种原色的相对亮度决定了最终颜色的色调。整个\
    \ Gemma 的代码如代码清单 7-1 所示。\n\n> **注意**  \n> 代码清单 7-1 将计时器设置为仅运行一秒，然后让 NeoPixel 灯点亮两秒。我们建议你在调试过程中保持此设置，之后再将其改为你想要的任何数值（一分钟为\
    \ 60,000 毫秒）。`TIMER_DELAY`是计时器倒计时的时长（期间 NeoPixel 灯为红色），单位为毫秒；`PERSISTENCE_DELAY`是计时结束后\
    \ NeoPixel 灯保持绿色的时长。\n\n```\n// Program to turn on a neopixel red when a button\
    \ is pushed\n// And then green after a specified delay passes\n// And finally\
    \ turns off after a second specified delay\n#include <Adafruit_NeoPixel.h>\n#define\
    \ NEOPIXEL_PIN 2 // pin controlling the Neopixel\n#define BUTTON_PIN 1 // pin\
    \ reading the state of the button\n#define TIMER_DELAY 1000\n// in milliseconds\
    \ - one second for the demo\n#define PERSISTENCE_DELAY 2000\n//time to wait before\
    \ turning off, in milliseconds\nAdafruit_NeoPixel pixels =\nAdafruit_NeoPixel(1,\
    \ NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800);\n/*\nLast parameter depends on the neopixel\
    \ version you have\nSee https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library\n\
    Remember for Gemma you need to push reset button\nto load in your program (no\
    \ loading after red light stops flashing)\n*/\nvoid setup() {\npixels.begin();\n\
    pinMode(BUTTON_PIN, INPUT);\ndigitalWrite(BUTTON_PIN, HIGH);\n/*\nBUTTON_PIN is\
    \ set to INPUT with the\ninternal pull-up enabled and is\nconnected to the first\
    \ layer of the button (one closest to apron fabric).\nWhen the button is pressed,\n\
    this pin is connected to GND and goes LOW,\nand the circult begins its countdown.\n\
    Here we use pin D1 which will light up the red LED\nwhen D1 is HIGH (the button\
    \ is NOT pushed)\n*/\n} // end setup\nvoid loop() {\nif (digitalRead(BUTTON_PIN)\
    \ == LOW) {\npixels.setPixelColor(0, pixels.Color(0, 150, 0));\npixels.show();\n\
    // first have red light while timer is counting down\n// this lets you know button\
    \ was pushed and the timer is running\ndelay(TIMER_DELAY);\npixels.setPixelColor(0,\
    \ pixels.Color(150, 0, 0));\npixels.show();\ndelay(PERSISTENCE_DELAY);\n// turn\
    \ green after timer is done\n//and stay green for PERSISTENCE_DELAY seconds\n\
    } else {\npixels.setPixelColor(0, pixels.Color(0, 0, 0));\npixels.show();\n//\
    \ pixels turned off\n}\n} // end loop\n```\n\n代码清单 7-1. 围裙程序\n"
- fmt: '# Laying Out the Circuit


    Once we have the sketch written and know how everything will work, we are ready
    to lay out the circuit. Figure [7-2](#A371637_1_En_7_Chapter.html#Fig2) shows
    the Fritzing diagram for this project. This circuit uses a `Gemma` board, a `NeoPixel`,
    and two pieces of conductive fabric arranged so as to be equivalent to a button
    switch.


    ![A371637_1_En_7_Fig2_HTML.jpg](A371637_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Fritzing diagram of the circuit for the apron


    It works like this: the `Gemma` sets up pin `D2` as an output that will control
    the state of the `NeoPixel`. The ground wire of the `NeoPixel` is tied back to
    the top of the conductive fabric "button." Pin `D1` is a special pin that lights
    up the attached onboard light if it is set to `HIGH`. We use this pin to detect
    the state of the conductive-fabric button as follows:


    *   When the switch is open, the red board light is on. Pin `D1` is set to `HIGH`
    by default by the code and is acting here as a pullup resistor (see Chapter [5](#A371637_1_En_5_Chapter.html)).

    *   When the switch is closed, pin `D1` is pulled down to ground, the `Gemma`
    sends a signal to the `NeoPixel` to turn itself on, first one color and then the
    next. After the timers clock out for the two timed lights, the `Gemma` shuts the
    `NeoPixel` off by setting the brightness of all three colors to zero.


    Figure [7-3](#A371637_1_En_7_Chapter.html#Fig3) shows how this looks laid out
    with alligator clips. The red wire goes from `Vout` to the `+` on the `NeoPixel`.
    The blue wire goes from `Gemma` pin `D2` to the input of the `NeoPixel` (`->`).
    The grey wire goes from the ground (`–`) side of the `NeoPixel` to the top piece
    of conductive fabric, which the black wire connects to `GND` on the `Gemma`. Finally,
    the green wire goes from `D1` on the `Gemma` to the piece of conductive fabric
    forming the bottom of the button. (We used two scraps here to simulate the top
    and bottom of the saucepan button we create in the project.)


    ![A371637_1_En_7_Fig3_HTML.jpg](A371637_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Circuit testing with alligator clips


    By touching the green wire''s conductive fabric to the piece connecting the grey
    and black wires, we pull pin `D1` down from `HIGH` to `LOW`, and the code running
    on the `Gemma` turns on the `NeoPixel`.


    ## Debugging


    Once you are happy with the alligator-clipped circuit, you can upload the sketch
    to it (see details in Chapter [6](#A371637_1_En_6_Chapter.html)) and see if it
    works as advertised with power supplied via the USB cable to the `Gemma`. If not,
    check that your alligator clips are firmly attached, that they are attached to
    the correct places, and that your USB is getting power to the `Gemma` (the green
    light on the `Gemma` board itself, which is labeled `PWR`, should be on).


    > **Tip**: `Gemmas` are a little finicky to get started. You need to upload code
    right after you apply power, while the red light is flashing because the "bootloader,"
    which allows the `Gemma` to receive code from the USB, is running—we cover this
    in Chapter [6](#A371637_1_En_6_Chapter.html). Otherwise it will not load correctly.
    If you are too late, you can get the bootloader to run again by hitting the (very
    tiny!) reset button.


    You can also use a `Flora` for this circuit. If you have older (v1) `NeoPixels`,
    you will need to change the last parameter in the line `Adafruit_NeoPixel pixels
    = Adafruit_NeoPixel(1, NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800)`. This last parameter
    depends on the vintage of `NeoPixel` you have. For details, see [`https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library`](https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library).
    For v1 `NeoPixels`, change `NEO_GRB + NEO_KHZ800` to `NEO_RGB + NEO_KHZ400`.


    # Sewing the Apron


    Once you feel you have the circuit and software under control, it is time to make
    the apron and sew the circuit onto it. You can look at the alligator-clipped version
    and think about how it is going to lay across the fabric. We highly recommend
    you read all the way to the end of the chapter before starting any of this so
    that you have a mental picture of where you are going. We are going to switch
    to Lyn narrating the creation of the pattern now, since she is the expert here.


    ## Creating a Pattern


    Start by measuring from about 2 inches below the top of your sternum to where
    you want your apron to end. I am five foot three inches tall, so if I want the
    top of my apron to start below my sternum and to fall to about 3 inches above
    my knees, I need the following measurements—you can vary to fit your height. I
    measured and cut my fabric 12 inches wide across the top of the bib, and curved
    out to make it 24 inches at its widest part (at the bottom). In my case, the measurement
    from top to bottom of the center of the apron was 28 inches. This allows for approximately
    an inch on every side for double hemming, or you may want to use bias tape (strips
    of fabric you can purchase to finish off a garment), in which case you would probably
    only add a half inch to each edge.


    Using the diagram in Figure [7-4](#A371637_1_En_7_Chapter.html#Fig4), create a
    pattern out of tissue or butcher paper, or draw it with tailor''s chalk directly
    on your fabric. The body of the apron should be about 24–27 inches wide, and the
    bib can be 8–10 inches wide after hemming. It all depends on how much of your
    torso you want to cover with the apron. Fold the fabric in half so the selvage
    (finished borders of the fabric) edges are together. Draw half of your apron out
    on the fabric, or use the paper pattern you have created, and cut out your apron.
    Using the fold will allow you to have even curves on both sides.


    ![A371637_1_En_7_Fig4_HTML.jpg](A371637_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. Pattern for the apron (scale up as needed)


    We are making a small pocket on the left side of the bib (meaning on your left
    as you are wearing it) to hold the battery and `Gemma`. The saucepan button will
    be sewn just to the wearer''s right of this pocket. The small pocket will be 2.5
    inches wide and 4 inches deep, so we will cut a piece of fabric 3.5 inches wide
    and 5 inches deep, to allow for hemming (Figure [7-5](#A371637_1_En_7_Chapter.html#Fig5)).
    The large pocket on the body of the apron will be 6 inches wide by 7 inches deep,
    so we will cut a piece 7 inches by 8.


    ![A371637_1_En_7_Fig5_HTML.jpg](A371637_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. Apron pattern laid out with chalk. Fold is along bottom of the photo.


    If you want to make the strap and ties out of the apron fabric instead of cotton
    webbing, cut one piece of fabric 4 inches wide by 22–24 inches long and two pieces
    of fabric 4 inches wide by 24–26 inches long. Make sure to cut these pieces on
    the straight grain of the fabric, which is parallel to the selvage edge—otherwise
    your apron will be cut across the weave of the fabric, and the fabric will not
    fall evenly or may bunch up.


    ## Creating the Saucepan Button


    We will cut two pieces of conductive fabric and one piece of felt in the shape
    of a saucepan to create the timer button (Figures [7-6](#A371637_1_En_7_Chapter.html#Fig6)
    and [7-7](#A371637_1_En_7_Chapter.html#Fig7)). The felt will insulate the conductive
    fabric, except in the center. We will cut a hole in the felt to allow the conductive
    fabric to make contact when we press the center of the saucepan. The "steam" can
    be created by pieces of felt, fabric sewn on, or by embroidery (see how it looks
    in Figure [7-1](#A371637_1_En_7_Chapter.html#Fig1)).


    ![A371637_1_En_7_Fig7_HTML.jpg](A371637_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. Using a simple paper pattern to cut out the top of the saucepan.


    ![A371637_1_En_7_Fig6_HTML.jpg](A371637_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. The felt inner part of the button (top left), the saucepan top (conductive
    fabric—top right), the paper pattern (bottom left), and the conductive fabric
    bottom of the button (bottom right)'
  raw: '### Laying Out the Circuit


    Once we have the sketch written and know how everything will work, we are ready
    to lay out the circuit. Figure [7-2](#A371637_1_En_7_Chapter.html#Fig2) shows
    the Fritzing diagram for this project. This circuit uses a Gemma board, a NeoPixel,
    and two pieces of conductive fabric arranged so as to be equivalent to a button
    switch.


    ![A371637_1_En_7_Fig2_HTML.jpg](A371637_1_En_7_Fig2_HTML.jpg)


    Figure 7-2.


    Fritzing diagram of the circuit for the apron


    It works like this: the Gemma sets up pin D2 as an output that will control the
    state of the NeoPixel. The ground wire of the NeoPixel is tied back to the top
    of the conductive fabric “button.” Pin D1 is a special pin that lights up the
    attached onboard light if it is set to `HIGH`. We use this pin to detect the state
    of the conductive-fabric button as follows:


    *   When the switch is open, the red board light is on. Pin D1 is set to `HIGH`
    by default by the code and is acting here as a pullup resistor (see Chapter [5](#A371637_1_En_5_Chapter.html)).

    *   When the switch is closed, pin D1 is pulled down to ground, the Gemma sends
    a signal to the NeoPixel to turn itself on, first one color and then the next.
    After the timers clock out for the two timed lights, the Gemma shuts the NeoPixel
    off by setting the brightness of all three colors to zero.


    Figure [7-3](#A371637_1_En_7_Chapter.html#Fig3) shows how this looks laid out
    with alligator clips. The red wire goes from Vout to the + on the NeoPixel. The
    blue wire goes from Gemma pin D2 to the input of the NeoPixel (->). The grey wire
    goes from the ground (–) side of the NeoPixel to the top piece of conductive fabric,
    which the black wire connects to GND on the Gemma. Finally, the green wire goes
    from D1 on the Gemma to the piece of conductive fabric forming the bottom of the
    button. (We used two scraps here to simulate the top and bottom of the saucepan
    button we create in the project.)


    ![A371637_1_En_7_Fig3_HTML.jpg](A371637_1_En_7_Fig3_HTML.jpg)


    Figure 7-3.


    Circuit testing with alligator clips


    By touching the green wire’s conductive fabric to the piece connecting the grey
    and black wires, we pull pin D1 down from `HIGH` to `LOW`, and the code running
    on the Gemma turns on the NeoPixel.


    ### Debugging


    Once you are happy with the alligator-clipped circuit, you can upload the sketch
    to it (see details in Chapter [6](#A371637_1_En_6_Chapter.html)) and see if it
    works as advertised with power supplied via the USB cable to the Gemma. If not,
    check that your alligator clips are firmly attached, that they are attached to
    the correct places, and that your USB is getting power to the Gemma (the green
    light on the Gemma board itself, which is labeled PWR, should be on).


    Tip


    Gemmas are a little finicky to get started. You need to upload code right after
    you apply power, while the red light is flashing because the “bootloader,” which
    allows the Gemma to receive code from the USB, is running—we cover this in Chapter
    [6](#A371637_1_En_6_Chapter.html). Otherwise it will not load correctly. If you
    are too late, you can get the bootloader to run again by hitting the (very tiny!)
    reset button.


    You can also use a Flora for this circuit. If you have older (v1) NeoPixels, you
    will need to change the last parameter in the line `Adafruit_NeoPixel pixels =
    Adafruit_NeoPixel(1, NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800).` This last parameter
    depends on the vintage of NeoPixel you have. For details, see [`https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library`](https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library)
    . For v1 NeoPixels, change `NEO_GRB + NEO_KHZ800` to `NEO_RGB + NEO_KHZ400`.


