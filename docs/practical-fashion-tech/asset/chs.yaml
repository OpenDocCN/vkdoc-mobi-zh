- "# 8. 传感器与其他硬件\n\n会发光的配件已经很酷了，但我们还能更进一步。在本章中，Joan 和 Rich 将为你介绍几种不同类型的传感器——这些组件能够检测现实世界的某些属性，例如温度或光照强度。然后你可以对\
  \ Arduino 进行编程，使其读取传感器数据并根据数据执行相应操作。例如，在第 11 章中，我们将教你如何制作一顶根据头部倾斜角度变换不同颜色的帽子。在本章中，Joan\
  \ 和 Rich 将带你了解一些常见的传感器及其使用方法。\n\n你还可以制作能够自主移动的软质物品或服装——第 10 章中描述的“幽灵连衣裙”就是一个例子。但正如我们在那一章中指出的，制作可移动的服装颇具挑战性。使用电机比我们想在本书中详细介绍的内容要更复杂（主要是因为供电需求），但我们会在本章的“让物体动起来”部分概述相关问题，并推荐一些深入学习的资源。\n\
  \n### 传感器\n\n现在市面上有许多兼容 Arduino 的传感器，这些设备可以测量从环境温度和光照强度到周围空气中甲烷百分比等各种参数。Adafruit\
  \ 和 Sparkfun 销售多种不同类型的传感器，而像亚马逊这样的在线零售商也提供各种选择。不过，一个挑战在于，与这些传感器所面向的消费产品市场相比，业余 DIY\
  \ 用户（也就是我们！）的规模微乎其微，因此相关文档有时可能非常粗略。\n\n可缝纫的传感器则少得多，而且现有的通常相对昂贵。不过，可穿戴传感器专为缝纫设计，可能更坚固耐用，文档也更详细。你的选择将在很大程度上取决于具体应用、经验水平和预算。\n\
  \n我们将尝试使用光电二极管（用于测量环境光）和热敏电阻（用于测量温度）。要弄清楚如何操作任何特定传感器，都需要进行一些探索。在本章中，我们将逐步讲解整个过程的示例。\n\
  \n第 11 章中有一个关于陀螺仪帽子的示例，它可以感知佩戴者头部的倾斜角度。在本章中，我们将简要介绍陀螺仪、加速度计和磁力计，然后在第 11 章中运用这些知识。\n\
  \n**注**\n\n本书中的项目我们尽量避免使用焊接。但是，如果你想使用我们这里描述之外的传感器，焊接可能是最实用的选择。我们将介绍一些无需焊接的原型制作方法，但这样得到的电路会比较脆弱。如果你想大量使用传感器（或者更频繁地使用电机），建议你查找在线焊接教程（例如，`https://learn.sparkfun.com/tutorials/how-to-solder---through-hole-soldering`），或者在你附近的创客空间参加相关课程。\n\
  \n### 创建带传感器的电路\n\n根据传感器的不同，在开始搜索具体信息之前，你可能需要先了解一些传感器的工作原理，因为可能需要使用标准公式将传感器读取的信号转换为实际的温度、压力或其它感兴趣的量。许多传感器（包括热敏电阻和另一种类似的电阻式传感器——光敏电阻）会随着环境变化而改变电阻——例如，光敏电阻会因光照强度而变化。\n\
  \n因此，它们可以充当分压电路的一部分。传感器与一个已知电阻（通常由设备制造商指定）串联，然后读取两个电阻之间的输出电压。然而，这可能会有点棘手，因为作为可变电阻的传感器上的电压降，既取决于串联电阻的阻值，也取决于传感器自身在当前时刻的电阻值（以及整个分压器上的固定电压）。\n\
  \n它“感知”到的唯一电压降（其两个引脚之间的电压差）正是它自身产生的，该电压降由它正在感测的物理量决定。这使得选择正确的串联电阻（“分压器中的另一个电阻”）变得至关重要。幸运的是，有一些标准可以帮助我们。\n\
  \n其他传感器的工作原理则不同。例如，光电二极管会在光照下产生一个小电流。我们稍后将看到一个实际应用的例子。\n\n\n\n### 可缝制传感器替代方案\n\n\
  本章我们将使用“常规”Arduino（非可缝制型）和低成本面包板插件元件来展示两个示例，因为这样更容易理解原理，且截至目前，这种格式的传感器种类更为丰富。如果存在可缝制版本的传感器，通常会有非常详细的教程，告诉你应使用哪些引脚进行连接，并附带一个可供你参考的\
  \ Arduino 示例草图。通常，可穿戴传感器会内置本章讨论的串联电阻作为其组成部分，并且可能还有其他简化设计。\n\n如果没有可穿戴版本，你有几种选择。如果你并非真正需要佩戴该项目（例如它是一件布料艺术品、一个剧院道具或一盏小夜灯），你可以直接使用常规非可缝制\
  \ Arduino，并制作一个底座或其他外壳来隐藏电子元件和传感器。但在设计此类外壳时，请记住，传感器需要暴露在环境温度、光线或任何你想要测量的环境变量中。这种情况下，你可以像本章展示的那样在面包板上搭建电路，或者制作一个等效的焊接电路。\n\
  \n但如果你希望用非可缝制组件制作可缝制电路，你可以使用可缝制电子板（如 Gemma、Flora 或 Lilypad）。将电阻和 LED 的引脚卷成环状，然后缝到织物上。或者，你也可以将电路焊接在一起，并找到一种方法将其固定在织物上，具体取决于你的特定设计（有关创意，请参考其他章节中的示例）。不过，要小心这些连接，因为用多股线进行板对线焊接可能会很脆弱。多股线在焊接处可能断裂，不过用一点热熔胶固定绝缘层会有所帮助。如果你在焊接结构中使用实心线，它会在反复弯折下断裂，甚至可能在线缆中间断裂。实心线更适合无需弯折的应用场景。\n\
  \n**警告**\n\n尽管存在“一个”Arduino 标准，但一些可穿戴板卡会略有偏离，或者传感器库可能使用了与某些可缝制板卡不兼容的功能。例如，截至本文撰写时，Gemma\
  \ 板卡所使用的芯片并未得到大多数 Flora 传感器库底层通信库的支持。在购买一块板卡和一个未明确标注与其兼容的传感器之前，你最好先上网搜索一下，看看是否存在已知问题（或解决已知问题的变通方法）。并非所有传感器库（我们稍后会谈到）都支持所有\
  \ Arduino 衍生的板卡。\n\n许多传感器的电阻会随其环境的变化而改变。在第一个示例中，我们使用了一个热敏电阻，这是一种电阻值会随环境温度变化而改变的电阻器（因此得名热(敏)电(阻)）。\n\
  \n在第二个示例中，我们使用光电二极管来判断周围环境是否足够暗，从而点亮 LED 小夜灯。光电二极管是一种简单的传感器，本质上是一个反向的 LED——当光线照射时它会产生电流，而不是像普通\
  \ LED 那样通过外部电流来发光。我们将它与 Arduino 的内部上拉电阻串联，读取其产生的电流量，并在短暂延迟后观察它使电压改变了多少。\n\n这两个传感器（以及下一节中描述的压力传感器）如\
  \ 图 8-1 所示。在课堂环境中，使用它们的主要问题是如何避免丢失，这一点你可以想象。一旦它们脱离原始包装，使用药瓶或带隔板的收纳盒进行分类存放效果很好。\n\
  \n![A371637_1_En_8_Fig1_HTML.jpg](img/A371637_1_En_8_Fig1_HTML.jpg)\n\n**图 8-1.**\
  \ 压力传感器、光电二极管和热敏电阻\n\n**提示**\n\n务必记录好你订购零件的来源，以便能够找到规格书或使用示例。对相关页面进行截图或添加书签，并建立一个归档系统来保存这些信息，以便日后查阅。\n\
  \n### 其他常见传感器\n\n目前可用于 Arduino 环境的传感器种类繁多，我们无法在此一一列举。本节仅能介绍几种常见类型的传感器，让你有所了解。\n\n\
  红外传感器是经过调校的光电二极管或光电晶体管（另一种类型的感光半导体，可能提供更强的信号），用于响应比可见光频率更低的光线。它们通常呈深色以过滤掉可见光。大多数电视遥控器使用的就是这类传感器，可以作为一种简单方式实现设备间的通信。其他类型的红外传感器可用于远距离检测热量，例如非接触式温度计中使用的那些。\n\
  \n压力或力的感测可通过多种类型的器件实现。一个力敏电阻（FSR）就是一个由导电塑料或橡胶制成的简单垫片，当它被压缩时导电性会增强。虽然 FSR 的精度不足以测量重量或力的大小，但它可以用于判断是否有力作用，就像一个大型按钮。不过，FSR\
  \ 不擅长承受持续的压力，如果你打算整天站在上面，它可能会过早损坏。FSR 的一个变体是软电位器，它会根据你按压的位置给出不同的电阻值。\n\n如果你开始在线搜索\
  \ Arduino 传感器，你会发现各种新奇的产品，例如倾斜开关、振动传感器、重力/加速度传感器、磁场传感器、距离传感器、湿度传感器、肌肉传感器、心跳传感器、辐射传感器等等。\n\
  \n**注意**\n\n在第 11 章中，我们将使用一个可缝制传感器——一个可以检测运动的陀螺仪。我们认为结合具体项目更容易理解，因此本章不深入介绍。如果你想了解如何检测服装的运动并做出响应，请参阅第\
  \ 11 章中的帽子示例。\n\n## 热敏电阻\n\n热敏电阻是一种电阻值随温度变化而发生显著变化的电阻器（如果你原本期望电阻在不同温度下保持恒定值，这通常是一件坏事）。当你购买一个热敏电阻时，通常会得到一个型号、一个称为\
  \ B（或 beta）值的参数、额定最大功率（在分压器中使用时通常无关紧要，因为电流可忽略不计），以及在特定温度（通常是 25 摄氏度）下的参考电阻值。\n\n\
  以本例中使用的负温度系数（NTC）热敏电阻 MF52-103 为例，其额定功率为 0.05 瓦；在 25 摄氏度时电阻为 10 kΩ；B 值为 3950 K。但这到底意味着什么呢？\n\
  \n从这里开始，你可以在线搜索该产品型号和“Arduino”。这种方法有几个明显的问题：\n\n- 你找到的信息可能是错误的。\n- 你可能什么也找不到。\n\
  - 网络上现有的 Arduino 草图可能不够清晰，让你无法确信传感器能按预期工作。\n\n通常，更昂贵的传感器（单价约 15 美元的，相对于那些价格只有其百分之一左右的）会附带更好的文档和库文件。我们这里使用廉价的传感器来说明整个过程。\n\
  \n\n\n### 使用热敏电阻\n\n在搜索引擎中搜索“thermistor”和“Arduino”，会跳转到一个非常有用的网站[`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)。该网站告诉我们，热敏电阻的电路就是一个分压器（第\
  \ 5 章）。我们将热敏电阻与另一个 10 kΩ 电阻串联，组成一个分压器，如图 8-2 的电路图所示，以及图 8-3 的电路实物照片所示。\n\n![A371637_1_En_8_Fig3_HTML.jpg](img/A371637_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3. 实际的热敏电阻电路\n\n![A371637_1_En_8_Fig2_HTML.jpg](img/A371637_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 热敏电阻电路的 Fritzing 连线图\n\n在刚才提到的 Arduino Playground 网站上，我们了解到热敏电阻的阻值由 Steinhart-Hart\
  \ 方程（[`https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation`](https://en.wikipedia.org/wiki/Thermistor#B_or_.CE.B2_parameter_equation)）定义，该方程使用三个标准参数，将电阻值转换为温度：\n\
  \n*   B，以开尔文温度 K 为单位（在此例中为 3950 K）\n*   基准温度（以开尔文温度为单位，即相对于绝对零度的温度——通常基准温度为 25 摄氏度，即\
  \ 25 + 273.15 = 298.15 K）\n*   传感器在该温度下的电阻值（即热敏电阻的标称电阻，此处为 10 kΩ）。\n\n本例中，我们还添加了一个\
  \ LED，当热敏电阻报告的温度在指定范围内时，该 LED 会点亮。图 8-3 中的电路由一个 330 Ω 电阻和一个红色 LED 串联组成。红色 LED 电路连接到\
  \ 9 号引脚和地线。当 9 号引脚为 `HIGH` 时，LED 将点亮。\n\n分压器（参见第 5 章）的电压值在 10 kΩ 参考电阻和热敏电阻之间读取。其电压值从两者之间的节点引出，作为输入发送到\
  \ Arduino 的 `A0` 引脚。这是一个示例，展示了如何设置一个传感器，从而点亮一盏灯或让 Arduino 执行其他操作。请注意，传感器输出到模拟引脚，这是获取引脚上除\
  \ `LOW` 和 `HIGH` 之外的其他值所必需的。\n\n我们希望从这个传感器中获取实际的温度值，而不仅仅是一个相对数值，因此正确进行实际转换至关重要。对于其他类型的传感器，我们可能只关心某个值相对于某个任意值的范围（例如房间内的光照水平，或者传感器在过去一分钟内的平均值），因此可能无需计算特定单位的精确值。\n\
  \n### 与热敏电阻交互的 Arduino 程序\n\n现在我们知道了如何连接电路，我们可以采用两种方式。我们可以进入 Arduino IDE（参见第 6 章），查看是否能找到一个已经创建好此\
  \ Arduino 程序的库。我们可以通过以下步骤操作：点击 程序 菜单 ➤ 包含库 ➤ 管理库，然后按照第 6 章所述搜索“thermistor”。\n\n\
  如果找到了相关内容，您可以选择安装该库。如果出现多个选项，您可以先点击“More info”链接，看看哪个更符合您的需求，或者查看它的 ReadMe 文件（如果有的话）。大多数情况下，这些“More\
  \ info”链接会跳转到一个 GitHub 仓库，这是一种常见的共享 Arduino 程序的开源方式。Joan 喜欢详细查看此类内容的源代码，因此通常会选择那些在处理过程中看起来最透明的库。\n\
  \n当您安装库时，如果顺利的话，它也会安装一些示例程序。要确认是否如此，请在安装库后，点击 文件 ➤ 示例。\n\n这听起来可能都不错，但您可能会发现找不到与您的特定开发板和传感器硬件相匹配的库。在本例中，我们又回到了最初的那个网站\
  \ [`http://playground.arduino.cc/ComponentLib/Thermistor2`](http://playground.arduino.cc/ComponentLib/Thermistor2)。该页面提供了几个示例。我们决定尝试最后一个，因为它清晰地说明了其假设条件，并且通过对照描述该方程的维基百科页面进行交叉验证，很容易检查这些假设是否正确；我们感谢该页面的作者免费发布了他的\
  \ Arduino 程序。\n\n清单 8-1 展示了这个 Arduino 程序，其中增加了一段代码，用于在温度处于给定范围内时点亮电路中的 LED。\n\n\
  ```\n// 一个程序，如果连接在 THERMPIN 引脚的热敏电阻\n// 测得的温度在指定范围内，则点亮连接到 LEDPIN 引脚的 LED\n// 热敏电阻校准数据来自\n\
  // playground.arduino.cc/ComponentLib/Thermistor2\n// 已修改，使其更具通用性并增加了输出功能\n#include\
  \ <math.h>\n#define THERMPIN A0\n#define LEDPIN 9\n// 列举三种主要的温度单位\nenum {\n  T_KELVIN=0,\n\
  \  T_CELSIUS,\n  T_FAHRENHEIT\n};\n// 温度函数输出浮点数，即实际温度\n// 温度函数输入参数：\n// 1. AnalogInputNumber\
  \ - 要读取的模拟输入引脚\n// 2. OuputUnit - 输出单位：摄氏度、开尔文或华氏度\n// 3. Thermistor B parameter\
  \ - 热敏电阻 B 参数（来自数据手册）\n// 4. Manufacturer T0 parameter - 制造商提供的 T0 参数（开尔文，来自数据手册）\n\
  // 5. Manufacturer R0 parameter - 制造商提供的 R0 参数（欧姆，来自数据手册）\n// 6. Your balance resistor\
  \ resistance in ohms - 您的平衡电阻阻值（欧姆）\nfloat Temperature(int AnalogInputNumber, int\
  \ OutputUnit, float B,\n  float T0, float R0, float R_Balance) {\n  float R, T;\n\
  \  R = R_Balance * (1023.0f / (float)(1023 - analogRead(AnalogInputNumber)) - 1);\n\
  \  //提醒：在 C 语言中，log 是自然对数 ln，log10 是以 10 为底的对数，所以这里没问题\n  T = 1.0f / (1.0f / T0\
  \ + (1.0f / B) * log(R / R0));\n  switch(OutputUnit) {\n    case T_CELSIUS :\n \
  \     T-=273.15f;\n      break;\n    case T_FAHRENHEIT :\n      T=9.0f*(T-273.15f)/5.0f+32.0f;\n\
  \      break;\n    default:\n      break;\n  };\n  return T;\n}\nvoid setup() {\n\
  \  Serial.begin(9600);\n  pinMode(THERMPIN, INPUT);\n  pinMode(LEDPIN, OUTPUT);\n\
  } // setup 函数结束\nvoid loop() {\n  float sensorData = Temperature(THERMPIN, T_FAHRENHEIT,\n\
  \    3950.0f, 298.15f, 10000.0f, 10000.0f);\n  Serial.print(\"华氏度温度 = \\t\");\n\
  \  Serial.println(sensorData);\n  Serial.println();\n  delay(500);\n  //如果温度数据在\
  \ 50 到 75 华氏度之间，则点亮 LED\n  if (sensorData > 50 && sensorData < 75) digitalWrite(LEDPIN,\
  \ HIGH);\n  else digitalWrite(LEDPIN, LOW);\n}// loop 函数结束\n```\n\n清单 8-1. 热敏电阻\n\
  \n## 光电二极管：夜灯示例\n\n当光照射到光电二极管上时，它会产生电流，这本质上就像一个反向工作的 LED（参见第 5 章）。读取该电流比读取电阻值要稍微复杂一些，但可以用一个更简单的电路来实现。\n\
  \n要弄清楚如何使用光电二极管，可以先上网搜索“photodiode Arduino”。您会找到一些示例，大多数都指出，光电二极管实际上就是一个反向连接的 LED。不是让电流通过它来发光，而是让它受光照，然后会有少量电流以与\
  \ LED 相反的方向流过。\n\n许多这些示例都涉及使用晶体管（一种可以放大信号的元件）来放大输出。这对于用导电线来构建电路来说比较困难，因此我们将使用一个更简单的解决方案。光电二极管具有内部电容（存储少量电荷的能力）。如果我们通过在\
  \ LED 两端施加反向电压来给这个电容充电，那么光电二极管产生的电流就会使电容放电。如果我们用一个电阻来减缓这个放电过程，我们就可以通过测量放电速度（在设定时间后采样电压，或者测量达到设定电压所需的时间）来了解光电二极管接收到的光照量。\n\
  \n\n\n### 使用光电二极管\n\n人们通常以相对的方式使用光电二极管——判断某物是否“足够暗”或“足够亮”以改变状态，或者向明亮处移动。因此，我们并不真正关心输出的精确值——我们只想知道它是如何变化的。这意味着在编写\
  \ Arduino 程序（清单 8-2）时，我们需要调整一些变量。图 8-4 展示了 Fritzing 中的电路，图 8-5 则展示了光电二极管被遮挡时点亮 LED\
  \ 的情形。\n\n![A371637_1_En_8_Fig5_HTML.jpg](img/A371637_1_En_8_Fig5_HTML.jpg)\n\n\
  图 8-5 光电二极管被遮挡以点亮 LED\n\n![A371637_1_En_8_Fig4_HTML.jpg](img/A371637_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4 光电二极管与 LED 夜灯 Fritzing 示意图\n\n```\n// 一个示例：当光电二极管检测到环境变暗时点亮 LED\n#define\
  \ PHOTOPIN A0 // 连接光电二极管阴极，阳极接 GND\n#define LEDPIN 9\n#define THRESHOLD 1010 //\
  \ 0-1023，使用较高值可在更暗时触发\n// 如果灯一直亮，说明 THRESHOLD 过高；如果一直灭，则说明过低\nint photoRead(int\
  \ pin) {\n  digitalWrite(pin, HIGH); // 向模拟引脚写入高电平\n  pinMode(pin, OUTPUT);    //\
  \ 充分充电光电二极管的内部电容\n  delay(1);\n  pinMode(pin, INPUT);     // 切换为输入模式，启用上拉电阻\n  //\
  \ 光电二极管电流会通过 200k 上拉电阻缓慢释放电容。\n  // 光线越强，电压下降越快。\n  delay(2);\n  return analogRead(pin);\
  \  // 查看 2ms 后电压下降了多少\n}\nvoid setup() {\n  Serial.begin(9600);\n  pinMode(PHOTOPIN,\
  \ INPUT);\n  digitalWrite(PHOTOPIN, HIGH);\n  pinMode(LEDPIN, OUTPUT);\n  digitalWrite(LEDPIN,\
  \ LOW);\n} // setup 结束\nvoid loop() {\n  int darkness = photoRead(PHOTOPIN);\n \
  \ Serial.print(\"光电二极管读数: \");\n  Serial.println(darkness);\n  delay(20);\n  //\
  \ 若黑暗程度超过阈值则点亮 LED\n  if (darkness > THRESHOLD) digitalWrite(LEDPIN, HIGH);\n  else\
  \ digitalWrite(LEDPIN, LOW);\n} // loop 结束\n清单 8-2 Arduino 夜灯程序\n```\n\n### 在项目中使用多个传感器\n\
  \n如果使用多个传感器，通常应将它们的电路隔离到不同的引脚上（类似于示例中对 LED 和传感器的处理），而不是将它们串联起来。注意不要从 Arduino 中消耗超过其能提供的功率，但这通常不会成为限制因素。\n\
  \n**提示** 许多类型的传感器（及其他硬件）在 [`http://playground.arduino.cc/Main/interfacingWithHardware`](http://playground.arduino.cc/Main/interfacingWithHardware)\
  \ 有详细介绍。\n\n## 让物体动起来\n\nArduino（包括可缝纫版本）可以通过以下方式控制运动部件：\n\n*   **小型直流电机**：用于移动物体，无需特别精确地控制运动位置或速度。如果你想让玩具车旋转轮子并四处奔跑，通常会使用这种电机。\n\
  *   **步进电机**：这类电机用于 3D 打印机以及其他需要精确控制速度和位置的场合；它们以已知大小的微小步长（因此得名）移动，其位置可通过计数步数来控制。\n\
  *   **舵机**：这种电机希望保持特定的编程位置。你可以将其与合适的传感器配合，将某物固定在特定位置。航模舵机具有内部反馈回路，能够寻找并保持指定位置。舵机自带控制电路，因此最容易连接到\
  \ Arduino 上。在需要精确移动物体时，它们也常用于机器人技术。\n\n如果你对电机总体感兴趣，可以查阅一本关于 Arduino 控制机器人的书，例如 Warren、Adams\
  \ 和 Molle 合著的 *Arduino Robotics*（Apress, 2011）。将运动部件融入服装会带来一些挑战，我们在第 10 章中会讨论。任何电机都必须牢固固定，以确保要移动的物体安全且按预期运动，而不是在电机连接点下堆起织物。\n\
  \n**提示** 在 [`http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical`](http://playground.arduino.cc/Main/InterfacingWithHardware#Physical_Mechanical)\
  \ 有一个很长的电机列表，以及针对不同情况选择电机的建议。\n\n### 电源管理\n\n与 Arduino 能做的几乎所有其他事情相比，控制电机需要消耗大量电能——通常远高于\
  \ Arduino 直接提供的功率。如果尝试用 Arduino 直接为电机供电，Arduino 可能会“掉电”并行为失控，或者元件过热而损坏。\n\n为避免这种情况，请使用独立于\
  \ Arduino 之外的电源。将这个外部电源直接连接到电机上。同时需要在电机附近某处隐藏电池。“口红”式 USB 可充电电池现在已经相当容易获得，但你仍然需要为它们找一个安放位置以及连接方式。\n\
  \n将普通（不可缝纫）Arduino 连接到电机的最简单方法是购买一个合适的扩展板。这是一块可插入 Arduino 的电路板，对于电机扩展板，通常还允许你接入独立电源和电机。截至撰写本文时，尚无等效的可缝纫板，因此你只能依靠涉及焊接的解决方案，或者设法使用带有扩展板的普通\
  \ Arduino 板——不过这可能会有点笨重。\n\n\n\n### 伺服电机\n\n伺服电机是一种小型马达，能够将其转轴旋转到特定的角度位置。通常，伺服电机附带各种称为舵臂的小塑料件，你可以用它来连接需要推动或拉动的绳索或其他物品。图\
  \ 8-6 展示了一个安装有舵臂的伺服电机。这个特定的舵臂有两个长臂和两个短臂，但它们有各种不同的形状，大多数业余伺服电机都包含几种不同的可选配件。这种电机很可能是你在可穿戴设备上用来驱动某些部件运动，或对传感器检测到的条件做出反应（例如，在天黑时合上某物）时使用的类型。\n\
  \n![A371637_1_En_8_Fig6_HTML.jpg](img/A371637_1_En_8_Fig6_HTML.jpg)\n\n**图 8-6.**\
  \ 一个伺服电机\n\n同时为伺服电机和 Arduino 供电可能会有些棘手。伺服电机可能会消耗相当大的电流，尤其是在它被阻止到达目标位置时（这被称为堵转电流）。尝试从电源获取超出其提供能力的电流，通常会导致电流下降（或者在某些情况下，会烧断保险丝——该保险丝可能是自恢复式的，也可能需要更换）。\n\
  \n要使用伺服电机，你应该避免让电流通过 Arduino 的电压调节器（即电路板上管理电源的芯片）。如果将电机连接到 Arduino 的电源总线上，就会发生这种情况。这可能导致电流超出调节器的处理能力，从而使控制器电压过低并复位。\n\
  \n为避免此问题，大多数 Arduino 开发板都配备了一个可用于连接墙式电源或电池的接口。请使用 `Vin` 引脚连接伺服电机的正电压（V+）侧，以绕过稳压器，然后在插入\
  \ USB 连接器之前先插入电源适配器。最后，再插入 USB 连接器，这样你就可以下载程序（sketch）来用 Arduino 控制伺服电机了。（伺服电机控制示例包含在与\
  \ IDE 一起下载的示例集中，请参阅文件 ➤ 示例 ➤ Servo。）\n\n在图 8-6 中，请注意伺服电机引出的三根导线。惯例是：棕色线连接地（`GND`），红色线连接\
  \ 5V，橙色线是信号（控制）线。（有时使用黑色线作为地线，白色线作为信号线。）如何连接这些线，很大程度上取决于你具体要做什么以及你需要多少功率。请查阅与你项目相似的现有示例项目，看看它们是如何连接的，同时务必牢记我们刚才提到的注意事项。\n\
  \n## 本章小结\n\n在本章中，我们给出了将传感器连接到 Arduino 的一般原则，并详细介绍了两个示例。我们还介绍了如何查找特定传感器的更多信息，以及当传感器没有可穿戴形式可用时该如何处理。此外，我们简要介绍了\
  \ Arduino 可以控制的不同类型的电机，并包含了一个关于如何使用伺服电机进行简单机械控制的教程。在第 10 章中，我们将展示更复杂的传感器和电机示例，在第\
  \ 11 章中，我们将使用陀螺仪来追踪头部运动。\n\n"
- '# 9. 3D 打印


  近来，3D 打印已大规模进入高级时装领域（正如我们在第 13 章中提到的），但其中大部分使用的是比现在广泛普及的消费级 3D 打印机更先进的技术。在本章中，Joan
  和 Rich 将快速介绍 3D 打印，并向你展示它的一些实用和装饰性用途。


  ## 3D 打印的工作原理


  简而言之，3D 打印技术通过计算机模型控制，一次一层薄层地堆积材料来制造物体。堆积的材料因打印机类型而异（无论是从粉末、液态树脂还是线材卷开始），但所有过程从根本上讲都是相似的。这些层通常约
  0.2 毫米厚——根据维基百科的说法，这个厚度是平均人类头发直径或油漆涂层厚度的两倍，大约相当于一个平均大小的单细胞生物（如草履虫）的长度（ [`https://en.wikipedia.org/wiki/100_micrometres`](https://en.wikipedia.org/wiki/100_micrometres)
  ）。


  3D 打印并非新鲜事物。自 20 世纪 80 年代以来，它就一直以某种形式存在，第一家公司 3D Systems 由 Chuck Hall 于 1986 年创立。然而，直到
  21 世纪中期，3D 打印过程一直受专利保护，而专利持有者选择将其作为一项面向工业用户的昂贵技术。


  当关键专利过期后，时任英国巴斯大学的 Adrian Bowyer 设计了一款 3D 打印机，该打印机能够利用一些在五金店就能买到的零件，制造出其他的 3D 打印机。随后，他将此设计以开源方式发布（意味着任何人都可以在此基础上进行开发，前提是他们也必须将自己的改进公之于众），以便每个人都能在其基础上进行构建。


  这引发了 RepRap（REPlicating RAPid prototyper，自我复制快速原型机，[`www.reprap.org`](http://www.reprap.org)
  ）打印机革命，最终促成了现有各种消费级打印机的出现。这一革命得益于可自由获取的技术，以及随后不久出现的众筹这一历史巧合。


  **注意**


  “3D 打印”这个术语有些误导性，因为人们会立刻将其与在纸上打印文档相类比，但实际上这两个过程并没有太多共同之处。更通用的术语“增材制造”描述更准确，尽管可能不那么朗朗上口。


  消费级打印机大多使用塑料线材卷（请参阅本章稍后的“3D 打印材料”部分）。图 9-1 展示了一台典型的小型消费级 3D 打印机及其线材卷。这台打印机恰好是由 Rich
  设计的。它有四个小型电机：一个用于驱动三个维度中每个维度的机械结构，一个用于将线材推入挤出机。


  ![A371637_1_En_9_Fig1_HTML.jpg](img/A371637_1_En_9_Fig1_HTML.jpg)


  **图 9-1.** 一台消费级 3D 打印机


  挤出机由两部分组成。一部分是驱动机构（包括一个电机和夹紧线材的零件）。另一部分是热端，线材在此处熔化并通过一个喷嘴（本例中直径为 0.5 毫米）挤出，喷出精细的熔融塑料流。物体在平台上（图
  9-1 中被蓝色胶带覆盖的区域）逐层堆积而成。与许多消费级打印机一样，这台打印机由一个微处理器控制，该微处理器本质上是一个添加了一些定制功能的 Arduino。


  树脂打印机使用光线选择性地固化光敏液态树脂。价格适合消费者的树脂打印机正变得越来越普遍，它们对于珠宝和精细打印尤其有用，但树脂处理起来比较麻烦，需要小心操作。使用粉末的打印机则使用激光烧结颗粒，或使用喷墨打印头沉积粘合剂（如胶水或溶剂）使它们粘合。这些打印机可以制造出表面相对光滑的产品，但价格昂贵，并且材料处理方面的挑战远大于线材打印机。本章我们将重点介绍基于线材的打印机的应用，并在第
  13 章中简要讨论高端应用。




  ## 在 3D 打印机上制作物品的步骤


  在 3D 打印机上制作物品需要几个步骤。首先，您需要使用 3D CAD（计算机辅助设计）程序创建一个 3D 模型。接下来，您使用切片计算机程序将该模型转换为打印机制作各层的命令。最后，您将该文件加载到打印机上（这可能是通过从计算机将文件写入`SD`卡，或者通过`USB`电缆或无线方式连接计算机来实现），然后打印您的物品。接下来的章节将更详细地介绍这些步骤中的每一步。


  ## 基于线材的 3D 打印机的限制


  基于线材的 3D 打印机制作的模型都是单一颜色的——即线材的颜色。有些打印机有多个挤出机，可以使用的颜色数量与挤出机数量相同。还有一些使用其他技术的多色打印机，但在撰写本文时，它们尚未达到消费者的价格水平。


  关于基于线材的 3D 打印机的局限性，您需要了解以下几点：


  *   打印任何东西都需要一段时间。即使是小物件也可能需要半小时，而大型打印则可能需要数天。大多数打印机在过程中途出现问题后无法重新启动。

  *   3D 打印的零件通常很小。打印机的打印面积从每边 4 或 5 英寸到大约两倍大小不等。能够构建任何维度超过一英尺物体的打印机，其价格会迅速变得昂贵。

  *   能够可靠制造的最小特征尺寸大约为 1 毫米，我们通常建议细节不要小于这个尺寸。原因是打印机挤出的线材线条可以接近这个尺寸——它就像是蛋糕装饰用的挤压喷嘴的缩小版。我们在本章演示中所用打印机的喷嘴开口为`0.5
  mm`，但它会挤压其制作的线条，使其在垂直方向上更薄，因此它挤出的线条比`0.5 mm`更粗。

  *   打印件从底部开始构建，如果它们有悬空的部分，需要以某种方式支撑起来，然后这些支撑物之后必须被切掉。有一些程序可以处理创建支撑物，但提前考虑好这一点是良好的设计实践。同样，打印件需要与构建平台有足够的接触面积，以防止在打印过程中被撞掉。

  *   3D 打印需要进行调整、维护，以及偶尔清理堵塞。购买前请查看用户评论，以了解打印机的可靠性和故障排除的难易程度。


  ## 3D 建模


  3D 打印过程的第一步是下载或创建一个 3D 计算机模型。有很多网站提供免费的可下载模型，包括[`www.thingiverse.com`](http://www.thingiverse.com)和[`www.youmagine.com`](http://www.youmagine.com)。免费下载网站存在一个问题：任何人都可以（并且确实会）上传模型，其中许多模型打印效果不佳或根本无法打印。寻找那些下载量大且附有样品打印图片的模型。


  如果您想创建自己的模型，有多种选择，其中许多是免费和/或开源的。本节将介绍其中两种，但还有很多其他选择。建模过程将生成一个以`.stl`结尾的文件，通常称为“`STL`文件”。`STL`代表立体光刻（stereolithography），这是树脂打印机使用的工艺。`STL`格式是消费级
  3D 可打印模型的事实标准。某些版本的`Windows`不喜欢`.stl`扩展名，并认为它是某种安全文件，因此在您保存`STL`文件时，`Windows`可能会给出一些奇怪的警告。


  > **注意**：除了`STL`之外，还有其他一些 3D 建模标准——特别是许多图形程序使用的`OBJ`，以及尚未被广泛支持但旨在取代`STL`并能跟踪模型中不同材料使用的`AMF`，但在本章中，我们将重点介绍如何创建`STL`文件。


  ### TinkerCAD 及其他 123D 应用


  Autodesk 拥有一整套 CAD 软件（[`www.123dapp.com`](http://www.123dapp.com)），其中最简单的是 Tinkercad（[`www.tinkercad.com`](http://www.tinkercad.com)）。Tinkercad
  允许进行拖放式设计。这很好，因为您可以非常快速地设计东西。在手绘方面它有些局限，尽管有办法可以绕过。如果您可以通过从各种基本形状构建来创建您想要建模的东西，那么
  Tinkercad 是一个不错的选择。


  有许多社区贡献的形状，包括一个允许您以 3D 格式打印文本的实用程序，以及另一个打印齿轮的实用程序。图 9-2 是一个在 Tinkercad 中开发的简单小吊坠。此处显示它在
  3D 打印机上带有一个 brim（一种辅助模型牢固粘附在打印机上的几圈 3D 打印线条），以及从打印机上取下后，以显示有多少打印部分是 brim（图 9-3）。您可以在特写镜头中看到层纹，并看到特征尺寸的限制。这个吊坠最宽处约
  50 毫米，可在[`https://tinkercad.com/things/kQD9mpZ1BLf`](https://tinkercad.com/things/kQD9mpZ1BLf)公开获取。


  ![图 9-3. Tinkercad 制作的吊坠](img/A371637_1_En_9_Fig3_HTML.jpg)


  ![图 9-2. 打印机上的 Tinkercad 吊坠，brim 仍附着](img/A371637_1_En_9_Fig2_HTML.jpg)


  如果您只是想让一个艺术班快速制作一个小玩意作为别针或吊坠，Tinkercad 可能是一个不错的选择。字母、数字和一些符号（如本例中的星形）都是可用的，如果您进入社区选择，您可以找到从用户指定的齿轮到各种字体的文本等东西。


  > **提示**：Tinkercad 在其网站上提供了很好的教程，应该可以帮助您快速上手。


  ### OpenSCAD


  `OpenSCAD`程序允许您以一种类似于 C/Java/Python 编程语言家族的风格来开发模型。它是免费且开源的，我们要感谢 Marius Kintel
  以及该程序的许多其他贡献者和维护者。您可以从[`www.openscad.org`](http://www.openscad.org)下载`OpenSCAD`，一份优秀的用户手册可在[`www.openscad.org/documentation.html`](http://www.openscad.org/documentation.html)找到。


  根据下载站点上的说明下载并安装`OpenSCAD`。`OpenSCAD`提供适用于 Linux/UNIX、Windows 和 Mac OS X 的版本。图 9-4
  展示了 Rich 在`OpenSCAD`中创建的一些“宝石”。如果您懂一点编程，或者从一个现有的示例开始，您可以创建相当复杂的模型。许多可下载且可用户修改的模型都是用`OpenSCAD`编写的。


  ![图 9-4. 在 OpenSCAD 中创建的“宝石”](img/A371637_1_En_9_Fig4_HTML.jpg)


  ### 其他 CAD 程序


  市面上还有很多其他的 CAD 程序。一些为动画设计的程序，例如免费的、开源的 Blender（[`www.blender.org`](http://www.blender.org)）或商业程序
  Maya（[`www.autodesk.com/products/maya`](http://www.autodesk.com/products/maya)），可以制作出非常复杂的模型。然而，它们的学习曲线很长，并且需要特别注意模型的构建方式，因为它们并不是为了制作可
  3D 打印的模型而设计的。


  如果您想制作工程类的零件（带尺寸的机械部件），可以考虑 Onshape（[`www.onshape.com`](http://www.onshape.com)），这是一个相对较新的程序，其新颖之处在于它是一个价格相对实惠的工程程序。




  ## 切片与打印


  不过，创建（或下载）3D 模型仅仅是第一步。一旦你获得了`STL`文件，你仍需通过一个程序来运行它，该程序会为你的打印机生成详细的指令以实际制造物体，并且你还需要将这个文件传输到打印机。大多数打印机可通过
  USB 连接，部分还支持无线连接。另一些则可以使用 SD（或 microSD）卡，将可打印文件从你运行此软件的电脑传输到 3D 打印机本身。这些步骤因打印机而异，但一些标准已经出现。


  一个兼容多种打印机的程序是开源软件 `MatterControl`（[`www.mattercontrol.com`](http://www.mattercontrol.com)）。`MatterControl`（或你打印机的等效软件）接收`STL`文件，并输出一个`G-code`文件。`G-code`格式（或等效格式，如`X3G`）才是实际在打印机上运行的格式。如果你的打印机使用专有软件，该软件可能会也可能不会向用户显示此文件。


  你可以通过查看制造商的说明来检查你的打印机是否支持 `MatterControl`。如果你的打印机使用自己的专有软件，它很可能在执行与我们此处描述类似的操作，但细节会有所不同。


  **提示**


  如果你想了解关于 3D 打印过程的更多细节，并重点关注开源打印机，可以考虑阅读 Joan 的著作《掌握 3D 打印》（Apress，2014）。这本书还包括了打印后处理的内容。如果你想特别专注于使用
  `MatterControl` 软件，并希望获得更详细的用户指南，可以阅读 Joan 和 Rich 合著的《使用 MatterControl 进行 3D 打印》（Apress，2015）。这两本书都回顾了如何开始
  3D 打印，包括创建模型。由于这个主题庞大而复杂，我们在此只给出过程的大致轮廓，让你了解涉及的内容和可能性。在 [`www.mattercontrol.com`](http://www.mattercontrol.com)
  上也有相关文档，你的打印机制造商也可能提供一些链接或手册来帮助你入门。


  ### MatterControl


  消费级 3D 打印机大致分为两种类型：开源和专有。开源打印机在一定程度上可追溯到本章前面提到的 Adrian Bowyer 的 `RepRap` 打印机，而这些打印机正是
  `MatterControl` 旨在支持的机型。`MatterControl` 也是一个开源、免费的程序，它接收`STL`文件并将其转换为在支持它的 3D 打印机上运行的命令（`G-code`）。`MatterControl`
  需要：


  *   一个定义打印机的文件（对于官方支持的打印机，可通过下拉菜单提供）。

  *   一个`STL`文件。

  *   针对特定`STL`文件的设置。例如，可以选择让打印机生成支撑结构或不生成，针对不同材料使用不同的温度设置，等等。


  其中一些设置可能始终或大部分时间保持不变，而另一些则可能频繁变化（例如模型是否需要支撑）。目前的工艺水平是，为了打印出好的作品，需要对该过程有一定的了解。前面“提示”中建议的资源可以帮助你入门。


  `MatterControl` 还具备将打印作业发送到连接到运行 `MatterControl` 的计算机上的打印机的功能。创建 `MatterControl`
  的公司 `MatterHackers` 还销售一种平板电脑（`MatterControl Touch`），它可以运行兼容的 3D 打印机，从而无需占用一台电脑。


  ### 专有 3D 打印机


  其他制造商选择从头开始构建自己的软件和文件格式，而不是加入开源 3D 打印机社区。如果你的打印机附带专有软件，你应该查阅其文档。


  **警告**


  我们建议在通风良好的区域使用 3D 打印机（但不要在室外或窗户正前方）。请遵循制造商关于打印机环境的建议。


  ## 3D 打印材料


  消费级 3D 打印机使用多种材料。最常见的可能是聚乳酸（`PLA`），这是一种通常由糖/淀粉制成的塑料（在北美，通常来自玉米）。`PLA` 是最容易打印的材料之一，并且不像其他一些材料那样需要加热打印平台。然而，它在夏天炎热汽车内的温度下会变软，因此如果你要用
  `PLA` 制作任何结构性物品，必须小心，以免最终得到一件意外超现实的连衣裙。


  丙烯腈-丁二烯-苯乙烯共聚物（`ABS`）用于制造许多玩具，因此常被称为乐高塑料。它更难打印；它需要加热的打印平台以防止在打印过程中从平台剥离，以及需要能够处理比
  `PLA` 更高温度的挤出机。好处是，`ABS` 在温暖温度下不易变软。


  尼龙丝材对于时尚科技应用来说是一个有趣的选择。当打印成细长部件时它很柔韧，但如果打印得更厚则相当坚硬。它可以用适合尼龙的染料进行染色。然而，与 `ABS` 类似，它必须在某些打印机无法承受的高温下打印，并且需要一个专为尼龙设计的打印平台。


  还有许多其他类型的丝材，并且不断有新品出现。`PET`（一种常用于水瓶的透明塑料）相当透明，其耐温性介于 `PLA` 和 `ABS` 之间。还有一些丝材含有木屑或金属粉末，打印出来看起来像木头或金属，有些还能在黑暗中发光。然而，这些丝材由于含有细小颗粒，往往容易堵塞和磨损喷嘴。还有一些柔性丝材材料（例如热塑性弹性体，或
  `TPEs`），打印起来具有挑战性，但能产生柔韧的效果。


  **警告**


  有些打印机只能打印一种类型的材料。请务必购买与你的机器兼容的丝材。另外，请注意丝材通常有 1.75 毫米和 3.0 毫米两种直径，二者不可互换。


  ## 应用


  既然我们已经了解了 3D 打印可能带来挑战的一些方面，为什么要在时尚科技项目中使用它呢？3D 打印的主要优势在于其灵活性，以及能够非常快速地以几乎任意形状创建实体物体的能力。


  3D 打印的直接应用包括打印装饰部件，这些部件旨在被粘合或缝制在衣物上，例如纽扣或装饰件（如本章前面所示）。3D 打印部件也可用于电池和控制线缆走向的支撑结构，或补充传统的骨架支撑（连衣裙的结构支撑）。然而，消费级
  3D 打印部件体积较小，这可能会限制其在骨架支撑中的实用性，除非你将多个部件粘合在一起或将它们粘合到服装上。


  **提示**


  Lyn 偏爱 Aleene 的纺织品胶水。该公司网站（[`www.ilovetocreate.com`](http://www.ilovetocreate.com)）提供了大量关于针对不同情况应使用何种产品的信息。根据
  Lyn 的经验，她使用过的胶水粘合效果非常好，但可能无法经受大量洗涤。




  ### 制作模具或铸造模型


  3D 打印在时尚领域的另一项实用功能是制造用于铸造其他材料的模具。例如，传统的砂型铸造法需要先制作一个阳模（与最终成品形状相同），在砂油混合物中压出空腔，再向其中注入熔融金属。这些阳模（在工艺中称为"模型"）传统上由木材制成，但由于它们仅用于压制砂型，塑料同样可以胜任。


  另一项传统铸造工艺——失蜡法——同样始于阳模，传统上使用蜡制成。该模型随后被石膏或其他耐高温材料包裹，通过加热使蜡熔化流失，金属便可注入形成的空腔。人们已尝试过"失
  PLA"铸造法，即用 PLA 3D 打印模型替代蜡模。


  **注意事项**


  由于这些工艺涉及熔融金属，通常不适合在家操作，但在此提及仅供兴趣参考。


  ### 使用 3D 打印笔


  从金属工艺转向手工艺层面，理论上可以使用 3D 打印笔在织物上作画。这类打印笔并非电脑控制，它们挤出的塑料丝类似 3D 打印机的短线段，但使用者需徒手自由绘制。我们尚未亲自尝试，但这与在布料上使用热熔胶并无太大差异。


  ## 在织物上进行 3D 打印


  我们曾对在尼龙材料上实现尼龙材质 3D 打印产生好奇，目的是为服装增添纹理效果。这并非消费级 3D 打印机的设计初衷，通常而言，若您未自行组装打印机（因此不熟悉其机械构造），不建议尝试此类操作。尤其当您的打印机具备自动调平功能时，可能会碰到活页夹。在实验中我们发现，几乎全程需要值守观察，否则材料可能被卷入打印机机械装置。


  我们使用的打印机平台完全裸露，仅用小型活页夹将织物绷紧在平台上。图 9-5 展示了同款设计在三种不同织物上的打印效果，多数使用尼龙耗材，其中一种使用 PLA。PLA
  与棉质帆布粘合良好，但将硬挺的帆布固定在平台上颇具挑战。或许未来会有专为此应用的 3D 打印机问世。目前，除了刚好覆盖平台的矩形织物，或像图 9-6 项目那样每次迭代后移位的长条状织物，其他形状的布料打印难度极大。与此同时，您也可以先打印结构件，再将其粘合到织物上。


  ![A371637_1_En_9_Fig5_HTML.jpg](img/A371637_1_En_9_Fig5_HTML.jpg)


  图 9-5. 同一图案在不同材质上的打印效果：使用尼龙耗材在轻薄弹性的 95%尼龙/5%氨纶织物（顶部）、在单向弹性尼龙（可能为混纺）织物（中部）、使用 PLA
  在硬挺棉帆布（左下）、在棉帆布使用尼龙耗材（右下）。


  《Make》杂志在相关文章中尝试了不同方法（[`http://makezine.com/projects/how-to-3d-print-on-tulle-net-or-lace-fabrics/`](http://makezine.com/projects/how-to-3d-print-on-tulle-net-or-lace-fabrics/)）：先打印部分图案，将织物平铺其上，再继续完成打印。这种方法可精确定位设计图案在织物上的位置，但实现更为复杂。若您的打印机平台为封闭式或与其他部件紧密排列，可能无法进行织物打印。您还需掌握暂停与恢复打印的技巧，某些情况下需涉及
  G 代码操作。


  该领域已有一些商业探索。3D Systems 曾销售"Fabricate"套件，内含预配织物片与耗材墨盒。耐克也已申请多项 3D 打印鞋类相关专利（[`https://3dprint.com/1331/nike-awarded-two-major-3d-printing-footwear-patents/`](https://3dprint.com/1331/nike-awarded-two-major-3d-printing-footwear-patents/)）。未来前景值得期待（我们将在第
  13 章讨论）。


  ## 本章小结


  本章广泛概述了消费级 3D 打印技术，并提供了大量学习详细流程的资源指南。我们着重介绍了 3D 设计软件的工作流程，探讨了材料特性及包含 3D 打印的构造技术。


  '
- "# 10. 规划的重要性\n\n可穿戴技术之所以困难，在于它融合了多种技能领域。从业者可能来自缝纫、电子或编程背景。若您来自虚拟世界（3D 建模或编程），最令人惊讶的发现之一便是：实体物品总比预想中占用更多空间。如何隐藏（或最佳展示）电路、避免短路、处理使用者佩戴时的各类不便问题，都需要深思熟虑。\n\
  \n林恩拥有超过 30 年的舞蹈与戏剧教学表演经验，以及服装设计经验。她将是本章的主要叙述者，琼将补充她所谓的\"系统工程\"视角，里奇则会就技术问题提供避免方案。\n\
  \n本章以一个案例研究（实为警示故事）开篇，讲述我们首个大型集体项目——我们后来发现这个项目过于雄心勃勃。接着我们会解构这段经历，列出项目规划阶段需考虑的注意事项清单，分享积累的各类技巧，最后以\"\
  让设计易于测试维护\"的理念作结。\n\n第 11 章将继续探讨可穿戴技术项目的几个实例与案例研究。而本章（在讲述野心故事后）主要聚焦于影响整个项目的元件级决策。\n\
  \n若您是使用本书作为教材的教师，本章主要面向项目设计者。这些宏观设计问题可能无需向学生详细讲解。我们旨在为您提供学生项目指导中的\"避坑\"思路——这本质上是一章关于\"\
