- "# 12. 其他技术\n\n编写这样一本书的挑战之一是知道何时收尾。如果你去一个大型公共图书馆查看他们的缝纫、时尚和类似手工艺书籍的区域，你很可能会发现一排又一排的书籍。本书重点介绍缝纫和电子学的交叉领域，并附带介绍了\
  \ 3D 打印。\n\n本章简要介绍了一些正变得常见，特别是在角色扮演社区中常见的工具和技术。其中一些工具目前还不太适合家庭使用，但如果你能接触到类似创客空间或社区学院等资源，这些工具可能在这些地方可以使用。\n\
  \n## 切割工具\n\n在第一部分中，我们讨论切割东西的方法。第 9 章介绍了 3D 打印，它通过逐层构建来创建物体。激光切割机和 CNC（计算机数控）工具则更传统地工作，它们从初始的原材料上去除材料。这两种机器都不太适合家庭使用，尽管现在市场上已经有较小的\
  \ CNC 机床。\n\n### 激光切割\n\n激光切割机使用激光来烧穿（或熔化）一块材料，将其切割成所需形状。激光切割可用于制作非常精细的物品，在网上搜索“激光切割艺术”很快就能发现这一点。缺点是激光切割机并非真正的家用机器，原因涉及安全、成本和后勤（例如尺寸、噪音和空气质量）方面。\n\
  \n当激光切割某物时，它会产生烟雾和燃烧物释放的烟气，因此激光切割机需要通风，要么排到室外，要么连接到空气净化器。如果你切错了材料，激光切割机可能会产生剧毒烟雾，从而损坏激光切割机和操作者。必须密切监控切割机，以确保被切割的物体不会着火，并且需要定期维护。鉴于所有这一切，大多数设施要么为你完成这项工作，要么让你接受一些培训，因此我们在此不会深入细节，仅涵盖一些关于可能性的概念以及如何为激光切割创建文件。\n\
  \n#### 切割布料\n\n激光切割机可以切割多种布料。有些面料会在边缘熔化，这可能意味着你得到了一个漂亮的密封边缘，或者你的面料被熔化掉了，这取决于操作者的设置技巧。棉布切割得很干净，但可能会因切割（燃烧）过程而稍微变色。图\
  \ 12-1 展示了一台设置好用于切割布料的激光切割机，图 12-2 展示了一些激光切割测试样片的例子。如果可以的话，先尝试一个非常小的测试，以防效果不佳。这样，你仍然可以退一步使用剪刀，而不会毁了你的布料。\n\
  \n![A371637_1_En_12_Fig2_HTML.jpg](img/A371637_1_En_12_Fig2_HTML.jpg)\n\n图 12-2.\
  \ 激光切割后各种布料的测试样片（绿色那块是在图 12-1 的设置中切割的）\n\n![A371637_1_En_12_Fig1_HTML.jpg](img/A371637_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1. 切割完小椭圆布料后的激光切割机设置\n\n#### 为激光切割机进行设计\n\n像 3D 打印机一样（见第 9 章），激光切割机只能根据计算机文件工作——你无法“手绘”它。与\
  \ 3D 打印机不同，激光切割机根据二维图纸工作。通常这是一个可缩放矢量图形（SVG）格式的文件，你在诸如`Adobe Illustrator`甚至`Tinkercad`（见第\
  \ 9 章）等绘图程序中创建。你可以指定是想要完全切穿还是仅仅雕刻一块材料。在轻薄织物上雕刻可能不会成功，因为切穿它所需的能量太少，但你可以雕刻皮革、牛仔布、亚克力和类似较厚的材料。\n\
  \n矢量图形与照片和其他光栅图像不同。光栅图像（有时称为位图）由一系列像素组成，这些像素大小相同并按网格排列。换句话说，光栅图像就像你看到的大多数数字图像。图像包含的关于每个像素的唯一信息就是它的颜色。如果你将这些图像放大，这些像素只会变大，图像看起来会呈块状，因为图像没有包含像素之间内容的信息。\n\
  \n另一方面，矢量图像具有遵循数学规则的线条、弧线和曲线，这样计算机总能在你靠近时判断出这些特征应该是什么样子。照片的复杂阴影几乎不可能以此方式呈现，除非将其简化以创建风格化的效果（图\
  \ 12-3 显示了一个例子），但字母、几何形状和线条图等内容可以在矢量图像中以近乎无限的精度呈现。\n\n![A371637_1_En_12_Fig3_HTML.jpg](img/A371637_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3. Rich 的矢量格式自画像。注意矢量形状产生的风格化外观\n\n使用激光切割机切割需要一个包含矢量线的文件，以便激光跟随。你可以在像`Adobe\
  \ Illustrator`这样的程序中创建这些线条，方法是直接绘制它们，或者追踪光栅图像中的线条（`Illustrator`带有自动工具可以帮助完成此操作）。\n\
  \n如上所述，你也可以使用激光切割机来蚀刻或雕刻材料的表面，你可以使用矢量或光栅图像来完成。在这些情况下，激光会使激光照射到的表面变暗（或者，取决于材料，可能变亮），从而允许你制作单色图像。蚀刻也可能去除表面的顶层（例如一层油漆），以露出下面不同的颜色。\n\
  \n你不必局限于`Illustrator`。你也可以使用 CAD 程序创建用于切割的矢量文件。`TinkerCAD`有一个下载用于激光切割的 SVG 的选项（在“下载用于\
  \ 3D 打印”菜单中找到），它会在你的设计与工作平面相交的任何地方创建线条。其他 CAD 程序通常允许你创建可以导出为`DXF`或`DWG`格式的 2D 图纸。你需要找出激光切割机软件接受哪些格式，但所有运行激光切割机的程序都应该支持`SVG`。`Inkscape`（\
  \ [`https://inkscape.org/en/`](https://inkscape.org/en/) ）是`Adobe Illustrator`的免费开源替代品，尽管它功能没有那么全面，但至少你会发现它对于将一种矢量格式转换为另一种矢量格式很有用。\n\
  \n> **提示**\n> \n> 激光切割是制作多个裁片图案副本的好方法。Lyn 曾让学生为一场演出激光切割布料鱼，这使得鱼类保持一致，同时允许颜色和细节有大量变化。\n\
  \n\n\n### CNC 铣削\n\n`CNC` 铣床是一种计算机控制的切割机器。它在三维空间中移动切割刀具以去除材料，类似于 3D 打印机添加材料的方式。与激光切割机或\
  \ 3D 打印机相比，`CNC` 铣床可以加工更多种类的材料，范围从`EVA`泡沫到某些金属，但这是一个更脏乱的过程，涉及将切下的小块材料抛到一边。即便如此，这些机器可能比激光切割机更适合家庭工作室，因为它们不会释放烟雾和有害气体，只会产生那种可以用扫帚或干湿两用吸尘器清理的杂物。\n\
  \n当加工金属等硬质材料时，`CNC` 铣削可能需要非常慢速，但对于泡沫或机加工蜡等较软的材料，加工大型零件时它可能比 3D 打印更快。`CNC` 铣床的价格通常也低于同等尺寸的激光切割机，但对于设计用于从金属上切割复杂形状的工业机器来说，价格可能会相当高。`Othermill`、`Inventables`\
  \ 和 `Carbide 3D` 是爱好者级机器的热门品牌。\n\n## 构建技术\n\n你可以使用多种材料来制作道具或戏服盔甲——这些复杂的形状可能太大而无法\
  \ 3D 打印。在本节中，我们将向你介绍一些在角色扮演社群中常用的构建技术。显然，从木材到铝箔和管道胶带，有无数种工艺材料可供选择。我们这里只涉及一些更具“技术含量”的材料。\n\
  \n### 泡沫盔甲\n\n角色扮演者通常想要制作想象中的盔甲或武器。一种常见的方法是切割和弯曲乙烯-醋酸乙烯酯（`EVA`）泡沫板，这种材料常用于地垫。这项技艺最知名的实践者之一是比尔·多兰，他于\
  \ 2012 年与妻子布列塔尼共同创立了 Punished Props（`www.punishedprops.com`）。他们拥有丰富的资源，包括一个 YouTube\
  \ 频道（`www.youtube.com/user/punishedprops`）以及在其网站上出售的《`Foamsmith`》系列书籍。\n\nPunished\
  \ Props 最初承接委托制作，如今多兰主要培训人们使用这些技术。他和妻子为自己制作的最喜欢的个人角色扮演服装来自电子游戏《`Skyrim`》。他们扮演的是尸鬼死亡领主，身披锈迹斑斑的旧盔甲，骷髅面孔，眼睛发光。他热情洋溢地说，他们看起来“非人类”。\n\
  \n多兰说，一件好的角色扮演服装的关键是“选择一个你真正热爱的角色，并确保这是你痴迷的东西。”他还说，制作一整套泡沫盔甲可能需要数月时间，所以你真的需要非常想穿上这些服装！\n\
  \n这个过程包括从`EVA`泡沫（可以是地垫形式或购买的大卷材）开始，然后使用类似于缝纫用的纸样将其切割成所需形状（见图`12-4`）。之后，你使用各种工具来弯曲和修饰它。`EVA`泡沫可以很容易地用剃刀刀片切割（尽管比尔警告说这会很快使刀片变钝）、带锯甚至激光切割机切割。你可以使用旋转工具（例如`Dremel`生产的工具）进行细节加工。\n\
  \n![A371637_1_En_12_Fig4_HTML.jpg](img/A371637_1_En_12_Fig4_HTML.jpg)\n\n图 12-4.\
  \ 制作初期的`EVA`泡沫服装部件（图片由 Bill Doran / Punished Props 提供）\n\n比尔说，很多技术都涉及如何将这些部件绑在穿着者身上、了解下面该穿什么，以及弄清楚如何将部件粘合在一起。完成并上漆的道具部件可能会非常壮观（见图`12-5`和图`12-6`）。\n\
  \n![A371637_1_En_12_Fig6_HTML.jpg](img/A371637_1_En_12_Fig6_HTML.jpg)\n\n图 12-6.\
  \ 完成并上漆的`EVA`头盔（图片由 Bill Doran / Punished Props 提供）\n\n![A371637_1_En_12_Fig5_HTML.jpg](img/A371637_1_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5. 完成并上漆的`EVA`剑（图片由 Bill Doran / Punished Props 提供）\n\n### 真空成型\n\n热成型是将塑料薄片加热，使其能够拉伸并成型为模具形状的过程。一种常见的热成型形式是真空成型，其过程是先将加热的塑料片拉伸覆盖在模具或成型件上，然后用框架将其密封在真空台上，以便抽走空气，在塑料重新硬化之前将其紧压在模具表面上。这是制作面具等物品的常用方法，几乎所有《星球大战》暴风兵角色扮演盔甲都是这样制成的。\n\
  \n透明的面部或眼部罩面可以通过对透明塑料进行真空成型，作为较大服装的一部分来制作。许多爱好者通过制作一个顶部带孔的箱子，并在侧面连接一个干湿两用吸尘器来抽气，从而搭建自己的真空成型台。更专业的真空成型机包含用于加热塑料的加热元件，但其他机型可能需要你先将装有塑料的框架在烤箱中加热，然后再转移到真空成型机上。\n\
  \n### Worbla\n\n还有一些塑料被设计为无需模具即可成型。像`Worbla`、`Sintra`、`Wonderflex` 和 `Terraflex`\
  \ 这类产品可以用热风枪软化，然后手工塑造成复杂的形状。这些材料可用于制作道具和盔甲，或者仅仅用来制作要附着在较大部件上的细节部分。有几本书（包括 Svetlana\
  \ Quindt 所著的《*The Book of Cosplay Armor Making with Worbla and Wonderflex*》）列在`www.worbla.com/?cat=33`，该书的作者也有一个\
  \ YouTube 频道`www.youtube.com/user/Mogrymillian`。\n\n> **注意**：一如既往，在使用本章所述材料时，务必遵守制造商关于通风和其他防护装备的说明。\n\
  \n## 其他想法\n\n还有无数的工艺材料和工具可供尝试。以下是另外几种也许对你有用的技术和工具：\n\n- `Pepakura` 是一种通过制作可折叠形成曲面的裁剪纸样来创建实物的技术。（这与折纸略有不同，折纸是从一张正方形纸开始制作更精致的作品。）各种软件包都可以实现这一点，例如\
  \ `Autodesk 123D Make`（`www.123dapp.com/make`）。用这种方法制作的物品不是很坚固，但形状可能很有趣。激光切割机是切割\
  \ `pepakura` 纸样的好工具。\n- 乙烯基切割机顾名思义：一种计算机控制的刀具，可从薄薄的乙烯基卷材上切割出形状。如果你想在某物上（比如花哨的字体）拥有薄表面、彩色的剪裁设计，它会很有用。\n\
  \n\n\n## 涂装\n\n当你用塑料或泡沫制作出某样东西后，它很可能看起来还是塑料或泡沫的质感。如果你不希望这样，那么就该进行涂装了。让你的作品显得有划痕和污渍（即所谓的旧化处理），能让它看起来更加逼真。\n\
  \n此类应用的涂料通常采用喷涂方式，可以使用气雾喷漆罐（俗称喷罐）或喷笔，以营造无笔刷痕迹的均匀外观。通常你需要先使用底漆，然后涂上你的基础层颜色。根据你想要的效果，你可能需要涂刷多层油漆，并且可以在喷涂时遮盖住不同区域，以获得喷涂区域与未喷涂区域之间清晰的边界。\n\
  \n旧化处理涉及多种技巧，例如刷上油漆后再擦除、故意将咖啡洒在你崭新闪亮的作品上，或者用金属漆绘制边缘，使其看起来像是这些区域的漆面已经剥落。\n\n当所有步骤完成并干燥后，你可能需要在整个作品上喷涂一层清漆，这样你伪造的损伤就不会遭受真正的损伤。关于涂装和旧化处理的更多内容，我们推荐沃平道具公司的哈里森·克里克斯所著的《道具与复制品的涂装与旧化处理》，你可以在[`www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/`](http://www.volpinprops.com/product/painting-and-weathering-for-props-and-replicas-ebook/)找到它。\n\
  \n**提示**：对于 3D 打印的零件（除了旧化处理），丙烯颜料适用于`PLA`或`ABS`材质。尼龙材质可以用合适的（尼龙）织物染料进行染色。\n\n##\
  \ 总结\n\n本章涵盖了其他章节未深入讨论的其他工具和技术。首先，我们回顾了激光切割机和 CNC 机床等切割工具。接着，我们探讨了结构技术，例如用泡沫制作盔甲、真空成型、使用`Worbla`塑形以及真空成型。最后，我们介绍了`pepakura`和乙烯基切割，并以一些关于涂装你作品的想法作为本章的收尾。\n\
  \n"
- '# 13. 展望未来


  在本书中，到目前为止，我们三人呈现了一些我们认为适合初学者、或者可能仅在缝纫、电子和编程这三者中某一领域稍有经验的人士完成的项目。在这个最后一章中，我们将以一些更具抱负的项目来结束全书，展示专业设计师和艺术家能够利用这些技术实现什么。同时，我们也会对技术的未来发展方向进行一些展望，并列举几个来自研究实验室的例子。


  ## 3D 打印高级时装


  使用 3D 打印技术的时装在高级定制领域已经变得很普遍。行业网站`3Ders.org`最近整理了一份他们精选的前 15 款时装的列表，地址在[`www.3ders.org/articles/20160225-3ders-top-15-list-of-our-favorite-3d-printed-dresses.html`](http://www.3ders.org/articles/20160225-3ders-top-15-list-of-our-favorite-3d-printed-dresses.html)。点击他们的列表，你可以看到各式各样的风格。或者，如果你在网上搜索“3D
  打印连衣裙”这个短语，你会找到既美丽又令人惊叹的设计。


  ### 蒂塔·万提斯连衣裙


  2013 年，首批完全 3D 打印的连衣裙之一由迈克尔·施密特和弗朗西斯·比托尼为蒂塔·万提斯设计（[`www.michaelschmidtstudios.com/dita-von-teese.html`](http://www.michaelschmidtstudios.com/dita-von-teese.html)）。施密特在他的网站上称自己是一位“服装与珠宝设计师”，拥有一份名人客户名单。这件万提斯连衣裙由微小的、可活动的、相互连接的尼龙零件制成，有点像锁子甲，这些零件在尼龙粉末打印机上打印出来，然后染成黑色。在`Shapeways`网站上有一个很好的“制作过程”视频：[`www.shapeways.com/blog/archives/1952-revealing-dita-von-teese-in-a-fully-articulated-3d-printed-gown.html`](http://www.shapeways.com/blog/archives/1952-revealing-dita-von-teese-in-a-fully-articulated-3d-printed-gown.html)。


  ### 神经系统


  杰西卡·罗森克兰茨和杰西·路易斯-罗森伯格于 2007 年共同创立了`Nervous System`（[`http://nervo.us`](http://nervo.us)），一个“生成式设计工作室”。他们的愿景是：“从自然现象中汲取灵感，我们根据自然界中的过程和模式编写计算机程序，并利用这些程序来创造独特且价格合理的艺术品、珠宝和家居用品。”这一愿景的实现是令人惊叹的。


  他们的`Kinematics`连衣裙和万提斯连衣裙一样，是通过尼龙粉末打印机打印的。然而，他们的关键创新在于，`Nervous System`开发了能够为特定穿着者定制设计的软件。图
  13-1 展示了由罗森克兰茨穿着的`Kinematics Dress 2`。


  ![A371637_1_En_13_Fig1_HTML.jpg](img/A371637_1_En_13_Fig1_HTML.jpg)


  **图 13-1.** 设计师本人穿着的`Kinematics Dress 2`。图片由`Nervous System`提供。


  这些连衣裙由能够自由活动的结构（如图 13-2 所示）制成。它们从 3D 打印机中取出时已经组装完毕，吹掉多余的粉末后即可穿着。


  ![A371637_1_En_13_Fig2_HTML.jpg](img/A371637_1_En_13_Fig2_HTML.jpg)


  **图 13-2.** 显示铰链细节的`Kinematics`结构样品。图片由`Nervous System`提供。


  `Nervous System`的另一项创新是用于创建连衣裙 3D 可打印模型的软件。这个模型被紧密折叠，并在选择性激光烧结（`SLS`，基于粉末）3D 打印机中一体打印。图
  13-3 展示了`Kinematics`系列中的一件连衣裙在从打印机中取出、尚未清除多余粉末时的样子。顺便提一下，如果你想知道，`Nervous System`表示`Kinematics`部件可以用温和的肥皂水软毛刷手洗。


  ![A371637_1_En_13_Fig3_HTML.jpg](img/A371637_1_En_13_Fig3_HTML.jpg)


  **图 13-3.** 清除所有多余粉末之前的`Kinematics Dress 1`。图片由`Nervous System`提供。


  像这样的作品无法在基于线材的 3D 打印机（如我们在第 9 章中讨论的那些）上打印；其形状过于复杂和精细，以至于线材打印所需的支撑结构将难以移除。`SLS`打印机的优点在于粉末本身充当了支撑结构，最后只需吹走即可。缺点是粉末非常细，难以管理。目前`SLS`打印机仍是工业设备，且截至本文撰写时，打印成本昂贵，但谁知道技术将如何演变呢。


  这对搭档持续创新，并于 2016 年创作了受波士顿美术博物馆委托的`Kinematic Petals Dress`（图 13-4）。关于这件连衣裙，他们说道：“受花瓣、羽毛和鳞片的启发，我们为`Kinematics`开发了一种新的织物语言，其中相互连接的元素被构造成叠瓦状的壳。与我们之前的服装一样，这件连衣裙可以通过
  3D 扫描根据穿着者的身体进行定制，此外，现在每个元素都可以单独定制：在方向、长度和形状上各不相同。”他们指出，他们不得不开发新的软件来处理设计折叠用于 3D
  打印时的花瓣重叠问题。如果你想真正领略世界级设计师能用这项技术做什么，不妨花些时间浏览`Nervous System`的网站。


  ![A371637_1_En_13_Fig4_HTML.jpg](img/A371637_1_En_13_Fig4_HTML.jpg)


  **图 13-4.** `Kinematics Petals Dress`。图片由`Nervous System`提供。


  ## 电子时装


  在另一个时代，礼服上镶嵌着珠宝。如今，`LED`灯、传感器和机械装置似乎正在取代它们的位置。其中一些作品是作为技术演示而开发的，但另一些则正在成为主流红毯服装。




  ### 阿努克·维普雷希特


  荷兰设计师阿努克·维普雷希特（http://anoukwipprecht.nl）是在其作品中使用 3D 打印部件和材料的先驱。她近期设计的 Spider Dress
  2.0 在一定程度上是对英特尔爱迪生芯片的展示，该芯片用于控制这件连衣裙。裙子上装有传感器，当他人过于靠近时，传感器会发出信号，此时机械臂会做出威胁性的移动来驱赶闯入者。维普雷希特早期的作品包括法拉第连衣裙，该裙允许穿着者在舞台上与特斯拉线圈产生的高压进行互动，以及她网站上展示的众多其他作品。


  ### 2016 年纽约大都会艺术博物馆慈善舞会


  纽约大都会艺术博物馆 2016 年的 Met Gala 主题与该博物馆服装学院的展览"Manus x Machina"（http://www.metmuseum.org/exhibitions/listings/2016/manus-x-machina）相呼应。这场年度盛会上展示了众多令人炫目的礼服和西装，展示了在一件礼服中使用大量部件所能达到的惊人效果。克莱尔·丹尼斯身着由欧根纱和光纤制成的惊艳的浅蓝色礼服，这件礼服在黑暗中会发光。它在灯光下美轮美奂，在黑暗中更是充满魔幻般的乐趣。这是一件由扎克·波森设计的独一无二的手工缝制精品。林非常想知道这件作品的制作动用了多少人力、耗时多久！


  该展览中的另一件作品由 Marchesa 品牌的设计师乔治娜·查普曼和凯伦·克雷格与 IBM 沃森超级计算机合作创作。这件作品由模特卡罗莱娜·库尔科娃展示，旨在成为一件"富有同情心的连衣裙"。其
  150 个 LED 灯会根据 Twitter 上粉丝的输入改变颜色。我们建议您花些时间浏览上一段中提到的大都会博物馆网站，从中获取灵感。


  ## 纺织科技


  要实现真正的革命性变革，创新可能需要以活性织物的形式深入到纺织品层面。尽管这个术语可以表示许多不同的事物。一种可能性是嵌入微小的致动器，使其能够在织物内部产生运动，就像我们在第
  8 章中讨论的伺服电机在微观尺度上的版本。或者，一种活性织物可能从一开始就将电路编织其中。以下是一些更具前瞻性的创新实例。


  ### 生物逻辑


  假设人们可以拥有活的织物会怎样？在石井裕教授指导下，麻省理工学院有形媒体实验室的生物逻辑团队（http://tangible.media.mit.edu/project/biologic/）发现，枯草芽孢杆菌纳豆亚种会随大气湿度变化而膨胀和收缩。这种细菌在日本已被使用了一千年来制作豆制品纳豆，因此它并非新奇的外来生物体。


  该团队正利用这一特性来制造对湿度做出反应的织物。他们收获活细胞，然后将其生物打印成"合成生物皮肤"。采用这种生物皮肤设计的织物（图 13-5）会通过打开冷却通风口来对热量和湿气做出反应。因此，如果有人穿着由这种材料制成的功能性服装，它会在需要时自动打开通风口。该网站称，该团队正与运动服装制造商
  New Balance 合作。


  ```

  ![A371637_1_En_13_Fig5_HTML.jpg](img/A371637_1_En_13_Fig5_HTML.jpg)

  ```


  图 13-5. 生物逻辑织物。图片由麻省理工学院媒体实验室有形媒体集团提供。


  该团队还创造了一些更具奇思妙想的应用，例如干燥时折叠闭合且颜色暗淡的织物花朵（图 13-6），在被水喷洒后会改变颜色和形状（图 13-7）。


