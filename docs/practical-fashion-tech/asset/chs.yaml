  接下来该怎么做


  在本部分中，我们将比前几部分更广泛地探讨。在第 12 章中，我们向您展示了一些其他技术，例如激光切割、泡沫盔甲制作和真空成型，这些技术经常被角色扮演者用来复制那些不应该由布料制成的物品。第
  13 章通过介绍高端时装设计师现在正在使用这些技术的例子，并推测这些技术如何可能比你想象的更快地进入主流，从而结束本书的主要部分。


  我们还包含了两个附录，它们将帮助您进一步探索本书中的主题。在附录 A 中，我们为您提供了我们设计一个包含时尚科技内容的高中试点课程的经验（包括哪些做得好，以及我们会做出哪些不同的改变）。附录
  B 将本书中的所有链接整理成一个便捷的参考。


