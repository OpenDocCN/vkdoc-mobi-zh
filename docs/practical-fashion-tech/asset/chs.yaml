  \n图 10-1. 计划外的布线失控\n\n我在这里描述的第一个项目源自一个戏服设计课的头脑风暴会议。学生们被要求将可穿戴技术融入某种蒸汽朋克风格的作品中。（蒸汽朋克是一种科幻小说类型，其基本设定是世界以某种方式回到了维多利亚时代的英国，并混合了不同时代的技术，但拥有蒸汽动力机械和仅限于比空气轻的飞行器。）全班最终聚焦的第一个项目是一件拥有自我意识的蒸汽朋克“鬼魅连衣裙”。\n\
  \n最终，这个项目拖到了学年结束之后，成了我个人的夏季项目，也是我自学可穿戴技术的教程。我们知道将在那个夏末的一次教育创客技术会议上展示它，这给了我们一个必须赶上的截止日期。这帮助我为我第一个全年的戏服设计和可穿戴技术课程做好了准备，但这无疑是一场消耗了我大半个夏天的“战火洗礼”。处理一个复杂的项目确实迫使你同时快速学习所有方面。\n\
  \n### 鬼魅连衣裙——最初构想\n\n“鬼魅连衣裙”旨在成为一件小型表演作品。我想营造出一条裙子在一个惊讶的穿着者周围活过来的感觉。流程将从穿着者做出一个启动裙子的手势开始。接着，灯光会沿着裙身前部闪烁（以模拟闪电效果）。然后，裙摆下的风扇会启动，吹动裙摆。当穿着者低头看向裙摆时，袖子会开始自行向上拉起。\n\
  \n这条裙子被设计为一条蒸汽朋克/维多利亚风格的雪纺长裙，配以塔夫绸的臀垫式罩裙，以及一件带有雪纺袖子的塔夫绸短夹克。图 10-2 显示了早期开发阶段的裙子。（我们的第一个错误是，在装上电子元件之前，我们就已经组装好了大部分部件。）图\
  \ 10-3 显示了完成后的裙子，而图 10-4 是在添加肩部舵机时上衣部分的特写。\n\n![A371637_1_En_10_Fig4_HTML.jpg](img/A371637_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 裙子的夹克部分，展示了 NeoPixel 灯带、Flora 主控板以及部分舵机/钓鱼线连接件\n\n![A371637_1_En_10_Fig3_HTML.jpg](img/A371637_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. (右图) 完成后的裙子\n\n![A371637_1_En_10_Fig2_HTML.jpg](img/A371637_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. (左图) 早期构建阶段的裙子\n\n图 10-5 中的示意图展示了夹克的关键部分，它支撑了大部分电子元件。我决定使用 Flora（关于 Flora\
  \ 硬件详见第 5 章，软件详见第 6 章）作为裙子的微控制器，并使用 NeoPixel 多色 LED 来实现闪电效果。裙摆下安装了小型风扇来吹动裙摆，还有一个带有舵机（见第\
  \ 8 章）和绳线的机构来拉起袖子。（我认为把袖子拉起来不算太难，但再放下来就太难了）。臀垫是隐藏电池和其他大件物品的好地方，而肩垫则能隐藏袖子用的机械装置。我以为万事俱备了——至少当时这么想。\n\
  \n![A371637_1_En_10_Fig5_HTML.jpg](img/A371637_1_En_10_Fig5_HTML.jpg)\n\n图 10-5.\
  \ 鬼魅连衣裙夹克的示意图，展示了 Flora (A)、舵机 (B) 以及将舵机固定在肩部的弹性带 (C)。夹克内部是肩垫 (E，为清晰起见，显示在另一个肩膀上)。用于拉起袖子的钓鱼线缠绕在一个粘在舵机上的线轴上，并穿过三角形导向环\
  \ (D)。\n\n夹克内有肩垫，用于放置为舵机供电的口红电池。一个缝纫用的线轴被粘在舵机顶部，并缠绕了足够长（加上一些余量）的尼龙钓鱼线，以便到达袖口。两个小三角形环被缝在大约三英寸长的斜纹带子上。斜纹带子被缝在雪纺袖子的内侧，这些三角形环为尼龙线形成了一个通道，尼龙线的末端打结并手工缝制在袖口边缘。\n\
  \nFlora 主控板被手工缝制在夹克前部，通常纽扣所在的位置，内侧用魔术贴来固定夹克。NeoPixel 灯带被手工缝在翻领上，并用导电缝纫线连接到 Flora。导电缝纫线也用来将舵机和口红电池的导线连接到\
  \ Flora。这些导线从夹克内部的肩垫中穿出。\n\n### 错误\n\n在鬼魅连衣裙这个项目上，我最大的错误是在完全理解项目所有其他方面之前就制作了裙子和夹克。作为一名资深裁缝，我习惯于一头扎进去并在制作过程中随时调整项目，但这些项目需要大量前期规划。\n\
  \n例如，我没有为从舵机到 Flora 的整洁走线留出空间。结果，成品相当凌乱，我甚至将热焊锡滴到了雪纺裙子上。这可不是什么好看的景象！\n\n我还不得不将塔夫绸臀垫拆开几处，以便为锂电池缝制一个口袋，并将其安置在最适合活动的位置。事后看来，我本应在夹克内部用轻质棉布或里衬布制作导线通道，以获得更整洁的外观和更舒适的穿着体验。\n\
  \n**提示**\n\n我真希望当时先用平纹细布做一件罩裙的样衣，来确定其他元件应该放在哪里，然后再使用昂贵（且易损）的塔夫绸。轻质、廉价的棉质平纹细布是一种很好的面料，可以用来制作服装原型，找出导线的最佳路径，以及发现其他组件的最佳位置。在裁剪和缝制最终版本（可能使用更昂贵的面料）之前，它允许你在廉价面料上犯错。设计师常用它来制作一件作品的第一件模型，这就是为什么模型（mockup）常被称为“平纹细布样衣”（muslin）。来自电子领域的人可能会把它等同于在制作永久性焊接电路之前，先搭建一个面包板版或鳄鱼夹版的电路。\n\
  \n\n#### 花朵与 NeoPixel 的布局\n\n我用导电线在翻领的每一边分别缝了四个 NeoPixel。电线从电路板出发，依次连接到第一个 NeoPixel，然后再连接到后续的每一个。导线沿着右侧向上延伸，绕过颈后，再沿翻领左侧向下，如图\
  \ 10-5 所示。\n\n这是一段很长的走线，所以我必须确保导线足够紧以保证连接，但又不能太紧以至于拉扯翻领使其变形。经过一些反复试验才找到了合适的松紧度。\n\
  \n在第一个迭代版本中，夹克的 NeoPixel 是缝在导电线带上的，而导电线带则缝制在翻领周围。导电线带通过导电线连接到 Flora 板上的触点。由于我没有正确地将线带连接到\
  \ NeoPixel 和 Flora，因此只有部分 NeoPixel 能正常工作。随后，我把线带从翻领上拆下，将 NeoPixel 逐个缝上，并用导电线将它们相互连接并连接到\
  \ Flora。这次效果就好多了。\n\n**注意**\n\n使用导电线带（第 5 章）可以节省时间，但一定要确保使用导电线将线带中正确的导线连接到你的组件上。我第一次尝试将\
  \ NeoPixel 连接到导电线带时非常笨拙且耗时。当时我正在为幽灵连衣裙的夹克翻领上布置一段长线路。NeoPixel 沿着翻领右侧向上排列，在绕过衣领后部后，再沿着翻领左侧向下排列。NeoPixel（第\
  \ 5 章）是有方向性的，因此为了让信号从一个 NeoPixel 输出并传入下一个，你必须确保切断线带中间的两个部分，从而在 NeoPixel 之间保持信号的输入输出路径。我沿着线带将它们相互连接，遵循箭头指示，并使用导电线将它们连接到\
  \ Flora 电路板。当我尝试点亮它们时，只有右侧能正常工作。啊！这是因为我把左侧最后一个 NeoPixel 缝反了方向！解决起来倒不难，但在我们弄清楚错误之前，确实让人相当沮丧了一阵子。\n\
  \n#### 神奇的袖子\n\n我使用了绕在缝纫机梭芯上的钓鱼线，来自动收拢夹克的袖子。我将钓鱼线穿过小的三角形环沿着袖子向下引，并将其固定在袖口边缘。我使用了连续旋转舵机，并在其顶部粘了一个缝纫机梭芯来卷收钓鱼线。舵机有点重，难以保持平衡，所以我将一块结实的黑色松紧带固定在夹克肩部外侧来固定舵机。这同时也允许梭芯活动，并且便于在需要时拆卸（图\
  \ 10-6）。\n\n![A371637_1_En_10_Fig6_HTML.jpg](img/A371637_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6. 固定在夹克上的舵机\n\n我用了两个缝在 3 英寸长斜纹带上的小三角形环，并沿着袖子固定，作为钓鱼线的通道。通过在线末端打结并在结上涂抹透明指甲油，我得以将线手工缝制到袖口边缘。我还在每个袖口末端固定了一片旧项链的装饰片，以增加袖子的重量，帮助袖子在舵机收线后恢复原位（图\
  \ 10-7）。\n\n![A371637_1_En_10_Fig7_HTML.jpg](img/A371637_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7. 袖子机械结构和舵机\n\n用于驱动舵机的口红电池隐藏在肩垫的口袋中（你可以在图 10-6 中看到白色的 USB 线接入电池），USB 插头则焊接到舵机的导线上。舵机也连接到了\
  \ Flora 电路板。\n\n**在雪纺袖中集成重型组件**\n\nUSB 线缆有 A 端（通常插入电脑的一端）和 B 端（在我们的案例中，通常插入 Flora、Gemma\
  \ 或其他电路板的连接器）。电池需要 USB 连接器，所以 Rich 介入进来，剥掉线缆的 B 端，然后将其焊接到通往舵机的导线上。通常情况下你不会这么做；更典型的案例请参见第\
  \ 8 章。Rich 和我之所以在这里采用这种方法，是因为我们需要为舵机提供大量电力，并希望为它们提供独立的电源，以确保它们不会导致微控制器电压骤降。我们沿着夹克内部从电池到舵机走线。我们使用导电线将导线缝合固定到位，并将舵机和\
  \ Flora 连接到信号和接地连接上，如图 10-6 和图 10-7 所示。\n\n对于幽灵连衣裙，我想把口红电池藏在肩垫里。肩垫通常由棉絮或泡沫制成，并覆以轻质面料。我用黑色塔夫绸为肩垫制作了外套，以匹配夹克的紧身胸衣。在塔夫绸上留一个小开口，我得以将电池附带的收纳袋手工缝合到肩垫套内部（图\
  \ 10-8）。\n\n![A371637_1_En_10_Fig8_HTML.jpg](img/A371637_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8. 用于容纳口红电池的肩垫\n\n我通过在肩缝线上钉缝两处，将肩垫固定在夹克的肩部内侧。钉缝是指在同一个点上缝几针以固定物件。\n\n####\
  \ 鼓起的裙摆\n\n我们三个人希望雪纺裙摆能鼓起来，仿佛一阵风吹过。我们选择使用两个小型径流式鼓风机，它们需要有一个安放之处，既能从裙子内部吹动雪纺，又能远离穿着者。我为每个风扇做了一个小口袋，并将它们固定在雪纺的背面（图\
  \ 10-9 和图 10-10）。\n\n![A371637_1_En_10_Fig10_HTML.jpg](img/A371637_1_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10. 风扇从其口袋中滑出\n\n![A371637_1_En_10_Fig9_HTML.jpg](img/A371637_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9. 风扇口袋\n\n我用了两层雪纺，一层海军蓝和一层更亮的蓝色，使裙子稍微厚实一些（参见图 10-2 和图 10-3 中的连衣裙照片）。这也旨在最大限度地减少对风扇进风口的阻挡。风扇的导线被焊接到连接器上，并连接到电池。另一组导线焊接到\
  \ Flora 电路板上。导线在裙子和外裙之间走线。我在外裙前部内侧为电池做了另一个口袋，该电池同时也为 Flora 供电。\n\n#### 软件\n\n通过浏览`Arduino.cc`和`Adafruit.com`上的许多教程，我学到了一点关于编程的知识（第\
  \ 6 章），并能够对 Flora 进行编程以控制 NeoPixel。舵机（第 8 章）和风扇则更为复杂，于是 Rich 和 Joan 介入进行指导和调试。自从第一次尝试以来，我学到了更多关于编程的知识，但仍然还有很多需要学习。\n\
  \n\n\n#### 最终结果如何\n\n与许多宏大构想一样，这个项目并未完全按计划进行。最初的设计使用加速度计来检测一个大幅动作，以此启动并重置所有组件，但不幸的是，我们没来得及实现这个功能。我们降低了期望，改为让穿戴者按下`Flora`上的重置按钮。最终，我们只是在一个人体模型上展示了这条裙子（如图\
  \ 10-2 和图 10-3 所示），因此，与最初戏剧化的构想相比，这个问题就没那么严重了。\n\n风扇提供的风力不足以从口袋里吹起裙摆，所以我们在最终展示前将它们移除了。事后看来，我们本应该用更多的布料进行几次测试，而不是只用一层布料做一次简短的测试。\n\
  \n由于最后关头出现的一些电气问题，左肩的舵机大约只有一半时间能正常工作，而我们没有时间进行调试。但右侧的舵机和`NeoPixels`则表现得非常出色。\n\n\
  > **注意**  \n> 我们在本书中没有提供这件裙子的`Flora`程序草图，因为这个项目从未真正完成或调试完毕。我们分别在第 6 章和第 8 章中引用了（更简单的！）`NeoPixel`和舵机示例。提供这个例子的目的是为了展示初次尝试“过于困难”的事情的利弊，同时也是一个小小的警示故事。\n\
  \n在本章的其余部分，我们将重新审视在这个项目中做出的决策，并讨论许多在这个项目中未出现但你将会遇到的其他“系统设计”问题。\n\n### 我们学到的经验\n\n\
  我们从这次经历中学到的第一件事是，在开始之前，必须为你的服装制作一张某种形式的“地图”——至少要用屠夫纸画一个纸样，并草图勾勒出各个部件的位置。（本章中我们说的是服装，但你制作的可能是从毛绒玩具企鹅到帽子再到晚礼服等任何东西。）这个纸样能让你搞清楚在哪里隐藏组件、确定导线的走向，并建立最有效、最高效的连接。这是一种在将各个部分组装在一起之前消除一些错误的方法。\n\
  \n> **提示**  \n> 要布局一个简单的可缝纫电路，你可以使用`Fritzing`软件包（第 5 章）来创建电路布局的全尺寸图纸。然后，你可以将图纸放在你正在缝纫的物件旁边，或者将其作为指导，用裁缝粉笔在服装上划线。\n\
  \n创建某种最小化的模型能让你犯错误、修正它们，并在制作最终项目之前发现隐藏电池的最佳位置以及走线最有效、最舒适的路径。对于这件裙子项目，我没有这样做，结果导致我不得不重做许多最初的尝试。\n\
  \n> **提示**  \n> 当你在缝纫电路时，你可能需要将一些导电缝纫线迹缝在服装内部或者布线，这意味着你使用的纸样可能与绘制时的方向是镜像的。这样很容易把电路的一部分缝反。因此，务必要确保你在将纸样投射到布料上时，保持关键部分（如输入到`NeoPixel`的信号和电源\
  \ - 第 5 章）的方向正确。\n\n#### 材料考量\n\n其次，我们意识到面料的类型和辅料将决定你的项目是否成功。对于幽灵裙，我使用了雪纺和塔夫绸——回想起来，这并不是最佳的面料选择。雪纺很难缝纫，因为它是一种精细的面料且容易磨损；而塔夫绸是一种硬挺的面料，每一条不得不拆掉的线迹都会留下可见的针孔。它也很容易磨损。我不得不多次修改电路，这导致雪纺磨损，并在塔夫绸上留下了拆除缝线后的可见针孔。我学到了很多，但如果我像前面提到的那样，先用白棉布做一个原型，最终成品的效果会更好。\n\
  \n适合使用的面料包括轻质棉（特别适合初学者）或 T 恤布（稍难一些，因为它有弹性）。当然，这在一定程度上取决于你在制作什么。尼龙或任何涤棉人造丝混纺面料都很好。避免使用弹性很大的材料，因为初学者缝纫起来会比较困难。\n\
  \n魔术贴（即`Velcro`）是可缝的，并且不会在你的电路中引起短路。按扣易于使用，但要确保它们不会干扰到任何导电缝纫线、导电布或焊接点。用里布或轻质棉为导线创建通道是个好主意，但这些通道应该易于打开，以便在出现故障或短路时能够检修。如果你给服装加了里衬，可以将通道固定在里衬上，这样从外面就看不见了，或者用手工将通道布缝在接缝或折边等关键位置。热熔胶枪对于绝缘任何焊接点非常有用。只需一滴就能帮助保护连接。\n\
  \n> **提示**  \n> 手工缝在布料上或粘在 3D 打印物体背面的别针或磁吸扣，可以成为很棒的时尚配饰。你可以添加舵机来实现运动，或者添加`NeoPixels`使其发光。瞧！\n\
  \n#### 隐藏并支撑电池和机械装置\n\n腰带、垫肩、肩章、裙撑、口袋和门襟是隐藏电池、连接器、开关、控制器和其他你不想暴露在外部件的便捷方法。你也可以通过贴花或刺绣将它们融入设计，或者如果它们本身足够有趣或你喜欢它们的样子，也可以让它们直接显露出来。\n\
  \n> **警告**  \n> 务必记住为电池和控制器创造一个安全且受保护的位置，同时也要便于充电和/或更换。请参阅第 5 章中关于电池问题的讨论。\n\n关于雪纺袖子的侧边栏描述了我们在垫肩中如何支撑电池。这些电池有点重，所以把它们放在肩膀上可以提供一些支撑。\n\
  \n> **提示**  \n> 如果某个部件必须实际移动，它可能需要相当大的功率，这可能意味着要隐藏大量的机械装置和电池。你也许可以通过巧妙地将服装部件连接到身体其他部位（例如，将某物连接到鞋子上，随着人走路而移动）来避免让服装部件运动。在某些情况下，这可能比尝试使用高技术手段更简单。\n\
  \n#### 导电缝纫线、导线和线缆\n\n导电缝纫线比普通缝纫线更难操作，因为它更硬、更粗。毕竟它是由金属丝制成的。它容易打结和缠绕，所以缝纫时要使用相当短的长度。每次各自完成一条单独的走线，刚好够用就行，然后重新穿针。这需要耐心和对每一针的关注，但你很快就能掌握窍门。\n\
  \n针脚需要足够紧，以建立牢固的连接，同时又不能使面料和/或服装变形。你用导电缝纫线缝制的针脚可以比普通缝纫线更长，但不应过长，否则会变得太松而无法形成良好的连接。\n\
  \n在缝纫一段导电缝纫线时，要不断检查之前的针脚，使其绷紧，但不要拉扯面料导致变形。当项目完成并能正常工作后，稍微移动一下带有导电缝纫线的区域，以确保连接足够牢固，能够经受住活动。如果移动时连接时断时续，你可能需要将一些针脚拉得更紧一些。\n\
  \n更大的问题在于你是在连接一个电路，它比普通服装缝纫需要遵循更严格的规则。本节提出了一些值得遵循的良好实践方法。\n\n\n\n#### 避免短路\n\n为了避免短路（即导电缝线无意中形成电流通路），你需要规划好每一条导电缝线的缝制路径。这种缝线不像包覆绝缘层的导线那样具有绝缘性，因此如果衣服活动时它接触到另一条导电缝线，就会导致电路短路。\n\
  \n为你的导线和导电缝线布局绘制一张路线图，有助于消除项目中一些令人头疼的问题。`Fritzing`（第 5 章）在这方面非常有用，因为它使用简单，并能生成清晰、比例准确的示意图。你也可以徒手绘制电路计划，但这样容易遗漏细节，或画得模棱两可，之后才发现问题。无论采用哪种方式，最好在将各部分组装起来之前就做好规划，无论你是要焊接还是缝制。\n\
  \n> **注意**  \n> 要特别留意任何有方向性要求的连接（比如一般的 LED 灯，尤其是 NeoPixel 灯珠），它们在电路中只能单向工作。最好的情况是电路不工作，最坏的情况则可能烧毁元件。当你不得不拆掉缝线、更换已粘合或缝制的部件时，会非常令人沮丧且耗时。`Fritzing`\
  \ 图示既能节省时间，又能稳定情绪。\n\n#### 路由物理控制线\n\n如果你使用控制线来牵引某物（比如“鬼魅连衣裙”袖子中使用的钓鱼线），你同样需要管理好它的走线路径。显然，织物制成的物品在运动中可能会使连接松动，因此，在推拉服装的某个部分时，确保控制器、舵机和其他元件相对于其电气连接保持稳定至关重要。\n\
  \n绘制出线路的走线路线，能让你有机会真正思考哪些部件运动最频繁，以及你的元件和线路布局如何能最好地服务于项目，同时让穿着者感到最舒适。利用衬里或类似的轻质面料，你可以为线路制作线槽或通道，为元件制作口袋或绑带。\n\
  \n#### 导线 vs. 导电缝线\n\n如果你在面包板上搭建 Arduino 电路，你可能会使用绝缘导线。然而，可缝纫电路最简单的连接方式，可能是直接用导电缝线（通常是钢质）将它们缝到服装上。导线的柔韧性不如导电缝线，因此对于大多数服装而言，缝线是更好的选择。但某些连接确实需要焊接并进行绝缘处理。例如，对于导电缝线无法承载过大电流的电路，或者直接连接到电池（一旦短路会导致过大电流）的电路，最好使用绝缘导线。要时刻牢记连接点的位置、该区域的活动幅度，以及当电路在服装上运动时，短路是否会成为问题。\n\
  \n> **提示**  \n> 热熔胶枪对于加固和绝缘关键连接点非常实用。透明指甲油在固定导电缝线的线结以及为某些连接点提供额外保护方面效果很好，而且在狭小空间内使用起来比胶枪更方便。\n\
  \n#### 安装舵机\n\n将舵机（第 8 章）集成到可穿戴项目中会带来一些特殊问题。如果舵机在推拉某物，它必须牢固地固定在稳定的物体上。例如，正如本章前面所述，“鬼魅连衣裙”项目中的舵机被固定在夹克外侧的肩缝上，以营造些许蒸汽朋克风格。更复杂或更重的机构可能需要穿着者佩戴某种形式的背带或其他更结实的支撑结构。\n\
  \n#### 放置开关和传感器\n\n放置开关和传感器在很大程度上取决于具体项目（以及传感器类型）。第 8 章从电路原理的角度详细介绍了如何集成传感器或开关。从项目构建的角度来看，主要需要考虑的是，你安装传感器或开关的位置是否容易产生误读。\n\
  \n如果传感器是用来测量人体运动的，你可能不想把它安装在一件飘动的裙子上。我们在这里的基本建议是：仔细思考传感器所处的环境（运动、光线及其他可能相关的因素），然后确保其数据不会以某种方式被干扰。\n\
  \n如第 8 章所述，有许多不同的方式可以触发控制器上的某项功能。在紧要关头，处理器上的复位按钮也能胜任。然而，这个按钮很小，笨拙地摸索它可能会破坏你追求的效果。\n\
  \n#### 可变电阻元件\n\n有时你可能希望控制的对象不仅仅是简单的开关（开/关），或者需要根据模拟输入信号采取行动。一种实现方式相当复杂（就制作难度而言），即使用金属拉链作为分压器（参见第\
  \ 5 章关于分压器的讨论）。例如，你可能想制作一个打开时灯光会亮起的钱包；我们在这里提到它，是作为开关的另一种选择。当你拉开拉链时，可以安排控制电路中的电阻值发生变化。我们说它复杂，是因为要让其正常工作并实现可控，可能会非常棘手。\n\
  \n#### 光纤\n\n第 5 章在元件层面介绍了 LED 灯、特别是 NeoPixel 灯珠以及 EL 冷光线。但你可能希望被动地传输光——这时就需要用到光纤。\n\
  \n因为一所中学正在演出《小美人鱼》，我们正在寻找可以融入该剧的海洋生物主题项目。我们找到了[Linawassong 制作的光纤水母裙项目](http://www.instructables.com/id/Jellyfish-Skirt/)，并决定以此为基础创作一件水母服装。扮演水母的学生穿着这条裙子和一件黑色连体衣，走过昏暗的舞台。由于这套服装只打算在暗处穿着（由一名中学生穿着），所以我们把它做得比\
  \ Instructable 教程中那个精致的概念款更结实一些。这条裙子是用光纤、（大量）热熔胶、一条 NeoPixel 灯带、一条用于支撑所有元件重量的皮带、一块`Gemma`控制板、一个口红电池，以及一条剪成条状的雪纺外裙制成的。\n\
  \n它包含许多可以单独制作、最后再拼装起来的部件。因此，这是一个很适合让多个学生参与的项目，当我们把所有部件组装成成品时，大家兴奋不已。\n\n将光纤丝粘合在一起花费了很长时间，也用了大量的热熔胶。我们曾考虑过纯粹的机械连接方式，让裙子随着穿着者行走而脉动，但这被证明过于复杂，无法在演出前完成，而且实际上也并非必需，因为所有松散的纤维末端本来就会随风飘动。\n\
  \n\n\n## 穿戴科技\n\n学生戏剧社团是学术环境中可穿戴技术课程的自然合作伙伴。第一年我们很幸运，中学音乐剧（《小美人鱼》）恰好适合制作发光戏服。在构思项目时，我们刻意回避了一些可能引发问题的做法。因此，这些是我们有意规避、因而未曾遭遇的挑战。稍加思考，您或许能找到应对之策——此处我们按随机顺序列出这些注意事项，供您在制作戏服时参考（为简化操作，建议尽量避免）。\n\
  \n演员会出汗、使用发胶和化妆品，表演过程中还可能泼溅水花。所有这一切都需要在演出前和演出中做好预案。务必穿着戏服进行带妆彩排，确保不会干扰无线麦克风或其他舞台电子设备。对于需要多次穿着的戏服，建议将电路固定在无需频繁清洗的外衣上。\n\
  \n舞蹈环节的戏服存在特殊问题。舞者可能用较大力度相互接触，所有控制器、电池等必须安置在不会妨碍舞者（及其舞伴）动作的位置。沉重的硬件可能在跳跃或挥鞭转时脱落。相比之下，设计一只在水母剧中沿直线缓慢摆动的水母造型更容易实现。\n\
  \n最后，就像在房间里组装家具后才发现无法搬出门一样，人们很容易忽略演员需要穿脱戏服这个环节。这需要花些心思，合理设置搭扣和非导电闭合装置。\n\n即便如此，仍有人完成了令人惊叹的项目，尤其是\
  \ Lisia Trubat 的 E-traces 项目。她在芭蕾舞演员的足尖鞋上安装了 Lilypad 处理器（类似 Flora）和加速度计，并通过艺术作品捕捉舞者的动态（[`cargocollective.com/lesiatrubat/E-TRACES-memories-of-dance`](http://cargocollective.com/lesiatrubat/E-TRACES-memories-of-dance)）。\n\
  \n## 设计可测试项目\n\n可穿戴技术项目中，最令人头痛的问题之一是：需要同时确保多少环节正确无误才能让作品成功运作。您需要完成服饰/作品的实体组装、规划控制电路路径、搭建电路、编写代码等步骤。当项目出现问题时，如何避免陷入细节的泥潭？部分答案源于经验积累，但本节我们将探讨一些可能有所帮助的优秀设计实践。\n\
  \n首先，尝试将整个项目分解为若干子部件，特别是那些可以逐步测试的小组件。虽然有时无法实现，但请思考是否可能——例如，当您同时需要舵机和灯光时，可以先单独完成其中一项并测试，再添加另一项。对于代码部分，请保存迭代版本并建立清晰的命名规范。\n\
  \n举例来说，您可以将文件命名为`JoanProjectLightsWork.ino`并保存，然后将下一个版本重命名为`JoanProjectLightsServo.ino`继续开发。这样您总能回退到曾经可用的版本。保持计算机文件夹整洁大有裨益，提前创建\
  \ Fritzing 电路图并加以使用同样重要。若不仔细规划导电路径，很容易缝错方向或造成短路。\n\n切勿假定任何特定组件、USB 线或电脑端口必定正常工作。若某器件按您的理解应该正常运作却出现问题，请尝试更换易替换的部件。我们曾因劣质\
  \ USB 线（看似完好实则故障）浪费大量时间。本书前几章提供了调试各组件的方法，建议针对特定部件查阅相关章节。但总体原则是：永远不要假设任何部件必然正常。同时检查电池或其他电源是否输出正确电压并提供足够电流（参见第\
  \ 5 章）。\n\n同样，遇到故障时请保持系统化思维。每次只更改一个变量，而非同时调整五个参数，并保存每次修改的代码中间版本（使用清晰文件名和/或详尽注释）。若某功能曾正常工作突然失效，请仔细思考发生了什么变化。天气？震动？这些因素可能并非直接原因，但可能与问题存在关联。\n\
  \n最重要的是，当您百思不得其解时，请暂时离开项目，哪怕只有几分钟。返回后，尝试向他人描述项目，即使对方完全不懂电子或编程。有时仅仅通过向他人复述过程就能让您发现问题。即便无人可交流，也可以尝试“橡皮鸭调试法”——向一只橡皮鸭详细解释项目的运作原理，从而找出问题所在。\n\
  \n## 本章小结\n\n本章我们分析了首个过度雄心勃勃的可穿戴技术项目案例，并提炼出简化此类项目的方法。重点讨论了如何制作非电子部分的服饰，以便尽可能简化电路布局。我们还介绍了如何通过策略性口袋或肩垫将较重的组件整合到服饰中，以及避免短路的方法。本章既回顾了前几章组件级细节的要点，也引出了下章可供您自行尝试的示例项目。\n\
  \n"
- "# 11. 两个进阶项目\n\n至此，本书已探讨了时尚科技项目的不同方面。第 7 章引导您完成一个相对简单的项目，第 10 章则讲述了一个过于复杂的警示案例。本章提供两个具有挑战性但并非极难的项目，帮助您进一步拓展能力。\n\
  \n第一个项目涉及购买现成帽子，并进行中等复杂程度的电路连接和编程。第二个项目是较为复杂的缝纫项目，需要根据个人尺寸制作版型，涉及将电致发光（EL）线接入逆变器/充电器盒，无需任何编程。根据您对缝纫或编程的熟悉程度，可选择其中一个作为起点。如果您在授课，这两个项目可作为期末作业的两种模板，供学生自行选择方向。Joan\
  \ 和 Rich 将指导您完成帽子项目，Lyn 将带您完成连衣裙项目。\n\n## 摇头帽\n\n我们构思一个有趣的项目：利用现成服装而非从头制作，同时具备交互性和炫酷效果。于是摇头帽诞生了：当佩戴者左右摇头表示“不”（多数文化中如此）时，NeoPixel\
  \ 灯环亮起红色；当佩戴者上下点头表示“是”时，灯环亮起绿色。图 11-1 展示了制作完成的帽子。\n\n![A371637_1_En_11_Fig1_HTML.jpg](img/A371637_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1. 摇头帽（未点亮 NeoPixel 灯环状态）\n\n\n\n### 传感器\n\n本项目使用的传感器集成了三轴陀螺仪、加速度计和磁力计。这意味着它可以感知围绕三个相互垂直的任意轴线的旋转、当前任意方向上的转速变化，以及其绝对方向（若无其他干扰，即相对于北方的方向）。根据传感器的安装方式，这三种传感器中的任何一种都可被使用，但陀螺仪被证明是迄今为止最容易使用的，因为它无需将新数据与先前数据进行比较。我们对传感器的使用方式，并不依赖对传感器输出值的高度精确掌握，而是依靠感知服装是否在两个轴线之一（分别对应摇头“是”或“否”）上旋转。为了使本程序正常工作，传感器需要垂直放置于帽子的前部中心位置，如图\
  \ 11.1 和 11.2 所示。\n\n![A371637_1_En_11_Fig2_HTML.jpg](img/A371637_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11.2 传感器方向及帽子上的电路布局\n\n### 材料清单\n\n制作这顶帽子需要以下材料：\n\n*   一顶厚实的帆布或棉质帽子（非导电布料）。\n\
  *   一个 Adafruit 16 像素 NeoPixel 环（一条 16 个像素的灯带或数量更少的单个可缝制像素也可使用）。\n*   一块 Flora 微控制器板。\n\
  *   导电线材和一根针。\n*   普通（非导电）结实线材和一根针。\n*   用于连接 Flora 与电脑的 USB 线（用于上传程序）。\n*   一个\
  \ Flora 可缝制 LSM9DS0 加速度计、陀螺仪和磁力计九轴传感器。\n*   一个可插入 Flora（带 micro USB 输出口）并能提供 5V\
  \ 电压和至少 400mA 电流的电池。这里我们使用了一个小型扁平 micro USB 移动电源，但您也可以使用口红式 USB 电池（需要一根 USB 转 micro\
  \ USB 线）。\n\n**提示：** 有关此传感器的更多信息，请参阅 [`https://learn.adafruit.com/adafruit-lsm9ds0-accelerometer-gyro-magnetometer-9-dof-breakouts/pinouts`](https://learn.adafruit.com/adafruit-lsm9ds0-accelerometer-gyro-magnetometer-9-dof-breakouts/pinouts)。\n\
  \n### 制作电路\n\n这个可缝制传感器使用起来非常简单。但是，您需要将其按照图 11.2 所示的方向放置才能正常工作。`z` 轴标记应位于最低点，并且传感器在帽子上的位置应确保佩戴帽子时它处于垂直状态。图\
  \ 11.2 显示了缝制后的电路布局，图 11.3 给出了连接关系的 Fritzing 图。\n\n![A371637_1_En_11_Fig3_HTML.jpg](img/A371637_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11.3 帽子的 Fritzing 图\n\n首先，使用普通的非导电线，通过一些你不会用作电气连接的孔，将 Flora、NeoPixel 和陀螺仪缝到帽子上。您可以基于帽子哪里最容易缝制来决定具体位置。唯一关键的是保持陀螺仪的方向，使其在佩戴帽子时处于垂直状态，并且轴线标记（一个圆圈和字母\
  \ `Z`）在底部。\n\n为了制作电路（如图 11.3 的 Fritzing 图所示），请使用导电线材进行以下连接。请事先考虑清楚，查看图 11.2 和 Fritzing\
  \ 图，或许再用粉笔画出来，以确保没有交叉任何导线接头：\n\n*   Flora 上的 `Vbatt` 连接到 NeoPixel 环上的 `Vcc`\n* \
  \  Flora 上的 `D12` 连接到 NeoPixel 环上的 `IN`\n*   Flora 上的 `GND` 连接到陀螺仪上的 `gnd`\n*  \
  \ 陀螺仪上的 `gnd` 连接到 NeoPixel 环上的 `GND`\n*   Flora 上的 `SCL` 连接到陀螺仪上的 `SCL`\n*   Flora\
  \ 上的 `SDA` 连接到陀螺仪上的 `SDA`\n*   Flora 上的 `3.3 V` 连接到陀螺仪上的 `3 V`\n\n你这样连接电路，使得 Flora\
  \ 上的 `SCL`（串行时钟）和 `SDA`（串行数据）引脚接收来自陀螺仪的数据，Flora 处理这些数据，然后通过 `D12` 引脚向 NeoPixel 环发送关于像素应显示何种颜色的信号。实现此功能的\
  \ Arduino 程序如代码清单 11.1 所示。\n\n### 连接电池\n\n当您对电路的缝制情况满意后，在帽子上靠近 Flora 的位置打一个小孔，以便穿过电池盒的电源线——如果您使用的是那种类型的电池，则穿过\
  \ micro USB 端；如果您的电池盒带有那种类型的连接器，则穿过电源连接端（白色连接器）。\n\n根据帽子的不同，您需要想个办法（比如用胶带或者在帽子内侧缝个小口袋）将您选择的电池包固定在帽顶内部。此应用请务必使用结实的消费级电池，因为它们会经常被碰撞并顶到您的头部。\n\
  \n### 库文件\n\n这顶帽子需要 Adafruit NeoPixel、Adafruit LSM9DS0 和 Adafruit Unified Sensor\
  \ 库。和往常一样，前往 **Sketch** > **Include Libraries** > **Manage Libraries…** 并搜索库名称。请注意，通常搜索\
  \ `.h` 文件中的名称是行不通的；有时名称相同，但经常不同。\n\n**注意：** 本项目的并非所有库都支持 Gemma 板。您或许想尝试让这个项目更小巧，但用于该传感器的库并不支持\
  \ Gemma 板。\n\n```\n// This sketch reads the values from an LSM9DS0 Adafruit gyro\n\
  // and turns a NeoPixel ring green if there is rotation about the x axis (gyro[0])\n\
  // and red if there is rotation about the y axis (gyro[1])\n// Axes are relative\
  \ to the sensor board orientation, NOT gravity\n// i.e. relative and not absolute\
  \ orientation\n#include  // from \"Adafruit NeoPixel\" library\n#include   // from\
  \ \"Adafruit LSM9DS0 Library\"\n#include    // From \"Adafruit Unified Sensor\"\
  \ library\n#define SERIALDEBUG\n#define PIN 12       //output pin for NeoPixel controls\n\
  #define NUMPIXELS 16 //number of pixels in ring\n#define MAXBRIGHTNESS 30\nint delayval\
  \ = 200; // milliseconds between samples\nint gyro[] = {0, 0, 0};\nAdafruit_LSM9DS0\
  \ lsm = Adafruit_LSM9DS0();\nAdafruit_NeoPixel pixels = Adafruit_NeoPixel(NUMPIXELS,\
  \ PIN, NEO_GRB + NEO_KHZ800);\n//Adafruit sensor setup routine definition\nvoid\
  \ setupSensor() {\nlsm.setupAccel(lsm.LSM9DS0_ACCELRANGE_2G);   // set up accelerometer\n\
  lsm.setupMag(lsm.LSM9DS0_MAGGAIN_2GAUSS);    // set up magnetometer\nlsm.setupGyro(lsm.LSM9DS0_GYROSCALE_245DPS);\
  \ // set up gyro\n}\nvoid setup() {\nSerial.begin(9600);\npixels.begin(); // initialize\
  \ the NeoPixel object\nwhile (!lsm.begin()) { // blink red if sensor initialization\
  \ fails\nfor(int j = 0; j < 2; j++) {\nfor(uint16_t i = 0; i < NUMPIXELS; ++i)\n\
  pixels.setPixelColor(i, j * 10, 0, 0);\npixels.show();\ndelay(500);\n}\n}\nfor(int\
  \ i = 0; i < NUMPIXELS; ++i)\npixels.setPixelColor(i, 0, 0, 0);  // turn pixels\
  \ off\npixels.show();\n}// end setup\nvoid loop() {\nlsm.read();  // read the value\
  \ of the gyro\ngyro[0] = abs((int)lsm.gyroData.x / 1024);\ngyro[1] = abs((int)lsm.gyroData.y\
  \ / 1024);\ngyro[2] = abs((int)lsm.gyroData.z / 1024);\nfor(int i = 0; i < NUMPIXELS;\
  \ ++i)\npixels.setPixelColor(i,\nconstrain(gyro[1], 0, MAXBRIGHTNESS), //check one\
  \ axis for red\nconstrain(gyro[0], 0, MAXBRIGHTNESS), //check other axis for green\n\
  );\npixels.show();\ndelay(delayval);\n// Rest of the code puts out debugging values\
  \ to serial port\n#ifdef SERIALDEBUG\nSerial.print(\"Gyro X: \"); Serial.print(gyro[0]);\n\
  Serial.print(\"     Y: \"); Serial.print(gyro[1]);\nSerial.print(\"     Z: \");\
  \ Serial.println(gyro[2]);\n#endif\n} // end loop\n```\n\n代码清单 11.1 帽子程序\n\n\n\n\
  #### 加载代码与使用感应帽\n\n要将 Arduino 草稿代码上传到 Flora 板，请通过 USB 将 Flora 板连接到电脑并上传（参见第 6 章）。然后将其接入电池，并按下\
  \ Flora 板上的重置按钮。如果保持静止，你会看到它闪烁红色，然后熄灭。上下摇动时，NeoPixel 环应显示绿色灯光；左右摇动则应显示红色。如果你喜欢用单音节词回答问题，现在即使在房间另一头也能做到了！\n\
  \n## 发光 60 年代摩登连衣裙\n\n本章中的另一个项目采用了与第一个项目截然不同的方法。在这一部分，Lyn 将带你完成一个项目：根据她的规格制作纸样、缝制连衣裙，再添加一些电致发光（EL）丝带作为装饰效果。EL\
  \ 线（ [`https://en.wikipedia.org/wiki/Electroluminescent_wire`](https://en.wikipedia.org/wiki/Electroluminescent_wire)\
  \ ）是一种涂有磷光体的导线。通入交流电时，磷光体会发光。EL 丝带是 EL 线的扁平版本，适合附着在戏服上以产生发光效果。Lyn 首先会介绍设计的历史渊源，并讲解如何制作纸样以及为自己量体。接着，她会指导你如何缝制连衣裙并添加\
  \ EL 丝带。\n\n### 设计\n\n1965 年，伊夫·圣·罗兰设计了一系列连衣裙，采用 A 字版型，近乎无形状的宽松款式，以黑色线条分隔白色与三原色色块。这些连衣裙由羊毛针织布和厚重的丝绸制成，能够保持廓形而不紧贴穿着者身体。这一系列被称为“蒙德里安系列”——向现代艺术家皮特·蒙德里安以及整个现代艺术致敬。在\
  \ 20 世纪 60 年代的剩余时间里，这种造型的变体随处可见，并成为了那个时代的标志性风格。\n\n我不会使用羊毛或丝绸，连衣裙的剪裁会更宽松，领口也更舒适。我们会在保留原版连衣裙感觉的前提下，略微更新造型。这是一款极佳的\
  \ 20 世纪 60 年代风格戏服，属于中级缝纫项目。图 11-4 展示了制作完成的服装。\n\n![A371637_1_En_11_Fig4_HTML.jpg](img/A371637_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4. 制作完成的摩登连衣裙，EL 丝带已点亮\n\n这种款式的连衣裙有多款纸样可供选择，例如这款：[`https://betsyvintage.com/index.php?main_page=product_info&products_id=120`](https://betsyvintage.com/index.php%3Fmain_page=product_info%26products_id=120)。\n\
  \n### 材料与工具\n\n制作这条连衣裙，你需要以下物品：\n\n-   布料（此纸样仅适用于弹力针织面料——推荐面料包括双面针织布、哑光平纹针织布、含氨纶的面料、纯棉\
  \ T 恤面料）。\n-   缝纫线。\n-   直针/针插。\n-   剪刀。\n-   缝纫机。\n-   牛皮纸或纸样纸。\n-   裁缝粉笔或水消笔。\n\
  -   软尺。\n-   两段 EL 丝带（也称为 EL 胶带），每段长一米，两端各带一个连接器（大多数 EL 丝带两端各配有一个连接器）。\n-   两个用于\
  \ EL 丝带/胶带的逆变器/电池盒，额定功率至少能驱动 1 米 EL 胶带，这相当于 4 米 EL 线的功率。（如果产品描述中提到的是 EL 线的长度，请将该数字除以\
  \ 4 以获得胶带的额定值。）\n-   电池（通常为 AA 或 AAA 型）。\n-   从逆变器连接到 EL 丝带的公母连接器，其中一个连接器长度需足以从蓝色带子连接到上方的水平条。如果你的逆变器没有多个输出端口，你还需要一个能连接两条\
  \ EL 丝带的“Y”形连接器，除非你想用三个逆变器。（仔细检查你购买的 EL 丝带和电池/逆变器上的连接器，以确保买到正确的型号。）\n\n这款连衣裙是一款无袖、A\
  \ 字版型的套头衫，没有拉链或纽扣。因此，使用弹力针织面料至关重要。如果你使用的面料在横纹方向上的弹性低于 35%，你将无法穿上它（请咨询面料店的工作人员，或按此规格在线订购）。\n\
  \n我在原版设计和色彩的基础上进行发挥，使其成为我们自己的作品。我们将使用白色 EL 丝带来强调接缝，因此连衣裙上的线条将是白色的。EL 丝带将置于白色布料制成的通道内，这些通道将连衣裙上的色块分隔开。\n\
  \n我选择了红色、蓝色和黄色作为三原色，但你可以选择任何你喜欢的颜色。我还使用了黑色来制作后背、右前胸上部、左中躯干以及裙摆下部的部分。我增加了一条低腰线或臀围带，这样就能为驱动\
  \ EL 丝带的电子元件和电池制作口袋。\n\n为了使连衣裙可水洗，我用白色布料制作了通道。这样就能轻松地将 EL 丝带穿入或抽出。\n\n> **注意** \
  \ \n> EL 线和丝带会产生高频音调，这可能会让一些宠物和能听到此声音的人感到不适。为减轻此影响，请避免用一个电源驱动过多的线材。它们还可能产生射频干扰，因此不要在射频干扰可能造成问题的环境中使用，例如医疗设备或科学硬件附近。对于舞台应用，请在完整的彩排中仔细测试这一点（以及其他电子元件）。\n\
  \n### 测量尺寸与制作纸样\n\n首先你需要仔细测量自己的尺寸。图 11-4 是一张示意图，标示了你将要在以下步骤中使用的各个测量点。\n\n> **提示**\
  \  \n> 如果这些说明过于复杂，你也可以购买一件合身的纯黑色 A 字版型连衣裙，并通过折叠、熨烫边缘然后明缝的方式，添加一些这些部件。或者，你也可以直接将\
  \ EL 丝带添加到另一条连衣裙上，但你需要找个地方放置逆变器和电池（或者将它们固定在腰带上）。\n\n#### 连衣裙前片尺寸\n\n首先我们将测量连衣裙前片的所有尺寸。下一节将处理后片的尺寸。字母对应图\
  \ 11-4 上的标签。\n\n对于上胸部和过肩部分，测量从\n\n-   肩顶到胸围线上方（A 点到 B 点）。\n-   身体左侧（通常是一件略微宽松 T\
  \ 恤的侧缝位置）到左锁骨正下方（C 点到 D 点）。\n-   右侧缝到左锁骨正下方（D 点到 E 点）。\n\n对于中躯干部分，测量从\n\n-   胸围线上方到臀部（F\
  \ 点到 K 点）。\n-   侧缝处的左臀到左锁骨下方的臀围线（K 点到 N 点）。\n-   右侧缝与左侧测量值相接（另一侧的 K 点到 N 点）。\n\n\
  对于裙摆部分和低腰带，测量\n\n-   从臀围线到大腿中部（K 点到 Q 点）。\n-   测量臀围并加 3 英寸（作为缝份和宽松量，大约在图 11-5 中标为\
  \ P 的位置）。\n\n![A371637_1_En_11_Fig5_HTML.jpg](img/A371637_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 连衣裙前片的测量标签\n\n-   将前片和后片裙摆的底边宽度设为你想要的宽度。裁剪一块 4 英寸宽、长度等于此测量值的长方形布料，作为底边带（图\
  \ 11-5 中标为 S 的部分）。\n\n\n\n#### 裙身后片的尺寸测量\n\n裙身后片相当简单。实际上，你只需要一个尺寸：从后颈线到*大腿中部*（如图\
  \ 11-5 所示）。但需确保后片与前片的尺寸加起来，在穿着者身上能合身，因此要测量全身一圈，并检查所有裁片组合后是否合适（如图 11-6 所示）。如有疑问，不妨将尺寸做得稍大一些，后续可在试穿调整后再进行修剪。\n\
  \n![A371637_1_En_11_Fig6_HTML.jpg](img/A371637_1_En_11_Fig6_HTML.jpg)\n\n图 11-6.\n\
  \n裙身后片的测量标注。**提示**\n我购买了大约 1 码黑色布料、1/2 码红色布料、1/4 码蓝色布料、1/4 码黄色布料和 1/2 码白色布料。建议多买一些以防出错。\n\
  \n### 制作纸样\n\n完成上述所有测量后，请参照图 11-7 至 11-12 中的图示，将纸样画在屠夫纸或其他合适的纸张上。裁剪前，务必在纸上添加缝份（5/8\
  \ 英寸或 1 英寸，以方便操作为准），然后将纸样固定到布料上。请注意，前后片上的 A 和 B 标记在服装上并非对应同一点。\n\n![A371637_1_En_11_Fig7_HTML.jpg](img/A371637_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7.\n\n育克纸样：顶部裁片为黑色，底部裁片为蓝色。**提示**\n在将纸样裁剪到布料上之前，建议先在纸上剪下纸样，并尝试用胶带轻轻粘合，以查看效果是否满意。或者，你也可以先制作一个缩小版纸样（例如按\
  \ 1/12 比例）进行修改调整。有关纸样使用的详细说明，请参阅第 4 章。\n\n这件连衣裙的领口比图 11-4 所示的款式稍高。我这样设计，是让你可以选择保留相对保守的领口，或者将其修剪得稍微时髦一些。\n\
  \n**提示**\n除非另有说明，否则缝纫时务必将布料裁片正面相对进行珠针固定和缝制。所有超过 1/4 英寸的缝份都应进行修剪。\n\n![A371637_1_En_11_Fig8_HTML.jpg](img/A371637_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8.\n\n中身裁片：顶部裁片为红色，底部裁片为黑色。\n\n![A371637_1_En_11_Fig9_HTML.jpg](img/A371637_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9.\n\n用于制作放置电子设备口袋的低腰腰带纸样（蓝色）。\n\n![A371637_1_En_11_Fig10_HTML.jpg](img/A371637_1_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10.\n\n裙身纸样（黑色，将位于蓝色口袋腰带下方）。\n\n![A371637_1_En_11_Fig11_HTML.jpg](img/A371637_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11.\n\n下裙摆边条纸样（黄色）。\n\n测量后片时需特别注意几点。除图 11-12 所示尺寸外，还需测量后中至两侧缝的宽度（分别在后背中部和臀部位置测量）。在胸围线处为侧缝增加\
  \ 1 至 2 英寸，在臀围处为缝份和活动余量增加约 3 英寸。后片采用对折裁剪，因此没有后中缝。\n\n![A371637_1_En_11_Fig12_HTML.jpg](img/A371637_1_En_11_Fig12_HTML.jpg)\n\
  \n图 11-12.\n\n裙身后片纸样（黑色）。请注意，这里的 A 和 B 标记与前片不同。\n\n### 制作 EL 冷光线和导线的通道管\n\n裙子需要为三条\
  \ EL 冷光线制作三个通道管。不过，最简便的方法是在裙子接近组装完成时再测量这些通道管的长度，但请确保你已购买足够的布料来制作所有三个通道管。你可能还需要为从上部\
  \ EL 冷光线带到蓝色口袋中电池/逆变器的导线制作一个导管——或者你也可以采用其他方式管理这根导线，具体取决于你计划佩戴带有 EL 冷光带这件裙子的频率和时长。黑色通道管的其他替代方案可能仅是制作几个线圈来防止其过度移动（如我在本演示裙中所做），但导管会更为牢固。\n\
  \n### 整理裁片\n\n此时，你应该已经备齐裙子及 EL 冷光线通道管的所有裁片。图 11-13 以测试布局展示了主要裁片及其中一个通道管。请注意，靠近裙摆底部的蓝色条带将是一个缝在黑色条带上方的贴袋。换句话说，黑色条带的下方与黄色条带缝合，上方与红色和黑色部分缝合。蓝色条带将作为额外的双层布料覆盖其上，用作放置电池的口袋。如果这里有任何步骤不熟悉，建议你回顾第\
  \ 3 章和第 4 章。\n\n![A371637_1_En_11_Fig13_HTML.jpg](img/A371637_1_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13.\n\n裙身前片的布局。\n\n### 缝制前片\n\n对于上胸部（育克）裁片，将两片裁片沿前中缝用珠针固定，并使用平缝针迹缝合。修剪缝份并熨开。接下来，将中身裁片沿前中缝用珠针固定并缝合。修剪该缝份并熨开。\n\
  \n将育克上的垂直缝与中身裁片上的垂直缝对齐，然后沿水平缝用珠针将两者固定（正面相对）。检查垂直缝对齐后，裁片侧缝是否匹配。若需少量修剪，那是可以的。但如果侧缝因一片比另一片小而不对齐，则可能需要拆除其中一条垂直缝并重新缝制，或者将其中一片再收进一些——选择能使服装合身的方法即可。\n\
  \n在镜子前将裁片举在身前，检查是否合身。满意后，沿水平缝将育克部分与中身部分用珠针固定并缝合。修剪缝份并熨开。完成前片：沿水平缝线将前裙片与中身部分用珠针固定并缝合，一如既往地修剪缝份并熨开。在肩缝处将前片与后片用珠针固定并缝合。修剪缝份并熨开。\n\
  \n**注意**\n纸样中所示的领口远高于我们这里展示的演示裙款式。你可以从当前领口开始，如果想要更低的领口，随时可以修剪一些。为了裙子的稳定性，我们推荐使用较高的领口。\n\
  \n\n\n### 添加后片\n\n将前片与后片在侧缝处用珠针固定并缝合。你可能需要稍微拉伸布料，以使两侧沿整个侧缝线贴合。这是正常现象，当你自行设计和裁剪纸样时，这是可以预见的。注意不要过度拉伸布料，否则会扭曲裙子的形状。图\
  \ 11-14 展示了此步骤从反面观察的视图。\n\n![A371637_1_En_11_Fig14_HTML.jpg](img/A371637_1_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14.\n\n刚刚将后片与前片缝合后的样子（裙子处于反面状态）\n\n将底部的（黄色）布带用珠针固定并缝合，形成一个环状布片。修剪缝份并将其熨开。将布片对折，标记前中心线，该位置应位于你刚缝合的缝线的对侧。换句话说，黄色布带的缝线将位于后中心线处。将布带用珠针别在裙摆底部，从裙子后中心处的缝线开始对齐，并将前中心标记对准裙子的前中心。在将布带其余部分别到裙子上时，稍微抚平并拉伸布料。确保它看起来均匀，不要在某处拉伸过度或布料堆积。缝合这条缝线，修剪缝份并熨开。图\
  \ 11-15 显示了我们现在所处的位置，此时裙子是正面朝外的。\n\n![A371637_1_En_11_Fig15_HTML.jpg](img/A371637_1_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15.\n\n添加黄色布带后的组合状态\n\n### 低腰口袋\n\n将低腰腰带布片（蓝色）正面相对对折，缝合较短的缝线以形成一个环形布圈（如图\
  \ 11-16 所示）。将布料翻到正面，然后将布片纵向对折。按照与下裙布带相同的方法标记前中心线。将布带的折叠边用珠针别在裙子中段与裙摆相接的缝线上。从裙子的后中心与布带的缝线对齐开始，然后将裙子的前中心与布带的前中心对齐。\n\
  \n![A371637_1_En_11_Fig16_HTML.jpg](img/A371637_1_En_11_Fig16_HTML.jpg)\n\n图 11-16.\n\
  \n将作为电子元件口袋的蓝色布带别在黑色裙摆布带顶部\n\n继续均匀地将蓝色布带沿裙子整圈别好。将布带的底部沿裙摆整圈均匀地拉伸并贴合地别好。将布带底部缝合到裙摆上，确保它不产生褶皱或过度拉伸。在布带前部标记你想要的两个口袋开口位置，你将在此处分别插入电池/逆变器组。这两个区域将保持不缝合。沿布带顶部整圈缝合，留下口袋部分不缝（图\
  \ 11-17）。检查你手头的逆变器/电池组是否能放入口袋中（图 11-18）。\n\n![A371637_1_En_11_Fig18_HTML.jpg](img/A371637_1_En_11_Fig18_HTML.jpg)\n\
  \n图 11-18.\n\n检查电池组/逆变器是否能放入其口袋中\n\n![A371637_1_En_11_Fig17_HTML.jpg](img/A371637_1_En_11_Fig17_HTML.jpg)\n\
  \n图 11-17.\n\n缝合蓝色布带，为口袋留出开口\n\n### EL 电光带套管\n\n测量裙子前部的水平接缝（即育克与衣身连接处，以及衣身与裙摆连接处）。裁剪两条白色布料，宽\
  \ 3 英寸，长度比每条水平接缝长 2 英寸。\n\n接下来，测量从领口到低腰腰带顶部的纵向接缝。裁剪一块白色布料，宽 3 英寸，长度比这段纵向接缝长度长 2\
  \ 英寸。如果你需要为从上部 EL 电光带向下延伸到逆变器口袋的导线设置一个线槽，则再裁剪一块黑色布料，长度与纵向白色布料相同。\n\n对于每根 EL 电光带套管，将白色布料纵向对折并用珠针固定，然后在距边缘约\
  \ 1/4 英寸处缝合这道缝线。在套管一端使用一个安全别针，将套管翻到正面（图 11-19 和 11-20）。\n\n![A371637_1_En_11_Fig20_HTML.jpg](img/A371637_1_En_11_Fig20_HTML.jpg)\n\
  \n图 11-20.\n\n将 EL 电光带套管翻到正面\n\n![A371637_1_En_11_Fig19_HTML.jpg](img/A371637_1_En_11_Fig19_HTML.jpg)\n\
  \n图 11-19.\n\n制作 EL 电光带套管，用别针将其翻到正面\n\n将两个水平套管用珠针别在裙子前部的正确位置并缝合。缝线要非常靠近每条白色布条的两侧，保持两端开口。这将使你能够根据需要插入和取出\
  \ EL 电光带。\n\n将纵向套管用珠针别在前面并缝合，确保在每个水平白色布条的顶部停止缝合，并从水平布条的底部重新开始缝合。如果间隙过大，你可以用几针手缝将纵向布条固定在适当位置。\n\
  \n将电光带套管用珠针别在裙子上并缝合。每根套管的一端保持开放，用于插入导线。确保在套管交叉处保留开口。你可能需要调整导线以及你希望如何布置 EL 线的末端——当我为图\
  \ 11-21 拍照时，我以为我们会将导线放在一侧，但我改变了主意。你应该在决定黑色导线线槽的位置之前，先把整件裙子组装起来。在这个案例中，我发现红色布料比另一侧更具弹性，所以我希望将大部分电池重量置于弹性较小的一侧。\n\
  \n![A371637_1_En_11_Fig21_HTML.jpg](img/A371637_1_En_11_Fig21_HTML.jpg)\n\n图 11-21.\n\
  \n将电光带套管放置在裙子上并试验导线走线（最终我从另一侧走线） 注意\n\n这件由弹性布料制成的裙子存在一个问题，即难以保持色块平直。在每个步骤中仔细检查你的缝线是否笔直。\n\
  \n试穿裙子并标记你想要的下摆位置，或者如果裙子不太长，只需将其向内折边即可。用缝纫机或手工缝合下摆。如果布料不会脱丝，你可以直接在下摆线处裁剪。（如果你已按照说明将黄色布带纵向对折并缝合，则无需再缝下摆。）\n\
  \n将领口和袖窿向内折边 1/4 英寸（或者，如果你也想制作这些纸样部件，可以用贴边处理——参见第 4 章）。缝上一个黑色线槽或其他固定装置，用于固定上水平 EL\
  \ 电光带的电源线——请先查阅“收尾工作”一节，了解你可能需要参考的其他选择。\n\n\n\n### EL 彩带与礼服布线\n\n现在我们来准备 EL 彩带。你可以用剪刀裁剪\
  \ EL 彩带，但每段末端都需要有一个连接器，否则无法工作。以图 11-22 中的彩带为例，我将一根 1 米长的彩带剪成了两段（一段稍长于另一段），这对于两条水平带状装饰来说长度刚好合适。\n\
  \n![A371637_1_En_11_Fig22_HTML.jpg](img/A371637_1_En_11_Fig22_HTML.jpg)\n\n图 11-22.\
  \ 裁剪前的 EL 彩带\n\nEL 彩带需要逆变器和电池组来供电。你可以用图 11-23 所示的一个较大（4 节电池）电池组来驱动这样两条短彩带。通过一根 Y\
  \ 形连接线，一个电池组可以驱动两条彩带。这件礼服我用了两个这样的电池组。\n\n![A371637_1_En_11_Fig23_HTML.jpg](img/A371637_1_En_11_Fig23_HTML.jpg)\n\
  \n图 11-23. 所需的逆变器/电池组及连接线（带两个连接器）\n\nEL 彩带背面有一层带胶的离型纸，设计初衷是让你可以直接将其粘贴到需要照明的物体上。然而，这层离型纸并不牢固，因此建议将其撕掉，换上一层普通胶带。将彩带线的末端修剪得稍微圆润一些，以便更容易插入外壳中（图\
  \ 11-24）。最后，将 EL 彩带插入其外壳中（图 11-25）。\n\n![A371637_1_En_11_Fig25_HTML.jpg](img/A371637_1_En_11_Fig25_HTML.jpg)\n\
  \n图 11-25. 将 EL 彩带插入外壳\n\n![A371637_1_En_11_Fig24_HTML.jpg](img/A371637_1_En_11_Fig24_HTML.jpg)\n\
  \n图 11-24. 用胶带覆盖彩带的粘性面\n\n先将下方的水平 EL 彩带插入其外壳，最后再插入垂直的那条。注意不要缝合任何交叉处的外壳。将逆变器塞入礼服蓝色部分的口袋中（图\
  \ 11-26 和 11-27）。试穿礼服，观察各部分的下垂效果。\n\n![A371637_1_En_11_Fig27_HTML.jpg](img/A371637_1_En_11_Fig27_HTML.jpg)\n\
  \n图 11-27. 逆变器完全塞入前的状态\n\n![A371637_1_En_11_Fig26_HTML.jpg](img/A371637_1_En_11_Fig26_HTML.jpg)\n\
  \n图 11-26. 将一个逆变器连接到两条水平 EL 彩带上，另一个（在你的右侧）连接到垂直彩带上\n\n### 收尾工作\n\n此时，试穿礼服并轻轻活动。EL\
  \ 彩带容易从外壳中滑出，因此你可能需要缝上几个线圈来固定它。如果你需要大幅度活动，可能还需要为电源线缝制一个通道。当你对微调效果满意后，可以取下 EL 线并添加一个线管。或者，想出适合你的线材管理方案，但要记住线材不会拉伸，而礼服会。坐下时要小心！\n\
  \n如果这套服装仅用于一次戏剧演出，你可以只为线材缝几个线圈。操作时请关闭电源，并记住可能需要剪掉部分线材以便清洗衣物。清洗衣物前，请取下 EL 彩带和电源。\n\
  \n你可以添加按扣或其他闭合件，以防止装有逆变器的口袋敞开。\n\n### 药盒帽的制作\n\n这是我对标准 60 年代药盒帽的诠释，旨在与礼服搭配并相得益彰。按此方法制作的帽子直径为\
  \ 6.5 英寸（周长 20 英寸），高 2 英寸，如果你的头发较短，佩戴起来应该相当稳固。你需要以下材料：\n\n-   布料（使用礼服的剩余布料，或根据需求另购）。我使用了\
  \ 4.5 英寸 × 16 英寸的黑色布料，和 4.5 英寸 × 7 英寸的黄色布料，另外还需要一个直径 8.5 英寸的圆形布料来覆盖帽顶（布料要足够，以便留出边缘用胶带或胶水固定）。\n\
  -   一个直径 6.5 英寸的中等厚度圆形硬纸板，用作帽顶。\n-   一块 21 英寸 × 2 英寸的硬衬布，或一块 21 英寸 × 8 英寸的高强度衬布（折叠成\
  \ 21 英寸 × 2 英寸的条状）。注意，硬衬布是一种用于制帽的硬挺材料。请在网上或布料店寻找这种材料或高强度衬布。\n-   胶带、纺织胶水或热熔胶枪及胶棒。\n\
  -   缝纫机。\n-   手缝针和线。\n-   强力剪刀。\n-   直尺和卷尺。\n-   铅笔或记号笔。\n\n#### 裁剪部件\n\n我用一个直径\
  \ 6.5 英寸的圆形作为帽顶。在硬纸板上画出帽顶圆形并用剪刀剪下。剪一块比帽顶圆形大 2 英寸的圆形布料。为使布料整齐贴合，在布料圆形边缘的几处剪几个小口，然后将它们重叠在基底材料圆形的背面（图\
  \ 11-28）。用胶水或胶带固定，并晾干（如果用胶水的话）。如果你使用的是硬衬布，也可以用缝纫代替。不要尝试缝纫硬纸板。\n\n![A371637_1_En_11_Fig28_HTML.jpg](img/A371637_1_En_11_Fig28_HTML.jpg)\n\
  \n图 11-28. 修剪帽子顶部布料的边缘\n\n裁剪一条 21 英寸 × 2 英寸的硬衬布条，以制成 2 英寸高的帽子。我需要 4.5 英寸 × 16 英寸的黑色布料条，和\
  \ 4.5 英寸 × 7 英寸的黄色布料条。这样帽子将有四分之一是黄色的，形成一个鲜明的时尚声明，通过黄色点缀将礼服和帽子联系起来。\n\n#### 组装帽子\n\
  \n将帽子侧面的黄色和黑色部分缝合在一起，并熨平接缝。拿起硬衬布条，或将衬布折叠成条状并别针固定，如图 11-29 所示。将布料覆盖在布条上并别针固定。如果使用衬布，在布料覆盖上去别针的同时，取下衬布上的别针（图\
  \ 11-30）。沿帽子内侧手缝接缝。\n\n![A371637_1_En_11_Fig30_HTML.jpg](img/A371637_1_En_11_Fig30_HTML.jpg)\n\
  \n图 11-30. 继续组装帽子侧面\n\n![A371637_1_En_11_Fig29_HTML.jpg](img/A371637_1_En_11_Fig29_HTML.jpg)\n\
  \n图 11-29. 组装帽子侧面\n\n最后，将帽子顶部手缝到侧面，并缝合侧边接缝（图 11-31）。现在，你就拥有了一顶药盒帽（图 11-32）！\n\n\
  ![A371637_1_En_11_Fig32_HTML.jpg](img/A371637_1_En_11_Fig32_HTML.jpg)\n\n图 11-32.\
  \ 制作完成的帽子\n\n![A371637_1_En_11_Fig31_HTML.jpg](img/A371637_1_En_11_Fig31_HTML.jpg)\n\
  \n图 11-31. 连接帽子的顶部和侧面\n\n### 其他方案\n\n完整的套装如图 11-33 所示。你可以看到，礼服的电子设备重量使其有些下垂。你可以考虑另一种设计，将电池放在\
  \ 20 世纪 60 年代流行的摩登风格腰带中，或者通过在从肩膀到蓝色低腰腰带的几个关键位置添加硬衬布条来加固礼服，以防止下垂。你也可以将前片做成一体式，然后将彩色面料块缝在上面。线材管理是此设计的一个挑战，你应多尝试几种方法，找到在礼服垂坠感、EL\
  \ 彩带硬度和电池组重量之间取得最佳平衡的方案。\n\n![A371637_1_En_11_Fig33_HTML.jpg](img/A371637_1_En_11_Fig33_HTML.jpg)\n\
  \n图 11-33. 整体效果\n\n## 总结\n\n本章介绍了两个截然不同的最终项目：一个使用现成的帽子并添加了一些电子元件，另一个则无需任何编程，但需要一些精巧的缝纫技艺。这两个项目的意图是涵盖你在本书中学到的关于构造技术的应用。最后几章将回顾你可能考虑探索的其他技术，并对未来的发展进行一些展望。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n"
