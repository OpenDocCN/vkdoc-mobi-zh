- '# 第一部分


  宏观视角


  前两章为打造优秀的戏服（或其他服装）设计提供了一些背景知识。第 1 章介绍了时尚科技，并简要说明了本书其余部分的编排方式。第 2 章则聚焦于优秀戏服的构成要素，并提出了在服装设计中值得思考的一些方面。


  '
- '# 1. 时尚科技


  *电子补充材料* 本章的在线版本（doi:[10.1007/978-1-4842-1662-0_1](http://dx.doi.org/10.1007/978-1-4842-1662-0_1)）包含仅供授权用户使用的补充材料。


  时尚科技是一个跨学科领域，它将传统时尚与纺织品同现代电子技术、软件及其他技术相融合。在本书中，我们认为时尚科技指的是那些包含电子元件的互动式服装或配饰，或是利用
  3D 打印等数字制造技术创作的作品。得益于电子制造领域的进步，计算机、传感器以及可嵌入日常物品的发光元件的成本得以降低，这类技术直到最近才在消费级层面普及。本章将介绍时尚科技，并讲述如何利用本书开启这一新兴领域的实践之旅。


  ## 时尚科技简史


  自古以来，制作衣物以抵御恶劣天气一直是技术发展的灵感源泉。工具从用于在皮革上打孔的骨锥，发展到用于纺纱的纺锤，再到能够以工业规模生产大量布料的织机。图 1-1
  展示了一张 1875 年的立体照片，拍摄的是阿莫斯基格（新罕布什尔州）方格花布厂的织布车间。（这张立体图像在 [`stereo.nypl.org/view/14480`](http://stereo.nypl.org/view/14480)
  上还有动画版本。）


  ![A371637_1_En_1_Fig1_HTML.jpg](img/A371637_1_En_1_Fig1_HTML.jpg)


  **图 1-1.** 约 1875 年的织布场景。图片来自纽约公共图书馆（ [`digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99`](http://digitalcollections.nypl.org/items/510d47e1-7c18-a3d9-e040-e00a18064a99)
  ）


  对制作精美图案织物的渴望，促成了 1801 年提花织机的诞生。织布工制作了打有孔的卡片，这些卡片通过一个精巧的轻张力弹簧与金属线系统，控制着织机所织出的图案。这使得诸如锦缎等极为复杂的图案得以自动生成。


  然而，用于窗帘和婚纱的华丽织物并非故事的全部。英国数学家兼发明家查尔斯·巴贝奇看到了提花织机的穿孔卡片，并思考是否可以用类似的系统来制造一种更通用的、用于解决数学问题的计算器，他称之为分析机。


  巴贝奇于 1837 年首次描述了这台机器；但这台完整的机器实际上从未被制造出来（ [`en.wikipedia.org/wiki/Analytical_Engine`](https://en.wikipedia.org/wiki/Analytical_Engine)
  ）。尽管如此，巴贝奇仍被广泛认为是通用计算机的发明者，而其穿孔卡片的后续形式一直使用到 20 世纪 70 年代。因此，计算机诞生于维多利亚时代的时尚科技之中！


  **提示** 如果你对纺织技术的历史感兴趣，可以访问 [www.cs.arizona.edu/patterns/weaving/index.html](http://www.cs.arizona.edu/patterns/weaving/index.html)
  这个网站，那里有一个令人惊叹的历史档案库，包含许多插图和原始文献。更具体地说，如果你想要下载一本关于如何为提花织机制作卡片的维多利亚时代书籍，E. A. 波塞尔特的《提花织机分析与解读》（Posselt,
  1893）现已进入公共领域，可从 Hathi Trust 数字图书馆获取，网址为 [`hdl.handle.net/2027/gri.ark:/13960/t26b0d33d`](http://hdl.handle.net/2027/gri.ark:/13960/t26b0d33d)。


  20 世纪 50 年代末集成电路的问世及其快速发展，现已带来价格低廉、大小与硬币相当的计算机。已故的戈登·摩尔在 1965 年预测，基于技术进步，计算机芯片的性能大约每两年翻一番；这条后来被称为“摩尔定律”的预测（迄今为止）惊人地准确。这意味着，20
  世纪 80 年代初期的超级计算机，其性能已被 2016 年那些仅几英寸见方、售价 5 美元的单板计算机所超越。


  其他数字电子产品也紧随其后，为智能手机、相机及其他设备开发的微型处理器和传感器，如今使得将相当于 20 世纪 80 年代需要专人维护的处理能力，不显眼地集成到一顶帽子或一条围裙中成为可能。从提花织机开始，这一发展经历了一个循环，如今将电路编织进衣物中已成为现实。（我们将在第
  13 章讨论谷歌的 Project Jacquard。）


  能够接触到廉价、易编程的电子产品还带来了另一个副作用：基于机器人的消费产品兴起，例如低成本消费级 3D 打印机和电脑化的家用缝纫机。3D 打印机反过来使得快速、低成本地制作实体物体原型变得容易，并正引领着更多创新。功能丰富的家用缝纫机能够完成复杂的项目，而这些项目在过去对于业余爱好者来说可能过于繁重。


  总而言之，你可以利用一系列令人惊叹的技术来制作酷炫的项目。在本书中，我们聚焦于将数字电子技术及相关技术（例如 3D 打印）应用于时尚领域，例如制作戏服和其他互动式可穿戴作品。




  ## 戏服制作


  如今，在家中制作更精致、更专业的戏服已成为可能。因此，角色扮演——装扮并扮演喜爱的虚构人物——已然成为一种亚文化现象（最初在日本兴起，并迅速传播到美国及其他地区），这并不令人惊讶。科幻及其他类型的展会活动上，经常有粉丝身着戏服扮演自己钟爱的角色。动漫和电子游戏角色是热门主题。有鉴于此，许多场合都需要营造出超脱尘世的效果，而本书中介绍的技术，或许正是将角色扮演戏服提升到新高度的关键。


  历史戏服一直很受欢迎。文艺复兴博览会（[`www.renfaire.com`](http://www.renfaire.com)）普及了对伊丽莎白时代晚期活动的历史重演，以及装扮成那个时代的人物。可见的电子设备可能会显得与角色不符，但你手臂上可能有一条眼睛发光的龙，或者一个会朝向光线的头。


  你阅读本书，可能是为了寻找增强戏剧效果戏服的灵感，无论是用于学校演出（正如琳在本章后面所谈到的），还是用于专业用途。在学校层面，戏服可能需要预算低廉、快速组装，并且对于一个患有舞台恐惧症的十岁孩子来说，穿脱要方便。一些由电子技术驱动的战略性特效，能让一套戏服令人难忘。例如，琳和她的学生们为了《小美人鱼》的演出，为鱼添加了可编程的发光眼睛。


  最后，还有用于派对、节日等场合的普通装扮戏服。图 1-2 展示了定制的、真空成型（第 13 章）的塑料盔甲在盒子里的样子，而在图 1-3 中，它短暂地将里奇爵士变身为他真正的游侠骑士身份。


  ![A371637_1_En_1_Fig3_HTML.jpg](img/A371637_1_En_1_Fig3_HTML.jpg)


  图 1-3. 盔甲穿在我们的骑士作者身上


  ![A371637_1_En_1_Fig2_HTML.jpg](img/A371637_1_En_1_Fig2_HTML.jpg)


  图 1-2. 盒子里的塑料盔甲


  一些戏服元素，比如面具（图 1-4）或某个时代的服装，能将人带到另一个时空。如果你已经有了奇幻戏服，何不将它混搭起来，使其具有互动性呢？（盔甲和面具由加利福尼亚州圣莫尼卡的
  Make Believe 公司提供；我们将在第 2 章中进一步讨论。）


  ![A371637_1_En_1_Fig4_HTML.jpg](img/A371637_1_En_1_Fig4_HTML.jpg)


  图 1-4. 面具


  也许你并非要制作一件戏服本身，而是想做些有实用功能的东西——比如在黑暗中能自动亮起作为小夜灯的墙饰，或者在包里布置一些巧妙的 LED 灯，以便在晚上能找到钥匙。


  我们想表达的核心观点是，应用本书技术的第一步，是思考你要做什么以及你希望它看起来是什么样。人们常常一开始就为了技术本身而想使用某项技术，但结果往往不尽如人意。仅仅因为有可能制作一件互动服装或艺术品，你就应该这么做吗？


  如果你正在阅读本书，你可能正打算制作像我们刚才描述的那些戏服。或者，你可能是被要求为高中生或大学生开发一门课程。如果你是老师或家长，时尚科技项目可以是一个很好的方式，去说服那些原本可能对电子或编程望而却步的学生，让他们在最终产品的激励下，尝试一下这些领域。


  ## 我们的设计理念


  我们三人（琼、里奇和琳）是从截然不同的方向进入这个领域的。里奇是千禧一代，从小就开始设计电子项目（包括当今消费级 3D 打印机的前身之一，以及一款精巧的小型 3D
  打印机，里奇和琼曾任职的公司至今仍在销售它——你可以在第 9 章看到它）。他喜欢为了创造而创造，这是通常对黑客的定义。（在我们所处的圈子里，黑客并没有负面含义。那些利用技能做坏事的人被称为黑帽黑客）。里奇非常注重细节，对本书中涉及的硬件和软件拥有百科全书般的知识。


  琼则是前火箭科学家转型而来，她的角色是把握全局，并思考如何避免在任何一个技术领域陷入过多的细节。她曾参与其他行星的航天器项目，在那里一个微小的错误都可能导致灾难。因此，她带来了处理复杂系统的结构化方法和经验，同时也希望将解释尽可能简化（同时保持正确性）。


  琳则拥有多年为初中和高中演出制作戏服的丰富经验。除了似乎能凭空（以及一堆布料）变出戏服的能力之外，她还有幽默感，并且对于什么小细节可能带来天壤之别有着敏锐的眼光。她还在课堂上教授过缝纫，因此了解可能出现的各种陷阱。


  我们三人轮流引导你阅读本书，并且在本书的大部分内容中，当聚焦于某一个人的特定专长时，我们会切换成第一人称。有时我们合作得过于紧密，以至于无法由某一个人来主导，这时（就像此处这样）我们就会使用“我们”。


  我们在此介绍我们的背景（本书前面的“作者简介”部分还有更多内容），是因为我们建议你组建一个团队来完成你的第一个项目，这个团队应具备所有这些方面的能力，尽管不一定像我们三人这样恰好分布在团队中。良好的默契和幽默感对于一个团队来说也非常重要。有时候事情看起来就是很傻，你必须笑一笑，找出哪里出了问题，并且不再重蹈覆辙。其他时候，你可能需要让你团队中的某个成员独自在角落里尝试一段时间。但是，如果我们中的任何一个人卡住了，我们发现向其他人清晰地阐述问题非常有价值，这样我们就可以回到基本原理，思考我们最初想要达成什么目标。


  ## 规划你的项目


  市面上有许多书籍涵盖了制作时尚科技项目的不同方面，互联网上也有很多你可以尝试的项目。我们感觉缺少一条循序渐进的路径，从缝纫基础，再加上电子硬件和软件开始，以便让那些对所需技能知之甚少的人也能开始项目制作。


  我们始终强调系统设计的概念。很容易为项目的某个部分想出一个绝妙的主意，但如果你不考虑它要整合到可穿戴物品中，而以孤立的方式去做那个部分，那么最终的做法可能与你开始将其整合到连衣裙或帽子中时应采取的方式大相径庭。我们无论如何强调提前端到端地规划一个复杂项目的必要性都不为过。第
  10 章讲述了我们共同完成的第一个项目的故事，在那个项目中，我们很大程度上忽略了这一原则——尽管我们三人都知道不应该这样。


  在本书中，我们将涵盖缝纫（包括制作和使用纸样）、创建电子电路以及编程的基础知识。这些是大多数时尚科技项目的核心技能，我们会对每一项进行相当深入的探讨。我们按照你最有可能创建项目的顺序来安排章节：先缝纫，然后设计电路，最后（如果需要的话）进行编程。我们将指导你如何管理项目中的复杂性，并为你提供技巧，帮助你在项目遇到问题时避免不知所措。




  ### 穿戴者的环境


  如第 2 章所述，你还需要深入思考穿戴者将要做什么，以及他们在穿着服装时所处的环境。例如，本书中的项目都设计为在干燥的室内环境中穿着。尽管其中有一个围裙项目，但我们设想它更多是用于在派对上端菜时给朋友留下深刻印象，而不是在烹饪或手湿时使用。


  ### 原型制作与测试


  在规划项目时，要思考在项目开发中的哪些环节可以拼凑出迷你原型。对于缝纫部分，你可以制作一个白坯样衣——用非常便宜的布料制作的项目版本，这样即使需要拆线和反复重缝也不会心疼。在制作电子部分时，你最初可以使用鳄鱼夹（用于临时连接电路的夹子）来搭建一个最终要用导电线缝制的电路。而在编程时，则应当考虑如何创建一些简单的阶梯式项目，逐步构建最终功能。随着本书的深入，我们会介绍这些技巧。当你构思想要实现的目标时，考虑如何让部分功能可以独立测试，这样就不会最终陷入一个可能存在多重交互问题的复杂项目。


  但最重要的是，先确定你想要服装是什么样子，然后再添加技术或动画元素。接下来，林将分享她的一些最佳创作经验。


  ### 林的服装故事


  在我参与过的每一部作品中，似乎总有一两套服装很难做到位。要么概念过于抽象难以理解或完善，要么试穿过程麻烦重重，要么遭遇各种其他问题。为《康尼岛的圣诞节》制作火鸡服装时就遇到了这种情况。


  这部作品中的一些服装尤其具有挑战性，因为故事背景设定在 20 世纪 30 年代的布朗克斯区。剧中还有一出戏中戏，其中的服装应该看起来像是大萧条时期纽约的孩子们和他们的父母手工制作的。我想要一种俗气的效果，特别是对于出现在感恩节庆典场景中的那只火鸡。我们找到的大多数服装都过于现代化了。那个时代的色彩不应如此鲜艳和霓虹，我希望面料的外观能具有真实感。


  在与导演进行大量头脑风暴后，我在网上购买了一套火鸡服装。收到后，我拿起剪刀就动手了。我剪掉了袖子，并修剪了上衣的大部分前片和后片。这样我就可以让女演员穿上肩带或背带。服装的下半身是填充的，这部分我想保留下来。我没有使用腿部套，因为她要把它穿在裙子外面。


  当我对整体服装的造型感到满意后，我开始用卷曲的彩色纸条覆盖下半部分来表现羽毛。我使用柔和的棕色、橙色和黄色纸条，将它们绕在铅笔上卷曲，然后成排地粘在火鸡身体上。服装的尾部形状很漂亮，所以我只是用彩色纸羽毛覆盖了它，这是我最喜欢的部分（图
  1-5）。


  ![A371637_1_En_1_Fig5_HTML.jpg](img/A371637_1_En_1_Fig5_HTML.jpg)


  **图 1-5.** 彩色纸火鸡尾部特写


  卷曲和粘贴纸羽毛非常耗时且有点繁琐，但我对最终的效果很满意。至于肉垂和喙，我剪了两张相应形状的彩色纸，用双面胶将它们固定在女演员的脸上。


  我还将卷曲的彩色纸羽毛用于天使加百列的翅膀。从硬纸板上裁剪出翅膀形状，覆盖上白色羽毛，绑在演员背上，并确保他侧身通过门口，这是这套服装成功且迷人的解决方案。大多数时候我都是用布料来制作和修改服装，所以这部作品让我耳目一新，回归了本源。


  就探索疯狂古怪想法的自由度而言，《绿野仙踪》的制作可能是我最喜欢的作品。导演、另一位服装师和我花了很多时间琢磨一些与常规版本略有不同的角色方案。我们让邪恶女巫穿着滑雪靴站在一个由她的飞猴拉动的滚动平台上。这样她可以不用走路就移动，并以一种非常威胁的方式前倾。为了让她在舞台上熔化，我们在她的女巫裙子下面加了一条裙撑，她可以慢慢扭动，蹲得非常低，缩成一团，留下中间凹陷的裙撑站立着。


  飞猴们穿着染成棕色的保暖内衣，上面缝着毛茸茸的斑块和尾巴。铁皮人有金属烟囱管做的胳膊和腿，胆小狮的鬃毛是用拖把头做的。芒奇金人是最有趣的创作。我在一家廉价商店找到了一些非常难看且色彩鲜艳的扎染连体衣。然后我使用了亮色的普通舞蹈紧身裤，在里面塞满棉絮，为每位演员将两对扭在一起，固定在他们的头上。当房子降落在奥兹国时，藏起来的芒奇金人看起来就像一片奇奇怪怪的根茎。


  经过多年的服装制作经验，我发现通常在制作初期看似失败的作品，到了首演之夜反而会成为最好的——至少是评论最多的。在任何演出中，我最喜欢的时刻就是与制作团队在初期进行头脑风暴、探索和实验。发散思维，收集新意见和不同观点，这令人无比振奋。


  **注**


  阅读林的故事时，有几件事可能会引起你的注意。其一，听起来很有趣。好的设计不能太严肃。要充满玩心，尝试一些不协调的东西。这不是我们在书中能教会你的技能，但我们会在书中不时穿插一些像林这样的侧边栏，为你提供成功实践的范例。第
  2 章会深入探讨什么构成一件好的服装，并对类似林刚刚分享的那些经验进行解构。


  ## 总结


  在本章中，我们定义了时尚科技，并简要介绍了构成这一跨学科领域的交叉领域的历史。接着，我们介绍了可能应用这些技术的不同服装制作场景。我们讨论了如何使用本书，并阐述了我们的设计理念。我们还列举了几个关于优秀服装的案例研究，这些服装明显是低技术含量的，目的是为了说明：好的服装本身就会大放异彩，而设计是一个好项目中最核心的要素。在下一章中，我们将更广泛地讨论什么构成一件好的服装。




  '
- "# 2. 实践性戏服设计\n\n本书中，我们带你涉猎诸多领域：缝纫、制版、电子技术和计算机编程。然而对许多读者而言，核心目标仍是制作一件可穿着的戏服。人们自古便有装扮与假面狂欢的传统，而近年来**角色扮演**（Cosplay）愈发流行。这一为爱好者催生无数展会的活动，大致可定义为将自己装扮成电影、电子游戏或其他故事中最喜爱的角色（有时细节惊人）。Cosplayer\
  \ 也可能从某种风格出发（比如**蒸汽朋克**——维多利亚服饰与准时代机械装饰的混搭），在此基础上进行创作。\n\n技能固然重要，但明确最终作品的用途同样关键。若你以此书作为教授这些技能的课程基础，那么每个项目都可以是小练习，最终累积成一件可供穿着或悬挂展示的毕业作品。\n\
  \n然而，若你阅读此书是为了为自己或本地剧团制作戏服，就需要深入思考设计问题：什么才算一件好戏服？**Lyn** 已从事戏服创作多年，下一节便是她经验的凝练。她与\
  \ **Joan** 还曾与加利福尼亚州圣莫尼卡一家专业戏服制作租赁店的历任及现任老板交流，听取他们对好戏服的定义。\n\n## 何为戏服？\n\n戏服不仅表演艺术中举足轻重，在我们的日常生活中亦意义重大。你选择穿什么、何时穿，都会向家人朋友透露关于你心情或去向的诸多细节。这些选择定义了我们如何向世界呈现自我。无论是高级定制时装、运动装，还是古怪混搭，我们的穿着都在宣告我们是谁、想成为谁，以及希望世界如何看待我们。一件好戏服能在角色开口前，便向观众揭示其本质。\n\
  \n### 戏服设计的力量\n\n戏服能以微妙的方式抓住观众，使其沉浸于故事，也可能分散观众对情节的注意力。Cosplay 戏服通常高度特定于某些角色，但也可用于引入新角色或新概念。\n\
  \n角色、社会地位和时代背景共同定义了戏服的样貌。戏服是为男人、女人、动物、外星人，还是这些元素的组合？正在创造的是何种类型的角色？此角色与他人有何异同？角色的年龄及所处时代？角色穿着此戏服需进行多少体力活动？戏服是用于戏剧或故事中的写实表现，还是夸张或风格化的表演？\n\
  \n戏服师与设计师必须研究历史上各阶级、各性别的着装方式。历史上，人们的性别曾通过着装被清晰区分。但在当今世界，一切皆有可能。男女选择相同的单品、色彩与风格。几乎一切都被接纳，并被尝试。\n\
  \n戏服可将角色设定于特定历史时期、特定地点和特定国家。多数时代都有非常明确的视觉风格、形态与轮廓，戏服也可能展现角色所处的气候或季节。\n\n角色的着装方式可能揭示其本质，或展现其希望被人看待的形象——这或许与其真实本性相反。一个反派角色可能试图表现得朴实诚实；而一个温顺害羞的人或许会假装酷炫新潮。想想《天鹅湖》中的奥德特与奥黛尔——善与恶的天鹅，通常由同一人扮演，但通过白色与黑色芭蕾舞裙的切换来区分。同样，经典西部片中白色或黑色牛仔帽，被用作\"\
  好人\"与\"坏人\"的速写符号。当然，还有达斯·维达与卢克·天行者的对比。\n\n### Lyn 的学生戏剧戏服制作贴士\n\n若你身处学校戏剧系，很可能还会面临时间与成本限制，或许需要一人制作、修改或调整多件戏服（如图\
  \ 2-1 中我正在做的）。无论你拥有何种资源来制作戏服，关键在于从清晰的概念出发：这件戏服试图传达什么。\n\n![A371637_1_En_2_Fig1_HTML.jpg](img/A371637_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1. Lyn 正在制作学校音乐剧戏服\n\n我常依靠家长的捐赠，并大量光顾二手店，来为整部演出完成戏服设计。为连衣裙或长袍添加镶边或其他饰物，创造出完全不同的外观，相当容易且乐趣十足。我在图\
  \ 2-1 中正在处理的是一件二手丝绒长袍，我为《科尼岛圣诞节》中的圣诞老人角色缝制了一条金色花环作为饰边。\n\n我最满意的一些戏服，正是那些我不得不拆解并重塑为新作品的旧衣。我曾用一件\
  \ 1950 年代的粉色舞会礼服，为《绿野仙踪》中的好女巫格林达添加了大量蕾丝和褶边。对于西方坏女巫，我则用了一件 1960 年代的黑色塔夫绸鸡尾酒裙，拆掉华丽部分，加上了橡胶蛇、蜘蛛和其他邪恶元素。我认为这两件是我最钟爱的创作之一。可惜它们被借出几次后便一去不返……深深叹息。\n\
  \n用有限的预算完成整部演出的戏服是可行的。只需要一些规划与劳作，但成果可能相当惊艳且令人满足，尤其当学生们参与头脑风暴、裁剪与缝纫时。\n\n从头开始打造一件戏服也充满乐趣。我最爱的几件包括：为《单身公寓》制作的两件\
  \ 1960 年代 **崔姬**风格波点连衣裙、《该死的美国佬》中洛拉的戏服、《万事皆可》中的几套 1940 年代踢踏舞裤装，以及为《科尼岛圣诞节》制作的一只火鸡。\n\
  \n拿起一件衣服，把它变成与原本截然不同的东西。让你的大脑自由探索。大胆勇敢地做出选择。有时会失败，但另一些时候则惊艳无比。我从每件修改或创作的作品中都学到了很多，尤其是那些出了状况、结果不尽如人意的作品。\n\
  \n\n\n## 戏服设计原则\n\n当被问及“什么才是一套好戏服”时，塔妮莎·法切特迅速答道：必须让人一眼就能看出穿着者扮演的是什么角色。塔妮莎刚刚接手了位于洛杉矶附近圣莫尼卡的`Make\
  \ Believe`（[`www.makebelieveinccostumes.com`](http://www.makebelieveinccostumes.com)）戏服制作与租赁店。\n\
  \n`Make Believe` 成立于 20 世纪 80 年代初期，最初是为附近一家剧院服务的准专属戏服部门。创始人`道格·斯佩瑟特`和`露丝·塔利`将业务发展至今，据塔妮莎估计，库存已有数千套戏服（如图\
  \ 2-2 所示）。\n\n![A371637_1_En_2_Fig2_HTML.jpg](img/A371637_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2.** 专业戏服库存\n\n创始人`露丝·塔利`最近退休了，但她很慷慨地给林发来了她眼中优秀舞台戏服的一些关键标准。她的要点如下：\n\n-\
  \   “戏服只有作为布景、灯光、化妆、发型、道具等整体设计的一部分时才会出彩。当所有元素融为一体，那便是魔法。戏服必须符合时代背景，并且在此基础上适合演员。如果演员穿上后显得滑稽，我有时也会在历史准确性上‘耍点小聪明’。比如裙撑得收一点，或者护裆别那么厚实，或者把无数纽扣用魔术贴固定，方便穿脱。”\n\
  -   “戏服还必须服务于演员。如果演员需要突出，那么颜色、面料、装饰都需要抢眼。如果需要不引人注目，那就走低调路线。如果是撕脱裙，那看起来必须毫不费力，或是意外扯落。在古装剧中，观众必须能感受到内衣也是符合时代的，而有些内衣能改变体态和动作，这便增添了历史感。”\n\
  -   “观众应该能很快判断出故事发生在哪个年代，无论是 1840 年还是 1940 年，并且应该能识别出阶级、王室身份，或许还有职业。观众应该能看出是哪个季节，以及白天还是夜晚。如果你把这些全都拿捏得恰到好处，那你就拥有一套出色的戏服了。”\n\
  \n露丝还发现，历史上一个时代的时尚与建筑之间存在相似之处。她说：“我曾想研究不同时代的建筑与服饰，以比较它们的轮廓、质朴或华丽。时尚能告诉我们大量关于我们所处时代以及过去时代的信息。我认为从‘青少年时代’到‘咆哮的二十年代’的转变，是服饰、思想、行为、文学中自由运动的绝佳范例，而摩登女郎在其中又具有多大的代表性呢？很难将时装设计师对艺术家的影响与艺术家对时装设计师的影响截然分开。想想`埃尔特`。想想`摩登\
  \ 60 年代`。想想`波普艺术`。还有音乐……披头士在`埃德·沙利文秀`上穿着的服装是否成为了主流时尚？如今，在舞台上捕捉这一点就成了戏服设计师的工作。建制派、嬉皮士、摩登族、书呆子——无数时代皆是如此。在`《双城记》`和`《三个火枪手》`中，让法国人像法国人、英国人像英国人，这是对戏服设计师的挑战。而`马伏里奥`呢？没有他那交叉的吊袜带，他还算什么？”\n\
  \n### 让戏服为你服务\n\n塔妮莎建议，一个人要想穿上戏服后看起来好看，最重要的就是穿着舒适。她指的是身体上的舒适，并且戏服要结实，不会在穿着者身上散架。但她也指更微妙的一点。人们可能会想象，一位专业的戏服设计师大部分时间都在温和地劝说人们放弃与年龄不符的服装。\n\
  \n然而，显然人们普遍认为自己不够好看，驾驭不了某种造型。塔妮莎说，人们必须“放下防备”才能有效地穿上戏服，而并非每个人都能或愿意这么做。他们还必须“决定自己想获得何种关注”。\n\
  \n在制作戏服的过程中，尝试角色所需要的所有肢体动作非常重要。如果你等到戏服做完才试，可能就得进行大量修改了。\n\n### 戏服开发的时间与精力\n\n塔妮莎一直以来最喜欢的戏服之一是一件古装长裙（如图\
  \ 2-3 所示）。塔妮莎估计这件戏服耗费了数百个工时。带珠饰的面料可以买到，但非常昂贵，因此必须谨慎使用以避免浪费。\n\n![A371637_1_En_2_Fig3_HTML.jpg](img/A371637_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3.** 塔妮莎·法切特与一条她钟爱的长裙及其配饰\n\n除了令人惊叹的表面细节，可以说“内部”还有很多支撑结构（见图 2-4）。像这样精致的戏服有很多层，经验指导着该用什么面料来制作，以便它们能为不同的穿着者进行修改，而不会在修改过程中被毁坏。\n\
  \n![A371637_1_En_2_Fig4_HTML.jpg](img/A371637_1_En_2_Fig4_HTML.jpg)\n\n**图 2-4.**\
  \ 图 2-3 中长裙的部分内部支撑结构\n\n### 你将制作什么？\n\n在深入阅读本书之前，请思考你最终想要完成什么样的项目。随着你对可能性的了解加深，这个目标可能会改变，但拥有一个目标既能激励你，也能防止你陷入过多孤立的技术探索而最终无法拿出一个酷炫的成品。翻阅一下项目章节（第\
  \ 7 章和第 11 章），看看是否有让你心动的项目。\n\n如果你是正在规划课程的老师，你可能想设计几种期末项目类型，以稍微缩小可能性范围。例如，你可以建议学生为课程结束前后学校戏剧演出中的某个部分制作道具。\n\
  \n或者，全班可以共同制作一件细节丰富、配件众多的历史戏服。他们可以在不同层面上参与制作。团队合作很鼓舞人心，他们可以学习协作并表达自己的想法。另一个不错的期末项目是让每个学生选择一部戏剧中一个场景里的一个角色，设计戏服和配饰，然后制作出整套造型。\n\
  \n## 初学者的错误\n\n在第 10 章中，我们向你介绍了我们的第一个主要可穿戴科技项目，当时我们过于雄心勃勃了。塔妮莎同意，缺乏经验的人常犯的一个错误就是试图同时做太多事情。不过，当被问及是否有想不起来的失败戏服例子时，她没能举出例子。“每件事都能学到东西，”她说。这种态度与我们的朋友、`伯班克创客空间`（[`www.burbankmakerspace.com`](http://www.burbankmakerspace.com)）的共同创始人`梅塔尔纳特·海耶斯`非常接近，他喜欢用`#测试案例`这个标签来描述某件事搞砸了，但他同样从中有所收获。\n\
  \n\n\n### 材料\n\nTanisa 指出，在缝纫项目中，初学者最常见的错误是选择“非常漂亮、有光泽的面料”，但这些面料可能质量不佳，或者缺乏挺括感和纹理，容易暴露出许多瑕疵。本书会为各个项目推荐合适的面料，尽力帮你避免这一问题。不过，我们的目标并非引导你为了完成项目而机械地执行，而是让你能够举一反三，继续深入。因此，我们会解释推荐每种面料的原因，以便你在此基础上拓展。但请不要害怕尝试，尤其是在废旧衣物和二手店购买的物品上进行实验。这些是学习处理不同面料、饰边和服装的绝佳且廉价的途径。\n\
  \n专业人士聚在一起时，会讨论各种材料及其组合方式，并分享使用胶水及类似材料的经验。这类经验技巧并非一夜之间就能学会，但你可以利用购买材料时与人交流的机会来增长见识。这是实体店购物相对于网购的优势之一。同样的道理也适用于电子和软件领域，只不过，在那些领域，相当于实体店的地方可能就是混迹于创客空间了。\n\
  \n**注意**  \n像本书这类项目的一个挑战在于，你可能需要将电子元件与图 2-5 中所示的材料整合在一起。跨领域、跨学科的融合正是乐趣所在，但务必在项目初期就仔细考虑不同材料之间可能存在的兼容性问题。\n\
  \n![A371637_1_En_2_Fig5_HTML.jpg](img/A371637_1_En_2_Fig5_HTML.jpg)  \n图 2-5. 服装道具店\
  \ Make Believe 的羽毛围巾库存\n\n### 估算时间\n\n专业人士在制作戏服时，时间至关重要，因为他们的生意需要维持。一位角色扮演者可能会花一年时间为某个展会制作一套服装，但显然，如果店铺也这么做，它们就得关门大吉了。\n\
  \n**提示**  \n当你考虑运用本书中的技巧设计自己的戏服时，我们建议你预估一下尝试完成它需要多长时间，然后将最佳预估时间乘以三。这个倍数通常涵盖了你在制作过程中必须先解决其他问题所需的学习时间。不过，对于大多数这类事情，学习和掌握技巧的唯一途径就是亲身尝试。正如我们所说的：`#testcase`（动手尝试）！\n\
  \n### 不要独自硬撑\n\n专业戏服设计师通常专注于设计的某个方面，并会聘请其他人来完成其他部分。在你学习的时候，可以和朋友们组队合作。如果你是在课堂上教授这门课，你的某位同事可能有一些可以帮上忙的经验。但无论是独自一人还是和朋友一起，都不要害怕去尝试某种造型。\n\
  \n## 本章总结\n\n本章基于 Lyn 的经验以及该领域一些专业人士的见解，介绍了优秀戏服背后的一些设计理念。Lyn 回顾了她最喜爱的一些戏服，本章还特别强调了在学生戏剧制作戏服设计过程中需要牢记的几个关键设计要点。\n\
  \n"
- "# 第二部分  \n基础篇\n\n基础篇\n\n在第 3 章到第 7 章中，我们将介绍时尚科技所需的关键技能。第 3 章涵盖手缝和机缝的基础知识，并提供了丰富的其他参考资料。第\
  \ 4 章专注于制作和使用缝纫纸样（版型）的艺术。\n\n在第 5 章中，我们将转向科技领域，介绍电子元件的基本知识。在第 6 章中，我们将学习如何对这些设备进行编程。\n\
  \n最后，在第 7 章中，我们将所有知识整合到一个全面且易于管理的项目中：制作一条带内置计时器的女式围裙。计时器倒计时时，围裙上的红灯闪烁；时间到时，绿灯亮起。掌握这几章的内容，就足以完成“闪烁”项目——那些能够发光并具备一些基本灯光控制能力的服装。\n\
  \n"
- "# 3. 如何缝纫\n\n可穿戴技术的一个挑战在于，你需要学习做许多通常不属于一个人技能范畴的不同事情。当然，你也可以像我们三位作者一样进行合作。在本书中，我们力求为你提供所有关键基础，使你原则上能够独立完成（或与你的学生一起完成）各个项目。\n\
  \n本章涵盖手缝和机缝的基本要素，先从手缝开始，再过渡到机缝。本章由 Lyn 主讲。我教授缝纫和戏服制作多年，因此知道你可能会犯的所有错误，并能帮你避免其中一部分。\n\
  \n使用廉价面料来学习和磨练技艺是个好主意，因为一旦出错需要更换面料，成本可能会很高。有些时候，我不得不反复拆改一条缝线，导致布料上留下了明显的针孔。在犯了太多错误之后，我不得不从备料中裁剪出一块新的布料。\n\
  \n**注意**  \n不要害怕犯错。在学习新事物时，犯错几乎是不可避免的。刚开始学缝纫时，我常常连续犯同样的错误，这让我抓狂。我后来发现，当我过于分心时就应该停下来休息一下。几乎每次制作带袖子的东西时，我都会正确地装上第一只袖子，然后把第二只袖子装反（里外颠倒）。我必须确保自己在尝试安装第二只袖子前完全集中注意力。这其实就是发现自己的缺点并设法预防它们的过程。我现在仍然会犯错，但少多了，而且我更善于修正错误了。\n\
  \n图 3-1 展示的是我和我的第一个可穿戴项目——一件背心，上面带有我们在第 1 章中讨论过、并在第 10 章中详细拆解的光线和传感器。Joan 和 Rich\
  \ 说，如果你是从电子领域转过来，并且从未缝过纫，你可能会发现缝纫比你习惯的技术要更宽容，同时也需要做出更多的设计决策。（颜色和垂坠感在电路设计中并不常见！）\n\
  \n![A371637_1_En_3_Fig1_HTML.jpg](img/A371637_1_En_3_Fig1_HTML.jpg)  \n图 3-1. Lyn\
  \ 和她的第一个可穿戴项目\n\n\n\n## 基础手缝工具与技巧\n\n缝纫的历史源远流长——可追溯至旧石器时代（可以在 [`https://en.wikipedia.org/wiki/Sewing`](https://en.wikipedia.org/wiki/Sewing)\
  \ 找到一段有趣的历史）。在机器时代，手缝是创造独一无二物品的一种方式，并且目前是家庭手工爱好者将缝纫部件附着到布料上的唯一真正可行途径。入门并不需要太多东西。\n\
  \n我在课堂教学中教授缝纫、服装设计和制版，这意味着当学生有疑问或出现问题时，我能在现场解答和纠正。如果你是完全零基础的缝纫新手，我建议找个人指导你，或者观看一些在线视频来学习特定针法或解决疑问。以下是一些适合从零开始的网站：[`www.Instructables.com/id/How-to-Sew`](http://www.Instructables.com/id/How-to-Sew)\
  \ 或 [`www.wikihow.com/sew`](http://www.wikihow.com/sew) ，或视频 [`www.youtube.com/watch?v=B2mfJweh8a0`](http://www.youtube.com/watch?v=B2mfJweh8a0)。在\
  \ `Instructables` 网站上还有制作多种针法的短视频，例如本章中描述的暗缝针法（`www.instructables.com/id/Hand-Sewing-Basic-Slip-Stitch-Blind-Stitch/`）。\n\
  \n或者，直接搜索“如何缝纫”或“如何手动或机器缝纫”。有时需要多看几张图片或几种描述才能理解所讲解的内容。图 3-2 展示了练习本节所述各种针法所需的工具。完成你的作品也会用到它们：\n\
  \n![A371637_1_En_3_Fig2_HTML.jpg](img/A371637_1_En_3_Fig2_HTML.jpg)\n\n图 3-2.\n\n\
  你需要的物品\n\n- 轻至中等重量的棉布。\n- 锋利的手缝针（适用于轻至中等重量布料）。\n- 缝纫剪或剪刀（通常在布店能买到）。\n- 通用缝纫线。有很多品牌可供选择。我喜欢古特曼（Gutermann）的涤纶线，它有一定弹性且不易断裂。练习针法时，使用与布料颜色对比鲜明的线，能让你更容易看清布面上的针迹。\n\
  - 直针（缝纫时用于固定布片）和针插（用于插放缝针）。\n- 卷尺。（测量身体时，布卷尺最佳。如果没有，可以用绳子或缎带绕被测部位一周，然后用尺子测量绳长。）\n\
  - 裁缝粉笔或水溶性记号笔（用于在布料上标记剪口、省道或纸样上的其他符号）。\n- 拆线器（用于拆掉缝错的部分）。\n- 熨斗（用于熨平缝好的接缝并去除褶皱）。\n\
  \n以下物品也很有用，但并非必需：\n\n- 切割垫或硬纸板（保护台面并保持布料清洁）\n- 穿针器\n- 放大镜\n- 顶针（保护手指）\n- 蜂蜡（本章后面会介绍）\n\
  \n开始你的第一次缝纫实验时，选择一小块轻至中等重量的通用棉布。布料种类繁多，棉布是学习和练习基础技能容易上手的选择。你可以用一条大手帕、面粉袋厨房毛巾，或者从布店买些零头布（零头布是布匹末端的剩余布料，通常价格便宜）。\n\
  \n小贴士\n\n你可以在线购买布料，但如果你不熟悉布料的各种特性，最初去实体布店可能会更明智。在那里你能亲手触摸布料，并咨询关于重量、弹力大小以及用缝纫机缝制时需要何种型号缝针等问题。\n\
  \n### 穿针\n\n如前面所述，拿好你的锋利缝针和对比色的线，以便更容易看清布料上的针迹。以后当你制作成衣时，通常希望线的颜色与布料相匹配。不过，有时你可能也会想用对比色线来作为设计点缀。\n\
  \n手持缝针，针眼朝向自己。剪掉线头的一小段，确保它没有分叉，然后穿过针眼，直到能从背面捏住线头，再拉出约 3-4 英寸。或者，你可以使用穿针器（图 3-3）。握住针眼和线，从线轴上拉出约\
  \ 12-18 英寸的线，然后剪断线头。\n\n![A371637_1_En_3_Fig3_HTML.jpg](img/A371637_1_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3.\n\n使用穿针器\n\n注意\n\n你很快就会发现线头容易分叉。导电线尤其难以这样处理。在线头上涂一点蜂蜡可以防止线头分叉，并使穿针更容易。对于棉线，如果你觉得不恶心，也可以用嘴湿润线头。但不要对导电线这样做——既不管用，也因为线头有点锋利。\n\
  \n### 打结\n\n确保握紧针眼和线，或者将其插入针插（线很容易从针上滑脱，需要重新穿针，这会很烦人）。使用较长的那段线，将线头捏在食指和拇指之间，绕手指一圈，然后一边牢牢捏住线头，一边用拇指和食指搓转线圈并将其从手指上推下（图\
  \ 3-4）。运气好的话，你就能打成一个结。\n\n![A371637_1_En_3_Fig4_HTML.jpg](img/A371637_1_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4.\n\n打结\n\n有时最好重复这个过程一次，以得到一个稍大且更牢固的结。如果结相对于布料织纹来说太小，它会从布面脱出，你就必须重新打结再开始——有时需要反复尝试。刚开始学习缝纫时，这会考验你的耐心，但总有办法纠正错误并继续下去。深呼吸，或者在房间里、屋子周围或街区内短暂走走，可能会有所帮助。\n\
  \n小贴士\n\n如果布料织纹非常稀疏，一个好方法是先缝一小针，将线几乎全部拉出，然后将线头打个结。我们在本书的其他项目中会用到导电线。导电线由细小的编织金属丝制成，很难打出牢固的结。给导电线打结后（普通线则不必），我会滴一滴透明指甲油来固定结头。\n\
  \n区分正面和反面\n\n布料顶面或颜色更鲜艳的一面称为正面。底面或颜色较暗淡的一面称为反面。使用有绒毛的布料（因摩擦方向不同而呈现不同外观的布料），如灯芯绒、天鹅绒和丝绒时，绒毛面为正面。卫衣布料则用光滑的一面作为正面，而非起毛的一面。\n\
  \n### 使用不同的针法\n\n本节将介绍将物品缝在一起的不同方法。针法是你的缝纫工具，掌握多种针法会大有裨益。\n\n小贴士\n\n始终捏住缝针靠近针眼处的针体与线，以防止线从针眼滑脱。这能帮你避免反复穿针。\n\
  \n\n\n#### 平针缝\n\n将两块布料的正面对齐。手持针线，从底部（两个正面相对的那一面）将针尖向上刺入，穿过两层布料，直到线结抵住布料。在距穿出点约四分之一英寸处，从顶面将针穿过，并拉紧线，直至线完全穿过且针脚平整。为清晰起见，图\
  \ 3-5 仅展示了穿过一层布料的针脚。\n\n![A371637_1_En_3_Fig5a_HTML.jpg](img/A371637_1_En_3_Fig5a_HTML.jpg)![A371637_1_En_3_Fig5b_HTML.jpg](img/A371637_1_En_3_Fig5b_HTML.jpg)\n\
  \n图 3-5. 进行中的平针缝\n\n继续重复这些步骤，形成一条直线针脚。你可以让内侧（或底部）的针脚比外侧（或顶部）稍长一些，也可以让它们长度相等。尝试不同大小的针脚，直到熟练掌握技巧并能保持针脚整洁。\n\
  \n#### 疏缝针\n\n这种针法和平针缝相同，但每个针脚要长得多。它是一种临时针法，通常用于在机器缝合前将布料固定在一起，无需别针，也可用于快速锁边、其他修补或临时固定。\n\
  \n#### 倒针缝\n\n这是最牢固的针法，或许也是最容易保持直线的一种。先在布料上缝一针，当针从布料穿出准备缝第二针时，不要远离第一针下针，而是将针从第一针末端的上方刺入，并穿过布料（图\
  \ 3-6）。下一针在底部会更长，将线拉至顶部，然后倒回前一针的末端。继续使用这种技法，或在每个倒针之间加入几个平针。\n\n![A371637_1_En_3_Fig6a_HTML.jpg](img/A371637_1_En_3_Fig6a_HTML.jpg)![A371637_1_En_3_Fig6b_HTML.jpg](img/A371637_1_En_3_Fig6b_HTML.jpg)![A371637_1_En_3_Fig6c_HTML.jpg](img/A371637_1_En_3_Fig6c_HTML.jpg)\n\
  \n图 3-6. 制作倒针缝\n\n#### 暗缝针或藏针缝\n\n这种针法稍复杂些，但能让你的衣物或作品呈现出专业的外观。它几乎是看不见的针脚，一旦学会暗缝针，就能快速完成收尾。\n\
  \n练习暗缝针时，剪下一小块方布，对折。打开，将两侧向中线折叠并熨平，然后沿中线再次对折（此步骤及后续步骤如图 3-7 所示）。\n\n![A371637_1_En_3_Fig7a_HTML.jpg](img/A371637_1_En_3_Fig7a_HTML.jpg)![A371637_1_En_3_Fig7b_HTML.jpg](img/A371637_1_En_3_Fig7b_HTML.jpg)\n\
  \n图 3-7. 为暗缝针折叠布料\n\n将针从布料顶部刺入，穿过折叠的上边缘，直至线结卡住。然后将针移至下方折叠处，将针水平刺入折痕，沿布料内侧推进约 1/4\
  \ 英寸。接着将针拉出，再回到上方折叠处。将针水平穿过上方折叠并拉出线。依此继续直至末端（见图 3-8）。\n\n![A371637_1_En_3_Fig8a_HTML.jpg](img/A371637_1_En_3_Fig8a_HTML.jpg)![A371637_1_En_3_Fig8b_HTML.jpg](img/A371637_1_En_3_Fig8b_HTML.jpg)![A371637_1_En_3_Fig8c_HTML.jpg](img/A371637_1_En_3_Fig8c_HTML.jpg)![A371637_1_En_3_Fig8d_HTML.jpg](img/A371637_1_En_3_Fig8d_HTML.jpg)\n\
  \n图 3-8. 藏针缝步骤\n\n在末端，于最后一个长针脚对面的折叠处缝一个小针脚。拉线形成一个线圈，将针穿过线圈，再拉紧打一个结。重复此操作三次，以形成一个牢固的尾结。这种针法可用于连接两块布料，或作为单块布料的边缘处理。\n\
  \n#### 包边缝\n\n包边缝同样用于连接边缘。起针方法与暗缝针相同——将线从布料背面穿至正面靠近边缘处。然后将针斜向朝向缝纫方向刺入布料背面。不要将线拉紧，而是先将针穿过这个线圈，然后拉线形成\
  \ 90 度角。继续操作直至完成边缘。在末端，将针移至线形成的最后一个垂直线右侧，从布料中穿出并形成一个线圈。将针穿过线圈并拉紧三次以形成尾结（图 3-9）。与暗缝针一样，包边缝可用于连接两块布料，或作为单块布料的边缘处理。\n\
  \n![A371637_1_En_3_Fig9_HTML.jpg](img/A371637_1_En_3_Fig9_HTML.jpg)\n\n图 3-9. 包边缝\n\
  \n#### 卷针缝\n\n将一块布料对折并用别针固定。从内侧将针穿过折痕（图 3-10a），使其从正面穿出（图 3-10b）。将针从背面刺入并穿回正面，使其与第一针平齐（图\
  \ 3-10c）。继续重复至末端（图 3-10d），并打一个收尾结。\n\n![A371637_1_En_3_Fig10c_HTML.jpg](img/A371637_1_En_3_Fig10c_HTML.jpg)![A371637_1_En_3_Fig10d_HTML.jpg](img/A371637_1_En_3_Fig10d_HTML.jpg)\n\
  \n图 3-10c. (上) 和 d (下). 卷针缝步骤 c 和 d\n\n![A371637_1_En_3_Fig10a_HTML.jpg](img/A371637_1_En_3_Fig10a_HTML.jpg)![A371637_1_En_3_Fig10b_HTML.jpg](img/A371637_1_En_3_Fig10b_HTML.jpg)\n\
  \n图 3-10a. (上) 和 b (下). 卷针缝步骤 a 和 b\n\n**提示：** 参考图片有助于理解说明文字。这些针法在布料的两面应看起来相同。\n\
  \n\n\n## 穿引缝纫机线\n\n学习手工缝纫或许已经让人望而生畏，但现代缝纫机实际上是相当复杂的自动化设备。由于缝纫机非常耐用，如果你拥有一台机器，它可能是\
  \ 60 年前的老型号（比如图 3-11 中那台 1953 年生产的铸铁款 Singer Featherweight），也可能是现代机型（图 3-12）。以下说明将尽可能涵盖各种型号的机器。\n\
  \n![A371637_1_En_3_Fig12_HTML.jpg](img/A371637_1_En_3_Fig12_HTML.jpg)\n\n图 3-12.\
  \ 2015 年款 Brother 自动缝纫机\n\n![A371637_1_En_3_Fig11_HTML.jpg](img/A371637_1_En_3_Fig11_HTML.jpg)\n\
  \n图 3-11. 一台 1953 年生产的 Singer Featherweight 缝纫机，至 2015 年仍可正常使用。（感谢 Rich 的妹妹 Rachel\
  \ Cameron 为图片提供模特并审阅说明。）\n\n根据机型不同，缝纫机可通过转动旋钮或按下按钮选择多种线迹。最常见的是直线线迹、Z 字形线迹和刺绣线迹。你可以通过旋钮或电脑屏幕菜单调整线迹的长度和宽度。功能更复杂的机型甚至提供更多线迹选择。机器还配有按钮或开关可实现倒缝。\n\
  \n如果你有一台新机器，通常会附带使用手册，其中包含穿线所需的步骤说明（如果找不到手册，也可在线查找）。许多机器本身也会以某种方式显示穿线路径（图 3-13）。\n\
  \n![A371637_1_En_3_Fig13_HTML.jpg](img/A371637_1_En_3_Fig13_HTML.jpg)\n\n图 3-13.\
  \ 图 3-12 中机器顶部的穿线示意图\n\n如果你从未尝试过，给缝纫机穿线可能会令人困惑。但一旦学会，在大多数标准机型上只需几秒钟，你就可以准备开始缝纫了。你必须能看清机针细小的针眼并具备相当好的瞄准能力，因此如果看近处需要眼镜，务必戴上。许多机器配有穿线器，有助于解决视力模糊或手抖的问题。\n\
  \n> **注意**\n> 缝纫机针的针眼位于尖端，而手缝针的针眼在针尾。切勿将两者混用。\n\n你需要准备一些测试布料、一卷缝纫线（与手缝同理，如果想练习并轻松看到线迹，建议使用与布料颜色对比明显的线）。此外，还需准备缝纫机针和一个绕好线的梭芯——它为布料底部的线迹提供底线。在给机器上半部分穿线之前，大多数缝纫机需要先给梭芯绕线。请将以下说明（以两台机器为例展示常见差异）作为指导，并查阅你的机器手册了解具体细节。\n\
  \n### 绕制梭芯\n\n使用你选择的缝纫线，给梭芯绕线，使线迹的顶线和底线颜色一致。当你缝制其他项目时，可以收集绕有不同颜色线的梭芯，这样就不需要每次都重新绕线。\n\
  \n首先，左手握住手轮，右手转动内侧旋钮将其松开。将线轴插在机器顶部的线轴钉上。如果机器没有内侧轮，顶部可能有一个释放按钮。将线从梭芯内侧的孔穿到外侧，然后将梭芯放在梭芯绕线轴上。将绕线轴向右推。捏住线头，缓慢踩下脚踏控制器，在梭芯上绕几圈线。图\
  \ 3-14 显示了此过程的状态。\n\n![A371637_1_En_3_Fig14_HTML.jpg](img/A371637_1_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14. 绕制梭芯\n\n接着，停止机器，将靠近梭芯顶部孔的线头剪断。再次踩下脚踏控制器，直到梭芯绕满。停止机器，将梭芯绕线轴向左移回原位。剪断线。现代机型中，位于图\
  \ 3-12 主梭线轴前方的装置即为等效的梭芯座。\n\n### 安装机针\n\n将机针平面朝下放在平面上，检查它是否笔直。机针与平面之间的间隙应均匀，且针尖必须锋利。安装机针时，朝自己的方向（逆时针）转动手轮，将针杆组件升至最高位置，并抬起压脚——即针周围压住布料的部件。你的机器应有释放机制，例如压脚附近的杠杆。图\
  \ 3-15 展示了此步骤（图中机器已完成上半部分穿线）。\n\n![A371637_1_En_3_Fig15_HTML.jpg](img/A371637_1_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15. 压脚\n\n松开针夹螺丝，将一枚机针插入针夹，确保机针的平面朝外。务必将机针向上推至最大限度。用机器配备的相应机构拧紧机针。\n\n###\
  \ 为机器上半部分穿线\n\n朝自己的方向（逆时针）转动手轮，将挑线杆升至最高位置。确保压脚处于抬起状态。将线轴插在机器顶部的线轴钉上。如果线轴钉是水平放置的，用随附的线轴盖固定线轴。用锋利的剪刀将线头剪出一个干净利落的端头。捏住线头，穿过顶部导线器。将线头绕过上方导线器（图\
  \ 3-16）。\n\n![A371637_1_En_3_Fig16_HTML.jpg](img/A371637_1_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16. 上方导线器\n\n在线轴附近捏住线，将线头向下绕过夹线簧座或张力组件。张力组件位于图 3-16 中机器的顶部，用于控制线的流量。用力将线向上拉，然后根据机器上的数字或图示，穿过机器可能配备的其他夹线装置。某些情况下，如图\
  \ 3-16 中的机器，导线器周围的区域可以打开，以便操作。\n\n将线向下穿过机器上剩余的导线器，并将其滑入针杆导线器——即针上方的一个小夹子，在图 3-17\
  \ 中隐约可见。从机针前方向后穿线，将线拉过针眼几英寸，并引向左侧（你的机器可能是从右向左穿——请参照机器上的图示）。\n\n![A371637_1_En_3_Fig17_HTML.jpg](img/A371637_1_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17. 穿好线的机针\n\n\n\n### 安装梭芯\n\n在较新型号的缝纫机上，请按照机器上的图示安装梭芯，将梭芯放入机针下方的梭芯套内（图 3-18）。在某些机器上，梭芯套可能位于机身前侧或底部侧面（图\
  \ 3-19）。不同机器的布局虽有差异，但通过这两个示例可以了解基本原理。\n\n![A371637_1_En_3_Fig19_HTML.jpg](img/A371637_1_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19. 在另一款设计的机器上，梭芯位于机身前侧靠近底部的位置\n\n![A371637_1_En_3_Fig18_HTML.jpg](img/A371637_1_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18. 一台现代缝纫机上的梭芯穿线方向\n\n将绕满线的梭芯放入梭芯套内的梭芯腔中，确保线按照机器图示指定的方向送出。\n\n握住梭芯套上的锁扣，将梭芯套推入机器上的安装位置，然后松开锁扣。松开锁扣后，梭芯套应能锁定到位。拉出几英寸的梭芯线。\n\
  \n将压脚抬起，用左手轻轻捏住机针的线。朝自己的方向（逆时针）转动手轮一整圈，直到机针没入梭芯套中。继续捏住线并转动手轮，直到机针再次升至最高位置。当机针上升时，梭芯线也会形成一个线环。将线向左拉出，将梭芯线环从梭芯套中进一步拉出。将机针线和梭芯线一起向后拉出\
  \ 4 到 6 英寸（约 10 到 15 厘米），远离自己。此时，你可以在之前的图 3-17 中看到已经穿好线的机针。现在，你（终于）可以开始缝纫了！\n\n\
  ## 试机缝纫\n\n在开始任何项目之前，最好先练习使用缝纫机。利用下面列出的基本针法以及一些碎布头，练习将布料放在压脚下方、手动转轮降下机针、放下压脚（使用之前抬起压脚的同一杠杆）、缝纫、更换针法、使用倒缝、移除布料以及剪断线头。大多数缝纫机在机针旁边都配有切线刀——或者使用锋利剪刀。\n\
  \n要将机针从布料中取出，朝自己的方向转动旋钮，直到机针处于最高位置并离开布料，抬起压脚，然后将布料从压脚下拉出。留出 4 到 6 英寸（约 10 到 15 厘米）的线头，以备下次使用。\n\
  \n### 改变缝纫方向\n\n有些项目需要改变缝线的方向。操作方法如下：先缝几英寸长的线迹。当机针在布料中时停止机器（如果机针抬起，则手动将其降下）。抬起压脚，将布料旋转\
  \ 90 度，然后放下压脚。继续缝几英寸（图 3-20）。练习将布料别在一起并制作缝线。剪出一条曲线并沿着曲线缝纫，同时练习在曲线上剪牙口。\"剪牙口\"指的是从布料边缘向缝线处剪出小的\
  \ V 形切口，以使缝线更平整。\n\n![A371637_1_En_3_Fig20_HTML.jpg](img/A371637_1_En_3_Fig20_HTML.jpg)\n\
  \n图 3-20. 改变缝纫方向\n\n### 尝试不同类型的针法\n\n如果你的缝纫机有多样化的针法可选，不妨全部尝试一下。某些针法可能需要不同的压脚和/或机针。\n\
  \n#### 双针缝纫或加固缝\n\n沿缝线缝完第一道线后，在缝份内距第一道线 1/4 英寸（约 6 毫米）处，使用直线针迹或之字形针迹再缝一道线（图 3-21）。\n\
  \n![A371637_1_En_3_Fig21_HTML.jpg](img/A371637_1_En_3_Fig21_HTML.jpg)\n\n图 3-21.\
  \ 加固缝\n\n#### 缩缝针迹\n\n沿缝线使用长直线针迹缝纫，在线缝两端各留下 3 到 4 英寸（约 7.5 到 10 厘米）的线头。拉动线头来调整松紧度（图\
  \ 3-22）。\n\n![A371637_1_En_3_Fig22_HTML.jpg](img/A371637_1_En_3_Fig22_HTML.jpg)\n\
  \n图 3-22. 缩缝针迹\n\n#### 边缘缝\n\n贴近布料边缘缝纫，用针迹覆盖边缘（图 3-23）。\n\n![A371637_1_En_3_Fig23_HTML.jpg](img/A371637_1_En_3_Fig23_HTML.jpg)\n\
  \n图 3-23. 边缘缝\n\n#### 面缝\n\n在布料的正面或外侧，紧贴缝线进行缝纫。以压脚作为引导（图 3-24）。\n\n![A371637_1_En_3_Fig24_HTML.jpg](img/A371637_1_En_3_Fig24_HTML.jpg)\n\
  \n图 3-24. 面缝\n\n#### 倒针缝\n\n当完成一片衣片的缝纫后，停止机器，将机器设置为倒缝模式，沿同一条缝线缝几针。然后再向前缝至衣片末端。图\
  \ 3-25 展示了机器上的“倒缝”按钮——通常是一个类似图中所示的按钮或杠杆（即右侧那个带有“绕过头顶”箭头图案的按钮）。\n\n![A371637_1_En_3_Fig25_HTML.jpg](img/A371637_1_En_3_Fig25_HTML.jpg)\n\
  \n图 3-25. 倒缝按钮（位于右上角）\n\n还有更多种类的针法。要了解它们在实际中的应用，最好的方法是拿一个纸样，尝试真正制作一件东西。\n\n### 针法的实际应用\n\
  \n图 3-26 是你在第 4 章中将要制作的一件背心的草图。你可以看到其中一些针法将用在何处。即使是一件简单的背心，也包含几块不显眼却需要用到多种针法的部件。\n\
  \n![A371637_1_En_3_Fig26_HTML.jpg](img/A371637_1_En_3_Fig26_HTML.jpg)\n\n图 3-26.\
  \ 第 4 章背心所使用的针法\n\n在第 4 章中，你将看到这些针法的更多实际运用。大多数情况下，缝纫并没有绝对的“正确”方法。你可以尝试不同的方法来观察效果。例如，在第\
  \ 4 章中，我们就在几个位置进行了面缝，以展示其效果（此处未显示）。\n\n## 本章小结\n\n本章介绍了手工缝纫和使用标准缝纫机进行缝纫的基础知识。还讨论了开始缝纫所需准备的事项，展示了几种常见针法，并讲解了如何穿引标准缝纫机的线以及常用缝纫术语。在开始下一章的第一个项目之前，先在碎布头上练习缝直线、缝曲线、边缘缝以及处理缝线末端，将会很有帮助。\n\
  \n\n\n"
- '# 4. 制作与使用缝纫纸样


  本章将带你了解缝纫纸样的方方面面。又是 Lyn 执笔，现在将引领你运用第 3 章介绍的针法和技巧。


  初次使用标准缝纫纸样时，务必阅读并遵循附带的说明，同时理解并遵照纸样部件上印刷的标记。就像做一道新菜谱，最好在开始工作前通读所有步骤。商业纸样通常印在薄纸上，塞入信封中。纸样信封就像一个装满围巾的魔术帽，你似乎能不停地抽出纸样部件——多到让人怀疑那么小的信封怎么可能装得下。我每次用完纸样后，似乎永远无法把所有部件整齐地塞回去。


  说明书中通常有一节介绍面料裁剪布局和符号。再次强调，就像菜谱一样，一旦理解了步骤，你就可以根据自己的风格和能力进行调整或修改。先将所有需要的纸样部件别在面料上，并在裁剪前仔细核对所有方向和符号，有助于避免一些错误。


  你可以先裁剪较小的部件，以确保沿着正确的线迹剪裁并剪出合适的剪口。万一出错，这些部件也更容易重新裁剪，而且不会浪费大块面料。


  在本章中，我们将制作一件简单的无衬里背心（图 4-1）。它不需要很多面料，基本形状也相当容易缝制和收尾。整件背心可以手缝，但用缝纫机缝合会快得多。如果你需要更多手缝练习，也可以选择手工缝制背心的边缘。


  ![A371637_1_En_4_Fig1_HTML.jpg](img/A371637_1_En_4_Fig1_HTML.jpg)


  图 4-1. 本章将要制作的背心成品效果


  ## 测量


  使用或制作纸样的第一步是确定你要做什么。之后，你需要测量穿着者（如果是服装）、待覆盖的家具或任何需要贴合的对象。如果是测量人体，建议使用软尺，因为它具有柔韧性，可以贴合身体曲线。以下是测量不同身体尺寸的一些技巧：


  -   胸围（女性）：将软尺绕过胸部和背部，位置在乳头水平线。确保软尺环绕身体一周时保持水平。如果是自测，使用镜子会很方便。

  -   胸围（男性）：将软尺绕过前胸和背部，位置直接在乳头下方，确保软尺环绕身体一周时保持水平。

  -   腰围：找到躯干最细处，将软尺绕身体一周，位置在肚脐上方约一英寸处。确保软尺环绕一周保持水平。请注意，这可能不是你穿裤子或裙子的位置。当今的时尚款式比传统腰线低得多。但无论款式如何，腰围都是在这个位置测量的。

  -   臀围：找到臀部最丰满处，将软尺绕前身和背部一周。确保软尺环绕一周保持水平。

  -   裆长：将软尺一端固定在肚脐处，将软尺从双腿间拉过，向上至背部与肚脐平齐的位置。

  -   大腿围：将软尺绕大腿最丰满处一周，保持水平。

  -   小腿围：将软尺绕小腿最丰满处一周，保持水平。

  -   上臂围：绕二头肌最丰满处一周。

  -   腕围：绕手腕骨骼处一周。

  -   臂长：将手臂向一侧伸直，将软尺一端置于腋窝前部，固定此处，测量至手腕。

  -   前中长（躯干）：将软尺一端置于锁骨间的凹陷处（胸骨顶端），向下测量至肚脐。

  -   后中长（躯干）：将软尺一端置于颈后下方的脊柱处，向下测量至背部与肚脐平齐的位置。


  注意：如果你愿意，也可以用绳子测量。具体做法是：用一段绳子或丝带绕在要测量的部位，在重合处捏住或做标记，然后用尺子或码尺测量绳子的长度。也有人用过胶带（贴在一件旧
  T 恤或保鲜膜上，然后整片剪下）来制作定制的人台。没有一位作者尝试过后一种方法，但你可以在网上找到相关描述和图片。


  ## 选择纸样


  如果这是一门纯粹的缝纫学习课程，我可能不会谈从头制作纸样。然而，在可穿戴科技项目中，你更可能混合使用面料、3D 打印部件和电子元件，因此需要自己制作纸样或修改现有纸样。我将在此解析纸样的工作原理，以便你决定是购买纸样还是为项目制作纸样。


  ### 购买纸样


  缝纫纸样可从网上、布店以及众多网站购得，例如[`www.mccall.com`](http://www.mccall.com)、`sewingpatterns.com`、[`www.craftsy.com`](http://www.craftsy.com)和`Etsy.com`。Joann
  Fabrics（[`www.joann.com`](http://www.joann.com)）是美国全国性商店，也拥有网店。你所在的地区可能也有销售纸样的本地布店。


  注意：总的来说，纸样仍然以装满薄纸的实体信封形式销售（而非提供下载），因为要打印出真人尺寸的纸样，需要将许多纸张拼接在一起，实际操作起来很麻烦。不幸的是，这意味着如果你想用激光切割机裁剪面料，很难获得适合激光切割的电子版纸样。我在本章后面会讲到解决这个问题的办法。


  大多数纸样都在信封上标明了难度等级。对于第一个项目，最好选择基础或初学者级别的纸样。选择基础纸样可以让你学习术语和基本技能，而不会被复杂的技术和说明弄得灰心丧气。纸样上印有裁剪线和
  5/8 英寸（1.6 厘米）的缝纫边缘或称缝份线。请务必分清两者的区别，否则完成的作品尺寸会不合身（图 4-2）。注意，在第 3 章以及其他我从头创作纸样的地方，我使用了
  1 英寸的缝份，只是为了留有更多容错空间。不过，印刷的纸样通常使用 5/8 英寸的缝份。


  ![A371637_1_En_4_Fig2_HTML.jpg](img/A371637_1_En_4_Fig2_HTML.jpg)


  图 4-2. 购买的纸样上的缝纫线和裁剪线


  商业纸样通常被设计成可以用同一纸样制作出几种尺寸的服装。纸样上不同的线条（图 4-3）标示了几种不同尺寸的裁剪位置。在这个例子中，该纸样适用于 6 码到 10
  码。


  ![A371637_1_En_4_Fig3_HTML.jpg](img/A371637_1_En_4_Fig3_HTML.jpg)


  图 4-3. 尺寸线


  小贴士：你可能希望在将纸样部件别到面料上之前，先按自己需要的尺寸剪出纸样部件。这有助于避免在错误的线迹上裁剪，从而导致成衣不合身。




  ### 制作纸样


  你可能正在发明某种尚不存在的东西，或者只是找不到喜欢的纸样。在这种情况下，有许多服装书籍和网站提供了简单的纸样图样及放大说明。我个人偏爱的资源包括：芭芭拉和克莱图斯·安德森的《*服装设计*》第二版（Harcourt
  Brace College Publishers，1999 年）；雪莉·迪林的《*优雅节俭服装*》（Meriwether Publishing，1992 年）；希拉·杰克逊的《*舞台服装*》第二版（New
  Amsterdam Books，2001 年）；以及南希·布拉德菲尔德的《*1730–1930 服饰细节*》（Costume and Fashion Press，隶属
  Quite Specific Media Group）。此外，我也是网站 [`http://sewing.craftgossip.com`](http://sewing.craftgossip.com)
  和 [`www.wikihow.com/sew-using-patterns`](http://www.wikihow.com/sew-using-patterns)
  的忠实粉丝。


  另一种制作纸样的方法是仔细拆解一件衣物。你可以利用合身的旧衣服作为新作品的纸样。选择一件你想复制的衣服，用拆线器拆开接缝。最好使用已经破旧或不再想要的衣物。也可以专门从二手店购买一件用于此目的。将拆下的衣片用作纸样，或者用它们来制作纸质纸样。


  在了解衣物的构造方式后，你可能会想为其他服装修改某些部分——例如，缩短或加长裙子、连衣裙或裤子，或者增加更长、更宽松的袖子或不同的领型。


  纸样用纸可以在网上和布料店找到，但你也可以使用屠夫纸、牛皮纸袋（就像我本章示例中所用的那样），或者其他任何你能在上面画图、将其别在布料上并进行裁剪的纸张。不建议使用报纸，因为油墨会弄脏布料，而且难以看清你做的任何标记。


  **注意**


  随着激光切割机在公共创客空间越来越普及，你可能想制作一份能在这些机器上使用的纸样。激光切割机可以非常轻松地切割出复杂的形状。例如，Adobe Illustrator
  软件包（`www.adobe.com/products/illustrator.html`）就是创建电子缝纫纸样的好工具，尽管其学习曲线较为陡峭。你需要创建一个包含二维矢量图形（而非光栅图形）的文件，以便在激光切割机上切割。


  由于易于获得的激光切割机是相当新的设备，这一领域在不久的将来可能会显著扩展（尝试搜索"数字缝纫纸样"）。不过请注意，那些专为下载、分页打印并用于缝纫机缝合的电子纸样，很可能无法用于激光切割。即使格式正确，也需要对文件进行一些处理才能切割出正确的线条。


  ### 基本纸样形状与部件


  裤子和衬衫是由几种基本形状构成的。裤子可以用一块纸样制作，从两块布料上剪出，并添加腰部松紧带或制作腰头。还可以通过增加拉链门襟、魔术贴、纽扣或按扣进行升级。


  衬衫只需三块纸样即可制作——前片、后片和袖子。更精良的衬衫或女式衬衫则会包含领口、袖口以及纽扣襻或拉链。


  ### 选择布料


  纸样信封的背面会列出推荐布料以获得最佳效果。最好从这些推荐中选择布料，以确保你的作品合身且垂坠自然。对于马甲项目，请勿使用弹性针织面料。同时还会列出所需辅料清单：缝线、拉链、纽扣、按扣等。


  **提示**


  购买布料时，大部分布料上都含有或浸有浆料。浆料是一种用于保持布料在卷筒上挺括无皱的溶液。我建议在裁剪纸样之前，先用你将来洗涤成品衣物的水温将布料进行清洗和烘干。这能预缩布料，并消除成品不合身的可能性。当然，如果你使用的是不能水洗的布料，就不要水洗。必要时进行干洗。


  ### 计算所需布料用量


  纸样通常会附带需要购买多少布料的估算。如果你在自制纸样，可以通过先测量要使用的纸样部件，或测量要覆盖的身体或物体尺寸，来确定所需布料量。布料的幅宽各不相同。在美国，最常见的幅宽是
  40 英寸和 60 英寸。请记住，所有纸样部件必须朝同一方向排列。如果你只是为了能放下所有部件而随意裁剪，想尽量少用布料，那么制成的服装或物品看起来会很奇怪，而且非常不合身。如果布料带有条纹或图案，且你希望前后片纹路对齐，那么就需要额外多买一些布料以便均匀对花。


  ## 使用纸样


  一旦你备好了纸样和布料，准备开工，就需要将纸样铺在布料上进行裁剪。本节对此进行概述，你可以在稍后的马甲制作示例中看到更多照片。




  ### 布局纸样


  将布料平铺在桌子、裁切板或地板上。布料应沿布边（已处理过的边缘，而非裁剪边缘）对折（图 4-4）。在图 4-4 中，布边位于图片底部。你可以看到我将布料往回折叠，使布料正面朝内折叠。演示布料正面带有些许闪光点，反面（服装内侧）则为哑光质地。


  ![A371637_1_En_4_Fig4_HTML.jpg](img/A371637_1_En_4_Fig4_HTML.jpg)


  图 4-4.


  折叠好的布料，准备裁剪——布边在底部，裁剪边在右侧

  注意


  如果布料有绒毛（如灯芯绒或天鹅绒），箭头方向应与绒毛平行，而非横向穿过。对于有强烈图案的布料也是如此。通常情况下，图案或绒毛方向应是平行于布边的。


  你将需要穿过两层布料进行裁剪。如果某块纸样只需裁剪一片，它会被放置在布料折叠处，而这片纸样仅代表成品的一半。例如，我们本章稍后将要制作的马甲后片就是放在折叠处的。其他纸样则需要放置，以便裁剪出两片相同的部分。图
  4-5 展示了我在裁开的杂货袋上手绘、然后别在布料上的马甲纸样。布料铺在一张纸板裁切板上，此例中我们准备将裁切板放在地板上使用。如果你有足够大的桌子，可能会觉得放在桌子上更方便。


  ![A371637_1_En_4_Fig5_HTML.jpg](img/A371637_1_En_4_Fig5_HTML.jpg)


  图 4-5.


  别在裁切板布料上的马甲纸样（布料无绒毛）。折叠边在底部，布边在顶部。


  我并未试图在这里最大化优化纸样布局；如果你使用的是昂贵的布料并且经常缝制衣物，那么在别针固定前多摆弄一下纸样位置是值得的。这样就能尽可能多地剩下布料用于其他项目。


  你会注意到布料上有许多纸样乍看用途不明。这些是贴边纸样——用于处理袖窿、领口及其他部位，而不仅仅是简单折边。在本例中，有一片贴边（用于后领口）位于布料折叠处，另外三片则需要各裁剪两片。


  纸样上有箭头指示布料的直丝方向（参见图 4-2 和 4-5 草图纸样上的箭头）。直丝方向与布边平行。


  纸样上设计有剪口（从服装裁剪线向外突出的标记，如图 4-6 所示），以帮助你组装服装并避免混淆。本章使用的纸样是我凭经验手绘的，即便如此，我也加入了几个不同形状的剪口，以便于我们追踪各部分对应位置。否则，很容易将服装部分内外装反或组装出错。这些剪口从服装裁剪线向外突出——有些纸样的剪口则从裁剪线向内凹陷。


  ![A371637_1_En_4_Fig6_HTML.jpg](img/A371637_1_En_4_Fig6_HTML.jpg)


  图 4-6.


  一个剪口


  ### 固定与裁剪纸样


  当你对折叠布料上的纸样布局满意后，用直针将纸样别在布上固定。确保别针没有伸到你将要裁剪的区域。


  裁剪时，用另一只手按住布料以保持稳定（图 4-7）。否则（尤其是在处理有弹性的布料时），剪刀可能会偏离纸样线条。这通常意味着你需要不断移动身体：一只手操作剪刀，另一只手压住布料。


  ![A371637_1_En_4_Fig7_HTML.jpg](img/A371637_1_En_4_Fig7_HTML.jpg)


  图 4-7.


  按压布料以剪出剪口

  提示


  裁剪时，要沿着裁剪线剪，而非缝份线。使用长而均匀的剪刀行程，并剪出剪口。建议只用你的布料剪刀裁剪布料。如果用它们剪纸或其他物品，刀刃会很快变钝。如果剪刀钝了，就很难干净利落地裁剪布料。


  ### 标记布料


  在移除纸样前，你可以用裁缝粉笔或可水洗笔，将所有你将用到的标记和结构线转移到布料的“反面”。记住，反面就是背面（服装穿着时不可见的部分，尽管某些贴边通常也不会外露）。对于简单的结构，比如本章的马甲示例，你通常无需为此费心。


  ## 制作一件简单的马甲


  现在我将带你一步步制作一件简单的无衬里马甲。我们先做马甲，因为它是一件相对较小的衣物，所需布料比裤子或衬衫少。这意味着即使你犯了严重错误，也不会毁掉一大块昂贵的布料。制作过程涉及使用标准纸样，并采用手缝和机缝结合的方式。


  对于可穿戴科技项目来说，马甲很方便，因为它可以套在其他衣服外面，并且比整条连衣裙或复杂的戏服更容易处理。所需的工具如图 4-8 所示，包括：


  ![A371637_1_En_4_Fig8_HTML.jpg](img/A371637_1_En_4_Fig8_HTML.jpg)


  图 4-8.


  制作马甲所需的材料，除缝纫机、布料、纸样和裁切板外。后三项已在图 4-5 中展示。


  *   一台缝纫机

  *   缝纫机针

  *   线轴（面线）

  *   简单马甲纸样（参见下方提示中的建议）

  *   与面线相同线的梭芯

  *   锋利的剪刀

  *   直针

  *   针插

  *   拆线器

  *   布料

  *   裁切板（可选）


  提示


  首次使用标准缝纫纸样时，务必阅读并遵循纸样附带的说明，理解并遵循纸样上印制的标记。此处的示例使用了我从头绘制的纸样，但我建议你第一次尝试时购买一个简单的纸样。你可以购买以下一些基础马甲纸样来配合本教程操作：McCall''s
  M6228（男女式马甲）、McCall''s M2260（女式无衬里马甲）和 Kwik Sew K3899（简易女式马甲）。


  这款马甲是基本设计，需要拼接的部件很少。你可以通过添加口袋、翻领、衬里、纽扣、按扣、系带或其他设计元素，使其成为一个更高级的项目。我们将在后续章节中展示你可能想要添加的不同电子元件。


  ### 选择布料


  对于你的首次尝试，我建议你购买一些非常便宜的棉布，因为过程中很可能会出错，没必要在花哨布料上浪费太多钱。请参考本章前面的讨论，了解需要购买多少布料。此处使用的布料是一种轻质涤纶，正面带有些许闪光点。




  ### 排版与裁剪纸样


  图 4-5 展示了背心纸样在面料上的整体排布。背心后片纸样将被固定到面料上，后中边缘对齐面料的折叠边缘（图 4-9）。


  ![A371637_1_En_4_Fig9_HTML.jpg](img/A371637_1_En_4_Fig9_HTML.jpg)


  图 4-9. 背心后片纸样


  背心前片纸样将被固定到靠近面料边缘的位置，而非折叠处。贴边（内部饰面）的排布方式与其所饰面的部件相同。一片贴边位于折叠处，其余贴边则远离折叠处（同样，你可以在图
  4-5 中看到整体布局）。


  ### 缝制背心


  裁剪并标记好纸样后，从面料的前片和后片上取下纸样。将前片与后片正面相对，在肩缝处用珠针固定（图 4-10）。注意观察当方向正确时，两片布料上的剪口是如何对齐的。


  ![A371637_1_En_4_Fig10_HTML.jpg](img/A371637_1_En_4_Fig10_HTML.jpg)


  图 4-10. 将背心前片固定到后片上


  #### 缝制肩部


  如果还没准备好，请给缝纫机穿好线并绕好梭芯（如第 3 章所述）。本例使用对比色线以便看清操作，但通常应选用与面料匹配的缝线。将肩缝放置到缝纫机上（图 4-11），然后将压脚放下压住布料。


  ![A371637_1_En_4_Fig11_HTML.jpg](img/A371637_1_En_4_Fig11_HTML.jpg)


  图 4-11. 将肩缝放到缝纫机上


  在开始机缝之前，先手动（通常使用手轮）将机针扎入布料。选择短直线线迹（针距短且紧密），沿着每条肩缝的缝线进行缝合。可以在缝合过程中或缝完后拆除珠针。（如果缝合时留着珠针，请注意要跨过珠针缝合，而不是直接扎在珠针上——这很容易导致缝纫机针断裂。）图
  4-12 展示了缝合效果。


  ![A371637_1_En_4_Fig12_HTML.jpg](img/A371637_1_En_4_Fig12_HTML.jpg)


  图 4-12. 肩缝的第一道线迹


  **注意：** 很容易不小心缝合比预期更多的面料层。缝合一道缝线时，务必确保背心的其余部分远离针下。


  不过，单一道线迹对服装接缝来说确实不够。如果就这样放着不处理，它可能会脱线。为了防止这种情况，我在刚缝好的线迹与布料裁边之间又加了一道之字形线迹（图 4-13）。


  ![A371637_1_En_4_Fig13_HTML.jpg](img/A371637_1_En_4_Fig13_HTML.jpg)


  图 4-13. 增加之字形加固线迹


  最后，我将缝份修剪了一下，使其更平整（图 4-14）。注意不要修剪过度，留出的缝份宽度略窄于之字形线迹的宽度即可。


  ![A371637_1_En_4_Fig14_HTML.jpg](img/A371637_1_En_4_Fig14_HTML.jpg)


  图 4-14. 修剪肩缝缝份


  #### 缝制侧缝


  为了缝制侧缝，将后片与前片的两片连接起来：用珠针固定，缝一道直线线迹，然后再缝一道双线加固（两道平行的直线线迹）。修剪缝份并将其熨开（图 4-15）。你可以使用熨斗，或者像我图
  4-15 中那样直接用手抚平。


  ![A371637_1_En_4_Fig15_HTML.jpg](img/A371637_1_En_4_Fig15_HTML.jpg)


  图 4-15. 缝合后熨开缝份


  #### 组装前贴边


  从贴边布片上取下纸样。将前贴边与后贴边正面相对，用珠针固定并缝合。修剪缝份并熨开。然后，将贴边与背心正面相对，沿缝线用珠针固定（图 4-16）。使用与之前相同的线迹沿缝线缝合。过弯位时要小心。我建议放慢速度，必要时停机调整角度。


  ![A371637_1_En_4_Fig16_HTML.jpg](img/A371637_1_En_4_Fig16_HTML.jpg)


  图 4-16. 将贴边固定到背心上


  将贴边缝到背心上后，在弯位处用锋利的剪刀剪出小剪口（必要时），以便形成平整的接缝（图 4-17）。修剪缝份，然后将贴边翻到背心内侧，使反面相对。将贴边整齐地熨平。


  ![A371637_1_En_4_Fig17_HTML.jpg](img/A371637_1_En_4_Fig17_HTML.jpg)


  图 4-17. 修剪弧形缝份


  最后，我要对这条缝线进行明缝。这意味着我将沿着贴边和背心外层缝合，形成一条与接缝平行的可见线迹（图 4-18）。明缝可以使用不同颜色的线作为装饰（像我这里做的），或者如果线色与面料更匹配，则仅作结构加固之用。


  ![A371637_1_En_4_Fig18_HTML.jpg](img/A371637_1_En_4_Fig18_HTML.jpg)


  图 4-18. 明缝一道缝线


  #### 组装袖窿贴边


  图 4-19 展示了袖窿贴边两部分的其中一端如何连接。从袖窿贴边上取下纸样。将贴边两端正面相对缝合，形成两个环形——每个袖窿一个。


  ![A371637_1_En_4_Fig19_HTML.jpg](img/A371637_1_En_4_Fig19_HTML.jpg)


  图 4-19. 袖窿贴边组装


  将袖窿贴边与背心袖窿正面相对，用珠针固定。沿着整个袖窿的缝线仔细缝合。放慢速度，过弯时停机调整。用锋利的剪刀在弯位剪出剪口并修剪缝份。将贴边翻到内侧并熨平。


  #### 下摆


  沿着背心下摆边缘，用长线迹或之字形线迹缝合（图 4-20）。将下摆边缘内折 1/4 英寸（0.64 厘米）并熨平。用手缝或机缝的方式缝好下摆（图 4-21）。


  ![A371637_1_En_4_Fig21_HTML.jpg](img/A371637_1_En_4_Fig21_HTML.jpg)


  图 4-21. 第二道收尾工序


  ![A371637_1_En_4_Fig20_HTML.jpg](img/A371637_1_En_4_Fig20_HTML.jpg)


  图 4-20. 下摆的第一道之字形线迹——注意贴边的双线加固。


  ### 其他收尾工作


  至此，你已经完成了一件基础款背心。回顾图 4-1 查看我的最终成品效果。此时，你可以根据自己的想法添加纽扣、按扣或其他装饰。


  ## 常见问题


  很容易犯一些愚蠢的错误，这可能会让人非常沮丧。缝合前，请务必确认你在正确的位置连接了正确的部件，并且面料正面相对。在开始裁剪或缝合之前进行双重检查很有帮助，尤其是在裁剪大块面料时，因为一旦裁得太小，可能会浪费很多布料。


  我做缝纫已经很久了，但有时因为想赶进度或走神，仍然会犯一些愚蠢的错误。需要特别注意的地方包括：贴边之间如何连接、贴边与背心如何连接，以及你正在使用的线迹类型。如果不得不拆掉一道缝线重新缝，也没关系。重新开始前，只需把所有的旧线头清理干净即可。




  ## 时尚科技设计注意事项


  在规划、裁剪和缝制服装时，要为电线、电池及其他组件预留空间。你可能需要添加口袋、布料导管，或采用其他方式来隐藏和收纳这些科技部件。


  提前规划好所有电线的走向有助于避免一些错误，并且希望这能让你在焊接或连接它们时无需拆开缝线。即使先用较便宜的布料或边角料制作一个样品，也能确保最终成衣的良好状态。


  同样重要的是，要考虑是否需要防止导电缝纫线或导电织物导致电路短路。要小心那些带有大量电路线且面料垂坠或宽松的服装。


  ## 总结


  本章讨论了如何选择纸样、各种类型的面料，以及如何测量以获得合身的尺寸，并推荐了一些可以购买用品的网站和商店。我们还讨论了如何固定和裁剪缝纫纸样，以及用于制作纸样的服装裁片基本形状。本章还包含了制作简单无衬里马甲的教程——这也是我们的第一个项目。


