  ### 雅卡尔项目


  谷歌的雅卡尔项目（https://atap.google.com/jacquard/）正将织物和服装转变为触摸屏。该项目由伊万·普皮列夫主导，正在创造一种新型的编织导电线。这种导线有多种颜色，可用于现有的工业织机和缝纫机，以实现服装的大规模生产。导电线连接到一个使用标准手表电池的小型蓝牙控制器，控制器可存放在口袋中。这使得织物或服装能够与各种设备协同工作，包括触摸屏、智能手机、其他媒体设备以及室内灯或恒温器。触摸传感器网格可以直接编织到服装中，这样用户就可以通过滑动袖子来发送信号，同时还可以控制
  LED 灯以引起穿着者的注意。


  ## 服装遇上物联网


  在服装中乃至嵌入人体使用技术的想法，在科幻小说中已存在已久。尼尔·斯蒂芬森的著作《钻石时代：或，一位年轻女士的插图版入门书》（Bantam Spectra, 1995）中描绘了用于制作服装（或任何东西）的"物质编译器"。在亚瑟·C·克拉克、弗兰克·赫伯特、雷·布拉德伯里等人的作品中还有更多例子。


  在电影《回到未来 2》中，马蒂·麦克弗莱拥有自动系带的鞋子和自动烘干的夹克。耐克公司终于在去年凭借其 HyperAdapt 自动系带鞋（http://news.nike.com/news/hyperadapt-adaptive-lacing）赶上了科幻潮流。


  如果自动化服装受到远程控制（或感知），事情会变得更加复杂。所谓的物联网（IoT）有多种定义。我们在此说明，物联网涉及世界上的某个物体（如鞋子、连衣裙、冰箱或恒温器）上的传感器或致动器，这些传感器或致动器连接到互联网，以便在远距离采取行动或报告数据。


  可穿戴设备和物联网的未来不仅限于健身、娱乐和时尚领域，还涉及健康和医疗领域。通信和界面开发的创新正在改善患者监测健康状况的能力。健身追踪器是这方面的早期例子，但更先进的设备已开始获批用于医疗用途，例如连续血糖监测仪，它可以无线传输糖尿病患者的血糖状态给佩戴者，并在需要时传输给护理人员（http://www.dexcom.com/products）。谷歌已经开发出嵌入芯片以感测葡萄糖水平的隐形眼镜。


  持续监测和通信的设备引发了一些隐私问题，但也可能使某些疾病患者过上更安全、更独立的生活。在我们看来，为独立生活的老年人设计的可穿戴传感器是一个特别有前景的领域。




  ## 最后几点想法


  随着新技术的应用速度越来越快，各领域面临的重大挑战之一就是如何让技术保持有用、高效且令人向往。当电子元件变得更小更智能时，将它们融入日常服装和配饰也变得更简单。然而，始终牢记穿着你作品的用户这一点至关重要。


  我们在本书中试图强调的一点是：提前思考服装将如何使用，以及你所考虑的技术是否能在预期环境中正常工作。


  本书开篇探讨了可穿戴技术的一些理念以及什么才算优秀的服装设计。接着，我们传授了可穿戴技术所需领域的基础技能，并以围裙项目作为总结。随后，我们介绍了传感器、3D
  打印技术，并讲述了一个因首个项目过于雄心勃勃而导致失败的警示故事。在后几章中，我们展示了更具挑战性的项目，讨论了其他可用的技术，并展望了研究人员未来可能引领的方向。


  即便如此，前几章的一些基本原则依然适用。无论你是制作一个能让朋友开怀大笑的发光毛绒玩具，还是一件复杂的艺术品，在设计时都应考虑以下几点：


  *   设计是否已尽可能简洁？人们往往倾向于把事情搞得不必要的复杂。

  *   详细设想用户穿着这件服装时会如何活动，思考哪些地方可能钩挂、断裂、磨损或短路。本书中的项目专为室内使用设计；请考虑整体环境，并思考如何在应对天气和洗涤时拆卸电子元件和电池。

  *   你是否知道如何完成项目，或者是否还有需要学习的东西？如果项目中有些部分对你而言仍是一片迷雾，你可能需要先学习那些内容，然后再处理熟悉的部分。人们常常无法完成项目，因为他们先做了自己熟悉的部分，结果发现为了适配新组件，这部分本应做得不同。于是整个项目就被搁置在角落多年。

  *   尽量团队合作。同时精通缝纫、电子和编程很难。有些人能做到，但大多数人需要几个帮手。如果你所在城市有从事这类创作的创客空间，不妨考虑加入。我们三人能够共同创造出任何一个人都无法独立完成的项目。

  *   分享你的想法！本书讨论的大多数技术主要基于开源社区的工作。我们在书中遇到这些社区时都附上了链接。感谢那些过去做出贡献的人的最佳方式，就是在此基础上进行创新，并在你成功时分享。


  我们希望你喜欢这本书，并觉得自己学到了很多。现在，走出去，创造一些酷炫的东西——然后教会别人如何制作。


  ## 总结


  在本章中，我们探讨了本书其他部分所讨论的技术在专业时尚领域的应用。我们还介绍了新的纺织层面技术，这些技术可以使致动器或传感器的嵌入真正做到无缝。最后，我们回顾了本书的脉络，提出了一些关于良好设计实践的想法。


  '
- "# 附录 A：教授时尚科技\n\n对于那些希望开设涵盖本书大部分内容的时尚科技课程的人，本附录列出了一些你可能需要考虑的事项。我们还根据本书中的项目提供了一些课程安排示例。\n\
  \n本附录中的内容基于 Lyn 多年在高中教授各类课程的经验，以及 Joan 教授本科生和研究生的经历。我们还借鉴了三位作者收集到的各种同事实验结果的轶事证据，以及\
  \ Lyn 与 Joan 和 Rich 作为顾问共同教授的一门时尚科技服装设计课程试点版本的经验。\n\n## 课程目标与评分\n\n一门为期一年的高中课程或两个学期的大学选修课，其课程描述、学习目标和评分标准可能类似于本节所述。组织这类课程的一个好方法是，通过难度递增的项目来教学。孤立地讲课效果并不理想。基于项目的教学还能让学生按照自己的节奏学习，并使经验丰富的学生能够从事更困难的项目（或指导经验不足的学生）。\n\
  \n### 课程描述\n\n参与者将完成一系列理论与实践项目，以帮助理解设计和制作服装所涉及的过程。学生将培养并提升构思与表现技能，这些技能将有助于思考服装设计及其与戏剧制作的关系。学生还需学习电路和编程的基础知识，包括至少完成一个时尚科技项目。每个项目都将经历多次迭代和演示，供教师和同学讨论与评议，并可能邀请外部评审参与。\n\
  \n### 学习目标\n\n在时尚科技课程中，学生将实现以下部分或全部学习目标。大学课程可更侧重理论原理，而高中课程则可更偏向动手实践。\n\n*   学习手缝和机缝的基础知识。\n\
  *   理解电路设计和编程的基本要素，以便使用 Arduino 兼容的电子元件制作可穿戴设备。\n*   学习设计并 3D 打印定制物品的流程。\n*   欣赏服装设计的过程及其历史背景。\n\
  *   了解哪些技术适合初学者设计师/制作者，以及如何获取课堂上未明确教授的技能。\n*   学习如何处理和解决设计挑战与问题，以及如何解读和应用优秀设计与构造的原则与要素来创作服装及其他项目。\n\
  \n### 评分标准\n\n评估学生在上述学习目标上的达成程度始终是一个挑战。技能测试或演示可用于技能部分，但总的来说，我们认为项目是检验技能掌握程度的更好方式。除了定期的正式评估外，在每次项目迭代的评议和建设性批评分享过程中——包括教师和学生之间的互动——也能学到很多东西。\n\
  \n面对如此主观的课程目标，除了上述通用标准外，很难制定出一套放之四海而皆准的评分细则。教师还可以根据学生的课堂参与度、出勤率以及其在完成项目中所展现的技艺水平和进步程度来评估其努力程度。\n\
  \n**提示**\n\n“成功”并不一定意味着一个完美的项目。学生的起点各不相同，因此如果他们在一学年中取得了进步，就需要让他们感受到成就感，而不要将他们与水平更高的其他学生进行比较。\n\
  \n## 后勤问题\n\n基于项目的课程——尤其是可能跨多个学科的课程——常常会带来后勤方面的挑战。在本节中，我们建议你在规划时尚科技或类似课程时需要思考的一些事项。\n\
  \n\n\n### 课程安排\n\n课程安排需要具备一定的灵活性，因为同一个项目可能让不同的学生花费截然不同的时间去完成。一名学生可能会在第 3 周开始一个项目并在第\
  \ 7 周完成，而另一名学生可能在第 5 周完成项目，然后开始另一项工作并于第 10 周完成。教师需要适应学生既向自己学习、也向彼此学习的方式；教师无需频繁授课，但更常在项目需要时进行一对一的指导。\n\
  \n这门课也可以围绕“即时学习”来构建——第一个为了自己的项目需要学习某样东西的学生，之后会将知识传授给其他人；或者当有人在学习新东西时，其他人暂停手头工作并观摩学习。这种模式在小规模的试点班级中运行良好，但要扩大规模可能需要仔细考量。因此，我们不会列出每周的详细安排，而是建议一组混合的项目。如果是大班教学，可能需要更结构化的安排。\n\
  \n这门课很难在一小时的课时内进行，因为光是拿出和收起当天的材料就会耗费大量时间。如果可能，我们建议将其安排为两节连上的大课，或者在一年中的几周内（例如，为支持学校戏剧制作而制作服装时）安排带有强制性课后或周六时间的集中课程。\n\
  \n### 材料共享\n\n对于大班来说，许多人需要共享资源，比如缝纫机、裁剪台、焊接工位等等。分阶段安排项目，让不同的人做不同的事，有助于实现这种共享。需要提前想好，当人们的工作进度出现差异时，或者（可能更麻烦的是）当所有人同时进入同一个阶段时，你将如何利用你的教室空间。\n\
  \n同时，也要考虑半成品（进行中的作品）的存放位置。如果有多个班级共享材料，那么在每节课结束时拆解和拆除电路可能会令人沮丧或不切实际，因此你可能需要为每个班级准备一套独立的材料。\n\
  \n不过，在课间，这些材料需要有地方存放。根据我们的经验，学生的项目似乎总会不断扩张，填满所有可用的空间，此外再多出 10%你希望拥有的空间。另外，还要考虑如何展示（以及如何选择）优秀的项目作品。\n\
  \n### 教室环境\n\n为时尚科技课提供设施可能是一项挑战。配有高脚凳、适合电子实验的实验台可能不适合缝纫，因为缝纫机有脚踏板，坐在实验高脚凳上可能够不着。如果课程将在电子实验室或缝纫室进行，请务必实际尝试一下该房间通常不进行的活动。例如，在学生到达之前，先在电子实验室里试着缝纫。\n\
  \n很难让整个教室的学生都能看清你如何演示缝纫或组装电子器件。可以考虑提前通过电子邮件将照片发给学生，或者以电子方式分享它们。我们尝试过用网络摄像头和视频展示台，但你的手指往往会挡住视线。\n\
  \n> **提示**  \n> 确保你拥有良好的工作照明，无论是对电子操作还是缝纫都是如此。\n\n### 预算\n\n这门课的材料费可能会变得很昂贵，这取决于你是让每个学生独立制作一个项目，还是让他们组队合作，以及学生能否将项目带回家，还是必须拆解他们的缝纫电路以回收电子零件。小型电子元件、布料、辅料、培训和机器维护的累计成本，可能要高于你的资本设备预算（用于缝纫机和\
  \ 3D 打印机）。\n\n## 课程资源\n\n许多学生难以应对开放式设计和发明。本节提供的资源可能会有所帮助。应定义一个既不太宽泛也不太狭窄的项目起点。例如，建议学生为即将到来的演出制作一个简单的道具或戏服部件，这可能足够聚焦，能让学生顺利启动。\n\
  \n教导他人设计需要在引导和鼓励自我表达之间取得微妙的平衡。设计教育文献中有许多关于这一主题的优秀书籍，但大多针对大学本科生的课堂使用。对于大学生，或作为高中教师的背景准备，我们推荐：\n\
  \n*   唐纳德·诺曼的经典之作《设计心理学》（Basic Books, 2002）\n*   亨利·佩卓斯基的著作，尤其是《工程师的思维方式》（Vintage\
  \ Books, 1992）\n*   彼得·福布斯的《壁虎之足》（Norton, 2005），提供仿生学思路（是项目灵感的良好来源）\n*   霍瓦特和卡梅隆的《新车间课程》（Apress,\
  \ 2015）\n\n学习缝纫和制作/使用纸样（戏剧方向）：\n\n*   芭芭拉与克莱图斯·安德森的《戏服设计》第二版（Harcourt Brace College\
  \ Publishers, 1999）\n*   雪莉·迪林的《优雅节俭戏服》（Meriwether Publishing, Ltd., 1992）\n*  \
  \ 希拉·杰克逊的《舞台戏服》第二版（New Amsterdam Books, 2001）\n*   南希·布拉德菲尔德的《1730–1930 年戏服细节》（Costume\
  \ and Fashion Press, 隶属于 Quite Specific Media Group, Ltd., 1997）\n*   `http://sewing.craftgossip.com`\
  \ 和 `www.wikihow.com/sew-using-patterns`\n\n电子学背景知识：\n\n*   贝基·斯特恩和泰勒·库珀，《Adafruit\
  \ Flora 入门指南》（Maker Media, 2015）\n*   凯特·哈特曼，《可穿戴电子设备》（Maker Media, 2014）\n*   教程网站：`https://learn.adafruit.com`、`https://learn.sparkfun.com/tutorials`\
  \ 和 `www.instructables.com`\n\n## 课程内容大纲\n\n本节建议了在为期一年的课程中学生需要完成的一系列项目，这些项目与本书中的内容相关联。这门课需要大量的准备时间；在让学生开始之前，教师应亲自使用他们将要使用的设备，完整地走一遍学生将要构建的流程。很容易因为软件不可用、某个小零件短缺等原因而浪费时间。\n\
  \n本大纲假设学生对缝纫、编程和电子学一无所知。尤其是在大班中，情况可能并非如此，这时可以招募基础较好的学生来帮助经验不足的同学。有一定基础的学生可以跳过一些建议的项目，利用这段时间辅导其他同学，或者转而进行更高级的项目。\n\
  \n> **提示**  \n> 所需时间会根据学生经验和班级规模而有很大差异。显然，（大纲中的）主要项目也可以调整为季度或学期项目。请预留出解决问题和应对意外情况的时间，特别是当你第一次教授这门课时。\n\
  \n\n\n### 项目\n\n第一个项目应是一个简单的、不需要大量合体调整的项目。可以是第 7 章中的围裙，或者是一个带有发光眼睛的小型填充动物玩具。你也可以从现有的服装（比如一顶帽子）开始，为其添加一个`NeoPixel`电路。无论哪种方式，样板开发的工作量都应该是最小的。\n\
  \n第二个主要阶段（第 10-15 周）的项目可以是一件需要大量合体调整和样板修改的服装，并且组装过程更复杂。第 4 章的背心可以作为一个简单版本，或者你也可以对其进行装饰。\n\
  \n在学生们掌握了这两个项目之后，剩余时间（或者另一个学期，如果你的课程是 13 或 15 周的话）可以用来整合 3D 打印（第 9 章），如果学校有相应的工具和设施（第\
  \ 12 章），也可以使用其他技术，或者开展包含传感器的项目（第 8 和 11 章）。\n\n如果你想做得更别出心裁，可以考虑一些仿生项目——以某种方式模仿自然的织物和电子项目，或者制作一件带有触摸感应传感器的艺术品（比第\
  \ 7 章的围裙上的平底锅更进一步）。\n\n### 课程安排\n\n对于一门以本书为教材、为期一年（或两个学期）的课程，一个暂定的安排如下：\n\n-   **第\
  \ 1-9 周**：包含发光组件的简单项目。此项目不应要求学生进行大量测量。一个选择可能是第 7 章的围裙项目。教师应阅读第 10 章，了解应避免的注意事项，并制作一些示范项目，向学生展示后续内容。\n\
  \    -   **第 1-2 周**：回顾良好设计实践。设计、绘制草图、制作样板。阅读第 1 至 4 章和第 7 章。\n    -   **第 3 周**：选择面料并裁剪样板。\n\
  \    -   **第 4-5 周**：机缝服装接缝，手缝细节。\n    -   **第 6 周**：介绍`Fritzing`，使用鳄鱼夹布置电路。阅读第\
  \ 5 章。\n    -   **第 7-8 周**：缝制电路并运行代码。阅读第 6 章。\n    -   **第 9 周**：完成项目并记录归档。\n-\
  \   **第 10-15 周**：下一个项目可以是一件简单但仍需为穿着者进行一定合体调整的服装。一个例子是第 4 章的背心。这里可以融入历史方面的内容。\n\
  \    -   **第 10 周**：选择市售的服装样板（或自创一个），添加设计元素，为穿着者进行试穿调整。\n    -   **第 11-12 周**：选择面料，裁剪样板。\n\
  \    -   **第 13-14 周**：机缝和手工收尾，并记录归档项目。\n-   **第 16 周至学年末**\n    -   更复杂的项目，例如学校演出的戏服或其他项目。阅读第\
  \ 9 至 13 章。\n    -   研究社会影响对戏装发展的历史背景，或更深入地探讨时装设计原理领域。\n    -   小组点评。\n    -   实地考察，邀请外部讲师。\n\
  \n前九周内容涵盖了方方面面，所以如果你想开设一个“体验式”的学季或学期课程，完全可以完成这些内容后结束。第二个六周阶段则更深入地探讨了如何制作一件需要合体调整的服装，并且可以融入合体性以及其它服装设计问题的考量。这前\
  \ 15 周可以构成一个学期的课程。剩余时间将用于学生的自选项目。\n\n"
