- "# 5. 可穿戴科技电子学\n\n在第 3 章和第 4 章中，Lyn 为你提供了缝纫教程，以及制作项目中可穿戴“织物”部分的技能。在本章和第 6 章中，Joan\
  \ 和 Rich 将向你介绍可穿戴科技项目中的“科技”部分。本章介绍本书后面项目所需的电子硬件基础知识。第 6 章则补充了关于这些电子设备如何运行的软件基础知识。\n\
  \n**注意**\n\n如果你想学习缝纫（正如 Lyn 在第 3 章中所描述的那样），网上有很好的视频教程，这些技能相对独立，并且更适合碎片化地学习。然而，在可穿戴科技设计的电子学方面，你需要具备一定的基础知识才能起步。Rich\
  \ 和 Joan 在本章中提供概述，但网上还有很多（也许是太多了？）资源供你深入探索。特别是[`http://arduino.cc`](http://arduino.cc)和[`www.instructables.com`](http://www.instructables.com)是学习\
  \ Arduino 生态系统基础知识的好去处，许多制造商，例如 Adafruit ([`http://learn.adafruit.com`](http://learn.adafruit.com))\
  \ 和 SparkFun ([`http://learn.sparkfun.com`](http://learn.sparkfun.com))，都为其基础产品提供了详尽的教程。一本基础的电子学教科书也可能有所帮助；你可以查阅当地图书馆的现有藏书，看看哪些符合你当前的知识水平。\n\
  \n## 电路设计\n\n开始学习任何新领域时，首先要做的就是快速掌握大量词汇。我们两人都不特别喜欢罗列单词，因此在本节中，我们将通过上下文讨论来定义关键概念。\n\
  \n你需要知道的第一个词是`Arduino`。（是的，它确实是以意大利伊夫雷亚的一家酒吧命名的。）它是一个开源平台（一个允许其他人基于其进行设计的标准），包括一系列微控制器板和集成开发环境（IDE）软件，你将在第\
  \ 6 章中学习。图 5-1 显示了一块常见的`Arduino`板。图 5-2 是来自`Fritzing`程序（本章稍后会讨论）的一个版本，其中包含一块面包板和一些电路元件。我们稍后会讨论面包板。\n\
  \n![A371637_1_En_5_Fig2_HTML.jpg](img/A371637_1_En_5_Fig2_HTML.jpg)\n\n图 5-2. 一个`Arduino`（蓝色电路板）和一块面包板上的电路\n\
  \n![A371637_1_En_5_Fig1_HTML.jpg](img/A371637_1_En_5_Fig1_HTML.jpg)\n\n图 5-1. 一个`Arduino`\n\
  \n像`Arduino`这样的微控制器，与你习惯使用的 Mac、Windows 或 Linux 电脑并不完全相同。微控制器通常控制一些不太复杂的东西。虽然有变通方法，但它们通常只是反复执行一组指令，无法像你的笔记本电脑或智能手机那样在多个程序或应用之间来回切换。然而，这种能力足以驱动你的衣物项目。\n\
  \n一个`Arduino`有`引脚`，即电路板上的电气触点。母头排针永久性地固定在板上，这样你可以插入跨接线或其他板上的公头排针。（用于焊接的板子有不同的排列方式。）\n\
  \n`Arduino`板还有一个`USB`连接器，既可以给板子供电，也可以向其发送代码。你将在第 6 章中了解更多关于这些`引脚`及其工作原理。现在，我们只是要把`Arduino`当作一个高级电源来驱动电路。\n\
  \n### 面包板\n\n图 5-2 中那个带有孔洞的白色矩形物体叫做面包板。面包板旨在让你轻松构建电路——即能实现某种功能的电子元件的组合。\n\n面包板上成组的孔洞代表电气连接。电路通过让电流流过元件和导线来工作。电压是电路中某一点与参考电平之间的电势差（如果你受过物理学家训练，可能想把它理解为这两点之间的势能差）。（图\
  \ 5-2 的示意图以及本章中的其他示意图均使用`Fritzing`软件创建——参见[`www.fritzing.org`](http://www.fritzing.org)。）\n\
  \n电流是从电路中一点流向另一点（具有不同电压）的电荷流动。电流遇到电阻会导致两点之间产生电压降。电压、电流和电阻通过一个称为欧姆定律的方程联系在一起，我们将在下一节讨论。\n\
  \n面包板上的电源轨（或电源总线）和地线轨（或地线总线）是垂直成组的孔洞，通常分别标记为`+`和`–`，或者像图 5-2 那样用红色和蓝色的垂直线标记。它们被用作具有标准电压的位置，我们称之为高电平（通常为\
  \ 5 伏，在`Arduino`上标记为`5 V`）和低电平（地线，或零伏，在`Arduino`上缩写为`GND`）。\n\n每五个一组构成的水平行仅在这些五个一组的内部相连。中间凹槽两侧的五针之间没有连接。凹槽的存在是为了让你可以将双列直插式（DIP）封装元件（集成电路芯片的一种常见形式）的引脚跨过凹槽放置。这里你可以看到一个黑色的按钮跨在凹槽上。\n\
  \n我们将在接下来的部分中介绍你在这里能看到的所有其他元件——跨接线、LED、按钮开关。\n\n**注意**\n\n你可能有一个类似`Gemma`、`Flora`或`Lilypad`这样的可穿戴电子板，它是“Arduino\
  \ 兼容的”，并且看起来与图 5-1 中的板子不同。一些基本概念在传统的`Arduino`和面包板上比在可穿戴板子上更容易理解，在可穿戴板子上，我们即将描述的一些问题大部分时间都被隐藏起来。我们正在让你做好准备，以便在那些你需要了解电路板试图做什么从而能够绕开问题的时候派上用场。你不必为了跟上本章内容而特意购买标准的`Arduino`板和面包板，但如果你愿意，可以从[`www.sparkfun.com`](http://www.sparkfun.com)或[`www.adafruit.com`](http://www.adafruit.com)这样的供应商那里购买一套入门级的`Arduino`套件（这样你就能得到所有需要的零件）。否则，就跟着这里的内容学习，你将能更好地理解和欣赏你的可穿戴组件为你所做的一切。\n\
  \n\n\n### 欧姆定律\n\n要设计电路，你需要对电的工作原理有一定了解。本章讨论的许多内容都基于一个基本法则——欧姆定律。欧姆定律可以非常简单地表述为：电压等于电流乘以电阻，通常写作\
  \ `V = I * R`。（这里使用 `*` 表示乘法，与计算机代码中的惯例一致。）\n\n**注意**\n\n根据维基百科，电流用 `I` 表示，是因为电流的单位“安培”以法国人安培（André-Marie\
  \ Ampère）命名，他将电流大小称为“intensité de courant”。电流的单位是安培（通常简称为安，用大写 `A` 表示）。电压的单位是伏特，通常用大写\
  \ `V` 表示。电阻的单位是欧姆，通常用希腊字母欧米伽 `Ω` 表示。在网络上，当人们不想费力输入希腊字母，或担心文本编码转换后丢失时，有时会用 `R` 代替\
  \ `Ω`。\n\n我们经常需要讨论非常大或非常小的电压、电流或电阻，这时会引入像毫（milli-）这样的前缀。一毫伏（`mV`）等于千分之一伏，一毫安（`mA`）等于千分之一安。其他前缀包括：\n\
  \n- 兆（`M`）= 乘以 1,000,000\n- 千（`k`）= 乘以 1,000\n- 微（`μ`）= 1/1,000,000\n\n电压在整个电路中会发生变化，并且是相对于一个任意基准点（称为地）来测量的。由于电压是相对于地来标定的，因此地被定义为零伏。在大多数电路，比如我们面包板上搭建的电路中，地是电路中的最低电压，这样可以避免出现负数。由于电压会随着你在电路中的位置不同而改变，因此它是电路特定点上的属性，而不是整个电路的属性。实际上，更好的思考方式是关注电压在元器件两端的差异，即电压降。显然，如果元器件低电位一端是零伏，计算起来会更简单，这正是大多数电路如此布置的原因。\n\
  \n### 电路元件\n\n两点之间的电压差会导致电流在这两点之间流动。如果你想在保持电路某部分两端电压不变的情况下，限制流经该部分的电流，就需要在电路中增加电阻。毫不意外，只增加电阻的元件被称为电阻器。（其他元件也会增加电阻，但电阻器只有这一种功能。）\n\
  \n电阻器（以及其他元件）可以串联——即电流先流经一个，再流经下一个——也可以并联，即电流在某一点分流，同时流经电路的两个部分。\n\n如果并联电路中的两条路径电阻不同，电流倾向于选择电阻最小的路径，并且在分流点的那一侧会有更多电流流过。也就是说，会有更多电流流过电路中电阻较低的部分，但这两个部分会有相同的电压降。\n\
  \n在串联电路中（比如两个电阻依次相连），所有电流都必须流经同一条路径。相同的电流会流过两个电阻，但每个电阻会有各自的电压降，该电压降与其在电路总电阻中所占的份额成比例。\n\
  \n#### 电阻器\n\n由于电阻器是相当小的元件，我们需要一种也能按比例缩小的标记方法。电阻器上通用的是一种色环系统。例如，在图 5-3 中的四环电阻器上，有棕-黑-红条纹，然后是一个小间隔，接着是金色条纹。\n\
  \n![A371637_1_En_5_Fig3_HTML.jpg](img/A371637_1_En_5_Fig3_HTML.jpg)\n\n图 5-3. 一个四环电阻器和一个五环电阻器\n\
  \n如图 5-3 所示，两种主要惯例是四环电阻器和五环电阻器。你可以在 [`https://en.wikipedia.org/wiki/Electronic_color_code`](https://en.wikipedia.org/wiki/Electronic_color_code)\
  \ 上找到关于颜色含义的详细解释，也可以在线搜索“resistor color chart”（电阻色环表）。我们将计算图 5-3 中两个电阻器的阻值，以便让你有个概念。\n\
  \n在四环电阻器上，前两个色环给出电阻值的前两位数字，第三个色环告诉你需要乘以 10 的多少次方。棕色代表 1，黑色代表 0，红色代表 2。因此棕-黑-红表示阻值为\
  \ `10` 乘以 `10²`，即这是一个 `1000 Ω` 的电阻器。金色条纹是误差环，它标明了该电阻器标称阻值的实际保证范围——对于金色环来说，是正负 5%。\n\
  \n五环电阻器是黄-紫-黑-黑-棕，计算结果为 `470 Ω`，误差为正负 1%。（黄色是 4，紫色是 7，黑色是 0，所以这是 `470` 乘以 `10⁰`。按照惯例，任何数的零次方都等于\
  \ 1。）棕色误差环表示这是一个正负 1% 精度的电阻器。注意，无论是四环还是五环电阻器，乘数环并不表示最终电阻值的数字位数——它与科学记数法不同（如果你之前接触过的话）。在四环电阻器中，是将一个两位数乘以\
  \ 10 的某次方；在五环电阻器中，是将一个三位数乘以 10 的某次方。\n\n在图 5-3 中，误差环位于四环电阻器的顶部，五环电阻器的底部。我们这样摆放松是为了展示区分它们可能有多困难。经验会让你对常用电阻器有所感知。第一次从包装中取出电阻器时要仔细观察，以便学习辨认。理论上，在表示阻值的最后一环与误差环之间应该有一个间隔，但通常很难看出来。\n\
  \n以下是一些常见的四环电阻器（忽略其误差环）：\n\n- 1 kΩ: 棕黑红\n- 10 kΩ: 棕黑橙\n- 470Ω: 黄紫棕\n\n#### LED\n\
  \n发光二极管（LED）是一种低功耗光源，当电流沿一个方向（而非相反方向）通过时它会发光。LED 有一条腿比另一条长。独立 LED 较长的一侧应连接到电路的 `+`（`HIGH`，接\
  \ `Vcc` 或 `3.3 V`）端。NeoPixel 灯珠有独立的电源（`+`）和地（`–`）接头。NeoPixel 还有信号输入和信号输出焊盘，我们将在第\
  \ 6 章讨论。图 5-4 展示了这两种类型各一个。\n\n![A371637_1_En_5_Fig4_HTML.jpg](img/A371637_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4. 一套可缝纫的 NeoPixel 3-LED 灯组（左）和一个普通单颗 LED（右）\n\n不同颜色的 LED 会产生特定且固定的电压降。在 [`https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials`](https://en.wikipedia.org/wiki/Light-emitting_diode#Colors_and_materials)\
  \ 上有一个表格对此进行了说明。通常，这些值在 2 到 4 伏之间。LED 无法承受过高的电流通过，并且会阻止电流以错误方向流过。\n\n\n\n### 电阻选型\n\
  \n假设我们要创建一个能让 LED 点亮而又不会烧毁它的电路。首先，查看通常在购买 LED 的网站上列出的数值，或者仅凭对 LED 常见值的了解，我们会发现一个红色\
  \ LED 能承受的最大电流约为 35 mA（即 0.035 安培）。Arduino 通常最大输出 5 伏特电压、约 20 mA 电流。因此，我们需要在 LED\
  \ 电路中串联一个电阻，以免损坏 LED 或控制它的 Arduino 引脚。但电阻要多大呢？\n\n欧姆定律指出 `V = I * R`，或者我们可以将其变形为\
  \ `R = V / I`。LED 会固定降低约 2 伏特的电压。这意味着我们的未知电阻上将下降约 3 伏特（5 伏特减去 2 伏特）。\n\n我们希望通过 LED\
  \ 的最大电流是 35 mA，这超过了 Arduino 的最大输出 20 mA（20 mA = 20/1000 A = 0.02 A）。我们选择对 LED 安全的最大电流与可能损坏\
  \ Arduino 引脚（20 mA）的电流中较小的那个值。因此，我们需要的电阻为 `R = V / I = 3 / 0.02 = 150 Ω`。所以我们至少需要一个这么大的电阻。在这种情况下，电阻值更大一些也是可以的（它只会降低\
  \ LED 的亮度）。\n\n**注意**  \n更复杂的元器件也有电阻，但其阻值可能会根据该元器件当时的工作状态而变化。不要想当然地认为只有电阻器才有有限的电阻。\n\
  \n### 杜邦线\n\n为了连接面包板上的各个点，或者将面包板与 Arduino 相连，我们使用杜邦线。它们就是中间有绝缘层、两端露出硬质金属丝的导线。图 5-5\
  \ 展示了常见的普通类型以及不太常见的“预成型”扁平跳线，它们看起来像巨大的订书钉。\n\n![A371637_1_En_5_Fig5_HTML.jpg](img/A371637_1_En_5_Fig5_HTML.jpg)\n\
  \n*图 5-5. 普通杜邦线与预成型杜邦线*\n\n像订书钉那种类型的优点在于，对于初学者来说追踪线路走向要容易得多。这两种类型都称为公对公跳线，因为两端都是公头连接器。其他类型的连接器偶尔也会用到（例如公对母跳线）。\n\
  \n## 分压器\n\n分压器是电路的一部分，其中使用两个或多个电阻来改变连接到电路输入或输出端的电路部分的电压。当两个或多个电阻串联时，它们的电阻值相加得到总电阻。\n\
  \n当电压在一系列串联电阻上下降时，它们之间会产生中间电压。典型的结构类似于图 5-6 所示（图中展示电阻也可以用波浪线表示——这两种画法是等效的）。\n\n\
  ![A371637_1_En_5_Fig6_HTML.jpg](img/A371637_1_En_5_Fig6_HTML.jpg)\n\n*图 5-6. 分压器*\n\
  \n### 模拟与数字的接口\n\nArduino 电路可以使用电流做两件事（可能同时进行）：为元器件供电，或者使 Arduino 特定引脚上的电压发生变化。后者通常被称为逻辑信号，电路设计通常使得数字引脚上的电压（更多内容见第\
  \ 6 章）要么明确为高电平，要么明确为低电平。\n\n当数字输入需要“看到”某个可靠的电压，并以此电压作为执行操作的基础时，分压器就很有用。例如，一个引脚为高电平或低电平可能会使\
  \ Arduino 上运行的程序执行某个操作。带有上拉或下拉电阻的按钮或开关也是一种分压器。在这种情况下，其中一个电阻（按钮）在按下时（对于常闭开关，则是释放时）会从无穷大电阻变为零电阻。我们在第\
  \ 6 章中对此进行了大量讨论。许多传感器都用在这样的电路中，因此你也可以在第 8 章中查找相关示例。\n\n分压器可用于改变逻辑信号的电压，以便让诸如输出为\
  \ 5 伏特的 Arduino 这类元器件与另一个期望以 3 伏特高电平信号发送数据的设备（例如加速度计）进行通信。\n\n但是，你不能使用分压器来产生为其他设备供电所需的\
  \ 3 伏特电压。因为设备需要汲取电流来自我供电，它相当于在分压器中的一个电阻上并联了另一个电阻，从而改变了有效电阻。理论上，在设备上串联一个合适的电阻应该能限制电流并适当降低电压，但实际上，即使流过设备的电流发生变化（例如，当其输出端开启和关闭时很可能发生这种情况），设备也需要一个恒定的电压。\n\
  \n为此，需要使用电压调节器来产生恒定的输出电压，大多数 Arduino 板都内置有 5 伏特和/或 3.3 伏特的电压调节器。\n\n### 电位器\n\n\
  有时，改变电路中特定点的电压是很有用的。当分压器中的一个或两个电阻可以改变其阻值时，你会得到一个可变电压，该电压可以被 Arduino 上的模拟输入引脚读取。\n\
  \n最常见的形式是电位器，有时也称为可变电阻器或变阻器。电位器是一个大的电阻器，带有一个滑动端，可以在电阻器的任意位置建立导电连接。\n\n这意味着从一端到另一端，电位器可能测得\
  \ 10 kΩ，但滑动端的一侧可能是 0 kΩ，另一侧是 10 kΩ，也可能是 4 kΩ / 6 kΩ，或者 8.73 kΩ / 1.27 kΩ，或者任何其他比例。因此，如果你将电位器的两端分别连接到\
  \ 5 V 和地线，你可以转动电位器的旋钮，在滑动端上获得介于这两者之间的任意电压。\n\nArduino 可以读取这个电压，从而知道电位器或用作分压器的等效设备（如第\
  \ 8 章中的传感器）的位置。\n\n### 示例\n\n如果电阻串联电路位于两个不同的电压电平之间，通常是 5 V 和地线（0 V），那么整个串联电阻上的总电压降将等于这两个电压之差，但串联电路中任何一个特定电阻上的电压降将与其占总电阻的比例成正比。因此，对于一个\
  \ 2.2 kΩ 的电阻和一个 3.3 kΩ 的电阻，2.2 kΩ 电阻将分得 2 伏特电压，3.3 kΩ 电阻将分得 3 伏特电压。如果 2.2 kΩ 电阻连接到\
  \ 5 V，而 3.3 kΩ 电阻连接到地线，那么两个电阻连接点的电压将为 3 V。\n\n在制作分压器时，通常应使用阻值为几千欧姆的电阻，因为电流会一直流过分压器。在前面的示例中，总电阻为\
  \ 5.5 kΩ，因此电流为 5 V / 5500 Ω = 0.91 mA。如果我们改用 2.2 Ω 和 3.3 Ω 的电阻，电流将约为 910 mA（这可能超出了电源的提供能力——例如，Flora\
  \ 只有 250 mA 的调节器），并且两个电阻之间会耗散 4.55 瓦的功率（2.2 kΩ 电阻上 1.82 瓦，3.3 kΩ 电阻上 2.73 瓦）。（瓦特是功率单位，计算方式为电流乘以电压。也就是说，电压降为\
  \ 1 V、电流为 1 安的电阻会耗散 1 瓦功率。）\n\n这不仅浪费，而且你在面包板上使用的电阻通常额定功率仅为四分之一瓦，如果试图耗散那么多功率，它们就会烧毁。\n\
  \n另一方面，如果你使用几百兆欧姆（MΩ）的阻值，你的信号可能会非常嘈杂，因为电阻之间导线上拾取的无线电波所产生的感应电流可能几乎与分压器两端的电压相当。分压器的总电阻通常应大致在\
  \ 1 kΩ 到 100 kΩ 的范围内。\n\n\n\n### 制作电路\n\n现在，我们将使用之前介绍的一些元件来制作一个电路。回顾图 5-2，我们看到一个简单的串联电路，其中包含一个\
  \ 470 Ω 电阻、一个 LED 和一个按钮。\n\n首先需要注意，从 Arduino 的 5 V 引脚连接到面包板垂直电源轨的一根长红色导线，以及从 Arduino\
  \ 的 GND（接地）引脚连接到旁边电源轨的一根较短导线，正如我们在本章前面的“面包板”一节中所讨论的那样。\n\n从上到下追踪这个电路，我们有一个 470 Ω\
  \ 的电阻与一个红色 LED 和一个按钮串联。查阅本章“LED”一节中引用的网站，我们看到红色 LED 两端固有压降为 1.8 V，误差范围为 ±0.2 V。\n\
  \nArduino 输出 5 伏电压。如果我们使用前面讨论欧姆定律时的例子，我们会发现 470 Ω 的电阻足够大，可以保护 LED。如果你将这个电路插入兼容电脑的\
  \ USB 端口并按下按钮，那么当按钮按下时，你应该会看到 LED 亮起。\n\n如果按下按钮，LED 通过电阻连接到 5 V，并通过按钮连接到 GND。这意味着有足够的电流流过\
  \ LED，它将亮起。如果按钮断开，LED 的一端连接到 5 V，另一端则连接到未知的、未设定的电压上。这被称为浮空状态。在本章中我们不必关心这一点，因为我们并不试图使用电路中的任何电压来控制其他东西。然而，在第\
  \ 6 章中我们将关注这一点，并在此引入一些概念来开始解释它。\n\n在图 5-7 中，我们展示了一种不同的电路。如果 Arduino 仅仅被用作电源，并且你按下按钮，什么也不会发生。LED\
  \ 仅连接到地，并通过引脚 12 弱连接到一个未知电压。按钮则位于一个独立的电路中。在第 6 章中，我们将把它作为下拉电阻的一个例子来研究。我们在这里引入它，是为了展示你可以在硬件中创建未连接的电路，而这些电路需要通过软件连接才能发挥作用。\n\
  \n![A371637_1_En_5_Fig7_HTML.jpg](img/A371637_1_En_5_Fig7_HTML.jpg)\n\n图 5-7. 带下拉电阻的电路\n\
  \n图 5-7 中的电路在本章中不起任何作用，因为我们只是将 Arduino 用作电源，并且按钮和 LED 之间没有直接的电气连接。在第 6 章中，我们将展示如何使用代码让\
  \ Arduino 通过按钮来控制 LED 的亮灭。按钮与第二个 10 kΩ 电阻构成了一个分压器。如果按下按钮，它的电阻非常小。如果按钮未按下，则其电阻为无穷大。\n\
  \n当按钮未按下时，引脚 2 弱连接到 5 V——“弱”是因为它是通过一个阻值较大的电阻连接的，而分压器的“另一半”（断开的按钮）具有无穷大的电阻——因此没有明显的电流流动。引脚\
  \ 2 将检测到 Arduino 会解释为 `HIGH` 的电压（将在下一章讨论）。\n\n如果按下按钮，按钮的电阻几乎为零。引脚 2 现在将连接到（几乎）接地。我们称“几乎”，是因为大部分压降将发生在\
  \ 10 kΩ 电阻上，而不是按钮连接处的小电阻上。因此，引脚 2 将检测到 Arduino 会解释为 `LOW` 的电压。\n\n在后面的章节中，我们将这样做，在我们用来观察电路状态的引脚上创建定义好的\
  \ `HIGH` 和 `LOW` 电压。这称为使用下拉电阻，因为该电阻将输出下拉到一个已知值，而不是让其处于浮空状态。在按钮按下之前，引脚 2 连接到 5 V，但当你按下按钮时，它会建立一个到\
  \ GND 的强连接，并允许少量电流（与电阻值成反比）流过。\n\n**提示**\n\n上拉和下拉电阻的值不应小于 1 kΩ，最大可达 100 kΩ。阻值过高的电阻可能使连接过弱，导致反应过慢或易受干扰。Arduino\
  \ 使用的芯片具有内部上拉（但无内部下拉）电阻，可以通过将输入引脚写为 `HIGH` 来激活。\n\n### Fritzing\n\nFritzing 程序允许你整洁地绘制电路图，从而可以清晰明了地与他人分享电路。你可以分享漫画式的“面包板”视图（我们到目前为止在本文中使用的视图），或者将电路显示为原理图，或者在制作专用电路板时显示其印刷电路板\
  \ (PCB) 布局的外观。你可以从 [`www.fritzing.org`](http://www.fritzing.org) 免费下载该程序，并且可以在 [`http://fritzing.org/learning/`](http://fritzing.org/learning/)\
  \ 找到相关教程。\n\n#### 使用检查器\n\n要更改元件详细信息或查看默认设置，请单击一个元件，然后转到“窗口”菜单项，确保勾选了 `检查器`，这将显示检查器窗口。在这个例子中，我们选择了一个电阻。当我们查看右下角的检查器窗格时，我们看到可以从下拉菜单中选择电阻值，它将会使显示出的元件上的色环变为该电阻的正确值。这对于电阻来说特别方便，但也适用于其他元件。\n\
  \n#### 添加新元件\n\nFritzing 附带了一套标准元件。要添加更多元件，你可能需要四处搜索，看看是否有人创建了其他元件。例如，要了解如何添加 Adafruit\
  \ 元件，请参阅 [`https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github`](https://learn.adafruit.com/using-the-adafruit-library-with-fritzing/download-the-fritzing-library-from-github)\
  \ 或，对于 Sparkfun 元件，请参阅 [`https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts`](https://learn.sparkfun.com/tutorials/make-your-own-fritzing-parts)。\n\
  \n#### Fritzing 专家提示\n\n要在面包板视图中添加更多元件，请转到右上角并单击放大镜图标。你可以输入要查找的内容（制造商、元件类型等）来查找元件。\n\
  \n在元件上右键单击（在 Mac 上是 Control 单击）也会弹出其他可以更改的选项（例如导线颜色）。\n\n**注意**\n\n我们很容易忘记，任何给定的物理电路都可以运行不同的软件，反之亦然。你的电路及其软件所实现的功能是这两个方面共同作用的结果，并且通常有许多方法可以创建电路来完成你想要做的事情。你可能会考虑先尝试一种方法，拍照，然后再尝试另一种。这些照片是防止你无法找到另一种方法的保障。\n\
  \n\n\n## 可缝纫组件\n\nArduino 电路板有各种形状和尺寸。到目前为止，本章介绍的那些更适合在桌面上搭建项目。但如果你想把组件嵌入到可穿戴物品中呢？这时你就会想使用可缝纫组件，并用导电缝线将它们连接起来。有一些基于\
  \ Arduino 的微处理器是扁平、圆形的，旨在缝制到衣物上。\n\n图 5-8 是我们将在第 7 章中制作的围裙项目。锅身由两层导电织物制成，中间夹着一块带孔的电工垫。处理器是一块\
  \ Adafruit Gemma（Arduino 兼容板），在“蒸汽”部分带有一个 NeoPixel 多色 LED。轻敲锅身时，LED 会闪烁红色，持续时间由编程者设定，然后变为绿色，持续另一个可设置的时长。你将在第\
  \ 7 章中详细了解如何组装这个项目。\n\n![A371637_1_En_5_Fig8_HTML.jpg](img/A371637_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8.\n\n来自第 7 章的电子围裙\n\n### 可缝纫 Arduino 电路板\n\n市面上有多种可缝纫 Arduino 电路板。在撰写本文时，Flora、Gemma\
  \ 和 Lilypad 电路板是常用的型号。Gemma 比其他两款更便宜、更小巧，但它有一些操作上的限制，我们将在第 6 章中讨论。图 5-8 中的小型圆形电路板就是一块\
  \ Gemma。\n\n图 5-9 展示的是来自 Adafruit（[`www.adafruit.com`](http://www.adafruit.com)）的\
  \ Flora 处理器。它没有排针，而是带有大孔的焊盘，这些焊盘可以用导电缝线（用于创建电路）或普通缝线（用于固定在衣物上）进行缝制。出于原型设计的目的，你可以暂时用鳄鱼夹将电路连接起来（图\
  \ 5-10）。按照惯例，这些（带孔的）焊盘也被称为“引脚”，以类比传统 Arduino 电路板。现在也有带按扣的电路板，当你读到本书时，可能还有其他变种。\n\
  \n![A371637_1_En_5_Fig10_HTML.jpg](img/A371637_1_En_5_Fig10_HTML.jpg)\n\n图 5-10.\n\
  \n鳄鱼夹\n\n![A371637_1_En_5_Fig9_HTML.jpg](img/A371637_1_En_5_Fig9_HTML.jpg)\n\n图\
  \ 5-9.\n\nFlora 电路板\n\n### 使用可缝纫 Arduino 电路板进行原型开发\n\n从根本上说，可穿戴电路板（此处我们以 Adafruit\
  \ Flora 为例）和 Arduino 是相同的，不过它可能减少了一些引脚。然而，差异开始显现的地方在于更小的组件——即专门为可缝纫而制造的 LED、传感器等。\n\
  \n图 5-11 展示了一块连接了 NeoPixel LED 电路板的 Flora 电路板，该 LED 板在一个封装内集成了红、绿、蓝像素以及合适的限流电路。图\
  \ 5-12 展示了用鳄鱼夹搭建的这个电路原型。在普通 Arduino 上需要自行选配的电阻，在可缝纫对应产品中通常是内置的。坏消息是，可缝纫组件通常比它们的传统对应产品要昂贵得多。\n\
  \n![A371637_1_En_5_Fig12_HTML.jpg](img/A371637_1_En_5_Fig12_HTML.jpg)\n\n图 5-12.\n\
  \n用鳄鱼夹连接的 Flora 和 NeoPixel 电路\n\n![A371637_1_En_5_Fig11_HTML.jpg](img/A371637_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11.\n\nFlora 和 NeoPixel 电路的 Fritzing 连线图\n\n如果你手头有 Flora 和 NeoPixel，请使用鳄鱼夹进行如下连接：\n\
  \n*   Flora 上的 `GND` 连接到 NeoPixel 上的 `–`\n*   Flora 上的 `Vbatt` 连接到 NeoPixel 上的 `+`\n\
  *   Flora 上的 `D6` 连接到 NeoPixel 上的 `->`\n\n在第 6 章中，我们将编写代码，使这个电路的功能不仅仅是当 USB 插入时让\
  \ NeoPixel 亮起。当你用鳄鱼夹连接好电路，并测试完我们在第 6 章中讨论的软件后，如果对电路工作正常感到满意，就可以用导电缝线缝合电路了。请参见第 7\
  \ 章关于围裙开发的讨论，了解这需要提前多少规划。在柔软的衣物上，避免导电缝线在非预期位置接触可能颇具挑战性。\n\n### 电池\n\n在开发过程中，你最可能通过将\
  \ Arduino 电路板插入 USB 端口来供电。一旦你穿戴好成品或在现场使用它时，很可能需要一块电池。如果项目只是运行几个 NeoPixel 和一个电路板（比如围裙项目），你可能可以使用纽扣电池——就是你在手表和其他小型电子产品中见过的那种扁平金属小电池。这些电池很适合放入小电池盒（图\
  \ 5-12），并且电池很容易取出。AAA 电池（放在合适的带连接器的电池盒中）也可能是一个选择。\n\n查看电池包装上的说明，了解其提供的电压和功率，并分析你的项目中的电路，以确定你需要什么。许多较小的电池是碱性电池，提供\
  \ 1.5 V 电压。要驱动一个需要三伏电压的组件，你需要将两个这样的电池串联起来。购买已为你安排好的电池组。电池连接器连接到电压调节器，该调节器要求输入电压高于输出电压（对于某些调节器，可能高出\
  \ 1.5 V，这被称为压差电压）。在这种情况下，我们使用两块 3 V 锂纽扣电池。\n\n注意\n\n不要在可穿戴项目中使用“枕头”型锂聚合物电池。它们很脆弱，可能会破裂并起火。你可能会在网上看到使用这些电池的旧设计，但请避免使用它们，并使用更新、更安全且封装更好的电池。如果你使用可充电电池，请阅读制造商的充电说明。\n\
  \n![A371637_1_En_5_Fig13_HTML.jpg](img/A371637_1_En_5_Fig13_HTML.jpg)\n\n图 5-13.\n\
  \n设计用于连接到可缝纫处理器连接器的纽扣电池盒（打开状态，旁边放有一块电池）\n\n### 导电丝带和缝线\n\n要连接可缝纫电路，你需要使用某种导电材料。你可以手工缝制电路；我们将展示的项目最好用这种方法完成。然而，市面上也有其他产品，比如带有五条并行导线的丝带，你可能想尝试一下。相对于使用丝带，Lyn\
  \ 更偏好手工缝制，因为她发现用丝带时，在紧密排列的并行导体上很容易造成电路短路。\n\n\n\n## 其他组件\n\n还有几种其他杂项组件类型你应该了解，以免在你决定尝试的项目中遇到它们。\n\
  \n有些组件可能配有扩展板或分线板。扩展板实际上仅适用于传统的 Arduino 板，因为它们被设计为夹在引脚顶部（这无法在可穿戴设备的焊盘连接器上工作）。而分线板则旨在接收传感器或其他设备的一组输出，并将其（直接或间接）路由到\
  \ Arduino。如果还没有可缝制的版本，你可能需要发挥创意，弄清楚如何将这些板连接到可穿戴设备上。\n\n`电容器` 是用于储存少量能量或平滑电流尖峰的组件。如果你因某种原因（例如电机或大量\
  \ LED 同时点亮）预料到项目中会出现电压尖峰，就可能用得上它。\n\n电致发光（EL）线是一种带有涂层的导线，当交流电通过时会发光。需要逆变器将 Arduino\
  \ 电压升压至 EL 线使用的更高值（但电流非常低）。有时会使用序列器在 EL 线片段之间切换，以产生运动效果，就像老式的动画霓虹灯标志一样。我们在第 11 章中有一个\
  \ EL 线项目。\n\n### 我需要学习焊接吗？\n\n你将能够完成本书中提供说明的所有项目，而无需进行焊接。然而，你可能会发现非常想使用某些传感器或其他组件，但用缝制或其他非永久性连接方式并不实用。网上有许多学习焊接的教程和线下课程，如果你想转向更复杂的项目，我们建议你了解一下这些内容。\n\
  \n### 洗涤\n\n如果你正在制作一件打算穿着的作品，迟早需要清洗它。有些组件可以手洗，但其他组件则不行。你可以将电路放在可拆卸的襟翼上，将不可清洗的部件放在可以滑出的口袋或肩垫中，以此类推。你的部件制造商网站上很可能有关于此问题的说明。请注意，干洗实际上并非“干燥”，干洗液可能会损坏组件。\n\
  \n注意\n\n切勿清洗或干洗电池、逆变器、序列器或其他敏感部件。设计你的作品时，应确保电池、EL 线以及任何未特别标明可清洗的部件都能轻松拆卸。\n\n##\
  \ 总结\n\n本章回顾了 Arduino 平台及其产品生态系统中的组件。我们讨论了如何确定电阻的尺寸以及如何搭建基本电路原型。在下一章中，我们将学习如何编写代码，使其在我们本章讨论的电路上运行。我们将在\
  \ Arduino IDE（软件环境）中编写一些程序，既用于可缝制板，也用于其通用的非可缝制组件。\n\n"
- "# 6. 可穿戴设备编程\n\n人们在启动 Arduino 项目时感到畏惧的事情之一是，你确实需要学习编程，至少是学一点。好消息是，学习计算机编程的一个好方法是查看示例，而且网上有很多基本的\
  \ Arduino 编程示例。\n\n与我们的缝纫和电子章节类似，我们这里只能帮你入门，你可能需要使用其他资源来补充一些细节。Arduino 使用一种名为 C++\
  \ 的编程语言，它是 Java、Python 和 C 等其他编程语言的近亲。有许多优秀的 C++ 编程书籍；例如，[`www.apress.com/programming/c-c?p=1`](http://www.apress.com/programming/c-c?p=1)\
  \ 上就有很多。你也可以学习 C++ 或 C++ 所基于的更简单、更古老的语言 C 的等效在线教程，以作为我们在本章提供的快速概览的补充。就本书其余部分而言，如果你能学会修改现有示例（无论是在线提供的，还是本书可下载材料中的，链接在本书版权页上），那么你应该就足够了。\n\
  \n琼和里奇将带你完成本章。琼通过传统课程学习编程，然后参与并管理过一些相当大的编程项目。里奇则有更多的创客背景。当我们两人的方法出现分歧时，我们可能会向你展示不止一种思考某事的方式，让你自行决定哪种方法适合你的风格。\n\
  \n本章分为三个部分。首先，我们给出编程的一般性介绍。然后，我们向你展示如何为常规（不可缝制）Arduino 板寻找示例，并就这些板的编程提出几点建议。最后，我们将转向可缝制板。\n\
  \n## 编程基础\n\n编程可能看起来令人生畏，因为实际代码看起来深奥难懂，而且似乎有很多规则要学习。然而，一旦你知道了这些规则存在的原因，预想出开发程序的正确方法就会变得更容易。编程只是为\
  \ Arduino 制定一套非常详细的指令，让它按特定顺序执行某件事，例如：如果按下按钮则点亮 LED，获取传感器数据并将某物转向光源等。\n\n将程序视为供计算机（或像\
  \ Arduino 这样的处理器）执行的详细脚本，是另一种思考方式。如果你是为经验丰富的演员编写带有舞台指导的脚本，可能不会加入太多细节。但如果你是为学校的节日盛会向幼儿园孩子解释舞台指导，你可能会将其分解成很小的步骤。编程就像为学龄前儿童写脚本，因为计算机不知道你想做什么，它也不知道你告诉它之外的现实世界知识。\n\
  \n提示\n\n向任何年龄的初学者介绍编程的经典方法是让他们为机器人做某事（比如制作花生酱果酱三明治）编写一套非常详细的指令。通常，一个人写下指令，然后另一个人扮演“机器人”，严格按照指令执行。如果你从未写过代码，你可以将此作为练习，仅仅思考其中的步骤。你如何以没有视觉系统或任何力反馈的计算机能够理解的方式来定义“上面”、“下面”和“转动盖子”？\n\
  \n## 开环控制 vs. 闭环控制\n\n闭环系统会检查 Arduino（或其他计算机）命令现实世界中的某物所执行的操作是否真的发生了。因此，可能会检查车轮的转动、杠杆的角度、加热元件的温度等等。\n\
  \n开环控制系统则不会检查这类事情。你可能会惊讶地知道，大多数消费级 3D 打印机由 Arduino 或大致等效的东西管理，并且几乎完全以开环方式运行。步进电机精度（在第\
  \ 8 章中讨论）足够高，可以不用检查当前所在位置，尽管在某些轴上有“限位开关”以允许机器找到其起始位置。\n\n\n\n### 规划程序：流程图\n\n如果你在我们刚才建议的机器人编程思维实验中稍微深入一些，可能已经发现，在写一行代码之前，详细规划一个编程项目是多么重要。否则，你可能永远无法让程序正常运行。规划代码的一种常见方法是使用流程图，如图\
  \ 6-1 所示。这个图展示了一个程序：它启动后，先进行一些设置和定义，然后只要没有事情让它停止，它就会一直运行。\n\n![A371637_1_En_6_Fig1_HTML.jpg](img/A371637_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 一个流程图\n\n琼喜欢先绘制一个高层次的代码流程图，然后在手绘草图上写下一些注释。对于较大的项目，她会在开始编码前先列出所有函数，然后可能会寻找一个示例，从中提取出她想要实现的功能的片段。对于\
  \ Arduino 项目，里奇通常从网上搜索开始，找到一个与他的需求接近的现有开源示例，然后进行改编，或者将几个这样的示例结合起来。作为一名初学者，你可能会混合使用这些方法。\n\
  \n## Arduino 代码规范\n\n图 6-1 中的流程图实际上就是 Arduino 代码的布局方式。所有程序都包含`setup()`和`loop()`，它们都是函数，或者说是一些特殊的预定义词汇。\n\
  \n> **注意：** 实际上，所有现代计算机代码都是区分大小写的。`Setup()`和`setup()`没有任何关系，把非常相似的东西命名混用是个坏主意，因为很容易把自己搞糊涂。\n\
  \nArduino 中的`setup()`函数包含了所有只需要执行一次的操作。这可能包括设置一些需要从零开始的事物，告诉 Arduino 哪些引脚用于读取数据或写入数据，以及进行类似的初始化工作。`loop()`函数是程序运行的核心。Arduino\
  \ 会不断地循环执行`loop()`中的代码（当代码执行到底部时，会从顶部重新开始），直到某些事件中断它（比如断电、按下复位按钮等）。\n\n出于历史原因，在\
  \ Arduino 上运行的程序有些人称之为草图（sketches），另一些人则直接称为程序。我们将使用的编程环境叫做 IDE（发音为“eye-dee-eee”），是集成开发环境（Integrated\
  \ Development Environment）的缩写。这个环境会在“后台”提供一些结构来加载和运行你的程序。Arduino IDE 是免费且开源的，可以从\
  \ [`www.arduino.cc`](http://www.arduino.cc) 获取，同时网站上还提供了安装指南。\n\nArduino IDE 最初源自一个名为\
  \ Processing 的编程环境，该环境旨在快速绘制图形和制作动画（因此有了将程序视为“草图”的理念）。Processing 至今仍然存在（同样免费且开源），可以从\
  \ [`www.processing.org`](http://www.processing.org) 获取。图 6-2 展示了 IDE 的屏幕截图。市场上有各种不同类型的\
  \ Arduino 兼容板，IDE 会为不同的板子生成不同的代码。我们将在本章后面讨论这个问题。\n\n![A371637_1_En_6_Fig2_HTML.jpg](img/A371637_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2. Arduino IDE 的默认草图。请注意，它在右下角会显示它认为你正在使用的板子类型。\n\n> **注意：** 在此，我们想要停下来，感谢所有为创造共享的\
  \ Arduino 生态系统付出时间和精力的人们。你可以在 `Arduino.cc` 上阅读更多关于其历史和相应许可协议的信息。\n\n### 格式惯例\n\n\
  大多数编程语言都遵循一些你必须学习的惯例，就像学习一门新语言的词汇一样。我们展示一些示例来帮助你入门。一般来说，从一个示例开始，然后通过编辑它，直到语法成为你的第二天性，这是一个好主意。你可以考虑为自己创建一个总是以它开头的模板，就像下面这样（我们稍后会解释什么是注释）：\n\
  \n```\n// 在这里写注释，说明代码的功能\n// 说明代码作者以及最后一次编辑的时间\n// 列出许可条款或关于复制限制的任何规定\nvoid setup()\
  \ {\n// 此处放置只执行一次的代码\n}// 结束 setup()\nvoid loop() {\n// 此处放置需要重复执行的代码\n}// 结束 loop()\n\
  //结束\n```\n\n你可以在图 6-2 中看到类似的草图在 Arduino IDE 中是什么样子。\n\n### 让人感到望而生畏的地方\n\n人们看到计算机代码时常常会感到恐慌，因为它看起来相当晦涩难懂，而且他们害怕会弄坏什么东西。如果你有条不紊地学习，并掌握程序结构的惯例，你就能相当快地掌握它。如果你把它看作是人类创造的一门外语，而不是由机器人霸主降下的东西，你可能会学得更快。\n\
  \n#### 语法的严格性\n\n计算机不知道你的意思，它们非常刻板。代码中的拼写错误通常会导致代码执行出你不希望的结果。一些问题会被编译器（你用来将人类可读的代码转换成机器能理解的程序的工具）捕捉到，但并非所有问题都能被发现。从示例中输入代码时要非常小心。在诸如\
  \ FORTRAN 和 Python 之类的语言中，格式、制表符和换行的位置会影响代码的执行。幸运的是，Arduino 编程所基于的 C++语言没有这些问题。\n\
  \n请注意，花括号`{`和`}`表示：“这两个括号之间的所有内容都属于同一个代码块。”不同的人对于如何使用和放置括号、命名变量等有不同的习惯。通常，用一种方式学习的人很难与用另一种方式学习的人合作，尽管这听起来微不足道。有时，像`loop()`这样的函数结束位置可能与起始位置相隔数页，琼养成了始终用注释标明每个结束括号所闭合的代码块的惯例（如前例所示）。另一方面，里奇学会了通过精确而一致地使用缩进和空白来跟踪这些事物。良好的编程实践包括：\n\
  \n- 选择一种格式标准并坚持下去。如果你与其他人一起编写代码，请在开始之前制定一个风格指南，以避免日后出现争论。例如，里奇和琼在一致使用对方的惯例方面都做得非常差，我们必须互相检查以避免错误。\n\
  - 提前绘制流程图并做好规划；不要直接跳进去开始编码。通常，没有规划就写出来的东西都需要扔掉，尤其是在初期。也要检查是否已经存在开源版本，或者可能有一个库（更多内容见后面章节）。\n\
  - 避免使用单字母变量名；使用能说明变量功能的名称，比如`inputPin`。唯一的例外是循环计数器（我们将在本章后面讲到），按传统它们通常使用单个字母。\n\
  - 绝不要在变量名或函数名中使用`1`或`0`，因为它们很难与字母`l`和`o`区分。\n- 变量名中不能包含空格。人们通常使用下划线或“驼峰命名法”（例如`cornerValue`，或中间有“驼峰”的`inputFile`）来避免这个问题。\n\
  - 为你的代码添加注释。未来的你一定会感谢现在的你！\n\n### 编程词汇与概念\n\n正如我们提到的，Arduino 使用的是 C++编程语言的一个变体，它是其他一些语言（如\
  \ C、Java 和 Python）的近亲。我们在此提供一份简短的词汇课程，然后继续讲解示例。\n\n\n\n#### 注释\n\n程序通常并不像小说那样仅供阅读，尽管\
  \ Rich 和其他资深程序员坚称他们的代码是“自我文档化”的。为了让读者理解代码逻辑，人们会插入注释供后续阅读。代码编译时（即从人类可读形式转换为计算机硬件可读形式），计算机会忽略这些注释。单行注释以双斜杠开头。\n\
  \n```\n// 这是一个注释。\n```\n\n惯例是在程序顶部添加一段注释块，说明程序功能、作者、编写时间以及复制限制。注释也便于为自己留下关于某些操作原因的笔记。你可以通过\
  \ `//` 暂时“注释掉”部分代码——在需要编译器忽略的每一行开头添加 `//`。此外，还可以使用多行注释，以 `/*` 开头并以 `*/` 结尾，如下所示：\n\
  \n```\n/* 这是一个注释\n内容内容\n在此结束 */\n```\n\n编译器会忽略 `/*` 和 `*/` 之间的所有内容，因此 Arduino 或其他处理器不会读取它们。\n\
  \n#### 变量与循环\n\n程序包含变量——Joan 喜欢将它们视为存储物品的盒子。在 C++ 中，变量需要指定类型——它是整数、浮点数、字符还是其他类型？你可以在\
  \ [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage)\
  \ 了解 Arduino 支持的变量类型。正如本章前面所述，变量名区分大小写，`APPLE`、`apple` 和 `Apple` 是三个不同的变量。为变量指定类型的方法如下：\n\
  \n```\nint apples = 15;\n```\n\n这段代码创建了整数类型的变量 `apples`，并将其初始值设为 15。注意，只需定义变量类型一次，在整个代码中该类型即固定。你也可以仅指定类型：\n\
  \n```\nint apples;\n```\n\n或者将类型嵌入更复杂的代码中：\n\n```\nfor (int apples = 0; apples <\
  \ 10; apples++) {\n// 在此处插入你想运行十次的代码\n} // 结束 apples 循环\n```\n\n这个代码段是要执行十次的代码片段。首次运行时，`apples`\
  \ 等于 0。每次执行循环内的代码后，变量 `apples` 增加 1（`apples++` 即实现此功能）。程序会将 `apples` 设为 0，执行花括号内的代码，增加\
  \ `apples`，然后检查 `apples` 是否小于 10。此过程会重复直到条件不成立，之后继续执行循环后的代码。这里的变量 `apples` 被称为循环计数器——用于跟踪循环内操作执行次数的变量。\n\
  \n变量还具有作用域。变量作用域指代码中能识别该变量的范围。如果在 `setup()` 和 `loop()` 函数之前（即不在它们的花括号内）的代码顶部定义变量，这些变量将成为全局变量，对整个程序可见。如果在函数开始和结束的花括号内定义变量，则只有该函数能识别该变量。\n\
  \n全局变量通常可能有些危险，因为如果在不同函数间切换并假设某个变量的值时，可能会丢失该变量当前赋值的跟踪。但像哪个引脚是输入、哪个是输出等通常被设为全局变量。否则，变量的作用域仅限于定义它的函数内。如果你在\
  \ `setup()` 中定义了 `int apples;`，然后在 `loop()` 中使用它，就会报错，如图 6-3 所示。\n\n![A371637_1_En_6_Fig3_HTML.jpg](img/A371637_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3. 作用域编译器错误\n\n#### 保留字\n\nArduino 定义了一些实用的保留字。`HIGH`、`LOW`、`true` 和 `false`\
  \ 均已定义。完整列表参见 [`www.arduino.cc/en/Reference/HomePage`](http://www.arduino.cc/en/Reference/HomePage)。此外，还有一些\
  \ Arduino 特有的约定，例如引脚名称（数字以及 A0 到 A5）始终被视为 `int` 变量，即使它们包含字母。Arduino 草图会自动将这些特殊值转换为整数。\n\
  \n#### 函数\n\n函数是一组需要重复执行的命令，或者为了隔离这些命令以便在某些情况下替换为其他内容。你可以通过预定义的方式向函数传递值。内置函数 `setup()`\
  \ 和 `loop()` 是“void”函数——它们执行时不会向代码返回任何值。\n\n函数调用如下所示：\n\n```\ndigitalWrite(pin,\
  \ value);\n```\n\n这个函数调用表示使用为函数 `digitalWrite` 定义的命令，并传入两个输入参数 `pin` 和 `value`。函数输入的作用通常会在注释中说明。对于\
  \ Arduino 内置函数，其定义见本章前面引用的 Arduino 标准页面。你也可以创建自己的函数。当需要重复执行某项操作但使用不同值时（例如，旋转机械臂到不同的角度），这非常实用。\n\
  \n#### 赋值、比较与基础数学\n\n计算机程序中的某些约定与代数课不同。在编程中，等号是赋值运算符——等号两侧的内容并不相同。例如，以下代码表示“取变量\
  \ `a` 的当前值，加 1，然后覆盖 `a` 的当前值以存储结果”：\n\n```\na = a + 1;\n```\n\n或者等价地：\n\n```\na\
  \ = a++;\n```\n\n或者简写为：\n\n```\na++;\n```\n\n以下是检查 `a` 是否等于 1 的比较：\n\n```\na ==\
  \ 1\n```\n\n以下是检查 `a` 是否不等于 1 的比较：\n\n```\na != 1\n```\n\n其他常见比较包括小于（`<`）、小于等于（`<=`）、大于（`>`）和大于等于（`>=`）。\n\
  \n在编程语言中，乘法通常用星号表示，除法用斜杠表示，如下例所示：`a = b * c; a = b / c;` 对于更复杂的数学函数，你可能需要在代码中添加库。请参阅本章后面关于库的章节。\n\
  \n#### If、Else 与 While\n\n你可以让程序在满足特定条件时执行一个操作，否则执行另一个操作。以下代码段检查变量 `darkness` 是否大于\
  \ 3。如果是，代码调用函数 `light()` 执行某些操作；否则，将变量 `alternate` 设为 2：\n\n```\ndarkness = 5;\n\
  if (darkness > 3) {\nlight();\n} // 结束 darkness 条件判断\nelse alternate = 2;\n```\n\
  \n你也可以让循环在条件成立时持续执行。以下代码段在 `darkness` 大于等于 3 时，持续调用函数 `light()` 和 `spin()`。注意，要使此循环结束，代码中需要在某处将变量\
  \ `darkness` 设为小于 3：\n\n```\nwhile (darkness >= 3) { // darkness 大于等于 3\nlight();\n\
  spin();\n}\n```\n\n\n\n### 示例讲解\n\n要在计算机上下载 Arduino IDE，请按照 [`www.arduino.cc/en/Main/Software`](http://www.arduino.cc/en/Main/Software)\
  \ 上的说明操作。下载适合 Mac、Linux 或 Windows 的版本。在 Windows 机器上，您可能还需要安装与您所用开发板类型对应的驱动程序。启动后，IDE\
  \ 会创建一个可用于编辑代码的窗口，如图 6-2 所示。\n\n您还可以从 `文件 ➤ 示例` 菜单中获取大量示例，无需连接实体 Arduino 开发板即可查看。为了模拟连接了一块用于编译的开发板，请进入\
  \ `工具 ➤ 开发板` 菜单，选择 `Arduino/Genuino Uno`，这是一款非常通用的开发板。\n\n我们建议您查看以下示例中的代码，以了解代码语法和总体思路：\n\
  \n- `文件 ➤ 示例 ➤ 01.基础知识 ➤ Blink`\n- `文件 ➤ 示例 ➤ 05.控制 ➤ ForLoopIteration`\n- `文件 ➤\
  \ 示例 ➤ 05.控制 ➤ IfStatementConditional`\n\n在下一节中，我们将介绍一个常规 Arduino 示例的代码，并由此过渡到可穿戴设备。\n\
  \n## 为 Arduino 编程\n\n您可以通过 USB 数据线将程序从计算机加载到 Arduino 上。要告诉计算机您使用的是哪种 Arduino，请进入\
  \ `工具 ➤ 开发板` 菜单进行设置。如果没有看到您的开发板型号，请使用 `工具 ➤ 开发板 ➤ 开发板管理器` 查找并安装其规格说明（此操作需要联网）。\n\
  \n您可能还需要通过 `工具 ➤ 端口` 设置端口，并且在少数情况下，可能需要通过 `工具 ➤ 编程器` 更改其他设置。本章前面提到的 Arduino 下载页面为特定情况提供了大量帮助。\n\
  \n### Arduino 的运作方式\n\n如前所述，Arduino 一次只能做一件事。与一台完整的计算机（甚至是树莓派）不同——后者可以共享资源，从而在多个大致同时运行的任务之间高效切换——Arduino\
  \ 只能跟踪一个程序。\n\nArduino 程序包含三个部分。第一部分没有正式名称，它是 `setup()` 函数之前的代码。在这里定义“全局”变量（参见本章前面的“变量和循环”部分）。这部分完成诸如引入他人已编写的代码库，或定义后续要使用的对象等操作。您可以在此区域创建和设置变量，但不能执行像打开和关闭引脚这样的操作。\n\
  \n代码的下一部分位于名为 `setup()` 的函数中。这用于所有只需执行一次的操作，通常也是您想要设置引脚模式和初始状态的地方。\n\n最后，我们需要运行\
  \ `loop()` 代码。这是 Arduino 持续执行您所期望操作的地方——例如，监控传感器、运行 3D 打印机，或等待按钮被按下。\n\n### 编译、加载、运行\n\
  \n要编译程序并检查其是否正常工作，请点击 IDE 上的勾选图标（如图 6-4 中箭头所指处）。要编译程序并将其加载到 Arduino 上，请点击勾选图标旁边的运行箭头图标。编译会将您所写代码的文本版本转换为计算机能够理解的指令。\n\
  \n![A371637_1_En_6_Fig4_HTML.jpg](img/A371637_1_En_6_Fig4_HTML.jpg)\n\n图 6-4. 点击勾选图标编译代码并检查其是否正常工作。\n\
  \n要在 Arduino 上运行程序，请用 USB 数据线将计算机连接到开发板。务必根据开发板的规格正确设置 `开发板` 和 `端口`（对于某些可穿戴开发板，还需设置\
  \ `编程器`），如“为 Arduino 编程”部分开头所述。点击“编译并加载”的右箭头图标（勾选图标右侧）即可编译、检查代码并将其上传到开发板。\n\n**注意**：一旦将程序上传到\
  \ Arduino，它就会一直存在，直到您加载其他内容。断开电源或重置 Arduino 不会擦除代码，不过按下复位按钮会再次运行 `setup()`。\n\n\
  ### 添加库\n\n代码库是他人编写好并在一定使用条款下共享的代码集合。您可以在自己的代码中使用代码库。相关背景信息位于 [`www.arduino.cc/en/Guide/Libraries`](http://www.arduino.cc/en/Guide/Libraries)，可能会对您有所帮助。\n\
  \nIDE 带有一个库管理器，可以帮助您为代码添加库。如果某个组件说明需要外部库，请前往 `项目 ➤ 加载库 ➤ 管理库`，并搜索您所需的内容。例如，如果我们搜索“Adafruit\
  \ NeoPixel”（我们将在本书后面用到），会得到如图 6-5 所示的窗口（请注意，此操作需要联网）。\n\n![A371637_1_En_6_Fig5_HTML.jpg](img/A371637_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5. 安装库\n\n如果点击搜索结果中出现的某个库选项，您将有机会安装它（如果尚未安装）。点击“安装”将下载该库，供您在该计算机上使用（无论是否联网）。要将它添加到您的代码中，请使用以下语法：\n\
  \n```\n#include <LibraryName.h>\n```\n\n例如，通过在文件顶部（位于任何其他 `#include` 行之上）添加以下代码行，将\
  \ Adafruit NeoPixel 库添加到您的代码中：\n\n```\n#include <Adafruit_NeoPixel.h>\n```\n\n**提示**：安装库通常还会在\
  \ `文件 ➤ 示例` 菜单中添加更多示例，您可以用它们来了解如何使用该库。如果没有出现示例，点击“更多信息”链接通常会将您带到一个 Github 仓库，您可以在那里查找可能解释如何使用该库的\
  \ Readme 文件。\n\n### 使用预处理指令\n\n您可能见过项目顶部有这样的代码：\n\n```\n#define PIN 3\n```\n\n这样的行被称为预处理指令，有时简称为`#define`。此结构在这里会将每个出现的\
  \ `PIN`（区分大小写）替换为 `3`。如果您想统一设置某个引脚号或类似的常量，这很方便。但这可能有点危险。例如，如果您有一个名为 `PINAWAY` 的变量，它就会变成\
  \ `3AWAY`，因为每次代码中出现字符串 `PIN` 时，它都会被替换为 `3`。因此，常见的做法是预处理指令中的名称全部使用大写字母，而其他名称则不要这样用。\n\
  \n考虑到这些风险，为什么还要使用预处理指令呢？作为初学者，您可能希望避免使用它，因为存在意外后果的可能性。但对于高级编程人员而言，这是一种有效的方式，可以让代码中多处出现的内容易于更改。\n\
  \n\n\n\n### 为图 5-7 编写代码\n\n在第 5 章中，图 5-7 里的示例电路没有任何作用。电路接通后 LED 不会亮，因为它仅仅连接到了地线。按下按钮也没有任何反应。现在，我们要为同一个电路添加代码，使其成为一个反相电路——按下按钮时，灯亮；不碰按钮时，LED\
  \ 熄灭。\n\n正如第 5 章中提到的，这个电路需要一个上拉电阻，这样即使按钮断开，引脚 2 上的电压也是已知的。在按下按钮之前，该引脚会通过微弱连接接到 VCC，但按下按钮会建立一条到\
  \ GND 的强连接，并允许少量电流（与电阻值成反比）流过。Arduino 板使用的芯片内部有上拉电阻（约 200 kΩ），你可以通过向一个处于输入模式的引脚写入\
  \ `HIGH` 来激活它们。代码清单 6-1 展示了这段代码。\n\n```cpp\n//按下按钮时，代码将点亮 LED。\n//否则，除了初始化时点亮外，LED\
  \ 熄灭。\nint buttonPin = 2;\nint ledPin = 10;\nint press = 0;\nvoid setup() {\npinMode(ledPin,\
  \ OUTPUT);\ndigitalWrite(ledPin, HIGH);\npinMode(buttonPin, INPUT);\ndigitalWrite(buttonPin,\
  \ HIGH); // 激活内部上拉电阻\n} // 结束 setup\nvoid loop() {\npress = digitalRead(buttonPin);\n\
  if (press == HIGH) digitalWrite(ledPin, LOW); // 按钮未按下，熄灭\nelse digitalWrite(ledPin,\
  \ HIGH);\n}// 结束 loop\n```\n\n*代码清单 6-1. 用于运行图 5-7 中电路的程序*\n\n## Arduino 输入与输出\n\
  \n正如我们在上一个例子中所见，Arduino 需要既能读取其引脚上的电压，又能输出电压来使各种事情发生。请注意，输入和输出是从 Arduino 板的角度来定义的（也就是说，输出是向引脚写入，输入是从引脚读取）。这意味着，如果一个传感器向\
  \ Arduino 发送数据，对 Arduino 而言它就是数字 `INPUT`，Joan 认为这有点反直觉。但事实就是如此。\n\n在对引脚进行任何其他操作之前，你应该使用\
  \ `pinMode()` 函数告诉 Arduino 你希望将其用作输入还是输出（这通常在 `setup()` 中完成）。Arduino 上有几种不同类型的输入和输出。你可以通过\
  \ `digitalRead`、`digitalWrite`、`analogRead` 和 `analogWrite` 函数来指定你正在使用的引脚。\n\n###\
  \ 数字读取与写入\n\n你可以配置 Arduino 上任何带编号的引脚来发送或接收数字信号。数字信号只有两个值——在本例中，称为 `HIGH` 和 `LOW`——这与模拟信号不同，后者可以是某一上下限之间的任意电压。\n\
  \n定义为输出的引脚可以设置为 `HIGH`（将引脚连接到 Arduino 的 VCC）或 `LOW`（将引脚连接到 Arduino 的 GND）。向引脚写入一个值可用于改变另一个元器件两端的电压（例如，打开或关闭\
  \ LED）。它还可以按特定模式使用，向其他设备发送控制信号，不过在大多数情况下，会有库为你处理这种通信协议。\n\n如果引脚被定义为输入，你可以用它来读取电压，该电压要么是\
  \ `HIGH`（接近 VCC），要么是 `LOW`（接近 GND）。这可用于检查按钮或开关之类元器件的状态。数字输入也可以（通常也是通过库）用于接收来自其他元器件的数字信号，例如传感器，或者有时是向某个设备发送数字信号后接收其回应的设备。例如，Arduino\
  \ 可以向 SD 卡写入数据，并从卡中请求数据。\n\n### 模拟读取与 PWM\n\nArduino 可以在其模拟引脚上读取模拟电压。这些引脚被标记为 A0、A1\
  \ 等。它们可以用作输入引脚，不仅能够读取 `HIGH` 或 `LOW`，还能通过内置的模数转换器（ADC）读取 VCC 与 GND 之间的一个电压范围。大多数\
  \ Arduino 都有一个 10 位 ADC，这意味着它可以读取 1024（2 的 10 次方）个不同的电压值，范围从 GND 的 0 到模拟参考电压的 1023。默认情况下，Arduino\
  \ 使用的参考电压等于 VCC，不过也可以通过内置的 Arduino 函数 `analogReference()` 配置使用不同的参考电压。\n\n还有一个模拟写入函数，尽管\
  \ Arduino 实际上并没有数模转换器（DAC）。相反，`analogWrite()` 函数会生成一个脉冲宽度调制（PWM）信号，这通常效果甚至更好。`analogWrite()`\
  \ 发送的 PWM 信号是在 VCC 和 GND 之间每秒振荡数百次，而模拟值指定了每个周期中电压为 `HIGH` 的时间比例（称为占空比）。PWM 函数接收一个\
  \ 8 位值，有 256 个不同的值（0-255）。值 0 表示 0% 的占空比（始终为 `LOW`），255 表示 100% 的占空比（始终为 `HIGH`）。给它赋值为\
  \ 127 将得到 50% 的占空比（一半时间为 `HIGH`，其余时间为 `LOW`）。\n\nPWM 信号可用于调暗 LED 或让电机减速转动等操作。这实际上比发送较低电压更有用，因为\
  \ PWM 与 LED 亮度或电机速度具有更线性的关系。PWM 还可以用于向诸如期望 PWM 信号的业余伺服电机等设备发送信号（伺服电机期望每 20 毫秒有一个\
  \ 1-2 毫秒长的脉冲来确定其位置）。\n\n当使用 `analogWrite()` 函数时，Arduino 可以在程序处理其他事情的同时维持这些脉冲，但这仅限于某些引脚。在大多数\
  \ Arduino 上，引脚 3、5、6、9、10 和 11（有时还有其他引脚，取决于所使用的芯片）可用于 PWM，它们通常在其引脚编号旁边标有一个波浪符号（∼）。\n\
  \n### 写入串口\n\n有时，了解某个特定引脚接收到的输入值会非常方便。你可以通过启用串口，将数据通过 USB 线缆发送到你的计算机上。为此，请点击 IDE\
  \ 右侧的放大镜图标（你可以在图 6-4 中看到它）。在你的 Arduino 程序的 `setup()` 函数中添加以下一行：\n\n```cpp\nSerial.begin(9600);\n\
  ```\n\n然后，在你 `loop()` 函数中想要查看输出的位置，添加 `Serial.print()` 或 `Serial.println()`（会在你打印的内容后面添加一个换行符）。`Serial.print()`\
  \ 或 `Serial.println()` 一次可以传输一个数字或字符串（一组字母）。你可以在 文件 ➤ 示例 ➤ 03.模拟 ➤ AnalogInOutSerial\
  \ 中看到一个完整的示例。程序运行且 Arduino 通过 USB 连接后，点击串口窗口图标（放大镜）打开串口监视器，并确保窗口底部的波特率与你在 `Serial.begin()`\
  \ 中使用的数字匹配。\n\n\n\n\n## 可缝纫开发板编程\n\n常见的 Arduino 衍生可缝纫开发板（如 Flora、Gemma 和 Lilypad）的工作方式与基础\
  \ Arduino 大同小异。对于 Gemma 及部分更小型开发板，上传代码有一些特殊技巧，我们稍后会进行说明。\n\n更大的差异在于元件方面：总体而言，这些可缝纫元件比其非缝纫版本更为精密。首先，它们通常会内置合适的电阻。\n\
  \n你可以在可穿戴作品中继续使用非缝纫类传感器等元件，只需将原本要插入面包板的引线末端卷成环状，然后将这些环缝在织物上即可。显然，你需要考虑如何拆卸这些不可水洗的元件，但另一方面，它们的价格要便宜得多。\n\
  \n我们将在后续章节中使用的 NeoPixel 可缝纫 LED 价格正在下降，并且能实现令人惊叹的效果——因为其亮度和颜色（实际上它们是由三个微小的 LED 组成，分别对应红、绿、蓝三种颜色）都能通过单个数字引脚进行控制，从而驱动众多像素。较新的\
  \ Flora 开发板在引脚 8 上集成了一个 NeoPixel。\n\n> **注意**  \n> 将代码上传到 Gemma 有点复杂。你需要连接 USB 线，然后按下重置按钮（开发板上一个微小的黑色按钮）。当开发板上的红灯闪烁时，你就可以上传代码了。如果红灯不闪，则无法上传。\n\
  \n要使用 NeoPixel，你必须引入 Adafruit 的 NeoPixel 库。要找到该库，你需要在库管理器（见图 6-5）的两个下拉菜单中都选择“全部”。下载完库文件和开发板定义后，点击\
  \ **工具** > **开发板** > **Adafruit Flora**，**端口** > **（Flora 端口）**，这样你的电脑就能识别该开发板了。如果\
  \ Flora 没有作为选项出现，请使用“开发板管理器”查找它，方法如“编程 Arduino”一节所述。\n\n当你引入 Adafruit NeoPixel 库后，会得到一些非常复杂的示例。清单\
  \ 6-2 展示了一个更简单的示例供你尝试，它非常接近能系统性改变 NeoPixel 颜色的最小化代码。\n\n你可以通过修改函数 `pixels.setPixelColor(0,\
  \ pixels.Color(i, j, k))` 中 `i`、`j` 和 `k` 的值来改变颜色和亮度。`i` 的值对应红色 LED 的亮度（范围 0 到 255）。`j`\
  \ 的值设置绿色，`k` 的值设置蓝色。\n\n三种颜色等量混合会得到白光。例如，`pixels.setPixelColor(0, pixels.Color(100,\
  \ 100, 100));` 会产生白光，而 `pixels.setPixelColor(0, pixels.Color(0, 0, 200));` 会产生亮蓝色光。每次使用完\
  \ `pixels.setPixelColor` 函数后，你还需要使用 `pixels.show()` 来命令 NeoPixel 实际显示你选择的颜色。\n\n\
  ```cpp\n#define PIN   6\n#define PIXELCOUNT   1\n#include <Adafruit_NeoPixel.h>\n\
  Adafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT, PIN, NEO_GRB + NEO_KHZ800);\n\
  int persist = 50; //像素点亮持续 50 毫秒\nvoid setup() {\n  pixels.begin(); // 初始化 NeoPixel\
  \ 库。\n  Serial.begin(9600);\n}\nvoid loop() {\n  // 用单个像素进行测试\n  pixels.setPixelColor(0,\
  \ pixels.Color(0,0,200)); //亮蓝色\n  pixels.show(); // 将刚刚设置的值推送到像素上\n  delay(5000);\
  \ // 延时一段时间（单位毫秒）\n  for(int i = 0; i < 50; i = i + 5){ //红色\n    for(int j = 0;\
  \ j < 50; j = j + 5){ // 绿色\n      for(int k = 0; k < 50; k = k + 5){ // 蓝色\n  \
  \      // pixels.Color 接收 RGB 值，范围从 0,0,0 到 255,255,255\n        // 接下来三行用于调试\n\
  \        Serial.print(i);\n        Serial.print(j);\n        Serial.println(k);\n\
  \        pixels.setPixelColor(0, pixels.Color(i, j, k));\n        pixels.show();\
  \ // 将刚刚设置的值推送到像素上\n        delay(persist); // 延时一段时间（单位毫秒）。\n      } // k 循环结束\n\
  \    } // j 循环结束\n  } // i 循环结束\n} // loop 结束\n```\n**清单 6-2.** Flora 与 NeoPixel\
  \ 示例\n\n使用相同函数的类似代码可以控制一系列 NeoPixel。清单 6-2 示例中的 `0` 表示你在控制第 0 号像素（本例中只有像素 0）。如果你有两个像素（如清单\
  \ 6-3 所示），你将使用 `pixels.setPixelColor(0, pixels.Color(0, 200, 0))` 和 `pixels.setPixelColor(1,\
  \ pixels.Color(200, 0, 0))`。这会将系列中的第一个像素变为绿色 (0, 200, 0)，第二个像素变为蓝色 (200, 0, 0)。\n\
  \n此代码如清单 6-3 所示。注意每个 NeoPixel 都需要单独连接回 VCC 和 GND。信号连接采用链式结构，一个像素的输入箭头连接到前一个像素的输出箭头。\n\
  \n```cpp\n#define PIN  6\n#define PIXELCOUNT   2\n#include <Adafruit_NeoPixel.h>\n\
  Adafruit_NeoPixel pixels = Adafruit_NeoPixel(PIXELCOUNT, PIN, NEO_GRB + NEO_KHZ800);\n\
  void setup() {\n  pixels.begin(); // 初始化 NeoPixel 库。\n  Serial.begin(9600);\n}\n\
  void loop() {\n  // 使用两个像素进行测试。\n  // 像素 0 的输入箭头应连接到引脚 6\n  // 像素 1 的输入箭头应连接到像素\
  \ 0 的输出箭头\n  pixels.setPixelColor(0, pixels.Color(0, 200, 0));  //亮绿色\n  pixels.show();\
  \ // 将刚刚设置的值推送到像素上\n  delay(5000); // 延时一段时间（单位毫秒）\n  pixels.setPixelColor(1, pixels.Color(0,\
  \ 0, 200));  //亮蓝色\n  pixels.show(); // 将刚刚设置的值推送到像素上\n  delay(5000); // 延时一段时间（单位毫秒）\n\
  } // loop 结束\n```\n**清单 6-3.** 驱动两个串联的 NeoPixel\n\n## 本章小结\n\n本章我们讨论了如何对可穿戴 Arduino\
  \ 进行编程。我们首先介绍了如何从头编写计算机代码，然后具体讨论了如何对 Arduino 进行编程。最后，我们提出了一些关于如何编程可穿戴作品的思路，并讨论了此类开发板存在的一些问题。\n\
  \n"
- '# 你的第一个项目


  创建一个可穿戴电子项目需要你同时协调多个专业领域。第 3 章和第 4 章侧重于缝纫技术，第 5 章和第 6 章介绍了电子和软件。本章将引导你完成一个（相对！）简单的项目，该项目可以适配多种不同的应用，并且整合了上述所有章节的内容。在大多数情况下，本章由
  Lyn 带领你完成，不过 Joan 和 Rich 也会就电路设计和编程提出一些建议。


  在本章中，你将学习如何制作一个带有嵌入式一分钟计时器的围裙。这是一个相对简单的电路，但它会引发许多你在一般情况下需要考虑的设计问题。我们最希望你从本章中学到的是：在动手之前规划好项目是成功的关键。在第
  10 章（在我们教你传感器和 3D 打印之后）中，我们将会带你回顾一个过于雄心勃勃的第一个可穿戴项目，当时我们事先没有做太多规划就贸然开始了。而本章是第一个项目的冷静、更现实的版本，其设计基于我们现已掌握的经验教训。




  '
- "# 定时器围裙\n\n你正在为朋友们举办一场派对，并想时刻留意厨房里正在烹饪的食物。要是能有个东西，你只需轻敲一下就能为一分钟计时，那该多好啊？在本例中，我们将制作一条带有内置定时器的围裙。当你轻敲一小块导电布时，计时器开始运行，此时一个\
  \ NeoPixel 灯会亮起红色；计时结束后，NeoPixel 灯会变成绿色并持续一段你设定的时间，然后熄灭。整个装置由一块 Adafruit Gemma 处理器控制，它类似于一个精简版的\
  \ Arduino（详见第 5 章），由两节纽扣电池供电。图 7-1 展示了完成后的围裙，Gemma 及其电池被放置在保护口袋中。\n\n![A371637_1_En_7_Fig1_HTML.jpg](img/A371637_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 完成后的定时器围裙\n\n围裙上的平底锅由三层构成：顶层是导电布，中间层是中间带孔的毛毡，底层也是导电布。当你按压顶层时，它会通过毛毡上的孔与底层连通。这就提供了一种非常不精确的方式，让你可以用手腕或任何干燥的物体来启动定时器。（请注意，在通电状态下，围裙不应弄湿。）\n\
  \n制作这个项目，你需要以下材料和工具：\n\n*   1 至 1.5 码轻到中等重量的棉布\n*   一卷缝纫线和梭芯\n*   用于纸样和/或裁缝粉笔的纸张\n\
  *   剪刀\n*   卷尺\n*   用于系带的棉质织带（可选）\n*   斜纹镶边带（可选）\n*   刺绣针\n*   白色和黑色绣花线\n*   一小块毛毡\n\
  *   Gemma 微处理器\n*   NeoPixel LED 灯\n*   导电布\n*   导电缝纫线\n*   两节（3 伏）纽扣电池\n*   电池盒（专为两节纽扣电池设计）\n\
  *   五根鳄鱼夹测试线（用于测试目的）\n\n> **注意**  \n> 本章介绍了一种制作该项目的简单方法。在第 11 章中，我们会讨论几个项目，并给出一些关于如何使本项目更省电的建议。在这里，我们侧重于让实现过程易于制作、调试和理解。但是，除非你断开电池连接，否则本项目会很快耗尽电池电量（我们估计能用几天时间，取决于你按按钮的频率）。\n\
  \n## 项目规划\n\n对于可穿戴项目，人们总忍不住直接开始缝制。然而，最好先克制住这种冲动，首先弄清楚你希望控制电路实现什么功能。然后，你可以先用 Fritzing（详见第\
  \ 5 章）设计电路布局，再用鳄鱼夹搭建测试电路，最后编写代码。\n\n我们建议在开始缝制之前完成所有这些工作，以防你发现还需要另一个元件（以及安装它的位置），或者意识到电路需要以某种特定方式布局，而这种布局在衣服尚未缝合时可能更方便实现。\n\
  \n> **提示**  \n> 琼（Joan）和林恩（Lyn）都发现，与 Fritzing 原理图相比，使用鳄鱼夹搭建的电路版本能更直观地想象电路的走向，尽管夹出来的电路有时可能会有点笨拙。里奇（Rich）不同意这种看法，所以这些事关乎个人风格和可视化能力。随着经验的积累，你会形成自己的方法。\n\
  \n由于这个项目要在需要保护 Gemma 的环境中使用，我们决定将 Gemma 及其连接线固定在一个小标签上，这样它就可以和电池一起滑入口袋。“平底锅按钮”需要精心设计，既要使其易于按压，又要防止误触。\n\
  \n## 控制设计及软件\n\n在这个案例中，我们希望只要定时器未被启动，电路就什么也不做。一旦定时器启动，NeoPixel 灯亮起红色。计时结束时，NeoPixel\
  \ 灯变成绿色并持续另一段时间。这两段时间都在代码顶部的`#define`语句中指定。如果你希望电路做更多事情——比如按不同时间长度循环显示几种颜色——你可以添加更多对\
  \ Adafruit 两个库函数的调用（详见第 6 章）：\n\n```\npixels.setPixelColor(0, pixels.Color(r, g,\
  \ b));\npixels.show();\n```\n\n`r`, `g`, `b`是 0 到 255 之间的数值，用于决定你想要的红色、绿色或蓝色像素的亮度。请注意，这三种原色的相对亮度决定了最终颜色的色调。整个\
  \ Gemma 的代码如代码清单 7-1 所示。\n\n> **注意**  \n> 代码清单 7-1 将计时器设置为仅运行一秒，然后让 NeoPixel 灯点亮两秒。我们建议你在调试过程中保持此设置，之后再将其改为你想要的任何数值（一分钟为\
  \ 60,000 毫秒）。`TIMER_DELAY`是计时器倒计时的时长（期间 NeoPixel 灯为红色），单位为毫秒；`PERSISTENCE_DELAY`是计时结束后\
  \ NeoPixel 灯保持绿色的时长。\n\n```\n// Program to turn on a neopixel red when a button\
  \ is pushed\n// And then green after a specified delay passes\n// And finally turns\
  \ off after a second specified delay\n#include <Adafruit_NeoPixel.h>\n#define NEOPIXEL_PIN\
  \ 2 // pin controlling the Neopixel\n#define BUTTON_PIN 1 // pin reading the state\
  \ of the button\n#define TIMER_DELAY 1000\n// in milliseconds - one second for the\
  \ demo\n#define PERSISTENCE_DELAY 2000\n//time to wait before turning off, in milliseconds\n\
  Adafruit_NeoPixel pixels =\nAdafruit_NeoPixel(1, NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800);\n\
  /*\nLast parameter depends on the neopixel version you have\nSee https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library\n\
  Remember for Gemma you need to push reset button\nto load in your program (no loading\
  \ after red light stops flashing)\n*/\nvoid setup() {\npixels.begin();\npinMode(BUTTON_PIN,\
  \ INPUT);\ndigitalWrite(BUTTON_PIN, HIGH);\n/*\nBUTTON_PIN is set to INPUT with\
  \ the\ninternal pull-up enabled and is\nconnected to the first layer of the button\
  \ (one closest to apron fabric).\nWhen the button is pressed,\nthis pin is connected\
  \ to GND and goes LOW,\nand the circult begins its countdown.\nHere we use pin D1\
  \ which will light up the red LED\nwhen D1 is HIGH (the button is NOT pushed)\n\
  */\n} // end setup\nvoid loop() {\nif (digitalRead(BUTTON_PIN) == LOW) {\npixels.setPixelColor(0,\
  \ pixels.Color(0, 150, 0));\npixels.show();\n// first have red light while timer\
  \ is counting down\n// this lets you know button was pushed and the timer is running\n\
  delay(TIMER_DELAY);\npixels.setPixelColor(0, pixels.Color(150, 0, 0));\npixels.show();\n\
  delay(PERSISTENCE_DELAY);\n// turn green after timer is done\n//and stay green for\
  \ PERSISTENCE_DELAY seconds\n} else {\npixels.setPixelColor(0, pixels.Color(0, 0,\
  \ 0));\npixels.show();\n// pixels turned off\n}\n} // end loop\n```\n\n代码清单 7-1.\
  \ 围裙程序\n\n\n\n## 电路布局\n\n草图编写完成并了解所有工作原理后，我们就可以开始布局电路了。图 7-2 展示了该项目的 Fritzing 接线图。该电路使用一块\
  \ `Gemma` 板、一个 `NeoPixel` 和两块导电织物，其布局相当于一个按键开关。\n\n![A371637_1_En_7_Fig2_HTML.jpg](img/A371637_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2. 围裙电路的 Fritzing 接线图\n\n其工作原理如下：`Gemma` 将 `D2` 引脚设置为输出引脚，用于控制 `NeoPixel`\
  \ 的状态。`NeoPixel` 的地线连接回导电织物\"按钮\"的顶部。`D1` 是一个特殊引脚，如果将其设置为 `HIGH`，则会点亮板载指示灯。我们利用此引脚检测导电织物按钮的状态，具体方式如下：\n\
  \n*   当开关断开时，红色板载指示灯亮起。`D1` 引脚默认被代码设置为 `HIGH`，在此起到上拉电阻的作用（参见第 5 章）。\n*   当开关闭合时，`D1`\
  \ 引脚被拉低至地电平，`Gemma` 向 `NeoPixel` 发送信号使其点亮，先显示一种颜色，再变换为下一种颜色。在两个定时灯对应的计时器计时结束后，`Gemma`\
  \ 通过将三种颜色的亮度均设置为零来关闭 `NeoPixel`。\n\n图 7-3 展示了使用鳄鱼夹进行布局测试的样子。红线从 `Vout` 连接到 `NeoPixel`\
  \ 的 `+` 端。蓝线从 `Gemma` 的 `D2` 引脚连接到 `NeoPixel` 的输入端（`->`）。灰线从 `NeoPixel` 的地（`–`）端连接到上方的导电织物片，黑色导线将该导电织物片连接到\
  \ `Gemma` 的 `GND` 端。最后，绿线从 `Gemma` 的 `D1` 引脚连接到构成按钮底部的导电织物片。（我们在这里使用了两块碎布片来模拟将在项目中创建的平底锅按钮的顶部和底部。）\n\
  \n![A371637_1_En_7_Fig3_HTML.jpg](img/A371637_1_En_7_Fig3_HTML.jpg)\n\n图 7-3. 使用鳄鱼夹测试电路\n\
  \n通过将连接绿线的导电织物片触碰与灰色和黑色导线相连的导电织物片，我们将 `D1` 引脚从 `HIGH` 拉低至 `LOW`，从而使 `Gemma` 上运行的代码点亮\
  \ `NeoPixel`。\n\n## 调试\n\n当您对使用鳄鱼夹连接的电路感到满意后，可以将草图上载到该电路（详见第 6 章），并通过 USB 线缆向 `Gemma`\
  \ 供电，测试其是否按预期工作。如果没有正常工作，请检查鳄鱼夹是否连接牢固、是否连接到正确的位置，以及 USB 是否正在为 `Gemma` 供电（`Gemma`\
  \ 板上标有 `PWR` 的绿色指示灯应亮起）。\n\n> **提示**：`Gemma` 启动时有些挑剔。您需要在通电后立即上载代码，此时红灯闪烁，因为允许 `Gemma`\
  \ 通过 USB 接收代码的\"引导加载程序\"正在运行——我们在第 6 章中介绍了这一点。否则，代码将无法正确加载。如果您错过了时机，可以按下（非常小的！）复位按钮来重新启动引导加载程序。\n\
  \n您也可以使用 `Flora` 板搭建此电路。如果您使用的是较旧版本（v1）的 `NeoPixel`，则需要修改 `Adafruit_NeoPixel pixels\
  \ = Adafruit_NeoPixel(1, NEOPIXEL_PIN, NEO_GRB + NEO_KHZ800)` 这一行中的最后一个参数。该参数取决于您所使用\
  \ `NeoPixel` 的版本。详情请参见 [`https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library`](https://learn.adafruit.com/adafruit-neopixel-uberguide/arduino-library)。对于\
  \ v1 版本的 `NeoPixel`，请将 `NEO_GRB + NEO_KHZ800` 改为 `NEO_RGB + NEO_KHZ400`。\n\n## 缝制围裙\n\
  \n当您觉得电路和软件都已掌握后，就可以开始制作围裙并将电路缝制到上面了。您可以参考用鳄鱼夹连接的版本，思考电路将如何铺设到布料上。我们强烈建议您在开始之前通读本章，以便对整个流程有一个整体概念。接下来，将由\
  \ Lyn（她是这方面的专家）为您讲解图案的制作过程。\n\n### 制作纸样\n\n首先，从胸骨顶端下方约 2 英寸处开始测量，直到您希望围裙结束的位置。我的身高是\
  \ 5 英尺 3 英寸，所以，如果我想要围裙顶部从胸骨下方开始，长度垂到膝盖上方约 3 英寸处，我需要以下尺寸——您可以根据自己的身高进行调整。我测量并裁剪了布料，围裙胸档顶部宽\
  \ 12 英寸，然后向外弯曲，在最宽处（底部）达到 24 英寸。在我的设计中，围裙中心从上到下的尺寸是 28 英寸。这个尺寸为每个边预留了大约 1 英寸用于双折边，或者您也可以使用斜纹滚边带（可以购买到的用于服装收边的布条），这种情况每个边只需增加半英寸。\n\
  \n使用图 7-4 中的示意图，用薄纸或牛皮纸制作一个纸样，或者直接用裁缝粉笔在布料上画出。围裙主体宽度应在 24–27 英寸左右，胸档折边后的宽度可为 8–10\
  \ 英寸。这完全取决于您希望围裙覆盖多大的躯干区域。将布料对折，使布边（布料的成品边缘）对齐。在布料上画出围裙的一半，或者使用您制作好的纸样，然后裁出围裙。利用对折可以确保两侧的曲线对称。\n\
  \n![A371637_1_En_7_Fig4_HTML.jpg](img/A371637_1_En_7_Fig4_HTML.jpg)\n\n图 7-4. 围裙纸样（按需放大）\n\
  \n我们在胸档的左侧（即您穿着时您的左手侧）缝制一个小口袋，用于放置电池和 `Gemma` 板。平底锅按钮将缝制在此口袋的右侧（穿戴者的右手侧）。小口袋宽 2.5\
  \ 英寸，深 4 英寸，因此我们裁剪一块宽 3.5 英寸、深 5 英寸的布料，以便留出折边余量（图 7-5）。围裙主体上的大口袋宽 6 英寸，深 7 英寸，因此我们裁剪一块宽\
  \ 7 英寸、深 8 英寸的布料。\n\n![A371637_1_En_7_Fig5_HTML.jpg](img/A371637_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5. 用粉笔绘制的围裙纸样。照片底部为布料折叠处。\n\n如果您想用围裙布料而非棉织带制作挂颈带和系带，请裁剪一块宽 4 英寸、长 22–24 英寸的布料，以及两块宽\
  \ 4 英寸、长 24–26 英寸的布料。务必使这些布料的裁剪方向与布料的直纹方向（即平行于布边的方向）保持一致——否则围裙将是斜裁的，布料可能垂坠不均或起皱。\n\
  \n### 制作平底锅按钮\n\n我们将裁剪两块导电织物和一块毛毡，裁剪成平底锅形状，用于制作定时按钮（图 7-6 和 7-7）。毛毡将用于隔离导电织物，中心区域除外。我们将在毛毡上切一个孔，以便在按压平底锅中心时，两块导电织物能够接触。可用毛毡片、缝制的布料或刺绣来制作\"\
  蒸汽\"效果（如图 7-1 所示）。\n\n![A371637_1_En_7_Fig7_HTML.jpg](img/A371637_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7. 使用简单的纸样裁剪平底锅顶部。\n\n![A371637_1_En_7_Fig6_HTML.jpg](img/A371637_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6. 按钮内部的毛毡（左上角）、平底锅顶部（导电织物——右上角）、纸样（左下角）和按钮底部的导电织物（右下角）\n\n\n\n### 制作口袋\n\n\
  使用裁缝粉笔，在围裙正面测量并标记出你想要口袋的位置。记住，在口袋边缘折边时，所有边都要额外增加半英寸。首先，沿着口袋的所有边缘进行缝合，防止布料脱线。然后，将口袋的顶部边缘向布料反面折下半英寸并熨平。沿着边缘缝线。将布料翻到正面，用剪刀尖或类似尖物轻轻将角落顶出。用熨斗熨烫侧面和底部，制作出半英寸的折边（见图\
  \ 7-8）。\n\n![A371637_1_En_7_Fig8_HTML.jpg](img/A371637_1_En_7_Fig8_HTML.jpg)\n\n\
  图 7-8.\n\n完成后的布片——这将成为大口袋的内侧。\n\n将口袋用珠针固定在围裙上。从一个口袋的顶部缝到底部，无需取下布料，直接在机器上转动布料。缝过底部，再次转动布料，然后缝上另一侧。记住，在开始缝第一侧和完成另一侧缝合时，都要增加几针来回缝线（图\
  \ 7-9）。\n\n![A371637_1_En_7_Fig9_HTML.jpg](img/A371637_1_En_7_Fig9_HTML.jpg)\n\n\
  图 7-9.\n\n缝制靠近底部的口袋——另一个口袋以同样方式缝制\n\n### 包边处理\n\n用曲折线迹沿着整个围裙的边缘进行缝合，防止脱线（曲折线迹如图\
  \ 7-8 所示）。将整条围裙的边缘向反面折进半英寸并熨平。用直线线迹缝合固定。\n\n### 缝制系带和颈带\n\n将系带和颈带的边缘向中间折叠，再纵向对折（图\
  \ 7-10 和 7-11），并将末端同样折入内侧。缝合系带和颈带的边缘及末端。将它们用珠针固定在围裙上并缝合。建议在缝合处多缝几道，以防脱落。\n\n![A371637_1_En_7_Fig11_HTML.jpg](img/A371637_1_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11.\n\n最后一次折叠（将在其一侧缝合以完成制作）\n\n![A371637_1_En_7_Fig10_HTML.jpg](img/A371637_1_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10.\n\n系带或颈带的第一次折叠\n\n如果你使用棉质织带制作颈带和系带，将它们剪裁成与布料版本相同的长度，并对所有末端进行折边处理。用珠针固定在围裙上并缝合。\n\
  \n### 组装平底锅按钮\n\n取出你之前裁剪并放好的平底锅形状的导电布片和毛毡片。将毛毡片修剪得比导电布片略小。再裁剪一片不带手柄的导电布片，并修剪得比毛毡片略小。在毛毡平底锅的中心剪一个洞。这将成为你为计时器增加时间的按钮。用手缝针将平底锅部件的底层（不带手柄的那片）缝到围裙上。你可以在图\
  \ 7-6 中看到这些布片，在我完成图 7-12 时，它们已在围裙上。\n\n![A371637_1_En_7_Fig12_HTML.jpg](img/A371637_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12.\n\n完成平底锅制作（组装图 7-6 中的部件）\n\n### 缝制电子元件和电路\n\n从围裙布料上裁剪一块 2.5 英寸 x 4.5 英寸的小矩形。用曲折线迹沿所有边缘缝合，将每个边缘向内折进四分之一英寸，熨平后用直线线迹包边。这将制作一个用来放置\
  \ Gemma 的罩布，方便它从口袋中取放（图 7-13）。\n\n使用 `3Vo` 和 `D1` 孔（我们其他情况下不会用到它们），用普通线（非导电线程）将\
  \ Gemma 缝到罩布上。图 7-13 显示了带有本节所述的全部导电线程行的围裙。\n\nNeoPixel 将连接到穿戴者右侧的口袋上，该口袋将容纳 Gemma\
  \ 和电池。使用 NeoPixel 上的“箭头出”孔，用普通线（非导电线程）将元件缝到围裙上。`–`、`+` 和“箭头入”将稍后用导电线程缝制。\n\n参考图\
  \ 7-2 中的 Fritzing 图，将你的元件摆放在围裙胸片上，并用裁缝粉笔在布料上轻轻画出你的电路路径。这些路径就是你用导电线程连接元件时要缝合的路线。\n\
  \n> **注**  \n> 该电路需要在引脚 `D1` 上设置一个上拉电阻，因为我们希望 `D1` 上的输入在按钮（平底锅）被按下前保持 `HIGH`，当按钮按下时为\
  \ `LOW`（接地电压）。换句话说，我们希望在按钮按下时完成电路。我们在代码中将输入引脚设为 `HIGH`，以启用芯片的内部上拉电阻（如果我们试图将按钮连接到\
  \ `3Vo`，这将无法工作，因为芯片没有内部下拉电阻）。更多信息请参见第 5 章和第 6 章。\n\n接下来，你需要按以下方式连接元件：\n\n*   导电布底层连接到\
  \ Gemma 的 `D1`\n*   导电布顶层连接到 Gemma 的 `GND`\n*   NeoPixel 上的“输入”箭头连接到 Gemma 的 `D2`\n\
  *   NeoPixel 上的 `+` 连接到 Gemma 的 `Vout`\n*   NeoPixel 上的 `–` 连接到按钮的顶层（该层已连接到 `GND`）\n\
  \n我们现在将依次介绍每次导电线程的走线。所有走线在图 7-13 中均可见，除非这些连接位于围裙内侧或罩布下方。\n\n![A371637_1_En_7_Fig13_HTML.jpg](img/A371637_1_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13.\n\n电子元件罩布、电池盒、Gemma、NeoPixel 及手工导电缝线的布局\n\n#### 第一道导电线程走线\n\n这条走线连接平底锅按钮的底部到\
  \ Gemma 的 `D1`。将导电线程穿入针中，在线的长端末尾打两到三个结。将针从平底锅最靠近 Gemma 罩布的边缘处向上刺入布料，拉紧线程直到线结绷紧。不要缝得太靠近导电布的边缘，否则会导致布料脱线。\n\
  \n用小而直的针迹，缝出一条路径到罩布的顶部，然后沿着侧面缝到 Gemma 的 `D1` 引脚。将针向上穿过孔并拉紧线。将针向下穿过罩布，位置紧邻 Gemma\
  \ 焊盘的边缘，并拉紧线。这样缝两三针以建立牢固的连接。不要将罩布缝到口袋上。\n\n当你用导电线程进行这些缝合走线时，确保在连接到 Gemma 和 NeoPixel\
  \ 的位置将线拉紧，但不要过紧以致布料变形。连接太松会导致无法正常工作。\n\n在罩布的背面打结，方法是在同一位置缝三个小针迹。剪断导电线程，留一个小线头。所有连接完成之后，用透明指甲油密封线结（导电线程由金属丝制成，不易保持紧结）。让指甲油干燥，然后剪掉所有线头。\n\
  \n\n\n#### 第二根导电线行程\n\n这根线从锅的顶部连接到`Gemma`上的接地（`GND`）引脚。使用与上一行程相同的技术来打结导电线，并缝制从锅顶层边缘到门襟顶部的连接。使此行程与第一根线平行，且不要让导电线行程相互接触。将门襟顶部缝制到`Gemma`的`GND`引脚上，连接到焊盘并打结。\n\
  \n**注意**：`NeoPixel`上的孔比`Gemma`上的孔小。在开始下一行程之前，请检查你的针能否带着导电线穿过这些孔。\n\n#### 第三根导电线行程\n\
  \n这根线从`NeoPixel`上的`“in”`箭头连接到`Gemma`的`D2`引脚，操作起来有点棘手，因为它需要从门襟上`Gemma`的下方穿过。将线打结，从围裙的背面将针穿过`“in”`箭头引脚，拉紧，然后紧贴焊盘将针刺入织物。重复此动作两到三次。使用小针脚，绣出一条通往`Gemma`中心上方门襟顶部的路线，确保它不与已创建的其他路线接触。将线缝至`Gemma`下方，并连接到底部的`D2`引脚。不要让针脚穿过口袋。连接到引脚并打结。\n\
  \n#### 第四根导电线行程\n\n这根线将`NeoPixel`上的`+`连接到`Gemma`的`Vout`。重复与第三行程相同的过程，将线缝至门襟顶部，再缝至`Gemma`的`Vout`引脚。此连接无需在`Gemma`下方缝线。连接到引脚并打结。\n\
  \n#### 第五根导电线行程\n\n最后，将`NeoPixel`上的`–`连接到锅的顶层。连接到`–`引脚，然后将线直直地向下缝到锅的顶层。确保只缝穿导电织物的顶层，而不是毛毡或底层。在锅的边缘打结。\n\
  \n### 收尾工作\n\n用裁缝粉笔在围裙上画出一道蒸汽旋涡。使用绣花针和白色绣花线，沿着粉笔线用小而直的针脚绣出蒸汽效果。你也可以用黑色绣花线为锅增添细节。不过，我们担心这可能会通过纽扣造成意外连接，也可能导致导电织物磨损，因此决定保持原样。\n\
  \n检查你的连接，确保它们足够牢固且未与其他任何连接接触。使用透明指甲油固定所有线结，并修剪导电线多余的部分。\n\n将纽扣电池装入电池座，插入`Gemma`板，检查是否一切正常。如果不行，请仔细检查导电线行程和导电织物中可能短路的地方。按下`Gemma`上的复位按钮（假设你在缝制前已按本章前文提示将代码烧录到板上）。瞧！一个带计时器的围裙——干得漂亮！\n\
  \n## 实际应用\n\n我们以围裙为示例构建此项目，因为它易于缝制，并且我们认为在待客时展示它会很有趣。同样的电路也适用于体育场景，例如你可能想用几种颜色来显示单圈分段时间，或其他计时应用。\n\
  \n如果你真的把它当作围裙使用（因此需要经常清洗），你可以将电路缝制在带有按扣或魔术贴的门襟上，这样你就可以清洗围裙的其余部分，同时使电子部件保持干燥。Adafruit\
  \ 表示，只要取出电池，它的`Gemma`处理器就可以清洗；如果你使用的是此处示例之外的硬件，请查阅制造商的规格说明。围裙在连接电池时不应弄湿，因此应更多地将其视为一件用于展示谈资的单品，而非在油污烹饪现场穿着的工作服。\n\
  \n这段简化的代码会比实际需要更快地耗尽电池电量，因为它从未进入任何形式的睡眠模式。睡眠模式在`Gemma`上比较棘手，因为它处理中断（指示其停止当前工作并恢复做其他事情的信号）的能力有限。\n\
  \n`Arduinos` 总体而言并非真正的计算机——它们一次只能做一件事，不像你的笔记本电脑或台式机，可以同时在多个程序间共享资源。由于各种技术原因，`Gemmas`在应对多任务处理方面尤为困难。尝试通过反复按下按钮来增加更多时间也会很有趣，但这需要过滤掉杂散按钮按下信号（即去抖），这超出了本章的范围。\n\
  \n## 总结\n\n本章通过一个简单示例，引导你运用了前几章关于缝纫（第 3 章和第 4 章）、电子（第 5 章）和编程（第 6 章）的技巧。关键要点是，项目执行的顺序很重要。当然，你应该先做一些规划，但你还应该详细确定项目要实现什么功能，用鳄鱼夹布置好电路，并编写和测试代码——按此顺序进行。\n\
  \n只有在此之后，你才能开始裁剪布料，因为一旦你了解了你的电子元件将要做什么以及电路需要如何走线，你很可能会需要调整服装。我们详细讨论了所有这些步骤，制作了一个集成计时器的围裙，计时器运行时点亮`NeoPixel`一种颜色，时间到时则变为另一种颜色。这个项目应能让你体会到在接下来的章节中处理更复杂组件和项目时需要考虑的问题。\n\
  \n"
- '# 第三部分

  进阶内容


  第 8 章至第 11 章将探讨比前几章更复杂的主题。第 8 章向你展示如何使用几种不同类型的传感器，使你的创作对周围环境做出反应，并为你指出若想让项目自主移动下一步该怎么做。


  第 9 章总结了 3D 打印流程，并给出了在哪里可以详细了解它的建议。第 10 章则展示了当一个过于雄心勃勃的第一个项目试图同时做太多事情时，可能会出现什么问题（我们确实遇到了）。


  最后，在第 11 章中，你将找到两个从相反方向着手制作的可穿戴技术大项目。第一个是大型缝纫项目（封面上的裙子），它使用电致发光（`EL`）带来照亮织物块之间的边界，但无需编程且电路设计需求最低。另一个项目则需要更多的电路设计和大量的代码，但缝纫量极少。它以一个现成的帽子为基础，添加一个缝制电路，使其在你摇头时亮红灯，点头时亮绿灯。因此，你可以根据自己最擅长的领域来选择一个有分量的项目。




