  trans: "\n```objectivec\nNSNotificationCenter *notificationCenter = [NSNotificationCenter\
    \ defaultCenter];\n[notificationCenter addObserver:self selector:@selector(nowPlayingItemChanged:)\
    \     \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification  \
    \ \n    object:player];\n[player beginGeneratingPlaybackNotifications];\n```\n\
    \n完成这一步后，每当曲目发生变化，通知中心就会调用你的 `nowPlayingItemChanged:` 方法。\n\n当你完成了操作，不再需要这些通知时，需要取消注册并告诉音乐播放器控制器停止生成通知：\n\
    \n```objectivec\nNSNotificationCenter *center = [NSNotificationCenter defaultCenter];\n\
    [center removeObserver:self                   \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
    \                 \n    object:player];\n[player endGeneratingPlaybackNotifications];\n\
    ```\n\n现在你已经掌握了所有理论知识，让我们开始构建一些东西吧！\n\n## 简易音乐播放器\n\n你要搭建的第一个应用程序将运用之前涵盖的所有内容，来构建一个简易的音乐播放器。该应用将允许用户通过\
    \ `MPMediaPickerController` 创建歌曲队列，并通过 `MPMusicPlayerController` 进行播放。\n\n**注意：**\
    \ 我们将使用术语 *队列* 来描述应用中的歌曲列表，而不是术语 *播放列表*。在处理媒体资料库时，术语 *播放列表* 指的是从 iTunes 同步过来的实际播放列表。这些播放列表可以被读取，但无法使用\
    \ SDK 创建。为了避免混淆，我们将坚持使用术语 *队列*。\n\n当应用启动时，它会检查当前是否有音乐正在播放。如果有，它会允许该音乐继续播放，并将任何请求播放的音乐附加到待播放歌曲列表的末尾。\n\
    \n**提示：** 如果你的应用需要播放特定的音效或音乐，你可能会觉得关闭用户当前正在播放的音乐是合适的，但这样做需要谨慎。如果你只是提供背景音乐，你真的应该考虑让正在播放的音乐继续播放，或者至少让用户选择是否关闭他们选择的音乐来播放你应用的音乐。当然，最终决定权在你手中，但在覆盖用户的音乐时，务必谨慎行事。\n\
    \n你要构建的这个应用并不十分实用，因为你能提供给用户的所有功能（甚至更多）在 iOS 设备上的“音乐”应用中已经存在了。但编写这个应用将让你能够探索你自己的应用在处理媒体资料库时可能需要执行的几乎所有任务。\n\
    \n**警告：** 本章的应用必须在真实的 iOS 设备上运行。iOS 模拟器无法访问你电脑上的 iTunes 资料库，任何与 iTunes 资料库访问 API\
    \ 相关的调用都会在模拟器上导致错误。\n\n## 构建 SimplePlayer 应用\n\n你的应用将获取 iPod 音乐播放器控制器，并允许你通过媒体选择器将歌曲添加到队列中。你将提供一些基本的播放控制功能，如播放/暂停音乐，以及在队列中向前和向后跳转。\n\
    \n**注意：** 再次提醒，模拟器目前还不支持媒体资料库功能。为了充分利用 SimplePlayer 应用，你需要在 iOS 设备上运行它，这意味着你需要注册苹果的付费\
    \ iOS 开发者计划。如果你还没有这样做，不妨暂停片刻，前往 [`developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)\
    \ 了解一下。\n\n让我们先在 Xcode 中创建一个新项目。由于这是一个非常简单的应用，我们将使用“单视图应用”项目模板，并将新项目命名为 `SimplePlayer`。因为你只有一个视图，所以不需要使用\
    \ Storyboard，当然如果你想用的话也可以。\n\n新项目创建完成后，你需要将 `MediaPlayer` 框架添加到项目中。在导航窗格顶部选择 `SimplePlayer`\
    \ 项目。在项目编辑器中，选择 `SimplePlayer` 目标并打开“构建阶段”面板。找到“将二进制文件与库链接”（3 项）部分并展开。点击该部分底部的\
    \ + 按钮，然后添加 `MediaPlayer` 框架。如果操作正确，`MediaPlayer.framework` 应该会出现在导航窗格的项目中。为了保持整洁，我们将\
    \ `MediaPlayer.framework` 移到项目中的“框架”组中。\n\n## 构建用户界面\n\n单击 `ViewController.xib`\
    \ 打开界面生成器。让我们看看 图 12-2。顶部有三个标签，中间是一个图像视图，底部是一个带有四个按钮的按钮栏。我们从底部开始，逐步向上构建。\n\n![9781430238072_Fig12-02.jpg](img/9781430238072_Fig12-02.jpg)\n\
    \n图 12-2.  SimplePlayer 应用正在播放一首歌曲\n\n从对象库中拖拽一个 `UIToolbar` 到 `UIView` 的底部。默认情况下，`UIToolbar`\
    \ 会提供一个左对齐的 `UIBarButtonItem`。由于你的工具栏需要四个按钮，我们将保留这个按钮。拖拽一个灵活的空白栏按钮项（图 12-3）到 `UIBarButtonItem`\
    \ 的左侧。确保你使用的是灵活空白，而不是固定空白。如果放置位置正确，`UIBarButtonItem` 现在应该右对齐到 `UIToolbar` 上（图\
    \ 12-4）。\n\n![9781430238072_Fig12-03.jpg](img/9781430238072_Fig12-03.jpg)\n\n\
    图 12-3.  对象库中的灵活空白栏按钮项\n\n![9781430238072_Fig12-04.jpg](img/9781430238072_Fig12-04.jpg)\n\
    \n图 12-4.  带有灵活空白的 SimplePlayer 工具栏\n\n在灵活空白的左侧添加三个 `UIBarButtonItem`。这些将是你的播放控制按钮。为了将这些按钮居中，你需要在\
    \ `UIToolbar` 的左侧再添加一个灵活的空白栏按钮项（图 12-5）。选择最左侧的按钮，打开属性检查器。将标识符从“自定义”更改为“后退”（图 12-6）。选择新“后退”按钮右侧的按钮，将标识符更改为“播放”。将“播放”按钮右侧的按钮标识符更改为“快进”。选择最右侧的按钮，将标识符更改为“添加”。完成后，效果应如\
    \ 图 12-7 所示。\n\n![9781430238072_Fig12-05.jpg](img/9781430238072_Fig12-05.jpg)\n\
    \n图 12-5.  包含所有按钮的工具栏\n\n![9781430238072_Fig12-06.jpg](img/9781430238072_Fig12-06.jpg)\n\
    \n图 12-6.  将栏按钮项标识符更改为“后退”\n\n![9781430238072_Fig12-07.jpg](img/9781430238072_Fig12-07.jpg)\n\
    \n图 12-7.  完成后的工具栏\n\n向上移动视图，你需要添加一个 `UIImageView`。将其拖拽到视图中，位于工具栏上方。界面生成器会将 `UIImageView`\
    \ 扩展以填充可用区域。如果你不希望这样，请在实用工具面板中打开大小检查器。`UIImageView` 应该已经被选中，如果没有，请选中它以确保你在调整正确的组件。大小检查器应显示你的\
    \ `UIImageView` 宽度为 320。将高度改为与宽度相同。现在你的图像视图应该是正方形的。使用对齐参考线将图像视图在视图中居中。\n"
- fmt: "# Formatting Your SimplePlayer App\n\nNow you need to add the three labels\
    \ across the top. Drag a label to the top of your application’s view. Extend the\
    \ area of the label to the width of your view. Open the Attribute Inspector, and\
    \ change the label text from “Label” to “Now Playing.” Change the label’s color\
    \ from black to white, and set the font to System Bold 17.0. Set the alignment\
    \ to center. Finally, change the label’s background color to black ([Figure 12-8](#9781430238072_Ch12.xhtml#Fig8)).\
    \ Add another label below this label. Give it the same attributes as the first\
    \ label, but set the text from “Label” to “Artist.” Add one more label, below\
    \ the Artist label, with the same attribute settings, and set the text to “Song.”\n\
    \n![9781430238072_Fig12-08.jpg](images/9781430238072_Fig12-08.jpg)\n\n[Figure\
    \ 12-8.](#9781430238072_Ch12.xhtml#_Fig8) Your SimplePlayer label attributes\n\
    \nFinally, set the background of your view to black. Because black is cool.\n\n\
    ## Declaring Outlets and Actions\n\nIn Interface Builder, switch from the standard\
    \ editor to the assistant editor. The Editor pane should split to show Interface\
    \ Builder on the left and `ViewController.h` on the right. Control-drag from the\
    \ label with the text “Now Playing” to just below the `@interface` declaration.\
    \ Create a `UILabel` outlet and name it `status`. Repeat for the Artist and Song\
    \ labels, naming the outlets `artist` and `song`, respectively.\n\nControl-drag\
    \ from the image view to below the label outlets and create a `UIImageView` outlet\
    \ named `imageView`. Do the same for the Toolbar and the Play button. Now that\
    \ you have your outlets set up, you need to add your actions.\n\nControl-drag\
    \ from the `rewindButton`, and create an action named `rewindPressed`. Repeat\
    \ for each button. Name the play action `playPausePressed`, the fast forward action\
    \ `fastForwardPressed`, and the add action `addPressed`.\n\nSwitch back to the\
    \ standard editor and select `ViewController.h` to open it in the editor.\n\n\
    First, you need to have your `ViewController` conform to the `MPMediaPickerDelegate`\
    \ protocol, so you can use the `MPMediaPicker` controller. In order to do that,\
    \ you need to import the MediaPlayer header file, right after the UIKit header\
    \ import:\n\n```objective-c\n#import <MediaPlayer/MediaPlayer.h>\n```\n\nThen\
    \ you’ll add the protocol declaration to `ViewController`:\n\n```objective-c\n\
    @interface ViewController : UIViewController <MPMediaPickerControllerDelegate>\n\
    ```\n\nYou need to add another `UIBarButtonItem` property to hold the pause button\
    \ you’ll display while music is playing. You also need to change the Play button\
    \ property from weak to strong so you can toggle between the two.\n\n```objective-c\n\
    @property (strong, nonatomic) IBOutlet UIBarButtonItem *play;\n@property (strong,\
    \ nonatomic)          UIBarButtonItem *pause;\n```\n\nYou need two more properties:\
    \ one to hold your `MPMediaPlayerController` instance, and the other to hold the\
    \ `MPMediaItemCollection` that the player is playing.\n\n```objective-c\n@property\
    \ (strong, nonatomic) MPMusicPlayerController *player;\n@property (strong, nonatomic)\
    \ MPMediaItemCollection   *collection;\n```\n\nWhen the `MPMusicPlayerController`\
    \ starts playing a new media item, it sends a notification of type `MPMusicPlayerControllerNowPlayingItemDidChangeNotification`.\
    \ You’ll set up an observer for that notification to update the labels in your\
    \ view.\n\n```objective-c\n- (void)nowPlayingItemChanged:(NSNotification *)notification;\n\
    ```\n\nSelect `ViewController.m` to open it in the Editor pane. First you need\
    \ to set up things for when the view loads. Find the `viewDidLoad` method. After\
    \ the call to `super`, you need to instantiate the Pause button.\n\n```objective-c\n\
    self.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
    \                                                                            \
    \                                target:self                                 \
    \                                                                           action:@selector(playPausePressed:)];\n\
    [self.pause setStyle:UIBarButtonItemStyleBordered];\n```\n\nNext, create your\
    \ `MPMusicPlayerController` instance.\n\n```objective-c\nself.player = [MPMusicPlayerController\
    \ iPodMusicPlayer];\n```\n\nThen register for the notification when the Now Playing\
    \ item changes in the player.\n\n```objective-c\nNSNotificationCenter *notificationCenter\
    \ = [NSNotificationCenter defaultCenter];\n[notificationCenter addObserver:self\
    \                        selector:@selector(nowPlayingItemChanged:)          \
    \                  \n name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
    \                          \nobject:self.player];\n[self.player beginGeneratingPlaybackNotifications];\n\
    ```\n\nNote that you must tell the player to begin generating playback notifications.\
    \ Since you registered for notifications, you have to remove your observer when\
    \ view is released.\n\n```objective-c\n- (void)didReceiveMemoryWarning\n{\n  \
    \  [super didReceiveMemoryWarning];\n    // Dispose of any resources that can\
    \ be recreated.\n    [[NSNotificationCenter defaultCenter]         \n   removeObserver:self\
    \                   \n   name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
    \                 \n object:self.player];\n}\n```\n\nLet’s work on the button\
    \ actions next. When the user presses the Rewind button, you want the player to\
    \ skip to the previous song in the queue. However, if it’s at the first song in\
    \ the queue, it’ll just skip to the beginning of that song.\n\n```objective-c\n\
    - (IBAction)rewindPressed:(id)sender\n{\n    if ([self.player indexOfNowPlayingItem]\
    \ == 0) {\n        [self.player skipToBeginning];\n    }\n    else {\n       \
    \ [self.player endSeeking];\n        [self.player skipToPreviousItem];\n    }\n\
    }\n```\n\nWhen the Play button is pressed, you want to start playing the music.\
    \ You also want to the button to change to the Pause button. Then, if the player\
    \ is already playing music, you want to player to pause (stop), and have the button\
    \ change back to the Play button.\n\n```objective-c\n- (IBAction)playPausePressed:(id)sender\n\
    {\n    MPMusicPlaybackState playbackState = [self.player playbackState];\n   \
    \ NSMutableArray *items = [NSMutableArray arrayWithArray:[self.toolbar items]];\n\
    \    if (playbackState == MPMusicPlaybackStateStopped || playbackState == MPMusicPlaybackStatePaused)\
    \ {\n        [self.player play];\n        [items replaceObjectAtIndex:2 withObject:self.pause];\n\
    \    }\n    else if (playbackState == MPMusicPlaybackStatePlaying) {\n       \
    \ [self.player pause];\n        [items replaceObjectAtIndex:2 withObject:self.play];\n\
    \    }\n    [self.toolbar setItems:items animated:NO];\n}\n```\n\nYou query the\
    \ player for its playback state, then use it to determine whether you should start\
    \ or stop the player. In order to toggle between the Play and Pause buttons, you\
    \ need to get the array of items in the toolbar and replace the third item (index\
    \ of 2) with the appropriate button. Then you replace the entire array of bar\
    \ button items for the toolbar.\n\nThe Fast Forward button works similarly to\
    \ the Rewind button. When pressed, the player moves forward in the queue and plays\
    \ the next song. If it’s at the last song in the queue, it stops the player and\
    \ resets the Play button.\n\n```objective-c\n- (IBAction)fastForwardPressed:(id)sender\n\
    {\n    NSUInteger nowPlayingIndex = [self.player indexOfNowPlayingItem];\n   \
    \ [self.player endSeeking];\n    [self.player skipToNextItem];\n    if ([self.player\
    \ nowPlayingItem] == nil) {\n        if ([self.collection count] > nowPlayingIndex+1)\
    \ {\n            // added more songs while playing\n            [self.player setQueueWithItemCollection:self.collection];\n\
    \            MPMediaItem *item = [[self.collection items] objectAtIndex:nowPlayingIndex+1];\n\
    \            [self.player setNowPlayingItem:item];\n            [self.player play];\n\
    \        }\n        else {\n            // no more songs\n            [self.player\
    \ stop];\n            NSMutableArray *items = [NSMutableArray arrayWithArray:[self.toolbar\
    \ items]];\n            [items replaceObjectAtIndex:2 withObject:self.play];\n\
    \            [self.toolbar setItems:items];\n        }\n    }\n}\n```\n\nWhen\
    \ the Add button is pressed, you need to modally display the `MPMediaPickerController`.\
    \ You set it to display only music media types, and set its delegate to `ViewController`."
