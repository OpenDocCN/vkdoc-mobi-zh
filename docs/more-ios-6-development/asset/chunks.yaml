    \ `STFail` 替换为以下内容：\n\n```\n- (void)testExample\n{\n    STAssertTrue(YES, @\"\
    让这个测试通过\");\n}\n```\n\n**注意：** 如需完整的测试断言列表，请查看 `SenTestingKit` 框架中的 `SenTestCase.h`\
