  trans: '

    # Segue 定义转场


    `A segue` 定义了从一个场景到下一个场景的转场。在第 2 章的应用程序中，当你在主视图控制器中选择一个事件时，就触发了 segue 转场到详细视图控制器。


    但是导航控制器左侧的箭头呢？它只是告诉你导航控制器是这个故事板的根视图控制器。


    ## 故事板文档大纲


    既然你在故事板编辑器中有了内容，让我们看看故事板文档大纲。打开它。现在你可以看到之前描述的场景的层级视图（图 3-12），其中包含了它们的视图控制器、视图和
    UI 组件。


    ![9781430238072_Fig03-12.jpg](img/9781430238072_Fig03-12.jpg)


    图 3-12.  填充内容后的故事板文档大纲


    让我们看看你目前完成的工作。构建并运行 SuperDB 应用。你应该会看到类似图 3-13 的内容。


    ![9781430238072_Fig03-13.jpg](img/9781430238072_Fig03-13.jpg)


    图 3-13.  到目前为止的 SuperDB 应用


    ## 应用架构


    没有一种架构适用于所有应用。一种显而易见的方法是让应用成为一个标签栏应用，然后为每个标签添加一个独立的导航控制器。如果每个标签对应一个完全不同的视图，显示不同类型的数据，这种方法是完全合理的。在
    *Beginning iOS 6 Development* 的第 7 章中，你正是使用了这种方法，因为每个标签都对应一个拥有不同 Outlet 和不同操作的不同视图控制器。


    然而，在本例中，你将实现两个标签（后续章节还会添加更多），但每个标签将显示完全相同的数据，只是排序方式不同。当一个标签被选中时，表格将按超级英雄的姓名排序。如果另一个标签被选中，则会显示相同的数据，但按超级英雄的秘密身份排序。


    无论选中哪个标签，点击表格中的某一行都会执行相同的操作：向下钻取到一个新视图，你可以在其中编辑所选超级英雄的信息（你将在下一章中添加此功能）。无论选中哪个标签，点击“添加”按钮都会添加同一个实体的新实例。当你向下钻取到另一个视图来查看或编辑英雄时，标签栏就不再相关了。


    对于你的应用来说，标签栏只是修改了单个表格中数据的呈现方式。它实际上不需要切换其他视图控制器。为什么要有多个导航控制器实例来管理完全相同的数据集，并以相同的方式响应触摸？为什么不只使用一个表格控制器，让它根据选中的标签来改变数据的呈现方式？这就是你将在本应用中采用的方法。因此，你的应用将不是一个真正的标签栏应用。


    你的根视图控制器将是一个导航控制器，你将纯粹使用标签栏来接收用户输入。最终呈现给用户的结果，与你为每个标签创建独立的导航控制器和表格视图控制器所看到的结果完全相同。但在幕后，你将使用更少的内存，并且不必担心保持不同导航控制器之间的同步。


    你的应用的根视图控制器将是一个 `UINavigationController` 实例。你将创建自己的自定义视图控制器类 `HeroListController`，作为这个
    `UINavigationController` 的根视图控制器。`HeroListController` 将显示超级英雄列表，以及控制英雄如何显示和排序的标签。


    以下是应用的工作方式。当应用启动时，`HeroListController` 的一个实例从故事板文件加载。然后，以 `HeroListController`
    实例为根视图控制器，创建一个 `UINavigationController` 实例。最后，将 `UINavigationController` 设置为应用的根视图控制器。与
    `HeroListController` 关联的视图包含了你的标签栏和超级英雄表格视图。


    在第 4 章中，你将添加一个表格视图控制器来实现详细的超级英雄视图。当用户在超级英雄列表中点击一个超级英雄时，这个详细控制器将被推送到导航堆栈上，其视图将临时替换
    `UINavigationController` 内容视图中 `HeroListController` 的视图。现在无需担心详细视图；我们只是想让你预览一下即将实现的功能。


    ## 设计视图控制器接口


    你的应用的根视图控制器现在是一个标准的 `UINavigationController`。你不需要编写任何代码；只需将一个导航控制器对象拖放到你的故事板中即可。Xcode
    还为你提供了一个 `UITableViewController` 作为导航控制器堆栈的根。尽管你将使用表格来显示英雄列表，但你不会继承 `UITableViewController`。因为你还需要在界面中添加一个标签栏，所以你将创建一个
    `UIViewController` 的子类，并在故事板编辑器中创建你的界面。用于显示英雄列表的表格将是你的视图控制器内容面板的一个子视图。


    如果尚未选中，请在导航窗格中选择 `SuperDB.storyboard`。同时确保工具面板已显示。故事板应该有两个场景：导航控制器和表格视图控制器 - 根。缩小视图，使两个场景都可见。选择“表格视图控制器
    - 根”。只有“表格视图控制器 - 根”场景和标签应高亮显示为蓝色。按 Delete 键或选择“编辑”![image](img/arrow.jpg)“删除”来删除该表格视图控制器。现在你应只剩下导航控制器。


    从工具面板底部，从对象库中选择一个视图控制器并将其拖拽到故事板编辑器中。应该会出现一个视图控制器；将其放在导航控制器的右侧（图 3-14）。


    ![9781430238072_Fig03-14.jpg](img/9781430238072_Fig03-14.jpg)


    图 3-14.  包含一个新视图控制器场景的故事板


    在布置新的视图控制器之前，让我们先将其连接到导航控制器。选择导航控制器。点击“放大”按钮，直到导航控制器变为显示三个图标（图 3-15）。将指针悬停在最左侧的图标上。应该会出现一个弹出窗口，显示“navigation
    controller”（导航控制器）字样。按住 Control 键从导航控制器图标拖拽到视图控制器的视图上。松开指针后，你应该会看到一个包含可能 segue
    分配的弹出菜单（图 3-16）。在“关系 Segue”部分中选择“根视图控制器”。你应该会看到导航控制器和视图控制器之间出现一个 segue。同时，视图控制器的顶部现在应该有一个导航栏。


    ![9781430238072_Fig03-15.jpg](img/9781430238072_Fig03-15.jpg)


    图 3-15.  导航控制器标签图标


    ![9781430238072_Fig03-16.jpg](img/9781430238072_Fig03-16.jpg)


    图 3-16.  可能的 segue 分配

