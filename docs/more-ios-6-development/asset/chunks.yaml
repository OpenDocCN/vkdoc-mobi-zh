            MKPinAnnotationView *annotationView =

              (MKPinAnnotationView *)[aMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];

            if (nil == annotationView) {

                annotationView = [[MKPinAnnotationView alloc] initWithAnnotation:annotation

                                                                 reuseIdentifier:placemarkIdentifier];

            }

            else

                annotationView.annotation = annotation;


    annotationView.enabled = YES;

            annotationView.animatesDrop = YES;

            annotationView.pinColor = MKPinAnnotationColorPurple;

            annotationView.canShowCallout = YES;

            [self performSelector:@selector(openCallout:) withObject:annotation afterDelay:0.5];


    self.progressBar.progress = 0.75;

            self.progressLabel.text = NSLocalizedString(@"Creating Annotation", @"Creating
    Annotation");


    return annotationView;

        }

        return nil;

    }

    ```


    When the map view for which you are the delegate needs an annotation view, it
    will call mapView:viewForAnnotation:. The first thing you do is declare an identifier
    so you can dequeue the right kind of annotation view, then you make sure the map
    view is asking you about a type of annotation that you know about. If it is, you
    dequeue an instance of MKPinAnnotationView with your identifier. If there are
    no dequeued views, you create one. You could also have used MKAnnotationView here
    instead of MKPinAnnotationView. In fact, there’s an alternate version of this
    project in the project archive that shows how to use MKAnnotationView to display
    a custom annotation view instead of a pin. If you didn’t create a new view, it
    means you got a dequeued one from the map view. In that case, you have to make
    sure the dequeued view is linked to the right annotation. Then you do some configuration.


    *   You make sure the annotation view is enabled so it can be selected.

    *   You set animatesDrop to YES because this is a pin view, and you want it to
    drop onto the map the way pins are wont to do.

    *   You set the pin color to purple and make sure that it can show a callout.

    *   After that, you use performSelector:withObject:afterDelay: to call that private
    method you created earlier.

    *   You can’t select an annotation until its view is actually being displayed
    on the map, so you wait half a second to make sure that’s happened before selecting.
    This will also make sure that the pin has finished dropping before the callout
    is displayed.

    *   You need to update the progress bar and text label to let the user know that
    you’re almost done.

    *   Then you return the annotation view. If the annotation wasn’t one you recognize,
    you return nil and your map view will use the default annotation view for that
    kind of annotation.

    *   You implement mapViewDidFailLoadingMap:withError: and inform the user if there
    was a problem loading the map. Again, your error checking in this application
    is very rudimentary; you just inform the user and stop everything.


    ```

    - (void)mapViewDidFailLoadingMap:(MKMapView *)aMapView withError:(NSError *)error

    {

        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Error
    loading map",

                                                                                  @"Error
    loading map")

                                                        message:[error localizedDescription]

                                                       delegate:nil

                                              cancelButtonTitle:NSLocalizedString(@"OK",
    @"OK")

                                              otherButtonTitles:nil];

        [alert show];

    ```


    }


    *   Finally, you implement the UIAlertView delegate method. It will hide the progress
    bar and set the progress label to an empty string. For simplicity''s sake, we''re
    just dead-ending the application if a problem occurs. In your apps, you''ll probably
    want to do something a little more user-friendly.


    ```

    #pragma mark - UIAlertViewDelegate Method


    - (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex

    {

        self.progressBar.hidden = YES;

        self.progressLabel.text = @"";

        self.button.hidden = NO;

    }

    ```


    You should now be able to build and run your application, so do that, and try
    it out.


    **Note**  When running in the Simulator, you may encounter problems. Try launching
    the application, but before pressing the Go button, use the Location Simulator
    in the Debug Jump Bar to set a location.


    Experiment with the code. Change the map type, add more annotations, or try experimenting
    with custom annotation views.


    Go East, Young Programmer'
  trans: "\n```objc\nMKCoordinateRegion viewRegion =\n    MKCoordinateRegionMakeWithDistance(newLocation.coordinate,\
    \ 2000, 2000);\nMKCoordinateRegion adjustedRegion = [self.mapView regionThatFits:viewRegion];\n\
    [self.mapView setRegion:adjustedRegion animated:YES];\n\naManager.delegate = nil;\n\
    [aManager stopUpdatingLocation];\n\nself.progressBar.progress = 0.25;\nself.progressLabel.text\
    \ = NSLocalizedString(@\"Reverse Geocoding Location\",\n                     \
    \                       @\"Reverse Geocoding Location\");\n\n[self reverseGeocode:newLocation];\n\
    ```\n\n首先，你需要检查当前操作使用的是否是最近一分钟内获取的**新位置**，而非缓存的位置。然后使用 `MKCoordinateRegionMakeWithDistance()`\
    \ 函数创建一个区域，该区域以用户当前位置为中心，边长为 2000 米（各向延伸 1000 米）。接着根据地图视图的宽高比调整该区域，并让地图视图显示这个调整后的新区域。现在你已经得到了非缓存的位置信息，接下来要停止让位置管理器继续提供更新。位置更新会消耗电量，因此当不再需要更新时，应关闭位置管理器。随后更新进度条和标签，让用户了解当前在整个流程中的进度。这是点击\
    \ `Go` 按钮后的四个步骤中的第一步，因此你将进度设为 `.25`，这会显示四分之一的蓝色进度条。最后，调用 `reverseGeocoder:` 方法将新位置转换为注释并更新地图视图。\n\
    \n如果位置管理器遇到错误，只需弹出一个警告框。虽然不是最 robust 的错误处理方案，但对于本教程来说已经足够了。\n\n```objc\n- (void)locationManager:(CLLocationManager\
    \ *)manager didFailWithError:(NSError *)error\n{\n    NSString *errorType = (error.code\
    \ == kCLErrorDenied)\n                        ? NSLocalizedString(@\"Access Denied\"\
    , @\"Access Denied\")\n                        : NSLocalizedString(@\"Unknown\
    \ Error\", @\"Unknown Error\");\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
    Error getting Location\",\n                                                  \
    \                         @\"Error getting Location\")\n                     \
    \                             message:errorType\n                            \
    \                     delegate:self\n                                        cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"OK\")\n                                        otherButtonTitles:nil];\n\
    \    [alert show];\n}\n```\n\n现在，添加 `MapView` 的代理方法。\n\n```objc\n#pragma mark\
    \ - MKMapViewDelegate Methods\n\n- (MKAnnotationView *)mapView:(MKMapView *)aMapView\
    \ viewForAnnotation:(id<MKAnnotation>)annotation\n{\n    static NSString *placemarkIdentifier\
    \ = @\"Map Location Identifier\";\n    if ([annotation isKindOfClass:[MapLocation\
    \ class]]) {\n        MKPinAnnotationView *annotationView =\n          (MKPinAnnotationView\
    \ *)[aMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
    \        if (nil == annotationView) {\n            annotationView = [[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation\n                                     \
    \                        reuseIdentifier:placemarkIdentifier];\n        }\n  \
    \      else\n            annotationView.annotation = annotation;\n\nannotationView.enabled\
    \ = YES;\n        annotationView.animatesDrop = YES;\n        annotationView.pinColor\
    \ = MKPinAnnotationColorPurple;\n        annotationView.canShowCallout = YES;\n\
    \        [self performSelector:@selector(openCallout:) withObject:annotation afterDelay:0.5];\n\
    \nself.progressBar.progress = 0.75;\n        self.progressLabel.text = NSLocalizedString(@\"\
    Creating Annotation\", @\"Creating Annotation\");\n\nreturn annotationView;\n\
    \    }\n    return nil;\n}\n```\n\n当你作为代理的地图视图需要一个注释视图时，它会调用 `mapView:viewForAnnotation:`。首先要做的是声明一个标识符，以便能够重用（dequeue）正确的注释视图类型，然后确保地图视图询问的是你了解的注释类型。如果是，就用标识符从重用队列中取出一个\
    \ `MKPinAnnotationView` 实例。如果没有可重用的视图，则创建一个新的。你也可以在此处使用 `MKAnnotationView` 代替\
    \ `MKPinAnnotationView`。实际上，在项目归档中有一个备选版本，展示了如何使用 `MKAnnotationView` 显示自定义注释视图而非大头针。如果你没有创建新视图，说明从地图视图中获取了一个重用的视图，此时需要确保该视图与正确的注释关联。然后进行一些配置。\n\
    \n- 确保注释视图已启用，以便可以被选中。\n- 将 `animatesDrop` 设置为 `YES`，因为这是一个大头针视图，你希望它像通常的大头针那样掉落到地图上。\n\
    - 将大头针颜色设置为紫色，并确保它可以显示标注气泡。\n- 之后，使用 `performSelector:withObject:afterDelay:`\
    \ 调用你之前创建的那个私有方法。\n- 注释视图实际显示在地图上之前无法被选中，因此你等待半秒钟确保显示完成后再进行选中。这也确保在标注气泡显示前大头针已结束下落动画。\n\
    - 需要更新进度条和文字标签，让用户知道任务即将完成。\n- 然后返回注释视图。如果该注释不是你所识别的类型，则返回 `nil`，地图视图将为该类型注释使用默认的注释视图。\n\
    - 实现 `mapViewDidFailLoadingMap:withError:`，并在加载地图出现问题时通知用户。同样，本应用程序中的错误检查非常基础；只是通知用户并停止所有操作。\n\
    \n```objc\n- (void)mapViewDidFailLoadingMap:(MKMapView *)aMapView withError:(NSError\
    \ *)error\n{\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
    Error loading map\",\n                                                       \
    \                       @\"Error loading map\")\n                            \
    \                        message:[error localizedDescription]\n              \
    \                                     delegate:nil\n                         \
    \                 cancelButtonTitle:NSLocalizedString(@\"OK\", @\"OK\")\n    \
    \                                      otherButtonTitles:nil];\n    [alert show];\n\
    }\n```\n\n- 最后，实现 `UIAlertView` 的代理方法。它将隐藏进度条，并将进度标签设置为空字符串。为简化起见，如果出现问题，我们直接让应用程序终止。在你的实际应用中，可能需要采取更友好的处理方式。\n\
    \n```objc\n#pragma mark - UIAlertViewDelegate Method\n\n- (void)alertView:(UIAlertView\
    \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    self.progressBar.hidden\
    \ = YES;\n    self.progressLabel.text = @\"\";\n    self.button.hidden = NO;\n\
    }\n```\n\n现在你应该能够构建并运行你的应用程序了，请尝试一下。\n\n**注意**：在模拟器中运行时，可能会遇到问题。请尝试启动应用，但在按下 `Go`\
    \ 按钮之前，使用调试跳转栏中的位置模拟器设置一个位置。\n\n尝试修改代码。更改地图类型、添加更多注释，或尝试使用自定义注释视图。\n\n向东前进吧，年轻的程序员！\n"
- fmt: "# Map Kit\n\nThat brings us to the end of the discussion of Map Kit. You saw\
    \ the basics of how to use Map Kit, annotations, and the reverse geocoder. You\
    \ saw how to create coordinate regions and coordinate spans to specify what area\
    \ the map view should show to the user, and you’ve learned how to use Map Kit’s\
    \ reverse geocoder to turn a set of coordinates into a physical address.\n\nNow,\
    \ armed with your iPhone, Map Kit, and sheer determination, navigate your way\
    \ one page to the East, err… right, so that we can talk about iOS Messaging.\n\
    \n# Chapter 11: Messaging: Mail, SMS, and Social Media\n\nSince the beginnings\
    \ of the iOS SDK, Apple has provided the means for developers to send messages.\
    \ It started with the `MessageUI` framework, which allowed developers to add support\
    \ for sending e-mail message from within their applications. Then, Apple extended\
    \ the `MessageUI` framework to include SMS messages. With iOS 5, Apple added support\
    \ for Twitter with a new Twitter framework. Now, with iOS 6, Apple has migrated\
    \ from the Twitter framework to the `Social` framework, adding support for Facebook,\
    \ Sina Weibo, and Twitter. Let’s go over how each messaging system works.\n\n\
    ## This Chapter’s Application\n\nIn this chapter, you’re going to build an application\
    \ that lets the user take a picture using their iPhone’s camera or, if they don’t\
    \ have a camera because they’re using the Simulator, then you’ll allow them to\
    \ select an image from the photo library. They can take the resulting image and\
    \ send it to a friend via e-mail, SMS, Facebook, or Twitter without leaving the\
    \ application.\n\n**Note**  While it is possible to send a photo via the Messages\
    \ application, Apple has not exposed this functionality to developers. This functionality\
    \ is called *Multimedia Messaging Service* or MMS for short. The iOS SDK only\
    \ allows you to use *Short Message Service* (SMS) to send text messages. As a\
    \ result, you’ll just being sending a text message in your application.\n\nYour\
    \ application’s interface will be quite simple ([Figure 11-1](#9781430238072_Ch11.xhtml#Fig1)).\
    \ It will feature a single button to start the whole thing going. Tapping the\
    \ button will bring up the camera picker controller, in a manner similar to the\
    \ sample program in Chapter 20 of *Beginning iOS 6 Development* (Apress, 2012).\
    \ Once the user has taken or selected an image, they’ll be able to crop and/or\
    \ scale the image ([Figure 11-2](#9781430238072_Ch11.xhtml#Fig2)). Assuming they\
    \ don’t cancel, the image picker will return an image, and an activity view to\
    \ ask the user how they want to send the message ([Figure 11-3](#9781430238072_Ch11.xhtml#Fig3)).\
    \ Depending on their choice, you’ll display the appropriate composition view ([Figure\
    \ 11-4](#9781430238072_Ch11.xhtml#Fig4)). You’ll populate the composition view\
    \ with text and the selected image (unless it’s an SMS message). Finally, once\
    \ the message is sent, you’ll provide some feedback confirming that the message\
    \ was sent.\n\n![9781430238072_Fig11-01.jpg](images/9781430238072_Fig11-01.jpg)\n\
    \n[Figure 11-1.](#9781430238072_Ch11.xhtml#_Fig1)  The chapter’s application has\
    \ a very simple user interface consisting of a button\n\n![9781430238072_Fig11-02.jpg](images/9781430238072_Fig11-02.jpg)\n\
    \n[Figure 11-2.](#9781430238072_Ch11.xhtml#_Fig2)  The user can take a picture\
    \ with the camera or select an image from their photo library, and then crop and\
    \ scale the image\n\n![9781430238072_Fig11-03.jpg](images/9781430238072_Fig11-03.jpg)\n\
    \n[Figure 11-3.](#9781430238072_Ch11.xhtml#_Fig3)  After selecting and editing\
    \ the image, you present the message selector view\n\n![9781430238072_Fig11-04.jpg](images/9781430238072_Fig11-04.jpg)\n\
    \n[Figure 11-4.](#9781430238072_Ch11.xhtml#_Fig4)  Mail, Twitter, and Facebook\
    \ compose views\n\n**Caution**  The application in this chapter will run in the\
    \ Simulator, but instead of using the camera, it will allow you to select an image\
    \ from the Simulator’s photo library. If you’ve ever used the Reset Contents and\
    \ Settings menu item in the Simulator, then you have probably lost the photo album’s\
    \ default contents and will have no images available. You can rectify this by\
    \ launching Mobile Safari in the simulator and navigating to an image on the Web.\
    \ Make sure the image you are looking at is *not* a link, but a static image.\
    \ This technique will not work with a linked image. Click and hold the mouse button\
    \ with your cursor over an image, and an action sheet will pop up. One of the\
    \ options will be Save Image. This will add the selected image to your iPhone’s\
    \ photo library.\n\nIn addition, note that you will not be able to send e-mail\
    \ from within the simulator. You’ll be able to create the e-mail, and the Simulator\
    \ will say it sent it, but it’s all lies. The e-mail just ends up in the circular\
    \ file.\n\n## The `MessageUI` Framework\n\nTo embed e-mail and SMS services in\
    \ your application, use the `MessageUI` framework. It is one of the smallest frameworks\
    \ in the iOS SDK. It’s composed of two classes, `MFMailComposeViewController`\
    \ and `MFMessageComposeViewController`, and their corresponding delegate protocols.\n\
    \nEach class comes with a static method to determine if the device supports the\
    \ service. For `MFMailComposeViewController`, the method is `canSendMail`; for\
    \ `MFMessageComposeViewController`, the method is `canSendText`. It’s a good idea\
    \ to check if your device can send an e-mail or SMS before attempting do so.\n\
    \n```\nif ([MFMailComposeViewController canSendMail)] {\n    // code to send email\n\
    \    . . .\n}\nif ([MFMessageComposeViewController canSendText]) {\n    // code\
    \ to send SMS\n    . . .\n}\n```\n\nLet’s start by reviewing the e-mail class,\
    \ `MFMailComposeViewController`.\n\n### Creating the Mail Compose View Controller\n\
    \nIt’s very simple to use the `MFMailComposeViewController` class. You create\
    \ an instance, set its delegate, set any properties that you wish to prepopulate,\
    \ and then present it modally. When the user is done with their e-mail and taps\
    \ either the Send or Cancel button, the mail compose view controller notifies\
    \ its delegate, which is responsible for dismissing the modal view. Here’s how\
    \ you create a mail compose view controller and set its delegate:\n\n```\nMFMailComposeViewController\
    \ *mc = [[MFMailComposeViewController alloc] init];\nmc.mailComposeDelegate =\
    \ self;\n```\n\n### Populating the Subject Line\n\nBefore you present the mail\
    \ compose view, you can preconfigure the various fields of the mail compose view\
    \ controller, such as the subject and recipients (to:, cc:, and bcc:), as well\
    \ as the body and attachments. You can populate the subject by calling the method\
    \ `setSubject:` on the instance of `MFMailComposeViewController`, like this:\n\
    \n```\n[mc setSubject:@\"Hello, World!\"];\n```\n\n### Populating Recipients\n\
    \nE-mails can go to three types of recipients. The main recipients of the e-mail\
    \ are called the *to:* recipients and go on the line labeled *To:*. Recipients\
    \ who are being cc:ed on the e-mail go on the *cc:* line. If you want to include\
    \ somebody on the e-mail but not let the other recipients know that person is\
    \ also receiving the e-mail, you can use the *bcc:* line, which stands for “blind\
    \ carbon copy.” You can populate all three of these fields when using `MFMailComposeViewController`.\n\
    \nTo set the main recipients, use the method `setToRecipients:` and pass in an\
    \ `NSArray` instance containing the e-mail addresses of all the recipients. Here’s\
    \ an example:\n\n```\n[mc setToRecipients:@[@\"manny.sullivan@me.com\"]];\n```\n\
    \nSet the other two types of recipients in the same manner, though you’ll use\
    \ the methods `setCcRecipients:` for cc: recipients and `setBccRecipients:` for\
    \ bcc: recipients.\n\n```\n[mc setCcRecipients:@[@\"maru@boxes.co.jp\"]];\n[mc\
    \ setBccRecipients:@[@\"lassie@helpfuldogs.org\"]];\n```\n\n### Setting the Message\
    \ Body"
  raw: 'That brings us to the end of the discussion of Map Kit. You saw the basics
    of how to use Map Kit, annotations, and the reverse geocoder. You saw how to create
    coordinate regions and coordinate spans to specify what area the map view should
    show to the user, and you’ve learned how to use Map Kit’s reverse geocoder to
    turn a set of coordinates into a physical address.


    Now, armed with your iPhone, Map Kit, and sheer determination, navigate your way
    one page to the East, err… right, so that we can talk about iOS Messaging.


    Chapter    11


    Messaging: Mail, SMS, and Social Media


    Since the beginnings of the iOS SDK, Apple has provided the means for developers
    to send messages. It started with the MessageUI framework, which allowed developers
    to add support for sending e-mail message from within their applications. Then,
    Apple extended the MessageUI framework to include SMS messages. With iOS 5, Apple
    added support for Twitter with a new Twitter framework. Now, with iOS 6, Apple
    has migrated from the Twitter framework to the Social framework, adding support
    for Facebook, Sina Weibo, and Twitter. Let’s go over how each messaging system
    works.


    This Chapter’s Application


    In this chapter, you’re going to build an application that lets the user take
    a picture using their iPhone’s camera or, if they don’t have a camera because
    they’re using the Simulator, then you’ll allow them to select an image from the
    photo library. They can take the resulting image and send it to a friend via e-mail,
    SMS, Facebook, or Twitter without leaving the application.


    **Note**  While it is possible to send a photo via the Messages application, Apple
    has not exposed this functionality to developers. This functionality is called
    *Multimedia Messaging Service* or MMS for short. The iOS SDK only allows you to
    use *Short Message Service* (SMS) to send text messages. As a result, you’ll just
    being sending a text message in your application.


    Your application’s interface will be quite simple ([Figure 11-1](#9781430238072_Ch11.xhtml#Fig1)).
    It will feature a single button to start the whole thing going. Tapping the button
    will bring up the camera picker controller, in a manner similar to the sample
    program in Chapter 20 of *Beginning iOS 6 Development* (Apress, 2012). Once the
    user has taken or selected an image, they’ll be able to crop and/or scale the
    image ([Figure 11-2](#9781430238072_Ch11.xhtml#Fig2)). Assuming they don’t cancel,
    the image picker will return an image, and an activity view to ask the user how
    they want to send the message ([Figure 11-3](#9781430238072_Ch11.xhtml#Fig3)).
    Depending on their choice, you’ll display the appropriate composition view ([Figure
    11-4](#9781430238072_Ch11.xhtml#Fig4)). You’ll populate the composition view with
    text and the selected image (unless it’s an SMS message). Finally, once the message
    is sent, you’ll provide some feedback confirming that the message was sent.


    ![9781430238072_Fig11-01.jpg](images/9781430238072_Fig11-01.jpg)


    [Figure 11-1.](#9781430238072_Ch11.xhtml#_Fig1)  The chapter’s application has
    a very simple user interface consisting of a button


    ![9781430238072_Fig11-02.jpg](images/9781430238072_Fig11-02.jpg)


    [Figure 11-2.](#9781430238072_Ch11.xhtml#_Fig2)  The user can take a picture with
    the camera or select an image from their photo library, and then crop and scale
    the image


    ![9781430238072_Fig11-03.jpg](images/9781430238072_Fig11-03.jpg)


    [Figure 11-3.](#9781430238072_Ch11.xhtml#_Fig3)  After selecting and editing the
    image, you present the message selector view


    ![9781430238072_Fig11-04.jpg](images/9781430238072_Fig11-04.jpg)


    [Figure 11-4.](#9781430238072_Ch11.xhtml#_Fig4)  Mail, Twitter, and Facebook compose
    views


    **Caution**  The application in this chapter will run in the Simulator, but instead
    of using the camera, it will allow you to select an image from the Simulator’s
    photo library. If you’ve ever used the Reset Contents and Settings menu item in
    the Simulator, then you have probably lost the photo album’s default contents
    and will have no images available. You can rectify this by launching Mobile Safari
    in the simulator and navigating to an image on the Web. Make sure the image you
    are looking at is *not* a link, but a static image. This technique will not work
    with a linked image. Click and hold the mouse button with your cursor over an
    image, and an action sheet will pop up. One of the options will be Save Image.
    This will add the selected image to your iPhone’s photo library.


    In addition, note that you will not be able to send e-mail from within the simulator.
    You’ll be able to create the e-mail, and the Simulator will say it sent it, but
    it’s all lies. The e-mail just ends up in the circular file.


    The MessageUI Framework


    To embed e-mail and SMS services in your application, use the MessageUI framework.
    It is one of the smallest frameworks in the iOS SDK. It’s composed of two classes,
    MFMailComposeViewController and MFMessageComposeViewController, and their corresponding
    delegate protocols.


    Each class comes with a static method to determine if the device supports the
    service. For MFMailComposeViewController, the method is canSendMail; for MFMessageComposeViewController,
    the method is canSendText. It’s a good idea to check if your device can send an
    e-mail or SMS before attempting do so.


    ```

    if ([MFMailComposeViewController canSendMail)] {

        // code to send email

        . . .

    }

    if ([MFMessageComposeViewController canSendText]) {

        // code to send SMS

        . . .

    }

    ```


    Let’s start by reviewing the e-mail class, MFMailComposeViewController.


    Creating the Mail Compose View Controller


    It’s very simple to use the MFMailComposeViewController class. You create an instance,
    set its delegate, set any properties that you wish to prepopulate, and then present
    it modally. When the user is done with their e-mail and taps either the Send or
    Cancel button, the mail compose view controller notifies its delegate, which is
    responsible for dismissing the modal view. Here’s how you create a mail compose
    view controller and set its delegate:


    ```

    MFMailComposeViewController *mc = [[MFMailComposeViewController alloc] init];

    mc.mailComposeDelegate = self;

    ```


    Populating the Subject Line


    Before you present the mail compose view, you can preconfigure the various fields
    of the mail compose view controller, such as the subject and recipients (to:,
    cc:, and bcc:), as well as the body and attachments. You can populate the subject
    by calling the method setSubject: on the instance of MFMailComposeViewController,
    like this:


    ```

    [mc setSubject:@"Hello, World!"];

    ```


    Populating Recipients


    E-mails can go to three types of recipients. The main recipients of the e-mail
    are called the *to:* recipients and go on the line labeled *To:*. Recipients who
    are being cc:ed on the e-mail go on the *cc:* line. If you want to include somebody
    on the e-mail but not let the other recipients know that person is also receiving
    the e-mail, you can use the *bcc:* line, which stands for “blind carbon copy.”
    You can populate all three of these fields when using MFMailComposeViewController.


    To set the main recipients, use the method setToRecipients: and pass in an NSArray
    instance containing the e-mail addresses of all the recipients. Here’s an example:


    ```

    [mc setToRecipients:@[@"manny.sullivan@me.com"]];

    ```


    Set the other two types of recipients in the same manner, though you’ll use the
    methods setCcRecipients: for cc: recipients and setBccRecipients: for bcc: recipients.


    ```

    [mc setCcRecipients:@[@"maru@boxes.co.jp"]];

    [mc setBccRecipients:@[@"lassie@helpfuldogs.org"]];

    ```


