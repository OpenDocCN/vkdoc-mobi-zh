    to change the playback point. Toggle the rate to see how you can change the playback
    rate. Pretty slick, right?


    Avast! Rough Waters Ahead!


    In this chapter, you took a long but pleasant walk through the hills and valleys
    of using the iPod music library. You saw how to find media items using media queries,
    and how to let your users select songs using the media picker controller. You
    learned how to use and manipulate collections of media items. We showed you how
    to use music player controllers to play media items and how to manipulate the
    currently playing item by seeking or skipping. You also learned how to find out
    about the currently playing track, regardless of whether it’s one your code played
    or one that the user chose using the iPod or Music application.


    But now, shore leave is over, matey. It’s time to set sail into the open waters
    of iOS security. Batten down the hatches and secure the ship!


    Chapter    13


    Locking It Down: iOS Security


    Application security is an important aspect of development. Protecting your users’
    information is an essential feature that you need to think about while developing.
    It’s important to remember that security is not a product, nor is it a check-mark
    that you can think about at the end of the development. Security is a process
    that has to be taken in to consideration during all stages of development, from
    design to implementation, through testing and release.


    We’ll go over some basic security issues you should keep in mind and how to handle
    them in iOS. Then we’ll cover Security SDK, which provides three services: Certificate,
    Key, and Trust Services, which are used to manage certificates, keys, and trust
    policies; Keychain Services, which are used to manage keychain items; and Randomization
    Services, which are used to create cryptographically secure random numbers.


    **Note**  An important security issue is sending and receiving data securely over
    the network. We won’t be covering that in this chapter. Check Apple’s Networking
    documentation. Start with Networking Overview ([https://developer.apple.com/library/ios/#documentation/NetworkingInternetWeb/Conceptual/NetworkingOverview/](https://developer.apple.com/library/ios/#documentation/NetworkingInternetWeb/Conceptual/NetworkingOverview/)),
    then read Secure Transport Reference ([https://developer.apple.com/library/ios/#documentation/Security/Reference/secureTransportRef/](https://developer.apple.com/library/ios/#documentation/Security/Reference/secureTransportRef/)
    ). You may need to read the CFNetwork Programming Guide ([https://developer.apple.com/library/ios/#documentation/Networking/Conceptual/CFNetwork/](https://developer.apple.com/library/ios/#documentation/Networking/Conceptual/CFNetwork/))
    as well.


    You’re going to create an application that will list the keychain items. By default,
    your application will have no keychain items, so you’ll embed two certificates
    (your self-signed root certificate and user certificate) into the application
    and add them to the keychain. Your keychain item detail view will allow you to
    encrypt and decrypt some text as a demonstration of functionality.


    Security Considerations


    When you ask your user to provide some personal data, you are implicitly asking
    the user to trust that you, the application developer, will keep that information
    safe and secure. You are also implying that you are only asking for the information
    you need—and no more. If you send that data over the Internet, you have to make
    sure that the data is transmitted in a secure manner. When your application receives
    signed data, it’s your job to verify those signatures and ensure that they can
    be trusted.


    When asking your users for information, you need to take into consideration what
    could happen if that data were compromised. If your application is a game that
    only stores the user’s high score, you probably don’t need to worry too much if
    the database is accessed outside your application. However, if you are asking
    your users for passwords or other sensitive information, it is crucial that you
    do your best to protect your users’ information. One possible solution is to encrypt
    the data, making it more difficult to read.


    Many mobile applications routinely transmit information to a cloud-based service
    to centrally store and update data. If you are transmitting sensitive user information
    between your iOS application and a cloud server, you need to ensure the security
    of the data on both the client and server, and you must ensure that the data is
    transmitted securely. Furthermore, you need to make sure the communication won’t
    be intercepted by a malicious third-party who will try to access your user’s information
    or send back malicious data to aid in accessing your user’s data on the device.


    Security Techniques


    The following sections cover some common security techniques.


