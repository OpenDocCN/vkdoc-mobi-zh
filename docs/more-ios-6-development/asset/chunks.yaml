  trans: '

    幸运的是，`NSManagedObject` 可以像其他 Objective-C 类一样被子类化，这是实现更高级的默认值和验证的关键。同时，这也为通过添加方法来为实体增加额外功能打开了大门。例如，你可以创建一个方法，根据实体的一个或多个属性计算并返回一个值。


    在本章中，你将为你的 `Hero` 实体创建一个 `NSManagedObject` 的自定义子类。然后，你将使用这个子类来添加一些额外功能。你还需要为 `Hero`
    添加两个新属性。一个是英雄的年龄。你不再直接存储年龄，而是根据其出生日期计算得出。因此，你不需要 Core Data 在持久化存储中为英雄的年龄腾出空间，所以你将使用瞬态属性类型，然后编写一个访问器方法来计算并返回英雄的年龄。瞬态属性类型会告诉
    Core Data 不要为该属性创建存储空间。在你的案例中，你将在运行时按需计算英雄的年龄。


    你要添加的第二个属性是英雄最喜欢的颜色。由于没有专门针对颜色的属性类型，你需要实现一种称为可转换属性的东西。可转换属性使用一个特殊的对象，称为*值转换器*，将自定义对象转换为
    `NSData` 实例，以便它们可以存储在持久化存储中。你将编写一个值转换器，让你能够以这种方式保存 `UIColor` 实例。在图 6-1 中，你可以看到在本章结束时，添加了这两个新属性后的详细编辑视图的外观。


    ![9781430238072_Fig06-01.jpg](img/9781430238072_Fig06-01.jpg)


    图 6-1.  本章结束时的 `Hero` 详细信息视图


    当然，你没有一个用于颜色的属性编辑器，因此你必须编写一个，以便让用户选择英雄最喜欢的颜色。你只需创建一个简单的、基于滑块的取色器即可（图 6-2）。


    ![9781430238072_Fig06-02.jpg](img/9781430238072_Fig06-02.jpg)


    图 6-2.  简单的、基于滑块的取色器属性编辑器


    由于无法在数据模型中设置默认颜色，你将编写代码，将最喜欢的颜色属性默认为白色。如果不这样做，当用户第一次编辑该颜色时，该颜色将为 `nil`，这会导致问题。


    最后，你将向日期字段添加验证逻辑，以防止用户选择未来的出生日期。你还会调整属性编辑器，以便在输入的属性未通过验证时通知用户。你将为用户提供返回并修正属性或直接取消更改的选项（图
    6-3）。


    ![9781430238072_Fig06-03.jpg](img/9781430238072_Fig06-03.jpg)


    图 6-3.  当尝试保存未通过验证的属性时，用户将可以选择修正问题或取消更改


    尽管你只会在 `Birthdate` 字段上添加验证，但你将要编写的报告机制将是通用的，如果你向其他字段添加验证，它仍可以重复使用。你可以在图 6-4 中看到通用错误提示的一个示例。


    ![9781430238072_Fig06-04.jpg](img/9781430238072_Fig06-04.jpg)


    图 6-4.  由于你的目标通常是编写可重用的代码，你的验证机制也将强制执行数据模型上的验证，比如最小长度等


    工作量相当大，所以我们开始吧。你将继续使用上一章中的同一个 `SuperDB` 应用程序。确保你创建了数据模型的新版本，并且已打开轻量级迁移，如上一章所示。


    ## 更新数据模型


    首要任务是将两个新属性添加到数据模型中。确保导航窗格中 `SuperDB` 文件夹内的 `SuperDB.xcdatamodeld` 旁边的展开三角形已展开，然后单机选中数据模型的当前版本（即带有绿色勾选图标的那一个）。


    模型编辑器打开后，首先确保你处于表格视图模式。然后，在组件窗格中选择 `Hero` 实体（图 6-5）。


    ![9781430238072_Fig06-05.jpg](img/9781430238072_Fig06-05.jpg)


    图 6-5.  回到模型编辑器中


    ### 添加年龄属性


    单击数据模型右下角的标签为 `添加属性` 的加号图标。将新属性的名称更改为 `age`。在模型编辑器中，取消勾选 `可选` 并勾选 `瞬态`。这将告知 Core
    Data，你不需要为此属性存储值。在你的案例中，由于你使用 SQLite 作为持久化存储，这将告诉 Core Data 不要向用于存储英雄数据的数据库表添加
    `age` 列。将属性类型更改为 `整数 16`；你将把年龄计算为整数。目前，对于 `age` 属性，你需要做的就是这些。当然，就目前情况而言，你无法对这个特定属性做任何有意义的事情，因为它无法存储任何内容，而且你还没有办法告诉它如何计算年龄。这种情况将在几分钟后你创建
    `NSManagedObject` 的自定义子类时改变。


    ### 添加最喜欢的颜色属性


    添加另一个属性。这一次，将新属性命名为 `favoriteColor`，并将属性类型设置为 `可转换`。一旦你将 `类型` 弹出菜单更改为 `可转换`，你应该会注意到一个新的标签为
    `名称` 的文本字段，其中包含一个灰色的默认值 `值转换器名称`（图 6-6）。


    ![9781430238072_Fig06-06.jpg](img/9781430238072_Fig06-06.jpg)


    图 6-6.  将 `favoriteColor` 属性设为可转换属性


    `值转换器名称` 是使用可转换属性的关键。我们稍后会深入讨论值转换器，但你最好现在就填充这个字段，以免稍后还要返回模型编辑器。此字段需要填入值转换器类的名称，该类将用于将表示此属性的任何对象转换为
    `NSData` 实例以保存到持久化存储中，反之亦然。如果你将此字段留空，`CoreData` 将使用默认值转换器 `NSKeyedUnarchiveFromDataTransformerName`。默认值转换器通过使用
    `NSKeyedArchiver` 和 `NSKeyedUnarchiver`，将任何遵循 `NSCoding` 协议的对象转换为 `NSData` 实例，从而处理大量对象。


    ### 为名称属性添加最小长度

