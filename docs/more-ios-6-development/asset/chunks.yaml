- fmt: "```\n#pragma mark - FetchedResultsController Property\n\n- (NSFetchedResultsController\
    \ *)fetchedResultsController\n{\n}\n```\n\nLike they use to say, where’s the beef?\
    \ Well, we wanted to step through this line by line and explain the code. The\
    \ full listing is available at the end of the chapter if you want to look ahead.\n\
    \nFirst, we said the fetched results controller was going to be lazily loaded,\
    \ so here’s the code to handle that:\n\n```\nif (_fetchedResultsController ! =\
    \ nil) {\n    return _fetchedResultsController;\n}\n```\n\nIf you get past this\
    \ point, it means that the `_fetchResultsController` instance variable (or ivar)\
    \ is `nil`, so you’ll have to create one. First, you need to instantiate a fetch\
    \ request.\n\n```\nNSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];\n\
    ```\n\nNow you get the entity description for your `Hero` entity and set the fetch\
    \ request entity. While you’re at it, set the fetch batch size, which breaks the\
    \ fetch up into batches for performance reasons.\n\n```\nAppDelegate *appDelegate\
    \ = (AppDelegate *)[[UIApplication sharedApplication] delegate];\nNSManagedObjectContext\
    \ *managedObjectContext = [appDelegate managedObjectContext];\nNSEntityDescription\
    \ *entity = [NSEntityDescription entityForName:@\"Hero\"\n                   \
    \                       inManagedObjectContext:managedObjectContext];\n[fetchRequest\
    \ setEntity:entity];\n[fetchRequest setFetchBatchSize:20];\n```\n\nThe order of\
    \ the fetch results is going to depend on which tab you’ve selected, so you’ll\
    \ get that value. As a sanity check, read the user defaults if no tab is selected.\n\
    \n```\nNSUInteger tabIndex = [self.heroTabBar.items indexOfObject:self.heroTabBar.selectedItem];\n\
    if (tabIndex == NSNotFound) {\n    NSUserDefaults *defaults = [NSUserDefaults\
    \ standardUserDefaults];\n    tabIndex = [defaults integerForKey:kSelectedTabDefaultsKey];\n\
    }\n```\n\nNow you set the fetch request’s sort descriptors. A sort descriptor\
    \ is a simple object that tells the fetch request what property (attribute) should\
    \ be used to compare instances of entities, and whether it should be ascending\
    \ or descending. A fetch request expects an array of sort descriptors, the order\
    \ of sort descriptors determines the order of priority when comparing.\n\n```\n\
    NSString *sectionKey = nil;\nswitch (tabIndex) {\n    // Notice that the kByName\
    \ and kBySecretIdentity Code are nearly identical.\n    // A refactoring opportunity?\n\
    \    case kByName: {\n        NSSortDescriptor *sortDescriptor1 = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\"\n                                             \
    \                           ascending:YES];\n        NSSortDescriptor *sortDescriptor2\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"secretIdentity\"\n              \
    \                                                          ascending:YES];\n \
    \       NSArray *sortDescriptors =\n            [[NSArray alloc] initWithObjects:sortDescriptor1,\
    \ sortDescriptor2, nil];\n        [fetchRequest setSortDescriptors:sortDescriptors];\n\
    \        sectionKey = @\"name\";\n        break;\n    }\n    case kBySecretIdentity:{\n\
    \        NSSortDescriptor *sortDescriptor1 = [[NSSortDescriptor alloc] initWithKey:@\"\
    secretIdentity\"\n                                                           \
    \             ascending:YES];\n        NSSortDescriptor *sortDescriptor2 = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\"\n                                             \
    \                           ascending:YES];\n        NSArray *sortDescriptors\
    \ =\n            [[NSArray alloc] initWithObjects:sortDescriptor1, sortDescriptor2,\
    \ nil];\n        [fetchRequest setSortDescriptors:sortDescriptors];\n        sectionKey\
    \ = @\"secretIdentity\";\n        break;\n    }\n}\n```\n\nIf the `By Name` tab\
    \ is selected, you ask the fetch request to sort by the `name` attribute, then\
    \ the `secretIdentity`. For the `By Secret Identity` tab, you reverse the sort\
    \ descriptors. You set a `sectionKey` string, which you’ll use next.\n\nNow you\
    \ finally instantiate the fetched results controller. Here’s where you use the\
    \ `sectionKey`, and assign it a cache name of `Hero`. You assign the fetched results\
    \ controller delegate to the `HeroListController`.\n\n```\n_fetchedResultsController\
    \ =\n    [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\n\
    \                                        managedObjectContext:managedObjectContext\n\
    \                                          sectionNameKeyPath:sectionKey\n   \
    \                                                cacheName:@\"Hero\"];\n_fetchedResultsController.delegate\
    \ = self;\n\nreturn _fetchedResultsController;\n```\n\nFinally, you return the\
    \ fetched results controller.\n\n## Fetched Results Controller Delegate Methods\n\
    \nSince you assigned the fetched results controller delegate to the `HeroListController`,\
    \ you need to implement those methods. Add the following below the `fetchedResultsController`\
    \ method you just created:\n\n```\n#pragma mark - NSFetchedResultsControllerDelegate\
    \ Methods\n\n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\n\
    {\n    [self.heroTableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n    [self.heroTableView endUpdates];\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n  didChangeSection:(id < NSFetchedResultsSectionInfo>)sectionInfo\n\
    \           atIndex:(NSUInteger)sectionIndex\n     forChangeType:(NSFetchedResultsChangeType)type\n\
    {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n          \
    \  [self.heroTableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
    \                                            withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n\ncase NSFetchedResultsChangeDelete:\n            [self.heroTableView\
    \ deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n               \
    \                             withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n   didChangeObject:(id)anObject\n       atIndexPath:(NSIndexPath\
    \ *)indexPath\n     forChangeType:(NSFetchedResultsChangeType)type\n      newIndexPath:(NSIndexPath\
    \ *)newIndexPath\n{\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n\
    \            [self.heroTableView insertRowsAtIndexPaths:@[newIndexPath]\n    \
    \                                  withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n\ncase NSFetchedResultsChangeDelete:\n            [self.heroTableView\
    \ deleteRowsAtIndexPaths:@[indexPath]\n                                      withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n\ncase NSFetchedResultsChangeUpdate:\n        case NSFetchedResultsChangeMove:\n\
    \            break;\n\n}\n}\n```\n\nFor an explanation of these methods, refer\
    \ to the “Fetched Results Controller Delegate” section of [Chapter 2](#9781430238072_Ch02.xhtml).\n\
    \n## Making All Work\n\nYou’re almost done. You still need to\n\n*   Implement\
    \ the Edit and Add (+) buttons.\n*   Code the table view data source and delegate\
    \ methods correctly.\n*   Make the tab bar selector sort the table view.\n*  \
    \ Run the fetch request at launch.\n*   Handle errors.\n\nIt seems like a lot,\
    \ but it’s not. Let’s start with the error handling first.\n\n## Error Handling\n\
    \nYou’ll make things simple by using a simple alert view to display errors. In\
    \ order to use an alert view, you need to implement an alert view delegate. Like\
    \ the fetched results controller, you’ll make the `HeroListController` the alert\
    \ view delegate. Edit the `HeroListController @interface` declaration to read:\n\
    \n```\n@interface HeroListController : UIViewController < UITableViewDataSource,\
    \ UITableViewDelegate, UITabBarDelegate, \nNSFetchedResultsControllerDelegate,\
    \ UIAlertViewDelegate>\n```\n\nIn `HeroListController.m`, you’ll add a simple\
    \ alert view delegate method.\n\n```\n#pragma mark - UIAlertViewDelegate Methods\n\
    \n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    exit(−1);\n}\n```\n\nAll this method does is cause your application quit."
