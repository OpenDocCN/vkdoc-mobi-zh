    \n```\n#pragma mark - SuperDBEditCell Overrides\n\n- (id)value\n{\n    return\
    \ self.colorPicker.color;\n}\n```"
  raw: 'Build and run the app. Navigate to the detail view and enter Edit mode. Try
    to tap on the Age cell. You can’t because it’s not editable.


    Creating a Color Table View Cell


    Now that you’ve completed your color value transformer, let’s think about how
    you can enter your hero’s favorite color. Look back at [Figure 6-1](#9781430238072_Ch06.xhtml#Fig1).
    You have a table view cell that displays a band of your hero’s favorite color.
    When the user chooses the favorite color cell in Edit mode, you want to display
    a color picker ([Figure 6-2](#9781430238072_Ch06.xhtml#Fig2)). The color picker
    is not available via the iOS SDK, like the date and value pickers you used in
    [Chapter 4](#9781430238072_Ch04.xhtml). You’re going to have to build one from
    scratch.


    Custom Color Editor


    Single-click the SuperDB folder in the navigation pane, and create a new Objective-C
    class. When prompted, name the class UIColorPicker and make it a subclass of UIControl.
    UIControl is the base class for control objects like buttons and sliders. Here
    you define a subclass of UIControl that encapsulates four sliders. The only property
    you need UIColorPicker to declare is its color.


    ```

    @property (strong, nonatomic) UIColor *color;

    ```


    Every other property can be declared privately in a category in the implementation
    file, UIColorPicker.m.


    ```

    @interface UIColorPicker ()

    @property (strong, nonatomic) UISlider *redSlider;

    @property (strong, nonatomic) UISlider *greenSlider;

    @property (strong, nonatomic) UISlider *blueSlider;

    @property (strong, nonatomic) UISlider *alphaSlider;

    - (IBAction)sliderChanged:(id)sender;

    - (UILabel *)labelWithFrame:(CGRect)frame text:(NSString *)text;

    @end

    ```


    You also declared two (private) methods. One is the callback for when the sliders
    change (siderChanged:). The other is a convenience method for creating the picker
    view.


    Xcode should have created an initWithFrame: method for your UIColorPicker class.  Add
    the following initialization code:


    ```

            self.autoresizingMask = UIViewAutoresizingFlexibleHeight | UIViewAutoresizingFlexibleWidth;


    [self addSubview:[self labelWithFrame:CGRectMake(20.0, 40.0,  60, 24) text:@"Red"]];

            [self addSubview:[self labelWithFrame:CGRectMake(20.0, 80.0,  60, 24)
    text:@"Green"]];

            [self addSubview:[self labelWithFrame:CGRectMake(20.0, 120.0, 60, 24)
    text:@"Blue"]];

            [self addSubview:[self labelWithFrame:CGRectMake(20.0, 160.0, 60, 24)
    text:@"Alpha"]];


    _redSlider   = [[UISlider alloc] initWithFrame:CGRectMake(100.0, 40.0,  190, 24)];

            _greenSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0, 80.0,  190,
    24)];

            _blueSlider  = [[UISlider alloc] initWithFrame:CGRectMake(100.0, 120.0,
    190, 24)];

            _alphaSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0, 160.0,
    190, 24)];


    [_redSlider addTarget:self

                            action:@selector(sliderChanged:)

                  forControlEvents:UIControlEventValueChanged];

            [_greenSlider addTarget:self

                              action:@selector(sliderChanged:)

                    forControlEvents:UIControlEventValueChanged];

            [_blueSlider addTarget:self

                             action:@selector(sliderChanged:)

                   forControlEvents:UIControlEventValueChanged];

            [_alphaSlider addTarget:self

                              action:@selector(sliderChanged:)

                    forControlEvents:UIControlEventValueChanged];


    [self addSubview:_redSlider];

            [self addSubview:_greenSlider];

            [self addSubview:_blueSlider];

            [self addSubview:_alphaSlider];

    ```


    Here you are laying out the appearance of your color picker. You place the sliders
    in the view with the initWithFrame: method.


    You need to override the color property mutator in order to set the slider values
    correctly:


    ```

    #pragma mark - Property Overrides


    - (void)setColor:(UIColor *)color

    {

        _color = color;

        const CGFloat *components = CGColorGetComponents(color.CGColor);

        [_redSlider setValue:components[0]];

        [_greenSlider setValue:components[1]];

        [_blueSlider setValue:components[2]];

        [_alphaSlider setValue:components[3]];

    }

    ```


    Now you can implement your (private) instance methods. First, sliderChanged:


    ```

    #pragma mark - (Private) Instance Methods


    - (IBAction)sliderChanged:(id)sender

    {

        _color = [UIColor colorWithRed:_redSlider.value

                                 green:_greenSlider.value

                                  blue:_blueSlider.value

                                 alpha:_alphaSlider.value];


    [self sendActionsForControlEvents:UIControlEventValueChanged];

    }

    ```


    Next, labelWithFrame:text:


    ```

    - (UILabel *)labelWithFrame:(CGRect)frame text:(NSString *)text

    {

        UILabel *label = [[UILabel alloc] initWithFrame:frame];

        label.userInteractionEnabled = NO;

        label.backgroundColor = [UIColor clearColor];

        label.font = [UIFont boldSystemFontOfSize:[UIFont systemFontSize]];

        label.textAlignment = NSTextAlignmentRight;

        label.textColor = [UIColor darkTextColor];

        label.text = text;

        return label;

    }

    ```


    Now that you’ve created your custom color picker, you need to add a custom table
    view cell class to use it.


    Custom Color Table View Cell


    Since you have a custom picker view, you’re going to need to subclass SuperDBEditCell,
    like you did for SuperDBDateCell and SuperDBPickerCell. But how are you going
    to display a UIColor value in your SuperDBEditableCell class? You could create
    a string that displays the four values of the color (red, green, blue and alpha).
    For most end users, those numbers are meaningless. Your users are going to expect
    to see the actual color when they’re viewing the hero detail. You don’t have a
    mechanism to display colors in table view cell.


    If you build a complicated table view cell subclass to display the color, are
    you going to use it elsewhere in the application? The likely answer is no. So,
    while you could spend time and effort building this class, don’t. Here’s a simpler
    solution: populate the text field with an NSString with a special Unicode character
    that displays as a solid rectangle. Then add code to change the font color of
    the text to make it appear in your hero’s favorite color.


    Create a new Objective-C subclass. Make it a subclass of SuperDBEditCell, and
    name it SuperDBColorCell *.* Add the Color Picker class the (private) property
    to SuperDBColorCell.m.


    ```

    #import "UIColorPicker.h"


    @interface SuperDBColorCell ()

    @property (strong, nonatomic) UIColorPicker *colorPicker;

    - (void)colorPickerChanged:(id)sender;

    - (NSAttributedString *)attributedColorString;

    @end

    ```


    You also add a (private) instance method, attributedColorString, that returns
    an NSAttributedString. An attributed string is a string that also has information
    on how to format itself. Prior to iOS 6, attributed strings were extremely limited.
    Now, you’re able to use them with UIKit objects. You’ll see why you want this
    method soon.


    Define the initWithStyle:reuseIdentifier: method as follows:


    ```

    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            // Initialization code

            self.colorPicker = [[UIColorPicker alloc] initWithFrame:CGRectMake(0,
    0, 320, 216)];

            [self.colorPicker addTarget:self

                                  action:@selector(colorPickerChanged:)

                        forControlEvents:UIControlEventValueChanged];

            self.textField.inputView = self.colorPicker;

        }

        return self;

    }

    ```


    This should be pretty straightforward. Like the other SuperDBEditCell subclasses,
    you’ve instantiated your picker object and set it as the textField’s inputView.


    Next, override SuperDBEditCell’s value accessor and mutator.


    ```

    #pragma mark - SuperDBEditCell Overrides


    - (id)value

    {

        return self.colorPicker.color;

    }'
  trans: "\n# 构建并运行应用\n\n构建并运行应用。导航至详情视图并进入编辑模式。尝试点击年龄单元格，你会发现无法操作，因为该单元格不可编辑。\n\n\
    # 创建颜色表格视图单元格\n\n既然已经完成了颜色值转换器，接下来思考如何输入英雄偏好的颜色。回顾图 6-1，这里有一个显示英雄偏好颜色色带的表格视图单元格。当用户在编辑模式下选中偏好颜色单元格时，需要显示颜色选择器（图\
    \ 6-2）。与第 4 章中使用的日期选择器和值选择器不同，iOS SDK 并未提供颜色选择器的原生支持，因此需要从头构建一个。\n\n## 自定义颜色编辑器\n\
    \n在导航窗格中单击`SuperDB`文件夹，创建一个新的 Objective-C 类。按照提示将类命名为`UIColorPicker`，并使其成为`UIControl`的子类。`UIControl`是按钮和滑块等控件的基类。此处定义一个封装了四个滑块的`UIControl`子类，`UIColorPicker`只需声明`color`属性。\n\
    \n```\n@property (strong, nonatomic) UIColor *color;\n```\n\n其他所有属性可在实现文件`UIColorPicker.m`的类别中私有声明。\n\
    \n```\n@interface UIColorPicker ()\n@property (strong, nonatomic) UISlider *redSlider;\n\
    @property (strong, nonatomic) UISlider *greenSlider;\n@property (strong, nonatomic)\
    \ UISlider *blueSlider;\n@property (strong, nonatomic) UISlider *alphaSlider;\n\
    - (IBAction)sliderChanged:(id)sender;\n- (UILabel *)labelWithFrame:(CGRect)frame\
    \ text:(NSString *)text;\n@end\n```\n\n同时声明了两个（私有）方法：一个是滑块值变化时的回调方法（`sliderChanged:`），另一个是创建选择器视图的便捷方法。\n\
    \nXcode 应为`UIColorPicker`类创建了`initWithFrame:`方法。添加以下初始化代码：\n\n```\n        self.autoresizingMask\
    \ = UIViewAutoresizingFlexibleHeight | UIViewAutoresizingFlexibleWidth;\n\n[self\
    \ addSubview:[self labelWithFrame:CGRectMake(20.0, 40.0,  60, 24) text:@\"Red\"\
    ]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0, 80.0,  60,\
    \ 24) text:@\"Green\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
    \ 120.0, 60, 24) text:@\"Blue\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
    \ 160.0, 60, 24) text:@\"Alpha\"]];\n\n_redSlider   = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 40.0,  190, 24)];\n        _greenSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 80.0,  190, 24)];\n        _blueSlider  = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 120.0, 190, 24)];\n        _alphaSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 160.0, 190, 24)];\n\n[_redSlider addTarget:self\n                        action:@selector(sliderChanged:)\n\
    \              forControlEvents:UIControlEventValueChanged];\n        [_greenSlider\
    \ addTarget:self\n                          action:@selector(sliderChanged:)\n\
    \                forControlEvents:UIControlEventValueChanged];\n        [_blueSlider\
    \ addTarget:self\n                         action:@selector(sliderChanged:)\n\
    \               forControlEvents:UIControlEventValueChanged];\n        [_alphaSlider\
    \ addTarget:self\n                          action:@selector(sliderChanged:)\n\
    \                forControlEvents:UIControlEventValueChanged];\n\n[self addSubview:_redSlider];\n\
    \        [self addSubview:_greenSlider];\n        [self addSubview:_blueSlider];\n\
    \        [self addSubview:_alphaSlider];\n```\n\n此处正在布局颜色选择器的外观，通过`initWithFrame:`方法将滑块放置在视图中。\n\
    \n需要重写`color`属性的设置方法，以便正确设置滑块的值：\n\n```\n#pragma mark - 属性重写\n\n- (void)setColor:(UIColor\
    \ *)color\n{\n    _color = color;\n    const CGFloat *components = CGColorGetComponents(color.CGColor);\n\
    \    [_redSlider setValue:components[0]];\n    [_greenSlider setValue:components[1]];\n\
    \    [_blueSlider setValue:components[2]];\n    [_alphaSlider setValue:components[3]];\n\
    }\n```\n\n现在可以实现（私有）实例方法。首先是`sliderChanged:`：\n\n```\n#pragma mark - （私有）实例方法\n\
    \n- (IBAction)sliderChanged:(id)sender\n{\n    _color = [UIColor colorWithRed:_redSlider.value\n\
    \                             green:_greenSlider.value\n                     \
    \         blue:_blueSlider.value\n                             alpha:_alphaSlider.value];\n\
    \n[self sendActionsForControlEvents:UIControlEventValueChanged];\n}\n```\n\n接下来是`labelWithFrame:text:`：\n\
    \n```\n- (UILabel *)labelWithFrame:(CGRect)frame text:(NSString *)text\n{\n  \
    \  UILabel *label = [[UILabel alloc] initWithFrame:frame];\n    label.userInteractionEnabled\
    \ = NO;\n    label.backgroundColor = [UIColor clearColor];\n    label.font = [UIFont\
    \ boldSystemFontOfSize:[UIFont systemFontSize]];\n    label.textAlignment = NSTextAlignmentRight;\n\
    \    label.textColor = [UIColor darkTextColor];\n    label.text = text;\n    return\
    \ label;\n}\n```\n\n完成自定义颜色选择器后，需要添加一个自定义表格视图单元格类来使用它。\n\n## 自定义颜色表格视图单元格\n\n\
    由于有了自定义选择器视图，需要像创建`SuperDBDateCell`和`SuperDBPickerCell`那样，创建`SuperDBEditCell`的子类。但如何在`SuperDBEditableCell`类中显示`UIColor`值呢？可以创建一个显示颜色四个值（红、绿、蓝和透明度）的字符串。但这对大多数最终用户来说毫无意义，用户希望在查看英雄详情时看到实际颜色。目前表格视图单元格中并没有显示颜色的机制。\n\
    \n如果构建一个复杂的表格视图单元格子类来显示颜色，会在应用的其他地方用到它吗？很可能不会。既然如此，就无需投入时间和精力来构建这个类。这里有一个更简单的解决方案：用包含特殊\
    \ Unicode 字符（显示为实心矩形）的`NSString`填充文本字段，然后添加代码更改文本的字体颜色，使其显示为英雄偏好的颜色。\n\n创建一个新的\
    \ Objective-C 子类，使其成为`SuperDBEditCell`的子类，并命名为`SuperDBColorCell`。在`SuperDBColorCell.m`中添加颜色选择器类的（私有）属性。\n\
    \n```\n#import \"UIColorPicker.h\"\n\n@interface SuperDBColorCell ()\n@property\
    \ (strong, nonatomic) UIColorPicker *colorPicker;\n- (void)colorPickerChanged:(id)sender;\n\
    - (NSAttributedString *)attributedColorString;\n@end\n```\n\n同时添加一个（私有）实例方法`attributedColorString`，用于返回`NSAttributedString`。富文本字符串是一种包含自格式信息的字符串。在\
    \ iOS 6 之前，富文本字符串功能极其有限，而现在可以将其与 UIKit 对象一起使用。稍后就会明白为什么需要这个方法。\n\n按照如下方式定义`initWithStyle:reuseIdentifier:`方法：\n\
    \n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \    if (self) {\n        // 初始化代码\n        self.colorPicker = [[UIColorPicker\
    \ alloc] initWithFrame:CGRectMake(0, 0, 320, 216)];\n        [self.colorPicker\
    \ addTarget:self\n                              action:@selector(colorPickerChanged:)\n\
    \                    forControlEvents:UIControlEventValueChanged];\n        self.textField.inputView\
    \ = self.colorPicker;\n    }\n    return self;\n}\n```\n\n这段代码应该相当直观。与其他`SuperDBEditCell`子类一样，已经实例化了选择器对象，并将其设置为`textField`的`inputView`。\n\
    \n接下来，重写`SuperDBEditCell`的值访问方法和设置方法。\n\n```\n#pragma mark - SuperDBEditCell 重写方法\n\
    \n- (id)value\n{\n    return self.colorPicker.color;\n}\n```\n"
- fmt: "- (void)setValue:(id)value\n{\n    if (value != nil && [value isKindOfClass:[UIColor\
    \ class]]) {\n        [super setValue:value];\n        self.colorPicker.color\
    \ = value;\n    }\n    else {\n        self.colorPicker.color = [UIColor colorWithRed:1.0\
    \ green:1.0 blue:1.0 alpha:1.0];\n    }\n    self.textField.attributedText = self.attributedColorString;\n\
    }\n\n请注意这一行：\n\n```\nself.textField.attributedText = self.attributedColorString;\n\
    ```\n\n在`setValue:`方法中，你没有设置`textField`的`text`属性，而是使用了新的`attributedText`属性。这告诉`textView`你正在使用属性字符串，并使用你定义的属性来格式化字符串。如果Hero没有定义颜色属性，你还会将Color\
    \ Picker设置为白色。\n\n添加`colorPicker`回调方法：\n\n```\n#pragma mark - (Private) Instance\
    \ Methods\n\n- (void)colorPickerChanged:(id)sender\n{\n    self.textField.attributedText\
    \ = self.attributedColorString;\n}\n```\n\n同样，你告诉`textField`更新自身。但是用什么呢？\n\n最后，添加以下代码：\n\
    \n```\n- (NSAttributedString *)attributedColorString\n{\n    NSString *block =\
    \ [NSString stringWithUTF8String:\"\\u2588\\u2588\\u2588\\u2588\\u2588\\u2588\\\
    u2588\\u2588\\u2588\\u2588\\u2588\"];\n    UIColor *color = self.colorPicker.color;\n\
    \    NSDictionary *attrs = @{NSForegroundColorAttributeName:color,\n         \
    \                   NSFontAttributeName:[UIFont boldSystemFontOfSize:[UIFont systemFontSize]]};\n\
    \    NSAttributedString *attributedString =         [[NSAttributedString alloc]\
    \ initWithString:block attributes:attrs];\n    return attributedString;\n}\n```\n\
    \n首先，你定义了一个包含许多Unicode字符的字符串。`\\u2588`是方块字符的Unicode编码。你只是创建了一个由10个方块字符组成的字符串。接下来，你让`colorPicker`告诉我们它的颜色。然后你使用该颜色和系统粗体字体（15pt）来定义一个字典。你使用的键是`NSForegroundColorAttributeName`和`NSFontAttributeName`。这些键是专门为UIKit属性字符串支持定义的。从它们的名称可以推断，`NSForegroundColorAttributeName`设置字符串的前景（或文本）颜色，而`NSFontAttributeName`允许你为字符串定义字体。最后，你使用Unicode字符串块和属性字典实例化属性字符串。\n\
