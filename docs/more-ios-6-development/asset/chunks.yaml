  raw: '*   [http://www.cocoadevcentral.com/:](http://www.cocoadevcentral.com/) A
    portal that contains links to a great many Cocoa-related web sites and tutorials.

    *   [http://cocoaheads.org/:](http://cocoaheads.org/:) The CocoaHeads site. CocoaHeads
    is a group dedicated to peer support and promotion of Cocoa. It focuses on local
    groups with regular meetings where Cocoa developers can get together and even
    socialize a bit. There’s nothing better than knowing a real person who can help
    you out, so if there’s a CocoaHeads group in your area, check it out. If there
    isn’t one, why not start one up?

    *   [http://cocoablogs.com/:](http://cocoablogs.com) A portal that contains links
    to a great many blogs related to Cocoa programming.

    *   [http://stackoverflow.com/questions/tagged/ios](http://stackoverflow.com/questions/tagged/ios):
    The iOS tagged question for the free programming Q&A web site. Overall, a great
    source for finding answers to questions. Many experienced and knowledgeable iPhone
    programmers, including some who work at Apple, contribute to this site by answering
    questions and posting sample code.

    *   [http://www.quora.com/iOS-Development:](http://www.quora.com/iOS-Development)
    Another excellent Q&A web site. Though not focused on programming, this tag is
    for iOS development questions.


    Blogs


    Check out these blogs:


    *   [http://blog.kykim.com/:](http://blog.kykim.com) Kevin’s blog with a little
    bit of everything, including sprinkles of iOS development information.

    *   [http://iphonedevelopment.blogspot.com/:](http://iphonedevelopment.blogspot.com)
    Jeff’s iPhone development blog. Jeff posts sample code, tutorials, and other information
    of interest to iPhone developers.

    *   [http://davemark.com/:](http://davemark.com) Dave’s little spot in the sun.
    Not at all technical, just full of whimsical ephemera that catches Dave’s interest
    and he hopes you’ll enjoy, too.

    *   [http://nuthole.com/:](http://nuthole.com/:) Jack Nutting’s blog.

    *   [http://theocacao.com:](http://theocacao.com) Scott Stevenson, an experienced
    Cocoa programmer.

    *   [http://blog.wilshipley.com/:](http://blog.wilshipley.com) Wil Shipley’s blog.
    Wil is one of the most experienced Objective-C programmers on the planet. His
    “Pimp My Code” series of blog postings should be required reading for any Objective-C
    programmer.

    *   [http://rentzsch.tumblr.com/:](http://rentzsch.tumblr.com) Wolf Rentzsch’s
    blog. Wolf is an experienced, independent Cocoa programmer and the founder of
    the C4 Independent Developers conference.

    *   [http://www.cimgf.com/:](http://www.cimgf.com) The Cocoa Is My Girlfriend
    site, which covers software development on both the Mac and iPhone using Objective-C.

    *   [http://raywenderlich.com/:](http://raywenderlich.com) Ray Wenderlich’s blog
    and tutorial site. Ray runs an excellent site for supplemental tutorials and information.


    And If All Else Fails…


    Drop Kevin an e-mail at [moreiphonedev@kykim.com](mailto:moreiphonedev@kykim.com).


    Farewell


    We sure are glad you came along on this journey with us. We wish you the best
    of luck, and we hope that you enjoy iOS programming as much as we do.


