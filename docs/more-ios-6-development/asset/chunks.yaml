    \ 和 `KeychainIdentity`。\n\n使用 Objective-C 类模板创建一个新文件。将类命名为 `KeychainCertificate`，并使其成为\
    \ `KeychainItem` 的子类。创建文件后，选择 `KeychainCertificate.m` 并实现初始化方法。\n\n```objective-c\n\
    - (id)init\n{\n    self = [super init];\n    if (self) {\n        self.type =\
    \ [(__bridge id)kSecClassCertificate copy];\n    }\n    return self;\n}\n\n- (id)initWithData:(NSData\
    \ *)data options:(NSDictionary *)options\n{\n    SecCertificateRef cert = SecCertificateCreateWithData(NULL,\
    \ (__bridge CFDataRef)data);\n    if (cert) {\n        self = [self initWithItem:cert];\n\
    \    }\n    return self;\n}\n```\n\n使用通用的 `init` 方法设置 `type` 属性。`init` 方法将覆盖 `KeychainItem`\
    \ 中的默认 `init`。当调用 `KeychainItem initWithItem:` 时，它会调用 `init`。当您使用 `KeychainCertificate`\
    \ 调用 `initWithItem:` 时，将会调用这个 `init` 方法。\n\n现在，我们来创建 `KeychainIdentity` 类。创建一个新的\
    \ Objective-C 类，将其命名为 `KeychainIdentity`，并使其成为 `KeychainItem` 的子类。由于该类封装了一个数字身份，因此从文件加载时需要密码。\n\
    \n```objective-c\n- (id)init\n{\n    self = [super init];\n    if (self) {\n \
    \       self.type = [(__bridge id)kSecClassIdentity copy];\n    }\n    return\
    \ self;\n}\n\n- (id)initWithData:(NSData *)data options:(NSDictionary *)options\n\
    {\n    CFDataRef inPKCS12Data = (__bridge CFDataRef)data;\n    CFArrayRef items\
    \ = CFArrayCreate(NULL, 0, 0, NULL);\n    // 选项字典需要包含键 kSecImportExportPassphrase，其值为保护文件所用的密码\n\
    \    OSStatus status = SecPKCS12Import(inPKCS12Data, (__bridge CFDictionaryRef)options,\
    \ &items);\n    if (status != errSecSuccess) {\n        NSLog(@\"读取 P12 文件时出错\"\
    );\n        abort();\n    }\n    CFDictionaryRef myIdentityAndTrust = CFArrayGetValueAtIndex(items,\
    \ 0);\n    SecIdentityRef identity = (SecIdentityRef)CFDictionaryGetValue(myIdentityAndTrust,\
    \ kSecImportItemIdentity);\n    if (identity)\n        self = [self initWithItem:identity];\n\
    \nreturn self;\n}\n```\n\n同样，您重写了 `init` 方法来设置 `type` 属性；这次设置为 `kSecClassIdentity`。`initWithData:options:`\
    \ 用于加载 PKCS #12 格式的数据。由于这些数据受密码保护，因此需要选项字典包含键 `kSecImportExportPassphrase`，其值为创建文件时使用的密码。\n\
    \n您需要定义将使用刚刚创建的这些 `KeychainItem` 类的视图控制器类。使用 Objective-C 类模板创建一个新文件。将文件命名为 `KeychainItemsViewController`，并使其成为\
    \ `UITableViewController` 的子类。这将是您的抽象基视图控制器类。打开 `KeychainItemsViewController.h`\
    \ 并添加以下属性：\n\n```objective-c\n@property (strong, nonatomic) NSArray *items;\n\
    ```\n\n`items` 属性将保存要显示的钥匙串项数组。打开 `KeychainItemsViewController.m` 来进行所有必要的修改。首先，需要导入\
    \ `KeychainItem` 头文件。\n\n```objective-c\n#import \"KeychainItem.h\"\n```\n\n接下来，需要更新表格视图的数据源方法，以返回正确的节数和每节的行数。\n\
    \n```objective-c\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    // 返回节数。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    // 返回该节中的行数。\n    return self.items.count;\n\
    }\n```\n\n最后，需要使用钥匙串项来配置表格视图的单元格。\n\n```objective-c\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
    \ *CellIdentifier = @\"KeychainItemCell\";\n    UITableViewCell *cell = [tableView\
    \ dequeueReusableCellWithIdentifier:CellIdentifier\n                         \
    \                                  forIndexPath:indexPath];\n\n// 配置单元格...\n \
    \   KeychainItem *item = self.items[indexPath.row];\n    cell.textLabel.text =\
    \ [item valueForAttribute:kSecAttrLabel];\n\nreturn cell;\n}\n```\n\n这就是 `KeychainItemViewController`\
    \ 所需的全部内容。接下来定义您将实际使用的具体子类。创建一个新的 Objective-C 类文件。将其命名为 `CertificatesViewController`，作为\
    \ `KeychainItemsViewController` 的子类。目前无需修改默认代码。再创建另一个 `KeychainItemsViewController`\
    \ 的子类。这次将类命名为 `IdentitiesViewController`。\n\n现在，更新故事板以使用 `KeychainCertificate`\
    \ 和 `KeychainItem` 类。在故事板编辑器中打开 `MainStoryboard.storyboard`。找到第一个视图控制器并删除。对第二个视图控制器重复此操作。然后将一个\
    \ `UITableViewController` 拖到编辑器面板中。按住 Control 键从标签栏控制器拖拽到表格视图控制器。当 Segue 选择器弹出窗出现时，在关系\
    \ Segue 标签下选择视图控制器。表格视图控制器应该会在底部出现一个标签栏，带有 Item 标签（图 13-8）。点击该标签并打开属性检查器。将标题重命名为\
    \ Identities，并使用名为 `first.png` 的图片。\n\n![9781430238072_Fig13-08.jpg](img/9781430238072_Fig13-08.jpg)\n"
- fmt: "[Figure 13-8.](#9781430238072_Ch13.xhtml#_Fig8) Connecting the table view\
    \ controller to the tab bar controller\n\nSelect the table view controller, and\
    \ in the Identity Inspector, change the class from `UITableViewController` to\
    \ `IdentitiesViewController`. Select the table view cell under the Prototype Cells\
    \ label. In the Attributes Inspector, change the style from Custom to Basic. Give\
    \ the table view cell the identifier of `KeychainItemCell`. Change the accessory\
    \ to Disclosure Indicator.\n\nDrag another `UITableViewController` to the Editor\
    \ pane. Control-drag from the tab bar controller to this table view controller,\
    \ select the view controllers in the pop-up again. Relabel the tab bar to Certificates\
    \ and use the `second.png` image. Change the table view controller class to `CertificatesViewController`.\
    \ Adjust the table view cell to the Basic Style, give it the identifier of `KeychainItemCell`,\
    \ and change the accessory to Disclosure Indicator.\n\nBuild and run the app ([Figure\
    \ 13-9](#9781430238072_Ch13.xhtml#Fig9)). The table views are empty, since you\
    \ haven’t loaded the keychain identities or certificates to display.\n\n![9781430238072_Fig13-09.jpg](images/9781430238072_Fig13-09.jpg)\n\
    \n[Figure 13-9.](#9781430238072_Ch13.xhtml#_Fig9) The Keychain Viewer application\
    \ without any keychain items\n\nEdit `CertificatesViewController.m`. First, you\
    \ need to import the `KeychainCertificate.h` header file.\n\n```\n#import \"KeychainCertificate.h\"\
    \n```\n\nAnd you need to update `viewDidLoad` to load your `KeychainCertificates`.\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        // Do any additional\
    \ setup after loading the view.\n    self.items = [KeychainCertificate allKeychainCertificates];\n\
    }\n```\n\nYou’re invoking a `KeychainCertificate` class method, `allKeychainCertificates`,\
    \ to populate your `items` property. But you haven’t defined that method yet.\
    \ Open `KeychainCertificate.h` and add the class method declaration.\n\n```\n\
    + (NSArray *)allKeychainCertificates;\n```\n\nOpen `KeychainCertificate.m` so\
    \ you can implement `allKeychainCertificates`.\n\n```\n+ (NSArray *)allKeychainCertificates\n\
    {\n    NSMutableArray *certs = [NSMutableArray array];\n    NSDictionary *query\
    \ = @{\n        (__bridge id)kSecClass               : (__bridge id)kSecClassCertificate,\n\
    \        (__bridge id)kSecReturnRef           : (id)kCFBooleanTrue,\n        (__bridge\
    \ id)kSecReturnAttributes    : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnPersistentRef\
    \ : (id)kCFBooleanTrue,\n        (__bridge id)kSecMatchLimit          : (__bridge\
    \ id)kSecMatchLimitAll\n    };\n    CFTypeRef results = NULL;\n    OSStatus status\
    \ = SecItemCopyMatching((__bridge CFDictionaryRef)query, &results);\n    if (status\
    \ == errSecSuccess && results != NULL) {\n        for (NSDictionary *result in\
    \ (__bridge NSArray *)results) {\n            id itemRef = [result valueForKey:(__bridge\
    \ id)kSecValueRef];\n            id persistentRef = [result valueForKey:(__bridge\
    \ id)kSecValuePersistentRef];\n            NSMutableDictionary *attrs = [NSMutableDictionary\
    \ dictionaryWithDictionary:result];\n            [attrs removeObjectForKey:(__bridge\
    \ id)kSecValueRef];\n            [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];\n\
    \            KeychainCertificate *cert =                 [[KeychainCertificate\
    \ alloc] initWithItem:(__bridge CFTypeRef)itemRef];\n            cert.persistentRef\
    \ = persistentRef;\n            cert.attributes = attrs;\n            [certs addObject:cert];\n\
    \        }\n    }\n    return certs;\n}\n```\n\nYou query the keychain for all\
    \ certificates, asking for the certificates, their attributes, and their persistent\
    \ references. The results come back as an array of dictionaries. You need to parse\
    \ the dictionary to extract the certificate and persistent reference. The remaining\
    \ dictionary are the attributes. You create a `KeychainCertificate` from each\
    \ dictionary and return an array of `KeychainCertificate`s back.\n\nYou need to\
    \ repeat the process for the `IdentitiesViewController`. Edit `IdentitiesViewController.m`\
    \ and import the `KeychainIdentity.h` header file."
  raw: '[Figure 13-8.](#9781430238072_Ch13.xhtml#_Fig8)  Connecting the table view
    controller to the tab bar controller


    Select the table view controller, and in the Identity Inspector, change the class
    from UITableViewController to IdentitiesViewController. Select the table view
    cell under the Prototype Cells label. In the Attributes Inspector, change the
    style from Custom to Basic. Give the table view cell the identifier of KeychainItemCell.
    Change the accessory to Disclosure Indicator.


    Drag another UITableViewController to the Editor pane. Control-drag from the tab
    bar controller to this table view controller, select the view controllers in the
    pop-up again. Relabel the tab bar to Certificates and use the second.png image.
    Change the table view controller class to CertificatesViewController. Adjust the
    table view cell to the Basic Style, give it the identifier of KeychainItemCell,
    and change the accessory to Disclosure Indicator.


    Build and run the app ([Figure 13-9](#9781430238072_Ch13.xhtml#Fig9)). The table
    views are empty, since you haven’t loaded the keychain identities or certificates
    to display.


    ![9781430238072_Fig13-09.jpg](images/9781430238072_Fig13-09.jpg)


    [Figure 13-9.](#9781430238072_Ch13.xhtml#_Fig9)  The Keychain Viewer application
    without any keychain items


    Edit CertificatesViewController.m. First, you need to import the KeychainCertificate.h
    header file.


    ```

    #import "KeychainCertificate.h"

    ```


    And you need to update viewDidLoad to load your KeychainCertificates.


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view.

        self.items = [KeychainCertificate allKeychainCertificates];

    }

    ```


    You’re invoking a KeychainCertificate class method, allKeychainCertificates, to
    populate your items property. But you haven’t defined that method yet. Open KeychainCertificate.h
    and add the class method declaration.


    ```

    + (NSArray *)allKeychainCertificates;

    ```


    Open KeychainCertificate.m so you can implement allKeychainCertificates.


    ```

    + (NSArray *)allKeychainCertificates

    {

        NSMutableArray *certs = [NSMutableArray array];

        NSDictionary *query = @{

            (__bridge id)kSecClass               : (__bridge id)kSecClassCertificate,

            (__bridge id)kSecReturnRef           : (id)kCFBooleanTrue,

            (__bridge id)kSecReturnAttributes    : (id)kCFBooleanTrue,

            (__bridge id)kSecReturnPersistentRef : (id)kCFBooleanTrue,

            (__bridge id)kSecMatchLimit          : (__bridge id)kSecMatchLimitAll

        };

        CFTypeRef results = NULL;

        OSStatus status = SecItemCopyMatching((__bridge CFDictionaryRef)query, &results);

        if (status == errSecSuccess && results != NULL) {

            for (NSDictionary *result in (__bridge NSArray *)results) {

                id itemRef = [result valueForKey:(__bridge id)kSecValueRef];

                id persistentRef = [result valueForKey:(__bridge id)kSecValuePersistentRef];

                NSMutableDictionary *attrs = [NSMutableDictionary dictionaryWithDictionary:result];

                [attrs removeObjectForKey:(__bridge id)kSecValueRef];

                [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];

                KeychainCertificate *cert =                 [[KeychainCertificate
    alloc] initWithItem:(__bridge CFTypeRef)itemRef];

                cert.persistentRef = persistentRef;

                cert.attributes = attrs;

                [certs addObject:cert];

            }

        }

        return certs;

    }

    ```


    You query the keychain for all certificates, asking for the certificates, their
    attributes, and their persistent references. The results come back as an array
    of dictionaries. You need to parse the dictionary to extract the certificate and
    persistent reference. The remaining dictionary are the attributes. You create
    a KeychainCertificate from each dictionary and return an array of KeychainCertificates
    back.


    You need to repeat the process for the IdentitiesViewController. Edit IdentitiesViewController.m
    and import the KeychainIdentity.h header file.'
  trans: "\n图 13-8 将表视图控制器连接到标签栏控制器\n\n选中表视图控制器，在标识检查器中，将类从 `UITableViewController`\
    \ 更改为 `IdentitiesViewController`。选中原型单元格标签下的表视图单元格。在属性检查器中，将样式从“自定义”更改为“基本”。为表视图单元格设置标识符为\
    \ `KeychainItemCell`。将辅助功能更改为“披露指示器”。\n\n将另一个 `UITableViewController` 拖拽到编辑器面板中。按住\
    \ Control 键从标签栏控制器拖拽到该表视图控制器，再次在弹出的菜单中选择“视图控制器”。将标签栏重新标记为“证书”，并使用 `second.png`\
    \ 图片。将表视图控制器类更改为 `CertificatesViewController`。将表视图单元格调整为“基本”样式，设置标识符为 `KeychainItemCell`，并将辅助功能更改为“披露指示器”。\n\
    \n构建并运行应用（图 13-9）。由于尚未加载钥匙串身份或证书来显示，因此表视图为空。\n\n![9781430238072_Fig13-09.jpg](img/9781430238072_Fig13-09.jpg)\n\
    \n图 13-9 不显示任何钥匙串项目的钥匙串查看器应用\n\n编辑 `CertificatesViewController.m`。首先，你需要导入 `KeychainCertificate.h`\
    \ 头文件。\n\n```\n#import \"KeychainCertificate.h\"\n```\n\n并且需要更新 `viewDidLoad`\
    \ 以加载你的 `KeychainCertificates`。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \        // 在此处执行任何其他设置后的加载操作。\n    self.items = [KeychainCertificate allKeychainCertificates];\n\
    }\n```\n\n你正在调用 `KeychainCertificate` 类方法 `allKeychainCertificates` 来填充 `items`\
    \ 属性。但尚未定义该方法。打开 `KeychainCertificate.h` 并添加类方法声明。\n\n```\n+ (NSArray *)allKeychainCertificates;\n\
    ```\n\n打开 `KeychainCertificate.m` 以便实现 `allKeychainCertificates`。\n\n```\n+ (NSArray\
    \ *)allKeychainCertificates\n{\n    NSMutableArray *certs = [NSMutableArray array];\n\
    \    NSDictionary *query = @{\n        (__bridge id)kSecClass               :\
    \ (__bridge id)kSecClassCertificate,\n        (__bridge id)kSecReturnRef     \
    \      : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnAttributes    : (id)kCFBooleanTrue,\n\
    \        (__bridge id)kSecReturnPersistentRef : (id)kCFBooleanTrue,\n        (__bridge\
    \ id)kSecMatchLimit          : (__bridge id)kSecMatchLimitAll\n    };\n    CFTypeRef\
    \ results = NULL;\n    OSStatus status = SecItemCopyMatching((__bridge CFDictionaryRef)query,\
    \ &results);\n    if (status == errSecSuccess && results != NULL) {\n        for\
    \ (NSDictionary *result in (__bridge NSArray *)results) {\n            id itemRef\
    \ = [result valueForKey:(__bridge id)kSecValueRef];\n            id persistentRef\
    \ = [result valueForKey:(__bridge id)kSecValuePersistentRef];\n            NSMutableDictionary\
    \ *attrs = [NSMutableDictionary dictionaryWithDictionary:result];\n          \
    \  [attrs removeObjectForKey:(__bridge id)kSecValueRef];\n            [attrs removeObjectForKey:(__bridge\
    \ id)kSecValuePersistentRef];\n            KeychainCertificate *cert =       \
    \          [[KeychainCertificate alloc] initWithItem:(__bridge CFTypeRef)itemRef];\n\
    \            cert.persistentRef = persistentRef;\n            cert.attributes\
    \ = attrs;\n            [certs addObject:cert];\n        }\n    }\n    return\
    \ certs;\n}\n```\n\n你查询钥匙串中所有证书，请求证书、其属性及持久化引用。返回的结果是字典数组。你需要解析字典以提取证书和持久化引用。剩余的字典则是属性。根据每个字典创建一个\
    \ `KeychainCertificate`，并返回一个 `KeychainCertificate` 数组。\n\n你需要对 `IdentitiesViewController`\
    \ 重复此过程。编辑 `IdentitiesViewController.m` 并导入 `KeychainIdentity.h` 头文件。\n"
- fmt: "```objc\n#import \"KeychainIdentity.h\"\n```\n\n修改`viewDidLoad`以加载所有钥匙串身份标识。\n\
    \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view.\n    self.items = [KeychainIdentity allKeychainIdentities];\n\
    }\n```\n\n现在你需要在`KeychainIdentity`上定义并实现`allKeychainIdentities`类方法。打开`KeychainIdentity.h`添加定义。\n\
    \n```objc\n+ (NSArray *)allKeychainIdentities;\n```\n\n将实现添加到`KeychainIdentity.m`。\n\
    \n```objc\n+ (NSArray *)allKeychainIdentities\n{\n    NSMutableArray *idents =\
    \ [NSMutableArray array];\n    NSDictionary *query = @{\n        (__bridge id)kSecClass\
    \               : (__bridge id)kSecClassIdentity,\n        (__bridge id)kSecReturnRef\
    \           : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnAttributes \
    \   : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnPersistentRef : (id)kCFBooleanTrue,\n\
    \        (__bridge id)kSecMatchLimit          : (__bridge id)kSecMatchLimitAll\n\
    \    };\n    CFTypeRef results = NULL;\n    OSStatus status = SecItemCopyMatching((__bridge\
    \ CFDictionaryRef)query, &results);\n    if (status == errSecSuccess && results\
    \ != NULL) {\n        for (NSDictionary *result in (__bridge NSArray *)results)\
    \ {\n            id itemRef = [result valueForKey:(__bridge id)kSecValueRef];\n\
    \            id persistentRef = [result valueForKey:(__bridge id)kSecValuePersistentRef];\n\
    \            NSMutableDictionary *attrs = [NSMutableDictionary dictionaryWithDictionary:result];\n\
    \            [attrs removeObjectForKey:(__bridge id)kSecValueRef];\n         \
    \   [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];\n\n      \
    \      KeychainIdentity *ident =                 \n                  [[KeychainIdentity\
    \ alloc] initWithItem:(__bridge CFTypeRef)itemRef];\n            ident.persistentRef\
    \ = persistentRef;\n            ident.attributes = attrs;\n            [idents\
    \ addObject:ident];\n        }\n    }\n    return idents;\n}\n```\n\n这个实现本质上与`allKeychainCertificates`相同，区别仅在于你查询的是数字身份标识并创建`KeychainIdentity`实例而非`KeychainCertificate`。你或许可以将通用代码重构到`KeychainItem`的类方法中，但目前这样工作。\n\
    \n构建并运行应用仍不会显示任何身份标识或证书。请记住，在iOS中，钥匙串仅限应用作用域内使用。你的应用没有任何钥匙串条目。接下来你将加载之前创建的证书和身份标识。\n\
    \n首先，将你之前创建的两个证书添加到项目中。在项目导航窗格中选择`Supporting Files`组，并将`root.cer`和`cert.p12`文件添加到项目中。确保勾选“Copy\
    \ items to destination group’s folder (if needed)”复选框。\n\n你将在运行应用时加载这些条目，但你不希望在每次启动应用时都加载它们。打开`AppDelegate.m`，并导入`KeychainCertificate`和`KeychainIdentity`头文件。\n\
    \n```objc\n#import \"KeychainCertificate.h\"\n#import \"KeychainIdentity.h\"\n\
    ```\n\n接下来，定义一个私有类别。\n\n```objc\n@interface AppDelegate ()\n- (BOOL)isAnchorCertLoaded;\n\
    - (void)addAnchorCertificate;\n- (void)addIdentity;\n@end\n```\n\n你定义了一个方法来检查锚点证书是否已加载，以及两个方法来添加锚点证书和数字身份标识。在实现这些方法之前，你需要修改`application:didFinishLoadingWithOptions:`。\n\
    \n```objc\n- (BOOL)application:(UIApplication *)application        didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // Override point for customization after application\
    \ launch.\n    if ([self isAnchorCertLoaded]) {\n        [self addIdentity];\n\
    \        [self addAnchorCertificate];\n    }\n\n    return YES;\n}\n```\n\n检查锚点证书是否已加载。如果未加载，则加载数字身份标识和锚点证书。该加载只应发生一次，基本上是在应用的首次启动时。`isAnchorCertLoaded`的实现非常简单。\n\
    \n```objc\n- (BOOL)isAnchorCertLoaded\n{\n    return ([[NSUserDefaults standardUserDefaults]\
    \ valueForKey:@\"anchor_certificate\"] == nil);\n}\n```\n\n你只需检查应用的用户默认中是否存在键`anchor_certificate`。如果不存在，则假定证书和数字身份标识尚未加载。要加载证书，你只需加载文件，实例化`KeychainCertificate`，然后保存它。请记住你的`KeychainItem\
    \ save:`方法会将钥匙串条目写入钥匙串。\n\n```objc\n- (void)addAnchorCertificate\n{\n    NSString\
    \ *rootCertificatePath = [[NSBundle mainBundle] pathForResource:@\"root\" ofType:@\"\
    der\"];\n    NSData *data = [[NSData alloc] initWithContentsOfFile:rootCertificatePath];\n\
    \    KeychainCertificate *cert = [[KeychainCertificate alloc] initWithData:data\
    \ options:nil];\n    if (cert) {\n        NSError *error;\n        BOOL saved\
    \ = [cert save:&error];\n        if (!saved) {\n            NSLog(@\"Error Saving\
    \ Certificate: %@\", [error localizedDescription]);\n            abort();;\n \
    \       }\n        NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
    \        [userDefaults setObject:cert.persistentRef forKey:@\"anchor_certificate\"\
    ];\n        [userDefaults synchronize];\n    }\n}\n```\n\n最后一步，你使用键`anchor_certificates`将证书的持久引用写入用户默认。\n\
    \n添加数字身份标识类似于添加证书。你需要发送用于保护身份标识文件的密码。这里你将硬编码该值。在生产应用中，你可能会使用弹窗对话框要求用户输入密码。\n\n\
    ```objc\n- (void)addIdentity\n{\n    NSString *identityPath = [[NSBundle mainBundle]\
    \ pathForResource:@\"cert\" ofType:@\"p12\"];\n    NSData *data = [[NSData alloc]\
    \ initWithContentsOfFile:identityPath];\n    NSString *password = @\"@Super2048Cat\"\
    ;\n    KeychainIdentity *ident =         \n       [[KeychainIdentity alloc] initWithData:data\
    \                                       \n       options:@{ (__bridge id)kSecImportExportPassphrase\
    \ : password }];\n    if (ident) {\n        NSError *error;\n        BOOL saved\
    \ = [ident save:&error];\n        if (!saved) {\n            NSLog(@\"Error Saving\
    \ Identity: %@\", [error localizedDescription]);\n            abort();\n     \
    \   }\n    }\n}\n```\n\n你假设如果证书已加载，那么也意味着已加载数字身份标识。再次提醒，在生产应用中，你可能需要对每个所需的钥匙串条目进行检查。\n\
    \n构建并运行你的应用。现在你应该能看到你的数字身份标识和证书（[图13-10](#9781430238072_Ch13.xhtml#Fig10)）。\n\n\
    ![9781430238072_Fig13-10.jpg](images/9781430238072_Fig13-10.jpg)\n\n[图13-10.](#9781430238072_Ch13.xhtml#_Fig10)\
    \  展示数字身份标识（左）和证书（右）的钥匙串查看器\n\n让我们为数字身份标识和证书添加一个详细视图。你将使用一个简单的文本视图来打印属性。你将模态呈现这个视图控制器，因此需要添加一个按钮来关闭它。\n\
    \n首先创建一个新的Objective-C类，命名为`KeychainItemViewController`，它将是`UIViewController`的子类。创建类文件后，打开`KeychainItemViewController.h`。在`@interface`声明之前，预先声明`KeychainItem`类。\n\
    \n```objc\n@class KeychainItem;\n```\n\n这样做是因为你想要一个`KeychainItem`属性。此外，你将声明一个`UITextView`属性，用于放置钥匙串条目的属性信息。\n\
    \n```objc\n@property (strong, nonatomic) KeychainItem *item;\n@property (weak,\
