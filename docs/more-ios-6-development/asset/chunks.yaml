  trans: "\n# 排版后的文档\n\n你已经有了两个通过 Interface Builder 创建的 Outlet 属性：`feedbackLabel`\
    \ 和 `gameButton`。你还需要为 Game Kit 会话和已连接节点的对等标识符创建属性。\n\n```objective-c\n@property\
    \ (nonatomic, strong) GKSession *session;\n@property (nonatomic, strong) NSString\
    \ *peerID;\n```\n\n当视图加载时，你加载代表两个游戏棋子的图像，并保留对它们的引用。\n\n```objective-c\n@property\
    \ (nonatomic, strong) UIImage *xPieceImage;\n@property (nonatomic, strong) UIImage\
    \ *oPieceImage;\n```\n\n最后，你声明了游戏中所需的一系列方法。我们将在你于控制器中实现这些方法时，更详细地讨论具体方法。你需将它们添加到通过\
    \ Interface Builder 添加的两个 Action（`gameButtonPressed:` 和 `gameSpacePressed:`）之前。\n\
    \n```objective-c\n- (void)resetBoard;\n- (void)startNewGame;\n- (void)resetDieState;\n\
    - (void)startGame;\n- (void)sendPacket:(Packet *)packet;\n- (void)sendDieRoll;\n\
    - (void)checkForGameEnd;\n```\n\n这个文件中需要的内容就这些。保存文件并打开 `ViewController.m`。\n\n\
    # 实现井字棋视图控制器\n\n`ViewController.m` 中需要添加大量代码，那我们开始吧。\n\n首先，你需要导入头文件 `Packet.h`。\n\
    \n```objective-c\n#import \"Packet.h\"\n```\n\n在 `viewDidLoad` 中（调用 `super` 之后），初始化棋子图像并将当前骰子点数设置为\
    \ `kDiceNotRolled`。\n\n```objective-c\n_myDieRoll = kDiceNotRolled;\nself.oPieceImage\
    \ = [UIImage imageNamed:@\"O.png\"];\nself.xPieceImage = [UIImage imageNamed:@\"\
    X.png\"];\n```\n\n在实现文件的底部，有两个 Action 方法。你需要实现它们。首先，编辑 `gameButtonPressed:`。\n\
    \n```objective-c\n#pragma mark - Game-Specific Actions\n\n- (IBAction)gameButtonPressed:(id)sender\n\
    {\n    _dieRollReceived = NO;\n    _dieRollAcknowledged = NO;\n\n    _gameButton.hidden\
    \ = YES;\n    GKPeerPickerController *picker = [[GKPeerPickerController alloc]\
    \ init];\n    picker.delegate = self;\n    [picker show];\n}\n```\n\n这是用户按下“新建游戏”按钮时的回调。你将\
    \ `_dieRollReceived` 和 `_dieRollAcknowledged` 设置为 `NO`，因为你知道在新的游戏中，这两件事都尚未发生。接着，你隐藏按钮，因为不希望玩家在搜索对等设备或进行游戏时请求新游戏。然后，你创建\
    \ `GKPeerPickerController` 实例，将 `self` 设置为委托，并显示对等设备选择控制器。这就是启动让用户选择另一台设备进行对战所需做的全部工作。对等设备选择器会处理所有事务，并在需要你执行操作时调用委托方法。\n\
    \n现在，添加用户按下某个游戏格子按钮时的回调。\n\n```objective-c\n- (IBAction)gameSpacePressed:(id)sender\n\
    {\n    UIButton *buttonPressed = sender;\n    if (_state == kGameStateMyTurn &&\
    \ [buttonPressed imageForState:UIControlStateNormal] == nil) {\n        [buttonPressed\
    \ setImage:((_playerPiece == kPlayerPieceO) ? self.oPieceImage\n             \
    \                                                    : self.xPieceImage) \n  \
    \                     forState:UIControlStateNormal];\n        _feedbackLabel.text\
    \ = NSLocalizedString(@\"Opponent's Turn\", @\"Opponent's Turn\");\n        _state\
    \ = kGameStateYourTurn;\n\n        Packet *packet = [[Packet alloc] initMovePacketWithSpace:buttonPressed.tag];\n\
    \        [self sendPacket:packet];\n\n        [self checkForGameEnd];\n    }\n\
    }\n```\n\n你首先将 `sender` 转换为 `UIButton`。你知道 `sender` 始终是 `UIButton` 的实例，这样做可以避免每次使用时都进行类型转换。接下来，你检查游戏状态。如果不是当前玩家的回合，你不想让用户选择格子。你还检查以确保按下的按钮尚未分配图像。如果已分配图像，则说明该按钮代表的格子里已经有了\
    \ X 或 O，用户不能选择它。如果格子没有分配图像并且是你的回合，你根据自己是先手还是后手，将图像设置为适合当前玩家的对应图像。棋子变量稍后会在比较骰子点数时设置。你更新反馈标签，告知用户当前不再是他们的回合，并相应地更改状态。你必须通知另一台设备你已经落子，因此创建\
    \ `Packet` 实例，传入被按下按钮的标签值以标识玩家选择了哪个格子。你使用名为 `sendPacket:` 的方法（稍后将会看到）来将 `Packet`\
    \ 实例发送到另一个节点。最后一步，你检查游戏是否结束。`checkForGameEnd` 方法判断是否有玩家获胜，或者棋盘上是否没有空格（这意味着平局）。\n\
    \n在实现你在接口文件中定义的方法之前，你需要考虑你所做的协议声明。你将 `ViewController` 定义为遵循 `GKPeerPickerControllerDelegate`、`GKSessionDelegate`\
    \ 和 `UIAlertViewDelegate` 协议。让我们按顺序处理它们，先从 `GKPeerPickerControllerDelegate` 开始。\n\
    \n## Game Kit 点对点委托方法\n\n当 Game Kit 点对点选择器显示时，它会尝试使用 `peerPickerController:sessionForConnectionType:`\
    \ 方法创建一个 Game Kit 会话。因此，你先实现这个方法。将此方法添加到 `ViewController.m` 中，放在 `@end` 之前。\n\n\
    ```objective-c\n#pragma mark - GameKit Peer Picker Delegate Methods\n\n- (GKSession\
    \ *)peerPickerController:(GKPeerPickerController *)picker\n            sessionForConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n    GKSession *theSession;\n    if (type == GKPeerPickerConnectionTypeNearby)\n\
    \        theSession = [[GKSession alloc] initWithSessionID:kTicTacToeSessionID\n\
    \                                          displayName:nil\n                 \
    \                         sessionMode:GKSessionModePeer];\n    return theSession;\n\
    }\n```\n\n这是选择器要求你提供会话的地方。因为你希望所有设备既能够广播自身，也能查找网络上的其他设备，所以将会话模式指定为 `GKSessionModePeer`。请注意，你还使用了在\
    \ `TicTacToe.h` 头文件中定义的常量 `kTicTacToeSessionID`，以确保只连接到其他 TicTacToe 实例。我们在前面已经讨论过这一点，如果需要回顾代码，可以往前翻几页。\n\
    \n添加处理与对等设备连接的方法。\n\n```objective-c\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker\n                 didConnectPeer:(NSString *)thePeerID\n          \
    \                toSession:(GKSession *)theSession\n{\n    self.peerID = thePeerID;\n\
    \    self.session = theSession;\n    self.session.delegate = self;\n    [self.session\
    \ setDataReceiveHandler:self withContext:NULL];\n    [picker dismiss];\n    picker.delegate\
    \ = nil;\n    [self startNewGame];\n}\n```\n\n由于对等设备选择器仅用于简单的点对点游戏，一旦你收到连接通知，就存储会话和对等设备标识符，然后关闭选择器。关闭后，你调用\
    \ `startNewGame` 来启动游戏。\n\n接下来，添加处理用户取消操作的委托方法。\n\n```objective-c\n- (void)peerPickerControllerDidCancel:(GKPeerPickerController\
    \ *)picker\n{\n    self.gameButton.hidden = NO;\n}\n```\n\n你只需取消隐藏“新建游戏”按钮。\n\n\
    ## Game Kit 会话委托方法\n"
- fmt: "```markdown\n现在，你需要实现 Game Kit 会话的委托方法。从 `session:didFailWithError:` 开始。\n\
    \n```\n#pragma mark - GameKit Session Delegate Methods\n\n- (void)session:(GKSession\
    \ *)theSession didFailWithError:(NSError *)error \n{\n    UIAlertView *alert =\
    \ [[UIAlertView alloc]\n                              initWithTitle:NSLocalizedString(@\"\
    Error Connecting!\",\n                                                             \
    \ @\"Error Connecting!\")\n                                   message:NSLocalizedString(@\"\
    Unable to establish the connection.\",\n                                                            \
    \ @\"Unable to establish the connection.\")\n                                  delegate:self\n\
                             cancelButtonTitle:NSLocalizedString(@\"Bummer\", @\"\
    Bummer\")\n                         otherButtonTitles:nil];\n    [alert show];\n\
        theSession.available = NO;\n    [theSession disconnectFromAllPeers];\n    theSession.delegate\
    \ = nil;\n    [theSession setDataReceiveHandler:nil withContext:nil];\n    self.session\
    \ = nil;\n}\n```\n\n当从 Game Kit 会话收到错误时，你将显示一个警告视图。然后清理 Game Kit 会话并关闭所有连接。最后一步，将\
    \ `session` 属性设置为 `nil`。\n\n由于你正在使用对等选择器，因此无需处理选择其他节点或连接它。但必须确保如果对手断开连接，你不会继续尝试进行该游戏。每当对等方的状态发生变化时，都会调用以下方法。如果收到另一个节点已断开连接的通知，你将再次通过警告视图通知用户，当用户关闭警告视图时，你的警告视图委托方法将重置棋盘。\n\
    \n```\n- (void)session:(GKSession *)theSession peer:(NSString *)peerID\n                              \
    \ didChangeState:(GKPeerConnectionState)inState\n{\n    if (inState == GKPeerStateDisconnected)\
    \ {\n        _state = kGameStateInterrupted;\n        UIAlertView *alert =\n           \
    \ [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Peer Disconnected!\"\
    ,\n                                                                 @\"Peer Disconnected!\"\
    )\n               message:NSLocalizedString(@\"Your opponent has disconnected,\
    \ or the connection has been lost\",\n                                        \
    \ @\"Your opponent has disconnected, or the connection has been lost\")\n              \
    \ delegate:self\n               cancelButtonTitle:NSLocalizedString(@\"Bummer\"\
    , @\"Bummer\")\n               otherButtonTitles:nil];\n        [alert show];\n\
            theSession.available = NO;\n        [theSession disconnectFromAllPeers];\n\
            theSession.delegate = nil;\n        [theSession setDataReceiveHandler:nil\
    \ withContext:nil];\n        self.session = nil;\n    }\n}\n```\n\n### Game Kit\
    \ 数据接收处理程序\n\n在继续之前，还需要实现一个方法：`receiveData:fromPeer:inSession:context:`。这个方法既不是\
    \ Game Kit 对等选择器控制器的委托方法，也不是 Game Kit 会话的委托方法。调用此方法是因为你在 `peerPickerController:didConnectPeer:toSession:`\
    \ 中创建会话时调用了 Game Kit 会话方法 `setDataReceiveHandler:withContext:`。\n\n```\n- (void)receiveData:(NSData\
    \ *)data\n           fromPeer:(NSString *)peer\n          inSession:(GKSession\
    \ *)theSession\n            context:(void *)context\n{\n    NSKeyedUnarchiver\
    \ *unarchiver = [[NSKeyedUnarchiver alloc] initForReadingWithData:data];\n    Packet\
    \ *packet = [unarchiver decodeObjectForKey:kTicTacToeArchiveKey];\n\nswitch (packet.type)\
    \ {\n        case kPacketTypeDieRoll: {\n            _opponentDieRoll = packet.dieRoll;\n\
                Packet *ack = [[Packet alloc] initAckPacketWithDieRoll:_opponentDieRoll];\n\
                [self sendPacket:ack];\n            _dieRollReceived = YES;\n            break;\n\
            }\n        case kPacketTypeAck: {\n            if (packet.dieRoll != _myDieRoll)\
    \ {\n                NSLog(@\"Ack packet doesn't match yourDieRoll (mine: %d,\
    \ send: %d\",\n                      packet.dieRoll, _myDieRoll);\n            }\n\
                _dieRollAcknowledged = YES;\n            break;\n        }\n        case\
    \ kPacketTypeMove: {\n            UIButton *aButton = (UIButton *)[self.view viewWithTag:[packet\
    \ space]];\n            [aButton setImage:((_playerPiece == kPlayerPieceO) ? self.xPieceImage\n\
                                                                   : self.oPieceImage)\n\
                         forState:UIControlStateNormal];\n            _state = kGameStateMyTurn;\n\
                _feedbackLabel.text = NSLocalizedString(@\"Your Turn\", @\"Your Turn\"\
    );\n            [self checkForGameEnd];\n            break;\n        }\n        case\
    \ kPacketTypeReset: {\n            if (_state == kGameStateDone)\n                [self\
    \ resetDieState];\n            break;\n        }\n        default: {\n            break;\n\
            }\n    }\n\nif (_dieRollReceived == YES && _dieRollAcknowledged == YES)\n\
            [self startGame];\n   }\n```\n\n这是你的数据接收处理程序。每当从另一个节点接收到数据包时，都会调用此方法。首先要做的是将数据解档到所发送的原始\
    \ `Packet` 实例的副本中。然后使用 `switch` 语句根据收到的数据包类型执行不同的操作。如果是掷骰子数据包，则存储对手的值，发回确认值，并将\
    \ `dieRollReceived` 设置为 `YES`。如果收到确认，请确保返回的数字与你发送的数字相同。这只是一个一致性检查。理论上不应该发生数字不一致的情况。如果发生，可能表明代码存在问题，或者意味着有人作弊。虽然我们怀疑是否有人会费心在井字棋中作弊，但已知在某些网络游戏中存在作弊行为，因此你可能需要考虑验证与对等方交换的任何信息。在这里，你只是记录不一致并继续。在实际应用中，如果检测到这种性质的数据不一致，你可能希望采取更严厉的措施。\n\
    \n如果数据包是移动数据包，表示其他玩家选择了一个空格，则使用 X 或 O 图像更新相应的空格，并更改状态和标签以反映现在轮到你的玩家。你还需要检查其他玩家的移动是否导致游戏结束。当收到重置数据包时，你所做的就是将游戏状态更改为\
    \ `kGameStateDone`，这样如果在意识到游戏结束之前收到掷骰子数据包，就不会丢弃它。如果收到了数据包，并且 `dieRollReceived`\
    \ 和 `dieRollAcknowledged` 现在都是 `YES`，你就知道该开始游戏了。\n\n最后，添加警告视图委托方法。\n\n```\n#pragma\
    \ mark - UIAlertView Delegate Method\n\n- (void)alertView:(UIAlertView *)alertView\
    \ willDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    [self resetBoard];\n\
        self.gameButton.hidden = NO;\n}\n```\n\n你重置游戏板并取消隐藏“新游戏”按钮。\n\n## 实现井字棋方法\n\
    \n`startNewGame` 方法非常简单。它只是调用一个方法来重置棋盘，然后调用另一个方法来掷骰子并将结果发送到另一个节点。这两种操作都可能发生在游戏开始之外的其他时间。例如，如果连接丢失，你会重置棋盘；如果两个节点掷出相同数字，你会发送掷骰子结果。\n\
    \n```\n#pragma mark - Instance Methods\n\n- (void) startNewGame\n{\n    [self\
    \ resetBoard];\n    [self sendDieRoll];\n}\n```"
  raw: "Now, you need to implement the Game Kit session delegate methods. Start with\
    \ the session:didFailWithError:.\n\n```\n#pragma mark - GameKit Session Delegate\
    \ Methods\n\n- (void)session:(GKSession *)theSession didFailWithError:(NSError\
    \ *)error \n{\n    UIAlertView *alert = [[UIAlertView alloc]\n                              initWithTitle:NSLocalizedString(@\"\
    Error Connecting!\",\n                                                             \
    \ @\"Error Connecting!\")\n                                   message:NSLocalizedString(@\"\
    Unable to establish the connection.\",\n                                                            \
    \ @\"Unable to establish the connection.\")\n                                  delegate:self\n\
                             cancelButtonTitle:NSLocalizedString(@\"Bummer\", @\"\
    Bummer\")\n                         otherButtonTitles:nil];\n    [alert show];\n\
        theSession.available = NO;\n    [theSession disconnectFromAllPeers];\n    theSession.delegate\
    \ = nil;\n    [theSession setDataReceiveHandler:nil withContext:nil];\n    self.session\
    \ = nil;\n}\n```\n\nWhen you get an error from the Game Kit session, you will\
    \ display an alert view. Then you clean up the Game Kit session and close any\
    \ connections. At the last step, you set the session property to nil.\n\nBecause\
    \ you’re using the peer picker, you don’t need to handle choosing another node\
    \ or connecting to it. But you must make sure that if the opponent disconnects,\
    \ you don’t keep trying to play that game. The following method is called any\
    \ time a peer’s state changes. If you’re notified that another node has disconnected,\
    \ you again inform the users through an alert view, and when they dismiss it,\
    \ your alert view delegate method will reset the board.\n\n```\n- (void)session:(GKSession\
    \ *)theSession peer:(NSString *)peerID\n                               didChangeState:(GKPeerConnectionState)inState\n\
    {\n    if (inState == GKPeerStateDisconnected) {\n        _state = kGameStateInterrupted;\n\
            UIAlertView *alert =\n            [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
    Peer Disconnected!\",\n                                                                 @\"\
    Peer Disconnected!\")\n               message:NSLocalizedString(@\"Your opponent\
    \ has disconnected, or the connection has been lost\",\n                                        \
    \ @\"Your opponent has disconnected, or the connection has been lost\")\n              \
    \ delegate:self\n               cancelButtonTitle:NSLocalizedString(@\"Bummer\"\
    , @\"Bummer\")\n               otherButtonTitles:nil];\n        [alert show];\n\
            theSession.available = NO;\n        [theSession disconnectFromAllPeers];\n\
            theSession.delegate = nil;\n        [theSession setDataReceiveHandler:nil\
    \ withContext:nil];\n        self.session = nil;\n    }\n}\n```\n\nGame Kit Data\
    \ Receive Handler\n\nBefore you go on, there is one more method you need to implement:\
    \ receiveData:fromPeer:inSession:context:. This method is neither a Game Kit Peer\
    \ Picker Controller delegate method nor a Game Kit session delegate method. This\
    \ method is invoked because you called the Game Kit session method setDataReceiveHandler:withContext:\
    \ when you created the session in peerPickerController:didConnectPeer:toSession:.\n\
    \n```\n- (void)receiveData:(NSData *)data\n           fromPeer:(NSString *)peer\n\
              inSession:(GKSession *)theSession\n            context:(void *)context\n\
    {\n    NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver alloc] initForReadingWithData:data];\n\
        Packet *packet = [unarchiver decodeObjectForKey:kTicTacToeArchiveKey];\n\n\
    switch (packet.type) {\n        case kPacketTypeDieRoll: {\n            _opponentDieRoll\
    \ = packet.dieRoll;\n            Packet *ack = [[Packet alloc] initAckPacketWithDieRoll:_opponentDieRoll];\n\
                [self sendPacket:ack];\n            _dieRollReceived = YES;\n            break;\n\
            }\n        case kPacketTypeAck: {\n            if (packet.dieRoll != _myDieRoll)\
    \ {\n                NSLog(@\"Ack packet doesn't match yourDieRoll (mine: %d,\
    \ send: %d\",\n                      packet.dieRoll, _myDieRoll);\n            }\n\
                _dieRollAcknowledged = YES;\n            break;\n        }\n        case\
    \ kPacketTypeMove: {\n            UIButton *aButton = (UIButton *)[self.view viewWithTag:[packet\
    \ space]];\n            [aButton setImage:((_playerPiece == kPlayerPieceO) ? self.xPieceImage\n\
                                                                   : self.oPieceImage)\n\
                         forState:UIControlStateNormal];\n            _state = kGameStateMyTurn;\n\
                _feedbackLabel.text = NSLocalizedString(@\"Your Turn\", @\"Your Turn\"\
    );\n            [self checkForGameEnd];\n            break;\n        }\n        case\
    \ kPacketTypeReset: {\n            if (_state == kGameStateDone)\n                [self\
    \ resetDieState];\n            break;\n        }\n        default: {\n            break;\n\
            }\n    }\n\nif (_dieRollReceived == YES && _dieRollAcknowledged == YES)\n\
            [self startGame];\n   }\n```\n\nThis is your data receive handler. This\
    \ method is called whenever you receive a packet from the other node. The first\
    \ thing you do is unarchive the data into a copy of the original Packet instance\
    \ that was sent. Then you use a switch statement to take different actions based\
    \ on the type of packet you received. If it’s a die roll, you store your opponent’s\
    \ value, send back an acknowledgment of the value, and set dieRollReceived to\
    \ YES. If you’ve received an acknowledgment, make sure the number returned is\
    \ the same as the one you sent. This is just a consistency check. It shouldn’t\
    \ ever happen that the number is not the same. If it did, it might be an indication\
    \ of a problem with your code, or it could mean that someone is cheating. Although\
    \ we doubt that anyone would bother cheating at tic-tac-toe, people have been\
    \ known to cheat in some networked games, so you might want to consider validating\
    \ any information exchanged with peers. Here, you’re just logging the inconsistency\
    \ and moving on. In your real-world applications, you might want to take more\
    \ serious action if you detect a data inconsistency of this nature.\n\nIf the\
    \ packet is a move packet, which denotes that the other player chose a space,\
    \ you update the appropriate space with an X or O image, and change the state\
    \ and label to reflect the fact that it’s now your player’s turn. You also check\
    \ to see if the other player’s move resulted in the game being over. When you\
    \ receive a reset packet, all you do is change the game state to kGameStateDone\
    \ so that if a die roll comes in before you’ve realized the game is over, you\
    \ don’t discard it. If you received a packet, and both dieRollReceived and dieRollAcknowledged\
    \ are now YES, you know it’s time to start the game.\n\nFinally, you add the alert\
    \ view delegate method.\n\n```\n#pragma mark - UIAlertView Delegate Method\n\n\
    - (void)alertView:(UIAlertView *)alertView willDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    [self resetBoard];\n    self.gameButton.hidden = NO;\n}\n```\n\nYou reset\
    \ the game board and unhide the New Game button.\n\nImplementing Tic-Tac-Toe Methods\n\
    \nThe method startNewGame is very simple. It just calls a method to reset the\
    \ board, and then calls another method to roll the die and send the result to\
    \ the other node. Both of these actions can happen at times other than game start.\
    \ For example, you reset the board if the connection is lost, and you send the\
    \ die roll if both nodes roll the same number.\n\n```\n#pragma mark - Instance\
    \ Methods\n\n- (void) startNewGame\n{\n    [self resetBoard];\n    [self sendDieRoll];\n\
    }\n```"
