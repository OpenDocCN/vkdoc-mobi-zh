  raw: '*   *Blank*: An empty template for you to customize.

    *   *Allocations* **:** Template to track memory usage on an object basis.

    *   *Leaks* **:** Another memory usage template, focused on finding memory leaks.

    *   *Activity Monitor* **:** Monitor system resource usage of the application.

    *   *Zombies* **:** Another memory usage template, focused on finding overreleased
    memory.

    *   *Time Profiler* **:** Sample processes running the CPU.

    *   *System Trace* **:** Monitors application threads moving between system and
    user space.

    *   *Automation* **:** Scripting tool to allow simulation of user interaction.

    *   *File Activity* **:** Monitors file system usage by application.

    *   *Core Data* **:** Monitors Core Data activity within the application.


    Let’s just start with the Allocations template. Double click it, and Instruments
    should open ([Figure 15-27](#9781430238072_Ch15.xhtml#Fig27)). The application
    should launch in Simulator and you will note that you are now tracking memory
    usage.


    ![9781430238072_Fig15-27.jpg](images/9781430238072_Fig15-27.jpg)


    [Figure 15-27.](#9781430238072_Ch15.xhtml#_Fig27)  Main Instruments window


    Add some items to your application, then delete them. You should see Instruments
    trace memory usage.


    While running one trace instrument is useful, the real power behind Instruments
    is the ability to run many traces simultaneously and determine where your application
    may have performance issues.


    Play around with Instruments and see if it helps you optimize your applications.


    End Of The Road


    As we stated at the beginning of the chapter, there’s no teacher like experience
    when it comes to unit testing, debugging, and profiling, so you just need to get
    out there and start making your own mistakes and then fixing them. Don’t hesitate
    to use search engines or to ask more experienced developers for help if you truly
    do get stuck, but don’t let those resources become a crutch, either. Put in an
    effort to find and fix each bug you encounter before you start looking for help.
    Yes, it will be frustrating at times, but it’s good for you. It builds character.


    And with that, we’re close to the end of our journey together. We do have one
    more chapter, though, a farewell bit of guidance as you move forward in your iOS
    development travels. So, when you’re ready for it, turn the page.


    Chapter    16


    The Road Goes Ever On…


    You’ve survived another journey with us. Great! At this point, you know a lot
    more than when you first opened this book. We would love to tell you that you
    now know it all, but when it comes to technology, you never know it all. This
    is particularly true of iOS development technologies. The programming language
    and frameworks you’ve been working with in this book are the result of well over
    25 years of evolution. Our engineering friends at Apple are always feverishly
    working on that Next Cool New Thing.™ Despite being much more mature than it was
    when it first launched, the iOS platform has still just begun to blossom. There
    is so much more to come.


    Before we started working on this edition of the book, the co-founder and chairman
    of Apple, Steve Jobs, passed away. When people ask Alex what it was like to work
    with Steve at NeXT and then Apple, he would always tell them that it was the most
    exhilarating experience of his life. It was an environment where he was always
    sure that nothing less than excellence was expected from him at all times. It
    was an environment where he knew this expectation was shared by the folks he worked
    closely with. An environment infused with passion and great talent; who could
    ask for more? While we mourn the loss of Steve, we acknowledge that Apple is infused
    with his DNA and the pursuit of excellence continues as Apple advances our beloved
    iOS platform.


    By making it through another book, you’ve built yourself an even sturdier foundation.
    You’ve acquired a solid knowledge of Objective-C, Cocoa Touch, and the tools that
    bring these technologies together to create incredible new iOS applications. You
    understand the iOS software architecture and the design patterns that make Cocoa
    Touch sing. In short, you are even more ready to chart your own course.


    Getting Unstuck


    At its core, programming is about problem solvingfiguring things out. It is both
    fun and rewarding. But there will be times when you run up against a puzzle that
    seems insurmountable, a problem that does not appear to have a solution.


    Sometimes, the answer just appears—a result of a bit of time away from the problem.
    A good night’s sleep or a few hours of doing something different can often be
    all that you need to get through it. Believe us, sometimes you can stare at the
    same problem for hours, overanalyzing and getting yourself so worked up that you
    miss an obvious solution.


    And then there are times when even a change of scenery doesn’t help. In those
    situations, it’s good to have friends in high places. Here are some resources
    you can turn to when you’re in a bind.


    Apple’s Documentation


    Become one with Xcode’s documentation browser. The documentation browser is a
    front end to a wealth of incredibly valuable sample source code, concept guides,
    API references, video tutorials, and a whole lot more.


    There are few areas of iOS that you won’t be able to learn more about by making
    your way through Apple’s documentation. And the more comfortable you get with
    Apple’s documentation, the easier it will be for you to make your way through
    uncharted territories and new technologies as Apple rolls them out.


    Mailing Lists


    The following are some useful mailing lists that are maintained by Apple:


    *   [http://lists.apple.com/mailman/listinfo/cocoa-dev:](http://lists.apple.com/mailman/listinfo/cocoa-dev:)
    A moderately high-volume list, primarily focused on Cocoa for Mac OS X. Because
    of the common heritage shared by Cocoa and Cocoa Touch, many of the people on
    this list may be able to help you. Make sure to search the list archives before
    asking your question, though.

    *   [http://lists.apple.com/mailman/listinfo/xcode-users:](http://lists.apple.com/mailman/listinfo/xcode-users:)
    A mailing list specific to questions and problems related to Xcode.

    *   [http://lists.apple.com/mailman/listinfo/quartz-dev:](http://lists.apple.com/mailman/listinfo/quartz-dev:)
    A mailing list for discussion of Quartz 2D and Core Graphics technologies.


    Discussion Forums


    These are some discussion forums you may like to join:


    *   [http://forum.learncocoa.org/](http://forum.learncocoa.org/) : Forums set
    up by Jack Nutting, author of *Beginning iOS Development*. We’ve set up a forum
    for this book as well. The most current version of the project archives that accompany
    this book are here, updated with all errata and running on the most current release
    of the iOS SDK.

    *   [http://devforums.apple.com/:](http://devforums.apple.com) Apple’s new developer
    community forums for Mac and iPhone software developers. These require logging
    in, but that means you can discuss new functionality that’s still under NDA. Apple’s
    engineers are known to check in periodically and answer questions.

    *   [www.iphonedevsdk.com/:](http://www.iphonedevsdk.com) A web forum where iPhone
    programmers, both new and experienced, help each other out with problems and advice.

    *   [http://forums.macrumors.com/forumdisplay.php?f=135:](http://forums.macrumors.com/forumdisplay.php?f=135)
    A forum for iPhone programmers hosted by the nice folks at MacRumors.


    Web Sites


    Here are some web sites that you may want to visit:'
