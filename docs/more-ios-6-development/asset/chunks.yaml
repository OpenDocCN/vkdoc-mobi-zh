    ];\n```\n\n虽然保持现状可能没问题，但你或许更希望用`HeroDetailConfiguration`中的方法来替换这些调用。为什么要这样做？简而言之，是因为两个概念：封装和信息隐藏。信息隐藏是指隐藏实现细节的指导思想。想象一下，如果你改变了配置信息的存储方式，那么你就必须修改填充表格视图单元格的方式。通过将特定的访问调用放在`HeroDetailConfiguration`内部，你就不必担心配置存储机制是否会改变。你可以自由地更改内部实现，而无需担心表格视图单元格的代码。封装是指将所有配置访问代码集中到一个单独的对象`HeroDetailConfiguration`中，而不是将这些访问代码散布在视图控制器中各处。\n\
    \n回顾一下对行字典的`objectForKey:`调用，你可能需要这样的一些方法：\n\n```objectivec\n- (NSString *)cellClassnameForIndexPath:(NSIndexPath\
    \ *)indexPath;\n- (NSArray *)valuesForIndexPath:(NSIndexPath *)indexPath;\n- (NSString\
    \ *)attributeKeyForIndexPath:(NSIndexPath *)indexPath;\n- (NSString *)labelForIndexPath:(NSIndexPath\
    \ *)indexPath;\n```\n\n将它们添加到`HeroDetailConfiguration.h`中，然后在`HeroDetailConfiguration.m`中添加它们的实现。\n\
    \n```objectivec\n- (NSString *)cellClassnameForIndexPath:(NSIndexPath *)indexPath\n\
    {\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n    return [row\
    \ objectForKey:@\"class\"];\n}\n\n- (NSArray *)valuesForIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n\
    \    return [row objectForKey:@\"values\"];\n}\n\n- (NSString *)attributeKeyForIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n\
    \    return [row objectForKey:@\"key\"];\n}\n\n- (NSString *)labelForIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n\
    \    return [row objectForKey:@\"label\"];\n}\n```\n\n最后，用这些新方法替换`HeroDetailController\
    \ tableView:cellForRowAtIndexPath:`中的代码。\n\n```objectivec\n    NSDictionary *row\
    \ = [self.config rowForIndexPath:indexPath];\n    NSString *cellClassname = [row\
    \ objectForKey:@\"class\"];\n    NSString *cellClassname = [self.config cellClassnameForIndexPath:indexPath];\n\
    \        ...\n    NSArray *values = [row valueForKey:@\"values\"];\n    NSArray\
    \ *values = [self.config valuesForIndexPath:indexPath];\n        ...\n    cell.key\
    \ = [row objectForKey:@\"key\"];\n    cell.value = [self.hero valueForKey:[row\
    \ objectForKey:@\"key\"]];\n    cell.label.text = [row objectForKey:@\"label\"\
    ];\n    cell.key = [self.config attributeKeyForIndexPath:indexPath];\n    cell.value\
    \ = [self.hero valueForKey:[self.config attributeKeyForIndexPath:indexPath]];\n\
    \    cell.label.text = [self.config labelForIndexPath:indexPath];\n```\n\n如果你愿意，可以继续重构代码，但在此处告一段落，继续前进是合适的。\n\
    \n# 数据驱动配置"
- fmt: "好的，作为高级文档工程师，我已根据您的要求和注意事项，对给定的文本进行了格式优化。\n\n\nOkay, now you’re ready to tackle\
    \ the whole point of this refactoring. It’s time to set up the property list to\
    \ handle the data-driven Powers section. We detailed two possible approaches earlier.\
    \ You’re going to take the approach that has you add a dynamic Boolean item and\
    \ keeps the row item as an array. For items where `dynamic` is `YES`, the row\
    \ item array will have only one element. If there are more, you’re going to ignore\
    \ them.\n\nOpen `HeroDetailConfiguration.plist`, and navigate to Root ![image](images/arrow.jpg)\
    \ sections ![image](images/arrow.jpg) Item 2. If the disclosure triangle is closed,\
    \ open it. Select the item named `header`, and add an two items after it. Name\
    \ the first item `dynamic`, set its type to Boolean, and give it a value of `YES`.\
    \ Name the second item `rows`, and set its type to Array. Add a dictionary to\
    \ the `rows` Array and give the dictionary three items. Give the three Dictionary\
    \ items the names of `key`, `class`, and `label`. Leave the type of all three\
    \ items as String. Set the `key` value to `powers`; `class` to `SuperDBCell`.\
    \ Leave the `label` value blank.\n\nYour property list editor should look something\
    \ like [Figure 7-13](#9781430238072_Ch07.xhtml#Fig13).\n\n![9781430238072_Fig07-13.jpg](images/9781430238072_Fig07-13.jpg)\n\
    \n[Figure 7-13.](#9781430238072_Ch07.xhtml#_Fig13)  The Power section property\
    \ list configuration\n\nNow you need the `HeroDetailConfiguration` to use this\
    \ new `dynamic` item.\n\nFirst, you need to define a method to check if the section\
    \ you are looking at is dynamic or not. Let’s add that method declaration to `HeroDetailConfiguration.h`.\n\
    \n```\n- (BOOL)isDynamicSection:(NSInteger)section;\n```\n\nLet’s add the implementation\
    \ to `HeroDetailConfiguration.m`.\n\n```\n- (BOOL)isDynamicSection:(NSInteger)section\n\
    {\n    BOOL dynamic = NO;\n\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n\
    \    NSNumber *dynamicNumber = [sectionDict objectForKey:@\"dynamic\"];\n    if\
    \ (dynamicNumber != nil)\n        dynamic = [dynamicNumber boolValue];\n\n   \
    \ return dynamic;\n}\n```\n\nBy default, you’ll assume that a section is not dynamic\
    \ if there’s no `dynamic` entry in the configuration property list section.\n\n\
    Now, you need to update the `rowForIndexPath:` method to handle dynamic sections.\
    \ You just need to change one line.\n\n```\n    NSUInteger rowIndex = [indexPath\
    \ row];\n    NSUInteger rowIndex = ([self isDynamicSection:sectionIndex]) ? 0\
    \ : [indexPath row];\n```\n\nWhile you’re here, add the following method declaration\
    \ to `HeroDetailConfiguration.h`:\n\n```\n- (NSString *)dynamicAttributeKeyForSection:(NSInteger)section;\n\
    ```\n\n(You’re cheating a little here because you know that this method will make\
    \ your life easier in a little bit.) The implementation in `HeroDetailConfiguration.m`\
    \ will look like this:\n\n```\n- (NSString *)dynamicAttributeKeyForSection:(NSInteger)section\n\
    {\n    if (![self isDynamicSection:section])\n        return nil;\n\n    NSIndexPath\
    \ *indexPath = [NSIndexPath indexPathForRow:0 inSection:section];\n    return\
    \ [self attributeKeyForIndexPath:indexPath];\n}\n```\n\nIf the section is not\
    \ dynamic, you’ll return `nil`. Otherwise, you create an index path and use the\
    \ existing functionality.\n\n## Adding Powers\n\nNow you can move on to updating\
    \ the `HeroDetailController` to use this new configuration setup. In `HeroDetailController.m`,\
    \ edit `tableView:numberOfRowsInSection:` like so:\n\n```\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    NSInteger rowCount\
    \ = [self.config numberOfRowsInSection:section];\n    if ([self.config isDynamicSection:section])\
    \ {\n        NSString *key = [self.config dynamicAttributeKeyForSection:section];\n\
    \        NSSet *attributeSet = [self.hero mutableSetValueForKey:key];\n      \
    \  rowCount = attributeSet.count;\n    }\n\n    return rowCount;\n}\n```\n\nYou\
    \ ask the `HeroDetailConfiguration` to tell you the number of rows in the section.\
    \ If the section is dynamic, you read the row configuration to determine what\
    \ property to use from your `Hero` entity. That property will be a Set, so you\
    \ need to convert it to an Array to get its size.\n\nWell, you still don’t have\
    \ any powers in your `Hero` entity. So you need a way to add new powers to your\
    \ `Hero`. Clearly, you should do that when you’re editing the `Hero`’s details.\
    \ If you run the app, navigate to the detail view and tap the Edit button, the\
    \ Powers section is still blank. Go back to the Address Book application: when\
    \ you need a new address, a cell appears with a green (+) button to add a new\
    \ address ([Figure 7-14](#9781430238072_Ch07.xhtml#Fig14)). You need to mimic\
    \ that behavior.\n\n![9781430238072_Fig07-14.jpg](images/9781430238072_Fig07-14.jpg)\n\
    \n[Figure 7-14.](#9781430238072_Ch07.xhtml#_Fig14)  Adding a new address in the\
    \ Address Book app\n\nOpen `HeroDetailController.m` and find the `tableView:numberOfRowsInSection:`\
    \ method you just modified. Change this line\n\n```\nrowCount = attributeSet.count;\n\
    ```\n\nto this\n\n```\nrowCount = (self.editing) ? attributeSet.count+1 : attributeSet.count;\n\
    ```\n\nHowever, this is not enough. You need to have the table view refresh when\
    \ you enter Edit mode. In `setEditing:animated:`, add this line\n\n```\n [self.tableView\
    \ reloadData];\n```\n\nafter the call to `super`.\n\nIf you run the app now and\
    \ edit your `Hero`’s details ([Figure 7-15](#9781430238072_Ch07.xhtml#Fig15)),\
    \ there are two issues. First, the new cell in the Powers section has a strange\
    \ value. Second, if you watch closely while entering and exiting Edit mode, the\
    \ transition no longer seems smooth. The cells seem to jump. Everything works\
    \ but it isn’t a good user experience.\n\n![9781430238072_Fig07-15.jpg](images/9781430238072_Fig07-15.jpg)\n\
    \n[Figure 7-15.](#9781430238072_Ch07.xhtml#_Fig15)  First step to adding new powers\n\
    \nLet’s take a look at fetched results controller delegate methods in the `HeroListController`.\
    \ When the updates begin, you call the `beginUpdates` method on the table view.\
    \ Then you insert or delete rows with `insertRowsAtIndexPath:withRowAnimation:`\
    \ and `deleteRowsAtIndexPath:withRowAnimation:`. Finally, when the updates are\
    \ complete, you call `endUpdates` on the table view. You need to do something\
    \ similar with the Powers section when entering and leaving Edit mode.\n\nIn the\
    \ private category at the top of `HeroDetailController.m`, add the new method\
    \ declaration\n\n```\n- (void)updateDynamicSections:(BOOL)editing;\n```\n\nand\
    \ call it from `setEditing:animated:`.\n\n```\n- (void)setEditing:(BOOL)editing\
    \ animated:(BOOL)animated\n{\n    [self.tableView beginUpdates];\n    [self updateDynamicSections:editing];\n\
    \    [super setEditing:editing animated:animated];\n    [self.tableView endUpdates];\n\
    \n    self.navigationItem.rightBarButtonItem = (editing) ? self.saveButton : self.editButtonItem;\n\
    \    self.navigationItem.leftBarButtonItem = (editing) ? self.cancelButton : self.backButton;\n\
    }\n```\n\nHere’s the implementation:\n\n```\n- (void)updateDynamicSections:(BOOL)editing\n\
    {\n    for (NSInteger section = 0; section < [self.config numberOfSections]; section++)\
    \ {\n        if ([self.config isDynamicSection:section]) {\n            NSIndexPath\
    \ *indexPath;\n            NSInteger row = [self tableView:self.tableView numberOfRowsInSection:section];\n\
    \            if (editing) {\n                indexPath = [NSIndexPath indexPathForRow:row\
    \ inSection:section];\n                [self.tableView insertRowsAtIndexPaths:@[indexPath]\n\
    \                                       withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \            }\n            else {\n                indexPath = [NSIndexPath indexPathForRow:row-1\
    \ inSection:section];\n                [self.tableView deleteRowsAtIndexPaths:@[indexPath]\n\
    \                                       withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    \            }\n        }\n    }\n}\n```\n\nNow the addition and removal of a\
    \ cell to Powers section when entering and exiting Edit mode looks much smoother.\n\
    \nWay back in [Chapter 4](#9781430238072_Ch04.xhtml) when you first wrote the\
    \ `HeroDetailController`, you implemented the table view delegate method of `tableView:editingStyleForRowAtIndexPath:`.\n"
  raw: 'Okay, now you’re ready to tackle the whole point of this refactoring. It’s
    time to set up the property list to handle the data-driven Powers section. We
    detailed two possible approaches earlier. You’re going to take the approach that
    has you add a dynamic Boolean item and keeps the row item as an array. For items
    where dynamic is YES, the row item array will have only one element. If there
    are more, you’re going to ignore them.


    Open HeroDetailConfiguration.plist, and navigate to Root ![image](images/arrow.jpg)
    sections ![image](images/arrow.jpg) Item 2\. If the disclosure triangle is closed,
    open it. Select the item named header, and add an two items after it. Name the
    first item **dynamic**, set its type to Boolean, and give it a value of YES. Name
    the second item **rows**, and set its type to Array. Add a dictionary to the rows
    Array and give the dictionary three items. Give the three Dictionary items the
    names of **key**, **class**, and **label**. Leave the type of all three items
    as String. Set the key value to powers; class to SuperDBCell. Leave the label
    value blank.


    Your property list editor should look something like [Figure 7-13](#9781430238072_Ch07.xhtml#Fig13).


    ![9781430238072_Fig07-13.jpg](images/9781430238072_Fig07-13.jpg)


    [Figure 7-13.](#9781430238072_Ch07.xhtml#_Fig13)  The Power section property list
    configuration


    Now you need the HeroDetailConfiguration to use this new dynamic item.


    First, you need to define a method to check if the section you are looking at
    is dynamic or not. Let’s add that method declaration to HeroDetailConfiguration.h.


    ```

    - (BOOL)isDynamicSection:(NSInteger)section;

    ```


    Let’s add the implementation to HeroDetailConfiguration.m.


    ```

    - (BOOL)isDynamicSection:(NSInteger)section

    {

        BOOL dynamic = NO;


    NSDictionary *sectionDict = [self.sections objectAtIndex:section];

        NSNumber *dynamicNumber = [sectionDict objectForKey:@"dynamic"];

        if (dynamicNumber != nil)

            dynamic = [dynamicNumber boolValue];


    return dynamic;

    }

    ```


    By default, you’ll assume that a section is not dynamic if there’s no dynamic
    entry in the configuration property list section.


    Now, you need to update the rowForIndexPath: method to handle dynamic sections.
    You just need to change one line.


    ```

        NSUInteger rowIndex = [indexPath row];

        NSUInteger rowIndex = ([self isDynamicSection:sectionIndex]) ? 0 : [indexPath
    row];

    ```


    While you’re here, add the following method declaration to HeroDetailConfiguration.h:


    ```

    - (NSString *)dynamicAttributeKeyForSection:(NSInteger)section;

    ```


    (You’re cheating a little here because you know that this method will make your
    life easier in a little bit.) The implementation in HeroDetailConfiguration.m
    will look like this:


    ```

    - (NSString *)dynamicAttributeKeyForSection:(NSInteger)section

    {

        if (![self isDynamicSection:section])

            return nil;


    NSIndexPath *indexPath = [NSIndexPath indexPathForRow:0 inSection:section];

        return [self attributeKeyForIndexPath:indexPath];

    }

    ```


    If the section is not dynamic, you’ll return nil. Otherwise, you create an index
    path and use the existing functionality.


    Adding Powers


    Now you can move on to updating the HeroDetailController to use this new configuration
    setup. In HeroDetailController.m, edit tableView:numberOfRowsInSection: like so:


    ```

    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    {

        NSInteger rowCount = [self.config numberOfRowsInSection:section];

        if ([self.config isDynamicSection:section]) {

            NSString *key = [self.config dynamicAttributeKeyForSection:section];

            NSSet *attributeSet = [self.hero mutableSetValueForKey:key];

            rowCount = attributeSet.count;

        }


    return rowCount;

    }

    ```


    You ask the HeroDetailConfiguration to tell you the number of rows in the section.
    If the section is dynamic, you read the row configuration to determine what property
    to use from your Hero entity. That property will be a Set, so you need to convert
    it to an Array to get its size.


    Well, you still don’t have any powers in your Hero entity. So you need a way to
    add new powers to your Hero. Clearly, you should do that when you’re editing the
    Hero’s details. If you run the app, navigate to the detail view and tap the Edit
    button, the Powers section is still blank. Go back to the Address Book application:
    when you need a new address, a cell appears with a green (+) button to add a new
    address ([Figure 7-14](#9781430238072_Ch07.xhtml#Fig14)). You need to mimic that
    behavior.


    ![9781430238072_Fig07-14.jpg](images/9781430238072_Fig07-14.jpg)


    [Figure 7-14.](#9781430238072_Ch07.xhtml#_Fig14)  Adding a new address in the
    Address Book app


    Open HeroDetailController.m and find the tableView:numberOfRowsInSection: method
    you just modified. Change this line


    ```

    rowCount = attributeSet.count;

    ```


    to this


    ```

    rowCount = (self.editing) ? attributeSet.count+1 : attributeSet.count;

    ```


    However, this is not enough. You need to have the table view refresh when you
    enter Edit mode. In setEditing:animated:, add this line


    ```

     [self.tableView reloadData];

    ```


    after the call to super.


    If you run the app now and edit your Hero’s details ([Figure 7-15](#9781430238072_Ch07.xhtml#Fig15)),
    there are two issues. First, the new cell in the Powers section has a strange
    value. Second, if you watch closely while entering and exiting Edit mode, the
    transition no longer seems smooth. The cells seem to jump. Everything works but
    it isn’t a good user experience.


    ![9781430238072_Fig07-15.jpg](images/9781430238072_Fig07-15.jpg)


    [Figure 7-15.](#9781430238072_Ch07.xhtml#_Fig15)  First step to adding new powers


    Let’s take a look at fetched results controller delegate methods in the HeroListController.
    When the updates begin, you call the beginUpdates method on the table view. Then
    you insert or delete rows with insertRowsAtIndexPath:withRowAnimation: and deleteRowsAtIndexPath:withRowAnimation:.
    Finally, when the updates are complete, you call endUpdates on the table view.
    You need to do something similar with the Powers section when entering and leaving
    Edit mode.


    In the private category at the top of HeroDetailController.m, add the new method
    declaration


    ```

    - (void)updateDynamicSections:(BOOL)editing;

    ```


    and call it from setEditing:animated:.


    ```

    - (void)setEditing:(BOOL)editing animated:(BOOL)animated

    {

        [self.tableView beginUpdates];

        [self updateDynamicSections:editing];

        [super setEditing:editing animated:animated];

        [self.tableView endUpdates];


    self.navigationItem.rightBarButtonItem = (editing) ? self.saveButton : self.editButtonItem;

        self.navigationItem.leftBarButtonItem = (editing) ? self.cancelButton : self.backButton;

    }

    ```


    Here’s the implementation:


    ```

    - (void)updateDynamicSections:(BOOL)editing

    {

        for (NSInteger section = 0; section < [self.config numberOfSections]; section++)
    {

            if ([self.config isDynamicSection:section]) {

                NSIndexPath *indexPath;

                NSInteger row = [self tableView:self.tableView numberOfRowsInSection:section];

                if (editing) {

                    indexPath = [NSIndexPath indexPathForRow:row inSection:section];

                    [self.tableView insertRowsAtIndexPaths:@[indexPath]                                      
    withRowAnimation:UITableViewRowAnimationAutomatic];

                }

                else {

                    indexPath = [NSIndexPath indexPathForRow:row-1 inSection:section];

                    [self.tableView deleteRowsAtIndexPaths:@[indexPath]                                      
    withRowAnimation:UITableViewRowAnimationAutomatic];

                }

            }

        }

    }

    ```


    Now the addition and removal of a cell to Powers section when entering and exiting
    Edit mode looks much smoother.


    Way back in [Chapter 4](#9781430238072_Ch04.xhtml) when you first wrote the HeroDetailController,
    you implemented the table view delegate method of tableView:editingStyleForRowAtIndexPath:.'
