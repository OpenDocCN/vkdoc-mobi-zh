    ## 设置默认值


    需要你子类化 `NSManagedObject` 的最常见的 Core Data 任务之一，是为属性设置条件默认值，或者为无法在数据模型中设置默认值的属性类型（例如可转换属性的默认值）设置默认值。


    `NSManagedObject` 的方法 `awakeFromInsert` 被设计为由子类重写，用于设置默认值。它是在新对象实例被插入到托管对象上下文之后、在任何代码有机会修改或使用该对象之前立即被调用。


    在你的例子中，你有一个名为 `favoriteColor` 的可转换属性，你想将其默认值设为白色。为此，在 `Hero.m` 中的 `@end` 声明之前添加以下方法：


    ```

    - (void)awakeFromInsert

    {

        self.favoriteColor = [UIColor colorWithRed:1.0 green:1.0 blue:1.0 alpha:1.0];

        [super awakeFromInsert];

    }

    ```


    注意在 `Hero.m` 中使用了 `@dynamic` 关键字。这告诉编译器不要为后面的属性生成访问器和修改器。这里的想法是，这些访问器和修改器将在运行时由父类提供。不必太担心具体细节，只需要知道为了让
    Core Data 正常工作，这种复杂性是必需的。


    **提示**  注意你没有使用 `[UIColor whiteColor]` 作为默认值。你使用 `colorWithRed:green:blue:alpha:`
    工厂方法的原因是因为它总是创建一个 RGBA 颜色。`UIColor` 支持几种不同的颜色模型。稍后，为了将 `UIColor` 保存到持久存储中，你将把它分解成单独的组件（红、绿、蓝和
    alpha 各一个）。你还将让用户通过操纵这些组件各自的滑块来选择新颜色。然而，`whiteColor` 方法不使用 RGBA 颜色空间创建颜色。相反，它使用灰度颜色模型创建颜色，该模型只使用两个分量（灰度和
    alpha）来表示颜色。


    非常简单。你只需创建一个新的 `UIColor` 实例并将其分配给 `favoriteColor`。`awakeFromInsert` 的另一个常见用法是将日期属性默认设置为当前日期。例如，你可以通过向
    `awakeFromInsert` 添加以下代码行来将 `birthdate` 属性默认设置为当前日期：


    ```

    self.birthdate = [NSDate date];

    ```


    ## 验证

    '
- fmt: "Core Data 提供两种在代码中进行属性验证的机制：一种用于单属性验证，另一种用于当验证依赖于多个属性值时使用。单属性验证相对简单直接。你可能想要确保日期有效、字段不为\
    \ `nil`，或者数字属性不为负数。多字段验证则稍微复杂一些。假设你有一个 `Person` 实体，它有一个名为 `legalGuardian` 的字符串属性，用于记录对未成年人负有法律责任并能够为其做出决定的人。你可能希望确保该属性已填充，但只针对未成年人，而非成年人。多属性验证允许你在\
    \ `person` 的年龄属性小于 18 岁时将该属性设为必填，否则不必。\n\n### 单属性验证\n\n`NSManagedObject` 提供了一个用于验证单个属性的方法，名为\
    \ `validateValue:forKey:error:`。该方法接收一个值、一个键和一个 `NSError` 句柄。你可以重写该方法，并根据值是否有效返回\
    \ `YES` 或 `NO` 来执行验证。如果验证未通过，你还可以创建一个 `NSError` 实例来保存关于无效内容和原因的特定信息。你可以这样做，但不要这样做。事实上，Apple\
    \ 明确说明你*不应该*这样做。你实际上永远不需要重写此方法，因为默认实现使用了一种非常巧妙的机制，可以将错误处理动态分派给类中未定义的特定验证方法。\n\n\
    例如，假设你有一个名为 `birthdate` 的字段。在验证期间，`NSManagedObject` 会自动在你的子类中查找一个名为 `validateBirthdate:error:`\
    \ 的方法。它会对每个属性都执行此操作，因此，如果你想验证单个属性，你所要做的就是声明一个遵循 `validateXXX:error:` 命名约定的方法（其中\
    \ `XXX` 是要验证的属性的名称），返回一个指示新值是否通过验证的 `BOOL`。\n\n让我们使用此机制来阻止用户输入未来的出生日期。在 `Hero.m`\
    \ 中的 `@end` 声明之上，添加以下方法：\n\n```\n- (BOOL)validateBirthdate:(id *)ioValue error:(NSError\
    \ **)outError\n{\n    NSDate *date = *ioValue;\n    if ([date compare:[NSDate\
    \ date]] == NSOrderedDescending) {\n        if (outError != NULL) {\n        \
    \    NSString *errorStr = NSLocalizedString(@\"Birthdate cannot be in the future\"\
    ,\n                                                   @\"Birthdate cannot be in\
    \ the future\");\n            NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \                                                                     forKey:NSLocalizedDescriptionKey];\n\
    \            NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
    \                                                        code:kHeroValidationBirthdateCode\n\
    \                                                    userInfo:userInfoDict];\n\
    \            *outError = error;\n        }\n        return NO;\n    }\n    return\
    \ YES;\n}\n```\n\n**提示** 你是否想知道为什么要传递指向 `NSError` 指针的指针，而不仅仅是指针？指针的指针允许通过引用传递指针。在\
    \ Objective-C 方法中，参数（包括对象指针）是按值传递的，这意味着被调用的方法会获得传入指针的自己的副本。因此，如果被调用的方法想要更改指针（而不是指针指向的数据），则需要另一层间接引用。因此，需要指针的指针。\n\
    \n从前面的方法可以看出，如果日期在未来，则返回 `NO`；如果日期在过去，则返回 `YES`。如果返回 `NO`，你还需要采取一些额外步骤。你创建一个字典，并在键\
    \ `NSLocalizedDescriptionKey` 下存储一个错误字符串，`NSLocalizedDescriptionKey` 是一个为此目的而存在的系统常量。然后，你创建一个新的\
    \ `NSError` 实例，并将新创建的字典作为 `NSError` 的 `userInfo` 字典传递。这是在验证方法以及几乎所有其他接受 `NSError`\
    \ 句柄作为参数的方法中返回信息的标准方式。\n\n请注意，在创建 `NSError` 实例时，你使用了之前定义的两个常量：`kHeroValidationDomain`\
    \ 和 `kHeroValidationBirthdateCode`：\n\n```\nNSError *error = [[NSError alloc]\
    \ initWithDomain:kHeroValidationDomain\n                                     \
    \       code:kHeroValidationBirthdateCode\n                                  \
    \      userInfo:userInfoDict];\n```\n\n**提示** 请注意，在单属性验证方法中，你没有调用 `super`。这并不是因为这些方法被定义为抽象方法，而是因为它们根本不存在。这些方法是在运行时动态创建的，因此不仅调用\
    \ `super` 没有意义，而且实际上 `super` 上也没有方法可以调用。\n\n每个 `NSError` 都需要一个错误域和一个错误代码。错误代码是唯一标识特定错误类型的整数。错误域定义了生成错误的应用程序或框架。例如，有一个名为\
    \ `NSCocoaErrorDomain` 的错误域，用于标识 Apple 的 Cocoa 框架中的代码所创建的错误。你为自己的应用程序定义了自己的错误域，使用了反向\
    \ DNS 样式的字符串，并将其分配给常量 `kHeroValidationDomain`。你将使用该域来处理因验证 `Hero` 对象而创建的任何错误。你也可以选择为整个\
    \ `SuperDB` 应用程序创建一个单一域，但通过更具体地定义域，你的应用程序将更易于调试。\n\n通过创建自己的错误域，你可以根据需要尽可能具体。同时，你也避免了在长长的系统定义常量列表中搜索，以寻找恰好覆盖特定错误的代码的问题。`kHeroValidationBirthdateCode`\
    \ 是你在此域中创建的第一个代码，其值 1000 是任意的；为这个错误代码选择 0、1、10000 或 34848 也完全有效。这是你的域，你可以做你想做的事。\n\
    \n### `nil` 与 `NULL`\n\n在你的验证方法中，你可能已经注意到，你将 `outError` 与 `NULL` 进行比较，以确定是否提供了有效的指针，而不是像通常那样与\
    \ `nil` 进行比较。`nil` 和 `NULL` 都服务于相同的目的（表示空指针），并且事实上，它们被定义为相同的东西：数字零。就代码功能而言，`nil`\
    \ 和 `NULL` 是 100% 可互换的。\n\n尽管如此，你应该努力在正确的时间使用正确的那个。你使用的那个将为你未来的自己以及任何其他处理你代码的开发者提供线索，表明你在做什么。\n\
    \n当你检查一个 Objective-C 对象指针时，请与 `nil` 比较。对于任何其他 C 指针，请使用 `NULL`。在这种情况下，你处理的是一个指向指针的指针，因此你使用\
    \ `NULL`。如果一个指针不直接引用一个 Objective-C 对象，那么 `NULL` 是合适的比较值，即使该指针引用的指针指向一个对象。\n\n\
    ### 多属性验证\n\n当你需要基于多个字段的值来验证一个托管对象时，方法略有不同。在所有单字段验证方法触发之后，会调用另一个方法来让你执行更复杂的验证。实际上有两个这样的方法：一个在对象首次插入上下文时调用，另一个在你保存对现有托管对象的更改时调用。"
  raw: 'Core Data offers two mechanisms for doing attribute validation in code, one
    that’s intended to be used for single-attribute validations and one that’s intended
    to be used when a validation depends on the value of more than one attribute.
    Single attribute validations are relatively straightforward. You might want to
    make sure that a date is valid, a field is not nil, or that a number attribute
    is not negative. Multi-field validations are a little more complex. Let’s say
    that you have a Person entity, and it has a string attribute called legalGuardian
    where you keep track of the person who is legally responsible and able to make
    decisions for a person if they are a minor. You might want to make sure this attribute
    is populated, but you only want to do that for minors, not for adults. Multi-attribute
    validation will let you make the attribute required if the person’s age attribute
    is less than 18, but not otherwise.


    Single-Attribute Validations


    NSManagedObject provides a method for validating single attributes called validateValue:forKey:error:.
    This method takes a value, key, and an NSError handle. You could override this
    method and perform validation by returning YES or NO based on whether the value
    is valid. If it doesn’t pass, you would also be able to create an NSError instance
    to hold specific information about what is not valid and why. You could do that.
    But don’t. As a matter of fact, Apple specifically states you *shouldn’t* do this.
    You never actually need to override this method because the default implementation
    uses a very cool mechanism to dynamically dispatch error handling to special validation
    methods that aren’t defined in the class.


    For example, let’s say you have a field called birthdate. NSManagedObject will,
    during validation, automatically look for a method on your subclass called validateBirthdate:error:.
    It will do this for every attribute, so if you want to validate a single attribute,
    all you have to do is declare a method that follows the naming convention of validateXXX:error:
    (where XXX is the name of the attribute to be validated), returning a BOOL that
    indicates whether the new value passed validation.


    Let’s use this mechanism to prevent the user from entering birthdates that occur
    in the future. Above the @end declaration in Hero.m, add the following method:


    ```

    - (BOOL)validateBirthdate:(id *)ioValue error:(NSError **)outError

    {

        NSDate *date = *ioValue;

        if ([date compare:[NSDate date]] == NSOrderedDescending) {

            if (outError != NULL) {

                NSString *errorStr = NSLocalizedString(@"Birthdate cannot be in the
    future",

                                                       @"Birthdate cannot be in the
    future");

                NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr

                                                                         forKey:NSLocalizedDescriptionKey];

                NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain

                                                            code:kHeroValidationBirthdateCode

                                                        userInfo:userInfoDict];

                *outError = error;

            }

            return NO;

        }

        return YES;

    }

    ```


    **Tip**  Are you wondering why you’re passing a pointer to a pointer to an NSError
    rather than just a pointer? Pointers to pointers allow a pointer to be passed
    by reference. In Objective-C methods, arguments, including object pointers, are
    passed by value, which means that the called method gets its own copy of the pointer
    that was passed in. So if the called method wants to change the pointer, as opposed
    to the data the pointer points to, you need another level of indirection. Thus,
    the pointer to the pointer.


    As you can see from the preceding method, you return NO if the date is in the
    future and YES if the date is in the past. If you return NO, you also take some
    additional steps. You create a dictionary and store an error string under the
    key NSLocalizedDescriptionKey, which is a system constant that exists for this
    purpose. You then create a new instance of NSError and pass that newly created
    dictionary as the NSError’s userInfo dictionary. This is the standard way to pass
    back information in validation methods and pretty much every other method that
    takes a handle to an NSError as an argument.


    Notice that when you create the NSError instance, you use the two constants you
    defined earlier, kHeroValidationDomain and kHeroValidationBirthdateCode:


    ```

    NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain

                                                code:kHeroValidationBirthdateCode

                                            userInfo:userInfoDict];

    ```


    **Tip**  Notice that you don’t call super in the single-attribute validation methods.
    It’s not that these methods are defined as abstract, it’s that they simply don’t
    exist. These methods are created dynamically at runtime, so not only is there
    no point in calling super, there’s actually no method on super to call.


    Every NSError requires an error domain and an error code. Error codes are integers
    that uniquely identify a specific type of error. An error domain defines the application
    or framework that generated the error. For example, there’s an error domain called
    NSCocoaErrorDomain that identifies errors created by code in Apple’s Cocoa frameworks.
    You defined your own error domain for your application using a reverse DNS-style
    string and assigned that to the constant kHeroValidationDomain. You’ll use that
    domain for any error created as a result of validating the Hero object. You could
    also have chosen to create a single domain for the entire SuperDB application,
    but by being more specific, your application will be easier to debug.


    By creating your own error domains, you can be as specific as you want to be.
    You also avoid the problem of searching through long lists of system-defined constants,
    looking for just the right code that covers a specific error. kHeroValidationBirthdateCode
    is the first code you’ve created in your domain, and the value of 1000 is arbitrary;
    it would have been perfectly valid to choose 0, 1, 10000, or 34848 for this error
    code. It’s your domain; you can do what you want.


    nil vs. NULL


    In your validation methods, you may have noticed that you’re comparing outError
    to NULL to see if you’ve been provided a valid pointer, rather than comparing
    to nil as you typically do. Both nil and NULL serve the same purpose (to represent
    empty pointers) and, in fact, they are defined to the same thing: the number zero.
    In terms of your code functioning, nil and NULL are 100% interchangeable.


    That being said, you should endeavor to use the right one at the right time. The
    one you use will be a clue to your future self, as well as any other developers
    who work with your code, as to what you are doing.


    When you are checking an Objective-C object pointer, compare to nil. With any
    other C pointers, use NULL. In this case, you’re dealing with a pointer to a pointer,
    so you use NULL. If a pointer doesn’t directly reference an Objective-C object,
    NULL is the appropriate comparison value, even if the pointer it references points
    to an object.


    Multiple-Attribute Validations


    When you need to validate a managed object based on the values of multiple fields,
    the approach is a little different. After all the single-field validation methods
    have fired, another method will be called to let you do more complex validations.
    There are actually two such methods, one that is called when an object is first
    inserted into the context, and another when you save changes to an existing managed
    object.'
  trans: "\nCore Data 提供两种在代码中进行属性验证的机制：一种用于单属性验证，另一种用于当验证依赖于多个属性值时使用。单属性验证相对简单直接。你可能想要确保日期有效、字段不为\
    \ `nil`，或者数字属性不为负数。多字段验证则稍微复杂一些。假设你有一个 `Person` 实体，它有一个名为 `legalGuardian` 的字符串属性，用于记录对未成年人负有法律责任并能够为其做出决定的人。你可能希望确保该属性已填充，但只针对未成年人，而非成年人。多属性验证允许你在\
    \ `person` 的年龄属性小于 18 岁时将该属性设为必填，否则不必。\n\n### 单属性验证\n\n`NSManagedObject` 提供了一个用于验证单个属性的方法，名为\
    \ `validateValue:forKey:error:`。该方法接收一个值、一个键和一个 `NSError` 句柄。你可以重写该方法，并根据值是否有效返回\
    \ `YES` 或 `NO` 来执行验证。如果验证未通过，你还可以创建一个 `NSError` 实例来保存关于无效内容和原因的特定信息。你可以这样做，但不要这样做。事实上，Apple\
    \ 明确说明你*不应该*这样做。你实际上永远不需要重写此方法，因为默认实现使用了一种非常巧妙的机制，可以将错误处理动态分派给类中未定义的特定验证方法。\n\n\
    例如，假设你有一个名为 `birthdate` 的字段。在验证期间，`NSManagedObject` 会自动在你的子类中查找一个名为 `validateBirthdate:error:`\
    \ 的方法。它会对每个属性都执行此操作，因此，如果你想验证单个属性，你所要做的就是声明一个遵循 `validateXXX:error:` 命名约定的方法（其中\
    \ `XXX` 是要验证的属性的名称），返回一个指示新值是否通过验证的 `BOOL`。\n\n让我们使用此机制来阻止用户输入未来的出生日期。在 `Hero.m`\
    \ 中的 `@end` 声明之上，添加以下方法：\n\n```\n- (BOOL)validateBirthdate:(id *)ioValue error:(NSError\
    \ **)outError\n{\n    NSDate *date = *ioValue;\n    if ([date compare:[NSDate\
    \ date]] == NSOrderedDescending) {\n        if (outError != NULL) {\n        \
    \    NSString *errorStr = NSLocalizedString(@\"Birthdate cannot be in the future\"\
    ,\n                                                   @\"Birthdate cannot be in\
    \ the future\");\n            NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
    \                                                                     forKey:NSLocalizedDescriptionKey];\n\
    \            NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
    \                                                        code:kHeroValidationBirthdateCode\n\
    \                                                    userInfo:userInfoDict];\n\
    \            *outError = error;\n        }\n        return NO;\n    }\n    return\
    \ YES;\n}\n```\n\n**提示** 你是否想知道为什么要传递指向 `NSError` 指针的指针，而不仅仅是指针？指针的指针允许通过引用传递指针。在\
    \ Objective-C 方法中，参数（包括对象指针）是按值传递的，这意味着被调用的方法会获得传入指针的自己的副本。因此，如果被调用的方法想要更改指针（而不是指针指向的数据），则需要另一层间接引用。因此，需要指针的指针。\n\
