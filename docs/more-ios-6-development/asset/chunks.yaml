    \ (![session acceptConnectionFromPeer:peerID error:&error]) {\n            //\
    \ Handle error\n        }\n    }\n    else {\n        [session denyConnectionFromPeer:peerID];\n\
        }\n}\n```\n\nSending Data to a Peer\n\nOnce you have a session that is connected\
    \ to another node, it’s very easy to send data to that node. All you need to do\
    \ is call one of two methods. Which method you call depends on whether you want\
    \ to send the information to all connected sessions or to just specific ones.\
    \ To send data to just specified peers, use the method sendData:toPeers:withDataMode:error:.\
    \ To send data to every connected peer, use the method sendDataToAllPeers:withDataMode:error:.\n\
    \nIn both cases, you need to specify a *data mode* for the connection. The data\
    \ mode tells the session how it should try to send the data. There are two options:\n\
    \n*   GKSendDataReliable: This option ensures that the information will arrive\
    \ at the other session. It will send the data in chunks if it’s over a certain\
    \ size and wait for an acknowledgment from the other peer for every chunk.\n*\
    \   GKSendDataUnreliable: This mode sends the data immediately and does not wait\
    \ for acknowledgment. It’s much faster than GKSendDataReliable, but there is a\
    \ small chance of the complete message not arriving at the other node.\n\nUsually,\
    \ the GKSendDataReliable data mode is the one you’ll want to use, though if you\
    \ have a program where speed of transmission matters more than accuracy, then\
    \ you should consider GKSendDataUnreliable.\n\nHere is what it looks like when\
    \ you send data to a single peer:\n\n```\nNSError *error = nil;\nif (![session\
    \ sendData:theData \n                toPeers:[NSArray arrayWithObject:thePeerID]\
    \ \n          withDataMode:GKSendDataReliable error:&error]) {\n        // Do\
    \ error handling\n} \n```\n\nAnd here’s what it looks like to send data to all\
    \ connected peers:\n\n```\nNSError *error = nil;\nif (![session sendDataToAllPeers:data\
    \ \n                  withDataMode:GKSendDataReliable \n           error:&error])\
    \ {\n        // Do error handling\n}\n```\n\nPackaging Up Information to Send\n\
    \nAny information that you can get into an instance of NSData can be sent to other\
    \ peers. There are two basic approaches to doing this for use in Game Kit. The\
    \ first is to use archiving and unarchiving, just as we did in the archiving section\
    \ of [Chapter 11](#9781430238072_Ch11.xhtml) of *Beginning iOS 6 Development*\
    \ (Apress, 2012).\n\nWith the archiving/unarchiving method, you define a class\
    \ to hold a single packet of data to be sent. That class will contain instance\
    \ variables to hold whatever types of data you might need to send. When it’s time\
    \ to send a packet, you create and initialize an instance of the packet object,\
    \ and then you use NSKeyedArchiver to archive the instance of that object into\
    \ an instance of NSData, which can be passed to sendData:toPeers:withDataMode:error:\
    \ or to sendDataToAllPeers:withDataMode:error:. You’ll use this approach in this\
    \ chapter’s example. However, this approach incurs a small amount of overhead,\
    \ since it requires the creation of objects to be passed, along with archiving\
    \ and unarchiving those objects.\n\nAlthough archiving objects is the best approach\
    \ in many cases, because it is easy to implement and it fits well with the design\
    \ of Cocoa Touch, there may be some cases where applications need to constantly\
    \ send a lot of data to their peers, and this overhead might be unacceptable.\
    \ In those situations, a faster option is to just use a static array (a regular\
    \ old C array, not an NSArray) as a local variable in the method that sends the\
    \ data.\n\nYou can copy any data you need to send to the peer into this static\
    \ array, and then create an NSData instance from that static array. There’s still\
    \ some object creation involved in creating the NSData instance, but it’s one\
    \ object instead of two, and you don’t have the overhead of archiving.  Here’s\
    \ a simple example of sending data using this faster technique:\n\n```\nNSUInteger\
    \ packetData[2];\npacket[0] = foo;\npacket[1] = bar;\nNSData *packet = [NSData\
    \ dataWithBytes:packetData length:2 * sizeof(packetData)];\nNSError *error = nil;\n\
    if (![session sendDataToAllPeers:packet withDataMode:GKSendDataReliable error:&error])\
    \ {\n    // Handle error\n}\n```\n\nReceiving Data from a Peer\n\nWhen a session\
    \ receives data from a peer, the session passes the data to a method on an object\
    \ known as a *data receive handler*. The method is receiveData:fromPeer:inSession:context:.\
    \ By default, the data receive handler is the session’s delegate, but it doesn’t\
    \ have to be. You can specify another object to handle the task by calling setDataReceiveHandler:withContext:\
    \ on the session and passing in the object you want to receive data from the session.\n\
    \nWhichever object is specified as the data receive handler must implement receiveData:fromPeer:inSession:context:\
    \ and that method will be called any time new data comes in from a peer. There’s\
    \ no need to acknowledge receipt of the data or worry about waiting for the entire\
    \ packet. You can just use the provided data as is appropriate for your program.\
    \ All the gnarly aspects of network data transmission are handled for you. Every\
    \ call to sendDataToAllPeers:withDataMode:error: made by other peers, and every\
    \ call to sendData:toPeers:withDataMode:error: made by other peers who specify\
    \ your peer identifier, will result in one call of the data receive handler.\n\
    \nHere’s an example of a data receive handler method that would be the counterpart\
    \ to the earlier send example:\n\n```\n- (void)receiveData:(NSData *)data \n          \
    \ fromPeer:(NSString *)peer \n           inSession: (GKSession *)theSession \n\
                 context:(void *)context \n{\n    NSUInteger *packet = [data bytes];\n\
        NSUInteger foo = packet[0];\n    NSUInteger bar = packet[0];\n    // Do something\
    \ with foo and bar\n}\n```\n\nYou’ll look at receiving archived objects when you\
    \ build this chapter’s example.\n\nClosing Connections\n\nWhen you’re finished\
    \ with a session, before you release the session object, it’s important to do\
    \ a little cleanup. Before releasing the session object, you must make the session\
    \ unavailable, disconnect it from all of its peers, set the data receive handler\
    \ to nil, and set the session delegate to nil. Here’s what the code in your dealloc\
    \ method (or any other time your need to close the connections) might look like:\n\
    \n```\nsession.available = NO;\n[session disconnectFromAllPeers];\n[session setDataReceiveHandler:\
    \ nil withContext: nil];\nsession.delegate = nil;\n```\n\nIf, instead, you just\
    \ want to disconnect from one specific peer, you can call disconnectPeerFromAllPeers:,\
    \ which will disconnect the remote peer from all the peers to which it was connected.\
    \ Use this method with caution, as it will cause the peer on which it was called\
    \ to disconnect from all remote peers, not just your application. Here’s what\
    \ using it might look like:\n\n```\n[session disconnectPeerFromAllPeers:thePeer];\n\
    ```\n\nThe Peer Picker\n\nAlthough Game Kit does not need to be used only for\
    \ games, network games are clearly the primary motivator behind the technology—at\
    \ least if the name Apple chose is any clue. The most common type of network model\
    \ for mobile games is the head-to-head or simple peer-to-peer model, where one\
    \ player plays a game against one other player. Because this scenario is so common,\
    \ Apple has provided a mechanism called the *peer picker* for easily setting up\
    \ this simple type of peer-to-peer network.\n\nCreating the Peer Picker"
  trans: "```objc\n- (void)session:(GKSession *)session didReceiveConnectionRequestFromPeer:(NSString\
    \ *)peerID \n{\n    if (amAcceptingConnections) {\n        NSError *error;\n \
    \       if (![session acceptConnectionFromPeer:peerID error:&error]) {\n     \
    \       // 处理错误\n        }\n    }\n    else {\n        [session denyConnectionFromPeer:peerID];\n\
    \    }\n}\n```\n\n## 向对等节点发送数据\n\n一旦你建立了连接到另一个节点的会话，向该节点发送数据就变得非常简单。你只需调用两个方法之一即可。具体调用哪个方法取决于你是想向所有已连接的会话发送信息，还是仅向特定会话发送。如果仅向指定对等节点发送数据，请使用\
    \ `sendData:toPeers:withDataMode:error:` 方法。如果要向所有已连接的对等节点发送数据，请使用 `sendDataToAllPeers:withDataMode:error:`\
    \ 方法。\n\n在这两种情况下，都需要为连接指定一种*数据模式*。数据模式告知会话应如何尝试发送数据。有两种选项：\n\n- `GKSendDataReliable`：此选项确保信息能够到达其他会话。如果数据超过一定大小，它会分块发送，并等待每个块的其他对等节点确认。\n\
    - `GKSendDataUnreliable`：此模式立即发送数据，不等待确认。它比 `GKSendDataReliable` 快得多，但存在完整消息无法到达其他节点的微小可能性。\n\
    \n通常，`GKSendDataReliable` 数据模式会是你的首选，但如果你有一个程序更注重传输速度而非准确性，那么应考虑使用 `GKSendDataUnreliable`。\n\
    \n以下是向单个对等节点发送数据时的代码示例：\n\n```objc\nNSError *error = nil;\nif (![session sendData:theData\
    \ \n                toPeers:[NSArray arrayWithObject:thePeerID] \n          withDataMode:GKSendDataReliable\
    \ error:&error]) {\n        // 进行错误处理\n} \n```\n\n以下是向所有已连接对等节点发送数据时的代码示例：\n\n\
    ```objc\nNSError *error = nil;\nif (![session sendDataToAllPeers:data \n     \
    \             withDataMode:GKSendDataReliable \n           error:&error]) {\n\
    \        // 进行错误处理\n}\n```\n\n## 打包待发送的信息\n\n任何你能放入 `NSData` 实例中的信息都可以发送给其他对等节点。在\
    \ Game Kit 中使用此功能有两种基本方法。第一种是使用归档和解档，就像我们在 *Beginning iOS 6 Development* (Apress,\
    \ 2012) 的第 11 章归档部分所做的那样。\n\n使用归档/解档方法时，你需要定义一个类来保存要发送的单个数据包。该类将包含实例变量，用于保存你可能需要发送的任何类型的数据。当需要发送数据包时，你创建并初始化一个数据包对象的实例，然后使用\
    \ `NSKeyedArchiver` 将该对象的实例归档到 `NSData` 实例中，该实例可以传递给 `sendData:toPeers:withDataMode:error:`\
    \ 或 `sendDataToAllPeers:withDataMode:error:`。你将在本章的示例中使用这种方法。然而，这种方法会产生少量开销，因为它需要创建要传递的对象，以及对这些对象进行归档和解档。\n\
    \n尽管在许多情况下归档对象是最佳方法，因为它易于实现且与 Cocoa Touch 的设计很好地契合，但有时应用程序可能需要不断向其同伴发送大量数据，这种开销可能无法接受。在这些情况下，更快的选择是使用静态数组（普通的旧\
    \ C 数组，而非 `NSArray`）作为发送数据的方法中的局部变量。\n\n你可以将任何需要发送给对等节点的数据复制到该静态数组中，然后从该静态数组创建一个\
    \ `NSData` 实例。创建 `NSData` 实例仍然涉及一些对象创建，但只需创建一个对象而不是两个，而且没有归档的开销。以下是使用这种更快技术发送数据的简单示例：\n\
    \n```objc\nNSUInteger packetData[2];\npacket[0] = foo;\npacket[1] = bar;\nNSData\
    \ *packet = [NSData dataWithBytes:packetData length:2 * sizeof(packetData)];\n\
    NSError *error = nil;\nif (![session sendDataToAllPeers:packet withDataMode:GKSendDataReliable\
    \ error:&error]) {\n    // 处理错误\n}\n```\n\n## 从对等节点接收数据\n\n当会话从对等节点接收数据时，会话会将数据传递给一个称为*数据接收处理程序*的对象上的方法。该方法是\
    \ `receiveData:fromPeer:inSession:context:`。默认情况下，数据接收处理程序是会话的委托，但并非必须如此。你可以通过调用会话的\
    \ `setDataReceiveHandler:withContext:` 并传入你希望从会话接收数据的对象，来指定另一个对象处理此任务。\n\n无论哪个对象被指定为数据接收处理程序，它都必须实现\
    \ `receiveData:fromPeer:inSession:context:`，并且每当从对等节点接收到新数据时，都会调用该方法。无需确认数据已接收，也无需担心等待整个数据包。你可以根据程序的需要直接使用提供的数据。所有网络数据传输的棘手方面都已为你处理。其他对等节点每次调用\
    \ `sendDataToAllPeers:withDataMode:error:`，以及其他指定了你的对等节点标识符的对等节点每次调用 `sendData:toPeers:withDataMode:error:`，都会导致数据接收处理程序被调用一次。\n\
    \n以下是一个数据接收处理程序方法的示例，该方法是前面发送示例的对应部分：\n\n```objc\n- (void)receiveData:(NSData\
    \ *)data \n           fromPeer:(NSString *)peer \n           inSession: (GKSession\
    \ *)theSession \n             context:(void *)context \n{\n    NSUInteger *packet\
    \ = [data bytes];\n    NSUInteger foo = packet[0];\n    NSUInteger bar = packet[0];\n\
    \    // 使用 foo 和 bar 执行某些操作\n}\n```\n\n在构建本章示例时，你将研究如何接收归档对象。\n\n## 关闭连接\n\n当你完成会话后，在释放会话对象之前，进行一些清理工作很重要。在释放会话对象之前，必须将会话设置为不可用，断开与所有对等节点的连接，将数据接收处理程序设置为\
    \ `nil`，并将会话委托设置为 `nil`。以下是你 `dealloc` 方法中的代码（或在任何其他需要关闭连接时）可能的样子：\n\n```objc\n\
    session.available = NO;\n[session disconnectFromAllPeers];\n[session setDataReceiveHandler:\
    \ nil withContext: nil];\nsession.delegate = nil;\n```\n\n相反，如果你只想断开与特定对等节点的连接，可以调用\
    \ `disconnectPeerFromAllPeers:`，这将断开远程对等节点与其所连接的所有对等节点的连接。请谨慎使用此方法，因为它会导致被调用的对等节点断开与所有远程对等节点的连接，而不仅仅是你的应用程序。以下是使用它的示例：\n\
    \n```objc\n[session disconnectPeerFromAllPeers:thePeer];\n```\n\n## 对等选择器\n\n\
    尽管 Game Kit 并非只能用于游戏，但网络游戏显然是该技术背后的主要驱动力——至少从苹果选择的名称来看确实如此。移动游戏中最常见的网络模型是直接对抗或简单的点对点模型，即一名玩家与另一名玩家对战。由于这种场景非常常见，苹果提供了一种称为*对等选择器*的机制，用于轻松设置这种简单类型的点对点网络。\n\
    \n### 创建对等选择器"
- fmt: "\nThe peer picker was designed specifically to connect one device to a single\
    \ other device using Bluetooth. Though limited in this way, the peer picker is\
    \ incredibly simple to use and is a great choice if it meets your needs. To create\
    \ and show the peer picker, you just create an instance of `GKPeerPickerController`,\
    \ set its delegate, and then call its `show` method, like so:\n\n```\nGKPeerPickerController\
    \ *picker; \npicker = [[GKPeerPickerController alloc] init]; \npicker.delegate\
    \ = self;\n[picker show];\n```\n\n## Handling a Peer Connection\n\nWhen the user\
    \ has selected a peer and the sessions have been connected to each other, the\
    \ delegate method `peerPickerController:didConnectPeer:toSession:` will be called.\
    \ In your implementation of that method, you need to do a few things. First, you\
    \ might want to store the *peer identifier*, which is a string that identifies\
    \ the device to which you’re connected. The peer identifier defaults to the iPhone’s\
    \ device name, though you can specify other values. You also need to save a reference\
    \ to the session so you can use it to send data and to disconnect the session\
    \ later.\n\n```\n- (void)peerPickerController:(GKPeerPickerController *)picker\n\
    \                 didConnectPeer:(NSString *)thePeerID\n                     \
    \     toSession:(GKSession *)theSession\n{\n    self.peerID = thePeerID;\n   \
    \ self.session = theSession;\n    self.session.delegate = self;\n    [self.session\
    \ setDataReceiveHandler:self withContext:NULL];\n    [picker dismiss];\n    picker.delegate\
    \ = nil;\n}\n```\n\n## Creating the Session\n\nThere’s one last delegate task\
    \ that you must handle when using the peer picker, which is to create the session\
    \ when the picker asks for a session. You don’t need to worry about most of the\
    \ other tasks related to finding and connecting to other peers when using the\
    \ peer picker, but you are responsible for creating the session for the picker\
    \ to use. Here’s what that method typically looks like:\n\n```\n- (GKSession *)peerPickerController:(GKPeerPickerController\
    \ *)picker\n            sessionForConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n    GKSession *theSession;\n    theSession = [[GKSession alloc] initWithSessionID:@\"\
    a session id\"\n                                          displayName:nil\n  \
    \                                        sessionMode:GKSessionModePeer];\n   \
    \ return theSession;\n}\n```\n\n`GKPeerPickerConnectionType` can be one of two\
    \ types: `GKPeerPickerConnectionOnline` (network/Internet) and `GKPeerPickerConnectionNearby`\
    \ (Bluetooth). You can configure the allowable types by using the `connectionTypesMask`\
    \ property on your `GKPeerPickerController` instance. By default, it assumes only\
    \ a Bluetooth connection.\n\nWe’ve already talked about the session, so there\
    \ shouldn’t be anything in this method that’s confusing.\n\n**Note:** There’s\
    \ actually another peer picker delegate method that you need to implement if you\
    \ want to support online play over the WiFi with the peer picker: `peerPickerController:didSelectConnectionType:`.\
    \ Check the Apple documentation or *Beginning iOS Game Center and Game Kit*.\n\
    \nWell, that’s enough discussion. Let’s start building the application.\n\n##\
    \ Creating the Project\n\nOkay, you know the drill. Fire up Xcode if it’s not\
    \ already open and create a new project. Use the Single View Application template\
    \ and call the project **TicTacToe**. You’re not going to use storyboards, so\
    \ only the “Use Automatic Reference Counting” box should be checked. Once the\
    \ project is open, look in the project archives that accompany this book, in the\
    \ folder `09 – TicTacToe`. Find the image files called `wood_button.png`, `board.png`,\
    \ `O.png`, and `X.png`, and copy them into the Supporting Files group of your\
    \ project. There’s also an icon file called `icon.png`, which you can copy into\
    \ your project if you want to use it.\n\n## Turning Off the Idle Timer\n\nThe\
    \ first thing you want to do is to turn off the *idle timer*. The idle timer is\
    \ what tells your iPhone to go to sleep if the user has not interacted with it\
    \ in a while. Because the user won’t be tapping the screen during the opponent’s\
    \ turn, you need to turn this off to prevent the phone from going to sleep if\
    \ the other user takes a while to make a move. Generally speaking, you don’t want\
    \ networked applications to go to sleep, because sleeping breaks the network connection.\
    \ Most of the time, with networked iPhone games, disabling the idle timer is the\
    \ best approach.\n\nExpand the TicTacToe group in the Navigator pane in Xcode\
    \ and single-click `AppDelegate.m`. Add the following line of code to `applicationDidFinishLaunchingWithOptions:`,\
    \ before the method returns, to disable the idle timer.\n\n```\n[[UIApplication\
    \ sharedApplication] setIdleTimerDisabled:YES];\n```\n\n**Note:** There may be\
    \ rare times when you want to leave the idle timer functioning and just close\
    \ your sessions when the app goes to sleep, but closing sessions on sleep is not\
    \ quite as straightforward as it would seem. The application delegate method `applicationWillResignActive:`\
    \ is called before the phone goes to sleep, but unfortunately, it’s also called\
    \ at other times. In fact, it’s called any time that your application loses the\
    \ ability to respond to touch events. That makes it close to impossible to differentiate\
    \ between when the user has been presented a system alert, such as from a push\
    \ notification or a low-battery warning (which won’t result in broken connections),\
    \ and when the phone is actually going to sleep. So, until Apple provides a way\
    \ to differentiate between these scenarios, your best bet is to simply disallow\
    \ sleep while a networked program is running.\n\n## Importing the Game Kit Framework\n\
    \nGame Kit is not one of the frameworks that is automatically linked by the Xcode\
    \ project template, so you need to manually link it yourself in order to access\
    \ the session and peer picker methods. Select the TicTacToe project at the top\
    \ of the Navigator pane. Next, select the TicTacToe target in the Project Editor.\
    \ Select the Build Phases tab and expand the Link Binary With Libraries (3 items)\
    \ section. Click the **+** button on the lower left. Select `GameKit.framework`\
    \ from the dialog that appears, then click Add.\n\n`GameKit.framework` will appear\
    \ in the Navigator pane, at the top of the project groups. Let’s clean it up by\
    \ dragging it into the Frameworks group.\n\n## Designing the Interface\n\nNow\
    \ you’re going to design your game’s user interface. Since tic-tac-toe is a relatively\
    \ simple game, you’ll design your user interface in Interface Builder, rather\
    \ than by using OpenGL ES.\n\nEach space on the board will be a button. When the\
    \ user taps a button that hasn’t already been selected (which you determine by\
    \ seeing if the button has an image assigned), you set the image to either `X.png`\
    \ or `O.png` (which you added to your project a few minutes ago). You then send\
    \ that information to the other device. You’re also going to use the button’s\
    \ tag value to differentiate the buttons and make it easier to determine when\
    \ someone has won. You assign each of the buttons that represents a space on the\
    \ board with a sequential tag, starting in the upper-left corner. You can see\
    \ which space will have which tag value by looking at [Figure 9-12](#9781430238072_Ch09.xhtml#Fig12).\
    \ This way, you can identify which button was pressed without having a separate\
    \ action method for each button.\n\n![9781430238072_Fig09-12.jpg](images/9781430238072_Fig09-12.jpg)\n\
    \n[Figure 9-12.](#9781430238072_Ch09.xhtml#_Fig12) Assign each game space button\
    \ a tag value\n\n## Defining Application Constants\n\nWhen referring to specific\
    \ buttons on the tic-tac-toe board, you could use the tag values you defined in\
    \ [Figure 9-12](#9781430238072_Ch09.xhtml#Fig12) (and will have to in Interface\
    \ Builder), but it would be better to use a set of mnemonic constants. You’ll\
    \ also define some constants for the current game state and whether the user is\
    \ an X or an O.\n"
  raw: "The peer picker was designed specifically to connect one device to a single\
    \ other device using Bluetooth. Though limited in this way, the peer picker is\
    \ incredibly simple to use and is a great choice if it meets your needs. To create\
    \ and show the peer picker, you just create an instance of GKPeerPickerController,\
    \ set its delegate, and then call its show method, like so:\n\n```\nGKPeerPickerController\
    \ *picker; \npicker = [[GKPeerPickerController alloc] init]; \npicker.delegate\
    \ = self;\n[picker show];\n```\n\nHandling a Peer Connection\n\nWhen the user\
    \ has selected a peer and the sessions have been connected to each other, the\
    \ delegate method peerPickerController:didConnectPeer:toSession: will be called.\
    \ In your implementation of that method, you need to do a few things. First, you\
    \ might want to store the *peer identifier*, which is a string that identifies\
    \ the device to which you’re connected. The peer identifier defaults to the iPhone’s\
    \ device name, though you can specify other values. You also need to save a reference\
    \ to the session so you can use it to send data and to disconnect the session\
    \ later.\n\n```\n- (void)peerPickerController:(GKPeerPickerController *)picker\n\
                     didConnectPeer:(NSString *)thePeerID\n                          toSession:(GKSession\
    \ *)theSession\n{\n    self.peerID = thePeerID;\n    self.session = theSession;\n\
        self.session.delegate = self;\n    [self.session setDataReceiveHandler:self\
    \ withContext:NULL];\n    [picker dismiss];\n    picker.delegate = nil;\n}\n```\n\
    \nCreating the Session\n\nThere’s one last delegate task that you must handle\
    \ when using the peer picker, which is to create the session when the picker asks\
    \ for a session. You don’t need to worry about most of the other tasks related\
    \ to finding and connecting to other peers when using the peer picker, but you\
    \ are responsible for creating the session for the picker to use. Here’s what\
    \ that method typically looks like:\n\n```\n- (GKSession *)peerPickerController:(GKPeerPickerController\
    \ *)picker\n            sessionForConnectionType:(GKPeerPickerConnectionType)type\n\
    {\n    GKSession *theSession;\n    theSession = [[GKSession alloc] initWithSessionID:@\"\
    a session id\"\n                                          displayName:nil\n                                          sessionMode:GKSessionModePeer];\n\
        return theSession;\n}\n```\n\n`GKPeerPickerConnectionType` can be one of two\
    \ types: `GKPeerPickerConnectionOnline` (network/Internet) and `GKPeerPickerConnectionNearby`\
    \ (Bluetooth). You can configure the allowable types by using the `connectionTypesMask`\
    \ property on your `GKPeerPickerController` instance. By default, it assumes only\
    \ a Bluetooth connection.\n\nWe’ve already talked about the session, so there\
    \ shouldn’t be anything in this method that’s confusing.\n\n**Note**  There’s\
    \ actually another peer picker delegate method that you need to implement if you\
    \ want to support online play over the WiFi with the peer picker: `peerPickerController:didSelectConnectionType:`.\
    \ Check the Apple documentation or *Beginning iOS Game Center and Game Kit*.\n\
    \nWell, that’s enough discussion. Let’s start building the application.\n\nCreating\
    \ the Project\n\nOkay, you know the drill. Fire up Xcode if it’s not already open\
    \ and create a new project. Use the Single View Application template and call\
    \ the project **TicTacToe**. You’re not going to use storyboards, so only the\
    \ “Use Automatic Reference Counting” box should be checked. Once the project is\
    \ open, look in the project archives that accompany this book, in the folder 09\
    \ – TicTacToe. Find the image files called wood_button.png, board.png, O.png,\
    \ and X.png, and copy them into the Supporting Files group of your project. There’s\
    \ also an icon file called icon.png, which you can copy into your project if you\
    \ want to use it.\n\nTurning Off the Idle Timer\n\nThe first thing you want to\
    \ do is to turn off the *idle timer*. The idle timer is what tells your iPhone\
    \ to go to sleep if the user has not interacted with it in a while. Because the\
    \ user won’t be tapping the screen during the opponent’s turn, you need to turn\
    \ this off to prevent the phone from going to sleep if the other user takes a\
    \ while to make a move. Generally speaking, you don’t want networked applications\
    \ to go to sleep, because sleeping breaks the network connection. Most of the\
    \ time, with networked iPhone games, disabling the idle timer is the best approach.\n\
    \nExpand the TicTacToe group in the Navigator pane in Xcode and single-click AppDelegate.m.\
    \ Add the following line of code to applicationDidFinishLaunchingWithOptions:,\
    \ before the method returns, to disable the idle timer.\n\n```\n[[UIApplication\
    \ sharedApplication] setIdleTimerDisabled:YES];\n```\n\n**Note**  There may be\
    \ rare times when you want to leave the idle timer functioning and just close\
    \ your sessions when the app goes to sleep, but closing sessions on sleep is not\
    \ quite as straightforward as it would seem. The application delegate method applicationWillResignActive:\
    \ is called before the phone goes to sleep, but unfortunately, it’s also called\
    \ at other times. In fact, it’s called any time that your application loses the\
    \ ability to respond to touch events. That makes it close to impossible to differentiate\
    \ between when the user has been presented a system alert, such as from a push\
    \ notification or a low-battery warning (which won’t result in broken connections),\
    \ and when the phone is actually going to sleep. So, until Apple provides a way\
    \ to differentiate between these scenarios, your best bet is to simply disallow\
    \ sleep while a networked program is running.\n\nImporting the Game Kit Framework\n\
    \nGame Kit is not one of the frameworks that is automatically linked by the Xcode\
    \ project template, so you need to manually link it yourself in order to access\
    \ the session and peer picker methods. Select the TicTacToe project at the top\
    \ of the Navigator pane. Next, select the TicTacToe target in the Project Editor.\
    \ Select the Build Phases tab and expand the Link Binary With Libraries (3 items)\
    \ section. Click the **+** button on the lower left. Select GameKit.framework\
    \ from the dialog that appears, then click Add.\n\nGameKit.framework will appear\
    \ in the Navigator pane, at the top of the project groups. Let’s clean it up by\
    \ dragging it into the Frameworks group.\n\nDesigning the Interface\n\nNow you’re\
    \ going to design your game’s user interface. Since tic-tac-toe is a relatively\
    \ simple game, you’ll design your user interface in Interface Builder, rather\
    \ than by using OpenGL ES.\n\nEach space on the board will be a button. When the\
    \ user taps a button that hasn’t already been selected (which you determine by\
    \ seeing if the button has an image assigned), you set the image to either X.png\
    \ or O.png (which you added to your project a few minutes ago). You then send\
    \ that information to the other device. You’re also going to use the button’s\
    \ tag value to differentiate the buttons and make it easier to determine when\
    \ someone has won. You assign each of the buttons that represents a space on the\
    \ board with a sequential tag, starting in the upper-left corner. You can see\
    \ which space will have which tag value by looking at [Figure 9-12](#9781430238072_Ch09.xhtml#Fig12).\
    \ This way, you can identify which button was pressed without having a separate\
    \ action method for each button.\n\n![9781430238072_Fig09-12.jpg](images/9781430238072_Fig09-12.jpg)\n\
    \n[Figure 9-12.](#9781430238072_Ch09.xhtml#_Fig12)  Assign each game space button\
    \ a tag value\n\nDefining Application Constants\n\nWhen referring to specific\
    \ buttons on the tic-tac-toe board, you could use the tag values you defined in\
    \ [Figure 9-12](#9781430238072_Ch09.xhtml#Fig12) (and will have to in Interface\
    \ Builder), but it would be better to use a set of mnemonic constants. You’ll\
    \ also define some constants for the current game state and whether the user is\
    \ an X or an O."
  trans: "\n\n对等选择器的设计初衷是使用蓝牙将一台设备连接到另一台设备。尽管存在这种局限性，但对等选择器使用起来非常简单，如果符合你的需求，会是一个绝佳的选择。要创建并显示对等选择器，你只需创建一个`GKPeerPickerController`实例，设置其委托，然后调用其`show`方法即可，代码如下：\n\
    \n```\nGKPeerPickerController *picker; \npicker = [[GKPeerPickerController alloc]\
    \ init]; \npicker.delegate = self;\n[picker show];\n```\n\n## 处理对等连接\n\n当用户选定了一个对等设备且会话已相互连接后，委托方法`peerPickerController:didConnectPeer:toSession:`将被调用。在该方法的实现中，你需要完成几项操作。首先，你可能需要存储*对等标识符*，这是一个用于标识所连接设备的字符串。对等标识符默认为\
    \ iPhone 的设备名称，不过你也可以指定其他值。此外，你还需要保存对会话的引用，以便后续发送数据以及断开会话连接。\n\n```\n- (void)peerPickerController:(GKPeerPickerController\
    \ *)picker\n                 didConnectPeer:(NSString *)thePeerID\n          \
    \                toSession:(GKSession *)theSession\n{\n    self.peerID = thePeerID;\n\
    \    self.session = theSession;\n    self.session.delegate = self;\n    [self.session\
    \ setDataReceiveHandler:self withContext:NULL];\n    [picker dismiss];\n    picker.delegate\
    \ = nil;\n}\n```\n\n## 创建会话\n\n使用对等选择器时，你还需要处理最后一个委托任务：在选择器请求会话时创建会话。使用对等选择器时，你无需担心与其他对等设备查找和连接相关的大部分任务，但需要负责创建供选择器使用的会话。该方法通常如下所示：\n\
    \n```\n- (GKSession *)peerPickerController:(GKPeerPickerController *)picker\n\
    \            sessionForConnectionType:(GKPeerPickerConnectionType)type\n{\n  \
    \  GKSession *theSession;\n    theSession = [[GKSession alloc] initWithSessionID:@\"\
    a session id\"\n                                          displayName:nil\n  \
    \                                        sessionMode:GKSessionModePeer];\n   \
    \ return theSession;\n}\n```\n\n`GKPeerPickerConnectionType`可以是以下两种类型之一：`GKPeerPickerConnectionOnline`（网络/互联网）和`GKPeerPickerConnectionNearby`（蓝牙）。你可以通过`GKPeerPickerController`实例上的`connectionTypesMask`属性来配置允许的类型。默认情况下，它仅假定为蓝牙连接。\n\
    \n我们已经讨论过会话，因此这个方法中应该没有令人困惑的地方。\n\n**注意：** 如果你想通过对等选择器支持通过 WiFi 进行在线游戏，还需要实现另一个对等选择器委托方法：`peerPickerController:didSelectConnectionType:`。请查阅\
    \ Apple 文档或《Beginning iOS Game Center and Game Kit》（入门 iOS 游戏中心与游戏套件）一书。\n\n好了，讨论到此为止。让我们开始构建应用程序吧。\n\
    \n## 创建项目\n\n好了，操作步骤你都熟悉。如果 Xcode 尚未打开，请启动它并创建一个新项目。使用单视图应用程序模板，并将项目命名为 **TicTacToe**。你不会使用故事板，因此只应勾选“使用自动引用计数”复选框。项目打开后，请查看本书附带的项目归档文件，位于`09\
    \ – TicTacToe`文件夹中。找到名为`wood_button.png`、`board.png`、`O.png`和`X.png`的图像文件，并将它们复制到项目的\
    \ Supporting Files 组中。还有一个名为`icon.png`的图标文件，如果你想使用，可以将其复制到项目中。\n\n## 关闭闲置定时器\n\
    \n你要做的第一件事就是关闭*闲置定时器*。闲置定时器的作用是，当用户在一段时间内未与 iPhone 进行交互时，让 iPhone 进入休眠状态。由于对手回合期间用户不会点击屏幕，因此你需要关闭此定时器，以防对手思考时间过长导致手机进入休眠。一般来说，你不希望网络应用程序进入休眠状态，因为休眠会断开网络连接。在大多数情况下，对于联网的\
    \ iPhone 游戏，禁用闲置定时器是最佳方法。\n\n在 Xcode 的导航器窗格中展开 TicTacToe 组，然后单击`AppDelegate.m`。在`applicationDidFinishLaunchingWithOptions:`方法中，在方法返回之前添加以下代码行，以禁用闲置定时器。\n\
    \n```\n[[UIApplication sharedApplication] setIdleTimerDisabled:YES];\n```\n\n\
    **注意：** 极少数情况下，你可能希望保持闲置定时器正常运行，并在应用程序进入休眠时关闭会话，但通过休眠来关闭会话并不像看起来那么简单。应用程序委托方法`applicationWillResignActive:`会在手机进入休眠前被调用，但遗憾的是，它在其他情况下也会被调用。实际上，只要你的应用程序失去响应触摸事件的能力，该方法就会被调用。这使得我们几乎无法区分是系统提示（例如来自推送通知或低电量警告，这些情况不会导致连接断开）导致失焦，还是手机即将真正进入休眠。因此，在\
    \ Apple 提供区分这些情况的方法之前，最好的办法就是在网络程序运行时简单地禁止休眠。\n\n## 导入 Game Kit 框架\n\nGame Kit\
    \ 并非 Xcode 项目模板自动链接的框架之一，因此你需要手动链接它以访问会话和对等选择器方法。在导航器窗格顶部选择 TicTacToe 项目。接着，在项目编辑器中选择\
    \ TicTacToe 目标。选择“构建阶段”选项卡，展开“将二进制文件与库链接（3 个项目）”部分。点击左下角的 **+** 按钮。从出现的对话框中选择`GameKit.framework`，然后点击“添加”。\n\
    \n`GameKit.framework` 将出现在导航器窗格中项目组的顶部。将其拖入 Frameworks 组以进行整理。\n\n## 设计界面\n\n\
    现在，你将设计游戏的用户界面。由于井字棋是一个相对简单的游戏，你将在 Interface Builder 中设计用户界面，而非使用 OpenGL ES。\n\
    \n棋盘上的每个格子都是一个按钮。当用户点击一个尚未被选中的按钮时（通过检查按钮是否有指定图像来判断），你将图像设置为`X.png`或`O.png`（这些文件你几分钟前已添加到项目中）。然后，你将此信息发送到另一台设备。你还将使用按钮的标记值来区分按钮，并更容易判断是否有人获胜。你将棋盘上代表每个格子的按钮分配一个顺序标记值，从左上角开始。通过查看图\
    \ 9-12，你可以了解每个格子对应的标记值。这样，你无需为每个按钮设置单独的操作方法，即可识别哪个按钮被按下。\n\n![9781430238072_Fig09-12.jpg](img/9781430238072_Fig09-12.jpg)\n\
    \n图 9-12. 为每个游戏格子按钮分配一个标记值\n\n## 定义应用程序常量\n\n在引用井字棋棋盘上的特定按钮时，你可以使用图 9-12 中定义的标记值（并且在\
    \ Interface Builder 中也需要使用这些值），但更好的做法是使用一组助记常量。你还将定义一些常量来表示当前游戏状态以及用户是 X 还是 O。\n\
    \n"
- fmt: "你可以将这些常量定义分散到应用的各个头文件和实现文件中，但将它们集中放在一个文件中会更方便。我们就采用后者。\n\n在导航窗格中选择`TicTacToe`分组，然后创建一个新文件。在模板选择对话框中，选择\
    \ iOS 下的 C 和 C++ 部分。选择头文件并点击下一步。将文件保存为`TicTacToe.h`。选择`TicTacToe.h`，它应该看起来像这样：\n\
    \n```c\n#ifndef TicTacToe_TicTacToe_h\n#define TicTacToe_TicTacToe_h\n\n#endif\n\
    ```\n\n这些宏（`#ifndef`、`#define`、`#endif`）是C语言的防护机制，用于确保`TicTacToe.h`只被包含一次。在Objective-C中，你无需担心这个问题，因为`#import`宏已经为你处理了。你可以删除这些行。\n\
    \n现在，你需要定义一些自己的常量。首先，定义一个常量来表示Game Kit会话ID。\n\n```c\n#define kTicTacToeSessionID\
    \  @\"com.apporchard.TicTacToe.session\"\n```\n\n接下来，我们定义一个用于通过Game Kit对数据包进行编码和解码的常量。\n\
    \n```c\n#define kTicTacToeArchiveKey @\"com.apporchard.TicTacToe\"\n```\n\n当应用连接到另一台设备时，你需要让应用决定哪位玩家先走。方法是生成一个随机数，数字较大的玩家先走。我们使用宏`dieRoll()`来定义数字生成器，该宏将生成一个0到999,999之间的数字。这里使用这么大的数字是为了让两台设备掷出相同数字（需要重新掷骰）的概率极低。\n\
    \n```c\n#define dieRoll() (arc4random() % 1000000)\n```\n\n你还定义了一个常量`kDiceNotRolled`，用于标识骰子尚未掷出。请记住，你将在`NSInteger`实例变量中存储自己掷出的骰子数和对手的骰子数。在iPhone上，`NSInteger`与`int`相同。你使用`INT_MAX`值来标识这些值尚未确定。`INT_MAX`是平台上一个`int`能容纳的最大值。由于`dieRoll()`宏生成的最大数字是999,999，你可以安全地使用`INT_MAX`来标识骰子尚未掷出，因为在iOS上`INT_MAX`当前等于2,147,483,647。即使`INT_MAX`将来发生变化，它也只会变大，不会变小。\n\
    \n```c\n#define kDiceNotRolled INT_MAX\n```\n\n你需要一些枚举。`GameState`将是你定义不同游戏状态的枚举列表。\n\
    \n```c\ntypedef enum GameStates {\n    kGameStateBeginning,\n    kGameStateRollingDice,\n\
    \    kGameStateMyTurn,\n    kGameStateYourTurn,\n    kGameStateInterrupted,\n\
    \    kGameStateDone\n} GameState;\n```\n\n`BoardSpace`是你在图9-12中定义的枚举列表。注意，你将第一个枚举值`kUpperLeft`定义为1000。后续的每个枚举值都会在此基础上递增。\n\
    \n```c\ntypedef enum BoardSpaces {\n    kUpperLeft = 1000,\n    kUpperMiddle,\n\
    \    kUpperRight,\n    kMiddleLeft,\n    kMiddleMiddle,\n    kMiddleRight,\n \
    \   kLowerLeft,\n    kLowerMiddle,\n    kLowerRight\n} BoardSpace;\n```\n\n`PlayerPiece`是一个简单的枚举，用于标识玩家被分配了哪个棋子。\n\
    \n```c\ntypedef enum PlayerPieces {\n    kPlayerPieceUndecided,\n    kPlayerPieceO,\n\
    \    kPlayerPieceX\n} PlayerPiece;\n```\n\n最后，你定义一个枚举列表，列出应用将通过Game Kit交换的不同数据包类型。\n\
    \n```c\ntypedef enum PacketTypes {\n    kPacketTypeDieRoll,\n    kPacketTypeAck,\n\
    \    kPacketTypeMove,\n    kPacketTypeReset,\n} PacketType;\n```\n\n定义好这些常量后，你可以开始处理应用程序视图了。\n\
    \n### 设计游戏棋盘\n\n在导航器中选择`ViewController.xib`。Xcode将在Interface Builder中打开它。Interface\
    \ Builder中会有一个视图。在对象库中找到图像视图并将其拖入视图中。由于它是你添加到视图中的第一个对象，它应该会自动调整大小以占满整个视图。将其放置好以填充整个视图，然后在工具窗格中打开属性检查器。在属性检查器的顶部，将图像字段设置为`board.png`，这是你之前添加到项目中的图像之一。\n\
    \n接下来，从库中拖动一个圆角矩形按钮到视图顶部。确切的位置暂时不重要。放置后，使用属性检查器将按钮类型从圆角矩形更改为自定义。在Interface Builder或属性检查器中删除按钮标签文本“Button”。在属性检查器的图像字段中，选择`wood_button.png`，然后选择编辑器\
    \ ![image](images/arrow.jpg) → 自适应内容大小（或键入 ![image](images/flower1.jpg)=）来更改按钮的大小以匹配你分配给它的图像。现在使用蓝色参考线将按钮居中于视图中，并使其紧贴顶部蓝色边距，使其看起来如图9-13所示。\n\
    \n![9781430238072_Fig09-13.jpg](images/9781430238072_Fig09-13.jpg)\n\n[图 9-13.](#9781430238072_Ch09.xhtml#_Fig13)  调整大小并放置按钮后的界面\n\
    \n再次在库中查找标签，并将其拖到视图中。将标签居中在`gameButton`之上。调整标签大小，使其水平方向从左蓝色边距延伸到右蓝色边距，垂直方向从顶部蓝色边距向下延伸到井字棋棋盘的正上方。它会与你刚刚添加的按钮重叠，这没问题，因为标签只在按钮不可见时显示文本。使用属性检查器使文本居中，并将字体大小增加到60磅。如果你愿意，也可以将文本设置为漂亮的亮色。当你对标签满意后，删除标签文本“Label”，这样它在应用程序启动时不会显示任何内容。\n\
    \n现在，你需要为九个游戏格子各添加一个按钮，并为它们分配标签值，这样你的代码就能识别每个按钮对应棋盘上的哪个格子。将九个圆角矩形按钮拖到视图中，并使用属性检查器将其类型更改为自定义。使用尺寸检查器将它们放置在表9-1指定的位置，并使用属性检查器分配表中列出的标签值。这里有一个小技巧：先创建一个，设置好它的尺寸和属性，然后开始复制。\n\
    \n*[表 9-1.](#9781430238072_Ch09.xhtml#_Tab1)  游戏格子位置、尺寸和标签*\n\n![Table01.jpg](images/Table01.jpg)\n\
    \n好了，你已经定义了界面，现在让我们将它连接到你的控制器。仍在Interface Builder中时，将工具栏中的编辑器从标准视图更改为助理视图。编辑器窗格应水平分割，左侧是Interface\
    \ Builder，右侧是源代码编辑器（已打开`ViewController.h`）。你需要为“新游戏”按钮和放置在其上方的标签添加输出口。如果你从“新游戏”按钮中间按住Control键拖动，输出口弹出窗口应自动将类型字段设置为`UILabel`。这意味着你在为标签添加输出口。将其命名为`feedbackLabel`，然后点击连接。"
  raw: 'You could stick these constant definitions in various header and implementation
    files throughout the application, but it might be easier to stick them in a single
    file. Let’s do that.


    Select the TicTacToe group in the Navigator pane, and create a new file. Select
    the C and C++ section under iOS in the template chooser dialog. Choose Header
    File and click Next. Save the file as TicTacToe.h. Select TicTacToe.h; it should
    look like this:


    ```

    #ifndef TicTacToe_TicTacToe_h

    #define TicTacToe_TicTacToe_h


    #endif

    ```


    Those macros (#ifndef, #define, #endif), are C language hooks to make sure you
    only include TicTacToe.h once. You don’t really need to worry about that in Objective-C,
    as the #import macro takes care of that for you. You can delete those lines.


    Now, you need to define some constants of your own. First, you defined a constant
    to represent the Game Kit session ID.


    ```

    #define kTicTacToeSessionID  @"com.apporchard.TicTacToe.session"

    ```


    Next, we defined a constant for use with encoding and decoding data packets through
    Game Kit.


    ```

    #define kTicTacToeArchiveKey @"com.apporchard.TicTacToe"

    ```


    When the application connects to another device, you have the application decide
    which player goes first by generating a random number and having the higher number
    go first. You define the number generator with the macro dieRoll(), which will
    generate a number between 0 and 999,999\. You’re using a large number here so
    that the chance of both devices rolling the same value (which would require a
    re-roll) will be extremely low.


    ```

    #define dieRoll() (arc4random() % 1000000)

    ```


    You also define a constant, kDiceNotRolled, that will identify when the die has
    not yet been rolled. Remember that you’re storing both your die roll and your
    opponent’s die roll in NSInteger instance variables. On the iPhone, NSInteger
    is the same as an int. You use the value INT_MAX to identify when those values
    have not yet been determined. INT_MAX is the largest value that an int can hold
    on the platform. Since the largest number the dieRoll() macro will generate is
    999,999, you can safely use INT_MAX to identify when a die hasn’t been rolled,
    because INT_MAX currently equals 2,147,483,647 on iOS. If INT_MAX ever changes,
    it will likely get bigger, not smaller.


    ```

    #define kDiceNotRolled INT_MAX

    ```


    You need some enumerations. GameState will be your definition to an enumerated
    list of the different game states.


    ```

    typedef enum GameStates {

        kGameStateBeginning,

        kGameStateRollingDice,

        kGameStateMyTurn,

        kGameStateYourTurn,

        kGameStateInterrupted,

        kGameStateDone

    } GameState;

    ```


    BoardSpace is the enumerated list that you defined in [Figure 9-12](#9781430238072_Ch09.xhtml#Fig12).
    Note that you defined the first enumeration, kUpperLeft, to 1000\. Each subsequent
    enumeration is incremented up from there.


    ```

    typedef enum BoardSpaces {

        kUpperLeft = 1000,

        kUpperMiddle,

        kUpperRight,

        kMiddleLeft,

        kMiddleMiddle,

        kMiddleRight,

        kLowerLeft,

        kLowerMiddle,

        kLowerRight

    } BoardSpace;

    ```


    PlayerPiece is a simple enumeration to let you know what piece the player is assigned.


    ```

    typedef enum PlayerPieces {

        kPlayerPieceUndecided,

        kPlayerPieceO,

        kPlayerPieceX

    } PlayerPiece;

    ```


    Finally, you define an enumerated list to list the different kind of packet types
    the application will exchange via Game Kit.


    ```

    typedef enum PacketTypes {

        kPacketTypeDieRoll,

        kPacketTypeAck,

        kPacketTypeMove,

        kPacketTypeReset,

    } PacketType;

    ```


    Now that you’ve defined these constants, you can start by working on the application
    view.


    Designing the Game Board


    Select ViewController.xib in the Navigator. Xcode will open it in Interface Builder.
    There will be one view in Interface Builder. Find the Image View in the Object
    Library and drag it into the view. Because it’s the first object you’re adding
    to the view, it should resize to take up the full view. Place it so that it fills
    the entire view, and then bring up the attribute inspector in the Utility pane.
    At the top of the attribute inspector, set the Image field to board.png, which
    is one of the images you added to your project earlier.


    Next, drag a round rect button from the library over to the top of the view. The
    exact placement doesn’t matter yet. After it’s placed, use the attribute inspector
    to change the button type from rounded rect to custom. Delete the button label
    text, “Button”, either in Interface Builder or via the attribute inspector. In
    the Image field of the attributes inspector, select wood_button.png, and then
    select Editor ![image](images/arrow.jpg) Size to Fit Content (or type ![image](images/flower1.jpg)=)
    to change the button’s size to match the image you assigned to it. Now use the
    blue guidelines to center the button in the view and place it against the top
    blue margin so it looks like [Figure 9-13](#9781430238072_Ch09.xhtml#Fig13).


    ![9781430238072_Fig09-13.jpg](images/9781430238072_Fig09-13.jpg)


    [Figure 9-13.](#9781430238072_Ch09.xhtml#_Fig13)  Your interface after sizing
    and placing the button


    Look again in the library for a label, and drag it to the view. Center the label
    on top gameButton. Resize the label so it runs from the left blue margin to the
    right blue margin horizontally, and from the top blue margin down to just above
    the tic-tac-toe board. It will overlap the button you just added, and that’s okay,
    because the label will display text only when the button isn’t visible. Use the
    attribute inspector to center the text and to increase the size of the font to
    60 points. Feel free to also set the text to a nice bright color if you want.
    Once you have the label the way you want it, delete the label text, “Label,” so
    that it doesn’t display anything at application start.


    Now, you need to add a button for each of the nine game spaces and assign them
    each a tag value so that your code will have a way to identify which space on
    the board each button represents. Drag nine round rect buttons to the view, and
    use the attribute inspector to change their type to Custom. Use the size inspector
    to place them in the locations specified in [Table 9-1](#9781430238072_Ch09.xhtml#Tab1),
    and use the attribute inspector to assign them the listed tag value. Here’s one
    shortcut to consider: Create one, set its size and attributes, and then start
    making copies.


    *[Table 9-1.](#9781430238072_Ch09.xhtml#_Tab1)  Game Space Locations, Sizes, and
    Tags*


    ![Table01.jpg](images/Table01.jpg)


    Okay, you’ve defined your interface, now let’s connect it to your controller.
    While still in Interface Builder, change the Editor from Standard to Assistant
    view in the Toolbar. The Editor pane should split horizontally, with Interface
    Builder on the left, and the Source Code Editor, open to ViewController.h, on
    the right. You want to add Outlets for the New Game button and Label you placed
    on top of it. If you control-drag from the middle of the New Game button, the
    Outlet pop-up should automatically set the Type field to UILabel. That means you’re
    adding an Outlet for the Label. Name it **feedbackLabel** and click Connect.'
  trans: "\n你可以将这些常量定义分散到应用的各个头文件和实现文件中，但将它们集中放在一个文件中会更方便。我们就采用后者。\n\n在导航窗格中选择`TicTacToe`分组，然后创建一个新文件。在模板选择对话框中，选择\
    \ iOS 下的 C 和 C++ 部分。选择头文件并点击下一步。将文件保存为`TicTacToe.h`。选择`TicTacToe.h`，它应该看起来像这样：\n\
    \n```c\n#ifndef TicTacToe_TicTacToe_h\n#define TicTacToe_TicTacToe_h\n\n#endif\n\
    ```\n\n这些宏（`#ifndef`、`#define`、`#endif`）是 C 语言的防护机制，用于确保`TicTacToe.h`只被包含一次。在\
    \ Objective-C 中，你无需担心这个问题，因为`#import`宏已经为你处理了。你可以删除这些行。\n\n现在，你需要定义一些自己的常量。首先，定义一个常量来表示\
    \ Game Kit 会话 ID。\n\n```c\n#define kTicTacToeSessionID  @\"com.apporchard.TicTacToe.session\"\
    \n```\n\n接下来，我们定义一个用于通过 Game Kit 对数据包进行编码和解码的常量。\n\n```c\n#define kTicTacToeArchiveKey\
    \ @\"com.apporchard.TicTacToe\"\n```\n\n当应用连接到另一台设备时，你需要让应用决定哪位玩家先走。方法是生成一个随机数，数字较大的玩家先走。我们使用宏`dieRoll()`来定义数字生成器，该宏将生成一个\
    \ 0 到 999,999 之间的数字。这里使用这么大的数字是为了让两台设备掷出相同数字（需要重新掷骰）的概率极低。\n\n```c\n#define dieRoll()\
    \ (arc4random() % 1000000)\n```\n\n你还定义了一个常量`kDiceNotRolled`，用于标识骰子尚未掷出。请记住，你将在`NSInteger`实例变量中存储自己掷出的骰子数和对手的骰子数。在\
    \ iPhone 上，`NSInteger`与`int`相同。你使用`INT_MAX`值来标识这些值尚未确定。`INT_MAX`是平台上一个`int`能容纳的最大值。由于`dieRoll()`宏生成的最大数字是\
    \ 999,999，你可以安全地使用`INT_MAX`来标识骰子尚未掷出，因为在 iOS 上`INT_MAX`当前等于 2,147,483,647。即使`INT_MAX`将来发生变化，它也只会变大，不会变小。\n\
    \n```c\n#define kDiceNotRolled INT_MAX\n```\n\n你需要一些枚举。`GameState`将是你定义不同游戏状态的枚举列表。\n\
    \n```c\ntypedef enum GameStates {\n    kGameStateBeginning,\n    kGameStateRollingDice,\n\
    \    kGameStateMyTurn,\n    kGameStateYourTurn,\n    kGameStateInterrupted,\n\
    \    kGameStateDone\n} GameState;\n```\n\n`BoardSpace`是你在图 9-12 中定义的枚举列表。注意，你将第一个枚举值`kUpperLeft`定义为\
    \ 1000。后续的每个枚举值都会在此基础上递增。\n\n```c\ntypedef enum BoardSpaces {\n    kUpperLeft\
    \ = 1000,\n    kUpperMiddle,\n    kUpperRight,\n    kMiddleLeft,\n    kMiddleMiddle,\n\
    \    kMiddleRight,\n    kLowerLeft,\n    kLowerMiddle,\n    kLowerRight\n} BoardSpace;\n\
    ```\n\n`PlayerPiece`是一个简单的枚举，用于标识玩家被分配了哪个棋子。\n\n```c\ntypedef enum PlayerPieces\
    \ {\n    kPlayerPieceUndecided,\n    kPlayerPieceO,\n    kPlayerPieceX\n} PlayerPiece;\n\
    ```\n\n最后，你定义一个枚举列表，列出应用将通过 Game Kit 交换的不同数据包类型。\n\n```c\ntypedef enum PacketTypes\
    \ {\n    kPacketTypeDieRoll,\n    kPacketTypeAck,\n    kPacketTypeMove,\n    kPacketTypeReset,\n\
    } PacketType;\n```\n\n定义好这些常量后，你可以开始处理应用程序视图了。\n\n### 设计游戏棋盘\n\n在导航器中选择`ViewController.xib`。Xcode\
    \ 将在 Interface Builder 中打开它。Interface Builder 中会有一个视图。在对象库中找到图像视图并将其拖入视图中。由于它是你添加到视图中的第一个对象，它应该会自动调整大小以占满整个视图。将其放置好以填充整个视图，然后在工具窗格中打开属性检查器。在属性检查器的顶部，将图像字段设置为`board.png`，这是你之前添加到项目中的图像之一。\n\
    \n接下来，从库中拖动一个圆角矩形按钮到视图顶部。确切的位置暂时不重要。放置后，使用属性检查器将按钮类型从圆角矩形更改为自定义。在 Interface Builder\
    \ 或属性检查器中删除按钮标签文本“Button”。在属性检查器的图像字段中，选择`wood_button.png`，然后选择编辑器 ![image](img/arrow.jpg)\
    \ → 自适应内容大小（或键入 ![image](img/flower1.jpg)=）来更改按钮的大小以匹配你分配给它的图像。现在使用蓝色参考线将按钮居中于视图中，并使其紧贴顶部蓝色边距，使其看起来如图\
    \ 9-13 所示。\n\n![9781430238072_Fig09-13.jpg](img/9781430238072_Fig09-13.jpg)\n\n\
    图 9-13.  调整大小并放置按钮后的界面\n\n再次在库中查找标签，并将其拖到视图中。将标签居中在`gameButton`之上。调整标签大小，使其水平方向从左蓝色边距延伸到右蓝色边距，垂直方向从顶部蓝色边距向下延伸到井字棋棋盘的正上方。它会与你刚刚添加的按钮重叠，这没问题，因为标签只在按钮不可见时显示文本。使用属性检查器使文本居中，并将字体大小增加到\
    \ 60 磅。如果你愿意，也可以将文本设置为漂亮的亮色。当你对标签满意后，删除标签文本“Label”，这样它在应用程序启动时不会显示任何内容。\n\n现在，你需要为九个游戏格子各添加一个按钮，并为它们分配标签值，这样你的代码就能识别每个按钮对应棋盘上的哪个格子。将九个圆角矩形按钮拖到视图中，并使用属性检查器将其类型更改为自定义。使用尺寸检查器将它们放置在表\
    \ 9-1 指定的位置，并使用属性检查器分配表中列出的标签值。这里有一个小技巧：先创建一个，设置好它的尺寸和属性，然后开始复制。\n\n*表 9-1.  游戏格子位置、尺寸和标签*\n\
    \n![Table01.jpg](img/Table01.jpg)\n\n好了，你已经定义了界面，现在让我们将它连接到你的控制器。仍在 Interface\
    \ Builder 中时，将工具栏中的编辑器从标准视图更改为助理视图。编辑器窗格应水平分割，左侧是 Interface Builder，右侧是源代码编辑器（已打开`ViewController.h`）。你需要为“新游戏”按钮和放置在其上方的标签添加输出口。如果你从“新游戏”按钮中间按住\
    \ Control 键拖动，输出口弹出窗口应自动将类型字段设置为`UILabel`。这意味着你在为标签添加输出口。将其命名为`feedbackLabel`，然后点击连接。\n"
- fmt: "你需要像这样为创建的“New Game”按钮添加一个`Outlet`，但它基本上被`feedbackLabel`挡住了。打开Interface Builder编辑器面板左下角的展开三角形，并展开左侧的Object\
    \ Dock（[图9-14](#9781430238072_Ch09.xhtml#Fig14)）。在“Objects”组中，位于View下方（如果未展开，请展开它），找到名为“Button”的“New\
    \ Game”按钮对象。从`Button`按住Control键拖动到`feedbackLabel Outlet`下方，创建一个新的`Outlet`。将其命名为`gameButton`并点击“Connect”。\n\
    \n![9781430238072_Fig09-14.jpg](images/9781430238072_Fig09-14.jpg)\n\n[图9-14.](#9781430238072_Ch09.xhtml#_Fig14)  Interface\
    \ Builder Object Dock展开状态\n\n当“New Game”按钮被按下时，你需要连接一个`Action`。从Object Dock中的`Button`按住Control键拖动到`ViewController.h`中的`@end`上方。创建一个名为`gameButtonPressed`的新`Action`（[图9-15](#9781430238072_Ch09.xhtml#Fig15)）。\n\
    \n![9781430238072_Fig09-15.jpg](images/9781430238072_Fig09-15.jpg)\n\n[图9-15.](#9781430238072_Ch09.xhtml#_Fig15)  创建`gameButtonPressed`操作\n\
    \n现在，你需要为九个游戏格子按钮连接`Action`。不过你不需要为它们定义`Outlet`，只需要`Action`。从左上角的按钮按住Control键拖动到你刚创建的`Action`\
    \ `gameButtonPressed`下方。创建一个名为`gameSpacePressed`的新`Action`。现在，从其他每个游戏格子按钮按住Control键拖动到`gameSpacePressed`方法声明上。整个方法声明应该会高亮，并出现一个名为“Connect\
    \ Action”的弹出标签。建立这些连接。\n\n返回标准编辑器模式并保存XIB。\n\n---\n\n### 创建Packet对象\n\n你需要定义你的游戏如何与自身的其他实例通信。你可以使用像数组这样简单的东西，知道每个元素代表什么；或者使用字典，并知道使用哪些键。与其这样做，不如定义一个特定的类`Packet`，它将用于通过Game\
    \ Kit在两个节点之间来回发送信息。我们在之前创建`TicTacToe.h`中的`enum PacketType`时暗示过这一点。\n\n在导航器窗格中选择`TicTacToe`组，并创建一个新的Objective-C类，类名为`Packet`，作为`NSObject`的子类。\n\
    \n文件创建完成后，选择`Packet.h`并在编辑器中打开。首先，你需要添加`TicTacToe.h`头文件。\n\n```\n#import \"TicTacToe.h\"\
    \n```\n\n你需要让`Packet`遵循`NSCoding`协议，以便你可以将其归档为`NSData`实例，并通过Game Kit会话发送。\n\n\
    ```\n@interface Packet : NSObject <NSCoding>\n```\n\n`Packet`类将只有三个属性：一个用于标识数据包类型，另外两个用于保存可能作为该数据包一部分发送的信息。你唯一需要发送的其他信息是掷骰子的结果以及玩家放置X或O的游戏棋盘上的哪个格子。\n\
    \n```\n@property (nonatomic) PacketType type;\n@property (nonatomic) NSUInteger\
    \ dieRoll;\n@property (nonatomic) BoardSpace space;\n```\n\n然后，你需要一些`init`方法来创建你将发送的不同类型的数据包。\n\
    \n```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll\
    \ space:(BoardSpace)\naBoardSpace;\n- (id)initDieRollPacket;\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll;\n\
    - (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace;\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll;\n\
    - (id)initResetPacket;\n```\n\n就是这样。保存`Packet.h`并转到`Packet.m`。\n\n首先，实现你在接口文件中声明的`init`方法。\n\
    \n```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll\
    \ space:(BoardSpace)\naBoardSpace\n{\n    self = [super init];\n    if (self)\
    \ {\n        self.type = aPacketType;\n        self.dieRoll = aDieRoll;\n    \
    \    self.space = aBoardSpace;\n    }\n    return self;\n}\n\n- (id)initDieRollPacket\n\
    {\n    int roll = dieRoll();\n    return [self initWithType:kPacketTypeDieRoll\
    \ dieRoll:roll space:0];\n}\n\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll\n\
    {\n    return [self initWithType:kPacketTypeDieRoll dieRoll:aDieRoll space:0];\n\
    }\n\n- (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace\n{\n    return [self\
    \ initWithType:kPacketTypeMove dieRoll:0 space:aBoardSpace];\n}\n\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll\n\
    {\n    return [self initWithType:kPacketTypeAck dieRoll:aDieRoll space:0];\n}\n\
    \n- (id)initResetPacket\n{\n    return [self initWithType:kPacketTypeReset dieRoll:0\
    \ space:0];\n}\n```\n\n每一个其他初始化方法都只是对`initWithType:dieRoll:space:`的封装调用，其中`BoardSpace`为零（未定义）。\n\
    \n你还需要让`Packet`遵循`NSCoding`协议，添加`encodeWithCoder:`和`initWithCoder:`方法。\n\n```\n\
    #pragma mark - NSCoder (Archiving) Methods\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n    [coder encodeInt:[self type] forKey:@\"type\"];\n    [coder\
    \ encodeInteger:[self dieRoll] forKey:@\"dieRoll\"];\n    [coder encodeInt:[self\
    \ space] forKey:@\"space\"];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n \
    \   if (self = [super init]) {\n        [self setType:[coder decodeIntForKey:@\"\
    type\"]];\n        [self setDieRoll:[coder decodeIntegerForKey:@\"dieRoll\"]];\n\
    \        [self setSpace:[coder decodeIntForKey:@\"space\"]];\n    }\n    return\
    \ self;\n}\n```\n\n`Packet`是一个非常直接的类。其实现中不应该有你之前没见过的东西。保存`Packet.m`。接下来，你将编写视图控制器并完成你的应用程序。\n\
    \n---\n\n### 设置视图控制器头文件\n\n你通过Interface Builder声明了两个`Outlet`和两个`Action`。现在你将完成视图控制器的实现，包括使其与Game\
    \ Kit协同工作。在编辑器中打开`ViewController.h`。\n\n你需要做的第一件事是导入Game Kit和`TicTacToe`头文件，以便编译器了解Game\
    \ Kit中的对象和方法以及你之前定义的常量。\n\n```\n#import <GameKit/GameKit.h>\n#import \"TicTacToe.h\"\
    \n```\n\n之后，你告诉编译器有一个名为`Packet`的类。`@class`声明不会让编译器查找类头文件——它只是一个承诺，表明该类确实存在，因此以这种方式声明是可以的。\n\
    \n```\n@class Packet;\n```\n\n你的控制器类需要遵循几个协议。你的控制器将成为Game Kit对等选择器和会话的代理。你还会在出现问题时使用警报视图通知用户，因此你让你的类遵循用于定义这些任务中每个任务代理方法的三个协议。\n\
    \n```\n@interface ViewController : UIViewController <GKPeerPickerControllerDelegate,\
    \ GKSessionDelegate, \n                                               UIAlertViewDelegate>\n\
    ```\n\n你需要添加一些实例变量（ivars）。首先，在`@interface`声明之后立即添加大括号：\n\n```\n{\n}\n```\n\n你需要一个`ivar`来跟踪当前的游戏状态。\n\
    \n```\nGameState _state;\n```\n\n因为你不知道你是先掷骰子还是先收到对手的骰子结果，所以你需要变量来保存两者。一旦你拥有了两者，就可以比较它们并开始游戏。\n\
    \n```\nNSInteger _myDieRoll;\nNSInteger _opponentDieRoll;\n```\n\n一旦知道谁先走，你就可以在这个实例变量中存储你是`O`还是`X`。\n\
    \n```\nPlayerPiece _playerPiece;\n```\n\n最后，你还有两个布尔值来跟踪你是否收到了对手的骰子结果，以及你的对手是否确认收到了你的骰子结果。直到你拥有两个骰子结果并且知道你的对手也拥有两者之前，你不想开始游戏。当这两个布尔值都为`YES`时，你就知道是时候开始实际游戏了。\n\
    \n```\nBOOL _dieRollReceived;\nBOOL _dieRollAcknowledged;\n```"
  raw: "You need to add an Outlet for the New Game button you created as well, but\
    \ it’s essentially blocked by the feedbackLabel. Open the disclosure triangle\
    \ on the bottom left of the Interface Builder Editor pane, and expand the Object\
    \ Dock on the left ([Figure 9-14](#9781430238072_Ch09.xhtml#Fig14)). In the Objects\
    \ group, underneath the View (if it’s not open, open it), find the New Game button\
    \ object named Button. Control-drag from Button to just below the feedbackLabel\
    \ Outlet and create a new Outlet. Name it **gameButton** and click Connect.\n\n\
    ![9781430238072_Fig09-14.jpg](images/9781430238072_Fig09-14.jpg)\n\n[Figure 9-14.](#9781430238072_Ch09.xhtml#_Fig14)  Interface\
    \ Builder Object Dock, expanded\n\nYou need to connect an Action when the New\
    \ Game button is pressed. Control-drag from the Button in the Object Dock to just\
    \ above the @end in ViewController.h. Create a new Action named **gameButtonPressed**\
    \ ([Figure 9-15](#9781430238072_Ch09.xhtml#Fig15)).\n\n![9781430238072_Fig09-15.jpg](images/9781430238072_Fig09-15.jpg)\n\
    \n[Figure 9-15.](#9781430238072_Ch09.xhtml#_Fig15)  Creating the gameButtonPressed\
    \ Action\n\nNow you need to connect an Action to the nine game space buttons.\
    \ You don’t need to define Outlets for them though, just the actions. Control-drag\
    \ from the upper-left button to the just below the Action, gameButtonPressed,\
    \ you just created. Create a new Action named **gameSpacePressed**. Now, control-drag\
    \ from every other game space button to the gameSpacePressed method declaration.\
    \ The whole method declaration should highlight, and a pop-up label should appear\
    \ called Connect Action. Make the connections.\n\nReturn to Standard Editor Mode\
    \ and save the XIB.\n\nCreating the Packet Object\n\nYou need to define how you’re\
    \ going to have your game communicate with other instances of itself. You could\
    \ use something simple like an array, where you know what each element represents;\
    \ or a dictionary, and know what keys to use. Rather than doing that, you’re going\
    \ to define a specific class, Packet, that will be used to send information back\
    \ and forth between the two nodes, via Game Kit. We alluded to this earlier when\
    \ you created the enum PacketType in TicTacToe.h.\n\nSelect the TicTacToe group\
    \ in the Navigator pane, and create a new Objective-C class with a class name\
    \ of Packet, as a subclass of NSObject.\n\nOnce the files are created, select\
    \ Packet.h and open it in the Editor. First, you need to add the TicTacToe.h header\
    \ file.\n\n```\n#import \"TicTacToe.h\"\n```\n\nYou need Packet to conform to\
    \ the NSCoding protocol so that you can archive it into an NSData instance to\
    \ send through the Game Kit session.\n\n```\n@interface Packet : NSObject <NSCoding>\n\
    ```\n\nThe Packet class will have only three properties: one to identify the type\
    \ of packet and two others to hold information that might need to be sent as part\
    \ of that packet. The only other pieces of information you ever need to send are\
    \ the results of a die roll and which space on the game board a player placed\
    \ an X or O.\n\n```\n@property (nonatomic) PacketType type;\n@property (nonatomic)\
    \ NSUInteger dieRoll;\n@property (nonatomic) BoardSpace space;\n```\n\nThen you\
    \ need a handful of init methods for creating the different types of packets you\
    \ will send.\n\n```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll\
    \ space:(BoardSpace)\naBoardSpace;\n- (id)initDieRollPacket;\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll;\n\
    - (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace;\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll;\n\
    - (id)initResetPacket;\n```\n\nThat’s it. Save Packet.h and move over to Packet.m.\n\
    \nFirst, you implement the init methods you declared in the interface file.\n\n\
    ```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll space:(BoardSpace)\n\
    aBoardSpace\n{\n    self = [super init];\n    if (self) {\n        self.type =\
    \ aPacketType;\n        self.dieRoll = aDieRoll;\n        self.space = aBoardSpace;\n\
        }\n    return self;\n}\n\n- (id)initDieRollPacket\n{\n    int roll = dieRoll();\n\
        return [self initWithType:kPacketTypeDieRoll dieRoll:roll space:0];\n}\n\n\
    - (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll\n{\n    return [self initWithType:kPacketTypeDieRoll\
    \ dieRoll:aDieRoll space:0];\n}\n\n- (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace\n\
    {\n    return [self initWithType:kPacketTypeMove dieRoll:0 space:aBoardSpace];\n\
    }\n\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll\n{\n    return [self\
    \ initWithType:kPacketTypeAck dieRoll:aDieRoll space:0];\n}\n\n- (id)initResetPacket\n\
    {\n    return [self initWithType:kPacketTypeReset dieRoll:0 space:0];\n}\n```\n\
    \nEvery other initializer is just a wrapped call to initWithType:dieRoll:space:\
    \ with the BoardSpace being zero (undefined).\n\nYou also need to make Packet\
    \ conform the NSCoding protocol, adding an encodeWithCoder: and initWithCoder:\
    \ methods.\n\n```\n#pragma mark - NSCoder (Archiving) Methods\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n    [coder encodeInt:[self type] forKey:@\"type\"];\n    [coder\
    \ encodeInteger:[self dieRoll] forKey:@\"dieRoll\"];\n    [coder encodeInt:[self\
    \ space] forKey:@\"space\"];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n    if\
    \ (self = [super init]) {\n        [self setType:[coder decodeIntForKey:@\"type\"\
    ]];\n        [self setDieRoll:[coder decodeIntegerForKey:@\"dieRoll\"]];\n        [self\
    \ setSpace:[coder decodeIntForKey:@\"space\"]];\n    }\n    return self;\n}\n\
    ```\n\nPacket is a fairly straightforward class. There shouldn’t be anything in\
    \ its implementation that you haven’t seen before. Save Packet.m. Next, you’ll\
    \ write your view controller and finish up your application.\n\nSetting Up the\
    \ View Controller Header\n\nYou declared two Outlets and two Actions to your view\
    \ controller via Interface Builder. Now you’ll complete your implementation of\
    \ your view controller, including making it work with Game Kit. Open ViewController.h\
    \ in the Editor.\n\nThe first thing you need to do is import the Game Kit and\
    \ TicTacToe headers so that the compiler knows about the objects and methods from\
    \ Game Kit and the constants you defined earlier.\n\n```\n#import <GameKit/GameKit.h>\n\
    #import \"TicTacToe.h\"\n```\n\nAfter that, you tell the compiler that there is\
    \ a class called Packet. A @class declaration doesn’t cause the compiler to look\
    \ for the class header file—it’s just a promise that a class really exists, so\
    \ it’s okay to declare it this way.\n\n```\n@class Packet;\n```\n\nYour controller\
    \ class needs to conform to a few protocols. Your controller will be the delegate\
    \ of the Game Kit peer picker and session. You’ll also be using alert views to\
    \ inform the user when there’s a problem, so you conform your class to the three\
    \ protocols used to define the delegate methods for each of these jobs.\n\n```\n\
    @interface ViewController : UIViewController <GKPeerPickerControllerDelegate,\
    \ GKSessionDelegate, \n                                               UIAlertViewDelegate>\n\
    ```\n\nYou need to add some instance variables (ivars). First, you’ll add the\
    \ braces\n\n```\n{\n}\n```\n\nright after the @interface declaration. You need\
    \ an ivar to keep track of the current game state.\n\n```\nGameState _state;\n\
    ```\n\nBecause you don’t know whether you will roll the die or receive your opponent’s\
    \ die roll first, you need variables to hold them both. Once you have both, you\
    \ can compare them and start the game.\n\n```\nNSInteger _myDieRoll;\nNSInteger\
    \ _opponentDieRoll;\n```\n\nOnce you know who goes first, you can store whether\
    \ you’re O or X in this instance variable.\n\n```\nPlayerPiece _playerPiece;\n\
    ```\n\nFinally, you have two more Booleans to keep track of whether you’ve received\
    \ the opponent’s die roll and whether your opponent has acknowledged receipt of\
    \ yours. You don’t want to begin the game until you have both die rolls and you\
    \ know your opponent has both as well. When both of these are YES, you’ll know\
    \ it’s time to start the actual game play.\n\n```\nBOOL _dieRollReceived;\nBOOL\
    \ _dieRollAcknowledged;\n```"
  trans: "\n你需要像这样为创建的“New Game”按钮添加一个`Outlet`，但它基本上被`feedbackLabel`挡住了。打开 Interface\
    \ Builder 编辑器面板左下角的展开三角形，并展开左侧的 Object Dock（图 9-14）。在“Objects”组中，位于 View 下方（如果未展开，请展开它），找到名为“Button”的“New\
    \ Game”按钮对象。从`Button`按住 Control 键拖动到`feedbackLabel Outlet`下方，创建一个新的`Outlet`。将其命名为`gameButton`并点击“Connect”。\n\
    \n![9781430238072_Fig09-14.jpg](img/9781430238072_Fig09-14.jpg)\n\n图 9-14.  Interface\
    \ Builder Object Dock 展开状态\n\n当“New Game”按钮被按下时，你需要连接一个`Action`。从 Object Dock\
    \ 中的`Button`按住 Control 键拖动到`ViewController.h`中的`@end`上方。创建一个名为`gameButtonPressed`的新`Action`（图\
    \ 9-15）。\n\n![9781430238072_Fig09-15.jpg](img/9781430238072_Fig09-15.jpg)\n\n\
    图 9-15.  创建`gameButtonPressed`操作\n\n现在，你需要为九个游戏格子按钮连接`Action`。不过你不需要为它们定义`Outlet`，只需要`Action`。从左上角的按钮按住\
    \ Control 键拖动到你刚创建的`Action` `gameButtonPressed`下方。创建一个名为`gameSpacePressed`的新`Action`。现在，从其他每个游戏格子按钮按住\
    \ Control 键拖动到`gameSpacePressed`方法声明上。整个方法声明应该会高亮，并出现一个名为“Connect Action”的弹出标签。建立这些连接。\n\
    \n返回标准编辑器模式并保存 XIB。\n\n---\n\n### 创建 Packet 对象\n\n你需要定义你的游戏如何与自身的其他实例通信。你可以使用像数组这样简单的东西，知道每个元素代表什么；或者使用字典，并知道使用哪些键。与其这样做，不如定义一个特定的类`Packet`，它将用于通过\
    \ Game Kit 在两个节点之间来回发送信息。我们在之前创建`TicTacToe.h`中的`enum PacketType`时暗示过这一点。\n\n在导航器窗格中选择`TicTacToe`组，并创建一个新的\
    \ Objective-C 类，类名为`Packet`，作为`NSObject`的子类。\n\n文件创建完成后，选择`Packet.h`并在编辑器中打开。首先，你需要添加`TicTacToe.h`头文件。\n\
    \n```\n#import \"TicTacToe.h\"\n```\n\n你需要让`Packet`遵循`NSCoding`协议，以便你可以将其归档为`NSData`实例，并通过\
    \ Game Kit 会话发送。\n\n```\n@interface Packet : NSObject <NSCoding>\n```\n\n`Packet`类将只有三个属性：一个用于标识数据包类型，另外两个用于保存可能作为该数据包一部分发送的信息。你唯一需要发送的其他信息是掷骰子的结果以及玩家放置\
    \ X 或 O 的游戏棋盘上的哪个格子。\n\n```\n@property (nonatomic) PacketType type;\n@property\
    \ (nonatomic) NSUInteger dieRoll;\n@property (nonatomic) BoardSpace space;\n```\n\
    \n然后，你需要一些`init`方法来创建你将发送的不同类型的数据包。\n\n```\n- (id)initWithType:(PacketType)aPacketType\
    \ dieRoll:(NSUInteger)aDieRoll space:(BoardSpace)\naBoardSpace;\n- (id)initDieRollPacket;\n\
    - (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll;\n- (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace;\n\
    - (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll;\n- (id)initResetPacket;\n\
    ```\n\n就是这样。保存`Packet.h`并转到`Packet.m`。\n\n首先，实现你在接口文件中声明的`init`方法。\n\n```\n- (id)initWithType:(PacketType)aPacketType\
    \ dieRoll:(NSUInteger)aDieRoll space:(BoardSpace)\naBoardSpace\n{\n    self =\
    \ [super init];\n    if (self) {\n        self.type = aPacketType;\n        self.dieRoll\
    \ = aDieRoll;\n        self.space = aBoardSpace;\n    }\n    return self;\n}\n\
    \n- (id)initDieRollPacket\n{\n    int roll = dieRoll();\n    return [self initWithType:kPacketTypeDieRoll\
    \ dieRoll:roll space:0];\n}\n\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll\n\
    {\n    return [self initWithType:kPacketTypeDieRoll dieRoll:aDieRoll space:0];\n\
    }\n\n- (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace\n{\n    return [self\
    \ initWithType:kPacketTypeMove dieRoll:0 space:aBoardSpace];\n}\n\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll\n\
    {\n    return [self initWithType:kPacketTypeAck dieRoll:aDieRoll space:0];\n}\n\
    \n- (id)initResetPacket\n{\n    return [self initWithType:kPacketTypeReset dieRoll:0\
    \ space:0];\n}\n```\n\n每一个其他初始化方法都只是对`initWithType:dieRoll:space:`的封装调用，其中`BoardSpace`为零（未定义）。\n\
    \n你还需要让`Packet`遵循`NSCoding`协议，添加`encodeWithCoder:`和`initWithCoder:`方法。\n\n```\n\
    #pragma mark - NSCoder (Archiving) Methods\n\n- (void)encodeWithCoder:(NSCoder\
    \ *)coder\n{\n    [coder encodeInt:[self type] forKey:@\"type\"];\n    [coder\
    \ encodeInteger:[self dieRoll] forKey:@\"dieRoll\"];\n    [coder encodeInt:[self\
    \ space] forKey:@\"space\"];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n \
    \   if (self = [super init]) {\n        [self setType:[coder decodeIntForKey:@\"\
    type\"]];\n        [self setDieRoll:[coder decodeIntegerForKey:@\"dieRoll\"]];\n\
    \        [self setSpace:[coder decodeIntForKey:@\"space\"]];\n    }\n    return\
    \ self;\n}\n```\n\n`Packet`是一个非常直接的类。其实现中不应该有你之前没见过的东西。保存`Packet.m`。接下来，你将编写视图控制器并完成你的应用程序。\n\
    \n---\n\n### 设置视图控制器头文件\n\n你通过 Interface Builder 声明了两个`Outlet`和两个`Action`。现在你将完成视图控制器的实现，包括使其与\
    \ Game Kit 协同工作。在编辑器中打开`ViewController.h`。\n\n你需要做的第一件事是导入 Game Kit 和`TicTacToe`头文件，以便编译器了解\
    \ Game Kit 中的对象和方法以及你之前定义的常量。\n\n```\n#import <GameKit/GameKit.h>\n#import \"\
    TicTacToe.h\"\n```\n\n之后，你告诉编译器有一个名为`Packet`的类。`@class`声明不会让编译器查找类头文件——它只是一个承诺，表明该类确实存在，因此以这种方式声明是可以的。\n\
    \n```\n@class Packet;\n```\n\n你的控制器类需要遵循几个协议。你的控制器将成为 Game Kit 对等选择器和会话的代理。你还会在出现问题时使用警报视图通知用户，因此你让你的类遵循用于定义这些任务中每个任务代理方法的三个协议。\n\
    \n```\n@interface ViewController : UIViewController <GKPeerPickerControllerDelegate,\
    \ GKSessionDelegate, \n                                               UIAlertViewDelegate>\n\
    ```\n\n你需要添加一些实例变量（ivars）。首先，在`@interface`声明之后立即添加大括号：\n\n```\n{\n}\n```\n\n你需要一个`ivar`来跟踪当前的游戏状态。\n\
    \n```\nGameState _state;\n```\n\n因为你不知道你是先掷骰子还是先收到对手的骰子结果，所以你需要变量来保存两者。一旦你拥有了两者，就可以比较它们并开始游戏。\n\
    \n```\nNSInteger _myDieRoll;\nNSInteger _opponentDieRoll;\n```\n\n一旦知道谁先走，你就可以在这个实例变量中存储你是`O`还是`X`。\n\
    \n```\nPlayerPiece _playerPiece;\n```\n\n最后，你还有两个布尔值来跟踪你是否收到了对手的骰子结果，以及你的对手是否确认收到了你的骰子结果。直到你拥有两个骰子结果并且知道你的对手也拥有两者之前，你不想开始游戏。当这两个布尔值都为`YES`时，你就知道是时候开始实际游戏了。\n\
    \n```\nBOOL _dieRollReceived;\nBOOL _dieRollAcknowledged;\n```\n"
- fmt: "# 排版后的文档\n\nYou already have two Outlet properties, `feedbackLabel` and `gameButton`,\
    \ that you created via Interface Builder. You also need properties for the Game\
    \ Kit session and to hold the peer identifier of the one connected node.\n\n```objective-c\n\
    @property (nonatomic, strong) GKSession *session;\n@property (nonatomic, strong)\
    \ NSString *peerID;\n```\n\nYou load both of the images representing the two game\
    \ pieces when your view is loaded and keep a reference to them.\n\n```objective-c\n\
    @property (nonatomic, strong) UIImage *xPieceImage;\n@property (nonatomic, strong)\
    \ UIImage *oPieceImage;\n```\n\nFinally, you declare a bunch of methods that you\
    \ need in your game. We’ll discuss the specific methods in more detail when you\
    \ implement them in your controller. You add them before the two Actions, `gameButtonPressed:`\
    \ and `gameSpacePressed:`, that you added via Interface Builder.\n\n```objective-c\n\
    - (void)resetBoard;\n- (void)startNewGame;\n- (void)resetDieState;\n- (void)startGame;\n\
    - (void)sendPacket:(Packet *)packet;\n- (void)sendDieRoll;\n- (void)checkForGameEnd;\n\
    ```\n\nThat’s all you need in this file. Save it and open `ViewController.m`.\n\
    \n# Implementing the Tic-Tac-Toe View Controller\n\nThere’s a lot of code to add\
    \ to `ViewController.m`, so let’s get started.\n\nFirst, you need to import the\
    \ header file `Packet.h`.\n\n```objective-c\n#import \"Packet.h\"\n```\n\nInitialize\
    \ the piece images and set your current die roll to `kDiceNotRolled` in `viewDidLoad`\
    \ (after the call to `super`).\n\n```objective-c\n_myDieRoll = kDiceNotRolled;\n\
    self.oPieceImage = [UIImage imageNamed:@\"O.png\"];\nself.xPieceImage = [UIImage\
    \ imageNamed:@\"X.png\"];\n```\n\nAt the bottom of your implementation file are\
    \ the two Action methods. You need to implement them. First, edit `gameButtonPressed:`.\n\
    \n```objective-c\n#pragma mark - Game-Specific Actions\n\n- (IBAction)gameButtonPressed:(id)sender\n\
    {\n    _dieRollReceived = NO;\n    _dieRollAcknowledged = NO;\n\n    _gameButton.hidden\
    \ = YES;\n    GKPeerPickerController *picker = [[GKPeerPickerController alloc]\
    \ init];\n    picker.delegate = self;\n    [picker show];\n}\n```\n\nThis is the\
    \ callback for when the user presses the New Game button. You set `_dieRollReceived`\
    \ and `_dieRollAcknowledged` to `NO`, because you know neither of these things\
    \ has happened yet for the new game. Next, you hide the button because you don’t\
    \ want your player to request a new game while you’re looking for peers or playing\
    \ the game. Then you create an instance of `GKPeerPickerController`, set `self`\
    \ as the delegate, and show the peer picker controller. That’s all you need to\
    \ do to kick off the process of letting the user select another device to play\
    \ against. The peer picker will handle everything, and then call delegate methods\
    \ when you need to take some action.\n\nNow, add the callback for when the user\
    \ presses one of the game space buttons.\n\n```objective-c\n- (IBAction)gameSpacePressed:(id)sender\n\
    {\n    UIButton *buttonPressed = sender;\n    if (_state == kGameStateMyTurn &&\
    \ [buttonPressed imageForState:UIControlStateNormal] == nil) {\n        [buttonPressed\
    \ setImage:((_playerPiece == kPlayerPieceO) ? self.oPieceImage\n             \
    \                                                    : self.xPieceImage) \n  \
    \                     forState:UIControlStateNormal];\n        _feedbackLabel.text\
    \ = NSLocalizedString(@\"Opponent's Turn\", @\"Opponent's Turn\");\n        _state\
    \ = kGameStateYourTurn;\n\n        Packet *packet = [[Packet alloc] initMovePacketWithSpace:buttonPressed.tag];\n\
    \        [self sendPacket:packet];\n\n        [self checkForGameEnd];\n    }\n\
    }\n```\n\nThe first thing you do is cast `sender` to a `UIButton`. You know `sender`\
    \ will always be an instance of `UIButton`, and doing this will prevent you from\
    \ needing to cast `sender` every time you use it. Next, you check the game state.\
    \ You don’t want to let the user select a space if it’s not that player’s turn.\
    \ You also check to make sure that the button pressed has no image already assigned.\
    \ If it has an image assigned to it, then there’s already either an X or an O\
    \ in the space this button represents, and the user is not allowed to select it.\
    \ If the space has no image assigned and it is your turn, you set the image to\
    \ whichever image is appropriate for your player, based on whether you went first\
    \ or second. The piece variable will get set later when you compare die rolls.\
    \ You set the feedback label to inform the users that it’s no longer their turn,\
    \ and change the state to reflect that as well. You must inform the other device\
    \ that you’ve made your move, so you create an instance of `Packet`, passing the\
    \ tag value from the button that was pressed to identify which space the player\
    \ selected. You use the method called `sendPacket:`, which you’ll look at in a\
    \ moment, to send the instance of `Packet` to the other node. At the last step,\
    \ you check to see if the game is over. The method `checkForGameEnd` determines\
    \ if either player won or if there are no spaces on the board, which would mean\
    \ it’s a tie.\n\nBefore you implement the methods you defined in your interface\
    \ file, you need to think about the Protocol declarations you made. You defined\
    \ `ViewController` to conform to the protocols `GKPeerPickerControllerDelegate`,\
    \ `GKSessionDelegate`, and `UIAlertViewDelegate`. Let’s tackle them in order,\
    \ starting with `GKPeerPickerControllerDelegate`.\n\n## Game Kit Peer-To-Peer\
    \ Delegate Methods\n\nWhen the Game Kit Peer-To-Peer Picker displays itself, it\
    \ attempts to create a Game Kit session using the `peerPickerController:sessionForConnectionType:`\
    \ method. So, you implement that first. Add this method to `ViewController.m`,\
    \ before the `@end`.\n\n```objective-c\n#pragma mark - GameKit Peer Picker Delegate\
    \ Methods\n\n- (GKSession *)peerPickerController:(GKPeerPickerController *)picker\n\
    \            sessionForConnectionType:(GKPeerPickerConnectionType)type\n{\n  \
    \  GKSession *theSession;\n    if (type == GKPeerPickerConnectionTypeNearby)\n\
    \        theSession = [[GKSession alloc] initWithSessionID:kTicTacToeSessionID\n\
    \                                          displayName:nil\n                 \
    \                         sessionMode:GKSessionModePeer];\n    return theSession;\n\
    }\n```\n\nThis is where the picker asks you to provide a session. Because you\
    \ want all devices to both advertise and look for other devices on the network,\
    \ you specify `GKSessionModePeer` for the session mode. Notice that you also use\
    \ your constant `kTicTacToeSessionID`, which you defined in the `TicTacToe.h`\
    \ header file to make sure that you connect only to other instances of TicTacToe.\
    \ We discussed this earlier, so flip back a few pages if you need to review the\
    \ code.\n\nAdd the method to handle the connection to the peer.\n\n```objective-c\n\
    - (void)peerPickerController:(GKPeerPickerController *)picker\n              \
    \   didConnectPeer:(NSString *)thePeerID\n                          toSession:(GKSession\
    \ *)theSession\n{\n    self.peerID = thePeerID;\n    self.session = theSession;\n\
    \    self.session.delegate = self;\n    [self.session setDataReceiveHandler:self\
    \ withContext:NULL];\n    [picker dismiss];\n    picker.delegate = nil;\n    [self\
    \ startNewGame];\n}\n```\n\nBecause the peer picker is only for simple peer-to-peer\
    \ games, once you’re notified of a connection, you store the session and the peer\
    \ identifier, and then dismiss the picker. After you’ve dismissed it, you call\
    \ `startNewGame` to get things going.\n\nNext, you add this delegate method to\
    \ handle user cancels.\n\n```objective-c\n- (void)peerPickerControllerDidCancel:(GKPeerPickerController\
    \ *)picker\n{\n    self.gameButton.hidden = NO;\n}\n```\n\nYou just unhide the\
    \ New Game button.\n\n## Game Kit Session Delegate Methods"
