    wireless infrastructure, Apple has placed far more restrictions on iOS developers
    than it ever has on Macintosh developers, who are able to write and distribute
    programs with absolutely no oversight or approval from Apple. Apple is not doing
    this to be mean, but rather to minimize the chances of people distributing malicious
    or poorly written programs that could degrade performance on the shared network.
