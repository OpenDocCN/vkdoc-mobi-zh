    ```objc\n- (BOOL)isEditable;\n```\n\n并将其实现添加到 `SuperDBCell.m`：\n\n```objc\n#pragma\
    \ mark - 实例方法\n\n- (BOOL)isEditable\n{\n    return NO;\n}\n```\n\n在 `SuperDBEditCell.m`\
    \ 中重写该方法。\n\n```objc\n#pragma mark - SuperDBCell 重写\n\n- (BOOL)isEditable\n{\n\
