    为你创建了这个文件，因为你在项目配置表中勾选了“使用 Core Data”复选框。单击 `CoreDataApp.xcdatamodel` 以打开 Xcode
    的模型编辑器。确保实用工具面板（`Utility` pane）可见（它应该是视图栏上的第三个按钮），然后选择检查器（`Inspector`）。你的 Xcode
