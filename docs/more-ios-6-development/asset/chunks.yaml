    # HeroDetailConfiguration 类名


    `HeroDetailConfiguration` 这个类名之所以有效，是因为它被 `HeroDetailController` 所使用。既然你要重命名 Controller
    类，那么也应该重命名配置类。打开 `HeroDetailConfiguration.h`，在编辑器中高亮类名。选择 **Edit** ![image](img/arrow.jpg)
    **Refactor** ![image](img/arrow.jpg) **Rename** 菜单，将类重命名为 `ManagedObjectConfiguration`（图
    7-16）。点击 **Preview** 并查看 Xcode 所做的更改。它应该会更改接口和实现文件，以及 `HeroDetailController` 中的引用。准备好后，点击
    **Save**。


    ![9781430238072_Fig07-16.jpg](img/9781430238072_Fig07-16.jpg)


    图 7-16.  Rename 重构面板


    有一处代码更改需要你进行。在 `ManagedObjectConfiguration` 的 `init` 方法中，配置属性列表是这样加载的：


    ```

    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"ManagedObjectConfiguration"

                                               withExtension:@"plist"];

    ```


    记住，你要保持当前的配置属性列表名称为 `HeroDetailController.plist`。如果你硬编码了这个名称，那就没有真正完成任何有用的操作。你需要将初始化方法从一个简单的
    `init` 方法更改为类似如下的形式：


    ```

    - (id)initWithResource:(NSString *)resource;

    ```


    将该声明添加到 `ManagedObjectController.h` 文件的 `@interface` 内部。然后你可以将 `init` 方法更改为：


    ```

    - (id)init

    - (id)initWithResource:(NSString *)resource

    {

        self = [super init];

        if (self) {

            // Initialization Code

            NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"ManagedObjectConfiguration"

                                                       withExtension:@"plist"];

            NSURL *plistURL = [[NSBundle mainBundle] URLForResource:resource withExtension:@"plist"];

            NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];

            self.sections = [plist valueForKey:@"sections"];

        }

        return self;

    }

    ```


    现在，你需要修改 `HeroDetailController` 的 `viewDidLoad` 方法中的这行代码：


    ```

    self.config = [[ManagedObjectConfiguration alloc] init];

    ```


    改为：


    ```

    self.config = [[ManagedObjectConfiguration alloc] initWithResource:@"HeroDetailConfiguration"];

    ```


    **注意**  如果你只是要重构 `HeroDetailController`，为什么还要做这个改动呢？嗯，重构的一个关键点是进行小的改动并检查一切是否仍然正常。你不会想做出大量改动后才发现问题。成功重构的另一个关键点是编写单元测试。这样你就拥有了一套可重复执行的测试，以确保你没有做出预期之外的剧烈更改。你将在第
    15 章中学习单元测试。


    至此，你的应用应该仍然可以工作，因为你只做了一个非常小的改动。更大的改动即将到来。


    ## 重构详情控制器


    你可以创建一个名为 `ManagedObjectContro ller` 的新类，并将 `HeroDetailController` 的大部分代码移动到新类中。但这增加了复杂性（移动代码），可能导致错误。更简单的做法是重命名
    `HeroDetailController`，清理代码使其更具通用性，然后再实现一个新的 `HeroDetailController` 类。


    打开 `HeroDetailController.h`，使用 **Edit** ![image](img/arrow.jpg) **Refactor** ![image](img/arrow.jpg)
    **Rename** 将类重命名为 `ManagedObjectController`。查看 Xcode 建议的更改。你会注意到 Xcode 正在修改 `SuperDB.storyboard`，它本质上是一个
    XML 文件。你只需要相信 Xcode 知道自己在做什么。点击 **Save**。你可能想要构建并运行应用，以确保它仍然可以工作。


    ## 重构 Hero 实例变量


    在你的 `ManagedObjectEditor` 类中，有一个名为 `hero` 的实例变量。这个变量名不再能代表它实际存放的内容，因此我们也来重构它。打开
    `ManagedObjectEditor.h`，将 `hero` 属性重命名为 `managedObject`。现在你必须在应用的其余部分进行更改。


    **注意**  为什么不用 Xcode 的重构选项呢？你本来可以用的，但它在重命名实例变量方面表现不佳。当我们尝试时，它想要同时更改数据模型和 storyboard。那是不对的。我们本可以在文件预览窗格中取消选中这些更改，然后保存。但是
    Xcode 没有重命名其他出现的位置，所以无论如何你都得手动完成。


    打开 `ManagedObjectEditor.m`，找到所有出现：


    ```

    self.hero

    ```


    并将它们更改为：


    ```

    self.managedObject

    ```


    最后，编辑 `HeroListContoller.m`，将 `prepareForSegue:sender` 中的这行代码：


    ```

    detailController.hero = sender;

    ```


    改为：


    ```

    detailController.managedObject = sender;

    ```


    保存你的工作，并检查应用。


    ## 多一点抽象


    在处理 `ManagedObjectController` 的同时，借此机会添加一些离散的功能。具体来说，当添加或移除能力时，你将相关代码放在了 `tableView:commitEditingStyle:forRowAtIndexPath:`
    方法中。让我们将这些代码拆分为专门用于添加和删除关系对象的方法。将以下方法声明添加到 `ManagedObjectController.h` 中：


    ```

    - (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section;

    - (void)removeRelationshipObjectInIndexPath:(NSIndexPath *)indexPath;

    ```


    在实现这些方法之前，先添加一个新的私有方法。在 `ManagedObjectController.m` 中找到私有类别，并添加这一行：


    ```

    - (void)saveManagedObjectContext;

    ```


    然后，添加实现：


    ```

    - (void)saveManagedObjectContext

    {

        NSError *error;

        if (![self.managedObject.managedObjectContext save:&error]) {

            // need to make HeroDetailController a UIAlertViewDelegate

            UIAlertView *alert =             [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Error
    saving entity",                                                                  @"Error
    saving entity")

                           message:[NSString stringWithFormat:NSLocalizedString(@"Error
    was: %@, quitting.",                                                                          @"Error
    was: %@, quitting."),                                                              
    [error localizedDescription]]

                           delegate:self

                 cancelButtonTitle:NSLocalizedString(@"Aw, Nuts", @"Aw, Nuts")

                 otherButtonTitles:nil];

            [alert show];

        }

    }

    ```


    这看起来熟悉吗？应该熟悉；它本质上就是 `save` 方法中的代码。因此，将 `save` 方法中的以下几行代码：


    ```

        NSError *error;

        if (![self.managedObject.managedObjectContext save:&error])

            NSLog(@"Error saving: %@", [error localizedDescription]);

    ```


    更新为：


    ```

        [self saveManagedObjectContext];

    ```


    现在你可以添加新的方法实现（我们将它们添加到了 `ManagedObjectController.m` 中 `@end` 之前）。


    ```

    #pragma mark - Instance Methods


    - (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section

    {

        NSString *key = [self.config dynamicAttributeKeyForSection:section];

        NSMutableSet *relationshipSet = [self.managedObject mutableSetValueForKey:key];


    NSEntityDescription *entity = [self.managedObject entity];

        NSDictionary *relationships = [entity relationshipsByName];

        NSRelationshipDescription *destRelationship = [relationships objectForKey:key];

        NSEntityDescription *destEntity = [destRelationship destinationEntity];

    ```

