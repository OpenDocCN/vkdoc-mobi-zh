    \n```objective-c\n- (void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n\
    \   [super setEditing:editing animated:animated];\n    self.textField.enabled\
    \ = editing;\n}\n```\n\n再次保存并运行应用。导航到详情视图，进入编辑模式。点击“Identity”行的“Unknown Hero”。你应该看到键盘输入视图出现在屏幕底部，并且在“Unknown\
    \ Hero”的末尾出现光标。点击另一行，光标应出现在该行。\n\n我们来编辑“Identity”行。点击“Unknown Hero”激活键盘输入视图。点击单元格右端的\
    \ **x** 按钮，这应该会擦除“Unknown Hero”。然后输入 **Super Cat**，并点击“Save”。你应该退出编辑模式，并且你的英雄的新身份应该显示为“Super\
    \ Cat”。点击“Back”返回列表视图。\n\n等等，发生了什么？你将英雄重命名为“Super Cat”，但列表视图仍然显示“Unknown Hero”。如果你点击“Unknown\
    \ Hero”行，详情视图也仍然显示“Unknown Hero”。为什么你的更改没有被保存？\n\n还记得你之前为详情视图添加了“Save”按钮吗？你还添加了一个回调`save`，在按下“Save”按钮时被调用。让我们再看看这个回调。\n\
    \n```objective-c\n- (void)save\n{\n    [self setEditing:NO animated:YES];\n}\n\
    ```\n\n注意这个方法**并没有保存任何东西**！它所做的只是关闭编辑模式。让我们弄清楚如何真正保存你的更改。\n\n## 保存你的更改\n\n让我们回顾一下你的详情视图。详情视图是一个由`HeroDetailController`管理的表格视图。`HeroDetailController`还持有一个对`Hero`对象的引用，这是一个`NSManagedObject`。表格视图中的每一行都是你的自定义表格视图单元格类`SuperDBEditCell`。根据你需要的行，你会分配一个不同的英雄属性来显示。\n\
    \n现在，为了保存你做出的更改，“Save”按钮会调用`save`方法。这就是你需要将更改保存到`NSManagedObject`的地方。你将修改`SuperDBEditCell`类，使其知道它正在显示哪个属性。此外，你将定义一个属性`value`，用来告诉你在单元格中的新数据。\n\
    \n首先，将你的属性添加到`SuperDBEditCell.h`中。\n\n```objective-c\n@property (strong, nonatomic)\
    \ NSString *key;\n@property (strong, nonatomic) id value;\n```\n\n接下来，编辑`SuperDBEditCell.m`，为`value`属性定义属性覆盖方法。\n\
    \n```objective-c\n#pragma mark - 属性覆盖\n- (id)value\n{\n    return self.textField.text;\n\
    }\n- (void)setValue:(id)aValue\n{\n    self.textField.text = aValue;\n}\n```\n\
    \n最后，修改`HeroDetailController.m`，在`tableView:cellForRowAtIndexPath`方法中为每个单元格分配键名。\n\
    \n```objective-c\ncell.key = [row objectForKey:@\"key\"];\n```\n\n然后在`save`方法中遍历每个单元格，以更新英雄的属性。\n\
    \n```objective-c\nfor (SuperDBEditCell *cell in [self.tableView visibleCells])\n\
    \    [self.hero setValue:[cell value] forKey:[cell key]];\n\nNSError *error;\n\
    if (![self.hero.managedObjectContext save:&error])\n    NSLog(@\"保存时出错: %@\",\
    \ [error localizedDescription]);\n\n[self.tableView reloadData];\n```\n\n保存并运行应用程序。导航到详情视图，进入编辑模式。将“Identity”改为“Super\
    \ Cat”并点击“Save”。点击“Back”按钮返回列表视图。你应该看到英雄的身份现在显示为“Super Cat”。\n\n现在，你将开始为“Birthdate”和“Sex”属性处理专门的输入视图。\n\
    \n## 专用输入视图\n\n注意，当你在详情视图中点击“Birthdate”或“Sex”行时，会显示键盘输入视图。你可以允许用户通过键盘输入出生日期或性别并验证输入，但有一种更好的方法。你可以创建`SuperDBEditCell`的子类来处理这些特殊情况。\n\
    \n### DatePicker SuperDBEditCell 子类\n\n在导航器面板中单击一下`SuperDB`组，然后创建一个新文件。选择“Objective-C”类，并将其设为`SuperDBEditCell`的子类。将类命名为**SuperDBDateCell**并创建文件。编辑`SuperDBDateCell.m`，内容如下：\n\
    \n```objective-c\n#import \"SuperDBDateCell.h\"\n\nstatic NSDateFormatter *__dateFormatter\
    \ = nil;\n\n@interface SuperDBDateCell ()\n@property (strong, nonatomic) UIDatePicker\
    \ *datePicker;\n- (IBAction)datePickerChanged:(id)sender;\n@end\n\n@implementation\
    \ SuperDBDateCell\n\n+ (void)initialize\n{\n    __dateFormatter = [[NSDateFormatter\
    \ alloc] init];\n    [__dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
    }\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier\n\
    {\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n \
    \   if (self) {\n        // 初始化代码\n        self.textField.clearButtonMode = UITextFieldViewModeNever;\n\
    \        self.datePicker = [[UIDatePicker alloc] initWithFrame:CGRectZero];\n\
    \        self.datePicker.datePickerMode = UIDatePickerModeDate;\n        [self.datePicker\
    \ addTarget:self\n                             action:@selector(datePickerChanged:)\n\
    \                   forControlEvents:UIControlEventValueChanged];\n        self.textField.inputView\
    \ = _datePicker;\n    }\n    return self;\n}\n#pragma mark - SuperDBEditCell 覆盖\n\
    - (id)value\n{\n    if (self.textField.text == nil || [self.textField.text length]\
    \ == 0)\n        return nil;\n    return self.datePicker.date;\n}\n- (void)setValue:(id)value\n\
    {\n    if (value != nil && [value isKindOfClass:[NSDate class]]) {\n        [self.datePicker\
    \ setDate:value];\n        self.textField.text = [__dateFormatter stringFromDate:value];\n\
    \    }\n    else {\n        self.textField.text = nil;\n    }\n}\n#pragma mark\
    \ - (私有) 实例方法\n- (IBAction)datePickerChanged:(id)sender\n{\n    NSDate *date =\
    \ [self.datePicker date];\n    self.value = date;\n    self.textField.text = [__dateFormatter\
    \ stringFromDate:date];\n}\n\n@end\n```\n\n你在这里做了什么？你定义了一个`NSDateFormatter`类型的局部静态变量`__dateFormatter`。你这样做是因为创建`NSDateFormatter`是一个开销很大的操作，并且你不希望每次需要格式化`NSDate`对象时都创建一个新实例。你本可以将其设为`SuperDBDateCell`的一个私有属性并延迟创建它，但那意味着你会为每个`SuperDBDateCell`实例创建一个新的格式化器。通过将其设为局部静态变量，你只需要在`SuperDB`应用程序的生命周期内创建一个实例。\n\
    \n接下来，你声明了一个私有的`UIDatePicker`属性`datePicker`，以及一个用于`datePicker`的回调`datePickerChanged`。\n\
    \n在`SuperDBDateCell`的`@implementation`中，你定义了一个类方法`+initialize`。这是一个从`NSObject`继承的特殊类方法。`SuperDB`应用程序会在任何对`SuperDBDateCell`类或其实例的调用之前，**恰好调用一次**`SuperDBDateCell\
    \ + initialize`。这就是你初始化局部静态变量`__dateFormatter`以持有一个`NSDateFormatter`实例的地方。"
- fmt: '你添加了一些自定义初始化代码到`initWithStyle:reuseIdentifier:`。这是你实例化`datePicker`属性并将其赋值给`textField`的`inputView`属性的地方。通常`inputView`为`nil`，这告诉
    iOS 对`textField`使用键盘输入视图。通过为其分配一个替代视图，你告诉 iOS 在编辑`textField`时显示该替代视图。


    `SuperDBDateCell`重写了`value`属性，以确保你显示和返回一个`NSDate`，而不是`NSString`。这里你使用`__dateFormatter`将日期转换为字符串，然后将其赋值给`textField`的`text`属性。


    最后，你实现了当通过 UI 更改日期时`datePicker`的回调。每次你在`datePicker`中更改日期，都要更新`textField`以反映该更改。


    ## 使用DatePicker SuperDBEditCell Subclass


    让我们回顾一下表格视图单元格是如何创建的。在`HeroDetailController`中，你在`tableView:cellForRowAtIndexPath:`方法中创建了单元格。当你第一次编写此方法时，你创建了一个`UITableViewCell`实例。后来，你将其替换为自定义子类`SuperDBEditCell`的实例。现在你为特定的`IndexPath`（显示出生日期属性的`IndexPath`）创建了另一个子类。你如何告诉你的应用程序使用哪个自定义子类？没错，你将把那个信息添加到你的属性列表中：`HeroDetailController.plist`。


    单击`HeroDetailController.plist`。展开所有展开三角形，以便你可以看到所有元素。向下导航到 sections ![image](images/arrow.jpg)
    Item 0 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg) Item 0 ![image](images/arrow.jpg)
    key。单击 key 行使其高亮显示。单击 key 旁边的`+`按钮。将此行从`New Item`重命名为`class`。在 value 列中，键入`SuperDBEditCell`。对
    sections ![image](images/arrow.jpg) Item 1 下的所有 key 行重复此操作。它们都应该有值`SuperDBEditCell`，除了
    birthdate 键下方的 class 行。该行的值应为`SuperDBDateCell`（[Figure 4-27](#9781430238072_Ch04.xhtml#Fig27)）。


    ![9781430238072_Fig04-27.jpg](images/9781430238072_Fig04-27.jpg)


    [Figure 4-27.](#9781430238072_Ch04.xhtml#_Fig27)  添加表格视图单元格类键后的`HeroDetailController.plist`


    你需要修改`tableView:cellForRowAtIndexPath:`以利用你刚刚放置在属性列表中的信息。打开`HeroDetailController.m`，并将`tableView:cellForRowAtIndexPath:`编辑为如下所示：


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath

    {

        NSUInteger sectionIndex = [indexPath section];

        NSUInteger rowIndex = [indexPath row];

        NSDictionary *section = [self.sections objectAtIndex:sectionIndex];

        NSArray *rows = [section objectForKey:@"rows"];

        NSDictionary *row = [rows objectAtIndex:rowIndex];

        NSString *cellClassname = [row valueForKey:@"class"];

        SuperDBEditCell *cell = [tableView dequeueReusableCellWithIdentifier:cellClassname];

        if (cell == nil) {

            Class cellClass = NSClassFromString(cellClassname);

            cell = [cellClass alloc];

            cell = [cell initWithStyle:UITableViewCellStyleValue2 reuseIdentifier:cellClassname];

        }

        // Configure the cell. . .

        cell.key = [row objectForKey:@"key"];

        cell.value = [self.hero valueForKey:[row objectForKey:@"key"]];

        cell.label.text = [row objectForKey:@"label"];

        return cell;

    }

    ```


    保存并运行应用程序。向下导航到详细信息视图，并进入编辑模式。单击标签旁边的`Birthdate`单元格。附件输入视图应该会出现，并且应该是一个设置为今天日期的日期选择器。当你在日期选择器中更改日期时，表格视图单元格中的日期应该会更改。


    还有一个输入需要处理。这个版本的应用程序使用字符串属性编辑器来征求超级英雄的性别（抱歉，我们忍不住要提一下！）。这意味着除了输入是一个有效字符串之外，没有其他验证。用户可以输入
    M、Male、MALE 或 Yes, Please，它们都会被应用程序欣然接受。这意味着，稍后如果你想按性别让用户排序或搜索他们的英雄，你可能会遇到问题，因为数据不会以一致的方式结构化。接下来你将处理这个问题。


    ## 实现选择拾取器


    正如你之前所见，你可以通过使用正则表达式来强制规定特定的性别拼写，如果用户输入了 Male 或 Female 以外的内容，就弹出一个警告。这样做可以防止输入你不希望的值，但这种方法不太友好。你不想惹恼你的用户。为什么非要让他们打字呢？这里只有两种可能的选择。为什么不呈现一个选择列表，让用户直接点击他们想要的那个？嘿，这听起来是个好主意！很高兴你想到这个。现在让我们实现它，好吗？


    再次创建一个新的 Objective-C 类，并使其成为`SuperDBEditCell`的子类。将类命名为`SuperDBPickerCell`，因为它将使用`UIPickerView`。你将要做的许多事情与为`SuperDBDateCell`所做的类似，但也有一些关键的区别。


    编辑`SuperDBPickerCell.h`中的接口定义，使其如下所示：


    ```

    @interface SuperDBPickerCell : SuperDBEditCell < UIPickerViewDataSource, UIPickerViewDelegate>


    @property (strong, nonatomic) NSArray *values;


    @end

    ```


    该属性名为`pickerValues`，它将保存可能的选项。你还在`SuperDBPickerCell`中添加了`UIPickerViewDataSource`和`UIPickerViewDelegate`协议。


    现在，让我们编辑`SuperDBPickerCell.m`中`SuperDBPickerCell`的实现：


    ```

    @interface SuperDBPickerCell ()

    @property (strong, nonatomic) UIPickerView *pickerView;

    @end


    @implementation SuperDBPickerCell


    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            self.textField.clearButtonMode = UITextFieldViewModeNever;

            self.pickerView = [[UIPickerView alloc] initWithFrame:CGRectZero];

            self.pickerView.dataSource = self;

            self.pickerView.delegate = self;

            self.pickerView.showsSelectionIndicator = YES;

            self.textField.inputView = self.pickerView;

        }

        return self;

    }

    #pragma mark UIPickerViewDataSource Methods

    - (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView

    {

        return 1;

    }

    - (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component

    {

        return [self.values count];

    }

    #pragma mark - UIPickerViewDelegate Methods

    - (NSString *)pickerView:(UIPickerView *)pickerView

                  titleForRow:(NSInteger)row

                 forComponent:(NSInteger)component

    {

        return [self.values objectAtIndex:row];

    }

    - (void)pickerView:(UIPickerView *)pickerView

           didSelectRow:(NSInteger)row        inComponent:(NSInteger)component

    {

        self.value = [self.values objectAtIndex:row];

    }

    #pragma mark - SuperDBEditCell Overrides

    - (void)setValue:(id)value

    {

        if (value != nil) {

            NSInteger index = [self.values indexOfObject:value];

            if (index != NSNotFound) {

                self.textField.text = value;

            }

        }

        else {

            self.textField.text = nil;

        }

    }

    @end

    ```'
  raw: 'You added some custom initialization code to initWithStyle:reuseIdentifier:.
    This is where you instantiate the datePicker property and assign it to the textField
    inputView property. Normally inputView is nil. This tells iOS to use the keyboard
    input view for the textField. By assigning it an alternate view, you’re telling
    iOS to show the alternate view when editing the textField.


    SuperDBDateCell overrides the value property to make sure you display and return
    an NSDate, rather than an NSString. This is where you use the __dateFormatter
    to convert the date to a string, then assign it to the textField text property.


    Finally, you implement the datePicker’s callback for when you change the date
    via the UI. Every time you change the date in the datePicker, you update the textField
    to reflect that change.


    Using the DatePicker SuperDBEditCell Subclass


    Let’s review how the table view cells are created. In the HeroDetailController,
    you created the cells in the tableView:cellForRowAtIndexPath: method. When you
    first wrote this method, you created an instance UITableViewCell. Later, you replaced
    this with an instance of your custom subclass, SuperDBEditCell. Now you‘ve created
    another subclass for a specific IndexPath, the IndexPath displaying the birthdate
    attribute. How can you tell your application which custom subclass to use? That’s
    right, you’ll add that information to your property list: HeroDetailController.plist.


    Single-click HeroDetailController.plist. Expand all the disclosure triangles,
    so you can see all the elements. Navigate down sections ![image](images/arrow.jpg)
    Item 0 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg) Item 0 ![image](images/arrow.jpg)
    key. Single-click the key row so that it is highlighted. Click the ***+*** button
    next to key. Rename this row from New Item to **class**. In the value column,
    type **SuperDBEditCell**. Repeat this for all the key rows under sections ![image](images/arrow.jpg)
    Item 1\. They should all have the value SuperDBEditCell, except for the class
    row below the birthdate key. That should have a value of SuperDBDateCell ([Figure
    4-27](#9781430238072_Ch04.xhtml#Fig27)).


    ![9781430238072_Fig04-27.jpg](images/9781430238072_Fig04-27.jpg)


