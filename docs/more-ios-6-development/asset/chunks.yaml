    \ {\n    }\n    /* AVPlayer \"rate\" 属性值观察者 */\n    else if (context == AVPlayerViewControllerRateObservationContext)\
    \ {\n    }\n    /* AVPlayer \"currentItem\" 属性值观察者 */\n    else if (context ==\
    \ PlayerViewControllerCurrentItemObservationContext) {\n    }\n    else {\n  \
    \      NSLog(@\"其他上下文\");\n        [super observeValueForKeyPath:path ofObject:object\
    \ change:change context:context];\n    }\n}\n```\n\n您为在 `PlayerViewController`\
    \ 中定义的每个上下文常量添加了钩子。如果上下文未知，则通过调用 `super` 将其传递到视图控制器层次结构中。我们保持每个上下文部分为空，因为处理每个上下文本身就是一个话题，我们想逐一详细讲解。\n\
    \n接下来，我们要让您做一些当前可能还不清楚的工作，但一旦实现上下文处理程序和操作方法，就会变得清晰。首先，您需要将 `CoreMedia` 框架添加到项目中。在导航窗格中选择项目，然后通过“构建阶段”窗格将\
    \ `CoreMedia` 框架添加到 `AVMediaPlayer` 目标中。返回编辑 `PlayerViewController.m` 并导入 `CoreMedia`\
    \ 头文件。\n\n```\n#import <CoreMedia/CoreMedia.h>\n```\n\n您将声明并实现一些私有分类属性方法，这些方法将在上下文处理程序和操作方法中使用。\n\
    \n```\n@interface PlayerViewController ()\n@property (assign, nonatomic) float\
    \ prescrubRate;\n@property (strong, nonatomic) id playerTimerObserver;\n\n- (void)showPlay;\n\
    - (void)showPause;\n- (void)updatePlayPause;\n- (void)updateRate;\n\n- (void)addPlayerTimerObserver;\n\
    - (void)removePlayerTimerObserver;\n- (void)updateScrubber:(CMTime)currentTime;\n\
    \n- (void)playerItemDidReachEnd:(NSNotification *)notification;\n\n- (void)handleStatusContext:(NSDictionary\
    \ *)change;\n- (void)handleRateContext:(NSDictionary *)change;\n- (void)handleCurrentItemContext:(NSDictionary\
    \ *)change;\n@end\n```\n\n在实现这些方法时，我们将逐一讨论。\n\n`showPlay` 和 `showPause` 方法只是用于切换工具栏上“播放”和“暂停”按钮的便捷方法。\n\
    \n```\n- (void)showPlay\n{\n    NSMutableArray *toolbarItems = [NSMutableArray\
    \ arrayWithArray:self.toolbar.items];\n    [toolbarItems replaceObjectAtIndex:2\
    \ withObject:self.play];\n    self.toolbar.items = toolbarItems;\n}\n\n- (void)showPause\n\
    {\n    NSMutableArray *toolbarItems = [NSMutableArray arrayWithArray:self.toolbar.items];\n\
    \    [toolbarItems replaceObjectAtIndex:2 withObject:self.pause];\n    self.toolbar.items\
    \ = toolbarItems;\n}\n```\n\n您需要一个方法来检查是显示“播放”还是“暂停”按钮。您可以通过播放器的 `rate` 属性来判断媒体是否正在播放。`0.0f`\
    \ 的速率表示媒体未在播放。\n\n```\n- (void)updatePlayPause\n{\n    if (self.player.rate ==\
    \ 0.0f)\n        [self showPlay];\n    else\n        [self showPause];\n}\n```\n\
    \n`updateRate` 方法仅用于设置“速率”按钮的文本。您添加了一个钩子，使得当播放器实际速率为 `0.0f` 时，按钮显示 `\"1.0x\"`。\n\
    \n```\n- (void)updateRate\n{\n    float rate = self.player.rate;\n    if (rate\
    \ == 0.0f)\n        rate = 1.0f;\n    self.rate.title = [NSString stringWithFormat:@\"\
    %.1fx\", rate];\n}\n```\n\n当播放器正在播放时，您需要添加一个周期性观察者来更新进度条和时间标签。还需要一个方法来移除这个周期性观察者。\n\
    \n```\n- (void)addPlayerTimerObserver\n{\n    __block id blockSelf = self;\n \
    \   self.playerTimerObserver =\n        [self.player addPeriodicTimeObserverForInterval:CMTimeMakeWithSeconds(0.1f,\
    \ NSEC_PER_SEC)\n                                                 queue:nil\n\
    \                                            usingBlock:^(CMTime time){ [blockSelf\
    \ updateScrubber:time]; }];\n}\n\n- (void)removePlayerTimerObserver\n{\n    if\
    \ (self.playerTimerObserver) {\n        [self.player removeTimeObserver:self.playerTimerObserver];\n\
    \        self.playerTimerObserver = nil;\n    }\n}\n```\n\n请注意，`AVPlayer` 的周期性观察者使用了\
    \ `CMTime` 结构。`CMTime` 定义在 `CoreMedia` 框架中，这就是为什么您需要将其包含在此项目中。您将周期性观察者设置为每 `0.1s`\
    \ 触发一次，并调用 `updateScrubber:` 方法。\n\n```\n- (void)updateScrubber:(CMTime)currentTime\n\
    {\n    if (CMTIME_IS_INVALID(self.playerItem.duration)) {\n        self.scrubber.minimumValue\
    \ = 0.0;\n        return;\n    }\n\n    double duration = CMTimeGetSeconds(self.playerItem.duration);\n\
    \    if (isfinite(duration))\n    {\n        float minValue = [self.scrubber minimumValue];\n\
    \        float maxValue = [self.scrubber maximumValue];\n        double time =\
    \ CMTimeGetSeconds([self.player currentTime]);\n        [self.scrubber setValue:(maxValue\
    \ - minValue) * time / duration + minValue];\n\n        Float64 elapsedSeconds\
    \ = CMTimeGetSeconds(currentTime);\n        Float64 remainingSeconds = CMTimeGetSeconds(self.playerItem.duration)\
    \ - elapsedSeconds;\n        self.elapsedTime.text = [NSString stringWithFormat:@\"\
    %d:%02d\",\n                                 (int)elapsedSeconds / 60,\n     \
    \                            (int)elapsedSeconds % 60];\n        self.remainingTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",\n                               \
    \    (int)remainingSeconds / 60,\n                                   (int)remainingSeconds\
    \ % 60];\n    }\n}\n```\n"
- fmt: "`updateScrubber`: first performs a check on the `CMTime` value. If the time\
    \ is invalid, you set the scrubber to `0.0` and return. If the time is valid,\
    \ you query the `playerItem` for its duration. If the duration is finite, then\
    \ you use it to determine where to set the scrubber value. Both the current time\
    \ and duration are used to update the `elapsedTime` and `remainingTime` labels.\n\
    \nThe notification handler method `playerItemDidReachEnd:` has the same effect\
    \ as if you had tapped the Done button, so you simply call the `donePressed:`\
    \ method.\n\nBefore you work on your context handlers, let’s implement your action\
    \ methods.\n\nWhen you begin moving the scrubber, you need to remove the player’s\
    \ periodic observer to keep it from updating while the scrubber slider is being\
    \ adjusted. You cache the current playback rate, and stop the player.\n\n```\n\
    - (IBAction)beginScrubbing:(id)sender\n{\n    self.prescrubRate = self.player.rate;\n\
    \    self.player.rate = 0.0f;\n    [self removePlayerTimerObserver];\n}\n```\n\
    \nThe `scrub:` action updates the player to the playback point that can be calculated\
    \ from the scrubber value and `playerItem` duration. You then use those values\
    \ to update the `elapsedTime` and `remainingTime` labels to reflect the new scrubber\
    \ value.\n\n```\n- (IBAction)scrub:(id)sender\n{\n        if ([sender isKindOfClass:[UISlider\
    \ class]]) {\n                UISlider* slider = sender;\n                if (CMTIME_IS_INVALID(self.playerItem.duration))\
    \ {\n                        return;\n                }\n\ndouble duration = CMTimeGetSeconds(self.playerItem.duration);\n\
    \                if (isfinite(duration)) {\n                    float minValue\
    \ = [slider minimumValue];\n                    float maxValue = [slider maximumValue];\n\
    \                    float value = [slider value];\n                    double\
    \ time = duration * (value - minValue) / (maxValue - minValue);\n            \
    \        [self.player seekToTime:CMTimeMakeWithSeconds(time, NSEC_PER_SEC)];\n\
    \nFloat64 remainingSeconds = duration - time;\n                    self.elapsedTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",                                 \
    \                      (int)time / 60, (int)time % 60];\n                    self.remainingTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",                                 \
    \                         (int)remainingSeconds / 60,                        \
    \                                  (int)remainingSeconds % 60];\n            \
    \    }\n        }\n}\n```\n\nWhen you’ve completed scrubbing, you restore the\
    \ player playback rate and periodic observer.\n\n```\n- (IBAction)endScrubbing:(id)sender\n\
    {\n        if (self.playerTimerObserver == nil) {\n            [self addPlayerTimerObserver];\n\
    \    }\n\nif (self.prescrubRate != 0.0f) {\n            self.player.rate = self.prescrubRate;\n\
    \            self.prescrubRate = 0.0f;\n        }\n}\n```\n\nChanging the volume\
    \ with an `AVPlayer` is much more complicated process. Your media asset could\
    \ have multiple tracks, not just because of video; a stereo audio asset could\
    \ have two tracks. As a result, you need to find all the audio tracks in an asset\
    \ and adjust the audio mix to the new volume.\n\n```\n- (IBAction)volumeChanged:(id)sender\n\
    {\n    float volume = [self.volume value];\n    NSArray *audioTracks = [self.assetItem.asset\
    \ tracksWithMediaType:AVMediaTypeAudio];\n\nNSMutableArray *allAudioParams = [NSMutableArray\
    \ array];\n    for (AVAssetTrack *track in audioTracks) {\n        AVMutableAudioMixInputParameters\
    \ *audioInputParams =             \n  [AVMutableAudioMixInputParameters audioMixInputParameters];\n\
    \        [audioInputParams setVolume:volume atTime:kCMTimeZero];\n        [audioInputParams\
    \ setTrackID:[track trackID]];\n        [allAudioParams addObject:audioInputParams];\n\
    \    }\n\nAVMutableAudioMix *audioMix = [AVMutableAudioMix audioMix];\n    [audioMix\
    \ setInputParameters:allAudioParams];\n\n[self.playerItem setAudioMix:audioMix];\n\
    }\n```\n\n`donePressed:` will stop the player and return you to the `MediaViewController`."
