    and enterprise. All three options give you access to the iOS SDK and Xcode, Apple’s
    integrated development environment (IDE). Xcode includes tools for creating and
    debugging source code, compiling applications, and performance-tuning the applications
    you’ve written. Please note that although you get at Xcode through the developer
    site, your Xcode distribution will be made available to you via the App Store.


    The free option is, as its name implies, free. It lets you develop iOS apps that
