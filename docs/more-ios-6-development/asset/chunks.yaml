  trans: "\n现在你需要添加相应的操作。从 scrubbleSlider 滑块控件拖拽连线，为 `touchDown:` 事件添加一个名为 `beginScrubbing`\
    \ 的新操作。再次从 scrubbleSlider 滑块控件拖拽连线，为 `valueChanged:` 事件添加一个名为 `scrub` 的新操作。最后，为\
    \ `touchUpInside` 事件添加一个名为 `endScrubbing` 的新操作。从音量滑块添加一个新操作，命名为 `volumeChanged`，对应\
    \ `valueChanged` 事件。为每个工具栏按钮添加一个操作：完成按钮（`donePressed`）、播放按钮（`playPressed`）和速率按钮（`ratePressed`）。\n\
    \n返回标准编辑器，选择 `PlayerViewController.h`。你需要导入以下头文件：\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
    #import \"AVPlayerView.h\"\n#import \"AssetItem.h\"\n```\n\n和之前一样，你需要将 `play`\
    \ 属性 outlet 从 weak 重新定义为 strong。同时声明 `pause`（按钮）属性。\n\n```\n@property (strong,\
    \ nonatomic) IBOutlet UIBarButtonItem *play;\n@property (strong, nonatomic)  \
    \        UIBarButtonItem *pause;\n```\n\n你需要为 `AssetItem`、`AVPlayerItem` 和 `AVPlayer`\
    \ 声明属性。\n\n```\n@property (strong, nonatomic) AssetItem *assetItem;\n@property\
    \ (strong, nonatomic) AVPlayerItem *playerItem;\n@property (strong, nonatomic)\
    \ AVPlayer *player;\n```\n\n你将为播放和暂停按钮分别设置各自的操作，因此声明暂停按钮的操作。\n\n```\n- (IBAction)pausePressed:(id)sender;\n\
    ```\n\n在开始实现 `PlayerViewController` 之前，你需要在 `AssetItem` 中添加一个方法，以便准备用于播放的 `AVAsset`。打开\
    \ `AssetItem.h` 并添加以下方法声明：\n\n```\n- (void)loadAssetForPlayingWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem, NSArray *keys))completion;\n```\n\n在 `AssetItem.m`\
    \ 中，实现代码非常简单。\n\n```\n- (void)loadAssetForPlayingWithCompletionHandler:(void (^)(AssetItem\
    \ *assetItem, NSArray *keys))completion;\n{\n    dispatch_async(self.dispatchQueue,\
    \ ^(void){\n        NSArray *keys = @[ @\"tracks\", @\"playable\" ];\n       \
    \ AVAsset *a = [self localAsset];\n        [a loadValuesAsynchronouslyForKeys:keys\
    \ completionHandler:^{\n            /* IMPORTANT: Must dispatch to main queue\
    \ in order to operate on the AVPlayer and AVPlayerItem. */\n            dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n                if (completion)\n                    completion(self, keys);\n\
    \            });\n        }];\n    });\n}\n```\n\n你调度了 `AVAsset` 轨道的异步加载。由于你加载了两个键，因此将对每个键的检查推迟到完成处理程序中进行。所以你只需在主线程上调用完成处理程序即可。\n\
    \n你需要实现方法 `assetHasVideo:`。首先，在 `AssetItem.m` 顶部的私有类别中声明它。\n\n```\n- (BOOL)assetHasVideo:(AVAsset\
    \ *)a;\n```\n\n实现代码可以添加到 `AssetItem` 实现的底部，位于其他私有类别方法之后。\n\n```\n- (BOOL)assetHasVideo:(AVAsset\
    \ *)a\n{\n    NSArray *videoTracks = [a tracksWithMediaType:AVMediaTypeVideo];\n\
    \    return ([videoTracks count] > 0);\n}\n```\n\n你只需查询资源（asset）的视频轨道即可。\n\n现在你可以开始实现\
    \ `PlayerViewController`。首先，需要创建暂停按钮。在 `viewDidLoad` 方法中添加以下几行代码：\n\n```\n   \
    \ self.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
    \                                                                            \
    \                    target:self                                             \
    \                                                   action:@selector(pausePressed:)];\n\
    \    [self.pause setStyle:UIBarButtonItemStyleBordered];\n```\n\n接下来，你需要加载并准备用于播放的资源。这将在\
    \ `viewDidAppear:` 方法中完成。\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n  \
    \  if (self.assetItem) {\n        [self.assetItem loadAssetForPlayingWithCompletionHandler:^(AssetItem\
    \ *assetItem, NSArray *keys){\n```\n\n如果你有 `assetItem`，则调用 `loadAssetForPlayingWithCompletionHandler:`\
    \ 让其准备播放。完成处理程序的第一步是检查每个键的加载状态。\n\n```\n            NSError *error = nil;\n  \
    \          AVAsset *asset = assetItem.asset;\n            for (NSString *key in\
    \ keys) {\n                AVKeyValueStatus status = [asset statusOfValueForKey:key\
    \ error:&error];\n                if (status == AVKeyValueStatusFailed) {\n  \
    \                  NSLog(@\"Asset Load Failed: %@ | %@\", [error localizedDescription],\
    \ [error localizedFailureReason]);\n                    return;\n            \
    \    }\n                // handle AVKeyValueStatusCancelled\n            }\n```\n\
    \n作为合理性检查，我们查看底层的 `AVAsset` 是否可播放。\n\n```\n            if (!asset.playable) {\n\
    \                NSLog(@\"Asset Can’t be Played\");\n                return;\n\
    \            }\n```\n\n如果你已经分配了 `playerItem` 属性，则需要移除一个观察者。\n\n```\n         \
    \   if (self.playerItem) {\n                [self.playerItem removeObserver:self\
    \ forKeyPath:@\"status\"];\n                [[NSNotificationCenter defaultCenter]\
    \                     \n                removeObserver:self                  \
    \             \n                name:AVPlayerItemDidPlayToEndTimeNotification\
    \                             \n                object:self.playerItem];\n   \
    \         }\n```\n\n你将一个新的 `AVPlayerItem` 分配给 `playerItem` 属性。由于你使用 ARC，之前的任何实例都将被自动释放。这就是为什么在之前的步骤中移除了观察者。\n\
    \n```\n            self.playerItem = [AVPlayerItem playerItemWithAsset:asset];\n\
    ```\n\n你为 `playerItem` 的 `status` 键路径添加一个观察者。\n\n```\n            [self.playerItem\
    \ addObserver:self                               \n            forKeyPath:@\"\
    status\"                                  \n            options:NSKeyValueObservingOptionInitial\
    \ | NSKeyValueObservingOptionNew                                  \n         \
    \   context:PlayerViewControllerStatusObservationContext];\n```\n\n注意使用了 `PlayerViewControllerStatusObservationContext`。这是一个稍后你会声明的特殊常量。使用这个常量可以简化\
    \ `AVPlayerItem` 通知的注册和识别。\n\n你添加了另一个观察者，这次是针对默认通知中心。你将为 `AVPlayerItemDidPlayToEndTimeNotification`\
    \ 调用方法 `playerItemDidReachEnd:`。\n\n```\n            [[NSNotificationCenter defaultCenter]\
    \ addObserver:self                                                    \n     \
    \       selector:@selector(playerItemDidReachEnd:)                           \
    \                             \n            name:AVPlayerItemDidPlayToEndTimeNotification\
    \                                                       \n            object:self.playerItem];\n\
    ```\n\n如果 `player` 属性未被赋值，则使用 `playerItem` 属性创建一个。然后你为 `player` 的 `currentItem`\
    \ 和 `rate` 键路径添加两个观察者。再次注意，你使用了两个特殊常量：`PlayerViewControllerCurrentItemObservationContext`\
    \ 和 `AVPlayerViewControllerRateObservationContext`。\n\n```\n            if (self.player\
    \ == nil) {\n                self.player = [AVPlayer playerWithPlayerItem:self.playerItem];\n\
    \                [self.player addObserver:self                               \n\
    \                forKeyPath:@\"currentItem\"                                 \
    \ \n                options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
    \                                  \n                context:PlayerViewControllerCurrentItemObservationContext];\n\
    \                [self.player addObserver:self                               \n\
    \                forKeyPath:@\"rate\"                                    \n  \
    \              options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
    \                                  \n                context:AVPlayerViewControllerRateObservationContext];\n\
    \            }\n```\n"
- fmt: "Next you make sure the player's `playerItem` is correct.\n\n```\nif (self.player.currentItem\
    \ != self.playerItem)\n    [[self player] replaceCurrentItemWithPlayerItem:self.playerItem];\n\
    ```\n\nFinally, you do some initialization of UI components. If the asset is a\
    \ video, you hide the image view, as you don’t need it.\n\n```\nself.artist.text\
    \ = self.assetItem.artist;\nself.song.text = self.assetItem.title;\nself.imageView.image\
    \ = self.assetItem.image;\nself.imageView.hidden = self.assetItem.isVideo;\nself.scrubber.value\
    \ = 0.0f;\n```\n\nLet’s declare the three observation context constants you used.\
    \ At the top of `PlayerViewController.m`, just after the import declaration, add\
    \ the following:\n\n```\nstatic void *PlayerViewControllerStatusObservationContext\
    \ =\n    &PlayerViewControllerStatusObservationContext;\nstatic void *PlayerViewControllerCurrentItemObservationContext\
    \ =\n    &PlayerViewControllerCurrentItemObservationContext;\nstatic void *AVPlayerViewControllerRateObservationContext\
    \ =\n    &AVPlayerViewControllerRateObservationContext;\n```\n\nThis is just a\
    \ fancy way of defining some constant context values. You could have used string\
    \ values if you wanted, but this is a bit cleaner.\n\nSo you added your `PlayerViewController`\
    \ as an observer for your `AVPlayer` and `AVPlayerItem`. Unlike default notification\
    \ center observers, you didn’t specify what method to invoke. Rather the `AVPlayer`\
    \ and `AVPlayerItem` observer will depend on a key-value observer. All you need\
    \ to do is implement the method `observeValueForKeyPath:ofObject:change:context:`.\
    \ This method will need to check the context value to decide what to do.\n\n```\n\
    - (void)observeValueForKeyPath:(NSString *)path\n                      ofObject:(id)object\n\
    \                        change:(NSDictionary *)change\n                     \
    \  context:(void *)context\n{\n    /* AVPlayer \"playerItem\" property value observer.\
    \ */\n    if (context == PlayerViewControllerStatusObservationContext) {\n   \
    \ }\n    /* AVPlayer \"rate\" property value observer. */\n    else if (context\
    \ == AVPlayerViewControllerRateObservationContext) {\n    }\n    /* AVPlayer \"\
    currentItem\" property value observer. */\n    else if (context == PlayerViewControllerCurrentItemObservationContext)\
    \ {\n    }\n    else {\n        NSLog(@\"Other Context\");\n        [super observeValueForKeyPath:path\
    \ ofObject:object change:change context:context];\n    }\n}\n```\n\nYou added\
    \ hooks for each of the context constants you defined in your `PlayerViewController`.\
    \ If the context is unknown, you pass it up the view controller hierarchy with\
    \ a call to `super`. We’ve left each context section empty because handling each\
    \ context is a discussion of itself, and we want to go over each one in detail.\n\
    \nWe’re going to have you do some work that won’t necessarily be clear right now,\
    \ but will become clear once you implement your context handlers and action methods.\
    \ First, you need to add the `CoreMedia` framework to your project. Select the\
    \ project in the Navigator pane, and add the `CoreMedia` framework to the `AVMediaPlayer`\
    \ target via the Build Phases pane. Return to editing `PlayerViewController.m`\
    \ and import the `CoreMedia` header.\n\n```\n#import <CoreMedia/CoreMedia.h>\n\
    ```\n\nYou’re going to declare and implement some private category properties\
    \ methods that you’ll need for your context handlers and action methods.\n\n```\n\
    @interface PlayerViewController ()\n@property (assign, nonatomic) float prescrubRate;\n\
    @property (strong, nonatomic) id playerTimerObserver;\n\n- (void)showPlay;\n-\
    \ (void)showPause;\n- (void)updatePlayPause;\n- (void)updateRate;\n\n- (void)addPlayerTimerObserver;\n\
    - (void)removePlayerTimerObserver;\n- (void)updateScrubber:(CMTime)currentTime;\n\
    \n- (void)playerItemDidReachEnd:(NSNotification *)notification;\n\n- (void)handleStatusContext:(NSDictionary\
    \ *)change;\n- (void)handleRateContext:(NSDictionary *)change;\n- (void)handleCurrentItemContext:(NSDictionary\
    \ *)change;\n@end\n```\n\nYou’ll discuss each of these as you implement them.\n\
    \nThe `showPlay` and `showPause` methods are just convenience methods to toggle\
    \ the Play and Pause buttons on the toolbar.\n\n```\n- (void)showPlay\n{\n   \
    \ NSMutableArray *toolbarItems = [NSMutableArray arrayWithArray:self.toolbar.items];\n\
    \    [toolbarItems replaceObjectAtIndex:2 withObject:self.play];\n    self.toolbar.items\
    \ = toolbarItems;\n}\n\n- (void)showPause\n{\n    NSMutableArray *toolbarItems\
    \ = [NSMutableArray arrayWithArray:self.toolbar.items];\n    [toolbarItems replaceObjectAtIndex:2\
    \ withObject:self.pause];\n    self.toolbar.items = toolbarItems;\n}\n```\n\n\
    You need a method to check whether to show the Play or Pause button. You know\
    \ if the media is playing based on the player's `rate` property. A rate of `0.0f`\
    \ means the media is not playing.\n\n```\n- (void)updatePlayPause\n{\n    if (self.player.rate\
    \ == 0.0f)\n        [self showPlay];\n    else\n        [self showPause];\n}\n\
    ```\n\nThe `updateRate` method is just used to set the text of the Rate button.\
    \ You add a hook so the button shows `\"1.0x\"` if the actual player rate is `0.0f`.\n\
    \n```\n- (void)updateRate\n{\n    float rate = self.player.rate;\n    if (rate\
    \ == 0.0f)\n        rate = 1.0f;\n    self.rate.title = [NSString stringWithFormat:@\"\
    %.1fx\", rate];\n}\n```\n\nWhile the player is playing, you need to add a periodic\
    \ observer to update the scrubber and time labels. You also need a method to remove\
    \ the periodic observer.\n\n```\n- (void)addPlayerTimerObserver\n{\n    __block\
    \ id blockSelf = self;\n    self.playerTimerObserver =\n        [self.player addPeriodicTimeObserverForInterval:CMTimeMakeWithSeconds(0.1f,\
    \ NSEC_PER_SEC)\n                                                 queue:nil\n\
    \                                            usingBlock:^(CMTime time){ [blockSelf\
    \ updateScrubber:time]; }];\n}\n\n- (void)removePlayerTimerObserver\n{\n    if\
    \ (self.playerTimerObserver) {\n        [self.player removeTimeObserver:self.playerTimerObserver];\n\
    \        self.playerTimerObserver = nil;\n    }\n}\n```\n\nNote that the `AVPlayer`\
    \ periodic observer uses the `CMTime` structure. `CMTime` is defined in the `CoreMedia`\
    \ framework, which is why you needed to include it in this project. You have the\
    \ periodic observer fire every `0.1s` and invoke the `updateScrubber:` method.\n\
    \n```\n- (void)updateScrubber:(CMTime)currentTime\n{\n    if (CMTIME_IS_INVALID(self.playerItem.duration))\
    \ {\n        self.scrubber.minimumValue = 0.0;\n        return;\n    }\n\n   \
    \ double duration = CMTimeGetSeconds(self.playerItem.duration);\n    if (isfinite(duration))\n\
    \    {\n        float minValue = [self.scrubber minimumValue];\n        float\
    \ maxValue = [self.scrubber maximumValue];\n        double time = CMTimeGetSeconds([self.player\
    \ currentTime]);\n        [self.scrubber setValue:(maxValue - minValue) * time\
    \ / duration + minValue];\n\n        Float64 elapsedSeconds = CMTimeGetSeconds(currentTime);\n\
    \        Float64 remainingSeconds = CMTimeGetSeconds(self.playerItem.duration)\
    \ - elapsedSeconds;\n        self.elapsedTime.text = [NSString stringWithFormat:@\"\
    %d:%02d\",\n                                 (int)elapsedSeconds / 60,\n     \
    \                            (int)elapsedSeconds % 60];\n        self.remainingTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",\n                               \
    \    (int)remainingSeconds / 60,\n                                   (int)remainingSeconds\
    \ % 60];\n    }\n}\n```"
