    Wonderful to the Core


    This chapter and the previous chapters have given you a solid foundation in the
    use of Core Data. Along the way, we provided some information about how to design
    complex iPhone applications so that they can be maintained and expanded without
    writing unnecessary code or repeating the same logic in multiple places. We demonstrated
    just how much benefit you can get from taking the time to write code generically.
    We showed you how to look for opportunities to refactor your code to make it smaller,
    more efficient, easier to maintain, and just generally more pleasant to be around.


    We could go on for several more chapters about Core Data and not exhaust the topic.
    But Core Data is not the only new framework introduced since iOS SDK 3\. At this
    point, you should have a solid enough understanding of Core Data to be able to,
    armed with Apple’s documentation, take your explorations even further.


    Now it’s time to leave our friend Core Data behind and explore some of the other
    aspects of iOS SDK.


    Chapter    8


    Behind Every iCloud


    With iOS 5, Apple introduced iCloud, the latest in its line of Internet-based
    tools and services. To the end user, iCloud extends Apple’s previous MobileMe
    offerings of e-mail, contact management, and Find My iPhone, with iOS backup and
    restore, iTunes Match, Photo Stream, and Back to My Mac.


    For all the bells and whistles that Apple has built, at its heart iCloud is a
    cloud-based storage and synchronization service. Its main purpose is to allow
    users to access their content across all their devices: iPhone, iPad, or Mac.
    Best of all, Apple has given iOS developers a set of APIs for accessing iCloud.
    This lets you build apps that can take advantage of the same iCloud features as
    Apple without having to invest in building an extensive server infrastructure.
    Even better, you don’t have to learn a new complicated SDK. Rather than providing
    a new iCloud framework, Apple added new classes to existing frameworks, primarily
    Foundation and UIKit, and extended existing classes to enable iCloud access.


    The basic idea behind iCloud is to have a single place where apps can store and
    access data. Changes made by one instance of your app on one device can be instantly
    propagated to another instance of the app running on another device. At the same
    time, iCloud provides an authoritative copy of your application’s data. This data
    can be used to restore your application’s state on a new device, providing a seamless
    user experience as well as backup data.


    Data Storage with iCloud


    There are a few different ways to store your data in iCloud.


    *   *iOS Backup*: This is a global device configuration that backs up your iOS
    device to iCloud.

    *   *Key-Value Data Storage*: Used for storing small amounts of infrequently changing
    data used by your application.

    *   *Document Storage*: Used for storing user documents and application data.

    *   *Core Data with iCloud*: Puts your application’s persistent backing store
    on iCloud.


    Before we discuss these storage mechanisms in detail, let’s review how iCloud
    and iOS work together.


    iCloud Basics


    Inside your iCloud application there is a ubiquity container. Depending on the
    storage type used, you may explicitly define the URL for this container or iOS
    will create one for you. The ubiquity container is where iCloud data is stored
    by your application. iOS will synchronize the data between your device and iCloud.
    This means that any changes your application makes to data in the ubiquity container
    will be sent to iCloud. Conversely, any changes in iCloud will be sent to your
    application’s ubiquity container on your device.


    Now, iOS doesn’t send the entire data file back and forth from iCloud for every
    change. Internally, iOS and iCloud break up your application’s data into smaller
    chunks of data. When changes occur, only the chunks that have changed are synchronized
    with iCloud. On iCloud, your application data is versioned, keeping track of each
    set of changes.


    In addition to breaking up your application’s data into chunks, iOS and iCloud
    will send the data file’s metadata. Since the metadata is relatively small and
    important, the metadata is sent all the time. In fact, iCloud will know a data
    file’s metadata before the actual data is synchronized. This is especially important
    with iOS. Since an iOS device may be space and bandwidth constrained, iOS won’t
    necessarily automatically download data from iCloud until it needs it. But since
    iOS has the metadata, it knows when its copy is out of date with iCloud.


    **Note**  Interestingly, if iOS detects another iOS device on the same WiFi network,
    rather than sending data up to iCloud and down to the other device, iOS will simply
    transfer the data from one device to the other.


    iCloud Backup


    Backup is an iOS system service offered by iCloud. It automatically backs up your
    iOS device daily over WiFi. Everything in your application’s home directory is
    backed up. The application bundle, caches directory, and temp directory are ignored
    by iOS. Since the data is transmitted over WiFi and sent to Apple’s iCloud data
    center, you should try to keep your application’s data as small as possible. The
    more data, the longer the backup time and the more iCloud storage your users will
    consume.'
