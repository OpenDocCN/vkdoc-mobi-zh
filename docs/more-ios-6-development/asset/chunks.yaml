    在进度视图下方再放置一个标签。调整标签的大小，使其从左边距延伸到右边距。使用属性检查器将文本对齐方式从“左对齐”更改为“居中对齐”。'
  raw: 'The first mechanism we’re going to look at is the *timer*. Timers are objects
    that can be scheduled with the run loop, much like the networking classes you’ve
    worked with. Timers can call methods on specific objects at set intervals. You
    can set a timer to call a method on one of your controller classes, for example,
    ten times per second. Once you kick it off, approximately every tenth of a second,
    your method will fire until you tell the timer to stop.


    Neither run loop scheduling nor timers are what some people would consider “true”
    forms of concurrency. Most people refer to run loops and timers as asynchronous
    computing, where tasks are run in the background, hidden from the application’s
    user facing operations. In both cases, the application’s main run loop will check
    for certain conditions, and if those conditions are met, it will call out to a
    specific method on a specific object. If the method that gets called runs for
    too long, however, your interface will become unresponsive. But, working with
    run loops and timers is considerably less complex than implementing what we might
    call “true” concurrency, which is to have multiple tasks (and multiple run loops)
    functioning at the same time.


    The other mechanism we’re going to look at is relatively new in the Objective-C
    world. It’s called an *operation queue*, and it works together with special objects
    you create called *operations*. The operation queue can manage multiple operations
    at the same time, and it makes sure that those operations get processing time
    based on some simple rules that you set down. Each operation has a specific set
    of commands that take the form of a method you write, and the operation queue
    will make sure that each operation’s method gets run in such a way as to make
    good use of the available system resources.


    Operation queues are really nice because they are a high-level abstraction and
    hide the nitty-gritty implementation details involved with implementing true concurrency.
    In iOS, queues leverage an operating system feature called *threads* to give processing
    time to the various operations they manage. Apple is currently recommending the
    use of operation queues rather than threads, not only because operation queues
    are easier to use, but also because they give your application other advantages.


    **Note**  Even though it’s not available when using the iPhone SDK, another form
    of concurrency is multiprocessing, using the UNIX system calls fork() and exec()
    or Cocoa’s NSTask class. Using multiple processes is more heavy-weight than using
    threads.


    Grand Central Dispatch (GCD) is a technology that allows applications to take
    greater advantage of the fact that modern computers have multiple processing cores
    and sometimes multiple processors. If you used an operation queue in your program
    back before GCD was released, when you recompiled your application for iOS, your
    code automatically received the benefit of GCD for free. If you had used another
    form of concurrency, such as threads, instead of operation queues, your application
    would not have automatically benefitted from GCD.


    You can probably see why we’re limiting our discussion of “true” concurrency to
    operation queues. They are clearly the way of the future for both Cocoa and Cocoa
    Touch. They make our lives as programmers considerably easier and they help us
    take advantage of technologies that haven’t even been written yet. What could
    be better?


    Let’s start with a little detour to look at the problem that concurrency solves.


    Exploring the Concurrency Problem


    Before we explore ways of solving the concurrency problem, let’s make sure you
    understand the problem. You’re going to build a small application that will demonstrate
    the problem that arises when you try to do too much at one time on the application’s
    main thread. Every application has at least one thread of execution, and that’s
    the one where the application’s main run loop is running. All action methods fire
    on the main thread and all event processing and user interface updating is also
    done from the main thread. If any method that fires on the main thread takes too
    long to finish, the user interface will freeze up and become unresponsive.


    Your small application is going to calculate square roots. Lots and lots of square
    roots. The user will be able to enter a number, and you’ll calculate the square
    root for every number from 1 up to the number they specify ([Figure 14-1](#9781430238072_Ch14.xhtml#Fig1)).
    Your only goal in this exercise is to burn processor cycles.


    ![9781430238072_Fig14-01.jpg](images/9781430238072_Fig14-01.jpg)


    [Figure 14-1.](#9781430238072_Ch14.xhtml#_Fig1)  The Stalled application will
    demonstrate the problem of trying to do too much work on the application’s main
    thread


    With a sufficiently large number entered, when the Go button is tapped, the user
    interface will become completely unresponsive for several seconds or even longer.
    The progress bar and progress label, whose properties will be set each time through
    the loop, won’t actually show any changes to the user until all the values in
    the loop have been calculated. Only the last calculation will be reflected in
    the user interface.


    Creating the Stalled Application


    In Xcode, create a new project using the Single View Application template and
    call this project Stalled. You’ll start by designing your interface and declaring
    your outlets and actions. Then you’ll write the implementation of your view controller
    and try it out.


    Designing the Interface


    Select ViewController.xib to enter Interface Builder mode. Drag a round rect button
    from the library to the view, placing the button against the upper-right margins
    using the blue guides. Double-click the button and change its title to Go.


    Drag a text field from the library and place it to the left of the button. Use
    the blue guides to line up the text field and place it the correct distance from
    the button. Resize the text field to about two-third of its original size, or
    use the size inspector and change its width to 70 pixels. Double-click the text
    field and set its default value to 100000\. In the Attribute Inspector, change
    the Keyboard from Default to Number Pad to restrict entry to only numbers.


    Drag a label from the library and place it to the left of the text field. Double-click
    it to change its text to read # of Operations and then adjust its size and placement
    to fit in the available space. You can use [Figure 14-1](#9781430238072_Ch14.xhtml#Fig1)
    as a guide.


    Bring over a progress view and place it below the three items already on the interface.
    We placed it a little more than the minimum distance below them as indicated by
    the blue guides, but exact placement really doesn’t matter much with this application.
    Once you place the progress bar, use the resize handles to change its width so
    it takes up all the space from the left margin to the right margin. Next, use
    the Attribute Inspector to change the Progress field to 0.0.


    Place one more label below the progress view. Resize the label so it is stretches
    from the left to the right margins. Use the Attributes Inspector to change the
    text alignment from Left Alignment to Center Alignment.'
  trans: '

    第一个要介绍的机制是*定时器*（`timer`）。定时器是可以与运行循环一起调度的对象，与你之前使用过的网络类非常相似。定时器可以按设定的时间间隔调用特定对象的方法。例如，你可以设置一个定时器，让它每秒调用控制器类的方法十次。一旦启动，大约每十分之一秒，你的方法就会被触发，直到你告诉定时器停止。


    无论是运行循环调度还是定时器，都不是某些人认为的“真正”的并发形式。大多数人将运行循环和定时器称为异步计算，即任务在后台运行，对应用程序的用户界面操作不可见。在这两种情况下，应用程序的主运行循环都会检查某些条件，如果条件满足，它会调用特定对象上的特定方法。然而，如果被调用的方法运行时间过长，你的界面就会变得无响应。但是，使用运行循环和定时器比实现所谓的“真正”并发（即同时运行多个任务和多个运行循环）要简单得多。


    我们要介绍的另一个机制在 Objective-C 世界中相对较新。它被称为*操作队列*（`operation queue`），它与你创建的名为*操作*（`operations`）的特殊对象协同工作。操作队列可以同时管理多个操作，并确保这些操作根据你设定的一些简单规则获得处理时间。每个操作都有一组特定的命令，这些命令以你编写的方法形式存在，操作队列会确保每个操作的方法以充分利用可用系统资源的方式运行。


    操作队列非常棒，因为它们是一种高级抽象，隐藏了实现真正并发所涉及的繁琐实现细节。在 iOS 中，队列利用一个名为*线程*（`threads`）的操作系统特性为其管理的各种操作分配处理时间。Apple
    目前推荐使用操作队列而不是线程，这不仅是因为操作队列更易于使用，还因为它们能为你的应用程序带来其他优势。


    **注意：** 尽管在使用 iPhone SDK 时不可用，但并发的另一种形式是多进程处理，即使用 UNIX 系统调用 `fork()` 和 `exec()`
    或 Cocoa 的 `NSTask` 类。使用多进程比使用线程更重量级。


    Grand Central Dispatch（GCD）是一种允许应用程序更好地利用现代计算机拥有多个处理核心（有时甚至是多个处理器）这一事实的技术。如果你在
    GCD 发布之前在程序中使用过操作队列，那么当你为 iOS 重新编译应用程序时，你的代码会自动免费获得 GCD 带来的好处。如果你使用了其他形式的并发（例如线程）而不是操作队列，你的应用程序就不会自动受益于
    GCD。


    你可能已经明白为什么我们将对“真正”并发的讨论局限于操作队列。它们显然是 Cocoa 和 Cocoa Touch 的未来发展方向。它们大大简化了我们作为程序员的生活，并帮助我们利用尚未被编写出来的技术。还有什么比这更好的呢？


    让我们先绕个小弯，看看并发所要解决的问题。


