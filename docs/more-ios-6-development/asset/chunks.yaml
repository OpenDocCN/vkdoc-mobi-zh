- fmt: 'Under the hood, Game Kit sessions leverage Bonjour, Apple’s technology for
    zero-configuration networking and device discovery. As a result, devices using
    Game Kit are capable of finding each other on the network without the user needing
    to enter an IP address or domain name.


    ### In Game Voice


    In Game Voice allows you to add voice chat to your game, allowing players to communicate
    with each other. This can be done with either through the Game Center Service
    or Peer-to-Peer Connectivity.


    Each Game Kit client gets assigned a unique identifier. Game Kit does not provide
    a mechanism to generate this identifier; it’s up to you to provide one. Once you
    have an identifier, you need a way to discover other game instances to initiate
    a voice chat. That discovery can be handled in a number of ways. For Peer-to-Peer
    Connectivity, you could use the session to find another player. With Game Center,
    you can use Game Center’s multiplayer mechanism to find other players.


    Once another player is found, In Game Voice makes it easy to start and stop voice
    chats between players.


    ### This Chapter’s Application


    In this chapter, you’re going to explore Game Kit by writing a simple networked
    game. You’ll write a two-player version of tic-tac-toe ([Figure 9-2](#9781430238072_Ch09.xhtml#Fig2))
    that will use Game Kit to let people on two different iPhones or iPod touches
    play against each other over Bluetooth. You won’t be implementing online play
    over the Internet or local area network in this chapter.


    ![9781430238072_Fig09-02.jpg](images/9781430238072_Fig09-02.jpg)


    [Figure 9-2.](#9781430238072_Ch09.xhtml#_Fig2)  You’ll use a simple game of tic-tac-toe
    to learn the basics of Game Kit


    When users launch your application, they will be presented with an empty tic-tac-toe
    board and a single button labeled **New Game**. (For the sake of simplicity, you’re
    not going to implement a single-device mode to let two players play on the same
    device.) When the user presses the New Game button, the application will start
    looking for Bluetooth peers using the peer picker ([Figure 9-3](#9781430238072_Ch09.xhtml#Fig3)).


    ![9781430238072_Fig09-03.jpg](images/9781430238072_Fig09-03.jpg)


    [Figure 9-3.](#9781430238072_Ch09.xhtml#_Fig3)  When the user presses the New
    Game button, it will launch the peer picker to look for other devices running
    the tic-tac-toe game


    If another device within range runs the TicTacToe application and the user also
    presses the New Game button, the two devices will find each other and the peer
    pickerwill present a dialog to the users, letting them choose among the available
    peers ([Figure 9-4](#9781430238072_Ch09.xhtml#Fig4)).


    ![9781430238072_Fig09-04.jpg](images/9781430238072_Fig09-04.jpg)


    [Figure 9-4.](#9781430238072_Ch09.xhtml#_Fig4)  When another device within range
    starts a game, the two devices will show up in each other’s peer picker dialog


    After one player selects a peer, the iPhone will attempt to make a connection
    ([Figure 9-5](#9781430238072_Ch09.xhtml#Fig5)). Once the connection is established,
    the other person will be asked to accept or refuse the connection ([Figure 9-6](#9781430238072_Ch09.xhtml#Fig6)).
    If the connection is accepted, the two applications will negotiate to see who
    goes first. Each side will randomly select a number, the numbers will be compared,
    and the highest number will go first. Once that decision is made, play will commence
    ([Figure 9-7](#9781430238072_Ch09.xhtml#Fig7)) until someone wins ([Figure 9-8](#9781430238072_Ch09.xhtml#Fig8)).


    ![9781430238072_Fig09-05.jpg](images/9781430238072_Fig09-05.jpg)


    [Figure 9-5.](#9781430238072_Ch09.xhtml#_Fig5)  Establishing the connection


    ![9781430238072_Fig09-06.jpg](images/9781430238072_Fig09-06.jpg)


    [Figure 9-6.](#9781430238072_Ch09.xhtml#_Fig6)  Asking the other player to accept
    the connection


    ![9781430238072_Fig09-07.jpg](images/9781430238072_Fig09-07.jpg)


    [Figure 9-7.](#9781430238072_Ch09.xhtml#_Fig7)  The user whose turn it is can
    tap any available space. That space will get an X or an O on both users’ devices


    ![9781430238072_Fig09-08.jpg](images/9781430238072_Fig09-08.jpg)


    [Figure 9-8.](#9781430238072_Ch09.xhtml#_Fig8)  We have a winner!


    If the connection is lost for whatever reason, the iPhone will report the lost
    connection to the user ([Figure 9-9](#9781430238072_Ch09.xhtml#Fig9)).


    ![9781430238072_Fig09-09.jpg](images/9781430238072_Fig09-09.jpg)


    [Figure 9-9.](#9781430238072_Ch09.xhtml#_Fig9)  Lost connection alert


    ## Network Communication Models


    Before we look at how Game Kit and the peer picker work, let’s talk generally
    about communication models used in networked programs so that we’re all on the
    same page in terms of terminology.


    ### Client–server Model


    You’re probably familiar with the client–server model, as it is the model used
    by the World Wide Web. Machines called *servers* listen for connections from other
    machines, referred to as *clients*. The server then takes actions based on the
    requests received from the clients. In the context of the Web, the client is usually
    a web browser, and there can be any number of clients attaching to a single server.
    The clients never communicate with each other directly, but direct all communications
    through the server. Most massively multiplayer online role-playing games (MMORPGs)
    like World of Warcraft also use this model. [Figure 9-10](#9781430238072_Ch09.xhtml#Fig10)
    represents a client–server scenario.


    ![9781430238072_Fig09-10.jpg](images/9781430238072_Fig09-10.jpg)


    [Figure 9-10.](#9781430238072_Ch09.xhtml#_Fig10)  The client–server model features
    one machine acting as a server with all communications—even communications between
    clients—going through the server


    In the context of an iPhone application, a client–server setup is where one phone
    acts as a server and listens for other iPhones running the same program. The other
    phones can then connect to that server. If you’ve ever played a game where one
    machine “hosts” a game and others then join the game, that game is almost certainly
    using a client–server model.


    A drawback with the client–server model is that everything depends on the server,
    which means that the game cannot continue if anything happens to the server. If
    the user whose phone is acting as the server quits, crashes, or moves out of range,
    the entire game is ended. Since all the other machines communicate through the
    central server, they lose the ability to communicate if the server is unavailable.
    This is generally not an issue with client–server games where the client is a
    hefty server farm connected to the Internet by redundant high-speed lines, but
    it certainly can be an issue with mobile games.


    ### Peer-to-Peer Model


    In the peer-to-peer model, all the individual devices (called *peers*) can communicate
    with each other directly. A central server may be used to initiate the connection
    or to facilitate certain operations, but the main distinguishing feature of the
    peer-to-peer model is that peers can talk to each other directly and can continue
    to do so even in the absence of a server ([Figure 9-11](#9781430238072_Ch09.xhtml#Fig11)).


    ![9781430238072_Fig09-11.jpg](images/9781430238072_Fig09-11.jpg)


    [Figure 9-11.](#9781430238072_Ch09.xhtml#_Fig11)  In the peer-to-peer model, peers
    can talk to each other directly and can continue to do so even in the absence
    of a server


    The peer-to-peer model was popularized by file-sharing services like BitTorrent.
    A centralized server is used to find other peers that have the file you are looking
    for, but once the connection is made to those other peers, they can continue,
    even if the server goes offline.'
