  trans: "\n图 6-18. 带有渐变背景的颜色选择器\n\n## 还有一件事\n\n运行应用，新增一位英雄。进入编辑模式并清空`Name`字段。现在点击`Identity`字段。不出所料，验证警告对话框将弹出。然而，它并未显示正确的失败原因（图\
