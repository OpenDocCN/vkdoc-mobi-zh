    4.5）和特定版本的 Mac OS X（对我们来说是 10.8，也称为 Mountain Lion）。


    这些被称为*市场营销版本标识符*或*版本号*，因为它们的主要目的是告知客户软件各个发布版本之间的区别。当程序的新版本发布给客户时，市场营销版本号会增加。


    然而，开发人员还会使用其他更细粒度的版本控制形式。如果你曾使用过诸如 `cvs`、`svn` 或 `git` 等并发版本控制系统，你可能就了解这是如何工作的。版本控制软件会跟踪项目（以及其他内容）中所有单个源代码和资源文件随时间的变化。


    **注意** 我们不打算讨论常规版本控制，但作为开发人员了解它是有益的。幸运的是，网络上有大量资源可用于学习如何安装和使用不同的版本控制软件包。一个很好的起点是维基百科上关于版本控制的页面：`http://en.wikipedia.org/wiki/Revision_control.`


    Xcode 集成了多个版本控制软件包，但它也有一些内置的版本控制机制，其中包括用于 Core Data 数据模型的机制。创建数据模型的新版本是让用户保持满意的关键。每次向公众发布应用程序的版本时，你都应创建一个新的数据模型版本。这将创建一份新副本，以便保留旧版本，帮助系统弄清楚如何将数据从旧版本制作的持久化存储更新到较新版本。


    ## 创建新数据模型版本


    在 Xcode 中单击 `SuperDB.xcdatamodeld`。然后点击“Editor”菜单并选择“Add Model Version”。系统将要求你命名这个新版本。Xcode
    提供的默认值（图 5-2）即可。只需点击“Finish”。


    ![9781430238072_Fig05-02.jpg](img/9781430238072_Fig05-02.jpg)


    图 5-2. 为新的数据模型版本命名


    你刚刚添加了一个数据模型的新版本。点击“Finish”后，`SuperDB.xcdatamodeld` 文件旁边会出现一个展开三角形。展开后即可看到数据模型的两个不同版本（图
    5-3）。


    ![9781430238072_Fig05-03.jpg](img/9781430238072_Fig05-03.jpg)


    图 5-3. 版本化的数据模型包含当前版本（图标上带有绿色对勾）以及所有之前的版本


    其中一个版本的图标上会有一个绿色对勾。这表示当前版本（在你的例子中是 `SuperDB.xcdatamodel`），也就是你的应用程序将使用的版本。默认情况下，当你创建新版本时，你实际上创建的是原始版本的副本。然而，新版本保留了与原始版本*相同的文件名*，而副本的名称则会追加一个递增的较大数字。该文件代表了你创建新版本时数据模型的样子，并且应保持原样。


    较高数字代表较旧文件这一事实可能看起来有点奇怪，但随着版本的积累，编号方式会变得更加合理。下次你创建新版本时，旧版本将被命名为 `SuperDB 3.xcdatamodel`，以此类推。对于所有非当前版本来说，这种编号方式是合理的，因为每个版本都会比上一个版本编号大
    1。通过保持当前模型的名称不变，很容易判断哪个版本是可以修改的。


    ## 当前数据模型版本


    在图 5-3 中，`SuperDB.xcdatamodel` 是数据模型的当前版本，`SuperDB 2.xcdatamodel` 是之前的版本。你现在可以安全地对当前版本进行修改，同时知道已存在一个前一个版本的副本（冻结在时间中），这将使你能够在发布时，将用户的数据从旧版本迁移到下一个版本。


    你可以更改哪个版本是当前版本。为此，选择 `SuperDB.xcdatamodeld`，然后在实用工具面板中打开 File Inspector（图 5-4）。你应看到一个名为“Version
    Core Data Model”的区域。找到一个标记为“Current”的下拉框。在这里，你可以选择要设为当前版本的数据模型。你不会经常这样做，但可能会因为某些原因需要回退到应用程序的旧版本。你可以使用迁移功能回退到旧版本，或迁移到新版本。


    ![9781430238072_Fig05-04.jpg](img/9781430238072_Fig05-04.jpg)


    图 5-4. Core Data (Directory) File Inspector


    ## 数据模型版本标识符


    虽然你可以通过选择导航面板中的特定数据模型版本并打开 File Inspector（图 5-5）来为数据模型分配像 1.1 或 Version A 这样的版本标识符，但这个标识符纯粹供你自己使用，Core
    Data 会完全忽略它。


    ![9781430238072_Fig05-05.jpg](img/9781430238072_Fig05-05.jpg)


    图 5-5. 数据模型的 File Identity 面板允许你设置版本标识符


    相反，Core Data 会对数据模型文件中的每个实体执行一种称为哈希的数学计算。哈希值存储在你的持久化存储中。当 Core Data 打开你的持久化存储时，它会使用这些哈希值来确保存储在其中的数据版本与当前数据模型兼容。

    '
- fmt: '# Core Data 版本管理与迁移


    由于 Core Data 使用存储的哈希值进行版本验证，您无需担心为版本管理递增版本号。Core Data 将通过检查存储的哈希值并与当前数据模型版本计算出的哈希值进行比较，自动识别持久化存储是由哪个版本创建的。


    ## 迁移


    如本章开头所述，当 Core Data 检测到当前使用的持久化存储与当前数据模型不兼容时，会抛出异常。解决方案是提供迁移，告诉 Core Data 如何将数据从旧的持久化存储迁移到与当前数据模型匹配的新存储中。


    ### 轻量级迁移 vs 标准迁移


    Core Data 支持两种不同类型的迁移。第一种称为**轻量级迁移**，仅适用于数据模型中相对简单的修改。例如，如果您向实体添加或移除属性，或者从数据模型中添加或删除实体，Core
    Data 完全能够自行解析如何将现有数据迁移到新模型中。对于新增属性，它会为该属性创建存储空间，但不会为现有托管对象填充数据。在轻量级迁移中，Core Data
    实际上会分析两个数据模型并为您创建迁移方案。


    如果您进行的修改不简单，无法通过轻量级迁移机制解决，则必须使用**标准迁移**。标准迁移涉及创建映射模型，并可能需要编写一些代码，告诉 Core Data
    如何将数据从旧的持久化存储迁移到新的持久化存储。


    ## 标准迁移


    本书中对 SuperDB 应用程序所做的修改都相当简单，因此对标准迁移的深入讨论超出了本书的范围。不过，苹果在开发者文档中已经相当详尽地记录了这一过程，您可以通过
    `http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreDataVersioning/Articles/Introduction.html`
    了解更多关于标准迁移的信息。


    ## 设置应用程序使用轻量级迁移


    另一方面，在本书的后续章节中，您将大量使用轻量级迁移。在剩余的每个 Core Data 章节中，您都将创建新版本的数据模型，并让轻量级迁移处理数据迁移。但是，轻量级迁移默认未开启，因此您需要对应用程序委托进行一些修改以启用它们。


    编辑 `AppDelegate.m` 并找到 `persistentStoreCoordinator` 方法。将以下代码行：


    ```objective-c

    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

        configuration:nil

        URL:storeURL

        options:nil

        error:&error]) {

    ```


    替换为：


    ```objective-c

    NSDictionary *options = @{NSMigratePersistentStoresAutomaticallyOption:@YES,

                  NSInferMappingModelAutomaticallyOption:@YES};

    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

        configuration:nil

        URL:storeURL

        options:options

        error:&error]) {

    ```


    启用轻量级迁移的方法是在调用 `addPersistentStoreWithType:configuration:URL:options:error:` 方法将新创建的持久化存储添加到持久化存储协调器时，向
    `options` 参数传递一个字典。在该字典中，使用两个系统定义的常量 `NSMigratePersistentStoresAutomaticallyOption`
    和 `NSInferMappingModelAutomaticallyOption` 作为键，并在这两个键下存储一个持有 Objective-C `BOOL`
    值 `YES` 的 `NSNumber`。通过将包含这两个值的字典传递给持久化存储协调器，您向 Core Data 指示：如果检测到数据模型版本发生变化，希望它尝试自动创建迁移；如果能够创建迁移，则自动使用这些迁移将数据迁移到基于当前数据模型的新持久化存储中。


    仅此而已。通过这些更改，您就可以开始放心地对数据模型进行修改了。（好吧，可能也并非完全无忧。）使用轻量级迁移会限制您能进行的修改的复杂度。例如，您无法将实体拆分为两个不同的实体，或将属性从一个实体移动到另一个实体，但除了重大重构之外，您所需的大多数更改都可以通过轻量级迁移处理。此外，一旦您按照本章所述的方式设置好项目，该功能基本上是免费的。


    # 继续迁移


    在经历了几个漫长且概念上较为困难的章节后，暂停一下来设置项目使用迁移，这为您提供了一个不错的喘息机会。但请不要低估迁移的重要性。使用您应用程序的用户信任您会妥善处理他们的数据。花些精力确保您的修改不会给用户带来重大问题至关重要。


    任何时候发布包含新数据模型版本的应用程序新版本时，请务必彻底测试迁移。无论您是使用本章设置的轻量级迁移，还是更重量级的标准迁移，这一点都适用。


    迁移，尤其是轻量级迁移，相对易于使用，但它们有可能给用户带来重大不便，因此不要因为易于使用而产生虚假的安全感。请使用尽可能多的真实数据彻底测试每次迁移。


    在此提醒之后，让我们继续为 SuperDB 应用程序添加功能。接下来是什么？自定义托管对象——既有乐趣又有收获。


    # 第 6 章：自定义托管对象


    目前，`Hero` 实体由 `NSManagedObject` 类的实例表示。得益于键值编码，您无需创建专门用于保存应用程序数据的类，就能构建完整的数据模型。


    然而，这种方法也存在一些缺点。首先，当对托管对象使用键值编码时，您使用 `NSString` 常量在代码中表示属性，但编译器不会以任何方式检查这些常量。如果您拼错了属性名，编译器不会捕获到错误。此外，到处使用
    `valueForKey:` 和 `setValue:forKey:` 而不是直接使用属性和点语法，也可能会有点繁琐。


    虽然您可以为某些类型的数据模型属性设置默认值，但无法设置条件默认值，例如将日期属性默认设为今天的日期。对于某些类型的属性，根本无法在数据模型中设置默认值。验证功能也同样受限。虽然您可以控制某些属性的特定元素（如字符串长度或数字最大值），但无法进行复杂或条件性的验证，也无法进行依赖于多个属性值的验证。'
  raw: 'Since Core Data does its version validation using the stored hash values,
    you don’t need to worry about incrementing version numbers for versioning to work.
    Core Data will just know which version a persistent store was created for by looking
    at the stored hash value and comparing it to the hash calculated on the current
    version of the data model.


    Migrations


    As you saw at the beginning of the chapter, when Core Data detects that the persistent
    store in use is incompatible with the current data model, it throws an exception.
    The solution is to provide a migration to tell Core Data how to move data from
    the old persistent store to a new one that matches the current data model.


    Lightweight vs. Standard


    There are two different types of migrations supported by Core Data. The first,
    called a lightweight migration, is only available in the case of relatively straightforward
    modifications to your data model. If you add or remove an attribute from an entity,
    or add or delete an entity from the data model, for example, Core Data is perfectly
    capable of figuring out how to migrate the existing data into the new model. In
    the case of a new attribute, it simply creates storage for that attribute, but
    doesn’t populate it with data for the existing managed objects. In a lightweight
    migration, Core Data actually analyzes the two data models and creates the migration
    for you.


    If you make a change that’s not straightforward and thus can’t be resolved by
    the lightweight migration mechanism, then you have to use a standard migration.
    A standard migration involves creating a mapping model and possibly writing some
    code to tell Core Data how to move the data from the old persistent store to the
    new one.


    Standard Migrations


    The changes you will be making to the SuperDB application in this book are all
    pretty straightforward, and an in-depth discussion of standard migrations is beyond
    the scope of this book. Apple has documented the process fairly thoroughly in
    the developer documentation, though, so you can read more about standard migrations
    at `http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/CoreDataVersioning/Articles/Introduction.html`.


    Setting Up Your App to Use Lightweight Migrations


    On the other hand, you will be using lightweight migrations a lot through the
    rest of the book. In every remaining Core Data chapter, you will create a new
    version of your data model and let lightweight migrations handle moving the data.
    However, lightweight migrations are not turned on by default, so you need to make
    some changes to your application delegate to enable them.


    Edit AppDelegate.m and find the persistentStoreCoordinator method.  Replace this
    line


    ```

    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

        configuration:nil

        URL:storeURL

        options:nil

        error:&error]) {

    ```


    with these lines


    ```

    NSDictionary *options = @{NSMigratePersistentStoresAutomaticallyOption:@YES,

                  NSInferMappingModelAutomaticallyOption:@YES};

    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

        configuration:nil

        URL:storeURL

        options:options

        error:&error]) {

    ```


    The way to turn on lightweight migrations is to pass a dictionary into the options
    argument when you call the addPersistentStoreWithType:configuration:URL:options:error:
    method to add your newly created persistent store to the persistent store coordinator.
    In that dictionary, you use two system-defined constants, NSMigratePersistentStoresAutomaticallyOption
    and NSInferMappingModelAutomaticallyOption, as keys in the dictionary, and store
    an NSNumber under both of those keys that holds an Objective-C BOOL value of YES.
    By passing a dictionary with these two values in when you add the persistent store
    to the persistent store coordinator, you indicate to Core Data that you want it
    to attempt to automatically create migrations if it detects a change in the data
    model version, and if it’s able to create the migrations, to automatically use
    those migrations to migrate the data to a new persistent store based on the current
    data model.


    And that’s it. With these changes, you are ready to start making changes to your
    data model without fear. (Well, maybe not completely without fear.) By using lightweight
    migrations, you limit the complexity of the changes you’re able to make. For example,
    you won’t be able to split an entity up into two different entities or move attributes
    from one entity to another, but the majority of changes you’ll need to make outside
    of major refactoring can be handled by lightweight migrations. Plus, once you
    set your project up the way you’ve done in this chapter, that functionality is
    basically free.


    Time to Migrate On


    After a couple of long, conceptually difficult chapters, taking a break to set
    up your project to use migrations gave you a nice breather, but don’t underestimate
    the importance of migrations. The people who use your applications are trusting
    you to take a certain amount of care with their data. Putting some effort into
    making sure that your changes don’t cause major problems for your users is important.


    Any time you put out a new release of your application with a new data model version,
    make sure you test the migration thoroughly. This is true regardless of whether
    you’re using the lightweight migrations you set up in this chapter or the heavier-duty
    standard migrations.


    Migrations, especially lightweight migrations, are relatively easy to use, but
    they hold the potential for causing your users significant inconvenience, so don’t
    get lulled into a false sense of security by how easy they are to use. Test every
    migration thoroughly with as much realistic data as you can.


    And with that warning out of the way, let’s continue adding functionality to the
    SuperDB application. Up next? Custom managed objects for fun and profit.


    Chapter    6


    Custom Managed Objects


    At the moment, the Hero entity is represented by instances of the class NSManagedObject.
    Thanks to key-value coding, you have the ability to create entire data models
    without ever having to create a class specifically designed just to hold your
    application’s data.


    There are some drawbacks to this approach, however. For one thing, when using
    key-value coding with managed objects, you use NSString constants to represent
    your attributes in code, but these constants are not checked in any way by the
    compiler. If you mistype the name of an attribute, the compiler won’t catch it.
    It can also be a little tedious having to use valueForKey: and setValue:forKey:
    all over the place instead of just using properties and dot notation.


    Although you can set default values for some types of data model attributes, you
    can’t, for example, set conditional defaults such as defaulting a date attribute
    to today’s date. For some types of attributes, there’s no way at all to set a
    default in the data model. Validation is similarly limited. Although you can control
    certain elements of some attributes, like the length of a string or max value
    of a number, there’s no way to do complex or conditional validation, or to do
    validation that depends on the values in multiple attributes.'
