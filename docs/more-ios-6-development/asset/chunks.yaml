  raw: 'When inserting a new managed object into a context, the multiple-attribute
    method you use is called validateForInsert:. When updating an existing object,
    the validation method you implement is called validateForUpdate:. In both cases,
    you return YES if the object passes validation and NO if there’s a problem. As
    with single-field validation, if you return NO, you should also create an NSError
    instance that identifies the specifics of the problem encountered.


    In many instances, the validation you want to do at insert and at update are identical.
    In those cases, do not copy the code from one and paste it into the other. Instead,
    create a new validation method and have both validateForInsert: and validateForUpdate:
    call that new validation method.


    In your application, you don’t have a need for any multiple-attribute validations
    (yet!), but let’s say, hypothetically, that instead of making both name and secretIdentity
    required, you only wanted to require one of the two. You could accomplish that
    by making both name and secretIdentity optional in the data model, then using
    the multiple-attribute validation methods to enforce it. To do that, you would
    add the following three methods to your Hero class:


    ```

    - (BOOL)validateNameOrSecretIdentity:(NSError **)outError

    {

        if ((0 == [self.name length]) && (0 == [self.secretIdentity length])) {

            if (outError != NULL) {

                NSString *errorStr = NSLocalizedString(@"Must provide name or secret
    identity.",

                                                       @"Must provide name or secret
    identity.");

                NSDictionary *userInfoDict =                 [NSDictionary dictionaryWithObject:errorStr

                                                forKey:NSLocalizedDescriptionKey];

                NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain

                                                            code:kHeroValidationNameOrSecretIdentityCode

                                                        userInfo:userInfoDict];

                *outError = error;

            }

        }

        return YES;

    }


    - (BOOL)validateForInsert:(NSError **)outError

    {

        return [self validateNameOrSecretIdentity:outError];

    }


    - (BOOL)validateForUpdate:(NSError **)outError

    {

        return [self validateNameOrSecretIdentity:outError];

    }

    ```


    Virtual Accessors


    At the beginning of the chapter, you added a new attribute called age to your
    data model. You don’t need to store the hero’s age, however, because you can calculate
    it based on the hero’s birthdate. Calculated attributes like this are often referred
    to as virtual accessors. They look like accessors, and as far as other objects
    are concerned, they can be treated just like the other attributes. The fact that
    you’re calculating the value at runtime rather than retrieving it from the persistent
    store is simply an implementation detail.


    As your Hero object stands right now, the age accessor will always return nil
    because you’ve told your data model not to create storage space for it in the
    persistent store and have made it read only. In order to make it behave correctly,
    you must implement the logic to calculate age in a method that looks like an accessor
    (hence, the name “virtual accessor”). To do that, add the following method to
    Hero.m, just before @end:


    ```

    - (NSNumber *)age

    {

        if (self.birthdate == nil)

            return nil;


    NSCalendar *gregorian = [[NSCalendar alloc] initWithCalendarIdentifier:NSGregorianCalendar];

        NSDateComponents *components = [gregorian components:NSYearCalendarUnit

                                                    fromDate:self.birthdate

                                                      toDate:[NSDate date]

                                                     options:0];

        NSInteger years = [components year];

        return [NSNumber numberWithInteger:years];

    }

    ```


    Note the check you put in the beginning in the method. If you haven’t set your
    hero’s birthdate, you don’t want to calculate the age.


    Now any code that uses the age property accessor will be returned an NSNumber
    instance with the calculated age of the superhero.


    Adding Validation Feedback


    In [Chapter 4](#9781430238072_Ch04.xhtml), you created a class named SuperDBEditCell
    that encapsulates the common functionality shared by the various table view cells.
    The SuperDBEditCell class does not include code designed to save the managed object;
    it just concerns itself with the display. You did store the attribute that each
    SuperDBEditCell instance displays. But now you want to add validation feedback
    when the edited attribute fails validation, and you don’t want to duplicate functionality
    across subclasses.


    What you want to do is have each instance of SuperDBEditCell (or subclass) validate
    the attribute it is handling. You want to perform the validation when the table
    view cell loses focus (i.e., you move to another cell), and when the user attempts
    to save. If the edited value does not pass validation, you should pop up an alert
    window telling your user the validation error and present two buttons: Cancel,
    reverting the value, or Fix, letting the user edit the cell. To handle this, you
    need to have SuperDBEditCell respond to the UITextFieldDelegate and UIAlertViewDelegate
    protocols. Finally, if the user clicks the Cancel button on the navigation bar,
    you will undo all the changes they’ve made.


    First, edit SuperDBEditCell.h, and change the @interface declaration to read


    ```

    @interface SuperDBEditCell : UITableViewCell <UITextFieldDelegate, UIAlertViewDelegate>

    ```


    Next, you need to add a property to your NSManagedObject.


    ```

    @property (strong, nonatomic) NSManagedObject *hero;

    ```


    Finally, you need a validate method to invoke when you want the validation to
    occur.


    ```

    - (IBAction)validate;

    ```


    Switch over to SuperDBEditCell.m, and add the validate method you just declared.


    ```

    #pragma mark - Instance Methods


    - (IBAction)validate

    {

        id val = self.value;

        NSError *error;

        if (![self.hero validateValue:&val forKey:self.key error:&error]) {

            NSString *message = nil;

            if ([[error domain] isEqualToString:@"NSCocoaErrorDomain"]) {

                NSDictionary *userInfo = [error userInfo];

                message =                 [NSString

    stringWithFormat:NSLocalizedString(@"Validation error on:

                                                                  %@\rFailure Reason:
    %@",

                                                                 @"Validation error
    on: %@,

                                                                  Failure Reason:
    %@)"),

                                               [userInfo valueForKey:@"NSValidationErrorKey"],

                                               [error localizedFailureReason]];

            }

            else

                message = [error localizedDescription];


    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Validation
    Error",

                                                                                  
    @"Validation Error")

                                                          message:message

                                                         delegate:self

                                                 cancelButtonTitle:NSLocalizedString(@"Cancel",
    @"Cancel")

                                                 otherButtonTitles:NSLocalizedString(@"Fix",
    @"Fix"), nil];

            [alert show];

        }

    }

    ```


    In order for the Alert View to work correctly, you need to implement its delegate
    method.


    ```

    #pragma mark Alert View Delegate


    - (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex

    {

        if (buttonIndex == [alertView cancelButtonIndex])

            [self setValue:[self.hero valueForKey:self.key]];

        else

            [self.textField becomeFirstResponder];

    }

    ```


    You need the textField delegate method textField:didEndEditing: to call your validate
    method.


    ```

    #pragma mark UITextFieldDelegate methods


    - (void)textFieldDidEndEditing:(UITextField *)textField

    {

        [self validate];

    }

    ```'
  trans: "\n# Core Data 数据验证与虚拟存取器\n\n## 多属性验证方法\n\n当向上下文中插入新的托管对象时，使用的多属性方法称为 `validateForInsert:`。而更新现有对象时，实现的验证方法则称为\
    \ `validateForUpdate:`。在这两种情况下，如果对象通过验证则返回 `YES`，如果存在问题则返回 `NO`。与单字段验证类似，若返回 `NO`，还需创建一个\
    \ `NSError` 实例，用于说明遇到的具体问题。\n\n在许多情况下，插入和更新时所需执行的验证逻辑是相同的。此时，请勿将一个方法的代码复制粘贴到另一个方法中。相反，应创建一个新的验证方法，并让\
    \ `validateForInsert:` 和 `validateForUpdate:` 都调用这个新方法。\n\n在你的应用中，（目前）还没有执行多属性验证的需求，但假设一下：我们不要求\
    \ `name` 和 `secretIdentity` 同时为必填项，而是只要求这两个属性中至少提供一个。要实现这一点，你可以在数据模型中将 `name`\
    \ 和 `secretIdentity` 都设为可选，然后利用多属性验证方法来强制实现这一规则。为此，你需要在 `Hero` 类中添加以下三个方法：\n\n\
    ```\n- (BOOL)validateNameOrSecretIdentity:(NSError **)outError\n{\n    if ((0\
    \ == [self.name length]) && (0 == [self.secretIdentity length])) {\n        if\
    \ (outError != NULL) {\n            NSString *errorStr = NSLocalizedString(@\"\
    Must provide name or secret identity.\",\n                                   \
    \                 @\"Must provide name or secret identity.\");\n            NSDictionary\
    \ *userInfoDict =                 [NSDictionary dictionaryWithObject:errorStr\n\
    \                                                    forKey:NSLocalizedDescriptionKey];\n\
    \            NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
    \                                                        code:kHeroValidationNameOrSecretIdentityCode\n\
    \                                                    userInfo:userInfoDict];\n\
    \            *outError = error;\n        }\n    }\n    return YES;\n}\n\n- (BOOL)validateForInsert:(NSError\
    \ **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n}\n\
    \n- (BOOL)validateForUpdate:(NSError **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n\
    }\n```\n\n## 虚拟存取器\n\n在本章开头，你在数据模型中添加了一个名为 `age` 的新属性。但实际上你并不需要存储英雄的年龄，因为可以根据英雄的出生日期来计算。像这样计算得出的属性通常被称为**虚拟存取器**。它们看上去就像普通的存取器，并且对于其他对象而言，它们可以被当作其他属性一样对待。你是在运行时计算该值，而非从持久化存储中检索，这只是一个实现细节。\n\
    \n按照目前 `Hero` 对象的配置，`age` 存取器将始终返回 `nil`，因为你已告知数据模型不要为其在持久化存储中分配存储空间，并将其设置为只读。为了使其正常工作，你必须在一个看起来像存取器的方法中实现计算年龄的逻辑（因此得名“虚拟存取器”）。为此，请在\
    \ `Hero.m` 文件的 `@end` 之前添加以下方法：\n\n```\n- (NSNumber *)age\n{\n    if (self.birthdate\
    \ == nil)\n        return nil;\n\nNSCalendar *gregorian = [[NSCalendar alloc]\
    \ initWithCalendarIdentifier:NSGregorianCalendar];\n    NSDateComponents *components\
    \ = [gregorian components:NSYearCalendarUnit\n                               \
    \                 fromDate:self.birthdate\n                                  \
    \                toDate:[NSDate date]\n                                      \
    \           options:0];\n    NSInteger years = [components year];\n    return\
    \ [NSNumber numberWithInteger:years];\n}\n```\n\n注意方法开头添加的检查。如果你尚未设置英雄的出生日期，则无需计算年龄。\n\
    \n现在，任何使用 `age` 属性存取器的代码都将返回一个包含计算后超级英雄年龄的 `NSNumber` 实例。\n\n## 添加验证反馈\n\n在第 4\
    \ 章中，你创建了一个名为 `SuperDBEditCell` 的类，它封装了各种表格视图单元格的通用功能。`SuperDBEditCell` 类不包含用于保存托管对象的代码，它只关注显示本身。你确实存储了每个\
    \ `SuperDBEditCell` 实例所显示的属性。但现在，你希望在编辑的属性未通过验证时添加验证反馈，并且你不想在子类中重复实现这一功能。\n\n\
    你希望实现的是，让每个 `SuperDBEditCell` 实例（或其子类）验证其正在处理的属性。你希望在表格视图单元格失去焦点（即，移动到另一个单元格）以及用户尝试保存时执行验证。如果编辑后的值未通过验证，则应弹出一个警告窗口，向用户显示验证错误，并呈现两个按钮：**取消**（恢复原值），或**修复**（让用户编辑该单元格）。为了处理这种情况，你需要让\
    \ `SuperDBEditCell` 响应 `UITextFieldDelegate` 和 `UIAlertViewDelegate` 协议。最后，如果用户点击导航栏上的**取消**按钮，你将撤销他们所做的所有更改。\n\
    \n首先，编辑 `SuperDBEditCell.h`，并将 `@interface` 声明修改为：\n\n```\n@interface SuperDBEditCell\
    \ : UITableViewCell <UITextFieldDelegate, UIAlertViewDelegate>\n```\n\n接下来，你需要向\
    \ `NSManagedObject` 添加一个属性：\n\n```\n@property (strong, nonatomic) NSManagedObject\
    \ *hero;\n```\n\n最后，你需要一个 `validate` 方法，以便在需要执行验证时调用：\n\n```\n- (IBAction)validate;\n\
    ```\n\n切换到 `SuperDBEditCell.m`，并添加刚才声明的 `validate` 方法：\n\n```\n#pragma mark -\
    \ 实例方法\n\n- (IBAction)validate\n{\n    id val = self.value;\n    NSError *error;\n\
    \    if (![self.hero validateValue:&val forKey:self.key error:&error]) {\n   \
    \     NSString *message = nil;\n        if ([[error domain] isEqualToString:@\"\
    NSCocoaErrorDomain\"]) {\n            NSDictionary *userInfo = [error userInfo];\n\
    \            message =                 [NSString\nstringWithFormat:NSLocalizedString(@\"\
    Validation error on:\n                                                       \
    \       %@\\rFailure Reason: %@\",\n                                         \
    \            @\"Validation error on: %@,\n                                   \
    \                   Failure Reason: %@)\"),\n                                \
    \   [userInfo valueForKey:@\"NSValidationErrorKey\"],\n                      \
    \             [error localizedFailureReason]];\n        }\n        else\n    \
    \        message = [error localizedDescription];\n\nUIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:NSLocalizedString(@\"Validation Error\",\n            \
    \                                                                   @\"Validation\
    \ Error\")\n                                                      message:message\n\
    \                                                     delegate:self\n        \
    \                                     cancelButtonTitle:NSLocalizedString(@\"\
    Cancel\", @\"Cancel\")\n                                             otherButtonTitles:NSLocalizedString(@\"\
    Fix\", @\"Fix\"), nil];\n        [alert show];\n    }\n}\n```\n\n为了确保警告视图正常工作，你需要实现其委托方法：\n\
    \n```\n#pragma mark 警告视图委托\n\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
    {\n    if (buttonIndex == [alertView cancelButtonIndex])\n        [self setValue:[self.hero\
    \ valueForKey:self.key]];\n    else\n        [self.textField becomeFirstResponder];\n\
    }\n```\n\n你需要文本字段委托方法 `textField:didEndEditing:` 来调用你的 `validate` 方法：\n\n```\n\
    #pragma mark UITextFieldDelegate 方法\n\n- (void)textFieldDidEndEditing:(UITextField\
    \ *)textField\n{\n    [self validate];\n}\n```\n"
- fmt: "Finally, you need out cell’s `textField` to know about its new delegate. In\
    \ `SuperDB`’s `initWithStyle:reuseIdentifier:` method, just before the `textField`\
    \ is added to the cell’s `contentView`, add this:\n\n```\nself.textField.delegate\
    \ = self;\n```\n\nWhat have you done here? First, you made sure the `NSTextField`\
    \ delegate was set to `self` in `initWithStyle:reuseIdentifier:`. Then, you added\
    \ the `validate` method. Basically, you validate calls `validateValue:forKey:error:`\
    \ on your `NSManagedObject`. If this validation fails, you parse the `NSError`\
    \ object and create a `UIAlertView`. Next, you defined a `textFieldDidEndEditing:`\
    \ delegate method. This method gets invoked when the `NSTextField` in your `SuperDBEditCell`\
    \ class exits editing mode. This happens when you click from cell to another or\
    \ when you click Save or Back on the navigation bar. Finally, you added `alertView:clickedButtonAtIndex:`.\
    \ This delegate method gets called when the user clicks a button on the `UIAlertView`\
    \ you display on validation error. Depending on which button was clicked, Cancel\
    \ or Fix, you either revert the value or move the focus to the table view cell.\n\
    \nNow you just need to pass your `Hero` object down from the `HeroDetailController`\
    \ to the `SuperDBEditCell`. Edit `HeroDetailController.m` and find the `tableView:cellForRowAtIndexPath:`.\
    \ Just before all the other cell configurations, add this:\n\n```\ncell.hero =\
    \ self.hero;\n```\n\n## Updating the Detail View\n\nLooking at [Figure 6-2](#9781430238072_Ch06.xhtml#Fig2),\
    \ you see that you need two more cells in the General section of the table view.\
    \ Before you go any further, let’s update the detail view.\n\nOpen `SuperDB.storyboard`,\
    \ and find the `HeroDetailController`. Select the second table view section by\
    \ clicking in an area outside the table view cells (next to the General label\
    \ is a good place). Open the Attributes Inspector in the Utility pane, and change\
    \ the Rows field from 3 to 5. The second section of the table view should now\
    \ show five rows. That’s all you need to do in the storyboard editor. Easy, right?\n\
    \nNow let’s take a look at [Figure 6-2](#9781430238072_Ch06.xhtml#Fig2) again.\
    \ The order of the labels in the second section are: Identity, Birthdate, Age,\
    \ Sex, and Favorite Color. When you last ran the application, the section labels\
    \ were Identity, Birthdate, and Sex. Not only do you need to add Age and Favorite\
    \ Color, you need to reorder things so that Age comes before Sex. Fortunately,\
    \ since your cells are configured from a property list, this should be (relatively)\
    \ simple.\n\nOpen `HeroDetailController.plist`. Navigate down to Root ![image](images/arrow.jpg)\
    \ Sections ![image](images/arrow.jpg) Item 1 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg)\
    \ Item 1. If the disclosure triangle next to the last Item 1 is open, close it.\
    \ Item 1 and Item 2 should be right next to each other. If the Item 2 disclosure\
    \ triangle is open, close it as well. Now select the last Item 1 row, and click\
    \ the (+) button next to the Item 1 label. A new row should have been inserted\
    \ between Item 1 and Item 2. Item 2 is renamed to Item 3. The new Item 2 has a\
    \ type of string with no value.\n\nChange the new Item 2’s type to Dictionary,\
    \ and open its disclosure triangle. This is the configuration for your Age cell.\
    \ Click the (+) button next to the new Item 2 three times to add three rows. Keep\
    \ all three rows as type string and give them the following key/value pairs: key/age,\
    \ class/SuperDBEditCell, label/Age.\n\nNow add a row after Item 3, repeat the\
    \ process, adding three rows with type string to the new Item 4. The key/value\
    \ pairs will be: key/favoriteColor, class/SuperDBEditCell, label/Color.\n\nBuild\
    \ and run the app. Navigate down to the detail view.\n\nThe app should have crashed.\
    \ Why?\n\nWell, you’re assigning the `age` attribute to the `textField`’s `text`\
    \ property. `Age` will be an instance of `NSNumber`, and `textField.text` will\
    \ expect an `NSString`. You could subclass `SuperDBEditCell` to handle `NSNumber`s,\
    \ but you probably won’t need it. It’s far easier to change this method in `SuperDBEditCell.m`.\n\
    \n```\n- (void)setValue:(id)aValue\n{\n    if ([newValue isKindOfClass:[NSString\
    \ class]])\n        self.textField.text = aValue;\n    else\n        self.textField.text\
    \ = [aValue description];\n}\n```\n\nIf you were showing a lot of `NSNumber`s,\
    \ you probably wouldn’t do this, but this works for now.\n\nTry building and running\
    \ the app again. If you add a new hero, you should see something like [Figure\
    \ 6-10](#9781430238072_Ch06.xhtml#Fig10).\n\n![9781430238072_Fig06-10.jpg](images/9781430238072_Fig06-10.jpg)\n\
    \n[Figure 6-10.](#9781430238072_Ch06.xhtml#_Fig10)  The Hero detail view\n\nThere’s\
    \ a problem with the Age cell. For one, in Edit mode, you can tap inside the Age\
    \ cell and it will get focus and show the keyboard input. Second, when you try\
    \ to save from Edit mode, the app will crash. Let’s fix this.\n\n## Refactoring\
    \ SuperDBEditCell\n\nThe Age cell is editable by default. There is a table view\
    \ data source method, `tableView:canEditRowAtIndexPath:`, that determines if a\
    \ specific table view cell is editable. By default, this method is provided in\
    \ the `UITableViewController` template, but commented out. As a result, the table\
    \ view assumes all cells are editable. Clearly, you need this method to return\
    \ `NO` for the Age cell index path. Unfortunately, by specifying a cell as uneditable,\
    \ the cell won’t indent in Edit mode. That may be okay, but you’d like your Age\
    \ cell to indent even if you can’t edit it.\n\nThe app crash is due to these lines\
    \ of code in the `HeroDetailController` save method:\n\n```\nfor (SuperDBEditCell\
    \ *cell in [self.tableView visibleCells])\n    [self.hero setValue:[cell value]\
    \ forKey:[cell key]];\n```\n\nWhen you try to set the value in the `Hero` entity’s\
    \ attribute of `age`, you’ll get an exception crash. Remember, you declared `age`\
