        switch (tab) {\n        case kByName:\n            cell.textLabel.text = [aHero\
    \ valueForKey:@\"name\"];\n            cell.detailTextLabel.text = [aHero valueForKey:@\"\
    secretIdentity\"];\n            break;\n        case kBySecretIdentity:\n            cell.textLabel.text\
    \ = [aHero valueForKey:@\"secretIdentity\"];\n            cell.detailTextLabel.text\
    \ = [aHero valueForKey:@\"name\"];\n            break;\n    }\n    return cell;\n\
    }\n```\n\nFinally, you uncomment tableView:commitEditingStyle:forRowAtIndexPath:\
    \ to handle deleting rows.\n\n```\n// Override to support editing the table view.\n\
    - (void)tableView:(UITableView *)tableView\n         commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
             forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSManagedObjectContext\
    \ *managedObjectContext = [self.fetchedResultsController managedObjectContext];\n\
        if (editingStyle == UITableViewCellEditingStyleDelete) {\n        // Delete\
    \ the row from the data source\n        [managedObjectContext deleteObject:[self.fetchedResultsController\n\
                                                     objectAtIndexPath:indexPath]];\n\
            NSError *error;\n        if (![managedObjectContext save:&error]) {\n\
                UIAlertView *alert =                 [[UIAlertView alloc]\n                    \
    \ initWithTitle:NSLocalizedString(@\"Error saving entity\",\n                                                    \
    \ @\"Error saving entity\")\n                          message:\n                              [NSString\
    \ stringWithFormat:NSLocalizedString(@\"Error was: %@, quitting.\",\n                                                                            @\"\
    Error was: %@, quitting.\"),\n                                                          \
    \ [error localizedDescription]]\n                         delegate:self\n                cancelButtonTitle:NSLocalizedString(@\"\
    Aw, Nuts\", @\"Aw, Nuts\")\n                otherButtonTitles:nil];\n            [alert\
    \ show];\n        }\n    }\n}\n```\n\nSorting the Table View\n\nFinally, you need\
    \ to make the table view order change when you toggle the tab bar. You need to\
    \ add the following code to tabBar:didSelectItem: delegate method:\n\n```\n- (void)tabBar:(UITabBar\
    \ *)tabBar didSelectItem:(UITabBarItem *)item\n{\n    NSUserDefaults *defaults\
    \ = [NSUserDefaults standardUserDefaults];\n    NSUInteger tabIndex = [tabBar.items\
    \ indexOfObject:item];\n    [defaults setInteger:tabIndex forKey:kSelectedTabDefaultsKey];\n\
        [NSFetchedResultsController deleteCacheWithName:@\"Hero\"];\n    _fetchedResultsController.delegate\
    \ = nil;\n    _fetchedResultsController = nil;\n    NSError *error;\n    if (![self.fetchedResultsController\
    \ performFetch:&error]) {\n        NSLog(@\"Error performing fetch: %@\", [error\
    \ localizedDescription]);\n    }\n    [self.heroTableView reloadData];\n}\n```\n\
    \nLoading the Fetch Request At Launch\n\nAdd the following to the HeroListController\
    \ viewDidLoad method:\n\n```\n// Fetch any existing entities\nNSError *error =\
    \ nil;\nif (![[self fetchedResultsController] performFetch:&error]) {\n    UIAlertView\
    \ *alert =       [[UIAlertView alloc]           initWithTitle:NSLocalizedString(@\"\
    Error loading data\",\n                                           @\"Error loading\
    \ data\")\n                message:[NSString stringWithFormat:NSLocalizedString(@\"\
    Error was: %@, quitting.\",\n                                                                      @\"\
    Error was: %@, quitting.\"),\n                                                  \
    \ [error localizedDescription]]\n               delegate:self\n      cancelButtonTitle:NSLocalizedString(@\"\
    Aw, Nuts\", @\"Aw, Nuts\")\n      otherButtonTitles:nil];\n    [alert show];\n\
    }\n```\n\nAnd that’s pretty much everything.\n\nLet ‘Er Rip\n\nWell, what are\
    \ you waiting for? That was a lot of work; you deserve to try it out. Make sure\
    \ everything is saved, then build and run the app.\n\nIf everything went okay,\
    \ when the application first launches, you should be presented with an empty table\
    \ with a navigation bar at the top and a tab bar at the bottom ([Figure 3-40](#9781430238072_Ch03.xhtml#Fig40)).\
    \ Pressing the right button in the navigation bar will add a new unnamed superhero\
    \ to the database. Pressing the Edit button will allow you to delete heroes.\n\
    \n![9781430238072_Fig03-40.jpg](images/9781430238072_Fig03-40.jpg)\n\n[Figure\
    \ 3-40.](#9781430238072_Ch03.xhtml#_Fig40)  The SuperDB application at launch\
    \ time"
  trans: "\n# 实现编辑和添加功能\n\n点击添加（+）按钮时，应用程序所做的不仅仅是向表格视图添加一行。它还会向托管对象上下文中添加一个新的 `Hero`\
    \ 实体。在 `HeroListController.m` 文件中，将 `addHero` 方法修改如下：\n\n```\n- (IBAction)addHero:(id)sender\n\
    {\n     NSManagedObjectContext *managedObjectContext = \n         [self.fetchedResultsController\
    \ managedObjectContext];\n\nNSEntityDescription *entity = [[self.fetchedResultsController\
    \ fetchRequest] entity];\n     [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name]\n                                    inManagedObjectContext:managedObjectContext];\n\
    \     NSError *error = nil;\n     if (![managedObjectContext save:&error]) {\n\
    \         UIAlertView *alert =              [[UIAlertView alloc]\n           \
    \       initWithTitle:NSLocalizedString(@\"Error saving entity\",\n          \
    \                                        @\"Error saving entity\")\n         \
    \              message:[NSString stringWithFormat:NSLocalizedString(@\"Error was:\
    \ %@, quitting.\",\n                                                         \
    \                 @\"Error was: %@, quitting.\"),\n                          \
    \                                    [error localizedDescription]]\n         \
    \             delegate:self\n             cancelButtonTitle:NSLocalizedString(@\"\
    Aw, Nuts\", @\"Aw, Nuts\")\n             otherButtonTitles:nil];\n         [alert\
    \ show];\n     }\n}\n```\n\n当点击**编辑**按钮时，系统会自动调用 `setEditing:animated:` 方法。因此，您只需将该方法添加到\
    \ `HeroListController.m` 文件中，无需在接口文件中声明。\n\n```\n- (void)setEditing:(BOOL)editing\
    \ animated:(BOOL)animated\n{\n    [super setEditing:editing animated:animated];\n\
    \    self.addButton.enabled = !editing;\n    [self.heroTableView setEditing:editing\
    \ animated:animated];\n}\n```\n\n这里您所做的全部工作就是调用父类方法，禁用添加（+）按钮（您肯定不希望在编辑时添加英雄！），然后在表格视图上调用\
    \ `setEditing:animated`。\n\n# 编写表格视图数据源和委托方法\n\n以第 2 章中的 `CoreDataApp` 为例，您需要更改以下表格视图数据源方法：\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \   return [[self.fetchedResultsController sections] count];\n}\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n   id < NSFetchedResultsSectionInfo\
    \ > sectionInfo = \n          [[self.fetchedResultsController sections] objectAtIndex:section];\n\
    \   return [sectionInfo numberOfObjects];\n}\n```\n\n接下来，您需要处理表格视图单元格的创建，如下所示：\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n          cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"HeroListCell\";\n \
    \   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    // 配置单元格...\n    NSManagedObject *aHero = [self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n    NSInteger tab = [self.heroTabBar.items indexOfObject:self.heroTabBar.selectedItem];\n\
    \    switch (tab) {\n        case kByName:\n            cell.textLabel.text =\
    \ [aHero valueForKey:@\"name\"];\n            cell.detailTextLabel.text = [aHero\
    \ valueForKey:@\"secretIdentity\"];\n            break;\n        case kBySecretIdentity:\n\
    \            cell.textLabel.text = [aHero valueForKey:@\"secretIdentity\"];\n\
    \            cell.detailTextLabel.text = [aHero valueForKey:@\"name\"];\n    \
    \        break;\n    }\n    return cell;\n}\n```\n\n最后，取消注释 `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ 方法以处理删除行操作。\n\n```\n// 覆盖以支持编辑表格视图。\n- (void)tableView:(UITableView *)tableView\n\
    \         commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n     \
    \    forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSManagedObjectContext\
    \ *managedObjectContext = [self.fetchedResultsController managedObjectContext];\n\
    \    if (editingStyle == UITableViewCellEditingStyleDelete) {\n        // 从数据源中删除该行\n\
    \        [managedObjectContext deleteObject:[self.fetchedResultsController\n \
    \                                                objectAtIndexPath:indexPath]];\n\
    \        NSError *error;\n        if (![managedObjectContext save:&error]) {\n\
    \            UIAlertView *alert =                 [[UIAlertView alloc]\n     \
    \                initWithTitle:NSLocalizedString(@\"Error saving entity\",\n \
    \                                                    @\"Error saving entity\"\
    )\n                          message:\n                              [NSString\
    \ stringWithFormat:NSLocalizedString(@\"Error was: %@, quitting.\",\n        \
    \                                                                    @\"Error\
    \ was: %@, quitting.\"),\n                                                   \
    \        [error localizedDescription]]\n                         delegate:self\n\
    \                cancelButtonTitle:NSLocalizedString(@\"Aw, Nuts\", @\"Aw, Nuts\"\
    )\n                otherButtonTitles:nil];\n            [alert show];\n      \
    \  }\n    }\n}\n```\n\n# 对表格视图进行排序\n\n最后，您需要让表格视图的顺序在切换标签栏时发生变化。您需要在 `tabBar:didSelectItem:`\
    \ 委托方法中添加以下代码：\n\n```\n- (void)tabBar:(UITabBar *)tabBar didSelectItem:(UITabBarItem\
    \ *)item\n{\n    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n\
    \    NSUInteger tabIndex = [tabBar.items indexOfObject:item];\n    [defaults setInteger:tabIndex\
    \ forKey:kSelectedTabDefaultsKey];\n    [NSFetchedResultsController deleteCacheWithName:@\"\
    Hero\"];\n    _fetchedResultsController.delegate = nil;\n    _fetchedResultsController\
    \ = nil;\n    NSError *error;\n    if (![self.fetchedResultsController performFetch:&error])\
    \ {\n        NSLog(@\"Error performing fetch: %@\", [error localizedDescription]);\n\
    \    }\n    [self.heroTableView reloadData];\n}\n```\n\n# 启动时加载获取请求\n\n在 `HeroListController`\
    \ 的 `viewDidLoad` 方法中添加以下代码：\n\n```\n// 获取任何已存在的实体\nNSError *error = nil;\nif\
    \ (![[self fetchedResultsController] performFetch:&error]) {\n    UIAlertView\
    \ *alert =       [[UIAlertView alloc]           initWithTitle:NSLocalizedString(@\"\
    Error loading data\",\n                                           @\"Error loading\
    \ data\")\n                message:[NSString stringWithFormat:NSLocalizedString(@\"\
    Error was: %@, quitting.\",\n                                                \
    \                      @\"Error was: %@, quitting.\"),\n                     \
    \                              [error localizedDescription]]\n               delegate:self\n\
    \      cancelButtonTitle:NSLocalizedString(@\"Aw, Nuts\", @\"Aw, Nuts\")\n   \
    \   otherButtonTitles:nil];\n    [alert show];\n}\n```\n\n基本上就是这些了。\n\n# 开动吧\n\
    \n好吧，您还在等什么？这工作量可不小；您值得试一试。确保所有内容都已保存，然后构建并运行应用程序。\n\n如果一切顺利，当应用程序首次启动时，您应该会看到一个空表格，顶部有导航栏，底部有标签栏（图\
    \ 3-40）。按下导航栏右侧的按钮将向数据库中添加一个新的无名超级英雄。按下**编辑**按钮，您将能够删除英雄。\n\n![9781430238072_Fig03-40.jpg](img/9781430238072_Fig03-40.jpg)\n\
    \n图 3-40. SuperDB 应用程序启动时的界面\n"
- fmt: '**Note**  If your app crashed when you ran it, there’s a couple of things
    to look for. First, make sure you saved all your source code and nib files before
    you ran your project. Also, make sure that you have defaults specified for your
    hero’s name and secret identity in your data model editor. If you did that and
    your app still crashes, try resetting your simulator. Here’s how: bring up the
    simulator, and from the iPhone Simulator menu, select `Reset Contents and Settings`.
    That should do it. In [Chapter 5](#9781430238072_Ch05.xhtml), we’ll show you how
    to ensure that changes to your data model don’t cause such problems.


    Add a few unnamed superheroes to your application and try out the two tabs to
    make sure that the display changes when you select a new tab. When you select
    the `By Name` tab, it should look like [Figure 3-1](#9781430238072_Ch03.xhtml#Fig1),
    but when you select the `By Secret Identity` tab, it should look like [Figure
    3-41](#9781430238072_Ch03.xhtml#Fig41).


    ![9781430238072_Fig03-41.jpg](images/9781430238072_Fig03-41.jpg)


    [Figure 3-41.](#9781430238072_Ch03.xhtml#_Fig41)  Pressing the `By Secret Identity`
    tab doesn’t change the order of the rows yet, but it does change which value is
    displayed first


    ## Done, but Not Done


    In this chapter, you did a lot of work. You saw how to set up a navigation-based
    application that uses a tab bar, and you learned how to design a basic Core Data
    data model by creating an entity and giving it several attributes.


    This application isn’t done, but you’ve now laid a solid foundation upon which
    to move forward. When you’re ready, turn the page and start creating a detail
    editing page to allow the user to edit their superheroes.


    ## Chapter 4: The Devil in the Detail View


    In [Chapter 3](#9781430238072_Ch03.xhtml), you built your application’s main view
    controller. You set it up to display heroes ordered by their name or their secret
    identity, and you put in place the infrastructure needed to save, delete, and
    add new heroes. What you didn’t do was give the user a way to edit the information
    about a particular hero, which means you’re limited to creating and deleting superheroes
    named `Untitled Hero`. Guess you can’t ship your application yet ;-).


    That’s okay. Application development is an iterative process, and the first several
    iterations of any application likely won’t have enough functionality to stand
    on its own. In this chapter, you’re going to create an editable detail view to
    let the user edit the data for a specific superhero.


    The controller you’re going to write will be a subclass of `UITableViewController`,
    and you’re going to use an approach that is somewhat conceptually complex but
    one that will be easy to maintain and expand. This is important because you’re
    going to be adding new attributes to the `Hero` managed object, as well as expanding
    it in other ways, so you’ll need to keep changing the user interface to accommodate
    those changes.


    After you’ve written your new detail view controller, you will then add functionality
    to allow the user to edit each attribute, *in place*.


    ### View Implementation Choices


    In [Chapters 3](#9781430238072_Ch03.xhtml) and [4](#9781430238072_Ch04.xhtml)
    of *Beginning iOS 6 Development*, by David Mark, Jack Nutting, and Jeff LaMarche
    (Apress), you learned how to build a user interface using Interface Builder. Building
    your editable detail views in Interface Builder is definitely one way to go. But
    another common approach is to implement your detail view as a grouped table. Take
    a look at your iPhone’s Contacts application or the Contacts tab of the Phone
    application ([Figure 4-1](#9781430238072_Ch04.xhtml#Fig1)). The detail editing
    view in Apple’s navigation applications is often implemented using a grouped table
    rather than using an interface designed in Interface Builder.


    ![9781430238072_Fig04-01.jpg](images/9781430238072_Fig04-01.jpg)


    [Figure 4-1.](#9781430238072_Ch04.xhtml#_Fig1)  The Contacts tab of the iPhone
    application uses a table-based detail editing view


    Since you’ve chosen to use storyboards for your SuperDB application, you’ll be
    using the storyboard editor. For all intents and purposes, it’s the same as building
    your interface with Interface Builder.


    The iOS Human Interface Guidelines ([http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG))
    do not give any real guidance as to when you should use a table-based detail view
    as opposed to a detail view designed in Interface Builder, so it comes down to
    a question of which feels right. Here’s our take: if you’re building a navigation-based
    application and the data can reasonably and efficiently be presented in a grouped
    table, it probably should be. Since your superhero data is structured much like
    the data displayed in the Contacts application, a table-based detail view seems
    the obvious choice.


    The table view shown in [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2) displays
    data from a single hero, which means that everything in that table comes from
    a single managed object. Each row corresponds to a different attribute of the
    managed object. The first section’s only row displays the hero’s name, for example.
    When in editing mode, tapping a specific row will display the appropriate subview
    to modify that attribute. For a string, it will present a keyboard; for a date,
    a date picker.


    ![9781430238072_Fig04-02.jpg](images/9781430238072_Fig04-02.jpg)


    [Figure 4-2.](#9781430238072_Ch04.xhtml#_Fig2)  The detail view that you’ll be
    building in this application, in view and editing mode


    The organization of the table view into sections and rows are not determined by
    the managed object. Instead, they are the results of design decisions you, as
    the developer, must make by trying to anticipate what will make sense to your
    users. You could, for example, put the attributes in alphabetical order, which
    would put birthdate first. That wouldn’t have been very intuitive because birthdate
    is not the most important or defining attribute of a hero. In our minds, the hero’s
    name and secret identity are the most important attributes and thus should be
    the first two elements presented in your table view.


    ### Creating the Detail View Controller


    Find your SuperDB project folder from [Chapter 3](#9781430238072_Ch03.xhtml) and
    make a copy of it. This way, if things go south when you add your new code for
    this chapter, you won’t have to start at the very beginning. Open this new copy
    of your project in Xcode.


    Next, create the detail view controller itself. Remember that you’re creating
    a table-based editing view, so you want to subclass `UITableViewController`. Select
    `SuperDB.storyboard` and open the storyboard editor. Open the Utility pane, if
    it’s not already open, and find the table view controller in the Object library.
    Drag it onto the storyboard editor, to the right of the `HeroListController` ([Figure
    4-3](#9781430238072_Ch04.xhtml#Fig3)).


    ![9781430238072_Fig04-03.jpg](images/9781430238072_Fig04-03.jpg)


    [Figure 4-3.](#9781430238072_Ch04.xhtml#_Fig3)  The layout of your storyboard


    Make sure you’re zoom level is such that you see the three icons on the table
    view’s label. Single-click the table view (the grey area of the view), and switch
    the Utility pane to the Attribute Inspector ([Figure 4-4](#9781430238072_Ch04.xhtml#Fig4)).


    ![9781430238072_Fig04-04.jpg](images/9781430238072_Fig04-04.jpg)


    [Figure 4-4.](#9781430238072_Ch04.xhtml#_Fig4)  Table view’s attributes'
