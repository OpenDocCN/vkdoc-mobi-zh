- fmt: "`AssetItem *assetItem = [self.assets objectAtIndex:row];`\n`if (!assetItem.metadataLoaded)\
    \ {`\n`[assetItem loadAssetMetadataWithCompletionHandler:^(AssetItem *assetItem){`\n\
    `[self updateCellWithAssetItem:assetItem];`\n`}];`\n`}`\n\n`cell.textLabel.text\
    \ = [assetItem title];`\n`cell.detailTextLabel.text = [assetItem artist];`\n`cell.tag\
    \ = row;`\n\nYou find the `AssetItem` in the `assets` property array for the row\
    \ of the given index path. You check if the `AssetItem`’s metadata has been loaded.\
    \ If not, you tell the `AssetItem` to load its metadata. Your completion handler\
    \ block is a single call to `updateCellWithAssetItem:`. Finally, you populate\
    \ the cell with the `AssetItem` title and artist.\n\nYour completion handler,\
    \ `updateCellWithAssetItem:`, will cause the table view cell that contains the\
    \ passed in `AssetItem` to reload and redisplay itself. As a minor performance\
    \ check, you only update the table view cell to update if it’s currently visible.\n\
    \n```\n- (void)updateCellWithAssetItem:(AssetItem *)assetItem\n{\n        NSArray\
    \ *visibleIndexPaths = [self.tableView indexPathsForVisibleRows];\n        for\
    \ (NSIndexPath *indexPath in visibleIndexPaths) {\n            AssetItem *visibleItem\
    \ = [self.assets objectAtIndex:[indexPath row]];\n            if ([assetItem isEqual:visibleItem])\
    \ {\n                UITableViewCell *cell = [self.tableView cellForRowAtIndexPath:indexPath];\n\
    \                [self configureCell:cell forIndexPath:indexPath];\n         \
    \       [cell setNeedsLayout];\n                break;\n            }\n      \
    \  }\n}\n```\n\nFinally, you need to populate your `assets` property with `AssetItem`s.\
    \ Locate the method `loadAssetsForMediaType:` and find the line\n\n```\n[mediaAssets\
    \ addObject:[AVAsset assetWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];\n\
    ```\n\nand replace it with\n\n```\n[mediaAssets addObject:    [[AssetItem alloc]\
    \ initWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];\n```\n\n\
    Build and run the app. You should see the audio view controller populate the table\
    \ view cells, then refresh them with the correct metadata. If you have a large\
    \ enough media library, you can scroll down and see the table view cells refresh\
    \ themselves.\n\nYour `AVMediaPlayer` can load your audio and video media from\
    \ your media library, load them as `AVAsset`s (encapsulated in your custom `AssetItem`\
    \ class), and load and display the asset’s metadata. What’s left? You need to\
    \ play your media!\n\nCreate a new Objective-C class. Name it `PlayerViewController`\
    \ and make it subclass of `UIViewController`. That’s all you need to do with this\
    \ class for now. You’ll return to this class when you lay out the scene in the\
    \ storyboard.\n\nNow, create another Objective-C class named `AVPlayerView`, which\
    \ is a subclass of `UIView`. This is the view that you’ll be using the play video\
    \ media. It’s a simple extension on `UIView`. Open `AVPlayerView.h`, and modify\
    \ it to match this implementation:\n\n```\n#import <UIKit/UIKit.h>\n\n@class AVPlayer;\n\
    \n@interface AVPlayerView : UIView\n\n@property (strong, nonatomic) AVPlayer*\
    \ player;\n- (void)setVideoFillMode:(NSString *)fillMode;\n\n@end\n```\n\nThe\
    \ implementation of `AVPlayerView` is a little trickier. Open `AVPlayerView.m`.\
    \ First, you need to import the `AVFoundation` header file.\n\n```\n#import \"\
    AVPlayerView.h\"\n#import <AVFoundation/AVFoundation.h>\n\n@implementation AVPlayerView\n\
    ```\n\nNext, you need to override the `UIView` method `layerClass` to return `AVPlayerLayer`.\n\
    \n```\n+ (Class)layerClass\n{\n        return [AVPlayerLayer class];\n}\n```\n\
    \nNext, you override the `player` property to redirect to your view’s layer.\n\
    \n```\n- (AVPlayer *)player\n{\n        return [(AVPlayerLayer *)[self layer]\
    \ player];\n}\n\n- (void)setPlayer:(AVPlayer *)player\n{\n        [(AVPlayerLayer*)[self\
    \ layer] setPlayer:player];\n}\n```\n\nFinally, you add the ability to adjust\
    \ the video fill mode.\n\n```\n/* Specifies how the video is displayed within\
    \ a player layer’s bounds.\n   (AVLayerVideoGravityResizeAspect is default) */\n\
    - (void)setVideoFillMode:(NSString *)fillMode\n{\n        AVPlayerLayer *playerLayer\
    \ = (AVPlayerLayer*)[self layer];\n        playerLayer.videoGravity = fillMode;\n\
    }\n\n@end\n```\n\nNow you can work on building your player interface. Open `MainStoryboard.storyboard`.\
    \ Drag a `UIViewController` to right of the `AudioViewController` and `VideoViewController`.\
    \ Align it so it matches [Figure 12-13](#9781430238072_Ch12.xhtml#Fig13). Control-drag\
    \ from the prototype table view cell in the `AudioViewController` to the new `UIViewController`.\
    \ In the pop-up menu, select `Modal` under the `Selection Segue` header. Repeat\
    \ this process for the `VideoViewController`. Select the new `UIViewController`\
    \ and change its class from `UIViewController` to `PlayerViewController` in the\
    \ Identity Inspector. For `AVMediaPlayer`, the `PlayerViewController` will play\
    \ both audio and video files.\n\n![9781430238072_Fig12-13.jpg](images/9781430238072_Fig12-13.jpg)\n\
    \n[Figure 12-13.](#9781430238072_Ch12.xhtml#_Fig13)  Laying out your `UIViewController`\n\
    \nDrag a `UIView` onto the `PlayerViewController`. It should expand to fill the\
    \ entire scene. If not, adjust the size of the new `UIView` so it does. Open the\
    \ Identity Inspector and change the view’s class from `UIView` to `AVPlayerView`.\
    \ Switch to the Attributes Inspector to change the background color from white\
    \ to black. Switch to the assistant editor, and create a new outlet for the `AVPlayerView`.\
    \ Name the outlet `playerView`. Switch back to the standard editor.\n\nDrag another\
    \ `UIView` onto the `PlayerViewController`. Again, it should expand to fill the\
    \ entire scene; adjust it if it doesn’t. Unlike the `playerView`, you can keep\
    \ the view’s class as `UIView`. Open the Attributes Inspector and change the background\
    \ color to Default (clear). Using the assistant editor, create a new outlet for\
    \ this `UIView` and name it `controlView`. You’re going to add the same control\
    \ components to the `controlView` that you did for `MPMediaPlayer`, with some\
    \ minor additions. Look at [Figure 12-14](#9781430238072_Ch12.xhtml#Fig14) and\
    \ compare it to [Figure 12-12](#9781430238072_Ch12.xhtml#Fig12). You’ve added\
    \ a `UISlider` with two `UILabel`s on each side between the Song label and image\
    \ view. Start by dragging a `UILabel` to the far left edge of the scene, right\
    \ below the Song label. Change the text from `label` to `00:00`, the color from\
    \ black to white, the font to System 12.0, and right align the text. Add a `UILabel`\
    \ to the far right edge, with the same attribute changes, except left align the\
    \ text. Place a `UISlider` between the two labels, extending it to fill the space\
    \ between the labels. Use the Attribute Inspector to change its current value\
    \ from 0.5 to 0.0.\n\n![9781430238072_Fig12-14.jpg](images/9781430238072_Fig12-14.jpg)\n\
    \n[Figure 12-14.](#9781430238072_Ch12.xhtml#_Fig14)  `AVMediaPlayer` `PlayerViewController`\
    \ layout\n\nYou’ll also add an additional `UIBarButtonItem` to the far right of\
    \ the toolbar. Keep the button Identifier attribute as `Custom`, but change the\
    \ Title to read `1.0x`. You’ll be using this button to toggle playback speed between\
    \ different rates.\n\nYou need to add outlets for the UI components you added.\
    \ Select the assistant editor. Create an outlet named `artist` for the label titled\
    \ Artist. For the Song label, name the outlet `song`. Create an outlet for the\
    \ top slider, and name it `scrubber`. Create an outlet for the label left of the\
    \ scrubber slider, and name it `elapsedTime`. For the label to the right of the\
    \ scrubber slider, name the outlet `remainingTime`. The `UIImageView` outlet should\
    \ be named `imageView`. And the bottom slider will be named `volume`. You need\
    \ outlets for the `UIToolbar` (`toolbar`), the Play button (`play`), and the `1.0x`\
    \ button (`rate`). Like with `MPMediaPlayer`, you don’t need an outlet for the\
    \ Done button."
  raw: 'AssetItem *assetItem = [self.assets objectAtIndex:row];

        if (!assetItem.metadataLoaded) {

            [assetItem loadAssetMetadataWithCompletionHandler:^(AssetItem *assetItem){

                [self updateCellWithAssetItem:assetItem];

            }];

        }


    cell.textLabel.text = [assetItem title];

        cell.detailTextLabel.text = [assetItem artist];

        cell.tag = row;

    }

    ```


    You find the AssetItem in the assets property array for the row of the given index
    path. You check if the AssetItem’s metadata has been loaded. If not, you tell
    the AssetItem to load its metadata. Your completion handler block is a single
    call to updateCellWithAssetItem:. Finally, you populate the cell with the AssetItem
    title and artist.


    Your completion handler, updateCellWithAssetItem:, will cause the table view cell
    that contains the passed in AssetItem to reload and redisplay itself. As a minor
    performance check, you only update the table view cell to update if it’s currently
    visible.


    ```

    - (void)updateCellWithAssetItem:(AssetItem *)assetItem

    {

            NSArray *visibleIndexPaths = [self.tableView indexPathsForVisibleRows];

            for (NSIndexPath *indexPath in visibleIndexPaths) {

            AssetItem *visibleItem = [self.assets objectAtIndex:[indexPath row]];

                    if ([assetItem isEqual:visibleItem]) {

                            UITableViewCell *cell = [self.tableView cellForRowAtIndexPath:indexPath];

                            [self configureCell:cell forIndexPath:indexPath];

                            [cell setNeedsLayout];

                            break;

                    }

            }

    }

    ```


    Finally, you need to populate your assets property with AssetItems. Locate the
    method loadAssetsForMediaType: and find the line


    ```

    [mediaAssets addObject:[AVAsset assetWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];

    ```


    and replace it with


    ```

    [mediaAssets addObject:    [[AssetItem alloc] initWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];

    ```


    Build and run the app. You should see the audio view controller populate the table
    view cells, then refresh them with the correct metadata. If you have a large enough
    media library, you can scroll down and see the table view cells refresh themselves.


    Your AVMediaPlayer can load your audio and video media from your media library,
    load them as AVAssets (encapsulated in your custom AssetItem class, and load and
    display the asset’s metadata. What’s left? You need to play your media!


    Create a new Objective-C class. Name it PlayerViewController and make it subclass
    of UIViewController. That’s all you need to do with this class for now. You’ll
    return to this class when you lay out the scene in the storyboard.


    Now, create another Objective-C class named AVPlayerView, which is a subclass
    of UIView. This is the view that you’ll be using the play video media. It’s a
    simple extension on UIView. Open AVPlayerView.h, and modify it to match this implementation:


    ```

    #import <UIKit/UIKit.h>


    @class AVPlayer;


    @interface AVPlayerView : UIView


    @property (strong, nonatomic) AVPlayer* player;

    - (void)setVideoFillMode:(NSString *)fillMode;


    @end

    ```


    The implementation of AVPlayerView is a little trickier. Open AVPlayerView.m.
    First, you need to import the AVFoundation header file.


    ```

    #import "AVPlayerView.h"

    #import <AVFoundation/AVFoundation.h>


    @implementation AVPlayerView

    ```


    Next, you need to override the UIView method layerClass to return AVPlayerLayer.


    ```

    + (Class)layerClass

    {

            return [AVPlayerLayer class];

    }

    ```


    Next, you override the player property to redirect to your view’s layer.


    ```

    - (AVPlayer *)player

    {

            return [(AVPlayerLayer *)[self layer] player];

    }


    - (void)setPlayer:(AVPlayer *)player

    {

            [(AVPlayerLayer*)[self layer] setPlayer:player];

    }

    ```


    Finally, you add the ability to adjust the video fill mode.


    ```

    /* Specifies how the video is displayed within a player layer’s bounds.

       (AVLayerVideoGravityResizeAspect is default) */

    - (void)setVideoFillMode:(NSString *)fillMode

    {

            AVPlayerLayer *playerLayer = (AVPlayerLayer*)[self layer];

            playerLayer.videoGravity = fillMode;

    }


    @end

    ```


    Now you can work on building your player interface. Open MainStoryboard.storyboard.
    Drag a UIViewController to right of the AudioViewController and VideoViewController.
    Align it so it matches [Figure 12-13](#9781430238072_Ch12.xhtml#Fig13). Control-drag
    from the prototype table view cell in the AudioViewController to the new UIViewController.
    In the pop-up menu, select Modal under the Selection Segue header. Repeat this
    process for the VideoViewController. Select the new UIViewController and change
    its class from UIViewController to PlayerViewController in the Identity Inspector.
    For AVMediaPlayer, the PlayerViewController will play both audio and video files.


    ![9781430238072_Fig12-13.jpg](images/9781430238072_Fig12-13.jpg)


    [Figure 12-13.](#9781430238072_Ch12.xhtml#_Fig13)  Laying out your UIViewController


    Drag a UIView onto the PlayerViewController. It should expand to fill the entire
    scene. If not, adjust the size of the new UIView so it does. Open the Identity
    Inspector and change the view’s class from UIView to AVPlayerView. Switch to the
