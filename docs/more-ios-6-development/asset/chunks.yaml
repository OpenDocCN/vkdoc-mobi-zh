    When the map view for which you are the delegate needs an annotation view, it
    will call `mapView:viewForAnnotation:`. The first thing you do is declare an identifier
    so you can dequeue the right kind of annotation view, then you make sure the map
    view is asking you about a type of annotation that you know about. If it is, you
    dequeue an instance of `MKPinAnnotationView` with your identifier. If there are
    no dequeued views, you create one. You could also have used `MKAnnotationView`
    here instead of `MKPinAnnotationView`. In fact, there’s an alternate version of
    this project in the project archive that shows how to use `MKAnnotationView` to
    display a custom annotation view instead of a pin. If you didn’t create a new
    view, it means you got a dequeued one from the map view. In that case, you have
    to make sure the dequeued view is linked to the right annotation. Then you do
    some configuration.


    - You make sure the annotation view is enabled so it can be selected.

    - You set `animatesDrop` to `YES` because this is a pin view, and you want it
    to drop onto the map the way pins are wont to do.

    - You set the pin color to purple and make sure that it can show a callout.

    - After that, you use `performSelector:withObject:afterDelay:` to call that private
    method you created earlier.

    - You can’t select an annotation until its view is actually being displayed on
    the map, so you wait half a second to make sure that’s happened before selecting.
    This will also make sure that the pin has finished dropping before the callout
    is displayed.

