  raw: 'Select the SuperDB.storyboard, and find the segue between the HeroListController
    and the HeroDetailController. Delete it. Control-drag from the HeroListController
    (the icon in the label) to the HeroDetailController (somewhere in the view). A
    pop-up with a header of Manual Segue should appear; choose the push menu item.
    A new segue should appear between the two view controllers, select it. In the
    Attributes Inspector, give it the identifier HeroDetailSegue ([Figure 4-21](#9781430238072_Ch04.xhtml#Fig21)).


    ![9781430238072_Fig04-21.jpg](images/9781430238072_Fig04-21.jpg)


    [Figure 4-21.](#9781430238072_Ch04.xhtml#_Fig21)  Setting the segue identifier


    Now you need to reconnect the HeroListController cells to the HeroDetailSegue.
    Edit HeroListController.m. Find the method tableView:didSelectRowAtIndexPath:
    and replace the method body with


    ```

    NSManagedObject *selectedHero = [self.fetchedResultsController objectAtIndexPath:indexPath];

    [self performSegueWithIdentifier:@"HeroDetailSegue" sender:selectedHero];

    ```


    You’re essentially doing the same thing you did in addHero:, except that the Hero
    object is coming from the fetched results controller rather than being created.
    This looks good so far, but you still aren’t sending data to the HeroDetailController.
    You handle that in the UIViewController method prepareForSegue:sender:. Add this
    method to the HeroListController (you can put it anywhere, but you put it after
    the setEditing:animated: method):


    ```

    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender

    {

        if ([segue.identifier isEqualToString:@"HeroDetailSegue"])

        {

            if ([sender isKindOfClass:[NSManagedObject class]]) {

                HeroDetailController *detailController = segue.destinationViewController;

                detailController.hero = sender;

            }

            else {

                UIAlertView *alert =

                      [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Hero
    Detail Error",

                                                                           @"Hero
    Detail Error")

                                         message:NSLocalizedString(@"Error trying
    to show Hero detail",

                                                                       @"Error trying
    to show Hero detail")

                                        delegate:self

                               cancelButtonTitle:NSLocalizedString(@"Aw, Nuts", @"Aw,
    Nuts")

                               otherButtonTitles:nil];

                [alert show];

            }

        }

    }

    ```


    Note that prepareForSegue:sender: is called by performSegueWithName:sender: internally.
    It’s a hook Apple gives you to set things up correctly before showing the HeroDetailController.


    By the way, Xcode should have complained about HeroDetailController and detailController.hero.
    Add the following #import at the top of HeroListViewController.m:


    ```

    #import "HeroDetailController.h"

    ```


    Showing the Details


    You’re sending the Hero object down from the HeroListController to the HeroDetailController.
    Now you’re ready to show the details. Edit HeroDetailController.m and find tableView:cellForRowAtIndexPath:.
    Remember you commented it out earlier, so it won’t show up in the jump bar function
    menu. Uncomment it and replace the body with this:


    ```

    static NSString *CellIdentifier = @"HeroDetailCell";

    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];

    if (cell == nil)

        cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue2

                                       reuseIdentifier:CellIdentifier];

    // Configure the cell...

    NSUInteger sectionIndex = [indexPath section];

    NSUInteger rowIndex = [indexPath row];

    NSDictionary *section = [self.sections objectAtIndex:sectionIndex];

    NSArray *rows = [section objectForKey:@"rows"];

    NSDictionary *row = [rows objectAtIndex:rowIndex];

    cell.textLabel.text = [row objectForKey:@"label"];

    cell.detailTextLabel.text = [self.hero valueForKey:[row objectForKey:@"key"]];

    return cell;

    ```


    Build and run the app. You get your list of heroes. Tap one to see the details.


    It didn’t work, did it? Why not? The problem is the birthdate attribute. If you
    recall, birthdate is an NSDate object. And cell.textLabel.text expects a string.
    You’ll handle properly in a little bit, but for now change the assignment to read


    ```

    cell.detailTextLabel.text = [[self.hero valueForKey:[row objectForKey:@"key"]]
    description];

    ```


    Try running it again. View an existing hero and try adding a new one. After adding
    a hero, your detail view should look like [Figure 4-22](#9781430238072_Ch04.xhtml#Fig22).


    ![9781430238072_Fig04-22.jpg](images/9781430238072_Fig04-22.jpg)


    [Figure 4-22.](#9781430238072_Ch04.xhtml#_Fig22)  Detail view for a new hero


    Editing the Details


    Look back at [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2) and compare it to [Figure
    4-22](#9781430238072_Ch04.xhtml#Fig22). Note that the left image in [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2)
    has an Edit button on the right side of the navigation bar. And [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2)
    specifies that you have an Edit mode for the detail view, as seen in the right
    image. Let’s add the Edit button and implement the Edit mode in the HeroDetailController.


    Editing Mode in the Detail View


    Compare the two images in [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2). How do
    they differ? First, the Edit button in the left image has been replaced with a
    Save button in the right image. Also, the Save button is highlighted. The Back
    button has been replaced with a Cancel button. The cells in the right image appear
    to be indented. While it appears to be a lot of changes, it’s actually not that
    much effort to implement.


    First, add the Edit button to the navigation bar. Select HeroDetailController.m
    and find the viewDidLoad method. Uncomment the following line:


    ```

    self.navigationItem.rightBarButtonItem = self.editButtonItem;

    ```


    Run the application and drill down to the detail view. There’s the Edit button
    on the right side of the navigation bar. If you click it, the view should change
    to look like [Figure 4-23](#9781430238072_Ch04.xhtml#Fig23).


    ![9781430238072_Fig04-23.jpg](images/9781430238072_Fig04-23.jpg)


    [Figure 4-23.](#9781430238072_Ch04.xhtml#_Fig23)  The detail view in editing mode


    Note that the Edit button has automatically changed into a Done button and is
    highlighted. If you click Done, it will revert back into the Edit button. This
    is fine, but you really want the Done button to read Save. That’s a little more
    work.


    As you’ve seen, the editButtonItem method gives you an instance of a UIBarButton
    that toggles between Edit and Done when pressed. It also toggles the editing property
    in your HeroDetailController (which inherits the property from UITableViewController)
    between NO and YES. The button also invokes the setEditing:animated: callback.


    You want to replace the Done with Save. To accomplish this, you need to replace
    the Edit button with a Save button. While you’re at it, add a specific method
    to handle the saving, which you’ll use later. First, you need to add a property
    for the Save button and a callback method. Since you only access the Save button
    inside HeroDetailController, you can make it a private property. And since the
    callback is only used by the Save button you can make that a private declaration
    as well. Edit HeroDetailController.m and add it to the category.


    ```

    @interface HeroDetailController ()

    @property (strong, nonatomic) NSArray *sections;

    @property (strong, nonatomic) UIBarButtonItem *saveButton;

    - (void)save;

    @end

    ```


    Now you need to create an instance of a Save button and assign it to this variable.
    Add the following to viewDidLoad in HeroDetailController.m, right after the Edit
    button code you just uncommented.


    ```

    self.saveButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemSave


    target:self                              

                                       action:@selector(save)];

    ```'
