  trans: '

    `SuperDBPickerCell` 在概念上与 `SuperDBDateCell` 完全相同。它并非使用 `NSDatePicker`，而是采用 `UIPickerView`。为了让
    `pickerView` 知道要显示什么内容，你需要让 `SuperDBDateCell` 遵循 `UIPickerViewDataSource` 和 `UIPickerViewDelegate`
    协议。当选择器的值发生变化时，无需在 `pickerView` 上设置回调，而是使用委托方法 `pickerView:didSelectRow:`。由于你将值存储为字符串，因此无需重写取值方法的实现。但是，你需要重写赋值方法。


    你需要告诉应用程序对“性别”属性使用这个新类。编辑属性列表 `HeroDetailController.plist` 中的 class 行。将值从 `SuperDBEditableCell`
    改为 `SuperDBPickerCell`。确保你更改的是正确的行。label 行应为 Sex，attribute 行应为 sex。


    如果你现在运行应用程序并尝试编辑“性别”属性，应该会看到选择器滚轮出现在屏幕底部。但是，没有任何可选值。回顾一下你刚刚添加的代码，选择器滚轮从 `values`
    属性获取信息。但你从未设置过它。同样，你可以将值硬编码到 `SuperDBPickerCell` 对象中，但这会限制该对象的实用性。相反，你将在属性列表中添加一个新项。


    就像你之前添加 class 项一样，你需要添加一个新键，名为 `values`。与 class 键不同，你只需将其添加到键为 `sex` 的项中。编辑 `HeroDetailController.plist`
    并展开所有节点。对于最后一个项，找到键为 `label` 的行。点击该行上的 + 按钮。将新项命名为 `values`，并将其类型更改为数组。向 `values`
    数组添加两个字符串项，并将它们的值设为 `Male` 和 `Female`。参见图 4-28。


    ![9781430238072_Fig04-28.jpg](img/9781430238072_Fig04-28.jpg)


    图 4-28.   包含 sex 项值的 HeroDetailController.plist


    现在，当 `tableView:cellForRowAtIndexPath:` 在 `HeroDetailController` 中执行时，你需要将 `values`
    的内容传递给表格视图单元格。打开 `HeroDetailController.m`，并在其他单元格配置代码之前，向 `tableView:cellForRowAtIndexPath:`
    中添加以下代码：


    ```

    NSArray *values = [row valueForKey:@"values"];

    if (values != nil) {

        // TODO clean this up - ugh

        [cell performSelector:@selector(setValues:) withObject:values];

    }

    ```


    构建并运行应用。导航到详细视图并点击编辑按钮。点击“性别”单元格，选择器视图应出现，并显示 Male 和 Female 选项。设置值，点击保存，“性别”单元格中应填充所选值。


    ## 魔鬼的终结


    好了，您已经完成了这个漫长且概念上颇具挑战性的章节。您应该为自己能够与我们一路坚持到底而祝贺自己。基于表格的详细编辑视图控制器是编写难度最大的控制器类之一，但现在您的工具箱中已经拥有一些工具来帮助创建它们。您已经了解了如何使用属性列表定义表格视图的结构，了解了如何创建自定义
    `UITableViewCell` 子类以编辑不同类型的数据，还了解了如何利用 Objective-C 的动态特性，根据存储在 `NSString` 实例中的类名来创建类的实例。


    准备好继续前进了吗？翻到下一页。我们出发吧！


    # 第 5 章


    ## 为变更做准备：迁移和版本控制


    到第 4 章结束时，您通过构建一个功能齐全（尽管有些简单）的 Core Data 应用程序，已经掌握了 Core Data 架构和功能的大部分内容。您现在拥有足够的
    Core Data 技能来构建一个可靠的应用程序，将其发送给测试人员，然后提交到 App Store。


    但是，如果您更改了数据模型，并将新版本的应用程序发送给已经拥有先前版本的测试人员，会发生什么？以 SuperDB 应用为例。假设您决定向 `Hero` 实体添加一个新属性；将现有的一个可选属性改为必需属性；然后添加一个新实体。您能否直接将程序发送给用户，还是这会对他们的数据造成问题？


    就目前情况而言，如果您对数据模型进行了更改，存储在用户 iPhone 持久化存储中的现有数据将无法在新版应用程序中使用。您的应用程序将在启动时崩溃。如果您从
    Xcode 启动新版本，您将看到一条类似下面这样的巨大且可怕的错误消息：


    ```

    2012-07-17 17:33:56.641 SuperDB[11233:c07] Unresolved error Error Domain = NSCocoaErrorDomain
    Code = 134100 "The operation couldn''t be completed. (Cocoa error 134100.)" UserInfo
    = 0x80a3b30 {metadata = {

        NSPersistenceFrameworkVersion = 409;

        NSStoreModelVersionHashes =     {

            Hero = <0fe30005 4578f63c 124e2af7 3798fb56 7a194f27 f9281223 bd265ee3
    d985d2fc>;

        };

        NSStoreModelVersionHashesVersion = 3;

        NSStoreModelVersionIdentifiers =     (

            ""

        );

        NSStoreType = SQLite;

        NSStoreUUID = "719284D9-793C-48A7-8F3E-C633CD4F0402";

        "_NSAutoVacuumLevel" = 2;

    }, reason = The model used to open the store is incompatible with the one used
    to create the store}, {

        metadata =     {

            NSPersistenceFrameworkVersion = 409;

            NSStoreModelVersionHashes =         {

                Hero = <0fe30005 4578f63c 124e2af7 3798fb56 7a194f27 f9281223 bd265ee3
    d985d2fc>;

            };

            NSStoreModelVersionHashesVersion = 3;

            NSStoreModelVersionIdentifiers =         (

                ""

            );

            NSStoreType = SQLite;

            NSStoreUUID = "719284D9-793C-48A7-8F3E-C633CD4F0402";

            "_NSAutoVacuumLevel" = 2;

        };

        reason = "The model used to open the store is incompatible with the one used
    to create the store";

    }

    ```


    如果在开发过程中发生这种情况，通常不是什么大问题。如果没有其他人拥有您的应用程序副本，并且其中没有存储任何不可替代的数据，您可以在 iPhone 模拟器菜单中选择“重置内容和设置”，或者使用
    Xcode 的 Organizer 窗口从 iPhone 上卸载应用程序，Core Data 将在下次安装并运行应用程序时，基于修订后的数据模型创建一个新的持久化存储。


    但是，如果您已将应用程序提供给其他人，那么除非他们卸载并重新安装应用程序（从而丢失所有现有数据），否则他们的 iPhone 上将有一个无法使用的应用程序。


    正如您可能想象的那样，这并非能让客户特别满意的事情。在本章中，我们将向您展示如何对数据模型进行版本控制。然后，我们将讨论 Apple 用于在不同数据模型版本之间转换数据的机制，这称为迁移。我们将讨论两种迁移类型之间的区别：轻量级迁移和标准迁移。然后，您将设置
    SuperDB Xcode 项目以使用轻量级迁移，以便您在接下来几章中所做的更改不会给您的（诚然是不存在的）用户带来问题。


    在本章结束时，SuperDB 应用程序将全部设置完毕，准备好迎接新的开发，包括对数据模型的更改，无需担心用户在你发布新版本时会丢失数据。


    ## 关于数据模型

    '
- fmt: '当你使用支持 Core Data 的模板创建新 Xcode 项目时，项目中会包含一个以 `.xcdatamodel` 文件形式存在的单一数据模型。在[第
    2 章](#9781430238072_Ch02.xhtml)中，你看到了该文件如何在应用委托的 `managedObjectModel` 方法中被运行时加载为
    `NSManagedObjectModel` 实例。为了理解版本控制和迁移，有必要深入底层来探究其中原理。


    ## 数据模型是被编译的


    项目中的 `.xcdatamodel` 类文件不会像其他资源那样被复制到应用程序包中。数据模型文件包含许多应用程序不需要的信息。例如，它包含了在 Xcode
    模型编辑器图表视图中对象的布局信息（[图 5-1](#9781430238072_Ch05.xhtml#Fig1)），这些信息仅是为了让你更轻松。你的应用程序并不关心这些圆角矩形是如何排列的，因此没有理由将这些信息包含在应用程序包内。


    ![9781430238072_Fig05-01.jpg](images/9781430238072_Fig05-01.jpg)


    [图 5-1.](#9781430238072_Ch05.xhtml#_Fig1) 某些信息，例如代表 `Hero` 实体的圆角矩形位于左上角，以及属性与关系旁的展开三角形，存储在
    `.xcdatamodel` 文件中，但不会存储在 `.mom` 文件中


    相反，你的 `.xcdatamodel` 文件会被编译成一种扩展名为 `.mom` 的新文件类型，其全称为管理对象模型（managed object model，简称
    Mom）。这是一种更紧凑的二进制文件，仅包含应用程序所需的信息。实际加载以创建 `NSManagedObjectModel` 实例的就是这个 `.mom`
    文件。


    ## 数据模型可以有多个版本


    你很可能在广义上理解版本控制的含义。当一家公司发布具有新功能的软件新版本时，通常会有一个新的编号或名称。例如，你正在使用特定版本的 Xcode（对我们来说是
    4.5）和特定版本的 Mac OS X（对我们来说是 10.8，也称为 Mountain Lion）。


    这些被称为*市场营销版本标识符*或*版本号*，因为它们的主要目的是告知客户软件各个发布版本之间的区别。当程序的新版本发布给客户时，市场营销版本号会增加。


    然而，开发人员还会使用其他更细粒度的版本控制形式。如果你曾使用过诸如 `cvs`、`svn` 或 `git` 等并发版本控制系统，你可能就了解这是如何工作的。版本控制软件会跟踪项目（以及其他内容）中所有单个源代码和资源文件随时间的变化。


    **注意** 我们不打算讨论常规版本控制，但作为开发人员了解它是有益的。幸运的是，网络上有大量资源可用于学习如何安装和使用不同的版本控制软件包。一个很好的起点是维基百科上关于版本控制的页面：`http://en.wikipedia.org/wiki/Revision_control.`


    Xcode 集成了多个版本控制软件包，但它也有一些内置的版本控制机制，其中包括用于 Core Data 数据模型的机制。创建数据模型的新版本是让用户保持满意的关键。每次向公众发布应用程序的版本时，你都应创建一个新的数据模型版本。这将创建一份新副本，以便保留旧版本，帮助系统弄清楚如何将数据从旧版本制作的持久化存储更新到较新版本。


    ## 创建新数据模型版本


    在 Xcode 中单击 `SuperDB.xcdatamodeld`。然后点击“Editor”菜单并选择“Add Model Version”。系统将要求你命名这个新版本。Xcode
    提供的默认值（[图 5-2](#9781430238072_Ch05.xhtml#Fig2)）即可。只需点击“Finish”。


    ![9781430238072_Fig05-02.jpg](images/9781430238072_Fig05-02.jpg)


    [图 5-2.](#9781430238072_Ch05.xhtml#_Fig2) 为新的数据模型版本命名


    你刚刚添加了一个数据模型的新版本。点击“Finish”后，`SuperDB.xcdatamodeld` 文件旁边会出现一个展开三角形。展开后即可看到数据模型的两个不同版本（[图
    5-3](#9781430238072_Ch05.xhtml#Fig3)）。


    ![9781430238072_Fig05-03.jpg](images/9781430238072_Fig05-03.jpg)


    [图 5-3.](#9781430238072_Ch05.xhtml#_Fig3) 版本化的数据模型包含当前版本（图标上带有绿色对勾）以及所有之前的版本


    其中一个版本的图标上会有一个绿色对勾。这表示当前版本（在你的例子中是 `SuperDB.xcdatamodel`），也就是你的应用程序将使用的版本。默认情况下，当你创建新版本时，你实际上创建的是原始版本的副本。然而，新版本保留了与原始版本*相同的文件名*，而副本的名称则会追加一个递增的较大数字。该文件代表了你创建新版本时数据模型的样子，并且应保持原样。


    较高数字代表较旧文件这一事实可能看起来有点奇怪，但随着版本的积累，编号方式会变得更加合理。下次你创建新版本时，旧版本将被命名为 `SuperDB 3.xcdatamodel`，以此类推。对于所有非当前版本来说，这种编号方式是合理的，因为每个版本都会比上一个版本编号大
    1。通过保持当前模型的名称不变，很容易判断哪个版本是可以修改的。


    ## 当前数据模型版本


    在[图 5-3](#9781430238072_Ch05.xhtml#Fig3) 中，`SuperDB.xcdatamodel` 是数据模型的当前版本，`SuperDB
    2.xcdatamodel` 是之前的版本。你现在可以安全地对当前版本进行修改，同时知道已存在一个前一个版本的副本（冻结在时间中），这将使你能够在发布时，将用户的数据从旧版本迁移到下一个版本。


    你可以更改哪个版本是当前版本。为此，选择 `SuperDB.xcdatamodeld`，然后在实用工具面板中打开 File Inspector（[图 5-4](#9781430238072_Ch05.xhtml#Fig4)）。你应看到一个名为“Version
    Core Data Model”的区域。找到一个标记为“Current”的下拉框。在这里，你可以选择要设为当前版本的数据模型。你不会经常这样做，但可能会因为某些原因需要回退到应用程序的旧版本。你可以使用迁移功能回退到旧版本，或迁移到新版本。


    ![9781430238072_Fig05-04.jpg](images/9781430238072_Fig05-04.jpg)


    [图 5-4.](#9781430238072_Ch05.xhtml#_Fig4) Core Data (Directory) File Inspector


    ## 数据模型版本标识符


    虽然你可以通过选择导航面板中的特定数据模型版本并打开 File Inspector（[图 5-5](#9781430238072_Ch05.xhtml#Fig5)）来为数据模型分配像
    1.1 或 Version A 这样的版本标识符，但这个标识符纯粹供你自己使用，Core Data 会完全忽略它。


    ![9781430238072_Fig05-05.jpg](images/9781430238072_Fig05-05.jpg)


    [图 5-5.](#9781430238072_Ch05.xhtml#_Fig5) 数据模型的 File Identity 面板允许你设置版本标识符


    相反，Core Data 会对数据模型文件中的每个实体执行一种称为哈希的数学计算。哈希值存储在你的持久化存储中。当 Core Data 打开你的持久化存储时，它会使用这些哈希值来确保存储在其中的数据版本与当前数据模型兼容。'
  raw: 'When you create a new Xcode project using a template that supports Core Data,
    you are provided with a single data model in the form of an .xcdatamodel file
    in your project. In [Chapter 2](#9781430238072_Ch02.xhtml), you saw how this file
    was loaded into an instance of NSManagedObjectModel at runtime in the application
    delegate’s managedObjectModel method. In order to understand versioning and migrations,
    it’s important to look a little deeper under the hood to see what’s going on.


    Data Models Are Compiled


    The .xcdatamodel class in your project does not get copied into your application’s
    bundle the way other resources do. The data model file contains a lot of information
    that your application doesn’t need. For example, it contains information about
    the layout of the objects in Xcode’s model editor’s diagram view ([Figure 5-1](#9781430238072_Ch05.xhtml#Fig1)),
    which is only there to make your life easier. Your application doesn’t care about
    how those rounded rectangles are laid out, so there’s no reason to include that
    information inside your application bundle.


    ![9781430238072_Fig05-01.jpg](images/9781430238072_Fig05-01.jpg)


    [Figure 5-1.](#9781430238072_Ch05.xhtml#_Fig1)  Certain information, such as that
    the rounded rectangle representing the Hero entity is in the upper-left corner
    and that the disclosure triangles next to Attributes and Relationships are expanded,
    is stored in the .xcdatamodel file but not in the .mom file


    Instead, your .xcdatamodel files get compiled into a new type of file with an
    extension of .mom, which stands for managed object model (sorry, Mom). This is
    a much more compact binary file that contains just the information that your application
    needs. This .mom file is what is actually loaded to create instances of NSManagedObjectModel.


    Data Models Can Have Multiple Versions


    You most likely understand what versioning means in a general sense. When a company
    releases a new version of a piece of software with new features, it typically
    has a new number or designation. For example, you are working on a specific version
    of Xcode (for us, it’s 4.5) and a specific version of Mac OS X (for us it’s 10.8,
    also known as Mountain Lion).


    These are called *marketing version identifiers* or *numbers*, as they are primarily
    intended to tell customers the difference between various released versions of
    the software. Marketing versions are incremented when a new version of the program
    is released to customers.


    There are other, finer-grained forms of versioning used by developers, however.
    If you’ve ever used a concurrent versioning system such as cvs, svn, or git, you’re
    probably aware of how this all works. Versioning software keeps track of the changes
    over time to all of the individual source code and resource files that make up
    your project (among other things).


    **Note**  We’re not going to discuss regular version control, but it’s a good
    thing to know about if you’re a developer. Fortunately, there are a lot of resources
    on the Web for learning how to install and use different version-control software
    packages. A good place to start is the Wikipedia page on version control at `http://en.wikipedia.org/wiki/Revision_control.`


    Xcode integrates with several version-control software packages, but it also has
    some built-in version-control mechanisms, including one that’s intended for use
    with Core Data data models. Creating new versions of your data models is the key
    to keeping your users happy. Every time you release a version of your application
    to the public, you should create a new version of your data model. This will create
    a new copy so that the old version can be kept around to help the system figure
    out how to update the data from a persistent store made with one version to a
    newer version.


    Creating a New Data Model Version


    Single-click SuperDB.xcdatamodeld in Xcode. Now click the Editor menu and select
    “Add Model Version.” You will be asked to name this new version. The default values
    Xcode presents to you ([Figure 5-2](#9781430238072_Ch05.xhtml#Fig2)) are fine.  Just
    click Finish.


    ![9781430238072_Fig05-02.jpg](images/9781430238072_Fig05-02.jpg)


    [Figure 5-2.](#9781430238072_Ch05.xhtml#_Fig2)  Naming the new data model version


    You just added a new version of your data model. Once you click Finish, the SuperDB.xcdatamodeld
    file will gain a disclosure triangle next to it. It will be opened to reveal two
    different versions of your data model ([Figure 5-3](#9781430238072_Ch05.xhtml#Fig3)).


    ![9781430238072_Fig05-03.jpg](images/9781430238072_Fig05-03.jpg)


    [Figure 5-3.](#9781430238072_Ch05.xhtml#_Fig3)  A versioned data model contains
    the current version, marked with a green checkmark on its icon, along with every
    previous version


    The icon for one of the versions will have a green checkmark on it. This indicates
    the current version (in your case, *SuperDB.xcdatamodel*), which is the one that
    your application will use. By default, when you create a new version, you actually
    create a copy of the original. However, the new version keeps the *same file name*
    as the original, whereas the name of the copy is appended with an incrementally
    larger number. This file represents what your data model looked like when you
    created the new version and it should be left untouched.


    The fact that the higher number is the older file might seem a little weird but,
    as more versions accumulate, the numbering will make more sense. The next time
    you create a new version, the old version will be named SuperDB 3.xcdatamodel,
    and so on. The numbering makes sense for all the non-current versions, since each
    version will have a number one higher than the previous one. By keeping the name
    of the current model the same, it’s easy to tell which is the one you can change.


    The Current Data Model Version


    In [Figure 5-3](#9781430238072_Ch05.xhtml#Fig3), SuperDB.xcdatamodel is the current
    version of the data model and SuperDB 2.xcdatamodel is the previous version. You
    can now safely make changes to the current version, knowing that a copy of the
    previous version exists, frozen in time, which will give you the ability to migrate
    your users’ data from the old version to the next version when you release it.


    You can change which version is the current version. To do this, select SuperDB.xcdatamodeld,
    then open the File Inspector in the Utility pane ([Figure 5-4](#9781430238072_Ch05.xhtml#Fig4)).
    You should see a section named Version Core Data Model. Find a drop-down box labeled
    Current. Here you can select the data model you want to make current. You won’t
    do this often, but you might do it if you need to revert to an older version of
    the application for some reason. You can use migrations to go back to an older
    version or move to a new version.


    ![9781430238072_Fig05-04.jpg](images/9781430238072_Fig05-04.jpg)


    [Figure 5-4.](#9781430238072_Ch05.xhtml#_Fig4)  The Core Data (Directory) File
    Inspector


    Data Model Version Identifiers


    Although you can assign version identifiers like 1.1 or Version A to data models
    by selecting the specific data model version in the Navigation pane and bringing
    up the File Inspector ([Figure 5-5](#9781430238072_Ch05.xhtml#Fig5)), this identifier
    is purely for your own use and is completely ignored by Core Data.


    ![9781430238072_Fig05-05.jpg](images/9781430238072_Fig05-05.jpg)


    [Figure 5-5.](#9781430238072_Ch05.xhtml#_Fig5)  The File Identity pane for a data
    model will allow you to set a version identifier


    Instead, Core Data performs a mathematical calculation called a hash on each entity
    in your data model file. The hash values are stored in your persistent store.
    When Core Data opens your persistent store, Core Data uses these hash values to
    ensure that the version of your data stored in the store is compatible with the
    current data model.'
