    \ 到其输出形式的数据管理。此输出由 `AVCaptureOutput` 类表示。\n\n使用 `AVFoundation` 创建媒体数据是一个复杂的过程。首先，你需要创建一个\
    \ `AVCaptureSession` 来协调媒体数据的捕获和创建。你定义并配置你的 `AVCaptureDevice`，它代表了实际的物理设备（例如 iPhone\
    \ 摄像头或麦克风）。从 `AVCaptureDevice`，你创建一个 `AVCaptureInput`。`AVCaptureInput` 是一个 `<?>`\
    \ 对象，代表来自 `AVCaptureDevice` 的数据。每个 `AVCaptureInput` 实例都有多个端口，每个端口代表来自设备的一个数据流。你可以将端口视为\
    \ `AVAsset` 轨道的捕获模拟。一旦创建了 `AVCaptureInput(s)`，就将它们分配给 `AVCaptureSession`。每个会话可以有多个输入。\n\
    \n现在你已经有了捕获会话并给会话分配了输入，接下来需要保存数据。你使用 `AVCaptureOutput` 类并将其添加到你的 `AVCaptureSession`\
    \ 中。你可以使用具体的 `AVCaptureOutput` 子类将数据写入文件，或者将其保存到缓冲区以供进一步处理。\n\n你的 `AVCaptureSession`\
    \ 现已配置好，可以从设备接收数据并保存。你只需告诉你的会话 `startRunning`。完成后，向你的会话发送 `stopRunning` 消息。有意思的是，可以在会话运行时更改其输入或输出。为了确保平稳过渡，你需要用一对\
    \ `beginConfiguration` / `commitConfiguration` 消息来包裹这些更改。\n\n资产元数据由 `AVMetadataItem`\
    \ 类表示。要向资产添加你自己的元数据，可以使用其可变版本 `AVMutableMetadataItem`，并将其分配给资产。\n\n有时你可能需要将媒体资源从一种格式转换为另一种格式。类似于捕获媒体，你可以使用\
    \ `AVAssetExportSession` 类。将你的输入资产添加到导出会话对象，然后将导出会话配置为新的输出格式，并导出数据。\n\n接下来，让我们深入探讨通过\
    \ `AVFoundation` 播放媒体的具体细节。\n\n### AVMediaPlayer\n"
- fmt: "在开始时，基于 `AVFoundation` 的媒体播放器外观将与 `MPMediaPlayer`（[图 12-9](#9781430238072_Ch12.xhtml#Fig9)）相同。与\
    \ `MPMediaPlayer` 不同，你的 `AVFoundation` 播放器将使用统一的播放器视图控制器来回放音频和视频媒体。这有几个原因，但主要是因为\
    \ `AVFoundation` 没有提供类似 `MPMoviePlayerViewController` 的视频回放视图控制器。相反，你需要定义一个 `UIView`\
    \ 子类来使用 `AVPlayerLayer` 视图层。无论媒体类型如何，你都使用一个 `AVPlayer` 实例来加载 `AVAsset` 并管理播放控制。\n\
    \n使用 Xcode，创建一个新项目并将其命名为 `AVMediaPlayer`。由于 `AVMediaPlayer` 使用标签栏控制器，并且行为类似于 `MPMediaPlayer`，请遵循你在\
    \ `MPMediaPlayer` 中使用的相同步骤，直到添加 `MediaPlayer` 框架为止。你仍然需要 `MediaPlayer` 框架来访问你的媒体库。由于此项目将使用\
    \ `AVFoundation` 来播放媒体，你还需要添加 `AVFoundation` 框架。\n\n与 `MPMediaPlayer` 类似，`AVMediaPlayer`\
    \ 将使用一个通用的 `MediaViewController` 作为抽象基类。创建一个名为 `MediaViewController` 的新 `Objective-C`\
    \ 类，继承自 `UITableViewController`。同样，这个 `MediaViewController` 类需要足够通用，以支持音频和视频媒体。此外，类似于\
    \ `MPMediaPlayer` 的 `MediaViewController`，你需要一种方法来加载媒体项。`AVFoundation` 不提供对媒体库的访问；该功能仅存在于\
    \ `MediaPlayer` 框架中。由于你打算使用 `AVPlayer` 类来播放媒体，你需要将 `MPMediaItems` 转换为 `AVAssets`。首先，你需要修改\
    \ `MediaViewController.h`。\n\n```objective-c\n#import <UIKit/UIKit.h>\n#import\
    \ <MediaPlayer/MediaPlayer.h>\n\n@interface MediaViewController : UITableViewController\n\
    \n@property (strong, nonatomic) NSArray *assets;\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType;\n\
    \n@end\n```\n\n这一次，你将 `NSArray` 属性命名为 `assets`，因为它是一个 `AVAssets` 数组，而不是 `MPMediaItems`。相应地，出于同样的原因，你将加载方法命名为\
    \ `loadAssetsForMediaType:`。\n\n在 `MediaViewController.m` 中，你需要更新表视图数据源方法。在此之前，你需要在导入\
    \ `MediaViewController.h` 之后立即导入 `AVFoundation` 头文件。\n\n```objective-c\n#import\
    \ <AVFoundation/AVFoundation.h>\n```\n\n现在，找到并更新表视图数据源方法。\n\n```objective-c\n\
    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    // Return\
    \ the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
    \ of rows in the section.\n    return self.assets.count;\n}\n\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier\n      \
    \                                                     forIndexPath:indexPath];\n\
    \n    // Configure the cell...\n    NSUInteger row = [indexPath row];\n    AVAsset\
    \ *asset = [self.assets objectAtIndex:row];\n    cell.textLabel.text = [asset\
    \ description];\n    cell.tag = row;\n\n    return cell;\n}\n```\n\n同样，这与你之前在\
    \ `MPMediaPlayer` 中所做的类似。注意，`tableView:cellForRowAtIndexPath:` 从你的 `assets` 数组中检索一个\
    \ `AVAsset`。请记住，`AVAsset` 没有一种简单的方法来访问其元数据属性，如艺术家名称、歌曲标题或作品集。你稍后会加载这些信息。目前，你只在表视图单元格中显示\
    \ `asset` 的描述。\n\n现在，你需要实现 `loadAssetsForMediaType:` 方法。你将其添加到 `MediaViewController.m`\
    \ 的底部，就在 `@end` 声明之前。\n\n```objective-c\n#pragma mark - Instance Methods\n\n-\
    \ (void)loadAssetsForMediaType:(MPMediaType)mediaType\n{\n    MPMediaQuery *query\
    \ = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber = [NSNumber numberWithInt:mediaType];\n\
    \    MPMediaPropertyPredicate *predicate = [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber\n\
    \                                                                          forProperty:MPMediaItemPropertyMediaType];\n\
    \    [query addFilterPredicate:predicate];\n\n    NSMutableArray *mediaAssets\
    \ = [[NSMutableArray alloc] initWithCapacity:[[query items] count]];\n    for\
    \ (MPMediaItem *item in [query items]) {\n        [mediaAssets addObject:[AVAsset\
    \ assetWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];\n    }\n\
    \    self.assets = mediaAssets;\n}\n```\n\n此方法与 `MPMediaPlayer` 中的 `loadMediaItemsForMediaType:`\
    \ 之间的区别在于，你使用 `MPMediaItemPropertyAssetURL` 来创建你的 `AVAssets`。\n\n你需要创建两个 `Objective-C`\
    \ 类：`AudioViewController` 和 `VideoViewController`。它们都是 `MediaViewController` 的子类。将以下内容添加到\
    \ `AudioViewController.m`，以便它将音频加载到你的音频媒体：\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view.\n    [self loadAssetsForMediaType:MPMediaTypeMusic];\n}\n```\n\n对 `VideoViewController.m`\
    \ 执行相同操作，只是你希望加载的媒体类型是 `MPMediaTypeAnyVideo`。\n\n打开 `MainStoryboard.storyboard`，将两个表视图控制器的自定义类更改为\
    \ `AudioViewController` 和 `VideoViewController`，就像你在 `MPMediaPlayer` 中所做的那样。\n\
    \n构建并运行 `AVMediaPlayer`。看起来你正在读取媒体库，但它还不太有用。让我们修复它，以便你可以获取资产元数据。\n\n回想一下，`AVAsset`\
    \ 的信息在实例化时可能不可用或未加载。向资产请求信息可能会阻塞调用线程。如果你在 `AVMediaPlayer` 中这样做，将会减慢 UI 组件的速度，特别是表视图及其滚动。为了避免这种情况，你将使用\
    \ `AVAsset` 方法 `loadValuesAsynchronouslyForKeys:completionHandler:` 异步加载资产的元数据。此外，你将把\
    \ `AVAsset` 封装到一个自定义类中，以处理此数据的加载和缓存。\n\n创建一个名为 `AssetItem` 的新 `Objective-C` 类，继承自\
    \ `NSObject`。一旦创建了文件并将其添加到项目中，请选择 `AssetItem.h`。由于 `AssetItem` 旨在封装 `AVAsset`，为了方便起见，你将预先声明\
    \ `AVAsset` 类。你还需要修改 `AssetItem` 声明以遵循 `NSCopying` 协议。\n\n```objective-c\n@class\
    \ AVAsset;\n\n@interface AssetItem : NSObject <NSCopying>\n```\n\n你需要一个属性来保存你的\
    \ `AVAsset` 实例。由于你从 URL 加载 `AVAssets`，你还需要添加一个属性来保存你的资产的 URL。这将允许你惰性加载 `AVAsset`，这也有助于提高性能。\n\
    \n```objective-c\n@property (strong, nonatomic) NSURL *assetURL;\n@property (strong,\
    \ nonatomic) AVAsset *asset;\n```\n\n你定义了三个只读属性，它们代表你为应用程序最关心的资产元数据。\n\n```objective-c\n\
    @property (strong, nonatomic, readonly) NSString *title;\n@property (strong, nonatomic,\
    \ readonly) NSString *artist;\n@property (strong, nonatomic, readonly) UIImage\
    \ *image;\n```\n\n接下来，定义两个只读属性来告诉你 `AssetItem` 的状态。两者都是 `BOOL` 类型。一个是 `metadataLoaded`，它是一个标志，告诉你是否已经加载了\
    \ `AVAsset` 的元数据。第二个是 `isVideo`，它告诉你你的 `AVAsset` 是否有视频轨道。\n\n```objective-c\n\
    @property (assign, nonatomic, readonly) BOOL metadataLoaded;\n@property (assign,\
    \ nonatomic, readonly) BOOL isVideo;\n```\n\n你需要声明两个初始化方法。一个从 URL 创建实例。另一个从另一个\
    \ `AssetItem` 实例创建副本；这对于 `NSCopying` 协议是必需的。\n\n```objective-c\n- (id)initWithURL:(NSURL\
    \ *)aURL;\n- (id)initWithAsset:(AssetItem *)assetItem;\n```"
  raw: "At start, your AVFoundation-based media player will look identical to the\
    \ MPMediaPlayer ([Figure 12-9](#9781430238072_Ch12.xhtml#Fig9)). Unlike MPMediaPlayer,\
    \ your AVFoundation player will use a unified player view controller to play back\
    \ both audio and video media. There are a couple of reasons for this, but it’s\
    \ primarily because AVFoundation does not give you a video playback view controller\
    \ similar to MPMoviePlayerViewController. Rather, you need to define a UIView\
    \ subclass to use an AVPlayerLayer view layer. Regardless of the media type, you\
    \ use an AVPlayer instance to load the AVAsset and manage the playback controls.\n\
    \nUsing Xcode, create a new project and name it AVMediaPlayer. Since AVMediaPlayer\
    \ uses a tab bar controller, and behaves like MPMediaPlayer, follow the same steps\
    \ you used for MPMediaPlayer, right up to the point where you add the MediaPlayer\
    \ framework. You still need the MediaPlayer framework to access your media library.\
    \ Since this project will use AVFoundation to play back media, you also need to\
    \ add the AVFoundation framework.\n\nLike MPMediaPlayer, AVMediaPlayer will use\
    \ a generic MediaViewController as an abstract base class. Create a new Objective-C\
    \ class named MediaViewController, subclassed from UITableViewController. Again,\
    \ this MediaViewController class needs to be generic enough support both audio\
    \ and video media. Also, similar to MPMediaPlayer MediaViewController, you need\
    \ a way to load your media items. AVFoundation does not give access to your media\
    \ library; that functionality only exists in the MediaPlayer framework. Since\
    \ you intend to use the AVPlayer class to play back your media, you need to convert\
    \ the MPMediaItems to AVAssets. First, you need to modify MediaViewController.h.\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\n@interface\
    \ MediaViewController : UITableViewController\n\n@property (strong, nonatomic)\
    \ NSArray *assets;\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType;\n\n\
    @end\n```\n\nThis time, you named your NSArray property assets, as it is an array\
    \ of AVAssets, rather than MPMediaItems. Correspondingly, you named your loader\
    \ method loadAssetsForMediaType: for the same reason.\n\nIn MediaViewController.m,\
    \ you need to update your table view data source methods. Before you do that,\
    \ you need to import the AVFoundation header, right after the import of MediaViewController.h.\n\
    \n```\n#import <AVFoundation/AVFoundation.h>\n```\n\nNow, find and update the\
    \ table view data source methods.\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    // Return the number of sections.\n    return 1;\n}\n\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // Return the number of rows in the section.\n    return self.assets.count;\n\
    }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView          \n  cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier                                                            \
    \ \n    forIndexPath:indexPath];\n\n// Configure the cell. . .\n    NSUInteger\
    \ row = [indexPath row];\n    AVAsset *asset = [self.assets objectAtIndex:row];\n\
        cell.textLabel.text = [asset description];\n    cell.tag = row;\n\nreturn\
    \ cell;\n}\n```\n\nAgain, this is similar to what you did in MPMediaPlayer. Notice\
    \ that tableView:cellForRowAtIndexPath: retrieves an AVAsset from your assets\
    \ array. Remember, AVAsset doesn’t have an easy way to access its metadata properties\
    \ like artist name, song title, or artwork. You’ll get to loading that information\
    \ in a little bit. For now, you’ll just display the asset’s description in the\
    \ table view cell.\n\nNow, you need to implement loadAssetsForMediaType: method.\
    \ You’ll add it to the bottom of MediaViewController.m, just before the @end declaration.\n\
    \n```\n#pragma mark - Instance Methods\n\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType\n\
    {\n    MPMediaQuery *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber=\
    \ [NSNumber numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate\
    \ = [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber                                                          \
    \ forProperty:MPMediaItemPropertyMediaType];\n    [query addFilterPredicate:predicate];\n\
    \nNSMutableArray *mediaAssets = [[NSMutableArray alloc] initWithCapacity:[[query\
    \ items] count]];\n    for (MPMediaItem *item in [query items]) {\n        [mediaAssets\
    \ addObject:            [AVAsset assetWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];\n\
        }\n    self.assets = mediaAssets;\n}\n```\n\nThe difference between this method\
    \ and loadMediaItemsForMediaType: in MPMediaPlayer is that you use the MPMediaItemPropertyAssetURL\
    \ to create your AVAssets.\n\nYou need to create two Objective-C classes: AudioViewController\
    \ and VideoViewController. They are both subclasses of MediaViewController. Add\
    \ the following to AudioViewController.m to have it load audio to your audio media:\n\
    \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
    \ setup after loading the view.\n    [self loadAssetsForMediaType:MPMediaTypeMusic];\n\
    }\n```\n\nDo the same for VideoViewController.m, except the media type you want\
    \ to load is MPMediaTypeAnyVideo.\n\nOpen MainStoryboard.storyboard and change\
    \ the custom classes for the two table view controllers to AudioViewController\
    \ and VideoViewController, like you did in the MPMediaPlayer.\n\nBuild and run\
    \ AVMediaPlayer. It looks like you’re reading your media library, but its not\
    \ very useful, yet. Let’s fix it so you can get your asset metadata.\n\nRecall\
    \ that an AVAsset’s information may not be available or loaded on instantiation.\
    \ Asking an asset for information may block the call thread. If you were to do\
    \ that in AVMediaPlayer, you would slow down the UI components, specifically the\
    \ table views and their scrolling. In order to avoid this, you’re going to load\
    \ an asset’s metadata asynchronously, using the AVAsset method loadValuesAsynchronouslyForKeys:completionHandler:.\
    \ Furthermore, you’re going to encapsulate your AVAsset into a custom class to\
    \ handle the loading and caching of this data.\n\nCreate a new Objective-C class\
    \ named AssetItem, subclassed from NSObject. Once the files are created and in\
    \ your project, select AssetItem.h. Since AssetItem is intended to encapsulate\
    \ an AVAsset, you’ll predeclare the AVAsset class for convenience. You’ll also\
    \ modify the AssetItem declaration to conform to the NSCopying protocol.\n\n```\n\
    @class AVAsset;\n\n@interface AssetItem : NSObject <NSCopying>\n```\n\nYou need\
    \ a property to hold your AVAsset instance. Since you’re loading your AVAssets\
    \ from a URL, you’ll add property to hold your asset URL as well. This will allow\
    \ you to load the AVAsset lazily, which should also help with performance.\n\n\
    ```\n@property (strong, nonatomic) NSURL *assetURL;\n@property (strong, nonatomic)\
    \ AVAsset *asset;\n```\n\nYou define three read-only properties that represent\
    \ the asset metadata you care most about for your application.\n\n```\n@property\
    \ (strong, nonatomic, readonly) NSString *title;\n@property (strong, nonatomic,\
    \ readonly) NSString *artist;\n@property (strong, nonatomic, readonly) UIImage\
    \ *image;\n```\n\nNext, define two read-only properties to tell you the state\
    \ of your AssetItem. Both are BOOLs. One, metadataLoaded, is a flag to tell you\
    \ if you’ve already loaded the AVAsset’s metadata. The second, isVideo, tells\
    \ you if your AVAsset has video tracks.\n\n```\n@property (assign, nonatomic,\
    \ readonly) BOOL metadataLoaded;\n@property (assign, nonatomic, readonly) BOOL\
    \ isVideo;\n```\n\nYou need to declare two initializer methods. One creates an\
    \ instance from a URL. The other creates a copy from another AssetItem instance;\
    \ this is needed for the NSCopying protocol.\n\n```\n- (id)initWithURL:(NSURL\
    \ *)aURL;\n- (id)initWithAsset:(AssetItem *)assetItem;\n```"
