    你的小型应用程序将计算平方根。大量、大量的平方根。用户将能够输入一个数字，你将计算从 1 到他们指定的数字之间的每个数字的平方根（图 14-1）。此练习的唯一目的就是消耗处理器周期。


    ![9781430238072_Fig14-01.jpg](img/9781430238072_Fig14-01.jpg)


    图 14-1  Stalled 应用程序将演示在应用程序主线程上尝试执行过多工作的问题


