    \ 的实现，您需要更改 `SuperDBEditCell.m`。首先，更新 `initWithStyle:reuseIdentifier:`。\n\n```objc\n\
    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier\n\
    {\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n \
    \   if (self) {\n        // 初始化代码\n        self.textField.delegate = self;\n \
    \   }\n    return self;\n}\n```\n\n接下来，删除 `value` 属性的访问器和修改器。同时，可以删除文件顶部的 `#define`，因为它已经被移到了\
    \ `SuperDBCell.m` 中。\n\n您的“重构”已经完成，但您仍然需要进行一些更改。\n\n## 可编辑属性\n\n当您尝试保存编辑过的 Hero\
    \ 时，`SuperDB` 应用会崩溃，因为它试图保存 Age 单元格中的值。您希望 `HeroDetailController` 的 save 方法在更新\
    \ Hero 实例时跳过 Age 单元格。\n\n您可以施展一些 Core Data 的技巧，让 Hero 实例检查单元格的属性键是否是瞬态的。这似乎需要做很多工作，仅为了获取一个您能相当可靠地推断出来的信息。请记住，您创建\
