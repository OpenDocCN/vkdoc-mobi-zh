    \ `NSManagedObjectContext` 中，然后保存到持久化存储中。\n\n```"
- fmt: "```objc\n- (void)insertNewObject:(id)sender\n{\n    NSManagedObjectContext\
    \ *context = [self.fetchedResultsController managedObjectContext];\n    NSEntityDescription\
    \ *entity = [[self.fetchedResultsController fetchRequest] entity];\n    NSManagedObject\
    \ *newManagedObject =         [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name]                                       inManagedObjectContext:context];\n\
    \    // If appropriate, configure the new managed object.\n    // Normally you\
    \ should use accessor methods, but using KVC here avoids the need to add a custom\
    \ class to the template.\n    [newManagedObject setValue:[NSDate date] forKey:@\"\
    timeStamp\"];\n    // Save the context.\n    NSError *error = nil;\n    if (![context\
    \ save:&error]) {\n         // Replace this implementation with code to handle\
    \ the error appropriately.\n         // abort() causes the application to generate\
    \ a crash log and terminate.         // You should not use this function in a\
    \ shipping application,          // although it may be useful during development.\n\
    \        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n     \
    \   abort();\n    }\n}\n```\n\nNotice that the first thing the code does is to\
    \ retrieve a managed object context from the fetched results controller. In this\
    \ simple example where there’s only one context, you could also have retrieved\
    \ the same context from the application delegate. There are a few reasons why\
    \ the default code uses the context from the fetched results controller. First\
    \ of all, you already have a method that returns the fetched results controller,\
    \ so you can get to the context in just one line of code.\n\n```objc\nNSManagedObjectContext\
    \ *context = [self.fetchedResultsController managedObjectContext];\n```\n\nMore\
    \ importantly, though, a fetched results controller always knows which context\
    \ its managed objects are contained by, so even if you decide to create an application\
    \ with multiple contexts, you’ll be sure that you’re using the correct context\
    \ if you pull it from the fetched results controller.\n\nJust as you did when\
    \ you created a fetch request, when inserting a new object, you need to create\
    \ an entity description to tell Core Data which kind of entity you want to create\
    \ an instance of. The fetched results controller also knows what entity the objects\
    \ it manages are, so you can just ask it for that information.\n\n```objc\nNSEntityDescription\
    \ *entity = [[self.fetchedResultsController fetchRequest] entity];\n```\n\nThen\
    \ it’s simply a matter of using a class method on `NSEntityDescription` to create\
    \ the new object and insert it into a context.\n\n```objc\nNSManagedObject *newManagedObject\
    \ =     [NSEntityDescription insertNewObjectForEntityForName:[entity name]   \
    \                                inManagedObjectContext:context];\n```\n\nIt does\
