    \n现在，创建另一个名为`AVPlayerView`的 Objective-C 类，它是`UIView`的子类。这个视图将用于播放视频媒体。它是`UIView`的一个简单扩展。打开`AVPlayerView.h`，并将其修改为与以下实现一致：\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class AVPlayer;\n\n@interface AVPlayerView\
    \ : UIView\n\n@property (strong, nonatomic) AVPlayer* player;\n- (void)setVideoFillMode:(NSString\
    \ *)fillMode;\n\n@end\n```\n\n`AVPlayerView`的实现稍微复杂一些。打开`AVPlayerView.m`。首先，你需要导入`AVFoundation`头文件。\n\
    \n```\n#import \"AVPlayerView.h\"\n#import <AVFoundation/AVFoundation.h>\n\n@implementation\
    \ AVPlayerView\n```\n\n接下来，你需要重写`UIView`的方法`layerClass`，使其返回`AVPlayerLayer`。\n\
    \n```\n+ (Class)layerClass\n{\n        return [AVPlayerLayer class];\n}\n```\n\
    \n然后，重写`player`属性，将其重定向到视图的图层。\n\n```\n- (AVPlayer *)player\n{\n        return\
    \ [(AVPlayerLayer *)[self layer] player];\n}\n\n- (void)setPlayer:(AVPlayer *)player\n\
    {\n        [(AVPlayerLayer*)[self layer] setPlayer:player];\n}\n```\n\n最后，添加调整视频填充模式的功能。\n\
    \n```\n/* 指定视频在播放器图层边界内的显示方式。\n   （默认值为 AVLayerVideoGravityResizeAspect）*/\n-\
    \ (void)setVideoFillMode:(NSString *)fillMode\n{\n        AVPlayerLayer *playerLayer\
    \ = (AVPlayerLayer*)[self layer];\n        playerLayer.videoGravity = fillMode;\n\
    }\n\n@end\n```\n\n现在你可以开始构建播放器界面了。打开`MainStoryboard.storyboard`。将一个`UIViewController`拖放到`AudioViewController`和`VideoViewController`的右侧。调整其位置，使其与图\
    \ 12-13 匹配。从`AudioViewController`中的原型表视图单元格拖拽连线到新的`UIViewController`。在弹出的菜单中，在\"\
    Selection Segue\"标题下选择`Modal`。对`VideoViewController`重复此过程。选择新的`UIViewController`，在身份检查器中将其类从`UIViewController`更改为`PlayerViewController`。对于`AVMediaPlayer`，`PlayerViewController`将同时播放音频和视频文件。\n\
    \n![9781430238072_Fig12-13.jpg](img/9781430238072_Fig12-13.jpg)\n\n图 12-13. 布局你的`UIViewController`\n\
    \n将一个`UIView`拖放到`PlayerViewController`上。它应展开以填满整个场景。如果没有，调整新`UIView`的大小使其填满。打开身份检查器，将视图的类从`UIView`更改为`AVPlayerView`。切换到属性检查器，将背景颜色从白色更改为黑色。切换到助理编辑器，为`AVPlayerView`创建一个新\
    \ outlet。将 outlet 命名为`playerView`。切换回标准编辑器。\n\n再将另一个`UIView`拖放到`PlayerViewController`上。同样，它应展开以填满整个场景；如果没有，则进行调整。与`playerView`不同，你可以保持该视图的类为`UIView`。打开属性检查器，将背景颜色更改为默认（透明）。使用助理编辑器，为这个`UIView`创建一个新\
    \ outlet，并将其命名为`controlView`。你将在`controlView`中添加与`MPMediaPlayer`相同的控制组件，并做一些小的补充。查看图\
    \ 12-14，并与图 12-12 进行比较。你已经在歌曲标签和图片视图之间添加了一个`UISlider`，其两侧各有一个`UILabel`。首先，将一个`UILabel`拖放到场景的最左边缘，正好在歌曲标签下方。将文本从`label`更改为`00:00`，颜色从黑色更改为白色，字体设为\
    \ System 12.0，并对文本进行右对齐。在最右边缘添加一个`UILabel`，应用相同的属性更改，但文本改为左对齐。在两个标签之间放置一个`UISlider`，并使其扩展以填充标签之间的空间。使用属性检查器将其当前值从\
    \ 0.5 更改为 0.0。\n\n![9781430238072_Fig12-14.jpg](img/9781430238072_Fig12-14.jpg)\n\
    \n图 12-14. `AVMediaPlayer`的`PlayerViewController`布局\n\n你还需要在工具栏的最右侧添加一个额外的`UIBarButtonItem`。保持按钮的\
    \ Identifier 属性为`Custom`，但将标题更改为`1.0x`。你将使用这个按钮在不同速率之间切换播放速度。\n\n你需要为你添加的 UI 组件添加\
    \ outlet。选择助理编辑器。为标题为 Artist 的标签创建一个名为`artist`的 outlet。对于 Song 标签，将 outlet 命名为`song`。为顶部的滑块创建一个\
    \ outlet，并将其命名为`scrubber`。为滑块左侧的标签创建一个 outlet，命名为`elapsedTime`。对于滑块右侧的标签，将 outlet\
    \ 命名为`remainingTime`。`UIImageView`的 outlet 应命名为`imageView`。底部的滑块将命名为`volume`。你需要为`UIToolbar`（`toolbar`）、播放按钮（`play`）和`1.0x`按钮（`rate`）创建\
    \ outlet。与`MPMediaPlayer`一样，你不需要为 Done 按钮创建 outlet。\n"
- fmt: "Now you need to add the appropriate actions. Control-drag from the scrubbleSlider\
    \ slider and add a new action named `beginScrubbing` for the `touchDown:` event.\
    \ Control-drag from the scrubbleSlider slider again, and add a new action named\
    \ `scrub` for the `valueChanged:` event. Finally, add a new action named `endScrubbing`\
    \ for the `touchUpInside` event. Add a new action from the volume slider, named\
    \ `volumeChanged` for the `valueChanged` event. For each of the toolbar buttons,\
    \ add an action: the Done button (`donePressed`), the Play button (`playPressed`),\
    \ and the Rate button (`ratePressed`).\n\nReturn to the standard editor, and select\
    \ `PlayerViewController.h`. You need to import the following header files:\n\n\
    ```\n#import <AVFoundation/AVFoundation.h>\n#import \"AVPlayerView.h\"\n#import\
    \ \"AssetItem.h\"\n```\n\nAs you did before, you need to redefine the `play` property\
    \ outlet from weak to strong. You also declare out `pause` (button) property.\n\
    \n```\n@property (strong, nonatomic) IBOutlet UIBarButtonItem *play;\n@property\
    \ (strong, nonatomic)          UIBarButtonItem *pause;\n```\n\nYou need to declare\
    \ properties for an `AssetItem`, an `AVPlayerItem`, and `AVPlayer`.\n\n```\n@property\
    \ (strong, nonatomic) AssetItem *assetItem;\n@property (strong, nonatomic) AVPlayerItem\
    \ *playerItem;\n@property (strong, nonatomic) AVPlayer *player;\n```\n\nYou are\
    \ going to have the Play and Pause buttons each have their own action, so declare\
    \ the pause button action.\n\n```\n- (IBAction)pausePressed:(id)sender;\n```\n\
    \nBefore you can work on the `PlayerViewController` implementation, you need to\
    \ add a method to your `AssetItem` to prepare the `AVAsset` for playback. Open\
    \ `AssetItem.h` and add the following method declaration:\n\n```\n- (void)loadAssetForPlayingWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem, NSArray *keys))completion;\n```\n\nInside `AssetItem.m`,\
    \ the implementation is pretty simple.\n\n```\n- (void)loadAssetForPlayingWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem, NSArray *keys))completion;\n{\n    dispatch_async(self.dispatchQueue,\
    \ ^(void){\n        NSArray *keys = @[ @\"tracks\", @\"playable\" ];\n       \
    \ AVAsset *a = [self localAsset];\n        [a loadValuesAsynchronouslyForKeys:keys\
    \ completionHandler:^{\n            /* IMPORTANT: Must dispatch to main queue\
    \ in order to operate on the AVPlayer and AVPlayerItem. */\n            dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n                if (completion)\n                    completion(self, keys);\n\
    \            });\n        }];\n    });\n}\n```\n\nYou dispatch the asynchronous\
    \ loading of the `AVAsset` tracks. Since you’re loading two keys, you’ll defer\
    \ the check for each key to your completion handler. So all you do is invoke your\
    \ completion handler on the main thread.\n\nYou need to implement the method `assetHasVideo:`.\
    \ First, you declare it in your private category at the top of `AssetItem.m`.\n\
    \n```\n- (BOOL)assetHasVideo:(AVAsset *)a;\n```\n\nYour implementation can be\
    \ added at the bottom of the `AssetItem` implementation, after the other private\
    \ category method implementations.\n\n```\n- (BOOL)assetHasVideo:(AVAsset *)a\n\
    {\n    NSArray *videoTracks = [a tracksWithMediaType:AVMediaTypeVideo];\n    return\
    \ ([videoTracks count] > 0);\n}\n```\n\nYou simply query the asset for its video\
    \ tracks.\n\nNow you can work on the `PlayerViewController` implementation. First,\
    \ you need to create the Pause button. Inside the `viewDidLoad` method, add the\
    \ following lines:\n\n```\n    self.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
    \                                                                            \
    \                    target:self                                             \
    \                                                   action:@selector(pausePressed:)];\n\
    \    [self.pause setStyle:UIBarButtonItemStyleBordered];\n```\n\nNext, you need\
    \ to load prepare your asset for playback. You’ll do this in the `viewDidAppear:`\
    \ method.\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    if (self.assetItem)\
    \ {\n        [self.assetItem loadAssetForPlayingWithCompletionHandler:^(AssetItem\
    \ *assetItem, NSArray *keys){\n```\n\nIf you have an `assetItem`, you tell it\
    \ to prepare it for playback by invoking `loadAssetForPlayingWithCompletionHandler:`.\
    \ The first step of the completion handler is to check if the load status of each\
    \ key.\n\n```\n            NSError *error = nil;\n            AVAsset *asset =\
    \ assetItem.asset;\n            for (NSString *key in keys) {\n              \
    \  AVKeyValueStatus status = [asset statusOfValueForKey:key error:&error];\n \
    \               if (status == AVKeyValueStatusFailed) {\n                    NSLog(@\"\
    Asset Load Failed: %@ | %@\", [error localizedDescription], [error localizedFailureReason]);\n\
    \                    return;\n                }\n                // handle AVKeyValueStatusCancelled\n\
    \            }\n```\n\nAs a sanity check, we see if the underlying `AVAsset` is\
    \ playable.\n\n```\n            if (!asset.playable) {\n                NSLog(@\"\
    Asset Can’t be Played\");\n                return;\n            }\n```\n\nIf you’ve\
    \ already allocated your `playerItem` property, you need to remove an observer.\n\
    \n```\n            if (self.playerItem) {\n                [self.playerItem removeObserver:self\
    \ forKeyPath:@\"status\"];\n                [[NSNotificationCenter defaultCenter]\
    \                     \n                removeObserver:self                  \
    \             \n                name:AVPlayerItemDidPlayToEndTimeNotification\
    \                             \n                object:self.playerItem];\n   \
    \         }\n```\n\nYou assign a new `AVPlayerItem` to your `playerItem` property.\
    \ Since you’re using ARC, any previous instance will be automatically released.\
    \ This is why you removed the observer in the previous step.\n\n```\n        \
    \    self.playerItem = [AVPlayerItem playerItemWithAsset:asset];\n```\n\nYou add\
    \ an observer to your `playerItem` for the `status` key path.\n\n```\n       \
    \     [self.playerItem addObserver:self                               \n     \
    \       forKeyPath:@\"status\"                                  \n           \
    \ options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew    \
    \                              \n            context:PlayerViewControllerStatusObservationContext];\n\
    ```\n\nNote the use of `PlayerViewControllerStatusObservationContext`. This is\
    \ a special constant you’ll declare in a little bit. You use this constant to\
    \ ease the registration and identification of your `AVPlayerItem` notifications.\n\
    \nYou add another observer, this time to the default notification center. You’ll\
    \ invoke the method `playerItemDidReachEnd:` for the `AVPlayerItemDidPlayToEndTimeNotification`.\n\
    \n```\n            [[NSNotificationCenter defaultCenter] addObserver:self    \
    \                                                \n            selector:@selector(playerItemDidReachEnd:)\
    \                                                        \n            name:AVPlayerItemDidPlayToEndTimeNotification\
    \                                                       \n            object:self.playerItem];\n\
    ```\n\nIf your `player` property is not assigned, you create one with your `playerItem`\
    \ property. Then you add two observers to your `player` for the `currentItem`\
    \ and `rate` key paths. Notice again that you’ve used two special constants, `PlayerViewControllerCurrentItemObservationContext`\
    \ and `AVPlayerViewControllerRateObservationContext`.\n\n```\n            if (self.player\
    \ == nil) {\n                self.player = [AVPlayer playerWithPlayerItem:self.playerItem];\n\
    \                [self.player addObserver:self                               \n\
    \                forKeyPath:@\"currentItem\"                                 \
    \ \n                options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
    \                                  \n                context:PlayerViewControllerCurrentItemObservationContext];\n\
    \                [self.player addObserver:self                               \n\
    \                forKeyPath:@\"rate\"                                    \n  \
    \              options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
    \                                  \n                context:AVPlayerViewControllerRateObservationContext];\n\
    \            }\n```"
