    Components` pane）。顶级组件面板概述了在数据模型中定义的实体、获取请求和配置（我们稍后会详细讨论这些）。你可以通过使用顶级组件面板底部的“添加实体”按钮来添加一个新实体。或者，你也可以使用
    **Editor ![image](img/arrow.jpg) Add Entity** 菜单选项。如果你单击并按住“添加实体”按钮，将会出现一个弹出菜单，包含以下选项：添加实体、添加获取请求和添加配置。无论你选择哪个选项，按钮的单击行为都会更改为该组件，并且按钮的标签也会相应地更改以反映此行为。添加获取请求和配置的菜单等效项可以在
