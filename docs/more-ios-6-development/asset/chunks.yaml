    \n此外，无论您做什么，都不要在此处抛出异常。由于此操作正在非主线程上执行，因此没有更高级别的异常处理程序可以捕获该异常。这意味着在此处抛出的任何异常都将成为未捕获的异常，这在运行时是致命情况（例如发生致命崩溃）。\n\
    \n在继续之前，请确保保存`SquareRootOperation.m`。\n\n## 自定义`ProgressCell`\n\n查看图 14-4，您可以看到用户界面中不再具有单一的进度视图和进度标签。相反，您有一个显示操作队列中各操作的表格视图。每个表格视图单元格都包含一个进度视图、一个进度标签以及一个取消按钮。让我们将该表格视图单元格构建为自定义表格视图单元格。\n\
    \n首先，创建一个新的 Objective-C 类文件，使其成为`UITableViewCell`的子类，并将其命名为`ProgressCell`。创建文件后，选择`ProgressCell.h`并添加以下属性：\n\
    \n```\n@property (weak, nonatomic) IBOutlet UIProgressView *progressBar;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *progressLabel;\n```\n\n保存`ProgressCell.h`。\n\
    \n您没有为`ProgressCell`创建 XIB 文件，那么为什么将这些属性声明为出入口？我们现在就来解释，但首先您需要创建 XIB。创建一个新文件。在“新建文件助手”中选择“用户界面”组，然后选择“空”。单击“下一步”，确保“设备系列”设置为\
    \ iPhone。当提示保存文件时，文件名为`ProgressCell.xib`。如果它没有打开 Interface Builder，请选择`ProgressCell.xib`。\n\
    \n将一个表格视图单元格拖到 Interface Builder 上。接着，将一个圆角矩形按钮拖到表格视图单元格的最右边缘。在“属性检查器”中，将按钮类型更改为“Custom”，并在“图像”字段中输入`remove.png`。从“对象库”中将一个进度视图拖到表格视图单元格中，位于中心参考线的上方，并使用蓝色参考线对齐左边缘。将进度视图的右边缘延伸到按钮的左边缘。在“属性检查器”中，将“进度”字段从`0.5`更改为`0.0`。接下来，将一个标签拖到进度视图的正下方。将宽度调整为与进度视图相同。使用“属性检查器”将“对齐方式”更改为“居中对齐”。\n\
    \n现在，事情有些不同。在 Interface Builder 左侧的类停靠区中，选择表格视图单元格。打开“实用工具”面板中的“标识检查器”，并将“类”字段从`UITableViewCell`更改为`ProgressCell`。切换到“属性检查器”，并在“标识符”字段中输入`OperationQueueCell`。在此处，将“选择”从“蓝色”更改为“无”。\n\
    \n从类停靠区中的表格视图单元格按住 Control 键拖动到进度视图。在弹出的“接口”菜单中，选择`progressBar`。再从表格视图单元格按住 Control\
    \ 键拖动到标签。这次选择`progressLabel`。\n\n目前就这样。您稍后会回到此文件，但现在请先保存`ProgressCell.xib`。\n\n\
    ## 调整用户界面\n\n选择`ViewController.xib`。在 Interface Builder 中，选择视图窗口并打开“标识检查器”。将底层类从`UIView`更改为`UIControl`。这将允许背景点击触发操作方法。\n\
    \n单击进度视图并按 delete 键。然后单击进度标签（进度条下方的空标签）并再次按 delete 键。\n\n在库中查找表格视图，并将其拖到 Control\
    \ 窗口。将其放置在窗口中，然后使用调整大小手柄使其占据从左侧到右侧的整个窗口（不是边距，而是整个窗口），并且从窗口的最底部延伸到现有文本字段、按钮和标签的正下方，使用蓝色参考线保持适当的距离。\n\
    \n切换到助理模式，并从表格视图按住 Control 键拖动到`ViewController.h`中最后一个`@property`声明的下方。创建一个名为`tableView`的新输出口。从表格视图再次按住\
    \ Control 键拖动到文件所有者，共两次。第一次选择`delegate`输出口，第二次选择`dataSource`输出口。\n\n仍处于助理模式时，在类停靠区选择文件所有者，并将“实用工具”面板切换到“连接检查器”。查找`Touch\
    \ Down`右侧的圆圈。将圆圈拖到`ViewController.h`中`go`方法的下方，并创建一个名为`backgroundTap`的新操作。\n\n\
    将编辑器恢复到标准模式并保存 XIB。\n\n## `ViewController.h`的更改\n\n在编辑器中打开`ViewController.h`。首先，导入`SquareRootOperation`和`ProgressCell`的接口文件。\n\
    \n```\n#import \"SquareRootOperation.h\"\n#import \"ProgressCell.h\"\n```\n\n\
    接着，重新声明`ViewController`以使其遵守所需的协议。\n\n```\n@interface ViewController : UIViewController\
    \ < UITableViewDataSource, UITableViewDelegate, SquareRootOperationDelegate>\n\
    ```\n\n您不再需要`progressBar`和`progressLabel`属性，因此将它们删除。您已通过 Interface Builder 创建了`tableView`属性。您需要为操作队列声明一个属性。您还声明了一个进度单元格属性（别担心，我们很快会解释！）。\n\
    \n```\n@property (weak, nonatomic) IBOutlet UIProgressView *progressBar;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *progressLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UITableView *tableView;\n@property (strong, nonatomic) NSOperationQueue\
    \ *queue;\n@property (strong, nonatomic) IBOutlet ProgressCell *progressCell;\n\
    ```\n\n最后，您添加一个新方法`cancelOperation:`，当用户点击表格行的取消按钮时将调用此方法。\n\n```\n- (IBAction)cancelOperation:(id)sender;\n\
    ```\n\n保存`ViewController.h`。\n\n## 更新`ViewController.m`\n\n选择`ViewController.m`以便进行最终更改。在文件顶部，您需要在分类声明中添加一个私有属性。\n\
    \n```\n@interface ViewController ()\n@property (assign, nonatomic) NSInteger cancelledIndex;\n\
    @end\n```\n\n删除两个已被移除输出口的`@synthesize`语句。\n\n```\n@synthesize progressBar;\n@synthesize\
    \ progressLabel;\n```\n\n接下来，找到`go`方法，并将当前的实现替换为以下新实现：\n\n```\n- (IBAction)go:(id)sender\n\
    {\n    NSInteger operationCount = [numberOfOperations.text integerValue];\n  \
    \  SquareRootOperation *newOperation = [[SquareRootOperation alloc] initWithMaxNumber:operationCount\
    \ delegate:self];\n    [self.queue addOperation:newOperation];\n}\n```\n\n首先，您检索操作的数量，就像在前两个版本中所做的一样。接着，您使用该数量创建一个`SquareRootOperation`实例，并将`self`作为委托传递，以便在用户界面发生变化的通知。最后，您将操作添加到队列中。\n\
    \n在`go`方法之后，将`backgroundClick:`方法存根替换为以下实现：\n\n```\n- (IBAction)backgroundClick:(id)sender\n\
    {\n    [self.numberOfOperations resignFirstResponder];\n}\n```\n\n您刚刚添加的这个方法只是告诉文本字段放弃第一响应者状态，以便键盘回缩，从而您可以看到整个表格。\n"
- fmt: "现在你需要实现`cancelOperation:`方法。向发送者请求其`tag`值，并将其用作表格视图的行索引。使用该索引从操作队列中检索一个操作并取消它。检查该操作是否正在执行，如果没有，则触发表格数据的重新加载，以便行的文本从“等待中...”更改为“已取消...”。\n\
    \n```\n- (IBAction)cancelOperation:(id)sender\n{\n    self.cancelledIndex = [sender\
    \ tag];\n    NSOperation *operation = [[self.queue operations] objectAtIndex:self.cancelledIndex];\n\
        [operation cancel];\n    if (![operation isExecuting])\n        [self.tableView\
    \ reloadData];\n}\n```\n\n回溯一下，找到`viewDidLoad`方法。在调用`super`之后添加以下内容：\n\n```\n\
        self.queue = [[NSOperationQueue alloc] init];\n    [self.queue addObserver:self                  forKeyPath:@\"\
    operations\"                     \n         options:(NSKeyValueObservingOptionNew\
    \ | NSKeyValueObservingOptionOld)                     \n         context:NULL];\n\
        self.cancelledIndex = -1;\n```\n\n在`viewDidLoad`中，你首先创建一个`NSOperationQueue`的新实例并将其赋值给`queue`。然后你做一些很酷的事情。你使用了一种叫做KVO的东西。这不是拼写错误。我们讨论的不是KVC，但这是一个相关的概念。KVO代表键值观察，它是一种机制，让你在另一个对象的特定属性发生变化时得到通知。你正在将`self`注册为`queue`在键路径`operations`上的观察者。该键路径是返回包含队列中所有操作的数组的属性的名称。每当一个操作被添加或从队列中移除时，你的控制器类都会因KVO而收到通知。`options`参数允许你请求关于更改的额外信息，例如更改属性的先前值。你不需要超出基本KVO提供的任何额外内容，所以你传递`0`。你还在最后一个参数中传递`NULL`，因为你没有任何想要传递给通知方法的对象。\n\
    \n既然你已经注册了KVO通知，你就必须实现一个名为`observeValueForKeyPath:ofObject:change:context:`的方法。让我们将该方法添加到你的类中，然后讨论它的作用。在文件底部，`@end`之前插入以下新方法：\n\
    \n```\n#pragma mark - KVO method\n\n- (void)observeValueForKeyPath:(NSString *)keyPath                      \
    \ \n    ofObject:(id)object                         \n      change:(NSDictionary\
    \ *)change                        \n    context:(void *)context\n{\n```\n\n你对使用KVO观察的属性的任何更改都会触发对此方法的调用。该方法的第一个参数是你正在观察的键路径，第二个参数是你正在观察的对象。在你的例子中，由于你只在一个对象上观察一个键路径，你不需要对这些值做任何操作。如果你正在观察多个值，你可能需要检查这些参数以知道该做什么。第三个参数`change`是一个字典，包含关于所发生更改的大量信息。之前观察`queue`时，你没有为`context`传递一个值，所以当此方法被调用时，你不会在`context`中收到任何内容。\n\
    \n**注意**：KVO是Cocoa Touch的一个简洁功能，但我们没有深入介绍。如果你有兴趣在自己的应用程序中利用KVO，一个很好的起点是苹果的*Key\
    \ Value Observing Programming Guide*，可在[https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/KeyValueObserving/KeyValueObserving.html](https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/KeyValueObserving/KeyValueObserving.html)找到。\n\
    \n在此方法中，你首先检索存储在`NSKeyValueChangeKindKey`下的值。这将返回一个`NSNumber`，当转换为整数时，会告诉你是否发生了改变。如果发生了改变，则整数值将等于常量`NSKeyValueChangeSetting`。\n\
    \n```\nNSNumber *kind = [change objectForKey:NSKeyValueChangeKindKey];\n```\n\n\
    接下来，你获取存储在`NSKeyValueChangeOldKey`下的`NSArray`。这将返回你在对其进行任何工作之前的数组。接下来，你获取存储在`NSKeyValueChangeNewKey`下的`NSArray`。这将为你提供操作完成后的数组。\n\
    \n```\nNSArray *old = (NSArray *)[change objectForKey:NSKeyValueChangeOldKey];\n\
    NSArray *new = (NSArray *)[change objectForKey:NSKeyValueChangeNewKey];\n```\n\
    \n现在，你检查是否发生了更改。如果发生了更改，你将更新表格视图，因此你准备表格视图。\n\n```\nif ([kind integerValue] ==\
    \ NSKeyValueChangeSetting) {\n    [self.tableView beginUpdates];\n```\n\n如果旧数组中的元素数量小于新数组，则说明你插入了一个新操作，并相应地更新表格视图。\n\
    \n```\n        if ([old count] < [new count]) {\n            NSArray *indexPaths\
    \ =\n                 [NSArray arrayWithObject:[NSIndexPath indexPathForRow:([new\
    \ count]-1) inSection:0]];\n            [self.tableView insertRowsAtIndexPaths:indexPaths\n\
    withRowAnimation:UITableViewRowAnimationFade];\n        }\n```\n\n否则，如果旧数组大于新数组，则说明你删除了一个操作。\n\
    \n```\n        else if ([old count] > [new count]) {\n            NSArray *indexPaths\
    \ =                 [NSArray arrayWithObject:[NSIndexPath indexPathForRow:self.cancelledIndex\
    \ inSection:0]];\n            [self.tableView deleteRowsAtIndexPaths:indexPaths                                  \
    \ \n        withRowAnimation:UITableViewRowAnimationFade];\n            self.cancelledIndex\
    \ = -1;\n        }\n然后你告诉表格视图已完成更改，以便它可以更新自身。\n        [self.tableView endUpdates];\n\
        }\n}\n```\n\n快完成了，朋友们。快完成了。在类的底部，你还有几个方法要添加。首先，你需要添加你的`SquareRootOperationDelegate`方法，在其中更新用户界面。\n\
    \n```\n#pragma mark  - SquareRootOperation Delegate Method\n\n- (void)operationProgressChanged:(SquareRootOperation\
    \ *)op {\n    NSUInteger opIndex = [[self.queue operations] indexOfObject:op];\n\
        NSUInteger reloadIndices[] = {0, opIndex};\n    NSIndexPath *reloadIndexPath\
    \ = [NSIndexPath indexPathWithIndexes:reloadIndices length:2];\n    ProgressCell\
    \ *cell = (ProgressCell *)[tableView cellForRowAtIndexPath:reloadIndexPath];\n\
        if (cell) {\n        UIProgressView *progressView = cell.progressBar;\n        progressView.progress\
    \ = [op percentComplete];\n        UILabel *progressLabel = cell.progressLabel;\n\
            progressLabel.text = [op progressString];\n\n[self.tableView beginUpdates];\n\
            [self.tableView reloadRowsAtIndexPaths:[NSArray arrayWithObject:reloadIndexPath]                              \
    \ \n         withRowAnimation:UITableViewRowAnimationNone];\n        [self.tableView\
    \ endUpdates];\n    }\n}\n```\n\n你获取调用该方法的`SquareRootOperation`实例，并在`operations`数组中找到其索引。你使用该信息构建一个指向与触发方法调用的操作相对应的行的索引路径。你使用该索引路径获取对显示更新后操作的单元格的引用。如果没有对应的单元格，则说明该行当前不可见，你不需要执行任何操作。如果该行可见，你从操作中获取`percentComplete`和`progressString`值，并使用它们来设置操作单元格的标签和进度视图。\n\
    \n剩下的就是表格视图方法了，你们现在对这些已经很熟悉了，所以只需插入以下方法：\n\n```\n#pragma mark - Table View Data\
    \ Source Methods\n```"
  raw: "Now you need to implement the cancelOperation: method. You ask the sender\
    \ for its tag value and use that as the table view row index. You use that index\
    \ to retrieve an operation from the operation queue and cancel it. You check to\
    \ see if the operation was executing, and if it wasn’t, you trigger a reload of\
    \ the table data so that the row’s text gets changed from Waiting… to Cancelled….\n\
    \n```\n- (IBAction)cancelOperation:(id)sender\n{\n    self.cancelledIndex = [sender\
    \ tag];\n    NSOperation *operation = [[self.queue operations] objectAtIndex:self.cancelledIndex];\n\
        [operation cancel];\n    if (![operation isExecuting])\n        [self.tableView\
    \ reloadData];\n}\n```\n\nBack up a little bit and find the viewDidLoad method.\
    \ Add the following after the call to super:\n\n```\n    self.queue = [[NSOperationQueue\
    \ alloc] init];\n    [self.queue addObserver:self                  forKeyPath:@\"\
    operations\"                     \n         options:(NSKeyValueObservingOptionNew\
    \ | NSKeyValueObservingOptionOld)                     \n         context:NULL];\n\
        self.cancelledIndex = -1;\n```\n\nThe first thing you do in viewDidLoad is\
    \ create a new instance of NSOperationQueue and assign it to queue. Then you do\
    \ something kind of neat. You use something called KVO. That’s not a typo. We’re\
    \ not talking about KVC, but it’s a related concept. KVO stands for key-value\
    \ observation, and it’s a mechanism that lets you get notified when a particular\
    \ property on another object gets changed. You’re registering self as an observer\
    \ of queue for the key path called operations. That key path is the name of the\
    \ property that returns an array with all of the operations in the queue. Whenever\
    \ an operation is added or gets removed from the queue, your controller class\
    \ will get notified of that fact thanks to KVO. The options parameter allows you\
    \ to request additional information about the change, such as the previous value\
    \ of the changed property. You don’t need anything over and above what basic KVO\
    \ provides, so you pass 0\\. You also pass NULL into the final argument because\
    \ you don’t have any objects that you want to get passed along to the notification\
    \ method.\n\nNow that you’ve registered for the KVO notification, you have to\
    \ implement a method called observeValueForKeyPath:ofObject:change:context:. Let’s\
    \ add that method to your class and then talk about what it’s doing. Insert the\
    \ following new method at the bottom of the file, before @end:\n\n```\n#pragma\
    \ mark - KVO method\n\n- (void)observeValueForKeyPath:(NSString *)keyPath                      \
    \ \n    ofObject:(id)object                         \n      change:(NSDictionary\
    \ *)change                        \n    context:(void *)context\n{\n```\n\nAny\
    \ change to properties you observe using KVO will trigger a call to this method.\
    \ The first argument to the method is the key path that you’re watching, and the\
    \ second is the object that you are observing. In your case, since you’re only\
    \ watching one key path on one object, you don’t need to do anything with these\
    \ values. If you were observing multiple values, you would probably need to check\
    \ these arguments to know what to do. The third argument, change, is a dictionary\
    \ that contains a whole bunch of information about the change that happened. You\
    \ didn’t pass in a value for context earlier when you observed queue, so you won’t\
    \ receive anything in context when this method gets called.\n\n**Note**  KVO is\
    \ a neat feature of Cocoa Touch, but one that we’re not covering in-depth. If\
    \ you’re interested in leveraging KVO in your own applications, a great place\
    \ to start is Apple’s *Key Value Observing Programming Guide* available at [https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/KeyValueObserving/KeyValueObserving.html](https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/KeyValueObserving/KeyValueObserving.html).\n\
    \nThe first thing you do in this method is retrieve the value stored under NSKeyValueChangeKindKey.\
    \ This will return an NSNumber that, when converted to an integer, will tell you\
    \ if change happened. If there was a change, then the integer representation will\
    \ equal the constant NSKeyValueChangeSetting.\n\n```\nNSNumber *kind = [change\
    \ objectForKey:NSKeyValueChangeKindKey];\n```\n\nNext, you get the NSArray stored\
    \ under NSKeyValueChangeOldKey. This will return the array before you performed\
    \ any work on it. Next, you get the NSArray stored under NSKeyValueChangeNewKey.\
    \ This will give you the array after the action is completed.\n\n```\nNSArray\
    \ *old = (NSArray *)[change objectForKey:NSKeyValueChangeOldKey];\nNSArray *new\
    \ = (NSArray *)[change objectForKey:NSKeyValueChangeNewKey];\n```\n\nNow, you\
    \ check that change has occurred. If a change has occurred, you’ll be updating\
    \ the table view, so you prepare the table view.\n\n```\nif ([kind integerValue]\
    \ == NSKeyValueChangeSetting) {\n    [self.tableView beginUpdates];\n```\n\nIf\
    \ the number of elements in the old array is smaller than the new array, then\
    \ you’ve inserted a new operation and you update the table view accordingly.\n\
    \n```\n        if ([old count] < [new count]) {\n            NSArray *indexPaths\
    \ =\n                 [NSArray arrayWithObject:[NSIndexPath indexPathForRow:([new\
    \ count]-1) inSection:0]];\n            [self.tableView insertRowsAtIndexPaths:indexPaths\n\
    \nwithRowAnimation:UITableViewRowAnimationFade];\n        }\n```\n\nOtherwise,\
    \ if the old array is larger than the new array, then you know you’ve deleted\
    \ an operation.\n\n```\n        else if ([old count] > [new count]) {\n            NSArray\
    \ *indexPaths =                 [NSArray arrayWithObject:[NSIndexPath indexPathForRow:self.cancelledIndex\
    \ inSection:0]];\n            [self.tableView deleteRowsAtIndexPaths:indexPaths                                  \
    \ \n        withRowAnimation:UITableViewRowAnimationFade];\n            self.cancelledIndex\
    \ = -1;\n        }\nThen you tell the table view you're done making changes, so\
    \ it can update itself.\n        [self.tableView endUpdates];\n    }\n}\n```\n\
    \nAlmost there, friends. Almost there. At the bottom of the class you have a few\
    \ more methods to add. First, you need to add your SquareRootOperationDelegate\
    \ method, where you update the user interface.\n\n```\n#pragma mark  - SquareRootOperation\
    \ Delegate Method\n\n- (void)operationProgressChanged:(SquareRootOperation *)op\
    \ {\n    NSUInteger opIndex = [[self.queue operations] indexOfObject:op];\n    NSUInteger\
    \ reloadIndices[] = {0, opIndex};\n    NSIndexPath *reloadIndexPath = [NSIndexPath\
    \ indexPathWithIndexes:reloadIndices length:2];\n    ProgressCell *cell = (ProgressCell\
    \ *)[tableView cellForRowAtIndexPath:reloadIndexPath];\n    if (cell) {\n        UIProgressView\
    \ *progressView = cell.progressBar;\n        progressView.progress = [op percentComplete];\n\
            UILabel *progressLabel = cell.progressLabel;\n        progressLabel.text\
    \ = [op progressString];\n\n[self.tableView beginUpdates];\n        [self.tableView\
    \ reloadRowsAtIndexPaths:[NSArray arrayWithObject:reloadIndexPath]                              \
    \ \n         withRowAnimation:UITableViewRowAnimationNone];\n        [self.tableView\
    \ endUpdates];\n    }\n}\n```\n\nYou take the SquareRootOperation instance that\
    \ called the method and find its index in the operations array. You use that information\
    \ to build an index path that points to the row that corresponds to the operation\
    \ that triggered the method call. You use that index path to get a reference to\
    \ the cell that displays the updated operation. If there is no corresponding cell,\
    \ then the row isn’t currently visible and you don’t need to do anything. If the\
    \ row is visible, you grab the percentComplete and progressString values from\
    \ the operation and use them to set the label and progress view for the operation’s\
