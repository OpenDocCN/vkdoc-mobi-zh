    \ `NSArray` containing all the media items that meet the criteria specified in\
    \ your media property predicates, like so:\n\n```objective-c\nNSArray *items =\
    \ query.items;\n```\n\n- You can use the property `collections` to retrieve the\
    \ objects grouped by one of the filterable properties. You can tell the query\
    \ which property to group the items by by setting the `groupingType` property\
    \ to the property key for the filterable attribute you want it grouped by. If\
    \ you don’t set `groupingType`, it will default to grouping by title.\n\nWhen\
    \ you access the `collections` property, the query will instead return an array\
    \ of `MPMediaItemCollection` objects, with one collection for each distinct value\
    \ in your grouping type. So, if you specified a `groupingType` of `MPMediaGroupingArtist`,\
