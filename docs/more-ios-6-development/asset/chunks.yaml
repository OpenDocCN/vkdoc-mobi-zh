    The nowPlayingItemChanged: method first queries the player for the media item
    that it is playing. If it is not playing anything, it resets the view and sets
    the status label to tell the user to add more music. If something is playing,
    then it retrieves the artwork for the media item using the MPMediaItemPropertyArtwork
    property. It checks to make sure the media item has artwork, and if it does, it
    puts it in your image view. Then you update the labels to tell you the artist
    and song name.


    Build and run the SimplePlayer application. You should be able to select music
    from your media library and play it. This is a pretty simple player (duh) and
    doesn’t give you much in terms of functionality, but you can see how to use the
    MediaPlayer framework to play music. Next, you’ll use the MediaPlayer framework
    to playback video as well.


    MPMoviePlayerController


    Playing back video with the MediaPlayer framework is very simple. First, you need
    the URL of the media item you wish to play back. The URL could point to either
    a video file in your media library or to a video resource on the Internet. If
    you want to play a video in your media library, you can retrieve the URL from
    an MPMediaItem via its MPMediaItemPropertyAssetURL.


    ```

    // videoMediaItem is an instance of MPMediaItem that point to a video in our media
    library

    NSURL *url = [videoMediaItem valueForProperty:MPMediaItemPropertyAssetURL];

    ```


    Once you have your video URL, you use it to create an instance of MPMoviePlayerController.
    This view controller handles the playback of your video and the built-in playback
    controls. The MPMoviePlayerController has a UIView property where the playback
    is presented. This UIView can be integrated into your application’s view (controller)
    hierarchy. It is much easier to use the MPMoviePlayerViewController class, which
    encapsulates the MPMoviePlayerController. Then you can push the MPMoviePlayerViewController
    into you view (controller) hierarchy modally, making it much easier to manage.
    The MPMoviePlayerViewController class gives you access to its underlying MPMoviePlayerController
    as a property.


    In order to determine the state of your video media in the MPMoviePlayerController,
    a series of notifications are sent ([Table 12-2](#9781430238072_Ch12.xhtml#Tab2)).


    [Table 12-2](#9781430238072_Ch12.xhtml#_Tab2). MPMoviePlayerController Notifications


    | **Notification** | **Description** |

    | --- | --- |

    | MPMovieDurationAvailableNotification | The movie (video) duration (length) has
    been determined. |

    | MPMovieMediaTypesAvailableNotification | The movie (video) media types (formats)
    have been determined. |

    | MPMovieNaturalSizeAvailableNotification | The movie (video) natural (preferred)
    frame size has been determined or changed. |

    | MPMoviePlayerDidEnterFullscreenNotification | The player has entered full screen
    mode. |

    | MPMoviePlayerDidExitFullscreenNotification | The player has exited full screen
    mode. |

    | MPMoviePlayerIsAirPlayVideoActiveDidChangeNotification | The player has started
    or finished playing the movie (video) via AirPlay. |

    | MPMoviePlayerLoadStateDidChangeNotification | The player (network) buffering
    state has changed. |

    | MPMoviePlayerNowPlayingMovieDidChangeNotification | The current playing movie
    (video) has changed. |

    | MPMoviePlayerPlaybackDidFinishNotification | The player is finished playing.
    The reason can be found via the MPMoviePlayerDidFinishReasonUserInfoKey. |

    | MPMoviePlayerPlaybackStateDidChangeNotification | The player playback state
    has changed. |

    | MPMoviePlayerScalingModeDidChangeNotification | The player scaling mode has
    changed. |

    | MPMoviePlayerThumbnailImageRequestDidFinishNotification | A request to capture
    a thumbnail image has completed. It may have succeeded or failed. |

    | MPMoviePlayerWillEnterFullscreenNotification | The player is about to enter
    full screen mode. |

    | MPMoviePlayerWillExitFullscreenNotification | The player is about to exit full
    screen mode. |

    | MPMovieSourceTypeAvailableNotification | The movie (video) source type was unknown
    and is now known. |


    Generally, you only need to worry about these notifications if you use MPMoviePlayerController.


    Enough talk. Let’s build an app that plays both audio and video media from your
    Media Library.


