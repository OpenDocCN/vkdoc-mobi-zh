    \ method scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:, which\
    \ takes exactly the same arguments as timerWithTimeInterval:target:selector:userInfo:repeats:.\n\
    \n```\nNSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:1.0/10.0\n                                                  target:self\n\
                                                    selector:@selector(myTimerMethod:)\n\
                                                    userInfo:nil \n                                                \
    \ repeats:YES];\n```\n\nStopping a Timer\n\nWhen you no longer need a timer, you\
    \ can unschedule it from the run loop by calling the invalidate method on the\
    \ instance. Invalidating a timer will stop it from firing any further and remove\
    \ it from the run loop, which will release the timer and cause it to be deallocated\
    \ unless it’s been retained elsewhere. Here’s how you invalidate a timer:\n\n\
    ```\n[timer invalidate];\n```\n\nLimitations of Timers\n\nTimers are very handy\
    \ for any number of purposes. As a tool for keeping your interface responsive,\
    \ they do have some limitations, however. The first and foremost of these limitations\
    \ is that you have to make some assumptions about how much time is available for\
    \ the process that you’re implementing.  If you have more than a couple of timers\
    \ running, things can easily get complex and the logic to make sure that each\
    \ timer’s method gets an appropriate share of the available time without taking\
    \ too much time away from the main thread can get very complex and abstruse.\n\
    \nTimers are great for when you have one, or at most, a small number, of long-running\
    \ tasks that can be easily broken down into discrete chunks for processing. When\
    \ you have more than that, or when the processes don’t lend themselves to being\
    \ performed in chunks, timers become far too much trouble and just aren’t the\
    \ right tool for the job.\n\nLet’s use a timer to get the Stalled application\
    \ working the way your users will expect it to work, then you’ll move on and look\
    \ at how to handle scenarios where you have more than a couple of processes.\n\
    \nFixing Stalled with a Timer\n\nYou’re going to keep working with the Stalled\
    \ application, but before you proceed, make a copy of the Stalled project folder.\
    \ You’re going to fix the project using two different techniques, so you will\
    \ need two copies of the project in order to play along at home. If you run into\
    \ problems, you can always copy the 14 – Stalled project in the project archive\
    \ that accompanies this book as your starting point for both this exercise and\
    \ the next one.\n\nCreating the Batch Object\n\nBefore you start modifying your\
    \ controller class, create a class to represent your batch of calculations. This\
    \ object will keep track of how many calculations need to be performed as well\
    \ as how many already have. You’ll also move the actual calculations into the\
    \ batch object as well. Having this object will make it much easier to do processing\
    \ in chunks, since the batch will be self-contained in a single object.\n\nCreate\
    \ a new file that is an Objective-C class in the Stalled Group in the Navigator\
    \ pane. Name the class SquareRootBatch, and make sure it is a subclass of NSObject.\
    \ When presented with the Save dialog, make sure it is assigned to the Stalled\
    \ target. You’ll modify the interface file first. Select SquareRootBatch.h to\
    \ open it in the editor.\n\nYou need define two properties for the maximum number\
    \ whose square root will be calculated and the current number whose square root\
    \ is being calculated. This will allow you to keep track of where you are between\
    \ timer method calls.\n\n```\n@property (assign, nonatomic) NSInteger max;\n@property\
    \ (assign, nonatomic) NSInteger current;\n```\n\nNext, you declare an initializer\
    \ method that takes one argument, the maximum number for which you are to calculate\
    \ the square root.\n\n```\n- (id)initWithMaxNumber:(NSInteger)maxNumber;\n```\n\
    \nThe next two methods will enable your batch to work similarly to an enumerator.\
    \ You can find out if you still have numbers to calculate by calling hasNext,\
    \ and actually perform the next calculation by calling next, which returns the\
    \ calculated value.\n\n```\n- (BOOL)hasNext;\n- (double)next;\n```\n\nAfter that,\
    \ you have two more methods used to retrieve values for updating the progress\
    \ bar and progress label.\n\n```\n- (float)percentCompleted;\n- (NSString *)percentCompletedText;\n\
    ```\n\nAnd that’s all she wrote for this header file. Save SquareRootBatch.h and\
    \ then flip over to SquareRootBatch.m.\n\nYou start off by defining a string that\
    \ will be used for throwing an exception. If you exceed the number of calculations\
    \ you’ve specified, you will throw an exception with this name. Put this #define\
    \ before the @implementation declaration.\n\n```\n#define kExceededMaxException\
    \ @\"Exceeded Max\"\n```\n\nNow you can implement the methods you defined in the\
    \ interface file. First, the initializer:\n\n```\n- (id)initWithMaxNumber:(NSInteger)maxNumber\n\
    {\n    self = [super init];\n    if (self) {\n        self.current = 0;\n        self.max\
    \ = maxNumber;\n    }\n    return self;\n}\n```\n\nThe current Property is set\
    \ to zero, indicating that you are starting from the beginning. You set the max\
    \ Property to the maxNumber argument.\n\nNext, your “enumerator” methods. hasNext\
    \ simply checks that you haven’t reached the maximum number you initialized with.\n\
    \n```\n- (BOOL)hasNext\n{\n    return self.current < = self.max;\n}\n\n- (double)next\n\
    {\n    if (self.current > self.max)\n        [NSException raise:kExceededMaxException                    \
    \ \nformat:@\"Requested a calculation from completed batch\"];\n\nreturn sqrt((double)++self.current);\n\
    }\n```\n\nThe next method increments the current Property, then returns its square\
    \ root. Before you do that, you check to make sure that haven’t reached (and passed)\
    \ the maximum number.\n\nFinally, you implement the methods to calculate your\
    \ progress and format your label text.\n\n```\n- (float)percentCompleted\n{\n\
        return (float)self.current / (float)self.max;\n}\n\n- (NSString *)percentCompletedText\n\
    {\n    return [NSString stringWithFormat:@\"Square Root of %d is %.6f\",                                      \
    \ \n     self.current, sqrt((double)self.current)];\n}\n```"
  trans: '

    该方法的第一个参数指定了你希望定时器触发并调用其方法的频率。在此示例中，你传入的是十分之一秒，因此该定时器大约每秒触发十次。接下来的两个参数的工作方式与控制器的`target`和`action`属性完全相同。第二个参数`target`是定时器应调用方法的对象，而`selector`指向定时器触发时实际要调用的方法。由`selector`指定的方法必须接受一个参数，即调用该方法的`NSTimer`实例。第四个参数`userInfo`是为应用程序使用而设计的。如果你在此处传入一个对象，该对象将随定时器一起传递，并在定时器触发时可在其调用的方法中使用。最后一个参数指定定时器是重复触发还是仅触发一次。


    **注意**：非重复定时器目前已不太常用，因为你可以通过调用`performSelector:withObject:afterDelay:`方法（你在本书中已多次使用）更轻松地实现完全相同的效果。


    一旦你创建了定时器并准备让其开始触发，你需要获取要将其调度到的运行循环的引用，然后添加定时器。以下是将定时器调度到主运行循环的示例：


    ```

    NSRunLoop *loop = [NSRunLoop mainRunLoop];

    [loop addTimer:timer forMode:NSDefaultRunLoopMode];

    ```


    当你调度定时器时，运行循环会保留该定时器，直到你停止它。


    如果你想创建一个已调度到运行循环的定时器，从而跳过前面两行代码，可以使用工厂方法`scheduledTimerWithTimeInterval:target:selector:userInfo:repeats:`，该方法接受的参数与`timerWithTimeInterval:target:selector:userInfo:repeats:`完全相同。


    ```

    NSTimer *timer = [NSTimer scheduledTimerWithTimeInterval:1.0/10.0

                                                      target:self

                                                    selector:@selector(myTimerMethod:)

                                                    userInfo:nil

                                                     repeats:YES];

    ```


    ## 停止定时器


    当你不再需要定时器时，可以通过调用实例的`invalidate`方法将其从运行循环中取消调度。使定时器失效将阻止其进一步触发，并将其从运行循环中移除，这将释放定时器并导致其被释放（除非它已被其他地方保留）。以下是使定时器失效的方法：


    ```

    [timer invalidate];

    ```


    ## 定时器的局限性


    定时器对于许多用途都非常方便。然而，作为保持界面响应性的工具，它们确实存在一些局限性。其中最主要的局限性是你必须对正在实现的过程有多少可用时间做出一些假设。如果你同时运行多个定时器，事情很容易变得复杂，而确保每个定时器的方法获得适当的可用时间份额、同时不占用主线程过多时间的逻辑可能变得非常复杂和晦涩。


    当你有一个（或最多少量）可以轻松分解为离散块进行处理的长时间运行任务时，定时器非常适用。当任务数量超过这个范围，或者进程不适合分块执行时，定时器就会变得过于麻烦，并且不是完成工作的合适工具。


    让我们使用一个定时器来使"Stalled"应用程序按照用户期望的方式工作，然后我们将继续讨论如何应对有多个进程的场景。


    ## 使用定时器修复 Stalled


    你将继续使用"Stalled"应用程序，但在继续之前，请先复制一份"Stalled"项目文件夹。你将使用两种不同的技术来修复该项目，因此你需要两份项目副本以便在家中跟着操作。如果遇到问题，你可以随时将本书附带的项目存档中的`14
    – Stalled`项目作为本次练习和下一个练习的起点。


    ### 创建批处理对象


    在开始修改控制器类之前，先创建一个类来表示你的计算批次。该对象将跟踪需要执行的计算数量以及已完成的计算数量。你还要将实际的计算逻辑移入批处理对象中。拥有这个对象将使分块处理变得容易得多，因为批次将自包含在单个对象中。


    在导航器面板的"Stalled"组中创建一个新的 Objective-C 类文件。将该类命名为`SquareRootBatch`，并确保它是`NSObject`的子类。当出现保存对话框时，确保它被分配给"Stalled"目标。首先修改接口文件。选择`SquareRootBatch.h`在编辑器中打开。


    你需要定义两个属性：一个用于要计算平方根的最大数值，另一个用于当前正在计算平方根的数值。这将使你能在定时器方法调用之间跟踪进度。


    ```

    @property (assign, nonatomic) NSInteger max;

    @property (assign, nonatomic) NSInteger current;

    ```


    接下来，声明一个初始化方法，该方法接受一个参数，即你要计算平方根的最大数值。


    ```

    - (id)initWithMaxNumber:(NSInteger)maxNumber;

    ```


    接下来的两个方法将使你的批次能够像枚举器一样工作。你可以通过调用`hasNext`来检查是否还有数字需要计算，并通过调用`next`实际执行下一次计算，该`next`方法返回计算出的值。


    ```

    - (BOOL)hasNext;

    - (double)next;

    ```


    之后，你还有两个方法用于获取更新进度条和进度标签的值。


    ```

    - (float)percentCompleted;

    - (NSString *)percentCompletedText;

    ```


    这个头文件就写到这里。保存`SquareRootBatch.h`，然后切换到`SquareRootBatch.m`。


    首先，定义一个用于抛出异常的字符串。如果超出了你指定的计算数量，你将使用此名称抛出异常。将此`#define`放在`@implementation`声明之前。


    ```

    #define kExceededMaxException @"Exceeded Max"

    ```


    现在，你可以实现在接口文件中定义的方法。首先是初始化方法：


    ```

    - (id)initWithMaxNumber:(NSInteger)maxNumber

    {

        self = [super init];

        if (self) {

            self.current = 0;

            self.max = maxNumber;

        }

        return self;

    }

    ```


    将`current`属性设置为零，表示你从头开始。你将`max`属性设置为`maxNumber`参数。


    接下来是你的"枚举器"方法。`hasNext`简单地检查你是否已达到初始化时的最大数值。


    ```

    - (BOOL)hasNext

    {

        return self.current <= self.max;

    }


    - (double)next

    {

        if (self.current > self.max)

            [NSException raise:kExceededMaxException

                        format:@"Requested a calculation from completed batch"];


        return sqrt((double)++self.current);

    }

    ```


    `next`方法增加`current`属性，然后返回其平方根。在此之前，你要检查是否尚未达到（并超过）最大数值。


    最后，你实现了计算进度和格式化标签文本的方法。


    ```

    - (float)percentCompleted

    {

        return (float)self.current / (float)self.max;

    }


    - (NSString *)percentCompletedText

    {

        return [NSString stringWithFormat:@"Square Root of %d is %.6f",

                self.current, sqrt((double)self.current)];

    }

    ```

