    ## About the Authors


    ![image](images/9781430238072_unFM-01.jpg)


    **Dave Mark** is a longtime Mac developer and author who has written a number
    of books on Mac and iOS development, including *Beginning iPhone 4 Development*
    (Apress, 2011), *More iPhone 3 Development* (Apress, 2010), *Learn C on the Mac*
    (Apress, 2008), *Ultimate Mac Programming* (Wiley, 1995), and The *Macintosh Programming
    Primer* series (Addison-Wesley, 1992). Dave was one of the founders of MartianCraft,
    an iOS and Android development house. Dave loves the water and spends as much
    time as possible on it, in it, or near it. He lives with his wife and three children
    in Virginia.


    ![image](images/9781430238072_unFM-02.jpg)


    **Jeff LaMarche** is a Mac and iOS developer with more than 20 years of programming
    experience. Jeff has written a number of iOS and Mac development books, including
    *Beginning iPhone 4 Development* (Apress, 2011), *More iPhone 3 Development* (Apress,
    2010), and *Learn Cocoa on the Mac* (Apress, 2010). Jeff is a principal at MartianCraft,
    an iOS and Android development house. He has written about Cocoa and Objective-C
    for MacTech Magazine, as well as articles for Apple''s developer web site. Jeff
    also writes about iOS development for his widely read blog at `www.iphonedevelopment.blogspot.com`.


    ![image](images/9781430238072_unFM-03.jpg)


    **Kevin Kim** is a co-founder and developer at AppOrchard LLC, a Tipping Point
    Partners company focused on sustainable iOS development. A graduate of Carnegie
    Mellon University, he was first exposed to the NeXTStep computer (the ancestor
    of today''s iPhone) as a programmer at the Pittsburgh Supercomputing Center and
    has been hooked ever since. His career has spanned finance, government, biotech,
    and technology, including Apple where he managed the Apple Enterprise Services
    team for the New York metro area. Kevin was also a co-author of *Pro iOS 5 Tools*
    (Apress, 2011). He currently resides in the Alphabet City section of New York
    City with his wife and a clowder of rescued cats.


    ## About the Technical Reviewer


    ![image](images/9781430238072_unFM-04.jpg)


    **Nick Waynik** has been working in the IT field for over 13 years and has done
    everything from network administration to web development. He started writing
    iOS apps when the SDK was first released. Since then he has gone on to start his
    own business focusing on iOS development. He loves spending his free time with
    his wife, Allison, and son, Preston; sometimes he even plays golf. He blogs at
    `nickwaynik.com` and can be found on Twitter as @n_dubbs.


    ## Acknowledgments


    Writing a book like this one is more than the effort of us, the authors. Even
    though our names are on the cover, it is the result of the hard work of many people.


    First, I would like to thank Dave Mark and Jeff LaMarche for writing the first
    version of the book, and for giving me a solid foundation from which to build
    and expand upon.


    I would like to thank the staff at Apress for making sure this book was completed
    as close to schedule as possible. Brigid Duffy provided the guidance and oversight
    to make sure I completed this book. Tom Welsh made sure I stayed on topic and
    kept things clear. Mary Behr made the manuscript look beautiful. I''d also like
    to thank Brandon Levesque for making sure people knew this book was coming.


    Thanks to the technical reviewers Nick Waynik and Mark Dalrymple for making sure
    the code I wrote actually works. Any mistakes that still exist are mine.


    Thanks to my friends and colleagues at AppOrchard for their patience through the
    last several months of curmudgeonly behavior and for helping me make this project
    successful.


    A great deal of thanks to my wife, Annie, for making sure I worked on this book
    when I would have rather been watching baseball or playing guitar. Thanks to my
    cats, PK, Manny, and Leela, for wanting to be fed when I needed a break. An extra
    thanks goes to Manny for being the subject of many of the examples in this book.


    Finally, thanks to you, the reader, for buying this book. We like to think of
    programming as a scientific discipline, but, at times it feels more like a black
    art. If this book helps you on your journey of understanding iOS programming,
    then it is all worthwhile.


    # Chapter 1: Here We Go Round Again


    So, you''re still creating iPhone applications, huh? Great! iOS and the App Store
    have enjoyed tremendous success, fundamentally changing the way mobile applications
    are delivered and completely changing what people expect from their mobile devices.
    Since the first release of the iOS Software Development Kit (SDK) way back in
    March 2008, Apple has been busily adding new functionality and improving what
    was already there. It''s no less exciting a platform than it was back when it
    was first introduced. In fact, in many ways, it''s more exciting, because Apple
    keeps expanding the amount of functionality available to third-party developers
    like us.


    Since the last release of this book, *More iPhone 3 Development* (Apress 2010),
    Apple has released a number of frameworks, tools, and services. These include,
    but aren''t limited to:


    *   **Core frameworks**: Core Motion, Core Telephony, Core Media, Core View, Core
    MIDI, Core Image, and Core Bluetooth

    *   **Utility frameworks**: Event Kit, Quick Look Framework, Assets Library, Image
    I/O, Printing, AirPlay, Accounts and Social Frameworks, Pass Kit

    *   **Services and their frameworks**: iAds, Game Center, iCloud, Newsstand

    *   **Developer-centric enhancements**: Blocks, Grand Central Dispatch (GCD),
    Weak Linking Support, Automatic Reference Counting (ARC), Storyboards, Collection
    Views, UI State Preservation, Auto Layout, UIAutomation


    and many more . . .


    Obviously, there are too many changes to cover completely in a single book. But
    we''ll try our best to make you comfortable with the ones that you''ll most likely
    need to know.


    ## What This Book Is


    This book is a guide to help you continue down the path to creating better iOS
    applications. In *Beginning iOS 6 Development* (Apress, 2012), the goal was to
    get you past the initial learning curve and to help you get your arms around the
    fundamentals of building your first iOS applications. In this book, we''re assuming
    you already know the basics. So, in addition to showing you how to use several
    of the new iOS APIs, we''re also going to weave in some more advanced techniques
    that you''ll need as your iOS development efforts grow in size and complexity.'
