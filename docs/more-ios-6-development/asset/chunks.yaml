    HeroListController.m, and navigate the Editor to just above the -addHero: method.
    Add these lines:


    ```

    #pragma mark - UITabBarDelegate Methods


    - (void)tabBar:(UITabBar *)tabBar didSelectItem:(UITabBarItem *)item

    {

        NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];

        NSUInteger tabIndex = [tabBar.items indexOfObject:item];

        [defaults setInteger:tabIndex forKey:kSelectedTabDefaultsKey];

    }

    ```


    Now when you quit and launch the application, it remembers your last tab bar selection.


    Designing the Data Model


    Now you need define the application’s data model. As we discussed in [Chapter
    2](#9781430238072_Ch02.xhtml), the Xcode model editor is where you design your
    application’s data model. In the Navigator pane, click on SuperDB.xcdatamodel.
    This should bring up the model editor ([Figure 3-34](#9781430238072_Ch03.xhtml#Fig34)).


