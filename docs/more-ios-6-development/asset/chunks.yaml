    \ initWithFileURL:aURL]];\n. . .\nif (doc.documentState & UIDocumentStateClosed)\
    \ {\n    // documentState == UIDocumentStateClosed\n}\n```\n\n`UIDocument`还提供了一个名为`UIDocumentStateChangedNotification`的通知，你可以用来注册观察者。\n\
    \n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\
    [[NSNotificationCenter defaultCenter] addObserver:anObserver\n               \
    \                          selector:@selector(documentStateChanged:)\n       \
    \                                     name:UIDocumentStateChangedNotification\n\
    \                                           object:doc]\n```\n\n你的观察者类将实现`documentStateChanged:`方法来检查文档状态，并相应地处理每种状态。\n\
    \n为了执行自动保存，`UIDocument`定期调用`hasUnsavedChanges`方法，该方法返回一个`BOOL`值，指示自上次保存以来文档是否已更改。这些调用的频率由`UIDocument`决定，无法调整。通常，你不会重写`hasUnsavedChanges`。相反，你可以做以下两件事之一：通过`UIDocument`的`undoManager`属性注册`NSUndoManager`，以注册撤销/重做操作；或者每次对文档进行可跟踪更改时调用`updateChangeCount:`方法。要使你的文档与\
    \ iCloud 配合使用，你必须启用自动保存功能。\n\n## 基于 iCloud 的 UIDocument\n\n使用 iCloud 文档存储需要对正常的`UIDocument`流程进行一些调整，以使用应用程序无处不在容器中的“Documents”子目录。为了获取无处不在容器\
    \ URL，将文档标识符传递给`NSFileManager`方法`URLForUbiquityContainerIdentifer:`，并传入`nil`作为参数。\n\
    \n```\nid iCloudToken = [[NSFileManager defaultManager] ubiquityIdentityToken];\n\
    if (iCloudToken) {\n       // 拥有 iCloud 访问权限\n       NSURL *ubiquityURL = [[NSFileManager\
    \ defaultManager] URLForUbiquityContainerIdentifier:nil];\n       NSURL *ubiquityDocURL\
    \ = [ubiquityURL URLByAppendingPathComponent:@\"Documents\"];\n}\nelse {\n   \
    \    // 没有 iCloud 访问权限\n}\n```\n"
- fmt: "在`URLForUbiquityContainerIdentifer:`中使用`nil`时，`NSFileManager`将使用应用程序授权文件中定义的通用容器ID。我们稍后在“授权”部分会介绍这一点，但现在先请跟随操作。若要显式使用通用容器标识符，它由你的ADC团队ID和应用ID组合而成。\n\
    \n```\nNSString *ubiquityContainer = @\"SA4AKF8Z52.com.apporchard.iCloudAppID\"\
    ;\nNSURL *ubiquityURL = [[NSFileManager defaultManager]\n                    \
    \            URLForUbiquityContainerIdentifier:ubiquityContainer];\n```\n\n注意使用`NSFileManager`的`ubiquityIdentityToken`方法来检查iCloud可用性。该方法返回一个与用户iCloud账户关联的唯一令牌。根据你的应用需求，如果无法访问iCloud，应通知用户，并选择使用本地存储或退出应用。\n\
    \n## `NSMetadataQuery`\n\n之前我们提到，iCloud和iOS不会自动同步应用通用容器中的文档。然而，文档的元数据是同步的。对于iCloud文档存储应用，你不能仅通过查看通用容器中Documents目录的文件内容来了解哪些文档可用，而必须使用`NSMetadataQuery`类执行元数据查询。\n\
    \n在应用生命周期早期，你需要实例化一个`NSMetadataQuery`并配置它，使其在通用容器的Documents子目录中查找合适的文档。\n\n```\n\
    self.query = [[NSMetadataQuery alloc] init];\n[self.query setSearchScopes:@[NSMetadataQueryUbiquitousDocumentsScope]];\n\
    NSString* filePattern = @\"*.txt\";\n[self.query setPredicate:[NSPredicate predicateWithFormat:@\"\
    %K LIKE %@\",\n                                        NSMetadataItemFSNameKey,\
    \ filePattern]];\n```\n\n此示例假设你有一个`query`属性，并且它被配置为查找所有带`.txt`扩展名的文件。\n\n创建`NSMetadataQuery`对象后，你需要注册以接收其通知。\n\
    \n```\n[[NSNotificationCenter defaultCenter] addObserver:self\n              \
    \                            selector:@selector(processFiles:)\n             \
    \                                 name:NSMetadataQueryDidFinishGatheringNotification\n\
    \                                             object:nil];\n\n[[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          selector:@selector(processFiles:)\n\
    \                                              name:NSMetadataQueryDidUpdateNotification\n\
    \                                             object:nil];\n\n[self.query startQuery];\n\
    ```\n\n`NSMetadataQueryDidFinishGatheringNotification`在查询对象完成初始信息加载查询时发送。`NSMetadataQueryDidUpdateNotification`在Documents子目录内容发生变化并影响查询结果时发送。最后，你启动查询。\n\
    \n当发送通知时，会调用`processFiles:`方法。它可能如下所示：\n\n```\n- (void)processFiles:(NSNotification*)aNotification\n\
    {\n    NSMutableArray *files = [NSMutableArray array];\n\n// 在处理期间禁用查询\n    [self.query\
    \ disableUpdates];\n\nNSArray *queryResults = [self.query results];\n    for (NSMetadataItem\
    \ *result in queryResults) {\n        NSURL *fileURL = [result valueForAttribute:NSMetadataItemURLKey];\n\
    \        NSNumber *aBool = nil;\n\n// 排除隐藏文件\n        [fileURL getResourceValue:&aBool\
    \ forKey:NSURLIsHiddenKey error:nil];\n\nif (aBool && ![aBool boolValue])\n  \
    \          [files addObject:fileURL];\n    }\n\n// 对files数组进行一些操作\n    . . .\n\
    \n// 重新启用查询\n    [self.query enableUpdates];\n```\n\n}\n\n首先，你禁用查询更新以防止在处理过程中发送通知。在此示例中，你仅获取Documents子目录中的文件列表并将其添加到数组中。确保排除目录中的所有隐藏文件。获得文件数组后，在应用中使用它们（例如更新文件名的表格视图）。最后，重新启用查询以接收更新。\n\
    \n以上只是iCloud文档存储使用的入门知识。你的基于文档的应用需要处理许多文档生命周期问题才能有效工作。\n\n**注意** 更多信息，请阅读Apple的文档。先查看iOS应用编程指南中的iCloud章节（<https://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/AppArchitecture/AppArchitecture.html>）。然后阅读iCloud设计指南（<https://developer.apple.com/library/ios/#documentation/General/Conceptual/iCloudDesignGuide>）和iOS的基于文档的应用编程指南（<https://developer.apple.com/library/ios/#documentation/General/Conceptual/iCloudDesignGuide>）。\n\
    \n## 在iCloud中使用`Core Data`\n\n在iCloud中使用`Core Data`是一个相对简单的过程。你将持久化存储放置在应用的通用容器中。然而，你不希望持久化存储与iCloud同步——那会产生不必要的开销。相反，你希望同步应用之间的事务。当应用的另一个实例从iCloud接收到事务数据时，它会重新应用对持久化存储执行的每个操作。这有助于确保不同实例通过相同的操作集保持更新。\n\
    \n尽管你不希望同步持久化存储与iCloud，Apple仍建议你将数据文件放置在通用容器中扩展名为`.nosync`的文件夹内。这告诉iOS不要同步此文件夹的内容，但会将数据与正确的iCloud账户关联起来。\n\
    \n```\n// 假设我们有一个NSPersistentStoreCoordinator *persistentStoreCoordinator的实例\n\
    \nNSString *dataFileName = @\"iCloudCoreDataApp.sqlite\";\nNSString *dataDirectoryName\
    \ = @\"Data.nosync\";\nNSString *logsDirectoryName = @\"Logs\";\n\n__block NSPersistentStoreCoordinator\
    \ *psc = persistentStoreCoordinator;\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n    NSError *error = nil;\n\n// 获取Ubiquity Identity Token以检查iCloud访问权限\n\
    \    NSFileManager *fileManager = [NSFileManager defaultManager];\n    id ubiquityToken\
    \ = [fileManager ubiquityIdentityToken];\n    NSURL *ubiquityURL = [fileManager\
    \ URLForUbiquityContainerIdentifier:nil];\n    if (ubiquityToken && ubiquityURL)\
    \ {\n        // 拥有iCloud访问权限\n        NSString *dataDir = [[ubiquityURL path]\
    \ stringByAppendingPathComponent:dataDirectoryName];\n        if([fileManager\
    \ fileExistsAtPath:dataDir] == NO) {\n            NSError *fileSystemError;\n\
    \            [fileManager createDirectoryAtPath:dataDir\n                   withIntermediateDirectories:YES\n\
    \                                     attributes:nil\n                       \
    \                     error:&fileSystemError];\n            if (fileSystemError\
    \ != nil) {\n                NSLog(@\"Error creating database directory %@\",\
    \ fileSystemError);\n                // 处理错误\n            }\n        }\n\nNSString\
    \ *ubiquityContainer = [ubiquityURL lastPathComponent];\n        NSURL *logsPath\
    \ = [NSURL fileURLWithPath:[[ubiquityURL path]\n                             \
    \                    stringByAppendingPathComponent:logsDirectoryName]];\n```"
  raw: 'By using nil in URLForUbiquityContainerIdentifer:, NSFileManager will use
    the ubiquity container ID defined in the application’s entitlements file. We’ll
    cover this in the “Entitlements” section later on, but for now, just try to follow
    along. If you want to use the ubiquity container identifier explicitly, it’s a
    combination of your ADC Team ID and App ID.


    ```

    NSString *ubiquityContainer = @"SA4AKF8Z52.com.apporchard.iCloudAppID";

    NSURL *ubiquityURL = [[NSFileManager defaultManager]

                                    URLForUbiquityContainerIdentifier:ubiquityContainer];

    ```


    Notice the use of the NSFileManager method ubiquityIdentityToken to check for
    iCloud availability. This method returns a unique token tied to the user’s iCloud
    account. Depending on your application, if iCloud access is unavailable, you should
    inform the user and either work with local storage or exit the application.


    NSMetadataQuery


    Earlier, we stated that iCloud and iOS don’t automatically sync documents in an
    application’s ubiquity container. However, a document’s metadata is synced. For
    an iCloud document storage application, you can’t simple use the file contents
    of the Documents directory in your ubiquity container to know what documents are
    available for your application. Rather, you have to perform a metadata query using
    the NSMetadataQuery class.


    Early in your application lifecycle you need to instantiate an NSMetadataQuery
    and configure it to look for the appropriate documents in the Documents subdirectory
    of the ubiquity container.


    ```

    self.query = [[NSMetadataQuery alloc] init];

    [self.query setSearchScopes:@[NSMetadataQueryUbiquitousDocumentsScope]];

    NSString* filePattern = @"*.txt";

    [self.query setPredicate:[NSPredicate predicateWithFormat:@"%K LIKE %@",

                                            NSMetadataItemFSNameKey, filePattern]];

    ```


    This example assumes that you have a query property and it’s configured to look
    for all files with the .txt extension.


    After creating the NSMetadataQuery object, you need to register for its notifications.


    ```

    [[NSNotificationCenter defaultCenter] addObserver:self

                                              selector:@selector(processFiles:)

                                                  name:NSMetadataQueryDidFinishGatheringNotification

                                                 object:nil];


    [[NSNotificationCenter defaultCenter] addObserver:self

                                              selector:@selector(processFiles:)

                                                  name:NSMetadataQueryDidUpdateNotification

                                                 object:nil];


    [self.query startQuery];

    ```


    NSMetadataQueryDidFinishGatheringNotification is sent when the query object has
    finished its initial information loading query. NSMetadataQueryDidUpdateNotification
    is sent when the contents of the Documents subdirectory have changed and affect
    the results of the query. Finally, you start the query.


    When a notification is sent, the processFiles:method is invoked. It might look
    something like this:


    ```

    - (void)processFiles:(NSNotification*)aNotification

    {

        NSMutableArray *files = [NSMutableArray array];


    // disable query during processing

        [self.query disableUpdates];


    NSArray *queryResults = [self.query results];

        for (NSMetadataItem *result in queryResults) {

            NSURL *fileURL = [result valueForAttribute:NSMetadataItemURLKey];

            NSNumber *aBool = nil;


    // exclude hidden files

            [fileURL getResourceValue:&aBool forKey:NSURLIsHiddenKey error:nil];


    if (aBool && ![aBool boolValue])

                [files addObject:fileURL];

        }


    // do something with the files array

        . . .


    // reenable query

        [self.query enableUpdates];

    ```


    }


    First, you disable the query updates to prevent notifications from being sent
    while you’re processing. In this example, you simply get a list of files in the
    Documents subdirectory and add them to an array. You make sure to exclude any
    hidden files in the directory. Once you have the array of files, you use them
    in your application (perhaps to update a table view of file names). Finally, you
    re-enable the query to receive updates.


    You’ve only skimmed the surface of how to use iCloud document storage. There are
    a lot of document life-cycle issues that your document-based application should
    handle to be effective.


    **Note**  For more information, read Apple’s documentation. Check the iCloud chapter
    of the iOS App Programming Guide first ([https://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/AppArchitecture/AppArchitecture.html#//apple_ref/doc/uid/TP40007072-CH3-SW21](https://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/AppArchitecture/AppArchitecture.html)).
