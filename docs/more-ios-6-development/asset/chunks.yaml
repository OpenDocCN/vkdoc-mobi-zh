    \n图 6-13.  重构文件合并预览\n\n这个预览除了显示 `SuperDBCell` 接口和实现文件的创建之外，并没有展示太多内容。点击 Save（保存）。Xcode\
    \ 可能会询问是否要拍摄快照。是否使用快照由您决定。我们偶尔会使用，但我们更喜欢使用像 Git 这样的版本控制系统。\n\n## 移动代码\n\n目前，Xcode\
    \ 并未完成您希望的所有操作。它确实为 `SuperDBCell` 创建了文件，也使得 `SuperDBEditCell` 成为 `SuperDBCell`\
    \ 的子类，但除此之外没做太多事情。请记住，您希望让 `SuperDBCell` 与 `SuperDBEditCell` 相同，只是 `textField`\
    \ 永远不会被启用。\n\n让我们从 `SuperDBCell` 的接口文件开始。您将把 `SuperDBEditCell` 的大部分代码移动到 `SuperDBCell`\
    \ 中。\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface SuperDBCell : UITableViewCell\n\
