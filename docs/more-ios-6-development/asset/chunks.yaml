    field is an option to add a prefix (i.e., NS) before all your project’s classes.
    You can leave this blank.


    The Devices drop-down field lists the possible target devices for this project:
    iPad, iPhone, or Universal. The first two are self-explanatory. “Universal” is
    for applications that will run on both the iPad and iPhone. It’s a blessing and
    a curse to have to a single project that can support both iPads and iPhones. But
    for the purposes of this book, you’ll stick with iPhone. Since you’ll be using
    storyboards, make sure the “Use Storyboards” checkbox is checked. You obviously
    want to use Core Data, so check its checkbox. Finally, make sure the “Use Automatic
    Reference Counting” checkbox is checked.


    Click *Next*, and choose a location to save your project ([Figure 2-4](#9781430238072_Ch02.xhtml#Fig4)).
    The checkbox on the bottom will set up your project to use Git ([www.git-scm.com](http://www.git-scm.com)),
    a free, open-source version control system. It’s useful to use so you can leave
    it checked. We won’t discuss it, but if you don’t know about version control or
    git, we suggest you get familiar with them. Click Create. Xcode should create
    your project, and it should look like [Figure 2-5](#9781430238072_Ch02.xhtml#Fig5).


    ![9781430238072_Fig02-04.jpg](images/9781430238072_Fig02-04.jpg)


    [Figure 2-4.](#9781430238072_Ch02.xhtml#_Fig4)  Choose a location to put your
    project


    ![9781430238072_Fig02-05.jpg](images/9781430238072_Fig02-05.jpg)


    [Figure 2-5.](#9781430238072_Ch02.xhtml#_Fig5)  Voila, your project is ready!


    Build and run the application. Either press the Run button on the Toolbar, or
    **Product ![image](images/arrow.jpg) Run**. The simulator should appear. Press
    the Add (**+**) button in the upper right. A new row will insert into the table
    that shows the exact date and time the Add button was pressed ([Figure 2-6](#9781430238072_Ch02.xhtml#Fig6)).
    You can also use the Edit button to delete rows. Exciting, huh?


    ![9781430238072_Fig02-06.jpg](images/9781430238072_Fig02-06.jpg)


    [Figure 2-6.](#9781430238072_Ch02.xhtml#_Fig6)  CoreDataApp in action


    Under the hood of this simple application, a lot is happening. Think about it:
    without adding a single class, or any code to persist data to a file or interact
    with a database, pressing the Add button created an object, populated it with
    data, and saved it to a SQLite database created for you automatically. There’s
    plenty of free functionality here.


    Now that you’ve seen an application in action, let’s take a look at what’s going
    on behind the scenes.


    Core Data Concepts and Terminology


    Like most complex technologies, Core Data has its own terminology that can be
    a bit confusing to newcomers. Let’s break down the mystery and get your arms around
    Core Data’s nomenclature.


    [Figure 2-7](#9781430238072_Ch02.xhtml#Fig7) shows a simplified, high-level diagram
    of the Core Data architecture. Don’t expect it all to make sense now, but as you
    look at different pieces, you might want to refer back to this diagram to cement
    your understanding of how they fit together.


    There are five key concepts to focus on here. As you proceed through this chapter,
    make sure you understand each of the following:


    *   Data Model

    *   Persistent Store

    *   Persistent Store Coordinator

    *   Managed Object and Managed Object Context

    *   Fetch Request


    Once again, don’t let the names throw you. Follow along and you’ll see how all
    these pieces fit together.


    ![9781430238072_Fig02-07.jpg](images/9781430238072_Fig02-07.jpg)


    [Figure 2-7.](#9781430238072_Ch02.xhtml#_Fig7)  The Core Data architecture


    The Data Model


    What is a data model? In an abstract sense, it’s an attempt to define the organization
    of data and the relationship between the organized data components. In Core Data,
    the data model defines the data structure of objects, the organization of those
    objects, the relationships between those objects, and the behavior of those objects.
    Xcode allows you, via the model editor and inspector, to specify your data model
    for use in your application.'
  trans: '

    Core Data 的历史相当悠久，但它是在 iPhone SDK 3.0 发布时才在 iOS 上可用的。Core Data 最初随 Mac OS X 10.4
    (Tiger) 一同推出，但其部分底层机制实际上可以追溯到大约 15 年前的 NeXT 框架，即企业对象框架 (EOF)，该框架是 NeXT 的 WebObjects
    Web 应用服务器附带的工具集的一部分。


    EOF 专为与远程数据源配合使用而设计，在它刚推出时是一个相当革命性的工具。尽管现在几乎所有语言都有许多优秀的 ORM（对象关系映射）工具，但在 WebObjects
    诞生初期，大多数 Web 应用仍使用手工编写的 SQL 或文件系统调用来持久化数据。当时，编写 Web 应用极其耗时费力。WebObjects 部分归功于
    EOF，将创建复杂 Web 应用所需的开发时间缩短了一个数量级。


    除了作为 WebObjects 的一部分外，EOF 还被 NeXTSTEP 使用，NeXTSTEP 是 Cocoa 的前身。当苹果收购 NeXT 时，苹果的开发人员借鉴了
    EOF 中的许多概念来开发 Core Data。Core Data 为桌面应用程序实现了 EOF 曾经为 Web 应用程序所做的事：通过消除编写文件系统代码或与嵌入式数据库交互的需要，极大地提高了开发人员的生产力。


    让我们开始构建你的 Core Data 应用程序吧。


    ## 创建 Core Data 应用程序


    启动 Xcode 并创建一个新的 Xcode 项目。有多种方法可以做到这一点。当你启动 Xcode 时，可能会看到 Xcode 启动窗口（图 2-1）。你可以直接点击“Create
    a New Xcode Project”区域。或者选择 **File ![image](img/arrow.jpg) New ![image](img/arrow.jpg)
    Project**。或者使用键盘快捷键 ![image](img/flower.jpg)N。选择你最喜欢的方式。在后续内容中，我们会在 Xcode 窗口或菜单选项中提及可用选项，但不会使用键盘快捷键。如果你熟悉并喜欢使用键盘快捷键，可以随意使用。让我们回到构建应用程序的正题。


    ![9781430238072_Fig02-01.jpg](img/9781430238072_Fig02-01.jpg)


    图 2-1. Xcode 启动窗口


    Xcode 将打开一个项目工作区并显示项目模板表（图 2-2）。左侧是可能的模板标题：iOS 和 OS X。每个标题都有一组模板组。选择 iOS 标题下的
    Application 模板组，然后在右侧选择 Master-Detail Application 模板。在右下角，有该模板的简短描述。点击 Next 按钮进入下一个表。


    ![9781430238072_Fig02-02.jpg](img/9781430238072_Fig02-02.jpg)


    图 2-2. 项目模板表


    下一个表是项目配置表（图 2-3）。系统会要求你提供一个产品名称；请使用名称 `CoreDataApp`。组织名称 (Organization Name)
    和公司标识符 (Company Identifier) 字段将由 Xcode 自动设置；默认情况下，它们会显示为 `MyCompanyName` 和 `com.mycompanyname`。你可以将它们更改为任何你喜欢的值，但对于公司标识符，Apple
    建议使用反向域名风格（例如 `com.apporchard`）。


    ![9781430238072_Fig02-03.jpg](img/9781430238072_Fig02-03.jpg)


    图 2-3. 项目配置表


    请注意，包标识符 (Bundle Identifier) 字段不可编辑；它由公司标识符和产品名称字段的值填充。类前缀 (Class Prefix) 字段是一个选项，用于在项目的所有类之前添加一个前缀（例如
    `NS`）。你可以将此字段留空。


    设备 (Devices) 下拉字段列出了该项目的可能目标设备：iPad、iPhone 或 Universal。前两者不言自明。“Universal”适用于既能在
    iPad 又能在 iPhone 上运行的应用程序。拥有一个同时支持 iPad 和 iPhone 的单个项目既有好处也有坏处。但就本书而言，你将坚持使用 iPhone。由于你将使用故事板
    (storyboards)，请确保选中“Use Storyboards”复选框。你显然想使用 Core Data，因此请勾选其复选框。最后，确保选中“Use
    Automatic Reference Counting”复选框。


    点击 *Next*，并选择一个位置来保存你的项目（图 2-4）。底部的复选框将设置你的项目以使用 Git ([www.git-scm.com](http://www.git-scm.com))，这是一个免费的、开源的版本控制系统。使用它很有用，因此你可以保持选中状态。我们不会讨论它，但如果你不熟悉版本控制或
    git，我们建议你去熟悉它们。点击 Create。Xcode 应该会创建你的项目，项目看起来应该像图 2-5 所示。


    ![9781430238072_Fig02-04.jpg](img/9781430238072_Fig02-04.jpg)


    图 2-4. 选择一个位置来放置你的项目


    ![9781430238072_Fig02-05.jpg](img/9781430238072_Fig02-05.jpg)


    图 2-5. 瞧，你的项目准备好了！


    构建并运行应用程序。要么按下工具栏上的 Run 按钮，或者选择 **Product ![image](img/arrow.jpg) Run**。模拟器应该会启动。按下右上角的
    Add (`+`) 按钮。表格中会插入一个新行，显示按下 Add 按钮的精确日期和时间（图 2-6）。你也可以使用 Edit 按钮删除行。很酷，对吧？


    ![9781430238072_Fig02-06.jpg](img/9781430238072_Fig02-06.jpg)


    图 2-6. CoreDataApp 运行中


    在这个简单应用的底层，发生了很多事情。想想看：无需添加任何类，也无需编写任何将数据持久化到文件或与数据库交互的代码，按下 Add 按钮就创建了一个对象，用数据填充了它，并将其保存到为你自动创建的
    SQLite 数据库中。这里面有很多免费的功能。


    现在你已经看到了一个应用程序的运行，让我们看看幕后发生了什么。


    ## Core Data 概念与术语


    像大多数复杂技术一样，Core Data 有自己的一套术语，这可能会让新手感到有些困惑。让我们揭开神秘面纱，让你掌握 Core Data 的术语。


    图 2-7 展示了一个简化的 Core Data 架构高层示意图。现在不要指望能完全理解它，但在你查看不同部分时，你可能想回头参考此图，以巩固你对它们如何结合在一起的理解。


    这里有五个关键概念需要关注。当你通读本章时，请确保理解以下每一个概念：


    *   数据模型 (Data Model)

    *   持久化存储 (Persistent Store)

    *   持久化存储协调器 (Persistent Store Coordinator)

    *   托管对象与托管对象上下文 (Managed Object and Managed Object Context)

    *   获取请求 (Fetch Request)


    再说一次，不要让这些名称吓到你。继续往下看，你会看到所有这些部分是如何组合在一起的。


    ![9781430238072_Fig02-07.jpg](img/9781430238072_Fig02-07.jpg)


    图 2-7. Core Data 架构


    ### 数据模型


    什么是数据模型？从抽象意义上讲，它是定义数据组织方式以及组织好的数据组件之间关系的一种尝试。在 Core Data 中，数据模型定义了对象的数据结构、这些对象的组织方式、这些对象之间的关系以及这些对象的行为。通过模型编辑器和检查器，Xcode
    允许你指定在应用程序中使用的数据模型。

