    iOS 开发。他喜欢在业余时间与妻子艾莉森和儿子普雷斯顿在一起；有时他甚至会打打高尔夫。他在 `nickwaynik.com` 上写博客，你可以在 Twitter
    上通过 @n_dubbs 找到他。


    ## 致谢


    撰写这样一本书不仅仅是我们这些作者的努力。尽管封面印着我们的名字，但它是许多人辛勤工作的成果。


    首先，我要感谢戴夫·马克和杰夫·拉马什编写了本书的第一个版本，并为我提供了构建和扩展的坚实基础。


    我要感谢 Apress 的员工，他们确保这本书尽可能按计划完成。布里吉德·达菲提供了指导和监督，确保我完成了这本书。汤姆·威尔士确保我紧扣主题并保持内容清晰。玛丽·贝尔让手稿看起来美观。我还要感谢布兰登·勒维克，确保人们知道这本书即将出版。


    感谢技术审校尼克·韦尼克和马克·达林普尔，确保我编写的代码确实能工作。任何仍然存在的错误都是我的责任。


    感谢我在 AppOrchard 的朋友和同事，感谢他们过去几个月对我脾气暴躁行为的耐心，以及帮助我成功完成这个项目。


    特别感谢我的妻子安妮，确保我在本该看棒球或弹吉他时能专注于这本书。感谢我的猫 PK、曼尼和莉拉，在我需要休息时它们总想要食物。特别感谢曼尼，它是本书中许多示例的主角。


    最后，感谢你，读者，购买这本书。我们倾向于将编程视为一门科学学科，但有时它更像是一门黑魔法。如果这本书能帮助你在理解 iOS 编程的旅程中前进，那么一切都是值得的。


    # 第 1 章：我们又出发了


    所以，你还在创建 iPhone 应用，是吗？太棒了！iOS 和 App Store 取得了巨大的成功，从根本上改变了移动应用程序的交付方式，并彻底改变了人们对移动设备的期望。自
    2008 年 3 月 iOS 软件开发工具包 (SDK) 首次发布以来，Apple 一直在忙于添加新功能并改进已有的功能。这个平台和它刚推出时一样令人兴奋。事实上，从很多方面来看，它更令人兴奋了，因为
    Apple 不断扩展可供像我们这样的第三方开发者使用的功能数量。


    自本书上一版 *More iPhone 3 Development*（Apress 2010）出版以来，Apple 发布了许多框架、工具和服务。这些包括但不限于：


    *   **核心框架**：Core Motion、Core Telephony、Core Media、Core View、Core MIDI、Core Image
    和 Core Bluetooth

    *   **实用框架**：Event Kit、Quick Look Framework、Assets Library、Image I/O、Printing、AirPlay、Accounts
    and Social Frameworks、Pass Kit

    *   **服务及其框架**：iAds、Game Center、iCloud、Newsstand

    *   **面向开发者的增强功能**：Blocks、Grand Central Dispatch（GCD）、Weak Linking Support、Automatic
    Reference Counting（ARC）、Storyboards、Collection Views、UI State Preservation、Auto
    Layout、UIAutomation


    以及更多……


    显然，变化太多，无法在一本书中完全涵盖。但我们会尽力让你熟悉那些你最可能需要了解的内容。


    ## 本书的内容


    本书是一本指南，旨在帮助您继续在创建更优秀 iOS 应用的道路上前行。在 *Beginning iOS 6 Development*（Apress, 2012）中，目标是帮助你跨越最初的学习曲线，并掌握构建第一个
    iOS 应用程序的基础知识。在本书中，我们假设你已经掌握了基础知识。因此，除了向你展示如何使用几个新的 iOS API 之外，我们还将穿插介绍一些更高级的技巧，随着你的
    iOS 开发工作规模和复杂性的增长，这些技巧将是必需的。

