    ![image](img/9781430238072_unFM-02.jpg)


    **杰夫·拉马什** 是一位拥有超过 20 年编程经验的 Mac 和 iOS 开发者。杰夫撰写了许多 iOS 和 Mac 开发书籍，包括 *Beginning
    iPhone 4 Development*（Apress, 2011）、*More iPhone 3 Development*（Apress, 2010）和
    *Learn Cocoa on the Mac*（Apress, 2010）。杰夫是 MartianCraft（一家 iOS 和 Android 开发公司）的负责人之一。他曾为
    *MacTech Magazine* 撰写关于 Cocoa 和 Objective-C 的文章，也为 Apple 的开发者网站撰写文章。杰夫还在他的广受阅读的博客
    `www.iphonedevelopment.blogspot.com` 上撰写关于 iOS 开发的文章。


    ![image](img/9781430238072_unFM-03.jpg)


    **凯文·金** 是 AppOrchard LLC 的联合创始人兼开发者，该公司是 Tipping Point Partners 旗下专注于可持续 iOS
    开发的企业。他毕业于卡内基梅隆大学，最初在匹兹堡超级计算中心担任程序员时接触到了 NeXTStep 计算机（今天 iPhone 的前身），并从此深陷其中。他的职业生涯横跨金融、政府、生物技术和科技领域，包括在
    Apple 担任纽约都会区 Apple 企业服务团队经理。凯文还是 *Pro iOS 5 Tools*（Apress, 2011）的合著者。他目前与妻子和一窝收留的猫居住在纽约市的字母城区域。


