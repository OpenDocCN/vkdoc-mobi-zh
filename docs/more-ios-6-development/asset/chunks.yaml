  raw: 'Once the fetch request is defined appropriately, the fetched results controller
    is created. The fetched results controller is an instance of the class NSFetchedResultsController.
    Remember that the fetched results controller’s job is to use the fetch request
    to keep its associated data as fresh as possible.


    Once the fetched results controller is created, you do your initial fetch. You
    do this in MasterViewController.m at the end of fetchedResultsController by sending
    your fetched results controller the PerformFetch message.


    Now that you have your data, you’re ready to be a data source and a delegate to
    your table view. When your table view wants the number of sections for its table,
    it will call numberOfSectionsInTableView:. In your version, you get the section
    information by passing the appropriate message to fetchResultsController. Here’s
    the version from MasterViewController.m:


    ```

    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    {

        return [[self.fetchedResultsController sections] count];

    }

    ```


    The same strategy applies in tableView:numberOfRowsInSection:


    ```

    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    {

        id <NSFetchedResultsSectionInfo> sectionInfo =         [self.fetchedResultsController
    sections] objectAtIndex:section];

        return [sectionInfo numberOfObjects];

    }

    ```


    You get the idea. You used to need to do all this work yourself. Now you can ask
    your fetched results controller to do all the data management for you. It’s an
    amazing time-saver!


    Let’s take a closer look at the creation of the fetched results controller. In
    MasterViewController.m, use the function menu to go to the method -fetchedResultsController.
    It should look like this:


    ```

    - (NSFetchedResultsController *)fetchedResultsController

    {

        if (_fetchedResultsController != nil) {

            return _fetchedResultsController;

        }

        NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

        // Edit the entity name as appropriate.

        NSEntityDescription *entity = [NSEntityDescription entityForName:@"Event"

                            inManagedObjectContext:self.managedObjectContext];

        [fetchRequest setEntity:entity];

        // Set the batch size to a suitable number.

        [fetchRequest setFetchBatchSize:20];

        // Edit the sort key as appropriate.

        NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"timeStamp"

                                                                    ascending:NO];

        NSArray *sortDescriptors = @[sortDescriptor];

        [fetchRequest setSortDescriptors:sortDescriptors];

        // Edit the section name key path and cache name if appropriate.

        // nil for section name key path means "no sections".

        NSFetchedResultsController *aFetchedResultsController = [[NSFetchedResultsController
    alloc]

                       initWithFetchRequest:fetchRequest

                       managedObjectContext:self.managedObjectContext

                       sectionNameKeyPath:nil cacheName:@"Master"];

        aFetchedResultsController.delegate = self;

        self.fetchedResultsController = aFetchedResultsController;

     NSError *error = nil;

     if (![self.fetchedResultsController performFetch:&error]) {

          // Replace this implementation with code to handle the error appropriately.

          // abort() causes the application to generate a crash log and terminate.
    You should

                 // not use this function in a shipping application, although it may
    be useful during

                 // development.

         NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

         abort();

     }

        return _fetchedResultsController;

    }

    ```


    As discussed earlier, this method uses lazy loading. The first thing it does is
    check _fetchedResultsController for nil. If _fetchedResultsController already
    exists, it is returned; otherwise, the process of creating a new fetchedResultsController
    is started.


    As the first step, you need to create an NSFetchRequest and NSEntityDescription,
    and then attach the NSEntityDescription to the NSFetchRequest.


    ```

    NSFetchRequest *fetchRequest = [[NSFetchRequest alloc] init];

    // Edit the entity name as appropriate.

    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Event"                                          inManagedObjectContext:self.managedObjectContext];

    [fetchRequest setEntity:entity];

    ```


    Remember, you’re building a fetched results controller, and the fetch request
    is part of that. Next, set the batch size to 20\. This tells Core Data that this
    fetch request should retrieve its results 20 at a time. This is sort of like a
    file system’s block size.


    ```

    // Set the batch size to a suitable number.

    [fetchRequest setFetchBatchSize:20];

    ```


    Next, build an NSSortDescriptor and specify that it use timeStamp as a key, sorting
    the timestamps in descending order (earlier dates last).


    ```

    // Edit the sort key as appropriate.

    NSSortDescriptor *sortDescriptor = [[NSSortDescriptor alloc] initWithKey:@"timeStamp"
    ascending:NO];

    ```


    Now you create an array of sort descriptors. Since you’ll be using only one, you
    pass in sortDescriptor and follow it with nil to let initWithObjects know you
    just have a single element in the array. (Note that the template could have used
    initWithObject instead).


    ```

    NSArray *sortDescriptors = @[sortDescriptor];

    [fetchRequest setSortDescriptors:sortDescriptors];

    ```


    Try this experiment: change ascending:NO to ascending:YES and run the application
    again. What do you think will happen? Don’t forget to change it back when you
    are finished.


    **Tip**  If you need to restrict a fetch request to a subset of the managed objects
    stored in the persistent store, use a predicate. There’s an entire chapter dedicated
    to predicates in *Learn Objective-C on the Mac, 2*^(*nd*) *Edition* by Mark Dalrymple,
    Scott Knaster, and Waqar Malik (Apress, 2012). The default template does not use
    predicates, but you’ll be working with them in the next several chapters.


    Now you create an NSFetchedResultsController using your fetch request and context.
    You’ll learn about the third and fourth parameters, sectionNameKeyPath and cacheName,
    in [Chapter 3](#9781430238072_Ch03.xhtml).


    ```

    // Edit the section name key path and cache name if appropriate.

    // nil for section name key path means "no sections".

    NSFetchedResultsController *aFetchedResultsController =     [[NSFetchedResultsController
    alloc] initWithFetchRequest:fetchRequest                                        
    managedObjectContext:self.managedObjectContext                                          
    sectionNameKeyPath:nil                                                    cacheName:@"Master"];

    ```


    Next, you set self as the delegate and set fetchedResultsController to the fetched
    results controller you just created.


    ```

    aFetchedResultsController.delegate = self;

    self.fetchedResultsController = aFetchedResultsController;

    ```


    Finally, you perform the fetch and, if there are no errors, you assign the results
    to your private instance variable _fetchedResultsController and return the results.


    ```

    NSError *error = nil;

    if (![self.fetchedResultsController performFetch:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this

        // function in a shipping application, although it may be useful during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

    }

    return _fetchedResultsController;

    ```


    Don’t worry too much about the details here. Try to get your head around the big
    picture. As you make your way through the next few chapters, the details will
    come into focus.


