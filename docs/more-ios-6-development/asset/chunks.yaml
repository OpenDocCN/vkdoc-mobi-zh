    \ =         \n    [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber\
    \                                   \n    forProperty:MPMediaItemPropertyMediaType];\n\
    \    [query addFilterPredicate:predicate];\n    self.mediaItems = [query items];\n\
    }\n```\n\n您已经定义了 `MediaViewController` 类。现在创建您的音频和视频子类。创建一个新的 Objective-C 类，命名为\
    \ `AudioViewController`，它将作为 `MediaViewController` 的子类。重复此过程，这次将文件命名为 `VideoViewController`。您只需要对每个文件进行两处小的调整。首先，打开\
    \ `AudioViewController.m`，并在 `viewDidLoad` 方法中，在调用 `super` 之后添加以下行：\n\n```\n[self\
    \ loadMediaItemsForMediaType:MPMediaTypeMusic];\n```\n\n对 `VideoViewController.m`\
    \ 执行相同操作，但这次您需要加载视频。\n\n```\n[self loadMediaItemsForMediaType:MPMediaTypeAnyVideo];\n\
    ```\n\n让您的应用使用这些新的视图控制器。选择 `MainStoryboard.storyboard` 打开故事板编辑器。选择顶部表视图控制器。在身份检查器中，将“自定义类”从\
    \ `UITableViewController` 更改为 `AudioViewController`。将底部表视图控制器类更改为 `VideoViewController`。\n\
    \n在继续之前，为每个视图控制器更新标签。选择音频视图控制器中的标签栏。在属性检查器中，将“标题”设置为 `Music`，并将“图像”设置为 `music.png`。您可以在本章的下载文件夹中找到图像文件\
    \ `music.png` 和 `video.png`。选择视频视图控制器中的标签栏，将其标题设置为 `Video`，并将其图像设置为 `video.png`。\n\
    \n构建并运行您的应用。选择“音乐”标签时，您应该看到媒体库中的所有音乐，选择“视频”标签时，您应该看到媒体库中的所有视频。太好了！现在您需要支持播放。您将使用\
    \ `MPMoviePlayerViewController` 来播放视频，但与 `SimplePlayer` 一样，您需要创建一个音频播放视图控制器。您将制作一个更简单的音频播放控制器版本。创建一个新的\
    \ Objective-C 文件，命名为 `PlayerViewController`，它将作为 `UIViewController` 的子类。\n"
- fmt: "选择`MainStoryboard.storyboard`，以便在`PlayerViewController`场景中工作。将一个`UIViewController`拖放到音频视图控制器的右侧。选中新的视图控制器，打开身份检查器（Identity\
    \ Inspector），将其类从`UIViewController`更改为`PlayerViewController`。从音频视图控制器中的表格视图单元格（`UITableViewCell`）按住Control键拖拽到`UIViewController`，并选择模态手动转场（Modal\
    \ Manual Segue）。选中`AudioViewController`与`PlayerViewController`之间的转场，在属性检查器（Attributes\
    \ Inspector）中将其命名为`PlayerSegue`。\n\n完成后的音频播放视图控制器将如图[Figure 12-12](#9781430238072_Ch12.xhtml#Fig12)所示。从顶部开始，添加两个`UILabel`。将它们拉伸至视图宽度。与在`SimplePlayer`中一样，将标签扩展到视图宽度并调整其属性（System\
    \ Bold 17.0字体、居中对齐、白色前景色、黑色背景色）。将顶部标签的文本设置为`Artist`，底部标签的文本设置为`Song`。\n\n![9781430238072_Fig12-12.jpg](images/9781430238072_Fig12-12.jpg)\n\
    \n[Figure 12-12.](#9781430238072_Ch12.xhtml#_Fig12)  MPMediaPlayer音频播放视图控制器\n\n\
    将一个`UIImageView`拖入场景中，位于`Song`标签下方。使用蓝色的辅助线合理调整间距。调整图像视图的大小以适应视图宽度，并使其为正方形（320像素×320像素）。在图像视图正下方，拖入一个`UISlider`。使用蓝色边距辅助线调整滑块宽度。最后，将一个`UIToolbar`拖放到`PlayerViewController`视图的底部。选中工具栏左侧的`UIBarButtonItem`。使用属性检查器，将标识符（Identifier）从`Custom`更改为`Done`。在`Done`按钮右侧拖入一个弹性空间栏按钮项（Flexible\
    \ Space Bar Button Item）。接着，在弹性空间项右侧添加一个`UIBarButtonItem`。选中新的栏按钮项，在属性检查器中将其标识符更改为`Play`。最后，为了让播放按钮居中，在`Play`按钮右侧再添加一个弹性空间栏按钮项。\n\
    \n与在`SimplePlayer`中的操作一样，需要为`PlayerViewController`创建一些输出口（Outlet）和操作（Action）。进入助理编辑器模式（Assistant\
    \ Editor mode）。从`Artist`标签按住Control键拖拽到`PlayerViewController`的实现文件中，创建一个名为`artist`的输出口。对`Song`标签执行相同操作，将其命名为`song`。为图像视图、滑块、工具栏和播放按钮创建输出口。除滑块外，输出口的名称应显而易见（例如图像视图对应`imageView`）。滑块对应的输出口将命名为`volume`，因为将使用该滑块控制音量级别。\n\
    \n需要定义三个操作。从音量滑块按住Control键拖拽，为值更改事件（Value Changed）创建一个名为`volumeChanged:`的操作。从`Done`按钮拖拽创建一个`donePressed:`操作。从`Play`按钮拖拽创建一个`playPausePressed:`操作。将编辑器切换回标准模式（Standard\
    \ mode），并选择`PlayerViewController.h`。\n\n首先，需要导入`MediaPlayer`头文件。在`UIKit`头文件导入之后添加导入声明。\n\
    \n```\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n正如在`SimplePlayer`中所做的那样，需要将`play`属性输出口从`weak`重新定义为`strong`。同时声明`pause`（按钮）属性。\n\
    \n```\n@property (strong, nonatomic) IBOutlet UIBarButtonItem *play;\n@property\
    \ (strong, nonatomic)          UIBarButtonItem *pause;\n```\n\n需要再添加两个属性：一个用于持有`MPMusicPlayerController`实例，另一个用于持有当前正在播放的`MPMediaItem`。\n\
    \n```\n@property (strong, nonatomic) MPMusicPlayerController *player;\n@property\
    \ (strong, nonatomic) MPMediaItem *mediaItem;\n```\n\n需要了解播放器状态何时改变以及播放器媒体项何时改变。请记住，这些通过通知（Notifications）处理。将声明一些方法来注册通知中心（Notification\
    \ Center）。\n\n```\n- (void)playingItemChanged:(NSNotification *)notification;\n\
    - (void)playbackStateChanged:(NSNotification *)notification;\n```\n\n接下来转到`PlayerViewController.m`并实现相关代码。由于暂停按钮不属于故事板场景，需要手动创建它。找到`viewDidLoad`方法，在调用`[super\
    \ viewDidLoad]`之后创建它。\n\n```\nself.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
    \ target:self action:@selector(playPausePressed:)];\n[self.pause setStyle:UIBarButtonItemStyleBordered];\n\
    ```\n\n需要一个`MPMusicPlayerController`实例来播放音乐。\n\n```\nself.player = [MPMusicPlayerController\
    \ applicationMusicPlayer];\n```\n\n希望观察播放器的通知，因此注册这些通知并要求播放器开始生成通知。\n\n```\nNSNotificationCenter\
    \ *notificationCenter = [NSNotificationCenter defaultCenter];\n[notificationCenter\
    \ addObserver:self\n                       selector:@selector(playingItemChanged:)\n\
    \                           name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n\
    \                         object:self.player];\n[notificationCenter addObserver:self\n\
    \                       selector:@selector(playbackStateChanged:)\n          \
    \                 name:MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \                         object:self.player];\n[self.player beginGeneratingPlaybackNotifications];\n\
    ```\n\n需要将媒体项传递给播放器。但播放器接受`MPMediaItemCollection`，而不是单个`MPMediaItem`。将在`viewDidAppear:`方法中完成此赋值操作，在该方法中创建一个集合并传递给播放器。\n\
    \n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
    \    MPMediaItemCollection *collection =\n    [[MPMediaItemCollection alloc] initWithItems:@[self.mediaItem]];\n\
    \    [self.player setQueueWithItemCollection:collection];\n    [self.player play];\n\
    }\n```\n\n当`PlayerViewController`被释放时，需要停止生成通知并取消注册观察者。找到`didReceiveMemoryWarning`方法，并添加以下调用：\n\
    \n```\n[self.player endGeneratingPlaybackNotifications];\n[[NSNotificationCenter\
    \ defaultCenter]\n  removeObserver:self\n  name:MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
    \  object:self.player];\n[[NSNotificationCenter defaultCenter]\n  removeObserver:self\n\
    \  name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n  object:self.player];\n\
    ```\n\n`volumeChanged:`方法只需更改播放器音量以反映音量滑块的值。\n\n```\n- (IBAction)volumeChanged:(id)sender\n\
    {\n    self.player.volume = [self.volume value];\n}\n```\n\n`donePressed:`方法停止播放并关闭`PlayerViewController`。\n\
    \n```\n- (IBAction)donePressed:(id)sender\n{\n    [self.player stop];\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n`playPausePressed:`方法与`SimplePlayer`中的类似。不在工具栏中更新播放/暂停按钮；这将在`playbackStateChanged:`方法中处理。\n\
    \n```\n- (IBAction)playPausePressed:(id)sender\n{\n    MPMusicPlaybackState playbackState\
    \ = [self.player playbackState];\n    if (playbackState == MPMusicPlaybackStateStopped\
    \ || playbackState == MPMusicPlaybackStatePaused) {\n        [self.player play];\n\
    \    } else if (playbackState == MPMusicPlaybackStatePlaying) {\n        [self.player\
    \ pause];\n    }\n}\n```\n\n实现通知观察者方法非常直接。当播放器媒体项改变时更新视图。同样，这与`SimplePlayer`中的相同方法类似。"
  raw: "Select the MainStoryboard.storyboard so you can work on the PlayerViewController\
    \ scene. Drag a UIViewController to the right of the audio view controller. Select\
    \ the new view controller, and open the Identity Inspector. Change its class from\
    \ UIViewController to PlayerViewController. Control-drag from the table view cell\
    \ in the audio view controller to the UIViewController and select the modal Manual\
    \ Segue. Select the segue between AudioViewController and PlayerViewController,\
    \ and name it “PlayerSegue” in the Attributes Inspector.\n\nYour audio playback\
    \ view controller will look like [Figure 12-12](#9781430238072_Ch12.xhtml#Fig12)\
    \ when you’re done. Starting at the top, add two UILabels. Stretch them to width\
    \ of the view. Like you did with the SimplePlayer, extend the labels to the width\
    \ of the view and adjust their attributes (System Bold 17.0 font, center alignment,\
    \ white foreground color, black background color). Set the top label text to “Artist”\
    \ and the bottom label text to “Song.”\n\n![9781430238072_Fig12-12.jpg](images/9781430238072_Fig12-12.jpg)\n\
    \n[Figure 12-12.](#9781430238072_Ch12.xhtml#_Fig12)  MPMediaPlayer audio playback\
    \ view controller\n\nDrag a UIImageView into the scene, just below the Song label.\
    \ Use the blue guide lines to space it properly. Adjust the size of the image\
    \ view to fit the width of the view, and make it square (320px by 320px). Just\
    \ below the image view, drag a UISlider. Adjust the width of the slider, using\
    \ the blue margin guidelines. Finally, drag a UIToolbar to the bottom of the PlayerViewController\
    \ view. Select the UIBarButtonItem on the left side of the toolbar. Using the\
    \ Attribute Inspector, change the Identifier from Custom to Done. Drag a flexible\
    \ space bar button Item to the right of the Done button. Next, add a UIBarButtonItem\
    \ to the right of the flexible space item. Select the new bar button item and\
    \ change its Identifier to Play in the Attributes Inspector. Finally, to center\
    \ your Play button, add another flexible space bar button item to the right of\
    \ the Play button.\n\nJust as you did with SimplePlayer, you need to create some\
    \ outlets and actions for your PlayerViewController. Enter Assistant Editor mode.\
    \ Control-drag from the Artist label to the PlayerViewController implementation,\
    \ and create an outlet named “artist.” Do the same for the Song label and name\
    \ it song. Create outlets for the Image View, the slider, the toolbar and the\
    \ Play button. The names of the outlets should be obvious (i.e. imageView for\
    \ the Image View), except for the slider. You’ll name the outlet “volume,” since\
    \ you’re going to use the slider to control the volume level.\n\nYou need to define\
    \ three actions. Control-drag from the volume slider, and create an action named\
    \ volumeChanged: for the Value Changed event. Control-drag from the Done button\
    \ to create a donePressed: action. Control-drag from the Play button to create\
    \ a playPausePressed: event. Put the Editor back into Standard mode, and select\
    \ PlayerViewController.h.\n\nFirst, you need to import the MediaPlayer header\
    \ file. You add the import declaration after the UIKIt header import.\n\n```\n\
    #import <MediaPlayer/MediaPlayer.h>\n```\n\nAs you did with the SimplePlayer,\
    \ you need to redefine the play property outlet from weak to strong. You also\
    \ declare your pause (button) property.\n\n```\n@property (strong, nonatomic)\
    \ IBOutlet UIBarButtonItem *play;\n@property (strong, nonatomic)          UIBarButtonItem\
    \ *pause;\n```\n\nYou need to add two more properties: one to hold the MPMusicPlayerController\
    \ and one to hold the MPMediaItem that is being played.\n\n```\n@property (strong,\
    \ nonatomic) MPMusicPlayerController *player;\n@property (strong, nonatomic) MPMediaItem\
    \ *mediaItem;\n```\n\nYou need to know when the player state has changed and when\
    \ the player media item has changed. Remember, these are handled via notifications.\
    \ You’ll declare some methods to register with the Notification Center.\n\n```\n\
    - (void)playingItemChanged:(NSNotification *)notification;\n- (void)playbackStateChanged:(NSNotification\
    \ *)notification;\n```\n\nLet’s move over to PlayerViewController.m and work on\
    \ the implementation. You need to create your Pause button since it’s not part\
    \ of your storyboard scene. Find the viewDidLoad method, and create it after the\
    \ call to super.\n\n```\nself.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
    \ target:self action:@selector(playPausePressed:)];\n[self.pause setStyle:UIBarButtonItemStyleBordered];\n\
    ```\n\nYou need a MPMusicPlayerController instance to play your music.\n\n```\n\
    self.player = [MPMusicPlayerController applicationMusicPlayer];\n```\n\nYou want\
    \ to observe the player notifications, so you register for those and ask the player\
    \ to start generating them.\n\n```\nNSNotificationCenter *notificationCenter =\
    \ [NSNotificationCenter defaultCenter];\n[notificationCenter addObserver:self\n\
                           selector:@selector(playingItemChanged:)\n                          \
    \ name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n                        \
    \ object:self.player];\n[notificationCenter addObserver:self\n                      \
    \ selector:@selector(playbackStateChanged:)\n                           name:MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
                             object:self.player];\n[self.player beginGeneratingPlaybackNotifications];\n\
    ```\n\nYou need to pass your media item to the player. But the player takes MPMediaItemCollections,\
    \ not individual an MPMediaItem. You’ll do this assignment in the viewDidAppear:\
    \ method where you’ll create a collection and pass it to your player.\n\n```\n\
    - (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
        MPMediaItemCollection *collection =         \n   [[MPMediaItemCollection alloc]\
    \ initWithItems:@[self.mediaItem]];\n    [self.player setQueueWithItemCollection:collection];\n\
        [self.player play];\n}\n```\n\nYou need to stop generating notifications and\
    \ unregister your observers when the PlayerViewController is released. Find the\
    \ didGenerateMemoryWarning method, and add the following calls:\n\n```\n[self.player\
    \ endGeneratingPlaybackNotifications];\n[[NSNotificationCenter defaultCenter]    \
    \ \n  removeObserver:self               \n  name:MPMusicPlayerControllerPlaybackStateDidChangeNotification            \
    \ \n  object:self.player];\n[[NSNotificationCenter defaultCenter]     \n  removeObserver:self              \
    \ \n  name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification            \
    \ \n  object:self.player];\n```\n\nThe volumeChanged: method simply needs to change\
    \ the player volume to reflect the value of the volume slider.\n\n```\n- (IBAction)volumeChanged:(id)sender\n\
    {\n    self.player.volume = [self.volume value];\n}\n```\n\nThe donePressed: method\
    \ stops the player and dismisses the PlayerViewController.\n\n```\n- (IBAction)donePressed:(id)sender\n\
    {\n    [self.player stop];\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\nYour playPausePressed: method is similar to the one in SimplePlayer.\
    \ You don’t update the Play/Pause button in the toolbar; you’ll handle that in\
    \ the playbackStateChanged: method.\n\n```\n- (IBAction)playPausePressed:(id)sender\n\
    {\n    MPMusicPlaybackState playbackState = [self.player playbackState];\n    if\
    \ (playbackState == MPMusicPlaybackStateStopped || playbackState == MPMusicPlaybackStatePaused)\
    \ {\n        [self.player play];\n    }\n```\n\nelse if (playbackState == MPMusicPlaybackStatePlaying)\
    \ {\n\n```\n        [self.player pause];\n    }\n}\n```\n\nImplementing your notification\
    \ observer methods is pretty straightforward. You update the view when the player\
    \ media item changes. Again, it’s similar to the same method in SimplePlayer."
  trans: "\n选择`MainStoryboard.storyboard`，以便在`PlayerViewController`场景中工作。将一个`UIViewController`拖放到音频视图控制器的右侧。选中新的视图控制器，打开身份检查器（Identity\
