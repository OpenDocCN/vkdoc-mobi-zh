    - (void)mediaPickerDidCancel:(MPMediaPickerController *) mediaPicker

    {

        [mediaPicker dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    When the user is done selecting, you dismiss the media picker controller. Then
    you look at the media collection property. If your ViewController collection property
    is nil, then you simply assign it to the media collection sent in the delegate
    call. If a collection exists, then you need to append the new media items to the
    existing collection. The mediaPickerDidCancel: method simply dismissed the media
    picker controller.


    Lastly, you need to implement the notification method for when the now playing
    item changes.


    ```

