    ### 多属性验证\n\n当你需要基于多个字段的值来验证一个托管对象时，方法略有不同。在所有单字段验证方法触发之后，会调用另一个方法来让你执行更复杂的验证。实际上有两个这样的方法：一个在对象首次插入上下文时调用，另一个在你保存对现有托管对象的更改时调用。\n"
- fmt: "# Core Data Validation and Virtual Accessors\n\n## Multiple-Attribute Validation\
    \ Methods\n\nWhen inserting a new managed object into a context, the multiple-attribute\
    \ method you use is called `validateForInsert:`. When updating an existing object,\
    \ the validation method you implement is called `validateForUpdate:`. In both\
    \ cases, you return `YES` if the object passes validation and `NO` if there’s\
    \ a problem. As with single-field validation, if you return `NO`, you should also\
    \ create an `NSError` instance that identifies the specifics of the problem encountered.\n\
    \nIn many instances, the validation you want to do at insert and at update are\
    \ identical. In those cases, do not copy the code from one and paste it into the\
    \ other. Instead, create a new validation method and have both `validateForInsert:`\
    \ and `validateForUpdate:` call that new validation method.\n\nIn your application,\
    \ you don’t have a need for any multiple-attribute validations (yet!), but let’s\
    \ say, hypothetically, that instead of making both `name` and `secretIdentity`\
    \ required, you only wanted to require one of the two. You could accomplish that\
    \ by making both `name` and `secretIdentity` optional in the data model, then\
    \ using the multiple-attribute validation methods to enforce it. To do that, you\
    \ would add the following three methods to your `Hero` class:\n\n```\n- (BOOL)validateNameOrSecretIdentity:(NSError\
    \ **)outError\n{\n    if ((0 == [self.name length]) && (0 == [self.secretIdentity\
    \ length])) {\n        if (outError != NULL) {\n            NSString *errorStr\
    \ = NSLocalizedString(@\"Must provide name or secret identity.\",\n          \
    \                                         @\"Must provide name or secret identity.\"\
    );\n            NSDictionary *userInfoDict =                 [NSDictionary dictionaryWithObject:errorStr\n\
    \                                                    forKey:NSLocalizedDescriptionKey];\n\
    \            NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
    \                                                        code:kHeroValidationNameOrSecretIdentityCode\n\
    \                                                    userInfo:userInfoDict];\n\
    \            *outError = error;\n        }\n    }\n    return YES;\n}\n\n- (BOOL)validateForInsert:(NSError\
    \ **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n}\n\
    \n- (BOOL)validateForUpdate:(NSError **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n\
    }\n```\n\n## Virtual Accessors\n\nAt the beginning of the chapter, you added a\
    \ new attribute called `age` to your data model. You don’t need to store the hero’s\
    \ age, however, because you can calculate it based on the hero’s birthdate. Calculated\
    \ attributes like this are often referred to as **virtual accessors**. They look\
    \ like accessors, and as far as other objects are concerned, they can be treated\
    \ just like the other attributes. The fact that you’re calculating the value at\
    \ runtime rather than retrieving it from the persistent store is simply an implementation\
    \ detail.\n\nAs your `Hero` object stands right now, the `age` accessor will always\
    \ return `nil` because you’ve told your data model not to create storage space\
    \ for it in the persistent store and have made it read only. In order to make\
    \ it behave correctly, you must implement the logic to calculate age in a method\
    \ that looks like an accessor (hence, the name “virtual accessor”). To do that,\
    \ add the following method to `Hero.m`, just before `@end`:\n\n```\n- (NSNumber\
    \ *)age\n{\n    if (self.birthdate == nil)\n        return nil;\n\nNSCalendar\
    \ *gregorian = [[NSCalendar alloc] initWithCalendarIdentifier:NSGregorianCalendar];\n\
    \    NSDateComponents *components = [gregorian components:NSYearCalendarUnit\n\
    \                                                fromDate:self.birthdate\n   \
    \                                               toDate:[NSDate date]\n       \
    \                                          options:0];\n    NSInteger years =\
    \ [components year];\n    return [NSNumber numberWithInteger:years];\n}\n```\n\
    \nNote the check you put in the beginning in the method. If you haven’t set your\
    \ hero’s birthdate, you don’t want to calculate the age.\n\nNow any code that\
    \ uses the `age` property accessor will be returned an `NSNumber` instance with\
    \ the calculated age of the superhero.\n\n## Adding Validation Feedback\n\nIn\
    \ [Chapter 4](#9781430238072_Ch04.xhtml), you created a class named `SuperDBEditCell`\
    \ that encapsulates the common functionality shared by the various table view\
    \ cells. The `SuperDBEditCell` class does not include code designed to save the\
    \ managed object; it just concerns itself with the display. You did store the\
    \ attribute that each `SuperDBEditCell` instance displays. But now you want to\
    \ add validation feedback when the edited attribute fails validation, and you\
    \ don’t want to duplicate functionality across subclasses.\n\nWhat you want to\
    \ do is have each instance of `SuperDBEditCell` (or subclass) validate the attribute\
