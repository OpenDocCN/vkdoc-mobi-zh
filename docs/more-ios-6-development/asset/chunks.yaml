    AVFoundation


    The AVFoundation framework was originally introduced in iOS 3 with limited audio
    playback and recording functionality. iOS 4 expanded the framework to include
    video playback and recording, as well as the audio/video asset management.


    At the core, AVFoundation represents an audio or video file as an AVAsset. It’s
    important to understand that an AVAsset may have multiple tracks. For example,
    an audio AVAsset may have two tracks: one for the left channel and one for the
    right. A video AVAsset could have many more tracks; some for video, some for audio.
    Additionally, an AVAsset may encapsulate additional metadata about the media it
    represents. It’s important to note that simply instantiating an AVAsset does not
    mean it will be ready for playback. It may take some time for the to analyze the
    data the AVAsset represents.


    In order to give you fine grained control on how to playback an AVAsset, AVFoundation
    separates the presentation state of a media item from the AVAsset. This presentation
    state is represented by an AVPlayerItem. Each track within an AVPlayerItem is
    represented by an AVPlayerItemTrack. By using an AVPlayerItem and its AVPlayerItemTracks,
    you are allowed to determine how to present the item (i.e., mix the audio tracks
    or crop the video) via an AVPlayer object. If you wish to playback multiple AVPlayerItems,
    you use the AVPlayerQueue to schedule the playback of each AVPlayerItem.


    Beyond giving finer control over media playback, AVFoundation gives you the ability
    to create media. You can leverage the device hardware to create your new media
    assets. The hardware is represented by an AVCaptureDevice. Where possible, you
    can configure the AVCaptureDevice to enable specific device functionality or settings.
    For example, you can set the flashMode of the AVCaptureDevice that represents
    your iPhone’s camera to be on, off, or use auto sensing.


    In order to use the output from the AVCaptureDevice, you need to use an AVCaptureSession.
    AVCaptureSession coordinates the management data from an AVCaptureDevice to its
    output form. This output is represented by an AVCaptureOutput class.


    It’s a complicated process to create media data using AVFoundation. First, you
    need to create an AVCaptureSession to coordinate the capture and creation of your
    media. You define and configure your AVCaptureDevice, which represents the actual
    physical device (such as your iPhone camera or microphone). From the AVCaptureDevice,
    you create an AVCaptureInput. AVCaptureInput is a <?> object that represents the
    data coming from the AVCaptureDevice. Each AVCaptureInput instance has a number
    of ports, where each port represents a data stream from the device. You can think
    of a port as a capture analogue of an AVAsset track. Once you’ve created your
    AVCaptureInput(s), you assign then to the AVCaptureSession. Each session can have
    multiple inputs.


    You’ve got your capture session, and you’ve assigned inputs to your session. Now
    you have to save the data. You use the AVCaptureOutput class and add it to your
    AVCaptureSession. You can use a concrete AVCaptureOutput subclass to write your
    data to a file, or you can save it to a buffer for further processing.


    Your AVCaptureSession is now configured to receive data from a device and save
    it. All you need to do is tell your session to startRunning. Once you’re done,
    you send the stopRunning message to your session. Interestingly, it is possible
    to change your session’s input or output while it is running. In order to insure
    a smooth transition, you would wrap these changes with a set of beginConfiguration
    / commitConfiguration messages.


    Asset metadata is represented by the AVMetadataItem class. To add your own metadata
    to an asset, you use the mutable version, AVMutableMetadataItem, and assign it
    to your asset.


    There are times where you may need to transform your media asset from one format
    to another. Similar to capturing media, you use an AVAssetExportSession class.
    You add your input asset to the export session object, then configure the export
    session to your new output format, and export the data.


    Next, let’s delve into the specifics of playing media via AVFoundation.


