    \n图 13-7. 证书创建成功\n\n最后一步。`Security` 框架期望的是 DER 格式的根证书，而非 `Certificate Assistant`\
    \ 创建的 PEM 格式。打开 `Terminal.app`，切换目录到 `~/Library/Application Support/Certificate\
    \ Authority/<CA Name>`。你会看到一个名为 `<CA Name> certificates.pem` 的文件。输入以下命令：\n\n```\n\
    > openssl x509 -in <PEM file> −inform PEM -out root.der -outform DER\n```\n\n\
    将 `<PEM file>` 替换为实际文件名。\n\n至此，你就可以开始构建应用程序了。\n\n## 创建钥匙串应用\n\n你将使用 `Tabbed Application`\
    \ 模板作为应用的起点。打开 Xcode 并创建一个新项目，选择 `Tabbed Application` 模板。将项目命名为 `KeychainViewer`，并确保项目使用\
    \ storyboard 和自动引用计数。\n\n项目创建完成后，需要添加 `Security` 框架。在项目导航器中选中项目，在项目编辑器中选择 `Keychain\
    \ Viewer` 目标，然后导航到 `Build Phases` 选项卡。展开 `Link Binary with Libraries (3 Items)`\
    \ 部分，添加 `Security.framework`。通过将 `Security.framework` 移动到 `Frameworks` 分组中来整理\
    \ `Project Navigator`。\n\n你将用不同的实现替换 `FirstViewController` 和 `SecondViewController`。因此，选中文件\
    \ `FirstViewController.h`、`FirstViewController.m`、`SecondViewController.h` 和 `SecondViewController.m`\
    \ 并删除。无需保留这些文件，因此在 Xcode 询问时选择 `Move to Trash`。\n\n稍后你会删除主 storyboard 中的 `First\
    \ View Controller` 和 `Second View Controller` 场景。首先，定义一些钥匙串项目类。钥匙串 API 是 C 语言\
    \ API 而非 Objective-C，因此你需要将其封装到 Objective-C 类中以简化访问。在 `Keychain Viewer` 分组中创建一个新的\
    \ Objective-C 类，命名为 `KeychainItem`，使其成为 `NSObject` 的子类。\n\n选中 `KeychainItem.h`，为\
    \ `Security` 框架头文件添加导入指令。\n\n```\n#import <Security/Security.h>\n```\n\n对于每个 `KeychainItem`\
    \ 对象，你需要知道其可能的类型（例如 `kSecClassGenericPassword`）以及实际的钥匙串项目。这两者都可以通过 `CFTypeRef`\
    \ CoreFoundation 类型捕获。`CFTypeRef` 映射到通用的 Objective-C 对象 `id`。因此，你将为 `KeychainItem`\
    \ 类添加两个 `id` 类型的属性。你还将定义一个 `NSDictionary` 属性，用于保存每个钥匙串项目返回的属性字典。最后，你将有一个属性来保存钥匙串项目的持久引用。\n\
    \n```\n@property (strong, nonatomic) id type;\n@property (strong, nonatomic) id\
    \ item;\n@property (strong, nonatomic) NSDictionary *attributes;\n@property (strong,\
    \ nonatomic) id persistentRef;\n```\n\n你需要一个初始化方法来处理这两个属性。\n\n```\n- (id)initWithItem:(CFTypeRef)item;\n\
    - (id)initWithData:(NSData *)data options:(NSDictionary *)options;\n```\n\n`initWithItem:`\
    \ 用于通过钥匙串 API 创建钥匙串项目时使用。`initWithData:options:` 用于从文件或 URL 加载钥匙串项目；选项字典用于需要传递额外信息来加载钥匙串项目的情况。\n\
    \n你需要能够保存钥匙串项目（即将其写入钥匙串），因此将实现一个 `save` 方法。`save` 方法将返回一个 `BOOL` 值表示成功或失败。你将传入一个指向\
    \ `NSError` 指针的指针，以便在失败时发送错误消息。你还会添加一个便捷方法 `valueForAttribute:`，用于封装钥匙串 API 调用以获取钥匙串项目的值。\n\
    \n```\n- (BOOL)save:(NSError **)error;\n- (id)valueForAttribute:(CFTypeRef)attr;\n\
    ```\n\n现在实现这些方法。\n\n打开 `KeychainItem.m` 并添加初始化方法。\n\n```\n- (id)initWithItem:(CFTypeRef)item\n\
    {\n    self = [self init];\n    if (self) {\n        self.item = CFBridgingRelease(item);\n\
    \    }\n    return self;\n}\n```\n\n这应该是相当标准的做法。注意使用了 `CFBridgingRelease` 函数。这是\
    \ CoreFoundation 和 Objective-C 之间免费桥接的一部分。它将非 Objective-C 指针转换为 Objective-C 对象，同时将内存管理转移给\
    \ ARC。`CFBridgingRelease` 的逆操作是 `CFBridgingRetain`，稍后会用到。注意在初始化方法中未设置 `type` 属性，这是因为你打算将\
    \ `KeychainItem` 设计为*抽象基类*。希望你不会直接实例化 `KeychainItem`，而是实例化其子类。在子类中，你将设置 `type`\
    \ 属性。\n\n由于 `KeychainItem` 是抽象的，`initWithData:options:` 应该不做任何操作。\n\n```\n- (id)initWithData:(NSData\
    \ *)data options:(NSDictionary *)options\n{\n    return nil;\n}\n```\n\n`save:`\
    \ 方法实际上比想象中更复杂。\n\n```\n- (BOOL)save:(NSError **)error\n{\n    NSDictionary *attributes\
    \ = @{\n        (__bridge id)kSecValueRef : self.item,\n        (__bridge id)kSecReturnPersistentRef\
    \ : (id)kCFBooleanTrue\n    };\n    CFTypeRef cfPersistentRef;\n    OSStatus status\
    \ = SecItemAdd((__bridge CFDictionaryRef)attributes, &cfPersistentRef);\n```\n"
- fmt: "```objective-c\nif (status != errSecSuccess) {\n    NSDictionary *userInfo\
    \ = nil;\n    switch (status) {\n        case errSecParam:\n            userInfo\
    \ = @{ NSLocalizedDescriptionKey : NSLocalizedString(@\"errorSecParam\",\n   \
    \                       @\"One or more parameters passed to the function were\
    \ not valid.\") };\n            break;\n        case errSecAllocate:\n       \
    \     userInfo = @{ NSLocalizedDescriptionKey : NSLocalizedString(@\"errSecAllocate\"\
    ,\n                          @\"Failed to allocate memory.\") };\n           \
    \ break;\n        case errSecDuplicateItem:\n            userInfo = @{ NSLocalizedDescriptionKey\
    \ : NSLocalizedString(@\"errSecDuplicateItem\",\n                          @\"\
    The item already exists.\") };\n            break;\n    }\n    if (*error)\n \
    \       *error = [NSError errorWithDomain:NSOSStatusErrorDomain code:status userInfo:userInfo];\n\
    \    return NO;\n}\n\nself.persistentRef = CFBridgingRelease(cfPersistentRef);\n\
    return YES;\n```\n\nThe bulk of the method is taken up handling the different\
    \ error conditions of the call to `SecItemAdd`, which adds the keychain item to\
    \ the keychain, fails. You’ve got a bunch of casts that begin with `__bridge`.\
    \ This is another part of the toll-free bridge. In this case, you don’t want to\
    \ transfer memory management to ARC (or in the case of the `(__bridge CFDictionaryRef)`\
    \ cast, away from ARC). You could have done this as pure CoreFoundation code,\
    \ but you’d have to explicitly release your CoreFoundation objects with a call\
    \ to `CFRelease`, and we thought this was easier.\n\n`valueForAttribute:` is a\
    \ simple wrapper to the `NSDictionary` method `valueForKey:` to make life easier\
    \ for you, so you don’t have to put `(__bridge id)` casts all over your code.\n\
    \n```objective-c\n- (id)valueForAttribute:(CFTypeRef)attr\n{\n    return [self.attributes\
    \ valueForKey:(__bridge id)attr];\n}\n```\n\nNow you need to implement your concrete\
    \ subclasses of `KeychainItem`. Recall that there are four keychain item types\
    \ defined in the Security framework: `kSecClassGenericPassword`, `kSecClassInternetPassword`,\
    \ `kSecClassCertificate`, and `kSecClassIdentity`. You’re only going to work with\
    \ two of them, Certificates and Identities. As a result, you only need to define\
    \ two concrete subclasses for your application: `KeychainCertificate` and `KeychainIdentity`.\n\
    \nCreate a new file using the Objective-C class template. Name the class `KeychainCertificate`,\
    \ and make it a subclass of `KeychainItem`. Once the file is created, select `KeychainCertificate.m`,\
    \ and implement the initializer methods.\n\n```objective-c\n- (id)init\n{\n  \
    \  self = [super init];\n    if (self) {\n        self.type = [(__bridge id)kSecClassCertificate\
    \ copy];\n    }\n    return self;\n}\n\n- (id)initWithData:(NSData *)data options:(NSDictionary\
    \ *)options\n{\n    SecCertificateRef cert = SecCertificateCreateWithData(NULL,\
    \ (__bridge CFDataRef)data);\n    if (cert) {\n        self = [self initWithItem:cert];\n\
    \    }\n    return self;\n}\n```\n\nUse the generic `init` method to set the `type`\
    \ property. The `init` method will override the default `init` in `KeychainItem`.\
    \ When `KeychainItem initWithItem:` is invoked, it calls `init`. When you call\
    \ `initWithItem:` with a `KeychainCertificate`, you’ll call this `init` method.\n\
    \nNow, let’s create the `KeychainIdentity` class. Create a new Objective-C class,\
    \ name it `KeychainIdentity`, and make it subclass of `KeychainItem`. Since this\
    \ encapsulates a digital identity, you need a password when loading from a file.\n\
    \n```objective-c\n- (id)init\n{\n    self = [super init];\n    if (self) {\n \
    \       self.type = [(__bridge id)kSecClassIdentity copy];\n    }\n    return\
    \ self;\n}\n\n- (id)initWithData:(NSData *)data options:(NSDictionary *)options\n\
    {\n    CFDataRef inPKCS12Data = (__bridge CFDataRef)data;\n    CFArrayRef items\
    \ = CFArrayCreate(NULL, 0, 0, NULL);\n    // Options dictionary needs key kSecImportExportPassphrase\
    \ with password used to protect file\n    OSStatus status = SecPKCS12Import(inPKCS12Data,\
    \ (__bridge CFDictionaryRef)options, &items);\n    if (status != errSecSuccess)\
    \ {\n        NSLog(@\"Error Reading P12 file\");\n        abort();\n    }\n  \
    \  CFDictionaryRef myIdentityAndTrust = CFArrayGetValueAtIndex(items, 0);\n  \
    \  SecIdentityRef identity = (SecIdentityRef)CFDictionaryGetValue(myIdentityAndTrust,\
    \ kSecImportItemIdentity);\n    if (identity)\n        self = [self initWithItem:identity];\n\
    \nreturn self;\n}\n```\n\nAgain, you override the `init` method to set the `type`\
    \ property; this time to `kSecClassIdentity`. `initWithData:options:` is used\
    \ to load data in PKCS #12 format. Since this data is password protected, you\
    \ need the options dictionary to have the key `kSecImportExportPassphrase` and\
    \ the value of the password used when the file was created.\n\nYou need to define\
    \ the view controller classes that will use these `KeychainItem` classes you just\
    \ created. Create a new file using the Objective-C class template. Name the file\
    \ `KeychainItemsViewController` and make it a subclass of `UITableViewController`.\
    \ This will be your abstract base view controller class. Open `KeychainItemsViewController.h`\
    \ and add the following property:\n\n```objective-c\n@property (strong, nonatomic)\
    \ NSArray *items;\n```\n\nThe `items` property will hold the array of keychain\
    \ items you want to display. Open `KeychainItemsViewController.m` so you can work\
    \ on all the changes you need to make. First, you need to import the `KeychainItem`\
    \ header file.\n\n```objective-c\n#import \"KeychainItem.h\"\n```\n\nNext, you\
    \ need to update the table view data source methods to return the correct number\
    \ of sections and rows per section.\n\n```objective-c\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    // Return the number of sections.\n    return 1;\n}\n\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // Return the number of rows in the section.\n    return self.items.count;\n\
    }\n```\n\nFinally, you need to use the keychain item to configure your table view\
    \ cell.\n\n```objective-c\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString *CellIdentifier\
    \ = @\"KeychainItemCell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier\n\
    \                                                           forIndexPath:indexPath];\n\
    \n// Configure the cell...\n    KeychainItem *item = self.items[indexPath.row];\n\
    \    cell.textLabel.text = [item valueForAttribute:kSecAttrLabel];\n\nreturn cell;\n\
    }\n```\n\nThat’s all you need for your `KeychainItemViewController`. Let’s define\
    \ the concrete subclasses you’ll actually use. Create a new Objective-C class\
    \ file. Name it `CertificatesViewController`, subclass of `KeychainItemsViewController`.\
    \ You don’t need to modify the default code at this point. Create another `KeychainItemsViewController`\
    \ subclass. This time name the class `IdentitiesViewController`.\n\nNow, let’s\
    \ update the storyboard to use the `KeychainCertificate` and `KeychainItem` classes.\
    \ Open the `MainStoryboard.storyboard` in the storyboard editor. Find the First\
    \ View Controller and delete it. Repeat for the second view controller. Now drag\
    \ a `UITableViewController` into the Editor pane. Control-drag from the tab bar\
    \ controller to the table view controller. When the Segue Selector pop-up appears,\
    \ select View Controllers under the Relationship Segue label. The table view controller\
    \ should have a tab bar appear along the bottom with the label Item ([Figure 13-8](#9781430238072_Ch13.xhtml#Fig8)).\
    \ Click the label and open the Attribute Inspector. Rename the title to Identities,\
    \ and use the image called `first.png`.\n\n![9781430238072_Fig13-08.jpg](images/9781430238072_Fig13-08.jpg)"
