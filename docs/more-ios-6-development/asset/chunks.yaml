- fmt: "基本上，你已经将`go`方法中的逻辑提取出来并分布到了这个小类中。通过这样做，你使`batch`完全自包含，从而可以利用`userInfo`参数将`batch`传递给定时器触发的方法。\n\
    \n**注意**：在这个实现中，你可能注意到实际上计算了两次平方根：一次在`next`中，另一次在`percentCompletedText`中。出于示例目的，这其实是有益的，因为它消耗了更多的处理器周期。在实际应用中，你可能希望将计算结果存储在实例变量中，以便无需再次计算即可访问上一次计算的结果。\n\
    \n## 更新 Nib\n\n在导航器面板中选择`ViewController.xib`。进入Interface Builder模式后，将编辑器切换为助理模式。接口文件`ViewController.h`应会在编辑器的右侧窗格中打开。从`Go`按钮按住Control键拖拽到最后一条`@property`声明下方。为`Go`按钮创建一个新的`outlet`，并将其命名为`goStopButton`。这是你唯一需要的修改，因此保存XIB。\n\
    \n## 更新视图控制器头文件\n\n重写你的控制器类以使用这个新的定时器。由于用户界面在`batch`运行期间仍然可用，你希望在`batch`运行时将`Go`按钮变为`Stop`按钮。通常，如果可行，给予用户停止长时间运行进程的方式是个好主意。在编辑器中打开`ViewController.h`并添加以下方法声明：\n\
    \n```\n- (void)processChunk:(NSTimer *)timer;\n```\n\n这就是你需要做的全部。保存`ViewController.h`并打开`ViewController.m`。\n\
    \n## 更新视图控制器实现\n\n首先，导入你创建的batch对象的头文件。将其添加为第二条`#import`声明。\n\n```\n#import \"\
    SquareRootBatch.h\"\n```\n\n接下来，定义两个常量。\n\n```\n#define kTimerInterval (1.0/60.0)\n\
    #define kBatchSize     10\n```\n\n你定义的第一个常量`kTimerInterval`将用于确定定时器触发的频率。你将以大约每秒触发60次作为起点。如果需要在测试时调整该值以保持用户界面的响应性，可以这样做。第二个常量`kBatchSize`将用于定时器调用的方法中。在该方法中，你将在进行计算时检查经过了多少时间，因为你不想在该方法中花费超过一个定时器间隔的时间。实际上，你需要花费比定时器间隔略少的时间，因为你需要将资源留给运行循环处理其他事务。然而，每次计算后都检查经过的时间会很浪费，因此你将在检查经过时间之前进行一定数量的计算，这就是`kBatchSize`的作用。你也可以调整批次大小以获得更佳性能。\n\
    \n接着，在分类中添加一个私有属性。\n\n```\n@interface ViewController ()\n@property (assign, nonatomic)\
    \ BOOL processRunning;\n@end\n```\n\n你需要重写`go`方法为：\n\n```\n- (IBAction)go:(id)sender\n\
    {\n    if (!self.processRunning) {\n        NSInteger operationCount = [numberOfOperations.text\
    \ integerValue];\n        SquareRootBatch *batch = [[SquareRootBatch alloc] initWithMaxNumber:operationCount];\n\
    \n[NSTimer scheduledTimerWithTimeInterval:kTimerInterval                     \
    \             \n                            target:self                      \
    \                  \n                            selector:@selector(processChunk:)\
    \                                        \n                            userInfo:batch\
    \ repeats:YES];\n        [goStopButton setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
    \        self.processRunning = YES;\n    }\n    else {\n        self.processRunning\
    \ = NO;\n        [goStopButton setTitle:@\"Go\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n该方法的开头检查`batch`是否已经在运行。如果没有，则像旧版本一样从文本字段中获取数字。创建一个新的`SquareRootBatch`实例，并使用从文本字段获取的数字进行初始化。创建`batch`对象后，创建一个定时器并安排计划，使其每六十分之一秒调用你的`processChunk:`方法。你将`batch`对象传入`userInfo`参数中，以便定时器方法可以使用它。由于运行循环会保留定时器，你甚至无需声明指向所创建定时器的指针。接着，将按钮标题设为`Stop`，并设置`processRunning`以反映进程已启动。\n\
    \n如果`batch`已经启动，则只需将按钮标题改回`Go`，并将`processRunning`设为`NO`，这将告知`processChunk:`方法停止处理。\n\
    \n现在你已经更新了`go`方法，需要实现`processChunk:`方法。将其添加到你刚刚重写的`go`方法下方。\n\n```\n- (void)processChunk:(NSTimer\
    \ *)timer\n{\n```\n\n该方法首先检查用户是否在上次调用该方法后点击了`Stop`按钮。如果是，则使定时器失效，这将防止此定时器再次调用该方法，从而结束当前`batch`的处理。同时更新进度标签，告知用户操作已取消。\n\
    \n```\nif (!self.processRunning) {\n    // Cancelled\n    [timer invalidate];\n\
    \    progressLabel.text = @\"Calculations Cancelled\";\n    return;\n}\n```\n\n\
    接下来，从定时器中获取`batch`。\n\n```\nSquareRootBatch *batch = (SquareRootBatch *)[timer\
    \ userInfo];\n```\n\n之后，计算何时停止处理当前批次。作为起始，你将使用可用时间的一半来处理`batch`。这应该为运行循环接收系统事件和更新UI留出足够的时间，但如有必要，你始终可以调整该值。\n\
    \n```\nNSTimeInterval endTime = [NSDate timeIntervalSinceReferenceDate] + (kTimerInterval\
    \ / 2.0);\n```\n\n设置一个布尔值，用于标识是否已到达`batch`末尾。如果`hasNext`返回`NO`，则将其设为`YES`。\n\n\
    ```\nBOOL isDone = NO;\n```\n\n然后，进入一个循环，直到达到之前计算的结束时间或没有剩余计算任务为止。\n\n```\nwhile\
    \ (([NSDate timeIntervalSinceReferenceDate] < endTime) && !isDone) {\n```\n\n\
    你将一次计算多个数字的平方根，而不是每次计算后都检查时间，因此进入另一个基于之前定义的批次大小的循环。\n\n```\nfor (int i = 0; i\
    \ < kBatchSize; i++) {\n```\n\n在该循环中，确认是否还有更多工作需要完成。如果没有，将`isDone`设为`YES`，并将`i`设为批次大小以结束此循环。\n\
    \n```\nif (![batch hasNext]) {\n    isDone = YES;\n    i = kBatchSize;\n}\n```\n\
    \n如果还有下一个数字需要计算，则获取当前值及其平方根，并将该信息记录到调试控制台。\n\n```\n        else {\n          \
    \  NSInteger current = batch.current;\n            double nextSquareRoot = [batch\
    \ next];\n            NSLog(@\"Calculated square root of %d as %.6f\", current,\
    \ nextSquareRoot);\n        }\n    }\n}\n```\n\n处理完一个批次后，更新进度条和标签。\n\n```\nprogressLabel.text\
    \ = [batch percentCompletedText];\nprogressBar.progress = [batch percentCompleted];\n\
    ```\n\n并且，如果所有计算任务均已处理完毕，则使定时器失效，并更新进度标签和按钮。\n\n```\n    if (isDone) {\n     \
    \   [timer invalidate];\n        self.processRunning = NO;\n        progressLabel.text\
    \ = @\"Calculations Finished\";\n        [goStopButton setTitle:@\"Go\" forState:UIControlStateNormal];\n\
    \    }\n}\n```"
  raw: 'Basically, you’ve taken the logic from your go method and distributed it throughout
    this little class. By doing so, you make the batch completely self-contained,
    which will allow you to pass the batch along to the method fired by the timer
    by making use of the userInfo argument.


    **Note**  In this implementation, you might notice that you’re actually calculating
    the square root twice, once in next, and again in percentCompletedText. For your
    purposes, this is actually good because it burns more processor cycles. In a real
    application, you would probably want to store off the result of the calculation
    in an instance variable so that you have access to the last calculation performed
    without having to perform the calculation again.


    Updating the Nib


    Select ViewController.xib in the Navigator pane. Once in Interface Builder mode,
    switch the editor to Assistant mode. The interface file, ViewController.h, should
    open in the right pane of the editor. Control-drag from Go button to just below
    the last @property declaration. Create a new outlet for the Go Button, and name
    it goStopButton. That’s the only change you need, so save the XIB.


    Updating the View Controller Header


    Rewrite your controller class to use this new timer. Since your user interface
    will be useable while the batch is running, you want to make the Go button become
    a Stop button while the batch is running. It’s generally a good idea to give users
    a way to stop long-running processes if feasible. Open ViewController.h in the
    editor and add the following method declaration:


    ```

    - (void)processChunk:(NSTimer *)timer;

    ```


    That’s all you need to do. Save ViewController.h and open ViewController.m.


    Updating the View Controller Implementation


    The first will import the header of the batch object you created. Add this as
    the second #import declaration.


    ```

    #import "SquareRootBatch.h"

    ```


    Next, you’ll define two constants.


    ```

    #define kTimerInterval (1.0/60.0)

    #define kBatchSize     10

    ```


    The first constant you defined—kTimerInterval—will be used to determine how often
    the timer fires. You’re going to start by firing approximately 60 times a second.
    If you need to tweak the value to keep your user interface responsive, you can
    do that as you test. The second constant, kBatchSize, will be used in the method
    that the timer calls. In the method, you’re going to check how much time has elapsed
    as you do calculations because you don’t want to spend more than one timer interval
    in that method. In fact, you need to spend a little less than the timer interval
    because you need to make resources available for the run loop to do other things.
    However, it would be wasteful to check the elapsed time after every calculation,
    so you’ll do a certain number of calculations before checking the elapsed time,
    and that’s what kBatchSize is for. You can tweak the batch size for better performance
    as well.


    Next, you add a private property in the Category.


    ```

    @interface ViewController ()

    @property (assign, nonatomic) BOOL processRunning;

    @end

    ```


    You need to rewrite the go method to


    ```

    - (IBAction)go:(id)sender

    {

        if (!self.processRunning) {

            NSInteger operationCount = [numberOfOperations.text integerValue];

            SquareRootBatch *batch = [[SquareRootBatch alloc] initWithMaxNumber:operationCount];


    [NSTimer scheduledTimerWithTimeInterval:kTimerInterval                                          

                                target:self                                        

                                selector:@selector(processChunk:)                                        

                                userInfo:batch repeats:YES];

            [goStopButton setTitle:@"Stop" forState:UIControlStateNormal];

            self.processRunning = YES;

        }

        else {

            self.processRunning = NO;

            [goStopButton setTitle:@"Go" forState:UIControlStateNormal];

        }

    }

    ```


    You start the method out by checking to see if a batch is already running. If
    it isn’t, then you grab the number from the text field, just as the old version
    did. You create a new SquareRootBatch instance, initialized with the number pulled
    from the text field. After creating the batch object, you create a scheduled timer,
    telling it to call your processChunk: method every sixtieth of a second. You pass
    the batch object in the userInfo argument so it will be available to the timer
    method. Because the run loop retains the timer, you don’t even declare a pointer
    to the timer you create. Next, you set the button’s title to Stop and set processRunning
    to reflect that the process has started.


    If the batch had already been started, then you just change the button’s title
    back to Go and set processRunning to NO, which will tell the processChunk: method
    to stop processing.


    Now that you’ve updated your go method, you need to implement the processChunk:
    method. You’ll add it below the go method you just rewrote.


    ```

    - (void)processChunk:(NSTimer *)timer

    {

    ```


    The first thing this method does is check if the user has tapped the Stop button
    since the last time the method was called. If it was, you invalidate the timer,
    which will prevent this method from being called any more by this timer, ending
    the processing of this batch. You also update the progress label to tell the user
    that you canceled.


    ```

    if (!self.processRunning) {

        // Cancelled

        [timer invalidate];

        progressLabel.text = @"Calculations Cancelled";

        return;

    }

    ```


    Next, you retrieve the batch from the timer.


    ```

    SquareRootBatch *batch = (SquareRootBatch *)[timer userInfo];

    ```


    After that, you calculate when to stop processing this batch. For starters, you’re
    going to spend half of the time available to you working on the batch. That should
    leave plenty of time for the run loop to receive system events and update the
    UI, but you can always tweak the value if necessary.


    ```

    NSTimeInterval endTime = [NSDate timeIntervalSinceReferenceDate] + (kTimerInterval
    / 2.0);

    ```


    You set a Boolean that you’ll use to identify if you have reached the end of the
    batch. You’ll set this to YES if hasNext returns NO.


    ```

    BOOL isDone = NO;

    ```


    Then, you go into a loop until you either reach the end time you calculated earlier
    or there’s no calculations left to do.


    ```

    while (([NSDate timeIntervalSinceReferenceDate] < endTime) && !isDone) {

    ```


    You’re going to calculate the square root for several numbers at a time rather
    than checking the date after every one, so you go into another loop based on the
    batch size you defined earlier.


    ```

    for (int i = 0; i < kBatchSize; i++) {

    ```


    In that loop, you make sure there’s more work to be done. If there isn’t, you
    set isDone to YES and set i to the batch size to end this loop.


    ```

    if (![batch hasNext]) {

        isDone = YES;

        i = kBatchSize;

    }

    ```


    If there is another number to calculate, you grab the current value and its square
    root and log the fact to the debug console.


    ```

            else {

                NSInteger current = batch.current;

                double nextSquareRoot = [batch next];

                NSLog(@"Calculated square root of %d as %.6f", current, nextSquareRoot);

            }

        }

    }

    ```


    After you’re done with processing a chunk, you update the progress bar and label.


    ```

    progressLabel.text = [batch percentCompletedText];

    progressBar.progress = [batch percentCompleted];

    ```


    And, if you’re all out of rows to process, you invalidate the timer and update
    the progress label and button.


    ```

        if (isDone) {

            [timer invalidate];

            self.processRunning = NO;

            progressLabel.text = @"Calculations Finished";

            [goStopButton setTitle:@"Go" forState:UIControlStateNormal];

        }

    }

    ```'
  trans: "\n基本上，你已经将`go`方法中的逻辑提取出来并分布到了这个小类中。通过这样做，你使`batch`完全自包含，从而可以利用`userInfo`参数将`batch`传递给定时器触发的方法。\n\
    \n**注意**：在这个实现中，你可能注意到实际上计算了两次平方根：一次在`next`中，另一次在`percentCompletedText`中。出于示例目的，这其实是有益的，因为它消耗了更多的处理器周期。在实际应用中，你可能希望将计算结果存储在实例变量中，以便无需再次计算即可访问上一次计算的结果。\n\
    \n## 更新 Nib\n\n在导航器面板中选择`ViewController.xib`。进入 Interface Builder 模式后，将编辑器切换为助理模式。接口文件`ViewController.h`应会在编辑器的右侧窗格中打开。从`Go`按钮按住\
    \ Control 键拖拽到最后一条`@property`声明下方。为`Go`按钮创建一个新的`outlet`，并将其命名为`goStopButton`。这是你唯一需要的修改，因此保存\
    \ XIB。\n\n## 更新视图控制器头文件\n\n重写你的控制器类以使用这个新的定时器。由于用户界面在`batch`运行期间仍然可用，你希望在`batch`运行时将`Go`按钮变为`Stop`按钮。通常，如果可行，给予用户停止长时间运行进程的方式是个好主意。在编辑器中打开`ViewController.h`并添加以下方法声明：\n\
    \n```\n- (void)processChunk:(NSTimer *)timer;\n```\n\n这就是你需要做的全部。保存`ViewController.h`并打开`ViewController.m`。\n\
    \n## 更新视图控制器实现\n\n首先，导入你创建的 batch 对象的头文件。将其添加为第二条`#import`声明。\n\n```\n#import\
    \ \"SquareRootBatch.h\"\n```\n\n接下来，定义两个常量。\n\n```\n#define kTimerInterval (1.0/60.0)\n\
    #define kBatchSize     10\n```\n\n你定义的第一个常量`kTimerInterval`将用于确定定时器触发的频率。你将以大约每秒触发\
    \ 60 次作为起点。如果需要在测试时调整该值以保持用户界面的响应性，可以这样做。第二个常量`kBatchSize`将用于定时器调用的方法中。在该方法中，你将在进行计算时检查经过了多少时间，因为你不想在该方法中花费超过一个定时器间隔的时间。实际上，你需要花费比定时器间隔略少的时间，因为你需要将资源留给运行循环处理其他事务。然而，每次计算后都检查经过的时间会很浪费，因此你将在检查经过时间之前进行一定数量的计算，这就是`kBatchSize`的作用。你也可以调整批次大小以获得更佳性能。\n\
    \n接着，在分类中添加一个私有属性。\n\n```\n@interface ViewController ()\n@property (assign, nonatomic)\
    \ BOOL processRunning;\n@end\n```\n\n你需要重写`go`方法为：\n\n```\n- (IBAction)go:(id)sender\n\
    {\n    if (!self.processRunning) {\n        NSInteger operationCount = [numberOfOperations.text\
    \ integerValue];\n        SquareRootBatch *batch = [[SquareRootBatch alloc] initWithMaxNumber:operationCount];\n\
    \n[NSTimer scheduledTimerWithTimeInterval:kTimerInterval                     \
    \             \n                            target:self                      \
    \                  \n                            selector:@selector(processChunk:)\
    \                                        \n                            userInfo:batch\
    \ repeats:YES];\n        [goStopButton setTitle:@\"Stop\" forState:UIControlStateNormal];\n\
    \        self.processRunning = YES;\n    }\n    else {\n        self.processRunning\
    \ = NO;\n        [goStopButton setTitle:@\"Go\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n\n该方法的开头检查`batch`是否已经在运行。如果没有，则像旧版本一样从文本字段中获取数字。创建一个新的`SquareRootBatch`实例，并使用从文本字段获取的数字进行初始化。创建`batch`对象后，创建一个定时器并安排计划，使其每六十分之一秒调用你的`processChunk:`方法。你将`batch`对象传入`userInfo`参数中，以便定时器方法可以使用它。由于运行循环会保留定时器，你甚至无需声明指向所创建定时器的指针。接着，将按钮标题设为`Stop`，并设置`processRunning`以反映进程已启动。\n\
    \n如果`batch`已经启动，则只需将按钮标题改回`Go`，并将`processRunning`设为`NO`，这将告知`processChunk:`方法停止处理。\n\
    \n现在你已经更新了`go`方法，需要实现`processChunk:`方法。将其添加到你刚刚重写的`go`方法下方。\n\n```\n- (void)processChunk:(NSTimer\
    \ *)timer\n{\n```\n\n该方法首先检查用户是否在上次调用该方法后点击了`Stop`按钮。如果是，则使定时器失效，这将防止此定时器再次调用该方法，从而结束当前`batch`的处理。同时更新进度标签，告知用户操作已取消。\n\
    \n```\nif (!self.processRunning) {\n    // Cancelled\n    [timer invalidate];\n\
    \    progressLabel.text = @\"Calculations Cancelled\";\n    return;\n}\n```\n\n\
    接下来，从定时器中获取`batch`。\n\n```\nSquareRootBatch *batch = (SquareRootBatch *)[timer\
    \ userInfo];\n```\n\n之后，计算何时停止处理当前批次。作为起始，你将使用可用时间的一半来处理`batch`。这应该为运行循环接收系统事件和更新\
    \ UI 留出足够的时间，但如有必要，你始终可以调整该值。\n\n```\nNSTimeInterval endTime = [NSDate timeIntervalSinceReferenceDate]\
    \ + (kTimerInterval / 2.0);\n```\n\n设置一个布尔值，用于标识是否已到达`batch`末尾。如果`hasNext`返回`NO`，则将其设为`YES`。\n\
    \n```\nBOOL isDone = NO;\n```\n\n然后，进入一个循环，直到达到之前计算的结束时间或没有剩余计算任务为止。\n\n```\n\
    while (([NSDate timeIntervalSinceReferenceDate] < endTime) && !isDone) {\n```\n\
    \n你将一次计算多个数字的平方根，而不是每次计算后都检查时间，因此进入另一个基于之前定义的批次大小的循环。\n\n```\nfor (int i = 0;\
    \ i < kBatchSize; i++) {\n```\n\n在该循环中，确认是否还有更多工作需要完成。如果没有，将`isDone`设为`YES`，并将`i`设为批次大小以结束此循环。\n\
    \n```\nif (![batch hasNext]) {\n    isDone = YES;\n    i = kBatchSize;\n}\n```\n\
    \n如果还有下一个数字需要计算，则获取当前值及其平方根，并将该信息记录到调试控制台。\n\n```\n        else {\n          \
    \  NSInteger current = batch.current;\n            double nextSquareRoot = [batch\
    \ next];\n            NSLog(@\"Calculated square root of %d as %.6f\", current,\
    \ nextSquareRoot);\n        }\n    }\n}\n```\n\n处理完一个批次后，更新进度条和标签。\n\n```\nprogressLabel.text\
    \ = [batch percentCompletedText];\nprogressBar.progress = [batch percentCompleted];\n\
    ```\n\n并且，如果所有计算任务均已处理完毕，则使定时器失效，并更新进度标签和按钮。\n\n```\n    if (isDone) {\n     \
    \   [timer invalidate];\n        self.processRunning = NO;\n        progressLabel.text\
    \ = @\"Calculations Finished\";\n        [goStopButton setTitle:@\"Go\" forState:UIControlStateNormal];\n\
    \    }\n}\n```\n"
- fmt: "\nGo ahead and take this new version for a spin. Build and run your project\
    \ and try entering different numbers. As the calculations happen, your user interface\
    \ should get updated ([Figure 14-3](#9781430238072_Ch14.xhtml#Fig3)) and the progress\
    \ bar should make its way across the screen. While a batch is processing, you\
    \ should be able to tap the Stop button to cancel the processing.\n\n![9781430238072_Fig14-03.jpg](images/9781430238072_Fig14-03.jpg)\n\
    \n[Figure 14-3.](#9781430238072_Ch14.xhtml#_Fig3) Now that you’re using a timer,\
    \ the application is no longer stalled\n\nThat’s great, and your users are now\
    \ able to start and stop the process and can continue to use the application while\
    \ the calculations are being performed. But, if you had more tasks going on in\
    \ the background, this option wouldn’t be ideal. Trying to calculate how much\
    \ time to let each batch use would be non-trivial. Fortunately, Apple has given\
    \ you the operation queue and has put all sorts of non-trivial logic in it so\
    \ that you don’t have to reinvent the wheel. Let’s take a look at operation queues\
    \ now.\n\n## Operation Queues and Concurrency\n\nThere are times when your application\
    \ will need to run more than just a few concurrent tasks. When you get to more\
    \ than a handful of tasks, the amount of complexity quickly escalates, making\
    \ it very difficult to use any form of run loop scheduling to share time amongst\
    \ all the tasks. When your application needs to manage many independent sets of\
    \ instructions, you have to look at other mechanisms besides run loop scheduling\
    \ to add concurrency.\n\nAs we’ve mentioned before, one of the traditional tools\
    \ for adding concurrency at the application level is called threads. Threads are\
    \ a mechanism provided by the operating system that allows multiple sets of instructions\
    \ to operate at the same time within a single application. In iOS, threading functionality\
    \ is provided by the POSIX Threads API (often referred to as `pthreads`). You\
    \ should rarely, if ever, need to actually use that API in Cocoa Touch applications,\
    \ however.\n\nThe Foundation framework has, for many years, contained a class\
    \ called `NSThread`, which is far easier to work with than `pthreads`, which are\
    \ implemented as a procedural C API. `NSThread` was the recommended way, until\
    \ fairly recently, to add and manage threads in a Cocoa application.\n\nRelatively\
    \ recently, Apple introduced some new classes for implementing concurrency and\
    \ is strongly recommending the use of these new classes instead of using `NSThread`\
    \ directly. `NSOperationQueue` is a class that manages a queue of instances of\
    \ a subclass of `NSOperation`. Each `NSOperation` (or subclass) contains a set\
    \ of instructions to perform a specific task. The operation queue will spawn and\
    \ manage threads as needed to run the queued operations.\n\nThe use of operation\
    \ queues makes implementing concurrency quite a bit easier than the traditional\
    \ `NSThread`-based approach, and worlds easier than using `pthreads` directly.\
    \ The benefits of using operation queues are so clear and compelling that we’re\
    \ not even going to show you how to use the lower-level mechanisms directly. We\
    \ are going to discuss threads a bit, but only enough to inform your use of `NSOperationQueue`.\
    \ Although `NSOperationQueue` does make many aspects of concurrency easier, there\
    \ are still a few gotchas associated with concurrency and threads that you need\
    \ to be aware of when using operation queues.\n\n## Threads\n\nAs we’ve mentioned\
    \ before, every application has at least one thread, which is a sequence of instructions.\
    \ The thread that begins executing when the program is launched is called the\
    \ main thread. In the case of a Cocoa Touch application, the main thread contains\
    \ the application’s main run loop, which is responsible for handling inputs and\
    \ updating the user interface. Although there are some instances where Cocoa Touch\
    \ uses additional threads implicitly, pretty much all application code that you\
    \ will write will fire on the main thread unless you specifically spawn a thread\
    \ or use an operation in an operation queue.\n\nTo implement concurrency, additional\
    \ threads are spawned, each tasked to perform a specific set of instructions.\
    \ Each thread has equal access to all of your application’s memory. This means\
    \ that any object, except local variables, can potentially be modified, used,\
    \ and changed in any thread. Generally speaking, there’s no way to predict how\
    \ long a thread will run, and if there are multiple threads, there’s no way to\
    \ predict, with any certainty, which thread will finish first.\n\nThese two thread\
    \ traits—the fact that they all share access to the same memory and that there’s\
    \ no way to predict what share of the processing time each will get—are the root\
    \ cause of a number of problems that come along for the ride when doing concurrent\
    \ programming. Operation queues provide some relief from the timing problem, since\
    \ you can set priorities and dependencies, which we’ll look at a little later,\
    \ but the memory sharing issue is still very much a concern.\n\n## Race Conditions\n\
    \nThe fact that every thread can access the same memory can cause any number of\
    \ problems if you’re not conscious of that fact while programming. When a program\
    \ doesn’t give the expected result because shared data is accessed concurrently\
    \ by multiple threads, a *race condition* is said to exist. Race conditions can\
    \ happen when any thread operates on the assumption that it is the sole user of\
    \ a resource that is actually shared with other threads.\n\nTake a look at the\
    \ following code:\n\n```\nstatic int i;\nfor (i = 0; i < 25; i++) {\n    NSLog(@\"\
    i = %d\", i);\n}\n```\n\nThere’s not really any reason why somebody would declare\
    \ `i` to be static in this example, but it illustrates one classic form of race\
    \ condition. When you declare a variable static, it becomes a single shared variable\
    \ used whenever this method fires on any object. If this code runs in a program\
    \ with only a single thread, it will work completely fine. The fact that there\
    \ is only one variable `i` shared by multiple objects simply isn’t a problem because\
    \ as long as you’re in the loop, no other code can fire and change the value of\
    \ `i`.\n\nThe second you add concurrency into the mix, that’s no longer true.\
    \ If, for example, you had this code running in multiple threads, they would all\
    \ be sharing the same copy of `i`. When one thread increments `i`, it increments\
    \ it for all the other threads as well. Instead of each thread looping 25 times,\
    \ which is likely the intent, all the threads combined would loop a total of 25\
    \ times. The output in such a case might look like this:\n\n| Thread 1: | Thread\
    \ 2: | Thread 3: |\n| --- | --- | --- |\n| `i = 0` | `i = 2` | `i = 5` |\n| `i\
    \ = 1` | `i = 3` | `i = 10` |\n| `i = 4` | `i = 6` | `i = 13` |\n| `i = 7` | `i\
    \ = 8` | `i = 18` |\n| `i = 9` | `i = 11` | `i = 19` |\n| `i = 12` | `i = 14`\
    \ | `i = 24` |\n| `i = 15` | `i = 17` |  |\n| `i = 16` | `i = 21` |  |\n| `i =\
    \ 20` | `i = 22` |  |\n| `i = 23` |  |  |\n\nThis behavior is almost certainly\
    \ not what was intended. In this case, the solution is simple: remove the static\
    \ operator from `i`. It won’t always be quite as obvious as this, but you should\
    \ understand the potential for problems now with shared memory.\n\nAnother example\
    \ of a race condition can happen with accessors and mutators. Let’s say, for example,\
    \ that you have an object that represents a person with two properties, one to\
    \ hold their first name and another to hold their last name.\n\n```\n@implementation\
    \ Person : NSObject\n```"
  raw: 'Go ahead and take this new version for a spin. Build and run your project
    and try entering different numbers. As the calculations happen, your user interface
    should get updated ([Figure 14-3](#9781430238072_Ch14.xhtml#Fig3)) and the progress
    bar should make its way across the screen. While a batch is processing, you should
    be able to tap the Stop button to cancel the processing.


    ![9781430238072_Fig14-03.jpg](images/9781430238072_Fig14-03.jpg)


    [Figure 14-3.](#9781430238072_Ch14.xhtml#_Fig3)  Now that you’re using a timer,
    the application is no longer stalled


    That’s great, and your users are now able to start and stop the process and can
    continue to use the application while the calculations are being performed. But,
    if you had more tasks going on in the background, this option wouldn’t be ideal.
    Trying to calculate how much time to let each batch use would be non-trivial.
    Fortunately, Apple has given you the operation queue and has put all sorts of
    non-trivial logic in it so that you don’t have to reinvent the wheel. Let’s take
    a look at operation queues now.


    Operation Queues and Concurrency


    There are times when your application will need to run more than just a few concurrent
    tasks. When you get to more than a handful of tasks, the amount of complexity
    quickly escalates, making it very difficult to use any form of run loop scheduling
    to share time amongst all the tasks. When your application needs to manage many
    independent sets of instructions, you have to look at other mechanisms besides
    run loop scheduling to add concurrency.


    As we’ve mentioned before, one of the traditional tools for adding concurrency
    at the application level is called threads. Threads are a mechanism provided by
    the operating system that allows multiple sets of instructions to operate at the
    same time within a single application. In iOS, threading functionality is provided
    by the POSIX Threads API (often referred to as pthreads). You should rarely, if
    ever, need to actually use that API in Cocoa Touch applications, however.


    The Foundation framework has, for many years, contained a class called NSThread,
    which is far easier to work with than pthreads, which are implemented as a procedural
    C API. NSThread was the recommended way, until fairly recently, to add and manage
    threads in a Cocoa application.


    Relatively recently, Apple introduced some new classes for implementing concurrency
    and is strongly recommending the use of these new classes instead of using NSThread
    directly. NSOperationQueue is a class that manages a queue of instances of a subclass
    of NSOperation. Each NSOperation (or subclass) contains a set of instructions
    to perform a specific task. The operation queue will spawn and manage threads
    as needed to run the queued operations.


    The use of operation queues makes implementing concurrency quite a bit easier
    than the traditional NSThread-based approach, and worlds easier than using pthreads
    directly. The benefits of using operation queues are so clear and compelling that
    we’re not even going to show you how to use the lower-level mechanisms directly.
    We are going to discuss threads a bit, but only enough to inform your use of NSOperationQueue.
    Although NSOperationQueue does make many aspects of concurrency easier, there
    are still a few gotchas associated with concurrency and threads that you need
    to be aware of when using operation queues.


    Threads


    As we’ve mentioned before, every application has at least one thread, which is
    a sequence of instructions. The thread that begins executing when the program
    is launched is called the main thread. In the case of a Cocoa Touch application,
    the main thread contains the application’s main run loop, which is responsible
    for handling inputs and updating the user interface. Although there are some instances
    where Cocoa Touch uses additional threads implicitly, pretty much all application
    code that you will write will fire on the main thread unless you specifically
    spawn a thread or use an operation in an operation queue.


    To implement concurrency, additional threads are spawned, each tasked to perform
    a specific set of instructions. Each thread has equal access to all of your application’s
    memory. This means that any object, except local variables, can potentially be
    modified, used, and changed in any thread. Generally speaking, there’s no way
    to predict how long a thread will run, and if there are multiple threads, there’s
    no way to predict, with any certainty, which thread will finish first.


    These two thread traits—the fact that they all share access to the same memory
    and that there’s no way to predict what share of the processing time each will
    get—are the root cause of a number of problems that come along for the ride when
    doing concurrent programming. Operation queues provide some relief from the timing
    problem, since you can set priorities and dependencies, which we’ll look at a
    little later, but the memory sharing issue is still very much a concern.


    Race Conditions


    The fact that every thread can access the same memory can cause any number of
    problems if you’re not conscious of that fact while programming. When a program
    doesn’t give the expected result because shared data is accessed concurrently
    by multiple threads, a *race condition* is said to exist. Race conditions can
    happen when any thread operates on the assumption that it is the sole user of
    a resource that is actually shared with other threads.


    Take a look at the following code:


    ```

    static int i;

    for (i = 0; i < 25; i++) {

        NSLog(@"i = %d", i);

    }

    ```


    There’s not really any reason why somebody would declare i to be static in this
    example, but it illustrates one classic form of race condition. When you declare
    a variable static, it becomes a single shared variable used whenever this method
    fires on any object. If this code runs in a program with only a single thread,
    it will work completely fine. The fact that there is only one variable i shared
    by multiple objects simply isn’t a problem because as long as you’re in the loop,
    no other code can fire and change the value of i.


    The second you add concurrency into the mix, that’s no longer true. If, for example,
    you had this code running in multiple threads, they would all be sharing the same
    copy of i. When one thread increments i, it increments it for all the other threads
    as well. Instead of each thread looping 25 times, which is likely the intent,
    all the threads combined would loop a total of 25 times. The output in such a
    case might look like this:


    | Thread 1: | Thread 2: | Thread 3: |

    | --- | --- | --- |

    | i = 0 | i = 2 | i = 5 |

    | i = 1 | i = 3 | i = 10 |

    | i = 4 | i = 6 | i = 13 |

    | i = 7 | i = 8 | i = 18 |

    | i = 9 | i = 11 | i = 19 |

    | i = 12 | i = 14 | i = 24 |

    | i = 15 | i = 17 |  |

    | i = 16 | i = 21 |  |

    | i = 20 | i = 22 |  |

    | i = 23 |  |  |


    This behavior is almost certainly not what was intended. In this case, the solution
    is simple: remove the static operator from i. It won’t always be quite as obvious
    as this, but you should understand the potential for problems now with shared
    memory.


    Another example of a race condition can happen with accessors and mutators. Let’s
    say, for example, that you have an object that represents a person with two properties,
    one to hold their first name and another to hold their last name.


