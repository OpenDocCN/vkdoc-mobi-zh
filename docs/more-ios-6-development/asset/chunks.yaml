    layout


    You’ll also add an additional UIBarButtonItem to the far right of the toolbar.
    Keep the button Identifier attribute as Custom, but change the Title to read 1.0x.
    You’ll be using this button to toggle playback speed between different rates.


    You need to add outlets for the UI components you added. Select the assistant
