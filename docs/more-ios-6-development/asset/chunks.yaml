    \ `addHero:` 操作\n\n```\n- (IBAction)addHero:(id)sender;\n```\n\n如果你转到 `HeroListController`\
    \ 的实现文件，你会看到该方法的（空）实现：\n\n```\n- (IBAction)addHero:(id)sender {\n}\n```\n\n构建并运行应用。一切看起来都就绪（图\
