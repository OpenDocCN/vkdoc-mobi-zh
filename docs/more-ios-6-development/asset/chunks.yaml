    \ | 播放器即将退出全屏模式。 |\n| `MPMovieSourceTypeAvailableNotification` | 电影（视频）的源类型原本未知，现在已确定。\
    \ |\n\n通常，只有在使用 `MPMoviePlayerController` 时才需要关注这些通知。\n\n理论讲够了。现在来构建一个应用，可以从媒体库中同时播放音频和视频媒体内容。"
- fmt: "您将使用`MediaPlayer`框架构建一个新应用，该应用允许您从媒体库中播放音频和视频内容。首先，您需要创建一个标签栏控制器，其中一个标签用于音频内容，另一个标签用于视频内容（[图12-9](#9781430238072_Ch12.xhtml#Fig9)）。您将不使用队列来排序媒体选择。保持简单：用户选择媒体项，应用程序将播放它。\n\
    \n![9781430238072_Fig12-09.jpg](images/9781430238072_Fig12-09.jpg)\n\n[图12-9.](#9781430238072_Ch12.xhtml#_Fig9)\
    \ 包含音乐和视频标签的`MPMediaPlayer`\n\n使用“标签页应用”模板创建一个新项目。将应用命名为`MPMediaPlayer`，并让项目使用故事板和自动引用计数。将`MediaPlayer`框架添加到`MPMediaPlayer`目标中。如果您不确定如何操作，请回顾在`SimplePlayer`应用中的操作方法。\n\
    \n`Xcode`将创建两个视图控制器：`FirstViewController`和`SecondViewController`，并提供标准尺寸（`first.png`、`second.png`）和双倍尺寸（`first@2x.png`、`second@2x.png`）的标签栏图标。您将替换这些控制器和图像，因此请删除它们。在导航窗格中选择控制器文件`FirstViewController.[hm]`和`SecondViewController.[hm]`以及`.png`文件。删除文件。当`Xcode`询问时，将文件移到废纸篓。选择`MainStoryboard.storyboard`在故事板编辑器中打开。选择第一个视图控制器场景并删除它。对第二个视图控制器重复此操作。故事板编辑器应仅包含标签栏控制器（[图12-10](#9781430238072_Ch12.xhtml#Fig10)）。\n\
    \n![9781430238072_Fig12-10.jpg](images/9781430238072_Fig12-10.jpg)\n\n[图12-10.](#9781430238072_Ch12.xhtml#_Fig10)\
    \ 删除第一个和第二个视图控制器\n\n查看[图12-9](#9781430238072_Ch12.xhtml#Fig9)，您会看到每个标签控制器都是一个表视图控制器。从对象库中拖拽一个`UITableViewController`到故事板编辑器中标签栏控制器的右侧。按住`Control`键从标签栏视图控制器拖拽到新的表视图控制器。当弹出“Segue”菜单时，在“关系转场”标题下选择“视图控制器”选项。添加第二个`UITableViewController`，并再次从标签栏控制器拖拽到它，选择“视图控制器”选项。对齐两个表视图控制器，并尝试使您的故事板看起来像[图12-11](#9781430238072_Ch12.xhtml#Fig11)。\n\
    \n![9781430238072_Fig12-11.jpg](images/9781430238072_Fig12-11.jpg)\n\n[图12-11.](#9781430238072_Ch12.xhtml#_Fig11)\
    \ 添加新的表视图控制器\n\n选择顶部表视图控制器中的表视图单元格。打开属性检查器，将“样式”属性设置为“副标题”。为“标识符”属性赋予值`MediaCell`。将“选择”属性设置为“无”，将“附件”属性设置为“披露指示器”。对底部表视图控制器中的表视图单元格重复这些属性设置。\n\
    \n您将使用顶部表视图控制器处理音频媒体，使用底部表视图控制器处理视频媒体。因此，您将需要一个音频视图控制器和一个视频视图控制器。然而，每个视图控制器实际上只是一个媒体视图控制器。因此，您将首先创建一个`MediaViewController`类，然后对它进行子类化。使用Objective-C类模板创建一个新文件。将类命名为`MediaViewController`，并将其设置为`UITableViewController`的子类。\n\
    \n您希望`MediaViewController`足够通用，以处理音频和视频媒体。这意味着您需要存储一个媒体项数组，并提供一个方法来加载这些项。打开`MediaViewController.h`。首先，您需要导入`MediaPlayer`头文件。将其添加到`UIKit`头文件导入之后。\n\
    \n```\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n我们提到您需要存储一个媒体项数组。您将把它声明为`MediaViewController`类的属性。\n\
    \n```\n@property (strong, nonatomic) NSArray *mediaItems;\n```\n\n并且您将声明一个方法来根据媒体类型填充`mediaItems`。\n\
    \n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType;\n```\n\n选择`MediaViewController.m`并调整实现。首先，您需要修复表视图数据源方法，以定义表视图中的节数和每节的行数。\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    // Return the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
    \ of rows in the section.\n    return self.mediaItems.count;\n}\n```\n\n接下来，您需要调整表视图单元格的填充方式。\n\
    \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView          \ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier        \
    \                                         forIndexPath:indexPath];\n\n// Configure\
    \ the cell. . .\n    NSUInteger row = [indexPath row];\n    MPMediaItem *item\
    \ = [self.mediaItems objectAtIndex:row];\n    cell.textLabel.text = [item valueForProperty:MPMediaItemPropertyTitle];\n\
    \    cell.detailTextLabel.text = [item valueForProperty:MPMediaItemPropertyArtist];\n\
    \    cell.tag = row;\n\nreturn cell;\n}\n```\n\n最后，您需要实现`loadMediaItemsForMediaType:`方法。\n\
    \n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType\n{\n    MPMediaQuery\
    \ *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber= [NSNumber\
    \ numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate =       \
    \  \n    [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber        \
    \                           \n    forProperty:MPMediaItemPropertyMediaType];\n\
    \    [query addFilterPredicate:predicate];\n    self.mediaItems = [query items];\n\
    }\n```\n\n您已经定义了`MediaViewController`类。现在创建您的音频和视频子类。创建一个新的Objective-C类，命名为`AudioViewController`，它将作为`MediaViewController`的子类。重复此过程，这次将文件命名为`VideoViewController`。您只需要对每个文件进行两处小的调整。首先，打开`AudioViewController.m`，并在`viewDidLoad`方法中，在调用`super`之后添加以下行：\n\
    \n```\n[self loadMediaItemsForMediaType:MPMediaTypeMusic];\n```\n\n对`VideoViewController.m`执行相同操作，但这次您需要加载视频。\n\
    \n```\n[self loadMediaItemsForMediaType:MPMediaTypeAnyVideo];\n```\n\n让您的应用使用这些新的视图控制器。选择`MainStoryboard.storyboard`打开故事板编辑器。选择顶部表视图控制器。在身份检查器中，将“自定义类”从`UITableViewController`更改为`AudioViewController`。将底部表视图控制器类更改为`VideoViewController`。\n\
    \n在继续之前，为每个视图控制器更新标签。选择音频视图控制器中的标签栏。在属性检查器中，将“标题”设置为`Music`，并将“图像”设置为`music.png`。您可以在本章的下载文件夹中找到图像文件`music.png`和`video.png`。选择视频视图控制器中的标签栏，将其标题设置为`Video`，并将其图像设置为`video.png`。\n\
    \n构建并运行您的应用。选择“音乐”标签时，您应该看到媒体库中的所有音乐，选择“视频”标签时，您应该看到媒体库中的所有视频。太好了！现在您需要支持播放。您将使用`MPMoviePlayerViewController`来播放视频，但与`SimplePlayer`一样，您需要创建一个音频播放视图控制器。您将制作一个更简单的音频播放控制器版本。创建一个新的Objective-C文件，命名为`PlayerViewController`，它将作为`UIViewController`的子类。"
  raw: "You’re going to build a new app using the MediaPlayer framework that will\
    \ allow you to play both audio and video content from your media library. You’ll\
    \ start with a tab bar controller with a tab for your audio content and another\
    \ tab for your video content ([Figure 12-9](#9781430238072_Ch12.xhtml#Fig9)).\
    \ You won’t be using a queue to order your media choices. You’ll keep this simple:\
    \ the user picks a media item, the application will play it.\n\n![9781430238072_Fig12-09.jpg](images/9781430238072_Fig12-09.jpg)\n\
    \n[Figure 12-9.](#9781430238072_Ch12.xhtml#_Fig9)  MPMediaPlayer with Music and\
    \ Video tabs\n\nCreate a new project using the Tabbed Application template. Name\
    \ the application MPMediaPlayer, and have the project use storyboards and Automatic\
    \ Reference Counting. Add the MediaPlayer framework to the MPMediaPlayer target.\
    \ If you’re not sure how to do that, review how you did it in the SimplePlayer\
    \ application.\n\nXcode will create two view controllers, FirstViewController\
    \ and SecondViewController, and provide the tab bar icons in standard size (first.png,\
    \ second.png) and double size ([first@2x.png](mailto:first@2x.png) , [second@2x.png](mailto:second@2x.png)\
    \ ). You’re going to replace these controllers and images, so delete them. Select\
    \ the controller files, FirstViewController.[hm] and SecondViewController.[hm],\
    \ and the .png files in the Navigator pane. Delete files. When Xcode asks, move\
    \ the files to the Trash. Select MainStoryboard.storyboard to open it in the storyboard\
    \ editor. Select the first view controller scene and delete it. Repeat for the\
    \ second view controller. The storyboard editor should consist of the tab bar\
    \ controller only ([Figure 12-10](#9781430238072_Ch12.xhtml#Fig10)).\n\n![9781430238072_Fig12-10.jpg](images/9781430238072_Fig12-10.jpg)\n\
    \n[Figure 12-10.](#9781430238072_Ch12.xhtml#_Fig10)  Deleting the first and second\
    \ view controllers\n\nLooking at [Figure 12-9](#9781430238072_Ch12.xhtml#Fig9),\
    \ you see that each tab controller is a table view controller. Drag a UITableViewController\
    \ from the Object Library to the right of the tab bar controller in the storyboard\
    \ editor. Control-drag from the tab bar view controller to the new table view\
    \ controller. When the Segue pop-up menu appears, select the view controllers\
    \ option under the Relationship Segue heading. Add a second UITableViewController\
    \ and control-drag from the tab bar controller to it, selecting the view controllers\
    \ option again. Align the two table view controllers and try to make your storyboard\
    \ look like [Figure 12-11](#9781430238072_Ch12.xhtml#Fig11).\n\n![9781430238072_Fig12-11.jpg](images/9781430238072_Fig12-11.jpg)\n\
    \n[Figure 12-11.](#9781430238072_Ch12.xhtml#_Fig11)  Adding the new table view\
    \ controllers\n\nSelect the table view cell from the top table view controller.\
    \ Open the Attribute Inspector and set the Style attribute to Subtitle. Give it\
    \ an Identifier attribute a value of MediaCell. Set the Selection attribute to\
    \ None, and the Accessory attribute to Disclosure Indicator. Repeat the attribute\
    \ settings for the table view cell for the bottom table view controller.\n\nYou’ll\
    \ use the top table view controller for your audio media and the bottom table\
    \ view controller for your video media. So you’ll want an audio and video view\
    \ controller. However, each view controller is really just a media view controller.\
    \ So, you’ll begin by creating a MediaViewController class, then subclass it.\
    \ Create a new file using the Objective-C class template. Name the class MediaViewController,\
    \ and make it subclass of UITableViewController.\n\nYou want the MediaViewController\
    \ to be generic enough to handle both audio and video media. That means you need\
    \ to store an array of media items and provide a method to load those items. Open\
    \ MediaViewController.h. You’ll need to import the MediaPlayer header to start.\
    \ Add it after the UIKit header import.\n\n```\n#import <MediaPlayer/MediaPlayer.h>\n\
    ```\n\nWe said you needed to store an array of media items. You’ll declare that\
    \ as a property of the MediaViewController class.\n\n@property (strong, nonatomic)\
    \ NSArray *mediaItems;\n\nAnd you’ll declare a method to populate the mediaItems\
    \ depending on media type.\n\n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType;\n\
    ```\n\nSelect MediaViewController.m and adjust the implementation. First, you\
    \ need to fix your table view data source methods to define the number of sections\
    \ and rows per section in the table view.\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    // Return the number of sections.\n    return 1;\n}\n\n\
    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    // Return the number of rows in the section.\n    return self.mediaItems.count;\n\
    }\n```\n\nNext, you want to adjust how the table view cell is populated.\n\n```\n\
    - (UITableViewCell *)tableView:(UITableView *)tableView          \ncellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell\
    \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier                                                            \
    \ forIndexPath:indexPath];\n\n// Configure the cell. . .\n    NSUInteger row =\
    \ [indexPath row];\n    MPMediaItem *item = [self.mediaItems objectAtIndex:row];\n\
        cell.textLabel.text = [item valueForProperty:MPMediaItemPropertyTitle];\n\
        cell.detailTextLabel.text = [item valueForProperty:MPMediaItemPropertyArtist];\n\
        cell.tag = row;\n\nreturn cell;\n}\n```\n\nFinally, you need to implement\
    \ your loadMediaItemsForMediaType: method.\n\n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType\n\
    {\n    MPMediaQuery *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber=\
    \ [NSNumber numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate\
    \ =         \n    [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber                                           \n\
        forProperty:MPMediaItemPropertyMediaType];\n    [query addFilterPredicate:predicate];\n\
        self.mediaItems = [query items];\n}\n```\n\nYou’ve got your MediaViewController\
    \ class defined. Let’s create your audio and video subclasses. Create a new Objective-C\
    \ class, named AudioViewController, which will be a subclass of MediaViewController.\
    \ Repeat this process, this time naming the file VideoViewController. You only\
    \ need to make two minor adjustments to each file. First, open AudioViewController.m,\
    \ and add the following line to the viewDidLoad method, after the call to super:\n\
    \n```\n[self loadMediaItemsForMediaType:MPMediaTypeMusic];\n```\n\nDo the same\
    \ for VideoViewController.m, except this time you want to load videos.\n\n```\n\
    [self loadMediaItemsForMediaType:MPMediaTypeAnyVideo];\n```\n\nLet’s get your\
    \ app to use your new view controllers. Select MainStoryboard.storyboard to open\
    \ the storyboard editor. Select the top table view controller. In the Identity\
    \ Inspector, change the Custom Class from a UITableViewController to AudioViewController.\
    \ Change the bottom table view controller class to VideoViewController.\n\nBefore\
    \ moving on, let’s update the tabs for each view controller. Select the tab bar\
    \ in the audio view controller. In the Attributes Inspector, set the Title to\
    \ “Music” and set the Image to music.png. You can find the image files, music.png\
    \ and video.png, in this chapter’s download folder. Select the tab bar in the\
    \ video view controller and set its title to “Video” and its image to video.png.\n\
    \nBuild and run your app. You should see all your media library’s music when selecting\
    \ the Music tab, and all the media library’s videos when selecting the Video tab.\
    \ Great! Now you need to support playback. You’ll be using the MPMoviePlayerViewController\
    \ to playback video, but like the SimplePlayer, you need to make an audio playback\
    \ view controller. You’re going to make an even simpler version of your audio\
    \ playback controller. Create a new Objective-C file named PlayerViewController,\
    \ which will be a subclass of UIViewController."
