- fmt: '# A Segue Defines the Transition


    `A segue` defines the transition from a scene to the next scene. In the application
    from [Chapter 2](#9781430238072_Ch02.xhtml), when you selected an event in the
    master view controller, you triggered the segue to transition to the detail view
    controller.


    But what about the arrow to the left of the navigation controller? That simply
    tells you the navigation controller is the root view controller for this storyboard.


    ## Storyboard Document Outline


    Now that you have something in your storyboard editor, let’s take a look at the
    storyboard document outline. Open it up. Now you can see the hierarchical view
    of the scenes described earlier ([Figure 3-12](#9781430238072_Ch03.xhtml#Fig12)),
    with their view controllers, views, and UI components.


    ![9781430238072_Fig03-12.jpg](images/9781430238072_Fig03-12.jpg)


    [Figure 3-12.](#9781430238072_Ch03.xhtml#_Fig12)  The story document outline,
    populated


    Let’s take a look at your work so far. Build and run the SuperDB app. You should
    see something like [Figure 3-13](#9781430238072_Ch03.xhtml#Fig13).


    ![9781430238072_Fig03-13.jpg](images/9781430238072_Fig03-13.jpg)


    [Figure 3-13.](#9781430238072_Ch03.xhtml#_Fig13)  The SuperDB app so far


    ## Application Architecture


    There’s no single right architecture for every application. One obvious approach
    would be to make the application a tabbed application, and then add a separate
    navigation controller for each tab. In a situation where each tab corresponds
    to a completely different view showing different types of data, this approach
    would make perfect sense. In [Chapter 7](#9781430238072_Ch07.xhtml) of *Beginning
    iOS 6 Development*, you used that exact approach because every single tab corresponded
    to a different view controller with different outlets and different actions.


    In this case, however, you’re going to implement two tabs (with more to be added
    in later chapters), but each tab will show exactly the same data, just ordered
    differently. When one tab is selected, the table will be ordered by the superhero’s
    name. If the other tab is selected, the same data will be shown but ordered by
    the superhero’s secret identity.


    Regardless of which tab is selected, tapping a row on the table will do the same
    thing: drill down to a new view where you can edit the information about the superhero
    you selected (which you will add in the next chapter). Regardless of which tab
    is selected, tapping the Add button will add a new instance of the same entity.
    When you drill down to another view to view or edit a hero, the tabs are no longer
    relevant.


    For your application, the tab bar is just modifying the way the data in a single
    table is presented. There’s no need for it to actually swap in and out other view
    controllers. Why have multiple navigation controller instances all managing identical
    sets of data and responding the same way to touches? Why not just use one table
    controller and have it change the way it presents the data based on which tab
    is selected? This is the approach you’re going to take in this application. As
    a result, your application won’t be a true tabbed application.


    Your root view controller will be a navigation controller, and you’ll use a tab
    bar purely to receive input from the user. The end result that is shown to the
    user will be identical to what they’d see if you created separate navigation controllers
    and table view controllers for each tab. Behind the scenes you’ll be using less
    memory and won’t have to worry about keeping the different navigation controllers
    in sync with each other.


    Your application’s root view controller will be an instance of `UINavigationController`.
    You’ll create your own custom view controller class, `HeroListController`, to
    act as the root view controller for this `UINavigationController`. `HeroListController`
    will display the list of superheroes along with the tabs that control how the
    heroes are displayed and ordered.


    Here’s how the app will work. When the application starts, an instance of `HeroListController`
    is loaded from the Storyboard file. Then an instance of `UINavigationController`
    is created with the `HeroListController` instance as its root view controller.
    Finally, the `UINavigationController` is set as the application’s root view controller.
    The view associated with the `HeroListController` contains your tab bar and your
    superhero table view.


    In [Chapter 4](#9781430238072_Ch04.xhtml), you’ll add a table view controller
    into the mix to implement a detail superhero view. When the user taps on a superhero
    in the superhero list, this detail controller will be pushed onto the navigation
    stack and its view will temporarily replace the `HeroListController`’s view in
    the `UINavigationController`’s content view. No need to worry about the detail
    view now; we just wanted you to see what’s coming.


    ## Designing the View Controller Interface


    Your application’s root view controller is now a stock `UINavigationController`.
    You didn’t need to write any code for it; you just dropped a navigation controller
    object into your storyboard. Xcode also gave you a `UITableViewController` as
    the root of the navigation controller’s stack. Even though you will be using a
    table to display the list of heroes, you’re not going to subclass `UITableViewController`.
    Because you also need to add a tab bar to your interface, you’re going to create
    a subclass of `UIViewController` and create your interface in the storyboard editor.
    The table that will display the list of heroes will be a subview of your view
    controller’s content pane.


    If not already selected, select the `SuperDB.storyboard` in the Navigation pane.
    Also make sure the Utility pane is exposed. The storyboard should have two scenes:
    the Navigation Controller and the Table View Controller - Root. Zoom out so that
    both scenes are visible. Select the Table View Controller - Root. Only the Table
    View Controller - Root scene and label should be highlighted blue. Delete the
    table view controller by hitting the Delete key or Edit ![image](images/arrow.jpg)
    Delete. You should now only have the navigation controller.


    From the bottom of the Utility pane, select a view controller from the Object
    library and drag it to the storyboard editor. A view controller should appear;
    place it to the right of the navigation controller ([Figure 3-14](#9781430238072_Ch03.xhtml#Fig14)).


    ![9781430238072_Fig03-14.jpg](images/9781430238072_Fig03-14.jpg)


    [Figure 3-14.](#9781430238072_Ch03.xhtml#_Fig14)  The storyboard with a new view
    controller scene


    Before you lay out the new view controller, let’s connect it to the navigation
    controller. Select the navigation controller. Click the Zoom In button until the
    navigation controller changes to display three icons ([Figure 3-15](#9781430238072_Ch03.xhtml#Fig15)).
    Hover the pointer over the left-most icon. A pop-up window should appear with
    the words navigation controller. Control-drag from the navigation controller icon
    to the view of the view controller. When you release the pointer, you should see
    a pop-up menu of possible segue assignments ([Figure 3-16](#9781430238072_Ch03.xhtml#Fig16)).
    Select root view controller in the Relationship Segue section. You should see
    a segue appear between the navigation controller and the view controller. Also,
    the view controller should now have a navigation bar along the top.


    ![9781430238072_Fig03-15.jpg](images/9781430238072_Fig03-15.jpg)


    [Figure 3-15.](#9781430238072_Ch03.xhtml#_Fig15)  Navigation controller label
    icons


    ![9781430238072_Fig03-16.jpg](images/9781430238072_Fig03-16.jpg)


    [Figure 3-16.](#9781430238072_Ch03.xhtml#_Fig16)  Possible segue assignments'
  raw: 'A segue defines the transition from a scene to the next scene. In the application
    from [Chapter 2](#9781430238072_Ch02.xhtml), when you selected an event in the
    master view controller, you triggered the segue to transition to the detail view
    controller.


    But what about the arrow to the left of the navigation controller? That simply
    tells you the navigation controller is the root view controller for this storyboard.


    Storyboard Document Outline


    Now that you have something in your storyboard editor, let’s take a look at the
    storyboard document outline. Open it up. Now you can see the hierarchical view
    of the scenes described earlier ([Figure 3-12](#9781430238072_Ch03.xhtml#Fig12)),
    with their view controllers, views, and UI components.


    ![9781430238072_Fig03-12.jpg](images/9781430238072_Fig03-12.jpg)


    [Figure 3-12.](#9781430238072_Ch03.xhtml#_Fig12)  The story document outline,
    populated


    Let’s take a look at your work so far. Build and run the SuperDB app.  You should
    see something like [Figure 3-13](#9781430238072_Ch03.xhtml#Fig13).


    ![9781430238072_Fig03-13.jpg](images/9781430238072_Fig03-13.jpg)


    [Figure 3-13.](#9781430238072_Ch03.xhtml#_Fig13)  The SuperDB app so far


    Application Architecture


    There’s no single right architecture for every application. One obvious approach
    would be to make the application a tabbed application, and then add a separate
    navigation controller for each tab. In a situation where each tab corresponds
    to a completely different view showing different types of data, this approach
    would make perfect sense. In [Chapter 7](#9781430238072_Ch07.xhtml) of *Beginning
    iOS 6 Development*, you used that exact approach because every single tab corresponded
    to a different view controller with different outlets and different actions.


    In this case, however, you’re going to implement two tabs (with more to be added
    in later chapters), but each tab will show exactly the same data, just ordered
    differently. When one tab is selected, the table will be ordered by the superhero’s
    name. If the other tab is selected, the same data will be shown but ordered by
    the superhero’s secret identity.


    Regardless of which tab is selected, tapping a row on the table will do the same
    thing: drill down to a new view where you can edit the information about the superhero
    you selected (which you will add in the next chapter). Regardless of which tab
    is selected, tapping the Add button will add a new instance of the same entity.
    When you drill down to another view to view or edit a hero, the tabs are no longer
    relevant.


    For your application, the tab bar is just modifying the way the data in a single
    table is presented. There’s no need for it to actually swap in and out other view
    controllers. Why have multiple navigation controller instances all managing identical
    sets of data and responding the same way to touches? Why not just use one table
    controller and have it change the way it presents the data based on which tab
    is selected? This is the approach you’re going to take in this application. As
    a result, your application won’t be a true tabbed application.


    Your root view controller will be a navigation controller, and you’ll use a tab
    bar purely to receive input from the user. The end result that is shown to the
    user will be identical to what they’d see if you created separate navigation controllers
    and table view controllers for each tab. Behind the scenes you’ll be using less
    memory and won’t have to worry about keeping the different navigation controllers
    in sync with each other.


    Your application’s root view controller will be an instance of UINavigationController.
    You’ll create your own custom view controller class, HeroListController, to act
    as the root view controller for this UINavigationController. HeroListController
    will display the list of superheroes along with the tabs that control how the
    heroes are displayed and ordered.


    Here’s how the app will work. When the application starts, an instance of HeroListController
    is loaded from the Storyboard file. Then an instance of UINavigationController
    is created with the HeroListController instance as its root view controller. Finally,
    the UINavigationController is set as the application’s root view controller.  The
    view associated with the HeroListController contains your tab bar and your superhero
    table view.


    In [Chapter 4](#9781430238072_Ch04.xhtml), you’ll add a table view controller
    into the mix to implement a detail superhero view. When the user taps on a superhero
    in the superhero list, this detail controller will be pushed onto the navigation
    stack and its view will temporarily replace the HeroListController’s view in the
    UINavigationController’s content view. No need to worry about the detail view
    now; we just wanted you to see what’s coming.


    Designing the View Controller Interface


    Your application’s root view controller is now a stock UINavigationController.
    You didn’t need to write any code for it; you just dropped a navigation controller
    object into your storyboard. Xcode also gave you a UITableViewController as the
    root of the navigation controller’s stack. Even though you will be using a table
    to display the list of heroes, you’re not going to subclass UITableViewController.
    Because you also need to add a tab bar to your interface, you’re going to create
    a subclass of UIViewController and create your interface in the storyboard editor.
    The table that will display the list of heroes will be a subview of your view
    controller’s content pane.


    If not already selected, select the SuperDB.storyboard in the Navigation pane.
    Also make sure the Utility pane is exposed. The storyboard should have two scenes:
    the Navigation Controller and the Table View Controller - Root. Zoom out so that
    both scenes are visible. Select the Table View Controller - Root. Only the Table
    View Controller - Root scene and label should be highlighted blue. Delete the
    table view controller by hitting the Delete key or Edit ![image](images/arrow.jpg)
    Delete. You should now only have the navigation controller.


    From the bottom of the Utility pane, select a view controller from the Object
    library and drag it to the storyboard editor. A view controller should appear;
