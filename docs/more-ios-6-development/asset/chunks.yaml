    \n你可以使用属性列表来镜像表格的结构。当用户在应用中向下导航时，你可以利用存储在属性列表中的数据来构建相应的表格。属性列表是一种简单但强大的信息存储方式。\n\
    \n*Beginning iOS 6 Development* 的第 10 章讨论了属性列表。我们在这里快速回顾一下。\n\n### 属性列表详解\n\n\
    属性列表是一种表示、存储和检索数据的简单方式。Mac OS X 和 iOS 都广泛使用属性列表。在属性列表中，可以使用两种数据类型：基本类型和集合类型。可用的基本类型包括字符串、数字、二进制数据、日期和布尔值。可用的集合类型包括数组和字典。集合类型可以包含基本类型，也可以包含其他集合。属性列表可以以两种文件格式存储：XML\
    \ 和二进制数据。Xcode 提供了一个属性列表编辑器，方便你管理属性列表。稍后我们将讨论这一点。\n\n属性列表以一个 *根节点* 开始。从技术上讲，根节点可以是任何类型（基本类型或集合类型）。然而，基本类型的属性列表用途有限，因为它只是单个值的“列表”。更常见的是使用集合类型的根节点：数组或字典。当你使用\
    \ Xcode 属性列表编辑器创建属性列表时，根节点将是一个字典。\n\n**注意** 要了解更多关于属性列表的详细信息，请阅读 Apple 的文档：[`developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html)\n\
    \n### 使用属性列表建模表格结构\n\n那么，如何使用属性列表来描述你的表格呢？请参考图 4-2。查看表格，你可以看到两个分区。第一个分区没有标题，但第二个分区有一个“General”标题。每个分区有一定数量的行（分别为一行和三行），每行代表托管对象的一个特定属性。此外，每行还有一个标签，告诉你正在显示什么值。\n\
    \n首先，将表格表示为一个数组，数组中的每一项代表表格的一个分区。每个分区又由一个字典表示。在分区字典中，有一个`header`键，用于存储标题的字符串值。请注意，表格的第一个分区没有标题；你可以使用一个空字符串来表示。\n\
    \n**注意** 回想一下，属性列表中只有五种基本数据类型：字符串、数字、二进制数据、日期和布尔值。这无法表示`nil`值。因此，你必须依赖空字符串来表示`nil`。\n\
    \n分区字典的第二个键是`rows`。这个键的值将是另一个数组，`rows`数组中的每一项代表渲染该行所需的数据。为了表示一行，你将使用另一个字典。这个行字典有一个`label`键，引用一个用作行标签的字符串，以及一个`attribute`键，这是一个字符串，表示要在该行渲染的托管对象属性。\n\
    \n感到困惑吗？别担心，用描述性语言来建模确实很难。图 4-12 试图以图形方式解释它。\n\n![9781430238072_Fig04-12.jpg](img/9781430238072_Fig04-12.jpg)\n\
    \n图 4-12. 属性列表的图形化表示\n\n这应该就是你开始表示表格结构所需的所有数据结构。幸运的是，如果你发现每行还需要额外信息，你随时可以在后续添加更多数据，而不会影响现有的设计。\n\
    \n现在让我们开始构建你的详细视图。\n\n### 通过属性列表定义表格视图\n\n在导航窗格中，选择 Supporting Files 组，使其高亮显示。然后，创建一个新文件。当新文件模板出现后，在\
    \ iOS 标题下选择 Resource。选择 Property List 模板（图 4-13），然后点击 Next。将文件命名为 `HeroDetailConfiguration.plist`，然后点击\
    \ Create。一个名为 `HeroDetailConfiguration.plist` 的新文件应该会出现在 Supporting Files 组中。该文件应被选中，并且编辑器应切换到属性列表编辑器模式（图\
    \ 4-14）。\n\n![9781430238072_Fig04-13.jpg](img/9781430238072_Fig04-13.jpg)\n\n\
    图 4-13. 资源文件模板\n\n![9781430238072_Fig04-14.jpg](img/9781430238072_Fig04-14.jpg)\n\
    \n图 4-14. Xcode 属性列表编辑器模式\n"
- fmt: 'Earlier we stated that the root node of a property list is a dictionary. That
    means each node will be a key/value pair. You can treat the key as a string, and
    the value can be of any of the primitive (`string`, `number`, `binary data`, `date`,
    or `Boolean`) or collection (`array` or `dictionary`) data types.


    You’re going to start by creating the `sections` array, as we discussed earlier.
    To do so, you need to add a new item to the property list. There are two ways
    to do this. Both methods require you select the row with the name `Root` in the
    Key column. Using the first method, control-click in the blank area of the property
    list editor. When the pop-up menu appears, choose Add Row. Alternately, you can
    use the regular menu Editor ![image](images/arrow.jpg) Add Item option. Either
    way, a new row should appear in the property list editor ([Figure 4-15](#9781430238072_Ch04.xhtml#Fig15)).
    The item should have a key of `New item`, which will be selected and highlighted.
    Type **sections** and press Return to change the key name.


    ![9781430238072_Fig04-15.jpg](images/9781430238072_Fig04-15.jpg)


    [Figure 4-15.](#9781430238072_Ch04.xhtml#_Fig15)  Adding an item to the property
    list


    Next, click the arrows next to `string` under the Type column to expose the possible
    data types. Select `array`. The Value column should change to read `(0 items)`.
    Adding items to the `sections` array is a little tricky, so make sure you follow
    the next steps carefully.


    When you changed the type from `string` to `array`, a disclosure triangle was
    added to the left of the `sections` key ([Figure 4-16](#9781430238072_Ch04.xhtml#Fig16)).
    Click this triangle so it is pointed downward ([Figure 4-17](#9781430238072_Ch04.xhtml#Fig17)).
    Now click the `+` button to the right of the `sections`. This will insert a new
    row. Additionally, the Value column for `sections` will change to read `(1 item)`.
    The key of the new row will be `Item 0`; the type will be `string`; the Value
    column will be selected. Don’t type anything; select the `sections` row so it
    is highlighted and click the `+` next to `sections` again. This will insert another
    row with the key `Item 1`, of type `string`, with no value. The Value cell should
    be selected with a cursor. Change the type for `Item 0` and `Item 1` from `string`
    to `dictionary` ([Figure 4-18](#9781430238072_Ch04.xhtml#Fig18)).


    ![9781430238072_Fig04-16.jpg](images/9781430238072_Fig04-16.jpg)


    [Figure 4-16.](#9781430238072_Ch04.xhtml#_Fig16)  Changing the type from `string`
    to `array`


    ![9781430238072_Fig04-17.jpg](images/9781430238072_Fig04-17.jpg)


    [Figure 4-17.](#9781430238072_Ch04.xhtml#_Fig17)  Click the disclosure triangle
    to open the array


    ![9781430238072_Fig04-18.jpg](images/9781430238072_Fig04-18.jpg)


    [Figure 4-18.](#9781430238072_Ch04.xhtml#_Fig18)  Adding two dictionary items


    Remember that you were going to create an array where each item in the array represented
    a section of your table view? You’ve created those two items. `Item 0` is the
    first section of `HeroDetailController` table view; `Item 1` is the second.


    Now you create the `rows` array under each section to hold the row information
    for each section. Next to `Item0` there should be a disclosure triangle. Open
    it, and click the `+` next to `Item0`. This will create a new row with key `New
    Item`, of type `string`, under `Item0`. Change the key to `rows`, and change the
    type to `array`. Open the disclosure triangle next to `rows`, and click the `+`
    button. This will create another `Item0`, this time under `rows`. Change the type
    from `string` to `dictionary`. Repeat this procedure, adding a `rows` item under
    the `Item1` header. This time, create three items under this second `rows` item.
    Your property list editor should look like [Figure 4-19](#9781430238072_Ch04.xhtml#Fig19).


    ![9781430238072_Fig04-19.jpg](images/9781430238072_Fig04-19.jpg)


    [Figure 4-19.](#9781430238072_Ch04.xhtml#_Fig19)  `HeroDetailConfiguration.plist`


    For each item in each `rows` array, you need to add two more entries. They should
    be of type `string`, and their keys should be `key` and `label`, respectively.
    For section ![image](images/arrow.jpg) `Item 0` ![image](images/arrow.jpg) `rows`,
    the `key` value should be `name` and the `label` value should be set to `Name`.
    For section ![image](images/arrow.jpg) `Item 1` ![image](images/arrow.jpg) `rows`,
    the values for `key` and `label` should be `secretIdentity` and `Identity`; `birthdate`
    and `Birthdate`; `sex` and `Sex`. When completed, the property list editor pane
    should look like [Figure 4-20](#9781430238072_Ch04.xhtml#Fig20).


    ![9781430238072_Fig04-20.jpg](images/9781430238072_Fig04-20.jpg)


    [Figure 4-20.](#9781430238072_Ch04.xhtml#_Fig20)  The completed `HeroDetailConfiguration.plist`


    Now, you’ll use this property list to set up the `HeroDetailController` table
    view.


    ## Parsing the Property List


    You need to add a property to store the information from the property list you
    just created. Since this property only needs to be used by the `HeroDetailController`
    internally, you’ll make it a private, via the category inside of `HeroDetailController.m`.


    ```

    @interface HeroDetailController ()

    @property (strong, nonatomic) NSArray *sections;

    @end

    ```


    Next, you need to load the property list and read the `sections` key. Before the
    end of `viewDidLoad`, add the following:


    ```

    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"HeroDetailConfiguration"

                                               withExtension:@"plist"];

    NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];

    self.sections = [plist valueForKey:@"sections"];

    ```


    You declare a property, `sections`, of type `NSArray`, to hold the contents of
    the `sections` array in your `HeroDetailConfiguration.plist` property list. You
    read in the contents of the property list using the `NSDictionary` class method
    `dictionaryWithContentsOfURL:`. Since you know that this dictionary only has one
    key/value pair, with a key of `sections`, you read that value into `sections`
    property. You then use that property to layout the `HeroDetailController` table
    view.


    You now have the metadata needed to populate your `HeroDetailController`’s table
    view cells, but you don’t have the data. The data should come from the `HeroListController`
    in one of two ways: when the user taps on a cell and when the user taps on the
    Add (`+`) button.


    ## Pushing the Details


    Before you can send the data down from the `HeroListController`, you need something
    to receive it in the `HeroDetailController`. Add the following property to the
    `HeroDetailController` interface declaration in `HeroDetailController.h`:


    ```

    @property (strong, nonatomic) NSManagedObject *hero;

    ```


    Now edit the `HeroListController.m`. Find the `addHero:` method. Change the line
    that reads


    ```

    [NSEntityDescription insertNewObjectForEntityForName:[entity name]

                                   inManagedObjectContext:managedObjectContext];

    ```


    to


    ```

    NSManagedObject *newHero = [NSEntityDescription insertNewObjectForEntityForName:[entity
    name]

                                                     inManagedObjectContext:managedObjectContext];

    Then add the following to the end:

    [self performSegueWithIdentifier:@"HeroDetailSegue" sender:newHero];

    ```


    First, you assign your new `Hero` instance to the variable `newHero`. Then you
    told the `HeroListController` to execute the segue named `HeroDetailSegue` and
    pass `newHero` as the sender. Where did that segue name, `HeroDetailSegue`, come
    from? From you.


    Remember the segue you created earlier for when a user taps on a cell in the `HeroListController`?
    Well, now you’re going to get rid of it. Why? Because it doesn’t give you the
    flexibility you need to transition from both a cell and the Add (`+`) button.
    You need to create a manual segue and invoke it from code.'
