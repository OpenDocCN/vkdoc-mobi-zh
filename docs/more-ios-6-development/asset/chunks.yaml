    你添加了一些自定义初始化代码到 `initWithStyle:reuseIdentifier:` 中。这是你实例化 `datePicker` 属性并将其赋值给
    `textField` 的 `inputView` 属性的地方。通常 `inputView` 为 `nil`，这告诉 iOS 对 `textField` 使用键盘输入视图。通过为其分配一个替代视图，你告诉
    iOS 在编辑 `textField` 时显示该替代视图。


    `SuperDBDateCell` 重写了 `value` 属性，以确保你显示和返回一个 `NSDate`，而不是 `NSString`。这里你使用 `__dateFormatter`
    将日期转换为字符串，然后将其赋值给 `textField` 的 `text` 属性。


    最后，你实现了当通过 UI 更改日期时 `datePicker` 的回调。每次你在 `datePicker` 中更改日期，都要更新 `textField`
    以反映该更改。


    ## 使用 DatePicker SuperDBEditCell 子类


    让我们回顾一下表格视图单元格是如何创建的。在 `HeroDetailController` 中，你在 `tableView:cellForRowAtIndexPath:`
    方法中创建了单元格。当你第一次编写此方法时，你创建了一个 `UITableViewCell` 实例。后来，你将其替换为自定义子类 `SuperDBEditCell`
    的实例。现在你为特定的 `IndexPath`（即显示出生日期属性的那个 `IndexPath`）创建了另一个子类。你如何告诉你的应用程序使用哪个自定义子类？没错，你将把那个信息添加到你的属性列表中：`HeroDetailController.plist`。


    单击 `HeroDetailController.plist`。展开所有展开三角形，以便你可以看到所有元素。向下导航到 sections ![image](img/arrow.jpg)
    Item 0 ![image](img/arrow.jpg) rows ![image](img/arrow.jpg) Item 0 ![image](img/arrow.jpg)
    key。单击 key 行使其高亮显示。单击 key 旁边的 `+` 按钮。将此行从 `New Item` 重命名为 `class`。在 value 列中，键入
    `SuperDBEditCell`。对 sections ![image](img/arrow.jpg) Item 1 下的所有 key 行重复此操作。它们都应该有值
    `SuperDBEditCell`，除了 birthdate 键下方的 class 行。该行的值应为 `SuperDBDateCell`（图 4-27）。


    ![9781430238072_Fig04-27.jpg](img/9781430238072_Fig04-27.jpg)


    图 4-27.  添加表格视图单元格类键后的 `HeroDetailController.plist`


    你需要修改 `tableView:cellForRowAtIndexPath:` 以利用你刚刚放置在属性列表中的信息。打开 `HeroDetailController.m`，并将
    `tableView:cellForRowAtIndexPath:` 编辑为如下所示：


    ```

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath

    {

        NSUInteger sectionIndex = [indexPath section];

        NSUInteger rowIndex = [indexPath row];

        NSDictionary *section = [self.sections objectAtIndex:sectionIndex];

        NSArray *rows = [section objectForKey:@"rows"];

        NSDictionary *row = [rows objectAtIndex:rowIndex];

        NSString *cellClassname = [row valueForKey:@"class"];

        SuperDBEditCell *cell = [tableView dequeueReusableCellWithIdentifier:cellClassname];

        if (cell == nil) {

            Class cellClass = NSClassFromString(cellClassname);

            cell = [cellClass alloc];

            cell = [cell initWithStyle:UITableViewCellStyleValue2 reuseIdentifier:cellClassname];

        }

        // 配置单元格...

        cell.key = [row objectForKey:@"key"];

        cell.value = [self.hero valueForKey:[row objectForKey:@"key"]];

        cell.label.text = [row objectForKey:@"label"];

        return cell;

    }

    ```


    保存并运行应用程序。向下导航到详细信息视图，并进入编辑模式。单击标签旁边的 `Birthdate` 单元格。附件输入视图应该会出现，并且应该是一个设置为今天日期的日期选择器。当你在日期选择器中更改日期时，表格视图单元格中的日期应该会更改。


    还有一个输入需要处理。这个版本的应用程序使用字符串属性编辑器来征求超级英雄的性别（抱歉，我们忍不住要提一下！）。这意味着除了输入是一个有效字符串之外，没有其他验证。用户可以输入
    M、Male、MALE 或 Yes, Please，它们都会被应用程序欣然接受。这意味着，稍后如果你想按性别让用户排序或搜索他们的英雄，你可能会遇到问题，因为数据不会以一致的方式结构化。接下来你将处理这个问题。


    ## 实现选择拾取器


    正如你之前所见，你可以通过使用正则表达式来强制规定特定的性别拼写，如果用户输入了 Male 或 Female 以外的内容，就弹出一个警告。这样做可以防止输入你不希望的值，但这种方法不太友好。你不想惹恼你的用户。为什么非要让他们打字呢？这里只有两种可能的选择。为什么不呈现一个选择列表，让用户直接点击他们想要的那个？嘿，这听起来是个好主意！很高兴你想到这个。现在让我们实现它，好吗？


    再次创建一个新的 Objective-C 类，并使其成为 `SuperDBEditCell` 的子类。将类命名为 `SuperDBPickerCell`，因为它将使用
    `UIPickerView`。你将要做的许多事情与为 `SuperDBDateCell` 所做的类似，但也有一些关键的区别。


    编辑 `SuperDBPickerCell.h` 中的接口定义，使其如下所示：


    ```

    @interface SuperDBPickerCell : SuperDBEditCell < UIPickerViewDataSource, UIPickerViewDelegate>


    @property (strong, nonatomic) NSArray *values;


    @end

    ```


    该属性名为 `pickerValues`，它将保存可能的选项。你还在 `SuperDBPickerCell` 中添加了 `UIPickerViewDataSource`
    和 `UIPickerViewDelegate` 协议。


    现在，让我们编辑 `SuperDBPickerCell.m` 中 `SuperDBPickerCell` 的实现：


    ```

    @interface SuperDBPickerCell ()

    @property (strong, nonatomic) UIPickerView *pickerView;

    @end


    @implementation SuperDBPickerCell


    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            self.textField.clearButtonMode = UITextFieldViewModeNever;

            self.pickerView = [[UIPickerView alloc] initWithFrame:CGRectZero];

            self.pickerView.dataSource = self;

            self.pickerView.delegate = self;

            self.pickerView.showsSelectionIndicator = YES;

            self.textField.inputView = self.pickerView;

        }

        return self;

    }

    #pragma mark UIPickerViewDataSource 方法

    - (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView

    {

        return 1;

    }

    - (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component

    {

        return [self.values count];

    }

    #pragma mark - UIPickerViewDelegate 方法

    - (NSString *)pickerView:(UIPickerView *)pickerView

                  titleForRow:(NSInteger)row

                 forComponent:(NSInteger)component

    {

        return [self.values objectAtIndex:row];

    }

    - (void)pickerView:(UIPickerView *)pickerView

           didSelectRow:(NSInteger)row        inComponent:(NSInteger)component

    {

        self.value = [self.values objectAtIndex:row];

    }

    #pragma mark - SuperDBEditCell 重写方法

    - (void)setValue:(id)value

    {

        if (value != nil) {

            NSInteger index = [self.values indexOfObject:value];

            if (index != NSNotFound) {

                self.textField.text = value;

            }

        }

        else {

            self.textField.text = nil;

        }

    }

    @end

    ```

    '
- fmt: '`SuperDBPickerCell` is conceptually identical to `SuperDBDateCell`. Rather
    than using an `NSDatePicker`, you use a `UIPickerView`. In order to tell the `pickerView`
    what to display, you need to have `SuperDBDateCell` conform to the protocols `UIPickerViewDataSource`
    and `UIPickerViewDelegate`. Rather than having a callback on the `pickerView`
    to indicate when the picker value has changed, you use the delegate method `pickerView:didSelectRow:`.
    Since you’re storing the value as a string, you don’t need to override the implementation
    of the value accessor method. However, you do need to override the value mutator.


    You need to tell the application to use this new class for the Sex attribute.
    Edit the class row in the property list, `HeroDetailController.plist`. Change
    the value from `SuperDBEditableCell` to `SuperDBPickerCell`. Make sure you are
    changing the right row. The label row should read Sex, and the attribute row should
    read sex.


    If you run the application now and try to edit the Sex attribute, you should see
    the picker wheel appear on the bottom on of the screen. However, there are no
    values to choose from. If you look back at the code you just added, the picker
    wheel gets its information from the `values` property. But you never set this.
    Again, you could hardcode this in the `SuperDBPickerCell` object, but that would
    limit the usefulness of this object. Instead, you’ll add a new item to the property
    list.


    Just like you did earlier with the class item, you need to add a new key, which
    you’ll call `values`. Unlike the class key, you’ll only add it to the item with
    the `sex` key. Edit the `HeroDetailController.plist` and open all the nodes. For
    the last item, find the row with the key `label`. Click the + button on that row.
    Name the new item `values` and change its type to array. Add two string items
    to the `values` array and give them the values `Male` and `Female`. See [Figure
    4-28](#9781430238072_Ch04.xhtml#Fig27).


    ![9781430238072_Fig04-28.jpg](images/9781430238072_Fig04-28.jpg)


    Figure 4-28.   HeroDetailController.plist with values for the sex item


    Now you need to pass the contents of `values` to table view cell when `tableView:cellForRowAtIndexPath:`
    is in the `HeroDetailController`. Open `HeroDetailController.m`, and add the following
    to `tableView:cellForRowAtIndexPath:` before the other cell configuration code:


    ```

    NSArray *values = [row valueForKey:@"values"];

    if (values != nil) {

        // TODO clean this up - ugh

        [cell performSelector:@selector(setValues:) withObject:values];

    }

    ```


    Build and run the app. Navigate down to the detail view and tap the Edit button.
    Tap on the Sex cell, and the picker view should appear with the choices Male and
    Female. Set the value, tap Save, and the Sex cell should be populated.


    ## Devil’s End


    Well, you’re at the end of a long and conceptually difficult chapter. You should
    congratulate yourself on making it all the way through with us. Table-based detail
    editing view controllers are some of the hardest controller classes to write well,
    but now you have a handful of tools in your toolbox to help you create them. You’ve
    seen how to use a property list to define your table view’s structure, you’ve
    seen how to create a custom `UITableViewCell` subclasses to edit different types
    of data, and you’ve also seen how to use Objective-C’s dynamic nature to create
    instances of classes based on the name of the class stored in an `NSString` instance.


    Ready to move on? Turn the page. Let’s get going!


    # Chapter 5


    ## Preparing for Change: Migrations and Versioning


    By the end of [Chapter 4](#9781430238072_Ch04.xhtml) you had mastered a great
    deal of the Core Data architecture and functionality by building a fully functioning,
    albeit somewhat simple, Core Data application. You’ve now got enough Core Data
    chops to build a solid app, send it to your testers, and then on to the App Store.


    But what happens if you change your data model and send a new version of your
    application out to testers who already have the previous version? Consider the
    SuperDB app. Let’s say you decide to add a new attribute to the `Hero` entity;
    make one of the existing, currently optional attributes required; and then add
    a new entity. Can you just send the program out to your users or will this cause
    problems with their data?


    As things stand right now, if you make changes to your data model, the existing
    data sitting in the user’s persistent store on their iPhone will be unusable in
    the new version of your application. Your application will crash on launch. If
    you launch the new version from Xcode, you will see a big, scary error message
    like the following:


    ```

    2012-07-17 17:33:56.641 SuperDB[11233:c07] Unresolved error Error Domain = NSCocoaErrorDomain
    Code = 134100 "The operation couldn''t be completed. (Cocoa error 134100.)" UserInfo
    = 0x80a3b30 {metadata = {

        NSPersistenceFrameworkVersion = 409;

        NSStoreModelVersionHashes =     {

            Hero = <0fe30005 4578f63c 124e2af7 3798fb56 7a194f27 f9281223 bd265ee3
    d985d2fc>;

        };

        NSStoreModelVersionHashesVersion = 3;

        NSStoreModelVersionIdentifiers =     (

            ""

        );

        NSStoreType = SQLite;

        NSStoreUUID = "719284D9-793C-48A7-8F3E-C633CD4F0402";

        "_NSAutoVacuumLevel" = 2;

    }, reason = The model used to open the store is incompatible with the one used
    to create the store}, {

        metadata =     {

            NSPersistenceFrameworkVersion = 409;

            NSStoreModelVersionHashes =         {

                Hero = <0fe30005 4578f63c 124e2af7 3798fb56 7a194f27 f9281223 bd265ee3
    d985d2fc>;

            };

            NSStoreModelVersionHashesVersion = 3;

            NSStoreModelVersionIdentifiers =         (

                ""

            );

            NSStoreType = SQLite;

            NSStoreUUID = "719284D9-793C-48A7-8F3E-C633CD4F0402";

            "_NSAutoVacuumLevel" = 2;

        };

        reason = "The model used to open the store is incompatible with the one used
    to create the store";

    }

    ```


    If this happens in development, it’s not usually a big deal. If nobody else has
    a copy of your app and you don’t have any irreplaceable data stored in it, you
    can just select “Reset Content and Settings” from the iPhone Simulator menu in
    the simulator or uninstall the application from your iPhone using Xcode’s Organizer
    window, and Core Data will create a new persistent store based on the revised
    data model the next time you install and run your application.


    If, however, you have given the application to others, they will be stuck with
    an unusable application on their iPhone unless they uninstall and re-install the
    application, thereby losing all of their existing data.


    As you probably imagine, this is not something that makes for particularly happy
    customers. In this chapter, we’re going to show you how to version your data model.
    Then we’ll talk about Apple’s mechanism for converting data between different
    data model versions, which are called migrations. We’ll talk about the difference
    between the two types of migrations: lightweight migrations and standard migrations.
    Then you will set up the SuperDB Xcode project to use lightweight migrations so
    that the changes you make in the next few chapters won’t cause problems for your
    (admittedly non-existent) users.


    At the end of this chapter, the SuperDB application will be all set up and ready
    for new development, including changes to your data model, without having to worry
    about your users losing their data when you ship a new version.


    ## About Data Models'
