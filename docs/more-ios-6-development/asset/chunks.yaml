- fmt: 'Below the `Name` field are three checkboxes: `Transient`, `Optional`, and
    `Indexed`. If `Optional` is checked, then this entity can be saved even if this
    attribute has no value assigned to it. If you uncheck it, then any attempt to
    save a managed object based on this entity when the `name` attribute is nil will
    result in a validation error that will prevent the save. In this particular case,
    `name` is the main attribute that you will use to identify a given hero, so you
    probably want to require this attribute. Single-click the `Optional` checkbox
    to uncheck it, making this field required.


    The `Transient` checkbox allows you to create attributes that are not saved in
    the persistent store. They can also be used to create custom attributes that store
    non-standard data. For now, don’t worry too much about `Transient`. Just leave
    it unchecked; you’ll revisit this checkbox in [Chapter 6](#9781430238072_Ch06.xhtml).


    The final checkbox, `Indexed`, tells the underlying data store to add an index
    on this attribute. Not all persistent stores support indices, but the default
    store (SQLite) does. The database uses an index to improve search speeds when
    searching or ordering based on that field. You will be ordering your superheroes
    by name, so check the `Indexed` checkbox to tell SQLite to create an index on
    the column that will be used to store this attribute’s data.


    **Caution** Properly used, indices can greatly improve performance in a SQLite
    persistent store. Adding indices where they are not needed, however, can actually
    degrade performance. If you don’t have a reason for selecting `Indexed`, leave
    it unchecked.


    ## Attribute Types


    Every attribute has a type, which identifies the kind of data that the attribute
    is capable of storing. If you single-click the `Attribute Type` drop-down (which
    should currently be set to `Undefined`), you can see the various datatypes that
    Core Data supports out of the box ([Figure 3-38](#9781430238072_Ch03.xhtml#Fig38)).
    These are all the types of data that you can store without having to implement
    a custom attribute, like you’re going to do in [Chapter 6](#9781430238072_Ch06.xhtml).
    Each of the data types correspond to an Objective-C class that is used to set
    or retrieve values, and you must make sure to use the correct object when setting
    values on managed objects.


    ![9781430238072_Fig03-38.jpg](images/9781430238072_Fig03-38.jpg)


    [Figure 3-38.](#9781430238072_Ch03.xhtml#_Fig38) The data types supported by Core
    Data


    ### The Integer Data Types


    `Integer 16`, `Integer 32`, and `Integer 64` all hold signed integers (whole numbers).
    The only difference between these three number types is the minimum and maximum
    size of the values they are capable of storing. In general, you should pick the
    smallest-size integer that you are certain will work for your purposes. For example,
    if you know your attribute will never hold a number larger than a thousand, make
    sure to select `Integer 16` rather than `Integer 32` or `Integer 64`. The minimum
    and maximum values that these three data types are capable of storing are shown
    in [Table 3-1](#9781430238072_Ch03.xhtml#Tab1).


    [Table 3-1](#9781430238072_Ch03.xhtml#_Tab1). Integer Type Minimums and Maximums


    | Data Type | Minimum | Maximum |

    | --- | --- | --- |

    | Integer 16 | −32,768 | 32, 767 |

    | Integer 32 | −2,147,483,648 | 2,147,483,647 |

    | Integer 64 | −9,223,372,036,854,775,808 | 9,223,372,036,854,77`5,807 |


    At runtime, you set integer attributes of a managed object using instances of
    `NSNumber` created using a factory method such as `numberWithInt:` or `numberWithLong:`.


    ### The Decimal, Double, and Float Data Types


    The `decimal`, `double`, and `float` data types all hold decimal numbers. `Double`
    and `float` hold floating-point representations of decimal numbers similar to
    the C datatypes of `double` and `float`, respectively. Floating-point representations
    of decimal numbers are always an approximation due to the fact that they use a
    fixed number of bytes to represent data. The larger the number to the left of
    the decimal point, the less bytes there are available to hold the fractional part
    of the number. The `double` data type uses 64 bits to store a single number while
    the `float` data type uses 32 bits of data to store a single number. For many
    purposes, these two datatypes will work just fine. However, when you have data,
    such as currency, where small rounding errors would be a problem, Core Data provides
    the `decimal` data type, which is not subject to rounding errors. The `decimal`
    type can hold numbers with up to 38 significant digits stored internally using
    fixed-point numbers so that the stored value is not subject to the rounding errors
    that can happen with floating-point numbers.


    At runtime, you set `double` and `float` attributes using instances of `NSNumber`
    created using the `NSNumber` factory method `numberWithFloat:` or `numberWithDouble:`.
    `Decimal` attributes, on the other hand, must be set using an instance of the
    class `NSDecimalNumber`.


    ### The String Data Type


    The `string` data type is one of the most common attribute types you will use.
    String attributes are capable of holding text in nearly any language or script
    since they are stored internally using Unicode. String attributes are set at runtime
    using instances of `NSString`.


    ### The Boolean Data Type


    Boolean values (`YES` or `NO`) can be stored using the `Boolean` data type. Boolean
    attributes are set at runtime using instances of `NSNumber` created using `numberWithBOOL:`.


    ### The Date Data Type


    Dates and timestamps can be stored in Core Data using the `date` data type. At
    runtime, date attributes are set using instances of `NSDate`.


    ### The Binary Data Type


    The `binary` data type is used to store any kind of binary data. Binary attributes
    are set at runtime using `NSData` instances. Anything that can be put into an
    `NSData` instance can be stored in a binary attribute. However, you generally
    can’t search or sort on binary data types.


    ### The Transformable Data Type


    The `transformable` data type is a special data type that works along with something
    called a value transformer to let you create attributes based on any Objective-C
    class, even those for which there is no corresponding Core Data data type. You
    would use `transformable` data types to store a `UIImage` instance, for example,
    or to store a `UIColor` instance. You’ll see how `transformable` attributes work
    in [Chapter 6](#9781430238072_Ch06.xhtml).


    ### Setting the name Attribute Type


    A name, obviously, is text, so the obvious type for this attribute is `string`.
    Select `string` from the `Attribute Type` drop-down. After selecting it, a few
    new fields will appear in the Detail pane ([Figure 3-39](#9781430238072_Ch03.xhtml#Fig39)).
    Just like Interface Builder’s inspector, the Detail pane in the model editor is
    context-sensitive. Some attribute types, such as the `string` type, have additional
    configuration options.


    ![9781430238072_Fig03-39.jpg](images/9781430238072_Fig03-39.jpg)


    [Figure 3-39.](#9781430238072_Ch03.xhtml#_Fig39) The Detail pane after selecting
    the string type


    The `Min Length:` and `Max Length:` fields allow you to set a minimum and maximum
    number of characters for this field. If you enter a number into either field,
    any attempt to save a managed object that has less characters than the `Min Length:`
    or more characters than `Max Length:` stored in this attribute will result in
    a validation error at save time.'
  raw: 'Below the Name field are three checkboxes: Transient, Optional, and Indexed.
    If Optional is checked, then this entity can be saved even if this attribute has
    no value assigned to it. If you uncheck it, then any attempt to save a managed
    object based on this entity when the name attribute is nil will result in a validation
    error that will prevent the save. In this particular case, name is the main attribute
    that you will use to identify a given hero, so you probably want to require this
    attribute. Single-click the Optional checkbox to uncheck it, making this field
    required.


    The Transient checkbox allows you to create attributes that are not saved in the
    persistent store. They can also be used to create custom attributes that store
    non-standard data. For now, don’t worry too much about Transient. Just leave it
    unchecked; you’ll revisit this checkbox in [Chapter 6](#9781430238072_Ch06.xhtml).


    The final checkbox, Indexed, tells the underlying data store to add an index on
    this attribute. Not all persistent stores support indices, but the default store
    (SQLite) does. The database uses an index to improve search speeds when searching
    or ordering based on that field. You will be ordering your superheroes by name,
    so check the Indexed checkbox to tell SQLite to create an index on the column
    that will be used to store this attribute^’s data.


    **Caution**  Properly used, indices can greatly improve performance in a SQLite
    persistent store. Adding indices where they are not needed, however, can actually
    degrade performance. If you don’t have a reason for selecting Indexed, leave it
    unchecked.


    Attribute Types


    Every attribute has a type, which identifies the kind of data that the attribute
    is capable of storing. If you single-click the Attribute Type drop-down (which
    should currently be set to Undefined), you can see the various datatypes that
    Core Data supports out of the box ([Figure 3-38](#9781430238072_Ch03.xhtml#Fig38)).
    These are all the types of data that you can store without having to implement
    a custom attribute, like you’re going to do in [Chapter 6](#9781430238072_Ch06.xhtml).
    Each of the data types correspond to an Objective-C class that is used to set
    or retrieve values, and you must make sure to use the correct object when setting
    values on managed objects.


    ![9781430238072_Fig03-38.jpg](images/9781430238072_Fig03-38.jpg)


    [Figure 3-38.](#9781430238072_Ch03.xhtml#_Fig38)  The data types supported by
    Core Data


    The Integer Data Types


    Integer 16, Integer 32, and Integer 64 all hold signed integers (whole numbers).
    The only difference between these three number types is the minimum and maximum
    size of the values they are capable of storing. In general, you should pick the
    smallest-size integer that you are certain will work for your purposes. For example,
    if you know your attribute will never hold a number larger than a thousand, make
    sure to select Integer 16 rather than Integer 32 or Integer 64\. The minimum and
    maximum values that these three data types are capable of storing are shown in
    [Table 3-1](#9781430238072_Ch03.xhtml#Tab1).


    [Table 3-1](#9781430238072_Ch03.xhtml#_Tab1). Integer Type Minimums and Maximums


    | Data Type | Minimum | Maximum |

    | --- | --- | --- |

    | Integer 16 | −32,768 | 32, 767 |

    | Integer 32 | −2,147,483,648 | 2,147,483,647 |

    | Integer 64 | −9,223,372,036,854,775,808 | 9,223,372,036,854,77`5,807 |


    At runtime, you set integer attributes of a managed object using instances of
    NSNumber created using a factory method such as numberWithInt: or numberWithLong:.


    The Decimal, Double, and Float Data Types


    The decimal, double, and float data types all hold decimal numbers. Double and
    float hold floating-point representations of decimal numbers similar to the C
    datatypes of double and float, respectively. Floating-point representations of
    decimal numbers are always an approximation due to the fact that they use a fixed
    number of bytes to represent data. The larger the number to the left of the decimal
    point, the less bytes there are available to hold the fractional part of the number.
    The double data type uses 64 bits to store a single number while the float data
    type uses 32 bits of data to store a single number. For many purposes, these two
    datatypes will work just fine. However, when you have data, such as currency,
    where small rounding errors would be a problem, Core Data provides the decimal
    data type, which is not subject to rounding errors. The decimal type can hold
    numbers with up to 38 significant digits stored internally using fixed-point numbers
    so that the stored value is not subject to the rounding errors that can happen
    with floating-point numbers.


    At runtime, you set double and float attributes using instances of NSNumber created
    using the NSNumber factory method numberWithFloat: or numberWithDouble:. Decimal
    attributes, on the other hand, must be set using an instance of the class NSDecimalNumber.


    The String Data Type


    The string data type is one of the most common attribute types you will use. String
    attributes are capable of holding text in nearly any language or script since
    they are stored internally using Unicode. String attributes are set at runtime
    using instances of NSString.


    The Boolean Data Type


    Boolean values (YES or NO) can be stored using the Boolean data type. Boolean
    attributes are set at runtime using instances of NSNumber created using numberWithBOOL:.


    The Date Data Type


    Dates and timestamps can be stored in Core Data using the date data type. At runtime,
    date attributes are set using instances of NSDate.


    The Binary Data Type


    The binary data type is used to store any kind of binary data. Binary attributes
    are set at runtime using NSData instances. Anything that can be put into an NSData
    instance can be stored in a binary attribute. However, you generally can’t search
    or sort on binary data types.


    The Transformable Data Type


    The transformable data type is a special data type that works along with something
    called a value transformer to let you create attributes based on any Objective-C
    class, even those for which there is no corresponding Core Data data type. You
    would use transformable data types to store a UIImage instance, for example, or
    to store a UIColor instance. You’ll see how transformable attributes work in [Chapter
    6](#9781430238072_Ch06.xhtml).


    Setting the name Attribute Type


    A name, obviously, is text, so the obvious type for this attribute is string.
    Select string from the Attribute Type drop-down. After selecting it, a few new
    fields will appear in the Detail pane ([Figure 3-39](#9781430238072_Ch03.xhtml#Fig39)).
    Just like Interface Builder’s inspector, the Detail pane in the model editor is
    context-sensitive. Some attribute types, such as the string type, have additional
    configuration options.


    ![9781430238072_Fig03-39.jpg](images/9781430238072_Fig03-39.jpg)


    [Figure 3-39.](#9781430238072_Ch03.xhtml#_Fig39)  The Detail pane after selecting
    the string type


    The Min Length: and Max Length: fields allow you to set a minimum and maximum
    number of characters for this field. If you enter a number into either field,
    any attempt to save a managed object that has less characters than the Min Length:
    or more characters than Max Length: stored in this attribute will result in a
    validation error at save time.'
  trans: '好的，请看下面的中文译文：



    在 `Name` 字段下方有三个复选框：`Transient`、`Optional` 和 `Indexed`。如果勾选了 `Optional`，那么即使此属性没有赋值，这个实体也可以被保存。如果取消勾选，那么当
    `name` 属性为 `nil` 时，任何基于此实体保存托管对象的尝试都将导致验证错误，从而阻止保存。在这种特定情况下，`name` 是用于标识特定英雄的主要属性，因此你可能希望将此属性设为必填项。单击
    `Optional` 复选框以取消勾选，使其成为必填字段。


    `Transient` 复选框允许你创建不会被保存到持久化存储中的属性。它们也可以用于创建存储非标准数据的自定义属性。现在，暂时不必过多担心 `Transient`
    属性。保持其未选中状态即可；你将在第 6 章中重新了解这个复选框。


    最后一个复选框 `Indexed`，用于告知底层数据存储为此属性添加索引。并非所有持久化存储都支持索引，但默认存储 (SQLite) 是支持的。数据库使用索引来提高基于该字段进行搜索或排序时的搜索速度。你将按名称对超级英雄进行排序，因此请勾选
    `Indexed` 复选框，以告知 SQLite 在用于存储此属性数据的列上创建一个索引。


    **谨慎**  如果使用得当，索引可以极大地提高 SQLite 持久化存储的性能。然而，在不需要的地方添加索引实际上可能会降低性能。如果你没有选择 `Indexed`
    的理由，请保持其未选中状态。


    ## 属性类型


    每个属性都有一个类型，用于标识该属性能够存储的数据种类。如果你单击 `Attribute Type` 下拉菜单（当前应设置为 `Undefined`），就可以看到
    Core Data 开箱即支持的各种数据类型（图 3-38）。这些是你无需实现自定义属性即可存储的所有数据类型，就像你将在第 6 章中所做的那样。每种数据类型都对应一个用于设置或获取值的
    Objective-C 类，并且在托管对象上设置值时，你必须确保使用正确的对象。


    ![9781430238072_Fig03-38.jpg](img/9781430238072_Fig03-38.jpg)


    图 3-38. Core Data 支持的数据类型


    ### 整数数据类型


    `Integer 16`、`Integer 32` 和 `Integer 64` 都用于保存有符号整数（整数）。这三种数字类型之间的唯一区别在于它们能够存储的值的最小值和最大值。通常，你应该选择能够满足需求的最小尺寸的整数。例如，如果你知道你的属性永远不会存储超过一千的数字，那么请确保选择
    `Integer 16` 而不是 `Integer 32` 或 `Integer 64`。这三种数据类型能够存储的最小值和最大值如表 3-1 所示。


    表 3-1. 整数类型的最小值和最大值


    | 数据类型 | 最小值 | 最大值 |

    | --- | --- | --- |

    | Integer 16 | −32,768 | 32, 767 |

    | Integer 32 | −2,147,483,648 | 2,147,483,647 |

    | Integer 64 | −9,223,372,036,854,775,808 | 9,223,372,036,854,77`5,807 |


    在运行时，你使用通过工厂方法（如 `numberWithInt:` 或 `numberWithLong:`）创建的 `NSNumber` 实例来设置托管对象的整数属性。


    ### Decimal、Double 和 Float 数据类型


    `decimal`、`double` 和 `float` 数据类型都用于保存十进制数。`Double` 和 `float` 保存十进制数的浮点表示，类似于
    C 语言中的 `double` 和 `float` 数据类型。由于浮点表示使用固定字节数来表示数据，因此它始终是一种近似值。小数点左边的数字越大，可用于保存小数部分的字节就越少。`double`
    数据类型使用 64 位来存储一个数字，而 `float` 数据类型使用 32 位数据来存储一个数字。对于许多用途来说，这两种数据类型都完全够用。然而，当你的数据（例如货币）中小的舍入误差会成为问题时，Core
    Data 提供了 `decimal` 数据类型，它不容易出现舍入误差。`decimal` 类型可以在内部使用定点数保存最多 38 位有效数字，因此存储的值不会出现浮点数可能发生的舍入误差。


    在运行时，你使用通过 `NSNumber` 工厂方法 `numberWithFloat:` 或 `numberWithDouble:` 创建的 `NSNumber`
    实例来设置 `double` 和 `float` 属性。另一方面，`Decimal` 属性必须使用 `NSDecimalNumber` 类的实例来设置。


    ### 字符串数据类型


    `string` 数据类型是你将使用的最常见的属性类型之一。字符串属性能够保存几乎所有语言或脚本的文本，因为它们在内部使用 Unicode 存储。字符串属性在运行时使用
    `NSString` 实例进行设置。


    ### 布尔数据类型


    可以使用 `Boolean` 数据类型存储布尔值（`YES` 或 `NO`）。布尔属性在运行时使用通过 `numberWithBOOL:` 创建的 `NSNumber`
    实例进行设置。


    ### 日期数据类型


    可以使用 `date` 数据类型在 Core Data 中存储日期和时间戳。在运行时，日期属性使用 `NSDate` 实例进行设置。


    ### 二进制数据类型


    `binary` 数据类型用于存储任何类型的二进制数据。二进制属性在运行时使用 `NSData` 实例进行设置。任何可以放入 `NSData` 实例的内容都可以存储在二进制属性中。但是，通常你不能搜索或排序二进制数据类型。


    ### 可变换数据类型


    `transformable` 数据类型是一种特殊的数据类型，它与称为值转换器的东西一起工作，允许你基于任何 Objective-C 类创建属性，即使是那些没有对应
    Core Data 数据类型的类也是如此。例如，你可以使用 `transformable` 数据类型来存储 `UIImage` 实例或 `UIColor`
    实例。你将在第 6 章中了解 `transformable` 属性是如何工作的。


    ### 设置 name 属性类型


    名称显然是文本，因此此属性的明显类型是 `string`。从 `Attribute Type` 下拉菜单中选择 `string`。选择后，详细信息窗格中将出现一些新字段（图
    3-39）。就像 Interface Builder 检查器一样，模型编辑器中的详细信息窗格是上下文相关的。某些属性类型（例如 `string` 类型）具有额外的配置选项。


    ![9781430238072_Fig03-39.jpg](img/9781430238072_Fig03-39.jpg)


    图 3-39. 选择字符串类型后的详细信息窗格


    `Min Length：` 和 `Max Length：` 字段允许你设置此字段的最小和最大字符数。如果你在任一字段中输入一个数字，那么任何尝试保存一个在此属性中存储的字符数少于
    `Min Length：` 或多于 `Max Length：` 的托管对象的操作，都会在保存时导致验证错误。

