    You won’t change the name of the property list because that’s still specific for
    displaying the Hero entity. Next, you’ll create the ManagedObjectController class.
    You’ll move most of the logic from the HeroDetailController to the ManagedObjectController.
    The only HeroDetailController will be a very thin subclass that knows the name
    of the configuration property list to load.


