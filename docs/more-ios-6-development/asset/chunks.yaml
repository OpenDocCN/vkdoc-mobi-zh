- fmt: "Let’s now add a fetched property that has slightly more complex criteria.\n\
    \n### Creating the `sameSexHeroes` Fetched Property\n\nThe next fetched property\
    \ you’re going to create is called `sameSexHeroes` and it returns all heroes who\
    \ are the same sex as this hero. You can’t just specify to return all heroes of\
    \ the same sex, however, because you don’t want this hero to be included in the\
    \ fetched property. Super Cat is the same sex as Super Cat, but users will not\
    \ expect to see Super Cat when they look at a list of the heroes who are the same\
    \ sex as Super Cat.\n\nCreate another fetched property, naming it `sameSexHeroes`.\
    \ Open the model editor. Make sure the Destination is set to `Hero`. For the Predicate\
    \ field, type:\n\n```\n($FETCH_SOURCE.sex == sex) AND ($FETCH_SOURCE != SELF)\n\
    ```\n\nIt’s pretty clear what the left side of this compound predicate is doing.\
    \ But what are you doing on the right side? Remember, a fetched property predicate\
    \ will return all matching objects, including the object that owns the fetched\
    \ property. In this case, you asked for all heroes of a certain sex, and your\
    \ hero in the detail view will match that criteria. You need to exclude that specific\
    \ hero.\n\nYou could just compare names and exclude heroes with the same name\
    \ as yours. That might work, except for the fact that two heroes might have the\
    \ same name. Maybe using name isn’t the best idea. But what value is there that\
    \ uniquely identifies a single hero? There isn’t one, really.\n\nFortunately,\
    \ predicates recognize a special value called `SELF`, which returns the object\
    \ being compared. The `$FETCH_SOURCE` variable represents the object where the\
    \ fetch request is happening. Therefore, to exclude the object where the fetch\
    \ request is firing, you just need to require it to return only objects where\
    \ `$FETCH_SOURCE != SELF`.\n\n### Creating the `oppositeSexHeroes` Fetched Property\n\
    \nCreate a new fetched property called `oppositeSexHeroes` and enter the predicate\
    \ of:\n\n```\n$FETCH_SOURCE.sex != sex\n```\n\nMake sure you save your data model\
    \ before continuing.\n\n### Adding Relationships and Fetched Properties to the\
    \ Hero Class\n\nSince you created a custom subclass of `NSManagedObject`, you\
    \ need to update that class to include the new relationship and fetched properties.\
    \ If you had not made any changes to the `Hero` class, you could just regenerate\
    \ the class definition from your data model, and the newly generated version would\
    \ include properties and methods for the relationships and fetched properties\
    \ you just added to your data model. Since you have added validation code, you\
    \ need to update it manually. Single-click `Hero.h` and add the following code:\n\
    \n(Before `@interface`)\n\n```\n@class Power;\n```\n\n(After other properties)\n\
    \n```\n@property (nonatomic, retain) NSSet *powers;\n\n@property (nonatomic, readonly)\
    \ NSArray *olderHeroes;\n@property (nonatomic, readonly) NSArray *youngerHeroes;\n\
    @property (nonatomic, readonly) NSArray *sameSexHeroes;\n@property (nonatomic,\
    \ readonly) NSArray *oppositeSexHeroes;\n```\n\n(After `@end`)\n\n```\n@interface\
    \ Hero (PowerAccessors)\n- (void)addPowersObject:(Power *)value;\n- (void)removePowersObject:(Power\
    \ *)value;\n- (void)addPowers:(NSSet *)value;\n- (void)removePowers:(NSSet *)value;\n\
    @end\n```\n\nSave the file. Switch over to `Hero.m` and make the following changes\
    \ (after the other `@dynamic` declarations):\n\n```\n@dynamic powers;\n@dynamic\
    \ olderHeroes, youngerHeroes, sameSexHeroes, oppositeSexHeroes;\n```\n\n### Updating\
    \ the Detail View\n\nLooking at [Figure 7-1](#9781430238072_Ch07.xhtml#Fig1),\
    \ you have two new table view sections to add to your detail view: Powers and\
    \ Reports. Unfortunately, it won’t be as easy as adding new cells to the General\
    \ section was in [Chapter 6](#9781430238072_Ch06.xhtml). It turns out that you\
    \ can’t use the storyboard editor to set things up for you. The reason is that\
    \ the Powers section is dynamically data driven. You don’t know how many rows\
    \ are in the Powers section until you have a `Hero` entity to inspect. All the\
    \ other sections have a fixed set of rows.\n\nYou start by converting `HeroDetailController`\
    \ to be more data-driven in its current configuration. Open `SuperDB.storyboard`\
    \ and find the `HeroDetailController`. Select the table view and open the attribute\
    \ inspector. Change the table view’s Content field from Static Cells to Dynamic\
    \ Prototypes. The detail view should change to a single table view cell with a\
    \ section header of Prototype Cells ([Figure 7-10](#9781430238072_Ch07.xhtml#Fig10)).\n\
    \n![9781430238072_Fig07-10.jpg](images/9781430238072_Fig07-10.jpg)\n\n[Figure\
    \ 7-10](#9781430238072_Ch07.xhtml#_Fig10)  Changing the table view content to\
    \ dynamic prototypes\n\nSelect the one table view cell that remains and change\
    \ the Utility pane to the attribute inspector. In the Identifier field, delete\
    \ it so that it is empty.\n\nNow open `HeroDetailController.m`. Look for the methods\
    \ `numberOfSectionsInTableView:` and `tableView:numberOfRowsInSection:`. You can’t\
    \ use the jump bar to find them because you commented them out, but if you look\
    \ for the label “Table view data source,” it should place you near the right place.\
    \ Uncomment the methods, and change their bodies to read:\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n    return self.sections.count;\n}\n\n- (NSInteger)tableView:(UITableView\
    \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    NSDictionary *sectionDict\
    \ = [self.sections objectAtIndex:section];\n    NSArray *rows = [sectionDict objectForKey:@\"\
    rows\"];\n    return rows.count;\n}\n```\n\nYou’re simply using your configuration\
    \ information to determine how many sections your table view has and how many\
    \ rows are in each section.\n\nNow, your configuration information doesn’t contain\
    \ the Header value. If you ran the app now, the detail view would look like [Figure\
    \ 7-11](#9781430238072_Ch07.xhtml#Fig11).\n\n![9781430238072_Fig07-11.jpg](images/9781430238072_Fig07-11.jpg)\n\
    \n[Figure 7-11](#9781430238072_Ch07.xhtml#_Fig11)  Detail view with no general\
    \ section header\n\nAdd the header information to your configuration plist. Edit\
    \ `HeroDetailController.plist` and navigate to Root ![image](images/arrow.jpg)\
    \ Section ![image](images/arrow.jpg) Item 1. Open Item 1, select the Item 1 row,\
    \ and add a new item. Give the item a key of `header` and a value of `General`.\
    \ Keep the type as String ([Figure 7-12](#9781430238072_Ch07.xhtml#Fig12)).\n\n\
    ![9781430238072_Fig07-12.jpg](images/9781430238072_Fig07-12.jpg)\n\n[Figure 7-12](#9781430238072_Ch07.xhtml#_Fig12)  Adding\
    \ the general section header to the property list\n\nNow head back over to `HeroDetailController.m`.\
    \ And add the following method (we put it after `tableView:numberOfRowsInSection:`):\n\
    \n```\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n  \
    \  return [sectionDict objectForKey:@\"header\"];\n}\n```\n\nThe General label\
    \ should be there. Since you didn’t put the header item in the first section,\
    \ `objectForKey:` will return `nil`, which the table view interprets as no header\
    \ label.\n\nNow you’re ready to add the new Powers and Reports sections.\n\nHead\
    \ back to the `HeroDetailController.plist` property list and select the Sections\
    \ item. Open the Sections item, then make sure Item 0 and Item 1 are both closed.\
    \ Hover the pointer over Item 1 until the (+) and (−) buttons appear next to Item\
    \ 1. Click the (+) button. A new Item 2 should appear. Set Item 2’s type to Dictionary\
    \ and open it. Add an item to Item 2. Name it `header` with a value of `Powers`.\n\
    \n### Rethinking Configuration\n\nBefore you go further, take a step back and\
    \ think about your detail configuration property list. You just added a new section\
    \ to represent the Powers section. You added a header item to contain the Section\
    \ Header string. Now you need to add the rows item, right?\n\nProbably not."
  raw: 'Let’s now add a fetched property that has slightly more complex criteria.


    Creating the sameSexHeroes Fetched Property


    The next fetched property you’re going to create is called sameSexHeroes and it
    returns all heroes who are the same sex as this hero. You can’t just specify to
    return all heroes of the same sex, however, because you don’t want this hero to
    be included in the fetched property. Super Cat is the same sex as Super Cat, but
    users will not expect to see Super Cat when they look at a list of the heroes
    who are the same sex as Super Cat.


    Create another fetched property, naming it **sameSexHeroes**. Open the model editor.
    Make sure the Destination is set to Hero. For the Predicate field, type


    ```

    ($FETCH_SOURCE.sex == sex) AND ($FETCH_SOURCE != SELF)

    ```


    It’s pretty clear what the left side of this compound predicate is doing. But
    what are you doing on the right side? Remember, a fetched property predicate will
    return all matching objects, including the object that owns the fetched property.
    In this case, you asked for all heroes of a certain sex, and your hero in the
    detail view will match that criteria. You need to exclude that specific hero.


    You could just compare names and exclude heroes with the same name as yours. That
    might work, except for the fact that two heroes might have the same name. Maybe
    using name isn’t the best idea. But what value is there that uniquely identifies
    a single hero? There isn’t one, really.


    Fortunately, predicates recognize a special value called SELF, which returns the
    object being compared. The $FETCH_SOURCE variable represent the object where the
    fetch request is happening. Therefore, to exclude the object where the fetch request
    is firing, you just need to require it to return only objects where $FETCH_SOURCE
    != SELF.


    Creating the oppositeSexHeroes Fetched Property


    Create a new fetched property called **oppositeSexHeroes** and enter the predicate
    of


    ```

    $FETCH_SOURCE.sex != sex

    ```


    Make sure you save your data model before continuing.


    Adding Relationships and Fetched Properties to the Hero Class


    Since you created a custom subclass of NSManagedObject, you need to update that
    class to include the new relationship and fetched properties. If you had not made
    any changes to the Hero class, you could just regenerate the class definition
    from your data model, and the newly generated version would include properties
    and methods for the relationships and fetched properties you just added to your
    data model. Since you have added validation code, you need to update it manually.
    Single-click Hero.h and add the following code:


    (Before @interface)


    ```

    @class Power;

    ```


    (After other properties)


    ```

    @property (nonatomic, retain) NSSet *powers;


    @property (nonatomic, readonly) NSArray *olderHeroes;

    @property (nonatomic, readonly) NSArray *youngerHeroes;

    @property (nonatomic, readonly) NSArray *sameSexHeroes;

    @property (nonatomic, readonly) NSArray *oppositeSexHeroes;

    ```


    (After @end)


    ```

    @interface Hero (PowerAccessors)

    - (void)addPowersObject:(Power *)value;

    - (void)removePowersObject:(Power *)value;

    - (void)addPowers:(NSSet *)value;

    - (void)removePowers:(NSSet *)value;

    @end

    ```


    Save the file. Switch over to Hero.m and make the following changes (after the
    other @dynamic declarations):


    ```

    @dynamic powers;

    @dynamic olderHeroes, youngerHeroes, sameSexHeroes, oppositeSexHeroes;

    ```


    Updating the Detail View


    Looking at [Figure 7-1](#9781430238072_Ch07.xhtml#Fig1), you have two new table
    view sections to add to your detail view: Powers and Reports. Unfortunately, it
    won’t be as easy as adding new cells to the General section was in [Chapter 6.](#9781430238072_Ch06.xhtml)
    It turns out that you can’t use the storyboard editor to set things up for you.
    The reason is that the Powers section is dynamically data driven. You don’t know
    how many rows are in the Powers section until you have a Hero entity to inspect.
    All the other sections have a fixed set of rows.


    You start by converting HeroDetailControllerto be more data-driven in its current
    configuration. Open SuperDB.storyboard and find the HeroDetailController. Select
    the table view and open the attribute inspector. Change the table view’s Content
    field from Static Cells to Dynamic Prototypes. The detail view should change to
    a single table view cell with a section header of Prototype Cells ([Figure 7-10](#9781430238072_Ch07.xhtml#Fig10)).


    ![9781430238072_Fig07-10.jpg](images/9781430238072_Fig07-10.jpg)


    [Figure 7-10.](#9781430238072_Ch07.xhtml#_Fig10)  Changing the table view content
    to dynamic prototypes


    Select the one table view cell that remains and change the Utility pane to the
    attribute inspector. In the Identifier field, delete it so that it is empty.


    Now open HeroDetailController.m. Look for the methods numberOfSectionsInTableView:
    and tableView:numberOfRowsInSection:. You can’t use the jump bar to find them
    because you commented them out, but if you look for the label “Table view data
    source,” it should place you near the right place. Uncomment the methods, and
    change their bodies to read


    ```

    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    {

        return self.sections.count;

    }


    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    {

        NSDictionary *sectionDict = [self.sections objectAtIndex:section];

        NSArray *rows = [sectionDict objectForKey:@"rows"];

        return rows.count;

    }

    ```


    You’re simply using your configuration information to determine how many sections
    your table view has and how many rows are in each section.


    Now, your configuration information doesn’t contain the Header value. If you ran
    the app now, the detail view would look like [Figure 7-11](#9781430238072_Ch07.xhtml#Fig11).


    ![9781430238072_Fig07-11.jpg](images/9781430238072_Fig07-11.jpg)


    [Figure 7-11.](#9781430238072_Ch07.xhtml#_Fig11)  Detail view with no general
    section header


    Add the header information to your configuration plist. Edit HeroDetailController.plist
    and navigate to Root ![image](images/arrow.jpg) Section ![image](images/arrow.jpg)
    Item 1\. Open Item 1, select the Item 1 row, and add a new item. Give the item
    a key of header and a value of General. Keep the type as String ([Figure 7-12](#9781430238072_Ch07.xhtml#Fig12)).


    ![9781430238072_Fig07-12.jpg](images/9781430238072_Fig07-12.jpg)


    [Figure 7-12.](#9781430238072_Ch07.xhtml#_Fig12)  Adding the general section header
    to the property list


    Now head back over the HeroDetailController.m. And add the following method (we
    put it after tableView:numberOfRowsInSection:):


    ```

    - (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section

    {

        NSDictionary *sectionDict = [self.sections objectAtIndex:section];

        return [sectionDict objectForKey:@"header"];

    }

    ```


    The General label should be there. Since you didn’t put the header item in the
    first section, objectForKey: will return nil, which the table view interprets
    as no header label.


    Now you’re ready to add the new Powers and Reports sections.


    Head back to the HeroDetailController.plist property list and select the Sections
    item. Open the Sections item, then make sure Item 0 and Item 1 are both closed.
    Hover the pointer over Item 1 until the (+) and (−) buttons appear next to Item
    1\. Click the (+) button. A new Item 2 should appear. Set Item 2’s type to Dictionary
    and open it. Add an to Item 2\. Name it **header** with a value of Powers.


    Rethinking Configuration


    Before you go further, take a step back and think about your detail configuration
    property list. You just added a new section to represent the Powers section. You
    added a header item to contain the Section Header string. Now you need to add
    the rows item, right?


    Probably not.'
  trans: "\n现在我们来添加一个筛选条件稍复杂一些的获取属性。\n\n### 创建 `sameSexHeroes` 获取属性\n\n接下来要创建的获取属性名为\
    \ `sameSexHeroes`，它会返回与当前英雄性别相同的所有英雄。不过，你无法简单地指定返回所有同性的英雄，因为你不希望当前英雄本身被包含在该获取属性中。超级猫与超级猫性别相同，但当用户查看与超级猫性别相同的英雄列表时，他们不会期望看到超级猫自己。\n\
    \n创建另一个获取属性，命名为 `sameSexHeroes`。打开模型编辑器。确保目标（Destination）设置为 `Hero`。在谓词（Predicate）字段中，输入：\n\
    \n```\n($FETCH_SOURCE.sex == sex) AND ($FETCH_SOURCE != SELF)\n```\n\n这个复合谓词的左侧部分作用很明确。但右侧部分在做什么呢？请记住，获取属性的谓词会返回所有匹配的对象，包括拥有该获取属性的对象本身。在本例中，你请求了所有特定性别的英雄，而详情视图中的英雄自身也会符合这个条件。你需要排除这个特定的英雄。\n\
    \n你可以通过比较名称来排除与当前英雄同名的英雄。这种做法可能可行，但问题是两个英雄可能拥有相同的名字。也许使用名称并不是最佳方案。那么，有什么值能唯一标识单个英雄呢？实际上，并没有唯一的值。\n\
    \n幸运的是，谓词能识别一个名为 `SELF` 的特殊值，它会返回正在被比较的对象。`$FETCH_SOURCE` 变量代表发起获取请求的对象。因此，要排除发起获取请求的对象本身，你只需要要求它仅返回\
    \ `$FETCH_SOURCE != SELF` 的对象即可。\n\n### 创建 `oppositeSexHeroes` 获取属性\n\n创建一个名为\
    \ `oppositeSexHeroes` 的新获取属性，并输入以下谓词：\n\n```\n$FETCH_SOURCE.sex != sex\n```\n\n\
    在继续之前，请确保保存了你的数据模型。\n\n### 向 Hero 类添加关系和获取属性\n\n由于你创建了 `NSManagedObject` 的自定义子类，你需要更新该类以包含新的关系和获取属性。如果你没有对\
    \ `Hero` 类做任何修改，你可以直接从数据模型重新生成类定义，新生成的版本将包含你刚刚添加到数据模型中的关系和获取属性的属性与方法。由于你已经添加了验证代码，你需要手动更新它。单击选中\
    \ `Hero.h` 并添加以下代码：\n\n（在 `@interface` 之前）\n\n```\n@class Power;\n```\n\n（在其他属性之后）\n\
    \n```\n@property (nonatomic, retain) NSSet *powers;\n\n@property (nonatomic, readonly)\
    \ NSArray *olderHeroes;\n@property (nonatomic, readonly) NSArray *youngerHeroes;\n\
    @property (nonatomic, readonly) NSArray *sameSexHeroes;\n@property (nonatomic,\
    \ readonly) NSArray *oppositeSexHeroes;\n```\n\n（在 `@end` 之后）\n\n```\n@interface\
    \ Hero (PowerAccessors)\n- (void)addPowersObject:(Power *)value;\n- (void)removePowersObject:(Power\
    \ *)value;\n- (void)addPowers:(NSSet *)value;\n- (void)removePowers:(NSSet *)value;\n\
    @end\n```\n\n保存文件。切换到 `Hero.m` 并进行以下修改（位于其他 `@dynamic` 声明之后）：\n\n```\n@dynamic\
    \ powers;\n@dynamic olderHeroes, youngerHeroes, sameSexHeroes, oppositeSexHeroes;\n\
    ```\n\n### 更新详情视图\n\n参考图 7-1，你需要向详情视图添加两个新的表格视图分区：Powers（能力）和 Reports（报告）。不幸的是，这并不像第\
    \ 6 章中向 General 分区添加新单元格那样简单。事实证明，你不能使用故事板编辑器来为你设置这些内容。原因是 Powers 分区是动态数据驱动的。在你有一个可检查的\
    \ `Hero` 实体之前，你无法知道 Powers 分区有多少行。所有其他分区都有固定数量的行。\n\n你首先要将 `HeroDetailController`\
    \ 转换为其当前配置更数据驱动的方式。打开 `SuperDB.storyboard` 并找到 `HeroDetailController`。选中该表格视图并打开属性检查器。将表格视图的“内容（Content）”字段从“静态单元格（Static\
    \ Cells）”更改为“动态原型（Dynamic Prototypes）”。详情视图应变为一个带有“原型单元格（Prototype Cells）”分区标题的单一表格视图单元格（图\
    \ 7-10）。\n\n![9781430238072_Fig07-10.jpg](img/9781430238072_Fig07-10.jpg)\n\n\
    图 7-10  将表格视图内容更改为动态原型\n\n选中剩余的那个表格视图单元格，并将“实用工具（Utility）”面板切换到属性检查器。在“标识符（Identifier）”字段中，删除内容使其为空。\n\
    \n现在打开 `HeroDetailController.m`。找到 `numberOfSectionsInTableView:` 和 `tableView:numberOfRowsInSection:`\
    \ 方法。你无法使用跳转栏找到它们，因为你已经将它们注释掉了，但如果你查找标签“Table view data source”，它应该能带你到附近的位置。取消这些方法的注释，并将它们的主体修改为：\n\
    \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n\
    \    return self.sections.count;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
    \ numberOfRowsInSection:(NSInteger)section\n{\n    NSDictionary *sectionDict =\
    \ [self.sections objectAtIndex:section];\n    NSArray *rows = [sectionDict objectForKey:@\"\
    rows\"];\n    return rows.count;\n}\n```\n\n你只是使用配置信息来确定你的表格视图有多少个分区以及每个分区有多少行。\n\
    \n现在，你的配置信息不包含“页眉（Header）”值。如果你现在运行应用，详情视图将看起来像图 7-11。\n\n![9781430238072_Fig07-11.jpg](img/9781430238072_Fig07-11.jpg)\n\
    \n图 7-11  没有通用分区标题的详情视图\n\n将页眉信息添加到你的配置 plist 文件中。编辑 `HeroDetailController.plist`\
    \ 并导航到 Root ![image](img/arrow.jpg) Section ![image](img/arrow.jpg) Item 1。打开\
    \ Item 1，选中 Item 1 行，并添加一个新项目。为该项目的键设置为 `header`，值设置为 `General`。保持类型为 String（字符串）（图\
    \ 7-12）。\n\n![9781430238072_Fig07-12.jpg](img/9781430238072_Fig07-12.jpg)\n\n\
    图 7-12  向属性列表添加通用分区标题\n\n现在回到 `HeroDetailController.m`。并添加以下方法（我们将其放在 `tableView:numberOfRowsInSection:`\
    \ 之后）：\n\n```\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
    {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n  \
    \  return [sectionDict objectForKey:@\"header\"];\n}\n```\n\n“General”标签应该会显示出来。由于你没有在第一个分区中放置页眉项目，`objectForKey:`\
    \ 将返回 `nil`，表格视图会将其解释为没有页眉标签。\n\n现在你已经准备好添加新的 Powers 和 Reports 分区了。\n\n回到 `HeroDetailController.plist`\
    \ 属性列表并选中 Sections 项目。打开 Sections 项目，然后确保 Item 0 和 Item 1 都已折叠。将指针悬停在 Item 1 上，直到\
    \ Item 1 旁边出现 (+) 和 (−) 按钮。单击 (+) 按钮。应该会出现一个新的 Item 2。将 Item 2 的类型设置为 Dictionary（字典）并打开它。向\
    \ Item 2 添加一个项目。将其命名为 `header`，值为 `Powers`。\n\n### 重新思考配置\n\n在继续之前，后退一步，思考一下你的详情配置属性列表。你刚刚添加了一个新的分区来表示\
    \ Powers 分区。你添加了一个页眉项目来包含分区标题字符串。现在你需要添加 rows 项目，对吗？\n\n很可能不是。\n"
- fmt: "Remember that the `rows` item is an array that tells you how to configure\
    \ each cell in the section plus what `label`, `cell class`, and `property key`\
    \ to use. The number of cells is determined by the number of array items. The\
    \ situation with the `Powers` section is almost the opposite. You don’t know how\
    \ many rows you need; that’s coming from the `Powers` relationship of the `Hero`\
    \ entity. And the configuration of each cell should be identical.\n\nThere are\
    \ a couple of approaches you can take. Let’s discuss two ideas.\n\nFor the `Powers`\
    \ section, you’ll make the `rows` item a dictionary. The dictionary will contain\
    \ three `String` items. The keys will be `key`, `class`, and `label`. These are\
    \ the same keys you are using for each item when `rows` is an `Array`. You can\
    \ infer that when the `rows` item is a dictionary, the section is data-driven;\
    \ but when the `rows` item is an `Array`, the section is configuration-driven.\n\
    \nHere’s another approach. For each section, along with the `header` item, you\
    \ define an item titled `dynamic` which will be a `Boolean` type. If `YES`, then\
    \ the section is data-driven; if `NO`, the section is configuration-driven. For\
    \ all cases, `rows` will be an array, but for dynamic sections, it will contain\
    \ only one entry. If there is no `dynamic` item, it is the same as `dynamic` being\
    \ set to `NO`.\n\nEither approach will work. There are probably many more ideas\
    \ we could toss around, but that’s not where we’re heading with this. Regardless\
    \ of the approach you take, it’s going to require adding a lot of code to handle\
    \ this logic—code that, so far, you’ve put inside the `HeroDetailController` class.\
    \ Adding this parsing logic may belong inside the `HeroDetailController`, but\
    \ as it gets more complicated, will only muddy your code. You’re going to refactor\
    \ your application to pull the property list handling code out of `HeroDetailController`\
    \ into a new class, `HeroDetailConfiguration`. Then you’ll choose which approach\
    \ to take to handle the data-driven `Powers` section.\n\nCreate a new Objective-C\
    \ class. Make it a subclass of `NSObject` and name it `HeroDetailConfiguration`.\n\
    \nLooking at `HeroDetailController`, you see that you put the `sections` array\
    \ inside a private category. You’ll do the same for `HeroDetailConfiguration`.\
    \ Open `HeroDetailConfiguration.m` and add the following above the `@implementation`:\n\
    \n```\n@interface HeroDetailConfiguration ()\n@property (strong, nonatomic) NSArray\
    \ *sections;\n@end\n```\n\nNext you need to create your initializer. You want\
    \ it to open the property list and parse the contents into the `sections` array.\n\
    \n```\n- (id)init\n{\n    self = [super init];\n    if (self) {\n        // Initialization\
    \ Code\n        NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@\"HeroDetailConfiguration\"\
    \n                                                  withExtension:@\"plist\"];\n\
    \        NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];\n\
    \        self.sections = [plist valueForKey:@\"sections\"];\n    }\n    return\
    \ self;\n}\n```\n\nNow let’s go back to `HeroDetailController.m` and see where\
    \ to use the `sections` array. The following methods access the `HeroDetailController`\
    \ `sections` array:\n\n```\nnumberOfSectionsInTableView:\ntableView:numberOfRowsInSection:\n\
    tableView:titleForHeaderInSection:\ntableView:cellForRowAtIndexPath:\n```\n\n\
    You can use this to design your methods for `HeroDetailConfiguration`. Right off\
    \ the bat, you can see the three methods needed:\n\n```\nnumberOfSections\nnumberOfRowsInSection:\n\
    headerInSection:\n```\n\nDefine the methods in `HeroDetailConfiguration.h`.\n\n\
    ```\n- (NSInteger)numberOfSections;\n- (NSInteger)numberOfRowsInSection:(NSInteger)section;\n\
    - (NSString *)headerInSection:(NSInteger)section;\n```\n\nNow let’s implement\
    \ them in `HeroDetailConfiguration.m`. It should be pretty straightforward.\n\n\
    ```\n- (NSInteger)numberOfSections\n{\n    return self.sections.count;\n}\n\n\
    - (NSInteger)numberOfRowsInSection:(NSInteger)section\n{\n    NSDictionary *sectionDict\
    \ = [self.sections objectAtIndex:section];\n    NSArray *rows = [sectionDict objectForKey:@\"\
    rows\"];\n    return rows.count;\n}\n```"
  raw: 'Remember that the rows item is an array that tells you how to configure each
    cell in the section plus what label, cell class, and property key to use. The
    number of cells is determined by the number of array items. The situation with
    the Powers section is almost the opposite. You don’t know how many rows you need;
    that’s coming from the Powers relationship of the Hero entity. And the configuration
    of each cell should be identical.


    There are a couple of approaches you can take. Let’s discuss two ideas.


    For the Powers section, you’ll make the rows item a dictionary. The dictionary
    will contain three String items. The keys will be key, class, and label. These
    are the same keys you are using for each item when rows is an Array. You can infer
    that when the rows item is a dictionary, the section is data-driven; but when
    the rows item is an Array, the section is configuration-driven.


    Here’s another approach. For each section, along with the header item, you define
    an item titled **dynamic** which will be a Boolean type, If YES, then the section
    is data-driven; if NO, the section is configuration-driven. For all cases, rows
    will be an array, but for dynamic sections, it will contain only one entry. If
    there is no dynamic item, it is the same as dynamic being set to NO.


    Either approach will work. There are probably many more ideas we could toss around,
    but that’s not where we’re heading with this. Regardless of the approach you take,
    it’s going to require adding a lot of code to handle this logic—code that, so
    far, you’ve put inside the HeroDetailController class. Adding this parsing logic
    may belong inside the HeroDetailController, but as it gets more complicated, will
    only muddy your code. You’re going to refactor your application to pull the property
    list handling code out of HeroDetailController into a new class, HeroDetailConfiguration.
    Then you’ll choose which approach to take to handle the data-driven Powers section.


    Create a new Objective-C class. Make it a subclass of NSObject and name it **HeroDetailConfiguration**.


    Looking at HeroDetailController, you see that you put the sections array inside
    a private category. You’ll do the same for HeroDetailConfiguration. Open HeroDetailConfiguration.m
    and add the following above the @implmentation:


    ```

    @interface HeroDetailConfiguration ()

    @property (strong, nonatomic) NSArray *sections;

    @end

    ```


    Next you need to create your initializer. You want it to open the property list
    and parse the contents into the sections array.


    ```

    - (id)init

    {

        self = [super init];

        if (self) {

            // Initialization Code

            NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"HeroDetailConfiguration"                                                  
    withExtension:@"plist"];

            NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];

            self.sections = [plist valueForKey:@"sections"];

        }

        return self;

    }

    ```


    Now let’s go back to HeroDetailController.m and see where to use the sections
    array. The following methods access the HeroDetailController sections array:


    ```

    numberOfSectionsInTableView:

    tableView:numberOfRowsInSection:

    tableView:titleForHeaderInSection:

    tableView:cellForRowAtIndexPath:

    ```


    You can use this to design your methods for HeroDetailConfiguration. Right off
    the bat, you can see the three methods needed:


    ```

    numberOfSections

    numberOfRowsInSection:

    headerInSection:

    ```


    Define the methods in HeroDetailConfiguration.h.


    ```

    - (NSInteger)numberOfSections;

    - (NSInteger)numberOfRowsInSection:(NSInteger)section;

    - (NSString *)headerInSection:(NSInteger)section;

    ```


    Now let’s implement them in HeroDetailConfiguration.m. It should be pretty straightforward.


    ```

    - (NSInteger)numberOfSections

    {

        return self.sections.count;

    }


    - (NSInteger)numberOfRowsInSection:(NSInteger)section

    {

        NSDictionary *sectionDict = [self.sections objectAtIndex:section];

        NSArray *rows = [sectionDict objectForKey:@"rows"];

        return rows.count;

    }'
  trans: "\n请记住，`rows` 项是一个数组，它告诉您如何配置分区中的每个单元格，以及要使用什么`label`、`cell class`和`property\
    \ key`。单元格的数量由数组项的数量决定。`Powers`分区的情况几乎相反。您不知道需要多少行；这些行来自`Hero`实体的`Powers`关系。而每个单元格的配置应该是相同的。\n\
    \n有几种方法可以解决这个问题。我们来讨论两种思路。\n\n对于`Powers`分区，您将把`rows`项设为一个字典。该字典将包含三个`String`项。键将是`key`、`class`和`label`。这些键与当`rows`是`Array`时您为每个项使用的键相同。您可以推断出，当`rows`项是字典时，该分区是数据驱动的；但当`rows`项是`Array`时，该分区是配置驱动的。\n\
    \n这是另一种方法。对于每个分区，除了`header`项之外，您再定义一个名为`dynamic`的项，其类型为`Boolean`。如果为`YES`，则分区是数据驱动的；如果为`NO`，则分区是配置驱动的。在所有情况下，`rows`都将是一个数组，但对于动态分区，它只包含一个条目。如果没有`dynamic`项，则等同于将`dynamic`设置为`NO`。\n\
    \n两种方法都可行。可能还有很多其他想法可以讨论，但这并非我们此处的重点。无论采用哪种方法，都需要添加大量代码来处理此逻辑——到目前为止，您将这些代码都放在了`HeroDetailController`类中。将这个解析逻辑放在`HeroDetailController`内部可能合适，但随着它变得更加复杂，只会让您的代码变得混乱。您将对应用进行重构，将属性列表处理代码从`HeroDetailController`中提取出来，放到一个新的类`HeroDetailConfiguration`中。然后，您将选择采用哪种方法来处理数据驱动的`Powers`分区。\n\
