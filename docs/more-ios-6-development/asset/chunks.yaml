    \ `Power` 实体。这将是一个非常简单的类，你可以很快实现它。在开发过程中，有时你可能会这样做。这不一定是最优雅的解决方案，但可能是最快的方法。有时候你只需要让功能跑起来。\n\
    \n但既然这是一本书，而你正在学习这个示例，将 `HeroDetailController` 重构为一个更通用的 `ManagedObjectController`\
    \ 是合理的。之后，你可以使用这个重构后的控制器为 `Hero` 实体的获取属性实现视图。当你将视图控制器配置移到属性列表时，就已经为这项工作了奠定了基础。自那以后，你一直尝试在\
    \ `HeroDetailController` 中实现通用解决方案。希望这些努力没有白费。\n\n首先，你要将 `HeroDetailConfiguration`\
    \ 类重命名为 `ManagedObjectConfiguration`。你不会更改属性列表的名称，因为它仍然是专门用于显示 `Hero` 实体的。接下来，你将创建\
    \ `ManagedObjectController` 类。你将把 `HeroDetailController` 中的大部分逻辑移到 `ManagedObjectController`\
    \ 中。`HeroDetailController` 将只是一个非常薄的子类，它知道要加载哪个配置属性列表的名称。\n\n让我们开始吧。\n\n### 重命名配置类\n"
- fmt: '# The HeroDetailConfiguration Class Name


    The `HeroDetailConfiguration` class name worked because it was used by the `HeroDetailController`.
    Now that you’re renaming the Controller class, you should rename the configuration
    class. Open `HeroDetailConfiguration.h`, and highlight the class name in the Editor.
    Select the **Edit** ![image](images/arrow.jpg) **Refactor** ![image](images/arrow.jpg)
    **Rename** menu, and rename the class to `ManagedObjectConfiguration` ([Figure
    7-16](#9781430238072_Ch07.xhtml#Fig16)). Click **Preview** and review the changes
    Xcode made. It should change the interface and implementation files, as well as
    the references in `HeroDetailController`. When you’re ready, click **Save**.


    ![9781430238072_Fig07-16.jpg](images/9781430238072_Fig07-16.jpg)


    [Figure 7-16.](#9781430238072_Ch07.xhtml#_Fig16)  The Rename refactoring pane


    There’s a code change you need to make. In the `ManagedObjectConfiguration init`
    method, the configuration property list is loaded like this:


    ```

    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"ManagedObjectConfiguration"

                                               withExtension:@"plist"];

    ```


    Remember, you’re keeping the current configuration property list name as `HeroDetailController.plist`.
    If you hardcode that name, you won’t have really done anything useful. You need
    to change the initializer from a simple `init` method to something like


    ```

    - (id)initWithResource:(NSString *)resource;

    ```


    Add that declaration to the `ManagedObjectController.h` file, inside the `@interface`.
    Then you can change the `init` method to


    ```

    - (id)init

    - (id)initWithResource:(NSString *)resource

    {

        self = [super init];

        if (self) {

            // Initialization Code

            NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"ManagedObjectConfiguration"

                                                       withExtension:@"plist"];

            NSURL *plistURL = [[NSBundle mainBundle] URLForResource:resource withExtension:@"plist"];

            NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];

            self.sections = [plist valueForKey:@"sections"];

        }

        return self;

    }

    ```


    Now you need to change this line in the `HeroDetailController viewDidLoad` method


    ```

    self.config = [[ManagedObjectConfiguration alloc] init];

    ```


    to


    ```

    self.config = [[ManagedObjectConfiguration alloc] initWithResource:@"HeroDetailConfiguration"];

    ```


    **Note**  Why make this change if you’re just going to refactor `HeroDetailController`?
    Well, one of the big keys with refactoring is making small changes and checking
    things still work. You wouldn’t want to make a lot of changes, just to find things
    don’t work. Another key to successful refactoring is writing unit tests. Then
    you have a repeatable set of tests that will help ensure you haven’t made drastic
    changes you don’t expect. You’ll learn about unit tests in [Chapter 15.](#9781430238072_Ch15.xhtml)


    At this point your app should still be working, but you’ve only made a very minor
    change. The big one is coming up next.


    ## Refactoring the Detail Controller


    You could just create a new class named `ManagedObjectContro ller` and move most
    of the code from `HeroDetailController` to your new class. But this is adding
    a layer of complexity (moving code), that could lead to a mistake being made.
    It’s easier to rename the `HeroDetailController`, clean up the code to be more
    generic, and then implement a new `HeroDetailController` class.


    Open `HeroDetailController.h` and rename the class to `ManagedObjectController`,
    using **Edit** ![image](images/arrow.jpg) **Refactor** ![image](images/arrow.jpg)
    **Rename**. Review the proposed changes by Xcode. You’ll notice that Xcode is
    changing `SuperDB.storyboard`, which is just an XML file internally. You’ll just
    have to have faith that Xcode knows what it’s doing. Click **Save**. You may want
    to build and run the app, just to check it’s still working.


    ## Refactoring the Hero Instance Variable


    In your `ManagedObjectEditor` class, you have an instance variable called `hero`.
    That variable name is no longer representative of what that variable holds, so
    let’s refactor it as well. Open `ManagedObjectEditor.h`, and rename the `hero`
    property to `managedObject`. Now you must make the changes in the rest of the
    app.


    **Note**  Why not use the Xcode refactor option? You could have, but it’s not
    so good at renaming instance variables. When we tried it, it wanted to make changes
    to both the data model and storyboard. That’s just wrong. We could have unchecked
    those changes in the File Preview pane, and saved the changes. But Xcode doesn’t
    rename the other occurrences, so you have to do it manually anyway.


    Open `ManagedObjectEditor.m`, and find all occurrences of


    ```

    self.hero

    ```


    and change them to


    ```

    self.managedObject

    ```


    Lastly, edit `HeroListContoller.m`, and change this line in `prepareForSegue:sender`


    ```

    detailController.hero = sender;

    ```


    to


    ```

    detailController.managedObject = sender;

    ```


    Save your work, and check the app.


    ## A Little More Abstraction


    While you’re working on `ManagedObjectController`, take this opportunity to add
    some discrete functionality. Specifically, when you add or remove powers, you
    put the code to do this in `tableView:commitEditingStyle:forRowAtIndexPath:`.
    Let’s split this code into specific methods to add and remove Relationship objects.
    Add the following method declarations to `ManagedObjectController.h`:


    ```

    - (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section;

    - (void)removeRelationshipObjectInIndexPath:(NSIndexPath *)indexPath;

    ```


    Before you implement these methods, add a new private method. Find the private
    category in `ManagedObjectController.m`, and add this line:


    ```

    - (void)saveManagedObjectContext;

    ```


    Then, add the implementation:


    ```

    - (void)saveManagedObjectContext

    {

        NSError *error;

        if (![self.managedObject.managedObjectContext save:&error]) {

            // need to make HeroDetailController a UIAlertViewDelegate

            UIAlertView *alert =             [[UIAlertView alloc] initWithTitle:NSLocalizedString(@"Error
    saving entity",                                                                  @"Error
    saving entity")

                           message:[NSString stringWithFormat:NSLocalizedString(@"Error
    was: %@, quitting.",                                                                          @"Error
    was: %@, quitting."),                                                              
    [error localizedDescription]]

                           delegate:self

                 cancelButtonTitle:NSLocalizedString(@"Aw, Nuts", @"Aw, Nuts")

                 otherButtonTitles:nil];

            [alert show];

        }

    }

    ```


    Does this look familiar? It should; it’s essentially the code in the `save` method.
    So update the following lines in the `save` method from


    ```

        NSError *error;

        if (![self.managedObject.managedObjectContext save:&error])

            NSLog(@"Error saving: %@", [error localizedDescription]);

    ```


    into


    ```

        [self saveManagedObjectContext];

    ```


    Now you can add the new method implementations (we added them just for the `@end`
    in `ManagedObjectController.m`).


    ```

    #pragma mark - Instance Methods


    - (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section

    {

        NSString *key = [self.config dynamicAttributeKeyForSection:section];

        NSMutableSet *relationshipSet = [self.managedObject mutableSetValueForKey:key];


    NSEntityDescription *entity = [self.managedObject entity];

        NSDictionary *relationships = [entity relationshipsByName];

        NSRelationshipDescription *destRelationship = [relationships objectForKey:key];

        NSEntityDescription *destEntity = [destRelationship destinationEntity];

    ```'
