    your application’s data model


    Unlike the data model from [Chapter 2](#9781430238072_Ch02.xhtml), you should
    be starting with a completely empty data model. So let’s dive right in and start
    building. The first thing you need to add to your data model is an entity. Remember,
    entities are like class definitions. Although they don’t store any data themselves,
    without at least one entity in your data model, your application won’t be able
    to store any data.


    Adding an Entity


    Since the purpose of your application is to track information about superheroes,
    it seems logical that you’re going to need an entity to represent a hero. You’re
    going to start off simple in this chapter and track only a few pieces of data
    about each hero: name, secret identity, date of birth, and sex. You’ll add more
    data elements in future chapters, but this will give you a basic foundation upon
    which to build.


    Add a new entity to the data model. A new entity, named Entity, should appear
    in the Top-Level Components pane. This entity should be selected, and the text
    Entity should be highlighted. Type **Hero** to name this entity.


    Editing the New Entity


    Let’s verify that your new Hero entity has been added to the default configuration.
    Select the Default Configuration in the Top-Level Configuration pane. The Data
    Editor Detail pane to the right should have changed with a single table named
    Entities. There should be one entry in this table, the entity you just named Hero.


    Next to Hero is a checkbox called Abstract. This checkbox allows you to create
    an entity that cannot be used to create managed objects at runtime. The reason
    why you might create an abstract entity is if you have several properties that
    are common to multiple entities. In that case, you might create an abstract entity
    to hold the common fields and then make every entity that uses those common fields
    a child of that abstract entity. Thus if you needed to change those common fields,
    you’d only need to do it in one place.


    Next, the Class field should blank. This means the Hero entity is a subclass of
    NSManagedObject. In [Chapter 6](#9781430238072_Ch06.xhtml), you’ll see how to
    create custom subclasses of NSManagedObject to add functionality.


    You can see more detail by selecting this row, and then exposing the Utility pane.
    Let’s expose the Utility pane. Once the Utility pane appears, select the Data
    Model Inspector (the third button on the Inspector Selector bar). The Utility
    pane should be similar to [Figure 3-35](#9781430238072_Ch03.xhtml#Fig35).


    ![9781430238072_Fig03-35.jpg](images/9781430238072_Fig03-35.jpg)


    [Figure 3-35.](#9781430238072_Ch03.xhtml#_Fig35)  The Utilities pane for the new
    Entity


    The first three fields (Name, Class, and Abstract Entity) mirror what you saw
    in the Data Detail pane. Below the Abstract Entity checkbox is a pop-up menu labeled
    Parent Entity. Within a data model, you have the ability to specify a parent entity,
    which is very similar to subclassing in Objective-C. When you specify another
    entity as your parent, the new entity receives all the properties of parent entity
    along with any additional ones that you specify. Leave the parenting pop-up set
    to No Parent Entity.


    **Note**  You may be wondering about the additional areas in the Data Model Inspector,
    titled User Info, Versioning and Entity Sync. These settings give you access to
    more advanced configuration parameters that are only rarely used. You won’t be
    changing any of the configurations.


    If you’re interested in finding out more about these advanced options, you can
    read more about them in *Pro Core Data for iOS, 2nd Edition* ([www.apress.com/9781430236566](http://www.apress.com/9781430236566)).
    Apple has the following guides online as well: the Core Data Programming Guide
