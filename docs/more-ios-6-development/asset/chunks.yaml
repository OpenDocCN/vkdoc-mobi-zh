    \        _title = assetItem.title;\n        _artist = assetItem.artist;\n    \
    \    _image = assetItem.image;\n        _metadataLoaded = assetItem.metadataLoaded;\n\
    \        _isVideo = assetItem.isVideo;\n        self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue,\
    \ DISPATCH_QUEUE_SERIAL);\n    }\n    return self;\n}\n```\n\n两个初始化方法应该都很直观。在这两个方法中，你都使用常量字符串标识符`kAssetItemDispatchQueue`创建了一个串行队列。`initWithAsset:`方法复制了相关的属性。注意在复制`AVAsset`属性时使用了私有方法`assetCopyIfLoaded`。\n\
    \n接下来，你将定义遵循`NSCopying`协议所需的方法。\n\n```\n#pragma mark - NSCopying Protocol Methods\n\
    \n- (id)copyWithZone:(NSZone *)zone\n{\n        AssetItem *copy = [[AssetItem\
    \ allocWithZone:zone] initWithAsset:self];\n        return copy;\n}\n\n- (BOOL)isEqual:(id)anObject\n\
    {\n        if (self == anObject)\n                return YES;\n\nif ([anObject\
    \ isKindOfClass:[AssetItem class]]) {\n                AssetItem *assetItem =\
    \ anObject;\n                if (self.assetURL && assetItem.assetURL)\n      \
    \                  return [self.assetURL isEqual:assetItem.assetURL];\n      \
    \          return NO;\n        }\n        return NO;\n}\n\n- (NSUInteger)hash\n\
    {\n    return (self.assetURL) ? [self.assetURL hash] : [super hash];\n}\n```\n\
    \n对于`isEqual:`和`hash`方法，你依赖于资源`URL`的唯一性。\n\n你将重写某些属性的访问器。为了访问`AssetItem`底层的`AVAsset`，你需要复制一份资源。这是因为`AVAsset`实例在同一时间只能从一个线程访问。如果你返回了对`AssetItem`实际`AVAsset`的引用，则无法保证它不会被不同线程访问。注意，这里你并没有复制底层的`AVAsset`实例变量；而是调用了`localAsset`方法。\n\
    \n```\n#pragma mark - Property Overrides\n\n// 复制一份，因为 AVAsset 一次只能安全地从一个线程访问\n\
    - (AVAsset*)asset\n{\n        __block AVAsset *theAsset = nil;\n        dispatch_sync(self.dispatchQueue,\
    \ ^(void) {\n                theAsset = [[self localAsset] copy];\n        });\n\
    \        return theAsset;\n}\n\n- (NSString *)title\n{\n    if (_title == nil)\n\
    \        return [self.assetURL lastPathComponent];\n    return _title;\n}\n\n\
    - (NSString *)artist\n{\n    if (_artist == nil)\n        return @\"Unknown\"\
    ;\n    return _artist;\n}\n```\n\n`title`和`artist`访问器会检查它们各自的实例变量。如果它们为`nil`，你可以假设你尚未加载资源的元数据，或者元数据值不存在。在这些情况下，你使用一个备用值。对于资源标题，你使用资源`URL`的最后一个路径组件。对于艺术家名称，你简单地使用值`Unknown`。\n\
    \n加载资源的元数据可能会有些复杂，所以让我们逐步了解实现过程。\n\n```\n- (void)loadAssetMetadataWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem))completion\n{\n    dispatch_async(self.dispatchQueue,\
    \ ^(void){\n```\n\n你做的第一件事是将整个方法体包裹在一个对调度队列的`dispatch_async`调用中。你将通过主线程调用此方法。`dispatch_async`调用确保该方法将被放入你的调度队列并在主线程之外执行。你获取你的`AVAsset`并使其异步加载其元数据。\n\
    \n```\n        AVAsset *a = [self localAsset];\n        [a loadValuesAsynchronouslyForKeys:@[@\"\
    commonMetadata\"] completionHandler:^{\n            NSError *error;\n        \
    \    AVKeyValueStatus cmStatus = [a statusOfValueForKey:@\"commonMetadata\" error:&error];\n\
    \            switch (cmStatus) {\n                case AVKeyValueStatusLoaded:\n\
    \                    _title = [self loadTitleForAsset:a];\n                  \
    \  _artist = [self loadArtistForAsset:a];\n                    _image = [self\
    \ loadImageForAsset:a];\n                    _metadataLoaded = YES;\n        \
    \            break;\n\ncase AVKeyValueStatusFailed:\n                case AVKeyValueStatusCancelled:\n\
    \                    dispatch_async(dispatch_get_main_queue(), ^{\n          \
    \              NSLog(@\"The asset's available metadata formats were not loaded:\\\
    n%@\", [error localizedDescription]);\n                    });\n             \
    \       break;\n            }\n```\n\n在`loadValuesAsychronouslyForKeys:completetionHandler:`完成后，完成处理程序块会检查`commonMetadata`键的状态。如果加载因某种原因失败或被取消，你记录错误。如果加载成功，你加载你关心的元数据属性，并将`metadataLoaded`标志设置为`YES`。\n\
    \n```\n            /* 重要提示：必须调度到主队列才能操作 AVPlayer 和 AVPlayerItem。 */\n        \
    \    dispatch_async(dispatch_get_main_queue(), ^{\n                if (completion)\n\
    \                    completion(self);\n            });\n        }];\n    });\n\
    }\n```\n\n最后，你调用传入方法的完成处理程序。你将该调用派发回主队列，因为它将与你的`AVPlayer`和`AVPlayerItem`实例进行交互。\n"
- fmt: "Now let’s implement your private category methods. One thing about these methods:\
    \ they are implicitly or explicitly expected to be performed in the dispatch queue\
    \ (thread). `assetCopyIfLoaded` is only used in the `initWithAssetItem:initializer`\
    \ method to copy your `AVAsset` property. You dispatch the `AVAsset` copying to\
    \ the dispatch queue to keep the copying from potentially blocking the main thread,\
    \ which would cause the UI to freeze.\n\n```\n- (AVAsset*)assetCopyIfLoaded\n\
    {\n        __block AVAsset *theAsset = nil;\n        dispatch_sync(self.dispatchQueue,\
    \ ^(void){\n                theAsset = [_asset copy];\n        });\n        return\
    \ theAsset;\n}\n```\n\nThe `localAsset` method is your private accessor to the\
    \ `AVAsset` property/ivar. It follows a lazy loading logic to instantiate the\
    \ `_asset` ivar if necessary. Remember, if you’re invoking the `localAsset` method,\
    \ you’re operating from the dispatch queue thread, and it’s only being invoke\
    \ from another `AssetItem` method.\n\n```\n- (AVAsset*)localAsset\n{\n    if (_asset\
    \ == nil) {\n        _asset = [[AVURLAsset alloc] initWithURL:self.assetURL options:nil];\n\
    \    }\n    return  _asset;\n}\n```\n\nTake a look back at the `loadAssetMetadataWithCompletionHandler:`\
    \ method. On successful loading of the metadata, you call `loadTitleForAsset:`,\
    \ `loadArtistForAsset:`, and `loadImageForAsset:`. Let’s step over each one, starting\
    \ with `loadTitleForAsset:`. First, you extract the asset titles that are stored\
    \ in the asset’s `commonMetadata` property.\n\n```\n- (NSString *)loadTitleForAsset:(AVAsset\
    \ *)a\n{\n    NSString *assetTitle = nil;\n    NSArray *titles = [AVMetadataItem\
    \ metadataItemsFromArray:[a commonMetadata]                                  \
    \                      \n    withKey:AVMetadataCommonKeyTitle                \
    \                                      \n    keySpace:AVMetadataKeySpaceCommon];\n\
    ```\n\nIf the `titles` array is not empty, then you need to find the title that\
    \ matches the device user’s preferred language and/or locale. Language and locale\
    \ preference is a system setting. If there are multiple titles returned for a\
    \ language/locale preference, you just return the first one.\n\n```\n    if ([titles\
    \ count] > 0) {\n        // Try to get a title that matches one of the user’s\
    \ preferred languages.\n        NSArray *preferredLanguages = [NSLocale preferredLanguages];\n\
    \nfor (NSString *thisLanguage in preferredLanguages) {\n            NSLocale *locale\
    \ = [[NSLocale alloc] initWithLocaleIdentifier:thisLanguage];\n            NSArray\
    \ *titlesForLocale = [AVMetadataItem metadataItemsFromArray:titles           \
    \                                         withLocale:locale];\n            if\
    \ ([titlesForLocale count] > 0) {\n                assetTitle = [[titlesForLocale\
    \ objectAtIndex:0] stringValue];\n                break;\n            }\n    \
    \    }\n```\n\nIf you haven’t been able to match a title using the preferred language/locale,\
    \ you just return the first one in your original `titles` array.\n\n```\n    \
    \    // No matches in any of the preferred languages.\n```\n\n// Just use the\
    \ primary title metadata we find.\n\n```\n        if (assetTitle == nil) {\n \
    \           assetTitle = [[titles objectAtIndex:0] stringValue];\n        }\n\
    \    }\n    return assetTitle;\n}\n```\n\nFinding the artist name from the asset\
    \ metadata is pretty much identical, except you use the key `AVMetadataCommonKeyArtist`\
    \ to extract the artist names array from the `commonMetadata` property.\n\n```\n\
    - (NSString *)loadArtistForAsset:(AVAsset *)a\n{\n    NSString *assetArtist =\
    \ nil;\n    NSArray *titles = [AVMetadataItem metadataItemsFromArray:[a commonMetadata]\
    \                                                        \n metadata is pretty\
    \ much identical, except withKey:AVMetadataCommonKeyArtist                   \
    \                                   \n metadata is pretty much identical, except\
    \ keySpace:AVMetadataKeySpaceCommon];\n    if ([titles count] > 0) {\n       \
    \ // Try to get a artist that matches one of the user’s preferred languages.\n\
    \        NSArray *preferredLanguages = [NSLocale preferredLanguages];\n\nfor (NSString\
    \ *thisLanguage in preferredLanguages) {\n            NSLocale *locale = [[NSLocale\
    \ alloc] initWithLocaleIdentifier:thisLanguage];\n            NSArray *titlesForLocale\
    \ = [AVMetadataItem metadataItemsFromArray:titles                            \
    \                        withLocale:locale];\n            if ([titlesForLocale\
    \ count] > 0) {\n                assetArtist = [[titlesForLocale objectAtIndex:0]\
    \ stringValue];\n                break;\n            }\n        }\n\n// No matches\
    \ in any of the preferred languages.\n```\n\n// Just use the primary artist metadata\
    \ we find.\n\n```\n        if (assetArtist == nil) {\n            assetArtist\
    \ = [[titles objectAtIndex:0] stringValue];\n        }\n    }\n    return assetArtist;\n\
    }\n```\n\nLoading the asset artwork from the `commonMetadata` is much simpler.\
    \ You load the potential array of images from the asset metadata. The first item\
    \ in the images array can either be a dictionary or a block of data. If the item\
    \ is a dictionary, the image data is stored under the key `data`. Either way,\
    \ you can instantiate a `UIImage` from the data.\n\n```\n- (UIImage *)loadImageForAsset:(AVAsset\
    \ *)a\n{\n    UIImage *assetImage = nil;\n    NSArray *images = [AVMetadataItem\
    \ metadataItemsFromArray:[a commonMetadata]                                  \
    \                      \n metadata is pretty much identical, except withKey:AVMetadataCommonKeyArtwork\
    \                                                      \n metadata is pretty much\
    \ identical, except keySpace:AVMetadataKeySpaceCommon];\n    if ([images count]\
    \ > 0) {\n        AVMetadataItem *item = [images objectAtIndex:0];\n        NSData\
    \ *imageData = nil;\n        if ([item.value isKindOfClass:[NSDictionary class]])\
    \ {\n            NSDictionary *valueDict = (NSDictionary *)item.value;\n     \
    \       imageData = [valueDict objectForKey:@\"data\"];\n        }\n        else\
    \ if ([item.value isKindOfClass:[NSData class]])\n            imageData = (NSData\
    \ *)item.value;\n        assetImage = [UIImage imageWithData:imageData];\n   \
    \ }\n    return assetImage;\n}\n```\n\nRemember that you load an asset’s metadata\
    \ asynchronously. That means when you load the asset from your media library,\
    \ you queue the request to load the asset metadata. Meanwhile, your application\
    \ needs to populate the table view cells with something. By default, `AssetItem`\
    \ will return the last path item of the asset URL for the title and “Unknown”\
    \ for the artist. You need the table view cells to reload once the asset metadata\
    \ has been loaded. You’ll need to modify the `MediaViewController` class to do\
    \ this.\n\n`MediaViewController` will need to know about your new `AssetItem`\
    \ class. Open `MediaViewController.m` and import the `AssetItem` header, right\
    \ after the other header import declarations\n\n```\n#import \"AssetItem.h\"\n\
    ```\n\nNext, you’ll add two private category methods. One will be use to configure\
    \ the table view cell for a given index path. The other will be used at the completion\
    \ handler when you invoke `loadAssetMetadataWithCompletionHandler:` on an `AssetItem`.\n\
    \n```\n@interface MediaViewController ()\n- (void)configureCell:(UITableViewCell\
    \ *)cell forIndexPath:(NSIndexPath *)indexPath;\n- (void)updateCellWithAssetItem:(AssetItem\
    \ *)assetItem;\n@end\n```\n\nSince `configureCell:forIndexPath:` will be used\
    \ to configure your table view cells, you can modify `table:cellForRowAtIndexPath:`\
    \ table view data source method.\n\n```\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView          \n  cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n\
    \    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell *cell\
    \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier              \
    \                                   \n  forIndexPath:indexPath];\n\n// Configure\
    \ the cell. . .\n    [self configureCell:cell forIndexPath:indexPath];\n\nreturn\
    \ cell;\n}\n```\n\nNow, you can implement `configureCell:forIndexPath:`.\n\n```\n\
    - (void)configureCell:(UITableViewCell *)cell forIndexPath:(NSIndexPath *)indexPath\n\
    {\n    NSInteger row = [indexPath row];\n```"
