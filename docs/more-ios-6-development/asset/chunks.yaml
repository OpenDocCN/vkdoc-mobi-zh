    \ alloc] initWithKey:@\"secretIdentity\"\n                                                                       \
    \ ascending:YES];\n        NSArray *sortDescriptors =\n            [[NSArray alloc]\
    \ initWithObjects:sortDescriptor1, sortDescriptor2, nil];\n        [fetchRequest\
    \ setSortDescriptors:sortDescriptors];\n        sectionKey = @\"name\";\n        break;\n\
        }\n    case kBySecretIdentity:{\n        NSSortDescriptor *sortDescriptor1\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"secretIdentity\"\n                                                                       \
    \ ascending:YES];\n        NSSortDescriptor *sortDescriptor2 = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\"\n                                                                       \
    \ ascending:YES];\n        NSArray *sortDescriptors =\n            [[NSArray alloc]\
    \ initWithObjects:sortDescriptor1, sortDescriptor2, nil];\n        [fetchRequest\
    \ setSortDescriptors:sortDescriptors];\n        sectionKey = @\"secretIdentity\"\
    ;\n        break;\n    }\n}\n```\n\nIf the By Name tab is selected, you ask the\
    \ fetch request to sort by the name attribute, then the secretIdentity. For the\
    \ By Secret Identity tab, you reverse the sort descriptors. You set a sectionKey\
    \ string, which you’ll use next.\n\nNow you finally instantiate the fetched results\
    \ controller. Here’s where you use the sectionKey, and assign it a cache name\
    \ of Hero. You assign the fetched results controller delegate to the HeroListController.\n\
    \n```\n_fetchedResultsController =\n    [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\n\
                                            managedObjectContext:managedObjectContext\n\
                                              sectionNameKeyPath:sectionKey\n                                                   cacheName:@\"\
    Hero\"];\n_fetchedResultsController.delegate = self;\n\nreturn _fetchedResultsController;\n\
    ```\n\nFinally, you return the fetched results controller.\n\nFetched Results\
    \ Controller Delegate Methods\n\nSince you assigned the fetched results controller\
    \ delegate to the HeroListController, you need to implement those methods. Add\
    \ the following below the fetchedResultsController method you just created:\n\n\
    ```\n#pragma mark - NSFetchedResultsControllerDelegate Methods\n\n- (void)controllerWillChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n    [self.heroTableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n    [self.heroTableView endUpdates];\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n  didChangeSection:(id < NSFetchedResultsSectionInfo>)sectionInfo\n\
               atIndex:(NSUInteger)sectionIndex\n     forChangeType:(NSFetchedResultsChangeType)type\n\
    {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n            [self.heroTableView\
    \ insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n                                           \
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n\ncase NSFetchedResultsChangeDelete:\n\
                [self.heroTableView deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
                                                withRowAnimation:UITableViewRowAnimationFade];\n\
                break;\n    }\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n   didChangeObject:(id)anObject\n       atIndexPath:(NSIndexPath\
    \ *)indexPath\n     forChangeType:(NSFetchedResultsChangeType)type\n      newIndexPath:(NSIndexPath\
    \ *)newIndexPath\n{\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n\
                [self.heroTableView insertRowsAtIndexPaths:@[newIndexPath]\n                                     \
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n\ncase NSFetchedResultsChangeDelete:\n\
                [self.heroTableView deleteRowsAtIndexPaths:@[indexPath]\n                                     \
    \ withRowAnimation:UITableViewRowAnimationFade];\n            break;\n\ncase NSFetchedResultsChangeUpdate:\n\
            case NSFetchedResultsChangeMove:\n            break;\n\n}\n}\n```\n\n\
    For an explanation of these methods, refer to the “Fetched Results Controller\
    \ Delegate” section of [Chapter 2](#9781430238072_Ch02.xhtml).\n\nMaking All Work\n\
    \nYou’re almost done. You still need to\n\n*   Implement the Edit and Add (+)\
    \ buttons.\n*   Code the table view data source and delegate methods correctly.\n\
    *   Make the tab bar selector sort the table view.\n*   Run the fetch request\
    \ at launch.\n*   Handle errors.\n\nIt seems like a lot, but it’s not. Let’s start\
    \ with the error handling first.\n\nError Handling\n\nYou’ll make things simple\
    \ by using a simple alert view to display errors. In order to use an alert view,\
    \ you need to implement an alert view delegate. Like the fetched results controller,\
    \ you’ll make the HeroListController the alert view delegate. Edit the HeroListController\
    \ @interface declaration to read\n\n```\n@interface HeroListController : UIViewController\
    \ < UITableViewDataSource, UITableViewDelegate, UITabBarDelegate, \nNSFetchedResultsControllerDelegate,\
    \ UIAlertViewDelegate>\n```\n\nIn HeroListController.m, you’ll add a simple alert\
    \ view delegate method.\n\n```\n#pragma mark - UIAlertViewDelegate Methods\n\n\
    - (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    exit(−1);\n}\n```\n\nAll this method does is cause your application quit."
  trans: "\n```\n#pragma mark – FetchedResultsController 属性\n\n- (NSFetchedResultsController\
    \ *)fetchedResultsController\n{\n}\n```\n\n俗话说得好，牛肉在哪里？好吧，我们想逐行讲解这段代码。如果你想提前了解，完整的代码清单在本章末尾可以找到。\n\
    \n首先，我们提到获取结果控制器将被延迟加载，因此这里是处理该逻辑的代码：\n\n```\nif (_fetchedResultsController !=\
    \ nil) {\n    return _fetchedResultsController;\n}\n```\n\n如果执行过了这个点，意味着 `_fetchResultsController`\
    \ 实例变量（简称 ivar）为 `nil`，所以你需要创建一个。首先，你需要实例化一个获取请求。\n\n```\nNSFetchRequest *fetchRequest\
    \ = [[NSFetchRequest alloc] init];\n```\n\n现在，获取 `Hero` 实体的实体描述，并设置获取请求的实体。同时，设置获取批次大小，出于性能考虑，这会将获取操作拆分成多个批次。\n\
    \n```\nAppDelegate *appDelegate = (AppDelegate *)[[UIApplication sharedApplication]\
    \ delegate];\nNSManagedObjectContext *managedObjectContext = [appDelegate managedObjectContext];\n\
    NSEntityDescription *entity = [NSEntityDescription entityForName:@\"Hero\"\n \
    \                                         inManagedObjectContext:managedObjectContext];\n\
    [fetchRequest setEntity:entity];\n[fetchRequest setFetchBatchSize:20];\n```\n\n\
    获取结果的顺序将取决于你选择的标签页，因此你需要获取该值。作为健全性检查，如果没有选择任何标签页，则读取用户默认设置。\n\n```\nNSUInteger\
    \ tabIndex = [self.heroTabBar.items indexOfObject:self.heroTabBar.selectedItem];\n\
    if (tabIndex == NSNotFound) {\n    NSUserDefaults *defaults = [NSUserDefaults\
    \ standardUserDefaults];\n    tabIndex = [defaults integerForKey:kSelectedTabDefaultsKey];\n\
    }\n```\n\n现在，设置获取请求的排序描述符。排序描述符是一个简单的对象，它告诉获取请求使用哪个属性来比较实体实例，以及排序是升序还是降序。获取请求需要一个排序描述符数组，排序描述符的顺序决定了比较时的优先级顺序。\n\
    \n```\nNSString *sectionKey = nil;\nswitch (tabIndex) {\n    // 注意 kByName 和 kBySecretIdentity\
    \ 的代码几乎相同。\n    // 是否该重构一下？\n    case kByName: {\n        NSSortDescriptor *sortDescriptor1\
    \ = [[NSSortDescriptor alloc] initWithKey:@\"name\"\n                        \
    \                                                ascending:YES];\n        NSSortDescriptor\
    \ *sortDescriptor2 = [[NSSortDescriptor alloc] initWithKey:@\"secretIdentity\"\
    \n                                                                        ascending:YES];\n\
    \        NSArray *sortDescriptors =\n            [[NSArray alloc] initWithObjects:sortDescriptor1,\
    \ sortDescriptor2, nil];\n        [fetchRequest setSortDescriptors:sortDescriptors];\n\
    \        sectionKey = @\"name\";\n        break;\n    }\n    case kBySecretIdentity:{\n\
    \        NSSortDescriptor *sortDescriptor1 = [[NSSortDescriptor alloc] initWithKey:@\"\
    secretIdentity\"\n                                                           \
    \             ascending:YES];\n        NSSortDescriptor *sortDescriptor2 = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"name\"\n                                             \
    \                           ascending:YES];\n        NSArray *sortDescriptors\
    \ =\n            [[NSArray alloc] initWithObjects:sortDescriptor1, sortDescriptor2,\
    \ nil];\n        [fetchRequest setSortDescriptors:sortDescriptors];\n        sectionKey\
    \ = @\"secretIdentity\";\n        break;\n    }\n}\n```\n\n如果选择了“按名称”标签页，你让获取请求先按\
    \ `name` 属性排序，然后按 `secretIdentity` 排序。对于“按隐秘身份”标签页，你颠倒了排序描述符的顺序。你设置了一个 `sectionKey`\
    \ 字符串，稍后将用到它。\n\n现在，你终于实例化了获取结果控制器。这里就是你使用 `sectionKey` 的地方，并为其分配一个名为 `Hero` 的缓存名称。你将获取结果控制器的代理设置为\
    \ `HeroListController`。\n\n```\n_fetchedResultsController =\n    [[NSFetchedResultsController\
    \ alloc] initWithFetchRequest:fetchRequest\n                                 \
    \       managedObjectContext:managedObjectContext\n                          \
    \                sectionNameKeyPath:sectionKey\n                             \
    \                      cacheName:@\"Hero\"];\n_fetchedResultsController.delegate\
    \ = self;\n\nreturn _fetchedResultsController;\n```\n\n最后，你返回获取结果控制器。\n\n## 获取结果控制器代理方法\n\
    \n由于你将获取结果控制器的代理设置为了 `HeroListController`，因此你需要实现这些方法。在你刚刚创建的 `fetchedResultsController`\
    \ 方法下方添加以下内容：\n\n```\n#pragma mark – NSFetchedResultsControllerDelegate 方法\n\n\
    - (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\n\
    {\n    [self.heroTableView beginUpdates];\n}\n\n- (void)controllerDidChangeContent:(NSFetchedResultsController\
    \ *)controller\n{\n    [self.heroTableView endUpdates];\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n  didChangeSection:(id < NSFetchedResultsSectionInfo>)sectionInfo\n\
    \           atIndex:(NSUInteger)sectionIndex\n     forChangeType:(NSFetchedResultsChangeType)type\n\
    {\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n          \
    \  [self.heroTableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
    \                                            withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n\n        case NSFetchedResultsChangeDelete:\n          \
    \  [self.heroTableView deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n\
    \                                            withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n\n- (void)controller:(NSFetchedResultsController\
    \ *)controller\n   didChangeObject:(id)anObject\n       atIndexPath:(NSIndexPath\
    \ *)indexPath\n     forChangeType:(NSFetchedResultsChangeType)type\n      newIndexPath:(NSIndexPath\
    \ *)newIndexPath\n{\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n\
    \            [self.heroTableView insertRowsAtIndexPaths:@[newIndexPath]\n    \
    \                                  withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n\n        case NSFetchedResultsChangeDelete:\n          \
    \  [self.heroTableView deleteRowsAtIndexPaths:@[indexPath]\n                 \
    \                     withRowAnimation:UITableViewRowAnimationFade];\n       \
    \     break;\n\n        case NSFetchedResultsChangeUpdate:\n        case NSFetchedResultsChangeMove:\n\
    \            break;\n    }\n}\n```\n\n关于这些方法的说明，请参考第 2 章中的“获取结果控制器代理”部分。\n\n##\
    \ 让一切运转起来\n\n你基本完成了。但仍需要：\n\n*   实现编辑和添加（+）按钮。\n*   正确编写表视图数据源和代理方法。\n*   让标签栏选择器对表视图进行排序。\n\
    *   在启动时执行获取请求。\n*   处理错误。\n\n看起来工作量很大，但其实不然。让我们先从错误处理开始。\n\n## 错误处理\n\n为了简化操作，你将使用一个简单的警告视图来显示错误。要使用警告视图，你需要实现一个警告视图代理。与获取结果控制器类似，你将使\
    \ `HeroListController` 成为警告视图的代理。修改 `HeroListController @interface` 声明为：\n\n```\n\
    @interface HeroListController : UIViewController < UITableViewDataSource, UITableViewDelegate,\
    \ UITabBarDelegate, \nNSFetchedResultsControllerDelegate, UIAlertViewDelegate>\n\
    ```\n\n在 `HeroListController.m` 中，你将添加一个简单的警告视图代理方法。\n\n```\n#pragma mark – UIAlertViewDelegate\
    \ 方法\n\n- (void)alertView:(UIAlertView *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    exit(−1);\n}\n```\n\n这个方法所做的就是让你的应用程序退出。\n"
- fmt: "# Implementing Edit and Add\n\nWhen you click the Add (+) button, the application\
    \ does more than just add a row to the table view. It adds a new `Hero` entity\
    \ to the managed object context. In the `HeroListController.m` file, modify the\
    \ `addHero` method to read:\n\n```\n- (IBAction)addHero:(id)sender\n{\n     NSManagedObjectContext\
    \ *managedObjectContext = \n         [self.fetchedResultsController managedObjectContext];\n\
    \nNSEntityDescription *entity = [[self.fetchedResultsController fetchRequest]\
    \ entity];\n     [NSEntityDescription insertNewObjectForEntityForName:[entity\
    \ name]\n                                    inManagedObjectContext:managedObjectContext];\n\
    \     NSError *error = nil;\n     if (![managedObjectContext save:&error]) {\n\
    \         UIAlertView *alert =              [[UIAlertView alloc]\n           \
    \       initWithTitle:NSLocalizedString(@\"Error saving entity\",\n          \
    \                                        @\"Error saving entity\")\n         \
    \              message:[NSString stringWithFormat:NSLocalizedString(@\"Error was:\
    \ %@, quitting.\",\n                                                         \
    \                 @\"Error was: %@, quitting.\"),\n                          \
    \                                    [error localizedDescription]]\n         \
    \             delegate:self\n             cancelButtonTitle:NSLocalizedString(@\"\
    Aw, Nuts\", @\"Aw, Nuts\")\n             otherButtonTitles:nil];\n         [alert\
    \ show];\n     }\n}\n```\n\nWhen the Edit button is clicked, the `setEditing:animated:`\
    \ method is automatically called. So you just need to add that method to your\
    \ `HeroListController.m` without having declare it in the interface file.\n\n\
    ```\n- (void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n    [super setEditing:editing\
    \ animated:animated];\n    self.addButton.enabled = !editing;\n    [self.heroTableView\
    \ setEditing:editing animated:animated];\n}\n```\n\nAll you do here is call the\
    \ super method, disable the Add (+) button (you don’t want to be adding heroes\
    \ while editing!), and call `setEditing:animated` on the table view.\n\n# Coding\
    \ the Table View Data Source and Delegate\n\nUsing the `CoreDataApp` from [Chapter\
    \ 2](#9781430238072_Ch02.xhtml) as an example, you need to change the following\
    \ table view data source methods:\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
    \ *)tableView\n{\n   return [[self.fetchedResultsController sections] count];\n\
    }\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n   id < NSFetchedResultsSectionInfo > sectionInfo = \n          [[self.fetchedResultsController\
    \ sections] objectAtIndex:section];\n   return [sectionInfo numberOfObjects];\n\
    }\n```\n\nNext, you handle the table view cell creation, like so:\n\n```\n- (UITableViewCell\
    \ *)tableView:(UITableView *)tableView\n          cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"HeroListCell\";\n \
    \   UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
    \    // Configure the cell. . .\n    NSManagedObject *aHero = [self.fetchedResultsController\
    \ objectAtIndexPath:indexPath];\n    NSInteger tab = [self.heroTabBar.items indexOfObject:self.heroTabBar.selectedItem];\n\
    \    switch (tab) {\n        case kByName:\n            cell.textLabel.text =\
    \ [aHero valueForKey:@\"name\"];\n            cell.detailTextLabel.text = [aHero\
    \ valueForKey:@\"secretIdentity\"];\n            break;\n        case kBySecretIdentity:\n\
    \            cell.textLabel.text = [aHero valueForKey:@\"secretIdentity\"];\n\
    \            cell.detailTextLabel.text = [aHero valueForKey:@\"name\"];\n    \
    \        break;\n    }\n    return cell;\n}\n```\n\nFinally, you uncomment `tableView:commitEditingStyle:forRowAtIndexPath:`\
    \ to handle deleting rows.\n\n```\n// Override to support editing the table view.\n\
    - (void)tableView:(UITableView *)tableView\n         commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
    \         forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    NSManagedObjectContext\
    \ *managedObjectContext = [self.fetchedResultsController managedObjectContext];\n\
    \    if (editingStyle == UITableViewCellEditingStyleDelete) {\n        // Delete\
    \ the row from the data source\n        [managedObjectContext deleteObject:[self.fetchedResultsController\n\
    \                                                 objectAtIndexPath:indexPath]];\n\
    \        NSError *error;\n        if (![managedObjectContext save:&error]) {\n\
    \            UIAlertView *alert =                 [[UIAlertView alloc]\n     \
    \                initWithTitle:NSLocalizedString(@\"Error saving entity\",\n \
    \                                                    @\"Error saving entity\"\
    )\n                          message:\n                              [NSString\
    \ stringWithFormat:NSLocalizedString(@\"Error was: %@, quitting.\",\n        \
    \                                                                    @\"Error\
    \ was: %@, quitting.\"),\n                                                   \
    \        [error localizedDescription]]\n                         delegate:self\n\
    \                cancelButtonTitle:NSLocalizedString(@\"Aw, Nuts\", @\"Aw, Nuts\"\
    )\n                otherButtonTitles:nil];\n            [alert show];\n      \
    \  }\n    }\n}\n```\n\n# Sorting the Table View\n\nFinally, you need to make the\
    \ table view order change when you toggle the tab bar. You need to add the following\
    \ code to `tabBar:didSelectItem:` delegate method:\n\n```\n- (void)tabBar:(UITabBar\
    \ *)tabBar didSelectItem:(UITabBarItem *)item\n{\n    NSUserDefaults *defaults\
    \ = [NSUserDefaults standardUserDefaults];\n    NSUInteger tabIndex = [tabBar.items\
    \ indexOfObject:item];\n    [defaults setInteger:tabIndex forKey:kSelectedTabDefaultsKey];\n\
    \    [NSFetchedResultsController deleteCacheWithName:@\"Hero\"];\n    _fetchedResultsController.delegate\
    \ = nil;\n    _fetchedResultsController = nil;\n    NSError *error;\n    if (![self.fetchedResultsController\
    \ performFetch:&error]) {\n        NSLog(@\"Error performing fetch: %@\", [error\
    \ localizedDescription]);\n    }\n    [self.heroTableView reloadData];\n}\n```\n\
    \n# Loading the Fetch Request At Launch\n\nAdd the following to the `HeroListController`\
    \ `viewDidLoad` method:\n\n```\n// Fetch any existing entities\nNSError *error\
    \ = nil;\nif (![[self fetchedResultsController] performFetch:&error]) {\n    UIAlertView\
    \ *alert =       [[UIAlertView alloc]           initWithTitle:NSLocalizedString(@\"\
    Error loading data\",\n                                           @\"Error loading\
    \ data\")\n                message:[NSString stringWithFormat:NSLocalizedString(@\"\
    Error was: %@, quitting.\",\n                                                \
    \                      @\"Error was: %@, quitting.\"),\n                     \
    \                              [error localizedDescription]]\n               delegate:self\n\
    \      cancelButtonTitle:NSLocalizedString(@\"Aw, Nuts\", @\"Aw, Nuts\")\n   \
    \   otherButtonTitles:nil];\n    [alert show];\n}\n```\n\nAnd that’s pretty much\
    \ everything.\n\n# Let ‘Er Rip\n\nWell, what are you waiting for? That was a lot\
    \ of work; you deserve to try it out. Make sure everything is saved, then build\
    \ and run the app.\n\nIf everything went okay, when the application first launches,\
    \ you should be presented with an empty table with a navigation bar at the top\
    \ and a tab bar at the bottom ([Figure 3-40](#9781430238072_Ch03.xhtml#Fig40)).\
    \ Pressing the right button in the navigation bar will add a new unnamed superhero\
    \ to the database. Pressing the Edit button will allow you to delete heroes.\n\
    \n![9781430238072_Fig03-40.jpg](images/9781430238072_Fig03-40.jpg)\n\n[Figure\
    \ 3-40.](#9781430238072_Ch03.xhtml#_Fig40)  The SuperDB application at launch\
    \ time"
