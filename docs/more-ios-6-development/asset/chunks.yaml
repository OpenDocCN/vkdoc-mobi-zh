    \n[Figure 15-7.](#9781430238072_Ch15.xhtml#_Fig7) Name the test class `DebugMeTests`\n\
    \n![9781430238072_Fig15-08.jpg](images/9781430238072_Fig15-08.jpg)\n\n[Figure\
    \ 15-8.](#9781430238072_Ch15.xhtml#_Fig8) Add `DebugMeTests` to the `DebugTestTests`\
    \ target only\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n#import \"DebugMe.h\"\
    \n\n@interface DebugMeTests : SenTestCase\n\n@property (nonatomic, strong) DebugMe\
    \ *debugMe;\n\n@end\n```\n\nYou import the `DebugMe` header file, and add the\
    \ property `debugMe`. You’ll be using this property in the implementation. Select\
    \ `DebugMeTests.m` to open the implementation file in the editor. Before you write\
    \ any tests, you need to implement your `setUp` and `tearDown` methods. You’ll\
    \ use `setUp` to instantiate your `debugMe` property and `tearDown` to release\
    \ it.\n\n```\n- (void)setUp\n{\n    [super setUp];\n\n// Set-up code here.\n \
    \   self.debugMe = [[DebugMe alloc] init];\n}\n\n- (void)tearDown\n{\n    // Tear-down\
    \ code here.\n    self.debugMe = nil;\n\n[super tearDown];\n}\n```\n\nLet’s start\
    \ by thinking about what you want to test in the `DebugMe` class. `DebugMe` has\
    \ a property named `string`. We could argue that you don’t need to test that this\
    \ property is present. Or we could argue that you should. In the end, it’s going\
    \ to depend on your preferences and project. We’ll define a test as an exercise.\n\
    \n```\n- (void)testDebugMeHasStringProperty\n{\n    STAssertTrue([self.debugMe\
    \ respondsToSelector:@selector(string)], \n                 @\"expected DebugMe\
    \ to have 'string' selector\");\n}\n```\n\nYou’re only checking to see if you\
    \ have an accessor method for the `string` property. You could also check that\
    \ you have a setter method (`setString:`) as well. Which raises another point:\
    \ do you put that check in this test, or do you create another test? Again, there\
    \ is no correct answer; what you do is going to depend on your personal preferences\
    \ and project.\n\nAt this point, it’s a good idea to test the project again. Generally,\
    \ you only add a new test when all your existing tests pass. So before you proceed,\
    \ run this test and make sure it passes.\n\nYour test should have passed, so let’s\
    \ move on to testing the `isTrue` method.\n\n```\n- (void)testDebugMeIsTrue\n\
    {\n    BOOL result = [self.debugMe isTrue];\n    STAssertTrue(result, @\"expected\
    \ DebugMe isTrue to be true, got %@\", result);\n}\n```\n\nNext, you write a test\
    \ for the `isFalse` method.\n\n```\n- (void)testDebugMeIsFalse\n{\n    BOOL result\
    \ = [self.debugMe isFalse];\n    STAssertFalse(result, @\"expected DebugMe isFalse\
    \ to be false, got %@\", result);\n}\n```\n\nFinally, you write a test for the\
    \ `helloWorld` method.\n\n```\n- (void)testDebugMeHelloWorld\n{\n    NSString\
    \ *result = [self.debugMe helloWorld];\n    STAssertEquals(result, @\"Hello, World!\"\
    , \n                   @\"expected DebugMe helloWorld to be 'Hello, World!', got\
    \ '%@'\", result);\n}\n```\n\nRunning your tests at this point will return a failure.\
    \ Why did your tests fail? Look at the Issues Navigator. The failure message reads:\n\
    \n```\nerror: testDebugMeHelloWorld (DebugMeTests) failed: '<7c7d0000>' should\
    \ be equal to '<f8b23d07>':\nexpected DebugMe helloWorld to be 'Hello, World!',\
    \ got 'Hello, World!'\n```\n\nYou told the test to expect \"Hello, World!\", and\
    \ the method returned \"Hello, World!\" What’s going on? Well, it turns out that\
    \ `STAssertEquals` expects the two string objects to be equal, not their values.\
    \ You need to use `STAssertEqualObjects`. So make that change and try again.\n\
    \nSuccess! You’ve written your first unit test cases.\n\nAs a general practice,\
    \ you’ll want to write a test class for each class in your application. There\
    \ is a methodology called *test-driven development* (TDD) that suggests you should\
    \ write your test cases first, then write your application code. A side effect\
    \ of TDD is that you know how your application is supposed to behave before you\
    \ start coding (isn’t that a good idea?).\n\n**Note** You may want to read up\
    \ on test-driven development (TDD). An excellent introduction can be found at\
    \ the Agile Data web site ([www.agiledata.org/essays/tdd.html](http://www.agiledata.org/essays/tdd.html)).\
    \ Kent Beck wrote an excellent book called *Test Driven Development* (Addison-Wesley,\
    \ 2003) that we highly recommend.\n\n**Note** There is an additional concept that\
    \ is very useful when writing tests: *mocking*. When the code you are testing\
    \ is dependent on another object, you can define a *mock object* to emulate the\
    \ dependent object. This helps maintain the *isolation* of each unit test. A good\
    \ mocking framework is OCMock, by Mulle Kyberkinetik ([http://ocmock.org/](http://ocmock.org/)).\n\
