    Refactoring the Detail View Controller


    You have a new managed object that you want to display and edit. You could make
    a new table view controller class specifically to handle displaying a Power entity.
    It would a pretty simple class, and you could implement it very quickly. Sometimes
    when developing, you might do that. It’s not necessarily the most elegant solution,
    but it might the most expedient. And sometimes you just need to get it working.


    But since this a book and you’re working through this example, it makes sense
    to refactor your HeroDetailController into a more generic ManagedObjectController.
    Later you can use this refactored controller to implement the views for the fetched
    properties of the Hero entity. You laid the foundation for this work when you
    moved the view controller configuration into a property list. Since then, you’ve
    tried to implement generic solutions in the HeroDetailController. Hopefully, that
    work paid off.


