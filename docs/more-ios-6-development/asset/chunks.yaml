    \ %@, Failure Reason: %@)\"),\n                              [userInfo valueForKey:@\"\
    NSValidationErrorKey\"],\n                               errorMessage];\n}\n```\n\
    \n构建并运行应用。清空英雄的名字并尝试移动到另一个字段。验证警告对话框应该像图 6-4 所示。\n\n你可以编辑`CoreDataErrors.plist`中的字符串值，以便按你喜欢的任何方式自定义错误消息。让我们希望\
    \ Apple 能尽快恢复这个功能。\n\n## 色彩告别\n\n到现在为止，你应该已经很好地理解了通过子类化，特别是子类化`NSManagedObject`，你能获得多大的能力。你看到了如何使用它进行条件默认值设置，以及单字段和多字段验证。你还看到了如何使用自定义托管对象来创建虚拟访问器。你看到了当用户输入无效属性导致托管对象验证失败时，如何礼貌地通知用户，并且你看到了如何使用可转换属性和值转换器在\
    \ Core Data 中存储自定义对象。\n\n这是一个内容密集的章节，但你真的应该开始感受到 Core Data 是多么灵活和强大。在继续学习 iOS\
    \ 6 SDK 的其他部分之前，你还有一章关于 Core Data 的内容。当你准备好了，翻到下一页来学习关系和获取属性。\n\n# 第 7 章：关系、获取属性和表达式\n\
    \n欢迎来到 Core Data 的最后一章。到目前为止，你的应用程序只包含一个实体：Hero。在本章中，我们将向你展示托管对象如何通过使用关系和获取属性来包含和引用其他托管对象。这将使你能够制作比当前的\
    \ SuperDB 应用程序复杂得多的应用程序。\n\n然而，这并不是你将在本章中做的唯一一件事。你还要将你的`HeroDetailController`变成一个通用的托管对象控制器。通过使控制器代码更加通用，你将使控制器子类更小且更易于维护。你将扩展配置属性列表，以允许你定义额外的实体视图。\n\
    \n本章你有很多事要做，所以不要磨蹭。让我们开始吧。\n\n## 扩展你的应用：超级能力和报告\n\n在讨论细节之前，让我们快速浏览一下本章中你将要对 SuperDB\
    \ 应用进行的更改。表面上，这些更改看起来相对简单。你将添加为每位英雄指定任意数量超级能力的能力，并且还会添加一些报告，显示符合某些条件的其他超级英雄，包括比这位英雄更年轻或更年长的英雄，或者同性或异性的英雄（图\
    \ 7-1）。\n\n![9781430238072_Fig07-01.jpg](img/9781430238072_Fig07-01.jpg)\n\n图\
    \ 7-1. 在本章结束时，你将添加为每位英雄指定任意数量超级能力的能力，并提供多种报告，让你根据与其他英雄的关系来查找他们\n\n这些能力将由一个你将创建并富有想象力地命名为`Power`的新实体来表示。当用户添加或编辑能力时，他们将会看到一个新视图（图\
    \ 7-2），但实际上，在底层，它将是用于编辑和显示英雄的同一个对象的新实例。\n\n![9781430238072_Fig07-02.jpg](img/9781430238072_Fig07-02.jpg)\n\
    \n图 7-2. 用于编辑能力的新视图实际上是用于编辑英雄的同一个对象的实例\n\n当用户深入查看其中一个报告时，他们将获得符合所选条件的其他英雄列表（图\
    \ 7-3）。\n\n![9781430238072_Fig07-03.jpg](img/9781430238072_Fig07-03.jpg)\n"
- fmt: "# Figure 7-3. The Reports Section\n\nThe Reports section on your hero will\
    \ let you find other heroes who meet certain criteria in relation to the hero\
    \ you’re currently editing. Here, for example, you’re seeing all the heroes who\
    \ were born after Super Cat.\n\nTapping any of the rows will take you to another\
    \ view where you can edit that hero, using another instance of the same generic\
    \ controller class. Your users will be able to drill down an infinite number of\
    \ times (limited only by memory), all courtesy of a single class.\n\nBefore you\
    \ start implementing these changes, you need to understand a few concepts and\
    \ then make some changes to your data model.\n\n## Relationships\n\nWe introduced\
    \ the concept of Core Data relationships back in Chapter 2. Now we will go into\
    \ more detail, and show how they can be used in applications. The relationship\
    \ is one of the most important concepts in Core Data. Without relationships, entities\
    \ would be isolated. There would be no way to have one entity contain another\
    \ entity or reference another entity. Let’s look at a hypothetical header file\
    \ for a simple example of an old-fashioned data model class to give you a familiar\
    \ point of reference:\n\n```objc\n#import <UIKit/UIKit.h>\n\n@class Address;\n\
    \n@interface Person : NSObject\n\n@property (strong, nonatomic) NSString *firstName;\n\
    @property (strong, nonatomic) NSString *lastName;\n@property (strong, nonatomic)\
    \ NSDate *birthdate;\n@property (strong, nonatomic) UIImage *image;\n@property\
    \ (strong, nonatomic) Address *address;\n@property (strong, nonatomic) Person\
    \ *mother;\n@property (strong, nonatomic) Person *father;\n@property (strong,\
    \ nonatomic) NSMutableArray *children;\n\n@end\n```\n\nHere you have a class that\
    \ represents a single person. You have instance variables to store a variety of\
    \ information about that person and properties to expose that information to other\
    \ objects. There’s nothing earth-shattering here. Now, let’s think about how you\
    \ could re-create this object in Core Data.\n\nThe first four instance variables—`firstName`,\
    \ `lastName`, `birthDate`, and `image`—can all be handled by built-in Core Data\
    \ attribute types, so you could use attributes to store that information on the\
    \ entity. The two `NSString` instances would become String attributes, the `NSDate`\
    \ instance would become a Date attribute, and the `UIImage` instance would become\
    \ a Transformable attribute, handled in the same way as `UIColor` in the previous\
    \ chapter.\n\nAfter that, you have an instance of an `Address` object. This object\
    \ probably stores information like street address, city, state or province, and\
    \ postal code. That’s followed by two `Person` instance variables and a mutable\
    \ array designed to hold pointers to this person’s children. Most likely, these\
    \ arrays are intended to hold pointers to more `Person` objects.\n\nIn object-oriented\
    \ programming, including a pointer to another object as an instance variable is\
    \ called *composition*. Composition is an incredibly handy device because it lets\
    \ you create much smaller classes and reuse objects, rather than have data duplicated.\n\
    \nIn Core Data, you don’t have composition per se, but you do have relationships,\
    \ which essentially serve the same purpose. Relationships allow managed objects\
    \ to include references to other managed objects of a specific entity, known as\
    \ *destination entities*, or sometimes just destinations. Relationships are Core\
    \ Data properties, just as attributes are. As such, they have an assigned name,\
    \ which serves as the key value used to set and retrieve the object or objects\
    \ represented by the relationship. Relationships are added to entities in Xcode’s\
    \ data model editor in the same way attributes are added. You’ll see how to do\
    \ this in a few minutes. There are two basic types of relationships: to-one relationships\
    \ and to-many relationships.\n\n### To-One Relationships\n\nWhen you create a\
    \ to-one relationship, you are saying that one object can contain a pointer to\
    \ a single managed object of a specific entity. In your example, the `Person`\
    \ entity has a single to-one relationship to the `Address` entity.\n\nOnce you’ve\
    \ added a to-one relationship to an object, you can assign a managed object to\
    \ the relationship using key-value coding (KVC). For example, you might set the\
    \ `Address` entity of a `Person` managed object like so:\n\n```objc\nNSManagedObject\
    \ *address = [NSEntityDescription insertNewObjectForEntityForName:@\"Address\"\
    \n                                        inManagedObjectContext:thePerson.managedObjectContext];\n\
    [thePerson setValue:address forKey:@\"address\"];\n```\n\nRetrieving the object\
    \ can also be accomplished using KVC, just with attributes:\n\n```objc\nNSManagedObject\
    \ *address = [thePerson valueForKey:@\"address\"];\n```\n\nWhen you create a custom\
    \ subclass of `NSManagedObject`, as you did in the previous chapter, you can use\
    \ Objective-C properties and dot notation to get and set those properties. The\
    \ property that represents a to-one relationship is an instance of `NSManagedObject`\
    \ or a subclass of `NSManagedObject`, so setting the address looks just like setting\
    \ attributes:\n\n```objc\nNSManagedObject *address = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Address\"\n                                        inManagedObjectContext:thePerson.managedObjectContext];\n\
    thePerson.address = address;\n```\n\nAnd retrieving a to-one relationship becomes\
    \ as follows:\n\n```objc\nNSManagedObject *address = thePerson.address;\n```\n\
    \nIn almost every respect, the way you deal with a to-one relationship in code\
    \ is identical to the way you’ve been dealing with Core Data attributes. You use\
    \ KVC to get and set the values using Objective-C objects. Instead of using Foundation\
    \ classes that correspond to different attribute types, you use `NSManagedObject`\
    \ or a subclass of `NSManagedObject` that represents the entity.\n\n### To-Many\
    \ Relationships\n\nTo-many relationships allow you to use a relationship to associate\
    \ multiple managed objects to a particular managed object. This is equivalent\
    \ to using composition with a collection class such as `NSMutableArray` or `NSMutableSet`\
    \ in Objective-C, as with the `children` instance variable in the `Person` class\
    \ you looked at earlier. In that example, you used an `NSMutableArray`, which\
    \ is an editable, ordered collection of objects. That array allows you to add\
    \ and remove objects at will. If you want to indicate that the person represented\
    \ by an instance of `Person` has children, you just add the instance of `Person`\
    \ that represents that person’s children to the `children` array.\n\nIn Core Data,\
    \ it works a little differently. To-many relationships are unordered. They are\
    \ represented by instances of `NSSet`, which is an unordered, immutable collection\
    \ that you can’t change, or by `NSMutableSet`, an unordered collection that you\
    \ can change. Here’s how getting a to-many relationship and iterating over its\
    \ contents might look with an `NSSet`:\n\n```objc\nNSSet *children = [thePerson\
    \ valueForKey:@\"children\"];\nfor (NSManagedObject *oneChild in children) {\n\
    \    // do something\n}\n```\n\n**Note** Do you spot a potential problem from\
    \ the fact that to-many relationships are returned as an unordered `NSSet`? When\
    \ displaying them in a table view, it’s important that the objects in the relationship\
    \ are ordered consistently. If the collection is unordered, you have no guarantee\
    \ that the row you tap will bring up the object you expect. You’ll see how to\
    \ deal with that a little later in the chapter.\n\nOn the other hand, if you wish\
    \ to add or remove managed objects from a to-many relationship, you must ask Core\
    \ Data to give you an instance of `NSMutableSet` by calling `mutableSetValueForKey:`\
    \ instead of `valueForKey:`, like so:"
  raw: '[Figure 7-3.](#9781430238072_Ch07.xhtml#_Fig3)  The Reports section on your
    hero will let you find other heroes who meet certain criteria in relation to the
    hero you’re currently editing. Here, for example, you’re seeing all the heroes
    who were born after Super Cat


    Tapping any of the rows will take you to another view where you can edit that
    hero, using another instance of the same generic controller class. Your users
    will be able to drill down an infinite number of times (limited only by memory),
    all courtesy of a single class.


    Before you start implementing these changes, you need to understand a few concepts
    and then make some changes to your data model.


    Relationships


    We introduced the concept of Core Data relationships back in [Chapter 2.](#9781430238072_Ch02.xhtml)
    Now we will go into more detail, and show how they can be used in applications.
    The relationship is one of the most important concepts in Core Data. Without relationships,
    entities would be isolated. There would be no way to have one entity contain another
    entity or reference another entity. Let’s look at a hypothetical header file for
    a simple example of an old-fashioned data model class to give you a familiar point
    of reference:


    ```

    #import <UIKit/UIKit.h>


    @class Address;


    @interface Person : NSObject


    @property (strong, nonatomic) NSString *firstName;

    @property (strong, nonatomic) NSString *lastName;

    @property (strong, nonatomic) NSDate *birthdate;

    @property (strong, nonatomic) UIImage *image;

    @property (strong, nonatomic) Address *address;

    @property (strong, nonatomic) Person *mother;

    @property (strong, nonatomic) Person *father;

    @property (strong, nonatomic) NSMutableArray *children;


    @end

    ```


    Here you have a class that represents a single person. You have instance variables
    to store a variety of information about that person and properties to expose that
    information to other objects. There’s nothing earth-shattering here. Now, let’s
    think about how you could re-create this object in Core Data.


    The first four instance variables—firstName, lastName, birthDate, and image—can
    all be handled by built-in Core Data attribute types, so you could use attributes
    to store that information on the entity. The two NSString instances would become
    String attributes, the NSDate instance would become a Date attribute, and the
    UIImage instance would become a Transformable attribute, handled in the same way
    as UIColor in the previous chapter.


    After that, you have an instance of an Address object. This object probably stores
    information like street address, city, state or province, and postal code. That’s
    followed by two Person instance variables and a mutable array designed to hold
    pointers to this person’s children. Most likely, these arrays are intended to
    hold pointers to more Person objects.


    In object-oriented programming, including a pointer to another object as an instance
    variable is called *composition*. Composition is an incredibly handy device because
    it lets you create much smaller classes and reuse objects, rather than have data
    duplicated.


    In Core Data, you don’t have composition per se, but you do have relationships,
    which essentially serve the same purpose. Relationships allow managed objects
    to include references to other managed objects of a specific entity, known as
    *destination entities*, or sometimes just destinations. Relationships are Core
    Data properties, just as attributes are. As such, they have an assigned name,
    which serves as the key value used to set and retrieve the object or objects represented
    by the relationship. Relationships are added to entities in Xcode’s data model
    editor in the same way attributes are added. You’ll see how to do this in a few
    minutes. There are two basic types of relationships: to-one relationships and
    to-many relationships.


    To-One Relationships


    When you create a to-one relationship, you are saying that one object can contain
    a pointer to a single managed object of a specific entity. In your example, the
    Person entity has a single to-one relationship to the Address entity.


    Once you’ve added a to-one relationship to an object, you can assign a managed
    object to the relationship using key-value coding (KVC). For example, you might
    set the Address entity of a Person managed object like so:


    ```

    NSManagedObject *address = [NSEntityDescription insertNewObjectForEntityForName:@"Address"

                                            inManagedObjectContext:thePerson.managedObjectContext];

    [thePerson setValue:address forKey:@"address"];

    ```


    Retrieving the object can also be accomplished using KVC, just with attributes:


    ```

    NSManagedObject *address = [thePerson valueForKey:@"address"];

    ```


    When you create a custom subclass of NSManagedObject, as you did in the previous
    chapter, you can use Objective-C properties and dot notation to get and set those
    properties. The property that represents a to-one relationship is an instance
    of NSManagedObject or a subclass of NSManagedObject, so setting the address looks
    just like setting attributes:


    ```

    NSManagedObject *address = [NSEntityDescription insertNewObjectForEntityForName:@"Address"

                                            inManagedObjectContext:thePerson.managedObjectContext];

    thePerson.address = address;

    ```


    And retrieving a to-one relationship becomes as follows:


    ```

    NSManagedObject *address = thePerson.address;

    ```


    In almost every respect, the way you deal with a to-one relationship in code is
    identical to the way you’ve been dealing with Core Data attributes. You use KVC
    to get and set the values using Objective-C objects. Instead of using Foundation
    classes that correspond to different attribute types, you use NSManagedObject
    or a subclass of NSManagedObject that represents the entity.


    To-Many Relationships


    To-many relationships allow you to use a relationship to associate multiple managed
    objects to a particular managed object. This is equivalent to using composition
    with a collection class such as NSMutableArray or NSMutableSet in Objective-C,
    as with the children instance variable in the Person class you looked at earlier.
    In that example, you used an NSMutableArray, which is an editable, ordered collection
    of objects. That array allows you to add and remove objects at will. If you want
    to indicate that the person represented by an instance of Person has children,
    you just add the instance of Person that represents that person’s children to
    the children array.


    In Core Data, it works a little differently. To-many relationships are unordered.
    They are represented by instances of NSSet, which is an unordered, immutable collection
    that you can’t change, or by NSMutableSet, an unordered collection that you can
    change. Here’s how getting a to-many relationship and iterating over its contents
    might look with an NSSet:


    ```

    NSSet *children = [thePerson valueForKey:@"children"];

    for (NSManagedObject *oneChild in children) {

        // do something

    }

    ```


    **Note**  Do you spot a potential problem from the fact that to-many relationships
    are returned as an unordered NSSet? When displaying them in a table view, it’s
    important that the objects in the relationship are ordered consistently. If the
    collection is unordered, you have no guarantee that the row you tap will bring
    up the object you expect. You’ll see how to deal with that a little later in the
    chapter.


    On the other hand, if you wish to add or remove managed objects from a to-many
    relationship, you must ask Core Data to give you an instance of NSMutableSet by
    calling mutableSetValueForKey: instead of valueForKey:, like so:'
  trans: "\n# 图 7-3：报告部分\n\n角色页面上的报告部分，能让您找到与当前编辑角色满足特定条件的其他角色。例如，您正在查看所有出生时间晚于“超级猫”的角色。\n\
    \n点击任意一行，将跳转到另一视图，在那里您可以使用同一个通用控制器类的另一个实例来编辑该角色。您的用户将能够无限层级地深入查看（仅受内存限制），而这都归功于这一个类。\n\
    \n在开始实现这些更改之前，您需要了解一些概念，并对数据模型进行一些调整。\n\n## 关系\n\n我们在第 2 章中介绍过 Core Data 关系的概念。现在，我们将深入探讨，并展示如何在应用中使用它们。关系是\
    \ Core Data 中最重要的概念之一。没有关系，实体将是孤立的。一个实体将无法包含或引用另一个实体。让我们先看一个假设的头文件，这是一个传统数据模型类的简单示例，为您提供一个熟悉的参考点：\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@class Address;\n\n@interface Person : NSObject\n\
    \n@property (strong, nonatomic) NSString *firstName;\n@property (strong, nonatomic)\
    \ NSString *lastName;\n@property (strong, nonatomic) NSDate *birthdate;\n@property\
    \ (strong, nonatomic) UIImage *image;\n@property (strong, nonatomic) Address *address;\n\
    @property (strong, nonatomic) Person *mother;\n@property (strong, nonatomic) Person\
    \ *father;\n@property (strong, nonatomic) NSMutableArray *children;\n\n@end\n\
    ```\n\n这里有一个表示单个人物的类。您有一些实例变量来存储关于该人物的各种信息，以及向其他对象暴露这些信息的属性。这并没有什么惊世骇俗之处。现在，让我们思考一下如何在\
    \ Core Data 中重新创建这个对象。\n\n前四个实例变量——`firstName`、`lastName`、`birthDate` 和 `image`——都可以由\
    \ Core Data 内置的属性类型处理，因此您可以使用属性来将这些信息存储在实体上。两个 `NSString` 实例将变成 String 属性，`NSDate`\
    \ 实例将变成 Date 属性，而 `UIImage` 实例将变成 Transformable 属性，其处理方式与上一章中的 `UIColor` 相同。\n\
    \n之后，您有一个 `Address` 对象的实例。这个对象可能存储街道地址、城市、州或省以及邮政编码等信息。随后是两个 `Person` 实例变量和一个可变数组，用于存储指向该人物子女的指针。很可能，这些数组旨在存储指向更多\
    \ `Person` 对象的指针。\n\n在面向对象编程中，将指向另一个对象的指针作为实例变量包含进来，称为*组合*。组合是一种极其便利的手段，因为它让您可以创建更小的类并重用对象，而不是复制数据。\n\
    \n在 Core Data 中，您并没有严格意义上的组合，但您有关系，它本质上服务于相同的目的。关系允许托管对象包含对特定实体的其他托管对象的引用，这些实体称为*目标实体*，有时也简称为目标。关系是\
    \ Core Data 的属性，就像属性（attribute）一样。因此，它们都有一个指定的名称，作为设置和获取关系所代表的一个或多个对象的键值。关系与属性（attribute）的添加方式相同，都是在\
    \ Xcode 的数据模型编辑器中添加到实体。几分钟后您将看到如何操作。关系有两种基本类型：一对一关系和一对多关系。\n\n### 一对一关系\n\n当您创建一对一关系时，意味着一个对象可以包含一个指向特定实体中单个托管对象的指针。在您的示例中，`Person`\
    \ 实体与 `Address` 实体有一个单一的一对一关系。\n\n一旦您向对象添加了一对一关系，就可以使用键值编码（KVC）将托管对象赋值给该关系。例如，您可以为\
    \ `Person` 托管对象设置 `Address` 实体，如下所示：\n\n```objc\nNSManagedObject *address = [NSEntityDescription\
    \ insertNewObjectForEntityForName:@\"Address\"\n                             \
    \           inManagedObjectContext:thePerson.managedObjectContext];\n[thePerson\
    \ setValue:address forKey:@\"address\"];\n```\n\n检索该对象也可以像处理属性一样使用 KVC 完成：\n\n\
    ```objc\nNSManagedObject *address = [thePerson valueForKey:@\"address\"];\n```\n\
    \n当您像上一章所做的那样，创建 `NSManagedObject` 的自定义子类时，您可以使用 Objective-C 属性和点语法来获取和设置这些属性。表示一对一关系的属性是\
    \ `NSManagedObject` 或其子类的实例，因此设置地址看起来就像设置属性一样：\n\n```objc\nNSManagedObject *address\
    \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Address\"\n      \
    \                                  inManagedObjectContext:thePerson.managedObjectContext];\n\
    thePerson.address = address;\n```\n\n而检索一对一关系则变成如下形式：\n\n```objc\nNSManagedObject\
    \ *address = thePerson.address;\n```\n\n几乎在所有方面，您在代码中处理一对一关系的方式，都与处理 Core Data\
    \ 属性的方式相同。您使用 KVC 通过 Objective-C 对象来获取和设置值。只不过您使用的是代表实体的 `NSManagedObject` 或其子类，而不是与不同属性类型相对应的\
    \ Foundation 类。\n\n### 一对多关系\n\n一对多关系允许您使用一个关系将多个托管对象关联到特定的一个托管对象。这相当于在 Objective-C\
    \ 中使用集合类（例如 `NSMutableArray` 或 `NSMutableSet`）进行组合，就像前面看到的 `Person` 类中的 `children`\
    \ 实例变量。在那个例子中，您使用了 `NSMutableArray`，它是一个可编辑的、有序的对象集合。这个数组允许您随意添加和移除对象。如果您想表示 `Person`\
    \ 实例所代表的人物有子女，只需将代表其子女的 `Person` 实例添加到 `children` 数组中即可。\n\n在 Core Data 中，情况略有不同。一对多关系是无序的。它们由\
    \ `NSSet`（一个不可更改的无序不可变集合）或 `NSMutableSet`（一个可以更改的无序集合）的实例来表示。下面是使用 `NSSet` 获取一对多关系并遍历其内容的方式：\n\
    \n```objc\nNSSet *children = [thePerson valueForKey:@\"children\"];\nfor (NSManagedObject\
    \ *oneChild in children) {\n    // 执行某些操作\n}\n```\n\n**注意** 您是否发现了一个潜在问题，即一对多关系是以无序的\
    \ `NSSet` 形式返回的？在表格视图中显示它们时，确保关系中的对象有序一致非常重要。如果集合是无序的，您就无法保证点击的行能调出您期望的对象。在本章稍后部分，您将看到如何处理这个问题。\n\
    \n另一方面，如果您想从一对多关系中添加或移除托管对象，您必须通过调用 `mutableSetValueForKey:` 而不是 `valueForKey:`\
    \ 来请求 Core Data 提供一个 `NSMutableSet` 实例，如下所示：\n"
- fmt: "```objc\nNSManagedObject *child = [NSEntityDescription insertNewObjectForEntityForName:@\"\
    Person\"\n                                        inManagedObjectContext:thePerson.managedObjectContext];\n\
    NSMutableSet *children = [thePerson mutableSetValueForKey:@\"children\"];\n[children\
    \ addObject:child];\n[children removeObject:child];\n```\n\n如果你不需要更改特定关系包含的对象，请直接使用`valueForKey:`，就像对待对一关系的数组一样。不要调用`mutableSetValueForKey:`，除非你确实需要更改构成关系的对象集，因为它比仅调用`valueForKey:`会带来稍多的开销。\n\
    \n除了使用`valueForKey:`和`mutableSetValueForKey:`之外，Core Data 还提供了在运行时动态创建的特殊方法，允许你向对多关系添加或删除托管对象。每个关系有四种这样的方法，每个方法名都包含了关系名。第一种方法允许你向关系添加单个对象：\n\
    \n```objc\n- (void)addXXXObject:(NSManagedObject *)value;\n```\n\n其中`XXX`是关系名的大写形式，`value`是`NSManagedObject`或其特定子类的实例。在之前使用的`Person`示例中，向`children`关系添加一个孩子的方法如下：\n\
    \n```objc\n- (void)addChildrenObject:(Person *)value;\n```\n\n删除单个对象的方法遵循类似的形式：\n\
    \n```objc\n- (void)removeXXXObject:(NSManagedObject *)value;\n```\n\n动态生成的用于向关系添加多个对象的方法采用以下形式：\n\
    \n```objc\n- (void)addXXX:(NSSet *)values;\n```\n\n该方法接受一个包含待添加托管对象的`NSSet`实例。因此，向`Person`托管对象添加多个孩子的动态创建方法如下：\n\
    \n```objc\n- (void)addChildren:(NSSet *)values;\n```\n\n最后，这是用于从关系中移除多个托管对象的方法：\n\
    \n```objc\n- (void)removeXXX:(NSSet *)values;\n```\n\n请记住，当你声明一个自定义`NSManagedObject`子类时，这些方法会自动生成。当\
    \ Xcode 遇到你的`NSManagedObject`子类声明时，它会在该子类上创建一个类别（category），该类别使用关系名构造方法名并声明这四个动态方法。由于这些方法在运行时生成，你项目的源代码中不会找到它们的实现。如果你从未调用这些方法，你永远不会看到它们。只要已经在模型编辑器中创建了对多关系，你无需额外操作即可访问这些方法，它们已被创建好并可供调用。\n\
    \n**注意**：与对多关系生成的方法相关的一个棘手点是：当你首次从模板生成`NSManagedObject`子类文件时，Xcode 声明了这四个动态方法。如果你的现有数据模型中已有对多关系及`NSManagedObject`子类，而你决定向该数据模型添加新的对多关系会发生什么？如果你向现有`NSManagedObject`子类添加对多关系，你需要自己添加包含这些动态方法的类别，稍后在本章中你将实际操作这一点。\n\
    \n使用这四个方法与使用`mutableSetValueForKey:`完全没有任何区别。动态方法只是更便捷一些，并使你的代码更易于阅读。\n\n## 反向关系\n\
    \n在 Core Data 中，每个关系都可以有一个反向关系。关系及其反向关系是一枚硬币的两面。在`Person`对象示例中，`children`关系的反向关系可能是一个名为`parent`的关系。一个关系不必与其反向关系类型相同。例如，一个对一关系可以有一个对多的反向关系。实际上，这非常常见。从现实世界思考，一个人可以有多个孩子，而反向关系是一个孩子只能有一个亲生母亲和一个亲生父亲，但孩子可以有多个父母和监护人。因此，根据你的需求和建模方式，你可以选择使用对一或对多关系作为反向关系。\n\
    \n如果你向一个关系添加对象，Core Data 会自动负责向反向关系添加正确的对象。所以，如果你有一个人名为 Steve，并向 Steve 添加一个孩子，Core\
    \ Data 会自动使该孩子的父/母为 Steve。\n\n虽然关系不要求必须有反向关系，但 Apple 通常建议你始终创建并指定反向关系，即使你在应用程序中不需要使用该反向关系。事实上，如果你未能提供反向关系，编译器会发出警告。这个通用规则也有例外，特别是当反向关系将包含极大量对象时，因为从关系中移除对象会触发其从反向关系中的移除。移除反向关系需要遍历表示反向关系的集合，如果该集合非常大，可能会带来性能问题。但除非你有特别的理由不这样做，否则你应该建模反向关系，因为它有助于\
    \ Core Data 确保数据完整性。如果因此出现性能问题，后续移除反向关系相对容易。\n\n**注意**：你可以从以下链接了解更多关于缺少反向关系如何导致完整性问题的内容：\n\
    \n[https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html)\n\
    \n## 获取属性（Fetched Properties）\n\n关系允许你将托管对象与特定的其他托管对象关联起来。从某种意义上说，关系有点像 iTunes\
    \ 播放列表，你可以将特定歌曲放入列表稍后播放。如果你是一名 iTunes 用户，你会知道有一种叫“智能播放列表”的东西，它允许你基于条件而非特定歌曲列表创建播放列表。例如，你可以创建一个包含某位艺术家所有歌曲的智能播放列表。之后当你购买该艺术家的新歌曲时，它们会自动添加到该智能播放列表中，因为播放列表基于条件且新歌曲满足这些条件。\n\
    \nCore Data 也有类似的功能。你可以向实体添加另一种类型的属性，它基于条件而不是关联特定对象，将托管对象与其他托管对象关联起来。获取属性并非通过添加和移除对象来工作，而是通过创建一个谓词（predicate）来定义应返回哪些对象。谓词，你可能还记得，是表示选择条件的对象，主要用于筛选集合和获取结果。\n\
    \n**提示**：如果你对谓词不太熟悉，*《Learn Objective-C on the Mac, 2nd Edition》*（Scott Knaster、Waqar\
    \ Maliq 和 Mark Dalrymple 合著，Apress, 2012）用了整整一章来讲解这个小家伙。\n\n获取属性始终是不可变的。你不能在运行时更改它们的内容。条件通常在数据模型中指定（稍后你将查看此过程），然后你使用属性或\
    \ KVC 来访问满足条件的对象。"
  raw: '```

    NSManagedObject *child = [NSEntityDescription insertNewObjectForEntityForName:@"Person"

                                            inManagedObjectContext:thePerson.managedObjectContext];

    NSMutableSet *children = [thePerson mutableSetValueForKey:@"children"];

    [children addObject:child];

    [children removeObject:child];

    ```


    If you don’t need to change which objects a particular relationship contains,
    use valueForKey:, just as with to-one arrays. Don’t call mutableSetValueForKey:if
    you don’t need to change which objects make up the relationship, as it incurs
    slightly more overhead than just calling valueForKey:.


    In addition to using valueForKey: and mutableSetValueForKey:, Core Data also provides
    special methods, created dynamically at runtime, that let you add and delete managed
    objects from a to-many relationship. There are four of these methods per relationship.
    Each method name incorporates the name of the relationship. The first allows you
    to add a single object to a relationship


    ```

    - (void)addXXXObject:(NSManagedObject *)value;

    ```


    where XXX is the capitalized name of the relationship and value is either an NSManagedObject
    or a specific subclass of NSManagedObject. In the Person example you’ve been working
    with, the method to add a child to the children relationship looks like this:


    ```

    - (void)addChildrenObject:(Person *)value;

    ```


    The method for deleting a single object follows a similar form.


    ```

    - (void)removeXXXObject:(NSManagedObject *)value;

    ```


    The dynamically generated method for adding multiple objects to a relationship
    takes the following form:


    ```

    - (void)addXXX:(NSSet *)values;

    ```


    The method takes an instance of NSSet containing the managed objects to be added.
    So, the dynamically created method for adding multiple children to your Person
    managed object is as follows:


    ```

    - (void)addChildren:(NSSet *)values;

    ```


    Finally, here’s the method used to remove multiple managed objects from a relationship:


    ```

    - (void)removeXXX:(NSSet *)values;

    ```


    Remember that these methods are generated for you when you declare a custom NSManagedObject
    subclass. When Xcode encounters your NSManagedObject subclass declaration, it
    creates a category on the subclass that declares the four dynamic methods using
    the relationship name to construct the method names. Since the methods are generated
    at runtime, you won’t find any source code in your project that implements the
    methods. If you never call the methods, you’ll never see the methods. As long
    as you’ve already created the to-many relationship in your model editor, you don’t
    need to do anything extra to access these methods. They are created for you and
    ready to be called.


    **Note**  There’s one tricky point associated with the methods generated for to-many
    relationships. Xcode declares the four dynamic methods when you first generate
    the NSManagedObject subclass files from the template. If you have an existing
    data model with a to-many relationship and a subclass of NSManagedObject, what
    happens if you decide to add a new to-many relationship to that data model? If
    you add the to-many relationship to an existing NSManagedObject subclass, you
    need to add the category containing the dynamic methods yourself, which is what
    you’ll do a little later in the chapter.


    There is absolutely no difference between using these four methods and using mutableSetValueForKey:.
    The dynamic methods are just a little more convenient and make your code easier
    to read.


    Inverse Relationships


    In Core Data, every relationship can have an inverse relationship. A relationship
    and its inverse are two sides of the same coin. In your Person object example,
    the inverse relationship for the children relationship might be a relationship
    called parent. A relationship does not need to be the same kind as its inverse.
    A to-one relationship, for example, can have an inverse relationship that is to-many.
    In fact, this is pretty common. If you think about it in real-world terms, a person
    can have many children. The inverse is that a child can have only one biological
    mother and one biological father, but the child can have multiple parents and
    guardians. So, depending on your needs and the way you modeled the relationship,
    you might choose to use either a to-one or a to-many relationship for the inverse.


    If you add an object to a relationship, Core Data will automatically take care
    of adding the correct object to the inverse relationship. So, if you had a person
    named Steve and added a child to Steve, Core Data would automatically make the
    child’s parent Steve.


    Although relationships are not required to have an inverse, Apple generally recommends
    that you always create and specify the inverse, even if you won’t need to use
    the inverse relationship in your application. In fact, the compiler will actually
    warn you if you fail to provide an inverse. There are some exceptions to this
    general rule, specifically when the inverse relationship will contain an extremely
    large number of objects, since removing the object from a relationship triggers
    its removal from the inverse relationship. Removing the inverse will require iterating
    over the set that represents the inverse, and if that’s a very large set, there
    could be performance implications. But unless you have a specific reason not to
    do so, you should model the inverse, as it helps Core Data ensure data integrity.
    If you have performance issues as a result, it’s relatively easy to remove the
    inverse relationship later.


    **Note**  You can read more about how the absence of inverse relationships can
    cause integrity problems at


    [https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html)
    .


    Fetched Properties


    Relationships allow you to associate managed objects with specific other managed
    objects. In a way, relationships are sort of like iTunes playlists where you can
    put specific songs into a list and then play them later. If you’re an iTunes user,
    you know that there are things called Smart Playlists, which allow you to create
    playlists based on criteria rather than a list of specific songs. You can create
    a Smart Playlist, for example, that includes all the songs by a specific artist.
    Later on, when you buy new songs from that artist, they are added to that Smart
    Playlist automatically because the playlist is based on criteria and the new songs
    meet those criteria.


    Core Data has something similar. There’s another type of attribute you can add
    to an entity that will associate a managed object with other managed objects based
    on criteria, rather than associating specific objects. Instead of adding and removing
    objects, fetched properties work by creating a predicate that defines which objects
    should be returned. Predicates, as you may recall, are objects that represent
    selection criteria. They are primarily used to sort collections and fetch results.


    **Tip**  If you’re rusty on predicates, *Learn Objective-C on the Mac, 2*^(*nd*)*Edition*,
    by Scott Knaster, Waqar Maliq, and Mark Dalrymple (Apress, 2012) devotes an entire
    chapter to the little beasties.


    Fetched properties are always immutable. You can’t change their contents at runtime.
    The criteria are usually specified in the data model (a process that you’ll look
    at shortly), and then you access the objects that meet that criteria using properties
    or KVC.'
