    ## Tweaking the Hero Header


    You should now have a pair of files called `Hero.h` and `Hero.m` in your project
    folder. Xcode also tweaked your data model so that the `Hero` entity uses this
    class rather than `NSManagedObject` at runtime. Single-click on the new `Hero.h`
    file now. It should look something look like this, though the exact order of your
    property declarations may not be exactly the same as ours:


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @interface Hero : NSManagedObject


    @property (nonatomic, retain) NSDate * birthdate;

    @property (nonatomic, retain) NSString * name;

    @property (nonatomic, retain) NSString * secretIdentity;

    @property (nonatomic, retain) NSString * sex;

    @property (nonatomic, retain) NSNumber * age;

    @property (nonatomic, retain) id favoriteColor;


    @end

    ```


    **Caution**  If your `Hero.h` file does not include declarations of `age` and
    `favoriteColor`, chances are you did not save properly somewhere along the way.
    If so, select `Hero.h` and `Hero.m` in your project file and press `Delete`, being
    sure the files are moved to the trash. Then go back, make sure your attributes
    were properly created in your data model, make sure the data model was saved,
    then recreate `Hero.h` and `Hero.m`.


    You need to make two quick changes here. First, you want to make `age` read-only.
    You’re not going to allow people to set a hero’s age; you’re just going to calculate
    it based on the `birthdate`. You also want to change `favoriteColor` from the
    generic `ID` to `UIColor` to indicate that your `favoriteColor` attribute is,
    in fact, an instance of `UIColor`. This will give you some additional type safety
    by letting the compiler know what type of object represents the `favoriteColor`
    attribute. You also need to add a couple of constants that will be used in your
    validation methods.


    Add the following after the `#imports` but before the `@interface` declaration:


    ```

    #define kHeroValidationDomain @"com.AppOrchard.SuperDB.HeroValidationDomain"

    #define kHeroValidationBirthdateCode 1000

    #define kHeroValidationNameOrSecretIdentityCode 1001

    ```


    Then change the `age` and `favoriteColor` property declarations.


    ```

    @property (nonatomic, retain, readonly) NSNumber * age;

    @property (nonatomic, retain) UIColor * favoriteColor;

    ```


    Don’t worry too much about the constants. We’ll explain error domains and error
    codes in a few moments. Switch over to `Hero.m`. You’ve got a bit more work to
    do in the implementation file. Before you do that, let’s talk about what you’re
    going to do.


    ## Defaulting


    One of the most common Core Data tasks that requires you to subclass `NSManagedObject`
    is setting conditional default values for attributes, or setting the default value
    for attribute types that can’t be set in the data model, such as default values
    for transformable attributes.


    The `NSManagedObject` method `awakeFromInsert` is designed to be overridden by
    subclasses for the purpose of setting default values. It gets called immediately
    after a new instance of an object is inserted into a managed object context and
    before any code has a chance to make changes to or use the object.


    In your case, you have a transformable attribute called `favoriteColor` that you
    want to default to white. To accomplish that, add the following method before
    the `@end` declaration in `Hero.m`:


    ```

    - (void)awakeFromInsert

    {

        self.favoriteColor = [UIColor colorWithRed:1.0 green:1.0 blue:1.0 alpha:1.0];

        [super awakeFromInsert];

    }

    ```


    Notice the use of the `@dynamic` keyword in `Hero.m`. This tells the compiler
    not to generate accessors and mutators for the property that follows. The idea
    here is that the accessors and mutators will be provided by the superclass at
    runtime. Don’t worry too much about the specifics, just know that this bit of
    complexity is required in order for Core Data to work properly.


    **Tip**  Notice that you didn’t use `[UIColor whiteColor]` for the default. The
    reason you used the `colorWithRed:green:blue:alpha:` factory method is because
    it always creates an RGBA color. `UIColor` supports several different color models.
    Later, you’re going to be breaking the `UIColor` down into its separate components
    (one each for red, green, blue, and alpha) in order to save it in the persistent
    store. You’re also going to let the user select a new color by manipulating sliders
    for each of these components. The `whiteColor` method, however, doesn’t create
    a color using the RGBA color space. Instead, it creates a color using the grayscale
    color model, which represents colors with only two components, gray and alpha.


    Simple enough. You just create a new instance of `UIColor` and assign it to `favoriteColor`.
    Another common usage of `awakeFromInsert` is for defaulting date attributes to
    the current date. You could, for example, default the `birthdate` attribute to
    the current date by adding the following line of code to `awakeFromInsert`:


    ```

    self.birthdate = [NSDate date];

    ```


