  trans: '

    之前我们提到，属性列表的根节点是一个字典。这意味着每个节点都将是一个键/值对。你可以将键视为字符串，值则可以是任何一种基本数据类型（`string`、`number`、`binary
    data`、`date` 或 `Boolean`）或集合类型（`array` 或 `dictionary`）。


    接下来，你将按照我们之前讨论的，从创建 `sections` 数组开始。为此，你需要在属性列表中添加一个新条目。有两种方法可以实现。这两种方法都需要你先选中
    Key 列中名为 `Root` 的那一行。第一种方法是，在属性列表编辑器的空白区域按住 Control 键并点击。在弹出的菜单中选择“添加行”。或者，你也可以使用常规菜单“编辑器”
    ![image](img/arrow.jpg) “添加条目”选项。无论哪种方式，属性列表编辑器中都会出现一个新行（图 4-15）。该条目的键应为 `New
    item`，并且会被选中并高亮显示。输入 **sections** 并按下 Return 键来更改键名。


    ![9781430238072_Fig04-15.jpg](img/9781430238072_Fig04-15.jpg)


    图 4-15.  向属性列表添加条目


    接下来，点击“类型”列中 `string` 旁边的箭头，以显示所有可能的数据类型。选择 `array`。“值”列应变为显示 `(0 items)`。向 `sections`
    数组添加条目有点棘手，所以请务必仔细遵循以下步骤。


    当您将类型从 `string` 更改为 `array` 时，`sections` 键的左侧会添加一个展开三角形（图 4-16）。点击这个三角形使其指向下方（图
    4-17）。现在点击 `sections` 右侧的 `+` 按钮。这将插入一个新行。此外，`sections` 的“值”列将变为显示 `(1 item)`。新行的键会是
    `Item 0`；类型是 `string`；“值”列将被选中。不要输入任何内容；选中 `sections` 行使其高亮，然后再次点击 `sections`
    旁边的 `+` 按钮。这将插入另一行，键为 `Item 1`，类型为 `string`，没有值。值单元格应被选中并显示光标。将 `Item 0` 和 `Item
    1` 的类型从 `string` 更改为 `dictionary`（图 4-18）。


    ![9781430238072_Fig04-16.jpg](img/9781430238072_Fig04-16.jpg)


    图 4-16.  将类型从 `string` 更改为 `array`


    ![9781430238072_Fig04-17.jpg](img/9781430238072_Fig04-17.jpg)


    图 4-17.  点击展开三角形以展开数组


    ![9781430238072_Fig04-18.jpg](img/9781430238072_Fig04-18.jpg)


    图 4-18.  添加两个字典条目


    还记得你之前要创建一个数组，其中每个条目代表你的表视图的一个分区吗？你已经创建了这两个条目。`Item 0` 是 `HeroDetailController`
    表视图的第一个分区；`Item 1` 是第二个。


    现在你在每个分区下创建 `rows` 数组，以保存每个分区的行信息。`Item0` 旁边应该有一个展开三角形。打开它，然后点击 `Item0` 旁边的 `+`。这将在
    `Item0` 下创建一个新行，其键为 `New Item`，类型为 `string`。将键更改为 `rows`，并将类型更改为 `array`。打开 `rows`
    旁边的展开三角形，然后点击 `+` 按钮。这将创建另一个 `Item0`，这次是在 `rows` 下。将类型从 `string` 更改为 `dictionary`。重复此过程，在
    `Item1` 标题下添加一个 `rows` 条目。这次，在这个第二个 `rows` 条目下创建三个条目。你的属性列表编辑器应如图 4-19 所示。


    ![9781430238072_Fig04-19.jpg](img/9781430238072_Fig04-19.jpg)


    图 4-19.  `HeroDetailConfiguration.plist`


    对于每个 `rows` 数组中的每个条目，你需要再添加两个子条目。它们的类型应为 `string`，它们的键应分别为 `key` 和 `label`。对于分区
    ![image](img/arrow.jpg) `Item 0` ![image](img/arrow.jpg) `rows`，`key` 的值应为 `name`，`label`
    的值应设置为 `Name`。对于分区 ![image](img/arrow.jpg) `Item 1` ![image](img/arrow.jpg) `rows`，`key`
    和 `label` 的值应分别为：`secretIdentity` 和 `Identity`；`birthdate` 和 `Birthdate`；`sex`
    和 `Sex`。完成后，属性列表编辑器窗格应如图 4-20 所示。


    ![9781430238072_Fig04-20.jpg](img/9781430238072_Fig04-20.jpg)


    图 4-20.  完成的 `HeroDetailConfiguration.plist`


    现在，你将使用这个属性列表来设置 `HeroDetailController` 的表视图。


    ## 解析属性列表


    你需要添加一个属性来存储刚刚创建的属性列表中的信息。由于此属性仅需在 `HeroDetailController` 内部使用，你将通过 `HeroDetailController.m`
    中的类别将其设为私有。


    ```

    @interface HeroDetailController ()

    @property (strong, nonatomic) NSArray *sections;

    @end

    ```


    接下来，你需要加载属性列表并读取 `sections` 键。在 `viewDidLoad` 方法结束前，添加以下代码：


    ```

    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"HeroDetailConfiguration"

                                               withExtension:@"plist"];

    NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];

    self.sections = [plist valueForKey:@"sections"];

    ```


    你声明了一个类型为 `NSArray` 的属性 `sections`，用于保存 `HeroDetailConfiguration.plist` 属性列表中
    `sections` 数组的内容。你使用 `NSDictionary` 的类方法 `dictionaryWithContentsOfURL:` 读取属性列表的内容。由于你知道这个字典只有一个键/值对，键为
    `sections`，所以你将该值读入 `sections` 属性。然后你使用该属性来布局 `HeroDetailController` 的表视图。


    现在你已经拥有了填充 `HeroDetailController` 表视图单元格所需的元数据，但还没有数据。数据应通过以下两种方式之一来自 `HeroListController`：当用户点击某个单元格时，以及当用户点击添加（`+`）按钮时。


    ## 推送详细信息


    在你能从 `HeroListController` 发送数据之前，你需要在 `HeroDetailController` 中有一个接收者。在 `HeroDetailController.h`
    的 `HeroDetailController` 接口声明中添加以下属性：


    ```

    @property (strong, nonatomic) NSManagedObject *hero;

    ```


    现在编辑 `HeroListController.m`。找到 `addHero:` 方法。将


    ```

    [NSEntityDescription insertNewObjectForEntityForName:[entity name]

                                   inManagedObjectContext:managedObjectContext];

    ```


    这一行改为


    ```

    NSManagedObject *newHero = [NSEntityDescription insertNewObjectForEntityForName:[entity
    name]

                                                     inManagedObjectContext:managedObjectContext];

    ```


    然后在末尾添加以下代码：


    ```

    [self performSegueWithIdentifier:@"HeroDetailSegue" sender:newHero];

    ```


    首先，你将新的 `Hero` 实例赋值给变量 `newHero`。然后你告诉 `HeroListController` 执行名为 `HeroDetailSegue`
    的 Segue，并将 `newHero` 作为发送者传递。这个 Segue 名称 `HeroDetailSegue` 是从哪里来的？来自你。


    还记得你之前为用户点击 `HeroListController` 中的某个单元格而创建的 Segue 吗？嗯，现在你将移除它。为什么？因为它无法提供从单元格和添加（`+`）按钮进行转换所需的灵活性。你需要创建一个手动
    Segue，并从代码中调用它。

