    \ means \"no sections\".\nNSFetchedResultsController *aFetchedResultsController\
    \ =     [[NSFetchedResultsController alloc] initWithFetchRequest:fetchRequest\n\
    \                                         managedObjectContext:self.managedObjectContext\n\
    \                                           sectionNameKeyPath:nil\n         \
    \                                           cacheName:@\"Master\"];\n```\n\n接下来，你将\
    \ `self` 设置为委托，并将 `fetchedResultsController` 设置为你刚刚创建的 `fetched results controller`。\n\
    \n```\naFetchedResultsController.delegate = self;\nself.fetchedResultsController\
    \ = aFetchedResultsController;\n```\n\n最后，你执行 `fetch` 操作，如果没有错误，你将结果赋值给你的私有实例变量\
    \ `_fetchedResultsController` 并返回结果。\n\n```\nNSError *error = nil;\nif (![self.fetchedResultsController\
    \ performFetch:&error]) {\n    // Replace this implementation with code to handle\
    \ the error appropriately.\n    // abort() causes the application to generate\
    \ a crash log and terminate. You should not use this\n    // function in a shipping\
    \ application, although it may be useful during development.\n    NSLog(@\"Unresolved\
    \ error %@, %@\", error, [error userInfo]);\n    abort();\n}\nreturn _fetchedResultsController;\n\
    ```\n\n不要太担心这里的细节。试着把握大局。当你读完接下来的几章后，细节就会变得清晰起来。\n\n## Fetched Results Controller\
    \ 的委托方法\n\n```"
- fmt: "`NSFetchedResultsController`必须有一个委托（delegate），并且该委托必须提供四个方法，这些方法将在后续页面中描述。这四个方法在`NSFetchedResultsControllerDelegate`协议中定义。`NSFetchedResultsController`会监控其`NSManagedObjectContext`，并在上下文发生更改时调用其委托方法。\n\
    \n### `controllerWillChangeContent:` 委托方法\n\n当`NSFetchedResultsController`观察到影响自身的更改时（例如，它管理的对象被删除或修改，或者插入了符合其获取请求条件的新对象），它会在做出任何更改之前，通过`controllerWillChangeContent:`方法通知其委托。\n\
    \n在绝大多数情况下，`NSFetchedResultsController`会与表视图（`UITableView`）一起使用，您在此委托方法中需要做的全部工作就是告知表视图：即将进行的更新可能会影响其显示内容。以下是确保这一点实现的代码：\n\
    \n```objc\n- (void)controllerWillChangeContent:(NSFetchedResultsController *)controller\n\
    {\n    [self.tableView beginUpdates];\n}\n```\n\n### `controllerDidChangeContent:`\
    \ 委托方法\n\n当`NSFetchedResultsController`完成更改后，它会通过`controllerDidChangeContent:`方法通知其委托。此时，如果您正在使用表视图（几乎总是如此），则需要告知表视图：您在`controllerWillChangeContent:`中告知它即将到来的更新现已完成。处理方式如下：\n\
    \n```objc\n- (void)controllerDidChangeContent:(NSFetchedResultsController *)controller\n\
    {\n    [self.tableView endUpdates];\n}\n```\n\n### `controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`\
    \ 委托方法\n\n当`NSFetchedResultsController`注意到某个特定对象发生更改时，它会通过`controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:`方法通知其委托。您需要在此方法中处理表视图行的更新、插入、删除或移动，以反映`NSFetchedResultsController`所管理对象的更改。以下是委托方法的模板实现，它将为您处理表视图的更新：\n\
    \n```objc\n- (void)controller:(NSFetchedResultsController *)controller didChangeObject:(id)anObject\n\
    \       atIndexPath:(NSIndexPath *)indexPath forChangeType:(NSFetchedResultsChangeType)type\n\
    \      newIndexPath:(NSIndexPath *)newIndexPath\n{\n    UITableView *tableView\
    \ = self.tableView;\n    switch(type) {\n        case NSFetchedResultsChangeInsert:\n\
    \            [tableView insertRowsAtIndexPaths:@[newIndexPath]\n             withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n        case NSFetchedResultsChangeDelete:\n            [tableView\
    \ deleteRowsAtIndexPaths:@[indexPath]\n             withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n        case NSFetchedResultsChangeUpdate:\n            [self\
    \ configureCell:[tableView cellForRowAtIndexPath:indexPath] atIndexPath:indexPath];\n\
    \            break;\n        case NSFetchedResultsChangeMove:\n            [tableView\
    \ deleteRowsAtIndexPaths:@[indexPath]\n             withRowAnimation:UITableViewRowAnimationFade];\n\
    \            [tableView insertRowsAtIndexPaths:@[newIndexPath]\n             withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n```\n\n这段代码大部分都很直接。如果插入了一行，您会收到`NSFetchedResultsChangeInsert`类型，然后在表中插入一个新行。如果删除了一行，您会收到`NSFetchedResultsChangeDelete`类型，然后删除表中对应的行。当您收到`NSFetchedResultsChangeUpdate`类型时，表示一个对象被修改了，代码会调用`configureCell:`来确保您看到的是正确的数据。如果收到了`NSFetchedResultsChangeMove`类型，则表示某行被移动了，因此您需要从旧位置删除它，并将其插入到`newIndexPath`指定的新位置。\n\
    \n### `controller:didChangeSection:atIndex:forChangeType:` 委托方法\n\n最后，如果对象更改影响了表中的分区数量，`NSFetchedResultsController`会调用`controller:didChangeSection:atIndex:forChangeType:`委托方法。如果在创建`NSFetchedResultsController`时指定了`sectionNameKeyPath`，您就需要实现此委托方法，以根据需要添加和删除表中的分区。如果不这样做，当表中的分区数量与`NSFetchedResultsController`中的分区数量不匹配时，您将遇到运行时错误。以下是该委托方法的标准模板实现，适用于大多数情况：\n\
    \n```objc\n- (void)controller:(NSFetchedResultsController *)controller\n didChangeSection:(id\
    \ <NSFetchedResultsSectionInfo>)sectionInfo\n atIndex:(NSUInteger)sectionIndex\n\
    \ forChangeType:(NSFetchedResultsChangeType)type\n{\n    switch(type) {\n    \
    \    case NSFetchedResultsChangeInsert:\n            [self.tableView insertSections:[NSIndexSet\
    \ indexSetWithIndex:sectionIndex]\n      withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n        case NSFetchedResultsChangeDelete:\n            [self.tableView\
    \ deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]\n       withRowAnimation:UITableViewRowAnimationFade];\n\
    \            break;\n    }\n}\n```\n\n使用这四个委托方法，当您添加一个新的托管对象时，`NSFetchedResultsController`会检测到这一变化，您的表视图将自动更新。如果您删除或修改了一个对象，控制器同样会检测到。任何影响`NSFetchedResultsController`的更改都会自动触发表视图的相应更新，包括流畅的动画效果。这意味着您无需在代码中到处调用`reloadData`，只需在每次做出可能影响数据集的更改时，由控制器自动处理。非常方便！\n\
    \n### 从`NSFetchedResultsController`中检索托管对象\n\n您的表视图委托方法变得更短、更直接，因为`NSFetchedResultsController`完成了您之前在那些方法中完成的许多工作。例如，要检索与特定单元格对应的对象（这在`tableView:cellForRowAtIndexPath:`和`tableView:didSelectRowAtIndexPath:`中经常需要），您只需在`NSFetchedResultsController`上调用`objectAtIndexPath:`并传入`indexPath`参数，它就会返回正确的对象。\n\
    \n```objc\nNSManagedObject *object = [[self fetchedResultsController] objectAtIndexPath:indexPath];\n\
    ```\n\n### 创建并插入新的托管对象\n\n从编辑器窗格的函数菜单中选择`insertNewObject`，这是在示例应用程序中按下“+”按钮时调用的方法。这是一个很好的简单示例，展示了如何创建新的托管对象、将其插入到`NSManagedObjectContext`中，然后保存到持久化存储中。"
  raw: 'The fetched results controller must have a delegate, and that delegate must
    provide four methods, which you will describe in the pages that follow. These
    four methods are defined in the protocol NSFetchedResultsControllerDelegate. The
    fetched results controller monitors its managed object context and calls its delegates
    as changes are made to its context.


    Will Change Content Delegate Method


    When the fetched results controller observes a change that affects it—such as
    an object it manages being deleted or changed, or when a new object is inserted
    that meets the criteria of the fetched results controller’s fetch request—the
    fetched results controller will notify its delegate before it makes any changes,
    using the method controllerWillChangeContent:.


    The vast majority of the time a fetched results controller will be used along
    with a table view, and all you need to do in that delegate method is to inform
    the table view that updates about to be made might impact what it is displaying.
    This is the method that ensures it gets done:


    ```

    - (void)controllerWillChangeContent:(NSFetchedResultsController *)controller

    {

        [self.tableView beginUpdates];

    }

    ```


    Did Change Contents Delegate Method


    After the fetched results controller makes its changes, it will then notify its
    delegate using the method controllerDidChangeContent:. At that time, if you’re
    using a table view (and you almost certainly will be), you need to tell the table
    view that the updates you told it were coming in controllerWillChangeContent:
    are now complete. This is handled for you like so:


    ```

    - (void)controllerDidChangeContent:(NSFetchedResultsController *)controller

    {

        [self.tableView endUpdates];

    }

    ```


    Did Change Object Delegate Method


    When the fetched results controller notices a change to a specific object, it
    will notify its delegate using the method controller:didChangeObject:atIndexPath:forChangeType:newIndexPath:.
    This method is where you need to handle updating, inserting, deleting, or moving
    rows in your table view to reflect whatever change was made to the objects managed
    by the fetched results controller. Here is the template implementation of the
    delegate method that will take care of updating the table view for you:


    ```

    - (void)controller:(NSFetchedResultsController *)controller didChangeObject:(id)anObject

           atIndexPath:(NSIndexPath *)indexPath forChangeType:(NSFetchedResultsChangeType)type

          newIndexPath:(NSIndexPath *)newIndexPath

    {

        UITableView *tableView = self.tableView;

        switch(type) {

            case NSFetchedResultsChangeInsert:

                [tableView insertRowsAtIndexPaths:@[newIndexPath]

                 withRowAnimation:UITableViewRowAnimationFade];

                break;

            case NSFetchedResultsChangeDelete:

                [tableView deleteRowsAtIndexPaths:@[indexPath]

                 withRowAnimation:UITableViewRowAnimationFade];

                break;

            case NSFetchedResultsChangeUpdate:

                [self configureCell:[tableView cellForRowAtIndexPath:indexPath] atIndexPath:indexPath];

                break;

            case NSFetchedResultsChangeMove:

                [tableView deleteRowsAtIndexPaths:@[indexPath]

                 withRowAnimation:UITableViewRowAnimationFade];

                [tableView insertRowsAtIndexPaths:@[newIndexPath]

                 withRowAnimation:UITableViewRowAnimationFade];

                break;

        }

    }

    ```


    Most of this code is fairly straightforward. If a row has been inserted, you receive
    a type of NSFetchedResultsChangeInsert and you insert a new row into the table.
    If a row was deleted, you receive a type of NSFetchedResultsChangeDelete and you
    delete the corresponding row in the table. When you get a type of NSFetchedResultsChangeUpdate,
    it means that an object was changed and the code calls configureCell to ensure
    that you are looking at the right data. If a type of NSFetchedResultsChangeMove
    was received, you know that a row was moved, so you delete it from the old location
    and insert it at the location specified by newIndexPath.


    Did Change Section Delegate Method


    Lastly, if a change to an object affects the number of sections in the table,
    the fetched results controller will call the delegate method controller:didChangeSection:atIndex:forChangeType:.
    If you specify a sectionNameKeyPath when you create your fetched results controller,
    you need to implement this delegate method to take care of adding and deleting
    sections from the table as needed. If you don’t, you will get runtime errors when
    the number of sections in the table doesn’t match the number of sections in the
    fetched results controller. Here is the template’s standard implementation of
    that delegate method that should work for most situations:


    ```

    - (void)controller:(NSFetchedResultsController *)controller

     didChangeSection:(id <NSFetchedResultsSectionInfo>)sectionInfo

     atIndex:(NSUInteger)sectionIndex

     forChangeType:(NSFetchedResultsChangeType)type

    {

        switch(type) {

            case NSFetchedResultsChangeInsert:

                [self.tableView insertSections:[NSIndexSet indexSetWithIndex:sectionIndex]

          withRowAnimation:UITableViewRowAnimationFade];

                break;

            case NSFetchedResultsChangeDelete:

                [self.tableView deleteSections:[NSIndexSet indexSetWithIndex:sectionIndex]

           withRowAnimation:UITableViewRowAnimationFade];

                break;

        }

    }

    ```


    Using these four delegate methods, when you add a new managed object, the fetched
    results controller will detect that, and your table will be updated automatically.
    If you delete or change an object, the controller will detect that, too. Any change
    that affects the fetched results controller will automatically trigger an appropriate
    update to the table view, including properly animating the process. This means
    that you don’t need to litter your code with calls to reloadData every time you
    make a change that might impact your dataset. Very nice!


    Retrieving a Managed Object From the Fetched Results Controller


    Your table view delegate methods have become much shorter and more straightforward,
    since your fetched results controller does much of the work that you previously
    did in those methods. For example, to retrieve the object that corresponds to
    a particular cell, which you often need to do in tableView:cellForRowAtIndexPath:
    and tableView:didSelectRowAtIndexPath:, you can just call objectAtIndexPath: on
    the fetched results controller and pass in the indexPath parameter, and it will
    return the correct object.


    ```

    NSManagedObject *object = [[self fetchedResultsController] objectAtIndexPath:indexPath];

    ```


    Creating and Inserting a New Managed Object


    From the function menu in the editor pane, select insertNewObject, which is the
    method that is called when the + button is pressed in the sample application.
    It’s a nice, simple example of how to create a new managed object, insert it into
    a managed object context, and then save it to the persistent store.'
