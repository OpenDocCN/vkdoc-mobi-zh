    interchangeably, OCUnit refers to the entire testing suite, while SenTestingKit
    is the Objective-C framework to write tests.


    Let’s look at DebugMeTests.m.


    ```

    #import "DebugTestTests.h"


    @implementation DebugTestTests


    - (void)setUp

    {

        [super setUp];


    // Set-up code here.

    }


    - (void)tearDown

    {

        // Tear-down code here.


    [super tearDown];

    }


    - (void)testExample

    {

        STFail(@"Unit tests are not implemented yet in DebugTestTests");

    }


    @end

    ```


    Each unit test follows a simple process: set up the test, execute the test, tear
    down the test. Using OCUnit, each test is defined as a method prepended by the
    word *test*. Since each test needs to run in isolation, each test method follows
    the set up/test/tear down cycle.


