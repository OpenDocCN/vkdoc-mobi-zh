    \n正如我们在本书中多次提到的，如果您在某个操作或委托方法中，或者在这些方法调用的方法中一次性执行过多任务，那么应用程序的界面可能会在长时间运行的方法执行期间出现卡顿甚至冻结。作为一般规则，您绝对不希望应用程序的用户界面变得无响应。您的用户始终期望能够与您的应用程序交互，或者至少在他们不被允许交互时，用户界面能及时更新状态。\n\
    \n在计算机编程中，同时进行多组操作的能力通常被称为*并发*。在本章中，我们将探讨一些为应用程序添加并发的通用解决方案。即使您的应用程序在执行耗时任务，这些方案也能确保用户界面保持响应。虽然向应用程序添加并发的方法有很多，但我们只讨论两种，结合您已在网络运行循环调度中掌握的知识，这两种方法应该能够帮助您处理几乎所有耗时任务。\n"
- fmt: '第一个要介绍的机制是*定时器*（`timer`）。定时器是可以与运行循环一起调度的对象，与你之前使用过的网络类非常相似。定时器可以按设定的时间间隔调用特定对象的方法。例如，你可以设置一个定时器，让它每秒调用控制器类的方法十次。一旦启动，大约每十分之一秒，你的方法就会被触发，直到你告诉定时器停止。


    无论是运行循环调度还是定时器，都不是某些人认为的“真正”的并发形式。大多数人将运行循环和定时器称为异步计算，即任务在后台运行，对应用程序的用户界面操作不可见。在这两种情况下，应用程序的主运行循环都会检查某些条件，如果条件满足，它会调用特定对象上的特定方法。然而，如果被调用的方法运行时间过长，你的界面就会变得无响应。但是，使用运行循环和定时器比实现所谓的“真正”并发（即同时运行多个任务和多个运行循环）要简单得多。


    我们要介绍的另一个机制在 Objective-C 世界中相对较新。它被称为*操作队列*（`operation queue`），它与你创建的名为*操作*（`operations`）的特殊对象协同工作。操作队列可以同时管理多个操作，并确保这些操作根据你设定的一些简单规则获得处理时间。每个操作都有一组特定的命令，这些命令以你编写的方法形式存在，操作队列会确保每个操作的方法以充分利用可用系统资源的方式运行。


    操作队列非常棒，因为它们是一种高级抽象，隐藏了实现真正并发所涉及的繁琐实现细节。在 iOS 中，队列利用一个名为*线程*（`threads`）的操作系统特性为其管理的各种操作分配处理时间。Apple
    目前推荐使用操作队列而不是线程，这不仅是因为操作队列更易于使用，还因为它们能为你的应用程序带来其他优势。


    **注意：** 尽管在使用 iPhone SDK 时不可用，但并发的另一种形式是多进程处理，即使用 UNIX 系统调用 `fork()` 和 `exec()`
    或 Cocoa 的 `NSTask` 类。使用多进程比使用线程更重量级。


    Grand Central Dispatch（GCD）是一种允许应用程序更好地利用现代计算机拥有多个处理核心（有时甚至是多个处理器）这一事实的技术。如果你在
    GCD 发布之前在程序中使用过操作队列，那么当你为 iOS 重新编译应用程序时，你的代码会自动免费获得 GCD 带来的好处。如果你使用了其他形式的并发（例如线程）而不是操作队列，你的应用程序就不会自动受益于
    GCD。


    你可能已经明白为什么我们将对“真正”并发的讨论局限于操作队列。它们显然是 Cocoa 和 Cocoa Touch 的未来发展方向。它们大大简化了我们作为程序员的生活，并帮助我们利用尚未被编写出来的技术。还有什么比这更好的呢？


    让我们先绕个小弯，看看并发所要解决的问题。


    ### 探索并发问题


    在探索解决并发问题的方法之前，让我们先确保你理解了问题所在。你将构建一个小型应用程序来演示在应用程序主线程上试图一次做太多事情时会出现的问题。每个应用程序都至少有一个执行线程，那就是应用程序主运行循环所在的线程。所有操作方法都在主线程上触发，所有事件处理和用户界面更新也都在主线程上完成。如果在主线程上触发的任何方法耗时过长，用户界面就会冻结并变得无响应。


    你的小型应用程序将计算平方根。大量、大量的平方根。用户将能够输入一个数字，你将计算从 1 到他们指定的数字之间的每个数字的平方根（[图 14-1](#9781430238072_Ch14.xhtml#Fig1)）。此练习的唯一目的就是消耗处理器周期。


    ![9781430238072_Fig14-01.jpg](images/9781430238072_Fig14-01.jpg)


    [图 14-1](#9781430238072_Ch14.xhtml#_Fig1)  Stalled 应用程序将演示在应用程序主线程上尝试执行过多工作的问题


    当输入一个足够大的数字并点击 Go 按钮时，用户界面将完全无响应数秒甚至更长时间。进度条和进度标签（其属性将在每次循环迭代中被设置）实际上不会向用户显示任何变化，直到循环中的所有值都被计算完毕。只有最后一次计算的结果才会反映在用户界面上。


    ### 创建 Stalled 应用程序


    在 Xcode 中，使用“单视图应用程序”模板创建一个新项目，并将该项目命名为 `Stalled`。首先，你将设计界面并声明你的 `outlet` 和 `action`。然后，你将编写视图控制器的实现并进行测试。


    #### 设计界面


    选择 `ViewController.xib` 进入 Interface Builder 模式。从库中拖拽一个圆角矩形按钮到视图上，使用蓝色参考线将按钮放置在上右边缘。双击按钮并将其标题更改为
