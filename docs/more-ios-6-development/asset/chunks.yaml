- fmt: 'You can also populate the message body with any text you’d like. You can either
    use a regular string to create a plain text e-mail or you can use HTML to create
    a formatted e-mail. To supply the mail compose view controller with a message
    body, use the method `setMessageBody:isHTML:`. If the string you pass in is plain
    text, you should pass `NO` as the second parameter, but if you’re providing HTML
    markup in the first argument rather than a plain string, then you should pass
    `YES` in the second argument so your markup will be parsed before it is shown
    to the user.


    ```

    [mc setMessageBody:@"Ohai!!!\n\nKThxBai" isHTML:NO];

    [mc setMessageBody:@"<HTML><B>Ohai</B><BR/>I can has cheezburger?</HTML>" isHTML:YES];

    ```


    ## Adding Attachments


    You can also add attachments to outgoing e-mails. In order to do so, you must
    provide an instance of `NSData` containing the data to be attached, along with
    the mime type of the attachment and the file name to be used for the attachment.
    *Mime types*, which we discussed briefly back in [Chapter 9](#9781430238072_Ch09.xhtml)
    when we talked about interacting with web servers, are strings that define the
    type of data being transferred over the Internet. They’re used when retrieving
    from or sending files to a web server, and they’re also used when sending e-mail
    attachments. To add an attachment to an outgoing e-mail, use the method `addAttachmentData:mimeType:fileName:`.
    Here’s an example of adding an image stored in your application’s bundle as an
    attachment:


    ```

    NSString *path = [[NSBundle mainBundle] pathForResource:@"surpriseCat" ofType:@"png"];

    NSData *data = [NSData dataWithContentsOfFile:path];

    [mc addAttachmentData:data mimeType:@"image/png" fileName:@"surpriseCat"];

    ```


    ## Presenting the Mail Compose View


    Once you’ve configured the controller with all the data you want populated, you
    present the controller’s view, as you’ve done before:


    ```

    [self presentViewController:mc animated:YES completion:nil];

    ```


    ## The Mail Compose View Controller Delegate Method


    The mail compose view controller delegate’s method is contained in the formal
    protocol `MFMailComposeViewControllerDelegate`. Regardless of whether the user
    sends or cancels, and regardless of whether the system was able to send the message
    or not, the method `mailComposeController:didFinishWithResult:error:` gets called.
    As with most delegate methods, the first parameter is a pointer to the object
    that called the delegate method. The second parameter is a *result code* that
    tells you the fate of the outgoing e-mail, and the third is an `NSError` instance
    that will give you more detailed information if a problem was encountered. Regardless
    of what result code you received, it is your responsibility in this method to
    dismiss the mail compose view controller by calling `dismissModalViewControllerAnimated:`.


    If the user tapped the Cancel button, your delegate will be sent the result code
    `MFMailComposeResultCancelled`. In that situation, the user changed their mind
    and decided not to send the e-mail. If the user tapped the Send button, the result
    code is going to depend on whether the MessageUI framework was able to successfully
    send the e-mail. If it was able to send the message, the result code will be `MFMailComposeResultSent`.
    If it tried, and failed, the result code will be `MFMailComposeResultFailed`,
    in which case, you probably want to check the provided `NSError` instance to see
    what went wrong. If the message couldn’t be sent because there’s currently no
    Internet connection, but the message was saved into the outbox to be sent later,
    you will get a result code of `MFMailComposeResultSaved`.


    Here is a very simple implementation of the delegate method that just logs what
    happened:


    ```

    - (void)mailComposeController:(MFMailComposeViewController*)controller

                didFinishWithResult:(MFMailComposeResult)result

                             error:(NSError*)error

    {

        switch (result)

        {

            case MFMailComposeResultCancelled:

                NSLog(@"Mail send canceled. . .");

                break;

            case MFMailComposeResultSaved:

                NSLog(@"Mail saved. . .");

                break;

            case MFMailComposeResultSent:

                NSLog(@"Mail sent. . .");

                break;

            case MFMailComposeResultFailed:

                NSLog(@"Mail send error: %@. . .", [error localizedDescription]);

                break;

            default:

                break;

        }

        [controller dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ## Message Compose View Controller


    `MFMessageComposeViewController` is similar, but simpler than its e-mail counterpart.
    First, you create an instance and set its delegate.


    ```

    MFMessageComposeViewController *mc = [[MFMessageComposeViewController alloc] init];

    mc.messageComposeDelegate = self;

    ```


    There are only two properties that you can populate: `recipients` and `body`.
    Unlike with e-mail, these can be accessed via direct properties on the class,
    as well as the method accessors. `Recipients` is an array of strings, where each
    string is a contact name from your Address Book or phone number. `Body` is the
    message you want to send.


    ```

    mc.recipients = @[@"Manny Sullivan"];

    mc.body = @"Hello, Manny!";

    ```


    The message compose view controller delegate method behaves identically to its
    e-mail counterpart. There are only three possible results when sending an SMS:
    cancelled, sent, or failed.


    ```

    - (void)messageComposeViewController:(MFMessageComposeViewController *)controller

                          didFinishWithResult:(MessageComposeResult)result

    {

        switch (result)

        {

            case MessageComposeResultCancelled:

                NSLog(@"SMS sending canceled");

                break;

            case MessageComposeResultSent:

                NSLog(@"SMS sent");

                break;

            case MessageComposeResultFailed:

                NSLog(@"SMS sending failed");

                break;

            default:

                NSLog(@"SMS not sent");

                break;

        }

        [controller dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ## The Social Framework


    In iOS 5, Apple tightly integrated with Twitter ([www.twitter.com](http://www.twitter.com)).
    Basically, your Twitter account was available from the system. As a result, it
    was very easy to send messages (“tweets”) to Twitter or perform Twitter API requests.
    In iOS 6, Apple abstracted and extended this feature into the Social framework.
    Along with Twitter, Apple integrated identical functionality for Facebook and
    Sina Weibo.


    ### SLComposeViewController


    `SLComposeViewController` is very similar in design and principle to the e-mail
    and message view controller classes in the Message UI framework. However, there
    isn’t a corresponding delegate class. Rather, `SLComposeViewController` has a
    completion handler property that can be assigned a block.


    In order to confirm that your application can use a service, you call the static
    method `isAvailableForServiceType:`. For example, the check to see if you can
    send to Facebook is


    ```

    if ([SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook])
    {

        // code to send message to Facebook

        . . .

    }

    ```


    `isAvailableForServiceType:` takes a `String` argument of possible service type
    constants. These service types are defined in the header file `SLServiceTypes.h`.
    Currently, Apple defines the following service type constant:


    ```

    NSString *const SLServiceTypeFacebook;

    NSString *const SLServiceTypeTwitter;

    NSString *const SLServiceTypeSinaWeibo;

    ```


    If you are able to send a send a message to the service, you start by creating
    an instance of the view controller.


    ```

    SLComposeViewController *composeVC = [SLComposeViewController

                                              composeViewControllerForServiceType:SLServiceTypeTwitter];

    ```'
