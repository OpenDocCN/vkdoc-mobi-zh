    ## 关于作者


    ![image](img/9781430238072_unFM-01.jpg)


    **戴夫·马克** 是一位资深的 Mac 开发者和作者，撰写了多本关于 Mac 和 iOS 开发的书籍，包括 *Beginning iPhone 4 Development*（Apress,
    2011）、*More iPhone 3 Development*（Apress, 2010）、*Learn C on the Mac*（Apress, 2008）、*Ultimate
    Mac Programming*（Wiley, 1995）以及 *Macintosh Programming Primer* 系列（Addison-Wesley,
