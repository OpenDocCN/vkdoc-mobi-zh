- fmt: 'Fortunately, `NSManagedObject` can be subclassed, just like other Objective-C
    classes, and that’s the key to doing more advanced defaulting and validation.
    It also opens the door to adding additional functionality to your entity by adding
    methods. You can, for example, create a method to return a value calculated from
    one or more of the entity’s attributes.


    In this chapter, you’re going to create a custom subclass of `NSManagedObject`
    for your `Hero` entity. Then, you’re going to use that subclass to add some additional
    functionality. You’re also going to add two new attributes to `Hero`. One is the
    hero’s age. Instead of storing the age, you’re going to calculate it based on
    their birthdate. As a result, you won’t need Core Data to create space in the
    persistent store for the hero’s age, so you’re going to use the transient attribute
    type and then write an accessor method to calculate and return the hero’s age.
    The transient attribute type tells Core Data not to create storage for that attribute.
    In your case, you’ll calculate the hero’s age as needed at runtime.


    The second attribute you’re going to add is the hero’s favorite color. Now, there
    is no attribute type for colors, so you’re going to implement something called
    a transformable attribute. Transformable attributes use a special object called
    a *value transformer* to convert custom objects to instances of `NSData` so they
    can be stored in the persistent store. You’ll write a value transformer that will
    let you save `UIColor` instances this way. In [Figure 6-1](#9781430238072_Ch06.xhtml#Fig1),
    you can see what the detail editing view will look like at the end of the chapter
    with the two new attributes in place.


    ![9781430238072_Fig06-01.jpg](images/9781430238072_Fig06-01.jpg)


    [Figure 6-1.](#9781430238072_Ch06.xhtml#_Fig1)  The `Hero` detail view as it will
    look at the end of the chapter


    Of course, you don’t have an attribute editor for colors, so you’ll have to write
    one to let the user select the hero’s favorite color. You’re just going to create
    a simple, slider-based color chooser ([Figure 6-2](#9781430238072_Ch06.xhtml#Fig2)).


    ![9781430238072_Fig06-02.jpg](images/9781430238072_Fig06-02.jpg)


    [Figure 6-2.](#9781430238072_Ch06.xhtml#_Fig2)  The simple, slider-based color
    attribute editor


    Because there’s no way to set a default color in the data model, you’re going
    to write code to default the favorite color attribute to white. If you don’t do
    that, then the color will be `nil` when the user goes to edit it the first time,
    which will cause problems.


    Finally, you’ll add validation to the date field to prevent the user from selecting
    a birthdate that occurs in the future and you’re also going to tweak your attribute
    editors so that they notify the user when an entered attribute has failed validation.
    You’ll give the user the option to go back and fix the attribute or to just cancel
    the changes they made ([Figure 6-3](#9781430238072_Ch06.xhtml#Fig3)).


    ![9781430238072_Fig06-03.jpg](images/9781430238072_Fig06-03.jpg)


    [Figure 6-3.](#9781430238072_Ch06.xhtml#_Fig3)  When attempting to save an attribute
    that fails validation, the user will have the option of fixing the problem or
    canceling their changes


    Although you’re only going to be adding validation to the `Birthdate` field, the
    reporting mechanism you’re going to write will be generic and reusable if you
    add validation to another field. You can see an example of the generic error alert
    in [Figure 6-4](#9781430238072_Ch06.xhtml#Fig4).


    ![9781430238072_Fig06-04.jpg](images/9781430238072_Fig06-04.jpg)


    [Figure 6-4.](#9781430238072_Ch06.xhtml#_Fig4)  Since your goal is generally to
    write reusable code, your validation mechanism will also enforce validations done
    on the data model, such as minimum length


    There’s a fair amount of work to do, so let’s get started. You’re going to continue
    working with the same `SuperDB` application from last chapter. Make sure that
    you created a new version of your data model and that you turned on lightweight
    migrations, as shown in the last chapter.


    ## Updating the Data Model


    The first order of business is to add your two new attributes to the data model.
    Make sure that the disclosure triangle next to `SuperDB.xcdatamodeld` in the `SuperDB`
    folder in the Navigator pane is expanded, and single-click on the current version
    of the data model, the one with the green check mark icon on it.


    Once the model editor comes up, first make sure you are in table view mode. Then,
    select the `Hero` entity in the component pane ([Figure 6-5](#9781430238072_Ch06.xhtml#Fig5)).


    ![9781430238072_Fig06-05.jpg](images/9781430238072_Fig06-05.jpg)


    [Figure 6-5.](#9781430238072_Ch06.xhtml#_Fig5)  Back in the model editor


    ### Adding the Age Attribute


    Click the plus icon labeled `Add Attribute` in the lower right of the data model.
    Change the new attribute’s name to `age`. In the model editor, uncheck `Optional`
    and check the `Transient`. That will let Core Data know that you don’t need to
    store a value for this attribute. In your case, since you’re using SQLite for
    your persistent store, this will tell Core Data not to add a column for `age`
    to the database table used to store hero data. Change the attribute type to `Integer
    16`; you’re going to calculate age as a whole number. That’s all you have to do
    for now for the `age` attribute. Of course, as things stand, you can’t do anything
    meaningful with this particular attribute because it can’t store anything, and
    you don’t yet have any way to tell it how to calculate the age. That will change
    in a few minutes, when you create a custom subclass of `NSManagedObject`.


    ### Adding the Favorite Color Attribute


    Add another attribute. This time, call the new attribute `favoriteColor` and set
    the attribute type to `Transformable`. Once you’ve changed the `Type` pop-up to
    `Transformable`, you should notice a new text field labeled `Name`, with a greyed
    value of `value transformer name` ([Figure 6-6](#9781430238072_Ch06.xhtml#Fig6)).


    ![9781430238072_Fig06-06.jpg](images/9781430238072_Fig06-06.jpg)


    [Figure 6-6.](#9781430238072_Ch06.xhtml#_Fig6)  Making the `favoriteColor` attribute
    a transformable attribute


    The `value transformer name` is the key to using transformable attributes. We’ll
    discuss value transformers in more depth in just a few minutes, but you’ll populate
    this field now to save yourself a trip back to the model editor later. This field
    is where you need to put the name of the value transformer class that will be
    used to convert whatever object represents this attribute into an `NSData` instance
    for saving in the persistent store and vice versa. If you leave the field blank,
    `CoreData` will use the default value transformer, `NSKeyedUnarchiveFromDataTransformerName`.
    The default value transformer will work with a great many objects by using `NSKeyedArchiver`
    and `NSKeyedUnarchiver` to convert any object that conforms to the `NSCoding`
    protocol into an instance of `NSData`.


