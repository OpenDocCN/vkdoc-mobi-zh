  raw: 'Finally, you need out cell’s textField to know about its new delegate. In
    SuperDB’s initWithStyle:reuseIdentifier: method, just before the textField is
    added to the cell’s contentView, add this:


    ```

    self.textField.delegate = self;

    ```


    What have you done here? First, you made sure the NSTextField delegate was set
    to self in initWithStyle:reuseIdentifier:. Then, you added the validate method.
    Basically, you validate calls validateValue:forKey:error: on your NSManagedObject.
    If this validation fails, you parse the NSError object and create a UIAlertView.
    Next, you defined a textFieldDidEndEditing: delegate method. This method gets
    invoked when the NSTextField in your SuperDBEditCell class exits editing mode.
    This happens when you click from cell to another or when you click Save or Back
    on the navigation bar. Finally, you added alertView:clickedButtonAtIndex:. This
    delegate method gets called when the user clicks a button on the UIAlertView you
    display on validation error. Depending on which button was clicked, Cancel or
    Fix, you either revert the value or move the focus to the table view cell.


    Now you just need to pass your Hero object down from the HeroDetailController
    to the SuperDBEditCell. Edit HeroDetailController.m and find the tableView:cellForRowAtIndexPath:.
    Just before all the other cell configurations, add this:


    ```

    cell.hero = self.hero;

    ```


    Updating the Detail View


    Looking at [Figure 6-2](#9781430238072_Ch06.xhtml#Fig2), you see that you need
    two more cells in the General section of the table view. Before you go any further,
    let’s update the detail view.


    Open SuperDB.storyboard, and find the HeroDetailController. Select the second
    table view section by clicking in an area outside the table view cells (next to
    the General label is a good place). Open the Attributes Inspector in the Utility
    pane, and change the Rows field from 3 to 5\. The second section of the table
    view should now show five rows. That’s all you need to do in the storyboard editor.
    Easy, right?


    Now let’s take a look at [Figure 6-2](#9781430238072_Ch06.xhtml#Fig2) again. The
    order of the labels in the second section are: Identity, Birthdate, Age, Sex,
    and Favorite Color. When you last ran the application, the section labels were
    Identity, Birthdate, and Sex. Not only do you need to add Age and Favorite Color,
    you need to reorder things so that Age comes before Sex. Fortunately, since your
    cells are configured from a property list, this should be (relatively) simple.


    Open HeroDetailController.plist. Navigate down to Root ![image](images/arrow.jpg)
    Sections ![image](images/arrow.jpg) Item 1 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg)
    Item 1. If the disclosure triangle next to the last Item 1 is open, close it.
    Item 1 and Item 2 should be right next to each other. If the Item 2 disclosure
    triangle is open, close it as well. Now select the last Item 1 row, and click
    the (+) button next to the Item 1 label. A new row should have been inserted between
    Item 1 and Item 2\. Item 2 is renamed to Item 3\. The new Item 2 has a type of
    string with no value.


    Change the new Item 2’s type to Dictionary, and open its disclosure triangle.
    This is the configuration for your Age cell. Click the (+) button next to the
    new Item 2 three times to add three rows. Keep all three rows as type string and
    give them the following key/value pairs: key/age, class/SuperDBEditCell, label/Age.


    Now add a row after Item 3, repeat the process, adding three rows with type string
    to the new Item 4\. The key/value pairs will be: key/favoriteColor, class/SuperDBEditCell,
    label/Color.


    Build and run the app. Navigate down to the detail view.


    The app should have crashed. Why?


    Well, you’re assigning the age attribute to the textField’s text property. Age
    will be an instance of NSNumber, and textField.text will expect an NSString. You
    could subclass SuperDBEditCell to handle NSNumbers, but you probably won’t need
    it. It’s far easier to change this method in SuperDBEditCell.m.


    ```

    - (void)setValue:(id)aValue

    {

        if ([newValue isKindOfClass:[NSString class]])

            self.textField.text = aValue;

        else

            self.textField.text = [aValue description];

    }

    ```


    If you were showing a lot of NSNumbers, you probably wouldn’t do this, but this
    works for now.


    Try building and running the app again. If you add a new hero, you should see
    something like [Figure 6-10](#9781430238072_Ch06.xhtml#Fig10).


    ![9781430238072_Fig06-10.jpg](images/9781430238072_Fig06-10.jpg)


    [Figure 6-10.](#9781430238072_Ch06.xhtml#_Fig10)  The Hero detail view


    There’s a problem with the Age cell. For one, in Edit mode, you can tap inside
    the Age cell and it will get focus and show the keyboard input. Second, when you
    try to save from Edit mode, the app will crash. Let’s fix this.


    Refactoring SuperDBEditCell


    The Age cell is editable by default. There is a table view data source method,
    tableView:canEditRowAtIndexPath:, that determines if a specific table view cell
    is editable. By default, this method is provided in the UITableViewController
    template, but commented out. As a result, the table view assumes all cells are
    editable. Clearly, you need this method to return NO for the Age cell index path.
    Unfortunately, by specifing a cell as uneditable, the cell won’t indent in Edit
    mode. That may be okay, but you’d like your Age cell to indent even if you can’t
    edit it.


    The app crash is due to these lines of code in the HeroDetailController save method:


    ```

    for (SuperDBEditCell *cell in [self.tableView visibleCells])

        [self.hero setValue:[cell value] forKey:[cell key]];

    ```


    When you try to set the value in the Hero entity’s attribute of age, you’ll get
    an exception crash. Remember, you declared age to be transient in your data model.
    That means the value of age is calculated, and there’s no way to set it. You need
    a way to check if you should save the value in the cell.


    First, you need to define an uneditable version of SuperDBEditCell. But rather
    than do that, let’s make a superclass of SuperDBEditCell, called SuperDBCell,
    that uses a textField, but doesn’t allow it to be enabled for editing. This seems
    like a good time to try out Xcode’s refactoring capabilities.


    Xcode Refactoring Options


    Open Edit ![image](images/arrow.jpg) Refactor in Xcode. You should see the submenu
    in [Figure 6-11](#9781430238072_Ch06.xhtml#Fig11).


    ![9781430238072_Fig06-11.jpg](images/9781430238072_Fig06-11.jpg)


    [Figure 6-11.](#9781430238072_Ch06.xhtml#_Fig11)  Xcode Refactor menu


    Before you continue, let’s quickly review what refactoring is and what each menu
    item does. Refactoring is restructuring code without changing its external behavior.
    Typically, you refactor some code (usually a method) to improve some nonfunctional
    attribute (i.e., reduce complexity, improve readability). This is not undertaken
    as a random “rewrite” of the code. Rather, it’s a disciplined approach of small
    changes.


    **Note**  An excellent resource on refactoring patterns is Martin Fowler’s *Refactoring:
    Improving the Design of Existing Code* (Addison-Wesley, 1999). Not only does it
    explain the process behind refactoring, but it outlines several refactoring techniques.


    Xcode’s refactoring options are'
  trans: "\n最后，你需要让单元格的 `textField` 知道它的新委托。在 `SuperDB` 的 `initWithStyle:reuseIdentifier:`\
    \ 方法中，就在将 `textField` 添加到单元格的 `contentView` 之前，添加以下代码：\n\n```\nself.textField.delegate\
    \ = self;\n```\n\n这里你做了什么呢？首先，你确保在 `initWithStyle:reuseIdentifier:` 中将 `NSTextField`\
    \ 的委托设置为 `self`。然后，你添加了 `validate` 方法。基本上，你通过调用 `NSManagedObject` 上的 `validateValue:forKey:error:`\
    \ 进行验证。如果验证失败，你解析 `NSError` 对象并创建一个 `UIAlertView`。接下来，你定义了一个 `textFieldDidEndEditing:`\
    \ 委托方法。当 `SuperDBEditCell` 类中的 `NSTextField` 退出编辑模式时，该方法会被调用。当你从一个单元格点击到另一个单元格，或者点击导航栏上的“保存”或“返回”按钮时，就会触发此方法。最后，你添加了\
    \ `alertView:clickedButtonAtIndex:` 方法。当用户在验证错误时显示的 `UIAlertView` 上点击某个按钮时，该委托方法会被调用。根据点击的是“取消”还是“修复”按钮，你要么恢复原始值，要么将焦点移动到表格视图单元格。\n\
    \n现在，你只需要将 `Hero` 对象从 `HeroDetailController` 传递到 `SuperDBEditCell`。编辑 `HeroDetailController.m`\
    \ 并找到 `tableView:cellForRowAtIndexPath:` 方法。在所有其他单元格配置之前，添加以下代码：\n\n```\ncell.hero\
    \ = self.hero;\n```\n\n## 更新详情视图\n\n查看图 6-2，你会发现表格视图的“通用”部分还需要两个单元格。在继续之前，我们先更新详情视图。\n\
    \n打开 `SuperDB.storyboard`，找到 `HeroDetailController`。点击表格视图单元格之外的区域（例如“通用”标签旁边）来选择第二个表格视图部分。打开“工具”区域中的“属性检查器”，将“行数”字段从\
    \ 3 改为 5。现在，表格视图的第二部分应该显示五行。这就是你在故事板编辑器中需要做的所有事情。很简单吧？\n\n现在我们再来看一下图 6-2。第二部分中标签的顺序是：身份、出生日期、年龄、性别、最喜欢的颜色。当你上次运行应用程序时，部分的标签是身份、出生日期和性别。你不仅需要添加年龄和最喜欢的颜色，还需要重新排列顺序，使年龄在性别之前。幸运的是，由于你的单元格是通过属性列表配置的，这应该（相对）简单。\n\
    \n打开 `HeroDetailController.plist`。依次展开 Root ![image](img/arrow.jpg) Sections ![image](img/arrow.jpg)\
    \ Item 1 ![image](img/arrow.jpg) rows ![image](img/arrow.jpg) Item 1。如果最后一个 Item\
    \ 1 旁边的展开三角形是打开的，请将其关闭。Item 1 和 Item 2 应该紧挨在一起。如果 Item 2 的展开三角形是打开的，也将其关闭。现在选择最后一个\
    \ Item 1 行，并点击 Item 1 标签旁边的 (+) 按钮。应该在 Item 1 和 Item 2 之间插入一个新行。Item 2 被重命名为 Item\
    \ 3。新的 Item 2 的类型是字符串，没有值。\n\n将新 Item 2 的类型更改为 Dictionary，并打开其展开三角形。这是你的“年龄”单元格的配置。点击新\
    \ Item 2 旁边的 (+) 按钮三次以添加三行。将所有三行的类型保留为字符串，并赋予它们以下键/值对：key/age、class/SuperDBEditCell、label/Age。\n\
    \n现在在 Item 3 之后添加一行，重复此过程，向新的 Item 4 添加三行，类型为字符串。键/值对将为：key/favoriteColor、class/SuperDBEditCell、label/Color。\n\
    \n构建并运行应用程序。导航到详情视图。\n\n应用程序应该会崩溃。为什么？\n\n问题在于，你将 `age` 属性赋值给了 `textField` 的 `text`\
    \ 属性。`Age` 将是 `NSNumber` 的一个实例，而 `textField.text` 期望的是 `NSString`。你可以子类化 `SuperDBEditCell`\
    \ 来处理 `NSNumber`，但可能并不需要。更简单的方法是修改 `SuperDBEditCell.m` 中的这个方法：\n\n```\n- (void)setValue:(id)aValue\n\
    {\n    if ([newValue isKindOfClass:[NSString class]])\n        self.textField.text\
    \ = aValue;\n    else\n        self.textField.text = [aValue description];\n}\n\
    ```\n\n如果你要处理很多 `NSNumber`，你可能不会这样做，但这个方法现在可行。\n\n尝试再次构建并运行应用程序。如果你添加一个新英雄，你应该会看到类似图\
    \ 6-10 的内容。\n\n![9781430238072_Fig06-10.jpg](img/9781430238072_Fig06-10.jpg)\n\
    \n图 6-10.  英雄详情视图\n\n“年龄”单元格存在一个问题。首先，在编辑模式下，你可以点击“年龄”单元格内部，它会获得焦点并显示键盘输入。其次，当你尝试从编辑模式保存时，应用程序会崩溃。我们来解决这个问题。\n\
    \n## 重构 SuperDBEditCell\n\n默认情况下，“年龄”单元格是可编辑的。有一个表格视图数据源方法 `tableView:canEditRowAtIndexPath:`\
    \ 用于确定特定表格视图单元格是否可编辑。默认情况下，此方法在 `UITableViewController` 模板中提供，但被注释掉了。因此，表格视图假定所有单元格都是可编辑的。显然，你需要此方法为“年龄”单元格的索引路径返回\
    \ `NO`。不幸的是，将单元格指定为不可编辑后，该单元格在编辑模式下不会缩进。这也许可以接受，但你希望“年龄”单元格即使在无法编辑时也能缩进。\n\n应用程序崩溃是由于\
    \ `HeroDetailController` 的保存方法中的这几行代码：\n\n```\nfor (SuperDBEditCell *cell in [self.tableView\
    \ visibleCells])\n    [self.hero setValue:[cell value] forKey:[cell key]];\n```\n\
    \n当你尝试设置 `Hero` 实体中 `age` 属性的值时，会引发异常崩溃。记住，你在数据模型中将 `age` 声明为瞬态属性。这意味着 `age` 的值是计算得出的，无法直接设置。你需要一种方法来检查是否应该保存单元格中的值。\n\
    \n首先，你需要定义一个不可编辑版本的 `SuperDBEditCell`。但与其这样做，不如创建一个 `SuperDBEditCell` 的超类，命名为\
    \ `SuperDBCell`，它使用 `textField`，但不允许在编辑时启用它。这似乎是尝试 Xcode 重构功能的好时机。\n\n### Xcode\
    \ 重构选项\n\n打开 Xcode 中的 Edit ![image](img/arrow.jpg) Refactor。你应该会看到图 6-11 中的子菜单。\n\
    \n![9781430238072_Fig06-11.jpg](img/9781430238072_Fig06-11.jpg)\n\n图 6-11.  Xcode\
    \ 重构菜单\n\n在继续之前，让我们快速回顾一下什么是重构以及每个菜单项的作用。重构是在不改变代码外部行为的情况下重构代码。通常，你会重构一些代码（通常是一个方法）以改善某些非功能性属性（例如，降低复杂性、提高可读性）。这并不是随意地“重写”代码，而是一种有纪律的、小步进行的改进方法。\n\
    \n**注意**  关于重构模式的优秀资源是 Martin Fowler 的《重构：改善既有代码的设计》（Addison-Wesley, 1999）。它不仅解释了重构背后的过程，还概述了几种重构技术。\n\
    \nXcode 的重构选项包括：\n"
- fmt: "* *Rename*: Rename symbols so they indicate more clearly their purpose and\
    \ make the source easier to read. Examples of symbols are the name of a class,\
    \ method, or function. Unfortunately, methods declared in a protocol cannot be\
    \ renamed.\n* *Extract*: Extracts code you select in Xcode into a new method or\
    \ function.\n* *Create Superclass*: Defines a superclass for the class currently\
    \ selected in Xcode.\n* *Move Up*: Moves the selected method, property, or instance\
    \ variable from a class to the superclass, provided both are defined in your project.\n\
    * *Move Down*: The opposite of *Move Up*, it moves the selected symbol from a\
    \ class to a subclass, provided both are defined in your project.\n* *Encapsulate*:\
    \ Encapsulates an instance variable and create the appropriate accessors.\n* *Convert\
    \ to Objective-C ARC*: A tool to assist in converting legacy projects to use Automatic\
    \ Reference Counting.\n* *Convert to Modern Objective-C Syntax*: A tool to update\
    \ code to use more modern Objective-C features like new Literals syntax (arrays,\
    \ dictionaries, Booleans).\n\nThis is just a brief introduction to the Refactor\
    \ menu items to familiarize yourself with what’s available in Xcode for future\
    \ projects. Let’s get back to the `SuperDB` app.\n\nYou’re going to use the *Create\
    \ Superclass* option. Open `SuperDBEditCell.h`, and highlight the class name,\
    \ `SuperDBEditCell`, after the `@interface` declaration. Select Edit ![image](images/arrow.jpg)\
    \ Refactor ![image](images/arrow.jpg) Create Superclass. Xcode should present\
    \ a pop-up on what to call the superclass ([Figure 6-12](#9781430238072_Ch06.xhtml#Fig12)).\
    \ Name the class `SuperDBCell`, select the “Create files for new superclass” option,\
    \ and click Preview. You should see a File Merge pop-up that shows all the changes\
    \ it will make to create the superclass `SuperDBCell` ([Figure 6-13](#9781430238072_Ch06.xhtml#Fig13)).\n\
    \n![9781430238072_Fig06-12.jpg](images/9781430238072_Fig06-12.jpg)\n\n[Figure\
    \ 6-12.](#9781430238072_Ch06.xhtml#_Fig12)  Create Superclass pop-up\n\n![9781430238072_Fig06-13.jpg](images/9781430238072_Fig06-13.jpg)\n\
    \n[Figure 6-13.](#9781430238072_Ch06.xhtml#_Fig13)  Refactoring file merge preview\n\
    \nThis particular preview doesn’t show much, other than the creation of the `SuperDBCell`\
    \ interface and implementation files. Click Save. Xcode may ask if it should take\
    \ a snapshot. Whether you use snapshots or not are up to you. We use them occasionally,\
    \ but we prefer using a revision control system like Git.\n\n## Moving Code Around\n\
    \nNow, Xcode didn’t do everything you wanted. It did create the files for `SuperDBCell`,\
    \ and it did make `SuperDBEditCell` a subclass of `SuperDBCell`, but it didn’t\
    \ do much else. Remember you wanted to make `SuperDBCell` the same as `SuperDBEditCell`,\
    \ but the `textField` wasn’t going to ever be enabled.\n\nLet’s start with the\
    \ `SuperDBCell` interface file. You’re going to move most of `SuperDBEditCell`\
    \ into `SuperDBCell`.\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface SuperDBCell\
    \ : UITableViewCell\n\n@property (strong, nonatomic) UILabel *label;\n@property\
    \ (strong, nonatomic) UITextField *textField;\n\n@property (strong, nonatomic)\
    \ NSString *key;\n@property (strong, nonatomic) id value;\n\n@property (strong,\
    \ nonatomic) NSManagedObject *hero;\n\n@end\n```\n\nAs a result, `SuperDBEditCell.h`\
    \ will change as well.\n\n```objc\n#import <UIKit/UIKit.h>\n#import \"SuperDBCell.h\"\
    \n\n@interface SuperDBEditCell : SuperDBCell <UITextFieldDelegate, UIAlertViewDelegate>\n\
    \n- (IBAction)validate;\n\n@end\n```\n\nNext, you adjust the `SuperDBCell` implementation.\n\
    \n```objc\n#import \"SuperDBCell.h\"\n\n#define kLabelTextColor [UIColor colorWithRed:0.321569f\
    \ green:0.4f blue:0.568627f alpha:1.0f]\n\n@implementation SuperDBCell\n\n- (id)initWithStyle:(UITableViewCellStyle)style\
    \ reuseIdentifier:(NSString *)reuseIdentifier\n{\n    self = [super initWithStyle:style\
    \ reuseIdentifier:reuseIdentifier];\n    if (self) {\n        // Initialization\
    \ code\n        self.selectionStyle = UITableViewCellSelectionStyleNone;\n\n//\
    \ TODO - use Auto Layout to adjust sizes\n        self.label = [[UILabel alloc]\
    \ initWithFrame:CGRectMake(12.0, 15.0, 67.0, 15.0)];\n        self.label.backgroundColor\
    \ = [UIColor clearColor];\n        self.label.font = [UIFont boldSystemFontOfSize:[UIFont\
    \ smallSystemFontSize]];\n        self.label.textAlignment = NSTextAlignmentRight;\n\
    \        self.label.textColor = kLabelTextColor;\n        self.label.text = @\"\
    label\";\n        [self.contentView addSubview:self.label];\n\nself.textField\
    \ = [[UITextField alloc] initWithFrame:CGRectMake(93.0, 13.0, 170.0, 19.0)];\n\
    \        self.textField.backgroundColor = [UIColor clearColor];\n        self.textField.clearButtonMode\
    \ = UITextFieldViewModeWhileEditing;\n        self.textField.enabled = NO;\n \
    \       self.textField.font = [UIFont boldSystemFontOfSize:[UIFont systemFontSize]];\n\
    \        self.textField.text = @\"Title\";\n        [self.contentView addSubview:self.textField];\n\
    \    }\n    return self;\n}\n\n#pragma mark - Property Overrides\n\n- (id)value\n\
    {\n    return self.textField.text;\n}\n\n- (void)setValue:(id)newValue\n{\n  \
    \  if ([newValue isKindOfClass:[NSString class]])\n        self.textField.text\
    \ = newValue;\n    else\n        self.textField.text = [newValue description];\n\
    }\n\n@end\n```\n\nYou moved most of the `initWithStyle:reuseIdentifier:` code\
    \ from `SuperDBEditCell` to `SuperDBCell`. Note that you disabled the `textField`.\n\
    \n```objc\nself.textField.enabled = NO;\n```\n\nAlso, you did not declare `SuperDBCell`\
    \ to be the `textField` delegate. `SuperDBCell` does not have a `setEditing:animated:`\
    \ method; it doesn’t need one. The only reason `SuperDBEditCell` had one was to\
    \ enable and disable the `textField`.\n\nAs a result of the `SuperDBCell` implementation,\
    \ you need to change `SuperDBEditCell.m`. First, you update `initWithStyle:reuseIdentifier:`.\n\
    \n```objc\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
    \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
    \    if (self) {\n        // Initialization code\n        self.textField.delegate\
    \ = self;\n    }\n    return self;\n}\n```\n\nNext, you delete the `value` property\
    \ accessor and mutator. While you’re at it, you can delete the `#define` at the\
    \ top of the file, since you moved it to `SuperDBCell.m`.\n\nYour “refactoring”\
    \ is complete, but you still need to make some changes.\n\n## Editable Property\n\
    \nThe `SuperDB` app crashes when you try to save an edited Hero since it tries\
    \ to save the value in the Age cell. You want the `HeroDetailController`'s save\
    \ method to skip the Age cell when updating its Hero instance.\n\nYou could weave\
    \ some Core Data wizardry and ask the Hero instance to check if the cell’s attribute\
    \ key is transient or not. That seems like a lot of work just to know something\
    \ you can infer pretty reliably. Remember, you created the `SuperDBCell` class\
    \ to handle those fields that are uneditable (and probably don’t need to be updated).\
    \ So what you want is for `SuperDBCell` to return `YES` on some query and `SuperDBEditCell`\
    \ to return `NO` (or vice-versa). Let’s just define a method, `isEditable`, in\
    \ `SuperDBCell` to return `NO`. You’ll override the method in `SuperDBEditCell`\
    \ to return `YES`.\n\nAdd this to `SuperDBCell.h`:\n\n```objc\n- (BOOL)isEditable;\n\
    ```\n\nAnd its implementation to `SuperDBCell.m`:\n\n```objc\n#pragma mark - Instance\
    \ Methods\n\n- (BOOL)isEditable\n{\n    return NO;\n}\n```\n\nOverride the method\
    \ in `SuperDBEditCell.m`.\n\n```objc\n#pragma mark - SuperDBCell Overrides\n\n\
    - (BOOL)isEditable\n{\n    return YES;\n}\n```\n\nNow you need to use this method\
    \ in `HeroDetailController.m`. Update the appropriate code in the save method.\n\
    \n```objc\nfor (SuperDBEditCell *cell in [self.tableView visibleCells]) {\n  \
    \   if ([cell isEditable])\n         [self.hero setValue:[cell value] forKey:[cell\
    \ key]];\n}\n```\n\nFinally, you need to update your `HeroDetailConfiguration.plist`\
    \ to have the Age cell use `SuperDBCell`. Open `HeroDetailConfiguration.plist`\
    \ and navigate to Root ![image](images/arrow.jpg) sections ![image](images/arrow.jpg)\
    \ Item 1 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg) Item 2 ![image](images/arrow.jpg)\
    \ class, and change its value to `SuperDBCell`."
  raw: '*   *Rename*: Rename symbols so they indicate more clearly their purpose and
    make the source easier to read. Examples of symbols are the name of a class, method,
    or function. Unfortunately, methods declared in a protocol cannot be renamed.

    *   *Extract*: Extracts code you select in Xcode into a new method or function.

    *   *Create Superclass*: Defines a superclass for the class currently selected
    in Xcode.

    *   *Move Up*: Moves the selected method, property, or instance variable from
    a class to the superclass, provided both are defined in your project.

    *   *Move Down*: The opposite of Move Up, it moves the selected symbol from a
    class to a subclass, provided both are defined in your project.

    *   *Encapsulate*: Encapsulates an instance variable and create the appropriate
    accessors.

    *   *Convert to Objective-C ARC*: A tool to assist in converting legacy projects
    to use Automatic Reference Counting.

    *   *Convert to Modern Objective-C Syntax*: A tool to update code to use more
    modern Objective-C features like new Literals syntax (arrays, dictionaries, Booleans).


    This a just a brief introduction to the Refactor menu items to familiarize yourself
    with what’s available in Xcode for future projects. Let’s get back to the SuperDB
    app.


    You’re going to use the Create Superclass option. Open SuperDBEditCell.h, and
    highlight the class name, SuperDBEditCell, after the @interface declaration. Select
    Edit ![image](images/arrow.jpg) Refactor ![image](images/arrow.jpg) Create Superclass.
    Xcode should present a pop-up on what to call the superclass ([Figure 6-12](#9781430238072_Ch06.xhtml#Fig12)).
    Name the class SuperDBCell, select the “Create files for new superclass” option,
    and click Preview. You should see a File Merge pop-up that shows all the changes
    it will make to create the super class SuperDBCell ([Figure 6-13](#9781430238072_Ch06.xhtml#Fig13)).


    ![9781430238072_Fig06-12.jpg](images/9781430238072_Fig06-12.jpg)


    [Figure 6-12.](#9781430238072_Ch06.xhtml#_Fig12)  Create Superclass pop-up


    ![9781430238072_Fig06-13.jpg](images/9781430238072_Fig06-13.jpg)


    [Figure 6-13.](#9781430238072_Ch06.xhtml#_Fig13)  Refactoring file merge preview


    This particular preview doesn’t show much, other that the creation of the SuperDBCell
    interface and implementation files. Click Save. Xcode may ask if it should take
    a snapshot. Whether you use snapshots or not are up to you. We use them occasionally,
    but we prefer using a revision control system like Git.


    Moving Code Around


    Now, Xcode didn’t do everything you wanted. It did create the files for SuperDBCell,
    and it did make SuperDBEditCell a subclass of SuperDBCell, but it didn’t do much
    else. Remember you wanted to make SuperDBCell the same as SuperDBEditCell, but
    the textField wasn’t going to ever been enabled.


    Let’s start with the SuperDBCell interface file. You’re going to move most of
    SuperDBEditCell into SuperDBCell.


    ```

    #import <UIKit/UIKit.h>


    @interface SuperDBCell : UITableViewCell


    @property (strong, nonatomic) UILabel *label;

    @property (strong, nonatomic) UITextField *textField;


    @property (strong, nonatomic) NSString *key;

    @property (strong, nonatomic) id value;


    @property (strong, nonatomic) NSManagedObject *hero;


    @end

    ```


    As a result, SuperDBEditCell.h will change as well.


    ```

    #import <UIKit/UIKit.h>

    #import "SuperDBCell.h"


    @interface SuperDBEditCell : SuperDBCell <UITextFieldDelegate, UIAlertViewDelegate>


    - (IBAction)validate;


    @end

    ```


    Next, you adjust the SuperDBCell implementation.


    ```

    #import "SuperDBCell.h"


    #define kLabelTextColor [UIColor colorWithRed:0.321569f green:0.4f blue:0.568627f
    alpha:1.0f]


    @implementation SuperDBCell


    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            // Initialization code

            self.selectionStyle = UITableViewCellSelectionStyleNone;


    // TODO - use Auto Layout to adjust sizes

            self.label = [[UILabel alloc] initWithFrame:CGRectMake(12.0, 15.0, 67.0,
    15.0)];

            self.label.backgroundColor = [UIColor clearColor];

            self.label.font = [UIFont boldSystemFontOfSize:[UIFont smallSystemFontSize]];

            self.label.textAlignment = NSTextAlignmentRight;

            self.label.textColor = kLabelTextColor;

            self.label.text = @"label";

            [self.contentView addSubview:self.label];


    self.textField = [[UITextField alloc] initWithFrame:CGRectMake(93.0, 13.0, 170.0,
    19.0)];

            self.textField.backgroundColor = [UIColor clearColor];

            self.textField.clearButtonMode = UITextFieldViewModeWhileEditing;

            self.textField.enabled = NO;

            self.textField.font = [UIFont boldSystemFontOfSize:[UIFont systemFontSize]];

            self.textField.text = @"Title";

            [self.contentView addSubview:self.textField];

        }

        return self;

    }


    #pragma mark - Property Overrides


    - (id)value

    {

        return self.textField.text;

    }


    - (void)setValue:(id)newValue

    {

        if ([newValue isKindOfClass:[NSString class]])

            self.textField.text = newValue;

        else

            self.textField.text = [newValue description];

    }


    @end

    ```


    You moved most of the initWithStyle:reuseIdentifier: code from SuperDBEditCell
    to SuperDBCell. Note that you disabled the textField.


    ```

    self.textField.enabled = NO;

    ```


    Also, you did not declare SuperDBCell to be the textField delegate. SuperDBCell
    does not have a setEditing:animated: method; it doesn’t need one. The only reason
    SuperDBEditCell had one was to enable and disable the textField.


    As a result of the SuperDBCell implementation, you need to change SuperDBEditCell.m.
    First, you update initWithStyle:reuseIdentifier:.


    ```

    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            // Initialization code

            self.textField.delegate = self;

        }

        return self;

    }

    ```


    Next, you delete the value property accessor and mutator. While you’re at it,
    you can delete the #define at the top of the file, since you moved it to SuperDBCell.m.


    Your “refactoring” is complete, but you still need to make some changes.


    Editable Property


    The SuperDB app crashes when you try to save an edited Hero since it tries to
    save the value in the Age cell. You want the HeroDetailController’s save method
    to skip the Age cell when updating its Hero instance.


    You could weave some Core Data wizardry and ask the Hero instance to check if
    the cell’s attribute key is transient or not. That seems a lot work just to know
    something you can infer pretty reliably. Remember, you created the SuperDBCell
    class to handle those fields that are uneditable (and probably don’t need to be
    updated). So what you want is for SuperDBCell to return YES on some query and
    SuperDBEditCell to return NO (or vice-versa). Let’s just define a method, isEditable,
    in SuperDBCell to return NO. You’ll override the method in SuperDBEditCell to
    return YES.


    Add this to SuperDBCell.h:


    ```

    - (BOOL)isEditable;

    ```


    And its implementation to SuperDBCell.m:


    ```

    #pragma mark - Instance Methods


    - (BOOL)isEditable

    {

        return NO;

    }

    ```


    Override the method in SuperDBEditCell.m.


    ```

    #pragma mark - SuperDBCell Overrides


    - (BOOL)isEditable

    {

        return YES;

    }

    ```


    Now you need to use this method in HeroDetailController.m. Update the appropriate
    code in the save method.


    ```

    for (SuperDBEditCell *cell in [self.tableView visibleCells]) {

         if ([cell isEditable])

             [self.hero setValue:[cell value] forKey:[cell key]];

    }

    ```


    Finally, you need to update your HeroDetailConfiguration.plist to have the Age
    cell use SuperDBCell. Open HeroDetailConfiguration.plist and navigate to Root
    ![image](images/arrow.jpg) sections ![image](images/arrow.jpg) Item 1 ![image](images/arrow.jpg)
    rows ![image](images/arrow.jpg) Item 2 ![image](images/arrow.jpg) class, and change
    its value to SuperDBCell.'
  trans: "\n* **重命名**：重命名符号，使其更清晰地表明用途，并使源代码更易于阅读。符号的示例包括类、方法或函数的名称。不幸的是，在协议中声明的方法无法重命名。\n\
    * **提取**：将您在 Xcode 中选择的代码提取到一个新的方法或函数中。\n* **创建超类**：为当前在 Xcode 中选择的类定义一个超类。\n\
    * **上移**：将选定的方法、属性或实例变量从某个类移动到其超类，前提是两者都在您的项目中定义。\n* **下移**：与*上移*相反，它将选定的符号从某个类移动到其子类，前提是两者都在您的项目中定义。\n\
    * **封装**：封装一个实例变量并创建适当的访问器。\n* **转换为 Objective-C ARC**：一个用于帮助将遗留项目转换为使用自动引用计数的工具。\n\
    * **转换为现代 Objective-C 语法**：一个用于更新代码以使用更现代的 Objective-C 特性的工具，例如新的字面量语法（数组、字典、布尔值）。\n\
    \n这只是对“重构”菜单项的一个简要介绍，目的是让您熟悉 Xcode 中提供了哪些功能，以便用于将来的项目。让我们回到 `SuperDB` 应用。\n\n\
    您将要使用 *创建超类* 选项。打开 `SuperDBEditCell.h`，并高亮 `@interface` 声明后的类名 `SuperDBEditCell`。选择\
