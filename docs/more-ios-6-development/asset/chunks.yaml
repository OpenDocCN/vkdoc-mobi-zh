    Core Data with iCloud


    Using Core Data with iCloud is a fairly simple process. You place your persistent
    store in your application’s ubiquity container. However, you don’t want your persistent
    store to be synchronized with iCloud. That would create unnecessary overhead.
    Rather, you want to synchronize the transactions between applications. When another
    instance of your application receives the transaction data from iCloud, it reapplies
    every operation performed on the persistent store. This helps ensure that the
    different instances are updated with the same set of operations.


    Even though you don’t want to synchronize the persistent store with iCloud, Apple
    recommends that you place the data file in the ubiquity container within a folder
    with the extension .nosync. This tells iOS not to synchronize the contents of
    this folder but will keep the data associated with the correct iCloud account.


