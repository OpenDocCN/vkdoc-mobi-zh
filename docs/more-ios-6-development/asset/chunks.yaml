    \ a good idea.\n\nThe media picker controller’s delegate needs to conform to the\
    \ protocol `MPMediaPickerControllerDelegate`. This defines two methods: one that\
    \ is called if the user taps the Cancel button and another that is called if the\
    \ user chooses one or more songs.\n\n### Handling Media Picker Cancels\n\nIf,\
    \ after you present the media picker controller, the user hits the Cancel button,\
    \ the delegate method `mediaPickerDidCancel:` will be called. You must implement\
    \ this method on the media picker controller’s delegate, even if you don’t have\
    \ any processing that needs to be done when the user cancels, since you must dismiss\
    \ the modal view controller. Here is a minimal, but fairly standard, implementation\
    \ of that method:\n\n```objc\n- (void)mediaPickerDidCancel:(MPMediaPickerController\
    \ *)mediaPicker\n{\n    [self dismissModalViewControllerAnimated: YES];\n}\n```\n\
    \n### Handling Media Picker Selections\n\nIf the user selected one or more media\
    \ items using the media picker controller, then the delegate method `mediaPicker:didPickMediaItems:`\
    \ will be called. This method must be implemented, not only because it’s the delegate’s\
    \ responsibility to dismiss the media picker controller, but also because this\
    \ method is the only way to know which tracks your user selected. The selected\
    \ items are grouped in a media item collection.\n\nHere’s a very simple example\
    \ implementation of `mediaPicker:didPickMediaItems:` that assigns the returned\
    \ collection to one of the delegate’s properties:\n\n```objc\n- (void)mediaPicker:(MPMediaPickerController\
    \ *)mediaPicker         didPickMediaItems:(MPMediaItemCollection *)theCollection\n\
    {\n    [self dismissModalViewControllerAnimated: YES];\n    self.collection =\
    \ theCollection;\n}\n```\n\n## The Music Player Controller\n\nAs we discussed\
    \ before, there are two player controllers in the `MediaPlayer` framework: the\
    \ music player controller and movie player controller. We’ll get to the movie\
    \ player controller later. The music player controller allows you to play a queue\
    \ of media items by specifying either a media item collection or a media query.\
    \ As we stated earlier, the music player controller has no visual elements. It’s\
    \ an object that plays the audio. It allows you to manipulate the playback of\
    \ that audio by skipping forward or backward, telling it which specific media\
    \ item to play, adjusting the volume, or skipping to a specific playback time\
    \ in the current item.\n\nThe `MediaPlayer` framework offers two completely different\
    \ kinds of music player controllers: the iPod music player and the application\
    \ music player. The way you use them is identical, but there’s a key difference\
    \ in how they work. The iPod music player is the one that’s used by the Music\
    \ app; as is the case with those apps, when you quit your app while music is playing,\
    \ the music continues playing. In addition, when the user is listening to music\
    \ and starts up an app that uses the iPod music player, the iPod music player\
    \ will keep playing that music. In contrast, the application music player will\
    \ kill the music when your app terminates.\n\nThere’s a bit of a gotcha here in\
    \ that both the iPod and the application music player controllers can be used\
    \ at the same time. If you use the application music player controller to play\
    \ audio, and the user is currently listening to music, both will play simultaneously.\
    \ This may or may not be what you want to happen, so you will usually want to\
    \ check the iPod music player to see if there is music currently playing, even\
    \ if you actually plan to use the application music player controller for playback.\n\
    \n### Creating the Music Player Controller\n\nTo get either of the music player\
    \ controllers, use one of the factory methods on `MPMusicPlayerController`. To\
    \ retrieve the iPod music player, use the method `iPodMusicPlayer`, like so:\n\
    \n```objc\nMPMusicPlayerController *thePlayer = [MPMusicPlayerController iPodMusicPlayer];\n\
    ```\n\nRetrieving the application music player controller is done similarly, using\
    \ the `applicationMusicPlayer` method instead, like this:\n\n```objc\nMPMusicPlayerController\
    \ *thePlayer = [MPMusicPlayerController applicationMusicPlayer];\n```\n\n### Determining\
    \ If the Music Player Controller Is Playing\n\nOnce you create an application\
    \ music player, you’ll need to give it something to play. But if you grab the\
    \ iPod music player controller, it could very well already be playing something.\
    \ You can determine if it is by looking at the `playbackState` property of the\
    \ player. If it’s currently playing, it will be set to `MPMusicPlaybackStatePlaying`.\n\
    \n```objc\nif (player.playbackState == MPMusicPlaybackStatePlaying) {\n    //\
    \ playing\n}\n```\n\n### Specifying the Music Player Controller’s Queue\n\nThere\
    \ are two ways to specify the music player controller’s queue of audio tracks:\
    \ provide a media query or provide a media item collection. If you provide a media\
    \ query, the music player controller’s queue will be set to the media items returned\
    \ by the `items` property. If you provide a media item collection, it will use\
    \ the collection you pass as its queue. In either case, you will replace the existing\
    \ queue with the items in the query or collection you pass in. Setting the queue\
    \ will also reset the current track to the first item in the queue.\n\nTo set\
    \ the music player’s queue using a query, use the method `setQueueWithQuery:`.\
    \ For example, here’s how you would set the queue to all songs, sorted by artist:\n\
    \n```objc\nMPMusicPlayerController *player = [MPMusicPlayerController iPodMusicPlayer];\n\
    MPMediaQuery *artistsQuery = [MPMediaQuery artistsQuery];\n[player setQueueWithQuery:artistsQuery];\n\
    ```\n\nSetting the queue with a media item collection is accomplished with the\
    \ method `setQueueWithItemCollection:`, like so:"
