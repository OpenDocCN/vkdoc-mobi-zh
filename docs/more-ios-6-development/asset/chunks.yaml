    `Hero.h` 和 `Hero.m`，然后按 `Delete`，确保文件被移到废纸篓。然后返回，确保你的属性已在数据模型中正确创建，确保数据模型已保存，然后重新创建
    `Hero.h` 和 `Hero.m`。


