    One More Thing


    Run the app, and add a new hero. Enter Edit mode and clear out the Name field.
    Now tap on the Identity field. As expected, the validation alert dialog will appear.
    However, it will not display the proper failure reason ([Figure 6-19](#9781430238072_Ch06.xhtml#Fig19)).


    ![9781430238072_Fig06-19.jpg](images/9781430238072_Fig06-19.jpg)


    [Figure 6-19.](#9781430238072_Ch06.xhtml#_Fig19)  Validation dialog without a
    failure reason


    Looking back at the validate method in SuperDBCell.m, you see the message is populated
    like this:


    ```

    message =    [NSString

     stringWithFormat:NSLocalizedString(@"Validation error on: %@\rFailure Reason:
    %@",

                                                    @"Validation error on: %@, Failure
    Reason: %@)"),

                                  [userInfo valueForKey:@"NSValidationErrorKey"],

                                   [error localizedFailureReason]];

    ```


    The method call to the NSError instance


    ```

    [error localizedFailureReason]

    ```


    is returning nil. Prior to iOS 4, Core Data use to populate the localizedFailureReason.
    Since then, it doesn’t. You need to provide a simple fix for this that you can
    customize.


    NSError provides a method, code, that will return an integer error code. The value
    of this code is defined depending on the origination of the error.


    **Note**  To learn more about how NSError and error codes work, read The Error
    Handling Programming Guide at `https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/ErrorHandlingCocoa/ErrorHandling/ErrorHandling.html`.
    Specifically, read the chapter entitled “Error Objects, Domains, and Codes.”


    The error code you get here is defined in the Core Data header file, CoreDataErrors.h.


    **Note**  CoreDataError.h is documented by Apple at `https://developer.apple.com/library/ios/#documentation/Cocoa/Reference/CoreDataFramework/Miscellaneous/CoreData_Constants/Reference/reference.html`.


    You happen to know that the error code value you’re getting is 1670. This is assigned
    the enumeration of NSValidationStringTooShortError. You could put some logic to
    handle this specific error code, and you’d be set, but we did a little more work
    for you.


    Find the file CoreDataErrors.plist in the Book Downloads package. This is a simple
    plist file we’ve created that maps the Core Data error code to a simple error
    message. Add this file to the SuperDB project, making sure to make a copy.


    You could make a CoreDataError class to handle the loading of this plist, but
    you’ll take an easier route for expediency’s sake. First, declare a static dictionary
    at the top of SuperDBEditCell.m, right before the @implementation declaration.


    ```

    static NSDictionary *__CoreDataErrors;

    ```


    Populate this dictionary in the class initializer. This will go right after the
    @implementation declaration.


    ```

    + (void)initialize

    {

        NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@"CoreDataErrors"

                                                    withExtension:@"plist"];

        __CoreDataErrors = [NSDictionary dictionaryWithContentsOfURL:plistURL];

    }

    ```


    Now, you need to edit the validate method to use this dictionary. Find the line
    that begins with


    ```

    if ([[error domain] isEqualToString:@"NSCocoaErrorDomain"]) {

    ```


    and edit the if block to read


    ```

    if ([[error domain] isEqualToString:@"NSCocoaErrorDomain"]) {

                NSString *errorCodeStr = [NSString stringWithFormat:@"%d", [error
    code]];

                NSString *errorMessage = [__CoreDataErrors valueForKey:errorCodeStr];

                NSDictionary *userInfo = [error userInfo];

    message =     [NSString

    stringWithFormat:NSLocalizedString(@"Validation error on: %@\rFailure Reason:
    %@",

                                                    @"Validation error on: %@, Failure
    Reason: %@)"),

                                  [userInfo valueForKey:@"NSValidationErrorKey"],

                                   errorMessage];

    }

    ```


    Build and run the app. Erase the Hero’s name and try to move to another field.
    The validation alert dialog should look like [Figure 6-4](#9781430238072_Ch06.xhtml#Fig4).


    You can edit the string values in CoreDataErrors.plist to customize the error
    message however you like. Let’s hope Apple restores this functionality soon.


    Color Us Gone


    By now, you should have a good grasp on just how much power you gain from subclassing,
    and subclassing NSManagedObject specifically. You saw how to use it to do conditional
    defaulting and both single-field and multi-field validation. You also saw how
    to use custom managed objects to create virtual accessors. You saw how to politely
    inform your user when they’ve entered an invalid attribute that causes a managed
    object to fail validation, and you saw how to use transformable attributes and
    value transformers to store custom objects in Core Data.


    This was a dense chapter, but you should really be starting to get a feel for
    just how flexible and powerful Core Data can be. You’ve got one more chapter on
    Core Data before you move on to other parts of the iOS 6 SDK. When you’re ready,
    turn the page to learn about relationships and fetched properties.


    Chapter    7


    Relationships, Fetched Properties and Expressions


    Welcome to the final chapter on Core Data. So far, your application includes only
    a single entity, Hero. In this chapter, we’re going to show you how managed objects
    can incorporate and reference other managed objects through the use of relationships
    and fetched properties. This will give you the ability to make applications of
    much greater complexity than your current SuperDB application.


    That’s not the only thing you’re going to do in this chapter, however. You’re
    also going turn your HeroDetailController into a generic managed object controller.
    By making the controller code even more generic, you’ll make the controller subclasses
    smaller and easier to maintain. You’ll extend the configuration property list
    to allow you to define additional entity views.


    You have a lot to do in this chapter, so no dallying. Let’s get started.


    Expanding Your Application: Superpowers and Reports


    Before we talk about the nitty-gritty, let’s quickly look at the changes you’re
    going to make to the SuperDB application in this chapter. On the surface, the
    changes look relatively simple. You’ll add the ability to specify any number of
    superpowers for each hero, and also add a number of reports that show other superheroes
    that meet certain criteria, including heroes who are either younger or older than
    this hero, or who are the same sex or the opposite sex ([Figure 7-1](#9781430238072_Ch07.xhtml#Fig1)).


    ![9781430238072_Fig07-01.jpg](images/9781430238072_Fig07-01.jpg)


    [Figure 7-1.](#9781430238072_Ch07.xhtml#_Fig1)  At the end of this chapter, you’ll
    have added the ability to specify any number of superpowers for each hero, as
    well as provided a number of reports that let you find other heroes based on how
    they relate to this hero


    The powers will be represented by a new entity that you’ll create and imaginatively
    call Power. When users add or edit a power, they will be presented with a new
    view ([Figure 7-2](#9781430238072_Ch07.xhtml#Fig2)), but in reality, under the
    hood, it will be a new instance of the same object used to edit and display heroes.


    ![9781430238072_Fig07-02.jpg](images/9781430238072_Fig07-02.jpg)


    [Figure 7-2.](#9781430238072_Ch07.xhtml#_Fig2)  The new view for editing powers
    is actually an instance of the same object used to edit heroes


    When users drill down into one of the reports, they will get a list of the other
    heroes that meet the selected criteria ([Figure 7-3](#9781430238072_Ch07.xhtml#Fig3)).


