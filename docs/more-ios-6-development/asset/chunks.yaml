    \ Cocoa 相关的网站和教程链接。\n- [http://cocoaheads.org/](http://cocoaheads.org/)：CocoaHeads\
    \ 网站。CocoaHeads 是一个致力于同行支持和推广 Cocoa 的组织。它专注于定期举行会议的本地小组，Cocoa 开发者可以在此聚会并进行一些社交活动。没有什么比认识一个能帮助你的真人更好了，所以如果你所在地区有\
    \ CocoaHeads 小组，不妨去看看。如果没有，为什么不开创一个呢？\n- [http://cocoablogs.com/](http://cocoablogs.com)：一个门户网站，包含大量与\
    \ Cocoa 编程相关的博客链接。\n- [http://stackoverflow.com/questions/tagged/ios](http://stackoverflow.com/questions/tagged/ios)：免费编程问答网站中带有“iOS”标签的问题。总体而言，这是一个寻找问题答案的绝佳来源。许多经验丰富且知识渊博的\
    \ iPhone 程序员，包括一些在 Apple 工作的员工，都会通过回答问题或发布示例代码来贡献这个网站。\n- [http://www.quora.com/iOS-Development:](http://www.quora.com/iOS-Development)\
    \ 另一个优秀的问答网站。虽然不专注于编程，但这个标签用于 iOS 开发问题。\n\n## 博客\n\n查看这些博客：\n\n- [http://blog.kykim.com/](http://blog.kykim.com)：Kevin\
    \ 的博客，内容包罗万象，包括一些 iOS 开发信息。\n- [http://iphonedevelopment.blogspot.com/](http://iphonedevelopment.blogspot.com)：Jeff\
    \ 的 iPhone 开发博客。Jeff 发布了示例代码、教程以及其他 iPhone 开发者感兴趣的信息。\n- [http://davemark.com/](http://davemark.com)：Dave\
    \ 的“阳光小角落”。完全不技术，只是充满了 Dave 感兴趣的奇思妙想，他希望你也喜欢。\n- [http://nuthole.com/](http://nuthole.com/)：Jack\
    \ Nutting 的博客。\n- [http://theocacao.com:](http://theocacao.com) Scott Stevenson，一位经验丰富的\
    \ Cocoa 程序员。\n- [http://blog.wilshipley.com/](http://blog.wilshipley.com)：Wil\
    \ Shipley 的博客。Wil 是地球上最有经验的 Objective-C 程序员之一。他的“Pimp My Code”系列博文应被列为每个 Objective-C\
    \ 程序员的必读内容。\n- [http://rentzsch.tumblr.com/](http://rentzsch.tumblr.com)：Wolf\
    \ Rentzsch 的博客。Wolf 是一位经验丰富的独立 Cocoa 程序员，也是 C4 独立开发者大会的创始人。\n- [http://www.cimgf.com/](http://www.cimgf.com)：“Cocoa\
    \ Is My Girlfriend”网站，涵盖使用 Objective-C 进行 Mac 和 iPhone 上的软件开发。\n- [http://raywenderlich.com/](http://raywenderlich.com)：Ray\
    \ Wenderlich 的博客和教程网站。Ray 运营着一个提供补充教程和信息的优秀网站。\n\n## 如果所有方法都失败了……\n\n给 Kevin 发送电子邮件：[moreiphonedev@kykim.com](mailto:moreiphonedev@kykim.com)。\n\
    \n## 再会\n\n我们很高兴你能和我们一起踏上这段旅程。我们祝你一切顺利，并希望你像我们一样享受 iOS 编程。\n\n## 索引\n\n![images](images/square1.jpg)  **A**\n\
