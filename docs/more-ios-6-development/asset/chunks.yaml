- fmt: 'Let’s look at the [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2) again. Your
    detail view has two sections, so let’s configure the table view that way. Change
    the `Style` field from `Plain` to `Grouped`. Once that’s done, the `Separator`
    field should have changed itself to `Single Line Etched`. If not, make the change
    yourself. Next, you know the number of rows in each section; one and three, respectively.
    Since that number is fixed, you can change the `Content` field from `Dynamic Prototypes`
    to `Static Cells`. Again, the field right below the `Content` field automatically
    changed from `Prototype Cells` to `Sections`. You know the number of sections
    is two, so enter `2` in that field. Finally, you don’t want to have the cells
    highlight on selection, so change the `Selection` field to `No Selection`. The
    Attribute Inspector for the table view should look like [Figure 4-5](#9781430238072_Ch04.xhtml#Fig5).


    ![9781430238072_Fig04-05.jpg](images/9781430238072_Fig04-05.jpg)


    [Figure 4-5.](#9781430238072_Ch04.xhtml#_Fig5)  The final state of your table
    view attributes


    Your table view should have two sections of three cells each ([Figure 4-6](#9781430238072_Ch04.xhtml#Fig6)).
    Section one has too many cells. You only need one cell. Select the second cell
    in section one. It should highlight. Delete the cell (press the `Delete` key,
    or `Edit` ![image](images/arrow.jpg) `Delete`). Section one should now have two
    cells, with the bottom cell highlighted. Delete that cell, too.


    ![9781430238072_Fig04-06.jpg](images/9781430238072_Fig04-06.jpg)


    [Figure 4-6.](#9781430238072_Ch04.xhtml#_Fig6)  Table view


    Select the table view cell in the first section. Bring the Attribute Inspector
    up. Change the `Style` from `Custom` to `Left Detail`. Set the `Identifier` to
    `HeroDetailCell`. Finally, set the `Selection` to `None`. The Attribute Inspector
    should look like [Figure 4-7](#9781430238072_Ch04.xhtml#Fig7). Repeat the settings
    for the three table view cells in the second section.


    ![9781430238072_Fig04-07.jpg](images/9781430238072_Fig04-07.jpg)


    [Figure 4-7.](#9781430238072_Ch04.xhtml#_Fig7)  Table view cell’s attributes


    The second section needs a header label, `General`. Select the area right above
    or right below the three cells in the second section. The Attribute Inspector
    should change to table view section ([Figure 4-8](#9781430238072_Ch04.xhtml#Fig8)).
    In the `Header` field, enter `General`. Now the second section should have the
    correct header label.


    ![9781430238072_Fig04-08.jpg](images/9781430238072_Fig04-08.jpg)


    [Figure 4-8.](#9781430238072_Ch04.xhtml#_Fig8)  Table view section’s attributes


    By the way, notice that the first field in the table view section’s Attribute
    Inspector is `Rows`. You could have used this to change the first section’s row
    count from three to one.


    So your table view should look like [Figure 4-9](#9781430238072_Ch04.xhtml#Fig9).
    It looks like the layout is all set.


    ![9781430238072_Fig04-09.jpg](images/9781430238072_Fig04-09.jpg)


    [Figure 4-9.](#9781430238072_Ch04.xhtml#_Fig9)  Table view layout complete


    ## Wiring Up the Segue


    When the user taps on a cell in the `HeroListController`, you want the application
    to transition to your detail table view. Control-drag from the table view cell
    in the `HeroListController` to your detail table view ([Figure 4-10](#9781430238072_Ch04.xhtml#Fig10)).
    When the Segue pop-up appears ([Figure 4-11](#9781430238072_Ch04.xhtml#Fig11)),
    select `push` under the `Selection Segue` header.


    ![9781430238072_Fig04-10.jpg](images/9781430238072_Fig04-10.jpg)


    [Figure 4-10.](#9781430238072_Ch04.xhtml#_Fig10)  Control-drag to create the segue


    ![9781430238072_Fig04-11.jpg](images/9781430238072_Fig04-11.jpg)


    [Figure 4-11.](#9781430238072_Ch04.xhtml#_Fig11)  Segue pop-up selector


    Now you need to create your table view subclass in order to populate your detail
    table view cells.


    ## HeroDetailController


    Single-click the `SuperDB` group in the Navigation pane. Create a new file. In
    the New File Assistant, select `Objective-C subclass` and click `Next`. On the
    next screen, name the class `HeroDetailController`, making it a subclass of `UITableViewController`.
    Make sure that both the “Targeted for iPad” and “With XIB for user interface”
    are both unchecked. Click `Next`. Create the file.


    Moving on, select `SuperDB.storyboard`. In the storyboard editor, select your
    detail table view. Make sure the zoom level is set so you see three icons in the
    detail table view label. Select the table view controller icon, and bring up the
    Identity Inspector in the Utility pane. In the `Custom Class` section, change
    the `Class` field to `HeroDetailController`.


    One more thing. When you subclassed `UITableViewController`, Xcode gave your `HeroDetailController`
    implementations of table view data source and delegate methods. You don’t need
    them right now (but will later), so you’ll comment them out. Find the following
    methods


    ```

    - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView

    - (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section

    - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath
    *)indexPath

    ```


    and comment them out (method bodies, too).


    You’ve created your `HeroDetailController` and set your detail view controller
    in your storyboard to be an instance of `HeroDetailController`. Now you’ll create
    the property list that will define the table sections.


    ## Detail View Challenges


    The table view architecture was designed to efficiently present data stored in
    collections. For example, you might use a table view to display data in an `NSArray`
    or in a fetched results controller. When you’re creating a detail view, however,
    you’re typically presenting data from a single object, in this case an instance
    of `NSManagedObject` that represents a single superhero. A managed object uses
    key-value coding but has no mechanism to present its attributes in a meaningful
    order. For example, `NSManagedObject` has no idea that the `name` attribute is
    the most important one or that it should be in its own section the way it is in
    [Figure 4-2](#9781430238072_Ch04.xhtml#Fig2).


    Coming up with a good, maintainable way to specify the sections and rows in a
    detail editing view is a non-trivial task. The most obvious solution, and one
    you’ll frequently see in online sample code, uses an `enum` to list the table
    sections, followed by additional `enum`s for each section, containing constants
    and a count of rows for each section, like so:


    ```

    enum HeroEditControllerSections {

        HeroEditControllerSectionName = 0,

        HeroEditControllerSectionGeneral,

        HeroEditControllerSectionCount

    };

    enum HeroEditControllerNameSection {

        HeroEditControllerNameRow = 0,

        HeroEditControllerNameSectionCount

    };

    enum HeroEditControllerGeneralSection {

        HeroEditControllerGeneralSectionSecretIdentityRow,

        HeroEditControllerGeneralSectionBirthdateRow,

        HeroEditControllerGeneralSectionSexRow,

        HeroEditControllerGeneralSectionCount

    };

    ```


    Then, in every method where you are provided with an index path, you can take
    the appropriate action based on the row and section represented by the index path,
    using `switch` statements, like this:'
