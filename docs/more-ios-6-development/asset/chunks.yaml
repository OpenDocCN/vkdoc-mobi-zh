    Mutex Locks and @synchronized


    A mutex lock is a mechanism used to ensure that while a piece of code is firing,
    other threads can’t fire that same piece of code or related code. The term “mutex”
    is a portmanteau of the words “mutual” and “exclusion” and, as you might suspect
    based on that, locks are essentially a way to specify that only one thread can
    execute particular sections of code at a given time.


    Originally, locks were always implemented using the class NSLock. Although NSLock
    is still available, there’s now a language-level feature for locking down segments
    of code: @synchronized blocks.


    If you wrap a section of code in a @synchronized block, that code can only fire
    on one thread at a time. Here’s an example of a @synchronized block:


    ```

    @synchronized(self) {

        person.firstName = @"Samantha";

        person.lastName = @"Stephens";

    }

    ```


    Notice that after the @synchronize keyword, there’s a value in parentheses: self.
    This argument is called a *mutual exclusion semaphore* or a *mutex*. To understand
    semaphores in the context of concurrency, the best real-world metaphor is the
    bathroom key you might find in some small gas stations. There’s a single key to
    the bathroom, usually attached to a large keychain. Only the person who has the
    key can use the bathroom. If there’s only one key, it’s a mutual exclusion semaphore
    or mutex, because only one person can use the bathroom at a time.


    @synchronize works pretty much the same way. When a thread gets to a synchronized
    block of code, it will check to see if anyone else is using the mutex, which is
    to say, if any other synchronized chunks of code that take the same semaphore
    are currently executing. If they are, then the thread will *block* until no other
    code is using that semaphore. A thread that is blocked is not executing any code.
    When the mutex becomes available, the thread will unblock and execute the synchronized
    code.


    This is the main mechanism you’ll use in Cocoa Touch to avoid race conditions
    and to make your objects *thread safe*.


    Atomicity and Thread Safety


    Throughout *Beginning iOS 6 Development* (Apress), and up until now in this book,
    we’ve always had you use the nonatomic keyword when declaring properties. We’ve
    never fully explained what nonatomic does, we just said that atomic properties
    added overhead that we didn’t need. A good chunk of the overhead we were referring
    to is mutex locking. When you don’t specify nonatomic, the accessors and mutators
    get created as if the @synchronized keyword was used with self as the mutex. Now,
    the exact form of the mutator and accessor methods varies depending on the other
    keywords and the property’s datatype, but here’s a simple example of what a nonatomic
    accessor might look like:


    ```

    - (NSMutableString *)foo {

        return foo;

    }

    ```


    As a contrast, here’s what the atomic version might look like:


    ```

    - (NSMutableString *)foo {

        NSString *ret;

        @synchronized(self) {

            ret = foo;

        }

        return ret;

    }

    ```


    Here’s what the atomic version does that the nonatomic doesn’t do: it uses self
    as a mutex around all the code except the return statement and variable declaration.
    This means that no other code that uses self as a mutex can run while the next
    line of code is executing. All atomic accessors and mutators block when any other
    atomic accessor or mutator on the same object is executing on another thread.
    This helps to ensure data integrity.


    When we declare a property to be nonatomic, we’re removing these protections because,
    for some reason, we don’t think we need them. So far, this has always been fine
    because we’ve only been accessing and setting object properties from the main
    thread. For outlets, it’s still the case that you can pretty much always declare
    them nonatomic, because you shouldn’t use outlets on threads other than the main
    thread. Most of the UIKit is not thread-safe, which means it’s generally not safe
    to set or retrieve values from threads other than the main thread.


    But, if you’re creating objects that are used in threads or in operation queues,
    then you almost certainly want to leave off the nonatomic keyword because the
    protection from atomic properties is valuable enough to offset the small amount
    of overhead.


    It’s important to note, however, that there’s a difference between the concepts
    of atomicity and thread safety, and the fact that you’ve used atomic properties
    does not make your class thread-safe. In some simple cases, having atomic properties
    may be all that an object needs to be thread-safe, but thread-safety is an object-level
    trait. In the earlier example with the Person object, removing the nonatomic keyword
    from the two properties would not make the object thread-safe because the problem
    we illustrated earlier could still happen. You could still have one thread reading
    the object after firstName had been changed, but before lastName had been changed.
    To make the object truly “thread-safe,” you’d need to not just synchronize the
    individual accessors and mutators, but also any transaction involving dependent
    data. In this case, you would need to synchronize code that sets the first and
    last name so that other code accessing either firstName or lastName would block
    until the transaction was finished.


    The example that demonstrated @synchronized a few pages back shows an excellent
    way to ensure that the transaction is atomic. You need to lock down the transaction
    to make sure that no other code can read either value until both have been changed.
    In the Person class, you might consider adding a method called something like
    setFirstName:lastName: to synchronize the entire transaction, like this:


    ```

    - (void)setFirstName:(NSString *)inFirst lastName:(NSString *)inLast {

        @synchronized (self) {

            self.firstName = inFirst;

            self.lastName = inLast;

        }

    }

    ```'
  trans: "```objc\n@property (nonatomic, strong) NSString *firstName;\n@property (nonatomic,\
    \ strong) NSString *lastName;\n\n@end\n```\n\n如果 `Person` 的实例被多个线程访问，可能会出现问题。例如，假设该实例在一个线程中被更新，同时在另一个线程中被读取。进一步假设，第一个更新对象的线程正在同时修改\
    \ `firstName` 和 `lastName`。为便于讨论，假设有一个名为 `person` 的 `Person` 实例，其初始 `firstName`\
    \ 值为 `George`，`lastName` 值为 `Washington`。第一个线程中执行的代码将 `firstName` 和 `lastName`\
    \ 同时改为新值，如下所示：\n\n```\nperson.firstName = @\"Manny\";\nperson.lastName = @\"Sullivan\"\
    ;\n```\n\n与此同时，另一个线程正在从 `person` 读取值：\n\n```\nNSLog(@\"Now processing %@ %@.\"\
    , person.firstName, person.lastName);\n```\n\n如果第二个线程的 `NSLog()` 语句恰好在第一个线程两次赋值之间执行，结果将显示为：\n\
    \n```\nNow processing Manny Washington.\n```\n\n实际上并不存在 Manny Washington 这个人。只有\
    \ George Washington 和 Manny Sullivan。然而，对于第二个线程的 `NSLog()` 语句而言，`person` 此时表示的是\
    \ Manny Washington。\n\n操作队列并不能消除竞态条件问题，因此对此保持警惕至关重要。有时，你可以为每个线程分配共享资源（例如某个对象或数据块）的独立副本，而不是让多个线程同时访问该共享资源。这可以确保一个线程不会在竞争线程的干扰下意外修改资源。当然，创建多个数据副本会带来一些额外开销。然而，复制资源通常并非可行方案，因为你可能需要获取当前值，而非线程启动时的旧值。在这种情况下，你需要采取额外措施来确保数据完整性并避免竞态条件。避免竞态条件的主要工具是*互斥锁*。\n\
    \n## 互斥锁与 `@synchronized`\n\n互斥锁是一种机制，用于确保当一段代码正在执行时，其他线程无法执行同一段代码或相关代码。术语 *mutex*\
    \ 是 *mutual*（互斥）和 *exclusion*（排他）的合成词，正如你由此推测的，锁本质上是一种指定在给定时间内只有一个线程能执行特定代码段的方式。\n\
    \n最初，锁总是通过 `NSLock` 类来实现。虽然 `NSLock` 仍可使用，但现在有了一种语言级别的特性来锁定代码段：`@synchronized`\
    \ 块。\n\n如果将一段代码包裹在 `@synchronized` 块中，该代码在任意时刻只能在一个线程上执行。以下是 `@synchronized` 块的示例：\n\
    \n```\n@synchronized(self) {\n    person.firstName = @\"Samantha\";\n    person.lastName\
    \ = @\"Stephens\";\n}\n```\n\n请注意，在 `@synchronize` 关键字之后，括号内有一个值：`self`。这个参数称为*互斥信号量*或*互斥锁*。要理解并发环境中的信号量，最好的现实比喻就是小加油站里常见的卫生间钥匙。卫生间只有一把钥匙，通常拴在一个大钥匙环上。只有持有钥匙的人才能使用卫生间。由于只有一把钥匙，因此它就是一个互斥信号量或互斥锁，因为一次只有一个人能使用卫生间。\n\
    \n`@synchronize` 的工作原理与此非常相似。当某个线程到达一个同步代码块时，它会检查是否有其他线程正在使用该互斥锁，即是否有其他使用相同信号量的同步代码段正在执行。如果是，该线程将*阻塞*，直到没有其他代码使用该信号量为止。被阻塞的线程不会执行任何代码。当互斥锁变为可用时，线程将解除阻塞并执行同步代码。\n\
    \n这是在 Cocoa Touch 中避免竞态条件并使对象*线程安全*的主要机制。\n\n## 原子性与线程安全\n\n在《Beginning iOS 6\
    \ Development》（Apress）以及本书到目前为止的内容中，我们一直要求你在声明属性时使用 `nonatomic` 关键字。我们从未完全解释过\
    \ `nonatomic` 的作用，只是说明原子属性会带来我们不需要的额外开销。这里所指的大部分开销正是互斥锁定。当你不指定 `nonatomic` 时，访问器和修改器的创建效果就如同使用了\
    \ `@synchronized` 关键字并以 `self` 作为互斥锁。访问器和修改器的具体形式会因其他关键字和属性的数据类型而异，但以下是 `nonatomic`\
    \ 访问器的一个简单示例：\n\n```\n- (NSMutableString *)foo {\n    return foo;\n}\n```\n\n\
    作为对比，`atomic` 版本的访问器可能如下所示：\n\n```\n- (NSMutableString *)foo {\n    NSString *ret;\n\
    \    @synchronized(self) {\n        ret = foo;\n    }\n    return ret;\n}\n```\n\
    \n`atomic` 版本相比 `nonatomic` 版本多做了以下事情：它将 `self` 作为互斥锁，包裹了除 `return` 语句和变量声明之外的其余代码。这意味着，当下一行代码正在执行时，任何其他以\
    \ `self` 作为互斥锁的代码都无法运行。所有 `atomic` 访问器和修改器会在其他线程对同一对象执行其他 `atomic` 访问器或修改器时阻塞。这有助于确保数据完整性。\n\
    \n当我们声明一个属性为 `nonatomic` 时，我们移除了这些保护措施，因为出于某种原因，我们认为不需要它们。到目前为止，这始终没问题，因为我们只从主线程访问和设置对象属性。对于插座变量（outlets），仍然可以几乎总是将它们声明为\
    \ `nonatomic`，因为你不应在主线程以外的线程上使用插座变量。大部分 UIKit 不是线程安全的，这意味着通常不宜在主线程以外的线程上设置或获取值。\n\
    \n但是，如果你正在创建用于线程或操作队列的对象，那么几乎肯定应该省略 `nonatomic` 关键字，因为原子属性提供的保护价值足以抵消少量额外开销。\n\
    \n不过，务必注意，原子性与线程安全这两个概念存在区别，使用原子属性并不意味着你的类就是线程安全的。在某些简单情况下，原子属性可能足以使对象实现线程安全，但线程安全性是对象级别的特性。在前面\
    \ `Person` 对象的示例中，从两个属性中移除 `nonatomic` 关键字并不会使对象变得线程安全，因为我们之前说明的问题仍然可能发生。你仍然可能遇到一个线程在\
    \ `firstName` 被修改后、`lastName` 被修改前读取对象的情况。要使对象真正*线程安全*，不仅需要同步各个访问器和修改器，还需要同步任何涉及依赖数据的操作。在这种情况下，你需要同步设置名字和姓氏的代码，以便其他访问\
    \ `firstName` 或 `lastName` 的代码会阻塞，直到该操作完成。\n\n前几页展示的 `@synchronized` 示例充分说明了如何确保操作的原子性。你需要锁定整个操作，以确保在两个值都修改完成之前，没有其他代码能读取其中任何一个值。在\
    \ `Person` 类中，你可以考虑添加一个类似 `setFirstName:lastName:` 的方法来同步整个操作，如下所示：\n\n```\n-\
    \ (void)setFirstName:(NSString *)inFirst lastName:(NSString *)inLast {\n    @synchronized\
    \ (self) {\n        self.firstName = inFirst;\n        self.lastName = inLast;\n\
    \    }\n}\n```"
- fmt: '注意你使用了修改器方法来设置`first`和`last`名称，尽管这些修改器是原子性的，意味着该修改器中的代码也会被同步。这是可以的，因为`@synchronized`被称为*递归互斥锁*，这意味着只要两个同步块共享同一个互斥锁，一个同步块可以安全地调用另一个同步块。


    然而，如果两个同步块不使用同一个互斥锁，你绝对不应该在一个同步块中调用另一个同步块。这样做会带来一种称为*死锁*的风险。


    **提示** Apple 的 API 文档会告诉你一个类是否是线程安全的。如果 API 文档没有就此主题给出任何说明，那么你应该认为该类**不**是线程安全的。


    ## 死锁


    有时解决方案本身也有问题，而互斥锁作为并发中竞态条件的主要解决方案，确实有一个很大的自身问题，即*死锁*。当一个线程阻塞并等待一个永远无法满足的条件时，就会发生死锁。例如，如果两个线程各自都有同步代码，而这些同步代码调用了另一个线程上的同步代码，就可能发生死锁。如果两个线程都持有一个互斥锁，并且都在等待对方线程持有的那个互斥锁，那么这两个线程都将永远无法继续执行。它们将永远阻塞。


    对于死锁场景，没有简单的解决方案，但有一个非常好的经验法则可以帮助你避免死锁：永远不要让一个同步代码块调用另一个使用不同互斥锁的同步代码块。


    如果你发现自己需要调用一个包含同步代码的方法或函数，你可能需要在同步块内实际复制该方法中的代码，而不是调用另一个方法。这似乎违背了我们在本书中一直强调的代码不应被不必要地复制的理念。然而，如果你在必要时没有复制代码，而是尝试从同步代码中调用同步代码，你可能会陷入死锁。


    ## 休眠时间


    如果执行的线程过多，系统可能会变得不堪重负。这在仅有单核单 CPU 的旧款 iPhone 上尤其如此。即使你使用了线程，如果你在过多的线程中尝试处理过多的任务，你的用户界面也可能开始卡顿或响应缓慢。当然，一个解决方案是产生更少的线程。这正是`NSOperationQueue`可以为你处理的事情，稍后你将看到。


    线程（以及扩展而来的操作）还有另一件事可以做，以帮助保持应用程序的响应性，那就是*休眠*。线程可以选择休眠一段设定的时间间隔，或者休眠直到某个时间点。如果一个线程休眠，它会阻塞直到休眠结束，这将把处理器周期让给其他线程。在线程或操作中放置休眠调用本质上就是对其进行节流，使其变慢，以确保主线程有足够的处理器时间。


    要使你的代码正在执行的线程休眠，你可以使用`NSThread`类上的两个类方法之一。要休眠指定的秒数，你可以使用`sleepForTimeInterval:`方法。例如，要休眠两秒半，你可以这样做：


    ```

    [NSThread sleepForTimeInterval:2.5];

    ```


    要休眠直到一个由`NSDate`实例表示的特定日期和时间，你可以使用`sleepUntilDate:`。因此，上面的例子可以重写如下：


    ```

    [NSThread sleepUntilDate:[NSDate dateWithTimeIntervalSinceNow:2.5]];

    ```


    请注意，你永远、永远（我们真的是说永远）不要在主线程上使用这两种休眠方法（或它们的 pthreads API 对应方法）。为什么？因为主线程是唯一处理事件和更新用户界面的线程。如果你让主线程休眠，你的界面就会直接停止。


    ## 操作


    我们稍后会讨论操作队列，但在此之前，你需要了解操作——操作是包含操作队列所要管理的一系列指令的对象。操作通常采用`NSOperation`的自定义子类的形式。你编写子类，并在其中放入需要并发运行的代码。


    **注意** `NSOperation`有两个子类，`NSInvocationOperation`和`NSBlockOperation`，它们允许你在不创建自己的`NSOperation`子类的情况下并发运行代码。`NSInvocationOperation`允许你指定一个对象和选择器作为操作的基础。`NSBlockOperation`允许你指定一个或多个块作为操作的基础。然而，除了最简单的情况外，你通常希望继承`NSOperation`，因为这样做可以让你对过程有更多的控制。


    在实现一个用于操作队列的操作时，你需要遵循几个步骤。首先，创建一个`NSOperation`的子类，并定义你需要的任何作为输入或输出的属性。在你的平方根示例中，你将创建一个`NSOperation`的子类，并为其定义`current`和`max`属性。


    你需要做的另一件事是重写名为`main`的方法，你可以在其中放置构成操作的代码。在你的`main`方法中，你需要做几件事。第一件事是将你的所有逻辑包装在一个`@try`块中，以便你能捕获任何异常。操作的主方法不抛出任何异常是非常重要的。异常必须被捕获并处理，而不能被重新抛出。操作中未捕获的异常将导致致命的应用程序崩溃。


    在`main`中你需要做的第二件事是创建一个新的自动释放池。不同的线程不能共享同一个自动释放池。操作将在单独的线程中运行，因此它不能使用主线程的自动释放池，所以分配一个新的自动释放池很重要。


    以下是一个`NSOperation`子类的骨架`main`方法的样子：


    ```

    - (void)main {

        @try {

            @autoreleasepool {

     // 在这里完成工作...

            }

        }

        @catch (NSException * e) {

            // 重要的是我们在这里不要重新抛出异常

            NSLog(@"Exception: %@", e);

        }

    }

    ```


    ### 操作依赖


    任何操作都可以有一个或多个依赖。依赖是另一个`NSOperation`实例，它必须在这个操作能够执行之前完成。操作队列知道不要运行那些尚未完成依赖的操作。你可以使用`addDependency:`方法向操作添加依赖，如下所示：


    ```

    MyOperation *firstOperation = [[MyOperation alloc] init];

    MyOperation *secondOperation = [[MyOperation alloc] init];

    [secondOperation addDependency:firstOperation];

    ...

    ```


    在这个例子中，如果`firstOperation`和`secondOperation`同时被添加到队列中，它们将不会并发运行，即使队列有可用的线程同时运行这两个操作。因为`firstOperation`是`secondOperation`的一个依赖，`secondOperation`将不会开始执行，直到`firstOperation`完成。


    你可以使用`dependencies`方法获取操作的依赖数组。


    ```

    NSArray *dependencies = [secondOperation dependencies];

    ```


    你可以使用`removeDependency:`方法移除依赖。要从`secondOperation`中移除`firstOperation`作为依赖，你可以这样做：


    ```

    [secondOperation removeDependency:firstOperation];

    ```


    ### 操作优先级


    每个操作都有一个优先级，队列使用它来决定哪个操作何时运行，并且它决定了这个操作将获得多少可用处理资源。你可以使用`setQueuePriority:`方法设置队列的优先级，传入以下值之一：'
  raw: 'Notice that you’ve used mutator methods to set first and last name, even though
    those mutators are atomic, which means the code in that mutator will also by synchronized.
    This is okay, because @synchronized is what’s called a *recursive mutex*, which
    means that a synchronized block can call another synchronized block safely as
    long as the two blocks share the same mutex.


    However, you never want to call a synchronized block from within another synchronized
    block if they don’t use the same mutex. Doing so puts you at risk of a situation
    known as a *deadlock*.


    **Tip**  Apple’s API documentation will tell you if a class is thread-safe. If
    the API documentation doesn’t say anything on the topic, then you should assume
    that the class is **not** thread-safe.


    Deadlocks


    Sometimes solutions have their own problems, and mutex locks, which are the primary
    solution to race conditions in concurrency, indeed have a very big problem of
    their own, which is known as a *deadlock*. A deadlock occurs when a thread blocks
    and then waits for a condition that can never be met. This can happen, for example,
    if two threads each have synchronized code that calls synchronized code on the
    other thread. If both threads are using one mutex and waiting for the one the
    other thread has, neither thread will ever be able to continue. They will block
    forever.


    There’s no simple solution to deadlock scenarios, but one really good rule of
    thumb that will help you avoid deadlocks is never to have a synchronized block
    of code call another synchronized block of code that uses a different mutex.


    If you find yourself needing to call a method or function with synchronized code
    in it, you may need to actually replicate the code from that method inside the
    synchronized block instead of calling the other method. This seems to violate
    the idea we’ve been pounding throughout this book that code shouldn’t be unnecessarily
    duplicated. However, if you don’t duplicate the code when necessary and attempt
    to call synchronized code from synchronized code, you could end up deadlocked.


    Sleepy Time


    If too many threads are executing, the system can get bogged down. This is especially
    true on older iPhones that have only a single CPU with a single core. Even if
    you’re using threads, your user interface can start to skip or respond slowly
    if you’re trying to do too much in too many threads. One solution to this, of
    course, is to spawn fewer threads. This is something that NSOperationQueue can
    actually handle for you, as you’ll see in a few moments.


    There’s another thing that threads (and by extension operations) can do to help
    keep your application responsive, which is to *sleep*. A thread can choose to
    sleep either for a set interval or until a set point in time. If a thread sleeps,
    it blocks until it’s done sleeping, which yields processor cycles to the other
    threads. Putting sleep calls in a thread or operation essentially throttles it,
    slowing it down to make sure that there’s plenty of processor time available for
    the main thread.


    To cause the thread where your code is executing to sleep, you can use one of
    two class methods on the class NSThread. To sleep for a specified number of seconds,
    you use the method sleepForTimeInterval:. So, for example, to sleep for two and
    a half seconds, you do this:


    ```

    [NSThread sleepForTimeInterval:2.5];

    ```


    To sleep until a specific date and time represented by an instance of NSDate,
    you could alternatively use sleepUntilDate:. As a result, the previous example
    could be rewritten like this:


    ```

    [NSThread sleepUntilDate:[NSDate dateWithTimeIntervalSinceNow:2.5]];

    ```


    Note that you should never, ever (and we really mean never) use either of these
    sleep methods (or their pthreads API counterparts) on the main thread. Why? The
    main thread is the only thread that handles events and can update the user interface.
    If you put the main thread to sleep, your interface will just plain stop.


    Operations


    We’re going to look at operation queues in a moment, but before we do that, you
    need to know about operations, which are the objects that contain the sets of
    instructions that the operation queue manages. Operations usually take the form
    of custom subclasses of NSOperation. You write the subclass and, in it, you put
    the code that needs to be run concurrently.


    **Note**  There are two subclasses of NSOperation, NSInvocationOperation and NSBlockOperation,
    that will allow you to run code concurrently without creating your own subclasses
    of NSOperation. NSInvocationOperation allows you to specify an object and selector
    to use as the basis for the operation. NSBlockOperation allows you specify one
    or more blocks to use as the basis for the operation. In all but the simplest
    cases, however, you will want to subclass NSOperation because doing so gives you
    a lot more control over the process.


    When implementing an operation for use in an operation queue, there are a few
    steps you need to take. First, you create a subclass of NSOperation and define
    any properties that you’ll need as inputs or outputs from the operation. In your
    square root example, you will create a subclass of NSOperation and define properties
    for current and max on it.


    The only other thing you have to do is to override the method called main, which
    is where you put the code that makes up the operation. There are a couple of things
    you need to do in your main method. The first thing you need to do is wrap all
    of your logic in a @try block so you can catch any exceptions. It’s very important
    that an operation’s main method not throw any exceptions. They must be caught
    and handled without being rethrown. An uncaught exception in an operation will
    result in a fatal application crash.


    The second thing you have to do in main is to create a new autorelease pool. Different
    threads cannot share the same autorelease pool. The operation will be running
    in a separate thread, so it can’t use the main thread’s autorelease pool, so it’s
    important to allocate a new one.


    Here’s what a skeleton main method for an NSOperation subclass looks like:


    ```

    - (void)main {

        @try {

            @autoreleasepool {

     // Do work here...

            }

        }

        @catch (NSException * e) {

            // Important that we don''t re-throw exception here

            NSLog(@"Exception: %@", e);

        }

    }

    ```


    Operation Dependencies


    Any operation can optionally have one or more dependencies. A dependency is another
    instance of NSOperation that has to complete before this operation can be executed.
    An operation queue will know not to run an operation that has dependencies that
    have not yet finished. You can add dependencies to an operation using the addDependency:
    method, like so:


    ```

    MyOperation *firstOperation = [[MyOperation alloc] init];

    MyOperation *secondOperation = [[MyOperation alloc] init];

    [secondOperation addDependency:firstOperation];

    ...

    ```


    In this example, if both firstOperation and secondOperation are added to a queue
    at the same time, they will not be run concurrently even if the queue has free
    threads available for both operations. Because firstOperation is a dependency
    of secondOperation, secondOperation will not start executing until firstOperation
    has finished.


    You can get an array of an operation’s dependencies by using the dependencies
    method.


    ```

    NSArray *dependencies = [secondOperation dependencies];

    ```


    You can remove dependencies using the removeDependency: method. To remove the
    firstOperation as a dependency from secondOperation, you would do this:


    ```

    [secondOperation removeDependency:firstOperation];

    ```


    Operation Priority


    Every operation has a priority that the queue uses to decide which operation gets
    run when and that dictates how much of the available processing this operation
    will get to use. You can set a queue’s priority using the setQueuePriority: method,
    passing in one of the following values:'
  trans: "\n注意你使用了修改器方法来设置`first`和`last`名称，尽管这些修改器是原子性的，意味着该修改器中的代码也会被同步。这是可以的，因为`@synchronized`被称为*递归互斥锁*，这意味着只要两个同步块共享同一个互斥锁，一个同步块可以安全地调用另一个同步块。\n\
    \n然而，如果两个同步块不使用同一个互斥锁，你绝对不应该在一个同步块中调用另一个同步块。这样做会带来一种称为*死锁*的风险。\n\n**提示** Apple\
    \ 的 API 文档会告诉你一个类是否是线程安全的。如果 API 文档没有就此主题给出任何说明，那么你应该认为该类**不**是线程安全的。\n\n## 死锁\n\
    \n有时解决方案本身也有问题，而互斥锁作为并发中竞态条件的主要解决方案，确实有一个很大的自身问题，即*死锁*。当一个线程阻塞并等待一个永远无法满足的条件时，就会发生死锁。例如，如果两个线程各自都有同步代码，而这些同步代码调用了另一个线程上的同步代码，就可能发生死锁。如果两个线程都持有一个互斥锁，并且都在等待对方线程持有的那个互斥锁，那么这两个线程都将永远无法继续执行。它们将永远阻塞。\n\
    \n对于死锁场景，没有简单的解决方案，但有一个非常好的经验法则可以帮助你避免死锁：永远不要让一个同步代码块调用另一个使用不同互斥锁的同步代码块。\n\n如果你发现自己需要调用一个包含同步代码的方法或函数，你可能需要在同步块内实际复制该方法中的代码，而不是调用另一个方法。这似乎违背了我们在本书中一直强调的代码不应被不必要地复制的理念。然而，如果你在必要时没有复制代码，而是尝试从同步代码中调用同步代码，你可能会陷入死锁。\n\
    \n## 休眠时间\n\n如果执行的线程过多，系统可能会变得不堪重负。这在仅有单核单 CPU 的旧款 iPhone 上尤其如此。即使你使用了线程，如果你在过多的线程中尝试处理过多的任务，你的用户界面也可能开始卡顿或响应缓慢。当然，一个解决方案是产生更少的线程。这正是`NSOperationQueue`可以为你处理的事情，稍后你将看到。\n\
    \n线程（以及扩展而来的操作）还有另一件事可以做，以帮助保持应用程序的响应性，那就是*休眠*。线程可以选择休眠一段设定的时间间隔，或者休眠直到某个时间点。如果一个线程休眠，它会阻塞直到休眠结束，这将把处理器周期让给其他线程。在线程或操作中放置休眠调用本质上就是对其进行节流，使其变慢，以确保主线程有足够的处理器时间。\n\
    \n要使你的代码正在执行的线程休眠，你可以使用`NSThread`类上的两个类方法之一。要休眠指定的秒数，你可以使用`sleepForTimeInterval:`方法。例如，要休眠两秒半，你可以这样做：\n\
    \n```\n[NSThread sleepForTimeInterval:2.5];\n```\n\n要休眠直到一个由`NSDate`实例表示的特定日期和时间，你可以使用`sleepUntilDate:`。因此，上面的例子可以重写如下：\n\
    \n```\n[NSThread sleepUntilDate:[NSDate dateWithTimeIntervalSinceNow:2.5]];\n\
    ```\n\n请注意，你永远、永远（我们真的是说永远）不要在主线程上使用这两种休眠方法（或它们的 pthreads API 对应方法）。为什么？因为主线程是唯一处理事件和更新用户界面的线程。如果你让主线程休眠，你的界面就会直接停止。\n\
    \n## 操作\n\n我们稍后会讨论操作队列，但在此之前，你需要了解操作——操作是包含操作队列所要管理的一系列指令的对象。操作通常采用`NSOperation`的自定义子类的形式。你编写子类，并在其中放入需要并发运行的代码。\n\
    \n**注意** `NSOperation`有两个子类，`NSInvocationOperation`和`NSBlockOperation`，它们允许你在不创建自己的`NSOperation`子类的情况下并发运行代码。`NSInvocationOperation`允许你指定一个对象和选择器作为操作的基础。`NSBlockOperation`允许你指定一个或多个块作为操作的基础。然而，除了最简单的情况外，你通常希望继承`NSOperation`，因为这样做可以让你对过程有更多的控制。\n\
    \n在实现一个用于操作队列的操作时，你需要遵循几个步骤。首先，创建一个`NSOperation`的子类，并定义你需要的任何作为输入或输出的属性。在你的平方根示例中，你将创建一个`NSOperation`的子类，并为其定义`current`和`max`属性。\n\
    \n你需要做的另一件事是重写名为`main`的方法，你可以在其中放置构成操作的代码。在你的`main`方法中，你需要做几件事。第一件事是将你的所有逻辑包装在一个`@try`块中，以便你能捕获任何异常。操作的主方法不抛出任何异常是非常重要的。异常必须被捕获并处理，而不能被重新抛出。操作中未捕获的异常将导致致命的应用程序崩溃。\n\
    \n在`main`中你需要做的第二件事是创建一个新的自动释放池。不同的线程不能共享同一个自动释放池。操作将在单独的线程中运行，因此它不能使用主线程的自动释放池，所以分配一个新的自动释放池很重要。\n\
    \n以下是一个`NSOperation`子类的骨架`main`方法的样子：\n\n```\n- (void)main {\n    @try {\n   \
    \     @autoreleasepool {\n // 在这里完成工作...\n        }\n    }\n    @catch (NSException\
    \ * e) {\n        // 重要的是我们在这里不要重新抛出异常\n        NSLog(@\"Exception: %@\", e);\n\
    \    }\n}\n```\n\n### 操作依赖\n\n任何操作都可以有一个或多个依赖。依赖是另一个`NSOperation`实例，它必须在这个操作能够执行之前完成。操作队列知道不要运行那些尚未完成依赖的操作。你可以使用`addDependency:`方法向操作添加依赖，如下所示：\n\
    \n```\nMyOperation *firstOperation = [[MyOperation alloc] init];\nMyOperation\
    \ *secondOperation = [[MyOperation alloc] init];\n[secondOperation addDependency:firstOperation];\n\
    ...\n```\n\n在这个例子中，如果`firstOperation`和`secondOperation`同时被添加到队列中，它们将不会并发运行，即使队列有可用的线程同时运行这两个操作。因为`firstOperation`是`secondOperation`的一个依赖，`secondOperation`将不会开始执行，直到`firstOperation`完成。\n\
    \n你可以使用`dependencies`方法获取操作的依赖数组。\n\n```\nNSArray *dependencies = [secondOperation\
    \ dependencies];\n```\n\n你可以使用`removeDependency:`方法移除依赖。要从`secondOperation`中移除`firstOperation`作为依赖，你可以这样做：\n\
    \n```\n[secondOperation removeDependency:firstOperation];\n```\n\n### 操作优先级\n\n\
    每个操作都有一个优先级，队列使用它来决定哪个操作何时运行，并且它决定了这个操作将获得多少可用处理资源。你可以使用`setQueuePriority:`方法设置队列的优先级，传入以下值之一：\n"
