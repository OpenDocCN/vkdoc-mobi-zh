  raw: '- (void)setValue:(id)value

    {

        if (value != nil && [value isKindOfClass:[UIColor class]]) {

            [super setValue:value];

            self.colorPicker.color = value;

        }

        else {

            self.colorPicker.color = [UIColor colorWithRed:1.0 green:1.0 blue:1.0
    alpha:1.0];

        }

        self.textField.attributedText = self.attributedColorString;

    }

    ```


    Make note of this line


    ```

    self.textField.attributedText = self.attributedColorString;

    ```


    in setValue:. Rather than setting the textField’s text property, you using the
    new attributedText property. This tells the textView that you’re using an attributed
    string and to use the attributes you’ve defined to format the string. You also
    set the Color Picker to white if the Hero has no color attribute defined.


    Add the colorPicker callback method.


    ```

    #pragma mark - (Private) Instance Methods


    - (void)colorPickerChanged:(id)sender

    {

        self.textField.attributedText = self.attributedColorString;

    }

    ```


    Again, you’re telling the textField to update itself. But with what?


    Finally, add the following code:


    ```

    - (NSAttributedString *)attributedColorString

    {

        NSString *block = [NSString stringWithUTF8String:"\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588"];

        UIColor *color = self.colorPicker.color;

        NSDictionary *attrs = @{NSForegroundColorAttributeName:color,

                                NSFontAttributeName:[UIFont boldSystemFontOfSize:[UIFont
    systemFontSize]]};

        NSAttributedString *attributedString =         [[NSAttributedString alloc]
    initWithString:block attributes:attrs];

        return attributedString;

    }

    ```


    First, you define a string with a bunch of Unicode characters in it. \u2588 is
    the Unicode character for a block character. All you’ve done is is made a string
    of 10 block characters. Next, you ask the colorPicker to tell us its color. Then
    you use that color, and the system bold font (15pt) to define a dictionary. The
    keys you use are NSForegroundColorAttributeName and NSFontAttributeName. These
    keys are specifically defined for UIKit attributed string support. As you can
    infer from their names, NSForegroundColorAttributeName sets the foreground (or
    text) color of the string and NSFontAttributeName allows you to define the font
    you want for the string. Finally, you instantiate the attributed string with the
    Unicode string block and the attributes dictionary.


    You could have use the textField’s regular text property and just set the textColor
    as needed, but we thought this brief demonstration of attributed strings might
    pique your curiosity. Attributed strings are extremely flexible and powerful,
    and are worth your time to investigate.


    **Note**  To learn more about attributed strings, check out Apple’s Attributed
    String Programming Guide at [http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/AttributedStrings/AttributedStrings.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/AttributedStrings/AttributedStrings.html).


    Cleaning up the Picker


    You’ve got one more step before you can use your new Color Picker. First, you
    need to update the configuration property list to use the SuperDBColorCell. Open
    the HeroDetailController.plist and drill down to Root ![image](images/arrow.jpg)
    sections ![image](images/arrow.jpg) Item 1 ![image](images/arrow.jpg) rows ![image](images/arrow.jpg)
    Item 4 ![image](images/arrow.jpg) class. Change its value from SuperDBEditCell
    to SuperDBColorCell.


    All set? Let’s build and run. Navigate down the detail view. Tap the Edit button,
    and tap on the Color cell.


    That’s weird. You didn’t get the Color Picker to appear at all. But the Color
    cell has a cursor and clear text button ([Figure 6-14](#9781430238072_Ch06.xhtml#Fig14)).


    ![9781430238072_Fig06-14.jpg](images/9781430238072_Fig06-14.jpg)


    [Figure 6-14.](#9781430238072_Ch06.xhtml#_Fig14)  Weird Color cell appearance


    You’re probably getting tired of us having you build and run the app when we know
    things won’t work. Think of it as an exercise in actual development. Many times
    you’ll think you’ve gotten everything right, only to find things don’t work when
    you run the app. That’s when you’ve got to (unit)test, debug, or think your way
    through to a solution.


    Anyway, there’s a reason why the Color Picker didn’t appear. Edit SuperDBColorCell.m
    and find the initWithStyle:reuseIdentifier:. In the initializer code, you created
    the Color Picker like this:


    ```

    self.colorPicker = [[UIColorPicker alloc] initWithFrame:CGRectZero];

    ```


    You made the size of the Color Picker a zero-sized CGRect. For all you know, it
    could be appearing. But since its size is zero, there’s nothing to see. Didn’t
    you do this with the Date Picker and Picker View? Yes, you did, but those classes
    have hooks inside of them to resize themselves according. Since you built the
    Color Picker from scratch, you’ve got to call those hooks manually.


    First, you need to initialize the Color Picker with a non-zero CGRect. Use a default
    size to start.


    ```

    self.colorPicker = [[UIColorPicker alloc] initWithFrame:CGRectMake(0, 0, 320,
    216)];

    ```


    Switch to UIColorPicker.m, and add this method after the initWithFrame: method:


    ```

    - (void)willMoveToSuperview:(UIView *)newSuperview

    {

        self.frame = newSuperview.bounds;

    }

    ```


    Now when you run it and try to edit the Color cell, you should see something like
    [Figure 6-15](#9781430238072_Ch06.xhtml#Fig15).


    ![9781430238072_Fig06-15.jpg](images/9781430238072_Fig06-15.jpg)


    [Figure 6-15.](#9781430238072_Ch06.xhtml#_Fig15)  The Color Picker


    Well, it works, but it doesn’t look very pretty. You can fix that with some graphical
    magic. You should still be editing UIColorPicker.m. Add the following #import:


    ```

    #import "QuartzCore/CAGradientLayer.h"

    ```


    Now add the following #defines:


    ```

    #define kTopBackgroundColor    [UIColor colorWithRed:0.98 green:0.98 blue:0.98
    alpha:1.0]

    #define kBottomBackgroundColor [UIColor colorWithRed:0.79 green:0.79 blue:0.79
    alpha:1.0]

    ```


    Look for a commented out drawRect: method and uncomment it. If you deleted it,
    don’t worry, just make it look like this:


    ```

    - (void)drawRect:(CGRect)rect

    {

        CAGradientLayer *gradient = [CAGradientLayer layer];

        gradient.frame = self.bounds;

        gradient.colors = [NSArray arrayWithObjects:(__bridge id)[kTopBackgroundColor
    CGColor],

                                                     (__bridge id)[kBottomBackgroundColor
    CGColor], nil];

        [self.layer insertSublayer:gradient atIndex:0];

    }

    ```


    We want to point out the drawRect: method. This method is used to set the background
    color of the Color Picker and give it a smooth color transition. You’re able to
    do this thanks to the QuartzCore framework. You need to add this framework to
    your project.


    Single-click the SuperDB project in the Navigator pane. In the Project Editor
    view, select the SuperDB target, then navigate to the Build Phases pane. Expand
    the “Link Binary With Libraries” build phase ([Figure 6-16](#9781430238072_Ch06.xhtml#Fig16)).
    Click the + on the lower left of the build phase. Scroll down the chooser dialog
    and select the QuartzCore.framework ([Figure 6-17](#9781430238072_Ch06.xhtml#Fig17)).
    Click Add.


    ![9781430238072_Fig06-16.jpg](images/9781430238072_Fig06-16.jpg)


    [Figure 6-16.](#9781430238072_Ch06.xhtml#_Fig16)  The Link Libraries build phase


    ![9781430238072_Fig06-17.jpg](images/9781430238072_Fig06-17.jpg)


    [Figure 6-17.](#9781430238072_Ch06.xhtml#_Fig17)  Add the QuartzCore.framework


    One last thing: you want to turn off the Clear Text button in the Color Cell.
    It’s pretty simple. In SuperDBColorCell.m, add this line to the initialization
    code in initWithStyle:reuseIdentifier:


    ```

    self.textField.clearButtonMode = UITextFieldViewModeNever;

    ```


    Build and run the app. Navigate down and edit the Color cell. Much better ([Figure
    6-18](#9781430238072_Ch06.xhtml#Fig18))!


