    \ 方法。\n\n如果你需要接收这些通知中的任何一个，首先实现一个接受一个参数（`NSNotification *`）的处理方法，然后在通知中心注册感兴趣的通知。例如，如果你希望在当前播放项目更改时触发某个方法，可以实现一个名为\
    \ `nowPlayingItemChanged:` 的方法，如下所示：\n\n```objc\n- (void)nowPlayingItemChanged:(NSNotification\
    \ *)notification {\n    NSLog(@\"新曲目开始播放\");\n}\n```\n\n要开始监听这些通知，你可以为感兴趣的通知类型注册通知中心，然后让该音乐播放器控制器开始生成通知："
- fmt: "```objectivec\nNSNotificationCenter *notificationCenter = [NSNotificationCenter\
    \ defaultCenter];\n[notificationCenter addObserver:self selector:@selector(nowPlayingItemChanged:)\
    \     \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification  \
    \ \n    object:player];\n[player beginGeneratingPlaybackNotifications];\n```\n\
    \nOnce you do this, any time the track changes, your `nowPlayingItemChanged:`\
    \ method will be called by the notification center.\n\nWhen you’re finished and\
    \ no longer need the notifications, you unregister and tell the music player controller\
    \ to stop generating notifications:\n\n```objectivec\nNSNotificationCenter *center\
    \ = [NSNotificationCenter defaultCenter];\n[center removeObserver:self       \
    \            \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
    \                 \n    object:player];\n[player endGeneratingPlaybackNotifications];\n\
    ```\n\nNow that you have all that theory out of the way, let’s build something!\n\
    \n## Simple Music Player\n\nThe first application you’re going to build is going\
    \ to take what you’ve covered so far to build a simple music player. The application\
    \ will allow users to create a queue of songs via the `MPMediaPickerController`\
    \ and play them back via the `MPMusicPlayerController`.\n\n**Note:** We’ll use\
    \ the term *queue* to describe the application’s list of songs, rather than the\
    \ term *playlist*. When working with the media library, the term *playlist* refers\
    \ to actual playlists synchronized from iTunes. Those playlists can be read, but\
    \ they can’t be created using the SDK. To avoid confusion, we’ll stick with the\
    \ term *queue*.\n\nWhen the application launches, it will check to see if music\
    \ is currently playing. If so, it will allow that music to keep playing and will\
    \ append any requested music to the end of the list of songs to be played.\n\n\
    **Tip:** If your application needs to play a certain sound or music, you may feel\
    \ that it’s appropriate to turn off the user’s currently playing music, but you\
    \ should do that with caution. If you’re just providing a soundtrack, you really\
    \ should consider letting the music that’s playing continue playing, or at least\
    \ giving the users the choice about whether to turn off their chosen music in\
    \ favor of your application’s music. It is, of course, your call, but tread lightly\
    \ when it comes to stomping on your user’s music.\n\nThe application you’ll build\
    \ isn’t very practical because everything you’re offering to your users (and more)\
    \ is already available in the Music application on your iOS device. But writing\
    \ it will allow you to explore almost all of the tasks your own application might\
    \ ever need to perform with regard to the media library.\n\n**Caution:** This\
    \ chapter’s application must be run on an actual iOS. The iOS Simulator does not\
    \ have access to the iTunes library on your computer, and any of the calls related\
    \ to the iTunes library access APIs will result in an error on the Simulator.\n\
    \n## Building the SimplePlayer Application\n\nYour app will retrieve the iPod\
    \ music player controller and allow you to add songs to the queue by using the\
    \ media picker. You’ll provide some rudimentary playback controls to play/pause\
    \ the music, as well as to skip forward and backward in the queue.\n\n**Note:**\
    \ As a reminder, the Simulator does not yet support the media library functionality.\
    \ To get the most out of the SimplePlayer application, you need to run it on your\
    \ iOS device, which means signing up for one of Apple’s paid iOS Developer Programs.\
    \ If you have not already done that, you might want to take a short break and\
    \ head over to [http://developer.apple.com/programs/register/](http://developer.apple.com/programs/register/)\
    \ and check it out.\n\nLet’s start by creating a new project in Xcode. Since this\
    \ is a very simple application, you’ll use the Single View Application project\
    \ template and name the new project `SimplePlayer`. Since you only have one view,\
    \ you don’t need your project to use storyboards, though you can use them if you\
    \ wish.\n\nOnce your new project is created, you need to add the `MediaPlayer`\
    \ framework to the project. Select the `SimplePlayer` project at the top of the\
    \ Navigator Pane. In the Project Editor, select the `SimplePlayer` target and\
    \ open the Build Phases pane. Find the Link Binary With Libraries (3 Items) section\
    \ and expand it. Click the + button at the bottom of the section and add the `MediaPlayer`\
    \ framework. If you’ve done this correctly, the `MediaPlayer.framework` should\
    \ appear in the project in the Navigator pane. Let’s keep things clean, and move\
    \ the `MediaPlayer.framework` to the Frameworks group in your project.\n\n## Building\
    \ the User Interface\n\nSingle-click `ViewController.xib` to open Interface Builder.\
    \ Let’s take a look at [Figure 12-2](#9781430238072_Ch12.xhtml#Fig2). There are\
    \ three labels along the top, an image view in the middle, and button bar on the\
    \ bottom with four buttons. Let’s start from the bottom and work our way up.\n\
    \n![9781430238072_Fig12-02.jpg](images/9781430238072_Fig12-02.jpg)\n\n[Figure\
    \ 12-2.](#9781430238072_Ch12.xhtml#_Fig2)  The SimplePlayer application playing\
    \ a song\n\nDrag a `UIToolbar` from the object library to the bottom of the `UIView`.\
    \ By default, the `UIToolbar` gives you a `UIBarButtonItem` aligned to the left\
    \ side of the toolbar. Since you need four buttons in your toolbar, you’ll keep\
    \ this button. Drag a flexible space bar button item ([Figure 12-3](#9781430238072_Ch12.xhtml#Fig3))\
    \ to the left of the `UIBarButtonItem`. Make sure you use the flexible space,\
    \ not the fixed space. If you placed it in the correct spot, the `UIBarButtonItem`\
    \ should now be aligned to the right side of the `UIToolbar` ([Figure 12-4](#9781430238072_Ch12.xhtml#Fig4)).\n\
    \n![9781430238072_Fig12-03.jpg](images/9781430238072_Fig12-03.jpg)\n\n[Figure\
    \ 12-3.](#9781430238072_Ch12.xhtml#_Fig3)  The flexible space bar button item\
    \ in the Object Library\n\n![9781430238072_Fig12-04.jpg](images/9781430238072_Fig12-04.jpg)\n\
    \n[Figure 12-4.](#9781430238072_Ch12.xhtml#_Fig4)  The SimplePlayer toolbar with\
    \ the flexible space\n\nAdd three `UIBarButtonItems` to the left of the flexible\
    \ space. These will be your playback control buttons. In order to center these\
    \ buttons, you need to add one more flexible space bar button Item to left side\
    \ of your `UIToolbar` ([Figure 12-5](#9781430238072_Ch12.xhtml#Fig5)). Select\
    \ the left most button and open the Attribute Inspector. Change the Identifier\
    \ from Custom to Rewind ([Figure 12-6](#9781430238072_Ch12.xhtml#Fig6)). Select\
    \ the button to the right of your new Rewind button and change the Identifier\
    \ to Play. Change the Identifier to right of your Play button to Fast Forward.\
    \ Select the rightmost button and change the Identifier to Add. When you’re done,\
    \ it should look like [Figure 12-7](#9781430238072_Ch12.xhtml#Fig7).\n\n![9781430238072_Fig12-05.jpg](images/9781430238072_Fig12-05.jpg)\n\
    \n[Figure 12-5.](#9781430238072_Ch12.xhtml#_Fig5)  Toolbar with all your buttons\n\
    \n![9781430238072_Fig12-06.jpg](images/9781430238072_Fig12-06.jpg)\n\n[Figure\
    \ 12-6.](#9781430238072_Ch12.xhtml#_Fig6)  Changing the bar button item identifier\
    \ to Rewind\n\n![9781430238072_Fig12-07.jpg](images/9781430238072_Fig12-07.jpg)\n\
    \n[Figure 12-7.](#9781430238072_Ch12.xhtml#_Fig7)  The completed Toolbar\n\nMoving\
    \ up the view, you need to add a `UIImageView`. Drag one onto your view, above\
    \ the toolbar. Interface Builder will expand the `UIImageView` to fill the available\
    \ area. Since you don’t want that, open the Size Inspector in the Utility pane.\
    \ The `UIImageView` should be selected, but if it isn’t, select it to make sure\
    \ you’re adjusting the right component. The Size Inspector should show that your\
    \ `UIImageView` width is 320\\. Change the height to match the width. Your image\
    \ view should now be square. Center the image view in your view, using the guidelines\
    \ to help."
