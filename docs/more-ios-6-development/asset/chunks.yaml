    ```


    playPressed: and pausePressed: update the player and toolbar as appropriate.


    ```

    - (IBAction)playPressed:(id)sender

    {

        [self.player play];

        [self updatePlayPause];

    }


    - (void)pausePressed:(id)sender

    {

        [self.player pause];

        [self updatePlayPause];

    }

    ```


    The ratePressed: Action toggles the playback rate between three rates: 0.5, 1.0,
    and 2.0.


    ```

    - (IBAction)ratePressed:(id)sender

    {

        float rate = self.player.rate;

        rate *= 2.0f;

        if (rate > 2.0f)

            rate = 0.5;

        self.player.rate = rate;

    }

    ```


    Now you can implement your context handlers. For a change in playerItem status,
    you handle three possible statuses: unknown, ready to play, and failure.


    ```

    - (void)handleStatusContext:(NSDictionary *)change

    {

        [self updatePlayPause];


    AVPlayerStatus status = [[change objectForKey:NSKeyValueChangeNewKey] integerValue];

        switch (status) {

            case AVPlayerStatusUnknown:

                [self removePlayerTimerObserver];

                [self updateScrubber:CMTimeMake(0, NSEC_PER_SEC)];

                break;


    case AVPlayerStatusReadyToPlay:

                [self addPlayerTimerObserver];

                break;


    case AVPlayerStatusFailed:

                NSLog(@"Player Status Failed");

                break;

        }

    }

    ```


    When the player rate changes, you just perform a sanity check to make sure you’re
    displaying the correct label on the Rate button.


    ```

    - (void)handleRateContext:(NSDictionary *)change

    {

        [self updatePlayPause];

        [self updateRate];

    }

    ```


    Finally, you only care about the player’s currentItem when you’ve either created
    a new AVPlayer or AVPlayerItem instance. If you have a new playerItem, you need
    to make sure the playerView player is updated accordingly.


    ```

    - (void)handleCurrentItemContext:(NSDictionary *)change

    {

        // We’ve added/replaced the AVPlayer’s AVPlayerItem

        AVPlayerItem *newPlayerItem = [change objectForKey:NSKeyValueChangeNewKey];

        if (newPlayerItem != (id)[NSNull null]) {

            // We really have a new AVPlayerItem

            self.playerView.player = self.player;

            [self.playerView setVideoFillMode:AVLayerVideoGravityResizeAspect];

        }

        else {

            // No AVPlayerItem

            NSLog(@"No AVPlayerItem");

        }

    }

    ```


    Your PlayerViewController is complete. Now you just need to ensure that your media
    AssetItem is set when selecting from the AudioViewController or VideoViewController.
    Open MediaViewController.m. Add an import directive for PlayerViewController.h.


    ```

    #import "PlayerViewController.h"

    ```


    Then add the implementation for prepareForSegue:sender:.


    ```

    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender

    {

        PlayerViewController *pvc = segue.destinationViewController;

        UITableViewCell *cell = sender;

        pvc.assetItem = [self.assets objectAtIndex:cell.tag];

    }

    ```


    You don’t need to check which segue is begin invoked, as there should only be
    one.


