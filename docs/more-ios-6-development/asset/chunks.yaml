- fmt: "You’re ready to add the view controller scenes. Open `MainStoryboard.storyboard`.\
    \ Drag a `UIViewController` from the Object Library to the storyboard editor next\
    \ to the `IdentitiesViewController`. Drag another `UIViewController`, this time\
    \ placing it next to the `CertificatesViewController`. Change the background color\
    \ for both views to black. Next add a `UITextView` to both `UIViewControllers`.\
    \ When you place them over the `UIViewControllers`, they should expand to fill\
    \ the view. If they don’t, that’s okay. You want to adjust each one to be the\
    \ width of the view (320.0 px), but have a height less than the full height of\
    \ the view (we used 400.0 px). Delete the default text in each text view.\n\n\
    Drag a `UIButton` to each area below the text views. Use the blue guidelines to\
    \ align the buttons to the left, below the text view. Change the button label\
    \ text from `Button` to `Done`.\n\nFor each scene, use the Identity Inspector\
    \ to change the class of each view controller from `UIViewController` to `KeychainItemViewController`.\
    \ Control-drag from the view controller icon to the text view and select the `textView`\
    \ outlet. Control-drag from the `Done` button to the view controller and select\
    \ the `done:` Action.\n\nFinally, control-drag from the table view cell in the\
    \ `IdentitiesViewController` to the `KeychainItemViewController` right next to\
    \ it. Select the modal `Selection Segue` in the pop-up menu that appears. Select\
    \ the new segue and name it `IdentitySegue` in the Attributes Inspector. Repeat\
    \ the process for the `CertificatesViewController` and the `KeychainItemViewController`\
    \ next to it. This time, name the segue `CertificateSegue` in the Attributes Inspector.\n\
    \nYou want to populate the text view with the keychain item’s attributes. You’ll\
    \ use the `UIViewController` method `viewWillAppear` to populate the text view.\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    if (self.item) {\n      \
    \  NSMutableString *itemInfo = [NSMutableString string];\n        [itemInfo appendFormat:@\"\
    AccessGroup: %@\\n\",                              \n            [self.item valueForAttribute:kSecAttrAccessGroup]];\n\
    \        [itemInfo appendFormat:@\"CreationDate: %@\\n\",                    \
    \                 \n            [self.item valueForAttribute:kSecAttrCreationDate]];\n\
    \        [itemInfo appendFormat:@\"CertificateEncoding: %@\\n\",             \
    \                 \n            [self.item valueForAttribute:kSecAttrCertificateEncoding]];\n\
    \        [itemInfo appendFormat:@\"CreationDate: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecClass]];\n        [itemInfo appendFormat:@\"Issuer: %@\\\
    n\", \n            [self.item valueForAttribute:kSecAttrIssuer]];\n        [itemInfo\
    \ appendFormat:@\"Label: %@\\n\", \n            [self.item valueForAttribute:kSecAttrLabel]];\n\
    \        [itemInfo appendFormat:@\"ModificationDate: %@\\n\",                \
    \              \n            [self.item valueForAttribute:kSecAttrModificationDate]];\n\
    \        [itemInfo appendFormat:@\"Accessible: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecAttrAccessible]];\n        [itemInfo appendFormat:@\"\
    PublicKeyHash: %@\\n\",                              \n            [self.item\
    \ valueForAttribute:kSecAttrPublicKeyHash]];\n        [itemInfo appendFormat:@\"\
    SerialNumber: %@\\n\",                              \n            [self.item valueForAttribute:kSecAttrSerialNumber]];\n\
    \        [itemInfo appendFormat:@\"Subject: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecAttrSubject]];\n             self.textView.text = itemInfo;\n\
    \    }\n}\n```\n\nNext, check to see if you have a keychain item. If you do, you\
    \ create and fill an `NS(Mutable)String` with some attribute values. That string\
    \ is used to set the text view text.\n\nFor each table view controller, you need\
    \ to implement `prepareForSegue:sender:` to set the keychain item for the `KeychainItemViewController`.\
    \ Open `CertificatesViewController.m` and add import the `KeychainItemViewController.h`\
    \ header file.\n\n```\n#import \"KeychainItemViewController.h\"\n```\n\nThe implementation\
