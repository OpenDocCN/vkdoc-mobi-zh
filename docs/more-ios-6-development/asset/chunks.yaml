    \ 应用程序的建议，使其能够在无需编写多余代码或重复逻辑的情况下进行维护和扩展。我们展示了花时间编写通用代码所能带来的巨大好处，并教会了你如何寻找重构代码的机会，使其更精简、更高效、更易于维护，整体上也更令人愉悦。\n\
    \n我们还可以再用几章篇幅继续探讨 Core Data，但即便如此也无法穷尽这个主题。不过，Core Data 并非 iOS SDK 3 之后引入的唯一新框架。至此，你应该对\
    \ Core Data 有了足够扎实的理解，能够借助 Apple 的文档，进一步深入探索。\n\n现在，是时候暂别我们的好朋友 Core Data，去探索\
    \ iOS SDK 的其他方面了。\n\n# 第 8 章\n\n# iCloud 的背后\n\n随着 iOS 5 的发布，Apple 推出了 iCloud，这是其基于互联网的工具和服务系列中的最新产品。对最终用户而言，iCloud\
    \ 扩展了 Apple 之前的 MobileMe 服务（包括电子邮件、联系人管理和“查找我的 iPhone”），增加了 iOS 备份与恢复、iTunes Match、照片流以及“返回我的\
    \ Mac”功能。\n\n尽管 Apple 为其配备了各种花哨功能，但 iCloud 的核心本质是一个基于云的存储和同步服务。其主要目的是让用户能够在所有设备（iPhone、iPad\
    \ 或 Mac）上访问自己的内容。最棒的是，Apple 为 iOS 开发者提供了一套用于访问 iCloud 的 API。这让你能够构建利用相同 iCloud\
    \ 功能的应用程序，而无需投入大量精力搭建复杂的服务器基础设施。更妙的是，你无需学习一套全新的复杂 SDK。Apple 没有提供全新的 iCloud 框架，而是为现有框架（主要是\
    \ Foundation 和 UIKit）添加了新类，并扩展了现有类以支持 iCloud 访问。\n\niCloud 的基本理念是提供一个统一的位置，让应用程序可以存储和访问数据。你的应用在一个设备上所做的更改，可以立即传播到另一设备上运行的同一应用实例。同时，iCloud\
    \ 还提供了应用程序数据的权威副本。这些数据可用于在新设备上恢复应用程序的状态，从而提供无缝的用户体验以及备份数据。\n\n## 使用 iCloud 存储数据\n\
    \n有几种不同的方式可以将数据存储在 iCloud 中。\n\n*   **iOS 备份**：这是一种全局设备配置，可将你的 iOS 设备备份到 iCloud。\n\
    *   **键值数据存储**：用于存储应用程序中少量且不常更改的数据。\n*   **文档存储**：用于存储用户文档和应用程序数据。\n*   **使用 iCloud\
    \ 的 Core Data**：将应用程序的持久化存储库放在 iCloud 上。\n\n在我们详细讨论这些存储机制之前，先来回顾一下 iCloud 和 iOS\
    \ 是如何协同工作的。\n\n## iCloud 基础\n\n在你的 iCloud 应用程序内部，存在一个通用容器。根据所使用的存储类型，你可以显式定义该容器的\
    \ URL，或者由 iOS 为你创建一个。通用容器是应用程序存储 iCloud 数据的地方。iOS 将同步你的设备与 iCloud 之间的数据。这意味着你的应用程序对通用容器中数据的任何更改都将发送到\
    \ iCloud。反之，iCloud 中的任何更改也将发送到你设备上应用程序的通用容器中。\n\n需要注意的是，iOS 不会在每次更改时都将整个数据文件在\
    \ iCloud 之间来回传输。在内部，iOS 和 iCloud 会将应用程序的数据分解成较小的数据块。当发生更改时，只有被更改的数据块会与 iCloud\
    \ 同步。在 iCloud 上，你的应用程序数据是带有版本号的，会跟踪每一组更改。\n\n除了将应用程序数据分解成数据块外，iOS 和 iCloud 还会发送数据文件的元数据。由于元数据相对较小且重要，因此元数据会一直发送。实际上，在实际数据同步之前，iCloud\
    \ 就会知道数据文件的元数据。这对 iOS 来说尤为重要。由于 iOS 设备可能受到空间和带宽的限制，iOS 不一定会在需要之前自动从 iCloud 下载数据。但既然\
    \ iOS 有了元数据，它就能知道自己的副本何时与 iCloud 不同步了。\n\n**注意**：有趣的是，如果 iOS 检测到同一 WiFi 网络上有另一台\
    \ iOS 设备，它不会将数据上传到 iCloud 再下载到另一台设备，而是直接将数据从一台设备传输到另一台设备。\n\n## iCloud 备份\n\n\
    备份是 iCloud 提供的一项 iOS 系统服务。它会每天通过 WiFi 自动备份你的 iOS 设备。应用程序主目录中的所有内容都会被备份。应用程序包、缓存目录和临时目录会被\
    \ iOS 忽略。由于数据是通过 WiFi 传输并发送到 Apple 的 iCloud 数据中心，因此你应该尽量保持应用程序的数据尽可能小。数据越多，备份时间就越长，用户消耗的\
    \ iCloud 存储空间也越多。"
- fmt: "**Note**  If you’ve used up your iCloud storage capacity (at the time of this\
    \ writing, 5GB by default), iOS will ask you if you want to buy more storage.\
    \ Regardless, you’ll need to figure out how your application will handle the case\
    \ if iCloud is full.\n\nWhen designing your application’s data storage policy,\
    \ keep the following in mind:\n\n- User-generated data, or data that cannot be\
    \ recreated by your application, should be stored in the `Documents` directory.\
    \ From there it will be automatically backed up to iCloud\n- Data that can be\
    \ downloaded or recreated by your application should live in `Library/Caches`.\n\
    - Data that is temporary should be stored in the `tmp` directory. Remember to\
    \ delete these files when they are no longer needed.\n- Data that your application\
    \ needs to persist, even in low storage situations, should be flagged with the\
    \ `NSURLIsExcludedFromBackupKey` attribute. Regardless of where you put these\
    \ files, they will not be deleted by Backup. It’s your application’s responsibility\
    \ to manage these files.\n\nYou can set `NSURLIsExcludedFromBackupKey` via the\
    \ `setResource:forKey:error:` method in `NSURL`.\n\n```objc\nNSURL *url = [[NSBundle\
    \ mainBundle] URLForResource:@\"NoBackup\" withExtension:@\"txt\"];\nNSError *error\
    \ = nil;\nBOOL success = [URL setResourceValue:@YES\n                        \
    \      forKey:NSURLIsExcludedFromBackupKey\n                               error:&error];\n\
    ```\n\n## Enabling iCloud in Your Application\n\nIn order to use iCloud data storage\
    \ within your application, you need to perform two tasks. First, you need to enable\
    \ the application’s entitlements and enable them for iCloud. Second, you need\
    \ to create an iCloud-enabled provisioning profile. This is done via the iOS Provisioning\
    \ Portal that you access via the Apple Developer Center web site. We’ll go over\
    \ the specifics of enabling your application later in this chapter, when you extend\
    \ your SuperDB application to use iCloud.\n\nWhen entitlements are enabled in\
    \ your application, Xcode expects to find a `.entitlements` file within your project\
    \ directory. This `.entitlements` file is simply a property list of key-values\
    \ pairs. These key-value pairs configure additional capabilities or security features\
    \ of your application. For iCloud access, the `.entitlements` file specifies the\
    \ keys to define ubiquity identifiers for the iCloud key-value and document ubiquity\
    \ containers.\n\n## Key-Value Data Storage\n\nAs the name suggests, iCloud key-value\
    \ data storage is a simple key-value storage mechanism integrated with iCloud.\
    \ Conceptually, it’s similar to `NSUserDefaults`. Like `NSUserDefaults`, the only\
    \ allowable data types are those supported by property lists. It is best to use\
    \ it for data with values that are infrequently updated. Placing your application’s\
    \ preferences or settings would be a good use case. You shouldn’t use key-value\
    \ data storage in place of `NSUserDefaults`. You should keep writing configuration\
    \ information to `NSUserDefault` and write shared data to key-value data storage.\
    \ This way your application still has configuration information if iCloud is unavailable.\n\
    \nThere are a number of limitations on the key-value data storage that you need\
    \ to keep in mind. First, there is a 1MB maximum storage limit per value. Keys\
    \ have a separate 1MB per-key limit. Furthermore, each application is allowed\
    \ a maximum of 1024 separate keys. As a result, you will need to be judicious\
    \ about what you put in key-value data storage.\n\nKey-value data is synced with\
    \ iCloud at periodic intervals. The frequency of these intervals is determined\
    \ by iCloud, so you don’t have much control over this. As a result, you shouldn’t\
    \ use the key-value data storage for time-sensitive data.\n\nKey-value data storage\
    \ handles data conflicts by always choosing the latest value for each key.\n\n\
    To use key-value data storage, you use the default `NSUbiquitousKeyValueStore`.\
    \ You access values using the appropriate `*ForKey:` and `set*ForKey:` methods,\
    \ similar to `NSUserDefaults`. You will also need to register for notifications\
    \ about changes to the store via iCloud. To synchronize data changes, you call\
    \ the `synchronize` method. You can also use the `synchronize` method as a check\
    \ to see if iCloud is available. You might initialize your application to use\
    \ key-value data storage like this:\n\n```objc\nNSUbiquitousKeyValueStore *kv_store\
    \ = [NSUbiquitousKeyValueStore defaultStore];\n\n// register for KV Data Storage\
    \ changes from iCloud\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                        selector:@selector (storeDidChange:)\n\
    \                                           name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
    \                                          object:self.kv_store];\nBOOL avail\
    \ = [self.kv_store synchronize];\nif (avail) {\n    // iCloud is available\n \
    \   . . .\n}\nelse {\n    // iCloud is NOT available\n}\n```\n\nThe `synchronize`\
    \ method does not push data to iCloud. It simply notifies iCloud that new data\
    \ is available. iCloud will determine when to retrieve the data from your device.\n\
    \n## Document Storage\n\nFor iCloud document storage, a document is a custom subclass\
    \ of `UIDocument`. `UIDocument` is an abstract class that is used to store your\
    \ application’s data, either as a single file or as a file bundle. A file bundle\
    \ is a directory that behaves as a single file. To manage a file bundle, use the\
    \ `NSFileWrapper` class.\n\nBefore we describe iCloud Document Storage, let’s\
    \ look at `UIDocument`.\n\n### UIDocument\n\n`UIDocument` eases the development\
    \ of document-based applications by giving a number of features for “free”.\n\n\
    - *Background reading and writing of data*: Keeps your application’s UI responsive.\n\
    - *Conflict detection*: Helps you resolve differences between document versions.\n\
    - *Safe-saving*: Makes sure your document is never in a corrupted state.\n- *Automated\
    \ saves*: Makes life easier for your users.\n- *Automatic iCloud integration*:\
    \ Handles all interchanges between your document and iCloud.\n\nIf you want to\
    \ build a single file document, you would create a simple `UIDocument` subclass.\n\
    \n```objc\n@interface MyDocument : UIDocument\n\n@property (strong, nonatomic)\
    \ NSString *text;\n\n@end\n```\n\nThere are a number of methods you need to implement\
    \ in your `UIDocument` subclass. First, you need to be able to load the document\
    \ data. To do this, you override the `loadFromContents:ofType:error:` method.\n\
    \n```objc\n- (BOOL)loadFromContents:(id)contents ofType:(NSString *)typeName error:(NSError\
    \ **)error\n{\n    if ([contents length] > 0) {\n        self.text = [[NSString\
    \ alloc] initWithData:(NSData *)contents encoding:NSUTF8StringEncoding];\n   \
    \ } else {\n        self.text = @\"\";\n    }\n\n// update view here\n\nreturn\
    \ YES;\n}\n```\n\nThe `contents` parameter is defined as `id`. If your document\
    \ is a file bundle, the content will be of type `NSFileWrapper`. For your single\
    \ document file case, the content is an `NSData` object. This is a simple implementation;\
    \ it never fails. If you implemented a failure case and returned `NO`, you should\
    \ create an error object and give it a meaningful error message. You also want\
    \ to put code in place to update the UI once the data is successfully loaded.\
    \ You also never check the content type. Your application could support multiple\
    \ data types, and you have to use the `typeName` parameter to handle the different\
    \ data loading scenarios.\n\nWhen you close your application or when auto-save\
    \ is invoked, the `UIDocument` method `contentForType:error:` is called. You need\
    \ to override this method as well.\n\n```objc\n- (id)contentsForType:(NSString\
    \ *)typeName error:(NSError **)error\n{\n    if (!self.text) {\n        self.text\
    \ = @\"\";\n    }\n\nNSData *data = [self.documentText dataUsingEncoding:NSUTF8StringEncoding\n\
    \                                  allowLossyConversion:NO];\n    return data;\n\
    }\n```"
  raw: '**Note**  If you’ve used up your iCloud storage capacity (at the time of this
    writing, 5GB by default), iOS will ask you if you want to buy more storage. Regardless,
    you’ll need to figure out how your application will handle the case if iCloud
    is full.


    When designing your application’s data storage policy, keep the following in mind:


    *   User-generated data, or data that cannot be recreated by your application,
    should be stored in the Documents directory. From there it will be automatically
    backed up to iCloud

    *   Data that can be downloaded or recreated by your application should live in
    Library/Caches.

    *   Data that is temporary should be stored in the tmp directory. Remember to
    delete these files when they are no longer needed.

    *   Data that your application needs to persist, even in low storage situations,
    should be flagged with the NSURLIsExcludedFromBackupKey attribute. Regardless
    of where you put these files, they will not be deleted by Backup. It’s your application’s
    responsibility to manage these files.


    You can set NSURLIsExcludedFromBackupKey via the setResource:forKey:error: method
    in NSURL.


    ```

    NSURL *url = [[NSBundle mainBundle] URLForResource:@"NoBackup" withExtension:@"txt"];

    NSError *error = nil;

    BOOL success = [URL setResourceValue:@YES

                                  forKey:NSURLIsExcludedFromBackupKey

                                   error:&error];

    ```


    Enabling iCloud in Your Application


    In order to use iCloud data storage within your application, you need to perform
    two tasks. First, you need to enable the application’s entitlements and enable
    them for iCloud. Second, you need to create an iCloud-enabled provisioning profile.
    This is done via the iOS Provisioning Portal that you access via the Apple Developer
    Center web site. We’ll go over the specifics of enabling your application later
    in this chapter, when you extend your SuperDB application to use iCloud.


    When entitlements are enabled in your application, Xcode expects to find a .entitlements
    file within your project directory. This .entitlements file is simply a property
    list of key-values pairs. These key-value pairs configure additional capabilities
    or security features of your application. For iCloud access, the .entitlements
    file specifies the keys to define ubiquity identifiers for the iCloud key-value
    and document ubiquity containers.


    Key-Value Data Storage


    As the name suggests, iCloud key-value data storage is a simple key-value storage
    mechanism integrated with iCloud. Conceptually, it’s similar to NSUserDefaults.
    Like NSUserDefaults, the only allowable data types are those supported by property
    lists. It is best to use it for data with values that are infrequently updated.
    Placing your application’s preferences or settings would be a good use case. You
    shouldn’t use key-value data storage in place of NSUserDefaults. You should keep
    writing configuration information to NSUserDefault and write shared data to key-value
    data storage. This way your application still has configuration information if
    iCloud is unavailable.


    There are a number of limitations on the key-value data storage that you need
    to keep in mind. First, there is a 1MB maximum storage limit per value. Keys have
    a separate 1MB per-key limit. Furthermore, each application is allowed a maximum
    of 1024 separate keys. As a result, you will need to be judicious about what you
    put in key-value data storage.


    Key-value data is synced with iCloud at periodic intervals. The frequency of these
    intervals is determined by iCloud, so you don’t have much control over this. As
    a result, you shouldn’t use the key-value data storage for time-sensitive data.


    Key-value data storage handles data conflicts by always choosing the latest value
    for each key.


    To use key-value data storage, you use the default NSUbiquitousKeyValueStore.
    You access values using the appropriate *ForKey: and set*ForKey: methods, similar
    to NSUserDefaults. You will also need to register for notifications about changes
    to the store via iCloud. To synchronize data changes, you call the synchronize
    method. You can also use the synchronize method as a check to see if iCloud is
    available. You might initialize your application to use key-value data storage
    like this:


    ```

    NSUbiquitousKeyValueStore *kv_store = [NSUbiquitousKeyValueStore defaultStore];


    // register for KV Data Storage changes from iCloud

    [[NSNotificationCenter defaultCenter] addObserver:self

                                     selector:@selector (storeDidChange:)

                                     name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification

                                     object:self.kv_store];

    BOOL avail = [self.kv_store synchronize];

    if (avail) {

        // iCloud is available

        . . .

    }

    else {

        // iCloud is NOT available

    }

    ```


    The synchronize method does not push data to iCloud. It simply notifies iCloud
    that new data is available. iCloud will determine when to retrieve the data from
    your device.


    Document Storage


    For iCloud document storage, a document is a custom subclass of UIDocument. UIDocument
    is an abstract class that is used to store your application’s data, either as
    a single file or as a file bundle. A file bundle is a directory that behaves as
    a single file. To manage a file bundle, use the NSFileWrapper class.


    Before we describe iCloud Document Storage, let’s look at UIDocument.


    UIDocument


    UIDocument eases the development of document-based applications by giving a number
    of features for “free.”


    *   *Background reading and writing of data*: Keeps your application’s UI responsive.

    *   *Conflict detection*: Helps you resolve differences between document versions.

    *   *Safe-saving*: Makes sure your document is never in a corrupted state.

    *   *Automated saves*: Makes life easier for your users.

    *   *Automatic iCloud integration*: Handles all interchanges between your document
    and iCloud.


    If you want to build a single file document, you would create a simple UIDocument
    subclass.


    ```

    @interface MyDocument : UIDocument


    @property (strong, nonatomic) NSString *text;


    @end

    ```


    There are a number of methods you need to implement in your UIDocument subclass.
    First, you need to be able to load the document data. To do this, you override
    the loadFromContents:ofType:error: method.


    ```

    - (BOOL)loadFromContents:(id)contents ofType:(NSString *)typeName error:(NSError
    **)error

    {

        if ([contents length] > 0) {

            self.text = [[NSString alloc] initWithData:(NSData *)contents encoding:NSUTF8StringEncoding];

        }

    ```


    *else {*


    ```

            self.text = @"";

        }


    // update view here


    return YES;

    }

    ```


    The contents parameter is defined as id. If your document is a file bundle, the
    content will be of type NSFileWrapper. For your single document file case, the
    content is an NSData object. This is a simple implementation; it never fails.
    If you implemented a failure case and returned NO, you should create an error
    object and give it a meaningful error message. You also want to put code in place
    to update the UI once the data is successfully loaded. You also never check the
    content type. Your application could support multiple data types, and you have
    to use the typeName parameter to handle the different data loading scenarios.


    When you close your application or when auto-save is invoked, the UIDocument method
    contentForType:error: is called. You need to override this method as well.


    ```

    - (id)contentsForType:(NSString *)typeName error:(NSError **)error

    {

        if (!self.text) {

            self.text = @"";

        }


    NSData *data = [self.documentText dataUsingEncoding:NSUTF8StringEncoding

                                          allowLossyConversion:NO];

        return data;

    }

    ```'
  trans: "\n**注意** 如果你用完了 iCloud 存储容量（在撰写本文时，默认为 5GB），iOS 会询问你是否需要购买更多存储空间。无论如何，你都需要考虑当\
    \ iCloud 已满时，你的应用程序应如何处理这种情况。\n\n在设计应用程序的数据存储策略时，请牢记以下几点：\n\n-   用户生成的数据或应用程序无法重新创建的数据，应存储在\
    \ `Documents` 目录中。这样，这些数据将自动备份到 iCloud。\n-   可以由应用程序下载或重新创建的数据应存放在 `Library/Caches`\
    \ 目录中。\n-   临时数据应存储在 `tmp` 目录中。记得在不再需要时删除这些文件。\n-   即使在存储空间不足的情况下，也需要应用程序持久保存的数据，应使用\
    \ `NSURLIsExcludedFromBackupKey` 属性进行标记。无论将这些文件放在哪里，它们都不会被备份删除。管理这些文件是应用程序的责任。\n\
    \n你可以通过 `NSURL` 的 `setResource:forKey:error:` 方法设置 `NSURLIsExcludedFromBackupKey`。\n\
    \n```objc\nNSURL *url = [[NSBundle mainBundle] URLForResource:@\"NoBackup\" withExtension:@\"\
    txt\"];\nNSError *error = nil;\nBOOL success = [URL setResourceValue:@YES\n  \
    \                            forKey:NSURLIsExcludedFromBackupKey\n           \
    \                    error:&error];\n```\n\n## 在应用程序中启用 iCloud\n\n为了在你的应用程序中使用\
    \ iCloud 数据存储，你需要执行两个任务。首先，你需要启用应用程序的授权（entitlements）并为 iCloud 启用它们。其次，你需要创建一个启用\
    \ iCloud 的配置文件（provisioning profile）。这可以通过苹果开发者中心网站上的 iOS 配置门户来实现。在本章后面，当你扩展你的\
    \ SuperDB 应用以使用 iCloud 时，我们将详细介绍如何启用你的应用程序。\n\n当在应用程序中启用了授权后，Xcode 期望在你的项目目录中找到一个\
    \ `.entitlements` 文件。这个 `.entitlements` 文件本质上是一个键值对（key-values pairs）的属性列表（property\
    \ list）。这些键值对配置了你应用程序的额外功能或安全特性。对于 iCloud 访问，`.entitlements` 文件指定了用于 iCloud 键值存储和文档通用容器（ubiquity\
    \ containers）的通用标识符（ubiquity identifiers）的键。\n\n## 键值数据存储\n\n顾名思义，iCloud 键值数据存储是一种与\
    \ iCloud 集成的简单键值存储机制。从概念上讲，它与 `NSUserDefaults` 类似。与 `NSUserDefaults` 一样，唯一允许的数据类型是属性列表支持的那些类型。最好将其用于值不经常更新的数据。存储应用程序的首选项或设置是一个很好的用例。你不应该用键值数据存储来替代\
    \ `NSUserDefaults`。你应该继续将配置信息写入 `NSUserDefault`，并将共享数据写入键值数据存储。这样，即使 iCloud 不可用，你的应用程序仍然拥有配置信息。\n\
    \n键值数据存储有许多限制需要你牢记。首先，每个值有 1MB 的最大存储限制。每个键也有单独的 1MB 限制。此外，每个应用程序最多允许 1024 个独立的键。因此，你需要谨慎决定将哪些内容放入键值数据存储中。\n\
    \n键值数据会按周期与 iCloud 同步。这些周期的频率由 iCloud 决定，因此你对此没有太多控制权。因此，你不应将键值数据存储用于对时间敏感的数据。\n\
    \n键值数据存储处理数据冲突的方式是，始终为每个键选择最新的值。\n\n要使用键值数据存储，你需要使用默认的 `NSUbiquitousKeyValueStore`。你可以使用相应的\
    \ `*ForKey:` 和 `set*ForKey:` 方法访问值，这类似于 `NSUserDefaults`。你还需要注册有关 iCloud 对存储进行更改的通知。要同步数据更改，需要调用\
    \ `synchronize` 方法。你也可以将 `synchronize` 方法用作检查 iCloud 是否可用的方式。你可以像这样初始化你的应用程序以使用键值数据存储：\n\
    \n```objc\nNSUbiquitousKeyValueStore *kv_store = [NSUbiquitousKeyValueStore defaultStore];\n\
    \n// 注册来自 iCloud 的 KV 数据存储更改通知\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                        selector:@selector (storeDidChange:)\n\
    \                                           name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n\
    \                                          object:self.kv_store];\nBOOL avail\
    \ = [self.kv_store synchronize];\nif (avail) {\n    // iCloud 可用\n    . . .\n\
    }\nelse {\n    // iCloud 不可用\n}\n```\n\n`synchronize` 方法并不会将数据推送到 iCloud。它只是通知\
    \ iCloud 有新数据可用。iCloud 会决定何时从你的设备获取数据。\n\n## 文档存储\n\n对于 iCloud 文档存储，文档是 `UIDocument`\
    \ 的自定义子类。`UIDocument` 是一个抽象类，用于存储应用程序的数据，可以作为单个文件或文件包（file bundle）。文件包是一个行为类似于单个文件的目录。要管理文件包，请使用\
    \ `NSFileWrapper` 类。\n\n在我们描述 iCloud 文档存储之前，先来看一下 `UIDocument`。\n\n### UIDocument\n\
    \n`UIDocument` 通过“免费”提供许多功能，简化了基于文档的应用程序的开发。\n\n-   *后台读写数据*：保持应用程序界面的响应性。\n-\
    \   *冲突检测*：帮助你解决文档版本之间的差异。\n-   *安全保存*：确保你的文档永远不会处于损坏状态。\n-   *自动保存*：让你的用户生活更轻松。\n\
    -   *自动 iCloud 集成*：处理你的文档与 iCloud 之间的所有交互。\n\n如果你想构建一个单文件文档，你需要创建一个简单的 `UIDocument`\
    \ 子类。\n\n```objc\n@interface MyDocument : UIDocument\n\n@property (strong, nonatomic)\
    \ NSString *text;\n\n@end\n```\n\n在你的 `UIDocument` 子类中，你需要实现许多方法。首先，你需要能够加载文档数据。为此，你需要重写\
    \ `loadFromContents:ofType:error:` 方法。\n\n```objc\n- (BOOL)loadFromContents:(id)contents\
    \ ofType:(NSString *)typeName error:(NSError **)error\n{\n    if ([contents length]\
    \ > 0) {\n        self.text = [[NSString alloc] initWithData:(NSData *)contents\
    \ encoding:NSUTF8StringEncoding];\n    } else {\n        self.text = @\"\";\n\
    \    }\n\n// 在此处更新视图\n\nreturn YES;\n}\n```\n\n`contents` 参数被定义为 `id` 类型。如果你的文档是一个文件包，那么内容将是\
    \ `NSFileWrapper` 类型。对于你的单文档文件情况，内容是 `NSData` 对象。这是一个简单的实现；它永远不会失败。如果你实现了失败情况并返回了\
    \ `NO`，你应该创建一个错误对象并赋予其有意义的错误信息。你还应该放置代码，在数据成功加载后更新用户界面。此外，你从未检查内容类型。你的应用程序可能支持多种数据类型，你必须使用\
    \ `typeName` 参数来处理不同的数据加载场景。\n\n当你关闭应用程序或调用自动保存时，会调用 `UIDocument` 的 `contentForType:error:`\
    \ 方法。你需要同样重写此方法。\n\n```objc\n- (id)contentsForType:(NSString *)typeName error:(NSError\
    \ **)error\n{\n    if (!self.text) {\n        self.text = @\"\";\n    }\n\nNSData\
    \ *data = [self.documentText dataUsingEncoding:NSUTF8StringEncoding\n        \
    \                          allowLossyConversion:NO];\n    return data;\n}\n```\n"
- fmt: "# 文档排版\n\n如果你的文档存储为文件包，则返回`NSFileWrapper`实例，而不是单个文件的`NSData`对象。这就是确保数据被保存所需的全部操作；`UIDocument`将处理其余部分。\n\
    \n`UIDocument`需要一个文件URL来确定读写数据的位置。该URL将定义文档目录、文件名以及可能的文件扩展名。目录可以是本地（应用程序沙盒）目录，也可以是iCloud无处不在容器中的位置。文件名应由你的应用程序生成，并可选地允许用户覆盖默认值。虽然使用文件扩展名可能是可选的，但为你的应用程序定义一个（或多个）扩展名可能是个好主意。你可以将此URL传递给`UIDocument`子类的`initWithFileURL:`方法来创建文档实例。\n\
    \n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\n\
    [doc saveToURL:doc.fileURL forSaveOperation:UIDocumentSaveForCreating\n      \
    \  completionHandler:^(BOOL success){\n    if (success) {\n        // handle successful\
    \ save\n    }\n    else {\n        // handle failed save\n    }\n}];\n```\n\n\
    一旦创建了`UIDocument`实例，就可以使用`saveToURL:forSaveOperation:completionHandler:`方法创建文件。使用`UIDocumentSaveForCreating`值表示这是首次保存文件。`completionHandler:`参数接受一个块。该块接受一个`BOOL`参数，用于告知保存操作是否成功。\n\
    \n你不仅需要创建文档；应用程序可能还需要打开和关闭现有文档。你仍然需要调用`initWithFileURL:`来创建文档实例，但随后需调用`openWithCompletionHandler:`和`closeWithCompletionHandler:`来打开和关闭文档。\n\
    \n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\
    [doc openWithCompletionHandler:^(BOOL success){\n    if (success) {\n        //\
    \ handle successful open\n    }\n    else {\n        // handle failed open\n \
    \   }\n}];\n. . .\n// work on document\n. . .\n[doc closeWithCompletionHandler:nil];\n\
    ```\n\n两个方法都接受一个在完成时执行的块。与`saveToURL:forSaveOperation:completionHandler:`方法类似，该块有一个`BOOL`参数，用于告知打开/关闭操作是成功还是失败。你不必传递块。在上面的示例代码中，你向`closeWithCompletionHandler:`传递`nil`，表示文档关闭后不执行任何操作。\n\
    \n要删除文档，你可以简单地使用`NSFileManager`的`removeItemAtURL:`，并传入文档文件URL。然而，你应该像`UIDocument`处理读写那样，在后台执行删除操作。\n\
    \n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\
    // close the document\n. . .\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^(void){\n    NSFileCoordinator *fileCoordinator = [[NSFileCoordinator alloc]\
    \ initWithFilePresenter:nil];\n    [fileCoordinator coordinateWritingItemAtURL:aURL\n\
    \                     options:NSFileCoordinatorWritingForDeleting\n          \
    \           error:nil\n                     byAccessor:^(NSURL *writingURL){\n\
    \                         NSFileManager *fileManager = [[NSFileManager alloc]\
    \ init];\n                         [fileManager removeItemAtURL:writingURL error:nil];\n\
    \                     }];\n});\n```\n\n首先，通过`dispatch_async`函数将整个删除操作分派到后台队列。在后台队列中，创建一个`NSFileCoordinator`实例。`NSFileCoordinator`协调进程和对象之间的文件操作。在执行任何文件操作之前，它会向所有已向文件协调器注册的`NSFilePresenter`协议对象发送消息。通过调用`NSFileCoordinator`方法`coordinateWritingItemAtURL:options:error:byAccessor:`来删除文档文件。`byAccessor`是一个块操作，定义了要执行的实际文件操作。它接收一个`NSURL`参数，代表文件的位置。始终使用块参数`NSURL`，而不是传递给`coordinateWritingItemAtURL:`的`NSURL`。\n\
    \n在对你的`UIDocument`子类执行操作之前，你可能想检查`documentState`属性。可能的状态定义如下：\n\n*   `UIDocumentStateNormal`：文档已打开且没有问题。\n\
    *   `UIDocumentStateClosed`：文档已关闭。如果打开后文档处于此状态，则表示文档可能存在问题。\n*   `UIDocumentStateInConflict`：存在冲突的文档版本。你可能需要编写代码让用户解决这些冲突。\n\
    *   `UIDocumentStateSavingError`：由于某些错误，文档无法保存。\n*   `UIDocumentStateEditingDisabled`：文档无法编辑；你的应用程序或iOS不允许编辑。\n\
    \n你可以使用简单的按位运算符检查文档状态。\n\n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n\
    . . .\nif (doc.documentState & UIDocumentStateClosed) {\n    // documentState\
    \ == UIDocumentStateClosed\n}\n```\n\n`UIDocument`还提供了一个名为`UIDocumentStateChangedNotification`的通知，你可以用来注册观察者。\n\
    \n```\nMyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\
    [[NSNotificationCenter defaultCenter] addObserver:anObserver\n               \
    \                          selector:@selector(documentStateChanged:)\n       \
    \                                     name:UIDocumentStateChangedNotification\n\
    \                                           object:doc]\n```\n\n你的观察者类将实现`documentStateChanged:`方法来检查文档状态，并相应地处理每种状态。\n\
    \n为了执行自动保存，`UIDocument`定期调用`hasUnsavedChanges`方法，该方法返回一个`BOOL`值，指示自上次保存以来文档是否已更改。这些调用的频率由`UIDocument`决定，无法调整。通常，你不会重写`hasUnsavedChanges`。相反，你可以做以下两件事之一：通过`UIDocument`的`undoManager`属性注册`NSUndoManager`，以注册撤销/重做操作；或者每次对文档进行可跟踪更改时调用`updateChangeCount:`方法。要使你的文档与iCloud配合使用，你必须启用自动保存功能。\n\
    \n## 基于iCloud的UIDocument\n\n使用iCloud文档存储需要对正常的`UIDocument`流程进行一些调整，以使用应用程序无处不在容器中的“Documents”子目录。为了获取无处不在容器URL，将文档标识符传递给`NSFileManager`方法`URLForUbiquityContainerIdentifer:`，并传入`nil`作为参数。\n\
    \n```\nid iCloudToken = [[NSFileManager defaultManager] ubiquityIdentityToken];\n\
    if (iCloudToken) {\n       // Have iCloud Access\n       NSURL *ubiquityURL =\
    \ [[NSFileManager defaultManager] URLForUbiquityContainerIdentifier:nil];\n  \
    \     NSURL *ubiquityDocURL = [ubiquityURL URLByAppendingPathComponent:@\"Documents\"\
    ];\n}\nelse {\n       // No iCloud Access\n}\n```"
  raw: 'If your document is stored as a file bundle, you return an instance of NSFileWrapper
    rather than the NSData object for a single file. That’s all you need to do to
    ensure your data gets saved; UIDocument will handle the rest.


    UIDocument needs a file URL to determine where to read and write data. The URL
    will define the document directory, filename, and possibly file extension. The
    directory can either be a local (application sandbox) directory or a location
    in the iCloud ubiquity container. The filename should be generated by your application,
    optionally allowing the user to override the default value. While using a file
    extension might be optional, it’s probably a good idea to define one (or more)
    for your application. You pass this URL to the initWithFileURL: method of your
    UIDocument subclass to create a document instance.


    ```

    MyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];

    . . .


    [doc saveToURL:doc.fileURL forSaveOperation:UIDocumentSaveForCreating

            completionHandler:^(BOOL success){

        if (success) {

            // handle successful save

        }

        else {

            // handle failed save

        }

    }];

    ```


    Once you have created a UIDocument instance, you create the file using the saveToURL:forSaveOperation:completionHandler:
    method. You use the value UIDocumentSaveForCreating to indicate that you are saving
    the file for the first time. The completionHandler: parameter takes a block. The
    block takes a BOOL parameter to tell you if the save operation was successful
    or not.


    You don’t just need to create documents; your application may need to open and
    close existing documents. You still need to call initWithFileURL: to create a
    document instance, but then you call openWithCompletionHandler: and closeWithCompletionHandler:
    to open and close your document.


    ```

    MyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];

    . . .

    [doc openWithCompletionHandler:^(BOOL success){

        if (success) {

            // handle successful open

        }

        else {

            // handle failed open

        }

    }];

    . . .

    // work on document

    . . .

    [doc closeWithCompletionHandler:nil];

    ```


    Both methods take a block to execute on completion. Like the saveToURL:forSaveOperation:completionHandler:
    method, the block has a BOOL parameter to tell you if the open/close succeeded
    or failed. You’re not required to pass a block. In the example code above, you
    pass nil to closeWithCompletionHandler: to indicate you don’t do anything after
    the document is closed.


    To delete a document, you could simply use the NSFileManager removeItemAtURL:
    and pass in the document file URL. However, you should do what UIDocument does
    for reading and writing, and perform the delete operation in the background.


    ```

    MyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];

    . . .

    // close the document

    . . .

    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0),
    ^(void){

        NSFileCoordinator *fileCoordinator = [[NSFileCoordinator alloc] initWithFilePresenter:nil];

        [fileCoordinator coordinateWritingItemAtURL:aURL

                         options:NSFileCoordinatorWritingForDeleting

                         error:nil

                         byAccessor:^(NSURL *writingURL){

                             NSFileManager *fileManager = [[NSFileManager alloc] init];

                             [fileManager removeItemAtURL:writingURL error:nil];

                         }];

    });

    ```


    First, you dispatch the entire delete operation to a background queue via the
    dispatch_async function. Inside the background queue, you create an NSFileCoordinator
    instance. NSFileCoordinator coordinates file operations between processes and
    objects. Before any file operation is performed, it sends messages to all the
    NSFilePresenter protocol objects that have registered themselves with the file
    coordinator. Delete the document file by invoking the NSFileCoordinator method
    coordinateWritingItemAtURL:options:error:byAccessor:. The accessor is a block
    operation that defines the actual file operation you want performed. It’s passed
    an NSURL parameter, representing the location of the file. Always use the block
    parameter NSURL, not the NSURL passed to coordinateWritingItemAtURL:.


    Before performing an operation on your UIDocument subclass, you probably want
    to check the documentState property. The possible states are defined as


    *   UIDocumentStateNormal: The document is open and has no issues.

    *   UIDocumentStateClosed: The document is closed. If the document is in this
    state after opening, it indicates there may be a problem with the document.

    *   UIDocumentStateInConflict: There are versions of this document in conflict.
    You may need to write code to allow your user to resolve these conflicts.

    *   UIDocumentStateSavingError: The document could not be saved due to some error.

    *   UIDocumentStateEditingDisabled: The document cannot be edited; either your
    application or iOS will not permit it.


    You can check the document state using a simple bitwise operator.


    ```

    MyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];

    . . .

    if (doc.documentState & UIDocumentStateClosed) {

        // documentState == UIDocumentStateClosed

    }

    ```


    UIDocument also provides a notification named UIDocumentStateChangedNotification
    that you can use to register an observer.


    ```

    MyDocument *doc = [[MyDocument alloc] initWithFileURL:aURL]];

    . . .

    [[NSNotificationCenter defaultCenter] addObserver:anObserver

                                               selector:@selector(documentStateChanged:)

                                                  name:UIDocumentStateChangedNotification

                                                 object:doc]

    ```


    Your observer class would implement the method documentStateChanged: to check
    the document state and handle each state accordingly.


    In order to perform automated saves, UIDocument periodically invokes the method
    hasUnsavedChanges, which returns a BOOL depending on whether or not your document
    has changed since the last save. The frequency of these calls is determined by
    UIDocument and cannot be adjusted. Generally, you don’t override hasUnsavedChanges.
    Rather, you do one of two things: register the NSUndoManager via the UIDocument
    undoManager property to register for undo/redo operations; or call the updateChangeCount:
    method every time a trackable change is made to your document. For your document
    to work with iCloud, you must enable the automated saves feature.


    UIDocument with iCloud


    Using iCloud document storage requires an adjustment to the normal UIDocument
    process to use a Documents subdirectory of your application’s ubiquity container.
    In order to get the ubiquity container URL, you pass the document identifier into
    the NSFileManager method URLForUbiquityContainerIdentifer:, passing nil as the
    argument.


    ```

    id iCloudToken = [[NSFileManager defaultManager] ubiquityIdentityToken];

    if (iCloudToken) {

           // Have iCloud Access

           NSURL *ubiquityURL = [[NSFileManager defaultManager] URLForUbiquityContainerIdentifier:nil];

           NSURL *ubiquityDocURL = [ubiquityURL URLByAppendingPathComponent:@"Documents"];

    }

    else {

           // No iCloud Access

    }

    ```'
  trans: "\n# 文档排版\n\n如果你的文档存储为文件包，则返回`NSFileWrapper`实例，而不是单个文件的`NSData`对象。这就是确保数据被保存所需的全部操作；`UIDocument`将处理其余部分。\n\
    \n`UIDocument`需要一个文件 URL 来确定读写数据的位置。该 URL 将定义文档目录、文件名以及可能的文件扩展名。目录可以是本地（应用程序沙盒）目录，也可以是\
    \ iCloud 无处不在容器中的位置。文件名应由你的应用程序生成，并可选地允许用户覆盖默认值。虽然使用文件扩展名可能是可选的，但为你的应用程序定义一个（或多个）扩展名可能是个好主意。你可以将此\
    \ URL 传递给`UIDocument`子类的`initWithFileURL:`方法来创建文档实例。\n\n```\nMyDocument *doc =\
    \ [[MyDocument alloc] initWithFileURL:aURL]];\n. . .\n\n[doc saveToURL:doc.fileURL\
