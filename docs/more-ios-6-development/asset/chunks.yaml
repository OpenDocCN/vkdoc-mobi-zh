    cancelOperation: action.


    Queue ’em Up


    Build and run the application and take it for a spin. You probably want to run
    this one in the Simulator. Try spawning a whole bunch of operations and then watch
    them run, keeping an eye both on Xcode’s debugger console and the application
    itself. Try deleting both executing and pending operations to see how they behave.
    If you want to run the application on your phone, you might want to consider commenting
    out the NSLog() statement in the main method of SquareRootOperation.m, but if
    you do, make sure you add a few zeros on to the number of calculations to perform
    or else increase the amount of time that each operation sleeps; otherwise the
    operations will finish so fast you won’t even see the table update.


    Make note of how many running operations there are when you run it on the device
    versus the simulator. Try experimenting by setting the maximum number of concurrent
    operations in the queue and see how performance is impacted.


    This chapter was just an introduction to concurrency, but you should have enough
    of a grip on both operation queues and timers to be able to effectively use both
    techniques in your iOS applications. Once you’ve digested it all, turn the page
    and you’ll get into the final frontier: unit testing, debugging, and instruments.


    Chapter    15


    Unit Testing, Debugging, and Instruments


    One of the fundamental truths of computer programming (and life) is that not everything
    works perfectly. No matter how much you plan, and no matter how long you’ve been
    programming, it’s rare for an application you write to work perfectly the first
    time and then forever under all circumstances and possible uses. Knowing how to
    properly architect your application and write well-formed code is important. Knowing
    how to find out why things aren’t working the way they’re supposed to, and fixing
    them, is equally important.


    There are three techniques you can leverage to help identify and solve these problems:
    *unit testing* **,** *debugging* **,** and *profiling*.


    *   *Unit testing* is the idea of isolating the smallest piece of testable code
    and determining if that code behaves as expected. Each unit of code is tested
    in isolation before testing the application, which can be seen as the integration
    of all the units of code. That’s it. Apple has provided a unit-testing framework
    and integrated it into Xcode.

    *   *Debugging*, as you’re probably aware, is the task of eliminating errors,
    or *bugs*, from your application. While it may refer to any process you use to
    correct bugs, generally it means using a *debugger* to find and identify bugs
    in your code.

    *   *Profiling* is the measurement and analysis of your application while running.
    You usually perform profiling with the goal of optimizing application performance.
    Profiling can be used to monitor CPU or memory usage to help determine where your
    application is expending resources. With iOS, Apple has provided a GUI tool called
    Instruments to make application profiling easier.


    We’ll cover each of these techniques briefly. Our goal here is not to be a comprehensive
    guide for these techniques. Rather, we want to provide an introduction to these
    techniques. If you want a more detailed explanation, you may want to read *Pro
    iOS Tools: Xcode Instruments and Build Tools* (Apress, 2011).


    In this chapter, you’re not going to build and debug a complex application. Instead,
    you’re going to create a project from a template, then we’ll show you how to implement
    each technique, one at a time, by adding code to demonstrate specific problems.


    Unit Tests


    Let’s start by creating a simple project.  Open Xcode, and create a new project.
    Select the Master-Detail Application template. Call it DebugTest, and make sure
    you check the “Include Unit Tests” check box ([Figure 15-1](#9781430238072_Ch15.xhtml#Fig1)),
    along with “Use Core Data” and “Use Automatic Reference Counting.”


    ![9781430238072_Fig15-01.jpg](images/9781430238072_Fig15-01.jpg)


    [Figure 15-1.](#9781430238072_Ch15.xhtml#_Fig1)  Creating the DebugTest project
    with unit tests


    Let’s take a quick look at the project. Select the project in the Navigator pane
    and look at the resulting Project Editor ([Figure 15-2](#9781430238072_Ch15.xhtml#Fig2)).
    Notice there are two targets: the application, DebugTest, and a bundle, DebugTestTests.
    This bundle is where the unit tests you’ll be writing will reside. The DebugTestTests
    target depends on the DebugTest target (application). This means that when you
    build the unit testing bundle, it will build the application first.


    ![9781430238072_Fig15-02.jpg](images/9781430238072_Fig15-02.jpg)


    [Figure 15-2.](#9781430238072_Ch15.xhtml#_Fig2)  Two project targets: the application
    and the unit testing bundle


    How do you run your tests? If you look at the Xcode scheme pop-up menu in the
    toolbar, there is no scheme for DebugTestTests, only one for DebugTest ([Figure
    15-3](#9781430238072_Ch15.xhtml#Fig3)).


