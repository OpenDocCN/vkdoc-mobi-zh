    | --- | --- |

    | `kSecClassInternetPassword` | Internet password item |

    | `kSecClassCertificate` | Certificate item |

    | `kSecClassKey` | Cryptographic key item |

    | `kSecClassIdentity` | Identity (certificate and private key) item |


    Depending on the keychain item class value, there are a set of allowable attribute
    keys that can be used (see [Table 13-3](#9781430238072_Ch13.xhtml#Tab3)).


