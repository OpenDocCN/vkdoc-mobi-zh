    Unfortunately, there’s currently no way to retrieve the music player controller’s
    queue using public APIs. That means you will generally need to keep track of the
    queue independently of the music player controller if you want to be able to manipulate
    the queue.


    Getting or Setting the Currently Playing Media Item


    You can get or set the current song using the nowPlayingItem property. This lets
    you determine which track is already playing if you’re using the iPod music player
    controller and lets you specify a new song to play. Note that the media item you
    specify must already be in the music player controller’s queue. Here’s how you
    retrieve the currently playing item:


    ```

    MPMediaItem *currentTrack = player.nowPlayingItem;

    To switch to a different track, do this:

    player.nowPlayingItem = newTrackToPlay; // must be in queue already

    ```


    Skipping Tracks


    The music player controller allows you to skip forward one song using the method
    skipToNextItem or to skip back to the previous song using skipToPreviousItem.
    If there is no next or previous song to skip to, the music player controller stops
    playing. The music player controller also allows you to move back to the beginning
    of the current song using skipToBeginning.


    Here is an example of all three methods:


    ```

    [player skipToNextItem];

    [player skipToPreviousItem];

    [player skipToBeginning];

    ```


    Seeking


    When you’re using your iPhone, iPod touch, or iTunes to listen to music, if you
    press and hold the forward or back button, the music will start seeking forward
    or backward, playing the music at an ever-accelerating pace. This lets you, for
    example, stay in the same track, but skip over a part you don’t want to listen
    to, or skip back to something you missed. This same functionality is available
    through the music player controller using the methods beginSeekingForward and
    beginSeekingBackward. With both methods, you stop the process with a call to endSeeking.


    Here is a set of calls that demonstrate seeking forward and stopping, then seeking
    backwards and stopping:


    ```

    [player beginSeekingForward];

    [player endSeeking];


    [player beginSeekingBackward];

    [player endSeeking];

    ```


    Playback Time


    Not to be confused with payback time (something we’ve dreamt of for years, ever
    since they replaced the excellent Dick York with the far blander Dick Sargent),
    playback time specifies how far into the current song you currently are. If the
    current song has been playing for five seconds, then the playback time will be
    5.0.


    You can retrieve and set the current playback time using the property currentPlaybackTime.
    You might use this, for example, when using an application music player controller,
    to resume a song at exactly the point where it was stopped when the application
    was last quit. Here’s an example of using this property to skip forward ten seconds
    in the current song:


    ```

    NSTimeInterval currentTime = player.currentPlaybackTime;

    MPMediaItem *currentSong = player.nowPlayingItem;

    NSNumber *duration = [currentSong valueForProperty:

    MPMediaItemPropertyPlaybackDuration];

    currentTime += 10.0;

    if (currentTime > [duration doubleValue])

        currentTime = [duration doubleValue];

    player.currentPlaybackTime = currentTime;

    ```


    Notice that you check the duration of the currently playing song to make sure
    you don’t pass in an invalid playback time.


    Repeat and Shuffle Modes


    Music player controllers have ordered queues of songs and, most of the time, they
    play those songs in the order they exist in the queue, playing from the beginning
    of the queue to the end and then stopping. Your user can change this behavior
    by setting the repeat and shuffle properties in the iPod or Music application.
    You can also change the behavior by setting the music player controller’s repeat
    and shuffle modes, represented by the properties repeatMode and shuffleMode. There
    are four repeat modes:


    *   MPMusicRepeatModeDefault: Uses the repeat mode last used in the iPod or Music
    application.

    *   MPMusicRepeatModeNone: Don’t repeat at all. When the queue is done, stop playing.

    *   MPMusicRepeatModeOne: Keep repeating the currently playing track until your
    user goes insane. Ideal for playing “It’s a Small World.”

    *   MPMusicRepeatModeAll: When the queue is done, start over with the first track.


    There are also four shuffle modes:


    *   MPMusicShuffleModeDefault: Use the shuffle mode last used in the iPod or Music
    application.

    *   MPMusicShuffleModeOff: Don’t shuffle at all—just play the songs in the queue
    order.

    *   MPMusicShuffleModeSongs: Play all the songs in the queue in random order.

    *   MPMusicShuffleModeAlbums: Play all the songs from the currently playing song’s
    album in random order.


    Here is an example of turning off both repeat and shuffle:


    ```

        player.repeatMode = MPMusicRepeatNone;

        player.shuffleMode = MPMusicShuffleModeOff;

    ```


    Adjusting the Music Player Controller’s Volume


    The music player controller lets you manipulate the volume at which it plays the
    items in its queue. The volume can be adjusted using the property volume, which
    is a clamped floating-point value. Clamped values store numbers between 0.0 and
    1.0\. In the case of volume, setting the property to 1.0 means play the tracks
    at the maximum volume, and a value of 0.0 means turn off the volume. Any value
    between those two extremes represents a different percentage of the maximum volume,
    so setting volume to 0.5 is like turning a volume knob halfway up.


    **Caution**  Setting volume to 1.1 will not make the volume any louder than setting
    it to 1.0\. Despite what Nigel might have told you, you can’t set the volume to
    11.


    Here’s how you set a player to maximum volume:


    ```

    player.volume = 1.0;

    ```


    And here’s how you set the volume to its midpoint:


    ```

    player.volume = 0.5;

    ```


    Music Player Controller Notifications


    Music player controllers are capable of sending out notifications when any of
    three things happen:


    *   When the playback state (playing, stopped, paused, seeking, etc.) changes,
    the music player controller can send out the MPMusicPlayerControllerPlaybackStateDidChangeNotification
    notification.

    *   When the volume changes, it can send out the MPMusicPlayerControllerVolumeDidChangeNotification
    notification.

    *   When a new track starts playing, it can send out the MPMusicPlayerControllerNowPlayingItemDidChangeNotification
    notification.


    Note that music player controllers don’t send any notifications by default. You
    must tell an instance of MPMusicPlayerController to start generating notifications
    by calling the method beginGeneratingPlaybackNotifications. To have the controller
    stop generating notifications, call the method endGeneratingPlaybackNotifications.


    If you need to receive any of these notifications, you first implement a handler
    method that takes one argument, an NSNotification *, and then register with the
    notification center for the notification of interest. For example, if you want
    a method to fire whenever the currently playing item changed, you could implement
    a method called nowPlayingItemChanged:, like so:


    ```

    - (void)nowPlayingItemChanged:(NSNotification *)notification {

        NSLog(@"A new track started");

    }

    ```


    To start listening for those notifications, you could register with the notification
    for the type of notification you’re interested in, and then have that music player
    controller start generating the notifications:'
