- fmt: 'You will then use Map Kit’s reverse geocoder to determine the address of your
    current location and you’ll add an annotation to the map to display the specifics
    of that location.


    Despite its simplicity, this application leverages most of the basic Map Kit functionality.
    Before you start building your project, let’s explore Map Kit and see what makes
    it tick.


    ## Overview and Terminology


    Although Map Kit is not particularly complex, it can be a bit confusing. Let’s
    start with a high-level view and nail down the terminology, then you can dig down
    into the individual components.


    To display map-related data, you add a map view to one of your application’s views.
    Map views can have a delegate, and that delegate is usually the controller class
    responsible for the view in which the map view resides. That’s the approach you’ll
    use for this chapter’s application. Your application will have a single view and
    a single view controller. That single view will contain a map view, along with
    a few other items, and your single view controller will be the map view’s delegate.


    Map views keep track of locations of interest using a collection of annotations.
    Any time you see an icon on a map, whether it’s a pin, a dot, or anything else,
    it’s an annotation. When an annotation is in the part of the map that’s being
    shown, the map view asks its delegate to provide a view for that annotation (called
    an annotation view) that the map view will draw at the specific location on the
    map.


    Annotations are selectable, and a selected annotation will display a callout,
    which is a small view that floats above the map like the *You are Here!* view
    shown in [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2). If the user taps an annotation
    view and that annotation view is selectable, the map view will display the callout
    associated with that view.


    ## The Map View


    The core element of the Map Kit framework is the map view represented by the class
    `MKMapView`. The map view takes care of drawing the maps and responding to user
    input. Users can use all the gestures they’re accustomed to, including a pinch
    in or out to do a controlled zoom, a double-tap to zoom in, or a two-finger double
    tap to zoom out. You can add a map view to your interface and configure it using
    Interface Builder. Like many iOS controls, much of the work of managing the map
    view is done by the map view’s delegate.


    ### Map Types


    Map views are capable of displaying maps in several different ways. They can display
    the map as a series of lines and symbols that represent the roadways and other
    landmarks in the area being shown. This is the default display, and it’s known
    as the standard map type. You can also display the map using satellite images
    by specifying the satellite map type, or you can use what’s called the hybrid
    map type where the lines representing roadways and landmarks from the standard
    type are superimposed on top of the satellite imagery of the satellite type. You
    can see an example of the default map type in [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2).
    [Figure 10-3](#9781430238072_Ch10.xhtml#Fig3) shows the satellite map type and
    [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4) shows the hybrid map type.


    ![9781430238072_Fig10-03.jpg](images/9781430238072_Fig10-03.jpg)


    [Figure 10-3.](#9781430238072_Ch10.xhtml#_Fig3) The satellite map type shows satellite
    imagery instead of lines and symbols


    ![9781430238072_Fig10-04.jpg](images/9781430238072_Fig10-04.jpg)


    [Figure 10-4.](#9781430238072_Ch10.xhtml#_Fig4) The hybrid type overlays the lines
    and symbols of the default type on top of the imagery from the satellite type


    You can set the map type in Interface Builder or by setting the map view’s `mapType`
    property to one of the following:


    ```

    mapView.mapType = MKMapTypeStandard;

    mapView.mapType = MKMapTypeSatellite;

    mapView.mapType = MKMapTypeHybrid;

    ```


    ### User Location


    Map views will, if configured to do so, use Core Location to keep track of the
    user’s location and display it on the map using a blue dot, much like the way
    the Maps application does. You won’t be using that functionality in this chapter’s
    application, but you can turn it on by setting the map view’s `showsUserLocation`
    property to `YES`, like so:


    ```

    mapView.showsUserLocation = YES;

    ```


    If the map is tracking the user’s location, you can determine if their present
    location is visible in the map view by using the read-only property `userLocationVisible`.
    If the user’s current location is being displayed in the map view, `userLocationVisible`
    will return `YES`.


    You can get the specific coordinates of the user’s present location from the map
    view by first setting `showsUserLocation` to `YES` and then accessing the `userLocation`
    property. This property returns an instance of `MKUserLocation`. `MKUserLocation`
    is an object and has a property called `location`, which itself is a `CLLocation`
    object. A `CLLocation` contains a property called `coordinate` that points to
    a set of coordinates. All this means you can get the actual coordinates from the
    `MKUserLocation` object, like so:


    ```

    CLLocationCoordinate2D coords = mapView.userLocation.location.coordinate;

    ```


    ### Coordinate Regions


    A map view wouldn’t be much good if you couldn’t tell it what to display or find
    out what part of the world it’s currently showing. With map views, the key to
    being able to do those tasks is the `MKCoordinateRegion`, a struct that contains
    two pieces of data that together define the portion of the map to be shown in
    a map view.


    The first member of `MKCoordinateRegion` is called `center`. This is another struct
    of type `CLLocationCoordinate2D`, which you may remember from the chapter on Core
    Location in *Beginning iOS 6 Development* by Jack Nutting, David Mark, and Jeff
    LaMarche (Apress, 2013). A `CLLocationCoordinate2D` contains two floating point
    values, a latitude and longitude, and is used to represent a single spot on the
    globe. In the context of a coordinate region, that spot on the globe is the spot
    that represents the center of the map view.


    The second member of `MKCoordinateRegion` is called `span`, and it’s a struct
    of type `MKCoordinateSpan`. The `MKCoordinateSpan` struct has two members called
    `latitudeDelta` and `longitudeDelta`. These two numbers are used to set the zoom
    level of the map by identifying how much of the area around `center` should be
    displayed. These values represent that distance in degrees latitude and longitude.
    If `latitudeDelta` and `longitudeDelta` are small numbers, the map will be zoomed
    in very close; if they are large, the map will be zoomed out and show a much larger
    area.


    [Figure 10-5](#9781430238072_Ch10.xhtml#Fig5) shows the makeup of the `MKCoordinateRegion`
    struct.


    ![9781430238072_Fig10-05.jpg](images/9781430238072_Fig10-05.jpg)


    [Figure 10-5.](#9781430238072_Ch10.xhtml#_Fig5) The `MKCoordinateRegion` represented
    graphically. It contains two members, both of which are, in turn, structs that
    own two members


    If you look back at [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2), the point of
    the pin you can see is at the coordinates that were passed in `MKCoordinateRegion.center`.
    The distance from the top of the map to the bottom of the map was passed in, represented
    as degrees latitude, using the `MKCoordinateRegion.span.latitudeDelta`. Similarly,
    the distance from the left side of the map to the right side of the map was passed
    in, represented as degrees longitude, as the `MKCoordinateRegion.span.longitudeDelta`.


    **Tip** If you have trouble remembering which lines are latitude and which are
    longitude, here’s a tip from our third grade geography teacher, Mrs. Krabappel
    (pronounced kruh-bopple). Latitude sounds like altitude, so latitude tells you
    how high on the globe you are. The equator is a line of latitude. And the Prime
    Meridian is a line of longitude. Thanks, Mrs. Krabappel!'
  raw: 'You will then use Map Kit’s reverse geocoder to determine the address of your
    current location and you’ll add an annotation to the map to display the specifics
    of that location.


    Despite its simplicity, this application leverages most of the basic Map Kit functionality.
    Before you start building your project, let’s explore Map Kit and see what makes
    it tick.


    Overview and Terminology


    Although Map Kit is not particularly complex, it can be a bit confusing. Let’s
    start with a high-level view and nail down the terminology, then you can dig down
    into the individual components.


    To display map-related data, you add a map view to one of your application’s views.
    Map views can have a delegate, and that delegate is usually the controller class
    responsible for the view in which the map view resides. That’s the approach you’ll
    use for this chapter’s application. Your application will have a single view and
    a single view controller. That single view will contain a map view, along with
    a few other items, and your single view controller will be the map view’s delegate.


    Map views keep track of locations of interest using a collection of *annotations*.
    Any time you see an icon on a map, whether it’s a pin, a dot, or anything else,
    it’s an annotation. When an annotation is in the part of the map that’s being
    shown, the map view asks its delegate to provide a view for that annotation (called
    an *annotation view*) that the map view will draw at the specific location on
    the map.


    Annotations are selectable, and a selected annotation will display a *callout*,
    which is a small view that floats above the map like the You are Here! view shown
    in [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2). If the user taps an annotation
    view and that annotation view is selectable, the map view will display the callout
    associated with that view.


    The Map View


    The core element of the Map Kit framework is the *map view* represented by the
    class MKMapView. The map view takes care of drawing the maps and responding to
    user input. Users can use all the gestures they’re accustomed to, including a
    pinch in or out to do a controlled zoom, a double-tap to zoom in, or a two-finger
    double tap to zoom out. You can add a map view to your interface and configure
    it using Interface Builder. Like many iOS controls, much of the work of managing
    the map view is done by the map view’s delegate.


    Map Types


    Map views are capable of displaying maps in several different ways. They can display
    the map as a series of lines and symbols that represent the roadways and other
    landmarks in the area being shown. This is the default display, and it’s known
    as the *standard map type*. You can also display the map using satellite images
    by specifying the *satellite map type*, or you can use what’s called the *hybrid
    map type*where the lines representing roadways and landmarks from the standard
    type are superimposed on top of the satellite imagery of the satellite type. You
    can see an example of the default map type in [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2).
    [Figure 10-3](#9781430238072_Ch10.xhtml#Fig3) shows the satellite map type and
    [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4) shows the hybrid map type.


    ![9781430238072_Fig10-03.jpg](images/9781430238072_Fig10-03.jpg)


    [Figure 10-3.](#9781430238072_Ch10.xhtml#_Fig3)  The satellite map type shows
    satellite imagery instead of lines and symbols


    ![9781430238072_Fig10-04.jpg](images/9781430238072_Fig10-04.jpg)


    [Figure 10-4.](#9781430238072_Ch10.xhtml#_Fig4)  The hybrid type overlays the
    lines and symbols of the default type on top of the imagery from the satellite
    type


    You can set the map type in Interface Builder or by setting the map view’s mapType
    property to one of the following:


    ```

    mapView.mapType = MKMapTypeStandard;

    mapView.mapType = MKMapTypeSatellite;

    mapView.mapType = MKMapTypeHybrid;

    ```


    User Location


    Map views will, if configured to do so, use Core Location to keep track of the
    user’s location and display it on the map using a blue dot, much like the way
    the Maps application does. You won’t be using that functionality in this chapter’s
    application, but you can turn it on by setting the map view’s showsUserLocation
    property to YES, like so:


    ```

    mapView.showsUserLocation = YES;

    ```


    If the map is tracking the user’s location, you can determine if their present
    location is visible in the map view by using the read-only property userLocationVisible.
    If the user’s current location is being displayed in the map view, userLocationVisible
    will return YES.


    You can get the specific coordinates of the user’s present location from the map
    view by first setting showsUserLocation to YES and then accessing the userLocation
    property. This property returns an instance of MKUserLocation. MKUserLocation
    is an object and has a property called location, which itself is a CLLocation
    object. A CLLocation contains a property called coordinate that points to a set
    of coordinates. All this means you can get the actual coordinates from the MKUserLocation
    object, like so:


    ```

    CLLocationCoordinate2D coords = mapView.userLocation.location.coordinate;

    ```


    Coordinate Regions


    A map view wouldn’t be much good if you couldn’t tell it what to display or find
    out what part of the world it’s currently showing. With map views, the key to
    being able to do those tasks is the MKCoordinateRegion, a struct that contains
    two pieces of data that together define the portion of the map to be shown in
    a map view.


    The first member of MKCoordinateRegion is called center. This is another struct
    of type CLLocationCoordinate2D, which you may remember from the chapter on Core
    Location in *Beginning iOS 6 Development* by Jack Nutting, David Mark, and Jeff
    LaMarche (Apress, 2013). A CLLocationCoordinate2D contains two floating point
    values, a latitude and longitude, and is used to represent a single spot on the
    globe. In the context of a coordinate region, that spot on the globe is the spot
    that represents the center of the map view.


    The second member of MKCoordinateRegion is called span, and it’s a struct of type
    MKCoordinateSpan. The MKCoordinateSpan struct has two members called latitudeDelta
    and longitudeDelta. These two numbers are used to set the zoom level of the map
    by identifying how much of the area around center should be displayed. These values
    represent that distance in degrees latitude and longitude. If latitudeDelta and
    longitudeDelta are small numbers, the map will be zoomed in very close; if they
    are large, the map will be zoomed out and show a much larger area.


    [Figure 10-5](#9781430238072_Ch10.xhtml#Fig5) shows the makeup of the MKCoordinateRegion
    struct.


    ![9781430238072_Fig10-05.jpg](images/9781430238072_Fig10-05.jpg)


    [Figure 10-5.](#9781430238072_Ch10.xhtml#_Fig5)  The MKCoordinateRegion represented
    graphically. It contains two members, both of which are, in turn, structs that
    own two members


    If you look back at [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2), the point of
    the pin you can see is at the coordinates that were passed in MKCoordinateRegion.center.
    The distance from the top of the map to the bottom of the map was passed in, represented
    as degrees latitude, using the MKCoordinateRegion.span.latitudeDelta. Similarly,
    the distance from the left side of the map to the right side of the map was passed
    in, represented as degrees longitude, as the MKCoordinateRegion.span.longitudeDelta.


    **Tip**  If you have trouble remembering which lines are latitude and which are
    longitude, here’s a tip from our third grade geography teacher, Mrs. Krabappel
    (pronounced kruh-bopple). Latitude sounds like altitude, so latitude tells you
    how high on the globe you are. The equator is a line of latitude. And the Prime
    Meridian is a line of longitude. Thanks, Mrs. Krabappel!'
  trans: '

    接着，你将使用 Map Kit 的反向地理编码器来确定你当前位置的地址，并在地图上添加一个标注来显示该位置的具体信息。


    尽管这个应用很简单，但它利用了 Map Kit 的大部分基本功能。在开始构建项目之前，让我们先探索 Map Kit，看看它是如何运作的。


    ## 概览与术语


    虽然 Map Kit 并不是特别复杂，但它可能会让人有些困惑。让我们先从一个高层次的角度来了解，并明确相关术语，然后你再深入研究各个组件。


    要显示地图相关数据，你需要在应用的某个视图中添加一个地图视图。地图视图可以有一个委托，这个委托通常是负责管理地图视图所在视图的控制器类。这也是本章应用程序所采用的方法。你的应用将只有一个视图和一个视图控制器。这个单独的视图将包含一个地图视图以及其他一些元素，而你的单个视图控制器将成为地图视图的委托。


    地图视图通过**标注（annotations）**集合来跟踪感兴趣的位置。无论你在地图上看到的是图钉、圆点还是其他任何图标，它都是一个标注。当标注位于正在显示的地图区域内时，地图视图会要求其委托为该标注提供一个视图（称为标注视图），地图视图将在地图上的特定位置绘制该视图。


    标注是可选的，选中的标注会显示一个**弹出框（callout）**，这是一个悬浮在地图上方的小视图，就像图 10-2 中显示的 *你在这里！* 视图一样。如果用户点击了一个标注视图，并且该标注视图是可选的，地图视图将显示与该视图关联的弹出框。


    ## 地图视图


    Map Kit 框架的核心元素是由 `MKMapView` 类表示的地图视图。地图视图负责绘制地图并响应用户输入。用户可以使用他们习惯的所有手势，包括捏合缩放、双击放大或双指双击缩小。你可以将地图视图添加到界面中，并使用
    Interface Builder 进行配置。与许多 iOS 控件一样，管理地图视图的大部分工作由其委托完成。


    ### 地图类型


    地图视图能够以多种不同的方式显示地图。它们可以将地图显示为一系列线条和符号，代表当前显示区域的道路和其他地标。这是默认的显示方式，称为**标准地图类型**。你也可以通过指定**卫星地图类型**来使用卫星图像显示地图，或者使用所谓的**混合地图类型**，即标准类型的道路和地标线条叠加在卫星类型的卫星图像之上。你可以在图
    10-2 中看到默认地图类型的示例。图 10-3 展示了卫星地图类型，而图 10-4 展示了混合地图类型。


    ![9781430238072_Fig10-03.jpg](img/9781430238072_Fig10-03.jpg)


    图 10-3. 卫星地图类型显示卫星图像而非线条和符号


    ![9781430238072_Fig10-04.jpg](img/9781430238072_Fig10-04.jpg)


    图 10-4. 混合地图类型将默认类型的线条和符号叠加在卫星类型的图像之上


    你可以在 Interface Builder 中设置地图类型，或者将地图视图的 `mapType` 属性设置为以下值之一：


    ```

    mapView.mapType = MKMapTypeStandard;

    mapView.mapType = MKMapTypeSatellite;

    mapView.mapType = MKMapTypeHybrid;

    ```


    ### 用户位置


    如果配置得当，地图视图将使用 Core Location 来跟踪用户的位置，并用蓝色圆点在地图上显示，这与地图应用的方式非常相似。在本章的应用中你不会用到这个功能，但你可以通过将地图视图的
    `showsUserLocation` 属性设置为 `YES` 来开启它，如下所示：


    ```

    mapView.showsUserLocation = YES;

    ```


    如果地图正在跟踪用户的位置，你可以使用只读属性 `userLocationVisible` 来确定用户当前位置是否在地图视图中可见。如果用户的当前位置正在地图视图中显示，`userLocationVisible`
    将返回 `YES`。


    你可以从地图视图中获取用户当前位置的具体坐标，方法是先将 `showsUserLocation` 设置为 `YES`，然后访问 `userLocation`
    属性。该属性返回一个 `MKUserLocation` 实例。`MKUserLocation` 是一个对象，有一个名为 `location` 的属性，该属性本身是一个
    `CLLocation` 对象。`CLLocation` 包含一个名为 `coordinate` 的属性，指向一组坐标。这意味着你可以像下面这样从 `MKUserLocation`
    对象中获取实际的坐标：


    ```

    CLLocationCoordinate2D coords = mapView.userLocation.location.coordinate;

    ```


    ### 坐标区域


    如果你不能告诉地图视图要显示什么，或者不能找出它当前显示的是世界的哪一部分，那么地图视图就没有多大用处。对于地图视图，完成这些任务的关键是 `MKCoordinateRegion`，这是一个结构体，包含两条数据，它们共同定义了要在地图视图中显示的地图区域。


    `MKCoordinateRegion` 的第一个成员叫做 `center`。这是另一个类型为 `CLLocationCoordinate2D` 的结构体，你可能还记得它在《Beginning
    iOS 6 Development》（Jack Nutting、David Mark 和 Jeff LaMarche 著，Apress，2013 年）一书中关于
    Core Location 的章节中出现过。`CLLocationCoordinate2D` 包含两个浮点值，一个纬度和一个经度，用于表示地球上的一个点。在坐标区域的上下文中，这个点表示地图视图的中心点。


    `MKCoordinateRegion` 的第二个成员叫做 `span`，它是一个类型为 `MKCoordinateSpan` 的结构体。`MKCoordinateSpan`
    结构体有两个成员，叫做 `latitudeDelta` 和 `longitudeDelta`。这两个数字通过标识应显示 `center` 周围多大的区域来设置地图的缩放级别。这些值以纬度和经度度数表示距离。如果
    `latitudeDelta` 和 `longitudeDelta` 是比较小的数字，地图将放大得很近；如果它们比较大，地图将缩小并显示更广阔的区域。


    图 10-5 展示了 `MKCoordinateRegion` 结构体的构成。


    ![9781430238072_Fig10-05.jpg](img/9781430238072_Fig10-05.jpg)


    图 10-5. `MKCoordinateRegion` 的图形化表示。它包含两个成员，这两个成员本身也是各拥有两个成员的结构体


    如果你回头看看图 10-2，你看到图钉的尖端位于通过 `MKCoordinateRegion.center` 传入的坐标点。地图顶部到底部的距离通过 `MKCoordinateRegion.span.latitudeDelta`
    传入，以纬度度数表示。同样地，地图左侧到右侧的距离通过 `MKCoordinateRegion.span.longitudeDelta` 传入，以经度度数表示。


    **提示** 如果你记不住哪条线是纬度，哪条线是经度，这里有一个来自我们三年级地理老师克拉巴佩尔夫人（Krabappel，发音为 kruh-bopple）的小窍门。纬度（latitude）听起来像海拔高度（altitude），所以纬度告诉你在球体上的高度。赤道是一条纬线。而本初子午线是一条经线。感谢克拉巴佩尔夫人！

