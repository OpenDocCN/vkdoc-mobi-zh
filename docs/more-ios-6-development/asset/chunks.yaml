    break the network connection between the devices. We’ll talk more about debugging
    in [Chapter 15](#9781430238072_Ch15.xhtml).


    Game On!


    Another long chapter under your belt, and you should now have a pretty firm understanding
    of Game Kit networking. You saw how to use the peer picker to let your user select
    another iPhone or iPod touch to which to connect. You saw how to send data by
    archiving objects, and you got a little taste of the complexity that is introduced
    to your application when you start adding in network multiuser functionality.


    Chapter    10


    Map Kit


    iPhones have always had a way to determine where in the world they are. Even though
    the original iPhone didn’t have GPS, it did have a Maps application and was able
    to represent its approximate location on the map using cell phone triangulation
    or by looking up its WiFi IP address in a database of known locations. In the
    beginning of iOS development, there was no way to leverage this functionality
    within your own applications. It was possible to launch the Maps application to
    show a specific location or route, but it wasn’t possible, using only Apple-provided
    APIs, to show map data without leaving your application.


    That changed with the Map Kit. Applications now have the ability to show maps,
    including the user’s current location, and even drop pins and show annotations
    on those maps. Map Kit’s functionality isn’t limited to just showing maps, either.
    It includes a feature called *reverse geocoding*, which allows you to take a set
    of specific coordinates and turn them into a physical address. Your application
    can use those coordinates to find out not just where the person is located but,
    frequently, the actual address associated with that location. You can’t always
    get down to the street address, but you can almost always get the city and state
    or province no matter where in the world your user is. In this chapter, we’re
    going to look at the basics of adding Map Kit functionality to any application.


    **Note**  The application you build in this chapter will run just fine in the
    iPhone Simulator; however, the Simulator won’t report your actual location. Instead,
    it returns the address of Apple’s San Francisco Store at Stockton Street in San
    Francisco, California. You can change the location the Simulator uses via the
    Location Simulator on the Debug pane jump bar in Xcode.


