- fmt: '### What You Need To Know


    This book assumes that you already have some programming knowledge and that you
    have a basic understanding of the iOS SDK, either because you’ve worked through
    *Beginning iOS 6 Development* or because you’ve gained a similar foundation from
    other sources. We assume that you’ve experimented a little with the SDK, perhaps
    written a small program or two on your own, and have a general feel for Xcode.
    You might want to quickly review [Chapter 2](#9781430238072_Ch02.xhtml) of *Beginning
    iOS Development*.


    #### COMPLETELY NEW TO IOS?


    If you are completely new to iOS development, there are other books you probably
    should read before this one. If you don’t already understand the basics of programming
    and the syntax of the C language, you should check out *Learn C on the Mac for
    OS X and iOS* by David Mark and James Bucanek (Apress, 2012), which is a comprehensive
    introduction to the C language for Macintosh programmers (`www.apress.com/9781430245339`).


    If you already understand C but don’t have any experience programming with objects,
    check out *Learn Objective-C on the Mac* (Apress, 2012), an excellent and approachable
    introduction to Objective-C by Mac programming experts Scott Knaster, Wagar Malik,
    and Mark Dalrymple (`www.apress.com/9781430218159`).


    Next, navigate over to the Apple iPhone Development Center and download a copy
    of *The Objective-C 2.0 Programming Language*, a very detailed and extensive description
    of the language and a great reference guide at `http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/ObjectiveC/Introduction/introObjectiveC.html`.


    Once you have a firm handle on Objective-C, you need to master the fundamentals
    of the iOS SDK. For that, you should check out the prequel to this book, *Beginning
    iOS 6 Development: Exploring the iOS SDK* by David Mark, Jack Nutting, Jeff LaMarche,
    and Fredrik Olsson (Apress 2011, `www.apress.com/9781430245124`).


    ### What You Need Before You Can Begin


    Before you can write software for iOS devices, you need a few things. For starters,
    you need an Intel-based Macintosh running Lion (Mac OS X 10.7 or later). Any Macintosh
    computer—laptop or desktop—that has been released since 2008 should work just
    fine, but make sure your machine is Intel-based and is capable of running Lion.


    This may seem obvious, but you’ll also need an iPhone (3GS or later), iPod touch
    (3^rd generator or later), or an iPad (iPad 2 or later). While much of your code
    can be tested using the iPhone/iPad simulator, not all programs will run in the
    simulator. And you’ll want to thoroughly test any application you create on an
    actual device before you ever consider releasing it to the public.


    Finally, you’ll need to sign up to become a Registered iOS Developer. If you’re
