- fmt: "# Build and Run the App\n\nBuild and run the app. Navigate to the detail view\
    \ and enter Edit mode. Try to tap on the Age cell. You can’t because it’s not\
    \ editable.\n\n# Creating a Color Table View Cell\n\nNow that you’ve completed\
    \ your color value transformer, let’s think about how you can enter your hero’s\
    \ favorite color. Look back at [Figure 6-1](#9781430238072_Ch06.xhtml#Fig1). You\
    \ have a table view cell that displays a band of your hero’s favorite color. When\
    \ the user chooses the favorite color cell in Edit mode, you want to display a\
    \ color picker ([Figure 6-2](#9781430238072_Ch06.xhtml#Fig2)). The color picker\
    \ is not available via the iOS SDK, like the date and value pickers you used in\
    \ [Chapter 4](#9781430238072_Ch04.xhtml). You’re going to have to build one from\
    \ scratch.\n\n## Custom Color Editor\n\nSingle-click the `SuperDB` folder in the\
    \ navigation pane, and create a new Objective-C class. When prompted, name the\
    \ class `UIColorPicker` and make it a subclass of `UIControl`. `UIControl` is\
    \ the base class for control objects like buttons and sliders. Here you define\
    \ a subclass of `UIControl` that encapsulates four sliders. The only property\
    \ you need `UIColorPicker` to declare is its `color`.\n\n```\n@property (strong,\
    \ nonatomic) UIColor *color;\n```\n\nEvery other property can be declared privately\
    \ in a category in the implementation file, `UIColorPicker.m`.\n\n```\n@interface\
    \ UIColorPicker ()\n@property (strong, nonatomic) UISlider *redSlider;\n@property\
    \ (strong, nonatomic) UISlider *greenSlider;\n@property (strong, nonatomic) UISlider\
    \ *blueSlider;\n@property (strong, nonatomic) UISlider *alphaSlider;\n- (IBAction)sliderChanged:(id)sender;\n\
    - (UILabel *)labelWithFrame:(CGRect)frame text:(NSString *)text;\n@end\n```\n\n\
    You also declared two (private) methods. One is the callback for when the sliders\
    \ change (`sliderChanged:`). The other is a convenience method for creating the\
    \ picker view.\n\nXcode should have created an `initWithFrame:` method for your\
    \ `UIColorPicker` class. Add the following initialization code:\n\n```\n     \
    \   self.autoresizingMask = UIViewAutoresizingFlexibleHeight | UIViewAutoresizingFlexibleWidth;\n\
    \n[self addSubview:[self labelWithFrame:CGRectMake(20.0, 40.0,  60, 24) text:@\"\
    Red\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0, 80.0,\
    \  60, 24) text:@\"Green\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
    \ 120.0, 60, 24) text:@\"Blue\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
    \ 160.0, 60, 24) text:@\"Alpha\"]];\n\n_redSlider   = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 40.0,  190, 24)];\n        _greenSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 80.0,  190, 24)];\n        _blueSlider  = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 120.0, 190, 24)];\n        _alphaSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
    \ 160.0, 190, 24)];\n\n[_redSlider addTarget:self\n                        action:@selector(sliderChanged:)\n\
    \              forControlEvents:UIControlEventValueChanged];\n        [_greenSlider\
    \ addTarget:self\n                          action:@selector(sliderChanged:)\n\
    \                forControlEvents:UIControlEventValueChanged];\n        [_blueSlider\
    \ addTarget:self\n                         action:@selector(sliderChanged:)\n\
    \               forControlEvents:UIControlEventValueChanged];\n        [_alphaSlider\
    \ addTarget:self\n                          action:@selector(sliderChanged:)\n\
    \                forControlEvents:UIControlEventValueChanged];\n\n[self addSubview:_redSlider];\n\
