    \ *titlePredicate =\n    [MPMediaPropertyPredicate predicateWithValue:@\"Happy\
    \ Birthday\"\n                                      forProperty:MPMediaItemPropertyTitle\n\
    \                                   comparisonType:MPMediaPredicateComparisonContains];\n\
    ```\n\nThe first value you pass—in this case, `@\"Happy Birthday\"`—is the comparison\
    \ value. The second value is the filterable property you want that comparison\
    \ value compared to. By specifying `MPMediaItemPropertyTitle`, you’re saying you\
    \ want the song titles compared to the string \"Happy Birthday\". The last item\
    \ specifies the type of comparison to do. You can pass `MPMediaPredicateComparisonEqualTo`\
    \ to look for an exact match to the specified string, or `MPMediaPredicateComparisonContains`\
    \ to look for any item that contains the passed value as a substring.\n\n**Note:**\
