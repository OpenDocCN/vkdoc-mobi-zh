  raw: 'Resetting the board involves removing the images from all of the buttons that
    represent spaces on the game board. Rather than declare nine outlets—one to point
    at each button—you just loop through the nine tag values and retrieve the buttons
    from your content view using viewWithTag:. You also blank out the feedback label.
    And you send a packet to the other node telling it that you’re resetting. This
    is done just to make sure that if you follow up with another die roll, the other
    machine knows not to overwrite it. The fact that network communication happens
    asynchronously means you can’t rely on things always happening in a specific order,
    as you can with a program running on only one device. It’s possible that you’ll
    send the die roll before the other device has finished determining who won. By
    sending a reset packet, you tell the other node that there may be another die
    roll coming for a new game, so make sure it’s in the right state to accept that
    new roll. If you didn’t do something like this, it might store your die roll,
    and then overwrite the rolled value when it resets its own board, which would
    cause a hang because the other device would then be waiting for a die roll that
    would never arrive. You also need to reset the player’s game piece. Because the
    game is over, you don’t know if the player will be X or O for the next game.


    ```

    - (void)resetBoard

    {

        for (int i = kUpperLeft; i <= kLowerRight; i++) {

            UIButton *aButton = (UIButton *)[self.view viewWithTag:i];

            [aButton setImage:nil forState:UIControlStateNormal];

        }

        self.feedbackLabel.text = @"";

        Packet *packet = [[Packet alloc] initResetPacket];

        [self sendPacket:packet];

        _playerPiece = kPlayerPieceUndecided;

    }

    ```


    Resetting the die state is nothing more than setting dieRollReceived and dieRollAcknowledged
    to NO, and setting both your die roll and the opponent’s die roll to kDiceNotRolled.


    ```

    - (void)resetDieState

    {

        _dieRollReceived = NO;

        _dieRollAcknowledged = NO;

        _myDieRoll = kDiceNotRolled;

        _opponentDieRoll = kDiceNotRolled;

    }

    ```


    startGame is called once you have received your opponent’s die roll and have also
    gotten an acknowledgment that it has received yours. First, you make sure that
    you don’t have a tie. If you do have a tie, you kick off the die-rolling process
    again. Otherwise, you set state, piece, and the feedbackLabel’s text based on
    whether it’s your turn or the opponent’s turn to go first. Then you reset the
    die state. It may seem odd to do it here, but at this point, you’re finished with
    the die rolling for this game, and because you may receive your opponent’s die
    roll before your code has realized the game is over, you reset now to ensure that
    the die rolls are not accidentally reused in the next game.


    ```

    - (void)startGame

    {

        if (_myDieRoll == _opponentDieRoll) {

            _myDieRoll = kDiceNotRolled;

            _opponentDieRoll = kDiceNotRolled;

            [self sendDieRoll];

            _playerPiece = kPlayerPieceUndecided;

        }

        else if (_myDieRoll < _opponentDieRoll) {

            _state = kGameStateYourTurn;

            _playerPiece = kPlayerPieceX;

            self.feedbackLabel.text = NSLocalizedString(@"Opponent''s Turn", @"Opponent''s
    Turn");


    }

        else {

            _state = kGameStateMyTurn;

            _playerPiece = kPlayerPieceO;

            self.feedbackLabel.text = NSLocalizedString(@"Your Turn", @"Your Turn");

        }

        [self resetDieState];

    }

    ```


    sendDieRoll: checks your die roll property. If you haven’t rolled yet, it initializes
    a Packet that rolls the die for you and sets your die roll to the value of the
    packet’s die roll. If you have a die roll, you initialize a Packer with that die
    roll value. Finally, you send the die roll Packet off to your opponent.


    ```

    - (void)sendDieRoll

    {

        Packet *rollPacket;

        _state = kGameStateRollingDice;

        if (_myDieRoll == kDiceNotRolled) {

            rollPacket = [[Packet alloc] initDieRollPacket];

            _myDieRoll = rollPacket.dieRoll;

        }

        else {

            rollPacket = [[Packet alloc] initDieRollPacketWithRoll:_myDieRoll];

        }

        [self sendPacket:rollPacket];


    }

    ```


    sendPacket: sends a packet to the other device (duh!). It takes an instance of
    Packet and archives it into an instance of NSData. It then uses the session’s
    sendDataToAllPeers:withDataMode:error: method to send it across the wire—well,
    across the wireless, in this case.


    ```

    - (void)sendPacket:(Packet *)packet

    {

        NSMutableData *data = [[NSMutableData alloc] init];

        NSKeyedArchiver *archiver = [[NSKeyedArchiver alloc] initForWritingWithMutableData:data];

        [archiver encodeObject:packet forKey:kTicTacToeArchiveKey];

        [archiver finishEncoding];


    NSError *error = nil;

        if (![self.session sendDataToAllPeers:data withDataMode:GKSendDataReliable
    error:&error]) {

            // You would some do real error handling

            NSLog(@"Error sending data: %@", [error localizedDescription]);

        }

    }

    ```


    The checkForGameEnd method just checks all nine spaces to see whether they have
    X or O in them, and then looks for three in a row. It does this by first declaring
    a variable called moves to keep track of how many moves have happened. This is
    how it will tell if there’s a tie. If there have been nine moves, and no one has
    won, then there are no available spaces left on the board, so it’s a tie. Next,
    you declare an array of nine UIImage pointers. You’re going to pull the images
    out of the nine buttons representing spaces on the board and put them in this
    array to make it easier to check if a player won. If you find three in a row,
    you’ll store one of the three images in this variable so you know which player
    won the game. Next, you loop through the buttons by tag, as you did in the resetBoard
    method earlier, storing the images from the buttons in the array you declared
    earlier. The next big chunk of code just checks to see if there are three of the
    same images in a row anywhere. If it finds three in a row, it stores one of the
    three images in winningImage. When it completes the check, it will know which
    player, if any, has won. If there wasn’t a winner, then you check to see if any
    spaces are left on the board by looking at moves. If no spaces remain, then you
    know the game is over, and the cat won.


    **Note**  In tic-tac-toe, a tie is also called a “cat’s game.” The expression
    “the cat won” refers to a tie.


    If any of the preceding code set the state to kGameStateDone, then you use performSelector:withObject:afterDelay:
    to start a new game after the user has had time to read who won.


    ```

    - (void)checkForGameEnd

    {

        NSInteger moves = 0;


    UIImage     *currentButtonImages[9];

        UIImage     *winningImage = nil;


    for (int i = kUpperLeft; i <= kLowerRight; i++) {

            UIButton *oneButton = (UIButton *)[self.view viewWithTag:i];

            if ([oneButton imageForState:UIControlStateNormal])

                moves++;

            currentButtonImages[i - kUpperLeft] = [oneButton imageForState:UIControlStateNormal];

        }


    // Top Row

        if (currentButtonImages[0] == currentButtonImages[1]

            && currentButtonImages[0] == currentButtonImages[2]

            && currentButtonImages[0] != nil)

            winningImage = currentButtonImages[0];


    // Middle Row

        else if (currentButtonImages[3] == currentButtonImages[4]

                 && currentButtonImages[3] == currentButtonImages[5]

                 && currentButtonImages[3] != nil)

            winningImage = currentButtonImages[3];


    // Bottom Row

        else if (currentButtonImages[6] == currentButtonImages[7]

                 && currentButtonImages[6] == currentButtonImages[8]

                 && currentButtonImages[6] != nil)

            winningImage = currentButtonImages[6];'
