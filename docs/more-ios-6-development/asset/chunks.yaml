    }

    ```


    isAvailableForServiceType: takes a String argument of possible service type constants.
    These service types are defined in the header file SLServiceTypes.h. Currently,
    Apple defines the following service type constant:


    ```

    NSString *const SLServiceTypeFacebook;

    NSString *const SLServiceTypeTwitter;

    NSString *const SLServiceTypeSinaWeibo;

    ```


    If you are able to send a send a message to the service, you start by creating
    an instance of the view controller.


    ```

    SLComposeViewController *composeVC = [SLComposeViewController

                                              composeViewControllerForServiceType:SLServiceTypeTwitter];

    ```'
  trans: '

    您也可以使用任意文本填充邮件正文。您既可以使用普通字符串创建纯文本邮件，也可以使用 HTML 创建格式化邮件。要为邮件撰写视图控制器提供邮件正文，请使用 `setMessageBody:isHTML:`
    方法。如果您传入的字符串是纯文本，则应将 `NO` 作为第二个参数传入；但如果您在第一个参数中提供的是 HTML 标记而非纯文本字符串，则应在第二个参数中传入
    `YES`，以便您的标记在显示给用户之前会被解析。


    ```

    [mc setMessageBody:@"Ohai!!!\n\nKThxBai" isHTML:NO];

    [mc setMessageBody:@"<HTML><B>Ohai</B><BR/>I can has cheezburger?</HTML>" isHTML:YES];

    ```


    ## 添加附件


    您也可以为外发邮件添加附件。为此，您必须提供一个包含待附加数据的 `NSData` 实例，以及附件的 MIME 类型和要用于附件的文件名。*MIME 类型*（我们在第
    9 章讨论与 Web 服务器交互时简要提及过）是定义通过互联网传输的数据类型的字符串。它们用于从 Web 服务器检索或发送文件，也用于发送电子邮件附件。要为外发邮件添加附件，请使用
    `addAttachmentData:mimeType:fileName:` 方法。以下是一个将应用程序包中存储的图像添加为附件的示例：


    ```

    NSString *path = [[NSBundle mainBundle] pathForResource:@"surpriseCat" ofType:@"png"];

    NSData *data = [NSData dataWithContentsOfFile:path];

    [mc addAttachmentData:data mimeType:@"image/png" fileName:@"surpriseCat"];

    ```


    ## 呈现邮件撰写视图


    一旦您使用所有要填充的数据配置好控制器后，就可以像之前一样呈现控制器的视图：


    ```

    [self presentViewController:mc animated:YES completion:nil];

    ```


    ## 邮件撰写视图控制器委托方法


    邮件撰写视图控制器委托的方法包含在正式协议 `MFMailComposeViewControllerDelegate` 中。无论用户是发送还是取消，也无论系统是否能够发送消息，都会调用
    `mailComposeController:didFinishWithResult:error:` 方法。与大多数委托方法一样，第一个参数是指向调用委托方法的对象的指针。第二个参数是*结果码*，它告诉您外发邮件的最终状态；第三个参数是
    `NSError` 实例，如果遇到问题，它将提供更详细的信息。无论您收到什么结果码，您都有责任在此方法中通过调用 `dismissModalViewControllerAnimated:`
    来关闭邮件撰写视图控制器。


    如果用户点击了“取消”按钮，您的委托将收到结果码 `MFMailComposeResultCancelled`。在这种情况下，用户改变了主意，决定不发送邮件。如果用户点击了“发送”按钮，结果码将取决于
    `MessageUI` 框架是否能够成功发送邮件。如果能够发送消息，结果码将是 `MFMailComposeResultSent`。如果尝试发送但失败了，结果码将是
    `MFMailComposeResultFailed`，在这种情况下，您可能希望检查提供的 `NSError` 实例以了解哪里出了问题。如果由于当前没有网络连接而无法发送消息，但消息已保存到发件箱中以供稍后发送，您将收到结果码
    `MFMailComposeResultSaved`。


    以下是一个非常简单的委托方法实现，它仅记录了所发生的情况：


    ```

    - (void)mailComposeController:(MFMailComposeViewController*)controller

                didFinishWithResult:(MFMailComposeResult)result

                             error:(NSError*)error

    {

        switch (result)

        {

            case MFMailComposeResultCancelled:

                NSLog(@"邮件发送已取消……");

                break;

            case MFMailComposeResultSaved:

                NSLog(@"邮件已保存……");

                break;

            case MFMailComposeResultSent:

                NSLog(@"邮件已发送……");

                break;

            case MFMailComposeResultFailed:

                NSLog(@"邮件发送错误：%@……", [error localizedDescription]);

                break;

            default:

                break;

        }

        [controller dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ## 消息撰写视图控制器


    `MFMessageComposeViewController` 与邮件类的对应控制器类似，但更简单。首先，您需要创建一个实例并设置其委托。


    ```

    MFMessageComposeViewController *mc = [[MFMessageComposeViewController alloc] init];

    mc.messageComposeDelegate = self;

    ```


    只有两个属性可以填充：`recipients` 和 `body`。与邮件不同，这些属性可以通过类的直接属性以及方法访问器来访问。`Recipients` 是一个字符串数组，其中每个字符串是通讯录中的联系人姓名或电话号码。`Body`
    是您要发送的消息。


    ```

    mc.recipients = @[@"曼尼·沙利文"];

    mc.body = @"你好，曼尼！";

    ```


    消息撰写视图控制器委托方法的行为与其邮件对应方法完全相同。发送短信时只有三种可能的结果：已取消、已发送或失败。


    ```

    - (void)messageComposeViewController:(MFMessageComposeViewController *)controller

                          didFinishWithResult:(MessageComposeResult)result

    {

        switch (result)

        {

            case MessageComposeResultCancelled:

                NSLog(@"短信发送已取消");

                break;

            case MessageComposeResultSent:

                NSLog(@"短信已发送");

                break;

            case MessageComposeResultFailed:

                NSLog(@"短信发送失败");

                break;

            default:

                NSLog(@"短信未发送");

                break;

        }

        [controller dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    ## Social 框架


    在 iOS 5 中，Apple 与 Twitter（[www.twitter.com](http://www.twitter.com)）紧密集成。基本上，您的
    Twitter 账户可以从系统层面使用。因此，很容易向 Twitter 发送消息（“推文”）或执行 Twitter API 请求。在 iOS 6 中，Apple
    将此功能抽象并扩展到了 Social 框架中。除 Twitter 外，Apple 还为 Facebook 和新浪微博集成了相同的功能。


    ### SLComposeViewController


    `SLComposeViewController` 在设计和原理上与 Message UI 框架中的邮件和消息视图控制器类非常相似。但是，没有相应的委托类。相反，`SLComposeViewController`
    有一个完成处理程序属性，可以为其分配一个代码块。


    为了确认您的应用程序可以使用某项服务，您可以调用静态方法 `isAvailableForServiceType:`。例如，检查是否可以发送到 Facebook
    的代码如下：


    ```

    if ([SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook])
    {

        // 发送消息到 Facebook 的代码

        . . .

    }

    ```


    `isAvailableForServiceType:` 接受一个 `String` 参数，该参数可以是服务类型常量。这些服务类型定义在头文件 `SLServiceTypes.h`
    中。目前，Apple 定义了以下服务类型常量：


    ```

    NSString *const SLServiceTypeFacebook;

    NSString *const SLServiceTypeTwitter;

    NSString *const SLServiceTypeSinaWeibo;

    ```


    如果您能够向服务发送消息，首先需要创建视图控制器的一个实例。


    ```

    SLComposeViewController *composeVC = [SLComposeViewController

                                              composeViewControllerForServiceType:SLServiceTypeTwitter];

    ```

