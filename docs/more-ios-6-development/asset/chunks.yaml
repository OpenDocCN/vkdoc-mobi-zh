  trans: "\n第一个常量 `kBatchSize` 用于设置在检查操作是否已被取消前要执行的计算次数。第二个常量 `kUIUpdateFrequency`\
    \ 则指定了更新用户界面的频率（以秒为单位）。实际上，你每秒要进行数千次计算。如果每次更新时都从每个线程更新界面，那会产生极其大量的更新。请记住，用户界面的更新必须在主线程上完成。稍后我们将向你展示如何从操作中安全地实现这一点，但这样做会带来额外开销。不同的线程之间无法直接通信。\n\
    \n你不需要理解线程通信的具体过程，但必须明白在线程之间发送消息会产生开销。幸运的是，稍后你会看到，线程间通信的复杂性对我们来说是屏蔽的。但这种通信仍然存在成本，如果过于频繁地进行，会拖慢运行速度。通过将更新频率降低到每半秒一次，你可以消除大量不必要的线程间通信。在测试应用时，你可能需要调整这个值。你可能会发现，更新频率更高或更低能带来更好的用户体验，但这些设置似乎是一个不错的起点，在设备端和模拟器上都能获得不错的效果。\n\
    \n接着，你为线程的委托（delegate）创建一个协议。你的操作的委托将是应用主视图的控制器类：`StalledViewController`。你将调用该协议的唯一方法，告知控制器已发生变更，这些变更需要体现在表视图中代表该操作的行上。\n\
    \n```objc\n@class SquareRootOperation;\n\n@protocol SquareRootOperationDelegate\n\
    - (void)operationProgressChanged:(SquareRootOperation *)operation;\n@end\n```\n\
    \n这与你在定时器示例中创建的 `SquareRootBatch` 类非常相似，区别在于这里你继承的是 `NSOperation` 而非 `NSObject`。除了用于当前计算值和最大计算值的实例变量和属性外，你还有一个用于委托的实例变量和属性。\n\
    \n```objc\n@property (assign, nonatomic) NSInteger max;\n@property (assign, nonatomic)\
    \ NSInteger current;\n@property (strong, nonatomic) id < SquareRootOperationDelegate\
    \ > delegate;\n```\n\n你有一个初始化方法，该方法接收最大计算次数和一个委托。\n\n```objc\n- (id)initWithMaxNumber:(NSInteger)maxNumber\
    \ delegate:(id < SquareRootOperationDelegate>)aDelegate;\n```\n\n并且你有两个方法，可供委托调用以获取进度条和标签的当前值。\n\
    \n```objc\n- (float)percentComplete;\n- (NSString *)progressString;\n```\n\n确保保存\
    \ `SquareRootOperation.h`，然后切换到 `SquareRootOperation.m`。你的初始化方法应该没有什么意外之处。\n\n\
    ```objc\n- (id)initWithMaxNumber:(NSInteger)maxNumber delegate:(id < SquareRootOperationDelegate>)aDelegate\n\
    {\n    if (self = [super init]) {\n        self.max = maxNumber;\n        self.current\
    \ = 0;\n        self.delegate = aDelegate;\n    }\n    return self;\n}\n```\n\n\
    `percentComplete` 方法与你本章前面为基于定时器的应用版本创建的方法完全相同。\n\n```objc\n- (float)percentComplete\n\
    {\n    return (float)self.current / (float)self.max;\n}\n```\n\n然而，`progressString`\
    \ 却有所不同。\n\n```objc\n- (NSString *)progressString\n{\n    if ([self isCancelled])\n\
    \        return @\"Cancelled...\";\n    if (![self isExecuting])\n        return\
    \ @\"Waiting...\";\n\nreturn [NSString stringWithFormat:@\"Completed %d of %d\"\
    , self.current, self.max];\n}\n```\n\n该方法所做的仅仅是返回一个表示操作当前进度的字符串，该字符串将用于表示此行的单元格中（参见图\
    \ 14-4）。这里额外采取的一步是，如果操作已被取消，则将标签设置为 `Cancelled...`。请记住，我们之前提到过，尚未开始执行的已取消操作会留在队列中，其\
    \ `isCancelled` 属性被设置为 `YES`，直到它们被移出队列，此时它们不会执行任何处理便从队列中移除。由于你无法将这些操作从队列中移除，你采取了次优方案，更新表格中显示的标签，以表明用户请求取消此操作。否则，如果操作尚未开始，则返回\
    \ `Waiting...`；如果正在执行，则返回一个标识已计算了多少个平方根的字符串。\n\n下一个方法是操作的灵魂，值得特别关注。`main` 方法是在操作被队列启动时调用的方法。你的操作将在某个线程中运行，因此你首先将一切包裹在\
    \ `@try` 块和 `@autoreleasepool` 块中。\n\n```objc\n- (void)main\n{\n    @try {\n \
    \       @autoreleasepool {\n```\n\n然后，你声明并初始化一个变量，用于跟踪自上次更新用户界面以来经过的时间。\n\n```objc\n\
    NSTimeInterval lastUIUpdate = [NSDate timeIntervalSinceReferenceDate];\n```\n\n\
    接下来，你启动循环，直到操作被取消或 `current` 等于 `max`。\n\n```objc\nwhile (!self.isCancelled &&\
    \ self.current < self.max) {\n```\n\n如果操作未被取消，则递增 `current`，计算其平方根，并记录结果。\n\n\
    ```objc\n                self.current++;\n                double squareRoot =\
    \ sqrt((double)self.current);\n                NSLog(@\"Operation %@ reports the\
    \ square root of %d is %.6f\",                       self, self.current, squareRoot);\n\
    ```\n\n接着，你使用模运算来确定是否应该检查时间。请记住，你指定了一个批处理大小常量，用于指示检查是否应该进行用户界面更新的频率。因此，每当 `current\
    \ % kBatchSize == 0` 时，就表示你已经达到了 `kBatchSize` 的倍数，应该检查是否到了更新用户界面的时间。\n\n```objc\n\
    if (self.current % kBatchSize == 0) {\n```\n\n如果你已经处理完整个批次，就检查当前时间，并将其与上次更新时间加上更新频率后的值进行比较。如果当前时间大于这些值之和，那么就该向控制器推送另一次更新，以便在用户界面中反映出来。\n\
    \n```objc\nif ([NSDate timeIntervalSinceReferenceDate] > lastUIUpdate + kUpdateFrequency)\
    \ {\n```\n\n在使用 `performSelector:onMainThread:withObject:waitUntilDone:` 之前，确保你有委托并且它响应正确的选择器，以便通知控制器代表该操作的行应该被更新。这是一个很棒的方法，让你能够与主线程通信，而无需处理线程间通信的琐碎细节。这绝对是一个可爱至极的方法；随便问一个必须使用\
    \ Mach 端口以老派方式实现这一点的人就知道了。\n\n```objc\nif ((NSObject *)self.delegate respondsToSelector:@selector(operationProgressChanged:)])\
    \ {\n    [(NSObject *)self.delegate performSelectorOnMainThread:@selector(operationProgressChanged:)\
    \                                withObject:self                             \
    \ waitUntilDone:NO];\n}\n```\n\n更新界面后，你将休眠一小段时间。这是可选的，具体使用的值可能在测试应用时会进行调整，但定期阻塞以让出一些时间通常是个好主意。\n\
    \n```objc\n[NSThread sleepForTimeInterval:0.05];\n```\n"
- fmt: "# 排版后的文档\n\n您使用当前时间更新`lastUIUpdate`，这样在下一次循环时，您就知道自上次更新用户界面以来已经过去了多久。\n\n\
    ```\n                        lastUIUpdate = [NSDate timeIntervalSinceReferenceDate];\n\
    \                    }\n                }\n            }\n        }\n    }\n```\n\
    \n最后，您要捕获所有异常。在此应用程序中，您只需记录它们。如果您需要在此处执行其他操作（例如显示警报），请确保在主线程上调用相应方法。不要在操作中直接执行任何UI工作，因为UIKit不是线程安全的。是的，我们已经说过这一点，但这很重要。\n\
    \n```\n    @catch (NSException *e) {\n        NSLog(@\"Exception: %@\", e);\n\
    \    }\n```\n\n哦，顺便说一下？UIKit不是线程安全的。\n\n此外，无论您做什么，都不要在此处抛出异常。由于此操作正在非主线程上执行，因此没有更高级别的异常处理程序可以捕获该异常。这意味着在此处抛出的任何异常都将成为未捕获的异常，这在运行时是致命情况（例如发生致命崩溃）。\n\
    \n在继续之前，请确保保存`SquareRootOperation.m`。\n\n## 自定义`ProgressCell`\n\n查看[图14-4](#9781430238072_Ch14.xhtml#Fig4)，您可以看到用户界面中不再具有单一的进度视图和进度标签。相反，您有一个显示操作队列中各操作的表格视图。每个表格视图单元格都包含一个进度视图、一个进度标签以及一个取消按钮。让我们将该表格视图单元格构建为自定义表格视图单元格。\n\
    \n首先，创建一个新的Objective-C类文件，使其成为`UITableViewCell`的子类，并将其命名为`ProgressCell`。创建文件后，选择`ProgressCell.h`并添加以下属性：\n\
    \n```\n@property (weak, nonatomic) IBOutlet UIProgressView *progressBar;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *progressLabel;\n```\n\n保存`ProgressCell.h`。\n\
    \n您没有为`ProgressCell`创建XIB文件，那么为什么将这些属性声明为出入口？我们现在就来解释，但首先您需要创建XIB。创建一个新文件。在“新建文件助手”中选择“用户界面”组，然后选择“空”。单击“下一步”，确保“设备系列”设置为iPhone。当提示保存文件时，文件名为`ProgressCell.xib`。如果它没有打开Interface\
    \ Builder，请选择`ProgressCell.xib`。\n\n将一个表格视图单元格拖到Interface Builder上。接着，将一个圆角矩形按钮拖到表格视图单元格的最右边缘。在“属性检查器”中，将按钮类型更改为“Custom”，并在“图像”字段中输入`remove.png`。从“对象库”中将一个进度视图拖到表格视图单元格中，位于中心参考线的上方，并使用蓝色参考线对齐左边缘。将进度视图的右边缘延伸到按钮的左边缘。在“属性检查器”中，将“进度”字段从`0.5`更改为`0.0`。接下来，将一个标签拖到进度视图的正下方。将宽度调整为与进度视图相同。使用“属性检查器”将“对齐方式”更改为“居中对齐”。\n\
    \n现在，事情有些不同。在Interface Builder左侧的类停靠区中，选择表格视图单元格。打开“实用工具”面板中的“标识检查器”，并将“类”字段从`UITableViewCell`更改为`ProgressCell`。切换到“属性检查器”，并在“标识符”字段中输入`OperationQueueCell`。在此处，将“选择”从“蓝色”更改为“无”。\n\
    \n从类停靠区中的表格视图单元格按住Control键拖动到进度视图。在弹出的“接口”菜单中，选择`progressBar`。再从表格视图单元格按住Control键拖动到标签。这次选择`progressLabel`。\n\
    \n目前就这样。您稍后会回到此文件，但现在请先保存`ProgressCell.xib`。\n\n## 调整用户界面\n\n选择`ViewController.xib`。在Interface\
    \ Builder中，选择视图窗口并打开“标识检查器”。将底层类从`UIView`更改为`UIControl`。这将允许背景点击触发操作方法。\n\n单击进度视图并按delete键。然后单击进度标签（进度条下方的空标签）并再次按delete键。\n\
    \n在库中查找表格视图，并将其拖到Control窗口。将其放置在窗口中，然后使用调整大小手柄使其占据从左侧到右侧的整个窗口（不是边距，而是整个窗口），并且从窗口的最底部延伸到现有文本字段、按钮和标签的正下方，使用蓝色参考线保持适当的距离。\n\
    \n切换到助理模式，并从表格视图按住Control键拖动到`ViewController.h`中最后一个`@property`声明的下方。创建一个名为`tableView`的新输出口。从表格视图再次按住Control键拖动到文件所有者，共两次。第一次选择`delegate`输出口，第二次选择`dataSource`输出口。\n\
    \n仍处于助理模式时，在类停靠区选择文件所有者，并将“实用工具”面板切换到“连接检查器”。查找`Touch Down`右侧的圆圈。将圆圈拖到`ViewController.h`中`go`方法的下方，并创建一个名为`backgroundTap`的新操作。\n\
    \n将编辑器恢复到标准模式并保存XIB。\n\n## `ViewController.h`的更改\n\n在编辑器中打开`ViewController.h`。首先，导入`SquareRootOperation`和`ProgressCell`的接口文件。\n\
    \n```\n#import \"SquareRootOperation.h\"\n#import \"ProgressCell.h\"\n```\n\n\
    接着，重新声明`ViewController`以使其遵守所需的协议。\n\n```\n@interface ViewController : UIViewController\
    \ < UITableViewDataSource, UITableViewDelegate, SquareRootOperationDelegate>\n\
    ```\n\n您不再需要`progressBar`和`progressLabel`属性，因此将它们删除。您已通过Interface Builder创建了`tableView`属性。您需要为操作队列声明一个属性。您还声明了一个进度单元格属性（别担心，我们很快会解释！）。\n\
    \n```\n@property (weak, nonatomic) IBOutlet UIProgressView *progressBar;\n@property\
    \ (weak, nonatomic) IBOutlet UILabel *progressLabel;\n@property (weak, nonatomic)\
    \ IBOutlet UITableView *tableView;\n@property (strong, nonatomic) NSOperationQueue\
    \ *queue;\n@property (strong, nonatomic) IBOutlet ProgressCell *progressCell;\n\
    ```\n\n最后，您添加一个新方法`cancelOperation:`，当用户点击表格行的取消按钮时将调用此方法。\n\n```\n- (IBAction)cancelOperation:(id)sender;\n\
    ```\n\n保存`ViewController.h`。\n\n## 更新`ViewController.m`\n\n选择`ViewController.m`以便进行最终更改。在文件顶部，您需要在分类声明中添加一个私有属性。\n\
    \n```\n@interface ViewController ()\n@property (assign, nonatomic) NSInteger cancelledIndex;\n\
    @end\n```\n\n删除两个已被移除输出口的`@synthesize`语句。\n\n```\n@synthesize progressBar;\n@synthesize\
    \ progressLabel;\n```\n\n接下来，找到`go`方法，并将当前的实现替换为以下新实现：\n\n```\n- (IBAction)go:(id)sender\n\
    {\n    NSInteger operationCount = [numberOfOperations.text integerValue];\n  \
    \  SquareRootOperation *newOperation = [[SquareRootOperation alloc] initWithMaxNumber:operationCount\
    \ delegate:self];\n    [self.queue addOperation:newOperation];\n}\n```\n\n首先，您检索操作的数量，就像在前两个版本中所做的一样。接着，您使用该数量创建一个`SquareRootOperation`实例，并将`self`作为委托传递，以便在用户界面发生变化的通知。最后，您将操作添加到队列中。\n\
    \n在`go`方法之后，将`backgroundClick:`方法存根替换为以下实现：\n\n```\n- (IBAction)backgroundClick:(id)sender\n\
    {\n    [self.numberOfOperations resignFirstResponder];\n}\n```\n\n您刚刚添加的这个方法只是告诉文本字段放弃第一响应者状态，以便键盘回缩，从而您可以看到整个表格。"
  raw: 'You update lastUIUpdate with the current time so the next time through the
    loop, you know how long has passed since you updated the user interface.


    ```

                            lastUIUpdate = [NSDate timeIntervalSinceReferenceDate];

                        }

                    }

                }

            }

        }

    ```


    Finally, you catch any exceptions. In this application, you just log them. If
    you need to do something else here, like show an alert, make sure that you call
    methods on the main thread to do it. Do not do any UI work directly in an operation
    because UIKit is not thread safe. Yes, we did say that already, but it’s important.


    ```

        @catch (NSException *e) {

            NSLog(@"Exception: %@", e);

        }

    ```


    Oh, and by the way? UIKit is not thread safe.


    Also, whatever you do, do not throw an exception here. Because this operation
    is executing on a non-main thread, there is no higher-level exception handler
    available to catch that exception. This means that any exceptions thrown here
    will be uncaught exceptions, which is a fatal condition at runtime (as in a fatal
    crash).


    Make sure you save SquareRootOperation.m before moving on.


    Custom ProgressCell


    Looking at [Figure 14-4](#9781430238072_Ch14.xhtml#Fig4), you can see that you
    no longer have a single progress view and progress label in your user interface.
    Rather, you have a table view that shows the operation queue’s operations. Each
    table view cell has a progress view and progress label, along with a cancel button.
    Let’s build that table view cell as a custom table view cell.


    First, create a new Objective-C class file, making it a subclass of UITableViewCell;
    named ProgressCell. Once the files are created, select ProgressCell.h and add
    the following properties:


    ```

    @property (weak, nonatomic) IBOutlet UIProgressView *progressBar;

    @property (weak, nonatomic) IBOutlet UILabel *progressLabel;

    ```


    Save ProgressCell.h.


    You don’t have a XIB file for ProgressCell, so why did you declare those properties
    as outlets? We’ll explain that soon, but first you’ll create the XIB. Create a
    new file. Choose the User Interface group in the New File Assistant, and select
    Empty. Click Next, and make sure the Device Family is iPhone. When asked to save
    the file, the name is ProgressCell.xib. If it doesn’t open Interface Builder,
    select ProgressCell.xib.


    Drag a table view cell on to the Interface Builder. Next, drag a round rect button
    to the far right edge of the table view cell. In the Attribute Inspector, change
    the button Type to Custom, and enter remove.png in the Image field. Drag a progress
    view from the Object Library to the table view cell, above the center guideline,
    aligning the left edge using the blue guidelines. Extend the right edge of the
    progress view to the left edge of the button. In the Attribute Inspector, change
    the Progress field from 0.5 to 0.0\. Next, drag a label to just below the progress
    view. Adjust the width to be the same as the progress view. Use the Attribute
    Inspector to change the Alignment to Center Alignment.


    Now, this is where things are a little different. In the Class Dock, on the left
    side of the Interface Builder, select the table view cell. Open the Identity Inspector
    in the Utility pane, and change the Class Field from UITableViewCell to ProgressCell.
    Switch to the Attribute Inspector and enter OperationQueueCell in the Identifier
    field. While you’re here, change the Selection from Blue to None.


    Control-drag from the table view cell in the Class Dock to the progress view.
    On the Outlet pop-up, select progressBar. Control-drag from the table view cell
    to the label. This time select progressLabel.


    That’s it for now. You’ll be coming back to this file, but save ProgressCell.xib
    for now.


    Adjusting the User Interface


    Select ViewController.xib. In Interface Builder, select the view window and open
    the Identity Inspector. Change the underlying class from UIView to UIControl.
    This will allow background taps to trigger action methods.


    Single-click the progress view and hit the delete key. Then single-click the progress
    label (the empty label below the progress bar) and press delete again.


    Look in the library for a table view and drag it over to the Control window. Place
    it in the window, then use the resize handles so that it takes up all of the window
    from the left side to the right (not the margins, the full window), and from the
    very bottom of the window until just below the existing text field, button, and
    label, using the blue guidelines for proper distance.


    Switch to Assistant mode, and control-drag from the table view to just below the
    last @property declaration in ViewController.h. Create a new outlet named tableView.
    Control-drag back from the table view to File’s Owner twice. The first time, select
    the delegate outlet, the second time select the dataSource outlet.


    While still in Assistant mode, select the File’s Owner in the Class Dock and switch
    the Utility pane to the Connections Inspector. Look for the circle to the right
    of Touch Down. Drag from that circle to below the go method in ViewController.h
    and create a new action named backgroundTap.


    Put the editor back into Standard mode and save the XIB.


    Changes to ViewController.h


    Open ViewController.h in the editor. First, import the SquareRootOperation and
    ProgressCell interface files.


    ```

    #import "SquareRootOperation.h"

    #import "ProgressCell.h"

    ```


    Next, redeclare the ViewController to conform to the protocols you need.


    ```

    @interface ViewController : UIViewController < UITableViewDataSource, UITableViewDelegate,
    SquareRootOperationDelegate>

    ```


    You don’t need the progressBar nor progressLabel properties, so you delete them.
    You created the tableView property via Interface Builder. You need to declare
    a property for an operation queue. You also declare a progress cell property (don’t
    worry, we’ll explain it soon!).


    ```

    @property (weak, nonatomic) IBOutlet UIProgressView *progressBar;

    @property (weak, nonatomic) IBOutlet UILabel *progressLabel;

    @property (weak, nonatomic) IBOutlet UITableView *tableView;

    @property (strong, nonatomic) NSOperationQueue *queue;

    @property (strong, nonatomic) IBOutlet ProgressCell *progressCell;

    ```


    Lastly, you add a new method, cancelOperation:, that will be called when the user
    taps the cancel button of a row in the table.


    ```

    - (IBAction)cancelOperation:(id)sender;

    ```


    Save ViewController.h.


    Updating ViewController.m


    Select ViewController.m so you can make your final changes. At the top of the
    file, you need to add a private Property in the Category declaration.


    ```

    @interface ViewController ()

    @property (assign, nonatomic) NSInteger cancelledIndex;

    @end

    ```


    You get rid of the @synthesize statements for the two deleted outlets.


    ```

    @synthesize progressBar;

    @synthesize progressLabel;

    ```


    Next, look for the go method and replace the current implementation with this
    new one:


    ```

    - (IBAction)go:(id)sender

    {

        NSInteger operationCount = [numberOfOperations.text integerValue];

        SquareRootOperation *newOperation = [[SquareRootOperation alloc] initWithMaxNumber:operationCount
    delegate:self];

        [self.queue addOperation:newOperation];

    }

    ```


    First, you retrieve the number of operations, just as you did in the last two
    versions. Next, you create an instance of SquareRootOperation with that number,
    passing self as the delegate so that you get notified of changes that impact the
    user interface. Finally, you add the operation to the queue.


    After the go method, replace the backgroundClick: method stub with this implementation:


    ```

    - (IBAction)backgroundClick:(id)sender

    {

        [self.numberOfOperations resignFirstResponder];

    }

    ```


    This method you just added just tells the text field to resign the first responder
    so that the keyboard will retract and you can see the whole table.'
