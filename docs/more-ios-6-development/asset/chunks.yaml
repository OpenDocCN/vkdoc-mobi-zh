  trans: "\n`updateScrubber`：首先检查`CMTime`值。如果时间无效，则将滑块设为`0.0`并返回。如果时间有效，则查询`playerItem`的时长。若时长为有限值，则利用它来确定滑块值的位置。当前时间和时长同时用于更新`elapsedTime`和`remainingTime`标签。\n\
    \n通知处理方法`playerItemDidReachEnd:`的效果与点击“完成”按钮相同，因此你直接调用`donePressed:`方法。\n\n在处理上下文处理器之前，让我们先实现动作方法。\n\
    \n当你开始拖动滑块时，需要移除播放器的周期性观察者，以免在滑块调整期间进行更新。你缓存当前播放速率，并停止播放器。\n\n```\n- (IBAction)beginScrubbing:(id)sender\n\
    {\n    self.prescrubRate = self.player.rate;\n    self.player.rate = 0.0f;\n \
    \   [self removePlayerTimerObserver];\n}\n```\n\n`scrub:`动作将播放器更新至可通过滑块值和`playerItem`时长计算出的播放点。然后利用这些值更新`elapsedTime`和`remainingTime`标签，以反映新的滑块值。\n\
    \n```\n- (IBAction)scrub:(id)sender\n{\n        if ([sender isKindOfClass:[UISlider\
    \ class]]) {\n                UISlider* slider = sender;\n                if (CMTIME_IS_INVALID(self.playerItem.duration))\
    \ {\n                        return;\n                }\n\ndouble duration = CMTimeGetSeconds(self.playerItem.duration);\n\
    \                if (isfinite(duration)) {\n                    float minValue\
    \ = [slider minimumValue];\n                    float maxValue = [slider maximumValue];\n\
    \                    float value = [slider value];\n                    double\
    \ time = duration * (value - minValue) / (maxValue - minValue);\n            \
    \        [self.player seekToTime:CMTimeMakeWithSeconds(time, NSEC_PER_SEC)];\n\
    \nFloat64 remainingSeconds = duration - time;\n                    self.elapsedTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",                                 \
    \                      (int)time / 60, (int)time % 60];\n                    self.remainingTime.text\
    \ = [NSString stringWithFormat:@\"%d:%02d\",                                 \
    \                         (int)remainingSeconds / 60,                        \
    \                                  (int)remainingSeconds % 60];\n            \
    \    }\n        }\n}\n```\n\n完成滑块拖动后，你恢复播放器的播放速率和周期性观察者。\n\n```\n- (IBAction)endScrubbing:(id)sender\n\
    {\n        if (self.playerTimerObserver == nil) {\n            [self addPlayerTimerObserver];\n\
    \    }\n\nif (self.prescrubRate != 0.0f) {\n            self.player.rate = self.prescrubRate;\n\
    \            self.prescrubRate = 0.0f;\n        }\n}\n```\n\n使用`AVPlayer`更改音量是一个复杂得多的过程。你的媒体资源可能包含多条轨道，这不仅仅是因为视频；立体声音频资源可能也有两条轨道。因此，你需要找到资源中的所有音频轨道，并将音频混合调整为新的音量。\n\
    \n```\n- (IBAction)volumeChanged:(id)sender\n{\n    float volume = [self.volume\
    \ value];\n    NSArray *audioTracks = [self.assetItem.asset tracksWithMediaType:AVMediaTypeAudio];\n\
    \nNSMutableArray *allAudioParams = [NSMutableArray array];\n    for (AVAssetTrack\
    \ *track in audioTracks) {\n        AVMutableAudioMixInputParameters *audioInputParams\
    \ =             \n  [AVMutableAudioMixInputParameters audioMixInputParameters];\n\
    \        [audioInputParams setVolume:volume atTime:kCMTimeZero];\n        [audioInputParams\
    \ setTrackID:[track trackID]];\n        [allAudioParams addObject:audioInputParams];\n\
    \    }\n\nAVMutableAudioMix *audioMix = [AVMutableAudioMix audioMix];\n    [audioMix\
    \ setInputParameters:allAudioParams];\n\n[self.playerItem setAudioMix:audioMix];\n\
    }\n```\n\n`donePressed:`将停止播放器，并将你返回到`MediaViewController`。\n"
- fmt: "`- (IBAction)donePressed:(id)sender`\n{\n    [self.player pause];\n    [self\
    \ dismissViewControllerAnimated:YES completion:nil];\n}\n\n`playPressed:` and\
    \ `pausePressed:` update the player and toolbar as appropriate.\n\n`- (IBAction)playPressed:(id)sender`\n\
    {\n    [self.player play];\n    [self updatePlayPause];\n}\n\n`- (void)pausePressed:(id)sender`\n\
    {\n    [self.player pause];\n    [self updatePlayPause];\n}\n\nThe `ratePressed:`\
    \ action toggles the playback rate between three rates: 0.5, 1.0, and 2.0.\n\n\
    `- (IBAction)ratePressed:(id)sender`\n{\n    float rate = self.player.rate;\n\
    \    rate *= 2.0f;\n    if (rate > 2.0f)\n        rate = 0.5;\n    self.player.rate\
    \ = rate;\n}\n\nNow you can implement your context handlers. For a change in `playerItem`\
    \ status, you handle three possible statuses: unknown, ready to play, and failure.\n\
    \n`- (void)handleStatusContext:(NSDictionary *)change`\n{\n    [self updatePlayPause];\n\
    \nAVPlayerStatus status = [[change objectForKey:NSKeyValueChangeNewKey] integerValue];\n\
    \    switch (status) {\n        case AVPlayerStatusUnknown:\n            [self\
    \ removePlayerTimerObserver];\n            [self updateScrubber:CMTimeMake(0,\
    \ NSEC_PER_SEC)];\n            break;\n\ncase AVPlayerStatusReadyToPlay:\n   \
    \         [self addPlayerTimerObserver];\n            break;\n\ncase AVPlayerStatusFailed:\n\
    \            NSLog(@\"Player Status Failed\");\n            break;\n    }\n}\n\
    \nWhen the player rate changes, you just perform a sanity check to make sure you’re\
    \ displaying the correct label on the Rate button.\n\n`- (void)handleRateContext:(NSDictionary\
    \ *)change`\n{\n    [self updatePlayPause];\n    [self updateRate];\n}\n\nFinally,\
    \ you only care about the player’s `currentItem` when you’ve either created a\
    \ new `AVPlayer` or `AVPlayerItem` instance. If you have a new `playerItem`, you\
    \ need to make sure the `playerView` player is updated accordingly.\n\n`- (void)handleCurrentItemContext:(NSDictionary\
    \ *)change`\n{\n    // We’ve added/replaced the AVPlayer’s AVPlayerItem\n    AVPlayerItem\
    \ *newPlayerItem = [change objectForKey:NSKeyValueChangeNewKey];\n    if (newPlayerItem\
    \ != (id)[NSNull null]) {\n        // We really have a new AVPlayerItem\n    \
    \    self.playerView.player = self.player;\n        [self.playerView setVideoFillMode:AVLayerVideoGravityResizeAspect];\n\
    \    }\n    else {\n        // No AVPlayerItem\n        NSLog(@\"No AVPlayerItem\"\
    );\n    }\n}\n\nYour `PlayerViewController` is complete. Now you just need to\
    \ ensure that your media `AssetItem` is set when selecting from the `AudioViewController`\
    \ or `VideoViewController`. Open `MediaViewController.m`. Add an import directive\
    \ for `PlayerViewController.h`.\n\n`#import \"PlayerViewController.h\"`\n\nThen\
    \ add the implementation for `prepareForSegue:sender:`.\n\n`- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender`\n{\n    PlayerViewController *pvc = segue.destinationViewController;\n\
    \    UITableViewCell *cell = sender;\n    pvc.assetItem = [self.assets objectAtIndex:cell.tag];\n\
    }\n\nYou don’t need to check which segue is being invoked, as there should only\
    \ be one.\n\nBuild and run the `AVMediaPlayer`. Select a song or video to play.\
    \ Slider the scrubber to change the playback point. Toggle the rate to see how\
    \ you can change the playback rate. Pretty slick, right?\n\n### Avast! Rough Waters\
    \ Ahead!\n\nIn this chapter, you took a long but pleasant walk through the hills\
    \ and valleys of using the iPod music library. You saw how to find media items\
    \ using media queries, and how to let your users select songs using the media\
    \ picker controller. You learned how to use and manipulate collections of media\
    \ items. We showed you how to use music player controllers to play media items\
    \ and how to manipulate the currently playing item by seeking or skipping. You\
    \ also learned how to find out about the currently playing track, regardless of\
    \ whether it’s one your code played or one that the user chose using the iPod\
    \ or Music application.\n\nBut now, shore leave is over, matey. It’s time to set\
    \ sail into the open waters of iOS security. Batten down the hatches and secure\
    \ the ship!\n\n## Chapter 13: Locking It Down: iOS Security\n\nApplication security\
    \ is an important aspect of development. Protecting your users’ information is\
    \ an essential feature that you need to think about while developing. It’s important\
    \ to remember that security is not a product, nor is it a check-mark that you\
    \ can think about at the end of the development. Security is a process that has\
    \ to be taken in to consideration during all stages of development, from design\
    \ to implementation, through testing and release.\n\nWe’ll go over some basic\
    \ security issues you should keep in mind and how to handle them in iOS. Then\
    \ we’ll cover Security SDK, which provides three services: Certificate, Key, and\
    \ Trust Services, which are used to manage certificates, keys, and trust policies;\
    \ Keychain Services, which are used to manage keychain items; and Randomization\
    \ Services, which are used to create cryptographically secure random numbers.\n\
    \n**Note:** An important security issue is sending and receiving data securely\
    \ over the network. We won’t be covering that in this chapter. Check Apple’s Networking\
    \ documentation. Start with Networking Overview (`https://developer.apple.com/library/ios/#documentation/NetworkingInternetWeb/Conceptual/NetworkingOverview/`),\
    \ then read Secure Transport Reference (`https://developer.apple.com/library/ios/#documentation/Security/Reference/secureTransportRef/`).\
    \ You may need to read the CFNetwork Programming Guide (`https://developer.apple.com/library/ios/#documentation/Networking/Conceptual/CFNetwork/`)\
    \ as well.\n\nYou’re going to create an application that will list the keychain\
    \ items. By default, your application will have no keychain items, so you’ll embed\
    \ two certificates (your self-signed root certificate and user certificate) into\
    \ the application and add them to the keychain. Your keychain item detail view\
    \ will allow you to encrypt and decrypt some text as a demonstration of functionality.\n\
    \n### Security Considerations\n\nWhen you ask your user to provide some personal\
    \ data, you are implicitly asking the user to trust that you, the application\
    \ developer, will keep that information safe and secure. You are also implying\
    \ that you are only asking for the information you need—and no more. If you send\
    \ that data over the Internet, you have to make sure that the data is transmitted\
    \ in a secure manner. When your application receives signed data, it’s your job\
    \ to verify those signatures and ensure that they can be trusted.\n\nWhen asking\
    \ your users for information, you need to take into consideration what could happen\
    \ if that data were compromised. If your application is a game that only stores\
    \ the user’s high score, you probably don’t need to worry too much if the database\
    \ is accessed outside your application. However, if you are asking your users\
    \ for passwords or other sensitive information, it is crucial that you do your\
    \ best to protect your users’ information. One possible solution is to encrypt\
    \ the data, making it more difficult to read.\n\nMany mobile applications routinely\
    \ transmit information to a cloud-based service to centrally store and update\
    \ data. If you are transmitting sensitive user information between your iOS application\
    \ and a cloud server, you need to ensure the security of the data on both the\
    \ client and server, and you must ensure that the data is transmitted securely.\
