- fmt: "# 排版后的文本\n\nThe simplest and probably the most common implementation of the\
    \ peer-to-peer model on the iPhone is when you have two devices connected to each\
    \ other. This is the model used in head-to-head games, for example. `Game Kit`\
    \ makes this kind of peer-to-peer network exceedingly simple to set up and configure,\
    \ as you’ll see in this chapter.\n\n## Hybrid Client–server/Peer-to-Peer\n\nThe\
    \ client–server and peer-to-peer models of network communication are not mutually\
    \ exclusive, and it is possible to create programs that utilize a hybrid of both.\
    \ For example, a client–server game might allow certain communications to go directly\
    \ from client to client without going through the server. In a game that had a\
    \ chat window, it might allow messages intended for only one recipient to go directly\
    \ from the machine of the sender to the machine of the intended recipient, while\
    \ any other kind of chat would go to the server to be distributed to all clients.\n\
    \nYou should keep these different networking models in mind as we discuss the\
    \ mechanics of making connections and transferring data between application nodes.\
    \ `Node` is a generic term that refers to any computer connected to an application’s\
    \ network. A client, server, or peer is a node. The game you will be writing in\
    \ this chapter will use a simple, two-machine, peer-to-peer model.\n\n## The Game\
    \ Kit Session\n\nThe key to `Game Kit` is the session, represented by the class\
    \ `GKSession`. The session represents your end of a network connection with one\
    \ or more other iPhones. Regardless of whether you are acting as a client, a server,\
    \ or a peer, an instance of `GKSession` will represent the connections you have\
    \ with other phones. You will use `GKSession` whether you employ the peer picker\
    \ or write your own code to find machines to connect to and let the user select\
    \ from them.\n\n**Note**  As you make your way through the next few pages, don’t\
    \ worry too much about where each of these elements is implemented. This will\
    \ all come together in the project you create in this chapter.\n\nYou will also\
    \ use `GKSession` to send data to connected peers. You will implement session\
    \ delegate methods to get notified of changes to the session, such as when another\
    \ node connects or disconnects, as well as to receive data sent by other nodes.\n\
    \n### Creating the Session\n\nTo use a session, you must first create allocate\
    \ and initialize a `GKSession` object, like so:\n\n```\n    GKSession *theSession\
    \ = [[GKSession alloc] initWithSessionID:@\"com.apporchard.game\" \n         \
    \                                          displayName:nil \n                \
    \                                    sessionMode:GKSessionModePeer];\n```\n\n\
    There are three arguments you pass in when initializing a session.\n\nThe first\
    \ argument is a *session identifier*, which is a string that is unique to your\
    \ application. This is used to prevent your application’s sessions from accidentally\
    \ connecting to sessions from another program. Since the session identifier is\
    \ a string, it can be anything, though the convention is to use a reverse DNS-style\
    \ name, such as `com.apporchard.game`. By assigning session identifiers in this\
    \ manner, rather than by just randomly picking a word or phrase, you are less\
    \ likely to accidentally choose a session identifier that is used by another application\
    \ on the App Store.\n\nThe second argument is the *display name*. This is a name\
    \ that will be provided to the other nodes to uniquely identify your phone. If\
    \ you pass in `nil`, the display name will default to the device’s name as set\
    \ in iTunes. If multiple devices are connected, this will allow the other users\
    \ to see which devices are available and connect to the correct one. In [Figure\
    \ 9-3](#9781430238072_Ch09.xhtml#Fig3), you can see an example of where the unique\
    \ identifier is used. In that example, one other device is advertising itself\
    \ with the same session identifier as us, using a display name of Manny Sullivan’s\
    \ iPhone.\n\nThe last argument is the *session mode*. Session modes determine\
    \ how the session will behave once it’s all set up and ready to make connections.\
    \ There are three options:\n\n*   If you specify `GKSessionModeServer`, your session\
    \ will advertise itself on the network so that other devices can see it and connect\
    \ to it, but it won’t look for other sessions being advertised.\n*   If you specify\
    \ `GKSessionModeClient`, the session will not advertise itself on the network,\
    \ but will look for other sessions that are advertising themselves.\n*   If you\
    \ specify `GKSessionModePeer`, your session will both advertise its availability\
    \ on the network and also look for other sessions.\n\n**Note**  Although you will\
    \ generally use `GKSessionModePeer` when establishing a peer-to-peer network and\
    \ `GKSessionModeServer` and `GKSessionModeClient` when setting up a client–server\
    \ network, these constants dictate only whether an individual session will advertise\
    \ its availability on the network using Bonjour or look for other available nodes.\
    \ They are not necessarily indicative of which of the network models is being\
    \ used by the application.\n\nRegardless of the type of session you create, it\
    \ won’t actually start advertising its availability or looking for other available\
    \ nodes until you tell it to do so. You do that by setting the session property\
    \ `available` to `YES`. Alternatively, you can have the node stop advertising\
    \ its availability and/or stop looking for other available nodes by setting `available`\
    \ to `NO`.\n\n### Finding and Connecting to Other Sessions\n\nWhen a session that\
    \ was created using `GKSessionModeClient` or `GKSessionModePeer` finds another\
    \ node advertising its availability, it will call the method `session:peer:didChangeState:`\
    \ and pass in a state of `GKPeerStateAvailable`. This same method will be called\
    \ every time a peer becomes available or unavailable, as well as when a peer connects\
    \ or disconnects. The second argument will tell you which peer’s state changed,\
    \ and the last argument will tell you its new state.\n\nIf you find one or more\
    \ other sessions that are available, you can choose to connect the session to\
    \ one of the available sessions by calling `connectToPeer:withTimeout:`. Here’s\
    \ an example of `session:peer:didChangeState:` that connects to the first available\
    \ peer it finds:\n\n```\n- (void)session:(GKSession *)session peer:(NSString *)peerID\
    \ \n                         didChangeState:(GKPeerConnectionState)inState \n\
    {\n    if (inState == GKPeerStateAvailable) {\n        [session connectToPeer:peerID\
    \ withTimeout:60];\n        session.available = NO;\n    }\n}\n```\n\nThis isn’t\
    \ a very realistic example, as you would normally allow the user to choose the\
    \ node to which they connect. It’s a good example, though, because it shows both\
    \ of the basic functions of a client node. In this example, you’ve set `available`\
    \ to `NO` after you connect. This will cause your session to stop looking for\
    \ additional sessions. Since a session can connect to multiple peers, you won’t\
    \ always want to do this. If your application supports multiple connections, you\
    \ will want to leave it at `YES`.\n\n### Listening for Other Sessions\n\nWhen\
    \ a session is specified with a session mode of `GKSessionModeServer` or `GKSessionModePeer`,\
    \ it will be notified when another node attempts to connect. When this happens,\
    \ the session will call the method `session:didReceiveConnectionRequestFromPeer:`.\
    \ You can choose to accept the connection by calling `acceptConnectionFromPeer:error:`\
    \ or you can reject it by calling `denyConnectionFromPeer:`. The following is\
    \ an example that assumes the presence of a Boolean instance variable called `amAcceptingConnections`.\
    \ If it’s set to `YES`, it accepts the connection, and if it’s set to `NO`, it\
    \ rejects the connection."
  raw: "The simplest and probably the most common implementation of the peer-to-peer\
    \ model on the iPhone is when you have two devices connected to each other. This\
    \ is the model used in head-to-head games, for example. Game Kit makes this kind\
    \ of peer-to-peer network exceedingly simple to set up and configure, as you’ll\
    \ see in this chapter.\n\nHybrid Client–server/Peer-to-Peer\n\nThe client–server\
    \ and peer-to-peer models of network communication are not mutually exclusive,\
    \ and it is possible to create programs that utilize a hybrid of both. For example,\
    \ a client–server game might allow certain communications to go directly from\
    \ client to client without going through the server. In a game that had a chat\
    \ window, it might allow messages intended for only one recipient to go directly\
    \ from the machine of the sender to the machine of the intended recipient, while\
    \ any other kind of chat would go to the server to be distributed to all clients.\n\
    \nYou should keep these different networking models in mind as we discuss the\
    \ mechanics of making connections and transferring data between application nodes.\
    \ *Node* is a generic term that refers to any computer connected to an application’s\
    \ network. A client, server, or peer is a node. The game you will be writing in\
    \ this chapter will use a simple, two-machine, peer-to-peer model.\n\nThe Game\
    \ Kit Session\n\nThe key to Game Kit is the session, represented by the class\
    \ GKSession. The session represents your end of a network connection with one\
    \ or more other iPhones. Regardless of whether you are acting as a client, a server,\
    \ or a peer, an instance of GKSession will represent the connections you have\
    \ with other phones. You will use GKSession whether you employ the peer picker\
    \ or write your own code to find machines to connect to and let the user select\
    \ from them.\n\n**Note**  As you make your way through the next few pages, don’t\
    \ worry too much about where each of these elements is implemented. This will\
    \ all come together in the project you create in this chapter.\n\nYou will also\
    \ use GKSession to send data to connected peers. You will implement session delegate\
    \ methods to get notified of changes to the session, such as when another node\
    \ connects or disconnects, as well as to receive data sent by other nodes.\n\n\
    Creating the Session\n\nTo use a session, you must first create allocate and initialize\
    \ a GKSession object, like so:\n\n```\n    GKSession *theSession = [[GKSession\
    \ alloc] initWithSessionID:@\"com.apporchard.game\" \n                                                   displayName:nil\
    \ \n                                                   sessionMode:GKSessionModePeer];\n\
    ```\n\nThere are three arguments you pass in when initializing a session.\n\n\
    The first argument is a *session identifier*, which is a string that is unique\
    \ to your application. This is used to prevent your application’s sessions from\
    \ accidentally connecting to sessions from another program. Since the session\
    \ identifier is a string, it can be anything, though the convention is to use\
    \ a reverse DNS-style name, such as com.apporchard.game. By assigning session\
    \ identifiers in this manner, rather than by just randomly picking a word or phrase,\
    \ you are less likely to accidentally choose a session identifier that is used\
    \ by another application on the App Store.\n\nThe second argument is the *display\
    \ name*. This is a name that will be provided to the other nodes to uniquely identify\
    \ your phone. If you pass in nil, the display name will default to the device’s\
    \ name as set in iTunes. If multiple devices are connected, this will allow the\
    \ other users to see which devices are available and connect to the correct one.\
    \ In [Figure 9-3](#9781430238072_Ch09.xhtml#Fig3), you can see an example of where\
    \ the unique identifier is used. In that example, one other device is advertising\
    \ itself with the same session identifier as us, using a display name of Manny\
    \ Sullivan’s iPhone.\n\nThe last argument is the *session mode*. Session modes\
    \ determine how the session will behave once it’s all set up and ready to make\
    \ connections. There are three options:\n\n*   If you specify GKSessionModeServer,\
    \ your session will advertise itself on the network so that other devices can\
    \ see it and connect to it, but it won’t look for other sessions being advertised.\n\
    *   If you specify GKSessionModeClient, the session will not advertise itself\
    \ on the network, but will look for other sessions that are advertising themselves.\n\
    *   If you specify GKSessionModePeer, your session will both advertise its availability\
    \ on the network and also look for other sessions.\n\n**Note**  Although you will\
    \ generally use GKSessionModePeer when establishing a peer-to-peer network and\
    \ GKSessionModeServer and GKSessionModeClient when setting up a client–server\
    \ network, these constants dictate only whether an individual session will advertise\
    \ its availability on the network using Bonjour or look for other available nodes.\
    \ They are not necessarily indicative of which of the network models is being\
    \ used by the application.\n\nRegardless of the type of session you create, it\
    \ won’t actually start advertising its availability or looking for other available\
    \ nodes until you tell it to do so. You do that by setting the session property\
    \ available to YES. Alternatively, you can have the node stop advertising its\
    \ availability and/or stop looking for other available nodes by setting available\
    \ to NO.\n\nFinding and Connecting to Other Sessions\n\nWhen a session that was\
    \ created using GKSessionModeClient or GKSessionModePeer finds another node advertising\
    \ its availability, it will call the method session:peer:didChangeState: and pass\
    \ in a state of GKPeerStateAvailable. This same method will be called every time\
    \ a peer becomes available or unavailable, as well as when a peer connects or\
    \ disconnects. The second argument will tell you which peer’s state changed, and\
    \ the last argument will tell you its new state.\n\nIf you find one or more other\
    \ sessions that are available, you can choose to connect the session to one of\
    \ the available sessions by calling connectToPeer:withTimeout:. Here’s an example\
    \ of session:peer:didChangeState: that connects to the first available peer it\
    \ finds:\n\n```\n- (void)session:(GKSession *)session peer:(NSString *)peerID\
    \ \n                         didChangeState:(GKPeerConnectionState)inState \n\
    {\n    if (inState == GKPeerStateAvailable) {\n        [session connectToPeer:peerID\
    \ withTimeout:60];\n        session.available = NO;\n    }\n}\n```\n\nThis isn’t\
    \ a very realistic example, as you would normally allow the user to choose the\
    \ node to which they connect. It’s a good example, though, because it shows both\
    \ of the basic functions of a client node. In this example, you’ve set available\
    \ to NO after you connect. This will cause your session to stop looking for additional\
    \ sessions. Since a session can connect to multiple peers, you won’t always want\
    \ to do this. If your application supports multiple connections, you will want\
    \ to leave it at YES.\n\nListening for Other Sessions\n\nWhen a session is specified\
    \ with a session mode of GKSessionModeServer or GKSessionModePeer, it will be\
    \ notified when another node attempts to connect. When this happens, the session\
    \ will call the method session:didReceiveConnectionRequestFromPeer:. You can choose\
    \ to accept the connection by calling acceptConnectionFromPeer:error: or you can\
    \ reject it by calling denyConnectionFromPeer:. The following is an example that\
    \ assumes the presence of a Boolean instance variable called amAcceptingConnections.\
    \ If it’s set to YES, it accepts the connection, and if it’s set to NO, it rejects\
    \ the connection."
  trans: "\n# 排版后的文本\n\n在 iPhone 上实现点对点模型最简单且最常见的方式是将两台设备相互连接。例如，在头对头游戏中就使用了这种模型。`Game\
    \ Kit`让此类点对点网络的设置与配置变得极为简单，正如你将在本章中看到的那样。\n\n## 混合客户端-服务器 / 点对点网络\n\n客户端-服务器模型和点对点模型并非互斥关系，完全有可能创建同时利用这两种模型的混合程序。例如，一款客户端-服务器游戏可能允许某些通信直接从客户端到客户端，而无需经过服务器。在带有聊天窗口的游戏中，它可能允许仅发送给单一收件人的消息直接从发送者的设备发往目标收件人的设备，而其他类型的聊天消息则会发送至服务器，再由服务器分发给所有客户端。\n\
    \n在我们讨论应用节点之间建立连接和数据传输的机制时，你应该牢记这些不同的网络模型。`Node`（节点）是一个通用术语，指连接到应用网络的任何计算机。客户端、服务器或对等端都是节点。你在本章中将要编写的游戏将采用一个简单的、包含两台设备的点对点模型。\n\
    \n## Game Kit 会话\n\n`Game Kit`的核心是会话，由 `GKSession` 类表示。该会话代表你与一部或多部其他 iPhone 之间网络连接的端点。无论你是充当客户端、服务器还是对等端，`GKSession`\
    \ 的一个实例都将代表你与其他设备之间的连接。无论你是使用对等端选择器，还是编写自己的代码来查找可连接的设备并让用户从中选择，都需要使用 `GKSession`。\n\
    \n**注意** 在阅读接下来的几页内容时，不必过于担心每个元素是在哪里实现的。这些内容最终都会在你本章创建的项目中得到整合。\n\n你还可以使用 `GKSession`\
    \ 向已连接的对等端发送数据。你需要实现会话代理方法，以便在会话状态发生变化时（例如当另一个节点连接或断开时）收到通知，同时也能接收其他节点发送的数据。\n\
    \n### 创建会话\n\n要使用会话，必须先创建、分配并初始化一个 `GKSession` 对象，如下所示：\n\n```\n    GKSession\
    \ *theSession = [[GKSession alloc] initWithSessionID:@\"com.apporchard.game\"\
    \ \n                                                   displayName:nil \n    \
    \                                                sessionMode:GKSessionModePeer];\n\
    ```\n\n初始化会话时需要传递三个参数。\n\n第一个参数是*会话标识符*，它是一个对应用而言唯一的字符串。这用于防止你的应用会话意外连接到其他程序的会话。由于会话标识符是字符串，因此可以是任何内容，但惯例是使用反向\
    \ DNS 风格的名称，例如 `com.apporchard.game`。通过这种方式（而非随机挑选一个单词或短语）来分配会话标识符，可以降低意外选中 App\
    \ Store 上其他应用所用会话标识符的可能性。\n\n第二个参数是*显示名称*。这是一个提供给其他节点的名称，用于唯一标识你的设备。如果你传入 `nil`，显示名称将默认为设备在\
    \ iTunes 中设置的名称。如果连接了多台设备，这将允许其他用户看到哪些设备可用，并连接到正确的设备。在图 9-3 中，你可以看到一个使用唯一标识符的示例。在那个例子中，另一台设备使用与我们相同的会话标识符进行广播，并使用显示名称“Manny\
    \ Sullivan 的 iPhone”。\n\n最后一个参数是*会话模式*。会话模式决定了会话在完成设置并准备好建立连接后的行为。共有三个选项：\n\n\
    *   如果指定 `GKSessionModeServer`，你的会话将在网络上广播自己，以便其他设备可以发现并连接它，但它不会去寻找其他正在广播的会话。\n\
    *   如果指定 `GKSessionModeClient`，会话不会在网络上广播自己，但会去寻找其他正在广播的会话。\n*   如果指定 `GKSessionModePeer`，你的会话既会在网络上广播自己的可用性，也会去寻找其他会话。\n\
    \n**注意** 虽然在建立点对点网络时通常使用 `GKSessionModePeer`，在设置客户端-服务器网络时使用 `GKSessionModeServer`\
    \ 和 `GKSessionModeClient`，但这些常量仅决定单个会话是否使用 Bonjour 在网络上广播其可用性，或是否寻找其他可用节点。它们并不一定表示应用正在使用哪种网络模型。\n\
    \n无论你创建何种类型的会话，在通知它开始广播可用性或寻找其他可用节点之前，它并不会实际开始这些操作。你可以将会话属性 `available` 设置为 `YES`\
    \ 来开始广播或寻找。或者，你也可以通过将 `available` 设置为 `NO`，让节点停止广播可用性和/或停止寻找其他可用节点。\n\n### 查找并连接其他会话\n\
    \n当使用 `GKSessionModeClient` 或 `GKSessionModePeer` 创建的会话发现另一个正在广播可用性的节点时，它会调用 `session:peer:didChangeState:`\
    \ 方法，并传入状态 `GKPeerStateAvailable`。每当对等端变为可用或不可用，以及对等端连接或断开时，都会调用此方法。第二个参数将告诉你哪个对等端的状态发生了变化，最后一个参数则会告诉你其新状态。\n\
    \n如果你发现一个或多个其他可用会话，可以选择通过调用 `connectToPeer:withTimeout:` 将会话连接到其中一个可用会话。以下是 `session:peer:didChangeState:`\
    \ 的一个示例，它会连接到它找到的第一个可用对等端：\n\n```\n- (void)session:(GKSession *)session peer:(NSString\
    \ *)peerID \n                         didChangeState:(GKPeerConnectionState)inState\
    \ \n{\n    if (inState == GKPeerStateAvailable) {\n        [session connectToPeer:peerID\
    \ withTimeout:60];\n        session.available = NO;\n    }\n}\n```\n\n这不是一个非常现实的示例，因为你通常会让用户选择他们要连接的节点。然而，这是一个不错的示例，因为它展示了客户端节点的两个基本功能。在此示例中，你在连接后将\
    \ `available` 设置为 `NO`。这会导致你的会话停止寻找其他会话。由于一个会话可以连接到多个对等端，因此你并不总是需要这样做。如果你的应用支持多个连接，则应将此属性保留为\
    \ `YES`。\n\n### 监听其他会话\n\n当会话的模式指定为 `GKSessionModeServer` 或 `GKSessionModePeer`\
    \ 时，它会在另一个节点尝试连接时收到通知。此时，会话会调用 `session:didReceiveConnectionRequestFromPeer:`\
    \ 方法。你可以通过调用 `acceptConnectionFromPeer:error:` 接受连接，或者通过调用 `denyConnectionFromPeer:`\
    \ 拒绝连接。以下是一个示例，它假设存在一个名为 `amAcceptingConnections` 的布尔类型实例变量。如果该变量设置为 `YES`，则接受连接；如果设置为\
    \ `NO`，则拒绝连接。\n"
- fmt: "```objc\n- (void)session:(GKSession *)session didReceiveConnectionRequestFromPeer:(NSString\
    \ *)peerID \n{\n    if (amAcceptingConnections) {\n        NSError *error;\n \
    \       if (![session acceptConnectionFromPeer:peerID error:&error]) {\n     \
    \       // Handle error\n        }\n    }\n    else {\n        [session denyConnectionFromPeer:peerID];\n\
    \    }\n}\n```\n\n## Sending Data to a Peer\n\nOnce you have a session that is\
    \ connected to another node, it’s very easy to send data to that node. All you\
    \ need to do is call one of two methods. Which method you call depends on whether\
    \ you want to send the information to all connected sessions or to just specific\
    \ ones. To send data to just specified peers, use the method `sendData:toPeers:withDataMode:error:`.\
    \ To send data to every connected peer, use the method `sendDataToAllPeers:withDataMode:error:`.\n\
    \nIn both cases, you need to specify a *data mode* for the connection. The data\
    \ mode tells the session how it should try to send the data. There are two options:\n\
    \n- `GKSendDataReliable`: This option ensures that the information will arrive\
    \ at the other session. It will send the data in chunks if it’s over a certain\
    \ size and wait for an acknowledgment from the other peer for every chunk.\n-\
    \ `GKSendDataUnreliable`: This mode sends the data immediately and does not wait\
    \ for acknowledgment. It’s much faster than `GKSendDataReliable`, but there is\
    \ a small chance of the complete message not arriving at the other node.\n\nUsually,\
    \ the `GKSendDataReliable` data mode is the one you’ll want to use, though if\
    \ you have a program where speed of transmission matters more than accuracy, then\
    \ you should consider `GKSendDataUnreliable`.\n\nHere is what it looks like when\
    \ you send data to a single peer:\n\n```objc\nNSError *error = nil;\nif (![session\
    \ sendData:theData \n                toPeers:[NSArray arrayWithObject:thePeerID]\
    \ \n          withDataMode:GKSendDataReliable error:&error]) {\n        // Do\
    \ error handling\n} \n```\n\nAnd here’s what it looks like to send data to all\
    \ connected peers:\n\n```objc\nNSError *error = nil;\nif (![session sendDataToAllPeers:data\
    \ \n                  withDataMode:GKSendDataReliable \n           error:&error])\
    \ {\n        // Do error handling\n}\n```\n\n## Packaging Up Information to Send\n\
    \nAny information that you can get into an instance of `NSData` can be sent to\
    \ other peers. There are two basic approaches to doing this for use in Game Kit.\
    \ The first is to use archiving and unarchiving, just as we did in the archiving\
    \ section of [Chapter 11](#9781430238072_Ch11.xhtml) of *Beginning iOS 6 Development*\
    \ (Apress, 2012).\n\nWith the archiving/unarchiving method, you define a class\
    \ to hold a single packet of data to be sent. That class will contain instance\
    \ variables to hold whatever types of data you might need to send. When it’s time\
    \ to send a packet, you create and initialize an instance of the packet object,\
    \ and then you use `NSKeyedArchiver` to archive the instance of that object into\
    \ an instance of `NSData`, which can be passed to `sendData:toPeers:withDataMode:error:`\
    \ or to `sendDataToAllPeers:withDataMode:error:`. You’ll use this approach in\
    \ this chapter’s example. However, this approach incurs a small amount of overhead,\
    \ since it requires the creation of objects to be passed, along with archiving\
    \ and unarchiving those objects.\n\nAlthough archiving objects is the best approach\
    \ in many cases, because it is easy to implement and it fits well with the design\
    \ of Cocoa Touch, there may be some cases where applications need to constantly\
    \ send a lot of data to their peers, and this overhead might be unacceptable.\
    \ In those situations, a faster option is to just use a static array (a regular\
    \ old C array, not an `NSArray`) as a local variable in the method that sends\
    \ the data.\n\nYou can copy any data you need to send to the peer into this static\
    \ array, and then create an `NSData` instance from that static array. There’s\
    \ still some object creation involved in creating the `NSData` instance, but it’s\
    \ one object instead of two, and you don’t have the overhead of archiving. Here’s\
    \ a simple example of sending data using this faster technique:\n\n```objc\nNSUInteger\
    \ packetData[2];\npacket[0] = foo;\npacket[1] = bar;\nNSData *packet = [NSData\
    \ dataWithBytes:packetData length:2 * sizeof(packetData)];\nNSError *error = nil;\n\
    if (![session sendDataToAllPeers:packet withDataMode:GKSendDataReliable error:&error])\
    \ {\n    // Handle error\n}\n```\n\n## Receiving Data from a Peer\n\nWhen a session\
    \ receives data from a peer, the session passes the data to a method on an object\
    \ known as a *data receive handler*. The method is `receiveData:fromPeer:inSession:context:`.\
    \ By default, the data receive handler is the session’s delegate, but it doesn’t\
    \ have to be. You can specify another object to handle the task by calling `setDataReceiveHandler:withContext:`\
    \ on the session and passing in the object you want to receive data from the session.\n\
    \nWhichever object is specified as the data receive handler must implement `receiveData:fromPeer:inSession:context:`\
    \ and that method will be called any time new data comes in from a peer. There’s\
    \ no need to acknowledge receipt of the data or worry about waiting for the entire\
    \ packet. You can just use the provided data as is appropriate for your program.\
    \ All the gnarly aspects of network data transmission are handled for you. Every\
    \ call to `sendDataToAllPeers:withDataMode:error:` made by other peers, and every\
    \ call to `sendData:toPeers:withDataMode:error:` made by other peers who specify\
    \ your peer identifier, will result in one call of the data receive handler.\n\
    \nHere’s an example of a data receive handler method that would be the counterpart\
    \ to the earlier send example:\n\n```objc\n- (void)receiveData:(NSData *)data\
    \ \n           fromPeer:(NSString *)peer \n           inSession: (GKSession *)theSession\
    \ \n             context:(void *)context \n{\n    NSUInteger *packet = [data bytes];\n\
    \    NSUInteger foo = packet[0];\n    NSUInteger bar = packet[0];\n    // Do something\
    \ with foo and bar\n}\n```\n\nYou’ll look at receiving archived objects when you\
    \ build this chapter’s example.\n\n## Closing Connections\n\nWhen you’re finished\
    \ with a session, before you release the session object, it’s important to do\
    \ a little cleanup. Before releasing the session object, you must make the session\
    \ unavailable, disconnect it from all of its peers, set the data receive handler\
    \ to `nil`, and set the session delegate to `nil`. Here’s what the code in your\
    \ `dealloc` method (or any other time you need to close the connections) might\
    \ look like:\n\n```objc\nsession.available = NO;\n[session disconnectFromAllPeers];\n\
    [session setDataReceiveHandler: nil withContext: nil];\nsession.delegate = nil;\n\
    ```\n\nIf, instead, you just want to disconnect from one specific peer, you can\
    \ call `disconnectPeerFromAllPeers:`, which will disconnect the remote peer from\
    \ all the peers to which it was connected. Use this method with caution, as it\
    \ will cause the peer on which it was called to disconnect from all remote peers,\
    \ not just your application. Here’s what using it might look like:\n\n```objc\n\
    [session disconnectPeerFromAllPeers:thePeer];\n```\n\n## The Peer Picker\n\nAlthough\
    \ Game Kit does not need to be used only for games, network games are clearly\
    \ the primary motivator behind the technology—at least if the name Apple chose\
    \ is any clue. The most common type of network model for mobile games is the head-to-head\
    \ or simple peer-to-peer model, where one player plays a game against one other\
    \ player. Because this scenario is so common, Apple has provided a mechanism called\
    \ the *peer picker* for easily setting up this simple type of peer-to-peer network.\n\
    \n### Creating the Peer Picker"
  raw: "```\n- (void)session:(GKSession *)session didReceiveConnectionRequestFromPeer:(NSString\
