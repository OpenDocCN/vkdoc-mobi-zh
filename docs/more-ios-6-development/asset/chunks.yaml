- fmt: '如果你展开导航内容面板中的 `CoreDataApp` 组，你会看到一个名为 `CoreDataApp.xcdatamodel` 的文件。该文件是你的项目的默认数据模型。Xcode
    为你创建了这个文件，因为你在项目配置表中勾选了“使用 Core Data”复选框。单击 `CoreDataApp.xcdatamodel` 以打开 Xcode
    的模型编辑器。确保实用工具面板（`Utility` pane）可见（它应该是视图栏上的第三个按钮），然后选择检查器（`Inspector`）。你的 Xcode
    窗口应该看起来像 [Figure 2-8](#9781430238072_Ch02.xhtml#Fig8)。


    ![9781430238072_Fig02-08.jpg](images/9781430238072_Fig02-08.jpg)


    [Figure 2-8](#9781430238072_Ch02.xhtml#_Fig8) Xcode 显示模型编辑器和检查器


    当你选择了数据模型文件 `CoreDataApp.xcdatamodel` 时，编辑器面板会切换到 Core Data 模型编辑器（[Figure 2-9](#9781430238072_Ch02.xhtml#Fig9)）。在顶部，跳转栏保持不变。在左侧，装订线已被替换为一个更宽的面板，即顶级组件面板（`Top-Level
    Components` pane）。顶级组件面板概述了在数据模型中定义的实体、获取请求和配置（我们稍后会详细讨论这些）。你可以通过使用顶级组件面板底部的“添加实体”按钮来添加一个新实体。或者，你也可以使用
    **Editor ![image](images/arrow.jpg) Add Entity** 菜单选项。如果你单击并按住“添加实体”按钮，将会出现一个弹出菜单，包含以下选项：添加实体、添加获取请求和添加配置。无论你选择哪个选项，按钮的单击行为都会更改为该组件，并且按钮的标签也会相应地更改以反映此行为。添加获取请求和配置的菜单等效项可以在
    **Add Entity** 菜单项下方的 Editor 菜单中找到。


    ![9781430238072_Fig02-09.jpg](images/9781430238072_Fig02-09.jpg)


    [Figure 2-9](#9781430238072_Ch02.xhtml#_Fig9) 近距离查看模型编辑器


    顶级组件面板有两种样式：列表样式和层次结构样式。你可以通过使用顶级组件面板底部的“大纲样式”选择器组在这两种样式之间切换。使用 `CoreDataApp`
    数据模型切换样式不会改变顶级组件面板中的任何内容，因为只有一个实体和一个配置，所以没有层次结构可以显示。如果你有一个依赖于另一个组件的组件，你会看到层次结构大纲样式显示了两者之间的层次关系。


    编辑器面板的大部分区域被详细编辑器（`Detail` editor）占据。详细编辑器有两种编辑器样式：表样式和图样式。默认情况下（如图 [Figure 2-9](#9781430238072_Ch02.xhtml#Fig9)
    所示），详细编辑器处于表样式。你可以通过使用编辑器面板右下角的“编辑器样式”选择器组在这两种样式之间切换。试试看。你可以看到这两种样式的区别。


    当你在顶级组件面板中选择了一个实体时，详细编辑器会以表样式显示三个表格：属性（`Attributes`）、关系（`Relationships`）和获取属性（`Fetched
    Properties`）。同样，我们稍后会详细讨论这些。你可以通过使用详细编辑器下方的“添加属性”按钮来添加一个新属性。与“添加实体”按钮类似，单击并按住会显示一个弹出菜单，包含以下选项：添加属性、添加关系和添加获取属性。同样，此按钮的单击行为会根据你的选择而改变，其标签也会反映该行为。在
    `Editor` 菜单下有三个菜单项：添加属性（`Add Attribute`）、添加关系（`Add Relationship`）和添加获取属性（`Add
    Fetched Property`）。这些菜单项仅在顶级组件面板中选中了一个实体时才会生效。


    如果你将详细编辑器切换到图样式，你会看到一个大的网格，中心有一个单独的圆角矩形。这个圆角矩形代表顶级组件面板中的实体。为此项目使用的模板创建了一个实体 `Event`。在顶级组件面板中选择
    `Event` 等同于在图视图中选择圆角矩形。


    试试看。在详细编辑器网格中单击实体外部以取消选择它，然后在顶级组件面板中单击 `Event` 行。图视图中的实体也会被选中。顶级组件面板和图视图显示了同一实体列表的两个不同视图。


    当未被选中时，`Event` 实体方块的标题栏和线条应为粉红色。如果你在顶级组件面板中选择了 `Event` 实体，那么详细编辑器中的 `Event` 实体会变为蓝色，表示它被选中了。现在，单击详细编辑器网格上
    `Event` 圆角矩形之外的任意位置。`Event` 实体应该在顶级组件面板中取消选中，并且在详细编辑器中改变颜色。如果你在详细编辑器中单击 `Event`
    实体，它将再次被选中。当选中时，`Event` 实体应该在左侧和右侧有一个调整大小手柄（或圆点），允许你调整其宽度。


    你现在拥有 `Event` 实体。它只有一个名为 `timeStamp` 的属性，并且没有关系。`Event` 实体是作为此模板的一部分创建的。当你设计自己的数据模型时，你很可能会删除
    `Event` 实体，从头创建你自己的实体。刚才，你在模拟器中运行了你的 Core Data 示例应用程序。当你按下 **+** 图标时，一个新的 `Event`
    实例被创建。我们将在几页后更详细地研究实体，它们取代了你原来用来保存数据的 Objective-C 数据模型类。我们稍后会回到模型编辑器，看看它是如何工作的。现在，只需记住：持久化存储是
    Core Data 存储数据的地方，而数据模型定义了该数据的形式。还要记住，每个持久化存储有且只有一个数据模型。


    检查器为在模型编辑器中选择的项目提供更详细的信息。由于每个项目在检查器中可能有不同的视图，我们将在讨论组件及其属性时讨论这些细节。话虽如此，让我们讨论三个顶级组件：实体、获取请求和配置。


    ## 实体


    实体可以被认为是 Core Data 中与 Objective-C 类声明相对应的概念。实际上，在应用程序中使用实体时，你基本上是将其当作一个具有某些 Core
    Data 特定实现的 Objective-C 类来对待。你使用模型编辑器来定义构成实体的属性。每个实体都被赋予一个名称（在这里是 `Event`），该名称必须以大写字母开头。当你之前运行
    `CoreDataApp` 时，每次你按下添加（+）按钮，都会实例化一个新的 `Event` 实例并将其存储在应用程序的持久化存储中。


    确保实用工具面板已展开，并选择 `Event` 实体。现在查看实用工具面板中的检查器（通过在检查器选择器栏中选择检查器按钮，确保检查器正在显示）。请注意，检查器面板现在允许你编辑或更改实体的各个方面（[Figure
    2-10](#9781430238072_Ch02.xhtml#Fig10)）。我们稍后会介绍检查器的详细信息。


    ## 属性


    当编辑器面板列出数据模型的所有实体时，检查器面板允许你“检查”属于所选实体的属性。一个实体可以由任意数量的属性组成。有三种不同类型的属性：属性（`attributes`）、关系（`relationships`）和获取属性（`fetched
    properties`）。当你在模型编辑器中选择一个实体的属性时，该属性的详细信息会显示在检查器面板中。'
  raw: 'If you expand the CoreDataApp group in the Navigator content pane, you’ll
    see a file called CoreDataApp.xcdatamodel. This file is the default data model
    for your project. Xcode created this file for you because you checked the “Use
    Core Data” checkbox in the Project Configuration sheet. Single-click CoreDataApp.xcdatamodel
    to bring up Xcode’s model editor. Make sure the Utility pane is visible (it should
    be the third button on the View bar), and select the Inspector. Your Xcode window
    should look like [Figure 2-8](#9781430238072_Ch02.xhtml#Fig8).


    ![9781430238072_Fig02-08.jpg](images/9781430238072_Fig02-08.jpg)


    [Figure 2-8.](#9781430238072_Ch02.xhtml#_Fig8)  Xcode with the model editor and
    inspector


    When you selected the data model file, CoreDataApp.xcdatamodel, the Editor pane
    changed to present the Core Data model editor ([Figure 2-9](#9781430238072_Ch02.xhtml#Fig9)).
    Along the top, the jump bar remains unchanged. Along the left, the gutter has
    been replaced by a wider pane, the Top-Level Components pane. The Top-Level Components
    pane outlines the entities, fetch requests, and configurations defined in the
    data model (we’ll cover these in detail in a little bit). You can add a new entity
    by using the Add Entity button at the bottom of the Top-Level Components pane.
    Alternately, you can use the **Editor ![image](images/arrow.jpg) Add Entity**
    menu option. If you click and hold the Add Entity button, you will be presented
    with a pop-up menu of choices: Add Entity, Add Fetch Request, and Add Configuration.
    Whatever option you choose, the single-click behavior of the button will change
    to that component and the label of the button will change to reflect this behavior.
    The menu equivalents for adding fetch requests and configurations can be found
    in the Editor menu below the **Add Entity** menu item.


    ![9781430238072_Fig02-09.jpg](images/9781430238072_Fig02-09.jpg)


    [Figure 2-9.](#9781430238072_Ch02.xhtml#_Fig9)  A close look at the model editor


    The Top-Level Components pane has two styles: list and hierarchical. You can toggle
    between these two styles by using the Outline Style selector group found at the
    bottom of the Top-Level Components pane. Switching styles with the CoreDataApp
    data model won’t change anything in the Top-Level Components pane, as there’s
    only one entity and one configuration, so there’s no hierarchy to be shown. If
    you had a component that depended on another component, you’d see the hierarchical
    relationship between the two with the hierarchical outline style.


    The bulk of the Editor pane is taken up by the Detail editor. The Detail editor
    has two editor styles: table and graph. By default (and pictured in [Figure 2-9](#9781430238072_Ch02.xhtml#Fig9)),
    the Detail editor is in table style. You can toggle between these styles by using
    the Editor Style selector group on the bottom right of the Editor pane. Try it.
    You can see the difference in the two styles.


    When you select an entity in the Top-Level Components pane, the Detail editor
    will display, in table style, three tables: Attributes, Relationships, and Fetched
    Properties. Again, we’ll cover these in detail in a little bit. You can add a
    new attribute by using the Add Attribute button below the Detail editor. Similar
    to the Add Entity button, a click-and-hold will reveal a pop-up menu of choices:
    Add Attribute, Add Relationship, and Add Fetched Property. Again, the single-click
    behavior of this button will change depending on your choice, with its label reflecting
    that behavior. Under the Editor menu there are three menu items: Add Attribute,
    Add Relationship, and Add Fetched Property. These are only active when an entity
    is selected in the Top-Level Components pane.


    If you switch the Detail editor to graph style, you’ll see a large grid with a
    single rounded square in the center. This rounded square represents the entity
    in the Top-Level Components pane. The template you used for this project creates
    a single entity, Event. Selecting Event in the Top Level Components pane is the
    same as selecting the rounded rectangle in the graph view.


    Try it. Click outside the entity in the Detail editor grid to deselect it, and
    then click the Event line in the Top-Level Components pane. The entity in the
    graph view will also be selected. The Top Level Components pane and the graph
    view show two different views of the same entity list.


    When unselected, the title bar and lines of the Event entity square should be
    pink. If you select the Event entity in the Top-Level Components pane, the Event
    entity in the Detail editor should change color to a blue, indicating it’s selected.
    Now click anywhere on the Detail editor grid, outside the Event rounded square.
    The Event entity should be deselected in the Top Level Components pane and should
    change color in the Detail editor. If you click on the Event entity in the Detail
    editor, it will be selected again. When selected, the Event entity should have
    a resize handle (or dot) on the left and right sides, allowing you to resize its
    width.


    You are currently given the Event entity. It has a single attribute, named timeStamp,
    and no relationships. The Event entity was created as part of this template. As
    you design your own data models, you’ll most likely delete the Event entity and
    create your own entities from scratch. A moment ago, you ran your Core Data sample
    application in the simulator. When you pressed the **+** icon, a new instance
    of Event was created. Entities, which we’ll look at more closely in a few pages,
    replace the Objective-C data model class you would otherwise use to hold your
    data. We’ll get back to the model editor in just a minute to see how it works.
    For now, just remember that the persistent store is where Core Data stores its
    data, and the data model defines the form of that data. Also remember that every
    persistent store has one, and only one, data model.


    The inspector provides greater detail for the item(s) selected in the model editor.
    Since each item could have a different view in the inspector, we’ll discuss the
    details as we discuss the components and their properties. That being said, let’s
    discuss the three top-level components: entities, fetch requests, and configurations.


    Entities


    An entity can be thought as the Core Data analogue to an Objective-C class declaration.
    In fact, when using an entity in your application, you essentially treat it like
    an Objective-C class with some Core Data-specific implementation. You use the
    model editor to define the properties that define your entity. Each entity is
    given a name (in this case, Event), which must begin with a capital letter. When
    you ran CoreDataApp earlier, every time you pressed the Add (+) button, a new
    instance of Event was instantiated and stored in the application’s persistent
    store.


    Make sure the Utility pane is exposed, and select the Event entity. Now look at
    the inspector in the Utility pane (make sure the enspector is showing by selecting
    the Inspector button in the Inspector selector bar). Note that the Inspector pane
    now allows you to edit or change aspects of the entity ([Figure 2-10](#9781430238072_Ch02.xhtml#Fig10)).
    We’ll get to the details of the inspector later.


    Properties


    While the Editor pane lists all the data model’s entities, the Inspector pane
    allows you to “inspect” the properties that belong to the selected entity. An
    entity can be made up of any number of properties. There are three different types
    of properties: attributes, relationships, and fetched properties. When you select
    an entity’s property in the model editor, the property’s details are displayed
    in the Inspector pane.


