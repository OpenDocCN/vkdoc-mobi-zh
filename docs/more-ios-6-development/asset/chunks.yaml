- fmt: "There are two challenges that this approach presents to the programmer. First,\
    \ who thinks in degrees latitude or longitude? Although degrees latitude represent\
    \ roughly the same distance everywhere in the world, degrees longitude vary greatly\
    \ in the amount of distance they represent as you move from the pole to the equator,\
    \ so calculating the degrees longitude isn’t as straightforward.\n\nThe second\
    \ challenge is that a map view has a specific width-to-height ratio (called an\
    \ *aspect ratio*), and the `latitudeDelta` and `longitudeDelta` you specify must\
    \ represent an area with that same aspect ratio. Fortunately, Apple provides tools\
    \ for dealing with both of these issues.\n\n## Converting Degrees to Distance\n\
    \nEach degree of latitude represents approximately 69 miles, or about 111 kilometers,\
    \ no matter where you are. This makes determining the number to pass in as the\
    \ `latitudeDelta` of an `MKCoordinateSpan` fairly easy to calculate. You can just\
    \ divide the lateral distance you want to display by 69 if you’re using miles\
    \ or 111 if you’re using kilometers.\n\n**Note:** Since the Earth isn’t a perfect\
    \ sphere (technically speaking, it’s close to being an oblate spheroid), there\
    \ actually is some variation between the amount of distance that one degree latitude\
    \ represents, but it’s not enough variation to bother factoring into this calculation,\
    \ since it’s only about a one degree variation from pole to equator. At the equator,\
    \ one degree of latitude equals 69.046767 miles or 111.12 kilometers, and the\
    \ number gets a little smaller as you move toward the poles. We chose 69 and 111\
    \ because they’re nice round numbers that are within 1% of the actual distance\
    \ pretty much everywhere.\n\nThe distance represented by one degree longitude,\
    \ however, is not quite so easy to calculate. To do the same calculation for longitude,\
    \ you have to take the latitude into account, because the distance represented\
    \ by one degree longitude depends on where you are in relation to the equator.\
    \ To calculate the distance represented by degrees longitude, you have to perform\
    \ some gnarly math. Fortunately, Apple has done the gnarly math for you and provides\
    \ a method called `MKCoordinateRegionMakeWithDistance()` that you can use to create\
    \ a region. You provide coordinates to act as the center, along with the distance\
    \ in meters for the latitudinal and longitudinal span. The function will look\
    \ at the latitude in the coordinates provided and calculate both delta values\
    \ for you in degrees. Here is how you might create a region to show one kilometer\
    \ on each side of a specific location represented by a `CLLocationCoordinate2D`\
    \ called `center`:\n\n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
    \ 2000, 2000);\n```\n\nTo show a kilometer on each side of `center`, you must\
    \ specify 2000 meters total for each span: 1000 to the left plus 1000 to the right\
    \ and 1000 to the top plus 1000 to the bottom. After this call, `viewRegion` will\
    \ contain a properly formatted `MKCoordinateRegion` that’s almost ready for use.\
    \ All that’s left is taking care of the aspect ratio problem.\n\n## The Gnarly\
    \ Math\n\nThe math to calculate the distance of one degree longitude really isn’t\
    \ that gnarly, so we thought we’d show those of you who are interested what the\
    \ man behind the curtain is doing. To calculate the distance for one degree longitude\
    \ at a given latitude, the calculation is\n\n![image](images/Eq_10-01.jpg)\n\n\
    If Apple didn’t provide a function for us, you could create a couple of macros\
    \ that would accomplish the same thing just by following this formula. The radius\
    \ of the earth is roughly 3963.1676 miles, or 6378.1 kilometers. So, to calculate\
    \ the distance for one degree of longitude at a specific latitude contained in\
    \ the variable `lat`, you would do this:\n\n```\ndouble longitudeMiles = ((M_PI/180.0)\
    \ × 3963.1676 × cos(latitude));\n```\n\nYou can do the same calculation to determine\
    \ the distance of one degree longitude in kilometers, like so:\n\n```\ndouble\
    \ longitudeKilometers = ((M_PI/180.0) × 6378.1 × cos(latitude));\n```\n\n## Accommodating\
    \ Aspect Ratio\n\nIn the previous section we showed how to create a span that\
    \ showed one kilometer on each side of a given location. However, unless the map\
    \ view is perfectly square, there’s no way that the view can show exactly one\
    \ kilometer on each of the four sides of center. If the map view is wider than\
    \ it is tall, the `longitudeDelta` will need to be larger than the `latitudeDelta`.\
    \ If the map view is taller than it is wide, the opposite is true.\n\nThe `MKMapView`\
    \ class has an instance method that will adjust a coordinate region to match the\
    \ map view’s aspect ratio. That method is called `regionThatFits:`. To use it,\
    \ you just pass in the coordinate region you created, and it will return a new\
    \ coordinate region that is adjusted to the map view’s aspect ratio. Here’s how\
    \ to use it:\n\n```\nMKCoordinateRegion adjustedRegion = [mapView regionThatFits:viewRegion];\n\
    ```\n\n## Setting the Region to Display\n\nOnce you’ve created a coordinate region,\
    \ you can tell a map view to display that region by calling the method `setRegion:animated:`.\
    \ If you pass `YES` for the second parameter, the map view will zoom, shift, or\
    \ otherwise animate the view from its current location to its new location. Here\
    \ is an example that creates a coordinate region, adjusts it to the map views’s\
    \ aspect ratio, and then tells the map view to display that region:\n\n```\nMKCoordinateRegion\
    \ viewRegion = MKCoordinateRegionMakeWithDistance(center, 2000, 2000); \nMKCoordinateRegion\
    \ adjustedRegion = [mapView regionThatFits:viewRegion];\n[mapView setRegion:adjustedRegion\
    \ animated:YES];\n```\n\n## The Map View Delegate\n\nAs mentioned earlier, map\
    \ views can have delegates. Map views, unlike table views and pickers, can function\
    \ without a delegate. On a map view delegate, there are a number of methods you\
    \ can implement if you need to be notified about certain map-related tasks. They\
    \ allow you, for example, to get notified when the user changes the part of the\
    \ map they’re looking at, either by dragging to reveal a new section of the map\
    \ or by zooming to reveal a smaller or larger area. You can also get notified\
    \ when the map view loads new map data from the server or when the map view fails\
    \ to do so. The map view delegate methods are contained in the `MKMapViewDelegate`\
    \ protocol, and any class that is used as a map view delegate should conform to\
    \ that protocol.\n\n### Map Loading Delegate Methods\n\nWith iOS 6, the Map Kit\
    \ framework switched from Google Maps to an Apple-provided service to do its job.\
    \ It doesn’t store any map data locally except for temporary caches. Whenever\
    \ the map view needs to go to Apple’s servers to retrieve new map data, it will\
    \ call the delegate method `mapViewWillStartLoadingMap:`, and when it has successfully\
    \ retrieved the map data it needs, it will call the delegate method `mapViewDidFinishLoadingMap:`.\
    \ If you have any application-specific processing that needs to happen at either\
    \ time, you can implement the appropriate method on the map view’s delegate.\n\
    \nIf Map Kit encounters an error loading map data from the server, it will call\
    \ the method `mapViewDidFailLoadingMap:withError:` on its delegate. At the very\
    \ least, you should implement this delegate method and inform your user of the\
    \ problem so they aren’t sitting there waiting for an update that will never come.\
    \ Here’s a very simple implementation of that method that just shows an alert\
    \ and lets the user know that something went wrong:\n\n```\n- (void)mapViewDidFailLoadingMap:(MKMapView\
    \ *)mapView \n                       withError:(NSError *)error \n{\n    UIAlertView\
    \ *alert = [[UIAlertView alloc] \n        initWithTitle:NSLocalizedString(@\"\
    Error loading map\", \n            @\"Error loading map\")\n        message:[error\
    \ localizedDescription] \n        delegate:nil \n        cancelButtonTitle:NSLocalizedString(@\"\
    Okay\", @\"Okay\") \n        otherButtonTitles:nil];\n    [alert show];\n}\n```\n\
    \n### Region Change Delegate Methods"
  raw: "There are two challenges that this approach presents to the programmer. First,\
    \ who thinks in degrees latitude or longitude? Although degrees latitude represent\
    \ roughly the same distance everywhere in the world, degrees longitude vary greatly\
    \ in the amount of distance they represent as you move from the pole to the equator,\
    \ so calculating the degrees longitude isn’t as straightforward.\n\nThe second\
    \ challenge is that a map view has a specific width-to-height ratio (called an\
    \ *aspect ratio*), and the latitudeDelta and longitudeDelta you specify must represent\
    \ an area with that same aspect ratio. Fortunately, Apple provides tools for dealing\
    \ with both of these issues.\n\nConverting Degrees to Distance\n\nEach degree\
    \ of latitude represents approximately 69 miles, or about 111 kilometers, no matter\
    \ where you are. This makes determining the number to pass in as the latitudeDelta\
    \ of an MKCoordinateSpan fairly easy to calculate. You can just divide the lateral\
    \ distance you want to display by 69 if you’re using miles or 111 if you’re using\
    \ kilometers.\n\n**Note**  Since the Earth isn’t a perfect sphere (technically\
    \ speaking, it’s close to being an oblate spheroid), there actually is some variation\
    \ between the amount of distance that one degree latitude represents, but it’s\
    \ not enough variation to bother factoring into this calculation, since it’s only\
    \ about a one degree variation from pole to equator. At the equator, one degree\
    \ of latitude equals 69.046767 miles or 111.12 kilometers, and the number gets\
    \ a little smaller as you move toward the poles. We chose 69 and 111 because they’re\
    \ nice round numbers that are within 1% of the actual distance pretty much everywhere.\n\
    \nThe distance represented by one degree longitude, however, is not quite so easy\
    \ to calculate. To do the same calculation for longitude, you have to take the\
    \ latitude into account, because the distance represented by one degree longitude\
    \ depends on where you are in relation to the equator. To calculate the distance\
    \ represented by degrees longitude, you have to perform some gnarly math. Fortunately,\
    \ Apple has done the gnarly math for you and provides a method called MKCoordinateRegionMakeWithDistance()\
    \ that you can use to create a region. You provide coordinates to act as the center,\
    \ along with the distance in meters for the latitudinal and longitudinal span.\
    \ The function will look at the latitude in the coordinates provided and calculate\
    \ both delta values for you in degrees. Here is how you might create a region\
    \ to show one kilometer on each side of a specific location represented by a CLLocationCoordinate2D\
    \ called center:\n\n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
    \ 2000, 2000);\n```\n\nTo show a kilometer on each side of center, you must specify\
    \ 2000 meters total for each span: 1000 to the left plus 1000 to the right and\
    \ 1000 to the top plus 1000 to the bottom. After this call, viewRegion will contain\
    \ a properly formatted MKCoordinateRegion that’s almost ready for use. All that’s\
    \ left is taking care of the aspect ratio problem.\n\nTHE GNARLY MATH\n\nThe math\
    \ to calculate the distance of one degree longitude really isn’t that gnarly,\
    \ so we thought we’d show those of you who are interested what the man behind\
    \ the curtain is doing. To calculate the distance for one degree longitude at\
    \ a given latitude, the calculation is\n\n![image](images/Eq_10-01.jpg)\n\nIf\
    \ Apple didn’t provide a function for us, you could create a couple of macros\
    \ that would accomplish the same thing just by following this formula. The radius\
    \ of the earth is roughly 3963.1676 miles, or 6378.1 kilometers. So, to calculate\
    \ the distance for one degree of longitude at a specific latitude contained in\
    \ the variable lat, you would do this:\n\ndouble longitudeMiles = ((M_PI/180.0)\
    \ × 3963.1676 × cos(latitude));\n\nYou can do the same calculation to determine\
    \ the distance of one degree longitude in kilometers, like so:\n\ndouble longitudeKilometers\
    \ = ((M_PI/180.0) × 6378.1 × cos(latitude));\n\nAccommodating Aspect Ratio\n\n\
    In the previous section we showed how to create a span that showed one kilometer\
    \ on each side of a given location. However, unless the map view is perfectly\
    \ square, there’s no way that the view can show exactly one kilometer on each\
    \ of the four sides of center. If the map view is wider than it is tall, the longitudeDelta\
    \ will need to be larger than the latitudeDelta. If the map view is taller than\
    \ it is wide, the opposite is true.\n\nThe MKMapView class has an instance method\
    \ that will adjust a coordinate region to match the map view’s aspect ratio. That\
    \ method is called regionThatFits:. To use it, you just pass in the coordinate\
    \ region you created, and it will return a new coordinate region that is adjusted\
    \ to the map view’s aspect ratio. Here’s how to use it:\n\n```\nMKCoordinateRegion\
    \ adjustedRegion = [mapView regionThatFits:viewRegion];\n```\n\nSetting the Region\
    \ to Display\n\nOnce you’ve created a coordinate region, you can tell a map view\
    \ to display that region by calling the method setRegion:animated:. If you pass\
    \ YES for the second parameter, the map view will zoom, shift, or otherwise animate\
    \ the view from its current location to its new location. Here is an example that\
    \ creates a coordinate region, adjusts it to the map views’s aspect ratio, and\
    \ then tells the map view to display that region:\n\n```\nMKCoordinateRegion viewRegion\
    \ = MKCoordinateRegionMakeWithDistance(center, 2000, 2000); \nMKCoordinateRegion\
    \ adjustedRegion = [mapView regionThatFits:viewRegion];\n[mapView setRegion:adjustedRegion\
    \ animated:YES];\n```\n\nThe Map View Delegate\n\nAs mentioned earlier, map views\
    \ can have delegates. Map views, unlike table views and pickers, can function\
    \ without a delegate. On a map view delegate, there are a number of methods you\
    \ can implement if you need to be notified about certain map-related tasks. They\
    \ allow you, for example, to get notified when the user changes the part of the\
    \ map they’re looking at, either by dragging to reveal a new section of the map\
    \ or by zooming to reveal a smaller or larger area. You can also get notified\
    \ when the map view loads new map data from the server or when the map view fails\
    \ to do so. The map view delegate methods are contained in the MKMapViewDelegate\
    \ protocol, and any class that is used as a map view delegate should conform to\
    \ that protocol.\n\nMap Loading Delegate Methods\n\nWith iOS 6, the Map Kit framework\
    \ switched from Google Maps to an Apple-provided service to do its job. It doesn’t\
    \ store any map data locally except for temporary caches. Whenever the map view\
    \ needs to go to Apple’s servers to retrieve new map data, it will call the delegate\
    \ method mapViewWillStartLoadingMap:, and when it has successfully retrieved the\
    \ map data it needs, it will call the delegate method mapViewDidFinishLoadingMap:.\
    \ If you have any application-specific processing that needs to happen at either\
    \ time, you can implement the appropriate method on the map view’s delegate.\n\
    \nIf Map Kit encounters an error loading map data from the server, it will call\
    \ the method mapViewDidFailLoadingMap:withError: on its delegate. At the very\
    \ least, you should implement this delegate method and inform your user of the\
    \ problem so they aren’t sitting there waiting for an update that will never come.\
    \ Here’s a very simple implementation of that method that just shows an alert\
    \ and lets the user know that something went wrong:\n\n```\n- (void)mapViewDidFailLoadingMap:(MKMapView\
    \ *)mapView \n                       withError:(NSError *)error \n{\n    UIAlertView\
    \ *alert = [[UIAlertView alloc] \n        initWithTitle:NSLocalizedString(@\"\
    Error loading map\", \n            @\"Error loading map\")\n        message:[error\
    \ localizedDescription] \n        delegate:nil \n        cancelButtonTitle:NSLocalizedString(@\"\
    Okay\", @\"Okay\") \n        otherButtonTitles:nil];\n    [alert show];\n}\n```\n\
    \nRegion Change Delegate Methods"
  trans: "\n这种方法给程序员带来了两个挑战。首先，谁会以经纬度为单位来思考呢？虽然纬度一度在世界各地大致代表相同的距离，但经度一度所代表的距离会随着你从极地移动到赤道而大幅变化，因此计算经度并非那么直截了当。\n\
    \n第二个挑战是，地图视图具有特定的宽高比（称为*宽高比*），而你指定的 `latitudeDelta` 和 `longitudeDelta` 必须代表具有相同宽高比的区域。幸运的是，Apple\
    \ 提供了工具来处理这两个问题。\n\n## 将度数转换为距离\n\n无论你身在何处，每一纬度大约代表 69 英里（约 111 公里）。这使得确定传递给 `MKCoordinateSpan`\
    \ 的 `latitudeDelta` 参数值相当容易计算。如果你使用英里，只需将你想要显示的横向距离除以 69；如果你使用公里，则除以 111。\n\n\
    **注意：** 由于地球并非完美球体（严格来说，它接近一个扁球体），因此每一纬度所代表的实际距离确实存在一些差异，但这种差异不足以让我们费心去计算它，因为从极地到赤道，它仅仅有大约一度的变化。在赤道上，每一纬度等于\
    \ 69.046767 英里或 111.12 公里，当你向两极移动时，这个数值会略微变小。我们选择 69 和 111，因为它们是几乎在任何地方都与实际距离误差在\
    \ 1% 以内的整洁整数。\n\n然而，计算每一经度所代表的距离就不那么容易了。要对经度做同样的计算，你必须将纬度考虑在内，因为每一经度所代表的距离取决于你相对于赤道的位置。要计算经度所代表的距离，你必须进行一些复杂的数学运算。幸运的是，Apple\
    \ 已经为你完成了这些复杂的计算，并提供了一个名为 `MKCoordinateRegionMakeWithDistance()` 的方法，你可以用它来创建一个区域。你提供作为中心点的坐标，以及纬度和经度跨度以米为单位的距离。该函数会查看所提供坐标中的纬度，并为你计算以度数为单位的两个\
    \ delta 值。以下是你创建一个区域以显示由 `CLLocationCoordinate2D` 结构体（名为 `center`）表示的特定位置周围每侧一公里区域的方法：\n\
    \n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
    \ 2000, 2000);\n```\n\n要显示 `center` 的每侧一公里，你必须为每个跨度总共指定 2000 米：左侧 1000 米加右侧 1000\
    \ 米，以及顶部 1000 米加底部 1000 米。此调用之后，`viewRegion` 将包含一个格式正确的 `MKCoordinateRegion`，它几乎可以立即使用。剩下的就是处理宽高比问题。\n\
    \n## 复杂的数学运算\n\n计算每一经度距离的数学运算其实并不那么复杂，所以我们认为应该向那些感兴趣的读者展示一下幕后原理。要计算在给定纬度下每一经度的距离，计算公式是：\n\
    \n![image](img/Eq_10-01.jpg)\n\n如果 Apple 没有为我们提供函数，你可以遵循这个公式创建几个宏来实现同样的功能。地球半径大约为\
    \ 3963.1676 英里，即 6378.1 公里。因此，要计算存储在变量 `lat` 中特定纬度处的每一经度距离，你可以这样做：\n\n```\ndouble\
    \ longitudeMiles = ((M_PI/180.0) × 3963.1676 × cos(latitude));\n```\n\n你也可以用同样的计算来确定每一经度以公里为单位的距离，如下所示：\n\
    \n```\ndouble longitudeKilometers = ((M_PI/180.0) × 6378.1 × cos(latitude));\n\
    ```\n\n## 适应宽高比\n\n在上一节中，我们展示了如何创建一个跨度来显示给定位置每侧一公里的区域。然而，除非地图视图是完美的正方形，否则视图无法恰好显示中心点四个方向各一侧的一公里。如果地图视图比其高度宽，那么\
    \ `longitudeDelta` 需要比 `latitudeDelta` 大。如果地图视图比其宽度高，则情况相反。\n\n`MKMapView` 类有一个实例方法，可以调整坐标区域以匹配地图视图的宽高比。该方法名为\
    \ `regionThatFits:`。要使用它，你只需传入你创建的坐标区域，它将返回一个已调整为地图视图宽高比的新的坐标区域。使用方法如下：\n\n```\n\
    MKCoordinateRegion adjustedRegion = [mapView regionThatFits:viewRegion];\n```\n\
    \n## 设置要显示的区域\n\n一旦你创建了一个坐标区域，就可以通过调用 `setRegion:animated:` 方法告诉地图视图显示该区域。如果你为第二个参数传入\
    \ `YES`，地图视图将进行缩放、平移或以其他方式动画显示视图从当前位置到新位置的过程。以下是一个示例，它创建一个坐标区域，将其调整为地图视图的宽高比，然后告诉地图视图显示该区域：\n\
    \n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
    \ 2000, 2000); \nMKCoordinateRegion adjustedRegion = [mapView regionThatFits:viewRegion];\n\
    [mapView setRegion:adjustedRegion animated:YES];\n```\n\n## 地图视图代理\n\n如前所述，地图视图可以拥有代理。与表格视图和选择器不同，地图视图在没有代理的情况下也能正常工作。在地图视图代理上，你可以实现许多方法，以便在需要时获知与地图相关的特定任务通知。例如，它们允许你在用户通过拖动以显示地图新部分或通过缩放以显示更小或更大区域来改变他们正在查看的地图部分时得到通知。你还可以在地图视图从服务器加载新地图数据时或加载失败时得到通知。地图视图代理方法包含在\
    \ `MKMapViewDelegate` 协议中，任何用作地图视图代理的类都应遵循该协议。\n\n### 地图加载代理方法\n\n从 iOS 6 开始，Map\
    \ Kit 框架从 Google Maps 切换到了 Apple 提供的服务来执行其功能。除了临时缓存外，它不本地存储任何地图数据。每当地图视图需要到 Apple\
    \ 的服务器检索新地图数据时，它会调用代理方法 `mapViewWillStartLoadingMap:`，当它成功检索到所需的地图数据时，它会调用代理方法\
    \ `mapViewDidFinishLoadingMap:`。如果你在任何时候有需要执行的应用程序特定处理，你可以在地图视图的代理上实现相应的方法。\n\n\
    如果 Map Kit 在从服务器加载地图数据时遇到错误，它会在其代理上调用方法 `mapViewDidFailLoadingMap:withError:`。至少，你应该实现这个代理方法，并通知用户存在问题，这样他们就不会坐在那里等待一个永远不会到来的更新。以下是该方法的非常简单的实现，它仅显示一个警报，让用户知道出了问题：\n\
    \n```\n- (void)mapViewDidFailLoadingMap:(MKMapView *)mapView \n                      \
    \ withError:(NSError *)error \n{\n    UIAlertView *alert = [[UIAlertView alloc]\
    \ \n        initWithTitle:NSLocalizedString(@\"Error loading map\", \n            @\"\
    Error loading map\")\n        message:[error localizedDescription] \n        delegate:nil\
    \ \n        cancelButtonTitle:NSLocalizedString(@\"Okay\", @\"Okay\") \n        otherButtonTitles:nil];\n\
        [alert show];\n}\n```\n\n### 区域更改代理方法\n"
- fmt: "If your map view is enabled, the user will be able to interact with it using\
    \ the standard iPhone gestures, like drag, pinch in, pinch out, and double-tap.\
    \ Doing so will change the region being displayed in the view. There are two delegate\
    \ methods that will get called whenever this happens, if the map view’s delegate\
    \ implements those methods. As the gesture starts, the delegate method `mapView:regionWillChangeAnimated:`\
    \ gets called. When the gesture stops, the method `mapView:regionDidChangeAnimated:`\
    \ gets called. You would implement these if you had functionality that needed\
    \ to happen while the view region was changing or after it had finished changing.\n\
    \n## Determining if Coordinates Are Visible\n\nOne task that you may need to do\
    \ quite often in the region change delegate methods is to determine if a particular\
    \ set of coordinates are currently visible on screen. For annotations, and for\
    \ the user’s current location (if it is being tracked), the map view will take\
    \ care of figuring that out for you. There will still be times, however, when\
    \ you need to know if a particular set of coordinates is currently within the\
    \ map view’s displayed region.\n\nHere’s how you can determine that:\n\n```\n\
    CLLocationDegrees leftDegrees = mapView.region.center.longitude – \n         \
    \                       (mapView.region.span.longitudeDelta / 2.0);\nCLLocationDegrees\
    \ rightDegrees = mapView.region.center.longitude + \n                        \
    \        (mapView.region.span.longitudeDelta / 2.0);\nCLLocationDegrees bottomDegrees\
    \ = mapView.region.center.latitude – \n                                (mapView.region.span.latitudeDelta\
    \ / 2.0);\nCLLocationDegrees topDegrees = self.region.center.latitude + \n   \
    \                             (mapView.region.span.latitudeDelta / 2.0);\nif (leftDegrees\
    \ > rightDegrees) { // Int'l Date Line in View\n    leftDegrees = -180.0 - leftDegrees;\n\
    \    if (coords.longitude > 0) // coords to West of Date Line\n       coords.longitude\
    \ = -180.0 - coords.longitude;\n}\nif (leftDegrees <= coords.longitude && coords.longitude\
    \ <= rightDegrees &&\n    bottomDegrees <= coords.latitude && coords.latitude\
    \ <= topDegrees) {\n    // Coordinates are being displayed\n}\n```\n\nBefore moving\
    \ on to the rest of the map view delegate methods, we need to discuss the topic\
    \ of annotations.\n\n## Annotations\n\nMap views offer the ability to tag a specific\
    \ location with a set of supplementary information. That information, along with\
    \ its graphic representation on the map, is called an *annotation*. The pin you\
    \ drop in the application you’re going to write (see [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2))\
    \ is a form of annotation. The annotation is composed of two components, the *annotation\
    \ object* and an *annotation view*. The map view will keep track of its annotations\
    \ and will call out to its delegate when it needs to display any of its annotations.\n\
    \n### The Annotation Object\n\nEvery annotation must have an annotation object,\
    \ which is almost always going to be a custom class that you write and that conforms\
    \ to the protocol `MKAnnotation`. An annotation object is typically a fairly standard\
    \ data model object whose job it is to hold whatever data is relevant to the annotation\
    \ in question. The annotation object has to respond to two methods and implement\
    \ a single property. The two methods that an annotation object must implement\
    \ are called `title` and `subtitle`, and they are the information that will be\
    \ displayed in the annotation’s callout, the little floating view that pops up\
    \ when the annotation is selected. Back in [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4),\
    \ you can see the title and subtitle displayed in the callout. In that instance,\
    \ the annotation object returned a title of `You are Here!` and a subtitle of\
    \ `Stockton St, San Francisco, CA 94108`.\n\nAn annotation object must also have\
    \ a property called `coordinate` that returns a `CLLocationCoordinate2D` specifying\
    \ where in the world (geographically speaking) the annotation should be placed.\
    \ The map view will use that location to determine where to draw the annotation.\n\
    \n### The Annotation View\n\nAs we said before, when a map view needs to display\
    \ any of its annotations, it will call out to its delegate to retrieve an annotation\
    \ view for that annotation. It does this using the method `mapView:viewForAnnotation:`,\
    \ which needs to return an `MKAnnotationView` or a subclass of `MKAnnotationView`.\
    \ The annotation view is the object that gets displayed on the map, not the floating\
    \ window that gets displayed when the annotation is selected. In [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4),\
    \ the annotation view is the pin in the center of the window. It’s a pin because\
    \ you’re using a provided subclass of `MKAnnotationView` called `MKPinAnnotationView`,\
    \ which is designed to draw a red, green, or purple pushpin. It includes some\
    \ additional functionality that `MKAnnotationView` doesn’t have, such as the pin\
    \ drop animation.\n\nYou can subclass `MKAnnotationView` and implement your own\
    \ `drawRect:` method if you have advanced drawing needs for your annotation view.\
    \ Subclassing `MKAnnotationView` is often unnecessary, however, because you can\
    \ create an instance of `MKAnnotationView` and set its `image` property to whatever\
    \ image you want. This opens up a whole world of possibilities without having\
    \ to ever subclass or add subviews to `MKAnnotationView` (see [Figure 10-6](#9781430238072_Ch10.xhtml#Fig6)).\n\
    \n![9781430238072_Fig10-06.jpg](images/9781430238072_Fig10-06.jpg)\n\n[Figure\
    \ 10-6.](#9781430238072_Ch10.xhtml#_Fig6) By setting the `image` property of an\
    \ `MKAnnotationView`, you can display just about anything on the map. In this\
    \ example, we’ve replaced the pin with a surprised cat because that’s the way\
    \ we roll.\n\n### Adding and Removing Annotations\n\nThe map view keeps track\
    \ of all of its annotations, so adding an annotation to the map is simply a matter\
    \ of calling the map view’s `addAnnotation:` method and providing an object that\
    \ conforms to the `MKAnnotation` protocol.\n\n```\n[mapView addAnnotation:annotation];\n\
    ```\n\nYou can also add multiple annotations by providing an array of annotations,\
    \ using the method `addAnnotations:`.\n\n```\n[mapView addAnnotations:[NSArray\
    \ arrayWithObjects:annotation1, annotation2, nil]];\n```\n\nYou can remove annotations\
    \ by using either the `removeAnnotation:` method and passing in a single annotation\
    \ to be removed or by calling `removeAnnotations:` and passing in an array containing\
    \ multiple annotations to be removed. All the map view’s annotations are accessible\
    \ using a property called `annotations`, so if you wanted to remove all annotations\
    \ from the view, you could to this:\n\n```\n[mapView removeAnnotations:mapView.annotations];\n\
    ```\n\n### Selecting Annotations\n\nAt any given time, one and only one annotation\
    \ can be selected. The selected annotation will usually display a *callout*, which\
    \ is that floating bubble or other view that gives more detailed information about\
    \ the annotation. The default callout shows the title and subtitle from the annotation.\
    \ However, you can actually customize the callout, which is just an instance of\
    \ `UIView`. We won’t be providing custom callout views in this chapter’s application,\
    \ but the process is very similar to customizing table view cells the way we did\
    \ in [Chapter 8](#9781430238072_Ch08.xhtml) of *Beginning iOS 6 Development*.\
    \ For more information on customizing a callout, check the documentation for `MKAnnotationView`.\n\
    \n**Note** Although only a single annotation can currently be selected, `MKMapView`\
    \ actually uses an instance of `NSArray` to keep track of the selected annotations.\
    \ This may be an indication that at some point in the future map views will support\
    \ selecting multiple annotations at once. Currently, if you provide a `selectedAnnotations`\
    \ array with more than one annotation, only the first object in that array will\
    \ be selected."
  raw: 'If your map view is enabled, the user will be able to interact with it using
    the standard iPhone gestures, like drag, pinch in, pinch out, and double-tap.
    Doing so will change the region being displayed in the view. There are two delegate
    methods that will get called whenever this happens, if the map view’s delegate
    implements those methods. As the gesture starts, the delegate method mapView:regionWillChangeAnimated:
    gets called. When the gesture stops, the method mapView:regionDidChangeAnimated:
    gets called. You would implement these if you had functionality that needed to
    happen while the view region was changing or after it had finished changing.


    DETERMINING IF COORDINATES ARE VISIBLE


    One task that you may need to do quite often in the region change delegate methods
    is to determine if a particular set of coordinates are currently visible on screen.
    For annotations, and for the user’s current location (if it is being tracked),
    the map view will take care of figuring that out for you. There will still be
    times, however, when you need to know if a particular set of coordinates is currently
    within the map view’s displayed region.


    Here’s how you can determine that:


    CLLocationDegrees leftDegrees = mapView.region.center.longitude –                                         (mapView.region.span.longitudeDelta
    / 2.0); CLLocationDegrees rightDegrees = mapView.region.center.longitude +                                         (mapView.region.span.longitudeDelta
    / 2.0); CLLocationDegrees bottomDegrees = mapView.region.center.latitude –                                         (mapView.region.span.latitudeDelta
    / 2.0); CLLocationDegrees topDegrees = self.region.center.latitude +                                         (mapView.region.span.latitudeDelta
    / 2.0); if (leftDegrees > rightDegrees) { // Int''l Date Line in View     leftDegrees
    = -180.0 - leftDegrees;     if (coords.longitude > 0) // coords to West of Date
    Line        coords.longitude = -180.0 - coords.longitude; } If (leftDegrees <=
    coords.longitude && coords.longitude <= rightDegrees &&     bottomDegrees <= coords.latitude
    && coords.latitude <= topDegrees) {     // Coordinates are being displayed }


    Before moving on to the rest of the map view delegate methods, we need to discuss
    the topic of annotations.


    Annotations


    Map views offer the ability to tag a specific location with a set of supplementary
    information. That information, along with its graphic representation on the map,
    is called an *annotation*. The pin you drop in the application you’re going to
    write (see [Figure 10-2](#9781430238072_Ch10.xhtml#Fig2)) is a form of annotation.
    The annotation is composed of two components, the *annotation object* and an *annotation
    view*.  The map view will keep track of its annotations and will call out to its
    delegate when it needs to display any of its annotations.


    The Annotation Object


    Every annotation must have an annotation object, which is almost always going
    to be a custom class that you write and that conforms to the protocol MKAnnotation.
    An annotation object is typically a fairly standard data model object whose job
    it is to hold whatever data is relevant to the annotation in question. The annotation
    object has to respond to two methods and implement a single property. The two
    methods that an annotation object must implement are called title and subtitle,
    and they are the information that will be displayed in the annotation’s callout,
    the little floating view that pops up when the annotation is selected. Back in
    [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4), you can see the title and subtitle
    displayed in the callout. In that instance, the annotation object returned a title
    of You are Here! and a subtitle of Stockton St, San Francisco, CA  94108.


    An annotation object must also have a property called coordinate that returns
    a CLLocationCoordinate2D specifying where in the world (geographically speaking)
    the annotation should be placed. The map view will use that location to determine
    where to draw the annotation.


    The Annotation View


    As we said before, when a map view needs to display any of its annotations, it
    will call out to its delegate to retrieve an annotation view for that annotation.
    It does this using the method mapView:viewForAnnotation:, which needs to return
    an MKAnnotationView or a subclass of MKAnnotationView. The annotation view is
    the object that gets displayed on the map, not the floating window that gets displayed
    when the annotation is selected. In [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4),
    the annotation view is the pin in the center of the window. It’s a pin because
    you’re using a provided subclass of MKAnnotationView called MKPinAnnotationView,
    which is designed to draw a red, green, or purple pushpin. It includes some additional
    functionality that MKAnnotationView doesn’t have, such as the pin drop animation.


    You can subclass MKAnnotationView and implement your own drawRect: method if you
    have advanced drawing needs for your annotation view. Subclassing MKAnnotationView
    is often unnecessary, however, because you can create an instance of MKAnnotationView
    and set its image property to whatever image you want. This opens up a whole world
    of possibilities without having to ever subclass or add subviews to MKAnnotationView
    (see [Figure 10-6](#9781430238072_Ch10.xhtml#Fig6)).


    ![9781430238072_Fig10-06.jpg](images/9781430238072_Fig10-06.jpg)


    [Figure 10-6.](#9781430238072_Ch10.xhtml#_Fig6)  By setting the image property
    of an MKAnnotationView, you can display just about anything on the map. In this
    example, we’ve replaced the pin with a surprised cat because that’s the way we
    roll


    Adding and Removing Annotations


    The map view keeps track of all of its annotations, so adding an annotation to
    the map is simply a matter of calling the map view’s addAnnotation: method and
    providing an object that conforms to the MKAnnotation protocol.


    ```

    [mapView addAnnotation:annotation];

    ```


    You can also add multiple annotations by providing an array of annotations, using
    the method addAnnotations:.


    ```

    [mapView addAnnotations:[NSArray arrayWithObjects:annotation1, annotation2, nil]];

    ```


    You can remove annotations by using either the removeAnnotation: method and passing
    in a single annotation to be removed or by calling removeAnnotations: and passing
    in an array containing multiple annotations to be removed. All the map view’s
    annotations are accessible using a property called annotations, so if you wanted
    to remove all annotations from the view, you could to this:


    ```

    [mapView removeAnnotations:mapView.annotations];

    ```


    Selecting Annotations


    At any given time, one and only one annotation can be selected. The selected annotation
    will usually display a *callout*, which is that floating bubble or other view
    that gives more detailed information about the annotation. The default callout
    shows the title and subtitle from the annotation. However, you can actually customize
    the callout, which is just an instance of UIView.  We won’t be providing custom
    callout views in this chapter’s application, but the process is very similar to
    customizing table view cells the way we did in [Chapter 8](#9781430238072_Ch08.xhtml)
    of *Beginning iOS 6 Development*. For more information on customizing a callout,
    check the documentation for MKAnnotationView.


    **Note**  Although only a single annotation can currently be selected, MKMapView
    actually uses an instance of NSArray to keep track of the selected annotations.
    This may be an indication that at some point in the future map views will support
    selecting multiple annotations at once. Currently, if you provide a selectedAnnotations
    array with more than one annotation, only the first object in that array will
    be selected.'
  trans: "\n如果您的地图视图已启用，用户将能通过标准 iPhone 手势（如拖拽、双指捏合、双指张开和双击）与它交互。这些操作会改变视图中显示的区域。当地图视图的代理实现了相应方法时，每次发生此类改变都会调用两个代理方法。手势开始时，会调用代理方法\
    \ `mapView:regionWillChangeAnimated:`；手势结束时，则会调用 `mapView:regionDidChangeAnimated:`。如果您有需要在视图区域变化期间或变化完成后执行的功能，就应该实现这些方法。\n\
    \n## 判断坐标是否可见\n\n在区域变化的代理方法中，您可能需要频繁执行的一项任务是判断特定的坐标集当前是否在屏幕上可见。对于标注以及用户的当前位置（如果正在被追踪），地图视图会自动为您处理这些判断。然而，有时您仍需要知道某个特定的坐标集是否位于地图视图当前显示的区域之内。\n\
    \n以下是判断方法：\n\n```\nCLLocationDegrees leftDegrees = mapView.region.center.longitude\
    \ – \n                                (mapView.region.span.longitudeDelta / 2.0);\n\
    CLLocationDegrees rightDegrees = mapView.region.center.longitude + \n        \
    \                        (mapView.region.span.longitudeDelta / 2.0);\nCLLocationDegrees\
    \ bottomDegrees = mapView.region.center.latitude – \n                        \
    \        (mapView.region.span.latitudeDelta / 2.0);\nCLLocationDegrees topDegrees\
    \ = self.region.center.latitude + \n                                (mapView.region.span.latitudeDelta\
    \ / 2.0);\nif (leftDegrees > rightDegrees) { // 国际日期变更线在视图内\n    leftDegrees =\
    \ -180.0 - leftDegrees;\n    if (coords.longitude > 0) // 坐标位于日期变更线以西\n      \
    \ coords.longitude = -180.0 - coords.longitude;\n}\nif (leftDegrees <= coords.longitude\
    \ && coords.longitude <= rightDegrees &&\n    bottomDegrees <= coords.latitude\
    \ && coords.latitude <= topDegrees) {\n    // 坐标正在被显示\n}\n```\n\n在继续讲解其余的地图视图代理方法之前，我们需要讨论一下标注这个话题。\n\
    \n## 标注\n\n地图视图提供了一种能力，可以用一组补充信息来标记某个特定位置。这些信息及其在地图上的图形表示被称为*标注*。您即将编写的应用程序中放置的大头针（参见图\
    \ 10-2），就是一种形式的标注。标注由两个部分组成：*标注对象*和*标注视图*。地图视图会跟踪其所有的标注，并在需要显示某个标注时，调用其代理来获取相应的标注视图。\n\
    \n### 标注对象\n\n每个标注都必须有一个标注对象，该对象几乎总是您编写的自定义类，并且遵循 `MKAnnotation` 协议。标注对象通常是一个相当标准的数据模型对象，其职责是保存与所讨论标注相关的任意数据。标注对象需要响应两个方法，并实现一个属性。标注对象必须实现的这两个方法叫做\
    \ `title` 和 `subtitle`，它们是在标注的弹出框（即标注被选中时弹出的小浮动视图）中显示的信息。在图 10-4 中，您可以看到弹出框中显示的标题和副标题。在该例子中，标注对象返回的标题是\
    \ `You are Here!`，副标题是 `Stockton St, San Francisco, CA 94108`。\n\n标注对象还必须有一个名为\
    \ `coordinate` 的属性，该属性返回一个 `CLLocationCoordinate2D`，用于指定标注应放置在世界上的哪个位置（地理位置上）。地图视图将使用该位置来确定标注的绘制位置。\n\
    \n### 标注视图\n\n正如我们之前所说，当地图视图需要显示其任何一个标注时，它会调用其代理来为那个标注获取一个标注视图。这是通过方法 `mapView:viewForAnnotation:`\
    \ 实现的，该方法需要返回一个 `MKAnnotationView` 或其子类对象。标注视图是显示在地图上的对象，而不是标注被选中时弹出的浮动窗口。在图 10-4\
    \ 中，标注视图就是窗口中央的大头针。它是一个大头针，因为您使用了 `MKAnnotationView` 的提供的子类 `MKPinAnnotationView`，该类设计用于绘制红色、绿色或紫色的大头针。它还包含一些\
    \ `MKAnnotationView` 所没有的额外功能，例如大头针落下的动画。\n\n如果您对标注视图有高级绘制需求，可以对 `MKAnnotationView`\
    \ 进行子类化，并实现自己的 `drawRect:` 方法。然而，通常并不需要对 `MKAnnotationView` 进行子类化，因为您可以创建一个 `MKAnnotationView`\
    \ 实例，并将其 `image` 属性设置为您想要的任何图像。这开辟了无限的可能性，而无需对 `MKAnnotationView` 进行子类化或添加子视图（参见图\
    \ 10-6）。\n\n![9781430238072_Fig10-06.jpg](img/9781430238072_Fig10-06.jpg)\n\n\
    图 10-6. 通过设置 `MKAnnotationView` 的 `image` 属性，您几乎可以在地图上显示任何内容。在此示例中，我们将大头针替换成了一只惊讶的猫，因为这是我们一贯的风格。\n\
    \n### 添加和移除标注\n\n地图视图会跟踪其所有的标注，因此向地图添加标注只需调用地图视图的 `addAnnotation:` 方法，并提供一个遵循\
    \ `MKAnnotation` 协议的对象即可。\n\n```\n[mapView addAnnotation:annotation];\n```\n\n\
    您也可以使用 `addAnnotations:` 方法，通过提供一个标注数组来添加多个标注。\n\n```\n[mapView addAnnotations:[NSArray\
    \ arrayWithObjects:annotation1, annotation2, nil]];\n```\n\n您可以通过 `removeAnnotation:`\
    \ 方法，传入单个要移除的标注来移除它，或者调用 `removeAnnotations:` 方法，传入包含多个要移除标注的数组来移除它们。所有地图视图的标注都可以通过名为\
    \ `annotations` 的属性进行访问，因此如果您想从视图中移除所有标注，可以这样做：\n\n```\n[mapView removeAnnotations:mapView.annotations];\n\
    ```\n\n### 选中标注\n\n在任何给定时间，只能有一个标注被选中。被选中的标注通常会显示一个*弹出框（callout）*，这是一个浮动气泡或其他视图，用于提供关于该标注的更详细信息。默认的弹出框会显示标注的标题和副标题。然而，您实际上可以自定义弹出框，它只是一个\
    \ `UIView` 的实例。我们不会在本章的应用程序中提供自定义的弹出框视图，但这个过程与我们在《**iOS 6 开发入门**》的第 8 章中自定义表格视图单元格的方式非常相似。有关自定义弹出框的更多信息，请查阅\
    \ `MKAnnotationView` 的文档。\n\n**注意** 尽管当前只能选中单个标注，但 `MKMapView` 实际上使用了一个 `NSArray`\
    \ 的实例来跟踪被选中的标注。这可能表明在未来的某个时候，地图视图将支持同时选中多个标注。目前，如果您提供了一个包含多个标注的 `selectedAnnotations`\
    \ 数组，则只会选中该数组中的第一个对象。\n"
- fmt: "如果用户点击注释的图像（[图10-4](#9781430238072_Ch10.xhtml#Fig4)中的图钉或[图10-6](#9781430238072_Ch10.xhtml#Fig6)中的震惊猫），则会选中该注释。您也可以通过`selectAnnotation:animated:`方法以编程方式选中注释，并通过`deselectAnnotation:animated:`方法取消选中注释，传入您想要选中或取消选中的注释。如果向第二个参数传递`YES`，它将为标注气泡的出现或消失添加动画效果。\n\
    \n### 为地图视图提供注释视图\n\n地图视图通过名为`mapView:viewForAnnotation:`的委托方法，向其委托请求与特定注释相对应的注释视图。每当注释进入地图视图的显示区域时，都会调用此方法。\n\
    \n与表格视图单元格的工作方式非常相似，注释视图在滚动出屏幕时会出队但不会被释放。`mapView:viewForAnnotation:`的实现应在分配新注释视图之前，先询问地图视图是否有任何已出队的注释视图。这意味着`mapView:viewForAnnotation:`看起来会很像您编写过的许多`tableView:cellForRowAtIndexPath:`方法。以下是一个示例，它创建了一个注释视图，设置其`image`属性以显示自定义图像，并返回该视图：\n\
    \n```\n- (MKAnnotationView *) mapView:(MKMapView *)theMapView viewForAnnotation:(id\
    \ <MKAnnotation>) annotation\n{\n    static NSString *placemarkIdentifier = @\"\
    my annotation identifier\";\n    if ([annotation isKindOfClass:[MyAnnotation class]])\
    \ {\n        MKAnnotationView *annotationView =             [theMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
            if (annotationView == nil)  {\n            annotationView = [[MKAnnotationView\
    \ alloc] initWithAnnotation:annotation \n                reuseIdentifier:placemarkIdentifier];\n\
                annotationView.image = [UIImage imageNamed:@\"shocked_cat.png\"];\n\
            } \n        else \n            annotationView.annotation = annotation;\n\
            return annotationView;\n    }\n    return nil;\n}\n```\n\n这里有几件事需要注意。首先，请注意您检查了注释类，以确保它是您所了解的注释。地图视图委托会收到所有注释的通知，而不仅仅是自定义注释。之前，我们讨论过封装用户位置的`MKUserLocation`对象。嗯，那也是一个注释，当您为地图开启用户跟踪时，每当需要显示用户位置时，就会调用您的委托方法。您可以为该注释提供自己的注释视图，但如果返回`nil`，地图视图将使用默认的注释视图。一般来说，对于任何您不认识的注释，您的方法应返回`nil`，地图视图很可能会正确处理它。\n\
    \n请注意，有一个名为`placemarkIdentifier`的标识符值。这使您能够确保出队的是正确类型的注释视图。您不限于只为地图的所有注释使用一种类型的注释视图，而标识符就是您区分哪些注释视图用于何用途的方式。\n\
    \n如果您确实出队了一个注释视图，那么务必将其`annotation`属性设置为传入的注释（在前面的示例中为`annotation`）。已出队的注释视图几乎肯定链接到某个注释，但不一定是应该链接的那个。\n\
    \n### 地理编码与反向地理编码\n\n核心定位的一个主要特性是*地理编码*。地理编码是指能够将坐标（以经度和纬度指定）转换为该坐标的用户友好表示形式。将用户友好的位置描述（即地址）转换为经纬度称为*正向地理编码*。*反向地理编码*则是将经纬度转换为用户友好的位置描述。\n\
    \n地理编码在核心定位中由`CLGeocoder`类处理。`CLGeocoder`在后台异步工作，查询相应的服务。在正向地理编码的情况下，`CLGeocoder`使用iPhone内置的GPS功能。对于反向地理编码，`CLGeocoder`查询一个大型坐标数据库（在此情况下，是苹果的数据库）。\n\
    \n在几乎所有位置，反向地理编码都能告诉您所在的国家和州或省。人口越稠密的区域，您可能获得的信息就越多。如果您身处大城市市中心，您很可能能够检索到所在建筑物的街道地址。在大多数城市和城镇，反向地理编码至少能让您知道所在街道的名称。棘手之处在于，您永远无法确定会获得何种详细程度的信息。\n\
    \n对于本章的应用程序，您将使用`CLGeocoder`的反向地理编码功能。要执行反向地理编码，首先创建一个`CLGeocoder`实例。然后调用`reverseGeocodeLocation:completionHandler:`来执行地理编码。`completionHandler:`参数的类型是`CLGeocodeCompletionHandler`，这是一个*块*。块是一个匿名内联函数，它封装了其执行位置的词法作用域。对于`reverseGeocodeLocation:completionHandler:`，无论反向地理编码尝试成功还是失败，都会执行`completionHandler:`块。\n\
    \n```\nCLGeocoder *geocoder = [[CLGeocoder alloc] init];\n[geocoder reverseGeocodeLocation:location\
    \ completionHandler:^(NSArray *placemarks, NSError *error) {\n    // process the\
    \ location or errors\n     ...\n}\n```\n\n**注意**  您可以从苹果了解更多关于块的信息。他们关于块的文档从这里开始：\n\
    \n[https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html](https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html)\n\
    \n如果反向地理编码成功，将调用完成处理程序，并且`placemarks`数组将被填充。该数组应只包含一个对象，类型为`CLPlacemark`。如果在反向地理编码期间发生错误或请求被取消，则`placemarks`数组将为`nil`。在这种情况下，完成处理程序将收到一个`NSError`对象，详细说明失败原因。\n\
    \n[表10-1](#9781430238072_Ch10.xhtml#Tab1)将`CLPlacemark`的术语映射为您可能更熟悉的术语。\n\n[表10-1](#9781430238072_Ch10.xhtml#_Tab1).\
    \ `CLPlacement` 属性定义\n\n| `CLPlacemark` 属性 | 含义 |\n| --- | --- |\n| `Thoroughfare`\
    \ | 街道地址。如果是多行，则为第一行。 |\n| `subThoroughfare` | 街道地址，第二行（例如，公寓或单元号、邮箱号） |\n| `Locality`\
    \ | 城市 |\n| `SubLocality` | 这可能包含社区或地标名称，但通常为`nil` |\n| `administrativeArea` |\
    \ 州、省、地区或其他类似单位 |\n| `dministrativeArea` | 县 |\n| `postalCode` | 邮政编码 |\n| `Country`\
    \ | 国家 |\n| `countryCode` | 两位ISO国家代码（参见：[http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2](http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)）\
    \ |\n\n知道吗？关于地图套件的讨论就到此为止。让我们开始实际使用它吧。\n\n## 构建MapMe应用程序\n\n让我们构建一个展示地图套件一些基本功能的应用程序。首先，使用“Single\
    \ View Application”模板在Xcode中创建一个新项目。将新项目命名为**MapMe**。您将不会使用故事板，因此只应勾选“Use Automatic\
    \ Reference Counting”复选框。\n\n### 链接地图套件和核心定位框架"
  raw: "If the user taps an annotation’s image (the push pin in [Figure 10-4](#9781430238072_Ch10.xhtml#Fig4)\
    \ or the shocked cat in [Figure 10-6](#9781430238072_Ch10.xhtml#Fig6)), it selects\
    \ that annotation. You can also select an annotation programmatically using the\
    \ method selectAnnotation:animated: and deselect an annotation programmatically\
    \ using deselectAnnotation:animated:, passing in the annotation you want to select\
    \ or deselect. If you pass YES to the second parameter, it will animate the appearance\
    \ or disappearance of the callout.\n\nProviding the Map View with Annotation Views\n\
    \nMap views ask their delegate for the annotation view that corresponds to a particular\
    \ annotation using a delegate method called mapView:viewForAnnotation:. This method\
    \ is called anytime an annotation moves into the map view’s displayed region.\n\
    \nVery much like the way table view cells work, annotation views are dequeued\
    \ but not deallocated when they scroll off of the screen. Implementations of mapView:viewForAnnotation:\
    \ should ask the map view if there are any dequeued annotation views before allocating\
    \ a new one. That means that mapView:viewForAnnotation: is going to look a fair\
    \ amount like the many tableView:cellForRowAtIndexPath: methods you’ve written.\
    \ Here’s an example that creates an annotation view, sets its image property to\
    \ display a custom image, and returns it:\n\n```\n- (MKAnnotationView *) mapView:(MKMapView\
    \ *)theMapView viewForAnnotation:(id <MKAnnotation>) annotation\n{\n    static\
    \ NSString *placemarkIdentifier = @\"my annotation identifier\";\n    if ([annotation\
    \ isKindOfClass:[MyAnnotation class]]) {\n        MKAnnotationView *annotationView\
    \ =             [theMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
            if (annotationView == nil)  {\n            annotationView = [[MKAnnotationView\
    \ alloc] initWithAnnotation:annotation \n                reuseIdentifier:placemarkIdentifier];\n\
                annotationView.image = [UIImage imageNamed:@\"shocked_cat.png\"];\n\
            } \n        else \n            annotationView.annotation = annotation;\n\
            return annotationView;\n    }\n    return nil;\n}\n```\n\nA few things\
    \ to notice here. First, notice that you check the annotation class to make sure\
    \ it’s an annotation you know about. The Map View delegate gets notified about\
    \ all annotations, not just the custom one. Earlier, we talked about the MKUserLocation\
    \ object that encapsulated the user’s location. Well, that’s an annotation also,\
    \ and when you turn on user tracking for a map, your delegate method gets called\
    \ whenever the user location needs to be displayed. You could provide your own\
    \ annotation view for that, but if you return nil, the map view will use the default\
    \ annotation view for it. Generally speaking, for any annotation you don’t recognize,\
    \ your method should return nil and the map view will probably handle it correctly.\n\
    \nNotice there is an identifier value called placemarkIdentifier. This allows\
    \ you to make sure you’re dequeing the right kind of annotation view. You’re not\
    \ limited to using only one type of annotation view for all of your map’s annotations,\
    \ and the identifier is the way you tell which ones are used for what.\n\nIf you\
    \ did dequeue an annotation view, it’s important that you set its annotation property\
    \ to the annotation that was passed in (annotation in the preceding example).\
    \ The dequeued annotation view is almost certainly linked to some annotation,\
    \ and not necessarily the one it should be linked to.\n\nGeocoding and Reverse\
    \ Geocoding\n\nA big feature of Core Location is *geocoding*. Geocoding is the\
    \ ability to convert from a coordinate (specified as longitude and latitude) and\
    \ a user-friendly representation of that coordinate. Taking a user-friendly location\
    \ description (i.e., an address) and converting it to longitude and latitude is\
    \ called *forward geocoding*. *Reverse geocoding* is converting a longitude and\
    \ latitude into a user-friendly location description.\n\nGeocoding is handled\
    \ in Core Location by the CLGeocoder class. CLGeocoder works asynchronously in\
    \ the background, querying the appropriate service. In the case of forward geocoding,\
    \ CLGeocoder uses the built-in GPS functionality of your iPhone. For reverse geocoding,\
    \ CLGeocoder queries a large database of coordinate data (in this case, it’s Apple’s\
    \ database).\n\nIn almost all locations, reverse geocoding will be able to tell\
    \ you the country and state or province that you’re in. The more densely populated\
    \ the area, the more information you’re likely to get. If you’re downtown in a\
    \ large city, you might very well retrieve the street address of the building\
    \ in which you are located. In most cities and towns, reverse geocoding will,\
    \ at the very least, get you the name of the street you are on. The tricky thing\
    \ is that you never know for sure what level of detail you’re going to get back.\n\
    \nFor this chapter’s application, you’re going to use the reverse geocoding functionality\
    \ of CLGeocoder. To perform reverse geocoding, you start by creating an instance\
    \ of CLGeocoder. You then call reverseGeocodeLocation:completionHandler: to perform\
    \ the geocoding. The completionHandler: argument is a CLGeocodeCompletionHandler\
    \ type, which is a *block*. A block is an anonymous inline function that encapsulates\
    \ the lexical scope from where it is executed. For reverseGeocodeLocation:completionHandler:,\
    \ the completionHandler: block is executed regardless of a successful or failed\
    \ reverse geocoding attempt.\n\n```\nCLGeocoder *geocoder = [[CLGeocoder alloc]\
    \ init];\n[geocoder reverseGeocodeLocation:location completionHandler:^(NSArray\
    \ *placemarks, NSError *error) {\n    // process the location or errors\n    \
    \ ...\n}\n```\n\n**Note**  You can learn more about blocks from Apple. Their documentation\
    \ on blocks starts here:\n\n[https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html](https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html)\n\
    \nIf the reverse geocoding succeeds, the completion handler will be invoked with\
    \ the placemarks array being populated. It should be an array with only one object,\
    \ of type CLPlacemark. If there was an error during the reverse geocoding or the\
    \ request was cancelled, then the placemarks array will be nil. In that case,\
    \ the completion handler will receive an NSError object, detailing the failure.\n\
    \n[Table 10-1](#9781430238072_Ch10.xhtml#Tab1) maps CLPlacemark’s terminology\
    \ to terms with which you might be more familiar.\n\n[Table 10-1](#9781430238072_Ch10.xhtml#_Tab1).\
    \ CLPlacement Property Definitions\n\n| CLPlacemark Property | Meaning |\n| ---\
    \ | --- |\n| Thoroughfare | Street address. First line if multiple lines. |\n\
    | subThoroughfare | Street address, second line (e.g., apartment or unit number,\
    \ box number) |\n| Locality | City |\n| SubLocality | This might contain a neighborhood\
    \ or landmark name, though it’s often nil |\n| administrativeArea | State, province,\
    \ territory, or other similar unit |\n| dministrativeArea | County |\n| postalCode\
    \ | ZIP code |\n| Country | Country |\n| countryCode | Two-digit ISO country code\
    \ (see: [http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2](http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2))\
    \ |\n\nYou know what? That’s enough talking about Map Kit. Let’s start actually\
    \ using it.\n\nBuilding the MapMe Application\n\nLet’s build an application that\
    \ shows some of the basic features of the Map Kit. Start by creating a new project\
    \ in Xcode using the Single View Application template. Call the new project **MapMe**.\
    \ You won’t be using storyboards, so only the “Use Automatic Reference Counting”\
    \ checkbox should be checked.\n\nLinking the Map Kit and Core Location Frameworks"
  trans: "\n如果用户点击注释的图像（图 10-4 中的图钉或图 10-6 中的震惊猫），则会选中该注释。您也可以通过`selectAnnotation:animated:`方法以编程方式选中注释，并通过`deselectAnnotation:animated:`方法取消选中注释，传入您想要选中或取消选中的注释。如果向第二个参数传递`YES`，它将为标注气泡的出现或消失添加动画效果。\n\
    \n### 为地图视图提供注释视图\n\n地图视图通过名为`mapView:viewForAnnotation:`的委托方法，向其委托请求与特定注释相对应的注释视图。每当注释进入地图视图的显示区域时，都会调用此方法。\n\
    \n与表格视图单元格的工作方式非常相似，注释视图在滚动出屏幕时会出队但不会被释放。`mapView:viewForAnnotation:`的实现应在分配新注释视图之前，先询问地图视图是否有任何已出队的注释视图。这意味着`mapView:viewForAnnotation:`看起来会很像您编写过的许多`tableView:cellForRowAtIndexPath:`方法。以下是一个示例，它创建了一个注释视图，设置其`image`属性以显示自定义图像，并返回该视图：\n\
    \n```\n- (MKAnnotationView *) mapView:(MKMapView *)theMapView viewForAnnotation:(id\
    \ <MKAnnotation>) annotation\n{\n    static NSString *placemarkIdentifier = @\"\
    my annotation identifier\";\n    if ([annotation isKindOfClass:[MyAnnotation class]])\
    \ {\n        MKAnnotationView *annotationView =             [theMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
            if (annotationView == nil)  {\n            annotationView = [[MKAnnotationView\
    \ alloc] initWithAnnotation:annotation \n                reuseIdentifier:placemarkIdentifier];\n\
                annotationView.image = [UIImage imageNamed:@\"shocked_cat.png\"];\n\
            } \n        else \n            annotationView.annotation = annotation;\n\
            return annotationView;\n    }\n    return nil;\n}\n```\n\n这里有几件事需要注意。首先，请注意您检查了注释类，以确保它是您所了解的注释。地图视图委托会收到所有注释的通知，而不仅仅是自定义注释。之前，我们讨论过封装用户位置的`MKUserLocation`对象。嗯，那也是一个注释，当您为地图开启用户跟踪时，每当需要显示用户位置时，就会调用您的委托方法。您可以为该注释提供自己的注释视图，但如果返回`nil`，地图视图将使用默认的注释视图。一般来说，对于任何您不认识的注释，您的方法应返回`nil`，地图视图很可能会正确处理它。\n\
    \n请注意，有一个名为`placemarkIdentifier`的标识符值。这使您能够确保出队的是正确类型的注释视图。您不限于只为地图的所有注释使用一种类型的注释视图，而标识符就是您区分哪些注释视图用于何用途的方式。\n\
    \n如果您确实出队了一个注释视图，那么务必将其`annotation`属性设置为传入的注释（在前面的示例中为`annotation`）。已出队的注释视图几乎肯定链接到某个注释，但不一定是应该链接的那个。\n\
    \n### 地理编码与反向地理编码\n\n核心定位的一个主要特性是*地理编码*。地理编码是指能够将坐标（以经度和纬度指定）转换为该坐标的用户友好表示形式。将用户友好的位置描述（即地址）转换为经纬度称为*正向地理编码*。*反向地理编码*则是将经纬度转换为用户友好的位置描述。\n\
    \n地理编码在核心定位中由`CLGeocoder`类处理。`CLGeocoder`在后台异步工作，查询相应的服务。在正向地理编码的情况下，`CLGeocoder`使用\
    \ iPhone 内置的 GPS 功能。对于反向地理编码，`CLGeocoder`查询一个大型坐标数据库（在此情况下，是苹果的数据库）。\n\n在几乎所有位置，反向地理编码都能告诉您所在的国家和州或省。人口越稠密的区域，您可能获得的信息就越多。如果您身处大城市市中心，您很可能能够检索到所在建筑物的街道地址。在大多数城市和城镇，反向地理编码至少能让您知道所在街道的名称。棘手之处在于，您永远无法确定会获得何种详细程度的信息。\n\
    \n对于本章的应用程序，您将使用`CLGeocoder`的反向地理编码功能。要执行反向地理编码，首先创建一个`CLGeocoder`实例。然后调用`reverseGeocodeLocation:completionHandler:`来执行地理编码。`completionHandler:`参数的类型是`CLGeocodeCompletionHandler`，这是一个*块*。块是一个匿名内联函数，它封装了其执行位置的词法作用域。对于`reverseGeocodeLocation:completionHandler:`，无论反向地理编码尝试成功还是失败，都会执行`completionHandler:`块。\n\
    \n```\nCLGeocoder *geocoder = [[CLGeocoder alloc] init];\n[geocoder reverseGeocodeLocation:location\
    \ completionHandler:^(NSArray *placemarks, NSError *error) {\n    // process the\
    \ location or errors\n     ...\n}\n```\n\n**注意**  您可以从苹果了解更多关于块的信息。他们关于块的文档从这里开始：\n\
    \n[`developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html`](https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html)\n\
    \n如果反向地理编码成功，将调用完成处理程序，并且`placemarks`数组将被填充。该数组应只包含一个对象，类型为`CLPlacemark`。如果在反向地理编码期间发生错误或请求被取消，则`placemarks`数组将为`nil`。在这种情况下，完成处理程序将收到一个`NSError`对象，详细说明失败原因。\n\
    \n表 10-1 将`CLPlacemark`的术语映射为您可能更熟悉的术语。\n\n表 10-1. `CLPlacement` 属性定义\n\n| `CLPlacemark`\
    \ 属性 | 含义 |\n| --- | --- |\n| `Thoroughfare` | 街道地址。如果是多行，则为第一行。 |\n| `subThoroughfare`\
    \ | 街道地址，第二行（例如，公寓或单元号、邮箱号） |\n| `Locality` | 城市 |\n| `SubLocality` | 这可能包含社区或地标名称，但通常为`nil`\
    \ |\n| `administrativeArea` | 州、省、地区或其他类似单位 |\n| `dministrativeArea` | 县 |\n|\
    \ `postalCode` | 邮政编码 |\n| `Country` | 国家 |\n| `countryCode` | 两位 ISO 国家代码（参见：[`en.wikipedia.org/wiki/ISO_3166-1_alpha-2`](http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)）\
    \ |\n\n知道吗？关于地图套件的讨论就到此为止。让我们开始实际使用它吧。\n\n## 构建 MapMe 应用程序\n\n让我们构建一个展示地图套件一些基本功能的应用程序。首先，使用“Single\
    \ View Application”模板在 Xcode 中创建一个新项目。将新项目命名为**MapMe**。您将不会使用故事板，因此只应勾选“Use Automatic\
    \ Reference Counting”复选框。\n\n### 链接地图套件和核心定位框架\n"
- fmt: "Before you do any coding, you need to add the Core Location and Map Kit frameworks.\
    \ Navigate to the Build Phases tab for the MapMe target in the Project Editor.\
    \ Expand the Link Binary With Libraries (3 items). Click the `+` on the lower\
    \ left. Select `CoreLocation.framework` and `MapKit.framework` (remember, you\
    \ can ![image](images/flower1.jpg)-click to select multiple frameworks). Click\
    \ the Add button. The two frameworks should appear in the Navigator pane. You\
    \ can clean things up a little bit by dragging the `CoreLocation.framework` and\
    \ `MapKit.framework` to the Frameworks group.\n\n## Building the Interface\n\n\
    Select `ViewController.xib` to edit the user interface. Once Interface Builder\
    \ opens, drag a round rect button from the library over to the view. Use the blue\
    \ guidelines to align the button to the bottom right of the view. Double-click\
    \ the newly placed button to edit its title, and type `Go`.\n\nDrag a progress\
    \ view from the library, and place it to the left of the button, with the top\
    \ of the progress view and the top of the button aligned. Resize using the blue\
    \ guidelines so it extends horizontally from the left margin to the right margin.\
    \ It will overlap the button, and that’s okay.\n\nNext, drag a label from the\
    \ library over to the view and place it below the progress bar. Resize it horizontally\
    \ so that it takes up the entire width from the left margin guides to the right\
    \ margin guides. Now, use the attribute inspector to center-align the label’s\
    \ text and change the font size to 13 so that the text will fit better. Lastly,\
    \ delete the text \"Label.\"\n\nFind the map view ([Figure 10-7](#9781430238072_Ch10.xhtml#Fig7))\
    \ in the object library. Drag the map view over to the view. Align the top and\
    \ left sides of the map view with view. Resize the map view to the width of the\
    \ window view. Then resize the map view down toward the bottom, until the blue\
    \ guideline appears, just above the progress bar and button you placed on the\
    \ bottom earlier ([Figure 10-8](#9781430238072_Ch10.xhtml#Fig8)).\n\n![9781430238072_Fig10-07.jpg](images/9781430238072_Fig10-07.jpg)\n\
    \n[Figure 10-7.](#9781430238072_Ch10.xhtml#_Fig7)  The map view as it appears\
    \ in the Object library (List view)\n\n![9781430238072_Fig10-08.jpg](images/9781430238072_Fig10-08.jpg)\n\
    \n[Figure 10-8.](#9781430238072_Ch10.xhtml#_Fig8)  Laying out the map view, just\
    \ above the progress bar and button\n\nNow, you make the Outlets and Action connections.\
    \ Put the editor in Assistant mode (via the Toolbar). The Assistant should open\
    \ `ViewController.h` to right of Interface Builder. Control-drag from the `Go`\
    \ button to just below the `@interface` declaration. Be sure you have selected\
    \ the button, not the (invisible) label. When the Connection pop-up appears, the\
    \ Type field should be `UIButton`. Set the Connection to Outlet, and name it `button`.\
    \ Next, control-drag from the `Go` button again, to just above the `@end` declaration.\
    \ This time add an Action, and name it `findMe`.\n\nNow control-drag from the\
    \ progress bar to just below the button property you added. Create an Outlet named\
    \ `progressBar`, making sure that the type is `UIProgressView`. Using the Attribute\
    \ editor, click in the check box that’s labeled Hidden so that the progress bar\
    \ will not be visible until you want to report progress to the user.\n\nNext,\
    \ control-drag from the (invisible) label to below the `progressBar` property.\
    \ You’ll have to guess where the label is. Alternatively, you can drag from the\
    \ label in the Object Dock, like you did in the last chapter. Either way, name\
    \ the outlet `progressLabel`.\n\nFinally, control-drag from the map view to below\
    \ the `progressLabel` property declaration. Name this outlet `mapView`. Control-drag\
    \ from the map view to the file’s Owner icon in the Object Dock. When the Outlets\
    \ pop-up appears, select delegate.\n\nSave the XIB. Before moving on, put the\
    \ editor back into Standard mode.\n\n## Finishing the View Controller Interface\n\
    \nSelect `ViewController.h` to edit it. For starters, import both the Map Kit\
    \ and Core Location header files, because you’re using both Core Location and\
    \ Map Kit in this application.\n\n```objc\n#import <CoreLocation/CoreLocation.h>\n\
    #import <MapKit/MapKit.h>\n```\n\nYou need conform your class to the following\
    \ delegate protocols:\n\n*   `CLLocationManagerDelegate` so you can get notified\
    \ by Core Location of the user’s current location.\n*   `MKMapKitDelegate` because\
    \ you’re going to be your map view’s delegate.\n*   `UIAlertViewDelegate` to handle\
    \ the alert views that you’ll use to inform the user if something went wrong.\n\
    \n```objc\n@interface ViewController : UIViewController <CLLocationManagerDelegate,\
    \ MKMapViewDelegate, \n                                               UIAlertViewDelegate>\n\
    ```\n\nRight after the `@interface` declaration, you declare three instance variables\
    \ to store the `CLLocationManager`, `CLGeocoder`, and `CLPlacemark` objects you’ll\
    \ use in the application. You declare them as instance variable and not properties\
    \ since you don’t need to expose these objects to your interface.\n\n```objc\n\
    {\n    CLLocationManager *manager;\n    CLGeocoder *geocoder;\n    CLPlacemark\
    \ *placemark;\n}\n```\n\n**Note**  Although map views are capable of tracking\
    \ the user’s current location, you’re going to track the user’s location manually\
    \ using Core Location in this application. By doing it manually, we can show you\
    \ more Map Kit features. If you need to track the user’s location in your own\
    \ applications, just let the map view do it for you.\n\nThat’s it. You declared\
    \ the Outlets and Action you need via Interface Builder. Save `ViewController.h`.\
    \ Before you work on the implementation file, you need to work on your annotation\
    \ class.\n\n## Writing the Annotation Object Class\n\nYou need to create a class\
    \ to hold your annotation object. You’re going to build a simple one that stores\
    \ some address information, which you’ll pull from the geocoder. Select the MapMe\
    \ group in the Navigator pane. Create a new Objective-C class named `MapLocation`\
    \ and make it a subclass of `NSObject`.\n\nOnce the new files have been created,\
    \ single-click `MapLocation.h`. First, you need to include the Map Kit header.\n\
    \n```objc\n#import <MapKit/MapKit.h>\n```\n\nYou need to change `MapLocation`\
    \ to adopt the `MKAnnotation` and `NSCoding` protocols.\n\n```objc\n@interface\
    \ MapLocation : NSObject <MKAnnotation, NSCoding>\n```\n\nWe did say that annotations\
    \ were pretty standard data model classes, didn’t we? We conformed this to `MKAnnotation`\
    \ and also to `NSCoding`. You’re not actually going to use the archiving functionality,\
    \ but it’s a good habit to conform data model classes to `NSCoding`.\n\nNext,\
    \ you need properties to store address data, along with a `CLLocationCoordinate2D`,\
    \ which will be used to track this annotation’s location on the map.\n\n```objc\n\
    @property (strong, nonatomic) NSString *street;\n@property (strong, nonatomic)\
    \ NSString *city;\n@property (strong, nonatomic) NSString *state;\n@property (strong,\
    \ nonatomic) NSString *zip;\n@property (nonatomic, readwrite) CLLocationCoordinate2D\
    \ coordinate;\n```\n\nNotice that you’ve specifically declared the `coordinate`\
    \ property to be `readwrite`. The `MKAnnotation` protocol declares this property\
    \ as `readonly`. You could have declared it that way as well, and then just set\
    \ the `coordinate` property by using the underlying instance variable, but you\
    \ are going to use the property to let other classes set your annotation’s coordinates.\
    \ It’s okay to redefine properties to be more permissive than the same property\
    \ as declared in a protocol to which you’ve conformed or as declared in your superclass.\
    \ You can always redefine a `readonly` or `writeonly` property to be `readwrite`,\
    \ but you must explicitly use the `readwrite` keyword. Most of the time, that\
    \ keyword isn’t used because it’s the default value and unnecessary.\n\nSave `MapLocation.h`\
    \ and switch over to the implementation file, `MapLocation.m`. First, you implement\
    \ the `MKAnnotation` protocol methods.\n\n```objc\n#pragma mark - MKAnnotation\
    \ Protocol Methods\n```"
  raw: "Before you do any coding, you need to add the Core Location and Map Kit frameworks.\
    \ Navigate to the Build Phases tab for the MapMe target in the Project Editor.\
    \ Expand the Link Binary With Libraries (3 items). Click the *+* on the lower\
    \ left. Select CoreLocation.framework and MapKit.framework (remember, you can\
    \ ![image](images/flower1.jpg)-click to select multiple frameworks). Click the\
    \ Add button. The two frameworks should appear in the Navigator pane. You can\
    \ clean things up a little bit by dragging the CoreLocation.framework and MapKit.framework\
    \ to the Frameworks group.\n\nBuilding the Interface\n\nSelect ViewController.xib\
    \ to edit the user interface. Once Interface Builder opens, drag a round rect\
    \ button from the library over to the view. Use the blue guidelines to align the\
    \ button to the bottom right of the view. Double-click the newly placed button\
    \ to edit its title, and type **Go**.\n\nDrag a progress view from the library,\
    \ and place it to the left of the button, with the top of the progress view and\
    \ the top of the button aligned. Resize using the blue guidelines so it extends\
    \ horizontally from the left margin to the right margin. It will overlap the button,\
    \ and that’s okay.\n\nNext, drag a label from the library over to the view and\
    \ place it below the progress bar. Resize it horizontally so that it takes up\
    \ the entire width from the left margin guides to the right margin guides. Now,\
    \ use the attribute inspector to center-align the label’s text and change the\
    \ font size to 13 so that the text will fit better. Lastly, delete the text “Label.”\n\
    \nFind the map view ([Figure 10-7](#9781430238072_Ch10.xhtml#Fig7)) in the object\
    \ library. Drag the map view over to the view. Align the top and left sides of\
    \ the map view with view. Resize the map view to the width of the window view.\
    \ Then resize the map view down toward the bottom, until the blue guideline appears,\
    \ just above the progress bar and button you placed on the bottom earlier ([Figure\
    \ 10-8](#9781430238072_Ch10.xhtml#Fig8)).\n\n![9781430238072_Fig10-07.jpg](images/9781430238072_Fig10-07.jpg)\n\
    \n[Figure 10-7.](#9781430238072_Ch10.xhtml#_Fig7)  The map view as it appears\
    \ in the Object library (List view)\n\n![9781430238072_Fig10-08.jpg](images/9781430238072_Fig10-08.jpg)\n\
    \n[Figure 10-8.](#9781430238072_Ch10.xhtml#_Fig8)  Laying out the map view, just\
    \ above the progress bar and button\n\nNow, you make the Outlets and Action connections.\
    \ Put the editor in Assistant mode (via the Toolbar). The Assistant should open\
    \ ViewController.h to right of Interface Builder. Control-drag from the Go button\
    \ to just below the @interface declaration. Be sure you have selected the button,\
    \ not the (invisible) label. When the Connection pop-up appears, the Type field\
    \ should be UIButton. Set the Connection to Outlet, and name it **button**. Next,\
    \ control-drag from the Go button again, to just above the @end declaration. This\
    \ time add an Action, and name it **findMe**.\n\nNow control-drag from the progress\
    \ bar to just below the button property you added. Create an Outlet named progressBar,\
    \ making sure that the type is UIProgressView. Using the Attribute editor, click\
    \ in the check box that’s labeled Hidden so that the progress bar will not be\
    \ visible until you want to report progress to the user.\n\nNext, control-drag\
    \ from the (invisible) label to below the progressBar property. You’ll have to\
    \ guess where the label is. Alternatively, you can drag from the label in the\
    \ Object Dock, like you did in the last chapter. Either way, name the outlet **progressLabel**.\n\
    \nFinally, control-drag from the map view to below the progressLabel property\
    \ declaration. Name this outlet mapView. Control-drag from the map view to the\
    \ file’s Owner icon in the Object Dock. When the Outlets pop-up appears, select\
    \ delegate.\n\nSave the XIB. Before moving on, put the editor back into Standard\
    \ mode.\n\nFinishing the View Controller Interface\n\nSelect ViewController.h\
    \ to edit it. For starters, import both the Map Kit and Core Location header files,\
    \ because you’re using both Core Location and Map Kit in this application.\n\n\
    ```\n#import <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n```\n\n\
    You need conform your class to the following delegate protocols:\n\n*   CLLocationManagerDelegate\
    \ so you can get notified by Core Location of the user’s current location.\n*\
    \   MKMapKitDelegate because you’re going to be your map view’s delegate.\n* \
    \  UIAlertViewDelegate to handle the alert views that you’ll use to inform the\
    \ user if something went wrong.\n\n```\n@interface ViewController : UIViewController\
    \ <CLLocationManagerDelegate, MKMapViewDelegate, \n                                              \
    \ UIAlertViewDelegate>\n```\n\nRight after the @interface declaration, you declare\
    \ three instance variables to store the CLLocationManager, CLGeocoder, and CLPlacemark\
    \ objects you’ll use in the application. You declare them as instance variable\
    \ and not properties since you don’t need to expose these objects to your interface.\n\
    \n```\n{\n    CLLocationManager *manager;\n    CLGeocoder *geocoder;\n    CLPlacemark\
    \ *placemark;\n}\n```\n\n**Note**  Although map views are capable of tracking\
    \ the user’s current location, you’re going to track the user’s location manually\
    \ using Core Location in this application. By doing it manually, we can show you\
    \ more Map Kit features. If you need to track the user’s location in your own\
    \ applications, just let the map view do it for you.\n\nThat’s it. You declared\
    \ the Outlets and Action you need via Interface Builder. Save ViewController.h.\
    \ Before you work on the implementation file, you need to work on your annotation\
    \ class.\n\nWriting the Annotation Object Class\n\nYou need to create a class\
    \ to hold your annotation object. You’re going to build a simple one that stores\
    \ some address information, which you’ll pull from the geocoder. Select the MapMe\
    \ group in the Navigator pane. Create a new Objective-C class named **MapLocation**\
    \ and make it a subclass of NSObject.\n\nOnce the new files have been created,\
    \ single-click MapLocation.h. First, you need to include the Map Kit header.\n\
    \n```\n#import <MapKit/MapKit.h>\n```\n\nYou need to change MapLocation to adopt\
    \ the MKAnnotation and NSCoding protocols.\n\n```\n@interface MapLocation : NSObject\
    \ <MKAnnotation, NSCoding>\n```\n\nWe did say that annotations were pretty standard\
    \ data model classes, didn’t we? We conformed this to MKAnnotation and also to\
    \ NSCoding. You’re not actually going to use the archiving functionality, but\
    \ it’s a good habit to conform data model classes to NSCoding.\n\nNext, you need\
    \ properties to store address data, along with a CLLocationCoordinate2D, which\
    \ will be used to track this annotation’s location on the map.\n\n```\n@property\
    \ (strong, nonatomic) NSString *street;\n@property (strong, nonatomic) NSString\
    \ *city;\n@property (strong, nonatomic) NSString *state;\n@property (strong, nonatomic)\
    \ NSString *zip;\n@property (nonatomic, readwrite) CLLocationCoordinate2D coordinate;\n\
    ```\n\nNotice that you’ve specifically declared the coordinate property to be\
    \ readwrite. The MKAnnotation protocol declares this property as readonly. You\
    \ could have declared it that way as well, and then just set the coordinate property\
    \ by using the underlying instance variable, but you are going to use the property\
    \ to let other classes set your annotation’s coordinates. It’s okay to redefine\
    \ properties to be more permissive than the same property as declared in a protocol\
    \ to which you’ve conformed or as declared in your superclass. You can always\
    \ redefine a readonly or writeonly property to be readwrite, but you must explicitly\
    \ use the readwrite keyword. Most of the time, that keyword isn’t used because\
    \ it’s the default value and unnecessary.\n\nSave MapLocation.h and switch over\
    \ to the implementation file, MapLocation.m. First, you implement the MKAnnotation\
    \ protocol methods.\n\n```\n#pragma mark - MKAnnotation Protocol Methods"
  trans: "\n在开始编写任何代码之前，你需要先添加 **Core Location** 和 **Map Kit** 框架。在项目编辑器中导航到 `MapMe`\
    \ 目标的 **Build Phases** 选项卡。展开 **Link Binary With Libraries (3 items)** 部分。点击左下角的\
    \ `+` 按钮。选择 `CoreLocation.framework` 和 `MapKit.framework`（记住，你可以按住 ![image](img/flower1.jpg)\
    \ 键点击来同时选择多个框架）。点击 **Add** 按钮。这两个框架应该会出现在导航窗格中。你可以将 `CoreLocation.framework` 和\
    \ `MapKit.framework` 拖拽到 **Frameworks** 组中，让项目结构更整洁一些。\n\n## 构建界面\n\n选择 `ViewController.xib`\
    \ 来编辑用户界面。当 Interface Builder 打开后，从库中拖拽一个圆角矩形按钮到视图上。使用蓝色参考线将按钮对齐到视图的右下角。双击这个新放置的按钮来编辑其标题，并输入\
    \ `Go`。\n\n从库中拖拽一个进度视图，并将其放置在按钮的左侧，使进度视图的顶部与按钮的顶部对齐。使用蓝色参考线调整大小，使其水平方向从左边界延伸到右边界。它会与按钮重叠，这是没问题的。\n\
    \n接下来，从库中拖拽一个标签到视图上，并将其放置在进度条的下方。水平调整其大小，使其占据从左边界参考线到右边界参考线的整个宽度。现在，使用属性检查器将标签的文本设置为居中对齐，并将字体大小更改为\
    \ 13，以便文本更合适。最后，删除“Label.”这段文本。\n\n在对象库中找到地图视图（图 10-7）。将地图视图拖拽到视图上。将地图视图的顶部和左侧与视图对齐。将地图视图的宽度调整为窗口视图的宽度。然后将地图视图向底部调整大小，直到出现蓝色参考线，刚好位于你之前放置在底部的进度条和按钮上方（图\
    \ 10-8）。\n\n![9781430238072_Fig10-07.jpg](img/9781430238072_Fig10-07.jpg)\n\n\
    图 10-7  地图视图在对象库中的显示（列表视图）\n\n![9781430238072_Fig10-08.jpg](img/9781430238072_Fig10-08.jpg)\n\
    \n图 10-8  在进度条和按钮上方布局地图视图\n\n现在，你要建立 **Outlets** 和 **Action** 连接。将编辑器置于 **Assistant**\
    \ 模式（通过工具栏）。**Assistant** 应在 Interface Builder 右侧打开 `ViewController.h`。按住 **Control**\
    \ 键并从 `Go` 按钮拖拽到 `@interface` 声明下方。请确保你已经选中了按钮，而不是（不可见的）标签。当连接弹出窗口出现时，**Type**\
    \ 字段应为 `UIButton`。将连接类型设置为 **Outlet**，并将其命名为 `button`。接下来，再次按住 Control 键并从 `Go`\
    \ 按钮拖拽到 `@end` 声明上方。这次添加一个 **Action**，并将其命名为 `findMe`。\n\n现在，按住 Control 键从进度条拖拽到你刚才添加的按钮属性下方。创建一个名为\
    \ `progressBar` 的 **Outlet**，确保其类型为 `UIProgressView`。使用属性编辑器，点击标记为 **Hidden**\
    \ 的复选框，这样进度条在你想要向用户报告进度之前都是不可见的。\n\n接下来，按住 Control 键从（不可见的）标签拖拽到 `progressBar`\
    \ 属性下方。你需要猜测标签的大致位置。或者，你也可以像上一章那样，从 **Object Dock**（对象停靠栏）中拖拽标签。无论哪种方式，都将这个 outlet\
    \ 命名为 `progressLabel`。\n\n最后，按住 Control 键从地图视图拖拽到 `progressLabel` 属性声明下方。将这个 outlet\
    \ 命名为 `mapView`。按住 Control 键从地图视图拖拽到 **Object Dock** 中的 **File's Owner** 图标。当\
    \ **Outlets** 弹出窗口出现时，选择 **delegate**。\n\n保存 XIB。在继续之前，将编辑器切换回 **Standard** 模式。\n\
    \n## 完成视图控制器接口\n\n选择 `ViewController.h` 进行编辑。首先，导入 Map Kit 和 Core Location 的头文件，因为你要在此应用中使用\
    \ Core Location 和 Map Kit。\n\n```objc\n#import <CoreLocation/CoreLocation.h>\n\
    #import <MapKit/MapKit.h>\n```\n\n你需要让你的类遵循以下代理协议：\n\n*   `CLLocationManagerDelegate`：以便你能收到来自\
    \ Core Location 关于用户当前位置的通知。\n*   `MKMapKitDelegate`：因为你将成为地图视图的委托对象。\n*   `UIAlertViewDelegate`：用于处理告警视图，当出现问题时，你将用它来通知用户。\n\
    \n```objc\n@interface ViewController : UIViewController <CLLocationManagerDelegate,\
    \ MKMapViewDelegate, \n                                               UIAlertViewDelegate>\n\
    ```\n\n紧跟在 `@interface` 声明之后，你声明了三个实例变量，用于存储你将在应用中使用的 `CLLocationManager`、`CLGeocoder`\
    \ 和 `CLPlacemark` 对象。你将其声明为实例变量而非属性，因为你不需要将这些对象暴露给你的接口。\n\n```objc\n{\n    CLLocationManager\
    \ *manager;\n    CLGeocoder *geocoder;\n    CLPlacemark *placemark;\n}\n```\n\n\
    **注意**  尽管地图视图能够追踪用户的当前位置，但在此应用中，你将使用 Core Location 手动追踪用户位置。通过手动操作，我们可以向你展示更多\
    \ Map Kit 的功能。如果你在自己的应用中需要追踪用户位置，只需让地图视图替你完成即可。\n\n就是这样。你已通过 Interface Builder\
    \ 声明了所需的 **Outlets** 和 **Action**。保存 `ViewController.h`。在编写实现文件之前，你需要先处理你的标注类。\n\
    \n## 编写标注对象类\n\n你需要创建一个类来保存你的标注对象。你将构建一个简单的类来存储一些地址信息，这些信息将从地理编码器中获取。在导航窗格中选择\
    \ `MapMe` 组。创建一个名为 `MapLocation` 的新 Objective-C 类，并使其成为 `NSObject` 的子类。\n\n新文件创建好后，单击\
    \ `MapLocation.h`。首先，你需要包含 Map Kit 的头文件。\n\n```objc\n#import <MapKit/MapKit.h>\n\
    ```\n\n你需要更改 `MapLocation` 以使其遵循 `MKAnnotation` 和 `NSCoding` 协议。\n\n```objc\n\
    @interface MapLocation : NSObject <MKAnnotation, NSCoding>\n```\n\n我们说过标注对象是非常标准的数据模型类，对吧？我们让其遵循了\
    \ `MKAnnotation` 和 `NSCoding` 协议。你实际上并不会使用归档功能，但让数据模型类遵循 `NSCoding` 是一个好习惯。\n\n\
    接下来，你需要属性来存储地址数据，以及一个 `CLLocationCoordinate2D` 属性，用于在地图上追踪此标注的位置。\n\n```objc\n\
    @property (strong, nonatomic) NSString *street;\n@property (strong, nonatomic)\
    \ NSString *city;\n@property (strong, nonatomic) NSString *state;\n@property (strong,\
    \ nonatomic) NSString *zip;\n@property (nonatomic, readwrite) CLLocationCoordinate2D\
    \ coordinate;\n```\n\n请注意，你特意将 `coordinate` 属性声明为了 `readwrite`。`MKAnnotation`\
    \ 协议将此属性声明为 `readonly`。你也可以按此方式声明，然后通过使用底层实例变量来设置 `coordinate` 属性，但你要使用该属性来让其他类设置你的标注的坐标。重新定义属性，使其比在已遵循的协议或超类中声明的同一属性具有更宽松的访问权限，这是允许的。你总是可以将\
    \ `readonly` 或 `writeonly` 属性重新定义为 `readwrite`，但必须显式使用 `readwrite` 关键字。大多数情况下，这个关键字不会被用到，因为它是默认值，且并非必要。\n\
    \n保存 `MapLocation.h` 并切换到实现文件 `MapLocation.m`。首先，实现 `MKAnnotation` 协议的方法。\n\n\
    ```objc\n#pragma mark - MKAnnotation 协议方法\n```\n"
- fmt: "- (NSString *)title\n{\n    return NSLocalizedString(@\"You are Here!\", @\"\
    You are Here!\");\n}\n\n- (NSString *)subtitle\n{\n    NSMutableString *result\
    \ = [NSMutableString string];\n    if (self.street)\n        [result appendString:self.street];\n\
    \    if (self.street && (self.city || self.state || self.zip))\n        [result\
    \ appendString:@\", \"];\n    if (self.city)\n        [result appendString:self.city];\n\
    \    if (self.city && self.state)\n        [result appendString:@\", \"];\n  \
    \  if (self.state)\n        [result appendString:self.state];\n    if (self.zip)\n\
    \        [result appendFormat:@\"  %@\", self.zip];\n\nreturn result;\n}\n\nThere\
    \ really shouldn’t be anything there that throws you for a loop. For the `MKAnnotation`\
    \ protocol method of `title`, you just return “You are Here!” The `subtitle` method,\
    \ however, is a little more complex. Because you don’t know which data elements\
    \ the reverse geocoder will give you, you have to build the subtitle string based\
    \ on what you have. You do that by declaring a mutable string, and then appending\
    \ the values from your non-nil, non-empty properties.\n\nAnd you need to implement\
    \ the `NSCoder` protocol methods.\n\n```objc\n#pragma mark - NSCoder Protocol\
    \ Methods\n\n- (void)encodeWithCoder:(NSCoder *)aCoder\n{\n    [aCoder encodeObject:self.street\
    \ forKey:@\"street\"];\n    [aCoder encodeObject:self.city forKey:@\"city\"];\n\
    \    [aCoder encodeObject:self.state forKey:@\"state\"];\n    [aCoder encodeObject:self.zip\
    \ forKey:@\"zip\"];\n}\n\n- (id)initWithCoder:(NSCoder *)aDecoder\n{\n    self\
    \ = [super init];\n    if (self) {\n        [self setStreet:[aDecoder decodeObjectForKey:@\"\
    street\"]];\n        [self setCity:[aDecoder decodeObjectForKey:@\"city\"]];\n\
    \        [self setState:[aDecoder decodeObjectForKey:@\"state\"]];\n        [self\
    \ setZip:[aDecoder decodeObjectForKey:@\"zip\"]];\n    }\n    return self;\n}\n\
    ```\n\nEverything else here is standard stuff to encode and decode the `MapLocation`\
    \ class, so let’s move on to implementing the `ViewController` class. Save `MapLocation.m`\
    \ before proceeding.\n\nImplementing the MapMe ViewController\n\nSingle-click\
    \ `ViewController.m`. Start by adding the import of the `MapLocation` header.\n\
    \n```objc\n#import \"MapLocation.h\"\n```\n\nNext you define some private category\
    \ methods for handling annotations and reverse geocoding. In the Category interface\
    \ declaration, add these two method declarations:\n\n```objc\n@interface ViewController\
    \ ()\n- (void)openCallout:(id<MKAnnotation>)annotation;\n- (void)reverseGeocode:(CLLocation\
    \ *)location;\n@end\n```\n\nNext, set the Map View map type in the `viewDidLoad:`\
    \ method. Declare all three map types, with two of them commented out. This is\
    \ just to make it easier for you to change the one you’re using and experiment\
    \ a little. Add these after the call to `super`.\n\n```objc\nself.mapView.mapType\
    \ = MKMapTypeStandard;\n//self.mapView.mapType = MKMapTypeSatellite;\n//self.mapView.mapType\
    \ = MKMapTypeHybrid;\n```\n\nNow implement the Action method `findMe`, which gets\
    \ called when the user presses a button.\n\n```objc\n#pragma mark - Action Method\n\
    \n- (IBAction)findMe:(id)sender\n{\n    if (manager == nil)\n        manager =\
    \ [[CLLocationManager alloc] init];\n\nmanager.delegate = self;\n    manager.desiredAccuracy\
    \ = kCLLocationAccuracyBest;\n    [manager startUpdatingLocation];\n\nself.progressBar.hidden\
    \ = NO;\n    self.progressBar.progress = 0.0;\n    self.progressLabel.text = NSLocalizedString(@\"\
    Determining Current Location\",                                              \
    \  \n                                                 @\"Determining Current Location\"\
    );\n\nself.button.hidden = YES;\n}\n```\n\nAs discussed before, you could have\
    \ used the map view’s ability to track the user’s location, but you’re going the\
    \ manual route to learn more functionality. Therefore, you allocate and initialize\
    \ an instance of `CLLocationManager` to determine the user’s location. You set\
    \ `self` as the delegate, and tell the Location Manager you want the best accuracy\
    \ available, before telling it to start updating the location. Then you unhide\
    \ the progress bar and set the progress label to tell the user that you are trying\
    \ to determine the current location. Lastly, you hide the button so the user can’t\
    \ press it again.\n\nNow, you implement the private category methods you declared\
    \ in the beginning of `ViewController.m`.\n\n```objc\n#pragma mark - (Private)\
    \ Instance Methods\n\n- (void)openCallout:(id<MKAnnotation>)annotation\n{\n  \
    \  self.progressBar.progress = 1.0;\n    self.progressLabel.text = NSLocalizedString(@\"\
    Showing Annotation\", @\"Showing Annotation\");\n    [self.mapView selectAnnotation:annotation\
    \ animated:YES];\n}\n```\n\nYou’ll use `openCallout:` a little later to select\
    \ your annotation. You can’t select the annotation when you add it to the map\
    \ view. You have to wait until it’s been added before you can select it. This\
    \ method will allow you to select an annotation, which will open the annotation’s\
    \ callout by using `performSelector:withObject:afterDelay:`. All you do in this\
    \ method is update the progress bar and progress label to show that you’re at\
    \ the last step, and then use the `MKMapView`'s `selectAnnotation:animated:` method\
    \ to select the annotation, which will cause its callout view to be shown.\n\n\
    You also declared another private method called `reverseGeocode:`. Again, you’ll\
    \ use it a little later. Given a `CLLocation` instance, it attempts to reverse\
    \ geocode the location. If it succeeds, it will create a `MapLocation` annotation\
    \ and send it to the Map View. If there’s an error, it will pop up an alert dialog.\n\
    \n```objc\n- (void)reverseGeocode:(CLLocation *)location\n{\n    if (!geocoder)\n\
    \        geocoder = [[CLGeocoder alloc] init];\n\n[geocoder reverseGeocodeLocation:location\
    \ completionHandler:^(NSArray* placemarks, NSError* error){\n        if (nil !=\
    \ error) {\n            UIAlertView *alert =                 [[UIAlertView alloc]\
    \                     initWithTitle:NSLocalizedString(@\"Error translating coordinates\
    \ into location\",\n                                                    @\"Error\
    \ translating coordinates into location\")\n                    message:NSLocalizedString(@\"\
    Geocoder did not recognize coordinates\",\n                                  \
    \            @\"Geocoder did not recognize coordinates\")\n                  \
    \  delegate:self\n                    cancelButtonTitle:NSLocalizedString(@\"\
    OK\", @\"OK\")\n                    otherButtonTitles:nil];\n            [alert\
    \ show];\n\n}\n        else if ([placemarks count] > 0) {\n            placemark\
    \ = [placemarks objectAtIndex:0];\n\nself.progressBar.progress = 0.5;\n      \
    \      self.progressLabel.text = NSLocalizedString(@\"Location Determined\", \
    \                                                        @\"Location Determined\"\
    );\n\nMapLocation *annotation = [[MapLocation alloc] init];\n            annotation.street\
    \ = placemark.thoroughfare;\n            annotation.city = placemark.locality;\n\
    \            annotation.state = placemark.administrativeArea;\n            annotation.zip\
    \ = placemark.postalCode;\n            annotation.coordinate = location.coordinate;\n\
