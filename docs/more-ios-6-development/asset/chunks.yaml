    ```

    #import <SenTestingKit/SenTestingKit.h>


    @interface DebugTestTests : SenTestCase


    @end

    ```


    This is a very simple header file. It imports the header SenTestingKit.h and declares
    the class DebugTestTests to inherit from SenTestCase. What is SenTestingKit? The
    unit testing framework Xcode uses is called OCUnit. OCUnit was developed by a
    company called SenTe ([www.sente.ch/software/ocunit/](http://www.sente.ch/software/ocunit/)).
    They define OCUnit as three components: SenTestingKit, a framework to help write
    tests; otest, a testing tool to execute tests; and a set of files and utilities
