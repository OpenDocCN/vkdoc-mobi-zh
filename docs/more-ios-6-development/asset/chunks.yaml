- fmt: 'Next, let’s add some validation to ensure that your `name` attribute is at
    least one character long. Single-click the `name` attribute to select it. In the
    model editor, enter `1` in the text field next to the Validation label to specify
    that the value entered into this attribute must to be at least one character long.
    The `Min. Length` checkbox should automatically check itself. This may seem like
    a redundant validation, since you already unchecked `Optional` in a previous chapter
    for this attribute, but the two do not do exactly the same thing. Because the
    `Optional` check box is unchecked, the user will be prevented from saving if `name`
    is `nil`. However, your application takes pains to ensure that `name` is never
    `nil`. For example, you give `name` a default value. If the user deletes that
    value, the text field will still return an empty string instead of `nil`. Therefore,
    to ensure that an actual name is entered, you’re going to add this validation.


    Save the data model.


    ## Creating the Hero Class


    It’s now time to create your custom subclass of `NSManagedObject`. This will give
    you the flexibility to add custom validation and defaulting as well as the ability
    to use properties instead of key-value coding, which will make your code easier
    to read and give you additional checks at compile time.


