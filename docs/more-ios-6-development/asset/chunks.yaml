- fmt: "# Core Data 实体与数据模型\n\n## 属性（Attributes）\n\n在创建实体时，最常使用的属性是`attribute`，它在\
    \ Core Data 实体中的作用与实例变量在 Objective-C 类中的作用相同：它们都用于保存数据。查看模型编辑器（或[图2-10](#9781430238072_Ch02.xhtml#Fig10)），你会发现`Event`实体有一个名为`timeStamp`的属性。`timeStamp`属性保存了特定`Event`实例创建时的日期和时间。在示例应用程序中，当点击`+`按钮时，表格中会新增一行，显示单个`Event`的`timeStamp`。\n\
    \n与实例变量类似，每个属性都有类型。设置属性类型有两种方式：当模型编辑器使用表格样式时，你可以在详细编辑器（[图2-11](#9781430238072_Ch02.xhtml#Fig11)）的属性表中更改属性类型。在当前应用程序中，`timeStamp`属性设置为`Date`类型。点击`Date`单元格，你会看到一个弹出菜单，其中列出了所有可能的属性类型。在接下来的几章中，当你开始构建自己的数据模型时，将了解不同的属性类型。\n\
    \n![9781430238072_Fig02-10.jpg](images/9781430238072_Fig02-10.jpg)\n\n[图2-10.](#9781430238072_Ch02.xhtml#_Fig10)  `Event`实体的检查器\n\
    \n![9781430238072_Fig02-11.jpg](images/9781430238072_Fig02-11.jpg)\n\n[图2-11.](#9781430238072_Ch02.xhtml#_Fig11)  模型编辑器（表格样式）中的属性表\n\
    \n确保`timeStamp`属性仍处于选中状态，然后查看检查器（[图2-12](#9781430238072_Ch02.xhtml#Fig12)）。注意，在这些字段中有一个带有弹出按钮的`Attribute\
    \ Type`字段。点击该按钮，会显示一个弹出菜单，其中包含你在属性表中看到的属性类型。请确保属性类型设置为`Date`。\n\n![9781430238072_Fig02-12.jpg](images/9781430238072_Fig02-12.jpg)\n\
    \n[图2-12.](#9781430238072_Ch02.xhtml#_Fig12)  `timeStamp`属性的检查器\n\n日期属性（如`timeStamp`）对应于`NSDate`的实例。若要为日期属性设置新值，需要提供一个`NSDate`实例。字符串属性对应于`NSString`的实例，大多数数值类型对应于`NSNumber`的实例。\n\
    \n**提示：** 无需过多担心模型编辑器中所有其他按钮、文本字段和复选框。在接下来的几章中，你将会逐步了解它们各自的功能。\n\n## 关系（Relationships）\n\
    \n顾名思义，关系定义了不同实体之间的关联。在模板应用程序中，`Event`实体没有定义任何关系。我们将在[第7章](#9781430238072_Ch07.xhtml)开始讨论关系，但这里先提供一个示例，让你对它们的工作方式有所了解。\n\
    \n假设你创建了一个`Employee`实体，并希望在数据结构中反映每个`Employee`的雇主信息。你可以在`Employee`实体中直接包含一个`employer`属性（例如`NSString`），但这会相当局限。更灵活的方法是创建一个`Employer`实体，然后在`Employee`和`Employer`实体之间创建关系。\n\
    \n关系可以是“对一”或“对多”，并且它们旨在链接特定的对象。如果你假设员工没有兼职且只有一份工作，那么从`Employee`到`Employer`的关系可能是“对一”关系。另一方面，从`Employer`到`Employee`的关系则是“对多”关系，因为一个雇主可能雇佣多个员工。\n\
    \n用 Objective-C 的术语来说，“对一”关系类似于使用实例变量持有指向另一个 Objective-C 类实例的指针。“对多”关系则更像是使用指向集合类（如`NSMutableArray`或`NSSet`）的指针，这些集合可以包含多个对象。\n\
    \n## 获取属性（Fetched Properties）\n\n获取属性类似于一个从单个托管对象发起的查询。例如，假设你为`Employee`添加了一个`birthdate`属性。你可以添加一个名为`sameBirthdate`的获取属性，来查找所有与当前`Employee`出生日期相同的`Employee`。\n\
    \n与关系不同，获取属性不会随对象一起加载。例如，如果`Employee`与`Employer`存在关系，那么当`Employee`实例加载时，对应的`Employer`实例也会被加载。但当`Employee`加载时，`sameBirthdate`并不会被计算。这是一种懒加载形式。你将在[第7章](#9781430238072_Ch07.xhtml)中了解更多关于获取属性的内容。\n\
    \n## 获取请求（Fetch Requests）\n\n获取属性类似于从单个托管对象发起的查询，而获取请求则更像是实现预定义查询的类方法。例如，你可以构建一个名为`canChangeLightBulb`的获取请求，返回身高超过80英寸（约2米）的`Employee`列表。当你需要更换灯泡时，可以随时运行该获取请求。运行时，Core\
    \ Data 会搜索持久化存储，找出当前能够更换灯泡的`Employee`列表。\n\n在接下来的几章中，你将通过编程方式创建许多获取请求。本章稍后“创建获取结果控制器”部分，你将看到一个简单的示例。\n\
    \n## 配置（Configurations）\n\n配置是一组实体。不同的配置可能包含相同的实体。配置用于定义哪些实体存储在哪个持久化存储中。大多数情况下，你只需要使用默认配置。本书不会涵盖多配置的使用。如果你想了解更多，请查阅\
    \ Apple 开发者网站或 *Pro Core Data for iOS*, 第2版（[www.apress.com/9781430236566](http://www.apress.com/9781430236566)）。\n\
    \n## 数据模型类：`NSManagedObjectModel`\n\n虽然你通常不会直接访问应用程序的数据模型，但你应该知道存在一个 Objective-C\
    \ 类用于在内存中表示数据模型。这个类叫做`NSManagedObjectModel`，模板会自动根据项目中的数据模型文件创建一个`NSManagedObjectModel`实例。现在让我们看看创建它的代码。\n\
    \n在导航窗格中，打开`CoreDataApp`组和`AppDelegate.m`。在编辑器跳转栏中，点击最后一个菜单（应显示为“无选择”），调出此类中的方法列表（参见[图2-13](#9781430238072_Ch02.xhtml#Fig13)）。选择\
    \ Core Data 堆栈部分的`-managedObjectModel`，这将跳转到根据`CoreDataApp.xcdatamodel`文件创建对象模型的方法。\n\
    \n![9781430238072_Fig02-13.jpg](images/9781430238072_Fig02-13.jpg)\n\n[图2-13.](#9781430238072_Ch02.xhtml#_Fig13)  设置为显示对等文件的编辑器面板，允许你查看声明和实现\n\
    \n该方法应如下所示：\n\n```objective-c\n// Returns the managed object model for the application.\n\
    // If the model doesn't already exist, it is created from the application's model.\n\
    - (NSManagedObjectModel *)managedObjectModel\n{\n    if (_managedObjectModel !=\
    \ nil) {\n        return _managedObjectModel;\n    }\n    NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"CoreDataApp\"\n                              \
    \                withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return _managedObjectModel;\n}\n\
    ```"
  raw: 'The property that you’ll use the most when creating entities is the attribute,
    which serves the same function in a Core Data entity as an instance variable does
    in an Objective-C class: they both hold data. If you look at your model editor
    (or at [Figure 2-10](#9781430238072_Ch02.xhtml#Fig10)), you’ll see that the Event
    entity has one attribute named timeStamp. The timeStamp attribute holds the date
    and time when a given Event instance was created. In your sample application,
    when you click the + button, a new row is added to the table displaying a single
    Event’s timeStamp.


    Just like an instance variable, each attribute has a type. There are two ways
    to set an attribute’s type. When the model editor is using the table style, you
    can change an attributes type in the Attributes table in the Detail editor ([Figure
    2-11](#9781430238072_Ch02.xhtml#Fig11)). In your current application, the timeStamp
    attribute is set to the date type. If you click on the Date cell, you’ll see a
    pop-up menu. That pop-up menu shows the possible attribute types. You’ll look
    at the different attribute types in the next few chapters when you begin building
    your own data models.


    ![9781430238072_Fig02-10.jpg](images/9781430238072_Fig02-10.jpg)


    [Figure 2-10.](#9781430238072_Ch02.xhtml#_Fig10)  The inspector for the Event
    entity


    ![9781430238072_Fig02-11.jpg](images/9781430238072_Fig02-11.jpg)


    [Figure 2-11.](#9781430238072_Ch02.xhtml#_Fig11)  Attributes table in the model
    editor, table style


    Make sure that the timeStamp attribute is still selected, and take a look at the
    inspector ([Figure 2-12](#9781430238072_Ch02.xhtml#Fig12)). Notice among the fields
    there is an Attribute Type field with a pop-up button. Click the button, and a
    pop-up menu should appear. It should contain the attribute’s types you saw in
    the Attribute table. Make sure the attribute type is set to date.


    ![9781430238072_Fig02-12.jpg](images/9781430238072_Fig02-12.jpg)


    [Figure 2-12.](#9781430238072_Ch02.xhtml#_Fig12)  Inspector for the timeStamp
    attribute


    A date attribute, such as timeStamp, corresponds to an instance of NSDate. If
    you want to set a new value for a date attribute, you need to provide an instance
    of NSDate to do so. A string attribute corresponds to an instance of NSString,
    and most of the numeric types correspond to an instance of NSNumber.


    **Tip**  Don’t worry too much about all the other buttons, text fields, and checkboxes
    in the model editor. As you make your way through the next few chapters, you’ll
    get a sense of what each does.


    Relationships


    As the name implies, a relationship defines the associations between two different
    entities. In the template application, no relationships are defined for the Event
    entity. We’ll begin discussing relationships in [Chapter 7](#9781430238072_Ch07.xhtml),
    but here’s an example just to give you a sense of how they work.


    Suppose you created an Employee entity and wanted to reflect each Employee’s employer
    in the data structure. You could just include an employer attribute, perhaps an
    NSString, in the Employee entity, but that would be pretty limiting. A more flexible
    approach would be to create an Employer entity, and then create a relationship
    between the Employee and Employer entities.


    Relationships can be to one or to many, and they are designed to link specific
    objects. The relationship from Employee to Employer might be a to-one relationship,
    if you assume that your Employees do not moonlight and have only a single job.
    On the other hand, the relationship from Employer to Employee is to many, since
    an Employer might employ many Employees.


    To put this in Objective-C terms, a to-one relationship is like using an instance
    variable to hold a pointer to an instance of another Objective-C class. A to-many
    relationship is more like using a pointer to a collection class like NSMutableArray
    or NSSet, which can contain multiple objects.


    Fetched Properties


    A fetched property is like a query that originates with a single managed object.
    For example, suppose you add a birthdate attribute to Employee. You might add
    a fetched property called sameBirthdate to find all Employees with the same birthdate
    as the current Employee.


    Unlike relationships, fetched properties are not loaded along with the object.
    For example, if Employee has a relationship to Employer, when an Employee instance
    is loaded, the corresponding Employer instance will be loaded, too. But when an
    Employee is loaded, sameBirthdate is not evaluated. This is a form of lazy loading.
    You’ll learn more about fetched properties in [Chapter 7](#9781430238072_Ch07.xhtml).


    Fetch Requests


    While a fetched property is like a query that originates with a single managed
    object, a fetch request is more like a class method that implements a canned query.
    For example, you might build a fetch request named canChangeLightBulb that returns
    a list of Employees who are taller than 80 inches (about 2 meters). You can run
    the fetch request any time you need a light bulb changed. When you run it, Core
    Data searches the persistent store to find the current list of potential light-bulb-changing
    Employees.


    You will create many fetch requests programmatically in the next few chapters,
    and you’ll be looking at a simple one a little later in this chapter in the “Creating
    a Fetched Results Controller” section.


    Configurations


    A configuration is a set of entities. Different configurations may contain the
    same entity. Configurations are use to define which entities are stored in which
    persistent store. Most of the time, you won’t need anything other than the default
    configuration. We won’t cover using multiple configurations in this book. If you
    want to learn more, check the Apple Developer site or *Pro Core Data for iOS*,
    *2*^(*nd*) *Edition* ([www.apress.com/9781430236566](http://www.apress.com/9781430236566)).


    The Data Model Class: NSManagedObjectModel


    Although you won’t typically access your application’s data model directly, you
    should be aware of the fact that there is an Objective-C class that represents
    the data model in memory. This class is called NSManagedObjectModel, and the template
    automatically creates an instance of NSManagedObjectModel based on the data model
    file in your project. Let’s take a look at the code that creates it now.


    In the Navigation pane, open the CoreDataApp group and AppDelegate.m. In the Editor
    jump bar, click the last menu (it should read No Selection) to bring up a list
    of the methods in this class (see [Figure 2-13](#9781430238072_Ch02.xhtml#Fig13)).
    Select -managedObjectModel in the Core Data Stack section, which will take you
    to the method that creates the object model based on the CoreDataApp.xcdatamodel
    file.


    ![9781430238072_Fig02-13.jpg](images/9781430238072_Fig02-13.jpg)


    [Figure 2-13.](#9781430238072_Ch02.xhtml#_Fig13)  The editor pane set to show
    counterparts will allow you to see the declaration and implementation


    The method should look like this:


    ```

    // Returns the managed object model for the application.

    // If the model doesn''t already exist, it is created from the application''s
    model.

    - (NSManagedObjectModel *)managedObjectModel

    {

        if (_managedObjectModel != nil) {

            return _managedObjectModel;

        }

        NSURL *modelURL = [[NSBundle mainBundle] URLForResource:@"CoreDataApp"

                                                  withExtension:@"momd"];

        _managedObjectModel = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];

        return _managedObjectModel;

    }

    ```'
  trans: "\n# Core Data 实体与数据模型\n\n## 属性（Attributes）\n\n在创建实体时，最常使用的属性是`attribute`，它在\
    \ Core Data 实体中的作用与实例变量在 Objective-C 类中的作用相同：它们都用于保存数据。查看模型编辑器（或图 2-10），你会发现`Event`实体有一个名为`timeStamp`的属性。`timeStamp`属性保存了特定`Event`实例创建时的日期和时间。在示例应用程序中，当点击`+`按钮时，表格中会新增一行，显示单个`Event`的`timeStamp`。\n\
    \n与实例变量类似，每个属性都有类型。设置属性类型有两种方式：当模型编辑器使用表格样式时，你可以在详细编辑器（图 2-11）的属性表中更改属性类型。在当前应用程序中，`timeStamp`属性设置为`Date`类型。点击`Date`单元格，你会看到一个弹出菜单，其中列出了所有可能的属性类型。在接下来的几章中，当你开始构建自己的数据模型时，将了解不同的属性类型。\n\
    \n![9781430238072_Fig02-10.jpg](img/9781430238072_Fig02-10.jpg)\n\n图 2-10.  `Event`实体的检查器\n\
    \n![9781430238072_Fig02-11.jpg](img/9781430238072_Fig02-11.jpg)\n\n图 2-11.  模型编辑器（表格样式）中的属性表\n\
    \n确保`timeStamp`属性仍处于选中状态，然后查看检查器（图 2-12）。注意，在这些字段中有一个带有弹出按钮的`Attribute Type`字段。点击该按钮，会显示一个弹出菜单，其中包含你在属性表中看到的属性类型。请确保属性类型设置为`Date`。\n\
    \n![9781430238072_Fig02-12.jpg](img/9781430238072_Fig02-12.jpg)\n\n图 2-12.  `timeStamp`属性的检查器\n\
    \n日期属性（如`timeStamp`）对应于`NSDate`的实例。若要为日期属性设置新值，需要提供一个`NSDate`实例。字符串属性对应于`NSString`的实例，大多数数值类型对应于`NSNumber`的实例。\n\
    \n**提示：** 无需过多担心模型编辑器中所有其他按钮、文本字段和复选框。在接下来的几章中，你将会逐步了解它们各自的功能。\n\n## 关系（Relationships）\n\
    \n顾名思义，关系定义了不同实体之间的关联。在模板应用程序中，`Event`实体没有定义任何关系。我们将在第 7 章开始讨论关系，但这里先提供一个示例，让你对它们的工作方式有所了解。\n\
    \n假设你创建了一个`Employee`实体，并希望在数据结构中反映每个`Employee`的雇主信息。你可以在`Employee`实体中直接包含一个`employer`属性（例如`NSString`），但这会相当局限。更灵活的方法是创建一个`Employer`实体，然后在`Employee`和`Employer`实体之间创建关系。\n\
    \n关系可以是“对一”或“对多”，并且它们旨在链接特定的对象。如果你假设员工没有兼职且只有一份工作，那么从`Employee`到`Employer`的关系可能是“对一”关系。另一方面，从`Employer`到`Employee`的关系则是“对多”关系，因为一个雇主可能雇佣多个员工。\n\
    \n用 Objective-C 的术语来说，“对一”关系类似于使用实例变量持有指向另一个 Objective-C 类实例的指针。“对多”关系则更像是使用指向集合类（如`NSMutableArray`或`NSSet`）的指针，这些集合可以包含多个对象。\n\
    \n## 获取属性（Fetched Properties）\n\n获取属性类似于一个从单个托管对象发起的查询。例如，假设你为`Employee`添加了一个`birthdate`属性。你可以添加一个名为`sameBirthdate`的获取属性，来查找所有与当前`Employee`出生日期相同的`Employee`。\n\
    \n与关系不同，获取属性不会随对象一起加载。例如，如果`Employee`与`Employer`存在关系，那么当`Employee`实例加载时，对应的`Employer`实例也会被加载。但当`Employee`加载时，`sameBirthdate`并不会被计算。这是一种懒加载形式。你将在第\
    \ 7 章中了解更多关于获取属性的内容。\n\n## 获取请求（Fetch Requests）\n\n获取属性类似于从单个托管对象发起的查询，而获取请求则更像是实现预定义查询的类方法。例如，你可以构建一个名为`canChangeLightBulb`的获取请求，返回身高超过\
    \ 80 英寸（约 2 米）的`Employee`列表。当你需要更换灯泡时，可以随时运行该获取请求。运行时，Core Data 会搜索持久化存储，找出当前能够更换灯泡的`Employee`列表。\n\
    \n在接下来的几章中，你将通过编程方式创建许多获取请求。本章稍后“创建获取结果控制器”部分，你将看到一个简单的示例。\n\n## 配置（Configurations）\n\
    \n配置是一组实体。不同的配置可能包含相同的实体。配置用于定义哪些实体存储在哪个持久化存储中。大多数情况下，你只需要使用默认配置。本书不会涵盖多配置的使用。如果你想了解更多，请查阅\
    \ Apple 开发者网站或 *Pro Core Data for iOS*, 第 2 版（[www.apress.com/9781430236566](http://www.apress.com/9781430236566)）。\n\
    \n## 数据模型类：`NSManagedObjectModel`\n\n虽然你通常不会直接访问应用程序的数据模型，但你应该知道存在一个 Objective-C\
    \ 类用于在内存中表示数据模型。这个类叫做`NSManagedObjectModel`，模板会自动根据项目中的数据模型文件创建一个`NSManagedObjectModel`实例。现在让我们看看创建它的代码。\n\
    \n在导航窗格中，打开`CoreDataApp`组和`AppDelegate.m`。在编辑器跳转栏中，点击最后一个菜单（应显示为“无选择”），调出此类中的方法列表（参见图\
    \ 2-13）。选择 Core Data 堆栈部分的`-managedObjectModel`，这将跳转到根据`CoreDataApp.xcdatamodel`文件创建对象模型的方法。\n\
    \n![9781430238072_Fig02-13.jpg](img/9781430238072_Fig02-13.jpg)\n\n图 2-13.  设置为显示对等文件的编辑器面板，允许你查看声明和实现\n\
    \n该方法应如下所示：\n\n```objective-c\n// Returns the managed object model for the application.\n\
    // If the model doesn't already exist, it is created from the application's model.\n\
    - (NSManagedObjectModel *)managedObjectModel\n{\n    if (_managedObjectModel !=\
    \ nil) {\n        return _managedObjectModel;\n    }\n    NSURL *modelURL = [[NSBundle\
    \ mainBundle] URLForResource:@\"CoreDataApp\"\n                              \
    \                withExtension:@\"momd\"];\n    _managedObjectModel = [[NSManagedObjectModel\
    \ alloc] initWithContentsOfURL:modelURL];\n    return _managedObjectModel;\n}\n\
    ```\n"
- fmt: "首先检查实例变量`_managedObjectModel`，判断其是否为`nil`。这个访问器方法采用了一种懒加载的形式：底层实例变量只有在首次调用访问器方法时才会真正被实例化。因此，**绝不要**直接访问`_managedObjectModel`（当然，在访问器方法内部除外）。务必始终使用访问器方法，否则你可能会试图调用一个尚未创建的对象的属性和方法。\n\
    \n**提示：** 数据模型类名为`NSManagedObjectModel`，正如你在本章稍后部分会看到的，Core Data中的数据实例被称为“托管对象”。\n\
    \n如果`_managedObjectModel`为`nil`，你可以去获取你的数据模型。默认情况下，Xcode 应该已为你写好了以下两行代码来实现这一点：\n\
    \n```objc\nNSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"CoreDataApp\"\
    \n                                          withExtension:@\"momd\"];\n_managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n```\n\n还记得我们说过一个持久化存储区关联一个单一数据模型吗？这没错，但它并未道出全貌。你可以将多个`.xcdatamodel`文件合并至`NSManagedObjectModel`的单个实例中，创建一个合并了多个文件中所有实体的单一数据模型。如果你计划使用多个模型，可以将那两行代码更改为一行。\n\
    \n这一行代码会获取 Xcode 项目中可能存在的所有`.xcdatamodel`文件，并将它们合并到一个`NSManagedObjectModel`的单一实例中：\n\
    \n```objc\n_managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    ```\n\n因此，举例来说，如果你创建了第二个数据模型文件并将其添加到项目中，那么该新文件将与`CoreDataApp.xcdatamodel`合并成一个托管对象模型，其中包含两个文件的内容。这使你可以将应用程序的数据模型拆分成多个更小、更易于管理的文件。\n\
    \n绝大多数使用 Core Data 的 iOS 应用程序只有一个持久化存储区和一个数据模型，因此默认的模板代码在大多数情况下都能完美工作。话虽如此，Core\
    \ Data 确实支持使用多个持久化存储区。例如，你可以设计你的应用程序，将其部分数据存储在 SQLite 持久化存储区中，而另一部分数据存储在二进制平面文件中。如果你发现需要使用多个数据模型，请记得将模板代码改为使用`mergedModelFromBundles:`单独加载托管对象模型。\n\
    \n## 持久化存储区与持久化存储协调器\n\n持久化存储区（有时也称为后端存储）是 Core Data 存储数据的地方。默认情况下，在 iOS 设备上，Core\
    \ Data 使用位于应用程序 Documents 文件夹中的一个 SQLite 数据库作为其持久化存储区。但这可以通过微调一行代码来更改，而不会影响你编写的任何其他代码。稍后我们将向你展示实际需要修改的代码行。\n\
    \n**警告：** 一旦你将应用程序发布到 App Store，请不要更改持久化存储区的类型。如果你因任何原因必须更改，则需要编写代码将数据从旧持久化存储区迁移到新存储区，否则你的用户将丢失所有数据——这几乎总会让他们非常不满。\n\
    \n每个持久化存储区都与一个单一数据模型相关联，该模型定义了持久化存储区可以存储的数据类型。\n\n持久化存储区实际上并不由 Objective-C 类直接表示。相反，一个名为`NSPersistentStoreCoordinator`的类控制着对持久化存储区的访问。本质上，它接收来自不同类的、触发对持久化存储区进行读写的所有调用，并将它们序列化，从而避免同时对同一文件进行多个调用（这可能会因文件或数据库锁定而导致问题）。\n\
    \n与托管对象模型的情况一样，模板在应用程序委托中为你提供了一个方法，用于创建并返回一个持久化存储协调器的实例。除了创建存储区并将其与数据模型和磁盘上的位置关联起来之外（模板中已为你完成），你很少需要直接与持久化存储协调器交互。你将使用高级别\
    \ Core Data 调用，而 Core Data 会与持久化存储协调器交互以检索或保存数据。\n\n让我们来看一下返回持久化存储协调器的方法。在`CoreDataAppDelegate.m`中，从函数弹出菜单中选择`-persistentStoreCoordinator`。该方法的代码如下：\n\
    \n```objc\n// Returns the persistent store coordinator for the application.\n\
    // If the coordinator doesn't already exist, it is created and the application's\
    \ store added to it.\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n        \
    \  URLByAppendingPathComponent:@\"CoreDataApp.sqlite\"];\n    NSError *error =\
    \ nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\n\
    \                                          initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                           configuration:nil\n              \
    \                                       URL:storeURL\n                       \
    \                          options:nil\n                                     \
    \              error:&error]) {\n        /*\n         Replace this implementation\
    \ with code to handle the error appropriately.\n         abort() causes the application\
    \ to generate a crash log and terminate. You should not use\n         this function\
    \ in a shipping application, although it may be useful during development.\n \
    \        Typical reasons for an error here include:\n         * The persistent\
    \ store is not accessible;\n         * The schema for the persistent store is\
    \ incompatible with current managed object model.\n         Check the error message\
    \ to determine what the actual problem was.\n         If the persistent store\
    \ is not accessible, there is typically something wrong with the file\n      \
    \   path. Often, a file URL is pointing into the application's resources directory\
    \ instead of a\n         writeable directory.\n         If you encounter schema\
    \ incompatibility errors during development, you can reduce their\n          \
    \   frequency by:\n         * Simply deleting the existing store:\n         [[NSFileManager\
    \ defaultManager] removeItemAtURL:storeURL error:nil]\n         * Performing automatic\
    \ lightweight migration by passing the following dictionary as the\n         \
    \    options parameter:\n         @{NSMigratePersistentStoresAutomaticallyOption:@YES,\n\
    \                    NSInferMappingModelAutomaticallyOption:@YES}\n         Lightweight\
    \ migration will only work for a limited set of schema changes; consult \"Core\
    \ Data\n         Model Versioning and Data Migration Programming Guide\" for details.\n\
    \         */\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \        abort();\n    }\n    return _persistentStoreCoordinator;\n}\n```"
  raw: "The first checks the instance variable _managedObjectModel to see if it’s\
    \ nil. This accessor method uses a form of lazy loading. The underlying instance\
    \ variable doesn’t actually get instantiated until the first time the accessor\
    \ method is called. For this reason, you should never, ever access _managedObjectModel\
    \ directly (except within the accessor method itself, of course). Always make\
    \ sure to use the accessor methods. Otherwise, you could end up trying to make\
    \ calls on an object that hasn’t been created yet.\n\n**Tip**  The data model\
    \ class is called NSManagedObjectModel because, as you’ll see a little later in\
    \ the chapter, instances of data in Core Data are called managed objects.\n\n\
    If _managedObjectModel is nil, you can go get your data model. By default XCode\
    \ should have written the following two lines of code to accomplish this for you:\n\
    \n```\nNSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"CoreDataApp\"\
    \n                                          withExtension:@\"momd\"];\n_managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n```\n\nRemember\
    \ how we said that a persistent store was associated with a single data model?\
    \ Well, that’s true, but it doesn’t tell the whole story. You can combine multiple\
    \ .xcdatamodel files into a single instance of NSManagedObjectModel, creating\
    \ a single data model that combines all the entities from multiple files. If you\
    \ are planning on having more than one model, you can change those two lines of\
    \ code to one.\n\nThis one line of code will take any .xcdatamodel files that\
    \ might be in your Xcode project and combines them together into a single instance\
    \ of NSManagedObjectModel:\n\n```\n_managedObjectModel = [NSManagedObjectModel\
    \ mergedModelFromBundles:nil];\n```\n\nSo, for example, if you create a second\
    \ data model file and add it to your project, that new file will be combined with\
    \ CoreDataApp.xcdatamodel into a single managed object model that containes the\
    \ contents of both files. This allows you to split up your application’s data\
    \ model into multiple smaller and more manageable files.\n\nThe vast majority\
    \ of iOS applications that use Core Data have a single persistent store and a\
    \ single data model, so the default template code will work beautifully most of\
    \ the time. That said, Core Data does support the use of multiple persistent stores.\
    \ You could, for example, design your application to store some of its data in\
    \ a SQLite persistent store and some of it in a binary flat file. If you find\
    \ that you need to use multiple data models, remember to change the template code\
    \ here to load the managed object models individually using mergedModelFromBundles:.\n\
    \nThe Persistent Store and Persistent Store Coordinator\n\nThe persistent store,\
    \ which is sometimes referred to as a backing store, is where Core Data stores\
    \ its data. By default, on iOS devices Core Data uses a SQLite database contained\
    \ in your application’s Documents folder as its persistent store. But this can\
    \ be changed without impacting any of the other code you write by tweaking a single\
    \ line of code. We’ll show you the actual line of code to change in a few moments.\n\
    \n**Caution**  Do not change the type of persistent store once you have posted\
    \ your application to the App Store. If you must change it for any reason, you\
    \ will need to write code to migrate data from the old persistent store to the\
    \ new one, or else your users will lose all of their data—something that will\
    \ almost always make them quite unhappy.\n\nEvery persistent store is associated\
    \ with a single data model, which defines the types of data that the persistent\
    \ store can store.\n\nThe persistent store isn’t actually represented by an Objective-C\
    \ class. Instead, a class called NSPersistentStoreCoordinator controls access\
    \ to the persistent store. In essence, it takes all the calls coming from different\
    \ classes that trigger reads or writes to the persistent store and serializes\
    \ them so that multiple calls against the same file are not being made at the\
    \ same time, which could result in problems due to file or database locking.\n\
    \nAs is the case with the managed object model, the template provides you with\
    \ a method in the application delegate that creates and returns an instance of\
    \ a persistent store coordinator. Other than creating the store and associating\
    \ it with a data model and a location on disk (which is done for you in the template),\
    \ you will rarely need to interact with the persistent store coordinator directly.\
    \ You’ll use high-level Core Data calls, and Core Data will interact with the\
    \ persistent store coordinator to retrieve or save the data.\n\nLet’s take a look\
    \ at the method that returns the persistent store coordinator. In CoreDataAppDelegate.m,\
    \ select -persistentStoreCoordinator from the function pop-up menu. Here’s the\
    \ method:\n\n```\n// Returns the persistent store coordinator for the application.\n\
    // If the coordinator doesn't already exist, it is created and the application's\
    \ store added to it.\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
        }\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n          URLByAppendingPathComponent:@\"\
    CoreDataApp.sqlite\"];\n    NSError *error = nil;\n    _persistentStoreCoordinator\
    \ = [[NSPersistentStoreCoordinator alloc]\n                                          initWithManagedObjectModel:[self\
    \ managedObjectModel]];\n    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
      \t                           configuration:nil\n  \t                                    \
    \ URL:storeURL\n  \t                                 options:nil\n  \t                                  \
    \ error:&error]) {\n        /*\n         Replace this implementation with code\
    \ to handle the error appropriately.\n         abort() causes the application\
    \ to generate a crash log and terminate. You should not use\n         this function\
    \ in a shipping application, although it may be useful during development.\n        \
    \ Typical reasons for an error here include:\n         * The persistent store\
    \ is not accessible;\n         * The schema for the persistent store is incompatible\
    \ with current managed object model.\n         Check the error message to determine\
    \ what the actual problem was.\n         If the persistent store is not accessible,\
    \ there is typically something wrong with the file\n         path. Often, a file\
    \ URL is pointing into the application's resources directory instead of a\n        \
    \ writeable directory.\n         If you encounter schema incompatibility errors\
    \ during development, you can reduce their\n             frequency by:\n        \
    \ * Simply deleting the existing store:\n         [[NSFileManager defaultManager]\
    \ removeItemAtURL:storeURL error:nil]\n         * Performing automatic lightweight\
    \ migration by passing the following dictionary as the\n             options parameter:\n\
             @{NSMigratePersistentStoresAutomaticallyOption:@YES,\n                    NSInferMappingModelAutomaticallyOption:@YES}\n\
             Lightweight migration will only work for a limited set of schema changes;\
    \ consult \"Core Data\n         Model Versioning and Data Migration Programming\
    \ Guide\" for details.\n         */\n        NSLog(@\"Unresolved error %@, %@\"\
    , error, [error userInfo]);\n        abort();\n    }\n    return _persistentStoreCoordinator;\n\
    }\n```"
  trans: "\n首先检查实例变量`_managedObjectModel`，判断其是否为`nil`。这个访问器方法采用了一种懒加载的形式：底层实例变量只有在首次调用访问器方法时才会真正被实例化。因此，**绝不要**直接访问`_managedObjectModel`（当然，在访问器方法内部除外）。务必始终使用访问器方法，否则你可能会试图调用一个尚未创建的对象的属性和方法。\n\
    \n**提示：** 数据模型类名为`NSManagedObjectModel`，正如你在本章稍后部分会看到的，Core Data 中的数据实例被称为“托管对象”。\n\
    \n如果`_managedObjectModel`为`nil`，你可以去获取你的数据模型。默认情况下，Xcode 应该已为你写好了以下两行代码来实现这一点：\n\
    \n```objc\nNSURL *modelURL = [[NSBundle mainBundle] URLForResource:@\"CoreDataApp\"\
    \n                                          withExtension:@\"momd\"];\n_managedObjectModel\
    \ = [[NSManagedObjectModel alloc] initWithContentsOfURL:modelURL];\n```\n\n还记得我们说过一个持久化存储区关联一个单一数据模型吗？这没错，但它并未道出全貌。你可以将多个`.xcdatamodel`文件合并至`NSManagedObjectModel`的单个实例中，创建一个合并了多个文件中所有实体的单一数据模型。如果你计划使用多个模型，可以将那两行代码更改为一行。\n\
    \n这一行代码会获取 Xcode 项目中可能存在的所有`.xcdatamodel`文件，并将它们合并到一个`NSManagedObjectModel`的单一实例中：\n\
    \n```objc\n_managedObjectModel = [NSManagedObjectModel mergedModelFromBundles:nil];\n\
    ```\n\n因此，举例来说，如果你创建了第二个数据模型文件并将其添加到项目中，那么该新文件将与`CoreDataApp.xcdatamodel`合并成一个托管对象模型，其中包含两个文件的内容。这使你可以将应用程序的数据模型拆分成多个更小、更易于管理的文件。\n\
    \n绝大多数使用 Core Data 的 iOS 应用程序只有一个持久化存储区和一个数据模型，因此默认的模板代码在大多数情况下都能完美工作。话虽如此，Core\
    \ Data 确实支持使用多个持久化存储区。例如，你可以设计你的应用程序，将其部分数据存储在 SQLite 持久化存储区中，而另一部分数据存储在二进制平面文件中。如果你发现需要使用多个数据模型，请记得将模板代码改为使用`mergedModelFromBundles:`单独加载托管对象模型。\n\
    \n## 持久化存储区与持久化存储协调器\n\n持久化存储区（有时也称为后端存储）是 Core Data 存储数据的地方。默认情况下，在 iOS 设备上，Core\
    \ Data 使用位于应用程序 Documents 文件夹中的一个 SQLite 数据库作为其持久化存储区。但这可以通过微调一行代码来更改，而不会影响你编写的任何其他代码。稍后我们将向你展示实际需要修改的代码行。\n\
    \n**警告：** 一旦你将应用程序发布到 App Store，请不要更改持久化存储区的类型。如果你因任何原因必须更改，则需要编写代码将数据从旧持久化存储区迁移到新存储区，否则你的用户将丢失所有数据——这几乎总会让他们非常不满。\n\
    \n每个持久化存储区都与一个单一数据模型相关联，该模型定义了持久化存储区可以存储的数据类型。\n\n持久化存储区实际上并不由 Objective-C 类直接表示。相反，一个名为`NSPersistentStoreCoordinator`的类控制着对持久化存储区的访问。本质上，它接收来自不同类的、触发对持久化存储区进行读写的所有调用，并将它们序列化，从而避免同时对同一文件进行多个调用（这可能会因文件或数据库锁定而导致问题）。\n\
    \n与托管对象模型的情况一样，模板在应用程序委托中为你提供了一个方法，用于创建并返回一个持久化存储协调器的实例。除了创建存储区并将其与数据模型和磁盘上的位置关联起来之外（模板中已为你完成），你很少需要直接与持久化存储协调器交互。你将使用高级别\
    \ Core Data 调用，而 Core Data 会与持久化存储协调器交互以检索或保存数据。\n\n让我们来看一下返回持久化存储协调器的方法。在`CoreDataAppDelegate.m`中，从函数弹出菜单中选择`-persistentStoreCoordinator`。该方法的代码如下：\n\
    \n```objc\n// Returns the persistent store coordinator for the application.\n\
    // If the coordinator doesn't already exist, it is created and the application's\
    \ store added to it.\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n    NSURL *storeURL = [[self applicationDocumentsDirectory]\n        \
    \  URLByAppendingPathComponent:@\"CoreDataApp.sqlite\"];\n    NSError *error =\
    \ nil;\n    _persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\n\
    \                                          initWithManagedObjectModel:[self managedObjectModel]];\n\
    \    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                           configuration:nil\n              \
    \                                       URL:storeURL\n                       \
    \                          options:nil\n                                     \
    \              error:&error]) {\n        /*\n         Replace this implementation\
    \ with code to handle the error appropriately.\n         abort() causes the application\
    \ to generate a crash log and terminate. You should not use\n         this function\
    \ in a shipping application, although it may be useful during development.\n \
    \        Typical reasons for an error here include:\n         * The persistent\
    \ store is not accessible;\n         * The schema for the persistent store is\
    \ incompatible with current managed object model.\n         Check the error message\
    \ to determine what the actual problem was.\n         If the persistent store\
    \ is not accessible, there is typically something wrong with the file\n      \
    \   path. Often, a file URL is pointing into the application's resources directory\
    \ instead of a\n         writeable directory.\n         If you encounter schema\
    \ incompatibility errors during development, you can reduce their\n          \
    \   frequency by:\n         * Simply deleting the existing store:\n         [[NSFileManager\
    \ defaultManager] removeItemAtURL:storeURL error:nil]\n         * Performing automatic\
    \ lightweight migration by passing the following dictionary as the\n         \
    \    options parameter:\n         @{NSMigratePersistentStoresAutomaticallyOption:@YES,\n\
    \                    NSInferMappingModelAutomaticallyOption:@YES}\n         Lightweight\
    \ migration will only work for a limited set of schema changes; consult \"Core\
    \ Data\n         Model Versioning and Data Migration Programming Guide\" for details.\n\
    \         */\n        NSLog(@\"Unresolved error %@, %@\", error, [error userInfo]);\n\
    \        abort();\n    }\n    return _persistentStoreCoordinator;\n}\n```\n"
- fmt: "As with the managed object model, this `persistentStoreCoordinator` accessor\
    \ method uses lazy loading and doesn’t instantiate the persistent store coordinator\
    \ until the first time it is accessed. Then it creates a path to a file called\
    \ `CoreDataApp.sqlite` in the `Documents` directory in your application’s sandbox.\
    \ The template will always create a filename based on your project’s name. If\
    \ you want to use a different name, you can change it here, though it generally\
    \ doesn’t matter what you call the file since the user will never see it.\n\n\
    **Caution** If you do decide to change the filename, make sure you don’t change\
    \ it after you’ve posted your application to the App Store, or else future updates\
    \ will cause your users to lose all of their data.\n\nTake a look at this line\
    \ of code:\n\n```\nif (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType\n\
    \                                 configuration:nil\n                        \
    \         URL:storeURL\n                                 options:nil\n       \
    \                          error:&error]) {\n```\n\nThe first parameter to this\
    \ method, `NSSQLiteStoreType`, determines the type of the persistent store. `NSSQLiteStoreType`\
    \ is a constant that tells Core Data to use a SQLite database for its persistent\
    \ store. If you want your application to use a single, binary flat file instead\
    \ of a SQLite database, you could specify the constant `NSBinaryStoreType` instead\
    \ of `NSSQLiteStoreType`. The vast majority of the time, the default setting is\
    \ the best choice, so unless you have a compelling reason to change it, leave\
    \ it alone.\n\n**Note** A third type of persistent store supported by Core Data\
    \ on iOS devices is called in-memory store. The primary use of this option is\
    \ to create a caching mechanism, storing the data in memory instead of in a database\
    \ or binary file. To use an in-memory store, specify a store type of `NSInMemoryStoreType`.\n\
    \n## Reviewing the Data Model\n\nBefore you move on to other parts of Core Data,\
    \ let’s quickly review how the pieces you’ve looked at so far fit together. You\
    \ might want to refer back to [Figure 2-7](#9781430238072_Ch02.xhtml#Fig7).\n\n\
    The persistent store (or backing store) is a file on an iOS device’s file system\
    \ that can be either a SQLite database or a binary flat file. A data model file,\
    \ contained in one or more files with an extension of `.xcdatamodel`, describes\
    \ the structure of your application’s data. This file can be edited in Xcode.\
    \ The data model tells the persistent store coordinator the format of all data\
    \ stored in that persistent store. The persistent store coordinator is used by\
    \ other Core Data classes that need to save, retrieve, or search for data. Easy\
    \ enough, right? Let’s move on.\n\n## Managed Objects\n\nEntities define the structure\
    \ of your data, but they do not actually hold any data themselves. The instances\
    \ of data are called managed objects. Every instance of an entity that you work\
    \ with in Core Data will be an instance of the class `NSManagedObject` or a subclass\
    \ of `NSManagedObject`.\n\n### Key-Value Coding\n\nThe `NSDictionary` class allows\
    \ you to store objects in a data structure and retrieve an object using a unique\
    \ key. Like the `NSDictionary` class, `NSManagedObject` supports the key-value\
    \ methods `valueForKey:` and `setValue:forKey:` for setting and retrieving attribute\
    \ values. It also has additional methods for working with relationships. You can,\
    \ for example, retrieve an instance of `NSMutableSet` representing a specific\
    \ relationship. Adding managed objects to this mutable set or removing them will\
    \ add or remove objects from the relationship it represents.\n\nIf the `NSDictionary`\
    \ class is new to you, take a few minutes to fire up Xcode and read about `NSDictionary`\
    \ in the documentation viewer. The important concept to get your head around is\
    \ key-value coding, or KVC. Core Data uses KVC to store and retrieve data from\
    \ its managed objects.\n\nIn your template application, consider an instance of\
    \ `NSManagedObject` that represents a single event. You could retrieve the value\
    \ stored in its `timeStamp` attribute by calling `valueForKey:`, like so:\n\n\
    ```\nNSDate *timeStamp = [managedObject valueForKey:@\"timeStamp\"];\n```\n\n\
    Since `timeStamp` is an attribute of type date, you know the object returned by\
    \ `valueForKey:` will be an instance of `NSDate`. Similarly, you could set the\
    \ value using `setValue:ForKey:`. The following code would set the `timeStamp`\
    \ attribute of `managedObject` to the current date and time:\n\n```\n[managedObject\
    \ setValue:[NSDate date] forKey:@\"timeStamp\"];\n```\n\nKVC also includes the\
    \ concept of a keypath. Keypaths allow you iterate through object hierarchies\
    \ using a single string. So, for example, if you had a relationship on your `Employee`\
    \ entity called `whereIWork`, which pointed to an entity named `Employer`, and\
    \ the `Employer` entity had an attribute called `name`, then you could get to\
    \ the value stored in `name` from an instance of `Employee` using a keypath like\
    \ so:\n\n```\nNSString *employerName = [managedObject valueForKeyPath:@\"whereIWork.name\"\
    ];\n```\n\nNotice that you use `valueForKeyPath:` instead of `valueForKey:`, and\
    \ you provide a dot-separated value for the keypath. KVC parses that string using\
    \ the dots, so in this case, it would parse it into two separate values: `whereIWork`\
    \ and `name`. It uses the first one (`whereIWork`) on itself and retrieves the\
    \ object that corresponds to that key. It then takes the next value in the keypath\
    \ (`name`) and retrieves the object stored under that key from the object returned\
    \ by the previous call. Since `Employer` is a to-one relationship, the first part\
    \ of the keypath would return a managed object instance that represented the Employee’s\
    \ employer. The second part of the keypath would then be used to retrieve the\
    \ `name` from the managed object that represents the `Employer`.\n\n**Note** If\
    \ you’ve used bindings in Cocoa, you’re probably already familiar with KVC and\
    \ keypaths. If not, don’t worry—they will become second nature to you before long.\
    \ Keypaths are really quite intuitive.\n\n### Managed Object Context\n\nCore Data\
    \ maintains an object that acts as a gateway between your entities and the rest\
    \ of Core Data. That gateway is called a managed object context (often just referred\
    \ to as a context). The context maintains state for all the managed objects that\
    \ you’ve loaded or created. The context keeps track of changes that have been\
    \ made since the last time a managed object was saved or loaded. When you want\
    \ to load or search for objects, for example, you do it against a context. When\
    \ you want to commit your changes to the persistent store, you save the context.\
    \ If you want to undo changes to a managed object, you just ask the managed object\
    \ context to undo. (Yes, it even handles all the work needed to implement undo\
    \ and redo for your data model.)\n\nWhen building iOS applications, you will have\
    \ only a single context the vast majority of the time. However, iOS makes having\
    \ more than one context easy. You can create nested managed object contexts, in\
    \ which the parent object store of a context is another managed object context\
    \ rather than the persistent store coordinator.\n\nIn this case, fetch and save\
    \ operations are mediated by the parent context instead of by a coordinator. You\
    \ can imagine a number of usage scenarios, including things like performing background\
    \ operations on a second thread or queue and managing discardable edits from an\
    \ inspector window or view. A word of caution: nested contexts make it more important\
    \ than ever that you adopt the “pass the baton” approach of accessing a context\
    \ (by passing a context from one view controller to the next) rather than retrieving\
    \ it directly from the application delegate."
  raw: 'As with the managed object model, this persistentStoreCoordinator accessor
    method uses lazy loading and doesn’t instantiate the persistent store coordinator
    until the first time it is accessed. Then it creates a path to a file called CoreDataApp.sqlite
    in the Documents directory in your application’s sandbox. The template will always
    create a filename based on your project’s name. If you want to use a different
    name, you can change it here, though it generally doesn’t matter what you call
    the file since the user will never see it.


    **Caution**  If you do decide to change the filename, make sure you don’t change
    it after you’ve posted your application to the App Store, or else future updates
    will cause your users to lose all of their data.


    Take a look at this line of code:


    ```

    if (![_persistentStoreCoordinator addPersistentStoreWithType:NSSQLiteStoreType

                                     configuration:nil

                                     URL:storeURL

                                     options:nil

                                     error:&error]) {

    ```


    The first parameter to this method, NSSQLiteStoreType, determines the type of
    the persistent store. NSSQLiteStoreType is a constant that tells Core Data to
    use a SQLite database for its persistent store. If you want your application to
    use a single, binary flat file instead of a SQLite database, you could specify
    the constant NSBinaryStoreType instead of NSSQLiteStoreType. The vast majority
    of the time, the default setting is the best choice, so unless you have a compelling
    reason to change it, leave it alone.


    **Note**  A third type of persistent store supported by Core Data on iOS devices
    is called in-memory store. The primary use of this option is to create a caching
    mechanism, storing the data in memory instead of in a database or binary file.
    To use an in-memory store, specify a store type of NSInMemoryStoreType.


    Reviewing the Data Model


    Before you move on to other parts of Core Data, let’s quickly review how the pieces
    you’ve looked at so far fit together. You might want to refer back to [Figure
    2-7](#9781430238072_Ch02.xhtml#Fig7).


    The persistent store (or backing store) is a file on an iOS device’s file system
    that can be either a SQLite database or a binary flat file. A data model file,
    contained in one or more files with an extension of .xcdatamodel, describes the
    structure of your application’s data. This file can be edited in Xcode. The data
    model tells the persistent store coordinator the format of all data stored in
    that persistent store. The persistent store coordinator is used by other Core
    Data classes that need to save, retrieve, or search for data. Easy enough, right?
    Let’s move on.


    Managed Objects


    Entities define the structure of your data, but they do not actually hold any
    data themselves. The instances of data are called managed objects. Every instance
    of an entity that you work with in Core Data will be an instance of the class
    NSManagedObject or a subclass of NSManagedObject.


    Key-Value Coding


    The NSDictionary class allows you to store objects in a data structure and retrieve
    an object using a unique key. Like the NSDictionary class, NSManagedObject supports
    the key-value methods valueForKey: and setValue:forKey: for setting and retrieving
    attribute values. It also has additional methods for working with relationships.
    You can, for example, retrieve an instance of NSMutableSet representing a specific
    relationship. Adding managed objects to this mutable set or removing them will
    add or remove objects from the relationship it represents.


    If the NSDictionary class is new to you, take a few minutes to fire up Xcode and
    read about NSDictionary in the documentation viewer. The important concept to
    get your head around is key-value coding, or KVC. Core Data uses KVC to store
    and retrieve data from its managed objects.


    In your template application, consider an instance of NSManagedObject that represents
    a single event. You could retrieve the value stored in its timeStamp attribute
    by calling valueForKey:, like so:


    ```

    NSDate *timeStamp = [managedObject valueForKey:@"timeStamp"];

    ```


    Since timeStamp is an attribute of type date, you know the object returned by
    valueForKey: will be an instance of NSDate. Similarly, you could set the value
    using setValue:ForKey:. The following code would set the timeStamp attribute of
    managedObject to the current date and time:


    ```

    [managedObject setValue:[NSDate date] forKey:@"timeStamp"];

    ```


    KVC also includes the concept of a keypath. Keypaths allow you iterate through
    object hierarchies using a single string. So, for example, if you had a relationship
    on your Employee entity called whereIWork, which pointed to an entity named Employer,
    and the Employer entity had an attribute called name, then you could get to the
    value stored in name from an instance of Employee using a keypath like so:


    ```

    NSString *employerName = [managedObject valueForKeyPath:@"whereIWork.name"];

    ```


    Notice that you use valueForKeyPath: instead of valueForKey:, and you provide
    a dot-separated value for the keypath. KVC parses that string using the dots,
    so in this case, it would parse it into two separate values: whereIWork and name.
    It uses the first one (whereIWork) on itself and retrieves the object that corresponds
    to that key. It then takes the next value in the keypath (*name*) and retrieves
    the object stored under that key from the object returned by the previous call.
    Since Employer is a to-one relationship, the first part of the keypath would return
    a managed object instance that represented the Employee’s employer. The second
    part of the keypath would then be used to retrieve the name from the managed object
    that represents the Employer.


    **Note**  If you’ve used bindings in Cocoa, you’re probably already familiar with
    KVC and keypaths. If not, don’t worry—they will become second nature to you before
    long. Keypaths are really quite intuitive.


    Managed Object Context


    Core Data maintains an object that acts as a gateway between your entities and
    the rest of Core Data. That gateway is called a managed object context (often
    just referred to as a context). The context maintains state for all the managed
    objects that you’ve loaded or created. The context keeps track of changes that
    have been made since the last time a managed object was saved or loaded. When
    you want to load or search for objects, for example, you do it against a context.
    When you want to commit your changes to the persistent store, you save the context.
    If you want to undo changes to a managed object, you just ask the managed object
    context to undo. (Yes, it even handles all the work needed to implement undo and
    redo for your data model).


    When building iOS applications, you will have only a single context the vast majority
    of the time. However, iOS makes having more than one context easy. You can create
    nested managed object contexts, in which the parent object store of a context
    is another managed object context rather than the persistent store coordinator.


    In this case, fetch and save operations are mediated by the parent context instead
    of by a coordinator. You can imagine a number of usage scenarios, including things
    like performing background operations on a second thread or queue and managing
    discardable edits from an inspector window or view. A word of caution: nested
    contexts make it more important than ever that you adopt the “pass the baton”
    approach of accessing a context (by passing a context from one view controller
    to the next) rather than retrieving it directly from the application delegate.'
