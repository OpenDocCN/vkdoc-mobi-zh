    watch what happens. Not much, huh? If you keep an eye on the debug console in
    Xcode, you’ll see that it is working away on those calculations ([Figure 14-2](#9781430238072_Ch14.xhtml#Fig2))
    thanks to the NSLog() statement in your code, but the user interface doesn’t update
    until all of the calculations are done, does it?


