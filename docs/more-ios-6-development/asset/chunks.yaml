    \ 还提供了一种通过 Xcode 管理器创建预置描述文件的替代方法。从很多方面来看，这比使用 ADC iOS 预置门户要简单得多。在图 8-14 中，你可以看到\
    \ Profiles 面板左下角有一个 New（新建）按钮。系统可能会要求你输入 ADC 登录信息。登录后，你应会看到一个“新建描述文件助手”（图 8-15）。\n\
