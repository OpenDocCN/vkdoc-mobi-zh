    [Figure 3-6.](#9781430238072_Ch03.xhtml#_Fig6)  命名故事板并保存


    最后，你需要告诉 Xcode 你想使用新的`SuperDB.storyboard`文件。在导航器面板顶部选择`SuperDB`项目。当项目编辑器出现时，选择`SuperDB`目标并进入项目摘要编辑器（[Figure
    3-7](#9781430238072_Ch03.xhtml#Fig7)）。在`iPhone/iPod Deployment Info`部分，在`Main
    Storyboard`字段中输入名称`**SuperDB**`。


    ![9781430238072_Fig03-07.jpg](images/9781430238072_Fig03-07.jpg)


    [Figure 3-7.](#9781430238072_Ch03.xhtml#_Fig7)  项目编辑器


    由于你已经将`SuperDB`配置为使用故事板，因此需要清理应用委托。在导航器面板中选择`AppDelegate.m`。代码编辑器应出现。找到方法：


    ```

    - (BOOL)application:(UIApplication *)application

             didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    ```


    并将其编辑为：


    ```

    -(BOOL)application:(UIApplication *)application

            didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    {

            return YES;

    }

    ```


    现在你需要实际创建故事板。在导航面板中找到并选择`SuperDB.storyboard`。编辑器面板应转换为故事板编辑器（[Figure 3-8](#9781430238072_Ch03.xhtml#Fig8)）。让我们快速回顾一下故事板编辑器。编辑器的内容是一个网格，类似于模型编辑器的图形样式。在故事板编辑器的左下角有一个展开按钮。按钮中的箭头应指向右侧。点击它。


    ![9781430238072_Fig03-08.jpg](images/9781430238072_Fig03-08.jpg)


    [Figure 3-8.](#9781430238072_Ch03.xhtml#_Fig8)  故事板编辑器


    故事板文档大纲（[Figure 3-9](#9781430238072_Ch03.xhtml#Fig9)）应出现在故事板编辑器的左侧。目前这个视图是空的，没有场景（稍后我们将定义*场景*）。通常，故事板文档大纲提供场景、其视图控制器、视图和
    UI 组件的层次结构视图。


    ![9781430238072_Fig03-09.jpg](images/9781430238072_Fig03-09.jpg)


    [Figure 3-9.](#9781430238072_Ch03.xhtml#_Fig9)  故事板文档大纲和展开按钮


    编辑器右下角有一对按钮组（[Figure 3-10](#9781430238072_Ch03.xhtml#Fig10)）。左侧的按钮组用于配置视图的自动布局；我们将在[Chapter
    4](#9781430238072_Ch04.xhtml)中描述它们。右侧的按钮组有三个按钮：`Zoom Out`、`Zoom-to-Fit`和`Zoom
    In`。它们改变故事板编辑器的缩放级别。


    ![9781430238072_Fig03-10.jpg](images/9781430238072_Fig03-10.jpg)


    [Figure 3-10.](#9781430238072_Ch03.xhtml#_Fig10)  故事板编辑器按钮组


    ## 添加场景


    重置 Xcode 工作区，使故事板编辑器看起来像[Figure 3-8](#9781430238072_Ch03.xhtml#Fig8)。打开实用工具面板，在对象库（应位于实用工具面板底部）中找到导航控制器。将导航控制器拖到故事板编辑器中。你的故事板编辑器应类似于[Figure
    3-11](#9781430238072_Ch03.xhtml#Fig11)。


    ![9781430238072_Fig03-11.jpg](images/9781430238072_Fig03-11.jpg)


    [Figure 3-11.](#9781430238072_Ch03.xhtml#_Fig11)  带导航控制器的故事板编辑器


    ## 场景和 Segues


    有趣的是，Xcode 决定除了导航控制器之外，你还想要一个表视图控制器，并已将其设置好。点击右下角的`Zoom-To-Fit`（=）按钮以在故事板编辑器中适配所有内容。你现在看到的是两个场景，分别标记为`Navigation
    Controller`和`Table View Controller - Root`。两个场景之间是一个`segue`。这是从`Navigation Controller`指向`Table
    View Controller - Root`的箭头。它中间有一个图标，告诉你这是一个手动`segue`。


    一个场景基本上就是一个视图控制器。最左边的场景标记为`Navigation Controller`，最右边的是`Table View Controller
    - Root`。导航控制器用于管理其他视图控制器。在[Chapter 2](#9781430238072_Ch02.xhtml)中，导航控制器管理了主视图控制器和详情视图控制器。导航控制器还提供了导航栏，允许你在主视图控制器中编辑和添加事件，并在详情视图控制器中提供返回按钮。'
  raw: 'Take a look at [Figure 3-1](#9781430238072_Ch03.xhtml#Fig1) to get a sense
    of what your app will look like when it runs. It looks a lot like the template
    app. The major differences lie in the entity at the heart of the application and
    in the addition of a tab bar at the bottom of the screen. Let’s get to work.


    ![9781430238072_Fig03-01.jpg](images/9781430238072_Fig03-01.jpg)


    [Figure 3-1.](#9781430238072_Ch03.xhtml#_Fig1)  The SuperDB application as it
    will look once you’ve finished this chapter


    Setting up the Xcode Project


    Time to get your hands dirty. Launch Xcode if it’s not open, and bring up your
    old friend, the new project assistant ([Figure 3-2](#9781430238072_Ch03.xhtml#Fig2)).


    ![9781430238072_Fig03-02.jpg](images/9781430238072_Fig03-02.jpg)


    [Figure 3-2.](#9781430238072_Ch03.xhtml#_Fig2)  Your dear old friend, Xcode’s
    new project assistant


    In the last chapter, you started with the Master-Detail Application template.
    When you’re creating your own navigation applications, it’s a good template to
    use as it gives you a lot of the code you’re likely to need in your application.
    However, to make it easier to explain where to add or modify code and also to
    reinforce your understanding of how applications are constructed, you’re going
    to build the SuperDB application from scratch, just as you did throughout most
    of *Beginning iOS 6 Development* by David Mark, Jack Nutting, and Jeff LaMarche
    (Apress).


    Select Empty Application, and click Next. When prompted for a product name ([Figure
    3-3](#9781430238072_Ch03.xhtml#Fig3)), type in **SuperDB**. Select iPhone for
    the device family, and make sure that the “Use Core Data” and “Use Automatic Reference
    Counting” checkboxes are checked. After clicking Next again, use the default location
    to save the project and click Create.


    ![9781430238072_Fig03-03.jpg](images/9781430238072_Fig03-03.jpg)


    [Figure 3-3.](#9781430238072_Ch03.xhtml#_Fig3)  Entering project details


    You need to make some changes to use storyboards. Storyboards were a new feature
    added to Xcode with iOS 5\. They make managing user interfaces and the transitions
    between those interface much easier. Xcode provides a visual editor, the storyboard
    editor, to aid in the layout and design of user interfaces. Where Interface Builder
    let you work with one view at a time, storyboards let you work the entire set
    of views and their behavior. By default, the Empty Application template did not
    give you a storyboard. This is easy enough to fix.


    First, create a new storyboard file. Select the SuperDB group in the Navigator
    pane, and create a new file (type ![image](images/flower1.jpg)N or use the menu
    File ![image](images/arrow.jpg) New ![image](images/arrow.jpg) File). When the
    New File Assistant appears ([Figure 3-4](#9781430238072_Ch03.xhtml#Fig4)), select
    User Interface from under the iOS heading in the left pane, then select Storyboard
    from the right pane, and click the Next button. Choose iPhone as the device on
    the next assistant screen, and click Next again. Name the file **SuperDB.storyboard**,
    and save it in the project folder ([Figure 3-6](#9781430238072_Ch03.xhtml#Fig6)).
    The new file, SuperDB.storyboard, should appear in the Navigator pane.


    ![9781430238072_Fig03-04.jpg](images/9781430238072_Fig03-04.jpg)


    [Figure 3-4.](#9781430238072_Ch03.xhtml#_Fig4)  Create a new storyboard with the
    New File Assistant


    ![9781430238072_Fig03-05.jpg](images/9781430238072_Fig03-05.jpg)


    Figure 3-5.   Select the iPhone device


    ![9781430238072_Fig03-06.jpg](images/9781430238072_Fig03-06.jpg)


    [Figure 3-6.](#9781430238072_Ch03.xhtml#_Fig6)  Name the storyboard and save it


    Finally, you need to tell Xcode that you want to use the new SuperDB.storyboard
    file. Select the SuperDB project at the top of the Navigator pane. When the project
    editor appears, select the SuperDB Target and go to the project summary editor
    ([Figure 3-7](#9781430238072_Ch03.xhtml#Fig7)). In the section titled iPhone/iPod
    Deployment Info, enter the name **SuperDB** into the Main Storyboard field.


    ![9781430238072_Fig03-07.jpg](images/9781430238072_Fig03-07.jpg)


    [Figure 3-7.](#9781430238072_Ch03.xhtml#_Fig7)  Project editor


    Since you have configured SuperDB to use a storyboard, you need to clean up the
    application delegate. Select AppDelegate.m in the Navigator pane. The code editor
    should appear. Find the method


    ```

    - (BOOL)application:(UIApplication *)application

             didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    ```


    and edit it to read


    ```

    -(BOOL)application:(UIApplication *)application

            didFinishLaunchingWithOptions:(NSDictionary *)launchOptions

    {

            return YES;

    }

    ```


    Now you need to actually create your storyboard. Find and select SuperDB.storyboard
    in the Navigation pane. The editor pane should transform into the storyboard editor
    ([Figure 3-8](#9781430238072_Ch03.xhtml#Fig8)). Let’s quickly review the storyboard
    editor. The content of the editor is a grid, similar to the model editor graph
    style. On the bottom left of the storyboard editor is a disclosure button. The
    arrow in the button should be pointing to the right. Click it.


    ![9781430238072_Fig03-08.jpg](images/9781430238072_Fig03-08.jpg)


    [Figure 3-8.](#9781430238072_Ch03.xhtml#_Fig8)  The storyboard editor


    The storyboard document outline ([Figure 3-9](#9781430238072_Ch03.xhtml#Fig9))
    should appear on the left of the storyboard editor. Right now this view is empty
    with no scenes (we’ll define *scenes* in a little bit). Normally, the storyboard
    document outline provides a hierarchical view of the scenes, their view controllers,
    views and UI components.


    ![9781430238072_Fig03-09.jpg](images/9781430238072_Fig03-09.jpg)


    [Figure 3-9.](#9781430238072_Ch03.xhtml#_Fig9)  The storyboard document outline
    and Disclosure button


    There is a pair of button groups on the bottom right of the editor ([Figure 3-10](#9781430238072_Ch03.xhtml#Fig10)).
    The button group on the left is for configuring auto layout of your views; we’ll
    describe them in [Chapter 4](#9781430238072_Ch04.xhtml). The button group on the
    right has three buttons: Zoom Out, Zoom-to-Fit, and Zoom In. They change the zoom
    level of the storyboard editor.


    ![9781430238072_Fig03-10.jpg](images/9781430238072_Fig03-10.jpg)


    [Figure 3-10.](#9781430238072_Ch03.xhtml#_Fig10)  Storyboard editor button groups


    Adding a Scene


    Reset the Xcode workspace so that the storyboard editor looks like [Figure 3-8](#9781430238072_Ch03.xhtml#Fig8).
    Open the Utility pane, and find the navigation controller in the Object library
    (which should be at the bottom of the Utility pane). Drag the navigation controller
    over to the storyboard editor. Your storyboard editor should look something like
    [Figure 3-11](#9781430238072_Ch03.xhtml#Fig11).


    ![9781430238072_Fig03-11.jpg](images/9781430238072_Fig03-11.jpg)


    [Figure 3-11.](#9781430238072_Ch03.xhtml#_Fig11)  Storyboard editor with a navigation
    controller


    Scenes and Segues


    Interestingly, Xcode decided that along with the navigation controller, you wanted
    a table view controller and set it up. Click the Zoom-To-Fit (=) button on the
    lower right to fit everything in the storyboard editor. What you see now are two
    scenes, labeled Navigation Controller and Table View Controller - Root. Between
    the two scenes is a segue. It’s the arrow pointing from the Navigation Controller
    to the Table View Controller - Root. It has an icon in the middle of it that tells
    you this is a manual segue.


    A scene is basically a view controller. The leftmost scene is labeled Navigation
    Controller, rightmost is the Table View Controller - Root. The navigation controller
    is used to manage the other view controllers. In [Chapter 2](#9781430238072_Ch02.xhtml),
    the navigation controller managed the master and detail view controllers. The
    navigation controller also provided the navigation bar that allowed you to edit
    and add events in the master view controller and provided the Back button in the
    detail view controller.'
