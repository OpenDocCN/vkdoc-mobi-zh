    \n图 3-31. 栏按钮项的属性检查器\n\n切换回助理编辑器。从栏按钮项按住 Control 键拖拽到 `HeroListController` 接口文件中最后一个\
    \ `@property` 的正下方。当连接弹出窗口出现时，添加一个名为 `addButton` 的连接。再次从栏按钮项按住 Control 键拖拽到 `@end`\
