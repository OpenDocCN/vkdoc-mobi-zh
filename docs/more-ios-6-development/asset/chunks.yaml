    \ properties of a media item, including the persistent ID, media type, or any\
    \ of the string properties (like title, artist, or genre).\n\nTo create a media\
    \ predicate on a filterable property, use the class `MPMediaPropertyPredicate`.\
    \ Create new instances using the factory method `predicateWithValue:forProperty:comparisonType:`.\
