    Trying It Out


    Unlike most of the applications we’ve written together, this tic-tac-toe game
    can’t be used in the Simulator. It will run there, but the Simulator does not
    support Bluetooth connections. This app currently relies on Bluetooth connections
    to work, since you’re using Game Kit and the peer picker. As a result, you need
    to have two physical devices, and neither of them can be a first-generation device,
    because the original iPhone and the first-generation iPod touch do not work with
    Game Kit’s peer picker. It also means that you need to have two devices provisioned
    for development. You should be able to connect to iOS devices to your computer
    at the same time. Xcode will display a drop-down menu in the Debug area to select
    which device to view.


    If you do experience problems running Xcode with two devices, you need to build
    and run on one device, quit, unplug that device, and then plug in the other device
    and do the same thing. Once you’ve done that, you will have the application on
    both devices. You can run it on both devices, or you can launch it from Xcode
    on one device, so you can debug and read the console feedback


