    to the assistant editor, and create a new outlet for the AVPlayerView. Name the
    outlet “playerView.” Switch back to the standard editor.


    Drag another UIView onto the PlayerViewController. Again, it should expand to
    fill the entire scene; adjust it if it doesn’t. Unlike the playerView, you can
    keep the view’s class as UIView. Open the Attributes Inspector and change the
