    at [http://developer.apple.com/ios](http://developer.apple.com/ios) in the developer
    portal, which is available only to paid iPhone SDK members.


    You should be aware that debugging—or even running from Xcode without debugging—will
    slow down the program running on the connected iOS device, and this can have an
    effect on network communications. Underneath the hood, all of the data transmissions
    back and forth between the two devices check for acknowledgments and have a timeout
    period. If they don’t receive a response in a certain amount of time, they will
    disconnect. So, if you set a breakpoint, chances are that you will break the connection
    between the two devices when it reaches the breakpoint. This can make figuring
    out problems in your Game Kit application tedious. You often will need to use
