- fmt: "# Debug Bar Controls\n\nThe Debug Bar controls provide a series of buttons\
    \ to help control your debugging session. From the left, the first button is a\
    \ disclosure button to minimize the Debug Area. When minimized, only the Debug\
    \ Bar is visible. Next is the Continue button. The Continue button resumes execution\
    \ of your program. It will pick up right where it left off and continue executing\
    \ as normal unless another breakpoint or an error condition is encountered. The\
    \ Step Over and Step Into buttons allow you to execute a single line of code at\
    \ a time. The difference between the two is that Step Over will fire any method\
    \ or function call as a single line of code, skipping to the next line of code\
    \ in the current method or function, while Step Into will go to the first line\
    \ of code in the method or function that’s called and stop there. The Step Out\
    \ button finishes execution of the current method and returns to the method that\
    \ called it. This effectively pops the current method off the stack trace’s stack\
    \ (you didn’t think that name was accidental did you?) and the method that called\
    \ this method becomes the top of the stack trace.\n\nThe final button on the Debug\
    \ Bar is the Location button. This allows you to simulate a location for an application\
    \ that uses Core Location.\n\nThat might be a little clearer if you try it out.\
    \ Stop your program. Note that even though your program might be paused at a breakpoint,\
    \ it is still executing. To stop it, click on the stop sign in the Xcode or select\
    \ `Stop` from the `Product` menu. You’re going to add some code that might make\
    \ the use of Step Over, Step Into, and Step Out a little clearer.\n\n## Nested\
    \ Calls\n\nNested method calls like this combine two commands in the same line\
    \ of code:\n\n```\n[[NSArray alloc] initWithObject:@\"Hello\"];\n```\n\nIf you\
    \ nest several methods together, you will skip over several actual commands with\
    \ a single click of the Step Over button, making it impossible to set a breakpoint\
    \ between the different nested statements. This is the primary reason to avoid\
    \ excessive nesting of message calls. Other than the standard nesting of `alloc`\
    \ and `init` methods, we generally prefer not to nest messages.\n\nDot notation\
    \ has changed this somewhat. Remember, dot notation is just shorthand for calling\
    \ a method, so this line of code is also two commands:\n\n```\n[self.tableView\
    \ reloadData];\n```\n\nBefore the call to `reloadData`, there is a call to the\
    \ accessor method `tableView`. If it makes sense to use an accessor, we will often\
    \ use dot notation right in the message call rather than using two separate lines\
    \ of code, but be careful. It’s easy to forget that dot notation results in a\
    \ method call, so you can inadvertently create code that is hard to debug by nesting\
    \ several method calls on one line of code.\n\n## Trying Out the Debug Controls\n\
    \nSelect `MasterViewController.m`. Add the following two methods, right after\
    \ the `@implementation` declaration:\n\n```\n@implementation MasterViewController\n\
    \n- (float)processBar:(float)inBar {\n    float newBar = inBar * 2.0;\n    return\
    \ newBar;\n}\n\n- (NSInteger)processFoo:(NSInteger)inFoo {\n    NSInteger newFoo\
    \ = inFoo * 2;\n    return newFoo;\n}\n\n- (id)initWithNibName:(NSString *)nibNameOrNil\
    \ bundle:(NSBundle *)nibBundleOrNil\n{\n...\n```\n\nAnd insert the following lines\
    \ of code into the existing `viewDidLoad` method:\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    NSInteger foo = 25;\n    float bar = 374.3494;\n\
    \    NSLog(@\"foo: %d, bar: %f\", foo, bar);\n\nfoo = [self processFoo:foo];\n\
    \    bar = [self processBar:bar];\n\nNSLog(@\"foo: %d, bar: %f\", foo, bar);\n\
    \nself.navigationItem.leftBarButtonItem = self.editButtonItem;\n\nUIBarButtonItem\
    \ *addButton =\n        [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
    \                                                      target:self\n         \
    \                                             action:@selector(insertNewObject:)];\n\
    \    self.navigationItem.rightBarButtonItem = addButton;\n}\n```\n\nYour breakpoint\
    \ should still be set at the first line of the method. Xcode does a pretty good\
    \ job of moving breakpoints around when you insert or delete text from above or\
    \ below it. Even though you just added two methods above your breakpoint and the\
    \ method now starts at a new line number, the breakpoint is still set to the correct\
    \ line of code, which is nice. If the breakpoint somehow got moved, no worries;\
    \ you’re going to move it anyway.\n\nClick and drag the breakpoint down until\
    \ it’s lined up with the line of code that reads\n\n```\nNSInteger foo = 25;\n\
    ```\n\nNow, choose Run from the Project menu to compile the changes and launch\
    \ the program again. You should see the breakpoint at the first new line of code\
    \ you added to `viewDidLoad`.\n\nThe first two lines of code are just declaring\
    \ variables and assigning values to them. These lines don’t call any methods or\
    \ functions, so the Step Over and Step Into buttons will function identically\
    \ here. To test that out, click the Step Over button to cause the next line of\
    \ code to execute, then click Step Into to cause the second new line of code to\
    \ execute.\n\nBefore using any more of the debugger controls, check out the variable\
    \ list ([Figure 15-15](#9781430238072_Ch15.xhtml#Fig15)). The two variables you\
    \ just declared are in the variable list under the Local heading with their current\
    \ values. Also, notice that the value for `bar` is blue. That means it was just\
    \ assigned or changed by the last command that executed.\n\n![9781430238072_Fig15-15.jpg](images/9781430238072_Fig15-15.jpg)\n\
    \n[Figure 15-15.](#9781430238072_Ch15.xhtml#_Fig15) When a variable was changed\
    \ by the last command that fired, it will turn blue in the variable list\n\n**Note**\
    \ As you are probably aware, numbers are represented in memory as sums of powers\
    \ of 2 or powers of ½ for fractional parts. This means that some numbers will\
    \ end up stored in memory with values slightly different than the value specified\
    \ in the source code. Though you set `bar` to a value of `374.3494`, the closest\
    \ representation was `374.349396`. Close enough, right?\n\nThere’s another way\
    \ you can see the value of a variable. If you move your cursor so it’s above the\
    \ word `foo` anywhere it exists in the editor pane, a little box will pop up similar\
    \ to a tooltip that will tell you the variable’s current value and type ([Figure\
    \ 15-16](#9781430238072_Ch15.xhtml#Fig16)).\n\n![9781430238072_Fig15-16.jpg](images/9781430238072_Fig15-16.jpg)\n\
    \n[Figure 15-16.](#9781430238072_Ch15.xhtml#_Fig16) Hovering your mouse over a\
    \ variable in the editing pane will tell you both the variable’s datatype and\
    \ its current value\n\nThe next line of code is just a log statement, so click\
    \ the Step Over button again to let it fire.\n\nThe next two lines of code each\
    \ call a method. You’re going to step into one and step over the other. Click\
    \ the Step Into button now.\n\nThe green arrow and highlighted line of code should\
    \ just have moved to the first line of the `processFoo` method. If you look at\
    \ the stack trace now, you’ll see that `viewDidLoad` is no longer the first row\
    \ in the stack. It has been superseded by `processFoo`. Instead of one black row\
    \ in the stack trace, there are now two, because you wrote both `processFoo` and\
    \ `viewDidLoad`. You can step through the lines of this method if you like. When\
    \ you’re ready to move back to `viewDidLoad`, click the Step Out button. That\
    \ will return you to `viewDidLoad`. `processFoo` will get popped off of the stack\
    \ trace’s stack, and the green indicator and highlight will be at the line of\
    \ code after the call to `processFoo`."
  raw: 'The Debug Bar controls provide a series of buttons to help control your debugging
    session. From the left, the first button is a disclosure button to minimize the
    Debug Area. When minimized, only the Debug Bar is visible. Next is the Continue
    button. The Continue button resumes execution of your program. It will pick up
    right where it left off and continue executing as normal unless another breakpoint
    or an error condition is encountered. The Step Over and Step Into buttons allow
    you to execute a single line of code at a time. The difference between the two
    is that Step Over will fire any method or function call as a single line of code,
    skipping to the next line of code in the current method or function, while Step
    Into will go to the first line of code in the method or function that’s called
    and stop there. The Step Out button finishes execution of the current method and
    returns to the method that called it. This effectively pops the current method
    off the stack trace’s stack (you didn’t think that name was accidental did you?)
    and the method that called this method becomes the top of the stack trace.


    The final button on the Debug Bar is the Location button. This allows you to simulate
    a location for an application that uses Core Location.


    That might be a little clearer if you try it out. Stop your program. Note that
    even though your program might be paused at a breakpoint, it is still executing.
    To stop it, click on the stop sign in the Xcode or select **Stop** from the **Product**
    menu. You’re going to add some code that might make the use of Step Over, Step
    Into, and Step Out a little clearer.


    NESTED CALLS


    Nested method calls like this combine two commands in the same line of code:


    [[NSArray alloc] initWithObject:@"Hello"];


    If you nest several methods together, you will skip over several actual commands
    with a single click of the Step Over button, making it impossible to set a breakpoint
    between the different nested statements.  This is the primary reason to avoid
    excessive nesting of message calls. Other than the standard nesting of alloc and
    init methods, we generally prefer not to nest messages.


    Dot notation has changed this somewhat. Remember, dot notation is just shorthand
    for calling a method, so this line of code is also two commands:


    [self.tableView reloadData];


    Before the call to reloadData, there is a call to the accessor method tableView.
    If it makes sense to use an accessor, we will often use dot notation right in
    the message call rather than using two separate lines of code, but be careful.
    It’s easy to forget that dot notation results in a method call, so you can inadvertently
    create code that is hard to debug by nesting several method calls on one line
    of code.


    Trying Out the Debug Controls


    Select MasterViewController.m. Add the following two methods, right after the
    @implementation declaration:


    ```

    @implementation MasterViewController


    - (float)processBar:(float)inBar {

        float newBar = inBar * 2.0;

        return newBar;

    }


    - (NSInteger)processFoo:(NSInteger)inFoo {

        NSInteger newFoo = inFoo * 2;

        return newFoo;

    }


    - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil

    {

    ...

    ```


    And insert the following (bold) lines of code into the existing viewDidLoad method:


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

            // Do any additional setup after loading the view, typically from a nib.

        NSInteger foo = 25;

        float bar = 374.3494;

        NSLog(@"foo: %d, bar: %f", foo, bar);


    foo = [self processFoo:foo];

        bar = [self processBar:bar];


    NSLog(@"foo: %d, bar: %f", foo, bar);


    self.navigationItem.leftBarButtonItem = self.editButtonItem;


    UIBarButtonItem *addButton =

            [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd

                                                          target:self                                                      

                                                          action:@selector(insertNewObject:)];

        self.navigationItem.rightBarButtonItem = addButton;

    }

    ```


    Your breakpoint should still be set at the first line of the method. Xcode does
    a pretty good job of moving breakpoints around when you insert or delete text
    from above or below it. Even though you just added two methods above your breakpoint
    and the method now starts at a new line number, the breakpoint is still set to
    the correct line of code, which is nice. If the breakpoint somehow got moved,
    no worries; you’re going to move it anyway.


    Click and drag the breakpoint down until it’s lined up with the line of code that
    reads


    ```

    NSInteger foo = 25;

    ```


    Now, choose Run from the Project menu to compile the changes and launch the program
    again. You should see the breakpoint at the first new line of code you added to
    viewDidLoad.


    The first two lines of code are just declaring variables and assigning values
    to them. These lines don’t call any methods or functions, so the Step Over and
    Step Into buttons will function identically here. To test that out, click the
    Step Over button to cause the next line of code to execute, then click Step Into
    to cause the second new line of code to execute.


    Before using any more of the debugger controls, check out the variable list ([Figure
    15-15](#9781430238072_Ch15.xhtml#Fig15)). The two variables you just declared
    are in the variable list under the Local heading with their current values. Also,
    notice that the value for bar is blue. That means it was just assigned or changed
    by the last command that executed.


    ![9781430238072_Fig15-15.jpg](images/9781430238072_Fig15-15.jpg)


    [Figure 15-15.](#9781430238072_Ch15.xhtml#_Fig15)  When a variable was changed
    by the last command that fired, it will turn blue in the variable list


    **Note**  As you are probably aware, numbers are represented in memory as sums
    of powers of 2 or powers of ½ for fractional parts. This means that some numbers
    will end up stored in memory with values slightly different than the value specified
    in the source code. Though you set bar to a value of 374.3494, the closest representation
    was 374.349396\. Close enough, right?


    There’s another way you can see the value of a variable. If you move your cursor
    so it’s above the word *foo* anywhere it exists in the editor pane, a little box
    will pop up similar to a tooltip that will tell you the variable’s current value
    and type ([Figure 15-16](#9781430238072_Ch15.xhtml#Fig16)).


    ![9781430238072_Fig15-16.jpg](images/9781430238072_Fig15-16.jpg)


    [Figure 15-16.](#9781430238072_Ch15.xhtml#_Fig16)  Hovering your mouse over a
    variable in the editing pane will tell you both the variable’s datatype and its
    current value


    The next line of code is just a log statement, so click the Step Over button again
    to let it fire.


    The next two lines of code each call a method. You’re going to step into one and
    step over the other. Click the Step Into button now.


    The green arrow and highlighted line of code should just have moved to the first
    line of the processFoo method. If you look at the stack trace now, you’ll see
    that viewDidLoad is no longer the first row in the stack. It has been superseded
    by processFoo. Instead of one black row in the stack trace, there are now two,
    because you wrote both processFoo and viewDidLoad. You can step through the lines
    of this method if you like. When you’re ready to move back to viewDidLoad, click
    the Step Out button. That will return you to viewDidLoad. processFoo will get
    popped off of the stack trace’s stack, and the green indicator and highlight will
    be at the line of code after the call to processFoo.'
  trans: "\n# 调试栏控制\n\n调试栏提供一系列按钮来帮助控制调试会话。从左起，第一个按钮是用于最小化调试区域的展开按钮。当最小化时，只有调试栏可见。接下来是继续按钮。继续按钮会恢复程序的执行。程序将从上次暂停的位置继续执行，除非遇到另一个断点或错误条件。单步跳过和单步进入按钮允许你一次只执行一行代码。两者的区别在于：单步跳过会将任何方法或函数调用视为一行代码来执行，直接跳转到当前方法或函数中的下一行代码；而单步进入则会进入被调用的方法或函数，并在其第一行代码处停止。单步跳出按钮会结束当前方法的执行，并返回到调用它的方法。这实际上是将当前方法从堆栈跟踪的栈中弹出（你不会以为这个名字是偶然的吧？），而调用此方法的方法则成为堆栈跟踪的顶部。\n\
    \n调试栏上的最后一个按钮是位置按钮。这允许你为使用`Core Location`的应用程序模拟一个位置。\n\n如果你实际操作一下，可能会更清楚一些。停止你的程序。请注意，即使你的程序可能在断点处暂停，它仍在执行中。要停止它，请点击\
    \ Xcode 中的停止标志，或从 `Product` 菜单中选择 `Stop`。你将添加一些代码，这可能会让单步跳过、单步进入和单步跳出的用法更清晰。\n\
    \n## 嵌套调用\n\n像这样的嵌套方法调用将两个命令合并到同一行代码中：\n\n```\n[[NSArray alloc] initWithObject:@\"\
    Hello\"];\n```\n\n如果你将多个方法嵌套在一起，只需单击一次单步跳过按钮，就会跳过多个实际命令，从而无法在不同的嵌套语句之间设置断点。这是避免过度嵌套消息调用的主要原因。除标准的\
    \ `alloc` 和 `init` 方法嵌套外，我们通常不推崇嵌套消息。\n\n点表示法在一定程度上改变了这种情况。记住，点表示法只是调用方法的简写，因此这行代码也是两个命令：\n\
    \n```\n[self.tableView reloadData];\n```\n\n在调用 `reloadData` 之前，还有一个对访问器方法 `tableView`\
    \ 的调用。如果使用访问器是合理的，我们通常会直接在消息调用中使用点表示法，而不是使用两行独立的代码，但要小心。很容易忘记点表示法会导致一个方法调用，因此你可能无意中通过在一行代码中嵌套多个方法调用来创建难以调试的代码。\n\
    \n## 试用调试控件\n\n选择 `MasterViewController.m`。在 `@implementation` 声明之后，添加以下两个方法：\n\
    \n```\n@implementation MasterViewController\n\n- (float)processBar:(float)inBar\
    \ {\n    float newBar = inBar * 2.0;\n    return newBar;\n}\n\n- (NSInteger)processFoo:(NSInteger)inFoo\
    \ {\n    NSInteger newFoo = inFoo * 2;\n    return newFoo;\n}\n\n- (id)initWithNibName:(NSString\
    \ *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n{\n...\n```\n\n并将以下代码行插入到现有的\
    \ `viewDidLoad` 方法中：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    NSInteger foo = 25;\n    float bar = 374.3494;\n    NSLog(@\"foo: %d, bar:\
    \ %f\", foo, bar);\n\nfoo = [self processFoo:foo];\n    bar = [self processBar:bar];\n\
    \nNSLog(@\"foo: %d, bar: %f\", foo, bar);\n\nself.navigationItem.leftBarButtonItem\
    \ = self.editButtonItem;\n\nUIBarButtonItem *addButton =\n        [[UIBarButtonItem\
    \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n              \
    \                                        target:self\n                       \
    \                               action:@selector(insertNewObject:)];\n    self.navigationItem.rightBarButtonItem\
    \ = addButton;\n}\n```\n\n你的断点应该仍然设置在方法的第一行。当你在断点上方或下方插入或删除文本时，Xcode 在移动断点方面做得相当不错。尽管你刚刚在断点上方添加了两个方法，并且该方法现在起始于一个新的行号，但断点仍然被设置到了正确的代码行上，这很棒。如果断点不知何故被移走了，也别担心；反正你也要移动它。\n\
    \n点击并向下拖动断点，直到它与下面这行代码对齐：\n\n```\nNSInteger foo = 25;\n```\n\n现在，从 Project 菜单中选择\
    \ Run 来编译更改并重新启动程序。你应该会看到断点位于你添加到 `viewDidLoad` 的第一行新代码处。\n\n前两行代码只是声明变量并为它们赋值。这些行没有调用任何方法或函数，因此单步跳过和单步进入按钮在这里的功能将完全相同。为了测试这一点，单击单步跳过按钮执行下一行代码，然后单击单步进入按钮执行第二行新代码。\n\
    \n在使用更多调试器控件之前，查看一下变量列表（图 15-15）。你刚才声明的两个变量出现在变量列表的“本地”标题下，并带有它们的当前值。另外，注意 `bar`\
    \ 的值是蓝色的。这意味着它刚刚被执行的最后一条命令赋值或更改了。\n\n![9781430238072_Fig15-15.jpg](img/9781430238072_Fig15-15.jpg)\n\
    \n图 15-15. 当变量被最后触发的命令更改时，它在变量列表中会变成蓝色\n\n**注** 你可能已经知道，数字在内存中表示为 2 的幂之和或分数部分的\
    \ 1/2 的幂之和。这意味着某些数字最终存储在内存中的值会与源代码中指定的值略有不同。尽管你将 `bar` 设置为值 `374.3494`，但最接近的表示是\
    \ `374.349396`。相当接近，对吧？\n\n还有另一种查看变量值的方法。如果你移动光标，使其位于编辑窗格中任何出现 `foo` 一词的上方，会弹出一个类似工具提示的小框，告诉你变量的当前值和类型（图\
    \ 15-16）。\n\n![9781430238072_Fig15-16.jpg](img/9781430238072_Fig15-16.jpg)\n\n\
    图 15-16. 将鼠标悬停在编辑窗格中的变量上，会同时显示该变量的数据类型和当前值\n\n下一行代码只是一个日志语句，所以再次单击单步跳过按钮让它执行。\n\
    \n接下来的两行代码各自调用了一个方法。你将单步进入其中一个，并单步跳过另一个。现在单击单步进入按钮。\n\n绿色箭头和高亮的代码行应该已经移动到了 `processFoo`\
    \ 方法的第一行。如果你现在查看堆栈跟踪，会看到 `viewDidLoad` 不再是堆栈中的第一行。它已被 `processFoo` 取代。堆栈跟踪中不再只有一行黑色行，现在有两行，因为你编写了\
    \ `processFoo` 和 `viewDidLoad`。如果你愿意，可以单步执行此方法的各行代码。当你准备好返回到 `viewDidLoad` 时，单击单步跳出按钮。这将使你返回到\
    \ `viewDidLoad`。`processFoo` 将从堆栈跟踪的栈中被弹出，绿色指示器和高亮将位于调用 `processFoo` 之后的代码行上。\n"
- fmt: "接下来，对于`processBar`，你将使用“单步跳过”。这样做时，你将永远不会在堆栈跟踪中看到`processBar`。调试器将运行整个方法，并在其返回后停止执行。绿色的箭头和高亮显示将向前移动一行（不包括空行和注释）。你可以通过查看`bar`的值来看到`processBar`的结果，此时该值应该是原来的两倍，但该方法本身执行起来就像是一行代码一样。\n\
    \n## 断点导航器和符号断点\n\n现在你已经了解了断点操作的基础知识，但断点远不止于此。在 Xcode 导航区中，选择导航栏上的“断点”标签页（[图 15-17](#9781430238072_Ch15.xhtml#Fig17)）。此窗格显示了你项目中当前设置的所有断点。你可以在此处删除断点：选中它们，然后按\
    \ Delete 键。你也可以在此处添加另一种类型的断点，称为*符号断点*。你不必像在特定源代码文件中的特定行设置断点那样，而是可以告诉调试器，每当它到达使用调试配置构建到应用程序中的某个特定调试符号时，就暂停执行。重申一下，调试符号是从方法和函数名称派生出来的、人类可读的名称。\n\
    \n![9781430238072_Fig15-17.jpg](images/9781430238072_Fig15-17.jpg)\n\n[图 15-17.](#9781430238072_Ch15.xhtml#_Fig17) 断点导航器允许你查看项目中的所有断点\n\
    \n单击现有的断点（选择右侧窗格中的第一行），然后按键盘上的 Delete 键将其删除。现在，单击“断点导航器”左下角的 **+** 按钮，然后选择“添加符号断点”（[图\
    \ 15-18](#9781430238072_Ch15.xhtml#Fig18)）。在弹出的对话框中，在“符号”字段中输入`viewDidLoad`。在“模块”字段中输入`DebugMe`，然后单击“完成”按钮。“断点导航器”将会更新，显示一行`viewDidLoad`，其前面有一个风格化的西格玛图标（[图\
    \ 15-19](#9781430238072_Ch15.xhtml#Fig19)）。该西格玛图标用于提醒你，这是一个符号断点。\n\n![9781430238072_Fig15-18.jpg](images/9781430238072_Fig15-18.jpg)\n\
    \n[图 15-18.](#9781430238072_Ch15.xhtml#_Fig18) 添加符号断点\n\n![9781430238072_Fig15-19.jpg](images/9781430238072_Fig15-19.jpg)\n\
    \n[图 15-19.](#9781430238072_Ch15.xhtml#_Fig19) 断点列表已更新，包含你的符号断点\n\n通过单击工具栏上的“运行”按钮重新启动应用程序。如果\
    \ Xcode 提示应用程序已在运行，则先停止它。这一次，你的应用程序应该会再次停止在`viewDidLoad`的第一行代码处。\n\n## 条件断点\n\n\
    到目前为止，你设置的符号断点和行号断点都是*无条件断点*，这意味着它们总是在调试器到达时停止。如果程序到达了断点，它就会停止。但你也可以创建*条件断点*，它们仅在某些情况下暂停执行。\n\
    \n如果你的程序仍在运行，请停止它，然后在断点窗口中删除你刚才创建的符号断点。在`MasterViewController.m`中，在`viewDidLoad`里调用`super`的代码之后，添加以下（加粗的）代码行：\n\
    \n```\n[super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\nfor (int i=0; i < 25; i++) {\n    NSLog(@\"i =\
    \ %d\", i);\n}\n\nNSInteger foo = 25;\nfloat bar = 374.3494;\n...\n```\n\n保存文件。现在，通过单击左侧的行号，在以下代码行设置一个行号断点：\n\
    \n```\nfor (int i=0; i < 25; i++) {\n```\n\n按下 Control 键并单击该断点，然后从上下文菜单中选择“编辑断点”（[图\
    \ 15-20](#9781430238072_Ch15.xhtml#Fig20)）。此时应出现一个指向该断点的对话框（[图 15-21](#9781430238072_Ch15.xhtml#Fig21)）。在“条件”字段中输入`i\
    \ > 15`，然后单击“完成”。\n\n![9781430238072_Fig15-20.jpg](images/9781430238072_Fig15-20.jpg)\n\
    \n[图 15-20.](#9781430238072_Ch15.xhtml#_Fig20) 断点的上下文菜单\n\n![9781430238072_Fig15-21.jpg](images/9781430238072_Fig15-21.jpg)\n\
    \n[图 15-21.](#9781430238072_Ch15.xhtml#_Fig21) 编辑断点的条件\n\n再次构建并调试你的应用程序。这次它应该像以前一样停止在该断点处，但请查看你的调试控制台，你应该会看到以下内容：\n\
    \n```\n2012-09-25 14:19:53.927 DebugTest[53411:c07] i = 0\n2012-09-25 14:19:53.940\
    \ DebugTest[53411:c07] i = 1\n2012-09-25 14:19:53.952 DebugTest[53411:c07] i =\
    \ 2\n2012-09-25 14:19:53.959 DebugTest[53411:c07] i = 3\n2012-09-25 14:19:53.965\
    \ DebugTest[53411:c07] i = 4\n2012-09-25 14:19:53.971 DebugTest[53411:c07] i =\
    \ 5\n2012-09-25 14:19:53.978 DebugTest[53411:c07] i = 6\n2012-09-25 14:19:53.984\
    \ DebugTest[53411:c07] i = 7\n2012-09-25 14:19:54.008 DebugTest[53411:c07] i =\
    \ 8\n2012-09-25 14:19:54.014 DebugTest[53411:c07] i = 9\n2012-09-25 14:19:54.022\
    \ DebugTest[53411:c07] i = 10\n2012-09-25 14:19:54.072 DebugTest[53411:c07] i\
    \ = 11\n2012-09-25 14:19:54.079 DebugTest[53411:c07] i = 12\n2012-09-25 14:19:54.085\
    \ DebugTest[53411:c07] i = 13\n2012-09-25 14:19:54.093 DebugTest[53411:c07] i\
    \ = 14\n2012-09-25 14:19:54.099 DebugTest[53411:c07] i = 15\n2012-09-25 14:19:54.106\
    \ DebugTest[53411:c07] i = 16\n```\n\n如果你查看变量列表，你应该会看到`i`的值为 16。因此，循环的前 16 次并没有暂停执行；相反，因为设置的条件未满足，它一直执行了下去。\n\
    \n当错误发生在一个非常长的循环中时，这可能是一个极其有用的工具。如果没有条件断点，你就只能一步步地单步执行循环直到错误发生，这将非常繁琐。在那些被频繁调用但只在特定情况下才表现出问题的方法中，这也很有用。通过设置条件，你可以告诉调试器忽略那些你知道正常工作的情况。\n\
    \n**提示** “忽略次数”字段（就在“条件”字段下方）也很酷——它是一个每次命中断点时递减的值。因此，你可以将值 16 放入该列，使你的代码在第 16\
    \ 次命中断点时停止。你甚至可以组合使用这些方法，将“忽略次数”与一个条件一起使用。很酷吧？\n\n## 断点操作\n\n如果你再次查看“断点编辑器”（[图\
    \ 15-21](#9781430238072_Ch15.xhtml#Fig21)），你会看到一个“操作”标签。这允许你设置一个*断点操作*，这非常有用。\n\
    \n停止你的应用程序。\n\n编辑该断点，并删除你刚刚添加的条件。为此，只需清空“条件”字段即可。现在，你将添加断点操作。在“操作”标签旁边，单击显示为“点击添加操作”的文本。该区域将展开以显示断点操作界面（[图\
    \ 15-22](#9781430238072_Ch15.xhtml#Fig22)）。\n\n![9781430238072_Fig15-22.jpg](images/9781430238072_Fig15-22.jpg)\n\
    \n[图 15-22.](#9781430238072_Ch15.xhtml#_Fig22) 断点操作界面\n\n有许多不同的选项可供选择（[图 15-23](#9781430238072_Ch15.xhtml#Fig23)）。你可以运行调试器命令，或在控制台日志中添加一条语句。你还可以播放声音、触发\
    \ Shell 脚本或 AppleScript。如你所见，在调试应用程序时，你可以做很多事情，而无需用调试相关的特定功能污染你的代码。\n\n![9781430238072_Fig15-23.jpg](images/9781430238072_Fig15-23.jpg)\n\
    \n[图 15-23.](#9781430238072_Ch15.xhtml#_Fig23) 断点操作允许你触发调试器命令、向日志添加语句、播放声音或触发\
    \ Shell 脚本或 AppleScript"
  raw: 'Next, for processBar, you’re going to use Step Over. You’ll never see processBar
    on the stack trace when you do that. The debugger is going to run the entire method
    and then stop execution after it returns. The green arrow and highlight will move
    forward one line (excluding empty lines and comments). You’ll be able to see the
    results of processBar by looking at the value of bar, which should now be double
    what it was, but the method itself happened as if it was just a single line of
    code.


    The Breakpoint Navigator and Symbolic Breakpoints


    You’ve now seen the basics of working with breakpoints, but there’s far more to
    breakpoints. In the Xcode Navigator pane, select the Breakpoints tab on the Navigation
    bar ([Figure 15-17](#9781430238072_Ch15.xhtml#Fig17)). This pane shows you all
    the breakpoints that are currently set in your project. You can delete breakpoints
    here by selecting them and pressing the delete key. You can also add another kind
    of breakpoint here, which is called a *symbolic breakpoint*. Instead of breaking
    on a specific line in a specific source code file, you can tell the debugger to
    break whenever it reaches a certain one of those debug symbols built into the
    application when using the debug configuration. As a reminder, debug symbols are
    human-readable names derived from method and function names.


    ![9781430238072_Fig15-17.jpg](images/9781430238072_Fig15-17.jpg)


    [Figure 15-17.](#9781430238072_Ch15.xhtml#_Fig17)  The breakpoint navigator allows
    you to see all the breakpoints in your project


    Single-click the existing breakpoint (select the first line in the right-hand
    pane) and press the delete key on your keyboard to delete it. Now, click the **+**
    button on the lower left of the Breakpoint Navigator and select “Add Symbolic
    Breakpoint” ([Figure 15-18](#9781430238072_Ch15.xhtml#Fig18)). In the pop-up dialog,
    enter viewDidLoad for the Symbol. In the Module field, enter DebugMe and click
    the Done button. The Breakpoint Navigator will update with a line that reads viewDidLoad
    with a stylized sigma icon before it ([Figure 15-19](#9781430238072_Ch15.xhtml#Fig19)).
    The sigma icon is to remind you this is symbolic breakpoint.


    ![9781430238072_Fig15-18.jpg](images/9781430238072_Fig15-18.jpg)


    [Figure 15-18.](#9781430238072_Ch15.xhtml#_Fig18)  Adding a symbolic breakpoint


    ![9781430238072_Fig15-19.jpg](images/9781430238072_Fig15-19.jpg)


    [Figure 15-19.](#9781430238072_Ch15.xhtml#_Fig19)  Breakpoint list updated with
    your symbolic breakpoint


    Restart the application by clicking the Run button on the toolbar. If Xcode tells
    you the application is already running, then stop it. This time, your application
    should stop again, at the first line of code in viewDidLoad.


    Conditional Breakpoints


    Both the symbolic and line number breakpoints you’ve set so far have been *unconditional
    breakpoints*, meaning they always stop when the debugger gets to them. If the
    program reaches the breakpoint, it stops. But you can also create *conditional
    breakpoints*, which pause execution only in certain situations.


    If your program is still running, stop it, and in the breakpoint window, delete
    the symbolic breakpoint you just created. In MasterViewController.m, add the following
    (bold) lines of code, right after the call to super, in viewDidLoad:


    ```

    [super viewDidLoad];

        // Do any additional setup after loading the view, typically from a nib.

    for (int i=0; i < 25; i++) {

        NSLog(@"i = %d", i);

    }


    NSInteger foo = 25;

    float bar = 374.3494;

    ...

    ```


    Save the file. Now, set a line number breakpoint by clicking to the left of the
    line that reads


    ```

    for (int i=0; i < 25; i++) {

    ```


    Control-click the breakpoint, and select “Edit Breakpoint” from the context menu
    ([Figure 15-20](#9781430238072_Ch15.xhtml#Fig20)). A dialog should appear, pointing
    to the breakpoint ([Figure 15-21](#9781430238072_Ch15.xhtml#Fig21)). Enter i >
    15 in the Condition field and click Done.


    ![9781430238072_Fig15-20.jpg](images/9781430238072_Fig15-20.jpg)


    [Figure 15-20.](#9781430238072_Ch15.xhtml#_Fig20)  The context menu of a breakpoint


    ![9781430238072_Fig15-21.jpg](images/9781430238072_Fig15-21.jpg)


    [Figure 15-21.](#9781430238072_Ch15.xhtml#_Fig21)  Editing the condition of a
    breakpoint


    Build and debug your application again. This time it should stop at the breakpoint
    just like it has done in the past, but look in your debug console, and you should
    see this:


    ```

    2012-09-25 14:19:53.927 DebugTest[53411:c07] i = 0

    2012-09-25 14:19:53.940 DebugTest[53411:c07] i = 1

    2012-09-25 14:19:53.952 DebugTest[53411:c07] i = 2

    2012-09-25 14:19:53.959 DebugTest[53411:c07] i = 3

    2012-09-25 14:19:53.965 DebugTest[53411:c07] i = 4

    2012-09-25 14:19:53.971 DebugTest[53411:c07] i = 5

    2012-09-25 14:19:53.978 DebugTest[53411:c07] i = 6

    2012-09-25 14:19:53.984 DebugTest[53411:c07] i = 7

    2012-09-25 14:19:54.008 DebugTest[53411:c07] i = 8

    2012-09-25 14:19:54.014 DebugTest[53411:c07] i = 9

    2012-09-25 14:19:54.022 DebugTest[53411:c07] i = 10

    2012-09-25 14:19:54.072 DebugTest[53411:c07] i = 11

    2012-09-25 14:19:54.079 DebugTest[53411:c07] i = 12

    2012-09-25 14:19:54.085 DebugTest[53411:c07] i = 13

    2012-09-25 14:19:54.093 DebugTest[53411:c07] i = 14

    2012-09-25 14:19:54.099 DebugTest[53411:c07] i = 15

    2012-09-25 14:19:54.106 DebugTest[53411:c07] i = 16

    ```


    If you look in the Variable List, you should see *i* has a value of 16\. So, the
    first 16 times through the loop, it didn’t pause execution; instead, it just kept
    going because the condition you set wasn’t met.


    This can be an incredibly useful tool when you’ve got an error that occurs in
    a very long loop. Without conditional breakpoints, you’d be stuck stepping through
    the loop until the error happened, which is tedious. It’s also useful in methods
    that are called a lot but are only exhibiting problems in certain situations.
    By setting a condition, you can tell the debugger to ignore situations that you
    know work properly.


    **Tip**  The Ignore field, just below the Condition field, is pretty cool too—it’s
    a value decremented every time the breakpoint is hit. So you might place the value
    16 into the column to have your code stop on the 16^(th) time through the breakpoint.
    You can even combine these approaches, using Ignore with a condition. Cool beans,
    eh?


    Breakpoint Actions


    If you look at the Breakpoint Editor again ([Figure 15-21](#9781430238072_Ch15.xhtml#Fig21)),
    you’ll see an Action label. This allows you to set a *breakpoint action*, which
    is very useful.


    Stop your application.


    Edit the breakpoint, and delete the condition you just added. To do that, just
    clear the Condition field. Now you’ll add the breakpoint action. Next to the Action
    label, click over the text that reads “Click to add an Action.” The area should
    expand to reveal the breakpoint actions interface ([Figure 15-22](#9781430238072_Ch15.xhtml#Fig22)).


    ![9781430238072_Fig15-22.jpg](images/9781430238072_Fig15-22.jpg)


    [Figure 15-22.](#9781430238072_Ch15.xhtml#_Fig22)  The breakpoint actions interface
    revealed


    There are a number of different options to choose from ([Figure 15-23](#9781430238072_Ch15.xhtml#Fig23)).
    You can run a debugger command or add a statement to the console log. You can
    also play a sound, or fire off a shell script or AppleScript. As you can see,
    there’s a lot you can do while debugging your application without having to litter
    up your code with debug-specific functionality.


    ![9781430238072_Fig15-23.jpg](images/9781430238072_Fig15-23.jpg)


    [Figure 15-23.](#9781430238072_Ch15.xhtml#_Fig23)  Breakpoint actions allow you
    to fire debugger commands, add statements to the log, play a sound, or fire a
    shell script or AppleScript'
  trans: "\n接下来，对于`processBar`，你将使用“单步跳过”。这样做时，你将永远不会在堆栈跟踪中看到`processBar`。调试器将运行整个方法，并在其返回后停止执行。绿色的箭头和高亮显示将向前移动一行（不包括空行和注释）。你可以通过查看`bar`的值来看到`processBar`的结果，此时该值应该是原来的两倍，但该方法本身执行起来就像是一行代码一样。\n\
    \n## 断点导航器和符号断点\n\n现在你已经了解了断点操作的基础知识，但断点远不止于此。在 Xcode 导航区中，选择导航栏上的“断点”标签页（图 15-17）。此窗格显示了你项目中当前设置的所有断点。你可以在此处删除断点：选中它们，然后按\
    \ Delete 键。你也可以在此处添加另一种类型的断点，称为*符号断点*。你不必像在特定源代码文件中的特定行设置断点那样，而是可以告诉调试器，每当它到达使用调试配置构建到应用程序中的某个特定调试符号时，就暂停执行。重申一下，调试符号是从方法和函数名称派生出来的、人类可读的名称。\n\
    \n![9781430238072_Fig15-17.jpg](img/9781430238072_Fig15-17.jpg)\n\n图 15-17. 断点导航器允许你查看项目中的所有断点\n\
    \n单击现有的断点（选择右侧窗格中的第一行），然后按键盘上的 Delete 键将其删除。现在，单击“断点导航器”左下角的 **+** 按钮，然后选择“添加符号断点”（图\
    \ 15-18）。在弹出的对话框中，在“符号”字段中输入`viewDidLoad`。在“模块”字段中输入`DebugMe`，然后单击“完成”按钮。“断点导航器”将会更新，显示一行`viewDidLoad`，其前面有一个风格化的西格玛图标（图\
    \ 15-19）。该西格玛图标用于提醒你，这是一个符号断点。\n\n![9781430238072_Fig15-18.jpg](img/9781430238072_Fig15-18.jpg)\n\
    \n图 15-18. 添加符号断点\n\n![9781430238072_Fig15-19.jpg](img/9781430238072_Fig15-19.jpg)\n\
    \n图 15-19. 断点列表已更新，包含你的符号断点\n\n通过单击工具栏上的“运行”按钮重新启动应用程序。如果 Xcode 提示应用程序已在运行，则先停止它。这一次，你的应用程序应该会再次停止在`viewDidLoad`的第一行代码处。\n\
    \n## 条件断点\n\n到目前为止，你设置的符号断点和行号断点都是*无条件断点*，这意味着它们总是在调试器到达时停止。如果程序到达了断点，它就会停止。但你也可以创建*条件断点*，它们仅在某些情况下暂停执行。\n\
    \n如果你的程序仍在运行，请停止它，然后在断点窗口中删除你刚才创建的符号断点。在`MasterViewController.m`中，在`viewDidLoad`里调用`super`的代码之后，添加以下（加粗的）代码行：\n\
    \n```\n[super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\nfor (int i=0; i < 25; i++) {\n    NSLog(@\"i =\
    \ %d\", i);\n}\n\nNSInteger foo = 25;\nfloat bar = 374.3494;\n...\n```\n\n保存文件。现在，通过单击左侧的行号，在以下代码行设置一个行号断点：\n\
    \n```\nfor (int i=0; i < 25; i++) {\n```\n\n按下 Control 键并单击该断点，然后从上下文菜单中选择“编辑断点”（图\
    \ 15-20）。此时应出现一个指向该断点的对话框（图 15-21）。在“条件”字段中输入`i > 15`，然后单击“完成”。\n\n![9781430238072_Fig15-20.jpg](img/9781430238072_Fig15-20.jpg)\n\
    \n图 15-20. 断点的上下文菜单\n\n![9781430238072_Fig15-21.jpg](img/9781430238072_Fig15-21.jpg)\n\
    \n图 15-21. 编辑断点的条件\n\n再次构建并调试你的应用程序。这次它应该像以前一样停止在该断点处，但请查看你的调试控制台，你应该会看到以下内容：\n\
    \n```\n2012-09-25 14:19:53.927 DebugTest[53411:c07] i = 0\n2012-09-25 14:19:53.940\
    \ DebugTest[53411:c07] i = 1\n2012-09-25 14:19:53.952 DebugTest[53411:c07] i =\
    \ 2\n2012-09-25 14:19:53.959 DebugTest[53411:c07] i = 3\n2012-09-25 14:19:53.965\
    \ DebugTest[53411:c07] i = 4\n2012-09-25 14:19:53.971 DebugTest[53411:c07] i =\
    \ 5\n2012-09-25 14:19:53.978 DebugTest[53411:c07] i = 6\n2012-09-25 14:19:53.984\
    \ DebugTest[53411:c07] i = 7\n2012-09-25 14:19:54.008 DebugTest[53411:c07] i =\
    \ 8\n2012-09-25 14:19:54.014 DebugTest[53411:c07] i = 9\n2012-09-25 14:19:54.022\
    \ DebugTest[53411:c07] i = 10\n2012-09-25 14:19:54.072 DebugTest[53411:c07] i\
    \ = 11\n2012-09-25 14:19:54.079 DebugTest[53411:c07] i = 12\n2012-09-25 14:19:54.085\
    \ DebugTest[53411:c07] i = 13\n2012-09-25 14:19:54.093 DebugTest[53411:c07] i\
    \ = 14\n2012-09-25 14:19:54.099 DebugTest[53411:c07] i = 15\n2012-09-25 14:19:54.106\
    \ DebugTest[53411:c07] i = 16\n```\n\n如果你查看变量列表，你应该会看到`i`的值为 16。因此，循环的前 16 次并没有暂停执行；相反，因为设置的条件未满足，它一直执行了下去。\n\
    \n当错误发生在一个非常长的循环中时，这可能是一个极其有用的工具。如果没有条件断点，你就只能一步步地单步执行循环直到错误发生，这将非常繁琐。在那些被频繁调用但只在特定情况下才表现出问题的方法中，这也很有用。通过设置条件，你可以告诉调试器忽略那些你知道正常工作的情况。\n\
    \n**提示** “忽略次数”字段（就在“条件”字段下方）也很酷——它是一个每次命中断点时递减的值。因此，你可以将值 16 放入该列，使你的代码在第 16\
    \ 次命中断点时停止。你甚至可以组合使用这些方法，将“忽略次数”与一个条件一起使用。很酷吧？\n\n## 断点操作\n\n如果你再次查看“断点编辑器”（图\
    \ 15-21），你会看到一个“操作”标签。这允许你设置一个*断点操作*，这非常有用。\n\n停止你的应用程序。\n\n编辑该断点，并删除你刚刚添加的条件。为此，只需清空“条件”字段即可。现在，你将添加断点操作。在“操作”标签旁边，单击显示为“点击添加操作”的文本。该区域将展开以显示断点操作界面（图\
    \ 15-22）。\n\n![9781430238072_Fig15-22.jpg](img/9781430238072_Fig15-22.jpg)\n\n\
    图 15-22. 断点操作界面\n\n有许多不同的选项可供选择（图 15-23）。你可以运行调试器命令，或在控制台日志中添加一条语句。你还可以播放声音、触发\
    \ Shell 脚本或 AppleScript。如你所见，在调试应用程序时，你可以做很多事情，而无需用调试相关的特定功能污染你的代码。\n\n![9781430238072_Fig15-23.jpg](img/9781430238072_Fig15-23.jpg)\n\
    \n图 15-23. 断点操作允许你触发调试器命令、向日志添加语句、播放声音或触发 Shell 脚本或 AppleScript\n"
- fmt: "从 **Debugger Command** 弹出菜单中选择 **Log Message**，这允许你向调试器控制台添加信息，而无需编写另一条 `NSLog()`\
    \ 语句。当你为分发编译此应用程序时，此断点将不存在，因此不会意外地将此日志命令随应用程序一同发布。在弹出菜单下方的白色文本区域中，添加以下日志命令：\n\n\
    ```\nReached %B again. Hit this breakpoint %H times. Current value of i is @(int)i@\n\
    ```\n\n`%B` 是一个特殊的替换变量，在运行时会被替换为断点的名称。`%H` 是一个替换变量，会被替换为此断点已触发的次数。两个 `@` 字符之间的文本是一个调试器表达式，告诉它打印变量\
    \ `i` 的值，`i` 是一个整数。\n\n任何断点都可以关联一个或多个操作。点击右侧的 `+` 按钮可向此断点添加另一个操作。\n\n接下来，勾选 **“Automatically\
    \ continue after evaluating action”**（评估操作后自动继续）选项框，这样断点就不会导致程序执行停止。\n\n**提示**\
    \ 你可以在 *Xcode 4 用户指南* 中了解更多关于各种调试操作以及每种操作的正确语法，该指南位于 [http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/000-About_Xcode/about.html](http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/000-About_Xcode/about.html)。\n\
    \n再次构建并调试你的应用程序。这一次，你应该会在调试控制台日志中看到 `NSLog()` 语句打印的值之间，显示了额外的信息 ([Figure 15-24](#9781430238072_Ch15.xhtml#Fig24))。使用\
    \ `NSLog()` 记录的语句以粗体打印，而由断点操作执行的语句则以非粗体字符打印。\n\n![9781430238072_Fig15-24.jpg](images/9781430238072_Fig15-24.jpg)\n\
    \n[Figure 15-24.](#9781430238072_Ch15.xhtml#_Fig24)  断点日志操作会打印到调试器控制台，但与 `NSLog()`\
    \ 命令的结果不同，它们不以粗体打印。\n\n断点的功能远不止这些，但这些是基础知识，应该能为你查找和修复应用程序中的问题打下良好基础。\n\n## Static\
    \ Analysis\n\n在 Xcode 的 **Product** 菜单下，有一个标记为 **Analyze** 的菜单项。此选项会编译你的代码并对其执行*静态分析*，能够检测出许多常见问题。通常，当你构建项目时，会在构建结果窗口中看到代表构建警告的黄色图标和代表构建错误的红色图标。当你构建并分析时，还可能会看到带有蓝色图标的多行，这些表示静态分析器发现的潜在问题。尽管静态分析并不完美，有时会识别出实际上不是问题的问题（称为*误报*），但它非常擅长发现某些类型的错误，最显著的是导致内存泄漏的代码。让我们在你的代码中引入一个泄漏，然后对其进行分析。\n\
    \n如果你的应用程序正在运行，请停止它。\n\n在 `MasterViewController.m` 中，在 `viewDidLoad` 方法中，在对 `super`\
    \ 的调用之后添加以下代码：\n\n```\n    NSArray *myArray = [[NSArray alloc] initWithObjects:@\"\
    Hello\", @\"Goodbye\", \"So Long\", nil];\n```\n\n在分析之前，最好从 **Product** 菜单中选择\
    \ **Clean**。只有被编译的文件才会被分析。自上次编译以来未更改的代码将不会再次编译，也不会被分析。在这种情况下，这不是问题，因为你刚刚更改了引入错误的文件，但分析整个项目是一个好习惯。项目清理完成后，从\
    \ **Product** 菜单中选择 **Analyze**。\n\n现在，你将收到一个关于未使用变量的警告，这是正确的。你声明并初始化了 `myArray`，但从未使用过它。如果你查看\
    \ Issue Navigator（问题导航器）([Figure 15-25](#9781430238072_Ch15.xhtml#Fig25))，你还会在构建结果中看到来自静态分析器的两行额外的内容，其中一行告诉你\
    \ `myArray` 在初始化后从未被读取。这基本上与编译器发出的未使用变量警告是同一回事。然而，下一行是编译器不会捕获的。它说：*Argument to\
    \ ‘NSArray’ method ‘initWithObjects:’ should be an Objective-C pointer type, not\
    \ ‘char *’*（传递给 `NSArray` 方法 `initWithObjects:` 的参数应该是一个 Objective-C 指针类型，而不是\
    \ `char *`）。这是静态分析器在告诉你，你向数组传递了错误类型的指针。要了解更多信息，请点击消息左侧的三角形展开按钮，然后点击下面一条消息。信息量很大，对吧？\n\
    \n![9781430238072_Fig15-25.jpg](images/9781430238072_Fig15-25.jpg)\n\n[Figure\
    \ 15-25.](#9781430238072_Ch15.xhtml#_Fig25)  运行静态分析器后的 Issues Navigator（问题导航器）\n\
    \n在开始测试任何应用程序之前，你应该运行 **Build and Analyze**（构建并分析）并检查它指出的每一项。这可以为你省去很多烦恼和麻烦。\n\
    \n## One More Thing About Debugging\n\n你现在掌握了调试的基本工具。我们没有讨论 Xcode 或 LLDB 的全部功能，但我们已经涵盖了要点。要详尽地涵盖这个话题需要远不止一章的篇幅，但你现在已经看到了在\
    \ 95% 或更多调试工作中会用到的工具。不幸的是，提高调试技能的最佳方式是进行大量的调试实践，这在早期可能会很令人沮丧。当你第一次遇到特定类型的问题时，你往往不确定如何解决。因此，为了给你一点启动帮助，我们将向你展示\
    \ Cocoa Touch 程序中最常见的一些问题，并告诉你当这些问题发生时如何查找和修复。\n\n调试可能是这个地球上最困难、最令人沮丧的任务之一。但它也极其重要，并且追踪到一个困扰你代码已久的问题会带来极大的满足感。调试过程之所以如此困难，是因为现代应用程序很复杂，我们用来构建它们的库很复杂，现代操作系统本身也非常复杂。在任何给定时刻，都有大量的代码被加载、运行并交互。\n\
    \n## Profiling With Instruments\n\n我们不打算深入探讨 Instruments。这是另一本书（例如 *Pro iOS Tools*）的主题。让我们来看看如何启动\
    \ Instruments 以及它提供了什么。在 Xcode 中选择 **Product** ![image](images/arrow.jpg) **Profile**。Xcode\
    \ 将构建应用程序（如有必要）并启动 Instruments。\n\n**注意** 你也可以在 Apple 的文档中阅读更多关于 Instruments 的内容。它位于\
    \ [http://developer.apple.com/library/ios/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide](http://developer.apple.com/library/ios/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide)。\n\
    \nInstruments 通过创建跟踪文档来确定在应用程序执行期间监视什么。每个跟踪文档可以由许多*仪器*组成。每个仪器收集你应用程序运行状态的不同方面。\n\
    \n启动时，Instruments 会提供一系列跟踪文档模板，以帮助你开始 Instruments 会话。它还提供了一个空白模板，允许你定义自己的仪器集以供使用\
    \ ([Figure 15-26](#9781430238072_Ch15.xhtml#Fig26))。\n\n![9781430238072_Fig15-26.jpg](images/9781430238072_Fig15-26.jpg)\n\
    \n[Figure 15-26.](#9781430238072_Ch15.xhtml#_Fig26)  从 Xcode 启动 Instruments\n\n\
    让我们回顾一下 Instruments 提供了哪些模板："
  raw: 'From the **Debugger Command** pop-up menu, select **Log Message**, which will
    allow you to add information to the debugger console without writing another NSLog()
    statement. When you compile this application for distribution, this breakpoint
    won’t exist, so there’s no chance of accidentally shipping this log command in
    your application. In the white text area below the pop-up menu, add the following
    log command:


    ```

    Reached %B again. Hit this breakpoint %H times. Current value of i is @(int)i@

    ```


    The %B is a special substitution variable that will be replaced at runtime with
    the name of the breakpoint. The %H is a substitution variable that will be replaced
    with the number of times this breakpoint has been reached. The text between the
    two @ characters is a debugger expression that tells it to print the value of
    i, which is an integer.


    Any breakpoint can have one or more actions associated with it. Click the + button
    at the right side to add another action to this breakpoint.


    Next, check the Options box that reads “Automatically continue after evaluating
    action,” so that the breakpoint doesn’t cause the program’s execution to stop.


    **Tip**  You can read more about the various debug actions and the correct syntax
    to use for each one in the *Xcode 4 Users Guide* available at [http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/000-About_Xcode/about.html](http://developer.apple.com/library/mac/#documentation/ToolsLanguages/Conceptual/Xcode4UserGuide/000-About_Xcode/about.html).


    Build and debug your application again. This time, you should see additional information
    printed in the debug console log, between the values printed by your NSLog() statement
    ([Figure 15-24](#9781430238072_Ch15.xhtml#Fig24)). While statements logged using
    NSLog() are printed in bold, those done by breakpoint actions are printed in non-bold
    characters.


    ![9781430238072_Fig15-24.jpg](images/9781430238072_Fig15-24.jpg)


    [Figure 15-24.](#9781430238072_Ch15.xhtml#_Fig24)  Breakpoint log actions get
    printed to the debugger console but, unlike the results of NSLog() commands, are
    not printed in bold


    That’s not all there is to breakpoints, but it’s the fundamentals and should give
    you a good foundation for finding and fixing problems in your applications.


    Static Analysis


    Under the Product menu in Xcode, there is a menu item labeled **Analyze**. This
    option compiles your code and runs a *static analysis* on your code that is capable
    of detecting any number of common problems. Normally, when you build a project,
    you will see yellow icons in the build results window that represent build warnings
    and red icons that represent build errors. When you build and analyze, you may
    also see rows with blue icons that represent potential problems found by the static
    analyzer. Although static analysis is imperfect and can sometimes identify problems
    that aren’t actually problems (referred to as *false positives*), it’s very good
    at finding certain types of bugs, most notably code that leaks memory. Let’s introduce
    a leak into your code and then analyze it.


    If your application is running, stop it.


    In MasterViewController.m, in the viewDidLoad method, add the following code just
    after the call to super:


    ```

        NSArray *myArray = [[NSArray alloc] initWithObjects:@"Hello", @"Goodbye",
    "So Long", nil];

    ```


    Before you analyze, it’s a good idea to select **Clean** from the **Product**
    menu. Only files that get compiled will be analyzed. Code that hasn’t been changed
    since the last time it was compiled won’t get compiled again and won’t get analyzed.
    In this case, that wouldn’t be an issue, since you just changed the file where
    you introduced the bug, but it’s good practice to analyze your entire project.
    Once the project is done cleaning, select **Analyze** from the **Product** menu.


    You’ll now get a warning about an unused variable, which is true. You declared
    and initialized myArray, but never used it. If you look in the Issue Navigator
    ([Figure 15-25](#9781430238072_Ch15.xhtml#Fig25)), you’ll also see two additional
    rows in the build results from the static analyzer, one that tells you that myArray
    is never read after initialization. This is essentially telling you the same thing
    as the unused variable warning from the compiler. The next one, however, is one
    the compiler doesn’t catch. It says: *Argument to ‘NSArray’ method ‘initWithObjects:’
    should be an Objective-C pointer type, not ‘char *’*. That’s the static analyzer
    telling you that you passed the wrong kind of pointer to your array. To find out
    more, click the disclosure triangle to the left of the message, then click lower
    message. Pretty informative, eh?


    ![9781430238072_Fig15-25.jpg](images/9781430238072_Fig15-25.jpg)


    [Figure 15-25.](#9781430238072_Ch15.xhtml#_Fig25)  Issues Navigator after running
    the Static Analyzer


    Before you begin testing any application, you should run Build and Analyze and
    look at every item it points out. It can save you a lot of aggravation and trouble.


    One More Thing About Debugging


    You now know the basic tools of debugging. We haven’t discussed all the features
    of either Xcode or LLDB, but we’ve covered the essentials. It would take far more
    than a single chapter to cover this topic exhaustively, but you’ve now seen the
    tools that you’ll use in 95% or more of your debugging efforts. Unfortunately,
    the best way to get better at debugging is to do a lot of it, and that can be
    frustrating early on. The first time you see a particular type of problem, you
    often aren’t sure how to tackle it. So, to give you a bit of a kick-start, we’re
    going to show you a couple of the most common problems that occur in Cocoa Touch
    programs and show you how to find and fix those problems when they happen to you.


    Debugging can be one of the most difficult and frustrating tasks on this green
    Earth. It’s also extremely important, and tracking down a problem that’s been
    plaguing your code can be extremely gratifying. The reason the debugging process
    is so hard is that modern applications are complex, the libraries we use to build
    them are complex, and modern operating systems themselves are very complex. At
    any given time, there’s an awful lot of code loaded, running, and interacting.


    Profiling With Instruments


    We’re not going to dive deep into Instruments. That’s a topic for another book
    (like *Pro iOS Tools*). Let’s take a look at how to start Instruments and what
    it offers. Select Product ![image](images/arrow.jpg) Profile in Xcode. Xcode will
    build the application (if necessary) and launch Instruments.


    **Note**  You can read more about Instruments in Apple’s documentation as well.
    It’s located at [http://developer.apple.com/library/ios/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide](http://developer.apple.com/library/ios/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide).


    Instruments operates by creating a trace document to determine what it monitors
    during your application’s execution. Each trace document can be composed of many
    *instruments*. Each instrument collects different aspects of your application’s
    running state.


    On startup, Instruments offers a series of trace document templates to help begin
    your Instruments session. It also offers a blank template, allowing you to define
    your own set of instruments to use ([Figure 15-26](#9781430238072_Ch15.xhtml#Fig26)).


    ![9781430238072_Fig15-26.jpg](images/9781430238072_Fig15-26.jpg)


    [Figure 15-26.](#9781430238072_Ch15.xhtml#_Fig26)  Launching Instruments from
    Xcode


    Let’s review what templates Instruments offers:'
