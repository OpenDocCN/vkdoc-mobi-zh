    When you create the media picker controller instance, you need to specify a media
    type. This can be one of the three audio types mentioned earlier—MPMediaTypeMusic,
    MPMediaTypePodcast, or MPMediaTypeAudioBook. You can also pass MPMediaTypeAnyAudio,
    which will currently return any audio item.


    **Note**  Passing non-audio media types will not cause any errors in your code,
    but when the media picker appears, it will only display audio items.


    You can also use the bitwise OR (|) operator to let your user select any combination
    of media types. For example, if you want to let your user select from podcasts
    and audio books, but not music, you could create your picker like this:


    ```

    MPMediaPickerController *picker =     [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypePodcast
    | MPMediaTypeAudioBook ];

    ```


    By using the bitwise OR operator with these constants, you end up passing an integer
    that has the bits representing both of these media types set to 1 and all the
    other bits set to 0.


    Also notice that you need to tell the media picker controller to allow the user
    to select multiple items. The default behavior of the media picker is to let the
    user choose one, and only one, item. If that’s the behavior you want, then you
    don’t have to do anything, but if you want to let the user select multiple items,
    you must explicitly tell it so.


    The media picker also has a property called prompt, which is a string that will
    be displayed above the navigation bar in the picker (see the top of [Figure 12-1](#9781430238072_Ch12.xhtml#Fig1)).
    This is optional, but generally a good idea.


    The media picker controller’s delegate needs to conform to the protocol MPMediaPickerControllerDelegate.
    This defines two methods: one that is called if the user taps the Cancel button
    and another that is called if the user chooses one or more songs.


    Handling Media Picker Cancels


    If, after you present the media picker controller, the user hits the Cancel button,
    the delegate method mediaPickerDidCancel:will be called. You must implement this
    method on the media picker controller’s delegate, even if you don’t have any processing
    that needs to be done when the user cancels, since you must dismiss the modal
    view controller. Here is a minimal, but fairly standard, implementation of that
    method:


    ```

    - (void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker

    {

        [self dismissModalViewControllerAnimated: YES];

    }

    ```


    Handling Media Picker Selections


    If the user selected one or more media items using the media picker controller,
    then the delegate method mediaPicker:didPickMediaItems: will be called. This method
    must be implemented, not only because it’s the delegate’s responsibility to dismiss
    the media picker controller, but also because this method is the only way to know
    which tracks your user selected. The selected items are grouped in a media item
    collection.


    Here’s a very simple example implementation of mediaPicker:didPickMediaItems:
    that assigns the returned collection to one of the delegate’s properties:


    ```

    - (void)mediaPicker:(MPMediaPickerController *)mediaPicker         didPickMediaItems:(MPMediaItemCollection
    *)theCollection

    {

        [self dismissModalViewControllerAnimated: YES];

        self.collection = theCollection;

    }

    ```


    The Music Player Controller


    As we discussed before, there are two player controllers in the MediaPlayer framework:
    the music player controller and movie player controller. We’ll get to the movie
    player controller later. The music player controller allows you to play a queue
    of media items by specifying either a media item collection or a media query.
    As we stated earlier, the music player controller has no visual elements. It’s
    an object that plays the audio. It allows you to manipulate the playback of that
    audio by skipping forward or backward, telling it which specific media item to
    play, adjusting the volume, or skipping to a specific playback time in the current
    item.


    The MediaPlayer framework offers two completely different kinds of music player
    controllers: the iPod music player and the application music player. The way you
    use them is identical, but there’s a key difference in how they work. The iPod
    music player is the one that’s used by the Music app; as is the case with those
    apps, when you quit your app while music is playing, the music continues playing.
    In addition, when the user is listening to music and starts up an app that uses
    the iPod music player, the iPod music player will keep playing that music. In
    contrast, the application music player will kill the music when your app terminates.


    There’s a bit of a gotcha here in that both the iPod and the application music
    player controllers can be used at the same time. If you use the application music
    player controller to play audio, and the user is currently listening to music,
    both will play simultaneously. This may or may not be what you want to happen,
    so you will usually want to check the iPod music player to see if there is music
    currently playing, even if you actually plan to use the application music player
    controller for playback.


    Creating the Music Player Controller


    To get either of the music player controllers, use one of the factory methods
    on MPMusicPlayerController. To retrieve the iPod music player, use the method
    iPodMusicPlayer, like so:


    ```

    MPMusicPlayerController *thePlayer = [MPMusicPlayerController iPodMusicPlayer];

    ```


    Retrieving the application music player controller is done similarly, using the
    applicationMusicPlayer method instead, like this:


    ```

    MPMusicPlayerController *thePlayer = [MPMusicPlayerController applicationMusicPlayer];

    ```


    Determining If the Music Player Controller Is Playing


    Once you create an application music player, you’ll need to give it something
    to play. But if you grab the iPod music player controller, it could very well
    already be playing something. You can determine if it is by looking at the playbackState
    property of the player. If it’s currently playing, it will be set to MPMusicPlaybackStatePlaying.


    ```

    if (player.playbackState == MPMusicPlaybackStatePlaying) {

        // playing

    }

    ```


    Specifying the Music Player Controller’s Queue


    There are two ways to specify the music player controller’s queue of audio tracks:
    provide a media query or provide a media item collection. If you provide a media
    query, the music player controller’s queue will be set to the media items returned
    by the items property. If you provide a media item collection, it will use the
    collection you pass as its queue. In either case, you will replace the existing
    queue with the items in the query or collection you pass in. Setting the queue
    will also reset the current track to the first item in the queue.


    To set the music player’s queue using a query, use the method setQueueWithQuery:.
    For example, here’s how you would set the queue to all songs, sorted by artist:


    ```

    MPMusicPlayerController *player = [MPMusicPlayerController iPodMusicPlayer];

    MPMediaQuery *artistsQuery = [MPMediaQuery artistsQuery];

    [player setQueueWithQuery:artistsQuery];

    ```


    Setting the queue with a media item collection is accomplished with the method
    setQueueWithItemCollection:, like so:'
  trans: "```objc\nMPMediaPickerController *picker = [[MPMediaPickerController alloc]\
    \ initWithMediaTypes:MPMediaTypeMusic];\npicker.delegate = self;\n[picker setAllowsPickingMultipleItems:YES];\n\
    picker.prompt = NSLocalizedString(@\"选择要播放的项目\", @\"选择要播放的项目\");\n[self presentModalViewController:picker\
    \ animated:YES];\n```\n\n创建媒体选择器控制器实例时，需要指定媒体类型。这可以是前面提到的三种音频类型之一——`MPMediaTypeMusic`、`MPMediaTypePodcast`\
    \ 或 `MPMediaTypeAudioBook`。你也可以传递 `MPMediaTypeAnyAudio`，它目前会返回任何音频项目。\n\n**注意**\
    \ 传递非音频媒体类型不会在代码中引起任何错误，但当媒体选择器出现时，它只会显示音频项目。\n\n你还可以使用按位或（`|`）运算符，让用户选择任意媒体类型的组合。例如，如果你想让用户从播客和有声书中选择，但不包括音乐，你可以这样创建选择器：\n\
    \n```objc\nMPMediaPickerController *picker = [[MPMediaPickerController alloc]\
    \ initWithMediaTypes:MPMediaTypePodcast | MPMediaTypeAudioBook ];\n```\n\n通过将这些常量与按位或运算符结合使用，你最终传递的整数中，表示这两种媒体类型的位被设置为\
    \ 1，而所有其他位被设置为 0。\n\n另请注意，你需要告诉媒体选择器控制器允许用户选择多个项目。媒体选择器的默认行为是让用户仅选择一个项目。如果这是你期望的行为，那么你无需做任何操作；但如果你想让用户选择多个项目，必须明确告知它。\n\
    \n媒体选择器还有一个名为 `prompt` 的属性，它是一个字符串，会显示在选择器的导航栏上方（参见图 12-1 顶部）。这是可选项，但通常是个好主意。\n\
    \n媒体选择器控制器的委托需要遵循 `MPMediaPickerControllerDelegate` 协议。该协议定义了两个方法：一个在用户点击取消按钮时调用，另一个在用户选择一首或多首歌曲时调用。\n\
    \n### 处理媒体选择器的取消操作\n\n如果在展示媒体选择器控制器后，用户点击了取消按钮，委托方法 `mediaPickerDidCancel:` 将被调用。你必须在媒体选择器控制器的委托中实现此方法，即使你在用户取消时不需要执行任何处理，因为你必须关闭模态视图控制器。以下是该方法的一个最小化但相当标准的实现：\n\
    \n```objc\n- (void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n\
    {\n    [self dismissModalViewControllerAnimated: YES];\n}\n```\n\n### 处理媒体选择器的选择操作\n\
    \n如果用户使用媒体选择器控制器选择了一个或多个媒体项目，委托方法 `mediaPicker:didPickMediaItems:` 将被调用。此方法必须实现，不仅因为委托有责任关闭媒体选择器控制器，还因为这是了解用户选择了哪些曲目的唯一途径。所选项目被分组在一个媒体项目集合中。\n\
    \n以下是 `mediaPicker:didPickMediaItems:` 的一个非常简单的实现示例，它将返回的集合分配给委托的一个属性：\n\n```objc\n\
    - (void)mediaPicker:(MPMediaPickerController *)mediaPicker didPickMediaItems:(MPMediaItemCollection\
    \ *)theCollection\n{\n    [self dismissModalViewControllerAnimated: YES];\n  \
    \  self.collection = theCollection;\n}\n```\n\n## 音乐播放器控制器\n\n如前所述，`MediaPlayer`\
    \ 框架中有两个播放器控制器：音乐播放器控制器和电影播放器控制器。我们稍后会介绍电影播放器控制器。音乐播放器控制器允许你通过指定媒体项目集合或媒体查询来播放媒体项目队列。正如我们之前所说，音乐播放器控制器没有可视化元素。它是一个播放音频的对象。它允许你通过快进或快退、指定播放哪一特定媒体项目、调整音量或跳转到当前项目的特定播放时间来操作音频的播放。\n\
    \n`MediaPlayer` 框架提供了两种完全不同的音乐播放器控制器：iPod 音乐播放器与应用音乐播放器。它们的使用方式相同，但工作方式存在关键差异。iPod\
    \ 音乐播放器是音乐应用所使用的播放器；与这些应用一样，当你退出应用而音乐仍在播放时，音乐会继续播放。此外，当用户正在听音乐并启动一个使用 iPod 音乐播放器的应用时，iPod\
    \ 音乐播放器会继续播放该音乐。相比之下，应用音乐播放器会在你的应用终止时停止音乐。\n\n这里有一个需要注意的地方：iPod 音乐播放器和应用音乐播放器可以同时使用。如果你使用应用音乐播放器控制器播放音频，而用户当前正在听音乐，两者会同时播放。这可能不是你期望的结果，因此你通常需要检查\
    \ iPod 音乐播放器当前是否有音乐在播放，即使你实际上计划使用应用音乐播放器控制器进行播放。\n\n### 创建音乐播放器控制器\n\n要获取任一音乐播放器控制器，请使用\
    \ `MPMusicPlayerController` 上的工厂方法。要获取 iPod 音乐播放器，使用 `iPodMusicPlayer` 方法，如下所示：\n\
    \n```objc\nMPMusicPlayerController *thePlayer = [MPMusicPlayerController iPodMusicPlayer];\n\
    ```\n\n获取应用音乐播放器控制器的方法类似，使用 `applicationMusicPlayer` 方法：\n\n```objc\nMPMusicPlayerController\
    \ *thePlayer = [MPMusicPlayerController applicationMusicPlayer];\n```\n\n### 判断音乐播放器控制器是否正在播放\n\
