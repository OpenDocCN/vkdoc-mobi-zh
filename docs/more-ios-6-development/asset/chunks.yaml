    Save and run the application. Navigate down to the detail view, and enter editing
    mode. Click the Birthdate cell, next to the label. The accessory input view should
    appear and should be a date picker set to today’s date. When you change the date
    in the date picker, the date should change in the table view cell.


    There’s one more input to take care of. This version of your application uses
    the string attribute editor to solicit the sex (sorry, we couldn’t resist!) of
    the superhero. This means that there is no validation on the input other than
    that it’s a valid string. A user could type M, Male, MALE, or Yes, Please, and
    they would all be happily accepted by the application. That means, later on, if
    you want to let the user sort or search their heroes by gender, you could have
    problems because the data won’t be structured in a consistent manner. You’ll tackle
    that problem next.


    Implementing a Selection Picker


    As you saw earlier, you could have enforced a specific sex spelling by using a
    regular expression, putting up an alert if the user typed something besides Male
    or Female. This would have prevented values other than the ones you want from
    getting entered, but this approach is not all that user friendly. You don’t want
    to annoy your user. Why make them type anything at all? There are only two possible
    choices here. Why not present a selection list and let the user just tap the one
    they want? Hey, that sounds like a great idea! You’re glad you thought of it.
    Let’s implement it now, shall you?


    Again, create a new Objective-C class, and make it a subclass of SuperDBEditCell.
    Name the class **SuperDBPickerCell**, after that fact that you will be using a
    UIPickerView. Most of what you do will be similar to what you did for SuperDBDateCell,
    but there are some key differences.


    Edit the interface definition in SuperDBPickerCell.h to read


    ```

    @interface SuperDBPickerCell : SuperDBEditCell < UIPickerViewDataSource, UIPickerViewDelegate>


    @property (strong, nonatomic) NSArray *values;


    @end

    ```


    The property is named pickerValues, which will hold the possible selections. You
    also added the UIPickerViewDataSource and UIPickerViewDelegate protocols to SuperDBPickerCell.


    Now, let’s edit the implementation of SuperDBPickerCell in SuperDBPickerCell.m.


    ```

    @interface SuperDBPickerCell ()

    @property (strong, nonatomic) UIPickerView *pickerView;

    @end


    @implementation SuperDBPickerCell


    - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier

    {

        self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];

        if (self) {

            self.textField.clearButtonMode = UITextFieldViewModeNever;

            self.pickerView = [[UIPickerView alloc] initWithFrame:CGRectZero];

            self.pickerView.dataSource = self;

            self.pickerView.delegate = self;

            self.pickerView.showsSelectionIndicator = YES;

            self.textField.inputView = self.pickerView;

        }

        return self;

    }

    #pragma mark UIPickerViewDataSource Methods

    - (NSInteger)numberOfComponentsInPickerView:(UIPickerView *)pickerView

    {

        return 1;

    }

    - (NSInteger)pickerView:(UIPickerView *)pickerView numberOfRowsInComponent:(NSInteger)component

    {

        return [self.values count];

    }

    #pragma mark - UIPickerViewDelegate Methods

    - (NSString *)pickerView:(UIPickerView *)pickerView

                  titleForRow:(NSInteger)row

                 forComponent:(NSInteger)component

    {

        return [self.values objectAtIndex:row];

    }

    - (void)pickerView:(UIPickerView *)pickerView

           didSelectRow:(NSInteger)row        inComponent:(NSInteger)component

    {

        self.value = [self.values objectAtIndex:row];

    }

    #pragma mark - SuperDBEditCell Overrides

    - (void)setValue:(id)value

    {

        if (value != nil) {

            NSInteger index = [self.values indexOfObject:value];

            if (index != NSNotFound) {

                self.textField.text = value;

            }

        }

        else {

            self.textField.text = nil;

        }

    }

    @end

    ```'
