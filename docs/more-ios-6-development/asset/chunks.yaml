    \ 管理器“新建描述文件助手”\n\n本质上，这些信息与 ADC iOS 预置门户中的新建描述文件表单（图 8-10）完全相同。为描述文件输入一个唯一且具有描述性的名称。选择正确的\
    \ App ID、设备和证书。然后点击 Finish（完成）。如果成功，Xcode 将会创建并安装新的预置描述文件。\n\n仅仅为了让你的应用启用 iCloud，就做了这么多工作。好的一面是，你需要实现的代码量应该相当简单。\n\
