- fmt: 'Press the Assistant Mode toggle on the toolbar so you can set up your outlets
    and actions. Control-drag from the text field to just below the `@interface` declaration
    in `ViewController.h`. Create an outlet named `numberOfOperations`. Control-drag
    from the progress view and create an outlet named `progressBar`. For the last
    outlet, control-drag from the label below the progress view and name it `progressLabel`.
    While you’re here, double-click the label text and delete it.


    Finally, control-drag from the Go Button to just above the `@end` declaration.
    Create an action named `go`.


    Save your XIB. Put the editor back into Standard mode.


    ## Implementing the Stalled View Controller


    You need to implement the `go` method in `ViewController.m`.


    ```

    - (IBAction)go:(id)sender

    {

    ```


    The method starts by retrieving the number from the text field.


    ```

        NSInteger operationCount = [self.numberOfOperations.text integerValue];

    ```


    You loop so you can calculate all of the square roots.


    ```

        for (NSInteger i = 0; i < = operationCount; i++) {

    ```


    Let’s log which calculation you’re working on.


    ```

            NSLog(@"Calculating Square Root of %d", i);

    ```


    In shipping applications, you generally wouldn’t log like this, but logging serves
    two purposes in this chapter. First, you’ll be able to see, using Xcode’s debugger
    console, the application is working even when your application’s user interface
    isn’t responding. Second, logging takes a non-trivial amount of time. In real-world
    applications, that would generally be bad, but since your goal is just to do processing
    to show how concurrency works, this slow-down actually works to your advantage.
    If you choose to remove the `NSLog()` statements, you will need to increase the
    number of calculations by an order of magnitude because the iPhone is actually
    capable of doing tens of thousands of square root operations per second and it
    will hardly break a sweat doing ten thousand without the `NSLog()` statement in
    the loop to throttle the speed.


    **Caution** Logging using `NSLog()` takes considerably longer when running on
    the device launched from Xcode because the results of every `NSLog()` statement
    have to be transferred through the USB connection to Xcode. Although this chapter’s
    applications will work just fine on the device, you may wish to consider restricting
    yourself to the simulator for testing and debugging in this chapter, or else commenting
    out the `NSLog()` statements when running on the device.


    Then you calculate the square root of `i`.


    ```

            double squareRootOfI = sqrt((double)i);

    ```


    And update the progress bar and label to reflect the last calculation made, and
    that’s the end of your loop.


    ```

            self.progressBar.progress = ((float)i / (float)operationCount);

            self.progressLabel.text =             [NSString stringWithFormat:@"Square
    Root of %d is %.6f", i, squareRootOfI];

        }

    }

    ```


    The problem with this method isn’t so much what you’re doing as where you’re doing
    it. As we stated earlier, action methods fire on the main thread, which is also
    where user interface updates happen, and where system events, such as those that
    are generated by taps and touches, are processed. If any method firing on the
    main thread takes too much time, it will affect your application’s user experience.
    In less severe cases, your application will seem to hiccup or stall at times.
    In severe cases, like here, your application’s entire user interface will freeze
    up.


    Save `ViewController.m` and build and run the application. Press the Go button
    and watch what happens. Not much, huh? If you keep an eye on the debug console
    in Xcode, you’ll see that it is working away on those calculations ([Figure 14-2](#9781430238072_Ch14.xhtml#Fig2))
    thanks to the `NSLog()` statement in your code, but the user interface doesn’t
    update until all of the calculations are done, does it?


    Note that if you do click in the text field, the numeric keypad will not disappear
    when you tap the Go button. Since there’s nothing being hidden by the keypad,
    this isn’t a problem. In the final version of the application, you’ll add a table
    that will be hidden by the keypad. You’ll add some code to hide the keypad when
    you press Go.


    ![9781430238072_Fig14-02.jpg](images/9781430238072_Fig14-02.jpg)


    [Figure 14-2.](#9781430238072_Ch14.xhtml#_Fig2) The debug console in Xcode shows
    that the application is working, but the user interface is locked up


    **Tip** Running the Stalled app for 100,000 iterations can take a really long
    time. You may want to make the default smaller (say 10,000).


    If you have code that takes a long time to run, you’ve basically got two choices
    if you want to keep your interface responsive: you can break your code into smaller
    chunks that can be processed in pieces, or you can move the code to a separate
    thread of execution, which will allow your application’s run loop to return to
    updating the user interface and responding to taps and other system events. We’ll
    look at both options in this chapter.


    First, you’ll fix the application by using a *timer* to perform the requested
    calculations in batches, making sure not to take more than a fraction of a second
    each time so that the main thread can continue to process events and update the
    interface. After that, you’ll look at using an operation queue to move the calculations
    off of the application’s main thread, leaving the main thread free to process
    events.


    ## Timers


    In the Foundation framework shared by Cocoa and Cocoa Touch, there’s a class called
    `NSTimer` that you can use to call methods on a specific object at periodic intervals.
    Timers are created, and then scheduled with a run loop, much like some of the
    networking classes you’ve worked with. Once a timer is scheduled, it will fire
    after a specified interval. If the timer is set to repeat, it will continue to
    call its target method repeatedly each time the specified interval elapses.


    Timers are not guaranteed to fire exactly at the specified interval. Because of
    the way the run loop functions, there’s no way to guarantee the exact moment when
    a timer will fire. The timer will fire on the first pass through the run loop
    that happens after the specified amount of time has elapsed. That means a timer
    will never fire before the specified interval, but it may fire after. Usually,
    the actual interval is only milliseconds longer than the one specified, but you
    can’t rely on that being the case. If a long-running method runs on the main loop,
    like the one in Stalled, then the run loop won’t get to fire the scheduled timers
    until that long-running method has finished, potentially a long time after the
    requested interval.


    Timers fire on the thread whose run loop they are scheduled into. In most situations,
    unless you specifically intend to do otherwise, your timers will get created on
    the main thread and the methods that they fire will also execute on the main thread.
    This means that you have to follow the same rules as with action methods. If you
    try to do too much in a method that is called by a timer, you will stall your
    user interface.


    As a result, if you want to use timers as a mechanism for keeping your user interface
    responsive, you need to break your work down into smaller chunks, only doing a
    small amount of work each time it fires. We’ll show you a technique for doing
    that in a minute.


    ### Creating a Timer


    Creating an instance of `NSTimer` is quite straightforward. If you want to create
    it, but not schedule it with the run loop right away, use the factory method `timerWithTimeInterval:target:selector:userInfo:repeats:`,
    like so:


    ```

    NSTimer *timer = [NSTimer timerWithTimeInterval:1.0/10.0

                                             target:self

                                           selector:@selector(myTimerMethod:)

                                           userInfo:nil repeats:YES];

    ```'
