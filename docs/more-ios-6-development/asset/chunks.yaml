    *   NSOperationQueuePriorityVeryHigh


    Instances of NSOperation default to NSOperationQueuePriorityNormal. Here’s how
    you would change it to a higher priority:


    ```

    [firstOperation setQueuePriority:NSOperationQueuePriorityVeryHigh];

    ```


    Although higher priority operations will execute before lower priority ones, no
    operation executes if it’s not ready. So, for example, an operation with a very
    high priority that has unmet dependencies will not be run, so a lower priority
    operation could go in front of it. But, among operations that are ready to execute
    (which can be determined using the isReady property), the operation with the highest
    priority will be selected.


    You can determine the current priority of an operation by calling the queuePriority
    method on it, like so:


    ```

    NSOperationQueuePriority *priority = [firstOperation queuePriority];

    ```


    Other Operation State


    By subclassing NSOperation, your class will inherit several properties that can
    be used to determine aspects of its current state. To determine if an operation
    has been cancelled, you can check the isCancelled property. The code in an operation’s
    main method should periodically check the isCancelled property to see if the operation
    has been cancelled. If it has been cancelled, your main method should immediately
    stop processing and return, which will end the operation.


    If an operation’s main method is currently being executed, the isExecuting property
    will return YES. If it returns NO, then it means that the operation hasn’t been
    kicked off yet for some reason. This could be because the operation was just created,
    because it has a dependency that hasn’t finished running yet, or because the queue’s
    maximum number of threads have already been created and none are available yet
    for this operation to use.


    When an operation’s main method returns, that will trigger the method’s isFinished
    property to be set to YES, which will cause it to be removed from its queue.


    **Note**  NSOperation has another property called isConcurrent. As of iOS 4, it
    does nothing. The operation queue will always create a new thread for your operation.
    Dave Dribin (now at Apple) had a posting about it at [www.dribin.org/dave/blog/archives/2009/09/13/snowy_concurrent_operations/](http://www.dribin.org/dave/blog/archives/2009/09/13/snowy_concurrent_operations/).


    Cancelling an Operation


    You can cancel operations by calling the cancel method, like so:


    ```

    [firstOperation cancel];

    ```


    This will cause the operation’s isCancelled property to be set to YES. It is,
    however, the operation’s responsibility to check for this in its main method.
    Calling cancel will not cause the operation to be force cancelled. It just sets
    the property and it’s the main method’s responsibility to finish processing and
    return when it detects that the operation has been cancelled.


    The fact that cancellations are tracked at the operation level and not by the
    operation queue does cause some behavior that may seem wrong at first. If an operation
    in a queue that is not yet executing gets cancelled, the operation will stay in
    the queue. Calling cancel on a pending operation doesn’t remove the operation
    from the queue, and the operation queue doesn’t provide a mechanism for removing
    operations. Cancelled operations don’t get removed until they are done executing.
    The operation will have to wait until it starts executing to realize it’s been
    cancelled and return, triggering its removal from the queue.


    Operation Queues


    Now you know how to create operations, so let’s look at the object that manages
    operations, NSOperationQueue. Operation queues are created like any other object.
    You allocate and initialize the queue, like so:


    ```

    NSOperationQueue *queue = [[NSOperationQueue alloc] init];

    ```


    Adding Operations to the Queue


    At this point, the queue is ready to use. You can start adding operations to it
    immediately without doing anything else. Adding operations is accomplished by
    using the addOperation: method, like so:


    ```

    [queue addOperation:newOperation];

    ```


    Once the operation is added to the queue, it will execute as soon as there is
    a thread available for it and it is ready to execute. It can even start executing
    operations while you’re still adding other operations. Operation queues, by default,
    set the number of threads based on the hardware available. A queue running on
    a multi-processor or multi-core device will tend to create more threads than one
    running on a single-processor, single-core device.


    Setting the Maximum Concurrent Operation Count


    It is generally advisable to let the operation queue decide the number of threads
    to use. This will, in most cases, ensure that your application makes the best
    use of available resources now and in the future. However, there may be situations
    where you want to take control over the number of threads. For example, if you
    have operations that yield a lot of time by blocking for some reason, you might
    want to have more threads running than the operation queue thinks it should have.
    You can do that using the method setMaxConcurrentOperationCount:. To create a
    serial queue, which is one that only has a single thread, you would to this:


    ```

    [queue setMaxConcurrentOperationCount:1];

    ```


    To tell the queue to reset the maximum number of operations based on the hardware
    available, you can use the constant NSOperationQueueDefaultMaxConcurrentOperationCount,
    like so:


    ```

    [queue setMaxConcurrentOperationCount:NSOperationQueueDefaultMaxConcurrentOperationCount];

    ```


    Suspending the Queue


    An operation queue can be paused (or *suspended*). This causes it to stop executing
    new operations. Operations that have already started executing will continue,
    unless cancelled, but new ones will not be started as long as the queue is suspended.
    Suspending the queue is accomplished using the method setSuspended:, passing YES
    to pause the queue, and NO to resume the queue.


    Fixing Stalled with an Operation Queue


    Now that you’ve got a good grasp on operation queues and concurrency, let’s use
    that knowledge to fix the Stalled application one last time. Open up that copy
    of the Stalled application we had you make earlier. If you didn’t do that, you
    can just copy the 14 – Stalled application from the project archives and use it
    as your starting point for this section.


    This time, you’re going to fix the Stalled application by using an operation queue.
    Tapping the Go button will add another process to the queue, and you’ll add a
    table that shows the number of operations in the queue along with some information
    about their status. As you can see from [Figure 14-4](#9781430238072_Ch14.xhtml#Fig4),
    the individual rows have a red button. You’re using the red button to cancel operations
    in the operation queue. To create that button, you’ll need to grab the image remove.png
    from the project archive and add it to the Supporting Files group of this project.
    Do that now before proceeding.


    ![9781430238072_Fig14-04.jpg](images/9781430238072_Fig14-04.jpg)


    [Figure 14-4.](#9781430238072_Ch14.xhtml#_Fig4)  The final version of the Stalled
    application will use an operation queue to manage a variable number of square
    root operations


    Creating SquareRootApplication


    You’re going to start by creating your NSOperation subclass. Create a new Objective-C
    class file inside the Stalled group in the Navigator pane. Name the class SquareRootOperation
    and enter NSOperation as the subclass. Save the file, making sure it is part of
    the Stalled target.


    Select SquareRootOperation.h so you can edit it. You start off by defining two
    constants. Declare them right after the #import at the top of the file.


    ```

    #define kBatchSize       100

    #define kUpdateFrequency 0.5

    ```'
