    trust*. The last certificate in the chain is called the *anchor* or *root certificate*.


    Signatures and certificates rely on someone being a certificate authority that
    everyone trusts on some level. The chain of trust is only as strong as the security
    of the certificate authority.


    Identity


    Combining a certificate with a private key creates a digital identity. An identity
    is usually transferred using a password-protected format, PKCS #12, which typically
    has a .p12 extension.


    Security in iOS


    Since iOS 4, developers have the option to leverage the built-in encryption hardware
    on iOS devices to further protect their application data. This feature leverages
    the passcode lock setting in iOS. When the device is locked, the data is inaccessible,
    even to the application. The device must be unlocked before you application can
    access the data. Remember, you might code for this functionality into your application,
    but unless the device user activates the passcode lock setting, it won’t be used.
    Generally, it’s better to add this feature. If your users then use the passcode
    lock setting, they’ll have the extra level of protection.


    To protect your application’s file data, you need to specify the correct extended
    attribute to level of protection you want. You can set this attribute using either
    the NSData or NSFileManager class. For existing files, you use the setAttributes:ofItemAtPath:error:
    method on NSFileManager. The attributes parameter is an NSDictionary, where the
    key is NSFileProtectionKey. For new files, you use the NSData method writeToFile:options:error:
    method, using the correct options bitmask to specify the level of protection.
    The possible level of protections are shown in [Table 13-1](#9781430238072_Ch13.xhtml#Tab1).


    [Table 13-1](#9781430238072_Ch13.xhtml#_Tab1). Levels of Protection


    ![image](images/Table13-01.jpg)


    **Note**  NSData has three other writing options: NSDataWritingAtomic, NSDataWritingWithoutOverwriting,
    NSDataWritingFileProtectionMask. The first two have to do with how an NSData instance
    writes its files, while the last sets the permissions of the file itself. None
    of these options set the file protection with respect to password locking.


    If you set a level of protection, then you must prepare for the file to potentially
    be inaccessible. In order to do that, you application needs to check file accessibility.
    There are a few ways to do this:


    *   Implement the applicationProtectedDataWillBecomeUnavailable: and applicationProtectedDataDidBecomeAvailable:
    methods in your AppDelegate.

    *   Register for the UIApplicationProtectedDataWillBecomeUnavailable and UIApplicationProtectedDataDidBecomeAvailable
    notifications.

    *   Check the protectedDataAvailable property in UIApplication.


    Randomization Keychains


    The keychain is an encrypted container used to hold passwords, certificates, or
    other information. The keychain is encrypted and locked using the iOS passcode
    lock mechanism. When your iOS device is locked, no one can access the contents.
    Once you enter your passcode, iOS unlocks and decrypts the keychain for access.
    From the user’s perspective, the keychain provides transparent authentication.
    Suppose your application communicates with services on the Internet. Each of those
    services require your users to provide login information. Rather than requiring
    your users to enter that information every time they access those Internet services,
    you can store that information in the keychain. Since the keychain is secure,
    you can count on that information being safe.


    In iOS, each application has its own keychain. Each keychain contains a set of
    information called keychain items (or just items). A keychain Item consists of
    data and a set of attributes. Programmatically, a keychain item is a dictionary
    (specifically a CFDictionary). The item data may or may not be encrypted; this
    is determined by the type of data being store in the item (i.e., passwords or
    certificates).


    When defining your keychain item dictionary, you must specify the item class using
    the key constant kSecClass. The possible values for kSecClass are a defined set
    of constants ([Table 13-2](#9781430238072_Ch13.xhtml#Tab2)).


    [Table 13-2](#9781430238072_Ch13.xhtml#_Tab2). Possible Values for kSecClass'
