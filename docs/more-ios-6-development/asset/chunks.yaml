    The Keychain SDK is a Core Foundation C API, not Objective-C. That’s why everything
    is a Core Foundation data type. The API is a simple set of functions:


    *   `SecItemAdd`: Add an item to the keychain

    *   `SecItemDelete`: Remove an item from the keychain

    *   `SecItemUpdate`: Update an item in the keychain

    *   `SecItemCopyMatching`: Return an item matching the search criteria.


    That’s it.


    ## Certificates, Keys, and Trust Services


    In order to make managing and using certificates easier, Apple added a number
    of functions in iOS to ease the management of certificates, generating keys, and
    evaluating your chain of trust. Specifically, you use the Certificate, Key, and
    Trust SDK to determine identity by matching a certificate to a private key; create
    and request certificates; import certificates, keys, and identities into your
    keychain; create public-private key pairs; and manage trust policies.


    These services leverage the keychain to store certificates and keys. Like the
    Keychain SDK, the Certificate, Key and Trust SDK is a C API, not Objective-C.
    At the core, a set of security objects are defined:


    *   `SecCertificate` (`SecCertificateRef`): The certificate object

    *   `SecIdentity` (`SecIdentityRef`): The identity (certificate and private key)
    object

    *   `SecKey` (`SecKeyRef`): The (asymmetric) key object, both public and private

    *   `SecPolicy` (`SecPolicyRef`): The policy object

    *   `SecTrust` (`SecTrustRef`): The trust management object


    Correspondingly, the Security framework provides a series of functions to manage
    certificates; manage identities; generate and use keys; plus manage policies and
    trust. We won’t go over each function in detail, but we will cover some of them
    in this chapter’s application. To learn more, read Apple’s Certificate, Key, and
    Trust Services Programming Guide ([https://developer.apple.com/library/ios/#documentation/Security/Conceptual/CertKeyTrustProgGuide/01introduction/](https://developer.apple.com/library/ios/#documentation/Security/Conceptual/CertKeyTrustProgGuide/01introduction/)
    ) and Reference ([https://developer.apple.com/library/ios/#documentation/Security/Reference/certifkeytrustservices/](https://developer.apple.com/library/ios/#documentation/Security/Reference/certifkeytrustservices/)
    ).


    ## Keychain Viewer Application


    You’re going to create a simple application that will show you how to use your
    application’s keychain items. At the beginning, the keychain should be empty.
    You’ll add functionality to import a self-signed root certificate and a digital
    identity created from that root certificate. You’ll show the details of each certificate.
    Finally, you’ll add a simple encryption/decryption example from the digital identity’s
    public-private key pair.


    Before you start building your application, you need to create your root certificate
    and digital identity. We’ll be using the Certificate Assistant in the Keychain
    Access application on our Mac.


