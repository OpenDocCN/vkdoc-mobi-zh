    need to add a custom class to the template.

        [newManagedObject setValue:[NSDate date] forKey:@"timeStamp"];

        // Save the context.

        NSError *error = nil;

        if (![context save:&error]) {

             // Replace this implementation with code to handle the error appropriately.

             // abort() causes the application to generate a crash log and terminate.        
    // You should not use this function in a shipping application,          // although
    it may be useful during development.

            NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

            abort();

        }

    }

    ```


    Notice that the first thing the code does is to retrieve a managed object context
    from the fetched results controller. In this simple example where there’s only
    one context, you could also have retrieved the same context from the application
    delegate. There are a few reasons why the default code uses the context from the
    fetched results controller. First of all, you already have a method that returns
    the fetched results controller, so you can get to the context in just one line
    of code.


    ```

    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];

    ```


    More importantly, though, a fetched results controller always knows which context
    its managed objects are contained by, so even if you decide to create an application
    with multiple contexts, you’ll be sure that you’re using the correct context if
    you pull it from the fetched results controller.


    Just as you did when you created a fetch request, when inserting a new object,
    you need to create an entity description to tell Core Data which kind of entity
    you want to create an instance of. The fetched results controller also knows what
    entity the objects it manages are, so you can just ask it for that information.


    ```

    NSEntityDescription *entity = [[self.fetchedResultsController fetchRequest] entity];

    ```


    Then it’s simply a matter of using a class method on NSEntityDescription to create
    the new object and insert it into a context.


    ```

    NSManagedObject *newManagedObject =     [NSEntityDescription insertNewObjectForEntityForName:[entity
    name]                                   inManagedObjectContext:context];

    ```


    It does seem a little odd that you use a class method on NSEntityDescription,
    rather than an instance method on the context you want to insert the new object
    into, but that’s the way it’s done.


    Though this managed object has now been inserted into the context, it still exists
    in the persistent store. In order to insert it from the persistent store, you
    must save the context, which is what happens next in this method:


    ```

    // Save the context.

    NSError *error = nil;

    if (![context save:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate.    
    // You should not use this function in a shipping application,     // although
    it may be useful during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

    }

    ```


    As the comment says, you need to handle the error more appropriately than calling
    abort. We’ll cover this more in the ensuing chapters. Also, notice that you don’t
    call reloadData on your table view. The fetched results controller will realize
    that you’ve inserted a new object that meets its criteria and will call the delegate
    method, which will automatically reload the table.


    Deleteing Managed Objects


    Deleting managed objects is pretty easy when using a fetched results controller.
    Use the function menu to navigate to the method called tableView:commitEditingStyle:forRowAtIndexPath:.
    That method should look like this:


    ```

    - (void)tableView:(UITableView *)tableView         commitEditingStyle:(UITableViewCellEditingStyle)editingStyle        
    forRowAtIndexPath:(NSIndexPath *)indexPath

    {

        if (editingStyle == UITableViewCellEditingStyleDelete) {

            NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];

            [context deleteObject:[self.fetchedResultsController objectAtIndexPath:indexPath]];

            NSError *error = nil;

            if (![context save:&error]) {

                 // Replace this implementation with code to handle the error appropriately.

                 // abort() causes the application to generate a crash log and terminate.              //
    You should not use this function in a shipping application,              // although
    it may be useful during development.

                NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

                abort();

            }

        }

    }

    ```


    The method first makes sure that you’re in a delete transaction (remember that
    this same method is used for deletes and inserts).


    ```

    if (editingStyle == UITableViewCellEditingStyleDelete) {

    ```


    Next, you retrieve the context.


    ```

    NSManagedObjectContext *context = [self.fetchedResultsController managedObjectContext];

    ```


    Then the context is asked to delete that object.


    ```

    [context deleteObject:[self.fetchedResultsController objectAtIndexPath:indexPath]];

    ```


    Next, the managed object context’s save: method is called to cause that change
    to be committed to the persistent store.


    ```

    NSError *error = nil;

    if (![context save:&error]) {

        // Replace this implementation with code to handle the error appropriately.

        // abort() causes the application to generate a crash log and terminate. You
    should not use this

        // function in a shipping application, although it may be useful during development.

        NSLog(@"Unresolved error %@, %@", error, [error userInfo]);

        abort();

    }

    ```


    No need to admonish you again about the call to abort, as we discussed this previously.


    And that’s all there is to deleting managed objects.


    Putting Everything in Context


    At this point, you should have a pretty good handle on the basics of using Core
    Data. You’ve learned about the architecture of a Core Data application and the
    process of using entities and properties. You’ve seen how the persistent store,
    managed object model, and managed object context are created by your application
    delegate. You learned how to use the data model editor to build entities that
    can be used in your program to create managed objects. You also learned how to
    retrieve, insert, and delete data from the persistent store.


    Enough with the theory! Let’s move on and build us some Core Data applications,
    shall we?


    Chapter    3


    A Super Start: Adding, Displaying, and Deleting Data


    Well, if that last chapter didn’t scare you off, then you’re ready to dive in
    and move beyond the basic template you explored in [Chapter 2](#9781430238072_Ch02.xhtml).


    In this chapter, you’re going to create an application designed to track some
    superhero data. Your application will start with the Master-Detail Application
    template, though you’ll be making lots of changes right from the beginning. You’ll
    use the model editor to design your superhero entity. Then you’ll create a new
    controller class derived from UIViewController that will allow you to add, display,
    and delete superheroes. In [Chapter 4](#9781430238072_Ch04.xhtml), you’ll extend
    your application further and add code to allow the user to edit her superhero
    data.'
