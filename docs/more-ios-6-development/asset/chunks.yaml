    by Core Data. We’ll explore techniques for building generic, reusable views so
    you can leverage the same code to present different types of data.


    [*Chapter* 5](#9781430238072_Ch05.xhtml), Preparing for Change: *Migrations and
    Versioning*: Here, we’ll look at Apple tools that you can use to change your application’s
    data model, while still allowing your users to continue using their data from
    previous versions of your application.


    [*Chapter* 6](#9781430238072_Ch06.xhtml), Custom Managed Objects: To really unlock
    the power of Core Data, you can subclass the class used to represent specific
    instances of data. In this chapter, you’ll learn how to use custom managed objects
    and see some benefits of doing so.


    [*Chapter* 7](#9781430238072_Ch07.xhtml), Relationships, Fetched Properties, and
    Expressions: In this final chapter on Core Data, you’ll learn about some mechanisms
    that allow you to expand your applications in powerful ways. You’ll refactor the
    application you built in the previous chapters so that you don’t need to add new
    classes as you expand your data model.


    [*Chapter* 8](#9781430238072_Ch08.xhtml), iCloud Storage: The iCloud Storage APIs
    are among the coolest features of iOS. The iCloud APIs will let your apps store
    documents and key-value data in iCloud. iCloud will wirelessly push documents
    to a user’s device automatically and update the documents when changed on any
    device—automatically. You’ll enhance your Core Data application to store information
    on iCloud.


    [*Chapter* 9](#9781430238072_Ch09.xhtml), Peer-to-Peer Over Bluetooth Using GameKit:
    The GameKit framework makes it easy to create programs that communicate over Bluetooth,
    such as multiplayer games for the iPhone and iPod touch. You’ll explore GameKit
    by building a simple two-player game.


    [*Chapter* 10](#9781430238072_Ch10.xhtml), CoreLocation and MapKit: This chapter
    explores another great new piece of functionality added to the iOS SDK: an enhanced
    CoreLocation. This framework now includes support for both forward and reverse
    geocoding location data. You will be able to convert back and forth between a
    set of map coordinates and information about the street, city, country (and so
    on) at that coordinate. Plus, you’ll explore how all this interoperates with enhanced
    MapKit.


    [*Chapter* 11](#9781430238072_Ch11.xhtml), Messaging: Mail, Social, and iMessage:
    Your ability to get your message out has gone beyond e-mail. In this chapter,
    we’ll take you through the core options of Mail, the Social Framework, and iMessage
    and you’ll see how to leverage each appropriately.


    [*Chapter* 12](#9781430238072_Ch12.xhtml), Media Library Access and Playback:
    It’s now possible to programmatically get access to your users’ complete library
    of audio tracks stored on their iPhone or iPod touch. In this chapter, you’ll
    look at the various techniques used to find, retrieve, and play music and other
    audio tracks.


    [*Chapter* 13](#9781430238072_Ch13.xhtml), Locking it Down: iOS Security: In this
    chapter, you’ll be taking a look at the Security framework (Security.framework),
    which provides a standard set of security-related services for iOS applications.
    In addition to the basic interfaces of this framework, you will utilize some additions
    for managing credentials that are not specified by standards but that are required
    by many applications.


    [*Chapter* 14](#9781430238072_Ch14.xhtml), Keeping Your Interface Responsive:
    Long-running programming tasks can easily bog down the iOS user interface. In
    this chapter, you’ll take a look at implementing advanced Storyboarding techniques
    so that your application remains responsive.


    [*Chapter* 15](#9781430238072_Ch15.xhtml), Unit Testing, Debugging, and Instruments:
    No program is ever perfect. Bugs and defects are a natural part of the programming
    process. In this chapter, you’ll learn various techniques for preventing, finding,
    and fixing bugs in iOS SDK programs.


    [*Chapter* 16](#9781430238072_Ch16.xhtml), The Road Goes Ever On . . .: Sadly,
    every journey must come to an end. We’ll wrap up this book with fond farewells
    and some resources we hope you’ll find useful.


    As we said in *Beginning iOS 6 Development*, iOS is an incredible computing platform,
    an ever-expanding frontier for your development pleasure. In this book, we’re
    going to take you further down the iPhone development road, digging deeper into
    the SDK, touching on new and, in some cases, more advanced topics.


    Read the book and be sure to build the projects yourself—don’t just copy them
    from the archive and run them once or twice. You’ll learn most by doing. Make
    sure you understand what you did, and why, before moving on to the next project.
    Don’t be afraid to make changes to the code. Experiment, tweak the code, observe
    the results. Rinse and repeat.


    Got your iOS SDK installed? Turn the page, put on some iTunes, and let’s go. Your
    continuing journey awaits.


    Chapter    12


    Core Data: What, Why, and How


    Core Data is a framework and set of tools that allow you to save (or persist)
    your application’s data to an iOS device’s file system automatically. Core Data
    is an implementation of something called object-relational mapping (ORM). This
    is just a fancy way of saying that Core Data allows you to interact with your
    Objective-C objects without having to worry about how the data from those objects
    is stored and retrieved from persistent data stores such as relational database
    (such as SQLite) or into a flat file.


    Core Data can seem like magic when you first start using it. Core Data objects
    are, for the most part, handled just like plain old objects, and they seem to
    know how to retrieve and save themselves automagically. You won’t create SQL strings
    or make file management calls, ever. Core Data insulates you from some complex
    and difficult programming tasks, which is great for you. By using Core Data, you
    can develop applications with complex data models much, much faster than you could
    using straight SQLite, object archiving, or flat files.


    Technologies that hide complexity the way Core Data does can encourage “voodoo
    programming,” that most dangerous of programming practices where you include code
    in your application that you don’t necessarily understand. Sometimes that mystery
    code arrives in the form of a project template. Or, perhaps you download a utilities
    library that does a task for you that you just don’t have the time or expertise
    to do for yourself. That voodoo code does what you need it to do, and you don’t
    have the time or inclination to step through it and figure it out, so it just
    sits there, working its magic… until it breaks. As a general rule, if you find
    yourself with code in your own application that you don’t fully understand, it’s
    a sign you should go do a little research, or at least find a more experienced
    peer to help you get a handle on your mystery code.


    The point is that Core Data is one of those complex technologies that can easily
    turn into a source of mystery code that will make its way into many of your projects.
    Although you don’t need to know exactly how Core Data accomplishes everything
    it does, you should invest some time and effort into understanding the overall
    Core Data architecture.


    This chapter starts with a brief history of Core Data and then it dives into a
    Core Data application. By building a Core Data application with Xcode, you’ll
    find it much easier to understand the more complex Core Data projects you’ll find
    in the following chapters.


    A Brief History of Core Data'
  trans: '

    # 第 4 章：魔鬼藏在细节视图中


    在本章中，你将学习如何让用户编辑和修改由 Core Data 存储的数据。我们将探索构建通用、可复用视图的技术，这样你就可以利用相同的代码来呈现不同类型的数据。


    # 第 5 章：为变更做准备：迁移与版本控制


    在这里，我们将探讨苹果提供的工具，你可以使用这些工具来更改应用程序的数据模型，同时仍然允许用户继续使用他们从应用程序旧版本中带来的数据。


    # 第 6 章：自定义托管对象


    为了真正释放 Core Data 的强大功能，你可以对用于表示特定数据实例的类进行子类化。在本章中，你将学习如何使用自定义托管对象，并了解这样做的诸多好处。


    # 第 7 章：关系、获取属性与表达式


    在这最后一章关于 Core Data 的内容中，你将学习一些机制，这些机制允许你以强大的方式扩展你的应用程序。你将重构在前几章中构建的应用程序，这样在扩展数据模型时，就不需要添加新的类。


    # 第 8 章：iCloud 存储


    iCloud 存储 API 是 iOS 最酷的特性之一。iCloud API 将让你的应用程序能够在 iCloud 中存储文档和键值数据。iCloud 会自动将文档无线推送到用户的设备，并在任何设备上更改文档时自动更新。你将增强你的
    Core Data 应用程序，使其能够在 iCloud 上存储信息。


    # 第 9 章：使用 GameKit 进行蓝牙点对点通信


    GameKit 框架使得创建通过蓝牙通信的程序（例如 iPhone 和 iPod touch 上的多人游戏）变得容易。你将通过构建一个简单的双人游戏来探索
    GameKit。


    # 第 10 章：CoreLocation 与 MapKit


    本章探讨了 iOS SDK 中添加的另一个很棒的新功能：增强版的 CoreLocation。这个框架现在支持正向和反向的地理编码位置数据。你将能够在一组地图坐标与该坐标处的街道、城市、国家等信息之间来回转换。此外，你还会探索所有这些功能如何与增强版的
    MapKit 协同运作。


    # 第 11 章：消息传递：邮件、社交网络与 iMessage


    你传递信息的能力已经超越了电子邮件。在本章中，我们将带你了解邮件、社交网络框架和 iMessage 的核心选项，并了解如何恰当地利用每一种方式。


    # 第 12 章：媒体库访问与播放


    现在，可以通过编程方式访问用户 iPhone 或 iPod touch 上存储的完整音频曲目库。在本章中，你将查看用于查找、检索和播放音乐及其他音频曲目的各种技术。


    # 第 13 章：锁定安全：iOS 安全


    在本章中，你将了解安全框架（`Security.framework`），它为 iOS 应用程序提供了一组标准的安全相关服务。除了该框架的基本接口之外，你还会使用一些用于管理凭证的补充功能，这些功能虽未由标准指定，但却是许多应用程序所必需的。


    # 第 14 章：保持界面响应


    长时间运行的程序任务很容易拖慢 iOS 用户界面。在本章中，你将学习实现高级故事板技术，以便让你的应用程序保持响应。


    # 第 15 章：单元测试、调试与 Instruments


    没有程序是完美的。错误和缺陷是编程过程中自然的一部分。在本章中，你将学习在 iOS SDK 程序中预防、发现和修复错误的各种技术。


    # 第 16 章：道路漫漫，永无止境……


    遗憾的是，每段旅程都必有终点。我们将以诚挚的告别和一些希望你觉得有用的资源来结束本书。


    正如我们在《Beginning iOS 6 Development》中所说，iOS 是一个令人难以置信的计算平台，是一个不断扩展的、带给你开发乐趣的前沿阵地。在这本书中，我们将带你沿着
    iPhone 开发的道路走得更远，更深入地挖掘 SDK，触及新的、在某些情况下更高级的主题。


    阅读本书，并务必亲手构建项目——不要只是从存档中复制它们然后运行一两次。通过动手实践你才能学到最多。在进入下一个项目之前，确保你理解了自己做了什么以及为什么这样做。不要害怕修改代码。去实验、调整代码、观察结果。反复练习。


    已经安装好你的 iOS SDK 了吗？翻过这一页，放上一些 iTunes 音乐，我们开始吧。你持续不断的旅程正等着你呢。


    ## 第 12 章：Core Data：是什么，为什么及怎么用


    Core Data 是一个框架和一组工具，它允许你将应用程序的数据自动保存（或持久化）到 iOS 设备的文件系统中。Core Data 是对象关系映射（ORM）的一种实现。这只是说，Core
    Data 允许你与你的 Objective-C 对象进行交互，而无需担心这些对象的数据如何从持久化数据存储（例如关系数据库如 SQLite 或平面文件）中存储和检索。


    当你刚开始使用 Core Data 时，它可能会看起来像魔法一样。大多数情况下，Core Data 对象的处理方式就像普通的老式对象一样，它们似乎知道如何自动神奇地检索和保存自己。你将永远不需要创建
    SQL 字符串或进行文件管理调用。Core Data 使你免于处理一些复杂且困难的编程任务，这对你来说很棒。通过使用 Core Data，你可以比直接使用
    SQLite、对象归档或平面文件快得多地开发具有复杂数据模型的应用程序。


    像 Core Data 这样隐藏复杂性的技术可能会助长“伏都编程”，这是一种最危险的编程实践，你会将未必理解的代码包含到你的应用程序中。有时，这些神秘的代码以项目模板的形式出现。或者，也许你下载了一个实用程序库，它可以为你完成一项你没有时间或专业知识自己完成的任务。那段伏都代码做了你需要它做的事情，而你没有时间或意愿去逐步理解它，所以它就待在那里，施展着它的魔法……直到它出问题。一般来说，如果你在自己的应用程序中发现了不完全理解的代码，这是一个信号，表明你应该去做一些研究，或者至少找一个更有经验的同伴来帮你掌握这些神秘代码。


    关键在于，Core Data 是这样一种复杂技术，它很容易成为神秘代码的来源，并潜入你的许多项目中。虽然你不需要确切知道 Core Data 是如何完成它所做的一切的，但你应该投入一些时间和精力来理解
    Core Data 的整体架构。


    本章从 Core Data 的简短历史开始，然后深入到一个 Core Data 应用程序。通过使用 Xcode 构建一个 Core Data 应用程序，你会发现理解后续章节中更复杂的
    Core Data 项目要容易得多。


    ### Core Data 简史

