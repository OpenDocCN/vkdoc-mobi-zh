    \ `-addHero:` 方法来做任何事情。你很快会实现这个功能。\n\n![9781430238072_Fig03-33.jpg](img/9781430238072_Fig03-33.jpg)\n\
    \n图 3-33. 一切都在正确的位置\n\n然而，此时标签栏没有任何一个标签按钮被选中。当你启动应用时，两个按钮都处于未选中状态。你可以选中其中一个，然后在两者之间切换。但启动时不是应该有一个按钮被选中吗？接下来你将实现这个功能。\n\
    \n## 标签栏和用户默认设置\n\n你希望应用启动时其中一个标签栏按钮被选中。通过添加如下代码，你可以相当轻松地实现这一点\n\n```\n// 选择标签栏按钮\n\
    UITabBarItem *item = [self.heroTabBar.items objectAtIndex:0];\n[self.heroTabBar\
    \ setSelectedItem:item];\n```\n\n添加到 `HeroListController` 的 `viewDidLoad:` 方法中。尽管尝试一下。应用启动后，By\
    \ Name 标签被选中。现在，选择 By Secret Identity 标签，并在 Xcode 中停止应用。重新启动应用。By Name 标签又被选中了。如果应用能记住你上次的选择，岂不是很好？你可以使用用户默认设置来帮你实现记忆功能。\n\
    \n在 `HeroListController` 接口中，在 `@interface` 声明之前添加以下代码行：\n\n```\n#define kSelectedTabDefaultsKey\
    \ @\"Selected Tab\"\n\nenum {\n    kByName,\n    kBySecretIdentity,\n};\n```\n\
    \n`kSelectedTabDefaultsKey` 是你将用于从用户默认设置中存储和检索所选标签栏按钮索引的键。枚举只是为值 0 和 1 提供便利。\n\
    \n切换到 `HeroListController` 实现文件，并在 `viewDidLoad:` 方法的末尾添加以下代码：\n\n```\n// 选择标签栏按钮\n\
    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\nNSInteger selectedTab\
    \ = [defaults integerForKey:kSelectedTabDefaultsKey];\nUITabBarItem *item = [self.heroTabBar.items\
    \ objectAtIndex:selectedTab];\n[self.heroTabBar setSelectedItem:item];\n```\n\n\
    （如果你之前输入了标签栏选择的代码，请确保正确进行了更改。）\n\n构建并运行应用。切换标签栏。退出应用，并确保 By Secret Identity 按钮被选中。退出应用，然后重新启动。它应该会记住选择，对吧？还不行。你还没有编写当标签栏选择更改时写入用户默认设置的代码。你只是在启动时读取了它。让我们在更改时写入默认设置。\n\
    \n选择 `SuperDB.storyboard`，并从标签栏按住 Control 键拖拽到 Hero 视图控制器。当 Outlets 弹出窗口出现时，选择\
    \ delegate（这应该是你唯一的选择）。接下来，选择 `HeroListController.h`，并将 `@interface` 声明从\n"
- fmt: "```objectivec\n@interface HeroListController : UIViewController < UITableViewDataSource,\
    \ UITableViewDelegate>\n```\n\nto\n\n```objectivec\n@interface HeroListController\
    \ : UIViewController < UITableViewDataSource, UITableViewDelegate, UITabBarDelegate>\n\
    ```\n\nNow `UITabBarDelegate` has a required method `-tabBar:didSelectItem:`.\
    \ Select `HeroListController.m`, and navigate the Editor to just above the `-addHero:`\
    \ method. Add these lines:\n\n```objectivec\n#pragma mark - UITabBarDelegate Methods\n\
    \n- (void)tabBar:(UITabBar *)tabBar didSelectItem:(UITabBarItem *)item\n{\n  \
    \  NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n    NSUInteger\
    \ tabIndex = [tabBar.items indexOfObject:item];\n    [defaults setInteger:tabIndex\
    \ forKey:kSelectedTabDefaultsKey];\n}\n```\n\nNow when you quit and launch the\
    \ application, it remembers your last tab bar selection.\n\n## Designing the Data\
    \ Model\n\nNow you need define the application’s data model. As we discussed in\
    \ [Chapter 2](#9781430238072_Ch02.xhtml), the Xcode model editor is where you\
    \ design your application’s data model. In the Navigator pane, click on `SuperDB.xcdatamodel`.\
    \ This should bring up the model editor ([Figure 3-34](#9781430238072_Ch03.xhtml#Fig34)).\n\
    \n![9781430238072_Fig03-34.jpg](images/9781430238072_Fig03-34.jpg)\n\n[Figure\
    \ 3-34.](#9781430238072_Ch03.xhtml#_Fig34)  The empty model editor awaiting your\
    \ application’s data model\n\nUnlike the data model from [Chapter 2](#9781430238072_Ch02.xhtml),\
    \ you should be starting with a completely empty data model. So let’s dive right\
    \ in and start building. The first thing you need to add to your data model is\
    \ an entity. Remember, entities are like class definitions. Although they don’t\
    \ store any data themselves, without at least one entity in your data model, your\
    \ application won’t be able to store any data.\n\n### Adding an Entity\n\nSince\
    \ the purpose of your application is to track information about superheroes, it\
    \ seems logical that you’re going to need an entity to represent a hero. You’re\
    \ going to start off simple in this chapter and track only a few pieces of data\
    \ about each hero: name, secret identity, date of birth, and sex. You’ll add more\
    \ data elements in future chapters, but this will give you a basic foundation\
    \ upon which to build.\n\nAdd a new entity to the data model. A new entity, named\
    \ `Entity`, should appear in the Top-Level Components pane. This entity should\
    \ be selected, and the text `Entity` should be highlighted. Type **Hero** to name\
    \ this entity.\n\n### Editing the New Entity\n\nLet’s verify that your new `Hero`\
    \ entity has been added to the default configuration. Select the Default Configuration\
    \ in the Top-Level Configuration pane. The Data Editor Detail pane to the right\
    \ should have changed with a single table named `Entities`. There should be one\
    \ entry in this table, the entity you just named `Hero`.\n\nNext to `Hero` is\
    \ a checkbox called `Abstract`. This checkbox allows you to create an entity that\
    \ cannot be used to create managed objects at runtime. The reason why you might\
    \ create an abstract entity is if you have several properties that are common\
    \ to multiple entities. In that case, you might create an abstract entity to hold\
    \ the common fields and then make every entity that uses those common fields a\
    \ child of that abstract entity. Thus if you needed to change those common fields,\
