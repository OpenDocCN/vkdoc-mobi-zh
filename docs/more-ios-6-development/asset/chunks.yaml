  raw: "```\n#import \"KeychainIdentity.h\"\n```\n\nModify viewDidLoad to load all\
    \ the keychain identities.\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
            // Do any additional setup after loading the view.\n    self.items = [KeychainIdentity\
    \ allKeychainIdentities];\n}\n```\n\nNow you need to define and implement the\
    \ allKeychainIdentities class method on KeychainIdentity. Open KeychainIdentity.h\
    \ to add the definition.\n\n```\n+ (NSArray *)allKeychainIdentities;\n```\n\n\
    Add the implementation to KeychainIdentity.m.\n\n```\n+ (NSArray *)allKeychainIdentities\n\
    {\n    NSMutableArray *idents = [NSMutableArray array];\n    NSDictionary *query\
    \ = @{\n        (__bridge id)kSecClass               : (__bridge id)kSecClassIdentity,\n\
            (__bridge id)kSecReturnRef           : (id)kCFBooleanTrue,\n        (__bridge\
    \ id)kSecReturnAttributes    : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnPersistentRef\
    \ : (id)kCFBooleanTrue,\n        (__bridge id)kSecMatchLimit          : (__bridge\
    \ id)kSecMatchLimitAll\n    };\n    CFTypeRef results = NULL;\n    OSStatus status\
    \ = SecItemCopyMatching((__bridge CFDictionaryRef)query, &results);\n    if (status\
    \ == errSecSuccess && results != NULL) {\n        for (NSDictionary *result in\
    \ (__bridge NSArray *)results) {\n            id itemRef = [result valueForKey:(__bridge\
    \ id)kSecValueRef];\n            id persistentRef = [result valueForKey:(__bridge\
    \ id)kSecValuePersistentRef];\n            NSMutableDictionary *attrs = [NSMutableDictionary\
    \ dictionaryWithDictionary:result];\n            [attrs removeObjectForKey:(__bridge\
    \ id)kSecValueRef];\n            [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];\n\
    \nKeychainIdentity *ident =                 \n      [[KeychainIdentity alloc]\
    \ initWithItem:(__bridge CFTypeRef)itemRef];\n            ident.persistentRef\
    \ = persistentRef;\n            ident.attributes = attrs;\n            [idents\
    \ addObject:ident];\n        }\n    }\n    return idents;\n}\n```\n\nThis implementation\
    \ is essentially identical to allKeychainCertificates, except you query for digital\
    \ identities and create KeychainIdentities instead of KeychainCertificates. You\
    \ could probably refactor the common code into a class method in KeychainItem,\
    \ but this works for now.\n\nBuilding and running the app still doesn’t show any\
    \ identities or certificates. Remember in iOS, keychains are only in the scope\
    \ of the application. Your application doesn’t have any keychain items. You’re\
    \ going to load the certificate and identity you created earlier.\n\nFirst, let’s\
    \ add the two certificates you created earlier to your project. Select the Supporting\
    \ Files group in the Project Navigator pane, and add the files root.cer and cert.p12\
    \ to the project. Make sure you check the “Copy items to destination group’s folder\
    \ (if needed)” checkbox.\n\nYou’re going to load these items when you run your\
    \ application, but you don’t want to load them every time you launch your app.  Open\
    \ AppDelegate.m, and import your KeychainCertificate and KeychainIdentity header\
    \ files.\n\n```\n#import \"KeychainCertificate.h\"\n#import \"KeychainIdentity.h\"\
    \n```\n\nNext, define a private category.\n\n```\n@interface AppDelegate ()\n\
    - (BOOL)isAnchorCertLoaded;\n- (void)addAnchorCertificate;\n- (void)addIdentity;\n\
    @end\n```\n\nYou defined a method to check if your anchor certificate has been\
    \ loaded, plus two methods to add the anchor certificate and digital identity.\
    \ Before you implement those methods, you need to modify application:didFinishLoadingWithOptions:.\n\
    \n```\n- (BOOL)application:(UIApplication *)application        didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    // Override point for customization after application\
    \ launch.\n    if ([self isAnchorCertLoaded]) {\n        [self addIdentity];\n\
            [self addAnchorCertificate];\n    }\n\nreturn YES;\n}\n```\n\nCheck if\
    \ the anchor certificate is loaded. If not, load the digital identity and anchor\
    \ certificate. The loading should happen only once, essentially at first launch\
    \ of the application. The implementation of isAnchorCertLoaded is very simple.\n\
    \n```\n- (BOOL)isAnchorCertLoaded\n{\n    return ([[NSUserDefaults standardUserDefaults]\
    \ valueForKey:@\"anchor_certificate\"] == nil);\n}\n```\n\nYou just check if the\
    \ key anchor_certificate exists in the application’s User Defaults. If it doesn’t,\
    \ you assume the certificate and digital identity haven’t been loaded. To load\
    \ the certificate, you simply load the file, instantiate a KeychainCertificate,\
    \ then save it. Remember your KeychainItem save: method writes the keychain item\
    \ to the keychain.\n\n```\n- (void)addAnchorCertificate\n{\n    NSString *rootCertificatePath\
    \ = [[NSBundle mainBundle] pathForResource:@\"root\" ofType:@\"der\"];\n    NSData\
    \ *data = [[NSData alloc] initWithContentsOfFile:rootCertificatePath];\n    KeychainCertificate\
    \ *cert = [[KeychainCertificate alloc] initWithData:data options:nil];\n    if\
    \ (cert) {\n        NSError *error;\n        BOOL saved = [cert save:&error];\n\
            if (!saved) {\n            NSLog(@\"Error Saving Certificate: %@\", [error\
    \ localizedDescription]);\n            abort();;\n        }\n        NSUserDefaults\
    \ *userDefaults = [NSUserDefaults standardUserDefaults];\n        [userDefaults\
    \ setObject:cert.persistentRef forKey:@\"anchor_certificate\"];\n        [userDefaults\
    \ synchronize];\n    }\n}\n```\n\nAs a final step, you write the certificate’s\
    \ persistent reference to your User Defaults, using the key anchor_certificates.\n\
    \nAdding a digital identity is similar to adding a certificate. You need send\
    \ the password used to protect the identity file. You’ll hard-code that value.\
    \ In a production application, you’d probably use an Alert dialog asking the user\
    \ to enter the password.\n\n```\n- (void)addIdentity\n{\n    NSString *identityPath\
    \ = [[NSBundle mainBundle] pathForResource:@\"cert\" ofType:@\"p12\"];\n    NSData\
    \ *data = [[NSData alloc] initWithContentsOfFile:identityPath];\n    NSString\
    \ *password = @\"@Super2048Cat\";\n    KeychainIdentity *ident =         \n       [[KeychainIdentity\
    \ alloc] initWithData:data                                       \n       options:@{\
    \ (__bridge id)kSecImportExportPassphrase : password }];\n    if (ident) {\n        NSError\
    \ *error;\n        BOOL saved = [ident save:&error];\n        if (!saved) {\n\
                NSLog(@\"Error Saving Identity: %@\", [error localizedDescription]);\n\
                abort();\n        }\n    }\n}\n```\n\nYou’re assuming that if the\
    \ certificate is loaded, that you’ve loaded the digital identity as well. Again,\
    \ in a production application, you’d probably want a check for each keychain item\
    \ you need.\n\nBuild and run your app. Now you should see your digital identity\
    \ and certificates ([Figure 13-10](#9781430238072_Ch13.xhtml#Fig10)).\n\n![9781430238072_Fig13-10.jpg](images/9781430238072_Fig13-10.jpg)\n\
    \n[Figure 13-10.](#9781430238072_Ch13.xhtml#_Fig10)  Keychain viewer with your\
    \ digital identity (left) and certificates (right)\n\nLet’s add a detail view\
    \ for your digital identity and certificates. You’ll just use a simple text view\
    \ to print out the attributes. You’ll be presenting this view controller modally,\
    \ so you’ll add a single button to dismiss it.\n\nStart by creating a new Objective-C\
    \ class, named KeychainItemViewController, which will be a subclass of UIViewController.\
    \ Once the class files are created, open KeychainItemViewController.h. Before\
    \ the @interface declaration, you’ll predeclare the KeychainItem class.\n\n```\n\
    @class KeychainItem;\n```\n\nYou do this because you want to have a KeychainItem\
    \ property. In addition, you’ll declare a UITextView property where you’ll put\
    \ the keychain item attribute information.\n\n```\n@property (strong, nonatomic)\
    \ KeychainItem *item;\n@property (weak, nonatomic) IBOutlet UITextView *textView;\n\
    ```\n\nFinally, you’ll define an action that will dismiss your view controller\
    \ when the user taps a button.\n\n```\n- (IBAction)done:(id)sender;\n```\n\nOpen\
    \ KeychainItemViewController.m, and implement the done: action.\n\n```\n- (IBAction)done:(id)sender\n\
    {\n    [self dismissViewControllerAnimated:YES completion:nil];\n}\n```"
