    \ Core Data 中操作的每个实体实例都将是 `NSManagedObject` 类或其子类的一个实例。\n\n### 键值编码\n\n`NSDictionary`\
    \ 类允许你将对象存储在一个数据结构中，并使用唯一键来检索对象。与 `NSDictionary` 类类似，`NSManagedObject` 支持键值方法\
    \ `valueForKey:` 和 `setValue:forKey:` 来设置和检索属性值。它还有一些用于处理关系的额外方法。例如，你可以检索一个代表特定关系的\
    \ `NSMutableSet` 实例。向这个可变集合中添加管理对象或从中移除它们，将相应地在其所代表的关系中添加或移除对象。\n\n如果你对 `NSDictionary`\
    \ 类还不熟悉，花几分钟启动 Xcode 并在文档查看器中阅读关于 `NSDictionary` 的内容。你需要理解的重要概念是键值编码，即 KVC。Core\
    \ Data 使用 KVC 从其管理对象中存储和检索数据。\n\n在你的模板应用程序中，考虑一个代表单个事件的 `NSManagedObject` 实例。你可以通过调用\
    \ `valueForKey:` 来检索其 `timeStamp` 属性中存储的值，如下所示：\n\n```\nNSDate *timeStamp = [managedObject\
    \ valueForKey:@\"timeStamp\"];\n```\n\n由于 `timeStamp` 是一个日期类型的属性，因此你知道 `valueForKey:`\
    \ 返回的对象将是 `NSDate` 的一个实例。类似地，你可以使用 `setValue:ForKey:` 来设置值。以下代码会将 `managedObject`\
    \ 的 `timeStamp` 属性设置为当前日期和时间：\n\n```\n[managedObject setValue:[NSDate date] forKey:@\"\
    timeStamp\"];\n```\n\nKVC 还包含了键路径的概念。键路径允许你使用单个字符串遍历对象层次结构。因此，例如，如果你的 `Employee`\
    \ 实体上有一个名为 `whereIWork` 的关系，指向一个名为 `Employer` 的实体，并且 `Employer` 实体有一个名为 `name`\
    \ 的属性，那么你可以从 `Employee` 的实例中通过键路径获取存储在 `name` 中的值，如下所示：\n\n```\nNSString *employerName\
    \ = [managedObject valueForKeyPath:@\"whereIWork.name\"];\n```\n\n请注意，你使用的是 `valueForKeyPath:`\
    \ 而不是 `valueForKey:`，并且为键路径提供了一个用点分隔的值。KVC 使用点来解析该字符串，因此在这个例子中，它会将其解析为两个独立的值：`whereIWork`\
    \ 和 `name`。它首先在自身对象上使用第一个值 (`whereIWork`)，并检索与该键对应的对象。然后，它取键路径中的下一个值 (`name`)，并从之前调用返回的对象中检索存储在该键下的对象。由于\
    \ `Employer` 是一个对一关系，键路径的第一部分将返回一个表示该员工雇主的管理对象实例。然后，键路径的第二部分将用于从代表 `Employer`\
    \ 的管理对象中检索 `name`。\n\n**注意** 如果你在 Cocoa 中使用过绑定，你可能已经熟悉了 KVC 和键路径。如果没有，也别担心——它们很快就会成为你的第二天性。键路径实际上是非常直观的。\n\
    \n### 管理对象上下文\n\nCore Data 维护着一个对象，它充当着你的实体与 Core Data 其余部分之间的网关。这个网关被称为管理对象上下文（通常简称为上下文）。上下文为你已加载或创建的所有管理对象维护着状态。上下文跟踪自上次保存或加载管理对象以来所做的更改。例如，当你想加载或搜索对象时，你是针对一个上下文来操作的。当你希望将更改提交到持久化存储时，你要保存该上下文。如果你想撤销对管理对象的更改，只需请求管理对象上下文执行撤销操作。（是的，它甚至处理实现数据模型撤销和重做所需的所有工作。）\n\
    \n在构建 iOS 应用程序时，绝大多数情况下你只会有一个单一的上下文。然而，iOS 使得拥有多个上下文变得很容易。你可以创建嵌套的管理对象上下文，其中上下文的父对象存储是另一个管理对象上下文，而不是持久化存储协调器。\n\
    \n在这种情况下，获取和保存操作由父上下文而非协调器来协调。你可以设想许多使用场景，包括在第二个线程或队列上执行后台操作，以及管理来自检查器窗口或视图的可放弃编辑操作。有一点需要提醒：嵌套上下文使得采用“传递接力棒”的方式来访问上下文（通过将上下文从一个视图控制器传递到下一个）比以往任何时候都更加重要，而不是直接从应用程序委托中检索它。\n"
- fmt: '# Core Data 基本概念


    因为每个应用都需要至少一个托管对象上下文才能正常工作，模板已经非常贴心地为你提供了一个。再次点击`AppDelegate.m`，在编辑器的跳转栏（Jump
    Bar）中选择“函数”菜单下的`-managedObjectContext`。你将看到一个类似这样的方法：


    ```

    // Returns the managed object context for the application.

    // If the context doesn''t already exist, it is created and bound to the persistent
    store coordinator for the application.

    - (NSManagedObjectContext *)managedObjectContext

    {

        if (_managedObjectContext != nil) {

            return _managedObjectContext;

        }

        NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];

        if (coordinator != nil) {

            _managedObjectContext = [[NSManagedObjectContext alloc] init];

            [_managedObjectContext setPersistentStoreCoordinator:coordinator];

        }

        return _managedObjectContext;

    }

    ```


    这个方法实际上非常直观。它采用懒加载的方式，先检查`_managedObjectContext`是否为`nil`。如果不为`nil`，则直接返回其值。如果`managedObjectContext`为`nil`，则检查`NSPersistentStoreCoordinator`是否存在。如果存在，就创建一个新的`_managedObjectContext`，然后使用`setPersistentStoreCoordinator:`将当前的协调器绑定到`managedObjectContext`。完成后，返回`_managedObjectContext`。


    **注意**：托管对象上下文并不直接与持久化存储交互；它们通过一个持久化存储协调器来工作。因此，每个托管对象上下文都需要获得一个指向持久化存储协调器的指针才能正常运行。不过，多个托管对象上下文可以共享同一个持久化存储协调器。


    # 在终止时保存


    在应用委托（application delegate）中向上滚动，找到另一个名为`applicationWillTerminate:`的方法，该方法会将上下文的更改（如果有的话）保存到持久化存储中。顾名思义，这个方法会在应用即将退出时被调用。


    ```

    - (void)applicationWillTerminate:(UIApplication *)application

    {

        // Saves changes in the application''s managed object context before the application

        // terminates.

        [self saveContext];

    }

    ```


    这是一个很不错的功能，但有时你可能不希望保存数据。例如，如果用户在创建一个新实体后、但在为该实体输入任何数据之前退出了应用，该怎么办？在这种情况下，你真的需要将那个空的托管对象保存到持久化存储中吗？可能不需要。在接下来的几章中，你将学习如何处理类似的情况。


    # 从持久化存储加载数据


    运行你之前构建的 Core Data 应用，按几次加号按钮（参见[图 2-6](#9781430238072_Ch02.xhtml#Fig6)）。退出模拟器，然后再次运行应用。注意，之前运行产生的时间戳已被保存到持久化存储中，并在本次运行时被加载回来。


    点击`MasterViewController.m`，看看这是如何实现的。正如你从文件名可以推测的那样，`MasterViewController`是充当应用主视图控制器的视图控制器类。这就是你在[图
    2-6](#9781430238072_Ch02.xhtml#Fig6)中看到的视图所对应的视图控制器。


    点击文件名后，你可以使用编辑器的跳转栏中的“函数”菜单找到`viewDidLoad:`方法，不过它很可能已经显示在屏幕上了，因为它是该类中的第一个方法。该方法的默认实现如下：


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

        // Do any additional setup after loading the view, typically from a nib.

        self.navigationItem.leftBarButtonItem = self.editButtonItem;

        UIBarButtonItem *addButton =     [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd                                                    
    target:self                                                     action:@selector(insertNewObject:)];

        self.navigationItem.rightBarButtonItem = addButton;

    }

    ```


    该方法首先调用父类方法。接着，它设置了“编辑”（Edit）和“添加”（Add）按钮。请注意，`MasterViewController`继承自`UITableViewController`，而`UITableViewController`又继承自`UIViewController`。`UIViewController`提供了一个名为`editButtonItem`的属性，它会返回一个“编辑”按钮。通过点语法，你获取`editButtonItem`并将其传递给`navigationItem`属性的`leftBarButtonItem`属性。这样，“编辑”按钮就成为了导航栏左侧的按钮。


    现在我们来关注一下“添加”按钮。由于`UIViewController`没有提供“添加”按钮，因此使用`alloc`从头创建了一个，然后将其设置为导航栏右侧的按钮。代码相当直接：


    ```

    UIBarButtonItem *addButton =     [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd

                                                      target:self

                                                      action:@selector(insertNewObject:)];

    self.navigationItem.rightBarButtonItem = addButton;

    ```


    至此，基本的用户界面已经搭建完成，接下来我们看看获取结果控制器（Fetched Results Controller）是如何工作的。


    ## 获取结果控制器


    从概念上讲，获取结果控制器与你在 iOS SDK 中见过的其他通用控制器有些不同。如果你使用过 Cocoa 绑定以及 Mac 上可用的通用控制器类（例如`NSArrayController`），那么你已经对这个基本概念很熟悉了。如果你不熟悉这些通用控制器类，那么可能需要进行一些解释。


    iOS SDK 中的大部分通用控制器类（例如`UINavigationController`、`UITableViewController`和`UIViewController`）都被设计为特定类型视图的控制器。然而，视图控制器并不是
    Cocoa Touch 提供的唯一控制器类型，尽管它们是最常见的。`NSFetchedResultsController`就是一个非视图控制器的控制器类示例。


    `NSFetchedResultsController`被设计来处理一项非常具体的工作：管理从 Core Data 获取请求中返回的对象。`NSFetchedResultsController`使得从
    Core Data 显示数据比通常情况更简单，因为它为你处理了许多任务。例如，当收到内存警告时，它会从内存中清除任何不需要的对象，并在再次需要时重新加载它们。如果你为获取结果控制器指定了一个委托，那么当其底层数据发生某些更改时，你的委托将会收到通知。


    ### 创建获取结果控制器


    你首先创建一个获取请求，然后使用该获取请求来创建一个获取结果控制器。在模板中，这是在`MasterViewController.m`的`fetchedResultsController`方法中完成的。`fetchedResultsController`首先通过懒加载检查是否已经存在一个活跃的实例化`_fetchedResultsController`。如果不存在（解析为`nil`），则开始创建一个新的获取请求。获取请求本质上是一个规范，它列出了要获取的数据的详细信息。你需要告诉获取请求要获取哪个实体。此外，你还需要向获取请求添加一个排序描述符。排序描述符决定了数据的组织顺序。'
  raw: 'Because every application needs at least one managed object context to function,
    the template has very kindly provided you with one. Click AppDelegate.m again,
    and select -managedObjectContext from the Function menu in the Editor Jump Bar.
    You will see a method that looks like this:


    ```

    // Returns the managed object context for the application.

    // If the context doesn''t already exist, it is created and bound to the persistent
    store coordinator for the application.

    - (NSManagedObjectContext *)managedObjectContext

    {

        if (_managedObjectContext != nil) {

            return _managedObjectContext;

        }

        NSPersistentStoreCoordinator *coordinator = [self persistentStoreCoordinator];

        if (coordinator != nil) {

            _managedObjectContext = [[NSManagedObjectContext alloc] init];

            [_managedObjectContext setPersistentStoreCoordinator:coordinator];

        }

        return _managedObjectContext;

    }

    ```


    This method is actually pretty straightforward. Using lazy loading, _managedObjectContext
    is checked for nil. If it is not nil, its value is returned. If managedObjectContext
    is nil, you check to see if your NSPersistentStoreCoordinator exists. If so, you
    create a new _managedObjectContext, then use setPersistentStoreCoordinator: to
    tie the current coordinator to your managedObjectContext. When you’re finished,
    you return _managedObjectContext.


    **Note**  Managed object contexts do not work directly against a persistent store;
    they go through a persistent store coordinator. As a result, every managed object
    context needs to be provided with a pointer to a persistent store coordinator
    in order to function. Multiple managed object contexts can work against the same
    persistent store coordinator, however.


    Saves On Terminate


    While you’re in the application delegate, scroll up to another method called applicationWillTerminate:,
    which saves changes to the context if any have been made. The changes are saved
    to the persistent store. As its name implies, this method is called just before
    the application exits.


    ```

    - (void)applicationWillTerminate:(UIApplication *)application

    {

        // Saves changes in the application''s managed object context before the application

        // terminates.

        [self saveContext];

    }

    ```


    This is a nice bit of functionality, but there may be times when you don’t want
    the data to be saved. For example, what if the user quits after creating a new
    entity, but before entering any data for that entity? In that case, do you really
    want to save that empty managed object into the persistent store? Possibly not.
    You’ll look at dealing with situations like that in the next few chapters.


    Load Data From the Persistent Store


    Run the Core Data application you built earlier and press the plus button a few
    times (see [Figure 2-6](#9781430238072_Ch02.xhtml#Fig6)). Quit the simulator,
    and then run the application again. Note that the timestamps from your previous
    runs were saved into the persistent store and loaded back in for this run.


    Click MasterViewController.m so you can see how this happens. As you can probably
    guess from the filename, MasterViewController is the view controller class that
    acts as your application’s, well, master view controller. This is the view controller
    for the view you can see in [Figure 2-6](#9781430238072_Ch02.xhtml#Fig6).


    Once you’ve clicked the filename, you can use the Editor jump bar’s Function menu
    to find the viewDidLoad: method, although it will probably be on your screen already
    since it’s the first method in the class. The default implementation of the method
    looks like this:


    ```

    - (void)viewDidLoad

    {

        [super viewDidLoad];

        // Do any additional setup after loading the view, typically from a nib.

        self.navigationItem.leftBarButtonItem = self.editButtonItem;

        UIBarButtonItem *addButton =     [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd                                                    
    target:self                                                     action:@selector(insertNewObject:)];

        self.navigationItem.rightBarButtonItem = addButton;

    }

    ```


    The first thing the method does is call super. Next, it sets up the Edit and Add
    buttons. Note that MasterViewController inherits from UITableViewController, which
    in turn inherits from UIViewController. UIViewController provides a property named
    editButtonItem, which returns an Edit button. Using dot notation, you retrieve
    editButtonItem and pass it to the leftBarButtonItem property of the navigationItem
    property. Now the Edit button is the left button in the navigation bar.


    Now let’s focus on the Add button. Since UIViewController does not provide an
    Add button, use alloc to create one from scratch and the add it as the right button
    in the navigation bar. The code is fairly straightforward:


    ```

    UIBarButtonItem *addButton =     [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemAdd

                                                      target:self

                                                      action:@selector(insertNewObject:)];

    self.navigationItem.rightBarButtonItem = addButton;

    ```


    So, with the basic user interface set up, it’s time to look at how the fetched
    results controller works.


    The Fetched Results Controller


    Conceptually speaking, the fetched results controller isn’t quite like the other
    generic controllers you’ve seen in the iOS SDK. If you’ve used Cocoa bindings
    and the generic controller classes available on the Mac, such as NSArrayController,
    then you’re already familiar with the basic idea. If you’re not familiar with
    those generic controller classes, a little explanation is probably in order.


    Most of the generic controller classes in the iOS SDK (such as UINavigationController,
    UITableViewController, and UIViewController) are designed to act as the controller
    for a specific type of view. View controllers, however, are not the only types
    of controller classes that Cocoa Touch provides, although they are the most common.
    NSFetchedResultsController is an example of a controller class that is not a view
    controller.


    NSFetchedResultsController is designed to handle one very specific job, which
    is to manage the objects returned from a Core Data fetch request. NSFetchedResultsController
    makes displaying data from Core Data easier than it would otherwise be because
    it handles a bunch of tasks for you. It will, for example, purge any unneeded
    objects from memory when it receives a low-memory warning and reload them when
    it needs them again. If you specify a delegate for the fetched results controller,
    your delegate will be notified when certain changes are made to its underlying
    data.


    Creating a Fetched Results Controller


    You start by creating a fetch request and then use that fetch request to create
    a fetched results controller. In your template, this is done in MasterViewController.m,
    in the fetchedResultsController method. fetchedResultsController starts with a
    lazy load to see if there is already an active instantiated _fetchedResultsController.
    If that is not there (resolves to nil), it sets out to create a new fetch request.
    A fetch request is basically a specification that lays out the details of the
    data to be fetched. You need to tell the fetch request which entity to fetch.
    In addition, you want to add a sort descriptor to the fetch request. The sort
    descriptor determines the order in which the data is organized.'
