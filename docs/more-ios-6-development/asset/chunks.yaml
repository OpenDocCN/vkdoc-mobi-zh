    \ `SuperDB` 应用程序创建一个单一域，但通过更具体地定义域，你的应用程序将更易于调试。\n\n通过创建自己的错误域，你可以根据需要尽可能具体。同时，你也避免了在长长的系统定义常量列表中搜索，以寻找恰好覆盖特定错误的代码的问题。`kHeroValidationBirthdateCode`\
    \ 是你在此域中创建的第一个代码，其值 1000 是任意的；为这个错误代码选择 0、1、10000 或 34848 也完全有效。这是你的域，你可以做你想做的事。\n\
    \n### `nil` 与 `NULL`\n\n在你的验证方法中，你可能已经注意到，你将 `outError` 与 `NULL` 进行比较，以确定是否提供了有效的指针，而不是像通常那样与\
    \ `nil` 进行比较。`nil` 和 `NULL` 都服务于相同的目的（表示空指针），并且事实上，它们被定义为相同的东西：数字零。就代码功能而言，`nil`\
    \ 和 `NULL` 是 100% 可互换的。\n\n尽管如此，你应该努力在正确的时间使用正确的那个。你使用的那个将为你未来的自己以及任何其他处理你代码的开发者提供线索，表明你在做什么。\n\
