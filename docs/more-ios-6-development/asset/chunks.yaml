    \ `debug`，另一种叫 `release`。\n\n那么，调试配置与发布或分发配置有什么不同呢？实际上它们之间有许多不同之处，但关键区别在于，**调试**配置会在你的应用程序中构建**调试符号**。这些调试符号就像是你编译后应用程序中的小书签，使得将应用程序中触发的任何命令与你项目中的特定源代码片段匹配起来成为可能。Xcode\
    \ 包含一个称为**调试器**的软件，它利用调试符号将机器码字节还原成生成该机器码的源代码中的特定函数和方法。\n\n**警告** 如果你尝试在发布或分发配置下使用调试器，将会得到非常奇怪的结果，因为这些配置不包含调试符号。调试器会尽力而为，但最终会变得沮丧并悄然失效。\n\
    \nXcode 4 的重大变化之一是将调试器集成到了主窗口中（图 15-9）。Xcode 的早期版本有自己的独立调试器控制台。现在，Xcode 在调试时会改变多个窗格。我们稍后将讨论每个窗格的内容。\n\
    \n![9781430238072_Fig15-09.jpg](img/9781430238072_Fig15-09.jpg)\n\n图 15-9. 处于调试器模式的\
    \ Xcode\n\n## 断点\n"
- fmt: '# 使用断点进行调试


    ## 断点简介


    你可能拥有的最重要的调试工具是**断点**（breakpoint）。断点是一条指示调试器在代码中特定位置暂停应用程序执行并等待你的指令。通过暂停（而非停止）程序执行，你的应用程序仍在运行，你可以执行诸如查看变量值以及逐行逐步执行代码等操作。断点也可以设置为：不是暂停程序执行，而是执行某个命令或脚本，然后程序继续运行。本章将介绍这两种类型的断点，但你可能会更频繁地使用前者。


    ## 行号断点


    在 Xcode 中最常设置的断点类型是**行号断点**（line number breakpoint）。这种断点允许你指定调试器应在特定文件的特定代码行处停止。要在
    Xcode 中设置行号断点，只需单击编辑窗格中源代码文件左侧的空白区域。现在让我们实际操作一下，看看它是如何工作的。


    单击`MasterViewController.m`文件。查找名为`viewDidLoad`的方法。它应该是文件中较早的方法之一。在编辑窗格的左侧，你应该能看到一个带有数字的列，如图
    15-10 所示。这被称为**装订线**（gutter），它是设置行号断点的一种方式。


    ![9781430238072_Fig15-10.jpg](images/9781430238072_Fig15-10.jpg)


    图 15-10. 编辑窗格左侧是一个通常显示行号的列，这就是设置断点的地方


    **提示** 如果你没有看到行号或装订线，请打开 Xcode 偏好设置，进入文本编辑窗格并选择编辑标签页（图 15-11）。该部分第一个复选框是“显示：行号”。如果你能看到行号，设置断点会容易得多。


    ![9781430238072_Fig15-11.jpg](images/9781430238072_Fig15-11.jpg)


    图 15-11. 通过在 Xcode 偏好设置的文本编辑窗格中确保勾选“显示：行号”来显示装订线


    查找`viewDidLoad`中的第一行代码，应该是对`super`的调用。在图 15-10 中，这行代码位于第 30 行，不过在你的文件中可能是不同的行号。单击该行左侧的装订线，装订线中会出现一个小箭头指向该行代码。现在你已经在`MasterViewController.m`文件的特定行号处设置了一个断点。


    你可以通过将断点拖出装订线来删除它们，也可以通过拖动它们到装订线上的新位置来移动它们。你可以通过单击现有断点来临时禁用它，这会使它们从深色变为浅色。要重新启用禁用的断点，只需再次单击它，使其恢复为深色。


    ## 尝试基本功能


    在讨论你可以使用断点做的所有事情之前，让我们先尝试基本功能。选择**产品** → **运行**。程序将正常启动，然后在视图完全显示之前，你会被带回 Xcode，项目窗口将显示出来，显示即将执行的代码行及其关联的断点（图
    15-10）。


    **注意** 在调试窗口和项目窗口顶部的工具栏中，有一个标记为“断点”的图标。顾名思义，单击该图标可在断点开启或关闭之间切换。这允许你启用或禁用所有断点，而不会丢失它们。


    还记得我们说过要讨论 Xcode 调试器布局吗？现在就来介绍。


    ## 调试导航器


    当 Xcode 进入调试模式时，导航窗格（左侧）会激活调试导航器（图 15-12）。此视图显示应用程序的**堆栈跟踪**（Stack Trace），即导致你到达当前位置的方法和函数调用。在这种情况下，它突出显示了`MasterViewController`中对`viewDidLoad`的调用。灰色行表示你在源代码中无权访问的类和方法。你可以看到下一个方法是来自`UIViewController`的`view`。由于`UIViewController`属于
    UIKit 框架，因此你没有源代码也就不足为奇了。


    ![9781430238072_Fig15-12.jpg](images/9781430238072_Fig15-12.jpg)


    图 15-12. 调试导航器，显示堆栈跟踪


    如果你进一步向上查看调用堆栈，会看到调用了`[AppDelegate application:didFinishLaunchingWithOptions:]`。如果你单击该行，编辑窗格将更改为显示`AppDelegate.m`文件，并突出显示在到达断点之前最后调用的那一行。这是一个非常有用的功能。它允许你追踪导致问题的方法和函数调用的流程。


    ## 调试区域


    编辑区域下方的区域称为**调试区域**（Debug Area）（图 15-13）。它由三个部分组成：顶部是调试栏；调试栏下方左侧是变量列表；变量列表右侧是控制台窗格。让我们从变量列表开始逐一讨论。


    ![9781430238072_Fig15-13.jpg](images/9781430238072_Fig15-13.jpg)


    图 15-13. 调试区域，位于编辑区域下方


    变量列表显示当前**在作用域内**（in scope）的所有变量。如果变量是当前方法的参数或局部变量，或者是包含该方法的对象的实例变量，则该变量处于作用域内。


    **注意** 变量列表还允许你更改变量的值。如果你双击任何值，它将变为可编辑状态，当你按回车键提交更改时，应用程序中的底层变量也会随之更改。


    默认情况下，变量列表会显示局部变量。你可以通过选择变量列表窗格左上角的下拉菜单来更改此设置。有三个可用选项：自动；局部；以及所有变量、寄存器、全局变量和静态变量。自动显示
    Xcode 认为你根据给定上下文会感兴趣的变量。所有变量… 将显示所有变量和处理器寄存器。可以说，如果你在处理处理器寄存器，那么你正在做一些非常高级的工作，远远超出了本章的范围。


    控制台窗格让你可以直接访问调试器命令行和输出。虽然使用调试器控制台命令非常强大，但我们不在这里详细讨论。


    需要注意的是，输出（例如`NSLog()`语句）会定向到控制台窗格。因此，在调试时查看那里并观察生成了哪些输出是很有用的。


    最后，调试栏包含一组控件（图 15-14）和一个堆栈跟踪跳转栏。跳转栏显示应用程序中当前线程的当前位置。这只是调试导航器视图的一个精炼版本。


    ![9781430238072_Fig15-14.jpg](images/9781430238072_Fig15-14.jpg)


    图 15-14. 调试栏控件'
  raw: 'Probably the most important debugging tool in your arsenal is the *breakpoint*.
    A breakpoint is an instruction to the debugger to pause execution of your application
    at a specific place in your code and wait for you. By pausing, but not stopping,
    the execution of your program, your application is still running and you can do
    things like look at the value of variables and step through lines of code one
    at a time. A breakpoint can also be set up so that instead of pausing the program’s
    execution, a command or script gets executed and then the program resumes execution.
    You’ll look at both types of breakpoints in this chapter, but you’ll probably
    use the former a lot more than the latter.


    The most common breakpoint type that you’ll set in Xcode is the *line number breakpoint*.
    This type of breakpoint allows you to specify that the debugger should stop at
    a specific line of code in a specific file. To set a line number breakpoint in
    Xcode, you just click in the space to the left of the source code file in the
    editing pane. Let’s do that now so you can see how it works.


    Single-click MasterViewController.m. Look for the method called viewDidLoad. It
    should be one of the early methods in the file. On the left side of the Editing
    pane, you should see a column with numbers, as in [Figure 15-10](#9781430238072_Ch15.xhtml#Fig10).
    This is called the *gutter*, and it’s one way to set line number breakpoints.


    ![9781430238072_Fig15-10.jpg](images/9781430238072_Fig15-10.jpg)


    [Figure 15-10.](#9781430238072_Ch15.xhtml#_Fig10)  To the left of the editing
    pane is a column that usually shows line numbers. This is where you set breakpoints


    **Tip**  If you don’t see line numbers or the gutter, open Xcode’s preferences
    and go to the Text Editing pane and select the Editing tab ([Figure 15-11](#9781430238072_Ch15.xhtml#Fig11)).
    The first check box in that section is “Show: Line numbers.” It’s much easier
    to set breakpoints if you can see the line numbers.


    ![9781430238072_Fig15-11.jpg](images/9781430238072_Fig15-11.jpg)


    [Figure 15-11.](#9781430238072_Ch15.xhtml#_Fig11)  Expose the gutter by making
    sure Show: Line numbers is checked in the Text Editing pane of Xcode Preferences


    Look for the first line of code in viewDidLoad, which should be a call to super.
    In [Figure 15-10](#9781430238072_Ch15.xhtml#Fig10), this line of code is at line
    30, though it may be a different line number for you. Single-click in the gutter
    to the left of that line, and a little arrow should appear in the gutter pointing
    at the line of code. You now have a breakpoint set in the MasterViewController.m
    file at a specific line number.


    You can remove breakpoints by dragging them off of the gutter, and move them by
    dragging them to a new location on the gutter. You can temporarily disable existing
    breakpoints by single-clicking them, which will cause them to change from a darker
    color to a lighter color. To re-enable a disabled breakpoint, you just click it
    again to change it back to the darker color.


    Before we talk about all the things you can do with breakpoints, let’s try out
    the basic functionality. Select **Product** ![image](images/arrow.jpg) **Run**.
    The program will start to launch normally, then before the view gets fully shown,
    you’ll be brought back to Xcode, and the project window will come forward, showing
    the line of code about to be executed and its associated breakpoint ([Figure 15-10](#9781430238072_Ch15.xhtml#Fig10)).


    **Note**  In the toolbar at the top of the debug and project windows is an icon
    labeled Breakpoints. As its name implies, clicking that icon toggles between breakpoints
    on or breakpoints off. This allows you to enable or disable all your breakpoints
    without losing them.


    Remember we said we’d talk about the Xcode debugger layout? Let’s do that now.


    The Debug Navigator


    When Xcode enters debugging mode, the Navigation pane (on the left) activates
    the Debug Navigator ([Figure 15-12](#9781430238072_Ch15.xhtml#Fig12)). This view
    shows you the Stack Trace of the application, the method and function calls that
    got you here. In this case, it highlights the call to viewDidLoad in the MasterViewController.
    The greyed out rows indicate the classes and methods you don’t have access to
    in the source code. You can see the next method is the view from UIViewController.
    Since UIViewController is part of the UIKit framework, it’s not surprising you
    don’t have the source code.


    ![9781430238072_Fig15-12.jpg](images/9781430238072_Fig15-12.jpg)


    [Figure 15-12.](#9781430238072_Ch15.xhtml#_Fig12)  Debug Navigator, displaying
    the stack trace


    If you go further up the call stack, you see that [AppDelegate application:didFinishLaunchingWithOptions:]
    was called. If you click on that line, the Editor pane will change to show the
    file AppDelegate.m, highlighting the line that was last called before reaching
    the breakpoint. This is a very useful feature. It allows you to track the flow
    of method and function calls that lead up to a problem.


    The Debug Area


    The area underneath the Editor Area is called the Debug Area ([Figure 15-13](#9781430238072_Ch15.xhtml#Fig13)).
    It’s composed of three components. Along the top is the Debug Bar. Below the Debug
    Bar, to the left, is the Variable List. To the right of the Variable List is the
    Console Pane. Let’s discuss each one, starting with the Variable List.


    ![9781430238072_Fig15-13.jpg](images/9781430238072_Fig15-13.jpg)


    [Figure 15-13.](#9781430238072_Ch15.xhtml#_Fig13)  Debug Area, located below the
    Editor Area


    The Variable List displays all the variables that are currently *in scope*. A
    variable is in scope if it is an argument or local variable from the current method,
    or if it is an instance variable from the object that contains the method.


    **Note**  The variable list will also let you change a variable’s value. If you
    double-click any value, it will become editable, and when you press return to
    commit your change, the underlying variable will also change in the application.


    By default, the Variable List will display local variables. You may change this
    by selecting the drop-down at the upper left of the Variable List pane. There
    are three options available: Auto; Local; and All Variables, Registers, Globals
    and Statics. Auto displays the variables Xcode thinks you’ll be interested based
    on the given context. All Variables… will all variables and processor registers.
    Suffice to say, if you are handling processor registers, you’re doing some pretty
    advanced work, far beyond the scope of this chapter.


    The Console Pane gives you direct access to the debugger command line and output.
    While using the debugger console command is very powerful, we’re not going to
    discuss it in detail here.


    It’s important to note that output (i.e. NSLog() statement) will direct you to
    the Console Pane. So it’s useful to look there and see what output is generated
    while debugging.


    Finally, the Debug Bar contains a set of controls ([Figure 15-14](#9781430238072_Ch15.xhtml#Fig14))
    and a stack trace jump bar. The jump bar displays the current location of the
    current thread in the application. This is just a distillation of the Debug Navigator
    view.


    ![9781430238072_Fig15-14.jpg](images/9781430238072_Fig15-14.jpg)


    [Figure 15-14.](#9781430238072_Ch15.xhtml#_Fig14)  Debug Bar controls'
