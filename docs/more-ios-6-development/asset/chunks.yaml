    }\n```\n\n当 Go 按钮按下后，你将图片源设置为设备的相机。如果相机不可用（例如在模拟器上运行），则回退到使用相册。你将图片选择器的委托设置为你当前的视图控制器，并允许编辑图片。最后，显示图片选择器。\n\
    \n由于你将视图控制器设置为图片选择器的委托，你可以添加你需要的委托方法。在 `selectAndMessageImage:` 方法下方添加以下代码。\n\n\
    ```\n#pragma mark - UIImagePickerController Delegate Methods\n\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\n         didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n \
    \   [picker dismissViewControllerAnimated:YES completion:nil];\n    self.image\
    \ = [info objectForKey:UIImagePickerControllerEditedImage];\n}\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
    \ *)picker\n{\n    [picker dismissViewControllerAnimated:YES completion:nil];\n\
    }\n```\n\n两个方法都会关闭图片选择器，但 `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ 还会将你的图片属性设置为拍摄（或选择）的照片。\n\n让我们确认一切正常。运行应用程序，拍摄一张照片，然后点击“使用”。此时应该没有任何反应，但这没关系。\n\
    \n## 选择消息发送方式\n\n图 11-3 展示了选择图片后出现的活动视图控制器。我们来设置一下。\n\n首先，你需要定义一个方法来显示活动视图控制器。打开\
    \ `ViewController.h` 并添加以下方法声明：\n\n```\n- (void)showActivityViewController;\n\
    ```\n\n现在，选择 `ViewController.m`，并添加该方法的具体实现。我们将其添加在 `selectAndMessageImage:` 方法之后。\n\
    \n```\n- (void)showActivityViewController\n{\n    NSString *message = NSLocalizedString(@\"\
    I took a picture on my iPhone\",\n                                          @\"\
    I took a picture on my iPhone\");\n    NSArray *activityItems = @[ message, self.image\
    \ ];\n    UIActivityViewController *activityVC =\n        [[UIActivityViewController\
    \ alloc] initWithActivityItems:activityItems\n                               \
    \   applicationActivities:nil];\n    [self presentViewController:activityVC animated:YES\
    \ completion:nil];\n}\n```\n\n现在，你需要在选择图片后调用 `showActivityViewController` 方法。在\
    \ `imagePickerController:didFinishPickingMediaWithInfo:` 的末尾添加以下代码行。你需要稍微延迟活动视图控制器的显示，以便给\
    \ `UIImagePickerController` 足够的时间从根视图控制器中移除。\n\n```\n    [self performSelector:@selector(showActivityViewController)\
    \ withObject:nil afterDelay:0.5];\n```\n\n检查一下目前的工作。运行应用程序并确认警告面板出现。就是这样。哇，这真是简单。\n\
    \n**注意：** 如果你选择了一个服务但尚未配置账户信息，iOS 会弹出一个警告，提示你设置账户。\n\n## 以邮件方式发送……\n\n在本章中，你了解了如何发送电子邮件、短信或发布到社交媒体服务。你应该能够将这个功能添加到你的任何应用程序中。当你准备好继续时，请翻页学习\
    \ iPod 操控的艺术。\n\n# 第 12 章：媒体库访问与播放\n\n每个 iOS 设备，其核心都是一流的媒体播放器。开箱即用，用户即可听音乐、播客和有声读物，以及观看电影和视频。\n\
    \niOS SDK 应用程序一直以来都能够播放声音和音乐，但苹果在每次 iOS 版本发布时都在扩展这项功能。iOS 3 为我们提供了 `MediaPlayer`\
    \ 框架，该框架的一项功能是允许访问用户的音频库；iOS 5 则将其扩展，允许访问用户库中的视频。\n\niOS 4 扩展了 `AVFoundation`\
    \ 框架，该框架提供了对媒体播放、录制和编辑的更精细控制。这种控制是有代价的，因为 `MediaPlayer` 框架的大部分功能并未直接在 `AVFoundation`\
    \ 中实现。相反，`AVFoundation` 让你能够为特定需求实现自定义控件。\n\n在本章中，你将开发三个应用程序：一个简单的音频播放器、一个简单的视频播放器以及一个混合音频/视频播放器。前两个将专门使用\
    \ `MediaPlayer` 框架。最后一个应用程序将使用 `MediaPlayer` 框架来访问用户的媒体库，但使用 `AVFoundation` 进行播放。\n\
    \n## MediaPlayer 框架\n\n用于访问媒体库的方法和对象是 `MediaPlayer` 框架的一部分，该框架允许应用程序播放音频和视频。虽然该框架允许你访问用户库中所有类型的媒体，但存在一些限制，仅允许你处理音频文件。\n\
    \niOS 设备上的媒体集合曾被称为 *iPod 库*，我们将在本书中交替使用此术语与 *媒体库*。后者可能更准确，因为苹果已将音乐播放器从 iPod 重命名为\
    \ Music，并将视频媒体移到了一个名为 Videos 的应用程序中。最近，苹果更进一步，创建了一个 Podcasts 应用程序来处理你的播客集。\n\n\
    从 `MediaPlayer` 框架的角度来看，整个媒体库由类 `MPMediaLibrary` 表示。不过，你并不会经常使用这个对象。它主要用于当你的应用程序运行时，你需要被通知媒体库发生变化的情况。过去，在应用程序运行时媒体库发生变化的情况很少见，因为这种变化通常发生在将设备与电脑同步时。如今，你可以直接与\
    \ iTunes Store 同步你的音乐集，因此你可能需要监控媒体库的变化。\n\n一个媒体项由类 `MPMediaItem` 表示。如果你希望播放用户某个播放列表中的歌曲，你将使用类\
    \ `MPMediaPlaylist`，该类代表在 iTunes 中创建并同步到用户设备的播放列表。要在 iPod 库中搜索媒体项或播放列表，你需要使用媒体查询，由类\
    \ `MPMediaQuery` 表示。媒体查询将返回所有符合你指定条件的媒体项或播放列表。要为媒体查询指定条件，你使用一种特殊的以媒体为中心的谓词形式，称为媒体属性谓词，由类\
    \ `MPMediaPropertyPredicate` 表示。\n\n另一种让用户选择媒体项的方法是使用媒体选择器控制器，它是 `MPMediaPickerController`\
    \ 的一个实例。媒体选择器控制器允许你的用户使用他们从 iPod 或 Music 应用程序中已经熟悉的基本界面。\n"
- fmt: "You can play media items using a player controller. There are two kinds of\
    \ player controllers: `MPMusicPlayerController` and `MPMoviePlayerController`.\
    \ The `MPMusicPlayerController` is not a view controller. It is responsible for\
    \ playing audio and managing a list of audio items to be played. Generally speaking,\
    \ you are expected to provide any necessary user interface elements, such as buttons\
    \ to play, pause, skip forward, or backward. The `MediaPlayer` framework provides\
    \ a view controller class, `MPMoviePlayerViewController`, to allow for the simple\
    \ management of a full screen movie player within your applications.\n\nIf you\
    \ want to specify a list of media items to be played by a player controller, you\
    \ use a media item collection, represented by instances of the class `MPMediaItemCollection`.\
    \ Media item collections are immutable collections of media items. A media item\
    \ may appear in more than one spot in the collection, meaning you could conceivably\
    \ create a collection that played “Happy Birthday to You” a thousand times, followed\
    \ by a single playing of “Rock the Casbah.” You could do that … if you really\
    \ wanted to.\n\n## Media Items\n\nThe class that represents media items, `MPMediaItem`,\
    \ works a little differently than most `Objective-C` classes. You would probably\
    \ expect `MPMediaItem` to include properties for things like title, artist, album\
    \ name, and the like. But that is not the case. Other than those inherited from\
    \ `NSObject` and the two `NSCoding` methods used to allow archiving, `MPMediaItem`\
    \ includes only a single instance method called `valueForProperty:`.\n\n`valueForProperty:`\
    \ works much like an instance of `NSDictionary`, only with a limited set of defined\
    \ keys. So, for example, if you wanted to retrieve a media item’s title, you would\
    \ call `valueForProperty:` and specify the key `MPMediaItemPropertyTitle`, and\
    \ the method would return an `NSString` instance with the audio track’s title.\
    \ Media items are immutable on the iOS, so all `MPMediaItem` properties are read-only.\n\
    \nSome media item properties are said to be filterable. Filterable media item\
    \ properties are those that can be searched on, a process you’ll look at a little\
    \ later in the chapter.\n\n### Media Item Persistent ID\n\nEvery media item has\
    \ a persistent identifier (or persistent ID), which is a number associated with\
    \ the item that won’t ever change. If you need to store a reference to a particular\
    \ media item, you should store the persistent ID, because it is generated by iTunes\
    \ and you can count on it staying the same over time.\n\nYou can retrieve the\
    \ persistent ID of a media track using the property key `MPMediaItemPropertyPersistentID`,\
    \ like so:\n\n```\nNSNumber *persistentId = [mediaItem valueForProperty:MPMediaItemPropertyPersistentID];\n\
    ```\n\nPersistent ID is a filterable property, which means that you can use a\
    \ media query to find an item based on its persistent ID. Storing the media item’s\
    \ persistent ID is the surest way to guarantee you’ll get the same object each\
    \ time you search. We’ll talk about media queries a bit later in the chapter.\n\
    \n### Media Type\n\nAll media items have a type associated with them. Currently,\
    \ media items are classified using three categories: audio, video, and generic.\
    \ You can determine a particular media item’s type by asking for the `MPMediaItemPropertyMediaType`\
    \ property, like so:\n\n```\nNSNumber *type = [mediaItem valueForProperty:MPMediaItemPropertyMediaType];\n\
    ```\n\nMedia items may consist of more than a single type. A podcast, for example,\
    \ could be a reading of an audio book. As a result, media type is implemented\
    \ as a bit field (sometimes called bit flags).\n\n**Note**  Bit fields are commonly\
    \ used in C, and Apple employs them in many places throughout its frameworks.\
    \ If you’re not completely sure how bit fields are used, you can check out [Chapter\
    \ 11](#9781430238072_Ch11.xhtml) of *Learn C on the Mac for OS X and iOS* by David\
    \ Mark and James Bucanek (Apress, 2012). You can find a good summary of the concept\
    \ on Wikipedia as well at [http://en.wikipedia.org/wiki/Bitwise_operation](http://en.wikipedia.org/wiki/Bitwise_operation).\n\
    \nWith bit fields, a single integer datatype is used to represent multiple, nonexclusive\
    \ Boolean values, rather than a single number. To convert `type` (an object) into\
    \ an `NSInteger`, which is the documented integer type used to hold media types,\
    \ use the `integerValue` method, like so:\n\n```\nNSInteger mediaType = [type\
    \ integerValue];\n```\n\nAt this point, each bit of `mediaType` represents a single\
    \ type. To determine if a media item is a particular type, you need to use the\
    \ bitwise AND operator (`&`) to compare `mediaType` with system-defined constants\
    \ that represent the available media types. Here is a list of the current constants:\n\
    \n*   `MPMediaTypeMusic`: Used to check if the media is music.\n*   `MPMediaTypePodcast`:\
    \ Used to check if the media is an audio podcast.\n*   `MPMediaTypeAudioBook`:\
    \ Used to check if the media is an audio book.\n*   `MPMediaTypeAudioAny`: Used\
    \ to check if the media is any audio type.\n*   `MPMediaTypeMovie`: Used to check\
    \ if the media is a movie.\n*   `MPMediaTypeTVShow`: Used to check if the media\
    \ is a television show.\n*   `MPMediaTypeVideoPodcast`: Used to check if the media\
    \ is a video podcast.\n*   `MPMediaTypeMusicVideo`: Used to check if the media\
    \ is a music video.\n*   `MPMediaTypeITunesU`: Used to check if the media is an\
    \ iTunes University video.\n*   `MPMediaTypeAnyVideo`: Used to check if the media\
    \ is any video type.\n*   `MPMediaTypeAny`: Used to check if the media is any\
    \ known type.\n\nTo check if a given item contains music, for example, you take\
    \ the `mediaType` you retrieved and do this:\n\n```\nif (mediaType & MPMediaTypeMusic)\
    \ {\n    // It is music. . .\n}\n```\n\n`MPMediaTypeMusic`’s bits are all set\
    \ to 0, except for the one bit that’s used to represent that a track contains\
    \ music, which is set to 1. When you do a bitwise AND (`&`) between that constant\
    \ and the retrieved `mediaType` value, the resulting value will have 0 in all\
    \ bits except the one that’s being checked. That bit will have a 1 if `mediaType`\
    \ has the music bit set or 0 if it doesn’t. In `Objective-C`, an `if` statement\
    \ that evaluates a logical AND or OR operation will fire on any nonzero result;\
    \ the code that follows will run if `mediaType`’s music bit is set; otherwise,\
    \ it will be skipped.\n\nMedia type is a filterable property, so you can specify\
    \ in your media queries (which we’ll talk about shortly) that they should return\
    \ media of only specific types.\n\n### Bitwise Macros\n\nNot every programmer\
    \ is comfortable reading code with bitwise operators. If that describes you, don’t\
    \ despair. It’s easy to create macros to turn these bitwise checks into C function\
    \ macros, like so:\n\n```\n#define isMusic(x)      (x & MPMediaTypeMusic)\n#define\
    \ isPodcast(x)    (x & MPMediaTypePodcast)\n#define isAudioBook(x)  (x & MPMediaTypeAudioBook)\n\
    ```\n\nOnce these are defined, you can check the returned type using more accessible\
    \ code, like this:\n\n```\nif (isMusic([type integerValue])) {\n    // Do something\n\
    }\n```\n\n### Filterable Properties\n\nThere are several properties that you might\
    \ want to retrieve from a media item, including the track’s title, its genre,\
    \ the artist, and the album name. In addition to `MPMediaItemPropertyPersistentID`\
    \ and `MPMediaItemPropertyMediaType`, here are the filterable property constants\
    \ you can use:"
  raw: 'You can play media items using a player controller. There are two kinds of
    player controllers: MPMusicPlayerController and MPMoviePlayerController. The MPMusicPlayerController
    is not a view controller. It is responsible for playing audio and managing a list
    of audio items to be played. Generally speaking, you are expected to provide any
    necessary user interface elements, such as buttons to play, pause, skip forward,
    or backward. The MediaPlayer framework provides a view controller class, MPMoviePlayerViewController,
    to allow for the simple management of a full screen movie player within your applications.


    If you want to specify a list of media items to be played by a player controller,
    you use a media item collection, represented by instances of the class MPMediaItemCollection.
    Media item collections are immutable collections of media items. A media item
    may appear in more than one spot in the collection, meaning you could conceivably
    create a collection that played “Happy Birthday to You” a thousand times, followed
    by a single playing of “Rock the Casbah.” You could do that … if you really wanted
    to.


    Media Items


    The class that represents media items, MPMediaItem, works a little differently
    than most Objective-C classes. You would probably expect MPMediaItem to include
    properties for things like title, artist, album name, and the like. But that is
    not the case. Other than those inherited from NSObject and the two NSCoding methods
    used to allow archiving, MPMediaItem includes only a single instance method called
    valueForProperty:.


    valueForProperty: works much like an instance of NSDictionary, only with a limited
    set of defined keys. So, for example, if you wanted to retrieve a media item’s
    title, you would call valueForProperty: and specify the key MPMediaItemPropertyTitle,
    and the method would return an NSString instance with the audio track’s title.
    Media items are immutable on the iOS, so all MPMediaItem properties are read-only.


    Some media item properties are said to be filterable. Filterable media item properties
    are those that can be searched on, a process you’ll look at a little later in
    the chapter.


    Media Item Persistent ID


    Every media item has a persistent identifier (or persistent ID), which is a number
    associated with the item that won’t ever change. If you need to store a reference
    to a particular media item, you should store the persistent ID, because it is
    generated by iTunes and you can count on it staying the same over time.


    You can retrieve the persistent ID of a media track using the property key MPMediaItemPropertyPersistentID,
    like so:


    ```

    NSNumber *persistentId = [mediaItem valueForProperty:MPMediaItemPropertyPersistentID];

    ```


    Persistent ID is a filterable property, which means that you can use a media query
    to find an item based on its persistent ID. Storing the media item’s persistent
    ID is the surest way to guarantee you’ll get the same object each time you search.
    We’ll talk about media queries a bit later in the chapter.


    Media Type


    All media items have a type associated with them. Currently, media items are classified
    using three categories: audio, video, and generic. You can determine a particular
    media item’s type by asking for the MPMediaItemPropertyMediaType property, like
    so:


    ```

    NSNumber *type = [mediaItem valueForProperty:MPMediaItemPropertyMediaType];

    ```


    Media items may consist of more than a single type. A podcast, for example, could
    be a reading of an audio book. As a result, media type is implemented as a bit
    field (sometimes called bit flags).


    **Note**  Bit fields are commonly used in C, and Apple employs them in many places
    throughout its frameworks. If you’re not completely sure how bit fields are used,
    you can check out [Chapter 11](#9781430238072_Ch11.xhtml) of *Learn C on the Mac
    for OS X and iOS* by David Mark and James Bucanek (Apress, 2012). You can find
    a good summary of the concept on Wikipedia as well at [http://en.wikipedia.org/wiki/Bitwise_operation](http://en.wikipedia.org/wiki/Bitwise_operation)
    .


    With bit fields, a single integer datatype is used to represent multiple, nonexclusive
    Boolean values, rather than a single number. To convert type (an object) into
    an NSInteger, which is the documented integer type used to hold media types, use
    the integerValue method, like so:


    ```

    NSInteger mediaType = [type integerValue];

    ```


    At this point, each bit of mediaType represents a single type. To determine if
    a media item is a particular type, you need to use the bitwise AND operator (&)
    to compare mediaType with system-defined constants that represent the available
    media types. Here is a list of the current constants:


    *   MPMediaTypeMusic: Used to check if the media is music.

    *   MPMediaTypePodcast: Used to check if the media is an audio podcast.

    *   MPMediaTypeAudioBook: Used to check if the media is an audio book.

    *   MPMediaTypeAudioAny: Used to check if the media is any audio type.

    *   MPMediaTypeMovie: Used to check if the media is a movie.

    *   MPMediaTypeTVShow: Used to check if the media is a television show.

    *   MPMediaTypeVideoPodcast: Used to check if the media is a video podcast.

    *   MPMediaTypeMusicVideo: Used to check if the media is a music video.

    *   MPMediaTypeITunesU: Used to check if the media is an iTunes University video.

    *   MPMediaTypeAnyVideo: Used to check if the media is any video type.

    *   MPMediaTypeAny: Used to check if the media is any known type.


    To check if a given item contains music, for example, you take the mediaType you
    retrieved and do this:


    ```

    if (mediaType & MPMediaTypeMusic) {

        // It is music. . .

    }

    ```


    MPMediaTypeMusic’s bits are all set to 0, except for the one bit that’s used to
    represent that a track contains music, which is set to 1\. When you do a bitwise
    AND (&) between that constant and the retrieved mediaType value, the resulting
    value will have 0 in all bits except the one that’s being checked. That bit will
    have a 1 if mediaType has the music bit set or 0 if it doesn’t. In Objective-C,
    an if statement that evaluates a logical AND or OR operation will fire on any
    nonzero result; the code that follows will run if mediaType’s music bit is set;
    otherwise, it will be skipped.


    Media type is a filterable property, so you can specify in your media queries
    (which we’ll talk about shortly) that they should return media of only specific
    types.


    Bitwise Macros


    Not every programmer is comfortable reading code with bitwise operators. If that
    describes you, don’t despair. It’s easy to create macros to turn these bitwise
    checks into C function macros, like so:


    #define isMusic(x)      (x & MPMediaTypeMusic)


    #define isPodcast(x)    (x & MPMediaTypePodcast)


    #define isAudioBook(x)  (x & MPMediaTypeAudioBook)


    Once these are defined, you can check the returned type using more accessible
    code, like this:


    if (isMusic([type integerValue])) {


    // Do something


    }


    Filterable Properties


    There are several properties that you might want to retrieve from a media item,
    including the track’s title, its genre, the artist, and the album name. In addition
    to MPMediaItemPropertyPersistentID and MPMediaItemPropertyMediaType, here are
    the filterable property constants you can use:'
  trans: "\n你可以使用播放器控制器来播放媒体项目。有两种播放器控制器：`MPMusicPlayerController` 和 `MPMoviePlayerController`。`MPMusicPlayerController`\
    \ 并非视图控制器，它负责播放音频以及管理待播放的音频项目列表。通常，你需要提供必要的用户界面元素，例如播放、暂停、快进或快退按钮。`MediaPlayer`\
    \ 框架提供了一个视图控制器类 `MPMoviePlayerViewController`，以便在你的应用程序中轻松管理全屏电影播放器。\n\n如果你希望指定播放器控制器要播放的媒体项目列表，则需要使用媒体项目集合，该类由\
    \ `MPMediaItemCollection` 的实例表示。媒体项目集合是媒体项目的不可变集合。一个媒体项目可以在集合中出现多次，这意味着你理论上可以创建一个集合，先播放一千遍“祝你生日快乐”，然后再播放一遍“Rock\
    \ the Casbah”。如果你真的想这么做……也不是不行。\n\n## 媒体项目\n\n表示媒体项目的类 `MPMediaItem` 的工作方式与大多数\
    \ `Objective-C` 类略有不同。你可能会期望 `MPMediaItem` 包含诸如标题、艺术家、专辑名称等属性。但实际情况并非如此。除了从 `NSObject`\
    \ 继承的属性和用于支持归档的两个 `NSCoding` 方法外，`MPMediaItem` 只包含一个名为 `valueForProperty:` 的实例方法。\n\
    \n`valueForProperty:` 的工作方式很像 `NSDictionary` 的实例，只是它使用的是一组有限的已定义键。例如，如果你想获取媒体项目的标题，你会调用\
    \ `valueForProperty:` 并指定键 `MPMediaItemPropertyTitle`，该方法会返回一个包含音轨标题的 `NSString`\
    \ 实例。媒体项目在 iOS 上是不可变的，因此所有 `MPMediaItem` 属性都是只读的。\n\n一些媒体项目属性被认为是可过滤的。可过滤的媒体项目属性是指那些可以被搜索的属性，你将在本章稍后部分了解这一过程。\n\
    \n### 媒体项目持久化标识\n\n每个媒体项目都有一个持久化标识符（或称持久化 ID），这是一个与该项目关联并且永远不会改变的数字。如果你需要存储对某个特定媒体项目的引用，你应该存储其持久化\
    \ ID，因为它由 iTunes 生成，并且你可以依赖它长期保持不变。\n\n你可以使用属性键 `MPMediaItemPropertyPersistentID`\
    \ 来获取媒体轨道的持久化 ID，如下所示：\n\n```\nNSNumber *persistentId = [mediaItem valueForProperty:MPMediaItemPropertyPersistentID];\n\
    ```\n\n持久化 ID 是一个可过滤属性，这意味着你可以使用媒体查询根据其持久化 ID 来查找项目。存储媒体项目的持久化 ID 是确保每次搜索都能获得同一对象的最可靠方法。我们将在本章稍后部分讨论媒体查询。\n\
    \n### 媒体类型\n\n所有媒体项目都有一个与之关联的类型。目前，媒体项目使用三个类别进行分类：音频、视频和通用。你可以通过请求 `MPMediaItemPropertyMediaType`\
    \ 属性来确定特定媒体项目的类型，如下所示：\n\n```\nNSNumber *type = [mediaItem valueForProperty:MPMediaItemPropertyMediaType];\n\
    ```\n\n媒体项目可能包含多种类型。例如，播客可能是一本有声书的朗读内容。因此，媒体类型是通过位字段（有时称为位标志）实现的。\n\n**注意** 位字段在\
    \ C 语言中被广泛使用，苹果在其许多框架中都采用了这种方式。如果你不太确定位字段的用法，可以查阅 David Mark 和 James Bucanek 所著的\
    \ *Learn C on the Mac for OS X and iOS* (Apress, 2012) 的第 11 章（[#9781430238072_Ch11.xhtml]）。你还可以在维基百科上找到关于此概念的优秀总结，网址为\
    \ [`en.wikipedia.org/wiki/Bitwise_operation`](http://en.wikipedia.org/wiki/Bitwise_operation)。\n\
    \n使用位字段时，单个整数数据类型被用来表示多个非互斥的布尔值，而不是单个数字。要将 `type`（一个对象）转换为 `NSInteger`（文档中定义用于保存媒体类型的整数类型），请使用\
    \ `integerValue` 方法，如下所示：\n\n```\nNSInteger mediaType = [type integerValue];\n\
    ```\n\n此时，`mediaType` 的每一位代表一个单一类型。要判断一个媒体项目是否属于特定类型，你需要使用按位与运算符（`&`）将 `mediaType`\
    \ 与表示可用媒体类型的系统定义常量进行比较。以下是当前常量的列表：\n\n*   `MPMediaTypeMusic`：用于检查媒体是否为音乐。\n* \
    \  `MPMediaTypePodcast`：用于检查媒体是否为音频播客。\n*   `MPMediaTypeAudioBook`：用于检查媒体是否为有声书。\n\
    *   `MPMediaTypeAudioAny`：用于检查媒体是否为任何音频类型。\n*   `MPMediaTypeMovie`：用于检查媒体是否为电影。\n\
    *   `MPMediaTypeTVShow`：用于检查媒体是否为电视剧。\n*   `MPMediaTypeVideoPodcast`：用于检查媒体是否为视频播客。\n\
    *   `MPMediaTypeMusicVideo`：用于检查媒体是否为音乐视频。\n*   `MPMediaTypeITunesU`：用于检查媒体是否为\
    \ iTunes U 视频。\n*   `MPMediaTypeAnyVideo`：用于检查媒体是否为任何视频类型。\n*   `MPMediaTypeAny`：用于检查媒体是否为任何已知类型。\n\
    \n例如，要检查给定的项目是否包含音乐，你可以获取之前得到的 `mediaType`，并执行以下操作：\n\n```\nif (mediaType & MPMediaTypeMusic)\
    \ {\n    // 是音乐...\n}\n```\n\n`MPMediaTypeMusic` 的所有位都设置为 0，除了用于表示音轨包含音乐的那一位被设置为\
    \ 1。当你对该常量和获取的 `mediaType` 值执行按位与（`&`）操作时，结果值中除了正在检查的那一位外，所有位都将为 0。如果 `mediaType`\
    \ 设置了音乐位，则该位将为 1；否则为 0。在 `Objective-C` 中，对一个逻辑与或逻辑或表达式求值的 `if` 语句在任何非零结果下都会触发；如果\
    \ `mediaType` 的音乐位被设置，那么随后的代码将会运行；否则，它将被跳过。\n\n媒体类型是一个可过滤属性，因此你可以在你的媒体查询中（我们稍后会讨论）指定它们只返回特定类型的媒体。\n\
    \n### 位运算宏\n\n并非所有程序员都能适应阅读包含位运算符的代码。如果你也有此困扰，别灰心。很容易创建一些宏，将这些位运算检查转换为 C 函数宏，如下所示：\n\
    \n```\n#define isMusic(x)      (x & MPMediaTypeMusic)\n#define isPodcast(x)  \
    \  (x & MPMediaTypePodcast)\n#define isAudioBook(x)  (x & MPMediaTypeAudioBook)\n\
    ```\n\n一旦定义了这些宏，你就可以使用更易读的代码来检查返回的类型，例如：\n\n```\nif (isMusic([type integerValue]))\
    \ {\n    // 执行某些操作\n}\n```\n\n### 可过滤属性\n\n你可能会想从媒体项目中检索多个属性，包括音轨的标题、流派、艺术家和专辑名称。除了\
    \ `MPMediaItemPropertyPersistentID` 和 `MPMediaItemPropertyMediaType` 之外，以下是你可用的可过滤属性常量：\n"
- fmt: '- `MPMediaItemPropertyAlbumPersistentID`: 返回物品专辑的持久化 ID。

    - `MPMediaItemPropertyArtistPersistentID`: 返回物品艺术家的持久化 ID。

    - `MPMediaItemPropertyAlbumArtistPersistentID`: 返回物品专辑的主要艺术家的持久化 ID。

    - `MPMediaItemPropertyGenrePersistentID`: 返回物品流派的持久化 ID。

    - `MPMediaItemPropertyComposerPersistentID`: 返回物品作曲家的持久化 ID。

    - `MPMediaItemPropertyPodcastPersistentID`: 返回物品播客的持久化 ID。

    - `MPMediaItemPropertyTitle`: 返回物品的标题，通常表示歌曲名称。

    - `MPMediaItemPropertyAlbumTitle`: 返回物品专辑的名称。

    - `MPMediaItemPropertyArtist`: 返回录制该物品的艺术家的名称。

    - `MPMediaItemPropertyAlbumArtist`: 返回物品专辑的主要艺术家名称。

    - `MPMediaItemPropertyGenre`: 返回物品的流派（例如，古典、摇滚或另类）。

    - `MPMediaItemPropertyComposer`: 返回物品作曲家的名称。

    - `MPMediaItemPropertyIsCompilation`: 如果物品是合集的一部分，则返回 `true`。

    - `MPMediaItemPropertyPodcastTitle`: 如果音轨是播客，则返回播客名称。


    尽管标题和艺术家几乎总是已知的，但这些属性都不保证会返回值，因此只要程序逻辑包含这些值中的任何一个，都必须进行防御性编码。虽然不太可能，但媒体音轨可以在没有指定名称或艺术家的情况下存在。


    以下是一个从媒体项中检索字符串属性的示例：


    ```objectivec

    NSString *title = [mediaItem valueForProperty:MPMediaItemPropertyTitle];

    ```


    ## 不可过滤的数值属性


    几乎所有你能在 iTunes 中确定的关于音频或视频项目的信息都可以从媒体项中检索到。以下列表中的值是不可过滤的——换句话说，你不能在媒体属性谓词中使用它们。例如，你不能检索所有长度超过四分钟的音轨。但是一旦有了一个媒体项，就可以获得关于该项目的丰富信息。


    - `MPMediaItemPropertyPlaybackDuration`: 返回音轨的长度（以秒为单位）。

    - `MPMediaItemPropertyAlbumTrackNumber`: 返回该音轨在其专辑中的编号。

    - `MPMediaItemPropertyAlbumTrackCount`: 返回该音轨所属专辑的总音轨数。

    - `MPMediaItemPropertyDiscNumber`: 如果音轨来自多碟专辑合集，返回该音轨的光盘编号。

    - `MPMediaItemPropertyDiscCount`: 如果音轨来自多碟专辑合集，返回该合集的总光盘数。

    - `MPMediaItemPropertyBeatsPerMinute`: 返回物品的每分钟节拍数。

    - `MPMediaItemPropertyReleaseDate`: 返回物品的发行日期。

    - `MPMediaItemPropertyComments`: 返回在“显示简介”选项卡中输入的物品注释。


    数值属性总是作为 `NSNumber` 的实例返回。音轨时长是一个 `NSTimeInterval`，可以通过使用 `doubleValue` 方法从 `NSNumber`
    中检索。其余的是无符号整数，可以使用 `unsignedIntegerValue` 方法检索。


    以下是几个从媒体项中检索数值属性的示例：


    ```objectivec

    NSNumber *durationNum = [mediaItem valueForProperty:MPMediaItemPropertyPlaybackDuration];

    NSTimeInterval duration = [durationNum doubleValue];


    NSNumber *trackNum = [mediaItem valueForProperty:MPMediaItemPropertyAlbumTrackNumber];

    NSUInteger trackNumber = [trackNum unsignedIntegerValue];

    ```


    ## 检索歌词


    如果媒体音轨有关联的歌词，你可以使用属性键 `MPMediaItemPropertyLyrics` 来检索它们。歌词将以 `NSString` 实例的形式返回，如下所示：


    ```objectivec

    NSString *lyrics = [mediaItem valueForProperty:MPMediaItemPropertyLyrics];

    ```


    ## 检索专辑插图


    一些媒体音轨有相关的图片。在大多数情况下，这将是音轨专辑的封面图片，但也可能是其他内容。你可以使用属性键 `MPMediaItemPropertyArtwork`
    检索专辑插图，该键返回 `MPMediaItemArtwork` 类的实例。`MPMediaItemArtwork` 类有一个方法，可以返回与指定大小匹配的
    `UIImage` 实例。以下是一些获取媒体项专辑插图的代码，该插图适合 100x100 像素的视图：


    ```objectivec

    MPMediaItemArtwork *art = [mediaItem valueForProperty:MPMediaItemPropertyArtwork];

    CGSize imageSize = {100.0, 100.0};

    UIImage *image = [art imageWithSize:imageSize];

    ```


    ## 用户自定义属性


    可以从媒体项中检索的另一组数据称为*用户自定义*属性。这些是根据用户交互在媒体项上设置的属性。这些属性包括播放次数和评分。


    - `MPMediaItemPropertyPlayCount`: 返回该音轨被播放的总次数。

    - `MPMediaItemPropertySkipCount`: 返回该音轨被跳过的总次数。

    - `MPMediaItemPropertyRating`: 返回音轨的评分，如果音轨未被评分，则返回 0。

    - `MPMediaItemPropertyLastPlayedDate`: 返回音轨上次播放的日期。

    - `MPMediaItemPropertyUserGrouping`: 返回 iTunes“显示简介”面板中“分组”选项卡的信息。


    ## 资源 URL 属性


    最后一个要讨论的属性是在 iOS 4 中添加的，用于 AVFoundation。我们将在这里提及，但稍后再讨论：


    `MPMediaItemPropertyAssetURL`: 一个指向用户媒体库中媒体项的 `NSURL`。


    ## 媒体项集合


    媒体项可以分组到集合中，创造性地称为*媒体项集合*。实际上，这就是你如何指定要由播放控制器播放的媒体项列表的方式。媒体项集合由 `MPMediaItemCollection`
    类表示，是媒体项的不可变集合。你可以创建新的媒体项集合，但一旦创建，就不能更改集合的内容。


    ### 创建新集合


    创建媒体项集合的最简单方法是将所有你想要放入集合的媒体项按顺序放入 `NSArray` 的实例中。然后，你可以将 `NSArray` 的实例传递给工厂方法
    `collectionWithItems:`，如下所示：


    ```objectivec

    NSArray *items = @[mediaItem1, mediaItem2];

    MPMediaItemCollection *collection = [MPMediaItemCollection collectionWithItems:items];

    ```


    ### 检索媒体项


    要从媒体项集合中检索特定的媒体项，你可以使用实例方法 `items`，该方法返回一个 `NSArray` 实例，其中包含集合中所有媒体项，顺序与其在集合中的顺序一致。例如，如果你想检索特定索引处的媒体项，可以这样做：


    ```objectivec

    MPMediaItem *item = [[mediaCollection items] objectAtIndex:5];

    ```


    ### 创建派生集合


    由于媒体项集合是不可变的，你不能向集合添加项目，也不能将一个媒体项集合的内容追加到另一个集合中。但是，由于你可以通过实例方法 `items` 访问集合中包含的媒体项数组，因此你可以制作项目数组的可变副本，操作可变数组的内容，然后基于修改后的数组创建一个新集合。


    以下是将单个媒体项追加到现有集合末尾的代码：


    ```objectivec

    NSMutableArray *items = [[originalCollection items] mutableCopy];

    [items addObject:mediaItem];

    MPMediaItemCollection *newCollection = [MPMediaItemCollection collectionWithItems:items];

    ```


    类似地，要合并两个不同的集合，需要合并它们的项目，然后从合并后的数组创建一个新集合。'
  raw: '*   MPMediaItemPropertyAlbumPersistentID: Returns the item’s album’s persistent
    ID.

    *   MPMediaItemPropertyArtistPersistentID: Returns the item’s artist’s persistent
    ID.

    *   MPMediaItemPropertyAlbumArtistPersistentID: Return item’s album’s principle
    artist’s persistent ID.

    *   MPMediaItemPropertyGenrePersistentID: Return item’s genre’s persistent ID.

    *   MPMediaItemPropertyComposerPersistentID: Return item’s composer’s persistent
    ID.

    *   MPMediaItemPropertyPodcastPersistentID: Return item’s podcast’s persistent
    ID.

    *   MPMediaItemPropertyTitle: Returns the item’s title, which usually means the
    name of the song.

    *   MPMediaItemPropertyAlbumTitle: Returns the name of the item’s album.

    *   MPMediaItemPropertyArtist: Returns the name of the artist who recorded the
    item.

    *   MPMediaItemPropertyAlbumArtist: Returns the name of the principal artist behind
    the item’s album.

    *   MPMediaItemPropertyGenre: Returns the item’s genre (e.g., classical, rock,
    or alternative).

    *   MPMediaItemPropertyComposer: Returns the name of the item’s composer.

    *   MPMediaItemPropertyIsCompilation: If the item is part of a compilation, returns
    true.

    *   MPMediaItemPropertyPodcastTitle: If the track is a podcast, returns the podcast’s
    name.


    Although the title and artist will almost always be known, none of these properties
    are guaranteed to return a value, so it’s important to code defensively any time
    your program logic includes one of these values. Although unlikely, a media track
    can exist without a specified name or artist.


    Here’s an example that retrieves a string property from a media item:


    ```

    NSString *title = [mediaItem valueForProperty:MPMediaItemPropertyTitle];

    ```


    Nonfilterable Numerical Attributes


    Nearly anything that you can determine about an audio or video item in iTunes
    can be retrieved from a media item. The values in the following list are not filterable—in
    other words, you can’t use them in your media property predicates. You can’t,
    for example, retrieve all the tracks that are longer than four minutes in length.
    But once you have a media item, there’s a wealth of information available about
    that item.


    *   MPMediaItemPropertyPlaybackDuration: Returns the length of the track in seconds.

    *   MPMediaItemPropertyAlbumTrackNumber: Returns the number of this track on its
    album.

    *   MPMediaItemPropertyAlbumTrackCount: Returns the number of tracks on this track’s
    album.

    *   MPMediaItemPropertyDiscNumber: If the track is from a multiple-album collection,
    returns the track’s disc number.

    *   MPMediaItemPropertyDiscCount: If the track is from a multiple-album collection,
    returns the total number of discs in that collection.

    *   MPMediaItemPropertyBeatsPerMinute: Returns the beats per minute of the item.

    *   MPMediaItemPropertyReleaseDate: Returns the release date of the item.

    *   MPMediaItemPropertyComments: Returns the item’s comments entered in the Get
    Info tab.


    Numeric attributes are always returned as instances of NSNumber. The track duration
    is an NSTimeInterval, which can be retrieved from NSNumber by using the doubleValue
    method. The rest are unsigned integers that can be retrieved using the unsignedIntegerValue
    method.


    Here are a few examples of retrieving numeric properties from a media item:


    ```

    NSNumber *durationNum = [mediaItem valueForProperty:MPMediaItemPropertyPlaybackDuration];

    NSTimeInterval duration = [durationNum doubleValue];


    NSNumber *trackNum = [mediaItem valueForProperty:MPMediaItemPropertyAlbumTrackNumber];

    NSUInteger trackNumber = [trackNum unsignedIntegerValue];

    ```


    Retrieving Lyrics


    If a media track has lyrics associated with it, you can retrieve those using the
    property key MPMediaItemPropertyLyrics. The lyrics will be returned in an instance
    of NSString, like so:


    ```

    NSString *lyrics = [mediaItem valueForProperty:MPMediaItemPropertyLyrics];

    ```


    Retrieving Album Artwork


    Some media tracks have a piece of artwork associated with them. In most instances,
    this will be the track’s album’s cover picture, though it could be something else.
    You retrieve the album artwork using the property key MPMediaItemPropertyArtwork,
    which returns an instance of the class MPMediaItemArtwork. The MPMediaItemArtwork
    class has a method that returns an instance of UIImage to match a specified size.
    Here’s some code to get the album artwork for a media item that would fit into
    a 100-by-100 pixel view:


    ```

    MPMediaItemArtwork *art = [mediaItem valueForProperty:MPMediaItemPropertyArtwork];

    CGSize imageSize = {100.0, 100.0};

    UIImage *image = [art imageWithSize:imageSize];

    ```


    User-Defined Properties


    Another set of data that you can retrieve from a media item are termed *User-Defined*.
    These are properties set on the media item based on the user’s interaction. These
    include properties like play counts and ratings.


    *   MPMediaItemPropertyPlayCount: Returns the total number of times that this
    track has been played.

    *   MPMediaItemPropertySkipCount: Returns the total number of times this track
    has been skipped.

    *   MPMediaItemPropertyRating: Returns the track’s rating, or 0 if the track has
    not been rated.

    *   MPMediaItemPropertyLastPlayedDate: Returns the date the track was last played.

    *   MPMediaItemPropertyUserGrouping: Returns the info from the Grouping tab from
    the iTunes Get Info panel.


    AssetURL Property


    There is one last property to discuss was added in iOS 4, for use in AVFoundation.
    We’ll mention it here, but discuss it later:


    MPMediaItemPropertyAssetURL: An NSURL pointing to a media item in the user’s media
    library.


    Media Item Collections


    Media items can be grouped into collections, creatively called *media item collections*.
    In fact, this is how you specify a list of media items to be played by the player
    controllers. Media item collections, which are represented by the class MPMediaItemCollection,
    are immutable collections of media items. You can create new media item collections,
    but you can’t change the contents of the collection once it has been created.


    Creating a New Collection


    The easiest way to create a media item collection is to put all the media items
    you want to be in the collection into an instance of NSArray, in the order you
    want them. You can then pass the instance of NSArray to the factory method collectionWithItems:,
    like so:


    ```

    NSArray *items = @[mediaItem1, mediaItem2];

    MPMediaItemCollection *collection = [MPMediaItemCollection collectionWithItems:items];

    ```


    Retrieving Media Items


    To retrieve a specific media item from a media item collection, you use the instance
    method items, which returns an NSArray instance containing all of the media items
    in the order they exist in the collection. If you want to retrieve the specific
    media item at a particular index, for example, you would do this:


    ```

    MPMediaItem *item = [[mediaCollection items] objectAtIndex:5];

    ```


    Creating Derived Collections


    Because media item collections are immutable, you can’t add items to a collection,
    nor can you append the contents of another media item collection onto another
    one. Since you can get to an array of media items contained in a collection using
    the instance method items, however, you can make a mutable copy of the items array,
    manipulate the mutable array’s contents, and then create a new collection based
    on the modified array.


    Here’s some code that appends a single media item onto the end of an existing
    collection:


    ```

    NSMutableArray *items = [[originalCollection items] mutableCopy];

    [items addObject:mediaItem];

    MPMediaItemCollection *newCollection = [MPMediaItemCollection collectionWithItems:items];

    ```


    Similarly, to combine two different collections, you combine their items and create
    a new collection from the combined array:'
