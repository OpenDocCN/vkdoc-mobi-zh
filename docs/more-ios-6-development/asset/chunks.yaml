    Security Never Sleeps


    As we stated at the beginning of the chapter, security is a process. It’s something
    you need to think about every step of the way when developing your application,
    and beyond. We’ve given you a taste of the functionality that’s available in iOS
    via the Security framework. Hopefully it’s enough information to give you a solid
    basis for your future application development.


    If you’re interested in learning more, read Apple’s Secure Coding Guide ([https://developer.apple.com/library/ios/#documentation/Security/Conceptual/SecureCodingGuide/](https://developer.apple.com/library/ios/#documentation/Security/Conceptual/SecureCodingGuide/)
    ). Another general security resource is *Foundations of Security* by Christoph
    Kern, Anita Kesavan, and Neil Daswani (Apress, 2007). While this book is a few
    years old now, the principles it covers remain perfectly valid.


    Next up, you’re going work on keeping your interface responsive in iOS. It’s quite
    a shift from what you just covered. Take a deep breath and turn the page.


    Chapter    14


    Keeping Your Interface Responsive


    As we’ve mentioned a few times in this book, if you try to do too much at one
    time in an action or delegate method, or in a method called from one of those
    methods, your application’s interface can skip or even freeze while the long-running
    method does its job. As a general rule, you do not want your application’s user
    interface to ever become unresponsive. Your user will expect to be able to interact
    with your application at all times, or at the very least will expect to be kept
    updated by your user interface when they aren’t allowed to interact with it.


    In computer programming, the ability to have multiple sets of operations happening
    at the same time is referred to, generally, as *concurrency*. In this chapter,
    we’re going to look at some more general-purpose solutions for adding concurrency
    to your application. These solutions will allow your user interface to stay responsive
    even when your application is performing long-running tasks. Although there are
    many ways to add concurrency to an application, we’re going to look at just two,
    but these two, combined with what you already know about run loop scheduling for
    networking, should allow you to accommodate just about any long-running task.'
