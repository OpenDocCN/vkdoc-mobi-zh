    \n# Figure 15-4: The failed test in Xcode\n\nThis seems like a good time to discuss\
    \ the format of the unit tests. In the Project Navigator, open the group named\
    \ `DebugTestTests`, and select `DebugTestTests.h`.\n\n```\n#import <SenTestingKit/SenTestingKit.h>\n\
    \n@interface DebugTestTests : SenTestCase\n\n@end\n```\n\nThis is a very simple\
    \ header file. It imports the header `SenTestingKit.h` and declares the class\
    \ `DebugTestTests` to inherit from `SenTestCase`. What is `SenTestingKit`? The\
    \ unit testing framework Xcode uses is called `OCUnit`. `OCUnit` was developed\
    \ by a company called SenTe ([www.sente.ch/software/ocunit/](http://www.sente.ch/software/ocunit/)).\
    \ They define `OCUnit` as three components: `SenTestingKit`, a framework to help\
    \ write tests; `otest`, a testing tool to execute tests; and a set of files and\
    \ utilities to integrate testing with Xcode. So while you may use `OCUnit` and\
    \ `SenTestingKit` interchangeably, `OCUnit` refers to the entire testing suite,\
    \ while `SenTestingKit` is the Objective-C framework to write tests.\n\nLet’s\
    \ look at `DebugMeTests.m`.\n\n```\n#import \"DebugTestTests.h\"\n\n@implementation\
    \ DebugTestTests\n\n- (void)setUp\n{\n    [super setUp];\n\n    // Set-up code\
    \ here.\n}\n\n- (void)tearDown\n{\n    // Tear-down code here.\n\n    [super tearDown];\n\
    }\n\n- (void)testExample\n{\n    STFail(@\"Unit tests are not implemented yet\
    \ in DebugTestTests\");\n}\n\n@end\n```\n\nEach unit test follows a simple process:\
    \ set up the test, execute the test, tear down the test. Using `OCUnit`, each\
    \ test is defined as a method prepended by the word `test`. Since each test needs\
    \ to run in isolation, each test method follows the set up/test/tear down cycle.\n\
    \nIn the case of `DebugMeTests.m`, you can see the one test method, `testExample`.\
    \ The body of that method consists of one line, which invokes the function `STFail`.\
    \ `STFail` is an assertion that forces the test to fail. Let’s fix this to pass.\
    \ Replace `STFail` with this:\n\n```\n- (void)testExample\n{\n    STAssertTrue(YES,\
    \ @\"Make this test pass\");\n}\n```\n\n**Note:** For a complete list of test\
    \ assertions, check the file `SenTestCase.h` in the `SenTestingKit` framework.\n\
    \nRun the tests again (to shortcut this, hit `CMD-U`). This time they should succeed.\n\
    \nWhat have you done here? You made a test pass without actually fixing or testing\
    \ anything. This is a very important point: unit testing is not a silver bullet.\
    \ The tests are only as good as you write them. It’s important to make sure you\
    \ write meaningful tests. A generally accepted practice is called *Test First*:\
    \ write your test, write your application code such that your test fails, then\
    \ adjust the code to make the test pass. An interesting side effect is that your\
    \ code tends to be shorter, clearer, and more concise.\n\nLet’s define an object\
    \ with some simple methods that you can test. Create a new file, choosing the\
    \ Objective-C class. Name the class `DebugMe` and make it a subclass of `NSObject`.\
    \ When you save the file, make sure it is assigned only to the `DebugTest` target\
    \ (Figure 15-5).\n\n![9781430238072_Fig15-05.jpg](images/9781430238072_Fig15-05.jpg)\n\
    \n# Figure 15-5: Save the DebugMe class to the DebugTest target only\n\nSelect\
    \ `DebugMe.h` and edit it to appear as follows:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface DebugMe : NSObject\n\n@property (nonatomic, strong) NSString *string;\n\
    ```"
