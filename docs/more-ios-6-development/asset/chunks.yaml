- fmt: 'Unlike to-many relationships, fetched properties are ordered collections and
    can have a specified sort order. Oddly enough, the data model editor doesn’t allow
    you to specify how fetched properties are sorted. If you care about the order
    of the objects in a fetched property, you must actually write code to do that,
    which you’ll look at later in this chapter.


    Once you’ve created a fetched property, working with it is pretty straightforward.
    You just use `valueForKey:` to retrieve the objects that meet the fetched property’s
    criteria in an instance of `NSArray`.


    ```

    NSArray *olderPeople = [person valueForKey:@"olderPeople"];

    ```


    If you use a custom `NSManagedObject` subclass and define a property for the fetched
    property, you can also use dot notation to retrieve objects that meet the fetched
    property’s criteria in an `NSArray` instance, like so:


    ```

    NSArray *olderPeople = person.olderPeople;

    ```


    ## Creating Relationships and Fetched Properties in the Data Model Editor


    The first step in using relationships or fetched properties is to add them to
    your data model. Let’s add the relationship and fetched properties you’ll need
    in your `SuperDB` application now. If you look back at [Figure 7-1](#9781430238072_Ch07.xhtml#Fig1),
    you can probably guess that you’re going to need a new entity to represent the
    heroes’ powers, as well as a relationship from your existing `Hero` entity to
    the new `Power` entity you’re going to create. You’ll also need four fetched properties
    to represent the four different reports.


    ### Delete Rules


    Every relationship, regardless of its type, has something called a delete rule,
    which specifies what happens when one object in the relationship is deleted. There
    are four possible delete rules:


    - **Nullify:** This is the default delete rule. With this delete rule, when one
    object is deleted, the inverse relationship is just updated so that it doesn’t
    point to anything. If the inverse relationship is a to-one relationship, it is
    set to `nil`. If the inverse relationship is a to-many relationship, the deleted
    object will be removed from the inverse relationship. This option ensures that
    there are no references to the object being deleted, but does nothing more.

    - **No Action:** If you specify a delete rule of No Action, when you delete one
    object from a relationship, nothing happens to the other object. Instances where
    you would use this particular rule are extremely rare and are generally limited
    to one-way relationships with no inverse. This action is rarely used because the
    other object’s inverse relationship would end up pointing to an object that no
    longer exists.

    - **Cascade:** If you set the delete rule to Cascade, when you delete a managed
    object, all the objects in the relationship are also removed. This is a more dangerous
    option than Nullify, in that deleting one object can result in the deletion of
    other objects. You would typically choose Cascade when a relationship’s inverse
    relationship is to-one and the related object is not used in any other relationships.
    If the object or objects in the relationship are used only for this relationship
    and not for any other reason, then you probably do want a Cascade rule, so that
    you don’t leave orphaned objects sitting in the persistent store taking up space.

    - **Deny:** This delete rule option will actually prevent an object from being
    deleted if there are any objects in this association, making it the safest option
    in terms of data integrity. The Deny option is not used frequently, but if you
    have situations where an object shouldn’t be deleted as long as it has any objects
    in a specific relationship, this is the one you would choose.


    ## Expressions and Aggregates


    Another use of expressions is to aggregate attributes without loading them all
    into memory. If you want to get the average, median, minimum, or maximum for a
    specific attribute, such as the average age of your heroes or count of female
    heroes, you can do that (and more) with an expression. In fact, that’s how you
    should do it. To understand why, you need to know a little about the way Core
    Data works under the hood.


    The fetched results controller you’re using in `HeroListController` contains objects
    for all of the heroes in your database, but it doesn’t have all of them fully
    loaded into memory as managed objects. Core Data has a concept of a fault. A fault
    is sort of like a stand-in for a managed object. A fault object knows a bit about
    the managed object it’s standing in for, such as its unique ID and perhaps the
    value of one attribute being displayed, but it’s not a fully managed object.


    A fault turns into a full-fledged managed object when something triggers the fault.
    Triggering a fault usually happens when you access an attribute or key that the
    fault doesn’t know about. Core Data is smart enough to turn a fault into a managed
    object when necessary, so your code usually doesn’t need to worry about whether
    it’s dealing with a fault or a managed object. However, it’s important to know
    about this behavior so you don’t unintentionally cause performance problems by
    triggering faults unnecessarily.


    Most likely, the faults in your fetched results controller don’t know anything
    about the `sex` attribute of `Hero`. So, if you were to loop through the heroes
    in your fetched results controller to get a count of the female heroes, you would
    be triggering every fault to become a managed object. That’s inefficient because
    it uses a lot more memory and processing power than necessary. Instead, you can
    use expressions to retrieve aggregate values from Core Data without triggering
    faults.


    Here’s an example of how to use an expression to retrieve the average birth date
    calculated for all female heroes in your application (you can’t use age in a fetch
    request because it’s a transient attribute that isn’t stored).


    ```

    NSExpression *ex = [NSExpression expressionForFunction:@"average:"

                                     arguments:@[[NSExpression expressionForKeyPath:@"birthdate"]]];

    NSPredicate *pred = [NSPredicate predicateWithFormat:@"sex == ''Female''"];


    NSExpressionDescription *ed = [[NSExpressionDescription alloc] init];

    [ed setName:@"averageBirthdate"];

    [ed setExpression:ex];

    [ed setExpressionResultType:NSDateAttributeType];


    NSArray *properties = [NSArray arrayWithObject:ed];


    NSFetchRequest *request = [[NSFetchRequest alloc] init];

    [request setPredicate:pred];

    [request setPropertiesToFetch:properties];

    [request setResultType:NSDictionaryResultType];


    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Hero"

                                              inManagedObjectContext:context];

    [request setEntity:entity];


    NSArray *results = [context executeFetchRequest:request error:nil];

    NSDate *date = [results objectAtIndex:0];

    NSLog(@"Average birthdate for female heroes: %@", date);

    ```


    Aggregate expressions are relatively new to Core Data. As of this writing, the
    process of using expressions to obtain aggregates is not thoroughly documented,
    but the preceding code sample, along with the API documentation for `NSExpression`
    and `NSExpressionDescription`, should get you pointed in the right direction for
    working with aggregates.


    ## Adding the Power Entity


    Before you start making changes, create a new version of your data model by single-clicking
    the current version in the Groups & Files pane (the one with the green check mark),
    and then selecting “Add Model Version” from the Data Model submenu of the Design
    menu. This ensures that the data you collected using the previous data models
    migrate properly to the new version you’ll be creating in this chapter.'
  raw: 'Unlike to-many relationships, fetched properties are ordered collections and
    can have a specified sort order. Oddly enough, the data model editor doesn’t allow
    you to specify how fetched properties are sorted. If you care about the order
    of the objects in a fetched property, you must actually write code to do that,
    which you’ll look at later in this chapter.


    Once you’ve created a fetched property, working with it is pretty straightforward.
    You just use valueForKey: to retrieve the objects that meet the fetched property’s
    criteria in an instance of NSArray.


    ```

    NSArray *olderPeople = [person valueForKey:@"olderPeople"];

    ```


    If you use a custom NSManagedObject subclass and define a property for the fetched
    property, you can also use dot notation to retrieve objects that meet the fetched
    property’s criteria in an NSArray instance, like so:


    ```

    NSArray *olderPeople = person.olderPeople;

    ```


    Creating Relationships and Fetched Properties in the Data Model Editor


    The first step in using relationships or fetched properties is to add them to
    your data model. Let’s add the relationship and fetched properties you’ll need
    in your SuperDB application now. If you look back at [Figure 7-1](#9781430238072_Ch07.xhtml#Fig1),
    you can probably guess that you’re going to need a new entity to represent the
    heroes’ powers, as well as a relationship from your existing Hero entity to the
    new Power entity you’re going to create. You’ll also need four fetched properties
    to represent the four different reports.


    Delete Rules


    Every relationship, regardless of its type, has something called a delete rule,
    which specifies what happens when one object in the relationship is deleted. There
    are four possible delete rules:


    *   **Nullify:**This is the default delete rule. With this delete rule, when one
    object is deleted, the inverse relationship is just updated so that it doesn’t
    point to anything. If the inverse relationship is a to-one relationship, it is
    set to nil. If the inverse relationship is a to-many relationship, the deleted
    object will be removed from the inverse relationship. This option ensures that
    there are no references to the object being deleted, but does nothing more.

    *   **No Action:**If you specify a delete rule of No Action, when you delete one
    object from a relationship, nothing happens to the other object. Instances where
    you would use this particular rule are extremely rare and are generally limited
    to one-way relationships with no inverse. This action is rarely used because the
    other object’s inverse relationship would end up pointing to an object that no
    longer exists.

    *   **Cascade:**If you set the delete rule to Cascade, when you delete a managed
    object, all the objects in the relationship are also removed. This is a more dangerous
    option than Nullify, in that deleting one object can result in the deletion of
    other objects. You would typically choose Cascade when a relationship’s inverse
    relationship is to-one and the related object is not used in any other relationships.
    If the object or objects in the relationship are used only for this relationship
    and not for any other reason, then you probably do want a Cascade rule, so that
    you don’t leave orphaned objects sitting in the persistent store taking up space.

    *   **Deny:**This delete rule option will actually prevent an object from being
    deleted if there are any objects in this association, making it the safest option
    in terms of data integrity. The Deny option is not used frequently, but if you
    have situations where an object shouldn’t be deleted as long as it has any objects
    in a specific relationship, this is the one you would choose.


    Expressions and Aggregates


    Another use of expressions is to aggregate attributes without loading them all
    into memory. If you want to get the average, median, minimum, or maximum for a
    specific attribute, such as the average age of your heroes or count of female
    heroes, you can do that (and more) with an expression. In fact, that’s how you
    should do it. To understand why, you need to know a little about the way Core
    Data works under the hood.


    The fetched results controller you’re using in HeroListController contains objects
    for all of the heroes in your database, but it doesn’t have all of them fully
    loaded into memory as managed objects. Core Data has a concept of a fault. A fault
    is sort of like a stand-in for a managed object. A fault object knows a bit about
    the managed object it’s standing in for, such as its unique ID and perhaps the
    value of one attribute being displayed, but it’s not a fully managed object.


    A fault turns into a full-fledged managed object when something triggers the fault.
    Triggering a fault usually happens when you access an attribute or key that the
    fault doesn’t know about. Core Data is smart enough to turn a fault into a managed
    object when necessary, so your code usually doesn’t need to worry about whether
    it’s dealing with a fault or a managed object. However, it’s important to know
    about this behavior so you don’t unintentionally cause performance problems by
    triggering faults unnecessarily.


    Most likely, the faults in your fetched results controller don’t know anything
    about the sex attribute of Hero. So, if you were to loop through the heroes in
    your fetched results controller to get a count of the female heroes, you would
    be triggering every fault to become a managed object. That’s inefficient because
    it uses a lot more memory and processing power than necessary. Instead, you can
    use expressions to retrieve aggregate values from Core Data without triggering
    faults.


    Here’s an example of how to use an expression to retrieve the average birth date
    calculated for all female heroes in your application (you can’t use age in a fetch
    request because it’s a transient attribute that isn’t stored).


    ```

    NSExpression *ex = [NSExpression expressionForFunction:@"average:"

                                     arguments:@[[NSExpression expressionForKeyPath:@"birthdate"]]];

    NSPredicate *pred = [NSPredicate predicateWithFormat:@"sex == ''Female''"];


    NSExpressionDescription *ed = [[NSExpressionDescription alloc] init];

    [ed setName:@"averageBirthdate"];

    [ed setExpression:ex];

    [ed setExpressionResultType:NSDateAttributeType];


    NSArray *properties = [NSArray arrayWithObject:ed];


    NSFetchRequest *request = [[NSFetchRequest alloc] init];

    [request setPredicate:pred];

    [request setPropertiesToFetch:properties];

    [request setResultType:NSDictionaryResultType];


    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Hero"

                                              inManagedObjectContext:context];

    [request setEntity:entity];


    NSArray *results = [context executeFetchRequest:request error:nil];

    NSDate *date = [results objectAtIndex:0];

    NSLog(@"Average birthdate for female heroes: %@", date);

    ```


    Aggregate expressions are relatively new to Core Data. As of this writing, the
    process of using expressions to obtain aggregates is not thoroughly documented,
    but the preceding code sample, along with the API documentation for NSExpression
    and NSExpressionDescription, should get you pointed in the right direction for
    working with aggregates.


    Adding the Power Entity


    Before you start making changes, create a new version of your data model by single-clicking
    the current version in the Groups & Files pane (the one with the green check mark),
    and then selecting “Add Model Version” from the Data Model submenu of the Design
    menu. This ensures that the data you collected using the previous data models
    migrate properly to the new version you’ll be creating in this chapter.'
  trans: '

    与对多关系不同，提取属性是有序集合，并且可以指定排序顺序。奇怪的是，数据模型编辑器并不允许你指定提取属性的排序方式。如果你在意提取属性中对象的顺序，就必须编写代码来实现，这一点将在本章后面进行介绍。


    一旦创建了提取属性，使用它就变得相当简单。你只需使用 `valueForKey:` 即可在 `NSArray` 实例中检索满足提取属性条件的对象。


    ```

    NSArray *olderPeople = [person valueForKey:@"olderPeople"];

    ```


    如果你使用自定义的 `NSManagedObject` 子类并为提取属性定义一个属性，也可以使用点表示法在 `NSArray` 实例中检索满足提取属性条件的对象，例如：


    ```

    NSArray *olderPeople = person.olderPeople;

    ```


    ## 在数据模型编辑器中创建关系和提取属性


    使用关系或提取属性的第一步是将它们添加到数据模型中。现在，让我们添加你在 `SuperDB` 应用程序中需要的关系和提取属性。回顾一下图 7-1，你大概能猜到，你需要一个新实体来表示英雄的能力，以及从现有的
    `Hero` 实体到你将创建的新 `Power` 实体的一个关系。你还需要四个提取属性来表示四个不同的报告。


    ### 删除规则


    每个关系，无论其类型如何，都有一个称为删除规则的东西，它指定当关系中的一个对象被删除时会发生什么。有四种可能的删除规则：


    - **置空：** 这是默认的删除规则。使用此删除规则时，当一个对象被删除时，反向关系只会被更新，使其不指向任何东西。如果反向关系是一对一关系，则将其设置为
    `nil`。如果反向关系是一对多关系，则被删除的对象将从该反向关系中移除。此选项确保没有对被删除对象的引用，但仅此而已。

    - **无动作：** 如果你指定删除规则为无动作，则当你从关系中删除一个对象时，另一个对象不会发生任何变化。使用此特定规则的情况极为罕见，通常仅限于没有反向关系的单向关系。此操作很少使用，因为另一个对象的反向关系最终会指向一个不再存在的对象。

    - **级联：** 如果你将删除规则设置为级联，则当你删除一个托管对象时，关系中的所有对象也将被移除。这比置空规则更危险，因为删除一个对象可能导致其他对象被删除。当关系的反向关系是一对一，且相关对象未用于任何其他关系时，你通常会选择级联。如果关系中的一个或多个对象仅用于此关系而别无他用，那么你可能确实需要级联规则，以免在持久化存储中留下孤立对象占用空间。

    - **拒绝：** 如果此关联中存在任何对象，此删除规则选项实际上会阻止对象被删除，从数据完整性角度来看，这是最安全的选项。拒绝选项不常用，但如果你有某些情况，一个对象只要在某个特定关系中包含任何对象就不应被删除，那么这就是你要选择的选项。


    ## 表达式与聚合


    表达式的另一个用途是在不将所有属性加载到内存中的情况下聚合属性。如果你想要获取特定属性的平均值、中位数、最小值或最大值，例如英雄的平均年龄或女性英雄的数量，你可以通过表达式来实现（甚至更多）。实际上，这才是你应该采用的方式。为了理解原因，你需要了解一下
    Core Data 在底层的工作方式。


    你在 `HeroListController` 中使用的获取结果控制器包含数据库中所有英雄的对象，但它并未将所有英雄作为托管对象完整加载到内存中。Core
    Data 有一个“故障”的概念。故障有点像托管对象的替身。故障对象对它所代表的托管对象有一定了解，例如其唯一 ID 以及可能正在显示的某个属性的值，但它不是一个完整的托管对象。


    当某些事件触发故障时，故障会变成一个完整的托管对象。触发故障通常发生在你访问故障不知道的属性或键时。Core Data 足够智能，能在必要时将故障转换为托管对象，因此你的代码通常无需担心它是在处理故障还是托管对象。然而，了解这一行为很重要，这样你就不会因不必要地触发故障而无意中导致性能问题。


    很可能，你的获取结果控制器中的故障对象对 `Hero` 的 `sex` 属性一无所知。因此，如果你要遍历获取结果控制器中的英雄以获取女性英雄的数量，就会触发每个故障使其变为托管对象。这是低效的，因为这会消耗比必要更多的内存和处理能力。相反，你可以使用表达式从
    Core Data 检索聚合值，而无需触发故障。


    以下是一个示例，演示如何使用表达式获取应用程序中所有女性英雄的平均出生日期计算结果（你不能在获取请求中使用年龄，因为它是一个未存储的瞬态属性）。


    ```

    NSExpression *ex = [NSExpression expressionForFunction:@"average:"

                                     arguments:@[[NSExpression expressionForKeyPath:@"birthdate"]]];

    NSPredicate *pred = [NSPredicate predicateWithFormat:@"sex == ''Female''"];


    NSExpressionDescription *ed = [[NSExpressionDescription alloc] init];

    [ed setName:@"averageBirthdate"];

    [ed setExpression:ex];

    [ed setExpressionResultType:NSDateAttributeType];


    NSArray *properties = [NSArray arrayWithObject:ed];


    NSFetchRequest *request = [[NSFetchRequest alloc] init];

    [request setPredicate:pred];

    [request setPropertiesToFetch:properties];

    [request setResultType:NSDictionaryResultType];


    NSEntityDescription *entity = [NSEntityDescription entityForName:@"Hero"

                                              inManagedObjectContext:context];

    [request setEntity:entity];


    NSArray *results = [context executeFetchRequest:request error:nil];

    NSDate *date = [results objectAtIndex:0];

    NSLog(@"女性英雄的平均出生日期：%@", date);

    ```


    聚合表达式对于 Core Data 来说相对较新。在撰写本文时，使用表达式获取聚合的过程尚未有详尽的文档记录，但上述代码示例，以及 `NSExpression`
    和 `NSExpressionDescription` 的 API 文档，应该能为你使用聚合提供正确的指导方向。


    ## 添加 Power 实体


    在开始修改之前，请单击“组与文件”面板中的当前版本（带有绿色勾选标记的那个），然后从“设计”菜单的“数据模型”子菜单中选择“添加模型版本”，以创建数据模型的新版本。这可以确保你使用之前数据模型收集的数据能够正确迁移到本章将要创建的新版本中。

    '
- fmt: '点击当前数据模型以打开模型编辑器。使用模型编辑器实体面板左下角的加号图标，添加一个新实体并将其命名为`Power`。你可以将所有其他字段保留为默认值（见图7-4）。


    ![9781430238072_Fig07-04.jpg](images/9781430238072_Fig07-04.jpg)


    图7-4. 将新实体重命名为`Power`，并将其他字段保留为默认值


    回顾图7-2，你可以看到`Power`对象有两个字段：一个用于能力的名称，另一个用于标识该特定能力的来源。为简单起见，这两个属性将只保存字符串值。


    在属性面板中保持`Power`被选中状态，通过属性面板添加两个属性。将其中一个命名为`name`，取消选中“Optional”复选框，将其类型设置为`String`，并为其赋予默认值`New
    Power`。将第二个属性命名为`source`，并将其类型也设置为`String`。保持“Optional”复选框为选中状态，无需设置默认值。完成后，你将在模型编辑器的图表视图中看到两个圆角矩形（见图7-5）。


    ![9781430238072_Fig07-05.jpg](images/9781430238072_Fig07-05.jpg)


    图7-5. 现在你有两个实体，但它们之间没有任何关联


    ## 创建`powers`关系


    现在`Power`实体处于选中状态。单击代表`Hero`实体的圆角矩形，或在实体面板中选择`Hero`以将其选中。接着，在属性面板中，单击并按住加号按钮，然后选择“Add
    Relationship”。在模型编辑器的详情面板中，将新关系的名称更改为`powers`，并将“Destination”设置为`Power`。“Destination”字段指定哪些实体的托管对象可以添加到此关系中，因此通过选择`Power`，你表明此关系存储的是能力。


    你还无法指定反向关系，但你需要勾选“To-Many Relationship”复选框，以表示每个英雄可以拥有多个能力。同时，将删除规则更改为“Cascade”。在你的应用中，每个英雄将拥有自己的一套能力——英雄之间不共享能力。当英雄被删除时，你需要确保该英雄的能力也被删除，以免在持久化存储中留下孤立数据。完成后，详情面板应如图7-6所示，图表视图中`Hero`与`Power`实体之间将出现一条连线，代表这个新关系（见图7-7）。


    ![9781430238072_Fig07-06.jpg](images/9781430238072_Fig07-06.jpg)


    图7-6. `powers`关系的详情面板视图


    ![9781430238072_Fig07-07.jpg](images/9781430238072_Fig07-07.jpg)


    图7-7. 关系在图表视图中由圆角矩形之间的连线表示。单箭头表示一对一关系，双箭头（如图所示）表示一对多关系


    ## 创建反向关系


    在你的应用中实际上并不需要这个反向关系，但你会遵循苹果的建议，指定一个。由于反向关系将是一对一关系，它不会带来任何性能影响。再次选中`Power`实体，并使用属性面板为其添加一个关系。将此新关系命名为`hero`，并选择`Hero`作为目标实体。现在查看图表视图，你应该会看到两条线，代表你创建的两个不同关系。


    接下来，单击“Inverse”弹出菜单并选择`powers`。这表示该关系是你之前创建的那个关系的反向关系。选中后，图表视图中的两条关系线将合并为一条两端带有箭头的单线（见图7-8）。


    ![9781430238072_Fig07-08.jpg](images/9781430238072_Fig07-08.jpg)


    图7-8. 反向关系由一条两端带有箭头的单线表示，而不是两条独立的线


    ## 创建`olderHeroes`获取属性


    再次选中`Hero`实体，以便为其添加一些获取属性。在属性面板中，单击并按住加号按钮，然后选择“Add Fetched Property”。将此新获取属性命名为`olderHeroes`。注意，详情面板上只有一个其他字段可以设置：一个名为“Predicate”的白色大框（见图7-9）。


    ![9781430238072_Fig07-09.jpg](images/9781430238072_Fig07-09.jpg)


    图7-9. 显示获取属性的详情面板


    **提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。


    ## 什么是谓词？


    谓词是一个返回布尔值的语句。你可以将它们视为`if`或`while`语句中的条件表达式。它们旨在针对一组对象（无论是Cocoa还是Core Data）使用。谓词不依赖于被搜索的具体数据，而是提供了一种定义查询以过滤数据的抽象方式。最简单的形式是，谓词使用运算符比较两个值。例如，运算符`==`用于测试两个值是否相等。还有更复杂的运算符允许进行字符串比较（使用`LIKE`或`CONTAINS`）。谓词可以组合起来形成复合谓词。通常，谓词通过`AND`或`OR`运算符连接。


    在获取属性的谓词中，可以使用两个特殊变量：`$FETCH_SOURCE`和`$FETCHED_PROPERTY`。`$FETCH_SOURCE`指向托管对象的特定实例。`$FETCHED_PROPERTY`是对正在获取的实体属性的描述。


    你可以在苹果的谓词编程指南（https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Predicates/predicates.html）中阅读更详细的信息。


    **提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。


    因此，你需要定义一个谓词，用于查找所有比详情视图中的`Hero`更年长（即出生日期更早）的英雄。你需要将你的`Hero`的出生日期与所有其他`Hero`实体进行比较。如果`$FETCH_SOURCE`是你的`Hero`实体，你的谓词将是：


    ```

    $FETCH_SOURCE.birthdate > birthdate

    ```


    在属性检查器的“Predicate”字段中输入此公式。记住，日期实际上只是一个整数；日期越晚，值越大。


    ## 创建`youngerHeroes`获取属性


    添加另一个名为`youngerHeroes`的获取属性。目标实体仍为`Hero`，谓词应与上一个基本相同，只是将运算符`>`改为`<`。在属性检查器中为`youngerHeroes`的谓词输入以下内容：


    ```

    $FETCH_SOURCE.birthdate < birthdate

    ```


    需要注意的一点是，获取属性会检索所有匹配的对象，可能包括正在执行获取操作的对象本身。这意味着有可能创建一个结果集，当对Super Cat执行时，返回的结果包含Super
    Cat。


    `youngerHeroes`和`olderHeroes`这两个获取属性都会自动排除正在被评估的英雄。英雄不能比自己更年长或更年轻；他们的出生日期总是精确等于自己的出生日期，因此没有英雄会满足你刚刚创建的这两个条件。'
  raw: 'Click the current data model to bring up the model editor. Using the plus
    icon in the lower-left corner of the model editor’s entity pane, add a new entity
    and call it **Power**. You can leave all the other fields at their default values
    ([Figure 7-4](#9781430238072_Ch07.xhtml#Fig4)).


    ![9781430238072_Fig07-04.jpg](images/9781430238072_Fig07-04.jpg)


    [Figure 7-4.](#9781430238072_Ch07.xhtml#_Fig4)  Rename the new entity Power and
    leave the other fields at their default values


    If you look back at [Figure 7-2](#9781430238072_Ch07.xhtml#Fig2), you can see
    that the Power object has two fields: one for the name of the power and another
    that identifies the source of this particular power. In the interest of keeping
    things simple, the two attributes will just hold string values.


    With Power still selected in the property pane, add two attributes using the property
    pane. Call one of them **name**, uncheck the Optional check box, set its Type
    to String, and give it a Default value of New Power. Give the second one a name
    of **source**, and set its Type to String as well. Leave Optional checked. There
    is no need for a default value. Once you’re finished, you should have two rounded
    rectangles in the model editor’s diagram view ([Figure 7-5](#9781430238072_Ch07.xhtml#Fig5)).


    ![9781430238072_Fig07-05.jpg](images/9781430238072_Fig07-05.jpg)


    [Figure 7-5.](#9781430238072_Ch07.xhtml#_Fig5)  You now have two entities, but
    they are not related in any way


    Creating the Powers Relationship


    Right now, the Power entity is selected. Single-click the rounded rectangle that
    represents the Hero entity or select Hero in the entity pane to select it. Now,
    in the properties pane, click and hold the plus button and select Add Relationship.
    In the model editor’s detail pane, change the name of the new relationship to
    powers and the Destination to Power. The Destination field specifies which entity’s
    managed objects can be added to this relationship, so by selecting Power, you
    are indicating that this relationship stores powers.


    You can’t specify the inverse relationship yet, but you do want to check the To-Many
    Relationship box to indicate that each hero can have more than one power. Also,
    change the delete rule to Cascade. In your application, every hero will have his
    or her own set of powers—no sharing of powers between heroes. When a hero is deleted,
    you want to make sure that hero’s powers are deleted as well, so you don’t leave
    orphaned data in the persistent store. Once you’re finished, the detail pane should
    look like [Figure 7-6](#9781430238072_Ch07.xhtml#Fig6), and the diagram view should
    have a line drawn between the Hero and Power entities to represent the new relationship
    ([Figure 7-7](#9781430238072_Ch07.xhtml#Fig7)).


    ![9781430238072_Fig07-06.jpg](images/9781430238072_Fig07-06.jpg)


    [Figure 7-6.](#9781430238072_Ch07.xhtml#_Fig6)  The detail pane view of the powers
    relationship


    ![9781430238072_Fig07-07.jpg](images/9781430238072_Fig07-07.jpg)


    [Figure 7-7.](#9781430238072_Ch07.xhtml#_Fig7)  Relationships are represented
    in the diagram view by lines drawn between rounded rectangles. A single arrowhead
    represents a to-one relationship and a double arrowhead (as shown here) represents
    a to-many relationship


    Creating the Inverse Relationship


    You won’t actually need the inverse relationship in your application, but you’re
    going to follow Apple’s recommendation and specify one. Since the inverse relationship
    will be to-one, it doesn’t present any performance implications. Select the Power
    entity again, and add a relationship to it using the property pane. Name this
    new relationship **hero**, and select a Destination entity of Hero. If you look
    at your diagram view now, you should see two lines representing the two different
    relationships you’ve created.


    Next, click the Inverse pop-up menu and select powers. This indicates that the
    relationship is the inverse of the one you created earlier. Once you’ve selected
    it, the two relationship lines in the diagram view will merge together into a
    single line with arrowheads on both sides ([Figure 7-8](#9781430238072_Ch07.xhtml#Fig8)).


    ![9781430238072_Fig07-08.jpg](images/9781430238072_Fig07-08.jpg)


    [Figure 7-8.](#9781430238072_Ch07.xhtml#_Fig8)  Inverse relationships are represented
    as a single line with arrowheads on both sides, rather than two separate lines


    Creating the olderHeroes Fetched Property


    Select the Hero entity again so that you can add some fetched properties to it.
    In the property pane, click and hold the plus button and choose Add Fetched Property.
    Call the new fetched property olderHeroes. Notice that there is only one other
    field that can be set on the detail pane: a big white box called Predicate ([Figure
    7-9](#9781430238072_Ch07.xhtml#Fig9)).


    ![9781430238072_Fig07-09.jpg](images/9781430238072_Fig07-09.jpg)


    [Figure 7-9.](#9781430238072_Ch07.xhtml#_Fig9)  The detail pane showing a fetched
    property


    **Tip**  Both relationships and fetched properties can use their own entity as
    the Destination.


    What is a Predicate?


    A predicate is a statement that returns a Boolean value. Think of them as like
    a conditional statement within an if or while. They are intended to be used against
    a set of objects, whether Cocoa or Core Data. Predicates are not dependent on
    the specific data being searched, but rather provide an abstract way of defining
    a query to filter data. At its simplest, a predicate compares two values using
    an operator. An example operator would be ‘==’ to test if two values are equal.
    There are more sophisticated operators that allow for string comparison (using
    LIKE or CONTAINS). Predicates can be joined to format a compound predicated. Typically,
    predicates are joined with an AND or an OR operator.


    There are two special variables you can use in the predicate of a fetched property:
    $FETCH_SOURCE and $FETCHED_PROPERTY. $FETCH_SOURCE refers to the specific instance
    of a managed object. $FETCHED_PROPERTY is a description of the entity property
    being fetched.


    You can read more detail in Apple’s Predicate Programming Guide ([https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Predicates/predicates.html](https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Predicates/predicates.html)
    ).


    **Tip**  Both relationships and fetched properties can use their own entity as
    the Destination.


    So you need to define a predicate that finds all the heroes who are older (i.e.
    have an earlier birthdate) than the Hero in the detail view. You need to compare
    your Hero’s birthdate against all the other Hero entities. If $FETCH_SOURCE is
    your Hero entity, your predicate will be


    ```

    $FETCH_SOURCE.birthdate > birthdate

    ```


    Enter this formula into the Predicate field in the attribute inspector. Remember,
    a date is really just an integer; the later the date, the greater the value.


    Creating the youngerHeroes Fetched Property


    Add another fetched property named **youngerHeroes**. The Destination will be
    Hero again, and the predicate should be the same as the previous one, except the
    operator will be < instead of >. Type the following for the youngerHeroes predicate
    in the attribute inspector:


    ```

    $FETCH_SOURCE.birthdate < birthdate

    ```


    One thing to be aware of is that a fetched property retrieves all matching objects,
    potentially including the object on which the fetch is being performed. This means
    it is possible to create a result set that, when executed on Super Cat, returns
    Super Cat.


    Both the youngerHeroes and olderHeroes fetched properties automatically exclude
    the hero being evaluated. Heroes cannot be older or younger than themselves; their
    birth date will always exactly equal their own birth date, and so no hero will
    ever meet the two criteria you just created.'
  trans: '

    点击当前数据模型以打开模型编辑器。使用模型编辑器实体面板左下角的加号图标，添加一个新实体并将其命名为`Power`。你可以将所有其他字段保留为默认值（见图
    7-4）。


    ![9781430238072_Fig07-04.jpg](img/9781430238072_Fig07-04.jpg)


    图 7-4. 将新实体重命名为`Power`，并将其他字段保留为默认值


    回顾图 7-2，你可以看到`Power`对象有两个字段：一个用于能力的名称，另一个用于标识该特定能力的来源。为简单起见，这两个属性将只保存字符串值。


    在属性面板中保持`Power`被选中状态，通过属性面板添加两个属性。将其中一个命名为`name`，取消选中“Optional”复选框，将其类型设置为`String`，并为其赋予默认值`New
    Power`。将第二个属性命名为`source`，并将其类型也设置为`String`。保持“Optional”复选框为选中状态，无需设置默认值。完成后，你将在模型编辑器的图表视图中看到两个圆角矩形（见图
    7-5）。


    ![9781430238072_Fig07-05.jpg](img/9781430238072_Fig07-05.jpg)


    图 7-5. 现在你有两个实体，但它们之间没有任何关联


    ## 创建`powers`关系


    现在`Power`实体处于选中状态。单击代表`Hero`实体的圆角矩形，或在实体面板中选择`Hero`以将其选中。接着，在属性面板中，单击并按住加号按钮，然后选择“Add
    Relationship”。在模型编辑器的详情面板中，将新关系的名称更改为`powers`，并将“Destination”设置为`Power`。“Destination”字段指定哪些实体的托管对象可以添加到此关系中，因此通过选择`Power`，你表明此关系存储的是能力。


    你还无法指定反向关系，但你需要勾选“To-Many Relationship”复选框，以表示每个英雄可以拥有多个能力。同时，将删除规则更改为“Cascade”。在你的应用中，每个英雄将拥有自己的一套能力——英雄之间不共享能力。当英雄被删除时，你需要确保该英雄的能力也被删除，以免在持久化存储中留下孤立数据。完成后，详情面板应如图
    7-6 所示，图表视图中`Hero`与`Power`实体之间将出现一条连线，代表这个新关系（见图 7-7）。


    ![9781430238072_Fig07-06.jpg](img/9781430238072_Fig07-06.jpg)


    图 7-6. `powers`关系的详情面板视图


    ![9781430238072_Fig07-07.jpg](img/9781430238072_Fig07-07.jpg)


    图 7-7. 关系在图表视图中由圆角矩形之间的连线表示。单箭头表示一对一关系，双箭头（如图所示）表示一对多关系


    ## 创建反向关系


    在你的应用中实际上并不需要这个反向关系，但你会遵循苹果的建议，指定一个。由于反向关系将是一对一关系，它不会带来任何性能影响。再次选中`Power`实体，并使用属性面板为其添加一个关系。将此新关系命名为`hero`，并选择`Hero`作为目标实体。现在查看图表视图，你应该会看到两条线，代表你创建的两个不同关系。


    接下来，单击“Inverse”弹出菜单并选择`powers`。这表示该关系是你之前创建的那个关系的反向关系。选中后，图表视图中的两条关系线将合并为一条两端带有箭头的单线（见图
    7-8）。


    ![9781430238072_Fig07-08.jpg](img/9781430238072_Fig07-08.jpg)


    图 7-8. 反向关系由一条两端带有箭头的单线表示，而不是两条独立的线


    ## 创建`olderHeroes`获取属性


    再次选中`Hero`实体，以便为其添加一些获取属性。在属性面板中，单击并按住加号按钮，然后选择“Add Fetched Property”。将此新获取属性命名为`olderHeroes`。注意，详情面板上只有一个其他字段可以设置：一个名为“Predicate”的白色大框（见图
    7-9）。


    ![9781430238072_Fig07-09.jpg](img/9781430238072_Fig07-09.jpg)


    图 7-9. 显示获取属性的详情面板


    **提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。


    ## 什么是谓词？


    谓词是一个返回布尔值的语句。你可以将它们视为`if`或`while`语句中的条件表达式。它们旨在针对一组对象（无论是 Cocoa 还是 Core Data）使用。谓词不依赖于被搜索的具体数据，而是提供了一种定义查询以过滤数据的抽象方式。最简单的形式是，谓词使用运算符比较两个值。例如，运算符`==`用于测试两个值是否相等。还有更复杂的运算符允许进行字符串比较（使用`LIKE`或`CONTAINS`）。谓词可以组合起来形成复合谓词。通常，谓词通过`AND`或`OR`运算符连接。


    在获取属性的谓词中，可以使用两个特殊变量：`$FETCH_SOURCE`和`$FETCHED_PROPERTY`。`$FETCH_SOURCE`指向托管对象的特定实例。`$FETCHED_PROPERTY`是对正在获取的实体属性的描述。


    你可以在苹果的谓词编程指南（https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Predicates/predicates.html）中阅读更详细的信息。


    **提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。


    因此，你需要定义一个谓词，用于查找所有比详情视图中的`Hero`更年长（即出生日期更早）的英雄。你需要将你的`Hero`的出生日期与所有其他`Hero`实体进行比较。如果`$FETCH_SOURCE`是你的`Hero`实体，你的谓词将是：


    ```

    $FETCH_SOURCE.birthdate > birthdate

    ```


    在属性检查器的“Predicate”字段中输入此公式。记住，日期实际上只是一个整数；日期越晚，值越大。


    ## 创建`youngerHeroes`获取属性


    添加另一个名为`youngerHeroes`的获取属性。目标实体仍为`Hero`，谓词应与上一个基本相同，只是将运算符`>`改为`<`。在属性检查器中为`youngerHeroes`的谓词输入以下内容：


    ```

    $FETCH_SOURCE.birthdate < birthdate

    ```


    需要注意的一点是，获取属性会检索所有匹配的对象，可能包括正在执行获取操作的对象本身。这意味着有可能创建一个结果集，当对 Super Cat 执行时，返回的结果包含
    Super Cat。


    `youngerHeroes`和`olderHeroes`这两个获取属性都会自动排除正在被评估的英雄。英雄不能比自己更年长或更年轻；他们的出生日期总是精确等于自己的出生日期，因此没有英雄会满足你刚刚创建的这两个条件。

