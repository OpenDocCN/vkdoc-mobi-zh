    This seems like a good point to add the MPMediaPickerControllerDelegate methods.
    There are only two methods that are defined in the protocol: mediaPicker:didPickMediaItems:,
    called when the user is done selecting; and mediaPickerDidCancel:, called when
    the user has cancelled the media selection.


    ```

    #pragma mark - Media Picker Delegate Methods


    - (void)mediaPicker:(MPMediaPickerController *)mediaPicker         didPickMediaItems:(MPMediaItemCollection
    *)theCollection

    {

        [mediaPicker dismissViewControllerAnimated:YES completion:nil];


