- fmt: '# Encryption and Security


    We’re sure you all know what encrypting data is and means, but let’s go over it
    anyway. At its simplest, it’s a way of protecting data by transforming it into
    a non-readable form. In order to read it, you need to decrypt it. Decryption is
    accomplished by knowing the cipher—the technique used to encrypt the data. Ciphers
    work by applying a key, an additional piece of information, to the data in order
    to encrypt it. You encrypt data prior to transmitting it in order to protect it
    from being intercepted and read. You also encrypt data before storing it locally
    to prevent it from being read if the device is lost or stolen.


    There are two major encryption techniques:


    - **Symmetric:** A single key is shared between parties to encrypt and decrypt
    the data. Since the key is shared, if it is discovered, the data can be compromised.

    - **Asymmetric:** Two mathematically related keys are used to transform the data.
    Data encrypted with one key can be decrypted with the other. Generally, one key
    is shared between parties and the other key is kept private. Another term for
    asymmetric encryption is public key cryptography.


    Asymmetric encryption can be computationally expensive. A common technique is
    to use asymmetric encryption to encrypt a shared key, then use symmetric encryption
    to share the actual data.


    ## Hashing


    In cryptography, a *hash* is a smaller piece of data that is derived from a larger
    set of data. This smaller piece can then be used as a proxy for the larger data
    set. You can think of hashing as one-way encryption: you encrypt the data into
    a unique value, but you can’t decrypt it back. You may use hashing whenever you
    use a dictionary. The dictionary key is hashed to ensure it always points to the
    same value.


    Hashing is typically used for checksumming. A large set of data is hashed using
    a well-known algorithm. After you download the data, you hash the data set and
    compare the hashed value with the expected one. If the values differ, you can
    assume the data has been compromised in some way.


    ## Certificates and Signatures


    Using encryption and hashing, you’re able to create certificates that will tie
    a public key to a specific trusted source. Given a set of data (say an e-mail
    message or web page), the sender will compute the hash of the data and encrypt
    it with a private key. This encrypted hash is sent with the data and the sender’s
    certificate. The receiver decrypts the sender’s hash using the certificate’s public
    key and compares the value to a locally computed hash. If the hashes match, then
    the data wasn’t compromised and was sent by the certificate’s owner. This process
    of hashing and encrypting using a certificate is called a *signature*. Users sign
    their data to prove that it came from them.


    How can you trust the certificate used to sign the data? The certificate itself
    is signed by another source. That source may be trusted by both the sender and
    receiver, or that source’s certificate may need to be signed by someone else.
    This series of certificate signing may continue until there is a certificate that
    the receiver trusts. This series of certificate signing is called the *chain of
    trust*. The last certificate in the chain is called the *anchor* or *root certificate*.


    Signatures and certificates rely on someone being a certificate authority that
    everyone trusts on some level. The chain of trust is only as strong as the security
    of the certificate authority.


    ## Identity


    Combining a certificate with a private key creates a digital identity. An identity
    is usually transferred using a password-protected format, PKCS #12, which typically
    has a `.p12` extension.


    ## Security in iOS


    Since iOS 4, developers have the option to leverage the built-in encryption hardware
    on iOS devices to further protect their application data. This feature leverages
    the passcode lock setting in iOS. When the device is locked, the data is inaccessible,
    even to the application. The device must be unlocked before your application can
    access the data. Remember, you might code for this functionality into your application,
    but unless the device user activates the passcode lock setting, it won’t be used.
    Generally, it’s better to add this feature. If your users then use the passcode
    lock setting, they’ll have the extra level of protection.


    To protect your application’s file data, you need to specify the correct extended
    attribute for the level of protection you want. You can set this attribute using
    either the `NSData` or `NSFileManager` class. For existing files, you use the
    `setAttributes:ofItemAtPath:error:` method on `NSFileManager`. The attributes
    parameter is an `NSDictionary`, where the key is `NSFileProtectionKey`. For new
    files, you use the `NSData` method `writeToFile:options:error:` method, using
    the correct options bitmask to specify the level of protection. The possible levels
    of protection are shown in [Table 13-1](#9781430238072_Ch13.xhtml#Tab1).


    **Table 13-1.** Levels of Protection


    ![image](images/Table13-01.jpg)


    **Note:** `NSData` has three other writing options: `NSDataWritingAtomic`, `NSDataWritingWithoutOverwriting`,
    `NSDataWritingFileProtectionMask`. The first two have to do with how an `NSData`
    instance writes its files, while the last sets the permissions of the file itself.
    None of these options set the file protection with respect to password locking.


    If you set a level of protection, then you must prepare for the file to potentially
    be inaccessible. In order to do that, your application needs to check file accessibility.
    There are a few ways to do this:


    - Implement the `applicationProtectedDataWillBecomeUnavailable:` and `applicationProtectedDataDidBecomeAvailable:`
    methods in your `AppDelegate`.

    - Register for the `UIApplicationProtectedDataWillBecomeUnavailable` and `UIApplicationProtectedDataDidBecomeAvailable`
    notifications.

    - Check the `protectedDataAvailable` property in `UIApplication`.


    ## Randomization Keychains


    The keychain is an encrypted container used to hold passwords, certificates, or
    other information. The keychain is encrypted and locked using the iOS passcode
    lock mechanism. When your iOS device is locked, no one can access the contents.
    Once you enter your passcode, iOS unlocks and decrypts the keychain for access.
    From the user’s perspective, the keychain provides transparent authentication.
    Suppose your application communicates with services on the Internet. Each of those
    services requires your users to provide login information. Rather than requiring
    your users to enter that information every time they access those Internet services,
    you can store that information in the keychain. Since the keychain is secure,
    you can count on that information being safe.


    In iOS, each application has its own keychain. Each keychain contains a set of
    information called keychain items (or just items). A keychain item consists of
    data and a set of attributes. Programmatically, a keychain item is a dictionary
    (specifically a `CFDictionary`). The item data may or may not be encrypted; this
    is determined by the type of data being stored in the item (i.e., passwords or
    certificates).


    When defining your keychain item dictionary, you must specify the item class using
    the key constant `kSecClass`. The possible values for `kSecClass` are a defined
    set of constants ([Table 13-2](#9781430238072_Ch13.xhtml#Tab2)).


    **Table 13-2.** Possible Values for `kSecClass`'
