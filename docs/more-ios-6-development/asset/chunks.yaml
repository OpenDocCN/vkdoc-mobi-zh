    我们再来看一下图 4-2。你的详细视图有两个分区，因此我们按此配置表格视图。将 `Style` 字段从 `Plain` 改为 `Grouped`。完成后，`Separator`
    字段应自动变为 `Single Line Etched`。如果未自动更改，请手动修改。接下来，你已经知道每个区段的行数，分别为一行和三行。由于该数字是固定的，你可以将
    `Content` 字段从 `Dynamic Prototypes` 改为 `Static Cells`。同样，`Content` 字段正下方的字段会自动从
    `Prototype Cells` 变为 `Sections`。你知道分区数量为两个，因此在该字段中输入 `2`。最后，你希望在选中时不突出显示单元格，因此将
    `Selection` 字段更改为 `No Selection`。表格视图的属性检查器应如图 4-5 所示。


    ![9781430238072_Fig04-05.jpg](img/9781430238072_Fig04-05.jpg)


    图 4-5. 表格视图属性的最终状态


    你的表格视图现在应该有两个分区，每个分区各有三个单元格（图 4-6）。第一个分区单元格过多，你只需要一个单元格。选中第一个分区中的第二个单元格，使其高亮显示。删除该单元格（按下
