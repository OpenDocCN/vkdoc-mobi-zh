  trans: "\n你已经准备好添加视图控制器场景了。打开 `MainStoryboard.storyboard`。从对象库中拖一个 `UIViewController`\
    \ 到故事板编辑器，放在 `IdentitiesViewController` 旁边。再拖一个 `UIViewController`，这次放在 `CertificatesViewController`\
    \ 旁边。将两个视图的背景颜色都改为黑色。接下来，在两个 `UIViewController` 上都添加一个 `UITextView`。当你把它们放到 `UIViewController`\
    \ 上时，它们应该会自动扩展以填充视图。如果没有自动填充，也没关系。你需要将每个文本框调整为视图的宽度（320.0 像素），但高度要小于视图的完整高度（我们使用了\
    \ 400.0 像素）。删除每个文本框中的默认文本。\n\n在文本框下方各拖一个 `UIButton`。使用蓝色辅助线将按钮对齐到左侧，位于文本框下方。将按钮的标签文字从\
    \ `Button` 改为 `Done`。\n\n对于每个场景，使用身份检查器将每个视图控制器的类从 `UIViewController` 改为 `KeychainItemViewController`。按住\
    \ Control 键从视图控制器图标拖拽到文本框，选择 `textView` 插座。按住 Control 键从 `Done` 按钮拖拽到视图控制器，选择\
    \ `done:` 操作。\n\n最后，按住 Control 键从 `IdentitiesViewController` 中的表格视图单元格拖拽到旁边的 `KeychainItemViewController`。在弹出菜单中选择模态\
    \ `Selection Segue`。选择新的 segue，并在属性检查器中将其命名为 `IdentitySegue`。对 `CertificatesViewController`\
    \ 和它旁边的 `KeychainItemViewController` 重复此过程。这次，在属性检查器中将 segue 命名为 `CertificateSegue`。\n\
    \n你要用钥匙串项目的属性来填充文本框。你将使用 `UIViewController` 的 `viewWillAppear` 方法来填充文本框。\n\n```\n\
    - (void)viewWillAppear:(BOOL)animated\n{\n    if (self.item) {\n        NSMutableString\
    \ *itemInfo = [NSMutableString string];\n        [itemInfo appendFormat:@\"AccessGroup:\
    \ %@\\n\",                              \n            [self.item valueForAttribute:kSecAttrAccessGroup]];\n\
    \        [itemInfo appendFormat:@\"CreationDate: %@\\n\",                    \
    \                 \n            [self.item valueForAttribute:kSecAttrCreationDate]];\n\
    \        [itemInfo appendFormat:@\"CertificateEncoding: %@\\n\",             \
    \                 \n            [self.item valueForAttribute:kSecAttrCertificateEncoding]];\n\
    \        [itemInfo appendFormat:@\"CreationDate: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecClass]];\n        [itemInfo appendFormat:@\"Issuer: %@\\\
    n\", \n            [self.item valueForAttribute:kSecAttrIssuer]];\n        [itemInfo\
    \ appendFormat:@\"Label: %@\\n\", \n            [self.item valueForAttribute:kSecAttrLabel]];\n\
    \        [itemInfo appendFormat:@\"ModificationDate: %@\\n\",                \
    \              \n            [self.item valueForAttribute:kSecAttrModificationDate]];\n\
    \        [itemInfo appendFormat:@\"Accessible: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecAttrAccessible]];\n        [itemInfo appendFormat:@\"\
    PublicKeyHash: %@\\n\",                              \n            [self.item\
    \ valueForAttribute:kSecAttrPublicKeyHash]];\n        [itemInfo appendFormat:@\"\
    SerialNumber: %@\\n\",                              \n            [self.item valueForAttribute:kSecAttrSerialNumber]];\n\
    \        [itemInfo appendFormat:@\"Subject: %@\\n\", \n            [self.item\
    \ valueForAttribute:kSecAttrSubject]];\n             self.textView.text = itemInfo;\n\
    \    }\n}\n```\n\n接下来，检查是否有钥匙串项目。如果有，就创建一个 `NS(Mutable)String` 并用一些属性值填充它。这个字符串用于设置文本框的文本。\n\
    \n对于每个表格视图控制器，你需要实现 `prepareForSegue:sender:` 来为 `KeychainItemViewController`\
    \ 设置钥匙串项目。打开 `CertificatesViewController.m` 并添加导入 `KeychainItemViewController.h`\
    \ 头文件。\n\n```\n#import \"KeychainItemViewController.h\"\n```\n\n`prepareForSegue:sender:`\
    \ 的实现会检查被调用的 segue，并为 `KeychainItemViewController` 设置 `KeychainItem` 属性。\n\n```\n\
    - (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n    if\
    \ ([segue.identifier isEqualToString:@\"CertificateSegue\"]) {\n        NSIndexPath\
    \ *indexPath = [self.tableView indexPathForSelectedRow];\n        KeychainCertificate\
    \ *cert = self.items[indexPath.row];\n        KeychainItemViewController *kivc\
    \ = [segue destinationViewController];\n        kivc.item = cert;\n    }\n}\n\
    ```\n\n你需要对 `IdentitiesViewController` 重复此过程，并做一些小改动。\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    if ([segue.identifier isEqualToString:@\"\
    IdentitySegue\"]) {\n        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];\n\
    \        KeychainIdentity *ident = self.items[indexPath.row];\n        KeychainItemViewController\
    \ *kivc = [segue destinationViewController];\n        kivc.item = ident;\n   \
    \ }\n}\n```\n\n你检查的是 segue 标识符 `IdentitySegue`，并且你发送的是一个 `KeychainIdentity` 对象，而不是\
    \ `KeychainCertificate`。\n\n构建并运行你的应用。选择数字身份并查看属性详情。关闭详情视图并查看一个证书。你可以扩展这个应用，显示每个钥匙串项目特有的属性。你打算做点别的。你要增强数字身份，使其能够加密和解密数据。\n\
    \n打开 `KeychainIdentity.h`。你要添加两个方法。\n\n```\n- (NSData *)encrypt:(NSData *)data;\n\
    - (NSData *)decrypt:(NSData *)data;\n```\n\n对于每个方法，你传入一个 `NSData` 对象，其数据需要被加密或解密。每个方法将返回一个新的\
    \ `NSData` 对象，包含转换后的数据。\n\n在你可以使用公钥和私钥来加密和解密数据之前，你需要知道数字身份是否可信。你只需要检查一次信任，所以你会惰性检查，仅在需要时检查。你将声明一个私有\
    \ ivar `_trusted` 来告知 `KeychainIdentity` 是否可信。由于你不希望每次 `trusted` 为 false 时都检查信任，你还会声明另一个属性\
    \ `trust`，其类型为 `SecTrustRef`。\n\n```\n@interface KeychainIdentity ()\n@property\
    \ (assign, nonatomic, readonly, getter=isTrusted) BOOL trusted;\n@property (assign,\
    \ nonatomic, readonly) SecTrustRef trust;\n@property (assign, nonatomic, readonly)\
    \ SecCertificateRef anchorCertificate;\n@property (assign, nonatomic, readonly)\
    \ SecCertificateRef certificate;\n- (BOOL)recoverTrust;\n@end\n```\n\n你还声明了两个额外的属性\
    \ `anchorCertificate` 和 `certificate`，以及一个私有方法 `recoverTrust`，这些你将会用到。我们在实现部分会解释原因。\n\
    \n在实现内部，你需要合成 `trusted`、`trust`、`anchorCertificate` 和 `certificate`，以便访问 ivar\
    \ `_trusted`、`_trust`、`_anchorCertificate` 和 `_certificate`。\n\n```\n@synthesize\
    \ trusted = _trusted;\n@synthesize trust = _trust;\n@synthesize anchorCertificate\
    \ = _anchorCertificate;\n@synthesize certificate = _certificate;\n```\n\n让我们更新\
    \ `init` 方法来初始化这些 ivar。\n\n```\n- (id)init\n{\n    self = [super init];\n    if\
    \ (self) {\n        self.type = [(__bridge id)kSecClassIdentity copy];\n     \
    \   _trusted = NO;\n        _trust = NULL;\n    }\n    return self;\n}\n```\n\n\
    你需要实现 `dealloc` 方法，以便在必要时释放信任和证书引用。\n\n```\n- (void)dealloc\n{\n    if (_trust)\n\
    \        CFRelease(_trust);\n    if (_certificate)\n        CFRelease(_certificate);\n\
    \    if (_anchorCertificate)\n        CFRelease(_anchorCertificate);\n}\n```\n\
    \n在你可以实现 `trust` 和 `trusted` 的方法之前，你需要先实现 `anchorCertificate` 和 `certificate`\
    \ 的方法。\n"
- fmt: '```objc

    - (SecCertificateRef)anchorCertificate

    {

        if (_anchorCertificate == NULL) {

            id persistentRef =             [[NSUserDefaults standardUserDefaults]
    objectForKey:@"anchor_certificate"];

            NSDictionary *query = @{

                    (__bridge id)kSecClass               : (__bridge id)kSecClassCertificate,

                    (__bridge id)kSecValuePersistentRef  : persistentRef,

                    (__bridge id)kSecReturnRef           : (id)kCFBooleanTrue,

                    (__bridge id)kSecMatchLimit          : (__bridge id)kSecMatchLimitOne

            };

            OSStatus status =             SecItemCopyMatching((__bridge CFDictionaryRef)query,
    (CFTypeRef *)&_anchorCertificate);

            if (status != errSecSuccess || _anchorCertificate == NULL) {

                NSLog(@"Error loading Anchor Certificate");

                abort();

            }

        }

        return _anchorCertificate;

    }

    ```


    You lazily load the anchor certificate. This is the root certificate you loaded
    into the keychain in your `AppDelegate`. You retrieve the persistent reference
    you loaded into the `User Defaults` and use it to query the keychain for the anchor
    certificate. If you succeed, you set the `_anchorCertificate` ivar. If you fail,
    you’ve got a bigger problem, so you log an error and abort the application.


    Loading the digital identity certificate is much easier.


    ```objc

    - (SecCertificateRef)certificate

    {

        if (_certificate == NULL) {

            OSStatus status =             SecIdentityCopyCertificate((__bridge SecIdentityRef)self.item,
    &_certificate);

            if (status != errSecSuccess) {

                NSLog(@"Error retrieving Identity Certificate");

                return NULL;

            }

        }

        return _certificate;

    }

    ```


    You need to create a policy reference, and use that with the certificates to create
    a trust reference.


    ```objc

    - (SecTrustRef)trust

    {

        if (_trust == NULL) {

            SecPolicyRef policy = SecPolicyCreateBasicX509();

            NSArray *certs = @[ (__bridge id)self.certificate, (__bridge id)self.anchorCertificate
    ];

            OSStatus status =             SecTrustCreateWithCertificates((__bridge
    CFTypeRef)certs, policy, &_trust);

            if (status != errSecSuccess) {

                NSLog(@"Error Creating Trust from Certificate");

                return NULL;

            }

        }

        return _trust;

    }

    ```


    You’ll use these methods to implement the getter for the trusted property, `isTrusted`.


    ```objc

    - (BOOL)isTrusted

    {

        if (_trust == NULL) {

            SecTrustResultType trustResult;

            OSStatus status = SecTrustEvaluate(self.trust, &trustResult);

            if (status == errSecSuccess) {

                switch (trustResult) {

                    case kSecTrustResultInvalid:

                    case kSecTrustResultDeny:

                    case kSecTrustResultFatalTrustFailure:

                    case kSecTrustResultOtherError:

                        _trusted = NO;

                        break;

                    case kSecTrustResultProceed:

                    case kSecTrustResultConfirm:

                    case kSecTrustResultUnspecified:

                        _trusted = YES;

                        break;

                    case kSecTrustResultRecoverableTrustFailure:

                        _trusted = [self recoverTrust];

                        break;

                }

            }

            else

                _trusted = NO;

        }

        return _trusted;

    }

    ```


