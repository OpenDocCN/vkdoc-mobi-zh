    现在，你需要使用你的 CA 来创建一个新的用户证书。返回“钥匙串访问.app”，依次选择“钥匙串访问”![image](img/arrow.jpg) “证书助理”![image](img/arrow.jpg)
    “从证书颁发机构请求证书”。证书助理将显示一个新表单（图 13-4）。输入用户的电子邮件地址和通用名称（不必是个人姓名）。对于 CA 电子邮件地址，输入你在创建
    CA 时使用的电子邮件地址（图 13-2）。由于 CA 是自签名的，请选择“存储到磁盘”选项。点击“继续”。系统将显示一个保存对话框。选择一个位置保存文件（默认名称即可），然后点击“保存”。当证书助理完成证书签名请求的创建后，你可以点击“完成”关闭助理。


