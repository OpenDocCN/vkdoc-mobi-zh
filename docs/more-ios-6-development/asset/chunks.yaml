    \ 的底部，就在 `@end` 声明之前。\n\n```objective-c\n#pragma mark - 实例方法\n\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType\n\
    {\n    MPMediaQuery *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber\
    \ = [NSNumber numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate\
    \ = [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber\n           \
    \                                                               forProperty:MPMediaItemPropertyMediaType];\n\
    \    [query addFilterPredicate:predicate];\n\n    NSMutableArray *mediaAssets\
    \ = [[NSMutableArray alloc] initWithCapacity:[[query items] count]];\n    for\
    \ (MPMediaItem *item in [query items]) {\n        [mediaAssets addObject:[AVAsset\
    \ assetWithURL:[item valueForProperty:MPMediaItemPropertyAssetURL]]];\n    }\n\
    \    self.assets = mediaAssets;\n}\n```\n\n此方法与 `MPMediaPlayer` 中的 `loadMediaItemsForMediaType:`\
    \ 之间的区别在于，你使用 `MPMediaItemPropertyAssetURL` 来创建你的 `AVAssets`。\n\n你需要创建两个 `Objective-C`\
    \ 类：`AudioViewController` 和 `VideoViewController`。它们都是 `MediaViewController` 的子类。将以下内容添加到\
    \ `AudioViewController.m`，以便它将音频加载到你的音频媒体：\n\n```objective-c\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // 在此处执行任何其他视图加载后的设置。\n    [self loadAssetsForMediaType:MPMediaTypeMusic];\n\
    }\n```\n\n对 `VideoViewController.m` 执行相同操作，只是你希望加载的媒体类型是 `MPMediaTypeAnyVideo`。\n\
    \n打开 `MainStoryboard.storyboard`，将两个表视图控制器的自定义类更改为 `AudioViewController` 和 `VideoViewController`，就像你在\
    \ `MPMediaPlayer` 中所做的那样。\n\n构建并运行 `AVMediaPlayer`。看起来你正在读取媒体库，但它还不太有用。让我们修复它，以便你可以获取资产元数据。\n\
    \n回想一下，`AVAsset` 的信息在实例化时可能不可用或未加载。向资产请求信息可能会阻塞调用线程。如果你在 `AVMediaPlayer` 中这样做，将会减慢\
    \ UI 组件的速度，特别是表视图及其滚动。为了避免这种情况，你将使用 `AVAsset` 方法 `loadValuesAsynchronouslyForKeys:completionHandler:`\
    \ 异步加载资产的元数据。此外，你将把 `AVAsset` 封装到一个自定义类中，以处理此数据的加载和缓存。\n\n创建一个名为 `AssetItem` 的新\
    \ `Objective-C` 类，继承自 `NSObject`。一旦创建了文件并将其添加到项目中，请选择 `AssetItem.h`。由于 `AssetItem`\
    \ 旨在封装 `AVAsset`，为了方便起见，你将预先声明 `AVAsset` 类。你还需要修改 `AssetItem` 声明以遵循 `NSCopying`\
    \ 协议。\n\n```objective-c\n@class AVAsset;\n\n@interface AssetItem : NSObject <NSCopying>\n\
    ```\n\n你需要一个属性来保存你的 `AVAsset` 实例。由于你从 URL 加载 `AVAssets`，你还需要添加一个属性来保存你的资产的 URL。这将允许你惰性加载\
    \ `AVAsset`，这也有助于提高性能。\n\n```objective-c\n@property (strong, nonatomic) NSURL\
    \ *assetURL;\n@property (strong, nonatomic) AVAsset *asset;\n```\n\n你定义了三个只读属性，它们代表你为应用程序最关心的资产元数据。\n\
    \n```objective-c\n@property (strong, nonatomic, readonly) NSString *title;\n@property\
    \ (strong, nonatomic, readonly) NSString *artist;\n@property (strong, nonatomic,\
    \ readonly) UIImage *image;\n```\n\n接下来，定义两个只读属性来告诉你 `AssetItem` 的状态。两者都是 `BOOL`\
    \ 类型。一个是 `metadataLoaded`，它是一个标志，告诉你是否已经加载了 `AVAsset` 的元数据。第二个是 `isVideo`，它告诉你你的\
    \ `AVAsset` 是否有视频轨道。\n\n```objective-c\n@property (assign, nonatomic, readonly)\
    \ BOOL metadataLoaded;\n@property (assign, nonatomic, readonly) BOOL isVideo;\n\
    ```\n\n你需要声明两个初始化方法。一个从 URL 创建实例。另一个从另一个 `AssetItem` 实例创建副本；这对于 `NSCopying` 协议是必需的。\n\
    \n```objective-c\n- (id)initWithURL:(NSURL *)aURL;\n- (id)initWithAsset:(AssetItem\
    \ *)assetItem;\n```\n"
- fmt: "你需要一个方法，该方法会异步加载`AVAsset`的元数据。\n\n```\n- (void)loadAssetMetadataWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem))completion;\n```\n\n现在准备工作`AssetItem`的实现。打开`AssetItem.m`。首先，你需要在`AssetItem`头文件导入的下方，导入`AVFoundation`头文件。你还需要定义一个字符串常量`kAssetItemDispatchQueue`。稍后会解释为什么需要它。\n\
    \n```\n#import <AVFoundation/AVFoundation.h>\n\n#define kAssetItemDispatchQueue\
    \ \"AssetQueue\"\n```\n\n你需要定义一个私有属性来持有你的调度队列。我们将在[第14章](#9781430238072_Ch14.xhtml)中更详细地讨论调度队列。调度队列是`Grand\
    \ Central Dispatch`框架的一部分。你使用调度队列来排列你的资源加载操作。当你加载`AVAsset`并执行异步加载请求时，你会将它们放入调度队列。这样做有两个好处。首先，资源将按照它们被请求的顺序加载，这应该是它们被请求的顺序。其次，这将防止你的应用程序创建过多的后台请求。如果你的媒体库有成百上千个项目，你可能会为每个项目生成一个进程（线程）。创建太多，你的应用程序将冻结。调度队列确保你保持进程（线程）数量较低。你的私有类别声明如下：\n\
    \n```\n@interface AssetItem ()\n@property (strong, nonatomic) dispatch_queue_t\
    \ dispatchQueue;\n```\n\n你的私有类别还将包含一些方法来帮助处理加载的异步特性。\n\n```\n- (AVAsset *)assetCopyIfLoaded;\n\
    - (AVAsset *)localAsset;\n- (NSString *)loadTitleForAsset:(AVAsset *)a;\n- (NSString\
    \ *)loadArtistForAsset:(AVAsset *)a;\n- (UIImage *)loadImageForAsset:(AVAsset\
    \ *)a;\n@end\n```\n\n当我们讲到这些方法的具体实现时，会讨论它们的细节。\n\n由于你有多个只读属性，你需要在`@implementation`声明之后合成它们。\n\
    \n```\n@synthesize title = _title;\n@synthesize artist = _artist;\n@synthesize\
    \ image = _image;\n```\n\n让我们从你的初始化方法开始实现方法。\n\n```\n- (id)initWithURL:(NSURL\
    \ *)aURL\n{\n    self = [super init];\n    if (self) {\n        self.assetURL\
    \ = aURL;\n        self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue,\
    \ DISPATCH_QUEUE_SERIAL);\n    }\n    return self;\n}\n\n- (id)initWithAsset:(AssetItem\
    \ *)assetItem\n{\n    self = [super init];\n    if (self) {\n        self.assetURL\
    \ = assetItem.assetURL;\n        self.asset = [assetItem assetCopyIfLoaded];\n\
    \        _title = assetItem.title;\n        _artist = assetItem.artist;\n    \
    \    _image = assetItem.image;\n        _metadataLoaded = assetItem.metadataLoaded;\n\
    \        _isVideo = assetItem.isVideo;\n        self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue,\
    \ DISPATCH_QUEUE_SERIAL);\n    }\n    return self;\n}\n```\n\n两个初始化方法应该都很直观。在这两个方法中，你都使用常量字符串标识符`kAssetItemDispatchQueue`创建了一个串行队列。`initWithAsset:`方法复制了相关的属性。注意在复制`AVAsset`属性时使用了私有方法`assetCopyIfLoaded`。\n\
    \n接下来，你将定义遵循`NSCopying`协议所需的方法。\n\n```\n#pragma mark - NSCopying Protocol Methods\n\
    \n- (id)copyWithZone:(NSZone *)zone\n{\n        AssetItem *copy = [[AssetItem\
    \ allocWithZone:zone] initWithAsset:self];\n        return copy;\n}\n\n- (BOOL)isEqual:(id)anObject\n\
    {\n        if (self == anObject)\n                return YES;\n\nif ([anObject\
    \ isKindOfClass:[AssetItem class]]) {\n                AssetItem *assetItem =\
    \ anObject;\n                if (self.assetURL && assetItem.assetURL)\n      \
    \                  return [self.assetURL isEqual:assetItem.assetURL];\n      \
    \          return NO;\n        }\n        return NO;\n}\n\n- (NSUInteger)hash\n\
    {\n    return (self.assetURL) ? [self.assetURL hash] : [super hash];\n}\n```\n\
    \n对于`isEqual:`和`hash`方法，你依赖于资源`URL`的唯一性。\n\n你将重写某些属性的访问器。为了访问`AssetItem`底层的`AVAsset`，你需要复制一份资源。这是因为`AVAsset`实例在同一时间只能从一个线程访问。如果你返回了对`AssetItem`实际`AVAsset`的引用，则无法保证它不会被不同线程访问。注意，这里你并没有复制底层的`AVAsset`实例变量；而是调用了`localAsset`方法。\n\
    \n```\n#pragma mark - Property Overrides\n\n// 复制一份，因为 AVAsset 一次只能安全地从一个线程访问\n\
    - (AVAsset*)asset\n{\n        __block AVAsset *theAsset = nil;\n        dispatch_sync(self.dispatchQueue,\
    \ ^(void) {\n                theAsset = [[self localAsset] copy];\n        });\n\
    \        return theAsset;\n}\n\n- (NSString *)title\n{\n    if (_title == nil)\n\
    \        return [self.assetURL lastPathComponent];\n    return _title;\n}\n\n\
    - (NSString *)artist\n{\n    if (_artist == nil)\n        return @\"Unknown\"\
    ;\n    return _artist;\n}\n```\n\n`title`和`artist`访问器会检查它们各自的实例变量。如果它们为`nil`，你可以假设你尚未加载资源的元数据，或者元数据值不存在。在这些情况下，你使用一个备用值。对于资源标题，你使用资源`URL`的最后一个路径组件。对于艺术家名称，你简单地使用值`Unknown`。\n\
    \n加载资源的元数据可能会有些复杂，所以让我们逐步了解实现过程。\n\n```\n- (void)loadAssetMetadataWithCompletionHandler:(void\
    \ (^)(AssetItem *assetItem))completion\n{\n    dispatch_async(self.dispatchQueue,\
    \ ^(void){\n```\n\n你做的第一件事是将整个方法体包裹在一个对调度队列的`dispatch_async`调用中。你将通过主线程调用此方法。`dispatch_async`调用确保该方法将被放入你的调度队列并在主线程之外执行。你获取你的`AVAsset`并使其异步加载其元数据。\n\
    \n```\n        AVAsset *a = [self localAsset];\n        [a loadValuesAsynchronouslyForKeys:@[@\"\
    commonMetadata\"] completionHandler:^{\n            NSError *error;\n        \
    \    AVKeyValueStatus cmStatus = [a statusOfValueForKey:@\"commonMetadata\" error:&error];\n\
    \            switch (cmStatus) {\n                case AVKeyValueStatusLoaded:\n\
    \                    _title = [self loadTitleForAsset:a];\n                  \
    \  _artist = [self loadArtistForAsset:a];\n                    _image = [self\
    \ loadImageForAsset:a];\n                    _metadataLoaded = YES;\n        \
    \            break;\n\ncase AVKeyValueStatusFailed:\n                case AVKeyValueStatusCancelled:\n\
    \                    dispatch_async(dispatch_get_main_queue(), ^{\n          \
    \              NSLog(@\"The asset's available metadata formats were not loaded:\\\
    n%@\", [error localizedDescription]);\n                    });\n             \
    \       break;\n            }\n```\n\n在`loadValuesAsychronouslyForKeys:completetionHandler:`完成后，完成处理程序块会检查`commonMetadata`键的状态。如果加载因某种原因失败或被取消，你记录错误。如果加载成功，你加载你关心的元数据属性，并将`metadataLoaded`标志设置为`YES`。\n\
    \n```\n            /* 重要提示：必须调度到主队列才能操作 AVPlayer 和 AVPlayerItem。 */\n        \
    \    dispatch_async(dispatch_get_main_queue(), ^{\n                if (completion)\n\
    \                    completion(self);\n            });\n        }];\n    });\n\
    }\n```\n\n最后，你调用传入方法的完成处理程序。你将该调用派发回主队列，因为它将与你的`AVPlayer`和`AVPlayerItem`实例进行交互。"
  raw: 'You need a method to call that will asynchronously load your AVAsset’s metadata.


    ```

    - (void)loadAssetMetadataWithCompletionHandler:(void (^)(AssetItem *assetItem))completion;

    ```


    Now you’re ready to work on the implementation of AssetItem. Open AssetItem.m.
    To start, you need to import the AVFoundation header, right below the AssetItem
    header import. You’ll also define a string constant, kAssetItemDispatchQueue.
    We’ll explain why you need it in just a second.


    ```

    #import <AVFoundation/AVFoundation.h>


    #define kAssetItemDispatchQueue "AssetQueue"

    ```


    You need to define a private property to hold your dispatch queue. We’ll discuss
    dispatch queues in more detail in [Chapter 14](#9781430238072_Ch14.xhtml). Dispatch
    queues are part of the Grand Central Dispatch framework. You’re using a dispatch
    queue to order your asset loading operations. As you load an AVAsset and perform
    your asynchronous loading requests, you’ll put them into the dispatch queue. The
    benefits of this are two-fold. First, assets will be loaded in the order they
    are request, which should be the order they were requested. Second, this will
    keep your application from creating too many background requests. If your media
    library has hundreds or thousands of items, you could potentially spawn a process
    (thread) for each item. Create too many, and your application will freeze. A dispatch
    queue ensures that you keep your process (thread) count down. Your private category
    declaration starts like this:


    ```

    @interface AssetItem ()

    @property (strong, nonatomic) dispatch_queue_t dispatchQueue;

    ```


    Your private category will also include a number of methods to help with the asynchronous
    nature of loading.


    ```

    - (AVAsset *)assetCopyIfLoaded;

    - (AVAsset *)localAsset;

    - (NSString *)loadTitleForAsset:(AVAsset *)a;

    - (NSString *)loadArtistForAsset:(AVAsset *)a;

    - (UIImage *)loadImageForAsset:(AVAsset *)a;

    @end

    ```


    We’ll discuss the specifics of these methods when we get to their implementations.


    Since you have a number of read-only properties, you need to synthesize them,
    right after the @implementation declaration.


    ```

    @synthesize title = _title;

    @synthesize artist = _artist;

    @synthesize image = _image;

    ```


    Let’s start your method implementation with your initializers.


    ```

    - (id)initWithURL:(NSURL *)aURL

    {

        self = [super init];

        if (self) {

            self.assetURL = aURL;

            self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue, DISPATCH_QUEUE_SERIAL);

        }

        return self;

    }


    - (id)initWithAsset:(AssetItem *)assetItem

    {

        self = [super init];

        if (self) {

            self.assetURL = assetItem.assetURL;

            self.asset = [assetItem assetCopyIfLoaded];

            _title = assetItem.title;

            _artist = assetItem.artist;

            _image = assetItem.image;

            _metadataLoaded = assetItem.metadataLoaded;

            _isVideo = assetItem.isVideo;

            self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue, DISPATCH_QUEUE_SERIAL);

        }

        return self;

    }

    ```


    Both initializers should be straightforward. In both methods, you create a dispatch
    queue, with your constant string identifier, kAssetItemDispatchQueue, and as a
    serial queue. The initWithAsset: method copies the relevant properties. Note the
    use of the private method assetCopyIfLoaded when copying the AVAsset property.


    Next, you’ll define the methods you need to conform to the NSCopying protocol.


    ```

    #pragma mark - NSCopying Protocol Methods


    - (id)copyWithZone:(NSZone *)zone

    {

            AssetItem *copy = [[AssetItem allocWithZone:zone] initWithAsset:self];

            return copy;

    }


    - (BOOL)isEqual:(id)anObject

    {

            if (self == anObject)

                    return YES;


    if ([anObject isKindOfClass:[AssetItem class]]) {

                    AssetItem *assetItem = anObject;

                    if (self.assetURL && assetItem.assetURL)

                            return [self.assetURL isEqual:assetItem.assetURL];

                    return NO;

            }

            return NO;

    }


    - (NSUInteger)hash

    {

        return (self.assetURL) ? [self.assetURL hash] : [super hash];

    }

    ```


    For the isEqual: and hash methods, you rely on the uniqueness of the asset’s URL.


    You’ll override the accessors for some properties. To access an AssetItem’s underlying
    AVAsset, you make a copy of the asset. This is because an AVAsset instance can
    only be accessed from one thread at a time. If you returned a reference to the
    AssetItem’s actual AVAsset, you can’t guarantee that it won’t be accessed from
    different threads. Note that you don’t copy the underlying AVAsset ivar; rather
    you’ve invoked the method localAsset.


    ```

    #pragma mark - Property Overrides


    // Make a copy since AVAsset can only be safely accessed from one thread at a
    time

    - (AVAsset*)asset

    {

            __block AVAsset *theAsset = nil;

            dispatch_sync(self.dispatchQueue, ^(void) {

                    theAsset = [[self localAsset] copy];

            });

            return theAsset;

    }


    - (NSString *)title

    {

        if (_title == nil)

            return [self.assetURL lastPathComponent];

        return _title;

    }


    - (NSString *)artist

    {

        if (_artist == nil)

            return @"Unknown";

        return _artist;

    }

    ```


    The title and artist accessors check their respective ivars. If they are nil,
    you can assume either you haven’t loaded the asset’s metadata (yet), or the metadata
    values don’t exists. In those cases, you use a fall back value. For the asset
    title, you use the last component of the asset URL. For artist name, you simply
    use the value Unknown.


    Loading an asset’s metadata can be a little complicated, so let’s step through
    the implementation.


    ```

    - (void)loadAssetMetadataWithCompletionHandler:(void (^)(AssetItem *assetItem))completion

    {

        dispatch_async(self.dispatchQueue, ^(void){

    ```


    The first thing you do is wrap the entire method body with a dispatch_async call
    to your dispatch queue. You’ll be invoking this method from the main thread. The
    dispatch_async call ensures that the method will be placed in your dispatch queue
    and executed off the main thread. You retrieve your AVAsset and have it load its
    metadata asynchronously.


    ```

            AVAsset *a = [self localAsset];

            [a loadValuesAsynchronouslyForKeys:@[@"commonMetadata"] completionHandler:^{

                NSError *error;

                AVKeyValueStatus cmStatus = [a statusOfValueForKey:@"commonMetadata"
    error:&error];

                switch (cmStatus) {

                    case AVKeyValueStatusLoaded:

                        _title = [self loadTitleForAsset:a];

                        _artist = [self loadArtistForAsset:a];

                        _image = [self loadImageForAsset:a];

                        _metadataLoaded = YES;

                        break;


    case AVKeyValueStatusFailed:

                    case AVKeyValueStatusCancelled:

                        dispatch_async(dispatch_get_main_queue(), ^{

                            NSLog(@"The asset''s available metadata formats were not
    loaded:\n%@", [error localizedDescription]);

                        });

                        break;

                }

    ```


    On completion of loadValuesAsychronouslyForKeys:completetionHandler:, the completion
    handler block checks the status of the commonMetadata key. If the load failed
    or was cancelled for some reason, you log the error. If the load was successful,
    you load the metadata properties you care about and set the metadataLoaded flag
    to YES.


    ```

                /* IMPORTANT: Must dispatch to main queue in order to operate on the
    AVPlayer and AVPlayerItem. */

                dispatch_async(dispatch_get_main_queue(), ^{

                    if (completion)

                        completion(self);

                });

            }];

        });

    }

    ```


    Finally, you invoke the completion handler passed into your method. You dispatch
    this call back to the main queue as it will interact with your AVPlayer and AVPlayerItem
    instances.'
