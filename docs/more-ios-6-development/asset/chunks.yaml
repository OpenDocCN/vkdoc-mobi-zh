  trans: "\n```objectivec\nNSDictionary *options = @{ NSMigratePersistentStoresAutomaticallyOption\
    \ : @YES,\n                                                         NSInferMappingModelAutomaticallyOption\
    \ : @YES,\n                                                      NSPersistentStoreUbiquitousContentNameKey\
    \ : ubiquityContainer,\n                                                     \
    \  NSPersistentStoreUbiquitousContentURLKey : logsPath };\n\nNSString *dataPath\
    \ = [dataDir stringByAppendingPathComponent:dataFileName];\n        [psc lock];\n\
    \        [psc addPersistentStoreWithType:NSSQLiteStoreType\n                configuration:nil\n\
    \                URL:[NSURL fileURLWithPath:dataPath]\n                options:options\n\
    \                error:&error];\n        [psc unlock];\n    }\n    else {\n  \
    \      // No iCloud Access\n    }\n});\n```\n\n请注意，你在后台队列中执行持久化存储操作，这样 iCloud\
    \ 访问就不会阻塞应用程序的用户界面。此处的示例大多定义了你的数据目录路径 `Data.nosync` 和日志目录路径 `Logs`。实际的持久化存储创建与你之前所做的类似。你向\
    \ `options` 字典添加了两个键值对：`NSPersistentStoreUbiquitousContentNameKey` 对应你的通用容器 ID，以及\
    \ `NSPersistentStoreUbiquityContentURLKey` 对应事务日志目录路径。Core Data 和 iCloud 将使用 `NSPersistentStoreUbiquityContentURLKey`\
    \ 来同步事务日志。\n\n现在，你需要注册以观察从 iCloud 收到更改时的通知。通常，你不应在创建持久化存储协调器时进行此操作；而应在创建托管对象上下文时进行。\n\
    \n```objectivec\n[[NSNotificationCenter defaultCenter]\n                     \
    \   addObserver:self\n                        selector:@selector(mergeChangesFromUbiquitousContent:)\n\
    \                        name:NSPersistentStoreDidImportUbiquitousContentChangesNotification\n\
    \                        object:coordinator];\n```\n\n`mergeChangesFromUbiquitousContent:`\
    \ 的实现需要处理 iCloud 与本地持久化存储之间的内容合并。幸运的是，对于除最复杂模型之外的所有情况，Core Data 使这个过程相对轻松。\n\n\
    ```objectivec\n- (void)mergeChangesFromUbiquitousContent:(NSNotification *)notification\n\
    {\n    NSManagedObjectContext *context = [self managedObjectContext];\n    [context\
    \ performBlock:^{\n        [context mergeChangesFromContextDidSaveNotification:notification];\n\
    \            // 发送一个通知来刷新 UI（如果需要）\n    }];\n}\n```\n\n## 增强 SuperDB\n\n你将增强 Core\
    \ Data SuperDB 应用程序，并将持久化存储放置在 iCloud 中。根据你对 iCloud API 的回顾，这应该是一个相当简单的过程。请记住，（目前）你还无法在模拟器上运行\
    \ iCloud 应用程序，因此需要将设备连接到开发机器上。此外，由于你需要一个配置文件，所以还需要一个 Apple Developer Center 账户。\n\
    \n复制第 6 章的 SuperDB 项目。如果你尚未完成第 6 章，也没关系。你可以从本书的下载存档中复制该项目，并以此为基础开始。\n\n### 授权\n\
    \n首先，你需要为应用程序启用授权。在 Xcode 中打开项目后，在导航器面板中选择项目以打开项目编辑器。选择 SuperDB 目标，并打开目标摘要编辑器。向下滚动到名为\
    \ Entitlements 的部分。选中第一个子部分（即 Entitlements）中的复选框（图 8-1）。\n\n![9781430238072_Fig08-01.jpg](img/9781430238072_Fig08-01.jpg)\n\
    \n图 8-1. 目标摘要编辑器的授权部分\n\n请注意，复选框旁边标有“使用授权文件”（Use Entitlements File）的下拉框会自动填入 `SuperDB`\
    \ 的值。之前我们说过，当启用授权时，Xcode 期望项目中有一个 `.entitlements` 文件。查看导航器面板。在 SuperDB 组中应该有一个名为\
    \ `SuperDB.entitlements` 的新文件。Xcode 会自动为你创建此文件。再往下，标有 Keychain Groups 的子部分也会自动填充。对于我们的情况，其值为\
    \ `com.apporchard.SuperDB`。\n\n既然启用了授权，你就需要为应用程序启用 iCloud。授权部分的第二个子部分应该以一个用于启用\
    \ iCloud 的复选框开头。选中它。下一个复选框会激活应用程序的键值数据存储。你不会用到键值存储，因此可以保持其未选中状态。你需要填充下一部分，即通用容器。在列表框底部，点击\
    \ `+` 按钮。Xcode 会自动添加一个带有默认值的行。同样，对于我们来说，该值为 `com.apporchard.SuperDB`。默认值对我们有效，因此我们保留它。\n\
    \n### 创建支持 iCloud 的配置文件\n\n现在你的应用程序已启用 iCloud 授权，你需要创建一个支持 iCloud 的配置文件。将浏览器指向\
    \ http://developer.apple.com 的 Apple Developer Center。登录你的 ADC 账户，并进入 iOS Developer\
    \ Center（图 8-2）。\n\n![9781430238072_Fig08-02.jpg](img/9781430238072_Fig08-02.jpg)\n\
    \n图 8-2. iOS Developer Center\n\n网页右侧有一个标记为 iOS Developer Program 的部分。第一个选项是 iOS\
    \ Provisioning Portal。进入 Provisioning Portal（图 8-3）。\n\n![9781430238072_Fig08-03.jpg](img/9781430238072_Fig08-03.jpg)\n\
    \n图 8-3. iOS Provisioning Portal\n\n进入 Provisioning Portal 后，首先需要创建一个 App ID。在配置文件左侧，点击\
    \ App IDs 链接。你应该会进入配置文件的 App ID 管理页面（图 8-4）。\n\n![9781430238072_Fig08-04.jpg](img/9781430238072_Fig08-04.jpg)\n\
    \n图 8-4. App ID 管理页面\n\n如果你创建过其他 App ID，你将看到它们的列表。既然你需要（希望是）创建一个新的 App ID，请点击页面右上角附近的\
    \ New App ID 按钮。这将打开一个用于创建新 App ID 的表单。第一个字段是你的应用程序的描述（即常用名称）。由于你为 SuperDB 输入数据，因此你将在该字段输入\
    \ SuperDB。Bundle Seed ID 应自动选择为你的 Team ID。如果你是多个 ADC 开发团队的成员，这里可能会让你做出选择。如果是这样，你应该选择此处适当的\
    \ Team ID。最后，你需要提供你的 Bundle ID 后缀。惯例是使用反向域名风格。此处值应与 Xcode 中的 Bundle Identifier\
    \ 匹配，这一点很重要。你可以在 Xcode 的目标摘要编辑器顶部找到该值（图 8-5）。我们完成的表单如图 8-6 所示。点击 Create 按钮提交表单并创建你的\
    \ App ID。\n\n![9781430238072_Fig08-05.jpg](img/9781430238072_Fig08-05.jpg)\n\n\
    图 8-5. Xcode 目标摘要编辑器\n\n![9781430238072_Fig08-06.jpg](img/9781430238072_Fig08-06.jpg)\n\
    \n图 8-6. 已完成的新 App ID 表单\n\n创建 App ID 后，你将返回到 App ID 管理页面，其中 SuperDB App ID 应该有一个条目（图\
    \ 8-7）。你需要为该 App ID 启用 iCloud。首先在你的 App ID 条目中点击 Configure 链接。\n"
- fmt: "![9781430238072_Fig08-07.jpg](images/9781430238072_Fig08-07.jpg)\n\n[Figure\
    \ 8-7.](#9781430238072_Ch08.xhtml#_Fig7) SuperDB has been added the App IDs list\n\
    \nThe App ID Configuration page should present a series of checkboxes for your\
    \ SuperDB application ([Figure 8-8](#9781430238072_Ch08.xhtml#Fig8)).\n\n![9781430238072_Fig08-08.jpg](images/9781430238072_Fig08-08.jpg)\n\
    \n[Figure 8-8.](#9781430238072_Ch08.xhtml#_Fig8) SuperDB App ID Configuration\
    \ page\n\nClick the checkbox labeled \"Enable for iCloud.\" You should receive\
    \ a dialog like the one in [Figure 8-9](#9781430238072_Ch08.xhtml#Fig9). This\
    \ is a warning to tell you that all new provisioning profiles for this App ID\
    \ will be enabled for iCloud, but any existing profile is not enabled. Click OK.\
    \ When you return to the App ID management page, your SuperDB application should\
    \ be enabled for iCloud. You're done creating the App ID for SuperDB, so now you\
    \ can move on to the provisioning profile.\n\n![9781430238072_Fig08-09.jpg](images/9781430238072_Fig08-09.jpg)\n\
    \n[Figure 8-9.](#9781430238072_Ch08.xhtml#_Fig9) Enabling iCloud warning dialog\n\
    \nSelect the Provisioning link in the provisioning navigation column on the left\
    \ of the Provisioning Portal page. Like the App IDs page, if you have existing\
    \ profiles, they'll be listed here. There are Development and Deployment tabs\
    \ at the top of the page. Depending on which tab is selected, you'll create a\
    \ profile appropriate for development or deployment. For your purposes, a development\
    \ profile is sufficient. Make sure that the Development tab is selected, and click\
    \ the New Profile button. Again, as with the App IDs, you're taken to a form to\
    \ create a new profile ([Figure 8-10](#9781430238072_Ch08.xhtml#Fig10)).\n\n![9781430238072_Fig08-10.jpg](images/9781430238072_Fig08-10.jpg)\n\
    \n[Figure 8-10.](#9781430238072_Ch08.xhtml#_Fig10) New provisioning profile page\n\
    \nGive the profile a unique, descriptive name. Check the Certificates checkbox\
    \ (if you're given more than one choice, select the appropriate one). Pick the\
    \ SuperDB application from the App ID drop-down. Finally, check the devices you\
    \ wish this profile to be enabled on. When finished, click Submit to create your\
    \ profile. The completed form looks like [Figure 8-11](#9781430238072_Ch08.xhtml#Fig11).\n\
    \n![9781430238072_Fig08-11.jpg](images/9781430238072_Fig08-11.jpg)\n\n[Figure\
    \ 8-11.](#9781430238072_Ch08.xhtml#_Fig11) Our completed new Provisioning Profile\
    \ form\n\nYou should be redirected back to the provisioning profile Manage page,\
    \ where your new profile will be listed with a status of Pending ([Figure 8-12](#9781430238072_Ch08.xhtml#Fig12)).\
    \ Wait a few moments, and refresh the page. The status should change to Active,\
    \ and you can now download or edit the profile ([Figure 8-13](#9781430238072_Ch08.xhtml#Fig13)).\n\
    \n![9781430238072_Fig08-12.jpg](images/9781430238072_Fig08-12.jpg)\n\n[Figure\
    \ 8-12.](#9781430238072_Ch08.xhtml#_Fig12) The provisioning profile is pending\n\
    \n![9781430238072_Fig08-13.jpg](images/9781430238072_Fig08-13.jpg)\n\n[Figure\
    \ 8-13.](#9781430238072_Ch08.xhtml#_Fig13) The provisioning profile is active\n\
    \nAt this point, there are two ways of loading your provisioning profile into\
    \ Xcode. You can click the Download button, which will download a `.mobileprovision`\
    \ file. Then, you can open the Xcode Organizer and select Devices in the toolbar.\
    \ Once the Devices organizer is open, select the Provisioning Profiles under the\
    \ Library section in the left side of the organizer ([Figure 8-14](#9781430238072_Ch08.xhtml#Fig14)).\
    \ Click the Import button on the bottom of the Profiles pane and open the `.mobileprovision`\
    \ file you just downloaded. The provisioning profile you just created should appear\
    \ in the list.\n\n![9781430238072_Fig08-14.jpg](images/9781430238072_Fig08-14.jpg)\n\
    \n[Figure 8-14.](#9781430238072_Ch08.xhtml#_Fig14) Provisioning Profiles pane\
    \ of the Devices tab of Xcode Organizer\n\nAlternatively, you can simply click\
    \ the Refresh button on the bottom right of the Profiles pane. Xcode will ask\
    \ for your ADC login information. Once you enter that information and click the\
    \ Log In button, Xcode should automatically download and install the provisioning\
    \ profile.\n\nOn that note, let us also mention that Apple provides an alternative\
    \ method of creating a provisioning profile via the Xcode Organizer. In many ways,\
    \ it's much easier than using the ADC iOS Provisioning Portal. In [Figure 8-14](#9781430238072_Ch08.xhtml#Fig14),\
    \ you can see a New button on the bottom left of the Profiles pane. You may be\
    \ asked for your ADC login information. Once you're logged in, you should be presented\
    \ with a New Profile Assistant ([Figure 8-15](#9781430238072_Ch08.xhtml#Fig15)).\n\
    \n![9781430238072_Fig08-15.jpg](images/9781430238072_Fig08-15.jpg)\n\n[Figure\
    \ 8-15.](#9781430238072_Ch08.xhtml#_Fig15) Xcode Organizer New Profile Assistant\n\
    \nIn essence, this information is identical to the new profile form from the ADC\
    \ iOS Provisioning Portal ([Figure 8-10](#9781430238072_Ch08.xhtml#Fig10)). You\
    \ enter a unique, descriptive name for the profile. Select the appropriate App\
    \ ID, devices, and certificates. Then click Finish. If successful, Xcode will\
    \ create and install the new provisioning profile.\n\nThat was a lot of work just\
    \ to get iCloud activated for your application. The upside is that the amount\
    \ of code that you need to implement should be pretty easy to write.\n\n## Updating\
    \ the Persistent Store\n\nIn the SuperDB Xcode project window, open `AppDelegate.m`\
    \ and find the `persistentStoreCoordinator` method. You need to rewrite it to\
    \ check and use an iCloud persistent store if possible, or else fall back to a\
    \ local persistent store. The beginning of the method remains the same: you check\
    \ if you've already created an instance of your persistent store coordinator;\
    \ if not, you instantiate one.\n\n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n\
    {\n    if (_persistentStoreCoordinator != nil) {\n        return _persistentStoreCoordinator;\n\
    \    }\n\n_persistentStoreCoordinator = [[NSPersistentStoreCoordinator alloc]\n\
    \                                        initWithManagedObjectModel:[self managedObjectModel]];\n\
    ```\n\nYou dispatch the following code to a background queue so as not to block\
    \ the main thread. The following code is similar to the example provided in the\
    \ \"Core Data with iCloud\" section earlier. Review that section for a detailed\
    \ explanation.\n\n```\n    __block NSPersistentStoreCoordinator *psc = _persistentStoreCoordinator;\n\
    \    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n        NSPersistentStore *newStore = nil;\n        NSError *error =\
    \ nil;\n\nNSString *dataFile = @\"SuperDB.sqlite\";\n        NSString *dataDir\
    \ = @\"Data.nosync\";\n        NSString *logsDir = @\"Logs\";\n```"
