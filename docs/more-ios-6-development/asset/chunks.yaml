    \ 8-12）。稍等片刻，然后刷新页面。状态应变为“Active”（已激活），此时你可以下载或编辑该描述文件（图 8-13）。\n\n![9781430238072_Fig08-12.jpg](img/9781430238072_Fig08-12.jpg)\n\
    \n图 8-12. 预置描述文件状态为“待处理”\n\n![9781430238072_Fig08-13.jpg](img/9781430238072_Fig08-13.jpg)\n\
    \n图 8-13. 预置描述文件状态为“已激活”\n\n此时，有两种方法可以将预置描述文件加载到 Xcode 中。你可以点击 Download（下载）按钮，这将下载一个\
    \ `.mobileprovision` 文件。然后，打开 Xcode 的 Organizer（管理器），并在工具栏中选择 Devices（设备）。在“设备”管理器打开后，选择管理器左侧\
    \ Library（资料库）栏目下的 Provisioning Profiles（预置描述文件）（图 8-14）。点击 Profiles 面板底部的 Import（导入）按钮，然后打开你刚下载的\
    \ `.mobileprovision` 文件。你刚刚创建的预置描述文件应出现在列表中。\n\n![9781430238072_Fig08-14.jpg](img/9781430238072_Fig08-14.jpg)\n\
