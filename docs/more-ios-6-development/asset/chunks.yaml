    controller or use a pointer to an existing controller, set some properties to
    indicate which values need to get edited, then push the controller onto the navigation
    stack. If you discover a problem in your logic anywhere in these switch statements,
    chances are you’re going to have to change that logic in several places, possibly
    even dozens.


    Controlling the Table Structure with Property Lists


    As you can see, the most obvious solution isn’t always the best one. You don’t
    want to have very similar chunks of code scattered throughout your controller
    class, and you don’t want to have to maintain multiple copies of a complex decision
    tree. There’s a better way to do this.


    You can use property lists to mirror the structure of your table. As the user
    navigates down the app, you can use the data stored in a property list to construct
    the appropriate table. Property lists are a simple, but powerful way to store
    information.


    [Chapter 10](#9781430238072_Ch10.xhtml) of *Beginning iOS 6 Development* discussed
    property lists. Let’s quickly review them here.


    Property Lists Explained


    Property lists are a simple way to represent, store, and retrieve data. Both Mac
    OS X and iOS make extensive use of property lists. Within property lists, two
    kinds of data types can be used: primitive and collections. The primitive types
    available are strings, numbers, binary data, dates, and Boolean values. The available
    collection types are arrays and dictionaries. The collections types can contain
    both primitive types and additional collections. Property lists can be stored
    in two file types: XML and binary data. Xcode provides a property list editor
    to make management of property lists easier for you. We’ll discuss that in a little
    bit.


    Property lists start with a *root node*. Technically, the root node can be of
    any type, primitive or collection. However, a property list of a primitive type
    has limited usefulness as it would be a “list” of one value. More common is a
    root node of a collection type: an array or a dictionary. When you create a property
    list with the Xcode property list editor, the root node will be a dictionary.


    **Note**  To learn more detail about property lists, read Apple’s documentation
    at [http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html).


    Modeling Table Structure with a Property List


    So how can you use a property list to describe your table? Refer back to [Figure
    4-2](#9781430238072_Ch04.xhtml#Fig2). Looking at the table, you can see two sections.
    The first section has no header, but the second section has a header of General.
    Each section has a certain number of rows (one and three, respectively) where
    each row represents a specific attribute of your managed object. Additionally,
    each row also has a label, which tells you what value is being displayed.


    To start, you represent the table as an array, with each item in the array representing
    a section of the table. Each section, in turn, will be represented by a dictionary.
    You have a header key in the section dictionary, which stores the string value
    of the header. Note that the first section of the table does not have a header;
    you just use an empty string to represent it.


    **Note**  If you recall, there are only five primitive data types in a property
    list: string, numbers, binary data, dates, and Booleans. That doesn’t leave you
    with a way to represent nil values. So you must rely on an empty string to represent
    nil.


    The second key of the section dictionary will be rows. The value for this key
    will be another array, where each item of the rows array will represent the data
    to render the row. To represent a row, you’ll use another dictionary. This row
    dictionary will have a key of label, referencing a string that will be used as
    the row label plus a key of attribute, which will be a string of the managed object’s
    attribute to render in the row.


    Confused? Don’t worry, it’s very difficult to model things descriptively. [Figure
    4-12](#9781430238072_Ch04.xhtml#Fig12) tries to explain it graphically.


    ![9781430238072_Fig04-12.jpg](images/9781430238072_Fig04-12.jpg)


    [Figure 4-12.](#9781430238072_Ch04.xhtml#_Fig12)  Graphical representation of
    your property list


    That should be all the data structures you need to represent the table’s structure
    to start. Fortunately, if you discover that you need additional information for
    each row, you can always add additional data later without impacting your existing
    design.


    Let’s begin building your detail view.


