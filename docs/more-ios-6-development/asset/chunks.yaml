    \ `NSLocalizedDescriptionKey` 下存储一个错误字符串，`NSLocalizedDescriptionKey` 是一个为此目的而存在的系统常量。然后，你创建一个新的\
    \ `NSError` 实例，并将新创建的字典作为 `NSError` 的 `userInfo` 字典传递。这是在验证方法以及几乎所有其他接受 `NSError`\
    \ 句柄作为参数的方法中返回信息的标准方式。\n\n请注意，在创建 `NSError` 实例时，你使用了之前定义的两个常量：`kHeroValidationDomain`\
    \ 和 `kHeroValidationBirthdateCode`：\n\n```\nNSError *error = [[NSError alloc]\
    \ initWithDomain:kHeroValidationDomain\n                                     \
    \       code:kHeroValidationBirthdateCode\n                                  \
    \      userInfo:userInfoDict];\n```\n\n**提示** 请注意，在单属性验证方法中，你没有调用 `super`。这并不是因为这些方法被定义为抽象方法，而是因为它们根本不存在。这些方法是在运行时动态创建的，因此不仅调用\
    \ `super` 没有意义，而且实际上 `super` 上也没有方法可以调用。\n\n每个 `NSError` 都需要一个错误域和一个错误代码。错误代码是唯一标识特定错误类型的整数。错误域定义了生成错误的应用程序或框架。例如，有一个名为\
    \ `NSCocoaErrorDomain` 的错误域，用于标识 Apple 的 Cocoa 框架中的代码所创建的错误。你为自己的应用程序定义了自己的错误域，使用了反向\
