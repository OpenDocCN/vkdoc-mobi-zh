    Media Queries and Media Property Predicates


    To search for media items in the media library, you use media queries, which are
    instances of the class MPMediaQuery. A number of factory methods can be used to
    retrieve media items from the library sorted by a particular property. For example,
    if you want a list of all media items sorted by artist, you can use the artistsQuery
    class method to create an instance of MPMediaQuery configured, like this:


    ```

    MPMediaQuery *artistsQuery = [MPMediaQuery artistsQuery];

    ```


    [Table 12-1](#9781430238072_Ch12.xhtml#Tab1) lists the factory methods on MPMediaQuery.


    [Table 12-1.](#9781430238072_Ch12.xhtml#_Tab1)  MPMediaQuery Factory Methods


    | **Factory Method** | **Included Media Types** | **Grouped/Sorted By** |

    | --- | --- | --- |

    | albumsQuery | Music | Album |

    | artistsQuery | Music | Artist |

    | audiobooksQuery | Audio Books | Title |

    | compilationsQuery | Any | Album* |

    | composersQuery | Any | Composer |

    | genresQuery | Any | Genre |

    | playlistsQuery | Any | Playlist |

    | podcastsQuery | Podcasts | Podcast Title |

    | songsQuery | Music | Title |


    **Includes only albums with MPMediaItemPropertyIsCompilation set to YES.*


    These factory methods are useful for displaying the entire contents of the user’s
    library that meet preset conditions. That said, you will often want to restrict
    the query to an even smaller subset of items. You can do that using a media predicate.
    Media predicates can be created on any of the filterable properties of a media
    item, including the persistent ID, media type, or any of the string properties
    (like title, artist, or genre).


    To create a media predicate on a filterable property, use the class MPMediaPropertyPredicate.
    Create new instances using the factory method predicateWithValue:forProperty:comparisonType:.
    Here, for example, is how to create a media predicate that searches for all songs
    with the title “Happy Birthday”:


    ```

    MPMediaPropertyPredicate *titlePredicate =

        [MPMediaPropertyPredicate predicateWithValue:@"Happy Birthday"

                                          forProperty:MPMediaItemPropertyTitle

                                       comparisonType:MPMediaPredicateComparisonContains];

    ```


    The first value you pass—in this case, @“Happy Birthday”—is the comparison value.
    The second value is the filterable property you want that comparison value compared
    to. By specifying MPMediaItemPropertyTitle, you’re saying you want the song titles
    compared to the string “Happy Birthday”. The last item specifies the type of comparison
    to do. You can pass MPMediaPredicateComparisonEqualTo to look for an exact match
    to the specified string, or MPMediaPredicateComparisonContains to look for any
    item that contains the passed value as a substring.


    **Note**  Media queries are always case-insensitive, regardless of the comparison
    type used. Therefore, the preceding example would also return songs called “HAPPY
    BIRTHDAY” and “Happy BirthDAY.”


    Because you’ve passed MPMediaPredicateComparisonContains, this predicate would
    match “Happy Birthday, the Opera” and “Slash Sings Happy Birthday,” in addition
    to plain old “Happy Birthday.” Had you passed MPMediaPredicateComparisonEqualTo,
    then only the last one—the exact match—would be found.


    You can create and pass multiple media property predicates to a single query.
    If you do, the query will use the AND logical operator and return only the media
    items that meet all of your predicates.


    To create a media query based on media property predicates, you use the init method
    initWithFilterPredicates: and pass in an instance of NSSet containing all the
    predicates you want it to use, like so:


    ```

    MPMediaQuery *query =

        [[MPMediaQuery alloc] initWithFilterPredicates:[NSSet setWithObject:titlePredicate]];

    ```


    Once you have a query—whether it was created manually or retrieved using one of
    the factory methods—there are two ways you can execute the query and retrieve
    the items to be displayed:


    *   You can use the items property of the query, which returns an instance of
    NSArray containing all the media items that meet the criteria specified in your
    media property predicates, like so:


    NSArray *items = query.items;


    *   You can use the property collections to retrieve the objects grouped by one
    of the filterable properties. You can tell the query which property to group the
    items by by setting the groupingType property to the property key for the filterable
    attribute you want it grouped by. If you don’t set groupingType, it will default
    to grouping by title.


    When you access the collections property, the query will instead return an array
    of MPMediaItemCollections, with one collection for each distinct value in your
    grouping type. So, if you specified a groupingType of MPMediaGroupingArtist, for
    example, the query would return an array with one MPMediaItemCollection for each
    artist who has at least one song that matches your criteria. Each collection would
    contain all the songs by that artist that meet the specified criteria. Here’s
    what that might look like in code:


    ```

    query.groupingType = MPMediaGroupingArtist;

    NSArray *collections = query.collections;

    for (MPMediaItemCollection *oneCollection in collections) {

        // oneCollection has all songs by one artist that meet criteria

    }

    ```


    You need to be very careful with media queries. They are synchronous and happen
    in the main thread, so if you specify a query that returns 100,000 media items,
    your user interface is going to hiccup while those items are found, retrieved,
    and stored in collections or an array. If you are using a media query that might
    return more than a dozen or so media items, you might want to consider moving
    that action off the main thread. You’ll learn how to move operations off of the
    main thread in [Chapter 14](#9781430238072_Ch14.xhtml).


    The Media Picker Controller


    If you want to let your users select specific media items from their library,
    you’ll want to use the media picker controller. The media picker controller lets
    your users choose audio from their iPod library using an interface that’s nearly
