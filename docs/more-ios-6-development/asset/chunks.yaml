- fmt: "Now you can design the view controller’s interface. Let’s add the tab bar\
    \ first. Look in the library for a Tab Bar. Make sure you’re grabbing a tab bar\
    \ and not a tab bar controller. You only want the user interface item. Drag a\
    \ tab bar from the library to the scene called View Controller, and place it snugly\
    \ in the bottom of the window, as shown in [Figure 3-17](#9781430238072_Ch03.xhtml#Fig17).\n\
    \n![9781430238072_Fig03-17.jpg](images/9781430238072_Fig03-17.jpg)\n\n[Figure\
    \ 3-17.](#9781430238072_Ch03.xhtml#_Fig17) The tab bar placed snugly against the\
    \ bottom of the scene\n\n**Note:** You may need to zoom in to drop the tab bar\
    \ into the view. You need to zoom in enough so the label changes from View Controller\
    \ to a series of icons. The bottom of [Figure 3-17](#9781430238072_Ch03.xhtml#Fig17)\
    \ shows this.\n\nThe default tab bar has two tabs, which is exactly the number\
    \ you want. Let’s change the icon and label for each. With the tab bar still selected,\
    \ click the star above Favorites. Then click the Attributes Inspector button in\
    \ the Utility pane selector bar (it should be the fourth button). Alternately,\
    \ you can select View ![image](images/arrow.jpg) Utilities ![image](images/arrow.jpg)\
    \ Show Attribute Inspector. The menu shortcut is ⌥![image](images/flower1.jpg)4.\n\
    \nIf you’ve correctly selected the tab bar item, the Attribute Inspector pane\
    \ should say Tab Bar Item and the Identifier pop-up should say Favorites. In the\
    \ Attribute Inspector, give this tab a title of **By Name** and an image of `name_icon.png`\
    \ ([Figure 3-18](#9781430238072_Ch03.xhtml#Fig18)). Now click the three dots above\
    \ the word More on the tab bar to select the right tab. Using the inspector, give\
    \ this tab a title of **By Secret Identity** and an image of `secret_icon.png`.\n\
    \n![9781430238072_Fig03-18.jpg](images/9781430238072_Fig03-18.jpg)\n\n[Figure\
    \ 3-18.](#9781430238072_Ch03.xhtml#_Fig18) Setting the attributes of the left\
    \ tab\n\n**Note:** The files `name_icon.png` and `secret_icon.png` can be found\
    \ in the download archive for this book.\n\nBack in the Object library, look for\
    \ a table view. Again, make sure you’re getting the user interface element, not\
    \ a table view controller. Drag this to the space above the tab bar. It should\
    \ resize automatically to fit the space available. After you drop it, it should\
    \ look like [Figure 3-19](#9781430238072_Ch03.xhtml#Fig19).\n\n![9781430238072_Fig03-19.jpg](images/9781430238072_Fig03-19.jpg)\n\
    \n[Figure 3-19.](#9781430238072_Ch03.xhtml#_Fig19) The table view in the scene\n\
    \nFinally, grab a table view cell, and drag it on top of the table view. Xcode\
    \ should automatically align it to the top the table view ([Figure 3-20](#9781430238072_Ch03.xhtml#Fig20)).\n\
    \n![9781430238072_Fig03-20.jpg](images/9781430238072_Fig03-20.jpg)\n\n[Figure\
    \ 3-20.](#9781430238072_Ch03.xhtml#_Fig20) The table view cell on the table view\n\
    \nSelect the table view cell, and expose the Attribute Inspector in the Utility\
    \ pane. You need to change some of the attributes to get the behavior you want.\
    \ First, set the style to Subtitle. This gives a table view cell with a large\
    \ title text and a smaller subtitle text below the title. Next, give it an identifier\
    \ value of `HeroListCell`. This value will be used later when creating table view\
    \ cells. Finally, change the selection from Blue to None. This means when you\
    \ tap on a table view cell, it won’t highlight. Your Attribute Inspector should\
    \ look like [Figure 3-21](#9781430238072_Ch03.xhtml#Fig21).\n\n![9781430238072_Fig03-21.jpg](images/9781430238072_Fig03-21.jpg)\n\
    \n[Figure 3-21.](#9781430238072_Ch03.xhtml#_Fig21) The table view cell attributes\n\
    \nYour interface is complete. Now you need to define your view controller interface\
    \ in order to make the outlet, delegate, and datasource connections.\n\n## Creating\
    \ HeroListController\n\nSingle-click the SuperDB group in the Navigator pane.\
    \ Now create a new file (⌘N or File ![image](images/arrow.jpg) New ![image](images/arrow.jpg)\
    \ File). When the New File Assistant appears ([Figure 3-22](#9781430238072_Ch03.xhtml#Fig22)),\
    \ select Cocoa Touch from under the iOS heading in the left pane, then select\
    \ Objective-C class from the right pane, and click the Next button.\n\n![9781430238072_Fig03-22.jpg](images/9781430238072_Fig03-22.jpg)\n\
    \n[Figure 3-22.](#9781430238072_Ch03.xhtml#_Fig22) Selecting the Objective-C class\
    \ template in the new file assistant\n\nOn the second file assistant pane ([Figure\
    \ 3-23](#9781430238072_Ch03.xhtml#Fig23)), give the class a name of `HeroListController`\
    \ and make it a subclass of `UITableViewController`. Make sure both the \"Targeted\
    \ for iPad\" and \"With XIB for user interface\" items are unchecked. With that\
    \ done, click the Next button. The file dialog should be selected to the SuperDB\
    \ project folder, so just click Create. Two files should have been added to the\
    \ project view: `HeroListController.h` and `HeroListController.m`.\n\n![9781430238072_Fig03-23.jpg](images/9781430238072_Fig03-23.jpg)\n\
    \n[Figure 3-23.](#9781430238072_Ch03.xhtml#_Fig23) Selecting the `UITableViewController`\
    \ in the file assistant\n\nWait a minute. When you made the interface in `MainStoryboard.storyboard`,\
    \ you used a plain `UIViewController`, not a `UITableViewController`. And we said\
    \ earlier that you didn’t want to use a `UITableViewController`. So why did we\
    \ have you make `HeroListController` a subclass of `UITableViewController`?\n\n\
    If you look back at [Figure 3-1](#9781430238072_Ch03.xhtml#Fig1), you can see\
    \ that your application displays a list of heroes in a table view. That table\
    \ view will need a data source and delegate. The `HeroListController` will be\
    \ that data source and delegate. By asking the New File Assistant to make a subclass\
    \ of `UITableViewController`, Xcode will use a file template that will predefine\
    \ a bunch of table view data source and delegate methods. Select `HeroListController.m`\
    \ in the Navigator pane and take a look at the file in the Editor pane. You should\
    \ see the methods Xcode gave you for free.\n\nHowever, you do need to make the\
    \ `HeroListController` a subclass of `UIViewController`. Single-click `HeroListController.h`\
    \ in the Navigator pane. Find the `@interface` declaration, and change it from\n\
    \n```\n@interface HeroListController : UITableViewController\n```\n\nto\n\n```\n\
    @interface HeroListController : UIViewController <UITableViewDataSource, UITableViewDelegate>\n\
    ```\n\nNext, select `HeroListController.m`. Find the method\n\n```\n- (id)initWithStyle:(UITableViewStyle)style\n\
    {\n    self = [super initWithStyle:style];\n    if (self) {\n        // Custom\
    \ initialization\n    }\n    return self;\n}\n```\n\nand delete it.\n\nNow you\
    \ need to connect to the table view data source and delegate to the `HeroListController`.\
    \ While you’re at it, create the outlets needed for the tab bar and table view.\
    \ You could add them manually, but we assume you know how to do that. Let’s try\
    \ using an alternate method.\n\nSelect `SuperDB.storyboard` in the Navigator pane\
    \ and expose the storyboard editor. Make sure your zoom level is such that that\
    \ view controller label shows the three icons. Hover the pointer over the left-most\
    \ icon, an orange circle with a white square. Xcode should pop up a label that\
    \ reads View Controller. Single-click to select it. Over in the Utility pane,\
    \ select the Identity Inspector ([Figure 3-24](#9781430238072_Ch03.xhtml#Fig24)).\
    \ Change the Class field (under the Custom Class header) to `HeroListController`.\n\
    \n![9781430238072_Fig03-24.jpg](images/9781430238072_Fig03-24.jpg)\n\n[Figure\
    \ 3-24.](#9781430238072_Ch03.xhtml#_Fig24) View Controller’s Identity Inspector\n\
    \nWhat have you done here? You’ve told Xcode that your view controller is not\
    \ a plain old `UIViewController`, but now a `HeroListController`. If you hover\
    \ the pointer over the view controller icon, the pop-up will read Hero View Controller\
    \ now.\n\n## Making the Connections and Outlets"
  raw: 'Now you can design the view controller’s interface. Let’s add the tab bar
    first. Look in the library for a Tab Bar. Make sure you’re grabbing a tab bar
    and not a tab bar controller. You only want the user interface item. Drag a tab
    bar from the library to the scene called View Controller, and place it snugly
    in the bottom of the window, as shown in [Figure 3-17](#9781430238072_Ch03.xhtml#Fig17).


    ![9781430238072_Fig03-17.jpg](images/9781430238072_Fig03-17.jpg)


    [Figure 3-17.](#9781430238072_Ch03.xhtml#_Fig17)  The tab bar placed snugly against
    the bottom of the scene


    **Note**  You may need to zoom in to drop the tab bar into the view. You need
    to zoom in enough so the label changes from view controller to a series of icons.
    The bottom of [Figure 3-17](#9781430238072_Ch03.xhtml#Fig17) shows this.


    The default tab bar has two tabs, which is exactly the number you want. Let’s
    change the icon and label for each. With the tab bar still selected, click the
    star above Favorites. Then click the Attributes Inspector button in the Utility
    pane selector bar (it should be the fourth button).  Alternately, you can select
    View ![image](images/arrow.jpg) Utilities ![image](images/arrow.jpg) Show Attribute
    Inspector. The menu short cut is ⌥![image](images/flower1.jpg)4.


    If you’ve correctly selected the tab bar item, the Attribute Inspector pane should
    say Tab Bar Item and the Identifier pop-up should say Favorites. In the Attribute
    Inspector, give this tab a title of **By Name** and an image of name_icon.png
    ([Figure 3-18](#9781430238072_Ch03.xhtml#Fig18)). Now click the three dots above
    the word More on the tab bar to select the right tab. Using the inspector, give
    this tab a title of **By Secret Identity** and an image of secret_icon.png.


    ![9781430238072_Fig03-18.jpg](images/9781430238072_Fig03-18.jpg)


    [Figure 3-18.](#9781430238072_Ch03.xhtml#_Fig18)  Setting the attributes of the
    left tab


    **Note**  The files name_icon.png and secret_icon.png can be found in the download
    archive for this book.


    Back in the Object library, look for a table view. Again, make sure you’re getting
    the user interface element, not a table view controller. Drag this to the space
    above the tab bar. It should resize automatically to fit the space available.
    After you drop it, it should look like [Figure 3-19](#9781430238072_Ch03.xhtml#Fig19).


    ![9781430238072_Fig03-19.jpg](images/9781430238072_Fig03-19.jpg)


    [Figure 3-19.](#9781430238072_Ch03.xhtml#_Fig19)  The table view in the scene


    Finally, grab a table view cell, and drag it on top of the table view. Xcode should
    automatically align it to the top the table view ([Figure 3-20](#9781430238072_Ch03.xhtml#Fig20)).


    ![9781430238072_Fig03-20.jpg](images/9781430238072_Fig03-20.jpg)


    [Figure 3-20.](#9781430238072_Ch03.xhtml#_Fig20)  The table view cell on the table
    view


    Select the table view cell, and expose the Attribute Inspector in the Utility
    pane. You need to change some of the attributes to get the behavior you want.
    First, set the style to Subtitle. This gives a table view cell with a large title
    text and a smaller subtitle text below the title. Next, give it an identifier
    value of HeroListCell. This value will be used later when creating table view
    cells. Finally, change the selection from Blue to None. This means when you tap
    on a table view cell, it won’t highlight. Your Attribute Inspector should look
    like [Figure 3-21](#9781430238072_Ch03.xhtml#Fig21).


    ![9781430238072_Fig03-21.jpg](images/9781430238072_Fig03-21.jpg)


    [Figure 3-21.](#9781430238072_Ch03.xhtml#_Fig21)  The table view cell attributes


    Your interface is complete. Now you need to define your view controller interface
    in order to make the outlet, delegate, and datasource connections.


    Creating HeroListController


    Single-click the SuperDB group in the Navigator pane. Now create a new file (![image](images/flower1.jpg)N
    or File ![image](images/arrow.jpg) New ![image](images/arrow.jpg) File). When
    the New File Assistant appears ([Figure 3-22](#9781430238072_Ch03.xhtml#Fig22)),
    select Cocoa Touch from under the iOS heading in the left pane, then select Objective-C
    class from the right pane, and click the Next button.


    ![9781430238072_Fig03-22.jpg](images/9781430238072_Fig03-22.jpg)


    [Figure 3-22.](#9781430238072_Ch03.xhtml#_Fig22)  Selecting the Objective-C class
    template in the new file assistant


    On the second file assistant pane ([Figure 3-23](#9781430238072_Ch03.xhtml#Fig23)),
    give the class a name of HeroListController and make it a subclass of UITableViewController.
    Make sure both the “Targeted for iPad” and “With XIB for user interface” items
    are unchecked. With that done, click the Next button. The file dialog should be
    selected to the SuperDB project folder, so just click Create. Two files should
    have been added to the project view: HeroListController.h and HeroListController.m.


    ![9781430238072_Fig03-23.jpg](images/9781430238072_Fig03-23.jpg)


    [Figure 3-23.](#9781430238072_Ch03.xhtml#_Fig23)  Selecting the UITableViewController
    in the file assistant


    Wait a minute. When you made the interface in MainStoryboard.storyboard, you used
    a plain UIViewController, not a UITableViewController. And we said earlier that
    you didn’t want to use a UITableViewController. So why did we have you make HeroListController
    a subclass of UITableViewController?


    If you look back at [Figure 3-1](#9781430238072_Ch03.xhtml#Fig1), you can see
    that your application displays a list of heroes in a table view. That table view
    will need a data source and delegate. The HeroListController will be that data
    source and delegate. By asking the New File Assistant to make a subclass of UITableViewController,
    Xcode will use a file template that will predefine a bunch of table view data
    source and delegate methods. Select HeroListController.m in the Navigator pane
    and take a look at the file in the Editor pane. You should see the methods Xcode
    gave you for free.


    However, you do need to make the HeroListController a subclass of UIViewController.
    Single-click HeroListController.h in the Navigator pane. Find the @interface declaration,
    and change it from


    ```

    @interface HeroListController : UITableViewController

    ```


    to


    ```

    @interface HeroListController : UIViewController <UITableViewDataSource, UITableViewDelegate>

    ```


    Next, select HeroListController.m. Find the method


    ```

    - (id)initWithStyle:(UITableViewStyle)style

    {

              self = [super initWithStyle:style];

              if (self) {

              // Custom initialization

              }

              return self;

      }

    ```


    and delete it.


    Now you need to connect to the table view data source and delegate to the HeroListController.
    While you’re at it, create the outlets needed for the tab bar and table view.
    You could add them manually, but we assume you know how to do that. Let’s try
    using an alternate method.


    Select SuperDB.storyboardin the Navigator pane and expose the storyboard editor.
    Make sure your zoom level is such that that view controller label shows the three
    icons. Hover the pointer over the left-most icon, an orange circle with a white
    square. Xcode should pop up a label that reads View Controller. Single-click to
    select it. Over in the Utility pane, select the Identity Inspector ([Figure 3-24](#9781430238072_Ch03.xhtml#Fig24)).
    Change the Class field (under the Custom Class header) to HeroListController.


    ![9781430238072_Fig03-24.jpg](images/9781430238072_Fig03-24.jpg)


    [Figure 3-24.](#9781430238072_Ch03.xhtml#_Fig24)  View Controller’s Identity Inspector


    What have you done here? You’ve told Xcode that your view controller is not a
    plain old UIViewController, but now a HeroListController. If you hover the pointer
    over the view controller icon, the pop-up will read Hero View Controller now.


    Making the Connections and Outlets'
  trans: "\n现在您可以设计视图控制器的界面了。首先，我们来添加标签栏。在库中查找标签栏（Tab Bar）。请确保您获取的是一个标签栏，而不是标签栏控制器（Tab\
    \ Bar Controller）。您只需要用户界面元素。将一个标签栏从库拖拽到名为\"视图控制器\"的场景中，并将其紧贴窗口底部放置，如图 3-17 所示。\n\
    \n![9781430238072_Fig03-17.jpg](img/9781430238072_Fig03-17.jpg)\n\n图 3-17. 紧贴场景底部放置的标签栏\n\
    \n**注意：** 您可能需要放大视图才能将标签栏放入视图中。您需要放大到足够程度，使得标签从\"视图控制器\"变为一系列图标。**图 3-17** 的底部展示了这一状态。\n\
    \n默认的标签栏有两个标签，这正是您需要的数量。接下来，我们来更改每个标签的图标和标题。在标签栏仍处于选中状态时，点击\"收藏\"上方的星形图标。然后点击\"\
    工具\"面板选择器栏中的\"属性检查器\"按钮（它应该是第四个按钮）。或者，您可以选择视图 ![image](img/arrow.jpg) 工具 ![image](img/arrow.jpg)\
    \ 显示属性检查器（Show Attribute Inspector）。菜单快捷键是 ⌥![image](img/flower1.jpg)4。\n\n如果您已正确选中标签栏项目，\"\
    属性检查器\"面板应显示为\"标签栏项目\"，标识符弹出菜单应显示为\"收藏\"。在\"属性检查器\"中，将此标签的标题设置为**按姓名**，图像设置为`name_icon.png`（图\
    \ 3-18）。现在，点击标签栏上\"更多\"字样上方的三个点，以选中右侧标签。使用检查器，将此标签的标题设置为**按秘密身份**，图像设置为`secret_icon.png`。\n\
    \n![9781430238072_Fig03-18.jpg](img/9781430238072_Fig03-18.jpg)\n\n图 3-18. 设置左侧标签的属性\n\
    \n**注意：** 文件 `name_icon.png` 和 `secret_icon.png` 可在本书的下载档案中找到。\n\n回到对象库，查找一个表格视图（Table\
    \ View）。再次确保您获取的是用户界面元素，而不是表格视图控制器（Table View Controller）。将此元素拖拽到标签栏上方的空白区域。它应能自动调整大小以适应可用空间。放置完成后，其外观应如图\
    \ 3-19 所示。\n\n![9781430238072_Fig03-19.jpg](img/9781430238072_Fig03-19.jpg)\n\n\
    图 3-19. 场景中的表格视图\n\n最后，获取一个表格视图单元格（Table View Cell），并将其拖拽到表格视图上方。Xcode 应能自动将其对齐到表格视图的顶部（图\
    \ 3-20）。\n\n![9781430238072_Fig03-20.jpg](img/9781430238072_Fig03-20.jpg)\n\n\
    图 3-20. 表格视图上的表格视图单元格\n\n选中表格视图单元格，并在\"工具\"面板中打开\"属性检查器\"。您需要更改一些属性以获得所需的行为。首先，将样式设置为副标题（Subtitle）。这将使表格视图单元格具有一个大的标题文本，并在其下方显示一个较小的副标题文本。接下来，为其指定一个标识符值\
    \ `HeroListCell`。此值将在稍后创建表格视图单元格时使用。最后，将\"选择\"（Selection）从\"蓝色\"（Blue）更改为\"无\"\
    （None）。这意味着当您点击表格视图单元格时，它不会高亮显示。您的\"属性检查器\"应如图 3-21 所示。\n\n![9781430238072_Fig03-21.jpg](img/9781430238072_Fig03-21.jpg)\n\
    \n图 3-21. 表格视图单元格属性\n\n您的界面构建完成。现在您需要定义视图控制器的接口，以便建立插座变量、委托和数据源连接。\n\n## 创建 HeroListController\n\
    \n在导航器面板中单击 SuperDB 组。现在创建一个新文件（⌘N 或 文件 ![image](img/arrow.jpg) 新建 ![image](img/arrow.jpg)\
    \ 文件）。当\"新建文件助理\"出现时（图 3-22），在左窗格中的 iOS 标题下选择\"Cocoa Touch\"，然后在右窗格中选择\"Objective-C\
    \ 类\"并点击\"下一步\"按钮。\n\n![9781430238072_Fig03-22.jpg](img/9781430238072_Fig03-22.jpg)\n\
    \n图 3-22. 在新建文件助理中选择 Objective-C 类模板\n\n在第二个文件助理窗格中（图 3-23），将类命名为 `HeroListController`，并将其设置为\
    \ `UITableViewController` 的子类。确保\"针对 iPad\"和\"附带 XIB 用户界面\"两个选项均未选中。完成后，点击\"下一步\"\
    按钮。文件对话框应已选中 SuperDB 项目文件夹，因此只需点击\"创建\"即可。项目视图中应已添加两个文件：`HeroListController.h`\
    \ 和 `HeroListController.m`。\n\n![9781430238072_Fig03-23.jpg](img/9781430238072_Fig03-23.jpg)\n\
    \n图 3-23. 在文件助理中选择 `UITableViewController`\n\n等等。当您在 `MainStoryboard.storyboard`\
    \ 中构建界面时，您使用的是普通的 `UIViewController`，而不是 `UITableViewController`。并且我们之前提到过您不希望使用\
    \ `UITableViewController`。那么为什么我们要让您将 `HeroListController` 设置为 `UITableViewController`\
    \ 的子类呢？\n\n如果您回顾一下 图 3-1，您会看到您的应用程序在表格视图中显示了一个英雄列表。那个表格视图需要一个数据源和委托。`HeroListController`\
    \ 将担任这个数据源和委托。通过让\"新建文件助理\"创建一个 `UITableViewController` 的子类，Xcode 将使用一个文件模板，该模板会预定义一系列表格视图数据源和委托方法。在导航器面板中选择\
    \ `HeroListController.m`，然后在编辑器面板中查看该文件。您应该能看到 Xcode 免费为您提供的方法。\n\n但是，您需要将 `HeroListController`\
    \ 设置为 `UIViewController` 的子类。在导航器面板中单击 `HeroListController.h`。找到 `@interface`\
    \ 声明，并将其从\n\n```\n@interface HeroListController : UITableViewController\n```\n\
    \n更改为\n\n```\n@interface HeroListController : UIViewController <UITableViewDataSource,\
    \ UITableViewDelegate>\n```\n\n接下来，选择 `HeroListController.m`。找到如下方法\n\n```\n-\
    \ (id)initWithStyle:(UITableViewStyle)style\n{\n    self = [super initWithStyle:style];\n\
    \    if (self) {\n        // 自定义初始化\n    }\n    return self;\n}\n```\n\n并将其删除。\n\
    \n现在您需要将表格视图的数据源和委托连接到 `HeroListController`。同时，创建标签栏和表格视图所需的插座变量。您可以手动添加它们，但我们假设您知道如何操作。让我们尝试使用另一种方法。\n\
    \n在导航器面板中选择 `SuperDB.storyboard`，并展开故事板编辑器。确保您的缩放级别使视图控制器标签显示三个图标。将指针悬停在最左侧的图标上，该图标是一个带有白色方块的橙色圆圈。Xcode\
    \ 应会弹出一个标签，显示\"视图控制器\"。单击以选中它。在\"工具\"面板中，选择\"标识检查器\"（图 3-24）。将\"类\"字段（位于\"自定义类\"\
    标题下方）更改为 `HeroListController`。\n\n![9781430238072_Fig03-24.jpg](img/9781430238072_Fig03-24.jpg)\n\
    \n图 3-24. 视图控制器的标识检查器\n\n您在这里做了什么？您已经告诉 Xcode，您的视图控制器不再是一个普通的 `UIViewController`，而现在是一个\
    \ `HeroListController`。如果您将指针悬停在视图控制器图标上，弹出信息将显示为\"英雄视图控制器\"。\n\n## 建立连接与插座变量\n"
- fmt: "First, make the `HeroListController` the table view data source and delegate.\
    \ Control-drag from the Table View area to the `HeroListController` ([Figure 3-25](#9781430238072_Ch03.xhtml#Fig25)).\
    \ When you release, an Outlets pop-up window should appear ([Figure 3-26](#9781430238072_Ch03.xhtml#Fig26)).\
    \ Select `dataSource`. Repeat the control-drag, this time selecting `delegate`.\n\
    \n![9781430238072_Fig03-25.jpg](images/9781430238072_Fig03-25.jpg)\n\n[Figure\
    \ 3-25.](#9781430238072_Ch03.xhtml#_Fig25) Control-drag from the table view to\
    \ the `HeroListController`\n\n![9781430238072_Fig03-26.jpg](images/9781430238072_Fig03-26.jpg)\n\
    \n[Figure 3-26.](#9781430238072_Ch03.xhtml#_Fig26) Table view Outlets pop-up window\n\
    \nNow you’re going to add the outlets for the tab bar and table view. On the toolbar,\
    \ change the editor from the Standard editor to the Assistant editor. The Editor\
    \ pane should split into two views ([Figure 3-27](#9781430238072_Ch03.xhtml#Fig27)).\
    \ The left view will have the storyboard editor; the right view will have a Code\
    \ editor showing the interface file of `HeroListController`.\n\n![9781430238072_Fig03-27.jpg](images/9781430238072_Fig03-27.jpg)\n\
    \n[Figure 3-27.](#9781430238072_Ch03.xhtml#_Fig27) The Assistant editor\n\nAgain,\
    \ control-drag from the Table View area, but this time go to the Code editor,\
    \ just between the `@interface` and `@end` declarations ([Figure 3-28](#9781430238072_Ch03.xhtml#Fig28)).\
    \ Once you release, a Connection pop-up window should appear ([Figure 3-29](#9781430238072_Ch03.xhtml#Fig29)).\
    \ Enter `heroTableView` in the Name field and leave the rest of the fields at\
    \ their default settings. Click the Connect button.\n\n![9781430238072_Fig03-28.jpg](images/9781430238072_Fig03-28.jpg)\n\
    \n[Figure 3-28.](#9781430238072_Ch03.xhtml#_Fig28) Control-drag from the table\
    \ view to the `HeroListController` interface file\n\n![9781430238072_Fig03-29.jpg](images/9781430238072_Fig03-29.jpg)\n\
    \n[Figure 3-29.](#9781430238072_Ch03.xhtml#_Fig29) The Connection pop-up window\n\
    \nThe following line should be added after the `@interface` declaration:\n\n```\n\
    @property (weak, nonatomic) IBOutlet UITableView *heroTableView;\n```\n\nRepeat\
    \ the process, this time control dragging from the tab bar to the just underneath\
    \ the new `@property` declaration. Use `heroTabBar` for the name. You should get\
    \ the following new `@property` declaration for the tab bar:\n\n```\n@property\
    \ (weak, nonatomic) IBOutlet UITabBar *heroTabBar;\n```\n\n## Navigation Bar Buttons\n\
    \nIf you build and run the SuperDB app, you should get something like [Figure\
    \ 3-30](#9781430238072_Ch03.xhtml#Fig30).\n\n![9781430238072_Fig03-30.jpg](images/9781430238072_Fig03-30.jpg)\n\
    \n[Figure 3-30.](#9781430238072_Ch03.xhtml#_Fig30) SuperDB so far. Looking good!\n\
    \nLet’s add the Edit and Add (+) buttons. Make sure the Standard Editor toggle\
    \ is selected in the toolbar, then select `HeroListController.m` in the Navigator\
    \ pane. In the Editor pane, find the method\n\n```\n- (void)viewDidLoad\n```\n\
    \nAt the bottom of the method, you should see the following lines:\n\n```\n//\
    \ Uncomment the following line to display an Edit button in the navigation bar\
    \ for this view controller.\n// self.navigationItem.rightBarButtonItem = self.editButtonItem;\n\
    ```\n\nUncomment the second line and change the `rightBarButtonItem` to `leftBarButtonItem`,\
    \ like so:\n\n```\n// Uncomment the following line to display an Edit button in\
    \ the navigation bar for this view controller.\nself.navigationItem.leftBarButtonItem\
    \ = self.editButtonItem;\n```\n\nTo add the Add (+) button, you need to go back\
    \ to the storyboard editor. Select `SuperDB.storyboard` in the Navigator pane.\
    \ Drag a bar button item from the Object library to the right side of the navigation\
    \ bar in the Hero view controller. In the Utility pane, select the Attribute Inspector.\
    \ You should see the Attribute Inspector for a bar button item ([Figure 3-31](#9781430238072_Ch03.xhtml#Fig31)).\
    \ If not, make sure the bar button item you just added is selected. Change the\
    \ Identifier field to Add. The bar button item’s label should change from Item\
    \ to +.\n\n![9781430238072_Fig03-31.jpg](images/9781430238072_Fig03-31.jpg)\n\n\
    [Figure 3-31.](#9781430238072_Ch03.xhtml#_Fig31) Bar button item’s Attribute Inspector\n\
    \nToggle back to the Assistant editor. Control-drag from the bar button item to\
    \ just below the last `@property` in the `HeroListController` interface file.\
    \ When the connection pop-up window appears, add a connection named `addButton`.\
    \ Control-drag from the bar button item again to just above the `@end`. This time,\
    \ when the connection pop-up appears, change the connection value to Action and\
    \ set the name to `addHero` ([Figure 3-32](#9781430238072_Ch03.xhtml#Fig32)).\
