- fmt: "# 示例：创建发送推文的视图控制器\n\n本示例将创建一个用于发送推文的视图控制器。你可以在呈现该视图控制器之前设置初始文本、添加图片和添加URL。\n\
    \n```objc\n[composeVC setInitialText:@\"Hello, Twitter!\"];\n\nUIImage *image\
    \ = [UIImage imageWithContentsOfFile:@\"surpriseCat.png\"];\n[composeVC addImage:image];\n\
    \nNSURL *url = [NSURL URLWithString:@\"http://www.apporchard.com\"];\n[composeVC\
    \ addURL:url];\n```\n\n这些方法在成功时返回`YES`，失败时返回`NO`。\n\n有两个便捷方法：`removeAllImages`和`removeAllURLs`，用于移除你已添加的任何图片或URL。\n\
    \n如前所述，你不需要指定委托来处理消息完成事件。相反，你可以通过一个block来设置`completionHandler`属性。\n\n```objc\n\
    [composeVC setCompletionHandler:^(SLComposeViewControllerResult result) {\n  \
    \  switch (result) {\n        case SLComposeViewControllerResultCancelled:\n \
    \           NSLog(@\"Message cancelled.\");\n            break;\n        case\
    \ SLComposeViewControllerResultDone:\n            NSLog(@\"Message sent.\");\n\
    \            break;\n        default:\n            break;\n    }\n    [self dismissModalViewControllerAnimated:YES\
    \ completion:nil];\n}];\n```\n\n该block接受一个参数，用于指示消息的结果。同样，你需要通过调用`dismissModalViewControllerAnimated:completion:`方法来关闭视图控制器。\n\
    \n## SLRequest\n\n如果你只是想发布消息，`SLComposeViewController`就足够了。但如果你想利用这些社交媒体服务提供的API，该怎么办？这时你需要使用`SLRequest`，它本质上是围绕HTTP请求的一个封装，负责处理你的应用程序与社交媒体服务之间的身份认证。\n\
    \n要创建请求，你需要调用类方法`requestForServiceType:requestMethod:URL:parameters:`。\n\n```objc\n\
    SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook\n\
    \                                       requestMethod:SLRequestMethodPOST\n  \
    \                                                 URL:url\n                  \
    \                        parameters:params];\n```\n\n第一个参数与`SLComposeViewController`中使用的服务类型字符串常量相同。`requestMethod:`是HTTP操作的一个子集：`GET`、`POST`和`DELETE`。Apple为此子集定义了一个枚举：`SLRequestMethod`。\n\
    \n```objc\nSLRequestMethodGET\nSLRequestMethodPOST\nSLRequestMethodDELETE\n```\n\
    \n`URL:`是由服务提供商定义的URL，通常不是该服务的公开\"www\"URL。例如，Twitter的URL以`http://api.twitter.com/`开头。最后，`parameters:`是一个包含HTTP参数的字典，用于发送给服务。字典的内容取决于所调用的服务。\n\
    \n一旦你构建好请求，就可以将其发送给服务提供商：\n\n```objc\n[request performRequestWithHandler:^(NSData\
    \ *responseData,\n                                          NSHTTPURLResponse\
    \ *urlResponse,\n                                          NSError *error) {\n\
    \    // 处理响应，处理数据或错误\n    ...\n}];\n```\n\n该处理器是一个block，返回HTTP响应对象以及任何伴随的数据。如果发生错误，会返回一个非`nil`的错误对象。\n\
    \n**注意：** 这里只是对`SLRequest`类的简要概述。你可以在类文档中阅读更多内容：[https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html](https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html)。\n\
    \n## Activity视图控制器\n\n在iOS 6中，Apple引入了一种在应用程序内访问各种服务的新方式：Activity视图控制器（`UIActivityViewController`）。除了让应用程序能够访问标准的iOS服务（如复制和粘贴）之外，Activity视图控制器还提供了一个统一的接口，用于发送电子邮件、短信或向社交媒体服务发布内容。你甚至还可以定义自己的自定义服务。\n\
    \n使用Activity视图控制器很简单：用你想要发送的项目（如文本、图片等）初始化Activity视图控制器，然后将其推送到你当前的视图控制器上。\n\n\
    ```objc\nNSString *text = @\"some text\";\nUIImage *image = [[UIImage alloc] initWithContentsOfFile:@\"\
    some_image.png\"];\nNSArray *items = @[ text, image ];\n\nUIActivityViewController\
    \ *activityVC =\n    [[UIActivityViewController alloc] initWithActivityItems:items\n\
    \                                      applicationActivities:nil];\n\n[self presentViewController:activityVC\
    \ animated:YES completion:nil];\n```\n\n就是这样。很简单，对吧？\n\n所以所有魔法都发生在这里：\n\n```objc\n\
    UIActivityViewController *activityVC =\n    [[UIActivityViewController alloc]\
    \ initWithActivityItems:items applicationActivities:nil];\n```\n\n当实例化Activity视图控制器时，你需要向其传递一个Activity项目数组。一个Activity项目可以是任何对象，具体取决于应用程序和Activity服务目标。在上面的示例代码中，Activity项目是一个字符串和一个图片。如果你想要使用自定义对象作为Activity项目，请让其遵循`UIActivityItemSource`协议。然后，你将完全控制自定义对象如何向Activity视图控制器呈现其数据。\n\
    \n`applicationActivities:`参数期望一个`UIActivity`对象数组。如果传递了`nil`值，则Activity视图控制器将使用一组默认的Activity对象。还记得我们之前说过你可以定义自己的自定义服务吗？你可以通过继承`UIActivity`来定义与你的服务的通信来实现这一点。然后，将你的子类作为应用程序Activity数组的一部分传入。\n\
    \n就本章而言，你将只使用默认的Activity列表。准备好了吗？让我们开始吧！\n\n## 构建MessageImage应用程序\n\n在Xcode中，使用Single\
    \ View Application模板创建一个新项目。将项目命名为`MessageImage`。由于此应用程序只有一个视图控制器，你不需要storyboard。但你仍然会使用自动引用计数（ARC）。\n\
    \n### 构建用户界面\n\n回顾[图11-1](#9781430238072_Ch11.xhtml#Fig1)。界面非常简单：一个标注为\"Go\"的按钮。当你按下按钮时，应用程序将激活设备的相机并允许你拍照。\n\
    \n选择`ViewController.xib`。\n\n从库中拖拽一个圆角矩形按钮，将其放置在标题为\"View\"的窗口中的任意位置。双击按钮并将其标题设置为`Go`。进入助手编辑器，它会将编辑器面板分割并打开`ViewController.h`。从\"\
    Go\"按钮按住Control键拖拽到`ViewController.h`中的`@interface`和`@end`之间。添加一个新的Action，并将其命名为`selectAndMessageImage`。\n\
    \n接下来，从库中拖拽一个标签到视图窗口。将标签放置在按钮上方，并将其调整大小，使其从左边缘一直延伸到右边缘。在属性检查器中，将文本对齐方式设置为居中。从标签按住Control键拖拽到你刚刚创建的`selectAndMessageImage:`Action上方。添加一个新的outlet并将其命名为`label`。最后，双击标签并擦除文本\"\
    Label\"。\n\n将编辑器切换回标准模式。保存XIB文件。\n\n### 拍照\n\n单击`ViewController.h`。你需要让你的视图控制器遵循两个委托协议：\n\
    \n```objc\n@interface ViewController : UIViewController <UINavigationControllerDelegate,\n\
    \                                               UIImagePickerControllerDelegate>\n\
    ```"
  raw: "This example would create a view controller for sending a tweet. You’re able\
    \ to set the initial text, add images, and add URLs before presenting the view\
    \ controller.\n\n```\n[composeVC setInitialText:@\"Hello, Twitter!\"];\n\nUIImage\
    \ *image = [UIImage imageWithContentsOfFile:@\"surpriseCat.png\"];\n[composeVC\
    \ addImage:image];\n\nNSURL *url = [NSURL URLWithString:@\" http://www.apporchard.com\n\
    \ \"];\n[composeVC addURL:url];\n```\n\nThese methods return YES if on success\
    \ and NO on failure.\n\nThere are two convenience methods, removeAllImages and\
    \ removeAllURLs, to remove any images or URLs you’ve added.\n\nAs mentioned earlier,\
    \ you don’t assign a delegate to handle message completion. Rather, you set the\
    \ completionHandler property with a block.\n\n```\n[composeVC setCompletionHandler:^(SLComposeViewControllerResult\
    \ result) {\n    switch (result) {\n        case SLComposeViewControllerResultCancelled:\n\
                NSLog(@\"Message cancelled.\");\n            break;\n        case\
    \ SLComposeViewControllerResultDone:\n            NSLog(@\"Message sent.\");\n\
                break;\n        default:\n            break;\n    }\n    [self dismissModalViewControllerAnimated:YES\
    \ completion:nil];\n}];\n```\n\nThe block accepts one argument, which tells the\
    \ result of the message. Again, you are expect to dismiss the view controller\
    \ with a call to dismissModalViewControllerAnimated:completion:.\n\nSLRequest\n\
    \nSLComposeViewController is fine if you just want to post messages. What if you\
    \ want to take advantage of the APIs these social media services offer? In that\
    \ case you want to use SLRequest, which is basically a wrapper around an HTTP\
    \ request that handles the authentication between your application and the social\
    \ media service.\n\nTo create a request, you call the class method requestForServiceType:requestMethod:URL:parameters:.\n\
    \n```\nSLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook                                  \n\
           requestMethod:SLRequestMethodPOST              \n                                    \
    \ URL:url\n                                            parameters:params];\n```\n\
    \nThe first argument is the same service type String constant used in SLComposeViewController.\
    \ requestMethod: is a subset of HTTP actions: GET, POST, and DELETE. Apple has\
    \ defined an enumeration for this subset: SLRequestMethod:\n\n```\n   SLRequestMethodGET\n\
       SLRequestMethodPOST\n   SLRequestMethodDELETE\n```\n\nURL: is a URL defined\
    \ by the service provider. This is usually not the public “www” URL of the service.\
    \ For example, Twitter’s URL begins with [http://api.twitter.com/](http://api.twitter.com/)\
    \ . Finally, parameters: is a dictionary of HTTP parameters to send to the service.\
    \ The contents of the dictionary depend on the service being called.\n\nOnce you’ve\
    \ composed your request, you send it to the service provider:\n\n```\n[request\
    \ performRequestWithHandler:^(NSData *responseData,\n                                          NSHTTPURLResponse\
    \ *urlResponse,\n                                          NSError *error) {\n\
        // Handle the response, process the data or error\n    . . .\n}];\n```\n\n\
    The handler is a block that returns the HTTP response object, along with any accompanying\
    \ data. An error object is returned, which will be non-nil if an error occurred.\n\
    \n**Note**  This is a pretty short overview of the SLRequest class. You can read\
    \ more in the class documentation at [https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html](https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html)\
    \ .\n\nThe Activity View Controller\n\nIn iOS 6, Apple introduced a new way to\
    \ access the various services from within an application: the activity view controller\
    \ (UIActivityViewController). In addition to giving applications access to standard\
    \ iOS services, like copy and paste, the activity view controller provides a single\
    \ unified interface for applications to send e-mail, SMS, or post content to social\
    \ media services. You can even define your own custom service.\n\nUsing an activity\
    \ view controller is simple. Initialize the activity view controller with the\
    \ items you wish to send (i.e. text, images, etc.) and push it onto your current\
    \ view controller.\n\n```\nNSString *text = @\"some text\";\nUIImage *image =\
    \ [[UIImage alloc] initWithContentsOfFile:@\"some_image.png\"];\nNSArray *items\
    \ = @[ text, image ];\n\nUIActivityViewController *activityVC =     [[UIActivityViewController\
    \ alloc] initWithActivityItems:items \napplicationActivities:nil];\n\n[self presentViewController:activityVC\
    \ animated:YES completion:nil];\n```\n\nThat’s it. Pretty simple, right?\n\nSo\
    \ all the magic happens here:\n\n```\nUIActivityViewController *activityVC =\n\
                    [[UIActivityViewController alloc] initWithActivityItems:items\
    \ applicationActivities:nil];\n```\n\nWhen you instantiate an activity view controller,\
    \ you pass it an array of activity items. An activity item can be any object,\
    \ and it depends on the application and activity service target. In the example\
    \ code above, the activity items were a string and an image. If you want to use\
    \ a custom object as an activity item, have it conform to the UIActivityItemSource\
    \ protocol. Then you will have complete control over how your custom objects presents\
    \ its data to the activity view controller.\n\napplicationActivities: expects\
    \ an array of UIActivity objects. If passed a value of nil, then the activity\
    \ view controller will use a default set of Activity objects. Remember we said\
    \ earlier you could define your own custom service? You accomplish that by subclassing\
    \ UIActivity to define the communication to your service. Then you pass in your\
    \ subclass as part of the array of application activities.\n\nFor the purposes\
    \ of this chapter, you’re going just going to use the default list of application\
    \ activities. Ready? Let’s go!\n\nBuilding the MessageImage Application\n\nCreate\
    \ a new project in Xcode using the Single View Application template. Call the\
    \ project MessageImage. Since this app only has one view controller, you won’t\
    \ need storyboards. But you’re still using Automatic Reference Counting.\n\nBuilding\
    \ the User Interface\n\nLook back at [Figure 11-1](#9781430238072_Ch11.xhtml#Fig1).\
    \ The interface is pretty simple: a single button labeled Go. When you press the\
    \ button, the application will activate your device’s camera and allow you to\
    \ take a picture.\n\nSelect ViewController.xib *.*\n\nFrom the library, drag over\
    \ a round rect button and place it anywhere on the window titled View. Double-click\
    \ the button and give it a title of Go. Enter the assistant editor, which should\
    \ split the Editor pane and open ViewController.h. Control-drag from the Go button\
    \ to between the @interface and @end in ViewController.h. Add a new Action, and\
    \ name it selectAndMessageImage.\n\nNext, drag a label from the library to the\
    \ view window. Place the label above the button, and resize it so that it stretches\
    \ from the left margin all the way to the right margin. In the Attribute Inspector,\
    \ change the text alignment to centered. Control-drag from the label to above\
    \ the selectAndMessageImage: action you just created. Add a new outlet and name\
    \ it label. Finally, double-click the label and erase the text “Label.”\n\nPut\
    \ the editor back into Standard mode. Save the XIB file.\n\nTaking the Picture\n\
    \nSingle-click ViewController.h. You need your view controller to conform to two\
    \ delegate protocols:\n\n```\n@interface ViewController : UIViewController <UINavigationControllerDelegate,\n\
                                                   UIImagePickerControllerDelegate>\n\
    ```"
  trans: "\n# 示例：创建发送推文的视图控制器\n\n本示例将创建一个用于发送推文的视图控制器。你可以在呈现该视图控制器之前设置初始文本、添加图片和添加\
    \ URL。\n\n```objc\n[composeVC setInitialText:@\"Hello, Twitter!\"];\n\nUIImage\
    \ *image = [UIImage imageWithContentsOfFile:@\"surpriseCat.png\"];\n[composeVC\
    \ addImage:image];\n\nNSURL *url = [NSURL URLWithString:@\"http://www.apporchard.com\"\
    ];\n[composeVC addURL:url];\n```\n\n这些方法在成功时返回`YES`，失败时返回`NO`。\n\n有两个便捷方法：`removeAllImages`和`removeAllURLs`，用于移除你已添加的任何图片或\
    \ URL。\n\n如前所述，你不需要指定委托来处理消息完成事件。相反，你可以通过一个 block 来设置`completionHandler`属性。\n\n\
    ```objc\n[composeVC setCompletionHandler:^(SLComposeViewControllerResult result)\
    \ {\n    switch (result) {\n        case SLComposeViewControllerResultCancelled:\n\
    \            NSLog(@\"Message cancelled.\");\n            break;\n        case\
    \ SLComposeViewControllerResultDone:\n            NSLog(@\"Message sent.\");\n\
    \            break;\n        default:\n            break;\n    }\n    [self dismissModalViewControllerAnimated:YES\
    \ completion:nil];\n}];\n```\n\n该 block 接受一个参数，用于指示消息的结果。同样，你需要通过调用`dismissModalViewControllerAnimated:completion:`方法来关闭视图控制器。\n\
    \n## SLRequest\n\n如果你只是想发布消息，`SLComposeViewController`就足够了。但如果你想利用这些社交媒体服务提供的\
    \ API，该怎么办？这时你需要使用`SLRequest`，它本质上是围绕 HTTP 请求的一个封装，负责处理你的应用程序与社交媒体服务之间的身份认证。\n\
    \n要创建请求，你需要调用类方法`requestForServiceType:requestMethod:URL:parameters:`。\n\n```objc\n\
    SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook\n\
    \                                       requestMethod:SLRequestMethodPOST\n  \
    \                                                 URL:url\n                  \
    \                        parameters:params];\n```\n\n第一个参数与`SLComposeViewController`中使用的服务类型字符串常量相同。`requestMethod:`是\
    \ HTTP 操作的一个子集：`GET`、`POST`和`DELETE`。Apple 为此子集定义了一个枚举：`SLRequestMethod`。\n\n\
    ```objc\nSLRequestMethodGET\nSLRequestMethodPOST\nSLRequestMethodDELETE\n```\n\
    \n`URL:`是由服务提供商定义的 URL，通常不是该服务的公开\"www\"URL。例如，Twitter 的 URL 以`http://api.twitter.com/`开头。最后，`parameters:`是一个包含\
    \ HTTP 参数的字典，用于发送给服务。字典的内容取决于所调用的服务。\n\n一旦你构建好请求，就可以将其发送给服务提供商：\n\n```objc\n[request\
    \ performRequestWithHandler:^(NSData *responseData,\n                        \
    \                  NSHTTPURLResponse *urlResponse,\n                         \
    \                 NSError *error) {\n    // 处理响应，处理数据或错误\n    ...\n}];\n```\n\n\
    该处理器是一个 block，返回 HTTP 响应对象以及任何伴随的数据。如果发生错误，会返回一个非`nil`的错误对象。\n\n**注意：** 这里只是对`SLRequest`类的简要概述。你可以在类文档中阅读更多内容：[`developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html`](https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html)。\n\
    \n## Activity 视图控制器\n\n在 iOS 6 中，Apple 引入了一种在应用程序内访问各种服务的新方式：Activity 视图控制器（`UIActivityViewController`）。除了让应用程序能够访问标准的\
    \ iOS 服务（如复制和粘贴）之外，Activity 视图控制器还提供了一个统一的接口，用于发送电子邮件、短信或向社交媒体服务发布内容。你甚至还可以定义自己的自定义服务。\n\
    \n使用 Activity 视图控制器很简单：用你想要发送的项目（如文本、图片等）初始化 Activity 视图控制器，然后将其推送到你当前的视图控制器上。\n\
    \n```objc\nNSString *text = @\"some text\";\nUIImage *image = [[UIImage alloc]\
    \ initWithContentsOfFile:@\"some_image.png\"];\nNSArray *items = @[ text, image\
    \ ];\n\nUIActivityViewController *activityVC =\n    [[UIActivityViewController\
    \ alloc] initWithActivityItems:items\n                                      applicationActivities:nil];\n\
    \n[self presentViewController:activityVC animated:YES completion:nil];\n```\n\n\
    就是这样。很简单，对吧？\n\n所以所有魔法都发生在这里：\n\n```objc\nUIActivityViewController *activityVC\
    \ =\n    [[UIActivityViewController alloc] initWithActivityItems:items applicationActivities:nil];\n\
    ```\n\n当实例化 Activity 视图控制器时，你需要向其传递一个 Activity 项目数组。一个 Activity 项目可以是任何对象，具体取决于应用程序和\
    \ Activity 服务目标。在上面的示例代码中，Activity 项目是一个字符串和一个图片。如果你想要使用自定义对象作为 Activity 项目，请让其遵循`UIActivityItemSource`协议。然后，你将完全控制自定义对象如何向\
    \ Activity 视图控制器呈现其数据。\n\n`applicationActivities:`参数期望一个`UIActivity`对象数组。如果传递了`nil`值，则\
    \ Activity 视图控制器将使用一组默认的 Activity 对象。还记得我们之前说过你可以定义自己的自定义服务吗？你可以通过继承`UIActivity`来定义与你的服务的通信来实现这一点。然后，将你的子类作为应用程序\
    \ Activity 数组的一部分传入。\n\n就本章而言，你将只使用默认的 Activity 列表。准备好了吗？让我们开始吧！\n\n## 构建 MessageImage\
    \ 应用程序\n\n在 Xcode 中，使用 Single View Application 模板创建一个新项目。将项目命名为`MessageImage`。由于此应用程序只有一个视图控制器，你不需要\
    \ storyboard。但你仍然会使用自动引用计数（ARC）。\n\n### 构建用户界面\n\n回顾图 11-1。界面非常简单：一个标注为\"Go\"\
    的按钮。当你按下按钮时，应用程序将激活设备的相机并允许你拍照。\n\n选择`ViewController.xib`。\n\n从库中拖拽一个圆角矩形按钮，将其放置在标题为\"\
    View\"的窗口中的任意位置。双击按钮并将其标题设置为`Go`。进入助手编辑器，它会将编辑器面板分割并打开`ViewController.h`。从\"Go\"\
    按钮按住 Control 键拖拽到`ViewController.h`中的`@interface`和`@end`之间。添加一个新的 Action，并将其命名为`selectAndMessageImage`。\n\
    \n接下来，从库中拖拽一个标签到视图窗口。将标签放置在按钮上方，并将其调整大小，使其从左边缘一直延伸到右边缘。在属性检查器中，将文本对齐方式设置为居中。从标签按住\
    \ Control 键拖拽到你刚刚创建的`selectAndMessageImage:`Action 上方。添加一个新的 outlet 并将其命名为`label`。最后，双击标签并擦除文本\"\
    Label\"。\n\n将编辑器切换回标准模式。保存 XIB 文件。\n\n### 拍照\n\n单击`ViewController.h`。你需要让你的视图控制器遵循两个委托协议：\n\
    \n```objc\n@interface ViewController : UIViewController <UINavigationControllerDelegate,\n\
    \                                               UIImagePickerControllerDelegate>\n\
    ```\n"
- fmt: "This is because the image picker controller you’ll be using expects its delegate\
    \ to conform to both `UINavigationControllerDelegate` and `UIImagePickerControllerDelegate`.\
    \ You’re using the image picker controller so you can use the camera and select\
    \ an image to send. Now you need to add a property for the image you’ll select.\n\
    \n```\n@property (strong, nonatomic) UIImage *image;\n```\n\nThat’s all you need\
    \ for now. Let’s move on to the view controller implementation file.\n\n## Calling\
    \ the Camera\n\nSelect `ViewController.m` to open it in the editor.\n\nYou need\
    \ to implement the action method when the button is pressed.\n\n```\n- (IBAction)selectAndMessageImage:(id)sender\n\
    {\n    UIImagePickerControllerSourceType sourceType = UIImagePickerControllerSourceTypeCamera;\n\
    \    if (![UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
    \ {\n        sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n   \
    \ }\n\nUIImagePickerController *picker = [[UIImagePickerController alloc] init];\n\
    \    picker.delegate = self;\n    picker.allowsEditing = YES;\n    picker.sourceType\
    \ = sourceType;\n    [self presentViewController:picker animated:YES completion:nil];\n\
    }\n```\n\nOnce the Go button is pressed, you set the image source to be the device’s\
    \ camera. If the camera is not available (if you’re running on the Simulator),\
    \ you fall back to using the photo library. You set the image picker delegate\
    \ to be your view controller and allow the image to be edited. Finally, you display\
    \ the image picker.\n\nSince you set your view controller to be the image picker’s\
    \ delegate, you can add the delegate methods you need. Add the following below\
    \ the `selectAndMessageImage:` method.\n\n```\n#pragma mark - UIImagePickerController\
    \ Delegate Methods\n\n- (void)imagePickerController:(UIImagePickerController *)picker\n\
    \         didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    [picker dismissViewControllerAnimated:YES\
    \ completion:nil];\n    self.image = [info objectForKey:UIImagePickerControllerEditedImage];\n\
    }\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\n\
    {\n    [picker dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n\
    Both methods dismiss the image picker, but `imagePickerController:didFinishPickingMediaWithInfo:`\
    \ also sets your image property to the picture you took (or chose).\n\nLet’s make\
    \ sure everything is working. Run the application, take a picture, and click Use.\
    \ Nothing should happen, but that’s ok.\n\n## Picking the Message Sender\n\n[Figure\
    \ 11-3](#9781430238072_Ch11.xhtml#Fig3) shows the activity view controller that\
    \ gets exposed after you select a picture. Let’s set that up.\n\nFirst, you’ll\
    \ define a method to show the activity view controller. Open `ViewController.h`\
    \ and add the following method declaration:\n\n```\n- (void)showActivityViewController;\n\
    ```\n\nNow, select `ViewController.m`, and add the method implementation. We added\
    \ ours after `selectAndMessageImage:`.\n\n```\n- (void)showActivityViewController\n\
    {\n    NSString *message = NSLocalizedString(@\"I took a picture on my iPhone\"\
    ,\n                                          @\"I took a picture on my iPhone\"\
    );\n    NSArray *activityItems = @[ message, self.image ];\n    UIActivityViewController\
    \ *activityVC =\n        [[UIActivityViewController alloc] initWithActivityItems:activityItems\n\
    \                                  applicationActivities:nil];\n    [self presentViewController:activityVC\
    \ animated:YES completion:nil];\n}\n```\n\nNow, you need to call the `showActivityViewController`\
    \ method after you’ve picked your picture. Add the following line to the end of\
    \ `imagePickerController:didFinishPickingMediaWithInfo:`. You need to delay the\
    \ presentation of the activity view controller slightly to allow the `UIImagePickerController`\
    \ time to be removed from the root view controller.\n\n```\n    [self performSelector:@selector(showActivityViewController)\
    \ withObject:nil afterDelay:0.5];\n```\n\nCheck your work so far. Run the application\
    \ and confirm the alert sheet appears. That’s it. Wow, that was simple.\n\n**Note:**\
    \ If you select a service and haven’t configured your account information, iOS\
    \ will pop an alert telling you to set up an account.\n\n## Mailing It In…\n\n\
    In the course of this chapter, you saw how to send e-mail, SMS, or a post to social\
    \ media services. You should be able to add this functionality to any of your\
    \ applications. When you’re ready to move on, turn the page to learn the art of\
    \ iPod Fu.\n\n# Chapter 12: Media Library Access and Playback\n\nEvery iOS device,\
    \ at its core, is a first class media player. Out of the box, people can listen\
    \ to music, podcasts, and audio books, as well as watch movies and videos.\n\n\
    iOS SDK applications have always been able to play sounds and music, but Apple\
    \ has been extending the functionality with each iOS release. iOS 3 gave us the\
    \ `MediaPlayer` framework which, among other things, provided access to the user’s\
    \ audio library; iOS 5 extended this by giving us access to video stored in the\
    \ user’s library.\n\niOS 4 extended the `AVFoundation` framework, which offers\
    \ finer control of playing, recording, and editing of media. This control comes\
    \ at a cost, as most of the `MediaPlayer` framework’s functionality is not directly\
    \ implemented in `AVFoundation`. Rather, `AVFoundation` lets you implement custom\
    \ controls for your specific needs.\n\nIn this chapter, you’ll develop three applications:\
    \ a simple audio player, a simple video player, and a combined audio/video player.\
    \ The first two will use the `MediaPlayer` framework exclusively. The final application\
    \ will use the `MediaPlayer` framework to access the user’s media library, but\
    \ then use `AVFoundation` for playback.\n\n## The MediaPlayer Framework\n\nThe\
    \ methods and objects used to access the media library are part of the `MediaPlayer`\
    \ framework, which allows applications to play both audio and video. While the\
    \ framework gives you access to all types of media from the user’s library, there\
    \ are some limitations that only allow you to work with audio files.\n\nThe collection\
    \ of media on your iOS device was once referred as the *iPod library*, a term\
    \ that we shall use interchangeably with *media library*. The latter is probably\
    \ more accurate, as Apple has renamed the music player from iPod to Music and\
    \ moved video media into an application called Videos. More recently, Apple has\
    \ gone even further, creating a Podcasts application to handle your podcast collections.\n\
    \nFrom the perspective of the `MediaPlayer` framework, the entire media library\
    \ itself is represented by the class `MPMediaLibrary`. You won’t use this object\
    \ very often, however. It’s primarily used only when you need to be notified of\
    \ changes made to the library while your application is running. It was rare for\
    \ changes to be made to the library while your application is running, since such\
    \ changes usually happened as the result of synchronizing your device with your\
    \ computer. Nowadays, you can synchronize your music collection directly with\
    \ the iTunes Store, so you may need to monitor changes in the media library.\n\
    \nA media item is represented by the class `MPMediaItem`. If you wish to play\
    \ songs from one of your user’s playlists, you will use the class `MPMediaPlaylist`,\
    \ which represents the playlists that were created in iTunes and synchronized\
    \ to your user’s device. To search for either media items or playlists in the\
    \ iPod library, you use a media query, which is represented by the class `MPMediaQuery`.\
    \ Media queries will return all media items or playlists that match whatever criteria\
    \ you specify. To specify criteria for a media query, you use a special media-centric\
    \ form of predicate called a media property predicate, represented by the class\
    \ `MPMediaPropertyPredicate`.\n\nAnother way to let your user select media items\
    \ is to use the media picker controller, which is an instance of `MPMediaPickerController`.\
    \ The media picker controller allows your users to use the same basic interface\
    \ they are accustomed to using from the iPod or Music application."
  raw: 'This is because the image picker controller you’ll be using expects its delegate
    to conform to both UINavigationControllerDelegate and UIImagePickerControllerDelegate.
    You’re using the image picker controller so you can use the camera and select
    an image to send. Now you need to add a property for the image you’ll select.


    ```

    @property (strong, nonatomic) UIImage *image;

    ```


    That’s all you need for now. Let’s move on to the view controller implementation
    file.


    Calling the Camera


    Select ViewController.m to open it in the editor.


    You need to implement the action method when the button is pressed.


    ```

    - (IBAction)selectAndMessageImage:(id)sender

    {

        UIImagePickerControllerSourceType sourceType = UIImagePickerControllerSourceTypeCamera;

        if (![UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])
    {

            sourceType = UIImagePickerControllerSourceTypePhotoLibrary;

        }


    UIImagePickerController *picker = [[UIImagePickerController alloc] init];

        picker.delegate = self;

        picker.allowsEditing = YES;

        picker.sourceType = sourceType;

        [self presentViewController:picker animated:YES completion:nil];

    }

    ```


    Once the Go button is pressed, you set the image source to be the device’s camera.
    If the camera is not available (if you’re running on the Simulator), you fall
    back to using the photo library. You set the image picker delegate to be your
    view controller and allow the image to be edited. Finally, you display the image
    picker.


    Since you set your view controller to be the image picker’s delegate, you can
    add the delegate methods you need. Add the following below the selectAndMessageImage:
    method.


    ```

    #pragma mark - UIImagePickerController Delegate Methods


    - (void)imagePickerController:(UIImagePickerController *)picker

             didFinishPickingMediaWithInfo:(NSDictionary *)info

    {

        [picker dismissViewControllerAnimated:YES completion:nil];

        self.image = [info objectForKey:UIImagePickerControllerEditedImage];

    }


    - (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker

    {

        [picker dismissViewControllerAnimated:YES completion:nil];

    }

    ```


    Both methods dismiss the image picker, but imagePickerController:didFinishPickingMediaWithInfo:
    also sets your image property to the picture you took (or chose).


    Let’s make sure everything is working. Run the application, take a picture, and
    click Use. Nothing should happen, but that’s ok.


    Picking the Message Sender


    [Figure 11-3](#9781430238072_Ch11.xhtml#Fig3) shows the activity view controller
    that gets exposed after you select a picture. Let’s set that up.


    First, you’ll define a method to show the activity view controller. Open ViewController.h
    and add the following method declaration:


    ```

    - (void)showActivityViewController;

    ```


    Now, select ViewController.m, and add the method implementation. We added ours
    after selectAndMessageImage:.


    ```

    - (void)showActivityViewController

    {

        NSString *message = NSLocalizedString(@"I took a picture on my iPhone",

                                              @"I took a picture on my iPhone");

        NSArray *activityItems = @[ message, self.image ];

        UIActivityViewController *activityVC =

            [[UIActivityViewController alloc] initWithActivityItems:activityItems

                                      applicationActivities:nil];

        [self presentViewController:activityVC animated:YES completion:nil];

    }

    ```


    Now, you need to call the showActivityViewController method after you’ve picked
    your picture. Add the following line to the end of imagePickerController:didFinishPickingMediaWithInfo:.
    You need to delay the presentation of the activity view controller slightly to
    allow the UIImagePickerController time to be removed from the root view controller.


    ```

        [self performSelector:@selector(showActivityViewController) withObject:nil
    afterDelay:0.5];

    ```


    Check your work so far. Run the application and confirm the alert sheet appears.
    That’s it. Wow, that was simple.


    **Note**  If you select a service and haven’t configured your account information,
    iOS will pop an alert telling you to set up an account.


    Mailing It In…


    In the course of this chapter, you saw how to send e-mail, SMS, or a post to social
    media services. You should be able to add this functionality to any of your applications.
    When you’re ready to move on, turn the page to learn the art of iPod Fu.


    Chapter    12


    Media Library Access and Playback


    Every iOS device, at its core, is a first class media player. Out of the box,
    people can listen to music, podcasts, and audio books, as well as watch movies
    and videos.


    iOS SDK applications have always been able to play sounds and music, but Apple
    has been extending the functionality with each iOS release. iOS 3 gave us the
    MediaPlayer framework which, among other things, provided access to the user’s
    audio library; iOS 5 extended this by giving us access to video stored in the
    user’s library.


    iOS 4 extended the AVFoundation framework, which offers finer control of playing,
    recording, and editing of media. This control comes at a cost, as most of the
    MediaPlayer framework’s functionality is not directly implemented in AVFoundation.
    Rather, AVFoundation lets you implement custom controls for your specific needs.


    In this chapter, you’ll develop three applications: a simple audio player, a simple
    video player, and a combined audio/video player. The first two will use the MediaPlayer
    framework exclusively. The final application will use the MediaPlayer framework
    to access the user’s media library, but then use AVFoundation for playback.


    The MediaPlayer Framework


    The methods and objects used to access the media library are part of the MediaPlayer
    framework, which allows applications to play both audio and video. While the framework
    gives you access to all types of media from the user’s library, there are some
    limitations that only allow you to work with audio files.


    The collection of media on your iOS device was once referred as the *iPod library*,
    a term that we shall use interchangeably with *media library*. The latter is probably
    more accurate, as Apple has renamed the music player from iPod to Music and moved
    video media into an application called Videos. More recently, Apple has gone even
    further, creating a Podcasts application to handle your podcast collections.


    From the perspective of the MediaPlayer framework, the entire media library itself
    is represented by the class MPMediaLibrary. You won’t use this object very often,
    however. It’s primarily used only when you need to be notified of changes made
    to the library while your application is running. It was rare for changes to be
    made to the library while your application is running, since such changes usually
    happened as the result of synchronizing your device with your computer. Nowadays,
    you can synchronize your music collection directly with the iTunes Store, so you
    may need to monitor changes in the media library.


    A media item is represented by the class MPMediaItem. If you wish to play songs
    from one of your user’s playlists, you will use the class MPMediaPlaylist, which
    represents the playlists that were created in iTunes and synchronized to your
    user’s device. To search for either media items or playlists in the iPod library,
    you use a media query, which is represented by the class MPMediaQuery. Media queries
    will return all media items or playlists that match whatever criteria you specify.
    To specify criteria for a media query, you use a special media-centric form of
    predicate called a media property predicate, represented by the class MPMediaPropertyPredicate.


    Another way to let your user select media items is to use the media picker controller,
    which is an instance of MPMediaPickerController. The media picker controller allows
    your users to use the same basic interface they are accustomed to using from the
    iPod or Music application.'
