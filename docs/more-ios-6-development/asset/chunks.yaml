    \ `DebugMeTests` class. Create a new file, selecting the Objective-C test case\
    \ class ([Figure 15-6](#9781430238072_Ch15.xhtml#Fig6)). Name the class `DebugMeTests`\
    \ ([Figure 15-7](#9781430238072_Ch15.xhtml#Fig7)). When saving the file, make\
    \ sure you are adding it to the `DebugTestTests` target only ([Figure 15-8](#9781430238072_Ch15.xhtml#Fig8)).\
    \ Now, let’s update your test class. Start with `DebugMeTests.h`.\n\n![9781430238072_Fig15-06.jpg](images/9781430238072_Fig15-06.jpg)\n\
    \n[Figure 15-6.](#9781430238072_Ch15.xhtml#_Fig6) Select the Objective-C test\
