    key\"]] description];\n```\n\n再次尝试运行。查看一个已有英雄并尝试添加一个新英雄。添加英雄后，详情视图应该看起来像 Figure\
    \ 4-22。\n\n![9781430238072_Fig04-22.jpg](img/9781430238072_Fig04-22.jpg)\n\nFigure\
    \ 4-22. 新英雄的详情视图\n\n## 编辑详情\n\n回顾 Figure 4-2 并与 Figure 4-22 进行对比。注意 Figure 4-2\
    \ 中的左侧图像在导航栏右侧有一个\"Edit\"按钮。并且 Figure 4-2 指定了详情视图的\"Edit\"模式，如右侧图像所示。现在我们来添加\"\
    Edit\"按钮并在`HeroDetailController`中实现编辑模式。\n\n### 详情视图中的编辑模式\n\n比较 Figure 4-2 中的两张图片。它们有何不同？首先，左侧图像中的\"\
    Edit\"按钮在右侧图像中已被替换为\"Save\"按钮。此外，\"Save\"按钮处于高亮状态。\"Back\"按钮被替换为\"Cancel\"按钮。右侧图像中的单元格看起来有缩进。虽然看起来改动很多，但实际上实现起来并不费力。\n\
    \n首先，在导航栏中添加\"Edit\"按钮。选择`HeroDetailController.m`并找到`viewDidLoad`方法。取消注释以下代码行：\n\
    \n```\nself.navigationItem.rightBarButtonItem = self.editButtonItem;\n```\n\n\
    运行应用并进入详情视图。导航栏右侧出现了\"Edit\"按钮。如果点击它，视图应该变成 Figure 4-23 所示的样子。\n\n![9781430238072_Fig04-23.jpg](img/9781430238072_Fig04-23.jpg)\n\
    \nFigure 4-23. 处于编辑模式的详情视图\n\n注意\"Edit\"按钮已自动更改为\"Done\"按钮并处于高亮状态。如果点击\"Done\"\
    ，它将恢复为\"Edit\"按钮。这没问题，但你更希望\"Done\"按钮显示为\"Save\"。这需要额外一点工作。\n\n如你所见，`editButtonItem`方法返回一个`UIBarButton`实例，按下时会在\"\
    Edit\"和\"Done\"之间切换。同时它也会切换`HeroDetailController`（从`UITableViewController`继承该属性）中的`editing`属性，在`NO`和`YES`之间切换。该按钮还会调用`setEditing:animated:`回调。\n\
    \n你想要将\"Done\"替换为\"Save\"。为了实现这一点，你需要将\"Edit\"按钮替换为\"Save\"按钮。同时，添加一个专门处理保存的方法，稍后你会用到。首先，你需要添加一个`Save`按钮属性和一个回调方法。由于你只在`HeroDetailController`内部访问`Save`按钮，可以将其设为私有属性。同样，由于回调仅由`Save`按钮使用，也可以将其声明为私有的。编辑`HeroDetailController.m`并将其添加到类别中。\n\
    \n```\n@interface HeroDetailController ()\n@property (strong, nonatomic) NSArray\
    \ *sections;\n@property (strong, nonatomic) UIBarButtonItem *saveButton;\n- (void)save;\n\
    @end\n```\n\n现在需要创建一个`Save`按钮的实例并赋值给这个变量。在`HeroDetailController.m`的`viewDidLoad`方法中，在你刚刚取消注释的\"\
    Edit\"按钮代码之后添加以下内容。\n\n```\nself.saveButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemSave\n\
    \                                                                 target:self\n\
    \                                                                 action:@selector(save)];\n\
    ```"
- fmt: "现在，你需要在“编辑”和“保存”按钮之间进行切换。但应该在哪里调用这个方法呢？记住，当“编辑”按钮被按下时，它会调用`setEditing:animated:`方法。请重写默认的`setEditing:animated:`方法，并在其中实现按钮的切换逻辑。\n\
    \n```\n- (void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n        [super\
    \ setEditing:editing animated:animated];\n        self.navigationItem.rightBarButtonItem\
    \ = (editing) ? self.saveButton : self.editButtonItem;\n}\n```\n\n你还需要添加`save`方法（将其放在文件底部，`@end`之前）。\n\
    \n```\n#pragma mark - (Private) Instance Methods\n- (void)save\n{\n        [self\
    \ setEditing:NO animated:YES];\n}\n```\n\n保存你的工作并运行应用程序。导航到详情视图，然后点击“编辑”按钮。随着你在编辑模式中切换，它应该会在“编辑”和“保存”之间切换。现在，我们来修改它，让“返回”按钮变成一个“取消”按钮。\n\
    \n这个过程与你为“编辑/保存”按钮所做的几乎相同：声明一个属性和回调方法，并在导航栏中切换按钮。不过，你还需要一个属性来存储“返回”按钮。将以下内容添加到`HeroDetailController`类别中：\n\
    \n```\n@property (strong, nonatomic) UIBarButtonItem *backButton;\n@property (strong,\
    \ nonatomic) UIBarButtonItem *cancelButton;\n- (void)cancel;\n```\n\n将`backButton`分配给左侧导航栏按钮，并在`viewDidLoad`中创建`Cancel`按钮的实例。\n\
    \n```\nself.backButton = self.navigationItem.leftBarButtonItem;\nself.cancelButton\
    \ = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\n\
    \                               target:self\n                               action:@selector(cancel)];\n\
    ```\n\n修改`setEditing:animated:`以在“返回”和“取消”按钮之间切换。\n\n```\nself.navigationItem.leftBarButtonItem\
    \ = (editing) ? self.cancelButton : self.backButton;\n```\n\n最后，添加`cancel`回调方法。目前，它与`save`方法相同，但很快你会对其进行修改。\n\
    \n```\n- (void)cancel\n{\n    [self setEditing:NO animated:YES];\n}\n```\n\n再次运行应用程序。当你在详情视图中点击“编辑”按钮时，“返回”按钮应该会切换为“取消”。如果你按下“取消”按钮，应该会退出编辑模式。\n\
    \n现在，你想要消除编辑模式下每个单元格右侧出现的红色按钮。当你点击这些按钮时，它们会旋转，并且会在相应的单元格中出现一个“删除”按钮。这对于详情视图来说并不真正相关，你无法删除一个属性（但你确实可以清除它，或者将其值设置为`nil`）。所以你希望这个按钮根本不出现。在`HeroDetailController.m`中添加这个方法（放在其他表格视图委托方法附近）：\n\
    \n```\n- (UITableViewCellEditingStyle)tableView:(UITableView *)tableView\n   \
    \         editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return\
    \ UITableViewCellEditingStyleNone;\n}\n```\n\n运行应用程序，可以看到红色按钮消失了。你可以在详情视图中进出编辑模式，但仍旧无法编辑任何内容。要实现此功能，你还有不少工作要做。\n\
    \n## 创建自定义`UITableViewCell`子类\n\n让我们看看“通讯录”应用程序。当你编辑某个联系人的属性时，会出现一个带有键盘的辅助视图（[图4-24](#9781430238072_Ch04.xhtml#Fig24)），支持内联编辑。你将在你的`SuperDB`应用程序中模拟这个功能。这需要你开发一个自定义的`UITableViewCell`子类。\n\
    \n![9781430238072_Fig04-24.jpg](images/9781430238072_Fig04-24.jpg)\n\n[图4-24.](#9781430238072_Ch04.xhtml#_Fig24)\
    \ 在“通讯录”应用程序中进行编辑\n\n让我们来看一下当前表格视图单元格的布局。目前，你设置了单元格的两个部分：`textLabel`和`detailTextLabel`（[图4-25](#9781430238072_Ch04.xhtml#Fig25)）。这两个部分都是静态文本；你可以通过编程方式赋值，但无法通过用户界面与它们进行交互。iOS\
    \ SDK 没有提供一个类，让你可以静态地赋值`textLabel`，同时编辑`detailTextLabel`部分。这就是你需要构建的内容。\n\n![9781430238072_Fig04-25.jpg](images/9781430238072_Fig04-25.jpg)\n\
    \n[图4-25.](#9781430238072_Ch04.xhtml#_Fig25) 当前表格视图单元格的分解\n\n关键组件是，用`UITextField`替换`detailTextLabel`属性。这将使你能够在表格视图单元格中进行编辑。由于你替换了表格视图单元格的一部分，你也必须替换`textLabel`。因为该文本是静态的，你将使用`UILabel`。原则上，你的自定义表格视图单元格应该看起来像[图4-26](#9781430238072_Ch04.xhtml#Fig26)。\n\
    \n![9781430238072_Fig04-26.jpg](images/9781430238072_Fig04-26.jpg)\n\n[图4-26.](#9781430238072_Ch04.xhtml#_Fig26)\
    \ 自定义表格视图单元格的分解\n\n让我们开始吧。\n\n在导航窗格中单击`SuperDB`组，创建一个新文件。在 iOS/Cocoa Touch 模板下选择\
    \ Objective-C 类。使该类成为`UITableViewCell`的子类。将文件命名为`SuperDBEditCell.m`。点击“Next”，然后点击“Create”。\n\
    \n你需要一个`UILabel`和一个`UITextField`。将这些属性添加到`SuperDBEditCell.h`中。\n\n```\n@interface\
    \ SuperDBEditCell : UITableViewCell\n\n@property (strong, nonatomic) UILabel *label;\n\
    @property (strong, nonatomic) UITextField *textField;\n@end\n```\n\n现在，添加适当的初始化代码。编辑`SuperDBEditCell.m`并找到`initWithStyle:reuseIdentifier:`。在“Initialization\
    \ Code”注释之后，立即添加：\n\n```\nself.selectionStyle = UITableViewCellSelectionStyleNone;\n\
    \nself.label = [[UILabel alloc] initWithFrame:CGRectMake(12.0, 15.0, 67.0, 15.0)];\n\
    self.label.backgroundColor = [UIColor clearColor];\nself.label.font = [UIFont\
    \ boldSystemFontOfSize:[UIFont smallSystemFontSize]];\nself.label.textAlignment\
    \ = NSTextAlignmentRight;\nself.label.textColor = kLabelTextColor;\nself.label.text\
    \ = @\"label\";\n[self.contentView addSubview:self.label];\n\nself.textField =\
    \ [[UITextField alloc] initWithFrame:CGRectMake(93.0, 13.0, 170.0, 19.0)];\nself.textField.backgroundColor\
    \ = [UIColor clearColor];\nself.textField.clearButtonMode = UITextFieldViewModeWhileEditing;\n\
    self.textField.enabled = NO;\nself.textField.font = [UIFont boldSystemFontOfSize:[UIFont\
    \ systemFontSize]];\nself.textField.text = @\"Title\";\n[self.contentView addSubview:self.textField];\n\
    ```\n\n请注意，`kLabelTextColor`是一个你计算出来的常量，这样标签将拥有与之前相同的颜色。在`@implementation`指令之前添加这个`#define`：\n\
    \n```\n#define kLabelTextColor [UIColor colorWithRed:0.321569f green:0.4f blue:0.568627f\
    \ alpha:1.0f]\n```\n\n现在，你需要调整`HeroDetailController`以使用`SuperDBEditCell`。但在此之前，你需要修复`SuperDB.storyboard`中的配置。\n\
    \n打开`SuperDB.storyboard`，选择`HeroDetailController`中的第一个表格视图单元格。打开 Identity Inspector，并将\
    \ Class 字段更改为`SuperDBEditCell`。切换到 Attributes Inspector，并将 Style 更改为 Custom。对其他三个表格视图单元格重复此操作。\n\
    \n打开`HeroDetailController.m`。添加这个`#import`指令作为第二条`#import`指令：\n\n```\n#import\
    \ \"SuperDBEditCell.h\"\n```\n\n然后，找到`tableView:cellForRowAtIndexPath:`并将其编辑为："
  raw: 'Now, you need to switch between the Edit and Save buttons. But where do you
    call this method? Remember, when the Edit button is pressed, it invokes the setEditing:animated:
    method. Override the default setEditing:animated: method, and have yours switch
    the buttons.


    ```

    - (void)setEditing:(BOOL)editing animated:(BOOL)animated

    {

            [super setEditing:editing animated:animated];

            self.navigationItem.rightBarButtonItem = (editing) ? self.saveButton :
    self.editButtonItem;

    }

    ```


    And you need to add the save method (put it at the bottom of the file, just before
    the @end).


    ```

    #pragma mark - (Private) Instance Methods

    - (void)save

    {

            [self setEditing:NO animated:YES];

    }

    ```


    Save your work and run the application. Navigate down the detail view, and click
    the Edit button. It should toggle between Edit and Save as you toggle in and out
    of editing mode. Now, let’s fix it so the Back button changes into a Cancel button.


    The process is almost identical to what you did for the Edit/Save buttons: declare
    a property and callback method, and toggle the button in the navigation bar. However,
    you also need an property to store the Back button. Add the following to the HeroDetailController
    category:


    ```

    @property (strong, nonatomic) UIBarButtonItem *backButton;

    @property (strong, nonatomic) UIBarButtonItem *cancelButton;

    - (void)cancel;

    ```


    Assign the backButton to the left navigation bar button, and create an instance
    of the Cancel button in viewDidLoad.


    ```

    self.backButton = self.navigationItem.leftBarButtonItem;

    self.cancelButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel                                    

                                   target:self                        

                                               action:@selector(cancel)];

    ```


    Modify setEditing:animated: to toggle the Back and Cancel buttons.


    ```

    self.navigationItem.leftBarButtonItem = (editing) ? self.cancelButton : self.backButton;

    ```


    Finally, add the cancel callback method. For now, it’s identical to the save method,
    but you’ll be changing that soon.


    ```

    - (void)cancel

    {

        [self setEditing:NO animated:YES];

    }

    ```


    Run the application again. When you hit the Edit button in the detail view, the
    Back button should switch to Cancel. If you press the Cancel button, you should
    exit editing mode.


    Now you want to eliminate those red buttons that appear to right of each cell
    in editing mode. When you click those buttons, they rotate and a Delete button
    will appear in the appropriate cell. This isn’t really relevant for the detail
    view, you can’t delete an attribute (you can, however, clear it, or set its value
    to nil). So you don’t want this button to appear at all. Add this method to HeroDetailController.m
    (somewhere with the other table view delegate methods):


    ```

    - (UITableViewCellEditingStyle)tableView:(UITableView *)tableView

                editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath

    {

     return UITableViewCellEditingStyleNone;

    }

    ```


    Running application shows that the red buttons are gone. You are able to toggle
    the detail view in and out of editing mode, but you still can’t edit anything.
    There’s still a bit of work ahead of you to add this functionality.


    Creating a Custom UITableViewCell Subclass


    Let’s look at the Contacts application. When you edit a contact’s attributes,
    an accessory view appears, with a keyboard ([Figure 4-24](#9781430238072_Ch04.xhtml#Fig24)),
    allowing for inline editing. You’re going to emulate this functionality in your
    SuperDB application. This is going to require you to develop a custom UITableViewCell
    subclass.


    ![9781430238072_Fig04-24.jpg](images/9781430238072_Fig04-24.jpg)


    [Figure 4-24.](#9781430238072_Ch04.xhtml#_Fig24)  Editing in the Contacts application


    Let’s look at the current layout of the table view cell. Currently, you set two
    parts of the cell: the textLabel and the detailTextLabel ([Figure 4-25](#9781430238072_Ch04.xhtml#Fig25)).
    Both parts are static text; you can assign the values programmatically, but you
    are unable to interact with them via the user interface. The iOS SDK does not
    give you a class where you can assign the textLabel statically but edit the detailTextLabel
    portion. That’s what you have to build.


    ![9781430238072_Fig04-25.jpg](images/9781430238072_Fig04-25.jpg)


    [Figure 4-25.](#9781430238072_Ch04.xhtml#_Fig25)  Current breakdown of the table
    view cell


    The key component is replacing the detailTextLabel property with a UITextField.
    This will give you the ability to edit within the table view cell. Since you replaced
    one portion of the table view cell, you have to replace the textLabel as well.
    Since that text is static, you’ll use a UILabel. In principle, your custom table
    view cell should look like [Figure 4-26](#9781430238072_Ch04.xhtml#Fig26).


    ![9781430238072_Fig04-26.jpg](images/9781430238072_Fig04-26.jpg)


    [Figure 4-26.](#9781430238072_Ch04.xhtml#_Fig26)  Breakdown of your custom table
    view cell


    Let’s get started.


    Single click the SuperDB group in the Navigator pane, and create a new file. Choose
    Objective-C class, under the iOS/Cocoa Touch templates. Make this class a subclass
    of UITableViewCell. Let’s name the file SuperDBEditCell.m. Click Next, then Create.


    You need a UILabel and a UITextField. Add those properties to SuperDBEditCell.h.


    ```

    @interface SuperDBEditCell : UITableViewCell


    @property (strong, nonatomic) UILabel *label;

    @property (strong, nonatomic) UITextField *textField;

    @end

    ```


    Now add the appropriate initialization code. Edit SuperDBEditCell.m and find initWithStyle:reuseIdentifier:.
    Right after the Initialization Code comment, add


    ```

    self.selectionStyle = UITableViewCellSelectionStyleNone;


    self.label = [[UILabel alloc] initWithFrame:CGRectMake(12.0, 15.0, 67.0, 15.0)];

    self.label.backgroundColor = [UIColor clearColor];

    self.label.font = [UIFont boldSystemFontOfSize:[UIFont smallSystemFontSize]];

    self.label.textAlignment = NSTextAlignmentRight;

    self.label.textColor = kLabelTextColor;

    self.label.text = @"label";

    [self.contentView addSubview:self.label];


    self.textField = [[UITextField alloc] initWithFrame:CGRectMake(93.0, 13.0, 170.0,
    19.0)];

    self.textField.backgroundColor = [UIColor clearColor];

    self.textField.clearButtonMode = UITextFieldViewModeWhileEditing;

    self.textField.enabled = NO;

    self.textField.font = [UIFont boldSystemFontOfSize:[UIFont systemFontSize]];

    self.textField.text = @"Title";

    [self.contentView addSubview:self.textField];

    ```


    Note that kLabelTextColor is a constant that you calculated so the label will
    have the same color as before. Add this #define before the @implementation directive:


    ```

    #define kLabelTextColor [UIColor colorWithRed:0.321569f green:0.4f blue:0.568627f
    alpha:1.0f]

    ```


    Now you need to adjust the HeroDetailController to use SuperDBEditCell. But before
    you do that, you need to fix the configuration in SuperDB.storyboard.


    Open SuperDB.storyboard, and select the first table view cell in the HeroDetailController.
    Open the Identity Inspector and change the Class field to SuperDBEditCell. Switch
    to the Attributes Inspector, and change the Style to Custom. Repeat this for the
    three other table view cells.


    Open HeroDetailController.m. Add this #import


    ```

    #import "SuperDBEditCell.h"

    ```


    as the second #import directive. Then find tableView:cellForRowAtIndexPath: and
    edit it to read'
