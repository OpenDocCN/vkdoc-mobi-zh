    \ sex report. We’ll leave it you to reason out why, and how you might fix this\
    \ ;-).\n\n## Wonderful to the Core\n\nThis chapter and the previous chapters have\
    \ given you a solid foundation in the use of Core Data. Along the way, we provided\
    \ some information about how to design complex iPhone applications so that they\
    \ can be maintained and expanded without writing unnecessary code or repeating\
    \ the same logic in multiple places. We demonstrated just how much benefit you\
    \ can get from taking the time to write code generically. We showed you how to\
    \ look for opportunities to refactor your code to make it smaller, more efficient,\
    \ easier to maintain, and just generally more pleasant to be around.\n\nWe could\
    \ go on for several more chapters about Core Data and not exhaust the topic. But\
    \ Core Data is not the only new framework introduced since iOS SDK 3. At this\
    \ point, you should have a solid enough understanding of Core Data to be able\
    \ to, armed with Apple’s documentation, take your explorations even further.\n\
    \nNow it’s time to leave our friend Core Data behind and explore some of the other\
    \ aspects of iOS SDK.\n\n# Chapter 8\n\n# Behind Every iCloud\n\nWith iOS 5, Apple\
    \ introduced iCloud, the latest in its line of Internet-based tools and services.\
    \ To the end user, iCloud extends Apple’s previous MobileMe offerings of e-mail,\
    \ contact management, and Find My iPhone, with iOS backup and restore, iTunes\
    \ Match, Photo Stream, and Back to My Mac.\n\nFor all the bells and whistles that\
    \ Apple has built, at its heart iCloud is a cloud-based storage and synchronization\
    \ service. Its main purpose is to allow users to access their content across all\
    \ their devices: iPhone, iPad, or Mac. Best of all, Apple has given iOS developers\
    \ a set of APIs for accessing iCloud. This lets you build apps that can take advantage\
    \ of the same iCloud features as Apple without having to invest in building an\
    \ extensive server infrastructure. Even better, you don’t have to learn a new\
    \ complicated SDK. Rather than providing a new iCloud framework, Apple added new\
