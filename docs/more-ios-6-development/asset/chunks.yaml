    \ 方法。在该方法结束前，注册以接收 `DataChanged` 通知。\n\n```\n[[NSNotificationCenter defaultCenter]\
    \ addObserver:self selector:@selector(updateReceived:) name:@\"DataChanged\" object:nil];\n\
    ```\n\n与此同时，做个好习惯的 iOS 程序员，在 `didReceiveMemoryWarning` 方法中取消注册。\n\n```\n[[NSNotificationCenter\
    \ defaultCenter] removeObserver:self];\n```\n\n当收到 `DataChanged` 通知时，`updateReceived:`\
    \ 方法将被调用。因此你需要声明并实现它。\n首先，在 `HeroListController.h` 中，在 `@end` 之前添加方法声明。\n\n```\n\
    - (void)updateReceived:(NSNotification *)notification;\n```\n\n现在，将实现代码添加到 `HeroListController.m`\
    \ 中，同样在 `@end` 之前。\n\n```\n- (void)updateReceived:(NSNotification *)notification\n\
    {\n    NSError *error;\n    if (![self.fetchedResultsController performFetch:&error])\
    \ {\n        NSLog(@\"执行获取时出错: %@\", [error localizedDescription]);\n    } \n\
    \    [self.heroTableView reloadData];\n}\n```\n\n本质上，它只是刷新了数据和表格视图。\n\n# 测试数据存储"
- fmt: '# iCloud 开发要点


    你不能在模拟器上使用 `iCloud`，因此需要在真机上运行。构建并运行应用。由于你从一个新的持久化存储开始，此时应该没有任何条目。添加一个新英雄，编辑详细信息，然后保存。现在退出应用程序（或在
    Xcode 中停止运行）。在你的设备上，长按 `SuperDB` 应用图标直到它开始抖动。删除该应用。你应该会收到一个警告对话框，提示本地数据将丢失，但 `iCloud`
    数据将被保留。点击 `Delete`。


    现在再次运行应用。等待片刻，英雄列表应该会更新，包含你之前添加的英雄。即使你删除了应用（及其本地数据），`iCloud` 仍然能够同步并恢复持久化存储。


    ## 脚踏实地


    在为 `iCloud` 开发应用时，有时你可能需要查看甚至删除 `iCloud` 中的数据。有几种方式可以查看和/或管理你的应用程序放入 `iCloud`
    的数据。


    *   **通过 Mac**：打开系统偏好设置，选择 `iCloud`。点击右下角的 `Manage` 按钮。

    *   **通过 iOS**：使用设置应用，导航至 `iCloud` ![image](images/arrow.jpg) `Storage & Backup`
    ![image](images/arrow.jpg) `Manage Storage`。

    *   **通过 Web（仅查看）**：导航至 [http://developer.icloud.com/](http://developer.icloud.com/)
    并登录。点击 `Documents` 图标。


    这些仅为构建支持 `iCloud` 的 iOS 应用的基础知识。对于任何应用，都有许多事情需要考虑，但以下是一些关键点需要记住：


    *   如果 `iCloud` 不可用，你的应用将如何表现？

    *   如果你允许“离线”使用，你的应用将如何与 `iCloud` 同步？

    *   你的应用将如何处理冲突？这将在很大程度上取决于你的数据模型。

    *   尝试设计你的数据/文档模型，以最小化设备与 `iCloud` 之间的数据传输。


    希望你已经对在应用中启用 `iCloud` 有了良好的体验。让我们回到地球，开始构建一个游戏吧。


    # 第 9 章：使用 Game Kit 进行蓝牙点对点连接


    `Game Kit` 无疑是 iOS SDK 中为游戏开发人员提供的最酷的框架之一。`Game Kit` 类提供了三种不同的技术：`GameCenter`、点对点连接和游戏内语音。虽然本章将重点介绍点对点连接，但我们也会简要介绍
    `Game Kit` 的另外两个组件，以便你熟悉它们。


    ## Game Center


    `Game Center` 是 Apple 提供的一个集中式社交网络游戏服务。`Game Center` 提供的服务使你的游戏用户能够共享信息，并如果游戏支持多人模式，还能与其他玩家连接。`Game
    Center` 包含三个组件：


    *   内置于 iOS 中的`游戏中心`应用（[图 9-1](#9781430238072_Ch09.xhtml#Fig1)）。

    *   Apple 在“云端”管理的`Game Center`服务。

    *   `Game Kit` 框架中提供的`Game Center` API。


    ![9781430238072_Fig09-01.jpg](images/9781430238072_Fig09-01.jpg)


    [图 9-1.](#9781430238072_Ch09.xhtml#_Fig1)  iOS 设备上的 Game Center


    `Game Center` 提供以下基本服务：


    *   **认证：** 这只是在`Game Center`服务上标识用户的一个账户。

    *   **排行榜：** 这是你的应用程序的“高分榜”。如果你决定实现排行榜，那么由你的应用决定什么构成“高分”。例如，它可以是一个简单的积分系统，也可以是游戏时间。你的应用还可以下载排行榜信息并本地存储。

    *   **成就：** 另一种衡量游戏活动的方式。这些通常是玩家达到的特定里程碑（例如“第 2 关”），而不是在排行榜中衡量的分数。

    *   **多人游戏：** 允许玩家寻找其他（同一游戏的）玩家进行对战。你可以使用`Game Center`连接游戏中的所有玩家，大家一起玩，或者提供一个玩家列表进行对战。这可能需要你实现自己的服务。


    所有`Game Center`游戏都必须从认证玩家开始。所有其他功能都依赖于用户已通过`Game Center`服务认证。与`Game Center`的认证是系统级的，这意味着如果你在一个游戏中通过`Game
    Center`认证，那么任何其他支持`Game Center`的游戏也会使用该认证。如果没有经过认证的玩家，`Game Center`功能将被禁用。你的游戏是否仍然可以运行，由你决定。


    如果你在游戏中确实使用了其他`Game Center`功能，你需要至少有一个视图控制器。这个视图控制器被用作`Game Center`工作的“根”。例如，排行榜是一个`Game
    Kit`视图控制器类，它为你的游戏提供了一个显示排行榜信息的标准方式。你的游戏需要提供一个视图控制器来模态显示排行榜。


    由于`Game Center`是一个基于网络的服务，你需要设置保护措施来处理网络中断。


    **注意** 更多关于 `Game Center` 和 `Game Kit` 的详细信息，可以阅读 Kyle Richter (Apress, 2011)
    所著的 *Beginning iOS Game Center and Game Kit* ([www.apress.com/9781430235279](http://www.apress.com/9781430235279))
    以及 Apple 的 *Game Kit Programming Guide* ([https://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html](https://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html))。


    ## 点对点连接


    `Game Kit` 使通过蓝牙或 `WiFi` 无线连接多个 iOS 设备变得简单。蓝牙是除第一代 iPhone 和 iPod touch 之外的所有设备内置的无线网络选项。`Game
    Kit` 允许任何支持的设备与范围内任何其他支持的设备进行通信。对于蓝牙，这个范围大约为 30 英尺（约 10 米）。尽管名称暗示不同，但 `Game Kit`
    也适用于非游戏类应用。例如，你可以构建一个社交网络应用，允许人们通过蓝牙轻松传输联系信息。


    **警告** 本章中的代码将无法在模拟器中运行，因为模拟器不支持蓝牙。在连接到电脑的设备上构建和调试应用的唯一方法是加入付费的 iPhone 开发者计划。如果你想充分体验本章的精华，你需要这样做。


    此外，在撰写本文时，你无法在设备与模拟器之间进行 `Game Kit` 游戏。如果你只有一台设备，你将无法尝试本章中的游戏。


    点对点连接依赖于两个组件：


    *   **会话** 允许运行同一应用的 iPhone OS 设备通过蓝牙轻松地来回发送信息，而无需编写任何网络代码。

    *   **对等选择器** 提供了一种无需编写任何网络或发现 (Bonjour) 代码即可轻松找到其他设备的方法。'
  raw: 'You can’t use iCloud on the simulator, so you need to run it on your device.
    Build and run the app. Since you’re starting with a new persistent store, there
    should be no entries. Add a new hero, edit the details, and save. Now quit the
    application (and/or stop it in Xcode). On your device, tap and hold the SuperDB
    app icon until it begins to shake. Delete the app. You should receive an alert
    dialog to tell you that the local data will be lost, but the iCloud data will
    be kept. Tap Delete.


    Now run the app again. Wait a few moments, and the Hero list should update to
    include the hero you added earlier. Even though you deleted the app (and its local
    data), iCloud was able to synchronize and restore the persistent store.


    Keep Your Feet on the Ground


    While developing an application for iCloud, there may be times when you want to
    view or even delete the data in iCloud. There are a few ways you can view and/or
    manage the data your application is putting in iCloud.


    *   *Via Mac*: Open the System Preference, and choose iCloud. Click the Manage
    button on the lower right.

    *   *Via iOS*: Use the Settings app, and navigate to iCloud ![image](images/arrow.jpg)
    Storage & Backup ![image](images/arrow.jpg) Manage Storage.

    *   *Via the Web (view only)*: Navigate to [http://developer.icloud.com/](http://developer.icloud.com/)
    and log in. Click the Documents icon.


    These are just the basics of building an iCloud-enabled application for iOS. For
    any application, there are many things to keep in mind, but here are some key
    things to remember:


    *   How will your app behave if iCloud is not available?

    *   If you allow “offline” use, how will your application synchronize with iCloud?

    *   How will your application handle conflicts? This will be highly dependent
    on your data model.

    *   Try to design your data/document model to minimize the data transfer between
    your device and iCloud.


    Hopefully, you’ve gotten a good taste of what it means to enable iCloud in your
    app. Let’s head back to Earth and have some fun building a game.


    Chapter    9


    Peer-to-Peer Over Bluetooth Using Game Kit


    Game Kit has to be one of the coolest frameworks available for people interested
    in developing games on the iOS SDK. Game Kit classes provide three different technologies:
    GameCenter, Peer-to-Peer Connectivity, and In Game Voice. While this chapter will
    focus on Peer-to-Peer Connectivity, we’ll briefly cover the other two components
    of Game Kit so that you’re familiar with them.


    Game Center


    Game Center is a centralized, social-networking gaming service provided by Apple.
    Game Center provides the services so that users of your game can share information
    and join other players, if your game is multiplayer. Game Center has three components:


    *   Game Center App built into iOS ([Figure 9-1](#9781430238072_Ch09.xhtml#Fig1)).

    *   Game Center Service that Apple manages “in the cloud.”

    *   Game Center APIs provided in the Game Kit framework.


    ![9781430238072_Fig09-01.jpg](images/9781430238072_Fig09-01.jpg)


    [Figure 9-1.](#9781430238072_Ch09.xhtml#_Fig1)  Game Center on your iOS device


    Game Center provides the following basic services:


    *   **Authentication:**This is simply an account on the Game Center service that
    identifies your user on Game Center.

    *   **Leaderboards:**This is the “high score” of your application. If you decide
    to implement a leaderboard, it’s up to your application what constitutes a “high
    score.” For example, it could be a simple point system or it could be time played.
    Your app can also download leaderboard information and store it locally.

    *   **Achievements:**Another measure of game activity. These are usually specific
    milestones a player has reached (i.e. “Level 2”) as opposed to a score, which
    would be measured in the leaderboard.

    *   **Multiplayer:** Allows players to find other players (of the same game) to
    compete against. You can use Game Center to connect all players of a game where
    everyone plays together or deliver a list of players to compete against. This
    may require you to implement a service of your own.


    All Game Center games must start by authenticating a player. All other features
    depend on the user being authenticated against the Game Center Service. Authentication
    with Game Center is system-wide, meaning if you authenticate one game with Game
    Center, any other Game Center-enabled game will use that authentication as well.
    If there isn’t an authenticated player, Game Center features will be disabled.
    Whether your game still works or not is up to you.


    If you do use the other Game Center features in your game, you need to have at
    least one view controller in place. This view controller is used as the “root”
    for Game Center to work off. For example, the leaderboard is a Game Kit view controller
    class that provides a standard way for your game to display leaderboard information.
    Your game needs to provide a view controller to modally display the leaderboard.


    Since Game Center is a network-based service, you need to put guards in place
    to handle the loss of network.


    **Note**  For more information on Game Center, and Game Kit in general, you can
    read *Beginning iOS Game Center and Game Kit* ([www.apress.com/9781430235279](http://www.apress.com/9781430235279))
    by Kyle Richter (Apress, 2011) and Apple’s Game Kit Programming Guide ([https://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html](https://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html)).


    Peer-to-Peer Connectivity


    Game Kit makes it easy to wirelessly connect multiple iOS devices, either via
    Bluetooth or WiFi. Bluetooth is a wireless networking option built into all but
    the first-generation iPhone and iPod touch. Game Kit allows any supported devices
    to communicate with any other supported devices that are within range. For Bluetooth,
    this is roughly 30 feet (about 10 meters) of each other. Though the name implies
    differently, Game Kit is useful for non-gaming apps, too. For example, you might
    build a social networking app that allows people to easily transfer contact information
    over Bluetooth.


    **Caution**  The code in this chapter will not run in the Simulator because the
    Simulator does not support Bluetooth. The only way to build and debug apps on
    a device attached to your machine is by joining the paid iPhone Developer Program.
    So you’ll need to do that if you want to fully experience this chapter’s chewy
    goodness.


    In addition, as of this writing, you cannot play Game Kit games between a device
    and the Simulator. If you have only one device, you will not be able to try out
    the game in this chapter.


    Peer-to-Peer Connectivity relies on two components:


    *   The *session* allows iPhone OS devices running the same application to easily
    send information back and forth over Bluetooth without writing any networking
    code.

    *   The *peer picker* provides an easy way to find other devices without writing
    any networking or discovery (Bonjour) code.'
