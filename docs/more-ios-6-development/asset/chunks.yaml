    make a copy of it. This way, if things go south when you add your new code for
    this chapter, you won’t have to start at the very beginning. Open this new copy
    of your project in Xcode.


    Next, create the detail view controller itself. Remember that you’re creating
    a table-based editing view, so you want to subclass UITableViewController. Select
    SuperDB.storyboard and open the storyboard editor. Open the Utility pane, if it’s
    not already open, and find the table view controller in the Object library. Drag
    it onto the storyboard editor, to the right of the HeroListController ([Figure
    4-3](#9781430238072_Ch04.xhtml#Fig3)).


    ![9781430238072_Fig04-03.jpg](images/9781430238072_Fig04-03.jpg)


    [Figure 4-3.](#9781430238072_Ch04.xhtml#_Fig3)  The layout of your storyboard


    Make sure you’re zoom level is such that you see the three icons on the table
    view’s label. Single-click the table view (the grey area of the view), and switch
    the Utility pane to the Attribute Inspector ([Figure 4-4](#9781430238072_Ch04.xhtml#Fig4)).


    ![9781430238072_Fig04-04.jpg](images/9781430238072_Fig04-04.jpg)


    [Figure 4-4.](#9781430238072_Ch04.xhtml#_Fig4)  Table view’s attributes'
