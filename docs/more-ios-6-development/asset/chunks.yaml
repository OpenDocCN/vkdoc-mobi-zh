- fmt: "Now you need to extract the digital identity from the user certificate. In\
    \ `Keychain Access.app`, select the `login` keychain on the left, and select the\
    \ `Certificates` category below that. Find the certificate you just created. It\
    \ should have the common name you entered when creating the certificate signing\
    \ request ([Figure 13-6](#9781430238072_Ch13.xhtml#Fig6)). Open the disclosure\
    \ triangle next to the name. The private key should be exposed below the certificate,\
    \ with the same name as the certificate. Select the private key, then `File` ![image](images/arrow.jpg)\
    \ `Export Items`. Name the file `cert` in the Save dialog, making sure the file\
    \ format is `Personal Information Exchange (.p12)`. Click `Save`. You will be\
    \ asked to provide a password for the `.p12` file. It’s a good idea to pick something\
    \ the Password dialog thinks is secure. In our case, we used `“@Super2048Cat”`.\
    \ After you click `OK`, you may be asked to enter your keychain password. This\
    \ is your login password. Enter it and click `Allow`. On successful certificate\
    \ creation, the Certificate Assistant will show you the details for your certificate\
    \ ([Figure 13-7](#9781430238072_Ch13.xhtml#Fig7)). Notice that since it was self-signed,\
    \ it’s marked as being signed by an untrusted issuer.\n\n![9781430238072_Fig13-06.jpg](images/9781430238072_Fig13-06.jpg)\n\
    \n[Figure 13-6.](#9781430238072_Ch13.xhtml#_Fig6)  Select the Issuing Certificate\
    \ Authority for your certificate\n\n![9781430238072_Fig13-07.jpg](images/9781430238072_Fig13-07.jpg)\n\
    \n[Figure 13-7.](#9781430238072_Ch13.xhtml#_Fig7)  Successful certificate creation\n\
    \nOne last thing. The `Security` framework expects your root certificate of DER\
    \ format, not the PEM that’s created by the `Certificate Assistant`. Open `Terminal.app`\
    \ and change directories to the `~/Library/Application Support/Certificate Authority/<CA\
    \ Name>` directory. You should see a file named `<CA Name> certificates.pem`.\
    \ Enter this command:\n\n```\n> openssl x509 -in <PEM file> −inform PEM -out root.der\
    \ -outform DER\n```\n\nreplacing `<PEM file>` with the name of the file.\n\nNow\
    \ you’re ready to build your application.\n\n## Creating the Keychain App\n\n\
    You’re going to use the `Tabbed Application` template as the starting point for\
    \ your application. Open Xcode and create a new project. Select the `Tabbed Application`\
    \ template. Name the project `KeychainViewer`, and have the project use both storyboards\
    \ and Automatic Reference Counting.\n\nOnce the project is created, you need to\
    \ add the `Security` framework to it. Select the project in the Project Navigator.\
    \ Select the `Keychain Viewer` target in the project editor and navigate to the\
    \ `Build Phases` tab. Expand the `Link Binary with Libraries (3 Items)` section\
    \ and add `Security.framework`. Clean up the `Project Navigator` by moving the\
    \ `Security.framework` into the `Frameworks` group.\n\nYou’re going to replace\
    \ the `FirstViewController` and `SecondViewController` with different implementations.\
    \ So select the files `FirstViewController.h`, `FirstViewController.m`, `SecondViewController.h`,\
    \ and `SecondViewController.m` and delete them. You don’t need to keep the files,\
    \ so select `Move to Trash` when Xcode asks.\n\nYou’ll delete the `First View\
    \ Controller` and `Second View Controller` scenes in the main storyboard in a\
    \ little bit. First, you’ll define some keychain item classes. The Keychain API\
    \ is a C language API, not Objective-C, so you’re going to wrap it in an Objective-C\
    \ class to make access easier. Create a new Objective-C class, in the `Keychain\
    \ Viewer` group, named `KeychainItem`. Make it a subclass of `NSObject`.\n\nSelect\
    \ `KeychainItem.h`, and add an import directive for the `Security` framework header\
    \ file.\n\n```\n#import <Security/Security.h>\n```\n\nFor each `KeychainItem`\
    \ object, you need to know what type it might be (i.e. `kSecClassGenericPassword`),\
    \ and the actual keychain item. Both of these can be captured using the `CFTypeRef`\
    \ CoreFoundation type. `CFTypeRef` maps to the generic Objective-C object `id`.\
    \ So you’ll add two properties of type `id` to your `KeychainItem` class. You’ll\
    \ also define an `NSDictionary` property to hold the dictionary of attributes\
    \ you get back for each keychain item. Finally, you’ll have a property to hold\
    \ the persistent reference of the keychain item.\n\n```\n@property (strong, nonatomic)\
    \ id type;\n@property (strong, nonatomic) id item;\n@property (strong, nonatomic)\
    \ NSDictionary *attributes;\n@property (strong, nonatomic) id persistentRef;\n\
    ```\n\nYou need an initializer that will take these two properties.\n\n```\n-\
    \ (id)initWithItem:(CFTypeRef)item;\n- (id)initWithData:(NSData *)data options:(NSDictionary\
    \ *)options;\n```\n\nYou’ll use `initWithItem:` for when you create a keychain\
    \ item via the Keychain API. `initWithData:options:` is intended for when you\
    \ are loading a keychain item from a file or URL; the options dictionary is for\
    \ when you need to pass additional information to load a keychain item.\n\nYou\
    \ want to be able to save keychain items (i.e. write them to your keychain), so\
    \ you’ll implement a `save` method. The `save` method will return a `BOOL` to\
    \ indicate success or failure. You’ll pass in a pointer to an `NSError` pointer\
    \ to allow you to send an error message on failure. You’ll also add a convenience\
    \ method, `valueForAttribute:`, to wrap the Keychain API call to retrieve value\
    \ for the keychain item.\n\n```\n- (BOOL)save:(NSError **)error;\n- (id)valueForAttribute:(CFTypeRef)attr;\n\
    ```\n\nLet’s implement these methods.\n\nOpen `KeychainItem.m` and add your initializer.\n\
    \n```\n- (id)initWithItem:(CFTypeRef)item\n{\n    self = [self init];\n    if\
    \ (self) {\n        self.item = CFBridgingRelease(item);\n    }\n    return self;\n\
    }\n```\n\nThis should be pretty standard fare by now. Note the use of the function\
    \ `CFBridgingRelease`. This is part of the toll-free bridge between CoreFoundation\
    \ and Objective-C. It converts a non-Objective-C pointer to an Objective-C object.\
    \ It also transfers the memory management to ARC. The inverse of `CFBridgingRelease`\
    \ is `CFBridgingRetain`, which you’ll use a little later on. Notice that you haven’t\
    \ set the `type` property in the initializer. That’s because you intend `KeychainItem`\
    \ to be an *abstract base class*. Hopefully, you won’t ever instantiate an instance\
    \ of `KeychainItem`, but rather a subclass. It’s in those subclasses where you’ll\
    \ set the `type` property.\n\nSince `KeychainItem` is abstract, `initWithData:options:`\
    \ should do nothing.\n\n```\n- (id)initWithData:(NSData *)data options:(NSDictionary\
    \ *)options\n{\n    return nil;\n}\n```\n\nThe `save:` method turns out to be\
    \ more complicated than you think.\n\n```\n- (BOOL)save:(NSError **)error\n{\n\
    \    NSDictionary *attributes = @{\n        (__bridge id)kSecValueRef : self.item,\n\
    \        (__bridge id)kSecReturnPersistentRef : (id)kCFBooleanTrue\n    };\n \
    \   CFTypeRef cfPersistentRef;\n    OSStatus status = SecItemAdd((__bridge CFDictionaryRef)attributes,\
    \ &cfPersistentRef);\n```"
