  \ `Hero.m`。在实现文件中你还有更多工作要做。在此之前，我们来谈谈你要做什么。\n\n### 设置默认值\n\n需要你子类化 `NSManagedObject`\
  \ 的最常见的 Core Data 任务之一，是为属性设置条件默认值，或者为无法在数据模型中设置默认值的属性类型（例如可转换属性的默认值）设置默认值。\n\n\
  `NSManagedObject` 的方法 `awakeFromInsert` 被设计为由子类重写，用于设置默认值。它是在新对象实例被插入到托管对象上下文之后、在任何代码有机会修改或使用该对象之前立即被调用。\n\
  \n在你的例子中，你有一个名为 `favoriteColor` 的可转换属性，你想将其默认值设为白色。为此，在 `Hero.m` 中的 `@end` 声明之前添加以下方法：\n\
  \n```\n- (void)awakeFromInsert\n{\n    self.favoriteColor = [UIColor colorWithRed:1.0\
  \ green:1.0 blue:1.0 alpha:1.0];\n    [super awakeFromInsert];\n}\n```\n\n注意在 `Hero.m`\
  \ 中使用了 `@dynamic` 关键字。这告诉编译器不要为后面的属性生成访问器和修改器。这里的想法是，这些访问器和修改器将在运行时由父类提供。不必太担心具体细节，只需要知道为了让\
  \ Core Data 正常工作，这种复杂性是必需的。\n\n**提示**  注意你没有使用 `[UIColor whiteColor]` 作为默认值。你使用\
  \ `colorWithRed:green:blue:alpha:` 工厂方法的原因是因为它总是创建一个 RGBA 颜色。`UIColor` 支持几种不同的颜色模型。稍后，为了将\
  \ `UIColor` 保存到持久存储中，你将把它分解成单独的组件（红、绿、蓝和 alpha 各一个）。你还将让用户通过操纵这些组件各自的滑块来选择新颜色。然而，`whiteColor`\
  \ 方法不使用 RGBA 颜色空间创建颜色。相反，它使用灰度颜色模型创建颜色，该模型只使用两个分量（灰度和 alpha）来表示颜色。\n\n非常简单。你只需创建一个新的\
  \ `UIColor` 实例并将其分配给 `favoriteColor`。`awakeFromInsert` 的另一个常见用法是将日期属性默认设置为当前日期。例如，你可以通过向\
  \ `awakeFromInsert` 添加以下代码行来将 `birthdate` 属性默认设置为当前日期：\n\n```\nself.birthdate =\
  \ [NSDate date];\n```\n\n### 验证\n\n\n\nCore Data 提供两种在代码中进行属性验证的机制：一种用于单属性验证，另一种用于当验证依赖于多个属性值时使用。单属性验证相对简单直接。你可能想要确保日期有效、字段不为\
  \ `nil`，或者数字属性不为负数。多字段验证则稍微复杂一些。假设你有一个 `Person` 实体，它有一个名为 `legalGuardian` 的字符串属性，用于记录对未成年人负有法律责任并能够为其做出决定的人。你可能希望确保该属性已填充，但只针对未成年人，而非成年人。多属性验证允许你在\
  \ `person` 的年龄属性小于 18 岁时将该属性设为必填，否则不必。\n\n#### 单属性验证\n\n`NSManagedObject` 提供了一个用于验证单个属性的方法，名为\
  \ `validateValue:forKey:error:`。该方法接收一个值、一个键和一个 `NSError` 句柄。你可以重写该方法，并根据值是否有效返回\
  \ `YES` 或 `NO` 来执行验证。如果验证未通过，你还可以创建一个 `NSError` 实例来保存关于无效内容和原因的特定信息。你可以这样做，但不要这样做。事实上，Apple\
  \ 明确说明你*不应该*这样做。你实际上永远不需要重写此方法，因为默认实现使用了一种非常巧妙的机制，可以将错误处理动态分派给类中未定义的特定验证方法。\n\n\
  例如，假设你有一个名为 `birthdate` 的字段。在验证期间，`NSManagedObject` 会自动在你的子类中查找一个名为 `validateBirthdate:error:`\
  \ 的方法。它会对每个属性都执行此操作，因此，如果你想验证单个属性，你所要做的就是声明一个遵循 `validateXXX:error:` 命名约定的方法（其中\
  \ `XXX` 是要验证的属性的名称），返回一个指示新值是否通过验证的 `BOOL`。\n\n让我们使用此机制来阻止用户输入未来的出生日期。在 `Hero.m`\
  \ 中的 `@end` 声明之上，添加以下方法：\n\n```\n- (BOOL)validateBirthdate:(id *)ioValue error:(NSError\
  \ **)outError\n{\n    NSDate *date = *ioValue;\n    if ([date compare:[NSDate date]]\
  \ == NSOrderedDescending) {\n        if (outError != NULL) {\n            NSString\
  \ *errorStr = NSLocalizedString(@\"Birthdate cannot be in the future\",\n      \
  \                                             @\"Birthdate cannot be in the future\"\
  );\n            NSDictionary *userInfoDict = [NSDictionary dictionaryWithObject:errorStr\n\
  \                                                                     forKey:NSLocalizedDescriptionKey];\n\
  \            NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
  \                                                        code:kHeroValidationBirthdateCode\n\
  \                                                    userInfo:userInfoDict];\n \
  \           *outError = error;\n        }\n        return NO;\n    }\n    return\
  \ YES;\n}\n```\n\n**提示** 你是否想知道为什么要传递指向 `NSError` 指针的指针，而不仅仅是指针？指针的指针允许通过引用传递指针。在\
  \ Objective-C 方法中，参数（包括对象指针）是按值传递的，这意味着被调用的方法会获得传入指针的自己的副本。因此，如果被调用的方法想要更改指针（而不是指针指向的数据），则需要另一层间接引用。因此，需要指针的指针。\n\
  \n从前面的方法可以看出，如果日期在未来，则返回 `NO`；如果日期在过去，则返回 `YES`。如果返回 `NO`，你还需要采取一些额外步骤。你创建一个字典，并在键\
  \ `NSLocalizedDescriptionKey` 下存储一个错误字符串，`NSLocalizedDescriptionKey` 是一个为此目的而存在的系统常量。然后，你创建一个新的\
  \ `NSError` 实例，并将新创建的字典作为 `NSError` 的 `userInfo` 字典传递。这是在验证方法以及几乎所有其他接受 `NSError`\
  \ 句柄作为参数的方法中返回信息的标准方式。\n\n请注意，在创建 `NSError` 实例时，你使用了之前定义的两个常量：`kHeroValidationDomain`\
  \ 和 `kHeroValidationBirthdateCode`：\n\n```\nNSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
  \                                            code:kHeroValidationBirthdateCode\n\
  \                                        userInfo:userInfoDict];\n```\n\n**提示**\
  \ 请注意，在单属性验证方法中，你没有调用 `super`。这并不是因为这些方法被定义为抽象方法，而是因为它们根本不存在。这些方法是在运行时动态创建的，因此不仅调用\
  \ `super` 没有意义，而且实际上 `super` 上也没有方法可以调用。\n\n每个 `NSError` 都需要一个错误域和一个错误代码。错误代码是唯一标识特定错误类型的整数。错误域定义了生成错误的应用程序或框架。例如，有一个名为\
  \ `NSCocoaErrorDomain` 的错误域，用于标识 Apple 的 Cocoa 框架中的代码所创建的错误。你为自己的应用程序定义了自己的错误域，使用了反向\
  \ DNS 样式的字符串，并将其分配给常量 `kHeroValidationDomain`。你将使用该域来处理因验证 `Hero` 对象而创建的任何错误。你也可以选择为整个\
  \ `SuperDB` 应用程序创建一个单一域，但通过更具体地定义域，你的应用程序将更易于调试。\n\n通过创建自己的错误域，你可以根据需要尽可能具体。同时，你也避免了在长长的系统定义常量列表中搜索，以寻找恰好覆盖特定错误的代码的问题。`kHeroValidationBirthdateCode`\
  \ 是你在此域中创建的第一个代码，其值 1000 是任意的；为这个错误代码选择 0、1、10000 或 34848 也完全有效。这是你的域，你可以做你想做的事。\n\
  \n#### `nil` 与 `NULL`\n\n在你的验证方法中，你可能已经注意到，你将 `outError` 与 `NULL` 进行比较，以确定是否提供了有效的指针，而不是像通常那样与\
  \ `nil` 进行比较。`nil` 和 `NULL` 都服务于相同的目的（表示空指针），并且事实上，它们被定义为相同的东西：数字零。就代码功能而言，`nil`\
  \ 和 `NULL` 是 100% 可互换的。\n\n尽管如此，你应该努力在正确的时间使用正确的那个。你使用的那个将为你未来的自己以及任何其他处理你代码的开发者提供线索，表明你在做什么。\n\
  \n当你检查一个 Objective-C 对象指针时，请与 `nil` 比较。对于任何其他 C 指针，请使用 `NULL`。在这种情况下，你处理的是一个指向指针的指针，因此你使用\
  \ `NULL`。如果一个指针不直接引用一个 Objective-C 对象，那么 `NULL` 是合适的比较值，即使该指针引用的指针指向一个对象。\n\n####\
  \ 多属性验证\n\n当你需要基于多个字段的值来验证一个托管对象时，方法略有不同。在所有单字段验证方法触发之后，会调用另一个方法来让你执行更复杂的验证。实际上有两个这样的方法：一个在对象首次插入上下文时调用，另一个在你保存对现有托管对象的更改时调用。\n\
  \n\n\n### Core Data 数据验证与虚拟存取器\n\n#### 多属性验证方法\n\n当向上下文中插入新的托管对象时，使用的多属性方法称为 `validateForInsert:`。而更新现有对象时，实现的验证方法则称为\
  \ `validateForUpdate:`。在这两种情况下，如果对象通过验证则返回 `YES`，如果存在问题则返回 `NO`。与单字段验证类似，若返回 `NO`，还需创建一个\
  \ `NSError` 实例，用于说明遇到的具体问题。\n\n在许多情况下，插入和更新时所需执行的验证逻辑是相同的。此时，请勿将一个方法的代码复制粘贴到另一个方法中。相反，应创建一个新的验证方法，并让\
  \ `validateForInsert:` 和 `validateForUpdate:` 都调用这个新方法。\n\n在你的应用中，（目前）还没有执行多属性验证的需求，但假设一下：我们不要求\
  \ `name` 和 `secretIdentity` 同时为必填项，而是只要求这两个属性中至少提供一个。要实现这一点，你可以在数据模型中将 `name` 和\
  \ `secretIdentity` 都设为可选，然后利用多属性验证方法来强制实现这一规则。为此，你需要在 `Hero` 类中添加以下三个方法：\n\n```\n\
  - (BOOL)validateNameOrSecretIdentity:(NSError **)outError\n{\n    if ((0 == [self.name\
  \ length]) && (0 == [self.secretIdentity length])) {\n        if (outError != NULL)\
  \ {\n            NSString *errorStr = NSLocalizedString(@\"Must provide name or\
  \ secret identity.\",\n                                                    @\"Must\
  \ provide name or secret identity.\");\n            NSDictionary *userInfoDict =\
  \                 [NSDictionary dictionaryWithObject:errorStr\n                \
  \                                    forKey:NSLocalizedDescriptionKey];\n      \
  \      NSError *error = [[NSError alloc] initWithDomain:kHeroValidationDomain\n\
  \                                                        code:kHeroValidationNameOrSecretIdentityCode\n\
  \                                                    userInfo:userInfoDict];\n \
  \           *outError = error;\n        }\n    }\n    return YES;\n}\n\n- (BOOL)validateForInsert:(NSError\
  \ **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n}\n\n\
  - (BOOL)validateForUpdate:(NSError **)outError\n{\n    return [self validateNameOrSecretIdentity:outError];\n\
  }\n```\n\n#### 虚拟存取器\n\n在本章开头，你在数据模型中添加了一个名为 `age` 的新属性。但实际上你并不需要存储英雄的年龄，因为可以根据英雄的出生日期来计算。像这样计算得出的属性通常被称为**虚拟存取器**。它们看上去就像普通的存取器，并且对于其他对象而言，它们可以被当作其他属性一样对待。你是在运行时计算该值，而非从持久化存储中检索，这只是一个实现细节。\n\
  \n按照目前 `Hero` 对象的配置，`age` 存取器将始终返回 `nil`，因为你已告知数据模型不要为其在持久化存储中分配存储空间，并将其设置为只读。为了使其正常工作，你必须在一个看起来像存取器的方法中实现计算年龄的逻辑（因此得名“虚拟存取器”）。为此，请在\
  \ `Hero.m` 文件的 `@end` 之前添加以下方法：\n\n```\n- (NSNumber *)age\n{\n    if (self.birthdate\
  \ == nil)\n        return nil;\n\nNSCalendar *gregorian = [[NSCalendar alloc] initWithCalendarIdentifier:NSGregorianCalendar];\n\
  \    NSDateComponents *components = [gregorian components:NSYearCalendarUnit\n \
  \                                               fromDate:self.birthdate\n      \
  \                                            toDate:[NSDate date]\n            \
  \                                     options:0];\n    NSInteger years = [components\
  \ year];\n    return [NSNumber numberWithInteger:years];\n}\n```\n\n注意方法开头添加的检查。如果你尚未设置英雄的出生日期，则无需计算年龄。\n\
  \n现在，任何使用 `age` 属性存取器的代码都将返回一个包含计算后超级英雄年龄的 `NSNumber` 实例。\n\n### 添加验证反馈\n\n在第 4\
  \ 章中，你创建了一个名为 `SuperDBEditCell` 的类，它封装了各种表格视图单元格的通用功能。`SuperDBEditCell` 类不包含用于保存托管对象的代码，它只关注显示本身。你确实存储了每个\
  \ `SuperDBEditCell` 实例所显示的属性。但现在，你希望在编辑的属性未通过验证时添加验证反馈，并且你不想在子类中重复实现这一功能。\n\n你希望实现的是，让每个\
  \ `SuperDBEditCell` 实例（或其子类）验证其正在处理的属性。你希望在表格视图单元格失去焦点（即，移动到另一个单元格）以及用户尝试保存时执行验证。如果编辑后的值未通过验证，则应弹出一个警告窗口，向用户显示验证错误，并呈现两个按钮：**取消**（恢复原值），或**修复**（让用户编辑该单元格）。为了处理这种情况，你需要让\
  \ `SuperDBEditCell` 响应 `UITextFieldDelegate` 和 `UIAlertViewDelegate` 协议。最后，如果用户点击导航栏上的**取消**按钮，你将撤销他们所做的所有更改。\n\
  \n首先，编辑 `SuperDBEditCell.h`，并将 `@interface` 声明修改为：\n\n```\n@interface SuperDBEditCell\
  \ : UITableViewCell <UITextFieldDelegate, UIAlertViewDelegate>\n```\n\n接下来，你需要向\
  \ `NSManagedObject` 添加一个属性：\n\n```\n@property (strong, nonatomic) NSManagedObject\
  \ *hero;\n```\n\n最后，你需要一个 `validate` 方法，以便在需要执行验证时调用：\n\n```\n- (IBAction)validate;\n\
  ```\n\n切换到 `SuperDBEditCell.m`，并添加刚才声明的 `validate` 方法：\n\n```\n#pragma mark - 实例方法\n\
  \n- (IBAction)validate\n{\n    id val = self.value;\n    NSError *error;\n    if\
  \ (![self.hero validateValue:&val forKey:self.key error:&error]) {\n        NSString\
  \ *message = nil;\n        if ([[error domain] isEqualToString:@\"NSCocoaErrorDomain\"\
  ]) {\n            NSDictionary *userInfo = [error userInfo];\n            message\
  \ =                 [NSString\nstringWithFormat:NSLocalizedString(@\"Validation\
  \ error on:\n                                                              %@\\\
  rFailure Reason: %@\",\n                                                     @\"\
  Validation error on: %@,\n                                                     \
  \ Failure Reason: %@)\"),\n                                   [userInfo valueForKey:@\"\
  NSValidationErrorKey\"],\n                                   [error localizedFailureReason]];\n\
  \        }\n        else\n            message = [error localizedDescription];\n\n\
  UIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Validation\
  \ Error\",\n                                                                   \
  \            @\"Validation Error\")\n                                          \
  \            message:message\n                                                 \
  \    delegate:self\n                                             cancelButtonTitle:NSLocalizedString(@\"\
  Cancel\", @\"Cancel\")\n                                             otherButtonTitles:NSLocalizedString(@\"\
  Fix\", @\"Fix\"), nil];\n        [alert show];\n    }\n}\n```\n\n为了确保警告视图正常工作，你需要实现其委托方法：\n\
  \n```\n#pragma mark 警告视图委托\n\n- (void)alertView:(UIAlertView *)alertView clickedButtonAtIndex:(NSInteger)buttonIndex\n\
  {\n    if (buttonIndex == [alertView cancelButtonIndex])\n        [self setValue:[self.hero\
  \ valueForKey:self.key]];\n    else\n        [self.textField becomeFirstResponder];\n\
  }\n```\n\n你需要文本字段委托方法 `textField:didEndEditing:` 来调用你的 `validate` 方法：\n\n```\n#pragma\
  \ mark UITextFieldDelegate 方法\n\n- (void)textFieldDidEndEditing:(UITextField *)textField\n\
  {\n    [self validate];\n}\n```\n\n\n\n最后，你需要让单元格的 `textField` 知道它的新委托。在 `SuperDB`\
  \ 的 `initWithStyle:reuseIdentifier:` 方法中，就在将 `textField` 添加到单元格的 `contentView` 之前，添加以下代码：\n\
  \n```\nself.textField.delegate = self;\n```\n\n这里你做了什么呢？首先，你确保在 `initWithStyle:reuseIdentifier:`\
  \ 中将 `NSTextField` 的委托设置为 `self`。然后，你添加了 `validate` 方法。基本上，你通过调用 `NSManagedObject`\
  \ 上的 `validateValue:forKey:error:` 进行验证。如果验证失败，你解析 `NSError` 对象并创建一个 `UIAlertView`。接下来，你定义了一个\
  \ `textFieldDidEndEditing:` 委托方法。当 `SuperDBEditCell` 类中的 `NSTextField` 退出编辑模式时，该方法会被调用。当你从一个单元格点击到另一个单元格，或者点击导航栏上的“保存”或“返回”按钮时，就会触发此方法。最后，你添加了\
  \ `alertView:clickedButtonAtIndex:` 方法。当用户在验证错误时显示的 `UIAlertView` 上点击某个按钮时，该委托方法会被调用。根据点击的是“取消”还是“修复”按钮，你要么恢复原始值，要么将焦点移动到表格视图单元格。\n\
  \n现在，你只需要将 `Hero` 对象从 `HeroDetailController` 传递到 `SuperDBEditCell`。编辑 `HeroDetailController.m`\
  \ 并找到 `tableView:cellForRowAtIndexPath:` 方法。在所有其他单元格配置之前，添加以下代码：\n\n```\ncell.hero\
  \ = self.hero;\n```\n\n#### 更新详情视图\n\n查看图 6-2，你会发现表格视图的“通用”部分还需要两个单元格。在继续之前，我们先更新详情视图。\n\
