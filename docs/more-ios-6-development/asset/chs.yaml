  \ 表示数字身份是可信的。最后一个 `kSecTrustResultUnspecified` 仅表示你尚未为基础证书设置显式的信任设置。\n\n最后一个结果代码\
  \ `kSecTrustResultRecoverableTrustFailure` 意味着从技术上讲你已经失败了，但存在一些方法可以恢复，使得数字身份变得可信。在这个特定的应用程序中，可恢复的信任失败是因为你使用了自签名证书颁发机构。为了从中恢复，你需要显式地告诉安全框架信任你的证书颁发机构。这就是\
