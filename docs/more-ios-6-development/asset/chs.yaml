  \ `PowerViewConfiguration.plist`。你需要一个包含两个分区的配置属性列表。每个分区没有标题标签，每行各有一个。最终，你的属性列表应该看起来像图\
  \ 7-18。\n\n![9781430238072_Fig07-18.jpg](img/9781430238072_Fig07-18.jpg)\n\n图 7-18.\
  \ 强大视图配置\n\n#### 导航到 `PowerViewController`\n\n你的 `PowerViewController` 已经定义并配置好了。你已经定义了从\
  \ `HeroDetailController` 跳转到 `PowerViewController` 的跳转。现在你需要当用户添加新的能力或在编辑模式下选择一项能力时执行\
  \ `PowerViewSegue`。打开 `HeroDetailController.m`，并添加以下表视图数据源方法：\n\n```\n#pragma mark\
  \ - 表视图数据源\n\n- (void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\n\
  \        [self removeRelationshipObjectInIndexPath:indexPath];\n    else if (editingStyle\
  \ == UITableViewCellEditingStyleInsert) {\n        NSManagedObject *newObject =\
  \ [self addRelationshipObjectForSection:[indexPath section]];\n        [self performSegueWithIdentifier:@\"\
  PowerViewSegue\" sender:newObject];\n    }\n\n[super tableView:tableView commitEditingStyle:editingStyle\
