  \ `Delete` 键，或通过 `Edit` ![image](img/arrow.jpg) `Delete` 删除）。现在第一个分区应有三个单元格，底部单元格高亮显示。同样删除该单元格。\n\
  \n![9781430238072_Fig04-06.jpg](img/9781430238072_Fig04-06.jpg)\n\n图 4-6. 表格视图\n\
