  \ status = SecTrustEvaluate(self.trust, &trustResult);\n        if (status == errSecSuccess)\
  \ {\n            switch (trustResult) {\n                case kSecTrustResultInvalid:\n\
                  case kSecTrustResultDeny:\n                case kSecTrustResultFatalTrustFailure:\n\
                  case kSecTrustResultOtherError:\n                    _trusted =\
