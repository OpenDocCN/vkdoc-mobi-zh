  \  \n\n`return result;`  \n\n从数字身份中检索私钥，并检查返回代码，以确保已成功获取。\n\n现在，在身份详情视图控制器中使用数字身份的加密/解密功能。首先，需要创建一个名为\
  \ `IdentityViewController` 的子类，继承 `KeychainItemViewController`。您要添加一个按钮，用于加密和解密文本视图中的内容。打开\
