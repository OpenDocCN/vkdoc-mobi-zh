  \n#### 重构详情视图控制器\n\n你有了一个需要显示和编辑的新托管对象。你可以创建一个新的表格视图控制器类，专门用于显示 `Power` 实体。这将是一个非常简单的类，你可以很快实现它。在开发过程中，有时你可能会这样做。这不一定是最优雅的解决方案，但可能是最快的方法。有时候你只需要让功能跑起来。\n\
