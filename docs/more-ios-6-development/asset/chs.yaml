  \n## 第 4 章：细节视图中的魔鬼\n\n在第 3 章中，你构建了应用程序的主视图控制器。你将其设置为按英雄的名字或秘密身份排序显示，并搭建了保存、删除和添加新英雄所需的基础设施。你没有做的是，为用户提供一种编辑特定英雄信息的方式，这意味着你只能创建和删除名为`Untitled\
  \ Hero`的超级英雄。我猜你现在还不能发布你的应用程序 ;-)。\n\n没关系。应用程序开发是一个迭代过程，任何应用程序的前几次迭代可能都不具备独立运行所需的所有功能。在本章中，你将创建一个可编辑的细节视图，让用户可以编辑特定超级英雄的数据。\n\
  \n你要编写的控制器将是`UITableViewController`的一个子类，并且你将使用一种在概念上有些复杂，但易于维护和扩展的方法。这很重要，因为你要向`Hero`托管对象添加新的属性，并以其他方式扩展它，所以你需要不断更改用户界面以适应这些变化。\n\
  \n编写完新的细节视图控制器后，你将添加功能，允许用户*就地*编辑每个属性。\n\n### 视图实现的选择\n\n在 David Mark、Jack Nutting\
  \ 和 Jeff LaMarche 所著的《Beginning iOS 6 Development》（Apress 出版）的第 3 章和第 4 章中，你学习了如何使用\
  \ Interface Builder 构建用户界面。在 Interface Builder 中构建可编辑的细节视图无疑是一种方法。但另一种常见方法是将细节视图实现为分组表格。看看你\
  \ iPhone 上的“通讯录”应用或“电话”应用的“通讯录”标签页（图 4-1）。Apple 导航应用中的细节编辑视图通常使用分组表格实现，而不是使用在 Interface\
  \ Builder 中设计的界面。\n\n![9781430238072_Fig04-01.jpg](img/9781430238072_Fig04-01.jpg)\n\
  \n图 4-1.  iPhone 应用的“通讯录”标签页使用了基于表格的细节编辑视图\n\n既然你选择为 SuperDB 应用程序使用故事板，你将使用故事板编辑器。无论从哪方面看，这与使用\
  \ Interface Builder 构建界面是一样的。\n\niOS 人机界面指南 ([`developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG`](http://developer.apple.com/library/ios/#documentation/UserExperience/Conceptual/MobileHIG))\
  \ 并没有给出关于何时应该使用基于表格的细节视图与在 Interface Builder 中设计的细节视图的实质性指导，因此这归结为哪种感觉更合适。我们的观点是：如果你正在构建一个导航型应用程序，并且数据可以合理且高效地在分组表格中呈现，那么很可能就应该这样做。由于你的超级英雄数据结构与“通讯录”应用显示的数据非常相似，因此基于表格的细节视图似乎是显而易见的选择。\n\
  \n图 4-2 中显示的表格视图展示了来自单个英雄的数据，这意味着该表格中的所有内容都来自单个托管对象。每一行对应托管对象的一个不同属性。例如，第一个部分的唯一一行显示了英雄的名字。在编辑模式下，点击特定行将显示适当的子视图来修改该属性。对于字符串，它会显示一个键盘；对于日期，则显示一个日期选择器。\n\
  \n![9781430238072_Fig04-02.jpg](img/9781430238072_Fig04-02.jpg)\n\n图 4-2.  你将在本应用程序中构建的细节视图，分别处于查看模式和编辑模式\n\
  \n表格视图按分区和行的组织方式并非由托管对象决定。相反，它们是作为开发者的你，通过尝试预测哪些安排对用户有意义而做出的设计决策的结果。例如，你可以按字母顺序排列属性，这将把出生日期放在第一位。但这并不是很直观，因为出生日期并不是英雄最重要或最具定义性的属性。在我们看来，英雄的名字和秘密身份是最重要的属性，因此应该是表格视图中首先出现的两个元素。\n\
  \n### 创建细节视图控制器\n\n找到你从第 3 章得到的 SuperDB 项目文件夹，并复制一份。这样，如果你在为本章节添加新代码时出了岔子，就不必从头开始了。在\
  \ Xcode 中打开这个新的项目副本。\n\n接下来，创建细节视图控制器本身。请记住，你正在创建一个基于表格的编辑视图，因此你需要继承`UITableViewController`。选择`SuperDB.storyboard`并打开故事板编辑器。如果“工具”面板未打开，请将其打开，并在“对象”库中找到表格视图控制器。将其拖到故事板编辑器上，放在`HeroListController`的右侧（图\
  \ 4-3）。\n\n![9781430238072_Fig04-03.jpg](img/9781430238072_Fig04-03.jpg)\n\n图 4-3.\
  \  你故事板的布局\n\n确保你的缩放级别能够看到表格视图标签上的三个图标。单击表格视图（视图的灰色区域），然后将“工具”面板切换到“属性检查器”（图 4-4）。\n\
  \n![9781430238072_Fig04-04.jpg](img/9781430238072_Fig04-04.jpg)\n\n图 4-4.  表格视图的属性\n\
  \n\n\n我们再来看一下图 4-2。你的详细视图有两个分区，因此我们按此配置表格视图。将 `Style` 字段从 `Plain` 改为 `Grouped`。完成后，`Separator`\
  \ 字段应自动变为 `Single Line Etched`。如果未自动更改，请手动修改。接下来，你已经知道每个区段的行数，分别为一行和三行。由于该数字是固定的，你可以将\
  \ `Content` 字段从 `Dynamic Prototypes` 改为 `Static Cells`。同样，`Content` 字段正下方的字段会自动从\
  \ `Prototype Cells` 变为 `Sections`。你知道分区数量为两个，因此在该字段中输入 `2`。最后，你希望在选中时不突出显示单元格，因此将\
  \ `Selection` 字段更改为 `No Selection`。表格视图的属性检查器应如图 4-5 所示。\n\n![9781430238072_Fig04-05.jpg](img/9781430238072_Fig04-05.jpg)\n\
