  \ 的实现，您需要更改 `SuperDBEditCell.m`。首先，更新 `initWithStyle:reuseIdentifier:`。\n\n```objc\n\
  - (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier\n\
  {\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n   \
  \ if (self) {\n        // 初始化代码\n        self.textField.delegate = self;\n    }\n\
  \    return self;\n}\n```\n\n接下来，删除 `value` 属性的访问器和修改器。同时，可以删除文件顶部的 `#define`，因为它已经被移到了\
  \ `SuperDBCell.m` 中。\n\n您的“重构”已经完成，但您仍然需要进行一些更改。\n\n### 可编辑属性\n\n当您尝试保存编辑过的 Hero\
  \ 时，`SuperDB` 应用会崩溃，因为它试图保存 Age 单元格中的值。您希望 `HeroDetailController` 的 save 方法在更新 Hero\
  \ 实例时跳过 Age 单元格。\n\n您可以施展一些 Core Data 的技巧，让 Hero 实例检查单元格的属性键是否是瞬态的。这似乎需要做很多工作，仅为了获取一个您能相当可靠地推断出来的信息。请记住，您创建\
  \ `SuperDBCell` 类是为了处理那些不可编辑（并且可能不需要更新）的字段。因此，您希望 `SuperDBCell` 对某个查询返回 `YES`，而\
  \ `SuperDBEditCell` 返回 `NO`（或反之亦然）。我们只需在 `SuperDBCell` 中定义一个 `isEditable` 方法，让它返回\
  \ `NO`。然后在 `SuperDBEditCell` 中重写该方法，使其返回 `YES`。\n\n将此添加到 `SuperDBCell.h`：\n\n```objc\n\
  - (BOOL)isEditable;\n```\n\n并将其实现添加到 `SuperDBCell.m`：\n\n```objc\n#pragma mark -\
  \ 实例方法\n\n- (BOOL)isEditable\n{\n    return NO;\n}\n```\n\n在 `SuperDBEditCell.m`\
  \ 中重写该方法。\n\n```objc\n#pragma mark - SuperDBCell 重写\n\n- (BOOL)isEditable\n{\n \
  \   return YES;\n}\n```\n\n现在，您需要在 `HeroDetailController.m` 中使用这个方法。更新 save 方法中的相应代码。\n\
  \n```objc\nfor (SuperDBEditCell *cell in [self.tableView visibleCells]) {\n    \
  \ if ([cell isEditable])\n         [self.hero setValue:[cell value] forKey:[cell\
  \ key]];\n}\n```\n\n最后，您需要更新 `HeroDetailConfiguration.plist`，让 Age 单元格使用 `SuperDBCell`。打开\
  \ `HeroDetailConfiguration.plist`，导航到 Root（根）![image](img/arrow.jpg) sections（部分）![image](img/arrow.jpg)\
