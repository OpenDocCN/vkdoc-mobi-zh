  \                         withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n}\n```\n\n每次你得到一个新的“能力”单元格时，它都会显示一些奇怪的字符串，比如 `Relationship 'powers'`……这是因为它在\
