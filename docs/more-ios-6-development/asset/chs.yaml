  \ *result in (__bridge NSArray *)results) {\n            id itemRef = [result valueForKey:(__bridge\
  \ id)kSecValueRef];\n            id persistentRef = [result valueForKey:(__bridge\
  \ id)kSecValuePersistentRef];\n            NSMutableDictionary *attrs = [NSMutableDictionary\
  \ dictionaryWithDictionary:result];\n            [attrs removeObjectForKey:(__bridge\
  \ id)kSecValueRef];\n            [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];\n\
  \            KeychainCertificate *cert =                 [[KeychainCertificate alloc]\
  \ initWithItem:(__bridge CFTypeRef)itemRef];\n            cert.persistentRef = persistentRef;\n\
  \            cert.attributes = attrs;\n            [certs addObject:cert];\n   \
  \     }\n    }\n    return certs;\n}\n```\n\n你查询钥匙串中所有证书，请求证书、其属性及持久化引用。返回的结果是字典数组。你需要解析字典以提取证书和持久化引用。剩余的字典则是属性。根据每个字典创建一个\
  \ `KeychainCertificate`，并返回一个 `KeychainCertificate` 数组。\n\n你需要对 `IdentitiesViewController`\
  \ 重复此过程。编辑 `IdentitiesViewController.m` 并导入 `KeychainIdentity.h` 头文件。\n\n\n\n```objc\n\
  #import \"KeychainIdentity.h\"\n```\n\n修改`viewDidLoad`以加载所有钥匙串身份标识。\n\n```objc\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view.\n    self.items = [KeychainIdentity allKeychainIdentities];\n\
  }\n```\n\n现在你需要在`KeychainIdentity`上定义并实现`allKeychainIdentities`类方法。打开`KeychainIdentity.h`添加定义。\n\
  \n```objc\n+ (NSArray *)allKeychainIdentities;\n```\n\n将实现添加到`KeychainIdentity.m`。\n\
  \n```objc\n+ (NSArray *)allKeychainIdentities\n{\n    NSMutableArray *idents = [NSMutableArray\
  \ array];\n    NSDictionary *query = @{\n        (__bridge id)kSecClass        \
  \       : (__bridge id)kSecClassIdentity,\n        (__bridge id)kSecReturnRef  \
  \         : (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnAttributes    :\
  \ (id)kCFBooleanTrue,\n        (__bridge id)kSecReturnPersistentRef : (id)kCFBooleanTrue,\n\
  \        (__bridge id)kSecMatchLimit          : (__bridge id)kSecMatchLimitAll\n\
  \    };\n    CFTypeRef results = NULL;\n    OSStatus status = SecItemCopyMatching((__bridge\
  \ CFDictionaryRef)query, &results);\n    if (status == errSecSuccess && results\
  \ != NULL) {\n        for (NSDictionary *result in (__bridge NSArray *)results)\
  \ {\n            id itemRef = [result valueForKey:(__bridge id)kSecValueRef];\n\
  \            id persistentRef = [result valueForKey:(__bridge id)kSecValuePersistentRef];\n\
  \            NSMutableDictionary *attrs = [NSMutableDictionary dictionaryWithDictionary:result];\n\
  \            [attrs removeObjectForKey:(__bridge id)kSecValueRef];\n           \
  \ [attrs removeObjectForKey:(__bridge id)kSecValuePersistentRef];\n\n          \
  \  KeychainIdentity *ident =                 \n                  [[KeychainIdentity\
  \ alloc] initWithItem:(__bridge CFTypeRef)itemRef];\n            ident.persistentRef\
  \ = persistentRef;\n            ident.attributes = attrs;\n            [idents addObject:ident];\n\
  \        }\n    }\n    return idents;\n}\n```\n\n这个实现本质上与`allKeychainCertificates`相同，区别仅在于你查询的是数字身份标识并创建`KeychainIdentity`实例而非`KeychainCertificate`。你或许可以将通用代码重构到`KeychainItem`的类方法中，但目前这样工作。\n\
  \n构建并运行应用仍不会显示任何身份标识或证书。请记住，在 iOS 中，钥匙串仅限应用作用域内使用。你的应用没有任何钥匙串条目。接下来你将加载之前创建的证书和身份标识。\n\
  \n首先，将你之前创建的两个证书添加到项目中。在项目导航窗格中选择`Supporting Files`组，并将`root.cer`和`cert.p12`文件添加到项目中。确保勾选“Copy\
  \ items to destination group’s folder (if needed)”复选框。\n\n你将在运行应用时加载这些条目，但你不希望在每次启动应用时都加载它们。打开`AppDelegate.m`，并导入`KeychainCertificate`和`KeychainIdentity`头文件。\n\
  \n```objc\n#import \"KeychainCertificate.h\"\n#import \"KeychainIdentity.h\"\n```\n\
  \n接下来，定义一个私有类别。\n\n```objc\n@interface AppDelegate ()\n- (BOOL)isAnchorCertLoaded;\n\
  - (void)addAnchorCertificate;\n- (void)addIdentity;\n@end\n```\n\n你定义了一个方法来检查锚点证书是否已加载，以及两个方法来添加锚点证书和数字身份标识。在实现这些方法之前，你需要修改`application:didFinishLoadingWithOptions:`。\n\
  \n```objc\n- (BOOL)application:(UIApplication *)application        didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    // Override point for customization after application\
  \ launch.\n    if ([self isAnchorCertLoaded]) {\n        [self addIdentity];\n \
  \       [self addAnchorCertificate];\n    }\n\n    return YES;\n}\n```\n\n检查锚点证书是否已加载。如果未加载，则加载数字身份标识和锚点证书。该加载只应发生一次，基本上是在应用的首次启动时。`isAnchorCertLoaded`的实现非常简单。\n\
  \n```objc\n- (BOOL)isAnchorCertLoaded\n{\n    return ([[NSUserDefaults standardUserDefaults]\
  \ valueForKey:@\"anchor_certificate\"] == nil);\n}\n```\n\n你只需检查应用的用户默认中是否存在键`anchor_certificate`。如果不存在，则假定证书和数字身份标识尚未加载。要加载证书，你只需加载文件，实例化`KeychainCertificate`，然后保存它。请记住你的`KeychainItem\
  \ save:`方法会将钥匙串条目写入钥匙串。\n\n```objc\n- (void)addAnchorCertificate\n{\n    NSString\
  \ *rootCertificatePath = [[NSBundle mainBundle] pathForResource:@\"root\" ofType:@\"\
  der\"];\n    NSData *data = [[NSData alloc] initWithContentsOfFile:rootCertificatePath];\n\
  \    KeychainCertificate *cert = [[KeychainCertificate alloc] initWithData:data\
  \ options:nil];\n    if (cert) {\n        NSError *error;\n        BOOL saved =\
  \ [cert save:&error];\n        if (!saved) {\n            NSLog(@\"Error Saving\
  \ Certificate: %@\", [error localizedDescription]);\n            abort();;\n   \
  \     }\n        NSUserDefaults *userDefaults = [NSUserDefaults standardUserDefaults];\n\
