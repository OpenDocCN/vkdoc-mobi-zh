  \ 中修改这个方法的时候吗？当时你只添加和移除了表格视图的单元格。我们当时说，你稍后需要处理向 `Hero` 实体添加和移除能力。现在，就是实现它的时候了。很简单，对吧？最后，记得调用父类方法（位于\
  \ `ManagedObjectController` 中）。\n\n还有最后一件事需要处理：当你想要查看现有能力时。在 `HeroDetailController\
  \ tableView:commitEditingStyle:forRowAtIndexPath:` 方法下方，添加这个表格视图委托方法：\n\n```\n#pragma\
