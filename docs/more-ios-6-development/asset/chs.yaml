- "# 第 16 章：道路漫漫，永无止境……\n\n遗憾的是，每段旅程都必有终点。我们将以诚挚的告别和一些希望你觉得有用的资源来结束本书。\n\n正如我们在《Beginning\
  \ iOS 6 Development》中所说，iOS 是一个令人难以置信的计算平台，是一个不断扩展的、带给你开发乐趣的前沿阵地。在这本书中，我们将带你沿着 iPhone\
  \ 开发的道路走得更远，更深入地挖掘 SDK，触及新的、在某些情况下更高级的主题。\n\n阅读本书，并务必亲手构建项目——不要只是从存档中复制它们然后运行一两次。通过动手实践你才能学到最多。在进入下一个项目之前，确保你理解了自己做了什么以及为什么这样做。不要害怕修改代码。去实验、调整代码、观察结果。反复练习。\n\
  \n已经安装好你的 iOS SDK 了吗？翻过这一页，放上一些 iTunes 音乐，我们开始吧。你持续不断的旅程正等着你呢。\n\n## 第 12 章：Core\
  \ Data：是什么，为什么及怎么用\n\nCore Data 是一个框架和一组工具，它允许你将应用程序的数据自动保存（或持久化）到 iOS 设备的文件系统中。Core\
  \ Data 是对象关系映射（ORM）的一种实现。这只是说，Core Data 允许你与你的 Objective-C 对象进行交互，而无需担心这些对象的数据如何从持久化数据存储（例如关系数据库如\
  \ SQLite 或平面文件）中存储和检索。\n\n当你刚开始使用 Core Data 时，它可能会看起来像魔法一样。大多数情况下，Core Data 对象的处理方式就像普通的老式对象一样，它们似乎知道如何自动神奇地检索和保存自己。你将永远不需要创建\
  \ SQL 字符串或进行文件管理调用。Core Data 使你免于处理一些复杂且困难的编程任务，这对你来说很棒。通过使用 Core Data，你可以比直接使用\
  \ SQLite、对象归档或平面文件快得多地开发具有复杂数据模型的应用程序。\n\n像 Core Data 这样隐藏复杂性的技术可能会助长“伏都编程”，这是一种最危险的编程实践，你会将未必理解的代码包含到你的应用程序中。有时，这些神秘的代码以项目模板的形式出现。或者，也许你下载了一个实用程序库，它可以为你完成一项你没有时间或专业知识自己完成的任务。那段伏都代码做了你需要它做的事情，而你没有时间或意愿去逐步理解它，所以它就待在那里，施展着它的魔法……直到它出问题。一般来说，如果你在自己的应用程序中发现了不完全理解的代码，这是一个信号，表明你应该去做一些研究，或者至少找一个更有经验的同伴来帮你掌握这些神秘代码。\n\
  \n关键在于，Core Data 是这样一种复杂技术，它很容易成为神秘代码的来源，并潜入你的许多项目中。虽然你不需要确切知道 Core Data 是如何完成它所做的一切的，但你应该投入一些时间和精力来理解\
  \ Core Data 的整体架构。\n\n本章从 Core Data 的简短历史开始，然后深入到一个 Core Data 应用程序。通过使用 Xcode 构建一个\
  \ Core Data 应用程序，你会发现理解后续章节中更复杂的 Core Data 项目要容易得多。\n\n#### Core Data 简史\n\n\n\n\
  Core Data 的历史相当悠久，但它是在 iPhone SDK 3.0 发布时才在 iOS 上可用的。Core Data 最初随 Mac OS X 10.4\
  \ (Tiger) 一同推出，但其部分底层机制实际上可以追溯到大约 15 年前的 NeXT 框架，即企业对象框架 (EOF)，该框架是 NeXT 的 WebObjects\
  \ Web 应用服务器附带的工具集的一部分。\n\nEOF 专为与远程数据源配合使用而设计，在它刚推出时是一个相当革命性的工具。尽管现在几乎所有语言都有许多优秀的\
  \ ORM（对象关系映射）工具，但在 WebObjects 诞生初期，大多数 Web 应用仍使用手工编写的 SQL 或文件系统调用来持久化数据。当时，编写 Web\
  \ 应用极其耗时费力。WebObjects 部分归功于 EOF，将创建复杂 Web 应用所需的开发时间缩短了一个数量级。\n\n除了作为 WebObjects\
  \ 的一部分外，EOF 还被 NeXTSTEP 使用，NeXTSTEP 是 Cocoa 的前身。当苹果收购 NeXT 时，苹果的开发人员借鉴了 EOF 中的许多概念来开发\
  \ Core Data。Core Data 为桌面应用程序实现了 EOF 曾经为 Web 应用程序所做的事：通过消除编写文件系统代码或与嵌入式数据库交互的需要，极大地提高了开发人员的生产力。\n\
  \n让我们开始构建你的 Core Data 应用程序吧。\n\n### 创建 Core Data 应用程序\n\n启动 Xcode 并创建一个新的 Xcode\
  \ 项目。有多种方法可以做到这一点。当你启动 Xcode 时，可能会看到 Xcode 启动窗口（图 2-1）。你可以直接点击“Create a New Xcode\
  \ Project”区域。或者选择 **File ![image](img/arrow.jpg) New ![image](img/arrow.jpg) Project**。或者使用键盘快捷键\
  \ ![image](img/flower.jpg)N。选择你最喜欢的方式。在后续内容中，我们会在 Xcode 窗口或菜单选项中提及可用选项，但不会使用键盘快捷键。如果你熟悉并喜欢使用键盘快捷键，可以随意使用。让我们回到构建应用程序的正题。\n\
