  #### 多一点抽象\n\n在处理 `ManagedObjectController` 的同时，借此机会添加一些离散的功能。具体来说，当添加或移除能力时，你将相关代码放在了\
  \ `tableView:commitEditingStyle:forRowAtIndexPath:` 方法中。让我们将这些代码拆分为专门用于添加和删除关系对象的方法。将以下方法声明添加到\
  \ `ManagedObjectController.h` 中：\n\n```\n- (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section;\n\
  - (void)removeRelationshipObjectInIndexPath:(NSIndexPath *)indexPath;\n```\n\n在实现这些方法之前，先添加一个新的私有方法。在\
  \ `ManagedObjectController.m` 中找到私有类别，并添加这一行：\n\n```\n- (void)saveManagedObjectContext;\n\
  ```\n\n然后，添加实现：\n\n```\n- (void)saveManagedObjectContext\n{\n    NSError *error;\n\
      if (![self.managedObject.managedObjectContext save:&error]) {\n        // need\
  \ to make HeroDetailController a UIAlertViewDelegate\n        UIAlertView *alert\
  \ =             [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Error saving\
  \ entity\",                                                                  @\"\
  Error saving entity\")\n                       message:[NSString stringWithFormat:NSLocalizedString(@\"\
  Error was: %@, quitting.\",                                                                          @\"\
  Error was: %@, quitting.\"),                                                              \
  \ [error localizedDescription]]\n                       delegate:self\n            \
  \ cancelButtonTitle:NSLocalizedString(@\"Aw, Nuts\", @\"Aw, Nuts\")\n            \
  \ otherButtonTitles:nil];\n        [alert show];\n    }\n}\n```\n\n这看起来熟悉吗？应该熟悉；它本质上就是\
  \ `save` 方法中的代码。因此，将 `save` 方法中的以下几行代码：\n\n```\n    NSError *error;\n    if (![self.managedObject.managedObjectContext\
  \ save:&error])\n        NSLog(@\"Error saving: %@\", [error localizedDescription]);\n\
  ```\n\n更新为：\n\n```\n    [self saveManagedObjectContext];\n```\n\n现在你可以添加新的方法实现（我们将它们添加到了\
  \ `ManagedObjectController.m` 中 `@end` 之前）。\n\n```\n#pragma mark - Instance Methods\n\
  \n- (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section\n{\n    NSString\
  \ *key = [self.config dynamicAttributeKeyForSection:section];\n    NSMutableSet\
  \ *relationshipSet = [self.managedObject mutableSetValueForKey:key];\n\nNSEntityDescription\
  \ *entity = [self.managedObject entity];\n    NSDictionary *relationships = [entity\
  \ relationshipsByName];\n    NSRelationshipDescription *destRelationship = [relationships\
  \ objectForKey:key];\n    NSEntityDescription *destEntity = [destRelationship destinationEntity];\n\
  ```\n\n\n\n`NSManagedObject *relationshipObject = [NSEntityDescription insertNewObjectForEntityForName:[destEntity\
  \ name] inManagedObjectContext:self.managedObject.managedObjectContext];`  \n`[relationshipSet\
  \ addObject:relationshipObject];`  \n`[self saveManagedObjectContext];`  \n`return\
  \ relationshipObject;`  \n\n- (void)removeRelationshipObjectInIndexPath:(NSIndexPath\
  \ *)indexPath  \n{  \n    `NSString *key = [self.config dynamicAttributeKeyForSection:[indexPath\
  \ section]];`  \n    `NSMutableSet *relationshipSet = [self.managedObject mutableSetValueForKey:key];`\
  \  \n    `NSManagedObject *relationshipObject = [[relationshipSet allObjects] objectAtIndex:[indexPath\
  \ row]];`  \n    `[relationshipSet removeObject:relationshipObject];`  \n    `[self\
  \ saveManagedObjectContext];`  \n}\n\n最后，修改 `tableView:commitEditingStyle:forRowAtIndexPath:`。\n\
  \n```\n- (void)tableView:(UITableView *)tableView commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\
  \ forRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    if (editingStyle == UITableViewCellEditingStyleDelete)\
  \ {\n        // 从数据源中删除行\n        [tableView deleteRowsAtIndexPaths:@[indexPath]\
  \ withRowAnimation:UITableViewRowAnimationFade];\n    }\n    else if (editingStyle\
  \ == UITableViewCellEditingStyleInsert) {\n        // 创建相应类的新实例，将其插入数组，\n      \
  \  // 并在表视图中添加新行\n        [tableView insertRowsAtIndexPaths:@[indexPath] withRowAnimation:UITableViewRowAnimationAutomatic];\n\
  \    }\n}\n```\n\n你不再添加或删除 `Relationship` 对象了。你只是在添加或删除表视图单元格。很快你就会明白原因。\n\n####\
  \ 新的 `HeroDetailController`\n\n现在你要创建一个新的 `HeroDetailController` 来替换重命名为 `ManagedObjectController`\
  \ 的那个类。创建一个新的 Objective-C 类，命名为 `HeroDetailController`，并将其设置为 `ManagedObjectController`\
  \ 的子类。在修改 `HeroDetailController` 之前，你需要对 `ManagedObjectController` 做一些更改。你需要将保存配置信息的属性从私有类别移到\
  \ `@interface` 声明中。编辑 `ManagedObjectController.h`，并声明配置属性（还需要声明 `ManagedObjectConfiguration`）。\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class ManagedObjectConfiguration;\n\n@interface\
  \ ManagedObjectController : UITableViewController\n\n@property (strong, nonatomic)\
  \ ManagedObjectConfiguration *config;\n@property (strong, nonatomic) NSManagedObject\
  \ *managedObject;\n\n- (NSManagedObject *)addRelationshipObjectForSection:(NSInteger)section;\n\
  - (void)removeRelationshipObjectInIndexPath:(NSIndexPath *)indexPath;\n\n@end\n\
  ```\n\n由于你移动了配置，需要删除 `ManagedObjectController.m` 中的私有声明。\n\n```\n@interface ManagedObjectController\
  \ ()\n@property (strong, nonatomic) ManagedObjectConfiguration *config;\n@property\
  \ (nonatomic, strong) UIBarButtonItem *saveButton;\n```\n\n你还需要删除 `viewDidLoad`\
  \ 中的赋值语句。\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n        ...\n\
  \    self.config = [[ManagedObjectConfiguration alloc] initWithResource:@\"HeroDetailConfiguration\"\
  ];\n}\n```\n\n现在你可以更新 `HeroDetailController` 了。你只需要加载配置属性列表即可。你的 `HeroDetailController.m`\
  \ 应该如下所示：\n\n```\n#import \"HeroDetailController.h\"\n#import \"ManagedObjectConfiguration.h\"\
  \n\n@implementation HeroDetailController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    // 加载视图后的其他初始设置\n    self.config = [[ManagedObjectConfiguration alloc] initWithResource:@\"\
  HeroDetailConfiguration\"];\n}\n\n@end\n```\n\n现在你需要告诉故事板使用这个 `HeroDetailController`。打开\
  \ `SuperDB.storyboard`，选择 `ManagedObjectController` 场景。调整缩放级别，使你可以看到场景标签中的视图控制器图标。选择视图控制器图标并打开身份检查器。将类从\
  \ `ManagedObjectController` 改为 `HeroDetailController`。\n\n**注意** 这个更改是如何发生的？这是在你使用重命名重构时发生的。当\
  \ Xcode 显示 `SuperDB.storyboard` 中的更改时，这就是它正在进行的修改。\n\n这样就完成了。你现在可以开始创建强大的视图了。\n\n\
  #### 强大的视图控制器\n\n你将从在 `SuperDB.storyboard` 中创建新的强大视图控制器开始。打开 `SuperDB.storyboard`，在英雄详情控制器的右侧添加一个新的表视图控制器。如果你在故事板编辑器中缩小视图，故事板应该看起来像图\
  \ 7-17。\n\n![9781430238072_Fig07-17.jpg](img/9781430238072_Fig07-17.jpg)\n\n图 7-17.\
  \ 在 `SuperDB.storyboard` 中添加一个表视图控制器\n\n放大以使图标在表视图控制器标签中可见。选择表视图控制器，在身份检查器中，将类改为\
  \ `PowerViewController`。接下来选择场景中的表视图，在属性检查器中，将样式从 Plain 改为 Grouped。\n\n最后要做的事情是定义从\
  \ `HeroDetailController` 到你的新 `PowerViewController` 之间的跳转。按住 Control 键从 `HeroDetailController`\
  \ 图标（在标签栏中）拖动到 `PowerViewController` 场景。当 Manual Segue 弹出窗口出现时，选择 Push。选择这个跳转，在属性检查器中为其命名为\
  \ `PowerViewSegue`。\n\n现在你需要创建 `PowerViewController` 类和配置。创建一个新的 Objective-C 类，命名为\
  \ `PowerViewController`，作为 `ManagedObjectController` 的子类。编辑 `PowerViewController.m`。\n\
  \n```\n#import \"PowerViewController.h\"\n#import \"ManagedObjectConfiguration.h\"\
  \n\n@implementation PowerViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
