  \ 的新操作。从音量滑块添加一个新操作，命名为 `volumeChanged`，对应 `valueChanged` 事件。为每个工具栏按钮添加一个操作：完成按钮（`donePressed`）、播放按钮（`playPressed`）和速率按钮（`ratePressed`）。\n\
  \n返回标准编辑器，选择 `PlayerViewController.h`。你需要导入以下头文件：\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
  #import \"AVPlayerView.h\"\n#import \"AssetItem.h\"\n```\n\n和之前一样，你需要将 `play` 属性\
  \ outlet 从 weak 重新定义为 strong。同时声明 `pause`（按钮）属性。\n\n```\n@property (strong, nonatomic)\
  \ IBOutlet UIBarButtonItem *play;\n@property (strong, nonatomic)          UIBarButtonItem\
  \ *pause;\n```\n\n你需要为 `AssetItem`、`AVPlayerItem` 和 `AVPlayer` 声明属性。\n\n```\n@property\
  \ (strong, nonatomic) AssetItem *assetItem;\n@property (strong, nonatomic) AVPlayerItem\
  \ *playerItem;\n@property (strong, nonatomic) AVPlayer *player;\n```\n\n你将为播放和暂停按钮分别设置各自的操作，因此声明暂停按钮的操作。\n\
  \n```\n- (IBAction)pausePressed:(id)sender;\n```\n\n在开始实现 `PlayerViewController`\
  \ 之前，你需要在 `AssetItem` 中添加一个方法，以便准备用于播放的 `AVAsset`。打开 `AssetItem.h` 并添加以下方法声明：\n\n\
  ```\n- (void)loadAssetForPlayingWithCompletionHandler:(void (^)(AssetItem *assetItem,\
  \ NSArray *keys))completion;\n```\n\n在 `AssetItem.m` 中，实现代码非常简单。\n\n```\n- (void)loadAssetForPlayingWithCompletionHandler:(void\
  \ (^)(AssetItem *assetItem, NSArray *keys))completion;\n{\n    dispatch_async(self.dispatchQueue,\
  \ ^(void){\n        NSArray *keys = @[ @\"tracks\", @\"playable\" ];\n        AVAsset\
  \ *a = [self localAsset];\n        [a loadValuesAsynchronouslyForKeys:keys completionHandler:^{\n\
  \            /* IMPORTANT: Must dispatch to main queue in order to operate on the\
  \ AVPlayer and AVPlayerItem. */\n            dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n                if (completion)\n                    completion(self, keys);\n\
  \            });\n        }];\n    });\n}\n```\n\n你调度了 `AVAsset` 轨道的异步加载。由于你加载了两个键，因此将对每个键的检查推迟到完成处理程序中进行。所以你只需在主线程上调用完成处理程序即可。\n\
  \n你需要实现方法 `assetHasVideo:`。首先，在 `AssetItem.m` 顶部的私有类别中声明它。\n\n```\n- (BOOL)assetHasVideo:(AVAsset\
  \ *)a;\n```\n\n实现代码可以添加到 `AssetItem` 实现的底部，位于其他私有类别方法之后。\n\n```\n- (BOOL)assetHasVideo:(AVAsset\
  \ *)a\n{\n    NSArray *videoTracks = [a tracksWithMediaType:AVMediaTypeVideo];\n\
  \    return ([videoTracks count] > 0);\n}\n```\n\n你只需查询资源（asset）的视频轨道即可。\n\n现在你可以开始实现\
  \ `PlayerViewController`。首先，需要创建暂停按钮。在 `viewDidLoad` 方法中添加以下几行代码：\n\n```\n    self.pause\
  \ = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
  \                                                                              \
  \                  target:self                                                 \
  \                                               action:@selector(pausePressed:)];\n\
  \    [self.pause setStyle:UIBarButtonItemStyleBordered];\n```\n\n接下来，你需要加载并准备用于播放的资源。这将在\
  \ `viewDidAppear:` 方法中完成。\n\n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    if\
  \ (self.assetItem) {\n        [self.assetItem loadAssetForPlayingWithCompletionHandler:^(AssetItem\
  \ *assetItem, NSArray *keys){\n```\n\n如果你有 `assetItem`，则调用 `loadAssetForPlayingWithCompletionHandler:`\
  \ 让其准备播放。完成处理程序的第一步是检查每个键的加载状态。\n\n```\n            NSError *error = nil;\n    \
  \        AVAsset *asset = assetItem.asset;\n            for (NSString *key in keys)\
  \ {\n                AVKeyValueStatus status = [asset statusOfValueForKey:key error:&error];\n\
  \                if (status == AVKeyValueStatusFailed) {\n                    NSLog(@\"\
  Asset Load Failed: %@ | %@\", [error localizedDescription], [error localizedFailureReason]);\n\
  \                    return;\n                }\n                // handle AVKeyValueStatusCancelled\n\
  \            }\n```\n\n作为合理性检查，我们查看底层的 `AVAsset` 是否可播放。\n\n```\n            if (!asset.playable)\
  \ {\n                NSLog(@\"Asset Can’t be Played\");\n                return;\n\
  \            }\n```\n\n如果你已经分配了 `playerItem` 属性，则需要移除一个观察者。\n\n```\n           \
  \ if (self.playerItem) {\n                [self.playerItem removeObserver:self forKeyPath:@\"\
  status\"];\n                [[NSNotificationCenter defaultCenter]              \
  \       \n                removeObserver:self                               \n \
  \               name:AVPlayerItemDidPlayToEndTimeNotification                  \
  \           \n                object:self.playerItem];\n            }\n```\n\n你将一个新的\
  \ `AVPlayerItem` 分配给 `playerItem` 属性。由于你使用 ARC，之前的任何实例都将被自动释放。这就是为什么在之前的步骤中移除了观察者。\n\
  \n```\n            self.playerItem = [AVPlayerItem playerItemWithAsset:asset];\n\
  ```\n\n你为 `playerItem` 的 `status` 键路径添加一个观察者。\n\n```\n            [self.playerItem\
  \ addObserver:self                               \n            forKeyPath:@\"status\"\
  \                                  \n            options:NSKeyValueObservingOptionInitial\
  \ | NSKeyValueObservingOptionNew                                  \n           \
  \ context:PlayerViewControllerStatusObservationContext];\n```\n\n注意使用了 `PlayerViewControllerStatusObservationContext`。这是一个稍后你会声明的特殊常量。使用这个常量可以简化\
  \ `AVPlayerItem` 通知的注册和识别。\n\n你添加了另一个观察者，这次是针对默认通知中心。你将为 `AVPlayerItemDidPlayToEndTimeNotification`\
  \ 调用方法 `playerItemDidReachEnd:`。\n\n```\n            [[NSNotificationCenter defaultCenter]\
  \ addObserver:self                                                    \n       \
  \     selector:@selector(playerItemDidReachEnd:)                               \
  \                         \n            name:AVPlayerItemDidPlayToEndTimeNotification\
  \                                                       \n            object:self.playerItem];\n\
  ```\n\n如果 `player` 属性未被赋值，则使用 `playerItem` 属性创建一个。然后你为 `player` 的 `currentItem`\
  \ 和 `rate` 键路径添加两个观察者。再次注意，你使用了两个特殊常量：`PlayerViewControllerCurrentItemObservationContext`\
  \ 和 `AVPlayerViewControllerRateObservationContext`。\n\n```\n            if (self.player\
  \ == nil) {\n                self.player = [AVPlayer playerWithPlayerItem:self.playerItem];\n\
  \                [self.player addObserver:self                               \n\
  \                forKeyPath:@\"currentItem\"                                  \n\
  \                options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
  \                                  \n                context:PlayerViewControllerCurrentItemObservationContext];\n\
  \                [self.player addObserver:self                               \n\
  \                forKeyPath:@\"rate\"                                    \n    \
  \            options:NSKeyValueObservingOptionInitial | NSKeyValueObservingOptionNew\
  \                                  \n                context:AVPlayerViewControllerRateObservationContext];\n\
  \            }\n```\n\n\n\n接下来，确保播放器的 `playerItem` 是正确的。\n\n```\nif (self.player.currentItem\
  \ != self.playerItem)\n    [[self player] replaceCurrentItemWithPlayerItem:self.playerItem];\n\
  ```\n\n最后，您需要初始化一些 UI 组件。如果资产是视频，则隐藏图像视图，因为不需要它。\n\n```\nself.artist.text = self.assetItem.artist;\n\
  self.song.text = self.assetItem.title;\nself.imageView.image = self.assetItem.image;\n\
  self.imageView.hidden = self.assetItem.isVideo;\nself.scrubber.value = 0.0f;\n```\n\
  \n现在声明您所使用的三个观察上下文常量。在 `PlayerViewController.m` 文件的顶部，紧跟导入声明之后，添加以下内容：\n\n```\n\
  static void *PlayerViewControllerStatusObservationContext =\n    &PlayerViewControllerStatusObservationContext;\n\
  static void *PlayerViewControllerCurrentItemObservationContext =\n    &PlayerViewControllerCurrentItemObservationContext;\n\
  static void *AVPlayerViewControllerRateObservationContext =\n    &AVPlayerViewControllerRateObservationContext;\n\
  ```\n\n这只是定义一些常量上下文值的一种巧妙方式。如果您愿意，也可以使用字符串值，但这种方法更简洁一些。\n\n因此，您已将 `PlayerViewController`\
  \ 添加为 `AVPlayer` 和 `AVPlayerItem` 的观察者。与默认的通知中心观察者不同，您没有指定要调用的方法。相反，`AVPlayer` 和\
  \ `AVPlayerItem` 的观察者将依赖于键值观察。您需要做的就是实现方法 `observeValueForKeyPath:ofObject:change:context:`。该方法需要检查上下文值来决定做什么。\n\
  \n```\n- (void)observeValueForKeyPath:(NSString *)path\n                      ofObject:(id)object\n\
  \                        change:(NSDictionary *)change\n                       context:(void\
  \ *)context\n{\n    /* AVPlayer \"playerItem\" 属性值观察者 */\n    if (context == PlayerViewControllerStatusObservationContext)\
  \ {\n    }\n    /* AVPlayer \"rate\" 属性值观察者 */\n    else if (context == AVPlayerViewControllerRateObservationContext)\
  \ {\n    }\n    /* AVPlayer \"currentItem\" 属性值观察者 */\n    else if (context == PlayerViewControllerCurrentItemObservationContext)\
  \ {\n    }\n    else {\n        NSLog(@\"其他上下文\");\n        [super observeValueForKeyPath:path\
  \ ofObject:object change:change context:context];\n    }\n}\n```\n\n您为在 `PlayerViewController`\
  \ 中定义的每个上下文常量添加了钩子。如果上下文未知，则通过调用 `super` 将其传递到视图控制器层次结构中。我们保持每个上下文部分为空，因为处理每个上下文本身就是一个话题，我们想逐一详细讲解。\n\
  \n接下来，我们要让您做一些当前可能还不清楚的工作，但一旦实现上下文处理程序和操作方法，就会变得清晰。首先，您需要将 `CoreMedia` 框架添加到项目中。在导航窗格中选择项目，然后通过“构建阶段”窗格将\
  \ `CoreMedia` 框架添加到 `AVMediaPlayer` 目标中。返回编辑 `PlayerViewController.m` 并导入 `CoreMedia`\
  \ 头文件。\n\n```\n#import <CoreMedia/CoreMedia.h>\n```\n\n您将声明并实现一些私有分类属性方法，这些方法将在上下文处理程序和操作方法中使用。\n\
  \n```\n@interface PlayerViewController ()\n@property (assign, nonatomic) float prescrubRate;\n\
  @property (strong, nonatomic) id playerTimerObserver;\n\n- (void)showPlay;\n- (void)showPause;\n\
  - (void)updatePlayPause;\n- (void)updateRate;\n\n- (void)addPlayerTimerObserver;\n\
  - (void)removePlayerTimerObserver;\n- (void)updateScrubber:(CMTime)currentTime;\n\
  \n- (void)playerItemDidReachEnd:(NSNotification *)notification;\n\n- (void)handleStatusContext:(NSDictionary\
  \ *)change;\n- (void)handleRateContext:(NSDictionary *)change;\n- (void)handleCurrentItemContext:(NSDictionary\
  \ *)change;\n@end\n```\n\n在实现这些方法时，我们将逐一讨论。\n\n`showPlay` 和 `showPause` 方法只是用于切换工具栏上“播放”和“暂停”按钮的便捷方法。\n\
  \n```\n- (void)showPlay\n{\n    NSMutableArray *toolbarItems = [NSMutableArray arrayWithArray:self.toolbar.items];\n\
  \    [toolbarItems replaceObjectAtIndex:2 withObject:self.play];\n    self.toolbar.items\
  \ = toolbarItems;\n}\n\n- (void)showPause\n{\n    NSMutableArray *toolbarItems =\
  \ [NSMutableArray arrayWithArray:self.toolbar.items];\n    [toolbarItems replaceObjectAtIndex:2\
  \ withObject:self.pause];\n    self.toolbar.items = toolbarItems;\n}\n```\n\n您需要一个方法来检查是显示“播放”还是“暂停”按钮。您可以通过播放器的\
  \ `rate` 属性来判断媒体是否正在播放。`0.0f` 的速率表示媒体未在播放。\n\n```\n- (void)updatePlayPause\n{\n\
  \    if (self.player.rate == 0.0f)\n        [self showPlay];\n    else\n       \
  \ [self showPause];\n}\n```\n\n`updateRate` 方法仅用于设置“速率”按钮的文本。您添加了一个钩子，使得当播放器实际速率为\
  \ `0.0f` 时，按钮显示 `\"1.0x\"`。\n\n```\n- (void)updateRate\n{\n    float rate = self.player.rate;\n\
  \    if (rate == 0.0f)\n        rate = 1.0f;\n    self.rate.title = [NSString stringWithFormat:@\"\
  %.1fx\", rate];\n}\n```\n\n当播放器正在播放时，您需要添加一个周期性观察者来更新进度条和时间标签。还需要一个方法来移除这个周期性观察者。\n\
  \n```\n- (void)addPlayerTimerObserver\n{\n    __block id blockSelf = self;\n   \
  \ self.playerTimerObserver =\n        [self.player addPeriodicTimeObserverForInterval:CMTimeMakeWithSeconds(0.1f,\
  \ NSEC_PER_SEC)\n                                                 queue:nil\n  \
  \                                          usingBlock:^(CMTime time){ [blockSelf\
  \ updateScrubber:time]; }];\n}\n\n- (void)removePlayerTimerObserver\n{\n    if (self.playerTimerObserver)\
  \ {\n        [self.player removeTimeObserver:self.playerTimerObserver];\n      \
  \  self.playerTimerObserver = nil;\n    }\n}\n```\n\n请注意，`AVPlayer` 的周期性观察者使用了 `CMTime`\
  \ 结构。`CMTime` 定义在 `CoreMedia` 框架中，这就是为什么您需要将其包含在此项目中。您将周期性观察者设置为每 `0.1s` 触发一次，并调用\
  \ `updateScrubber:` 方法。\n\n```\n- (void)updateScrubber:(CMTime)currentTime\n{\n\
  \    if (CMTIME_IS_INVALID(self.playerItem.duration)) {\n        self.scrubber.minimumValue\
  \ = 0.0;\n        return;\n    }\n\n    double duration = CMTimeGetSeconds(self.playerItem.duration);\n\
  \    if (isfinite(duration))\n    {\n        float minValue = [self.scrubber minimumValue];\n\
  \        float maxValue = [self.scrubber maximumValue];\n        double time = CMTimeGetSeconds([self.player\
  \ currentTime]);\n        [self.scrubber setValue:(maxValue - minValue) * time /\
  \ duration + minValue];\n\n        Float64 elapsedSeconds = CMTimeGetSeconds(currentTime);\n\
  \        Float64 remainingSeconds = CMTimeGetSeconds(self.playerItem.duration) -\
  \ elapsedSeconds;\n        self.elapsedTime.text = [NSString stringWithFormat:@\"\
  %d:%02d\",\n                                 (int)elapsedSeconds / 60,\n       \
  \                          (int)elapsedSeconds % 60];\n        self.remainingTime.text\
  \ = [NSString stringWithFormat:@\"%d:%02d\",\n                                 \
  \  (int)remainingSeconds / 60,\n                                   (int)remainingSeconds\
  \ % 60];\n    }\n}\n```\n\n\n\n`updateScrubber`：首先检查`CMTime`值。如果时间无效，则将滑块设为`0.0`并返回。如果时间有效，则查询`playerItem`的时长。若时长为有限值，则利用它来确定滑块值的位置。当前时间和时长同时用于更新`elapsedTime`和`remainingTime`标签。\n\
  \n通知处理方法`playerItemDidReachEnd:`的效果与点击“完成”按钮相同，因此你直接调用`donePressed:`方法。\n\n在处理上下文处理器之前，让我们先实现动作方法。\n\
  \n当你开始拖动滑块时，需要移除播放器的周期性观察者，以免在滑块调整期间进行更新。你缓存当前播放速率，并停止播放器。\n\n```\n- (IBAction)beginScrubbing:(id)sender\n\
  {\n    self.prescrubRate = self.player.rate;\n    self.player.rate = 0.0f;\n   \
  \ [self removePlayerTimerObserver];\n}\n```\n\n`scrub:`动作将播放器更新至可通过滑块值和`playerItem`时长计算出的播放点。然后利用这些值更新`elapsedTime`和`remainingTime`标签，以反映新的滑块值。\n\
  \n```\n- (IBAction)scrub:(id)sender\n{\n        if ([sender isKindOfClass:[UISlider\
  \ class]]) {\n                UISlider* slider = sender;\n                if (CMTIME_IS_INVALID(self.playerItem.duration))\
  \ {\n                        return;\n                }\n\ndouble duration = CMTimeGetSeconds(self.playerItem.duration);\n\
  \                if (isfinite(duration)) {\n                    float minValue =\
  \ [slider minimumValue];\n                    float maxValue = [slider maximumValue];\n\
  \                    float value = [slider value];\n                    double time\
  \ = duration * (value - minValue) / (maxValue - minValue);\n                   \
  \ [self.player seekToTime:CMTimeMakeWithSeconds(time, NSEC_PER_SEC)];\n\nFloat64\
  \ remainingSeconds = duration - time;\n                    self.elapsedTime.text\
  \ = [NSString stringWithFormat:@\"%d:%02d\",                                   \
  \                    (int)time / 60, (int)time % 60];\n                    self.remainingTime.text\
  \ = [NSString stringWithFormat:@\"%d:%02d\",                                   \
  \                       (int)remainingSeconds / 60,                            \
  \                              (int)remainingSeconds % 60];\n                }\n\
  \        }\n}\n```\n\n完成滑块拖动后，你恢复播放器的播放速率和周期性观察者。\n\n```\n- (IBAction)endScrubbing:(id)sender\n\
  {\n        if (self.playerTimerObserver == nil) {\n            [self addPlayerTimerObserver];\n\
  \    }\n\nif (self.prescrubRate != 0.0f) {\n            self.player.rate = self.prescrubRate;\n\
  \            self.prescrubRate = 0.0f;\n        }\n}\n```\n\n使用`AVPlayer`更改音量是一个复杂得多的过程。你的媒体资源可能包含多条轨道，这不仅仅是因为视频；立体声音频资源可能也有两条轨道。因此，你需要找到资源中的所有音频轨道，并将音频混合调整为新的音量。\n\
  \n```\n- (IBAction)volumeChanged:(id)sender\n{\n    float volume = [self.volume\
  \ value];\n    NSArray *audioTracks = [self.assetItem.asset tracksWithMediaType:AVMediaTypeAudio];\n\
  \nNSMutableArray *allAudioParams = [NSMutableArray array];\n    for (AVAssetTrack\
  \ *track in audioTracks) {\n        AVMutableAudioMixInputParameters *audioInputParams\
  \ =             \n  [AVMutableAudioMixInputParameters audioMixInputParameters];\n\
  \        [audioInputParams setVolume:volume atTime:kCMTimeZero];\n        [audioInputParams\
  \ setTrackID:[track trackID]];\n        [allAudioParams addObject:audioInputParams];\n\
  \    }\n\nAVMutableAudioMix *audioMix = [AVMutableAudioMix audioMix];\n    [audioMix\
  \ setInputParameters:allAudioParams];\n\n[self.playerItem setAudioMix:audioMix];\n\
  }\n```\n\n`donePressed:`将停止播放器，并将你返回到`MediaViewController`。\n\n\n\n`- (IBAction)donePressed:(id)sender`\n\
  {\n    [self.player pause];\n    [self dismissViewControllerAnimated:YES completion:nil];\n\
  }\n\n`playPressed:` 和 `pausePressed:` 会根据情况更新播放器和工具栏。\n\n`- (IBAction)playPressed:(id)sender`\n\
  {\n    [self.player play];\n    [self updatePlayPause];\n}\n\n`- (void)pausePressed:(id)sender`\n\
  {\n    [self.player pause];\n    [self updatePlayPause];\n}\n\n`ratePressed:` 操作会在三个播放速率之间切换：0.5、1.0\
  \ 和 2.0。\n\n`- (IBAction)ratePressed:(id)sender`\n{\n    float rate = self.player.rate;\n\
  \    rate *= 2.0f;\n    if (rate > 2.0f)\n        rate = 0.5;\n    self.player.rate\
  \ = rate;\n}\n\n现在你可以实现上下文处理器了。针对 `playerItem` 状态的变化，你需要处理三种可能的状态：未知、准备就绪和播放失败。\n\
  \n`- (void)handleStatusContext:(NSDictionary *)change`\n{\n    [self updatePlayPause];\n\
  \nAVPlayerStatus status = [[change objectForKey:NSKeyValueChangeNewKey] integerValue];\n\
  \    switch (status) {\n        case AVPlayerStatusUnknown:\n            [self removePlayerTimerObserver];\n\
  \            [self updateScrubber:CMTimeMake(0, NSEC_PER_SEC)];\n            break;\n\
  \ncase AVPlayerStatusReadyToPlay:\n            [self addPlayerTimerObserver];\n\
  \            break;\n\ncase AVPlayerStatusFailed:\n            NSLog(@\"播放器状态失败\"\
  );\n            break;\n    }\n}\n\n当播放器速率发生变化时，你只需执行一次完整性检查，以确保在速率按钮上显示正确的标签。\n\
  \n`- (void)handleRateContext:(NSDictionary *)change`\n{\n    [self updatePlayPause];\n\
  \    [self updateRate];\n}\n\n最后，只有在创建了新的 `AVPlayer` 或 `AVPlayerItem` 实例时，你才需要关注播放器的\
  \ `currentItem`。如果你有了新的 `playerItem`，就需要确保相应更新 `playerView` 播放器。\n\n`- (void)handleCurrentItemContext:(NSDictionary\
  \ *)change`\n{\n    // 我们已添加/替换了 AVPlayer 的 AVPlayerItem\n    AVPlayerItem *newPlayerItem\
  \ = [change objectForKey:NSKeyValueChangeNewKey];\n    if (newPlayerItem != (id)[NSNull\
  \ null]) {\n        // 我们确实有了新的 AVPlayerItem\n        self.playerView.player = self.player;\n\
  \        [self.playerView setVideoFillMode:AVLayerVideoGravityResizeAspect];\n \
  \   }\n    else {\n        // 没有 AVPlayerItem\n        NSLog(@\"没有 AVPlayerItem\"\
  );\n    }\n}\n\n你的 `PlayerViewController` 已经完成。现在，你只需要确保在从 `AudioViewController`\
  \ 或 `VideoViewController` 进行选择时，正确设置了媒体 `AssetItem`。打开 `MediaViewController.m`。为\
  \ `PlayerViewController.h` 添加导入指令。\n\n`#import \"PlayerViewController.h\"`\n\n然后添加\
  \ `prepareForSegue:sender:` 的实现。\n\n`- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender`\n{\n    PlayerViewController *pvc = segue.destinationViewController;\n\
  \    UITableViewCell *cell = sender;\n    pvc.assetItem = [self.assets objectAtIndex:cell.tag];\n\
  }\n\n你不需要检查正在调用哪个 segue，因为应该只有一个。\n\n构建并运行 `AVMediaPlayer`。选择一首歌曲或视频进行播放。拖动滑块（scrubber）以更改播放点。切换速率，看看如何改变播放速度。相当不错，对吧？\n\
  \n#### 当心！前方有险滩！\n\n在本章中，你进行了一次漫长但愉快的旅程，穿越了使用 iPod 音乐库的丘陵和山谷。你了解了如何使用媒体查询找到媒体项目，以及如何让用户使用媒体选择器控制器选择歌曲。你学会了如何使用和操作媒体项目集合。我们向你展示了如何使用音乐播放器控制器播放媒体项目，以及如何通过搜寻或跳过来操纵当前正在播放的项目。你还学会了如何找出当前正在播放的曲目，无论它是由你的代码播放的，还是用户通过\
  \ iPod 或“音乐”应用选择的。\n\n但是，伙计，岸上的假期结束了。是时候扬帆驶入 iOS 安全的开阔水域了。紧闭舱门，加固船只！\n\n"
- "# 第 13 章：锁定安全：iOS 安全\n\n应用程序安全是开发的一个重要方面。保护用户的信息是你需要在开发过程中考虑的一项基本功能。请务必记住，安全不是一个产品，也不是你可以在开发结束时考虑的一个勾选框。安全是一个过程，在整个开发阶段——从设计到实现，再到测试和发布——都必须加以考虑。\n\
  \n我们将介绍一些你应该牢记的基本安全问题，以及如何在 iOS 中处理这些问题。然后我们将介绍安全 SDK，它提供了三项服务：证书、密钥和信任服务，用于管理证书、密钥和信任策略；钥匙串服务，用于管理钥匙串项目；以及随机化服务，用于创建密码学上安全的随机数。\n\
  \n**注意：** 一个重要的安全问题是，如何安全地通过网络发送和接收数据。我们不会在本章中介绍这一点。请查看苹果的“网络”文档。从“网络概述”（`https://developer.apple.com/library/ios/#documentation/NetworkingInternetWeb/Conceptual/NetworkingOverview/`）开始，然后阅读“安全传输参考”（`https://developer.apple.com/library/ios/#documentation/Security/Reference/secureTransportRef/`）。你可能还需要阅读“CFNetwork\
  \ 编程指南”（`https://developer.apple.com/library/ios/#documentation/Networking/Conceptual/CFNetwork/`）。\n\
  \n你将创建一个能列出钥匙串项目的应用程序。默认情况下，你的应用程序不会有任何钥匙串项目，因此你需要将两个证书（你的自签名根证书和用户证书）嵌入到应用程序中，并将它们添加到钥匙串中。你的钥匙串项目详情视图将允许你对一些文本进行加密和解密，作为功能演示。\n\
  \n### 安全考量\n\n当你要求用户提供一些个人数据时，你实际上是在要求用户信任你——应用程序开发者——会保证这些信息的安全。这也意味着你只请求你需要的信息，并且不会更多。如果你通过互联网发送这些数据，你必须确保数据以安全的方式传输。当你的应用程序收到签名数据时，验证这些签名并确保它们可信是你的职责。\n\
  \n在向用户索取信息时，你需要考虑如果这些数据被泄露可能会发生什么。如果你的应用程序只是一个存储用户最高分的游戏，那么即使数据库在你的应用程序外部被访问，你可能也不需要太担心。但是，如果你要求用户提供密码或其他敏感信息，那么尽最大努力保护用户的信息就至关重要。一种可能的解决方案是对数据进行加密，使其更难被读取。\n\
  \n许多移动应用会例行地将信息传输到基于云的服务，以便集中存储和更新数据。如果你在 iOS 应用和云服务器之间传输敏感的用户信息，你需要确保数据在客户端和服务端都是安全的，并且必须确保数据被安全地传输。此外，你需要确保通信不会被试图访问用户信息或发回恶意数据以帮助在设备上访问用户数据的恶意第三方截获。\n\
  \n### 安全技术\n\n以下部分将介绍一些常见的安全技术。\n\n#### 加密\n\n\n### 加密与安全\n\n我们相信各位都了解加密数据的概念和意义，但此处仍简要说明。简单来说，加密是一种通过将数据转换为不可读形式来保护数据的方法。要读取数据，需要先进行解密。解密需要掌握密码（即用于加密数据的技术）。密码通过向数据应用密钥（一项额外信息）来实现加密。在传输数据前对其进行加密，可防止数据被拦截和读取。在本地存储数据前也需加密，以防设备丢失或被盗后数据被读取。\n\
  \n主要存在两种加密技术：\n\n- **对称加密：** 通信双方共享单一密钥来加密和解密数据。由于密钥是共享的，一旦泄露，数据可能遭受破解。\n- **非对称加密：**\
  \ 使用两个数学相关的密钥转换数据。用一个密钥加密的数据只能用另一个密钥解密。通常，一个密钥在双方间共享，另一个密钥保持私有。非对称加密的另一种称谓是公钥密码学。\n\
  \n非对称加密的计算成本较高。常见做法是使用非对称加密来加密共享密钥，随后利用对称加密传输实际数据。\n\n### 哈希\n\n在密码学中，*哈希*是从较大数据集中派生出的较小数据片段。这个较小的数据可用作较大数据集的代理。你可以将哈希视为单向加密：将数据加密为唯一值，但无法解密还原。使用字典时就会涉及哈希。字典键被哈希化，以确保其始终指向相同的值。\n\
  \n哈希通常用于校验和计算。使用已知算法对大数据集进行哈希处理。下载数据后，你应对数据集进行哈希，并将哈希值与预期值比对。若值不同，可假定数据在某种程度上已被篡改。\n\
  \n### 证书与签名\n\n通过结合加密和哈希技术，可生成将公钥绑定到特定可信来源的证书。给定一组数据（如电子邮件或网页），发送方会计算数据的哈希值并用私钥加密。该加密后的哈希值与数据及发送方证书一同发送。接收方使用证书的公钥解密发送方的哈希值，并将其与本地计算的哈希值比对。若哈希匹配，则说明数据未被篡改且确由证书所有者发送。这种使用证书进行哈希和加密的过程称为*数字签名*。用户通过签名数据来证明其来源。\n\
  \n如何信任用于签名数据的证书？证书本身由另一来源签名。该来源可能同时被发送方和接收方信任，或该来源的证书仍需由其他方签名。此证书签名链可能持续，直到出现接收方信任的证书。这种证书签名序列称为*信任链*。链中的最后一个证书称为*锚证书*或*根证书*。\n\
  \n签名和证书依赖于被各方在某种程度上信任的证书颁发机构。信任链的强度完全取决于证书颁发机构的安全性。\n\n### 身份标识\n\n将证书与私钥结合可创建数字身份。身份通常使用受密码保护的格式\
  \ PKCS#12 进行传输，该格式文件扩展名通常为 `.p12`。\n\n### iOS 中的安全性\n\n从 iOS 4 开始，开发者可选择利用 iOS 设备内置的加密硬件进一步保护应用数据。此功能依赖于\
  \ iOS 的密码锁定设置。设备锁定时，即使应用本身也无法访问数据。应用需在设备解锁后才能访问数据。请注意，你可在应用中为此功能编写代码，但除非设备用户启用了密码锁定设置，否则该功能不会生效。通常建议添加此功能。若用户随后启用了密码锁定，他们将获得额外保护层。\n\
  \n为保护应用文件数据，需为所需保护级别指定正确的扩展属性。你可以使用 `NSData` 或 `NSFileManager` 类设置此属性。对于现有文件，使用\
  \ `NSFileManager` 的 `setAttributes:ofItemAtPath:error:` 方法。属性参数是一个 `NSDictionary`，其键为\
  \ `NSFileProtectionKey`。对于新文件，使用 `NSData` 的 `writeToFile:options:error:` 方法，并通过正确的选项位掩码指定保护级别。可能的保护级别如表\
  \ 13-1 所示。\n\n**表 13-1.** 保护级别\n\n![image](img/Table13-01.jpg)\n\n**注意：** `NSData`\
  \ 还有其他三个写入选项：`NSDataWritingAtomic`、`NSDataWritingWithoutOverwriting`、`NSDataWritingFileProtectionMask`。前两个与\
  \ `NSData` 实例写入文件的方式有关，最后一个设置文件自身的权限。这些选项均不涉及密码锁定相关的文件保护设置。\n\n若设置了保护级别，则需为文件可能无法访问做好准备。为此，你的应用需要检查文件可访问性。有以下几种实现方式：\n\
  \n- 在 `AppDelegate` 中实现 `applicationProtectedDataWillBecomeUnavailable:` 和 `applicationProtectedDataDidBecomeAvailable:`\
  \ 方法。\n- 注册 `UIApplicationProtectedDataWillBecomeUnavailable` 和 `UIApplicationProtectedDataDidBecomeAvailable`\
  \ 通知。\n- 检查 `UIApplication` 的 `protectedDataAvailable` 属性。\n\n### 随机化与钥匙串\n\n钥匙串是一个加密容器，用于保存密码、证书或其他信息。钥匙串通过\
  \ iOS 密码锁定机制进行加密和锁定。iOS 设备锁定时，任何人都无法访问其内容。输入密码后，iOS 解锁并解密钥匙串以供访问。从用户视角看，钥匙串提供了透明的身份验证。假设你的应用与互联网服务通信，每个服务都需要用户提供登录信息。你无需要求用户每次访问这些互联网服务时都输入信息，而可将这些信息存储在钥匙串中。由于钥匙串是安全的，你可以信赖这些信息的安全性。\n\
  \n在 iOS 中，每个应用都有自己的钥匙串。每个钥匙串包含一组称为钥匙串项（或简称项）的信息。钥匙串项由数据和一组属性组成。从编程角度看，钥匙串项是一个字典（具体为\
  \ `CFDictionary`）。其中数据可能加密也可能未加密，这由存储的数据类型（如密码或证书）决定。\n\n在定义钥匙串项字典时，必须使用键常量 `kSecClass`\
  \ 指定项类别。`kSecClass` 的可能值为一组预定义常量（表 13-2）。\n\n**表 13-2.** `kSecClass` 的可能值\n\n\n\n\
  | `kSecClassGenericPassword` | 通用密码条目 |\n| --- | --- |\n| `kSecClassInternetPassword`\
  \ | 互联网密码条目 |\n| `kSecClassCertificate` | 证书条目 |\n| `kSecClassKey` | 加密密钥条目 |\n\
  | `kSecClassIdentity` | 标识（证书和私钥）条目 |\n\n根据钥匙串条目类别的值，可以设置一组允许的属性键（请参阅表 13-3）。\n\n\
  表 13-3. 钥匙串条目属性键\n\n![image](img/Table13-3a.jpg)\n![image](img/Table13-3b.jpg)\n\
  ![image](img/Table13-3c.jpg)\n![image](img/Table13-3d.jpg)\n\n钥匙串 SDK 是一个 Core Foundation\
  \ 的 C API，而非 Objective-C。因此所有内容都是 Core Foundation 数据类型。该 API 是一组简单的函数：\n\n*   `SecItemAdd`：向钥匙串添加条目\n\
  *   `SecItemDelete`：从钥匙串移除条目\n*   `SecItemUpdate`：更新钥匙串中的条目\n*   `SecItemCopyMatching`：返回符合搜索条件的条目。\n\
  \n仅此而已。\n\n### 证书、密钥和信任服务\n\n为了让证书管理和使用更加便捷，Apple 在 iOS 中新增了许多函数，用于简化证书管理、密钥生成以及信任链评估。具体来说，你可以使用证书、密钥和信任\
  \ SDK，通过将证书与私钥匹配来确定身份；创建和请求证书；将证书、密钥和标识导入钥匙串；创建公钥-私钥对；以及管理信任策略。\n\n这些服务利用钥匙串来存储证书和密钥。与钥匙串\
  \ SDK 类似，证书、密钥和信任 SDK 是一个 C API，而非 Objective-C。其核心定义了一组安全对象：\n\n*   `SecCertificate`（`SecCertificateRef`）：证书对象\n\
  *   `SecIdentity`（`SecIdentityRef`）：标识（证书和私钥）对象\n*   `SecKey`（`SecKeyRef`）：（非对称）密钥对象，包括公钥和私钥\n\
  *   `SecPolicy`（`SecPolicyRef`）：策略对象\n*   `SecTrust`（`SecTrustRef`）：信任管理对象\n\n相应地，Security\
  \ 框架提供了一系列函数来管理证书；管理标识；生成和使用密钥；以及管理策略和信任。我们不会逐一详述每个函数，但将在本章的应用中涵盖其中部分内容。如需了解更多信息，请阅读\
  \ Apple 的《证书、密钥和信任服务编程指南》（[`developer.apple.com/library/ios/#documentation/Security/Conceptual/CertKeyTrustProgGuide/01introduction/`](https://developer.apple.com/library/ios/#documentation/Security/Conceptual/CertKeyTrustProgGuide/01introduction/)）及其参考手册（[`developer.apple.com/library/ios/#documentation/Security/Reference/certifkeytrustservices/`](https://developer.apple.com/library/ios/#documentation/Security/Reference/certifkeytrustservices/)）。\n\
  \n### 钥匙串查看器应用程序\n\n你将创建一个简单的应用程序，演示如何使用应用程序的钥匙串条目。初始状态下，钥匙串应为空。你将添加导入自签名根证书以及由该根证书生成的数字标识的功能。你将显示每个证书的详细信息。最后，你将使用数字标识的公钥-私钥对添加一个简单的加密/解密示例。\n\
  \n在开始构建应用程序之前，你需要创建根证书和数字标识。我们将在 Mac 上的“钥匙串访问”应用程序中使用“证书助理”。\n\n**注意** 如果你不想学习如何创建证书和数字标识，可以跳过本节。我们在本章的书籍下载存档中提供了两个文件：`root.der`\
  \ 和 `cert.p12`。欢迎直接使用它们。\n\n#### 创建证书颁发机构\n\n打开“钥匙串访问.app”。你可以在 `/应用程序/实用工具` 中找到它。依次前往“钥匙串访问”![image](img/arrow.jpg)\
  \ “证书助理”![image](img/arrow.jpg) “创建证书颁发机构”（图 13-1）。证书助理将打开一个表单，用于创建新的证书颁发机构（CA）（图\
  \ 13-2）。为 CA 指定一个唯一名称，并填写电子邮件地址。取消勾选“将此 CA 设为默认”复选框。其余默认设置即可。点击“创建”。如果证书助理创建成功，你应该会看到类似图\
  \ 13-3 的窗口。如果点击“显示证书颁发机构”按钮，将打开一个访达窗口，定位到 `~/资源库/Application Support/Certificate\
  \ Authority/<CA 名称>` 目录。证书助理已将相关 CA 文件放置在此处，其中包括你的根证书。\n\n![9781430238072_Fig13-01.jpg](img/9781430238072_Fig13-01.jpg)\n\
  \n图 13-1. 创建证书颁发机构\n\n![9781430238072_Fig13-02.jpg](img/9781430238072_Fig13-02.jpg)\n\
  \n图 13-2. 证书助理\n\n![9781430238072_Fig13-03.jpg](img/9781430238072_Fig13-03.jpg)\n\
  \n图 13-3. 成功创建证书颁发机构\n\n现在，你需要使用你的 CA 来创建一个新的用户证书。返回“钥匙串访问.app”，依次选择“钥匙串访问”![image](img/arrow.jpg)\
  \ “证书助理”![image](img/arrow.jpg) “从证书颁发机构请求证书”。证书助理将显示一个新表单（图 13-4）。输入用户的电子邮件地址和通用名称（不必是个人姓名）。对于\
  \ CA 电子邮件地址，输入你在创建 CA 时使用的电子邮件地址（图 13-2）。由于 CA 是自签名的，请选择“存储到磁盘”选项。点击“继续”。系统将显示一个保存对话框。选择一个位置保存文件（默认名称即可），然后点击“保存”。当证书助理完成证书签名请求的创建后，你可以点击“完成”关闭助理。\n\
  \n![9781430238072_Fig13-04.jpg](img/9781430238072_Fig13-04.jpg)\n\n图 13-4. 创建证书签名请求\n\
  \n你将使用此证书签名请求来创建新证书。在“钥匙串访问.app”中，依次选择“钥匙串访问”![image](img/arrow.jpg) “证书助理”![image](img/arrow.jpg)\
  \ “以证书颁发机构身份为他人创建证书”。将你刚创建的证书签名请求拖入证书助理的指定区域（图 13-5）。证书助理将切换界面，要求你指定签发 CA。选择你之前创建的\
  \ CA 名称。保持两个复选框为未选中状态，点击“继续”。证书助理会再次询问相同信息（老实说，我们也不确定原因）。再次选择你之前创建的 CA 名称，保持复选框未选中状态，点击“继续”（图\
  \ 13-5）。证书助理完成后，将打开“邮件.app”并创建一封包含证书附件的草稿邮件。你不需要这封邮件，因此可以丢弃该邮件并关闭“邮件.app”。你应该会看到证书助理中显示证书信息（图\
  \ 13-7）。点击“完成”关闭助理。\n\n![9781430238072_Fig13-05.jpg](img/9781430238072_Fig13-05.jpg)\n\
  \n图 13-5. 从 CSR 创建证书\n\n\n\n现在需要从用户证书中提取数字身份。在 `Keychain Access.app` 中，选中左侧的 `login`\
  \ 钥匙串，然后选择下方的 `Certificates` 类别。找到刚刚创建的证书，它应该包含创建证书签名请求时输入的通用名称（图 13-6）。点击名称旁的展开三角形，私钥应显示在证书下方，且与证书名称相同。选中私钥，然后依次点击\
  \ `File` ![image](img/arrow.jpg) `Export Items`。在保存对话框中将文件命名为 `cert`，确保文件格式为 `Personal\
  \ Information Exchange (.p12)`。点击 `Save`。系统会要求为 `.p12` 文件设置密码。建议选择密码对话框认为安全的密码。本例中我们使用了\
  \ `“@Super2048Cat”`。点击 `OK` 后，可能会要求输入钥匙串密码，即你的登录密码。输入后点击 `Allow`。创建证书成功后，证书助理将显示证书的详细信息（图\
  \ 13-7）。请注意，由于是自签名证书，系统会标记为由不受信任的颁发机构签名。\n\n![9781430238072_Fig13-06.jpg](img/9781430238072_Fig13-06.jpg)\n\
  \n图 13-6. 选择证书的颁发证书颁发机构\n\n![9781430238072_Fig13-07.jpg](img/9781430238072_Fig13-07.jpg)\n\
  \n图 13-7. 证书创建成功\n\n最后一步。`Security` 框架期望的是 DER 格式的根证书，而非 `Certificate Assistant`\
  \ 创建的 PEM 格式。打开 `Terminal.app`，切换目录到 `~/Library/Application Support/Certificate\
  \ Authority/<CA Name>`。你会看到一个名为 `<CA Name> certificates.pem` 的文件。输入以下命令：\n\n```\n\
  > openssl x509 -in <PEM file> −inform PEM -out root.der -outform DER\n```\n\n将 `<PEM\
  \ file>` 替换为实际文件名。\n\n至此，你就可以开始构建应用程序了。\n\n### 创建钥匙串应用\n\n你将使用 `Tabbed Application`\
  \ 模板作为应用的起点。打开 Xcode 并创建一个新项目，选择 `Tabbed Application` 模板。将项目命名为 `KeychainViewer`，并确保项目使用\
  \ storyboard 和自动引用计数。\n\n项目创建完成后，需要添加 `Security` 框架。在项目导航器中选中项目，在项目编辑器中选择 `Keychain\
  \ Viewer` 目标，然后导航到 `Build Phases` 选项卡。展开 `Link Binary with Libraries (3 Items)`\
  \ 部分，添加 `Security.framework`。通过将 `Security.framework` 移动到 `Frameworks` 分组中来整理 `Project\
  \ Navigator`。\n\n你将用不同的实现替换 `FirstViewController` 和 `SecondViewController`。因此，选中文件\
  \ `FirstViewController.h`、`FirstViewController.m`、`SecondViewController.h` 和 `SecondViewController.m`\
  \ 并删除。无需保留这些文件，因此在 Xcode 询问时选择 `Move to Trash`。\n\n稍后你会删除主 storyboard 中的 `First\
  \ View Controller` 和 `Second View Controller` 场景。首先，定义一些钥匙串项目类。钥匙串 API 是 C 语言 API\
  \ 而非 Objective-C，因此你需要将其封装到 Objective-C 类中以简化访问。在 `Keychain Viewer` 分组中创建一个新的 Objective-C\
  \ 类，命名为 `KeychainItem`，使其成为 `NSObject` 的子类。\n\n选中 `KeychainItem.h`，为 `Security`\
  \ 框架头文件添加导入指令。\n\n```\n#import <Security/Security.h>\n```\n\n对于每个 `KeychainItem`\
  \ 对象，你需要知道其可能的类型（例如 `kSecClassGenericPassword`）以及实际的钥匙串项目。这两者都可以通过 `CFTypeRef` CoreFoundation\
  \ 类型捕获。`CFTypeRef` 映射到通用的 Objective-C 对象 `id`。因此，你将为 `KeychainItem` 类添加两个 `id` 类型的属性。你还将定义一个\
  \ `NSDictionary` 属性，用于保存每个钥匙串项目返回的属性字典。最后，你将有一个属性来保存钥匙串项目的持久引用。\n\n```\n@property\
  \ (strong, nonatomic) id type;\n@property (strong, nonatomic) id item;\n@property\
  \ (strong, nonatomic) NSDictionary *attributes;\n@property (strong, nonatomic) id\
  \ persistentRef;\n```\n\n你需要一个初始化方法来处理这两个属性。\n\n```\n- (id)initWithItem:(CFTypeRef)item;\n\
  - (id)initWithData:(NSData *)data options:(NSDictionary *)options;\n```\n\n`initWithItem:`\
  \ 用于通过钥匙串 API 创建钥匙串项目时使用。`initWithData:options:` 用于从文件或 URL 加载钥匙串项目；选项字典用于需要传递额外信息来加载钥匙串项目的情况。\n\
  \n你需要能够保存钥匙串项目（即将其写入钥匙串），因此将实现一个 `save` 方法。`save` 方法将返回一个 `BOOL` 值表示成功或失败。你将传入一个指向\
  \ `NSError` 指针的指针，以便在失败时发送错误消息。你还会添加一个便捷方法 `valueForAttribute:`，用于封装钥匙串 API 调用以获取钥匙串项目的值。\n\
  \n```\n- (BOOL)save:(NSError **)error;\n- (id)valueForAttribute:(CFTypeRef)attr;\n\
  ```\n\n现在实现这些方法。\n\n打开 `KeychainItem.m` 并添加初始化方法。\n\n```\n- (id)initWithItem:(CFTypeRef)item\n\
  {\n    self = [self init];\n    if (self) {\n        self.item = CFBridgingRelease(item);\n\
  \    }\n    return self;\n}\n```\n\n这应该是相当标准的做法。注意使用了 `CFBridgingRelease` 函数。这是\
  \ CoreFoundation 和 Objective-C 之间免费桥接的一部分。它将非 Objective-C 指针转换为 Objective-C 对象，同时将内存管理转移给\
  \ ARC。`CFBridgingRelease` 的逆操作是 `CFBridgingRetain`，稍后会用到。注意在初始化方法中未设置 `type` 属性，这是因为你打算将\
  \ `KeychainItem` 设计为*抽象基类*。希望你不会直接实例化 `KeychainItem`，而是实例化其子类。在子类中，你将设置 `type` 属性。\n\
  \n由于 `KeychainItem` 是抽象的，`initWithData:options:` 应该不做任何操作。\n\n```\n- (id)initWithData:(NSData\
  \ *)data options:(NSDictionary *)options\n{\n    return nil;\n}\n```\n\n`save:`\
  \ 方法实际上比想象中更复杂。\n\n```\n- (BOOL)save:(NSError **)error\n{\n    NSDictionary *attributes\
  \ = @{\n        (__bridge id)kSecValueRef : self.item,\n        (__bridge id)kSecReturnPersistentRef\
  \ : (id)kCFBooleanTrue\n    };\n    CFTypeRef cfPersistentRef;\n    OSStatus status\
  \ = SecItemAdd((__bridge CFDictionaryRef)attributes, &cfPersistentRef);\n```\n\n\
  \n\n```objective-c\nif (status != errSecSuccess) {\n    NSDictionary *userInfo =\
  \ nil;\n    switch (status) {\n        case errSecParam:\n            userInfo =\
  \ @{ NSLocalizedDescriptionKey : NSLocalizedString(@\"errorSecParam\",\n       \
  \                   @\"传递给函数的一个或多个参数无效。\") };\n            break;\n        case\
  \ errSecAllocate:\n            userInfo = @{ NSLocalizedDescriptionKey : NSLocalizedString(@\"\
  errSecAllocate\",\n                          @\"内存分配失败。\") };\n            break;\n\
  \        case errSecDuplicateItem:\n            userInfo = @{ NSLocalizedDescriptionKey\
  \ : NSLocalizedString(@\"errSecDuplicateItem\",\n                          @\"该项目已存在。\"\
  ) };\n            break;\n    }\n    if (*error)\n        *error = [NSError errorWithDomain:NSOSStatusErrorDomain\
  \ code:status userInfo:userInfo];\n    return NO;\n}\n\nself.persistentRef = CFBridgingRelease(cfPersistentRef);\n\
  return YES;\n```\n\n该方法的大部分内容用于处理调用 `SecItemAdd`（向钥匙串添加钥匙串项的操作）时出现的各种错误情况。您会看到一些以\
  \ `__bridge` 开头的类型转换，这是无缝桥接的另一部分。在这种情况下，您不希望将内存管理转移给 ARC（或者在 `(__bridge CFDictionaryRef)`\
  \ 类型转换中，从 ARC 转移出来）。您本可以用纯 CoreFoundation 代码实现，但那样需要通过调用 `CFRelease` 来显式释放 CoreFoundation\
  \ 对象，而我们觉得当前这种方式更简单。\n\n`valueForAttribute:` 是对 `NSDictionary` 方法 `valueForKey:`\
  \ 的简单封装，旨在简化您的操作，这样您就不必在代码中到处添加 `(__bridge id)` 类型转换。\n\n```objective-c\n- (id)valueForAttribute:(CFTypeRef)attr\n\
  {\n    return [self.attributes valueForKey:(__bridge id)attr];\n}\n```\n\n现在您需要实现\
  \ `KeychainItem` 的具体子类。回顾一下，Security 框架中定义了四种钥匙串项类型：`kSecClassGenericPassword`、`kSecClassInternetPassword`、`kSecClassCertificate`\
  \ 和 `kSecClassIdentity`。您只需要处理其中两种：证书和身份。因此，您只需为应用程序定义两个具体子类：`KeychainCertificate`\
  \ 和 `KeychainIdentity`。\n\n使用 Objective-C 类模板创建一个新文件。将类命名为 `KeychainCertificate`，并使其成为\
  \ `KeychainItem` 的子类。创建文件后，选择 `KeychainCertificate.m` 并实现初始化方法。\n\n```objective-c\n\
  - (id)init\n{\n    self = [super init];\n    if (self) {\n        self.type = [(__bridge\
  \ id)kSecClassCertificate copy];\n    }\n    return self;\n}\n\n- (id)initWithData:(NSData\
  \ *)data options:(NSDictionary *)options\n{\n    SecCertificateRef cert = SecCertificateCreateWithData(NULL,\
  \ (__bridge CFDataRef)data);\n    if (cert) {\n        self = [self initWithItem:cert];\n\
  \    }\n    return self;\n}\n```\n\n使用通用的 `init` 方法设置 `type` 属性。`init` 方法将覆盖 `KeychainItem`\
  \ 中的默认 `init`。当调用 `KeychainItem initWithItem:` 时，它会调用 `init`。当您使用 `KeychainCertificate`\
  \ 调用 `initWithItem:` 时，将会调用这个 `init` 方法。\n\n现在，我们来创建 `KeychainIdentity` 类。创建一个新的\
  \ Objective-C 类，将其命名为 `KeychainIdentity`，并使其成为 `KeychainItem` 的子类。由于该类封装了一个数字身份，因此从文件加载时需要密码。\n\
  \n```objective-c\n- (id)init\n{\n    self = [super init];\n    if (self) {\n   \
  \     self.type = [(__bridge id)kSecClassIdentity copy];\n    }\n    return self;\n\
  }\n\n- (id)initWithData:(NSData *)data options:(NSDictionary *)options\n{\n    CFDataRef\
  \ inPKCS12Data = (__bridge CFDataRef)data;\n    CFArrayRef items = CFArrayCreate(NULL,\
  \ 0, 0, NULL);\n    // 选项字典需要包含键 kSecImportExportPassphrase，其值为保护文件所用的密码\n    OSStatus\
  \ status = SecPKCS12Import(inPKCS12Data, (__bridge CFDictionaryRef)options, &items);\n\
  \    if (status != errSecSuccess) {\n        NSLog(@\"读取 P12 文件时出错\");\n       \
  \ abort();\n    }\n    CFDictionaryRef myIdentityAndTrust = CFArrayGetValueAtIndex(items,\
  \ 0);\n    SecIdentityRef identity = (SecIdentityRef)CFDictionaryGetValue(myIdentityAndTrust,\
  \ kSecImportItemIdentity);\n    if (identity)\n        self = [self initWithItem:identity];\n\
  \nreturn self;\n}\n```\n\n同样，您重写了 `init` 方法来设置 `type` 属性；这次设置为 `kSecClassIdentity`。`initWithData:options:`\
  \ 用于加载 PKCS #12 格式的数据。由于这些数据受密码保护，因此需要选项字典包含键 `kSecImportExportPassphrase`，其值为创建文件时使用的密码。\n\
  \n您需要定义将使用刚刚创建的这些 `KeychainItem` 类的视图控制器类。使用 Objective-C 类模板创建一个新文件。将文件命名为 `KeychainItemsViewController`，并使其成为\
  \ `UITableViewController` 的子类。这将是您的抽象基视图控制器类。打开 `KeychainItemsViewController.h`\
  \ 并添加以下属性：\n\n```objective-c\n@property (strong, nonatomic) NSArray *items;\n```\n\
  \n`items` 属性将保存要显示的钥匙串项数组。打开 `KeychainItemsViewController.m` 来进行所有必要的修改。首先，需要导入\
  \ `KeychainItem` 头文件。\n\n```objective-c\n#import \"KeychainItem.h\"\n```\n\n接下来，需要更新表格视图的数据源方法，以返回正确的节数和每节的行数。\n\
  \n```objective-c\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
  {\n    // 返回节数。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section\n{\n    // 返回该节中的行数。\n    return self.items.count;\n\
  }\n```\n\n最后，需要使用钥匙串项来配置表格视图的单元格。\n\n```objective-c\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
  \ *CellIdentifier = @\"KeychainItemCell\";\n    UITableViewCell *cell = [tableView\
  \ dequeueReusableCellWithIdentifier:CellIdentifier\n                           \
  \                                forIndexPath:indexPath];\n\n// 配置单元格...\n    KeychainItem\
  \ *item = self.items[indexPath.row];\n    cell.textLabel.text = [item valueForAttribute:kSecAttrLabel];\n\
  \nreturn cell;\n}\n```\n\n这就是 `KeychainItemViewController` 所需的全部内容。接下来定义您将实际使用的具体子类。创建一个新的\
