  \ Builder Object Dock 展开状态\n\n当“New Game”按钮被按下时，你需要连接一个`Action`。从 Object Dock 中的`Button`按住\
  \ Control 键拖动到`ViewController.h`中的`@end`上方。创建一个名为`gameButtonPressed`的新`Action`（图\
  \ 9-15）。\n\n![9781430238072_Fig09-15.jpg](img/9781430238072_Fig09-15.jpg)\n\n图 9-15.  创建`gameButtonPressed`操作\n\
  \n现在，你需要为九个游戏格子按钮连接`Action`。不过你不需要为它们定义`Outlet`，只需要`Action`。从左上角的按钮按住 Control 键拖动到你刚创建的`Action`\
  \ `gameButtonPressed`下方。创建一个名为`gameSpacePressed`的新`Action`。现在，从其他每个游戏格子按钮按住 Control\
  \ 键拖动到`gameSpacePressed`方法声明上。整个方法声明应该会高亮，并出现一个名为“Connect Action”的弹出标签。建立这些连接。\n\
  \n返回标准编辑器模式并保存 XIB。\n\n---\n\n#### 创建 Packet 对象\n\n你需要定义你的游戏如何与自身的其他实例通信。你可以使用像数组这样简单的东西，知道每个元素代表什么；或者使用字典，并知道使用哪些键。与其这样做，不如定义一个特定的类`Packet`，它将用于通过\
  \ Game Kit 在两个节点之间来回发送信息。我们在之前创建`TicTacToe.h`中的`enum PacketType`时暗示过这一点。\n\n在导航器窗格中选择`TicTacToe`组，并创建一个新的\
  \ Objective-C 类，类名为`Packet`，作为`NSObject`的子类。\n\n文件创建完成后，选择`Packet.h`并在编辑器中打开。首先，你需要添加`TicTacToe.h`头文件。\n\
  \n```\n#import \"TicTacToe.h\"\n```\n\n你需要让`Packet`遵循`NSCoding`协议，以便你可以将其归档为`NSData`实例，并通过\
  \ Game Kit 会话发送。\n\n```\n@interface Packet : NSObject <NSCoding>\n```\n\n`Packet`类将只有三个属性：一个用于标识数据包类型，另外两个用于保存可能作为该数据包一部分发送的信息。你唯一需要发送的其他信息是掷骰子的结果以及玩家放置\
  \ X 或 O 的游戏棋盘上的哪个格子。\n\n```\n@property (nonatomic) PacketType type;\n@property (nonatomic)\
  \ NSUInteger dieRoll;\n@property (nonatomic) BoardSpace space;\n```\n\n然后，你需要一些`init`方法来创建你将发送的不同类型的数据包。\n\
  \n```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll space:(BoardSpace)\n\
  aBoardSpace;\n- (id)initDieRollPacket;\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll;\n\
  - (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace;\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll;\n\
  - (id)initResetPacket;\n```\n\n就是这样。保存`Packet.h`并转到`Packet.m`。\n\n首先，实现你在接口文件中声明的`init`方法。\n\
  \n```\n- (id)initWithType:(PacketType)aPacketType dieRoll:(NSUInteger)aDieRoll space:(BoardSpace)\n\
  aBoardSpace\n{\n    self = [super init];\n    if (self) {\n        self.type = aPacketType;\n\
  \        self.dieRoll = aDieRoll;\n        self.space = aBoardSpace;\n    }\n  \
  \  return self;\n}\n\n- (id)initDieRollPacket\n{\n    int roll = dieRoll();\n  \
  \  return [self initWithType:kPacketTypeDieRoll dieRoll:roll space:0];\n}\n\n- (id)initDieRollPacketWithRoll:(NSUInteger)aDieRoll\n\
  {\n    return [self initWithType:kPacketTypeDieRoll dieRoll:aDieRoll space:0];\n\
  }\n\n- (id)initMovePacketWithSpace:(BoardSpace)aBoardSpace\n{\n    return [self\
  \ initWithType:kPacketTypeMove dieRoll:0 space:aBoardSpace];\n}\n\n- (id)initAckPacketWithDieRoll:(NSUInteger)aDieRoll\n\
  {\n    return [self initWithType:kPacketTypeAck dieRoll:aDieRoll space:0];\n}\n\n\
  - (id)initResetPacket\n{\n    return [self initWithType:kPacketTypeReset dieRoll:0\
  \ space:0];\n}\n```\n\n每一个其他初始化方法都只是对`initWithType:dieRoll:space:`的封装调用，其中`BoardSpace`为零（未定义）。\n\
  \n你还需要让`Packet`遵循`NSCoding`协议，添加`encodeWithCoder:`和`initWithCoder:`方法。\n\n```\n\
  #pragma mark - NSCoder (Archiving) Methods\n\n- (void)encodeWithCoder:(NSCoder *)coder\n\
  {\n    [coder encodeInt:[self type] forKey:@\"type\"];\n    [coder encodeInteger:[self\
  \ dieRoll] forKey:@\"dieRoll\"];\n    [coder encodeInt:[self space] forKey:@\"space\"\
  ];\n}\n\n- (id)initWithCoder:(NSCoder *)coder\n{\n    if (self = [super init]) {\n\
  \        [self setType:[coder decodeIntForKey:@\"type\"]];\n        [self setDieRoll:[coder\
  \ decodeIntegerForKey:@\"dieRoll\"]];\n        [self setSpace:[coder decodeIntForKey:@\"\
  space\"]];\n    }\n    return self;\n}\n```\n\n`Packet`是一个非常直接的类。其实现中不应该有你之前没见过的东西。保存`Packet.m`。接下来，你将编写视图控制器并完成你的应用程序。\n\
  \n---\n\n#### 设置视图控制器头文件\n\n你通过 Interface Builder 声明了两个`Outlet`和两个`Action`。现在你将完成视图控制器的实现，包括使其与\
  \ Game Kit 协同工作。在编辑器中打开`ViewController.h`。\n\n你需要做的第一件事是导入 Game Kit 和`TicTacToe`头文件，以便编译器了解\
  \ Game Kit 中的对象和方法以及你之前定义的常量。\n\n```\n#import <GameKit/GameKit.h>\n#import \"TicTacToe.h\"\
  \n```\n\n之后，你告诉编译器有一个名为`Packet`的类。`@class`声明不会让编译器查找类头文件——它只是一个承诺，表明该类确实存在，因此以这种方式声明是可以的。\n\
  \n```\n@class Packet;\n```\n\n你的控制器类需要遵循几个协议。你的控制器将成为 Game Kit 对等选择器和会话的代理。你还会在出现问题时使用警报视图通知用户，因此你让你的类遵循用于定义这些任务中每个任务代理方法的三个协议。\n\
  \n```\n@interface ViewController : UIViewController <GKPeerPickerControllerDelegate,\
  \ GKSessionDelegate, \n                                               UIAlertViewDelegate>\n\
  ```\n\n你需要添加一些实例变量（ivars）。首先，在`@interface`声明之后立即添加大括号：\n\n```\n{\n}\n```\n\n你需要一个`ivar`来跟踪当前的游戏状态。\n\
  \n```\nGameState _state;\n```\n\n因为你不知道你是先掷骰子还是先收到对手的骰子结果，所以你需要变量来保存两者。一旦你拥有了两者，就可以比较它们并开始游戏。\n\
  \n```\nNSInteger _myDieRoll;\nNSInteger _opponentDieRoll;\n```\n\n一旦知道谁先走，你就可以在这个实例变量中存储你是`O`还是`X`。\n\
  \n```\nPlayerPiece _playerPiece;\n```\n\n最后，你还有两个布尔值来跟踪你是否收到了对手的骰子结果，以及你的对手是否确认收到了你的骰子结果。直到你拥有两个骰子结果并且知道你的对手也拥有两者之前，你不想开始游戏。当这两个布尔值都为`YES`时，你就知道是时候开始实际游戏了。\n\
  \n```\nBOOL _dieRollReceived;\nBOOL _dieRollAcknowledged;\n```\n\n\n\n### 排版后的文档\n\
  \n你已经有了两个通过 Interface Builder 创建的 Outlet 属性：`feedbackLabel` 和 `gameButton`。你还需要为\
  \ Game Kit 会话和已连接节点的对等标识符创建属性。\n\n```objective-c\n@property (nonatomic, strong)\
  \ GKSession *session;\n@property (nonatomic, strong) NSString *peerID;\n```\n\n\
  当视图加载时，你加载代表两个游戏棋子的图像，并保留对它们的引用。\n\n```objective-c\n@property (nonatomic, strong)\
  \ UIImage *xPieceImage;\n@property (nonatomic, strong) UIImage *oPieceImage;\n```\n\
  \n最后，你声明了游戏中所需的一系列方法。我们将在你于控制器中实现这些方法时，更详细地讨论具体方法。你需将它们添加到通过 Interface Builder 添加的两个\
  \ Action（`gameButtonPressed:` 和 `gameSpacePressed:`）之前。\n\n```objective-c\n- (void)resetBoard;\n\
  - (void)startNewGame;\n- (void)resetDieState;\n- (void)startGame;\n- (void)sendPacket:(Packet\
  \ *)packet;\n- (void)sendDieRoll;\n- (void)checkForGameEnd;\n```\n\n这个文件中需要的内容就这些。保存文件并打开\
  \ `ViewController.m`。\n\n### 实现井字棋视图控制器\n\n`ViewController.m` 中需要添加大量代码，那我们开始吧。\n\
  \n首先，你需要导入头文件 `Packet.h`。\n\n```objective-c\n#import \"Packet.h\"\n```\n\n在 `viewDidLoad`\
  \ 中（调用 `super` 之后），初始化棋子图像并将当前骰子点数设置为 `kDiceNotRolled`。\n\n```objective-c\n_myDieRoll\
  \ = kDiceNotRolled;\nself.oPieceImage = [UIImage imageNamed:@\"O.png\"];\nself.xPieceImage\
  \ = [UIImage imageNamed:@\"X.png\"];\n```\n\n在实现文件的底部，有两个 Action 方法。你需要实现它们。首先，编辑\
  \ `gameButtonPressed:`。\n\n```objective-c\n#pragma mark - Game-Specific Actions\n\
  \n- (IBAction)gameButtonPressed:(id)sender\n{\n    _dieRollReceived = NO;\n    _dieRollAcknowledged\
  \ = NO;\n\n    _gameButton.hidden = YES;\n    GKPeerPickerController *picker = [[GKPeerPickerController\
  \ alloc] init];\n    picker.delegate = self;\n    [picker show];\n}\n```\n\n这是用户按下“新建游戏”按钮时的回调。你将\
  \ `_dieRollReceived` 和 `_dieRollAcknowledged` 设置为 `NO`，因为你知道在新的游戏中，这两件事都尚未发生。接着，你隐藏按钮，因为不希望玩家在搜索对等设备或进行游戏时请求新游戏。然后，你创建\
  \ `GKPeerPickerController` 实例，将 `self` 设置为委托，并显示对等设备选择控制器。这就是启动让用户选择另一台设备进行对战所需做的全部工作。对等设备选择器会处理所有事务，并在需要你执行操作时调用委托方法。\n\
  \n现在，添加用户按下某个游戏格子按钮时的回调。\n\n```objective-c\n- (IBAction)gameSpacePressed:(id)sender\n\
  {\n    UIButton *buttonPressed = sender;\n    if (_state == kGameStateMyTurn &&\
  \ [buttonPressed imageForState:UIControlStateNormal] == nil) {\n        [buttonPressed\
  \ setImage:((_playerPiece == kPlayerPieceO) ? self.oPieceImage\n               \
  \                                                  : self.xPieceImage) \n      \
  \                 forState:UIControlStateNormal];\n        _feedbackLabel.text =\
  \ NSLocalizedString(@\"Opponent's Turn\", @\"Opponent's Turn\");\n        _state\
  \ = kGameStateYourTurn;\n\n        Packet *packet = [[Packet alloc] initMovePacketWithSpace:buttonPressed.tag];\n\
  \        [self sendPacket:packet];\n\n        [self checkForGameEnd];\n    }\n}\n\
  ```\n\n你首先将 `sender` 转换为 `UIButton`。你知道 `sender` 始终是 `UIButton` 的实例，这样做可以避免每次使用时都进行类型转换。接下来，你检查游戏状态。如果不是当前玩家的回合，你不想让用户选择格子。你还检查以确保按下的按钮尚未分配图像。如果已分配图像，则说明该按钮代表的格子里已经有了\
  \ X 或 O，用户不能选择它。如果格子没有分配图像并且是你的回合，你根据自己是先手还是后手，将图像设置为适合当前玩家的对应图像。棋子变量稍后会在比较骰子点数时设置。你更新反馈标签，告知用户当前不再是他们的回合，并相应地更改状态。你必须通知另一台设备你已经落子，因此创建\
  \ `Packet` 实例，传入被按下按钮的标签值以标识玩家选择了哪个格子。你使用名为 `sendPacket:` 的方法（稍后将会看到）来将 `Packet`\
  \ 实例发送到另一个节点。最后一步，你检查游戏是否结束。`checkForGameEnd` 方法判断是否有玩家获胜，或者棋盘上是否没有空格（这意味着平局）。\n\
  \n在实现你在接口文件中定义的方法之前，你需要考虑你所做的协议声明。你将 `ViewController` 定义为遵循 `GKPeerPickerControllerDelegate`、`GKSessionDelegate`\
  \ 和 `UIAlertViewDelegate` 协议。让我们按顺序处理它们，先从 `GKPeerPickerControllerDelegate` 开始。\n\
  \n#### Game Kit 点对点委托方法\n\n当 Game Kit 点对点选择器显示时，它会尝试使用 `peerPickerController:sessionForConnectionType:`\
  \ 方法创建一个 Game Kit 会话。因此，你先实现这个方法。将此方法添加到 `ViewController.m` 中，放在 `@end` 之前。\n\n\
  ```objective-c\n#pragma mark - GameKit Peer Picker Delegate Methods\n\n- (GKSession\
  \ *)peerPickerController:(GKPeerPickerController *)picker\n            sessionForConnectionType:(GKPeerPickerConnectionType)type\n\
  {\n    GKSession *theSession;\n    if (type == GKPeerPickerConnectionTypeNearby)\n\
  \        theSession = [[GKSession alloc] initWithSessionID:kTicTacToeSessionID\n\
  \                                          displayName:nil\n                   \
  \                       sessionMode:GKSessionModePeer];\n    return theSession;\n\
  }\n```\n\n这是选择器要求你提供会话的地方。因为你希望所有设备既能够广播自身，也能查找网络上的其他设备，所以将会话模式指定为 `GKSessionModePeer`。请注意，你还使用了在\
  \ `TicTacToe.h` 头文件中定义的常量 `kTicTacToeSessionID`，以确保只连接到其他 TicTacToe 实例。我们在前面已经讨论过这一点，如果需要回顾代码，可以往前翻几页。\n\
  \n添加处理与对等设备连接的方法。\n\n```objective-c\n- (void)peerPickerController:(GKPeerPickerController\
  \ *)picker\n                 didConnectPeer:(NSString *)thePeerID\n            \
  \              toSession:(GKSession *)theSession\n{\n    self.peerID = thePeerID;\n\
  \    self.session = theSession;\n    self.session.delegate = self;\n    [self.session\
  \ setDataReceiveHandler:self withContext:NULL];\n    [picker dismiss];\n    picker.delegate\
  \ = nil;\n    [self startNewGame];\n}\n```\n\n由于对等设备选择器仅用于简单的点对点游戏，一旦你收到连接通知，就存储会话和对等设备标识符，然后关闭选择器。关闭后，你调用\
  \ `startNewGame` 来启动游戏。\n\n接下来，添加处理用户取消操作的委托方法。\n\n```objective-c\n- (void)peerPickerControllerDidCancel:(GKPeerPickerController\
  \ *)picker\n{\n    self.gameButton.hidden = NO;\n}\n```\n\n你只需取消隐藏“新建游戏”按钮。\n\n\
  #### Game Kit 会话委托方法\n\n\n\n现在，你需要实现 Game Kit 会话的委托方法。从 `session:didFailWithError:`\
  \ 开始。\n\n```\n#pragma mark - GameKit Session Delegate Methods\n\n- (void)session:(GKSession\
  \ *)theSession didFailWithError:(NSError *)error \n{\n    UIAlertView *alert = [[UIAlertView\
  \ alloc]\n                              initWithTitle:NSLocalizedString(@\"Error\
  \ Connecting!\",\n                                                             \
  \ @\"Error Connecting!\")\n                                   message:NSLocalizedString(@\"\
  Unable to establish the connection.\",\n                                                            \
  \ @\"Unable to establish the connection.\")\n                                  delegate:self\n\
                           cancelButtonTitle:NSLocalizedString(@\"Bummer\", @\"Bummer\"\
  )\n                         otherButtonTitles:nil];\n    [alert show];\n    theSession.available\
  \ = NO;\n    [theSession disconnectFromAllPeers];\n    theSession.delegate = nil;\n\
      [theSession setDataReceiveHandler:nil withContext:nil];\n    self.session =\
  \ nil;\n}\n```\n\n当从 Game Kit 会话收到错误时，你将显示一个警告视图。然后清理 Game Kit 会话并关闭所有连接。最后一步，将\
  \ `session` 属性设置为 `nil`。\n\n由于你正在使用对等选择器，因此无需处理选择其他节点或连接它。但必须确保如果对手断开连接，你不会继续尝试进行该游戏。每当对等方的状态发生变化时，都会调用以下方法。如果收到另一个节点已断开连接的通知，你将再次通过警告视图通知用户，当用户关闭警告视图时，你的警告视图委托方法将重置棋盘。\n\
  \n```\n- (void)session:(GKSession *)theSession peer:(NSString *)peerID\n                              \
  \ didChangeState:(GKPeerConnectionState)inState\n{\n    if (inState == GKPeerStateDisconnected)\
  \ {\n        _state = kGameStateInterrupted;\n        UIAlertView *alert =\n           \
  \ [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Peer Disconnected!\",\n\
                                                                   @\"Peer Disconnected!\"\
  )\n               message:NSLocalizedString(@\"Your opponent has disconnected, or\
  \ the connection has been lost\",\n                                         @\"\
  Your opponent has disconnected, or the connection has been lost\")\n              \
  \ delegate:self\n               cancelButtonTitle:NSLocalizedString(@\"Bummer\"\
  , @\"Bummer\")\n               otherButtonTitles:nil];\n        [alert show];\n\
          theSession.available = NO;\n        [theSession disconnectFromAllPeers];\n\
          theSession.delegate = nil;\n        [theSession setDataReceiveHandler:nil\
  \ withContext:nil];\n        self.session = nil;\n    }\n}\n```\n\n##### Game Kit\
  \ 数据接收处理程序\n\n在继续之前，还需要实现一个方法：`receiveData:fromPeer:inSession:context:`。这个方法既不是\
  \ Game Kit 对等选择器控制器的委托方法，也不是 Game Kit 会话的委托方法。调用此方法是因为你在 `peerPickerController:didConnectPeer:toSession:`\
  \ 中创建会话时调用了 Game Kit 会话方法 `setDataReceiveHandler:withContext:`。\n\n```\n- (void)receiveData:(NSData\
  \ *)data\n           fromPeer:(NSString *)peer\n          inSession:(GKSession *)theSession\n\
              context:(void *)context\n{\n    NSKeyedUnarchiver *unarchiver = [[NSKeyedUnarchiver\
  \ alloc] initForReadingWithData:data];\n    Packet *packet = [unarchiver decodeObjectForKey:kTicTacToeArchiveKey];\n\
  \nswitch (packet.type) {\n        case kPacketTypeDieRoll: {\n            _opponentDieRoll\
  \ = packet.dieRoll;\n            Packet *ack = [[Packet alloc] initAckPacketWithDieRoll:_opponentDieRoll];\n\
              [self sendPacket:ack];\n            _dieRollReceived = YES;\n            break;\n\
          }\n        case kPacketTypeAck: {\n            if (packet.dieRoll != _myDieRoll)\
  \ {\n                NSLog(@\"Ack packet doesn't match yourDieRoll (mine: %d, send:\
  \ %d\",\n                      packet.dieRoll, _myDieRoll);\n            }\n            _dieRollAcknowledged\
  \ = YES;\n            break;\n        }\n        case kPacketTypeMove: {\n            UIButton\
  \ *aButton = (UIButton *)[self.view viewWithTag:[packet space]];\n            [aButton\
  \ setImage:((_playerPiece == kPlayerPieceO) ? self.xPieceImage\n                                                              \
  \ : self.oPieceImage)\n                     forState:UIControlStateNormal];\n            _state\
  \ = kGameStateMyTurn;\n            _feedbackLabel.text = NSLocalizedString(@\"Your\
  \ Turn\", @\"Your Turn\");\n            [self checkForGameEnd];\n            break;\n\
          }\n        case kPacketTypeReset: {\n            if (_state == kGameStateDone)\n\
                  [self resetDieState];\n            break;\n        }\n        default:\
  \ {\n            break;\n        }\n    }\n\nif (_dieRollReceived == YES && _dieRollAcknowledged\
  \ == YES)\n        [self startGame];\n   }\n```\n\n这是你的数据接收处理程序。每当从另一个节点接收到数据包时，都会调用此方法。首先要做的是将数据解档到所发送的原始\
  \ `Packet` 实例的副本中。然后使用 `switch` 语句根据收到的数据包类型执行不同的操作。如果是掷骰子数据包，则存储对手的值，发回确认值，并将 `dieRollReceived`\
  \ 设置为 `YES`。如果收到确认，请确保返回的数字与你发送的数字相同。这只是一个一致性检查。理论上不应该发生数字不一致的情况。如果发生，可能表明代码存在问题，或者意味着有人作弊。虽然我们怀疑是否有人会费心在井字棋中作弊，但已知在某些网络游戏中存在作弊行为，因此你可能需要考虑验证与对等方交换的任何信息。在这里，你只是记录不一致并继续。在实际应用中，如果检测到这种性质的数据不一致，你可能希望采取更严厉的措施。\n\
  \n如果数据包是移动数据包，表示其他玩家选择了一个空格，则使用 X 或 O 图像更新相应的空格，并更改状态和标签以反映现在轮到你的玩家。你还需要检查其他玩家的移动是否导致游戏结束。当收到重置数据包时，你所做的就是将游戏状态更改为\
  \ `kGameStateDone`，这样如果在意识到游戏结束之前收到掷骰子数据包，就不会丢弃它。如果收到了数据包，并且 `dieRollReceived` 和\
  \ `dieRollAcknowledged` 现在都是 `YES`，你就知道该开始游戏了。\n\n最后，添加警告视图委托方法。\n\n```\n#pragma\
  \ mark - UIAlertView Delegate Method\n\n- (void)alertView:(UIAlertView *)alertView\
  \ willDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    [self resetBoard];\n\
      self.gameButton.hidden = NO;\n}\n```\n\n你重置游戏板并取消隐藏“新游戏”按钮。\n\n#### 实现井字棋方法\n\
  \n`startNewGame` 方法非常简单。它只是调用一个方法来重置棋盘，然后调用另一个方法来掷骰子并将结果发送到另一个节点。这两种操作都可能发生在游戏开始之外的其他时间。例如，如果连接丢失，你会重置棋盘；如果两个节点掷出相同数字，你会发送掷骰子结果。\n\
  \n```\n#pragma mark - Instance Methods\n\n- (void) startNewGame\n{\n    [self resetBoard];\n\
      [self sendDieRoll];\n}\n```\n\n\n\n### 文档排版\n\n重置棋盘涉及从所有表示游戏棋盘格子的按钮中移除图像。您不需要声明九个出口（每个按钮一个），而是遍历九个标签值，并使用`viewWithTag:`从内容视图中检索按钮。您还需要清空反馈标签。然后，您向另一个节点发送一个数据包，告知它您正在重置。这样做是为了确保：如果您随后进行了另一次掷骰子操作，另一台机器知道不要覆盖它。网络通信是异步进行的，这意味着您不能像在仅一台设备上运行的程序那样，依赖事情总是按特定顺序发生。您可能在对方设备完成判定谁赢之前就发送了掷骰子结果。通过发送重置数据包，您可以告知另一个节点：可能会有针对新游戏的另一次掷骰子操作，因此请确保它处于正确的状态以接受该新掷骰子结果。如果不这样做，它可能会存储您的掷骰子结果，然后在重置自己的棋盘时覆盖该掷骰子值，这会导致挂起，因为另一台设备将会等待一个永远不会到来的掷骰子结果。您还需要重置玩家的游戏棋子。由于游戏已结束，您不知道玩家在下一场游戏中会是`X`还是`O`。\n\
  \n```objective-c\n- (void)resetBoard\n{\n    for (int i = kUpperLeft; i <= kLowerRight;\
  \ i++) {\n        UIButton *aButton = (UIButton *)[self.view viewWithTag:i];\n \
  \       [aButton setImage:nil forState:UIControlStateNormal];\n    }\n    self.feedbackLabel.text\
  \ = @\"\";\n    Packet *packet = [[Packet alloc] initResetPacket];\n    [self sendPacket:packet];\n\
  \    _playerPiece = kPlayerPieceUndecided;\n}\n```\n\n重置骰子状态仅需将`dieRollReceived`和`dieRollAcknowledged`设置为`NO`，并将您自己的骰子掷出结果和对手的骰子掷出结果都设置为`kDiceNotRolled`。\n\
  \n```objective-c\n- (void)resetDieState\n{\n    _dieRollReceived = NO;\n    _dieRollAcknowledged\
  \ = NO;\n    _myDieRoll = kDiceNotRolled;\n    _opponentDieRoll = kDiceNotRolled;\n\
  }\n```\n\n`startGame`在您收到对手的骰子掷出结果并确认对方也已收到您的掷骰子结果后被调用。首先，确保没有平局。如果出现平局，则重新启动掷骰子过程。否则，根据轮到您先手还是对手先手来设置状态、棋子和`feedbackLabel`的文本。然后重置骰子状态。在这里这样做可能看起来有些奇怪，但此时本局游戏的掷骰子阶段已经结束；并且由于您可能在代码意识到游戏结束之前就收到对手的骰子掷出结果，所以现在重置是为了确保骰子掷出结果不会在下一局游戏中被意外重用。\n\
  \n```objective-c\n- (void)startGame\n{\n    if (_myDieRoll == _opponentDieRoll)\
  \ {\n        _myDieRoll = kDiceNotRolled;\n        _opponentDieRoll = kDiceNotRolled;\n\
  \        [self sendDieRoll];\n        _playerPiece = kPlayerPieceUndecided;\n  \
  \  }\n    else if (_myDieRoll < _opponentDieRoll) {\n        _state = kGameStateYourTurn;\n\
  \        _playerPiece = kPlayerPieceX;\n        self.feedbackLabel.text = NSLocalizedString(@\"\
  Opponent's Turn\", @\"Opponent's Turn\");\n    }\n    else {\n        _state = kGameStateMyTurn;\n\
  \        _playerPiece = kPlayerPieceO;\n        self.feedbackLabel.text = NSLocalizedString(@\"\
  Your Turn\", @\"Your Turn\");\n    }\n    [self resetDieState];\n}\n```\n\n`sendDieRoll:`检查您的掷骰子属性。如果您尚未掷骰子，它会初始化一个`Packet`对象为您掷骰子，并将您的掷骰子值设置为该数据包的掷骰子值。如果您已有掷骰子值，则使用该值初始化一个`Packet`。最后，将掷骰子数据包发送给您的对手。\n\
  \n```objective-c\n- (void)sendDieRoll\n{\n    Packet *rollPacket;\n    _state =\
  \ kGameStateRollingDice;\n    if (_myDieRoll == kDiceNotRolled) {\n        rollPacket\
  \ = [[Packet alloc] initDieRollPacket];\n        _myDieRoll = rollPacket.dieRoll;\n\
  \    }\n    else {\n        rollPacket = [[Packet alloc] initDieRollPacketWithRoll:_myDieRoll];\n\
  \    }\n    [self sendPacket:rollPacket];\n}\n```\n\n`sendPacket:`将数据包发送到另一台设备（很明显！）。它接受一个`Packet`实例，并将其归档为`NSData`实例。然后，它使用会话的`sendDataToAllPeers:withDataMode:error:`方法将其发送到线路中——嗯，在这种情况下是无线。\n\
  \n```objective-c\n- (void)sendPacket:(Packet *)packet\n{\n    NSMutableData *data\
  \ = [[NSMutableData alloc] init];\n    NSKeyedArchiver *archiver = [[NSKeyedArchiver\
  \ alloc] initForWritingWithMutableData:data];\n    [archiver encodeObject:packet\
  \ forKey:kTicTacToeArchiveKey];\n    [archiver finishEncoding];\n\n    NSError *error\
  \ = nil;\n    if (![self.session sendDataToAllPeers:data withDataMode:GKSendDataReliable\
  \ error:&error]) {\n        // You would some do real error handling\n        NSLog(@\"\
  Error sending data: %@\", [error localizedDescription]);\n    }\n}\n```\n\n`checkForGameEnd`方法会检查所有九个格子，看它们里面是`X`还是`O`，然后查找三个连续的标记。它首先声明一个名为`moves`的变量来跟踪已进行的步数。这是它判断是否平局的方法。如果已经过了九步，且无人获胜，则棋盘上没有可用的格子了，所以是平局。接下来，声明一个包含九个`UIImage`指针的数组。您将从代表棋盘格子的九个按钮中取出图像放入此数组，以便更容易检查是否有玩家获胜。如果找到三个连续相同的标记，您将把三个图像中的一个存储在此变量中，从而知道哪个玩家赢得了游戏。然后，像之前在`resetBoard`方法中那样，通过标签遍历按钮，将按钮中的图像存储到之前声明的数组中。接下来的一大段代码只是检查是否有任何位置出现三个相同的图像连续排列。如果找到三个连续相同的图像，则将三个图像中的一个存储在`winningImage`中。当检查完成时，它将知道哪个玩家（如果有的话）获胜。如果没有赢家，则通过查看`moves`来检查棋盘上是否还有空格。如果没有剩余格子，则说明游戏结束，猫赢了。\n\
  \n**注意**：在井字棋中，平局也称为“猫的游戏”。“猫赢了”这个说法指的是平局。\n\n如果前面的任何代码将状态设置为`kGameStateDone`，则使用`performSelector:withObject:afterDelay:`在用户有时间阅读谁赢了之后开始新游戏。\n\
  \n```objective-c\n- (void)checkForGameEnd\n{\n    NSInteger moves = 0;\n\n    UIImage\
  \     *currentButtonImages[9];\n    UIImage     *winningImage = nil;\n\n    for\
  \ (int i = kUpperLeft; i <= kLowerRight; i++) {\n        UIButton *oneButton = (UIButton\
  \ *)[self.view viewWithTag:i];\n        if ([oneButton imageForState:UIControlStateNormal])\n\
  \            moves++;\n        currentButtonImages[i - kUpperLeft] = [oneButton\
  \ imageForState:UIControlStateNormal];\n    }\n\n    // Top Row\n    if (currentButtonImages[0]\
  \ == currentButtonImages[1]\n        && currentButtonImages[0] == currentButtonImages[2]\n\
  \        && currentButtonImages[0] != nil)\n        winningImage = currentButtonImages[0];\n\
  \n    // Middle Row\n    else if (currentButtonImages[3] == currentButtonImages[4]\n\
  \             && currentButtonImages[3] == currentButtonImages[5]\n            \
  \ && currentButtonImages[3] != nil)\n        winningImage = currentButtonImages[3];\n\
  \n    // Bottom Row\n    else if (currentButtonImages[6] == currentButtonImages[7]\n\
  \             && currentButtonImages[6] == currentButtonImages[8]\n            \
  \ && currentButtonImages[6] != nil)\n        winningImage = currentButtonImages[6];\n\
  ```\n\n\n\n```objectivec\n// 左列\nelse if (currentButtonImages[0] == currentButtonImages[3]\n\
  \         && currentButtonImages[0] == currentButtonImages[6]\n         && currentButtonImages[0]\
  \ != nil)\n    winningImage = currentButtonImages[0];\n\n// 中列\nelse if (currentButtonImages[1]\
  \ == currentButtonImages[4]\n         && currentButtonImages[1] == currentButtonImages[7]\n\
  \         && currentButtonImages[1] != nil)\n    winningImage = currentButtonImages[1];\n\
  \n// 右列\nelse if (currentButtonImages[2] == currentButtonImages[5]\n         &&\
  \ currentButtonImages[2] == currentButtonImages[8]\n         && currentButtonImages[2]\
  \ != nil)\n    winningImage = currentButtonImages[2];\n\n// 从左上角开始的对角线\nelse if\
  \ (currentButtonImages[0] == currentButtonImages[4]\n         && currentButtonImages[0]\
  \ == currentButtonImages[8]\n         && currentButtonImages[0] != nil)\n    winningImage\
  \ = currentButtonImages[0];\n\n// 从右上角开始的对角线\nelse if (currentButtonImages[2] ==\
  \ currentButtonImages[4]\n         && currentButtonImages[2] == currentButtonImages[6]\n\
  \         && currentButtonImages[2] != nil)\n    winningImage = currentButtonImages[2];\n\
  \nif (winningImage == self.xPieceImage) {\n    if (_playerPiece == kPlayerPieceX)\
  \ {\n        self.feedbackLabel.text = NSLocalizedString(@\"你赢了！\", @\"You Won!\"\
  );\n        _state = kGameStateDone;\n    }\n    else {\n        self.feedbackLabel.text\
  \ = NSLocalizedString(@\"对手赢了！\", @\"Opponent Won!\");\n        _state = kGameStateDone;\n\
  \    }\n}\nelse if (winningImage == self.oPieceImage) {\n    if (_playerPiece ==\
  \ kPlayerPieceO){\n        self.feedbackLabel.text = NSLocalizedString(@\"你赢了！\"\
  , @\"You Won!\");\n        _state = kGameStateDone;\n    }\n    else {\n       \
  \ self.feedbackLabel.text = NSLocalizedString(@\"对手赢了！\", @\"Opponent Won!\");\n\
  \        _state = kGameStateDone;\n    }\n}\nelse {\n    if (moves >= 9) {\n   \
  \     self.feedbackLabel.text = NSLocalizedString(@\"猫赢了！\", @\"Cat Wins!\");\n\
  \        _state = kGameStateDone;\n    }\n}\n\nif (_state == kGameStateDone)\n \
  \   [self performSelector:@selector(startNewGame) withObject:nil afterDelay:3.0];\n\
  ```\n\n等等，你还没做完。你需要回头调整 `didReceiveMemoryWarning` 方法。你需要断开与对等设备的连接。\n\n```objectivec\n\
  self.session.available = NO;\n[self.session disconnectFromAllPeers];\n[self.session\
  \ setDataReceiveHandler: nil withContext: nil];\nself.session.delegate = nil;\n\
  ```\n\n#### 尝试运行\n\n与我们之前共同编写的大多数应用不同，这个井字棋游戏不能在模拟器中使用。虽然它可以在模拟器中运行，但模拟器不支持蓝牙连接。由于这个应用目前依赖蓝牙连接来实现通信（因为你使用了\
  \ Game Kit 和同场设备选择器），所以你需要两台物理设备，且这两台设备都不能是第一代设备，因为原始 iPhone 和第一代 iPod touch 无法与\
  \ Game Kit 的同场设备选择器配合使用。这也意味着你需要有两台已配置用于开发的设备。你应该能够同时将 iOS 设备连接到你的电脑。Xcode 会在调试区域显示一个下拉菜单，用于选择要查看的哪台设备。\n\
  \n如果你在同时使用两台设备运行 Xcode 时遇到问题，你需要在一台设备上构建并运行，然后退出并拔掉该设备，接着插入另一台设备并重复同样的操作。完成这些步骤后，两台设备上都会安装该应用。你可以在两台设备上同时运行它，或者通过\
  \ Xcode 在一台设备上启动它，这样你就可以进行调试并读取控制台反馈。\n\n**注意**  关于在设备上安装应用的详细说明，请访问开发者门户网站 [`developer.apple.com/ios`](http://developer.apple.com/ios)，该网站仅对付费\
  \ iPhone SDK 会员开放。\n\n你应该知道，调试——甚至是在不调试的情况下从 Xcode 运行——都会减慢所连接的 iOS 设备上程序的运行速度，这可能会影响网络通信。在底层，两台设备之间来回传输的所有数据都会检查确认信息并设有超时时间。如果在一定时间内没有收到响应，它们就会断开连接。因此，如果你设置了断点，当程序执行到该断点时，你很可能会断开两台设备之间的连接。这会使得排查\
  \ Game Kit 应用中的问题变得非常繁琐。你通常需要使用替代断点的方法，比如 `NSLog()` 或断点动作，以避免中断设备间的网络连接。我们将在第 15\
  \ 章中进一步讨论调试问题。\n\n#### 游戏开始！\n\n又完成了一个长篇章节，现在你应该对 Game Kit 网络通信有了相当扎实的理解。你了解了如何使用同场设备选择器让用户选择另一台\
  \ iPhone 或 iPod touch 进行连接，也知道了如何通过归档对象来发送数据，并且初步体会到了在应用中添加网络多用户功能时所带来的复杂性。\n\n\
  第 10 章\n\n### Map Kit\n\niPhone 一直都有能力确定其在世界上的位置。尽管最初的 iPhone 没有 GPS，但它有一个地图应用，能够通过手机三角定位或在其已知位置的数据库中查找\
  \ WiFi IP 地址来在地图上显示其大致位置。在 iOS 开发的早期，开发者无法在自己的应用中利用这一功能。虽然可以启动地图应用来显示特定位置或路线，但仅使用苹果公司提供的\
  \ API，用户无法在不离开当前应用的情况下显示地图数据。\n\n这一情况随着 Map Kit 的出现而改变。现在，应用能够显示地图，包括用户的当前位置，甚至可以在这些地图上放置图钉并显示注释。Map\
  \ Kit 的功能也不仅限于显示地图。它还包括一项名为*反向地理编码*的功能，允许你将一组特定的坐标转换为物理地址。你的应用可以利用这些坐标不仅能确定用户的所在位置，而且通常还能找到与该位置相关的实际地址。虽然不总能精确到街道地址，但无论用户身处世界何处，你几乎总能获取到所在的城市和州或省份。在本章中，我们将学习如何将\
  \ Map Kit 功能添加到任何应用中的基础知识。\n\n**注意**  你在本章中构建的应用可以在 iPhone 模拟器中正常运行；然而，模拟器不会报告你的实际位置。相反，它会返回位于加利福尼亚州旧金山市斯托克顿街的苹果旧金山商店的地址。你可以通过\
  \ Xcode 中调试窗格跳转栏上的位置模拟器来更改模拟器使用的位置。\n\n#### 本章的应用\n\n本章的应用开始时将显示一张北美地图（图 10-1）。除了地图之外，你的界面将是空的，只有一个标题富有想象力的“Go”按钮。当按下该按钮时，应用将确定你的当前位置，将地图缩放到该位置，并放置一个图钉来标记该位置（图\
  \ 10-2）。\n\n![9781430238072_Fig10-01.jpg](img/9781430238072_Fig10-01.jpg)\n\n图 10-1.\
  \ MapMe 应用启动时将显示一张美国地图\n\n![9781430238072_Fig10-02.jpg](img/9781430238072_Fig10-02.jpg)\n\
  \n图 10-2. 确定当前位置后，地图将放大到该位置并添加注释\n\n\n\n接着，你将使用 Map Kit 的反向地理编码器来确定你当前位置的地址，并在地图上添加一个标注来显示该位置的具体信息。\n\
  \n尽管这个应用很简单，但它利用了 Map Kit 的大部分基本功能。在开始构建项目之前，让我们先探索 Map Kit，看看它是如何运作的。\n\n### 概览与术语\n\
  \n虽然 Map Kit 并不是特别复杂，但它可能会让人有些困惑。让我们先从一个高层次的角度来了解，并明确相关术语，然后你再深入研究各个组件。\n\n要显示地图相关数据，你需要在应用的某个视图中添加一个地图视图。地图视图可以有一个委托，这个委托通常是负责管理地图视图所在视图的控制器类。这也是本章应用程序所采用的方法。你的应用将只有一个视图和一个视图控制器。这个单独的视图将包含一个地图视图以及其他一些元素，而你的单个视图控制器将成为地图视图的委托。\n\
  \n地图视图通过**标注（annotations）**集合来跟踪感兴趣的位置。无论你在地图上看到的是图钉、圆点还是其他任何图标，它都是一个标注。当标注位于正在显示的地图区域内时，地图视图会要求其委托为该标注提供一个视图（称为标注视图），地图视图将在地图上的特定位置绘制该视图。\n\
  \n标注是可选的，选中的标注会显示一个**弹出框（callout）**，这是一个悬浮在地图上方的小视图，就像图 10-2 中显示的 *你在这里！* 视图一样。如果用户点击了一个标注视图，并且该标注视图是可选的，地图视图将显示与该视图关联的弹出框。\n\
  \n### 地图视图\n\nMap Kit 框架的核心元素是由 `MKMapView` 类表示的地图视图。地图视图负责绘制地图并响应用户输入。用户可以使用他们习惯的所有手势，包括捏合缩放、双击放大或双指双击缩小。你可以将地图视图添加到界面中，并使用\
  \ Interface Builder 进行配置。与许多 iOS 控件一样，管理地图视图的大部分工作由其委托完成。\n\n#### 地图类型\n\n地图视图能够以多种不同的方式显示地图。它们可以将地图显示为一系列线条和符号，代表当前显示区域的道路和其他地标。这是默认的显示方式，称为**标准地图类型**。你也可以通过指定**卫星地图类型**来使用卫星图像显示地图，或者使用所谓的**混合地图类型**，即标准类型的道路和地标线条叠加在卫星类型的卫星图像之上。你可以在图\
  \ 10-2 中看到默认地图类型的示例。图 10-3 展示了卫星地图类型，而图 10-4 展示了混合地图类型。\n\n![9781430238072_Fig10-03.jpg](img/9781430238072_Fig10-03.jpg)\n\
  \n图 10-3. 卫星地图类型显示卫星图像而非线条和符号\n\n![9781430238072_Fig10-04.jpg](img/9781430238072_Fig10-04.jpg)\n\
  \n图 10-4. 混合地图类型将默认类型的线条和符号叠加在卫星类型的图像之上\n\n你可以在 Interface Builder 中设置地图类型，或者将地图视图的\
  \ `mapType` 属性设置为以下值之一：\n\n```\nmapView.mapType = MKMapTypeStandard;\nmapView.mapType\
  \ = MKMapTypeSatellite;\nmapView.mapType = MKMapTypeHybrid;\n```\n\n#### 用户位置\n\n\
  如果配置得当，地图视图将使用 Core Location 来跟踪用户的位置，并用蓝色圆点在地图上显示，这与地图应用的方式非常相似。在本章的应用中你不会用到这个功能，但你可以通过将地图视图的\
  \ `showsUserLocation` 属性设置为 `YES` 来开启它，如下所示：\n\n```\nmapView.showsUserLocation =\
  \ YES;\n```\n\n如果地图正在跟踪用户的位置，你可以使用只读属性 `userLocationVisible` 来确定用户当前位置是否在地图视图中可见。如果用户的当前位置正在地图视图中显示，`userLocationVisible`\
  \ 将返回 `YES`。\n\n你可以从地图视图中获取用户当前位置的具体坐标，方法是先将 `showsUserLocation` 设置为 `YES`，然后访问\
  \ `userLocation` 属性。该属性返回一个 `MKUserLocation` 实例。`MKUserLocation` 是一个对象，有一个名为 `location`\
  \ 的属性，该属性本身是一个 `CLLocation` 对象。`CLLocation` 包含一个名为 `coordinate` 的属性，指向一组坐标。这意味着你可以像下面这样从\
  \ `MKUserLocation` 对象中获取实际的坐标：\n\n```\nCLLocationCoordinate2D coords = mapView.userLocation.location.coordinate;\n\
  ```\n\n#### 坐标区域\n\n如果你不能告诉地图视图要显示什么，或者不能找出它当前显示的是世界的哪一部分，那么地图视图就没有多大用处。对于地图视图，完成这些任务的关键是\
  \ `MKCoordinateRegion`，这是一个结构体，包含两条数据，它们共同定义了要在地图视图中显示的地图区域。\n\n`MKCoordinateRegion`\
  \ 的第一个成员叫做 `center`。这是另一个类型为 `CLLocationCoordinate2D` 的结构体，你可能还记得它在《Beginning iOS\
  \ 6 Development》（Jack Nutting、David Mark 和 Jeff LaMarche 著，Apress，2013 年）一书中关于 Core\
  \ Location 的章节中出现过。`CLLocationCoordinate2D` 包含两个浮点值，一个纬度和一个经度，用于表示地球上的一个点。在坐标区域的上下文中，这个点表示地图视图的中心点。\n\
  \n`MKCoordinateRegion` 的第二个成员叫做 `span`，它是一个类型为 `MKCoordinateSpan` 的结构体。`MKCoordinateSpan`\
  \ 结构体有两个成员，叫做 `latitudeDelta` 和 `longitudeDelta`。这两个数字通过标识应显示 `center` 周围多大的区域来设置地图的缩放级别。这些值以纬度和经度度数表示距离。如果\
  \ `latitudeDelta` 和 `longitudeDelta` 是比较小的数字，地图将放大得很近；如果它们比较大，地图将缩小并显示更广阔的区域。\n\n\
  图 10-5 展示了 `MKCoordinateRegion` 结构体的构成。\n\n![9781430238072_Fig10-05.jpg](img/9781430238072_Fig10-05.jpg)\n\
  \n图 10-5. `MKCoordinateRegion` 的图形化表示。它包含两个成员，这两个成员本身也是各拥有两个成员的结构体\n\n如果你回头看看图 10-2，你看到图钉的尖端位于通过\
  \ `MKCoordinateRegion.center` 传入的坐标点。地图顶部到底部的距离通过 `MKCoordinateRegion.span.latitudeDelta`\
  \ 传入，以纬度度数表示。同样地，地图左侧到右侧的距离通过 `MKCoordinateRegion.span.longitudeDelta` 传入，以经度度数表示。\n\
  \n**提示** 如果你记不住哪条线是纬度，哪条线是经度，这里有一个来自我们三年级地理老师克拉巴佩尔夫人（Krabappel，发音为 kruh-bopple）的小窍门。纬度（latitude）听起来像海拔高度（altitude），所以纬度告诉你在球体上的高度。赤道是一条纬线。而本初子午线是一条经线。感谢克拉巴佩尔夫人！\n\
  \n\n\n这种方法给程序员带来了两个挑战。首先，谁会以经纬度为单位来思考呢？虽然纬度一度在世界各地大致代表相同的距离，但经度一度所代表的距离会随着你从极地移动到赤道而大幅变化，因此计算经度并非那么直截了当。\n\
  \n第二个挑战是，地图视图具有特定的宽高比（称为*宽高比*），而你指定的 `latitudeDelta` 和 `longitudeDelta` 必须代表具有相同宽高比的区域。幸运的是，Apple\
  \ 提供了工具来处理这两个问题。\n\n### 将度数转换为距离\n\n无论你身在何处，每一纬度大约代表 69 英里（约 111 公里）。这使得确定传递给 `MKCoordinateSpan`\
  \ 的 `latitudeDelta` 参数值相当容易计算。如果你使用英里，只需将你想要显示的横向距离除以 69；如果你使用公里，则除以 111。\n\n**注意：**\
  \ 由于地球并非完美球体（严格来说，它接近一个扁球体），因此每一纬度所代表的实际距离确实存在一些差异，但这种差异不足以让我们费心去计算它，因为从极地到赤道，它仅仅有大约一度的变化。在赤道上，每一纬度等于\
  \ 69.046767 英里或 111.12 公里，当你向两极移动时，这个数值会略微变小。我们选择 69 和 111，因为它们是几乎在任何地方都与实际距离误差在\
  \ 1% 以内的整洁整数。\n\n然而，计算每一经度所代表的距离就不那么容易了。要对经度做同样的计算，你必须将纬度考虑在内，因为每一经度所代表的距离取决于你相对于赤道的位置。要计算经度所代表的距离，你必须进行一些复杂的数学运算。幸运的是，Apple\
  \ 已经为你完成了这些复杂的计算，并提供了一个名为 `MKCoordinateRegionMakeWithDistance()` 的方法，你可以用它来创建一个区域。你提供作为中心点的坐标，以及纬度和经度跨度以米为单位的距离。该函数会查看所提供坐标中的纬度，并为你计算以度数为单位的两个\
  \ delta 值。以下是你创建一个区域以显示由 `CLLocationCoordinate2D` 结构体（名为 `center`）表示的特定位置周围每侧一公里区域的方法：\n\
  \n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
  \ 2000, 2000);\n```\n\n要显示 `center` 的每侧一公里，你必须为每个跨度总共指定 2000 米：左侧 1000 米加右侧 1000\
  \ 米，以及顶部 1000 米加底部 1000 米。此调用之后，`viewRegion` 将包含一个格式正确的 `MKCoordinateRegion`，它几乎可以立即使用。剩下的就是处理宽高比问题。\n\
  \n### 复杂的数学运算\n\n计算每一经度距离的数学运算其实并不那么复杂，所以我们认为应该向那些感兴趣的读者展示一下幕后原理。要计算在给定纬度下每一经度的距离，计算公式是：\n\
  \n![image](img/Eq_10-01.jpg)\n\n如果 Apple 没有为我们提供函数，你可以遵循这个公式创建几个宏来实现同样的功能。地球半径大约为\
  \ 3963.1676 英里，即 6378.1 公里。因此，要计算存储在变量 `lat` 中特定纬度处的每一经度距离，你可以这样做：\n\n```\ndouble\
  \ longitudeMiles = ((M_PI/180.0) × 3963.1676 × cos(latitude));\n```\n\n你也可以用同样的计算来确定每一经度以公里为单位的距离，如下所示：\n\
  \n```\ndouble longitudeKilometers = ((M_PI/180.0) × 6378.1 × cos(latitude));\n```\n\
  \n### 适应宽高比\n\n在上一节中，我们展示了如何创建一个跨度来显示给定位置每侧一公里的区域。然而，除非地图视图是完美的正方形，否则视图无法恰好显示中心点四个方向各一侧的一公里。如果地图视图比其高度宽，那么\
  \ `longitudeDelta` 需要比 `latitudeDelta` 大。如果地图视图比其宽度高，则情况相反。\n\n`MKMapView` 类有一个实例方法，可以调整坐标区域以匹配地图视图的宽高比。该方法名为\
  \ `regionThatFits:`。要使用它，你只需传入你创建的坐标区域，它将返回一个已调整为地图视图宽高比的新的坐标区域。使用方法如下：\n\n```\n\
  MKCoordinateRegion adjustedRegion = [mapView regionThatFits:viewRegion];\n```\n\n\
  ### 设置要显示的区域\n\n一旦你创建了一个坐标区域，就可以通过调用 `setRegion:animated:` 方法告诉地图视图显示该区域。如果你为第二个参数传入\
  \ `YES`，地图视图将进行缩放、平移或以其他方式动画显示视图从当前位置到新位置的过程。以下是一个示例，它创建一个坐标区域，将其调整为地图视图的宽高比，然后告诉地图视图显示该区域：\n\
  \n```\nMKCoordinateRegion viewRegion = MKCoordinateRegionMakeWithDistance(center,\
  \ 2000, 2000); \nMKCoordinateRegion adjustedRegion = [mapView regionThatFits:viewRegion];\n\
  [mapView setRegion:adjustedRegion animated:YES];\n```\n\n### 地图视图代理\n\n如前所述，地图视图可以拥有代理。与表格视图和选择器不同，地图视图在没有代理的情况下也能正常工作。在地图视图代理上，你可以实现许多方法，以便在需要时获知与地图相关的特定任务通知。例如，它们允许你在用户通过拖动以显示地图新部分或通过缩放以显示更小或更大区域来改变他们正在查看的地图部分时得到通知。你还可以在地图视图从服务器加载新地图数据时或加载失败时得到通知。地图视图代理方法包含在\
  \ `MKMapViewDelegate` 协议中，任何用作地图视图代理的类都应遵循该协议。\n\n#### 地图加载代理方法\n\n从 iOS 6 开始，Map\
  \ Kit 框架从 Google Maps 切换到了 Apple 提供的服务来执行其功能。除了临时缓存外，它不本地存储任何地图数据。每当地图视图需要到 Apple\
  \ 的服务器检索新地图数据时，它会调用代理方法 `mapViewWillStartLoadingMap:`，当它成功检索到所需的地图数据时，它会调用代理方法 `mapViewDidFinishLoadingMap:`。如果你在任何时候有需要执行的应用程序特定处理，你可以在地图视图的代理上实现相应的方法。\n\
  \n如果 Map Kit 在从服务器加载地图数据时遇到错误，它会在其代理上调用方法 `mapViewDidFailLoadingMap:withError:`。至少，你应该实现这个代理方法，并通知用户存在问题，这样他们就不会坐在那里等待一个永远不会到来的更新。以下是该方法的非常简单的实现，它仅显示一个警报，让用户知道出了问题：\n\
  \n```\n- (void)mapViewDidFailLoadingMap:(MKMapView *)mapView \n                      \
  \ withError:(NSError *)error \n{\n    UIAlertView *alert = [[UIAlertView alloc]\
  \ \n        initWithTitle:NSLocalizedString(@\"Error loading map\", \n            @\"\
  Error loading map\")\n        message:[error localizedDescription] \n        delegate:nil\
  \ \n        cancelButtonTitle:NSLocalizedString(@\"Okay\", @\"Okay\") \n        otherButtonTitles:nil];\n\
      [alert show];\n}\n```\n\n#### 区域更改代理方法\n\n\n\n如果您的地图视图已启用，用户将能通过标准 iPhone 手势（如拖拽、双指捏合、双指张开和双击）与它交互。这些操作会改变视图中显示的区域。当地图视图的代理实现了相应方法时，每次发生此类改变都会调用两个代理方法。手势开始时，会调用代理方法\
  \ `mapView:regionWillChangeAnimated:`；手势结束时，则会调用 `mapView:regionDidChangeAnimated:`。如果您有需要在视图区域变化期间或变化完成后执行的功能，就应该实现这些方法。\n\
  \n### 判断坐标是否可见\n\n在区域变化的代理方法中，您可能需要频繁执行的一项任务是判断特定的坐标集当前是否在屏幕上可见。对于标注以及用户的当前位置（如果正在被追踪），地图视图会自动为您处理这些判断。然而，有时您仍需要知道某个特定的坐标集是否位于地图视图当前显示的区域之内。\n\
  \n以下是判断方法：\n\n```\nCLLocationDegrees leftDegrees = mapView.region.center.longitude\
  \ – \n                                (mapView.region.span.longitudeDelta / 2.0);\n\
  CLLocationDegrees rightDegrees = mapView.region.center.longitude + \n          \
  \                      (mapView.region.span.longitudeDelta / 2.0);\nCLLocationDegrees\
  \ bottomDegrees = mapView.region.center.latitude – \n                          \
  \      (mapView.region.span.latitudeDelta / 2.0);\nCLLocationDegrees topDegrees\
  \ = self.region.center.latitude + \n                                (mapView.region.span.latitudeDelta\
  \ / 2.0);\nif (leftDegrees > rightDegrees) { // 国际日期变更线在视图内\n    leftDegrees = -180.0\
  \ - leftDegrees;\n    if (coords.longitude > 0) // 坐标位于日期变更线以西\n       coords.longitude\
  \ = -180.0 - coords.longitude;\n}\nif (leftDegrees <= coords.longitude && coords.longitude\
  \ <= rightDegrees &&\n    bottomDegrees <= coords.latitude && coords.latitude <=\
  \ topDegrees) {\n    // 坐标正在被显示\n}\n```\n\n在继续讲解其余的地图视图代理方法之前，我们需要讨论一下标注这个话题。\n\n\
  ### 标注\n\n地图视图提供了一种能力，可以用一组补充信息来标记某个特定位置。这些信息及其在地图上的图形表示被称为*标注*。您即将编写的应用程序中放置的大头针（参见图\
  \ 10-2），就是一种形式的标注。标注由两个部分组成：*标注对象*和*标注视图*。地图视图会跟踪其所有的标注，并在需要显示某个标注时，调用其代理来获取相应的标注视图。\n\
  \n#### 标注对象\n\n每个标注都必须有一个标注对象，该对象几乎总是您编写的自定义类，并且遵循 `MKAnnotation` 协议。标注对象通常是一个相当标准的数据模型对象，其职责是保存与所讨论标注相关的任意数据。标注对象需要响应两个方法，并实现一个属性。标注对象必须实现的这两个方法叫做\
  \ `title` 和 `subtitle`，它们是在标注的弹出框（即标注被选中时弹出的小浮动视图）中显示的信息。在图 10-4 中，您可以看到弹出框中显示的标题和副标题。在该例子中，标注对象返回的标题是\
  \ `You are Here!`，副标题是 `Stockton St, San Francisco, CA 94108`。\n\n标注对象还必须有一个名为 `coordinate`\
  \ 的属性，该属性返回一个 `CLLocationCoordinate2D`，用于指定标注应放置在世界上的哪个位置（地理位置上）。地图视图将使用该位置来确定标注的绘制位置。\n\
  \n#### 标注视图\n\n正如我们之前所说，当地图视图需要显示其任何一个标注时，它会调用其代理来为那个标注获取一个标注视图。这是通过方法 `mapView:viewForAnnotation:`\
  \ 实现的，该方法需要返回一个 `MKAnnotationView` 或其子类对象。标注视图是显示在地图上的对象，而不是标注被选中时弹出的浮动窗口。在图 10-4\
  \ 中，标注视图就是窗口中央的大头针。它是一个大头针，因为您使用了 `MKAnnotationView` 的提供的子类 `MKPinAnnotationView`，该类设计用于绘制红色、绿色或紫色的大头针。它还包含一些\
  \ `MKAnnotationView` 所没有的额外功能，例如大头针落下的动画。\n\n如果您对标注视图有高级绘制需求，可以对 `MKAnnotationView`\
  \ 进行子类化，并实现自己的 `drawRect:` 方法。然而，通常并不需要对 `MKAnnotationView` 进行子类化，因为您可以创建一个 `MKAnnotationView`\
  \ 实例，并将其 `image` 属性设置为您想要的任何图像。这开辟了无限的可能性，而无需对 `MKAnnotationView` 进行子类化或添加子视图（参见图\
  \ 10-6）。\n\n![9781430238072_Fig10-06.jpg](img/9781430238072_Fig10-06.jpg)\n\n图 10-6.\
  \ 通过设置 `MKAnnotationView` 的 `image` 属性，您几乎可以在地图上显示任何内容。在此示例中，我们将大头针替换成了一只惊讶的猫，因为这是我们一贯的风格。\n\
  \n#### 添加和移除标注\n\n地图视图会跟踪其所有的标注，因此向地图添加标注只需调用地图视图的 `addAnnotation:` 方法，并提供一个遵循 `MKAnnotation`\
  \ 协议的对象即可。\n\n```\n[mapView addAnnotation:annotation];\n```\n\n您也可以使用 `addAnnotations:`\
  \ 方法，通过提供一个标注数组来添加多个标注。\n\n```\n[mapView addAnnotations:[NSArray arrayWithObjects:annotation1,\
  \ annotation2, nil]];\n```\n\n您可以通过 `removeAnnotation:` 方法，传入单个要移除的标注来移除它，或者调用 `removeAnnotations:`\
  \ 方法，传入包含多个要移除标注的数组来移除它们。所有地图视图的标注都可以通过名为 `annotations` 的属性进行访问，因此如果您想从视图中移除所有标注，可以这样做：\n\
  \n```\n[mapView removeAnnotations:mapView.annotations];\n```\n\n#### 选中标注\n\n在任何给定时间，只能有一个标注被选中。被选中的标注通常会显示一个*弹出框（callout）*，这是一个浮动气泡或其他视图，用于提供关于该标注的更详细信息。默认的弹出框会显示标注的标题和副标题。然而，您实际上可以自定义弹出框，它只是一个\
  \ `UIView` 的实例。我们不会在本章的应用程序中提供自定义的弹出框视图，但这个过程与我们在《**iOS 6 开发入门**》的第 8 章中自定义表格视图单元格的方式非常相似。有关自定义弹出框的更多信息，请查阅\
  \ `MKAnnotationView` 的文档。\n\n**注意** 尽管当前只能选中单个标注，但 `MKMapView` 实际上使用了一个 `NSArray`\
  \ 的实例来跟踪被选中的标注。这可能表明在未来的某个时候，地图视图将支持同时选中多个标注。目前，如果您提供了一个包含多个标注的 `selectedAnnotations`\
  \ 数组，则只会选中该数组中的第一个对象。\n\n\n\n如果用户点击注释的图像（图 10-4 中的图钉或图 10-6 中的震惊猫），则会选中该注释。您也可以通过`selectAnnotation:animated:`方法以编程方式选中注释，并通过`deselectAnnotation:animated:`方法取消选中注释，传入您想要选中或取消选中的注释。如果向第二个参数传递`YES`，它将为标注气泡的出现或消失添加动画效果。\n\
  \n#### 为地图视图提供注释视图\n\n地图视图通过名为`mapView:viewForAnnotation:`的委托方法，向其委托请求与特定注释相对应的注释视图。每当注释进入地图视图的显示区域时，都会调用此方法。\n\
  \n与表格视图单元格的工作方式非常相似，注释视图在滚动出屏幕时会出队但不会被释放。`mapView:viewForAnnotation:`的实现应在分配新注释视图之前，先询问地图视图是否有任何已出队的注释视图。这意味着`mapView:viewForAnnotation:`看起来会很像您编写过的许多`tableView:cellForRowAtIndexPath:`方法。以下是一个示例，它创建了一个注释视图，设置其`image`属性以显示自定义图像，并返回该视图：\n\
  \n```\n- (MKAnnotationView *) mapView:(MKMapView *)theMapView viewForAnnotation:(id\
  \ <MKAnnotation>) annotation\n{\n    static NSString *placemarkIdentifier = @\"\
  my annotation identifier\";\n    if ([annotation isKindOfClass:[MyAnnotation class]])\
  \ {\n        MKAnnotationView *annotationView =             [theMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
          if (annotationView == nil)  {\n            annotationView = [[MKAnnotationView\
  \ alloc] initWithAnnotation:annotation \n                reuseIdentifier:placemarkIdentifier];\n\
              annotationView.image = [UIImage imageNamed:@\"shocked_cat.png\"];\n\
          } \n        else \n            annotationView.annotation = annotation;\n\
          return annotationView;\n    }\n    return nil;\n}\n```\n\n这里有几件事需要注意。首先，请注意您检查了注释类，以确保它是您所了解的注释。地图视图委托会收到所有注释的通知，而不仅仅是自定义注释。之前，我们讨论过封装用户位置的`MKUserLocation`对象。嗯，那也是一个注释，当您为地图开启用户跟踪时，每当需要显示用户位置时，就会调用您的委托方法。您可以为该注释提供自己的注释视图，但如果返回`nil`，地图视图将使用默认的注释视图。一般来说，对于任何您不认识的注释，您的方法应返回`nil`，地图视图很可能会正确处理它。\n\
  \n请注意，有一个名为`placemarkIdentifier`的标识符值。这使您能够确保出队的是正确类型的注释视图。您不限于只为地图的所有注释使用一种类型的注释视图，而标识符就是您区分哪些注释视图用于何用途的方式。\n\
  \n如果您确实出队了一个注释视图，那么务必将其`annotation`属性设置为传入的注释（在前面的示例中为`annotation`）。已出队的注释视图几乎肯定链接到某个注释，但不一定是应该链接的那个。\n\
  \n#### 地理编码与反向地理编码\n\n核心定位的一个主要特性是*地理编码*。地理编码是指能够将坐标（以经度和纬度指定）转换为该坐标的用户友好表示形式。将用户友好的位置描述（即地址）转换为经纬度称为*正向地理编码*。*反向地理编码*则是将经纬度转换为用户友好的位置描述。\n\
  \n地理编码在核心定位中由`CLGeocoder`类处理。`CLGeocoder`在后台异步工作，查询相应的服务。在正向地理编码的情况下，`CLGeocoder`使用\
  \ iPhone 内置的 GPS 功能。对于反向地理编码，`CLGeocoder`查询一个大型坐标数据库（在此情况下，是苹果的数据库）。\n\n在几乎所有位置，反向地理编码都能告诉您所在的国家和州或省。人口越稠密的区域，您可能获得的信息就越多。如果您身处大城市市中心，您很可能能够检索到所在建筑物的街道地址。在大多数城市和城镇，反向地理编码至少能让您知道所在街道的名称。棘手之处在于，您永远无法确定会获得何种详细程度的信息。\n\
  \n对于本章的应用程序，您将使用`CLGeocoder`的反向地理编码功能。要执行反向地理编码，首先创建一个`CLGeocoder`实例。然后调用`reverseGeocodeLocation:completionHandler:`来执行地理编码。`completionHandler:`参数的类型是`CLGeocodeCompletionHandler`，这是一个*块*。块是一个匿名内联函数，它封装了其执行位置的词法作用域。对于`reverseGeocodeLocation:completionHandler:`，无论反向地理编码尝试成功还是失败，都会执行`completionHandler:`块。\n\
  \n```\nCLGeocoder *geocoder = [[CLGeocoder alloc] init];\n[geocoder reverseGeocodeLocation:location\
  \ completionHandler:^(NSArray *placemarks, NSError *error) {\n    // process the\
  \ location or errors\n     ...\n}\n```\n\n**注意**  您可以从苹果了解更多关于块的信息。他们关于块的文档从这里开始：\n\
  \n[`developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html`](https://developer.apple.com/library/ios/#featuredarticles/Short_Practical_Guide_Blocks/_index.html)\n\
  \n如果反向地理编码成功，将调用完成处理程序，并且`placemarks`数组将被填充。该数组应只包含一个对象，类型为`CLPlacemark`。如果在反向地理编码期间发生错误或请求被取消，则`placemarks`数组将为`nil`。在这种情况下，完成处理程序将收到一个`NSError`对象，详细说明失败原因。\n\
  \n表 10-1 将`CLPlacemark`的术语映射为您可能更熟悉的术语。\n\n表 10-1. `CLPlacement` 属性定义\n\n| `CLPlacemark`\
  \ 属性 | 含义 |\n| --- | --- |\n| `Thoroughfare` | 街道地址。如果是多行，则为第一行。 |\n| `subThoroughfare`\
  \ | 街道地址，第二行（例如，公寓或单元号、邮箱号） |\n| `Locality` | 城市 |\n| `SubLocality` | 这可能包含社区或地标名称，但通常为`nil`\
  \ |\n| `administrativeArea` | 州、省、地区或其他类似单位 |\n| `dministrativeArea` | 县 |\n| `postalCode`\
  \ | 邮政编码 |\n| `Country` | 国家 |\n| `countryCode` | 两位 ISO 国家代码（参见：[`en.wikipedia.org/wiki/ISO_3166-1_alpha-2`](http://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)）\
  \ |\n\n知道吗？关于地图套件的讨论就到此为止。让我们开始实际使用它吧。\n\n### 构建 MapMe 应用程序\n\n让我们构建一个展示地图套件一些基本功能的应用程序。首先，使用“Single\
  \ View Application”模板在 Xcode 中创建一个新项目。将新项目命名为**MapMe**。您将不会使用故事板，因此只应勾选“Use Automatic\
  \ Reference Counting”复选框。\n\n#### 链接地图套件和核心定位框架\n\n\n\n在开始编写任何代码之前，你需要先添加 **Core\
  \ Location** 和 **Map Kit** 框架。在项目编辑器中导航到 `MapMe` 目标的 **Build Phases** 选项卡。展开 **Link\
  \ Binary With Libraries (3 items)** 部分。点击左下角的 `+` 按钮。选择 `CoreLocation.framework`\
  \ 和 `MapKit.framework`（记住，你可以按住 ![image](img/flower1.jpg) 键点击来同时选择多个框架）。点击 **Add**\
  \ 按钮。这两个框架应该会出现在导航窗格中。你可以将 `CoreLocation.framework` 和 `MapKit.framework` 拖拽到 **Frameworks**\
  \ 组中，让项目结构更整洁一些。\n\n### 构建界面\n\n选择 `ViewController.xib` 来编辑用户界面。当 Interface Builder\
  \ 打开后，从库中拖拽一个圆角矩形按钮到视图上。使用蓝色参考线将按钮对齐到视图的右下角。双击这个新放置的按钮来编辑其标题，并输入 `Go`。\n\n从库中拖拽一个进度视图，并将其放置在按钮的左侧，使进度视图的顶部与按钮的顶部对齐。使用蓝色参考线调整大小，使其水平方向从左边界延伸到右边界。它会与按钮重叠，这是没问题的。\n\
  \n接下来，从库中拖拽一个标签到视图上，并将其放置在进度条的下方。水平调整其大小，使其占据从左边界参考线到右边界参考线的整个宽度。现在，使用属性检查器将标签的文本设置为居中对齐，并将字体大小更改为\
  \ 13，以便文本更合适。最后，删除“Label.”这段文本。\n\n在对象库中找到地图视图（图 10-7）。将地图视图拖拽到视图上。将地图视图的顶部和左侧与视图对齐。将地图视图的宽度调整为窗口视图的宽度。然后将地图视图向底部调整大小，直到出现蓝色参考线，刚好位于你之前放置在底部的进度条和按钮上方（图\
  \ 10-8）。\n\n![9781430238072_Fig10-07.jpg](img/9781430238072_Fig10-07.jpg)\n\n图 10-7  地图视图在对象库中的显示（列表视图）\n\
  \n![9781430238072_Fig10-08.jpg](img/9781430238072_Fig10-08.jpg)\n\n图 10-8  在进度条和按钮上方布局地图视图\n\
  \n现在，你要建立 **Outlets** 和 **Action** 连接。将编辑器置于 **Assistant** 模式（通过工具栏）。**Assistant**\
  \ 应在 Interface Builder 右侧打开 `ViewController.h`。按住 **Control** 键并从 `Go` 按钮拖拽到 `@interface`\
  \ 声明下方。请确保你已经选中了按钮，而不是（不可见的）标签。当连接弹出窗口出现时，**Type** 字段应为 `UIButton`。将连接类型设置为 **Outlet**，并将其命名为\
  \ `button`。接下来，再次按住 Control 键并从 `Go` 按钮拖拽到 `@end` 声明上方。这次添加一个 **Action**，并将其命名为\
  \ `findMe`。\n\n现在，按住 Control 键从进度条拖拽到你刚才添加的按钮属性下方。创建一个名为 `progressBar` 的 **Outlet**，确保其类型为\
  \ `UIProgressView`。使用属性编辑器，点击标记为 **Hidden** 的复选框，这样进度条在你想要向用户报告进度之前都是不可见的。\n\n接下来，按住\
  \ Control 键从（不可见的）标签拖拽到 `progressBar` 属性下方。你需要猜测标签的大致位置。或者，你也可以像上一章那样，从 **Object\
  \ Dock**（对象停靠栏）中拖拽标签。无论哪种方式，都将这个 outlet 命名为 `progressLabel`。\n\n最后，按住 Control 键从地图视图拖拽到\
  \ `progressLabel` 属性声明下方。将这个 outlet 命名为 `mapView`。按住 Control 键从地图视图拖拽到 **Object\
  \ Dock** 中的 **File's Owner** 图标。当 **Outlets** 弹出窗口出现时，选择 **delegate**。\n\n保存 XIB。在继续之前，将编辑器切换回\
  \ **Standard** 模式。\n\n### 完成视图控制器接口\n\n选择 `ViewController.h` 进行编辑。首先，导入 Map Kit\
  \ 和 Core Location 的头文件，因为你要在此应用中使用 Core Location 和 Map Kit。\n\n```objc\n#import\
  \ <CoreLocation/CoreLocation.h>\n#import <MapKit/MapKit.h>\n```\n\n你需要让你的类遵循以下代理协议：\n\
  \n*   `CLLocationManagerDelegate`：以便你能收到来自 Core Location 关于用户当前位置的通知。\n*   `MKMapKitDelegate`：因为你将成为地图视图的委托对象。\n\
  *   `UIAlertViewDelegate`：用于处理告警视图，当出现问题时，你将用它来通知用户。\n\n```objc\n@interface ViewController\
  \ : UIViewController <CLLocationManagerDelegate, MKMapViewDelegate, \n                                              \
  \ UIAlertViewDelegate>\n```\n\n紧跟在 `@interface` 声明之后，你声明了三个实例变量，用于存储你将在应用中使用的 `CLLocationManager`、`CLGeocoder`\
  \ 和 `CLPlacemark` 对象。你将其声明为实例变量而非属性，因为你不需要将这些对象暴露给你的接口。\n\n```objc\n{\n    CLLocationManager\
  \ *manager;\n    CLGeocoder *geocoder;\n    CLPlacemark *placemark;\n}\n```\n\n\
  **注意**  尽管地图视图能够追踪用户的当前位置，但在此应用中，你将使用 Core Location 手动追踪用户位置。通过手动操作，我们可以向你展示更多 Map\
  \ Kit 的功能。如果你在自己的应用中需要追踪用户位置，只需让地图视图替你完成即可。\n\n就是这样。你已通过 Interface Builder 声明了所需的\
  \ **Outlets** 和 **Action**。保存 `ViewController.h`。在编写实现文件之前，你需要先处理你的标注类。\n\n### 编写标注对象类\n\
  \n你需要创建一个类来保存你的标注对象。你将构建一个简单的类来存储一些地址信息，这些信息将从地理编码器中获取。在导航窗格中选择 `MapMe` 组。创建一个名为\
  \ `MapLocation` 的新 Objective-C 类，并使其成为 `NSObject` 的子类。\n\n新文件创建好后，单击 `MapLocation.h`。首先，你需要包含\
  \ Map Kit 的头文件。\n\n```objc\n#import <MapKit/MapKit.h>\n```\n\n你需要更改 `MapLocation`\
  \ 以使其遵循 `MKAnnotation` 和 `NSCoding` 协议。\n\n```objc\n@interface MapLocation : NSObject\
  \ <MKAnnotation, NSCoding>\n```\n\n我们说过标注对象是非常标准的数据模型类，对吧？我们让其遵循了 `MKAnnotation`\
  \ 和 `NSCoding` 协议。你实际上并不会使用归档功能，但让数据模型类遵循 `NSCoding` 是一个好习惯。\n\n接下来，你需要属性来存储地址数据，以及一个\
  \ `CLLocationCoordinate2D` 属性，用于在地图上追踪此标注的位置。\n\n```objc\n@property (strong, nonatomic)\
  \ NSString *street;\n@property (strong, nonatomic) NSString *city;\n@property (strong,\
  \ nonatomic) NSString *state;\n@property (strong, nonatomic) NSString *zip;\n@property\
  \ (nonatomic, readwrite) CLLocationCoordinate2D coordinate;\n```\n\n请注意，你特意将 `coordinate`\
  \ 属性声明为了 `readwrite`。`MKAnnotation` 协议将此属性声明为 `readonly`。你也可以按此方式声明，然后通过使用底层实例变量来设置\
  \ `coordinate` 属性，但你要使用该属性来让其他类设置你的标注的坐标。重新定义属性，使其比在已遵循的协议或超类中声明的同一属性具有更宽松的访问权限，这是允许的。你总是可以将\
  \ `readonly` 或 `writeonly` 属性重新定义为 `readwrite`，但必须显式使用 `readwrite` 关键字。大多数情况下，这个关键字不会被用到，因为它是默认值，且并非必要。\n\
  \n保存 `MapLocation.h` 并切换到实现文件 `MapLocation.m`。首先，实现 `MKAnnotation` 协议的方法。\n\n```objc\n\
  #pragma mark - MKAnnotation 协议方法\n```\n\n\n\n- (NSString *)title\n{\n    return\
  \ NSLocalizedString(@\"你在这里！\", @\"你在这里！\");\n}\n\n- (NSString *)subtitle\n{\n \
  \   NSMutableString *result = [NSMutableString string];\n    if (self.street)\n\
  \        [result appendString:self.street];\n    if (self.street && (self.city ||\
  \ self.state || self.zip))\n        [result appendString:@\", \"];\n    if (self.city)\n\
  \        [result appendString:self.city];\n    if (self.city && self.state)\n  \
  \      [result appendString:@\", \"];\n    if (self.state)\n        [result appendString:self.state];\n\
  \    if (self.zip)\n        [result appendFormat:@\"  %@\", self.zip];\n\nreturn\
  \ result;\n}\n\n这里其实没有任何会让你感到困惑的内容。对于`MKAnnotation`协议中的`title`方法，你只需返回“你在这里！”。然而，`subtitle`方法要稍微复杂一些。由于你无法预知反向地理编码器会返回哪些数据元素，因此必须根据已有的数据来构建副标题字符串。实现方式就是声明一个可变字符串，然后依次追加那些非\
  \ nil、非空属性的值。\n\n此外，你还需要实现`NSCoder`协议的方法。\n\n```objc\n#pragma mark - NSCoder 协议方法\n\
  \n- (void)encodeWithCoder:(NSCoder *)aCoder\n{\n    [aCoder encodeObject:self.street\
  \ forKey:@\"street\"];\n    [aCoder encodeObject:self.city forKey:@\"city\"];\n\
  \    [aCoder encodeObject:self.state forKey:@\"state\"];\n    [aCoder encodeObject:self.zip\
  \ forKey:@\"zip\"];\n}\n\n- (id)initWithCoder:(NSCoder *)aDecoder\n{\n    self =\
  \ [super init];\n    if (self) {\n        [self setStreet:[aDecoder decodeObjectForKey:@\"\
  street\"]];\n        [self setCity:[aDecoder decodeObjectForKey:@\"city\"]];\n \
  \       [self setState:[aDecoder decodeObjectForKey:@\"state\"]];\n        [self\
  \ setZip:[aDecoder decodeObjectForKey:@\"zip\"]];\n    }\n    return self;\n}\n\
  ```\n\n其余部分都是对`MapLocation`类进行编码和解码的标准操作，所以我们接着来实现`ViewController`类。继续操作前，请先保存`MapLocation.m`文件。\n\
  \n实现 MapMe 的 ViewController\n\n单击`ViewController.m`文件。首先，添加对`MapLocation`头文件的导入。\n\
  \n```objc\n#import \"MapLocation.h\"\n```\n\n接下来，你需要定义一些用于处理标注和反向地理编码的私有类别方法。在类别接口声明中，添加以下两个方法声明：\n\
  \n```objc\n@interface ViewController ()\n- (void)openCallout:(id<MKAnnotation>)annotation;\n\
  - (void)reverseGeocode:(CLLocation *)location;\n@end\n```\n\n然后，在`viewDidLoad:`方法中设置地图视图的地图类型。声明所有三种地图类型，其中两种被注释掉。这样做只是为了方便你切换当前使用的类型并进行一些实验。将这些代码添加到对`super`的调用之后。\n\
  \n```objc\nself.mapView.mapType = MKMapTypeStandard;\n//self.mapView.mapType = MKMapTypeSatellite;\n\
  //self.mapView.mapType = MKMapTypeHybrid;\n```\n\n现在，实现当用户按下按钮时被调用的操作（Action）方法`findMe`。\n\
  \n```objc\n#pragma mark - 操作方法\n\n- (IBAction)findMe:(id)sender\n{\n    if (manager\
  \ == nil)\n        manager = [[CLLocationManager alloc] init];\n\nmanager.delegate\
  \ = self;\n    manager.desiredAccuracy = kCLLocationAccuracyBest;\n    [manager\
  \ startUpdatingLocation];\n\nself.progressBar.hidden = NO;\n    self.progressBar.progress\
  \ = 0.0;\n    self.progressLabel.text = NSLocalizedString(@\"正在确定当前位置\",       \
  \                                         \n                                   \
  \              @\"正在确定当前位置\");\n\nself.button.hidden = YES;\n}\n```\n\n如前所述，你本可以使用地图视图追踪用户位置的功能，但为了学习更多功能，你选择了手动方式。因此，你分配并初始化了一个`CLLocationManager`实例来确定用户位置。你将`self`设置为代理，并告诉位置管理器你需要最高精度，然后才让它开始更新位置。接着，你取消隐藏进度条，并设置进度标签以告知用户正在尝试确定当前位置。最后，你隐藏了按钮，这样用户就无法再次点击它。\n\
  \n现在，你来实现之前在`ViewController.m`开头声明的私有类别方法。\n\n```objc\n#pragma mark - （私有）实例方法\n\
  \n- (void)openCallout:(id<MKAnnotation>)annotation\n{\n    self.progressBar.progress\
  \ = 1.0;\n    self.progressLabel.text = NSLocalizedString(@\"正在显示标注\", @\"正在显示标注\"\
  );\n    [self.mapView selectAnnotation:annotation animated:YES];\n}\n```\n\n稍后你将使用`openCallout:`方法来选中你的标注。当你将标注添加到地图视图时，无法直接选中它。你必须等到它被添加之后才能选中。这个方法通过使用`performSelector:withObject:afterDelay:`来允许你选中一个标注，从而打开该标注的标注框（callout）。在此方法中，你只需更新进度条和进度标签以显示你已进入最后一步，然后使用`MKMapView`的`selectAnnotation:animated:`方法来选中标注，这将会显示其标注视图。\n\
  \n你还声明了另一个名为`reverseGeocode:`的私有方法。同样，稍后你会用到它。给定一个`CLLocation`实例，它会尝试对位置进行反向地理编码。如果成功，它将创建一个`MapLocation`标注并将其发送到地图视图。如果发生错误，则会弹出一个警告对话框。\n\
  \n```objc\n- (void)reverseGeocode:(CLLocation *)location\n{\n    if (!geocoder)\n\
  \        geocoder = [[CLGeocoder alloc] init];\n\n[geocoder reverseGeocodeLocation:location\
  \ completionHandler:^(NSArray* placemarks, NSError* error){\n        if (nil !=\
  \ error) {\n            UIAlertView *alert =                 [[UIAlertView alloc]\
  \                     initWithTitle:NSLocalizedString(@\"将坐标转换为位置时出错\",\n      \
  \                                              @\"将坐标转换为位置时出错\")\n             \
  \       message:NSLocalizedString(@\"地理编码器无法识别坐标\",\n                          \
  \                    @\"地理编码器无法识别坐标\")\n                    delegate:self\n    \
  \                cancelButtonTitle:NSLocalizedString(@\"确定\", @\"确定\")\n       \
  \             otherButtonTitles:nil];\n            [alert show];\n\n}\n        else\
  \ if ([placemarks count] > 0) {\n            placemark = [placemarks objectAtIndex:0];\n\
  \nself.progressBar.progress = 0.5;\n            self.progressLabel.text = NSLocalizedString(@\"\
  位置已确定\",                                                         @\"位置已确定\");\n\n\
  MapLocation *annotation = [[MapLocation alloc] init];\n            annotation.street\
  \ = placemark.thoroughfare;\n            annotation.city = placemark.locality;\n\
  \            annotation.state = placemark.administrativeArea;\n            annotation.zip\
  \ = placemark.postalCode;\n            annotation.coordinate = location.coordinate;\n\
  \n[self.mapView addAnnotation:annotation];\n        }\n    }];\n}\n```\n\n接下来，添加`CLLocationManagerDelegate`方法。\n\
  \n```objc\n#pragma mark - CLLocationManagerDelegate 方法\n\n- (void)locationManager:(CLLocationManager\
  \ *)aManager    \n    didUpdateToLocation:(CLLocation *)newLocation            \n\
  \        fromLocation:(CLLocation *)oldLocation\n{\n    if ([newLocation.timestamp\
  \ timeIntervalSince1970] < [NSDate timeIntervalSinceReferenceDate] - 60)\n     \
  \   return;\n```\n\n\n\n```objc\nMKCoordinateRegion viewRegion =\n    MKCoordinateRegionMakeWithDistance(newLocation.coordinate,\
  \ 2000, 2000);\nMKCoordinateRegion adjustedRegion = [self.mapView regionThatFits:viewRegion];\n\
  [self.mapView setRegion:adjustedRegion animated:YES];\n\naManager.delegate = nil;\n\
  [aManager stopUpdatingLocation];\n\nself.progressBar.progress = 0.25;\nself.progressLabel.text\
  \ = NSLocalizedString(@\"Reverse Geocoding Location\",\n                       \
  \                     @\"Reverse Geocoding Location\");\n\n[self reverseGeocode:newLocation];\n\
  ```\n\n首先，你需要检查当前操作使用的是否是最近一分钟内获取的**新位置**，而非缓存的位置。然后使用 `MKCoordinateRegionMakeWithDistance()`\
  \ 函数创建一个区域，该区域以用户当前位置为中心，边长为 2000 米（各向延伸 1000 米）。接着根据地图视图的宽高比调整该区域，并让地图视图显示这个调整后的新区域。现在你已经得到了非缓存的位置信息，接下来要停止让位置管理器继续提供更新。位置更新会消耗电量，因此当不再需要更新时，应关闭位置管理器。随后更新进度条和标签，让用户了解当前在整个流程中的进度。这是点击\
  \ `Go` 按钮后的四个步骤中的第一步，因此你将进度设为 `.25`，这会显示四分之一的蓝色进度条。最后，调用 `reverseGeocoder:` 方法将新位置转换为注释并更新地图视图。\n\
  \n如果位置管理器遇到错误，只需弹出一个警告框。虽然不是最 robust 的错误处理方案，但对于本教程来说已经足够了。\n\n```objc\n- (void)locationManager:(CLLocationManager\
  \ *)manager didFailWithError:(NSError *)error\n{\n    NSString *errorType = (error.code\
  \ == kCLErrorDenied)\n                        ? NSLocalizedString(@\"Access Denied\"\
  , @\"Access Denied\")\n                        : NSLocalizedString(@\"Unknown Error\"\
  , @\"Unknown Error\");\n\nUIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Error getting Location\",\n                                                    \
  \                       @\"Error getting Location\")\n                         \
  \                         message:errorType\n                                  \
  \               delegate:self\n                                        cancelButtonTitle:NSLocalizedString(@\"\
  OK\", @\"OK\")\n                                        otherButtonTitles:nil];\n\
  \    [alert show];\n}\n```\n\n现在，添加 `MapView` 的代理方法。\n\n```objc\n#pragma mark -\
  \ MKMapViewDelegate Methods\n\n- (MKAnnotationView *)mapView:(MKMapView *)aMapView\
  \ viewForAnnotation:(id<MKAnnotation>)annotation\n{\n    static NSString *placemarkIdentifier\
  \ = @\"Map Location Identifier\";\n    if ([annotation isKindOfClass:[MapLocation\
  \ class]]) {\n        MKPinAnnotationView *annotationView =\n          (MKPinAnnotationView\
  \ *)[aMapView dequeueReusableAnnotationViewWithIdentifier:placemarkIdentifier];\n\
  \        if (nil == annotationView) {\n            annotationView = [[MKPinAnnotationView\
  \ alloc] initWithAnnotation:annotation\n                                       \
  \                      reuseIdentifier:placemarkIdentifier];\n        }\n      \
  \  else\n            annotationView.annotation = annotation;\n\nannotationView.enabled\
  \ = YES;\n        annotationView.animatesDrop = YES;\n        annotationView.pinColor\
  \ = MKPinAnnotationColorPurple;\n        annotationView.canShowCallout = YES;\n\
  \        [self performSelector:@selector(openCallout:) withObject:annotation afterDelay:0.5];\n\
  \nself.progressBar.progress = 0.75;\n        self.progressLabel.text = NSLocalizedString(@\"\
  Creating Annotation\", @\"Creating Annotation\");\n\nreturn annotationView;\n  \
  \  }\n    return nil;\n}\n```\n\n当你作为代理的地图视图需要一个注释视图时，它会调用 `mapView:viewForAnnotation:`。首先要做的是声明一个标识符，以便能够重用（dequeue）正确的注释视图类型，然后确保地图视图询问的是你了解的注释类型。如果是，就用标识符从重用队列中取出一个\
  \ `MKPinAnnotationView` 实例。如果没有可重用的视图，则创建一个新的。你也可以在此处使用 `MKAnnotationView` 代替 `MKPinAnnotationView`。实际上，在项目归档中有一个备选版本，展示了如何使用\
  \ `MKAnnotationView` 显示自定义注释视图而非大头针。如果你没有创建新视图，说明从地图视图中获取了一个重用的视图，此时需要确保该视图与正确的注释关联。然后进行一些配置。\n\
  \n- 确保注释视图已启用，以便可以被选中。\n- 将 `animatesDrop` 设置为 `YES`，因为这是一个大头针视图，你希望它像通常的大头针那样掉落到地图上。\n\
  - 将大头针颜色设置为紫色，并确保它可以显示标注气泡。\n- 之后，使用 `performSelector:withObject:afterDelay:` 调用你之前创建的那个私有方法。\n\
  - 注释视图实际显示在地图上之前无法被选中，因此你等待半秒钟确保显示完成后再进行选中。这也确保在标注气泡显示前大头针已结束下落动画。\n- 需要更新进度条和文字标签，让用户知道任务即将完成。\n\
  - 然后返回注释视图。如果该注释不是你所识别的类型，则返回 `nil`，地图视图将为该类型注释使用默认的注释视图。\n- 实现 `mapViewDidFailLoadingMap:withError:`，并在加载地图出现问题时通知用户。同样，本应用程序中的错误检查非常基础；只是通知用户并停止所有操作。\n\
  \n```objc\n- (void)mapViewDidFailLoadingMap:(MKMapView *)aMapView withError:(NSError\
  \ *)error\n{\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"\
  Error loading map\",\n                                                         \
  \                     @\"Error loading map\")\n                                \
  \                    message:[error localizedDescription]\n                    \
  \                               delegate:nil\n                                 \
  \         cancelButtonTitle:NSLocalizedString(@\"OK\", @\"OK\")\n              \
  \                            otherButtonTitles:nil];\n    [alert show];\n}\n```\n\
  \n- 最后，实现 `UIAlertView` 的代理方法。它将隐藏进度条，并将进度标签设置为空字符串。为简化起见，如果出现问题，我们直接让应用程序终止。在你的实际应用中，可能需要采取更友好的处理方式。\n\
  \n```objc\n#pragma mark - UIAlertViewDelegate Method\n\n- (void)alertView:(UIAlertView\
  \ *)alertView didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    self.progressBar.hidden\
  \ = YES;\n    self.progressLabel.text = @\"\";\n    self.button.hidden = NO;\n}\n\
  ```\n\n现在你应该能够构建并运行你的应用程序了，请尝试一下。\n\n**注意**：在模拟器中运行时，可能会遇到问题。请尝试启动应用，但在按下 `Go` 按钮之前，使用调试跳转栏中的位置模拟器设置一个位置。\n\
  \n尝试修改代码。更改地图类型、添加更多注释，或尝试使用自定义注释视图。\n\n向东前进吧，年轻的程序员！\n\n\n\n"
- '# 地图套件


  关于地图套件的讨论到此结束。你了解了使用地图套件、标注和反向地理编码器的基础知识。你看到了如何创建坐标区域和坐标跨度，以指定地图视图应向用户显示的区域，并且学会了如何使用地图套件的反向地理编码器，将一组坐标转换为物理地址。


  现在，带上你的 iPhone、地图套件和坚定的决心，向东翻一页，呃……或者说向右，以便我们可以讨论 iOS 消息传递。


  '
- "# 第 11 章：消息传递：邮件、短信和社交媒体\n\n自 iOS SDK 诞生之初，苹果就为开发者提供了发送消息的手段。这一切始于 `MessageUI`\
  \ 框架，该框架允许开发者在其应用中增加发送电子邮件消息的支持。接着，苹果扩展了 `MessageUI` 框架，使其支持短信。在 iOS 5 中，苹果通过一个新的\
  \ Twitter 框架增加了对 Twitter 的支持。如今，在 iOS 6 中，苹果已从 Twitter 框架迁移到 `Social` 框架，增加了对 Facebook、新浪微博和\
  \ Twitter 的支持。让我们逐一了解每种消息系统的工作原理。\n\n### 本章应用\n\n在本章中，你将构建一个应用程序，它允许用户使用 iPhone\
  \ 的摄像头拍摄照片，或者，如果他们使用的是模拟器而没有摄像头，那么你将允许他们从照片库中选择一张图片。他们可以对得到的图片进行处理，并通过电子邮件、短信、Facebook\
  \ 或 Twitter 发送给朋友，而无需离开应用程序。\n\n**注意**  虽然可以通过“信息”应用发送照片，但苹果并未向开发者公开此功能。此功能被称为*多媒体短信服务*，简称\
  \ MMS。iOS SDK 仅允许你使用*短消息服务*（SMS）发送文本消息。因此，在应用程序中你只能发送文本消息。\n\n你的应用程序界面将非常简单（图 11-1）。它将包含一个用于启动整个过程的按钮。点击该按钮将调出相机选择控制器，其方式与《Beginning\
  \ iOS 6 Development》（Apress, 2012）第 20 章的示例程序类似。一旦用户拍摄或选择了图片，他们将能够裁剪和/或缩放图片（图 11-2）。假设他们没有取消操作，图片选择器将返回一张图片，并显示一个活动视图，询问用户希望如何发送消息（图\
  \ 11-3）。根据他们的选择，你将显示相应的撰写视图（图 11-4）。你将用文本和选中的图片（除非是短信）填充撰写视图。最后，一旦消息发送，你将提供一些反馈，确认消息已发送。\n\
  \n![9781430238072_Fig11-01.jpg](img/9781430238072_Fig11-01.jpg)\n\n图 11-1.  本章的应用拥有一个非常简单的用户界面，包含一个按钮\n\
  \n![9781430238072_Fig11-02.jpg](img/9781430238072_Fig11-02.jpg)\n\n图 11-2.  用户可以用相机拍照或从照片库中选取图片，然后裁剪并缩放图片\n\
  \n![9781430238072_Fig11-03.jpg](img/9781430238072_Fig11-03.jpg)\n\n图 11-3.  选择并编辑图片后，你将显示消息选择器视图\n\
  \n![9781430238072_Fig11-04.jpg](img/9781430238072_Fig11-04.jpg)\n\n图 11-4.  邮件、Twitter\
  \ 和 Facebook 的撰写视图\n\n**警告**  本章中的应用程序将在模拟器中运行，但不会使用相机，而是允许你从模拟器的照片库中选择一张图片。如果你曾经使用过模拟器中的“重置内容和设置”菜单项，那么你很可能已经丢失了相册的默认内容，并且没有可用的图片。你可以通过在模拟器中启动\
  \ Mobile Safari 并导航到网页上的图片来纠正这一点。确保你正在查看的图片*不是*链接，而是一张静态图片。此方法不适用于链接图片。将鼠标光标悬停在一张图片上，点击并按住鼠标按钮，会弹出一个操作表。其中一个选项是“存储图像”。这会将选中的图片添加到你的\
  \ iPhone 照片库中。\n\n此外，请注意，你将无法在模拟器中发送电子邮件。你可以创建电子邮件，模拟器会显示已发送，但这都是假的。邮件最终只会进入“待发送”列表。\n\
  \n### `MessageUI` 框架\n\n要将电子邮件和短信服务嵌入到你的应用程序中，请使用 `MessageUI` 框架。它是 iOS SDK 中最小的框架之一。它由两个类\
  \ `MFMailComposeViewController` 和 `MFMessageComposeViewController`，以及它们对应的委托协议组成。\n\
  \n每个类都附带一个静态方法，用于判断设备是否支持该服务。对于 `MFMailComposeViewController`，该方法是 `canSendMail`；对于\
  \ `MFMessageComposeViewController`，该方法是 `canSendText`。在尝试发送电子邮件或短信之前，检查你的设备是否能够发送是一个好主意。\n\
  \n```\nif ([MFMailComposeViewController canSendMail)] {\n    // 发送电子邮件的代码\n    .\
  \ . .\n}\nif ([MFMessageComposeViewController canSendText]) {\n    // 发送短信的代码\n\
  \    . . .\n}\n```\n\n让我们先回顾一下电子邮件类 `MFMailComposeViewController`。\n\n#### 创建邮件撰写视图控制器\n\
  \n使用 `MFMailComposeViewController` 类非常简单。你创建一个实例，设置其委托，设置任何你想要预填的属性，然后以模态方式呈现它。当用户完成电子邮件的撰写并点击发送或取消按钮时，邮件撰写视图控制器会通知其委托，由委托负责关闭模态视图。以下是创建邮件撰写视图控制器并设置其委托的方法：\n\
  \n```\nMFMailComposeViewController *mc = [[MFMailComposeViewController alloc] init];\n\
  mc.mailComposeDelegate = self;\n```\n\n#### 填充主题行\n\n在呈现邮件撰写视图之前，你可以预先配置邮件撰写视图控制器的各种字段，例如主题和收件人（收件人:、抄送:\
  \ 和密送:），以及正文和附件。你可以通过调用 `MFMailComposeViewController` 实例上的 `setSubject:` 方法来填充主题，如下所示：\n\
  \n```\n[mc setSubject:@\"你好，世界！\"];\n```\n\n#### 填充收件人\n\n电子邮件可以发送给三类收件人。邮件的主要收件人称为*收件人:*，显示在标有*收件人:*的行上。被抄送的收件人显示在*抄送:*行上。如果你想将某人包含在邮件中，但又不让其他收件人知道此人也在接收邮件，则可以使用*密送:*行（代表“盲抄送”）。使用\
  \ `MFMailComposeViewController` 时，你可以填充所有这三个字段。\n\n要设置主要收件人，请使用 `setToRecipients:`\
  \ 方法，并传入一个包含所有收件人电子邮件地址的 `NSArray` 实例。示例如下：\n\n```\n[mc setToRecipients:@[@\"manny.sullivan@me.com\"\
  ]];\n```\n\n以相同方式设置其他两类收件人，不过你将分别使用 `setCcRecipients:` 方法处理抄送收件人，以及 `setBccRecipients:`\
  \ 方法处理密送收件人。\n\n```\n[mc setCcRecipients:@[@\"maru@boxes.co.jp\"]];\n[mc setBccRecipients:@[@\"\
  lassie@helpfuldogs.org\"]];\n```\n\n#### 设置消息正文\n\n\n\n您也可以使用任意文本填充邮件正文。您既可以使用普通字符串创建纯文本邮件，也可以使用\
  \ HTML 创建格式化邮件。要为邮件撰写视图控制器提供邮件正文，请使用 `setMessageBody:isHTML:` 方法。如果您传入的字符串是纯文本，则应将\
  \ `NO` 作为第二个参数传入；但如果您在第一个参数中提供的是 HTML 标记而非纯文本字符串，则应在第二个参数中传入 `YES`，以便您的标记在显示给用户之前会被解析。\n\
  \n```\n[mc setMessageBody:@\"Ohai!!!\\n\\nKThxBai\" isHTML:NO];\n[mc setMessageBody:@\"\
  <HTML><B>Ohai</B><BR/>I can has cheezburger?</HTML>\" isHTML:YES];\n```\n\n####\
  \ 添加附件\n\n您也可以为外发邮件添加附件。为此，您必须提供一个包含待附加数据的 `NSData` 实例，以及附件的 MIME 类型和要用于附件的文件名。*MIME\
  \ 类型*（我们在第 9 章讨论与 Web 服务器交互时简要提及过）是定义通过互联网传输的数据类型的字符串。它们用于从 Web 服务器检索或发送文件，也用于发送电子邮件附件。要为外发邮件添加附件，请使用\
  \ `addAttachmentData:mimeType:fileName:` 方法。以下是一个将应用程序包中存储的图像添加为附件的示例：\n\n```\n\
  NSString *path = [[NSBundle mainBundle] pathForResource:@\"surpriseCat\" ofType:@\"\
  png\"];\nNSData *data = [NSData dataWithContentsOfFile:path];\n[mc addAttachmentData:data\
  \ mimeType:@\"image/png\" fileName:@\"surpriseCat\"];\n```\n\n#### 呈现邮件撰写视图\n\n\
  一旦您使用所有要填充的数据配置好控制器后，就可以像之前一样呈现控制器的视图：\n\n```\n[self presentViewController:mc animated:YES\
  \ completion:nil];\n```\n\n#### 邮件撰写视图控制器委托方法\n\n邮件撰写视图控制器委托的方法包含在正式协议 `MFMailComposeViewControllerDelegate`\
  \ 中。无论用户是发送还是取消，也无论系统是否能够发送消息，都会调用 `mailComposeController:didFinishWithResult:error:`\
  \ 方法。与大多数委托方法一样，第一个参数是指向调用委托方法的对象的指针。第二个参数是*结果码*，它告诉您外发邮件的最终状态；第三个参数是 `NSError`\
  \ 实例，如果遇到问题，它将提供更详细的信息。无论您收到什么结果码，您都有责任在此方法中通过调用 `dismissModalViewControllerAnimated:`\
  \ 来关闭邮件撰写视图控制器。\n\n如果用户点击了“取消”按钮，您的委托将收到结果码 `MFMailComposeResultCancelled`。在这种情况下，用户改变了主意，决定不发送邮件。如果用户点击了“发送”按钮，结果码将取决于\
  \ `MessageUI` 框架是否能够成功发送邮件。如果能够发送消息，结果码将是 `MFMailComposeResultSent`。如果尝试发送但失败了，结果码将是\
  \ `MFMailComposeResultFailed`，在这种情况下，您可能希望检查提供的 `NSError` 实例以了解哪里出了问题。如果由于当前没有网络连接而无法发送消息，但消息已保存到发件箱中以供稍后发送，您将收到结果码\
  \ `MFMailComposeResultSaved`。\n\n以下是一个非常简单的委托方法实现，它仅记录了所发生的情况：\n\n```\n- (void)mailComposeController:(MFMailComposeViewController*)controller\n\
              didFinishWithResult:(MFMailComposeResult)result\n                        \
  \ error:(NSError*)error\n{\n    switch (result)\n    {\n        case MFMailComposeResultCancelled:\n\
              NSLog(@\"邮件发送已取消……\");\n            break;\n        case MFMailComposeResultSaved:\n\
              NSLog(@\"邮件已保存……\");\n            break;\n        case MFMailComposeResultSent:\n\
              NSLog(@\"邮件已发送……\");\n            break;\n        case MFMailComposeResultFailed:\n\
              NSLog(@\"邮件发送错误：%@……\", [error localizedDescription]);\n            break;\n\
          default:\n            break;\n    }\n    [controller dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n#### 消息撰写视图控制器\n\n`MFMessageComposeViewController`\
  \ 与邮件类的对应控制器类似，但更简单。首先，您需要创建一个实例并设置其委托。\n\n```\nMFMessageComposeViewController *mc\
  \ = [[MFMessageComposeViewController alloc] init];\nmc.messageComposeDelegate =\
  \ self;\n```\n\n只有两个属性可以填充：`recipients` 和 `body`。与邮件不同，这些属性可以通过类的直接属性以及方法访问器来访问。`Recipients`\
  \ 是一个字符串数组，其中每个字符串是通讯录中的联系人姓名或电话号码。`Body` 是您要发送的消息。\n\n```\nmc.recipients = @[@\"\
  曼尼·沙利文\"];\nmc.body = @\"你好，曼尼！\";\n```\n\n消息撰写视图控制器委托方法的行为与其邮件对应方法完全相同。发送短信时只有三种可能的结果：已取消、已发送或失败。\n\
  \n```\n- (void)messageComposeViewController:(MFMessageComposeViewController *)controller\n\
                        didFinishWithResult:(MessageComposeResult)result\n{\n    switch\
  \ (result)\n    {\n        case MessageComposeResultCancelled:\n            NSLog(@\"\
  短信发送已取消\");\n            break;\n        case MessageComposeResultSent:\n            NSLog(@\"\
  短信已发送\");\n            break;\n        case MessageComposeResultFailed:\n            NSLog(@\"\
  短信发送失败\");\n            break;\n        default:\n            NSLog(@\"短信未发送\");\n\
              break;\n    }\n    [controller dismissViewControllerAnimated:YES completion:nil];\n\
  }\n```\n\n### Social 框架\n\n在 iOS 5 中，Apple 与 Twitter（[www.twitter.com](http://www.twitter.com)）紧密集成。基本上，您的\
  \ Twitter 账户可以从系统层面使用。因此，很容易向 Twitter 发送消息（“推文”）或执行 Twitter API 请求。在 iOS 6 中，Apple\
  \ 将此功能抽象并扩展到了 Social 框架中。除 Twitter 外，Apple 还为 Facebook 和新浪微博集成了相同的功能。\n\n#### SLComposeViewController\n\
  \n`SLComposeViewController` 在设计和原理上与 Message UI 框架中的邮件和消息视图控制器类非常相似。但是，没有相应的委托类。相反，`SLComposeViewController`\
  \ 有一个完成处理程序属性，可以为其分配一个代码块。\n\n为了确认您的应用程序可以使用某项服务，您可以调用静态方法 `isAvailableForServiceType:`。例如，检查是否可以发送到\
  \ Facebook 的代码如下：\n\n```\nif ([SLComposeViewController isAvailableForServiceType:SLServiceTypeFacebook])\
  \ {\n    // 发送消息到 Facebook 的代码\n    . . .\n}\n```\n\n`isAvailableForServiceType:`\
  \ 接受一个 `String` 参数，该参数可以是服务类型常量。这些服务类型定义在头文件 `SLServiceTypes.h` 中。目前，Apple 定义了以下服务类型常量：\n\
  \n```\nNSString *const SLServiceTypeFacebook;\nNSString *const SLServiceTypeTwitter;\n\
  NSString *const SLServiceTypeSinaWeibo;\n```\n\n如果您能够向服务发送消息，首先需要创建视图控制器的一个实例。\n\
  \n```\nSLComposeViewController *composeVC = [SLComposeViewController\n                                          composeViewControllerForServiceType:SLServiceTypeTwitter];\n\
  ```\n\n\n\n##### 示例：创建发送推文的视图控制器\n\n本示例将创建一个用于发送推文的视图控制器。你可以在呈现该视图控制器之前设置初始文本、添加图片和添加\
  \ URL。\n\n```objc\n[composeVC setInitialText:@\"Hello, Twitter!\"];\n\nUIImage *image\
  \ = [UIImage imageWithContentsOfFile:@\"surpriseCat.png\"];\n[composeVC addImage:image];\n\
  \nNSURL *url = [NSURL URLWithString:@\"http://www.apporchard.com\"];\n[composeVC\
  \ addURL:url];\n```\n\n这些方法在成功时返回`YES`，失败时返回`NO`。\n\n有两个便捷方法：`removeAllImages`和`removeAllURLs`，用于移除你已添加的任何图片或\
  \ URL。\n\n如前所述，你不需要指定委托来处理消息完成事件。相反，你可以通过一个 block 来设置`completionHandler`属性。\n\n\
  ```objc\n[composeVC setCompletionHandler:^(SLComposeViewControllerResult result)\
  \ {\n    switch (result) {\n        case SLComposeViewControllerResultCancelled:\n\
  \            NSLog(@\"Message cancelled.\");\n            break;\n        case SLComposeViewControllerResultDone:\n\
  \            NSLog(@\"Message sent.\");\n            break;\n        default:\n\
  \            break;\n    }\n    [self dismissModalViewControllerAnimated:YES completion:nil];\n\
  }];\n```\n\n该 block 接受一个参数，用于指示消息的结果。同样，你需要通过调用`dismissModalViewControllerAnimated:completion:`方法来关闭视图控制器。\n\
  \n#### SLRequest\n\n如果你只是想发布消息，`SLComposeViewController`就足够了。但如果你想利用这些社交媒体服务提供的\
  \ API，该怎么办？这时你需要使用`SLRequest`，它本质上是围绕 HTTP 请求的一个封装，负责处理你的应用程序与社交媒体服务之间的身份认证。\n\n\
  要创建请求，你需要调用类方法`requestForServiceType:requestMethod:URL:parameters:`。\n\n```objc\n\
  SLRequest *request = [SLRequest requestForServiceType:SLServiceTypeFacebook\n  \
  \                                     requestMethod:SLRequestMethodPOST\n      \
  \                                             URL:url\n                        \
  \                  parameters:params];\n```\n\n第一个参数与`SLComposeViewController`中使用的服务类型字符串常量相同。`requestMethod:`是\
  \ HTTP 操作的一个子集：`GET`、`POST`和`DELETE`。Apple 为此子集定义了一个枚举：`SLRequestMethod`。\n\n```objc\n\
  SLRequestMethodGET\nSLRequestMethodPOST\nSLRequestMethodDELETE\n```\n\n`URL:`是由服务提供商定义的\
  \ URL，通常不是该服务的公开\"www\"URL。例如，Twitter 的 URL 以`http://api.twitter.com/`开头。最后，`parameters:`是一个包含\
  \ HTTP 参数的字典，用于发送给服务。字典的内容取决于所调用的服务。\n\n一旦你构建好请求，就可以将其发送给服务提供商：\n\n```objc\n[request\
  \ performRequestWithHandler:^(NSData *responseData,\n                          \
  \                NSHTTPURLResponse *urlResponse,\n                             \
  \             NSError *error) {\n    // 处理响应，处理数据或错误\n    ...\n}];\n```\n\n该处理器是一个\
  \ block，返回 HTTP 响应对象以及任何伴随的数据。如果发生错误，会返回一个非`nil`的错误对象。\n\n**注意：** 这里只是对`SLRequest`类的简要概述。你可以在类文档中阅读更多内容：[`developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html`](https://developer.apple.com/library/ios/#documentation/Social/Reference/SLRequest_Class/Reference/Reference.html)。\n\
  \n#### Activity 视图控制器\n\n在 iOS 6 中，Apple 引入了一种在应用程序内访问各种服务的新方式：Activity 视图控制器（`UIActivityViewController`）。除了让应用程序能够访问标准的\
  \ iOS 服务（如复制和粘贴）之外，Activity 视图控制器还提供了一个统一的接口，用于发送电子邮件、短信或向社交媒体服务发布内容。你甚至还可以定义自己的自定义服务。\n\
  \n使用 Activity 视图控制器很简单：用你想要发送的项目（如文本、图片等）初始化 Activity 视图控制器，然后将其推送到你当前的视图控制器上。\n\
  \n```objc\nNSString *text = @\"some text\";\nUIImage *image = [[UIImage alloc] initWithContentsOfFile:@\"\
  some_image.png\"];\nNSArray *items = @[ text, image ];\n\nUIActivityViewController\
  \ *activityVC =\n    [[UIActivityViewController alloc] initWithActivityItems:items\n\
  \                                      applicationActivities:nil];\n\n[self presentViewController:activityVC\
  \ animated:YES completion:nil];\n```\n\n就是这样。很简单，对吧？\n\n所以所有魔法都发生在这里：\n\n```objc\n\
  UIActivityViewController *activityVC =\n    [[UIActivityViewController alloc] initWithActivityItems:items\
  \ applicationActivities:nil];\n```\n\n当实例化 Activity 视图控制器时，你需要向其传递一个 Activity 项目数组。一个\
  \ Activity 项目可以是任何对象，具体取决于应用程序和 Activity 服务目标。在上面的示例代码中，Activity 项目是一个字符串和一个图片。如果你想要使用自定义对象作为\
  \ Activity 项目，请让其遵循`UIActivityItemSource`协议。然后，你将完全控制自定义对象如何向 Activity 视图控制器呈现其数据。\n\
  \n`applicationActivities:`参数期望一个`UIActivity`对象数组。如果传递了`nil`值，则 Activity 视图控制器将使用一组默认的\
  \ Activity 对象。还记得我们之前说过你可以定义自己的自定义服务吗？你可以通过继承`UIActivity`来定义与你的服务的通信来实现这一点。然后，将你的子类作为应用程序\
  \ Activity 数组的一部分传入。\n\n就本章而言，你将只使用默认的 Activity 列表。准备好了吗？让我们开始吧！\n\n### 构建 MessageImage\
  \ 应用程序\n\n在 Xcode 中，使用 Single View Application 模板创建一个新项目。将项目命名为`MessageImage`。由于此应用程序只有一个视图控制器，你不需要\
  \ storyboard。但你仍然会使用自动引用计数（ARC）。\n\n### 构建用户界面\n\n回顾图 11-1。界面非常简单：一个标注为\"Go\"的按钮。当你按下按钮时，应用程序将激活设备的相机并允许你拍照。\n\
  \n选择`ViewController.xib`。\n\n从库中拖拽一个圆角矩形按钮，将其放置在标题为\"View\"的窗口中的任意位置。双击按钮并将其标题设置为`Go`。进入助手编辑器，它会将编辑器面板分割并打开`ViewController.h`。从\"\
  Go\"按钮按住 Control 键拖拽到`ViewController.h`中的`@interface`和`@end`之间。添加一个新的 Action，并将其命名为`selectAndMessageImage`。\n\
  \n接下来，从库中拖拽一个标签到视图窗口。将标签放置在按钮上方，并将其调整大小，使其从左边缘一直延伸到右边缘。在属性检查器中，将文本对齐方式设置为居中。从标签按住\
  \ Control 键拖拽到你刚刚创建的`selectAndMessageImage:`Action 上方。添加一个新的 outlet 并将其命名为`label`。最后，双击标签并擦除文本\"\
  Label\"。\n\n将编辑器切换回标准模式。保存 XIB 文件。\n\n#### 拍照\n\n单击`ViewController.h`。你需要让你的视图控制器遵循两个委托协议：\n\
  \n```objc\n@interface ViewController : UIViewController <UINavigationControllerDelegate,\n\
  \                                               UIImagePickerControllerDelegate>\n\
  ```\n\n\n\n这是因为你将要使用的图片选择控制器要求其委托遵循 `UINavigationControllerDelegate` 和 `UIImagePickerControllerDelegate`\
  \ 两个协议。使用图片选择控制器可以调用相机并选择要发送的图片。现在你需要为你将要选择的图片添加一个属性。\n\n```\n@property (strong,\
  \ nonatomic) UIImage *image;\n```\n\n目前需要做的就这些。接下来我们进入视图控制器实现文件。\n\n#### 调用相机\n\n\
  选择 `ViewController.m` 在编辑器中打开。\n\n当按钮被按下时，你需要实现相应的操作方法。\n\n```\n- (IBAction)selectAndMessageImage:(id)sender\n\
  {\n    UIImagePickerControllerSourceType sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \    if (![UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera])\
  \ {\n        sourceType = UIImagePickerControllerSourceTypePhotoLibrary;\n    }\n\
  \nUIImagePickerController *picker = [[UIImagePickerController alloc] init];\n  \
  \  picker.delegate = self;\n    picker.allowsEditing = YES;\n    picker.sourceType\
  \ = sourceType;\n    [self presentViewController:picker animated:YES completion:nil];\n\
  }\n```\n\n当 Go 按钮按下后，你将图片源设置为设备的相机。如果相机不可用（例如在模拟器上运行），则回退到使用相册。你将图片选择器的委托设置为你当前的视图控制器，并允许编辑图片。最后，显示图片选择器。\n\
  \n由于你将视图控制器设置为图片选择器的委托，你可以添加你需要的委托方法。在 `selectAndMessageImage:` 方法下方添加以下代码。\n\n\
  ```\n#pragma mark - UIImagePickerController Delegate Methods\n\n- (void)imagePickerController:(UIImagePickerController\
  \ *)picker\n         didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n   \
  \ [picker dismissViewControllerAnimated:YES completion:nil];\n    self.image = [info\
  \ objectForKey:UIImagePickerControllerEditedImage];\n}\n\n- (void)imagePickerControllerDidCancel:(UIImagePickerController\
  \ *)picker\n{\n    [picker dismissViewControllerAnimated:YES completion:nil];\n\
  }\n```\n\n两个方法都会关闭图片选择器，但 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 还会将你的图片属性设置为拍摄（或选择）的照片。\n\n让我们确认一切正常。运行应用程序，拍摄一张照片，然后点击“使用”。此时应该没有任何反应，但这没关系。\n\
  \n#### 选择消息发送方式\n\n图 11-3 展示了选择图片后出现的活动视图控制器。我们来设置一下。\n\n首先，你需要定义一个方法来显示活动视图控制器。打开\
  \ `ViewController.h` 并添加以下方法声明：\n\n```\n- (void)showActivityViewController;\n```\n\
  \n现在，选择 `ViewController.m`，并添加该方法的具体实现。我们将其添加在 `selectAndMessageImage:` 方法之后。\n\n\
  ```\n- (void)showActivityViewController\n{\n    NSString *message = NSLocalizedString(@\"\
  I took a picture on my iPhone\",\n                                          @\"\
  I took a picture on my iPhone\");\n    NSArray *activityItems = @[ message, self.image\
  \ ];\n    UIActivityViewController *activityVC =\n        [[UIActivityViewController\
  \ alloc] initWithActivityItems:activityItems\n                                 \
  \ applicationActivities:nil];\n    [self presentViewController:activityVC animated:YES\
  \ completion:nil];\n}\n```\n\n现在，你需要在选择图片后调用 `showActivityViewController` 方法。在 `imagePickerController:didFinishPickingMediaWithInfo:`\
  \ 的末尾添加以下代码行。你需要稍微延迟活动视图控制器的显示，以便给 `UIImagePickerController` 足够的时间从根视图控制器中移除。\n\n\
  ```\n    [self performSelector:@selector(showActivityViewController) withObject:nil\
  \ afterDelay:0.5];\n```\n\n检查一下目前的工作。运行应用程序并确认警告面板出现。就是这样。哇，这真是简单。\n\n**注意：** 如果你选择了一个服务但尚未配置账户信息，iOS\
  \ 会弹出一个警告，提示你设置账户。\n\n#### 以邮件方式发送……\n\n在本章中，你了解了如何发送电子邮件、短信或发布到社交媒体服务。你应该能够将这个功能添加到你的任何应用程序中。当你准备好继续时，请翻页学习\
  \ iPod 操控的艺术。\n\n"
- "# 第 12 章：媒体库访问与播放\n\n每个 iOS 设备，其核心都是一流的媒体播放器。开箱即用，用户即可听音乐、播客和有声读物，以及观看电影和视频。\n\n\
  iOS SDK 应用程序一直以来都能够播放声音和音乐，但苹果在每次 iOS 版本发布时都在扩展这项功能。iOS 3 为我们提供了 `MediaPlayer` 框架，该框架的一项功能是允许访问用户的音频库；iOS\
  \ 5 则将其扩展，允许访问用户库中的视频。\n\niOS 4 扩展了 `AVFoundation` 框架，该框架提供了对媒体播放、录制和编辑的更精细控制。这种控制是有代价的，因为\
  \ `MediaPlayer` 框架的大部分功能并未直接在 `AVFoundation` 中实现。相反，`AVFoundation` 让你能够为特定需求实现自定义控件。\n\
  \n在本章中，你将开发三个应用程序：一个简单的音频播放器、一个简单的视频播放器以及一个混合音频/视频播放器。前两个将专门使用 `MediaPlayer` 框架。最后一个应用程序将使用\
  \ `MediaPlayer` 框架来访问用户的媒体库，但使用 `AVFoundation` 进行播放。\n\n### MediaPlayer 框架\n\n用于访问媒体库的方法和对象是\
  \ `MediaPlayer` 框架的一部分，该框架允许应用程序播放音频和视频。虽然该框架允许你访问用户库中所有类型的媒体，但存在一些限制，仅允许你处理音频文件。\n\
  \niOS 设备上的媒体集合曾被称为 *iPod 库*，我们将在本书中交替使用此术语与 *媒体库*。后者可能更准确，因为苹果已将音乐播放器从 iPod 重命名为\
  \ Music，并将视频媒体移到了一个名为 Videos 的应用程序中。最近，苹果更进一步，创建了一个 Podcasts 应用程序来处理你的播客集。\n\n从\
  \ `MediaPlayer` 框架的角度来看，整个媒体库由类 `MPMediaLibrary` 表示。不过，你并不会经常使用这个对象。它主要用于当你的应用程序运行时，你需要被通知媒体库发生变化的情况。过去，在应用程序运行时媒体库发生变化的情况很少见，因为这种变化通常发生在将设备与电脑同步时。如今，你可以直接与\
  \ iTunes Store 同步你的音乐集，因此你可能需要监控媒体库的变化。\n\n一个媒体项由类 `MPMediaItem` 表示。如果你希望播放用户某个播放列表中的歌曲，你将使用类\
  \ `MPMediaPlaylist`，该类代表在 iTunes 中创建并同步到用户设备的播放列表。要在 iPod 库中搜索媒体项或播放列表，你需要使用媒体查询，由类\
  \ `MPMediaQuery` 表示。媒体查询将返回所有符合你指定条件的媒体项或播放列表。要为媒体查询指定条件，你使用一种特殊的以媒体为中心的谓词形式，称为媒体属性谓词，由类\
  \ `MPMediaPropertyPredicate` 表示。\n\n另一种让用户选择媒体项的方法是使用媒体选择器控制器，它是 `MPMediaPickerController`\
  \ 的一个实例。媒体选择器控制器允许你的用户使用他们从 iPod 或 Music 应用程序中已经熟悉的基本界面。\n\n\n\n你可以使用播放器控制器来播放媒体项目。有两种播放器控制器：`MPMusicPlayerController`\
  \ 和 `MPMoviePlayerController`。`MPMusicPlayerController` 并非视图控制器，它负责播放音频以及管理待播放的音频项目列表。通常，你需要提供必要的用户界面元素，例如播放、暂停、快进或快退按钮。`MediaPlayer`\
  \ 框架提供了一个视图控制器类 `MPMoviePlayerViewController`，以便在你的应用程序中轻松管理全屏电影播放器。\n\n如果你希望指定播放器控制器要播放的媒体项目列表，则需要使用媒体项目集合，该类由\
  \ `MPMediaItemCollection` 的实例表示。媒体项目集合是媒体项目的不可变集合。一个媒体项目可以在集合中出现多次，这意味着你理论上可以创建一个集合，先播放一千遍“祝你生日快乐”，然后再播放一遍“Rock\
  \ the Casbah”。如果你真的想这么做……也不是不行。\n\n### 媒体项目\n\n表示媒体项目的类 `MPMediaItem` 的工作方式与大多数\
  \ `Objective-C` 类略有不同。你可能会期望 `MPMediaItem` 包含诸如标题、艺术家、专辑名称等属性。但实际情况并非如此。除了从 `NSObject`\
  \ 继承的属性和用于支持归档的两个 `NSCoding` 方法外，`MPMediaItem` 只包含一个名为 `valueForProperty:` 的实例方法。\n\
  \n`valueForProperty:` 的工作方式很像 `NSDictionary` 的实例，只是它使用的是一组有限的已定义键。例如，如果你想获取媒体项目的标题，你会调用\
  \ `valueForProperty:` 并指定键 `MPMediaItemPropertyTitle`，该方法会返回一个包含音轨标题的 `NSString`\
  \ 实例。媒体项目在 iOS 上是不可变的，因此所有 `MPMediaItem` 属性都是只读的。\n\n一些媒体项目属性被认为是可过滤的。可过滤的媒体项目属性是指那些可以被搜索的属性，你将在本章稍后部分了解这一过程。\n\
  \n#### 媒体项目持久化标识\n\n每个媒体项目都有一个持久化标识符（或称持久化 ID），这是一个与该项目关联并且永远不会改变的数字。如果你需要存储对某个特定媒体项目的引用，你应该存储其持久化\
  \ ID，因为它由 iTunes 生成，并且你可以依赖它长期保持不变。\n\n你可以使用属性键 `MPMediaItemPropertyPersistentID`\
  \ 来获取媒体轨道的持久化 ID，如下所示：\n\n```\nNSNumber *persistentId = [mediaItem valueForProperty:MPMediaItemPropertyPersistentID];\n\
  ```\n\n持久化 ID 是一个可过滤属性，这意味着你可以使用媒体查询根据其持久化 ID 来查找项目。存储媒体项目的持久化 ID 是确保每次搜索都能获得同一对象的最可靠方法。我们将在本章稍后部分讨论媒体查询。\n\
  \n#### 媒体类型\n\n所有媒体项目都有一个与之关联的类型。目前，媒体项目使用三个类别进行分类：音频、视频和通用。你可以通过请求 `MPMediaItemPropertyMediaType`\
  \ 属性来确定特定媒体项目的类型，如下所示：\n\n```\nNSNumber *type = [mediaItem valueForProperty:MPMediaItemPropertyMediaType];\n\
  ```\n\n媒体项目可能包含多种类型。例如，播客可能是一本有声书的朗读内容。因此，媒体类型是通过位字段（有时称为位标志）实现的。\n\n**注意** 位字段在\
  \ C 语言中被广泛使用，苹果在其许多框架中都采用了这种方式。如果你不太确定位字段的用法，可以查阅 David Mark 和 James Bucanek 所著的\
  \ *Learn C on the Mac for OS X and iOS* (Apress, 2012) 的第 11 章（[#9781430238072_Ch11.xhtml]）。你还可以在维基百科上找到关于此概念的优秀总结，网址为\
  \ [`en.wikipedia.org/wiki/Bitwise_operation`](http://en.wikipedia.org/wiki/Bitwise_operation)。\n\
  \n使用位字段时，单个整数数据类型被用来表示多个非互斥的布尔值，而不是单个数字。要将 `type`（一个对象）转换为 `NSInteger`（文档中定义用于保存媒体类型的整数类型），请使用\
  \ `integerValue` 方法，如下所示：\n\n```\nNSInteger mediaType = [type integerValue];\n```\n\
  \n此时，`mediaType` 的每一位代表一个单一类型。要判断一个媒体项目是否属于特定类型，你需要使用按位与运算符（`&`）将 `mediaType` 与表示可用媒体类型的系统定义常量进行比较。以下是当前常量的列表：\n\
  \n*   `MPMediaTypeMusic`：用于检查媒体是否为音乐。\n*   `MPMediaTypePodcast`：用于检查媒体是否为音频播客。\n\
  *   `MPMediaTypeAudioBook`：用于检查媒体是否为有声书。\n*   `MPMediaTypeAudioAny`：用于检查媒体是否为任何音频类型。\n\
  *   `MPMediaTypeMovie`：用于检查媒体是否为电影。\n*   `MPMediaTypeTVShow`：用于检查媒体是否为电视剧。\n*  \
  \ `MPMediaTypeVideoPodcast`：用于检查媒体是否为视频播客。\n*   `MPMediaTypeMusicVideo`：用于检查媒体是否为音乐视频。\n\
  *   `MPMediaTypeITunesU`：用于检查媒体是否为 iTunes U 视频。\n*   `MPMediaTypeAnyVideo`：用于检查媒体是否为任何视频类型。\n\
  *   `MPMediaTypeAny`：用于检查媒体是否为任何已知类型。\n\n例如，要检查给定的项目是否包含音乐，你可以获取之前得到的 `mediaType`，并执行以下操作：\n\
  \n```\nif (mediaType & MPMediaTypeMusic) {\n    // 是音乐...\n}\n```\n\n`MPMediaTypeMusic`\
  \ 的所有位都设置为 0，除了用于表示音轨包含音乐的那一位被设置为 1。当你对该常量和获取的 `mediaType` 值执行按位与（`&`）操作时，结果值中除了正在检查的那一位外，所有位都将为\
  \ 0。如果 `mediaType` 设置了音乐位，则该位将为 1；否则为 0。在 `Objective-C` 中，对一个逻辑与或逻辑或表达式求值的 `if`\
  \ 语句在任何非零结果下都会触发；如果 `mediaType` 的音乐位被设置，那么随后的代码将会运行；否则，它将被跳过。\n\n媒体类型是一个可过滤属性，因此你可以在你的媒体查询中（我们稍后会讨论）指定它们只返回特定类型的媒体。\n\
  \n#### 位运算宏\n\n并非所有程序员都能适应阅读包含位运算符的代码。如果你也有此困扰，别灰心。很容易创建一些宏，将这些位运算检查转换为 C 函数宏，如下所示：\n\
  \n```\n#define isMusic(x)      (x & MPMediaTypeMusic)\n#define isPodcast(x)    (x\
  \ & MPMediaTypePodcast)\n#define isAudioBook(x)  (x & MPMediaTypeAudioBook)\n```\n\
  \n一旦定义了这些宏，你就可以使用更易读的代码来检查返回的类型，例如：\n\n```\nif (isMusic([type integerValue])) {\n\
  \    // 执行某些操作\n}\n```\n\n#### 可过滤属性\n\n你可能会想从媒体项目中检索多个属性，包括音轨的标题、流派、艺术家和专辑名称。除了\
  \ `MPMediaItemPropertyPersistentID` 和 `MPMediaItemPropertyMediaType` 之外，以下是你可用的可过滤属性常量：\n\
  \n\n\n- `MPMediaItemPropertyAlbumPersistentID`: 返回物品专辑的持久化 ID。\n- `MPMediaItemPropertyArtistPersistentID`:\
  \ 返回物品艺术家的持久化 ID。\n- `MPMediaItemPropertyAlbumArtistPersistentID`: 返回物品专辑的主要艺术家的持久化\
  \ ID。\n- `MPMediaItemPropertyGenrePersistentID`: 返回物品流派的持久化 ID。\n- `MPMediaItemPropertyComposerPersistentID`:\
  \ 返回物品作曲家的持久化 ID。\n- `MPMediaItemPropertyPodcastPersistentID`: 返回物品播客的持久化 ID。\n\
  - `MPMediaItemPropertyTitle`: 返回物品的标题，通常表示歌曲名称。\n- `MPMediaItemPropertyAlbumTitle`:\
  \ 返回物品专辑的名称。\n- `MPMediaItemPropertyArtist`: 返回录制该物品的艺术家的名称。\n- `MPMediaItemPropertyAlbumArtist`:\
  \ 返回物品专辑的主要艺术家名称。\n- `MPMediaItemPropertyGenre`: 返回物品的流派（例如，古典、摇滚或另类）。\n- `MPMediaItemPropertyComposer`:\
  \ 返回物品作曲家的名称。\n- `MPMediaItemPropertyIsCompilation`: 如果物品是合集的一部分，则返回 `true`。\n-\
  \ `MPMediaItemPropertyPodcastTitle`: 如果音轨是播客，则返回播客名称。\n\n尽管标题和艺术家几乎总是已知的，但这些属性都不保证会返回值，因此只要程序逻辑包含这些值中的任何一个，都必须进行防御性编码。虽然不太可能，但媒体音轨可以在没有指定名称或艺术家的情况下存在。\n\
  \n以下是一个从媒体项中检索字符串属性的示例：\n\n```objectivec\nNSString *title = [mediaItem valueForProperty:MPMediaItemPropertyTitle];\n\
  ```\n\n### 不可过滤的数值属性\n\n几乎所有你能在 iTunes 中确定的关于音频或视频项目的信息都可以从媒体项中检索到。以下列表中的值是不可过滤的——换句话说，你不能在媒体属性谓词中使用它们。例如，你不能检索所有长度超过四分钟的音轨。但是一旦有了一个媒体项，就可以获得关于该项目的丰富信息。\n\
  \n- `MPMediaItemPropertyPlaybackDuration`: 返回音轨的长度（以秒为单位）。\n- `MPMediaItemPropertyAlbumTrackNumber`:\
  \ 返回该音轨在其专辑中的编号。\n- `MPMediaItemPropertyAlbumTrackCount`: 返回该音轨所属专辑的总音轨数。\n- `MPMediaItemPropertyDiscNumber`:\
  \ 如果音轨来自多碟专辑合集，返回该音轨的光盘编号。\n- `MPMediaItemPropertyDiscCount`: 如果音轨来自多碟专辑合集，返回该合集的总光盘数。\n\
  - `MPMediaItemPropertyBeatsPerMinute`: 返回物品的每分钟节拍数。\n- `MPMediaItemPropertyReleaseDate`:\
  \ 返回物品的发行日期。\n- `MPMediaItemPropertyComments`: 返回在“显示简介”选项卡中输入的物品注释。\n\n数值属性总是作为\
  \ `NSNumber` 的实例返回。音轨时长是一个 `NSTimeInterval`，可以通过使用 `doubleValue` 方法从 `NSNumber`\
  \ 中检索。其余的是无符号整数，可以使用 `unsignedIntegerValue` 方法检索。\n\n以下是几个从媒体项中检索数值属性的示例：\n\n```objectivec\n\
  NSNumber *durationNum = [mediaItem valueForProperty:MPMediaItemPropertyPlaybackDuration];\n\
  NSTimeInterval duration = [durationNum doubleValue];\n\nNSNumber *trackNum = [mediaItem\
  \ valueForProperty:MPMediaItemPropertyAlbumTrackNumber];\nNSUInteger trackNumber\
  \ = [trackNum unsignedIntegerValue];\n```\n\n### 检索歌词\n\n如果媒体音轨有关联的歌词，你可以使用属性键 `MPMediaItemPropertyLyrics`\
  \ 来检索它们。歌词将以 `NSString` 实例的形式返回，如下所示：\n\n```objectivec\nNSString *lyrics = [mediaItem\
  \ valueForProperty:MPMediaItemPropertyLyrics];\n```\n\n### 检索专辑插图\n\n一些媒体音轨有相关的图片。在大多数情况下，这将是音轨专辑的封面图片，但也可能是其他内容。你可以使用属性键\
  \ `MPMediaItemPropertyArtwork` 检索专辑插图，该键返回 `MPMediaItemArtwork` 类的实例。`MPMediaItemArtwork`\
  \ 类有一个方法，可以返回与指定大小匹配的 `UIImage` 实例。以下是一些获取媒体项专辑插图的代码，该插图适合 100x100 像素的视图：\n\n```objectivec\n\
  MPMediaItemArtwork *art = [mediaItem valueForProperty:MPMediaItemPropertyArtwork];\n\
  CGSize imageSize = {100.0, 100.0};\nUIImage *image = [art imageWithSize:imageSize];\n\
  ```\n\n### 用户自定义属性\n\n可以从媒体项中检索的另一组数据称为*用户自定义*属性。这些是根据用户交互在媒体项上设置的属性。这些属性包括播放次数和评分。\n\
  \n- `MPMediaItemPropertyPlayCount`: 返回该音轨被播放的总次数。\n- `MPMediaItemPropertySkipCount`:\
  \ 返回该音轨被跳过的总次数。\n- `MPMediaItemPropertyRating`: 返回音轨的评分，如果音轨未被评分，则返回 0。\n- `MPMediaItemPropertyLastPlayedDate`:\
  \ 返回音轨上次播放的日期。\n- `MPMediaItemPropertyUserGrouping`: 返回 iTunes“显示简介”面板中“分组”选项卡的信息。\n\
  \n### 资源 URL 属性\n\n最后一个要讨论的属性是在 iOS 4 中添加的，用于 AVFoundation。我们将在这里提及，但稍后再讨论：\n\n\
  `MPMediaItemPropertyAssetURL`: 一个指向用户媒体库中媒体项的 `NSURL`。\n\n### 媒体项集合\n\n媒体项可以分组到集合中，创造性地称为*媒体项集合*。实际上，这就是你如何指定要由播放控制器播放的媒体项列表的方式。媒体项集合由\
  \ `MPMediaItemCollection` 类表示，是媒体项的不可变集合。你可以创建新的媒体项集合，但一旦创建，就不能更改集合的内容。\n\n####\
  \ 创建新集合\n\n创建媒体项集合的最简单方法是将所有你想要放入集合的媒体项按顺序放入 `NSArray` 的实例中。然后，你可以将 `NSArray` 的实例传递给工厂方法\
  \ `collectionWithItems:`，如下所示：\n\n```objectivec\nNSArray *items = @[mediaItem1,\
  \ mediaItem2];\nMPMediaItemCollection *collection = [MPMediaItemCollection collectionWithItems:items];\n\
  ```\n\n#### 检索媒体项\n\n要从媒体项集合中检索特定的媒体项，你可以使用实例方法 `items`，该方法返回一个 `NSArray` 实例，其中包含集合中所有媒体项，顺序与其在集合中的顺序一致。例如，如果你想检索特定索引处的媒体项，可以这样做：\n\
  \n```objectivec\nMPMediaItem *item = [[mediaCollection items] objectAtIndex:5];\n\
  ```\n\n#### 创建派生集合\n\n由于媒体项集合是不可变的，你不能向集合添加项目，也不能将一个媒体项集合的内容追加到另一个集合中。但是，由于你可以通过实例方法\
  \ `items` 访问集合中包含的媒体项数组，因此你可以制作项目数组的可变副本，操作可变数组的内容，然后基于修改后的数组创建一个新集合。\n\n以下是将单个媒体项追加到现有集合末尾的代码：\n\
  \n```objectivec\nNSMutableArray *items = [[originalCollection items] mutableCopy];\n\
  [items addObject:mediaItem];\nMPMediaItemCollection *newCollection = [MPMediaItemCollection\
  \ collectionWithItems:items];\n```\n\n类似地，要合并两个不同的集合，需要合并它们的项目，然后从合并后的数组创建一个新集合。\n\
  \n\n\n```objective-c\nNSMutableArray *items = [[firstCollection items] mutableCopy];\n\
  [items addObjectsFromArray:[secondCollection items]];\nMPMediaItemCollection *newCollection\
  \ = [MPMediaItemCollection collectionWithItems:items];\n```\n\n要从现有集合中删除一个或多个项目，您可以使用相同的基本技术。您可以检索集合中包含项目的可变副本，删除要移除的项目，然后基于修改后的项目副本创建新集合，如下所示：\n\
  \n```objective-c\nNSMutableArray *items = [[originalCollection items] mutableCopy];\n\
  [items removeObject:mediaItemToDelete];\nMPMediaItemCollection *newCollection =\
  \ [MPMediaItemCollection collectionWithItems:items];\n```\n\n### 媒体查询与媒体属性谓词\n\n\
  要在媒体库中搜索媒体项目，您需要使用媒体查询，即 `MPMediaQuery` 类的实例。有许多工厂方法可用于从媒体库中检索按特定属性排序的媒体项目。例如，如果您想获取按艺术家排序的所有媒体项目列表，可以使用\
  \ `artistsQuery` 类方法创建一个配置好的 `MPMediaQuery` 实例，如下所示：\n\n```objective-c\nMPMediaQuery\
  \ *artistsQuery = [MPMediaQuery artistsQuery];\n```\n\n表 12-1 列出了 `MPMediaQuery`\
  \ 的工厂方法。\n\n表 12-1.  `MPMediaQuery` 工厂方法\n\n| **工厂方法** | **包含的媒体类型** | **分组/排序依据**\
  \ |\n| --- | --- | --- |\n| `albumsQuery` | 音乐 | 专辑 |\n| `artistsQuery` | 音乐 | 艺术家\
  \ |\n| `audiobooksQuery` | 有声读物 | 标题 |\n| `compilationsQuery` | 任意 | 专辑* |\n| `composersQuery`\
  \ | 任意 | 作曲家 |\n| `genresQuery` | 任意 | 流派 |\n| `playlistsQuery` | 任意 | 播放列表 |\n\
  | `podcastsQuery` | 播客 | 播客标题 |\n| `songsQuery` | 音乐 | 标题 |\n\n***仅包含将 `MPMediaItemPropertyIsCompilation`\
  \ 设置为 `YES` 的专辑。**\n\n这些工厂方法对于显示满足预设条件的用户库的全部内容非常有用。也就是说，您通常希望将查询限制为更小的项目子集。您可以使用媒体谓词来实现这一点。媒体谓词可以在媒体项目的任何可过滤属性上创建，包括持久化\
  \ ID、媒体类型或任何字符串属性（如标题、艺术家或流派）。\n\n要在可过滤属性上创建媒体谓词，请使用 `MPMediaPropertyPredicate`\
  \ 类。使用工厂方法 `predicateWithValue:forProperty:comparisonType:` 创建新实例。例如，下面是创建搜索所有标题为“生日快乐”的歌曲的媒体谓词的方法：\n\
  \n```objective-c\nMPMediaPropertyPredicate *titlePredicate =\n    [MPMediaPropertyPredicate\
  \ predicateWithValue:@\"Happy Birthday\"\n                                     \
  \ forProperty:MPMediaItemPropertyTitle\n                                   comparisonType:MPMediaPredicateComparisonContains];\n\
  ```\n\n您传递的第一个值（此处为 `@\"Happy Birthday\"`）是比较值。第二个值是要与该比较值进行比较的可过滤属性。通过指定 `MPMediaItemPropertyTitle`，您是在表示要将歌曲标题与字符串“Happy\
  \ Birthday”进行比较。最后一个项目指定要执行的比较类型。您可以传递 `MPMediaPredicateComparisonEqualTo` 来查找与指定字符串完全匹配的内容，或传递\
  \ `MPMediaPredicateComparisonContains` 来查找任何包含传递值作为子字符串的项目。\n\n**注意：** 无论使用何种比较类型，媒体查询始终不区分大小写。因此，前面的示例也会返回名为“HAPPY\
  \ BIRTHDAY”和“Happy BirthDAY”的歌曲。\n\n因为您传递了 `MPMediaPredicateComparisonContains`，所以此谓词除了匹配普通的“Happy\
  \ Birthday”之外，还会匹配“Happy Birthday, the Opera”和“Slash Sings Happy Birthday”。如果您传递了\
  \ `MPMediaPredicateComparisonEqualTo`，则只会找到最后一个——完全匹配的那个。\n\n您可以创建多个媒体属性谓词并传递给单个查询。如果这样做，查询将使用\
  \ AND 逻辑运算符，并且只返回满足所有谓词的媒体项目。\n\n要创建基于媒体属性谓词的媒体查询，您可以使用初始化方法 `initWithFilterPredicates:`\
  \ 并传入一个包含您希望它使用的所有谓词的 `NSSet` 实例，如下所示：\n\n```objective-c\nMPMediaQuery *query =\n\
  \    [[MPMediaQuery alloc] initWithFilterPredicates:[NSSet setWithObject:titlePredicate]];\n\
  ```\n\n一旦您有了一个查询——无论是手动创建还是使用其中一个工厂方法检索到的——有两种方法可以执行查询并检索要显示的项目：\n\n-   您可以使用查询的\
  \ `items` 属性，该属性返回一个包含满足媒体属性谓词中指定条件的所有媒体项目的 `NSArray` 实例，如下所示：\n\n```objective-c\n\
  NSArray *items = query.items;\n```\n\n-   您可以使用 `collections` 属性来检索按其中一个可过滤属性分组的对象。您可以通过将\
  \ `groupingType` 属性设置为您希望其分组的可过滤属性的属性键来告知查询按哪个属性对项目进行分组。如果您不设置 `groupingType`，它将默认为按标题分组。\n\
  \n当您访问 `collections` 属性时，查询将返回一个 `MPMediaItemCollection` 对象的数组，分组类型中的每个不同值对应一个集合。因此，例如，如果您指定了\
  \ `MPMediaGroupingArtist` 的 `groupingType`，查询将返回一个数组，其中包含每个至少有一首歌曲符合您条件的艺术家对应的一个\
  \ `MPMediaItemCollection`。每个集合将包含该艺术家符合指定条件的所有歌曲。以下是代码中的可能实现：\n\n```objective-c\n\
  query.groupingType = MPMediaGroupingArtist;\nNSArray *collections = query.collections;\n\
  for (MPMediaItemCollection *oneCollection in collections) {\n    // oneCollection\
  \ 包含一位艺术家所有符合条件的歌曲\n}\n```\n\n使用媒体查询时您需要非常小心。它们是同步的并在主线程中执行，因此如果您指定一个返回 100,000\
  \ 个媒体项目的查询，那么在查找、检索这些项目并将其存储到集合或数组时，您的用户界面会出现卡顿。如果您使用的媒体查询可能返回十几个以上的媒体项目，您可能需要考虑将该操作移出主线程。您将在第\
  \ 14 章中学习如何将操作移出主线程。\n\n### 媒体选择器控制器\n\n如果您希望允许用户从他们的库中选择特定的媒体项目，您将需要使用媒体选择器控制器。媒体选择器控制器允许您的用户使用与他们已经习惯使用的“音乐”应用程序几乎完全相同的界面，从其\
  \ iPod 库中选择音频。您的用户将无法使用 Cover Flow，但他们将能够像在“音乐”应用程序中选择音乐时一样，从按歌曲标题、艺术家、播放列表、专辑和流派排序的列表中进行选择（图\
  \ 12-1）。\n\n![9781430238072_Fig12-01.jpg](img/9781430238072_Fig12-01.jpg)\n\n图 12-1.\
  \  按艺术家、歌曲和专辑显示的媒体选择器控制器\n\n媒体选择器控制器非常易于使用。它的工作方式与前面章节中介绍的许多其他提供的控制器类（例如您在第 11 章中使用的图像选择器控制器和邮件撰写视图控制器）非常相似。创建一个\
  \ `MPMediaPickerController` 实例，为其分配一个委托，然后以模态方式呈现它，如下所示：\n\n\n```objc\nMPMediaPickerController\
  \ *picker = [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypeMusic];\n\
  picker.delegate = self;\n[picker setAllowsPickingMultipleItems:YES];\npicker.prompt\
  \ = NSLocalizedString(@\"选择要播放的项目\", @\"选择要播放的项目\");\n[self presentModalViewController:picker\
  \ animated:YES];\n```\n\n创建媒体选择器控制器实例时，需要指定媒体类型。这可以是前面提到的三种音频类型之一——`MPMediaTypeMusic`、`MPMediaTypePodcast`\
  \ 或 `MPMediaTypeAudioBook`。你也可以传递 `MPMediaTypeAnyAudio`，它目前会返回任何音频项目。\n\n**注意**\
  \ 传递非音频媒体类型不会在代码中引起任何错误，但当媒体选择器出现时，它只会显示音频项目。\n\n你还可以使用按位或（`|`）运算符，让用户选择任意媒体类型的组合。例如，如果你想让用户从播客和有声书中选择，但不包括音乐，你可以这样创建选择器：\n\
  \n```objc\nMPMediaPickerController *picker = [[MPMediaPickerController alloc] initWithMediaTypes:MPMediaTypePodcast\
  \ | MPMediaTypeAudioBook ];\n```\n\n通过将这些常量与按位或运算符结合使用，你最终传递的整数中，表示这两种媒体类型的位被设置为\
  \ 1，而所有其他位被设置为 0。\n\n另请注意，你需要告诉媒体选择器控制器允许用户选择多个项目。媒体选择器的默认行为是让用户仅选择一个项目。如果这是你期望的行为，那么你无需做任何操作；但如果你想让用户选择多个项目，必须明确告知它。\n\
  \n媒体选择器还有一个名为 `prompt` 的属性，它是一个字符串，会显示在选择器的导航栏上方（参见图 12-1 顶部）。这是可选项，但通常是个好主意。\n\n\
  媒体选择器控制器的委托需要遵循 `MPMediaPickerControllerDelegate` 协议。该协议定义了两个方法：一个在用户点击取消按钮时调用，另一个在用户选择一首或多首歌曲时调用。\n\
  \n#### 处理媒体选择器的取消操作\n\n如果在展示媒体选择器控制器后，用户点击了取消按钮，委托方法 `mediaPickerDidCancel:` 将被调用。你必须在媒体选择器控制器的委托中实现此方法，即使你在用户取消时不需要执行任何处理，因为你必须关闭模态视图控制器。以下是该方法的一个最小化但相当标准的实现：\n\
  \n```objc\n- (void)mediaPickerDidCancel:(MPMediaPickerController *)mediaPicker\n\
  {\n    [self dismissModalViewControllerAnimated: YES];\n}\n```\n\n#### 处理媒体选择器的选择操作\n\
  \n如果用户使用媒体选择器控制器选择了一个或多个媒体项目，委托方法 `mediaPicker:didPickMediaItems:` 将被调用。此方法必须实现，不仅因为委托有责任关闭媒体选择器控制器，还因为这是了解用户选择了哪些曲目的唯一途径。所选项目被分组在一个媒体项目集合中。\n\
  \n以下是 `mediaPicker:didPickMediaItems:` 的一个非常简单的实现示例，它将返回的集合分配给委托的一个属性：\n\n```objc\n\
  - (void)mediaPicker:(MPMediaPickerController *)mediaPicker didPickMediaItems:(MPMediaItemCollection\
  \ *)theCollection\n{\n    [self dismissModalViewControllerAnimated: YES];\n    self.collection\
  \ = theCollection;\n}\n```\n\n### 音乐播放器控制器\n\n如前所述，`MediaPlayer` 框架中有两个播放器控制器：音乐播放器控制器和电影播放器控制器。我们稍后会介绍电影播放器控制器。音乐播放器控制器允许你通过指定媒体项目集合或媒体查询来播放媒体项目队列。正如我们之前所说，音乐播放器控制器没有可视化元素。它是一个播放音频的对象。它允许你通过快进或快退、指定播放哪一特定媒体项目、调整音量或跳转到当前项目的特定播放时间来操作音频的播放。\n\
  \n`MediaPlayer` 框架提供了两种完全不同的音乐播放器控制器：iPod 音乐播放器与应用音乐播放器。它们的使用方式相同，但工作方式存在关键差异。iPod\
  \ 音乐播放器是音乐应用所使用的播放器；与这些应用一样，当你退出应用而音乐仍在播放时，音乐会继续播放。此外，当用户正在听音乐并启动一个使用 iPod 音乐播放器的应用时，iPod\
  \ 音乐播放器会继续播放该音乐。相比之下，应用音乐播放器会在你的应用终止时停止音乐。\n\n这里有一个需要注意的地方：iPod 音乐播放器和应用音乐播放器可以同时使用。如果你使用应用音乐播放器控制器播放音频，而用户当前正在听音乐，两者会同时播放。这可能不是你期望的结果，因此你通常需要检查\
  \ iPod 音乐播放器当前是否有音乐在播放，即使你实际上计划使用应用音乐播放器控制器进行播放。\n\n#### 创建音乐播放器控制器\n\n要获取任一音乐播放器控制器，请使用\
  \ `MPMusicPlayerController` 上的工厂方法。要获取 iPod 音乐播放器，使用 `iPodMusicPlayer` 方法，如下所示：\n\
  \n```objc\nMPMusicPlayerController *thePlayer = [MPMusicPlayerController iPodMusicPlayer];\n\
  ```\n\n获取应用音乐播放器控制器的方法类似，使用 `applicationMusicPlayer` 方法：\n\n```objc\nMPMusicPlayerController\
  \ *thePlayer = [MPMusicPlayerController applicationMusicPlayer];\n```\n\n#### 判断音乐播放器控制器是否正在播放\n\
  \n创建应用音乐播放器后，你需要给它一些东西来播放。但如果你获取 iPod 音乐播放器控制器，它很可能已经在播放某些内容。你可以通过查看播放器的 `playbackState`\
  \ 属性来判断。如果它当前正在播放，该属性将设置为 `MPMusicPlaybackStatePlaying`。\n\n```objc\nif (player.playbackState\
  \ == MPMusicPlaybackStatePlaying) {\n    // 正在播放\n}\n```\n\n#### 指定音乐播放器控制器的队列\n\
  \n指定音乐播放器控制器的音频曲目队列有两种方式：提供媒体查询或提供媒体项目集合。如果你提供媒体查询，音乐播放器控制器的队列将设置为 `items` 属性返回的媒体项目。如果你提供媒体项目集合，它将使用你传递的集合作为其队列。无论哪种情况，你传递的查询或集合中的项目都会替换现有队列。设置队列还会将当前曲目重置为队列中的第一项。\n\
  \n要使用查询设置音乐播放器的队列，请使用 `setQueueWithQuery:` 方法。例如，以下是如何将队列设置为所有歌曲并按艺术家排序：\n\n```objc\n\
  MPMusicPlayerController *player = [MPMusicPlayerController iPodMusicPlayer];\nMPMediaQuery\
  \ *artistsQuery = [MPMediaQuery artistsQuery];\n[player setQueueWithQuery:artistsQuery];\n\
  ```\n\n使用媒体项目集合设置队列通过 `setQueueWithItemCollection:` 方法完成，如下所示：\n\n```objc\nMPMusicPlayerController\
  \ *player = [MPMusicPlayerController iPodMusicPlayer];\nNSArray *items = [NSArray\
  \ arrayWithObjects:mediaItem1, mediaItem2, nil];\nMPMediaItemCollection *collection\
  \ = [MPMediaItemCollection collectionWithItems:items];\n[items setQueueWithItemCollection:collection];\n\
  ```\n\n遗憾的是，目前尚无公开 API 可用于获取音乐播放器控制器的队列。这意味着，如果你希望对队列进行操作，通常需要独立于音乐播放器控制器来跟踪队列。\n\
  \n### 获取或设置当前播放的媒体项目\n\n你可以通过 `nowPlayingItem` 属性获取或设置当前歌曲。这让你能够在使用 iPod 音乐播放器控制器时判断当前正在播放的曲目，并指定要播放的新歌曲。请注意，你指定的媒体项目必须已在音乐播放器控制器的队列中。以下是获取当前播放项目的方法：\n\
  \n```objc\nMPMediaItem *currentTrack = player.nowPlayingItem;\n```\n\n要切换到不同曲目，请执行以下操作：\n\
  \n```objc\nplayer.nowPlayingItem = newTrackToPlay; // 必须已在队列中\n```\n\n### 跳过曲目\n\
  \n音乐播放器控制器允许你使用 `skipToNextItem` 方法向前跳过一首歌曲，或使用 `skipToPreviousItem` 方法向后跳回上一首歌曲。如果没有下一首或上一首歌曲可跳转，音乐播放器控制器将停止播放。你还可以使用\
  \ `skipToBeginning` 方法回到当前歌曲的开头。\n\n以下是三种方法的示例：\n\n```objc\n[player skipToNextItem];\n\
  [player skipToPreviousItem];\n[player skipToBeginning];\n```\n\n### 快进/快退\n\n当你在\
  \ iPhone、iPod touch 或 iTunes 上听音乐时，如果长按前进或后退按钮，音乐将开始快进或快退，并以不断加速的速度播放。这让你可以在同一曲目中跳过不想听的部分，或跳回错过的地方。音乐播放器控制器通过\
  \ `beginSeekingForward` 和 `beginSeekingBackward` 方法提供相同的功能。使用这两种方法时，可通过调用 `endSeeking`\
  \ 来停止此过程。\n\n以下是一系列调用，演示了快进并停止，然后快退并停止的过程：\n\n```objc\n[player beginSeekingForward];\n\
  [player endSeeking];\n\n[player beginSeekingBackward];\n[player endSeeking];\n```\n\
  \n### 播放时间\n\n不要与“回报时间”（自从他们用平淡无奇的迪克·萨金特替换了出色的迪克·约克后，我们多年来一直梦寐以求的东西）混淆，播放时间指定了你当前在歌曲中的播放进度。如果当前歌曲已播放了五秒，那么播放时间将为\
  \ `5.0`。\n\n你可以使用 `currentPlaybackTime` 属性获取和设置当前播放时间。例如，当使用应用程序音乐播放器控制器时，你可能会用到此功能，以便在上次退出应用程序时停止的位置精确恢复播放。以下是使用此属性在当前歌曲中向前跳过十秒的示例：\n\
  \n```objc\nNSTimeInterval currentTime = player.currentPlaybackTime;\nMPMediaItem\
  \ *currentSong = player.nowPlayingItem;\nNSNumber *duration = [currentSong valueForProperty:\n\
  \    MPMediaItemPropertyPlaybackDuration];\ncurrentTime += 10.0;\nif (currentTime\
  \ > [duration doubleValue])\n    currentTime = [duration doubleValue];\nplayer.currentPlaybackTime\
  \ = currentTime;\n```\n\n请注意检查当前播放歌曲的时长，以确保不会传入无效的播放时间。\n\n### 重复与随机播放模式\n\n音乐播放器控制器具有有序的歌曲队列，大多数情况下，它们按照队列中歌曲的顺序播放，从队列开头播放到末尾，然后停止。用户可以通过在\
  \ iPod 或“音乐”应用中设置重复和随机属性来改变此行为。你也可以通过设置音乐播放器控制器的重复和随机模式来改变行为，这些模式由 `repeatMode`\
  \ 和 `shuffleMode` 属性表示。共有四种重复模式：\n\n*   `MPMusicRepeatModeDefault`：使用上次在 iPod 或“音乐”应用中使用的重复模式。\n\
  *   `MPMusicRepeatModeNone`：完全不重复。队列播放完成后停止。\n*   `MPMusicRepeatModeOne`：不断重复当前播放曲目，直到用户崩溃。非常适合播放“这是一个小世界”。\n\
  *   `MPMusicRepeatModeAll`：队列播放完毕后，从第一首曲目重新开始。\n\n还有四种随机模式：\n\n*   `MPMusicShuffleModeDefault`：使用上次在\
  \ iPod 或“音乐”应用中使用的随机模式。\n*   `MPMusicShuffleModeOff`：完全不随机——仅按队列顺序播放歌曲。\n*   `MPMusicShuffleModeSongs`：以随机顺序播放队列中的所有歌曲。\n\
  *   `MPMusicShuffleModeAlbums`：以随机顺序播放当前歌曲所在专辑中的所有歌曲。\n\n以下是同时关闭重复和随机的示例：\n\n```objc\n\
  player.repeatMode = MPMusicRepeatNone;\nplayer.shuffleMode = MPMusicShuffleModeOff;\n\
  ```\n\n### 调整音乐播放器控制器的音量\n\n音乐播放器控制器允许你操作其播放队列中项目的音量。音量可以使用 `volume` 属性进行调整，该属性是一个限幅浮点值。限幅值存储\
  \ `0.0` 到 `1.0` 之间的数字。就音量而言，将属性设置为 `1.0` 表示以最大音量播放曲目，值为 `0.0` 表示静音。这两个极端值之间的任何值都代表最大音量的不同百分比，因此将音量设置为\
  \ `0.5` 相当于将音量旋钮调到一半。\n\n**注意：** 将音量设置为 `1.1` 并不会比设置为 `1.0` 更响。尽管奈吉尔可能告诉过你，但你无法将音量调到\
  \ 11。\n\n以下是将播放器设置为最大音量的方法：\n\n```objc\nplayer.volume = 1.0;\n```\n\n以下是将音量设置到中点的示例：\n\
  \n```objc\nplayer.volume = 0.5;\n```\n\n### 音乐播放器控制器通知\n\n音乐播放器控制器能够在以下三种情况发生时发送通知：\n\
  \n*   当播放状态（播放、停止、暂停、快进等）发生变化时，音乐播放器控制器可以发送 `MPMusicPlayerControllerPlaybackStateDidChangeNotification`\
  \ 通知。\n*   当音量发生变化时，它可以发送 `MPMusicPlayerControllerVolumeDidChangeNotification` 通知。\n\
  *   当新曲目开始播放时，它可以发送 `MPMusicPlayerControllerNowPlayingItemDidChangeNotification`\
  \ 通知。\n\n请注意，音乐播放器控制器默认情况下不会发送任何通知。你必须通过调用 `beginGeneratingPlaybackNotifications`\
  \ 方法，告知 `MPMusicPlayerController` 实例开始生成通知。要让控制器停止生成通知，请调用 `endGeneratingPlaybackNotifications`\
  \ 方法。\n\n如果你需要接收这些通知中的任何一个，首先实现一个接受一个参数（`NSNotification *`）的处理方法，然后在通知中心注册感兴趣的通知。例如，如果你希望在当前播放项目更改时触发某个方法，可以实现一个名为\
  \ `nowPlayingItemChanged:` 的方法，如下所示：\n\n```objc\n- (void)nowPlayingItemChanged:(NSNotification\
  \ *)notification {\n    NSLog(@\"新曲目开始播放\");\n}\n```\n\n要开始监听这些通知，你可以为感兴趣的通知类型注册通知中心，然后让该音乐播放器控制器开始生成通知：\n\
  \n\n```objectivec\nNSNotificationCenter *notificationCenter = [NSNotificationCenter\
  \ defaultCenter];\n[notificationCenter addObserver:self selector:@selector(nowPlayingItemChanged:)\
  \     \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification   \n\
  \    object:player];\n[player beginGeneratingPlaybackNotifications];\n```\n\n完成这一步后，每当曲目发生变化，通知中心就会调用你的\
  \ `nowPlayingItemChanged:` 方法。\n\n当你完成了操作，不再需要这些通知时，需要取消注册并告诉音乐播放器控制器停止生成通知：\n\n\
  ```objectivec\nNSNotificationCenter *center = [NSNotificationCenter defaultCenter];\n\
  [center removeObserver:self                   \n    name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
  \                 \n    object:player];\n[player endGeneratingPlaybackNotifications];\n\
  ```\n\n现在你已经掌握了所有理论知识，让我们开始构建一些东西吧！\n\n### 简易音乐播放器\n\n你要搭建的第一个应用程序将运用之前涵盖的所有内容，来构建一个简易的音乐播放器。该应用将允许用户通过\
  \ `MPMediaPickerController` 创建歌曲队列，并通过 `MPMusicPlayerController` 进行播放。\n\n**注意：**\
  \ 我们将使用术语 *队列* 来描述应用中的歌曲列表，而不是术语 *播放列表*。在处理媒体资料库时，术语 *播放列表* 指的是从 iTunes 同步过来的实际播放列表。这些播放列表可以被读取，但无法使用\
  \ SDK 创建。为了避免混淆，我们将坚持使用术语 *队列*。\n\n当应用启动时，它会检查当前是否有音乐正在播放。如果有，它会允许该音乐继续播放，并将任何请求播放的音乐附加到待播放歌曲列表的末尾。\n\
  \n**提示：** 如果你的应用需要播放特定的音效或音乐，你可能会觉得关闭用户当前正在播放的音乐是合适的，但这样做需要谨慎。如果你只是提供背景音乐，你真的应该考虑让正在播放的音乐继续播放，或者至少让用户选择是否关闭他们选择的音乐来播放你应用的音乐。当然，最终决定权在你手中，但在覆盖用户的音乐时，务必谨慎行事。\n\
  \n你要构建的这个应用并不十分实用，因为你能提供给用户的所有功能（甚至更多）在 iOS 设备上的“音乐”应用中已经存在了。但编写这个应用将让你能够探索你自己的应用在处理媒体资料库时可能需要执行的几乎所有任务。\n\
  \n**警告：** 本章的应用必须在真实的 iOS 设备上运行。iOS 模拟器无法访问你电脑上的 iTunes 资料库，任何与 iTunes 资料库访问 API\
  \ 相关的调用都会在模拟器上导致错误。\n\n### 构建 SimplePlayer 应用\n\n你的应用将获取 iPod 音乐播放器控制器，并允许你通过媒体选择器将歌曲添加到队列中。你将提供一些基本的播放控制功能，如播放/暂停音乐，以及在队列中向前和向后跳转。\n\
  \n**注意：** 再次提醒，模拟器目前还不支持媒体资料库功能。为了充分利用 SimplePlayer 应用，你需要在 iOS 设备上运行它，这意味着你需要注册苹果的付费\
  \ iOS 开发者计划。如果你还没有这样做，不妨暂停片刻，前往 [`developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)\
  \ 了解一下。\n\n让我们先在 Xcode 中创建一个新项目。由于这是一个非常简单的应用，我们将使用“单视图应用”项目模板，并将新项目命名为 `SimplePlayer`。因为你只有一个视图，所以不需要使用\
  \ Storyboard，当然如果你想用的话也可以。\n\n新项目创建完成后，你需要将 `MediaPlayer` 框架添加到项目中。在导航窗格顶部选择 `SimplePlayer`\
  \ 项目。在项目编辑器中，选择 `SimplePlayer` 目标并打开“构建阶段”面板。找到“将二进制文件与库链接”（3 项）部分并展开。点击该部分底部的 +\
  \ 按钮，然后添加 `MediaPlayer` 框架。如果操作正确，`MediaPlayer.framework` 应该会出现在导航窗格的项目中。为了保持整洁，我们将\
  \ `MediaPlayer.framework` 移到项目中的“框架”组中。\n\n### 构建用户界面\n\n单击 `ViewController.xib`\
  \ 打开界面生成器。让我们看看 图 12-2。顶部有三个标签，中间是一个图像视图，底部是一个带有四个按钮的按钮栏。我们从底部开始，逐步向上构建。\n\n![9781430238072_Fig12-02.jpg](img/9781430238072_Fig12-02.jpg)\n\
  \n图 12-2.  SimplePlayer 应用正在播放一首歌曲\n\n从对象库中拖拽一个 `UIToolbar` 到 `UIView` 的底部。默认情况下，`UIToolbar`\
  \ 会提供一个左对齐的 `UIBarButtonItem`。由于你的工具栏需要四个按钮，我们将保留这个按钮。拖拽一个灵活的空白栏按钮项（图 12-3）到 `UIBarButtonItem`\
  \ 的左侧。确保你使用的是灵活空白，而不是固定空白。如果放置位置正确，`UIBarButtonItem` 现在应该右对齐到 `UIToolbar` 上（图 12-4）。\n\
  \n![9781430238072_Fig12-03.jpg](img/9781430238072_Fig12-03.jpg)\n\n图 12-3.  对象库中的灵活空白栏按钮项\n\
  \n![9781430238072_Fig12-04.jpg](img/9781430238072_Fig12-04.jpg)\n\n图 12-4.  带有灵活空白的\
  \ SimplePlayer 工具栏\n\n在灵活空白的左侧添加三个 `UIBarButtonItem`。这些将是你的播放控制按钮。为了将这些按钮居中，你需要在\
  \ `UIToolbar` 的左侧再添加一个灵活的空白栏按钮项（图 12-5）。选择最左侧的按钮，打开属性检查器。将标识符从“自定义”更改为“后退”（图 12-6）。选择新“后退”按钮右侧的按钮，将标识符更改为“播放”。将“播放”按钮右侧的按钮标识符更改为“快进”。选择最右侧的按钮，将标识符更改为“添加”。完成后，效果应如\
  \ 图 12-7 所示。\n\n![9781430238072_Fig12-05.jpg](img/9781430238072_Fig12-05.jpg)\n\n\
  图 12-5.  包含所有按钮的工具栏\n\n![9781430238072_Fig12-06.jpg](img/9781430238072_Fig12-06.jpg)\n\
  \n图 12-6.  将栏按钮项标识符更改为“后退”\n\n![9781430238072_Fig12-07.jpg](img/9781430238072_Fig12-07.jpg)\n\
  \n图 12-7.  完成后的工具栏\n\n向上移动视图，你需要添加一个 `UIImageView`。将其拖拽到视图中，位于工具栏上方。界面生成器会将 `UIImageView`\
  \ 扩展以填充可用区域。如果你不希望这样，请在实用工具面板中打开大小检查器。`UIImageView` 应该已经被选中，如果没有，请选中它以确保你在调整正确的组件。大小检查器应显示你的\
  \ `UIImageView` 宽度为 320。将高度改为与宽度相同。现在你的图像视图应该是正方形的。使用对齐参考线将图像视图在视图中居中。\n\n\n\n###\
  \ 格式化你的 SimplePlayer 应用\n\n现在你需要在顶部添加三个标签。拖拽一个标签到应用视图的顶部，将标签区域扩展到视图的宽度。打开属性检查器，将标签文本从“Label”改为“Now\
  \ Playing”。将标签颜色从黑色改为白色，并将字体设置为 System Bold 17.0。将对齐方式设为居中。最后，将标签背景色改为黑色（图 12-8）。在此标签下方再添加一个标签，为其设置与第一个标签相同的属性，但将文本从“Label”改为“Artist”。再在\
  \ Artist 标签下方添加一个标签，设置相同的属性，并将文本改为“Song”。\n\n![9781430238072_Fig12-08.jpg](img/9781430238072_Fig12-08.jpg)\n\
  \n图 12-8. SimplePlayer 标签属性设置\n\n最后，将视图的背景色设为黑色。因为黑色很酷。\n\n### 声明 Outlets 和 Actions\n\
  \n在 Interface Builder 中，从标准编辑器切换到助理编辑器。编辑器面板应拆分为左侧显示 Interface Builder，右侧显示 `ViewController.h`。Control-从带有“Now\
  \ Playing”文本的标签拖拽到 `@interface` 声明下方。创建一个 `UILabel` 出口并命名为 `status`。对 Artist 和 Song\
  \ 标签重复此操作，将出口分别命名为 `artist` 和 `song`。\n\nControl-从图像视图拖拽到标签出口下方，创建一个名为 `imageView`\
  \ 的 `UIImageView` 出口。对工具栏和播放按钮执行相同操作。现在已设置好出口，接下来需要添加动作。\n\nControl-从 `rewindButton`\
  \ 拖拽，创建一个名为 `rewindPressed` 的动作。对每个按钮重复此操作。将播放动作命名为 `playPausePressed`，快进动作命名为 `fastForwardPressed`，添加动作命名为\
  \ `addPressed`。\n\n切换回标准编辑器，选择 `ViewController.h` 在编辑器中打开。\n\n首先，你需要让 `ViewController`\
  \ 遵循 `MPMediaPickerDelegate` 协议，以便使用 `MPMediaPicker` 控制器。为此，你需要在 UIKit 头文件导入之后，导入\
  \ MediaPlayer 头文件：\n\n```objective-c\n#import <MediaPlayer/MediaPlayer.h>\n```\n\
  \n然后，将协议声明添加到 `ViewController`：\n\n```objective-c\n@interface ViewController : UIViewController\
  \ <MPMediaPickerControllerDelegate>\n```\n\n你需要添加另一个 `UIBarButtonItem` 属性，用于存放播放音乐时显示的暂停按钮。你还需要将播放按钮属性从\
  \ weak 改为 strong，以便在两个按钮之间切换。\n\n```objective-c\n@property (strong, nonatomic) IBOutlet\
  \ UIBarButtonItem *play;\n@property (strong, nonatomic)          UIBarButtonItem\
  \ *pause;\n```\n\n你还需要两个属性：一个用于存放 `MPMediaPlayerController` 实例，另一个用于存放播放器正在播放的 `MPMediaItemCollection`。\n\
  \n```objective-c\n@property (strong, nonatomic) MPMusicPlayerController *player;\n\
  @property (strong, nonatomic) MPMediaItemCollection   *collection;\n```\n\n当 `MPMusicPlayerController`\
  \ 开始播放新的媒体项时，它会发送类型为 `MPMusicPlayerControllerNowPlayingItemDidChangeNotification`\
  \ 的通知。你将设置一个该通知的观察者，用于更新视图中的标签。\n\n```objective-c\n- (void)nowPlayingItemChanged:(NSNotification\
  \ *)notification;\n```\n\n选择 `ViewController.m` 在编辑器面板中打开。首先，你需要在视图加载时进行一些设置。找到\
  \ `viewDidLoad` 方法。在调用 `super` 之后，你需要实例化暂停按钮。\n\n```objective-c\nself.pause = [[UIBarButtonItem\
  \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause                \
  \                                                                              \
  \              target:self                                                     \
  \                                                       action:@selector(playPausePressed:)];\n\
  [self.pause setStyle:UIBarButtonItemStyleBordered];\n```\n\n接下来，创建你的 `MPMusicPlayerController`\
  \ 实例。\n\n```objective-c\nself.player = [MPMusicPlayerController iPodMusicPlayer];\n\
  ```\n\n然后，注册通知，以便在播放器中的“正在播放”项发生改变时接收通知。\n\n```objective-c\nNSNotificationCenter\
  \ *notificationCenter = [NSNotificationCenter defaultCenter];\n[notificationCenter\
  \ addObserver:self                        selector:@selector(nowPlayingItemChanged:)\
  \                            \n name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
  \                          \nobject:self.player];\n[self.player beginGeneratingPlaybackNotifications];\n\
  ```\n\n请注意，你必须告知播放器开始生成播放通知。由于你注册了通知，因此在视图被释放时需要移除观察者。\n\n```objective-c\n- (void)didReceiveMemoryWarning\n\
  {\n    [super didReceiveMemoryWarning];\n    // 释放任何可以重新创建的资源\n    [[NSNotificationCenter\
  \ defaultCenter]         \n   removeObserver:self                   \n   name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\
  \                 \n object:self.player];\n}\n```\n\n接下来，我们处理按钮动作。当用户按下后退按钮时，你希望播放器跳到队列中的上一首歌曲。但如果当前是第一首歌曲，则只需跳转到该歌曲的开头。\n\
  \n```objective-c\n- (IBAction)rewindPressed:(id)sender\n{\n    if ([self.player\
  \ indexOfNowPlayingItem] == 0) {\n        [self.player skipToBeginning];\n    }\n\
  \    else {\n        [self.player endSeeking];\n        [self.player skipToPreviousItem];\n\
  \    }\n}\n```\n\n当按下播放按钮时，你希望开始播放音乐，同时希望按钮变为暂停按钮。如果播放器已经在播放音乐，你希望播放器暂停（停止），并将按钮切换回播放按钮。\n\
  \n```objective-c\n- (IBAction)playPausePressed:(id)sender\n{\n    MPMusicPlaybackState\
  \ playbackState = [self.player playbackState];\n    NSMutableArray *items = [NSMutableArray\
  \ arrayWithArray:[self.toolbar items]];\n    if (playbackState == MPMusicPlaybackStateStopped\
  \ || playbackState == MPMusicPlaybackStatePaused) {\n        [self.player play];\n\
  \        [items replaceObjectAtIndex:2 withObject:self.pause];\n    }\n    else\
  \ if (playbackState == MPMusicPlaybackStatePlaying) {\n        [self.player pause];\n\
  \        [items replaceObjectAtIndex:2 withObject:self.play];\n    }\n    [self.toolbar\
  \ setItems:items animated:NO];\n}\n```\n\n你查询播放器的播放状态，然后据此决定是启动还是停止播放器。为了在播放和暂停按钮之间切换，你需要获取工具栏中的项目数组，并将第三个项目（索引为\
  \ 2）替换为相应的按钮。然后，为工具栏替换整个工具栏按钮项目数组。\n\n快进按钮的工作方式与后退按钮类似。按下时，播放器在队列中向前移动并播放下一首歌曲。如果当前是队列中的最后一首歌曲，则停止播放器并重置播放按钮。\n\
  \n```objective-c\n- (IBAction)fastForwardPressed:(id)sender\n{\n    NSUInteger nowPlayingIndex\
  \ = [self.player indexOfNowPlayingItem];\n    [self.player endSeeking];\n    [self.player\
  \ skipToNextItem];\n    if ([self.player nowPlayingItem] == nil) {\n        if ([self.collection\
  \ count] > nowPlayingIndex+1) {\n            // 播放过程中添加了更多歌曲\n            [self.player\
  \ setQueueWithItemCollection:self.collection];\n            MPMediaItem *item =\
  \ [[self.collection items] objectAtIndex:nowPlayingIndex+1];\n            [self.player\
  \ setNowPlayingItem:item];\n            [self.player play];\n        }\n       \
  \ else {\n            // 没有更多歌曲\n            [self.player stop];\n            NSMutableArray\
  \ *items = [NSMutableArray arrayWithArray:[self.toolbar items]];\n            [items\
  \ replaceObjectAtIndex:2 withObject:self.play];\n            [self.toolbar setItems:items];\n\
  \        }\n    }\n}\n```\n\n当按下添加按钮时，你需要以模态方式显示 `MPMediaPickerController`。将其设置为仅显示音乐媒体类型，并将委托设置为\
  \ `ViewController`。\n\n\n```objc\n- (IBAction)addPressed:(id)sender\n{\n    MPMediaType\
  \ mediaType = MPMediaTypeMusic;\n    MPMediaPickerController *picker =         [[MPMediaPickerController\
  \ alloc] initWithMediaTypes:mediaType];\n    picker.delegate = self;\n    [picker\
  \ setAllowsPickingMultipleItems:YES];\n    picker.prompt = NSLocalizedString(@\"\
  Select items to play\", @\"Select items to play\");\n    [self presentViewController:picker\
  \ animated:YES completion:nil];\n}\n```\n\n现在似乎是添加 `MPMediaPickerControllerDelegate`\
  \ 方法的好时机。该协议中只定义了两个方法：`mediaPicker:didPickMediaItems:`（当用户完成选择时调用）和 `mediaPickerDidCancel:`（当用户取消媒体选择时调用）。\n\
  \n```objc\n#pragma mark - 媒体选择器委托方法\n\n- (void)mediaPicker:(MPMediaPickerController\
  \ *)mediaPicker         didPickMediaItems:(MPMediaItemCollection *)theCollection\n\
  {\n    [mediaPicker dismissViewControllerAnimated:YES completion:nil];\n\nif (self.collection\
  \ == nil) {\n        self.collection = theCollection;\n        [self.player setQueueWithItemCollection:self.collection];\n\
  \        MPMediaItem *item = [[self.collection items] objectAtIndex:0];\n      \
  \  [self.player setNowPlayingItem:item];\n        [self playPausePressed:self];\n\
  \    }\n    else {\n        NSArray *oldItems = [self.collection items];\n     \
  \   NSArray *newItems = [oldItems arrayByAddingObjectsFromArray:[theCollection items]];\n\
  \        self.collection = [[MPMediaItemCollection alloc] initWithItems:newItems];\n\
  \    }\n}\n\n- (void)mediaPickerDidCancel:(MPMediaPickerController *) mediaPicker\n\
  {\n    [mediaPicker dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\
  \n当用户完成选择后，你需要关闭媒体选择器控制器。接着检查媒体集合属性。如果 `ViewController` 的集合属性为 `nil`，则直接将其赋值为委托调用中传来的媒体集合；如果集合已存在，则需要将新的媒体条目追加到现有集合中。`mediaPickerDidCancel:`\
  \ 方法则直接关闭媒体选择器控制器。\n\n最后，你需要实现当前播放项发生变化时的通知方法。\n\n```objc\n#pragma mark - 通知方法\n\
  \n- (void)nowPlayingItemChanged:(NSNotification *)notification\n{\n        MPMediaItem\
  \ *currentItem = [self.player nowPlayingItem];\n    if (currentItem == nil) {\n\
  \        [self.imageView setImage:nil];\n        [self.imageView setHidden:YES];\n\
  \        [self.status setText:NSLocalizedString (@\"Tap + to Add More Music\", @\"\
  Add More Music\")];\n        [self.artist setText:nil];\n        [self.song setText:nil];\n\
  \    }\n    else {\n        MPMediaItemArtwork *artwork = [currentItem valueForProperty:\
  \ MPMediaItemPropertyArtwork];\n        if (artwork) {\n            UIImage *artworkImage\
  \ = [artwork imageWithSize:CGSizeMake(320, 320)];\n            [imageView setImage:artworkImage];\n\
  \            [imageView setHidden:NO];\n        }\n\n// 显示当前播放媒体条目的艺术家和歌曲名称\n  \
  \      [self.status setText:NSLocalizedString(@\"Now Playing\", @\"Now Playing\"\
  )];\n        [self.artist setText:[currentItem valueForProperty:MPMediaItemPropertyArtist]];\n\
  \        [self.song setText:[currentItem valueForProperty:MPMediaItemPropertyTitle]];\n\
  \    }\n}\n```\n\n`nowPlayingItemChanged:` 方法首先向播放器查询当前正在播放的媒体条目。如果没有任何播放内容，它会重置视图并将状态标签设置为提示用户添加更多音乐。如果有内容在播放，则通过\
  \ `MPMediaItemPropertyArtwork` 属性获取媒体条目的插图，并检查该媒体条目是否包含插图。如果包含，则将插图放入图像视图中，然后更新标签以显示艺术家和歌曲名称。\n\
  \n构建并运行 `SimplePlayer` 应用，你应该能够从媒体库中选择音乐并播放。虽然这个播放器相当简单，功能有限，但你可以看到如何使用 `MediaPlayer`\
  \ 框架来播放音乐。接下来，你将使用 `MediaPlayer` 框架来播放视频。\n\n### MPMoviePlayerController\n\n使用 `MediaPlayer`\
  \ 框架播放视频非常简单。首先，你需要要播放的媒体条目的 URL。该 URL 可以指向媒体库中的视频文件，也可以指向互联网上的视频资源。如果你想播放媒体库中的视频，可以通过\
  \ `MPMediaItem` 的 `MPMediaItemPropertyAssetURL` 属性获取 URL。\n\n```objc\n// videoMediaItem\
  \ 是 MPMediaItem 的一个实例，指向媒体库中的一个视频\nNSURL *url = [videoMediaItem valueForProperty:MPMediaItemPropertyAssetURL];\n\
  ```\n\n获取视频 URL 后，用它来创建 `MPMoviePlayerController` 实例。该视图控制器负责处理视频播放及内置播放控件。`MPMoviePlayerController`\
  \ 有一个用于呈现播放内容的 `UIView` 属性，该 `UIView` 可以集成到应用的视图（控制器）层级结构中。使用封装了 `MPMoviePlayerController`\
  \ 的 `MPMoviePlayerViewController` 类会更容易，你可以通过模态方式将 `MPMoviePlayerViewController`\
  \ 推入视图（控制器）层级结构，从而更易于管理。`MPMoviePlayerViewController` 类将其底层的 `MPMoviePlayerController`\
  \ 作为属性公开。\n\n为了确定 `MPMoviePlayerController` 中视频媒体的状态，系统会发送一系列通知（表 12-2）。\n\n**表\
  \ 12-2.** MPMoviePlayerController 通知\n\n| 通知 | 描述 |\n| --- | --- |\n| `MPMovieDurationAvailableNotification`\
  \ | 已确定电影（视频）的时长（长度）。 |\n| `MPMovieMediaTypesAvailableNotification` | 已确定电影（视频）的媒体类型（格式）。\
  \ |\n| `MPMovieNaturalSizeAvailableNotification` | 已确定或更改电影（视频）的原始（首选）帧尺寸。 |\n|\
  \ `MPMoviePlayerDidEnterFullscreenNotification` | 播放器已进入全屏模式。 |\n| `MPMoviePlayerDidExitFullscreenNotification`\
  \ | 播放器已退出全屏模式。 |\n| `MPMoviePlayerIsAirPlayVideoActiveDidChangeNotification` |\
  \ 播放器已开始或结束通过 AirPlay 播放电影（视频）。 |\n| `MPMoviePlayerLoadStateDidChangeNotification`\
  \ | 播放器（网络）缓冲状态已更改。 |\n| `MPMoviePlayerNowPlayingMovieDidChangeNotification` | 当前正在播放的电影（视频）已更改。\
  \ |\n| `MPMoviePlayerPlaybackDidFinishNotification` | 播放器已完成播放。可通过 `MPMoviePlayerDidFinishReasonUserInfoKey`\
  \ 查找原因。 |\n| `MPMoviePlayerPlaybackStateDidChangeNotification` | 播放器播放状态已更改。 |\n\
  | `MPMoviePlayerScalingModeDidChangeNotification` | 播放器缩放模式已更改。 |\n| `MPMoviePlayerThumbnailImageRequestDidFinishNotification`\
  \ | 捕获缩略图的请求已完成，可能成功或失败。 |\n| `MPMoviePlayerWillEnterFullscreenNotification` | 播放器即将进入全屏模式。\
  \ |\n| `MPMoviePlayerWillExitFullscreenNotification` | 播放器即将退出全屏模式。 |\n| `MPMovieSourceTypeAvailableNotification`\
  \ | 电影（视频）的源类型原本未知，现在已确定。 |\n\n通常，只有在使用 `MPMoviePlayerController` 时才需要关注这些通知。\n\n\
  理论讲够了。现在来构建一个应用，可以从媒体库中同时播放音频和视频媒体内容。\n\n\n您将使用 `MediaPlayer` 框架构建一个新应用，该应用允许您从媒体库中播放音频和视频内容。首先，您需要创建一个标签栏控制器，其中一个标签用于音频内容，另一个标签用于视频内容（图\
  \ 12-9）。您将不使用队列来排序媒体选择。保持简单：用户选择媒体项，应用程序将播放它。\n\n![9781430238072_Fig12-09.jpg](img/9781430238072_Fig12-09.jpg)\n\
  \n图 12-9. 包含音乐和视频标签的 `MPMediaPlayer`\n\n使用“标签页应用”模板创建一个新项目。将应用命名为 `MPMediaPlayer`，并让项目使用故事板和自动引用计数。将\
  \ `MediaPlayer` 框架添加到 `MPMediaPlayer` 目标中。如果您不确定如何操作，请回顾在 `SimplePlayer` 应用中的操作方法。\n\
  \n`Xcode` 将创建两个视图控制器：`FirstViewController` 和 `SecondViewController`，并提供标准尺寸（`first.png`、`second.png`）和双倍尺寸（`first@2x.png`、`second@2x.png`）的标签栏图标。您将替换这些控制器和图像，因此请删除它们。在导航窗格中选择控制器文件\
  \ `FirstViewController.[hm]` 和 `SecondViewController.[hm]` 以及 `.png` 文件。删除文件。当 `Xcode`\
  \ 询问时，将文件移到废纸篓。选择 `MainStoryboard.storyboard` 在故事板编辑器中打开。选择第一个视图控制器场景并删除它。对第二个视图控制器重复此操作。故事板编辑器应仅包含标签栏控制器（图\
  \ 12-10）。\n\n![9781430238072_Fig12-10.jpg](img/9781430238072_Fig12-10.jpg)\n\n图\
  \ 12-10. 删除第一个和第二个视图控制器\n\n查看图 12-9，您会看到每个标签控制器都是一个表视图控制器。从对象库中拖拽一个 `UITableViewController`\
  \ 到故事板编辑器中标签栏控制器的右侧。按住 `Control` 键从标签栏视图控制器拖拽到新的表视图控制器。当弹出“Segue”菜单时，在“关系转场”标题下选择“视图控制器”选项。添加第二个\
  \ `UITableViewController`，并再次从标签栏控制器拖拽到它，选择“视图控制器”选项。对齐两个表视图控制器，并尝试使您的故事板看起来像图 12-11。\n\
  \n![9781430238072_Fig12-11.jpg](img/9781430238072_Fig12-11.jpg)\n\n图 12-11. 添加新的表视图控制器\n\
  \n选择顶部表视图控制器中的表视图单元格。打开属性检查器，将“样式”属性设置为“副标题”。为“标识符”属性赋予值 `MediaCell`。将“选择”属性设置为“无”，将“附件”属性设置为“披露指示器”。对底部表视图控制器中的表视图单元格重复这些属性设置。\n\
  \n您将使用顶部表视图控制器处理音频媒体，使用底部表视图控制器处理视频媒体。因此，您将需要一个音频视图控制器和一个视频视图控制器。然而，每个视图控制器实际上只是一个媒体视图控制器。因此，您将首先创建一个\
  \ `MediaViewController` 类，然后对它进行子类化。使用 Objective-C 类模板创建一个新文件。将类命名为 `MediaViewController`，并将其设置为\
  \ `UITableViewController` 的子类。\n\n您希望 `MediaViewController` 足够通用，以处理音频和视频媒体。这意味着您需要存储一个媒体项数组，并提供一个方法来加载这些项。打开\
  \ `MediaViewController.h`。首先，您需要导入 `MediaPlayer` 头文件。将其添加到 `UIKit` 头文件导入之后。\n\n\
  ```\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n我们提到您需要存储一个媒体项数组。您将把它声明为 `MediaViewController`\
  \ 类的属性。\n\n```\n@property (strong, nonatomic) NSArray *mediaItems;\n```\n\n并且您将声明一个方法来根据媒体类型填充\
  \ `mediaItems`。\n\n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType;\n\
  ```\n\n选择 `MediaViewController.m` 并调整实现。首先，您需要修复表视图数据源方法，以定义表视图中的节数和每节的行数。\n\n```\n\
  - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    // Return\
  \ the number of sections.\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // Return the number\
  \ of rows in the section.\n    return self.mediaItems.count;\n}\n```\n\n接下来，您需要调整表视图单元格的填充方式。\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView          \ncellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *CellIdentifier = @\"MediaCell\";\n    UITableViewCell\
  \ *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier          \
  \                                       forIndexPath:indexPath];\n\n// Configure\
  \ the cell. . .\n    NSUInteger row = [indexPath row];\n    MPMediaItem *item =\
  \ [self.mediaItems objectAtIndex:row];\n    cell.textLabel.text = [item valueForProperty:MPMediaItemPropertyTitle];\n\
  \    cell.detailTextLabel.text = [item valueForProperty:MPMediaItemPropertyArtist];\n\
  \    cell.tag = row;\n\nreturn cell;\n}\n```\n\n最后，您需要实现 `loadMediaItemsForMediaType:`\
  \ 方法。\n\n```\n- (void)loadMediaItemsForMediaType:(MPMediaType)mediaType\n{\n   \
  \ MPMediaQuery *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber=\
  \ [NSNumber numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate =\
  \         \n    [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber   \
  \                                \n    forProperty:MPMediaItemPropertyMediaType];\n\
  \    [query addFilterPredicate:predicate];\n    self.mediaItems = [query items];\n\
  }\n```\n\n您已经定义了 `MediaViewController` 类。现在创建您的音频和视频子类。创建一个新的 Objective-C 类，命名为\
  \ `AudioViewController`，它将作为 `MediaViewController` 的子类。重复此过程，这次将文件命名为 `VideoViewController`。您只需要对每个文件进行两处小的调整。首先，打开\
  \ `AudioViewController.m`，并在 `viewDidLoad` 方法中，在调用 `super` 之后添加以下行：\n\n```\n[self\
  \ loadMediaItemsForMediaType:MPMediaTypeMusic];\n```\n\n对 `VideoViewController.m`\
  \ 执行相同操作，但这次您需要加载视频。\n\n```\n[self loadMediaItemsForMediaType:MPMediaTypeAnyVideo];\n\
  ```\n\n让您的应用使用这些新的视图控制器。选择 `MainStoryboard.storyboard` 打开故事板编辑器。选择顶部表视图控制器。在身份检查器中，将“自定义类”从\
  \ `UITableViewController` 更改为 `AudioViewController`。将底部表视图控制器类更改为 `VideoViewController`。\n\
  \n在继续之前，为每个视图控制器更新标签。选择音频视图控制器中的标签栏。在属性检查器中，将“标题”设置为 `Music`，并将“图像”设置为 `music.png`。您可以在本章的下载文件夹中找到图像文件\
  \ `music.png` 和 `video.png`。选择视频视图控制器中的标签栏，将其标题设置为 `Video`，并将其图像设置为 `video.png`。\n\
  \n构建并运行您的应用。选择“音乐”标签时，您应该看到媒体库中的所有音乐，选择“视频”标签时，您应该看到媒体库中的所有视频。太好了！现在您需要支持播放。您将使用\
  \ `MPMoviePlayerViewController` 来播放视频，但与 `SimplePlayer` 一样，您需要创建一个音频播放视图控制器。您将制作一个更简单的音频播放控制器版本。创建一个新的\
  \ Objective-C 文件，命名为 `PlayerViewController`，它将作为 `UIViewController` 的子类。\n\n\n\n\
  选择`MainStoryboard.storyboard`，以便在`PlayerViewController`场景中工作。将一个`UIViewController`拖放到音频视图控制器的右侧。选中新的视图控制器，打开身份检查器（Identity\
  \ Inspector），将其类从`UIViewController`更改为`PlayerViewController`。从音频视图控制器中的表格视图单元格（`UITableViewCell`）按住\
  \ Control 键拖拽到`UIViewController`，并选择模态手动转场（Modal Manual Segue）。选中`AudioViewController`与`PlayerViewController`之间的转场，在属性检查器（Attributes\
  \ Inspector）中将其命名为`PlayerSegue`。\n\n完成后的音频播放视图控制器将如图 Figure 12-12 所示。从顶部开始，添加两个`UILabel`。将它们拉伸至视图宽度。与在`SimplePlayer`中一样，将标签扩展到视图宽度并调整其属性（System\
  \ Bold 17.0 字体、居中对齐、白色前景色、黑色背景色）。将顶部标签的文本设置为`Artist`，底部标签的文本设置为`Song`。\n\n![9781430238072_Fig12-12.jpg](img/9781430238072_Fig12-12.jpg)\n\
  \nFigure 12-12.  MPMediaPlayer 音频播放视图控制器\n\n将一个`UIImageView`拖入场景中，位于`Song`标签下方。使用蓝色的辅助线合理调整间距。调整图像视图的大小以适应视图宽度，并使其为正方形（320\
  \ 像素×320 像素）。在图像视图正下方，拖入一个`UISlider`。使用蓝色边距辅助线调整滑块宽度。最后，将一个`UIToolbar`拖放到`PlayerViewController`视图的底部。选中工具栏左侧的`UIBarButtonItem`。使用属性检查器，将标识符（Identifier）从`Custom`更改为`Done`。在`Done`按钮右侧拖入一个弹性空间栏按钮项（Flexible\
  \ Space Bar Button Item）。接着，在弹性空间项右侧添加一个`UIBarButtonItem`。选中新的栏按钮项，在属性检查器中将其标识符更改为`Play`。最后，为了让播放按钮居中，在`Play`按钮右侧再添加一个弹性空间栏按钮项。\n\
  \n与在`SimplePlayer`中的操作一样，需要为`PlayerViewController`创建一些输出口（Outlet）和操作（Action）。进入助理编辑器模式（Assistant\
  \ Editor mode）。从`Artist`标签按住 Control 键拖拽到`PlayerViewController`的实现文件中，创建一个名为`artist`的输出口。对`Song`标签执行相同操作，将其命名为`song`。为图像视图、滑块、工具栏和播放按钮创建输出口。除滑块外，输出口的名称应显而易见（例如图像视图对应`imageView`）。滑块对应的输出口将命名为`volume`，因为将使用该滑块控制音量级别。\n\
  \n需要定义三个操作。从音量滑块按住 Control 键拖拽，为值更改事件（Value Changed）创建一个名为`volumeChanged:`的操作。从`Done`按钮拖拽创建一个`donePressed:`操作。从`Play`按钮拖拽创建一个`playPausePressed:`操作。将编辑器切换回标准模式（Standard\
  \ mode），并选择`PlayerViewController.h`。\n\n首先，需要导入`MediaPlayer`头文件。在`UIKit`头文件导入之后添加导入声明。\n\
  \n```\n#import <MediaPlayer/MediaPlayer.h>\n```\n\n正如在`SimplePlayer`中所做的那样，需要将`play`属性输出口从`weak`重新定义为`strong`。同时声明`pause`（按钮）属性。\n\
  \n```\n@property (strong, nonatomic) IBOutlet UIBarButtonItem *play;\n@property\
  \ (strong, nonatomic)          UIBarButtonItem *pause;\n```\n\n需要再添加两个属性：一个用于持有`MPMusicPlayerController`实例，另一个用于持有当前正在播放的`MPMediaItem`。\n\
  \n```\n@property (strong, nonatomic) MPMusicPlayerController *player;\n@property\
  \ (strong, nonatomic) MPMediaItem *mediaItem;\n```\n\n需要了解播放器状态何时改变以及播放器媒体项何时改变。请记住，这些通过通知（Notifications）处理。将声明一些方法来注册通知中心（Notification\
  \ Center）。\n\n```\n- (void)playingItemChanged:(NSNotification *)notification;\n\
  - (void)playbackStateChanged:(NSNotification *)notification;\n```\n\n接下来转到`PlayerViewController.m`并实现相关代码。由于暂停按钮不属于故事板场景，需要手动创建它。找到`viewDidLoad`方法，在调用`[super\
  \ viewDidLoad]`之后创建它。\n\n```\nself.pause = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemPause\
  \ target:self action:@selector(playPausePressed:)];\n[self.pause setStyle:UIBarButtonItemStyleBordered];\n\
  ```\n\n需要一个`MPMusicPlayerController`实例来播放音乐。\n\n```\nself.player = [MPMusicPlayerController\
  \ applicationMusicPlayer];\n```\n\n希望观察播放器的通知，因此注册这些通知并要求播放器开始生成通知。\n\n```\nNSNotificationCenter\
  \ *notificationCenter = [NSNotificationCenter defaultCenter];\n[notificationCenter\
  \ addObserver:self\n                       selector:@selector(playingItemChanged:)\n\
  \                           name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n\
  \                         object:self.player];\n[notificationCenter addObserver:self\n\
  \                       selector:@selector(playbackStateChanged:)\n            \
  \               name:MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
  \                         object:self.player];\n[self.player beginGeneratingPlaybackNotifications];\n\
  ```\n\n需要将媒体项传递给播放器。但播放器接受`MPMediaItemCollection`，而不是单个`MPMediaItem`。将在`viewDidAppear:`方法中完成此赋值操作，在该方法中创建一个集合并传递给播放器。\n\
  \n```\n- (void)viewDidAppear:(BOOL)animated\n{\n    [super viewDidAppear:animated];\n\
  \    MPMediaItemCollection *collection =\n    [[MPMediaItemCollection alloc] initWithItems:@[self.mediaItem]];\n\
  \    [self.player setQueueWithItemCollection:collection];\n    [self.player play];\n\
  }\n```\n\n当`PlayerViewController`被释放时，需要停止生成通知并取消注册观察者。找到`didReceiveMemoryWarning`方法，并添加以下调用：\n\
  \n```\n[self.player endGeneratingPlaybackNotifications];\n[[NSNotificationCenter\
  \ defaultCenter]\n  removeObserver:self\n  name:MPMusicPlayerControllerPlaybackStateDidChangeNotification\n\
  \  object:self.player];\n[[NSNotificationCenter defaultCenter]\n  removeObserver:self\n\
  \  name:MPMusicPlayerControllerNowPlayingItemDidChangeNotification\n  object:self.player];\n\
  ```\n\n`volumeChanged:`方法只需更改播放器音量以反映音量滑块的值。\n\n```\n- (IBAction)volumeChanged:(id)sender\n\
  {\n    self.player.volume = [self.volume value];\n}\n```\n\n`donePressed:`方法停止播放并关闭`PlayerViewController`。\n\
  \n```\n- (IBAction)donePressed:(id)sender\n{\n    [self.player stop];\n    [self\
  \ dismissViewControllerAnimated:YES completion:nil];\n}\n```\n\n`playPausePressed:`方法与`SimplePlayer`中的类似。不在工具栏中更新播放/暂停按钮；这将在`playbackStateChanged:`方法中处理。\n\
  \n```\n- (IBAction)playPausePressed:(id)sender\n{\n    MPMusicPlaybackState playbackState\
  \ = [self.player playbackState];\n    if (playbackState == MPMusicPlaybackStateStopped\
  \ || playbackState == MPMusicPlaybackStatePaused) {\n        [self.player play];\n\
  \    } else if (playbackState == MPMusicPlaybackStatePlaying) {\n        [self.player\
  \ pause];\n    }\n}\n```\n\n实现通知观察者方法非常直接。当播放器媒体项改变时更新视图。同样，这与`SimplePlayer`中的相同方法类似。\n\
  \n\n\n```\n- (void)playingItemChanged:(NSNotification *)notification\n{\n    MPMediaItem\
  \ *currentItem = [self.player nowPlayingItem];\n    if (nil == currentItem) {\n\
  \        [self.imageView setImage:nil];\n        [self.imageView setHidden:YES];\n\
  \        [self.artist setText:nil];\n        [self.song setText:nil];\n    }\n \
  \   else {\n        MPMediaItemArtwork *artwork = [currentItem valueForProperty:\
  \ MPMediaItemPropertyArtwork];\n        if (artwork) {\n            UIImage *artworkImage\
  \ = [artwork imageWithSize:CGSizeMake(320, 320)];\n            [self.imageView setImage:artworkImage];\n\
  \            [self.imageView setHidden:NO];\n        }\n\n// 显示当前播放媒体项的艺术家和歌曲名称\n\
  \        [self.artist setText:[currentItem valueForProperty:MPMediaItemPropertyArtist]];\n\
  \        [self.song setText:[currentItem valueForProperty:MPMediaItemPropertyTitle]];\n\
  \    }\n}\n```\n\n`The playbackStateChanged: notification observer method`这个通知观察者方法对你来说是新的。你添加了这个通知，以便当播放器在`viewDidAppear:`中自动开始播放音乐时，它能更新播放/暂停按钮的状态。\n\
  \n```\n- (void)playbackStateChanged:(NSNotification *)notification\n{\n    MPMusicPlaybackState\
  \ playbackState = [self.player playbackState];\n    NSMutableArray *items = [NSMutableArray\
  \ arrayWithArray:[self.toolbar items]];\n    if (playbackState == MPMusicPlaybackStateStopped\
  \ || playbackState == MPMusicPlaybackStatePaused) {\n        [items replaceObjectAtIndex:2\
  \ withObject:self.play];\n    }\n```\n\nelse if (playbackState == MPMusicPlaybackStatePlaying)\
  \ {\n\n```\n        [items replaceObjectAtIndex:2 withObject:self.pause];\n    }\n\
  \    [self.toolbar setItems:items animated:NO];\n}\n```\n\n当表格视图单元格被选中时，你需要将音乐媒体项从\
  \ `AudioViewController` 发送到 `PlayerViewController`。为此，你需要修改 `AudioViewController`\
  \ 的实现。选择 `AudioViewController.m` 并添加以下方法：\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender\n{\n    if ([segue.identifier isEqualToString:@\"PlayerSegue\"\
  ]) {\n        UITableViewCell *cell = sender;\n        NSUInteger index = [cell\
  \ tag];\n        PlayerViewController *pvc = segue.destinationViewController;\n\
  \        pvc.mediaItem = [self.mediaItems objectAtIndex:index];\n    }\n}\n```\n\
  \n最后一步：你需要将 `PlayerViewController` 导入到 `AudioViewController.m` 中。在文件顶部，紧挨着 `AudioViewController.h`\
  \ 导入语句下方，添加此导入语句：\n\n```\n#import \"PlayerViewController.h\"\n```\n\n构建并运行应用程序。选择一个音乐文件进行播放。应用应会过渡到\
  \ `PlayerViewController` 并自动开始播放。滑动音量滑块，看看现在如何调节播放音量。接下来，让我们添加视频播放功能。使用 `MediaPlayer`\
  \ 框架实现起来非常简单。打开 `VideoViewController` 并实现表格视图的代理方法 `tableView:didSelectRowAtIndexPath:`，如下所示：\n\
  \n```\n- (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    MPMediaItem *mediaItem = [self.mediaItems objectAtIndex:[indexPath\
  \ row]];\n    NSURL *mediaURL = [mediaItem valueForProperty:MPMediaItemPropertyAssetURL];\n\
  \    MPMoviePlayerViewController *player =         [[MPMoviePlayerViewController\
  \ alloc] initWithContentURL:mediaURL];\n    [self presentMoviePlayerViewControllerAnimated:player];\n\
  }\n```\n\n就是这样。构建并运行你的应用程序。选择“视频”标签页，挑选一个视频播放。很简单！\n\n### AVFoundation\n\n`AVFoundation`\
  \ 框架最初在 iOS 3 中引入，仅支持有限的音频播放和录制功能。iOS 4 对该框架进行了扩展，加入了视频播放与录制，以及音视频资产管理功能。\n\n其核心思想是，`AVFoundation`\
  \ 将音频或视频文件表示为一个 `AVAsset`。理解 `AVAsset` 可能拥有多个轨道这一点很重要。例如，一个音频 `AVAsset` 可能有两个轨道：一个用于左声道，一个用于右声道。一个视频\
  \ `AVAsset` 可能拥有更多轨道：有些用于视频，有些用于音频。此外，`AVAsset` 还可能封装其所代表的媒体文件的额外元数据。值得注意的是，仅仅实例化一个\
  \ `AVAsset` 并不意味着它就可以准备好播放。`AVAsset` 可能需要一些时间来解析其代表的数据。\n\n为了让你能够精细地控制一个 `AVAsset`\
  \ 的播放方式，`AVFoundation` 将媒体项的呈现状态与 `AVAsset` 分离开来。这种呈现状态由一个 `AVPlayerItem` 表示。`AVPlayerItem`\
  \ 中的每个轨道由一个 `AVPlayerItemTrack` 表示。通过使用 `AVPlayerItem` 及其 `AVPlayerItemTracks`，你可以通过一个\
  \ `AVPlayer` 对象来决定如何呈现该媒体项（例如，混合音频轨道或裁剪视频）。如果你希望播放多个 `AVPlayerItem`，可以使用 `AVPlayerQueue`\
  \ 来调度每个 `AVPlayerItem` 的播放。\n\n除了提供对媒体播放更精细的控制之外，`AVFoundation` 还赋予了你创建媒体的能力。你可以利用设备硬件来创建新的媒体资源。硬件由一个\
  \ `AVCaptureDevice` 表示。在可能的情况下，你可以配置 `AVCaptureDevice` 来启用特定的设备功能或设置。例如，你可以将代表 iPhone\
  \ 摄像头的 `AVCaptureDevice` 的 `flashMode` 设置为开启、关闭或自动感应。\n\n为了使用 `AVCaptureDevice`\
  \ 的输出，你需要使用 `AVCaptureSession`。`AVCaptureSession` 协调从 `AVCaptureDevice` 到其输出形式的数据管理。此输出由\
  \ `AVCaptureOutput` 类表示。\n\n使用 `AVFoundation` 创建媒体数据是一个复杂的过程。首先，你需要创建一个 `AVCaptureSession`\
  \ 来协调媒体数据的捕获和创建。你定义并配置你的 `AVCaptureDevice`，它代表了实际的物理设备（例如 iPhone 摄像头或麦克风）。从 `AVCaptureDevice`，你创建一个\
  \ `AVCaptureInput`。`AVCaptureInput` 是一个 `<?>` 对象，代表来自 `AVCaptureDevice` 的数据。每个 `AVCaptureInput`\
  \ 实例都有多个端口，每个端口代表来自设备的一个数据流。你可以将端口视为 `AVAsset` 轨道的捕获模拟。一旦创建了 `AVCaptureInput(s)`，就将它们分配给\
  \ `AVCaptureSession`。每个会话可以有多个输入。\n\n现在你已经有了捕获会话并给会话分配了输入，接下来需要保存数据。你使用 `AVCaptureOutput`\
  \ 类并将其添加到你的 `AVCaptureSession` 中。你可以使用具体的 `AVCaptureOutput` 子类将数据写入文件，或者将其保存到缓冲区以供进一步处理。\n\
  \n你的 `AVCaptureSession` 现已配置好，可以从设备接收数据并保存。你只需告诉你的会话 `startRunning`。完成后，向你的会话发送\
  \ `stopRunning` 消息。有意思的是，可以在会话运行时更改其输入或输出。为了确保平稳过渡，你需要用一对 `beginConfiguration` /\
  \ `commitConfiguration` 消息来包裹这些更改。\n\n资产元数据由 `AVMetadataItem` 类表示。要向资产添加你自己的元数据，可以使用其可变版本\
  \ `AVMutableMetadataItem`，并将其分配给资产。\n\n有时你可能需要将媒体资源从一种格式转换为另一种格式。类似于捕获媒体，你可以使用 `AVAssetExportSession`\
  \ 类。将你的输入资产添加到导出会话对象，然后将导出会话配置为新的输出格式，并导出数据。\n\n接下来，让我们深入探讨通过 `AVFoundation` 播放媒体的具体细节。\n\
  \n#### AVMediaPlayer\n\n\n\n在开始时，基于 `AVFoundation` 的媒体播放器外观将与 `MPMediaPlayer`（图\
  \ 12-9）相同。与 `MPMediaPlayer` 不同，你的 `AVFoundation` 播放器将使用统一的播放器视图控制器来回放音频和视频媒体。这有几个原因，但主要是因为\
  \ `AVFoundation` 没有提供类似 `MPMoviePlayerViewController` 的视频回放视图控制器。相反，你需要定义一个 `UIView`\
  \ 子类来使用 `AVPlayerLayer` 视图层。无论媒体类型如何，你都使用一个 `AVPlayer` 实例来加载 `AVAsset` 并管理播放控制。\n\
  \n使用 Xcode，创建一个新项目并将其命名为 `AVMediaPlayer`。由于 `AVMediaPlayer` 使用标签栏控制器，并且行为类似于 `MPMediaPlayer`，请遵循你在\
  \ `MPMediaPlayer` 中使用的相同步骤，直到添加 `MediaPlayer` 框架为止。你仍然需要 `MediaPlayer` 框架来访问你的媒体库。由于此项目将使用\
  \ `AVFoundation` 来播放媒体，你还需要添加 `AVFoundation` 框架。\n\n与 `MPMediaPlayer` 类似，`AVMediaPlayer`\
  \ 将使用一个通用的 `MediaViewController` 作为抽象基类。创建一个名为 `MediaViewController` 的新 `Objective-C`\
  \ 类，继承自 `UITableViewController`。同样，这个 `MediaViewController` 类需要足够通用，以支持音频和视频媒体。此外，类似于\
  \ `MPMediaPlayer` 的 `MediaViewController`，你需要一种方法来加载媒体项。`AVFoundation` 不提供对媒体库的访问；该功能仅存在于\
  \ `MediaPlayer` 框架中。由于你打算使用 `AVPlayer` 类来播放媒体，你需要将 `MPMediaItems` 转换为 `AVAssets`。首先，你需要修改\
  \ `MediaViewController.h`。\n\n```objective-c\n#import <UIKit/UIKit.h>\n#import <MediaPlayer/MediaPlayer.h>\n\
  \n@interface MediaViewController : UITableViewController\n\n@property (strong, nonatomic)\
  \ NSArray *assets;\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType;\n\n@end\n\
  ```\n\n这一次，你将 `NSArray` 属性命名为 `assets`，因为它是一个 `AVAssets` 数组，而不是 `MPMediaItems`。相应地，出于同样的原因，你将加载方法命名为\
  \ `loadAssetsForMediaType:`。\n\n在 `MediaViewController.m` 中，你需要更新表视图数据源方法。在此之前，你需要在导入\
  \ `MediaViewController.h` 之后立即导入 `AVFoundation` 头文件。\n\n```objective-c\n#import\
  \ <AVFoundation/AVFoundation.h>\n```\n\n现在，找到并更新表视图数据源方法。\n\n```objective-c\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView\n{\n    // 返回分区数。\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n{\n    // 返回分区中的行数。\n  \
  \  return self.assets.count;\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
  \         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    static NSString\
  \ *CellIdentifier = @\"MediaCell\";\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier\n\
  \                                                           forIndexPath:indexPath];\n\
  \n    // 配置单元格...\n    NSUInteger row = [indexPath row];\n    AVAsset *asset = [self.assets\
  \ objectAtIndex:row];\n    cell.textLabel.text = [asset description];\n    cell.tag\
  \ = row;\n\n    return cell;\n}\n```\n\n同样，这与你之前在 `MPMediaPlayer` 中所做的类似。注意，`tableView:cellForRowAtIndexPath:`\
  \ 从你的 `assets` 数组中检索一个 `AVAsset`。请记住，`AVAsset` 没有一种简单的方法来访问其元数据属性，如艺术家名称、歌曲标题或作品集。你稍后会加载这些信息。目前，你只在表视图单元格中显示\
  \ `asset` 的描述。\n\n现在，你需要实现 `loadAssetsForMediaType:` 方法。你将其添加到 `MediaViewController.m`\
  \ 的底部，就在 `@end` 声明之前。\n\n```objective-c\n#pragma mark - 实例方法\n\n- (void)loadAssetsForMediaType:(MPMediaType)mediaType\n\
  {\n    MPMediaQuery *query = [[MPMediaQuery alloc] init];\n    NSNumber *mediaTypeNumber\
  \ = [NSNumber numberWithInt:mediaType];\n    MPMediaPropertyPredicate *predicate\
  \ = [MPMediaPropertyPredicate predicateWithValue:mediaTypeNumber\n             \
  \                                                             forProperty:MPMediaItemPropertyMediaType];\n\
  \    [query addFilterPredicate:predicate];\n\n    NSMutableArray *mediaAssets =\
  \ [[NSMutableArray alloc] initWithCapacity:[[query items] count]];\n    for (MPMediaItem\
  \ *item in [query items]) {\n        [mediaAssets addObject:[AVAsset assetWithURL:[item\
  \ valueForProperty:MPMediaItemPropertyAssetURL]]];\n    }\n    self.assets = mediaAssets;\n\
  }\n```\n\n此方法与 `MPMediaPlayer` 中的 `loadMediaItemsForMediaType:` 之间的区别在于，你使用 `MPMediaItemPropertyAssetURL`\
  \ 来创建你的 `AVAssets`。\n\n你需要创建两个 `Objective-C` 类：`AudioViewController` 和 `VideoViewController`。它们都是\
  \ `MediaViewController` 的子类。将以下内容添加到 `AudioViewController.m`，以便它将音频加载到你的音频媒体：\n\n\
  ```objective-c\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 在此处执行任何其他视图加载后的设置。\n\
  \    [self loadAssetsForMediaType:MPMediaTypeMusic];\n}\n```\n\n对 `VideoViewController.m`\
  \ 执行相同操作，只是你希望加载的媒体类型是 `MPMediaTypeAnyVideo`。\n\n打开 `MainStoryboard.storyboard`，将两个表视图控制器的自定义类更改为\
  \ `AudioViewController` 和 `VideoViewController`，就像你在 `MPMediaPlayer` 中所做的那样。\n\n\
  构建并运行 `AVMediaPlayer`。看起来你正在读取媒体库，但它还不太有用。让我们修复它，以便你可以获取资产元数据。\n\n回想一下，`AVAsset`\
  \ 的信息在实例化时可能不可用或未加载。向资产请求信息可能会阻塞调用线程。如果你在 `AVMediaPlayer` 中这样做，将会减慢 UI 组件的速度，特别是表视图及其滚动。为了避免这种情况，你将使用\
  \ `AVAsset` 方法 `loadValuesAsynchronouslyForKeys:completionHandler:` 异步加载资产的元数据。此外，你将把\
  \ `AVAsset` 封装到一个自定义类中，以处理此数据的加载和缓存。\n\n创建一个名为 `AssetItem` 的新 `Objective-C` 类，继承自\
  \ `NSObject`。一旦创建了文件并将其添加到项目中，请选择 `AssetItem.h`。由于 `AssetItem` 旨在封装 `AVAsset`，为了方便起见，你将预先声明\
  \ `AVAsset` 类。你还需要修改 `AssetItem` 声明以遵循 `NSCopying` 协议。\n\n```objective-c\n@class\
  \ AVAsset;\n\n@interface AssetItem : NSObject <NSCopying>\n```\n\n你需要一个属性来保存你的 `AVAsset`\
  \ 实例。由于你从 URL 加载 `AVAssets`，你还需要添加一个属性来保存你的资产的 URL。这将允许你惰性加载 `AVAsset`，这也有助于提高性能。\n\
  \n```objective-c\n@property (strong, nonatomic) NSURL *assetURL;\n@property (strong,\
  \ nonatomic) AVAsset *asset;\n```\n\n你定义了三个只读属性，它们代表你为应用程序最关心的资产元数据。\n\n```objective-c\n\
  @property (strong, nonatomic, readonly) NSString *title;\n@property (strong, nonatomic,\
  \ readonly) NSString *artist;\n@property (strong, nonatomic, readonly) UIImage *image;\n\
  ```\n\n接下来，定义两个只读属性来告诉你 `AssetItem` 的状态。两者都是 `BOOL` 类型。一个是 `metadataLoaded`，它是一个标志，告诉你是否已经加载了\
  \ `AVAsset` 的元数据。第二个是 `isVideo`，它告诉你你的 `AVAsset` 是否有视频轨道。\n\n```objective-c\n@property\
  \ (assign, nonatomic, readonly) BOOL metadataLoaded;\n@property (assign, nonatomic,\
  \ readonly) BOOL isVideo;\n```\n\n你需要声明两个初始化方法。一个从 URL 创建实例。另一个从另一个 `AssetItem`\
  \ 实例创建副本；这对于 `NSCopying` 协议是必需的。\n\n```objective-c\n- (id)initWithURL:(NSURL *)aURL;\n\
  - (id)initWithAsset:(AssetItem *)assetItem;\n```\n\n\n\n你需要一个方法，该方法会异步加载`AVAsset`的元数据。\n\
  \n```\n- (void)loadAssetMetadataWithCompletionHandler:(void (^)(AssetItem *assetItem))completion;\n\
  ```\n\n现在准备工作`AssetItem`的实现。打开`AssetItem.m`。首先，你需要在`AssetItem`头文件导入的下方，导入`AVFoundation`头文件。你还需要定义一个字符串常量`kAssetItemDispatchQueue`。稍后会解释为什么需要它。\n\
  \n```\n#import <AVFoundation/AVFoundation.h>\n\n#define kAssetItemDispatchQueue\
  \ \"AssetQueue\"\n```\n\n你需要定义一个私有属性来持有你的调度队列。我们将在第 14 章中更详细地讨论调度队列。调度队列是`Grand\
  \ Central Dispatch`框架的一部分。你使用调度队列来排列你的资源加载操作。当你加载`AVAsset`并执行异步加载请求时，你会将它们放入调度队列。这样做有两个好处。首先，资源将按照它们被请求的顺序加载，这应该是它们被请求的顺序。其次，这将防止你的应用程序创建过多的后台请求。如果你的媒体库有成百上千个项目，你可能会为每个项目生成一个进程（线程）。创建太多，你的应用程序将冻结。调度队列确保你保持进程（线程）数量较低。你的私有类别声明如下：\n\
  \n```\n@interface AssetItem ()\n@property (strong, nonatomic) dispatch_queue_t dispatchQueue;\n\
  ```\n\n你的私有类别还将包含一些方法来帮助处理加载的异步特性。\n\n```\n- (AVAsset *)assetCopyIfLoaded;\n- (AVAsset\
  \ *)localAsset;\n- (NSString *)loadTitleForAsset:(AVAsset *)a;\n- (NSString *)loadArtistForAsset:(AVAsset\
  \ *)a;\n- (UIImage *)loadImageForAsset:(AVAsset *)a;\n@end\n```\n\n当我们讲到这些方法的具体实现时，会讨论它们的细节。\n\
  \n由于你有多个只读属性，你需要在`@implementation`声明之后合成它们。\n\n```\n@synthesize title = _title;\n\
  @synthesize artist = _artist;\n@synthesize image = _image;\n```\n\n让我们从你的初始化方法开始实现方法。\n\
  \n```\n- (id)initWithURL:(NSURL *)aURL\n{\n    self = [super init];\n    if (self)\
  \ {\n        self.assetURL = aURL;\n        self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue,\
  \ DISPATCH_QUEUE_SERIAL);\n    }\n    return self;\n}\n\n- (id)initWithAsset:(AssetItem\
  \ *)assetItem\n{\n    self = [super init];\n    if (self) {\n        self.assetURL\
  \ = assetItem.assetURL;\n        self.asset = [assetItem assetCopyIfLoaded];\n \
  \       _title = assetItem.title;\n        _artist = assetItem.artist;\n       \
  \ _image = assetItem.image;\n        _metadataLoaded = assetItem.metadataLoaded;\n\
  \        _isVideo = assetItem.isVideo;\n        self.dispatchQueue = dispatch_queue_create(kAssetItemDispatchQueue,\
  \ DISPATCH_QUEUE_SERIAL);\n    }\n    return self;\n}\n```\n\n两个初始化方法应该都很直观。在这两个方法中，你都使用常量字符串标识符`kAssetItemDispatchQueue`创建了一个串行队列。`initWithAsset:`方法复制了相关的属性。注意在复制`AVAsset`属性时使用了私有方法`assetCopyIfLoaded`。\n\
  \n接下来，你将定义遵循`NSCopying`协议所需的方法。\n\n```\n#pragma mark - NSCopying Protocol Methods\n\
  \n- (id)copyWithZone:(NSZone *)zone\n{\n        AssetItem *copy = [[AssetItem allocWithZone:zone]\
  \ initWithAsset:self];\n        return copy;\n}\n\n- (BOOL)isEqual:(id)anObject\n\
  {\n        if (self == anObject)\n                return YES;\n\nif ([anObject isKindOfClass:[AssetItem\
  \ class]]) {\n                AssetItem *assetItem = anObject;\n               \
  \ if (self.assetURL && assetItem.assetURL)\n                        return [self.assetURL\
  \ isEqual:assetItem.assetURL];\n                return NO;\n        }\n        return\
  \ NO;\n}\n\n- (NSUInteger)hash\n{\n    return (self.assetURL) ? [self.assetURL hash]\
  \ : [super hash];\n}\n```\n\n对于`isEqual:`和`hash`方法，你依赖于资源`URL`的唯一性。\n\n你将重写某些属性的访问器。为了访问`AssetItem`底层的`AVAsset`，你需要复制一份资源。这是因为`AVAsset`实例在同一时间只能从一个线程访问。如果你返回了对`AssetItem`实际`AVAsset`的引用，则无法保证它不会被不同线程访问。注意，这里你并没有复制底层的`AVAsset`实例变量；而是调用了`localAsset`方法。\n\
  \n```\n#pragma mark - Property Overrides\n\n// 复制一份，因为 AVAsset 一次只能安全地从一个线程访问\n\
  - (AVAsset*)asset\n{\n        __block AVAsset *theAsset = nil;\n        dispatch_sync(self.dispatchQueue,\
  \ ^(void) {\n                theAsset = [[self localAsset] copy];\n        });\n\
  \        return theAsset;\n}\n\n- (NSString *)title\n{\n    if (_title == nil)\n\
  \        return [self.assetURL lastPathComponent];\n    return _title;\n}\n\n- (NSString\
  \ *)artist\n{\n    if (_artist == nil)\n        return @\"Unknown\";\n    return\
  \ _artist;\n}\n```\n\n`title`和`artist`访问器会检查它们各自的实例变量。如果它们为`nil`，你可以假设你尚未加载资源的元数据，或者元数据值不存在。在这些情况下，你使用一个备用值。对于资源标题，你使用资源`URL`的最后一个路径组件。对于艺术家名称，你简单地使用值`Unknown`。\n\
