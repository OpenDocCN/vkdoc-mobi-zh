  \ `HeroReportController`。接着，在新的表格视图控制器中选择表格视图，并打开属性检查器。将 `Selection` 字段从 `Single\
  \ Selection` 改为 `No Selection`。最后，选择表格视图单元格。在属性检查器中，将 `Style` 改为 `Subtitle`；在 `Identifier`\
  \ 中输入 `HeroReportCell`；并将 `Selection` 字段改为 `None`。\n\n现在，按住 Control 键从 `HeroDetailController`\
