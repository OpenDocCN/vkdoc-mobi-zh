  \ class（类），并将其值更改为 `SuperDBCell`。\n\n\n\n### 构建并运行应用\n\n构建并运行应用。导航至详情视图并进入编辑模式。尝试点击年龄单元格，你会发现无法操作，因为该单元格不可编辑。\n\
  \n### 创建颜色表格视图单元格\n\n既然已经完成了颜色值转换器，接下来思考如何输入英雄偏好的颜色。回顾图 6-1，这里有一个显示英雄偏好颜色色带的表格视图单元格。当用户在编辑模式下选中偏好颜色单元格时，需要显示颜色选择器（图\
  \ 6-2）。与第 4 章中使用的日期选择器和值选择器不同，iOS SDK 并未提供颜色选择器的原生支持，因此需要从头构建一个。\n\n#### 自定义颜色编辑器\n\
  \n在导航窗格中单击`SuperDB`文件夹，创建一个新的 Objective-C 类。按照提示将类命名为`UIColorPicker`，并使其成为`UIControl`的子类。`UIControl`是按钮和滑块等控件的基类。此处定义一个封装了四个滑块的`UIControl`子类，`UIColorPicker`只需声明`color`属性。\n\
  \n```\n@property (strong, nonatomic) UIColor *color;\n```\n\n其他所有属性可在实现文件`UIColorPicker.m`的类别中私有声明。\n\
  \n```\n@interface UIColorPicker ()\n@property (strong, nonatomic) UISlider *redSlider;\n\
  @property (strong, nonatomic) UISlider *greenSlider;\n@property (strong, nonatomic)\
  \ UISlider *blueSlider;\n@property (strong, nonatomic) UISlider *alphaSlider;\n\
  - (IBAction)sliderChanged:(id)sender;\n- (UILabel *)labelWithFrame:(CGRect)frame\
  \ text:(NSString *)text;\n@end\n```\n\n同时声明了两个（私有）方法：一个是滑块值变化时的回调方法（`sliderChanged:`），另一个是创建选择器视图的便捷方法。\n\
  \nXcode 应为`UIColorPicker`类创建了`initWithFrame:`方法。添加以下初始化代码：\n\n```\n        self.autoresizingMask\
  \ = UIViewAutoresizingFlexibleHeight | UIViewAutoresizingFlexibleWidth;\n\n[self\
  \ addSubview:[self labelWithFrame:CGRectMake(20.0, 40.0,  60, 24) text:@\"Red\"\
  ]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0, 80.0,  60, 24)\
  \ text:@\"Green\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
  \ 120.0, 60, 24) text:@\"Blue\"]];\n        [self addSubview:[self labelWithFrame:CGRectMake(20.0,\
  \ 160.0, 60, 24) text:@\"Alpha\"]];\n\n_redSlider   = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
  \ 40.0,  190, 24)];\n        _greenSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
  \ 80.0,  190, 24)];\n        _blueSlider  = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
  \ 120.0, 190, 24)];\n        _alphaSlider = [[UISlider alloc] initWithFrame:CGRectMake(100.0,\
  \ 160.0, 190, 24)];\n\n[_redSlider addTarget:self\n                        action:@selector(sliderChanged:)\n\
  \              forControlEvents:UIControlEventValueChanged];\n        [_greenSlider\
  \ addTarget:self\n                          action:@selector(sliderChanged:)\n \
  \               forControlEvents:UIControlEventValueChanged];\n        [_blueSlider\
  \ addTarget:self\n                         action:@selector(sliderChanged:)\n  \
  \             forControlEvents:UIControlEventValueChanged];\n        [_alphaSlider\
  \ addTarget:self\n                          action:@selector(sliderChanged:)\n \
  \               forControlEvents:UIControlEventValueChanged];\n\n[self addSubview:_redSlider];\n\
  \        [self addSubview:_greenSlider];\n        [self addSubview:_blueSlider];\n\
  \        [self addSubview:_alphaSlider];\n```\n\n此处正在布局颜色选择器的外观，通过`initWithFrame:`方法将滑块放置在视图中。\n\
  \n需要重写`color`属性的设置方法，以便正确设置滑块的值：\n\n```\n#pragma mark - 属性重写\n\n- (void)setColor:(UIColor\
  \ *)color\n{\n    _color = color;\n    const CGFloat *components = CGColorGetComponents(color.CGColor);\n\
  \    [_redSlider setValue:components[0]];\n    [_greenSlider setValue:components[1]];\n\
  \    [_blueSlider setValue:components[2]];\n    [_alphaSlider setValue:components[3]];\n\
  }\n```\n\n现在可以实现（私有）实例方法。首先是`sliderChanged:`：\n\n```\n#pragma mark - （私有）实例方法\n\n\
  - (IBAction)sliderChanged:(id)sender\n{\n    _color = [UIColor colorWithRed:_redSlider.value\n\
  \                             green:_greenSlider.value\n                       \
  \       blue:_blueSlider.value\n                             alpha:_alphaSlider.value];\n\
  \n[self sendActionsForControlEvents:UIControlEventValueChanged];\n}\n```\n\n接下来是`labelWithFrame:text:`：\n\
  \n```\n- (UILabel *)labelWithFrame:(CGRect)frame text:(NSString *)text\n{\n    UILabel\
  \ *label = [[UILabel alloc] initWithFrame:frame];\n    label.userInteractionEnabled\
  \ = NO;\n    label.backgroundColor = [UIColor clearColor];\n    label.font = [UIFont\
  \ boldSystemFontOfSize:[UIFont systemFontSize]];\n    label.textAlignment = NSTextAlignmentRight;\n\
  \    label.textColor = [UIColor darkTextColor];\n    label.text = text;\n    return\
  \ label;\n}\n```\n\n完成自定义颜色选择器后，需要添加一个自定义表格视图单元格类来使用它。\n\n#### 自定义颜色表格视图单元格\n\n\
  由于有了自定义选择器视图，需要像创建`SuperDBDateCell`和`SuperDBPickerCell`那样，创建`SuperDBEditCell`的子类。但如何在`SuperDBEditableCell`类中显示`UIColor`值呢？可以创建一个显示颜色四个值（红、绿、蓝和透明度）的字符串。但这对大多数最终用户来说毫无意义，用户希望在查看英雄详情时看到实际颜色。目前表格视图单元格中并没有显示颜色的机制。\n\
  \n如果构建一个复杂的表格视图单元格子类来显示颜色，会在应用的其他地方用到它吗？很可能不会。既然如此，就无需投入时间和精力来构建这个类。这里有一个更简单的解决方案：用包含特殊\
  \ Unicode 字符（显示为实心矩形）的`NSString`填充文本字段，然后添加代码更改文本的字体颜色，使其显示为英雄偏好的颜色。\n\n创建一个新的 Objective-C\
  \ 子类，使其成为`SuperDBEditCell`的子类，并命名为`SuperDBColorCell`。在`SuperDBColorCell.m`中添加颜色选择器类的（私有）属性。\n\
  \n```\n#import \"UIColorPicker.h\"\n\n@interface SuperDBColorCell ()\n@property\
  \ (strong, nonatomic) UIColorPicker *colorPicker;\n- (void)colorPickerChanged:(id)sender;\n\
  - (NSAttributedString *)attributedColorString;\n@end\n```\n\n同时添加一个（私有）实例方法`attributedColorString`，用于返回`NSAttributedString`。富文本字符串是一种包含自格式信息的字符串。在\
  \ iOS 6 之前，富文本字符串功能极其有限，而现在可以将其与 UIKit 对象一起使用。稍后就会明白为什么需要这个方法。\n\n按照如下方式定义`initWithStyle:reuseIdentifier:`方法：\n\
  \n```\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString\
  \ *)reuseIdentifier\n{\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n\
  \    if (self) {\n        // 初始化代码\n        self.colorPicker = [[UIColorPicker alloc]\
  \ initWithFrame:CGRectMake(0, 0, 320, 216)];\n        [self.colorPicker addTarget:self\n\
  \                              action:@selector(colorPickerChanged:)\n         \
  \           forControlEvents:UIControlEventValueChanged];\n        self.textField.inputView\
  \ = self.colorPicker;\n    }\n    return self;\n}\n```\n\n这段代码应该相当直观。与其他`SuperDBEditCell`子类一样，已经实例化了选择器对象，并将其设置为`textField`的`inputView`。\n\
  \n接下来，重写`SuperDBEditCell`的值访问方法和设置方法。\n\n```\n#pragma mark - SuperDBEditCell 重写方法\n\
  \n- (id)value\n{\n    return self.colorPicker.color;\n}\n```\n\n\n\n- (void)setValue:(id)value\n\
  {\n    if (value != nil && [value isKindOfClass:[UIColor class]]) {\n        [super\
  \ setValue:value];\n        self.colorPicker.color = value;\n    }\n    else {\n\
  \        self.colorPicker.color = [UIColor colorWithRed:1.0 green:1.0 blue:1.0 alpha:1.0];\n\
  \    }\n    self.textField.attributedText = self.attributedColorString;\n}\n\n请注意这一行：\n\
  \n```\nself.textField.attributedText = self.attributedColorString;\n```\n\n在`setValue:`方法中，你没有设置`textField`的`text`属性，而是使用了新的`attributedText`属性。这告诉`textView`你正在使用属性字符串，并使用你定义的属性来格式化字符串。如果\
  \ Hero 没有定义颜色属性，你还会将 Color Picker 设置为白色。\n\n添加`colorPicker`回调方法：\n\n```\n#pragma\
  \ mark - (Private) Instance Methods\n\n- (void)colorPickerChanged:(id)sender\n{\n\
  \    self.textField.attributedText = self.attributedColorString;\n}\n```\n\n同样，你告诉`textField`更新自身。但是用什么呢？\n\
  \n最后，添加以下代码：\n\n```\n- (NSAttributedString *)attributedColorString\n{\n    NSString\
  \ *block = [NSString stringWithUTF8String:\"\\u2588\\u2588\\u2588\\u2588\\u2588\\\
  u2588\\u2588\\u2588\\u2588\\u2588\\u2588\"];\n    UIColor *color = self.colorPicker.color;\n\
  \    NSDictionary *attrs = @{NSForegroundColorAttributeName:color,\n           \
  \                 NSFontAttributeName:[UIFont boldSystemFontOfSize:[UIFont systemFontSize]]};\n\
  \    NSAttributedString *attributedString =         [[NSAttributedString alloc]\
  \ initWithString:block attributes:attrs];\n    return attributedString;\n}\n```\n\
  \n首先，你定义了一个包含许多 Unicode 字符的字符串。`\\u2588`是方块字符的 Unicode 编码。你只是创建了一个由 10 个方块字符组成的字符串。接下来，你让`colorPicker`告诉我们它的颜色。然后你使用该颜色和系统粗体字体（15pt）来定义一个字典。你使用的键是`NSForegroundColorAttributeName`和`NSFontAttributeName`。这些键是专门为\
  \ UIKit 属性字符串支持定义的。从它们的名称可以推断，`NSForegroundColorAttributeName`设置字符串的前景（或文本）颜色，而`NSFontAttributeName`允许你为字符串定义字体。最后，你使用\
  \ Unicode 字符串块和属性字典实例化属性字符串。\n\n你也可以使用`textField`的常规`text`属性，并仅根据需要设置`textColor`，但我们认为这个关于属性字符串的简短演示可能会引起你的兴趣。属性字符串非常灵活和强大，值得你花时间研究。\n\
  \n**注意**：要了解更多关于属性字符串的信息，请查看苹果的《属性字符串编程指南》，网址为[`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/AttributedStrings/AttributedStrings.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/AttributedStrings/AttributedStrings.html)。\n\
  \n##### 清理 Picker\n\n在使用新的 Color Picker 之前，你还需要完成一步。首先，你需要更新配置属性列表以使用`SuperDBColorCell`。打开`HeroDetailController.plist`并展开至`Root`![image](img/arrow.jpg)`sections`![image](img/arrow.jpg)`Item\
  \ 1`![image](img/arrow.jpg)`rows`![image](img/arrow.jpg)`Item 4`![image](img/arrow.jpg)`class`。将其值从`SuperDBEditCell`更改为`SuperDBColorCell`。\n\
  \n一切就绪？让我们构建并运行。导航到详情视图，点击“编辑”按钮，然后点击颜色单元格。\n\n这很奇怪。Color Picker 根本没有出现。但颜色单元格有一个光标和清除文本按钮（图\
  \ 6-14）。\n\n![9781430238072_Fig06-14.jpg](img/9781430238072_Fig06-14.jpg)\n\n图 6-14.\
  \ 奇怪的颜色单元格外观\n\n你可能已经厌倦了我们让你构建并运行应用程序，而我们知道它不会运行。把它看作是在实际开发中的一次练习。很多时候，你会认为一切都正确，但运行应用程序时却发现事情不奏效。这时候，你需要（单元）测试、调试，或者思考出解决方案。\n\
  \n无论如何，Color Picker 没有出现是有原因的。编辑`SuperDBColorCell.m`，找到`initWithStyle:reuseIdentifier:`。在初始化代码中，你像这样创建了\
  \ Color Picker：\n\n```\nself.colorPicker = [[UIColorPicker alloc] initWithFrame:CGRectZero];\n\
  ```\n\n你将 Color Picker 的大小设为零尺寸的`CGRect`。据你所知，它可能已经出现了。但由于其大小为零，所以什么也看不到。你不是对 Date\
  \ Picker 和 Picker View 也这样做了吗？是的，你做了，但那些类内部有钩子可以根据需要调整自身大小。由于你是从头开始构建 Color Picker，所以必须手动调用这些钩子。\n\
  \n首先，你需要用一个非零的`CGRect`来初始化 Color Picker。从一个默认大小开始：\n\n```\nself.colorPicker = [[UIColorPicker\
  \ alloc] initWithFrame:CGRectMake(0, 0, 320, 216)];\n```\n\n切换到`UIColorPicker.m`，并在`initWithFrame:`方法之后添加此方法：\n\
  \n```\n- (void)willMoveToSuperview:(UIView *)newSuperview\n{\n    self.frame = newSuperview.bounds;\n\
  }\n```\n\n现在，当你运行它并尝试编辑颜色单元格时，你应该会看到类似于图 6-15 的内容。\n\n![9781430238072_Fig06-15.jpg](img/9781430238072_Fig06-15.jpg)\n\
  \n图 6-15. Color Picker\n\n嗯，它有效，但看起来不太美观。你可以通过一些图形魔法来修复它。你应该仍在编辑`UIColorPicker.m`。添加以下`#import`：\n\
  \n```\n#import \"QuartzCore/CAGradientLayer.h\"\n```\n\n现在添加以下`#define`：\n\n```\n\
  #define kTopBackgroundColor    [UIColor colorWithRed:0.98 green:0.98 blue:0.98 alpha:1.0]\n\
  #define kBottomBackgroundColor [UIColor colorWithRed:0.79 green:0.79 blue:0.79 alpha:1.0]\n\
  ```\n\n找到被注释掉的`drawRect:`方法并取消注释。如果你删除了它，不用担心，只需让它看起来像这样：\n\n```\n- (void)drawRect:(CGRect)rect\n\
  {\n    CAGradientLayer *gradient = [CAGradientLayer layer];\n    gradient.frame\
  \ = self.bounds;\n    gradient.colors = [NSArray arrayWithObjects:(__bridge id)[kTopBackgroundColor\
  \ CGColor],\n                                                 (__bridge id)[kBottomBackgroundColor\
  \ CGColor], nil];\n    [self.layer insertSublayer:gradient atIndex:0];\n}\n```\n\
  \n我们想指出`drawRect:`方法。此方法用于设置 Color Picker 的背景颜色，并赋予其平滑的颜色过渡。得益于`QuartzCore`框架，你能够做到这一点。你需要将此框架添加到你的项目中。\n\
  \n在导航窗格中单击`SuperDB`项目。在项目编辑器视图中，选择`SuperDB`目标，然后导航到“Build Phases”窗格。展开“Link Binary\
  \ With Libraries”构建阶段（图 6-16）。点击构建阶段左下角的+。在弹出选择器中向下滚动，选择`QuartzCore.framework`（图\
  \ 6-17）。点击“添加”。\n\n![9781430238072_Fig06-16.jpg](img/9781430238072_Fig06-16.jpg)\n\
  \n图 6-16. 链接库构建阶段\n\n![9781430238072_Fig06-17.jpg](img/9781430238072_Fig06-17.jpg)\n\
  \n图 6-17. 添加`QuartzCore.framework`\n\n最后一件事：你想关闭颜色单元格中的清除文本按钮。这很简单。在`SuperDBColorCell.m`中，将下面这一行添加到`initWithStyle:reuseIdentifier:`的初始化代码中：\n\
  \n```\nself.textField.clearButtonMode = UITextFieldViewModeNever;\n```\n\n构建并运行应用程序。导航并编辑颜色单元格。好多了（图\
  \ 6-18）！\n\n![9781430238072_Fig06-18.jpg](img/9781430238072_Fig06-18.jpg)\n\n\n\n\
  图 6-18. 带有渐变背景的颜色选择器\n\n### 还有一件事\n\n运行应用，新增一位英雄。进入编辑模式并清空`Name`字段。现在点击`Identity`字段。不出所料，验证警告对话框将弹出。然而，它并未显示正确的失败原因（图\
  \ 6-19）。\n\n![9781430238072_Fig06-19.jpg](img/9781430238072_Fig06-19.jpg)\n\n图 6-19.\
  \ 无失败原因的验证对话框\n\n回过头看`SuperDBCell.m`中的`validate`方法，你会看到消息是这样填充的：\n\n```\nmessage\
  \ =    [NSString\n stringWithFormat:NSLocalizedString(@\"Validation error on: %@\\\
  rFailure Reason: %@\",\n                                                @\"Validation\
  \ error on: %@, Failure Reason: %@)\"),\n                              [userInfo\
  \ valueForKey:@\"NSValidationErrorKey\"],\n                               [error\
  \ localizedFailureReason]];\n```\n\n对`NSError`实例的方法调用\n\n```\n[error localizedFailureReason]\n\
  ```\n\n返回的是`nil`。在 iOS 4 之前，Core Data 会填充`localizedFailureReason`。自那以后，它不再填充了。你需要提供一个你可以自定义的简单修复方案。\n\
  \n`NSError`提供了一个方法`code`，它会返回一个整数错误码。该代码的值根据错误的来源而定义。\n\n**注意** 要了解更多关于`NSError`和错误代码如何工作的信息，请阅读`https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/ErrorHandlingCocoa/ErrorHandling/ErrorHandling.html`上的*错误处理编程指南*。具体来说，请阅读名为“错误对象、域和代码”的章节。\n\
  \n你在这里得到的错误代码在 Core Data 头文件`CoreDataErrors.h`中定义。\n\n**注意** Apple 在`https://developer.apple.com/library/ios/#documentation/Cocoa/Reference/CoreDataFramework/Miscellaneous/CoreData_Constants/Reference/reference.html`上记录了`CoreDataError.h`。\n\
  \n你碰巧知道你得到的错误代码值是 1670。这被分配给了枚举`NSValidationStringTooShortError`。你可以添加一些逻辑来处理这个特定的错误代码，这样就能解决问题，但我们已经为你多做了一点工作。\n\
  \n在 Book Downloads 包中找到文件`CoreDataErrors.plist`。这是我们创建的一个简单的`plist`文件，它将 Core Data\
  \ 错误代码映射为简单的错误消息。将此文件添加到 SuperDB 项目中，确保复制一份。\n\n你可以创建一个`CoreDataError`类来处理这个`plist`的加载，但为了简便起见，我们将走一条更简单的路线。首先，在`SuperDBEditCell.m`的顶部，`@implementation`声明之前，声明一个静态字典。\n\
  \n```\nstatic NSDictionary *__CoreDataErrors;\n```\n\n在类初始化器中填充这个字典。这将在`@implementation`声明之后立即进行。\n\
  \n```\n+ (void)initialize\n{\n    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@\"\
  CoreDataErrors\"\n                                                withExtension:@\"\
  plist\"];\n    __CoreDataErrors = [NSDictionary dictionaryWithContentsOfURL:plistURL];\n\
  }\n```\n\n现在，你需要编辑`validate`方法来使用这个字典。找到以\n\n```\nif ([[error domain] isEqualToString:@\"\
  NSCocoaErrorDomain\"]) {\n```\n\n开头的行，并将`if`块编辑为\n\n```\nif ([[error domain] isEqualToString:@\"\
  NSCocoaErrorDomain\"]) {\n            NSString *errorCodeStr = [NSString stringWithFormat:@\"\
  %d\", [error code]];\n            NSString *errorMessage = [__CoreDataErrors valueForKey:errorCodeStr];\n\
  \            NSDictionary *userInfo = [error userInfo];\nmessage =     [NSString\n\
  stringWithFormat:NSLocalizedString(@\"Validation error on: %@\\rFailure Reason:\
  \ %@\",\n                                                @\"Validation error on:\
  \ %@, Failure Reason: %@)\"),\n                              [userInfo valueForKey:@\"\
  NSValidationErrorKey\"],\n                               errorMessage];\n}\n```\n\
  \n构建并运行应用。清空英雄的名字并尝试移动到另一个字段。验证警告对话框应该像图 6-4 所示。\n\n你可以编辑`CoreDataErrors.plist`中的字符串值，以便按你喜欢的任何方式自定义错误消息。让我们希望\
  \ Apple 能尽快恢复这个功能。\n\n### 色彩告别\n\n到现在为止，你应该已经很好地理解了通过子类化，特别是子类化`NSManagedObject`，你能获得多大的能力。你看到了如何使用它进行条件默认值设置，以及单字段和多字段验证。你还看到了如何使用自定义托管对象来创建虚拟访问器。你看到了当用户输入无效属性导致托管对象验证失败时，如何礼貌地通知用户，并且你看到了如何使用可转换属性和值转换器在\
  \ Core Data 中存储自定义对象。\n\n这是一个内容密集的章节，但你真的应该开始感受到 Core Data 是多么灵活和强大。在继续学习 iOS 6\
  \ SDK 的其他部分之前，你还有一章关于 Core Data 的内容。当你准备好了，翻到下一页来学习关系和获取属性。\n\n"
- "# 第 7 章：关系、获取属性和表达式\n\n欢迎来到 Core Data 的最后一章。到目前为止，你的应用程序只包含一个实体：Hero。在本章中，我们将向你展示托管对象如何通过使用关系和获取属性来包含和引用其他托管对象。这将使你能够制作比当前的\
  \ SuperDB 应用程序复杂得多的应用程序。\n\n然而，这并不是你将在本章中做的唯一一件事。你还要将你的`HeroDetailController`变成一个通用的托管对象控制器。通过使控制器代码更加通用，你将使控制器子类更小且更易于维护。你将扩展配置属性列表，以允许你定义额外的实体视图。\n\
  \n本章你有很多事要做，所以不要磨蹭。让我们开始吧。\n\n### 扩展你的应用：超级能力和报告\n\n在讨论细节之前，让我们快速浏览一下本章中你将要对 SuperDB\
  \ 应用进行的更改。表面上，这些更改看起来相对简单。你将添加为每位英雄指定任意数量超级能力的能力，并且还会添加一些报告，显示符合某些条件的其他超级英雄，包括比这位英雄更年轻或更年长的英雄，或者同性或异性的英雄（图\
  \ 7-1）。\n\n![9781430238072_Fig07-01.jpg](img/9781430238072_Fig07-01.jpg)\n\n图 7-1.\
  \ 在本章结束时，你将添加为每位英雄指定任意数量超级能力的能力，并提供多种报告，让你根据与其他英雄的关系来查找他们\n\n这些能力将由一个你将创建并富有想象力地命名为`Power`的新实体来表示。当用户添加或编辑能力时，他们将会看到一个新视图（图\
  \ 7-2），但实际上，在底层，它将是用于编辑和显示英雄的同一个对象的新实例。\n\n![9781430238072_Fig07-02.jpg](img/9781430238072_Fig07-02.jpg)\n\
  \n图 7-2. 用于编辑能力的新视图实际上是用于编辑英雄的同一个对象的实例\n\n当用户深入查看其中一个报告时，他们将获得符合所选条件的其他英雄列表（图 7-3）。\n\
  \n![9781430238072_Fig07-03.jpg](img/9781430238072_Fig07-03.jpg)\n\n\n\n### 图 7-3：报告部分\n\
  \n角色页面上的报告部分，能让您找到与当前编辑角色满足特定条件的其他角色。例如，您正在查看所有出生时间晚于“超级猫”的角色。\n\n点击任意一行，将跳转到另一视图，在那里您可以使用同一个通用控制器类的另一个实例来编辑该角色。您的用户将能够无限层级地深入查看（仅受内存限制），而这都归功于这一个类。\n\
  \n在开始实现这些更改之前，您需要了解一些概念，并对数据模型进行一些调整。\n\n### 关系\n\n我们在第 2 章中介绍过 Core Data 关系的概念。现在，我们将深入探讨，并展示如何在应用中使用它们。关系是\
  \ Core Data 中最重要的概念之一。没有关系，实体将是孤立的。一个实体将无法包含或引用另一个实体。让我们先看一个假设的头文件，这是一个传统数据模型类的简单示例，为您提供一个熟悉的参考点：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@class Address;\n\n@interface Person : NSObject\n\
  \n@property (strong, nonatomic) NSString *firstName;\n@property (strong, nonatomic)\
  \ NSString *lastName;\n@property (strong, nonatomic) NSDate *birthdate;\n@property\
  \ (strong, nonatomic) UIImage *image;\n@property (strong, nonatomic) Address *address;\n\
  @property (strong, nonatomic) Person *mother;\n@property (strong, nonatomic) Person\
  \ *father;\n@property (strong, nonatomic) NSMutableArray *children;\n\n@end\n```\n\
  \n这里有一个表示单个人物的类。您有一些实例变量来存储关于该人物的各种信息，以及向其他对象暴露这些信息的属性。这并没有什么惊世骇俗之处。现在，让我们思考一下如何在\
  \ Core Data 中重新创建这个对象。\n\n前四个实例变量——`firstName`、`lastName`、`birthDate` 和 `image`——都可以由\
  \ Core Data 内置的属性类型处理，因此您可以使用属性来将这些信息存储在实体上。两个 `NSString` 实例将变成 String 属性，`NSDate`\
  \ 实例将变成 Date 属性，而 `UIImage` 实例将变成 Transformable 属性，其处理方式与上一章中的 `UIColor` 相同。\n\n\
  之后，您有一个 `Address` 对象的实例。这个对象可能存储街道地址、城市、州或省以及邮政编码等信息。随后是两个 `Person` 实例变量和一个可变数组，用于存储指向该人物子女的指针。很可能，这些数组旨在存储指向更多\
  \ `Person` 对象的指针。\n\n在面向对象编程中，将指向另一个对象的指针作为实例变量包含进来，称为*组合*。组合是一种极其便利的手段，因为它让您可以创建更小的类并重用对象，而不是复制数据。\n\
  \n在 Core Data 中，您并没有严格意义上的组合，但您有关系，它本质上服务于相同的目的。关系允许托管对象包含对特定实体的其他托管对象的引用，这些实体称为*目标实体*，有时也简称为目标。关系是\
  \ Core Data 的属性，就像属性（attribute）一样。因此，它们都有一个指定的名称，作为设置和获取关系所代表的一个或多个对象的键值。关系与属性（attribute）的添加方式相同，都是在\
  \ Xcode 的数据模型编辑器中添加到实体。几分钟后您将看到如何操作。关系有两种基本类型：一对一关系和一对多关系。\n\n#### 一对一关系\n\n当您创建一对一关系时，意味着一个对象可以包含一个指向特定实体中单个托管对象的指针。在您的示例中，`Person`\
  \ 实体与 `Address` 实体有一个单一的一对一关系。\n\n一旦您向对象添加了一对一关系，就可以使用键值编码（KVC）将托管对象赋值给该关系。例如，您可以为\
  \ `Person` 托管对象设置 `Address` 实体，如下所示：\n\n```objc\nNSManagedObject *address = [NSEntityDescription\
  \ insertNewObjectForEntityForName:@\"Address\"\n                               \
  \         inManagedObjectContext:thePerson.managedObjectContext];\n[thePerson setValue:address\
  \ forKey:@\"address\"];\n```\n\n检索该对象也可以像处理属性一样使用 KVC 完成：\n\n```objc\nNSManagedObject\
  \ *address = [thePerson valueForKey:@\"address\"];\n```\n\n当您像上一章所做的那样，创建 `NSManagedObject`\
  \ 的自定义子类时，您可以使用 Objective-C 属性和点语法来获取和设置这些属性。表示一对一关系的属性是 `NSManagedObject` 或其子类的实例，因此设置地址看起来就像设置属性一样：\n\
  \n```objc\nNSManagedObject *address = [NSEntityDescription insertNewObjectForEntityForName:@\"\
  Address\"\n                                        inManagedObjectContext:thePerson.managedObjectContext];\n\
  thePerson.address = address;\n```\n\n而检索一对一关系则变成如下形式：\n\n```objc\nNSManagedObject\
  \ *address = thePerson.address;\n```\n\n几乎在所有方面，您在代码中处理一对一关系的方式，都与处理 Core Data 属性的方式相同。您使用\
  \ KVC 通过 Objective-C 对象来获取和设置值。只不过您使用的是代表实体的 `NSManagedObject` 或其子类，而不是与不同属性类型相对应的\
  \ Foundation 类。\n\n#### 一对多关系\n\n一对多关系允许您使用一个关系将多个托管对象关联到特定的一个托管对象。这相当于在 Objective-C\
  \ 中使用集合类（例如 `NSMutableArray` 或 `NSMutableSet`）进行组合，就像前面看到的 `Person` 类中的 `children`\
  \ 实例变量。在那个例子中，您使用了 `NSMutableArray`，它是一个可编辑的、有序的对象集合。这个数组允许您随意添加和移除对象。如果您想表示 `Person`\
  \ 实例所代表的人物有子女，只需将代表其子女的 `Person` 实例添加到 `children` 数组中即可。\n\n在 Core Data 中，情况略有不同。一对多关系是无序的。它们由\
  \ `NSSet`（一个不可更改的无序不可变集合）或 `NSMutableSet`（一个可以更改的无序集合）的实例来表示。下面是使用 `NSSet` 获取一对多关系并遍历其内容的方式：\n\
  \n```objc\nNSSet *children = [thePerson valueForKey:@\"children\"];\nfor (NSManagedObject\
  \ *oneChild in children) {\n    // 执行某些操作\n}\n```\n\n**注意** 您是否发现了一个潜在问题，即一对多关系是以无序的\
  \ `NSSet` 形式返回的？在表格视图中显示它们时，确保关系中的对象有序一致非常重要。如果集合是无序的，您就无法保证点击的行能调出您期望的对象。在本章稍后部分，您将看到如何处理这个问题。\n\
  \n另一方面，如果您想从一对多关系中添加或移除托管对象，您必须通过调用 `mutableSetValueForKey:` 而不是 `valueForKey:`\
  \ 来请求 Core Data 提供一个 `NSMutableSet` 实例，如下所示：\n\n\n```objc\nNSManagedObject *child\
  \ = [NSEntityDescription insertNewObjectForEntityForName:@\"Person\"\n         \
  \                               inManagedObjectContext:thePerson.managedObjectContext];\n\
  NSMutableSet *children = [thePerson mutableSetValueForKey:@\"children\"];\n[children\
  \ addObject:child];\n[children removeObject:child];\n```\n\n如果你不需要更改特定关系包含的对象，请直接使用`valueForKey:`，就像对待对一关系的数组一样。除非你确实需要更改构成关系的对象集，否则不要调用`mutableSetValueForKey:`，因为它比仅调用`valueForKey:`会带来稍多的开销。\n\
  \n除了使用`valueForKey:`和`mutableSetValueForKey:`之外，Core Data 还提供了在运行时动态创建的特殊方法，允许你向对多关系添加或删除托管对象。每个关系有四种这样的方法，每个方法名都包含了关系名。第一种方法允许你向关系添加单个对象：\n\
  \n```objc\n- (void)addXXXObject:(NSManagedObject *)value;\n```\n\n其中`XXX`是关系名的大写形式，`value`是`NSManagedObject`或其特定子类的实例。在之前使用的`Person`示例中，向`children`关系添加一个孩子的方法如下：\n\
  \n```objc\n- (void)addChildrenObject:(Person *)value;\n```\n\n删除单个对象的方法遵循类似的形式：\n\
  \n```objc\n- (void)removeXXXObject:(NSManagedObject *)value;\n```\n\n动态生成的用于向关系添加多个对象的方法采用以下形式：\n\
  \n```objc\n- (void)addXXX:(NSSet *)values;\n```\n\n该方法接受一个包含待添加托管对象的`NSSet`实例。因此，向`Person`托管对象添加多个孩子的动态创建方法如下：\n\
  \n```objc\n- (void)addChildren:(NSSet *)values;\n```\n\n最后，这是用于从关系中移除多个托管对象的方法：\n\
  \n```objc\n- (void)removeXXX:(NSSet *)values;\n```\n\n请记住，当你声明一个自定义`NSManagedObject`子类时，这些方法会自动生成。当\
  \ Xcode 遇到你的`NSManagedObject`子类声明时，它会在该子类上创建一个类别（category），该类别使用关系名构造方法名并声明这四个动态方法。由于这些方法在运行时生成，你项目的源代码中不会找到它们的实现。如果你从未调用这些方法，你永远不会看到它们。只要已经在模型编辑器中创建了对多关系，你无需额外操作即可访问这些方法，它们已被创建好并可供调用。\n\
  \n**注意**：与对多关系生成的方法相关的一个棘手点是：当你首次从模板生成`NSManagedObject`子类文件时，Xcode 声明了这四个动态方法。如果你的现有数据模型中已有对多关系及`NSManagedObject`子类，而你决定向该数据模型添加新的对多关系会发生什么？如果你向现有`NSManagedObject`子类添加对多关系，你需要自己添加包含这些动态方法的类别，稍后在本章中你将实际操作这一点。\n\
  \n使用这四个方法与使用`mutableSetValueForKey:`完全没有任何区别。动态方法只是更便捷一些，并使你的代码更易于阅读。\n\n### 反向关系\n\
  \n在 Core Data 中，每个关系都可以有一个反向关系。关系及其反向关系是一枚硬币的两面。在`Person`对象示例中，`children`关系的反向关系可能是一个名为`parent`的关系。一个关系不必与其反向关系类型相同。例如，一个对一关系可以有一个对多的反向关系。实际上，这非常常见。从现实世界思考，一个人可以有多个孩子，而反向关系是一个孩子只能有一个亲生母亲和一个亲生父亲，但孩子可以有多个父母和监护人。因此，根据你的需求和建模方式，你可以选择使用对一或对多关系作为反向关系。\n\
  \n如果你向一个关系添加对象，Core Data 会自动负责向反向关系添加正确的对象。所以，如果你有一个人名为 Steve，并向 Steve 添加一个孩子，Core\
  \ Data 会自动使该孩子的父/母为 Steve。\n\n虽然关系不要求必须有反向关系，但 Apple 通常建议你始终创建并指定反向关系，即使你在应用程序中不需要使用该反向关系。事实上，如果你未能提供反向关系，编译器会发出警告。这个通用规则也有例外，特别是当反向关系将包含极大量对象时，因为从关系中移除对象会触发其从反向关系中的移除。移除反向关系需要遍历表示反向关系的集合，如果该集合非常大，可能会带来性能问题。但除非你有特别的理由不这样做，否则你应该建模反向关系，因为它有助于\
  \ Core Data 确保数据完整性。如果因此出现性能问题，后续移除反向关系相对容易。\n\n**注意**：你可以从以下链接了解更多关于缺少反向关系如何导致完整性问题的内容：\n\
  \n[`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html`](https://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/CoreData/Articles/cdRelationships.html)\n\
  \n#### 获取属性（Fetched Properties）\n\n关系允许你将托管对象与特定的其他托管对象关联起来。从某种意义上说，关系有点像 iTunes\
  \ 播放列表，你可以将特定歌曲放入列表稍后播放。如果你是一名 iTunes 用户，你会知道有一种叫“智能播放列表”的东西，它允许你基于条件而非特定歌曲列表创建播放列表。例如，你可以创建一个包含某位艺术家所有歌曲的智能播放列表。之后当你购买该艺术家的新歌曲时，它们会自动添加到该智能播放列表中，因为播放列表基于条件且新歌曲满足这些条件。\n\
  \nCore Data 也有类似的功能。你可以向实体添加另一种类型的属性，它基于条件而不是关联特定对象，将托管对象与其他托管对象关联起来。获取属性并非通过添加和移除对象来工作，而是通过创建一个谓词（predicate）来定义应返回哪些对象。谓词，你可能还记得，是表示选择条件的对象，主要用于筛选集合和获取结果。\n\
  \n**提示**：如果你对谓词不太熟悉，*《Learn Objective-C on the Mac, 2nd Edition》*（Scott Knaster、Waqar\
  \ Maliq 和 Mark Dalrymple 合著，Apress, 2012）用了整整一章来讲解这个小家伙。\n\n获取属性始终是不可变的。你不能在运行时更改它们的内容。条件通常在数据模型中指定（稍后你将查看此过程），然后你使用属性或\
  \ KVC 来访问满足条件的对象。\n\n\n与对多关系不同，提取属性是有序集合，并且可以指定排序顺序。奇怪的是，数据模型编辑器并不允许你指定提取属性的排序方式。如果你在意提取属性中对象的顺序，就必须编写代码来实现，这一点将在本章后面进行介绍。\n\
  \n一旦创建了提取属性，使用它就变得相当简单。你只需使用 `valueForKey:` 即可在 `NSArray` 实例中检索满足提取属性条件的对象。\n\n\
  ```\nNSArray *olderPeople = [person valueForKey:@\"olderPeople\"];\n```\n\n如果你使用自定义的\
  \ `NSManagedObject` 子类并为提取属性定义一个属性，也可以使用点表示法在 `NSArray` 实例中检索满足提取属性条件的对象，例如：\n\n\
  ```\nNSArray *olderPeople = person.olderPeople;\n```\n\n### 在数据模型编辑器中创建关系和提取属性\n\
  \n使用关系或提取属性的第一步是将它们添加到数据模型中。现在，让我们添加你在 `SuperDB` 应用程序中需要的关系和提取属性。回顾一下图 7-1，你大概能猜到，你需要一个新实体来表示英雄的能力，以及从现有的\
  \ `Hero` 实体到你将创建的新 `Power` 实体的一个关系。你还需要四个提取属性来表示四个不同的报告。\n\n#### 删除规则\n\n每个关系，无论其类型如何，都有一个称为删除规则的东西，它指定当关系中的一个对象被删除时会发生什么。有四种可能的删除规则：\n\
  \n- **置空：** 这是默认的删除规则。使用此删除规则时，当一个对象被删除时，反向关系只会被更新，使其不指向任何东西。如果反向关系是一对一关系，则将其设置为\
  \ `nil`。如果反向关系是一对多关系，则被删除的对象将从该反向关系中移除。此选项确保没有对被删除对象的引用，但仅此而已。\n- **无动作：** 如果你指定删除规则为无动作，则当你从关系中删除一个对象时，另一个对象不会发生任何变化。使用此特定规则的情况极为罕见，通常仅限于没有反向关系的单向关系。此操作很少使用，因为另一个对象的反向关系最终会指向一个不再存在的对象。\n\
  - **级联：** 如果你将删除规则设置为级联，则当你删除一个托管对象时，关系中的所有对象也将被移除。这比置空规则更危险，因为删除一个对象可能导致其他对象被删除。当关系的反向关系是一对一，且相关对象未用于任何其他关系时，你通常会选择级联。如果关系中的一个或多个对象仅用于此关系而别无他用，那么你可能确实需要级联规则，以免在持久化存储中留下孤立对象占用空间。\n\
  - **拒绝：** 如果此关联中存在任何对象，此删除规则选项实际上会阻止对象被删除，从数据完整性角度来看，这是最安全的选项。拒绝选项不常用，但如果你有某些情况，一个对象只要在某个特定关系中包含任何对象就不应被删除，那么这就是你要选择的选项。\n\
  \n### 表达式与聚合\n\n表达式的另一个用途是在不将所有属性加载到内存中的情况下聚合属性。如果你想要获取特定属性的平均值、中位数、最小值或最大值，例如英雄的平均年龄或女性英雄的数量，你可以通过表达式来实现（甚至更多）。实际上，这才是你应该采用的方式。为了理解原因，你需要了解一下\
  \ Core Data 在底层的工作方式。\n\n你在 `HeroListController` 中使用的获取结果控制器包含数据库中所有英雄的对象，但它并未将所有英雄作为托管对象完整加载到内存中。Core\
  \ Data 有一个“故障”的概念。故障有点像托管对象的替身。故障对象对它所代表的托管对象有一定了解，例如其唯一 ID 以及可能正在显示的某个属性的值，但它不是一个完整的托管对象。\n\
  \n当某些事件触发故障时，故障会变成一个完整的托管对象。触发故障通常发生在你访问故障不知道的属性或键时。Core Data 足够智能，能在必要时将故障转换为托管对象，因此你的代码通常无需担心它是在处理故障还是托管对象。然而，了解这一行为很重要，这样你就不会因不必要地触发故障而无意中导致性能问题。\n\
  \n很可能，你的获取结果控制器中的故障对象对 `Hero` 的 `sex` 属性一无所知。因此，如果你要遍历获取结果控制器中的英雄以获取女性英雄的数量，就会触发每个故障使其变为托管对象。这是低效的，因为这会消耗比必要更多的内存和处理能力。相反，你可以使用表达式从\
  \ Core Data 检索聚合值，而无需触发故障。\n\n以下是一个示例，演示如何使用表达式获取应用程序中所有女性英雄的平均出生日期计算结果（你不能在获取请求中使用年龄，因为它是一个未存储的瞬态属性）。\n\
  \n```\nNSExpression *ex = [NSExpression expressionForFunction:@\"average:\"\n                                \
  \ arguments:@[[NSExpression expressionForKeyPath:@\"birthdate\"]]];\nNSPredicate\
  \ *pred = [NSPredicate predicateWithFormat:@\"sex == 'Female'\"];\n\nNSExpressionDescription\
  \ *ed = [[NSExpressionDescription alloc] init];\n[ed setName:@\"averageBirthdate\"\
  ];\n[ed setExpression:ex];\n[ed setExpressionResultType:NSDateAttributeType];\n\n\
  NSArray *properties = [NSArray arrayWithObject:ed];\n\nNSFetchRequest *request =\
  \ [[NSFetchRequest alloc] init];\n[request setPredicate:pred];\n[request setPropertiesToFetch:properties];\n\
  [request setResultType:NSDictionaryResultType];\n\nNSEntityDescription *entity =\
  \ [NSEntityDescription entityForName:@\"Hero\"\n                                          inManagedObjectContext:context];\n\
  [request setEntity:entity];\n\nNSArray *results = [context executeFetchRequest:request\
  \ error:nil];\nNSDate *date = [results objectAtIndex:0];\nNSLog(@\"女性英雄的平均出生日期：%@\"\
  , date);\n```\n\n聚合表达式对于 Core Data 来说相对较新。在撰写本文时，使用表达式获取聚合的过程尚未有详尽的文档记录，但上述代码示例，以及\
  \ `NSExpression` 和 `NSExpressionDescription` 的 API 文档，应该能为你使用聚合提供正确的指导方向。\n\n###\
  \ 添加 Power 实体\n\n在开始修改之前，请单击“组与文件”面板中的当前版本（带有绿色勾选标记的那个），然后从“设计”菜单的“数据模型”子菜单中选择“添加模型版本”，以创建数据模型的新版本。这可以确保你使用之前数据模型收集的数据能够正确迁移到本章将要创建的新版本中。\n\
  \n\n\n点击当前数据模型以打开模型编辑器。使用模型编辑器实体面板左下角的加号图标，添加一个新实体并将其命名为`Power`。你可以将所有其他字段保留为默认值（见图\
  \ 7-4）。\n\n![9781430238072_Fig07-04.jpg](img/9781430238072_Fig07-04.jpg)\n\n图 7-4.\
  \ 将新实体重命名为`Power`，并将其他字段保留为默认值\n\n回顾图 7-2，你可以看到`Power`对象有两个字段：一个用于能力的名称，另一个用于标识该特定能力的来源。为简单起见，这两个属性将只保存字符串值。\n\
  \n在属性面板中保持`Power`被选中状态，通过属性面板添加两个属性。将其中一个命名为`name`，取消选中“Optional”复选框，将其类型设置为`String`，并为其赋予默认值`New\
  \ Power`。将第二个属性命名为`source`，并将其类型也设置为`String`。保持“Optional”复选框为选中状态，无需设置默认值。完成后，你将在模型编辑器的图表视图中看到两个圆角矩形（见图\
  \ 7-5）。\n\n![9781430238072_Fig07-05.jpg](img/9781430238072_Fig07-05.jpg)\n\n图 7-5.\
  \ 现在你有两个实体，但它们之间没有任何关联\n\n### 创建`powers`关系\n\n现在`Power`实体处于选中状态。单击代表`Hero`实体的圆角矩形，或在实体面板中选择`Hero`以将其选中。接着，在属性面板中，单击并按住加号按钮，然后选择“Add\
  \ Relationship”。在模型编辑器的详情面板中，将新关系的名称更改为`powers`，并将“Destination”设置为`Power`。“Destination”字段指定哪些实体的托管对象可以添加到此关系中，因此通过选择`Power`，你表明此关系存储的是能力。\n\
  \n你还无法指定反向关系，但你需要勾选“To-Many Relationship”复选框，以表示每个英雄可以拥有多个能力。同时，将删除规则更改为“Cascade”。在你的应用中，每个英雄将拥有自己的一套能力——英雄之间不共享能力。当英雄被删除时，你需要确保该英雄的能力也被删除，以免在持久化存储中留下孤立数据。完成后，详情面板应如图\
  \ 7-6 所示，图表视图中`Hero`与`Power`实体之间将出现一条连线，代表这个新关系（见图 7-7）。\n\n![9781430238072_Fig07-06.jpg](img/9781430238072_Fig07-06.jpg)\n\
  \n图 7-6. `powers`关系的详情面板视图\n\n![9781430238072_Fig07-07.jpg](img/9781430238072_Fig07-07.jpg)\n\
  \n图 7-7. 关系在图表视图中由圆角矩形之间的连线表示。单箭头表示一对一关系，双箭头（如图所示）表示一对多关系\n\n### 创建反向关系\n\n在你的应用中实际上并不需要这个反向关系，但你会遵循苹果的建议，指定一个。由于反向关系将是一对一关系，它不会带来任何性能影响。再次选中`Power`实体，并使用属性面板为其添加一个关系。将此新关系命名为`hero`，并选择`Hero`作为目标实体。现在查看图表视图，你应该会看到两条线，代表你创建的两个不同关系。\n\
  \n接下来，单击“Inverse”弹出菜单并选择`powers`。这表示该关系是你之前创建的那个关系的反向关系。选中后，图表视图中的两条关系线将合并为一条两端带有箭头的单线（见图\
  \ 7-8）。\n\n![9781430238072_Fig07-08.jpg](img/9781430238072_Fig07-08.jpg)\n\n图 7-8.\
  \ 反向关系由一条两端带有箭头的单线表示，而不是两条独立的线\n\n### 创建`olderHeroes`获取属性\n\n再次选中`Hero`实体，以便为其添加一些获取属性。在属性面板中，单击并按住加号按钮，然后选择“Add\
  \ Fetched Property”。将此新获取属性命名为`olderHeroes`。注意，详情面板上只有一个其他字段可以设置：一个名为“Predicate”的白色大框（见图\
  \ 7-9）。\n\n![9781430238072_Fig07-09.jpg](img/9781430238072_Fig07-09.jpg)\n\n图 7-9.\
  \ 显示获取属性的详情面板\n\n**提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。\n\n### 什么是谓词？\n\n谓词是一个返回布尔值的语句。你可以将它们视为`if`或`while`语句中的条件表达式。它们旨在针对一组对象（无论是\
  \ Cocoa 还是 Core Data）使用。谓词不依赖于被搜索的具体数据，而是提供了一种定义查询以过滤数据的抽象方式。最简单的形式是，谓词使用运算符比较两个值。例如，运算符`==`用于测试两个值是否相等。还有更复杂的运算符允许进行字符串比较（使用`LIKE`或`CONTAINS`）。谓词可以组合起来形成复合谓词。通常，谓词通过`AND`或`OR`运算符连接。\n\
  \n在获取属性的谓词中，可以使用两个特殊变量：`$FETCH_SOURCE`和`$FETCHED_PROPERTY`。`$FETCH_SOURCE`指向托管对象的特定实例。`$FETCHED_PROPERTY`是对正在获取的实体属性的描述。\n\
  \n你可以在苹果的谓词编程指南（https://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/Predicates/predicates.html）中阅读更详细的信息。\n\
  \n**提示** 关系和获取属性都可以使用它们自身的实体作为目标实体。\n\n因此，你需要定义一个谓词，用于查找所有比详情视图中的`Hero`更年长（即出生日期更早）的英雄。你需要将你的`Hero`的出生日期与所有其他`Hero`实体进行比较。如果`$FETCH_SOURCE`是你的`Hero`实体，你的谓词将是：\n\
  \n```\n$FETCH_SOURCE.birthdate > birthdate\n```\n\n在属性检查器的“Predicate”字段中输入此公式。记住，日期实际上只是一个整数；日期越晚，值越大。\n\
  \n### 创建`youngerHeroes`获取属性\n\n添加另一个名为`youngerHeroes`的获取属性。目标实体仍为`Hero`，谓词应与上一个基本相同，只是将运算符`>`改为`<`。在属性检查器中为`youngerHeroes`的谓词输入以下内容：\n\
  \n```\n$FETCH_SOURCE.birthdate < birthdate\n```\n\n需要注意的一点是，获取属性会检索所有匹配的对象，可能包括正在执行获取操作的对象本身。这意味着有可能创建一个结果集，当对\
  \ Super Cat 执行时，返回的结果包含 Super Cat。\n\n`youngerHeroes`和`olderHeroes`这两个获取属性都会自动排除正在被评估的英雄。英雄不能比自己更年长或更年轻；他们的出生日期总是精确等于自己的出生日期，因此没有英雄会满足你刚刚创建的这两个条件。\n\
  \n\n\n现在我们来添加一个筛选条件稍复杂一些的获取属性。\n\n#### 创建 `sameSexHeroes` 获取属性\n\n接下来要创建的获取属性名为\
  \ `sameSexHeroes`，它会返回与当前英雄性别相同的所有英雄。不过，你无法简单地指定返回所有同性的英雄，因为你不希望当前英雄本身被包含在该获取属性中。超级猫与超级猫性别相同，但当用户查看与超级猫性别相同的英雄列表时，他们不会期望看到超级猫自己。\n\
  \n创建另一个获取属性，命名为 `sameSexHeroes`。打开模型编辑器。确保目标（Destination）设置为 `Hero`。在谓词（Predicate）字段中，输入：\n\
  \n```\n($FETCH_SOURCE.sex == sex) AND ($FETCH_SOURCE != SELF)\n```\n\n这个复合谓词的左侧部分作用很明确。但右侧部分在做什么呢？请记住，获取属性的谓词会返回所有匹配的对象，包括拥有该获取属性的对象本身。在本例中，你请求了所有特定性别的英雄，而详情视图中的英雄自身也会符合这个条件。你需要排除这个特定的英雄。\n\
  \n你可以通过比较名称来排除与当前英雄同名的英雄。这种做法可能可行，但问题是两个英雄可能拥有相同的名字。也许使用名称并不是最佳方案。那么，有什么值能唯一标识单个英雄呢？实际上，并没有唯一的值。\n\
  \n幸运的是，谓词能识别一个名为 `SELF` 的特殊值，它会返回正在被比较的对象。`$FETCH_SOURCE` 变量代表发起获取请求的对象。因此，要排除发起获取请求的对象本身，你只需要要求它仅返回\
  \ `$FETCH_SOURCE != SELF` 的对象即可。\n\n#### 创建 `oppositeSexHeroes` 获取属性\n\n创建一个名为 `oppositeSexHeroes`\
  \ 的新获取属性，并输入以下谓词：\n\n```\n$FETCH_SOURCE.sex != sex\n```\n\n在继续之前，请确保保存了你的数据模型。\n\
  \n#### 向 Hero 类添加关系和获取属性\n\n由于你创建了 `NSManagedObject` 的自定义子类，你需要更新该类以包含新的关系和获取属性。如果你没有对\
  \ `Hero` 类做任何修改，你可以直接从数据模型重新生成类定义，新生成的版本将包含你刚刚添加到数据模型中的关系和获取属性的属性与方法。由于你已经添加了验证代码，你需要手动更新它。单击选中\
  \ `Hero.h` 并添加以下代码：\n\n（在 `@interface` 之前）\n\n```\n@class Power;\n```\n\n（在其他属性之后）\n\
  \n```\n@property (nonatomic, retain) NSSet *powers;\n\n@property (nonatomic, readonly)\
  \ NSArray *olderHeroes;\n@property (nonatomic, readonly) NSArray *youngerHeroes;\n\
  @property (nonatomic, readonly) NSArray *sameSexHeroes;\n@property (nonatomic, readonly)\
  \ NSArray *oppositeSexHeroes;\n```\n\n（在 `@end` 之后）\n\n```\n@interface Hero (PowerAccessors)\n\
  - (void)addPowersObject:(Power *)value;\n- (void)removePowersObject:(Power *)value;\n\
  - (void)addPowers:(NSSet *)value;\n- (void)removePowers:(NSSet *)value;\n@end\n\
  ```\n\n保存文件。切换到 `Hero.m` 并进行以下修改（位于其他 `@dynamic` 声明之后）：\n\n```\n@dynamic powers;\n\
  @dynamic olderHeroes, youngerHeroes, sameSexHeroes, oppositeSexHeroes;\n```\n\n\
  #### 更新详情视图\n\n参考图 7-1，你需要向详情视图添加两个新的表格视图分区：Powers（能力）和 Reports（报告）。不幸的是，这并不像第 6\
  \ 章中向 General 分区添加新单元格那样简单。事实证明，你不能使用故事板编辑器来为你设置这些内容。原因是 Powers 分区是动态数据驱动的。在你有一个可检查的\
  \ `Hero` 实体之前，你无法知道 Powers 分区有多少行。所有其他分区都有固定数量的行。\n\n你首先要将 `HeroDetailController`\
  \ 转换为其当前配置更数据驱动的方式。打开 `SuperDB.storyboard` 并找到 `HeroDetailController`。选中该表格视图并打开属性检查器。将表格视图的“内容（Content）”字段从“静态单元格（Static\
  \ Cells）”更改为“动态原型（Dynamic Prototypes）”。详情视图应变为一个带有“原型单元格（Prototype Cells）”分区标题的单一表格视图单元格（图\
  \ 7-10）。\n\n![9781430238072_Fig07-10.jpg](img/9781430238072_Fig07-10.jpg)\n\n图 7-10  将表格视图内容更改为动态原型\n\
  \n选中剩余的那个表格视图单元格，并将“实用工具（Utility）”面板切换到属性检查器。在“标识符（Identifier）”字段中，删除内容使其为空。\n\n\
  现在打开 `HeroDetailController.m`。找到 `numberOfSectionsInTableView:` 和 `tableView:numberOfRowsInSection:`\
  \ 方法。你无法使用跳转栏找到它们，因为你已经将它们注释掉了，但如果你查找标签“Table view data source”，它应该能带你到附近的位置。取消这些方法的注释，并将它们的主体修改为：\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n  \
  \  return self.sections.count;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\
  \ numberOfRowsInSection:(NSInteger)section\n{\n    NSDictionary *sectionDict = [self.sections\
  \ objectAtIndex:section];\n    NSArray *rows = [sectionDict objectForKey:@\"rows\"\
  ];\n    return rows.count;\n}\n```\n\n你只是使用配置信息来确定你的表格视图有多少个分区以及每个分区有多少行。\n\n现在，你的配置信息不包含“页眉（Header）”值。如果你现在运行应用，详情视图将看起来像图\
  \ 7-11。\n\n![9781430238072_Fig07-11.jpg](img/9781430238072_Fig07-11.jpg)\n\n图 7-11  没有通用分区标题的详情视图\n\
  \n将页眉信息添加到你的配置 plist 文件中。编辑 `HeroDetailController.plist` 并导航到 Root ![image](img/arrow.jpg)\
  \ Section ![image](img/arrow.jpg) Item 1。打开 Item 1，选中 Item 1 行，并添加一个新项目。为该项目的键设置为\
  \ `header`，值设置为 `General`。保持类型为 String（字符串）（图 7-12）。\n\n![9781430238072_Fig07-12.jpg](img/9781430238072_Fig07-12.jpg)\n\
  \n图 7-12  向属性列表添加通用分区标题\n\n现在回到 `HeroDetailController.m`。并添加以下方法（我们将其放在 `tableView:numberOfRowsInSection:`\
  \ 之后）：\n\n```\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
  {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n    return\
  \ [sectionDict objectForKey:@\"header\"];\n}\n```\n\n“General”标签应该会显示出来。由于你没有在第一个分区中放置页眉项目，`objectForKey:`\
  \ 将返回 `nil`，表格视图会将其解释为没有页眉标签。\n\n现在你已经准备好添加新的 Powers 和 Reports 分区了。\n\n回到 `HeroDetailController.plist`\
  \ 属性列表并选中 Sections 项目。打开 Sections 项目，然后确保 Item 0 和 Item 1 都已折叠。将指针悬停在 Item 1 上，直到\
  \ Item 1 旁边出现 (+) 和 (−) 按钮。单击 (+) 按钮。应该会出现一个新的 Item 2。将 Item 2 的类型设置为 Dictionary（字典）并打开它。向\
  \ Item 2 添加一个项目。将其命名为 `header`，值为 `Powers`。\n\n#### 重新思考配置\n\n在继续之前，后退一步，思考一下你的详情配置属性列表。你刚刚添加了一个新的分区来表示\
  \ Powers 分区。你添加了一个页眉项目来包含分区标题字符串。现在你需要添加 rows 项目，对吗？\n\n很可能不是。\n\n\n\n请记住，`rows`\
  \ 项是一个数组，它告诉您如何配置分区中的每个单元格，以及要使用什么`label`、`cell class`和`property key`。单元格的数量由数组项的数量决定。`Powers`分区的情况几乎相反。您不知道需要多少行；这些行来自`Hero`实体的`Powers`关系。而每个单元格的配置应该是相同的。\n\
  \n有几种方法可以解决这个问题。我们来讨论两种思路。\n\n对于`Powers`分区，您将把`rows`项设为一个字典。该字典将包含三个`String`项。键将是`key`、`class`和`label`。这些键与当`rows`是`Array`时您为每个项使用的键相同。您可以推断出，当`rows`项是字典时，该分区是数据驱动的；但当`rows`项是`Array`时，该分区是配置驱动的。\n\
  \n这是另一种方法。对于每个分区，除了`header`项之外，您再定义一个名为`dynamic`的项，其类型为`Boolean`。如果为`YES`，则分区是数据驱动的；如果为`NO`，则分区是配置驱动的。在所有情况下，`rows`都将是一个数组，但对于动态分区，它只包含一个条目。如果没有`dynamic`项，则等同于将`dynamic`设置为`NO`。\n\
  \n两种方法都可行。可能还有很多其他想法可以讨论，但这并非我们此处的重点。无论采用哪种方法，都需要添加大量代码来处理此逻辑——到目前为止，您将这些代码都放在了`HeroDetailController`类中。将这个解析逻辑放在`HeroDetailController`内部可能合适，但随着它变得更加复杂，只会让您的代码变得混乱。您将对应用进行重构，将属性列表处理代码从`HeroDetailController`中提取出来，放到一个新的类`HeroDetailConfiguration`中。然后，您将选择采用哪种方法来处理数据驱动的`Powers`分区。\n\
  \n创建一个新的 Objective-C 类。令其作为`NSObject`的子类，并将其命名为`HeroDetailConfiguration`。\n\n查看`HeroDetailController`，您会发现已将`sections`数组放在一个私有类别中。对于`HeroDetailConfiguration`，您也将采用同样的做法。打开`HeroDetailConfiguration.m`并在`@implementation`上方添加以下内容：\n\
  \n```\n@interface HeroDetailConfiguration ()\n@property (strong, nonatomic) NSArray\
  \ *sections;\n@end\n```\n\n接下来，您需要创建初始化方法。您希望它能够打开属性列表并将其内容解析到`sections`数组中。\n\n\
  ```\n- (id)init\n{\n    self = [super init];\n    if (self) {\n        // 初始化代码\n\
  \        NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@\"HeroDetailConfiguration\"\
  \n                                                  withExtension:@\"plist\"];\n\
  \        NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];\n\
  \        self.sections = [plist valueForKey:@\"sections\"];\n    }\n    return self;\n\
  }\n```\n\n现在，让我们回到`HeroDetailController.m`，看看在哪里使用`sections`数组。以下方法访问了`HeroDetailController`的`sections`数组：\n\
  \n```\nnumberOfSectionsInTableView:\ntableView:numberOfRowsInSection:\ntableView:titleForHeaderInSection:\n\
  tableView:cellForRowAtIndexPath:\n```\n\n您可以利用这些方法来设计`HeroDetailConfiguration`的方法。直接来看，您可以看到所需的三个方法：\n\
  \n```\nnumberOfSections\nnumberOfRowsInSection:\nheaderInSection:\n```\n\n在`HeroDetailConfiguration.h`中定义这些方法。\n\
  \n```\n- (NSInteger)numberOfSections;\n- (NSInteger)numberOfRowsInSection:(NSInteger)section;\n\
  - (NSString *)headerInSection:(NSInteger)section;\n```\n\n现在，让我们在`HeroDetailConfiguration.m`中实现它们。这应该非常直接。\n\
  \n```\n- (NSInteger)numberOfSections\n{\n    return self.sections.count;\n}\n\n\
  - (NSInteger)numberOfRowsInSection:(NSInteger)section\n{\n    NSDictionary *sectionDict\
  \ = [self.sections objectAtIndex:section];\n    NSArray *rows = [sectionDict objectForKey:@\"\
  rows\"];\n    return rows.count;\n}\n```\n\n\n```objectivec\n- (NSString *)headerInSection:(NSInteger)section\n\
  {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n    return\
  \ [sectionDict objectForKey:@\"header\"];\n}\n```\n\n这些实现应该与你之前在`HeroDetailController`中实现的几乎相同。\n\
  \n现在你需要看看你在`HeroDetailController tableView:cellForRowAtIndexPath:`中做了什么。所需的核心部分位于该方法开头。\n\
  \n```objectivec\n    NSUInteger sectionIndex = [indexPath section];\n    NSUInteger\
  \ rowIndex = [indexPath row];\n    NSDictionary *section = [self.sections objectAtIndex:sectionIndex];\n\
  \    NSArray *rows = [section objectForKey:@\"rows\"];\n    NSDictionary *row =\
  \ [rows objectAtIndex:rowIndex];\n```\n\n本质上，你获取了特定索引路径对应的行字典。这正是你希望`HeroDetailConfiguration`对象为你做的事情：根据索引路径返回一个行字典。因此，你想要的方法应该像这样：\n\
  \n```objectivec\n- (NSDictionary *)rowForIndexPath:(NSIndexPath *)indexPath;\n```\n\
  \n让我们将其添加到`HeroDetailConfiguration.h`中，并在`HeroDetailConfiguration.m`中为方法体添加存根。\n\
  \n在你担心处理实现 Powers 部分的问题之前，只需复制你已经实现的功能即可。在这种情况下，你只需将`HeroDetailController tableView:cellForRowAtIndexPath:`开头的五行代码添加到新方法中即可。\n\
  \n```objectivec\n- (NSDictionary *)rowForIndexPath:(NSIndexPath *)indexPath\n{\n\
  \    NSUInteger sectionIndex = [indexPath section];\n    NSUInteger rowIndex = [indexPath\
  \ row];\n    NSDictionary *section = [self.sections objectAtIndex:sectionIndex];\n\
  \    NSArray *rows = [section objectForKey:@\"rows\"];\n    NSDictionary *row =\
  \ [rows objectAtIndex:rowIndex];\n    return row;\n}\n```\n\n现在让我们编辑`HeroDetailController.m`，以使用你新的`HeroDetailConfiguration`类。首先，在顶部（紧挨着`SuperDBEditCell\
  \ #import`下方）添加`#import`声明。\n\n```objectivec\n#import \"HeroDetailConfiguration.h\"\
  \n```\n\n将`sections`属性声明替换为`HeroDetailConfiguration`的属性。\n\n```objectivec\n@property\
  \ (strong, nonatomic) NSArray *sections;\n@property (strong, nonatomic) HeroDetailConfiguration\
  \ *config;\n```\n\n将`viewDidLoad`中的`sections`初始化代码替换为`config`的初始化。\n\n```objectivec\n\
  \    NSURL *plistURL = [[NSBundle mainBundle] URLForResource:@\"HeroDetailController\"\
  \ withExtension:@\"plist\"];\n    NSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];\n\
  \    self.sections = [plist valueForKey:@\"sections\"];\n    self.config = [[HeroDetailConfiguration\
  \ alloc] init];\n```\n\n替换`numberOfSectionsInTableView:`中的代码。\n\n```objectivec\n\
  - (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    return\
  \ self.sections.count;\n    return [self.config numberOfSections];\n}\n```\n\n替换`tableView:numberOfRowsInSection:`中的代码。\n\
  \n```objectivec\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
  {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n    NSArray\
  \ *rows = [sectionDict objectForKey:@\"rows\"];\n    return row.count;\n    return\
  \ [self.config numberOfRowsInSection:section];\n}\n```\n\n替换`tableView:titleForHeaderInSection:`中的代码。\n\
  \n```objectivec\n- (NSString *)tableView:(UITableView *)tableView titleForHeaderInSection:(NSInteger)section\n\
  {\n    NSDictionary *sectionDict = [self.sections objectAtIndex:section];\n    return\
  \ [sectionDict objectForKey:@\"header\"];\n    return [self.config headerInSection:section];\n\
  }\n```\n\n最后，替换`tableView:cellForRowAtIndexPath:`中的代码。\n\n```objectivec\n    NSUInteger\
  \ sectionIndex = [indexPath section];\n    NSUInteger rowIndex = [indexPath row];\n\
  \    NSDictionary *section = [self.sections objectAtIndex:sectionIndex];\n    NSArray\
  \ *rows = [section objectForKey:@\"rows\"];\n    NSDictionary *row = [rows objectAtIndex:rowIndex];\n\
  \    NSDictionary *row = [self.config rowForIndexPath:indexPath];\n```\n\n此时，你的应用应该表现得和开始重构之前一模一样。\n\
  \n### 封装与信息隐藏\n\n在你继续处理 Power 部分之前（马上就会处理，放心！），让我们再看一眼`HeroDetailController tableView:cellForRowAtIndexPath:`。你的`HeroDetailConfiguration`返回了一个行字典。而你在方法的后续部分中使用了这些信息。\n\
  \n```objectivec\n    NSDictionary *row = [self.config rowForIndexPath:indexPath];\n\
  \    NSString *cellClassname = [row objectForKey:@\"class\"];\n        ...\n   \
  \ NSArray *values = [row valueForKey:@\"values\"];\n        ...\n    cell.key =\
  \ [row objectForKey:@\"key\"];\n    cell.value = [self.hero valueForKey:[row objectForKey:@\"\
  key\"]];\n    cell.label.text = [row objectForKey:@\"label\"];\n```\n\n虽然保持现状可能没问题，但你或许更希望用`HeroDetailConfiguration`中的方法来替换这些调用。为什么要这样做？简而言之，是因为两个概念：封装和信息隐藏。信息隐藏是指隐藏实现细节的指导思想。想象一下，如果你改变了配置信息的存储方式，那么你就必须修改填充表格视图单元格的方式。通过将特定的访问调用放在`HeroDetailConfiguration`内部，你就不必担心配置存储机制是否会改变。你可以自由地更改内部实现，而无需担心表格视图单元格的代码。封装是指将所有配置访问代码集中到一个单独的对象`HeroDetailConfiguration`中，而不是将这些访问代码散布在视图控制器中各处。\n\
  \n回顾一下对行字典的`objectForKey:`调用，你可能需要这样的一些方法：\n\n```objectivec\n- (NSString *)cellClassnameForIndexPath:(NSIndexPath\
  \ *)indexPath;\n- (NSArray *)valuesForIndexPath:(NSIndexPath *)indexPath;\n- (NSString\
  \ *)attributeKeyForIndexPath:(NSIndexPath *)indexPath;\n- (NSString *)labelForIndexPath:(NSIndexPath\
  \ *)indexPath;\n```\n\n将它们添加到`HeroDetailConfiguration.h`中，然后在`HeroDetailConfiguration.m`中添加它们的实现。\n\
  \n```objectivec\n- (NSString *)cellClassnameForIndexPath:(NSIndexPath *)indexPath\n\
  {\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n    return [row objectForKey:@\"\
  class\"];\n}\n\n- (NSArray *)valuesForIndexPath:(NSIndexPath *)indexPath\n{\n  \
  \  NSDictionary *row = [self rowForIndexPath:indexPath];\n    return [row objectForKey:@\"\
  values\"];\n}\n\n- (NSString *)attributeKeyForIndexPath:(NSIndexPath *)indexPath\n\
  {\n    NSDictionary *row = [self rowForIndexPath:indexPath];\n    return [row objectForKey:@\"\
  key\"];\n}\n\n- (NSString *)labelForIndexPath:(NSIndexPath *)indexPath\n{\n    NSDictionary\
  \ *row = [self rowForIndexPath:indexPath];\n    return [row objectForKey:@\"label\"\
  ];\n}\n```\n\n最后，用这些新方法替换`HeroDetailController tableView:cellForRowAtIndexPath:`中的代码。\n\
  \n```objectivec\n    NSDictionary *row = [self.config rowForIndexPath:indexPath];\n\
  \    NSString *cellClassname = [row objectForKey:@\"class\"];\n    NSString *cellClassname\
  \ = [self.config cellClassnameForIndexPath:indexPath];\n        ...\n    NSArray\
  \ *values = [row valueForKey:@\"values\"];\n    NSArray *values = [self.config valuesForIndexPath:indexPath];\n\
  \        ...\n    cell.key = [row objectForKey:@\"key\"];\n    cell.value = [self.hero\
  \ valueForKey:[row objectForKey:@\"key\"]];\n    cell.label.text = [row objectForKey:@\"\
  label\"];\n    cell.key = [self.config attributeKeyForIndexPath:indexPath];\n  \
  \  cell.value = [self.hero valueForKey:[self.config attributeKeyForIndexPath:indexPath]];\n\
  \    cell.label.text = [self.config labelForIndexPath:indexPath];\n```\n\n如果你愿意，可以继续重构代码，但在此处告一段落，继续前进是合适的。\n\
