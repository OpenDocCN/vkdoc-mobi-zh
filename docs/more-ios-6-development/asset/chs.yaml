  \n![Table01.jpg](img/Table01.jpg)\n\n好了，你已经定义了界面，现在让我们将它连接到你的控制器。仍在 Interface Builder\
  \ 中时，将工具栏中的编辑器从标准视图更改为助理视图。编辑器窗格应水平分割，左侧是 Interface Builder，右侧是源代码编辑器（已打开`ViewController.h`）。你需要为“新游戏”按钮和放置在其上方的标签添加输出口。如果你从“新游戏”按钮中间按住\
