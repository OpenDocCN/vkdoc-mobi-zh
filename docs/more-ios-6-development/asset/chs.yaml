  图 6-10.  英雄详情视图\n\n“年龄”单元格存在一个问题。首先，在编辑模式下，你可以点击“年龄”单元格内部，它会获得焦点并显示键盘输入。其次，当你尝试从编辑模式保存时，应用程序会崩溃。我们来解决这个问题。\n\
  \n### 重构 SuperDBEditCell\n\n默认情况下，“年龄”单元格是可编辑的。有一个表格视图数据源方法 `tableView:canEditRowAtIndexPath:`\
  \ 用于确定特定表格视图单元格是否可编辑。默认情况下，此方法在 `UITableViewController` 模板中提供，但被注释掉了。因此，表格视图假定所有单元格都是可编辑的。显然，你需要此方法为“年龄”单元格的索引路径返回\
  \ `NO`。不幸的是，将单元格指定为不可编辑后，该单元格在编辑模式下不会缩进。这也许可以接受，但你希望“年龄”单元格即使在无法编辑时也能缩进。\n\n应用程序崩溃是由于\
  \ `HeroDetailController` 的保存方法中的这几行代码：\n\n```\nfor (SuperDBEditCell *cell in [self.tableView\
  \ visibleCells])\n    [self.hero setValue:[cell value] forKey:[cell key]];\n```\n\
  \n当你尝试设置 `Hero` 实体中 `age` 属性的值时，会引发异常崩溃。记住，你在数据模型中将 `age` 声明为瞬态属性。这意味着 `age` 的值是计算得出的，无法直接设置。你需要一种方法来检查是否应该保存单元格中的值。\n\
  \n首先，你需要定义一个不可编辑版本的 `SuperDBEditCell`。但与其这样做，不如创建一个 `SuperDBEditCell` 的超类，命名为 `SuperDBCell`，它使用\
  \ `textField`，但不允许在编辑时启用它。这似乎是尝试 Xcode 重构功能的好时机。\n\n#### Xcode 重构选项\n\n打开 Xcode\
  \ 中的 Edit ![image](img/arrow.jpg) Refactor。你应该会看到图 6-11 中的子菜单。\n\n![9781430238072_Fig06-11.jpg](img/9781430238072_Fig06-11.jpg)\n\
  \n图 6-11.  Xcode 重构菜单\n\n在继续之前，让我们快速回顾一下什么是重构以及每个菜单项的作用。重构是在不改变代码外部行为的情况下重构代码。通常，你会重构一些代码（通常是一个方法）以改善某些非功能性属性（例如，降低复杂性、提高可读性）。这并不是随意地“重写”代码，而是一种有纪律的、小步进行的改进方法。\n\
  \n**注意**  关于重构模式的优秀资源是 Martin Fowler 的《重构：改善既有代码的设计》（Addison-Wesley, 1999）。它不仅解释了重构背后的过程，还概述了几种重构技术。\n\
  \nXcode 的重构选项包括：\n\n\n\n* **重命名**：重命名符号，使其更清晰地表明用途，并使源代码更易于阅读。符号的示例包括类、方法或函数的名称。不幸的是，在协议中声明的方法无法重命名。\n\
  * **提取**：将您在 Xcode 中选择的代码提取到一个新的方法或函数中。\n* **创建超类**：为当前在 Xcode 中选择的类定义一个超类。\n* **上移**：将选定的方法、属性或实例变量从某个类移动到其超类，前提是两者都在您的项目中定义。\n\
  * **下移**：与*上移*相反，它将选定的符号从某个类移动到其子类，前提是两者都在您的项目中定义。\n* **封装**：封装一个实例变量并创建适当的访问器。\n\
  * **转换为 Objective-C ARC**：一个用于帮助将遗留项目转换为使用自动引用计数的工具。\n* **转换为现代 Objective-C 语法**：一个用于更新代码以使用更现代的\
  \ Objective-C 特性的工具，例如新的字面量语法（数组、字典、布尔值）。\n\n这只是对“重构”菜单项的一个简要介绍，目的是让您熟悉 Xcode 中提供了哪些功能，以便用于将来的项目。让我们回到\
  \ `SuperDB` 应用。\n\n您将要使用 *创建超类* 选项。打开 `SuperDBEditCell.h`，并高亮 `@interface` 声明后的类名\
  \ `SuperDBEditCell`。选择 Edit（编辑）![image](img/arrow.jpg) Refactor（重构）![image](img/arrow.jpg)\
  \ Create Superclass（创建超类）。Xcode 应该会弹出一个对话框，询问超类的名称（图 6-12）。将类命名为 `SuperDBCell`，选择“为新超类创建文件”选项，然后点击\
  \ Preview（预览）。您应该会看到一个文件合并弹出窗口，其中显示了创建 `SuperDBCell` 超类将会进行的所有更改（图 6-13）。\n\n![9781430238072_Fig06-12.jpg](img/9781430238072_Fig06-12.jpg)\n\
  \n图 6-12.  创建超类弹出窗口\n\n![9781430238072_Fig06-13.jpg](img/9781430238072_Fig06-13.jpg)\n\
  \n图 6-13.  重构文件合并预览\n\n这个预览除了显示 `SuperDBCell` 接口和实现文件的创建之外，并没有展示太多内容。点击 Save（保存）。Xcode\
  \ 可能会询问是否要拍摄快照。是否使用快照由您决定。我们偶尔会使用，但我们更喜欢使用像 Git 这样的版本控制系统。\n\n### 移动代码\n\n目前，Xcode\
  \ 并未完成您希望的所有操作。它确实为 `SuperDBCell` 创建了文件，也使得 `SuperDBEditCell` 成为 `SuperDBCell` 的子类，但除此之外没做太多事情。请记住，您希望让\
  \ `SuperDBCell` 与 `SuperDBEditCell` 相同，只是 `textField` 永远不会被启用。\n\n让我们从 `SuperDBCell`\
  \ 的接口文件开始。您将把 `SuperDBEditCell` 的大部分代码移动到 `SuperDBCell` 中。\n\n```objc\n#import <UIKit/UIKit.h>\n\
