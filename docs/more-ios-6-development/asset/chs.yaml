  \n图 4-11. Segue 弹出选择器\n\n现在你需要创建你的表格视图子类，以便填充你的详细表格视图单元格。\n\n### HeroDetailController\n\
  \n在导航窗格中单击 `SuperDB` 组。创建一个新文件。在新文件助理中，选择 `Objective-C subclass` 并点击 `Next`。在下一个屏幕上，将类命名为\
  \ `HeroDetailController`，使其成为 `UITableViewController` 的子类。确保“Targeted for iPad”和“With\
  \ XIB for user interface”均未选中。点击 `Next`。创建文件。\n\n接下来，选择 `SuperDB.storyboard`。在故事板编辑器中，选择你的详细表格视图。确保缩放级别已设置，以便在详细表格视图标签中看到三个图标。选择表格视图控制器图标，并在实用工具窗格中打开标识检查器。在\
  \ `Custom Class` 部分，将 `Class` 字段更改为 `HeroDetailController`。\n\n还有一件事。当你将 `UITableViewController`\
  \ 子类化时，Xcode 会为你的 `HeroDetailController` 提供表格视图数据源和委托方法的实现。你现在不需要它们（但后面会用到），因此你可以将它们注释掉。找到以下方法：\n\
  \n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n- (NSInteger)tableView:(UITableView\
  \ *)tableView numberOfRowsInSection:(NSInteger)section\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView cellForRowAtIndexPath:(NSIndexPath *)indexPath\n```\n\n并将它们（包括方法体）注释掉。\n\
  \n你已创建了 `HeroDetailController`，并在故事板中将你的详细视图控制器设置为 `HeroDetailController` 的实例。现在，你将创建属性列表，用于定义表格分区。\n\
  \n### 详细视图挑战\n\n表格视图架构旨在高效地展示集合中存储的数据。例如，你可能会使用表格视图来显示 `NSArray` 或获取结果控制器中的数据。然而，在创建详细视图时，你通常展示的是单个对象的数据，在本例中，该对象是代表单个超级英雄的\
  \ `NSManagedObject` 实例。托管对象使用键值编码，但没有机制以有意义的顺序展示其属性。例如，`NSManagedObject` 并不知道 `name`\
  \ 属性是最重要的，也不清楚它是否应该像图 4-2 那样单独占据一个分区。\n\n想出一种良好且可维护的方式来指定详细编辑视图中的分区和行，是一项非平凡的任务。最明显的解决方案（你在在线示例代码中会经常看到）是使用\
  \ `enum` 列出表格分区，然后为每个分区添加额外的 `enum`，包含常量和每个分区的行数，如下所示：\n\n```\nenum HeroEditControllerSections\
  \ {\n    HeroEditControllerSectionName = 0,\n    HeroEditControllerSectionGeneral,\n\
      HeroEditControllerSectionCount\n};\nenum HeroEditControllerNameSection {\n    HeroEditControllerNameRow\
  \ = 0,\n    HeroEditControllerNameSectionCount\n};\nenum HeroEditControllerGeneralSection\
  \ {\n    HeroEditControllerGeneralSectionSecretIdentityRow,\n    HeroEditControllerGeneralSectionBirthdateRow,\n\
      HeroEditControllerGeneralSectionSexRow,\n    HeroEditControllerGeneralSectionCount\n\
  };\n```\n\n然后，在提供索引路径的每个方法中，你可以使用 `switch` 语句根据索引路径表示的行和分区采取相应操作，如下所示：\n\n\n\n```objc\n\
  - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSUInteger section = [indexPath section];\n    NSUInteger\
  \ row = [indexPath row];\n    switch (section) {\n        case HeroEditControllerSectionName:\n\
  \            switch (row)\n        {\n            case HeroEditControllerNameRow\
  \ :\n                // 创建一个控制器来编辑姓名\n                // 并将其推入导航栈\n            \
  \    ...\n                break;\n            default:\n                break;\n\
  \        }\n            break;\n        case HeroEditControllerSectionGeneral:\n\
  \            switch (row) {\n                case HeroEditControllerGeneralSectionSecretIdentityRow:\n\
  \                    // 创建一个控制器来编辑秘密身份\n                    // 并将其推入导航栈\n      \
  \              ...\n                    break;\n                case HeroEditControllerGeneralSectionBirthdateRow:\n\
  \                    // 创建一个控制器来编辑出生日期\n                    // 并将其推入导航栈\n      \
  \              ...\n                    break;\n                case HeroEditControllerGeneralSectionSexRow:\n\
  \                    // 创建一个控制器来编辑性别\n                    // 并将其推入导航栈\n        \
  \            ...\n                    break;\n                default:\n       \
  \             break;\n            }\n            break;\n        default:\n    \
  \        break;\n    }\n}\n```\n\n这种方法的问题在于其可扩展性非常差。像这样嵌套的`switch`语句几乎需要在每个接受`indexPath`的表格视图委托或数据源方法中出现，这意味着添加或删除行或节需要在多个地方更新代码。\n\
  \n此外，每个`case`语句下的代码也相对类似。在这个特定例子中，你必须创建一个新的控制器实例，或使用一个指向现有控制器的指针，设置一些属性来指示需要编辑哪些值，然后将控制器推入导航栈。如果你在这些`switch`语句的任何地方发现逻辑错误，很可能会需要在多个地方（甚至可能几十处）修改那个逻辑。\n\
  \n### 使用属性列表控制表格结构\n\n如你所见，最显而易见的解决方案并不总是最好的。你不想让非常相似的代码块分散在控制器类的各个角落，也不想维护复杂决策树的多个副本。有一种更好的方法可以实现这一点。\n\
  \n你可以使用属性列表来镜像表格的结构。当用户在应用中向下导航时，你可以利用存储在属性列表中的数据来构建相应的表格。属性列表是一种简单但强大的信息存储方式。\n\
  \n*Beginning iOS 6 Development* 的第 10 章讨论了属性列表。我们在这里快速回顾一下。\n\n#### 属性列表详解\n\n属性列表是一种表示、存储和检索数据的简单方式。Mac\
  \ OS X 和 iOS 都广泛使用属性列表。在属性列表中，可以使用两种数据类型：基本类型和集合类型。可用的基本类型包括字符串、数字、二进制数据、日期和布尔值。可用的集合类型包括数组和字典。集合类型可以包含基本类型，也可以包含其他集合。属性列表可以以两种文件格式存储：XML\
  \ 和二进制数据。Xcode 提供了一个属性列表编辑器，方便你管理属性列表。稍后我们将讨论这一点。\n\n属性列表以一个 *根节点* 开始。从技术上讲，根节点可以是任何类型（基本类型或集合类型）。然而，基本类型的属性列表用途有限，因为它只是单个值的“列表”。更常见的是使用集合类型的根节点：数组或字典。当你使用\
  \ Xcode 属性列表编辑器创建属性列表时，根节点将是一个字典。\n\n**注意** 要了解更多关于属性列表的详细信息，请阅读 Apple 的文档：[`developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/PropertyLists/Introduction/Introduction.html)\n\
  \n#### 使用属性列表建模表格结构\n\n那么，如何使用属性列表来描述你的表格呢？请参考图 4-2。查看表格，你可以看到两个分区。第一个分区没有标题，但第二个分区有一个“General”标题。每个分区有一定数量的行（分别为一行和三行），每行代表托管对象的一个特定属性。此外，每行还有一个标签，告诉你正在显示什么值。\n\
  \n首先，将表格表示为一个数组，数组中的每一项代表表格的一个分区。每个分区又由一个字典表示。在分区字典中，有一个`header`键，用于存储标题的字符串值。请注意，表格的第一个分区没有标题；你可以使用一个空字符串来表示。\n\
  \n**注意** 回想一下，属性列表中只有五种基本数据类型：字符串、数字、二进制数据、日期和布尔值。这无法表示`nil`值。因此，你必须依赖空字符串来表示`nil`。\n\
  \n分区字典的第二个键是`rows`。这个键的值将是另一个数组，`rows`数组中的每一项代表渲染该行所需的数据。为了表示一行，你将使用另一个字典。这个行字典有一个`label`键，引用一个用作行标签的字符串，以及一个`attribute`键，这是一个字符串，表示要在该行渲染的托管对象属性。\n\
  \n感到困惑吗？别担心，用描述性语言来建模确实很难。图 4-12 试图以图形方式解释它。\n\n![9781430238072_Fig04-12.jpg](img/9781430238072_Fig04-12.jpg)\n\
  \n图 4-12. 属性列表的图形化表示\n\n这应该就是你开始表示表格结构所需的所有数据结构。幸运的是，如果你发现每行还需要额外信息，你随时可以在后续添加更多数据，而不会影响现有的设计。\n\
  \n现在让我们开始构建你的详细视图。\n\n#### 通过属性列表定义表格视图\n\n在导航窗格中，选择 Supporting Files 组，使其高亮显示。然后，创建一个新文件。当新文件模板出现后，在\
  \ iOS 标题下选择 Resource。选择 Property List 模板（图 4-13），然后点击 Next。将文件命名为 `HeroDetailConfiguration.plist`，然后点击\
  \ Create。一个名为 `HeroDetailConfiguration.plist` 的新文件应该会出现在 Supporting Files 组中。该文件应被选中，并且编辑器应切换到属性列表编辑器模式（图\
  \ 4-14）。\n\n![9781430238072_Fig04-13.jpg](img/9781430238072_Fig04-13.jpg)\n\n图 4-13.\
  \ 资源文件模板\n\n![9781430238072_Fig04-14.jpg](img/9781430238072_Fig04-14.jpg)\n\n图 4-14.\
  \ Xcode 属性列表编辑器模式\n\n\n\n之前我们提到，属性列表的根节点是一个字典。这意味着每个节点都将是一个键/值对。你可以将键视为字符串，值则可以是任何一种基本数据类型（`string`、`number`、`binary\
  \ data`、`date` 或 `Boolean`）或集合类型（`array` 或 `dictionary`）。\n\n接下来，你将按照我们之前讨论的，从创建\
  \ `sections` 数组开始。为此，你需要在属性列表中添加一个新条目。有两种方法可以实现。这两种方法都需要你先选中 Key 列中名为 `Root` 的那一行。第一种方法是，在属性列表编辑器的空白区域按住\
  \ Control 键并点击。在弹出的菜单中选择“添加行”。或者，你也可以使用常规菜单“编辑器” ![image](img/arrow.jpg) “添加条目”选项。无论哪种方式，属性列表编辑器中都会出现一个新行（图\
  \ 4-15）。该条目的键应为 `New item`，并且会被选中并高亮显示。输入 **sections** 并按下 Return 键来更改键名。\n\n![9781430238072_Fig04-15.jpg](img/9781430238072_Fig04-15.jpg)\n\
  \n图 4-15.  向属性列表添加条目\n\n接下来，点击“类型”列中 `string` 旁边的箭头，以显示所有可能的数据类型。选择 `array`。“值”列应变为显示\
  \ `(0 items)`。向 `sections` 数组添加条目有点棘手，所以请务必仔细遵循以下步骤。\n\n当您将类型从 `string` 更改为 `array`\
  \ 时，`sections` 键的左侧会添加一个展开三角形（图 4-16）。点击这个三角形使其指向下方（图 4-17）。现在点击 `sections` 右侧的\
  \ `+` 按钮。这将插入一个新行。此外，`sections` 的“值”列将变为显示 `(1 item)`。新行的键会是 `Item 0`；类型是 `string`；“值”列将被选中。不要输入任何内容；选中\
  \ `sections` 行使其高亮，然后再次点击 `sections` 旁边的 `+` 按钮。这将插入另一行，键为 `Item 1`，类型为 `string`，没有值。值单元格应被选中并显示光标。将\
  \ `Item 0` 和 `Item 1` 的类型从 `string` 更改为 `dictionary`（图 4-18）。\n\n![9781430238072_Fig04-16.jpg](img/9781430238072_Fig04-16.jpg)\n\
  \n图 4-16.  将类型从 `string` 更改为 `array`\n\n![9781430238072_Fig04-17.jpg](img/9781430238072_Fig04-17.jpg)\n\
  \n图 4-17.  点击展开三角形以展开数组\n\n![9781430238072_Fig04-18.jpg](img/9781430238072_Fig04-18.jpg)\n\
  \n图 4-18.  添加两个字典条目\n\n还记得你之前要创建一个数组，其中每个条目代表你的表视图的一个分区吗？你已经创建了这两个条目。`Item 0` 是\
  \ `HeroDetailController` 表视图的第一个分区；`Item 1` 是第二个。\n\n现在你在每个分区下创建 `rows` 数组，以保存每个分区的行信息。`Item0`\
  \ 旁边应该有一个展开三角形。打开它，然后点击 `Item0` 旁边的 `+`。这将在 `Item0` 下创建一个新行，其键为 `New Item`，类型为 `string`。将键更改为\
  \ `rows`，并将类型更改为 `array`。打开 `rows` 旁边的展开三角形，然后点击 `+` 按钮。这将创建另一个 `Item0`，这次是在 `rows`\
  \ 下。将类型从 `string` 更改为 `dictionary`。重复此过程，在 `Item1` 标题下添加一个 `rows` 条目。这次，在这个第二个 `rows`\
  \ 条目下创建三个条目。你的属性列表编辑器应如图 4-19 所示。\n\n![9781430238072_Fig04-19.jpg](img/9781430238072_Fig04-19.jpg)\n\
  \n图 4-19.  `HeroDetailConfiguration.plist`\n\n对于每个 `rows` 数组中的每个条目，你需要再添加两个子条目。它们的类型应为\
  \ `string`，它们的键应分别为 `key` 和 `label`。对于分区 ![image](img/arrow.jpg) `Item 0` ![image](img/arrow.jpg)\
  \ `rows`，`key` 的值应为 `name`，`label` 的值应设置为 `Name`。对于分区 ![image](img/arrow.jpg) `Item\
  \ 1` ![image](img/arrow.jpg) `rows`，`key` 和 `label` 的值应分别为：`secretIdentity` 和 `Identity`；`birthdate`\
  \ 和 `Birthdate`；`sex` 和 `Sex`。完成后，属性列表编辑器窗格应如图 4-20 所示。\n\n![9781430238072_Fig04-20.jpg](img/9781430238072_Fig04-20.jpg)\n\
  \n图 4-20.  完成的 `HeroDetailConfiguration.plist`\n\n现在，你将使用这个属性列表来设置 `HeroDetailController`\
  \ 的表视图。\n\n### 解析属性列表\n\n你需要添加一个属性来存储刚刚创建的属性列表中的信息。由于此属性仅需在 `HeroDetailController`\
  \ 内部使用，你将通过 `HeroDetailController.m` 中的类别将其设为私有。\n\n```\n@interface HeroDetailController\
  \ ()\n@property (strong, nonatomic) NSArray *sections;\n@end\n```\n\n接下来，你需要加载属性列表并读取\
  \ `sections` 键。在 `viewDidLoad` 方法结束前，添加以下代码：\n\n```\nNSURL *plistURL = [[NSBundle\
  \ mainBundle] URLForResource:@\"HeroDetailConfiguration\"\n                                          \
  \ withExtension:@\"plist\"];\nNSDictionary *plist = [NSDictionary dictionaryWithContentsOfURL:plistURL];\n\
  self.sections = [plist valueForKey:@\"sections\"];\n```\n\n你声明了一个类型为 `NSArray` 的属性\
  \ `sections`，用于保存 `HeroDetailConfiguration.plist` 属性列表中 `sections` 数组的内容。你使用 `NSDictionary`\
  \ 的类方法 `dictionaryWithContentsOfURL:` 读取属性列表的内容。由于你知道这个字典只有一个键/值对，键为 `sections`，所以你将该值读入\
  \ `sections` 属性。然后你使用该属性来布局 `HeroDetailController` 的表视图。\n\n现在你已经拥有了填充 `HeroDetailController`\
  \ 表视图单元格所需的元数据，但还没有数据。数据应通过以下两种方式之一来自 `HeroListController`：当用户点击某个单元格时，以及当用户点击添加（`+`）按钮时。\n\
  \n### 推送详细信息\n\n在你能从 `HeroListController` 发送数据之前，你需要在 `HeroDetailController` 中有一个接收者。在\
  \ `HeroDetailController.h` 的 `HeroDetailController` 接口声明中添加以下属性：\n\n```\n@property\
  \ (strong, nonatomic) NSManagedObject *hero;\n```\n\n现在编辑 `HeroListController.m`。找到\
  \ `addHero:` 方法。将\n\n```\n[NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name]\n                               inManagedObjectContext:managedObjectContext];\n\
  ```\n\n这一行改为\n\n```\nNSManagedObject *newHero = [NSEntityDescription insertNewObjectForEntityForName:[entity\
  \ name]\n                                                 inManagedObjectContext:managedObjectContext];\n\
  ```\n\n然后在末尾添加以下代码：\n\n```\n[self performSegueWithIdentifier:@\"HeroDetailSegue\"\
  \ sender:newHero];\n```\n\n首先，你将新的 `Hero` 实例赋值给变量 `newHero`。然后你告诉 `HeroListController`\
  \ 执行名为 `HeroDetailSegue` 的 Segue，并将 `newHero` 作为发送者传递。这个 Segue 名称 `HeroDetailSegue`\
  \ 是从哪里来的？来自你。\n\n还记得你之前为用户点击 `HeroListController` 中的某个单元格而创建的 Segue 吗？嗯，现在你将移除它。为什么？因为它无法提供从单元格和添加（`+`）按钮进行转换所需的灵活性。你需要创建一个手动\
  \ Segue，并从代码中调用它。\n\n\n\n### 排版后的文本\n\n选择`SuperDB.storyboard`，找到`HeroListController`和`HeroDetailController`之间的转场，删除它。从`HeroListController`（标签中的图标）按住\
  \ Control 键拖拽到`HeroDetailController`（视图中的某个位置）。此时会弹出一个标题为`Manual Segue`的弹出窗口；选择`push`菜单项。两个视图控制器之间会出现一个新的转场，选中它。在属性检查器中，将其标识符设为`HeroDetailSegue`（Figure\
  \ 4-21）。\n\n![9781430238072_Fig04-21.jpg](img/9781430238072_Fig04-21.jpg)\n\nFigure\
  \ 4-21. 设置转场标识符\n\n现在需要重新将`HeroListController`的单元格连接到`HeroDetailSegue`。编辑`HeroListController.m`，找到`tableView:didSelectRowAtIndexPath:`方法，将方法体替换为：\n\
  \n```\nNSManagedObject *selectedHero = [self.fetchedResultsController objectAtIndexPath:indexPath];\n\
  [self performSegueWithIdentifier:@\"HeroDetailSegue\" sender:selectedHero];\n```\n\
  \n本质上你做的操作与`addHero:`中相同，区别在于这里的`Hero`对象来自`fetched results controller`而不是新建的。目前看来一切正常，但你仍然没有向`HeroDetailController`发送数据。你需要在`UIViewController`的`prepareForSegue:sender:`方法中处理这个问题。将该方法添加到`HeroListController`中（可以放在任何位置，但这里放在`setEditing:animated:`方法之后）：\n\
  \n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\n{\n\
  \    if ([segue.identifier isEqualToString:@\"HeroDetailSegue\"])\n    {\n     \
  \   if ([sender isKindOfClass:[NSManagedObject class]]) {\n            HeroDetailController\
  \ *detailController = segue.destinationViewController;\n            detailController.hero\
  \ = sender;\n        }\n        else {\n            UIAlertView *alert =\n     \
  \             [[UIAlertView alloc] initWithTitle:NSLocalizedString(@\"Hero Detail\
  \ Error\",\n                                                                   \
  \    @\"Hero Detail Error\")\n                                         message:NSLocalizedString(@\"\
  Error trying to show Hero detail\",\n                                          \
  \                         @\"Error trying to show Hero detail\")\n             \
  \                           delegate:self\n                               cancelButtonTitle:NSLocalizedString(@\"\
  Aw, Nuts\", @\"Aw, Nuts\")\n                               otherButtonTitles:nil];\n\
  \            [alert show];\n        }\n    }\n}\n```\n\n注意，`prepareForSegue:sender:`\
  \ 内部是由`performSegueWithName:sender:`调用的。这是苹果提供的一个钩子，让你可以在显示`HeroDetailController`之前正确设置内容。\n\
  \n顺便提一下，Xcode 应该已经提示了`HeroDetailController`和`detailController.hero`的问题。在`HeroListViewController.m`的顶部添加以下`#import`：\n\
  \n```\n#import \"HeroDetailController.h\"\n```\n\n### 显示详情\n\n你正在将`Hero`对象从`HeroListController`向下传递到`HeroDetailController`。现在准备显示详情。编辑`HeroDetailController.m`，找到`tableView:cellForRowAtIndexPath:`。记得你之前注释掉了它，所以它不会出现在跳转栏的函数菜单中。取消注释并替换方法体为：\n\
  \n```\nstatic NSString *CellIdentifier = @\"HeroDetailCell\";\nUITableViewCell *cell\
  \ = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\nif (cell == nil)\n\
  \    cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleValue2\n\
  \                                   reuseIdentifier:CellIdentifier];\n// Configure\
  \ the cell...\nNSUInteger sectionIndex = [indexPath section];\nNSUInteger rowIndex\
  \ = [indexPath row];\nNSDictionary *section = [self.sections objectAtIndex:sectionIndex];\n\
  NSArray *rows = [section objectForKey:@\"rows\"];\nNSDictionary *row = [rows objectAtIndex:rowIndex];\n\
  cell.textLabel.text = [row objectForKey:@\"label\"];\ncell.detailTextLabel.text\
  \ = [self.hero valueForKey:[row objectForKey:@\"key\"]];\nreturn cell;\n```\n\n\
  构建并运行应用。你会看到英雄列表，点击一个英雄查看详情。\n\n没有生效，是吗？为什么？问题出在`birthdate`属性上。回想一下，`birthdate`是一个`NSDate`对象，而`cell.textLabel.text`需要的是字符串。稍后你会妥善处理这个问题，但现在先将赋值语句改为：\n\
  \n```\ncell.detailTextLabel.text = [[self.hero valueForKey:[row objectForKey:@\"\
  key\"]] description];\n```\n\n再次尝试运行。查看一个已有英雄并尝试添加一个新英雄。添加英雄后，详情视图应该看起来像 Figure\
  \ 4-22。\n\n![9781430238072_Fig04-22.jpg](img/9781430238072_Fig04-22.jpg)\n\nFigure\
  \ 4-22. 新英雄的详情视图\n\n### 编辑详情\n\n回顾 Figure 4-2 并与 Figure 4-22 进行对比。注意 Figure 4-2\
  \ 中的左侧图像在导航栏右侧有一个\"Edit\"按钮。并且 Figure 4-2 指定了详情视图的\"Edit\"模式，如右侧图像所示。现在我们来添加\"Edit\"\
  按钮并在`HeroDetailController`中实现编辑模式。\n\n#### 详情视图中的编辑模式\n\n比较 Figure 4-2 中的两张图片。它们有何不同？首先，左侧图像中的\"\
  Edit\"按钮在右侧图像中已被替换为\"Save\"按钮。此外，\"Save\"按钮处于高亮状态。\"Back\"按钮被替换为\"Cancel\"按钮。右侧图像中的单元格看起来有缩进。虽然看起来改动很多，但实际上实现起来并不费力。\n\
  \n首先，在导航栏中添加\"Edit\"按钮。选择`HeroDetailController.m`并找到`viewDidLoad`方法。取消注释以下代码行：\n\
  \n```\nself.navigationItem.rightBarButtonItem = self.editButtonItem;\n```\n\n运行应用并进入详情视图。导航栏右侧出现了\"\
  Edit\"按钮。如果点击它，视图应该变成 Figure 4-23 所示的样子。\n\n![9781430238072_Fig04-23.jpg](img/9781430238072_Fig04-23.jpg)\n\
  \nFigure 4-23. 处于编辑模式的详情视图\n\n注意\"Edit\"按钮已自动更改为\"Done\"按钮并处于高亮状态。如果点击\"Done\"，它将恢复为\"\
  Edit\"按钮。这没问题，但你更希望\"Done\"按钮显示为\"Save\"。这需要额外一点工作。\n\n如你所见，`editButtonItem`方法返回一个`UIBarButton`实例，按下时会在\"\
  Edit\"和\"Done\"之间切换。同时它也会切换`HeroDetailController`（从`UITableViewController`继承该属性）中的`editing`属性，在`NO`和`YES`之间切换。该按钮还会调用`setEditing:animated:`回调。\n\
  \n你想要将\"Done\"替换为\"Save\"。为了实现这一点，你需要将\"Edit\"按钮替换为\"Save\"按钮。同时，添加一个专门处理保存的方法，稍后你会用到。首先，你需要添加一个`Save`按钮属性和一个回调方法。由于你只在`HeroDetailController`内部访问`Save`按钮，可以将其设为私有属性。同样，由于回调仅由`Save`按钮使用，也可以将其声明为私有的。编辑`HeroDetailController.m`并将其添加到类别中。\n\
  \n```\n@interface HeroDetailController ()\n@property (strong, nonatomic) NSArray\
  \ *sections;\n@property (strong, nonatomic) UIBarButtonItem *saveButton;\n- (void)save;\n\
  @end\n```\n\n现在需要创建一个`Save`按钮的实例并赋值给这个变量。在`HeroDetailController.m`的`viewDidLoad`方法中，在你刚刚取消注释的\"\
  Edit\"按钮代码之后添加以下内容。\n\n```\nself.saveButton = [[UIBarButtonItem alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemSave\n\
  \                                                                 target:self\n\
  \                                                                 action:@selector(save)];\n\
  ```\n\n\n现在，你需要在“编辑”和“保存”按钮之间进行切换。但应该在哪里调用这个方法呢？记住，当“编辑”按钮被按下时，它会调用 `setEditing:animated:`\
  \ 方法。请重写默认的 `setEditing:animated:` 方法，并在其中实现按钮的切换逻辑。\n\n```\n- (void)setEditing:(BOOL)editing\
  \ animated:(BOOL)animated\n{\n        [super setEditing:editing animated:animated];\n\
  \        self.navigationItem.rightBarButtonItem = (editing) ? self.saveButton :\
  \ self.editButtonItem;\n}\n```\n\n你还需要添加 `save` 方法（将其放在文件底部，`@end` 之前）。\n\n```\n\
  #pragma mark - (Private) Instance Methods\n- (void)save\n{\n        [self setEditing:NO\
  \ animated:YES];\n}\n```\n\n保存你的工作并运行应用程序。导航到详情视图，然后点击“编辑”按钮。随着你在编辑模式中切换，它应该会在“编辑”和“保存”之间切换。现在，我们来修改它，让“返回”按钮变成一个“取消”按钮。\n\
  \n这个过程与你为“编辑/保存”按钮所做的几乎相同：声明一个属性和回调方法，并在导航栏中切换按钮。不过，你还需要一个属性来存储“返回”按钮。将以下内容添加到 `HeroDetailController`\
  \ 类别中：\n\n```\n@property (strong, nonatomic) UIBarButtonItem *backButton;\n@property\
  \ (strong, nonatomic) UIBarButtonItem *cancelButton;\n- (void)cancel;\n```\n\n将\
  \ `backButton` 分配给左侧导航栏按钮，并在 `viewDidLoad` 中创建 `Cancel` 按钮的实例。\n\n```\nself.backButton\
  \ = self.navigationItem.leftBarButtonItem;\nself.cancelButton = [[UIBarButtonItem\
  \ alloc] initWithBarButtonSystemItem:UIBarButtonSystemItemCancel\n             \
