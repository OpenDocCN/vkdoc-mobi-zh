              _trusted = NO;\n    }\n    return _trusted;\n}\n```\n\n你检查 `_trust`\
  \ 实例变量是否为 `NULL`。如果是，那么你需要检查数字身份是否可信。你访问 `trust` 属性并对其进行评估。如果信任结果代码不是成功的，那么数字身份不可信。接下来的三个结果代码\
