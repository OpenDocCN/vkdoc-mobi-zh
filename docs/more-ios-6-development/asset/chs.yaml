  \ = (editing) ? self.cancelButton : self.backButton;\n```\n\n最后，添加 `cancel` 回调方法。目前，它与\
  \ `save` 方法相同，但很快你会对其进行修改。\n\n```\n- (void)cancel\n{\n    [self setEditing:NO animated:YES];\n\
  }\n```\n\n再次运行应用程序。当你在详情视图中点击“编辑”按钮时，“返回”按钮应该会切换为“取消”。如果你按下“取消”按钮，应该会退出编辑模式。\n\n\
  现在，你想要消除编辑模式下每个单元格右侧出现的红色按钮。当你点击这些按钮时，它们会旋转，并且会在相应的单元格中出现一个“删除”按钮。这对于详情视图来说并不真正相关，你无法删除一个属性（但你确实可以清除它，或者将其值设置为\
  \ `nil`）。所以你希望这个按钮根本不出现。在 `HeroDetailController.m` 中添加这个方法（放在其他表格视图委托方法附近）：\n\n\
  ```\n- (UITableViewCellEditingStyle)tableView:(UITableView *)tableView\n       \
  \     editingStyleForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n    return UITableViewCellEditingStyleNone;\n\
  }\n```\n\n运行应用程序，可以看到红色按钮消失了。你可以在详情视图中进出编辑模式，但仍旧无法编辑任何内容。要实现此功能，你还有不少工作要做。\n\n###\
  \ 创建自定义 `UITableViewCell` 子类\n\n让我们看看“通讯录”应用程序。当你编辑某个联系人的属性时，会出现一个带有键盘的辅助视图（图 4-24），支持内联编辑。你将在你的\
  \ `SuperDB` 应用程序中模拟这个功能。这需要你开发一个自定义的 `UITableViewCell` 子类。\n\n![9781430238072_Fig04-24.jpg](img/9781430238072_Fig04-24.jpg)\n\
  \n图 4-24. 在“通讯录”应用程序中进行编辑\n\n让我们来看一下当前表格视图单元格的布局。目前，你设置了单元格的两个部分：`textLabel` 和 `detailTextLabel`（图\
  \ 4-25）。这两个部分都是静态文本；你可以通过编程方式赋值，但无法通过用户界面与它们进行交互。iOS SDK 没有提供一个类，让你可以静态地赋值 `textLabel`，同时编辑\
  \ `detailTextLabel` 部分。这就是你需要构建的内容。\n\n![9781430238072_Fig04-25.jpg](img/9781430238072_Fig04-25.jpg)\n\
  \n图 4-25. 当前表格视图单元格的分解\n\n关键组件是，用 `UITextField` 替换 `detailTextLabel` 属性。这将使你能够在表格视图单元格中进行编辑。由于你替换了表格视图单元格的一部分，你也必须替换\
  \ `textLabel`。因为该文本是静态的，你将使用 `UILabel`。原则上，你的自定义表格视图单元格应该看起来像图 4-26。\n\n![9781430238072_Fig04-26.jpg](img/9781430238072_Fig04-26.jpg)\n\
  \n图 4-26. 自定义表格视图单元格的分解\n\n让我们开始吧。\n\n在导航窗格中单击 `SuperDB` 组，创建一个新文件。在 iOS/Cocoa Touch\
  \ 模板下选择 Objective-C 类。使该类成为 `UITableViewCell` 的子类。将文件命名为 `SuperDBEditCell.m`。点击“Next”，然后点击“Create”。\n\
  \n你需要一个 `UILabel` 和一个 `UITextField`。将这些属性添加到 `SuperDBEditCell.h` 中。\n\n```\n@interface\
  \ SuperDBEditCell : UITableViewCell\n\n@property (strong, nonatomic) UILabel *label;\n\
  @property (strong, nonatomic) UITextField *textField;\n@end\n```\n\n现在，添加适当的初始化代码。编辑\
  \ `SuperDBEditCell.m` 并找到 `initWithStyle:reuseIdentifier:`。在“Initialization Code”注释之后，立即添加：\n\
  \n```\nself.selectionStyle = UITableViewCellSelectionStyleNone;\n\nself.label =\
  \ [[UILabel alloc] initWithFrame:CGRectMake(12.0, 15.0, 67.0, 15.0)];\nself.label.backgroundColor\
  \ = [UIColor clearColor];\nself.label.font = [UIFont boldSystemFontOfSize:[UIFont\
  \ smallSystemFontSize]];\nself.label.textAlignment = NSTextAlignmentRight;\nself.label.textColor\
  \ = kLabelTextColor;\nself.label.text = @\"label\";\n[self.contentView addSubview:self.label];\n\
  \nself.textField = [[UITextField alloc] initWithFrame:CGRectMake(93.0, 13.0, 170.0,\
  \ 19.0)];\nself.textField.backgroundColor = [UIColor clearColor];\nself.textField.clearButtonMode\
  \ = UITextFieldViewModeWhileEditing;\nself.textField.enabled = NO;\nself.textField.font\
  \ = [UIFont boldSystemFontOfSize:[UIFont systemFontSize]];\nself.textField.text\
  \ = @\"Title\";\n[self.contentView addSubview:self.textField];\n```\n\n请注意，`kLabelTextColor`\
  \ 是一个你计算出来的常量，这样标签将拥有与之前相同的颜色。在 `@implementation` 指令之前添加这个 `#define`：\n\n```\n#define\
  \ kLabelTextColor [UIColor colorWithRed:0.321569f green:0.4f blue:0.568627f alpha:1.0f]\n\
  ```\n\n现在，你需要调整 `HeroDetailController` 以使用 `SuperDBEditCell`。但在此之前，你需要修复 `SuperDB.storyboard`\
  \ 中的配置。\n\n打开 `SuperDB.storyboard`，选择 `HeroDetailController` 中的第一个表格视图单元格。打开 Identity\
  \ Inspector，并将 Class 字段更改为 `SuperDBEditCell`。切换到 Attributes Inspector，并将 Style 更改为\
  \ Custom。对其他三个表格视图单元格重复此操作。\n\n打开 `HeroDetailController.m`。添加这个 `#import` 指令作为第二条\
  \ `#import` 指令：\n\n```\n#import \"SuperDBEditCell.h\"\n```\n\n然后，找到 `tableView:cellForRowAtIndexPath:`\
  \ 并将其编辑为：\n\n\n```objective-c\nstatic NSString *CellIdentifier = @\"SuperDBEditCell\"\
  ;\nSuperDBEditCell *cell = [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  if (cell == nil)\n    cell = [[SuperDBEditCell alloc] initWithStyle:UITableViewCellStyleValue2\n\
  \                                   reuseIdentifier:CellIdentifier];\n// 配置单元格...\n\
  NSUInteger sectionIndex = [indexPath section];\nNSUInteger rowIndex = [indexPath\
  \ row];\nNSDictionary *section = [self.sections objectAtIndex:sectionIndex];\nNSArray\
  \ *rows = [section objectForKey:@\"rows\"];\nNSDictionary *row = [rows objectAtIndex:rowIndex];\n\
  cell.label.text = [row objectForKey:@\"label\"];\ncell.textField.text = [[self.hero\
  \ valueForKey:[row objectForKey:@\"key\"]] description];\nreturn cell;\n```\n\n\
  保存并运行应用。它的行为应该和你创建自定义表格视图单元格之前完全一样。现在你可以开启编辑功能。\n\n在`SuperDBEditCell.m`中重写`setEditing:`方法。\n\
  \n```objective-c\n- (void)setEditing:(BOOL)editing animated:(BOOL)animated\n{\n\
  \   [super setEditing:editing animated:animated];\n    self.textField.enabled =\
  \ editing;\n}\n```\n\n再次保存并运行应用。导航到详情视图，进入编辑模式。点击“Identity”行的“Unknown Hero”。你应该看到键盘输入视图出现在屏幕底部，并且在“Unknown\
  \ Hero”的末尾出现光标。点击另一行，光标应出现在该行。\n\n我们来编辑“Identity”行。点击“Unknown Hero”激活键盘输入视图。点击单元格右端的\
  \ **x** 按钮，这应该会擦除“Unknown Hero”。然后输入 **Super Cat**，并点击“Save”。你应该退出编辑模式，并且你的英雄的新身份应该显示为“Super\
  \ Cat”。点击“Back”返回列表视图。\n\n等等，发生了什么？你将英雄重命名为“Super Cat”，但列表视图仍然显示“Unknown Hero”。如果你点击“Unknown\
  \ Hero”行，详情视图也仍然显示“Unknown Hero”。为什么你的更改没有被保存？\n\n还记得你之前为详情视图添加了“Save”按钮吗？你还添加了一个回调`save`，在按下“Save”按钮时被调用。让我们再看看这个回调。\n\
  \n```objective-c\n- (void)save\n{\n    [self setEditing:NO animated:YES];\n}\n```\n\
  \n注意这个方法**并没有保存任何东西**！它所做的只是关闭编辑模式。让我们弄清楚如何真正保存你的更改。\n\n### 保存你的更改\n\n让我们回顾一下你的详情视图。详情视图是一个由`HeroDetailController`管理的表格视图。`HeroDetailController`还持有一个对`Hero`对象的引用，这是一个`NSManagedObject`。表格视图中的每一行都是你的自定义表格视图单元格类`SuperDBEditCell`。根据你需要的行，你会分配一个不同的英雄属性来显示。\n\
  \n现在，为了保存你做出的更改，“Save”按钮会调用`save`方法。这就是你需要将更改保存到`NSManagedObject`的地方。你将修改`SuperDBEditCell`类，使其知道它正在显示哪个属性。此外，你将定义一个属性`value`，用来告诉你在单元格中的新数据。\n\
  \n首先，将你的属性添加到`SuperDBEditCell.h`中。\n\n```objective-c\n@property (strong, nonatomic)\
  \ NSString *key;\n@property (strong, nonatomic) id value;\n```\n\n接下来，编辑`SuperDBEditCell.m`，为`value`属性定义属性覆盖方法。\n\
  \n```objective-c\n#pragma mark - 属性覆盖\n- (id)value\n{\n    return self.textField.text;\n\
  }\n- (void)setValue:(id)aValue\n{\n    self.textField.text = aValue;\n}\n```\n\n\
  最后，修改`HeroDetailController.m`，在`tableView:cellForRowAtIndexPath`方法中为每个单元格分配键名。\n\
  \n```objective-c\ncell.key = [row objectForKey:@\"key\"];\n```\n\n然后在`save`方法中遍历每个单元格，以更新英雄的属性。\n\
  \n```objective-c\nfor (SuperDBEditCell *cell in [self.tableView visibleCells])\n\
  \    [self.hero setValue:[cell value] forKey:[cell key]];\n\nNSError *error;\nif\
  \ (![self.hero.managedObjectContext save:&error])\n    NSLog(@\"保存时出错: %@\", [error\
  \ localizedDescription]);\n\n[self.tableView reloadData];\n```\n\n保存并运行应用程序。导航到详情视图，进入编辑模式。将“Identity”改为“Super\
  \ Cat”并点击“Save”。点击“Back”按钮返回列表视图。你应该看到英雄的身份现在显示为“Super Cat”。\n\n现在，你将开始为“Birthdate”和“Sex”属性处理专门的输入视图。\n\
  \n### 专用输入视图\n\n注意，当你在详情视图中点击“Birthdate”或“Sex”行时，会显示键盘输入视图。你可以允许用户通过键盘输入出生日期或性别并验证输入，但有一种更好的方法。你可以创建`SuperDBEditCell`的子类来处理这些特殊情况。\n\
  \n#### DatePicker SuperDBEditCell 子类\n\n在导航器面板中单击一下`SuperDB`组，然后创建一个新文件。选择“Objective-C”类，并将其设为`SuperDBEditCell`的子类。将类命名为**SuperDBDateCell**并创建文件。编辑`SuperDBDateCell.m`，内容如下：\n\
  \n```objective-c\n#import \"SuperDBDateCell.h\"\n\nstatic NSDateFormatter *__dateFormatter\
  \ = nil;\n\n@interface SuperDBDateCell ()\n@property (strong, nonatomic) UIDatePicker\
  \ *datePicker;\n- (IBAction)datePickerChanged:(id)sender;\n@end\n\n@implementation\
  \ SuperDBDateCell\n\n+ (void)initialize\n{\n    __dateFormatter = [[NSDateFormatter\
  \ alloc] init];\n    [__dateFormatter setDateStyle:NSDateFormatterMediumStyle];\n\
  }\n- (id)initWithStyle:(UITableViewCellStyle)style reuseIdentifier:(NSString *)reuseIdentifier\n\
  {\n    self = [super initWithStyle:style reuseIdentifier:reuseIdentifier];\n   \
  \ if (self) {\n        // 初始化代码\n        self.textField.clearButtonMode = UITextFieldViewModeNever;\n\
  \        self.datePicker = [[UIDatePicker alloc] initWithFrame:CGRectZero];\n  \
  \      self.datePicker.datePickerMode = UIDatePickerModeDate;\n        [self.datePicker\
  \ addTarget:self\n                             action:@selector(datePickerChanged:)\n\
  \                   forControlEvents:UIControlEventValueChanged];\n        self.textField.inputView\
  \ = _datePicker;\n    }\n    return self;\n}\n#pragma mark - SuperDBEditCell 覆盖\n\
  - (id)value\n{\n    if (self.textField.text == nil || [self.textField.text length]\
  \ == 0)\n        return nil;\n    return self.datePicker.date;\n}\n- (void)setValue:(id)value\n\
  {\n    if (value != nil && [value isKindOfClass:[NSDate class]]) {\n        [self.datePicker\
  \ setDate:value];\n        self.textField.text = [__dateFormatter stringFromDate:value];\n\
  \    }\n    else {\n        self.textField.text = nil;\n    }\n}\n#pragma mark -\
  \ (私有) 实例方法\n- (IBAction)datePickerChanged:(id)sender\n{\n    NSDate *date = [self.datePicker\
  \ date];\n    self.value = date;\n    self.textField.text = [__dateFormatter stringFromDate:date];\n\
  }\n\n@end\n```\n\n你在这里做了什么？你定义了一个`NSDateFormatter`类型的局部静态变量`__dateFormatter`。你这样做是因为创建`NSDateFormatter`是一个开销很大的操作，并且你不希望每次需要格式化`NSDate`对象时都创建一个新实例。你本可以将其设为`SuperDBDateCell`的一个私有属性并延迟创建它，但那意味着你会为每个`SuperDBDateCell`实例创建一个新的格式化器。通过将其设为局部静态变量，你只需要在`SuperDB`应用程序的生命周期内创建一个实例。\n\
  \n接下来，你声明了一个私有的`UIDatePicker`属性`datePicker`，以及一个用于`datePicker`的回调`datePickerChanged`。\n\
  \n在`SuperDBDateCell`的`@implementation`中，你定义了一个类方法`+initialize`。这是一个从`NSObject`继承的特殊类方法。`SuperDB`应用程序会在任何对`SuperDBDateCell`类或其实例的调用之前，**恰好调用一次**`SuperDBDateCell\
  \ + initialize`。这就是你初始化局部静态变量`__dateFormatter`以持有一个`NSDateFormatter`实例的地方。\n\n\n\
  你添加了一些自定义初始化代码到 `initWithStyle:reuseIdentifier:` 中。这是你实例化 `datePicker` 属性并将其赋值给\
  \ `textField` 的 `inputView` 属性的地方。通常 `inputView` 为 `nil`，这告诉 iOS 对 `textField` 使用键盘输入视图。通过为其分配一个替代视图，你告诉\
  \ iOS 在编辑 `textField` 时显示该替代视图。\n\n`SuperDBDateCell` 重写了 `value` 属性，以确保你显示和返回一个\
  \ `NSDate`，而不是 `NSString`。这里你使用 `__dateFormatter` 将日期转换为字符串，然后将其赋值给 `textField`\
  \ 的 `text` 属性。\n\n最后，你实现了当通过 UI 更改日期时 `datePicker` 的回调。每次你在 `datePicker` 中更改日期，都要更新\
  \ `textField` 以反映该更改。\n\n### 使用 DatePicker SuperDBEditCell 子类\n\n让我们回顾一下表格视图单元格是如何创建的。在\
  \ `HeroDetailController` 中，你在 `tableView:cellForRowAtIndexPath:` 方法中创建了单元格。当你第一次编写此方法时，你创建了一个\
  \ `UITableViewCell` 实例。后来，你将其替换为自定义子类 `SuperDBEditCell` 的实例。现在你为特定的 `IndexPath`（即显示出生日期属性的那个\
  \ `IndexPath`）创建了另一个子类。你如何告诉你的应用程序使用哪个自定义子类？没错，你将把那个信息添加到你的属性列表中：`HeroDetailController.plist`。\n\
  \n单击 `HeroDetailController.plist`。展开所有展开三角形，以便你可以看到所有元素。向下导航到 sections ![image](img/arrow.jpg)\
  \ Item 0 ![image](img/arrow.jpg) rows ![image](img/arrow.jpg) Item 0 ![image](img/arrow.jpg)\
  \ key。单击 key 行使其高亮显示。单击 key 旁边的 `+` 按钮。将此行从 `New Item` 重命名为 `class`。在 value 列中，键入\
  \ `SuperDBEditCell`。对 sections ![image](img/arrow.jpg) Item 1 下的所有 key 行重复此操作。它们都应该有值\
  \ `SuperDBEditCell`，除了 birthdate 键下方的 class 行。该行的值应为 `SuperDBDateCell`（图 4-27）。\n\
  \n![9781430238072_Fig04-27.jpg](img/9781430238072_Fig04-27.jpg)\n\n图 4-27.  添加表格视图单元格类键后的\
  \ `HeroDetailController.plist`\n\n你需要修改 `tableView:cellForRowAtIndexPath:` 以利用你刚刚放置在属性列表中的信息。打开\
  \ `HeroDetailController.m`，并将 `tableView:cellForRowAtIndexPath:` 编辑为如下所示：\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    NSUInteger sectionIndex = [indexPath section];\n    NSUInteger\
  \ rowIndex = [indexPath row];\n    NSDictionary *section = [self.sections objectAtIndex:sectionIndex];\n\
      NSArray *rows = [section objectForKey:@\"rows\"];\n    NSDictionary *row = [rows\
  \ objectAtIndex:rowIndex];\n    NSString *cellClassname = [row valueForKey:@\"class\"\
  ];\n    SuperDBEditCell *cell = [tableView dequeueReusableCellWithIdentifier:cellClassname];\n\
