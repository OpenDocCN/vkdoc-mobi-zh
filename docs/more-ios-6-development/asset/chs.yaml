  \n### 更新持久化存储\n\n在 SuperDB Xcode 项目窗口中，打开 `AppDelegate.m` 并找到 `persistentStoreCoordinator`\
  \ 方法。你需要重写该方法，以便在可能的情况下检查并使用 iCloud 持久化存储，否则回退到本地持久化存储。该方法的开头部分保持不变：检查是否已经创建了持久化存储协调器的实例；如果没有，则实例化一个。\n\
  \n```\n- (NSPersistentStoreCoordinator *)persistentStoreCoordinator\n{\n    if (_persistentStoreCoordinator\
  \ != nil) {\n        return _persistentStoreCoordinator;\n    }\n\n_persistentStoreCoordinator\
  \ = [[NSPersistentStoreCoordinator alloc]\n                                    \
  \    initWithManagedObjectModel:[self managedObjectModel]];\n```\n\n你将以下代码分派到后台队列，以避免阻塞主线程。下面的代码与前面“集成\
  \ iCloud 的 Core Data”部分提供的示例类似。如需详细解释，请参考该部分内容。\n\n```\n    __block NSPersistentStoreCoordinator\
  \ *psc = _persistentStoreCoordinator;\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n        NSPersistentStore *newStore = nil;\n        NSError *error = nil;\n\
  \nNSString *dataFile = @\"SuperDB.sqlite\";\n        NSString *dataDir = @\"Data.nosync\"\
  ;\n        NSString *logsDir = @\"Logs\";\n```\n\n\n`NSFileManager *fileManager\
  \ = [NSFileManager defaultManager];`\n`id ubiquityToken = [fileManager ubiquityIdentityToken];`\n\
  `NSURL *ubiquityURL = [fileManager URLForUbiquityContainerIdentifier:nil];`\n`if\
  \ (ubiquityToken && ubiquityURL) {`\n    `NSString *dataDirPath = [[ubiquityURL\
  \ path] stringByAppendingPathComponent:dataDir];`\n    `if([fileManager fileExistsAtPath:dataDirPath]\
  \ == NO) {`\n        `NSError *fileSystemError;`\n        `[fileManager createDirectoryAtPath:dataDirPath\
  \ withIntermediateDirectories:YES attributes:nil error:&fileSystemError];`\n   \
  \     `if(fileSystemError != nil) {`\n            `NSLog(@\"Error creating database\
  \ directory %@\", fileSystemError);`\n        `}`\n    `}`\n    `NSURL *logsURL\
  \ = [NSURL fileURLWithPath:[[ubiquityURL path] stringByAppendingPathComponent:logsDir]];`\n\
  \    `NSDictionary *options = @{ NSMigratePersistentStoresAutomaticallyOption :\
  \ @YES, NSInferMappingModelAutomaticallyOption : @YES, NSPersistentStoreUbiquitousContentNameKey\
  \ : [ubiquityURL lastPathComponent], NSPersistentStoreUbiquitousContentURLKey :\
  \ logsURL };`\n    `[psc lock];`\n    `NSURL *dataFileURL = [NSURL fileURLWithPath:[dataDirPath\
  \ stringByAppendingPathComponent:dataFile]];`\n    `newStore = [psc addPersistentStoreWithType:NSSQLiteStoreType\
  \ configuration:nil URL:[NSURL fileURLWithPath:dataFileURL] options:options error:&error];`\n\
  \    `[psc unlock];`\n`}`\n\n如果出于某种原因你无法访问 iCloud，可以回退到使用本地持久化存储协调器。\n\n```\nelse\
  \ {\n    NSURL *storeURL = [[self applicationDocumentsDirectory] URLByAppendingPathComponent:dataFile];\n\
  \    NSDictionary *options = @{ NSMigratePersistentStoresAutomaticallyOption : @YES,\
  \ NSInferMappingModelAutomaticallyOption : @YES };\n    [psc lock];\n    newStore\
  \ = [psc addPersistentStoreWithType:NSSQLiteStoreType configuration:nil URL:storeURL\
  \ options:options error:&error];\n    [psc unlock];\n}\n```\n\n你需要检查是否确实获得了新的持久化存储协调器。\n\
  \n```\nif (!newStore) {\n    /*\n     请用适当的错误处理替代此实现。\n     abort() 会导致应用程序生成崩溃日志并终止。\n\
  \     在正式发布的应用中不应使用此函数，\n     但在开发过程中可能有所帮助。\n    */\n    NSLog(@\"Unresolved error\
  \ %@, %@\", error, [error userInfo]);\n    abort();\n}\n```\n\n完成后，你需要在主线程上发送一个通知，表明已加载持久化存储协调器。如果必要，可使用此通知来更新\
  \ UI。\n\n```\ndispatch_async(dispatch_get_main_queue(), ^{\n    [[NSNotificationCenter\
  \ defaultCenter] postNotificationName:@\"DataChanged\" object:self userInfo:nil];\n\
  });\n```\n\n返回 `_persistentStoreCoordinator`。\n\n### 更新托管对象上下文\n\n你需要在 ubiquity\
  \ 容器中的数据发生更改时注册以接收通知。这需要在 `AppDelegate` 的 `managedObjectContext` 方法中实现。新增部分以粗体显示。\n\
  \n```\n- (NSManagedObjectContext *)managedObjectContext\n{\n    if (_managedObjectContext\
  \ != nil) {\n        return _managedObjectContext;\n    }\n\n    NSPersistentStoreCoordinator\
  \ *coordinator = [self persistentStoreCoordinator];\n    if (coordinator != nil)\
  \ {\n        _managedObjectContext = [[NSManagedObjectContext alloc] init];\n  \
  \      [_managedObjectContext setPersistentStoreCoordinator:coordinator];\n    \
  \    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(mergeChangesFromUbiquitousContent:)\
  \ name:NSPersistentStoreDidImportUbiquitousContentChangesNotification object:coordinator];\n\
  \    }\n    return _managedObjectContext;\n}\n```\n\n你已经告知通知中心调用 `AppDelegate` 的\
  \ `mergeChangesFromUbiquitousContent:` 方法，因此需要实现该方法。\n首先，在接口文件 `AppDelegate.h` 中，在\
  \ `@end` 声明之前添加方法声明。\n\n```\n- (void)mergeChangesFromUbiquitousContent:(NSNotification\
  \ *)notification;\n```\n\n然后将实现代码添加到 `AppDelegate.m` 的末尾，紧接在 `@end` 之前。\n\n```\n\
  #pragma mark - 处理从 iCloud 到 Ubiquitous 容器的更改\n\n- (void)mergeChangesFromUbiquitousContent:(NSNotification\
  \ *)notification\n{\n    NSManagedObjectContext* moc = [self managedObjectContext];\n\
  \    [moc performBlock:^{\n        [moc mergeChangesFromContextDidSaveNotification:notification];\n\
  \        NSNotification* refreshNotification = [NSNotification notificationWithName:@\"\
  DataChanged\" object:self userInfo:[notification userInfo]];\n        [[NSNotificationCenter\
  \ defaultCenter] postNotification:refreshNotification];\n    }];\n}\n```\n\n此方法首先将更改合并到你的托管对象上下文中。然后发送一个\
  \ `DataChanged` 通知。你在之前创建持久化存储协调器时已经使用过此通知。它的目的是在需要更新 UI 时通知你。现在让我们来实现这一步。\n\n###\
  \ 在 DataChanged 时更新 UI\n\n在 Xcode 编辑器中打开 `HeroListController.m`，找到 `viewDidLoad`\
  \ 方法。在该方法结束前，注册以接收 `DataChanged` 通知。\n\n```\n[[NSNotificationCenter defaultCenter]\
  \ addObserver:self selector:@selector(updateReceived:) name:@\"DataChanged\" object:nil];\n\
  ```\n\n与此同时，做个好习惯的 iOS 程序员，在 `didReceiveMemoryWarning` 方法中取消注册。\n\n```\n[[NSNotificationCenter\
  \ defaultCenter] removeObserver:self];\n```\n\n当收到 `DataChanged` 通知时，`updateReceived:`\
  \ 方法将被调用。因此你需要声明并实现它。\n首先，在 `HeroListController.h` 中，在 `@end` 之前添加方法声明。\n\n```\n\
  - (void)updateReceived:(NSNotification *)notification;\n```\n\n现在，将实现代码添加到 `HeroListController.m`\
  \ 中，同样在 `@end` 之前。\n\n```\n- (void)updateReceived:(NSNotification *)notification\n\
  {\n    NSError *error;\n    if (![self.fetchedResultsController performFetch:&error])\
  \ {\n        NSLog(@\"执行获取时出错: %@\", [error localizedDescription]);\n    } \n  \
  \  [self.heroTableView reloadData];\n}\n```\n\n本质上，它只是刷新了数据和表格视图。\n\n### 测试数据存储\n\
  \n\n### iCloud 开发要点\n\n你不能在模拟器上使用 `iCloud`，因此需要在真机上运行。构建并运行应用。由于你从一个新的持久化存储开始，此时应该没有任何条目。添加一个新英雄，编辑详细信息，然后保存。现在退出应用程序（或在\
  \ Xcode 中停止运行）。在你的设备上，长按 `SuperDB` 应用图标直到它开始抖动。删除该应用。你应该会收到一个警告对话框，提示本地数据将丢失，但 `iCloud`\
  \ 数据将被保留。点击 `Delete`。\n\n现在再次运行应用。等待片刻，英雄列表应该会更新，包含你之前添加的英雄。即使你删除了应用（及其本地数据），`iCloud`\
  \ 仍然能够同步并恢复持久化存储。\n\n### 脚踏实地\n\n在为 `iCloud` 开发应用时，有时你可能需要查看甚至删除 `iCloud` 中的数据。有几种方式可以查看和/或管理你的应用程序放入\
  \ `iCloud` 的数据。\n\n*   **通过 Mac**：打开系统偏好设置，选择 `iCloud`。点击右下角的 `Manage` 按钮。\n*  \
  \ **通过 iOS**：使用设置应用，导航至 `iCloud` ![image](img/arrow.jpg) `Storage & Backup` ![image](img/arrow.jpg)\
  \ `Manage Storage`。\n*   **通过 Web（仅查看）**：导航至 [`developer.icloud.com/`](http://developer.icloud.com/)\
  \ 并登录。点击 `Documents` 图标。\n\n这些仅为构建支持 `iCloud` 的 iOS 应用的基础知识。对于任何应用，都有许多事情需要考虑，但以下是一些关键点需要记住：\n\
  \n*   如果 `iCloud` 不可用，你的应用将如何表现？\n*   如果你允许“离线”使用，你的应用将如何与 `iCloud` 同步？\n*   你的应用将如何处理冲突？这将在很大程度上取决于你的数据模型。\n\
  *   尝试设计你的数据/文档模型，以最小化设备与 `iCloud` 之间的数据传输。\n\n希望你已经对在应用中启用 `iCloud` 有了良好的体验。让我们回到地球，开始构建一个游戏吧。\n\
  \n"
- "# 第 9 章：使用 Game Kit 进行蓝牙点对点连接\n\n`Game Kit` 无疑是 iOS SDK 中为游戏开发人员提供的最酷的框架之一。`Game\
  \ Kit` 类提供了三种不同的技术：`GameCenter`、点对点连接和游戏内语音。虽然本章将重点介绍点对点连接，但我们也会简要介绍 `Game Kit`\
  \ 的另外两个组件，以便你熟悉它们。\n\n### Game Center\n\n`Game Center` 是 Apple 提供的一个集中式社交网络游戏服务。`Game\
  \ Center` 提供的服务使你的游戏用户能够共享信息，并如果游戏支持多人模式，还能与其他玩家连接。`Game Center` 包含三个组件：\n\n*  \
  \ 内置于 iOS 中的`游戏中心`应用（图 9-1）。\n*   Apple 在“云端”管理的`Game Center`服务。\n*   `Game Kit`\
  \ 框架中提供的`Game Center` API。\n\n![9781430238072_Fig09-01.jpg](img/9781430238072_Fig09-01.jpg)\n\
  \n图 9-1.  iOS 设备上的 Game Center\n\n`Game Center` 提供以下基本服务：\n\n*   **认证：** 这只是在`Game\
  \ Center`服务上标识用户的一个账户。\n*   **排行榜：** 这是你的应用程序的“高分榜”。如果你决定实现排行榜，那么由你的应用决定什么构成“高分”。例如，它可以是一个简单的积分系统，也可以是游戏时间。你的应用还可以下载排行榜信息并本地存储。\n\
  *   **成就：** 另一种衡量游戏活动的方式。这些通常是玩家达到的特定里程碑（例如“第 2 关”），而不是在排行榜中衡量的分数。\n*   **多人游戏：**\
  \ 允许玩家寻找其他（同一游戏的）玩家进行对战。你可以使用`Game Center`连接游戏中的所有玩家，大家一起玩，或者提供一个玩家列表进行对战。这可能需要你实现自己的服务。\n\
  \n所有`Game Center`游戏都必须从认证玩家开始。所有其他功能都依赖于用户已通过`Game Center`服务认证。与`Game Center`的认证是系统级的，这意味着如果你在一个游戏中通过`Game\
  \ Center`认证，那么任何其他支持`Game Center`的游戏也会使用该认证。如果没有经过认证的玩家，`Game Center`功能将被禁用。你的游戏是否仍然可以运行，由你决定。\n\
  \n如果你在游戏中确实使用了其他`Game Center`功能，你需要至少有一个视图控制器。这个视图控制器被用作`Game Center`工作的“根”。例如，排行榜是一个`Game\
  \ Kit`视图控制器类，它为你的游戏提供了一个显示排行榜信息的标准方式。你的游戏需要提供一个视图控制器来模态显示排行榜。\n\n由于`Game Center`是一个基于网络的服务，你需要设置保护措施来处理网络中断。\n\
  \n**注意** 更多关于 `Game Center` 和 `Game Kit` 的详细信息，可以阅读 Kyle Richter (Apress, 2011)\
  \ 所著的 *Beginning iOS Game Center and Game Kit* ([www.apress.com/9781430235279](http://www.apress.com/9781430235279))\
  \ 以及 Apple 的 *Game Kit Programming Guide* ([`developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](https://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html))。\n\
  \n### 点对点连接\n\n`Game Kit` 使通过蓝牙或 `WiFi` 无线连接多个 iOS 设备变得简单。蓝牙是除第一代 iPhone 和 iPod\
  \ touch 之外的所有设备内置的无线网络选项。`Game Kit` 允许任何支持的设备与范围内任何其他支持的设备进行通信。对于蓝牙，这个范围大约为 30 英尺（约\
  \ 10 米）。尽管名称暗示不同，但 `Game Kit` 也适用于非游戏类应用。例如，你可以构建一个社交网络应用，允许人们通过蓝牙轻松传输联系信息。\n\n\
  **警告** 本章中的代码将无法在模拟器中运行，因为模拟器不支持蓝牙。在连接到电脑的设备上构建和调试应用的唯一方法是加入付费的 iPhone 开发者计划。如果你想充分体验本章的精华，你需要这样做。\n\
  \n此外，在撰写本文时，你无法在设备与模拟器之间进行 `Game Kit` 游戏。如果你只有一台设备，你将无法尝试本章中的游戏。\n\n点对点连接依赖于两个组件：\n\
  \n*   **会话** 允许运行同一应用的 iPhone OS 设备通过蓝牙轻松地来回发送信息，而无需编写任何网络代码。\n*   **对等选择器** 提供了一种无需编写任何网络或发现\
  \ (Bonjour) 代码即可轻松找到其他设备的方法。\n\n\n\n在底层，Game Kit 会话利用了 Bonjour，这是苹果公司用于零配置网络和设备发现的技术。因此，使用\
  \ Game Kit 的设备能够在网络上互相发现，而无需用户输入 IP 地址或域名。\n\n#### 游戏内语音\n\n游戏内语音允许你为游戏添加语音聊天功能，使玩家能够相互交流。这可以通过\
  \ Game Center 服务或点对点连接来实现。\n\n每个 Game Kit 客户端都会被分配一个唯一标识符。Game Kit 不提供生成此标识符的机制；你需要自行提供。一旦你拥有一个标识符，就需要一种方法来发现其他游戏实例，以发起语音聊天。这种发现可以通过多种方式处理。对于点对点连接，你可以使用会话来查找其他玩家。借助\
  \ Game Center，你可以使用 Game Center 的多玩家机制来寻找其他玩家。\n\n一旦找到其他玩家，游戏内语音可以轻松地在玩家之间启动和停止语音聊天。\n\
  \n#### 本章应用程序\n\n在本章中，你将通过编写一个简单的网络游戏来探索 Game Kit。你将编写一个双人版本的井字棋（图 9-2），它将使用 Game\
  \ Kit 让两台不同的 iPhone 或 iPod touch 上的玩家通过蓝牙进行对战。本章不实现通过互联网或局域网的在线游戏。\n\n![9781430238072_Fig09-02.jpg](img/9781430238072_Fig09-02.jpg)\n\
  \n图 9-2. 你将通过一个简单的井字棋游戏来学习 Game Kit 的基础知识\n\n当用户启动你的应用程序时，他们将看到一个空的井字棋盘和一个标有 **New\
  \ Game**（新游戏）的按钮。（为简单起见，你将不实现让两名玩家在同一设备上玩耍的单设备模式。）当用户按下“New Game”按钮时，应用程序将开始使用对等点选择器查找蓝牙对等点（图\
  \ 9-3）。\n\n![9781430238072_Fig09-03.jpg](img/9781430238072_Fig09-03.jpg)\n\n图 9-3.\
  \ 当用户按下“New Game”按钮时，将启动对等点选择器来查找其他运行井字棋游戏的设备\n\n如果范围内的另一台设备也运行了 TicTacToe 应用程序，并且用户也按下了“New\
  \ Game”按钮，那么两台设备将互相发现，并且对等点选择器会向用户显示一个对话框，让他们在可用的对等点中进行选择（图 9-4）。\n\n![9781430238072_Fig09-04.jpg](img/9781430238072_Fig09-04.jpg)\n\
  \n图 9-4. 当范围内有另一台设备启动游戏时，两台设备将出现在彼此的对等点选择器对话框中\n\n在一名玩家选择一个对等点后，iPhone 将尝试建立连接（图\
  \ 9-5）。一旦连接建立，系统会要求另一方接受或拒绝连接（图 9-6）。如果连接被接受，两个应用程序将协商决定谁先开始。每一方将随机选择一个数字，然后比较这些数字，数字大的先开始。一旦做出决定，游戏将开始（图\
  \ 9-7），直到有人获胜（图 9-8）。\n\n![9781430238072_Fig09-05.jpg](img/9781430238072_Fig09-05.jpg)\n\
  \n图 9-5. 建立连接\n\n![9781430238072_Fig09-06.jpg](img/9781430238072_Fig09-06.jpg)\n\
  \n图 9-6. 请求另一位玩家接受连接\n\n![9781430238072_Fig09-07.jpg](img/9781430238072_Fig09-07.jpg)\n\
  \n图 9-7. 轮到当前玩家时，可以点击任意可用空格。该空格会在两位用户的设备上都显示为 X 或 O\n\n![9781430238072_Fig09-08.jpg](img/9781430238072_Fig09-08.jpg)\n\
  \n图 9-8. 我们有一位赢家！\n\n如果连接因任何原因丢失，iPhone 将向用户报告连接丢失（图 9-9）。\n\n![9781430238072_Fig09-09.jpg](img/9781430238072_Fig09-09.jpg)\n\
  \n图 9-9. 连接丢失警报\n\n### 网络通信模型\n\n在我们研究 Game Kit 和对等点选择器如何工作之前，让我们先一般性地讨论一下网络程序中使用的通信模型，以便大家在术语上保持一致。\n\
  \n#### 客户端-服务器模型\n\n你可能对客户端-服务器模型很熟悉，因为它是万维网使用的模型。称为 *服务器* 的机器监听来自其他机器（称为 *客户端*）的连接。然后，服务器根据从客户端收到的请求采取行动。在网络中，客户端通常是\
  \ Web 浏览器，并且任意数量的客户端都可以连接到单个服务器。客户端从不直接相互通信，而是通过服务器进行所有通信。大多数大型多人在线角色扮演游戏（MMORPG），如《魔兽世界》，也使用这种模型。图\
  \ 9-10 展示了一个客户端-服务器场景。\n\n![9781430238072_Fig09-10.jpg](img/9781430238072_Fig09-10.jpg)\n\
  \n图 9-10. 客户端-服务器模型的特点是一台机器充当服务器，所有通信（甚至包括客户端之间的通信）都通过服务器进行\n\n在 iPhone 应用程序的上下文中，客户端-服务器设置是指一台手机充当服务器，并监听其他运行同一程序的\
  \ iPhone。其他手机随后可以连接到该服务器。如果你玩过一款游戏，其中一台机器“主持”游戏，其他机器加入游戏，那么该游戏几乎肯定使用了客户端-服务器模型。\n\
  \n客户端-服务器模型的一个缺点是所有事物都依赖于服务器，这意味着如果服务器发生任何问题，游戏就无法继续。如果充当服务器的用户的手机退出、崩溃或移出范围，整个游戏就结束了。由于所有其他机器都通过中央服务器通信，如果服务器不可用，它们将失去通信能力。对于客户端是连接到互联网的、由冗余高速线路支撑的庞大服务器集群的客户端-服务器游戏来说，这通常不是问题，但对于移动游戏来说，这绝对可能是一个问题。\n\
  \n#### 点对点模型\n\n在点对点模型中，所有个体设备（称为 *对等点*）可以直接相互通信。中央服务器可能用于发起连接或协助某些操作，但点对点模型的主要区别特征在于，对等点可以直接相互通信，并且即使在缺少服务器的情况下也能继续这样做（图\
  \ 9-11）。\n\n![9781430238072_Fig09-11.jpg](img/9781430238072_Fig09-11.jpg)\n\n图 9-11.\
  \ 在点对点模型中，对等点可以直接相互通信，并且即使在缺少服务器的情况下也能继续这样做\n\n点对点模型是由 BitTorrent 等文件共享服务普及的。中央服务器用于查找拥有你所需文件的其他对等点，但一旦连接到这些对等点，即使服务器离线，它们也能继续工作。\n\
  \n\n\n### 排版后的文本\n\n在 iPhone 上实现点对点模型最简单且最常见的方式是将两台设备相互连接。例如，在头对头游戏中就使用了这种模型。`Game\
  \ Kit`让此类点对点网络的设置与配置变得极为简单，正如你将在本章中看到的那样。\n\n### 混合客户端-服务器 / 点对点网络\n\n客户端-服务器模型和点对点模型并非互斥关系，完全有可能创建同时利用这两种模型的混合程序。例如，一款客户端-服务器游戏可能允许某些通信直接从客户端到客户端，而无需经过服务器。在带有聊天窗口的游戏中，它可能允许仅发送给单一收件人的消息直接从发送者的设备发往目标收件人的设备，而其他类型的聊天消息则会发送至服务器，再由服务器分发给所有客户端。\n\
  \n在我们讨论应用节点之间建立连接和数据传输的机制时，你应该牢记这些不同的网络模型。`Node`（节点）是一个通用术语，指连接到应用网络的任何计算机。客户端、服务器或对等端都是节点。你在本章中将要编写的游戏将采用一个简单的、包含两台设备的点对点模型。\n\
  \n### Game Kit 会话\n\n`Game Kit`的核心是会话，由 `GKSession` 类表示。该会话代表你与一部或多部其他 iPhone 之间网络连接的端点。无论你是充当客户端、服务器还是对等端，`GKSession`\
  \ 的一个实例都将代表你与其他设备之间的连接。无论你是使用对等端选择器，还是编写自己的代码来查找可连接的设备并让用户从中选择，都需要使用 `GKSession`。\n\
  \n**注意** 在阅读接下来的几页内容时，不必过于担心每个元素是在哪里实现的。这些内容最终都会在你本章创建的项目中得到整合。\n\n你还可以使用 `GKSession`\
  \ 向已连接的对等端发送数据。你需要实现会话代理方法，以便在会话状态发生变化时（例如当另一个节点连接或断开时）收到通知，同时也能接收其他节点发送的数据。\n\n\
  ### 创建会话\n\n要使用会话，必须先创建、分配并初始化一个 `GKSession` 对象，如下所示：\n\n```\n    GKSession *theSession\
  \ = [[GKSession alloc] initWithSessionID:@\"com.apporchard.game\" \n           \
  \                                        displayName:nil \n                    \
  \                                sessionMode:GKSessionModePeer];\n```\n\n初始化会话时需要传递三个参数。\n\
  \n第一个参数是*会话标识符*，它是一个对应用而言唯一的字符串。这用于防止你的应用会话意外连接到其他程序的会话。由于会话标识符是字符串，因此可以是任何内容，但惯例是使用反向\
  \ DNS 风格的名称，例如 `com.apporchard.game`。通过这种方式（而非随机挑选一个单词或短语）来分配会话标识符，可以降低意外选中 App\
  \ Store 上其他应用所用会话标识符的可能性。\n\n第二个参数是*显示名称*。这是一个提供给其他节点的名称，用于唯一标识你的设备。如果你传入 `nil`，显示名称将默认为设备在\
  \ iTunes 中设置的名称。如果连接了多台设备，这将允许其他用户看到哪些设备可用，并连接到正确的设备。在图 9-3 中，你可以看到一个使用唯一标识符的示例。在那个例子中，另一台设备使用与我们相同的会话标识符进行广播，并使用显示名称“Manny\
  \ Sullivan 的 iPhone”。\n\n最后一个参数是*会话模式*。会话模式决定了会话在完成设置并准备好建立连接后的行为。共有三个选项：\n\n* \
  \  如果指定 `GKSessionModeServer`，你的会话将在网络上广播自己，以便其他设备可以发现并连接它，但它不会去寻找其他正在广播的会话。\n*\
  \   如果指定 `GKSessionModeClient`，会话不会在网络上广播自己，但会去寻找其他正在广播的会话。\n*   如果指定 `GKSessionModePeer`，你的会话既会在网络上广播自己的可用性，也会去寻找其他会话。\n\
  \n**注意** 虽然在建立点对点网络时通常使用 `GKSessionModePeer`，在设置客户端-服务器网络时使用 `GKSessionModeServer`\
  \ 和 `GKSessionModeClient`，但这些常量仅决定单个会话是否使用 Bonjour 在网络上广播其可用性，或是否寻找其他可用节点。它们并不一定表示应用正在使用哪种网络模型。\n\
  \n无论你创建何种类型的会话，在通知它开始广播可用性或寻找其他可用节点之前，它并不会实际开始这些操作。你可以将会话属性 `available` 设置为 `YES`\
  \ 来开始广播或寻找。或者，你也可以通过将 `available` 设置为 `NO`，让节点停止广播可用性和/或停止寻找其他可用节点。\n\n#### 查找并连接其他会话\n\
  \n当使用 `GKSessionModeClient` 或 `GKSessionModePeer` 创建的会话发现另一个正在广播可用性的节点时，它会调用 `session:peer:didChangeState:`\
  \ 方法，并传入状态 `GKPeerStateAvailable`。每当对等端变为可用或不可用，以及对等端连接或断开时，都会调用此方法。第二个参数将告诉你哪个对等端的状态发生了变化，最后一个参数则会告诉你其新状态。\n\
  \n如果你发现一个或多个其他可用会话，可以选择通过调用 `connectToPeer:withTimeout:` 将会话连接到其中一个可用会话。以下是 `session:peer:didChangeState:`\
  \ 的一个示例，它会连接到它找到的第一个可用对等端：\n\n```\n- (void)session:(GKSession *)session peer:(NSString\
  \ *)peerID \n                         didChangeState:(GKPeerConnectionState)inState\
  \ \n{\n    if (inState == GKPeerStateAvailable) {\n        [session connectToPeer:peerID\
  \ withTimeout:60];\n        session.available = NO;\n    }\n}\n```\n\n这不是一个非常现实的示例，因为你通常会让用户选择他们要连接的节点。然而，这是一个不错的示例，因为它展示了客户端节点的两个基本功能。在此示例中，你在连接后将\
  \ `available` 设置为 `NO`。这会导致你的会话停止寻找其他会话。由于一个会话可以连接到多个对等端，因此你并不总是需要这样做。如果你的应用支持多个连接，则应将此属性保留为\
  \ `YES`。\n\n#### 监听其他会话\n\n当会话的模式指定为 `GKSessionModeServer` 或 `GKSessionModePeer`\
  \ 时，它会在另一个节点尝试连接时收到通知。此时，会话会调用 `session:didReceiveConnectionRequestFromPeer:` 方法。你可以通过调用\
  \ `acceptConnectionFromPeer:error:` 接受连接，或者通过调用 `denyConnectionFromPeer:` 拒绝连接。以下是一个示例，它假设存在一个名为\
  \ `amAcceptingConnections` 的布尔类型实例变量。如果该变量设置为 `YES`，则接受连接；如果设置为 `NO`，则拒绝连接。\n\n\n\
  ```objc\n- (void)session:(GKSession *)session didReceiveConnectionRequestFromPeer:(NSString\
  \ *)peerID \n{\n    if (amAcceptingConnections) {\n        NSError *error;\n   \
  \     if (![session acceptConnectionFromPeer:peerID error:&error]) {\n         \
  \   // 处理错误\n        }\n    }\n    else {\n        [session denyConnectionFromPeer:peerID];\n\
  \    }\n}\n```\n\n### 向对等节点发送数据\n\n一旦你建立了连接到另一个节点的会话，向该节点发送数据就变得非常简单。你只需调用两个方法之一即可。具体调用哪个方法取决于你是想向所有已连接的会话发送信息，还是仅向特定会话发送。如果仅向指定对等节点发送数据，请使用\
  \ `sendData:toPeers:withDataMode:error:` 方法。如果要向所有已连接的对等节点发送数据，请使用 `sendDataToAllPeers:withDataMode:error:`\
  \ 方法。\n\n在这两种情况下，都需要为连接指定一种*数据模式*。数据模式告知会话应如何尝试发送数据。有两种选项：\n\n- `GKSendDataReliable`：此选项确保信息能够到达其他会话。如果数据超过一定大小，它会分块发送，并等待每个块的其他对等节点确认。\n\
  - `GKSendDataUnreliable`：此模式立即发送数据，不等待确认。它比 `GKSendDataReliable` 快得多，但存在完整消息无法到达其他节点的微小可能性。\n\
  \n通常，`GKSendDataReliable` 数据模式会是你的首选，但如果你有一个程序更注重传输速度而非准确性，那么应考虑使用 `GKSendDataUnreliable`。\n\
  \n以下是向单个对等节点发送数据时的代码示例：\n\n```objc\nNSError *error = nil;\nif (![session sendData:theData\
  \ \n                toPeers:[NSArray arrayWithObject:thePeerID] \n          withDataMode:GKSendDataReliable\
  \ error:&error]) {\n        // 进行错误处理\n} \n```\n\n以下是向所有已连接对等节点发送数据时的代码示例：\n\n```objc\n\
  NSError *error = nil;\nif (![session sendDataToAllPeers:data \n                \
  \  withDataMode:GKSendDataReliable \n           error:&error]) {\n        // 进行错误处理\n\
  }\n```\n\n### 打包待发送的信息\n\n任何你能放入 `NSData` 实例中的信息都可以发送给其他对等节点。在 Game Kit 中使用此功能有两种基本方法。第一种是使用归档和解档，就像我们在\
  \ *Beginning iOS 6 Development* (Apress, 2012) 的第 11 章归档部分所做的那样。\n\n使用归档/解档方法时，你需要定义一个类来保存要发送的单个数据包。该类将包含实例变量，用于保存你可能需要发送的任何类型的数据。当需要发送数据包时，你创建并初始化一个数据包对象的实例，然后使用\
  \ `NSKeyedArchiver` 将该对象的实例归档到 `NSData` 实例中，该实例可以传递给 `sendData:toPeers:withDataMode:error:`\
  \ 或 `sendDataToAllPeers:withDataMode:error:`。你将在本章的示例中使用这种方法。然而，这种方法会产生少量开销，因为它需要创建要传递的对象，以及对这些对象进行归档和解档。\n\
  \n尽管在许多情况下归档对象是最佳方法，因为它易于实现且与 Cocoa Touch 的设计很好地契合，但有时应用程序可能需要不断向其同伴发送大量数据，这种开销可能无法接受。在这些情况下，更快的选择是使用静态数组（普通的旧\
  \ C 数组，而非 `NSArray`）作为发送数据的方法中的局部变量。\n\n你可以将任何需要发送给对等节点的数据复制到该静态数组中，然后从该静态数组创建一个\
  \ `NSData` 实例。创建 `NSData` 实例仍然涉及一些对象创建，但只需创建一个对象而不是两个，而且没有归档的开销。以下是使用这种更快技术发送数据的简单示例：\n\
  \n```objc\nNSUInteger packetData[2];\npacket[0] = foo;\npacket[1] = bar;\nNSData\
  \ *packet = [NSData dataWithBytes:packetData length:2 * sizeof(packetData)];\nNSError\
  \ *error = nil;\nif (![session sendDataToAllPeers:packet withDataMode:GKSendDataReliable\
  \ error:&error]) {\n    // 处理错误\n}\n```\n\n### 从对等节点接收数据\n\n当会话从对等节点接收数据时，会话会将数据传递给一个称为*数据接收处理程序*的对象上的方法。该方法是\
  \ `receiveData:fromPeer:inSession:context:`。默认情况下，数据接收处理程序是会话的委托，但并非必须如此。你可以通过调用会话的\
  \ `setDataReceiveHandler:withContext:` 并传入你希望从会话接收数据的对象，来指定另一个对象处理此任务。\n\n无论哪个对象被指定为数据接收处理程序，它都必须实现\
  \ `receiveData:fromPeer:inSession:context:`，并且每当从对等节点接收到新数据时，都会调用该方法。无需确认数据已接收，也无需担心等待整个数据包。你可以根据程序的需要直接使用提供的数据。所有网络数据传输的棘手方面都已为你处理。其他对等节点每次调用\
  \ `sendDataToAllPeers:withDataMode:error:`，以及其他指定了你的对等节点标识符的对等节点每次调用 `sendData:toPeers:withDataMode:error:`，都会导致数据接收处理程序被调用一次。\n\
  \n以下是一个数据接收处理程序方法的示例，该方法是前面发送示例的对应部分：\n\n```objc\n- (void)receiveData:(NSData *)data\
  \ \n           fromPeer:(NSString *)peer \n           inSession: (GKSession *)theSession\
  \ \n             context:(void *)context \n{\n    NSUInteger *packet = [data bytes];\n\
  \    NSUInteger foo = packet[0];\n    NSUInteger bar = packet[0];\n    // 使用 foo\
  \ 和 bar 执行某些操作\n}\n```\n\n在构建本章示例时，你将研究如何接收归档对象。\n\n### 关闭连接\n\n当你完成会话后，在释放会话对象之前，进行一些清理工作很重要。在释放会话对象之前，必须将会话设置为不可用，断开与所有对等节点的连接，将数据接收处理程序设置为\
  \ `nil`，并将会话委托设置为 `nil`。以下是你 `dealloc` 方法中的代码（或在任何其他需要关闭连接时）可能的样子：\n\n```objc\n\
  session.available = NO;\n[session disconnectFromAllPeers];\n[session setDataReceiveHandler:\
  \ nil withContext: nil];\nsession.delegate = nil;\n```\n\n相反，如果你只想断开与特定对等节点的连接，可以调用\
  \ `disconnectPeerFromAllPeers:`，这将断开远程对等节点与其所连接的所有对等节点的连接。请谨慎使用此方法，因为它会导致被调用的对等节点断开与所有远程对等节点的连接，而不仅仅是你的应用程序。以下是使用它的示例：\n\
  \n```objc\n[session disconnectPeerFromAllPeers:thePeer];\n```\n\n### 对等选择器\n\n尽管\
  \ Game Kit 并非只能用于游戏，但网络游戏显然是该技术背后的主要驱动力——至少从苹果选择的名称来看确实如此。移动游戏中最常见的网络模型是直接对抗或简单的点对点模型，即一名玩家与另一名玩家对战。由于这种场景非常常见，苹果提供了一种称为*对等选择器*的机制，用于轻松设置这种简单类型的点对点网络。\n\
  \n#### 创建对等选择器\n\n\n\n对等选择器的设计初衷是使用蓝牙将一台设备连接到另一台设备。尽管存在这种局限性，但对等选择器使用起来非常简单，如果符合你的需求，会是一个绝佳的选择。要创建并显示对等选择器，你只需创建一个`GKPeerPickerController`实例，设置其委托，然后调用其`show`方法即可，代码如下：\n\
  \n```\nGKPeerPickerController *picker; \npicker = [[GKPeerPickerController alloc]\
  \ init]; \npicker.delegate = self;\n[picker show];\n```\n\n### 处理对等连接\n\n当用户选定了一个对等设备且会话已相互连接后，委托方法`peerPickerController:didConnectPeer:toSession:`将被调用。在该方法的实现中，你需要完成几项操作。首先，你可能需要存储*对等标识符*，这是一个用于标识所连接设备的字符串。对等标识符默认为\
  \ iPhone 的设备名称，不过你也可以指定其他值。此外，你还需要保存对会话的引用，以便后续发送数据以及断开会话连接。\n\n```\n- (void)peerPickerController:(GKPeerPickerController\
  \ *)picker\n                 didConnectPeer:(NSString *)thePeerID\n            \
  \              toSession:(GKSession *)theSession\n{\n    self.peerID = thePeerID;\n\
  \    self.session = theSession;\n    self.session.delegate = self;\n    [self.session\
  \ setDataReceiveHandler:self withContext:NULL];\n    [picker dismiss];\n    picker.delegate\
  \ = nil;\n}\n```\n\n### 创建会话\n\n使用对等选择器时，你还需要处理最后一个委托任务：在选择器请求会话时创建会话。使用对等选择器时，你无需担心与其他对等设备查找和连接相关的大部分任务，但需要负责创建供选择器使用的会话。该方法通常如下所示：\n\
  \n```\n- (GKSession *)peerPickerController:(GKPeerPickerController *)picker\n  \
  \          sessionForConnectionType:(GKPeerPickerConnectionType)type\n{\n    GKSession\
  \ *theSession;\n    theSession = [[GKSession alloc] initWithSessionID:@\"a session\
  \ id\"\n                                          displayName:nil\n            \
  \                              sessionMode:GKSessionModePeer];\n    return theSession;\n\
  }\n```\n\n`GKPeerPickerConnectionType`可以是以下两种类型之一：`GKPeerPickerConnectionOnline`（网络/互联网）和`GKPeerPickerConnectionNearby`（蓝牙）。你可以通过`GKPeerPickerController`实例上的`connectionTypesMask`属性来配置允许的类型。默认情况下，它仅假定为蓝牙连接。\n\
  \n我们已经讨论过会话，因此这个方法中应该没有令人困惑的地方。\n\n**注意：** 如果你想通过对等选择器支持通过 WiFi 进行在线游戏，还需要实现另一个对等选择器委托方法：`peerPickerController:didSelectConnectionType:`。请查阅\
  \ Apple 文档或《Beginning iOS Game Center and Game Kit》（入门 iOS 游戏中心与游戏套件）一书。\n\n好了，讨论到此为止。让我们开始构建应用程序吧。\n\
  \n### 创建项目\n\n好了，操作步骤你都熟悉。如果 Xcode 尚未打开，请启动它并创建一个新项目。使用单视图应用程序模板，并将项目命名为 **TicTacToe**。你不会使用故事板，因此只应勾选“使用自动引用计数”复选框。项目打开后，请查看本书附带的项目归档文件，位于`09\
  \ – TicTacToe`文件夹中。找到名为`wood_button.png`、`board.png`、`O.png`和`X.png`的图像文件，并将它们复制到项目的\
  \ Supporting Files 组中。还有一个名为`icon.png`的图标文件，如果你想使用，可以将其复制到项目中。\n\n### 关闭闲置定时器\n\n\
  你要做的第一件事就是关闭*闲置定时器*。闲置定时器的作用是，当用户在一段时间内未与 iPhone 进行交互时，让 iPhone 进入休眠状态。由于对手回合期间用户不会点击屏幕，因此你需要关闭此定时器，以防对手思考时间过长导致手机进入休眠。一般来说，你不希望网络应用程序进入休眠状态，因为休眠会断开网络连接。在大多数情况下，对于联网的\
  \ iPhone 游戏，禁用闲置定时器是最佳方法。\n\n在 Xcode 的导航器窗格中展开 TicTacToe 组，然后单击`AppDelegate.m`。在`applicationDidFinishLaunchingWithOptions:`方法中，在方法返回之前添加以下代码行，以禁用闲置定时器。\n\
  \n```\n[[UIApplication sharedApplication] setIdleTimerDisabled:YES];\n```\n\n**注意：**\
  \ 极少数情况下，你可能希望保持闲置定时器正常运行，并在应用程序进入休眠时关闭会话，但通过休眠来关闭会话并不像看起来那么简单。应用程序委托方法`applicationWillResignActive:`会在手机进入休眠前被调用，但遗憾的是，它在其他情况下也会被调用。实际上，只要你的应用程序失去响应触摸事件的能力，该方法就会被调用。这使得我们几乎无法区分是系统提示（例如来自推送通知或低电量警告，这些情况不会导致连接断开）导致失焦，还是手机即将真正进入休眠。因此，在\
  \ Apple 提供区分这些情况的方法之前，最好的办法就是在网络程序运行时简单地禁止休眠。\n\n### 导入 Game Kit 框架\n\nGame Kit\
  \ 并非 Xcode 项目模板自动链接的框架之一，因此你需要手动链接它以访问会话和对等选择器方法。在导航器窗格顶部选择 TicTacToe 项目。接着，在项目编辑器中选择\
  \ TicTacToe 目标。选择“构建阶段”选项卡，展开“将二进制文件与库链接（3 个项目）”部分。点击左下角的 **+** 按钮。从出现的对话框中选择`GameKit.framework`，然后点击“添加”。\n\
  \n`GameKit.framework` 将出现在导航器窗格中项目组的顶部。将其拖入 Frameworks 组以进行整理。\n\n#### 设计界面\n\n\
  现在，你将设计游戏的用户界面。由于井字棋是一个相对简单的游戏，你将在 Interface Builder 中设计用户界面，而非使用 OpenGL ES。\n\n\
  棋盘上的每个格子都是一个按钮。当用户点击一个尚未被选中的按钮时（通过检查按钮是否有指定图像来判断），你将图像设置为`X.png`或`O.png`（这些文件你几分钟前已添加到项目中）。然后，你将此信息发送到另一台设备。你还将使用按钮的标记值来区分按钮，并更容易判断是否有人获胜。你将棋盘上代表每个格子的按钮分配一个顺序标记值，从左上角开始。通过查看图\
  \ 9-12，你可以了解每个格子对应的标记值。这样，你无需为每个按钮设置单独的操作方法，即可识别哪个按钮被按下。\n\n![9781430238072_Fig09-12.jpg](img/9781430238072_Fig09-12.jpg)\n\
  \n图 9-12. 为每个游戏格子按钮分配一个标记值\n\n#### 定义应用程序常量\n\n在引用井字棋棋盘上的特定按钮时，你可以使用图 9-12 中定义的标记值（并且在\
  \ Interface Builder 中也需要使用这些值），但更好的做法是使用一组助记常量。你还将定义一些常量来表示当前游戏状态以及用户是 X 还是 O。\n\
  \n\n\n\n你可以将这些常量定义分散到应用的各个头文件和实现文件中，但将它们集中放在一个文件中会更方便。我们就采用后者。\n\n在导航窗格中选择`TicTacToe`分组，然后创建一个新文件。在模板选择对话框中，选择\
  \ iOS 下的 C 和 C++ 部分。选择头文件并点击下一步。将文件保存为`TicTacToe.h`。选择`TicTacToe.h`，它应该看起来像这样：\n\
  \n```c\n#ifndef TicTacToe_TicTacToe_h\n#define TicTacToe_TicTacToe_h\n\n#endif\n\
  ```\n\n这些宏（`#ifndef`、`#define`、`#endif`）是 C 语言的防护机制，用于确保`TicTacToe.h`只被包含一次。在 Objective-C\
  \ 中，你无需担心这个问题，因为`#import`宏已经为你处理了。你可以删除这些行。\n\n现在，你需要定义一些自己的常量。首先，定义一个常量来表示 Game\
  \ Kit 会话 ID。\n\n```c\n#define kTicTacToeSessionID  @\"com.apporchard.TicTacToe.session\"\
  \n```\n\n接下来，我们定义一个用于通过 Game Kit 对数据包进行编码和解码的常量。\n\n```c\n#define kTicTacToeArchiveKey\
  \ @\"com.apporchard.TicTacToe\"\n```\n\n当应用连接到另一台设备时，你需要让应用决定哪位玩家先走。方法是生成一个随机数，数字较大的玩家先走。我们使用宏`dieRoll()`来定义数字生成器，该宏将生成一个\
  \ 0 到 999,999 之间的数字。这里使用这么大的数字是为了让两台设备掷出相同数字（需要重新掷骰）的概率极低。\n\n```c\n#define dieRoll()\
  \ (arc4random() % 1000000)\n```\n\n你还定义了一个常量`kDiceNotRolled`，用于标识骰子尚未掷出。请记住，你将在`NSInteger`实例变量中存储自己掷出的骰子数和对手的骰子数。在\
  \ iPhone 上，`NSInteger`与`int`相同。你使用`INT_MAX`值来标识这些值尚未确定。`INT_MAX`是平台上一个`int`能容纳的最大值。由于`dieRoll()`宏生成的最大数字是\
  \ 999,999，你可以安全地使用`INT_MAX`来标识骰子尚未掷出，因为在 iOS 上`INT_MAX`当前等于 2,147,483,647。即使`INT_MAX`将来发生变化，它也只会变大，不会变小。\n\
  \n```c\n#define kDiceNotRolled INT_MAX\n```\n\n你需要一些枚举。`GameState`将是你定义不同游戏状态的枚举列表。\n\
  \n```c\ntypedef enum GameStates {\n    kGameStateBeginning,\n    kGameStateRollingDice,\n\
  \    kGameStateMyTurn,\n    kGameStateYourTurn,\n    kGameStateInterrupted,\n  \
  \  kGameStateDone\n} GameState;\n```\n\n`BoardSpace`是你在图 9-12 中定义的枚举列表。注意，你将第一个枚举值`kUpperLeft`定义为\
  \ 1000。后续的每个枚举值都会在此基础上递增。\n\n```c\ntypedef enum BoardSpaces {\n    kUpperLeft =\
  \ 1000,\n    kUpperMiddle,\n    kUpperRight,\n    kMiddleLeft,\n    kMiddleMiddle,\n\
  \    kMiddleRight,\n    kLowerLeft,\n    kLowerMiddle,\n    kLowerRight\n} BoardSpace;\n\
  ```\n\n`PlayerPiece`是一个简单的枚举，用于标识玩家被分配了哪个棋子。\n\n```c\ntypedef enum PlayerPieces\
  \ {\n    kPlayerPieceUndecided,\n    kPlayerPieceO,\n    kPlayerPieceX\n} PlayerPiece;\n\
  ```\n\n最后，你定义一个枚举列表，列出应用将通过 Game Kit 交换的不同数据包类型。\n\n```c\ntypedef enum PacketTypes\
  \ {\n    kPacketTypeDieRoll,\n    kPacketTypeAck,\n    kPacketTypeMove,\n    kPacketTypeReset,\n\
  } PacketType;\n```\n\n定义好这些常量后，你可以开始处理应用程序视图了。\n\n#### 设计游戏棋盘\n\n在导航器中选择`ViewController.xib`。Xcode\
  \ 将在 Interface Builder 中打开它。Interface Builder 中会有一个视图。在对象库中找到图像视图并将其拖入视图中。由于它是你添加到视图中的第一个对象，它应该会自动调整大小以占满整个视图。将其放置好以填充整个视图，然后在工具窗格中打开属性检查器。在属性检查器的顶部，将图像字段设置为`board.png`，这是你之前添加到项目中的图像之一。\n\
