- "# 排版后的 Markdown 文档\n\n我决定通过将功能提取到单独的方法中来改进移动逻辑。直接的做法是从`update`方法复制现有代码到`ccTouchBegan`方法。然而，复制粘贴是邪恶的。如果你加入了编程教派，请注意复制现有代码被视为一种致命罪行。\n\
  \n**注意：** 使用复制粘贴非常容易，而且每个人都知道如何操作，这使得它极具诱惑力。但每当你复制代码时，你也复制了以后修改该代码所需的工作量。考虑这样一种情况：你将相同的动作序列复制了十次，然后需要更改动作序列的持续时间。你无法只修改一次；你必须修改十次，而且更重要的是，你必须测试十次更改，因为你可能忘记了将更改应用到十个位置中的某一个。更多的代码也意味着引入\
  \ bug 的几率更高，而且由于这个 bug 可能只发生在十个情况中的一个，它也将更难被发现。\n\n使用方法提取通用功能，并将需要灵活调整的部分暴露为参数，确实是一项非常简单的任务。我希望`moveAway`方法能很好地说明我的观点。它并没有包含太多代码，但即使是最少量的重复代码也会增加你维护代码的时间。\n\
  \n`ccTouchBegan`方法获取触摸位置，并通过`CGRectContainsPoint`检查触摸位置是否在蜘蛛精灵的`boundingBox`内。如果是，它处理触摸并运行让蜘蛛快速朝四个方向之一移开的代码。\n\
  \n总之，使用`CCNode`作为游戏对象的基类乍一看会使一些事情变得不太方便。然而，当你开始创建更大的项目时，比如处理超过十几个游戏对象类时，其好处就变得明显了。如果你现在更倾向于继承`CCSprite`，这完全没问题。但当你变得更加熟练——并且更有雄心——时，请再次回到本章并尝试这种方法。它将带来更好的代码结构，以及更清晰分离的各个游戏元素的边界与职责。\n\
  \n### 有趣的 `CCNode` 类\n\n请坐稳，我将带你了解几个用于特定目的的`CCNode`派生类。它们是`CCProgressTimer`、`CCParallaxNode`、`CCRibbon`和`CCMotionStreak`。\n\
  \n### `CCProgressTimer`\n\n在`ScenesAndLayers07`项目中，我向`UserInterfaceLayer`类添加了一个`CCProgressTimer`节点。你可以在图\
  \ 5-3 中看到它是如何以径向方式从精灵上切下一部分的。\n\n![images](img/0503.jpg)\n\n**图 5-3.** *工作中的`CCProgressTimer`。我会说大约是\
  \ 12 点过 10 分。*\n\n进度计时器类适用于任何类型的进度显示，比如加载条或图标重新可用所需的时间。想想《魔兽世界》中的动作按钮及其重新施法计时器。进度计时器接受一个精灵，并根据百分比仅显示其一部分，以可视化游戏中的某种进度。有关如何初始化`CCProgressTimer`节点，请参见清单\
  \ 5-15。\n\n**清单 5-15.** *初始化一个`CCProgressTimer`节点*\n\n```\n// Progress timer is\
  \ a sprite that is only partially displayed\n// to visualize some kind of progress.\n\
  CCProgressTimer* timer = [CCProgressTimer progressWithFile:@\"firething.png\"];\n\
  timer.type = kCCProgressTimerTypeRadialCCW;\ntimer.percentage = 0;\n[self addChild:timer\
  \ z:1 tag:UILayerTagProgressTimer];\n// The update is needed for the progress timer.\n\
  [self scheduleUpdate];\n```\n\n`timer`类型来自定义在`CCProgressTimer.h`中的`CCProgressTimerType`枚举。你可以选择径向、垂直和水平进度计时器。但有一个警告：计时器不会自我更新。你必须频繁更改计时器的`percentage`值来更新进度。这就是我在清单\
  \ 5-15 中包含`scheduleUpdate`的原因。执行实际进度更新的`update`方法的实现如清单 5-16 所示。`CCProgressTimer`节点的`percentage`属性必须根据需要频繁更新——它不会自动推进进度。这里的进度只是时间的流逝。这不就是游戏的全部意义吗？\n\
  \n**清单 5-16.** *`update`方法的实现*\n\n```\n-(void) update:(ccTime)delta\n{\n    CCNode*\
  \ node = [self getChildByTag:UILayerTagProgressTimer];\n    NSAssert([node isKindOfClass:[CCProgressTimer\
  \ class]], @\"node is not a\n        CCProgressTimer\");\n\n    // Updates the progress\
  \ timer\n    CCProgressTimer* timer = (CCProgressTimer*)node;\n    timer.percentage\
  \ += delta * 10;\n    if (timer.percentage >= 100)\n    {\n        timer.percentage\
  \ = 0;\n    }\n}\n```\n\n\n\n### `CCParallaxNode`\n\n视差效果是一种用于 2D 游戏中的技术，通过使用以不同速率移动的分层图像来营造深度感。前景中的图像相对背景中的图像移动得更快。尽管你无法在静态图像中看到视差效果，但图\
  \ 5–4 至少能让你对由多个独立图层构成的背景有个初步印象。云朵位于最远处；山脉在云朵前方，但位于（丑陋的）树木后方。最底部是道路，你通常可以在此处添加一个玩家角色，沿着这片场景左右移动。\n\
  \n![images](img/0504.jpg)\n\n**图 5–4.** `CCParallaxNode` 让你能够创造出深度的错觉。\n\n**注意：**\
  \ 为什么视差效果能创造出深度的错觉？因为我们的思维已经习惯了这种效果。想象一下你正高速驾车行驶，透过侧窗向外看。你会注意到路边的树木（离你最近）飞速掠过，快到你几乎无法聚焦于任何一棵。再看远一点，你会发现远处的农舍以看似慢得多的速度从你身旁经过。然后望向地平线上的山脉，你几乎察觉不到自己正在经过它们。这就是三维世界中的视差效果，那里存在无数个视差图层。在\
  \ 2D 游戏中，我们必须（非常粗略地）用大约两到八个视差图层来模拟同样的效果。每个图层都试图欺骗你的大脑，让它以为该图层距离你的视点有一定距离，原因仅仅在于它相对于其他图层以某个特定的速度移动。这种效果出奇地好。\n\
  \nCocos2d 有一个专门的节点，你可以用它来创建这种效果。在代码清单 5–17 中创建 `CCParallaxNode` 的代码也包含在 ScenesAndLayers08\
  \ 项目中。\n\n**代码清单 5–17.** `CCParallaxNode` 需要大量设置工作，但结果值得如此投入\n\n```\n// 加载每个视差图层的精灵，从背景到前景。\n\
  CCSprite* para1 = [CCSprite spriteWithFile:@\"parallax1.png\"];\nCCSprite* para2\
  \ = [CCSprite spriteWithFile:@\"parallax2.png\"];\nCCSprite* para3 = [CCSprite spriteWithFile:@\"\
  parallax3.png\"];\nCCSprite* para4 = [CCSprite spriteWithFile:@\"parallax4.png\"\
  ];\n\n// 根据屏幕和图像大小设置正确的偏移量。\npara1.anchorPoint = CGPointMake(0, 1);\npara2.anchorPoint\
  \ = CGPointMake(0, 1);\npara3.anchorPoint = CGPointMake(0, 0.6f);\npara4.anchorPoint\
  \ = CGPointMake(0, 0);\nCGPoint topOffset = CGPointMake(0, screenSize.height);\n\
  CGPoint midOffset = CGPointMake(0, screenSize.height / 2);\nCGPoint downOffset =\
  \ CGPointZero;\n\n// 创建一个视差节点并将精灵添加到其中。\nCCParallaxNode* paraNode = [CCParallaxNode\
  \ node];\n[paraNode addChild:para1\n                 z:1\n     parallaxRatio:CGPointMake(0.5f,\
  \ 0)\n    positionOffset:topOffset];\n\n[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1,\
  \ 0) positionOffset:topOffset];\n[paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2,\
  \ 0) positionOffset:midOffset];\n[paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3,\
  \ 0) positionOffset:downOffset];\n[self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\
  \n// 移动视差节点以展示视差效果。\nCCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(-160,\
  \ 0)];\nCCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160,\
  \ 0)];\nCCSequence* sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever*\
  \ repeat = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
  ```\n\n要创建一个 `CCParallaxNode`，你首先要创建构成各个视差图像的所需 `CCSprite` 节点，然后必须将它们正确放置在屏幕上。在这个例子中，我选择修改它们的锚点，因为这样更容易让精灵与屏幕边界对齐。`CCParallaxNode`\
  \ 的创建方式与其他节点类似，但其子节点是通过一个特殊的初始化方法添加的。通过该方法，你可以指定 `parallaxRatio`（视差比率），它是一个 `CGPoint`，用作\
  \ `CCParallaxNode` 任何移动的乘数。在此例中，`CCSprite` `para1` 将以一半的速度移动，`para2` 以正常速度移动，`para3`\
  \ 以 `CCParallaxNode` 的双倍速度移动，依此类推。\n\n通过使用一系列 `CCMoveBy` 动作，`CCParallaxNode` 被从左向右移动，然后再返回。你会注意到，背景中的云朵移动得最慢，而前景中的树木和碎石滚动得最快。这就营造出了深度的错觉。\n\
  \n**注意：** 一旦子节点被添加到 `CCParallaxNode` 中，你就不能再修改它们各自的位置了。你只能滚动到最大且移动最快的图像边界，否则背景就会透出来。如果你修改\
  \ `CCMoveBy` 动作使其滚动更远的距离，就能看到这种效果。你可以通过添加更多相同的精灵并设置适当的偏移量来增加滚动距离。但是，如果你需要在单一方向或双方向上实现无限滚动，就必须自行实现视差系统。事实上，这正是我们将在第\
  \ 7 章中要做的事情。\n\n### `CCRibbon`\n\n`CCRibbon` 节点会创建一条图像带，就像一条链子，或者像图 5–5 中那样，像一条千足虫在\
