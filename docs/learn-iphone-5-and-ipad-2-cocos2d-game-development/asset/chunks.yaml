    `    body->CreateFixture(&fixtureDef);`

    `}`


    First, a sprite is created from the `CCSpriteBatchNode` by using `CCSprite`''s
    `spriteWithBatchNode` initializer and supplying a `CGRect` that is 32×32 pixels
    in size, to randomly pick one of the tileset''s tiles as the sprite''s image.


    Then a body is created, but this time the `b2BodyDef` type property is set to
    `b2_dynamicBody`, which makes it a dynamic body that can move around and collide
    with other dynamic bodies. The previously created sprite is assigned to the `userData`
    property. Later, when you are iterating over the bodies in the world, this allows
    you to quickly access the body''s sprite.


    The body''s shape is a `b2PolygonShape` set to a box shape that is half a meter
    in size. The `SetAsBox` method creates a box shape that is twice the given width
    and height, so the coordinates need to be divided by 2—or, as in this case, multiplied
    by 0.5f to create a box shape whose sides are 1 meter wide and high.


    The dynamic body also needs a fixture that contains the body''s essential parameters—first
    and foremost the shape but also the density, friction, and restitution—which influence
    how the body moves and bounces around in the world. Consider the fixture to be
    a set of data used by bodies.


    #### Connecting Sprites with Bodies


    The box sprites won''t follow their physics bodies automatically, and the bodies
    won''t do anything unless you regularly call the `Step` method of the Box2D world.
    You then have to update the sprite positions by taking the body position and angle
    and assigning it to the sprite. This is done in the `update` method shown in [Listing
    12–5](#Chapter12.html#list_12_5).


    **Listing 12–5.** *Updating Each Body''s Sprite Position and Rotation*


    `-(void) update:(ccTime)delta`

    `{`

    `    // Advance the physics world by one step, using fixed time steps`

    `    float timeStep = 0.03f;`

    `    int32 velocityIterations = 8;`

    `    int32 positionIterations = 1;`

    `    world->Step(timeStep, velocityIterations, positionIterations);`


    `    for (b2Body* body = world->GetBodyList(); body != nil; body = body->GetNext())`

    `    {`

    `        CCSprite* sprite = (CCSprite*)body->GetUserData();`

    `        if (sprite!= NULL)`

    `        {`

    `            sprite.position = [self toPixels:body->GetPosition()];`

    `            float angle = body->GetAngle();`

    `            sprite.rotation = CC_RADIANS_TO_DEGREES(angle) * -1;`

    `        }`

    `    }`

    `}`


    The Box2D world is animated by regularly calling the `Step` method. It takes three
    parameters. The first is `timeStep`, which tells Box2D how much time has passed
    since the last step. It directly affects the distance that objects will move in
    this step. For games, it is not recommended to pass the delta time as `timeStep`,
    because the delta time fluctuates, and so the speed of the physics bodies will
    not be constant. This effect rears its ugly head when the device may be taking
    a tenth of a second to do background processing, such as sending or receiving
    an e-mail in the background. This can make all physics objects move large distances
    in the next frame. In a game, you''d rather have the game stop for a tenth of
    a second and then carry on where you left off. Without a fixed time step, the
    physics engine would try to cope with a short interruption by moving all objects
    based on the time difference. If the time difference is large, the objects will
    move a lot more in a single frame, and that can lead to them suddenly moving a
    large distance.


    The second and third parameters to the `Step` method are the number of iterations.
    They determine the accuracy of the physics simulation and also the time it takes
    to calculate the movement of the bodies. It''s a trade-off between speed and accuracy.
    In the case of position iterations, you can safely err on the side of speed and
    require only a single iteration—more position accuracy is not normally needed
    in games unless you experience objects not coming to rest, colliding in unnatural
    ways, or missing collision entirely. Velocity is more important, however; a good
    starting point for velocity iterations is eight. More than ten velocity iterations
    have no discernable effect in games, but just one to four iterations won''t be
    enough to get a stable simulation. The fewer the velocity iterations, the more
    bumpily and restlessly the objects will behave. I encourage you to experiment
    with these values.


    After the world has advanced one step, the `for` loop iterates over all of the
    world''s bodies using the `world->GetBodyList` and `body->GetNext` methods. For
    each body, its user data is returned and cast to a `CCSprite` pointer. If it exists,
    the body''s position is converted to pixels and assigned to the sprite''s position
    so that the sprite moves along with the body. Likewise, the body''s angle is obtained;
    because that measurement is in radians, it''s converted to degrees using cocos2d''s
    `CC_RADIANS_TO_DEGREES` method and multiplied by –1 to rotate the sprites in the
    same direction as the body.'
  trans: "\n# 在 Box2D 世界中添加盒子\n\n有了包含屏幕边界内物体的静态刚体，剩下的就是需要被限制在屏幕边界内的东西了。那么，放一些小盒子怎么样？\n\
    \n我已将 David Gervais 的正交瓦片集图像`dg_grounds32.png`添加到 `PhysicsBox2D01` 项目的 `Resources`\
    \ 文件夹中。这些瓦片是 32×32 像素，因此它们非常适合制作 1×1 米大小的盒子。代码清单 12–3 是 `init` 方法中用于添加纹理并创建几个盒子的代码。它还调度了\
    \ `update` 方法，该方法用于更新盒子精灵的位置，并启用了触摸功能，以便用户可以通过点击屏幕来创建新的盒子。\n\n**代码清单 12–3.** *添加一组初始盒子*\n\
    \n```\n// 为小盒子使用正交瓦片集\nCCSpriteBatchNode* batch = [CCSpriteBatchNode\n    batchNodeWithFile:@\"\
    dg_grounds32.png\"\n       capacity:150];\n\n[self addChild:batch z:0 tag:kTagBatchNode];\n\
    \n// 初始添加一些物体\nfor (int i = 0; i < 11; i++)\n{\n    [self addNewSpriteAt:CGPointMake(screenSize.width\
    \ / 2, screenSize.height / 2)];\n}\n\n[self scheduleUpdate];\nself.isTouchEnabled\
    \ = YES;\n```\n\n代码清单 12–4 中所示的 `addNewSpriteAt` 方法来自 cocos2d Box2D 应用模板项目，但经过略微修改以使用瓦片集中的所有瓦片。\n\
    \n**代码清单 12–4.** *添加一个带精灵的新动态刚体*\n\n```\n-(void) addNewSpriteAt:(CGPoint)pos\n\
    {\n    CCSpriteBatchNode* batch =\n        (CCSpriteBatchNode*) [self getChildByTag:kTagBatchNode];\n\
    \n    int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n    int idy = CCRANDOM_0_1()\
    \ * TILESET_ROWS;\n    CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE *\
    \ idy, TILESIZE, TILESIZE);\n    CCSprite* sprite = [CCSprite spriteWithBatchNode:batch\
    \ rect:tileRect];\n    sprite.position = pos;\n    [batch addChild:sprite];\n\n\
    \    // 创建一个刚体定义并将其设置为动态刚体\n    b2BodyDef bodyDef;\n    bodyDef.type = b2_dynamicBody;\n\
    \    bodyDef.position = [self toMeters:pos];\n    bodyDef.userData = sprite;\n\
    \    b2Body* body = world->CreateBody(&bodyDef);\n\n    // 定义一个盒子形状并将其分配给刚体夹具\n\
    \    b2PolygonShape dynamicBox;\n    float tileInMeters = TILESIZE / PTM_RATIO;\n\
    \    dynamicBox.SetAsBox(tileInMeters * 0.5f, tileInMeters * 0.5f);\n\n    b2FixtureDef\
    \ fixtureDef;\n    fixtureDef.shape = &dynamicBox;        \n    fixtureDef.density\
    \ = 0.3f;\n    fixtureDef.friction = 0.5f;\n    fixtureDef.restitution = 0.6f;\n\
    \    body->CreateFixture(&fixtureDef);\n}\n```\n\n首先，使用 `CCSprite` 的 `spriteWithBatchNode`\
    \ 初始化方法，并提供一个大小为 32×32 像素的 `CGRect`，从 `CCSpriteBatchNode` 创建一个精灵，以随机选择瓦片集中的一个瓦片作为精灵图像。\n\
    \n然后创建一个刚体，但这次将 `b2BodyDef` 的 type 属性设置为 `b2_dynamicBody`，使其成为一个可以四处移动并与其他动态刚体碰撞的动态刚体。之前创建的精灵被分配给\
    \ `userData` 属性。之后，当你遍历世界中的刚体时，这允许你快速访问刚体的精灵。\n\n刚体的形状是一个设置为半米大小盒子形状的 `b2PolygonShape`。`SetAsBox`\
    \ 方法创建一个宽度和高度为给定值两倍的盒子形状，因此坐标需要除以 2——或者像本例中那样，乘以 `0.5f`，以创建一个边长宽均为 1 米的盒子形状。\n\
    \n动态刚体还需要一个包含刚体基本参数的夹具——首先也是最重要的是形状，以及密度、摩擦力和弹性系数，这些参数会影响刚体在世界中的移动和弹跳方式。可以将夹具视为供刚体使用的一组数据。\n\
    \n# 将精灵与刚体连接\n\n盒子精灵不会自动跟随它们的物理刚体，并且除非你定期调用 Box2D 世界的 `Step` 方法，否则刚体也不会做任何事情。然后，你必须通过获取刚体的位置和角度并将其分配给精灵来更新精灵的位置。这在代码清单\
    \ 12–5 所示的 `update` 方法中完成。\n\n**代码清单 12–5.** *更新每个刚体的精灵位置和旋转*\n\n```\n-(void)\
    \ update:(ccTime)delta\n{\n    // 使用固定的时间步长，将物理世界向前推进一步\n    float timeStep =\
    \ 0.03f;\n    int32 velocityIterations = 8;\n    int32 positionIterations = 1;\n\
    \    world->Step(timeStep, velocityIterations, positionIterations);\n\n    for\
    \ (b2Body* body = world->GetBodyList(); body != nil; body = body->GetNext())\n\
    \    {\n        CCSprite* sprite = (CCSprite*)body->GetUserData();\n        if\
    \ (sprite!= NULL)\n        {\n            sprite.position = [self toPixels:body->GetPosition()];\n\
    \            float angle = body->GetAngle();\n            sprite.rotation = CC_RADIANS_TO_DEGREES(angle)\
    \ * -1;\n        }\n    }\n}\n```\n\n通过定期调用 `Step` 方法来让 Box2D 世界产生动画效果。它需要三个参数。第一个是\
    \ `timeStep`，它告诉 Box2D 自上次步进以来过去了多少时间。它直接影响物体在此步进中移动的距离。对于游戏，不建议将增量时间（delta time）作为\
    \ `timeStep` 传递，因为增量时间会波动，导致物理刚体的速度不恒定。当设备可能需要十分之一秒的时间进行后台处理（例如在后台发送或接收电子邮件）时，这种影响就会显现出来。这可能导致所有物理对象在下一帧中移动很大的距离。在游戏中，你宁愿让游戏暂停十分之一秒，然后从中断的地方继续。如果没有固定的时间步长，物理引擎会尝试通过基于时间差移动所有物体来应对短暂中断。如果时间差很大，物体在一帧内会移动更多，这可能导致它们突然移动很远的距离。\n\
    \n`Step` 方法的第二个和第三个参数是迭代次数。它们决定了物理模拟的精度以及计算刚体运动所需的时间。这是在速度和精度之间的权衡。对于位置迭代，你可以安全地偏向速度方面，只要求单次迭代——除非你遇到物体无法静止、以非自然方式碰撞或完全错过碰撞的情况，否则游戏中通常不需要更高的位置精度。然而，速度迭代更为重要；速度迭代的一个良好起始点是八次。在游戏中，超过十次的速度迭代没有明显效果，但仅一到四次迭代不足以获得稳定的模拟。速度迭代次数越少，物体的行为就越颠簸和不安定。我鼓励你尝试这些值。\n\
    \n在世界向前推进一步之后，`for` 循环使用 `world->GetBodyList` 和 `body->GetNext` 方法遍历世界中的所有刚体。对于每个刚体，返回其用户数据并转换为\
    \ `CCSprite` 指针。如果存在，则将刚体的位置转换为像素并分配给精灵的位置，以便精灵随刚体移动。同样，获取刚体的角度；由于该测量值以弧度为单位，因此使用\
    \ cocos2d 的 `CC_RADIANS_TO_DEGREES` 方法将其转换为度，并乘以 -1 以使精灵的旋转方向与刚体相同。\n"
- fmt: "### Collision Detection\n\nBox2D has a `b2ContactListener` class, which you\
    \ are supposed to subclass if you want to receive collision callbacks. The following\
    \ code refers to the PhysicsBox2D02 project.\n\nCreate a new class in Xcode and\
    \ name it `ContactListener`. Then rename the implementation file to `ContactListener.mm`\
    \ so it has the file extension `.mm`. Then you will be able to use both C++ and\
    \ Objective-C code in the same file. [Listing 12–6](#Chapter12.html#list_12_6)\
    \ shows the `ContactListener` header file.\n\n**Listing 12–6.** *The ContactListener\
    \ Class's Interface*\n\n```\n#import \"Box2D.h\"\n\nclass ContactListener : public\
    \ b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact* contact);\n\
    \    void EndContact(b2Contact* contact);\n};\n```\n\nIt's a C++ class, so the\
    \ class definition is a little different. Note the trailing semicolon after the\
    \ last bracket. It's a common error to forget that semicolon. The `BeginContact`\
    \ and `EndContact` methods are defined by Box2D and get called whenever there\
    \ is a collision between two bodies.\n\nIn the implementation, I merely change\
    \ the sprite's colors to magenta while the two bodies are in contact and set it\
    \ back to white when they are no longer in contact, as shown in [Listing 12–7](#Chapter12.html#list_12_7).\n\
    \n**Listing 12–7.** *Checking for the Beginning and Ending of Collisions*\n\n\
    ```\n#import \"ContactListener.h\"\n#import \"cocos2d.h\"\n\nvoid ContactListener::BeginContact(b2Contact*\
    \ contact)\n{\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body*\
    \ bodyB = contact->GetFixtureB()->GetBody();\n    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();\n\
    \    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();\n\n    if (spriteA !=\
    \ NULL && spriteB != NULL)\n    {\n        spriteA.color = ccMAGENTA;\n      \
    \  spriteB.color = ccMAGENTA;\n    }\n}\n\nvoid ContactListener::EndContact(b2Contact*\
    \ contact)\n{\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body*\
    \ bodyB = contact->GetFixtureB()->GetBody();\n    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();\n\
    \    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();\n\n    if (spriteA !=\
    \ NULL && spriteB != NULL)\n    {\n        spriteA.color = ccWHITE;\n        spriteB.color\
    \ = ccWHITE;\n    }\n}\n```\n\n`b2Contact` contains all the contact information,\
    \ including two sets of everything suffixed with `A` and `B`. These are the two\
    \ contacting bodies; no differentiation is made as to which is colliding with\
    \ the other—they are both simply colliding with each other. If, for example, you\
    \ have an enemy colliding with a player's bullet, you would want to damage the\
    \ enemy, not the bullet. It is up to you to determine which is which. Also keep\
    \ in mind that the contact methods may be called multiple times per frame, once\
    \ for each contact pair.\n\nIt's a bit convoluted to get to the sprite from the\
    \ contact through the fixture to the body and then get the user data from that.\
    \ The Box2D API reference certainly helps you find your way through the hierarchy,\
    \ and with a little experience this will become second nature.\n\nTo actually\
    \ get the `ContactListener` connected with Box2D, you have to add it to the world.\
    \ In `HelloWorldScene`, import the `ContactListener.h` header file and add a `ContactListener*\
    \ contactListener` to the class as a member variable:\n\n```\n#import \"cocos2d.h\"\
    \n#import \"Box2D.h\"\n#import \"GLES-Render.h\"\n\n#import \"ContactListener.h\"\
    \n\n...\n\n@interface HelloWorld : CCLayer\n{\n    b2World* world;\n    ContactListener*\
    \ contactListener;\n}\n\n...\n\n@end\n```\n\nIn the `init` method of `HelloWorldScene`,\
    \ you can then create a new `ContactListener` instance and set it as the contact\
    \ listener for the world:\n\n```\ncontactListener = new ContactListener();\nworld->SetContactListener(contactListener);\n\
    ```\n\nWhat remains is to delete the `contactListener` in the `dealloc` method\
    \ to free its memory:\n\n```\n-(void) dealloc\n{\n    delete contactListener;\n\
    \    delete world;\n\n    [super dealloc];\n}\n```\n\nNow the boxes in the PhysicsBox2D02\
    \ project will be tinted purple whenever they touch other boxes.\n\n### Joint\
    \ Venture\n\nWith joints, you can connect bodies together. The type of joint determines\
    \ which way the connected bodies are connected. In this example method, I create\
    \ four bodies total. Three are dynamic bodies connected to each other using a\
    \ *revolute joint*, which keeps the bodies at the same distance but allows them\
    \ to rotate 360 degrees around each other. If you find it hard to imagine how\
    \ these objects might behave, you should try them in the PhysicsBox2D02 project.\
    \ In this case, working code can explain it better than words or a static image\
    \ could. The fourth body is a static body to which one of the dynamic bodies is\
    \ also attached using a revolute joint.\n\n```\n-(void) addSomeJoinedBodies:(CGPoint)pos\n\
    {\n    // Create a body definition and set it to be a dynamic body\n    b2BodyDef\
    \ bodyDef;\n    bodyDef.type = b2_dynamicBody;\n\n    // Position must be converted\
    \ to meters\n    bodyDef.position = [self toMeters:pos];\n    bodyDef.position\
    \ = bodyDef.position + b2Vec2(-1, -1);\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n\
    \    b2Body* bodyA = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyA];\n\
    \n    bodyDef.position = [self toMeters:pos];\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n\
    \    b2Body* bodyB = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyB];\n\
    \n    bodyDef.position = [self toMeters:pos];\n    bodyDef.position = bodyDef.position\
    \ + b2Vec2(1, 1);\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n    b2Body*\
    \ bodyC = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyC];\n\n\
    \    // Create the revolute joints\n    b2RevoluteJointDef jointDef;\n    jointDef.Initialize(bodyA,\
    \ bodyB, bodyB->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n    jointDef.Initialize(bodyB, bodyC, bodyC->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n    // Create an invisible static body and attach body A to it\n    bodyDef.type\
    \ = b2_staticBody;\n    bodyDef.position = [self toMeters:pos];\n    b2Body* staticBody\
    \ = world->CreateBody(&bodyDef);\n\n    jointDef.Initialize(staticBody, bodyA,\
    \ bodyA->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n`b2BodyDef` is reused for all bodies; only the position is modified\
    \ for each body, and a random `CCSprite` is created and assigned as `userData`.\
    \ The `addRandomSpriteAt` method contains the code that creates a sprite from\
    \ the `CCSpriteBatchNode`, as discussed earlier. Since in the `addSomeJoinedBodies`\
    \ method there are now several sprites needed, it made sense to refactor the creation\
    \ of a sprite into the method `addRandomSpriteAt`.\n\n`b2RevoluteJointDef` is\
    \ filled with data by using the `Initialize` method providing two bodies to connect\
    \ to each other and a coordinate where the joint is located. By using one body's\
    \ `GetWorldCenter` coordinate, that body will be centered on the joint and allowed\
    \ only to rotate around itself.\n\nThe joint is created by the `CreateJoint` method\
    \ of the `b2World` class. Even though the `HelloWorldScene` class in the PhysicsBox2D02\
    \ project has a `b2World` member variable, I wanted to illustrate that you can\
    \ also get the world through any body—it doesn't matter which one—by using the\
    \ body's `GetWorld` method. This is good to know, because in the `ContactListener`\
    \ discussed earlier, you do not have a `b2World` member variable, so you'll have\
    \ to get the `b2World` pointer through one of the contact bodies."
  raw: '#### Collision Detection


    Box2D has a `b2ContactListener` class, which you are supposed to subclass if you
    want to receive collision callbacks. The following code refers to the PhysicsBox2D02
    project.


    Create a new class in Xcode and name it `ContactListener`. Then rename the implementation
    file to ContactListener.mm so it has the file extension .mm. Then you will be
    able to use both C++ and Objective-C code in the same file. [Listing 12–6](#Chapter12.html#list_12_6)
    shows the `ContactListener` header file.


    **Listing 12–6.** *The ContactListener Class''s Interface*


    `#import "Box2D.h"`


    `class ContactListener : public b2ContactListener`

    `{`

    `private:`

    `    void BeginContact(b2Contact* contact);`

    `    void EndContact(b2Contact* contact);`

    `};`


    It''s a C++ class, so the class definition is a little different. Note the trailing
    semicolon after the last bracket. It''s a common error to forget that semicolon.
    The `BeginContact` and `EndContact` methods are defined by Box2D and get called
    whenever there is a collision between two bodies.


    In the implementation, I merely change the sprite''s colors to magenta while the
    two bodies are in contact and set it back to white when they are no longer in
    contact, as shown in [Listing 12–7](#Chapter12.html#list_12_7).


    **Listing 12–7.** *Checking for the Beginning and Ending of Collisions*


    `#import "ContactListener.h"`

    `#import "cocos2d.h"`


    `void ContactListener::BeginContact(b2Contact* contact)`

    `{`

    `    b2Body* bodyA = contact->GetFixtureA()->GetBody();`

    `    b2Body* bodyB = contact->GetFixtureB()->GetBody();`

    `    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();`

    `    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();`


    `    if (spriteA != NULL && spriteB != NULL)`

    `    {`

    `        spriteA.color = ccMAGENTA;`

    `        spriteB.color = ccMAGENTA;`

    `    }`

    `}`


    `void ContactListener::EndContact(b2Contact* contact)`

    `{`

    `    b2Body* bodyA = contact->GetFixtureA()->GetBody();`

    `    b2Body* bodyB = contact->GetFixtureB()->GetBody();`

    `    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();`

    `    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();`


    `    if (spriteA != NULL && spriteB != NULL)`

    `    {`

    `        spriteA.color = ccWHITE;`

    `        spriteB.color = ccWHITE;`

    `    }`

    `}`


    `b2Contact` contains all the contact information, including two sets of everything
    suffixed with `A` and `B`. These are the two contacting bodies; no differentiation
    is made as to which is colliding with the other—they are both simply colliding
    with each other. If, for example, you have an enemy colliding with a player''s
    bullet, you would want to damage the enemy, not the bullet. It is up to you to
    determine which is which. Also keep in mind that the contact methods may be called
    multiple times per frame, once for each contact pair.


    It''s a bit convoluted to get to the sprite from the contact through the fixture
    to the body and then get the user data from that. The Box2D API reference certainly
    helps you find your way through the hierarchy, and with a little experience this
    will become second nature.


    To actually get the `ContactListener` connected with Box2D, you have to add it
    to the world. In `HelloWorldScene`, import the ContactListener.h header file and
    add a `ContactListener* contactListener` to the class as a member variable:


    `#import "cocos2d.h"`

    `#import "Box2D.h"`

    `#import "GLES-Render.h"`


    **`#import "ContactListener.h"`**


    `...`


    `@interface HelloWorld : CCLayer`

    `{`

    `    b2World* world;`

    **`    ContactListener* contactListener;`**

    `}`


    `...`


    `@end`


    In the `init` method of `HelloWorldScene`, you can then create a new `ContactListener`
    instance and set it as the contact listener for the world:


    `contactListener = new ContactListener();`

    `world->SetContactListener(contactListener);`


    What remains is to delete the `contactListener` in the `dealloc` method to free
    its memory:


    `-(void) dealloc`

    `{`

    `    delete contactListener;`

    `    delete world;`


    `    [super dealloc];`

    `}`


    Now the boxes in the PhysicsBox2D02 project will be tinted purple whenever they
    touch other boxes.


    #### Joint Venture


    With joints, you can connect bodies together. The type of joint determines which
    way the connected bodies are connected. In this example method, I create four
    bodies total. Three are dynamic bodies connected to each other using a *revolute
    joint*, which keeps the bodies at the same distance but allows them to rotate
    360 degrees around each other. If you find it hard to imagine how these objects
    might behave, you should try them in the PhysicsBox2D02 project. In this case,
    working code can explain it better than words or a static image could. The fourth
    body is a static body to which one of the dynamic bodies is also attached using
    a revolute joint.


    `-(void) addSomeJoinedBodies:(CGPoint)pos`

    `{`

    `    // Create a body definition and set it to be a dynamic body`

    `    b2BodyDef bodyDef;`

    `    bodyDef.type = b2_dynamicBody;`


    `    // Position must be converted to meters`

    `    bodyDef.position = [self toMeters:pos];`

    `    bodyDef.position = bodyDef.position + b2Vec2(-1, -1);`

    `    bodyDef.userData = [self addRandomSpriteAt:pos];`

    `    b2Body* bodyA = world->CreateBody(&bodyDef);`

    `    [self bodyCreateFixture:bodyA];`


    `    bodyDef.position = [self toMeters:pos];`

    `    bodyDef.userData = [self addRandomSpriteAt:pos];`

    `    b2Body* bodyB = world->CreateBody(&bodyDef);`

    `    [self bodyCreateFixture:bodyB];`


    `    bodyDef.position = [self toMeters:pos];`

    `    bodyDef.position = bodyDef.position + b2Vec2(1, 1);`

    `    bodyDef.userData = [self addRandomSpriteAt:pos];`

    `    b2Body* bodyC = world->CreateBody(&bodyDef);`

    `    [self bodyCreateFixture:bodyC];`


    `    // Create the revolute joints`

    `    b2RevoluteJointDef jointDef;`

    `    jointDef.Initialize(bodyA, bodyB, bodyB->GetWorldCenter());`

    `    bodyA->GetWorld()->CreateJoint(&jointDef);`


    `    jointDef.Initialize(bodyB, bodyC, bodyC->GetWorldCenter());`

    `    bodyA->GetWorld()->CreateJoint(&jointDef);`


    `    // Create an invisible static body and attach body A to it`

    `    bodyDef.type = b2_staticBody;`

    `    bodyDef.position = [self toMeters:pos];`

    `    b2Body* staticBody = world->CreateBody(&bodyDef);`


    `    jointDef.Initialize(staticBody, bodyA, bodyA->GetWorldCenter());`

    `    bodyA->GetWorld()->CreateJoint(&jointDef);`

    `}`


    `b2BodyDef` is reused for all bodies; only the position is modified for each body,
    and a random `CCSprite` is created and assigned as `userData`. The `addRandomSpriteAt`
    method contains the code that creates a sprite from the `CCSpriteBatchNode`, as
    discussed earlier. Since in the `addSomeJoinedBodies` method there are now several
    sprites needed, it made sense to refactor the creation of a sprite into the method
    `addRandomSpriteAt`.


    `b2RevoluteJointDef` is filled with data by using the `Initialize` method providing
    two bodies to connect to each other and a coordinate where the joint is located.
    By using one body''s `GetWorldCenter` coordinate, that body will be centered on
    the joint and allowed only to rotate around itself.


    The joint is created by the `CreateJoint` method of the `b2World` class. Even
    though the `HelloWorldScene` class in the PhysicsBox2D02 project has a `b2World`
    member variable, I wanted to illustrate that you can also get the world through
    any body—it doesn''t matter which one—by using the body''s `GetWorld` method.
    This is good to know, because in the `ContactListener` discussed earlier, you
    do not have a `b2World` member variable, so you''ll have to get the `b2World`
    pointer through one of the contact bodies.'
  trans: "\n### 碰撞检测\n\nBox2D 提供了一个 `b2ContactListener` 类，如果你想接收碰撞回调，就需要继承该类。以下代码参考了\
    \ PhysicsBox2D02 项目。\n\n在 Xcode 中新建一个类，命名为 `ContactListener`。然后将实现文件重命名为 `ContactListener.mm`，使其扩展名为\
    \ `.mm`。这样你就可以在同一个文件中同时使用 C++ 和 Objective-C 代码。代码清单 12-6 展示了 `ContactListener`\
    \ 的头文件。\n\n**代码清单 12-6.** *ContactListener 类的接口*\n\n```\n#import \"Box2D.h\"\n\
    \nclass ContactListener : public b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact*\
    \ contact);\n    void EndContact(b2Contact* contact);\n};\n```\n\n这是一个 C++ 类，因此类定义略有不同。注意最后一个花括号后面的分号。忘记这个分号是常见的错误。`BeginContact`\
    \ 和 `EndContact` 方法由 Box2D 定义，当两个物体之间发生碰撞时会被调用。\n\n在实现中，当两个物体接触时，我只是将精灵的颜色改为洋红色；当它们不再接触时，再将其恢复为白色，如代码清单\
    \ 12-7 所示。\n\n**代码清单 12-7.** *检测碰撞的开始与结束*\n\n```\n#import \"ContactListener.h\"\
    \n#import \"cocos2d.h\"\n\nvoid ContactListener::BeginContact(b2Contact* contact)\n\
    {\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body* bodyB =\
    \ contact->GetFixtureB()->GetBody();\n    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();\n\
    \    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();\n\n    if (spriteA !=\
    \ NULL && spriteB != NULL)\n    {\n        spriteA.color = ccMAGENTA;\n      \
    \  spriteB.color = ccMAGENTA;\n    }\n}\n\nvoid ContactListener::EndContact(b2Contact*\
    \ contact)\n{\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body*\
    \ bodyB = contact->GetFixtureB()->GetBody();\n    CCSprite* spriteA = (CCSprite*)bodyA->GetUserData();\n\
    \    CCSprite* spriteB = (CCSprite*)bodyB->GetUserData();\n\n    if (spriteA !=\
    \ NULL && spriteB != NULL)\n    {\n        spriteA.color = ccWHITE;\n        spriteB.color\
    \ = ccWHITE;\n    }\n}\n```\n\n`b2Contact` 包含所有接触信息，包括两组以 `A` 和 `B` 为后缀的数据。这两个是接触的物体；不区分哪个与哪个碰撞——它们只是彼此碰撞。例如，如果你有一个敌人与玩家的子弹碰撞，你可能希望伤害敌人，而不是子弹。你需要自行判断哪个是哪个。另请注意，接触方法每帧可能被多次调用，每个接触对调用一次。\n\
    \n从接触对象出发，通过夹具到达物体，再从中获取用户数据，这一过程有些复杂。Box2D API 参考文档当然能帮助你理清层次关系，并且稍加实践后，这将变得得心应手。\n\
    \n要让 `ContactListener` 与 Box2D 真正连接起来，你需要将其添加到世界中。在 `HelloWorldScene` 中，导入 `ContactListener.h`\
    \ 头文件，并将 `ContactListener* contactListener` 作为成员变量添加到类中：\n\n```\n#import \"cocos2d.h\"\
    \n#import \"Box2D.h\"\n#import \"GLES-Render.h\"\n\n#import \"ContactListener.h\"\
    \n\n...\n\n@interface HelloWorld : CCLayer\n{\n    b2World* world;\n    ContactListener*\
    \ contactListener;\n}\n\n...\n\n@end\n```\n\n在 `HelloWorldScene` 的 `init` 方法中，你可以创建一个新的\
    \ `ContactListener` 实例，并将其设置为世界的碰撞监听器：\n\n```\ncontactListener = new ContactListener();\n\
    world->SetContactListener(contactListener);\n```\n\n剩下的就是在 `dealloc` 方法中删除 `contactListener`\
    \ 以释放其内存：\n\n```\n-(void) dealloc\n{\n    delete contactListener;\n    delete\
    \ world;\n\n    [super dealloc];\n}\n```\n\n现在，PhysicsBox2D02 项目中的盒子在相互接触时会被染成紫色。\n\
    \n### 关节连接\n\n通过关节，你可以将物体连接在一起。关节的类型决定了连接物体的方式。在下面的示例方法中，我总共创建了四个物体。其中三个是动态物体，通过*旋转关节*相互连接，这种关节使物体保持相同距离，但允许它们彼此\
    \ 360 度旋转。如果你觉得难以想象这些物体的行为，可以在 PhysicsBox2D02 项目中尝试一下。在这种情况下，可运行的代码比文字或静态图像更能说明问题。第四个物体是静态物体，其中一个动态物体也通过旋转关节与其连接。\n\
    \n```\n-(void) addSomeJoinedBodies:(CGPoint)pos\n{\n    // 创建一个物体定义，并将其设置为动态物体\n\
    \    b2BodyDef bodyDef;\n    bodyDef.type = b2_dynamicBody;\n\n    // 位置必须转换为米\n\
    \    bodyDef.position = [self toMeters:pos];\n    bodyDef.position = bodyDef.position\
    \ + b2Vec2(-1, -1);\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n  \
    \  b2Body* bodyA = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyA];\n\
    \n    bodyDef.position = [self toMeters:pos];\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n\
    \    b2Body* bodyB = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyB];\n\
    \n    bodyDef.position = [self toMeters:pos];\n    bodyDef.position = bodyDef.position\
    \ + b2Vec2(1, 1);\n    bodyDef.userData = [self addRandomSpriteAt:pos];\n    b2Body*\
    \ bodyC = world->CreateBody(&bodyDef);\n    [self bodyCreateFixture:bodyC];\n\n\
    \    // 创建旋转关节\n    b2RevoluteJointDef jointDef;\n    jointDef.Initialize(bodyA,\
    \ bodyB, bodyB->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n    jointDef.Initialize(bodyB, bodyC, bodyC->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    \n    // 创建一个不可见的静态物体，并将物体 A 连接到它上面\n    bodyDef.type = b2_staticBody;\n    bodyDef.position\
    \ = [self toMeters:pos];\n    b2Body* staticBody = world->CreateBody(&bodyDef);\n\
    \n    jointDef.Initialize(staticBody, bodyA, bodyA->GetWorldCenter());\n    bodyA->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n`b2BodyDef` 被复用于所有物体；每个物体仅修改位置，并创建一个随机的 `CCSprite` 作为 `userData` 赋予它。`addRandomSpriteAt`\
    \ 方法包含从 `CCSpriteBatchNode` 创建精灵的代码，如前所述。由于在 `addSomeJoinedBodies` 方法中需要多个精灵，因此将精灵的创建重构到\
    \ `addRandomSpriteAt` 方法中是合理的。\n\n通过使用 `Initialize` 方法并提供两个要相互连接的物体以及关节所在的坐标，来填充\
    \ `b2RevoluteJointDef` 的数据。使用一个物体的 `GetWorldCenter` 坐标，该物体将以关节为中心，并且只允许围绕自身旋转。\n\
    \n关节通过 `b2World` 类的 `CreateJoint` 方法创建。尽管 PhysicsBox2D02 项目中的 `HelloWorldScene`\
    \ 类有一个 `b2World` 成员变量，但我想说明的是，你也可以通过任何物体（无论哪个）使用其 `GetWorld` 方法来获取世界。了解这一点很有用，因为在前面讨论的\
    \ `ContactListener` 中，你并没有 `b2World` 成员变量，所以必须通过其中一个接触物体来获取 `b2World` 指针。\n"
- fmt: "### Chipmunk\n\nThe Chipmunk physics engine was developed by Scott Lembcke\
    \ of Howling Moon Software. Chipmunk was actually inspired by an early version\
    \ of Box2D, before it was a full-fledged physics engine. You can download Chipmunk\
    \ from its Google Code site. If you like Chipmunk, you should also consider donating\
    \ to the project, which you can do via the `Donate` button from the same site:\
    \ [`http://code.google.com/p/chipmunk-physics`](http://code.google.com/p/chipmunk-physics).\
    \ The Chipmunk documentation is located on Scott's home page, at [`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs).\
    \ And if you need help, you can find that in the Chipmunk forums: [`www.slembcke.net/forums`](http://www.slembcke.net/forums).\n\
    \n#### Objectified Chipmunk\n\nThere are actually two Objective-C wrappers available\
    \ for Chipmunk, and more are being worked on. I don't discuss them in this book,\
    \ but you should be aware of them and try them.\n\nScott's Objective-C wrapper\
    \ is part of the Chipmunk distribution but works only in the iPhone Simulator.\
    \ To be able to deploy it to the iPhone, you have to buy his Chipmunk Objective-C\
    \ wrapper on the Howling Moon Software web site, at `http://howlingmoonsoftware.com/objectiveChipmunk.php`.\n\
    \nIt's always best to try before you buy, so you can follow this tutorial on how\
    \ to use the Objective-C wrapper for the iPhone Simulator: [`http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk`](http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk).\n\
    \nThe alternative is Chipmunk SpaceManager, written by Robert Blackwood, which\
    \ comes with a free Objective-C wrapper for Chipmunk. However, its main purpose\
    \ is to make integration of Chipmunk with cocos2d easier. If you would like to\
    \ try Chipmunk SpaceManager, you can download it from the following link, where\
    \ you can also donate to the project should you like it: [`http://code.google.com/p/chipmunk-spacemanager`](http://code.google.com/p/chipmunk-spacemanager).\n\
    \nThe SpaceManager API reference can be found on Robert's home page at [`www.mobile-bros.com/spacemanager/docs`](http://www.mobile-bros.com/spacemanager/docs).\n\
    \nBoth the Chipmunk and SpaceManager distributions, including their respective\
    \ documentation files, are also in this chapter's source code folder, in the Physics\
    \ Engine Librariessubfolder.\n\n#### Chipmunks in Space\n\nFor the Chipmunk tutorial,\
    \ I'll be building the same project as before. I'll start with the PhysicsChipmunk01\
    \ project and the initial setup of the Chipmunk physics engine. [Listing 12–8](#Chapter12.html#list_12_8)\
    \ shows the `HelloWorldScene` header file.\n\n**Listing 12–8.** *The Chipmunk\
    \ HelloWorld Interface*\n\n```\n#import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\
    \nenum\n{\n    kTagBatchNode = 1,\n};\n\n@interface HelloWorld : CCLayer\n{\n\
    \    cpSpace* space;\n}\n\n+(id) scene;\n\n@end\n```\n\nThere's nothing unusual\
    \ here, except for the `cpSpace` member variable. Instead of *world*, Chipmunk\
    \ calls its world a *space*. It's a different term for the same thing. The Chipmunk\
    \ space contains all the rigid bodies.\n\nChipmunk is initialized in `HelloWorldScene`'s\
    \ `init` method as follows:\n\n```\ncpInitChipmunk();\n\nspace = cpSpaceNew();\n\
    space->iterations = 8;\nspace->gravity = CGPointMake(0, -100);\n```\n\nThe very\
    \ first thing you must do before using any Chipmunk methods is to call `cpInitChipmunk()`.\
    \ After that, you can create the space with `cpSpaceNew()` and set the number\
    \ of iterations—in this case eight. This is the same iteration count we used for\
    \ velocity iterations in the Box2D example's `update` method. Chipmunk knows only\
    \ one type of iteration—the `elasticIterations` field is deprecated and should\
    \ no longer be used. I mention this in case you are already familiar with Chipmunk.\
    \ You may get away with fewer than eight iterations if your game does not allow\
    \ objects to stack; otherwise, you may find that stacked objects never get to\
    \ rest and keep jittering and sliding for a long period of time.\n\nNotice how\
    \ Chipmunk can use the same `CGPoint` structure used in the iPhone SDK. Chipmunk\
    \ internally uses a structure called `cpVect`, but in cocos2d you can use both\
    \ interchangeably. I use a `CGPoint` to set the gravity to –100, which means downward\
    \ acceleration that is roughly the same as that used in the Box2D project.\n\n\
    Of course, the space also needs to be released in the `dealloc` method; this is\
    \ done by calling `cpSpaceFree()` and passing the space as a parameter:\n\n```\n\
    -(void) dealloc\n{\n    cpSpaceFree(space);\n    [super dealloc];\n}\n```\n\n\
    #### Boxing-In the Boxes\n\nTo keep all the boxes within the boundaries of the\
    \ screen, you need to create a static body whose shape defines the screen area.\
    \ First, the variables for the screen's corners are defined:\n\n```\n// For the\
    \ ground body we'll need these values\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    CGPoint lowerLeftCorner = CGPointMake(0, 0);\nCGPoint lowerRightCorner = CGPointMake(screenSize.width,\
    \ 0);\nCGPoint upperLeftCorner = CGPointMake(0, screenSize.height);\nCGPoint upperRightCorner\
    \ = CGPointMake(screenSize.width, screenSize.height);\n```\n\nContrary to Box2D,\
    \ you do not have to take any pixel-to-meter ratio into account. You can use the\
    \ screen size in pixels as it is to define the corner points and to work with\
    \ Chipmunk bodies in general.\n\nNext you'll create the static body by using the\
    \ `cpBodyNew()` and passing `INFINITY` for both parameters, which makes the body\
    \ a static body. Those parameters are mass and inertia, and with them being set\
    \ to the `INFINITY` value, this body isn't going to go anywhere.\n\n```\n// Create\
    \ the static body that keeps objects within the screen area\nfloat mass = INFINITY;\n\
    float inertia = INFINITY;\ncpBody* staticBody = cpBodyNew(mass, inertia);\n```\n\
    \n**NOTE:** Mass and inertia in Chipmunk are comparable to density and friction\
    \ in Box2D. The difference between inertia and friction is that the former determines\
    \ the resistance of a body to start moving, while the latter determines how much\
    \ motion a body loses when it is in contact with other bodies.\n\nNext, you'll\
    \ define the shape that goes with the body and makes up the screen borders, as\
    \ shown in [Listing 12–9](#Chapter12.html#list_12_9).\n\n**Listing 12–9.** *Creating\
    \ the Screen Border Collisions*\n\n```\ncpShape* shape;\nfloat elasticity = 1.0f;\n\
    float friction = 1.0f;\nfloat radius = 0.0f;\n\n// Bottom\nshape = cpSegmentShapeNew(staticBody,\
    \ lowerLeftCorner, lowerRightCorner, radius);\nshape->e = elasticity;\nshape->u\
    \ = friction;\ncpSpaceAddStaticShape(space, shape);\n\n// Top\nshape = cpSegmentShapeNew(staticBody,\
    \ upperLeftCorner, upperRightCorner, radius);\nshape->e = elasticity;\nshape->u\
    \ = friction;\ncpSpaceAddStaticShape(space, shape);\n\n// Left side\nshape = cpSegmentShapeNew(staticBody,\
    \ lowerLeftCorner, upperLeftCorner, radius);\nshape->e = elasticity;\nshape->u\
    \ = friction;\ncpSpaceAddStaticShape(space, shape);\n\n// Right side\nshape =\
    \ cpSegmentShapeNew(staticBody, lowerRightCorner, upperRightCorner, radius);\n\
    shape->e = elasticity;\nshape->u = friction;\ncpSpaceAddStaticShape(space, shape);\n\
    ```\n\nThe `cpSegmentShapeNew()` method is used to create four new line segments\
    \ to define the sides of the screen area. The `shape` variable is reused for convenience,\
    \ but it requires you to set *elasticity* (which is the same as restitution) and\
    \ friction after each call to `cpSegmentShapeNew()`. Then each shape is added\
    \ to the space as a static shape via the `cpSpaceAddStaticShape()` method.\n\n\
    **NOTE:** In Chipmunk you will have to work with one-letter fields like `e` and\
    \ `u` regularly. Personally, I find that this makes it hard to pick up Chipmunk\
    \ because you don't immediately grasp the meaning of these fields, and you have\
    \ to refer to the Chipmunk documentation more often than necessary."
  raw: '### Chipmunk


    The Chipmunk physics engine was developed by Scott Lembcke of Howling Moon Software.
    Chipmunk was actually inspired by an early version of Box2D, before it was a full-fledged
    physics engine. You can download Chipmunk from its Google Code site. If you like
    Chipmunk, you should also consider donating to the project, which you can do via
    the `Donate` button from the same site: [`http://code.google.com/p/chipmunk-physics`](http://code.google.com/p/chipmunk-physics).
    The Chipmunk documentation is located on Scott''s home page, at [`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs).
    And if you need help, you can find that in the Chipmunk forums: [`www.slembcke.net/forums`](http://www.slembcke.net/forums).


    #### Objectified Chipmunk


    There are actually two Objective-C wrappers available for Chipmunk, and more are
    being worked on. I don''t discuss them in this book, but you should be aware of
    them and try them.


    Scott''s Objective-C wrapper is part of the Chipmunk distribution but works only
    in the iPhone Simulator. To be able to deploy it to the iPhone, you have to buy
    his Chipmunk Objective-C wrapper on the Howling Moon Software web site, at `http://howlingmoonsoftware.com/objectiveChipmunk.php`.


    It''s always best to try before you buy, so you can follow this tutorial on how
    to use the Objective-C wrapper for the iPhone Simulator: [`http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk`](http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk).


    The alternative is Chipmunk SpaceManager, written by Robert Blackwood, which comes
    with a free Objective-C wrapper for Chipmunk. However, its main purpose is to
    make integration of Chipmunk with cocos2d easier. If you would like to try Chipmunk
    SpaceManager, you can download it from the following link, where you can also
    donate to the project should you like it: [`http://code.google.com/p/chipmunk-spacemanager`](http://code.google.com/p/chipmunk-spacemanager).


    The SpaceManager API reference can be found on Robert''s home page at [`www.mobile-bros.com/spacemanager/docs`](http://www.mobile-bros.com/spacemanager/docs).


    Both the Chipmunk and SpaceManager distributions, including their respective documentation
    files, are also in this chapter''s source code folder, in the Physics Engine Librariessubfolder.


    #### Chipmunks in Space


    For the Chipmunk tutorial, I''ll be building the same project as before. I''ll
    start with the PhysicsChipmunk01 project and the initial setup of the Chipmunk
    physics engine. [Listing 12–8](#Chapter12.html#list_12_8) shows the `HelloWorldScene`
    header file.


    **Listing 12–8.** *The Chipmunk HelloWorld Interface*


    `#import "cocos2d.h"`

    `#import "chipmunk.h"`


    `enum`

    `{`

    `    kTagBatchNode = 1,`

    `};`


    `@interface HelloWorld : CCLayer`

    `{`

    `    cpSpace* space;`

    `}`


    `+(id) scene;`


    `@end`


    There''s nothing unusual here, except for the `cpSpace` member variable. Instead
    of *world*, Chipmunk calls its world a *space*. It''s a different term for the
    same thing. The Chipmunk space contains all the rigid bodies.


    Chipmunk is initialized in `HelloWorldScene`''s `init` method as follows:


    `cpInitChipmunk();`


    `space = cpSpaceNew();`

    `space->iterations = 8;`

    `space->gravity = CGPointMake(0, -100);`


    The very first thing you must do before using any Chipmunk methods is to call
    `cpInitChipmunk`. After that, you can create the space with `cpSpaceNew` and set
    the number of iterations—in this case eight. This is the same iteration count
    we used for velocity iterations in the Box2D example''s `update` method. Chipmunk
    knows only one type of iteration—the `elasticIterations` field is deprecated and
    should no longer be used. I mention this in case you are already familiar with
    Chipmunk. You may get away with fewer than eight iterations if your game does
    not allow objects to stack; otherwise, you may find that stacked objects never
    get to rest and keep jittering and sliding for a long period of time.


    Notice how Chipmunk can use the same `CGPoint` structure used in the iPhone SDK.
    Chipmunk internally uses a structure called `cpVect`, but in cocos2d you can use
    both interchangeably. I use a `CGPoint` to set the gravity to –100, which means
    downward acceleration that is roughly the same as that used in the Box2D project.


    Of course, the space also needs to be released in the `dealloc` method; this is
    done by calling `cpSpaceFree` and passing the space as a parameter:


    `-(void) dealloc`

    `{`

    `    cpSpaceFree(space);`

    `    [super dealloc];`

    `}`


    #### Boxing-In the Boxes


    To keep all the boxes within the boundaries of the screen, you need to create
    a static body whose shape defines the screen area. First, the variables for the
    screen''s corners are defined:


    `// For the ground body we''ll need these values`

    `CGSize screenSize = [CCDirector sharedDirector].winSize;`

    `CGPoint lowerLeftCorner = CGPointMake(0, 0);`

    `CGPoint lowerRightCorner = CGPointMake(screenSize.width, 0);`

    `CGPoint upperLeftCorner = CGPointMake(0, screenSize.height);`

    `CGPoint upperRightCorner = CGPointMake(screenSize.width, screenSize.height);`


    Contrary to Box2D, you do not have to take any pixel-to-meter ratio into account.
    You can use the screen size in pixels as it is to define the corner points and
    to work with Chipmunk bodies in general.


    Next you''ll create the static body by using the `cpBodyNew` and passing `INFINITY`
    for both parameters, which makes the body a static body. Those parameters are
    mass and inertia, and with them being set to the `INFINITY` value, this body isn''t
    going to go anywhere.


    `// Create the static body that keeps objects within the screen area`

    `float mass = INFINITY;`

    `float inertia = INFINITY;`

    `cpBody* staticBody = cpBodyNew(mass, inertia);`


    **NOTE:** Mass and inertia in Chipmunk are comparable to density and friction
    in Box2D. The difference between inertia and friction is that the former determines
    the resistance of a body to start moving, while the latter determines how much
    motion a body loses when it is in contact with other bodies.


    Next, you''ll define the shape that goes with the body and makes up the screen
    borders, as shown in [Listing 12–9](#Chapter12.html#list_12_9).


    **Listing 12–9.** *Creating the Screen Border Collisions*


    `cpShape* shape;`

    `float elasticity = 1.0f;`

    `float friction = 1.0f;`

    `float radius = 0.0f;`


    `// Bottom`

    `shape = cpSegmentShapeNew(staticBody, lowerLeftCorner, lowerRightCorner, radius);`

    `shape->e = elasticity;`

    `shape->u = friction;`

    `cpSpaceAddStaticShape(space, shape);`


    `// Top`

    `shape = cpSegmentShapeNew(staticBody, upperLeftCorner, upperRightCorner, radius);`

    `shape->e = elasticity;`

    `shape->u = friction;`

    `cpSpaceAddStaticShape(space, shape);`


    `// Left side`

    `shape = cpSegmentShapeNew(staticBody, lowerLeftCorner, upperLeftCorner, radius);`

    `shape->e = elasticity;`

    `shape->u = friction;`

    `cpSpaceAddStaticShape(space, shape);`


    `// Right side`

    `shape = cpSegmentShapeNew(staticBody, lowerRightCorner, upperRightCorner, radius);`

    `shape->e = elasticity;`

    `shape->u = friction;`

    `cpSpaceAddStaticShape(space, shape);`


    The `cpSegmentShapeNew` method is used to create four new line segments to define
    the sides of the screen area. The `shape` variable is reused for convenience,
    but it requires you to set *elasticity* (which is the same as restitution) and
    friction after each call to `cpSegmentShapeNew`. Then each shape is added to the
    space as a static shape via the `cpSpaceAddStaticShape` method.


    **NOTE:** In Chipmunk you will have to work with one-letter fields like `e` and
    `u` regularly. Personally, I find that this makes it hard to pick up Chipmunk
    because you don''t immediately grasp the meaning of these fields, and you have
    to refer to the Chipmunk documentation more often than necessary.'
  trans: "\n### 花栗鼠\n\n**花栗鼠**物理引擎由 Howling Moon Software 的 Scott Lembcke 开发。实际上，花栗鼠的灵感来源于\
    \ Box2D 的早期版本，当时它还并非一个完整的物理引擎。你可以从其 Google Code 网站下载花栗鼠。如果你喜欢花栗鼠，还应考虑向该项目捐款，可通过同一网站上的`Donate`按钮进行捐赠：[`http://code.google.com/p/chipmunk-physics`](http://code.google.com/p/chipmunk-physics)。花栗鼠的文档位于\
    \ Scott 的个人主页，网址为：[`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs)。如果需要帮助，可以在花栗鼠论坛中找到：[`www.slembcke.net/forums`](http://www.slembcke.net/forums)。\n\
    \n#### 面向对象的花栗鼠\n\n实际上，花栗鼠有两种现成的 Objective-C 封装器可用，而且还有更多正在开发中。本书不讨论它们，但你应当了解并尝试它们。\n\
    \nScott 的 Objective-C 封装器是花栗鼠发行版的一部分，但仅适用于 iPhone 模拟器。要将其部署到 iPhone 上，你必须在 Howling\
    \ Moon Software 网站上购买他的花栗鼠 Objective-C 封装器，网址为 `http://howlingmoonsoftware.com/objectiveChipmunk.php`。\n\
    \n在购买前先试用总是最好的，因此你可以按照本教程学习如何在 iPhone 模拟器上使用 Objective-C 封装器：[`http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk`](http://files.slembcke.net/chipmunk/tutorials/SimpleObjectiveChipmunk)。\n\
    \n另一种选择是 Chipmunk SpaceManager，由 Robert Blackwood 编写，它附带了花栗鼠的免费 Objective-C 封装器。然而，其主要目的是简化花栗鼠与\
    \ cocos2d 的集成。如果你想尝试 Chipmunk SpaceManager，可以通过以下链接下载，如果你喜欢它，也可以在此处向该项目捐款：[`http://code.google.com/p/chipmunk-spacemanager`](http://code.google.com/p/chipmunk-spacemanager)。\n\
    \nSpaceManager 的 API 参考文档可在 Robert 的个人主页找到，网址为 [`www.mobile-bros.com/spacemanager/docs`](http://www.mobile-bros.com/spacemanager/docs)。\n\
    \n花栗鼠和 SpaceManager 的发行版（包括各自的文档文件）也位于本章源代码文件夹的 Physics Engine Libraries 子文件夹中。\n\
    \n#### 太空中的花栗鼠\n\n对于花栗鼠教程，我将构建与之前相同的项目。我将从 PhysicsChipmunk01 项目开始，并进行花栗鼠物理引擎的初始设置。代码清单\
    \ 12–8 展示了 `HelloWorldScene` 头文件。\n\n**代码清单 12–8.** *花栗鼠 HelloWorld 接口*\n\n```\n\
    #import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\nenum\n{\n    kTagBatchNode =\
    \ 1,\n};\n\n@interface HelloWorld : CCLayer\n{\n    cpSpace* space;\n}\n\n+(id)\
    \ scene;\n\n@end\n```\n\n这里没什么特别之处，除了 `cpSpace` 成员变量。花栗鼠将其世界称为 *space*（空间），而不是\
    \ *world*。这是同一事物的不同术语。花栗鼠空间包含了所有刚体。\n\n花栗鼠在 `HelloWorldScene` 的 `init` 方法中按如下方式初始化：\n\
    \n```\ncpInitChipmunk();\n\nspace = cpSpaceNew();\nspace->iterations = 8;\nspace->gravity\
    \ = CGPointMake(0, -100);\n```\n\n在使用任何花栗鼠方法之前，你必须做的第一件事是调用 `cpInitChipmunk()`。之后，你可以使用\
    \ `cpSpaceNew()` 创建空间，并设置迭代次数——此处为八次。这与我们在 Box2D 示例的 `update` 方法中用于速度迭代的次数相同。花栗鼠只认一种迭代类型——`elasticIterations`\
    \ 字段已弃用，不应再使用。我提到这一点，以防你已熟悉花栗鼠。如果你的游戏不允许物体堆叠，你可以使用少于八次迭代；否则，你可能会发现堆叠的物体永远无法静止，并会持续抖动和滑动很长时间。\n\
    \n请注意花栗鼠如何使用与 iPhone SDK 中相同的 `CGPoint` 结构体。花栗鼠内部使用一个名为 `cpVect` 的结构体，但在 cocos2d\
    \ 中，你可以互换使用两者。我使用 `CGPoint` 将重力设置为 –100，这意味着向下加速度，大致相当于 Box2D 项目中使用的值。\n\n当然，空间也需要在\
    \ `dealloc` 方法中释放；这是通过调用 `cpSpaceFree()` 并将空间作为参数传递来完成的：\n\n```\n-(void) dealloc\n\
    {\n    cpSpaceFree(space);\n    [super dealloc];\n}\n```\n\n#### 框定边界\n\n为了将所有方块保持在屏幕边界内，你需要创建一个静态物体，其形状定义了屏幕区域。首先，定义屏幕角落的变量：\n\
    \n```\n// 对于地面物体，我们需要这些值\nCGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    CGPoint lowerLeftCorner = CGPointMake(0, 0);\nCGPoint lowerRightCorner = CGPointMake(screenSize.width,\
    \ 0);\nCGPoint upperLeftCorner = CGPointMake(0, screenSize.height);\nCGPoint upperRightCorner\
    \ = CGPointMake(screenSize.width, screenSize.height);\n```\n\n与 Box2D 相反，你无需考虑任何像素-米比率。你可以直接使用屏幕尺寸（以像素为单位）来定义角落点，并一般性地用于处理花栗鼠物体。\n\
    \n接下来，你将使用 `cpBodyNew()` 创建静态物体，并为两个参数传递 `INFINITY`，这使得该物体成为静态物体。这些参数是质量和惯性矩，当它们设置为\
    \ `INFINITY` 值时，该物体不会移动。\n\n```\n// 创建将物体保持在屏幕区域内的静态物体\nfloat mass = INFINITY;\n\
    float inertia = INFINITY;\ncpBody* staticBody = cpBodyNew(mass, inertia);\n```\n\
    \n**注意：** 花栗鼠中的质量和惯性矩相当于 Box2D 中的密度和摩擦系数。惯性矩与摩擦系数的区别在于，前者决定了物体开始移动的阻力，而后者决定了物体与其他物体接触时损失的运动量。\n\
    \n接下来，你将定义与物体关联并构成屏幕边界的形状，如代码清单 12–9 所示。\n\n**代码清单 12–9.** *创建屏幕边界碰撞*\n\n```\n\
    cpShape* shape;\nfloat elasticity = 1.0f;\nfloat friction = 1.0f;\nfloat radius\
    \ = 0.0f;\n\n// 底部\nshape = cpSegmentShapeNew(staticBody, lowerLeftCorner, lowerRightCorner,\
    \ radius);\nshape->e = elasticity;\nshape->u = friction;\ncpSpaceAddStaticShape(space,\
    \ shape);\n\n// 顶部\nshape = cpSegmentShapeNew(staticBody, upperLeftCorner, upperRightCorner,\
    \ radius);\nshape->e = elasticity;\nshape->u = friction;\ncpSpaceAddStaticShape(space,\
    \ shape);\n\n// 左侧\nshape = cpSegmentShapeNew(staticBody, lowerLeftCorner, upperLeftCorner,\
    \ radius);\nshape->e = elasticity;\nshape->u = friction;\ncpSpaceAddStaticShape(space,\
    \ shape);\n\n// 右侧\nshape = cpSegmentShapeNew(staticBody, lowerRightCorner, upperRightCorner,\
    \ radius);\nshape->e = elasticity;\nshape->u = friction;\ncpSpaceAddStaticShape(space,\
    \ shape);\n```\n\n`cpSegmentShapeNew()` 方法用于创建四个新的线段，以定义屏幕区域的边。为了简便起见，`shape`\
    \ 变量被重复使用，但这要求你在每次调用 `cpSegmentShapeNew()` 后设置*弹性*（等同于恢复系数）和摩擦系数。然后，通过 `cpSpaceAddStaticShape()`\
    \ 方法将每个形状作为静态形状添加到空间中。\n\n**注意：** 在花栗鼠中，你将经常需要处理像 `e` 和 `u` 这样的单字母字段。就个人而言，我发现这使得上手花栗鼠变得困难，因为你不能立即理解这些字段的含义，而且不得不比预期更频繁地查阅花栗鼠文档。\n"
- fmt: "#### Adding Ticky-Tacky Little Boxes\n\nTo add boxes to the world, I used\
    \ the same code in the `init` method of `HelloWorldScene` as in the Box2D example.\
    \ Refer to [Listing 12–3](#Chapter12.html#list_12_3) if you'd like to refresh\
    \ your memory.\n\nI'll go straight to creating the dynamic body for new boxes,\
    \ which is what the `addNewSpriteAt` method does ([Listing 12–10](#Chapter12.html#list_12_10)).\n\
    \n**Listing 12–10.** *Adding a Body with a Sprite, Chipmunk Style*\n\n```\n-(void)\
    \ addNewSpriteAt:(CGPoint)pos\n{\n    float mass = 0.5f;\n    float moment = cpMomentForBox(mass,\
    \ TILESIZE, TILESIZE);\n    cpBody* body = cpBodyNew(mass, moment);\n\n    body->p\
    \ = pos;\n    cpSpaceAddBody(space, body);\n\n    float halfTileSize = TILESIZE\
    \ * 0.5f;\n    int numVertices = 4;\n    CGPoint vertices[] =\n    {\n       \
    \ CGPointMake(-halfTileSize, -halfTileSize),\n        CGPointMake(-halfTileSize,\
    \ halfTileSize),\n        CGPointMake(halfTileSize, halfTileSize),\n        CGPointMake(halfTileSize,\
    \ -halfTileSize),\n    };\n\n    CGPoint offset = CGPointZero;\n    float elasticity\
    \ = 0.3f;\n    float friction = 0.7f;\n\n    cpShape* shape = cpPolyShapeNew(body,\
    \ numVertices, vertices, offset);\n    shape->e = elasticity;\n    shape->u =\
    \ friction;\n    shape->data = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space,\
    \ shape);\n}\n```\n\nThe dynamic body for the box is created with the `cpBodyNew`\
    \ method with the given mass and a *moment of inertia*. The moment of inertia\
    \ determines the resistance of a body to move, and it's calculated by the helper\
    \ method `cpMomentForBox`, which takes the body's mass and the size of the box—in\
    \ this case `TILESIZE`—which makes it a 32×32-pixel box.\n\nThe body's position,\
    \ `p`, is then updated, and the body is added to the space via the `cpSpaceAddBody`\
    \ method. Note that contrary to Box2D, you do not have to convert pixels to meters;\
    \ you can work with pixel coordinates directly.\n\nThen a list of vertices are\
    \ created, which will become the corners of the box shape. Because the corner\
    \ positions are positioned relative to the center of the box we're creating, they\
    \ are all half a tile's size away from the center. Otherwise, the box shape would\
    \ be twice as big as the tile.\n\nThe `cpPolyShapeNew` method then takes the body\
    \ as input, the `vertices` array, and the number of vertices in the array, as\
    \ well as an optional offset, which is set to `CGPointZero` in this case. Out\
    \ comes a new `cpShape` pointer for the box shape. The shape's elasticity and\
    \ friction are set to values that give a similar behavior to the Box2D boxes,\
    \ and after the sprite is set as user data to the data field, the shape is added\
    \ to the space via `cpSpaceAddShape`.\n\nThe `addRandomSpriteAt` method in [Listing\
    \ 12–11](#Chapter12.html#list_12_11) simply creates the `CCSprite` object that\
    \ goes along with the new dynamic body.\n\n**Listing 12–11.** *Creating New Box\
    \ Objects with Random Images*\n\n```\n-(CCSprite*) addRandomSpriteAt:(CGPoint)pos\n\
    {\n    CCSpriteBatchNode* batch = (CCSpriteBatchNode*)[self getChildByTag:kTagBatchNode];\n\
    \n    int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n    int idy = CCRANDOM_0_1()\
    \ * TILESET_ROWS;\n    CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE *\
    \ idy, TILESIZE, TILESIZE);\n    CCSprite* sprite = [CCSprite spriteWithBatchNode:batch\
    \ rect:tileRect];\n    sprite.position = pos;\n    [batch addChild:sprite];\n\n\
    \    return sprite;\n}\n```\n\n#### Updating the Boxes' Sprites\n\nJust like with\
    \ Box2D, you have to update the sprite's position and rotation to be in line with\
    \ their dynamic body's position and rotation every frame. Again, this is done\
    \ in the `update` method:\n\n```\n-(void) update:(ccTime)delta\n{\n    float timeStep\
    \ = 0.03f;\n    cpSpaceStep(space, timeStep);\n\n    // Call forEachShape C method\
    \ to update sprite positions\n    cpSpaceHashEach(space->activeShapes, &forEachShape,\
    \ nil);\n    cpSpaceHashEach(space->staticShapes, &forEachShape, nil);\n}\n```\n\
    \nJust as with Box2D, you have to advance the physics simulation using a step\
    \ method. In this case, it's `cpSpaceStep`, which takes the space and a `timeStep`\
    \ as input. A fixed time step works best, and just like in Box2D, it's highly\
    \ recommended you use a fixed time step as opposed to passing the delta time.\
    \ As long as the framerate doesn't fluctuate heavily (it really shouldn't anyway),\
    \ using a fixed-time-step approach works very well.\n\nThe `cpSpaceHashEach` method\
    \ calls the C method `forEachShape` for, well, each of the shapes. Or, more accurately,\
    \ the `cpSpaceHashEach` method calls `forEachShape` for each active shape (dynamic\
    \ body) and then for each static shape (static body). With the third parameter,\
    \ you can pass an arbitrary pointer as a parameter to the `forEachShape` method,\
    \ but because it's not needed in this case, it is set to `nil`. And even though\
    \ this example project doesn't have static shapes with sprites assigned to them,\
    \ it nevertheless calls the method for static shapes, just in case you want to\
    \ be adding some static shapes with a sprite.\n\nThe `forEachShape` method is\
    \ a callback method that's written in C. In the example project, you can find\
    \ it at the top of the `HelloWorldScene.m` file, outside the `@implementation`.\
    \ Although it's not strictly necessary to place the method outside the `@implementation`,\
    \ it signals that this method isn't part of the `HelloWorldScene` class. The method\
    \ is defined as `static`, which effectively makes it a global method, as [Listing\
    \ 12–12](#Chapter12.html#list_12_12) shows.\n\n**Listing 12–12.** *Updating a\
    \ Body Sprite's Position and Rotation*\n\n```\n// C method that updates sprite\
    \ position and rotation:\nstatic void forEachShape(void* shapePointer, void* data)\n\
    {\n    cpShape* shape = (cpShape*)shapePointer;\n    CCSprite* sprite = (CCSprite*)shape->data;\n\
    \    if (sprite != nil)\n    {\n        cpBody* body = shape->body;\n        sprite.position\
    \ = body->p;\n        sprite.rotation = CC_RADIANS_TO_DEGREES(body->a) * -1;\n\
    \    }\n}\n```\n\nThe signature for methods passed to `cpSpaceHashEach` is strictly\
    \ defined; the method must take two parameters, and both are `void` pointers.\
    \ The second parameter would be the data pointer passed as third parameter to\
    \ `cpSpaceHashEach`. For both `shapePointer` and data pointer, you have to know\
    \ what kind of object they're pointing to; otherwise, disaster will strike in\
    \ the form of `EXC_BAD_ACCESS`.\n\nIn this case, I know that `shapePointer` is\
    \ going to point to a `cpShape` struct, so I can safely cast it and then access\
    \ the shape's data field to get its `CCSprite` pointer. If the sprite is a valid\
    \ pointer, I can get the body from the shape and use that to set the position\
    \ and rotation of the sprite to that of the body. As with Box2D before, the rotation\
    \ has to be converted from radians to degrees first and then multiplied by –1\
    \ to correct the direction of the rotation."
  raw: '#### Adding Ticky-Tacky Little Boxes


    To add boxes to the world, I used the same code in the `init` method of `HelloWorldScene`
    as in the Box2D example. Refer to [Listing 12–3](#Chapter12.html#list_12_3) if
    you''d like to refresh your memory.


    I''ll go straight to creating the dynamic body for new boxes, which is what the
    `addNewSpriteAt` method does ([Listing 12–10](#Chapter12.html#list_12_10)).


    **Listing 12–10.** *Adding a Body with a Sprite, Chipmunk Style*


    `-(void) addNewSpriteAt:(CGPoint)pos`

    `{`

    `    float mass = 0.5f;`

    `    float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);`

    `    cpBody* body = cpBodyNew(mass, moment);`


    `    body->p = pos;`

    `    cpSpaceAddBody(space, body);`


    `    float halfTileSize = TILESIZE * 0.5f;`

    `    int numVertices = 4;`

    `    CGPoint vertices[] =`

    `    {`

    `        CGPointMake(-halfTileSize, -halfTileSize),`

    `        CGPointMake(-halfTileSize, halfTileSize),`

    `        CGPointMake(halfTileSize, halfTileSize),`

    `        CGPointMake(halfTileSize, -halfTileSize),`

    `    };`


    `    CGPoint offset = CGPointZero;`

    `    float elasticity = 0.3f;`

    `    float friction = 0.7f;`


    `    cpShape* shape = cpPolyShapeNew(body, numVertices, vertices, offset);`

    `    shape->e = elasticity;`

    `    shape->u = friction;`

    `    shape->data = [self addRandomSpriteAt:pos];`

    `    cpSpaceAddShape(space, shape);`

    `}`


    The dynamic body for the box is created with the `cpBodyNew` method with the given
    mass and a *moment of inertia*. The moment of inertia determines the resistance
    of a body to move, and it''s calculated by the helper method `cpMomentForBox`,
    which takes the body''s mass and the size of the box—in this case `TILESIZE`—which
    makes it a 32×32-pixel box.


    The body''s position, `p`, is then updated, and the body is added to the space
    via the `cpSpaceAddBody` method. Note that contrary to Box2D, you do not have
    to convert pixels to meters; you can work with pixel coordinates directly.


    Then a list of vertices are created, which will become the corners of the box
    shape. Because the corner positions are positioned relative to the center of the
    box we''re creating, they are all half a tile''s size away from the center. Otherwise,
    the box shape would be twice as big as the tile.


    The `cpPolyShapeNew` method then takes the body as input, the `vertices` array,
    and the number of vertices in the array, as well as an optional offset, which
    is set to `CGPointZero` in this case. Out comes a new `cpShape` pointer for the
    box shape. The shape''s elasticity and friction are set to values that give a
    similar behavior to the Box2D boxes, and after the sprite is set as user data
    to the data field, the shape is added to the space via `cpSpaceAddShape`.


    The `addRandomSpriteAt` method in [Listing 12–11](#Chapter12.html#list_12_11)
    simply creates the `CCSprite` object that goes along with the new dynamic body.


    **Listing 12–11.** *Creating New Box Objects with Random Images*


    `-(CCSprite*) addRandomSpriteAt:(CGPoint)pos`

    `{`

    `    CCSpriteBatchNode* batch = (CCSpriteBatchNode*)[self getChildByTag:kTagBatchNode];`


    `    int idx = CCRANDOM_0_1() * TILESET_COLUMNS;`

    `    int idy = CCRANDOM_0_1() * TILESET_ROWS;`

    `    CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE * idy, TILESIZE, TILESIZE);`

    `    CCSprite* sprite = [CCSprite spriteWithBatchNode:batch rect:tileRect];`

    `    sprite.position = pos;`

    `    [batch addChild:sprite];`


    `    return sprite;`

    `}`


    #### Updating the Boxes'' Sprites


    Just like with Box2D, you have to update the sprite''s position and rotation to
    be in line with their dynamic body''s position and rotation every frame. Again,
    this is done in the `update` method:


    `-(void) update:(ccTime)delta`

    `{`

    `    float timeStep = 0.03f;`

    `    cpSpaceStep(space, timeStep);`


    `    // Call forEachShape C method to update sprite positions`

    `    cpSpaceHashEach(space->activeShapes, &forEachShape, nil);`

    `    cpSpaceHashEach(space->staticShapes, &forEachShape, nil);`

    `}`


    Just as with Box2D, you have to advance the physics simulation using a step method.
    In this case, it''s `cpSpaceStep`, which takes the space and a `timeStep` as input.
    A fixed time step works best, and just like in Box2D, it''s highly recommended
    you use a fixed time step as opposed to passing the delta time. As long as the
    framerate doesn''t fluctuate heavily (it really shouldn''t anyway), using a fixed-time-step
    approach works very well.


    The `cpSpaceHashEach` method calls the C method `forEachShape` for, well, each
    of the shapes. Or, more accurately, the `cpSpaceHashEach` method calls `forEachShape`
    for each active shape (dynamic body) and then for each static shape (static body).
    With the third parameter, you can pass an arbitrary pointer as a parameter to
    the `forEachShape` method, but because it''s not needed in this case, it is set
    to `nil`. And even though this example project doesn''t have static shapes with
    sprites assigned to them, it nevertheless calls the method for static shapes,
    just in case you want to be adding some static shapes with a sprite.


    The `forEachShape` method is a callback method that''s written in C. In the example
    project, you can find it at the top of the HelloWorldScene.mfile, outside the
    `@implementation`. Although it''s not strictly necessary to place the method outside
    the `@implementation`, it signals that this method isn''t part of the `HelloWorldScene`
    class. The method is defined as `static`, which effectively makes it a global
    method, as [Listing 12–12](#Chapter12.html#list_12_12) shows.


    **Listing 12–12.** *Updating a Body Sprite''s Position and Rotation*


    `// C method that updates sprite position and rotation:`

    `static void forEachShape(void* shapePointer, void* data)`

    `{`

    `    cpShape* shape = (cpShape*)shapePointer;`

    `    CCSprite* sprite = (CCSprite*)shape->data;`

    `    if (sprite != nil)`

    `    {`

    `        cpBody* body = shape->body;`

    `        sprite.position = body->p;`

    `        sprite.rotation = CC_RADIANS_TO_DEGREES(body->a) * -1;`

    `    }`

    `}`


    The signature for methods passed to `cpSpaceHashEach` is strictly defined; the
    method must take two parameters, and both are `void` pointers. The second parameter
    would be the data pointer passed as third parameter to `cpSpaceHashEach`. For
    both `shapePointer` and data pointer, you have to know what kind of object they''re
    pointing to; otherwise, disaster will strike in the form of `EXC_BAD_ACCESS`.


    In this case, I know that `shapePointer` is going to point to a `cpShapestruct`,
    so I can safely cast it and then access the shape''s data field to get its `CCSprite`
    pointer. If the sprite is a valid pointer, I can get the body from the shape and
    use that to set the position and rotation of the sprite to that of the body. As
    with Box2D before, the rotation has to be converted from radians to degrees first
    and then multiplied by –1 to correct the direction of the rotation.'
  trans: "\n#### 添加密密麻麻的小盒子\n\n为了向世界添加盒子，我使用了与 Box2D 示例中相同的代码，位置在 `HelloWorldScene`\
    \ 的 `init` 方法内。如果你想回顾一下，请参考列表 12–3。\n\n我将直接进入为新盒子创建动态主体的部分，这正是 `addNewSpriteAt`\
    \ 方法所做的事情（列表 12–10）。\n\n**列表 12–10.** *以 Chipmunk 风格为精灵添加一个主体*\n\n```\n-(void)\
    \ addNewSpriteAt:(CGPoint)pos\n{\n    float mass = 0.5f;\n    float moment = cpMomentForBox(mass,\
    \ TILESIZE, TILESIZE);\n    cpBody* body = cpBodyNew(mass, moment);\n\n    body->p\
    \ = pos;\n    cpSpaceAddBody(space, body);\n\n    float halfTileSize = TILESIZE\
    \ * 0.5f;\n    int numVertices = 4;\n    CGPoint vertices[] =\n    {\n       \
    \ CGPointMake(-halfTileSize, -halfTileSize),\n        CGPointMake(-halfTileSize,\
    \ halfTileSize),\n        CGPointMake(halfTileSize, halfTileSize),\n        CGPointMake(halfTileSize,\
    \ -halfTileSize),\n    };\n\n    CGPoint offset = CGPointZero;\n    float elasticity\
    \ = 0.3f;\n    float friction = 0.7f;\n\n    cpShape* shape = cpPolyShapeNew(body,\
    \ numVertices, vertices, offset);\n    shape->e = elasticity;\n    shape->u =\
    \ friction;\n    shape->data = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space,\
    \ shape);\n}\n```\n\n盒子的动态主体是通过 `cpBodyNew` 方法创建的，该方法需要指定的质量和一个*转动惯量*。转动惯量决定了主体抵抗运动的能力，它由辅助方法\
    \ `cpMomentForBox` 计算得出，该方法接收主体的质量和盒子的尺寸——这里就是 `TILESIZE`——从而构成一个 32×32 像素的盒子。\n\
    \n接着更新主体的位置 `p`，并通过 `cpSpaceAddBody` 方法将主体添加到空间中。请注意，与 Box2D 不同，你不需要将像素转换为米；你可以直接使用像素坐标。\n\
    \n然后创建一系列顶点，它们将成为盒子形状的角落。因为这些角的位置是相对于我们正在创建的盒子的中心，所以它们距离中心都是半个瓦片的尺寸。否则，盒子形状将会是瓦片的两倍大。\n\
    \n接着，`cpPolyShapeNew` 方法接收主体作为输入、`vertices` 数组、数组中的顶点数量，以及一个可选的偏移量（此处设置为 `CGPointZero`）。输出是一个新的指向盒子形状的\
    \ `cpShape` 指针。形状的弹性和摩擦系数被设置为与 Box2D 盒子行为相似的值，然后在精灵作为用户数据被设置到 data 字段后，通过 `cpSpaceAddShape`\
    \ 将形状添加到空间中。\n\n列表 12–11 中的 `addRandomSpriteAt` 方法只是简单地创建了与新动态主体关联的 `CCSprite`\
    \ 对象。\n\n**列表 12–11.** *使用随机图像创建新的盒子对象*\n\n```\n-(CCSprite*) addRandomSpriteAt:(CGPoint)pos\n\
    {\n    CCSpriteBatchNode* batch = (CCSpriteBatchNode*)[self getChildByTag:kTagBatchNode];\n\
    \n    int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n    int idy = CCRANDOM_0_1()\
    \ * TILESET_ROWS;\n    CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE *\
    \ idy, TILESIZE, TILESIZE);\n    CCSprite* sprite = [CCSprite spriteWithBatchNode:batch\
    \ rect:tileRect];\n    sprite.position = pos;\n    [batch addChild:sprite];\n\n\
    \    return sprite;\n}\n```\n\n#### 更新盒子的精灵\n\n与 Box2D 一样，你必须在每一帧更新精灵的位置和旋转，使其与动态主体的位置和旋转保持一致。同样，这在\
    \ `update` 方法中完成：\n\n```\n-(void) update:(ccTime)delta\n{\n    float timeStep\
    \ = 0.03f;\n    cpSpaceStep(space, timeStep);\n\n    // 调用 forEachShape C 方法更新精灵位置\n\
    \    cpSpaceHashEach(space->activeShapes, &forEachShape, nil);\n    cpSpaceHashEach(space->staticShapes,\
    \ &forEachShape, nil);\n}\n```\n\n就像使用 Box2D 一样，你必须使用步进方法来推进物理模拟。这里使用的是 `cpSpaceStep`，它接收空间和\
    \ `timeStep` 作为输入。使用固定时间步长效果最好，并且与 Box2D 一样，强烈建议你使用固定时间步长，而不是传递 delta 时间。只要帧率没有剧烈波动（实际上不应该），使用固定时间步长的方法效果非常好。\n\
    \n`cpSpaceHashEach` 方法为每个形状调用 C 方法 `forEachShape`。或者更准确地说，`cpSpaceHashEach` 方法为每个活动形状（动态主体）调用\
    \ `forEachShape`，然后为每个静态形状（静态主体）调用它。通过第三个参数，你可以将一个任意指针作为参数传递给 `forEachShape` 方法，但在这里不需要，因此设置为\
    \ `nil`。尽管这个示例项目没有为静态形状分配精灵，但它仍然为静态形状调用了该方法，以防你日后想要添加一些带有精灵的静态形状。\n\n`forEachShape`\
    \ 方法是一个用 C 语言编写的回调方法。在示例项目中，你可以在 `HelloWorldScene.m` 文件的顶部，`@implementation` 之外找到它。虽然严格来说并不一定要将此方法放在\
    \ `@implementation` 之外，但这表明该方法不属于 `HelloWorldScene` 类。该方法被定义为 `static`，这实际上使它成为一个全局方法，如列表\
    \ 12–12 所示。\n\n**列表 12–12.** *更新主体精灵的位置和旋转*\n\n```\n// 更新精灵位置和旋转的 C 方法：\nstatic\
    \ void forEachShape(void* shapePointer, void* data)\n{\n    cpShape* shape = (cpShape*)shapePointer;\n\
    \    CCSprite* sprite = (CCSprite*)shape->data;\n    if (sprite != nil)\n    {\n\
    \        cpBody* body = shape->body;\n        sprite.position = body->p;\n   \
    \     sprite.rotation = CC_RADIANS_TO_DEGREES(body->a) * -1;\n    }\n}\n```\n\n\
    传递给 `cpSpaceHashEach` 的方法签名是严格定义的；该方法必须接受两个参数，并且两者都是 `void` 指针。第二个参数将是作为第三个参数传递给\
    \ `cpSpaceHashEach` 的数据指针。对于 `shapePointer` 和数据指针，你必须知道它们指向的是什么类型的对象；否则，灾难将以 `EXC_BAD_ACCESS`\
    \ 的形式降临。\n\n在这种情况下，我知道 `shapePointer` 将指向一个 `cpShape` 结构体，因此我可以安全地对其进行强制转换，然后访问形状的\
    \ data 字段以获取其 `CCSprite` 指针。如果精灵是一个有效的指针，我可以从形状中获取主体，并使用它来将精灵的位置和旋转设置为主体的一致。与之前的\
    \ Box2D 一样，需要先将旋转角度从弧度转换为度数，然后乘以 -1 以修正旋转方向。\n"
- fmt: "# A Chipmunk Collision Course\n\nCollisions in Chipmunk are also handled by\
    \ C callback methods. In the `PhysicsChipmunk02` project, I've added the `contactBegin`\
    \ and `contactEnd` static methods (in [Listing 12–13](#Chapter12.html#list_12_13)),\
    \ which do exactly the same as their Box2D counterparts: change the color of boxes\
    \ that are in contact to magenta.\n\n**Listing 12–13.** *Collision Callbacks a\
    \ la Chipmunk*\n\n```c\nstatic int contactBegin(cpArbiter* arbiter, struct cpSpace*\
    \ space, void* data)\n{\n    bool processCollision = YES;\n    \n    cpShape*\
    \ shapeA;\n    cpShape* shapeB;\n    cpArbiterGetShapes(arbiter, &shapeA, &shapeB);\n\
    \    \n    CCSprite* spriteA = (CCSprite*)shapeA->data;\n    CCSprite* spriteB\
    \ = (CCSprite*)shapeB->data;\n    if (spriteA != nil && spriteB != nil)\n    {\n\
    \        spriteA.color = ccMAGENTA;\n        spriteB.color = ccMAGENTA;\n    }\n\
    \    \n    return processCollision;\n}\n\nstatic void contactEnd(cpArbiter* arbiter,\
    \ cpSpace* space, void* data)\n{\n    cpShape* shapeA;\n    cpShape* shapeB;\n\
    \    cpArbiterGetShapes(arbiter, &shapeA, &shapeB);\n    \n    CCSprite* spriteA\
    \ = (CCSprite*)shapeA->data;\n    CCSprite* spriteB = (CCSprite*)shapeB->data;\n\
    \    if (spriteA != nil && spriteB != nil)\n    {\n        spriteA.color = ccWHITE;\n\
    \        spriteB.color = ccWHITE;\n    }\n}\n```\n\nThe `contactBegin` method\
    \ should return `YES` if the collision should be processed normally. By returning\
    \ `NO` or `0` from this method, you can also ignore collisions. To get to the\
    \ sprites, you first have to get the shapes from the `cpArbiter`, which just like\
    \ `b2Contact` holds the contact information. Via the `cpArbiterGetShapes` method\
    \ and passing two shapes as `out` parameters, you get the colliding shapes from\
    \ which you can then retrieve the individual `CCSprite` pointers. If they are\
    \ both valid, their color can be changed.\n\nAs with Box2D, these callbacks don't\
    \ get called by themselves. In the `HelloWorldSceneinit` method, right after the\
    \ space is created, you must add the collision handlers using the `cpSpaceAddCollisionHandler`\
    \ method:\n\n```c\nunsigned int defaultCollisionType = 0;\ncpSpaceAddCollisionHandler(space,\
    \ defaultCollisionType, defaultCollisionType,\n    &contactBegin, NULL, NULL,\
    \ &contactEnd, NULL);\n```\n\nThe default collision type for shapes is `0`, and\
    \ because I don't care about filtering collisions, both collision type parameters\
    \ are set to `0`. You can assign each body's shape an integer value to its `collision_type`\
    \ property and then add collision handlers that are called only if bodies of matching\
    \ collision types collide. This is called *filtering collisions* and is described\
    \ in the Chipmunk manual, at [`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape).\n\
    \nThe next four parameters are pointers to C callback methods for the four collision\
    \ stages: *begin*, *pre-solve*, *post-solve*, and *separation* (the same as the\
    \ `EndContact` event in Box2D). These serve the same purpose as the corresponding\
    \ callbacks in Box2D. Most of the time you'll be interested only in the `begin`\
    \ and `separation` events.\n\nI pass `NULL` for pre-solve and post-solve, because\
    \ I'm not interested in handling these. You can use these methods to influence\
    \ the collision or to retrieve the collision force in the post-solve step. The\
    \ final parameter is an arbitrary data pointer you can pass on to the callback\
    \ methods if you need it. I don't, so I set it to `NULL` as well.\n\nWith that,\
    \ you have a working collision callback mechanism.\n\n## Joints for Chipmunks\n\
    \nThe Chipmunk example project also needs its own implementation of `addSomeJoinedBodies`.\
    \ The setup is more verbose than for Box2D, as shown in [Listing 12–14](#Chapter12.html#list_12_14).\
    \ You'll recognize most of the code as setting up static and dynamic bodies—if\
    \ you find that code familiar, feel free to skip to the end where the joints are\
    \ created.\n\n**Listing 12–14.** *Creating Three Bodies Connected with Joints*\n\
    \n```objc\n-(void) addSomeJoinedBodies:(CGPoint)pos\n{\n    float mass = 1.0f;\n\
    \    float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);\n    \n    float\
    \ halfTileSize = TILESIZE * 0.5f;\n    int numVertices = 4;\n    CGPoint vertices[]\
    \ =\n    {\n        CGPointMake(-halfTileSize, -halfTileSize),\n        CGPointMake(-halfTileSize,\
    \ halfTileSize),\n        CGPointMake(halfTileSize, halfTileSize),\n        CGPointMake(halfTileSize,\
    \ -halfTileSize),\n    };\n    \n    // Create a static body\n    cpBody* staticBody\
    \ = cpBodyNew(INFINITY, INFINITY);\n    staticBody->p = pos;\n    \n    CGPoint\
    \ offset = CGPointZero;\n    cpShape* shape = cpPolyShapeNew(staticBody, numVertices,\
    \ vertices, offset);\n    cpSpaceAddStaticShape(space, shape);\n    \n    // Create\
    \ three new dynamic bodies\n    float posOffset = 1.4f;\n    pos.x += TILESIZE\
    \ * posOffset;\n    cpBody* bodyA = cpBodyNew(mass, moment);\n    bodyA->p = pos;\n\
    \    cpSpaceAddBody(space, bodyA);\n    \n    shape = cpPolyShapeNew(bodyA, numVertices,\
    \ vertices, offset);\n    shape->data = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space,\
    \ shape);\n    \n    pos.x += TILESIZE * posOffset;\n    cpBody* bodyB = cpBodyNew(mass,\
    \ moment);\n    bodyB->p = pos;\n    cpSpaceAddBody(space, bodyB);\n    \n   \
    \ shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);\n    shape->data\
    \ = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space, shape);\n    \n\
    \    pos.x += TILESIZE * posOffset;\n    cpBody* bodyC = cpBodyNew(mass, moment);\n\
    \    bodyC->p = pos;\n    cpSpaceAddBody(space, bodyC);\n    \n    shape = cpPolyShapeNew(bodyC,\
    \ numVertices, vertices, offset);\n    shape->data = [self addRandomSpriteAt:pos];\n\
    \    cpSpaceAddShape(space, shape);\n    \n    // Create the joints and add the\
    \ constraints to the space\n    cpConstraint* constraint1 = cpPivotJointNew(staticBody,\
    \ bodyA, staticBody->p);\n    cpConstraint* constraint2 = cpPivotJointNew(bodyA,\
    \ bodyB, bodyA->p);\n    cpConstraint* constraint3 = cpPivotJointNew(bodyB, bodyC,\
    \ bodyB->p);\n    \n    cpSpaceAddConstraint(space, constraint1);\n    cpSpaceAddConstraint(space,\
    \ constraint2);\n    cpSpaceAddConstraint(space, constraint3);\n}\n```\n\nIn this\
    \ example, I'm creating a pivot joint with `cpPivotJointNew`, which is the same\
    \ as the `b2RevoluteJoint` used in the Box2D example. Each joint is created with\
    \ the two bodies that should be connected to each other and one of the bodies'\
    \ center position as the anchor point. The `cpPivotJointNew` method returns a\
    \ `cpConstraint` pointer, which you'll have to add to the space using the `cpSpaceAddConstraint`\
    \ method.\n\n## Summary\n\nIn this chapter, you learned the basics of the two\
    \ physics engines distributed with cocos2d: Box2D and Chipmunk. You now have two\
    \ working examples of these physics engines at your disposal, which should help\
    \ you decide which one you'd like to use.\n\nYou learned how to set up a screen\
    \ area that contains all the little boxes created from a tilemap as dynamic bodies.\
    \ You now also know the basics of detecting collisions and how to create joints\
    \ to connect bodies together in both physics engines.\n\nIn the next chapter,\
    \ you'll be making a game that uses the Box2D physics engine.\n\n## Chapter 13"
  raw: '#### A Chipmunk Collision Course


    Collisions in Chipmunk are also handled by C callback methods. In the PhysicsChipmunk02
    project, I''ve added the `contactBegin` and `contactEnd` static methods (in [Listing
    12–13](#Chapter12.html#list_12_13)), which do exactly the same as their Box2D
    counterparts: change the color of boxes that are in contact to magenta.


    **Listing 12–13.** *Collision Callbacks a la Chipmunk*


    `static int contactBegin(cpArbiter* arbiter, struct cpSpace* space, void* data)`

    `{`

    `    bool processCollision = YES;`


    `    cpShape* shapeA;`

    `    cpShape* shapeB;`

    `    cpArbiterGetShapes(arbiter, &shapeA, &shapeB);`


    `    CCSprite* spriteA = (CCSprite*)shapeA->data;`

    `    CCSprite* spriteB = (CCSprite*)shapeB->data;`

    `    if (spriteA != nil && spriteB != nil)`

    `    {`

    `        spriteA.color = ccMAGENTA;`

    `        spriteB.color = ccMAGENTA;`

    `    }`


    `    return processCollision;`


    `}`


    `static void contactEnd(cpArbiter* arbiter, cpSpace* space, void* data)`

    `{`

    `    cpShape* shapeA;`

    `    cpShape* shapeB;`

    `    cpArbiterGetShapes(arbiter, &shapeA, &shapeB);`


    `    CCSprite* spriteA = (CCSprite*)shapeA->data;`

    `    CCSprite* spriteB = (CCSprite*)shapeB->data;`

    `    if (spriteA != nil && spriteB != nil)`

    `    {`

    `        spriteA.color = ccWHITE;`

    `        spriteB.color = ccWHITE;`

    `    }`

    `}`


    The `contactBegin` method should return `YES` if the collision should be processed
    normally. By returning `NO` or `0` from this method, you can also ignore collisions.
    To get to the sprites, you first have to get the shapes from the `cpArbiter`,
    which just like `b2Contact` holds the contact information. Via the `cpArbiterGetShapes`
    method and passing two shapes as `out` parameters, you get the colliding shapes
    from which you can then retrieve the individual `CCSprite` pointers. If they are
    both valid, their color can be changed.


    As with Box2D, these callbacks don''t get called by themselves. In the `HelloWorldSceneinit`
    method, right after the space is created, you must add the collision handlers
    using the `cpSpaceAddCollisionHandler` method:


    `unsigned int defaultCollisionType = 0;`

    `cpSpaceAddCollisionHandler(space, defaultCollisionType, defaultCollisionType,`![images](images/U002.jpg)

    `    &contactBegin, NULL, NULL, &contactEnd, NULL);`


    The default collision type for shapes is 0, and because I don''t care about filtering
    collisions, both collision type parameters are set to `0`. You can assign each
    body''s shape an integer value to its `collision_type` property and then add collision
    handlers that are called only if bodies of matching collision types collide. This
    is called *filtering collisions* and is described in the Chipmunk manual, at [`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape).


    The next four parameters are pointers to C callback methods for the four collision
    stages: *begin*, *pre-solve*, *post-solve*, and *separation* (the same as the
    `EndContact` event in Box2D). These serve the same purpose as the corresponding
    callbacks in Box2D. Most of the time you''ll be interested only in the `begin`
    and `separation` events.


    I pass `NULL` for pre-solve and post-solve, because I''m not interested in handling
    these. You can use these methods to influence the collision or to retrieve the
    collision force in the post-solve step. The final parameter is an arbitrary data
    pointer you can pass on to the callback methods if you need it. I don''t, so I
    set it to `NULL` as well.


    With that, you have a working collision callback mechanism.


    #### Joints for Chipmunks


    The Chipmunk example project also needs its own implementation of `addSomeJoinedBodies`.
    The setup is more verbose than for Box2D, as shown in [Listing 12–14](#Chapter12.html#list_12_14).
    You''ll recognize most of the code as setting up static and dynamic bodies—if
    you find that code familiar, feel free to skip to the end where the joints are
    created.


    **Listing 12–14.** *Creating Three Bodies Connected with Joints*


    `-(void) addSomeJoinedBodies:(CGPoint)pos`

    `{`

    `    float mass = 1.0f;`

    `    float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);`


    `    float halfTileSize = TILESIZE * 0.5f;`

    `    int numVertices = 4;`

    `    CGPoint vertices[] =`

    `    {`

    `        CGPointMake(-halfTileSize, -halfTileSize),`

    `        CGPointMake(-halfTileSize, halfTileSize),`

    `        CGPointMake(halfTileSize, halfTileSize),`

    `        CGPointMake(halfTileSize, -halfTileSize),`

    `    };`


    `    // Create a static body`

    `    cpBody* staticBody = cpBodyNew(INFINITY, INFINITY);`

    `    staticBody->p = pos;`


    `    CGPoint offset = CGPointZero;`

    `    cpShape* shape = cpPolyShapeNew(staticBody, numVertices, vertices, offset);`

    `    cpSpaceAddStaticShape(space, shape);`


    `    // Create three new dynamic bodies`

    `    float posOffset = 1.4f;`

    `    pos.x += TILESIZE * posOffset;`

    `    cpBody* bodyA = cpBodyNew(mass, moment);`

    `    bodyA->p = pos;`

    `    cpSpaceAddBody(space, bodyA);`


    `    shape = cpPolyShapeNew(bodyA, numVertices, vertices, offset);`

    `    shape->data = [self addRandomSpriteAt:pos];`

    `    cpSpaceAddShape(space, shape);`


    `    pos.x += TILESIZE * posOffset;`

    `    cpBody* bodyB = cpBodyNew(mass, moment);`

    `    bodyB->p = pos;`

    `    cpSpaceAddBody(space, bodyB);`


    `    shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);`

    `    shape->data = [self addRandomSpriteAt:pos];`

    `    cpSpaceAddShape(space, shape);`


    `    pos.x += TILESIZE * posOffset;`

    `    cpBody* bodyC = cpBodyNew(mass, moment);`

    `    bodyC->p = pos;`

    `    cpSpaceAddBody(space, bodyC);`


    `    shape = cpPolyShapeNew(bodyC, numVertices, vertices, offset);`

    `    shape->data = [self addRandomSpriteAt:pos];`

    `    cpSpaceAddShape(space, shape);`


    **`    // Create the joints and add the constraints to the space`**

    **`    cpConstraint* constraint1 = cpPivotJointNew(staticBody, bodyA, staticBody->p);`**

    **`    cpConstraint* constraint2 = cpPivotJointNew(bodyA, bodyB, bodyA->p);`**

    **`    cpConstraint* constraint3 = cpPivotJointNew(bodyB, bodyC, bodyB->p);`**


    **`    cpSpaceAddConstraint(space, constraint1);`**

    **`    cpSpaceAddConstraint(space, constraint2);`**

    **`    cpSpaceAddConstraint(space, constraint3);`**

    `}`


    In this example, I''m creating a pivot joint with `cpPivotJointNew`, which is
    the same as the `b2RevoluteJoint` used in the Box2D example. Each joint is created
    with the two bodies that should be connected to each other and one of the bodies''
    center position as the anchor point. The `cpPivotJointNew` method returns a `cpConstraint`
    pointer, which you''ll have to add to the space using the `cpSpaceAddConstraint`
    method.


    ### Summary


    In this chapter, you learned the basics of the two physics engines distributed
    with cocos2d: Box2D and Chipmunk. You now have two working examples of these physics
    engines at your disposal, which should help you decide which one you''d like to
    use.


    You learned how to set up a screen area that contains all the little boxes created
    from a tilemap as dynamic bodies. You now also know the basics of detecting collisions
    and how to create joints to connect bodies together in both physics engines.


    In the next chapter, you''ll be making a game that uses the Box2D physics engine.


