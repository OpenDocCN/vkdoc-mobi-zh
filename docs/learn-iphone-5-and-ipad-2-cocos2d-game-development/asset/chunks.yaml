    ![images](images/1305.jpg)


    **Figure 13–5.** *Collision parameters for the plunger*


    Below the `Cat.` and `Mask` columns, you''ll find the buttons `All`, `None`, and
    `Inv.`, which allow you to check all, uncheck all, or invert the check boxes''
    checked status. They are helpful to avoid clicking possibly dozens of check boxes
    one after another.'
  trans: '

    ### 定义柱塞形状


    从柱塞（即把球弹入游戏的弹簧）开始。选中左侧面板中的柱塞图片，然后点击中央视图工具栏上的 `Add polygon` 按钮。这会在中央工作区创建一个新的三角形形状，并将其高亮显示。由于我们需要一个矩形形状，请双击其中一条边来添加第四个顶点。如果意外添加了过多顶点，可以右键单击或按住
    Option 键单击某个顶点，然后选择 `Delete point` 将其删除。


    通过点击并拖动的方式，将四个顶点移动到柱塞的四个角上。创建一个覆盖整个柱塞（包括弹簧）的矩形形状。确保矩形完全覆盖柱塞及其弹簧，这样可以避免球意外落到柱塞头部下方时出现问题。


    您可能已经注意到那个带有 `+` 号的小蓝圈。这是形状的锚点，它与该形状精灵的锚点重合。稍后，当我们在 cocos2d 中定位该形状时，形状的锚点将位于我们提供的坐标中心。


    您需要将锚点移动到柱塞图像的底部中心，以便更容易定位柱塞。您可以拖动蓝色圆圈，但在许多情况下，您需要非常精确地放置它。此时，您可以在“参数”面板的“图像参数”下修改锚点的绝对像素位置或相对位置。


    在图 13–4 中，您将看到正在编辑的柱塞形状。


    ![images](img/1304.jpg)


    **图 13–4.** *在 PhysicsEditor 中手动定义形状*


    除了通过多边形创建形状，您也可以使用 `Add Rectangle` 按钮。但那样我就无法向您展示如何添加或删除顶点，以及如何拖拽它们了。


    您可以而且也应该在“参数”面板的“夹具参数”部分下设置柱塞的碰撞位。碰撞位允许您定义哪些形状会碰撞，哪些不会。碰撞位设置将用于防止柱塞与任何形状（球除外）发生碰撞。


    为了方便处理碰撞位，您可以更改碰撞位的名称。碰撞位名称不会被导出，它们仅用于提醒您每个位的用途。默认情况下，这些位被命名为 `bit_0` 到 `bit_15`。您需要将前五个位的名称分别更改为
    `Ball`、`Bumper`、`Flipper`、`Plunger` 和 `Wall`。


    只有当两个形状的分类位（标记为 `Cat.` 的复选框列）和掩码位（标记为 `Mask` 的复选框列）都设置时，Box2D 形状才会相互碰撞。通常，您需要将每个形状仅分配到一个特定的类别。对于柱塞，请确保仅设置了
    `Plunger` 类别的分类位。换句话说，您将柱塞的形状分配到了 `Plunger` 碰撞位类别。然后，通过 `Mask` 复选框，设置该形状允许与哪些其他类别发生碰撞。对于柱塞，您应该仅设置
    `Ball` 类别的 `Mask` 复选框，从而允许柱塞与球碰撞。图 13–5 展示了柱塞碰撞类别和掩码标志的正确设置。


    **注意：** 至此，柱塞会与球碰撞，但球不会与柱塞碰撞。请记住，定义碰撞是一个双向过程，在这种情况下，您还需要将球放在 `Ball` 类别中，并勾选球与
    `Plunger` 类别对应的 `Mask` 位，才能使球和柱塞相互碰撞。


    您也可以设置同一类别的掩码位，从而允许同一类别的多个物体相互碰撞。对于球的形状，设置 `Ball` 类别的 `Mask` 位以允许球与球碰撞是合理的。如果您想扩展弹球游戏以支持桌面上同时存在多个球，这将非常有用。


    ![images](img/1305.jpg)


    **图 13–5.** *柱塞的碰撞参数*


    在 `Cat.` 和 `Mask` 列下方，您会找到 `All`、`None` 和 `Inv.` 按钮，它们分别用于全选、全部取消或反选复选框的选中状态。这些按钮有助于避免逐一点击可能多达数十个的复选框。

    '
- fmt: '# Defining the Table Shapes


    The pinball table consists of three separate shapes named `table-bottom`, `table-left`,
    and `table-top`. The table background image is split up to make it easier to edit
    its shapes and to make it easier to create different pinball layouts without having
    to replace the entire image.


    Select the `table-top` image in the Shapes pane to start editing the shape for
    the topmost part of the pinball table. As you can see in [Figure 13–6](#Chapter13.html#fig_13_6),
    it''s a concave shape. With the manual method used to define the plunger, it would
    be difficult and error-prone to create all the vertices of this round shape manually,
    let alone ensuring that the resulting shape is convex. PhysicsEditor makes this
    a lot easier for you: it will trace the shape''s outline and create a suitable
    shape with a single mouse click!


    Above the center pane there''s a magic wand icon in the toolbar called the `Shape
    Tracer`. Click the wand icon to open the Shape Tracer dialog shown in [Figure
    13–6](#Chapter13.html#fig_13_6).


    ![images](images/1306.jpg)


    **Figure 13–6.** *The Shape Tracer creates shapes automatically.*


    The Shape Tracer shows the shape''s image and an overlay of the shape it is going
    to create when you click the `OK` button. Below the image you''ll find a slider
    and buttons to the left and right of the slider that control the zoom level of
    the image. The image zoom settings do not affect how the shape is created.


    The most important setting you will want to adjust in the Shape Tracer is the
    `Tolerance` setting. `Tolerance` changes how accurately the image is traced to
    create a shape, which directly influences the number of vertices used for the
    shape. The number of vertices of a shape in turn influence the performance of
    the physics simulation. Generally, you should always strive to achieve adequate
    collision responses with the least amount of vertices. The more important the
    accurate collisions are for your game, the more vertices you will want to allow
    for some objects. At the same time, if you add many objects using the same shape,
    using a shape with fewer vertices will result in better performance.


    By experimenting with the `Tolerance` setting, I found that a good compromise
    in this case is a `Tolerance` value of 4.0. This creates a shape with 18 vertices,
    and it''s the highest `Tolerance` value that still traces the image''s shape quite
    accurately. The default `Tolerance` setting of 1.0 would have created a shape
    with 31 vertices, so I was able to save 13 vertices. But you''ll notice if you
    cycle through the `Tolerance` values that even a `Tolerance` value of only 1.5
    will already cut down the number of vertices to 20.


    **TIP:** The Frame Mode setting in the Shape Tracer can be used to create a shape
    for an animation (sequence of images). To create an animation in PhysicsEditor,
    you''ll have to add more image files to a shape under Image Parameters in the
    Parameters pane, in the default PhysicsEditor window. By clicking the + button
    next to the Filename setting, you can add additional images to a single shape;
    then you can have the shape trace create a shape that is either the intersection
    or the union of each animation frame''s shape.


    When you''re satisfied with the traced shape, click the OK button to close the
    Shape Tracer dialog. This will create the new shape. You still have to perform
    a quick manual tweak for the pinball table''s collisions to work smoothly. Since
    the screen area will define the collision on the sides of the pinball table, you
    should drag the lower-left and lower-right corner vertices as well as the upper-left
    and upper-right corner vertices slightly outside the screen area and downward
    and upward, respectively, so that they are clearly outside the black frame border
    drawn around the `table-top` image. See [Figure 13–7](#Chapter13.html#fig_13_7)
    for a visual hint.


    By extruding these two vertices, the shape will form a soft transition to the
    sides of the screen borders. Without extruding these vertices, the ball might
    get reflected from the tips of these vertices because of slight inaccuracies that
    are always present in physics simulations.


    Now move the anchor point (the blue circle with the + inside) to the top-left
    corner, preferably by using the anchor point settings in the `Parameters` pane
    under `Image Parameters`. Set the `Relative` values to 0,0 and 1,0, respectively,
    to move the anchor point to the top-left corner. This anchor point position will
    later allow you to align the image exactly with the screen border by simply positioning
    it to 0,480 in point coordinates.


    **NOTE:** If you do not see the anchor point circle and there are no anchor point
    settings under `Image Parameters`, you do not have the `Exporter` setting in the
    `Parameters` pane set to the `Box2D generic (PLIST)` format.


    The last step is to adjust the collision bits of the `table-top` shape. Check
    the category (`Cat.`) check box of the `Wall` row and then set the `Mask` check
    box in the `Ball` row. This will enable collisions of the pinball table with the
    ball. Accordingly, you''ll have to set the same collision bits for the `table-left`
    and `table-bottom` shapes because they are all part of the `Wall` category and
    should collide with the `Ball` category.


    ![images](images/1307.jpg)


    **Figure 13–7.** *Finalizing the table''s top shape*


    Use the Shape Tracer to create the shape for the `table-left` image in the same
    way. Under `Image Parameters`, move the anchor point to `Pixel` coordinates 0,0
    and 50,0. Don''t forget to set the collision bits just like earlier for `table-top`.


    Now let''s trace the shape for the `table-bottom` image. This requires a few additional
    steps because the `table-bottom` image actually consists of four individual, disjointed
    elements that need to have individual shapes. The version 1.0.4 of PhysicsEditor
    traces only contiguous shapes so you need to open the Shape Tracer a total of
    four times. Each time you open the Shape Tracer, click the part of the image that
    you want to trace and then click the OK button to create the shape. A `Tolerance`
    setting of 4.0 works well for all four shapes. You should end up with four shapes
    covering all the four elements of the `table-bottom` image. Don''t forget to set
    the collision bits exactly like you did for `table-top`, as shown in [Figure 13–7](#Chapter13.html#fig_13_7).'
