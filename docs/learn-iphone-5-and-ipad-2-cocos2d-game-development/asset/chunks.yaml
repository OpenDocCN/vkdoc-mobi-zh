    more control of the collision process—I''d like to refer you to the Box2D manual,
    at [`www.box2d.org/manual.html`](http://www.box2d.org/manual.html).


    On the other hand, if you need more information about individual classes and structs,
    you should look at the Box2D API reference. It is provided in the Documentation
    folder of the Box2D download, which you can obtain from [`http://code.google.com/p/box2d`](http://code.google.com/p/box2d).
    Since the Box2D API reference is not available online, I decided to host it myself
    at [`www.learn-cocos2d.com/box2d-api-reference/API/index.html`](http://www.learn-cocos2d.com/box2d-api-reference/API/index.html).


    To get help with Box2D, you can check out the official Box2D forums at [`www.box2d.org/forum/index.php`](http://www.box2d.org/forum/index.php)
    and check out the Physics subsection of the cocos2d forums at [`www.cocos2d-iphone.org/forum/forum/7`](http://www.cocos2d-iphone.org/forum/forum/7).


    If you are interested in learning more about PhysicsEditor, I can recommend the
    PhysicsEditor blog ([`www.physicseditor.de/blog`](http://www.physicseditor.de/blog))
    in which Andreas Löw shows off some cool uses and tips and tricks for PhysicsEditor.
    If you have a support request for Andreas, you can simply write an e-mail to `support@code-and-web.de`.


    ## Chapter 14


    ## Game Center


    Game Center is Apple''s social network solution. It enables you to authenticate
    players, store their scores and display leaderboards, and track and display their
    achievement progress. Furthermore, players can invite friends to play or choose
    to quickly find a match to play a game with anyone.


    In this chapter, I''ll introduce you not only to Game Center and the Game Kit
    API but also to the basics of online multiplayer programming and, of course, how
    to use Game Center together with cocos2d.


    Since a lot of Apple''s examples are intentionally incomplete, I''ll be developing
    a `GameKitHelper` class in this chapter. This class will remove some of the complexities
    of Game Center programming from you. It will make it easier for you to use Game
    Kit and Game Center features, and it will allow you to easily reuse the same code
    for other games.


    To configure your application for use with Game Center, you are going to use iTunes
    Connect. The information on the iTunes Connect web site is considered confidential
    Apple information, so I can''t discuss it in this book. However, I will point
    you to Apple''s excellent documentation for each step—and quite frankly, setting
    up leaderboards and achievements on iTunes Connect is possibly the easiest aspect
    of Game Center.


    ### Enabling Game Center


    Game Center is the service that manages and stores player accounts and each player''s
    friend lists, leaderboards, and achievements. This information is stored online
    on Apple''s servers and accessed either by your game or by the Game Center app
    that is installed on all devices running iOS 4.1 or newer.


    **NOTE:** Game Center is available only on devices running iOS 4.1 and newer and
    is not available on first-generation devices or the iPhone 3G. Game Center currently
    runs on iPod touch second, third, and fourth generations; iPhone 3GS and iPhone
    4; and iPad; as long as they have iOS 4.1 or higher installed. The easiest way
    for a user to check whether their device supports Game Center is to locate the
    Game Center app on the device. If it exists, the device is ready for Game Center;
    otherwise, it is not. If the Game Center app is not available but the device is
    eligible for upgrading to iOS 4.1, Game Center support will become available after
    upgrading the device''s operating system via iTunes.


    If you don''t have access to a Game Center–enabled device, you can still program
    and test Game Center features using the iPhone/iPad Simulator. With the exception
    of matchmaking, all Game Center features can be tested in the simulator.


    On the other side, the Game Kit API is what you use to program Game Center features.
    Game Kit provides programmatic access to the data stored on the Game Center servers
    and is able to show built-in leaderboards, achievements, and matchmaking screens.
    But Game Kit also provides features besides Game Center—for example, peer-to-peer
    networking via Bluetooth and voice chat. These are the only two Game Kit features
    already available on devices running iOS 3.0 or newer.


    The final ingredient in this mix is iTunes Connect. You set up your game''s leaderboards
    and achievements through the iTunes Connect web site. But most importantly, it
    allows you to enable Game Center for your game in the first place. I''ll start
    with that step first, so you can and should do this before you have even created
    an Xcode project for your game.


    Your starting point for learning more about Game Center and the steps involved
    in creating a game that uses Game Center is at Apple''s Getting Started with Game
    Center web site: [`http://developer.apple.com/devcenter/ios/gamecenter`](http://developer.apple.com/devcenter/ios/gamecenter).


    For a high-level overview of Game Center, I recommend reading the Getting Started
    with Game Center document: [`http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf`](http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf).'
