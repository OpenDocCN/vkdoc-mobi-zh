  trans: "\n### 示例粒子效果\n\nCocos2d 内置了多种粒子效果，能让你直观地了解它们能产生的视觉效果类型。你可以在游戏中将其用作占位效果，或者，如果只想进行微调，可以创建`CCParticleExamples.m`文件中定义示例的子类并进行修改。这些效果的优势在于你无需任何外部帮助；你可以像创建简单的`CCNode`对象一样创建这些示例粒子效果。事实上，它们确实是从`CCNode`派生而来的。\n\
    \n我创建了一个名为`ParticleEffects01`的项目，它展示了所有 cocos2d 示例粒子效果。你可以通过快速点击屏幕来循环切换这些示例，也可以用手指拖动它们移动。许多粒子效果一旦开始移动，就会呈现出截然不同的外观，正如你在图\
    \ 9–1 中所见。因此，看似只是一大团粒子的效果，在移动时很可能会表现得像一个引擎排气效果。\n\n![images](img/0901.jpg)\n\n\
    **图 9–1.** *从上到下为同一粒子效果：静止、慢速移动、快速移动*\n\n只有一种效果在启动后无法移动，那就是像图 9–2 中所示的`CCParticleExplosion`这类一次性效果。这种效果的特殊之处在于它会一次性发射所有粒子，并立即停止发射新粒子。所有其他粒子效果都是持续运行的，在生成新粒子的同时，会移除那些已经超过生命周期的粒子。这种情况下，挑战在于平衡屏幕上的粒子总数。\n\
    \n![images](img/0902.jpg)\n\n**图 9–2.** *`CCParticleExplosion`是 cocos2d 提供的一个示例效果。*\n\
    \n代码清单 9–1 展示了在`ParticleEffects01`示例项目中使用的相关方法。通过在`switch`语句中使用当前的`particleType`变量，可以创建相应的内置粒子效果。请注意，我们使用一个`CCParticleSystem`指针来存储粒子，因此只需在`runEffect`方法的末尾使用一次`addChild`代码。每个示例粒子效果都派生自`CCParticleSystem`。\n\
    \n**代码清单 9–1.** *使用内置效果*\n\n```\n-(void) runEffect\n{\n    // 移除之前的任何粒子特效\n  \
    \  [self removeChildByTag:1 cleanup:YES];\n\n    CCParticleSystem* system;\n\n\
    \    switch (particleType)\n    {\n        case ParticleTypeExplosion:\n     \
    \       system = [CCParticleExplosion node];\n                        break;\n\
    \        case ParticleTypeFire:\n            system = [CCParticleFire node];\n\
    \            break;\n        case ParticleTypeFireworks:\n            system =\
    \ [CCParticleFireworks node];\n            break;\n        case ParticleTypeFlower:\n\
    \            system = [CCParticleFlower node];\n            break;\n        case\
    \ ParticleTypeGalaxy:\n            system = [CCParticleGalaxy node];\n       \
    \     break;\n        case ParticleTypeMeteor:\n            system = [CCParticleMeteor\
    \ node];\n            break;\n        case ParticleTypeRain:\n            system\
    \ = [CCParticleRain node];\n            break;\n        case ParticleTypeSmoke:\n\
    \            system = [CCParticleSmoke node];\n            break;\n        case\
    \ ParticleTypeSnow:\n            system = [CCParticleSnow node];\n           \
    \ break;\n        case ParticleTypeSpiral:\n            system = [CCParticleSpiral\
    \ node];\n            break;\n        case ParticleTypeSun:\n            system\
    \ = [CCParticleSun node];\n            break;\n\n        default:\n          \
    \  // 不做任何操作\n            break;\n    }\n\n    [self addChild: system z:1 tag:1];\n\
    \n    [label setString:NSStringFromClass([system class])];\n}\n\n-(void) setNextParticleType\n\
    {\n    particleType++;\n    if (particleType == ParticleTypes_MAX)\n    {\n  \
    \      particleType = 0;\n    }\n}\n```\n\n**注意：** 在此示例中，`NSStringFromClass` 方法非常有用，它无需输入数十个匹配的字符串即可打印出类的名称。这是\
    \ Objective-C 语言一个很酷的运行时特性之一，即能够获取类名作为字符串。如果想在 C++ 中实现这一点，那将是一件非常麻烦的事。如果你喜欢深入研究这个高级主题，或者只是想了解\
    \ Objective-C 在底层是如何工作的，可以从《Objective-C 运行时编程指南》开始： [`developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html)。\n\
    \n对于游戏逻辑代码而言，`NSStringFromClass` 及相关方法几乎用不上，但它们是非常有用的调试和日志记录工具。你可以在 Apple 的 Foundation\
    \ 函数参考中找到这些方法的完整列表和描述： [`developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html`](http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html)。\n\
    \n如果你在自己的项目中使用了这些示例效果之一，可能会因为看到丑陋的方形像素而感到震惊。图 9–3 清晰地展示了这种效果。发生这种情况是因为所有内置粒子效果都试图加载一个名为`fire.png`的特定纹理，该纹理随\
    \ cocos2d-iphone 一起分发在`Resources/Images`文件夹中。即使没有纹理，只要粒子尺寸保持相当小，你仍然可以创建出非常好的粒子效果。但是，要看到内置粒子效果的本意，你需要将`fire.png`图像添加到你的\
    \ Xcode 项目中。\n\n![images](img/0903.jpg)\n\n**图 9–3.** *如果你的示例粒子效果（如此处的`CCParticleFireworks`）显示巨大的方形粒子，那是因为你忘了将`fire.png`图像添加到你的\
    \ Xcode 项目中。*\n\n### 手动创建粒子效果（传统方式）\n\n你可以轻松创建自己的`CCParticleSystem`类子类。但不那么容易的是，用它创建一个令人信服的粒子效果，更不用说创建一个接近你最初设想的效果了。以下是按功能分组、决定粒子系统外观和行为的属性列表：\n\
    \n- `emitterMode = gravity`\n    - `sourcePosition`\n    - `gravity`\n    - `radialAccel`,\
    \ `radialAccelVar`\n    - `speed`, `speedVar`\n    - `tangentialAccel`, `tangentialAccelVar`\n\
    - `emitterMode = radius`\n    - `startRadius`, `startRadiusVar`, `endRadius`,\
    \ `endRadiusVar`\n    - `rotatePerSecond`, `rotatePerSecondVar`\n- `duration`\n\
    - `posVar`\n- `positionType`\n- `startSize`, `startSizeVar`, `endSize`, `endSizeVar`\n\
    - `angle`, `angleVar`\n- `life`, `lifeVar`\n- `emissionRate`\n- `startColor`,\
    \ `startColorVar`, `endColor`, `endColorVar`\n- `blendFunc`, `blendAdditive`\n\
    - `texture`\n\n可以想象，这里有大量参数可以调整，而这正是实现你目标的主要问题所在：你必须重新构建并运行项目才能看到修改的效果。在阅读本章后面关于\
    \ Particle Designer 的部分时，你将了解到它是如何极大地简化新粒子效果创建过程的。\n\n现在，让我们先采用传统方式从头开始，以便理解 cocos2d\
    \ 粒子系统的工作原理。要从头编写一个粒子效果，你首先要学习如何创建`CCParticleSystem`类的子类以及如何初始化它。随后是对粒子系统属性的详细描述。\n"
- fmt: "### 子类化`CCParticleSystem`：`CCParticleSystemPoint`还是`CCParticleSystemQuad`？\n\
    \n要创建自己的粒子效果而不使用Particle Designer，你应该从`CCParticleSystemPoint`或`CCParticleSystemQuad`进行子类化。点粒子在第一代和第二代iOS设备上运行稍快，但在第三代和第四代设备（如iPhone\
    \ 3GS、iPad和iPhone 4）上性能不佳。这是由于CPU架构的变化。第三代和第四代设备使用的ARMv7 CPU架构引入了优化和新特性，例如向量浮点处理器和SIMD指令集（NEON）。`CCParticleSystemQuad`类同时受益于这些特性。\n\
    \n如果拿不准，我倾向于使用`CCParticleSystemQuad`，因为它在所有设备上性能表现都相当不错，并且能产生完全相同的视觉效果。或者，让cocos2d根据构建目标为你做出决定。你将在`ParticleEffectSelfMade`类中看到如何做到这一点，我将其添加到了ParticleEffects02项目中，详情请见[清单\
    \ 9–2](#Chapter09.html#list_9_2)。\n\n**清单 9–2.** *从最佳粒子系统类进行子类化*\n\n```\n#import\
    \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n// 根据目标设备，ParticleEffectSelfMade类将从CCParticleSystemPoint或CCParticleSystemQuad派生\n\
    @interface ParticleEffectSelfMade : ARCH_OPTIMAL_PARTICLE_SYSTEM\n{\n}\n@end\n\
    ```\n\n预处理定义`ARCH_OPTIMAL_PARTICLE_SYSTEM`代替了实际的类名，用于在编译期间确定该类应从哪个粒子系统进行子类化。cocos2d中的定义基于处理器架构，结果为`CCParticleSystemQuad`或`CCParticleSystemPoint`：\n\
    \n```\n// 为每个架构构建最优粒子系统\n#ifdef __ARM_NEON__\n    // armv7\n    #define ARCH_OPTIMAL_PARTICLE_SYSTEM\
    \ CCParticleSystemQuad\n#elif __arm__ || TARGET_IPHONE_SIMULATOR\n    // armv6\
    \ 或模拟器\n    #define ARCH_OPTIMAL_PARTICLE_SYSTEM CCParticleSystemPoint\n#else\n\
    \    #error(unknown architecture)\n#endif\n```\n\n现在，让我们看看这个自制的粒子效果的实现，它使用了所有可用的属性。我将尝试解释每一个属性，但最好还是亲自查看并试验这些参数，所以我鼓励你在这个项目中调整这些属性。在ParticleEffects02项目中（[清单\
    \ 9–3](#Chapter09.html#list_9_3)），你还会找到简要描述每个参数的注释。\n\n**清单 9–3.** *手动设置粒子系统的属性*\n\
    \n```\n#import \"ParticleEffectSelfMade.h\"\n\n@implementation ParticleEffectSelfMade\n\
    -(id) init\n{\n    return [self initWithTotalParticles:250];\n}\n\n-(id) initWithTotalParticles:(int)numParticles\n\
    {\n    if ((self = [super initWithTotalParticles:numParticles]))\n    {\n    \
    \    self.duration = kCCParticleDurationInfinity;\n        self.emitterMode =\
    \ kCCParticleModeGravity;\n\n        // 某些属性必须仅与特定的emitterMode一起使用！\n        if\
    \ (self.emitterMode == kCCParticleModeGravity)\n        {\n            self.sourcePosition\
    \ = CGPointMake(-15, 0);\n            self.gravity = CGPointMake(-50, -90);\n\
    \            self.radialAccel = -90;\n            self.radialAccelVar = 20;\n\
    \            self.tangentialAccel = 120;\n            self.tangentialAccelVar\
    \ = 10;\n            self.speed = 15;\n            self.speedVar = 4;\n      \
    \  }\n        else if (self.emitterMode == kCCParticleModeRadius)\n        {\n\
    \            self.startRadius = 100;\n            self.startRadiusVar = 0;\n \
    \           self.endRadius = 10;\n            self.endRadiusVar = 0;\n       \
    \     self.rotatePerSecond = -180;\n            self.rotatePerSecondVar = 0;\n\
    \        }\n\n        self.position = CGPointZero;\n        self.posVar = CGPointZero;\n\
    \        self.positionType = kCCPositionTypeFree;\n\n        self.startSize =\
    \ 40.0f;\n        self.startSizeVar = 0.0f;\n        self.endSize = kCCParticleStartSizeEqualToEndSize;\n\
    \        self.endSizeVar = 0;\n\n        self.angle = 0;\n        self.angleVar\
    \ = 0;\n\n        self.life = 5.0f;\n        self.lifeVar = 1.0f;\n\n        self.emissionRate\
    \ = 30;\n        self.totalParticles = 250;\n\n        startColor.r = 1.0f;\n\
    \        startColor.g = 0.25f;\n        startColor.b = 0.12f;\n        startColor.a\
    \ = 1.0f;\n        startColorVar.r = 0.0f;\n        startColorVar.g = 0.0f;\n\
    \        startColorVar.b = 0.0f;\n        startColorVar.a = 0.0f;\n        endColor.r\
    \ = 0.0f;\n        endColor.g = 0.0f;\n        endColor.b = 0.0f;\n        endColor.a\
    \ = 1.0f;\n        endColorVar.r = 0.0f;\n        endColorVar.g = 0.0f;\n    \
    \    endColorVar.b = 1.0f;\n        endColorVar.a = 0.0f;\n\n        self.blendFunc\
    \ = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};\n        // 或使用此快捷方式将blend func设置为：GL_SRC_ALPHA,\
    \ GL_ONE\n        //self.blendAdditive = YES;\n\n        self.texture = [[CCTextureCache\
    \ sharedTextureCache] addImage:@\"fire.png\"];\n    }\n    return self;\n}\n@end\n\
    ```\n\n### `CCParticleSystem`属性\n\n在[清单 9–3](#Chapter09.html#list_9_3)中，你会注意到代码相当冗长，原因是有太多粒子系统属性需要初始化。而且，其中大部分属性需要设置为可接受的值，才能在屏幕上显示出一个合理且有意义的粒子效果。有些属性甚至是互斥的，不能一起使用。是时候仔细研究一下这些粒子系统属性具体是做什么的了。\n\
    \n#### 方差属性\n\n你会注意到，许多属性都有后缀为`Var`的伴随属性。这些是方差属性，它们决定了相应属性所允许的模糊范围。以属性`life =\
    \ 5`和`lifeVar = 1`为例。这些值意味着平均每个粒子会存在5秒钟。方差允许的范围是5-1到5+1。因此，每个粒子将获得一个4到6秒之间的随机生命周期。\n\
    \n如果你不希望有任何变化，请将`Var`变量设置为0。正是方差赋予了粒子效果那种有机、模糊的行为和外观。但是，当你设计一个新效果时，方差也可能造成混淆，所以除非你有一些经验，否则我建议从一个方差很小或没有方差的粒子效果开始。\n\
    \n#### 粒子数量\n\n让我们从粒子效果中的粒子总数开始了解粒子，该数量由`totalParticles`属性控制。`totalParticles`变量通常由`initWithTotalParticles`方法设置，但之后可以更改。粒子数量直接影响效果的外观和性能。\n\
    \n```\n-(id) init\n{\n    return [self initWithTotalParticles:250];\n}\n```\n\n\
    如果粒子太少，你将无法获得漂亮的辉光，但可能足以在玩家撞墙时在他头上撒几颗星星。如果粒子太多，也可能不是你想要的，因为许多粒子会重叠渲染并且可能混合，导致你最终看到的是一团白色。此外，使用太多粒子很容易导致帧率下降。这就是Particle\
    \ Designer工具不允许你创建超过2000个粒子的效果的原因。\n\n**提示：** 通常，你应该力求使用最少的粒子数来达到理想效果。粒子大小也扮演着重要角色——单个粒子的尺寸越小，性能就会越好。特别是对于粒子效果，在第一代和第二代设备上进行测试非常重要，因为它们会严重且负面地影响旧设备的性能。"
  raw: '#### Subclassing CCParticleSystem: Point or Quad?


    To create your own particle effect without Particle Designer, you should subclass
    either from `CCParticleSystemPoint` or from `CCParticleSystemQuad`. Point particles
    are a bit faster on first- and second-generation iOS devices but don''t perform
    well on third- and fourth-generation devices like the iPhone 3GS, iPad, and iPhone
    4\. This is because of the change in CPU architecture. The ARMv7 CPU architecture
    used in third- and fourth-generation devices introduced optimizations and new
    features, such as a vector floating-point processor and the SIMD instruction set
    (NEON).The `CCParticleSystemQuad` class benefits fromboth.


    If in doubt, Iprefer touse the `CCParticleSystemQuad` since it performs reasonably
    well across all devices and creates exactly the same visual effects. Or let cocos2d
    make that decision for you based on the build target. You''ll see how you can
    do so in the `ParticleEffectSelfMade` class I''ve added to the ParticleEffects02
    project, which you can see in [Listing 9–2](#Chapter09.html#list_9_2).


    **Listing 9–2.** *Subclassing from the Optimal Particle System Class*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `// Depending on the targeted device the ParticleEffectSelfMade class will either
    derive`

    `// from CCParticleSystemPoint or CCParticleSystemQuad`

    `@interface ParticleEffectSelfMade : ARCH_OPTIMAL_PARTICLE_SYSTEM`

    `{`

    `}`

    `@end`


    The preprocessor definition `ARCH_OPTIMAL_PARTICLE_SYSTEM`, instead of an actual
    class name, is used to determine during compilation which of the two particle
    systems this class should subclass from. The definition in cocos2d is based on
    the processor architecture and results either in a `CCParticleSystemQuad` or in
    a `CCParticleSystemPoint`:


    `// build each architecture with the optimal particle system`

    `#ifdef __ARM_NEON__`

    `    // armv7`

    `    #define ARCH_OPTIMAL_PARTICLE_SYSTEM CCParticleSystemQuad`

    `#elif __arm__ || TARGET_IPHONE_SIMULATOR`

    `    // armv6 or simulator`

    `    #define ARCH_OPTIMAL_PARTICLE_SYSTEM CCParticleSystemPoint`

    `#else`

    `    #error(unknown architecture)`

    `#endif`


    Now let''s look at the implementation of the self-made particle effect, which
    uses all available properties. I''ll attempt to explain each of them, but it''s
    much better to see it for yourself and experiment with the parameters, so I encourage
    you to tweak the properties in this project. In the ParticleEffects02 project
    ([Listing 9–3](#Chapter09.html#list_9_3)), you''ll also find comments describing
    each parameter in brief.


    **Listing 9–3.** *Manually Setting a Particle System''s Properties*


    `#import "ParticleEffectSelfMade.h"`


    `@implementation ParticleEffectSelfMade`

    `-(id) init`

    `{`

    `    return [self initWithTotalParticles:250];`

    `}`


    `-(id) initWithTotalParticles:(int)numParticles`

    `{`

    `    if ((self = [super initWithTotalParticles:numParticles]))`

    `    {`

    `        self.duration = kCCParticleDurationInfinity;`

    `        self.emitterMode = kCCParticleModeGravity;`


    `        // some properties must only be used with a specific emitterMode!`

    `        if (self.emitterMode == kCCParticleModeGravity)`

    `        {`

    `            self.sourcePosition = CGPointMake(-15, 0);`

    `            self.gravity = CGPointMake(-50, -90);`

    `            self.radialAccel = -90;`

    `            self.radialAccelVar = 20;`

    `            self.tangentialAccel = 120;`

    `            self.tangentialAccelVar = 10;`

    `            self.speed = 15;`

    `            self.speedVar = 4;`

    `        }`

    `        else if (self.emitterMode == kCCParticleModeRadius)`

    `        {`

    `            self.startRadius = 100;`

    `            self.startRadiusVar = 0;`

    `            self.endRadius = 10;`

    `            self.endRadiusVar = 0;`

    `            self.rotatePerSecond = -180;`

    `            self.rotatePerSecondVar = 0;`

    `        }`


    `        self.position = CGPointZero;`

    `        self.posVar = CGPointZero;`

    `        self.positionType = kCCPositionTypeFree;`


    `        self.startSize = 40.0f;`

    `        self.startSizeVar = 0.0f;`

    `        self.endSize = kCCParticleStartSizeEqualToEndSize;`

    `        self.endSizeVar = 0;`


    `        self.angle = 0;`

    `        self.angleVar = 0;`


    `        self.life = 5.0f;`

    `        self.lifeVar = 1.0f;`


    `        self.emissionRate = 30;`

    `        self.totalParticles = 250;`


    `        startColor.r = 1.0f;`

    `        startColor.g = 0.25f;`

    `        startColor.b = 0.12f;`

    `        startColor.a = 1.0f;`

    `        startColorVar.r = 0.0f;`

    `        startColorVar.g = 0.0f;`

    `        startColorVar.b = 0.0f;`

    `        startColorVar.a = 0.0f;`

    `        endColor.r = 0.0f;`

    `        endColor.g = 0.0f;`

    `        endColor.b = 0.0f;`

    `        endColor.a = 1.0f;`

    `        endColorVar.r = 0.0f;`

    `        endColorVar.g = 0.0f;`

    `        endColorVar.b = 1.0f;`

    `        endColorVar.a = 0.0f;`


    `        self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};`

    `        // or use this shortcut to set the blend func to: GL_SRC_ALPHA, GL_ONE`

    `        //self.blendAdditive = YES;`


    `        self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];`

    `    }`

    `    return self;`

    `}`

    `@end`


    #### CCParticleSystem Properties


    In [Listing 9–3](#Chapter09.html#list_9_3) you will have noticed how verbose the
    code is simply because so many particle system properties can be initialized.
    And most of them need to be set to acceptable values in order to get a reasonably
    meaningful particle effect displayed on the screen. Some properties are even mutually
    exclusive and can''t be used together. It''s time to take a close look t what
    these particle system properties actually do.


    ##### Variance Properties


    You''ll notice that many properties have companion properties suffixed with `Var`.
    These are variance properties, and they determine the range of fuzzyness that
    is allowed for the corresponding property. Take, for example, the properties `life
    = 5` and `lifeVar = 1`. These values mean that on average each particle will live
    for five seconds. The variance allows a range of 5-1 to 5+1\. So, each particle
    will get a random lifetime between four to six seconds.


    If you don''t want any variation, set the `Var` variable to 0\. Variation is what
    gives particle effects their organic, fuzzy behavior and appearance. But variation
    can also be confusing when you design a new effect, so unless you have some experience,
    I recommend starting with a particle effect that has little or no variance.


    ##### Number of Particles


    Let''s get acquainted with particles by starting with the total number of particles
    in the particle effect, controlled by the `totalParticles` property. The `totalParticles`
    variable is usually set by the `initWithTotalParticles` method but can be changed
    later. The number of particles has a direct impact both on the look of the effect
    and on performance.


    `-(id) init`

    `{`

    `    return [self initWithTotalParticles:250];`

    `}`


    Use too few particles and you won''t get a nice glow, but it may be sufficient
    to sprinkle a few stars around the player''s head when he runs into a wall. Use
    too many particles and it might not be what you want either, because many particles
    are rendered on top of one another and possibly blended so you basically end up
    with a white blob. Furthermore, using too many particles easily kills your framerate.
    There''s a reason why the Particle Designer tool won''t let you create effects
    with more than 2,000 particles.


    **TIP:** In general, you should aim to achieve the desired effect with the smallest
    number of particles. Particle size also plays an important role—the smaller the
    size of individual particles, the better the performance will be. Especially with
    Particle Effects, it is important to test them on first- and second-generation
    devices because they can have a severe and negative impact on performance on the
    older devices.'
