    `// and so on …`


    Before performing the selector, `notifyAB` first checks whether `obj` actually
    responds to that selector. In the current implementation, only the `Plunger` class
    implements one of the selectors: `beginContactWithBall`. All other selectors will
    never be performed since they don''t exist (yet).


    The `Contact` class is also defined in ContactListener.h and merely acts as a
    container object holding any collision information that you might want to pass
    to receiving classes. By using a container class, the selector format does not
    need to change when you decide to pass more or less information, simply because
    the only parameter is a pointer to a `Contact` object and the information is encapsulated
    within the `Contact` class.


    **TIP:** There''s also a technical reason for using a container class. The `performSelector`
    method of the `NSObject` class knowsonly three variants: with zero, one, or two
    parameters. Since we definitely like to pass on more than two parameters to the
    receiving object, there''s simply no other choice than to use a container class.
    Whenever you find the `performSelector` method limiting, remember that you can
    always create a container class holding any information that you''d like to pass
    on to the class implementing the selector.


    Since `Contact` is such a simple class, [Listing 13–21](#Chapter13.html#list_13_21)
    shows both interface and implementation in one Listing.


    **Listing 13–21.** *Interface and Implementation of the Contact Class*


