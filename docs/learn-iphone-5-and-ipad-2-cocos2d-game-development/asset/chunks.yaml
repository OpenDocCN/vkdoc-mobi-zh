  trans: '

    #### 创建新地图


    下载、解压、安装并启动 Tiled 后，第一件事是进入 `View` 菜单，勾选 `Tilesets` 和 `Layers` 这两个选项。这样，Tiled
    窗口的右侧就会显示图层列表和当前图块集。然后选择 `File` ![images](img/U001.jpg) `New` 来创建新地图。这将弹出如图 10-5
    所示的“新建地图”对话框。


    ![images](img/1005.jpg)


    **图 10-5.** *在 Tiled 中创建新地图*


    目前，Tiled 既支持正交（矩形）地图，也支持等轴测地图。地图尺寸以图块为单位，而非像素。在本例中，新地图为 30×20 个图块，每个图块图像的尺寸为 32×32
    像素，因为图块图像本身就是这样大。至关重要的是，图块尺寸必须与你的图块图像尺寸相匹配，否则它们将无法对齐。


    新地图将完全是空的，并且没有加载任何可供你绘制的图块集。你可以通过选择 Tiled 菜单中的 `Map` ![images](img/U001.jpg) `New
    Tileset` 来添加图块集。这将打开 `New Tileset` 对话框（如图 10-6 所示），你可以在其中浏览并找到合适的图块集图像。图块集只是一个名称，指代包含多个等间距图块的图像，因此你也可以称其为仅包含相同尺寸图像的纹理图集。


    **注意：** `Map` ![images](img/U001.jpg) `Add External Tileset` 功能仅用于导入先前导出的图块集，以便与多个
    TMX 地图共享同一个图块集。你可以通过右键单击 Tiled 窗口右下角的图块集视图，然后选择 `Export Tileset As` 来导出图块集。


    我将使用 `dg_grounds32.png` 这个图块集。这些图块由 David E. Gervais 绘制，并在知识共享许可协议下发布，这意味着你可以自由分享和改编他的作品，只要注明他的贡献即可。你可以从他的网站下载更多图块集：[`http://pousse.rapiere.free.fr/tome/index.htm`](http://pousse.rapiere.free.fr/tome/index.htm)。


    在图 10-6 中，我已经通过 Tilemap01 项目 Resources 文件夹中的 `Browse` 按钮定位并添加了 `dg_grounds32.png`
    图块集图像。如果你勾选了“`Use transparent color`”复选框，透明区域将默认以粉色绘制。目前你可以不勾选此框，因为使用的图块没有透明区域。


    图块宽度和高度是图块集中每个独立图块的尺寸。它们应与你在创建新地图时设置的 32×32 像素图块尺寸相匹配。`Margin` 和 `Spacing` 设置决定了图块距离图像边框的像素数以及图块之间的间隔像素数。对于
    `dg_grounds32.png`，图块之间完全没有间隔，因此我将两个值都设为 0。


    如果你使用 TexturePacker 对齐图块来创建图块集纹理，则必须在 `Margin` 和 `Spacing` 字段中输入 TexturePacker
    使用的像素填充值。默认情况下，TexturePacker 使用的填充值为 0 像素。


    ![images](img/1006.jpg)


    **图 10-6.** *从图像文件创建新的图块集*


    加载新的图块集图像时，请确保该图像已经位于你项目的资源文件夹中。然后你还应确保将地图的 TMX 文件保存到地图所使用的图块集图像所在的同一文件夹中。否则，cocos2d
    可能无法加载图块集图像；尝试加载 TMX 文件将导致运行时异常。问题在于 TMX 文件是相对于其自身保存位置来引用图块集图像的。如果两者不在同一文件夹中，cocos2d
    可能找不到图像，因为在模拟器或设备上安装应用时，文件夹结构不会被保留。


    **提示：** TMX 文件是纯 XML 文件，如果你好奇，可以打开看看。如果你看到图像文件引用包含路径部分，那么 cocos2d 很可能无法加载所引用的图像文件。图像引用应该只列出图像文件名，不带任何路径成分，如下所示：`<image
    source="tiles.png"/>`。


    #### 设计地图


    加载图块集后，你将面对一张空白地图，这是对你的创造力发出的邀请，去构思一个绝佳的地图方案。更好的做法是，将消除空白地图作为第一步。从一个默认的地面图块开始设计地图是非常有帮助的。我选择了
    `Bucket Fill tool`（桶填充工具），并选取了一块明亮的草地砖，这样我的地图现在看起来就像是一片茂盛的草地——大致如此。你可以在图 10-7
    中看到效果。


    ![images](img/1007.jpg)


    **图 10-7.** *加载了 dg_grounds32 图块集的空白地图，等待你的灵感*


    **提示：** 如果你发现 Tiled 窗口中缺少某些内容，请检查 `View` 菜单。你可以隐藏或显示图块集（Tilesets）、图层（Layers）和历史记录（History）视图。知道这一点很重要，因为如果你不小心点击了某个视图上的
    `X` 按钮，这是将它们重新显示出来的唯一方法。


    Tiled 使用四种模式来编辑地图，由工具栏最右侧的四个图标表示。它们分别是：`Stamp Brush`（快捷键 B），允许你绘制图块集中的当前选中项；`Bucket
    Fill`（快捷键 F），用于填充相连且相同的图块区域；`Eraser`（快捷键 E），用于擦除图块；以及 `Rectangular Select`（快捷键
    R），用于选择一定范围的图块，然后复制并粘贴所选内容。


    你还可以缩放地图。如果你有带滚轮的鼠标，只需按住 Command 键并滚动滚轮即可放大和缩小。此外，你也可以通过按住 Command 键并分别按下加号或减号键来放大和缩小。


    你大部分时间将花在从图块集中选择图块，并在选中 `Stamp Brush` 工具后将其绘制到地图上。逐个放置图块，你将逐步构建出基于图块的游戏世界。


    你还可以通过在图层面板中添加更多图层来编辑多层图块。从菜单中选择 `Layer` ![images](img/U001.jpg) `Add Tile Layer`
    来为图块创建一个新图层。使用多个图块图层可以让你在 `cocos2d` 中切换地图的不同区域。在 TileMap01 示例项目中，我利用这一点在地图的冬季和夏季部分之间进行切换。


    你也可以选择 `Layer` ![images](img/U001.jpg) `Add Object Layer` 来添加一个用于放置对象的图层。对象有两种类型：常规对象只是你可以放置的矩形；另一种类型是图块对象，允许你在地图上任意位置自由放置一个图块，而无需对齐到图块网格。你可以使用矩形对象来为地图添加自定义信息，例如生成点、传送点或触发器区域。图块对象最常用于直接在基于图块的世界中放置较小的物品，如剑、花、蜡烛和其他物品。


    要处理对象，Tiled 工具栏中还有额外的按钮：选择对象（快捷键 S）、插入对象（快捷键 O）和插入图块对象（快捷键 T）。要插入一个矩形对象，请单击 `Insert
    Objects` 图标，然后在地图世界中点击以创建点对象（宽度和高度为零的矩形），或点击并向右下方拖拽以创建一个矩形。要插入一个图块对象，请单击 `Insert
    Tile Objects` 图标，从图块集中选择一个图块，然后点击地图世界以添加一个新的图块对象。


    Tiled 中的某些功能隐藏在上下文菜单中。例如，我刚刚提到的矩形对象可以通过在地图视图中右键单击它们并选择 `Remove Object` 来删除。请注意，你也需要确保在图层面板中选中了对象图层，上下文菜单才会出现。

