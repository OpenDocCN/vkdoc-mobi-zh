  trans: '

    #### 在 cocos2d 视图前添加视图


    在 `CocosWithCocoa03` 项目中，我在 cocos2d 视图之上添加了 `UITextField` 视图。`UITextField` 是一个简单的文本输入框，点击后会自动弹出
    iPhone 键盘。我从 `HelloWorldLayer` 类实现的 `addSomeCocoaTouch` 方法中去掉了 `UIAlertView`，并添加了
    `UITextField`：


    ```

    -(void) addSomeCocoaTouch

    {

        // 带圆角的常规文本字段

        UITextField* textField = [[UITextField alloc] initWithFrame:

            CGRectMake(40, 20, 200, 24)];

        textField.text = @"Regular UITextField";

        textField.borderStyle = UITextBorderStyleRoundedRect;


        // 获取 cocos2d 视图（即继承自 UIView 的 EAGLView 类）

        UIView* glView = [CCDirector sharedDirector].openGLView;


        // 将文本字段视图添加到 cocos2d EAGLView

        [glView addSubview:textField];


        // 之后即可安全释放 textField

        [textField release];

    }

    ```


    需要注意的是，通过编程方式创建 `UIView` 类的方法与创建 `UITextField` 非常相似。选取一个派生自 `UIView` 的所需类，然后调用
    `alloc` 和 `initWithFrame`。大多数 `UIView` 控件只需提供一个矩形 frame 即可创建。不过，之后通常需要设置一些属性来配置控件；在此示例中，我为
    `textField` 设置了圆角样式以及初始文本。


    **注意：** frame 矩形是许多程序员首次注意到 cocos2d 节点与 `UIView` 类坐标系不同之处。在 cocos2d 中，原点 (0, 0)
    位于屏幕左下角，而 `UIView` 类的原点位于屏幕左上角。这意味着 `UITextField` 实际上位于屏幕顶部边框下方 20 像素处，而非底部边框上方
    20 像素处。在使用 `UIView` 类时，您需要牢记这一点。


    由于 `UITextField`（与大多数其他 `UIView` 类一样）没有 `show` 方法，您需要采用其他方式将其添加到视图层级中。因为 cocos2d
    视图是 `EAGLView` 类，而该类又继承自 `UIView`，所以您只需将 `UITextField` 作为子视图添加到 cocos2d 的 `glView`
    即可。`CCDirector` 有一个 `openGLView` 属性，允许您访问 cocos2d 视图，然后对其调用 `addSubview` 方法来添加
    `textField`。默认情况下，这会将视图添加到 cocos2d 视图之上。


    如果现在运行，您会在场景中看到一个文本字段，点击该文本字段后，iPhone 键盘会弹出，您就可以开始编辑文本了。无需额外代码。不过，键盘将无法再消失。


    这是有意为之，因为 Return 键可能用于新建一行而非结束编辑。因此，您需要某种方法来关闭键盘。为此，请打开 `HelloWorldLayer` 头文件，将
    `UIAlertViewDelegate` 协议替换为 `UITextFieldDelegate` 协议，如下所示：


    ```

    @interface HelloWorldLayer : CCLayer <UITextFieldDelegate>

    {

    }

    ```


    这样做可以让 `HelloWorldLayer` 类响应 `UITextFieldDelegate` 方法，例如 `textFieldShouldReturn`。为此，您必须将
    `HelloWorldLayer` 类实例赋值给 `UITextField` 的 `delegate` 属性，即指定 `self` 为其代理。在 `UITextField`
    初始化代码块末尾添加高亮行：


    ```

    // 带圆角的常规文本字段

    UITextField* textField = [[UITextField alloc] initWithFrame:

        CGRectMake(40, 20, 200, 24)];

    textField.text = @"  Regular UITextField";

    textField.borderStyle = UITextBorderStyleRoundedRect;

    textField.delegate = self;

    ```


    大多数 UIKit 视图都拥有这个 `delegate` 方法及相应的代理协议。因此，如果您想知道如何响应某个 `UIView` 的事件，可以通过实现该类的代理协议并响应相应的消息来实现。当然，您经常会犯的一个非常常见的错误（我知道我自己就常犯）是忘记实际为视图指定代理或指定正确的代理。因此，当代理方法未被调用时，您应检查是否已将（正确的）类实例设置为视图的代理。


    在我们的案例中，每当用户在 iPhone 键盘上点击 Return 键时，`UITextFieldDelegate` 协议的 `textFieldShouldReturn`
    消息就会被发送：


    ```

    -(BOOL) textFieldShouldReturn:(UITextField *)textField

    {

        // 关闭键盘

        [textField resignFirstResponder];


        // 如果文本为空，则移除文本字段

        if ([textField.text length] == 0)

        {

            [textField removeFromSuperview];

        }


        return YES;

    }

    ```


    通过向 `textField` 发送 `resignFirstResponder` 消息，键盘将被关闭。作为从 cocos2d 视图中移除 `UIView`
    的一种练习，我添加了一个条件：当用户按下 Return 且 `textField` 为空时，向 `textField` 发送 `removeFromSuperview`
    消息。请注意，整个方法既不在乎是哪个 `UITextField` 发送的消息，也不在乎 `textField` 在视图层级中的添加位置。接下来我们将利用这一点添加另一个
    `UITextField`。


    如果运行目前已有的代码，您会注意到按下 Return 键时键盘会关闭，并且如果您删除了文本字段中的所有字符，整个文本字段会消失。


    **提示：** 请记住，如果用户正在 `UITextField` 中编辑文本时场景可能发生切换，您就需要手动向所有文本字段发送 `resignFirstResponder`
    消息以关闭键盘。否则，键盘可能会在场景切换期间及之后保持可见，用户将无法再将其关闭。为避免这种情况，最好同时响应 `textFieldDidBeginEditing`
    消息，并利用它暂时禁用任何可能改变当前场景的按钮或事件。然后在收到 `textFieldShouldReturn` 消息时重新启用这些按钮或事件。

