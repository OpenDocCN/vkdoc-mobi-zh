- fmt: '#### Porting to iPad with Xcode 3


    Porting an iPhone project is a simple process. If you are using Xcode 3, then
    select the target in the `Groups & Files` pane that you want to convert and select
    **Project** → **Upgrade Current Target for iPad…**, which will bring up the dialog
    in [Figure 4–8](#Chapter04.html#fig_4_8).


    ![images](images/0408.jpg)


    **Figure 4–8.** *Upgrading a target for iPad in Xcode 3 gives you two choices.
    Universal application requires you to add both iPhone and iPad assets to the same
    target, increasing the app’s download size.*


    For a simple game, the default **One Universal application** is fine. It does
    have the drawback that all assets are added to the same target, increasing the
    app’s size. That’s the only technical drawback; there are no performance penalties.
    The resulting app can be run on both the iPhone and iPad. Choosing the **Two device-specific
    applications** option lets you keep game assets separate, but you end up with
    two apps, which you would have to submit to the App Store individually.


    The easier option for now is to choose **One Universal application** and run the
    code. On the device, the app will automatically detect which device is connected
    and run the appropriate version. If you want to try it in the iPad Simulator,
    just select the iPad Simulator as the active executable, as in [Figure 4–9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    **Figure 4–9.** *To run the new Universal app in the iPad Simulator, make it the
    active executable.*


    #### Porting to iPad with Xcode 4


    Xcode 4 makes porting apps incredibly straightforward, so much so that you can
    change the targeted device with a simple drop-down.


    First, select the project `DoodleDrop` in the Project Navigator. This brings up
    the list of targets where you select the `DoodleDrop` target and then choose the
    **Summary** tab. Under the iOS Application Target section, there’s a pop-up control
    labeled `Devices` that gives you three choices: iPhone, iPad, and Universal.


    Depending on the device setting, your app is either built for iPhone or iPad specifically
    or supports both iPhone and iPad as a Universal app. In [Figure 4–10](#Chapter04.html#fig_4_10)
    the target is set to build a Universal app.


    ![images](images/0410.jpg)


    **Figure 4–10.** *Changing the application target to build a Universal app*


    Now you may be wondering, what if I want two separate targets for iPhone and iPad?
    This can be useful to charge different prices for iPhone and iPad versions or
    simply to reduce the download size of either version.


    In that case, all you have to do is to select the target, `DoodleDrop` in this
    case, and choose **Edit** → **Duplicate** from the menu. Or just right-click the
    target and select **Duplicate**. This creates a duplicate of the target, which
    allows you to set one target’s `Devices` setting to iPhone and the other target’s
    `Devices` setting to iPad. Now you have a separate target for each device type,
    and you might want to label the targets accordingly to avoid confusion.


    ### Summary


    I hope you had fun building this first game. It was surely a lot to take in, but
    I’d rather err on the side of too much information than too little.


    At this point, you’ve learned how to create your own game-layer class and how
    to work with sprites. You’ve used the accelerometer to control the player and
    added velocity to allow the player sprite to accelerate and decelerate, giving
    it a more dynamic feel.


    I also introduced you to the undocumented `CCArray` class, cocos2d’s replacement
    for `NSMutableArray`. This should be your preferred choice when you need to store
    a list of data. Simple radial collision detection using the distance check method
    from the likewise undocumented `CGPointExtensions` was also on the menu.


    And for dessert you had a potpourri of labels, bitmap fonts, and the Glyph Designer
    tool, garnished with some audio programming.


    What’s left? Maybe going through the source code for this chapter. I’ve added
    a finalized version of this game that includes some game-play improvements, a
    startup menu, and a game-over message.


    There’s just one thing about the `DoodleDrop` project I haven’t mentioned yet:
    it’s all in one class. For a small project, this may suffice, but it’ll quickly
    get messy as you move on to implement more features. You need to add some structure
    to your code design. The next chapter will arm you with cocos2d programming best
    practices and show you how to lay out your code and the various ways information
    can be passed between objects if they are no longer in the same class.


    ## Chapter 5


    ## Game Building Blocks


    The game `DoodleDrop` in the previous chapter was written to be easy to understand
    if you’re new to cocos2d. If you’re a more experienced developer, though, you
    probably noticed that there is no separation of code; everything is in just one
    file. Clearly, this doesn’t scale, and if you’re going to make bigger, more exciting
    games than `DoodleDrop`, you’ll have to find a suitable way to structure your
    code. Otherwise, you might end up with one class driving your game’s logic. The
    code size can quickly grow to thousands of lines, making it hard to navigate and
    tempting to change anything from anywhere, very likely introducing subtle and
    hard-to-find bugs.


    Each new project demands its own code design. In this chapter, I’ll introduce
    you to some of the building blocks for writing more complex cocos2d games. The
    code foundation laid out in this chapter will then be used to create the side-scrolling
    shooter game we’ll be building in the next few chapters.


    ### Working with Multiple Scenes


    The `DoodleDrop` game had only one scene and one layer. More complex games will
    surely need several scenes and multiple layers. How and when to use them will
    become second nature for you. Let’s see what’s involved.'
