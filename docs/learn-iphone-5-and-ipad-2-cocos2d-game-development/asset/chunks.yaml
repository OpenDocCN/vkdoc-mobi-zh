    **Listing 8–7.** *Initializing the Pool of Enemies for Later Reuse*


    `-(void) initEnemies`

    `{`

    `    // create the enemies array containing further arrays for each type`

    `    enemies = [[CCArray alloc] initWithCapacity:EnemyType_MAX];`


    `    // create the arrays for each type`

    `    for (int i = 0; i < EnemyType_MAX; i++)`

    `    {`

    `        // depending on enemy type the array capacity is set`

    `        // to hold the desired number of enemies`

    `        int capacity;`

    `        switch (i)`

    `        {`

    `            case EnemyTypeUFO:`

    `                capacity = 6;`

    `                break;`

    `            case EnemyTypeCruiser:`

    `                capacity = 3;`

    `                break;`

    `            case EnemyTypeBoss:`

    `                capacity = 1;`

    `                break;`


    `            default:`

    `                [NSException exceptionWithName:@"EnemyCache Exception"`

    `                                        reason:@"unhandled enemy type"`

    `                                      userInfo:nil];`

    `                break;`

    `        }`


    `        // no alloc needed since the enemies array will retain anything added
    to it`

    `        CCArray* enemiesOfType = [CCArray arrayWithCapacity:capacity];`

    `        [enemies addObject:enemiesOfType];`

    `    }`


    `    for (int i = 0; i < EnemyType_MAX; i++)`

    `    {`

    `        CCArray* enemiesOfType = [enemies objectAtIndex:i];`

    `        int numEnemiesOfType = [enemiesOfType capacity];`


    `        for (int j = 0; j < numEnemiesOfType; j++)`

    `        {`

    `            EnemyEntity* enemy = [EnemyEntity enemyWithType:i];`

    `            [batch addChild:enemy z:0 tag:i];`

    `            [enemiesOfType addObject:enemy];`

    `        }`

    `    }`

    `}`


    `-(void) dealloc`

    `{`

    `    [enemies release];`

    `    [super dealloc];`

    `}`


    The interesting part here is that the `CCArray*enemies` itself contains more `CCArray*`
    objects, one per enemy type. It''s what''s called a two-dimensional array. The
    member variable `enemies` requires the use of `alloc`, because otherwise its memory
    would be freed after leaving the `initEnemies` method. In contrast, the `CCArray*`
    objects added to the `enemiesCCArray` do not need to be created using `alloc`,
    because the `enemiesCCArray` retains the objects added to it.'
  trans: "\n由于所有敌机实例都预先通过`EnemyCache`创建，整个生成过程仅需在屏幕右侧外随机选择一个`y`坐标，然后将`EnemyEntity`精灵设为可见。`visible`状态在项目的其他位置（尤其是组件类）用于判断`EnemyEntity`是否正在使用。若不可见，可通过生成操作使其可见，但游戏逻辑代码仅在可见状态下执行。\n\
    \n### EnemyCache 类\n\n我刚刚提到了`EnemyCache`类。从其命名不难联想到`BulletCache`类——同样持有大量预初始化对象，以实现快速便捷的复用。这种做法避免了游戏过程中反复创建和释放对象，从而防止可能导致的轻微性能卡顿。尤其在动作游戏中，此类微小卡顿可能严重破坏玩家体验。基于此，让我们看看代码清单\
    \ 8-6 中`EnemyCache`朴实无华的头文件。\n\n**代码清单 8-6.** *EnemyCache 类的 @interface 声明*\n\n\
    ```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface EnemyCache\
    \ : CCNode\n{\n    CCSpriteBatchNode* batch;\n    CCArray* enemies;\n\n    int\
    \ updateCount;\n}\n@end\n```\n\n在包含所有敌机精灵的`spriteBatch`之后，有一个`enemiesCCArray`（注：`[enemies]`为原文笔误，此处指`enemies`），它按类型存储敌机列表。`updateCount`变量每帧递增，用于按固定间隔生成敌机。`EnemyCache`的`init`方法与`BulletCacheinit`极为相似，都涉及`CCSpriteBatchNode`的初始化：\n\
    \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        // 从当前使用的纹理图集中获取任意图像\n\
    \        CCSpriteFrame* frame = [[CCSpriteFrameCache sharedSpriteFrameCache] spriteFrameByName:@\"\
    monster-a.png\"];\n        batch = [CCSpriteBatchNode batchNodeWithTexture:frame.texture];\n\
    \        [self addChild:batch];\n\n        [self initEnemies];\n        [self\
    \ scheduleUpdate];\n    }\n\n    return self;\n}\n```\n\n由于敌机初始化代码稍显复杂，我将其单独提取为一个方法，如代码清单\
    \ 8-7 所示。\n\n**代码清单 8-7.** *初始化敌机对象池以供后续复用*\n\n```\n-(void) initEnemies\n{\n \
    \   // 创建敌机数组，其内每个元素为对应类型的子数组\n    enemies = [[CCArray alloc] initWithCapacity:EnemyType_MAX];\n\
    \n    // 为每种类型创建子数组\n    for (int i = 0; i < EnemyType_MAX; i++)\n    {\n    \
    \    // 根据敌机类型设定数组容量，以容纳所需数量的敌机\n        int capacity;\n        switch (i)\n \
    \       {\n            case EnemyTypeUFO:\n                capacity = 6;\n   \
    \             break;\n            case EnemyTypeCruiser:\n                capacity\
    \ = 3;\n                break;\n            case EnemyTypeBoss:\n            \
    \    capacity = 1;\n                break;\n\n            default:\n         \
    \       [NSException exceptionWithName:@\"EnemyCache Exception\"\n           \
    \                             reason:@\"unhandled enemy type\"\n             \
    \                         userInfo:nil];\n                break;\n        }\n\n\
    \        // 无需 alloc，因为 enemies 数组会自动 retain 所有添加的对象\n        CCArray* enemiesOfType\
    \ = [CCArray arrayWithCapacity:capacity];\n        [enemies addObject:enemiesOfType];\n\
    \    }\n\n    for (int i = 0; i < EnemyType_MAX; i++)\n    {\n        CCArray*\
    \ enemiesOfType = [enemies objectAtIndex:i];\n        int numEnemiesOfType = [enemiesOfType\
    \ capacity];\n\n        for (int j = 0; j < numEnemiesOfType; j++)\n        {\n\
    \            EnemyEntity* enemy = [EnemyEntity enemyWithType:i];\n           \
    \ [batch addChild:enemy z:0 tag:i];\n            [enemiesOfType addObject:enemy];\n\
    \        }\n    }\n}\n\n-(void) dealloc\n{\n    [enemies release];\n    [super\
    \ dealloc];\n}\n```\n\n有趣的是，`CCArray*enemies` 本身包含多个 `CCArray*` 对象，每种敌机类型对应一个。这即所谓二维数组。成员变量\
    \ `enemies` 需使用 `alloc` 创建，否则其内存会在离开 `initEnemies` 方法后释放。相比之下，添加到 `enemiesCCArray`\
    \ 中的 `CCArray*` 对象则无需通过 `alloc` 创建，因为 `enemiesCCArray` 会 retain 所有加入的对象。\n"
- fmt: "每个`enemiesOfTypeCCArray`的初始容量也决定了该类型敌人可同时出现在屏幕上的数量。通过这种方式，你可以控制屏幕上敌人的最大数量。每个`enemiesOfTypeCCArray`随后会被通过`addObject`添加到`enemiesCCArray`中，就像其他任何对象一样。如果需要，你可以通过这种方式创建深层层次结构。事实上，cocos2d节点层次结构正是建立在包含`CCArray*children`成员变量的`CCNode`类之上，这些成员变量可以包含更多`CCNode`类，依此类推。\n\
    \n我将数组初始化与敌人创建拆分为两个独立的循环，尽管它们可以在同一个循环中完成。它们是不同的任务，应该保持分离。额外遍历所有敌人类型一次的开销可以忽略不计。\n\
    \n基于`CCArray`初始化循环中设置的初始容量，创建所需数量的敌人，将其添加到`CCSpriteBatchNode`，然后添加到对应的`enemiesOfTypeCCArray`中。虽然通过`CCSpriteBatchNode`也能访问这些敌人，但将敌人实体引用保存在独立的数组中，可以在后续活动（如生成）中更轻松地处理它们，如[Listing\
    \ 8–8](#Chapter08.html#list_8_8)所示。\n\n**Listing 8–8.** *生成敌人*\n\n```\n-(void)\
    \ spawnEnemyOfType:(EnemyTypes)enemyType\n{\n    CCArray* enemiesOfType = [enemies\
    \ objectAtIndex:enemyType];\n\n    EnemyEntity* enemy;\n    CCARRAY_FOREACH(enemiesOfType,\
    \ enemy)\n    {\n        // find the first free enemy and respawn it\n       \
    \ if (enemy.visible == NO)\n        {\n            CCLOG(@\"spawn enemy type %i\"\
    , enemyType);\n            [enemy spawn];\n            break;\n        }\n   \
    \ }\n}\n\n-(void) update:(ccTime)delta\n{\n    updateCount++;\n\n    for (int\
    \ i = EnemyType_MAX - 1; i >= 0; i--)\n    {\n        int spawnFrequency = [EnemyEntity\
    \ getSpawnFrequencyForEnemyType:i];\n\n        if (updateCount % spawnFrequency\
    \ == 0)\n        {\n            [self spawnEnemyOfType:i];\n            break;\n\
    \        }\n    }\n}\n```\n\n`update`方法增加了一个简单的`update`计数器。它没有考虑实际经过的时间，但由于差异通常很小，为了简化处理，这是一个合理的权衡。这个`for`循环从`EnemyType_MAX\
    \ – 1`开始，一直运行到`i`为负数。这样做的唯一目的是让编号较高的`EnemyTypes`拥有比编号较低的`EnemyTypes`更高的生成优先级。如果某个Boss怪物与一艘巡洋舰同时被预定生成，Boss会先生成。否则，巡洋舰可能会在同一时间尝试生成，占用Boss的生成槽位，从而阻止Boss生成。这是生成逻辑的一个副作用，我将其留给你来扩展和改进，因为如果你决定编写自己的经典射击游戏版本，你很可能需要这样做。\n\
    \n`spawnFrequency`通过`EnemyEntity`的`getSpawnFrequencyForEnemyType`方法获取：\n\n```\n\
    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n{\n    NSAssert(enemyType\
    \ < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber* number = [spawnFrequency\
    \ objectAtIndex:enemyType];\n    return [number intValue];\n}\n```\n\n该方法首先断言`enemyType`的编号确实在定义的范围内。然后获取该敌人类型对应的`NSNumber`对象，并将其作为`intValue`返回。\n\
    \n模运算符`%`返回两个操作数`updateCount`和`spawnFrequency`相除后的余数。这意味着只有当`updateCount`能被`spawnFrequency`整除（余数为0）时，才会生成敌人。\n\
    \n`spawnEnemyOfType`方法随后从`enemiesCCArray`中获取`CCArray`，该数组包含了`enemiesOfType`列表（另一个`CCArray`）。现在你可以只遍历所需的敌人类型，而无需遍历所有添加到`CCSpriteBatchNode`中的精灵。一旦找到一个不可见的敌人，就会调用它的`spawn`方法。如果该类型的所有敌人都可见，则说明当前屏幕上的敌人数量已达到最大值，不再生成新的敌人，从而有效限制了任何时刻屏幕上每种类型敌人的数量。"
  raw: 'The initial capacity of each `enemiesOfTypeCCArray` also determines how many
    enemies of that type can be on the screen at once. In this way, you can keep the
    maximum number of enemies on the screen under control. Each `enemiesOfTypeCCArray`
    is then added to `enemiesCCArray` using `addObject`, just like any other object.
    If you want, you can create deep hierarchies in this way. As a matter of fact,
    the cocos2d node hierarchy is built on `CCNode` classes containing `CCArray*children`
    member variables that can contain more `CCNode` classes, and so on.


    I split the array initialization and the creation of enemies into separate loops
    even though both could be done in the same loop. They are simply different tasks
    and should be kept separate. The additional overhead of going through all enemy
    types once again is negligible.


    Based on the initial capacity set in the `CCArray` initialization loop, the desired
    number of enemies is created, added to the `CCSpriteBatchNode`, and then added
    to the corresponding `enemiesOfTypeCCArray`. While the enemies could also be accessed
    through the `CCSpriteBatchNode`, keeping references to the enemy entities in separate
    arrays makes it easier to process them during later activities such as spawning,
    as shown in [Listing 8–8](#Chapter08.html#list_8_8).


    **Listing 8–8.** *Spawning Enemies*


    `-(void) spawnEnemyOfType:(EnemyTypes)enemyType`

    `{`

    `    CCArray* enemiesOfType = [enemies objectAtIndex:enemyType];`


    `    EnemyEntity* enemy;`

    `    CCARRAY_FOREACH(enemiesOfType, enemy)`

    `    {`

    `        // find the first free enemy and respawn it`

    `        if (enemy.visible == NO)`

    `        {`

    `            CCLOG(@"spawn enemy type %i", enemyType);`

    `            [enemy spawn];`

    `            break;`

    `        }`

    `    }`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    updateCount++;`


    `    for (int i = EnemyType_MAX - 1; i >= 0; i--)`

    `    {`

    `        int spawnFrequency = [EnemyEntity getSpawnFrequencyForEnemyType:i];`


    `        if (updateCount % spawnFrequency == 0)`

    `        {`

    `            [self spawnEnemyOfType:i];`

    `            break;`

    `        }`

    `    }`

    `}`


    The `update` method increases a simple `update` counter. It does not take into
    effect the actual time passed, but since the variances are typically minimal,
    it''s a fair trade-off to make life a bit easier. This `for` loop oddly starts
    at `EnemyType_MAX – 1` and runs until `i` is negative. The only purpose for this
    is that higher-numbered `EnemyTypes` have spawn precedence over lower-numbered
    `EnemyTypes`. If a boss monster is scheduled to appear at the same time as a cruiser,
    the boss will be spawned. Otherwise, it could happen that the cruiser takes the
    boss''s spawn slot by trying to spawn at the same time, blocking the boss from
    ever spawning. It''s a sideeffect of the spawning logic, and I leave it up to
    you to extend and improve this code, because you''ll probably have to do anyway
    if you decide to write your own version of a classic shoot-''em-up game.


    The `spawnFrequency` is obtained from `EnemyEntity`''s `getSpawnFrequencyForEnemyType`
    method:


    `+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType`

    `{`

    `    NSAssert(enemyType < EnemyType_MAX, @"invalid enemy type");`

    `    NSNumber* number = [spawnFrequency objectAtIndex:enemyType];`

    `    return [number intValue];`

    `}`


    First the method asserts that the `enemyType` number is actually within the defined
    range. Then the `NSNumber` object for that enemy type is obtained and returned
    as `intValue`.


    The modulo operator `%` returns the remainder left after the division of the two
    operands `updateCount` and `spawnFrequency`. This means an enemy is spawned only
    when `updateCount` can be evenly divided by `spawnFrequency`, resulting in a remainder
    of 0.


    The `spawnEnemyOfType` method then gets the `CCArray` from the `enemiesCCArray`,
    which contains the list of `enemiesOfType`, another `CCArray`. You can now iterate
    over only the desired enemy types, rather than having to go through all sprites
    added to the `CCSpriteBatchNode`. As soon as one enemy is found that is not visible,
    its `spawn` method is called. If all enemies of that type are visible, the maximum
    number of enemies is currently on-screen and no further enemies are spawned, effectively
    limiting the number of enemies of a type on the screen at any time.'
  trans: "\n每个`enemiesOfTypeCCArray`的初始容量也决定了该类型敌人可同时出现在屏幕上的数量。通过这种方式，你可以控制屏幕上敌人的最大数量。每个`enemiesOfTypeCCArray`随后会被通过`addObject`添加到`enemiesCCArray`中，就像其他任何对象一样。如果需要，你可以通过这种方式创建深层层次结构。事实上，cocos2d\
