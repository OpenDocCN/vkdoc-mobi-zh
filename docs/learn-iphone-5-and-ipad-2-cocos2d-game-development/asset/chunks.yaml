    `{`

    `    // set the ball''s position`

    `    float randomOffset = CCRANDOM_0_1() * 10.0f - 5.0f;`

    `    CGPoint startPos = CGPointMake(305 + randomOffset, 80);`


    `    body->SetTransform([Helper toMeters:startPos], 0.0f);`

    `    body->SetLinearVelocity(b2Vec2_zero);`

    `    body->SetAngularVelocity(0.0f);`

    `}`


    The `body->SetTransform` method is used to position the ball''s `body` and as
    with all bodies in this example game, the `update` method of the `PinballTable`
    class takes care of synchronizing the body''s sprite with the body''s position.
    The position in pixels must of course be converted to Box2D''s meter units, which
    is done by using the `Helper` class'' `toMeters` method. The second parameter
    of the `SetTransform` method is the rotation of the `body`.


    Just changing the body''s position is not enough. The body would still keep its
    current velocity (angular and linear) and would simply keep on moving. The last
    two lines of the `setBallStartPosition` method thus reset the linear and angular
    velocityof the body to zero. Linear velocity determines a body''s speed and direction,
    whereas angular velocity determines how fast and in which direction the body rotates.


    To actually make the ball appear on the pinball table, you''ll also have to add
    it to the scene. This is done in the `init` method of the `TableSetup` class,
    by adding these lines below the initialization of the `TablePart` objects:


    `Ball* ball = [Ball ballWithWorld:world];`

    `[self addChild:ball z:-1];`


    If you run the game now, you''d see the ball in the lower-left corner drop to
    the ground, and that''s it. You don''t have any way to move it yet, so let''s
    add some simple ball movement code for testing the bumpers before we get to add
    the plunger.


    #### Forcing the Ball to Move


    So far, the ball is just dropping down, and that''s it. We need a way, at least
    temporary, to control the ball. The `Ball` class implements the `CCTargetedTouchDelegate`
    and has registered itself to receive touches. Let''s check what the touch delegate
    methods do:


    `-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event`

    `{`

    `    moveToFinger = YES;`

    `    fingerLocation = [Helper locationFromTouch:touch];`

    `    return YES;`

    `}`


    `-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event`

    `{`

    `    fingerLocation = [Helper locationFromTouch:touch];`

    `}`


    `-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event`

    `{`

    `    moveToFinger = NO;`

    `}`


    These methods specify that while a finger is touching the screen, the ball moves
    toward the finger; and while the finger is moving, the `fingerLocation` is constantly
    updated.


    Next, let''s take a quick look at the `update` method of the `Ball` class:


    `-(void) update:(ccTime)delta`

    `{`

    `    if (moveToFinger == YES)`

    `    {`

    `        [self applyForceTowardsFinger];`

    `    }`


    `    if (sprite.position.y < -(sprite.contentSize.height * 10))`

    `    {`

    `        [self setBallStartPosition];`

    `    }`


    `    // limit speed of the ball`

    `    const float32 maxSpeed = 6.0f;`

    `    b2Vec2 velocity = body->GetLinearVelocity();`

    `    float32 speed = velocity.Length();`

    `    if (speed > maxSpeed)`

    `    {`

    `        velocity.Normalize();`

    `        body->SetLinearVelocity(maxSpeed * velocity);`

    `    }`


    `    // reset rotation of the ball`

    `    body->SetTransform(body->GetWorldCenter(), 0.0f);`

    `}`


    I''ll get to the `applyForceTowardsFinger` method next. But while we''re here,
    notice how we check to see whether the ball has gone down the drain. The sprite''s
    y position is compared with the sprite image''s height multiplied by 10\. Why
    the multiplication? That''s just to give the impression that it takes a short
    moment for the ball to roll back before it reappears. If the ball has fallen down
    far enough outside the screen area, the `setBallStartPosition` resets the ball''s
    position, and the fun begins anew.


    The `update` method also ensures that the ball has a maximum speed that it will
    never exceed. I''ve chosen the `maxSpeed` value to be 6.0 merely by trial and
    error.


    The length of the linear velocity vector of theball''s body is the ball''s current
    speed. If the body''s speed exceeds `maxSpeed`, the body should be slowed down
    to `maxSpeed` without changing its direction. This is achieved by first normalizing
    the velocity vector, which results in a vector that still points in the same direction
    but has a length of exactly one unit; this is called a *unit vector*. With a length
    of one unit, all you need to do is to multiply this unit vector by `maxSpeed`
    to cap the body''s velocity to `maxSpeed`.


    The last line simply causes the body''s rotation to be reset; in other words,
    the body never rotates. This is to prevent the ball''s sprite from rotating. Since
    the ball''s image has a highlight and a shadow, we can only create the illusion
    of a light source shining on the ball if the highlight and shadow of the ball
    stay in place.


    Since the body''s world center is set as the position, the position of the body
    remains the same, and only its rotation is updated. Doing so does not stop the
    physical effect of a spinning ball colliding with or sliding along hard surfaces
    because that effect is calculated from the body''s angular velocity, which remains
    unaffected. You can safely reset the ball''s rotation, because from the perspective
    of the physics engine, the ball''s shape being a circle means that the ball''s
    surface features are the same from any direction. A circle is completely symmetrical.


    Now let''s have a look at the `applyForceTowardsFinger` method, which makes the
    ball accelerate toward the finger, as in [Listing 13–10](#Chapter13.html#list_13_10).


    **Listing 13–10.** *Accelerating the Ball Toward the Touch Location*'
