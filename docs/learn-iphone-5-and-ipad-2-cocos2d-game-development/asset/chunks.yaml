    # 营销你的游戏与你自己


    如果你实在不确定自己的游戏仅凭趣味性能否成功，那么提高胜算的一个相当有效的方法，就是制作一款颜值高、色彩丰富，并且光看截图就让人觉得乐趣十足的游戏。由于移动设备价格低廉，进入门槛低，一款画面精美但玩法深度有限的作品，往往比那些拥有多种游戏模式、能提供数小时游戏体验的复杂游戏卖得更好，销量更高。这可能会让一些开发者感到痛苦，因为它违背了他们所信仰的一切，但这是生活中无法回避的事实。当然，如果你能两者兼顾，创造出一款既创新又有趣，同时画面还非常出色的游戏，那么机会将是无限的。


    浏览评测时，有一点你需要特别留意。其中最显眼的截图通常是游戏中的动作场景，而且往往是大量事件同时发生的瞬间。这几乎已经发展成一种艺术形式；专业开发者甚至会开发专门的工具来搭建场景，以便在不依赖运气、无需实际玩游戏的情况下，拍出效果最佳的动作截图。也许你也应该考虑这一点。因此，你能够创作或付费获得的最佳美术资源，绝对应该优先考虑，同样，为你的游戏制作一部有说服力的宣传片也至关重要。出色的呈现效果是吸引发行商与你洽谈的重要筹码。


    这条建议同样适用于你的博客。你确实有博客，对吧？如果没有，现在就开一个！你可以在 [`http://wordpress.com`](http://wordpress.com)
    上获取免费博客，并在此过程中学习如何使用最流行的博客软件。随着你的博客日趋成熟，你可以考虑将其托管在自己的服务器上；你依然可以使用 WordPress，但会通过插件和主题获得更多自定义选项。


    你的博客是营销自己的重要组成部分。这里最关键的一点是，自我营销将间接地让你未来所做的一切都受益。写博客能让你联系到其他志同道合的人，这些人迟早会愿意帮助你，有时甚至是无偿的。如果你真的在开发者社区中声名鹊起，那将是件好事，因为这能引起发行商的注意，他们也在关注你活跃于的渠道（这与游戏的大部分玩家不同，你需要通过不同层面去接触他们）。


    既然你的博客应该是你的公众形象，那就应该由你本人来发声。不要戴上面具，试图装得像个大公司——比如，说你正在做的事情将彻底改变我们玩游戏的方式。我称那为……一个我不会在这本书里写出来的词，但我相信你明白我的意思。


    务必确保不要在博客上显得傲慢，同样也不要贬低自己。你也许是个新手，但你正在学习，所以要专注于你学到的东西。你学到的东西可能会让你觉得，有数百万其他开发者已经知道了，因此你会怀疑是否真的应该写下来。我对这些想法很熟悉，坦白说，你总会怀疑自己写的东西是否会引起别人的兴趣。相信我，会的。就算不会，也没什么大不了的。事实是，尽管可能有数百万开发者已经知道你写的内容，但还有数百万的人不知道，并且能够向你学习。


    记住要展现你最擅长的技能，避免在博客上谈论你的弱点。你不可能什么都懂，但你可以去学。如果你真的想知道如何通过预测客户端移动来增强多人游戏的编程，那就去学。网络是绝佳的资源——收集你找到的资料，并把你发现和学习到的东西写进博客。别人会因此尊重你。写博客需要多年的实践，所以最好现在就开始，因为它最终会带来回报——可能以你现在无法想象的方式。


    另一种重要的自我营销方式是使用 Twitter。一旦你有话想对全世界说，你会很高兴能一次性联系到几十、几百甚至数千名粉丝。这是个非常有效的营销工具。如何有效利用它，只需遵循几个简单的步骤。首先，不要保护你的推文——这会严重限制关注你的人数（我肯定不会关注）。其次，提供一份有趣的个人简介，其中应包括你的兴趣、你的职业，以及其他任何能让你看起来是个值得关注的有趣人物的内容。单纯用一句笑话、诗歌或名言作为个人简介是不可取的。别忘了链接到你的博客！最重要的是，要定期发推，并且要发那些别人可能觉得有趣的内容。如果只发关于你自己和你产品的内容（或者只是转发别人的帖子），那很难说服太多人关注你。

    '
- fmt: '# Public Relations and Press Releases


    If you work alone and you don''t want to cooperate with a publisher, hiring a
    public relations (PR) firm or agent to give yourself and your game a better chance
    in the market may be a wise decision. But it could also be downright stupid and
    pointless. In the latter case, it''s usually not the fault of whoever is doing
    the PR; it''s a matter of understanding the benefits of PR—what it takes to make
    it work effectively—and assessing whether it''s worth spending thousands of dollars
    on.


    As an independent developer, you are likely to have a very limited budget. Even
    entry-level prices for PR agents are going to make your jaw drop to the floor.
    If that''s the case, walk away and get back to working on your game. Your gut
    reaction is correct.


    Now, if you already have a game out there and it''s presentable, and you''ve earned
    not just money but also some influence with the people around you, things may
    be a little different. Perhaps you have some money to spare, you''ve learned a
    lot from your first game, your second one is even better, and you already have
    players waiting for it to come out. Can you give it a boost with the help of professional
    PR? In this case it''s more likely.


    If you take on the help of a PR agent, you should definitely try to find one who
    has a track record of working for the game industry—preferably with independent
    game developers and the mobile games niche. They''re not easy to find, so ask
    around. Using a PR agent who isn''t into game development is a waste of time and
    money—you need to have PR with the ability to reach out to your game''s target
    audience. But most of all, the deciding factor should really be your game.


    If you know you have something special, testers tell you so, and the game just
    looks gorgeous, then investing a few thousand dollars in PR might be a good choice.
    PR wants game reviewers to write about your game and game development sites to
    take notice of your special abilities. If these aren''t clearly visible, professional
    PR won''t be able to make a big difference. PR works best if you can provide gorgeous
    screenshots and an intriguing, funny, and captivating trailer movie.


    How do you know if your game is something special? By asking the people who wouldn''t
    hesitate to tell you what they don''t like. Family and friends are typically too
    kind to provide the sometimes harsh criticism needed to improve a game. You should
    ask on forums for private beta testers and provide them with an appetizer, which
    could be a screenshot or a description of your game''s special features, so that
    they''ll be more interested to try your game. How you deal with criticism and
    feature requests, and generally how you interact with your testers, is also a
    matter of PR. Dealing with user feedback, and specifically criticism, is a vital
    skill you should hone as early as possible.


    But who''s to say you can''t try for yourself first? There are press release services
    specifically for independent developers, and they cost a fraction of what a professional
    PR agent would charge you. And writing a press release isn''t that hard if you
    follow the rules. The following press release services tap into exactly the right
    channels for game players and developers. The hottest candidates are the Indie
    Press Release Service, at `www.gamerelease.net`, and the Game Press Release Submission
    Service at Mitorah Games, at `www.mitorahgames.com/Submit-Game-Press-Release.html`.


    Unsurprisingly, both services are run by independent developers themselves. Specifically,
    Juuso Hietalahti created the Indie Press Release Service and also runs the very
    insightful `www.gameproducer.net` blog. This blog is especially interesting if
    you want to learn more about production and marketing aspects.


    You should also consider the Games Press web site, which is frequented by game
    journalists worldwide (see `www.gamespress.com/about_howtosubmit.asp`).


    ## Engaging Players for More Revenue


    Every platform has a number of peripheral technologies that are helpful if not
    essential, at least in some cases and for some developers. On the iOS platform,
    this includes the ever-growing list of social networking platforms to choose from,
    besides Apple''s Game Center. Then there''s server development kits that you might
    need for developing persistent games that ought to connect to your own server,
    be it to find and run matches of more than four players or simply to save characters,
    progress, settings, and worlds online.


    And sometimes regarded dubiously, providing ads in games can create an additional
    revenue stream, especially for free games and lite versions. Often in conjunction
    with ads, you can also investigate whether it would help your game to add analytics
    and metrics in order to find out where players fail most often, what buttons they
    click the most, and how frequently they play individual game modes. This can help
    you tweak your game to be more fun for more players.


    ### Engaging Your Players


    The big buzzword in the game industry is clearly "social." Whether buzz or bubble,
    whether it has investors, reviewers, and players look up or yawn, the social gaming
    component is growing stronger and has become expected. Social gaming entails anything
    from passively pushing updates to networks like Twitter and Facebook to directing
    player interaction in multiplayer games.


    In addition, push notifications are a powerful tool for you to remind your users
    about important events happening in your app. Be it an update, new content, or
    just the next game you released, it gives you an additional channel to keep your
    users engaged with your apps and your brand.'
