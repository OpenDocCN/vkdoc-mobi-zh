- fmt: "# Configuring the Xcode Project\n\nThe first thing you should do now is enter\
    \ the `Bundle ID` you've entered for your app in iTunes Connect. Remember that\
    \ while I'm using `com.learn-cocos2d` as the `Bundle ID` for the example projects,\
    \ you can't use the same because it's already taken now, and `Bundle ID`s must\
    \ be unique.\n\nLocate the file `Info.plist` in your project's `Resources` folder\
    \ and select it. You can then edit it in the Property List editor, as shown in\
    \ [Figure 14–1](#Chapter14.html#fig_14_1). You will want to set the `Bundle identifier`\
    \ key to have the same value as your app's `Bundle ID`. In my case that will be\
    \ `com.learn-cocos2d`, and in your case it will be whatever string you chose as\
    \ the app's `Bundle ID`.\n\n![images](images/1401.jpg)\n\n**Figure 14–1.** *The\
    \ `Bundle identifier` key must match your app's `Bundle ID`.*\n\nThere are actually\
    \ two ways to use Game Kit—and Game Center for that matter. One is to require\
    \ it, which means your app will run only on devices that support Game Center and\
    \ are running iOS 4.1 or newer. However, for the examples I've written, I did\
    \ not make Game Center a requirement because it's relatively easy to check whether\
    \ Game Center is available and then not use it if it isn't. This allows your game\
    \ to be run on older devices, just without all the Game Center features.\n\nBut\
    \ if you do want to require Game Kit and Game Center to be present, you can set\
    \ this in your app's `Info.plist` `UIRequiredDeviceCapabilities` list. By adding\
    \ another key named `gamekit` with a Boolean value and checking the check box,\
    \ as shown in [Figure 14–2](#Chapter14.html#fig_14_2), you can tell iTunes and\
    \ potential users that your app requires Game Kit and thus requires iOS 4.1 or\
    \ newer.\n\nYou can learn more about iTunes requirements and the `UIRequiredDeviceCapabilities`\
    \ key in Apple's Build Time Configuration documentation: [`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/BuildTimeConfiguration/BuildTimeConfiguration.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/BuildTimeConfiguration/BuildTimeConfiguration.html).\n\
    \n**CAUTION:** If you add the `gamekit` key but later decide you don't want to\
    \ make Game Kit a requirement, make sure you remove the `gamekit` entry. If you\
    \ simply uncheck the `gamekit` check box, it actually tells iTunes that your app\
    \ is not available on devices that do support Game Center. That's exactly the\
    \ opposite of what you might expect. To actually make Game Kit an optional requirement,\
    \ you'll have to remove the `gamekit` entry altogether.\n\n![images](images/1402.jpg)\n\
    \n**Figure 14–2.** *Making Game Kit a strict requirement*\n\nNext, you need to\
    \ add the Game Kit framework to your Xcode project—more specifically, to the desired\
    \ application target in your project in case you have several targets. Select\
    \ the root entry in the Project Navigator, which is the project itself and labeled\
    \ `Tilemap` in this example. Then select the appropriate target and switch to\
    \ the `Build Phases` tab. Unfold the `Link Binary With Libraries` section to see\
    \ the list of libraries this target is currently linked with. Below that list\
    \ are two + and – buttons with which you can add or remove libraries.\n\nTo add\
    \ another library, click the `+` button. You'll see another list pop up like the\
    \ one in [Figure 14–3](#Chapter14.html#fig_14_3). Locate the `GameKit.framework`\
    \ entry and click the `Add` button. Since there are a lot of libraries to choose\
    \ from and they're not always sorted alphabetically, it helps to filter the list\
    \ by entering *GameKit* in the text field above the list.\n\nThe `GameKit.framework`\
    \ will be added to the `Linked Libraries` list when you click the `Add` button.\
    \ By default, new libraries are added as `Required`, which is displayed to the\
    \ right of each library. The setting `Required` means that your app will work\
    \ only on devices where the `GameKit.framework` library is available. If that\
    \ is what you want and you've added the `gamekit` key to `Info.plist`, you can\
    \ leave it at that. Otherwise, change the setting to `Optional` in order to be\
    \ able to run the app even on devices that don't have Game Center available. We\
    \ can account for that with a relatively simple check in code (discussed shortly\
    \ in [Listing 14–3](#Chapter14.html#list_14_3)) and then disable any Game Kit\
    \ features in case a device doesn't support Game Kit.\n\n![images](images/1403.jpg)\n\
    \n**Figure 14–3.** *Adding `GameKit.framework`*\n\nFinally, you will want the\
    \ `GameKit.h` header file to be available in all of your project's source files.\
    \ Instead of adding it to each and every source file, you should add it to your\
    \ project's `Prefix.pch` file. This is the precompiled header that contains header\
    \ files from external frameworks to allow the project to compile faster. But it\
    \ also has the added benefit that every header file added to the prefix header\
    \ will make its definitions available to every source code file in the current\
    \ project.\n\nThe prefix header file is always prefixed with the project's name.\
    \ So, for example, in the case of the tilemap project, the file name is `Tilemap_Prefix.pch`,\
    \ and the file can be found in the `Other Sources` group. Open the one in your\
    \ project and add the GameKit header to it, as shown in [Listing 14–1](#Chapter14.html#list_14_1).\n\
    \n**Listing 14–1.** *Adding the GameKit Header to Your Project's Prefix Header*\n\
    \n```\n#ifdef __OBJC__\n    #import <Foundation/Foundation.h>\n    #import <UIKit/UIKit.h>\n\
    #import <GameKit/GameKit.h>\n#endif\n```\n\nThat's it—your app is set up for use\
    \ with Game Center.\n\n# Game Center Setup Summary\n\nTo summarize, enabling Game\
    \ Center for your app requires the following steps:\n\n1.  Create a new app in\
    \ iTunes Connect:\n    1.  Specify a `Bundle ID` for the new app.\n    2.  Enable\
    \ Game Center for this app.\n2.  Set up your initial leaderboards and achievements\
    \ in iTunes Connect:\n    1.  Note the leaderboard category IDs and achievement\
    \ IDs. (Note that you will likely continue to edit and add leaderboards and achievements\
    \ throughout the development of your game.)\n3.  Create or upgrade the Xcode project:\n\
    \    1.  Make sure to use at least cocos2d v0.99.5.\n4.  Edit `Info.plist`:\n\
    \    1.  Enter the app's `Bundle ID` in the `Bundle identifier` field.\n    2.\
    \  Optionally require Game Kit by adding a Boolean value labeled `gamekit` to\
    \ the `UIRequiredDeviceCapabilities` list.\n5.  Add the necessary Game Kit references:\n\
    \    1.  Add the `GameKit.framework` linked library to each target. Change its\
    \ `Type` setting from `Required` to `Weak` if Game Kit support is optional.\n\
    \    2.  Add `#import <GameKit/GameKit.h>` to your project's prefix header file.\n\
    \nBefore you proceed, make sure you have followed each step. You can always go\
    \ back and make the necessary changes later. However, if you don't do all of these\
    \ steps at the beginning, chances are that you will get errors or something won't\
    \ work, but the associated error message won't necessarily point you to a mistake\
    \ or oversight concerning one of these steps.\n\nCommon causes for Game Center\
    \ to not work properly are a mismatch between the `Bundle ID` in the project's\
    \ `Info.plist` file and the `Bundle ID` set up for your app in iTunes Connect."
