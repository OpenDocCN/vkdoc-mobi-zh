    \n我将数组初始化与敌人创建拆分为两个独立的循环，尽管它们可以在同一个循环中完成。它们是不同的任务，应该保持分离。额外遍历所有敌人类型一次的开销可以忽略不计。\n\
    \n基于`CCArray`初始化循环中设置的初始容量，创建所需数量的敌人，将其添加到`CCSpriteBatchNode`，然后添加到对应的`enemiesOfTypeCCArray`中。虽然通过`CCSpriteBatchNode`也能访问这些敌人，但将敌人实体引用保存在独立的数组中，可以在后续活动（如生成）中更轻松地处理它们，如清单\
    \ 8–8 所示。\n\n**清单 8–8.** *生成敌人*\n\n```\n-(void) spawnEnemyOfType:(EnemyTypes)enemyType\n\
