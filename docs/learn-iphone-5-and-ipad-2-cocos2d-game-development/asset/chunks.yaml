  trans: "`beginContactWithBall`  \n`endContactWithBall`  \n`beginContactWithPlunger`\
    \  \n`endContactWithPlunger`  \n`// 等等……`\n\n在执行选择器之前，`notifyAB` 首先检查 `obj` 是否实际响应该选择器。在当前实现中，只有\
    \ `Plunger` 类实现了其中一个选择器：`beginContactWithBall`。所有其他选择器由于尚未存在而永远不会执行。\n\n`Contact`\
    \ 类也在 `ContactListener.h` 中定义，它仅作为一个容器对象，用于保存你可能想要传递给接收类的任何碰撞信息。通过使用容器类，当你决定传递更多或更少信息时，选择器格式无需更改，这仅仅因为唯一参数是指向\
    \ `Contact` 对象的指针，而信息都封装在 `Contact` 类中。\n\n**提示：** 使用容器类还有一个技术原因。`NSObject` 类的\
    \ `performSelector` 方法只知道三种变体：零参数、一个参数或两个参数。由于我们肯定希望向接收对象传递两个以上的参数，除了使用容器类之外别无选择。每当你发现\
    \ `performSelector` 方法受限时，请记住，你始终可以创建一个容器类来保存任何你想传递给实现该选择器的类的信息。\n\n由于 `Contact`\
    \ 是一个如此简单的类，代码清单 13-21 将接口和实现合并展示在一个清单中。\n\n**代码清单 13-21.** *Contact 类的接口与实现*\n\
    \n```\n@interface Contact : NSObject\n{\n@private\n    NSObject* otherObject;\n\
    \    b2Fixture* ownFixture;\n    b2Fixture* otherFixture;\n    b2Contact* b2contact;\n\
    }\n@property (assign, nonatomic) NSObject* otherObject;\n@property (assign, nonatomic)\
    \ b2Fixture* ownFixture;\n@property (assign, nonatomic) b2Fixture* otherFixture;\n\
    @property (assign, nonatomic) b2Contact* b2contact;\n\n+(id) contactWithObject:(NSObject*)otherObject\n\
    \           otherFixture:(b2Fixture*)otherFixture\n             ownFixture:(b2Fixture*)ownFixture\n\
    \              b2Contact:(b2Contact*)b2contact;\n@end\n\n@implementation Contact\n\
    \n@synthesize otherObject, ownFixture, otherFixture, b2contact;\n\n+(id) contactWithObject:(NSObject*)otherObject\n\
    \           otherFixture:(b2Fixture*)otherFixture\n             ownFixture:(b2Fixture*)ownFixture\n\
    \              b2Contact:(b2Contact*)b2contact\n{\n    Contact* contact = [[[Contact\
    \ alloc] init] autorelease];\n\n    if (contact)\n    {\n        contact.otherObject\
    \ = otherObject;\n        contact.otherFixture = otherFixture;\n        contact.ownFixture\
    \ = ownFixture;\n        contact.b2contact = b2contact;\n    }\n\n    return contact;\n\
    }\n\n-(id) retain\n{\n    [NSException raise:@\"ContactRetainException\"\n   \
    \             format:@\"Do not retain a Contact - it is for temporary use only!\"\
    ];\n    return self;\n}\n\n@end\n```\n\n`Contact` 类唯一值得注意的地方是它重写了 `retain` 方法。这是为了防止用户尝试保留联系信息，这在\
    \ Box2D 中是不允许的。在调用 Box2D 接触方法之后，`contact` 变量会立即被 Box2D 释放，因此 `otherFixture`、`ownFixture`\
    \ 和 `b2contact` 指针将失效，访问它们会导致崩溃。由于调用 `retain` 表示用户想要保留对 `Contact` 对象的引用以供后续使用，必须通过抛出一个异常来阻止这种行为，该异常会导致程序执行暂停，并在调试控制台记录错误信息。\n\
    \n### 响应接触事件\n\n现在，每当球和弹板发生接触时，`Plunger` 类中的 `beginContactWithBall` 方法将被调用：\n\n\
    ```\n-(void) endPlunge:(ccTime)delta\n{\n    // 停止调度 endPlunge\n    [self unschedule:_cmd];\n\
    \n    // 停止马达\n    joint->EnableMotor(NO);\n}\n\n-(void) beginContactWithBall:(Contact*)contact\n\
    {\n    // 启动马达\n    joint->EnableMotor(YES);\n\n    // 调度马达返回，并在弹板被反复撞击时取消之前的调度\
    \    \n    [self unschedule:_cmd];\n    [self schedule:@selector(endPlunge:) interval:0.5f];\n\
    }\n```\n\n一旦球触碰到弹板，弹板的马达就会被启用，从而推动弹板并带动球向上运动。`endPlunge` 方法被调度到短时间内停止马达。这里特别注意正确取消选择器的调度。例如，`beginContactWithBall`\
    \ 方法很可能在短时间内被重复调用，因为可能存在不止一个接触点（Box2D 会单独报告每个接触点）；或者，球可能会稍微弹起并失去接触，但弹板的马达会确保弹板在短时间内再次接触球。\n\
    \n类似地，你会在 `Ball` 类中找到 `beginContactWithPlunger` 和 `beginContactWithBumper` 这两个方法的实现。这两种接触都会播放一个音效：\n\
    \n```\n-(void) playSound\n{\n    float pitch = 0.9f + CCRANDOM_0_1() * 0.2f;\n\
    \    float gain = 1.0f + CCRANDOM_0_1() * 0.3f;\n    [[SimpleAudioEngine sharedEngine]\
    \ playEffect:@\"bumper.wav\"\n                                           pitch:pitch\n\
    \                                             pan:0.0f\n                     \
    \                       gain:gain];\n}\n\n-(void) endContactWithBumper:(Contact*)contact\n\
    {\n    [self playSound];\n}\n\n-(void) endContactWithPlunger:(Contact*)contact\n\
    {\n    [self playSound];\n}\n```\n\n**提示：** 请记住，Box2D 会报告两个碰撞物体的每一个单独接触，导致同一对物体的接触方法被多次调用。在某些情况下，你可能希望将一个布尔变量设置为\
    \ `YES`，以标记接触已经发生。相应的接触方法应先检查该变量是否已设置，如果已设置，则跳过代码。之后，你应在计划更新方法中将该变量重置为 `NO`，以重新启用接触事件。通过这样做，你可以避免接触代码被多次执行，从而防止不良副作用，例如同时播放过多音效。"
- fmt: "# The Flippers\n\nThe final ingredients are the flippers, with which you'll\
    \ control the action. The two flippers are going to be controlled by touching\
    \ the screen on either the left or right side, as [Listing 13–22](#Chapter13.html#list_13_22)\
    \ shows.\n\n**Listing 13–22.** *The Flipper Interface*\n\n```objc\n#import \"\
    BodyNode.h\"\n\ntypedef enum\n{\n        kFlipperLeft,\n        kFlipperRight,\n\
    } EFlipperType;\n\n@interface Flipper : BodyNode <CCTargetedTouchDelegate>\n{\n\
    \        EFlipperType type;\n        b2RevoluteJoint* joint;\n        float totalTime;\n\
    }\n\n+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;\n\
    \n@end\n```\n\nEach flipper is anchored using a `b2RevoluteJoint`. Take a look\
    \ at the flipper `initWithWorld` method in [Listing 13–23](#Chapter13.html#list_13_23)\
    \ to see how the flippers are created.\n\n**Listing 13–23.** *Creating a Flipper*\n\
    \n```objc\n-(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType\n\
    {\n    NSString*name = (flipperType == kFlipperLeft) ? @\"flipper-left\" : @\"\
    flipper-right\";\n\n    if ((self = [super initWithShape:name inWord:world]))\n\
    \    {\n        type = flipperType;\n\n        // set the position depending on\
    \ the left or right side\n        CGPoint flipperPos = (type == kFlipperRight)\
    \ ? ccp(210,65) : ccp(90,65);\n\n        // attach the flipper to a static body\
    \ with a revolute joint\n        [self attachFlipperAt:[Helper toMeters:flipperPos]];\n\
    \n        // receive touch events\n        [[CCTouchDispatcher sharedDispatcher]\
    \ addTargetedDelegate:self\n                                                 \
    \        priority:0\n                                                  swallowsTouches:NO];\n\
    \    }\n    return self;\n}\n\n+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType\n\
    {\n    return [[[self alloc] initWithWorld:world flipperType:flipperType] autorelease];\n\
    }\n\n-(void) dealloc\n{\n    // stop listening to touches\n    [[CCTouchDispatcher\
    \ sharedDispatcher] removeDelegate:self];\n\n    [super dealloc];\n}\n```\n\n\
    The `Flipper` class also registers itself with the `CCTouchDispatcher` to receive\
    \ touch input events. The common misconception is that only the `CCLayer` class\
    \ can receive input, but in fact `CCLayer` is merely conveniently preconfigured\
    \ to receive touches. Any class can register itself with the `CCTouchDispatcher`\
    \ class as a delegate, provided that the class also removes itself as a touch\
    \ delegate, usually in the `dealloc` method.\n\nAs with the other pinball elements,\
    \ the flippers are added to the `TableSetup` class and initialized as left and\
    \ right flipper by using the `EFlipperType` enum from [Listing 13–22](#Chapter13.html#list_13_22).\n\
    \n```objc\n// Add flippers\nFlipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];\n\
    [self addChild:left];\n\nFlipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];\n\
    [self addChild:right];\n```\n\n**NOTE:** I could have used the flipper's shape\
    \ names instead, but I wanted to hide this implementation detail. No one but the\
    \ `Flipper` class should be concerned with what the flipper's frame and shape\
    \ names are.\n\nThe `attachFlipperAt` method creates the revolute joints (see\
    \ [Listing 13–24](#Chapter13.html#list_13_24)), with a few modifications for the\
    \ right flipper in order to change the direction and upper limit of the right\
    \ flippers rotation. The point the flippers rotate around will be the anchor point\
    \ of their shapes, which is editable in PhysicsEditor.\n\n**Listing 13–24.** *Creating\
    \ the Flipper Revolute Joint*\n\n```objc\n-(void) attachFlipperAt:(b2Vec2)pos\n\
    {\n    body->SetTransform(pos, 0);\n    body->SetType(b2_dynamicBody);\n\n   \
    \ // turn on continuous collision detection to prevent tunneling\n    body->SetBullet(true);\n\
    \n    // create an invisible static body to attach to\n    b2BodyDef bodyDef;\n\
    \    bodyDef.position = pos;\n    b2Body* staticBody = body->GetWorld()->CreateBody(&bodyDef);\n\
    \n    // setup joint parameters\n    b2RevoluteJointDef jointDef;\n    jointDef.Initialize(staticBody,\
    \ body, staticBody->GetWorldCenter());\n    jointDef.lowerAngle = 0.0f;\n    jointDef.upperAngle\
    \ = CC_DEGREES_TO_RADIANS(70);\n    jointDef.enableLimit = true;\n    jointDef.maxMotorTorque\
    \ = 100.0f;\n    jointDef.motorSpeed = -40.0f;\n    jointDef.enableMotor = true;\n\
    \n    if (type == kFlipperRight)\n    {\n        // mirror speed and angle for\
    \ the right flipper\n        jointDef.motorSpeed *= -1;\n        jointDef.lowerAngle\
    \ = -jointDef.upperAngle;\n        jointDef.upperAngle = 0.0f;\n    }\n\n    //\
    \ create the joint\n    joint = (b2RevoluteJoint*)body->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\nYou may be wondering why the flipper's body is set as a bullet. Trust\
    \ me, I'm not going to shoot flippers at you! Physics engines traditionally have\
    \ a problem with detecting collisions of objects moving at high speeds since such\
    \ an object can travel great distances between two collision tests, seemingly\
    \ “tunneling” through other collidable objects. That may be fine for subatomic\
    \ particles, but not for our flippers and the ball.\n\nThe `SetBullet` method\
    \ enables a special, continuous collision detection method for fast-moving objects\
    \ that takes into account the path the object must have taken between two collision\
    \ tests. Thus, the bullet mode is able to detect collisions that would have otherwise\
    \ been missed, at the expense of performance. The bullet mode should be used judiciously\
    \ and only when absolutely needed. In the pinball game, I noticed that both the\
    \ flippers and the ball would sometimes “miss” each other, so I have them both\
    \ treated as fast-moving objects to get more accurate collision detection.\n\n\
    The static body is created to attach the flipper to an unmovable body to keep\
    \ the flipper anchored in place. `b2RevoluteJointDef` uses `lowerAngle` and `upperAngle`\
    \ as the rotation limits, which are in radians. I'll set the `upperAngle` to 70\
    \ degrees and convert it to radians with the `CC_DEGREES_TO_RADIANS` macro provided\
    \ by cocos2d.\n\nThe revolute joint also has `maxMotorTorque` and `motorSpeed`\
    \ fields, which are used to define the speed and immediacy of the movement of\
    \ the flippers. However, contrary to the plunger, the motor is enabled all the\
    \ time, and merely its direction of movement will be reversed by changing the\
    \ sign of the `motorSpeed` variable. While the flippers are down, the motor will\
    \ force them down so that they don't bounce when the ball hits them.\n\nIn the\
    \ `ccTouchBegan` method, the location of the touch is obtained, which is validated\
    \ with the `isTouchForMe` method before actually reversing the motor.\n\n```objc\n\
    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event\n{\n    BOOL touchHandled\
    \ = NO;\n\n    CGPoint location = [Helper locationFromTouch:touch];\n    if ([self\
    \ isTouchForMe:location])\n    {\n        touchHandled = YES;\n        [self reverseMotor];\n\
    \    }\n\n    return touchHandled;\n}\n\n-(void) ccTouchEnded:(UITouch*)touch\
    \ withEvent:(UIEvent*)event\n{\n    CGPoint location = [Helper locationFromTouch:touch];\n\
    \    if ([self isTouchForMe:location])\n    {\n        [self reverseMotor];\n\
    \    }\n}\n```\n\nThe `isTouchForMe` method implements the check to figure out\
    \ on which side of the screen the touch was and whether the current instance of\
    \ the class is the correct flipper to respond to this touch.\n\n```objc\n-(bool)\
    \ isTouchForMe:(CGPoint)location\n{\n    if (type == kFlipperLeft && location.x\
    \ < [Helper screenCenter].x)\n    {\n        return YES;\n    }\n    else if (type\
    \ == kFlipperRight && location.x > [Helper screenCenter].x)\n    {\n        return\
    \ YES;\n    }\n\n    return NO;\n}\n```\n\nReversing the motor speed then simply\
    \ allows the flipper to spring up and to spring back down again when the touch\
    \ ends and the motor speed is reversed again.\n\n```objc\n-(void) reverseMotor\n\
    {\n    joint->SetMotorSpeed(joint->GetMotorSpeed() * -1);\n}\n```"
  raw: '#### The Flippers


    The final ingredients are the flippers, with which you''ll control the action.
    The two flippers are going to be controlled by touching the screen on either the
    left or right side, as [Listing 13–22](#Chapter13.html#list_13_22) shows.


    **Listing 13–22.** *The Flipper Interface*


    `#import "BodyNode.h"`


    `typedef enum`

    `{`

    `        kFlipperLeft,`

    `        kFlipperRight,`

    `} EFlipperType;`


    `@interface Flipper : BodyNode <CCTargetedTouchDelegate>`

    `{`

    `        EFlipperType type;`

    `        b2RevoluteJoint* joint;`

    `        float totalTime;`

    `}`


    `+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType;`


    `@end`


    Each flipper is anchored using a `b2RevoluteJoint`. Take a look at the flipper
    `initWithWorld` method in [Listing 13–23](#Chapter13.html#list_13_23) to see how
    the flippers are created.


    **Listing 13–23.** *Creating a Flipper*


    `-(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType`

    `{`

    `    NSString*name = (flipperType == kFlipperLeft) ? @"flipper-left" : @"flipper-right";`


    `    if ((self = [super initWithShape:name inWord:world]))`

    `    {`

    `        type = flipperType;`


    `        // set the position depending on the left or right side`

    `        CGPoint flipperPos = (type == kFlipperRight) ? ccp(210,65) : ccp(90,65);`


    `        // attach the flipper to a static body with a revolute joint`

    `        [self attachFlipperAt:[Helper toMeters:flipperPos]];`


    `        // receive touch events`

    `        [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self`

    `                                                         priority:0`

    `                                                  swallowsTouches:NO];`

    `    }`

    `    return self;`

    `}`


    `+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType`

    `{`

    `    return [[[self alloc] initWithWorld:world flipperType:flipperType] autorelease];`

    `}`


    `-(void) dealloc`

    `{`

    `    // stop listening to touches`

    `    [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];`


    `    [super dealloc];`

    `}`


    The `Flipper` class also registers itself with the `CCTouchDispatcher` to receive
    touch input events. The common misconception is that only the `CCLayer` class
    can receive input, but in fact `CCLayer` is merely conveniently preconfigured
    to receive touches. Any class can register itself with the `CCTouchDispatcher`
    class as a delegate, provided that the class also removes itself as a touch delegate,
    usually in the `dealloc` method.


    As with the other pinball elements, the flippers are added to the `TableSetup`
    class and initialized as left and right flipper by using the `EFlipperType` enum
    from [Listing 13–22](#Chapter13.html#list_13_22).


    `// Add flippers`

    `Flipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];`

    `[self addChild:left];`


    `Flipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];`

    `[self addChild:right];`


    **NOTE:** I could have used the flipper''s shape names instead, but I wanted to
    hide this implementation detail. No one but the `Flipper` class should be concerned
    with what the flipper''s frame and shape names are.


    The `attachFlipperAt` method creates the revolute joints (see [Listing 13–24](#Chapter13.html#list_13_24)),
    with a few modifications for the right flipper in order to change the direction
    and upper limit of the right flippers rotation. The point the flippers rotate
    around will be the anchor point of their shapes, which is editable in PhysicsEditor.


    **Listing 13–24.** *Creating the Flipper Revolute Joint*


    `-(void) attachFlipperAt:(b2Vec2)pos`

    `{`

    `    body->SetTransform(pos, 0);`

    `    body->SetType(b2_dynamicBody);`


    `    // turn on continuous collision detection to prevent tunneling`

    `    body->SetBullet(true);`


    `    // create an invisible static body to attach to‘`

    `    b2BodyDef bodyDef;`

    `    bodyDef.position = pos;`

    `    b2Body* staticBody = body->GetWorld()->CreateBody(&bodyDef);`


    `    // setup joint parameters`

    `    b2RevoluteJointDef jointDef;`

    `    jointDef.Initialize(staticBody, body, staticBody->GetWorldCenter());`

    `    jointDef.lowerAngle = 0.0f;`

    `    jointDef.upperAngle = CC_DEGREES_TO_RADIANS(70);`

    `    jointDef.enableLimit = true;`

    `    jointDef.maxMotorTorque = 100.0f;`

    `    jointDef.motorSpeed = -40.0f;`

    `    jointDef.enableMotor = true;`


    `    if (type == kFlipperRight)`

    `    {`

    `        // mirror speed and angle for the right flipper`

    `        jointDef.motorSpeed *= -1;`

    `        jointDef.lowerAngle = -jointDef.upperAngle;`

    `        jointDef.upperAngle = 0.0f;`

    `    }`


    `    // create the joint`

    `    joint = (b2RevoluteJoint*)body->GetWorld()->CreateJoint(&jointDef);`

    `}`


    You may be wondering why the flipper''s body is set as a bullet. Trust me, I''m
    not going to shoot flippers at you! Physics engines traditionally have a problem
    with detecting collisions of objects moving at high speeds since such an object
    can travel great distances between two collision tests, seemingly “tunneling”
    through other collidable objects. That may be fine for subatomic particles, but
    not for our flippers and the ball.


    The `SetBullet` method enables a special, continuous collision detection method
    for fast-moving objects that takes into account the path the object must have
    taken between two collision tests. Thus, the bullet mode is able to detect collisions
    that would have otherwise been missed, at the expense of performance. The bullet
    mode should be used judiciously and only when absolutely needed. In the pinball
    game, I noticed that both the flippers and the ball would sometimes “miss” each
    other, so I have them both treated as fast-moving objects to get more accurate
    collision detection.


    The static body is created to attach the flipper to an unmovable body to keep
    the flipper anchored in place. `b2RevoluteJointDef` uses `lowerAngle` and `upperAngle`
    as the rotation limits, which are in radians. I''ll set the `upperAngle` to 70
    degrees and convert it to radians with the `CC_DEGREES_TO_RADIANS` macro provided
    by cocos2d.


    The revolute joint also has `maxMotorTorque` and `motorSpeed` fields, which are
    used to define the speed and immediacy of the movement of the flippers. However,
    contrary to the plunger, the motor is enabled all the time, and merely its direction
    of movement will be reversed by changing the sign of the `motorSpeed` variable.
    While the flippers are down, the motor will force them down so that they don''t
    bounce when the ball hits them.


    In the `ccTouchBegan` method, the location of the touch is obtained, which is
    validated with the `isTouchForMe` method before actually reversing the motor.


    `-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event`

    `{`

    `    BOOL touchHandled = NO;`


    `    CGPoint location = [Helper locationFromTouch:touch];`

    `    if ([self isTouchForMe:location])`

    `    {`

    `        touchHandled = YES;`

    `        [self reverseMotor];`

    `    }`


    `    return touchHandled;`

    `}`


    `-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent*)event`

    `{`

    `    CGPoint location = [Helper locationFromTouch:touch];`

    `    if ([self isTouchForMe:location])`

    `    {`

    `        [self reverseMotor];`

    `    }`

    `}`


    The `isTouchForMe` method implements the check to figure out on which side of
    the screen the touch was and whether the current instance of the class is the
    correct flipper to respond to this touch.


    `-(bool) isTouchForMe:(CGPoint)location`

    `{`

    `    if (type == kFlipperLeft && location.x < [Helper screenCenter].x)`

    `    {`

    `        return YES;`

    `    }`

    `    else if (type == kFlipperRight && location.x > [Helper screenCenter].x)`

    `    {`

    `        return YES;`

    `    }`


    `    return NO;`

    `}`


    Reversing the motor speed then simply allows the flipper to spring up and to spring
    back down again when the touch ends and the motor speed is reversed again.


    `-(void) reverseMotor`

    `{`

    `    joint->SetMotorSpeed(joint->GetMotorSpeed() * -1);`

    `}`'
  trans: "\n# 挡板\n\n最后的组件是挡板，你需要用它们来控制游戏操作。左右两侧的挡板将分别通过触摸屏幕的左侧或右侧来控制，如代码清单 13-22 所示。\n\
    \n**代码清单 13-22.** *挡板接口*\n\n```objc\n#import \"BodyNode.h\"\n\ntypedef enum\n\
    {\n        kFlipperLeft,\n        kFlipperRight,\n} EFlipperType;\n\n@interface\
    \ Flipper : BodyNode <CCTargetedTouchDelegate>\n{\n        EFlipperType type;\n\
    \        b2RevoluteJoint* joint;\n        float totalTime;\n}\n\n+(id) flipperWithWorld:(b2World*)world\
    \ flipperType:(EFlipperType)flipperType;\n\n@end\n```\n\n每个挡板都通过一个`b2RevoluteJoint`进行锚定。请查看代码清单\
    \ 13-23 中的挡板`initWithWorld`方法，了解挡板是如何创建的。\n\n**代码清单 13-23.** *创建挡板*\n\n```objc\n\
    -(id) initWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType\n{\n\
    \    NSString*name = (flipperType == kFlipperLeft) ? @\"flipper-left\" : @\"flipper-right\"\
    ;\n\n    if ((self = [super initWithShape:name inWord:world]))\n    {\n      \
    \  type = flipperType;\n\n        // 根据左右侧设置位置\n        CGPoint flipperPos = (type\
    \ == kFlipperRight) ? ccp(210,65) : ccp(90,65);\n\n        // 使用旋转关节将挡板附着到静态物体上\n\
    \        [self attachFlipperAt:[Helper toMeters:flipperPos]];\n\n        // 接收触摸事件\n\
    \        [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self\n    \
    \                                                     priority:0\n           \
    \                                       swallowsTouches:NO];\n    }\n    return\
    \ self;\n}\n\n+(id) flipperWithWorld:(b2World*)world flipperType:(EFlipperType)flipperType\n\
    {\n    return [[[self alloc] initWithWorld:world flipperType:flipperType] autorelease];\n\
    }\n\n-(void) dealloc\n{\n    // 停止监听触摸事件\n    [[CCTouchDispatcher sharedDispatcher]\
    \ removeDelegate:self];\n\n    [super dealloc];\n}\n```\n\n`Flipper`类也向`CCTouchDispatcher`注册自身，以接收触摸输入事件。一个常见的误解是只有`CCLayer`类才能接收输入，但实际上，`CCLayer`只是预先配置好以便于接收触摸事件。任何类都可以向`CCTouchDispatcher`类注册自身作为委托，前提是该类也需要移除自身的触摸委托身份，通常是在`dealloc`方法中执行此操作。\n\
    \n与其他弹球元素一样，挡板被添加到`TableSetup`类中，并通过使用代码清单 13-22 中的`EFlipperType`枚举初始化为左挡板和右挡板。\n\
    \n```objc\n// 添加挡板\nFlipper *left = [Flipper flipperWithWorld:world flipperType:kFlipperLeft];\n\
    [self addChild:left];\n\nFlipper *right = [Flipper flipperWithWorld:world flipperType:kFlipperRight];\n\
    [self addChild:right];\n```\n\n**注意：** 我本可以改用挡板的形状名称，但我想隐藏这个实现细节。除了`Flipper`类之外，其他任何类都不需要关心挡板的帧和形状名称是什么。\n\
    \n`attachFlipperAt`方法创建了旋转关节（参见代码清单 13-24），为了改变右挡板的旋转方向和上限，对右挡板进行了一些修改。挡板旋转的中心点就是其形状的锚点，该锚点可以在\
    \ PhysicsEditor 中编辑。\n\n**代码清单 13-24.** *创建挡板旋转关节*\n\n```objc\n-(void) attachFlipperAt:(b2Vec2)pos\n\
    {\n    body->SetTransform(pos, 0);\n    body->SetType(b2_dynamicBody);\n\n   \
    \ // 启用连续碰撞检测以防止穿透\n    body->SetBullet(true);\n\n    // 创建一个不可见的静态物体用于附着\n  \
    \  b2BodyDef bodyDef;\n    bodyDef.position = pos;\n    b2Body* staticBody = body->GetWorld()->CreateBody(&bodyDef);\n\
    \n    // 设置关节参数\n    b2RevoluteJointDef jointDef;\n    jointDef.Initialize(staticBody,\
    \ body, staticBody->GetWorldCenter());\n    jointDef.lowerAngle = 0.0f;\n    jointDef.upperAngle\
    \ = CC_DEGREES_TO_RADIANS(70);\n    jointDef.enableLimit = true;\n    jointDef.maxMotorTorque\
    \ = 100.0f;\n    jointDef.motorSpeed = -40.0f;\n    jointDef.enableMotor = true;\n\
    \n    if (type == kFlipperRight)\n    {\n        // 为右挡板镜像速度和角度\n        jointDef.motorSpeed\
    \ *= -1;\n        jointDef.lowerAngle = -jointDef.upperAngle;\n        jointDef.upperAngle\
    \ = 0.0f;\n    }\n\n    // 创建关节\n    joint = (b2RevoluteJoint*)body->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n你可能会好奇为什么挡板的物体会被设置为子弹。请相信我，我可不会用挡板来射击你！物理引擎在检测高速移动物体的碰撞时通常会遇到问题，因为这样的物体在两次碰撞测试之间可能移动很长的距离，看起来像是“穿透”了其他可碰撞的物体。这对于亚原子粒子来说可能没什么问题，但对于我们的挡板和球来说就不行了。\n\
    \n`SetBullet`方法为快速移动的物体启用了一种特殊的、连续的碰撞检测方法，它考虑了物体在两次碰撞测试之间可能经过的路径。因此，子弹模式能够检测到那些本来会被遗漏的碰撞，代价是牺牲一些性能。子弹模式应谨慎使用，并且只在绝对必要时才使用。在弹球游戏中，我注意到挡板和球有时会“错过”对方，所以我将它们都视为快速移动的物体，以获得更准确的碰撞检测。\n\
    \n创建静态物体是为了将挡板附着到一个不可移动的物体上，以保持挡板锚定在适当位置。`b2RevoluteJointDef`使用`lowerAngle`和`upperAngle`作为旋转限制，单位为弧度。我将`upperAngle`设置为\
    \ 70 度，并使用 cocos2d 提供的`CC_DEGREES_TO_RADIANS`宏将其转换为弧度。\n\n旋转关节还有`maxMotorTorque`和`motorSpeed`字段，它们用于定义挡板运动的速度和即时性。然而，与拉杆不同的是，马达是始终启用的，仅仅是通过改变`motorSpeed`变量的符号来反转其运动方向。当挡板处于低位时，马达会迫使它们保持低位，这样当球撞击时它们就不会弹起。\n\
    \n在`ccTouchBegan`方法中，获取触摸的位置，然后使用`isTouchForMe`方法进行验证，之后才实际反转马达。\n\n```objc\n\
    -(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent*)event\n{\n    BOOL touchHandled\
    \ = NO;\n\n    CGPoint location = [Helper locationFromTouch:touch];\n    if ([self\
    \ isTouchForMe:location])\n    {\n        touchHandled = YES;\n        [self reverseMotor];\n\
    \    }\n\n    return touchHandled;\n}\n\n-(void) ccTouchEnded:(UITouch*)touch\
    \ withEvent:(UIEvent*)event\n{\n    CGPoint location = [Helper locationFromTouch:touch];\n\
    \    if ([self isTouchForMe:location])\n    {\n        [self reverseMotor];\n\
    \    }\n}\n```\n\n`isTouchForMe`方法实现了检查逻辑，用于确定触摸发生在屏幕的哪一侧，以及当前类的实例是否是响应此触摸的正确挡板。\n\
    \n```objc\n-(bool) isTouchForMe:(CGPoint)location\n{\n    if (type == kFlipperLeft\
    \ && location.x < [Helper screenCenter].x)\n    {\n        return YES;\n    }\n\
    \    else if (type == kFlipperRight && location.x > [Helper screenCenter].x)\n\
    \    {\n        return YES;\n    }\n\n    return NO;\n}\n```\n\n反转马达速度后，挡板会弹起，当触摸结束，马达速度再次反转时，挡板又会弹回原位。\n\
    \n```objc\n-(void) reverseMotor\n{\n    joint->SetMotorSpeed(joint->GetMotorSpeed()\
    \ * -1);\n}\n```\n"
- fmt: 'The rest is just physics. If the ball is on the flipper and you touch the
    screen on the correct side, the flipper will be accelerated upward, pushing the
    ball with it. Depending on where on the flipper the ball lands, it will be propelled
    more or less straight upward.


    ### Summary


    In this chapter, you learned how to use the `PhysicsEditor` tool to define the
    collision shapes for the bodies used in the pinball game. With just the ball in
    place, I illustrated how you can simulate acceleration toward a point, including
    how to model the effects of gravity or magnetism more or less realistically.


    I hope this chapter gave you an impression of how much fun physics can be, regardless
    of what you may have experienced in physics class. But then again, you didn''t
    build pinball machines in physics class—or did you?


    If you''d like to go beyond this example—for example, using more joints or taking
    more control of the collision process—I''d like to refer you to the `Box2D` manual,
    at [`www.box2d.org/manual.html`](http://www.box2d.org/manual.html).


    On the other hand, if you need more information about individual classes and structs,
    you should look at the `Box2D` API reference. It is provided in the `Documentation`
    folder of the `Box2D` download, which you can obtain from [`http://code.google.com/p/box2d`](http://code.google.com/p/box2d).
    Since the `Box2D` API reference is not available online, I decided to host it
    myself at [`www.learn-cocos2d.com/box2d-api-reference/API/index.html`](http://www.learn-cocos2d.com/box2d-api-reference/API/index.html).


    To get help with `Box2D`, you can check out the official `Box2D` forums at [`www.box2d.org/forum/index.php`](http://www.box2d.org/forum/index.php)
    and check out the `Physics` subsection of the `cocos2d` forums at [`www.cocos2d-iphone.org/forum/forum/7`](http://www.cocos2d-iphone.org/forum/forum/7).


    If you are interested in learning more about `PhysicsEditor`, I can recommend
    the `PhysicsEditor` blog ([`www.physicseditor.de/blog`](http://www.physicseditor.de/blog))
    in which Andreas Löw shows off some cool uses and tips and tricks for `PhysicsEditor`.
    If you have a support request for Andreas, you can simply write an e-mail to `support@code-and-web.de`.


    ## Chapter 14


    ## Game Center


    `Game Center` is Apple''s social network solution. It enables you to authenticate
    players, store their scores and display leaderboards, and track and display their
    achievement progress. Furthermore, players can invite friends to play or choose
    to quickly find a match to play a game with anyone.


    In this chapter, I''ll introduce you not only to `Game Center` and the `Game Kit`
    API but also to the basics of online multiplayer programming and, of course, how
    to use `Game Center` together with `cocos2d`.


    Since a lot of Apple''s examples are intentionally incomplete, I''ll be developing
    a `GameKitHelper` class in this chapter. This class will remove some of the complexities
    of `Game Center` programming from you. It will make it easier for you to use `Game
    Kit` and `Game Center` features, and it will allow you to easily reuse the same
    code for other games.


    To configure your application for use with `Game Center`, you are going to use
    `iTunes Connect`. The information on the `iTunes Connect` web site is considered
    confidential Apple information, so I can''t discuss it in this book. However,
    I will point you to Apple''s excellent documentation for each step—and quite frankly,
    setting up leaderboards and achievements on `iTunes Connect` is possibly the easiest
    aspect of `Game Center`.


    ### Enabling Game Center


    `Game Center` is the service that manages and stores player accounts and each
    player''s friend lists, leaderboards, and achievements. This information is stored
    online on Apple''s servers and accessed either by your game or by the `Game Center`
    app that is installed on all devices running iOS 4.1 or newer.


    **NOTE:** `Game Center` is available only on devices running iOS 4.1 and newer
    and is not available on first-generation devices or the iPhone 3G. `Game Center`
    currently runs on iPod touch second, third, and fourth generations; iPhone 3GS
    and iPhone 4; and iPad; as long as they have iOS 4.1 or higher installed. The
    easiest way for a user to check whether their device supports `Game Center` is
    to locate the `Game Center` app on the device. If it exists, the device is ready
    for `Game Center`; otherwise, it is not. If the `Game Center` app is not available
    but the device is eligible for upgrading to iOS 4.1, `Game Center` support will
    become available after upgrading the device''s operating system via `iTunes`.


    If you don''t have access to a `Game Center`–enabled device, you can still program
    and test `Game Center` features using the `iPhone/iPad Simulator`. With the exception
    of matchmaking, all `Game Center` features can be tested in the simulator.


    On the other side, the `Game Kit` API is what you use to program `Game Center`
    features. `Game Kit` provides programmatic access to the data stored on the `Game
    Center` servers and is able to show built-in leaderboards, achievements, and matchmaking
    screens. But `Game Kit` also provides features besides `Game Center`—for example,
    peer-to-peer networking via `Bluetooth` and voice chat. These are the only two
    `Game Kit` features already available on devices running iOS 3.0 or newer.


    The final ingredient in this mix is `iTunes Connect`. You set up your game''s
    leaderboards and achievements through the `iTunes Connect` web site. But most
    importantly, it allows you to enable `Game Center` for your game in the first
    place. I''ll start with that step first, so you can and should do this before
    you have even created an `Xcode` project for your game.


    Your starting point for learning more about `Game Center` and the steps involved
    in creating a game that uses `Game Center` is at Apple''s Getting Started with
    Game Center web site: [`http://developer.apple.com/devcenter/ios/gamecenter`](http://developer.apple.com/devcenter/ios/gamecenter).


    For a high-level overview of `Game Center`, I recommend reading the Getting Started
    with Game Center document: [`http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf`](http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf).'
