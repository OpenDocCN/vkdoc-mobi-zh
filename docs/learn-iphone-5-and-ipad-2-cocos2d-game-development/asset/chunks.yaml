    `}`


    Here again it''s convenient to be able to iterate over all the enemy entities
    in the game, skipping those that are currently not visible. Using each enemy''s
    `boundingBox` to check with the `BulletCacheisPlayerBulletCollidingWithRect` method,
    we can quickly find if an enemy got hit by a player bullet. If so, the `EnemyEntity`
    method `gotHit` is called, which simply sets the enemy to be invisible.


    I''ll leave it as an exercise for you to implement the player''s ship being hit
    by enemy bullets. You''ll have to schedule an `update` method in `ShipEntity`
    and then implement the `checkForBulletCollisions` method and call it from the
    `update` method. You''ll have to change the call to `isPlayerBulletCollidingWithRect`
    to `isEnemyBulletCollidingWithRect` and decide how you want to react to being
    hit by a bullet, for example by playing a sound effect.


    ### A Healthbar for the Boss


    The boss monster shouldn''t be an easy, one-hit kill. It also should give the
    player feedback about its health by displaying a healthbar that decreases with
    each hit. The first step toward a healthbar is adding the `hitPoints` member variable
    to the `EnemyEntity` class, which tells us how many hits the enemy can take before
    being destroyed. The `initialHitPoints` variable stores the maximum hit points,
    since after an enemy gets killed we need to be able to restore the original hit
    points. This is the changed header file in the `EnemyEntity` class:


    `@interface EnemyEntity : Entity`

    `{`

    `    EnemyTypes type;`

    `    int initialHitPoints;`

    `    int hitPoints;`

    `}`


    `@property (readonly, nonatomic) int hitPoints;`


    To display the healthbar, a component class is ideal because it provides a plug-and-play
    solution. The header file for the `HealthbarComponent` proves to be highly unspectacular:


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface HealthbarComponent : CCSprite`

    `{`

    `}`


    `-(void) reset;`


    `@end`


    The implementation of the `HealthbarComponent` class is more interesting, as [Listing
    8–11](#Chapter08.html#list_8_11) shows.


    **Listing 8–11.** *The HealthBarComponent Updates Its `scaleX` Property Based
    on the Enemy''s Remaining Hit Points*


    `#import "HealthbarComponent.h"`

    `#import "EnemyEntity.h"`


    `@implementation HealthbarComponent`


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        self.visible = NO;`

    `        [self scheduleUpdate];`

    `    }`


    `    return self;`

    `}`


    `-(void) reset`

    `{`

    `    float parentHeight = self.parent.contentSize.height;`

    `    float selfHeight = self.contentSize.height;`

    `    self.position = CGPointMake(self.parent.anchorPointInPixels.x,`![images](images/U002.jpg)

    `        parentHeight + selfHeight);`

    `    self.scaleX = 1;`

    `    self.visible = YES;`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    if (self.parent.visible)`

    `    {`

    `        NSAssert([self.parent isKindOfClass:[EnemyEntity class]], @"not a EnemyEntity");`

    `        EnemyEntity* parentEntity = (EnemyEntity*)self.parent;`

    `        self.scaleX = parentEntity.hitPoints / (float)parentEntity.initialHitPoints;`

    `    }`

    `    else if (self.visible)`

    `    {`

    `        self.visible = NO;`

    `    }`

    `}`

    `@end`


    The healthbar turns its visible state on and off to be in line with its parent
    `EnemyEntity` object. The `reset` method places the healthbar sprite at the proper
    location just above the head of the `EnemyEntity`''s sprite. Since a decrease
    in health is displayed by modifying the `scaleX` property, it, too, needs to be
    reset to its default state.


    In the update method and when its parent is visible, the `HealthbarComponent`
    first asserts that the parent is of class `EnemyEntity`. Since this component
    relies on certain properties only available in the `EnemyEntity` class and its
    subclasses, we need to make sure that it''s the right parent class. We modify
    the `scaleX` property as a percentage of the current hit points divided by the
    initial hit points. Since there''s currently no way of telling when the hit points
    change, the calculation is done every frame, regardless of whether it''s needed.
    The overhead here is minimal, but for more complex calculations, a call to the
    `HealthbarComponent` from the `onHit` method of the `EnemyEntity` class would
    be preferable.


    **NOTE:** The `parentEntity.initialHitPoints` is cast to `float`. If I hadn''t
    done this, the division would be an integer division that would always result
    in 0 since integers can''t represent fractional numbers and are always rounded
    down. Casting the divisor to a `float` data type ensures that floating-point division
    is done and the desired result is returned.


    In the `init` method of the `EnemyEntity`, the `HealthbarComponent` is added if
    the enemy type is `EnemyTypeBoss`:'
  trans: "\n### 射击目标\n\n我差点忘了——你其实是想射击敌人，对吧？在 `ShootEmUp03` 项目中，你可以做到！\n\n检查子弹是否击中目标的理想起点在\
    \ `BulletCache` 类中。我刚刚添加了实现此功能的方法。实际上，我添加了三个方法，其中两个是公开的；第三个是类的私有方法，用于合并通用代码（参见代码清单\
    \ 8–10）。使用两个包装方法 `isPlayerBulletCollidingWithRect` 和 `isEnemyBulletCollidingWithRect`\
    \ 的目的是隐藏判断哪些类型子弹用于碰撞检测的内部细节。你也可以将 `usePlayerBullets` 参数暴露给其他类，但这样做只会让你将来更难将这个参数从\
    \ `bool` 类型改为 `enum` 类型——假如你打算引入第三种子弹类型的话。\n\n**代码清单 8–10.** *检测子弹碰撞*\n\n```\n\
    -(bool) isPlayerBulletCollidingWithRect:(CGRect)rect\n{\n    return [self isBulletCollidingWithRect:rect\
    \ usePlayerBullets:YES];\n}\n\n-(bool) isEnemyBulletCollidingWithRect:(CGRect)rect\n\
    {\n    return [self isBulletCollidingWithRect:rect usePlayerBullets:NO];\n}\n\n\
    -(bool) isBulletCollidingWithRect:(CGRect)rect usePlayerBullets:(bool)usePlayerBullets\n\
    {\n    bool isColliding = NO;\n\n    Bullet* bullet;\n    CCARRAY_FOREACH([batch\
    \ children], bullet)\n    {\n        if (bullet.visible && usePlayerBullets ==\
    \ bullet.isPlayerBullet)\n        {\n            if (CGRectIntersectsRect([bullet\
    \ boundingBox], rect))\n            {\n                isColliding = YES;\n\n\
    \                // remove the bullet\n                bullet.visible = NO;\n\
    \                break;\n            }\n        }\n    }\n\n    return isColliding;\n\
    }\n```\n\n当然，只有可见的子弹才能发生碰撞。通过检查子弹的 `isPlayerBullet` 属性，我们确保敌人不会误伤自己。实际的碰撞检测是一个简单的\
    \ `CGRectIntersectsRect` 测试；如果子弹确实击中了目标，该子弹自身也会被设置为不可见，从而消失。\n\n持有所有 `EnemyEntity`\
    \ 对象的 `EnemyCache` 类是调用此方法检查是否有敌人被玩家子弹击中的理想场所。该类新增了一个 `checkForBulletCollisions`\
    \ 方法，该方法在其 `update` 方法中被调用：\n\n```\n-(void) checkForBulletCollisions\n{\n    EnemyEntity*\
    \ enemy;\n    CCARRAY_FOREACH([batch children], enemy)\n    {\n        if (enemy.visible)\n\
    \        {\n            BulletCache* bulletCache = [[GameScene sharedGameScene]\
    \ bulletCache];\n            CGRect bbox = [enemy boundingBox];\n            if\
    \ ([bulletCache isPlayerBulletCollidingWithRect:bbox])\n            {\n      \
    \          // This enemy got hit ...\n                [enemy gotHit];\n      \
    \      }\n        }\n    }\n}\n```\n\n这里再次体现了遍历游戏中所有敌人实体的便利性，同时跳过当前不可见的实体。利用每个敌人的\
    \ `boundingBox` 与 `BulletCache` 中的 `isPlayerBulletCollidingWithRect` 方法进行检测，我们可以快速找到是否有人被玩家子弹击中。如果是，则调用\
    \ `EnemyEntity` 的 `gotHit` 方法，该方法仅将敌人设置为不可见。\n\n我将把实现玩家飞船被敌方子弹击中的功能留作你的练习。你需要在\
    \ `ShipEntity` 中安排一个 `update` 方法，然后实现 `checkForBulletCollisions` 方法并从 `update`\
    \ 方法中调用它。你需要将对 `isPlayerBulletCollidingWithRect` 的调用改为 `isEnemyBulletCollidingWithRect`，并决定被子弹击中后如何做出反应，例如播放音效。\n\
    \n### BOSS 的生命条\n\nBoss 怪物不应该被一枪轻易干掉。它还应通过显示一条随每次命中而减少的生命条，向玩家反馈其生命值。实现生命条的第一步是在\
    \ `EnemyEntity` 类中添加 `hitPoints` 成员变量，该变量告诉我们敌人在被摧毁前能承受多少次攻击。`initialHitPoints`\
    \ 变量则存储最大生命值，因为在敌人被击杀后，我们需要能够恢复初始生命值。这是 `EnemyEntity` 类中修改后的头文件：\n\n```\n@interface\
    \ EnemyEntity : Entity\n{\n    EnemyTypes type;\n    int initialHitPoints;\n \
    \   int hitPoints;\n}\n\n@property (readonly, nonatomic) int hitPoints;\n```\n\
    \n为了显示生命条，组件类是最理想的选择，因为它提供了一种即插即用的解决方案。`HealthbarComponent` 的头文件显得非常平淡无奇：\n\n\
    ```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface HealthbarComponent\
    \ : CCSprite\n{\n}\n\n-(void) reset;\n\n@end\n```\n\n`HealthbarComponent` 类的实现则更有趣一些，如代码清单\
    \ 8–11 所示。\n\n**代码清单 8–11.** *HealthBarComponent 根据敌人剩余生命值更新其 `scaleX` 属性*\n\n\
    ```\n#import \"HealthbarComponent.h\"\n#import \"EnemyEntity.h\"\n\n@implementation\
    \ HealthbarComponent\n\n-(id) init\n{\n    if ((self = [super init]))\n    {\n\
    \        self.visible = NO;\n        [self scheduleUpdate];\n    }\n\n    return\
    \ self;\n}\n\n-(void) reset\n{\n    float parentHeight = self.parent.contentSize.height;\n\
    \    float selfHeight = self.contentSize.height;\n    self.position = CGPointMake(self.parent.anchorPointInPixels.x,\n\
    \        parentHeight + selfHeight);\n    self.scaleX = 1;\n    self.visible =\
    \ YES;\n}\n\n-(void) update:(ccTime)delta\n{\n    if (self.parent.visible)\n \
    \   {\n        NSAssert([self.parent isKindOfClass:[EnemyEntity class]], @\"不是\
    \ EnemyEntity\");\n        EnemyEntity* parentEntity = (EnemyEntity*)self.parent;\n\
    \        self.scaleX = parentEntity.hitPoints / (float)parentEntity.initialHitPoints;\n\
    \    }\n    else if (self.visible)\n    {\n        self.visible = NO;\n    }\n\
    }\n@end\n```\n\n生命条会同步自身及其父级 `EnemyEntity` 对象的可见状态。`reset` 方法将生命条精灵放置在 `EnemyEntity`\
    \ 精灵头部正上方的合适位置。由于生命值的减少是通过修改 `scaleX` 属性来显示的，因此它也需要重置为默认状态。\n\n在 update 方法中，当父级对象可见时，`HealthbarComponent`\
    \ 首先断言父级是 `EnemyEntity` 类。由于此组件依赖于 `EnemyEntity` 类及其子类中才有的特定属性，我们需要确保父级是正确的类。我们将\
    \ `scaleX` 属性修改为当前生命值除以初始生命值的百分比。由于目前无法获知生命值何时变化，因此每帧都会进行计算，无论是否需要。这里的开销极小，但对于更复杂的计算，从\
    \ `EnemyEntity` 类的 `onHit` 方法中调用 `HealthbarComponent` 会更优。\n\n**注意：** `parentEntity.initialHitPoints`\
    \ 被强制转换成了 `float` 类型。如果我不这样做，除法将变成整数除法，由于整数无法表示小数且结果总是向下取整，所以结果永远为 0。将除数强制转换为\
    \ `float` 数据类型可确保进行浮点数除法并返回预期的结果。\n\n在 `EnemyEntity` 的 `init` 方法中，如果敌人类型是 `EnemyTypeBoss`，则会添加\
    \ `HealthbarComponent`：\n"
