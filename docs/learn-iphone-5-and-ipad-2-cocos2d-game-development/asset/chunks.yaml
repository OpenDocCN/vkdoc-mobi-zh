- fmt: '# Introduction


    Did you ever imagine yourself writing a computer game and being able to make money
    selling it? With Apple’s iTunes App Store and the accompanying mobile devices
    iPhone, iPod touch, and iPad, it’s now easier than ever. Of course, that doesn’t
    mean it’s easy—there’s still a lot to learn about game development and programming
    games. But you are reading this book, so I believe you’ve already made up your
    mind to take this journey. And you’ve chosen one of the most interesting game
    engines to work with: `cocos2d` for iOS.


    Developers using `cocos2d` have a huge variety of backgrounds. Some, like me,
    have been professional game developers for years and even decades. Others are
    just starting to learn programming for iOS devices or are freshly venturing into
    the exciting field of game development. Whatever your background might be, I’m
    sure you’ll get something out of this book.


    Two things unite all `cocos2d` developers: we love games, and we love creating
    and programming them. This book will pay homage to that yet won’t forget about
    the tools that will help ease the development process. Most of all, you’ll be
    making games that matter along the way, and you’ll see how this knowledge is applied
    in real game development.


    You see, I get bored by books that spend all their pages teaching me how to make
    yet another dull Asteroids clone using some specific game-programming API. What’s
    more important, I think, are game programming concepts and tools—the things you
    take with you even as APIs or your personal programming preferences change. I’ve
    amassed hundreds of programming and game development books over 20 years. The
    books I value the most to this day are those who went beyond the technology and
    taught me why certain things are designed and programmed the way they are. This
    book will focus not just on working game code but also on why it works and which
    trade-offs to consider.


    I would like you to learn how to write games that matter—games that are popular
    on the App Store and relevant to players. I’ll walk you through the ideas and
    technical concepts behind these games in this book and, of course, how `cocos2d`
    and `Objective-C` make these games tick. You’ll find that the source code that
    comes with the book is enriched with a lot of comments, which should help you
    navigate and understand all the nooks and crannies of the code.


    Learning from someone else’s source code with a guide to help focus on what’s
    important is what works best for me whenever I’m learning something new—and I
    like to think it will work great for you too. And since you can base your own
    games on the book’s source code, I’m looking forward to playing your games in
    the near future! Don’t forget to let me know about them! You can share your projects
    and ask questions on Cocos2D Central ([`www.cocos2d-central.com`](http://www.cocos2d-central.com)),
    and you can reach me at [`steffen@learn-cocos2d.com`](http://steffen@learn-cocos2d.com).
    You might also want to visit my web site dedicated to learning `cocos2d` at [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com)
    and you should check out how I’m improving `cocos2d` with Kobold2D by visiting
    [`www.kobold2d.com`](http://www.kobold2d.com).


    ## What’s New in the Second Edition?


    First, I’m proud to have had Andreas Löw as the coauthor for the second edition.
    Andreas is the developer of the TexturePacker and PhysicsEditor tools, and in
    particular he went out of his way to update the projects for several chapters
    with new code and better graphics.


    Most importantly, the goal of the second edition was to bring the book up to date
    with recent developments, one being the final 1.0.1 version of `cocos2d` as well
    as compatibility with Xcode 4 and iOS 5. The text, the code, and the figures have
    all been updated to reflect the new versions of `cocos2d`, Xcode and the iOS SDK.


    Many more changes were made based on reader feedback. [Chapter 3](#Chapter03.html#ch3)
    has been overhauled to improve and extend the descriptions of essential `cocos2d`
    features. It has also become more visual, with a lot more figures illustrating
    key concepts and classes. The number of figures in the book has increased throughout.


    Over the course of a year, new tools for `cocos2d` game development have emerged.
    To reflect the changing tool landscape, the book now refers to TexturePacker in
    favor of Zwoptex as the leading texture atlas creation tool. Since Löw works full-time
    on his tools, his customers benefit by receiving frequent updates, new features,
    and great support. Similarly, PhysicsEditor is used in the second edition in place
    of VertexHelper since it offers a far better workflow and powerful convenience
    features. Finally, the second edition introduces you to Glyph Designer, which
    is essentially the Hiero Bitmap Font tool but with a native Mac OS X user interface
    and with none of the bugs that plagued Hiero.


    The shoot ’em up project first introduced in [Chapter 6](#Chapter06.html#ch6)
    and used throughout [Chapters 7](#Chapter07.html#ch7) to [9](#Chapter09.html#ch9)
    has seen a graphic overhaul. Let’s just say it looks a lot better than the programmer’s
    art it used before, courtesy of myself. Likewise, [Chapter 13](#Chapter13.html#ch13),
    the pinball physics game, has been improved with new code and improved graphics.
    Accordingly, the aforementioned chapters have seen some of the more substantial
    changes.


    Last but certainly not least, the second edition adds two entirely new chapters.


    [Chapter 15](#Chapter15.html#ch15) explores the frequently misunderstood and underutilized
    possibility of mixing `cocos2d` with regular UIKit views. You’ll learn how to
    add UIKit views to a `cocos2d` app as well as add `cocos2d` to an already existing
    UIKit app. This chapter will make it a lot easier for you to cross the chasm between
    pure UIKit and pure `cocos2d` apps, regardless of which way you’re going.


    [Chapter 16](#Chapter16.html#ch16) introduces you to Kobold2D ([`www.kobold2d.com`](http://www.kobold2d.com)),
    my idea of making `cocos2d` a much better game development environment. Kobold2D
    aims to make commonly performed tasks easy while adding preconfigured libraries
    such as `wax` (Lua Scripting), `ObjectAL` (OpenAL audio), and `cocos3d` (3D rendering)
    to the distribution. It also comes with a lot of project templates, many of them
    based on the projects discussed in this book.


    ## Why Use cocos2d for iOS?


    When game developers look for a game engine, they first evaluate their options.
    I think `cocos2d` is a great choice for a lot of developers, for many reasons.


    ### It’s Free


    First, it is free. It doesn’t cost you a dime to work with it. You are allowed
    to create both free and commercial iPhone, iPod, and iPad apps. You can even create
    Mac OS X apps with it. You don’t have to pay royalties. Seriously, no strings
    attached.


    ### It’s Open Source


    The next good reason to use `cocos2d` is that it’s open source. This means there’s
    no black box preventing you from learning from the game engine code or making
    changes to it where necessary. That makes `cocos2d` both extensible and flexible.


    You can download `cocos2d` from [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download).'
  raw: '## **Introduction**


    Did you ever imagine yourself writing a computer game and being able to make money
    selling it? With Apple’s iTunes App Store and the accompanying mobile devices
    iPhone, iPod touch, and iPad, it’s now easier than ever. Of course, that doesn’t
    mean it’s easy—there’s still a lot to learn about game development and programming
    games. But you are reading this book, so I believe you’ve already made up your
    mind to take this journey. And you’ve chosen one of the most interesting game
    engines to work with: cocos2d for iOS.


    Developers using cocos2d have a huge variety of backgrounds. Some, like me, have
    been professional game developers for years and even decades. Others are just
    starting to learn programming for iOS devices or are freshly venturing into the
    exciting field of game development. Whatever your background might be, I’m sure
    you’ll get something out of this book.


    Two things unite all cocos2d developers: we love games, and we love creating and
    programming them. This book will pay homage to that yet won’t forget about the
    tools that will help ease the development process. Most of all, you’ll be making
    games that matter along the way, and you’ll see how this knowledge is applied
    in real game development.


    You see, I get bored by books that spend all their pages teaching me how to make
    yet another dull Asteroids clone using some specific game-programming API. What’s
    more important, I think, are game programming concepts and tools—the things you
    take with you even as APIs or your personal programming preferences change. I’ve
    amassed hundreds of programming and game development books over 20 years. The
    books I value the most to this day are those who went beyond the technology and
    taught me why certain things are designed and programmed the way they are. This
    book will focus not just on working game code but also on why it works and which
    trade-offs to consider.


    I would like you to learn how to write games that matter—games that are popular
    on the App Store and relevant to players. I’ll walk you through the ideas and
    technical concepts behind these games in this book and, of course, how cocos2d
    and Objective-C make these games tick. You’ll find that the source code that comes
    with the book is enriched with a lot of comments, which should help you navigate
    and understand all the nooks and crannies of the code.


    Learning from someone else’s source code with a guide to help focus on what’s
    important is what works best for me whenever I’m learning something new—and I
    like to think it will work great for you too. And since you can base your own
    games on the book’s source code, I’m looking forward to playing your games in
    the near future! Don’t forget to let me know about them! You can share your projects
    and ask questions on Cocos2D Central ([`www.cocos2d-central.com`](http://www.cocos2d-central.com)),
    and you can reach me at [`steffen@learn-cocos2d.com`](http://steffen@learn-cocos2d.com).
    You might also want to visit my web site dedicated to learning cocos2d at [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com)
    and you should check out how I’m improving cocos2d with Kobold2D by visiting [`www.kobold2d.com`](http://www.kobold2d.com).


    ### What’s New in the Second Edition?


    First, I’m proud to have had Andreas Löw as the coauthor for the second edition.
    Andreas is the developer of the TexturePacker and PhysicsEditor tools, and in
    particular he went out of his way to update the projects for several chapters
    with new code and better graphics.


    Most importantly, the goal of the second edition was to bring the book up to date
    with recent developments, one being the final 1.0.1 version of cocos2d as well
    as compatibility with Xcode 4 and iOS 5\. The text, the code, and the figures
    have all been updated to reflect the new versions of cocos2d, Xcode and the iOS
    SDK.


    Many more changes were made based on reader feedback. [Chapter 3](#Chapter03.html#ch3)
    has been overhauled to improve and extend the descriptions of essential cocos2d
    features. It has also become more visual, with a lot more figures illustrating
    key concepts and classes. The number of figures in the book has increased throughout.


    Over the course of a year, new tools for cocos2d game development have emerged.
    To reflect the changing tool landscape, the book now refers to TexturePacker in
    favor of Zwoptex as the leading texture atlas creation tool. Since Löw works full-time
    on his tools, his customers benefit by receiving frequent updates, new features,
    and great support. Similarly, PhysicsEditor is used in the second edition in place
    of VertexHelper since it offers a far better workflow and powerful convenience
    features. Finally, the second edition introduces you to Glyph Designer, which
    is essentially the Hiero Bitmap Font tool but with a native Mac OS X user interface
    and with none of the bugs that plagued Hiero.


    The shoot ’em up project first introduced in [Chapter 6](#Chapter06.html#ch6)
    and used throughout [Chapters 7](#Chapter07.html#ch7) to [9](#Chapter09.html#ch9)
    has seen a graphic overhaul. Let’s just say it looks a lot better than the programmer’s
    art it used before, courtesy of myself. Likewise, [Chapter 13](#Chapter13.html#ch13),
    the pinball physics game, has been improved with new code and improved graphics.
    Accordingly, the aforementioned chapters have seen some of the more substantial
    changes.


    Last but certainly not least, the second edition adds two entirely new chapters.


    [Chapter 15](#Chapter15.html#ch15) explores the frequently misunderstood and underutilized
    possibility of mixing cocos2d with regular UIKit views. You’ll learn how to add
    UIKit views to a cocos2d app as well as add cocos2d to an already existing UIKit
    app. This chapter will make it a lot easier for you to cross the chasm between
    pure UIKit and pure cocos2d apps, regardless of which way you’re going.


    [Chapter 16](#Chapter16.html#ch16) introduces you to Kobold2D ([`www.kobold2d.com`](http://www.kobold2d.com)),
    my idea of making cocos2d a much better game development environment. Kobold2D
    aims to make commonly performed tasks easy while adding preconfigured libraries
    such as wax (Lua Scripting), ObjectAL (OpenAL audio), and cocos3d (3D rendering)
    to the distribution. It also comes with a lot of project templates, many of them
    based on the projects discussed in this book.


    ### Why Use cocos2d for iOS?


    When game developers look for a game engine, they first evaluate their options.
    I think cocos2d is a great choice for a lot of developers, for many reasons.


    #### It’s Free


    First, it is free. It doesn’t cost you a dime to work with it. You are allowed
    to create both free and commercial iPhone, iPod, and iPad apps. You can even create
    Mac OS X apps with it. You don’t have to pay royalties. Seriously, no strings
    attached.


    #### It’s Open Source


    The next good reason to use cocos2d is that it’s open source. This means there’s
    no black box preventing you from learning from the game engine code or making
    changes to it where necessary. That makes cocos2d both extensible and flexible.


    You can download cocos2d from [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download).'
