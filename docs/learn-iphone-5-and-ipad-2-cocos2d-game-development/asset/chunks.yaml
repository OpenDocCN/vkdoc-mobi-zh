- fmt: '##### Particle Texture


    Without a texture, all particles would be flat, colored squares, as in [Figure
    9–3](#Chapter09.html#fig_9_3). To use a texture for a particle effect, provide
    one using the `CCTextureCache` method `addImage`, which returns the `CCTexture2D`
    for the given image file:


    ```

    self.texture = [[CCTextureCache sharedTextureCache] addImage:@"fire.png"];

    ```


    Particle textures look best if they are cloudlike and roughly spherical. It''s
    often detrimental to the particle effect if the texture has high-contrast areas,
    resembling a particular shape or form, like the `redcross.png` from the shoot-''em-up
    game. This makes it easier to see individual particles because they don''t blend
    too well with each other. Some effects can use this to their advantage, like the
    aforementioned stars circling the player''s head. In addition, cartoonlike images
    or gradients work best, whereas photorealistic images tend to create an undefinable
    pixel mess. To demonstrate this, you''ll see three different textures applied
    to the same particle effect in [Figure 9–6](#Chapter09.html#fig_9_6).


    The most important aspect of particle textures is that the image must be at most
    64x64 pixels in size. The smaller the texture size, the better it is for the performance
    of the particle effect.


    ![images](images/0906.jpg)


    **Figure 9–6.** *The same particle effect using different textures. Photorealistic
    images don''t work well.*


    ### Particle Designer


    The Particle Designer is an interactive tool for creating particle effects for
    cocos2d and iOS OpenGL applications. You can download the trial version at [`http://particledesigner.71squared.com`](http://particledesigner.71squared.com).


    This is an invaluable tool that will save you a lot of time creating particle
    effects. Its power is that you can immediately see what happens on-screen when
    you change a particle effect''s properties, and you can share your creations with
    others and get inspiration from other developers'' particle effects.


    #### Introducing the Particle Designer


    By default, the Particle Designer''s user interface shows a visual list of particle
    effects. To edit a particular effect, select it and switch to the `Emitter Config`
    view ([Figure 9–7](#Chapter09.html#fig_9_7)) by either double-clicking it or clicking
    the `Emitter Config` button in the upper-right corner.


    ![images](images/0907.jpg)


    **Figure 9–7.** *Particle Designer is full of properties you can tweak interactively.
    A separate window ([Figure 9–8](#Chapter09.html#fig_9_8)) shows the effect as
    you edit it.*


    You should recognize these parameters from the description of the self-made particle
    effect properties. There are only a few properties that are not available and
    can''t be edited in Particle Designer. One is the `positionType`, and another
    is the `endRadiusVar` property for the radius emitter mode. The latter means you
    can''t create particle effects that rotate outward in radius mode. But you can
    always load a Particle Designer effect and then tweak it in code by overriding
    certain properties, like setting the `positionType` to `kCCPositionTypeFree`,
    as you''ll do later in [Listing 9–4](#Chapter09.html#list_9_4). This is just a
    minor nuisance compared to actually seeing on-screen how your effect changes as
    you move the sliders.


    **NOTE**: The Particle Designer developers are currently working on Particle Designer
    2.0, which will feature a redesigned and less crowded user interface. They also
    plan to create specialized controls to allow you to change both value and variance
    using a single gauge-like control. So if your Particle Designer looks quite different
    from the one in [Figure 9–7](#Chapter09.html#fig_9_7), you''re using version 2.0.
    If version 2.0 is not available as you read this, you should know that the upgrade
    to version 2.0 will be free for existing customers.


    The only unusual control is the Particle Texture. There is no button to load an
    image, and double-clicking the field doesn''t do anything either. The trick here
    is that the Particle Texture box only accepts images that are dragged and dropped
    onto it. Just drag any image from Finder over to this box, and the box will turn
    green, signaling that it will accept that image. Once you drop the image, it will
    be used by the particle effect.


    **CAUTION:** Particle Designer will warn you if you drop an image that is larger
    than 512x512 pixels. It will use the image anyway but will scale the image down
    to 512x512 pixels, regardless of its original aspect ratio. Also, note that the
    previous limitation of 64x64 pixel textures has been removed with Particle Designer
    1.3.


    The Particle Designer preview window in [Figure 9–8](#Chapter09.html#fig_9_8)
    looks just like the iPhone Simulator. It can also be set to the iPad screen size,
    and the orientation can be changed by clicking the `iPad`/`iPhone` and `Orientation`
    buttons in Particle Designer''s menu bar, to the right of the `Load`, `Save`,
    and `Save As` buttons. By clicking and dragging inside the preview window, you
    can move the particle effect around, which helps you see how the effect might
    look on moving objects.


    Notice that the Background Color settings are not part of the actual effect. They
    will change the background color of the preview window. This is useful if your
    game has bright colors and you want to design a dark or dim effect and still be
    able to see what you''re doing.


    ![images](images/0908.jpg)


    **Figure 9–8.** *The Particle Designer has a preview window that looks like the
    iPhone Simulator. You can also set it to the iPad screen size and change its orientation.
    If you click and drag inside the screen, you can even move the particle effect
    around to see what it might look like on moving objects.*


    If you lack inspiration, you can always make use of the `Ramdomize` button. You
    can also ponder about the meaning of the word *ramdomize*, which is how it''s
    spelled in the Particle Designer. The Urban Dictionary tells me that *ramdom*
    is a cooler form of random. So, I''m guessing the developers just thought their
    randomizer to be extra cool. Well, it''s definitely inspiring even though it doesn''t
    randomize all of the available properties. For example, `Ramdomize` will never
    change the emitter type, the emitter location, and many emitter type–specific
    parameters.


    Once you found your inspiration, you''ll want to slide the sliders and watch what
    happens in the preview window. Take your time and tweak an effect until you like
    it. Careful, though, because it''s a very captivating, even mesmerizing, activity,
    and you''ll easily find yourself making new particle effects just for the fun
    of it.


    **CAUTION:** Be careful when designing particle effects! First, keep in mind that
    your game has to calculate and render a lot of other things, too. If the effect
    you''re currently designing runs at 60 FPS in Particle Designer''s preview window,
    that doesn''t mean it won''t kill your framerate when you use it in your game.
    Always test new particle effects in your game and keep an eye on the framerate.
    Also, make sure to run these tests on a device, in particular on older devices!
    Your game''s performance in the iPhone/iPad Simulator is often misleading and
    thus must be regarded as completely irrelevant. The same goes for the Particle
    Designer preview window.'
