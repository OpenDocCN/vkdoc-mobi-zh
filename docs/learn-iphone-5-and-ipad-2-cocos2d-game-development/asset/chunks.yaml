    # 公共关系与新闻稿


    如果你独自工作且不想与发行商合作，聘请公关公司或代理人为你和你的游戏在市场上争取更好的机会，或许是一个明智的决定。但这也可能完全是愚蠢且毫无意义的。在后一种情况下，通常不是公关人员的错；关键在于理解公关的价值——如何让它有效运作——并评估是否值得花费数千美元。


    作为独立开发者，你的预算很可能非常有限。即使是公关代理人的入门级价格，也会让你惊掉下巴。如果是这样，那就放弃，继续专注于你的游戏开发吧。你的直觉反应是对的。


    现在，如果你已经有一款拿得出手的游戏上市，并且不仅赚了钱，还在周围人中积累了一些影响力，情况可能就有些不同了。也许你有多余的资金，从第一款游戏中学到了很多，第二款游戏甚至更好，并且已经有玩家在等待它发布。你能借助专业公关来推波助澜吗？在这种情况下，可能性会更大。


    如果你寻求公关代理人的帮助，务必设法找到那些在游戏行业有成功案例的人——最好是曾与独立游戏开发者以及移动游戏细分领域合作过的。他们并不容易找到，所以要多方打听。聘请一个不涉足游戏开发的公关代理人完全是浪费时间和金钱——你需要的是能够触及你游戏目标受众的公关人员。但最重要的是，决定因素其实应该是你的游戏本身。


    如果你知道自己有特别之处，测试者也这么说，并且游戏看起来棒极了，那么投资几千美元做公关可能是个不错的选择。公关希望游戏评测者撰写关于你游戏的文章，也希望游戏开发网站注意到你的特殊才能。如果这些优势不明显，专业公关也无法产生巨大差异。只有当你能提供精美的截图以及一部引人入胜、有趣且迷人的预告片时，公关效果才最好。


    你怎么知道自己的游戏是否特别？去问问那些会毫不留情告诉你他们不喜欢什么的人。家人和朋友通常太善良，无法提供改进游戏所需的、有时甚至是严苛的批评。你应该在论坛上招募私人测试者，并给他们一份“开胃菜”——可以是截图或游戏特色描述，这样他们就会更有兴趣尝试你的游戏。你如何处理批评和功能请求，以及总体上你与测试者的互动方式，本质上也是公关的一部分。处理用户反馈，尤其是批评，是你应尽早磨练的关键技能。


    但谁说你不能先自己尝试呢？有些新闻稿服务是专门为独立开发者提供的，其费用仅为专业公关代理人所收费用的一小部分。而且，只要遵循规则，撰写新闻稿并不难。以下新闻稿服务能精准地触及游戏玩家和开发者的渠道。最热门的选择是
    Indie Press Release Service（`www.gamerelease.net`）以及 Mitorah Games 的 Game Press
    Release Submission Service（`www.mitorahgames.com/Submit-Game-Press-Release.html`）。


    毫不意外，这两项服务都是由独立开发者自己运营的。具体来说，尤索·希耶塔拉赫蒂创建了 Indie Press Release Service，并同时运营着内容深刻的博客`www.gameproducer.net`。如果你想要了解更多关于制作和营销方面的知识，这个博客会特别有趣。


    你还应该考虑 Games Press 网站，世界各地的游戏记者都经常访问该网站（见`www.gamespress.com/about_howtosubmit.asp`）。


    ## 吸引玩家以增加收入


    每个平台都有一些外围技术，至少在有些情况下，对于某些开发者来说，即使不是必备，也是很有帮助的。在 iOS 平台上，除了苹果的 Game Center 外，还包括数量不断增长、可供选择的社交网络平台。还有你可能需要用于开发持久性游戏的服务器开发工具包，这些游戏需要连接到你的自有服务器——无论是为了寻找并运行超过四名玩家的比赛，还是仅仅为了在线保存角色、进度、设置和世界。


    有时会备受争议的是，在游戏中植入广告可以创造额外的收入流，特别是对于免费游戏和精简版而言。通常结合广告，你还可以研究添加分析和数据统计是否有助于你的游戏，以便找出玩家最常失败的地方、他们点击最多的按钮以及他们玩单个游戏模式的频率。这可以帮助你调整游戏，使其对更多玩家来说更有趣。


    ### 吸引你的玩家


    游戏行业最热门的关键词显然是“社交”。无论是热潮还是泡沫，无论投资者、评测者和玩家是追捧还是厌倦，社交游戏元素正变得越来越强大，并且已成为玩家的期待。社交游戏涉及从被动地向
    Twitter 和 Facebook 等网络推送更新，到引导多人游戏中的玩家互动等各个方面。


    此外，推送通知是一个强大的工具，可以提醒用户你的应用中发生的重要事件。无论是更新、新内容，还是你刚发布的下一个游戏，它都为你提供了一个额外的渠道，让用户持续参与到你的应用和品牌中来。

    '
- fmt: '# Social Networks


    Besides Apple’s Game Center technology, there are a number of different social
    networking platforms. All are more or less similar in that they allow players
    to connect, post high scores, earn achievements, and do many other things, including
    posting game events to Twitter and Facebook—and all of them are free for both
    players and developers!


    Since their feature sets are constantly evolving and the market for social networks
    is booming, the final decision is up to you. I’ll list the big players here and
    mention some of their outstanding features.


    **NOTE:** Most of the social networking SDKs as well as ShareKit (`http://getsharekit.com`)
    already include support for connecting your users with Twitter and Facebook, so
    you don’t need to learn and implement the separately available Facebook and Twitter
    APIs. If all you need is access to Twitter, you should have a look at the excellent
    `MGTwitterEngine` API from Matt Gemmell, at `http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa`.
    And if you need to integrate Facebook into your app, the official Facebook iOS
    SDK is located on GitHub: `http://github.com/facebook/facebook-ios-sdk`.


    - **OpenFeint** is the perceived leader of iOS social networking SDKs. It boasts
    Game Center compatibility and turn-based multiplayer features to stand out from
    the crowd. But first and foremost it’s very popular, with an audience of players
    in the millions. Have a look at OpenFeint’s developer portal: `www.openfeint.com/developers`.

    - **Scoreloop** sets itself apart from the competition by offering additional
    revenue streams via downloadable content, sharing virtual goods and in-game currencies.
    It also includes analytics to determine what your players are doing. Take a feature
    tour on the Scoreloop home page: `www.scoreloop.com`.

    - **Plus+** is the social networking platform created by ngmoco, a big publisher
    of iOS games. It’s currently available only to ngmoco’s development partners.
    Ngmoco is looking for select developers to partner with; if you think you have
    what it takes, then you might want to apply on its developer web site: `http://plusplus.com/developers`.

    - Chillingo’s **Crystal** is the other big iOS publisher’s social networking platform.
    And just like with Plus+, access is limited to developers working with Chillingo,
    respectively Electronic Arts, the new owners of Chillingo. You can get information
    on the Crystal SDK on `http://devsupport.crystalsdk.com`.


    If you are missing Agon-Online in this list, you probably haven’t heard the news
    that it shut down on June 30, 2011. As for Geocade, it is still available at `www.geocade.com`
    but simply does not play a role among its competitors.


    ## Socket Server Technology for Multiplayer Games


    If you’re looking to build a multiplayer game that requires more sophisticated
    server-side game logic and storage than the social networking platforms are able
    to offer, you will have to write your own socket server. Luckily, the difficult
    part of writing a server/client architecture with socket connection and other
    networking voodoo has already been done for you.


    Hosting your online games on a socket server has several advantages. For some
    games, it’s very important that players can’t cheat, so running the most critical
    game logic isolated on the server while being able to verify the data coming from
    clients can prevent a lot of common cheating mechanisms. A server-based approach
    is also the only way to write a game that supports a lot of players at once. With
    peer-to-peer technology, you quickly run into scalability issues, because each
    device’s bandwidth is rather limited, and every player in a peer-to-peer match
    adds computational overhead to every device connected to that match. Apple’s Game
    Kit restricts peer-to-peer connections between devices to a maximum of four players
    for a reason. The server hardware is ultimately more powerful and has a higher
    bandwidth than any device connected to it, which allows you to host more players
    in the same match. In addition, the server hosts the database and usually runs
    verifications that ensure that players haven’t tampered with their app or the
    stream of data coming in to defeat cheats and exploits.


    - **Electrotanks’s Electroserver** is a feature-rich server technology used by
    professionals worldwide. It’s priced accordingly, but it does have a free version
    that allows for up to 25 concurrent users to be connected with the game server.
    If that’s sufficient for you, give it a try: `www.electrotank.com`.

    - **SmartFoxServer** by gotoAndPlay() follows in the tracks of Electroserver.
    It’s not as feature rich, but it’s very popular among independent game developers,
    mostly because it has a completely free Lite version, while the Basic and Pro
    versions still allow up to 20 users for free. In general, the prices are more
    affordable by independent developers. Compare the SmartFoxServer editions on the
    products page: `www.smartfoxserver.com/products`.

    - **Exit Games** follows a two-pronged approach by offering a networking component
    called Photon and a managed service for developing persistent online games called
    Neutron. Neutron natively supports the development of turn-based multiplayer games,
    and it can suspend and resume game sessions. Photon has a free version that supports
    up to 50 concurrent users per app or server, and Neutron has a free trial version.
    Compare features and prices on the Exit Games web site: `www.exitgames.com`.


    ## Push Notification Providers


    Push notifications are little alert messages popping up on your iPhone’s screen,
    whether you’re using it or not. Some apps use them to inform users about the stock
    market, about a sports game’s events as it is being played, or simply to let you
    know that there’s a new comic strip available. The uses are endless. The greatest
    power of push notifications is that it gives your users an incentive to keep using
    your app; they won’t forget it as easily if they let the app remind them about
    news and events.


    You may have heard of Apple’s push notification service, but if not, you can learn
    more about it in Apple’s Push Notification Programming Guide: `http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html`.


    Push notifications allow apps to broadcast messages to individual devices. If
    you implement one of the social networking platforms, you’ll get this feature
    for free, and you don’t need to care about the complexities of push notification
    programming. However, in some cases you might need to implement your own solution,
    and for that you need a push notification provider. That’s a server that can communicate
    with Apple’s servers and the iOS devices. You can write your own server with the
    free and open source `apns-sharp` library (see `http://code.google.com/p/apns-sharp`),
    or you can sign up for the Mono Push service (`www.monopush.com`) or Urban Airship
    (`http://urbanairship.com`).'
  raw: '###### Social Networks


    Besides Apple’s Game Center technology, there are a number of different social
    networking platforms. All are more or less similar in that they allow players
    to connect, post high scores, earn achievements, and do many other things, including
    posting game events to Twitter and Facebook—and all of them are free for both
    players and developers!


    Since their feature sets are constantly evolving and the market for social networks
    is booming, the final decision is up to you. I’ll list the big players here and
    mention some of their outstanding features.


    **NOTE:** Most of the social networking SDKs as well as ShareKit ([`http://getsharekit.com`](http://getsharekit.com))
    already include support for connecting your users with Twitter and Facebook, so
    you don’t need to learn and implement the separately available Facebook and Twitter
    APIs. If all you need is access to Twitter, you should have a look at the excellent
    MGTwitterEngine API from Matt Gemmell, at [`http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa`](http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa).
    And if you need to integrate Facebook into your app, the official Facebook iOS
    SDK is located on GitHub: [`http://github.com/facebook/facebook-ios-sdk`](http://github.com/facebook/facebook-ios-sdk).


    *   **OpenFeint** is the perceived leader of iOS social networking SDKs. It boasts
    Game Center compatibility and turn-based multiplayer features to stand out from
    the crowd. But first and foremost it’s very popular, with an audience of players
    in the millions. Have a look at OpenFeint’s developer portal: [`www.openfeint.com/developers`](http://www.openfeint.com/developers).

    *   **Scoreloop** sets itself apart from the competition by offering additional
    revenue streams via downloadable content, sharing virtual goods and in-game currencies.
    It also includes analytics to determine what your players are doing. Take a feature
    tour on the Scoreloop home page: [`www.scoreloop.com`](http://www.scoreloop.com).

    *   **Plus+** is the social networking platform created by ngmoco, a big publisher
    of iOS games. It’s currently available only to ngmoco’s development partners.
    Ngmoco is looking for select developers to partner with; if you think you have
    what it takes, then you might want to apply on its developer web site: [`http://plusplus.com/developers`](http://plusplus.com/developers).

    *   Chillingo’s **Crystal** is the other big iOS publisher’s social networking
    platform. And just like with Plus+, access is limited to developers working with
    Chillingo, respectively Electronic Arts, the new owners of Chillingo. You can
    get information on the Crystal SDK on [`http://devsupport.crystalsdk.com`](http://devsupport.crystalsdk.com).


    If you are missing Agon-Online in this list, you probably haven’t heard the news
    that it shut down on June 30, 2011\. As for Geocade, it is still available at
    [`www.geocade.com`](http://www.geocade.com) but simply does not play a role among
    its competitors.


    ###### Socket Server Technology for Multiplayer Games


    If you’re looking to build a multiplayer game that requires more sophisticated
    server-side game logic and storage than the social networking platforms are able
    to offer, you will have to write your own socket server. Luckily, the difficult
    part of writing a server/client architecture with socket connection and other
    networking voodoo has already been done for you.


    Hosting your online games on a socket server has several advantages. For some
    games, it’s very important that players can’t cheat, so running the most critical
    game logic isolated on the server while being able to verify the data coming from
    clients can prevent a lot of common cheating mechanisms. A server-based approach
    is also the only way to write a game that supports a lot of players at once. With
    peer-to-peer technology, you quickly run into scalability issues, because each
    device’s bandwidth is rather limited, and every player in a peer-to-peer match
    adds computational overhead to every device connected to that match. Apple’s Game
    Kit restricts peer-to-peer connections between devices to a maximum of four players
    for a reason. The server hardware is ultimately more powerful and has a higher
    bandwidth than any device connected to it, which allows you to host more players
    in the same match. In addition, the server hosts the database and usually runs
    verifications that ensure that players haven’t tampered with their app or the
    stream of data coming in to defeat cheats and exploits.


    *   **Electrotanks’s Electroserver** is a feature-rich server technology used
    by professionals worldwide. It’s priced accordingly, but it does have a free version
    that allows for up to 25 concurrent users to be connected with the game server.
    If that’s sufficient for you, give it a try: [`www.electrotank.com`](http://www.electrotank.com).

    *   **SmartFoxServer** by gotoAndPlay() follows in the tracks of Electroserver.
    It’s not as feature rich, but it’s very popular among independent game developers,
    mostly because it has a completely free Lite version, while the Basic and Pro
    versions still allow up to 20 users for free. In general, the prices are more
    affordable by independent developers. Compare the SmartFoxServer editions on the
    products page: [`www.smartfoxserver.com/products`](http://www.smartfoxserver.com/products).

    *   **Exit Games** follows a two-pronged approach by offering a networking component
    called Photon and a managed service for developing persistent online games called
    Neutron. Neutron natively supports the development of turn-based multiplayer games,
    and it can suspend and resume game sessions. Photon has a free version that supports
    up to 50 concurrent users per app or server, and Neutron has a free trial version.
    Compare features and prices on the Exit Games web site: [`www.exitgames.com`](http://www.exitgames.com).


    ###### Push Notification Providers


    Push notifications are little alert messages popping up on your iPhone’s screen,
    whether you’re using it or not. Some apps use them to inform users about the stock
    market, about a sports game’s events as it is being played, or simply to let you
    know that there’s a new comic strip available. The uses are endless. The greatest
    power of push notifications is that it gives your users an incentive to keep using
    your app; they won’t forget it as easily if they let the app remind them about
    news and events.


    You may have heard of Apple’s push notification service, but if not, you can learn
    more about it in Apple’s Push Notification Programming Guide: [`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html).


    Push notifications allow apps to broadcast messages to individual devices. If
    you implement one of the social networking platforms, you’ll get this feature
    for free, and you don’t need to care about the complexities of push notification
    programming. However, in some cases you might need to implement your own solution,
    and for that you need a push notification provider. That’s a server that can communicate
    with Apple’s servers and the iOS devices. You can write your own server with the
    free and open source apns-sharp library (see [`http://code.google.com/p/apns-sharp`](http://code.google.com/p/apns-sharp)),
    or you can sign up for the Mono Push service ([`www.monopush.com`](http://www.monopush.com))
    or Urban Airship ([`http://urbanairship.com`](http://urbanairship.com)).'
  trans: '

    # 社交网络


    除了苹果的 Game Center 技术之外，还有多种不同的社交网络平台。它们或多或少都有相似之处，都允许玩家连接、发布高分、获取成就以及执行许多其他操作，包括将游戏事件发布到
    Twitter 和 Facebook——而且对于玩家和开发者来说，它们都是免费的！


    由于这些平台的功能集在不断演变，并且社交网络市场正在蓬勃发展，因此最终的决定权在您手中。我将在此列出主要的平台，并提及它们一些突出的功能。


    **注意：** 大多数社交网络 SDK 以及 ShareKit (`http://getsharekit.com`) 已经包含了将用户连接到 Twitter
    和 Facebook 的支持，因此您无需另外学习并实现 Facebook 和 Twitter 的独立 API。如果您只需要访问 Twitter，可以看看 Matt
    Gemmell 提供的优秀 `MGTwitterEngine` API，地址是 `http://mattgemmell.com/2008/02/22/mgtwitterengine-twitter-from-cocoa`。如果您需要将
    Facebook 集成到您的应用中，官方的 Facebook iOS SDK 位于 GitHub 上：`http://github.com/facebook/facebook-ios-sdk`。


    - **OpenFeint** 被认为是 iOS 社交网络 SDK 的领跑者。它宣称兼容 Game Center 并提供回合制多人游戏功能，以此脱颖而出。但首先也是最重要的是，它非常流行，拥有数百万的玩家用户。请访问
    OpenFeint 的开发者门户网站：`www.openfeint.com/developers`。

    - **Scoreloop** 通过提供可下载内容、分享虚拟商品和游戏内货币等额外收入来源，将自己与竞争对手区分开来。它还包含分析功能，可以了解您的玩家正在做什么。请在
    Scoreloop 主页上浏览功能展示：`www.scoreloop.com`。

    - **Plus+** 是由 ngmoco（一家大型 iOS 游戏发行商）创建的社交网络平台。目前仅对 ngmoco 的开发合作伙伴开放。Ngmoco 正在寻找特定的开发者进行合作；如果您认为自己符合条件，可以在其开发者网站上申请：`http://plusplus.com/developers`。

    - Chillingo 的 **Crystal** 是另一家大型 iOS 发行商的社交网络平台。与 Plus+ 一样，其访问权限仅限于与 Chillingo（或者说是其新东家
    Electronic Arts）合作的开发者。您可以在 `http://devsupport.crystalsdk.com` 上获取关于 Crystal SDK
    的信息。


    如果您在这个列表中找不到 Agon-Online，可能是因为您还没听说它已于 2011 年 6 月 30 日关闭的消息。至于 Geocade，它仍然可以在
    `www.geocade.com` 上访问，但在其竞争对手中已经无足轻重了。


    ## 用于多人游戏的 Socket 服务器技术


    如果您想要构建一款需要比社交网络平台所能提供的更复杂的服务器端游戏逻辑和存储功能的多人游戏，那么您将需要编写自己的 socket 服务器。幸运的是，编写一个具有
    socket 连接和其他网络魔力的服务器/客户端架构的困难部分已经为您完成了。


    将您的在线游戏托管在 socket 服务器上有几个优点。对于某些游戏来说，防止玩家作弊非常重要，因此在服务器上独立运行最关键的游戏逻辑，同时能够验证来自客户端的数据，可以阻止许多常见的作弊机制。基于服务器的方法也是编写一款能同时支持大量玩家游戏的方法。使用点对点技术，您很快就会遇到可扩展性问题，因为每个设备的带宽相当有限，并且点对点匹配中的每个玩家都会给连接到该匹配的每个设备增加计算开销。苹果的
    Game Kit 将设备间的点对点连接限制在最多四名玩家是有原因的。服务器硬件最终比连接到它的任何设备更强大，带宽也更高，这允许您在同一场比赛中容纳更多玩家。此外，服务器托管着数据库，并且通常会运行验证，以确保玩家没有篡改他们的应用或传入的数据流，以挫败作弊和利用漏洞的行为。


    - **Electrotanks 的 Electroserver** 是一种功能丰富的服务器技术，被全球专业人士使用。它价格不菲，但确实有一个免费版本，允许最多
    25 个并发用户连接到游戏服务器。如果这对您来说足够了，可以试试看：`www.electrotank.com`。

    - gotoAndPlay() 的 **SmartFoxServer** 紧随 Electroserver 之后。它的功能没有那么丰富，但在独立游戏开发者中非常受欢迎，主要是因为它有一个完全免费的
    Lite 版本，而 Basic 和 Pro 版本仍然允许最多 20 个用户免费使用。总的来说，其价格对于独立开发者来说更易于承受。请在产品页面上比较 SmartFoxServer
    的不同版本：`www.smartfoxserver.com/products`。

    - **Exit Games** 采取了双管齐下的方法，提供一个名为 Photon 的网络组件和一个名为 Neutron 的开发持久在线游戏的托管服务。Neutron
    原生支持回合制多人游戏的开发，并且可以挂起和恢复游戏会话。Photon 有一个免费版本，支持每个应用或服务器最多 50 个并发用户，而 Neutron 有一个免费试用版本。请在
    Exit Games 网站上比较功能和价格：`www.exitgames.com`。


    ## 推送通知提供商


    推送通知是那些会在您的 iPhone 屏幕上弹出的小型提醒消息，无论您是否正在使用它。一些应用使用它们来通知用户股票市场信息、正在进行的体育赛事事件，或者仅仅是让您知道有新的漫画连载可用。其用途是无穷的。推送通知最大的力量在于，它为您的用户提供了一个继续使用您应用的动力；如果他们让应用提醒自己新闻和事件，他们就不会那么轻易地忘记它。


    您可能听说过苹果的推送通知服务，但如果没有，您可以在苹果的《推送通知编程指南》中了解更多信息：`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/RemoteNotificationsPG/Introduction/Introduction.html`。


    推送通知允许应用向单个设备广播消息。如果您实现了某个社交网络平台，您将免费获得此功能，并且无需担心推送通知编程的复杂性。然而，在某些情况下，您可能需要实现自己的解决方案，为此您需要一个推送通知提供商。那是一个能够与苹果服务器和
    iOS 设备通信的服务器。您可以使用免费且开源的 `apns-sharp` 库（参见 `http://code.google.com/p/apns-sharp`）编写自己的服务器，或者注册
    Mono Push 服务 (`www.monopush.com`) 或 Urban Airship (`http://urbanairship.com`)。

