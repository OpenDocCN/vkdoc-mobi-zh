  trans: "\n#### 工具、工具、工具\n\n在本书中，我向你介绍了在我看来最适合各个用途的工具。不过，通常总有其他替代方案。如果你也读过本书的第一版，你会知道我在第一版中使用的工具与第二版不同。在不到一年的时间里，有些工具突飞猛进，而另一些则基本停止了发展并落后了。\n\
    \n由于这一近乎自然的过程在未来不会改变，而且很难预测未来几年哪些工具会留存下来，哪些不会，我想分享一份当前存在的、可用于`cocos2d`的工具的字母顺序列表，而不深入描述它们，也不考虑它们当前的状态，当然它们至少需要可用且功能正常。\n\
    \n以下工具可用于使用`cocos2d`开发：\n\n*   位图字体工具\n    *   BMFont（Windows）：`www.angelcode.com/products/bmfont`\n\
    \    *   Fonteditor：`http://code.google.com/p/fonteditor`\n    *   Glyph Designer：`http://glyphdesigner.71squared.com`\n\
    \    *   Hiero：`http://slick.cokeandcode.com/demos/hiero.jnlp`\n    *   LabelAtlasCreator：`www.cocos2d-iphone.org/forum/topic/4357`\n\
    *   粒子编辑工具\n    *   ParticleCreator：`www.cocos2d-iphone.org/forum/topic/16363`\n\
    \    *   Particle Designer：`http://particledesigner.71squared.com`\n*   物理编辑工具\n\
    \    *   Mekanimo：`www.mekanimo.net`\n    *   PhysicsBench：`www.cocos2d-iphone.org/forum/topic/9064`\n\
    \    *   PhysicsEditor：`www.physicseditor.de`\n    *   VertexHelper：`www.cocos2d-iphone.org/archives/779`\n\
    *   场景编辑工具\n    *   CocosBuilder：`http://cocosbuilder.com`\n    *   Cocoshop：`www.cocos2d-iphone.org/forum/topic/15668`\n\
    \    *   LevelHelper：`www.levelhelper.org`\n*   纹理图集工具\n    *   DarkFunction Editor：`http://darkfunction.com`\n\
    \    *   SpriteHelper：`www.spritehelper.org`\n    *   TexturePacker：`www.texturepacker.com`\n\
    \    *   Zwoptex：`zwoptexapp.com`\n*   瓦片地图编辑工具\n    *   iTileMaps（iPad）：`www.klemix.com/page/iTileMaps.aspx`\n\
    \    *   Tiled Map Editor：`www.mapeditor.org`\n\n#### Cocos2d 参考应用\n\n以下是用`cocos2d`制作的游戏和应用列表。它们应作为`cocos2d`能够实现的效果以及`cocos2d`开发者创造力的光辉范例。\n\
    \n我没有在书中为每个应用提供 iTunes 链接，而是决定在我的博客上发布一篇文章，其中汇集了此处提到的所有游戏的链接，并且我会更新这个列表，以包含本书出版后发布的有值得关注游戏。你可以在“用`cocos2d`制作的优秀应用”页面上找到这些应用的链接列表，包括其他感兴趣的链接：`www.learn-cocos2d.com/2010/10/great-apps-made-with-cocos2d`。\n\
    \n*   **The Elements**（iPad）是元素周期表的图形化表示。其突出特点是丰富的照片和流畅的 360 度动画，邀请你探索构成你、我以及宇宙其余部分（不包括空无一物的空间，我听说这样的空间很多）的元素。它价格不菲，但物有所值，如果你需要一个能让你炫耀新\
    \ iPad 的应用，就是它了！\n*   **Bloomies** 是一款色彩缤纷的园艺游戏，充满了蜜蜂（参见图 17–7）。如果这还不能打动你，也许培养和照料自己花园的想法会。花朵需要你的持续关注，游戏玩法令人上瘾，就像任何拓麻歌子风格的游戏一样。哦，而且它恰好是由我以前的两位同事制作的。它是一款精美的游戏，他们的后续作品《Super\
    \ Blast》也同样出色。\n\n![images](img/1707.jpg)\n\n**图 17–7.** *来自 Phantoom Entertainment\
    \ 的 Bloomies*\n\n*   **StickWars** 是一款你通过将入侵的火柴人弹到空中或 literally 将其震倒在地来保卫城堡的游戏。开发者\
    \ John Hartzog 之前从未接触过`Objective-C`或移动设备开发，但他成功做到了。`StickWars`至今仍保持在游戏排行榜前 100\
    \ 名，即使在首次发布一年后仍在持续更新。\n*   **ZombieSmash** 也是一款城堡防御游戏，只不过这次是成群的僵尸在进攻，你可以使用炸药、16\
    \ 吨重的砝码、霰弹枪和其他酷炫的玩意儿，制造出一片血腥混乱来击退它们（参见图 17–8）。你的城堡就是你的谷仓，如果你能守住它，你将看到一个慢动作动画，展示最后一个僵尸失去它的……呃，“不死生命”。这款游戏的突出特点无疑是其布娃娃动画系统，它允许僵尸即使失去了一些肢体，也能行走、爬行或以其他方式尝试移动。\n\
    \n![images](img/1708.jpg)\n\n**图 17–8.** *来自 GameDoctors 的 Zombie Smash*\n"
- fmt: "# Super Turbo Action Pig  \nrevives the simple game play concept of a scrolling\
    \ level where your character always falls down, except when you touch the screen\
    \ to boost his jetpack. The extraordinary part here is that the game’s graphics\
    \ are extremely well made and the overall presentation of the game, the trailer,\
    \ the web site, and the humor set a great example.\n\n# Farmville  \nDo I even\
    \ have to explain what it’s about? It’s an incredibly successful Facebook game\
    \ that has millions of players worldwide building their farms in an isometric\
    \ landscape. It just goes to show how powerful `cocos2d` is if a company like\
    \ Zynga uses it to port its most successful game to the iPhone. It’s notable that\
    \ Zombie Farm came out on the iPhone before Farmville, and it was also created\
    \ with `cocos2d`.\n\n# Melvin Says There’s Monsters (iPad)  \nis a beautifully\
    \ animated cartoon kid story with professional-quality voiceovers. The story is\
    \ cleverly constructed and has an insightful turning point. It’s a pleasure to\
    \ watch even for an adult, and it also uses `cocos2d`’s page-flip animations very\
    \ effectively. If you have an iPad and kids, it’s a must have!\n\n# Trainyard\
    \  \nis an innovative puzzle game that was clearly engineered with the user in\
    \ mind. It features a mode for the color-blind, is optimized to use little battery\
    \ power, saves and loads the game just as the user left it, and even allows users\
    \ to share puzzle solutions on the Web, using a duplicate of the game engine written\
    \ in Flash. This all besides being a really innovative puzzle game where you lay\
    \ tracks and combine trains to match them with colored train yards.\n\n# AbstractWar\
    \ 2.0  \nis a dual-stick shooter featuring colorful and vibrant geometric visuals\
    \ (see [Figure 17–9](#Chapter17.html#fig_17_9)). It’s obviously inspired by Geometry\
    \ Wars on Xbox Live Arcade. It’s an intense space-shooter with plenty of game\
    \ modes. You can even play it in multiplayer mode via a Bluetooth connection,\
    \ and it allows you to use your own iPod music.\n\n![images](images/1709.jpg)\n\
    \n**Figure 17–9.** *Abstract War 2.0 by Forzefield Studios SL*\n\n# Fuji Leaves\
    \  \nis an interesting music game, where dropping balls hit leaves, and depending\
    \ on speed and location of impact, a sound is played. With several balls on the\
    \ screen bouncing around, you can dynamically create musical scores. It’s intensely\
    \ fascinating to play this game, trying to come up with interesting scores and\
    \ just the right placement of leaves. Before you know it, an hour has passed.\n\
    \n## The Business of Making Games\n\nThis section covers social gaming, ads, and\
    \ In App Purchases, basically, the business of making games. In this case, the\
    \ focus isn’t on technology; in this section, I’ll talk about my experience as\
    \ a professional and independent game developer and what it takes to make successful\
    \ games. At least the tips provided in this section will improve your odds to\
    \ make a more successful game with the right people, and you’ll learn how to market\
    \ the game to your target audience.\n\n### Working with Publishers\n\nIn the early\
    \ days of computer programming, developers single-handedly copied their game code\
    \ onto floppy disks and shrink-wrapped it to sell it in local software and hardware\
    \ stores. Those days are long gone, and with the increasing complexity of games,\
    \ publishers took on the task of distributing and marketing games. This model\
    \ has been the default for the past 20 years or so, but with the advent of the\
    \ indie game scene in recent years, mostly driven by new technologies such as\
    \ downloadable games, the Xbox Live Indie Games channel, and Apple’s App Store,\
    \ more and more game developers are turning to self-publishing again. So, why\
    \ would you want to work with a publisher these days?\n\nThe first aspect is technical\
    \ support and testing. Publishers want to make sure that every game they release\
