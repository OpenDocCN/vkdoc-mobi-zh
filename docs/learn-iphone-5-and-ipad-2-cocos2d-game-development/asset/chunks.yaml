    This short refactoring session adds much-needed flexibility to shooting bullets.
    I''m sure you can imagine how enemies can now use the very same code to shoot
    their own bullets.


    ### What About Enemies?


    At this point, there''s only a fuzzy idea about what the enemies are, what they
    do, and what their behavior will be. That''s the thing with enemies—you never
    quite know what they''re up to.


    In the case of games, that means going back to the drawing board, planning out
    what you want the enemies to do, and then deducing from that plan what you need
    to program. Contrary to real life, you have full control over the enemies. Doesn''t
    that make you feel powerful? But before you or anyone can have fun, you need to
    come up with a plan for world domination.


    I already created the graphics for three different types of enemies. At this point,
    I know only that at least one of them is supposed to be a boss monster. Take a
    look at [Figure 8–1](#Chapter08.html#fig_8_1) and try to imagine what these enemies
    could be up to.


    ![images](images/0801.jpg)


    **Figure 8–1.** *The graphics used as the game''s enemy characters*


    Before you start programming, you should have a good understanding of which behaviors
    the enemies will have in common so that you program those parts only once. Eliminating
    code duplication is the single most important goal of clean code design.


    Let''s see what we know for sure is common to all enemies:


    *   Shoots bullets

    *   Has logic that determines when and where to shoot what bullet

    *   Can be hit by player''s bullets

    *   Cannot be hit by other enemy''s bullets

    *   Can take one or more hits (has health)

    *   Has a specific behavior and movement pattern

    *   Has a specific behavior or animation when destroyed

    *   Will appear outside the screen area and move inside

    *   Will not leave the screen area once inside


    When you look at that list, you may notice that some of these attributes also
    apply to the player''s ship. It certainly can shoot bullets, we may want it to
    sustain multiple hits, and it should have a specific behavior or animation when
    destroyed. It makes sense to consider the player''s ship as just a special type
    of enemy and take it into consideration as well.


    Looking at this feature set, I see three possible approaches. I could create one
    class that contains all the code for the ship, the enemies, and the boss monster.
    Certain parts of the code would run conditionally, depending on the type of enemy.
    For example, the shooting code may have different code paths for each type of
    game object. With a limited number of different objects, this approach works reasonably
    well—but it doesn''t scale. As you add more and more types of game objects, you
    end up with a bigger and fatter class containing all of the game logic code. Any
    change to any part of that class has the potential to cause undesirable side effects
    in enemies'' or even the player ship''s behavior. Determining which code path
    to execute depending on a type variable is quite reminiscent of pure C programming
    and doesn''t make use of the object-oriented nature of the Objective-C programming
    language. But if used judiciously, it''s a very powerful concept even today.


    The second approach is to create a class hierarchy with the `Entity` class as
    the base class and then derive a ship, two monsters, and a boss monster class
    from it. This is what a lot of programmers actually do, and it also works reasonably
    well for a small number of game objects. But in essence, it''s little different
    from the first approach, in that common code often ends up piling up in the base
    `Entity` class when it is needed by some of the subclasses, but not all of them.
    It takes a turn for the worse as soon as that code in the `Entity` class starts
    to add switches based on the type of the enemy, to skip parts of the code or execute
    code paths specific to that type of enemy. That''s the same problem of the first
    C-style programming approach. With a little care, you can make sure the code specific
    to an enemy is part of that enemy''s class, but it''s all too easy to end up making
    most changes in the `Entity` class itself.


    The third option is to use a component system. This means that individual code
    paths are separated from the `Entity` class hierarchy and only added to the subclasses
    that need the components, such as a healthbar component. Since component-based
    development would justify a book on its own and is likely to be overkill for a
    small project like this shoot-''em-up game, I''ll use a mixture of the class hierarchy
    approach and component design to at least give you an idea how compositing game
    objects out of individual parts works in principle and what the benefits are.


    I do want to point out that there is no one best approach to code design. Certain
    choices are entirely subjective and depend on personal preferences and experience.
    Working code is often preferable to clean code if you''re willing to refactor
    your codebase often as you learn more about the game you''re making. Experience
    allows you to make more of these decisions up front in the planning stage, enabling
    you to create more complex games faster. So if that''s your goal, start by making
    and completing smaller games, and slowly push yourself to new limits and new challenges.
    It''s a learning process, and unfortunately the easiest way to kill your motivation
    is to be over-ambitious. There''s a reason why every seasoned game programmer
    will tell a beginner to start simple and to re-create classic arcade games like
    Tetris, Pac-Man, or Asteroids first.


    ### The Entity Class Hierarchy


    For the base class, I created the `Entity` class in the ShootEmUp02 project. `Entity`
    is a generic class derived from `CCSprite`, which contains only the `setPosition`
    code of the `Ship` class to keep all instances of `Entity` inside the screen.
    I made just a small improvement to this code so that objects outside the screen
    area are allowed to move inside, but once inside, they can no longer leave the
    screen area. In this shoot-''em-up example game, the enemies won''t pass by you;
    they''ll stop mid-screen in order to illustrate the `EnemyCache`, introduced shortly.
    The screen area check simply checks whether the screen rectangle fully contains
    the sprite''s `boundingBox`, and only if that''s the case will the code to keep
    the sprite inside the screen rectangle run:


    `-(void) setPosition:(CGPoint)pos`

    `{`

    `    // If the current position is outside the screen no adjustments should be
    made!`

    `    // This allows entities to move into the screen from outside.`

    `    if ([self isOutsideScreenArea])`

    `    {`

    `        …`

    `    }`


    `    [super setPosition:pos];`

    `}`


    The function `isOutsideScreenArea` is implemented as follows:


    `-(BOOL) isOutsideScreenArea`

    `{`

    `    return (CGRectContainsRect([GameScene screenRect], [self boundingBox]));`

    `}`


    The `Ship` class has been replaced with `ShipEntity`. Since the `Entity` base
    class now contains the `setPosition` code, the only thing left in `ShipEntity`
    is the `initWithShipImage` method. It''s the same as before, so I won''t re-create
    it here.'
  trans: "\n// 在射击前设置位置、速度和精灵帧\n`CGPoint shotPos = CGPointMake(ship.position.x + 45,\
    \ ship.position.y – 19);`\n\n`float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;`\n\
    `CGPoint velocity = CGPointMake(200, spread * 50);`\n`[bulletCache shootBulletAt:shotPos\
    \ velocity:velocity frameName:@\"bullet.png\"];`\n\n这次简短的重构为子弹射击增添了亟需的灵活性。相信你可以想象敌人现在也能使用完全相同的代码来发射子弹。\n\
    \n## 敌人又该如何？\n\n目前，我们对敌人的形象、行为以及行动模式只有一个模糊的概念。敌人就是如此——你永远不知道它们要耍什么花样。\n\n就游戏而言，这意味着要回到绘图板，规划好你期望敌人执行的动作，然后根据这个规划推导出需要编程实现的内容。与现实生活相反，你对敌人拥有完全的控制权。这难道不让你感到强大吗？但在你或任何人能享受乐趣之前，你需要制定一个征服世界的计划。\n\
    \n我已经为三种不同类型的敌人创建了图形资源。目前我只知道其中至少有一个是 Boss 级怪物。请看图 8-1，试着想象这些敌人可能会做些什么。\n\n![images](img/0801.jpg)\n\
    \n**图 8-1.** *用作游戏敌方角色的图形资源*\n\n在开始编程之前，你应该充分了解敌人有哪些共同行为，这样只需编写一次通用代码。消除代码重复是整洁代码设计的唯一最重要目标。\n\
    \n让我们看看已知的所有敌人的共同点：\n\n-   发射子弹\n-   拥有决定何时、何地、发射何种子弹的逻辑\n-   可被玩家子弹击中\n-   不能被其他敌人子弹击中\n\
    -   可以承受一次或多次攻击（拥有生命值）\n-   拥有特定的行为和移动模式\n-   被摧毁时有特定的行为或动画\n-   会从屏幕外区域出现并移入屏幕内\n\
    -   一旦进入屏幕就不会离开屏幕区域\n\n查看这个列表时，你可能会注意到其中一些属性也适用于玩家的飞船。它当然可以发射子弹，我们希望它能承受多次攻击，并且被摧毁时应有特定的行为或动画。将玩家的飞船视为一种特殊类型的敌人，并将其纳入考量，是合理的。\n\
    \n审视这些功能集，我看到了三种可能的实现方法。我可以创建一个类，包含飞船、敌人和 Boss 怪物的所有代码。代码的某些部分将根据敌人的类型有条件地执行。例如，射击代码可能为每种游戏对象类型提供不同的代码路径。对于数量有限的不同对象，这种方法效果还算不错——但它不具备可扩展性。随着游戏对象类型不断增加，你最终会得到一个包含所有游戏逻辑代码、日益臃肿的类。对该类任何部分的修改，都可能对敌人甚至玩家飞船的行为产生不良副作用。根据类型变量决定执行哪个代码路径，非常类似于纯粹的\
    \ C 语言编程，没有利用 Objective-C 编程语言的面向对象特性。但如果谨慎使用，即使在今天，这依然是一个非常强大的概念。\n\n第二种方法是创建一个类层次结构，以`Entity`类作为基类，然后从中派生出飞船、两种怪物和一个\
    \ Boss 怪物类。这是许多程序员实际采用的做法，对于少量游戏对象来说，效果也不错。但本质上，它与第一种方法差别不大，因为当某些（而非全部）子类需要通用代码时，这些代码最终往往会堆积在基类`Entity`中。一旦`Entity`类中的代码开始根据敌人类型添加开关，以跳过部分代码或执行特定于该敌人类型的代码路径，情况就会变得更糟。这与第一种\
    \ C 风格编程方法的问题相同。稍加注意，你可以确保特定于敌人的代码归属于该敌人的类，但最终在`Entity`类本身进行大部分修改，是极其容易发生的情况。\n\
    \n第三种选择是使用组件系统。这意味着将各个代码路径从`Entity`类层次结构中分离出来，只添加到需要这些组件的子类中，例如生命条组件。由于基于组件的开发本身就值得写一本书，而且对于像这个射击类这样的小项目来说可能过于复杂，我将混合使用类层次结构方法和组件设计，至少让你了解如何从各个部件组合成游戏对象，以及这样做的好处。\n\
    \n我想指出的是，没有唯一最佳的代码设计方法。某些选择完全是主观的，取决于个人偏好和经验。如果你愿意在了解所开发游戏的过程中经常重构代码库，那么能运行的代码通常比整洁的代码更可取。经验让你能够在规划阶段预先做出更多此类决策，从而更快地创建更复杂的游戏。因此，如果这是你的目标，请从制作并完成小型游戏开始，逐步将自己推向新的极限和新的挑战。这是一个学习过程，不幸的是，最容易被消磨动力的事情就是过于雄心勃勃。所有经验丰富的游戏程序员都会告诉新手从简单做起，先重现《俄罗斯方块》、《吃豆人》或《爆破彗星》等经典街机游戏，这是有原因的。\n\
    \n## Entity 类层次结构\n\n对于基类，我在`ShootEmUp02`项目中创建了`Entity`类。`Entity`是一个从`CCSprite`派生的通用类，仅包含`Ship`类的`setPosition`代码，以将所有`Entity`实例限制在屏幕内。我对这段代码做了一个小改进，允许屏幕外的对象移入屏幕内，但一旦进入屏幕，就无法再离开屏幕区域。在这个射击示例游戏中，敌人不会从你身边掠过；它们会停在屏幕中间，以便接下来介绍`EnemyCache`。屏幕区域检查只是简单地检查屏幕矩形是否完全包含精灵的`boundingBox`，只有满足该条件时，才会运行将精灵保持在屏幕矩形内的代码：\n\
    \n```\n-(void) setPosition:(CGPoint)pos\n{\n    // 如果当前位置在屏幕外，则无需调整！\n    // 这允许实体从屏幕外移入屏幕内。\n\
    \    if ([self isOutsideScreenArea])\n    {\n        …\n    }\n\n    [super setPosition:pos];\n\
    }\n```\n\n函数`isOutsideScreenArea`实现如下：\n\n```\n-(BOOL) isOutsideScreenArea\n{\n\
    \    return (CGRectContainsRect([GameScene screenRect], [self boundingBox]));\n\
    }\n```\n\n`Ship`类已被替换为`ShipEntity`。由于`Entity`基类现在包含了`setPosition`代码，`ShipEntity`中唯一剩下的就是`initWithShipImage`方法。这与之前相同，因此此处不再重复。\n"
- fmt: "#### The `EnemyEntity` Class\n\nI do need to go more in depth with the `EnemyEntity`\
    \ class and what it does, starting with the header file in [Listing 8–3](#Chapter08.html#list_8_3).\n\
    \n**Listing 8–3.** *The @interface of the EnemyEntity Class*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Entity.h\"\n\ntypedef enum\n{\n    EnemyTypeUFO = 0,\n    EnemyTypeCruiser,\n\
    \    EnemyTypeBoss,\n\n    EnemyType_MAX,\n} EnemyTypes;\n\n@interface EnemyEntity\
    \ : Entity\n{\n    EnemyTypes type;\n}\n\n+(id) enemyWithType:(EnemyTypes)enemyType;\n\
    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;\n-(void) spawn;\n\
    @end\n```\n\nThere is nothing too exciting here. The `EnemyTypes` enum is used\
    \ to differentiate between the three different types of enemies currently supported,\
    \ with `EnemyType_MAX` used as the upper limit for loops, as you'll see soon.\
    \ The `EnemyEntity` class has a member variable that stores the type, so that\
    \ I can use `switch` statements to branch the code depending on the type of enemy\
    \ as needed.\n\nThe implementation of `EnemyEntity` contains a lot of code I'd\
    \ like to discuss, so I'll split the discussion into several topics and present\
    \ only the relevant code, beginning with the `initWithType` method in [Listing\
    \ 8–4](#Chapter08.html#list_8_4).\n\n**Listing 8–4.** *Initializing an Enemy with\
    \ a Type*\n\n```\n-(id) initWithType:(EnemyTypes)enemyType\n{\n    type = enemyType;\n\
    \n    NSString* enemyFrameName;\n    NSString* bulletFrameName;\n    float shootFrequency\
    \ = 6.0f;\n    switch (type)\n    {\n        case EnemyTypeUFO:\n            enemyFrameName\
    \ = @\"monster-a.png\";\n            bulletFrameName = @\"shot-a.png\";\n    \
    \        break;\n        case EnemyTypeCruiser:\n            enemyFrameName =\
    \ @\"monster-b.png\";\n            bulletFrameName = @\"shot-b.png\";\n      \
    \      shootFrequency = 1.0f;\n            break;\n        case EnemyTypeBoss:\n\
    \            enemyFrameName = @\"monster-c.png\";\n            bulletFrameName\
    \ = @\"shot-c.png\";\n            shootFrequency = 2.0f;\n            break;\n\
    \n        default:\n            [NSException exceptionWithName:@\"EnemyEntity\
    \ Exception\"\n                                    reason:@\"unhandled enemy type\"\
    \n                                  userInfo:nil];\n    }\n\n    if ((self = [super\
    \ initWithSpriteFrameName:enemyFrameName]))\n    {\n        // Create the game\
    \ logic components\n        [self addChild:[StandardMoveComponent node]];\n\n\
    \        StandardShootComponent* shootComponent = [StandardShootComponent node];\n\
    \        shootComponent.shootFrequency = shootFrequency;\n        shootComponent.bulletFrameName\
    \ = bulletFrameName;\n        [self addChild:shootComponent];\n\n        // enemies\
    \ start invisible\n        self.visible = NO;\n\n        [self initSpawnFrequency];\n\
    \    }\n\n    return self;\n}\n```\n\nThe code begins by setting variables, depending\
    \ on the enemy type, using a `switch` statement to provide default values for\
    \ each type of enemy—the sprite frame name to use, the name of the bullet sprite\
    \ frame, and the shooting frequency. The default case of the `switch` statement\
    \ throws an exception because that option usually results from adding a new enemy\
    \ type to the `EnemyTypes` enum without extending this `switch` statement accordingly.\
    \ Safeguarding your `switch` statements in this way so that no default case will\
    \ be accepted is a good strategy to avoid spending too much debugging time on\
    \ simple human errors. And you are a human being, right? So, you're prone to forget\
    \ these things. I know I am. Instead of wondering why your new enemy doesn't move\
    \ or it shoots the wrong bullets, you'll get a crash that waves a big red flag\
    \ saying, “Hey, you forgot to update me!”\n\nIt's also perfectly fine to run code\
    \ before the assignment to `self`, as long as you don't forget to call a `[super\
    \ init…]` method eventually. Otherwise, the superclass won't be properly initialized,\
    \ and that can lead to strange bugs and crashes.\n\nThe component classes created\
    \ and added to `EnemyEntity` contain exchangeable code. I'll get to components\
    \ soon; for the moment, just know that the `StandardMoveComponent` allows the\
    \ enemy to move while the `StandardShootComponent` allows it to, you guessed it,\
    \ shoot.\n\nLet's focus our attention now on the `initSpawnFrequency` method.\
    \ The relevant code is shown in [Listing 8–5](#Chapter08.html#list_8_5).\n\n**Listing\
    \ 8–5.** *Controlling the Spawning of Enemies*\n\n```\nstatic CCArray* spawnFrequency;\n\
    \n-(void) initSpawnFrequency\n{\n    // initialize how frequently the enemies\
    \ will spawn\n    if (spawnFrequency == nil)\n    {\n        spawnFrequency =\
    \ [[CCArray alloc] initWithCapacity:EnemyType_MAX];\n        [spawnFrequency insertObject:[NSNumber\
    \ numberWithInt:80]\n                                                     atIndex:EnemyTypeUFO];\n\
    \        [spawnFrequency insertObject:[NSNumber numberWithInt:260]\n         \
    \                                            atIndex:EnemyTypeCruiser];\n    \
    \    [spawnFrequency insertObject:[NSNumber numberWithInt:1500]\n            \
    \                                         atIndex:EnemyTypeBoss];\n\n        //\
    \ spawn one enemy immediately\n        [self spawn];\n    }\n}\n\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n\
    {\n    NSAssert(enemyType < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber*\
    \ number = [spawnFrequency objectAtIndex:enemyType];\n    return [number intValue];\n\
    }\n\n-(void) dealloc\n{\n    [spawnFrequency release];\n    spawnFrequency = nil;\n\
    \n    [super dealloc];\n}\n```\n\nWe store the spawn frequency values for each\
    \ type of enemy in a static `spawnFrequency` `CCArray`. It's a static variable\
    \ because the spawn frequency isn't needed for each enemy but only for each enemy\
    \ type. The first `EnemyEntity` instance that executes the `initSpawnFrequency`\
    \ method will find that the `spawnFrequency` `CCArray` is `nil` and so initializes\
    \ it.\n\nSince a `CCArray` can store only objects and not primitive data types\
    \ like integers, the values have to be wrapped into an `NSNumber` class using\
    \ the `numberWithInt` initializer. I chose to use `insertObject` here instead\
    \ of `addObject` because it not only ensures that the values will have the same\
    \ index as the enemy type defined in the `enum`, but it also tells any other programmer\
    \ looking at this code that the index used has a meaning. In this case, the index\
    \ is synonymous with the enemy type. Although it's technically unnecessary to\
    \ specify the index here, it helps to show which value is used for which enemy\
    \ type.\n\nOf course, the `dealloc` method releases the `spawnFrequency` `CCArray`,\
    \ and it also sets it to `nil`, which is very important. Being a static variable,\
    \ the first `EnemyEntity` object to run its `dealloc` method will release the\
    \ `spawnFrequency`'s memory. If it wasn't set to `nil` immediately thereafter,\
    \ the next `EnemyEntity` running its `dealloc` method would try the same and thus\
    \ over-release the `spawnFrequency` `CCArray`, leading to a crash. On the other\
    \ hand, if the `spawnFrequency` variable is `nil`, any message sent to it, like\
    \ the release message, will simply be ignored. I said it before, but it can't\
    \ be repeated often enough: sending messages to `nil` objects is perfectly fine\
    \ in Objective-C; the message will simply be ignored.\n\nSpawning an entity is\
    \ done by the `spawn` method:\n\n```\n-(void) spawn\n{\n    // Select a spawn\
    \ location just outside the right side of the screen\n    CGRect screenRect =\
    \ [GameScene screenRect];\n    CGSize spriteSize = [self contentSize];\n    float\
    \ xPos = screenRect.size.width + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1()\
    \ * (screenRect.size.height - spriteSize.height) +![images](images/U002.jpg)\n\
    \        spriteSize.height * 0.5f;\n    self.position = CGPointMake(xPos, yPos);\n\
    \n    // Finally set yourself to be visible, this also flag the enemy as \"in\
    \ use\"\n    self.visible = YES;\n}\n```"
  raw: '#### The EnemyEntity Class


    I do need to go more in depth with the `EnemyEntity` class and what it does, starting
    with the header file in [Listing 8–3](#Chapter08.html#list_8_3).


    **Listing 8–3.** *The @interface of the EnemyEntity Class*


    `#import <Foundation/Foundation.h>`

    `#import "Entity.h"`


    `typedef enum`

    `{`

    `    EnemyTypeUFO = 0,`

    `    EnemyTypeCruiser,`

    `    EnemyTypeBoss,`


    `    EnemyType_MAX,`

    `} EnemyTypes;`


    `@interface EnemyEntity : Entity`

    `{`

    `    EnemyTypes type;`

    `}`


    `+(id) enemyWithType:(EnemyTypes)enemyType;`

    `+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;`

    `-(void) spawn;`

    `@end`


    There is nothing too exciting here. The `EnemyTypesenum` is used to differentiate
    between the three different types of enemies currently supported, with `EnemyType_MAX`
    used as the upper limit for loops, as you''ll see soon. The `EnemyEntity` class
    has a member variable that stores the type, so that I can use `switch` statements
    to branch the code depending on the type of enemy as needed.


    The implementation of `EnemyEntity` contains a lot of code I''d like to discuss,
    so I''ll split the discussion into several topics and present only the relevant
    code, beginning with the `initWithType` method in [Listing 8–4](#Chapter08.html#list_8_4).


    **Listing 8–4.** *Initializing an Enemy with a Type*


    `-(id) initWithType:(EnemyTypes)enemyType`

    `{`

    `    type = enemyType;`


    `    NSString* enemyFrameName;`

    `    NSString* bulletFrameName;`

    `    float shootFrequency = 6.0f;`

    `    switch (type)`

    `    {`

    `        case EnemyTypeUFO:`

    `            enemyFrameName = @"monster-a.png";`

    `            bulletFrameName = @"shot-a.png";`

    `            break;`

    `        case EnemyTypeCruiser:`

    `            enemyFrameName = @"monster-b.png";`

    `            bulletFrameName = @"shot-b.png";`

    `            shootFrequency = 1.0f;`

    `            break;`

    `        case EnemyTypeBoss:`

    `            enemyFrameName = @"monster-c.png";`

    `            bulletFrameName = @"shot-c.png";`

    `            shootFrequency = 2.0f;`

    `            break;`


    `        default:`

    `            [NSException exceptionWithName:@"EnemyEntity Exception"`

    `                                    reason:@"unhandled enemy type"`

    `                                  userInfo:nil];`

    `    }`


    `    if ((self = [super initWithSpriteFrameName:enemyFrameName]))`

    `    {`

    `        // Create the game logic components`

    `        [self addChild:[StandardMoveComponent node]];`


    `        StandardShootComponent* shootComponent = [StandardShootComponent node];`

    `        shootComponent.shootFrequency = shootFrequency;`

    `        shootComponent.bulletFrameName = bulletFrameName;`

    `        [self addChild:shootComponent];`


    `        // enemies start invisible`

    `        self.visible = NO;`


    `        [self initSpawnFrequency];`

    `    }`


    `    return self;`

    `}`


    The code begins by setting variables, depending on the enemy type, using a `switch`
    statement to provide default values for each type of enemy—the sprite frame name
    to use, the name of the bullet sprite frame, and the shooting frequency. The default
    case of the `switch` statement throws an exception because that option usually
    results from adding a new enemy type to the `EnemyTypesenum` without extending
    this `switch` statement accordingly. Safeguarding your `switch` statements in
    this way so that no default case will be accepted is a good strategy to avoid
    spending too much debugging time on simple human errors. And you are a human being,
    right? So, you''re prone to forget these things. I know I am. Instead of wondering
    why your new enemy doesn''t move or it shoots the wrong bullets, you''ll get a
    crash that waves a big red flag saying, “Hey, you forgot to update me!”


    It''s also perfectly fine to run code before the assignment to `self`, as long
    as you don''t forget to call a `[super init…]` method eventually. Otherwise, the
    superclass won''t be properly initialized, and that can lead to strange bugs and
    crashes.


    The component classes created and added to `EnemyEntity` contain exchangeable
    code. I''ll get to components soon; for the moment, just know that the `StandardMoveComponent`
    allows the enemy to move while the `StandardShootComponent` allows it to, you
    guessed it, shoot.


    Let''s focus our attention now on the `initSpawnFrequency` method. The relevant
    code is shown in [Listing 8–5](#Chapter08.html#list_8_5).


    **Listing 8–5.** *Controlling the Spawning of Enemies*


    `static CCArray* spawnFrequency;`


    `-(void) initSpawnFrequency`

    `{`

    `    // initialize how frequently the enemies will spawn`

    `    if (spawnFrequency == nil)`

    `    {`

    `        spawnFrequency = [[CCArray alloc] initWithCapacity:EnemyType_MAX];`

    `        [spawnFrequency insertObject:[NSNumber numberWithInt:80]`

    `                                                     atIndex:EnemyTypeUFO];`

    `        [spawnFrequency insertObject:[NSNumber numberWithInt:260]`

    `                                                     atIndex:EnemyTypeCruiser];`

    `        [spawnFrequency insertObject:[NSNumber numberWithInt:1500]`

    `                                                     atIndex:EnemyTypeBoss];`


    `        // spawn one enemy immediately`

    `        [self spawn];`

    `    }`

    `}`


    `+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType`

    `{`

    `    NSAssert(enemyType < EnemyType_MAX, @"invalid enemy type");`

    `    NSNumber* number = [spawnFrequency objectAtIndex:enemyType];`

    `    return [number intValue];`

    `}`


    `-(void) dealloc`

    `{`

    `    [spawnFrequency release];`

    `    spawnFrequency = nil;`


    `    [super dealloc];`

    `}`


    We store the spawn frequency values for each type of enemy in a static `spawnFrequencyCCArray`.
    It''s a static variable because the spawn frequency isn''t needed for each enemy
    but only for each enemy type. The first `EnemyEntity` instance that executes the
    `initSpawnFrequency` method will find that the `spawnFrequencyCCArray` is `nil`
    and so initializes it.


    Since a `CCArray` can storeonly objects and not primitive data types like integers,
    the values have to be wrapped into an `NSNumber` class using the `numberWithInt`
    initializer. I chose to use `insertObject` here instead of `addObject` because
    it not only ensures that the values will have the same index as the enemy type
    defined in the `enum`, but it also tells any other programmer looking at this
    code that the index used has a meaning. In this case, the index is synonymous
    with the enemy type. Although it''s technically unnecessary to specify the index
    here, it helps to show which value is used for which enemy type.


    Of course, the `dealloc` method releases the `spawnFrequencyCCArray`, and it also
    sets it to `nil`, which is very important. Being a static variable, the first
    `EnemyEntity` object to run its `dealloc` method will release the `spawnFrequency`''s
    memory. If it wasn''t set to `nil` immediately thereafter, the next `EnemyEntity`
    running its `dealloc` method would try the same and thus over-release the `spawnFrequencyCCArray`,
    leading to a crash. On the other hand, if the `spawnFrequency` variable is `nil`,
    any message sent to it, like the release message, will simply be ignored. I said
    it before, but it can''t be repeated often enough: sending messages to `nil` objects
    is perfectly fine in Objective-C; the message will simply be ignored.


    Spawning an entity is done by the `spawn` method:


    `-(void) spawn`

    `{`

    `    // Select a spawn location just outside the right side of the screen`

    `    CGRect screenRect = [GameScene screenRect];`

    `    CGSize spriteSize = [self contentSize];`

    `    float xPos = screenRect.size.width + spriteSize.width * 0.5f;`

    `    float yPos = CCRANDOM_0_1() * (screenRect.size.height - spriteSize.height)
    +`![images](images/U002.jpg)

    `        spriteSize.height * 0.5f;`

    `    self.position = CGPointMake(xPos, yPos);`


    `    // Finally set yourself to be visible, this also flag the enemy as "in use"`

    `    self.visible = YES;`

    `}`'
  trans: "\n#### `EnemyEntity` 类\n\n我确实需要更深入地讲解`EnemyEntity`类及其功能，首先从代码清单 8-3 中的头文件开始。\n\
    \n**代码清单 8-3.** *`EnemyEntity`类的@interface*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"Entity.h\"\n\ntypedef enum\n{\n    EnemyTypeUFO = 0,\n    EnemyTypeCruiser,\n\
    \    EnemyTypeBoss,\n\n    EnemyType_MAX,\n} EnemyTypes;\n\n@interface EnemyEntity\
    \ : Entity\n{\n    EnemyTypes type;\n}\n\n+(id) enemyWithType:(EnemyTypes)enemyType;\n\
    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType;\n-(void) spawn;\n\
    @end\n```\n\n这里没什么特别之处。`EnemyTypes`枚举用于区分当前支持的三种不同类型敌人，其中`EnemyType_MAX`用作循环的上限（你很快就会看到）。`EnemyEntity`类有一个存储类型的成员变量，这样我就可以使用`switch`语句根据需要根据敌人类型来分支代码。\n\
    \n`EnemyEntity`的实现包含很多需要讨论的代码，因此我将把讨论分成几个主题，仅展示相关代码，首先从代码清单 8-4 中的`initWithType`方法开始。\n\
    \n**代码清单 8-4.** *用类型初始化敌人*\n\n```\n-(id) initWithType:(EnemyTypes)enemyType\n\
    {\n    type = enemyType;\n\n    NSString* enemyFrameName;\n    NSString* bulletFrameName;\n\
    \    float shootFrequency = 6.0f;\n    switch (type)\n    {\n        case EnemyTypeUFO:\n\
    \            enemyFrameName = @\"monster-a.png\";\n            bulletFrameName\
    \ = @\"shot-a.png\";\n            break;\n        case EnemyTypeCruiser:\n   \
    \         enemyFrameName = @\"monster-b.png\";\n            bulletFrameName =\
    \ @\"shot-b.png\";\n            shootFrequency = 1.0f;\n            break;\n \
    \       case EnemyTypeBoss:\n            enemyFrameName = @\"monster-c.png\";\n\
    \            bulletFrameName = @\"shot-c.png\";\n            shootFrequency =\
    \ 2.0f;\n            break;\n\n        default:\n            [NSException exceptionWithName:@\"\
    EnemyEntity Exception\"\n                                    reason:@\"unhandled\
    \ enemy type\"\n                                  userInfo:nil];\n    }\n\n  \
    \  if ((self = [super initWithSpriteFrameName:enemyFrameName]))\n    {\n     \
    \   // 创建游戏逻辑组件\n        [self addChild:[StandardMoveComponent node]];\n\n   \
    \     StandardShootComponent* shootComponent = [StandardShootComponent node];\n\
    \        shootComponent.shootFrequency = shootFrequency;\n        shootComponent.bulletFrameName\
    \ = bulletFrameName;\n        [self addChild:shootComponent];\n\n        // 敌人初始化为不可见\n\
    \        self.visible = NO;\n\n        [self initSpawnFrequency];\n    }\n\n \
    \   return self;\n}\n```\n\n代码首先通过`switch`语句根据敌人类型设置变量，为每种敌人类型提供默认值——要使用的精灵帧名称、子弹精灵帧名称以及射击频率。`switch`语句的默认情况会抛出异常，因为这种情况通常是由于在`EnemyTypes`枚举中添加了新敌人类型，却没有相应扩展此`switch`语句导致的。以这种方式保护你的`switch`语句，不接受任何默认情况，是一个避免因简单的人为错误而花费过多调试时间的好策略。而且你也是人，对吧？所以你容易忘记这些事。我知道我自己就是。与其纳闷为什么新敌人不移动或发射错误的子弹，你会得到一个崩溃，它挥舞着一面大红旗子说：“嘿，你忘记更新我了！”\n\
    \n在赋值给`self`之前运行代码也是完全可以的，只要最终没有忘记调用`[super init…]`方法即可。否则，父类将无法正确初始化，这可能导致奇怪的错误和崩溃。\n\
    \n创建并添加到`EnemyEntity`中的组件类包含可替换的代码。我很快就会讲到组件；目前只需知道`StandardMoveComponent`允许敌人移动，而`StandardShootComponent`允许它——你猜对了——射击。\n\
    \n现在让我们把注意力集中在`initSpawnFrequency`方法上。相关代码如代码清单 8-5 所示。\n\n**代码清单 8-5.** *控制敌人的生成*\n\
    \n```\nstatic CCArray* spawnFrequency;\n\n-(void) initSpawnFrequency\n{\n    //\
    \ 初始化敌人的生成频率\n    if (spawnFrequency == nil)\n    {\n        spawnFrequency =\
    \ [[CCArray alloc] initWithCapacity:EnemyType_MAX];\n        [spawnFrequency insertObject:[NSNumber\
    \ numberWithInt:80]\n                                                     atIndex:EnemyTypeUFO];\n\
    \        [spawnFrequency insertObject:[NSNumber numberWithInt:260]\n         \
    \                                            atIndex:EnemyTypeCruiser];\n    \
    \    [spawnFrequency insertObject:[NSNumber numberWithInt:1500]\n            \
    \                                         atIndex:EnemyTypeBoss];\n\n        //\
    \ 立即生成一个敌人\n        [self spawn];\n    }\n}\n\n+(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n\
    {\n    NSAssert(enemyType < EnemyType_MAX, @\"invalid enemy type\");\n    NSNumber*\
    \ number = [spawnFrequency objectAtIndex:enemyType];\n    return [number intValue];\n\
    }\n\n-(void) dealloc\n{\n    [spawnFrequency release];\n    spawnFrequency = nil;\n\
    \n    [super dealloc];\n}\n```\n\n我们将每种敌人类型的生成频率值存储在一个静态的`spawnFrequency` `CCArray`中。它是一个静态变量，因为生成频率不是每个敌人需要的，而是每种敌人类型需要的。第一个执行`initSpawnFrequency`方法的`EnemyEntity`实例会发现`spawnFrequency`\
    \ `CCArray`为`nil`，因此会初始化它。\n\n由于`CCArray`只能存储对象，而不能存储整数这样的原始数据类型，因此必须使用`numberWithInt`初始化器将这些值封装到`NSNumber`类中。我选择在这里使用`insertObject`而不是`addObject`，不仅因为它能确保这些值的索引与`enum`中定义的敌人类型相同，还因为它能告诉任何查看这段代码的其他程序员，所使用的索引是有意义的。在这种情况下，索引与敌人类型是同义词。虽然从技术上讲，在这里指定索引并非必要，但它有助于说明哪个值用于哪种敌人类型。\n\
    \n当然，`dealloc`方法会释放`spawnFrequency` `CCArray`，并将其设置为`nil`，这一点非常重要。作为一个静态变量，第一个运行其`dealloc`方法的`EnemyEntity`对象会释放`spawnFrequency`的内存。如果此后没有立即将其设置为`nil`，下一个运行其`dealloc`方法的`EnemyEntity`会尝试同样的操作，从而导致过度释放`spawnFrequency`\
    \ `CCArray`，引发崩溃。另一方面，如果`spawnFrequency`变量为`nil`，发送给它的任何消息（如 release 消息）都会被忽略。我之前说过，但再怎么重复也不为过：在\
    \ Objective-C 中，向`nil`对象发送消息是完全没问题的；该消息只会被忽略。\n\n生成实体是通过`spawn`方法完成的：\n\n```\n\
    -(void) spawn\n{\n    // 在屏幕右侧外部选择一个生成位置\n    CGRect screenRect = [GameScene screenRect];\n\
    \    CGSize spriteSize = [self contentSize];\n    float xPos = screenRect.size.width\
    \ + spriteSize.width * 0.5f;\n    float yPos = CCRANDOM_0_1() * (screenRect.size.height\
    \ - spriteSize.height) +![images](img/U002.jpg)\n        spriteSize.height * 0.5f;\n\
    \    self.position = CGPointMake(xPos, yPos);\n\n    // 最后将自身设置为可见，这也标志着敌人“正在使用中”\n\
    \    self.visible = YES;\n}\n```\n"
- fmt: "Because an `EnemyCache` is used to create all instances of enemies up front,\
    \ the whole spawning process is limited to choosing a random `y` position just\
    \ outside the right side of the screen and then setting the `EnemyEntity` sprite\
    \ to be visible. The `visible` status is used elsewhere in the project, specifically\
    \ by component classes, to determine whether the `EnemyEntity` is currently in\
    \ use. If it's not visible, it can be spawned to make it visible, but it should\
    \ run its game logic code only while it's visible.\n\n### The EnemyCache Class\n\
    \nI just mentioned the `EnemyCache` class. By its name, it should remind you of\
    \ the `BulletCache` class, which also holds a number of pre-initialized objects\
    \ for fast and easy reuse. This avoids creating and releasing objects during gameplay\
    \ that can be a source of minor performance hiccups. Especially for action games,\
    \ those small glitches can have a devastating effect on the player's experience.\
    \ With that said, let's look at the unspectacular header file of the `EnemyCache`\
    \ in [Listing 8–6](#Chapter08.html#list_8_6).\n\n**Listing 8–6.** *The @interface\
    \ of the EnemyCache Class*\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"cocos2d.h\"\n\n@interface EnemyCache : CCNode\n{\n    CCSpriteBatchNode* batch;\n\
    \    CCArray* enemies;\n\n    int updateCount;\n}\n@end\n```\n\nAfter the `spriteBatch`,\
    \ which contains all the enemy sprites, there's an `enemiesCCArray` that stores\
    \ a list of enemies of each type. The `updateCount` variable is increased every\
    \ frame and used to spawn enemies at regular intervals. The `init` method of the\
    \ `EnemyCache` is quite similar to the `BulletCacheinit` with its initialization\
    \ of the `CCSpriteBatchNode`:\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n        // get any image from the texture atlas we're using\n        CCSpriteFrame*\
    \ frame = [[CCSpriteFrameCache sharedSpriteFrameCache] spriteFrameByName:@\"monster-a.png\"\
    ];\n        batch = [CCSpriteBatchNode batchNodeWithTexture:frame.texture];\n\
    \        [self addChild:batch];\n\n        [self initEnemies];\n        [self\
    \ scheduleUpdate];\n    }\n\n    return self;\n}\n```\n\nBut since the code for\
    \ initializing the enemies is a bit more complex, I extracted it into its own\
    \ method, as shown in [Listing 8–7](#Chapter08.html#list_8_7).\n\n**Listing 8–7.**\
    \ *Initializing the Pool of Enemies for Later Reuse*\n\n```\n-(void) initEnemies\n\
    {\n    // create the enemies array containing further arrays for each type\n \
    \   enemies = [[CCArray alloc] initWithCapacity:EnemyType_MAX];\n\n    // create\
    \ the arrays for each type\n    for (int i = 0; i < EnemyType_MAX; i++)\n    {\n\
    \        // depending on enemy type the array capacity is set\n        // to hold\
    \ the desired number of enemies\n        int capacity;\n        switch (i)\n \
    \       {\n            case EnemyTypeUFO:\n                capacity = 6;\n   \
    \             break;\n            case EnemyTypeCruiser:\n                capacity\
    \ = 3;\n                break;\n            case EnemyTypeBoss:\n            \
    \    capacity = 1;\n                break;\n\n            default:\n         \
    \       [NSException exceptionWithName:@\"EnemyCache Exception\"\n           \
    \                             reason:@\"unhandled enemy type\"\n             \
    \                         userInfo:nil];\n                break;\n        }\n\n\
    \        // no alloc needed since the enemies array will retain anything added\
    \ to it\n        CCArray* enemiesOfType = [CCArray arrayWithCapacity:capacity];\n\
    \        [enemies addObject:enemiesOfType];\n    }\n\n    for (int i = 0; i <\
    \ EnemyType_MAX; i++)\n    {\n        CCArray* enemiesOfType = [enemies objectAtIndex:i];\n\
    \        int numEnemiesOfType = [enemiesOfType capacity];\n\n        for (int\
    \ j = 0; j < numEnemiesOfType; j++)\n        {\n            EnemyEntity* enemy\
    \ = [EnemyEntity enemyWithType:i];\n            [batch addChild:enemy z:0 tag:i];\n\
    \            [enemiesOfType addObject:enemy];\n        }\n    }\n}\n\n-(void)\
    \ dealloc\n{\n    [enemies release];\n    [super dealloc];\n}\n```\n\nThe interesting\
    \ part here is that the `CCArray*enemies` itself contains more `CCArray*` objects,\
    \ one per enemy type. It's what's called a two-dimensional array. The member variable\
    \ `enemies` requires the use of `alloc`, because otherwise its memory would be\
    \ freed after leaving the `initEnemies` method. In contrast, the `CCArray*` objects\
    \ added to the `enemiesCCArray` do not need to be created using `alloc`, because\
    \ the `enemiesCCArray` retains the objects added to it."
