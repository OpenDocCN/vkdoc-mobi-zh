    `CCMotionStreak` is essentially a wrapper around `CCRibbon`. It causes the `CCRibbon`
    elements to more or less slowly fade out and disappear after you’ve drawn them.
    Try it in the ScenesAndLayers10 project and take a look at [Figure 5–6](#Chapter05.html#fig_5_6)
    to get an impression how the fade-out effect might look like.


    ![images](images/0506.jpg)


    **Figure 5–6.** *The CCMotionStreak class allows you to slowly fade out the CCRibbon
    elements.*


    As you can see in [Listing 5–19](#Chapter05.html#list_5_19), you use it almost
    identically to `CCRibbon`, except that the `CCRibbon` is now a property of `CCMotionStreak`.
    The `fade` parameter determines how fast ribbon elements fade out; the smaller
    the number, the quicker they disappear. The `minSeg` parameter seems to have no
    discernable effect, although an interesting graphical glitch occurs if you set
    it to negative values.


    **Listing 5–19.** *The CCMotionStreak Lets the Ribbon’s Elements Fade Out, Creating
    a Streak Effect*


    `-(void) resetMotionStreak`

    `{`

    `    // Removes the CCMotionStreak and creates a new one.`

