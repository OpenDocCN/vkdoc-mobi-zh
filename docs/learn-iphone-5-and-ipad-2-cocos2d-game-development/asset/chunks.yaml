- fmt: '# Line-Drawing Game Starterkit


    My `Line-Drawing Game Starterkit` is modeled after successful games like Flight
    Control and Harbor Master. If you like to create line-drawing games, this starter
    kit gets you going with drawing lines, moving objects along the paths, collision
    detection, and a clearly structured code base, including both iPhone and iPad
    versions.


    Each purchase grants you a site license, which means your whole team is allowed
    to use the game’s source code and assets. Since it’s a starter kit, you are naturally
    allowed to make clones of the game. I also offer a 30-day money-back guarantee,
    and I’ll be happy to help you learn the starter kit’s source code and give directions
    on how to extend it.


    The `Line-Drawing Game Starterkit`’s product page contains the starter kit’s feature
    list, links to the demo apps (see [Figure 17–2](#Chapter17.html#fig_17_2)), a
    code sample, and the complete documentation: [`www.learn-cocos2d.com/store/line-drawing-game-starterkit`](http://www.learn-cocos2d.com/store/line-drawing-game-starterkit).


    ![images](images/1702.jpg)


    **Figure 17–2.** *The Line-Drawing Game Starterkit example game (iPad)*


    # The Platformer Game Kit


    My second source code product is all about making platform games like Sonic, Mario,
    Giana Sisters, Braid, Super Meat Boy, and so on. The first version models the
    game play of the League of Evil iPhone game (see [Figure 17–3](#Chapter17.html#fig_17_3))
    but will be extended to support other types of platform games as well, based on
    your feedback.


    **NOTE:** I’m not affiliated with the developers of the League of Evil game, and
    I did not help develop it. I chose to re-create the League of Evil game play as
    the first milestone for the Platformer Game Kit because League of Evil is a fun
    and popular game and it contains the most important elements of a platformer game.
    Check out the game at [`www.leagueofevilgame.com`](http://www.leagueofevilgame.com).


    The kit is built with Kobold2D and with cross-platform development in mind so
    that you can easily create and deploy your platform game to iOS devices and as
    a Mac OS X application. The game levels are created with the Tiled Map Editor
    using the free game assets supplied with the kit.


    The source code is designed to be modular and flexible so that you can easily
    extend it with your own functionality. For example, many game parameters are editable
    via Lua configuration files, and ready-made behavior classes can be added or removed
    to individual actors to allow them to fall, jump, collide, die, shoot, animate,
    play sound, and so on.


    Learn more about the Platformer Game Kit and get the latest development updates
    on [`www.platformergamekit.com`](http://www.platformergamekit.com) and [`www.learn-cocos2d.com/store`](http://www.learn-cocos2d.com/store).


    ![images](images/1703.jpg)


    **Figure 17–3.** *Create games similar to League of Evil (depicted here) with
    the Platformer Game Kit.*


    # The Space Game Starterkit


    The Space Game Starterkit evolved from Ray Wenderlich’s Space Game Tutorial ([`www.raywenderlich.com/3611/how-to-make-a-space-shooter-iphone-game`](http://www.raywenderlich.com/3611/how-to-make-a-space-shooter-iphone-game))
    into a commercial starter kit for making a side-scrolling shoot-’em-up game.


    As with the iPhone RPG Game Kit, there’s added value in the form of four epic
    tutorials included in the purchase. The tutorials explain a lot of the details
    that go into making this particular game and games in general. Coming from Ray
    Wenderlich, you can expect high-quality code and tutorials.


    Ray’s wife, Vicki, provided the artwork for the Starterkit. You can reuse and
    modify the artwork as you like as long as you credit Vicki Wenderlich. She runs
    an iPhone art blog at [`www.vickiwenderlich.com`](http://www.vickiwenderlich.com).


    Learn more about the Space Game Starterkit, pictured in [Figure 17–4](#Chapter17.html#fig_17_4),
    in Ray Wenderlich’s store: [`www.raywenderlich.com/store/space-game-starter-kit`](http://www.raywenderlich.com/store/space-game-starter-kit).


    ![images](images/1704.jpg)


    **Figure 17–4.** *Ray and Vicki Wenderlich’s Space Game Starterkit*


    # iUridium Source Code


    If you had a Commodore 64 home computer in the 1980s or early 1990s, chances are
    that you’ve played or at least heard of Uridium. Uridium was a fast-paced space
    game shooter with a unique feature: you could change the flight direction of your
    spaceship with a smoothly animated Immelmann turn, to fly over the enemy spacecraft
    from end to end to complete various objectives. If you will, it was one of the
    early free-roaming world type of games.


    Nenad Alajbegovic is porting this game to the iPhone, appropriately named iUridium.
    You get the entire source code for the game, which uses just about everything
    the cocos2d game engine has to offer, and then some. For example, Nenad implemented
    caching (pooling) of bullets and enemies to create a smooth gameplay. He also
    has UIKit views, Game Center leaderboards, and Facebook and Twitter integrated.
    The levels are created entirely as tilemaps and dynamically loaded from XML into
    the game’s scene and layer nodes.


    The license is fair, only asking you not to make a clone of iUridium but expressly
    allowing you to make your own side-scrolling shooter game. But you do have to
    replace all of the artwork, music, and sound effects with your own.


    You can find all the information about iUridium, pictured in [Figure 17–5](#Chapter17.html#fig_17_5),
    on this web site: [`www.iuridium.com/?page_id=2`](http://www.iuridium.com/?page_id=2).


    ![images](images/1705.jpg)


    **Figure 17–5.** *The iUridium’s game source code is available for sale.*


    # BATAK Duel Source Code


    Dan Nelson is the developer of BATAK Duel for iPhone. He created this game in
    five months with no prior iPhone game development knowledge. He managed to integrate
    OpenFeint into the game, a menu systems, and of course savegames. The app is rich
    in visuals, both by utilizing cocos2d’s particle system as well as additional
    effects such as lighting, smoothly scrolling credits, and a transparent pop-up
    keyboard.


    The license is fair, only asking you not to use any of the BATAK Duel artwork,
    music, and sound effects. You can find more information about the BATAK Duel source
    code, pictured in [Figure 17–6](#Chapter17.html#fig_17_6), on this web site: [`www.batakduel.com/blog/78`](http://www.batakduel.com/blog/78).


    ![images](images/1706.jpg)


    **Figure 17–6.** *The source code of BATAK Duel for iPhone is for sale.*


    # Cocos2D Podcast


    Mohammad Azam and I are recording the Cocos2D Podcast to report on recent events;
    to talk about hot topics; to interview game developers, tool authors, and bloggers;
    and to give listeners insider information and insights into game development with
    cocos2d.


    The Cocos2D Podcast is available on `cocos2dpodcast.wordpress.com`, and new episodes
    are announced on [`www.learn-cocos2d.com/blog`](http://www.learn-cocos2d.com/blog).
    Each episode runs between 30 to 60 minutes. Here’s a selection of episode topics
    we’ve covered so far:


    *   Earning additional revenue using iAds, IAP, selling source code, and so on

    *   Michael Daley explains Particle Designer and Glyph Designer

    *   Ray Wenderlich talks about Cocos2d, book, workshops, and more

    *   Andreas Löw explains TexturePacker and PhysicsEditor

    *   Vladu Bogdan on LevelHelper and SpriteHelper

    *   Zynga acquires Cocos2d contributors

    *   Tools in Cocos2d iPhone game development

    *   Game engines and frameworks as alternatives to Cocos2d'
