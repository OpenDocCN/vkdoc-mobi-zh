    After opening the downloaded PhysicsEditor disk image and dragging PhysicsEditor.app
    to your application''s folder, you are ready to run PhysicsEditor (see [Figure
    13–3](#Chapter13.html#fig_13_3)). In the PhysicsEditor disk image, you will also
    find a folder named Loaders, which contains the loader code (shape cache) for
    Box2D and Chipmunk plist files created by PhysicsEditor. You will be using the
    `GB2ShapeCache` class in the example projects of this chapter in order to load
    the shapes created by PhysicsEditor.


    ![images](images/1303.jpg)


    **Figure 13–3.** *The PhysicsEditor application*


    You should now drag and drop the PNG files located in the PhysicsBox2D03project''s
    Assets/pinball folder onto the leftmost pane in PhysicsEditor, which is labeled
    `Shapes`.


    **NOTE:** You will be using only the HD resolution images to create physic shapes.
    It is not necessary to create separate HD and SD resolution physics shapes. The
    physics simulation world is independent from the graphical representation of the
    objects and thus independent of the screen resolution.


    The first thing you should modify in PhysicsEditorare the settings for the exporter.
    PhysicsEditor can export to several game engines, supports both Box2D and Chipmunk
    physics engines, and even allows you to create your own custom export format.
    To write files compatible with cocos2d, you must set the `Exporter` setting on
    the rightmost pane to `Box2D generic (PLIST)`. It is important to set the exporter
    first since it enables or disables some features of the PhysicsEditor GUI depending
