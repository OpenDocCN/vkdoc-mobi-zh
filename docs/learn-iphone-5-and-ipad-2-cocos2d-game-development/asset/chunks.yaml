- fmt: '# Re-creating the Background in Code


    You may be wondering by now how you can put these images back together in the
    source code without spending a lot of time properly positioning these stripped-down
    images. The answer is you don’t have to do this. Since all these images were saved
    as full-screen images, `TexturePacker` will remember the image offsets. All you
    really have to do is center each of these images on the screen, and they will
    be at the correct place.


    Let’s take a look at the code for the `ParallaxBackground` node newly added to
    the `ScrollingWithJoy01` project. The header file is pretty straightforward:


    ```

    @interface ParallaxBackground : CCNode

    {

        CCSpriteBatchNode* spriteBatch;

        int numSprites;

    }

    @end

    ```


    I only chose to keep a reference to the `CCSpriteBatchNode` around because I will
    be accessing it in the code frequently. Storing a node as a member variable is
    faster than asking cocos2d for the node via the `getNodeByTag` method. If you
    do that every frame, it saves you a few CPU cycles. It is nothing too dramatic,
    and it is certainly not worth keeping several hundreds of member variables around.
    It’s a minor optimization that is just very convenient in this case.


    In the `init` method of the `ParallaxBackground` class, the `CCSpriteBatchNode`
    is created, and all seven background images are added from the texture atlas,
    as shown in [Listing 7–1](#Chapter07.html#list_7_1).


    **Listing 7–1.** Loading the Background Images


    ```

    CGSize screenSize = [[CCDirector sharedDirector] winSize];


    // Get the game''s texture atlas texture by adding it

    CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache]

        addImage:@"game-art.pvr.czz"];


    spriteBatch = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];

    [self addChild:spriteBatch];


    numSprites = 7;


    // Add the six different layer objects and position them on the screen

    for (int i = 0; i < numSprites; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];

        sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);

        [spriteBatch addChild:sprite z:i];

    }

    ```


    You’ll see that first I’m adding the `game-art.pvr.czz` texture atlas image to
    `CCTextureCache`. Actually, the texture atlas has already been added in the `GameScene`
    class, so why would I add it a second time here? The reason is simply that I need
    the `CCTexture2D` object to create the `CCSpriteBatchNode`, and adding the same
    image another time is the only way to retrieve an already cached image from the
    `CCTextureCache`. This doesn’t load the texture a second time; the `CCTextureCache`
    singleton knows that the texture is already loaded and returns the cached version,
    which is a fast operation. It’s just a bit unusual that there is no specific `getTextureByName`
    method, but that’s the way it is.


    With the `CCSpriteBatchNode` created and set up, the next step is to load the
    seven individual background images. I deliberately chose to number them from 0
    to 6 so that I can use `stringWithFormat` to create the file names as strings
    in a very effective way:


    ```

    NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

    ```


    With that sprite `frameName`, I create a `CCSprite` as usual and then position
    it at the center of the screen:


    ```

    sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);

    ```


    Of course, once you create an iPad version of this project, the images won’t fit
    perfectly anymore since they were designed for a screen of 960×640 resolution.
    If you want to create an iPad version, you can follow the exact same steps, except
    make your original image 1024×768 in size. You can then downscale the 960×640
    versions from that easily, since there’s only a few extra pixels of overlap.


    **TIP:** It takes surprisingly little effort to re-create the source image in
    cocos2d, and it’s all thanks to `TexturePacker` saving the image offsets for you.
    It’s also a great way to create your game screen layouts. You can have an artist
    design each screen as separate layers, as many as are needed. Then each layer
    is exported as an individual full-screen file with transparency. Next you create
    a texture atlas from these files and end up having the artist-envisioned screen
    design in cocos2d with no hassle of positioning individual files and no wasted
    memory either.


    Because the `ParallaxBackground` class is derived from `CCNode`, I only need to
    add it to the `GameScene` layer to add the `ParallaxBackground` to the game, like
    this:


    ```

    ParallaxBackground* background = [ParallaxBackground node];

    [self addChild:background z:-1];

    ```


    This replaces the `CCLayerColor` and the background `CCSprite`, which were placeholders
    from the previous chapter.


    # Moving the ParallaxBackground


    In the `ScrollingWithJoy01` project, I also added a quick-and-dirty scrolling
    of the background stripes. It does show a parallax effect, although the images
    quickly leave the screen, revealing the blank background behind them. [Figure
    7–4](#Chapter07.html#fig_7_4) isn’t exactly what I had in mind, but I’m getting
    there.


    **NOTE:** You’ll also notice that [Figure 7–4](#Chapter07.html#fig_7_4) doesn’t
    look at all like [Figure 7–1](#Chapter07.html#fig_7_1) or the game project. [Figure
    7–4](#Chapter07.html#fig_7_4) uses dummy graphics to better illustrate the parallax
    images “leaving” the screen. You’ll notice this effect much better in motion.


    ![images](images/0704.jpg)


    **Figure 7–4.** The background stripes are moving, but they’re also leaving the
    screen forever.


    Still, [Listing 7–2](#Chapter07.html#list_7_2) shows that the code to make the
    background scroll as a first test is surprisingly simple.


    **Listing 7–2.** Moving the Background Stripes


    ```

    -(void) update:(ccTime)delta

    {

        CCSprite* sprite;

        CCARRAY_FOREACH([spriteBatch children], sprite)

        {

            CGPoint pos = sprite.position;

            pos.x -= (scrollSpeed + sprite.zOrder) * (delta * 20);

            sprite.position = pos;

        }

    }

    ```


    Every background image’s `x` position gets subtracted a bit every frame to scroll
    it from right to left. How much an image moves depends on the predefined `scrollSpeed`
    plus the sprite’s `zOrder`. The delta multiplier is used to make the scrolling
    speed independent of the framerate, which is then multiplied by 20 to make the
    scrolling reasonably fast. Images that are closer to the screen scroll faster.
    However, using the `zOrder` property causes the stripes that should be at the
    same visual depth to scroll at different speeds.


    The position is also multiplied by the *delta time* to make the scrolling speed
    independent of the framerate. The delta time itself is just a tiny fraction—it’s
    the time between two calls to the `update` method. At exactly 60 frames per second
    (fps), it’s 1/60 of a second, which is a delta time of 0.167 seconds. For that
    reason, I multiply delta by 20 just to get a reasonably fast scroll; otherwise,
    the images would be moving too slowly.'
  raw: '#### Re-creating the Background in Code


    You may be wondering by now how you can put these images back together in the
    source code without spending a lot of time properly positioning these stripped-down
    images. The answer is you don’t have to do this. Since all these images were saved
    as full-screen images, TexturePacker will remember the image offsets. All you
    really have to do is center each of these images on the screen, and they will
    be at the correct place.


    Let’s take a look at the code for the `ParallaxBackground` node newly added to
    the ScrollingWithJoy01 project. The header file is pretty straightforward:


    `@interface ParallaxBackground : CCNode`

    `{`

    `    CCSpriteBatchNode* spriteBatch;`

    `    int numSprites;`

    `}`

    `@end`


    I only chose to keep a reference to the `CCSpriteBatchNode` around because I will
    be accessing it in the code frequently. Storing a node as a member variable is
    faster than asking cocos2d for the node via the `getNodeByTag` method. If you
    do that every frame, it saves you a few CPU cycles. It is nothing too dramatic,
    and it is certainly not worth keeping several hundreds of member variables around.
    It’s a minor optimization that is just very convenient in this case.


    In the `init` method of the `ParallaxBackground` class, the `CCSpriteBatchNode`
    is created, and all seven background images are added from the texture atlas,
    as shown in [Listing 7–1](#Chapter07.html#list_7_1).


    **Listing 7–1.** *Loading the Background Images*


    `CGSize screenSize = [[CCDirector sharedDirector] winSize];`


    `// Get the game''s texture atlas texture by adding it`

    `CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache]` ![images](images/U002.jpg)

    `    addImage:@"game-art.pvr.czz"];`


    `spriteBatch = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];`

    `[self addChild:spriteBatch];`


    `numSprites = 7;`


    `// Add the six different layer objects and position them on the screen`

    `for (int i = 0; i < numSprites; i++)`

    `{`

    `    NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];`

    `    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];`

    `    sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);`

    `    [spriteBatch addChild:sprite z:i];`

    `}`


    You’ll see that first I’m adding the game-art.pvr.czz texture atlas image to `CCTextureCache`.
    Actually, the texture atlas has already been added in the `GameScene` class, so
    why would I add it a second time here? The reason is simply that I need the `CCTexture2D`
    object to create the `CCSpriteBatchNode`, and adding the same image another time
    is the only way to retrieve an already cached image from the `CCTextureCache`.
    This doesn’t load the texture a second time; the `CCTextureCache` singleton knows
    that the texture is already loaded and returns the cached version, which is a
    fast operation. It’s just a bit unusual that there is no specific `getTextureByName`
    method, but that’s the way it is.


    With the `CCSpriteBatchNode` created and set up, the next step is to load the
    seven individual background images. I deliberately chose to number them from 0
    to 6 so that I can use `stringWithFormat` to create the file names as strings
    in a very effective way:


    `NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];`


    With that sprite `frameName`, I create a `CCSprite` as usual and then position
    it at the center of the screen:


    `sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);`


    Of course, once you create an iPad version of this project, the images won’t fit
    perfectly anymore since they were designed for a screen of 960×640 resolution.
    If you want to create an iPad version, you can follow the exact same steps, except
    make your original image 1024×768 in size. You can then downscale the 960×640
    versions from that easily, since there’s only a few extra pixels of overlap.


    **TIP:** It takes surprisingly little effort to re-create the source image in
    cocos2d, and it’s all thanks to TexturePacker saving the image offsets for you.
    It’s also a great way to create your game screen layouts. You can have an artist
    design each screen as separate layers, as many as are needed. Then each layer
    is exported as an individual full-screen file with transparency. Next you create
    a texture atlas from these files and end up having the artist-envisioned screen
    design in cocos2d with no hassle of positioning individual files and no wasted
    memory either.


    Because the `ParallaxBackground` class is derived from `CCNode`, I only need to
    add it to the `GameScene` layer to add the `ParallaxBackground` to the game, like
    this:


    `ParallaxBackground* background = [ParallaxBackground node];`

    `[self addChild:background z:-1];`


    This replaces the `CCLayerColor` and the background `CCSprite`, which were placeholders
    from the previous chapter.


    #### Moving the ParallaxBackground


    In the ScrollingWithJoy01 project, I also added a quick-and-dirty scrolling of
    the background stripes. It does show a parallax effect, although the images quickly
    leave the screen, revealing the blank background behind them. [Figure 7–4](#Chapter07.html#fig_7_4)
    isn’t exactly what I had in mind, but I’m getting there.


    **NOTE:** You’ll also notice that [Figure 7–4](#Chapter07.html#fig_7_4) doesn’t
    look at all like [Figure 7–1](#Chapter07.html#fig_7_1) or the game project. [Figure
    7–4](#Chapter07.html#fig_7_4) uses dummy graphics to better illustrate the parallax
    images “leaving” the screen. You’ll notice this effect much better in motion.


    ![images](images/0704.jpg)


    **Figure 7–4.** *The background stripes are moving, but they’re also leaving the
    screen forever.*


    Still, [Listing 7–2](#Chapter07.html#list_7_2) shows that the code to make the
    background scroll as a first test is surprisingly simple.


    **Listing 7–2.** *Moving the Background Stripes*


    `-(void) update:(ccTime)delta`

    `{`

    `    CCSprite* sprite;`

    `    CCARRAY_FOREACH([spriteBatch children], sprite)`

    `    {`

    `        CGPoint pos = sprite.position;`

    `        pos.x -= (scrollSpeed + sprite.zOrder) * (delta * 20);`

    `        sprite.position = pos;`

    `    }`

    `}`


    Every background image’s `x` position gets subtracted a bit every frame to scroll
    it from right to left. How much an image moves depends on the predefined `scrollSpeed`
    plus the sprite’s `zOrder`. The delta multiplier is used to make the scrolling
    speed independent of the framerate, which is then multiplied by 20 to make the
    scrolling reasonably fast. Images that are closer to the screen scroll faster.
    However, using the `zOrder` property causes the stripes that should be at the
    same visual depth to scroll at different speeds.


    The position is also multiplied by the *delta time* to make the scrolling speed
    independent of the framerate. The delta time itself is just a tiny fraction—it’s
    the time between two calls to the `update` method. At exactly 60 frames per second
    (fps), it’s 1/60 of a second, which is a delta time of 0.167 seconds. For that
    reason, I multiply delta by 20 just to get a reasonably fast scroll; otherwise,
    the images would be moving too slowly.'
  trans: '

    # 在代码中重构背景


    你可能现在想知道，如何在不花费大量时间精确定位这些剥离后的图片的情况下，在源代码中将它们重新组合起来。答案是：你不必这样做。由于所有这些图片都以全屏模式保存，`TexturePacker`
    会记住它们的偏移量。你真正需要做的只是将每张图片居中放置在屏幕上，它们就会出现在正确的位置。


    让我们来看看 `ScrollingWithJoy01` 项目中新增的 `ParallaxBackground` 节点的代码。头文件相当简单明了：


    ```

    @interface ParallaxBackground : CCNode

    {

        CCSpriteBatchNode* spriteBatch;

        int numSprites;

    }

    @end

    ```


    我只选择保留一个对 `CCSpriteBatchNode` 的引用，因为我会在代码中频繁访问它。将节点作为成员变量存储，比通过 `getNodeByTag`
    方法向 cocos2d 请求节点要快。如果你每帧都这样做，可以节省一些 CPU 周期。这并不算多大的优化，当然也不值得保留几百个成员变量。这只是一个小优化，在本例中使用起来非常方便。


    在 `ParallaxBackground` 类的 `init` 方法中，创建了 `CCSpriteBatchNode`，并从纹理图集中添加了全部七张背景图片，如
    代码清单 7–1 所示。


    **代码清单 7–1.** 加载背景图片


    ```

    CGSize screenSize = [[CCDirector sharedDirector] winSize];


    // 通过添加纹理来获取游戏纹理图集纹理

    CCTexture2D* gameArtTexture = [[CCTextureCache sharedTextureCache]

        addImage:@"game-art.pvr.czz"];


    spriteBatch = [CCSpriteBatchNode batchNodeWithTexture:gameArtTexture];

    [self addChild:spriteBatch];


    numSprites = 7;


    // 添加六个不同的图层对象并将它们定位在屏幕上

    for (int i = 0; i < numSprites; i++)

    {

        NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

        CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];

        sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);

        [spriteBatch addChild:sprite z:i];

    }

    ```


    你会看到，我首先将 `game-art.pvr.czz` 纹理图集图像添加到 `CCTextureCache` 中。实际上，这个纹理图集已经在 `GameScene`
    类中添加过了，为什么我要在这里再次添加呢？原因很简单：我需要 `CCTexture2D` 对象来创建 `CCSpriteBatchNode`，而再次添加相同的图像是从
    `CCTextureCache` 中检索已缓存图像的唯一方法。这并不会第二次加载纹理；`CCTextureCache` 单例知道纹理已经被加载过，并返回缓存版本，这是一个快速操作。只是没有特定的
    `getTextureByName` 方法这一点不太寻常，但事实就是这样。


    创建并设置好 `CCSpriteBatchNode` 后，下一步是加载七张独立的背景图片。我特意将它们从 0 到 6 编号，这样可以使用 `stringWithFormat`
    以一种非常高效的方式将文件名创建为字符串：


    ```

    NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];

    ```


    有了这个精灵的 `frameName`，我像往常一样创建一个 `CCSprite`，然后将其定位在屏幕中央：


    ```

    sprite.position = CGPointMake(screenSize.width / 2, screenSize.height / 2);

    ```


    当然，一旦你创建了这个项目的 iPad 版本，由于这些图片是为 960×640 分辨率的屏幕设计的，它们将不再完美适配。如果你想要创建 iPad 版本，可以遵循完全相同的步骤，只是将原始图像的大小设为
    1024×768。然后，你可以轻松地从这些图像中缩小出 960×640 的版本，因为只有少量额外的重叠像素。


    **提示：** 在 cocos2d 中重构原始图像几乎不费吹灰之力，这完全归功于 `TexturePacker` 帮你保存了图像偏移量。这也是创建游戏屏幕布局的绝佳方式。你可以让美术师将每个屏幕设计为独立的图层，数量根据需要而定。然后，每个图层被导出为带透明度的独立全屏文件。接着，你根据这些文件创建一个纹理图集，最终在
    cocos2d 中实现美术师设想的屏幕设计，无需费心定位单个文件，也不会浪费内存。


    因为 `ParallaxBackground` 类继承自 `CCNode`，我只需要将它添加到 `GameScene` 层，就能将 `ParallaxBackground`
    加入游戏，如下所示：


    ```

    ParallaxBackground* background = [ParallaxBackground node];

    [self addChild:background z:-1];

    ```


    这替换了上一章中作为占位符使用的 `CCLayerColor` 和背景 `CCSprite`。


    # 移动 ParallaxBackground


    在 `ScrollingWithJoy01` 项目中，我还添加了一个快速而粗糙的背景条纹滚动效果。它确实显示出了视差效果，尽管图片很快就会离开屏幕，露出背后的空白背景。图
    7–4 并不完全是我设想的样子，但我正在接近目标。


    **注意：** 你也会注意到 图 7–4 看起来完全不像 图 7–1 或游戏项目。图 7–4 使用了虚拟图形来更好地说明视差图片“离开”屏幕的效果。你会在动态中更清楚地看到这种效果。


    ![images](img/0704.jpg)


    **图 7–4.** 背景条纹正在移动，但它们也会永远离开屏幕。


    尽管如此，代码清单 7–2 显示，作为首次测试，让背景滚动的代码出乎意料地简单。


    **代码清单 7–2.** 移动背景条纹


    ```

    -(void) update:(ccTime)delta

    {

        CCSprite* sprite;

        CCARRAY_FOREACH([spriteBatch children], sprite)

        {

            CGPoint pos = sprite.position;

            pos.x -= (scrollSpeed + sprite.zOrder) * (delta * 20);

            sprite.position = pos;

        }

    }

    ```


    每帧会从每张背景图片的 `x` 坐标中减去一点值，使其从右向左滚动。每张图片移动的距离取决于预定义的 `scrollSpeed` 加上精灵的 `zOrder`。delta
    乘法器用于使滚动速度不受帧率影响，然后再乘以 20 以使滚动速度合理且足够快。离屏幕更近的图片滚动得更快。然而，使用 `zOrder` 属性会导致本应在同一视觉深度的条纹以不同速度滚动。


    移动距离还会乘以 **delta 时间**，以使滚动速度不受帧率影响。delta 时间本身只是一个很小的分数——它是两次 `update` 方法调用之间的时间间隔。在精确的每秒
    60 帧（fps）下，它是 1/60 秒，即 delta 时间为 0.167 秒。因此，我将 delta 乘以 20 只是为了获得一个合理的滚动速度；否则，图片会移动得太慢。

    '
- fmt: "#### Parallax Speed Factors\n\nSomehow the stripes of the same color need\
    \ to scroll at the same speed, and the stripes should repeat so that the background\
    \ doesn’t show up. My solutions to these issues are in the `ScrollingWithJoy02`\
    \ project.\n\nThe first change is regarding the scrolling speed. I decided to\
    \ use a `CCArray` to store the speed factor with which individual stripes move.\
    \ There are other solutions, but this allows me to illustrate a key issue of `CCArray`\
    \ and in fact all iOS SDK collection classes: they can store only objects, never\
    \ values such as integers and floating-point numbers.\n\nThe way around this is\
    \ to box numbers into an `NSNumber` object. The following code is the newly added\
    \ `CCArray* speedFactors`, which stores floating-point values. The array is defined\
    \ in the `ParallaxBackground` class header:\n\n```\n@interface ParallaxBackground\
    \ : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n    int numStripes;\n    CCArray*\
    \ speedFactors;\n    float scrollSpeed;\n}\n@end\n```\n\nThen it is filled with\
    \ factors in the `init` method of the `ParallaxBackground` class. Notice how `[NSNumber\
    \ numberWithFloat:]` is used to store a float value inside the array:\n\n```\n\
    // Initialize the array that contains the scroll factors for individual stripes\n\
    speedFactors = [[CCArray alloc] initWithCapacity:numStripes];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.3f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.8f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:1.2f]];\nNSAssert([speedFactors count] == numStripes, @\"speedFactors\
    \ count mismatch!\");\n```\n\nThe final assert is simply a safety check for human\
    \ error. Consider that you may be adding or removing stripes from the background\
    \ for whatever reason but might forget to adjust the number of values you’re adding\
    \ to the `speedFactors` array. If you forget to modify the `speedFactors` initialization,\
    \ the assert will remind you of it, instead of potentially crashing the game seemingly\
    \ at random.\n\nIn [Figure 7–5](#Chapter07.html#fig_7_5) you can see which speed\
    \ factor is applied to which stripe. Stripes with higher speed factors move faster\
    \ than those with slower speed factors, which creates the parallax effect. Once\
    \ again, dummy graphics are used to make each individual stripe clearly visible.\n\
    \n![images](images/0705.jpg)\n\n**Figure 7–5.** *The speed factors applied to\
    \ each background stripe*\n\nThe `speedFactors` array is created with `alloc`,\
    \ so its memory must also be released, which is done in the newly added `dealloc`\
    \ method:\n\n```\n-(void) dealloc\n{\n    [speedFactors release];\n    [super\
    \ dealloc];\n}\n```\n\nTo use the newly introduced speed factors, the `update`\
    \ method has been changed to this:\n\n```\n-(void) update:(ccTime)delta\n{\n \
    \   CCSprite* sprite;\n    CCARRAY_FOREACH([spriteBatch children], sprite)\n \
    \   {\n        NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];\n\
    \n        CGPoint pos = sprite.position;\n        pos.x -= scrollSpeed * [factor\
    \ floatValue] * (delta * 50);\n        sprite.position = pos;\n    }\n}\n```\n\
    \nBased on the sprite’s `zOrder` property, a speed factor `NSNumber` is obtained\
    \ from the `speedFactors` array. This will be multiplied by the `scrollSpeed`\
    \ to speed up or slow down the movement of individual stripes. You can’t multiply\
    \ the `NSNumber` object directly because it is a class instance storing a primitive\
    \ data type such as float, int, char, or others. `NSNumber` has a `floatValue`\
    \ method that returns the floating-point value, but it supports a number of different\
    \ methods. You could also use `intValue`, even though this `NSNumber` stores a\
    \ floating-point value. It is essentially the same as casting a float to an int.\
    \ Once again, the delta time is also factored in to make the scrolling speed independent\
    \ of the framerate.\n\nBy using the `speedFactors` array and giving the same-colored\
    \ stripes the same factor, the background stripes will now move as expected. But\
    \ there’s still the issue of making endless scrolling."
  raw: '#### Parallax Speed Factors


    Somehow the stripes of the same color need to scroll at the same speed, and the
    stripes should repeat so that the background doesn’t show up. My solutions to
    these issues are in the ScrollingWithJoy02 project.


    The first change is regarding the scrolling speed. I decided to use a `CCArray`
    to store the speed factor with which individual stripes move. There are other
    solutions, but this allows me to illustrate a key issue of `CCArray` and in fact
    all iOS SDK collection classes: they can store only objects, never values such
    as integers and floating-point numbers.


    The way around this is to box numbers into an `NSNumber` object. The following
    code is the newly added `CCArray* speedFactors`, which stores floating-point values.
    The array is defined in the `ParallaxBackground` class header:


    `@interface ParallaxBackground : CCNode`

    `{`

    `    CCSpriteBatchNode* spriteBatch;`


    **`    int numStripes;`**

    **`    CCArray* speedFactors;`**

    **`    float scrollSpeed;`**

    `}`

    `@end`


    Then it is filled with factors in the `init` method of the `ParallaxBackground`
    class. Notice how `NSNumbernumberWithFloat` is used to store a float value inside
    the array:


    `// Initialize the array that contains the scroll factors for individual stripes`

    `speedFactors = [[CCArray alloc] initWithCapacity:numStripes];`

    `[speedFactors addObject:[NSNumber numberWithFloat:0.3f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:0.8f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:0.8f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:1.2f]];`

    `[speedFactors addObject:[NSNumber numberWithFloat:1.2f]];`

    `NSAssert([speedFactors count] == numStripes, @"speedFactors count mismatch!");`


    The final assert is simply a safety check for human error. Consider that you may
    be adding or removing stripes from the background for whatever reason but might
    forget to adjust the number of values you’re adding to the `speedFactors` array.
    If you forget to modify the `speedFactors` initialization, the assert will remind
    you of it, instead of potentially crashing the game seemingly at random.


    In [Figure 7–5](#Chapter07.html#fig_7_5) you can see which speed factor is applied
    to which stripe. Stripes with higher speed factors move faster than those with
    slower speed factors, which creates the parallax effect. Once again, dummy graphics
    are used to make each individual stripe clearly visible.


    ![images](images/0705.jpg)


    **Figure 7–5.** *The speed factors applied to each background stripe*


    The `speedFactors` array is created with `alloc`, so its memory must also be released,
    which is done in the newly added `dealloc` method:


    `-(void) dealloc`

    `{`

    `    [speedFactors release];`

    `    [super dealloc];`

    `}`


    To use the newly introduced speed factors, the `update` method has been changed
    to this:


    `-(void) update:(ccTime)delta`

    `{`

    `    CCSprite* sprite;`

    `    CCARRAY_FOREACH([spriteBatch children], sprite)`

    `    {`

    `        NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];`


    `        CGPoint pos = sprite.position;`

    `        pos.x -= scrollSpeed * [factor floatValue] * (delta * 50);`

    `        sprite.position = pos;`

    `    }`

    `}`


    Based on the sprite’s `zOrder` property, a speed factor `NSNumber` is obtained
    from the `speedFactors` array. This will be multiplied by the `scrollSpeed` to
    speed up or slow down the movement of individual stripes. You can’t multiply the
    `NSNumber` object directly because it is a class instance storing a primitive
    data type such as float, int, char, or others. `NSNumber` has a `floatValue` method
    that returns the floating-point value, but it supports a number of different methods.
    You could also use `intValue`, even though this `NSNumber` stores a floating-point
    value. It is essentially the same as casting a float to an int. Once again, the
    delta time is also factored in to make the scrolling speed independent of the
    framerate.


    By using the `speedFactors` array and giving the same-colored stripes the same
    factor, the background stripes will now move as expected. But there’s still the
    issue of making endless scrolling.'
  trans: "\n#### 视差速度系数\n\n同一颜色的条纹需要以相同的速度滚动，并且条纹必须能够重复，这样背景才不会露出来。针对这些问题，我在`ScrollingWithJoy02`项目中提供了解决方案。\n\
    \n第一个改动涉及滚动速度。我决定使用`CCArray`来存储每条条纹移动的速度系数。虽然还有其他解决方案，但这种方法能让我说明`CCArray`以及所有\
    \ iOS SDK 集合类的一个关键问题：它们只能存储对象，而不能存储诸如整数和浮点数之类的值。\n\n解决方法是先将数值装箱到`NSNumber`对象中。以下代码是新添加的`CCArray*\
    \ speedFactors`，其中存储了浮点数值。该数组在`ParallaxBackground`类的头文件中定义：\n\n```\n@interface\
    \ ParallaxBackground : CCNode\n{\n    CCSpriteBatchNode* spriteBatch;\n    int\
    \ numStripes;\n    CCArray* speedFactors;\n    float scrollSpeed;\n}\n@end\n```\n\
    \n随后，在`ParallaxBackground`类的`init`方法中用这些系数填充该数组。请注意如何使用`[NSNumber numberWithFloat:]`将浮点值存储到数组中：\n\
    \n```\n// 初始化包含各条纹滚动系数的数组\nspeedFactors = [[CCArray alloc] initWithCapacity:numStripes];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.3f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.5f]];\n[speedFactors addObject:[NSNumber numberWithFloat:0.5f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber\
    \ numberWithFloat:0.8f]];\n[speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\n\
    [speedFactors addObject:[NSNumber numberWithFloat:1.2f]];\nNSAssert([speedFactors\
    \ count] == numStripes, @\"speedFactors 个数不匹配！\");\n```\n\n最后的断言只是针对人为失误的安全检查。试想一下，你可能因为某些原因添加或移除背景条纹，却忘记调整添加到`speedFactors`数组中的数值个数。如果你忘记修改`speedFactors`的初始化代码，断言会提醒你，而不是让游戏看似随机地崩溃。\n\
    \n在图 7-5 中，你可以看到每个条纹应用了哪个速度系数。速度系数较高的条纹比系数较低的条纹移动得更快，从而产生了视差效果。这里再次使用占位图形，以便清晰显示每一条条纹。\n\
    \n![images](img/0705.jpg)\n\n**图 7-5.** *应用于各背景条纹的速度系数*\n\n`speedFactors`数组是通过`alloc`创建的，因此其内存也必须被释放，这在新添加的`dealloc`方法中完成：\n\
    \n```\n-(void) dealloc\n{\n    [speedFactors release];\n    [super dealloc];\n\
    }\n```\n\n为了使用新引入的速度系数，`update`方法已修改如下：\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    CCSprite* sprite;\n    CCARRAY_FOREACH([spriteBatch children], sprite)\n\
    \    {\n        NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];\n\
    \n        CGPoint pos = sprite.position;\n        pos.x -= scrollSpeed * [factor\
    \ floatValue] * (delta * 50);\n        sprite.position = pos;\n    }\n}\n```\n\
    \n基于精灵的`zOrder`属性，从`speedFactors`数组中获取一个速度系数`NSNumber`。该系数将与`scrollSpeed`相乘，以加速或减速各条纹的移动。你不能直接对`NSNumber`对象进行乘法运算，因为它是一个类实例，内部存储着浮点数、整数、字符等基本数据类型。`NSNumber`提供了`floatValue`方法来返回其浮点值，当然它也支持多种不同的取值方法。你也可以使用`intValue`，即使这个`NSNumber`存储的是浮点值，这本质上相当于将浮点数强制转换为整数。同样，delta\
    \ 时间也被考虑在内，以使滚动速度与帧率无关。\n\n通过使用`speedFactors`数组并为相同颜色的条纹赋予相同的系数，背景条纹现在将按预期移动。但还有一个问题需要解决，那就是如何实现无限滚动。\n"
- fmt: "#### Scrolling to Infinity and Beyond\n\nAlso in `ScrollingWithJoy02` is the\
    \ first step toward endless scrolling. As you can see in [Listing 7–3](#Chapter07.html#list_7_3),\
    \ I simply added seven more background stripes to the `CCSpriteBatchNode`, although\
    \ with a slightly different setup.\n\n**Listing 7–3.** *Adding Off-Screen Background\
    \ Images*\n\n```\n// Add seven more stripes, flip them, and position them next\
    \ to their neighbor stripe\nfor (int i = 0; i < numStripes; i++)\n{\n    NSString*\
    \ frameName = [NSString stringWithFormat:@\"bg%i.png\", i];\n    CCSprite* sprite\
    \ = [CCSprite spriteWithSpriteFrameName:frameName];\n\n    // Position the new\
    \ sprite one screen width to the right\n    sprite.position = CGPointMake(screenSize.width\
    \ + screenSize.width / 2,\n        screenSize.height / 2);\n\n    // Flip the\
    \ sprite so that it aligns perfectly with its neighbor\n    sprite.flipX = YES;\n\
    \n    // Add the sprite using the same tag offset by numStripes\n    [spriteBatch\
    \ addChild:sprite z:i tag:i + numStripes];\n}\n```\n\nThe idea is to add one more\
    \ stripe of the same type each. They are positioned so that they align with the\
    \ right end of the first stripe’s position. In effect, this doubles the total\
    \ width of the background stripes, and that will be enough for endless scrolling.\
    \ But I’ll get to that shortly.\n\nFirst I need to point out that the new neighboring\
    \ images’ X coordinates are flipped (mirrored along the y-axis). This is done\
    \ so that the images match visually where they are aligned, to avoid any sharp\
    \ edges. The new images also get a different tag number, one that is offset by\
    \ the number of stripes in use. This way, it will be easy to get to the neighboring\
    \ stripe by either adding or deducting `numStripes` from the tag number.\n\nRight\
    \ now, the background image scrolls just a bit longer before showing the blank\
    \ canvas behind the images. The project `ScrollingWithJoy03` completes the effort\
    \ and adds totally infinite scrolling. But first the `anchorPoint` property of\
    \ the stripes needs to change to make things a little easier. The `x` position\
    \ is now simply at 0:\n\n```\nsprite.anchorPoint = CGPointMake(0, 0.5f);\nsprite.position\
    \ = CGPointMake(0, screenSize.height / 2);\n```\n\nThe same goes for the secondary,\
    \ flipped stripes, which now only need to be offset by the screen width:\n\n```\n\
    sprite.anchorPoint = CGPointMake(0, 0.5f);\nsprite.position = CGPointMake(screenSize.width,\
    \ screenSize.height / 2);\n```\n\nThe stripes’ `anchorPoint` is changed from its\
    \ default `(0.5f, 0.5f)` to `(0, 0.5f)`. This makes it easier to work with the\
    \ parallax sprites, since in this particular case you don’t want to have to take\
    \ into account that that texture’s origin and the sprite’s `x` position aren’t\
    \ at the same location. [Figure 7–6](#Chapter07.html#fig_7_6) shows how this makes\
    \ it easier to calculate the `x` position.\n\n![images](images/0706.jpg)\n\n**Figure\
    \ 7–6.** *Anchor point moved to the left for simplicity*\n\nYou can see in [Listing\
    \ 7–4](#Chapter07.html#list_7_4) how this is helpful in the changed `update` method,\
    \ which now gives us endless scrolling.\n\n**Listing 7–4.** *Moving the Image\
    \ Pairs Seamlessly*\n\n```\n-(void) update:(ccTime)delta\n{\n    CCSprite* sprite;\n\
    \    CCARRAY_FOREACH([spriteBatch children], sprite)\n    {\n        NSNumber*\
    \ factor = [speedFactors objectAtIndex:sprite.zOrder];\n        CGPoint pos =\
    \ sprite.position;\n        pos.x -= scrollSpeed * [factor floatValue] * (delta\
    \ * 50);\n\n        // Reposition stripes when they're out of bounds\n       \
    \ if (pos.x < -screenSize.width)\n        {\n            pos.x += screenSize.width\
    \ * 2;\n        }\n\n        sprite.position = pos;\n    }\n}\n```\n\nThe stripes’\
    \ `x` position now only needs to be checked if it is less than negative screen\
    \ width and, if it is, it is multiplied by twice the screen width. Essentially,\
    \ this moves the sprite that has just left the screen on the left side to the\
    \ right side, just outside the screen. This repeats forever with the same two\
    \ sprites, giving the effect of endless scrolling.\n\n**TIP:** Notice that the\
    \ background of the screen scrolls, but the ship stays in place. Inexperienced\
    \ game developers often have the misconception that everything on the screen needs\
    \ to be scrolling to achieve the effect of game objects passing by the player\
    \ character as he progresses through the game world. Instead, you can much more\
    \ easily create the illusion of objects moving on the screen by moving the background\
    \ layers but keeping the player character fixed in place. Popular examples of\
    \ games that make use of this visual illusion are `Super Turbo Action Pig`, `Canabalt`,\
    \ `Super Blast`, `Doodle Jump`, and `Zombieville USA`. Typically, the game objects\
    \ scrolling into view are randomly generated shortly before they appear, and when\
    \ they leave the screen, they are removed from the game. In [Chapter 11](#Chapter11.html#ch11),\
    \ I’ll make use of the same effect where the player character remains in the center\
    \ of the screen while only the game world underneath the player is actually moving,\
    \ giving the impression that the player moves around in the world.\n\n#### Fixing\
    \ the Flicker\n\nSo far, so good. There’s only one issue remaining. If you look\
    \ closely, you will notice a vertical, flickering line appearing where the two\
    \ background stripes meet. That’s where they align with each other. This line\
    \ appears because of rounding errors in their positions in combination with subpixel\
    \ rendering. From time to time, a 1-pixel-wide gap can appear for just a fraction\
    \ of a second. It’s still noticeable and is something you should get rid of for\
    \ a commercial-quality game.\n\nThe simplest solution is to overlap the stripes\
    \ by 1 pixel. In the `ScrollingWithJoy04` project I changed the initial positions\
    \ for the flipped background stripes by subtracting 1 pixel from the `x` position:\n\
    \n```\nsprite.position = CGPointMake(screenSize.width - 1, screenSize.height /\
    \ 2);\n```\n\nThis also requires updating the stripe-repositioning code in the\
    \ `update` method so that the stripe is positioned 2 pixels further to the left\
    \ than before:\n\n```\n// Reposition stripes when they're out of bounds\nif (pos.x\
    \ < -screenSize.width)\n{\n    pos.x += (screenSize.width * 2) - 2;\n}\n```\n\n\
    Why 2 pixels? Well, since the initial position of the flipped stripes is already\
    \ moved to the left by 1 pixel, we have to move all of them 2 pixels to the left\
    \ each time they flip around to maintain the same distance and to keep the overlap\
    \ of 1 pixel.\n\nAn alternative solution would be to update only the position\
    \ of the currently leftmost sprite and then find the sprite that is aligned to\
    \ the right of it and offset it by exactly the screen width. This way, you also\
    \ avoid the rounding errors. [Figure 7–7](#Chapter07.html#fig_7_7) shows the finished\
    \ result with the final graphics.\n\n![images](images/0707.jpg)\n\n**Figure 7–7.**\
    \ *The result: an infinitely scrolling parallax background*"
  raw: '#### Scrolling to Infinity and Beyond


    Also in ScrollingWithJoy02 is the first step toward endless scrolling. As you
    can see in [Listing 7–3](#Chapter07.html#list_7_3), I simply added seven more
    background stripes to the `CCSpriteBatchNode`, although with a slightly different
    setup.


    **Listing 7–3.** *Adding Off-Screen Background Images*


    `// Add seven more stripes, flip them, and position them next to their neighbor
    stripe`

    `for (int i = 0; i < numStripes; i++)`

    `{`

    `    NSString* frameName = [NSString stringWithFormat:@"bg%i.png", i];`

    `    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];`


    `    // Position the new sprite one screen width to the right`

    `    sprite.position = CGPointMake(screenSize.width + screenSize.width / 2,`

    `        screenSize.height / 2);`


    `    // Flip the sprite so that it aligns perfectly with its neighbor`

    `    sprite.flipX = YES;`


    `    // Add the sprite using the same tag offset by numStripes`

    `    [spriteBatch addChild:sprite z:i tag:i + numStripes];`

    `}`


    The idea is to add one more stripe of the same type each. They are positioned
    so that they align with the right end of the first stripe’s position. In effect,
    this doubles the total width of the background stripes, and that will be enough
    for endless scrolling. But I’ll get to that shortly.


    First I need to point out that the new neighboring images’ X coordinates are flipped
    (mirrored along the y-axis). This is done so that the images match visually where
    they are aligned, to avoid any sharp edges. The new images also get a different
    tag number, one that is offset by the number of stripes in use. This way, it will
    be easy to get to the neighboring stripe by either adding or deducting `numStripes`
    from the tag number.


    Right now, the background image scrolls just a bit longer before showing the blank
    canvas behind the images. The project ScrollingWithJoy03 completes the effort
    and adds totally infinite scrolling. But first the `anchorPoint` property of the
    stripes needs to change to make things a little easier. The `x` position is now
    simply at 0:


    `sprite.anchorPoint = CGPointMake(0, 0.5f);`

    `sprite.position = CGPointMake(0, screenSize.height / 2);`


    The same goes for the secondary, flipped stripes, which now only need to be offset
    by the screen width:


    `sprite.anchorPoint = CGPointMake(0, 0.5f);`

    `sprite.position = CGPointMake(screenSize.width, screenSize.height / 2);`


    The stripes’ `anchorPoint` is changed from its default `(0.5f, 0.5f)` to `(0,
    0.5f)`. This makes it easier to work with the parallax sprites, since in this
    particular case you don’t want to have to take into account that that texture’s
    origin and the sprite’s `x` position aren’t at the same location. [Figure 7–6](#Chapter07.html#fig_7_6)
    shows how this makes it easier to calculate the `x` position.


    ![images](images/0706.jpg)


    **Figure 7–6.** *Anchor point moved to the left for simplicity*


    You can see in [Listing 7–4](#Chapter07.html#list_7_4) how this is helpful in
    the changed `update` method, which now gives us endless scrolling.


    **Listing 7–4.** *Moving the Image Pairs Seamlessly*


    `-(void) update:(ccTime)delta`

    `{`

    `    CCSprite* sprite;`

    `    CCARRAY_FOREACH([spriteBatch children], sprite)`

    `    {`

    `        NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];`

    `        CGPoint pos = sprite.position;`

    `        pos.x -= scrollSpeed * [factor floatValue] * (delta * 50);`


    **`        // Reposition stripes when they''re out of bounds`**

    **`        if (pos.x < -screenSize.width)`**

    **`        {`**

    **`            pos.x += screenSize.width * 2;`**

    **`        }`**


    `        sprite.position = pos;`

    `    }`

    `}`


    The stripes’ `x` position now only needs to be checked if it is less than negative
    screen width and, if it is it is, multiplied by twice the screen width. Essentially,
    this moves the sprite that has just left the screen on the left side to the right
    side, just outside the screen. This repeats forever with the same two sprites,
    giving the effect of endless scrolling.


    **TIP:** Notice that the background of the screen scrolls, but the ship stays
    in place. Inexperienced game developers often have the misconception that everything
    on the screen needs to be scrolling to achieve the effect of game objects passing
    by the player character as he progresses through the game world. Instead, you
    can much more easily create the illusion of objects moving on the screen by moving
    the background layers but keeping the player character fixed in place. Popular
    examples of games that make use of this visual illusion are Super Turbo Action
    Pig, Canabalt, Super Blast, Doodle Jump, and Zombieville USA. Typically, the game
    objects scrolling into view are randomly generated shortly before they appear,
    and when they leave the screen, they are removed from the game. In [Chapter 11](#Chapter11.html#ch11),
    I’ll make use of the same effect where the player character remains in the center
    of the screen while only the game world underneath the player is actually moving,
    giving the impression that the player moves around in the world.


    #### Fixing the Flicker


    So far, so good. There’s only one issue remaining. If you look closely, you will
    notice a vertical, flickering line appearing where the two background stripes
    meet. That’s where they align with each other. This line appears because of rounding
    errors in their positions in combination with subpixel rendering. From time to
    time, a 1-pixel-wide gap can appear for just a fraction of a second. It’s still
    noticeable and is something you should get rid of for a commercial-quality game.


    The simplest solution is to overlap the stripes by 1 pixel. In the ScrollingWithJoy04
    project I changed the initial positions for the flipped background stripes by
    subtracting 1 pixel from the `x` position:


    `sprite.position = CGPointMake(screenSize.width - 1, screenSize.height / 2);`


    This also requires updating the stripe-repositioning code in the `update` method
    so that the stripe is positioned 2 pixels further to the left than before:


    `// Reposition stripes when they''re out of bounds`

    `if (pos.x < -screenSize.width)`

    `{`

    `    pos.x += (screenSize.width * 2) - 2;`

    `}`


    Why 2 pixels? Well, since the initial position of the flipped stripes is already
    moved to the left by 1 pixel, we have to move all of them 2 pixels to the left
    each time they flip around to maintain the same distance and to keep the overlap
    of 1 pixel.


    An alternative solution would be to update only the position of the currently
    leftmost sprite and then find the sprite that is aligned to the right of it and
    offset it by exactly the screen width. This way, you also avoid the rounding errors.
    [Figure 7–7](#Chapter07.html#fig_7_7) shows the finished result with the final
    graphics.


    ![images](images/0707.jpg)


    **Figure 7–7.** *The result: an infinitely scrolling parallax background*'
  trans: "\n#### 滚动至无限远方\n\n同样在 `ScrollingWithJoy02` 工程中，我们迈出了实现无尽滚动的第一步。正如你将在代码清单\
    \ 7–3 中看到的，我仅仅在 `CCSpriteBatchNode` 中添加了七个额外的背景条纹，不过其设置方式略有不同。\n\n**代码清单 7–3.**\
    \ *添加屏幕外背景图像*\n\n```\n// 添加七个额外条纹，翻转它们，并让它们的相邻条纹彼此对齐\nfor (int i = 0; i < numStripes;\
    \ i++)\n{\n    NSString* frameName = [NSString stringWithFormat:@\"bg%i.png\"\
    , i];\n    CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:frameName];\n\
    \n    // 将新精灵定位在屏幕宽度右侧一个屏幕的位置\n    sprite.position = CGPointMake(screenSize.width\
    \ + screenSize.width / 2,\n        screenSize.height / 2);\n\n    // 翻转精灵，使其与相邻条纹完美对齐\n\
    \    sprite.flipX = YES;\n\n    // 使用偏移了 numStripes 的相同标签添加精灵\n    [spriteBatch\
    \ addChild:sprite z:i tag:i + numStripes];\n}\n```\n\n其思路是每种类型再添加一个条纹。这些条纹的定位方式使其与第一个条纹位置的右端对齐。实际上，这会将背景条纹的总宽度加倍，足以实现无尽滚动。我马上就会谈到这一点。\n\
    \n首先，我需要指出，这些新相邻图像的 X 坐标是被翻转过的（沿 y 轴镜像）。这样做是为了让图像在视觉上对齐时能够自然衔接，避免出现明显的接缝。这些新图像还被赋予了不同的标签编号，该编号偏移了当前使用的条纹数量。这样一来，通过标签编号加减\
    \ `numStripes`，就能轻松获取相邻的条纹。\n\n目前，背景图像在显示图像后方空白画布之前，其滚动距离仅仅稍长了一些。`ScrollingWithJoy03`\
    \ 工程完成了这项任务，并实现了完全无限的滚动。但首先，需要更改条纹的 `anchorPoint` 属性，以使操作更简便一些。现在，`x` 位置统一设为 0：\n\
    \n```\nsprite.anchorPoint = CGPointMake(0, 0.5f);\nsprite.position = CGPointMake(0,\
    \ screenSize.height / 2);\n```\n\n对于次要的、被翻转的条纹也是如此，现在它们只需要偏移屏幕宽度即可：\n\n```\nsprite.anchorPoint\
    \ = CGPointMake(0, 0.5f);\nsprite.position = CGPointMake(screenSize.width, screenSize.height\
    \ / 2);\n```\n\n条纹的 `anchorPoint` 从默认的 `(0.5f, 0.5f)` 更改为 `(0, 0.5f)`。这使得处理视差精灵更加方便，因为在当前特定情况下，你不需要再去考虑纹理原点与精灵\
    \ `x` 位置不在同一点的问题。图 7–6 展示了这样做如何能更简便地计算 `x` 位置。\n\n![images](img/0706.jpg)\n\n\
    **图 7–6.** *为了简便起见，将锚点移至左侧*\n\n你可以在代码清单 7–4 中看到，这在修改后的 `update` 方法中非常有用，该方法现在为我们提供了无尽滚动效果。\n\
    \n**代码清单 7–4.** *无缝移动图像对*\n\n```\n-(void) update:(ccTime)delta\n{\n    CCSprite*\
    \ sprite;\n    CCARRAY_FOREACH([spriteBatch children], sprite)\n    {\n      \
    \  NSNumber* factor = [speedFactors objectAtIndex:sprite.zOrder];\n        CGPoint\
    \ pos = sprite.position;\n        pos.x -= scrollSpeed * [factor floatValue] *\
    \ (delta * 50);\n\n        // 当条纹超出边界时重新定位\n        if (pos.x < -screenSize.width)\n\
    \        {\n            pos.x += screenSize.width * 2;\n        }\n\n        sprite.position\
    \ = pos;\n    }\n}\n```\n\n现在只需检查条纹的 `x` 位置是否小于负屏幕宽度，如果是，则将其加上两倍的屏幕宽度。其本质是，将刚离开屏幕左侧的精灵移动到屏幕右侧、刚好在屏幕外的位置。这一过程由相同的两个精灵无限重复，从而产生无尽滚动的效果。\n\
    \n**提示：** 请注意，屏幕背景在滚动，但飞船保持不动。缺乏经验的游戏开发者常常会误以为，要实现游戏对象在玩家角色穿越游戏世界时从其身旁掠过的效果，屏幕上的所有内容都需要滚动。然而，更简便的方法是移动背景层，同时将玩家角色固定在原位，从而在屏幕上营造出物体移动的错觉。利用这种视觉错觉的知名游戏示例包括\
    \ `Super Turbo Action Pig`、`Canabalt`、`Super Blast`、`Doodle Jump` 和 `Zombieville\
    \ USA`。通常，即将滚入视线的游戏对象会在出现前不久随机生成，并在离开屏幕后从游戏中移除。在第 11 章中，我将利用同样的效果，让玩家角色保持在屏幕中心，而只有玩家脚下的游戏世界在真正移动，从而给玩家一种在游戏世界中自由移动的印象。\n\
    \n#### 修复闪烁问题\n\n到目前为止，一切顺利。只剩下一个问题。如果你仔细观察，会发现两个背景条纹拼接处出现了一条垂直的闪烁线。那是它们彼此对齐的地方。这条线是由于子像素渲染结合其位置的四舍五入误差造成的。有时，一个\
    \ 1 像素宽的间隙会出现，仅仅持续一瞬间。但这仍然很显眼，对于商业品质的游戏来说需要消除。\n\n最简单的解决方案是让条纹重叠 1 像素。在 `ScrollingWithJoy04`\
    \ 工程中，我将翻转背景条纹的初始 `x` 位置减去了 1 像素，如下所示：\n\n```\nsprite.position = CGPointMake(screenSize.width\
    \ - 1, screenSize.height / 2);\n```\n\n这还需要更新 `update` 方法中的条纹重新定位代码，以便将条纹向左定位的位置比以前多\
    \ 2 像素：\n\n```\n// 当条纹超出边界时重新定位\nif (pos.x < -screenSize.width)\n{\n    pos.x\
    \ += (screenSize.width * 2) - 2;\n}\n```\n\n为什么是 2 像素？这是因为翻转条纹的初始位置已经向左移动了 1 像素，所以每次它们翻转时，我们都必须将它们全部向左移动\
    \ 2 像素，才能保持相同的距离并维持 1 像素的重叠。\n\n另一种解决方案是只更新当前最左侧精灵的位置，然后找到与之右侧对齐的精灵，并将其偏移正好一个屏幕宽度。这样也能避免四舍五入误差。图\
    \ 7–7 展示了使用最终图形完成后的效果。\n\n![images](img/0707.jpg)\n\n**图 7–7.** *成果：无限滚动的视差背景*\n"
- fmt: "# Repeat, Repeat, Repeat\n\nAnother neat trick deserves mention in this chapter.\
    \ You can set any texture to repeat over a certain rectangular area. If you make\
    \ this area big enough, you can have this texture repeat nearly endlessly. At\
    \ least several thousand pixels or dozens of screen areas can be covered with\
    \ a repeating texture, with no penalty to performance or memory usage.\n\nThe\
    \ trick is to use the `GL_REPEAT` texture parameter supported by OpenGL. But it\
    \ only works with square images that are exactly a power of 2, like 32×32 or 128×128\
    \ pixels. [Listing 7–5](#Chapter07.html#list_7_5) shows the code.\n\n**Listing\
    \ 7–5.** *Repeating Background with GL_REPEAT*\n\n```\nCGRect repeatRect = CGRectMake(-5000,\
    \ -5000, 5000, 5000);\nCCSprite* sprite = [CCSprite spriteWithFile:@”square.png”\
    \ rect:repeatRect];\nccTexParams params =\n{\n    GL_LINEAR, // texture minifying\
    \ function\n    GL_LINEAR, // texture magnification function\n    GL_REPEAT, //\
    \ how texture should wrap along X coordinates\n    GL_REPEAT  // how texture should\
    \ wrap along Y coordinates\n};\n[sprite.texture setTexParameters:&params];\n```\n\
    \nIn this case, the sprite must be initialized with a `rect` that determines the\
    \ area the sprite will occupy. The `ccTexParams` struct is initialized with the\
    \ wrap parameters for the texture coordinates set to `GL_REPEAT`. Don’t worry\
    \ if that doesn’t mean anything to you. These OpenGL parameters are then set on\
    \ the sprite’s texture using the `CCTexture2D` method `setTexParameters`.\n\n\
    The result is a tiled area repeating the same `square.png` image over and over\
    \ again. If you move the sprite, the whole area covered by the `repeatRect` is\
    \ moved. You could use this trick to remove the bottommost background stripe and\
    \ replace it with a smaller image that simply repeats. I’ll leave that up to you\
    \ as an exercise.\n\n## A Virtual Joypad\n\nSince the iOS devices all use a touchscreen\
    \ for input and have no buttons, D-pads, or analog joypads like conventional mobile\
    \ gaming devices, we need something called a *virtual joypad*. This emulates the\
    \ behavior of digital or analog thumbsticks by allowing you to touch the screen\
    \ where the digipad or thumbstick is displayed and move your finger over it to\
    \ control the action on the screen. Buttons are also designated areas of the touchscreen\
    \ that you can tap or hold to cause actions on the screen. [Figure 7–8](#Chapter07.html#fig_7_8)\
    \ shows a virtual joypad in action.\n\n![images](images/0708.jpg)\n\n**Figure\
    \ 7–8.** *A skinned analog thumbstick and fire button created with SneakyInput*\n\
    \n**CAUTION:** Virtual joypads resemble joypad controllers in looks but never\
    \ in feel. The user is still touching a flat surface with no feedback to the fingers\
    \ as to how far the virtual analog stick was moved or whether the virtual button\
    \ has been pressed correctly. A number of players feel uneasy controlling a game\
    \ with virtual joypads. It has become more or less common wisdom that a virtual\
    \ joypad should have no more than two or three controller elements, usually a\
    \ stick/pad (sometimes limited to two directions) and one or two buttons. Add\
    \ more, and you’re going to make your game exponentially harder to control.\n\n\
    ### Introducing SneakyInput\n\nOver time, many a developer has faced the problem\
    \ of implementing a virtual joypad. There are many ways to go about this, and\
    \ even more ways to fail at it. But why spend time on that if there’s a ready-to-use\
    \ solution?\n\nThis is generally sound advice. Before you program anything that\
    \ seems reasonably common that others might have worked on before, always check\
    \ to see whether there is a general-purpose solution available that you can just\
    \ use instead of having to spend a lot of time creating it yourself. In this case,\
    \ SneakyInput is just too good to be ignored.\n\nSneakyInput was created by Nick\
    \ Pannuto, with skinning examples by CJ Hanson. SneakyInput is open source software\
    \ and free to download, but if you like this product, please consider making a\
    \ donation to Nick Pannuto at this link:\n[`http://pledgie.com/campaigns/9124`](http://pledgie.com/campaigns/9124).\n\
    \nThe SneakyInput source code is hosted on GitHub, a social coding web site, at\
    \ this link:\n[`http://github.com/sneakyness/SneakyInput`](http://github.com/sneakyness/SneakyInput).\n\
    \nIt may not be immediately obvious what you have to do to download the source\
    \ code from GitHub. When you browse to the web site and click any of the files,\
    \ you’ll see the actual source code displayed in your browser. But you want the\
    \ full source code project, not individual files. What you do is locate the **Download\
    \ Source** button in the upper-right corner of the web site. You then choose one\
    \ of the archive types—it doesn’t really matter which—and save the file to your\
    \ computer and extract it.\n\nAt this point, you might want to open the `SneakyInputXcode`\
    \ project and compile it. Since SneakyInput comes together with cocos2d integrated\
    \ into the project, it’s possible that the cocos2d version used by SneakyInput\
    \ may not be the most current version. If the project is up and running, you’ll\
    \ see an analog pad and a button as simple circles. The analog virtual thumbstick\
    \ moves the “Hello World” label on the screen, while the button changes the label’s\
    \ colors on touch.\n\n[Figure 7–9](#Chapter07.html#fig_7_9) shows the SneakyInput\
    \ sample project running in the iPhone Simulator. The sample project includes\
    \ a virtual analog thumbstick that controls the “Hello World” label’s position,\
    \ as well as a button in the lower-right corner that changes the label’s color\
    \ when touched. The buttons aren’t skinned; they use the `ColoredCircleSprite`\
    \ class.\n\n![images](images/0709.jpg)\n\n**Figure 7–9.** *The SneakyInput sample\
    \ project*\n\nBut of course the sticks and buttons can also be skinned. Skinning,\
    \ sometimes referred to as *texturing*, means using images from textures instead\
    \ of flat colors to display the sticks and buttons, as you saw in [Figure 7–8](#Chapter07.html#fig_7_8).\n\
    \n### Integrating SneakyInput\n\nI already have a project fully set up and functioning—in\
    \ this case `ScrollingWithJoy05`. I don’t want to use the project provided by\
    \ SneakyInput. How do I get it to work with my project?\n\nThis is an issue that\
    \ isn’t limited to SneakyInput but possibly any source code project you can download\
    \ that comes already bundled with its own version of cocos2d. In most cases, and\
    \ as long as the programming language of that source code is Objective-C, you\
    \ only have to figure out which of the project’s files are necessary and add them\
    \ to your own project. There’s no clear guideline, however, since every project\
    \ is different.\n\nI can tell you which files you need to add to your project\
    \ regarding SneakyInput, however. It consists at its core of five classes:\n\n\
    *   `SneakyButton` and `SneakyButtonSkinnedBase`\n*   `SneakyJoystick` and `SneakyJoystickSkinnedBase`\n\
    *   `ColoredCircleSprite` (optional)\n\nThe remaining files are not needed but\
    \ serve as references. [Figure 7–10](#Chapter07.html#fig_7_10) shows the selection\
    \ I’ve made in the **Add Files To …** dialog. My rationale for not including certain\
    \ classes was by first making an educated guess and then seeing whether I was\
    \ right by compiling the project after having added the files I believed to be\
    \ necessary.\n\nThe `HelloWorldScene` class is created by a cocos2d project template\
    \ and most likely doesn’t contain anything but example code. Of course, I already\
    \ have an `AppDelegate` in my project, so I don’t need to be adding SneakyInput’s\
    \ `AppDelegate` class—it might be in conflict with the existing `AppDelegate`.\
    \ Then there are two classes explicitly suffixed with `Example`, which indicates\
    \ that these files are not core classes for SneakyInput but further example code.\n\
    \n![images](images/0710.jpg)\n\n**Figure 7–10.** *These files are needed to get\
    \ SneakyInput to work in your own project; the other files are used only for example\
    \ code.*"
  raw: '#### Repeat, Repeat, Repeat


    Another neat trick deserves mention in this chapter. You can set any texture to
    repeat over a certain rectangular area. If you make this area big enough, you
    can have this texture repeat nearly endlessly. At least several thousand pixels
    or dozens of screen areas can be covered with a repeating texture, with no penalty
    to performance or memory usage.


    The trick is to use the `GL_REPEAT` texture parameter supported by OpenGL. But
    it only works with square images that are exactly a power of 2, like 32×32 or
    128×128 pixels. [Listing 7–5](#Chapter07.html#list_7_5) shows the code.


    **Listing 7–5.** *Repeating Background with GL_REPEAT*


    `CGRect repeatRect = CGRectMake(-5000, -5000, 5000, 5000);`

    `CCSprite* sprite = [CCSprite spriteWithFile:@”square.png” rect:repeatRect];`

    `ccTexParams params =`

    `{`

    `    GL_LINEAR, // texture minifying function`

    `    GL_LINEAR, // texture magnification function`

    `    GL_REPEAT, // how texture should wrap along X coordinates`

    `    GL_REPEAT  // how texture should wrap along Y coordinates`

    `};`

    `[sprite.texture setTexParameters:&params];`


    In this case, the sprite must be initialized with a `rect` that determines the
    area the sprite will occupy. The `ccTexParams` struct is initialized with the
    wrap parameters for the texture coordinates set to `GL_REPEAT`. Don’t worry if
    that doesn’t mean anything to you. These OpenGL parameters are then set on the
    sprite’s texture using the `CCTexture2D` method `setTexParameters`.


    The result is a tiled area repeating the same square.png image over and over again.
    If you move the sprite, the whole area covered by the `repeatRect` is moved. You
    could use this trick to remove the bottommost background stripe and replace it
    with a smaller image that simply repeats. I’ll leave that up to you as an exercise.


    ### A Virtual Joypad


    Since the iOS devices all use a touchscreen for input and have no buttons, D-pads,
    or analog joypads like conventional mobile gaming devices, we need something called
    a *virtual joypad*. This emulates the behavior of digital or analog thumbsticks
    by allowing you to touch the screen where the digipad or thumbstick is displayed
    and move your finger over it to control the action on the screen. Buttons are
    also designated areas of the touchscreen that you can tap or hold to cause actions
    on the screen. [Figure 7–8](#Chapter07.html#fig_7_8) shows a virtual joypad in
    action.


    ![images](images/0708.jpg)


    **Figure 7–8.** *A skinned analog thumbstick and fire button created with SneakyInput*


    **CAUTION:** Virtual joypads resemble joypad controllers in looks but never in
    feel. The user is still touching a flat surface with no feedback to the fingers
    as to how far the virtual analog stick was moved or whether the virtual button
    has been pressed correctly. A number of players feel uneasy controlling a game
    with virtual joypads. It has become more or less common wisdom that a virtual
    joypad should have no more than two or three controller elements, usually a stick/pad
    (sometimes limited to two directions) and one or two buttons. Add more, and you’re
    going to make your game exponentially harder to control.


    #### Introducing SneakyInput


    Over time, many a developer has faced the problem of implementing a virtual joypad.
    There are many ways to go about this, and even more ways to fail at it. But why
    spend time on that if there’s a ready-to-use solution?


    This is generally sound advice. Before you program anything that seems reasonably
    common that others might have worked on before, always check to see whether there
    is a general-purpose solution available that you can just use instead of having
    to spend a lot of time creating it yourself. In this case, SneakyInput is just
    too good to be ignored.


    SneakyInput was created by Nick Pannuto, with skinning examples by CJ Hanson.
    SneakyInput is open source software and free to download, but if you like this
    product, please consider making a donation to Nick Pannuto at this link:

    [`http://pledgie.com/campaigns/9124`](http://pledgie.com/campaigns/9124).


    The SneakyInput source code is hosted on GitHub, a social coding web site, at
    this link:

    [`http://github.com/sneakyness/SneakyInput`](http://github.com/sneakyness/SneakyInput).


    It may not be immediately obvious what you have to do to download the source code
    from GitHub. When you browse to the web site and click any of the files, you’ll
    see the actual source code displayed in your browser. But you want the full source
    code project, not individual files. What you do is locate the **Download Source**
    button in the upper-right corner of the web site. You then choose one of the archive
    types—it doesn’t really matter which—and save the file to your computer and extract
    it.


    At this point, you might want to open the SneakyInputXcode project and compile
    it. Since SneakyInput comes together with cocos2d integrated into the project,
    it’s possible that the cocos2d version used by SneakyInput may not be the most
    current version. If the project is up and running, you’ll see an analog pad and
    a button as simple circles. The analog virtual thumbstick moves the “Hello World”
    label on the screen, while the button changes the label’s colors on touch.


    [Figure 7–9](#Chapter07.html#fig_7_9) shows the SneakyInput sample project running
    in the iPhone Simulator. The sample project includes a virtual analog thumbstick
    that controls the “Hello World” label’s position, as well as a button in the lower-right
    corner that changes the label’s color when touched. The buttons aren’t skinned;
    they use the `ColoredCircleSprite` class.


    ![images](images/0709.jpg)


    **Figure 7–9.** *The SneakyInput sample project*


    But of course the sticks and buttons can also be skinned. Skinning, sometimes
    referred to as *texturing*, means using images from textures instead of flat colors
    to display the sticks and buttons, as you saw in [Figure 7–8](#Chapter07.html#fig_7_8).


    #### Integrating SneakyInput


    I already have a project fully set up and functioning—in this case ScrollingWithJoy05\.
    I don’t want to use the project provided by SneakyInput. How do I get it to work
    with my project?


    This is an issue that isn’t limited to SneakyInput but possibly any source code
    project you can download that comes already bundled with its own version of cocos2d.
    In most cases, and as long as the programming language of that source code is
    Objective-C, you only have to figure out which of the project’s files are necessary
    and add them to your own project. There’s no clear guideline, however, since every
    project is different.


    I can tell you which files you need to add to your project regarding SneakyInput,
    however. It consists at its core of five classes:


    *   `SneakyButton` and `SneakyButtonSkinnedBase`

    *   `SneakyJoystick` and `SneakyJoystickSkinnedBase`

    *   `ColoredCircleSprite` (optional)


    The remaining files are not needed but serve as references. [Figure 7–10](#Chapter07.html#fig_7_10)
    shows the selection I’ve made in the **Add Files To …** dialog. My rationale for
    not including certain classes was by first making an educated guess and then seeing
    whether I was right by compiling the project after having added the files I believed
    to be necessary.


    The `HelloWorldScene` class is created by a cocos2d project template and most
    likely doesn’t contain anything but example code. Of course, I already have an
    `AppDelegate` in my project, so I don’t need to be adding SneakyInput’s `AppDelegate`
    class—it might be in conflict with the existing `AppDelegate`. Then there are
    two classes explicitly suffixed with `Example`, which indicates that these files
    are not core classes for SneakyInput but further example code.


    ![images](images/0710.jpg)


    **Figure 7–10.** *These files are needed to get SneakyInput to work in your own
    project; the other files are used only for example code.*'
  trans: "\n# 重复，重复，再重复\n\n本章中还有一个值得一提的巧妙技巧。你可以将任意纹理设置为在某个矩形区域内重复。如果将该区域设得足够大，就可以让纹理近乎无限地重复。至少可以覆盖数千个像素或几十个屏幕区域，而不会对性能或内存使用造成任何影响。\n\
    \n这个技巧的关键在于使用 OpenGL 支持的 `GL_REPEAT` 纹理参数。但它仅适用于边长恰好为 2 的幂次方的正方形图像，例如 32×32 或\
    \ 128×128 像素。代码清单 7–5 展示了相关代码。\n\n**代码清单 7–5.** *使用 GL_REPEAT 实现重复背景*\n\n```\n\
    CGRect repeatRect = CGRectMake(-5000, -5000, 5000, 5000);\nCCSprite* sprite =\
    \ [CCSprite spriteWithFile:@”square.png” rect:repeatRect];\nccTexParams params\
    \ =\n{\n    GL_LINEAR, // 纹理缩小函数\n    GL_LINEAR, // 纹理放大函数\n    GL_REPEAT, //\
    \ 纹理在 X 坐标上的环绕方式\n    GL_REPEAT  // 纹理在 Y 坐标上的环绕方式\n};\n[sprite.texture setTexParameters:&params];\n\
    ```\n\n在此例中，精灵必须使用一个 `rect` 来初始化，该矩形决定了精灵将占据的区域。`ccTexParams` 结构体通过将纹理坐标的环绕参数设置为\
    \ `GL_REPEAT` 进行初始化。如果你不理解这些内容，也无需担心。这些 OpenGL 参数随后会通过 `CCTexture2D` 的 `setTexParameters`\
    \ 方法设置到精灵的纹理上。\n\n最终结果是一个平铺区域，反复重复显示相同的 `square.png` 图像。如果移动精灵，`repeatRect` 覆盖的整个区域也会随之移动。你可以利用这个技巧移除最底部的背景条，并用一个更小的图像替代，使其简单地重复。我将把这个留给你作为练习。\n\
    \n## 虚拟摇杆\n\n由于 iOS 设备均使用触摸屏进行输入，并且没有传统移动游戏设备上的方向键或模拟摇杆，因此我们需要一种称为*虚拟摇杆*的东西。它通过允许你触摸屏幕上显示数字方向键或摇杆的位置，并在其上滑动手指来控制屏幕上的动作，从而模拟数字或模拟摇杆的行为。按钮也是触摸屏上的指定区域，你可以点击或按住它们来触发屏幕上的操作。图\
    \ 7–8 展示了一个工作中的虚拟摇杆。\n\n![images](img/0708.jpg)\n\n**图 7–8.** *使用 SneakyInput\
    \ 创建的、带有皮肤的模拟摇杆和开火按钮*\n\n**警告：** 虚拟摇杆在外观上模仿了摇杆控制器，但在手感上永远无法比拟。用户仍然是在触摸一个平坦的表面，手指无法获得关于虚拟摇杆移动了多远或虚拟按钮是否正确按下的反馈。许多玩家在使用虚拟摇杆控制游戏时会感到不适。一个普遍的经验法则是，虚拟摇杆最多不应超过两到三个控制元件，通常是一个摇杆/方向键（有时限制为两个方向）和一两个按钮。如果再增加，你的游戏操控难度将会呈指数级增长。\n\
    \n### 介绍 SneakyInput\n\n长期以来，许多开发者都面临过实现虚拟摇杆的问题。实现的方式有很多种，而失败的方式甚至更多。但既然已经有了现成的解决方案，为什么还要在那上面耗费时间呢？\n\
    \n这通常是一个明智的建议。在编写任何看起来相当常见且可能已被他人攻克过的代码之前，总是先检查一下是否有可用的通用解决方案，这样你就可以直接使用，而不必花费大量时间自己创建。在这种情况下，SneakyInput\
    \ 简直好得让人无法忽视。\n\nSneakyInput 由 Nick Pannuto 创建，皮肤示例由 CJ Hanson 提供。SneakyInput\
    \ 是一款开源软件，可免费下载，但如果你喜欢这个产品，请考虑通过此链接向 Nick Pannuto 捐款：\n[`http://pledgie.com/campaigns/9124`](http://pledgie.com/campaigns/9124)。\n\
    \nSneakyInput 的源代码托管在社交编码网站 GitHub 上，链接为：\n[`http://github.com/sneakyness/SneakyInput`](http://github.com/sneakyness/SneakyInput)。\n\
    \n从 GitHub 下载源代码的方式可能不是一目了然的。当你浏览该网站并点击任何文件时，你会在浏览器中看到实际的源代码。但你想要的是完整的源代码项目，而不是单个文件。你需要做的是在网站右上角找到**下载源代码**按钮。然后选择一种存档格式（选哪种都无所谓），将文件保存到你的计算机并解压。\n\
    \n此时，你可能想打开 `SneakyInputXcode` 项目并进行编译。由于 SneakyInput 与集成到项目中的 cocos2d 一起提供，因此\
    \ SneakyInput 使用的 cocos2d 版本可能不是最新的。如果项目能够正常运行，你会看到一个模拟摇杆和一个按钮，它们都是简单的圆形。模拟摇杆可以移动屏幕上的“Hello\
    \ World”标签，而按钮则在触摸时改变标签的颜色。\n\n图 7–9 展示了在 iPhone 模拟器中运行的 SneakyInput 示例项目。该示例项目包含一个控制“Hello\
    \ World”标签位置的虚拟模拟摇杆，以及右下角的一个按钮，该按钮在被触摸时改变标签的颜色。这些按钮没有皮肤；它们使用的是 `ColoredCircleSprite`\
    \ 类。\n\n![images](img/0709.jpg)\n\n**图 7–9.** *SneakyInput 示例项目*\n\n当然，摇杆和按钮也可以添加皮肤。皮肤（有时称为*纹理贴图*）指的是使用纹理图像而不是纯色来显示摇杆和按钮，正如你在图\
    \ 7–8 中所见。\n\n### 集成 SneakyInput\n\n我已经有了一个完全设置好并正常工作的项目——在本例中是 `ScrollingWithJoy05`。我不想使用\
    \ SneakyInput 提供的项目。我该怎么做才能让它与我的项目一起工作？\n\n这个问题并不仅限于 SneakyInput，任何你下载的、已经捆绑了自身\
    \ cocos2d 版本的源代码项目都可能遇到。在大多数情况下，只要该源代码的编程语言是 Objective-C，你只需要弄清楚该项目中哪些文件是必需的，然后将它们添加到你的项目中。然而，并没有明确的指导方针，因为每个项目都不同。\n\
    \n不过，我可以告诉你关于 SneakyInput，你需要将哪些文件添加到你的项目中。其核心由五个类组成：\n\n*   `SneakyButton` 和\
    \ `SneakyButtonSkinnedBase`\n*   `SneakyJoystick` 和 `SneakyJoystickSkinnedBase`\n\
    *   `ColoredCircleSprite`（可选）\n\n其余的文件并非必需，但可作为参考。图 7–10 展示了我在**添加文件到……**对话框中所做的选择。我决定不包含某些类的理由是，首先进行有根据的猜测，然后在添加了自认为必要的文件后，通过编译项目来验证猜测是否正确。\n\
    \n`HelloWorldScene` 类由 cocos2d 项目模板创建，很可能只包含示例代码。当然，我的项目中已经有了一个 `AppDelegate`，因此我不需要再添加\
    \ SneakyInput 的 `AppDelegate` 类——它可能会与现有的 `AppDelegate` 冲突。此外，还有两个类明确以 `Example`\
    \ 作为后缀，这表明这些文件不是 SneakyInput 的核心类，而是额外的示例代码。\n\n![images](img/0710.jpg)\n\n**图\
    \ 7–10.** *这些文件是让 SneakyInput 在你的项目中工作所必需的；其余文件仅用于示例代码。*\n"
- fmt: "#### Touch Button to Shoot\n\nLet’s try this. With the SneakyInput source\
    \ code added to the project `ScrollingWithJoy05`, the first goal is to add a button\
    \ that allows the player to shoot bullets from the player’s ship. I’m going to\
    \ add a separate `InputLayer` class to the project, which is derived from `CCLayer`\
    \ and added to the `GameScene` class. In [Listing 7–6](#Chapter07.html#list_7_6),\
    \ I updated the `scene` method to add the new `InputLayer` to it, and I’m giving\
    \ both layers a tag just in case I need to identify them later.\n\n**Listing 7–6.**\
    \ *Adding the InputLayer to the GameScene*\n\n```\n+(id) scene\n{\n    CCScene*\
    \ scene = [CCScene node];\n    GameScene* layer = [GameScene node];\n    [scene\
    \ addChild:layer z:0 tag:GameSceneLayerTagGame];\n    InputLayer* inputLayer =\
    \ [InputLayer node];\n    [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];\n\
    \    return scene;\n}\n```\n\nThe new tags are defined in the `GameScene` header\
    \ file as follows:\n\n```\ntypedef enum\n{\n    GameSceneLayerTagGame = 1,\n \
    \   GameSceneLayerTagInput,\n} GameSceneLayerTags;\n```\n\nWith the `InputLayer`\
    \ in place, the next step is to add the header files for the SneakyInput files\
    \ we want to use to the `InputLayer.h` header file. I’m not picky, and we’re probably\
    \ going to use most of the classes, so I simply added all of the SneakyInput header\
    \ files:\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n\
    // SneakyInput headers\n#import \"ColoredCircleSprite.h\"\n#import \"SneakyButton.h\"\
    \n#import \"SneakyButtonSkinnedBase.h\"\n#import \"SneakyJoystick.h\"\n#import\
    \ \"SneakyJoystickSkinnedBase.h\"\n\n@interface InputLayer : CCLayer\n{\n    SneakyButton*\
    \ fireButton;\n}\n@end\n```\n\nIn addition, I added a `SneakyButton` member variable\
    \ for easier access to the button I’m going to create now. This is done in the\
    \ `addFireButton` method in [Listing 7–7](#Chapter07.html#list_7_7).\n\n**Listing\
    \ 7–7.** *Creating a SneakyButton*\n\n```\n-(void) addFireButton\n{\n    float\
    \ buttonRadius = 80;\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n\
    \n    fireButton = [[[SneakyButton alloc] initWithRect:CGRectZero] autorelease];\n\
    \    fireButton.radius = buttonRadius;\n    fireButton.position = CGPointMake(screenSize.width\
    \ - buttonRadius, buttonRadius);\n    [self addChild:fireButton];\n}\n```\n\n\
    The `CGRect` parameter of the button’s `initWithRect` method isn’t used by `SneakyButton`,\
    \ which is why I’m simply passing `CGRectZero`. The actual touch code uses the\
    \ `radius` property to determine whether the button should react to the touch.\
    \ The button in this case should be neatly tucked into the lower-right corner.\
    \ Subtracting the `buttonRadius` from the screen width and setting its height\
    \ to `buttonRadius` places it exactly at the desired location.\n\n**TIP:** The\
    \ use of the `buttonRadius` variable allows you to change the radius of the button\
    \ in one place. Otherwise, you would have to update several values in several\
    \ places. This is not only extra work for a value you might want to tweak several\
    \ times before you get it exactly the way you want, but it can also introduce\
    \ subtle bugs, because you’re a human and you tend to forget things, such as changing\
    \ that one value over there. Suddenly the button is offset—or worse, the input\
    \ doesn’t match the button’s location.\n\nThe `InputLayer` class schedules the\
    \ `update` method:\n\n```\n[self scheduleUpdate];\n```\n\nThe `update` method\
    \ is used to check whether the button is touched:\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    if (fireButton.active)\n    {\n        CCLOG(@\"FIRE!!!\");\n    }\n}\n\
    ```\n\nInstead of shooting a bullet, I wanted to keep things simple for now and\
    \ simply log a successful button press. If you try the `ScrollingWithJoy05` project\
    \ now, you’ll notice that there isn’t any button drawn. Yet when you touch the\
    \ screen at the lower-right corner, you’ll see the “FIRE!!!” message appear in\
    \ the Debugger Console window. So, all is well and right, except that the button\
    \ can’t be seen—which we’ll need to fix.\n\n#### Skinning the Button\n\nEeeww!\
    \ No, it’s not what you think. *Skinning* in computer graphics refers to giving\
    \ an otherwise featureless object a texture or simply a different look. In this\
    \ case, we want to actually see our button, so we need an image for that.\n\n\
    I also prefer to add cocos2d-style static initializers to external classes using\
    \ a category, as done in the previous chapter. This helps avoid potentially forgetting\
    \ to send `alloc` or `autorelease` messages to a `SneakyButton` object. I’ll start\
    \ with that by adding a `SneakyExtensions` class to the `ScrollingWithJoy06` project\
    \ and then stripping the header file down to this:\n\n```\n#import <Foundation/Foundation.h>\n\
    \n// SneakyInput headers\n#import \"ColoredCircleSprite.h\"\n#import \"SneakyButton.h\"\
    \n#import \"SneakyButtonSkinnedBase.h\"\n#import \"SneakyJoystick.h\"\n#import\
    \ \"SneakyJoystickSkinnedBase.h\"\n@interface SneakyButton (Extension)\n+(id)\
    \ button;\n+(id) buttonWithRect:(CGRect)rect;\n@end\n```\n\nOnce more, all the\
    \ `SneakyInput` headers are added because I plan to make more categories for every\
    \ `SneakyInput` class that doesn’t conform to regular cocos2d initializers. In\
    \ this case, a `SneakyButton` category named `Extension` is added, which adds\
    \ two methods, named `button` and `buttonWithRect`. They are implemented as shown\
    \ in [Listing 7–8](#Chapter07.html#list_7_8).\n\n**Listing 7–8.** *A Category\
    \ with SneakyButtonAutorelease Initializers*\n\n```\n#import \"SneakyExtensions.h\"\
    \n\n@implementation SneakyButton (Extension)\n+(id) button\n{\n    return [[[SneakyButton\
    \ alloc] initWithRect:CGRectZero] autorelease];\n}\n\n+(id) buttonWithRect:(CGRect)rect\n\
    {\n    return [[[SneakyButton alloc] initWithRect:rect] autorelease];\n}\n@end\n\
    ```\n\nThey simply wrap the `alloc` and `autorelease` calls. Also, I decided to\
    \ add a simple, parameterless button initializer because the `CGRect` parameter\
    \ isn’t really used anyway. This allows me to initialize the `fireButton` in a\
    \ straightforward manner:\n\n```\nfireButton = [SneakyButton button];\n```\n\n\
    It’s just a little extra effort for more convenience and cleaner code. I’ll be\
    \ adding more convenience methods to `SneakyExtensions` without discussing them\
    \ in the book, because the principle is the same.\n\nNow my mind is at peace,\
    \ and I can start skinning the button. I created four button images that are 100×100\
    \ pixels in size—twice the final button radius of 50 that I’m going with. The\
    \ button images come in four variations: Default, Pressed, Activated, and Disabled.\
    \ The default state is what the button looks like when it isn’t pressed, which\
    \ should make it obvious what the Pressed state is. The Activated state comes\
    \ into play only for toggle buttons, meaning the toggle button is *active*, or\
    \ *on*. The Disabled image is used if the button currently has no function. For\
    \ example, when the ship’s weapons are overheated and you can’t shoot for a few\
    \ seconds, you could disable the button, and it would show the Disabled image.\
    \ For the shoot button, I only needed to use the Default and Pressed images. [Listing\
    \ 7–9](#Chapter07.html#list_7_9) shows the updated `addFireButton` method.\n\n\
    **Listing 7–9.** *Replacing [Listing 7–7](#Chapter07.html#list_7_7) with a Skinned\
    \ Button*\n\n```\nfloat buttonRadius = 50;\nCGSize screenSize = [[CCDirector sharedDirector]\
    \ winSize];\n\nfireButton = [SneakyButton button];\nfireButton.isHoldable = YES;\n\
    SneakyButtonSkinnedBase* skinFireButton = [SneakyButtonSkinnedBase skinnedButton];\n\
    skinFireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);\n\
    skinFireButton.defaultSprite = [CCSprite spriteWithSpriteFrameName:\n    @\"fire-button-idle.png\"\
    ];\nskinFireButton.pressSprite = [CCSprite spriteWithSpriteFrameName:\n    @\"\
    fire-button-pressed.png\"];\nskinFireButton.button = fireButton;\n[self addChild:skinFireButton];\n\
    ```"
  raw: '#### Touch Button to Shoot


    Let’s try this. With the SneakyInput source code added to the project ScrollingWithJoy05,
    the first goal is to add a button that allows the player to shoot bullets from
    the player’s ship. I’m going to add a separate `InputLayer` class to the project,
    which is derived from `CCLayer` and added to the `GameScene` class. In [Listing
    7–6](#Chapter07.html#list_7_6), I updated the `scene` method to add the new `InputLayer`
    to it, and I’m giving both layers a tag just in case I need to identify them later.


    **Listing 7–6.** *Adding the InputLayer to the GameScene*


    `+(id) scene`

    `{`

    `    CCScene* scene = [CCScene node];`

    `    GameScene* layer = [GameScene node];`

    `    [scene addChild:layer z:0 tag:GameSceneLayerTagGame];`

    `    InputLayer* inputLayer = [InputLayer node];`

    `    [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];`

    `    return scene;`

    `}`


    The new tags are defined in the `GameScene` header file as follows:


    `typedef enum`

    `{`

    `    GameSceneLayerTagGame = 1,`

    `    GameSceneLayerTagInput,`

    `} GameSceneLayerTags;`


    With the `InputLayer` in place, the next step is to add the header files for the
    SneakyInput files we want to use to the InputLayer.h header file. I’m not picky,
    and we’re probably going to use most of the classes, so I simply added all of
    the SneakyInput header files:


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `// SneakyInput headers`

    `#import "ColoredCircleSprite.h"`

    `#import "SneakyButton.h"`

    `#import "SneakyButtonSkinnedBase.h"`

    `#import "SneakyJoystick.h"`

    `#import "SneakyJoystickSkinnedBase.h"`


    `@interface InputLayer : CCLayer`

    `{`

    `    SneakyButton* fireButton;`

    `}`

    `@end`


    In addition, I added a `SneakyButton` member variable for easier access to the
    button I’m going to create now. This is done in the `addFireButton` method in
    [Listing 7–7](#Chapter07.html#list_7_7).


    **Listing 7–7.** *Creating a SneakyButton*


    `-(void) addFireButton`

    `{`

    `    float buttonRadius = 80;`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`


    `    fireButton = [[[SneakyButton alloc] initWithRect:CGRectZero] autorelease];`

    `    fireButton.radius = buttonRadius;`

    `    fireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);`

    `    [self addChild:fireButton];`

    `}`


    The `CGRect` parameter of the button’s `initWithRect` method isn’t used by `SneakyButton`,
    which is why I’m simply passing `CGRectZero`. The actual touch code uses the `radius`
    property to determine whether the button should react to the touch. The button
    in this case should be neatly tucked into the lower-right corner. Subtracting
    the `buttonRadius` from the screen width and setting its height to `buttonRadius`
    places it exactly at the desired location.


    **TIP:** The use of the `buttonRadius` variable allows you to change the radius
    of the button in one place. Otherwise, you would have to update several values
    in several places. This is not only extra work for a value you might want to tweak
    several times before you get it exactly the way you want, but it can also introduce
    subtle bugs, because you’re a human and you tend to forget things, such as changing
    that one value over there. Suddenly the button is offset—or worse, the input doesn’t
    match the button’s location.


    The `InputLayer` class schedules the `update` method:


    `[self scheduleUpdate];`


    The `update` method is used to check whether the button is touched:


    `-(void) update:(ccTime)delta`

    `{`

    `    if (fireButton.active)`

    `    {`

    `        CCLOG(@"FIRE!!!");`

    `    }`

    `}`


    Instead of shooting a bullet, I wanted to keep things simple for now and simply
    log a successful button press. If you try the ScrollingWithJoy05 project now,
    you’ll notice that there isn’t any button drawn. Yet when you touch the screen
    at the lower-right corner, you’ll see the “FIRE!!!” message appear in the Debugger
    Console window. So, all is well and right, except that the button can’t be seen—which
    we’ll need to fix.


    #### Skinning the Button


    Eeeww! No, it’s not what you think. *Skinning* in computer graphics refers to
    giving an otherwise featureless object a texture or simply a different look. In
    this case, we want to actually see our button, so we need an image for that.


    I also prefer to add cocos2d-style static initializers to external classes using
    a category, as done in the previous chapter. This helps avoid potentially forgetting
    to send `alloc` or autorelease messages to a `SneakyButton` object. I’ll start
    with that by adding a `SneakyExtensions` class to the ScrollingWithJoy06 project
    and then stripping the header file down to this:


    `#import <Foundation/Foundation.h>`


    `// SneakyInput headers`

    `#import "ColoredCircleSprite.h"`

    `#import "SneakyButton.h"`

    `#import "SneakyButtonSkinnedBase.h"`

    `#import "SneakyJoystick.h"`

    `#import "SneakyJoystickSkinnedBase.h"`

    `@interface SneakyButton (Extension)`

    `+(id) button;`

    `+(id) buttonWithRect:(CGRect)rect;`

    `@end`


    Once more, all the `SneakyInput` headers are added because I plan to make more
    categories for every `SneakyInput` class that doesn’t conform to regular cocos2d
    initializers. In this case, a `SneakyButton` category named `Extension` is added,
    which adds two methods, named `button` and `buttonWithRect`. They are implemented
    as shown in [Listing 7–8](#Chapter07.html#list_7_8).


    **Listing 7–8.** *A Category with SneakyButtonAutorelease Initializers*


    `#import "SneakyExtensions.h"`


    `@implementation SneakyButton (Extension)`

    `+(id) button`

    `{`

    `    return [[[SneakyButton alloc] initWithRect:CGRectZero] autorelease];`

    `}`


    `+(id) buttonWithRect:(CGRect)rect`

    `{`

    `    return [[[SneakyButton alloc] initWithRect:rect] autorelease];`

    `}`

    `@end`


    They simply wrap the `alloc` and `autorelease` calls. Also, I decided to add a
    simple, parameterless button initializer because the `CGRect` parameter isn’t
    really used anyway. This allows me to initialize the `fireButton` in a straightforward
    manner:


    `fireButton = [SneakyButton button];`


    It’s just a little extra effort for more convenience and cleaner code. I’ll be
    adding more convenience methods to `SneakyExtensions` without discussing them
    in the book, because the principle is the same.


    Now my mind is at peace, and I can start skinning the button. I created four button
    images that are 100×100 pixels in size—twice the final button radius of 50 that
    I’m going with. The button images come in four variations: Default, Pressed, Activated,
    and Disabled. The default state is what the button looks like when it isn’t pressed,
    which should make it obvious what the Pressed state is. The Activated state comes
    into play only for toggle buttons, meaning the toggle button is *active*, or *on*.
    The Disabled image is used if the button currently has no function. For example,
    when the ship’s weapons are overheated and you can’t shoot for a few seconds,
    you could disable the button, and it would show the Disabled image. For the shoot
    button, I only needed to use the Default and Pressed images. [Listing 7–9](#Chapter07.html#list_7_9)
    shows the updated `addFireButton` method.


    **Listing 7–9.** *Replacing [Listing 7–7](#Chapter07.html#list_7_7) with a Skinned
    Button*


    `float buttonRadius = 50;`

    `CGSize screenSize = [[CCDirector sharedDirector] winSize];`


    `fireButton = [SneakyButton button];`

    `fireButton.isHoldable = YES;`

    `SneakyButtonSkinnedBase* skinFireButton = [SneakyButtonSkinnedBase skinnedButton];`

    `skinFireButton.position = CGPointMake(screenSize.width - buttonRadius, buttonRadius);`

    `skinFireButton.defaultSprite = [CCSprite spriteWithSpriteFrameName:` ![images](images/U002.jpg)

    `    @"fire-button-idle.png"];`

    `skinFireButton.pressSprite = [CCSprite spriteWithSpriteFrameName:` ![images](images/U002.jpg)

    `    @"fire-button-pressed.png"];`

    `skinFireButton.button = fireButton;`

    `[self addChild:skinFireButton];`'
  trans: "\n#### 触摸按钮发射子弹\n\n我们来试试看。在项目`ScrollingWithJoy05`中添加了 SneakyInput 源代码后，首要目标是添加一个按钮，让玩家能够从飞船发射子弹。我将为项目添加一个独立的`InputLayer`类，它继承自`CCLayer`并加入`GameScene`类。在代码清单\
    \ 7–6 中，我更新了`scene`方法以添加新的`InputLayer`，并为两个层都添加了标签，以便后续可能需要识别它们。\n\n**代码清单 7–6**\
    \ *向 GameScene 添加 InputLayer*\n\n```\n+(id) scene\n{\n    CCScene* scene = [CCScene\
    \ node];\n    GameScene* layer = [GameScene node];\n    [scene addChild:layer\
    \ z:0 tag:GameSceneLayerTagGame];\n    InputLayer* inputLayer = [InputLayer node];\n\
    \    [scene addChild:inputLayer z:1 tag:GameSceneLayerTagInput];\n    return scene;\n\
    }\n```\n\n新的标签定义在`GameScene`头文件中，如下所示：\n\n```\ntypedef enum\n{\n    GameSceneLayerTagGame\
    \ = 1,\n    GameSceneLayerTagInput,\n} GameSceneLayerTags;\n```\n\n`InputLayer`就位后，下一步是将我们想用的\
    \ SneakyInput 文件的头文件添加到`InputLayer.h`头文件中。我并不挑剔，而且我们很可能会用到大部分类，所以我直接将所有 SneakyInput\
    \ 头文件都添加了进去：\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\
    \n// SneakyInput headers\n#import \"ColoredCircleSprite.h\"\n#import \"SneakyButton.h\"\
    \n#import \"SneakyButtonSkinnedBase.h\"\n#import \"SneakyJoystick.h\"\n#import\
    \ \"SneakyJoystickSkinnedBase.h\"\n\n@interface InputLayer : CCLayer\n{\n    SneakyButton*\
    \ fireButton;\n}\n@end\n```\n\n此外，我还添加了一个`SneakyButton`成员变量，以便更轻松地访问即将创建的按钮。这一操作在代码清单\
    \ 7–7 的`addFireButton`方法中完成。\n\n**代码清单 7–7** *创建一个 SneakyButton*\n\n```\n-(void)\
    \ addFireButton\n{\n    float buttonRadius = 80;\n    CGSize screenSize = [[CCDirector\
    \ sharedDirector] winSize];\n\n    fireButton = [[[SneakyButton alloc] initWithRect:CGRectZero]\
    \ autorelease];\n    fireButton.radius = buttonRadius;\n    fireButton.position\
    \ = CGPointMake(screenSize.width - buttonRadius, buttonRadius);\n    [self addChild:fireButton];\n\
    }\n```\n\n按钮的`initWithRect`方法中的`CGRect`参数未被`SneakyButton`使用，因此我直接传入了`CGRectZero`。实际的触摸代码使用`radius`属性来判断按钮是否应对触摸做出反应。此情况下的按钮应完美贴合在右下角。从屏幕宽度减去`buttonRadius`并将其高度设为`buttonRadius`，就能精确地将其放置在所需位置。\n\
    \n**提示：** 使用`buttonRadius`变量可以让你在一个地方更改按钮的半径。否则，你将不得不在多个地方更新多个数值。这不仅对于你可能需要反复调整以找到完美效果的数值来说是额外的工作，还可能引入细微的错误，因为作为人类，你容易遗忘事情，比如忘记更改某处的某个值。突然按钮位置偏移了——或者更糟，输入与按钮位置不匹配。\n\
    \n`InputLayer`类调度了`update`方法：\n\n```\n[self scheduleUpdate];\n```\n\n`update`方法用于检查按钮是否被触摸：\n\
    \n```\n-(void) update:(ccTime)delta\n{\n    if (fireButton.active)\n    {\n  \
    \      CCLOG(@\"FIRE!!!\");\n    }\n}\n```\n\n为了保持简单，我没有实际发射子弹，只是记录一次成功的按钮按下。现在如果你尝试`ScrollingWithJoy05`项目，你会注意到没有任何按钮被绘制出来。然而，当你触摸屏幕右下角时，会在调试器控制台窗口中看到“FIRE!!!”消息。所以一切正常，只是看不到按钮——我们需要解决这个问题。\n\
    \n#### 为按钮添加皮肤\n\n嗯！不，这不是你想的那样。计算机图形学中的*皮肤*是指为原本没有特征的对象赋予纹理或不同的外观。在这个例子中，我们希望实际看到我们的按钮，所以需要一个图片。\n\
    \n我还倾向于像上一章那样，使用类别为外部类添加 cocos2d 风格的静态初始化方法。这有助于避免可能忘记向`SneakyButton`对象发送`alloc`或`autorelease`消息的情况。我将从向`ScrollingWithJoy06`项目添加一个`SneakyExtensions`类开始，然后将头文件精简为：\n\
    \n```\n#import <Foundation/Foundation.h>\n\n// SneakyInput headers\n#import \"\
    ColoredCircleSprite.h\"\n#import \"SneakyButton.h\"\n#import \"SneakyButtonSkinnedBase.h\"\
    \n#import \"SneakyJoystick.h\"\n#import \"SneakyJoystickSkinnedBase.h\"\n@interface\
    \ SneakyButton (Extension)\n+(id) button;\n+(id) buttonWithRect:(CGRect)rect;\n\
    @end\n```\n\n再次，我添加了所有`SneakyInput`头文件，因为我计划为每个不符合常规 cocos2d 初始化方法的`SneakyInput`类创建更多的类别。在此例中，添加了一个名为`Extension`的`SneakyButton`类别，它添加了两个方法，名为`button`和`buttonWithRect`。它们的实现如代码清单\
    \ 7–8 所示。\n\n**代码清单 7–8** *包含 SneakyButton 自动释放初始化方法的类别*\n\n```\n#import \"SneakyExtensions.h\"\
    \n\n@implementation SneakyButton (Extension)\n+(id) button\n{\n    return [[[SneakyButton\
    \ alloc] initWithRect:CGRectZero] autorelease];\n}\n\n+(id) buttonWithRect:(CGRect)rect\n\
    {\n    return [[[SneakyButton alloc] initWithRect:rect] autorelease];\n}\n@end\n\
    ```\n\n它们简单地包装了`alloc`和`autorelease`调用。另外，我决定添加一个简单的、无参数的按钮初始化方法，因为`CGRect`参数实际上并没有被用到。这使得我可以用一种直接的方式初始化`fireButton`：\n\
    \n```\nfireButton = [SneakyButton button];\n```\n\n这只是为了更方便和更简洁的代码而付出的一点额外努力。我将在`SneakyExtensions`中添加更多的便捷方法，但不在书中讨论它们，因为原理是相同的。\n\
    \n现在我可以安心开始为按钮添加皮肤了。我创建了四个按钮图片，尺寸为 100×100 像素——是我将采用的最终按钮半径 50 的两倍。按钮图片有四种变体：默认、按下、激活和禁用。默认状态是按钮未被按下时的外观，这应该能清楚表明按下状态是什么。激活状态仅用于切换按钮，意味着切换按钮处于*激活*或*开启*状态。禁用图像用于按钮当前无功能的情况。例如，当飞船武器过热，你暂时无法射击时，可以禁用按钮，并显示禁用图像。对于射击按钮，我只需要使用默认和按下图像。代码清单\
    \ 7–9 显示了更新后的`addFireButton`方法。\n\n**代码清单 7–9** *用带皮肤的按钮替换代码清单 7–7*\n\n```\nfloat\
    \ buttonRadius = 50;\nCGSize screenSize = [[CCDirector sharedDirector] winSize];\n\
    \nfireButton = [SneakyButton button];\nfireButton.isHoldable = YES;\nSneakyButtonSkinnedBase*\
    \ skinFireButton = [SneakyButtonSkinnedBase skinnedButton];\nskinFireButton.position\
    \ = CGPointMake(screenSize.width - buttonRadius, buttonRadius);\nskinFireButton.defaultSprite\
    \ = [CCSprite spriteWithSpriteFrameName:\n    @\"fire-button-idle.png\"];\nskinFireButton.pressSprite\
    \ = [CCSprite spriteWithSpriteFrameName:\n    @\"fire-button-pressed.png\"];\n\
    skinFireButton.button = fireButton;\n[self addChild:skinFireButton];\n```\n"
- fmt: "# 排版后的文本\n\nI initialized the `fireButton` as usual except that I made it\
    \ holdable, which means you can keep it pressed down for a continuous stream of\
    \ bullets. It also doesn’t set the `radius` property anymore, since the images\
    \ of the `SneakyButtonSkinnedBase` class determine the radius now. Keep in mind\
    \ that I added a category to `SneakyButtonSkinnedBase` in the `SneakyExtension`\
    \ source files created earlier. The `skinnedButton` initializer is in there and\
    \ wraps the `alloc` and `autorelease` messages.\n\nInstead of positioning the\
    \ `fireButton`, the skinned button is now used to position the button on the screen;\
    \ the actual button is updated accordingly by `SneakyButtonSkinnedBase`.\n\nAt\
    \ this point, it makes sense to also write the firing code; [Listing 7–10](#Chapter07.html#list_7_10)\
    \ shows the `update` method now sending the fire message to the `GameScene` class.\n\
    \n**Listing 7–10.** *Shooting Bullets Whenever the Fire Button Is Active*\n\n\
    ```\n-(void) update:(ccTime)delta\n{\n    totalTime += delta;\n\n    if (fireButton.active\
    \ && totalTime > nextShotTime)\n    {\n        nextShotTime = totalTime + 0.5f;\n\
    \n        GameScene* game = [GameScene sharedGameScene];\n        [game shootBulletFromShip:[game\
    \ defaultShip]];\n    }\n\n    // Allow faster shooting by quickly tapping the\
    \ fire button\n    if (fireButton.active == NO)\n    {\n        nextShotTime =\
    \ 0;\n    }\n}\n```\n\nThe two `ccTime` variables, `totalTime` and `nextShotTime`,\
    \ are used to limit the number of bullets the ship will emit to two per second.\
    \ If the fire button is not active (meaning that it isn’t pressed), the `nextShotTime`\
    \ is set to 0 so that the next time you press the button a shot is guaranteed\
    \ to be fired. Tap the button quickly, and you should be able to shoot more bullets\
    \ than with continuous fire.\n\n## Controlling the Action\n\nYou can’t fly a ship\
    \ without some form of input. This is where `SneakyJoystick` will give us a helping\
    \ hand (I mean a helping virtual thumbstick). Behold, ScrollingWithJoy07 is here!\n\
    \nAs usual, the first thing I did was add another `Extension` category to the\
    \ new classes so I could initialize them like any other `CCNode`. For the joystick,\
    \ I’ll go right ahead and create a skinned one in the `addJoystick` method in\
    \ [Listing 7–11](#Chapter07.html#list_7_11).\n\n**Listing 7–11.** *Adding a Skinned\
    \ Joystick*\n\n```\n-(void) addJoystick\n{\n    float stickRadius = 50;\n\n  \
    \  joystick = [SneakyJoystick joystickWithRect:CGRectMake(0, 0, stickRadius,\n\
    \        stickRadius)];\n    joystick.autoCenter = YES;\n    joystick.hasDeadzone\
    \ = YES;\n    joystick.deadRadius = 10;\n\n    SneakyJoystickSkinnedBase* skinStick\
    \ = [SneakyJoystickSkinnedBase\n        skinnedJoystick];\n    skinStick.position\
    \ = CGPointMake(stickRadius * 1.5f, stickRadius * 1.5f);\n    skinStick.backgroundSprite\
    \ = [CCSprite spriteWithSpriteFrameName:\n        @\"joystick-back.png\"];\n \
    \   skinStick.backgroundSprite.color = ccYELLOW;\n    skinStick.thumbSprite =\
    \ [CCSprite spriteWithSpriteFrameName:\n        @\"joystick-stick.png\"];\n  \
    \  skinStick.joystick = joystick;\n    [self addChild:skinStick];\n}\n```\n\n\
    The `SneakyJoystick` is initialized with a `CGRect`, and contrary to the `SneakyButton`,\
    \ the `CGRect` is actually used to determine the joystick’s radius. I set the\
    \ joystick to `autoCenter` so that the thumb controller jumps back to the neutral\
    \ position, like most real-world game controllers. The dead zone is also enabled;\
    \ this is a small area defined by the `deadRadius`, in which you can move the\
    \ thumb controller without any effect. This gives users a certain radius where\
    \ they can keep the thumb controller centered. Without the dead zone, it would\
    \ be almost impossible to center the thumb controller manually.\n\nThe `SneakyJoystickSkinnedBase`\
    \ is positioned a small distance away from the edge of the screen. The button’s\
    \ position and size may not be ideal for the game, but it allows me to better\
    \ demonstrate the controls. If you align the thumb controller with the screen\
    \ edges, it’s too easy to inadvertently move your finger off the touchscreen and\
    \ thus lose control of the ship.\n\n**TIP:** Gray areas are useful! I mean gray\
    \ images like `joystick-back.png`. By using just grayscale colors, you can colorize\
    \ the image using the `color` property of the sprite. You can create red, green,\
    \ yellow, blue, magenta, and other colored versions of the same image, saving\
    \ both download size and in-game memory. The only drawback is that it will be\
    \ a flat color, so instead of shades of gray, your image will be using shades\
    \ of red. This trick works best with images that are supposed to be shades of\
    \ a single color.\n\nYou want the thumbstick on the screen to be used to control\
    \ the ship, of course. As usual, the `update` method processes the input, as shown\
    \ in [Listing 7–12](#Chapter07.html#list_7_12).\n\n**Listing 7–12.** *Moving the\
    \ Ship Based on Joystick Input*\n\n```\n-(void) update:(ccTime)delta\n{\n    …\n\
    \n    // Moving the ship with the thumbstick\n    GameScene* game = [GameScene\
    \ sharedGameScene];\n    Ship* ship = [game defaultShip];\n\n    // Velocity must\
    \ be scaled up by a factor that feels right\n    CGPoint velocity = ccpMult(joystick.velocity,\
    \ 7000 * delta);\n    if (velocity.x != 0 && velocity.y != 0)\n    {\n       \
    \ ship.position = CGPointMake(ship.position.x + velocity.x * delta,\n        \
    \    ship.position.y + velocity.y * delta);\n    }\n}\n```"
  raw: 'I initialized the `fireButton` as usual except that I made it holdable, which
    means you can keep it pressed down for a continuous stream of bullets. It also
    doesn’t set the `radius` property anymore, since the images of the `SneakyButtonSkinnedBase`
    class determine the radius now. Keep in mind that I added a category to `SneakyButtonSkinnedBase`
    in the `SneakyExtension` source files created earlier. The `skinnedButton` initializer
    is in there and wraps the `alloc` and `autorelease` messages.


    Instead of positioning the `fireButton`, the skinned button is now used to position
    the button on the screen; the actual button is updated accordingly by `SneakyButtonSkinnedBase`.


    At this point, it makes sense to also write the firing code; [Listing 7–10](#Chapter07.html#list_7_10)
    shows the `update` method now sending the fire message to the `GameScene` class.


    **Listing 7–10.** *Shooting Bullets Whenever the Fire Button Is Active*


    `-(void) update:(ccTime)delta`

    `{`

    `    totalTime += delta;`


    `    if (fireButton.active && totalTime > nextShotTime)`

    `    {`

    `        nextShotTime = totalTime + 0.5f;`


    `        GameScene* game = [GameScene sharedGameScene];`

    `        [game shootBulletFromShip:[game defaultShip]];`

    `    }`


    `    // Allow faster shooting by quickly tapping the fire button`

    `    if (fireButton.active == NO)`

    `    {`

    `        nextShotTime = 0;`

    `    }`

    `}`


    The two `ccTime` variables, `totalTime` and `nextShotTime`, are used to limit
    the number of bullets the ship will emit to two per second. If the fire button
    is not active (meaning that it isn’t pressed), the `nextShotTime` is set to 0
    so that the next time you press the button a shot is guaranteed to be fired. Tap
    the button quickly, and you should be able to shoot more bullets than with continuous
    fire.


    #### Controlling the Action


    You can’t fly a ship without some form of input. This is where `SneakyJoystick`
    will give us a helping hand (I mean a helping virtual thumbstick). Behold, ScrollingWithJoy07
    is here!


    As usual, the first thing I did was add another `Extension` category to the new
    classes so I could initialize them like any other `CCNode`. For the joystick,
    I’ll go right ahead and create a skinned one in the `addJoystick` method in [Listing
    7–11](#Chapter07.html#list_7_11).


    **Listing 7–11.** *Adding a Skinned Joystick*


    `-(void) addJoystick`

    `{`

    `    float stickRadius = 50;`


    `joystick = [SneakyJoystick joystickWithRect:CGRectMake(0, 0, stickRadius,` ![images](images/U002.jpg)

    `        stickRadius)];`

    `    joystick.autoCenter = YES;`

    `    joystick.hasDeadzone = YES;`

    `    joystick.deadRadius = 10;`


    `SneakyJoystickSkinnedBase* skinStick = [SneakyJoystickSkinnedBase` ![images](images/U002.jpg)

    `        skinnedJoystick];`

    `    skinStick.position = CGPointMake(stickRadius * 1.5f, stickRadius * 1.5f);`

    `skinStick.backgroundSprite = [CCSprite spriteWithSpriteFrameName:` ![images](images/U002.jpg)

    `        @"joystick-back.png"];`

    `    skinStick.backgroundSprite.color = ccYELLOW;`

    `skinStick.thumbSprite = [CCSprite spriteWithSpriteFrameName:` ![images](images/U002.jpg)

    `        @"joystick-stick.png"];`

    `    skinStick.joystick = joystick;`

    `    [self addChild:skinStick];`

    `}`


    The `SneakyJoystick` is initialized with a `CGRect`, and contrary to the `SneakyButton`,
    the `CGRect` is actually used to determine the joystick’s radius. I set the joystick
    to `autoCenter` so that the thumb controller jumps back to the neutral position,
    like most real-world game controllers. The dead zone is also enabled; this is
    a small area defined by the `deadRadius`, in which you can move the thumb controller
    without any effect. This gives users a certain radius where they can keep the
    thumb controller centered. Without the dead zone, it would be almost impossible
    to center the thumb controller manually.


    The `SneakyJoystickSkinnedBase` is positioned a small distance away from the edge
    of the screen. The button’s position and size may not be ideal for the game, but
    it allows me to better demonstrate the controls. If you align the thumb controller
    with the screen edges, it’s too easy to inadvertently move your finger off the
    touchscreen and thus lose control of the ship.


    **TIP:** Gray areas are useful! I mean gray images like joystick-back.png. By
    using just grayscale colors, you can colorize the image using the `color` property
    of the sprite. You can create red, green, yellow, blue, magenta, and other colored
    versions of the same image, saving both download size and in-game memory. The
    only drawback is that it will be a flat color, so instead of shades of gray, your
    image will be using shades of red. This trick works best with images that are
    supposed to be shades of a single color.


    You want the thumbstick on the screen to be used to control the ship, of course.
    As usual, the `update` method processes the input, as shown in [Listing 7–12](#Chapter07.html#list_7_12).


    **Listing 7–12.** *Moving the Ship Based on Joystick Input*


