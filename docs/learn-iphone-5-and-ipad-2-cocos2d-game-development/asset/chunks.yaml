    \n### Sprite Animations the Hard Way\n\nNow brace yourself. I’d like to show you\
    \ how sprite animations work. [Figure 6–3](#Chapter06.html#fig_6_3) shows the\
    \ ship’s animation frames. Remember that we have the entire animation in both\
    \ HD and SD resolution.\n\n![images](images/0603.jpg)\n\n**Figure 6–3.** *The\
    \ ship’s animation—five frames with different flames*\n\nSprite animations are\
    \ another good reason to use `CCSpriteBatchNode`, because you can put all animation\
    \ frames into the same texture to conserve memory. It’s quite a bit of code actually,\
    \ as you’ll see in [Listing 6–11](#Chapter06.html#list_6_11) and in the Sprites05\
    \ project. After that, I’ll show you how to create the same animation using a\
    \ texture atlas, which cuts down the amount of code you’ll have to write.\n\n\
    **Listing 6–11.** *Adding an Animation to the Ship Without Using a Texture Atlas\
    \ Requires Quite a Bit of Code*\n\n`// Load the ship's animation frames as textures\
    \ and create a sprite frame`\n`NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];`\n\
    `for (int i = 0; i < 5; i++)`\n`{`\n`    // Create a texture for the animation\
    \ frame`\n`    NSString* file = [NSString stringWithFormat:@\"ship-anim%i.png\"\
    , i];`\n`    CCTexture2D* texture = [[CCTextureCache sharedTextureCache] addImage:file];`\n\
    \n`    // The whole image should be used as the animation frame`\n`    CGSize\
    \ texSize = [texture contentSize];`\n`    CGRect texRect = CGRectMake(0, 0, texSize.width,\
    \ texSize.height);`\n\n`    // Create a sprite frame from the texture`\n`    CCSpriteFrame*\
    \ frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];`\n`    [frames\
    \ addObject:frame];`\n`}`\n\n`// Create an animation object from all the sprite\
    \ animation frames`\n`CCAnimation* anim = [CCAnimation animationWithFrames:frames\
    \ delay:0.08f];`\n\n`// Run the animation by using the CCAnimate action and loop\
    \ it with CCRepeatForever`\n`CCAnimate* animate = [CCAnimate actionWithAnimation:anim];`\n\
    `CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];`\n`[self\
    \ runAction:repeat];`\n\nAll that just to create a sprite animation with five\
    \ frames? I’m afraid so. I’ll walk you through the code backward this time, which\
    \ may explain the setup better. At the very end we’re using a `CCAnimate` action\
    \ to play an animation. In this case, we’re also using a `CCRepeatForever` action\
    \ to loop the animation.\n\nThe `CCAnimate` action uses a `CCAnimation` object\
    \ (which is a container for animation frames) that defines the delay between each\
    \ individual frame. In many cases, you’ll later want to refer to a previously\
    \ created animation. For that purpose, cocos2d has a `CCAnimationCache` class\
    \ that stores `CCAnimation` instances by name, as shown in [Listing 6–12](#Chapter06.html#list_6_12).\
    \ Using the `CCAnimationCache`, you can later access a particular animation by\
    \ name.\n\n**Listing 6–12.** *The CCAnimationCache Class Can Store Animations\
    \ for You, Which Can Be Retrieved by Name*\n\n`CCAnimation* anim = [CCAnimation\
    \ animationWithFrames:frames delay:1];`\n\n`// Store the animation in the CCAnimationCache`\n\
    `[[CCAnimationCache sharedAnimationCache] addAnimation:anim name:@\"move”];`\n\
    \n`// Sometime later: retrieve the move animation from the CCAnimationCache`\n\
    `CCAnimation* move = [[CCAnimationCache sharedAnimationCache] animationByName:@”move”];`\n\
    \nGoing back to [Listing 6–11](#Chapter06.html#list_6_11), notice the `for` loop.\
    \ This is where it gets complicated. The `CCAnimation` class must be initialized\
    \ with an `NSArray` containing `CCSpriteFrame` objects. A *sprite frame* consists\
    \ only of a reference to a texture and a rectangle that defines the area of the\
    \ texture that should be drawn. The texture rectangle equals the texture’s `contentSize`\
    \ property—in other words, the size of the actual image contained in the texture.\
    \ Keep in mind that the texture can be bigger than the image it contains because\
    \ textures can only have dimensions that are powers of two.\n\nNow, the `CCSpriteFrame`\
    \ unfortunately doesn’t take an image file name as input; it only accepts existing\
    \ `CCTexture2D` objects. The texture is created using the `CCTextureCache` singleton’s\
    \ `addImage` method, normally used to preload images as textures into memory without\
    \ having to create a `CCSprite` or other object. The file name is constructed\
    \ using `NSString`’s `stringWithFormat` method, which allowed me to use the loop\
    \ variable `i` to be appended to the file name, instead of having to write out\
    \ all five file names.\n\nTo recap, from top to bottom, here’s how you can create\
    \ and run a sprite animation:\n\n1.  Create `NSMutableArray`.\n2.  For each animation\
    \ frame:\n    1.  Create a `CCTexture2D` for each image.\n    2.  Create a `CCSpriteFrame`\
    \ using the `CCTexture2D`.\n    3.  Add each `CCSpriteFrame` to the `NSMutableArray`.\n\
    3.  Create a `CCAnimation` using the frames in the `NSMutableArray`.\n4.  Optionally,\
    \ add the `CCAnimation` to the `CCAnimationCache` with a name.\n5.  Use a `CCAnimate`\
    \ action to play the animation.\n\nShh, calm down—no need to take that Valium.\
    \ If you pack your animation frames into a texture atlas, things will get a bit\
    \ easier and more efficient at the same time. More helpful is to encapsulate all\
    \ this code into a helper method and stick to a naming convention for your animation\
    \ files."
