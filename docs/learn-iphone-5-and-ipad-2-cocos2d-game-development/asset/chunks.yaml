- fmt: "### Working with Nodes\n\nThe `CCNode` class implements all the methods to\
    \ add, get, and remove child nodes. Here are some of the ways you can work with\
    \ child nodes:\n- You can create a new node: `CCNode* childNode = [CCNode node];`\n\
    - You can add the new node as a child: `[myNode addChild:childNode z:0 tag:123];`\n\
    - You can retrieve the child node: `CCNode* retrievedNode = [myNode getChildByTag:123];`\n\
    - You can remove the child node by tag; `cleanup` will also stop any running actions:\
    \ `[myNode removeChildByTag:123 cleanup:YES];`\n- You can remove the node if you\
    \ have a pointer to it: `[myNode removeChild:retrievedNode];`\n- You can remove\
    \ every child of the node: `[myNode removeAllChildrenWithCleanup:YES];`\n- You\
    \ can remove `myNode` from its parent: `[myNode removeFromParentAndCleanup:YES];`\n\
    \nThe `z` parameter in `addChild` determines the draw order of the node. The node\
    \ with the lowest `z` value is drawn first; the one with the highest `z` value\
    \ is drawn last. If multiple nodes have the same `z` value, they are simply drawn\
    \ in the order they were added. Of course, this applies only to nodes that have\
    \ a visual representation, such as sprites.\n\nThe `tag` parameter lets you identify\
    \ and obtain specific nodes at a later time using the `getChildByTag` method.\n\
    \n**NOTE:** If several nodes end up with the same tag number, `getChildByTag`\
    \ will return the first node with that tag number. The remaining nodes will be\
    \ inaccessible. Make sure you use unique tag numbers for your nodes.\n\nNote that\
    \ actions can have tags, too. Node and action tags do not conflict, however, so\
    \ an action and a node can have the same tag number without any problem.\n\n###\
    \ Working with Actions\n\nNodes can also run actions. I’ll cover actions more\
    \ in a bit. For now, just know that actions can move, rotate, and scale nodes\
    \ and do other things with nodes over time.\n- Here’s an action declaration: `CCAction*\
    \ action = [CCBlink actionWithDuration:10 blinks:20];` `action.tag = 234;`\n-\
    \ Running the action makes the node blink: `[myNode runAction:action];`\n- If\
    \ you need to access the action at a later time, you get it by its tag: `CCAction*\
    \ retrievedAction = [myNode getActionByTag:234];`\n- You can stop the action by\
    \ tag: `[myNode stopActionByTag:234];`\n- Or you can stop it by pointer: `[myNode\
    \ stopAction:action];`\n- Or you can stop all actions running on this node: `[myNode\
    \ stopAllActions];`\n\n### Scheduled Messages\n\nNodes can schedule messages,\
    \ which is Objective-C lingo for calling a method. In many cases, you’ll want\
    \ a particular update method to be running on a node in order to do some processing,\
    \ such as checking for collisions. The simplest way to schedule the particular\
    \ update method to be called every frame is like this:\n```\n-(void) scheduleUpdateMethod\n\
    {\n    [self scheduleUpdate];\n}\n\n-(void) update:(ccTime)delta\n{\n    // this\
    \ method is called every frame\n}\n```\n\nDead simple, isn’t it? Notice that the\
    \ update method has a fixed signature, meaning it’s always defined exactly this\
    \ way. The `delta` parameter is the elapsed time since the method was last called.\
    \ This is the preferred way to schedule updates that should take place every frame,\
    \ but there are reasons to use other update methods that give you more flexibility.\n\
    \nIf you want a different method to be run or if you don’t want the method to\
    \ be called every frame but every tenth of a second, you should use this method:\n\
    ```\n-(void) scheduleUpdateMethod\n{\n    [self schedule:@selector(updateTenTimesPerSecond:)\
    \ interval:0.1f];\n}\n\n-(void) updateTenTimesPerSecond:(ccTime)delta\n{\n   \
    \ // this method is called according to its interval, ten times per second\n}\n\
    ```\n\nNote that if `interval` is 0, you should use the `scheduleUpdate` method\
    \ instead. However, the previous code is the preferred choice if you ever need\
    \ to unschedule a particular selector at a later time. The `scheduleUpdate` method\
    \ won’t let you do this.\n\nThe `update` method’s signature is still the same;\
    \ it receives a delta time as its only parameter. But this time it can be named\
    \ any way you want, and it is called only every tenth of a second. This may be\
    \ useful to check for win conditions if they are so complex you don’t want to\
    \ run them every frame. Or if you want something to happen after 10 minutes, you\
    \ could schedule a selector with an interval of 600.\n\n**NOTE:** The `@selector(…)`\
    \ syntax may seem weird. It’s the Objective-C way of referring to a specific method\
    \ by name. The crucial thing here is not to overlook the colon at the end. It\
    \ tells Objective-C to look for the method with the given name and exactly one\
    \ parameter. If you forget to add the colon at the end, the program will still\
    \ compile, but it will crash later. In the Debugger Console, the error log will\
    \ read “unrecognized selector sent to instance….”\n\nThe number of colons in `@selector(…)`\
    \ must always match the number and names of the parameters of the method. For\
    \ the following method:\n```\n-(void) example:(ccTime)delta sender:(id)sender\
    \ flag:(bool)aBool\n```\nthe corresponding `@selector` should be as follows:\n\
    ```\n@selector(example:sender:flag:)\n```\n\nThere’s one major caveat with scheduling\
    \ your own selectors, or with the `@selector(…)` keyword in general. By default,\
    \ the compiler does not complain at all if the method’s name doesn’t exist. Instead,\
    \ your app will simply crash when that selector is called. Since the call is done\
    \ by cocos2d internally, you’ll find it hard to figure out the cause of the problem.\
    \ Luckily, there’s a compiler warning you can enable. [Figure 3–6](#Chapter03.html#fig_3_6)\
    \ shows the “Undeclared Selector” warning enabled for the NodeHierarchy project,\
    \ and the EssentialsXcode project for this chapter has it enabled as well.\n\n\
    ![images](images/0306.jpg)\n\n**Figure 3–6.** *Activating the build setting to\
    \ warn about undeclared selectors*\n\nWhat’s left is to show how to stop these\
    \ scheduled methods from being called. You can do so by unscheduling them.\n-\
    \ You can stop all selectors of the node, even those scheduled with `scheduleUpdate`:\
    \ `[self unscheduleAllSelectors];`\n- You can stop a particular selector, in this\
    \ case the `updateTenTimesPerSecond` method: `[self unschedule:@selector(updateTenTimesPerSecond:)];`\n\
    \nNote that this won’t stop the `update` method scheduled by `scheduleUpdate`."
