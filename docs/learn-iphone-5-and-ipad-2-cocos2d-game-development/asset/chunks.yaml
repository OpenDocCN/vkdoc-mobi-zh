- fmt: '### Cocos2D Central


    I launched a community hub called Cocos2D Central for everything related to cocos2d.
    Most importantly, there are forum sections for cocos2d, the book, Kobold2D and
    my game kits. Cocos2D Central also hosts the official forum of cocos2d-javascript,
    the web browser port of cocos2d.


    In the Resources section, there are several small tutorials available, and the
    Downloads section hosts all files I currently offer for download including the
    cocos2d installer and the source code for this book.


    ### Stack Exchange Network


    Forums are a great way for communities to interact with each other. But as such,
    they tend to get a little chatty, and searching for a specific answer can be cumbersome
    because the forum’s content isn’t strictly limited to solving problems.


    That’s exactly where Q&A web sites like Stack Exchange shine. You go in, ask a
    particular question, and get answers. Since the focus is on Q&A, it’s easier to
    find existing answers. And if you really like a question or answer, you can vote
    it up so it will be listed higher on search results.


    I’m regularly amazed by the show of expertise from contributors on the Stack Exchange
    network. This is in part thanks to the built-in badge and points system, making
    it very rewarding to both ask interesting questions and write thoughtful, in-depth
    answers. The Stack Exchange network is comprised of several free Q&A web sites,
    the most popular and my personal favorite being `http://stackoverflow.com`, which
    is about programming questions in general.


    You won’t find as many questions about cocos2d on Stack Overflow as you will on
    the official cocos2d forum, but the questions on Stack Overflow are good ones,
    and almost all of them get good answers. There’s a bit of confusion about the
    use of search tags on the site, with both `cocos2d` and `cocos2d-iphone` used
    to tag questions regarding the iPhone version of cocos2d. This can be attributed
    to the success of cocos2d for iPhone, in that it has become synonymous with the
    name cocos2d itself. Use these two links to find all the cocos2d for iPhone–related
    questions on Stack Overflow:


    *   `http://stackoverflow.com/questions/tagged/cocos2d`

    *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


    Stack Exchange is expanding as a Q&A web sites network. One of the latest additions
    is the Game Development Q&A web site. On this site you can ask general game programming
    questions and about anything game development–related in general, including design,
    marketing, and sales. Check out the Game Development Stack Exchange site at `http://gamedev.stackexchange.com`.


    ### Tutorials and FAQs


    There are plenty of tutorials for cocos2d on the Web, but one tutorial writer
    clearly stands out from the crowd: Ray Wenderlich. He has written more than a
    dozen cocos2d tutorials and published them on his web site, at `www.raywenderlich.com/tag/cocos2d`.
    Besides cocos2d tutorials, on this site you’ll also find other highly interesting
    iPhone SDK–related tips and tricks. In at least one particular case this is also
    helpful for cocos2d developers, where Ray explains how to save and load your app’s
    data. This can be applied to saving and loading games as well (see `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager`).


    Then there’s the wonderful Coconut College. It provides entry-level tutorials
    and a handholding approach. The web site’s clean and professional design is both
    inviting and to the point. The author goes by the nickname cjl and calls himself
    the Dean of Coconut College but otherwise keeps a very low profile. Check out
    Coconut College at `www.coconutcollege.net`, and if you do want to reach out to
    the author, you can try his cocos2d forum profile: `www.cocos2d-iphone.org/forum/profile/49`.


    The knowledge base on my Learn & Master cocos2d web site (`www.learn-cocos2d.com/knowledge-base`)
    hosts my own tutorials and FAQs. Currently I offer an Xcode tutorial, which allows
    you to keep the cocos2d files separate in order to be able to update cocos2d more
    easily. Another tutorial is about Hiero, the bitmap font editor, and includes
    a number of FAQs. This site is also where I blog about topics and post links of
    general interest to cocos2d developers. Take this article on how to upgrade cocos2d
    in an existing project for example: `www.learn-cocos2d.com/2011/05/update-cocos2d-iphone-existing-project`.


    Another web site I’m running is called the Indiepinion, at `www.indiepinion.com`,
    where I blog about the indie experience, post interviews with indie developers,
    and generally try to encourage developers to walk the indie way.


    ## Source Code Projects to Benefit From


    Personally, I learn best by browsing through other people’s code. One of the first
    things I did when I got cocos2d and found the documentation to be lacking was
    to invest in the Sapus Tongue source code project to see how cocos2d is actually
    being used in a game. It was very helpful for getting started quickly.


    **NOTE:** Since Zynga acquired certain assets of Sapus Media, the Sapus Tongue
    Source Code and Level SVG products are no longer available. However, the source
    code products I’m introducing in the following sections are excellent replacements.


    The advantage of commercially sold source code compared to the open source projects
    is that you rarely get support for the latter, and they’re almost never updated,
    to the point that most of the open source projects you’ll find are using versions
    of cocos2d prior to v1.0, with one exception, the official cocos2d-iphone-extensions
    project: `www.cocos2d-iphone.org/forum/topic/17546`.


    The following source code projects are all commercial offerings. I refrain from
    listing prices because they are subject to change.


    ### The iPhone RPG Game Kit


    Created by Nathanael M. Weiss, the iPhone Game Kit is also known as the iPhone
    RPG Kit. The game Quexlor: Lands of Fate (see [Figure 17–1](#Chapter17.html#fig_17_1))
    is a role-playing hack-and-slash game following in the footsteps of Diablo, featuring
    a large tilemap world with multiple levels, various monsters, and plenty of items.
    The game kit comes with a huge amount of royalty-free graphics created by Reiner
    Prokein, a comprehensive *Make Your Own iPhone Game* e-book, and a publishing
    guide that explains in detail how to submit your game to the App Store. Obviously,
    you also get the game’s excellently crafted source code, but that almost seems
    secondary.


    There are no notable licensing restrictions. You get a 60-day money-back guarantee
    and free updates for life, although it does not specify whose life. Support is
    available through the support forum, where you can also share your work with other
    Game Kit customers.


    You can find the link to the Quexlor game on the App Store and a whole lot more
    information about the iPhone Game Kit on its web site, so I suggest taking a look:
    `www.iphonegamekit.com`.


    ![images](images/1701.jpg)


    **Figure 17–1.** *Quexlor: Lands of Fate (iPad) is a game made with the iPhone
    Game Kit.*'
