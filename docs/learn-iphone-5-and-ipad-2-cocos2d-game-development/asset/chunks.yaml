    \   2. 使用`CCTexture2D`创建`CCSpriteFrame`。\n   3. 将每个`CCSpriteFrame`添加到`NSMutableArray`中。\n\
    3. 使用`NSMutableArray`中的帧创建`CCAnimation`。\n4. （可选）将`CCAnimation`以指定名称添加到`CCAnimationCache`。\n\
    5. 使用`CCAnimate`动作播放动画。\n\n嘘，放松点——没必要吃镇静剂。如果你将动画帧打包到纹理图集中，事情会变得更容易，同时效率也更高。更有帮助的做法是将所有这些代码封装到一个辅助方法中，并为动画文件制定统一的命名约定。\n\
    ```"
- fmt: '### Animation Helper Category


    Since the code to create the animation frames and the animation is common to all
    animations, you should consider encapsulating this into a helper method. I have
    done so in the project Sprite05_WithAnimHelper. Instead of using static methods,
    I decided to extend the `CCAnimation` class using an Objective-C feature called
    a *category*. It offers a way to add methods to an existing class without having
    to modify the original class. The only downside is that with a category you cannot
    add member variables to the class; you can only add methods. The following code
    is the `@interface` for the `CCAnimation` category, which I simply named `Helper`:


    ```

    @interface CCAnimation (Helper)

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay;

    @end

    ```


    The `@interface` for a Objective-C category uses the same name as the class it
    extends and adds a category name within parentheses. The category name is like
    a variable name and thus cannot contain spaces or other characters you can’t use
    in variables, like punctuation characters, for example. The `@interface` also
    must not contain curly brackets, since adding member variables to a category is
    not possible and not allowed.


    The actual `@implementation` for the `CCAnimation` category uses the same schema
    as the `@interface` by appending the category name in parentheses after the class
    name. Everything else is just like writing regular class methods; in this case,
    my extension method is named `animationWithFile` and takes the file name, the
    number of frames, and the animation delay as input:


    ```

    @implementation CCAnimation (Helper)


    // Creates an animation from single files

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay

    {

        // Load the animation frames as textures and create the sprite frames

        NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];

        for (int i = 0; i < frameCount; i++)

        {

            // Assuming all animation files are named "nameX.png"

            NSString* file = [NSString stringWithFormat:@"%@%i.png", name, i];

            CCTexture2D* texture = [[CCTextureCache sharedTextureCache]addImage:file];


            // Assuming that image file animations always use the whole image

            CGSize texSize = texture.contentSize;

            CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);

            CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];


            [frames addObject:frame];

        }


        // Return an animation object from all the sprite animation frames

        return [CCAnimation animationWithFrames:frames delay:delay];

    }


    @end

    ```


    Here’s how the naming convention comes into play. The `Ship`’s animations have
    the base name `ship-anim` followed by a consecutive number starting with 0 and
    ending in the `.png` file extension. For example, the file names for the `Ship`’s
    animation are named `ship-anim0.png` through `ship-anim4.png`. If you create all
    your animations using that naming scheme, you can use the preceding `CCAnimation`
    extension method for all of your animations.


    **TIP:** I can’t help but notice that a lot of developers and artists have a habit
    of consecutively naming files with a fixed number of digits, by adding leading
    zeros where necessary. For example, you might be tempted to name your files `my-anim0001`
    through `my-anim0024`. I think this habit goes back to the good ol’ computer operating
    systems that were incapable of natural sorting and thus incorrectly sorted file
    names with consecutive numbers. Those days are long gone, and you’ll actually
    make it harder for the programmer to load files named like that in a `for` loop,
    since you’ll have to take into account how many leading zeros should be prepended.
    There is a nice formatting shortcut, `%03i`, to prepend zeros so that the number
    is always at least three digits long. However, I think it’s better in our modern
    world to just name file names consecutively without prepending any leading zeros.
    You gain a little bit of simplicity and peace of mind.


    This simplifies the code used to create an animation from individual files a lot:


    ```

    // The whole shebang is now encapsulated into a Category extension method

    CCAnimation* anim = [CCAnimation animationWithFile:@"ship-anim"

                                            frameCount:5

                                                 delay:0.08f];

    ```


    Essentially this cuts down the number of lines from nine to just this one. As
    the file name, you only need to pass the base name of your animation—in this case
    `ship-anim`. The helper method adds the consecutive numbers based on the `frameCount`
    parameter and also appends the `.png` file extension. You can also use the base
    name for the animation as the name for the animation when you add it to the `CCAnimationCache`
    so that you don’t have to remember alternate names for the same animation. Previously
    I named the ship’s animation `move`. Now it’s called `ship-anim`, in line with
    the file names. You could store and access the animation from the `CCAnimationCache`
    by using its base name like so:


    ```

    NSString* shipAnimName = @"ship-anim";


    CCAnimation* anim = [CCAnimation animationWithFile:shipAnimName

                                            frameCount:5

                                                 delay:0.08f];

    [[CCAnimationCache sharedAnimationCache] addAnimation:anim name:shipAnimName];


    // sometime later:

    CCAnimation* shipAnim = [shipSprite animationByName:shipAnimName];

    ```


    The `animationWithFile` helper method makes two assumptions: animation image file
    names are consecutively numbered beginning with 0, and the files must be `.png`
    files. It’s up to you whether you want to stick to this exact naming convention
    or change it to accommodate your own needs. For example, you might find it more
    convenient to start numbering your animations starting with 1 instead of 0. In
    that case, you’ll have to change the `for` loop so that the name string is formatted
    with `i + 1`. The important part is to stick to whatever naming convention you
    choose to make your life (and your code) easier.


    You should take away three things from this:


    - Encapsulate commonly used code by defining your own methods.

    - Use Objective-C categories to add methods to existing classes.

    - Define resource file naming conventions to support your code.


    ### Working with Texture Atlases


    Texture atlases help conserve precious memory, and they also help speed up the
    rendering of sprites. Since a texture atlas is nothing but a big texture, you
    can render all the images it contains using a `CCSpriteBatchNode`, thus reducing
    the draw call overhead. Using texture atlases is a win-win for both memory usage
    and performance.'
