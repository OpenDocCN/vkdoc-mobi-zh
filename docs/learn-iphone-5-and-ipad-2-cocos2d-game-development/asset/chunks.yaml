- fmt: "为了尽量避免不必要的 Game Center 服务器调用，首先会验证成就的`percentComplete`属性确实小于`percent`参数。Game\
    \ Center 不允许降低成就进度，因此会忽略此类报告。但如果你能在一开始就避免将此进度实际报告给 Game Center 服务器，就能避免一次不必要的数据传输。鉴于移动设备的带宽有限，节省的每一比特数据传输都是有益的。\n\
    \n**注意：** 报告成就进度可能因多种原因失败——例如，设备可能已失去互联网连接。请准备好保存那些未能成功传输的成就。然后定期重试提交，或者等到玩家下次登录时再试。幸运的是，最终的`GameKitHelper`类包含了额外的代码来缓存向\
    \ Game Center 服务器传输失败的成就。你可以在本章的代码文件夹中找到`GameKitHelper`类的最终版本。\n\n这仍然留下了一个问题：成就最初是从哪里来的？它们会在本地玩家登录时立即加载。为了实现这一点，我扩展了`authenticateWithCompletionHandler`中使用的块对象，以便在没有错误时调用`loadAchievements`方法：\n\
    \n```\n[localPlayer authenticateWithCompletionHandler:\n^(NSError* error)\n{\n\
    \    [self setLastError:error];\n\n    if (error == nil)\n    {\n        [self\
    \ loadAchievements];\n    }\n}];\n```\n\n`loadAchievements`方法使用`GKAchievement`类的`loadAchievementsWithCompletionHandler`方法从\
    \ Game Center 检索本地玩家的成就（[清单 14–16](#Chapter14.html#list_14_16)）。\n\n**清单 14–16.**\
    \ *加载本地玩家的成就*\n\n```\n-(void) loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:\n\
    \    ^(NSArray* loadedAchievements, NSError* error)\n    {\n        [self setLastError:error];\n\
    \n        if (achievements == nil)\n        {\n            achievements = [[NSMutableDictionary\
    \ alloc] init];\n        }\n        else\n        {\n            [achievements\
    \ removeAllObjects];\n        }\n\n        for (GKAchievement* achievement in\
    \ loadedAchievements)\n        {\n            [achievements setObject:achievement\n\
    \                             forKey:achievement.identifier];\n        }\n\n \
    \       [delegate onAchievementsLoaded:achievements];\n    }];\n}\n```\n\n在块对象内部，成员变量`achievements`要么被新分配内存，要么被清空所有对象。这允许你稍后再次调用`loadAchievements`方法来刷新成就列表。返回的数组`loadedAchievements`包含多个`GKAchievement`实例，这些实例随后被转移到`achievements`字典（`NSMutableDictionary`）中，纯粹是为了方便访问。`NSDictionary`类允许你直接通过成就的字符串标识符来检索它，而不必遍历数组并逐一比较每个成就的标识符。你可以在[清单\
    \ 14–17](#Chapter14.html#list_14_17)的`getAchievementByID`方法中看到这一点。\n\n**清单 14–17.**\
    \ *获取并可选地创建一个成就*\n\n```\n-(GKAchievement*) getAchievementByID:(NSString*)identifier\n\
    {\n    GKAchievement* achievement = [achievements objectForKey:identifier];\n\n\
    \    if (achievement == nil)\n    {\n        // Create a new achievement object\n\
    \        achievement = [[[GKAchievement alloc] initWithIdentifier:identifier]\n\
    \            autorelease];\n        [achievements setObject:achievement forKey:achievement.identifier];\n\
    \    }\n\n    return [[achievement retain] autorelease];\n}\n```\n\n这里需要小心。`getAchievementByID`方法在找不到给定标识符的成就时会创建一个新的成就，假设此成就的进度从未向\
    \ Game Center 报告过。只有在 Game Center 中至少报告过一次的成就才会通过[清单 14–16](#Chapter14.html#list_14_16)中的`loadAchievements`方法获得。对于任何其他成就，你必须先创建它。因此，`getAchievementsByID`将始终返回一个有效的成就对象，但只有当你尝试向\
    \ Game Center 报告其进度时，才会注意到该成就是否确实为你的游戏正确设置。\n\n这里一个可能引起好奇的地方是，我对返回的成就对象发送了`retain`和`autorelease`消息。这是为了确保，如果`achievements`字典因调用`loadAchievements`而被清空，任何通过`getAchievementsByID`返回的成就对象仍然有效。但我们的想法是让`GameKitHelper`来管理成就，因此任何其他代码都不应存储成就对象，而应在需要时通过`GameKitHelper`获取它们。\n\
    \n你也可以清除本地玩家的成就进度。这需要非常谨慎地操作，并且必须征得玩家同意。另一方面，在开发过程中，[清单 14–18](#Chapter14.html#list_14_18)中的`resetAchievements`方法会非常方便。\n\
    \n**清单 14–18.** *重置成就进度*\n\n```\n-(void) resetAchievements\n{\n    [achievements\
    \ removeAllObjects];\n\n    [GKAchievement resetAchievementsWithCompletionHandler:\n\
    \    ^(NSError* error)\n    {\n        [self setLastError:error];\n        bool\
    \ success = (error == nil);\n        [delegate onResetAchievements:success];\n\
    \    }];\n}\n```"
  raw: 'To avoid unnecessary calls to the Game Center server, the achievement''s `percentComplete`
    property is verified to actually be smaller than the `percent` parameter. Game
    Center does not allow achievement progress to be reduced and thus will ignore
    such a report. But if you can avoid actually reporting this to the Game Center
    server in the first place, you avoid an unnecessary data transfer. With the limited
    bandwidth available on mobile devices, every bit of data not transmitted is a
    good thing.


    **NOTE:** Reporting an achievement''s progress may fail for a number of reasons—for
    example, the device might have lost its Internet connection. Be prepared to save
    any achievements that couldn''t be transmitted. Then retry submitting them periodically
    or when the player logs in the next time. Fortunately, the final `GameKitHelper`
    class contains additional code to cache achievements that failed transmission
    to the Game Center server. You''ll find the final version of the `GameKitHelper`
    class in the code folder for this chapter.


    This still leaves the question open: where do the achievements come from in the
    first place? They are loaded as soon as the local player signs in. To make this
    possible, I extended the block object used in `authenticateWithCompletionHandler`
    to call the `loadAchievements` method if there wasn''t an error:


    `[localPlayer authenticateWithCompletionHandler:`![images](images/U002.jpg)

    `^(NSError* error)`

    `{`

    `    [self setLastError:error];`


    `    if (error == nil)`

    `    {`

    `        [self loadAchievements];`

    `    }`

    `}];`


    The `loadAchievements` method uses the `GKAchievement` class''s `loadAchievementsWithCompletionHandler`
    method to retrieve the local player''s achievements from Game Center ([Listing
    14–16](#Chapter14.html#list_14_16)).


    **Listing 14–16.** *Loading the Local Player''s Achievements*


    `-(void) loadAchievements`

    `{`

    `    [GKAchievement loadAchievementsWithCompletionHandler:`![images](images/U002.jpg)

    `    ^(NSArray* loadedAchievements, NSError* error)`

    `    {`

    `        [self setLastError:error];`


    `        if (achievements == nil)`

    `        {`

    `            achievements = [[NSMutableDictionary alloc] init];`

    `        }`

    `        else`

    `        {`

    `            [achievements removeAllObjects];`

    `        }`


    `        for (GKAchievement* achievement in loadedAchievements)`

    `        {`

    `            [achievements setObject:achievement`

    `                             forKey:achievement.identifier];`

    `        }`


    `        [delegate onAchievementsLoaded:achievements];`

    `    }];`

    `}`


    Inside the block object, the `achievements` member variable is either allocated
    or has all objects removed from it. This allows you to call the `loadAchievements`
    method at a later time to refresh the list of achievements. The returned array
    `loadedAchievements` contains a number of `GKAchievement` instances, which are
    then transferred to the `achievementsNSMutableDictionary` simply for ease of access.
    The `NSDictionary` class allows you to retrieve an achievement by its string identifier
    directly, instead of having to iterate over the array and comparing each achievement''s
    identifier along the way. You can see this in the `getAchievementByID` method
    in [Listing 14–17](#Chapter14.html#list_14_17).


    **Listing 14–17.** *Getting and Optionally Creating an Achievement*


    `-(GKAchievement*) getAchievementByID:(NSString*)identifier`

    `{`

    `    GKAchievement* achievement = [achievements objectForKey:identifier];`


    `    if (achievement == nil)`

    `    {`

    `        // Create a new achievement object`

    `        achievement = [[[GKAchievement alloc] initWithIdentifier:identifier]`![images](images/U002.jpg)

    `            autorelease];`

    `        [achievements setObject:achievement forKey:achievement.identifier];`

    `    }`


    `    return [[achievement retain] autorelease];`

    `}`


    This is where you need to be careful. The `getAchievementByID` method creates
    a new achievement if it can''t find one with the given identifier, assuming that
    this achievement''s progress has never been reported to Game Center before. Only
    achievements that have been reported to Game Center at least once are obtained
    through the `loadAchievements` method in [Listing 14–16](#Chapter14.html#list_14_16).
    For any other achievement, you''ll have to create it first. So, `getAchievementsByID`
    will always return a valid achievement object, but you''ll only notice whether
    that achievement is really set up for your game when you try to report its progress
    to Game Center.


    One curiosity here may be that I send a `retain` and an `autorelease` message
    to the returned achievement. This is to ensure that, in case the achievements
    dictionary is cleared by a call to `loadAchievements`, any achievement returned
    through `getAchievementsByID` remains valid. But the idea is to let `GameKitHelper`
    manage the achievements, so any other code shouldn''t store achievement objects
    but just obtain them through `GameKitHelper` whenever they are needed.


    You can also clear the local player''s achievement progress. This should be done
    with great care and not without asking the player''s permission. On the other
    hand, during development, the `resetAchievements` method in [Listing 14–18](#Chapter14.html#list_14_18)
    comes in handy.


    **Listing 14–18.** *Resetting Achievement Progress*


    `-(void) resetAchievements`

    `{`

    `    [achievements removeAllObjects];`


    `    [GKAchievement resetAchievementsWithCompletionHandler:`![images](images/U002.jpg)

    `    ^(NSError* error)`

    `    {`

    `        [self setLastError:error];`

    `        bool success = (error == nil);`

    `        [delegate onResetAchievements:success];`

    `    }];`

    `}`'
  trans: "\n为了尽量避免不必要的 Game Center 服务器调用，首先会验证成就的`percentComplete`属性确实小于`percent`参数。Game\
    \ Center 不允许降低成就进度，因此会忽略此类报告。但如果你能在一开始就避免将此进度实际报告给 Game Center 服务器，就能避免一次不必要的数据传输。鉴于移动设备的带宽有限，节省的每一比特数据传输都是有益的。\n\
    \n**注意：** 报告成就进度可能因多种原因失败——例如，设备可能已失去互联网连接。请准备好保存那些未能成功传输的成就。然后定期重试提交，或者等到玩家下次登录时再试。幸运的是，最终的`GameKitHelper`类包含了额外的代码来缓存向\
    \ Game Center 服务器传输失败的成就。你可以在本章的代码文件夹中找到`GameKitHelper`类的最终版本。\n\n这仍然留下了一个问题：成就最初是从哪里来的？它们会在本地玩家登录时立即加载。为了实现这一点，我扩展了`authenticateWithCompletionHandler`中使用的块对象，以便在没有错误时调用`loadAchievements`方法：\n\
    \n```\n[localPlayer authenticateWithCompletionHandler:\n^(NSError* error)\n{\n\
    \    [self setLastError:error];\n\n    if (error == nil)\n    {\n        [self\
    \ loadAchievements];\n    }\n}];\n```\n\n`loadAchievements`方法使用`GKAchievement`类的`loadAchievementsWithCompletionHandler`方法从\
    \ Game Center 检索本地玩家的成就（清单 14–16）。\n\n**清单 14–16.** *加载本地玩家的成就*\n\n```\n-(void)\
    \ loadAchievements\n{\n    [GKAchievement loadAchievementsWithCompletionHandler:\n\
    \    ^(NSArray* loadedAchievements, NSError* error)\n    {\n        [self setLastError:error];\n\
    \n        if (achievements == nil)\n        {\n            achievements = [[NSMutableDictionary\
    \ alloc] init];\n        }\n        else\n        {\n            [achievements\
    \ removeAllObjects];\n        }\n\n        for (GKAchievement* achievement in\
    \ loadedAchievements)\n        {\n            [achievements setObject:achievement\n\
    \                             forKey:achievement.identifier];\n        }\n\n \
    \       [delegate onAchievementsLoaded:achievements];\n    }];\n}\n```\n\n在块对象内部，成员变量`achievements`要么被新分配内存，要么被清空所有对象。这允许你稍后再次调用`loadAchievements`方法来刷新成就列表。返回的数组`loadedAchievements`包含多个`GKAchievement`实例，这些实例随后被转移到`achievements`字典（`NSMutableDictionary`）中，纯粹是为了方便访问。`NSDictionary`类允许你直接通过成就的字符串标识符来检索它，而不必遍历数组并逐一比较每个成就的标识符。你可以在清单\
    \ 14–17 的`getAchievementByID`方法中看到这一点。\n\n**清单 14–17.** *获取并可选地创建一个成就*\n\n```\n\
    -(GKAchievement*) getAchievementByID:(NSString*)identifier\n{\n    GKAchievement*\
    \ achievement = [achievements objectForKey:identifier];\n\n    if (achievement\
    \ == nil)\n    {\n        // Create a new achievement object\n        achievement\
    \ = [[[GKAchievement alloc] initWithIdentifier:identifier]\n            autorelease];\n\
    \        [achievements setObject:achievement forKey:achievement.identifier];\n\
    \    }\n\n    return [[achievement retain] autorelease];\n}\n```\n\n这里需要小心。`getAchievementByID`方法在找不到给定标识符的成就时会创建一个新的成就，假设此成就的进度从未向\
    \ Game Center 报告过。只有在 Game Center 中至少报告过一次的成就才会通过清单 14–16 中的`loadAchievements`方法获得。对于任何其他成就，你必须先创建它。因此，`getAchievementsByID`将始终返回一个有效的成就对象，但只有当你尝试向\
    \ Game Center 报告其进度时，才会注意到该成就是否确实为你的游戏正确设置。\n\n这里一个可能引起好奇的地方是，我对返回的成就对象发送了`retain`和`autorelease`消息。这是为了确保，如果`achievements`字典因调用`loadAchievements`而被清空，任何通过`getAchievementsByID`返回的成就对象仍然有效。但我们的想法是让`GameKitHelper`来管理成就，因此任何其他代码都不应存储成就对象，而应在需要时通过`GameKitHelper`获取它们。\n\
    \n你也可以清除本地玩家的成就进度。这需要非常谨慎地操作，并且必须征得玩家同意。另一方面，在开发过程中，清单 14–18 中的`resetAchievements`方法会非常方便。\n\
    \n**清单 14–18.** *重置成就进度*\n\n```\n-(void) resetAchievements\n{\n    [achievements\
    \ removeAllObjects];\n\n    [GKAchievement resetAchievementsWithCompletionHandler:\n\
    \    ^(NSError* error)\n    {\n        [self setLastError:error];\n        bool\
    \ success = (error == nil);\n        [delegate onResetAchievements:success];\n\
    \    }];\n}\n```\n"
- fmt: "### Matchmaking\n\nMoving on to the Tilemap14 project, we enter the realm\
    \ of matchmaking—connecting players and inviting friends to play a game match\
    \ together, that is. To start hosting a game and to bring up the corresponding\
    \ matchmaking view, I've added a call to `GameKitHelper`'s `showMatchmakerWithRequest`\
    \ method after the local player has been authenticated, as shown in [Listing 14–19](#Chapter14.html#list_14_19).\n\
    \n**Listing 14–19.** *Preparing to Show the Host Game Screen*\n\n```\n-(void)\
    \ onLocalPlayerAuthenticationChanged\n{\n    GKLocalPlayer* localPlayer = [GKLocalPlayer\
    \ localPlayer];\n    if (localPlayer.authenticated)\n    {\n        GKMatchRequest*\
    \ request = [[[GKMatchRequest alloc] init] autorelease];\n        request.minPlayers\
    \ = 2;\n        request.maxPlayers = 4;\n\n        GameKitHelper* gkHelper = [GameKitHelper\
    \ sharedGameKitHelper];\n        [gkHelper showMatchmakerWithRequest:request];\n\
    \    }\n}\n```\n\nA `GKMatchRequest` instance is created, and its `minPlayers`\
    \ and `maxPlayers` properties are initialized, indicating that the match should\
    \ have at least two and at most four players. Every match must allow for two players,\
    \ obviously, and a peer-to-peer match can be played with up to four players. *Peer-to-peer\
    \ networking* means that all devices are connected with each other and can send\
    \ data to and receive it from all other devices. This is opposed to a server/client\
    \ architecture, where all players connect to a single server and send and receive\
    \ only to and from this server. In peer-to-peer networks, the amount of traffic\
    \ generated grows exponentially, so most peer-to-peer multiplayer games are strictly\
    \ limited to a very low number of allowed players.\n\n**NOTE:** Game Center can\
    \ connect up to 16 players, but only if you have a hosted server application to\
    \ manage all matches using a client/server architecture. That requires a huge\
    \ amount of work and know-how to set up and use properly, so I'll leave it out\
    \ of this discussion and focus only on peer-to-peer networking.\n\nThe `showMatchmakerWithRequest`\
    \ method is implemented in a strikingly similar way to the code that brings up\
    \ the leaderboard and achievement views, as [Listing 14–20](#Chapter14.html#list_14_20)\
    \ shows.\n\n**Listing 14–20.** *Showing the Host Game Screen*\n\n```\n-(void)\
    \ showMatchmakerWithRequest:(GKMatchRequest*)request\n{\n    GKMatchmakerViewController*\
    \ hostVC = [[[GKMatchmakerViewController alloc]\n        initWithMatchRequest:request]\
    \ autorelease];\n    if (hostVC != nil)\n    {\n        hostVC.matchmakerDelegate\
    \ = self;\n        [self presentViewController:hostVC];\n    }\n}\n```\n\n[Figure\
    \ 14–7](#Chapter14.html#fig_14_7) shows an example matchmaking view, waiting for\
    \ you to invite a friend to your match. You can also wait until Game Center finds\
    \ an automatically matched player for your game, but since you're currently developing\
    \ the game, it's rather unlikely that anyone but you will be currently playing\
    \ it.\n\nIf you followed the leaderboard and achievement view examples, you'll\
    \ know that each required the `GameKitHelper` class to implement a protocol, and\
    \ with matchmaking it's no different. I also added `GKMatchDelegate` because we're\
    \ going to need it soon.\n\n```\n@interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate,\n\
    \    GKAchievementViewControllerDelegate, GKMatchmakerViewControllerDelegate,\n\
    \    GKMatchDelegate>\n```\n\nThe `GKMatchmakerViewControllerDelegate` protocol\
    \ requires three methods to be implemented: one for the player pressing the Cancel\
    \ button, one for failing with an error, and one for finding a suitable match.\
    \ The latter deserves a mention:\n\n```\n-(void) matchmakerViewController:(GKMatchmakerViewController*)viewController\n\
    \                    didFindMatch:(GKMatch*)match\n{\n    [self dismissModalViewController];\n\
    \    [self setCurrentMatch:match];\n    [delegate onMatchFound:match];\n}\n```\n\
    \nIf a match was found, this match is set as the current match, and the delegate's\
    \ `onMatchFound` method is called to inform it about the newly found match.\n\n\
    Instead of hosting a match, you can also instruct Game Center to try to automatically\
    \ find a match for you, as shown in [Listing 14–21](#Chapter14.html#list_14_21).\
    \ If successful, the delegate receives the same `onMatchFound` message.\n\n![images](images/1407.jpg)\n\
    \n**Figure 14–7.** *The host game matchmaking view*\n\n**Listing 14–21.** *Searching\
    \ for an Existing Match*\n\n```\n-(void) findMatchForRequest:(GKMatchRequest*)request\n\
    {\n    GKMatchMaker* matchmaker = [GKMatchMaker sharedMatchmaker];\n    [matchmaker\
    \ findMatchForRequest:request withCompletionHandler:\n    ^(GKMatch* match, NSError*\
    \ error)\n    {\n        [self setLastError:error];\n\n        if (match != nil)\n\
    \        {\n            [self setCurrentMatch:match];\n            [delegate onMatchFound:match];\n\
    \        }\n    }];\n}\n```\n\nWhile Game Center is searching for a match, you\
    \ should give the user visual feedback, like an animated progress indicator, because\
    \ finding a match can take several seconds or even minutes. That's where the `CCProgressTimer`\
    \ class comes in handy, which I discussed in [Chapter 5](#Chapter05.html#ch5).\
    \ You should also give your user a means to cancel the matchmaking process, and\
    \ if she does so, you should call the `cancelMatchmakingRequest` method:\n\n```\n\
    -(void) cancelMatchmakingRequest\n{\n    [[GKMatchmaker sharedMatchmaker] cancel];\n\
    }\n```\n\nAt this point, the match has been created, but all the players might\
    \ not yet be connected to the match. As players join the game, the `match:didChangeState`\
    \ method of the `GKMatchDelegate` protocol is called for each player connecting\
    \ or disconnecting. Only when the `expectedPlayerCount` of the match has been\
    \ counted down to 0 by the Game Kit framework should you start the match. The\
    \ `GKMatch` object updates the `expectedPlayerCount` property automatically, as\
    \ [Listing 14–22](#Chapter14.html#list_14_22) shows.\n\n**Listing 14–22.** *Waiting\
    \ for All Players Before Starting the Match*\n\n```\n-(void) match:(GKMatch*)match\
    \ player:(NSString*)playerID\n    didChangeState:(GKPlayerConnectionState)state\n\
    {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n         \
    \   [delegate onPlayerConnected:playerID];\n            break;\n        case GKPlayerStateDisconnected:\n\
    \            [delegate onPlayerDisconnected:playerID];\n            break;\n \
    \   }\n\n    if (matchStarted == NO && match.expectedPlayerCount == 0)\n    {\n\
    \        matchStarted = YES;\n        [delegate onStartMatch];\n    }\n}\n```\n\
    \nIf at any time during your game a player drops out and the `expectedPlayerCount`\
    \ property becomes greater than `0`, you can call `addPlayersToMatch` to fill\
    \ up the now empty space with a new player, as in [Listing 14–23](#Chapter14.html#list_14_23)\
    \ (assuming that your game supports players joining a match in progress). Since\
    \ there's no guarantee that a player will actually be found, you should not interrupt\
    \ the game while `GKMatchmaker` is looking for a new player.\n\n**Listing 14–23.**\
    \ *Adding Players to an Existing Match*\n\n```\n-(void) addPlayersToMatch:(GKMatchRequest*)request\n\
    {\n    if (currentMatch == nil)\n        return;\n\n    [[GKMatchmaker sharedMatchmaker]\
    \ addPlayersToMatch:currentMatch\n                                          matchRequest:request\n\
    \                                     completionHandler:\n    ^(NSError* error)\n\
    \    {\n        [self setLastError:error];\n\n        bool success = (error ==\
    \ nil);\n        [delegate onPlayersAddedToMatch:success];\n    }];\n}\n```"
  raw: '#### Matchmaking


    Moving on to the Tilemap14 project, we enter the realm of matchmaking—connecting
    players and inviting friends to play a game match together, that is. To start
    hosting a game and to bring up the corresponding matchmaking view, I''ve added
    a call to `GameKitHelper`''s `showMatchmakerWithRequest` method after the local
    player has been authenticated, as shown in [Listing 14–19](#Chapter14.html#list_14_19).


    **Listing 14–19.** *Preparing to Show the Host Game Screen*


    `-(void) onLocalPlayerAuthenticationChanged`

    `{`

    `    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];`

    `    if (localPlayer.authenticated)`

    `    {`

    `        GKMatchRequest* request = [[[GKMatchRequest alloc] init] autorelease];`

    `        request.minPlayers = 2;`

    `        request.maxPlayers = 4;`


    `        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `        [gkHelper showMatchmakerWithRequest:request];`

    `    }`

    `}`


    A `GKMatchRequest` instance is created, and its `minPlayers` and `maxPlayers`
    properties are initialized, indicating that the match should have at least two
    and at most four players. Every match must allow for two players, obviously, and
    a peer-to-peer match can be played with up to four players. *Peer-to-peer networking*
    means that all devices are connected with each other and can send data to and
    receive it from all other devices. This is opposed to a server/client architecture,
    where all players connect to a single server and send and receive only to and
    from this server. In peer-to-peer networks, the amount of traffic generated grows
    exponentially, so most peer-to-peer multiplayer games are strictly limited to
    a very low number of allowed players.


    **NOTE:** Game Center can connect up to 16 players, but only if you have a hosted
    server application to manage all matches using a client/server architecture. That
    requires a huge amount of work and know-how to set up and use properly, so I''ll
    leave it out of this discussion and focus only on peer-to-peer networking.


    The `showMatchmakerWithRequest` method is implemented in a strikingly similar
    way to the code that brings up the leaderboard and achievement views, as [Listing
    14–20](#Chapter14.html#list_14_20) shows.


    **Listing 14–20.** *Showing the Host Game Screen*


    `-(void) showMatchmakerWithRequest:(GKMatchRequest*)request`

    `{`

    `    GKMatchmakerViewController* hostVC = [[[GKMatchmakerViewController alloc]`![images](images/U002.jpg)

    `        initWithMatchRequest:request] autorelease];`

    `    if (hostVC != nil)`

    `    {`

    `        hostVC.matchmakerDelegate = self;`

    `        [self presentViewController:hostVC];`

    `    }`

    `}`


    [Figure 14–7](#Chapter14.html#fig_14_7) shows an example matchmaking view, waiting
    for you to invite a friend to your match. You can also wait until Game Center
    finds an automatically matched player for your game, but since you''re currently
    developing the game, it''s rather unlikely that anyone but you will be currently
    playing it.


    If you followed the leaderboard and achievement view examples, you''ll know that
    each required the `GameKitHelper` class to implement a protocol, and with matchmaking
    it''s no different. I also added `GKMatchDelegate` because we''re going to need
    it soon.


    `@interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate,`![images](images/U002.jpg)

    `    GKAchievementViewControllerDelegate, GKMatchmakerViewControllerDelegate,`![images](images/U002.jpg)

    `    GKMatchDelegate>`


    The `GKMatchmakerViewControllerDelegate` protocol requires three methods to be
    implemented: one for the player pressing the Cancel button, one for failing with
    an error, and one for finding a suitable match. The latter deserves a mention:


    `-(void) matchmakerViewController:(GKMatchmakerViewController*)viewController`

    `                    didFindMatch:(GKMatch*)match`

    `{`

    `    [self dismissModalViewController];`

    `    [self setCurrentMatch:match];`

    `    [delegate onMatchFound:match];`

    `}`


    If a match was found, this match is set as the current match, and the delegate''s
    `onMatchFound` method is called to inform it about the newly found match.


    Instead of hosting a match, you can also instruct Game Center to try to automatically
    find a match for you, as shown in [Listing 14–21](#Chapter14.html#list_14_21).
    If successful, the delegate receives the same `onMatchFound` message.


    ![images](images/1407.jpg)


    **Figure 14–7.** *The host game matchmaking view*


    **Listing 14–21.** *Searching for an Existing Match*


    `-(void) findMatchForRequest:(GKMatchRequest*)request`

    `{`

    `    GKMatchMaker* matchmaker = [GKMatchMaker sharedMatchmaker];`

    `    [matchmaker findMatchForRequest:request withCompletionHandler:`![images](images/U002.jpg)

    `    ^(GKMatch* match, NSError* error)`

    `    {`

    `        [self setLastError:error];`


    `        if (match != nil)`

    `        {`

    `            [self setCurrentMatch:match];`

    `            [delegate onMatchFound:match];`

    `        }`

    `    }];`

    `}`


    While Game Center is searching for a match, you should give the user visual feedback,
    like an animated progress indicator, because finding a match can take several
    seconds or even minutes. That''s where the `CCProgressTimer` class comes in handy,
    which I discussed in [Chapter 5](#Chapter05.html#ch5). You should also give your
    user a means to cancel the matchmaking process, and if she does so, you should
    call the `cancelMatchmakingRequest` method:


    `-(void) cancelMatchmakingRequest`

    `{`

    `    [[GKMatchmaker sharedMatchmaker] cancel];`

    `}`


    At this point, the match has been created, but all the players might not yet be
    connected to the match. As players join the game, the `match:didChangeState` method
    of the `GKMatchDelegate` protocol is called for each player connecting or disconnecting.
    Only when the `expectedPlayerCount` of the match has been counted down to 0 by
    the Game Kit framework should you start the match. The `GKMatch` object updates
    the `expectedPlayerCount` property automatically, as [Listing 14–22](#Chapter14.html#list_14_22)
    shows.


    **Listing 14–22.** *Waiting for All Players Before Starting the Match*


    `-(void) match:(GKMatch*)match player:(NSString*)playerID`![images](images/U002.jpg)

    `    didChangeState:(GKPlayerConnectionState)state`

    `{`

    `    switch (state)`

    `    {`

    `        case GKPlayerStateConnected:`

    `            [delegate onPlayerConnected:playerID];`

    `            break;`

    `        case GKPlayerStateDisconnected:`

    `            [delegate onPlayerDisconnected:playerID];`

    `            break;`

    `    }`


    `    if (matchStarted == NO && match.expectedPlayerCount == 0)`

    `    {`

    `        matchStarted = YES;`

    `        [delegate onStartMatch];`

    `    }`

    `}`


    If at any time during your game a player drops out and the `expectedPlayerCount`
    property becomes greater than `0`, you can call `addPlayersToMatch` to fill up
    the now empty space with a new player, as in [Listing 14–23](#Chapter14.html#list_14_23)
    (assuming that your game supports players joining a match in progress). Since
    there''s no guarantee that a player will actually be found, you should not interrupt
    the game while `GKMatchmaker` is looking for a new player.


    **Listing 14–23.** *Adding Players to an Existing Match*


    `-(void) addPlayersToMatch:(GKMatchRequest*)request`

    `{`

    `    if (currentMatch == nil)`

    `        return;`


    `    [[GKMatchmaker sharedMatchmaker] addPlayersToMatch:currentMatch`

    `                                          matchRequest:request`

    `                                     completionHandler:`![images](images/U002.jpg)

    `    ^(NSError* error)`

    `    {`

    `        [self setLastError:error];`


    `        bool success = (error == nil);`

    `        [delegate onPlayersAddedToMatch:success];`

    `    }];`

    `}`'
  trans: "\n### 匹配机制\n\n接下来进入 Tilemap14 项目，我们将探索匹配机制——即连接玩家并邀请好友共同进行游戏对局。为了开始主持游戏并调出相应的匹配界面，我在本地玩家通过验证后添加了调用\
    \ `GameKitHelper` 的 `showMatchmakerWithRequest` 方法，如代码清单 14-19 所示。\n\n**代码清单 14-19.**\
    \ *准备显示主持游戏界面*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n{\n    GKLocalPlayer*\
    \ localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        GKMatchRequest* request = [[[GKMatchRequest alloc] init] autorelease];\n\
    \        request.minPlayers = 2;\n        request.maxPlayers = 4;\n\n        GameKitHelper*\
    \ gkHelper = [GameKitHelper sharedGameKitHelper];\n        [gkHelper showMatchmakerWithRequest:request];\n\
    \    }\n}\n```\n\n创建了一个 `GKMatchRequest` 实例，并初始化了其 `minPlayers` 和 `maxPlayers`\
    \ 属性，指示该匹配至少需要两名玩家，最多允许四名玩家。显然每场匹配都必须支持两人参与，而点对点匹配最多可容纳四名玩家。*点对点网络*意味着所有设备之间相互连接，能够彼此收发数据。这与服务器/客户端架构相反，后者所有玩家都连接到单一服务器，仅与该服务器进行数据收发。在点对点网络中，流量呈指数级增长，因此大多数点对点多玩家游戏严格限制允许的玩家数量。\n\
    \n**注意：** Game Center 最多可连接 16 名玩家，但前提是你拥有托管服务器应用程序，通过客户端/服务器架构管理所有匹配。这需要大量工作和专业知识才能正确搭建和使用，因此本文不讨论这种情况，仅聚焦于点对点网络。\n\
    \n`showMatchmakerWithRequest` 方法的实现方式与显示排行榜和成就界面的代码惊人地相似，如代码清单 14-20 所示。\n\n**代码清单\
    \ 14-20.** *显示主持游戏界面*\n\n```\n-(void) showMatchmakerWithRequest:(GKMatchRequest*)request\n\
    {\n    GKMatchmakerViewController* hostVC = [[[GKMatchmakerViewController alloc]\n\
    \        initWithMatchRequest:request] autorelease];\n    if (hostVC != nil)\n\
    \    {\n        hostVC.matchmakerDelegate = self;\n        [self presentViewController:hostVC];\n\
    \    }\n}\n```\n\n图 14-7 展示了一个示例匹配界面，等待你邀请好友加入对局。你也可以等待 Game Center 自动为你匹配玩家，但由于你正在开发游戏，当前很可能只有你在游玩。\n\
    \n如果你参考了排行榜和成就界面的示例，就会知道每个功能都需要 `GameKitHelper` 类实现对应的协议，匹配机制也不例外。我还添加了 `GKMatchDelegate`，因为我们很快会用到它。\n\
    \n```\n@interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate,\n\
    \    GKAchievementViewControllerDelegate, GKMatchmakerViewControllerDelegate,\n\
    \    GKMatchDelegate>\n```\n\n`GKMatchmakerViewControllerDelegate` 协议要求实现三个方法：分别处理玩家按下取消按钮、发生错误，以及找到合适匹配的情况。最后一个方法值得特别说明：\n\
    \n```\n-(void) matchmakerViewController:(GKMatchmakerViewController*)viewController\n\
    \                    didFindMatch:(GKMatch*)match\n{\n    [self dismissModalViewController];\n\
    \    [self setCurrentMatch:match];\n    [delegate onMatchFound:match];\n}\n```\n\
    \n如果找到匹配，该匹配会被设为当前匹配，并调用委托的 `onMatchFound` 方法通知新匹配的发现。\n\n除了主持匹配，你还可以指示 Game Center\
    \ 尝试自动为你寻找匹配，如代码清单 14-21 所示。如果成功，委托会收到同样的 `onMatchFound` 消息。\n\n![images](img/1407.jpg)\n\
    \n**图 14-7.** *主持游戏的匹配界面*\n\n**代码清单 14-21.** *搜索现有匹配*\n\n```\n-(void) findMatchForRequest:(GKMatchRequest*)request\n\
    {\n    GKMatchMaker* matchmaker = [GKMatchMaker sharedMatchmaker];\n    [matchmaker\
    \ findMatchForRequest:request withCompletionHandler:\n    ^(GKMatch* match, NSError*\
    \ error)\n    {\n        [self setLastError:error];\n\n        if (match != nil)\n\
    \        {\n            [self setCurrentMatch:match];\n            [delegate onMatchFound:match];\n\
    \        }\n    }];\n}\n```\n\n当 Game Center 搜索匹配时，你应该向用户提供视觉反馈，例如动画进度指示器，因为寻找匹配可能需要几秒甚至几分钟。这正是\
    \ `CCProgressTimer` 类的用武之地，我在第 5 章中讨论过它。你还应为用户提供取消匹配过程的方式，如果用户选择取消，则应调用 `cancelMatchmakingRequest`\
    \ 方法：\n\n```\n-(void) cancelMatchmakingRequest\n{\n    [[GKMatchmaker sharedMatchmaker]\
    \ cancel];\n}\n```\n\n此时匹配已创建，但可能并非所有玩家都已连接到匹配。随着玩家加入游戏，`GKMatchDelegate` 协议的\
    \ `match:didChangeState` 方法会针对每个连接或断开的玩家被调用。只有当匹配的 `expectedPlayerCount` 被 Game\
    \ Kit 框架递减到 0 时，你才能开始匹配。`GKMatch` 对象会自动更新 `expectedPlayerCount` 属性，如代码清单 14-22\
    \ 所示。\n\n**代码清单 14-22.** *等待所有玩家后再开始匹配*\n\n```\n-(void) match:(GKMatch*)match\
    \ player:(NSString*)playerID\n    didChangeState:(GKPlayerConnectionState)state\n\
    {\n    switch (state)\n    {\n        case GKPlayerStateConnected:\n         \
    \   [delegate onPlayerConnected:playerID];\n            break;\n        case GKPlayerStateDisconnected:\n\
    \            [delegate onPlayerDisconnected:playerID];\n            break;\n \
    \   }\n\n    if (matchStarted == NO && match.expectedPlayerCount == 0)\n    {\n\
    \        matchStarted = YES;\n        [delegate onStartMatch];\n    }\n}\n```\n\
    \n如果在游戏过程中有玩家掉线，导致 `expectedPlayerCount` 属性大于 0，你可以调用 `addPlayersToMatch` 来用新玩家填补空缺，如代码清单\
    \ 14-23 所示（假设你的游戏支持玩家加入进行中的匹配）。由于无法保证一定能找到新玩家，因此在 `GKMatchmaker` 寻找新玩家时不应中断游戏。\n\
    \n**代码清单 14-23.** *向现有匹配添加玩家*\n\n```\n-(void) addPlayersToMatch:(GKMatchRequest*)request\n\
    {\n    if (currentMatch == nil)\n        return;\n\n    [[GKMatchmaker sharedMatchmaker]\
    \ addPlayersToMatch:currentMatch\n                                          matchRequest:request\n\
    \                                     completionHandler:\n    ^(NSError* error)\n\
    \    {\n        [self setLastError:error];\n\n        bool success = (error ==\
    \ nil);\n        [delegate onPlayersAddedToMatch:success];\n    }];\n}\n```\n"
- fmt: "# Sending and Receiving Data\n\nOnce all players are connected and the match\
    \ has officially started, you can start sending and subsequently receiving data.\
    \ The easiest way to do so is to send data to all players, as shown in [Listing\
    \ 14–24](#Chapter14.html#list_14_24).\n\n**Listing 14–24.** *Sending and Receiving\
    \ Data*\n\n```\n-(void) sendDataToAllPlayers:(void*)data length:(NSUInteger)length\n\
    {\n    NSError* error = nil;\n    NSData* packet = [NSData dataWithBytes:data\
    \ length:length];\n    [currentMatch sendDataToAllPlayers:packet\n           \
    \               withDataMode:GKMatchSendDataUnreliable\n                     \
    \            error:&error];\n    [self setLastError:error];\n}\n\n-(void) match:(GKMatch*)match\
    \ didReceiveData:(NSData*)data\nfromPlayer:(NSString*)playerID\n{\n    [delegate\
    \ onReceivedData:data fromPlayer:playerID];\n}\n```\n\nThe `sendDataToAllPlayers`\
    \ method takes a `void` pointer as input and wraps it into an `NSData` object.\
    \ You can send any data as long as you provide the correct length of that data.\
    \ Typically, networked programs send structs like `CGPoint` (or any custom struct)\
    \ to make this process easier, since you can then use `sizeof(myPoint)` to get\
    \ the length (size in bytes) of such a data structure.\n\nAlso, to speed up transmission,\
    \ most data is sent unreliably. Data that is sent frequently can especially be\
    \ sent unreliably because if a packet ever gets lost, the clients simply have\
    \ to wait for the next packet to arrive. If you do need every packet to arrive—for\
    \ example, because it contains crucial information that is sent only once, then\
    \ you should set the data mode to `GKMatchSendDataReliable`. This instructs GameKit\
    \ to simply transmit the packet again if it could not be delivered. Since GameKit\
    \ has to receive a return packet from clients to acknowledge that they received\
    \ the packet, this adds additional traffic.\n\nWhat data you should send and how\
    \ often you should send it depend entirely on the game itself. The ground rule\
    \ is to send as little as you can, as rarely as possible. For example, instead\
    \ of transmitting each player's position every frame, you should send a packet\
    \ for each movement action, because the movement in the tilemap game is always\
    \ 32 pixels in one direction and done by a `CCMoveAction`. So, it's sufficient\
    \ to send when the move should start and in which direction it should be, which\
    \ saves a lot of traffic compared to sending each player's position every frame.\n\
    \nIn the Tilemap16 project you'll get an introduction to sending and receiving\
    \ packets over a network. The most important aspect to creating network packets\
    \ is that the receiver must be able to identify the type of packet received by\
    \ looking at a common header data. Typically, and this is also what the Apple\
    \ documentation recommends, you will define C structs with a common struct field\
    \ as the first entry for each packet. The `NetworkPackets.h` file defines the\
    \ structs shown in [Listing 14–25](#Chapter14.html#list_14_25).\n\n**Listing 14–25.**\
    \ *Defining Network Packets as C Structs in NetworkPackets.h*\n\n```\ntypedef\
    \ enum\n{\n    kPacketTypeScore = 1,\n    kPacketTypePosition,\n} EPacketTypes;\n\
    \ntypedef struct\n{\n    EPacketTypes type;\n} SBasePacket;\n\n// the packet for\
    \ transmitting a score variable\ntypedef struct\n{\n    EPacketTypes type;\n\n\
    \    int score;\n} SScorePacket;\n\n// packet to transmit a position\ntypedef\
    \ struct\n{\n    EPacketTypes type;\n\n    CGPoint position;\n} SPositionPacket;\n\
    ```\n\nYou'll see that all packet structs have the `EPacketTypes type` field,\
    \ and it's the first field in each struct. This allows you to cast any packet\
    \ to one of type `SBasePacket` to allow the receiver to inspect the packet `type`,\
    \ and based on that, the receiver can then safely cast the struct to the actual\
    \ packet.\n\n[Listing 14–26](#Chapter14.html#list_14_26) shows an example of this.\
    \ It's the `onReceivedData` method from the `TileMapScene` class.\n\n**Listing\
    \ 14–26.** *Receiving Packets and Determining Packet Type*\n\n```\n-(void) onReceivedData:(NSData*)data\
    \ fromPlayer:(NSString*)playerID\n{\n    SBasePacket* basePacket = (SBasePacket*)[data\
    \ bytes];\n\n    switch (basePacket->type)\n    {\n        case kPacketTypeScore:\n\
    \        {\n            SScorePacket* scorePacket = (SScorePacket*)basePacket;\n\
    \            CCLOG(@\"\\tscore = %i\", scorePacket->score);\n            break;\n\
    \        }\n        case kPacketTypePosition:\n        {\n            SPositionPacket*\
    \ positionPacket = (SPositionPacket*)basePacket;\n\n            if (playerID !=\
    \ [GKLocalPlayer localPlayer].playerID)\n            {\n                CCTMXTiledMap*\
    \ tileMap =\n                    (CCTMXTiledMap*)[self getChildByTag:TileMapNode];\n\
    \                [self centerTileMapOnTileCoord:positionPacket->position\n   \
    \                                    tileMap:tileMap];\n            }\n      \
    \      break;\n        }\n        default:\n            CCLOG(@\"unknown packet\
    \ type %i\", basePacket->type);\n            break;\n    }\n}\n```\n\nThis code\
    \ first casts the received `data bytes` to a pointer to an `SBasePacket` struct.\
    \ If you look it up in [Listing 14–25](#Chapter14.html#list_14_25), you'll notice\
    \ that's the struct that contains only the `type` field. Since we have declared\
    \ that all packets must have this field at its first entry, any packet can be\
    \ safely cast to `SBasePacket`. The `switch` statement inspects the type, and\
    \ depending on the network packet, further processing is done—but not without\
    \ casting the packet to the actual packet type. For example, if the `basePacket->type`\
    \ is `kPacketTypeScore`, the `basePacket` will be cast to an `SScorePacket` to\
    \ allow the code to access the `score` field.\n\n**TIP:** When checking packets,\
    \ it's a good idea to add the `default` option. You will frequently add new packets,\
    \ and from time to time you'll forget to handle this particular packet type on\
    \ the receiving end. So, logging this as an error or even throwing an exception\
    \ is recommended. Otherwise, you might see bugs in your app that might be hard\
    \ to track down.\n\nActually sending the packets is relatively easy and follows\
    \ the same principle. You first create a new variable with one of the packet structs\
    \ as its data type. Then you fill in each field of the struct and pass the struct\
    \ to the `GameKitHelper` method `sendDataToAllPlayers`.\n\nIn [Listing 14–27](#Chapter14.html#list_14_27),\
    \ the packets are created on the stack. You don't need to allocate memory because\
    \ Game Kit will make a copy of the struct and thus take over the memory management\
    \ of the packet. Since `sendDataToAllPlayers` required a pointer, the `packet`\
    \ is prefixed with the reference operator (ampersand character) `&packet` to denote\
    \ that the `packet` variable's address is passed instead of the `packet` itself.\n\
    \n**Listing 14–27.** *Sending Packets via GameKitHelper*\n\n```\n// TM16: send\
    \ a bogus score (simply an integer increased every time it is sent)\n-(void) sendScore\n\
    {\n    if ([GameKitHelper sharedGameKitHelper].currentMatch != nil)\n    {\n \
    \       bogusScore++;\n\n        SScorePacket packet;\n        packet.type = kPacketTypeScore;\n\
    \        packet.score = bogusScore;\n\n        [[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n                                             \
    \              length:sizeof(packet)];\n    }\n}\n\n// TM16: send a tile coordinate\n\
    -(void) sendPosition:(CGPoint)tilePos\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
    \ != nil)\n    {\n        SPositionPacket packet;\n        packet.type = kPacketTypePosition;\n\
    \        packet.position = tilePos;\n\n        [[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n                                             \
    \              length:sizeof(packet)];\n    }\n}\n```"
  raw: '#### Sending and Receiving Data


    Once all players are connected and the match has officially started, you can start
    sending and subsequently receiving data. The easiest way to do so is to send data
    to all players, as shown in [Listing 14–24](#Chapter14.html#list_14_24).


    **Listing 14–24.** *Sending and Receiving Data*


    `-(void) sendDataToAllPlayers:(void*)data length:(NSUInteger)length`

    `{`

    `    NSError* error = nil;`

    `    NSData* packet = [NSData dataWithBytes:data length:length];`

    `    [currentMatch sendDataToAllPlayers:packet`

    `                          withDataMode:GKMatchSendDataUnreliable`

    `                                 error:&error];`

    `    [self setLastError:error];`

    `}`


    `-(void) match:(GKMatch*)match didReceiveData:(NSData*)data`

    `fromPlayer:(NSString*)playerID`

    `{`

    `    [delegate onReceivedData:data fromPlayer:playerID];`

    `}`


    The `sendDataToAllPlayers` method takes a `void` pointer as input and wraps it
    into an `NSData` object. You can send any data as long as you provide the correct
    length of that data. Typically, networked programs send structs like `CGPoint`
    (or any custom struct) to make this process easier, since you can then use `sizeof(myPoint)`
    to get the length (size in bytes) of such a data structure.


    Also, to speed up transmission, most data is sent unreliably. Data that is sent
    frequently can especially be sent unreliably because if a packet ever gets lost,
    the clients simply have to wait for the next packet to arrive. If you do need
    every packet to arrive—for example, because it contains crucial information that
    is sent only once, then you should set the data mode to `GKMatchSendDataReliable`.
    This instructs GameKit to simply transmit the packet again if it could not be
    delivered. Since GameKit has to receive a return packet from clients to acknowledge
    that they received the packet, this adds additional traffic.


    What data you should send and how often you should send it depend entirely on
    the game itself. The ground rule is to send as little as you can, as rarely as
    possible. For example, instead of transmitting each player''s position every frame,
    you should send a packet for each movement action, because the movement in the
    tilemap game is always 32 pixels in one direction and done by a `CCMoveAction`.
    So, it''s sufficient to send when the move should start and in which direction
    it should be, which saves a lot of traffic compared to sending each player''s
    position every frame.


    In the Tilemap16 project you''ll get an introduction to sending and receiving
    packets over a network. The most important aspect to creating network packets
    is that the receiver must be able to identify the type of packet received by looking
    at a common header data. Typically, and this is also what the Apple documentation
    recommends, you will define C structs with a common struct field as the first
    entry for each packet. The NetworkPackets.h file defines the structs shown in
    [Listing 14–25](#Chapter14.html#list_14_25).


    **Listing 14–25.** *Defining Network Packets as C Structs in NetworkPackets.h*


    `typedef enum`

    `{`

    `    kPacketTypeScore = 1,`

    `    kPacketTypePosition,`

    `} EPacketTypes;`


    `typedef struct`

    `{`

    `    EPacketTypes type;`

    `} SBasePacket;`


    `// the packet for transmitting a score variable`

    `typedef struct`

    `{`

    `    EPacketTypes type;`


    `    int score;`

    `} SScorePacket;`


    `// packet to transmit a position`

    `typedef struct`

    `{`

    `    EPacketTypes type;`


    `    CGPoint position;`

    `} SPositionPacket;`


    You''ll see that all packet structs have the `EPacketTypes type` field, and it''s
    the first field in each struct. This allows you to cast any packet to one of type
    `SBasePacket` to allow the receiver to inspect the packet `type`, and based on
    that, the receiver can then safely cast the struct to the actual packet.


    [Listing 14–26](#Chapter14.html#list_14_26) shows an example of this. It''s the
    `onReceivedData` method from the `TileMapScene` class.


    **Listing 14–26.** *Receiving Packets and Determining Packet Type*


    `-(void) onReceivedData:(NSData*)data fromPlayer:(NSString*)playerID`

    `{`

    `    SBasePacket* basePacket = (SBasePacket*)[data bytes];`


    `    switch (basePacket->type)`

    `    {`

    `        case kPacketTypeScore:`

    `        {`

    `            SScorePacket* scorePacket = (SScorePacket*)basePacket;`

    `            CCLOG(@"\tscore = %i", scorePacket->score);`

    `            break;`

    `        }`

    `        case kPacketTypePosition:`

    `        {`

    `            SPositionPacket* positionPacket = (SPositionPacket*)basePacket;`


    `            if (playerID != [GKLocalPlayer localPlayer].playerID)`

    `            {`

    `                CCTMXTiledMap* tileMap =`![images](images/U002.jpg)

    `                    (CCTMXTiledMap*)[self getChildByTag:TileMapNode];`

    `                [self centerTileMapOnTileCoord:positionPacket->position`

    `                                       tileMap:tileMap];`

    `            }`

    `            break;`

    `        }`

    `        default:`

    `            CCLOG(@"unknown packet type %i", basePacket->type);`

    `            break;`

    `    }`

    `}`


    This code first casts the received `data bytes` to a pointer to an `SBasePacket`
    struct. If you look it up in [Listing 14–25](#Chapter14.html#list_14_25), you''ll
    notice that''s the struct that containsonly the `type` field. Since we have declared
    that all packets must have this field at its first entry, any packet can be safely
    cast to `SBasePacket`. The `switch` statement inspects the type, and depending
    on the network packet, further processing is done—but not without casting the
    packet to the actual packet type. For example, if the `basePacket->type` is `kPacketTypeScore`,
    the `basePacket` will be cast to an `SScorePacket` to allow the code to access
    the `score` field.


    **TIP:** When checking packets, it''s a good idea to add the `default` option.
    You will frequently add new packets, and from time to time you''ll forget to handle
    this particular packet type on the receiving end. So, logging this as an error
    or even throwing an exception is recommended. Otherwise, you might see bugs in
    your app that might be hard to track down.


    Actually sending the packets is relatively easy and follows the same principle.
    You first create a new variable with one of the packet structs as its data type.
    Then you fill in each field of the struct and pass the struct to the `GameKitHelper`
    method `sendDataToAllPlayers`.


    In [Listing 14–27](#Chapter14.html#list_14_27), the packets are created on the
    stack. You don''t need to allocate memory because Game Kit will make a copy of
    the struct and thus take over the memory management of the packet. Since `sendDataToAllPlayers`
    required a pointer, the `packet` is prefixed with the reference operator (ampersand
    character) `&packet` to denote that the `packet` variable''s address is passed
    instead of the `packet` itself.


    **Listing 14–27.** *Sending Packets via GameKitHelper*


    `// TM16: send a bogus score (simply an integer increased every time it is sent)`

    `-(void) sendScore`

    `{`

    `    if ([GameKitHelper sharedGameKitHelper].currentMatch != nil)`

    `    {`

    `        bogusScore++;`


    `        SScorePacket packet;`

    `        packet.type = kPacketTypeScore;`

    `        packet.score = bogusScore;`


    `        [[GameKitHelper sharedGameKitHelper] sendDataToAllPlayers:&packet`

    `                                                           length:sizeof(packet)];`

    `    }`

    `}`


    `// TM16: send a tile coordinate`

    `-(void) sendPosition:(CGPoint)tilePos`

    `{`

    `    if ([GameKitHelper sharedGameKitHelper].currentMatch != nil)`

    `    {`

    `        SPositionPacket packet;`

    `        packet.type = kPacketTypePosition;`

    `        packet.position = tilePos;`


    `        [[GameKitHelper sharedGameKitHelper] sendDataToAllPlayers:&packet`

    `                                                           length:sizeof(packet)];`

    `    }`

    `}`'
  trans: "\n# 发送与接收数据\n\n当所有玩家均成功连接，且比赛正式开始后，你就可以开始发送并随后接收数据了。最简便的方式是向所有玩家发送数据，如代码清单\
    \ 14-24 所示。\n\n**代码清单 14-24.** *发送与接收数据*\n\n```\n-(void) sendDataToAllPlayers:(void*)data\
    \ length:(NSUInteger)length\n{\n    NSError* error = nil;\n    NSData* packet\
    \ = [NSData dataWithBytes:data length:length];\n    [currentMatch sendDataToAllPlayers:packet\n\
    \                          withDataMode:GKMatchSendDataUnreliable\n          \
    \                       error:&error];\n    [self setLastError:error];\n}\n\n\
    -(void) match:(GKMatch*)match didReceiveData:(NSData*)data\nfromPlayer:(NSString*)playerID\n\
    {\n    [delegate onReceivedData:data fromPlayer:playerID];\n}\n```\n\n`sendDataToAllPlayers`\
    \ 方法接收一个 `void` 指针作为输入，并将其包装成一个 `NSData` 对象。只要你提供了正确的数据长度，就可以发送任意数据。通常，网络程序会发送像\
    \ `CGPoint`（或任何自定义结构体）这样的结构体，以使这一过程更简单，因为你可以使用 `sizeof(myPoint)` 来获取此类数据结构的长度（以字节为单位的大小）。\n\
    \n此外，为了加速传输，大多数数据采用不可靠模式发送。特别是那些频繁发送的数据，即使某个数据包丢失，客户端也只需等待下一个数据包到达即可。如果你确实需要每个数据包都成功到达——例如，因为它包含仅发送一次的关键信息，那么你应该将数据模式设置为\
    \ `GKMatchSendDataReliable`。这会指示 GameKit 在数据包未能送达时重新发送该数据包。由于 GameKit 需要接收来自客户端的返回包以确认它们已收到数据包，因此这会增加额外的网络流量。\n\
    \n你应该发送哪些数据以及发送频率完全取决于游戏本身。基本原则是：尽可能少发，尽可能低频。例如，与其每帧都传输每个玩家的位置，不如为每次移动操作发送一个数据包，因为在瓦片地图游戏中，移动总是沿一个方向移动\
    \ 32 像素，并通过 `CCMoveAction` 完成。因此，只需发送移动开始的时间以及移动方向就足够了，与每帧都发送每个玩家位置相比，这能节省大量流量。\n\
    \n在 Tilemap16 项目中，你将了解如何在网络上发送和接收数据包。创建网络数据包最重要的方面是：接收方必须能够通过查看一个通用的头部数据来识别接收到的数据包类型。通常（这也是\
    \ Apple 文档推荐的做法），你会为每个数据包定义一个 C 结构体，并将一个公共的结构体字段作为每个数据包的第一个条目。`NetworkPackets.h`\
    \ 文件定义了代码清单 14-25 中所示的结构体。\n\n**代码清单 14-25.** *在 NetworkPackets.h 中将网络数据包定义为 C\
    \ 结构体*\n\n```\ntypedef enum\n{\n    kPacketTypeScore = 1,\n    kPacketTypePosition,\n\
    } EPacketTypes;\n\ntypedef struct\n{\n    EPacketTypes type;\n} SBasePacket;\n\
    \n// 用于传输分数变量的数据包\ntypedef struct\n{\n    EPacketTypes type;\n\n    int score;\n\
    } SScorePacket;\n\n// 用于传输位置的数据包\ntypedef struct\n{\n    EPacketTypes type;\n\n\
    \    CGPoint position;\n} SPositionPacket;\n```\n\n你会看到所有数据包结构体都包含 `EPacketTypes\
    \ type` 字段，并且它是每个结构体中的第一个字段。这使得你可以将任何数据包转换为 `SBasePacket` 类型，从而让接收方检查数据包 `type`。基于该类型，接收方随后可以安全地将结构体转换为实际的数据包。\n\
    \n代码清单 14-26 展示了这一点的一个示例。它来自 `TileMapScene` 类的 `onReceivedData` 方法。\n\n**代码清单\
    \ 14-26.** *接收数据包并确定数据包类型*\n\n```\n-(void) onReceivedData:(NSData*)data fromPlayer:(NSString*)playerID\n\
    {\n    SBasePacket* basePacket = (SBasePacket*)[data bytes];\n\n    switch (basePacket->type)\n\
    \    {\n        case kPacketTypeScore:\n        {\n            SScorePacket* scorePacket\
    \ = (SScorePacket*)basePacket;\n            CCLOG(@\"\\tscore = %i\", scorePacket->score);\n\
    \            break;\n        }\n        case kPacketTypePosition:\n        {\n\
    \            SPositionPacket* positionPacket = (SPositionPacket*)basePacket;\n\
    \n            if (playerID != [GKLocalPlayer localPlayer].playerID)\n        \
    \    {\n                CCTMXTiledMap* tileMap =\n                    (CCTMXTiledMap*)[self\
    \ getChildByTag:TileMapNode];\n                [self centerTileMapOnTileCoord:positionPacket->position\n\
    \                                       tileMap:tileMap];\n            }\n   \
    \         break;\n        }\n        default:\n            CCLOG(@\"unknown packet\
    \ type %i\", basePacket->type);\n            break;\n    }\n}\n```\n\n这段代码首先将接收到的\
    \ `data bytes` 转换为指向 `SBasePacket` 结构体的指针。如果你查阅代码清单 14-25，你会发现那是一个仅包含 `type` 字段的结构体。由于我们已经声明所有数据包都必须将该字段作为第一个条目，因此任何数据包都可以安全地转换为\
    \ `SBasePacket`。`switch` 语句检查类型，并根据网络数据包的类型执行进一步处理——但前提是先将数据包转换为实际的数据包类型。例如，如果\
    \ `basePacket->type` 是 `kPacketTypeScore`，则 `basePacket` 会被转换为 `SScorePacket`，以允许代码访问\
    \ `score` 字段。\n\n**提示：** 在检查数据包时，添加 `default` 选项是一个好习惯。你会频繁添加新的数据包，有时可能会忘记在接收端处理特定的数据包类型。因此，建议将此情况记录为错误，甚至抛出异常。否则，你可能会在应用程序中遇到难以追踪的错误。\n\
    \n实际发送数据包相对容易，并遵循相同的原则。你首先创建一个变量，其数据类型为某个数据包结构体。然后填充结构体的每个字段，并将该结构体传递给 `GameKitHelper`\
    \ 的 `sendDataToAllPlayers` 方法。\n\n在代码清单 14-27 中，数据包是在栈上创建的。你不需要分配内存，因为 GameKit\
    \ 会复制该结构体并接管数据包的内存管理。由于 `sendDataToAllPlayers` 需要指针，因此 `packet` 前面加上了取址运算符（& 符号）`&packet`，以表示传递的是\
    \ `packet` 变量的地址，而不是 `packet` 本身。\n\n**代码清单 14-27.** *通过 GameKitHelper 发送数据包*\n\
    \n```\n// TM16: 发送一个测试分数（一个每次发送时递增的整数）\n-(void) sendScore\n{\n    if ([GameKitHelper\
    \ sharedGameKitHelper].currentMatch != nil)\n    {\n        bogusScore++;\n\n\
    \        SScorePacket packet;\n        packet.type = kPacketTypeScore;\n     \
    \   packet.score = bogusScore;\n\n        [[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n                                             \
    \              length:sizeof(packet)];\n    }\n}\n\n// TM16: 发送一个瓦片坐标\n-(void)\
    \ sendPosition:(CGPoint)tilePos\n{\n    if ([GameKitHelper sharedGameKitHelper].currentMatch\
    \ != nil)\n    {\n        SPositionPacket packet;\n        packet.type = kPacketTypePosition;\n\
    \        packet.position = tilePos;\n\n        [[GameKitHelper sharedGameKitHelper]\
    \ sendDataToAllPlayers:&packet\n                                             \
    \              length:sizeof(packet)];\n    }\n}\n```\n"
- fmt: '发送数据包最关键的部分是确保设置正确的数据包类型。如果你分配了错误的数据包类型，接收方将不知道如何处理该数据包。它可能会误将其当作其他类型的数据包，导致崩溃，因为接收方可能会尝试访问一个不存在的字段。或者接收方可能只是处理无关的数据，从而引发各种类型的错误。想象一下，分数变成了玩家的位置，或者反过来。为了避免这类问题，特别是当你有很多不同的数据包类型时，创建如`createPositionPacket`和`createScorePacket`这样的方法可能会有所帮助。你调用这些方法时传入数据包所需的所有参数，而方法本身会填充正确的数据包类型。


    在[图14-8](#Chapter14.html#fig_14_8)中，你可以看到`Tilemap16project`的运行效果。每当玩家在iPhone上移动时，一个位置数据包就会通过网络发送出去。iPad连接到当前比赛，接收位置数据包，并相应地移动玩家角色。


    ![images](images/1408.jpg)


    **图14-8.** *如果玩家在iPhone上移动，iPad将根据接收到的位置数据包更新其视图。*


    ### 总结


    我希望本章及所提供的`GameKitHelper`类能帮助你熟悉Game Center编程。当然，网络编程并非易事，但我已经为你打下了很多基础，甚至block对象对你来说也不再陌生。特别是，为你的游戏启用Game
    Center支持的任务清单，应该能帮助你避免许多开发者最初会遇到的陷阱。


    通过本章的学习，你已经熟悉了如何使用Game Center的排行榜和成就功能。仅凭这些功能，就能让你的游戏提升一个档次。而且，借助Game Center提供的用户界面，你甚至无需自己编写界面来显示排行榜和成就。


    接着，我向你介绍了Game Center的匹配功能，它允许你邀请好友加入游戏，在互联网上寻找随机玩家，并让他们能够发送和接收数据。


    从本章开始，我已经稍稍偏离了纯粹的cocos2d编程；实际上，你可以将刚刚学到的关于Game Center的知识应用到任何iOS应用中。在下一章，我将探讨另一个主题，它同样不属于纯粹的cocos2d游戏编程，但却是经常被问到的：将UIKit视图与cocos2d混合使用。


    ## 第15章


    ## Cocos2d与UIKit视图


    对于大多数iOS开发者来说，存在一条清晰的分界线：如果你想用“常规”的、没有或只有很少多媒体内容的应用，你会使用Cocoa Touch及其UIKit框架来创建iPhone和iPad的原生用户界面。


    另一方面，如果你想开发iOS游戏和多媒体应用，你会使用cocos2d，并且几乎没有动力使用除`CCSprite`和`CCMenu`之外的任何东西来创建游戏的场景和用户界面。


    大量开发者只熟悉其中一种环境，他们常常会发现从Cocoa Touch跨越到cocos2d，或者反过来，是一件令人困惑的事情。在几乎所有这些情况下，程序员都希望结合两者的优点，利用他们已有的关于Cocoa
    Touch或cocos2d的知识来创建混合型应用。


    由于Cocoa Touch和cocos2d的工作方式根本不同，并且需要不同的思维方式，创建这样的混合应用通常并不直接。本章将帮助你在这两个方向上进行过渡。你将学习如何向cocos2d应用中添加Cocoa
    Touch视图和功能；同时，你还将学习如何将cocos2d嵌入到现有的Cocoa Touch应用中。


    ### 什么是Cocoa Touch？


    Cocoa Touch是用于创建iOS应用的应用程序编程接口（API）的名称。它当然受到了Cocoa的启发，Cocoa是用于编程Mac OS X应用的API。


    Cocoa Touch由多个框架组成，例如Core Animation、Core Data、Map Kit、Store Kit和Web Kit，仅举几例。但严格来说，甚至cocos2d也是一个Cocoa
    Touch库，因为cocos2d所基于的OpenGL ES框架，以及Core Audio、OpenAL和AV Foundation（AV代表Audio/Video）框架，都是Cocoa
    Touch的一部分。


    因此，当大多数程序员询问如何将Cocoa Touch视图集成到cocos2d中时，他们具体指的就是UIKit。UIKit是一个框架，它为程序员提供了用于构建iOS应用图形用户界面（GUI）的原生iOS控件和视图。同时，其他框架如iAd、Web
    Kit、Game Kit和Map Kit添加了专门的视图，它们大多使用UIKit提供的GUI元素构建。


    所以，从技术上讲，即使程序员讨论Game Center与cocos2d的集成问题，他们也常常将这些视图视为UIKit的一部分，即使实际的视图是由Game Kit或Web
    Kit等提供的。供参考，以下是分别标记为UIKit和Cocoa Touch的cocos2d论坛主题：


    `http://www.cocos2d-iphone.org/forum/tags/uikit`

    `http://www.cocos2d-iphone.org/forum/tags/cocoa-touch`


    ### 同时使用Cocoa Touch和cocos2d


    在我们开始处理本章的代码之前，我想先退一步，讨论一下为什么有人想要将cocos2d与Cocoa Touch（UIKit视图）混合使用，存在哪些限制，以及Cocoa
    Touch和cocos2d之间的区别是什么。


    #### 为什么要将Cocoa Touch与cocos2d混合使用？


    有很多充分的理由可以将Cocoa Touch和cocos2d混合使用。本质上，它们都是为了实现更好的用户体验或更快的开发速度。


    一方面，如果你是一位cocos2d程序员，你迟早会向你的应用中添加一些Cocoa Touch视图，最常见的是为了通过iAd产生一些收益，或者如果你在编写一个支持Game
    Center的游戏。但你也可能希望为用户提供一个原生外观的用户界面，这可以通过Interface Builder高效地设计，然后使用保持游戏外观和感觉的纹理进行皮肤化处理，这样你的用户界面就不会看起来像“设置”应用。Carcassone就是一个很好的皮肤化应用例子；你可能需要看两次才能发现它的用户界面实际上完全是由UIKit视图构成的。


    虽然你可以使用cocos2d制作相当不错的用户界面，但是UIKit中已经有大量cocos2d不提供的现成控件。而偶尔在cocos2d中的重新实现总是缺乏手感和功能。滑块、开/关切换按钮、导航视图和标签栏在设计游戏用户界面时都非常有用，尤其是在那些性能不是最重要的游戏或游戏部分。


    如果你是一位Cocoa Touch程序员，并且你的游戏中需要一些多媒体内容，那么依赖cocos2d来完成这项工作并以高性能运行，比起直接用OpenGL ES编程要容易得多。毕竟，cocos2d让你免于处理OpenGL
    ES，并提供了一个更易于使用的接口。


    Cocoa Touch确实提供了强大的图形框架，如Core Graphics和Core Animation。但它们有一个主要缺点：对于实时游戏来说，它们通常不够快。它们被设计用于显示和动画化用户界面元素，而不是游戏。'
