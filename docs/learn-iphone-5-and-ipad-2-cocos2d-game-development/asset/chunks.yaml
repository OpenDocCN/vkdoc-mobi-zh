  trans: "\n### 添加障碍物\n\n在玩家需要躲避的物体出现之前，这款游戏都算不上好。`DoodleDrop04`项目引入了一种违反自然规律的恐怖生物：六足人面蜘蛛。谁不想躲开它呢？\n\
    \n与玩家精灵一样，你需要将`spider.png`添加到`Resources`组中。然后，在`GameScene.h`文件的接口中添加三个新的成员变量：一个`spiders`\
    \ `CCArray`（其类引用见代码清单 4–9），以及`spiderMoveDuration`和`numSpidersMoved`（用于代码清单 4–12）：\n\
    \n```\n@interface GameScene : CCLayer\n{\n    CCSprite* player;\n    CGPoint playerVelocity;\n\
    \n    CCArray* spiders;\n    float spiderMoveDuration;\n    int numSpidersMoved;\n\
    }\n```\n\n接着，在`GameScene`的`init`方法中，紧接`scheduleUpdate`之后，添加对下文将要讨论的`initSpiders`方法的调用：\n\
    \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        ...\n\n \
    \       [self scheduleUpdate];\n        [self initSpiders];\n    }\n    return\
    \ self;\n}\n```\n\n之后，在`GameScene`类中添加相当数量的代码，首先是代码清单 4–8 中的`initSpiders`方法，该方法用于创建蜘蛛精灵。\n\
    \n**代码清单 4–8.** *为方便访问，初始化蜘蛛精灵并将其添加到 CCArray*\n\n```\n-(void) initSpiders\n{\n\
    \    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n\n    // 使用临时蜘蛛精灵是获取图像尺寸最简单的方法\n\
    \    CCSprite* tempSpider = [CCSprite spriteWithFile:@\"spider.png\"];\n    float\
    \ imageWidth = [tempSpider texture].contentSize.width;\n\n    // 根据屏幕宽度，尽可能多地放置蜘蛛精灵\n\
    \    int numSpiders = screenSize.width / imageWidth;\n\n    // 使用 alloc 初始化蜘蛛数组\n\
    \    spiders = [[CCArray alloc] initWithCapacity:numSpiders];\n\n    for (int\
    \ i = 0; i < numSpiders; i++)\n    {\n        CCSprite* spider = [CCSprite spriteWithFile:@\"\
    spider.png\"];\n        [self addChild:spider z:0 tag:2];\n\n        // 也将蜘蛛添加到\
    \ spiders 数组中\n        [spiders addObject:spider];\n    }\n\n    // 调用方法重新定位所有蜘蛛\n\
    \    [self resetSpiders];\n}\n```\n\n有几点需要注意。我创建一个`tempSpider` `CCSprite`仅仅是为了获取精灵图像的宽度，然后利用这个宽度决定可以并排放置多少只蜘蛛精灵。获取图像尺寸最简单的方法就是创建一个临时的`CCSprite`。注意，我没有将`tempSpider`作为子节点添加到任何其他节点中。这意味着它的内存会自动释放。\n\
    \n这与用来保存蜘蛛精灵引用的`spiders`数组形成对比。该数组必须使用`alloc`创建；否则，它的内存会被释放，后续对精灵数组的访问会导致应用程序因`EXC_BAD_ACCESS`错误而崩溃。而且，由于我自行管理精灵数组的内存，一定不能忘记在`dealloc`方法中释放`spiders`数组，如下所示：\n\
    \n```\n-(void) dealloc\n{\n    CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd),\
    \ self);\n\n    // 必须释放 spiders 数组，它是通过[CCArray alloc]创建的\n    [spiders release];\n\
    \    spiders = nil;        \n\n    // 永远不要忘记调用[super dealloc]！\n    [super dealloc];\n\
    }\n```\n\n在撰写本文时，`CCArray`类虽然缺乏文档，但它是 cocos2d 中完全受支持的类。你可以在 Xcode 项目的`cocos2d/Support`组中找到`CCArray`类文件。它在\
    \ cocos2d 内部使用，类似于 Apple 的`NSMutableArray`类——但性能更优。`CCArray`类实现了`NSArray`和`NSMutableArray`类的一个子集，并添加了从`NSArray`初始化`CCArray`的新方法。它还通过简单地将数组中的最后一个对象赋值给被删除的位置，来实现`fastRemoveObject`和`fastRemoveObjectAtIndex`方法，从而避免复制数组内存的部分内容。这样做速度更快，但也意味着`CCArray`中的对象会改变位置，因此如果你依赖对象的特定顺序，就不应使用`fastRemoveObject`方法。在代码清单\
    \ 4–9 中，你可以看到完整的`CCArray`类引用，因为它并未实现`NSArray`和`NSMutableArray`的所有方法，同时还添加了自己的方法。\n\
    \n**代码清单 4–9.** *CCArray 类引用*\n\n```\n+ (id) array;\n+ (id) arrayWithCapacity:(NSUInteger)capacity;\n\
    + (id) arrayWithArray:(CCArray*)otherArray;\n+ (id) arrayWithNSArray:(NSArray*)otherArray;\n\
    \n- (id) initWithCapacity:(NSUInteger)capacity;\n- (id) initWithArray:(CCArray*)otherArray;\n\
    - (id) initWithNSArray:(NSArray*)otherArray;\n\n- (NSUInteger) count;\n- (NSUInteger)\
    \ capacity;\n- (NSUInteger) indexOfObject:(id)object;\n- (id) objectAtIndex:(NSUInteger)index;\n\
    - (id) lastObject;\n- (BOOL) containsObject:(id)object;\n\n#pragma mark 添加对象\n\
    \n- (void) addObject:(id)object;\n- (void) addObjectsFromArray:(CCArray*)otherArray;\n\
    - (void) addObjectsFromNSArray:(NSArray*)otherArray;\n- (void) insertObject:(id)object\
    \ atIndex:(NSUInteger)index;\n\n#pragma mark 移除对象\n\n- (void) removeLastObject;\n\
    - (void) removeObject:(id)object;\n- (void) removeObjectAtIndex:(NSUInteger)index;\n\
    - (void) removeObjectsInArray:(CCArray*)otherArray;\n- (void) removeAllObjects;\n\
    - (void) fastRemoveObject:(id)object;\n- (void) fastRemoveObjectAtIndex:(NSUInteger)index;\n\
    \n- (void) makeObjectsPerformSelector:(SEL)aSelector;\n- (void) makeObjectsPerformSelector:(SEL)aSelector\
    \ withObject:(id)object;\n\n- (NSArray*) getNSArray;\n```\n\n在代码清单 4–8 的末尾，调用了`[self\
    \ resetSpiders]`方法；该方法显示在代码清单 4–10 中。将精灵的初始化与定位分开的原因是，游戏最终会出现结束画面，之后需要重置游戏。最有效的方法是将所有游戏对象移回它们的初始位置。然而，一旦游戏场景达到一定复杂度，这种做法可能就不再可行。最终，更简单的方法就是直接重新加载整个场景，代价是玩家需要等待场景重新加载。\n\
    \n**注意：** 说到重新加载场景，你可能会想在`GameScene`类中写类似`[[CCDirector sharedDirector] replaceScene:[GameScene\
    \ node]];`这样的代码，甚至`[[CCDirector sharedDirector] replaceScene:self];`来重新加载同一场景。这两种尝试都会导致崩溃！正确的做法是，在再次加载同一场景之前，先加载另一个（中间的）场景。你将在第\
    \ 5 章中学习如何编写加载场景。\n\n**代码清单 4–10.** *重置蜘蛛精灵位置*\n\n```\n-(void) resetSpiders\n\
    {\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n\n    // 获取任意一只蜘蛛以获取其图像宽度\n\
    \    CCSprite* tempSpider = [spiders lastObject];\n    CGSize size = [tempSpider\
    \ texture].contentSize;\n```\n"
- fmt: "```objc\n    int numSpiders = [spiders count];\n    for (int i = 0; i < numSpiders;\
    \ i++)\n    {\n        // Put each spider at its designated position outside the\
    \ screen\n        CCSprite* spider = [spiders objectAtIndex:i];\n        spider.position\
    \ = CGPointMake(size.width * i + size.width * 0.5f,\n            screenSize.height\
    \ + size.height);\n\n        [spider stopAllActions];\n    }\n\n    // Unschedule\
    \ the selector just in case. If it isn't scheduled it won't do anything.\n   \
    \ [self unschedule:@selector(spidersUpdate:)];\n\n    // Schedule the spider update\
    \ logic to run at the given interval.\n    [self schedule:@selector(spidersUpdate:)\
    \ interval:0.7f];\n\n    // reset the moved spiders counter and spider move duration\
    \ (affects speed)\n    numSpidersMoved = 0;\n    spiderMoveDuration = 4.0f;\n\
    }\n```\n\nOnce again I obtain a reference to one of the existing spiders temporarily\
    \ to get its image size via the texture's `contentSize` property. I don't create\
    \ a new sprite here since there are already existing sprites of the same kind,\
    \ and since all spiders use the same image with the same size, I don't even care\
    \ which sprite I'm getting. So, I simply choose the get the last spider from the\
    \ array.\n\nEach spider's position is then modified so that together they span\
    \ the entire width of the screen. Half of the image size's width is added, and\
    \ once again this is because of the sprite's texture being centered on the node's\
    \ position. As for the height, each sprite is also set to be one image size above\
    \ the upper screen border. This is an arbitrary distance, as long as the image\
    \ isn't visible, which is all I want to achieve. Because the spider might still\
    \ be moving when the reset occurs, I'll also stop all of its actions at this point.\n\
    \n**TIP:** To save a few CPU cycles, it's good practice not to use method calls\
    \ in the conditional block of `for` or other loops if it's not strictly necessary.\
    \ In this case, I created a variable `numSpiders` to hold the result of `[spiders\
    \ count]`, and I use that in the conditional check of the `for` loop. The count\
    \ of the array remains the same during the `for` loop's iterations because the\
    \ array itself isn't modified in the loop. That's why I can cache this value and\
    \ save the repeated calls to `[spiders count]` during each iteration of the `for`\
    \ loop.\n\nI'm also scheduling the `spidersUpdate:` selector to run every 0.7\
    \ seconds, which is how often another spider will drop down from the top of the\
    \ screen. But before doing so, I make sure the same selector is unscheduled, just\
    \ to be safe. The `resetSpiders` method may be called while `spidersUpdate:` is\
    \ still scheduled, and I don't want the method to be called twice, effectively\
    \ doubling the spider drop-down rate. The `spidersUpdate:` method, shown in [Listing\
    \ 4–11](#Chapter04.html#list_4_11), randomly picks one of the existing spiders,\
    \ checks whether it is idle, and lets it fall down the screen by using a sequence\
    \ of actions.\n\n**Listing 4–11.** *The* spidersUpdate: *Method Frequently Lets\
    \ a Spider Fall*\n\n```objc\n-(void) spidersUpdate:(ccTime)delta\n{\n    // Try\
    \ to find a spider which isn't currently moving.\n    for (int i = 0; i < 10;\
    \ i++)\n    {\n        int randomSpiderIndex = CCRANDOM_0_1() * [spiders count];\n\
    \        CCSprite* spider = [spiders objectAtIndex:randomSpiderIndex];\n\n   \
    \     // If the spider isn't moving it won’t have any running actions.\n     \
    \   if ([spider numberOfRunningActions] == 0)\n        {\n            // This\
    \ is the sequence which controls the spiders' movement\n            [self runSpiderMoveSequence:spider];\n\
    \n            // Only one spider should start moving at a time.\n            break;\n\
    \        }\n    }\n}\n```\n\nI don't let any listing pass without some curiosity,\
