    ### Collision Detection


    You may be surprised to see that collision detection can be as simple as in [Listing
    4–14](#Chapter04.html#list_4_14). Admittedly, this only checks the distance between
    the player and all spiders, which makes this type of collision detection a radial
    check. For this type of game, it’s sufficient. The call to `[self checkForCollision]`
    is added to the end of the `–(void) update:(ccTime)delta` method.


    **Listing 4–14.** *A Simple Range-Check or Radial Collision-Check Suffices*


    `-(void) checkForCollision`

    `{`

    `    // Assumption: both player and spider images are squares.`

    `    float playerImageSize = [player texture].contentSize.width;`

    `    float spiderImageSize = [[spiders lastObject] texture].contentSize.width;`

    `    float playerCollisionRadius = playerImageSize * 0.4f;`

    `    float spiderCollisionRadius = spiderImageSize * 0.4f;`


    `    // This collision distance will roughly equal the image shapes.`

    `    float maxCollisionDistance = playerCollisionRadius + spiderCollisionRadius;`


    `    int numSpiders = [spiders count];`

    `    for (int i = 0; i < numSpiders; i++)`

    `{`

    `        CCSprite* spider = [spiders objectAtIndex:i];`


    `        if ([spider numberOfRunningActions] == 0)`

    `        {`

    `            // This spider isn''t even moving so we can skip checking it.`

    `           continue;`

    `        }`


    `        // Get the distance between player and spider.`

    `        float actualDistance = ccpDistance(player.position, spider.position);`


    `        // Are the two objects closer than allowed?`

    `        if (actualDistance < maxCollisionDistance)`

    `        {`

    `            // Game Over (just restart the game for now)`

    `            [self resetSpiders];`

    `            break;`

    `        }`

    `    }`

    `}`


    The image sizes of the player and spider are used as hints for the collision radii.
    The approximation is good enough for this game. If you check the DoodleDrop05
    project, you’ll also notice that I’ve added a debug drawing method that renders
    the collision radii for each sprite.


    **NOTE:** The correct plural of radius is radii. You can also say radiuses without
    being expelled from the country, though I wouldn’t dare say it in the vicinity
    of programmers. Less critically but also hotly debated is the plural of vertex,
    which is correctly spelled *vertices*, but *vertexes* is also deemed acceptable.


    I’m iterating over all the spiders but ignoring those that aren’t moving at the
    moment because they’ll definitely be out of range. The distance between the current
    spider and the player is calculated by the `ccpDistance` method. This is another
    undocumented but fully supported cocos2d method. You can find these and other
    useful math functions in the `CGPointExtension` files in the `cocos2d/Support`
    group in the Xcode project.


    The resulting distance is then compared to the sum of the player’s and spider’s
    collision radius. If the actual distance is smaller than that, a collision has
    occurred. Since no game-over has been implemented, I chose to simply reset the
    spiders to restart the game.


    ### Labels and Bitmap Fonts


    Labels are the second most important graphical element of cocos2d games, right
    after sprites. The easiest and most flexible solution seems to be the `CCLabelTTF`
    class, but its performance is terrible if you need to change the displayed text
    frequently. The alternative is the `CCLabelBMFont` class, which renders bitmap
    fonts instead of TrueType fonts. Along with that I’ll introduce you to Glyph Designer,
    an elegant tool for converting TrueType fonts into bitmap fonts and enhancing
    them along the way with effects like shadows, color gradients, and so on.


    #### Adding the Score Label


    The game needs some kind of scoring mechanism. I decided to add a simple time-lapse
    counter as the score. I start by adding the score’s `Label` in the `init` method
    of the `GameScene` class:


    `scoreLabel = [CCLabelTTF labelWithString:@"0" fontName:@"Arial" fontSize:48];`

    `scoreLabel.position = CGPointMake(screenSize.width / 2, screenSize.height);`


    `// Adjust the label''s anchorPoint''s y position to make it align with the top.`

    `scoreLabel.anchorPoint = CGPointMake(0.5f, 1.0f);`


    `// Add the score label with z value of -1 so it''s drawn below everything else`

    `[self addChild:scoreLabel z:-1];`


    I consciously chose a `CCLabelTTF` object, which would likely be the first choice
    for most beginning cocos2d programmers. I’ll show you how quickly these label
    objects rear their ugly heads, though. Add the following code anywhere in the
    `update:` method so that the score label will be updated like a stopwatch counter
    every second:


    `// Update the Score (Timer) once per second.`

    `totalTime += delta;`

    `int currentTime = (int)totalTime;`

    `if (score < currentTime)`

    `{`

    `    score = currentTime;`

    `    [scoreLabel setString:[NSString stringWithFormat:@"%i", score]];`

    `}`


    The `delta` parameter of the `update:` method is continuously added to the `totalTime`
    member variable to keep track of the time that has passed. Because `totalTime`
    is a floating-point variable, I simply assign it to an integer variable, effectively
    removing the fractional part. That makes it possible to compare the score with
    the `currentTime`; if the score is lower, `currentTime` becomes the new score,
    and the `CCLabelTTF`’s string is updated.


    And that’s where things get ugly. In the previous chapter, I mentioned that updating
    a `CCLabelTTF`’s text is slow. The whole texture is re-created using iOS font-rendering
    methods, and they take their time, besides allocating a new texture and releasing
    the old one. If you play this version of the game on the device, you may notice
    how the spiders seem to jump a little every time the score label changes. The
    game is no longer running smoothly.


    If you want to see this effect more pronounced, comment out the line with the
    `if` statement so that `[scoreLabel setString:…]` is run every frame. On my iPhone
    3GS, the framerate suddenly drops from a previous constant 60 frames per second
    to below 30—all this because of one measly `CCLabelTTF` updated every frame!


    But keep in mind that `CCLabelTTF` is slow only when changing its string frequently.
    If you create the `CCLabelTTF` once and never change it, it’s just as fast as
    any other `CCSprite` of the same dimensions.'
