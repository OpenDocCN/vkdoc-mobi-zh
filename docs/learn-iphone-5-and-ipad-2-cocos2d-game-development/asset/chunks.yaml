    \ – 1`开始，一直运行到`i`为负数。这样做的唯一目的是让编号较高的`EnemyTypes`拥有比编号较低的`EnemyTypes`更高的生成优先级。如果某个\
    \ Boss 怪物与一艘巡洋舰同时被预定生成，Boss 会先生成。否则，巡洋舰可能会在同一时间尝试生成，占用 Boss 的生成槽位，从而阻止 Boss 生成。这是生成逻辑的一个副作用，我将其留给你来扩展和改进，因为如果你决定编写自己的经典射击游戏版本，你很可能需要这样做。\n\
    \n`spawnFrequency`通过`EnemyEntity`的`getSpawnFrequencyForEnemyType`方法获取：\n\n```\n\
    +(int) getSpawnFrequencyForEnemyType:(EnemyTypes)enemyType\n{\n    NSAssert(enemyType\
    \ < EnemyType_MAX, @\"无效的敌人类型\");\n    NSNumber* number = [spawnFrequency objectAtIndex:enemyType];\n\
    \    return [number intValue];\n}\n```\n\n该方法首先断言`enemyType`的编号确实在定义的范围内。然后获取该敌人类型对应的`NSNumber`对象，并将其作为`intValue`返回。\n\
    \n模运算符`%`返回两个操作数`updateCount`和`spawnFrequency`相除后的余数。这意味着只有当`updateCount`能被`spawnFrequency`整除（余数为\
    \ 0）时，才会生成敌人。\n\n`spawnEnemyOfType`方法随后从`enemiesCCArray`中获取`CCArray`，该数组包含了`enemiesOfType`列表（另一个`CCArray`）。现在你可以只遍历所需的敌人类型，而无需遍历所有添加到`CCSpriteBatchNode`中的精灵。一旦找到一个不可见的敌人，就会调用它的`spawn`方法。如果该类型的所有敌人都可见，则说明当前屏幕上的敌人数量已达到最大值，不再生成新的敌人，从而有效限制了任何时刻屏幕上每种类型敌人的数量。\n"
- fmt: "### The Component Classes\n\nComponent classes are intended as plug-ins for\
    \ game logic. If you add a component to an entity, the entity will execute the\
    \ behavior of the component: moving, shooting, animating, showing a healthbar,\
    \ and so on. The big benefit is that you program these components to work generically\
    \ almost automatically, because they interact with the parent `CCNode` class and\
    \ should make as few assumptions about the parent class as possible. Of course,\
    \ in some cases a component requires the parent to be an `EnemyEntity` class,\
    \ but then you can still use it with any `EnemyEntity`.\n\nComponent classes can\
    \ also be configured depending on the class that's using the component. As an\
    \ example for component classes, let's take a look at the `StandardShootComponent`\
    \ initialization in the `EnemyEntity` class:\n\n```\nStandardShootComponent* shootComponent\
    \ = [StandardShootComponent node];\nshootComponent.shootFrequency = shootFrequency;\n\
    shootComponent.bulletFrameName = bulletFrameName;\n[self addChild:shootComponent];\n\
    ```\n\nThe variables `shootFrequency` and `bulletFrameName` have been set previously\
    \ based on the `EnemyType`. By adding the `StandardShootComponent` to the `EnemyEntity`\
    \ class, the enemy will shoot specific bullets at certain intervals. Since this\
    \ component makes no assumptions about the parent class, you could even add an\
    \ instance of it to the `ShipEntity` class and have your player's ship shoot automatically\
    \ at specific intervals! Or by simply activating and deactivating specialized\
    \ shooting components, you can create the effect of changing weapons for the player\
    \ with very little code. You just program the shooting code in isolation and then\
    \ plug it into a game entity and add some parameters to it. The only logic left\
    \ for programming the switching of weapons is simply when to deactivate which\
    \ components. What's more, you can reuse these components in other games if they\
    \ make sense. Components are great for writing reusable code and are a standard\
    \ mechanism in many, many game engines. If you'd like to learn more about game\
    \ components, please refer to this blog post on my web site: [`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/`](http://www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/).\n\
    \nLet's look at the `StandardShootComponent`'s source code, starting with the\
    \ header file:\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\
    \n\n@interface StandardShootComponent : CCSprite\n{\n    float updateCount;\n\
    \    float shootFrequency;\n    NSString* bulletFrameName;\n}\n\n@property (nonatomic)\
    \ float shootFrequency;\n@property (nonatomic, copy) NSString* bulletFrameName;\n\
    \n@end\n```\n\nThere are two things of note. The first is that `StandardShootComponent`\
    \ is derived from `CCSprite`, even though it doesn't use any texture. That is\
    \ a workaround because all `EnemyEntity` objects are added to a `CCSpriteBatchNode`,\
    \ which can contain only `CCSprite-` based objects. This also extends to any child\
    \ node of the `EnemyEntity` class; thus, the `StandardShootComponent` needs to\
    \ inherit from `CCSprite` to satisfy the requirement of the `CCSpriteBatchNode`.\n\
    \nNext there's an `NSString*` pointer, `bulletFrameName`, with a corresponding\
    \ `@property`. If you look closely, you'll notice the keyword `copy` in the `@property`\
    \ definition. That means assigning an `NSString` to this property will create\
    \ a copy of it. This is important for strings since they are generally autoreleased\
    \ objects, and we want to make sure this string is ours. We could also retain\
    \ it, but the problem is that the source string could be an `NSMutableString`\
    \ that can be changed. And that would also change the `bulletFrameName`, which\
