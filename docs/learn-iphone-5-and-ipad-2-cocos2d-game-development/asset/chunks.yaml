    In `registerWithTouchDispatcher`, the `UserInterfaceLayer` registers itself as
    a targeted touch handler with a priority of -1\. Because `GameLayer` uses the
    same code but with a priority of 0, the `UserInterfaceLayer` will be the first
    layer to receive touch input.


    In `ccTouchBegan`, the first thing to do is to check whether this touch is of
    relevance to the `UserInterfaceLayer`. The `isTouchForMe` method implements a
    simple “point in boundingBox” check via `CGRectContainsPoint` to see whether the
    touch began on the `uiframe` sprite. There are more useful methods available in
    `CGGeometry` to test intersection, containing points, or equality. Please refer
    to Apple’s documentation to learn more about the `CGGeometry` methods ([`http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html`](http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html)`)`.


    If the touch location check determines that the touch is on the sprite, `ccTouchBegan`
    will return `YES`, signaling that this touch event was used and should not be
    processed by other layers with a targeted touch delegate of lower priority.


    Only if the `isTouchForMe` check fails will the `GameLayer` receive the touch
    input and use it to scroll itself when the user moves a finger over the screen.
    You can compare `GameLayer`’s input handling code in [Listing 5–9](#Chapter05.html#list_5_9).


    **Listing 5–9.** *GameLayer Receives the Remaining Touch Events and Uses Them
    to Scroll Itself*


