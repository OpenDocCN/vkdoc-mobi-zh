    Make sure the Classes group is selected and then select **File ![images](images/U001.jpg)
    New ![images](images/U001.jpg) New File…** or right-click the Classes folder and
    select **New File…** to open the New File dialog shown in [Figure 4–4](#Chapter04.html#fig_4_4).
