    for cross-platform development that the added overhead of platform and device
    runtime tests are entirely negligible.


    Once you do cross-platform development, you’ll likely spend a lot of time working
    on and compiling code for only one platform. Any code that is within an `#ifdef`
    for the other platform is invisible to the compiler, and it won’t complain about
    errors. Now as soon as you switch targets and compile for the other platform,
    you’ll likely run into errors that weren’t there before. They may be related to
    code changes that you made an hour ago, a day ago, or maybe even a week ago.


    Not only does it cause a lot of mental load to figure out which code change caused
    the error and what the correct fix will be, it’s also frustrating because you’ll
    frequently find that switching target platforms results in build failures. Either
    you’ll spend more time than necessary building code regularly for both target
    platforms or you’ll simply give up, maybe with the good intention of porting the
    project when it’s finished. However, porting a completed project is much more
    work than developing it for both platforms from the beginning. Why? Because as
    long as your code is written for only one platform, your code could as well be
    entirely within an `#ifdef`.


    Code that compiles works. At least it’s technically correct. Immediate build errors
    are more likely to be corrected right away and easier to fix because you still
    have the most recent code changes in your short-term memory.


    #### Running Hello World with iSimulate


    If you run the Hello World project on the iPhone or iPad Simulator, you’ll notice
    a network connection dialog as in [Figure 16–4](#Chapter16.html#fig_16_4). You’ll
    also notice the iAd banner that shows up because it was enabled in config.lua.


    **NOTE:** If you see an `bannerView:didFailToReceiveAdWithError` error in your
    log with the message “The operation couldn’t be completed. (ADErrorDomain error
    1.),” then this is most likely caused by the app not being set up for iAd. The
    iAd service needs to be enabled for each app and each developer in iTunes Connect.
    You’ll find more information about enabling iAd for your app at [`https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf).


    ![images](images/1604.jpg)


    **Figure 16–4.** *Network connection warning caused by iSimulate*


    The incoming network connections warning dialog is caused by iSimulate. It’s nothing
    to worry about. The iSimulate library accepts incoming connections from the iSimulate
    app, which you can run on your WiFi-enabled iOS device in order to remote control
    the simulator. In other words, iSimulate enables you to test your game using your
    device but running in the simulator. All the features the simulator doesn’t have,
    like GPS, Accelerometer, or Multi-Touch, can be simulated with the iSimulate app.
    It can be a real time-saver.


    For example, if you have iSimulate running on your device and connected to your
    Mac, you will receive messages like `accelerometer:didAccelerate:` in your app
    even though the simulator doesn’t have an accelerometer. This makes iSimulate
    an invaluable tool if you consider that running your app is usually a lot faster
    than deploying it to a device. I recommend giving it a try with Kobold2D’s User-Inputtemplate
    project.


    iSimulate is available on the App Store and normally costs $15.99: [`http://itunes.apple.com/app/isimulate/id306908756`](http://itunes.apple.com/app/isimulate/id306908756).'
  trans: "```objectivec\n@implementation HelloWorldLayer\n@synthesize helloWorldString,\
    \ helloWorldFontName;\n@synthesize helloWorldFontSize;\n\n-(id) init\n{\n    if\
    \ ((self = [super init]))\n    {\n        CCDirector* director = [CCDirector sharedDirector];\n\
    \n        CCSprite* sprite = [CCSprite spriteWithFile:@\"ship.png\"];\n      \
