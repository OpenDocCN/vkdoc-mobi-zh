  trans: "\n### `CCParallaxNode`\n\n视差效果是一种用于 2D 游戏中的技术，通过使用以不同速率移动的分层图像来营造深度感。前景中的图像相对背景中的图像移动得更快。尽管你无法在静态图像中看到视差效果，但图\
    \ 5–4 至少能让你对由多个独立图层构成的背景有个初步印象。云朵位于最远处；山脉在云朵前方，但位于（丑陋的）树木后方。最底部是道路，你通常可以在此处添加一个玩家角色，沿着这片场景左右移动。\n\
    \n![images](img/0504.jpg)\n\n**图 5–4.** `CCParallaxNode` 让你能够创造出深度的错觉。\n\n**注意：**\
    \ 为什么视差效果能创造出深度的错觉？因为我们的思维已经习惯了这种效果。想象一下你正高速驾车行驶，透过侧窗向外看。你会注意到路边的树木（离你最近）飞速掠过，快到你几乎无法聚焦于任何一棵。再看远一点，你会发现远处的农舍以看似慢得多的速度从你身旁经过。然后望向地平线上的山脉，你几乎察觉不到自己正在经过它们。这就是三维世界中的视差效果，那里存在无数个视差图层。在\
    \ 2D 游戏中，我们必须（非常粗略地）用大约两到八个视差图层来模拟同样的效果。每个图层都试图欺骗你的大脑，让它以为该图层距离你的视点有一定距离，原因仅仅在于它相对于其他图层以某个特定的速度移动。这种效果出奇地好。\n\
    \nCocos2d 有一个专门的节点，你可以用它来创建这种效果。在代码清单 5–17 中创建 `CCParallaxNode` 的代码也包含在 ScenesAndLayers08\
    \ 项目中。\n\n**代码清单 5–17.** `CCParallaxNode` 需要大量设置工作，但结果值得如此投入\n\n```\n// 加载每个视差图层的精灵，从背景到前景。\n\
    CCSprite* para1 = [CCSprite spriteWithFile:@\"parallax1.png\"];\nCCSprite* para2\
    \ = [CCSprite spriteWithFile:@\"parallax2.png\"];\nCCSprite* para3 = [CCSprite\
    \ spriteWithFile:@\"parallax3.png\"];\nCCSprite* para4 = [CCSprite spriteWithFile:@\"\
    parallax4.png\"];\n\n// 根据屏幕和图像大小设置正确的偏移量。\npara1.anchorPoint = CGPointMake(0,\
    \ 1);\npara2.anchorPoint = CGPointMake(0, 1);\npara3.anchorPoint = CGPointMake(0,\
    \ 0.6f);\npara4.anchorPoint = CGPointMake(0, 0);\nCGPoint topOffset = CGPointMake(0,\
    \ screenSize.height);\nCGPoint midOffset = CGPointMake(0, screenSize.height /\
    \ 2);\nCGPoint downOffset = CGPointZero;\n\n// 创建一个视差节点并将精灵添加到其中。\nCCParallaxNode*\
    \ paraNode = [CCParallaxNode node];\n[paraNode addChild:para1\n              \
    \   z:1\n     parallaxRatio:CGPointMake(0.5f, 0)\n    positionOffset:topOffset];\n\
    \n[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1, 0) positionOffset:topOffset];\n\
    [paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2, 0) positionOffset:midOffset];\n\
    [paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3, 0) positionOffset:downOffset];\n\
    [self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\n// 移动视差节点以展示视差效果。\n\
    CCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(-160, 0)];\n\
    CCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];\n\
    CCSequence* sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever*\
    \ repeat = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
    ```\n\n要创建一个 `CCParallaxNode`，你首先要创建构成各个视差图像的所需 `CCSprite` 节点，然后必须将它们正确放置在屏幕上。在这个例子中，我选择修改它们的锚点，因为这样更容易让精灵与屏幕边界对齐。`CCParallaxNode`\
    \ 的创建方式与其他节点类似，但其子节点是通过一个特殊的初始化方法添加的。通过该方法，你可以指定 `parallaxRatio`（视差比率），它是一个 `CGPoint`，用作\
    \ `CCParallaxNode` 任何移动的乘数。在此例中，`CCSprite` `para1` 将以一半的速度移动，`para2` 以正常速度移动，`para3`\
    \ 以 `CCParallaxNode` 的双倍速度移动，依此类推。\n\n通过使用一系列 `CCMoveBy` 动作，`CCParallaxNode` 被从左向右移动，然后再返回。你会注意到，背景中的云朵移动得最慢，而前景中的树木和碎石滚动得最快。这就营造出了深度的错觉。\n\
    \n**注意：** 一旦子节点被添加到 `CCParallaxNode` 中，你就不能再修改它们各自的位置了。你只能滚动到最大且移动最快的图像边界，否则背景就会透出来。如果你修改\
    \ `CCMoveBy` 动作使其滚动更远的距离，就能看到这种效果。你可以通过添加更多相同的精灵并设置适当的偏移量来增加滚动距离。但是，如果你需要在单一方向或双方向上实现无限滚动，就必须自行实现视差系统。事实上，这正是我们将在第\
    \ 7 章中要做的事情。\n\n### `CCRibbon`\n\n`CCRibbon` 节点会创建一条图像带，就像一条链子，或者像图 5–5 中那样，像一条千足虫在\
    \ ScenesAndLayers09 项目的视差场景上爬行。\n\n![images](img/0505.jpg)\n\n**图 5–5.** 真恶心。一条由蜘蛛组成的\
    \ `CCRibbon`，看起来像一条千足虫在屏幕上爬行。\n\n`CCRibbon` 类结合触摸输入，可用于创建流行游戏中的线条绘制效果。代码清单 5–18\
    \ 展示了如何使用触摸事件实现 `CCRibbon`。值得注意的是，你无法从 `CCRibbon` 中移除单个点。你只能通过将其作为子节点从父节点中移除来删除整个\
    \ `CCRibbon`。`CCRibbon` 初始化方法中的宽度和长度参数决定了单个带状元素绘制的大小。在这个例子中，我选择将其设置为与 `spider.png`\
    \ 图像相同的大小，即宽高均为 32 像素。如果你选择其他值，图像会相应地按比例缩放。\n\n**代码清单 5–18.** `CCRibbon` 类\n\n\
    ```\n-(void) resetRibbon\n{\n    // 移除丝带并创建一个新的。\n    [self removeChildByTag:ParallaxSceneTagRibbon\
    \ cleanup:YES];\n    CCRibbon* ribbon = [CCRibbon ribbonWithWidth:32\n       \
    \                                    image:@\"spider.png\"\n                 \
    \                         length:32\n                                        \
    \   color:ccc4(255, 255, 255, 255)\n                                         \
    \   fade:0.5f];\n    [self addChild:ribbon z:5 tag:ParallaxSceneTagRibbon];\n\
    }\n\n-(CCRibbon*) getRibbon\n{\n    CCNode* node = [self getChildByTag:ParallaxSceneTagRibbon];\n\
    \    NSAssert([node isKindOfClass:[CCRibbon class]], @\"node is not a CCRibbon\"\
    );\n\n    return (CCRibbon*)node;\n}\n\n-(void) addRibbonPoint:(CGPoint)point\n\
    {\n    CCRibbon* ribbon = [self getRibbon];\n    [ribbon addPointAt:point width:32];\n\
    }\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent *)event\n{\n    [self\
    \ addRibbonPoint:[MultiLayerScene locationFromTouch:touch]];\n    return YES;\n\
    }\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent *)event\n{\n    [self\
    \ addRibbonPoint:[MultiLayerScene locationFromTouch:touch]];\n}\n\n-(void) ccTouchEnded:(UITouch*)touch\
    \ withEvent:(UIEvent *)event\n{\n    [self resetRibbon];\n}\n```\n"
- fmt: "#### `CCMotionStreak`\n\n`CCMotionStreak` is essentially a wrapper around\
    \ `CCRibbon`. It causes the `CCRibbon` elements to more or less slowly fade out\
    \ and disappear after you’ve drawn them. Try it in the `ScenesAndLayers10` project\
    \ and take a look at [Figure 5–6](#Chapter05.html#fig_5_6) to get an impression\
    \ how the fade-out effect might look like.\n\n![images](images/0506.jpg)\n\n**Figure\
    \ 5–6.** *The `CCMotionStreak` class allows you to slowly fade out the `CCRibbon`\
    \ elements.*\n\nAs you can see in [Listing 5–19](#Chapter05.html#list_5_19), you\
    \ use it almost identically to `CCRibbon`, except that the `CCRibbon` is now a\
    \ property of `CCMotionStreak`. The `fade` parameter determines how fast ribbon\
    \ elements fade out; the smaller the number, the quicker they disappear. The `minSeg`\
    \ parameter seems to have no discernable effect, although an interesting graphical\
    \ glitch occurs if you set it to negative values.\n\n**Listing 5–19.** *The `CCMotionStreak`\
    \ Lets the Ribbon’s Elements Fade Out, Creating a Streak Effect*\n\n```\n-(void)\
    \ resetMotionStreak\n{\n    // Removes the CCMotionStreak and creates a new one.\n\
    \    [self removeChildByTag:ParallaxSceneTagRibbon cleanup:YES];\n    CCMotionStreak*\
    \ streak = [CCMotionStreak streakWithFade:0.7f\n                             \
    \                       minSeg:10\n                                          \
    \           image:@\"spider.png\"\n                                          \
    \           width:32\n                                                    length:32\n\
    \                                                     color:ccc4(255, 0, 255,\
    \ 255)];\n    [self addChild:streak z:5 tag:ParallaxSceneTagRibbon];\n}\n\n-(void)\
    \ addMotionStreakPoint:(CGPoint)point\n{\n    CCMotionStreak* streak = [self getMotionStreak];\n\
    \    [streak.ribbon addPointAt:point width:32];\n}\n```\n\n### Summary\n\nIn this\
    \ chapter, you learned more about scenes and layers—how and when to use them and\
    \ for what. I explained why it’s usually not a good idea to subclass game objects\
    \ directly from `CCSprite`, and I showed you how to create a fully self-contained\
    \ game object class that derives from `CCNode` instead.\n\nFinally, you learned\
    \ how to use specialized `CCNode` classes like `CCProgressTimer`, `CCParallaxNode`,\
    \ `CCRibbon`, and `CCMotionStreak`.\n\nYou now have enough knowledge about cocos2d\
    \ to start creating more complex games, like the side-scrolling shooter I’m preparing\
    \ you for. And with complex games come complex graphics, including animations.\
    \ How to handle all of these sprites efficiently both in terms of memory and performance\
    \ is the topic of the next chapter.\n\n## Chapter 6\n\n## Sprites In-Depth\n\n\
    In this chapter, I’ll focus on working with sprites. There are numerous ways to\
    \ create sprites from individual image files and texture atlases. I will also\
    \ explain how to create and play sprite animations.\n\nA *texture atlas* is a\
    \ regular texture that contains more than one image. Often it is used to store\
    \ all animation frames of a single character in one texture, but it is not limited\
    \ to that. In fact, you can place any image into a texture atlas. The goal is\
    \ to get as many images as possible into each texture atlas. To help create a\
    \ texture atlas, a great tool to rely on is `TexturePacker`, which I’ll also introduce\
    \ in this chapter.\n\n*Sprite batching* is a technique for speeding up the drawing\
    \ of sprites. As the name implies, batching sprites allows the GPU to render all\
    \ the sprites in one go, or in technical terms, in one draw call. It speeds up\
    \ drawing identical sprites but is most effective when using a texture atlas.\
    \ If you use a texture atlas along with sprite batching, you can draw all of the\
    \ images in that texture atlas in one draw call.\n\nA *draw call* is the process\
    \ of transmitting the necessary information to the graphics hardware in order\
    \ to render a texture or parts of it. When you are using `CCSprite`s, each `CCSprite`\
    \ will cause one draw call. The CPU overhead for issuing each draw call can add\
    \ up so much that it can decrease the framerate, particularly with the more sprites\
    \ you want to display.\n\n`CCSpriteBatchNode` functions like an extra layer to\
    \ which you can add sprite nodes, as long as they all use the same texture. From\
    \ then on, all the children of the `CCSpriteBatchNode` will be drawn with a single\
    \ draw call. Effectively, the CPU tells the GPU what texture it should draw from\
    \ but also passes a long list of frames and positions to the GPU so that it can\
    \ render a large number of sprites from that texture all by itself.\n\nTo summarize,\
    \ sprite batching speeds up drawing identical sprites using the same texture and\
    \ is most effective when using a texture atlas.\n\nThe lessons you’ll learn in\
    \ this chapter will become the foundation for the parallax-scrolling shoot-’em-up\
    \ game that I’ll be discussing in [Chapters 7](#Chapter07.html#ch7) and [8](#Chapter08.html#ch8)."
