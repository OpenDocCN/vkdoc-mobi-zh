    **Figure 14–8.** *If the player moves on the iPhone, the iPad will update its
    view from the position packet it received.*


    ### Summary


    I hope this chapter and the provided `GameKitHelper` class help you get comfortable
    with Game Center programming. Sure, network programming is no easy task, but I''ve
    laid a lot of the groundwork for you, and even block objects are no longer foreign
    territory for you. In particular, the checklist of tasks to enable Game Center
    support for your game should help you avoid a lot of the initial pitfalls faced
    by developers.


    Over the course of this chapter, you''ve become comfortable using the leaderboard
    and achievement features of Game Center. Those alone bring your game to a new
    level. And with the user interface provided by Game Center, you don''t even have
    to write your own user interface to display leaderboards and achievements.


    I then introduced you to the matchmaking features of Game Center, which allow
    you to invite friends to join your game, find random players on the Internet,
    and allow them to send and receive data.


    With this chapter, I already departed a little from pure cocos2d programming;
    in fact, you can apply what you just learned about Game Center to any iOS app.
    In the next chapter, I''ll tackle another subject that''s not pure cocos2d game
    programming either but frequently asked for: mixing UIKit views with cocos2d.


    ## Chapter 15


    ## Cocos2d with UIKit Views


    For most iOS developers there’s a clear dividing line: if you want to program
    “regular” apps with no or little multimedia content, you’ll be using Cocoa Touch
    and its UIKit framework to create the iPhone’s and iPad’s native user interfaces.


    On the other hand, if you want to develop iOS games and multimedia applications,
    you want to use cocos2d and have little incentive to use anything but `CCSprite`
    and `CCMenu` to create your game’s scenes and user interfaces.


    A great number of developers are experienced only in either environment, and they’ll
    often find it confusing to cross the border from Cocoa Touch to cocos2d, and vice
    versa. In almost all these cases, the programmers want to combine the best of
    both worlds, leveraging their existing knowledge of either Cocoa Touch or cocos2d
    to create hybrid applications.


    Since Cocoa Touch and cocos2d work fundamentally differently and require a different
    mind-set, it’s usually not as straightforward to create such hybrids. This chapter
    will help you transition in both directions. You’ll learn how to add Cocoa Touch
    views and features to a cocos2d application; at the same time, you’ll also learn
    how you can plug in cocos2d to an existing Cocoa Touch application.


    ### What Is Cocoa Touch?


    Cocoa Touch is the name of the application programming interface (API) used to
    create iOS applications. It is of course inspired by Cocoa, the API for programming
    Mac OS X applications.


    Cocoa Touch is comprised of several frameworks such as Core Animation, Core Data,
    Map Kit, Store Kit, and Web Kit, just to name a few. But strictly speaking, even
    cocos2d is a Cocoa Touch library because the OpenGL ES framework, as well as Core
    Audio, OpenAL, and AV Foundation (AV stands for Audio/Video) frameworks that cocos2d
    is built on, are part of Cocoa Touch.


    It is no wonder then that most programmers refer specifically to UIKit when they
    are asking about how to integrate Cocoa Touch views into cocos2d. UIKit is the
    framework that provides programmers with the native iOS controls and views that
    are used to build the graphical user interfaces (GUIs) of iOS applications. At
    the same time, other frameworks such as iAd, Web Kit, Game Kit, and Map Kit add
    specialized views, and they are mostly built with the GUI elements provided by
    UIKit.


    So, technically, even if programmers discuss integration issues of Game Center
    with cocos2d, they will often refer to the views as being part of UIKit, even
    though the actual view is provided by Game Kit or Web Kit, for example. For reference,
    here are the cocos2d forum topics tagged with UIKit and Cocoa Touch, respectively:


    `http://www.cocos2d-iphone.org/forum/tags/uikit`

    `http://www.cocos2d-iphone.org/forum/tags/cocoa-touch`


    ### Using Cocoa Touch and cocos2d Together


    Before we get to work with the code in this chapter, I want to step back for a
    moment and discuss why one would want to mix cocos2d with Cocoa Touch (UIKit views),
    what limitations there are, and what the differences between Cocoa Touch and cocos2d
    are.


    #### Why Mix Cocoa Touch with cocos2d?


    There are many good reasons to mix Cocoa Touch and cocos2d. Essentially, they
    all boil down to a better user experience or faster development.


    For one, if you’re a cocos2d programmer, you’ll be adding some Cocoa Touch views
    to your application sooner or later, most commonly to generate some revenue with
    iAd or if you’re writing a Game Center–enabled game. But you also might want to
    provide the users with a native-looking user interface, which can be designed
    efficiently with Interface Builder and later skinned with textures that maintain
    the game’s look and feel so that your user interface doesn’t look like the Settings
    app. A great example of such a skinned app is Carcassone; you’ll have to look
    twice to see that its user interface is actually entirely made with UIKit views.


    While you can make reasonably good user interfaces with cocos2d, there’s simply
    a much greater variety of already existing controls available from UIKit that
    cocos2d doesn’t provide. And the occasional reimplementation in cocos2d always
    lacks in feel and features. Sliders, on/off toggle buttons, navigation views,
    and tab bars can all be highly useful in designing your game’s user interface,
    especially in those games or parts of the game where performance is not of the
    utmost importance.


    If you are a Cocoa Touch programmer and you need some multimedia content in your
    game, it’s much easier to rely on cocos2d to do that job and do it with high performance
    rather than programming it directly with OpenGL ES. After all, cocos2d shields
    you from OpenGL ES and provides an interface that’s much easier to use.


    Cocoa Touch does provide powerful graphical frameworks like Core Graphics and
    Core Animation. But they suffer from a major disadvantage: they are often not
    fast enough for real-time games. They were designed to display and animate user
    interface elements, not games.'
