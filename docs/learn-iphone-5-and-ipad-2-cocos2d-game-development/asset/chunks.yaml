  trans: '

    ### 动画辅助类


    由于创建动画帧和动画的代码在所有动画中都是通用的，你应该考虑将这些代码封装到一个辅助方法中。我在 Sprite05_WithAnimHelper 项目中已经这样做了。我没有使用静态方法，而是决定通过一个名为*类别*的
    Objective-C 特性来扩展 `CCAnimation` 类。它提供了一种向现有类添加方法的方式，而无需修改原始类。唯一的缺点是你无法通过类别向类中添加成员变量，只能添加方法。以下代码是
    `CCAnimation` 类别的 `@interface`，我将其简单地命名为 `Helper`：


    ```

    @interface CCAnimation (Helper)

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay;

    @end

    ```


    Objective-C 类别的 `@interface` 使用与其扩展的类相同的名称，并在括号内添加一个类别名称。类别名称类似于变量名，因此不能包含空格或其他不能在变量中使用的字符（例如标点符号）。`@interface`
    也不能包含花括号，因为向类别添加成员变量是不可能的，也是不允许的。


    `CCAnimation` 类别的实际 `@implementation` 使用与 `@interface` 相同的模式，即在类名后面的括号内附加类别名称。其他所有内容都像编写常规类方法一样；在本例中，我的扩展方法名为
    `animationWithFile`，并将文件名、帧数和动画延迟作为输入：


    ```

    @implementation CCAnimation (Helper)


    // 根据单个文件创建动画

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay

    {

        // 将动画帧作为纹理加载并创建精灵帧

        NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];

        for (int i = 0; i < frameCount; i++)

        {

            // 假设所有动画文件都命名为 "nameX.png"

            NSString* file = [NSString stringWithFormat:@"%@%i.png", name, i];

            CCTexture2D* texture = [[CCTextureCache sharedTextureCache]addImage:file];


            // 假设图像文件动画始终使用整张图像

            CGSize texSize = texture.contentSize;

            CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);

            CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture rect:texRect];


            [frames addObject:frame];

        }


        // 从所有精灵动画帧返回一个动画对象

        return [CCAnimation animationWithFrames:frames delay:delay];

    }


    @end

    ```


    这就是命名约定发挥作用的地方。`Ship` 的动画的基本名称为 `ship-anim`，后面跟着从 0 开始的连续数字，并以 `.png` 文件扩展名结尾。例如，`Ship`
    动画的文件名从 `ship-anim0.png` 到 `ship-anim4.png`。如果你使用这种命名方案创建所有动画，那么上述 `CCAnimation`
    扩展方法就可以用于你所有的动画。


    **提示：** 我忍不住注意到，许多开发者和美术人员习惯于使用固定位数对文件进行连续命名，必要时会添加前导零。例如，你可能会倾向于将文件命名为 `my-anim0001`
    到 `my-anim0024`。我认为这个习惯可以追溯到那些无法进行自然排序的老式计算机操作系统，因此会对带有连续数字的文件名进行错误排序。那些日子早已一去不复返了，而且你实际上会让程序员更难在
    `for` 循环中加载像这样命名的文件，因为你需要考虑应该添加多少个前导零。有一个不错的格式化快捷方式 `%03i` 可以用于补零，这样数字至少是三位数。然而，我认为在我们现代世界中，更好的做法是直接对文件进行连续命名，而不添加任何前导零。这样你会获得一点简单和安心。


    这大大简化了从单个文件创建动画的代码：


    ```

    // 整个繁重的工作现在封装到了一个 Category 扩展方法中

    CCAnimation* anim = [CCAnimation animationWithFile:@"ship-anim"

                                            frameCount:5

                                                 delay:0.08f];

    ```


    基本上，这将代码行数从九行缩减到了这一行。作为文件名，你只需要传入动画的基本名称——在本例中是 `ship-anim`。辅助方法会根据 `frameCount`
    参数添加连续的数字，并附加 `.png` 文件扩展名。当你将动画添加到 `CCAnimationCache` 时，你也可以使用动画的基本名称作为动画的名称，这样你就不必记住同一个动画的备用名称了。之前我将飞船的动画命名为
    `move`。现在它被称为 `ship-anim`，与文件名一致。你可以通过使用其基本名称来存储和访问来自 `CCAnimationCache` 的动画，如下所示：


    ```

    NSString* shipAnimName = @"ship-anim";


    CCAnimation* anim = [CCAnimation animationWithFile:shipAnimName

                                            frameCount:5

                                                 delay:0.08f];

    [[CCAnimationCache sharedAnimationCache] addAnimation:anim name:shipAnimName];


    // 稍后：

    CCAnimation* shipAnim = [shipSprite animationByName:shipAnimName];

    ```


    `animationWithFile` 辅助方法做了两个假设：动画图像文件名从 0 开始连续编号，并且文件必须是 `.png` 文件。是否坚持使用这种精确的命名约定，还是根据自己的需求进行更改，这完全取决于你。例如，你可能会发现从
    1 而不是 0 开始对动画进行编号更方便。在这种情况下，你需要修改 `for` 循环，以便名称字符串使用 `i + 1` 进行格式化。重要的是坚持你所选择的任何命名约定，从而让你的生活（以及你的代码）更轻松。


    你应该从中学到三点：


    - 通过定义自己的方法来封装常用代码。

    - 使用 Objective-C 类别向现有类添加方法。

    - 定义资源文件命名约定以支持你的代码。


    ### 使用纹理图集


    纹理图集有助于节省宝贵的内存，同时也有助于提高精灵渲染的速度。由于纹理图集不过是一张大纹理，你可以使用 `CCSpriteBatchNode` 来渲染它包含的所有图像，从而减少绘制调用的开销。使用纹理图集在内存使用和性能方面是双赢的。

    '
- fmt: '#### What Is a Texture Atlas?


    So far, for all the sprites used, I simply loaded the image file they need to
    display. Internally, this image becomes the sprite’s texture, which contains the
    image, but the texture width and height always have to be a power of two—for example,
    `1024×128` or `256×512`. The texture size is increased automatically to conform
    to this rule, possibly taking up more memory than the image size would suggest.
    For example, an image with dimensions of `140×600` becomes a texture with dimensions
    of `256×1024` in memory. This texture is wasting a lot of precious memory, and
    the amount of wasted memory becomes significant if you have several such images
    and you load them each into individual textures.


    That’s where the texture atlas comes in. It is simply an image that is already
    aligned to a power-of-two dimension and contains multiple images. Each image contained
    in the texture atlas has a sprite frame that defines the rectangle area the image
    is at within the texture atlas. In other words, a sprite frame is a `CGRect` structure
    that defines which part of the texture atlas should be used as the sprite’s image.
    These sprite frames are saved in a separate `.plist` file so that cocos2d can
    render very specific images from a large texture atlas texture.


    #### Introducing TexturePacker


    Packing images into a texture atlas and noting the rectangular sprite frames they
    occupy would be a monumental task if it weren’t for TexturePacker, a 2D sprite-packing
    tool (shown in [Figure 6–4](#Chapter06.html#fig_6_4)). The TexturePacker app is
    available as both free and paid versions and can be downloaded from [`www.texturepacker.com`](http://www.texturepacker.com).


    ![images](images/0604.jpg)


    **Figure 6–4.** *TexturePacker with the ship’s animation frames already packed
    into a texture atlas*


    The free version TexturePacker Essential is sufficient for basic needs and can
    be used to create commercial apps. It doesn’t have the Pro version’s more advanced
    features like saving high-resolution data for Retina displays, scaling down images
    for non-Retina displays on the fly, or optimizing the graphics to save memory.
    The Pro version requires a paid license that comes at a reasonably low price.


    TexturePacker can also be run as a command-line tool via the Terminal app. This
    allows it to be integrated in your Xcode build process. You can find more information
    on the TexturePacker command-line tool and how to use it on the TexturePacker
    web page.


    In this chapter, we will use TexturePacker Pro since it can also export to the
    PVR image format, which is the native image format for iPhone’s PowerVR graphics
    chip. The Pro version also conveniently creates the SD and HD textures we need
    to be able to run our project on all variants of the iPhone.


    #### Preparing the Project for TexturePacker


    To use TexturePacker, the project Sprites06 needs to be reorganized a little.
    Currently all images in the HD and SD variants are in the Resources folder. Since
    you are going to use a texture atlas that contains all the images in one texture,
    the individual images don’t need to be copied onto the device anymore.


    First create a new folder called Assets that keeps all the source images and the
    save file for the texture atlases. You do not need to have both HD and SD versions
    of each image anymore since TexturePacker will scale down the images for you.
    So, with TexturePacker you’ll be working only with the HD variants, and the image
    files don’t need to have the `-hd` suffix anymore. [Figure 6–5](#Chapter06.html#fig_6_5)
    shows the Assets folder of the Sprites06 project.


    ![images](images/0605.jpg)


    **Figure 6–5.** *The folder contents of the Assets folder*


    Another tip that makes handling image files easier is to put all image files that
    should be packed into the same texture atlas in the same subfolder. In the case
    of the Sprites06 project, the Assets folder has a subfolder called GameArt that
    contains all the image files that are packed into the game-art texture atlas.


    TexturePacker will simply add new image files in that folder when you are refreshing
    the texture atlas in TexturePacker, so you don’t have to add individual images
    manually anymore. TexturePacker will create one `.tps` (TexturePacker Save) file
    for each folder.


    **CAUTION:** If you have an image called `bullet.png`, the HD version must be
    named `bullet-hd.png`, and in cocos2d you will have to load the file with the
    string `@"bullet.png"`. On Retina devices cocos2d will automatically load the
    `-hd` version instead.


    A common mistake that happens when you move from individual images to a texture
    atlas is to add images to the texture atlas that have the `-hd` prefix in their
    filename. In that case, the resulting texture atlas for SD and HD versions might
    be named `bulletatlas.pvr.czz` and `bulletatlas-hd.pvr.czz`. But the images contained
    in the texture atlas, now called *sprite frames*, will all have the name `bullet-hd.png`
    even in the SD texture atlas. Thus, you would have to change all references in
    cocos2d from `@"bullet.png"` to `@"bullet-hd.png"`. It is recommended to use HD
    version images without the `-hd` suffix in the file name for creating a texture
    atlas to avoid this issue.


    Even worse would be to manually create two texture atlases, one for SD images
    containing only image files without the `-hd` suffix and one for HD images containing
    only image files with the `-hd` suffix. If you would then load `@"bullet.png"`
    in cocos2d, it would not be able to find the `-hd` image on Retina devices. If
    you were to load `@"bullet-hd.png"`, the SD images wouldn’t load. This is because
    the distinction between SD and HD is done at the texture atlas level; you will
    have a texture atlas with the `-hd` suffix and one without. The names of the sprite
    frames inside a texture atlas must be identical for both SD and HD texture atlases.'
  raw: '#### What Is a Texture Atlas?


    So far, for all the sprites used, I simply loaded the image file they need to
    display. Internally, this image becomes the sprite’s texture, which contains the
    image, but the texture width and height always have to be a power of two—for example,
    1024×128 or 256×512\. The texture size is increased automatically to conform to
    this rule, possibly taking up more memory than the image size would suggest. For
    example, an image with dimensions of 140×600 becomes a texture with dimensions
    of 256×1024 in memory. This texture is wasting a lot of precious memory, and the
    amount of wasted memory becomes significant if you have several such images and
    you load them each into individual textures.


    That’s where the texture atlas comes in. It is simply an image that is already
    aligned to a power-of-two dimension and contains multiple images. Each image contained
    in the texture atlas has a sprite frame that defines the rectangle area the image
    is at within the texture atlas. In other words, a sprite frame is a `CGRect` structure
    that defines which part of the texture atlas should be used as the sprite’s image.
    These sprite frames are saved in a separate .plist file so that cocos2d can render
    very specific images from a large texture atlas texture.


    #### Introducing TexturePacker


    Packing images into a texture atlas and noting the rectangular sprite frames they
    occupy would be a monumental task if it weren’t for TexturePacker, a 2D sprite-packing
    tool (shown in [Figure 6–4](#Chapter06.html#fig_6_4)). The TexturePacker app is
    available as both free and paid versions and can be downloaded from [`www.texturepacker.com`](http://www.texturepacker.com).


    ![images](images/0604.jpg)


    **Figure 6–4.** *TexturePacker with the ship’s animation frames already packed
    into a texture atlas*


    The free version TexturePacker Essential is sufficient for basic needs and can
    be used to create commercial apps. It doesn’t have the Pro version’s more advanced
    features like saving high-resolution data for Retina displays, scaling down images
    for non-Retina displays on the fly, or optimizing the graphics to save memory.
    The Pro version requires a paid license that comes at a reasonably low price.


    TexturePacker can also be run as a command-line tool via the Terminal app. This
    allows it to be integrated in your Xcode build process. You can find more information
    on the TexturePacker command-line tool and how to use it on the TexturePacker
    web page.


    In this chapter, we will use TexturePacker Pro since it can also export to the
    PVR image format, which is the native image format for iPhone’s PowerVR graphics
    chip. The Pro version also conveniently creates the SD and HD textures we need
    to be able to run our project on all variants of the iPhone.


    #### Preparing the Project for TexturePacker


    To use TexturePacker, the project Sprites06 needs to be reorganized a little.
    Currently all images in the HD and SD variants are in the Resources folder. Since
    you are going to use a texture atlas that contains all the images in one texture,
    the individual images don’t need to be copied onto the device anymore.


    First create a new folder called Assets that keeps all the source images and the
    save file for the texture atlases. You do not need to have both HD and SD versions
    of each image anymore since TexturePacker will scale down the images for you.
    So, with TexturePacker you’ll be working only with the HD variants, and the image
    files don’t need to have the -hd suffix anymore. [Figure 6–5](#Chapter06.html#fig_6_5)
    shows the Assets folder of the Sprites06 project.


    ![images](images/0605.jpg)


    **Figure 6–5.** *The folder contents of the Assets folder*


    Another tip that makes handling image files easier is to put all image files that
    should be packed into the same texture atlas in the same subfolder. In the case
    of the Sprites06 project, the Assets folder has a subfolder called GameArt that
    contains all the image files that are packed into the game-art texture atlas.


    TexturePacker will simply add new image files in that folder when you are refreshing
    the texture atlas in TexturePacker, so you don’t have to add individual images
    manually anymore. TexturePacker will create one .tps (TexturePacker Save) file
    for each folder.


    **CAUTION:** If you have an image called bullet.png, the HD version must be named
    bullet-hd.png, and in cocos2d you will have to load the file with the string `@"bullet.png"`.
    On Retina devices cocos2d will automatically load the –hd version instead.


    A common mistake that happens when you move from individual images to a texture
    atlas is to add images to the texture atlas that have the –hd prefix in their
    filename. In that case, the resulting texture atlas for SD and HD versions might
    be named bulletatlas.pvr.czz and bulletatlas-hd.pvr.czz. But the images contained
    in the texture atlas, now called *sprite frames*, will all have the name bullet-hd.png
    even in the SD texture atlas. Thus, you would have to change all references in
    cocos2d from `@"bullet.png"` to `@"bullet-hd.png"`. It is recommended to use HD
    version images without the –hd suffix in the file name for creating a texture
    atlas to avoid this issue.


    Even worse would be to manually create two texture atlases, one for SD images
    containing only image files without the –hd suffix and one for HD images containing
    only image files with the –hd suffix. If you would then load `@"bullet.png"` in
    cocos2d, it would not be able to find the –hd image on Retina devices. If you
    were to load `@"bullet-hd.png"`, the SD images wouldn’t load. This is because
    the distinction between SD and HD is done at the texture atlas level; you will
    have a texture atlas with the –hd suffix and one without. The names of the sprite
    frames inside a texture atlas must be identical for both SD and HD texture atlases.'
  trans: '

    #### 什么是纹理图集？


    到目前为止，对于使用的所有精灵，我都只是简单地加载了它们需要显示的图像文件。在内部，这个图像会成为精灵的纹理，其中包含了图像，但纹理的宽度和高度必须始终是
    2 的幂次方——例如 `1024×128` 或 `256×512`。纹理尺寸会自动增大以符合这一规则，这可能会占用比图像尺寸所提示的更多的内存。例如，一个尺寸为
    `140×600` 的图像在内存中会变成一个尺寸为 `256×1024` 的纹理。这种纹理浪费了大量宝贵的内存，如果你有多个这样的图像并将它们分别加载到各自的纹理中，浪费的内存数量会变得非常显著。


    这就是纹理图集的用武之地。它本质上是一张已经对齐到 2 的幂次方尺寸并包含多个图像的图片。纹理图集中的每个图像都有一个精灵帧，该帧定义了该图像在纹理图集内的矩形区域。换句话说，精灵帧是一个
    `CGRect` 结构，它定义了纹理图集的哪一部分应被用作该精灵的图像。这些精灵帧被保存在一个单独的 `.plist` 文件中，以便 cocos2d 能够从一张大的纹理图集纹理中渲染出非常具体的图像。


    #### 介绍 TexturePacker


    如果没有 TexturePacker 这个 2D 精灵打包工具（如图 6-4 所示），将图像打包到纹理图集并记录它们所占用的矩形精灵帧将是一项艰巨的任务。TexturePacker
    应用程序有免费版和付费版，可以从 [`www.texturepacker.com`](http://www.texturepacker.com) 下载。


    ![images](img/0604.jpg)


    **图 6-4.** *TexturePacker 已将飞船的动画帧打包到一个纹理图集中*


    免费版的 TexturePacker Essential 足以满足基本需求，并可用来创建商业应用。它不具备 Pro 版中更高级的功能，比如保存用于 Retina
    显示屏的高分辨率数据、实时为非 Retina 显示屏缩小图像，或优化图形以节省内存。Pro 版需要购买许可证，价格相当合理。


    TexturePacker 也可以通过终端应用程序作为命令行工具运行。这使得它可以集成到你的 Xcode 构建流程中。你可以从 TexturePacker
    网页上找到关于 TexturePacker 命令行工具以及如何使用它的更多信息。


    在本章中，我们将使用 TexturePacker Pro，因为它还可以导出到 PVR 图像格式，这是 iPhone 的 PowerVR 图形芯片的原生图像格式。Pro
    版还能方便地创建我们所需的 SD 和 HD 纹理，以便我们在所有 iPhone 变体上运行项目。


    #### 为 TexturePacker 准备项目


    要使用 TexturePacker，需要稍微重新组织 Sprites06 项目。目前，所有 HD 和 SD 变体的图像都位于 Resources 文件夹中。由于你将使用一个包含所有图像的纹理图集，单个图像就不再需要复制到设备上了。


    首先，创建一个名为 Assets 的新文件夹，用于存放所有源图像和纹理图集的保存文件。你不再需要同时拥有每个图像的 HD 和 SD 版本，因为 TexturePacker
    会为你缩小图像。因此，使用 TexturePacker 时，你将只处理 HD 变体，并且图像文件不再需要 `-hd` 后缀。图 6-5 显示了 Sprites06
    项目的 Assets 文件夹。


    ![images](img/0605.jpg)


    **图 6-5.** *Assets 文件夹的内容*


    另一个让图像文件处理更简便的技巧是，将所有应打包到同一个纹理图集的图像文件放在同一个子文件夹中。在 Sprites06 项目的情况下，Assets 文件夹有一个名为
    GameArt 的子文件夹，其中包含了所有被打包到游戏美术纹理图集中的图像文件。


    当你在 TexturePacker 中刷新纹理图集时，TexturePacker 会简单地添加该文件夹中的新图像文件，因此你不再需要手动添加单个图像。TexturePacker
    会为每个文件夹创建一个 `.tps`（TexturePacker 保存）文件。


    **注意：** 如果你有一个名为 `bullet.png` 的图像，HD 版本必须命名为 `bullet-hd.png`，并且在 cocos2d 中，你需要使用字符串
    `@"bullet.png"` 来加载文件。在 Retina 设备上，cocos2d 会自动加载 `-hd` 版本。


    当你从单个图像迁移到纹理图集时，一个常见的错误是将文件名中包含 `-hd` 前缀的图像添加到纹理图集中。在这种情况下，为 SD 和 HD 版本生成的纹理图集可能被命名为
    `bulletatlas.pvr.czz` 和 `bulletatlas-hd.pvr.czz`。但纹理图集中包含的图像（现在称为精灵帧）即使在 SD 纹理图集中也会全部命名为
    `bullet-hd.png`。因此，你将不得不把所有在 cocos2d 中的引用从 `@"bullet.png"` 改为 `@"bullet-hd.png"`。为了避免这个问题，建议使用文件名中不带
    `-hd` 后缀的 HD 版本来创建纹理图集。


    更糟糕的做法是手动创建两个纹理图集：一个用于 SD 图像，仅包含不带 `-hd` 后缀的图像文件；另一个用于 HD 图像，仅包含带 `-hd` 后缀的图像文件。如果你随后在
    cocos2d 中加载 `@"bullet.png"`，它将无法在 Retina 设备上找到 `-hd` 图像。如果你加载 `@"bullet-hd.png"`，则
    SD 图像将无法加载。这是因为 SD 和 HD 的区别是在纹理图集层级进行的：你会有一个带 `-hd` 后缀的纹理图集和一个不带后缀的。纹理图集内部精灵帧的名称在
    SD 和 HD 纹理图集中必须完全相同。

