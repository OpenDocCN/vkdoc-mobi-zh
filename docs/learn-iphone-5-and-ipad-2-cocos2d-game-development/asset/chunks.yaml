    ##### Engaging Your Players


    The big buzzword in the game industry is clearly “social.” Whether buzz or bubble,
    whether it has investors, reviewers, and players look up or yawn, the social gaming
    component is growing stronger and has become expected. Social gaming entails anything
    from passively pushing updates to networks like Twitter and Facebook to directing
    player interaction in multiplayer games.


    In addition, push notifications are a powerful tool for you to remind your users
    about important events happening in your app. Be it an update, new content, or
    just the next game you released, it gives you an additional channel to keep your
    users engaged with your apps and your brand.'
