  trans: "\n### Main、AppDelegate 与 RootViewController\n\n`main.m` 文件是每个应用程序的入口点，其中包含\
    \ `main` 方法。Kobold2D 的实现只是简单地调用了其内部方法 `KKMain`：\n\n```\n#import \"kobold2d.h\"\
    \n\nint main(int argc, char *argv[])\n{\n    return KKMain(argc, argv, NULL);\n\
    }\n```\n\n`KKMain` 接收 `argc` 和 `argv` 两个参数，以及第三个可选参数，该参数可在需要时用于向启动过程传递额外参数。由于这种情况非常少见，通常只需传递\
    \ `NULL` 即可。`KKMain` 隐藏了为 iOS 或 Mac OS 平台启动应用的复杂性，同时还会解析提供应用配置设置的 `config.lua`\
    \ 文件。我将在下一节讨论 `config.lua` 文件。\n\n接下来，有必要向你展示 Kobold2D 项目中的 `AppDelegate` 类，或者更确切地说，是它剩余的部分。以下是其接口：\n\
    \n```\n#import \"KKAppDelegate.h\"\n\n@interface AppDelegate : KKAppDelegate\n\
    {\n}\n\n@end\n```\n\n空无一物。也许应用委托的实现部分会有更多内容？\n\n```\n#import \"AppDelegate.h\"\
    \n\n@implementation AppDelegate\n\n// 当 Cocos2D 完全设置完成，并且你可以运行第一个场景时调用\n-(void)\
    \ initializationComplete\n{\n}\n\n@end\n```\n\n还是没有。我已经能听到你的疑问：老兄，我的应用委托去哪儿了？\n\
    \nKobold2D 为你处理了整个应用启动过程，并将其隐藏在 `KKAppDelegate` 类中，而 `AppDelegate` 类正是继承自该类。特别地，`KKAppDelegate`\
    \ 会根据 `config.lua` 的设置正确配置 cocos2d，并封装平台特定的应用委托代码。\n\n`KKAppDelegate` 类在 iOS 上是一个标准的\
    \ `UIApplicationDelegate`，在 Mac OS 上则是一个 `NSApplicationDelegate` 类；你可以在需要时自行实现（重写）任何应用委托协议方法。不过，你应该确保调用被重写方法的父类实现，以保证\
    \ `KKAppDelegate` 仍能履行职责。\n\n`AppDelegate` 类为你提供的唯一自定义方法是 `initializationComplete`，它在应用和\
    \ cocos2d 完全初始化后、第一个场景即将运行前被调用。你可以在 `initializationComplete` 方法内调用 `CCDirectorrunWithScene`\
    \ 方法来运行特定场景。不过，通常并不需要这样做，因为 `config.lua` 文件中的 `FirstSceneClassName` 设置允许你直接指定\
    \ cocos2d 作为第一个场景运行的类名。\n\n你也会注意到 `RootViewController` 类同样极其精简。其核心代码位于 Kobold2D\
    \ 的 `KKRootViewController` 中。同样，如果你重写了任何 `UIViewController` 的消息，请务必调用其父类实现。注意，Mac\
    \ OS 目标平台不使用 `RootViewController` 类。\n\n本质上，Kobold2D 的 `KKMain`、`KKAppDelegate`\
    \ 和 `KKRootViewController` 类提供了开发者对这些类所期望的通用功能。此外，它们为任何 Kobold2D 项目提供了基础代码，使你能够使用\
    \ Lua 编写配置文件等功能。你需要维护的代码也更少。特别地，如果 iOS、Mac OS 或 cocos2d 对这些类进行了重要更改，Kobold2D 会为你处理这些变更或新增内容。\n\
    \n### 启动配置文件\n\nKobold2D 始终会加载位于每个 Kobold2D 项目 Resources 组中的 Lua 脚本文件 `config.lua`。\n\
    \n`config.lua` 脚本文件返回一个包含所有游戏设置的 Lua 表（table）。Lua 表是一种灵活的数据结构，它结合了字典（以字符串为索引）和数组（以数值为索引）的特性。你可以创建深度嵌套的\
    \ Lua 表，其能力相当于 XML 文件或属性列表，但语法相对简单、可读性强，且内置错误报告功能。\n\nLua 脚本是文本文件，因此自然比属性列表更容易编辑。无论您是使用属性列表编辑器还是直接编辑属性列表\
    \ XML 文件都是如此。而且 Lua 脚本允许你为每一行添加注释，以说明你的理由、有效值的范围等等。使用属性列表文件则无法做到这一点，因为属性列表编辑器不允许你对条目进行注释。\n\
    \n**注意：** Kobold2D 对 Lua 的支持由 Corey Johnson 创建的 Wax 库提供。Wax 允许所有 Lua 脚本调用任何 Objective-C\
    \ 方法并实例化 Objective-C 类，包括 cocos2d 类。然而，Kobold2D 避免使用 Wax 脚本；它不会从 Lua 调用 Objective-C\
    \ 方法。相反，Kobold2D 仅依赖于加载 Lua 提供的设置、执行 Lua 脚本以及调用 Lua 函数。这样做速度很快。\n\n另一种方式——通过 Wax\
    \ 从 Lua 调用 Objective-C 方法——则要慢得多。Wax 在后台执行了大量 Objective-C 运行时方法调用。这会增加开销，并且这种开销会迅速累积，尤其是在游戏运行期间，你肯定不希望浪费宝贵的毫秒。此外，即使你能忍受这一点，Wax\
    \ 脚本的语法也与 Objective-C 过于接近，在代码行数方面无法带来太多好处。更糟糕的是，Xcode 不支持 Lua 脚本，因此没有代码补全、语法高亮、编译器警告或错误提示，也无法对\
    \ Lua 脚本进行运行时调试。基于这些原因，最好只将 Lua 用于配置文件，而不是尝试用 Wax 编写整个游戏。\n\n`config.lua` 文件包含了在启动过程中你可能想要调整的几乎所有设置。列表\
    \ 16–1 展示了一个 `config.lua` 文件的示例。\n\n**列表 16–1.** *`config.lua` 脚本包含了 Kobold2D\
    \ 的所有启动设置*\n\n```\nlocal config =\n{\n    KKStartupConfig =\n    {\n        --\
    \ 从以此名称派生的 CCScene 或 CCLayer 类加载第一个场景\n        FirstSceneClassName = \"HelloWorldLayer\"\
    ,\n\n        -- 设置导演类型，以及当第一个类型不可用时的备用类型\n        DirectorType = DirectorType.DisplayLink,\n\
    \        DirectorTypeFallback = DirectorType.NSTimer,\n\n        MaxFrameRate\
    \ = 60,\n        DisplayFPS = YES,\n\n        EnableUserInteraction = YES,\n \
    \       EnableMultiTouch = NO,\n\n        -- 渲染设置\n        DefaultTexturePixelFormat\
    \ = TexturePixelFormat.RGBA8888,\n        GLViewColorFormat = GLViewColorFormat.RGB565,\n\
    \        GLViewDepthFormat = GLViewDepthFormat.DepthNone,\n        GLViewMultiSampling\
    \ = NO,\n        GLViewNumberOfSamples = 0,\n\n        Enable2DProjection = NO,\n\
    \        EnableRetinaDisplaySupport = YES,\n\n        -- 方向与自动旋转\n        DeviceOrientation\
    \ = DeviceOrientation.Portrait,\n        AutorotationType = Autorotation.UIViewController,\n\
    \        ShouldAutorotateToLandscapeOrientations = YES,\n        ShouldAutorotateToPortraitOrientations\
    \ = YES,\n        AllowAutorotateOnFirstAndSecondGenerationDevices = NO,\n\n \
    \       -- iAd 设置\n        EnableAdBanner = YES,\n        LoadOnlyPortraitBanners\
    \ = YES,\n        LoadOnlyLandscapeBanners = NO,\n        PlaceBannerOnBottom\
    \ = NO,\n\n        -- Mac OS 特定设置\n        AutoScale = NO,\n        AcceptsMouseMovedEvents\
    \ = NO,\n        WindowFrame = RectMake(1024-640, 768-480, 640, 480),        \n\
    \    },\n}\n```\n"
- fmt: "`return config`\n\nMost of these settings should be self-explanatory and might\
    \ seem familiar to you. The settings are documented in the `KKStart-upConfig`\
    \ class in the Kobold2D API Reference and here: [`www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference`](http://www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference).\n\
    \nFor example, the `FirstSceneClassName` setting allows you to specify the name\
    \ of a class inheriting from `CCScene` or `CCLayer` (automatically wrapped inside\
    \ a `CCScene`), which will be the first scene run by the `CCDirector`. You can\
    \ enable iAd ad banners, change the way your app is autorotated, or provide the\
    \ default window position and size for Mac builds.\n\nThe big advantage of using\
    \ a Lua-based configuration file is that the entire start-up code is part of the\
    \ Kobold2D code and can be updated in new versions if it needs to be. As Kobold2D\
    \ matures, more settings will be added to the start-up config depending on what\
    \ developers need to change or include most in their apps. In addition, you can\
    \ create and use custom `config.lua` settings. The Hello World project provides\
    \ an example of loading custom settings. I’ll get to that in the next section.\n\
    \n**TIP:** You can learn more about Lua from the free Programming in Lua book,\
    \ which is available online on the official Lua home page at [`www.lua.org/pil`](http://www.lua.org/pil).\
    \ The book is for an older version of Lua but still largely relevant. You might\
    \ also want to browse the Lua reference manual at [`www.lua.org/manual`](http://www.lua.org/manual)\
    \ to get a quick overview of the language. Lua has grown to be the number-one\
    \ scripting language for game developers over the past ten years. It has a very\
    \ small memory footprint and speed-wise often comes close to within 80 to 90 percent\
    \ of the performance achievable with C programming.\n\n## The Hello Kobold2D Scene\
    \ and Layer\n\nLet’s move on to the actual scene class `HelloWorldLayer`, which\
    \ is set as the first scene via the `config.lua` setting `FirstSceneClassName\
    \ = \"HelloWorldLayer\"`. You’ll notice that this first scene is actually derived\
    \ from `CCLayer`. Kobold2D realizes that and automatically wraps the `HelloWorldLayer`\
    \ class into a `CCScene` instance behind the scenes.\n\n**TIP:** To avoid writing\
    \ the repetitive `+(id) scene` method in each `CCLayer` class, you can simply\
    \ call the `+(id) nodeWithScene` method in Kobold2D:\n\n```\n[[CCDirector sharedDirector]\
    \ replaceScene:[MyGameLayer nodeWithScene]];\n```\n\nThe `HelloWorldLayer` interface\
    \ declaration is pretty unspectacular and provides only three instance variables\
    \ that will later be loaded from the `config.lua` file:\n\n```objectivec\n#import\
    \ \"cocos2d.h\"\n\n@interface HelloWorldLayer : CCLayer\n{\n    NSString* helloWorldString;\n\
    \    NSString* helloWorldFontName;\n    int helloWorldFontSize;\n}\n\n@property\
    \ (nonatomic, copy) NSString* helloWorldString;\n@property (nonatomic, copy) NSString*\
    \ helloWorldFontName;\n@property (nonatomic) int helloWorldFontSize;\n\n@end\n\
    ```\n\nAt this point, you should take note of a particular addition to the `config.lua`\
