    the OpenGL ES 2.0 documentation at [`www.khronos.org/opengles/sdk/docs/man`](http://www.khronos.org/opengles/sdk/docs/man).


    #### Adding the Ball


    Can you imagine a pinball game without a pinball? I can''t, so let''s add one
    to the PhysicsBox2D04project and have a look at its implementation. The aptly
    named `Ball` class is derived from `BodyNode` and also implements the `CCTargetedTouchDelegate`
    protocol for experimentation purposes (see [Listing 13–8](#Chapter13.html#list_13_8)).


    **Listing 13–8.** *The Ball Class''s Interface*


    `#import "BodyNode.h"`


    `@interface Ball : BodyNode <CCTargetedTouchDelegate>`

    `{`

    `    bool moveToFinger;`

    `    CGPoint fingerLocation;`

    `}`


    `+(id) ballWithWorld:(b2World*)world;`


    `@end`


    There''s the usual static initializer `ballWithWorld`, which takes a `b2World`
    pointer as input. Then we have the member variable `moveToFinger`, which determines
    whether the ball should move toward the touch location, and the `fingerLocationCGPoint`
    variable, which specifies the actual location of the finger. We can use those
    to have a little fun with the ball as long as the pinball game doesn''t yet have
    any other interactive elements to move the ball. Take a look at the `Ball` initialization
    and `dealloc` methods in [Listing 13–9](#Chapter13.html#list_13_9).


    **Listing 13–9.** *The init and dealloc Methods of the Ball Class*


