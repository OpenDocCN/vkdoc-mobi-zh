- fmt: '# What You Will Learn


    I will provide you with a fair share of my game development experiences to show
    how interactive games are made. I believe that learning to program is not at all
    about memorizing API methods, yet a lot of game development books I’ve read over
    the past two decades follow that “reference handbook” approach. But that’s what
    the API documentation is for. When I started programming some 20 years ago, I
    thought I’d never learn to program just by looking at a huge stack of compiler
    reference handbooks and manuals. Back at that time, compiler manuals were still
    printed and, obviously, didn’t come with online versions. The World Wide Web was
    still in its infancy. So, all that information was stacked some 15 inches high
    on my desk, and it seemed very daunting to try to learn all of this.


    Today, I still don’t recall most methods and APIs from memory, and I keep forgetting
    about those I used to know. I look them up time and time again. After 20 years
    of programming, I do know what’s really important to learn: the concepts. Good
    programming concepts and best practices stick around for a long time, and they
    help with programming in any language. Learning concepts is done best by understanding
    the rationale behind the choices that were made in designing, structuring, and
    writing the source code. That’s what I’ll focus on the most.


    ## What Beginning iOS Game Developers Will Learn


    I’ll also ease you into the most important aspects of `cocos2d`. I’ll focus on
    the kind of classes, methods, and concepts that you should be able to recall from
    memory just because they are so fundamental to programming with `cocos2d`.


    You’ll also learn about the essential tools supporting or being supported by `cocos2d`.
    Without these tools, you’d be only half the `cocos2d` programmer you can be. You’ll
    use tools like `TexturePacker` and `ParticleDesigner` to create games that will
    be increasingly complex and challenging to develop. Because of the scope of this
    book, these games will not be complete and polished games, nor will I be able
    to discuss every line of code. Instead, I’ll annotate the code with many helpful
    comments so that it’s easy to follow and understand.


    I leave it up to you to improve on these skeleton game projects, and I’m excited
    to see your results. I think giving you multiple starting points to base your
    own work on works better than walking you through the typical Asteroids games
    over the course of the whole book.


    I chose the game projects for this book based on popularity on the App Store and
    relevance for game developers, who often inquire about how to solve the specific
    problems that these games present. For example, the line-drawing game genre is
    a huge favorite among cocos2d game developers, yet line-drawing games require
    you to overcome deceivingly complex challenges.


    I’ve also seen a fair bit of other developers’ cocos2d code and followed the discussions
    on code design, structure, and style. I’ll base my code samples on a framework
    that relies on composition over inheritance and will explain why this is preferable.
    One other frequent question that has to do with code design is how different objects
    should communicate with each other. There are interesting pros and cons for each
    approach to code design and structure, and I want to convey these concepts because
    they help you write more stable code with fewer bugs and better performance.


    ## What iOS App Developers Will Learn


    So, you are an iOS app developer, and you’ve worked with the iOS SDK before? Perfect.
    Then you’ll be most interested in how making games works in a world without Interface
    Builder. In fact, there are other tools you’ll be using. They may not be as shiny
    as Apple’s tools, but they’ll be useful nonetheless.


    The programming considerations will change, too. You don’t normally send and receive
    a lot of events in game programming, and you let a larger number of objects decide
    what to do with an event. For performance reasons and to reduce user input latency,
    game engine systems often work more closely connected with each other. A lot of
    work is done in loops and update methods, which are called at every frame or at
    specific points in time. While a user interface-driven application spends most
    of the time waiting for a user’s input, a game keeps pushing a lot of data and
    pixels behind the scenes, even when the player is not doing anything. So, there’s
    a lot more going on, and game code tends to be more streamlined and efficient
    because of concerns for performance.


    ## What Cocos2d Developers Will Learn


    You’re already familiar with `cocos2d`? You may be wondering whether you can learn
    anything new from this book. I say you will. Maybe you need to skip the first
    chapters, but you’ll definitely get hooked by the games’ sample source code supplied
    with the book. You’ll learn how I structure my code and the rationale behind it.
    You’ll probably find inspiration reading about the various games and how I implemented
    them. There’s also a good number of tips you’ll benefit from.


    Most importantly, this book isn’t written by some geek you’ve never heard of and
    never will hear from again, with no e-mail address or web site where to post your
    follow-up questions. Instead, it’s written by a geek you may not have heard of
    but who will definitely be around. I’m actively engaged with the `cocos2d` community
    at my [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com) blog, where I’ll
    basically keep writing this book.


    # What’s in This Book


    Here’s a brief overview of the chapters in this book. The second edition of the
    book features two entirely new chapters: [Chapter 15](#Chapter15.html#ch15) discusses
    integration of UIKit views with `cocos2d`, and [Chapter 16](#Chapter16.html#ch16)
    introduces Kobold2D, my own take on a `cocos2d` development environment with additional
    convenience features.


    ## [Chapter 2](#Chapter02.html#ch2), “Getting Started”


    I’ll cover setting up `cocos2d` for development, installing project templates,
    and creating the first “Hello World” project. You’ll learn about `cocos2d` basics,
    such as scenes and nodes.


    ## [Chapter 3](#Chapter03.html#ch3), “Essentials”


    I’ll explain the essential `cocos2d` classes that you’ll need most often, such
    as sprites, transitions, and actions. And you’ll learn how to use them, of course.


    ## [Chapter 4](#Chapter04.html#ch4), “Your First Game”


    Enemies drop from the top, and you have to avoid them by tilting your device.
    This will be our first simple game using accelerometer controls.


    ## [Chapter 5](#Chapter05.html#ch5), “Game Building Blocks”


    Now prepare yourself for a bigger game, one that requires a better code structure.
    You’ll learn how scenes and nodes are layered and the various ways that game objects
    can exchange information.


    ## [Chapter 6](#Chapter06.html#ch6), “Sprites In-Depth”


    You’ll learn what a texture atlas is and why we’ll be using it for our next game
    and how to create a texture atlas with the `TexturePacker` tool.


    ## [Chapter 7](#Chapter07.html#ch7), “Scrolling with Joy”


    With the Texture Atlas ready, you’ll learn how to implement a parallax scrolling
    shooter game, controlled by touch input.


    ## [Chapter 8](#Chapter08.html#ch8), “Shoot ’emUp”


    Without enemies, our shooter wouldn’t have much to shoot at, right? I’ll show
    you how to add game-play code to spawn, move, hit, and animate the enemy hordes.


    ## [Chapter 9](#Chapter09.html#ch9), “Particle Effects”


    By using the `ParticleDesigner` tool, you’ll add some particle effects to the
    side-scrolling game.'
