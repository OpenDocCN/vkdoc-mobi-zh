    \ NO;\n    [self unscheduleUpdate];\n}\n```\n\n**提示:** 注意在`shootBulletFromShip`方法中，更新选择器首先被取消调度，以防止更新选择器被重复调度（这会导致错误）。不过，你无需检查选择器是否已被调度即可取消调度。如果该选择器当前未调度，`Cocos2d`可能会向调试器控制台窗口输出一条警告消息，但除此之外会忽略该命令。`Cocos2d`所不允许的是尝试调度一个已经处于调度状态的选择器；因此，在使用`Cocos2d`的调度选择器时，预先取消调度是一个相对常见的操作。\n\
    \n#### 棘手的精灵动画实现方式\n\n现在请做好准备，我将向你展示精灵动画的工作原理。[图6-3](#Chapter06.html#fig_6_3)展示了飞船的动画帧。请注意，我们同时拥有高清和标清分辨率的完整动画。\n\
    \n![images](images/0603.jpg)\n\n**图6-3.** *飞船动画——五个火焰效果不同的帧*\n\n精灵动画是使用`CCSpriteBatchNode`的另一个好理由，因为你可以将所有动画帧放入同一纹理中以节省内存。实际上，这需要编写相当多的代码，如[代码清单6-11](#Chapter06.html#list_6_11)和`Sprites05`项目所示。之后，我将展示如何使用纹理图集创建相同的动画，这可以显著减少你需要编写的代码量。\n\
    \n**代码清单6-11.** *不使用纹理图集为飞船添加动画需要相当多的代码*\n\n```objectivec\n// 将飞船动画帧作为纹理加载并创建精灵帧\n\
    NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];\nfor (int i = 0;\
    \ i < 5; i++)\n{\n    // 为动画帧创建纹理\n    NSString* file = [NSString stringWithFormat:@\"\
    ship-anim%i.png\", i];\n    CCTexture2D* texture = [[CCTextureCache sharedTextureCache]\
    \ addImage:file];\n\n    // 整个图像应作为动画帧使用\n    CGSize texSize = [texture contentSize];\n\
    \    CGRect texRect = CGRectMake(0, 0, texSize.width, texSize.height);\n\n   \
    \ // 从纹理创建精灵帧\n    CCSpriteFrame* frame = [CCSpriteFrame frameWithTexture:texture\
    \ rect:texRect];\n    [frames addObject:frame];\n}\n\n// 从所有精灵动画帧创建动画对象\nCCAnimation*\
    \ anim = [CCAnimation animationWithFrames:frames delay:0.08f];\n\n// 通过 CCAnimate\
    \ 动作运行动画，并使用 CCRepeatForever 循环\nCCAnimate* animate = [CCAnimate actionWithAnimation:anim];\n\
    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];\n[self runAction:repeat];\n\
    ```\n\n所有这些代码只是为了创建一个包含五帧的精灵动画？恐怕是的。这次我将逆向为你讲解这段代码，这可能有助于更好地理解其结构。在代码末尾，我们使用了`CCAnimate`动作来播放动画。在此例中，我们还使用了`CCRepeatForever`动作来循环播放动画。\n\
    \n`CCAnimate`动作使用`CCAnimation`对象（它是动画帧的容器），该对象定义了每帧之间的延迟。在很多情况下，你后续可能需要引用之前创建的动画。为此，`Cocos2d`提供了`CCAnimationCache`类，它可以通过名称存储`CCAnimation`实例，如[代码清单6-12](#Chapter06.html#list_6_12)所示。使用`CCAnimationCache`，你以后可以通过名称访问特定的动画。\n\
    \n**代码清单6-12.** *`CCAnimationCache`类可以为你存储动画，并可通过名称检索*\n\n```objectivec\nCCAnimation*\
    \ anim = [CCAnimation animationWithFrames:frames delay:1];\n\n// 将动画存储在 CCAnimationCache\
    \ 中\n[[CCAnimationCache sharedAnimationCache] addAnimation:anim name:@\"move\"\
    ];\n\n// 稍后：从 CCAnimationCache 中检索 move 动画\nCCAnimation* move = [[CCAnimationCache\
    \ sharedAnimationCache] animationByName:@\"move\"];\n```\n\n回到[代码清单6-11](#Chapter06.html#list_6_11)，注意其中的`for`循环，这是复杂之处所在。`CCAnimation`类必须使用包含`CCSpriteFrame`对象的`NSArray`来初始化。一个*精灵帧*仅包含对纹理的引用以及一个定义纹理绘制区域的矩形。纹理矩形等于纹理的`contentSize`属性——换句话说，它就是纹理中包含的实际图像的大小。请记住，纹理可能比其包含的图像更大，因为纹理的尺寸只能是2的幂。\n\
    \n现在，遗憾的是`CCSpriteFrame`不接受图像文件名作为输入，它只接受已有的`CCTexture2D`对象。纹理是通过`CCTextureCache`单例的`addImage`方法创建的，该方法通常用于将图像作为纹理预加载到内存中，而无需创建`CCSprite`或其他对象。文件名是通过`NSString`的`stringWithFormat`方法构建的，这允许我使用循环变量`i`附加到文件名上，而不必逐一写出所有五个文件名。\n\
    \n总结一下，从顶层到底层，创建并运行精灵动画的步骤如下：\n\n1. 创建`NSMutableArray`。\n2. 对于每个动画帧：\n   1. 为每个图像创建`CCTexture2D`。\n\
    \   2. 使用`CCTexture2D`创建`CCSpriteFrame`。\n   3. 将每个`CCSpriteFrame`添加到`NSMutableArray`中。\n\
    3. 使用`NSMutableArray`中的帧创建`CCAnimation`。\n4. （可选）将`CCAnimation`以指定名称添加到`CCAnimationCache`。\n\
    5. 使用`CCAnimate`动作播放动画。\n\n嘘，放松点——没必要吃镇静剂。如果你将动画帧打包到纹理图集中，事情会变得更容易，同时效率也更高。更有帮助的做法是将所有这些代码封装到一个辅助方法中，并为动画文件制定统一的命名约定。"
