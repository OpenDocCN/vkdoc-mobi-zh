    ![images](images/1511.jpg)


    **Figure 15–11.** *Add the missing frameworks and libraries to the target’s Link
    Binary With Libraries Build Phase.*


    Once you click the + button, a list of frameworks and libraries opens. Here’s
    the list of frameworks and libraries you will have to add. They’re found in the
    list in the same alphabetical order as I list them here:


    *   AudioToolbox.framework

    *   AVFoundation.framework

    *   libz.dylib

    *   OpenAL.framework

    *   OpenGLES.framework

    *   QuartzCore.framework


    Note that you can select all libraries in one go by holding down the Command key
    while selecting the items in the list. The added frameworks and libraries will
    be added to the root of the project in the Project Navigator. You can safely move
    them to the Frameworks group where they belong, just to get them out of sight
    since you don’t need to work with them.


    You can now build and run the app. It has the cocos2d source code built into it,
    but of course without a user interface, it’s the same dull and empty app as it
    was before. Let’s change that!'
  trans: '

    # 使用 Cocos2D 创建基于视图的应用程序项目


    启动您的 Xcode 4。通过 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg) 新建项目** 创建一个新项目。选择基于视图的应用程序模板，如图
    15-8 所示，并将项目命名为 `ViewBasedAppWithCocos2D`。您最终会得到一个包含视图控制器类、相应的 `.xib` 文件、`MainWindow.xib`
    文件和应用程序委托类的项目。如果您立即运行它，将看到一个空白的 iPhone 视图，顶部只有状态栏。


    ![images](img/1508.jpg)


    **图 15-8.** *嵌入 Cocos2D 视图的起点是基于视图的应用程序模板。*


    **提示：** 如果您尝试在设备上运行此项目，即使设备已正确配置，也可能会遇到如图 15-9 所示的消息。默认情况下，新项目模板会将 `iOS 部署目标`
    设置设为最新的 iOS SDK，可能是 iOS 4.3 或 iOS 5.0。这些及更新的 iOS 版本不适用于第一代和第二代设备。在这种情况下，在项目导航器窗格中点击项目以查看项目和目标列表。在新视图中再次选择项目，并切换到其
    `信息` 窗格。您会看到第一个设置 `iOS 部署目标` 被设为 `iOS 4.3` 或更高版本。将其更改为 `iOS 3.1.3` 或更低版本，然后尝试再次运行应用程序。如果
    Xcode 仍然显示与图 15-9 相同的消息，则说明您的设备未正确配置，您需要检查一下。可能是配置文件已过期，您可能需要从 [`http://developer.apple.com/ios`](http://developer.apple.com/ios)
    获取一个新的配置文件。


    ![images](img/1509.jpg)


    **图 15-9.** *如果在尝试在设备上运行应用程序时遇到此消息，请尝试将项目 `信息` 窗格中的 `iOS 部署目标` 设置更改为 `iOS 3.1.3`
    或更低版本。*


    下一步是将 Cocos2D 源代码添加到项目中。有几种方法可以做到这一点；我倾向于依赖 Cocos2D 项目模板，因为它更容易精确复制必要的文件——不多不少。因此，在
    Xcode 中，通过 **文件 ![image](img/U001.jpg) 新建 ![image](img/U001.jpg) 新建项目** 创建另一个项目，这次选择一个
    Cocos2D 项目模板。如果您在 Cocos2D 视图中需要物理引擎，应选择使用物理引擎的模板；否则，只需选择 Cocos2D 模板。将项目保存到任何地方，使用任何名称；只需记住保存位置。实际上，创建
    Cocos2D Xcode 项目后，您可以立即关闭它。


    在 Xcode 4 中保持 `ViewBasedAppWithCocos2D` 项目打开的同时，使用 Finder 应用导航到 Cocos2D 项目文件夹。在
    Cocos2D 项目文件夹中找到名为 `libs` 的子文件夹。将 `libs` 文件夹拖到 `ViewBasedAppWithCocos2D` 项目上，并将其放到项目导航器窗格中，即列出所有项目文件的位置。如有必要，请先通过从菜单中选择
    **视图 ![image](img/U001.jpg) 导航器 ![image](img/U001.jpg) 项目** 来打开项目导航器。确保选中 **将项目复制到目标组的文件夹中（如果需要）**
    复选框，并且其他设置也与您在图 15-10 中看到的一致。


    ![images](img/1510.jpg)


    **图 15-10.** *将 Cocos2D `libs` 文件夹拖放到基于视图的应用程序项目中时，确保设置了“复制项目...”复选框。*


    您还不能立即构建项目，因为 Cocos2D 引擎需要额外的框架和库，否则您只会收到链接器错误。要将这些依赖项添加到项目中，在项目导航器中选择项目本身（列表中带有蓝色图标的第一个条目）。选择
    `ViewBasedAppWithCocos2D` 目标，导航到 **构建阶段** 选项卡，展开 **将二进制文件与库链接** 窗格。然后点击 **+**
    按钮添加其他库。如果您找不到这个位置，请查看图 15-11。


    ![images](img/1511.jpg)


    **图 15-11.** *将缺失的框架和库添加到目标的“将二进制文件与库链接”构建阶段。*


    点击 **+** 按钮后，会打开一个框架和库列表。以下是您需要添加的框架和库列表。它们在列表中按字母顺序排列，与我在此列出的顺序相同：


    *   `AudioToolbox.framework`

    *   `AVFoundation.framework`

    *   `libz.dylib`

    *   `OpenAL.framework`

    *   `OpenGLES.framework`

    *   `QuartzCore.framework`


    请注意，您可以通过按住 Command 键的同时选择列表中的项目，一次性选择所有库。添加的框架和库将添加到项目导航器中项目的根目录。您可以安全地将它们移动到它们所属的
    `Frameworks` 组中，只是为了将它们移出视线，因为您不需要与它们交互。


    您现在可以构建并运行该应用程序了。它已经包含了 Cocos2D 源代码，但当然，如果没有用户界面，它和之前一样是一个枯燥且空白的应用程序。让我们来改变这一点！

