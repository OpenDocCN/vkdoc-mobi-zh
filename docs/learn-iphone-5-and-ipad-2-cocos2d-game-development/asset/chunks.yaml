- fmt: "### Skinning the UITextField with a UIImage\n\nNo, I’m not going to peel off\
    \ the text field’s skin! If you haven’t heard the term *skinning* before, it basically\
    \ means adding (or changing) a texture to a user interface control or view. Essentially\
    \ you’ll change the native look of the control or view and replace it with your\
    \ own.\n\nIn [Listing 15–3](#Chapter15.html#list_15_3) you’ll be adding some more\
    \ code at the bottom of the `addSomeCocoaTouch` method in order to create a second\
    \ `UITextField` that uses a texture as background.\n\n**Listing 15–3.** *Skinning\
    \ a UITextField View*\n\n```\n-(void) addSomeCocoaTouch\n{\n    …\n\n    // text\
    \ field that uses an image as background (aka \"skinning\")\n    UITextField*\
    \ textFieldSkinned = [[UITextField alloc] initWithFrame:\n        CGRectMake(40,\
    \ 60, 200, 24)];\n    textFieldSkinned.text = @\"With background image\";\n  \
    \  textFieldSkinned.delegate = self;\n\n    // load and assign the UIImage as\
    \ background of the text field\n    NSString* file = [CCFileUtils fullPathFromRelativePath:@\"\
    background-frame.png\"];\n    UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];\n\
    \    textFieldSkinned.background = image;\n\n    [glView addSubview:textFieldSkinned];\n\
    \    [textFieldSkinned release];\n    [image release];\n}\n```\n\nCreating the\
    \ `UITextField` should be familiar, and you also add `self` as a delegate of the\
    \ text field. The code that dismisses the keyboard and removes the text field\
    \ when it is empty (see [Listing 15–2](#Chapter15.html#list_15_2)) now works for\
    \ this new `UITextField` as well.\n\nThe next part is where cocos2d users with\
    \ little or no Cocoa Touch programming experience may have problems. You can’t\
    \ just add a `CCSprite` or the sprite’s texture to a `UIView`. You do need a `UIImage`\
    \ class for skinning Cocoa Touch views, which you can then comfortably create\
    \ via `initWithContentsOfFile`. Or not? Well, the returned `UIImage` might be\
    \ `nil`.\n\nIt turns out that cocos2d allows you to use file names without specifying\
    \ a path because internally it adds the path to the application’s bundle file\
    \ for you. This full path to a bundle file looks something like this on an iOS\
    \ device, and the path will be different when running the app in the simulator\
    \ or on another device:\n\n`/var/mobile/Applications/…lots of letters…/CocosWithCocoa.app/background-frame.png`\n\
    \nSince `UIImage` and most other Cocoa Touch classes dealing with files expect\
    \ the full path to the file, you will have to use the `CCFileUtils` class method\
    \ `fullPathFromRelativePath` in order to create an `NSString`, which contains\
    \ the full path to the file in the app bundle. Then you get a valid `UIImage`,\
    \ and you can assign it to the `background` property. You can see what this looks\
    \ like in [Figure 15–2](#Chapter15.html#fig_15_2).\n\n![images](images/1502.jpg)\n\
    \n**Figure 15–2.** *Two UITextField views with the iPhone keyboard raised*\n\n\
    **TIP:** The background image of a `UIView` will always be scaled and stretched\
    \ to fit the `UIView`’s frame. This will often blur or otherwise distort the texture.\
    \ To avoid that, you should design background images of `UIView`s to the exact\
    \ dimensions of the `UIView`. Alternatively, design the texture for the largest\
    \ possible size of the `UIView` so that even if it is scaled, it is scaled down\
    \ and doesn’t lose as much image quality compared to upscaling the texture.\n\n\
    ### Adding Views Behind the cocos2d View\n\nWhat if you wanted to add a `UIView`\
    \ behind the cocos2d view? For example, say you wanted to show the video camera\
    \ feed in the background for an augmented reality app. You’ll learn how to do\
    \ so in [Chapter 16](#Chapter16.html#ch16), where I’m using the solution conveniently\
    \ provided by cocos3d to create an augmented reality demo app.\n\nThere are a\
    \ few things that you need to change to allow UIKit views in the background. You’ll\
    \ find these code changes in the `CocosWithCocoa04` project.\n\n#### Improving\
    \ the View Hierarchy\n\nFirst, the view hierarchy needs to be changed so that\
    \ the UIKit views are not a subview of the cocos2d view, respectively; the UIKit\
    \ views can’t have the cocos2d view as their superview. That would always render\
    \ them in front of the cocos2d view. The other required change is to make the\
    \ cocos2d view transparent.\n\nLet’s start by setting up the view hierarchy so\
    \ that you have some way to add views to the hierarchy so that they’re behind\
    \ the cocos2d view. For that change, you’ll have to open the `AppDelegate.m` file\
    \ and look for the following lines in the `applicationDidFinishLaunching` method:\n\
    \n```\n// make the OpenGLView a child of the view controller\n[viewController\
    \ setView:glView];\n\n// make the View Controller a child of the main window\n\
    [window addSubview: viewController.view];\n[window makeKeyAndVisible];\n```\n\n\
    As you can see, the cocos2d `glView` is added directly to the `UIWindow`. Well,\
    \ it’s not quite directly because it is first set to be the `viewController` view.\
    \ The `viewController` is an instance of the `RootViewController` class provided\
    \ by cocos2d to handle autorotation (more on that later). Then the `viewController.view`,\
    \ which is the same as the `glView` now, is added as subview to the `window`.\n\
    \nThis setup means that any view that should be rendered before the cocos2d view\
    \ will be a subview of the `UIWindow`. There’s only one problem with that: you\
    \ lose the autorotation feature provided by the `RootViewController` class. All\
    \ views added to the `UIWindow` will display in portrait orientation by default,\
    \ and they won’t rotate if you change the device orientation.\n\nTo overcome this\
    \ problem, we need to introduce another view in between the `UIWindow` and the\
    \ cocos2d view. A simple `UIView` does the job, and its only purpose is to be\
    \ a dummy view that will handle the autorotation through the `RootViewController`\
    \ class and will contain all the subviews, both the cocos2d view and any UIKit\
    \ views:\n\n```\n// add a dummy UIView to the view controller\nUIView* dummyView\
    \ = [[UIView alloc] initWithFrame:[window bounds]];\n[viewController setView:dummyView];\n\
    [dummyView addSubview:glView];\n[dummyView release];\n\n// make the View Controller's\
    \ view a child of the main window\n[window addSubview:viewController.view];\n\n\
    [window makeKeyAndVisible];\n```\n\nI think a picture explains best how this changes\
    \ the view hierarchy. Take a look at the before and after diagram in [Figure 15–3](#Chapter15.html#fig_15_3)\
    \ and notice that previously you’ve been adding UIKit views as subviews of the\
    \ cocos2d view. Now with the introduction of the dummy view, all views are at\
    \ the same level so that you can have `UIView`s before and after the cocos2d view.\
    \ Moreover, this gives you the ability to change the view order at runtime.\n\n\
    ![images](images/1503.jpg)\n\n**Figure 15–3.** *An illustration of the change\
    \ made to the view hierarchy by introducing the dummy UIView*"
  raw: '#### Skinning the UITextField with a UIImage


    No, I’m not going to peel off the text field’s skin! If you haven’t heard the
    term *skinning* before, it basically means adding (or changing) a texture to a
    user interface control or view. Essentially you’ll change the native look of the
    control or view and replace it with your own.


    In [Listing 15–3](#Chapter15.html#list_15_3) you’ll be adding some more code at
    the bottom of the `addSomeCocoaTouch` method in order to create a second `UITextField`
    that uses a texture as background.


    **Listing 15–3.** *Skinning a UITextField View*


    `-(void) addSomeCocoaTouch`

    `{`

    `    …`


    `    // text field that uses an image as background (aka "skinning")`

    `    UITextField* textFieldSkinned = [[UITextField alloc] initWithFrame:`![image](images/U002.jpg)

    `        CGRectMake(40, 60, 200, 24)];`

    `    textFieldSkinned.text = @"With background image";`

    `    textFieldSkinned.delegate = self;`


    `    // load and assign the UIImage as background of the text field`

    `    NSString* file = [CCFileUtils fullPathFromRelativePath:@"background-frame.png"];`

    `    UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];`

    `    textFieldSkinned.background = image;`


    `    [glView addSubview:textFieldSkinned];`

    `    [textFieldSkinned release];`

    `    [image release];`

    `}`


    Creating the `UITextField` should be familiar, and you also add `self` as a delegate
    of the text field. The code that dismisses the keyboard and removes the text field
    when it is empty (see [Listing 15–2](#Chapter15.html#list_15_2)) now works for
    this new `UITextField` as well.


    The next part is where cocos2d users with little or no Cocoa Touch programming
    experience may have problems. You can’t just add a `CCSprite` or the sprite’s
    texture to a `UIView`. You do need a `UIImage` class for skinning Cocoa Touch
    views, which you can then comfortably create via `initWithContentsOfFile`. Or
    not? Well, the returned `UIImage` might be `nil`.


    It turns out that cocos2d allows you to use file names without specifying a path
    because internally it adds the path to the application’s bundle file for you.
    This full path to a bundle file looks something like this on an iOS device, and
    the path will be different when running the app in the simulator or on another
    device:


    `/var/mobile/Applications/…lots of letters…/CocosWithCocoa.app/background-frame.png`


    Since `UIImage` and most other Cocoa Touch classes dealing with files expect the
    full path to the file, you will have to use the `CCFileUtils` class method `fullPathFromRelativePath`
    in order to create an `NSString`, which contains the full path to the file in
    the app bundle. Then you get a valid `UIImage`, and you can assign it to the `background`
    property. You can see what this looks like in [Figure 15–2](#Chapter15.html#fig_15_2).


    ![images](images/1502.jpg)


    **Figure 15–2.** *Two UITextField views with the iPhone keyboard raised*


    **TIP:** The background image of a `UIView` will always be scaled and stretched
    to fit the `UIView`’s frame. This will often blur or otherwise distort the texture.
    To avoid that, you should design background images of `UIView`s to the exact dimensions
    of the `UIView`. Alternatively, design the texture for the largest possible size
    of the `UIView` so that even if it is scaled, it is scaled down and doesn’t lose
    as much image quality compared to upscaling the texture.


    #### Adding Views Behind the cocos2d View


    What if you wanted to add a `UIView` behind the cocos2d view? For example, say
    you wanted to show the video camera feed in the background for an augmented reality
    app. You’ll learn how to do so in [Chapter 16](#Chapter16.html#ch16), where I’m
    using the solution conveniently provided by cocos3d to create an augmented reality
    demo app.


    There are a few things that you need to change to allow UIKit views in the background.
    You’ll find these code changes in the CocosWithCocoa04 project.


    ##### Improving the View Hierarchy


    First, the view hierarchy needs to be changed so that the UIKit views are not
    a subview of the cocos2d view, respectively; the UIKit views can’t have the cocos2d
    view as their superview. That would always render them in front of the cocos2d
    view. The other required change is to make the cocos2d view transparent.


    Let’s start by setting up the view hierarchy so that you have some way to add
    views to the hierarchy so that they’re behind the cocos2d view. For that change,
    you’ll have to open the AppDelegate.m file and look for the following lines in
    the `applicationDidFinishLaunching` method:


    `// make the OpenGLView a child of the view controller`

    `[viewController setView:glView];`


    `// make the View Controller a child of the main window`

    `[window addSubview: viewController.view];`

    `[window makeKeyAndVisible];`


    As you can see, the cocos2d `glView` is added directly to the `UIWindow`. Well,
    it’s not quite directly because it is first set to be the `viewController` view.
    The `viewController` is an instance of the `RootViewController` class provided
    by cocos2d to handle autorotation (more on that later). Then the `viewController.view`,
    which is the same as the `glView` now, is added as subview to the `window`.


    This setup means that any view that should be rendered before the cocos2d view
    will be a subview of the `UIWindow`. There’s only one problem with that: you lose
    the autorotation feature provided by the `RootViewController` class. All views
    added to the `UIWindow` will display in portrait orientation by default, and they
    won’t rotate if you change the device orientation.


    To overcome this problem, we need to introduce another view in between the `UIWindow`
    and the cocos2d view. A simple `UIView` does the job, and its only purpose is
    to be a dummy view that will handle the autorotation through the `RootViewController`
    class and will contain all the subviews, both the cocos2d view and any UIKit views:


    **`// add a dummy UIView to the view controller`**

    **`UIView* dummyView = [[UIView alloc] initWithFrame:[window bounds]];`**

    **`[viewController setView:dummyView];`**

    **`[dummyView addSubview:glView];`**

    **`[dummyView release];`**


    `// make the View Controller''s view a child of the main window`

    `[window addSubview:viewController.view];`


    `[window makeKeyAndVisible];`


    I think a picture explains best how this changes the view hierarchy. Take a look
    at the before and after diagram in [Figure 15–3](#Chapter15.html#fig_15_3) and
    notice that previously you’ve been adding UIKit views as subviews of the cocos2d
    view. Now with the introduction of the dummy view, all views are at the same level
    so that you can have `UIView`s before and after the cocos2d view. Moreover, this
    gives you the ability to change the view order at runtime.


    ![images](images/1503.jpg)


    **Figure 15–3.** *An illustration of the change made to the view hierarchy by
    introducing the dummy UIView*'
  trans: "\n### 使用 UIImage 为 UITextField 设置皮肤\n\n不，我并不是要剥掉文本字段的皮！如果你之前没听说过*皮肤*这个术语，它基本上是指为界面控件或视图添加（或更改）纹理。本质上，你会改变控件或视图的原生外观，并用你自己设计的外观来替换它。\n\
    \n在代码清单 15-3 中，你将在 `addSomeCocoaTouch` 方法底部添加一些代码，以创建第二个使用纹理作为背景的 `UITextField`。\n\
    \n**代码清单 15-3.** *为 UITextField 视图设置皮肤*\n\n```\n-(void) addSomeCocoaTouch\n{\n\
    \    …\n\n    // 使用图片作为背景的文本字段（即\"设置皮肤\"）\n    UITextField* textFieldSkinned =\
    \ [[UITextField alloc] initWithFrame:\n        CGRectMake(40, 60, 200, 24)];\n\
    \    textFieldSkinned.text = @\"带有背景图片\";\n    textFieldSkinned.delegate = self;\n\
    \n    // 加载 UIImage 并将其分配为文本字段的背景\n    NSString* file = [CCFileUtils fullPathFromRelativePath:@\"\
    background-frame.png\"];\n    UIImage* image = [[UIImage alloc] initWithContentsOfFile:file];\n\
    \    textFieldSkinned.background = image;\n\n    [glView addSubview:textFieldSkinned];\n\
    \    [textFieldSkinned release];\n    [image release];\n}\n```\n\n创建 `UITextField`\
    \ 的代码你应该很熟悉，并且你也将 `self` 设置为文本字段的委托。当文本字段为空时，用于关闭键盘并移除该文本字段的代码（参见代码清单 15-2）现在对这个新的\
    \ `UITextField` 也同样有效。\n\n接下来的部分，对于 Cocoa Touch 编程经验较少或完全没有经验的 cocos2d 用户来说可能会遇到问题。你不能直接将\
    \ `CCSprite` 或精灵的纹理添加到 `UIView` 上。为 Cocoa Touch 视图设置皮肤时，你确实需要一个 `UIImage` 类，你可以通过\
    \ `initWithContentsOfFile` 方便地创建它。真的吗？不过，返回的 `UIImage` 可能是 `nil`。\n\n事实是，cocos2d\
    \ 允许你使用不带路径的文件名，因为它会在内部为你添加应用程序包文件的路径。在 iOS 设备上，这个包文件的完整路径看起来像这样，而在模拟器或其他设备上运行应用时，路径会有所不同：\n\
    \n`/var/mobile/Applications/…lots of letters…/CocosWithCocoa.app/background-frame.png`\n\
    \n由于 `UIImage` 和大多数其他处理文件的 Cocoa Touch 类都期望文件的完整路径，你必须使用 `CCFileUtils` 类的方法 `fullPathFromRelativePath`\
    \ 来创建一个 `NSString`，其中包含应用包中文件的完整路径。这样你就能得到一个有效的 `UIImage`，并将其分配给 `background`\
    \ 属性。你可以在图 15-2 中看到它的效果。\n\n![images](img/1502.jpg)\n\n**图 15-2.** *两个显示 iPhone\
    \ 键盘的 UITextField 视图*\n\n**提示：** `UIView` 的背景图像总是会进行缩放和拉伸以适配 `UIView` 的框架。这通常会使纹理模糊或变形。为避免这种情况，你应该按照\
    \ `UIView` 的确切尺寸来设计其背景图像。或者，将纹理设计为 `UIView` 可能的最大尺寸，这样即使需要缩放，也是缩小尺寸，与放大纹理相比，不会损失太多图像质量。\n\
    \n### 在 cocos2d 视图后方添加视图\n\n如果你想在 cocos2d 视图后方添加一个 `UIView` 怎么办？例如，假设你想在增强现实应用中显示后置摄像头的实时画面作为背景。你将在第\
    \ 16 章中学习如何实现，我将使用 cocos3d 方便提供的解决方案来创建一个增强现实演示应用。\n\n要让 UIKit 视图显示在背景中，你需要更改一些设置。你会在\
    \ `CocosWithCocoa04` 项目中找到这些代码改动。\n\n#### 改进视图层级\n\n首先，需要改变视图层级，使得 UIKit 视图不再是\
    \ cocos2d 视图的子视图；换言之，UIKit 视图不能将 cocos2d 视图作为其父视图。那样的话，它们会始终渲染在 cocos2d 视图的前面。另一个必要的改动是让\
    \ cocos2d 视图变为透明。\n\n让我们从设置视图层级开始，这样你就有了向层级中添加视图的方法，使它们位于 cocos2d 视图的后方。为此，你需要打开\
    \ `AppDelegate.m` 文件，并在 `applicationDidFinishLaunching` 方法中找到以下几行代码：\n\n```\n\
    // 将 OpenGLView 设为视图控制器的子视图\n[viewController setView:glView];\n\n// 将视图控制器设为主窗口的子视图\n\
    [window addSubview: viewController.view];\n[window makeKeyAndVisible];\n```\n\n\
    如你所见，cocos2d 的 `glView` 被直接添加到了 `UIWindow` 中。嗯，并非完全直接，因为它首先被设置为 `viewController`\
    \ 的视图。`viewController` 是 cocos2d 提供的 `RootViewController` 类的一个实例，用于处理自动旋转（稍后会详细介绍）。然后，`viewController.view`（现在与\
    \ `glView` 是同一个对象）作为子视图被添加到 `window` 中。\n\n这种设置意味着，任何应该在 cocos2d 视图之前渲染的视图都将是\
    \ `UIWindow` 的子视图。但这样做只有一个问题：你会失去 `RootViewController` 类提供的自动旋转功能。所有添加到 `UIWindow`\
    \ 的视图默认将以竖屏方向显示，并且如果你改变设备方向，它们不会旋转。\n\n为了解决这个问题，我们需要在 `UIWindow` 和 cocos2d 视图之间引入另一个视图。一个简单的\
    \ `UIView` 就能胜任，它的唯一目的是充当一个虚拟视图，通过 `RootViewController` 类处理自动旋转，并包含所有子视图，包括 cocos2d\
    \ 视图和任何 UIKit 视图：\n\n```\n// 向视图控制器添加一个虚拟 UIView\nUIView* dummyView = [[UIView\
    \ alloc] initWithFrame:[window bounds]];\n[viewController setView:dummyView];\n\
    [dummyView addSubview:glView];\n[dummyView release];\n\n// 将视图控制器的视图设为主窗口的子视图\n\
    [window addSubview:viewController.view];\n\n[window makeKeyAndVisible];\n```\n\
    \n我认为用一张图最能说明这种改变如何影响视图层级。查看图 15-3 中的前后对比图，并注意之前你一直是将 UIKit 视图作为 cocos2d 视图的子视图添加的。现在引入虚拟视图后，所有视图都处于同一层级，这样你就可以在\
    \ cocos2d 视图的前面和后面放置 `UIView`。此外，这还让你能够在运行时改变视图的顺序。\n\n![images](img/1503.jpg)\n\
    \n**图 15-3.** *通过引入虚拟 UIView 对视图层级所做更改的图示*\n"
- fmt: "##### Moving the `UITextField`s to the Background\n\nAdding our `UITextField`\
    \ views to the dummy view is straightforward. For this example, I skip over the\
    \ `UITextField` initialization code in the `addSomeCocoaTouch` method because\
    \ it doesn’t change. The only change is in adding the `UITextField` views as subviews\
    \ of the `dummyView`:\n\n```\n-(void) addSomeCocoaTouch\n{\n    // get the cocos2d\
    \ view (it's the EAGLView class which inherits from UIView)\n    UIView* glView\
    \ = [CCDirector sharedDirector].openGLView;\n    // The dummy UIView is the superview\
    \ of the glView\n    UIView* dummyView = glView.superview;\n\n    // UITextField\
    \ initialization code omitted\n    …\n\n    // add the text fields to the dummy\
    \ view\n    [dummyView addSubview:textField];\n    [dummyView addSubview:textFieldSkinned];\n\
    \n    // UITextField release code omitted\n    …\n}\n```\n\nYou can simply access\
    \ the newly introduced dummy view because you’ve already added the cocos2d `glView`\
    \ to it, so that makes it the `glView.superview`. The *superview* is the Cocoa\
    \ term for what you would call the parent node in the cocos2d node hierarchy.\
    \ You can then add the text fields to the `dummyView` instead of the `glView`.\n\
    \nHowever, you won’t notice a difference if you run the project now. Since you’ve\
    \ added the text fields after the cocos2d view, they’re automatically rendered\
    \ after the cocos2d view by default. This is the same behavior as in the cocos2d\
    \ node hierarchy. To actually move the text fields to the back, we can either\
    \ send the `sendSubviewToBack` message to all of them or, more easily, send the\
    \ `bringSubviewToFront` message to the `glView`, like so:\n\n```\n// send the\
    \ cocos2d view to the front so it is in front of the other views\n[dummyView bringSubviewToFront:glView];\n\
    ```\n\nNote that the `sendSubviewToBack` and `bringSubviewToFront` messages are\
    \ sent to the view that contains the view that should be sent to the back or front.\
    \ In this case, that’s the `dummyView`. If you run the project now, you will see\
    \ a difference. But you won’t be seeing the text fields anymore. What’s the problem?\n\
    \n##### Making the cocos2d View Transparent\n\nBy default, the cocos2d view is\
    \ completely opaque. Anything behind the `glView` will be obstructed because the\
    \ cocos2d `EAGLView` is filled each frame with an opaque clear color. It also\
    \ has its `opaque` property set to `YES`. This is easily remedied by adding the\
    \ following lines to the `addSomeCocoaTouch` method:\n\n```\n// make the cocos2d\
    \ view transparent\nglClearColor(0.0, 0.0, 0.0, 0.0);\nglView.opaque = NO;\n```\n\
    \nThe `opaque` flag is set to `NO`, and the `glClearColor` is all zero. The latter\
    \ is not strictly necessary; it is sufficient to reduce the alpha channel (fourth\
    \ parameter) so that the clear color is at least somewhat transparent. But for\
    \ this example and in most cases, you don’t want the background to be tinted or\
    \ just partially opaque. You may also wonder why setting the view’s `opaque` property\
    \ to `NO` isn’t enough to make the view transparent. The answer is simple: OpenGL\
    \ ES doesn’t respect that property and draws its clear color anyway.\n\nThis is\
    \ only one half of the story. What’s easy to forget and something you just have\
    \ to know is that cocos2d’s `EAGLView` has to be set up with a `pixelFormat` that\
    \ actually has an alpha channel. Without the alpha channel, you can’t make the\
    \ cocos2d view transparent.\n\nBy default, cocos2d initialized the `EAGLView`\
    \ with the `kEAGLColorFormatRGB565` pixel format. This pixel format uses 16 bits\
    \ per pixel and has no alpha channel. The only other `pixelFormat` currently supported\
    \ is `kEAGLColorFormatRGBA8`, which has 8 bits per color channel plus an 8-bit\
    \ alpha channel, which results in 32 bits per pixel. Obviously, this has an impact\
    \ on performance and memory usage because the framebuffer memory usage doubles.\
    \ That’s the reason why the `kEAGLColorFormatRGB565` pixel format is the default,\
    \ but there’s really no other choice than to use `kEAGLColorFormatRGBA8` if you\
    \ want to make the cocos2d view transparent.\n\nOpen the `AppDelegate.m` file,\
    \ and in the `applicationDidFinishLaunching` method look for the line that initialized\
    \ the `EAGLView`. Then change that to use the `kEAGLColorFormatRGBA8` pixel format:\n\
    \n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n          \
    \                     pixelFormat:kEAGLColorFormatRGBA8\n                    \
    \           depthFormat:0];\n```\n\nNow you can run the app again, and you’ll\
    \ see the “Hello Cocos2D!” labels being drawn over the text fields. There’s only\
    \ one issue remaining: the text fields won’t respond to your touches!"
  raw: '##### Moving the UITextFields to the Background


    Adding our `UITextField` views to the dummy view is straightforward. For this
    example, I skip over the `UITextField` initialization code in the `addSomeCocoaTouch`
    method because it doesn’t change. The only change is in adding the `UITextField`
    views as subviews of the `dummyView`:


    `-(void) addSomeCocoaTouch`

    `{`

    `    // get the cocos2d view (it''s the EAGLView class which inherits from UIView)`

    `    UIView* glView = [CCDirector sharedDirector].openGLView;`

    `    // The dummy UIView is the superview of the glView`

    `    UIView* dummyView = glView.superview;`


    `    // UITextField initialization code omitted`

    `    …`


    `    // add the text fields to the dummy view`

    `    [dummyView addSubview:textField];`

    `    [dummyView addSubview:textFieldSkinned];`


    `    // UITextField release code omitted`

    `    …`

    `}`


    You can simply access the newly introduced dummy view because you’ve already added
    the cocos2d `glView` to it, so that makes it the `glView.superview`. The *superview*
    is the Cocoa term for what you would call the parent node in the cocos2d node
    hierarchy. You can then add the text fields to the `dummyView` instead of the
    `glView`.


    However, you won’t notice a difference if you run the project now. Since you’ve
    added the text fields after the cocos2d view, they’re automatically rendered after
    the cocos2d view by default. This is the same behavior as in the cocos2d node
    hierarchy. To actually move the text fields to the back, we can either send the
    `sendSubviewToBack` message to all of them or, more easily, send the `bringSubviewToFront`
    message to the `glView`, like so:


    `// send the cocos2d view to the front so it is in front of the other views`

    `[dummyView bringSubviewToFront:glView];`


    Note that the `sendSubviewToBack` and `bringSubviewToFront` messages are sent
    to the view that contains the view that should be sent to the back or front. In
    this case, that’s the `dummyView`. If you run the project now, you will see a
    difference. But you won’t be seeing the text fields anymore. What’s the problem?


    ##### Making the cocos2d View Transparent


    By default, the cocos2d view is completely opaque. Anything behind the `glView`
    will be obstructed because the cocos2d `EAGLView` is filled each frame with an
    opaque clear color. It also has its opaque property set to `YES`. This is easily
    remedied by adding the following lines to the `addSomeCocoaTouch` method:


    `// make the cocos2d view transparent`

    `glClearColor(0.0, 0.0, 0.0, 0.0);`

    `glView.opaque = NO;`


    The `opaque` flag is set to `NO`, and the `glClearColor` is all zero. The latter
    is not strictly necessary; it is sufficient to reduce the alpha channel (fourth
    parameter) so that the clear color is at least somewhat transparent. But for this
    example and in most cases, you don’t want the background to be tinted or just
    partially opaque. You may also wonder why setting the view’s `opaque` property
    to `NO` isn’t enough to make the view transparent. The answer is simple: OpenGL
    ES doesn’t respect that property and draws its clear color anyway.


    This is only one half of the story. What’s easy to forget and something you just
    have to know is that cocos2d’s `EAGLView` has to be set up with a `pixelFormat`
    that actually has an alpha channel. Without the alpha channel, you can’t make
    the cocos2d view transparent.


    By default, cocos2d initialized the `EAGLView` with the `kEAGLColorFormatRGB565`
    pixel format. This pixel format uses 16 bits per pixel and has no alpha channel.
    The only other `pixelFormat` currently supported is `kEAGLColorFormatRGBA8`, which
    has 8 bits per color channel plus an 8-bit alpha channel, which results in 32
    bits per pixel. Obviously, this has an impact on performance and memory usage
    because the framebuffer memory usage doubles. That’s the reason why the `kEAGLColorFormatRGB565`
    pixel format is the default, but there’s really no other choice than to use `kEAGLColorFormatRGBA8`
    if you want to make the cocos2d view transparent.


    Open the AppDelegate.m file, and in the `applicationDidFinishLaunching` method
    look for the line that initialized the `EAGLView`. Then change that to use the
    `kEAGLColorFormatRGBA8` pixel format:


    `EAGLView *glView = [EAGLView viewWithFrame:[window bounds]`

    `                               pixelFormat:`**`kEAGLColorFormatRGBA8`**

    `                               depthFormat:0];`


    Now you can run the app again, and you’ll see the “Hello Cocos2D!” labels being
    drawn over the text fields. There’s only one issue remaining: the text fields
    won’t respond to your touches!'
  trans: "\n##### 将 `UITextField` 移至背景\n\n将 `UITextField` 视图添加到虚拟视图中的操作很简单。在本例中，我跳过了\
    \ `addSomeCocoaTouch` 方法中初始化 `UITextField` 的代码，因为它没有变化。唯一的变化是将 `UITextField` 视图作为\
    \ `dummyView` 的子视图添加：\n\n```\n-(void) addSomeCocoaTouch\n{\n    // 获取 cocos2d\
    \ 视图（即继承自 UIView 的 EAGLView 类）\n    UIView* glView = [CCDirector sharedDirector].openGLView;\n\
    \    // 虚拟 UIView 是 glView 的父视图\n    UIView* dummyView = glView.superview;\n\n\
    \    // UITextField 初始化代码省略\n    …\n\n    // 将文本框添加到虚拟视图\n    [dummyView addSubview:textField];\n\
    \    [dummyView addSubview:textFieldSkinned];\n\n    // UITextField 释放代码省略\n \
    \   …\n}\n```\n\n你可以直接访问新引入的虚拟视图，因为你已经将 cocos2d 的 `glView` 添加到了其中，因此它成为了 `glView.superview`。*superview*\
    \ 是 Cocoa 术语，对应 cocos2d 节点层级中的父节点。然后，你可以将文本框添加到 `dummyView` 中，而不是 `glView`。\n\n\
    然而，如果你现在运行项目，不会看到任何区别。由于文本框是在 cocos2d 视图之后添加的，默认情况下它们会在 cocos2d 视图之后渲染。这与 cocos2d\
    \ 节点层级的行为相同。要实际将文本框移至背景，我们可以向所有文本框发送 `sendSubviewToBack` 消息，或者更简单地向 `glView` 发送\
    \ `bringSubviewToFront` 消息，如下所示：\n\n```\n// 将 cocos2d 视图发送到前面，使其位于其他视图之前\n[dummyView\
    \ bringSubviewToFront:glView];\n```\n\n注意，`sendSubviewToBack` 和 `bringSubviewToFront`\
    \ 消息是发送给包含待调整顺序视图的父视图。在本例中，这个父视图是 `dummyView`。现在运行项目，你会看到变化，但可能再也看不到文本框了。问题出在哪里？\n\
    \n##### 使 cocos2d 视图透明\n\n默认情况下，cocos2d 视图是完全不透明的。`glView` 背后的任何内容都会被遮挡，因为 cocos2d\
    \ 的 `EAGLView` 每帧都会用不透明的清除颜色填充。此外，它的 `opaque` 属性也被设为 `YES`。这个问题很容易解决，只需在 `addSomeCocoaTouch`\
    \ 方法中添加以下代码行：\n\n```\n// 使 cocos2d 视图透明\nglClearColor(0.0, 0.0, 0.0, 0.0);\nglView.opaque\
    \ = NO;\n```\n\n将 `opaque` 标志设为 `NO`，并将 `glClearColor` 全部设为零。后者并非严格必要，只需降低 Alpha\
    \ 通道（第四个参数）的值，使清除颜色至少部分透明即可。但就本例而言，在大多数情况下，你也不希望背景带有色调或只是部分不透明。你可能还会好奇，为什么将视图的\
    \ `opaque` 属性设为 `NO` 还不足以使其透明。答案很简单：OpenGL ES 不遵守该属性，仍然会绘制自己的清除颜色。\n\n这只是问题的一半。容易忽略且你必须知道的一点是：cocos2d\
    \ 的 `EAGLView` 必须使用实际包含 Alpha 通道的 `pixelFormat` 进行初始化。没有 Alpha 通道，就无法使 cocos2d\
    \ 视图透明。\n\n默认情况下，cocos2d 使用 `kEAGLColorFormatRGB565` 像素格式初始化 `EAGLView`。这种像素格式每个像素占\
    \ 16 位，且没有 Alpha 通道。目前支持的另一种 `pixelFormat` 是 `kEAGLColorFormatRGBA8`，每个颜色通道占 8\
    \ 位，外加一个 8 位的 Alpha 通道，合计每个像素占 32 位。显然，这会对性能和内存使用产生影响，因为帧缓冲区的内存使用量翻倍。这就是默认使用 `kEAGLColorFormatRGB565`\
    \ 像素格式的原因，但如果想让 cocos2d 视图透明，除了使用 `kEAGLColorFormatRGBA8` 之外别无选择。\n\n打开 `AppDelegate.m`\
    \ 文件，在 `applicationDidFinishLaunching` 方法中找到初始化 `EAGLView` 的那行代码，然后将其修改为使用 `kEAGLColorFormatRGBA8`\
    \ 像素格式：\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n \
    \                              pixelFormat:kEAGLColorFormatRGBA8\n           \
    \                    depthFormat:0];\n```\n\n现在重新运行应用，你会看到“Hello Cocos2D!”标签绘制在文本框之上。但还剩一个问题：文本框将不再响应你的触摸操作！\n"
- fmt: '##### Properly Propagating Touch Events via Hit Tests


    The easiest way to have the views behind the cocos2d view respond to touch events
    is to completely disable touch input on the cocos2d view. You won’t be receiving
    any messages from the `CCTouchDispatcher` anymore if you add this line:


    ```

    // This will disable all touch events on the cocos2d view

    glView.userInteractionEnabled = NO;

    ```


    Now the text fields behind the cocos2d view act normally, but touch input for
    the cocos2d view is disabled. UIKit views, which are in front of the cocos2d view,
    should also work normally and respond to touches, unless you’ve added them to
    the cocos2d `glView` directly instead of the dummy view.


    You may be wondering why disabling touch input on the cocos2d view is the best,
    or at least the easiest, option. For that, you have to understand that the cocos2d
    view is a `UIView` that spans the entire screen area. Although you can see through
    it now that you’ve set it up to be transparent, it still responds positively to
    the `UIView` `hitTest` event. After all, any touch is somewhere on the screen,
    and since the cocos2d view is as big as the screen and doesn’t take into account
    what’s actually displayed inside its view, it responds positively to the hit test.
    So, any touch that reaches the cocos2d view will be processed by it or, respectively,
    the `CCTouchDispatcher` class. Anything underneath the cocos2d view is cut off
    from receiving touch events.


    Unfortunately, cocos2d does not have a built-in system to forward the `hitTest`
    event to its nodes in order for them to decide whether they actually need to respond
    to the touch. I’ll present you with a solution that uses the node’s bounding boxes
    but requires some changes to the cocos2d code.


    **CAUTION:** Only add the following hit test code to the `EAGLView` class if you
    absolutely need it in your project. It will have a negative effect on performance
    whenever a touch event is fired, which is basically the whole time the user has
    at least one finger on the touchscreen. The more nodes there are in your scene,
    the larger the performance penalty will be.


    Your first order of business, if you want to perform custom hit tests, is to make
    sure that `userInteractionEnabled` is set to `YES`. Please do that right away;
    otherwise, you might forget about the `userInteractionEnabled` property and instead
    start looking for a bug in the hit detection code.


    Now open the `EAGLView.m` file, which you can find in the `/libs/cocos2d/Platforms/iOS`
    group in the Xcode project. Add the following `#import` statements at the beginning
    of the file, because the `EAGLView` class needs to know about these cocos2d classes:


    ```

    #import "CCArray.h"

    #import "CCScene.h"

    #import "CCLayer.h"

    ```


    Now somewhere in the implementation section of the `EAGLView` class, override
    the `hitTest` method shown in [Listing 15–4](#Chapter15.html#list_15_4). This
    method is part of the `UIView` class and gets called when the UIKit framework
    is trying to determine which view needs to respond to a touch event. The method
    either returns a `UIView` instance, which should receive the touch input, or returns
    `nil` to signal that the hit test was unsuccessful, in which case the UIKit framework
    keeps looking for other views that might want to process the touch event.


    **Listing 15–4.** *Preparing to Hit Test All cocos2d Scene Children*


    ```

    -(UIView*) hitTest:(CGPoint)point withEvent:(UIEvent*)event

    {

        UIView* hitView = [super hitTest:point withEvent:event];


        if (hitView == self)

        {

            CCScene* runningScene = [CCDirector sharedDirector].runningScene;

            CCArray* sceneChildren = [runningScene children];

            CGPoint glPoint = [[CCDirector sharedDirector] convertToGL:point];


            bool hit = [self hitTestNodeChildren:sceneChildren point:glPoint];

            return (hit ? self : nil);

        }


        return hitView;

    }

    ```


    In this case, we first call the super implementation to receive the view the `hitTest`
    would normally return. In almost all cases, this will be the `EAGLView` itself,
    but since you can add subviews to the `EAGLView`, it might return a subview, and
    in this case you want to allow the subview to handle the touch.


    Otherwise, the `runningScene` is obtained from the `CCDirector`, which gives you
    access to the cocos2d node hierarchy via the `children` array. Since the `hitTest`
    point is in Cocoa Touch coordinates, you also have to convert it to GL coordinates
    before passing both the `sceneChildren` and the `glPoint` to the `hitTestNodeChildren`
    method. If that method returns a hit, the `hitTest` responds by returning `self`.
    Otherwise, it lets the `hitTest` fail by returning `nil`, allowing all views behind
    the cocos2d view to take their turn and proceed with the hit testing.


    The `hitTestNodeChildren` method in [Listing 15–5](#Chapter15.html#list_15_5)
    is more complicated and harder to understand because it uses recursion to traverse
    the cocos2d node hierarchy. In other words, the function can call itself to go
    even deeper into the cocos2d node hierarchy. Add the `hitTestNodeChildren` method
    just above the `hitTest` method.


    **Listing 15–5.** *Recursively Testing All Nodes to Test If Their boundingBox
    Contains a Given Point*


    ```

    -(BOOL) hitTestNodeChildren:(CCArray*)children point:(CGPoint)point

    {

        bool hit = NO;


        if ([children count] > 0)

        {

            Class sceneClass = [CCScene class];

            Class layerClass = [CCLayer class];

            CCNode* node = nil;

            CCARRAY_FOREACH(children, node)

            {

                // check the node''s children first

                hit = [self hitTestNodeChildren:[node children] point:point];


                // abort search on first hit

                if (hit)

                {

                    break;

                }


                // scenes/layers are always full screen, so do not hitTest them

                if ([node isKindOfClass:sceneClass] || [node isKindOfClass:layerClass])

                {

                    continue;

                }

                // check the node itself

                hit = CGRectContainsPoint([node boundingBox], point);


                // abort search on first hit

                if (hit)

                {

                    break;

                }

            }

        }


        return hit;

    }

    ```


    The first half of the `CCARRAY_FOREACH` loop simply traverses deeper into the
    cocos2d node hierarchy by calling the function recursively with the current node’s
    children. If any of the recursive calls have found a hit, the loop is aborted
    right there.


    In the second half, the actual node being iterated is checked. This performs the
    actual hit test by first making sure we’re not testing a `CCScene` or `CCLayer`
    class node. The reason for this is that they both have their `boundingBox` set
    to the entire screen area. If you would test any of these classes, you would always
    “hit” them, and that is exactly what you’re trying to avoid.


    Now that we’re sure the test is on a node with a reasonable bounding box, the
    actual check is as simple as testing for whether the point is inside the `boundingBox`:


    ```

    hit = CGRectContainsPoint([node boundingBox], point);

    ```


    Again, if there was a hit, the loop aborts, and the method returns. This is an
    optimization because we only ever need to find any node that responds positively
    to the hit test.'
