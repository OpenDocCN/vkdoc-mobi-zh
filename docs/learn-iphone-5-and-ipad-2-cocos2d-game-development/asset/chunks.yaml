    `-(void) dismissModalViewController`

    `{`

    `    UIViewController* rootVC = [self getRootViewController];`

    `    [rootVC dismissModalViewControllerAnimated:YES];`

    `}`


    The `rootViewController` is a `UIWindow` property, and the main window used by
    cocos2d is the `keyWindow` property of the `UIApplication` class. There''s only
    one catch: the current cocos2d project templates do not assign the new root view
    controller to the `UIWindow`''s property, so normally it''s unavailable unless
    you expose it in the `AppDelegate` class itself. But there''s a better way to
    make the `rootViewController` accessible to all classes without requiring to import
    the `AppDelegate` class. You''ll have to open the project''s `AppDelegate` class
    and add the following line in the `applicationDidFinishLaunching` method, just
    above the call to `[window makeKeyAndVisible]`:


    **`window.rootViewController = viewController;`**

    `[window makeKeyAndVisible];`


    After you''ve done this, the cocos2d `rootViewController` is accessible from anywhere
    through the `keyWindow.rootViewController` property.


