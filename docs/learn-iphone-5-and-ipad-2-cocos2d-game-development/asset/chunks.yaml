- fmt: '# Scrolling with Joy


    Continuing with the beginnings of the game from the previous chapter, I now want
    to turn it into something resembling an actual shoot-’em-up game. The very first
    thing will be to make the player’s ship controllable. Acceleromater controls don’t
    make sense in this case; a virtual joypad would be much more appropriate. But
    instead of reinventing the wheel, we’ll be using a cool source code package called
    `SneakyInput` to add a virtual joypad to this `cocos2d` game.


    Moving the player’s ship around is just one thing. We also want the background
    to scroll, to give the impression of moving into a certain direction. For this
    to happen, we’ll implement our own solution for parallax scrolling, since `CCParallaxNode`
    is too limited in that it does not allow an infinitely scrolling parallax background.


    In addition, I’ll illustrate what you’ve learned about texture atlases and sprite
    batching in the previous chapter. There will be one texture atlas containing all
    of the game’s graphics since there’s no need to group the images separately when
    using a texture atlas.


    ## Advanced Parallax Scrolling


    I mentioned before that `CCParallaxNode` is limited in that it doesn’t allow infinite
    scrolling. For this shooting game, we’ll add a `ParallaxBackground` node, which
    will do just that. Moreover, it will use a `CCSpriteBatchNode` to speed up the
    rendering of the background images.


    ### Creating the Background As Stripes


    First, I would like to illustrate how I created the background stripes that will
    create the parallaxing effect. This is crucial to understanding how the texture
    atlas created by `TexturePacker` can help you save memory and performance, but
    also save time positioning the individual stripes. Take a look at [Figure 7–1](#Chapter07.html#fig_7_1);
    it shows the background layer as a Seashore image composed of individual parallax
    layers. This image is also in the Assets folder of the `ScrollingWithJoy01` project,
    as `background-parallax.xcf`.


    ![images](images/0701.jpg)


    **Figure 7–1.** *The source image for the parallax scrolling background*


    Each of these stripes is on its own layer in the image-editing program Seashore.
    In [Figure 7–2](#Chapter07.html#fig_7_2) you can see the various layers, and if
    you look in the Assets folder, you’ll notice that there are images named `bg0.png`
    through `bg6.png`, which correspond to the seven individual stripes that make
    up the background.


    There are several reasons for creating the parallax background image in this way.
    You can create the image as a whole, but you’re able to save each layer to an
    individual file. All of these files will be 960×640 pixels in size, which may
    seem wasteful at first. But you’re not adding the individual images to the game;
    instead, you’ll be adding them to a texture atlas. Since `TexturePacker` removes
    the surrounding transparent space of each image, it will shrink the individual
    stripes down to a bare minimum. You can see this in [Figure 7–3](#Chapter07.html#fig_7_3).


    ![images](images/0702.jpg)


    **Figure 7–2.** *Each stripe of the background is on its own layer. This helps
    in creating the individual images and positioning them in the game.*


    ![images](images/0703.jpg)


    **Figure 7–3.** *The background stripes as they would appear in a texture atlas*


    Splitting the stripes into individual images is not only going to be helpful for
    drawing the images at the correct z-order. Strictly speaking, the images `bg5.png`
    and `bg6.png` can be at the same z-order since they do not overlap, yet I chose
    to save them into separate files. In [Figure 7–3](#Chapter07.html#fig_7_3) you
    can see these two files as the two topmost stripes. You’ll notice how little space
    they actually use up in the texture atlas, and that’s because `TexturePacker`
    was able to remove most of the surrounding transparent parts of these images.


    Now suppose I left both these stripes in the same 960×640 image—one would be at
    the top and the other at the bottom of the image, with a big gaping hole of transparency
    in between them. `TexturePacker` is not able to remove the transparent part between
    these two sprites, so they would have remained as a 960×640 image in the texture
    atlas, which is a lot more space than they take up as individual images.


    Splitting the stripes into individual images also helps maintain a high framerate.
    The iOS devices are very limited in *fill rate* (that is, the number of pixels
    they can draw every frame). Since images can overlap each other, and they frequently
    do, the iOS device will often have to draw the same pixel several times in every
    frame. The extreme scenario would be a full-screen image that is on top of another
    full-screen image. You can see only one of the two images, but the device actually
    has to draw both. The technical term for that is *overdraw*. Separating the background
    into individual stripes with as little overlap as possible reduces the number
    of pixels drawn.


    **TIP:** By using 16-bit textures (`RGB565`, `RGBA5551`, and `RGBA4444`) or even
    PVR compressed textures, you can improve the rendering performance of your game.
    Of course, you lose some image quality, but in many cases it is hardly noticeable
    on the iPhone screen, even if you do see some artifacts on your computer’s screen.
    `TexturePacker` enables you to reduce the color depth of your images while retaining
    most of the image quality through dithering techniques. And if you experience
    long load times, saving images in the compressed `pvr.czz` format is worth a try
    because this particular image file format loads noticeably faster than other image
    file formats.'
