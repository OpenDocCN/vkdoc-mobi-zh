    \ 为其实例变量 `body` 提供了一个属性，以便于访问。初始化方法 `initWithShape` 通过提供的形状名称来同时初始化物体和精灵。该方法假设图片名称与形状名称完全相同。\n\
    \n**注意：** 默认情况下，TexturePacker 会保留图片的文件扩展名，因此你的形状可能名为 \"plunger\"，但精灵帧名可能为 \"plunger.png\"\
    。要解决此问题，你需要在 TexturePacker 的 `Output` 面板中勾选 `Trim sprite names` 复选框。本章使用的 `pinball.tps`\
    \ 文件已设置此复选框；它会移除精灵帧名中的 `.png` 扩展名。这样，TexturePacker 的精灵帧名与 PhysicsEditor 的形状名称就会保持一致。\n\
    \n对于纹理图集，你使用 TexturePacker 并将弹球文件夹作为智能文件夹引用添加，这意味着 TexturePacker 会保持纹理图集内容与弹球文件夹中图片的所有更改同步。有关如何设置智能文件夹引用的说明，请参见第\
    \ 6 章。\n\n你还需要设置一个我们之前未使用过的额外选项：修剪精灵名称。此功能会移除精灵名称中的 `.png` 后缀。其好处是我们可以对物理形状和精灵使用相同的名称。唯一的注意事项是你必须在引用精灵帧名称时去掉\
    \ `.png` 扩展名，这确实有时会因习惯而忘记。\n\n代码清单 13–2 展示了 `BodyNode` 类的实现文件。\n\n**代码清单 13–2.**\
    \ *BodyNode 类实现*\n\n```\n#import \"BodyNode.h\"\n\n@implementation BodyNode\n\n\
    @synthesize body;\n\n-(id) initWithShape:(NSString*)shapeName inWord:(b2World*)world\n\
    {\n    NSAssert(world != NULL, @\"world is null!\");\n    NSAssert(shapeName !=\
    \ nil, @\"name is nil!\");\n\n    // 使用给定的形状名称初始化精灵本身\n    self = [super initWithSpriteFrameName:shapeName];\n\
