    Most of these settings should be self-explanatory and might seem familiar to you.
    The settings are documented in the `KKStart-upConfig` class in the Kobold2D API
    Reference and here: [`www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference`](http://www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference).


    For example, the `FirstSceneClassName` setting allows you to specify the name
    of a class inheriting from `CCScene` or `CCLayer` (automatically wrapped inside
    a `CCScene`), which will be the first scene run by the `CCDirector`. You can enable
    iAd ad banners, change the way your app is autorotated, or provide the default
    window position and size for Mac builds.


    The big advantage of using a Lua-based configuration file is that the entire start-up
    code is part of the Kobold2D code and can be updated in new versions if it needs
    to be. As Kobold2D matures, more settings will be added to the start-up config
    depending on what developers need to change or include most in their apps. In
    addition, you can create and use custom config.lua settings. The Hello World project
    provides an example of loading custom settings. I’ll get to that in the next section.


    **TIP:** You can learn more about Lua from the free Programming in Lua book, which
    is available online on the official Lua home page at [`www.lua.org/pil`](http://www.lua.org/pil).
    The book is for an older version of Lua but still largely relevant. You might
    also want to browse the Lua reference manual at [`www.lua.org/manual`](http://www.lua.org/manual)
    to get a quick overview of the language. Lua has grown to be the number-one scripting
    language for game developers over the past ten years. It has a very small memory
    footprint and speed-wise often comes close to within 80 to 90 percent of the performance
    achievable with C programming.


    #### The Hello Kobold2D Scene and Layer


    Let’s move on to the actual scene class `HelloWorldLayer`, which is set as the
    first scene via the config.lua setting `FirstSceneClassName = "HelloWorldLayer"`.
    You’ll notice that this first scene is actually derived from `CCLayer`. Kobold2D
    realizes that and automatically wraps the `HelloWorldLayer` class into a `CCScene`
    instance behind the scenes.


    **TIP:** To avoid writing the repetitive `+(id) scene` method in each `CCLayer`
    class, you can simply call the `+(id) nodeWithScene` method in Kobold2D:


    `[[CCDirectorsharedDirector] replaceScene:[MyGameLayernodeWithScene]];`


    The `HelloWorldLayer` interface declaration is pretty unspectacular and provides
    only three instance variables that will later be loaded from the config.lua file:


    `#import "cocos2d.h"`


    `@interface HelloWorldLayer : CCLayer`

    `{`

    `    NSString* helloWorldString;`

    `    NSString* helloWorldFontName;`

    `    int helloWorldFontSize;`

    `}`


    `@property (nonatomic, copy) NSString* helloWorldString;`

    `@property (nonatomic, copy) NSString* helloWorldFontName;`

    `@property (nonatomic) int helloWorldFontSize;`


    `@end`


    At this point, you should take note of a particular addition to the config.lua
    file. There’s an additional Lua table labeled `HelloWorldSettings` in [Listing
    16–2](#Chapter16.html#list_16_2), which provides three familiar-looking settings:
    `HelloWorldString`, `HelloWorldFontName`, and `HelloWorldFontSize`.


    **Listing 16–2.** *Custom config.lua Settings*


    `local config =`

    `{`

    `    KKStartupConfig =`

    `    {`

    `        -- start-up settings removed for brevity`

    `    },`


    **`    HelloWorldSettings =`**

    **`    {`**

    **`        HelloWorldString = "Hello Kobold2D!",`**

    **`        HelloWorldFontName = "Marker Felt",`**

    **`        HelloWorldFontSize = 50,`**

    **`    },`**

    `}`


    With the exception of the uppercase first letter, these settings match the properties
    of the `HelloWorldLayer` class in name and data type. I’m sure you can see the
    connection here. Indeed, the `KKConfig` class method `injectPropertiesFromKeyPath,
    shown in` [`Listing 16–3`](#Chapter16.html#list_16_3)`,` loads the values from
    the `HelloWorldSettings` subtable and injects them into the correspondingly named
    properties of the target class, in this case `self`.


    **Listing 16–3.** *Injecting (Assigning) the Custom Settings to Class Properties*


    `[KKConfig injectPropertiesFromKeyPath:@"HelloWorldSettings" target:self];`


    By *inject* I mean if there is a Lua table named `HelloWorldSettings`, then each
    setting it contains will be assigned to a correspondingly named property of the
    target class, in this case `self`. For example, the setting `HelloWorldString`
    will be assigned to the class property `helloWorldString` if it has the correct
    data type (`NSString*`) and isn’t set to be a `readonly` property.


    **TIP:** By using `KKConfig`, you can easily make your app data-driven, which
    for example allows designers and artists to tweak your app’s behavior without
    having to modify source code. Data-driven development also comes to shine when
    you have a variety of game objects with the same or similar settings. You don’t
    want these settings spread throughout your code, you will want to centralize them
    in a single file that provides the necessary overview.


    After injection, the three properties will contain the same values as the `HelloWorldSettings`
    Lua table. They are ready to be used by the label:


    `CCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString`

    `                                       fontName:helloWorldFontName`

    `                                       fontSize:helloWorldFontSize];`


    [Listing 16–4](#Chapter16.html#list_16_4) shows the `HelloWorldLayer` implementation
    in its entirety. Apart from the previous call to `KKConfig` and the use of the
    `CCDirector` extensions and platform macros discussed earlier, it’s still 100
    percent cocos2d code.


    **Listing 16–4.** *Hello Kobold2D Implementation File*


