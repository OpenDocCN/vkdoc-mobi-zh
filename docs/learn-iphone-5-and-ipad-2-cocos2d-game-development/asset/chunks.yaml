- fmt: "# Designing the User Interface of the Hybrid App\n\nSelect the `ViewBasedAppWithCocos2DViewController.xib`\
    \ file in the Project Navigator to see the Interface Builder view. Using the Object\
    \ Library (**View > Utilities > Object Library**), drag and drop the following\
    \ objects onto the view. You can arrange these objects in the design area in any\
    \ way you like:\n\n- `View`\n- `Switch`\n- `Segmented Control`\n\nNow select the\
    \ newly added `View` object and switch to the Identity Inspector (**View > Utilities\
    \ > Identity Inspector**). You’ll notice that the first item shows the view is\
    \ derived from the `UIView` class. Since this should become the cocos2d `EAGLView`,\
    \ use the drop-down button to select a custom class from the list. One of the\
    \ first items should be the `EAGLView` class. If not, scroll the list until you\
    \ find the `EAGLView` or simply type in the name of the class. The resulting user\
    \ interface mockup should look something like [Figure 15–12](#Chapter15.html#fig_15_12).\n\
    \n![images](images/1512.jpg)\n\n**Figure 15–12.** *The Interface Builder view\
    \ of the hybrid app’s user interface*\n\nInterface Builder will automatically\
    \ instantiate the `EAGLView` for you. You only need to attach the `CCDirector`\
    \ with this particular view. The On/Off Switch should serve as the toggle button\
    \ that turns the cocos2d view on and off.\n\nFirst, some preparations. Select\
    \ the `EAGLView` view and switch to the Attributes Inspector (**View > Utilities\
    \ > Attributes Inspector**). Check the `Hidden` check box so that the view is\
    \ initially hidden. With the Attributes Inspector still open, select the On/Off\
    \ Switch and change its initial `State` to `Off`. You’ll hide and unhide the `EAGLView`\
    \ programmatically.\n\n**NOTE:** The cocos2d `CCDirector` class can manage only\
    \ one `EAGLView` at a time, mainly because the `CCDirector` class is a singleton.\
    \ An app using multiple cocos2d views at the same time is not possible without\
    \ significant changes to cocos2d. It was simply never designed to work with multiple\
    \ views at the same time.\n\nNow we need to make the connection from the buttons\
    \ on the view to the `ViewBasedAppWithCocos2DViewController` class. The easiest\
    \ way to do so is to open an Assistant Editor in Xcode 4 via **View > Editor >\
    \ Assistant**. You can customize the layout of the Assistant Editor with one of\
    \ the selections available under **View > Assistant Layout**. The Assistant Editor\
    \ will automatically display the `ViewBasedWithCocos2DViewController.h` file.\n\
    \nIn the Interface Builder view, select the On/Off Switch and right-click it.\
    \ It doesn’t matter if you select it from the list or by clicking its view. The\
    \ context menu that opens shows a list of events that the control sends. Click\
    \ the circle next to the `Value Changed` event and drag it over to the Assistant\
    \ Editor. You’ll notice that it will highlight a line with the label `Insert Action`\
    \ if you drag it somewhere below the class `@interface` brackets and above the\
    \ `@end` statement. That’s where you should drop the arrow to make the connection.\
    \ A pop-up view will show up and ask you for the name of the event. I decided\
    \ to call mine `switchChanged`. You can leave all the other settings at their\
    \ default values and then make the connection by clicking the `Connect` button\
    \ in the pop-up view.\n\nInterface Builder has automatically created the necessary\
    \ code for you in order to receive the particular event that you just connected.\
    \ There’s new code both in the interface and implementation sections of the `ViewBasedAppWithCocos2DViewController`\
    \ class. Before you review the code changes, you should also connect the same\
    \ `Value Changed` event of the Segmented Control and name it `sceneChanged`.\n\
    \nThis concludes the user interface design part of this project. Now let’s move\
    \ on to hooking up cocos2d.\n\n# Start Your cocos2d Engine\n\nIf you followed\
    \ the user interface design part, you’ll find two empty methods called `switchChanged`\
    \ and `sceneChanged` in the `ViewBasedAppWithCocos2DViewController.m` class implementation\
    \ file, next to some other boilerplate code that was added by the View-based Application\
    \ template.\n\nThe first step is to get cocos2d up and running. One thing that’s\
    \ comfortable when working with cocos2d projects created from one of the cocos2d\
    \ templates is that you rarely need to add a header file to any of your classes.\
    \ This is because the `cocos2d.h` file is imported in the project’s prefix header.\
    \ Since this is not the case in the View-based Application template, open the\
    \ `ViewBasedAppWithCocos2D-Prefix.pch` file in the Supporting Files group and\
    \ add the cocos2d header:\n\n```\n#import <Availability.h>\n\n#ifndef __IPHONE_3_0\n\
    #warning \"This project uses features only available in iPhone SDK 3.0 and later.\"\
    \n#endif\n\n#ifdef __OBJC__\n    #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n\
    \    #import \"cocos2d.h\"\n#endif\n```\n\nNext you need to add a cocos2d scene\
    \ class to the project. Using the **File > Add Files to “ViewBasedAppWithCocos2D”…**\
    \ menu item, browse into the cocos2d project you created earlier and then locate\
    \ and select both the header and implementation files of the `HelloWorldLayer`\
    \ class. Make sure the **Copy items into destination group’s folder (if needed)**\
    \ check box is checked. Alternatively, you can also create a new cocos2d scene\
    \ class from a cocos2d file template or manually. I’ll be using the `HelloWorldLayer`\
    \ scene throughout this example.\n\nImport the `HelloWorldLayer` class in the\
    \ `ViewBasedAppWithCocos2DViewController.m` file so that we can run it as our\
    \ main cocos2d scene:\n\n```\n#import \"HelloWorldLayer.h\"\n```\n\nAll that is\
    \ left now is to actually start up cocos2d and connect it with the `EAGLView`.\
    \ The `switchChanged` method in [Listing 15–7](#Chapter15.html#list_15_7) contains\
    \ all the start-up code that is needed.\n\n**Listing 15–7.** *Setting Up the Director\
    \ and Displaying the First cocos2d Scene*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
    {\n    CCDirector* director = [CCDirector sharedDirector];\n\n    if ([CCDirector\
    \ setDirectorType:kCCDirectorTypeDisplayLink] == NO)\n    {\n        [CCDirector\
    \ setDirectorType:kCCDirectorTypeDefault];\n    }\n\n    [director setAnimationInterval:1.0/60];\n\
    \    //[director setDisplayFPS:YES];\n\n    NSArray* subviews = self.view.subviews;\n\
    \    for (int i = 0; i < [subviews count]; i++)\n    {\n        UIView* subview\
    \ = [subviews objectAtIndex:i];\n        if ([subview isKindOfClass:[EAGLView\
    \ class]])\n        {\n            subview.hidden = NO;\n            [director\
    \ setOpenGLView:(EAGLView*)subview];\n            [director runWithScene:[HelloWorldLayer\
    \ scene]];\n            break;\n        }\n    }\n}\n```\n\nThat’s surprisingly\
    \ little code to get cocos2d running. As usual, we pick the best possible director\
    \ type, we set the animation interval, and the rest is just connecting the director\
    \ with the `EAGLView`. The latter part simply goes over the list of subviews in\
    \ the view controller’s view to find one that is subclassed from `EAGLView`. Once\
    \ the right view is found, it’s made visible and assigned to the director via\
    \ `setOpenGLView`. Directly after that you can make the call `runWithScene`, and\
    \ that’s it.\n\nI also break out of the loop once a scene was run as a precaution\
    \ because if this loop would continue, it might find another `EAGLView`, and that\
    \ would result in a crash. In fact, you’ll notice if you run the app that you\
    \ can change the switch button’s state only once. The second time, the app crashes.\n\
    \nYou’ll notice that the `setDisplayFPS` command is commented out in this example.\
    \ To enable the fps display, you will also have to add the `fps_images.png` file\
    \ from any cocos2d project to your project via the **File > Add Files To …** command.\
    \ Otherwise, the framerate counter will not be displayed."
  raw: '#### Designing the User Interface of the Hybrid App


    Select the ViewBasedAppWithCocos2DViewController.xib file in the Project Navigator
    to see the Interface Builder view. Using the Object Library (**View ![image](images/U001.jpg)
    Utilities ![image](images/U001.jpg) Object Library**), drag and drop the following
    objects onto the view. You can arrange these objects in the design area in any
    way you like:


    *   View

    *   Switch

    *   Segmented Control


    Now select the newly added View object and switch to the Identity Inspector (**View
    ![image](images/U001.jpg) Utilities ![image](images/U001.jpg) Identity Inspector**).
    You’ll notice that the first item shows the view is derived from the `UIView`
    class. Since this should become the cocos2d `EAGLView`, use the drop-down button
    to select a custom class from the list. One of the first items should be the `EAGLView`
    class. If not, scroll the list until you find the `EAGLView` or simply type in
    the name of the class. The resulting user interface mockup should look something
    like [Figure 15–12](#Chapter15.html#fig_15_12).


    ![images](images/1512.jpg)


    **Figure 15–12.** *The Interface Builder view of the hybrid app’s user interface*


    Interface Builder will automatically instantiate the `EAGLView` for you. You only
    need to attach the CCDirector with this particular view. The On/Off Switch should
    serve as the toggle button that turns the cocos2d view on and off.


    First, some preparations. Select the `EAGLView` view and switch to the Attributes
    Inspector (**View ![image](images/U001.jpg) Utilities ![image](images/U001.jpg)
    Attributes Inspector**). Check the `Hidden` check box so that the view is initially
    hidden. With the Attributes Inspector still open, select the On/Off Switch and
    change its initial `State` to `Off`. You’ll hide and unhide the `EAGLView` programmatically.


    **NOTE:** The cocos2d `CCDirector` class can manage only one `EAGLView` at a time,
    mainly because the `CCDirector` class is a singleton. An app using multiple cocos2d
    views at the same time is not possible without significant changes to cocos2d.
    It was simply never designed to work with multiple views at the same time.


    Now we need to make the connection from the buttons on the view to the `ViewBasedAppWithCocos2DViewController`
    class. The easiest way to do so is to open an Assistant Editor in Xcode 4 via
    **View ![image](images/U001.jpg) Editor ![image](images/U001.jpg) Assistant**.
    You can customize the layout of the Assistant Editor with one of the selections
    available under **View ![image](images/U001.jpg) Assistant Layout**. The Assistant
    Editor will automatically display the ViewBasedWithCocos2DViewController.h file.


    In the Interface Builder view, select the On/Off Switch and right-click it. It
    doesn’t matter if you select it from the list or by clicking its view. The context
    menu that opens shows a list of events that the control sends. Click the circle
    next to the `Value Changed` event and drag it over to the Assistant Editor. You’ll
    notice that it will highlight a line with the label `Insert Action` if you drag
    it somewhere below the class `@interface` brackets and above the `@end` statement.
    That’s where you should drop the arrow to make the connection. A pop-up view will
    show up and ask you for the name of the event. I decided to call mine `switchChanged`.
    You can leave all the other settings at their default values and then make the
    connection by clicking the `Connect` button in the pop-up view.


    Interface Builder has automatically created the necessary code for you in order
    to receive the particular event that you just connected. There’s new code both
    in the interface and implementation sections of the `ViewBasedAppWithCocos2DViewController`
    class. Before you review the code changes, you should also connect the same `Value
    Changed` event of the Segmented Control and name it `sceneChanged`.


    This concludes the user interface design part of this project. Now let’s move
    on to hooking up cocos2d.


    #### Start Your cocos2d Engine


    If you followed the user interface design part, you’ll find two empty methods
    called `switchChanged` and `sceneChanged` in the ViewBasedAppWithCocos2DViewController.m
    class implementation file, next to some other boilerplate code that was added
    by the View-based Application template.


    The first step is to get cocos2d up and running. One thing that’s comfortable
    when working with cocos2d projects created from one of the cocos2d templates is
    that you rarely need to add a header file to any of your classes. This is because
    the cocos2d.h file is imported in the project’s prefix header. Since this is not
    the case in the View-based Application template, open the ViewBasedAppWithCocos2D-Prefix.pch
    file in the Supporting Files group and add the cocos2d header:


    `#import <Availability.h>`


    `#ifndef __IPHONE_3_0`

    `#warning "This project uses features only available in iPhone SDK 3.0 and later."`

    `#endif`


    `#ifdef __OBJC__`

    `    #import <UIKit/UIKit.h>`

    `    #import <Foundation/Foundation.h>`

    **`    #import "cocos2d.h"`**

    `#endif`


    Next you need to add a cocos2d scene class to the project. Using the **File ![image](images/U001.jpg)
    Add Files to “ViewBasedAppWithCocos2D”…** menu item, browse into the cocos2d project
    you created earlier and then locate and select both the header and implementation
    files of the `HelloWorldLayer` class. Make sure the **Copy items into destination
    group’s folder (if needed)** check box is checked. Alternatively, you can also
    create a new cocos2d scene class from a cocos2d file template or manually. I’ll
    be using the HelloWorldLayer scene throughout this example.


    Import the `HelloWorldLayer` class in the ViewBasedAppWithCocos2DViewController.m
    file so that we can run it as our main cocos2d scene:


    `#import "HelloWorldLayer.h"`


    All that is left now is to actually start up cocos2d and connect it with the `EAGLView`.
    The `switchChanged` method in [Listing 15–7](#Chapter15.html#list_15_7) contains
    all the start-up code that is needed.


    **Listing 15–7.** *Setting Up the Director and Displaying the First cocos2d Scene*


    `- (IBAction)switchChanged:(id)sender`

    `{`

    `    CCDirector* director = [CCDirector sharedDirector];`


    `    if ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink] == NO)`

    `    {`

    `        [CCDirector setDirectorType:kCCDirectorTypeDefault];`

    `    }`


    `    [director setAnimationInterval:1.0/60];`

    `    //[director setDisplayFPS:YES];`


    `    NSArray* subviews = self.view.subviews;`

    `    for (int i = 0; i < [subviews count]; i++)`

    `    {`

    `        UIView* subview = [subviews objectAtIndex:i];`

    `        if ([subview isKindOfClass:[EAGLView class]])`

    `        {`

    `            subview.hidden = NO;`

    `            [director setOpenGLView:(EAGLView*)subview];`

    `            [director runWithScene:[HelloWorldLayer scene]];`

    `            break;`

    `        }`

    `    }`

    `}`


    That’s surprisingly little code to get cocos2d running. As usual, we pick the
    best possible director type, we set the animation interval, and the rest is just
    connecting the director with the `EAGLView`. The latter part simply goes over
    the list of subviews in the view controller’s view to find one that is subclassed
    from `EAGLView`. Once the right view is found, it’s made visible and assigned
    to the director via `setOpenGLView`. Directly after that you can make the call
    `runWithScene`, and that’s it.


    I also break out of the loop once a scene was run as a precaution because if this
    loop would continue, it might find another `EAGLView`, and that would result in
    a crash. In fact, you’ll notice if you run the app that you can change the switch
    button’s state only once. The second time, the app crashes.


    You’ll notice that the `setDisplayFPS` command is commented out in this example.
    To enable the fps display, you will also have to add the fps_images.png file from
    any cocos2d project to your project via the **File ![image](images/U001.jpg) Add
    Files To …** command. Otherwise, the framerate counter will not be displayed.'
  trans: "\n# 设计混合应用的用户界面\n\n在项目导航器中选择 `ViewBasedAppWithCocos2DViewController.xib`\
    \ 文件，即可看到 Interface Builder 视图。使用对象库（**视图 > 工具 > 对象库**），将以下对象拖放到视图上。你可以按照自己的喜好将这些对象安排在设计区域的任意位置：\n\
    \n- `View`\n- `Switch`\n- `Segmented Control`\n\n现在选择新添加的 `View` 对象，并切换到标识检查器（**视图\
    \ > 工具 > 标识检查器**）。你会注意到第一个项目显示该视图派生自 `UIView` 类。由于该视图应成为 cocos2d 的 `EAGLView`，请使用下拉按钮从列表中选择一个自定义类。列表中的前几个选项之一应该是\
    \ `EAGLView` 类。如果没有，请滚动列表直到找到 `EAGLView`，或者直接输入类名。最终的用户界面模型应类似于图 15–12。\n\n![images](img/1512.jpg)\n\
    \n**图 15–12.** *混合应用用户界面的 Interface Builder 视图*\n\nInterface Builder 会自动为你实例化\
    \ `EAGLView`。你只需将 `CCDirector` 与该特定视图关联起来。On/Off Switch 将作为切换按钮，用于打开或关闭 cocos2d\
    \ 视图。\n\n首先，进行一些准备工作。选择 `EAGLView` 视图，并切换到属性检查器（**视图 > 工具 > 属性检查器**）。勾选 `Hidden`\
    \ 复选框，使该视图初始状态为隐藏。保持属性检查器打开状态，选择 On/Off Switch，并将其初始 `State` 改为 `Off`。你将通过编程方式隐藏和显示\
    \ `EAGLView`。\n\n**注意：** cocos2d 的 `CCDirector` 类一次只能管理一个 `EAGLView`，这主要是因为 `CCDirector`\
    \ 类是单例。如果不显著修改 cocos2d，应用程序无法同时使用多个 cocos2d 视图。它从一开始就没有设计成能同时处理多个视图。\n\n现在，我们需要将视图上的按钮与\
    \ `ViewBasedAppWithCocos2DViewController` 类建立连接。最简单的方法是通过 **视图 > 编辑器 > 助理编辑器**\
    \ 在 Xcode 4 中打开助理编辑器。你可以通过 **视图 > 助理布局** 下的选项来自定义助理编辑器的布局。助理编辑器会自动显示 `ViewBasedWithCocos2DViewController.h`\
    \ 文件。\n\n在 Interface Builder 视图中，选择 On/Off Switch 并右键点击它。无论你是从列表中选中它，还是点击其视图来选中，都没有区别。打开的上下文菜单显示该控件发送的事件列表。点击\
    \ `Value Changed` 事件旁边的圆圈，并将其拖到助理编辑器上。你会注意到，如果将箭头拖到类 `@interface` 括号下方、`@end`\
    \ 语句上方的某个位置，它会高亮显示一行带有 `Insert Action` 标签的文字。这就是你应该松开鼠标以建立连接的位置。此时会弹出一个视图，询问你事件的名称。我决定将其命名为\
    \ `switchChanged`。你可以将所有其他设置保留为默认值，然后点击弹出视图中的 `Connect` 按钮建立连接。\n\nInterface Builder\
    \ 已经自动为你创建了接收刚才连接的事件所需的代码。`ViewBasedAppWithCocos2DViewController` 类的接口部分和实现部分都新增了代码。在你查看代码更改之前，还应该连接\
    \ Segmented Control 的同一个 `Value Changed` 事件，并将其命名为 `sceneChanged`。\n\n至此，本项目的用户界面设计部分就结束了。现在，让我们继续连接\
    \ cocos2d。\n\n# 启动你的 cocos2d 引擎\n\n如果你按照用户界面设计部分的步骤操作，你会在 `ViewBasedAppWithCocos2DViewController.m`\
    \ 类实现文件中找到两个名为 `switchChanged` 和 `sceneChanged` 的空方法，旁边还有基于视图的应用程序模板添加的其他样板代码。\n\
    \n第一步是启动并运行 cocos2d。使用 cocos2d 模板创建的 cocos2d 项目有一个方便之处：你几乎不需要为任何类添加头文件。这是因为 `cocos2d.h`\
    \ 文件已导入到项目的前缀头文件中。但由于基于视图的应用程序模板并非如此，请打开 Supporting Files 组中的 `ViewBasedAppWithCocos2D-Prefix.pch`\
    \ 文件，并添加 cocos2d 头文件：\n\n```\n#import <Availability.h>\n\n#ifndef __IPHONE_3_0\n\
    #warning \"This project uses features only available in iPhone SDK 3.0 and later.\"\
    \n#endif\n\n#ifdef __OBJC__\n    #import <UIKit/UIKit.h>\n    #import <Foundation/Foundation.h>\n\
    \    #import \"cocos2d.h\"\n#endif\n```\n\n接下来，你需要向项目添加一个 cocos2d 场景类。使用 **文件\
    \ > 将文件添加到“ViewBasedAppWithCocos2D”…** 菜单项，浏览到你之前创建的 cocos2d 项目，然后定位并选择 `HelloWorldLayer`\
    \ 类的头文件和实现文件。确保 **将项目复制到目标组的文件夹中（如果需要）** 复选框已勾选。或者，你也可以从 cocos2d 文件模板或手动创建新的 cocos2d\
    \ 场景类。在本示例中，我将全程使用 `HelloWorldLayer` 场景。\n\n在 `ViewBasedAppWithCocos2DViewController.m`\
    \ 文件中导入 `HelloWorldLayer` 类，以便我们将其作为主要的 cocos2d 场景运行：\n\n```\n#import \"HelloWorldLayer.h\"\
    \n```\n\n剩下的就是实际启动 cocos2d 并将其与 `EAGLView` 连接起来。列表 15–7 中的 `switchChanged` 方法包含了所需的全部启动代码。\n\
    \n**列表 15–7.** *设置导演并显示第一个 cocos2d 场景*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
    {\n    CCDirector* director = [CCDirector sharedDirector];\n\n    if ([CCDirector\
    \ setDirectorType:kCCDirectorTypeDisplayLink] == NO)\n    {\n        [CCDirector\
    \ setDirectorType:kCCDirectorTypeDefault];\n    }\n\n    [director setAnimationInterval:1.0/60];\n\
    \    //[director setDisplayFPS:YES];\n\n    NSArray* subviews = self.view.subviews;\n\
    \    for (int i = 0; i < [subviews count]; i++)\n    {\n        UIView* subview\
    \ = [subviews objectAtIndex:i];\n        if ([subview isKindOfClass:[EAGLView\
    \ class]])\n        {\n            subview.hidden = NO;\n            [director\
    \ setOpenGLView:(EAGLView*)subview];\n            [director runWithScene:[HelloWorldLayer\
    \ scene]];\n            break;\n        }\n    }\n}\n```\n\n启动 cocos2d 的代码少得惊人。像往常一样，我们选择最佳导演类型，设置动画间隔，剩下的只是将导演与\
    \ `EAGLView` 连接。后一部分只是遍历视图控制器视图的子视图列表，找到从 `EAGLView` 继承的子类。一旦找到正确的视图，就将其设置为可见，并通过\
    \ `setOpenGLView` 将其分配给导演。之后，你就可以直接调用 `runWithScene`，一切就完成了。\n\n我还出于预防措施在场景运行后跳出循环，因为如果循环继续，可能会找到另一个\
    \ `EAGLView`，从而导致崩溃。实际上，如果你运行该应用，你会发现只能更改开关按钮的状态一次。第二次，应用就会崩溃。\n\n你会注意到，本例中的 `setDisplayFPS`\
    \ 命令已被注释掉。要启用帧率显示，你还需要通过 **文件 > 将文件添加到…** 命令，将任意 cocos2d 项目中的 `fps_images.png`\
    \ 文件添加到你的项目中。否则，帧率计数器将不会显示。\n"
- fmt: "# Stop the cocos2d Engine and Restart It\n\nYou can easily start, stop and\
    \ restart the cocos2d engine at any time. You just need to determine the current\
    \ state of the engine. It might never have been started before, it might be running,\
    \ or it might be stopped.\n\nThere’s no property in cocos2d’s `CCDirector` class,\
    \ but you can infer the status in other ways. I prepared this example project\
    \ so that this status can be detected, and depending on your project’s requirements,\
    \ you might have to use other mechanisms, such as keeping track of the cocos2d\
    \ running status through global variables.\n\nIf the director’s `openGLView` property\
    \ is `nil`, you know that it has never been started before. And in this particular\
    \ project, the fact that the `openGLView` is hidden tells me that cocos2d has\
    \ been suspended and could be restarted. In addition to that, the switch button’s\
    \ state is also taken into account. The code for the `switchChanged` method has\
    \ changed as follows and is shown in [Listing 15–8](#Chapter15.html#list_15_8).\n\
    \n**Listing 15–8.** *Starting, Suspending, and Stopping cocos2d*\n\n```\n- (IBAction)switchChanged:(id)sender\n\
    {\n    UISwitch* switchButton = (UISwitch*)sender;\n    CCDirector* director =\
    \ [CCDirector sharedDirector];\n\n    if (switchButton.on)\n    {\n        if\
    \ (director.openGLView == nil)\n        {\n            if ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink]\
    \ == NO)\n            {\n                [CCDirector setDirectorType:kCCDirectorTypeDefault];\n\
    \            }\n\n            [director setAnimationInterval:1.0/60];\n      \
    \      //[director setDisplayFPS:YES];\n\n            NSArray* subviews = self.view.subviews;\n\
    \            for (int i = 0; i < [subviews count]; i++)\n            {\n     \
    \          UIView* subview = [subviews objectAtIndex:i];\n               if ([subview\
    \ isKindOfClass:[EAGLView class]])\n               {\n                   [director\
    \ setOpenGLView:(EAGLView*)subview];\n                   [director runWithScene:[HelloWorldLayer\
    \ scene]];\n                   break;\n               }\n           }\n      \
    \ }\n       else\n       {\n          [director startAnimation];\n       }\n\n\
    \       director.openGLView.hidden = NO;\n    }\n    else\n    {\n       director.openGLView.hidden\
    \ = YES;\n       [director stopAnimation];\n    }\n}\n```\n\nNotice that the director\
    \ methods `startAnimation` and `stopAnimation` are used to restart and stop cocos2d.\
    \ Just for the very first time, you need to call `runWithScene`. But if you wanted\
    \ to run a different scene each time cocos2d is restarted, you should call `replaceScene`\
    \ directly after the call to `startAnimation`. The `runWithScene` method can be\
    \ called only once during the lifetime of the application and must not be used\
    \ again.\n\nTechnically, the `stopAnimation` method only stops cocos2d from refreshing\
    \ its view. Unless the view is `hidden` or obstructed by another view, the last\
    \ frame cocos2d has rendered will remain as a static image in the `EAGLView`.\
    \ That’s why hiding the `EAGLView` is a good idea. Calling `stopAnimation` is\
    \ sometimes necessary to ensure that certain UIKit views are responsive and animate\
    \ smoothly, in particular all views derived from `UIScrollView`. It is good practice\
    \ to call `stopAnimation` whenever you display an (almost) full-screen UIKit view,\
    \ to conserve performance for the foreground view as well as conserve battery\
    \ power. Once the foreground view is dismissed, you call `startAnimation` again,\
    \ and the cocos2d view and director continue where they were.\n\n**TIP:** If you\
    \ want to see how this app behaves with autorotation, you have to make a small\
    \ change to the `ViewBasedAppWithCocos2DViewController` class. Simply return `YES`\
    \ from the `shouldAutorotateToInterfaceOrientation` method to enable rotation\
    \ to all orientations. Although your app doesn’t support it well (it is not designed\
    \ for landscape orientation), it serves to show that the cocos2d view will be\
    \ correctly autorotated even without its `RootViewController` class.\n\n# Changing\
    \ Scenes\n\nThe last step to complete this project is to use the Segmented Control’s\
    \ buttons to change scenes in the cocos2d view. In [Listing 15–9](#Chapter15.html#list_15_9),\
    \ taken from the `ViewBasedAppWithCocos2DViewController` class, the code that\
    \ was added to the `sceneChanged` method is shown.\n\n**Listing 15–9.** *Changing\
    \ Scenes Whenever You Press a UIKit Button*\n\n```\n- (IBAction)sceneChanged:(id)sender\n\
    {\n    CCDirector* director = [CCDirector sharedDirector];\n    if (director.openGLView\
    \ == nil || director.openGLView.hidden)\n    {\n        return;\n    }\n\n   \
    \ UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;\n    int selection\
    \ = sceneChanger.selectedSegmentIndex;\n\n    CCScene* helloScene = [HelloWorldLayer\
    \ scene];\n    CCScene* transScene = nil;\n    if (selection == 0)\n    {\n  \
    \      transScene = [CCTransitionSlideInR transitionWithDuration:1 scene:helloScene];\n\
    \    }\n    else if (selection == 1)\n    {\n        transScene = [CCTransitionPageTurn\
    \ transitionWithDuration:1 scene:helloScene];\n    }\n    else\n    {\n      \
    \  transScene = [CCTransitionShrinkGrow transitionWithDuration:1 scene:helloScene];\n\
    \    }\n\n    [director replaceScene:transScene];\n}\n```\n\nSince the user can\
    \ press the Segmented Control buttons at any time, even before the cocos2d view\
    \ is initialized, the first thing this method does is to check that the `director.openGLView`\
    \ exists and is not hidden. Otherwise, the remaining code could crash the app.\n\
    \nThe `sender` parameter is always the control that triggered the event. Here\
    \ I assume that it’s a `UISegmentedControl`. If you ever changed that, you would\
    \ have to change the control’s class here as well. Via the `selectedSegmentIndex`,\
    \ you get the index of the currently selected button, which is then used to decide\
    \ which transition to use for the new scene. I’m simply creating a new instance\
    \ of the same `HelloWorldLayer` class; of course, you can also use different scene\
    \ classes for each button if you want. At last, the `transScene` is used with\
    \ the `director` method `replaceScene` to actually change the scene to the new\
    \ one.\n\n**NOTE:** The cocos2d transitions will act only on the cocos2d view\
    \ and its nodes. UIKit views will be unaffected by the cocos2d transitions. But\
    \ you can use `UIView` animations and transitions on the cocos2d view. You can\
    \ learn more about `UIView` animations here: [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html).\n\
    \nI spiced up my `HelloWorldLayer` scene with some additional cocos2d labels in\
    \ the background and labels for the buttons. You’ll find these code changes to\
    \ the `HelloWorldLayer` class in the `ViewBasedAppWithCocos2D` project. The result\
    \ looks something like [Figure 15–13](#Chapter15.html#fig_15_13).\n\n![images](images/1513.jpg)\n\
    \n**Figure 15–13.** *A cocos2d view in a view-based application*"
  raw: '#### Stop the cocos2d Engine and Restart It


    You can easily start, stop and restart the cocos2d engine at any time. You just
    need to determine the current state of the engine. It might never have been started
    before, it might be running, or it might be stopped.


    There’s no property in cocos2d’s `CCDirector` class, but you can infer the status
    in other ways. I prepared this example project so that this status can be detected,
    and depending on your project’s requirements, you might have to use other mechanisms,
    such as keeping track of the cocos2d running status through global variables.


    If the director’s `openGLView` property is `nil`, you know that it has never been
    started before. And in this particular project, the fact that the openGLView is
    hidden tells me that cocos2d has been suspended and could be restarted. In addition
    to that, the switch button’s state is also taken into account. The code for the
    `switchChanged` method has changed as follows and is shown in [Listing 15–8](#Chapter15.html#list_15_8).


    **Listing 15–8.** *Starting, Suspending, and Stopping cocos2d*


    `- (IBAction)switchChanged:(id)sender`

    `{`

    `    UISwitch* switchButton = (UISwitch*)sender;`

    `    CCDirector* director = [CCDirector sharedDirector];`


    `    if (switchButton.on)`

    `    {`

    `        if (director.openGLView == nil)`

    `        {`

    `            if ([CCDirector setDirectorType:kCCDirectorTypeDisplayLink] == NO)`

    `            {`

    `                [CCDirector setDirectorType:kCCDirectorTypeDefault];`

    `            }`


    `            [director setAnimationInterval:1.0/60];`

    `            //[director setDisplayFPS:YES];`


    `            NSArray* subviews = self.view.subviews;`

    `            for (int i = 0; i < [subviews count]; i++)`

    `            {`

    `               UIView* subview = [subviews objectAtIndex:i];`

    `               if ([subview isKindOfClass:[EAGLView class]])`

    `               {`

    `                   [director setOpenGLView:(EAGLView*)subview];`

    `                   [director runWithScene:[HelloWorldLayer scene]];`

    `                   break;`

    `               }`

    `           }`

    `       }`

    `       else`

    `       {`

    `          [director startAnimation];`

    `       }`


    `       director.openGLView.hidden = NO;`

    `    }`

    `    else`

    `    {`

    `       director.openGLView.hidden = YES;`

    `       [director stopAnimation];`

    `    }`

    `}`


    Notice that the director methods `startAnimation` and `stopAnimation` are used
    to restart and stop cocos2d. Just for the very first time, you need to call `runWithScene`.
    But if you wanted to run a different scene each time cocos2d is restarted, you
    should call `replaceScene` directly after the call to `startAnimation`. The `runWithScene`
    method can be called only once during the lifetime of the application and must
    not be used again.


    Technically, the `stopAnimation` method only stops cocos2d from refreshing its
    view. Unless the view is `hidden` or obstructed by another view, the last frame
    cocos2d has rendered will remain as a static image in the `EAGLView`. That’s why
    hiding the `EAGLView` is a good idea. Calling `stopAnimation` is sometimes necessary
    to ensure that certain UIKit views are responsive and animate smoothly, in particular
    all views derived from `UIScrollView`. It is good practice to call `stopAnimation`
    whenever you display an (almost) full-screen UIKit view, to conserve performance
    for the foreground view as well as conserve battery power. Once the foreground
    view is dismissed, you call `startAnimation` again, and the cocos2d view and director
    continue where they were.


    **TIP:** If you want to see how this app behaves with autorotation, you have to
    make a small change to the `ViewBasedAppWithCocos2DViewController` class. Simply
    return `YES` from the `shouldAutorotateToInterfaceOrientation` method to enable
    rotation to all orientations. Although your app doesn’t support it well (it is
    not designed for landscape orientation), it serves to show that the cocos2d view
    will be correctly autorotated even without its `RootViewController` class.


    #### Changing Scenes


    The last step to complete this project is to use the Segmented Control’s buttons
    to change scenes in the cocos2d view. In [Listing 15–9](#Chapter15.html#list_15_9),
    taken from the `ViewBasedAppWithCocos2DViewController` class, the code that was
    added to the `sceneChanged` method is shown.


    **Listing 15–9.** *Changing Scenes Whenever You Press a UIKit Button*


    `- (IBAction)sceneChanged:(id)sender`

    `{`

    `    CCDirector* director = [CCDirector sharedDirector];`

    `    if (director.openGLView == nil || director.openGLView.hidden)`

    `    {`

    `        return;`

    `    }`


    `    UISegmentedControl* sceneChanger = (UISegmentedControl*)sender;`

    `    int selection = sceneChanger.selectedSegmentIndex;`


    `    CCScene* helloScene = [HelloWorldLayer scene];`

    `    CCScene* transScene = nil;`

    `    if (selection == 0)`

    `    {`

    `        transScene = [CCTransitionSlideInR transitionWithDuration:1 scene:helloScene];`

    `    }`

    `    else if (selection == 1)`

    `    {`

    `        transScene = [CCTransitionPageTurn transitionWithDuration:1 scene:helloScene];`

    `    }`

    `    else`

    `    {`

    `        transScene = [CCTransitionShrinkGrow transitionWithDuration:1 scene:helloScene];`

    `    }`


    `    [director replaceScene:transScene];`

    `}`


    Since the user can press the Segmented Control buttons at any time, even before
    the cocos2d view is initialized, the first thing this method does is to check
    that the `director.openGLView` exists and is not hidden. Otherwise, the remaining
    code could crash the app.


    The `sender` parameter is always the control that triggered the event. Here I
    assume that it’s a `UISegmentedControl`. If you ever changed that, you would have
    to change the control’s class here as well. Via the `selectedSegmentIndex`, you
    get the index of the currently selected button, which is then used to decide which
    transition to use for the new scene. I’m simply creating a new instance of the
    same `HelloWorldLayer` class; of course, you can also use different scene classes
    for each button if you want. At last, the `transScene` is used with the `director`
    method `replaceScene` to actually change the scene to the new one.


    **NOTE:** The cocos2d transitions will actonly on the cocos2d view and its nodes.
    UIKit views will be unaffected by the cocos2d transitions. But you can use `UIView`
    animations and transitions on the cocos2d view. You can learn more about `UIView`
    animations here: [`http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html`](http://developer.apple.com/library/ios/#documentation/WindowsViews/Conceptual/ViewPG_iPhoneOS/AnimatingViews/AnimatingViews.html).


    I spiced up my `HelloWorldLayer` scene with some additional cocos2d labels in
    the background and labels for the buttons. You’ll find these code changes to the
    `HelloWorldLayer` class in the ViewBasedAppWithCocos2D project. The result looks
    something like [Figure 15–13](#Chapter15.html#fig_15_13).


    ![images](images/1513.jpg)


    **Figure 15–13.** *A cocos2d view in a view-based application*'
