    them:


    `CCActionManager* sharedManager = [CCActionManager sharedManager];`

    `CCDirector* sharedDirector = [CCDirector sharedDirector];`

    `CCSpriteFrameCache* sharedCache = [CCSpriteFrameCache sharedSpriteFrameCache];`

    `CCTextureCache* sharedTexCache = [CCTextureCache sharedTextureCache];`

    `CCTouchDispatcher* sharedDispatcher = [CCTouchDispatcher sharedDispatcher];`

    `CDAudioManager* sharedManager = [CDAudioManager sharedManager];`

    `SimpleAudioEngine* sharedEngine = [SimpleAudioEngine sharedEngine];`


    The upside of a singleton is that it can be used anywhere by any class at any
    time. It acts almost like a global class, much like global variables. Singletons
    are very useful if you have a combination of data and methods you need to use
    in many different places. Audio is a good example of this, because any of your
    classes—whether the player, an enemy, a menu button, or a cutscene—might want
    to play a sound effect or change the background music. So, it makes a lot of sense
    to use a singleton for playing audio. Likewise, if you have global game stats,
    perhaps the size of the player’s army and each platoon’s number of troops, you
    might want to store that information in a singleton so you can carry it over from
    one level to another. Implementing a singleton is straightforward, as [Listing
    3–2](#Chapter03.html#list_3_2) shows. This code implements the class `MyManager`
    as a singleton with minimal code. The `sharedManager` static method grants access
    to the single instance of `MyManager`. If the instance doesn’t exist, a `MyManager`
    instance will be allocated and initialized; otherwise, the existing instance is
    returned.


    **Listing 3–2.** *Implementing the Exemplary Class MyManager as a Singleton*


    `static MyManager *sharedManager = nil;`


    `+(MyManager*) sharedManager`

    `{`

    `    if (sharedManager == nil)`

    `    {`

    `        sharedManager = [[MyManager alloc] init];`

    `    }`

    `    return sharedManager;`

    `}`


    However, singletons also have ugly sides. Because they’re simple to use and implement
    and can be accessed from any other class, there’s a tendency to overuse them.
    They’re like global variables that most programmers agree should be used scarcely
    and judiciously.


    For example, you might think you have only one player object, so why not make
    the player class a singleton? Everything seems to be fine—until you realize that
    whenever the player advances from one level to another, the singleton not only
    keeps the player’s score but also his last animation frame, his health, and all
    the items he has picked up, and then he might even begin the new level in Berserk
    mode because that mode was active when he left the previous level.


    To fix that, you add another method to reset certain variables when changing levels.
    So far, so good, but as you add more features to the game, you’ll end up having
    to add and maintain more and more variables when switching a level. What’s worse,
    suppose one day a friend suggests you give the iPad version a two-player mode.
    But, oh wait, your player is a singleton; you can have only one player at any
    time! This gives you a major headache: refactor a lot of code or miss out on the
    cool two-player mode?


    Or why not make the second player a singleton, too? And whenever the second player
    needs to know something of the first player, it’ll just use that singleton. So,
    they keep a reference to each other, which means you can’t have a single-player
    game without initializing the other players as well. This is one side effect of
    classes strongly dependent on each other, also known as *tight coupling*. The
    more classes are tightly coupled with each other, the harder it is to make changes
    to any part of your code. It’s like you’re mixing cement that’s slowly drying
    up until it’s so hard that any change is easier done by hacking it, instead of
    improving the code. That’s the point where bugs seem to occur everywhere, at random,
    with no connection to a recent change. In one word: frustrating.


    The more you rely on singletons, the more likely such issues will arise. Before
    creating a singleton class, always consider whether you really need only one instance
    of this class and its data and whether this might change at a later time.


    I understand it’s hard for a beginner to judge when and where to use a singleton,
    particularly if you haven’t had much experience with object-oriented programming.
    The Q&A web site Stackoverflow.com hosts a discussion with additional links that
    illustrates the controversy around the Singleton design pattern and gives some
    food for thought: [`http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`](http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons).


    My advice is to study popular uses of singletons. The use of singletons in the
    cocos2d game engine for resource management is acceptable, since it simplifies
    the overall design of the game engine. Most other game engines use singletons
    for similar purposes as well, and I’ve rarely heard anyone complain about that.
    And you’ll even find singletons in the iOS SDK. Singletons are generally not as
    bad as some make them sound like, although they do tend to be very problematic
    by introducing strong dependencies, and the problems grow exponentially with the
    size of the code base.


    ### Cocos2d Test Cases


    Did you know that cocos2d comes with a lot of sample code? In your cocos2d-iphone
    folder, you’ll find a project aptly named cocos2d-iphone that contains a lot of
    test targets you can build and run. You can see how things work and then check
    the code to see how it’s implemented.


    ### Summary


    Wow! That was a lot to take in! I don’t expect you to remember all of this chapter’s
    content at once. Feel free to come back at any time to look again at cocos2d’s
    scene graph and how to use the various `CCNode` classes. I wrote this chapter
    to be a good reference whenever you need it, as well as the accompanying NodeHierarchy
    and Essentials Xcode projects.


    Armed with this chapter’s knowledge and a fair bit of motivation on your side,
    you could be starting to write your own games now.


    You know what, let’s do that together. Read on to the next chapter, and I’ll walk
    you through your first complete game project!


    ## Chapter 4


    ## **Your First Game**


    In this chapter you’ll build your first complete game. It won’t win any awards,
    but you’ll learn how to get the essential elements of cocos2d to work together.
    I’ll guide you through the individual steps, so you’ll also learn a bit about
    working with Xcode along the way.


    The game is the inversion of the famous Doodle Jump game, aptly named DoodleDrop.
    The player’s goal is to avoid falling obstacles for as long as possible by rotating
    the device to move the player sprite. Take a look at the final version in [Figure
    4–1](#Chapter04.html#fig_4_1) to get an idea of what you’ll be creating in this
    chapter.


    ![images](images/0401.jpg)


    **Figure 4–1.** *The final version of the DoodleDrop game*'
