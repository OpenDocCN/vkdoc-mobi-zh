  trans: '

    ### Cocos2D 中心


    我创办了一个名为 Cocos2D 中心的社区枢纽，专注于一切与 cocos2d 相关的内容。最重要的是，这里设有针对 cocos2d、相关书籍、Kobold2D
    以及我的游戏工具包的论坛专区。Cocos2D 中心还托管了 cocos2d-javascript（cocos2d 的网页浏览器移植版）的官方论坛。


    在“资源”部分，有几个小型教程可供使用；而“下载”部分则托管了我目前提供的所有下载文件，包括 cocos2d 安装程序以及本书的源代码。


    ### Stack Exchange 网络


    论坛是社区成员相互交流的绝佳方式。但也正因为如此，论坛往往会显得比较闲聊化，而且搜索特定答案可能比较繁琐，因为论坛的内容并不严格局限于解决问题。


    而这正是像 Stack Exchange 这样的问答网站的闪光点。你进入网站，提出一个具体问题，然后获得答案。由于重点关注问答环节，因此更容易找到已有的答案。如果你确实喜欢某个问题或答案，可以给它投票，这样它会在搜索结果中排名更高。


    我经常对 Stack Exchange 网络上贡献者展现出的专业水平感到惊讶。这部分要归功于其内置的徽章和积分系统，这使得提出有趣的问题以及撰写深入、周全的答案都变得非常有成就感。Stack
    Exchange 网络由多个免费的问答网站组成，其中最受欢迎且我个人最喜欢的是 `http://stackoverflow.com`，它主要关注各类编程问题。


    你在 Stack Overflow 上找到的关于 cocos2d 的问题数量可能不如在官方 cocos2d 论坛上那么多，但 Stack Overflow
    上的问题都很优质，而且几乎每个问题都能得到很好的解答。该网站在搜索标签的使用上有些混乱，`cocos2d` 和 `cocos2d-iphone` 这两个标签都被用来标记关于
    cocos2d iPhone 版本的问题。这可以归因于 cocos2d for iPhone 的成功，以至于它本身几乎成了 cocos2d 这个名称的代名词。使用以下两个链接可以找到
    Stack Overflow 上所有与 cocos2d for iPhone 相关的问题：


    *   `http://stackoverflow.com/questions/tagged/cocos2d`

    *   `http://stackoverflow.com/questions/tagged/cocos2d-iphone`


    Stack Exchange 作为一个问答网站网络正在不断扩张。最新加入的站点之一是游戏开发问答网站。在这个网站上，你可以提出一般的游戏编程问题，以及任何与游戏开发相关的问题，包括设计、营销和销售。请访问游戏开发
    Stack Exchange 网站：`http://gamedev.stackexchange.com`。


    ### 教程与常见问题解答


    网络上有很多关于 cocos2d 的教程，但有一位教程作者明显脱颖而出：Ray Wenderlich。他撰写了十多篇 cocos2d 教程，并发布在他的网站
    `www.raywenderlich.com/tag/cocos2d` 上。除了 cocos2d 教程外，你还可以在这个网站上找到其他非常有趣的 iPhone
    SDK 相关技巧。至少在一个特定案例中，这些技巧对 cocos2d 开发者也有帮助，Ray 在其中解释了如何保存和加载应用数据。这同样可以应用于游戏存档的保存和加载（参见
    `www.raywenderlich.com/1914/how-to-save-your-app-data-with-nscoding-and-nsfilemanager`）。


    此外，还有精彩的 Coconut College。它提供入门级教程和手把手的指导方法。该网站干净且专业的设计既吸引人又一目了然。作者昵称 cjl，自称 Coconut
    College 的院长，但其他时候都保持低调。请访问 Coconut College 网站 `www.coconutcollege.net`，如果你想联系作者，可以试试他在
    cocos2d 论坛的资料页面：`www.cocos2d-iphone.org/forum/profile/49`。


    我的 Learn & Master cocos2d 网站（`www.learn-cocos2d.com/knowledge-base`）上的知识库收录了我自己的教程和常见问题解答。目前我提供了一个
    Xcode 教程，它允许你将 cocos2d 文件分开存放，以便更容易地更新 cocos2d。另一个教程是关于位图字体编辑器 Hiero 的，并包含了许多常见问题解答。这个网站也是我撰写博客文章、发布对
    cocos2d 开发者普遍感兴趣的主题和链接的地方。例如这篇关于如何在现有项目中升级 cocos2d 的文章：`www.learn-cocos2d.com/2011/05/update-cocos2d-iphone-existing-project`。


    我运营的另一个网站叫做 Indiepinion，网址是 `www.indiepinion.com`，我在那里撰写关于独立开发经验的博客，发布对独立开发者的访谈，并普遍尝试鼓励开发者走上独立之路。


    ## 可供借鉴的源代码项目


    就个人而言，我通过浏览他人的代码来学习效果最好。当我拿到 cocos2d 并发现文档有所欠缺时，我做的第一件事就是投资购买了 Sapus Tongue 源代码项目，看看
    cocos2d 实际上是如何在游戏中被使用的。这对于快速入门非常有帮助。


    **注意：** 由于 Zynga 收购了 Sapus Media 的部分资产，Sapus Tongue 源代码和 Level SVG 产品已不再提供。不过，我在以下章节中介绍的源代码产品是极佳的替代品。


    与开源项目相比，商业销售的源代码的优势在于，你很少能获得开源项目的支持，而且它们几乎从不更新，以至于你能找到的大多数开源项目都在使用 cocos2d v1.0
    之前的版本，只有一个例外，那就是官方的 cocos2d-iphone-extensions 项目：`www.cocos2d-iphone.org/forum/topic/17546`。


    以下源代码项目均为商业产品。我不列出价格是因为它们可能会有变动。


    ### iPhone RPG 游戏工具包


    由 Nathanael M. Weiss 创建的 iPhone 游戏工具包也被称为 iPhone RPG 工具包。游戏《Quexlor: Lands of
    Fate》（见图 17–1）是一款效仿《暗黑破坏神》的动作角色扮演砍杀游戏，拥有包含多个关卡的大型瓦片地图世界、各种怪物和大量物品。该游戏工具包附带大量由
    Reiner Prokein 创建的无版税图形、一本全面的 *Make Your Own iPhone Game* 电子书，以及一份详细解释如何将你的游戏提交到
    App Store 的发布指南。显然，你还将获得该游戏精心编写的源代码，但这似乎反而是次要的了。


    该工具包没有显著的许可限制。你享有 60 天退款保证和终身免费更新（尽管并未明确是谁的终身）。通过支持论坛可以获得帮助，你也可以在那里与其他游戏工具包用户分享你的作品。


    你可以在 App Store 上找到 Quexlor 游戏的链接，并在其网站上获得更多关于 iPhone 游戏工具包的信息，所以我建议去看看：`www.iphonegamekit.com`。


    ![images](img/1701.jpg)


    **图 17–1.** *《Quexlor: Lands of Fate》（iPad）是一款使用 iPhone 游戏工具包制作的游戏。*

