    `    CGPoint playerVelocity;`


    **`    CCArray* spiders;`**

    **`    float spiderMoveDuration;`**

    **`    int numSpidersMoved;`**

    `}`


    And in the `GameSceneinit` method add the call to the `initSpiders` method discussed
    next, right after `scheduleUpdate`:


