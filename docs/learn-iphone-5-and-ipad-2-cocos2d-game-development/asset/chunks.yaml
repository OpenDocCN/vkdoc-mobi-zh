- fmt: "# Box2D\n\nThe Box2D physics engine is written in C++ . It was developed by\
    \ Erin Catto, who has given presentations about physics simulations at every Game\
    \ Developers Conference (GDC) since 2005. It was his GDC 2006 presentation that\
    \ eventually led to the public release of Box2D in September 2007. It has been\
    \ in active development ever since.\n\nBecause of its popularity, the Box2D physics\
    \ engine is distributed with cocos2d. You can create a new project using Box2D\
    \ by choosing the cocos2d Box2D application template from Xcode's `File` ![](images/U001.jpg)\
    \ `New Project` dialog. This project template adds the necessary Box2D source\
    \ files to the project and provides a test project in which you can add boxes\
    \ that bounce off each other, as shown in [Figure 12–1](#Chapter12.html#fig_12_1).\
    \ They also fall according to gravity, depending on how you're holding your device.\n\
    \n![](images/1201.jpg)\n\n**Figure 12–1.** *The PhysicsBox2D example project*\n\
    \n**CAUTION:** Because the Box2D physics engine is written in C++, you have to\
    \ use the file extension `.mm` instead of `.m` for all your project's implementation\
    \ files. This tells Xcode to treat the implementation file's source code as either\
    \ Objective-C++ or C++ code. With the `.m` file extension, Xcode will compile\
    \ the code as Objective-C and C code and won't understand Box2D's C++ code, which\
    \ will result in numerous compile errors for every line of code that uses or makes\
    \ a reference to Box2D. So if you're getting a lot of errors, check that your\
    \ implementation files all end in `.mm`, and if not, rename them.\n\nDocumentation\
    \ for Box2D is available in two places. First, you can read the Box2D manual online\
    \ at [`www.box2d.org/manual.html`](http://www.box2d.org/manual.html), which introduces\
    \ you to common concepts and shows example code. The Box2D API reference is distributed\
    \ with Box2D itself, which you can download at [`http://code.google.com/p/box2d`](http://code.google.com/p/box2d).\
    \ You can also find the Box2D API reference in the Box2D version distributed with\
    \ the book's source code. The API reference is in the folder `/Physics Engine\
    \ Libraries/Box2D_v2.1.2/Box2D/Documentation/API` — to view it, locate and open\
    \ the file `index.html` in that folder.\n\nIf you like Box2D, you should also\
    \ consider donating to the project; you can do so via the `Donate` button on its\
    \ home page: [`www.box2d.org`](http://www.box2d.org).\n\n## The World According\
    \ to Box2D\n\nBecause the example project provided by cocos2d is quite complex,\
    \ I decided to break it down into smaller pieces and re-create the example project\
    \ step by step but not without adding some extras and variations.\n\n[Listing\
    \ 12–1](#Chapter12.html#list_12_1) shows the `HelloWorldScene` header file from\
    \ the PhysicsBox2D01 project.\n\n**Listing 12–1.** *The Box2D Hello World Interface*\n\
    \n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\n#import \"GLES-Render.h\"\n\
    \nenum\n{\n    kTagBatchNode,\n};\n\n@interface HelloWorld : CCLayer\n{\n    b2World*\
    \ world;\n}\n\n+(id) scene;\n\n@end\n```\n\nIt's fairly standard, except that\
    \ it includes the `Box2D.h` header file and adds a member variable of type `b2World`.\
    \ This is the physics world—think of it as the container class that will store\
    \ and update all physics bodies.\n\nThe Box2D world is initialized by creating\
    \ a new `b2World` object in the `HelloWorldScene`'s `init` method, as shown in\
    \ [Listing 12–2](#Chapter12.html#list_12_2).\n\n**Listing 12–2.** *Initializing\
    \ the Box2D World*\n\n```\nb2Vec2 gravity = b2Vec2(0.0f, -10.0f);\nbool allowBodiesToSleep\
    \ = true;\nworld = new b2World(gravity, allowBodiesToSleep);\n```\n\nRemember\
    \ that Box2D is written in C++. To instantiate one of Box2D's classes, you have\
    \ to add the `new` keyword in front of the class's name. If Box2D were written\
    \ in Objective-C, the equivalent line might look like this:\n\n```\nworld = [[b2World\
    \ alloc] initWithGravity:gravity allowSleep:allowBodiesToSleep];\n```\n\nIn other\
    \ words, the `new` keyword in C++ is equivalent to sending the `alloc` message\
    \ to an Objective-C class followed by an `init` message. That of course means\
    \ you also have to deallocate the Box2D world. In C++ this is done using the `delete`\
    \ keyword:\n\n```\n-(void) dealloc\n{\n    delete world;\n    [super dealloc];\n\
    }\n```\n\nThe Box2D world in [Listing 12–2](#Chapter12.html#list_12_2) is initialized\
    \ with an initial gravity vector and a flag that determines whether the dynamic\
    \ bodies are allowed to fall asleep.\n\nSleeping bodies? It's a trick that allows\
    \ the physics simulation to quickly skip over objects that do not need processing.\
    \ A dynamic body goes to sleep when the forces applied to it have been below a\
    \ threshold for a certain amount of time. In other words, if the dynamic body\
    \ is moving and rotating very slowly or not at all, the physics engine will flag\
    \ it as sleeping and won't apply forces to it anymore—that is, unless an impulse\
    \ or force applied to the body is strong enough to make the body move or rotate\
    \ again. This trick allows the physics engine to save time by not processing the\
    \ bodies that are at rest. Unless all of your game's dynamic bodies are in constant\
    \ motion, you should enable this feature by setting the `allowBodiesToSleep` variable\
    \ to `true`, as in [Listing 12–2](#Chapter12.html#list_12_2).\n\nThe gravity passed\
    \ to Box2D is a `b2Vec2` struct type. It's essentially the same as a `CGPoint`,\
    \ because it stores x and y float values. In this case, and fortunately for us\
    \ in the real world too, gravity is a constant force. The 0, –10 vector is constantly\
    \ applied to all dynamic bodies, making them fall down, which in this case means\
    \ toward the bottom of the screen."
  raw: '### Box2D


    The Box2D physics engine is written in C++. It was developed by Erin Catto, who
    has given presentations about physics simulations at every Game Developers Conference
    (GDC) since 2005\. It was his GDC 2006 presentation that eventually led to the
    public release of Box2D in September 2007\. It has been in active development
    ever since.


    Because of its popularity, the Box2D physics engine is distributed with cocos2d.
    You can create a new project using Box2D by choosing the cocos2d Box2D application
    template from Xcode''s `File` ![images](images/U001.jpg) `New Project` dialog.
    This project template adds the necessary Box2D source files to the project and
    provides a test project in which you can add boxes that bounce off each other,
    as shown in [Figure 12–1](#Chapter12.html#fig_12_1). They also fall according
    to gravity, depending on how you''re holding your device.


    ![images](images/1201.jpg)


    **Figure 12–1.** *The PhysicsBox2D example project*


    **CAUTION:** Because the Box2D physics engine is written in C++, you have to use
    the file extension .mm instead of .m for all your project''s implementation files.
    This tells Xcode to treat the implementation file''s source code as either Objective-C++
    or C++ code. With the .m file extension, Xcode will compile the code as Objective-C
    and C code and won''t understand Box2D''s C++ code, which will result in numerous
    compile errors for every line of code that uses or makes a reference to Box2D.
    So if you''re getting a lot of errors, check that your implementation files all
    end in .mm, and if not, rename them.


    Documentation for Box2D is available in two places. First, you can read the Box2D
    manual online at [`www.box2d.org/manual.html`](http://www.box2d.org/manual.html),
    which introduces you to common concepts and shows example code. The Box2D API
    reference is distributed with Box2D itself, which you can download at [`http://code.google.com/p/box2d`](http://code.google.com/p/box2d).
    You can also find the Box2D API reference in the Box2D version distributed with
    the book''s source code. The API reference is in the folder /Physics Engine Libraries/Box2D_v2.1.2/Box2D/Documentation/API
    — to view it, locate and open the file index.html in that folder.


    If you like Box2D, you should also consider donating to the project; you can do
    so via the `Donate` button on its home page: [`www.box2d.org`](http://www.box2d.org).


    #### The World According to Box2D


    Because the example project provided by cocos2d is quite complex, I decided to
    break it down into smaller pieces and re-create the example project step by step
    but not without adding some extras and variations.


    [Listing 12–1](#Chapter12.html#list_12_1) shows the HelloWorldScene header file
    from the PhysicsBox2D01 project.


    **Listing 12–1.** *The Box2D Hello World Interface*


    `#import "cocos2d.h"`

    **`#import "Box2D.h"`**

    `#import "GLES-Render.h"`


    `enum`

    `{`

    `    kTagBatchNode,`

    `};`


    `@interface HelloWorld : CCLayer`

    `{`

    **`    b2World* world;`**

    `}`


    `+(id) scene;`


    `@end`


    It''s fairly standard, except that it includes the Box2D.h header file and adds
    a member variable of type `b2World`. This is the physics world—think of it as
    the container class that will store and update all physics bodies.


    The Box2D world is initialized by creating a new `b2World` object in the `HelloWorldScene`''s
    `init` method, as shown in [Listing 12–2](#Chapter12.html#list_12_2).


    **Listing 12–2.** *Initializing the Box2D World*


    `b2Vec2 gravity = b2Vec2(0.0f, -10.0f);`

    `bool allowBodiesToSleep = true;`

    `world = new b2World(gravity, allowBodiesToSleep);`


    Remember that Box2D is written in C++. To instantiate one of Box2D''s classes,
    you have to add the `new` keyword in front of the class''s name. If Box2D were
    written in Objective-C, the equivalent line might look like this:


    `world = [[b2World alloc] initWithGravity:gravity allowSleep:allowBodiesToSleep];`


    In other words, the `new` keyword in C++ is equivalent to sending the `alloc`
    message to an Objective-C class followed by an `init` message. That of course
    means you also have to deallocate the Box2D world. In C++ this is done using the
    `delete` keyword:


    `-(void) dealloc`

    `{`

    `    delete world;`

    `    [super dealloc];`

    `}`


    The Box2D world in [Listing 12–2](#Chapter12.html#list_12_2) is initialized with
    an initial gravity vector and a flag that determines whether the dynamic bodies
    are allowed to fall asleep.


    Sleeping bodies? It''s a trick that allows the physics simulation to quickly skip
    over objects that do not need processing. A dynamic body goes to sleep when the
    forces applied to it have been below a threshold for a certain amount of time.
    In other words, if the dynamic body is moving and rotating very slowly or not
    at all, the physics engine will flag it as sleeping and won''t apply forces to
    it anymore—that is, unless an impulse or force applied to the body is strong enough
    to make the body move or rotate again. This trick allows the physics engine to
    save time by not processing the bodies that are at rest. Unless all of your game''s
    dynamic bodies are in constant motion, you should enable this feature by setting
    the `allowBodiesToSleep` variable to `true`, as in [Listing 12–2](#Chapter12.html#list_12_2).


    The gravity passed to Box2D is a `b2Vec2struct` type. It''s essentially the same
    as a `CGPoint`, because it stores x and y float values. In this case, and fortunately
    for us in the real world too, gravity is a constant force. The 0, –10 vector is
    constantly applied to all dynamic bodies, making them fall down, which in this
    case means toward the bottom of the screen.'
  trans: "\n# Box2D\n\nBox2D 物理引擎采用 C++编写。它由 Erin Catto 开发，自 2005 年以来，他每年都会在游戏开发者大会（GDC）上作关于物理模拟的演讲。正是他在\
    \ GDC 2006 上的演讲最终促成了 Box2D 于 2007 年 9 月公开发布。此后，该引擎一直处于活跃开发状态。\n\n由于 Box2D 广受欢迎，该物理引擎随\
    \ cocos2d 一同分发。您可以通过从 Xcode 的`File` ![](img/U001.jpg) `New Project`对话框中选择 cocos2d\
    \ Box2D 应用程序模板，来创建一个使用 Box2D 的新项目。此项目模板会将必要的 Box2D 源文件添加到项目中，并提供一个测试项目，您可以在其中添加相互弹跳的方块，如图\
    \ 12–1 所示。这些方块还会根据您握持设备的方式，受重力影响而下落。\n\n![](img/1201.jpg)\n\n**图 12–1.** *PhysicsBox2D\
    \ 示例项目*\n\n**注意：** 由于 Box2D 物理引擎是用 C++编写的，您必须对所有项目的实现文件使用`.mm`文件扩展名，而不是`.m`。这会告诉\
    \ Xcode 将实现文件的源代码视为 Objective-C++或 C++代码。如果使用`.m`文件扩展名，Xcode 会将代码编译为 Objective-C\
    \ 和 C 代码，从而无法理解 Box2D 的 C++代码，这将导致每一行使用或引用 Box2D 的代码都出现大量编译错误。因此，如果您遇到大量错误，请检查您的实现文件是否都以`.mm`结尾，如果不是，请重命名它们。\n\
    \nBox2D 的文档可在两个地方获取。首先，您可以在线阅读 Box2D 手册[`www.box2d.org/manual.html`](http://www.box2d.org/manual.html)，该手册向您介绍常见概念并展示示例代码。Box2D\
    \ API 参考文档随 Box2D 本身一起分发，您可以在[`http://code.google.com/p/box2d`](http://code.google.com/p/box2d)下载。您还可以在随本书源代码分发的\
    \ Box2D 版本中找到 Box2D API 参考文档。API 参考文档位于文件夹`/Physics Engine Libraries/Box2D_v2.1.2/Box2D/Documentation/API`中——要查看它，请找到并打开该文件夹中的`index.html`文件。\n\
    \n如果您喜欢 Box2D，还应该考虑向该项目捐赠；您可以通过其主页上的`Donate`按钮进行捐赠：[`www.box2d.org`](http://www.box2d.org)。\n\
    \n## Box2D 眼中的世界\n\n由于 cocos2d 提供的示例项目相当复杂，我决定将其拆分成更小的部分，并逐步重建示例项目，同时还会添加一些额外的内容和变体。\n\
    \n代码清单 12–1 展示了来自 PhysicsBox2D01 项目的`HelloWorldScene`头文件。\n\n**代码清单 12–1.** *Box2D\
    \ Hello World 接口*\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\n#import\
    \ \"GLES-Render.h\"\n\nenum\n{\n    kTagBatchNode,\n};\n\n@interface HelloWorld\
    \ : CCLayer\n{\n    b2World* world;\n}\n\n+(id) scene;\n\n@end\n```\n\n除了包含`Box2D.h`头文件并添加了一个`b2World`类型的成员变量外，它相当标准。这就是物理世界——可将其视为存储和更新所有物理体的容器类。\n\
    \nBox2D 世界通过在`HelloWorldScene`的`init`方法中创建一个新的`b2World`对象来初始化，如代码清单 12–2 所示。\n\
    \n**代码清单 12–2.** *初始化 Box2D 世界*\n\n```\nb2Vec2 gravity = b2Vec2(0.0f, -10.0f);\n\
    bool allowBodiesToSleep = true;\nworld = new b2World(gravity, allowBodiesToSleep);\n\
    ```\n\n请记住 Box2D 是用 C++编写的。要实例化 Box2D 的某个类，您必须在类名前面添加`new`关键字。如果 Box2D 是用 Objective-C\
    \ 编写的，等效的代码可能如下所示：\n\n```\nworld = [[b2World alloc] initWithGravity:gravity allowSleep:allowBodiesToSleep];\n\
    ```\n\n换句话说，C++中的`new`关键字等同于向 Objective-C 类发送`alloc`消息，然后再发送`init`消息。这当然意味着您还需要释放\
    \ Box2D 世界。在 C++中，这通过使用`delete`关键字来完成：\n\n```\n-(void) dealloc\n{\n    delete\
    \ world;\n    [super dealloc];\n}\n```\n\n代码清单 12–2 中的 Box2D 世界通过一个初始重力向量和一个决定动态体是否允许进入休眠状态的标志进行初始化。\n\
    \n休眠体？这是一种技巧，使物理模拟能够快速跳过不需要处理的对象。当一个动态体所受到的力在一段时间内低于某个阈值时，它就会进入休眠状态。换句话说，如果动态体移动和旋转得非常缓慢，或者根本不移动，物理引擎会将其标记为休眠，并且不再对其施加力——除非施加在该体上的冲量或力足够强，足以使该体再次移动或旋转。这种技巧使物理引擎能够通过不处理静止的体来节省时间。除非您的游戏中的所有动态体都处于持续运动状态，否则您应该通过将`allowBodiesToSleep`变量设置为`true`来启用此功能，如代码清单\
    \ 12–2 所示。\n\n传递给 Box2D 的重力参数是`b2Vec2`结构体类型。它本质上与`CGPoint`相同，因为它存储了 x 和 y 的浮点值。在这种情况下，并且幸运的是在现实世界中也是如此，重力是一种恒定的力。向量(0,\
    \ -10)会持续作用于所有动态体，使它们下落，在此处意味着朝向屏幕底部下落。\n"
- fmt: "### Restricting Movement to the Screen\n\nWorld setup, check. What next? Well,\
    \ we should limit the movement of the Box2D bodies to within the visible screen\
    \ area. For that, we'll need a static body. The simplest way to create a static\
    \ body is by using the world's `CreateBody` method and an empty body definition:\n\
    \n```\n// Define the static container body, which will provide the collisions\
    \ at screen borders\nb2BodyDef containerBodyDef;\nb2Body* containerBody = world->CreateBody(&containerBodyDef);\n\
    ```\n\nBodies are always created through the world's `CreateBody` method. This\
    \ ensures that the body's memory is correctly allocated and freed. The `b2BodyDef`\
    \ is a struct that holds all the data needed to create a body, such as position\
    \ and the body type. By default, an empty body definition creates a static body\
    \ at position 0, 0.\n\n**NOTE:** The `&containerBodyDef` variable is passed with\
    \ a leading `&` (ampersand) character to the `CreateBody` method. That's C++ for\
    \ \"Give me the memory address of `containerBodyDef`.\" If you look at the definition\
    \ of the `CreateBody` method, it requires a pointer passed to it: `b2World::CreateBody(const\
    \ b2BodyDef *def);`. Since pointers store a memory address, you can get that address\
    \ of a nonpointer variable by prefixing it with the ampersand character.\n\nThe\
    \ body itself won't do anything. To make it enclose the screen area, you'll have\
    \ to create a shape with four sides:\n\n```\n// Create the screen box sides by\
    \ using a polygon assigning each side individually\nb2PolygonShape screenBoxShape;\n\
    int density = 0;\n\n// Bottom\nscreenBoxShape.SetAsEdge(lowerLeftCorner, lowerRightCorner);\n\
    containerBody->CreateFixture(&screenBoxShape, density);\n\n// Top\nscreenBoxShape.SetAsEdge(upperLeftCorner,\
    \ upperRightCorner);\ncontainerBody->CreateFixture(&screenBoxShape, density);\n\
    \n// Left side\nscreenBoxShape.SetAsEdge(upperLeftCorner, lowerLeftCorner);\n\
    containerBody->CreateFixture(&screenBoxShape, density);\n\n// Right side\nscreenBoxShape.SetAsEdge(upperRightCorner,\
    \ lowerRightCorner);\ncontainerBody->CreateFixture(&screenBoxShape, density);\n\
    ```\n\nYou may notice the missing declarations for the corner variable names.\
    \ I'll get to them in a moment. First I'd like you to focus on how the `b2PolygonShape\
    \ screenBoxShape` variable is reused. Each `SetAsEdge` method call is followed\
    \ by a call to `containerBody->CreateFixture()`, which uses the `->` operator\
    \ to denote that `containerBody` is a C-style pointer and passes `&screenBoxShape`.\
    \ Since Box2D makes a copy of `screenBoxShape`, you can safely reuse the same\
    \ shape to create all four sides enclosing the screen area without modifying or\
    \ overriding the previous lines. Since the body is a static body (the default\
    \ setting for Box2D bodies), `density` doesn't matter and is set to `0`.\n\n**NOTE:**\
    \ The `b2PolygonShape` class has a `SetAsBox` method that looks like it might\
    \ make the definition of the screen area easier by simply providing the screen's\
    \ width and height. However, that would make the inside of the body a solid object,\
    \ and any dynamic body added to the screen would actually be contained inside\
    \ the solid shape. This would make the dynamic bodies try to move away from the\
    \ collision, possibly at rapid speeds. The sides need to be created separately\
    \ in order to make only the sides of the screen solid.\n\nNow we'll move on to\
    \ the missing variable declarations. Notice that the screen width and height is\
    \ divided by a `PTM_RATIO` constant to convert them from pixels to meters:\n\n\
    ```\n// For the ground body we'll need these values\nCGSize screenSize = [CCDirector\
    \ sharedDirector].winSize;\nfloat widthInMeters = screenSize.width / PTM_RATIO;\n\
    float heightInMeters = screenSize.height / PTM_RATIO;\nb2Vec2 lowerLeftCorner\
    \ = b2Vec2(0, 0);\nb2Vec2 lowerRightCorner = b2Vec2(widthInMeters, 0);\nb2Vec2\
    \ upperLeftCorner = b2Vec2(0, heightInMeters);\nb2Vec2 upperRightCorner = b2Vec2(widthInMeters,\
    \ heightInMeters);\n```\n\nWhy meters, and what is `PTM_RATIO`? Box2D is optimized\
    \ to work best with dimensions in the range of 0.1 to 10 meters. It is tuned for\
    \ the metric system, so all distances are considered to be meters, all masses\
    \ are in kilograms, and time is measured in—quite oddly—seconds. If you're not\
    \ familiar with the meters, kilograms, and seconds (MKS) system, don't worry—you\
    \ don't have to meticulously convert yards into meters and pounds into kilograms.\
    \ The conversion to meters is just a way to keep the distance values for Box2D\
    \ in the desirable range of 0.1 to 10, and the masses used by bodies do not resemble\
    \ real-world masses anyway. The masses of bodies will often need to be tweaked\
    \ by feel rather than by using realistic weights.\n\nYou should try to keep the\
    \ dimensions of objects in your world as close to 1 meter as much as possible.\
    \ That is not to say that you can't have objects that are smaller than 0.1 meters\
    \ or larger than 10 meters, but you may run into glitches and strange behavior\
    \ if you create relatively small or large bodies.\n\nThe `PTM_RATIO` is defined\
    \ like this:\n\n```\n#define PTM_RATIO 32\n```\n\nIt is used to define that 32\
    \ pixels on the screen equal 1 meter in Box2D. A box-shaped body that's 32 pixels\
    \ wide and high will be 1 meter wide and high. A body that's 4×4 pixels in size\
    \ will be 0.125×0.125 meters in Box2D, while a relatively huge object of 256×256\
    \ pixels will be 8×8 meters in Box2D. The `PTM_RATIO` allows you to scale the\
    \ size of Box2D objects down to the dimensions within which Box2D works best,\
    \ and a `PTM_RATIO` of 32 is a good compromise for a screen area that may be as\
    \ large as 1024×768 pixels on the iPad.\n\n### Converting Points\n\nNote that\
    \ the `b2Vec2` struct is different from `CGPoint`, which means you cannot use\
    \ a `CGPoint` where a `b2Vec2` is required, and vice versa. In addition, Box2D\
    \ points need to be converted to meters and back to pixels. To avoid making any\
    \ mistakes, such as forgetting to convert from or to meters or simply making a\
    \ typo and using the x coordinate twice, it's highly recommended to wrap this\
    \ repetitive code into convenience methods like these:\n\n```\n-(b2Vec2) toMeters:(CGPoint)point\n\
    {\n    return b2Vec2(point.x / PTM_RATIO, point.y / PTM_RATIO);\n}\n\n-(CGPoint)\
    \ toPixels:(b2Vec2)vec\n{\n    return ccpMult(CGPointMake(vec.x, vec.y), PTM_RATIO);\n\
    }\n```\n\nThis allows you to write the following code to easily convert between\
    \ `CGPoint` and pixels to `b2Vec2` and meters:\n\n```\n// Box2D coordinates to\
    \ Cocos2D point coordinates\nb2Vec2 vec = b2Vec2(200, 200);\nCGPoint pointFromVec\
    \ = [self toPixels:vec];\n\n// Cocos2D point coordinates to Box2D coordinates\n\
    CGPoint point = CGPointMake(100, 100);\nb2Vec2 vecFromPoint = [self toMeters:point];\n\
    ```"
  raw: '#### Restricting Movement to the Screen


    World setup, check. What next? Well, we should limit the movement of the Box2D
    bodies to within the visible screen area. For that, we''ll need a static body.
    The simplest way to create a static body is by using the world''s `CreateBody`
    method and an empty body definition:


    `// Define the static container body, which will provide the collisions at screen
    borders`

    `b2BodyDef containerBodyDef;`

    `b2Body* containerBody = world->CreateBody(&containerBodyDef);`


    Bodies are always created through the world''s `CreateBody` method. This ensures
    that the body''s memory is correctly allocated and freed. The `b2BodyDef` is a
    struct that holds all the data needed to create a body, such as position and the
    body type. By default, an empty body definition creates a static body at position
    0, 0.


    **NOTE:** The `&containerBodyDef` variable is passed with a leading `&` (ampersand)
    character to the `CreateBody` method. That''s C++ for “Give me the memory address
    of `containerBodyDef`.” If you look at the definition of the `CreateBody` method,
    it requires a pointer passed to it: `b2World::CreateBody(const b2BodyDef *def);`.
    Since pointers store a memory address, you can get that address of a nonpointer
    variable by prefixing it with the ampersand character.


    The body itself won''t do anything. To make it enclose the screen area, you''ll
    have to create a shape with four sides:


    `// Create the screen box sides by using a polygon assigning each side individually`

    `b2PolygonShape screenBoxShape;`

    `int density = 0;`


    `// Bottom`

    `screenBoxShape.SetAsEdge(lowerLeftCorner, lowerRightCorner);`

    `containerBody->CreateFixture(&screenBoxShape, density);`


    `// Top`

    `screenBoxShape.SetAsEdge(upperLeftCorner, upperRightCorner);`

    `containerBody->CreateFixture(&screenBoxShape, density);`


    `// Left side`

    `screenBoxShape.SetAsEdge(upperLeftCorner, lowerLeftCorner);`

    `containerBody->CreateFixture(&screenBoxShape, density);`


    `// Right side`

    `screenBoxShape.SetAsEdge(upperRightCorner, lowerRightCorner);`

    `containerBody->CreateFixture(&screenBoxShape, density);`


    You may notice the missing declarations for the corner variable names. I''ll get
    to them in a moment. First I''d like you to focus on how the `b2PolygonShape screenBoxShape`
    variable is reused. Each `SetAsEdge` method call is followed by a call to `containerBody->CreateFixture()`,
    which uses the `->` operator to denote that `containerBody` is a C-style pointer
    and passes `&screenBoxShape`. Since Box2D makes a copy of `screenBoxShape`, you
    can safely reuse the same shape to create all four sides enclosing the screen
    area without modifying or overriding the previous lines. Since the body is a static
    body (the default setting for Box2D bodies), `density` doesn''t matter and is
    set to `0`.


    **NOTE:** The `b2PolygonShape` class has a `SetAsBox` method that looks like it
    might make the definition of the screen area easier by simply providing the screen''s
    width and height. However, that would make the inside of the body a solid object,
    and any dynamic body added to the screen would actually be contained inside the
    solid shape. This would make the dynamic bodies try to move away from the collision,
    possibly at rapid speeds. The sides need to be created separately in order to
    make only the sides of the screen solid.


    Now we''ll move on to the missing variable declarations. Notice that the screen
    width and height is divided by a `PTM_RATIO` constant to convert them from pixels
    to meters:


    `// For the ground body we''ll need these values`

    `CGSize screenSize = [CCDirector sharedDirector].winSize;`

    `float widthInMeters = screenSize.width / PTM_RATIO;`

    `float heightInMeters = screenSize.height / PTM_RATIO;`

    `b2Vec2 lowerLeftCorner = b2Vec2(0, 0);`

    `b2Vec2 lowerRightCorner = b2Vec2(widthInMeters, 0);`

    `b2Vec2 upperLeftCorner = b2Vec2(0, heightInMeters);`


    `b2Vec2 upperRightCorner = b2Vec2(widthInMeters, heightInMeters);`


    Why meters, and what is `PTM_RATIO`? Box2D is optimized to work best with dimensions
    in the range of 0.1 to 10 meters. It is tuned for the metric system, so all distances
    are considered to be meters, all masses are in kilograms, and time is measured
    in—quite oddly—seconds. If you''re not familiar with the meters, kilograms, and
    seconds (MKS) system, don''t worry—you don''t have to meticulously convert yards
    into meters and pounds into kilograms. The conversion to meters is just a way
    to keep the distance values for Box2D in the desirable range of 0.1 to 10, and
    the masses used by bodies do not resemble real-world masses anyway. The masses
    of bodies will often need to be tweaked by feel rather than by using realistic
    weights.


    You should try to keep the dimensions of objects in your world as close to 1 meter
    as much as possible. That is not to say that you can''t have objects that are
    smaller than 0.1 meters or larger than 10 meters, but you may run into glitches
    and strange behavior if you create relatively small or large bodies.


    The `PTM_RATIO` is defined like this:


    `#define PTM_RATIO 32`


    It is used to define that 32 pixels on the screen equal 1 meter in Box2D. A box-shaped
    body that''s 32 pixels wide and high will be 1 meter wide and high. A body that''s
    4×4 pixels in size will be 0.125×0.125 meters in Box2D, while a relatively huge
    object of 256×256 pixels will be 8×8 meters in Box2D. The `PTM_RATIO` allows you
    to scale the size of Box2D objects down to the dimensions within which Box2D works
    best, and a `PTM_RATIO` of 32 is a good compromise for a screen area that may
    be as large as 1024×768 pixels on the iPad.


    #### Converting Points


    Note that the `b2Vec2struct` is different from `CGPoint`, which means you cannot
    use a `CGPoint` where a `b2Vec2` is required, and vice versa. In addition, Box2D
    points need to be converted to meters and back to pixels. To avoid making any
    mistakes, such as forgetting to convert from or to meters or simply making a typo
    and using the x coordinate twice, it''s highly recommended to wrap this repetitive
    code into convenience methods like these:


    `-(b2Vec2) toMeters:(CGPoint)point`

    `{`

    `    return b2Vec2(point.x / PTM_RATIO, point.y / PTM_RATIO);`

    `}`


    `-(CGPoint) toPixels:(b2Vec2)vec`

    `{`

    `    return ccpMult(CGPointMake(vec.x, vec.y), PTM_RATIO);`

    `}`


    This allows you to write the following code to easily convert between `CGPoint`
    and pixels to `b2Vec2` and meters:


    `// Box2D coordinates to Cocos2D point coordinates`

    `b2Vec2 vec = b2Vec2(200, 200);`

    `CGPoint pointFromVec = [self toPixels:vec];`


    `// Cocos2D point coordinates to Box2D coordinates                `

    `CGPoint point = CGPointMake(100, 100);`

    `b2Vec2 vecFromPoint = [self toMeters:point];`'
  trans: "\n### 限制移动至屏幕范围内\n\n世界搭建好了，下一步呢？嗯，我们应该将 Box2D 刚体的移动限制在可见的屏幕区域内。为此，我们需要一个静态刚体。创建静态刚体最简单的方法是使用世界的\
    \ `CreateBody` 方法和一个空的刚体定义：\n\n```\n// 定义静态容器刚体，它将提供屏幕边界处的碰撞\nb2BodyDef containerBodyDef;\n\
    b2Body* containerBody = world->CreateBody(&containerBodyDef);\n```\n\n刚体总是通过世界的\
    \ `CreateBody` 方法创建的。这确保了刚体内存的正确分配和释放。`b2BodyDef` 是一个结构体，包含了创建刚体所需的所有数据，例如位置和刚体类型。默认情况下，一个空的刚体定义会在位置\
    \ (0, 0) 处创建一个静态刚体。\n\n**注意：** `&containerBodyDef` 变量在传递给 `CreateBody` 方法时，前面带有一个\
    \ `&`（取地址符）字符。这是 C++ 中表示“给我 `containerBodyDef` 的内存地址”的写法。如果你查看 `CreateBody` 方法的定义，它需要一个指针作为参数：`b2World::CreateBody(const\
    \ b2BodyDef *def);`。由于指针存储的是内存地址，你可以通过在非指针变量前加上取地址符来获取其地址。\n\n刚体本身不会做任何事情。要让它包围屏幕区域，你需要创建一个具有四个边的形状：\n\
    \n```\n// 通过单独分配每条边来创建屏幕的盒装边界\nb2PolygonShape screenBoxShape;\nint density = 0;\n\
    \n// 底部\nscreenBoxShape.SetAsEdge(lowerLeftCorner, lowerRightCorner);\ncontainerBody->CreateFixture(&screenBoxShape,\
    \ density);\n\n// 顶部\nscreenBoxShape.SetAsEdge(upperLeftCorner, upperRightCorner);\n\
    containerBody->CreateFixture(&screenBoxShape, density);\n\n// 左侧\nscreenBoxShape.SetAsEdge(upperLeftCorner,\
    \ lowerLeftCorner);\ncontainerBody->CreateFixture(&screenBoxShape, density);\n\
    \n// 右侧\nscreenBoxShape.SetAsEdge(upperRightCorner, lowerRightCorner);\ncontainerBody->CreateFixture(&screenBoxShape,\
    \ density);\n```\n\n你可能注意到四个角落的变量名缺少声明。我稍后会讲到它们。首先，我希望你关注 `b2PolygonShape screenBoxShape`\
    \ 变量是如何被重用的。每次调用 `SetAsEdge` 方法后，紧接着都会调用 `containerBody->CreateFixture()`，这里使用\
    \ `->` 运算符表示 `containerBody` 是一个 C 风格指针，并传递了 `&screenBoxShape`。由于 Box2D 会复制一份\
    \ `screenBoxShape`，你可以安全地重用同一个形状来创建包围屏幕的所有四条边，而不会修改或覆盖之前的线条。由于该刚体是静态刚体（这是 Box2D\
    \ 刚体的默认设置），`density`（密度）无关紧要，因此设置为 `0`。\n\n**注意：** `b2PolygonShape` 类有一个 `SetAsBox`\
    \ 方法，通过简单提供屏幕的宽度和高度，它似乎可以更简单地定义屏幕区域。然而，这会使刚体内部变成一个实心物体，添加到屏幕上的任何动态刚体实际上都会被包含在这个实心形状内部。这将导致动态刚体试图从碰撞中移开，速度可能会非常快。为了仅让屏幕的边是实心的，这些边需要单独创建。\n\
    \n现在我们来处理缺失的变量声明。请注意，屏幕的宽度和高度被除以一个常数 `PTM_RATIO`，以将其从像素转换为米：\n\n```\n// 对于地面刚体，我们需要这些值\n\
    CGSize screenSize = [CCDirector sharedDirector].winSize;\nfloat widthInMeters\
    \ = screenSize.width / PTM_RATIO;\nfloat heightInMeters = screenSize.height /\
    \ PTM_RATIO;\nb2Vec2 lowerLeftCorner = b2Vec2(0, 0);\nb2Vec2 lowerRightCorner\
    \ = b2Vec2(widthInMeters, 0);\nb2Vec2 upperLeftCorner = b2Vec2(0, heightInMeters);\n\
    b2Vec2 upperRightCorner = b2Vec2(widthInMeters, heightInMeters);\n```\n\n为什么用米？`PTM_RATIO`\
    \ 又是什么？Box2D 被优化为在 0.1 到 10 米的尺寸范围内效果最佳。它针对公制系统进行了调优，因此所有距离都被视为米，所有质量都以千克为单位，而时间则——相当奇怪地——以秒为单位。如果你不熟悉米-千克-秒\
    \ (MKS) 单位制，别担心——你不需要费心去把码转换为米、把磅转换为千克。转换为米只是一种方法，用于将 Box2D 的距离值保持在 0.1 到 10 的理想范围内，而且刚体所使用的质量无论如何都不代表现实世界的质量。刚体的质量通常需要凭感觉调整，而不是使用真实的重量。\n\
    \n你应该尽量使世界中物体的尺寸尽可能接近 1 米。这并不是说你不能有小于 0.1 米或大于 10 米的物体，但如果你创建相对较小或较大的刚体，可能会遇到故障或奇怪的行为。\n\
    \n`PTM_RATIO` 是这样定义的：\n\n```\n#define PTM_RATIO 32\n```\n\n它用于定义屏幕上的 32 个像素等于\
    \ Box2D 中的 1 米。一个宽高均为 32 像素的盒状刚体，其宽度和高度就是 1 米。一个 4×4 像素的刚体在 Box2D 中就是 0.125×0.125\
    \ 米，而一个相对巨大的 256×256 像素的物体在 Box2D 中则是 8×8 米。`PTM_RATIO` 允许你将 Box2D 物体的大小缩放到 Box2D\
    \ 工作效果最佳的尺寸范围内。对于可能在 iPad 上达到 1024×768 像素的屏幕区域，`PTM_RATIO` 设为 32 是一个很好的折中方案。\n\
    \n### 转换点\n\n请注意，`b2Vec2` 结构体与 `CGPoint` 不同，这意味着你不能在需要 `b2Vec2` 的地方使用 `CGPoint`，反之亦然。此外，Box2D\
    \ 的点需要被转换为米，以及从米转换回像素。为了避免犯错，比如忘记从米转换或转换为米，或者仅仅是打错字重复使用了 x 坐标，强烈建议将这段重复的代码封装成如下便捷方法：\n\
    \n```\n-(b2Vec2) toMeters:(CGPoint)point\n{\n    return b2Vec2(point.x / PTM_RATIO,\
    \ point.y / PTM_RATIO);\n}\n\n-(CGPoint) toPixels:(b2Vec2)vec\n{\n    return ccpMult(CGPointMake(vec.x,\
    \ vec.y), PTM_RATIO);\n}\n```\n\n这使得你可以编写如下代码，轻松地在 `CGPoint` 和像素坐标与 `b2Vec2` 和米制坐标之间进行转换：\n\
    \n```\n// Box2D 坐标转换为 Cocos2D 点坐标\nb2Vec2 vec = b2Vec2(200, 200);\nCGPoint pointFromVec\
    \ = [self toPixels:vec];\n\n// Cocos2D 点坐标转换为 Box2D 坐标\nCGPoint point = CGPointMake(100,\
    \ 100);\nb2Vec2 vecFromPoint = [self toMeters:point];\n```\n"
- fmt: "# Adding Boxes to the Box2D World\n\nWith a static body containing the objects\
    \ within screen boundaries, all that's missing is something to be kept within\
    \ the screen boundaries. How about little boxes, then?\n\nI've added David Gervais'\
    \ orthogonal tileset image `dg_grounds32.png` to the `Resources` folder of the\
    \ `PhysicsBox2D01` project. The tiles are 32×32 pixels, so they'll make perfect\
    \ 1×1-meter boxes. [Listing 12–3](#Chapter12.html#list_12_3) is the code in the\
    \ `init` method that adds the texture and creates a couple boxes. It also schedules\
    \ the `update` method, which is needed to update the box sprite positions, and\
    \ it enables touch so that the user can tap the screen to create a new box.\n\n\
    **Listing 12–3.** *Adding an Initial Set of Boxes*\n\n```\n// Use the orthogonal\
    \ tileset for the little boxes\nCCSpriteBatchNode* batch = [CCSpriteBatchNode\n\
    \    batchNodeWithFile:@\"dg_grounds32.png\"\n       capacity:150];\n\n[self addChild:batch\
    \ z:0 tag:kTagBatchNode];\n\n// Add a few objects initially\nfor (int i = 0; i\
    \ < 11; i++)\n{\n    [self addNewSpriteAt:CGPointMake(screenSize.width / 2, screenSize.height\
    \ / 2)];\n}\n\n[self scheduleUpdate];\nself.isTouchEnabled = YES;\n```\n\nThe\
    \ `addNewSpriteAt` method shown in [Listing 12–4](#Chapter12.html#list_12_4) is\
    \ part of the cocos2d Box2D application template project but slightly modified\
    \ to make use of all the tiles in the tileset.\n\n**Listing 12–4.** *Adding a\
    \ New Dynamic Body with a Sprite*\n\n```\n-(void) addNewSpriteAt:(CGPoint)pos\n\
    {\n    CCSpriteBatchNode* batch =\n        (CCSpriteBatchNode*) [self getChildByTag:kTagBatchNode];\n\
    \n    int idx = CCRANDOM_0_1() * TILESET_COLUMNS;\n    int idy = CCRANDOM_0_1()\
    \ * TILESET_ROWS;\n    CGRect tileRect = CGRectMake(TILESIZE * idx, TILESIZE *\
    \ idy, TILESIZE, TILESIZE);\n    CCSprite* sprite = [CCSprite spriteWithBatchNode:batch\
    \ rect:tileRect];\n    sprite.position = pos;\n    [batch addChild:sprite];\n\n\
    \    // Create a body definition and set it to be a dynamic body\n    b2BodyDef\
    \ bodyDef;\n    bodyDef.type = b2_dynamicBody;\n    bodyDef.position = [self toMeters:pos];\n\
    \    bodyDef.userData = sprite;\n    b2Body* body = world->CreateBody(&bodyDef);\n\
    \n    // Define a box shape and assign it to the body fixture\n    b2PolygonShape\
    \ dynamicBox;\n    float tileInMeters = TILESIZE / PTM_RATIO;\n    dynamicBox.SetAsBox(tileInMeters\
    \ * 0.5f, tileInMeters * 0.5f);\n\n    b2FixtureDef fixtureDef;\n    fixtureDef.shape\
    \ = &dynamicBox;        \n    fixtureDef.density = 0.3f;\n    fixtureDef.friction\
    \ = 0.5f;\n    fixtureDef.restitution = 0.6f;\n    body->CreateFixture(&fixtureDef);\n\
    }\n```\n\nFirst, a sprite is created from the `CCSpriteBatchNode` by using `CCSprite`'s\
    \ `spriteWithBatchNode` initializer and supplying a `CGRect` that is 32×32 pixels\
    \ in size, to randomly pick one of the tileset's tiles as the sprite's image.\n\
    \nThen a body is created, but this time the `b2BodyDef` type property is set to\
    \ `b2_dynamicBody`, which makes it a dynamic body that can move around and collide\
    \ with other dynamic bodies. The previously created sprite is assigned to the\
    \ `userData` property. Later, when you are iterating over the bodies in the world,\
    \ this allows you to quickly access the body's sprite.\n\nThe body's shape is\
    \ a `b2PolygonShape` set to a box shape that is half a meter in size. The `SetAsBox`\
    \ method creates a box shape that is twice the given width and height, so the\
    \ coordinates need to be divided by 2—or, as in this case, multiplied by `0.5f`\
    \ to create a box shape whose sides are 1 meter wide and high.\n\nThe dynamic\
    \ body also needs a fixture that contains the body's essential parameters—first\
    \ and foremost the shape but also the density, friction, and restitution—which\
    \ influence how the body moves and bounces around in the world. Consider the fixture\
    \ to be a set of data used by bodies.\n\n# Connecting Sprites with Bodies\n\n\
    The box sprites won't follow their physics bodies automatically, and the bodies\
    \ won't do anything unless you regularly call the `Step` method of the Box2D world.\
    \ You then have to update the sprite positions by taking the body position and\
    \ angle and assigning it to the sprite. This is done in the `update` method shown\
    \ in [Listing 12–5](#Chapter12.html#list_12_5).\n\n**Listing 12–5.** *Updating\
    \ Each Body's Sprite Position and Rotation*\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    // Advance the physics world by one step, using fixed time steps\n    float\
    \ timeStep = 0.03f;\n    int32 velocityIterations = 8;\n    int32 positionIterations\
    \ = 1;\n    world->Step(timeStep, velocityIterations, positionIterations);\n\n\
    \    for (b2Body* body = world->GetBodyList(); body != nil; body = body->GetNext())\n\
    \    {\n        CCSprite* sprite = (CCSprite*)body->GetUserData();\n        if\
    \ (sprite!= NULL)\n        {\n            sprite.position = [self toPixels:body->GetPosition()];\n\
    \            float angle = body->GetAngle();\n            sprite.rotation = CC_RADIANS_TO_DEGREES(angle)\
    \ * -1;\n        }\n    }\n}\n```\n\nThe Box2D world is animated by regularly\
    \ calling the `Step` method. It takes three parameters. The first is `timeStep`,\
    \ which tells Box2D how much time has passed since the last step. It directly\
    \ affects the distance that objects will move in this step. For games, it is not\
    \ recommended to pass the delta time as `timeStep`, because the delta time fluctuates,\
    \ and so the speed of the physics bodies will not be constant. This effect rears\
    \ its ugly head when the device may be taking a tenth of a second to do background\
    \ processing, such as sending or receiving an e-mail in the background. This can\
    \ make all physics objects move large distances in the next frame. In a game,\
    \ you'd rather have the game stop for a tenth of a second and then carry on where\
    \ you left off. Without a fixed time step, the physics engine would try to cope\
    \ with a short interruption by moving all objects based on the time difference.\
    \ If the time difference is large, the objects will move a lot more in a single\
    \ frame, and that can lead to them suddenly moving a large distance.\n\nThe second\
    \ and third parameters to the `Step` method are the number of iterations. They\
    \ determine the accuracy of the physics simulation and also the time it takes\
    \ to calculate the movement of the bodies. It's a trade-off between speed and\
    \ accuracy. In the case of position iterations, you can safely err on the side\
    \ of speed and require only a single iteration—more position accuracy is not normally\
    \ needed in games unless you experience objects not coming to rest, colliding\
    \ in unnatural ways, or missing collision entirely. Velocity is more important,\
    \ however; a good starting point for velocity iterations is eight. More than ten\
    \ velocity iterations have no discernable effect in games, but just one to four\
    \ iterations won't be enough to get a stable simulation. The fewer the velocity\
    \ iterations, the more bumpily and restlessly the objects will behave. I encourage\
    \ you to experiment with these values.\n\nAfter the world has advanced one step,\
    \ the `for` loop iterates over all of the world's bodies using the `world->GetBodyList`\
    \ and `body->GetNext` methods. For each body, its user data is returned and cast\
    \ to a `CCSprite` pointer. If it exists, the body's position is converted to pixels\
    \ and assigned to the sprite's position so that the sprite moves along with the\
    \ body. Likewise, the body's angle is obtained; because that measurement is in\
    \ radians, it's converted to degrees using cocos2d's `CC_RADIANS_TO_DEGREES` method\
    \ and multiplied by –1 to rotate the sprites in the same direction as the body."
  raw: '#### Adding Boxes to the Box2D World


