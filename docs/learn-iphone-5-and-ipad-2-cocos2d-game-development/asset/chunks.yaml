- fmt: "如果你完全不需要任何透明度（例如用于背景图片），可以使用 `RGB565` 格式，该格式为红色提供5位，绿色提供6位，蓝色通道提供5位。它不使用 Alpha\
    \ 通道。绿色有6位而其他两个颜色通道只有5位，这与我们狩猎采集时代的背景有关。我们的视网膜更擅长区分绿色调，因此额外的位数被分配给了绿色通道，这样一来我们就更容易察觉到“缺失的颜色位数”。\n\
    \n`PVRTC2` 和 `PVRTC4` 图像格式分别提供每像素2位和4位，且没有 Alpha 通道。这种格式应仅用于单调或深色背景图像，并且当你确实需要节省内存和提升渲染速度时使用，因为这些格式会严重影响图像质量。可以想象一下\
    \ JPEG 图像在较低质量设置下的伪影。\n\n“抖动”选项允许你在图像格式需要降低色彩深度时优化图像质量。抖动通过在大面积区域内随机分布具有相似色调的像素来模拟渐变。这能有效减少图像色彩深度降低时的“条带”效应。由于所有抖动选项在\
    \ TexturePacker 预览中都是实时应用的，且不会影响源图像，你可以尝试不同的抖动算法，以找出提供最佳质量的那一种。\n\n**提示：** 在评估抖动算法时，请记住最终的质量测试当然是在设备上运行你的游戏。有些在电脑屏幕上清晰可见的伪影，在设备上可能并不明显。这主要是因为电脑屏幕的色彩配置文件与设备不同，原因包括手动调整（例如亮度、对比度、色调）、显示技术的限制，或者显示器老化导致的色彩鲜艳度变化。这也意味着单一设备并不能代表游戏的最终视觉效果。至少，你应该在设备亮度设置为最低和最高水平时测试游戏。\n\
    \n完成**输出**设置后，只需点击**发布**，TexturePacker 就会将 HD 和 SD 纹理以及相应的 plist 文件写入你的 Resources\
    \ 文件夹。\n\n#### 将纹理图集与 cocos2d 一起使用\n\n接下来要做的是将新的纹理图集添加到 Xcode 项目的 Resource 组中。Cocos2d\
    \ 只需要 `game-art-hd.pvr.ccz`、`game-art.pvr.ccz`、`game-art-hd.plist` 和 `game-art.plist`\
    \ 这四个文件用于纹理图集。TexturePacker 的 `.tps` 文件和单个源图像文件不应添加到项目中。[代码清单6-13](#Chapter06.html#list_6_13)\
    \ 中的代码现在取代了[代码清单6-11](#Chapter06.html#list_6_11) 中的代码。\n\n**代码清单6-13.** *飞船类现在使用纹理图集作为其初始帧和动画*\n\
    \n```\n// Load the texture atlas sprite frames; this also loads the Texture with\
    \ the same name\nCCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n\
    [frameCache addSpriteFramesWithFile:@\"game-art.plist\"];\n\n// Loading the ship's\
    \ sprite using a sprite frame name (e.g., the file name)\nif ((self = [super initWithSpriteFrameName:@\"\
    ship.png\"]))\n{\n    // Load the ship's animation frames\n    NSMutableArray*\
    \ frames = [NSMutableArray arrayWithCapacity:5];\n    for (int i = 0; i < 5; i++)\n\
    \    {\n        NSString* file = [NSString stringWithFormat:@\"ship-anim%i.png\"\
    , i];\n\n        CCSpriteFrame* frame = [frameCache spriteFrameByName:file];\n\
    \        [frames addObject:frame];\n    }\n\n    // Create an animation object\
    \ from all the sprite animation frames\n    CCAnimation* anim = [CCAnimation animationWithFrames:frames\
    \ delay:0.08f];\n\n    // Run the animation by using the CCAnimate action\n  \
    \  CCAnimate* animate = [CCAnimate actionWithAnimation:anim];\n    CCRepeatForever*\
    \ repeat = [CCRepeatForever actionWithAction:animate];\n    [self runAction:repeat];\n\
    }\n```\n\n在代码的最开始，我将 `sharedSpriteFrameCache` 赋值给一个局部变量。这样做的唯一原因是 `[CCSpriteFrameCachesharedSpriteFrameCache]`\
    \ 这个单例访问器写起来相当冗长。\n\n要加载纹理图集，你可以使用 `CCSpriteFrameCache` 的方法 `addSpriteFramesWithFile`，并向它传递该纹理图集的\
    \ `.plist` 文件名。`CCSpriteFrameCache` 会加载精灵帧，同时也会尝试加载纹理。Cocos2d 会自动为 Retina 显示屏设备尝试加载带有\
    \ `-hd` 后缀的文件。\n\n**注意：** 如果你使用较大的纹理图集纹理（尺寸为 1024×1024 或更大），你应该在游戏开始前加载此纹理。加载这样大的纹理需要一点时间（在最坏的情况下，会使游戏冻结几秒钟）。\n\
    \n由于 `Ship` 类继承自 `CCSprite`，并且我希望它使用纹理图集中的 `ship.png` 图像，因此我将其初始化方法改为使用 `initWithSpriteFrameName`。这与使用精灵帧名称从纹理图集初始化标准\
    \ `CCSprite` 的代码完全相同。\n\n```\nCCSprite* sprite = [CCSprite spriteWithSpriteFrameName:@\"\
    ship.png\"];\n```\n\n如果你加载了多个纹理图集，并且其中只有一个包含名为 `ship.png` 的精灵帧，Cocos2d 仍然会找到该帧，并为精灵使用正确的纹理。本质上，你可以像处理图像文件名一样，通过名称来使用精灵帧，但你不需要知道哪个纹理包含了实际的图像（当然，除非你使用\
    \ `CCSpriteBatchNode`，它要求其所有子节点使用相同的纹理）。\n\n在[代码清单6-13](#Chapter06.html#list_6_13)\
    \ 中，我摆脱了初始化 `CCSpriteFrame` 对象所需的大部分额外代码。不再需要加载 `Texture2D` 并定义纹理的尺寸。相反，我可以简单地调用\
    \ `[CCSpriteFramespriteFrameByName:file]` 来创建具有相应名称的精灵帧。"
  raw: 'If you do not need any transparency at all, like for background images, you
    can use the **RGB565** format, which provides 5 bits for red, 6 bits for green,
    and 5 bits for the blue color channel. It does not use an alpha channel. The fact
    that there are 6 bits for green colors and only 5 bits for the other two color
    channels has something to do with our hunter-gatherer background. Our retina is
    simply trained to differentiate better between green color tones, so that extra
    bit is provided to the green channel where we would notice a “missing color bit”
    more easily.


    The `PVRTC2` and `PVRTC4` image formats provide 2 and 4 bits per pixel, respectively,
    and no alpha channel. This format should be used only for monotonous or dark background
    images and if you really need to squeeze out some memory and rendering speed since
    those formats come with a severe impact on image quality. Think of the artifacts
    seen in JPEG images with a relatively low-quality setting.


    The Dithering option allows you to optimize the image quality whenever the image
    format requires the image’s color depth to be reduced. Dithering emulates gradients
    by randomly distributing pixels with similar color tones across a larger area.
    This effectively reduces the “banding” effect when the color depth of an image
    is reduced. Since all of the dithering options are applied in real time in the
    TexturePacker preview without affecting your source images, you can just try the
    various dithering algorithms to find out which provides the best quality.


    **TIP:** While evaluating dithering algorithms, keep in mind that the ultimate
    quality test is of course your game running on a device. Some artifacts that are
    clearly visible on your computer screen may not be noticeable on the device. In
    particular, this is because the color profile of your computer screen will be
    different from the device’s color profile, either through manual adjustments (for
    example, brightness, contrast, color tone), limitations imposed by the display
    technology, or a change in color vibrancy as the display ages. That also means
    a single device is not representative for the final look of the game. At the very
    least, you should test the game with the device brightness set to minimum and
    maximum levels.


    When you are done with the **Output** settings, simply click **Publish**, and
    TexturePacker will write the HD and SD textures and the accompanying plist files
    to your Resources folder.


    #### Using the Texture Atlas with cocos2d


    The next thing you should do is add the new texture atlas to the Xcode project’s
    Resource group. Cocos2d only needs the game-art-hd.pvr.ccz, game-art.pvr.ccz,
    game-art-hd.plist, and game-art.plist files for the texture atlas. The TexturePacker
    .tps files and individual source image files should not be added to your project.
    The code in [Listing 6–13](#Chapter06.html#list_6_13) now replaces the code in
    [Listing 6–11](#Chapter06.html#list_6_11).


    **Listing 6–13.** *The Ship Class Now Uses the Texture Atlas for Its Initial Frame
    and the Animation*


    `// Load the texture atlas sprite frames; this also loads the Texture with the
    same name`

    `CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];`

    `[frameCache addSpriteFramesWithFile:@"game-art.plist"];`


    `// Loading the ship''s sprite using a sprite frame name (e.g., the file name)`

    `if ((self = [super initWithSpriteFrameName:@"ship.png"]))`

    `{`

    `    // Load the ship''s animation frames`

    `    NSMutableArray* frames = [NSMutableArray arrayWithCapacity:5];`

    `    for (int i = 0; i < 5; i++)`

    `    {`

    `        NSString* file = [NSString stringWithFormat:@"ship-anim%i.png", i];`


    `        CCSpriteFrame* frame = [frameCache spriteFrameByName:file];`

    `        [frames addObject:frame];`

    `    }`


    `    // Create an animation object from all the sprite animation frames`

    `    CCAnimation* anim = [CCAnimation animationWithFrames:frames delay:0.08f];`


    `    // Run the animation by using the CCAnimate action`

    `    CCAnimate* animate = [CCAnimate actionWithAnimation:anim];`

    `    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:animate];`

    `    [self runAction:repeat];`

    `}`


    At the very beginning of the code, I assigned the `sharedSpriteFrameCache` to
    a local variable. The only reason to do so is that the `[CCSpriteFrameCachesharedSpriteFrameCache]`
    singleton accessor is pretty lengthy to write.


    To load a texture atlas, you use the `CCSpriteFrameCache`’s method `addSpriteFramesWithFile`
    and pass it the name of the .plist file for this texture atlas. The `CCSpriteFrameCache`
    will load the sprite frames and will also try to load the texture. Cocos2d automatically
    tries to load the -hd suffixed files on Retina display devices.


    **NOTE:** If you’re using a large texture atlas texture—with dimensions of 1024×1024
    or higher—you should load this texture before game play begins. It will take a
    moment to load such a large texture (in the worst case it will freeze the game
    for a few seconds).


    Because the `Ship` class derives from `CCSprite` and because I wanted it to use
    the ship.png image from the texture atlas, I changed its initialization to use
    the `initWithSpriteFrameName` method. This is identical to the code that initializes
    a regular `CCSprite` from a texture atlas using a sprite frame name.


    `CCSprite* sprite = [CCSprite spriteWithSpriteFrameName:@"ship.png"];`


    If you load several texture atlases and only one contains the sprite frame with
    the name ship.png, cocos2d will still find that frame and use the correct texture
    for the sprite. In essence, you work with the sprite frames by name as if they
    were the image’s file names, but you do not need to know which texture contains
    the actual image (unless you use a `CCSpriteBatchNode`, of course, which requires
    that all of its children use the same texture).


    In [Listing 6–13](#Chapter06.html#list_6_13) I could get rid of most of the extra
    code required to initialize a `CCSpriteFrame` object. There’s no need any more
    to load a `Texture2D` and define the texture’s dimensions. Instead, I simply call
    `[CCSpriteFramespriteFrameByName:file]` to create the sprite frame with the corresponding
    name.'
  trans: "\n如果你完全不需要任何透明度（例如用于背景图片），可以使用 `RGB565` 格式，该格式为红色提供 5 位，绿色提供 6 位，蓝色通道提供\
    \ 5 位。它不使用 Alpha 通道。绿色有 6 位而其他两个颜色通道只有 5 位，这与我们狩猎采集时代的背景有关。我们的视网膜更擅长区分绿色调，因此额外的位数被分配给了绿色通道，这样一来我们就更容易察觉到“缺失的颜色位数”。\n\
    \n`PVRTC2` 和 `PVRTC4` 图像格式分别提供每像素 2 位和 4 位，且没有 Alpha 通道。这种格式应仅用于单调或深色背景图像，并且当你确实需要节省内存和提升渲染速度时使用，因为这些格式会严重影响图像质量。可以想象一下\
    \ JPEG 图像在较低质量设置下的伪影。\n\n“抖动”选项允许你在图像格式需要降低色彩深度时优化图像质量。抖动通过在大面积区域内随机分布具有相似色调的像素来模拟渐变。这能有效减少图像色彩深度降低时的“条带”效应。由于所有抖动选项在\
    \ TexturePacker 预览中都是实时应用的，且不会影响源图像，你可以尝试不同的抖动算法，以找出提供最佳质量的那一种。\n\n**提示：** 在评估抖动算法时，请记住最终的质量测试当然是在设备上运行你的游戏。有些在电脑屏幕上清晰可见的伪影，在设备上可能并不明显。这主要是因为电脑屏幕的色彩配置文件与设备不同，原因包括手动调整（例如亮度、对比度、色调）、显示技术的限制，或者显示器老化导致的色彩鲜艳度变化。这也意味着单一设备并不能代表游戏的最终视觉效果。至少，你应该在设备亮度设置为最低和最高水平时测试游戏。\n\
    \n完成**输出**设置后，只需点击**发布**，TexturePacker 就会将 HD 和 SD 纹理以及相应的 plist 文件写入你的 Resources\
    \ 文件夹。\n\n#### 将纹理图集与 cocos2d 一起使用\n\n接下来要做的是将新的纹理图集添加到 Xcode 项目的 Resource 组中。Cocos2d\
    \ 只需要 `game-art-hd.pvr.ccz`、`game-art.pvr.ccz`、`game-art-hd.plist` 和 `game-art.plist`\
    \ 这四个文件用于纹理图集。TexturePacker 的 `.tps` 文件和单个源图像文件不应添加到项目中。代码清单 6-13 中的代码现在取代了代码清单\
    \ 6-11 中的代码。\n\n**代码清单 6-13.** *飞船类现在使用纹理图集作为其初始帧和动画*\n\n```\n// Load the texture\
    \ atlas sprite frames; this also loads the Texture with the same name\nCCSpriteFrameCache*\
    \ frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];\n[frameCache addSpriteFramesWithFile:@\"\
    game-art.plist\"];\n\n// Loading the ship's sprite using a sprite frame name (e.g.,\
    \ the file name)\nif ((self = [super initWithSpriteFrameName:@\"ship.png\"]))\n\
    {\n    // Load the ship's animation frames\n    NSMutableArray* frames = [NSMutableArray\
    \ arrayWithCapacity:5];\n    for (int i = 0; i < 5; i++)\n    {\n        NSString*\
    \ file = [NSString stringWithFormat:@\"ship-anim%i.png\", i];\n\n        CCSpriteFrame*\
    \ frame = [frameCache spriteFrameByName:file];\n        [frames addObject:frame];\n\
    \    }\n\n    // Create an animation object from all the sprite animation frames\n\
    \    CCAnimation* anim = [CCAnimation animationWithFrames:frames delay:0.08f];\n\
    \n    // Run the animation by using the CCAnimate action\n    CCAnimate* animate\
    \ = [CCAnimate actionWithAnimation:anim];\n    CCRepeatForever* repeat = [CCRepeatForever\
    \ actionWithAction:animate];\n    [self runAction:repeat];\n}\n```\n\n在代码的最开始，我将\
    \ `sharedSpriteFrameCache` 赋值给一个局部变量。这样做的唯一原因是 `[CCSpriteFrameCache sharedSpriteFrameCache]`\
    \ 这个单例访问器写起来相当冗长。\n\n要加载纹理图集，你可以使用 `CCSpriteFrameCache` 的方法 `addSpriteFramesWithFile`，并向它传递该纹理图集的\
    \ `.plist` 文件名。`CCSpriteFrameCache` 会加载精灵帧，同时也会尝试加载纹理。Cocos2d 会自动为 Retina 显示屏设备尝试加载带有\
    \ `-hd` 后缀的文件。\n\n**注意：** 如果你使用较大的纹理图集纹理（尺寸为 1024×1024 或更大），你应该在游戏开始前加载此纹理。加载这样大的纹理需要一点时间（在最坏的情况下，会使游戏冻结几秒钟）。\n\
    \n由于 `Ship` 类继承自 `CCSprite`，并且我希望它使用纹理图集中的 `ship.png` 图像，因此我将其初始化方法改为使用 `initWithSpriteFrameName`。这与使用精灵帧名称从纹理图集初始化标准\
    \ `CCSprite` 的代码完全相同。\n\n```\nCCSprite* sprite = [CCSprite spriteWithSpriteFrameName:@\"\
    ship.png\"];\n```\n\n如果你加载了多个纹理图集，并且其中只有一个包含名为 `ship.png` 的精灵帧，Cocos2d 仍然会找到该帧，并为精灵使用正确的纹理。本质上，你可以像处理图像文件名一样，通过名称来使用精灵帧，但你不需要知道哪个纹理包含了实际的图像（当然，除非你使用\
    \ `CCSpriteBatchNode`，它要求其所有子节点使用相同的纹理）。\n\n在代码清单 6-13 中，我摆脱了初始化 `CCSpriteFrame`\
    \ 对象所需的大部分额外代码。不再需要加载 `Texture2D` 并定义纹理的尺寸。相反，我可以简单地调用 `[CCSpriteFrame spriteFrameByName:file]`\
    \ 来创建具有相应名称的精灵帧。\n"
- fmt: '#### Updating the CCAnimation Helper Category


    While the code to create a `CCAnimation` could be reduced significantly by using
    a texture atlas, it’s still worthwhile to encapsulate this code into the `CCAnimationHelper`
    class. After all, one line of code is still less than five lines, especially if
    you would otherwise use the same five lines of code everywhere. Without further
    ado, [Listing 6–14](#Chapter06.html#list_6_14) shows the extended `CCAnimation`
    Helper interface declaration, which adds the `animationWithFrame` method.


    **Listing 6–14.** *The @interface for the CCAnimation Helper Category*


    ```objectivec

    @interface CCAnimation (Helper)

    +(CCAnimation*) animationWithFile:(NSString*)name

                           frameCount:(int)frameCount

                                delay:(float)delay;


    +(CCAnimation*) animationWithFrame:(NSString*)frame

                            frameCount:(int)frameCount

                                 delay:(float)delay;

    @end

    ```


    This code is essentially the same method using the same parameters, except that
    this method uses sprite frames instead of file names. The implementation is nothing
    spectacular and is very similar to the `animationWithFile` method shown in [Listing
    6–15](#Chapter06.html#list_6_15).


    **Listing 6–15.** *The animationWithFrame Helper Method Makes It Easier to Create
    an Animation*


    ```objectivec

    // Creates an animation from sprite frames

    +(CCAnimation*) animationWithFrame:(NSString*)frame

                            frameCount:(int)frameCount

                                 delay:(float)delay

    {

        // load the ship''s animation frames as textures and create a sprite frame

        NSMutableArray* frames = [NSMutableArray arrayWithCapacity:frameCount];

        for (int i = 0; i < frameCount; i++)

        {

            NSString* file = [NSString stringWithFormat:@"%@%i.png", frame, i];

            CCSpriteFrameCache* frameCache = [CCSpriteFrameCache sharedSpriteFrameCache];

            CCSpriteFrame* frame = [frameCache spriteFrameByName:file];

            [frames addObject:frame];

        }


        // Return an animation object from all the sprite animation frames

        return [CCAnimation animationWithFrames:frames delay:delay];

    }

    ```


    The big plus is now, once again, that you can create an animation from a texture
    atlas using sprite frame names with just one line of code:


    ```objectivec

    // Create an animation object from all the sprite animation frames

    CCAnimation* anim = [CCAnimation animationWithFrame:@"ship-anim"

                                             frameCount:5

                                                  delay:0.08f];

    ```


    The much, much bigger plus is, however, that you can now work with your animations
    as single files and only later create a texture atlas. All you have to do is to
    change one line of code from using `animationWithFile` to the `animationWithFrame`
    method. This allows you to quickly prototype animations using individual files,
    and only when you’re satisfied will you pack the animation frames into a texture
    atlas and load the animation images from it.


    You’ll find this code in the project `Sprites06_WithAnimHelper`.


    #### All into One and One for All


    Whenever possible, you should add all your game’s images into one texture atlas
    or as few as possible. It is more effective both from a workflow perspective and
    for performance to use three texture atlases with dimensions of 1024×1024 than
    20 smaller ones.


    Unlike code, which you should separate into distinct logical components, with
    a texture atlas your goal should be to put as many images as possible into the
    same texture atlas while trying to reduce the wasted space of each texture atlas
    as much as possible.


    It may seem logical to use one texture atlas for your player’s images; another
    for monster A, B, and C and their animations; and so on. But that would mean more
    draw calls. However, that is helpful only if you have a huge number of images
    for each game object and you want to be selective about which images to load into
    memory at any one time. One such scenario might be a shoot-’em-up game with different
    worlds where you know that each world has separate types of enemies. In that case,
    it makes sense not to mix and match enemies of different worlds into the same
    texture atlas. Otherwise, just for organization’s sake, you should not split up
    your texture atlases by game objects but rather fill each texture atlas as much
    as possible.


    As long as your game’s images can fit into three or four texture atlases of 1024×1024
    size, you should just put all the images into those texture atlases and load them
    up front. This will use 12MB to 16MB of memory for your textures. Your actual
    program code and other assets such as audio files don’t take up that much space,
    so you should be able to keep these texture atlases in memory even on first- and
    second-generation iOS devices with just 24MB of texture memory. Newer devices
    have no texture memory limit.


    Once you pass that point, however, you need a better strategy to handle your texture
    memory. One such strategy, as mentioned earlier, could be to divide your game’s
    images into worlds and load only the texture atlases needed for the current world.
    This will introduce a short delay when a new world is loaded and would be a good
    use for the `LoadingScene` described in [Chapter 5](#Chapter05.html#ch5).


    Since cocos2d automatically caches all images, you’ll need a way to specifically
    unload textures that you know you don’t need. You can rely on cocos2d to do that
    for you:


    ```objectivec

    [[CCSpriteFrameCache sharedSpriteFrameCache] removeUnusedSpriteFrames];

    [[CCTextureCache sharedTextureCache] removeUnusedTextures];

    ```


    Obviously you should call these methods only when there are unused textures that
    you want to be removed. This is typically done after changing scenes and should
    not be done during game play. Keep in mind that changing scenes causes the previous
    scene to be deallocated only after the new scene has been initialized. This means
    you can’t use the `removeUnused` methods in the `init` method of a scene—that
    is, unless you use the `LoadingScene` from [Chapter 5](#Chapter05.html#ch5) in
    between two scenes, in which case you should extend it so that it removes unused
    textures before replacing itself with the new scene.


    If you absolutely want to remove all textures from memory before loading new ones,
    you should use the purge methods instead:


    ```objectivec

    [CCSpriteFrameCache purgeSharedSpriteFrameCache];

    [CCTextureCache purgeSharedTextureCache];

    ```


    ### Summary


    In this chapter, you learned how to use a `CCSpriteBatchNode` to render multiple
    sprites using the same texture faster, whether that texture is a single image
    or a sprite frame of a texture atlas.


    Subclassing your game objects from `CCSprite` also introduces a few subtle differences
    and stumbling blocks, which I demonstrated earlier in this chapter, before I moved
    on to show you how to create sprite animations. Since the code to create animations
    is very complex, I gave you the solution in the form of a `CCAnimationHelper`
    category.


    I also showed you how to work with texture atlases and why and how you should
    use them. Of course, one can’t say “Texture Atlas” without mentioning TexturePacker
    in the same sentence. It’s hands down the best tool to create and modify texture
    atlases, and if you don’t want to spend money on it, you can still use the free
    version but without the advanced features.


    In the next chapter, you’ll be working on your next game, as we work on making
    the shooter game playable.


