  raw: '*   **Super Turbo Action Pig** revives the simple game play concept of a scrolling
    level where your character always falls down, except when you touch the screen
    to boost his jetpack. The extraordinary part here is that the game’s graphics
    are extremely well made and the overall presentation of the game, the trailer,
    the web site, and the humor set a great example.

    *   Then there’s **Farmville**—do I even have to explain what it’s about? It’s
    an incredibly successful Facebook game that has millions of players worldwide
    building their farms in an isometric landscape. It just goes to show how powerful
    cocos2d is if a company like Zynga uses it to port its most successful game to
    the iPhone. It’s notable that Zombie Farm came out on the iPhone before Farmville,
    and it was also created with cocos2d.

    *   **Melvin Says There’s Monsters** (iPad) is a beautifully animated cartoon
    kid story with professional-quality voiceovers. The story is cleverly constructed
    and has an insightful turning point. It’s a pleasure to watch even for an adult,
    and it also uses cocos2d’s page-flip animations very effectively. If you have
    an iPad and kids, it’s a must have!

    *   **Trainyard** is an innovative puzzle game that was clearly engineered with
    the user in mind. It features a mode for the color-blind, is optimized to use
    little battery power, saves and loads the game just as the user left it, and even
    allows users to share puzzle solutions on the Web, using a duplicate of the game
    engine written in Flash. This all besides being a really innovative puzzle game
    where you lay tracks and combine trains to match them with colored train yards.

    *   **AbstractWar 2.0** is a dual-stick shooter featuring colorful and vibrant
    geometric visuals (see [Figure 17–9](#Chapter17.html#fig_17_9)). It’s obviously
    inspired by Geometry Wars on Xbox Live Arcade. It’s an intense space-shooter with
    plenty of game modes. You can even play it in multiplayer mode via a Bluetooth
    connection, and it allows you to use your own iPod music.


    ![images](images/1709.jpg)


    **Figure 17–9.** *Abstract War 2.0 by Forzefield Studios SL*


    *   **Fuji Leaves** is an interesting music game, where dropping balls hit leaves,
    and depending on speed and location of impact, a sound is played. With several
    balls on the screen bouncing around, you can dynamically create musical scores.
    It’s intensely fascinating to play this game, trying to come up with interesting
    scores and just the right placement of leaves. Before you know it, an hour has
    passed.


    ### The Business of Making Games


    This section covers social gaming, ads, and In App Purchases, basically, the business
    of making games. In this case, the focus isn’t on technology; in this section,
    I’ll talk about my experience as a professional and independent game developer
    and what it takes to make successful games.


    At least the tips provided in this section will improve your odds to make a more
    successful game with the right people, and you’ll learn how to market the game
    to your target audience.


    #### Working with Publishers


    In the early days of computer programming, developers single-handedly copied their
    game code onto floppy disks and shrink-wrapped it to sell it in local software
    and hardware stores. Those days are long gone, and with the increasing complexity
    of games, publishers took on the task of distributing and marketing games. This
    model has been the default for the past 20 years or so, but with the advent of
    the indie game scene in recent years, mostly driven by new technologies such as
    downloadable games, the Xbox Live Indie Games channel, and Apple’s App Store,
    more and more game developers are turning to self-publishing again. So, why would
    you want to work with a publisher these days?


    The first aspect is technical support and testing. Publishers want to make sure
    that every game they release does not reflect badly on them, so one of their goals
    is to release games with as few bugs as possible and with polished game play.
    If you’re not used to this process, which includes the scrutiny of a quality assurance
    team, you’ll be in for a surprise, and it may not always be a pleasant one—such
    as if the game’s release is held back due to yet another obscure and hard to-find
    bug. So, that’s a bad thing? To the contrary, it forces you to work with an attention
    to detail that’s all too often neglected and dismissed by hobbyist developers.
    And in the end, you’ll be rewarded with a better game. In most cases, this also
    translates to more favorable reviews by press and players alike and thus more
    sales.


    Working with an established publisher also reflects positively on you, simply
    because of the respected games already released by said publisher. I don’t mean
    that in an ego-trip kind of way. You’re not special because you’re working with
    big-name publisher X—but you sure will learn a lot, and that’s going to make you
    stand out from the crowd. It also improves your street cred and the chances to
    land a better job or contract sometime down the road.


    The experiences working with a publisher don’t just involve game programming and
    the things you’ll pick up from technical support and the quality assurance process.
    You’ll also sign a contract and get a glimpse at all the legalese and paperwork
    involved (it’s really not that bad).


    Signing a standard contract with a publisher is more like opening a bank account.
    Everything is ready-made, and you just have to fill in a few blanks. Expect the
    publisher to take anywhere between 30 percent to 70percent of the revenue. It
    depends a lot on what they do, in which phase of development they come on board,
    and whether they support you financially.


    If you allow yourself to learn from working with a publisher, it can be very insightful
    to get an impression of the details that need to be specified to get everything
    in order from a financial and legal point of view. If the publisher has a good
    track record with other developers, you can feel assured that they’re not going
    to screw you over. But you definitely need to understand the terms you’re signing,
    because if you’re used to posting your sales numbers, those may now be covered
    by a nondisclosure agreement you signed with the publisher.


    You do give up a certain amount of freedom, and you need to be able to live with
    it and trust the publisher to do the best job they can for those parts you’re
    giving up. For example, if a publisher is asking you for a change in direction
    about certain aspects of your game, you should seriously consider it. At least
    most of them know what they’re talking about, and they also know what’s working
    and what isn’t (this certainly isn’t the case for all of them, though). However,
    since games is a very subjective field, publishers do have the tendency to favor
    proven sets of features over other risky but innovative ones—but less so on the
    iOS, where publishers are more willing and able to give their developers creative
    freedom, if not total control over the design of the game.'
  trans: "\n# 超级涡轮动作猪  \n重拾了卷轴式关卡中角色持续下坠的简易游戏概念，唯一的操作就是通过点击屏幕启动他的喷气背包。特别之处在于该游戏的画面制作极为精良，而游戏的整体呈现、预告片、网站以及幽默风格都堪称典范。\n\
    \n# 开心农场  \n还需要我解释它是什么吗？这是一款极其成功的 Facebook 游戏，全球数百万玩家在等距景观中建造农场。这恰好证明了当 Zynga\
    \ 这样的公司用它来将其最成功的游戏移植到 iPhone 上时，`cocos2d` 有多么强大。值得注意的是，在《开心农场》登陆 iPhone 之前，《僵尸农场》就已上线，而它同样是用\
    \ `cocos2d` 开发的。\n\n# 梅尔文说有怪物 (iPad)  \n是一部拥有专业级配音的、动画精美的儿童故事。故事构思巧妙，并有一个富有洞察力的转折点。即使是成年人看也赏心悦目，并且它也有效地运用了\
    \ `cocos2d` 的翻页动画。如果你有 iPad 和孩子，这绝对是必备品！\n\n# 火车站  \n是一款创新的益智游戏，显然是以用户为中心设计的。它具备色盲模式、优化省电、能在用户离开时原样保存和加载游戏，甚至还允许用户通过一个用\
    \ Flash 编写的游戏引擎副本来在网络上分享谜题解法。除此以外，它本身也是一款真正创新的益智游戏，你需要铺设轨道并组合火车，使其匹配对应颜色的车场。\n\
    \n# 抽象战争 2.0  \n是一款双摇杆射击游戏，拥有色彩鲜艳、充满活力的几何视觉风格（见图 17-9）。它显然深受 Xbox Live Arcade\
    \ 上的《几何战争》启发。这是一款紧张刺激的太空射击游戏，拥有多种游戏模式。你甚至可以通过蓝牙连接进行多人对战，并且允许使用自己的 iPod 音乐。\n\n\
    ![images](img/1709.jpg)\n\n**图 17–9.** *《抽象战争 2.0》，Forzefield Studios SL 出品*\n\
    \n# 富士叶  \n是一款有趣的音乐游戏，落下的球击中叶子，根据撞击的速度和位置会发出声音。屏幕上多个球弹跳时，你可以动态地创作乐谱。玩这款游戏，尝试构思有趣的乐谱并找到叶子的最佳摆放位置，令人无比入迷。不知不觉，一小时就过去了。\n\
    \n## 制作游戏的商业之道\n\n本节涵盖社交游戏、广告和内购，简而言之，就是制作游戏的商业之道。在此，重点不在于技术；本节我将谈谈我作为专业独立游戏开发者的经验，以及制作成功游戏需要什么。至少，本节提供的技巧能提高你的胜算，与合适的人合作打造出更成功的游戏，并学会如何将游戏推销给目标受众。\n\
    \n### 与发行商合作\n\n在早期计算机编程时代，开发者亲手将游戏代码复制到软盘上，然后热缩包装好，放到本地软硬件商店里出售。那个时代早已远去，随着游戏日益复杂，发行商承担起了发行和营销游戏的任务。这种模式在过去大约\
    \ 20 年里是常态，但随着近年来独立游戏场景的兴起（主要由可下载游戏、Xbox Live 独立游戏频道和苹果 App Store 等新技术推动），越来越多的游戏开发者重新转向自行发行。那么，如今为什么还要与发行商合作呢？\n\
    \n第一个方面是技术支持和测试。发行商希望确保他们发布的每一款游戏都不会给自己带来负面影响，因此他们的目标之一是尽可能少 Bug 并且玩法打磨精良地发布游戏。如果你不习惯这个流程（包括接受质量保证团队的严格审查），你可能会大吃一惊，而且体验可能并不总是愉快的——比如游戏的发布因为又一个难以复现的罕见\
    \ Bug 而被推迟。所以，这是坏事吗？恰恰相反，这迫使你注重细节，而这往往是业余开发者经常忽略和轻视的。最终，你将收获一款更好的游戏。在大多数情况下，这也会转化为媒体和玩家更佳的评价，从而带来更多销量。\n\
    \n与知名发行商合作也会给你带来正面影响，仅仅是因为该发行商之前发布的备受尊敬的游戏。我不是说那种自我膨胀的感觉。你并不会因为与某家大牌发行商 X 合作就变得特殊——但你肯定能学到很多，这会让你脱颖而出。这也能提升你的业界信誉，增加未来获得更好工作或合同的机会。\n\
    \n与发行商合作的经历不仅涉及游戏编程以及你在技术支持和质保流程中学到的东西。你还会签订合同，并一窥其中涉及的所有法律术语和文书工作（其实没那么糟糕）。与发行商签订标准合同更像是在银行开户。一切都是现成的，你只需填写一些空白之处。预计发行商会拿走\
    \ 30%到 70%的收入。这在很大程度上取决于他们做了哪些工作，在开发哪个阶段介入，以及他们是否为你提供资金支持。\n\n如果你允许自己从与发行商的合作中学习，那么了解为了从财务和法律角度理顺一切所需明确的细节，会非常有启发性。如果发行商与其他开发者有过良好的合作记录，你可以放心他们不会坑你。但你绝对需要理解你所签署的条款，因为如果你习惯于公开销售数据，现在这些数据可能会被你与发行商签署的保密协议所覆盖。\n\
    \n你会放弃一定程度的自由，并且你需要能够接受这一点，并相信发行商会为你放弃的那部分做到最好。例如，如果发行商要求你改变游戏的某些方面，你应该认真考虑。至少他们中的大多数人是懂行的，也知道什么有效、什么无效（尽管并非所有发行商都如此）。然而，由于游戏是一个非常主观的领域，发行商确实倾向于青睐经过验证的功能组合，而不是那些有风险但创新的功能——不过在\
    \ iOS 平台上情况稍好，发行商更愿意也更有能力给予开发者创作自由，即使不是对游戏设计的完全掌控。\n"
- fmt: '# In return for giving up some freedoms, they’ll reward you with marketing
    for your game. They know the channels, and they have a direct feed to the review
    web sites and the press. And that’s possibly another area of expertise you’ll
    learn a lot from. The press has a certain way they like to receive and consume
    the information they need to write a review about your game. Your publisher knows
    all about it, and they’ll request a few things from you that you wouldn’t have
    considered in the first place, such as high-resolution artwork or a one-line catchphrase
    that really gets players interested in your game.


    If you get the chance to cooperate with a publisher, my advice is to go for it
    at least once, no matter how much you value your creative freedom. Afterward,
    you’ll understand much better what you’re giving up and what you’re receiving
    in return, at least in that particular case. Whatever your experience may be,
    the experience alone and what you’ll learn should make it worthwhile (and maybe
    it will be rewarding enough to do it again—but if not, you’ll know why).


    There are several game publishers you might want to consider contacting. Your
    best shot would be those who market specifically for iOS or mobile devices, and
    in that area two names stand out from the crowd. One is `ngmoco`, who published
    `Goldfinger`, `We Rule`, `We Farm`, `Epic Pet Wars`, and `Rolando`. Visit `ngmoco`’s
    web site at [`www.ngmoco.com`](http://www.ngmoco.com). The other is `Chillingo`,
    who has released games like `Minigore`, `the Quest`, `Knight’s Rush`, and of course
    `Angry Birds`. Their web site is [`www.chillingo.com`](http://www.chillingo.com).


    ## Finding Freelancers


    If you believe in your game and you are ready to invest money into it, you may
    want to get help from professional freelancers worldwide. Besides asking for jobs
    in the `cocos2d` forum itself, you can also post a job offer on one of the more
    popular outsourcing web sites. Likewise, you can also offer your expertise as
    a freelancer to employers on these sites. There are plenty of web sites offering
    such services; you’ll even find some that can hook you up with someone close to
    where you live.


    I’ll refer you to the ones that I know work best and have a good reputation: they
    are `eLance` ([`www.elance.com`](http://www.elance.com)) and `Guru` ([`www.guru.com`](http://www.guru.com)).


    They both work on the same principle. You post a job offer, which could be a small
    task or an entire project. Then you receive proposals from candidates, from which
    you can pick one or more to do the job. Once you have received, reviewed, and
    approved the work, the freelancers get paid. Abuse can be reported and basically
    locks you out of the platform, so while you need to be able to trust people you’ve
    never worked with, the risks are minimal for both parties. To start, I recommend
    choosing smaller tasks. Just as if you were to get into the stock market, you
    want to get a good feel for how this works and what can happen by starting small.


    ## Finding Free Art and Audio


    The alternative to hiring someone to do the work for you is to find the work available
    on the Internet (preferably free). However, be careful about anything that’s “free.”
    I’m not saying that it might have a catch; I’m warning about the common misconception
    that free means “can be used freely.” It may not cost you anything to get an image
    or audio file that’s free, but that doesn’t tell you anything about what you’re
    legally allowed to do with it. That’s typically where a license should come into
    play but often doesn’t. A lot of people publish their own source code, artwork,
    audio, and writings for free on the Internet but forget to add a proper license
    file to it if the work is intended to be used by others. The problem is that by
    default, the author has the copyright and retains all rights to how the work can
    be used. If there’s no explicit waiver, preferably in the form of a license, then
    you should not use this work (especially not in commercial products, and that
    includes $0.99 apps sold via the iTunes App Store).


    For reference, I’d like to point you to `Funplosion Labs`, which has an article
    listing web sites where you can get free game graphics and audio. `Funplosion`
    also disclaims this with a warning about the copyright and a link to the license
    agreement for each web site (see [`http://funplosion.com/free-assets.html`](http://funplosion.com/free-assets.html)).


    **CAUTION:** Be wary of the General Public License (GPL), especially if it is
    used by a source code library that you want to use or integrate into a commercial
    app. Using GPL-licensed code in your own project requires you to open source your
    own project’s source code. Not just that, but anyone is subsequently given the
    right to use your source code and to copy, modify, and redistribute it. Note that
    the Lesser General Public License (LGPL) license is not as stringent. Refer to
    this link for a comparison of common source code licenses: [`http://developer.kde.org/documentation/licensing/licenses_summary.html`](http://developer.kde.org/documentation/licensing/licenses_summary.html).


    ## Finding the Tools of the Trade


    Sometimes you may wish you had a tool that does just *that*, whatever *that* might
    be. There are times as a game developer where you need to process data, modify
    images, or build whole worlds—things that are tedious and error prone to do in
    code or simply too time-consuming to do on your own because you’d rather focus
    on writing your game.


    My tip is to use the `Indie Game Tools` web site, which collects, categorizes,
    and allows others to rate game design tools for independent game developers. The
    focus here isn’t on expensive software used by professional studios but on low-cost
    and free solutions for about anything, from game engines to converters, from scripting
    languages to server technologies, and from asset packages to game editors. Maintained
    by Robert “Robc” Charney, it’s the place I go to see if there’s a tool available
    that fits my bill. Visit the site here: [`http://indiegametools.com`](http://indiegametools.com).


    Just a minor caveat: don’t put too much weight on the ratings of individual tools.
    The number of ratings is very small, so there can be huge differences between
    similar tools, and the ratings may be biased by both unhappy users and proactive
    communities. You should leave your mark and add some of your own ratings so that
    over time the ratings become more accurate. In addition, some tools simply can’t
    be compared by rating; they may have totally different uses, making it unfair
    to compare them based on their rankings on the `Indie Game Tools` web site.


    ## Marketing


    So, you made a game and submitted it to the App Store. Now what? How do people
    find your game in the first place?


    The story starts at the beginning. The moment you begin working on your game should
    also be the starting point for your marketing efforts. Get a web site up and running,
    and post your development experiences and maybe some work-in-progress screenshots.
    That should be the first step to connect with other game developers.


    In terms of the marketing and business aspects, I’d like to save you some time.
    The following link is to the Big List of Indie Marketing and Business Tips, and
    I have to say that’s an understatement. You’ll find most of the meaningful and
    intelligent articles ever written on the subject on just this one page, so be
    sure to check it out even if you’re only mildly interested in the marketing and
    business aspects of indie game development. Check it out at [`www.pixelprospector.com/indev/2010/08/the-big-list-of-indie-marketingand-business-tips`](http://www.pixelprospector.com/indev/2010/08/the-big-list-of-indie-marketingand-business-tips).


    Still interested in marketing? Good, check out the free e-book *Videogame Marketing
    and PR*, written by Scott Steinberg. You can get it on the book’s web site: [`www.sellmorevideogames.com`](http://www.sellmorevideogames.com).'
