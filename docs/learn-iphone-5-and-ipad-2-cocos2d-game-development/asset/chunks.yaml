    \    CCARRAY_FOREACH([self children], node)\n    {\n        if ([node isKindOfClass:[HealthbarComponent\
    \ class]])\n        {\n            HealthbarComponent* healthbar = (HealthbarComponent*)node;\n\
    \            [healthbar reset];\n        }\n    }\n}\n```\n\n## 总结\n\n创建一个完整且精致的游戏需要付出相当大的努力，这涉及到大量的重构、修改现有的工作代码以改进其设计，并允许更多功能和谐共存。\n\
    \n在本章中，你学习了像 `BulletCache` 和 `EnemyCache` 这样的类的价值，它们负责管理特定类的所有实例，让你能够从一个中心点轻松访问它们。而将对象汇集在一起有助于提高性能。\n\
    \n`Entity` 类的层次结构只是一个示例，展示了如何在不要求每个游戏对象都拥有独立类的情况下划分你的类。通过利用组件类和 cocos2d 的节点层级结构，你可以创建具有非常特定功能的即插即用类。这有助于你使用组合而非继承来构建游戏对象。这种方式编写游戏逻辑代码更加灵活，并能实现更好的代码复用。\n\
    \n最后，你学习了如何射击敌人，以及 `BulletCache` 和 `EnemyCache` 类如何以直接明了的方式帮助完成这类任务。而 `HealthbarComponent`\
    \ 则为组件系统的实际运作提供了完美的示例。\n\n到目前为止的游戏还有一些空白等待你去填充。首先也是最重要的一点是，玩家还没有受到攻击。你可能还想为巡洋舰怪物添加一个生命条，并为\
    \ BOSS 怪物的行为编写专门的移动和射击组件。总体而言，这是一个极好的横版卷轴游戏起点，正等待你去改进它。\n\n在下一章中，我将向你展示如何通过使用粒子效果为这款射击游戏增添视觉亮点。\n\
    \n## 第 9 章\n\n## 粒子效果\n\n为了创建特殊的视觉效果，游戏程序员经常使用*粒子系统*。粒子系统的工作原理是发射大量微小的粒子并高效地进行渲染，其效率远高于将它们作为精灵渲染。这使你能够模拟雨、火、雪、爆炸、蒸汽尾迹等众多效果。\n\
    \n粒子系统由大量属性驱动。这里的“大量”指的是大约 30 个属性，这些属性不仅影响单个粒子的外观和行为，还会影响整个粒子效果。粒子效果是所有粒子协同工作以产生特定视觉结果的整体。单独一个粒子无法形成火焰效果；十个粒子也远远不够。你需要几十个甚至几百个粒子以恰到好处的方式一起工作，才能创造出火焰效果。\n\
    \n创建令人信服的粒子效果是一个反复试错的过程。在源代码中尝试各种属性，并通过编译游戏、查看效果、做出修改、重复这个过程来调整粒子系统，至少可以说是很繁琐的。这时，粒子设计工具就派上了用场，而我知道一个非常合适的工具：它叫做\
    \ **Particle Designer**，我将在本章中解释它的工作原理。"
- fmt: "### Example Particle Effects\n\nCocos2d comes with a number of built-in particle\
    \ effects that give you a good idea of the kinds of effects they'll produce. You\
    \ can use them as placeholders in your game or subclass and modify the examples\
    \ defined in the `CCParticleExamples.m` file if you just want to apply some minor\
    \ tweaks. The good thing about them is that you don't need any outside help; you\
    \ create the example particle effects as if they were simple `CCNode` objects.\
    \ As a matter of fact, they are actually derived from `CCNode`.\n\nI created a\
    \ project called `ParticleEffects01` that shows all the cocos2d example particle\
    \ effects. You can cycle through the examples by quickly tapping the screen, and\
    \ you can also drag and move them with your finger. Many particle effects look\
    \ totally different as soon as they start moving, as you can see in [Figure 9–1](#Chapter09.html#fig_9_1),\
    \ so what seems like just a huge blob of particles may well work as an engine\
    \ exhaust effect if the particle effect is moving.\n\n![images](images/0901.jpg)\n\
    \n**Figure 9–1.** *The same particle effect from top to bottom: motionless, moving\
    \ slowly, moving fast*\n\nThere's only one type of effect that can't be moved\
    \ once started, and these are one-time effects like the `CCParticleExplosion`\
    \ shown in [Figure 9–2](#Chapter09.html#fig_9_2). What's special about this effect\
    \ is that it emits all its particles at once and stops emitting new particles\
    \ instantly. All other particle effects run continuously, always creating new\
    \ particles while those that have exceeded their lifetime are removed. The challenge\
    \ in that situation is to balance the total number of particles that are on the\
    \ screen.\n\n![images](images/0902.jpg)\n\n**Figure 9–2.** *The `CCParticleExplosion`\
    \ is an example effect provided by cocos2d.*\n\n[Listing 9–1](#Chapter09.html#list_9_1)\
    \ shows the relevant methods used in the `ParticleEffects01` example project.\
    \ By using the current `particleType` variable in the `switch` statement, the\
    \ corresponding built-in particle effect is created. Note that a `CCParticleSystem`\
    \ pointer is used to store the particles, so I need to use the `addChild` code\
    \ only once at the end of the `runEffect` method. Every example particle effect\
    \ is derived from `CCParticleSystem`.\n\n**Listing 9–1.** *Using the Built-in\
    \ Effects*\n\n```\n-(void) runEffect\n{\n    // remove any previous particle FX\n\
    \    [self removeChildByTag:1 cleanup:YES];\n\n    CCParticleSystem* system;\n\
    \n    switch (particleType)\n    {\n        case ParticleTypeExplosion:\n    \
    \        system = [CCParticleExplosion node];\n                        break;\n\
    \        case ParticleTypeFire:\n            system = [CCParticleFire node];\n\
    \            break;\n        case ParticleTypeFireworks:\n            system =\
    \ [CCParticleFireworks node];\n            break;\n        case ParticleTypeFlower:\n\
    \            system = [CCParticleFlower node];\n            break;\n        case\
    \ ParticleTypeGalaxy:\n            system = [CCParticleGalaxy node];\n       \
    \     break;\n        case ParticleTypeMeteor:\n            system = [CCParticleMeteor\
    \ node];\n            break;\n        case ParticleTypeRain:\n            system\
    \ = [CCParticleRain node];\n            break;\n        case ParticleTypeSmoke:\n\
    \            system = [CCParticleSmoke node];\n            break;\n        case\
    \ ParticleTypeSnow:\n            system = [CCParticleSnow node];\n           \
    \ break;\n        case ParticleTypeSpiral:\n            system = [CCParticleSpiral\
    \ node];\n            break;\n        case ParticleTypeSun:\n            system\
    \ = [CCParticleSun node];\n            break;\n\n        default:\n          \
    \  // do nothing\n            break;\n    }\n\n    [self addChild: system z:1\
    \ tag:1];\n\n    [label setString:NSStringFromClass([system class])];\n}\n\n-(void)\
    \ setNextParticleType\n{\n    particleType++;\n    if (particleType == ParticleTypes_MAX)\n\
    \    {\n        particleType = 0;\n    }\n}\n```\n\n**NOTE:** The `NSStringFromClass`\
    \ method is very helpful in this example for printing out the name of the class\
    \ without having to enter dozens of matching strings. It's one of the cool runtime\
    \ features of the Objective-C language that you're able to get a class's name\
    \ as a string. Try to do that in C++, and you'll be biting your toenails. The\
    \ Objective-C Runtime Programming Guide is a good starting point if you like to\
    \ dive into this advanced topic or if you just want to learn how Objective-C works\
    \ on a lower level: [http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/ObjCRuntimeGuide/Introduction/Introduction.html).\n\
    \nFor game-play code, the `NSStringFromClass` and related methods hardly play\
    \ any role, but they're very helpful debugging and logging tools. You can find\
    \ a complete list and description of these methods in Apple's Foundation Function\
    \ Reference: [http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html](http://developer.apple.com/mac/library/documentation/Cocoa/Reference/Foundation/Miscellaneous/Foundation_Functions/Reference/reference.html).\n\
    \nIf you use one of these example effects in your own project, you might be shocked\
    \ to see ugly, square pixels. [Figure 9–3](#Chapter09.html#fig_9_3) shows this\
    \ effect very clearly. This occurs because all of the built-in particle effects\
    \ try to load a specific texture named `fire.png`, which is distributed with cocos2d-iphone\
    \ in the `Resources/Images` folder. You can still create very good particle effects\
    \ even without a texture, provided that the particle sizes remain fairly small.\
    \ But to see the built-in particle effects as they were intended, you need to\
    \ add the `fire.png` image to your Xcode project.\n\n![images](images/0903.jpg)\n\
    \n**Figure 9–3.** *If your example particle effects, like this `CCParticleFireworks`,\
    \ display huge, square particles, you forgot to add the `fire.png` image to your\
    \ Xcode project.*\n\n### Creating a Particle Effect the Hard Way\n\nYou can easily\
    \ create your own subclass of the `CCParticleSystem` class. What's not so easy\
    \ is creating a convincing particle effect with it, let alone one that comes close\
    \ to what you originally envisioned. The following is the list of properties grouped\
    \ by function that determine the particle system's look and behavior:\n\n- `emitterMode\
    \ = gravity`\n    - `sourcePosition`\n    - `gravity`\n    - `radialAccel`, `radialAccelVar`\n\
    \    - `speed`, `speedVar`\n    - `tangentialAccel`, `tangentialAccelVar`\n- `emitterMode\
    \ = radius`\n    - `startRadius`, `startRadiusVar`, `endRadius`, `endRadiusVar`\n\
    \    - `rotatePerSecond`, `rotatePerSecondVar`\n- `duration`\n- `posVar`\n- `positionType`\n\
    - `startSize`, `startSizeVar`, `endSize`, `endSizeVar`\n- `angle`, `angleVar`\n\
    - `life`, `lifeVar`\n- `emissionRate`\n- `startColor`, `startColorVar`, `endColor`,\
    \ `endColorVar`\n- `blendFunc`, `blendAdditive`\n- `texture`\n\nAs you can imagine,\
    \ there's a lot to tweak here, and that is the main problem of achieving what\
    \ you want: you don't see the effect of your changes until you rebuild and run\
    \ your project. You'll learn that when we get to Particle Designer later in this\
    \ chapter how much it streamlines the creation of new particle effects.\n\nFor\
    \ now let's do it the hard way first and start at the beginning to gain an understanding\
    \ about how the cocos2d particle system works. To program a particle effect from\
    \ scratch, you'll first learn how to subclass the `CCParticleSystem` class and\
    \ how to initialize it. A detailed description of the particle system's properties\
    \ follows."
