    The `BodyNode` provides a property for its instance variable `body` so that it
    can be conveniently accessed. The initializer method `initWithShape` is used to
    initialize both the body and the sprite by using the supplied shape name. It assumes
    that both the name of the image and the name of the shape are identical.


    **CAUTION:** By default TexturePacker will retain the file extension of images
    so that your shape might be named “plunger,” but the sprite frame name might be
    “plunger.png.” To fix that, you''ll have to check the `Trim sprite names` check
    box in the TexturePacker `Output` pane. The pinball.tps file used in this chapter
    has this check box already set; it removes the .png extension from the sprite
    frame names. That way, both the TexturePacker sprite frames and PhysicsEditor
    shape names will be identical.


    For the texture atlas, you use TexturePacker and add the pinball folder as a smart
    folder reference, meaning that TexturePacker will keep the texture atlas contents
    up to date with all changes to the images in the pinballfolder. Refer to [Chapter
    6](#Chapter06.html#ch6) for instructions on how to set up a smart folder reference.


    You also need to set an additional option we did not yet use: trim sprite names.
    This feature removes the .png suffix from the sprite names. The advantage is that
    we can use the same names for the physics shapes and the sprites. The only caveat
    is that you''ll have to refer to sprite frame names without the .png extension,
    which admittedly out of habit is sometimes easy to forget.


