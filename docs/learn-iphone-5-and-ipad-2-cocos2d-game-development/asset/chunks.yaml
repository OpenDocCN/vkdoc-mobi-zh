  trans: '

    ### 下载并安装 iOS SDK


    作为已注册的 iOS 开发者，你可以从 iOS Dev Center 下载最新的 iOS SDK。该下载包体积超过 4GB，下载和安装需要一些时间，因此建议你立即开始操作。


    iOS SDK 安装完成后，你就拥有了开发 iOS 应用所需的一切环境，包括 Xcode 集成开发环境（IDE）。如果你之前从未使用过 Xcode，我建议你先熟悉它。我推荐
    Ian Piper 所著的《*Learn Xcode Tools for Mac OS X and iPhone Development*》（Apress,
    2010）。


    **注意：** 你可能会倾向于尝试 iOS SDK 的最前沿开发版本。iOS SDK 的测试版会不时发布。我建议除非你有非常非常充分的理由，否则不要使用 iOS
    SDK 的测试版！


    测试版可能包含错误，可能与当前的 cocos2d 版本不兼容，并且受保密协议（NDA）约束。这意味着，如果出现与测试版相关的任何问题，你将难以找到解决方案，因为任何人都不能公开讨论测试版
    SDK。


    此外，你必须在设备上安装 iOS 的测试版，并且无法回退到之前的 iOS 版本。你设备上已安装的应用可能与新的 iOS 测试版不兼容，而且这些应用通常要等到新版
    iOS SDK 正式发布后才会更新。如果你的工作依赖于任何应用，请不要升级。


    ### 下载并安装 cocos2d


    下一步是获取 cocos2d。你可以从 [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download)
    下载。由于许多新开发者在使用模板安装脚本时仍会遇到问题，我也提供了一个 cocos2d 和 cocos3d 的安装程序，它可以为你自动运行模板安装脚本。你可以从
    Cocos2d Central 下载该安装程序：[`http://cocos2d-central.com/files/file/6-installer`](http://cocos2d-central.com/files/file/6-installer)。


    我建议下载并解压 cocos2d 的**稳定版**。**非稳定版**并非意味着它会频繁崩溃，但它是一个测试版。它通常可以正常工作，但可能存在一些粗糙之处、未经测试的功能或与第三方工具不兼容的情况。在考虑使用非稳定版之前，请先查看发布说明，确认其中是否包含对你特别有用的内容。如果没有，就坚持使用稳定版。


    下载并解压 cocos2d 后，你会看到一个名为 `cocos2d-iphone-1.0.1` 或类似名称的子文件夹，具体取决于你下载的 cocos2d 版本号。


    #### 安装 cocos2d Xcode 项目模板


    **注意：** 如果你使用了我提供的 cocos2d/cocos3d 安装程序，可以跳过本节内容。Xcode 项目模板已被安装程序自动安装。


    打开 **终端** 应用，你可以在 Mac 上“应用程序”文件夹中的“实用工具”文件夹里找到它。或者在 Spotlight 中直接输入 `Terminal.app`
    来定位。cocos2d Xcode 项目模板的安装过程由一个 shell 脚本驱动，你需要从命令行程序“终端”中运行它。


    首先，切换到 cocos2d 的安装目录。例如，如果你的 cocos2d 版本安装在“文稿”目录下的 `cocos2d-iphone-1.0.0` 文件夹中，则输入以下内容：


    `cd ~/Documents/cocos2d-iphone-1.0.0`


    按下回车键进入 cocos2d 目录，然后输入以下内容：


    `./install-templates.sh –f -u`


    按下回车键运行模板安装脚本。如果一切顺利，你应该会在终端窗口中看到多行输出文本。其中大部分会以“…copying”开头。如果是这种情况，那么模板应该已经安装成功。


    如果出现任何错误，请确认你已使用 `cd` 命令进入了 `cocos2d-iphone` 目录，并且 `install-templates.sh` 脚本的命令正确无误，包括命令与
    `–f` 和 `–u` 选项之间的空格。如果这样仍无法解决，可以考虑使用我创建的 cocos2d 安装程序，它正是为了缓解这类令人头疼的模板安装问题而设计的。你可以从这里下载该安装程序：


    `cocos2d-central.com/files/file/6-installer`


    #### 创建一个 cocos2d 应用


    现在打开 Xcode，选择 **文件 ![images](img/U001.jpg) 新建项目**。在“用户模板”下，你应该能看到 cocos2d 项目模板，如
    图 2-1 所示。


    **注意：** Box2d 和 Chipmunk 应用模板将在第 13 章中讨论。如果你想现在就体验一下物理引擎的乐趣，可以随意试用它们。


    ![images](img/0201.jpg)


    **图 2-1.** *cocos2d Xcode 项目模板*


    选择 **cocos2d Application** 模板，并将其命名为 `HelloWorld`。


    **提示：** 建议不要在项目名称中使用空格字符。Xcode 并不介意，但你可能会用到的一些其他工具可能会介意。这纯粹是一种预防性措施，以避免任何潜在问题。


    在很长很长一段时间里，构建操作系统和应用程序的程序员可以依赖文件名不包含空格这一惯例。即使在现代操作系统允许文件名包含空格至少 10 年后的今天，文件名的空格和特殊字符仍然偶尔会引发问题。我始终避免在与代码相关的任何命名中使用空格或其他特殊字符，无论是项目、源文件还是资源文件。只有数字、字母、减号和下划线对开发者来说是确保安全的。


    Xcode 将基于模板创建项目。一个类似 图 2-2 所示的 Xcode 项目窗口将会打开。


    ![images](img/0202.jpg)


    **图 2-2.** *Xcode 4 中新创建的 HelloWorld 项目*


    当你点击 **运行** 按钮时，项目将会编译并在 iOS 模拟器中运行。结果应如 图 2-3 所示。


    ![images](img/0203.jpg)


    **图 2-3.** *成功了！模板项目运行正常，并在 iPhone 模拟器中显示了一个“Hello World”标签。*


    ### HelloWorld 应用


    就这样——你几乎毫不费力就创建了一个可以运行的 cocos2d 应用。完美。无需多言。无需多言。


    但现在你想知道它是如何工作的，对吗？好吧，我可不指望你会这么轻易放过我。我有种预感，无论我在本书中深入探讨多少细节，你都会想了解更多。这就是求知精神！


    让我们检查一下 HelloWorld 代码项目的内容，了解其工作原理，这样你就能对整个架构有个大致的了解。你可以随意摆弄这个 HelloWorld 项目。如果不小心搞坏了，只需从
    cocos2d 模板重新创建一个新项目即可。随着本书的深入，你将学习到 all 关于 cocos2d 以及本章首次提到的各项设置的详细信息。

    '
- fmt: "### Locating the HelloWorld Files\n\nFirst, here’s a quick primer in case\
    \ you’ve never worked with Xcode before. By default, you’ll see a pane called\
    \ Project Navigator on the left side of the Xcode project window, like the one\
    \ in [Figure 2–4](#Chapter02.html#fig_2_4). That’s where Xcode keeps all file\
    \ references, among plenty of other things like targets and executables. Just\
    \ focus on the groups and files for now that are below the HelloWorld project.\n\
    \n![images](images/0204.jpg)\n\n**Figure 2–4.** *Xcode’s Project Navigator pane.\
    \ The expanded groups contain the project files we’ll be looking at.*\n\nIn the\
    \ group named `cocos2d` you’ll find all the files the cocos2d game engine consists\
    \ of. Feel free to explore these files if you’re curious, but unless you know\
    \ what you’re doing, you should not modify them. The same goes with the other\
    \ cocos2d-related groups; they are the groups that are not expanded in [Figure\
    \ 2–4](#Chapter02.html#fig_2_4).\n\nYou don’t need to know the details of the\
    \ cocos2d game engine, but it’s good to have the source files accessible, especially\
    \ when it comes to debugging or in case you get curious and want to know how things\
    \ work under the hood and learn a trick or two.\n\n**CAUTION:** Xcode’s Project\
    \ Navigator pane looks a lot like folders and files in Finder. Don’t mistake what\
    \ Xcode calls groups for Finder’s folders. You can have your files in Xcode arranged\
    \ in many groups, but in Finder they can and normally will still all be in the\
    \ same folder. This is why they are not called folders but groups. They allow\
    \ you to arrange files logically without affecting their physical location on\
    \ your computer’s hard drive.\n\n### Resources\n\nIn the Resources group you’ll\
    \ find (and later add) all the additional files that aren’t source code, such\
    \ as images and audio files.\n\nThe `Default.png` file is the image that’s displayed\
    \ when iOS is loading your app, and `Icon.png` is, of course, the app’s icon.\
    \ The `fps_images.png` file is used by cocos2d to display the framerate; you should\
    \ not remove or modify it.\n\nInside the `Info.plist` file you’ll find a number\
    \ of settings for your application. You’ll only need to make changes here when\
    \ you get close to publishing your app.\n\n### Supporting Files\n\nIf you’re familiar\
    \ with programming in C or similar languages, you may recognize `main.m` in the\
    \ Other Sources group as the starting point of the application. The only other\
    \ file in this group is the precompiled header file `Prefix.pch`.\n\n#### Main.m\n\
    \nEverything that happens between the `main` function and the `HelloWorldAppDelegate`\
    \ class is the behind-the-scenes magic of the iOS SDK, over which you have no\
    \ control. Since you’ll hardly ever need to change `main.m`, you can safely ignore\
    \ its contents. Still, it never hurts to peek inside.\n\nTo quickly sum up, the\
    \ `main` function creates an `NSAutoreleasePool` and then calls `UIApplicationMain`\
    \ to start the application using `HelloWorldAppDelegate` as the class that implements\
    \ the `UIApplicationDelegate` protocol.\n\n```\nint main(int argc, char *argv[])\n\
    {\n    NSAutoreleasePool *pool = [NSAutoreleasePool new];\n    int retVal = UIApplicationMain(argc,\
    \ argv, nil,        @\"HelloWorldAppDelegate\");\n    [pool release];\n    return\
    \ retVal;\n}\n```\n\nThe only interesting point to take away from this is that\
    \ every iOS application uses an `NSAutoreleasePool` to help you manage memory.\
    \ In short, by using the autorelease message on objects, you don’t have to worry\
    \ about sending them a release message. The autorelease pool ensures that the\
    \ memory of autorelease objects is eventually released. Don’t worry if you don’t\
    \ know what the heck I’m talking about here. I’ll introduce you to memory management\
    \ with cocos2d later in this chapter.\n\nYou can also learn more about using autorelease\
    \ pools in Apple’s Memory Management Programming Guide at [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html).\n\
    \n#### Precompiled Prefix Header\n\nJust in case you’re wondering what the `Prefix.pch`\
    \ header file is for, it’s a tool used to speed up compilation. You are supposed\
    \ to add the header files of frameworks that never or only rarely change to the\
    \ prefix header. This causes the framework’s code to be compiled in advance and\
    \ made available to all your classes. Unfortunately, it also has the disadvantage\
    \ that, if a header added to the prefix header changes, all your code will recompile,\
    \ which is why you should only add header files that rarely or never change.\n\
    \nFor example, the `cocos2d.h` header file is a good candidate to add to the prefix\
    \ header, as I’ve done in [Listing 2–1](#Chapter02.html#list_2_1). To create a\
    \ noticeable increase in compilation time, your project would need to be reasonably\
    \ complex, however, so don’t get your stopwatch out just yet. But it’s good practice\
    \ to add `cocos2d.h` as a prefix header right away, if only to never have to write\
    \ `#import \"cocos2d.h\"` in any of your source files again.\n\n**Listing 2–1.**\
    \ *Adding the `cocos2d.h` Header File to the Prefix Header*\n\n```\n#ifdef __OBJC__\n\
    \    #import <Foundation/Foundation.h>\n    #import <UIKit/UIKit.h>\n    #import\
    \ \"cocos2d.h\"\n#endif\n```\n\nOnce again, you can refer to Apple’s developer\
    \ documentation if you want to learn more about reducing build times with prefix\
    \ headers: [`http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html`](http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html).\n\
    \n### HelloWorld Classes\n\nTwo classes make up the core of the HelloWorld project.\
    \ The `AppDelegate` class handles the application’s global events and state changes,\
    \ while the `HelloWorldLayer` class contains all the code that displays the \"\
    Hello World\" label."
  raw: '#### Locating the HelloWorld Files


    First, here’s a quick primer in case you’ve never worked with Xcode before. By
    default, you’ll see a pane called Project Navigatoron the left side of the Xcode
    project window, like the one in [Figure 2–4](#Chapter02.html#fig_2_4). That’s
    where Xcode keeps all file references, among plenty of other things like targets
    and executables. Just focus on the groups and files for now that are below the
    HelloWorld project.


    ![images](images/0204.jpg)


    **Figure 2–4.** *Xcode’s Project Navigator pane. The expanded groups contain the
    project files we’ll be looking at.*


    In the group named cocos2d you’ll find all the files the cocos2d game engine consists
    of. Feel free to explore these files if you’re curious, but unless you know what
    you’re doing, you should not modify them. The same goes with the other cocos2d-related
    groups; they are the groups that are not expanded in [Figure 2–4](#Chapter02.html#fig_2_4).


    You don’t need to know the details of the cocos2d game engine, but it’s good to
    have the source files accessible, especially when it comes to debugging or in
    case you get curious and want to know how things work under the hood and learn
    a trick or two.


    **CAUTION:** Xcode’s Project Navigatorpane looks a lot like folders and files
    in Finder. Don’t mistake what Xcode calls groups for Finder’s folders. You can
    have your files in Xcode arranged in many groups, but in Finder they can and normally
    will still all be in the same folder. This is why they are not called folders
    but groups. They allow you to arrange files logically without affecting their
    physical location on your computer’s hard drive.


    #### Resources


    In the Resources group you’ll find (and later add) all the additional files that
    aren’t source code, such as images and audio files.


    The Default.png file is the image that’s displayed when iOS is loading your app,
    and Icon.png is, of course, the app’s icon. The fps_images.png file is used by
    cocos2d to display the framerate; you should not remove or modify it.


    Inside the Info.plist file you’ll find a number of settings for your application.
    You’ll only need to make changes here when you get close to publishing your app.


    #### Supporting Files


    If you’re familiar with programming in C or similar languages, you may recognize
    main.m in the Other Sources group as the starting point of the application. The
    only other file in this group is the precompiled header file Prefix.pch.


    ##### Main.m


    Everything that happens between the `main` function and the `HelloWorldAppDelegate`
    class is the behind-the-scenes magic of the iOS SDK, over which you have no control.
    Since you’ll hardly ever need to change main.m, you can safely ignore its contents.
    Still, it never hurts to peek inside.


    To quickly sum up, the `main` function creates an `NSAutoreleasePool` and then
    calls `UIApplicationMain` to start the application using `HelloWorldAppDelegate`
    as the class that implements the `UIApplicationDelegate` protocol.


    `int main(int argc, char *argv[])`

    `{`

    `    NSAutoreleasePool *pool = [NSAutoreleasePool new];`

    `int retVal = UIApplicationMain(argc, argv, nil,` ![images](images/U002.jpg)

    `        @"HelloWorldAppDelegate");`

    `    [pool release];`

    `    return retVal;`

    `}`


    The only interesting point to take away from this is that every iOS application
    uses an `NSAutoreleasePool` to help you manage memory. In short, by using the
    autorelease message on objects, you don’t have to worry about sending them a release
    message. The autorelease pool ensures that the memory of autorelease objects is
    eventually released. Don’t worry if you don’t know what the heck I’m talking about
    here. I’ll introduce you to memory management with cocos2d later in this chapter.


    You can also learn more about using autorelease pools in Apple’s Memory Management
    Programming Guide at [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html).


    ##### Precompiled Prefix Header


    Just in case you’re wondering what the Prefix.pch header file is for, it’s a tool
    used to speed up compilation. You are supposed to add the header files of frameworks
    that never or only rarely change to the prefix header. This causes the framework’s
    code to be compiled in advance and made available to all your classes. Unfortunately,
    it also has the disadvantage that, if a header added to the prefix header changes,
    all your code will recompile, which is why you should only add header files that
    rarely or never change.


    For example, the cocos2d.h header file is a good candidate to add to the prefix
    header, as I’ve done in [Listing 2–1](#Chapter02.html#list_2_1). To create a noticeable
    increase in compilation time, your project would need to be reasonably complex,
    however, so don’t get your stopwatch out just yet. But it’s good practice to add
    cocos2d.h as a prefix header right away, if only to never have to write `#import
    "cocos2d.h"` in any of your source files again.


    **Listing 2–1.** *Adding the cocos2d.h Header File to the Prefix Header*


    `#ifdef __OBJC__`

    `    #import <Foundation/Foundation.h>`

    `    #import <UIKit/UIKit.h>`

    **`#import "cocos2d.h"`**

    `#endif`


    Once again, you can refer to Apple’s developer documentation if you want to learn
    more about reducing build times with prefix headers: [`http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html`](http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html).


    #### HelloWorld Classes


    Two classes make up the core of the HelloWorld project. The `AppDelegate` class
    handles the application’s global events and state changes, while the `HelloWorldLayer`
    class contains all the code that displays the “Hello World” label.'
  trans: "\n### 定位 HelloWorld 文件\n\n首先，为您快速介绍一下。默认情况下，您会在 Xcode 项目窗口左侧看到一个名为 **项目导航器**\
    \ 的面板，如图 2–4 所示。Xcode 在此处保存所有文件引用，以及目标和可执行文件等其他内容。先暂时关注 HelloWorld 项目下的组和文件。\n\
    \n![images](img/0204.jpg)\n\n**图 2–4.** *Xcode 的项目导航器面板。展开的组包含了我们将要查看的项目文件。*\n\
    \n在名为 `cocos2d` 的组中，您可以找到构成 cocos2d 游戏引擎的所有文件。如果好奇，可以随意浏览这些文件，但除非您清楚自己在做什么，否则不应修改它们。其他与\
    \ cocos2d 相关的组也是如此；这些是在图 2–4 中未展开的组。\n\n您无需了解 cocos2d 游戏引擎的细节，但能够访问源文件是件好事，尤其是在调试时，或者当您感到好奇，想了解其底层运作机制并学习一些技巧时。\n\
    \n**注意：** Xcode 的项目导航器面板看起来很像 **访达** 中的文件夹和文件。请不要将 Xcode 所谓的 *组* 与 *访达* 的文件夹混淆。您可以在\
    \ Xcode 中将文件组织成多个组，但在 *访达* 中，它们通常（也可能始终）位于同一个文件夹中。这就是它们被称为 *组* 而非 *文件夹* 的原因。它们允许您逻辑地排列文件，而不会影响它们在计算机硬盘上的物理位置。\n\
    \n### 资源\n\n在 **资源** 组中，您可以找到（稍后也会添加）所有非源代码的额外文件，例如图片和音频文件。\n\n`Default.png` 文件是\
    \ iOS 加载您的应用时显示的图片，而 `Icon.png` 当然是应用的图标。`fps_images.png` 文件被 cocos2d 用来显示帧率；您不应移除或修改它。\n\
    \n在 `Info.plist` 文件中，您可以找到应用的大量设置。只有当您接近发布应用时，才需要在此处进行修改。\n\n### 支持文件\n\n如果您熟悉\
    \ C 或类似语言的编程，可能会认出 **其他源文件** 组中的 `main.m` 是应用程序的起点。该组中唯一的另一个文件是预编译头文件 `Prefix.pch`。\n\
    \n#### Main.m\n\n从 `main` 函数到 `HelloWorldAppDelegate` 类之间发生的所有事情，都是 iOS SDK 在幕后施展的魔法，您无法控制。由于您几乎不需要更改\
    \ `main.m`，因此可以安全地忽略其内容。不过，瞄一眼也并无坏处。\n\n简单总结一下，`main` 函数创建了一个 `NSAutoreleasePool`，然后调用\
    \ `UIApplicationMain` 来启动应用程序，其中 `HelloWorldAppDelegate` 作为实现 `UIApplicationDelegate`\
    \ 协议的类。\n\n```\nint main(int argc, char *argv[])\n{\n    NSAutoreleasePool *pool\
    \ = [NSAutoreleasePool new];\n    int retVal = UIApplicationMain(argc, argv, nil,\
    \        @\"HelloWorldAppDelegate\");\n    [pool release];\n    return retVal;\n\
    }\n```\n\n从中需要了解的唯一有趣点是：每个 iOS 应用程序都使用 `NSAutoreleasePool` 来帮助您管理内存。简而言之，通过对对象使用自动释放（`autorelease`）消息，您无需担心向它们发送\
    \ `release` 消息。自动释放池确保自动释放对象的内存最终会被释放。如果您对这里所说的内容一头雾水，也不必担心。本章稍后我将向您介绍 cocos2d\
    \ 的内存管理。\n\n您还可以在 Apple 的内存管理编程指南（[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/MemoryMgmt/Articles/mmAutoreleasePools.html)）中了解有关使用自动释放池的更多信息。\n\
    \n#### 预编译前缀头文件\n\n如果您想知道 `Prefix.pch` 头文件的作用，它是一种用于加速编译的工具。您应该将那些从不或极少更改的框架的头文件添加到前缀头文件中。这会使框架的代码被预先编译，并可供您的所有类使用。不幸的是，它也有一个缺点：如果添加到前缀头文件中的头文件发生了更改，您的所有代码都将重新编译，这就是为什么您只应添加那些很少或从不更改的头文件。\n\
    \n例如，`cocos2d.h` 头文件就是添加到前缀头文件的不错候选，如清单 2–1 所示。不过，要让编译时间有显著的提升，您的项目需要足够的复杂，所以先别急着拿出秒表。但将\
    \ `cocos2d.h` 立即作为前缀头文件添加是一个好习惯，仅仅是为了再也不用在源文件中编写 `#import \"cocos2d.h\"`。\n\n\
    **清单 2–1.** *将 `cocos2d.h` 头文件添加到前缀头文件*\n\n```\n#ifdef __OBJC__\n    #import <Foundation/Foundation.h>\n\
    \    #import <UIKit/UIKit.h>\n    #import \"cocos2d.h\"\n#endif\n```\n\n再次提醒，如果您想了解更多关于使用前缀头文件减少构建时间的信息，可以参考\
    \ Apple 的开发者文档：[`http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html`](http://developer.apple.com/mac/library/documentation/DeveloperTools/Conceptual/XcodeBuildSystem/800-Reducing_Build_Times/bs_speed_up_build.html)。\n\
    \n### HelloWorld 类\n\n有两个类构成了 HelloWorld 项目的核心。`AppDelegate` 类处理应用程序的全局事件和状态变更，而\
    \ `HelloWorldLayer` 类则包含显示“Hello World”标签的所有代码。\n"
- fmt: '### `AppDelegate`


    每个 iOS 应用程序都有一个实现 `UIApplicationDelegate` 协议的 `AppDelegate` 类。在我们的 HelloWorld
    项目中，它被简单地称为 `AppDelegate`。


    `AppDelegate` 是一个全局概念，你会在每个 iOS 应用程序中找到它。它用于追踪应用程序的状态变化，为此，它会在特定时间点从 iOS 接收消息。例如，它允许你确定用户何时收到来电，或者应用程序何时内存不足。你的应用程序收到的第一个消息将是
    `applicationDidFinishLaunching` 方法。所有启动代码都在此处，并且 cocos2d 在此处初始化。


    如果你想了解更多关于 `AppDelegate` 的各种方法、它们的作用以及 iOS SDK 何时发送这些消息，你可以在苹果关于 `UIApplicationDelegate`
    协议的参考文档中查找，地址是 [`http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`](http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol)。


    **注意**：既然我在谈论应用程序启动，我不妨也谈谈应用程序关闭。你最终可能会注意到 `AppDelegate` 的 `dealloc` 方法有一个奇怪之处：它永远不会被调用！任何在
    `AppDelegate` 的 `dealloc` 方法中设置的断点都不会被触发！


    这是正常行为。当 iOS 终止一个应用程序时，它只是将内存清空以加速关闭过程。这就是为什么 `AppDelegate` 类的 `dealloc` 方法中的任何代码都不会被执行的原因。此外，手动调用
    `dealloc` 是一种不好的做法，所以不要试图通过这样做来“修复”这个问题。如果你需要在应用程序终止前在 `AppDelegate` 中运行代码，请在
    `applicationWillTerminate` 方法中进行。


    在大多数情况下，在 cocos2d 初始化过程中你可能只想更改三件事：


    ```

    [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];

    [[CCDirector sharedDirector] setAnimationInterval:1.0/60];

    [[CCDirector sharedDirector] setDisplayFPS:YES];

    ```


    我将在以下章节中对每一项提供一些细节。


    ### 设备方向


    最重要的一项是设置设备方向。HelloWorld 应用程序使用了横向方向，这意味着你将横向手持你的 iOS 设备。如果你将此选项从 `kCCDeviceOrientationLandscapeLeft`
    更改为 `kCCDeviceOrientationLandscapeRight`，你会发现“Hello World”消息现在与之前相比是上下颠倒显示的。


    以下是支持的设备方向列表。尝试每一种，看看它们如何改变“Hello World”文本标签的方向。


    *   `kCCDeviceOrientationPortrait`

    *   `kCCDeviceOrientationPortraitUpsideDown`

    *   `kCCDeviceOrientationLandscapeLeft`

    *   `kCCDeviceOrientationLandscapeRight`


    **提示**：你可以在稍后的时间点更改设备方向，甚至在游戏过程中也可以。例如，你可以将其设置为用户可选择的游戏设置。只要你从一种横向模式更改为另一种横向模式，或从一种纵向模式更改为另一种纵向模式，你甚至不需要修改代码。允许用户选择以两种横向或纵向方向中的任何一种来玩游戏，实现起来非常简单。由于每个人对此都有不同的看法，让用户能够在常规方向和上下颠倒方向之间进行选择是一个好主意。请参考[第
    15 章](#Chapter15.html#ch15)，该章解释了如何实现自动旋转到当前设备方向。


    ### 动画间隔


    动画间隔决定了 cocos2d 更新屏幕的频率。实际上，这影响你的游戏能达到的最大帧率。


    然而，动画间隔不是以每秒帧数给出的。它是倒数，因为它决定了 cocos2d 更新屏幕的频率。这就是为什么参数是 `1.0/60`——因为 1 除以 60 等于
    0.0167，这是每次调用更新屏幕之间的时间（以秒为单位）。当然，如果你的游戏很复杂，CPU 或 GPU 显示一帧可能需要超过 0.0167 秒，因此无法保证始终达到
    60 fps。事实上，保持游戏以高帧率运行是你的责任。我将在本书中解释提高性能的技巧。


    在某些情况下，将帧率锁定为每秒 30 帧可能是可取的。这在非常复杂的游戏中可能很有帮助，因为在这些游戏中你无法持续达到 60 fps，并且帧率在 30 到
    60 fps 之间大幅波动。在这种情况下，通常最好将帧率锁定到最低共同标准，因为对于玩家来说，较低但稳定的帧率比即使实际平均帧率可能更高但趋于突然波动的帧率感觉更流畅。人类感知是一件棘手的事情。


    **注意**：在 iOS 设备上，你无法渲染超过每秒 60 帧。设备的显示器被锁定为以每秒 60 帧（Hz）更新，强制 cocos2d 每秒渲染超过 60
    帧，往好了说是没有任何作用，往坏了说实际上可能会降低你的帧率。如果你希望以最快速度运行 cocos2d，请坚持使用 `1.0/60` 的 `animationInterval`。


    ### 显示 FPS


    启用 FPS 显示将在屏幕左下角显示一个小数字。这是你的帧率，即屏幕更新的每秒帧数。理想情况下，你的游戏应始终以 60 fps 运行，特别是如果它是动作或快速反应类游戏。某些游戏，例如大多数益智游戏，以稳定的
    30 fps 运行就很好。FPS 显示有助于你跟踪帧率以及游戏遇到的任何卡顿或停顿。


    **注意**：如果你需要调整 FPS 显示的响应能力，你可以通过修改 `ccConfig.h` 中的 `CC_DIRECTOR_FPS_INTERVAL`
    行来实现。你会在 cocos2d Sources/cocos2d 组中找到这个文件。默认情况下，它被设置为 0.1，这意味着帧率显示每秒会更新十次。如果你增加这个值，FPS
    显示将在更长的时间段内取平均值。但是，你将无法看到任何突然的、短暂的帧率下降，而这仍然是能被注意到的。请记住这一点。'
  raw: '##### AppDelegate


    Every iOS application has one `AppDelegate` class that implements the `UIApplicationDelegate`
    protocol. In our HelloWorld project, it’s simply called `AppDelegate`.


    The `AppDelegate` is a global concept you’ll find in every iOS application. It
    is used to track state changes of the application, and to do this it receives
    messages from the iOS at certain points in time. For example, it allows you to
    determine when the user gets an incoming phone call or when the application is
    low on memory. The very first message your application will receive is the `applicationDidFinishLaunching`
    method. That’s where all the startup code goes and where cocos2d is initialized.


    If you want to learn more about the `AppDelegate`’s various methods, what they
    do, and when these messages are sent by the iOS SDK, you can look it up in Apple’s
    reference documentation on the `UIApplicationDelegate` protocol at [`http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`](http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol).


    **NOTE:** Since I’m talking about application startup, I might as well talk about
    application shutdown. You may eventually notice an oddity with the `AppDelegate`’s
    `dealloc` method. It never gets called! Any breakpoint set in the `AppDelegate`’s
    `dealloc` method will never be hit!


    This is normal behavior. When iOS terminates an application, it simply wipes the
    memory clean to speed up the shutdown process. That’s why any code inside the
    `dealloc` method of the AppDelegate class is never run. Also, it’s bad practice
    to call `dealloc` manually, so don’t try to “fix” this issue by doing so. If you
    ever need to run code in your `AppDelegate` just before the application terminates,
    do it inside the `applicationWillTerminate` method.


    In most cases, there are only three things you might want to change during the
    cocos2d initialization process:


    `[[CCDirector sharedDirector]` ![images](images/U002.jpg)

    `    setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];`

    `[[CCDirector sharedDirector] setAnimationInterval:1.0/60];`

    `[[CCDirector sharedDirector] setDisplayFPS:YES];`


    I’ll provide a few details on each of these in the following sections.


    ###### Device Orientation


    The most important one is setting the device orientation. The HelloWorld application
    uses a landscape orientation, which means you’ll be holding your iOS device sideways.
    If you change this option from `kCCDeviceOrientationLandscapeLeft` to `kCCDeviceOrientationLandscapeRight`,
    you’ll find that the message “Hello World” is now displayed upside down compared
    to what it was before.


    Here’s a list of supported device orientations. Try each of them to see how they
    change the “Hello World” text label orientation.


    *   `kCCDeviceOrientationPortrait`

    *   `kCCDeviceOrientationPortraitUpsideDown`

    *   `kCCDeviceOrientationLandscapeLeft`

    *   `kCCDeviceOrientationLandscapeRight`


    **TIP:** You can change the device orientation at a later point in time, even
    during game play. For example, you can make this a game setting the user can choose.
    As long as you change from one landscape mode to another or from one portrait
    mode to another, you don’t even need to modify your code. Allowing the user to
    choose to play the game in any of the two landscape or portrait directions is
    very straightforward to implement. Since everyone has a different opinion on that
    matter, it’s a good idea to let the user choose between the regular and the upside-down
    orientation. Please refer to [Chapter 15](#Chapter15.html#ch15), which explains
    how to implement autorotation to the current device orientation.


    ###### Animation Interval


    The animation interval determines how often cocos2d updates the screen. Effectively,
    this affects the maximum framerate your game can achieve.


    The animation interval is not given in frames per second, however. It’s the inverse
    because it determines how frequently cocos2d should update the screen. That’s
    why the parameter is 1.0/60—because 1 divided by 60 results in 0.0167, which is
    the time in seconds between each call to update the screen. Of course, if your
    game is complex, it might take the CPU or GPU longer than 0.0167 seconds to display
    a frame, so there’s no guarantee that 60 fps will be achieved throughout. As a
    matter of fact, it’s your responsibility to keep the game running at a high framerate.
    I’ll explain techniques to improve performance throughout the book.


    In some cases, it may be preferable to lock the framerate to 30 frames per second.
    This may be helpful in very complex games where you can’t achieve 60 fps consistently
    and the framerate fluctuates a lot between 30 and 60 fps. In such a case, it’s
    often better to lock the framerate to the lowest common denominator because a
    lower but steady framerate is perceived as smoother by players than a framerate
    that tends to fluctuate abruptly, even when the actual average framerate may be
    higher. Human perception is a tricky thing.


    **NOTE:** You can’t render more than 60 frames per second on iOS devices. The
    device’s display is locked to update at 60 frames per second (Hz), and forcing
    cocos2d to render more frames than 60 per second is, at best, not doing anything.
    At worst, it can actually slow down your framerate. Stick with the `animationInterval`
    of 1.0/60 if you want to run cocos2d at the fastest possible rate.


    ###### Display FPS


    Enabling the FPS display will show a small number at the lower-left corner of
    the screen. This is your framerate, or the frames per second the screen is updated.
    Ideally, your game should be running at 60 fps at all times, especially if it’s
    an action or twitch-based game. Some games, such as most puzzle games, can go
    with a constant 30 fps just fine. The FPS display helps you keep track of the
    framerate and any hiccups or stutters your game is experiencing.


    **NOTE:** If you need to tweak the responsiveness of the FPS display, you can
    do so by modifying the `CC_DIRECTOR_FPS_INTERVAL` line in ccConfig.h. You’ll find
    this file in the cocos2d Sources/cocos2d group. By default it is set to 0.1, which
    means the framerate display will be updated ten times per second. If you increase
    the value, the FPS display will average out over a longer period of time. However,
    you won’t be able to see any sudden, short drops in framerate, which can still
    be noticeable. Keep that in mind.'
  trans: '

    ### `AppDelegate`


    每个 iOS 应用程序都有一个实现 `UIApplicationDelegate` 协议的 `AppDelegate` 类。在我们的 HelloWorld
    项目中，它被简单地称为 `AppDelegate`。


    `AppDelegate` 是一个全局概念，你会在每个 iOS 应用程序中找到它。它用于追踪应用程序的状态变化，为此，它会在特定时间点从 iOS 接收消息。例如，它允许你确定用户何时收到来电，或者应用程序何时内存不足。你的应用程序收到的第一个消息将是
    `applicationDidFinishLaunching` 方法。所有启动代码都在此处，并且 cocos2d 在此处初始化。


    如果你想了解更多关于 `AppDelegate` 的各种方法、它们的作用以及 iOS SDK 何时发送这些消息，你可以在苹果关于 `UIApplicationDelegate`
    协议的参考文档中查找，地址是 [`http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol`](http://developer.apple.com/iphone/library/documentation/uikit/reference/UIApplicationDelegate_Protocol)。


    **注意**：既然我在谈论应用程序启动，我不妨也谈谈应用程序关闭。你最终可能会注意到 `AppDelegate` 的 `dealloc` 方法有一个奇怪之处：它永远不会被调用！任何在
    `AppDelegate` 的 `dealloc` 方法中设置的断点都不会被触发！


    这是正常行为。当 iOS 终止一个应用程序时，它只是将内存清空以加速关闭过程。这就是为什么 `AppDelegate` 类的 `dealloc` 方法中的任何代码都不会被执行的原因。此外，手动调用
    `dealloc` 是一种不好的做法，所以不要试图通过这样做来“修复”这个问题。如果你需要在应用程序终止前在 `AppDelegate` 中运行代码，请在
    `applicationWillTerminate` 方法中进行。


    在大多数情况下，在 cocos2d 初始化过程中你可能只想更改三件事：


    ```

    [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];

    [[CCDirector sharedDirector] setAnimationInterval:1.0/60];

    [[CCDirector sharedDirector] setDisplayFPS:YES];

    ```


    我将在以下章节中对每一项提供一些细节。


    ### 设备方向


    最重要的一项是设置设备方向。HelloWorld 应用程序使用了横向方向，这意味着你将横向手持你的 iOS 设备。如果你将此选项从 `kCCDeviceOrientationLandscapeLeft`
    更改为 `kCCDeviceOrientationLandscapeRight`，你会发现“Hello World”消息现在与之前相比是上下颠倒显示的。


    以下是支持的设备方向列表。尝试每一种，看看它们如何改变“Hello World”文本标签的方向。


    *   `kCCDeviceOrientationPortrait`

    *   `kCCDeviceOrientationPortraitUpsideDown`

    *   `kCCDeviceOrientationLandscapeLeft`

    *   `kCCDeviceOrientationLandscapeRight`


    **提示**：你可以在稍后的时间点更改设备方向，甚至在游戏过程中也可以。例如，你可以将其设置为用户可选择的游戏设置。只要你从一种横向模式更改为另一种横向模式，或从一种纵向模式更改为另一种纵向模式，你甚至不需要修改代码。允许用户选择以两种横向或纵向方向中的任何一种来玩游戏，实现起来非常简单。由于每个人对此都有不同的看法，让用户能够在常规方向和上下颠倒方向之间进行选择是一个好主意。请参考第
    15 章，该章解释了如何实现自动旋转到当前设备方向。


    ### 动画间隔


    动画间隔决定了 cocos2d 更新屏幕的频率。实际上，这影响你的游戏能达到的最大帧率。


    然而，动画间隔不是以每秒帧数给出的。它是倒数，因为它决定了 cocos2d 更新屏幕的频率。这就是为什么参数是 `1.0/60`——因为 1 除以 60 等于
    0.0167，这是每次调用更新屏幕之间的时间（以秒为单位）。当然，如果你的游戏很复杂，CPU 或 GPU 显示一帧可能需要超过 0.0167 秒，因此无法保证始终达到
    60 fps。事实上，保持游戏以高帧率运行是你的责任。我将在本书中解释提高性能的技巧。


    在某些情况下，将帧率锁定为每秒 30 帧可能是可取的。这在非常复杂的游戏中可能很有帮助，因为在这些游戏中你无法持续达到 60 fps，并且帧率在 30 到
    60 fps 之间大幅波动。在这种情况下，通常最好将帧率锁定到最低共同标准，因为对于玩家来说，较低但稳定的帧率比即使实际平均帧率可能更高但趋于突然波动的帧率感觉更流畅。人类感知是一件棘手的事情。


    **注意**：在 iOS 设备上，你无法渲染超过每秒 60 帧。设备的显示器被锁定为以每秒 60 帧（Hz）更新，强制 cocos2d 每秒渲染超过 60
    帧，往好了说是没有任何作用，往坏了说实际上可能会降低你的帧率。如果你希望以最快速度运行 cocos2d，请坚持使用 `1.0/60` 的 `animationInterval`。


    ### 显示 FPS


    启用 FPS 显示将在屏幕左下角显示一个小数字。这是你的帧率，即屏幕更新的每秒帧数。理想情况下，你的游戏应始终以 60 fps 运行，特别是如果它是动作或快速反应类游戏。某些游戏，例如大多数益智游戏，以稳定的
    30 fps 运行就很好。FPS 显示有助于你跟踪帧率以及游戏遇到的任何卡顿或停顿。


    **注意**：如果你需要调整 FPS 显示的响应能力，你可以通过修改 `ccConfig.h` 中的 `CC_DIRECTOR_FPS_INTERVAL`
    行来实现。你会在 cocos2d Sources/cocos2d 组中找到这个文件。默认情况下，它被设置为 0.1，这意味着帧率显示每秒会更新十次。如果你增加这个值，FPS
    显示将在更长的时间段内取平均值。但是，你将无法看到任何突然的、短暂的帧率下降，而这仍然是能被注意到的。请记住这一点。

