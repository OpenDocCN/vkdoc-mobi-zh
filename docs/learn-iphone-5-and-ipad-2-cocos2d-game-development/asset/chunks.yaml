- fmt: "### Shoot 'em Up with Particle Effects\n\nI'd love to see some of these effects\
    \ in the game! Let's take the shoot-'em-up game to a new level. You'll find the\
    \ results in this chapter's `ShootEmUp04` project along with added sound effects,\
    \ as well as in [Figure 9–12](#Chapter09.html#fig_9_12).\n\nIn the `EnemyEntity`\
    \ class, the `gotHit` method is the perfect place to add destructive particle\
    \ explosions, as [Listing 9–5](#Chapter09.html#list_9_5) shows. I decided the\
    \ boss monster should have its own particle effect, mostly because it's so big.\
    \ And purple.\n\n**Listing 9–5.** *Adding an Explosion Effect to the Shoot 'em\
    \ Up Game*\n\n```\n-(void) gotHit\n{\n    hitPoints--;\n    if (hitPoints <= 0)\n\
    \    {\n        self.visible = NO;\n\n        // Play a particle effect when the\
    \ enemy was destroyed\n        CCParticleSystem* system;\n\n        if (type ==\
    \ EnemyTypeBoss)\n        {\n            system = [ARCH_OPTIMAL_PARTICLE_SYSTEM\
    \ particleWithFile:@\"fx-explosion2.plist\"];\n        }\n        else\n     \
    \   {\n            system = [ARCH_OPTIMAL_PARTICLE_SYSTEM particleWithFile:@\"\
    fx-explosion.plist\"];\n        }\n\n        // Set some parameters that can't\
    \ be set in Particle Designer\n        system.positionType = kCCPositionTypeFree;\n\
    \        system.autoRemoveOnFinish = YES;\n        system.position = self.position;\n\
    \n        [[GameScene sharedGameScene] addChild:system];\n    }\n}\n```\n\nThe\
    \ particle effects `fx-explosion.plist` and `fx-explosion2.plist` must be added\
    \ as resources to the Xcode project. The particle system is initialized as before.\
    \ Since the particle effect should and must be independent from the enemy that\
    \ creates it, a few preparations are necessary. First, the `autoRemoveOnFinish`\
    \ flag is set to `YES` so that the effect automatically removes itself. This works\
    \ because both explosions run only for a short time. The effect also needs the\
    \ current position of the enemy so that it's displayed at the correct position.\n\
    \nI add the particle effect to the `GameScene` because the enemy itself can't\
    \ display the particle effect. To start, it's invisible. It also might be respawned\
    \ very soon, which would interfere with the particle effect. But most importantly,\
    \ all `EnemyEntity` objects are added to a `CCSpriteBatchNode`, which does not\
    \ allow you to add anything but `CCSprite` objects. If the particle effect were\
    \ added to the `EnemyEntity` object, a runtime exception would be inevitable.\n\
    \nAs you play the game with the new particle effects, you may notice that the\
    \ first time one of these effects displays, the game play stops for a short moment.\
    \ That's because cocos2d is loading the particle effect's texture—a rather slow\
    \ process, whether the texture is embedded into the plist, as in this case, or\
    \ provided as a separate texture. To avoid that, I've added a preloading mechanism\
    \ to the `GameScene`: the `init` method now calls the `preloadParticleEffect`\
    \ method for each particle effect used during gameplay:\n\n```\n// To preload\
    \ the textures, play each effect once off-screen\n[self preloadParticleEffects:@\"\
    fx-explosion.plist\"];\n[self preloadParticleEffects:@\"fx-explosion2.plist\"\
    ];\n```\n\nThe `preloadParticleEffects` method simply creates the particle effect.\
    \ Because the returned object is an autorelease object, its memory will be freed\
    \ automatically. But the texture it loads will still be in the `CCTextureCache`.\n\
    \n```\n-(void) preloadParticleEffects:(NSString*)particleFile\n{\n    [ARCH_OPTIMAL_PARTICLE_SYSTEM\
    \ particleWithFile:particleFile];\n}\n```\n\nIf you chose not to embed the texture\
    \ inside the particle effect plist file, you can preload the particle effect textures\
    \ simply by calling the `CCTextureCacheaddImage` method:\n\n```\n[[CCTextureCache\
    \ sharedTextureCache] addImage:particleFile];\n```\n\n**Figure 9–12.** *I killed\
    \ the boss, and I can't see a darn thing. But those particles are so beautiful!*\n\
    \n### Summary\n\nThis chapter was truly a visual joyride! The stock effects provided\
    \ by cocos2d give a good indication of what the particle effect is able to deliver.\
    \ They're quick and easy to use.\n\nBut it was also excruciating to create a particle\
    \ effect in source code. There are so many properties to tweak; some are exclusive\
    \ to specific emitter modes; some have misleading names, and they aren't exactly\
    \ straightforward to figure out. With the explanation for each property, however,\
    \ you should now have a good understanding how a particle effect is put together\
    \ and what the most important parameters are.\n\nWe then saw how particle effects\
    \ can shine with `Particle Designer`. This tool is extremely helpful—and lots\
    \ of fun—to work with it. Suddenly, when you can move sliders and see the results\
    \ immediately on-screen, it changes your whole view on particle effects, and even\
    \ more so since you can share your creations with others and experiment with other\
    \ designers' effects.\n\nFinally the Shoot ‘em Up game got a makeover and now\
    \ plays particle explosions when enemies are destroyed. This makes for a much\
    \ more lively game.\n\nIn the next chapter I'll set the Shoot 'em Up game aside\
    \ for a bit to tell you all you need to know about tilemaps.\n\n## Chapter 10\n\
    \n## Working with Tilemaps\n\nIn the next two chapters, I'll introduce you to\
    \ the world of tile-based games. Whether you've been playing games since the age\
    \ of classic role-playing games like Ultima or you've just recently joined your\
    \ Facebook friends in Farmville, I'm sure you've already played a game that uses\
    \ the tilemap concept for displaying its graphics.\n\nIn tilemap games, the graphics\
    \ consist of a small number of images, called *tiles*, that align with each other;\
    \ placing them on a grid allows us to build rather convincing game worlds. The\
    \ concept is very attractive because it conserves memory as compared to drawing\
    \ the whole world as individual textures, while still allowing a lot of variety.\n\
    \nThis chapter will introduce general tilemap concepts by using the simplest tilemaps\
    \ of all: *orthogonal tilemaps*. They are most often built from square, rarely\
    \ from nonsquare rectangular tiles, and typically display the world in a top-down\
    \ fashion. I'll discuss the various display styles of tilemaps, and the next chapter\
    \ will focus on isometric tilemaps, building on the tilemap programming basics\
    \ that you'll learn in this chapter."
