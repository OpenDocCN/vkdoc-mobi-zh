  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成专业、准确的中文。



    ### 粒子大小


    粒子的大小由 `startSize` 和 `endSize` 属性以像素为单位给出，它们决定了粒子发射时的大小以及被移除时的大小。粒子的大小会从 `startSize`
    逐渐缩放至 `endSize`。


    ```

    self.startSize = 40.0f;

    self.startSizeVar = 0.0f;

    self.endSize = kCCParticleStartSizeEqualToEndSize;

    self.endSizeVar = 0;

    ```


    常量 `kCCParticleStartSizeEqualToEndSize` 可用于确保粒子在其生命周期内大小保持不变。


    ### 粒子方向


    粒子初始发射的方向由 `angle` 属性设置，以 0 到 360 度的角度为单位。值为 `0` 表示粒子将向上发射，但这仅适用于重力 `emitterMode`。在半径
    `emitterMode` 中，`angle` 属性决定了粒子将在 `startRadius` 上的哪个位置发射；值越大，发射点将沿半径逆时针移动。


    ```

    self.angle = 0;

    self.angleVar = 0;

    ```


    ### 粒子生命周期


    粒子的生命周期决定了它从开始到结束需要多少秒，结束时会淡出并消失。`life` 属性设置单个粒子的生命周期。请记住，粒子的生命周期越长，任何时刻屏幕上显示的粒子就越多。如果达到了粒子的总数上限，则在部分现有粒子消亡之前，不会生成新的粒子。


    ```

    self.life = 5.0f;

    self.lifeVar = 1.0f;

    ```


    `emissionRate` 属性直接影响每秒创建的粒子数量。与 `totalParticles` 属性一起，它对粒子效果的外观有很大影响。


    ```

    self.emissionRate = 30;

    self.totalParticles = 250;

    ```


    通常，您需要平衡 `emissionRate`，使其与粒子生命周期以及粒子效果中允许的 `totalParticles` 相匹配。您可以通过将 `totalParticles`
    除以 `life` 并将结果设置为 `emissionRate` 来实现这一点：


    ```

    self.emissionRate = self.totalParticles / self.life;

    ```


    **提示：** 通过调整粒子生命周期、系统中允许的粒子总数以及 `emissionRate`，您可以创建爆发效果，即让粒子流频繁中断，仅仅因为屏幕上的粒子数量有限，而新粒子发射得相对较快。另一方面，如果您注意到粒子流中出现不希望的间隙，则需要增加允许的粒子数量，或者更好的做法是减少生命周期和/或发射速率。在这种情况下，您应该使用
    `emissionRate = totalParticles / life`。


    ### 粒子颜色


    每个粒子可以从起始颜色过渡到结束颜色，从而产生粒子效果闻名的鲜艳色彩。您至少应该在粒子效果中设置 `startColor`；否则，由于默认颜色是黑色，粒子可能完全不可见。颜色类型为
    `ccColor4F`，这是一个具有四个浮点成员的结构体：`r`、`g`、`b` 和 `a`，分别对应红色、绿色、蓝色以及决定颜色不透明度的 alpha 通道。每个成员的值范围是
    0 到 1，其中 1 代表全色。


    如果您想要一个纯白色的粒子颜色，需要将 `r`、`g`、`b` 和 `a` 四个成员全部设置为 `1`。如果您想要红色，只需要将 `r` 和 `a` 的值设置为
    `1.0f`。如果您想要蓝色，则将 `b` 和 `a` 设置为 `1.0f`。请注意，`a` 值是颜色的 alpha 透明度。如果您将其保留在默认值 `0.0f`，颜色将完全透明，因此不可见。


    ```

    // startColor 主要为红色且完全不透明

    startColor.r = 1.0f;

    startColor.g = 0.25f;

    startColor.b = 0.12f;

    startColor.a = 1.0f;

    // startColor 没有变化（正负 0.0f）

    startColorVar.r = 0.0f;

    startColorVar.g = 0.0f;

    startColorVar.b = 0.0f;

    startColorVar.a = 0.0f;

    // endColor 是完全不透明的黑色

    endColor.r = 0.0f;

    endColor.g = 0.0f;

    endColor.b = 0.0f;

    endColor.a = 1.0f;

    // endColorVar 为蓝色指定了全范围的变化

    // 粒子在生命周期结束时的颜色将在黑色和蓝色之间随机

    endColorVar.r = 0.0f;

    endColorVar.g = 0.0f;

    endColorVar.b = 1.0f;

    endColorVar.a = 0.0f;

    ```


    ### 粒子混合模式


    *混合* 是指粒子的像素在显示到屏幕之前所经过的计算过程。`blendFunc` 属性接收一个 `ccBlendFunc` 结构体作为输入，该结构体提供源混合模式和目标混合模式：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

    ```


    混合的工作原理是，获取源图像（粒子）的红、绿、蓝和 alpha 值，并将其与渲染粒子时屏幕上已有的任何图像的颜色混合。实际上，粒子以其背景特定方式进行混合，而
    `blendFunc` 决定了源图像的颜色有多少以及与背景的哪些颜色进行混合，以及混合的程度。


    确定屏幕上最终像素颜色的公式如下：


    ```

    (源颜色 * 源混合函数) + (目标颜色 * 目标混合函数)

    ```


    假设示例中的源像素的 RGB 值为 `(0.1, 0.2, 0.3)`，目标像素的 RGB 值为 `(0.4, 0.5, 0.6)`。两个颜色值都乘以混合函数，最简单的就是
    `GL_ONE`，它等于 `1.0`。这意味着生成的像素颜色将如下：


    ```

    (0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)

    ```


    `blendFunc` 属性对粒子的显示方式有着非常深远的影响。通过对源和目标使用以下混合模式的组合，您可以创建相当奇异的效果，或者简单地导致效果渲染为黑色方块。这为实验提供了很大空间。


    *   `GL_ZERO`

    *   `GL_ONE`

    *   `GL_SRC_COLOR`

    *   `GL_ONE_MINUS_SRC_COLOR`

    *   `GL_SRC_ALPHA`

    *   `GL_ONE_MINUS_SRC_ALPHA`

    *   `GL_DST_ALPHA`

    *   `GL_ONE_MINUS_DST_ALPHA`


    您可以在 OpenGL ES 文档中找到关于 OpenGL 混合模式的更多信息以及混合计算的细节，地址是 [www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html](http://www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html)。


    **提示：** 由于很难想象哪些混合函数会在不同图像上产生何种结果，我想为您推荐一篇描述了最常见混合操作并附有示例图像的文章：[www.machwerx.com/2009/02/11/glblendfunc/](http://www.machwerx.com/2009/02/11/glblendfunc/)。


    更有趣的是 Anders Riggelsen 开发的 Visual glBlendFunc 工具：[www.andersriggelsen.dk/OpenGL/](http://www.andersriggelsen.dk/OpenGL/)。使用任何兼容
    HTML5 的浏览器，您都可以尝试各种图像和混合函数，并立即看到结果。


    请注意，您也可以修改其他 cocos2d 节点的 `blendFunc` 属性，即所有遵循 `CCBlendProtocol` 协议的节点，例如 `CCSprite`、`CCSpriteBatchNode`、`CCLabelTTF`、`CCLayerColor`
    和 `CCLayerGradient` 等类。


    源混合模式和目标混合模式 `GL_SRC_ALPHA` 和 `GL_ONE` 经常组合使用以创建加法混合，从而在许多粒子相互叠加绘制时产生非常明亮甚至白色的颜色：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};

    ```


    或者，您也可以简单地将 `blendAdditive` 属性设置为 `YES`，这与将 `blendFunc` 设置为 `GL_SRC_ALPHA` 和 `GL_ONE`
    效果相同：


    ```

    self.blendAdditive = YES;

    ```


    使用 `GL_SRC_ALPHA` 和 `GL_ONE_MINUS_SRC_ALPHA` 可以设置常规混合模式，这将创建透明粒子：


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};

    ```

