- fmt: "### Layers as Levels\n\nUsing separate layers in the same scene to load and\
    \ display levels is an approach that’s recommended if you have a complex user\
    \ interface that should not be reset when a level changes. You might even want\
    \ to keep the player and other game objects in the exact same positions and states\
    \ when changing levels.\n\nYou’ll probably have a number of variables that keep\
    \ the current game state and user interface settings, such as an inventory. It\
    \ would be more work to save and restore these game settings and reset all visual\
    \ elements than to switch out one layer with another within the same scene. This\
    \ may be the ideal solution for a hidden object or adventure game, where you move\
    \ from room to room, especially if you want to replace the level contents using\
    \ an animation that moves in or out beneath the user interface.\n\nThe `CCMultiplexLayer`\
    \ class may be the ideal solution for such an approach. It can contain multiple\
    \ nodes, but only one will be active at any given time. [Listing 5–10](#Chapter05.html#list_5_10)\
    \ shows an example of using the `CCMultiplexLayer` class. The only drawback is\
    \ that you can’t transition between the layers. There’s only one layer visible\
    \ at a time, which makes any transition effects impossible.\n\n**Listing 5–10.**\
    \ *Using the `CCMultiplexLayer` Class to Switch Between Multiple Layers*\n\n```\n\
    CCLayer* layer1 = [CCLayer node];\nCCLayer* layer2 = [CCLayer node];\nCCMultiplexLayer*\
    \ mpLayer = [CCMultiplexLayer layerWithLayers:layer1, layer2, nil];\n\n// Switches\
    \ to layer2 but keeps layer1 as child of mpLayer.\n[mpLayer switchTo:1];     \
    \                     \n\n// Switches to layer1, removes layer2 from mpLayer and\
    \ releases its memory.\n// After this call you must not switch back to layer2\
    \ (index: 1) anymore!\n[mpLayer switchToAndReleaseMe:0];\n```\n\n### `CCLayerColor`\n\
    \nIn the `ScenesAndLayers` project, so far the background is simply a black screen.\
    \ You can see it when you scroll to the edge of the grassy background image or\
    \ tap the “user interface” to have the `GameLayer` zoom out. To change the background\
    \ color, cocos2d provides a `CCLayerColor`, which is added to the `ScenesAndLayers05`\
    \ project and works like this:\n\n```\n// Set background color to magenta. The\
    \ most unobtrusive color imaginable.\nCCLayerColor* colorLayer = [CCLayerColor\
    \ layerWithColor:ccc4(255, 0, 255, 255)];\n[self addChild:colorLayer z:0];\n```\n\
    \nIf you’re somewhat familiar with OpenGL, it may seem like overkill to add a\
    \ separate layer just to change the background color. You can achieve the same\
    \ effect using OpenGL, like this:\n\n```\nglClearColor(1, 0, 1, 1);\n```\n\nBut\
    \ please test this with your game’s scene transitions first, since changing the\
    \ `glClearColor` can have an adverse effect on scene transitions. For example,\
    \ when using `CCTransitionFade`, the clear color will shine through regardless\
    \ of the color you use to initialize `CCTransitionFade`.\n\n## Subclassing Game\
    \ Objects from `CCSprite`\n\nVery often your game objects will implement logic\
    \ of their own. It makes sense to create a separate class for each type of game\
    \ object. This could be your player character, various enemy types, bullets, missiles,\
    \ platforms, and about everything else that can be individually placed in a game’s\
    \ scene and needs to run logic of its own. The question then is, where to subclass\
    \ from?\n\nA lot of developers choose the seemingly obvious route of subclassing\
    \ `CCSprite`. I don’t think that’s a good idea. The relationship of subclassing\
    \ is a “is a” relationship. Think closely, is your player character a `CCSprite`?\
    \ Are all of your enemy characters `CCSprite`s? At first the answer seems logical:\
    \ of course they are sprites! That’s what they use to display themselves. But\
    \ wait a second. Could they be something else other than `CCSprite`? For all I\
    \ know, game characters can also be characters in the literal sense. In Rogue-like\
    \ games, your player character is an `@`. So, would that character be a `CCLabelTTF`\
    \ then?\n\nI think the confusion comes from `CCSprite` being the most widely used\
    \ class to display anything on-screen. But the true relationship of your game\
    \ characters to `CCNode` classes is a “has a” relationship. Your player class\
    \ “has a” `CCSprite` that it uses to display itself. In a Rogue-like game, the\
    \ player character class “has a” `CCLabelTTF` to display itself. And if you want\
    \ to get fancy, as in OpenGL and lots of particle effects, your player class “has\
    \ a” system of particle effects to represent it visually on-screen.\n\nThe distinction\
    \ becomes even clearer when you think of why you’d normally subclass the `CCSprite`\
    \ class: in general, to add new features to the `CCSprite` class—for example,\
    \ to have a `CCSprite` class that uses a `CCRenderTexture` to modify how it is\
    \ displayed based on what is beneath it on the screen. But what kind of code do\
    \ you add to the `CCSprite` class when you would subclass it to be your player\
    \ object? Input handling, animating the player, collision detection, physics;\
    \ in general: game logic. None of these things belong to a `CCSprite` class because\
    \ this code is about how an object behaves and how you interact with it, not how\
    \ a sprite is drawn on the screen. Another way to look at this is to consider\
    \ which of the code you add to a subclassed `CCSprite` is generally useful and\
    \ usable by all sprites. For example, the code that handles user input to control\
    \ the player character is useful and usable only by the player object and not\
    \ all sprites in general.\n\nYou may still be wondering why this has any relevance,\
    \ or why you should care? Consider the case where you want your player to have\
    \ several visual representations that it should be able to switch to seamlessly.\
    \ If the player needs to morph from one sprite to another using `FadeIn`/`FadeOut`\
    \ actions, you’re going to have to use two sprites. Or if you want your game objects\
    \ to appear on different parts of the screen at the same time, like in a game\
    \ like Asteroids where the asteroid leaving the top of the screen should also\
    \ show up partially at the bottom of the screen. You need two sprites to do this,\
    \ and that’s just one reason why composition (or aggregation) is preferable to\
    \ subclassing (or inheritance). Inheritance causes tight coupling between classes,\
    \ with changes to parent classes potentially introducing bugs and anomalies in\
    \ subclasses. The deeper the class hierarchy, the more code will reside in base\
    \ classes, which amplifies the problem.\n\nAnother good reason is that a game\
    \ object encapsulates its visual representation. If the logic is self-contained,\
    \ only the game object itself should ever change any of the `CCNode` properties,\
    \ such as position, scale, rotation, or even running and stopping actions. One\
    \ of the core problems many game developers face sooner or later is that their\
    \ game objects are directly manipulated by outside influences. For example, you\
    \ may inadvertently create situations where the scene’s layer, the user interface,\
    \ and the player object itself all change the player sprite’s position. This is\
    \ undesirable. You want all of the other systems to notify the player object to\
    \ change its position, giving the player object itself the final say about how\
    \ to interpret these commands, whether to apply them, modify them, or ignore them."
  raw: '##### Layers as Levels


    Using separate layers in the same scene to load and display levels is an approach
    that’s recommended if you have a complex user interface that should not be reset
    when a level changes. You might even want to keep the player and other game objects
    in the exact same positions and states when changing levels.


    You’ll probably have a number of variables that keep the current game state and
    user interface settings, such as an inventory. It would be more work to save and
    restore these game settings and reset all visual elements than to switch out one
    layer with another within the same scene.


    This may be the ideal solution for a hidden object or adventure game, where you
    move from room to room, especially if you want to replace the level contents using
    an animation that moves in or out beneath the user interface.


    The `CCMultiplexLayer` class may be the ideal solution for such an approach. It
    can contain multiple nodes, but only one will be active at any given time. [Listing
    5–10](#Chapter05.html#list_5_10) shows an example of using the `CCMultiplexLayer`
    class. The only drawback is that you can’t transition between the layers. There’s
    only one layer visible at a time, which makes any transition effects impossible.


    **Listing 5–10.** *Using the CCMultiplexLayer Class to Switch Between Multiple
    Layers*


    `CCLayer* layer1 = [CCLayer node];`

    `CCLayer* layer2 = [CCLayer node];`

    `CCMultiplexLayer* mpLayer = [CCMultiplexLayer layerWithLayers:layer1, layer2,
    nil];`


    `// Switches to layer2 but keeps layer1 as child of mpLayer.`

    `[mpLayer switchTo:1];`


    `// Switches to layer1, removes layer2 from mpLayer and releases its memory.`

    `// After this call you must not switch back to layer2 (index: 1) anymore!`

    `[mpLayer switchToAndReleaseMe:0];`


    #### CCLayerColor


    In the ScenesAndLayers project, so far the background is simply a black screen.
    You can see it when you scroll to the edge of the grassy background image or tap
    the “user interface” to have the `GameLayer` zoom out. To change the background
    color, cocos2d provides a `CCLayerColor`, which is added to the ScenesAndLayers05
    project and works like this:


    `// Set background color to magenta. The most unobtrusive color imaginable.`

    `CCLayerColor* colorLayer = [CCLayerColor layerWithColor:ccc4(255, 0, 255, 255)];`

    `[self addChild:colorLayer z:0];`


    If you’re somewhat familiar with OpenGL, it may seem like overkill to add a separate
    layer just to change the background color. You can achieve the same effect using
    OpenGL, like this:


    `glClearColor(1, 0, 1, 1);`


    But please test this with your game’s scene transitions first, since changing
    the `glClearColor` can have an adverse effect on scene transitions. For example,
    when using `CCTransitionFade`, the clear color will shine through regardless of
    the color you use to initialize `CCTransitionFade`.


    ### Subclassing Game Objects from CCSprite


    Very often your game objects will implement logic of their own. It makes sense
    to create a separate class for each type of game object. This could be your player
    character, various enemy types, bullets, missiles, platforms, and about everything
    else that can be individually placed in a game’s scene and needs to run logic
    of its own.


    The question then is, where to subclass from?


    A lot of developers choose the seemingly obvious route of subclassing `CCSprite`.
    I don’t think that’s a good idea. The relationship of subclassing is a “is a”
    relationship. Think closely, is your player character a `CCSprite`? Are all of
    your enemy characters `CCSprite`s?


    At first the answer seems logical: of course they are sprites! That’s what they
    use to display themselves. But wait a second. Could they be something else other
    than `CCSprite`? For all I know, game characters can also be characters in the
    literal sense. In Rogue-like games, your player character is an @. So, would that
    character be a `CCLabelTTF` then?


    I think the confusion comes from `CCSprite` being the most widely used class to
    display anything on-screen. But the true relationship of your game characters
    to `CCNode` classes is a “has a” relationship. Your player class “has a” `CCSprite`
    that it uses to display itself. In a Rogue-like game, the player character class
    “has a” `CCLabelTTF` to display itself. And if you want to get fancy, as in OpenGL
    and lots of particle effects, your player class “has a” system of particle effects
    to represent it visually on-screen.


    The distinction becomes even clearer when you think of why you’d normally subclass
    the `CCSprite` class: in general, to add new features to the `CCSprite` class—for
    example, to ave a `CCSprite` class that uses a `CCRenderTexture` to modify how
    it is displayed based on what is beneath it on the screen.


    But what kind of code do you add to the `CCSprite` class when you would subclass
    it to be your player object? Input handling, animating the player, collision detection,
    physics; in general: game logic. None of these things belong to a `CCSprite` class
    because this code is about how an object behaves and how you interact with it,
    not how a sprite is drawn on the screen. Another way to look at this is to consider
    which of the code you add to a subclassed `CCSprite` is generally useful and usable
    by all sprites. For example, the code that handles user input to control the player
    character is useful and usable only by the player object and not all sprites in
    general.


    You may still be wondering why this has any relevance, or why you should care?
    Consider the case where you want your player to have several visual representations
    that it should be able to switch to seamlessly. If the player needs to morph from
    one sprite to another using `FadeIn`/`FadeOut` actions, you’re going to have to
    use two sprites. Or if you want your game objects to appear on different parts
    of the screen at the same time, like in a game like Asteroids where the asteroid
    leaving the top of the screen should also show up partially at the bottom of the
    screen. You need two sprites to do this, and that’s just one reason why composition
    (or aggregation) is preferable to subclassing (or inheritance). Inheritance causes
    tight coupling between classes, with changes to parent classes potentially introducing
    bugs and anomalies in subclasses. The deeper the class hierarchy, the more code
    will reside in base classes, which amplifies the problem.


    Another good reason is that a game object encapsulates its visual representation.
    If the logic is self-contained, only the game object itself should ever change
    any of the `CCNode` properties, such as position, scale, rotation, or even running
    and stopping actions. One of the core problems many game developers face sooner
    or later is that their game objects are directly manipulated by outside influences.
    For example, you may inadvertently create situations where the scene’s layer,
    the user interface, and the player object itself all change the player sprite’s
    position. This is undesirable. You want all of the other systems to notify the
    player object to change its position, giving the player object itself the final
    say about how to interpret these commands, whether to apply them, modify them,
    or ignore them.'
  trans: "\n### 图层即关卡\n\n在同一场景中使用单独的图层加载和显示关卡，是一种值得推荐的方法，尤其是当您拥有一个不应在关卡切换时重置的复杂用户界面时。您甚至可能希望在切换关卡时，让玩家和其他游戏对象保持完全相同的位置和状态。\n\
    \n您可能会拥有许多用于保存当前游戏状态和用户界面设置的变量，例如物品栏。与在同一场景内将一个图层切换为另一个图层相比，保存并恢复这些游戏设置以及重置所有视觉元素的工作量要大得多。对于隐藏物体游戏或冒险游戏来说，这可能是理想的解决方案，尤其是当您希望使用在用户界面下方移入或移出的动画来替换关卡内容时。\n\
    \n`CCMultiplexLayer` 类可能是实现此类方法的理想选择。它可以包含多个节点，但在任何给定时间只有一个节点处于激活状态。代码清单 5–10\
    \ 展示了如何使用 `CCMultiplexLayer` 类的示例。其唯一的缺点是无法在图层之间进行过渡转换。一次只能看到一个图层，这使得任何过渡效果都无法实现。\n\
    \n**代码清单 5–10.** *使用 `CCMultiplexLayer` 类在多个图层之间切换*\n\n```\nCCLayer* layer1 =\
    \ [CCLayer node];\nCCLayer* layer2 = [CCLayer node];\nCCMultiplexLayer* mpLayer\
    \ = [CCMultiplexLayer layerWithLayers:layer1, layer2, nil];\n\n// 切换到 layer2，但保留\
    \ layer1 作为 mpLayer 的子节点。\n[mpLayer switchTo:1];                          \n\n\
    // 切换到 layer1，将 layer2 从 mpLayer 中移除并释放其内存。\n// 此调用后，您不能再切换回 layer2（索引：1）！\n[mpLayer\
    \ switchToAndReleaseMe:0];\n```\n\n### `CCLayerColor`\n\n在 `ScenesAndLayers` 项目中，到目前为止，背景只是一个黑屏。当您滚动到草地背景图像的边缘，或点击“用户界面”使\
    \ `GameLayer` 缩小时，就能看到它。为了改变背景颜色，cocos2d 提供了 `CCLayerColor`，它已被添加到 `ScenesAndLayers05`\
    \ 项目中，用法如下：\n\n```\n// 将背景颜色设置为洋红色。可以想象，这是最不显眼的颜色。\nCCLayerColor* colorLayer =\
    \ [CCLayerColor layerWithColor:ccc4(255, 0, 255, 255)];\n[self addChild:colorLayer\
    \ z:0];\n```\n\n如果您对 OpenGL 有一定了解，可能会觉得为了改变背景颜色而添加一个单独的图层有些小题大做。您可以使用 OpenGL 达到同样的效果，如下所示：\n\
    \n```\nglClearColor(1, 0, 1, 1);\n```\n\n但请务必先在您游戏的场景过渡效果中测试一下，因为更改 `glClearColor`\
    \ 可能会对场景过渡产生负面影响。例如，当使用 `CCTransitionFade` 时，无论您使用什么颜色来初始化 `CCTransitionFade`，清除颜色都会透出来。\n\
    \n## 从 `CCSprite` 派生游戏对象子类\n\n很多时候，您的游戏对象会实现自己的逻辑。为每种类型的游戏对象创建一个单独的类是很有意义的。这可以包括您的玩家角色、各种敌人类型、子弹、导弹、平台，以及几乎所有可以在游戏场景中单独放置并需要运行自身逻辑的对象。那么问题来了，从哪里派生子类呢？\n\
    \n许多开发者选择了看似显而易见的路径：从 `CCSprite` 派生子类。我认为这不是一个好主意。派生子类的关系是“是一个”的关系。仔细想想，您的玩家角色“是一个”\
    \ `CCSprite` 吗？您的所有敌方角色“都是” `CCSprite` 吗？起初，答案似乎合乎逻辑：它们当然是精灵！它们就是靠精灵来显示自身的。但请稍等。它们能否是\
    \ `CCSprite` 之外的其他东西？据我所知，游戏角色也可以是字面意义上的字符。在 Roguelike 游戏中，您的玩家角色是一个 `@`。那么，这个角色会是一个\
    \ `CCLabelTTF` 吗？\n\n我认为困惑来自 `CCSprite` 是在屏幕上显示任何内容时使用最广泛的类。但您的游戏角色与 `CCNode`\
    \ 类之间的真正关系是“有一个”的关系。您的玩家类“拥有一个”用于显示自身的 `CCSprite`。在 Roguelike 游戏中，玩家角色类“拥有一个”用于显示自身的\
    \ `CCLabelTTF`。如果您想玩得更高级，比如使用 OpenGL 和大量粒子效果，那么您的玩家类“拥有一个”粒子效果系统，用于在屏幕上直观地表现它。\n\
    \n当您思考为什么通常要从 `CCSprite` 类派生时，这种区别会变得更加清晰：一般来说，是为了向 `CCSprite` 类添加新功能——例如，拥有一个使用\
    \ `CCRenderTexture` 的 `CCSprite` 类，以便根据屏幕下方的内容修改其显示方式。但是，当您想要从 `CCSprite` 派生玩家对象子类时，您会在其中添加什么样的代码呢？输入处理、玩家动画、碰撞检测、物理效果；总的来说：游戏逻辑。这些都不属于\
    \ `CCSprite` 类，因为这类代码关乎对象的运作方式以及您如何与之交互，而非精灵如何在屏幕上绘制。另一种看待这个问题的方式是考虑：您添加到派生自 `CCSprite`\
    \ 的子类中的哪些代码通常对所有精灵都是有用且可用的。例如，处理用于控制玩家角色的用户输入的代码，通常仅对玩家对象有用且可用，而不适用于所有精灵。\n\n\
    您可能仍然想知道这有什么意义，或者为什么您应该在意？考虑一下这种情况：您希望玩家拥有几种视觉表现形式，并且能够无缝切换。如果玩家需要使用 `FadeIn`/`FadeOut`\
    \ 动作从一个精灵变形到另一个精灵，那么您将不得不使用两个精灵。或者，如果您希望游戏对象同时出现在屏幕的不同部分，比如在《小行星》这样的游戏中，从屏幕顶部离开的小行星也应该部分显示在屏幕底部。您需要两个精灵来实现这一点，而这仅仅是组合优于派生子类（或继承）的原因之一。继承会导致类之间的紧密耦合，对父类的更改可能会在子类中引入错误和异常。类层次结构越深，基类中的代码就越多，这会放大问题。\n\
    \n另一个充分理由是，游戏对象封装了其视觉表示。如果逻辑是自包含的，那么只有游戏对象本身才应该更改任何 `CCNode` 的属性，例如位置、缩放、旋转，甚至是运行和停止动作。许多游戏开发者迟早会遇到的一个核心问题是，他们的游戏对象受到外部因素的直接操纵。例如，您可能会在不经意间造成这样的情况：场景的图层、用户界面和玩家对象本身都改变了玩家精灵的位置。这是不可取的。您希望所有其他系统通知玩家对象以改变其位置，让玩家对象本身对如何解释这些命令、是否应用、修改或忽略它们拥有最终决定权。\n"
- fmt: "### Composing Game Objects Using CCSprite\n\nLet’s try this. Instead of creating\
    \ a new class derived from a `CCSprite` class, create it from cocos2d’s base class\
    \ `CCNode`. Although you can also base your class on the Objective-C base class\
    \ `NSObject`, it’s easier to stick to `CCNode` because it is generally easier\
    \ to work with `CCNode` as your base class.\n\nI decided to turn the spiders in\
    \ the ScenesAndLayers05 project into a class of their own. The class is simply\
    \ called `Spider`. [Listing 5–11](#Chapter05.html#list_5_11) reveals the `Spider`\
    \ class’s header file.\n\n**Listing 5–11.** *The Spider Class Interface*\n\n```\n\
    #import \"cocos2d.h\"\n\n@interface Spider : CCNode\n{\n    CCSprite* spiderSprite;\n\
    \    int numUpdates;\n}\n\n+(id) spiderWithParentNode:(CCNode*)parentNode;\n-(id)\
    \ initWithParentNode:(CCNode*)parentNode;\n\n@end\n```\n\nYou can see that the\
    \ `CCSprite` is added as a member variable to the class and is named `spiderSprite`.\
    \ This is called *composition* since you compose the `Spider` class of a `CCSprite`\
    \ used to display it and later possibly other objects (including additional `CCSprite`\
    \ classes) and variables.\n\nThe `Spider` class in [Listing 5–12](#Chapter05.html#list_5_12)\
    \ has a static autorelease initializer like any `CCNode` class. This mimics cocos2d’s\
    \ memory management scheme, and it is good practice to follow that. Another convenient\
    \ feature I added is to pass a `parentNode` as a parameter to the `initWithParentNode`\
    \ method. By doing that, the `Spider` class can add itself to the node hierarchy\
    \ by calling `[parentNode addChild:self]`, which makes creating an instance of\
    \ a `Spider` class a one-liner in `GameLayer.m` because you only need to write\
    \ `[Spider spiderWithParentNode:self]`.\n\nOn the other hand, the `spiderSprite`\
    \ should be self-contained because it is created and managed by the `Spider` class.\
    \ The `spiderSprite` is added via `[self addChild:spiderSprite]` to the `Spider`\
    \ class and not the `parentNode`. Although you could do that, it is not recommended\
    \ because it breaks encapsulation. For one, the `parentNode` code could possibly\
    \ remove the `spiderSprite` from its hierarchy, and moving the `Spider` object\
    \ would no longer move the `spiderSprite`.\n\n**Listing 5–12.** *The Spider Class\
    \ Implementation*\n\n```\n#import \"Spider.h\"\n\n@implementation Spider\n\n//\
    \ Static autorelease initializer, mimics cocos2d's memory allocation scheme.\n\
    +(id) spiderWithParentNode:(CCNode*)parentNode\n{\n    return [[[self alloc] initWithParentNode:parentNode]\
    \ autorelease];\n}\n\n-(id) initWithParentNode:(CCNode*)parentNode\n{\n    if\
    \ ((self = [super init]))\n    {\n        [parentNode addChild:self];\n\n    \
    \    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n\n        spiderSprite\
    \ = [CCSprite spriteWithFile:@\"spider.png\"];\n        spiderSprite.position\
    \ = CGPointMake(CCRANDOM_0_1() * screenSize.width,\n            CCRANDOM_0_1()\
    \ * screenSize.height);\n        [self addChild:spiderSprite];\n\n        [self\
    \ scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    numUpdates++;\n    if (numUpdates > 50)\n    {\n        numUpdates = 0;\n\
    \        [spiderSprite stopAllActions];\n\n        // Let the Spider move randomly.\n\
    \        CGPoint moveTo = CGPointMake(CCRANDOM_0_1() * 200 - 100,\n          \
    \  CCRANDOM_0_1() * 100 - 50);\n        CCMoveBy* move = [CCMoveBy actionWithDuration:1\
    \ position:moveTo];\n        [spiderSprite runAction:move];\n    }\n}\n\n@end\n\
    ```\n\nThe `Spider` class now uses its own game logic to move the spiders around\
    \ on the screen. Granted, it won’t win any prices at this year’s Artificial Intelligence\
    \ Symposium; it’s just meant as an example.\n\nUp to this point you know that\
    \ you can receive touch input using `CCLayer` nodes, but in fact any class can\
    \ receive touch input by using the `CCTouchDispatcher` class directly. Your class\
    \ only needs to implement either the `CCStandardTouchDelegate` or `CCTargetedTouchDelegate`\
    \ protocol. You’ll find these changes in the ScenesAndLayers06 project, and the\
    \ appropriate protocol definition added to the header file is shown in [Listing\
    \ 5–13](#Chapter05.html#list_5_13).\n\n**Listing 5–13.** *The CCTargetedTouchDelegate\
    \ Protocol*\n\n```\n@interface Spider : CCNode <CCTargetedTouchDelegate>\n{\n\
    \    …\n}\n```\n\nThe implementation in [Listing 5–14](#Chapter05.html#list_5_14)\
    \ highlights the changes made to the `Spider` class. The `Spider` class now reacts\
    \ to targeted touch input. Whenever you tap a spider, it will quickly move away\
    \ from your finger. Contrary to common perceptions, spiders are usually more afraid\
    \ of humans than the other way around, exceptions notwithstanding.\n\nThe `Spider`\
    \ class is registered with `CCTouchDispatcher` to receive input as a touch delegate,\
    \ but this delegate association must also be removed on `dealloc`. Otherwise,\
    \ the scheduler or touch dispatcher would still keep a reference to the `Spider`\
    \ class even though it was released from memory, and that would likely cause a\
    \ crash shortly thereafter.\n\n**Listing 5–14.** *The Changed Spider Class*\n\n\
    ```\n-(id) initWithParentNode:(CCNode*)parentNode\n{\n    if ((self = [super init]))\n\
    \    {\n        …\n\n        // Manually add this class as receiver of targeted\
    \ touch events.\n        [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self\n\
    \                                                         priority:-1\n      \
    \                                            swallowsTouches:YES];\n    }\n\n\
    \    return self;\n}\n\n-(void) dealloc\n{\n    // Must manually remove this class\
    \ as touch input receiver!\n    [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];\n\
    \n    [super dealloc];\n}\n\n// Extract common logic into a separate method accepting\
    \ parameters.\n-(void) moveAway:(float)duration position:(CGPoint)moveTo\n{\n\
    \    [spiderSprite stopAllActions];\n    CCMoveBy* move = [CCMoveBy actionWithDuration:duration\
    \ position:moveTo];\n    [spiderSprite runAction:move];\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    numUpdates++;\n    if (numUpdates > 50)\n    {\n        numUpdates = 0;\n\
    \n        // Move at regular speed.\n        CGPoint moveTo = CGPointMake(CCRANDOM_0_1()\
    \ * 200 - 100,\n            CCRANDOM_0_1() * 100 - 50);\n        [self moveAway:2\
    \ position:moveTo];\n    }\n}\n\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event\n{\n    // Check if this touch is on the Spider's sprite.\n    CGPoint\
    \ touchLocation = [MultiLayerScene locationFromTouch:touch];\n    BOOL isTouchHandled\
    \ = CGRectContainsPoint([spiderSprite boundingBox],\n        touchLocation);\n\
    \    if (isTouchHandled)\n    {\n        // Reset move counter.\n        numUpdates\
    \ = 0;\n\n        // Move away from touch loation rapidly.\n        CGPoint moveTo;\n\
    \        float moveDistance = 60;\n        float rand = CCRANDOM_0_1();\n\n  \
    \      // Randomly pick one of four corners to move away to.\n        if (rand\
    \ < 0.25f)\n            moveTo = CGPointMake(moveDistance, moveDistance);\n  \
    \      else if (rand < 0.5f)\n            moveTo = CGPointMake(-moveDistance,\
    \ moveDistance);\n        else if (rand < 0.75f)\n            moveTo = CGPointMake(moveDistance,\
    \ -moveDistance);\n        else\n            moveTo = CGPointMake(-moveDistance,\
    \ -moveDistance);\n\n        // Move quickly:\n        [self moveAway:0.1f position:moveTo];\n\
    \    }\n\n    return isTouchHandled;\n}\n```"
  raw: '### Composing Game Objects Using CCSprite


    Let’s try this. Instead of creating a new class derived from a `CCSprite` class,
    create it from cocos2d’s base class `CCNode`. Although you can also base your
    class on the Objective-C base class `NSObject`, it’s easier to stick to `CCNode`
    because it is generally easier to work with `CCNode` as your base class.


    I decided to turn the spiders in the ScenesAndLayers05 project into a class of
    their own. The class is simply called `Spider`. [Listing 5–11](#Chapter05.html#list_5_11)
    reveals the `Spider` class’s header file.


    **Listing 5–11.** *The Spider Class Interface*


    `#import "cocos2d.h"`


    `@interface Spider : CCNode`

    `{`

    `    CCSprite* spiderSprite;`

    `    int numUpdates;`

    `}`


    `+(id) spiderWithParentNode:(CCNode*)parentNode;`

    `-(id) initWithParentNode:(CCNode*)parentNode;`


    `@end`


    You can see that the `CCSprite` is added as a member variable to the class and
    is named `spiderSprite`. This is called *composition* since you compose the `Spider`
    class of a `CCSprite` used to display it and later possibly other objects (including
    additional `CCSprite` classes) and variables.


    The `Spider` class in [Listing 5–12](#Chapter05.html#list_5_12) has a static autorelease
    initializer like any `CCNode` class. This mimics cocos2d’s memory management scheme,
    and it is good practice to follow that. Another convenient feature I added is
    to pass a `parentNode` as a parameter to the `initWithParentNode` method. By doing
    that, the `Spider` class can add itself to the node hierarchy by calling `[parentNodeaddChild:self]`,
    which makes creating an instance of a `Spider` class a one-liner in GameLayer.m
    because you only need to write `[Spider spiderWithParentNode:self]`.


    On the other hand, the `spiderSprite` should be self-contained because it is created
    and managed by the `Spider` class. The `spiderSprite` is added via `[self addChild:spiderSprite]`
    to the `Spider` class and not the `parentNode`. Although you could do that, it
    is not recommended because it breaks encapsulation. For one, the `parentNode`
    code could possibly remove the `spiderSprite` from its hierarchy, and moving the
    `Spider` object would no longer move the `spiderSprite`.


    **Listing 5–12.** *The Spider Class Implementation*


    `#import "Spider.h"`


    `@implementation Spider`


    `// Static autorelease initializer, mimics cocos2d''s memory allocation scheme.`

    `+(id) spiderWithParentNode:(CCNode*)parentNode`

    `{`

    `    return [[[self alloc] initWithParentNode:parentNode] autorelease];`

    `}`


    `-(id) initWithParentNode:(CCNode*)parentNode`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        [parentNode addChild:self];`


    `        CGSize screenSize = [[CCDirector sharedDirector] winSize];`


    `        spiderSprite = [CCSprite spriteWithFile:@"spider.png"];`


    `spiderSprite.position = CGPointMake(CCRANDOM_0_1() *screenSize.width,` ![images](images/U002.jpg)

    `            CCRANDOM_0_1() * screenSize.height);`

    `        [self addChild:spiderSprite];`


    `        [self scheduleUpdate];`

    `    }`


    `    return self;`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    numUpdates++;`

    `    if (numUpdates > 50)`

    `    {`

    `        numUpdates = 0;`

    `        [spiderSprite stopAllActions];`


    `        // Let the Spider move randomly.`

    `CGPoint moveTo = CGPointMake(CCRANDOM_0_1() * 200 - 100,` ![images](images/U002.jpg)

    `            CCRANDOM_0_1() * 100 - 50);`

    `        CCMoveBy* move = [CCMoveBy actionWithDuration:1 position:moveTo];`

    `        [spiderSprite runAction:move];`

    `    }`

    `}`


    `@end`


    The `Spider` class now uses its own game logic to move the spiders around on the
    screen. Granted, it won’t win any prices at this year’s Artificial Intelligence
    Symposium; it’s just meant as an example.


    Up to this point you know that you can receive touch input using `CCLayer` nodes,
    but in fact any class can receive touch input by using the `CCTouchDispatcher`
    class directly. Your class only needs to implement either the `CCStandardTouchDelegate`
    or `CCTargetedTouchDelegate` protocol. You’ll find these changes in the ScenesAndLayers06
    project, and the appropriate protocol definition added to the header file is shown
    in [Listing 5–13](#Chapter05.html#list_5_13).


    **Listing 5–13.** *The CCTargetedTouchDelegate Protocol*


    `@interface Spider : CCNode <CCTargetedTouchDelegate>`

    `{`

    `    …`

    `}`


    The implementation in [Listing 5–14](#Chapter05.html#list_5_14) highlights the
    changes made to the `Spider` class. The `Spider` class now reacts to targeted
    touch input. Whenever you tap a spider, it will quickly move away from your finger.
    Contrary to common perceptions, spiders are usually more afraid of humans than
    the other way around, exceptions notwithstanding.


    The `Spider` class is registered with `CCTouchDispatcher` to receive input as
    a touch delegate, but this delegate association must also be removed on `dealloc`.
    Otherwise, the scheduler or touch dispatcher would still keep a reference to the
    `Spider` class even though it was released from memory, and that would likely
    cause a crash shortly thereafter.


    **Listing 5–14.** *The Changed Spider Class*


    `-(id) initWithParentNode:(CCNode*)parentNode`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        …`


    `        // Manually add this class as receiver of targeted touch events.`

    `        [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self`

    `                                                         priority:-1`

    `                                                  swallowsTouches:YES];`

    `    }`


    `    return self;`

    `}`


    `-(void) dealloc`

    `{`

    `    // Must manually remove this class as touch input receiver!`

    `    [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];`


    `    [super dealloc];`

    `}`


    `// Extract common logic into a separate method accepting parameters.`

    `-(void) moveAway:(float)duration position:(CGPoint)moveTo`

    `{`

    `    [spiderSprite stopAllActions];`

    `    CCMoveBy* move = [CCMoveBy actionWithDuration:duration position:moveTo];`

    `    [spiderSprite runAction:move];`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    numUpdates++;`

    `    if (numUpdates > 50)`

    `    {`

    `        numUpdates = 0;`


    `        // Move at regular speed.`

    `CGPoint moveTo = CGPointMake(CCRANDOM_0_1() * 200 - 100,` ![images](images/U002.jpg)

    `            CCRANDOM_0_1() * 100 - 50);`

    `        [self moveAway:2 position:moveTo];`

    `    }`

    `}`


    `-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event`

    `{`

    `    // Check if this touch is on the Spider''s sprite.`

    `    CGPoint touchLocation = [MultiLayerScene locationFromTouch:touch];`

    `BOOL isTouchHandled = CGRectContainsPoint([spiderSprite boundingBox],` ![images](images/U002.jpg)

    `        touchLocation);`

    `    if (isTouchHandled)`

    `    {`

    `        // Reset move counter.`

    `        numUpdates = 0;`


    `        // Move away from touch loation rapidly.`

    `        CGPoint moveTo;`

    `        float moveDistance = 60;`

    `        float rand = CCRANDOM_0_1();`


    `        // Randomly pick one of four corners to move away to.`

    `        if (rand < 0.25f)`

    `            moveTo = CGPointMake(moveDistance, moveDistance);`

    `        else if (rand < 0.5f)`

    `            moveTo = CGPointMake(-moveDistance, moveDistance);`

    `        else if (rand < 0.75f)`

    `            moveTo = CGPointMake(moveDistance, -moveDistance);`

    `        else`

    `            moveTo = CGPointMake(-moveDistance, -moveDistance);`


    `        // Move quickly:`

    `        [self moveAway:0.1f position:moveTo];`

    `    }`


    `    return isTouchHandled;`

    `}`'
  trans: "\n### 使用 CCSprite 组合游戏对象\n\n让我们来尝试一下。与其创建一个继承自 `CCSprite` 类的新类，不如从 cocos2d\
    \ 的基类 `CCNode` 来创建它。虽然你也可以将类基于 Objective-C 基类 `NSObject`，但坚持使用 `CCNode` 更简单，因为通常以\
    \ `CCNode` 作为基类会更容易操作。\n\n我决定将 ScenesAndLayers05 项目中的蜘蛛转换成一个独立的类。这个类简称为 `Spider`。代码清单\
    \ 5–11 展示了 `Spider` 类的头文件。\n\n**代码清单 5–11.** *Spider 类的接口*\n\n```\n#import \"\
    cocos2d.h\"\n\n@interface Spider : CCNode\n{\n    CCSprite* spiderSprite;\n  \
    \  int numUpdates;\n}\n\n+(id) spiderWithParentNode:(CCNode*)parentNode;\n-(id)\
    \ initWithParentNode:(CCNode*)parentNode;\n\n@end\n```\n\n可以看到，`CCSprite` 作为成员变量被添加到该类中，并命名为\
    \ `spiderSprite`。这被称为*组合*，因为你将 `Spider` 类由一个用于显示它的 `CCSprite` 以及之后可能添加的其他对象（包括额外的\
    \ `CCSprite` 类）和变量组合而成。\n\n代码清单 5–12 中的 `Spider` 类与任何 `CCNode` 类一样，有一个静态自动释放初始化器。这模仿了\
    \ cocos2d 的内存管理方案，遵循这种做法是好的。我添加的另一个便捷特性是将 `parentNode` 作为参数传递给 `initWithParentNode`\
    \ 方法。通过这样做，`Spider` 类可以通过调用 `[parentNode addChild:self]` 将自己添加到节点层级中，这使得在 `GameLayer.m`\
    \ 中创建 `Spider` 类的实例只需一行代码，因为你只需要编写 `[Spider spiderWithParentNode:self]`。\n\n另一方面，`spiderSprite`\
    \ 应该是自包含的，因为它由 `Spider` 类创建和管理。`spiderSprite` 通过 `[self addChild:spiderSprite]`\
    \ 添加到 `Spider` 类，而不是 `parentNode`。虽然你也可以这样做，但不推荐，因为它破坏了封装性。例如，`parentNode` 的代码可能会从其层级中移除\
    \ `spiderSprite`，并且移动 `Spider` 对象将不再同时移动 `spiderSprite`。\n\n**代码清单 5–12.** *Spider\
    \ 类的实现*\n\n```\n#import \"Spider.h\"\n\n@implementation Spider\n\n// 静态自动释放初始化器，模仿\
    \ cocos2d 的内存分配方案。\n+(id) spiderWithParentNode:(CCNode*)parentNode\n{\n    return\
    \ [[[self alloc] initWithParentNode:parentNode] autorelease];\n}\n\n-(id) initWithParentNode:(CCNode*)parentNode\n\
    {\n    if ((self = [super init]))\n    {\n        [parentNode addChild:self];\n\
    \n        CGSize screenSize = [[CCDirector sharedDirector] winSize];\n\n     \
    \   spiderSprite = [CCSprite spriteWithFile:@\"spider.png\"];\n        spiderSprite.position\
    \ = CGPointMake(CCRANDOM_0_1() * screenSize.width,\n            CCRANDOM_0_1()\
    \ * screenSize.height);\n        [self addChild:spiderSprite];\n\n        [self\
    \ scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    numUpdates++;\n    if (numUpdates > 50)\n    {\n        numUpdates = 0;\n\
    \        [spiderSprite stopAllActions];\n\n        // 让蜘蛛随机移动。\n        CGPoint\
    \ moveTo = CGPointMake(CCRANDOM_0_1() * 200 - 100,\n            CCRANDOM_0_1()\
    \ * 100 - 50);\n        CCMoveBy* move = [CCMoveBy actionWithDuration:1 position:moveTo];\n\
    \        [spiderSprite runAction:move];\n    }\n}\n\n@end\n```\n\n`Spider` 类现在使用自己的游戏逻辑让蜘蛛在屏幕上移动。诚然，它不会在今年的人工智能研讨会上获奖；它仅仅是一个例子。\n\
    \n到目前为止，你知道可以使用 `CCLayer` 节点接收触摸输入，但实际上任何类都可以通过直接使用 `CCTouchDispatcher` 类来接收触摸输入。你的类只需要实现\
    \ `CCStandardTouchDelegate` 或 `CCTargetedTouchDelegate` 协议。你可以在 ScenesAndLayers06\
    \ 项目中发现这些更改，并且代码清单 5–13 显示了添加到头文件中的相应协议定义。\n\n**代码清单 5–13.** *CCTargetedTouchDelegate\
    \ 协议*\n\n```\n@interface Spider : CCNode <CCTargetedTouchDelegate>\n{\n    …\n\
    }\n```\n\n代码清单 5–14 中的实现突出显示了 `Spider` 类的更改。`Spider` 类现在对定点触摸输入做出反应。每当你点击一只蜘蛛，它会迅速远离你的手指。与普遍看法相反，蜘蛛通常更害怕人类，而不是人类害怕它们，尽管也有例外。\n\
    \n`Spider` 类向 `CCTouchDispatcher` 注册，以作为触摸委托接收输入，但该委托关联也必须在 `dealloc` 时移除。否则，即使该类已从内存中释放，调度器或触摸调度器仍会保留对\
    \ `Spider` 类的引用，这很可能很快就会导致崩溃。\n\n**代码清单 5–14.** *修改后的蜘蛛类*\n\n```\n-(id) initWithParentNode:(CCNode*)parentNode\n\
    {\n    if ((self = [super init]))\n    {\n        …\n\n        // 手动将此类添加为定点触摸事件的接收者。\n\
    \        [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self\n    \
    \                                                     priority:-1\n          \
    \                                        swallowsTouches:YES];\n    }\n\n    return\
    \ self;\n}\n\n-(void) dealloc\n{\n    // 必须手动将此类作为触摸输入接收者移除！\n    [[CCTouchDispatcher\
    \ sharedDispatcher] removeDelegate:self];\n\n    [super dealloc];\n}\n\n// 将通用逻辑提取到一个接受参数的独立方法中。\n\
    -(void) moveAway:(float)duration position:(CGPoint)moveTo\n{\n    [spiderSprite\
    \ stopAllActions];\n    CCMoveBy* move = [CCMoveBy actionWithDuration:duration\
    \ position:moveTo];\n    [spiderSprite runAction:move];\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    numUpdates++;\n    if (numUpdates > 50)\n    {\n        numUpdates = 0;\n\
    \n        // 以常规速度移动。\n        CGPoint moveTo = CGPointMake(CCRANDOM_0_1() * 200\
    \ - 100,\n            CCRANDOM_0_1() * 100 - 50);\n        [self moveAway:2 position:moveTo];\n\
    \    }\n}\n\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n\
    {\n    // 检查此触摸是否在蜘蛛精灵上。\n    CGPoint touchLocation = [MultiLayerScene locationFromTouch:touch];\n\
    \    BOOL isTouchHandled = CGRectContainsPoint([spiderSprite boundingBox],\n \
    \       touchLocation);\n    if (isTouchHandled)\n    {\n        // 重置移动计数器。\n\
    \        numUpdates = 0;\n\n        // 快速远离触摸位置。\n        CGPoint moveTo;\n  \
    \      float moveDistance = 60;\n        float rand = CCRANDOM_0_1();\n\n    \
    \    // 随机选择四个角落之一来移开。\n        if (rand < 0.25f)\n            moveTo = CGPointMake(moveDistance,\
    \ moveDistance);\n        else if (rand < 0.5f)\n            moveTo = CGPointMake(-moveDistance,\
    \ moveDistance);\n        else if (rand < 0.75f)\n            moveTo = CGPointMake(moveDistance,\
    \ -moveDistance);\n        else\n            moveTo = CGPointMake(-moveDistance,\
    \ -moveDistance);\n\n        // 快速移动：\n        [self moveAway:0.1f position:moveTo];\n\
    \    }\n\n    return isTouchHandled;\n}\n```\n"
- fmt: "# 排版后的 Markdown 文档\n\n我决定通过将功能提取到单独的方法中来改进移动逻辑。直接的做法是从`update`方法复制现有代码到`ccTouchBegan`方法。然而，复制粘贴是邪恶的。如果你加入了编程教派，请注意复制现有代码被视为一种致命罪行。\n\
    \n**注意：** 使用复制粘贴非常容易，而且每个人都知道如何操作，这使得它极具诱惑力。但每当你复制代码时，你也复制了以后修改该代码所需的工作量。考虑这样一种情况：你将相同的动作序列复制了十次，然后需要更改动作序列的持续时间。你无法只修改一次；你必须修改十次，而且更重要的是，你必须测试十次更改，因为你可能忘记了将更改应用到十个位置中的某一个。更多的代码也意味着引入\
    \ bug 的几率更高，而且由于这个 bug 可能只发生在十个情况中的一个，它也将更难被发现。\n\n使用方法提取通用功能，并将需要灵活调整的部分暴露为参数，确实是一项非常简单的任务。我希望`moveAway`方法能很好地说明我的观点。它并没有包含太多代码，但即使是最少量的重复代码也会增加你维护代码的时间。\n\
    \n`ccTouchBegan`方法获取触摸位置，并通过`CGRectContainsPoint`检查触摸位置是否在蜘蛛精灵的`boundingBox`内。如果是，它处理触摸并运行让蜘蛛快速朝四个方向之一移开的代码。\n\
    \n总之，使用`CCNode`作为游戏对象的基类乍一看会使一些事情变得不太方便。然而，当你开始创建更大的项目时，比如处理超过十几个游戏对象类时，其好处就变得明显了。如果你现在更倾向于继承`CCSprite`，这完全没问题。但当你变得更加熟练——并且更有雄心——时，请再次回到本章并尝试这种方法。它将带来更好的代码结构，以及更清晰分离的各个游戏元素的边界与职责。\n\
    \n## 有趣的 `CCNode` 类\n\n请坐稳，我将带你了解几个用于特定目的的`CCNode`派生类。它们是`CCProgressTimer`、`CCParallaxNode`、`CCRibbon`和`CCMotionStreak`。\n\
    \n### `CCProgressTimer`\n\n在`ScenesAndLayers07`项目中，我向`UserInterfaceLayer`类添加了一个`CCProgressTimer`节点。你可以在[图\
    \ 5-3](#Chapter05.html#fig_5_3) 中看到它是如何以径向方式从精灵上切下一部分的。\n\n![images](images/0503.jpg)\n\
    \n**图 5-3.** *工作中的`CCProgressTimer`。我会说大约是 12 点过 10 分。*\n\n进度计时器类适用于任何类型的进度显示，比如加载条或图标重新可用所需的时间。想想《魔兽世界》中的动作按钮及其重新施法计时器。进度计时器接受一个精灵，并根据百分比仅显示其一部分，以可视化游戏中的某种进度。有关如何初始化`CCProgressTimer`节点，请参见[清单\
    \ 5-15](#Chapter05.html#list_5_15)。\n\n**清单 5-15.** *初始化一个`CCProgressTimer`节点*\n\
    \n```\n// Progress timer is a sprite that is only partially displayed\n// to visualize\
    \ some kind of progress.\nCCProgressTimer* timer = [CCProgressTimer progressWithFile:@\"\
    firething.png\"];\ntimer.type = kCCProgressTimerTypeRadialCCW;\ntimer.percentage\
    \ = 0;\n[self addChild:timer z:1 tag:UILayerTagProgressTimer];\n// The update\
    \ is needed for the progress timer.\n[self scheduleUpdate];\n```\n\n`timer`类型来自定义在`CCProgressTimer.h`中的`CCProgressTimerType`枚举。你可以选择径向、垂直和水平进度计时器。但有一个警告：计时器不会自我更新。你必须频繁更改计时器的`percentage`值来更新进度。这就是我在[清单\
    \ 5-15](#Chapter05.html#list_5_15) 中包含`scheduleUpdate`的原因。执行实际进度更新的`update`方法的实现如[清单\
    \ 5-16](#Chapter05.html#list_5_16) 所示。`CCProgressTimer`节点的`percentage`属性必须根据需要频繁更新——它不会自动推进进度。这里的进度只是时间的流逝。这不就是游戏的全部意义吗？\n\
    \n**清单 5-16.** *`update`方法的实现*\n\n```\n-(void) update:(ccTime)delta\n{\n    CCNode*\
    \ node = [self getChildByTag:UILayerTagProgressTimer];\n    NSAssert([node isKindOfClass:[CCProgressTimer\
    \ class]], @\"node is not a\n        CCProgressTimer\");\n\n    // Updates the\
    \ progress timer\n    CCProgressTimer* timer = (CCProgressTimer*)node;\n    timer.percentage\
    \ += delta * 10;\n    if (timer.percentage >= 100)\n    {\n        timer.percentage\
    \ = 0;\n    }\n}\n```"
  raw: 'I decided to improve the move logic by extracting the functionality into a
    separate method. The straightforward way would have been to just copy the existing
    code from the `update` method to the `ccTouchBegan` method. However, copy-and-paste
    is evil. If you join the Cult of Programmology, be aware that it is considered
    a deadly sin to duplicate existing code.


    **CAUTION:** Using copy-and-paste is very easy, and everyone knows how to do it,
    which makes it so tempting. But whenever you duplicate code, you duplicate the
    effort needed to change that code later. Consider the case where you duplicate
    the same sequence of actions ten times and you need to change the duration of
    the action sequence. You can’t change it just once; you have to change it ten
    times now, and more importantly you have to test the change ten times because
    you might have forgotten to apply the change to one of the ten places. More code
    also means more chances of introducing a bug, and since this bug will possibly
    happen in only one of ten cases, it’ll be harder to find as well.


    Using methods to extract common functionality, and exposing what needs to be flexible
    as parameters, is indeed a very simple task. I hope that the `moveAway` method
    in [Listing 5–14](#Chapter05.html#list_5_14) illustrates my point well. It does
    not contain much code, but even the smallest amount of duplicated code increases
    your time spent on maintaining your code.


    The `ccTouchBegan` method takes the touch location and checks via the `CGRectContainsPoint`
    if the touch location is inside the spider sprite’s `boundingBox`. If so, it handles
    the touch and runs the code that lets the spider move away quickly in one of four
    directions.


    In summary, using a `CCNode` as a base class for your game objects makes a few
    things more inconvenient at first glance. The benefits do become visible when
    you start creating larger projects, however, like when you are dealing with more
    than a dozen of classes for game objects. It is OK if you prefer to subclass `CCSprite`
    for now. But when you get more proficient—and more ambitious—please come back
    to this chapter again and try this approach. It leads to a better code structure
    and more clearly separated boundaries and responsibilities of the individual game
    elements.


    ### Curiously Cool CCNode Classes


    Please remain seated as I walk you through a few more `CCNode`-derived classes
    that fulfill very specific purposes. They are `CCProgressTimer`, `CCParallaxNode`,
    `CCRibbon`, and `CCMotionStreak`.


    #### CCProgressTimer


    In the ScenesAndLayers07 project, I’ve added a `CCProgressTimer` node to the `UserInterfaceLayer`
    class. You can see how it cuts off chunks from a sprite in a radial fashion in
    [Figure 5–3](#Chapter05.html#fig_5_3).


    ![images](images/0503.jpg)


    **Figure 5–3.** *The CCProgressTimer in action. I would say it’s about 10 past
    12.*


    The progress timer class is useful for any kind of progress display, like a loading
    bar or the time it takes an icon to become available again. Think of the action
    buttons in World of Warcraft and their recast timer. The progress timer takes
    a sprite and, based on a percentage, displays only part of it to visualize some
    kind of progress in your game. See [Listing 5–15](#Chapter05.html#list_5_15) for
    how to initialize the `CCProgressTimer` node.


    **Listing 5–15.** *Initializing a CCProgressTimer Node*


    `// Progress timer is a sprite that is only partially displayed`

    `// to visualize some kind of progress.`

    `CCProgressTimer* timer = [CCProgressTimer progressWithFile:@"firething.png"];`

    `timer.type = kCCProgressTimerTypeRadialCCW;`

    `timer.percentage = 0;`

    `[self addChild:timer z:1 tag:UILayerTagProgressTimer];`

    `// The update is needed for the progress timer.`

    `[self scheduleUpdate];`


    The `timer` type is from the `CCProgressTimerTypeenum` defined in CCProgressTimer.h.
    You can choose between radial, vertical, and horizontal progress timers. But there’s
    one caveat: the timer doesn’t update itself. You have to change the timer’s percentage
    value frequently to update the progress. That’s why I included the `scheduleUpdate`
    in [Listing 5–15](#Chapter05.html#list_5_15). The implementation of the `update`
    method that does the actual progressing is shown in [Listing 5–16](#Chapter05.html#list_5_16).
    The `CCProgressTimer` node’s percentage property must be frequently updated as
    needed—it won’t progress by itself automatically. The progress here is simply
    the passing of time. Isn’t that what games are all about?


    **Listing 5–16.** *The Implementation of the `update` Method*


    `-(void) update:(ccTime)delta`

    `{`

    `    CCNode* node = [self getChildByTag:UILayerTagProgressTimer];`

    `NSAssert([node isKindOfClass:[CCProgressTimer class]], @"node is not a` ![images](images/U002.jpg)

    `        CCProgressTimer");`


    `    // Updates the progress timer`

    `    CCProgressTimer* timer = (CCProgressTimer*)node;`

    `    timer.percentage += delta * 10;`

    `    if (timer.percentage >= 100)`

    `    {`

    `        timer.percentage = 0;`

    `    }`

    `}`'
  trans: "\n# 排版后的 Markdown 文档\n\n我决定通过将功能提取到单独的方法中来改进移动逻辑。直接的做法是从`update`方法复制现有代码到`ccTouchBegan`方法。然而，复制粘贴是邪恶的。如果你加入了编程教派，请注意复制现有代码被视为一种致命罪行。\n\
    \n**注意：** 使用复制粘贴非常容易，而且每个人都知道如何操作，这使得它极具诱惑力。但每当你复制代码时，你也复制了以后修改该代码所需的工作量。考虑这样一种情况：你将相同的动作序列复制了十次，然后需要更改动作序列的持续时间。你无法只修改一次；你必须修改十次，而且更重要的是，你必须测试十次更改，因为你可能忘记了将更改应用到十个位置中的某一个。更多的代码也意味着引入\
    \ bug 的几率更高，而且由于这个 bug 可能只发生在十个情况中的一个，它也将更难被发现。\n\n使用方法提取通用功能，并将需要灵活调整的部分暴露为参数，确实是一项非常简单的任务。我希望`moveAway`方法能很好地说明我的观点。它并没有包含太多代码，但即使是最少量的重复代码也会增加你维护代码的时间。\n\
    \n`ccTouchBegan`方法获取触摸位置，并通过`CGRectContainsPoint`检查触摸位置是否在蜘蛛精灵的`boundingBox`内。如果是，它处理触摸并运行让蜘蛛快速朝四个方向之一移开的代码。\n\
    \n总之，使用`CCNode`作为游戏对象的基类乍一看会使一些事情变得不太方便。然而，当你开始创建更大的项目时，比如处理超过十几个游戏对象类时，其好处就变得明显了。如果你现在更倾向于继承`CCSprite`，这完全没问题。但当你变得更加熟练——并且更有雄心——时，请再次回到本章并尝试这种方法。它将带来更好的代码结构，以及更清晰分离的各个游戏元素的边界与职责。\n\
    \n## 有趣的 `CCNode` 类\n\n请坐稳，我将带你了解几个用于特定目的的`CCNode`派生类。它们是`CCProgressTimer`、`CCParallaxNode`、`CCRibbon`和`CCMotionStreak`。\n\
    \n### `CCProgressTimer`\n\n在`ScenesAndLayers07`项目中，我向`UserInterfaceLayer`类添加了一个`CCProgressTimer`节点。你可以在图\
    \ 5-3 中看到它是如何以径向方式从精灵上切下一部分的。\n\n![images](img/0503.jpg)\n\n**图 5-3.** *工作中的`CCProgressTimer`。我会说大约是\
    \ 12 点过 10 分。*\n\n进度计时器类适用于任何类型的进度显示，比如加载条或图标重新可用所需的时间。想想《魔兽世界》中的动作按钮及其重新施法计时器。进度计时器接受一个精灵，并根据百分比仅显示其一部分，以可视化游戏中的某种进度。有关如何初始化`CCProgressTimer`节点，请参见清单\
    \ 5-15。\n\n**清单 5-15.** *初始化一个`CCProgressTimer`节点*\n\n```\n// Progress timer is\
    \ a sprite that is only partially displayed\n// to visualize some kind of progress.\n\
    CCProgressTimer* timer = [CCProgressTimer progressWithFile:@\"firething.png\"\
    ];\ntimer.type = kCCProgressTimerTypeRadialCCW;\ntimer.percentage = 0;\n[self\
    \ addChild:timer z:1 tag:UILayerTagProgressTimer];\n// The update is needed for\
    \ the progress timer.\n[self scheduleUpdate];\n```\n\n`timer`类型来自定义在`CCProgressTimer.h`中的`CCProgressTimerType`枚举。你可以选择径向、垂直和水平进度计时器。但有一个警告：计时器不会自我更新。你必须频繁更改计时器的`percentage`值来更新进度。这就是我在清单\
    \ 5-15 中包含`scheduleUpdate`的原因。执行实际进度更新的`update`方法的实现如清单 5-16 所示。`CCProgressTimer`节点的`percentage`属性必须根据需要频繁更新——它不会自动推进进度。这里的进度只是时间的流逝。这不就是游戏的全部意义吗？\n\
    \n**清单 5-16.** *`update`方法的实现*\n\n```\n-(void) update:(ccTime)delta\n{\n    CCNode*\
    \ node = [self getChildByTag:UILayerTagProgressTimer];\n    NSAssert([node isKindOfClass:[CCProgressTimer\
    \ class]], @\"node is not a\n        CCProgressTimer\");\n\n    // Updates the\
    \ progress timer\n    CCProgressTimer* timer = (CCProgressTimer*)node;\n    timer.percentage\
    \ += delta * 10;\n    if (timer.percentage >= 100)\n    {\n        timer.percentage\
    \ = 0;\n    }\n}\n```\n"
- fmt: "### `CCParallaxNode`\n\nParallaxing is an effect used in 2D games to give\
    \ the impression of depth, created by using layered images that move at different\
    \ rates. The images in the foreground move faster relative to the images in the\
    \ background. Although you can’t see the parallax effect in a static image, [Figure\
    \ 5–4](#Chapter05.html#fig_5_4) at least gives you a first impression of a background\
    \ made up of individual layers. The clouds are at the very back; the mountains\
    \ are in front of the clouds but behind the (ugly) trees. At the very bottom is\
    \ the road where you might typically add a player character moving left and right\
    \ along this scenery.\n\n![images](images/0504.jpg)\n\n**Figure 5–4.** The `CCParallaxNode`\
    \ allows you to create an illusion of depth.\n\n**NOTE:** Why does parallaxing\
    \ create the illusion of depth? Because our minds are trained to this effect.\
    \ Think of traveling in a car at high speed, and you’re looking out of a side\
    \ window. You’ll notice the trees next to the road (closest to you) zipping by\
    \ so fast you can hardly focus on a single one. Look a little further, and you’ll\
    \ see the barnyard passing you by at a seemingly much slower rater. Then look\
    \ to the mountains at the horizon, and you’ll hardly notice that you are moving\
    \ past them at all. This is the parallax effect in a three-dimensional world,\
    \ where there are an infinite number of parallax layers. In a 2D game we have\
    \ to (very roughly) simulate the same effect with around two to eight parallax\
    \ layers. Each layer tries to fool your mind into thinking that it is a certain\
    \ distance away from your viewpoint, simply because it is moving at a certain\
    \ speeds relative to other layers. It works surprisingly well.\n\nCocos2d has\
    \ a specialized node you can use to create this effect. The code to create a `CCParallaxNode`\
    \ in [Listing 5–17](#Chapter05.html#list_5_17) is also in the ScenesAndLayers08\
    \ project.\n\n**Listing 5–17.** The `CCParallaxNode` Requires a Lot of Setup Work,\
    \ but the Results Are Worth It\n\n```\n// Load the sprites for each parallax layer,\
    \ from background to foreground.\nCCSprite* para1 = [CCSprite spriteWithFile:@\"\
    parallax1.png\"];\nCCSprite* para2 = [CCSprite spriteWithFile:@\"parallax2.png\"\
    ];\nCCSprite* para3 = [CCSprite spriteWithFile:@\"parallax3.png\"];\nCCSprite*\
    \ para4 = [CCSprite spriteWithFile:@\"parallax4.png\"];\n\n// Set the correct\
    \ offsets depending on the screen and image sizes.\npara1.anchorPoint = CGPointMake(0,\
    \ 1);\npara2.anchorPoint = CGPointMake(0, 1);\npara3.anchorPoint = CGPointMake(0,\
    \ 0.6f);\npara4.anchorPoint = CGPointMake(0, 0);\nCGPoint topOffset = CGPointMake(0,\
    \ screenSize.height);\nCGPoint midOffset = CGPointMake(0, screenSize.height /\
    \ 2);\nCGPoint downOffset = CGPointZero;\n\n// Create a parallax node and add\
    \ the sprites to it.\nCCParallaxNode* paraNode = [CCParallaxNode node];\n[paraNode\
    \ addChild:para1\n                 z:1\n     parallaxRatio:CGPointMake(0.5f, 0)\n\
    \    positionOffset:topOffset];\n\n[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1,\
    \ 0) positionOffset:topOffset];\n[paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2,\
    \ 0) positionOffset:midOffset];\n[paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3,\
    \ 0) positionOffset:downOffset];\n[self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];\n\
    \n// Move the parallax node to show the parallaxing effect.\nCCMoveBy* move1 =\
    \ [CCMoveBy actionWithDuration:5 position:CGPointMake(-160, 0)];\nCCMoveBy* move2\
    \ = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];\nCCSequence*\
    \ sequence = [CCSequence actions:move1, move2, nil];\nCCRepeatForever* repeat\
    \ = [CCRepeatForever actionWithAction:sequence];\n[paraNode runAction:repeat];\n\
    ```\n\nTo create a `CCParallaxNode`, you first create the desired `CCSprite` nodes\
    \ that make up the individual parallaxing images, and then you have to properly\
    \ position them on the screen. In this case, I chose to modify their anchor points\
    \ instead because it was easier to align the sprites with the screen borders.\
    \ The `CCParallaxNode` is created like any other node, but its children are added\
    \ using a special initializer. With it you specify the `parallaxRatio`, which\
    \ is a `CGPoint` used as a multiplier for any movement of the `CCParallaxNode`.\
    \ In this case, the `CCSprite` `para1` would move at half the speed, `para2` at\
    \ normal speed, `para3` at double the speed of the `CCParallaxNode`, and so on.\n\
    \nUsing a sequence of `CCMoveBy` actions, the `CCParallaxNode` is moved from left\
    \ to right and back. You will notice how the clouds in the background move slowest\
    \ while the trees and gravel in the foreground scroll by the fastest. This gives\
    \ the illusion of depth.\n\n**NOTE:** You can’t modify the positions of individual\
    \ child nodes once they are added to the `CCParallaxNode`. You can only scroll\
    \ as far as the largest and fastest-moving image before the background shows through.\
    \ You can see this effect if you modify the `CCMoveBy` actions to scroll a lot\
    \ further. You can increase the scrolling distance by adding more of the same\
    \ sprites with the appropriate offsets. But if you require endless scrolling in\
    \ one or both directions, you will have to implement your own parallax system.\
    \ In fact, this is what we’re going to do in [Chapter 7](#Chapter07.html#ch7).\n\
    \n### `CCRibbon`\n\nThe `CCRibbon` node creates a band of images, like a chain\
    \ or, as in [Figure 5–5](#Chapter05.html#fig_5_5), like a millipede crawling over\
    \ the parallaxing scene in the ScenesAndLayers09 project.\n\n![images](images/0505.jpg)\n\
    \n**Figure 5–5.** Nasty. A `CCRibbon` of spiders. Looks like a millipede crawling\
    \ over the screen.\n\nThe `CCRibbon` class, together with touch input, can be\
    \ used to create the line-drawing effects of popular games. [Listing 5–18](#Chapter05.html#list_5_18)\
    \ shows how the `CCRibbon` is implemented with the touch events. What’s notable\
    \ is that you can’t remove individual points from a `CCRibbon`. You can only remove\
    \ the whole `CCRibbon` by removing it as child from its parent. The width and\
    \ length parameters of the `CCRibbon` initializer determine how big individual\
    \ ribbon elements are drawn. In this case, I chose to make it as big as the `spider.png`\
    \ image, which is 32 pixels wide and high. If you choose other values, the image\
    \ will be scaled up or down accordingly.\n\n**Listing 5–18.** The `CCRibbon` Class\n\
    \n```\n-(void) resetRibbon\n{\n    // Removes the ribbon and creates a new one.\n\
    \    [self removeChildByTag:ParallaxSceneTagRibbon cleanup:YES];\n    CCRibbon*\
    \ ribbon = [CCRibbon ribbonWithWidth:32\n                                    \
    \       image:@\"spider.png\"\n                                          length:32\n\
    \                                           color:ccc4(255, 255, 255, 255)\n \
    \                                           fade:0.5f];\n    [self addChild:ribbon\
    \ z:5 tag:ParallaxSceneTagRibbon];\n}\n\n-(CCRibbon*) getRibbon\n{\n    CCNode*\
    \ node = [self getChildByTag:ParallaxSceneTagRibbon];\n    NSAssert([node isKindOfClass:[CCRibbon\
    \ class]], @\"node is not a CCRibbon\");\n\n    return (CCRibbon*)node;\n}\n\n\
    -(void) addRibbonPoint:(CGPoint)point\n{\n    CCRibbon* ribbon = [self getRibbon];\n\
    \    [ribbon addPointAt:point width:32];\n}\n\n-(BOOL) ccTouchBegan:(UITouch*)touch\
    \ withEvent:(UIEvent *)event\n{\n    [self addRibbonPoint:[MultiLayerScene locationFromTouch:touch]];\n\
    \    return YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent\
    \ *)event\n{\n    [self addRibbonPoint:[MultiLayerScene locationFromTouch:touch]];\n\
    }\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n{\n    [self\
    \ resetRibbon];\n}\n```"
  raw: '#### CCParallaxNode


    Parallaxing is an effect used in 2D games to give the impression of depth, created
    by using layered images that move at different rates. The images in the foreground
    move faster relative to the images in the background. Although you can’t see the
    parallax effect in a static image, [Figure 5–4](#Chapter05.html#fig_5_4) at least
    gives you a first impression of a background made up of individual layers. The
    clouds are at the very back; the mountains are in front of the clouds but behind
    the (ugly) trees. At the very bottom is the road where you might typically add
    a player character moving left and right along this scenery.


    ![images](images/0504.jpg)


    **Figure 5–4.** *The CCParallaxNode allows you to create an illusion of depth.*


    **NOTE:** Why does parallaxing create the illusion of depth? Because our minds
    are trained to this effect. Think of traveling in a car at high speed, and you’re
    looking out of a side window. You’ll notice the trees next to the road (closest
    to you) zipping by so fast you can hardly focus on a single one. Look a little
    further, and you’ll see the barnyard passing you by at a seemingly much slower
    rater. Then look to the mountains at the horizon, and you’ll hardly notice that
    you are moving past them at all. This is the parallax effect in a three-dimensional
    world, where there are an infinite number of parallax layers. In a 2D game we
    have to (very roughly) simulate the same effect with around two to eight parallax
    layers. Each layer tries to fool your mind into thinking that it is a certain
    distance away from your viewpoint, simply because it is moving at a certain speeds
    relative to other layers. It works surprisingly well.


    Cocos2d has a specialized node you can use to create this effect. The code to
    create a `CCParallaxNode` in [Listing 5–17](#Chapter05.html#list_5_17) is also
    in the ScenesAndLayers08 project.


    **Listing 5–17.** *The CCParallaxNode Requires a Lot of Setup Work, but the Results
    Are Worth It*


    `// Load the sprites for each parallax layer, from background to foreground.`

    `CCSprite* para1 = [CCSprite spriteWithFile:@"parallax1.png"];`

    `CCSprite* para2 = [CCSprite spriteWithFile:@"parallax2.png"];`

    `CCSprite* para3 = [CCSprite spriteWithFile:@"parallax3.png"];`

    `CCSprite* para4 = [CCSprite spriteWithFile:@"parallax4.png"];`


    `// Set the correct offsets depending on the screen and image sizes.`

    `para1.anchorPoint = CGPointMake(0, 1);`

    `para2.anchorPoint = CGPointMake(0, 1);`

    `para3.anchorPoint = CGPointMake(0, 0.6f);`

    `para4.anchorPoint = CGPointMake(0, 0);`

    `CGPoint topOffset = CGPointMake(0, screenSize.height);`

    `CGPoint midOffset = CGPointMake(0, screenSize.height / 2);`

    `CGPoint downOffset = CGPointZero;`


    `// Create a parallax node and add the sprites to it.`

    `CCParallaxNode* paraNode = [CCParallaxNode node];`

    `[paraNode addChild:para1`

    `                 z:1`

    `     parallaxRatio:CGPointMake(0.5f, 0)`

    `    positionOffset:topOffset];`


    `[paraNode addChild:para2 z:2 parallaxRatio:CGPointMake(1, 0) positionOffset:topOffset];`

    `[paraNode addChild:para3 z:4 parallaxRatio:CGPointMake(2, 0) positionOffset:midOffset];`

    `[paraNode addChild:para4 z:3 parallaxRatio:CGPointMake(3, 0) positionOffset:downOffset];`

    `[self addChild:paraNode z:0 tag:ParallaxSceneTagParallaxNode];`


    `// Move the parallax node to show the parallaxing effect.`

    `CCMoveBy* move1 = [CCMoveBy actionWithDuration:5 position:CGPointMake(-160, 0)];`

    `CCMoveBy* move2 = [CCMoveBy actionWithDuration:15 position:CGPointMake(160, 0)];`

    `CCSequence* sequence = [CCSequence actions:move1, move2, nil];`

    `CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];`

    `[paraNode runAction:repeat];`


    To create a `CCParallaxNode`, you first create the desired `CCSprite` nodes that
    make up the individual parallaxing images, and then you have to properly position
    them on the screen. In this case, I chose to modify their anchor points instead
    because it was easier to align the sprites with the screen borders. The `CCParallaxNode`
    is created like any other node, but its children are added using a special initializer.
    With it you specify the `parallaxRatio`, which is a `CGPoint` used as a multiplier
    for any movement of the `CCParallaxNode`. In this case, the `CCSpritepara1` would
    move at half the speed, `para2` at normal speed, `para3` at double the speed of
    the `CCParallaxNode`, and so on.


    Using a sequence of `CCMoveBy` actions, the `CCParallaxNode` is moved from left
    to right and back. You will notice how the clouds in the background move slowest
    while the trees and gravel in the foreground scroll by the fastest. This gives
    the illusion of depth.


    **NOTE:** You can’t modify the positions of individual child nodes once they are
    added to the `CCParallaxNode`. You can only scroll as far as the largest and fastest-moving
    image before the background shows through. You can see this effect if you modify
    the `CCMoveBy` actions to scroll a lot further. You can increase the scrolling
    distance by adding more of the same sprites with the appropriate offsets. But
    if you require endless scrolling in one or both directions, you will have to implement
    your own parallax system. In fact, this is what we’re going to do in [Chapter
    7](#Chapter07.html#ch7).


    #### CCRibbon


    The `CCRibbon` node creates a band of images, like a chain or, as in [Figure 5–5](#Chapter05.html#fig_5_5),
    like a millipede crawling over the parallaxing scene in the ScenesAndLayers09
    project.


    ![images](images/0505.jpg)


    **Figure 5–5.** *Nasty. A CCRibbon of spiders. Looks like a millipede crawling
    over the screen.*


    The CCRibbon class, together with touch input, can be used to create the line-drawing
    effects of popular games. [Listing 5–18](#Chapter05.html#list_5_18) shows how
    the `CCRibbon` is implemented with the touch events. What’s notable is that you
    can’t remove individual points from a `CCRibbon`. You can only remove the whole
    `CCRibbon` by removing it as child from its parent. The width and length parameters
    of the `CCRibbon` initializer determine how big individual ribbon elements are
    drawn. In this case, I chose to make it as big as the spider.png image, which
    is 32 pixels wide and high. If you choose other values, the image will be scaled
    up or down accordingly.


    **Listing 5–18.** *The CCRibbon Class*


    `-(void) resetRibbon`

    `{`

    `    // Removes the ribbon and creates a new one.`

    `    [self removeChildByTag:ParallaxSceneTagRibbon cleanup:YES];`

    `    CCRibbon* ribbon = [CCRibbon ribbonWithWidth:32`

    `                                           image:@"spider.png"`

    `                                          length:32`

    `                                           color:ccc4(255, 255, 255, 255)`

    `                                            fade:0.5f];`

    `    [self addChild:ribbon z:5 tag:ParallaxSceneTagRibbon];`

    `}`


    `-(CCRibbon*) getRibbon`

    `{`

    `    CCNode* node = [self getChildByTag:ParallaxSceneTagRibbon];`

    `    NSAssert([node isKindOfClass:[CCRibbon class]], @"node is not a CCRibbon");`


    `    return (CCRibbon*)node;`

    `}`


    `-(void) addRibbonPoint:(CGPoint)point`

    `{`

