  trans: '

    ### 什么是瓦片地图？


    瓦片地图是由独立瓦片构成的二维游戏世界。你只需使用少量尺寸相同的图像，就能创建出庞大的世界地图。这意味着瓦片地图在节省大型地图（游戏世界）内存方面非常高效。因此，它们最早出现在计算机游戏发展的初期也就不足为奇了。许多经典的角色扮演游戏都使用方形瓦片来构建奇幻世界。这些游戏看起来有点像图
    10-1 中的瓦片地图，它也是一个正交瓦片地图的完美示例。它看起来像是从正上方俯视的鸟瞰图。因此，正交瓦片地图通常看起来是平面的。


    ![images](img/1001.jpg)


    **图 10-1.** *Tiled (Qt) 地图编辑器中的正交瓦片地图*


    实际上，正交瓦片地图中的瓦片不一定是方形的；你也可以使用矩形图像创建正交瓦片地图。这类地图在亚洲角色扮演游戏中最为常见，例如《勇者斗恶龙》。虽然仍使用正交视角，但它允许设计者创建出看似高大于宽的物体。这使得设计者能够通过将多个瓦片组合绘制成房屋等物体，并允许游戏角色被部分瓦片遮挡，从而营造出体积感的错觉。


    这种方法在《创世纪 6》和特别是《创世纪 7》中大放异彩。通过倾斜绘制瓦片的视角，其效果接近等距瓦片地图，但本质上仍是正交瓦片地图。使用这种方法，设计者能够创造出深度感的错觉，如图
    10-2 所示。


    ![images](img/1002.jpg)


    **图 10-2.** *一种带有透视瓦片的正交瓦片地图，设计为通过多层构建来营造深度感。这种瓦片地图风格因《创世纪 7》而闻名。*


    等距瓦片地图则更进一步，它不仅以特定透视角度绘制瓦片，还将瓦片旋转了 45 度。等距瓦片地图能非常有效地欺骗我们的大脑，让我们相信这个世界中确实存在第三维度，尽管所有图像本质上仍然是平面的。等距瓦片地图通过使用绘制成菱形（菱形形状）的瓦片图像，并允许靠近观察者的瓦片覆盖远离观察者的瓦片，从而实现了这种深度感。请参见图
    10-3 中的等距瓦片地图示例，我将在下一章中更详细地讨论它。


    ![images](img/1003.jpg)


    **图 10-3.** *Tiled (Qt) 地图编辑器中的等距瓦片地图*


    图 10-2 和图 10-3 中的瓦片地图证明，瓦片地图不必看起来是平面的。瓦片的分层或堆叠技术也可用于某些允许玩家与游戏世界互动的游戏，许多《Farmville》粉丝视频就展示了其绝佳效果。一些《Farmville》用户仅通过堆叠瓦片，就利用农田建造了房屋甚至摩天大楼。他们利用了等距瓦片地图中可能实现的光学错觉。


    编辑瓦片地图通常使用编辑器完成，而 `cocos2d` 直接支持的编辑器名为 Tiled (Qt) 地图编辑器。Tiled 是免费开源软件，允许你编辑包含多个图层的正交和等距瓦片地图。Tiled
    还允许你添加触发区域（对象图层），在游戏中可用于在角色进入该区域时触发特定动作。它们也可以用来在地图上添加任意位置，例如定义生成点。通过编辑瓦片属性，你可以确定它是何种类型的瓦片。这也可以用于阻止角色进入某些瓦片，或者例如在角色经过熔岩瓦片时受到伤害。


    **注意：** Qt 指的是诺基亚的 Qt 框架，Tiled 正是基于此框架构建。由于还存在一个已停止维护的 Java 版 Tiled，因此通过写作 Tiled
    (Qt) 来区分两者就很重要。Java 版已不再更新，但包含一些值得一试的额外功能。但在本章及下一章中，我将使用并讨论 Tiled (Qt)。


    ### 使用 TexturePacker 准备图像


    在开始使用 Tiled (Qt) 地图编辑器之前，你需要准备好瓦片地图图形。瓦片地图的瓦片图像集通常被称为*瓦片集*。从技术上讲，它只是一个包含瓦片图像的纹理图集。


    在本章的 `Tilemap01` 项目中，你会在 `Assets/tiles` 文件夹中找到一些方形瓦片图像。将所有瓦片图像添加到 `TexturePacker`，然后取消勾选
    `Allow Rotation`，将 `Algorithm` 设置为 `Basic`，并将 `Sort by` 设置为 `Name`。这些设置确保瓦片能正确排序并对齐，以供
    Tiled 使用。在 `TexturePacker` 中生成的瓦片集看起来应该类似于图 10-4。


    ![images](img/1004.jpg)


    **图 10-4.** *使用 TexturePacker 创建包含几个方形瓦片的纹理图集*


    对于 Tiled 来说，保持瓦片位置不变至关重要——这就是按名称排序如此重要的原因——因为 Tiled 仅通过位置和偏移来引用瓦片集中的单个瓦片。这意味着如果纹理中的瓦片位置发生改变，使用此瓦片集纹理的
    Tiled 瓦片地图将会看起来完全不同。瓦片地图仍然引用瓦片集中相同的位置，但例如，原本在草地瓦片的位置现在可能变成了水瓦片。


    **注意：** `TexturePacker` 将新增一个名为 `TileMap` 的算法——这是一种为瓦片地图创建瓦片集的特殊模式，允许你手动在网格中排列瓦片。请访问
    [`www.texturepacker.com`](http://www.texturepacker.com) 了解此新功能的可用性和更多信息。


    ### Tiled (Qt) 地图编辑器


    创建可与 `cocos2d` 配合使用的瓦片地图最流行的工具是我在前面章节中已经提到的 Tiled (Qt) 地图编辑器。它生成的 `TMX` 文件受到 `cocos2d`
    游戏引擎的原生支持。`TMX` 文件本质上是 `XML` 文件，必要时你可以使用文本编辑器进行编辑。


    Tiled 可供免费下载，在撰写本文时，最新版本是 0.7 版。你可以从 Tiled 的主页 [`www.mapeditor.org`](http://www.mapeditor.org)
    下载它。


    如果你想支持 Tiled 的开发，可以考虑向项目开发者 Thorbjørn Lindeijer 捐款。你可以在此处向项目捐款： [`http://sourceforge.net/donate/index.php?group_id=161281`](http://sourceforge.net/donate/index.php?group_id=161281)。

    '
- fmt: '#### Creating a New Tilemap


    The first thing after you''ve downloaded, extracted, installed, and started Tiled
    is to go to the `View` menu and check both the `Tilesets` and `Layers` items.
    This will show the list of layers and the current tileset on the right side of
    the Tiled window. Then choose `File` ![images](images/U001.jpg) `New` to create
    a new tilemap. This will bring up the New Map dialog pictured in [Figure 10–5](#Chapter10.html#fig_10_5).


    ![images](images/1005.jpg)


    **Figure 10–5.** *Creating a new tilemap in Tiled*


    Currently, Tiled supports orthogonal (rectangular) tilemaps as well as isometric
    tilemaps. The map size is given in tiles, not pixels. In this case, the new map
    will be 30×20 tiles, with the tile images having 32×32-pixel dimensions because
    that''s the size of the tile images. It''s crucial that the tile size matches
    the size of your tile images, or they will not align.


    The new map will be completely empty, and there''s no tileset loaded that you
    can draw from. You can add a tileset by selecting `Map` ![images](images/U001.jpg)
    `New Tileset` from Tiled''s menu. This will open the `New Tileset` dialog (shown
    in [Figure 10–6](#Chapter10.html#fig_10_6)), where you can browse for the proper
    tileset image. A tileset is just a name for an image containing multiple tiles
    with equal spacing, so you could also call it a texture atlas containing only
    images of the same size.


    **NOTE:** The function `Map` ![images](images/U001.jpg) `Add External Tileset`
    is used only to import a previously exported tileset to share the same tileset
    with multiple TMX maps. You can export a tileset by right-clicking the tileset
    view in the lower-right corner of the Tiled window and then select `Export Tileset
    As`.


    I will use the `dg_grounds32.png` tileset. These tiles were drawn by David E.
    Gervais and published under the Creative Commons License, meaning you are free
    to share and remix his work as long as you give credit to him. You can download
    more of his tilesets from this web site: [`http://pousse.rapiere.free.fr/tome/index.htm`](http://pousse.rapiere.free.fr/tome/index.htm).


    In [Figure 10–6](#Chapter10.html#fig_10_6), I have already added the `dg_grounds32.png`
    tileset image by locating it through the `Browse` button in the Resources folder
    of the Tilemap01 project. If you check the “`Use transparent color`” check box,
    transparent areas will simply be drawn in pink (the default color). You can leave
    this box unchecked for now since the tiles in use have no transparent areas.


    The tile width and height are the dimensions of individual tiles in the tileset.
    They should match the tile size of 32×32 pixels, which you set when creating the
    new map. The `Margin` and `Spacing` settings determine how many pixels away from
    the image border the tiles are and how many pixels of space are between them.
    In the case of the `dg_grounds32.png`, there is no spacing at all, so I set both
    values to 0.


    If you had your tiles aligned by TexturePacker to create a tileset texture, you
    must enter the pixel-padding value used by TexturePacker in the `Margin` and `Spacing`
    fields. By default TexturePacker uses a padding of 0 pixels.


    ![images](images/1006.jpg)


    **Figure 10–6.** *Creating a new tileset from an image file*


    When loading a new tileset image, make sure the tileset image is already located
    in your project''s resource folder. You should then also make sure to save the
    tilemap TMX file to the same folder where the tileset image used by the tilemap
    is located. Otherwise, cocos2d might fail to load the tileset image; trying to
    load the TMX file will then cause a runtime exception. The culprit is that TMX
    files reference the tileset image relative to the location the TMX file is saved
    to. If they are not both in the same folder, cocos2d may be unable to find the
    image because the folder structure is not preserved when the app is installed
    in the simulator or on the device.


    **TIP:** TMX files are plain XML files, so you might want to peek inside if you''re
    curious. If you see the image file referenced with parts of a path, then cocos2d
    is unlikely to load the referenced image file. The image reference should list
    just the image file name without any path components, like so: `<image source="tiles.png"/>`.


    #### Designing a Tilemap


    With the tileset loaded, you''ll be faced with a blank map, an invitation for
    your creativity to come up with great ideas for a tilemap. What''s even better
    is to get rid of the blank tilemap as the very first step. It''s very helpful
    to start the tilemap with a default floor tile. I selected the `Bucket Fill tool`
    and picked a bright grass tile so that my tilemap is now a lush meadow—sort of.
    You can see it in [Figure 10–7](#Chapter10.html#fig_10_7).


    ![images](images/1007.jpg)


    **Figure 10–7.** *An empty map with the dg_grounds32 tileset loaded, waiting for
    your inspiration*


    **TIP:** If you ever notice something missing from Tiled''s window, check the
    `View` menu. You can hide and unhide the Tilesets, Layers, and History views.
    This is important to know because it''s the only way to bring back these views
    in case you have clicked the `X` button on one of these views.


    Tiled uses four modes for editing the tilemap, indicated by the four rightmost
    icons on the toolbar. They are `Stamp Brush` (hotkey B), which allows you to draw
    the current selection in the tileset; `Bucket Fill` (hotkey F), which fills areas
    of connected, identical tiles; `Eraser` (hotkey E), which erases tiles; and `Rectangular
    Select` (hotkey R), with which you can select a range of tiles and then copy and
    paste the selection.


    You can also zoom the tilemap. If you have a mouse with a mousewheel, simply hold
    down the Command key and spin the scroll wheel to zoom in and out. Alternatively,
    you can also zoom in and out by pressing the Command key with either the plus
    and minus sign, respectively.


    You''ll spend most of your time picking a tile from the tileset and drawing it
    onto the tilemap with the `Stamp Brush` selected. Placing tile by tile, you''ll
    create your tile-based game world.


    You can also edit tiles in multiple layers by adding more layers in the Layers
    view. From the menu, choose `Layer` ![images](images/U001.jpg) `Add Tile Layer`
    to create a new layer for tiles. Using multiple tile layers allows you to switch
    out areas of the tilemap in `cocos2d`. In the TileMap01 example project, I''m
    using it to switch parts of the map between winter and summer.


    You can also choose `Layer` ![images](images/U001.jpg) `Add Object Layer` to add
    a layer for adding objects. There are two types of objects; the regular objects
    are simply rectangles that you can place, and the other type are tile objects
    that allow you to freely place a tile anywhere on the map, without snapping to
    the tile grid. You can use the rectangle objects to annotate the map with custom
    information, such as spawn points, teleport locations, or trigger areas. The tile
    objects are most commonly used to place smaller things like swords, flowers, candles,
    and other items directly onto the tile world.


    To work with objects, there are additional buttons in the Tiled toolbar: Select
    Objects (hotkey S), Insert Objects (hotkey O), and Insert Tile Objects (hotkey
    T). To insert a rectangle object, click the `Insert Objects` icon and click in
    the tilemap world to create point objects (rectangles with zero width and height),
    or click and drag down and to the right to create a rectangle. To insert a tile
    object, click the `Insert Tile Objects` icon, select a tile from the tileset,
    and then click the tilemap world to add a new tile object.


    Some functionality in Tiled is hidden in context menus. For example, the rectangle
    objects I just mentioned can be deleted by right-clicking them in the Tilemap
    view and selecting `Remove Object`. Note that you also need to have the object
    layer highlighted in the Layers list view for the context menu to appear.'
