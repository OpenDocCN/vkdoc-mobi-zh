    \ body->GetWorldCenter());\n}\n```\n\n现在我们有了物体和手指的位置，接着用物体位置减去手指位置。例如，如果物体位置在屏幕中心\
    \ (160, 240)，手指触摸位置靠近屏幕右上角 (300, 450)，那么手指位置减去物体位置就是对各自的 `x` 和 `y` 坐标进行减法运算，结果为\
    \ (300 - 160, 450 - 240) = (140, 210)。向量 `bodyToFingerDirection` 现在是 (140, 210)。称之为从\
    \ `bodyPos` 到 `fingerPos` 的方向，因为如果将 `bodyToFingerDirection` 加到 `bodyPos` 上，就会得到\
