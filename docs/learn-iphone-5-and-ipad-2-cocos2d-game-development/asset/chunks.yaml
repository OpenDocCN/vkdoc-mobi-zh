  trans: "\n`return config`\n\n这些设置大多不言自明，你可能对此感到熟悉。这些设置在 Kobold2D API 参考文档中的 `KKStart-upConfig`\
    \ 类中有详细说明，也可在此处查看：[`www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference`](http://www.kobold2d.com/display/KKDOC/Config.lua+Settings+Reference)。\n\
    \n例如，`FirstSceneClassName` 设置允许你指定一个继承自 `CCScene` 或 `CCLayer`（自动包装在 `CCScene`\
    \ 内）的类名，该类将是 `CCDirector` 运行的第一个场景。你可以启用 iAd 广告横幅、更改应用的自动旋转方式，或为 Mac 构建版本提供默认的窗口位置和大小。\n\
    \n使用基于 Lua 的配置文件的一大优势是，整个启动代码是 Kobold2D 代码的一部分，并且可以在新版本中根据需要更新。随着 Kobold2D 的成熟，根据开发者最常在应用中更改或包含的内容，启动配置中将添加更多设置。此外，你还可以创建和使用自定义的\
    \ `config.lua` 设置。Hello World 项目提供了加载自定义设置的示例。我将在下一节中介绍。\n\n**提示：** 你可以通过免费的《Programming\
    \ in Lua》一书了解更多关于 Lua 的知识，该书可在 Lua 官方主页在线获取：[`www.lua.org/pil`](http://www.lua.org/pil)。这本书针对的是旧版本的\
    \ Lua，但大部分内容仍然适用。你也可以浏览 Lua 参考手册 [`www.lua.org/manual`](http://www.lua.org/manual)\
    \ 以快速了解该语言。在过去十年中，Lua 已成为游戏开发者的首选脚本语言。它的内存占用非常小，并且速度上通常能达到 C 语言编程性能的 80% 到 90%。\n\
    \n## Hello Kobold2D 场景和层\n\n接下来，我们看看实际的场景类 `HelloWorldLayer`，它通过 `config.lua`\
    \ 设置 `FirstSceneClassName = \"HelloWorldLayer\"` 被设为第一个场景。你会注意到这个第一个场景实际上派生自 `CCLayer`。Kobold2D\
    \ 会识别这一点，并自动将 `HelloWorldLayer` 类在后台包装成一个 `CCScene` 实例。\n\n**提示：** 为了避免在每个 `CCLayer`\
    \ 类中重复编写 `+(id) scene` 方法，你可以简单地调用 Kobold2D 中的 `+(id) nodeWithScene` 方法：\n\n```\n\
    [[CCDirector sharedDirector] replaceScene:[MyGameLayer nodeWithScene]];\n```\n\
    \n`HelloWorldLayer` 的接口声明相当简单，只提供了三个实例变量，这些变量稍后将从 `config.lua` 文件中加载：\n\n```objectivec\n\
    #import \"cocos2d.h\"\n\n@interface HelloWorldLayer : CCLayer\n{\n    NSString*\
    \ helloWorldString;\n    NSString* helloWorldFontName;\n    int helloWorldFontSize;\n\
    }\n\n@property (nonatomic, copy) NSString* helloWorldString;\n@property (nonatomic,\
    \ copy) NSString* helloWorldFontName;\n@property (nonatomic) int helloWorldFontSize;\n\
    \n@end\n```\n\n此时，你应该注意 `config.lua` 文件中的一个特定添加。在代码清单 16-2 中有一个额外的 Lua 表，名为 `HelloWorldSettings`，它提供了三个熟悉的设置：`HelloWorldString`、`HelloWorldFontName`\
    \ 和 `HelloWorldFontSize`。\n\n**代码清单 16-2.** *自定义 config.lua 设置*\n\n```lua\nlocal\
    \ config =\n{\n    KKStartupConfig =\n    {\n        -- 启动设置已省略，以保持简洁\n    },\n\
    \n    HelloWorldSettings =\n    {\n        HelloWorldString = \"Hello Kobold2D!\"\
    ,\n        HelloWorldFontName = \"Marker Felt\",\n        HelloWorldFontSize =\
    \ 50,\n    },\n}\n```\n\n除了首字母大写外，这些设置在名称和数据类型上与 `HelloWorldLayer` 类的属性匹配。我相信你能看出其中的联系。实际上，代码清单\
    \ 16-3 中展示的 `KKConfig` 类方法 `injectPropertiesFromKeyPath` 会从 `HelloWorldSettings`\
    \ 子表中加载值，并将它们注入目标类（本例中为 `self`）的相应命名属性中。\n\n**代码清单 16-3.** *将自定义设置注入（分配）给类属性*\n\
    \n```objectivec\n[KKConfig injectPropertiesFromKeyPath:@\"HelloWorldSettings\"\
    \ target:self];\n```\n\n我所说的*注入*是指，如果存在名为 `HelloWorldSettings` 的 Lua 表，那么其中包含的每个设置都将被分配给目标类（本例中为\
    \ `self`）的相应命名属性。例如，如果 `HelloWorldString` 设置的数据类型正确（`NSString*`）且未被设置为 `readonly`\
    \ 属性，它将被分配给类属性 `helloWorldString`。\n\n**提示：** 通过使用 `KKConfig`，你可以轻松地让你的应用实现数据驱动，例如，允许设计师和美工调整应用的行为而无需修改源代码。当你拥有各种具有相同或相似设置的游戏对象时，数据驱动开发也会大放异彩。你不会希望这些设置分散在代码中，而是希望将它们集中在一个文件中，以便提供必要的概览。\n\
    \n注入后，这三个属性将包含与 `HelloWorldSettings` Lua 表相同的值。它们已准备好供标签使用：\n\n```objectivec\n\
    CCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString\n           \
    \                            fontName:helloWorldFontName\n                   \
    \                    fontSize:helloWorldFontSize];\n```\n\n代码清单 16-4 展示了完整的 `HelloWorldLayer`\
    \ 实现。除了之前对 `KKConfig` 的调用以及前面讨论过的 `CCDirector` 扩展和平台宏的使用之外，它仍然是 100% 的 cocos2d\
    \ 代码。\n\n**代码清单 16-4.** *Hello Kobold2D 实现文件*\n\n```objectivec\n#import \"HelloWorldLayer.h\"\
    \n```\n"
- fmt: "```objectivec\n@implementation HelloWorldLayer\n@synthesize helloWorldString,\
    \ helloWorldFontName;\n@synthesize helloWorldFontSize;\n\n-(id) init\n{\n    if\
    \ ((self = [super init]))\n    {\n        CCDirector* director = [CCDirector sharedDirector];\n\
    \n        CCSprite* sprite = [CCSprite spriteWithFile:@\"ship.png\"];\n      \
    \  sprite.position = director.screenCenter;\n        [self addChild:sprite];\n\
    \n        // get the hello world string from the config.lua file\n        [KKConfig\
    \ injectPropertiesFromKeyPath:@\"HelloWorldSettings\" target:self];\n\n      \
    \  CCLabelTTF* label = [CCLabelTTF labelWithString:helloWorldString\n        \
    \                                       fontName:helloWorldFontName\n        \
    \                                       fontSize:helloWorldFontSize];\n      \
    \  label.position = director.screenCenter;\n        label.color = ccGREEN;\n \
    \       [self addChild:label];\n\n        // print out which platform we're on\n\
    \        NSString* platform = @\"(unknown platform)\";\n\n        if (director.currentPlatformIsIOS)\n\
    \        {\n            // add code\n            platform = @\"iPhone/iPod Touch\"\
    ;\n\n            if (director.currentDeviceIsIPad)\n                platform =\
    \ @\"iPad\";\n\n            if (director.currentDeviceIsSimulator)\n         \
    \       platform = [NSString stringWithFormat:@\"%@ Simulator\", platform];\n\
    \        }\n        else if (director.currentPlatformIsMac)\n        {\n     \
    \       platform = @\"Mac OS X\";\n        }\n\n        CCLabelTTF* platformLabel\
    \ = [CCLabelTTF labelWithString:platform\n                                   \
    \                    fontName:@\"Arial\"\n                                   \
    \                    fontSize:24];\n        platformLabel.position = director.screenCenter;\n\
    \        platformLabel.color = ccYELLOW;\n        [self addChild:platformLabel];\n\
    \        glClearColor(0.2f, 0.2f, 0.4f, 1.0f);\n    }\n\n    return self;\n}\n\
    \n@end\n```\n\nNotice the way I determine the platform (iOS, Mac OS) and device\
    \ type (iPad, iOS Simulator) using director properties such as `currentPlatformIsIOS`\
    \ and `currentDeviceIsSimulator`. These are some of the extensions to `CCDirector`\
    \ I mentioned earlier.\n\nYou may be wondering why I haven’t used preprocessor\
    \ macros like `__IPHONE_OS_VERSION_MAX_ALLOWED` to determine platform and device\
    \ type. First, in Kobold2D I wouldn’t have used the hard-to-remember and verbose\
    \ SDK macros. Instead, Kobold2D provides the simpler macros `KK_PLATFORM_IOS`\
    \ and `KK_PLATFORM_MAC` to differentiate between the two supported platforms.\
    \ If needed, you can also differentiate between iOS device and iOS Simulator by\
    \ using the macros `KK_PLATFORM_IOS_DEVICE` and `KK_PLATFORM_IOS_SIMULATOR`.\n\
    \nThe real reason of not using preprocessor macros and why conditional compilation\
    \ with `#ifdef` should be used only as a last-resort measure is this: the compiler\
    \ is your friend! Every time your code is compiled, the compiler lets you know\
    \ that everything is in order or tells you whatever is technically or syntactically\
    \ wrong with your code. It may be annoying at times, but the compiler is only\
    \ letting you know that you made a mistake or forgot something. Allowing as much\
    \ code as possible to be compiled by the compiler every time you build the code\
    \ is so important for cross-platform development that the added overhead of platform\
    \ and device runtime tests are entirely negligible.\n\nOnce you do cross-platform\
    \ development, you’ll likely spend a lot of time working on and compiling code\
    \ for only one platform. Any code that is within an `#ifdef` for the other platform\
    \ is invisible to the compiler, and it won’t complain about errors. Now as soon\
    \ as you switch targets and compile for the other platform, you’ll likely run\
    \ into errors that weren’t there before. They may be related to code changes that\
    \ you made an hour ago, a day ago, or maybe even a week ago.\n\nNot only does\
    \ it cause a lot of mental load to figure out which code change caused the error\
    \ and what the correct fix will be, it’s also frustrating because you’ll frequently\
    \ find that switching target platforms results in build failures. Either you’ll\
    \ spend more time than necessary building code regularly for both target platforms\
    \ or you’ll simply give up, maybe with the good intention of porting the project\
    \ when it’s finished. However, porting a completed project is much more work than\
    \ developing it for both platforms from the beginning. Why? Because as long as\
    \ your code is written for only one platform, your code could as well be entirely\
    \ within an `#ifdef`.\n\nCode that compiles works. At least it’s technically correct.\
    \ Immediate build errors are more likely to be corrected right away and easier\
    \ to fix because you still have the most recent code changes in your short-term\
    \ memory.\n\n### Running Hello World with iSimulate\n\nIf you run the Hello World\
    \ project on the iPhone or iPad Simulator, you’ll notice a network connection\
    \ dialog as in [Figure 16–4](#Chapter16.html#fig_16_4). You’ll also notice the\
    \ iAd banner that shows up because it was enabled in `config.lua`.\n\n**NOTE:**\
    \ If you see an `bannerView:didFailToReceiveAdWithError` error in your log with\
    \ the message \"The operation couldn’t be completed. (ADErrorDomain error 1.),\"\
    \ then this is most likely caused by the app not being set up for iAd. The iAd\
    \ service needs to be enabled for each app and each developer in iTunes Connect.\
    \ You’ll find more information about enabling iAd for your app at [`https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf).\n\
    \n![images](images/1604.jpg)\n\n**Figure 16–4.** *Network connection warning caused\
    \ by iSimulate*\n\nThe incoming network connections warning dialog is caused by\
    \ iSimulate. It’s nothing to worry about. The iSimulate library accepts incoming\
    \ connections from the iSimulate app, which you can run on your WiFi-enabled iOS\
    \ device in order to remote control the simulator. In other words, iSimulate enables\
    \ you to test your game using your device but running in the simulator. All the\
    \ features the simulator doesn’t have, like GPS, Accelerometer, or Multi-Touch,\
    \ can be simulated with the iSimulate app. It can be a real time-saver.\n\nFor\
    \ example, if you have iSimulate running on your device and connected to your\
    \ Mac, you will receive messages like `accelerometer:didAccelerate:` in your app\
    \ even though the simulator doesn’t have an accelerometer. This makes iSimulate\
    \ an invaluable tool if you consider that running your app is usually a lot faster\
    \ than deploying it to a device. I recommend giving it a try with Kobold2D’s User-Input\
    \ template project.\n\niSimulate is available on the App Store and normally costs\
    \ $15.99: [`http://itunes.apple.com/app/isimulate/id306908756`](http://itunes.apple.com/app/isimulate/id306908756)."
