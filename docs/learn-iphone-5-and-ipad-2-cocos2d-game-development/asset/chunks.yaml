- fmt: "您还可以通过右键单击对象、图层和切片，然后点击相应的`Properties`菜单项来编辑它们的属性。其中一个用途是使用`Layer`![images](images/U001.jpg)`Add\
    \ Tile Layer`创建额外的切片图层。这个图层将用于告知游戏有关某些切片属性的信息。我将其命名为`GameEventLayer`，因为它将用于定义特定游戏事件的触发区域。\n\
    \n选中`GameEventLayer`后，选择`Map`![images](images/U001.jpg)`New Tileset`，并从`dg_grounds32.png`所在文件夹加载`game-events.png`。该文件仅包含三个切片。右键单击其中一个，选择`Tile\
    \ Properties`，并添加`isWater`属性，如图[Figure 10–8](#Chapter10.html#fig_10_8)所示。\n\n\
    **警告：**请记住，每个切片图层都会产生一些开销，尤其是在同一位置的多图层中放置切片时。这会导致两个图层都被绘制，从而对游戏性能产生不利影响。建议尽量保持最少的切片图层数量。两到四个切片图层对大多数游戏来说应该足够了。添加新的切片图层并进行绘制后，请务必在设备上检查游戏的帧率。\n\
    \n您还应注意，Tiled允许一个图层添加多个切片集。但是，cocos2d每个图层仅支持一个切片集。\n\n![images](images/1008.jpg)\n\
    \n**Figure 10–8.** *添加切片属性*\n\n然后，您可以使用刚刚添加了`isWater`属性的切片在切片地图上进行绘制。理想情况下，应将其绘制在河流区域。如果您想查看正在绘制的下层切片，可以使用图层视图中的`GameEventLayer`的`Opacity`滑块。或者，单击图层复选框，以隐藏或取消隐藏此特定图层上绘制的内容。\n\
    \n在保存TMX切片地图之前，请确保启用所有图层复选框。cocos2d不加载在Tiled中未选中的图层。\n\n完成此操作后，您应获得一个类似于[Figure\
    \ 10–9](#Chapter10.html#fig_10_9)所示的切片地图。将其保存到与切片集图片相同的`TileMap01 Resources`文件夹中。\n\
    \n![images](images/1009.jpg)\n\n**Figure 10–9.** *包含三个切片图层和一个对象图层的完整切片地图*\n\n\
    ### 将正交切片地图与Cocos2d结合使用\n\n要在cocos2d中使用TMX切片地图，首先需要将TMX文件及其附带切片集图片文件作为资源添加到Xcode项目中。在`TileMap01`项目中，我添加了`orthogonal.tmx`以及切片集`dg_grounds32.png`和`game-events.png`。加载和显示切片地图非常简单；以下代码来自`TileMapLayer`类的`init`方法：\n\
    \n```\nCCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"orthogonal.tmx\"\
    ];\n[self addChild:tileMap z:-1 tag:TileMapNode];\n\nCCTMXLayer* eventLayer =\
    \ [tileMap layerNamed:@\"GameEventLayer\"];\neventLayer.visible = NO;\n```\n\n\
    `CCTMXTiledMap`类使用TMX文件名进行初始化，然后作为子节点添加并附带一个标签，以便后续检索。当然，使用成员变量同样有效。下一步，通过使用`layerNamed`方法并提供在Tiled中命名的图层名称，来检索用于游戏事件的`CCTMXTiledMap`。由于游戏事件图层仅作为代码判定特定切片属性的提示，因此该图层不应被渲染。请注意，如果您在Tiled中取消选中该图层，它不仅不会被显示，您也无法访问其切片及切片属性。\n\
    \n如果您现在运行项目，您将看到一个与[Figure 10–10](#Chapter10.html#fig_10_10)中相同的切片地图。\n\n![images](images/1010.jpg)\n\
    \n**Figure 10–10.** *iPhone模拟器中的正交切片地图*\n\n现在您无法对切片地图进行任何操作，但我希望改变这一点。继续到`TileMap02`项目，我希望能够找到标记了`isWater`的切片。我已经添加了`ccTouchesBegan`方法，如[Listing\
    \ 10–1](#Chapter10.html#list_10_1)所示，以便确定玩家正在触摸的切片。\n\n**Listing 10–1.** *确定切片属性*\n\
    \n```\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n\
    \    CCNode* node = [self getChildByTag:TileMapNode];\n    NSAssert([node isKindOfClass:[CCTMXTiledMap\
    \ class]], @\"not a CCTMXTiledMap\");\n    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;\n\
    \n    // 将触摸位置转换为切片坐标\n    CGPoint touchLocation = [self locationFromTouch:[touches\
    \ anyObject]];\n    CGPoint tilePos = [self tilePosFromLocation:touchLocation\
    \ tileMap:tileMap];\n\n    // 检查触摸是否在水面上（例如，带有isWater属性的切片）\n    bool isTouchOnWater\
    \ = NO;\n\n    CCTMXLayer* eventLayer = [tileMap layerNamed:@\"GameEventLayer\"\
    ];\n    int tileGID = [eventLayer tileGIDAt:tilePos];\n\n    if (tileGID != 0)\n\
    \    {\n        NSDictionary* properties = [tileMap propertiesForGID:tileGID];\n\
    \        if (properties)\n        {\n            NSString* isWaterProperty = [properties\
    \ valueForKey:@\"isWater\"];\n            isTouchOnWater = ([isWaterProperty boolValue]\
    \ == YES);\n        }\n    }\n\n    // 根据触摸位置决定下一步操作\n    if (isTouchOnWater)\n\
    \    {\n        [[SimpleAudioEngine sharedEngine] playEffect:@\"alien-sfx.caf\"\
    ];\n    }\n    else\n    {\n        // 获取冬季图层并切换其可见性\n        CCTMXLayer* winterLayer\
    \ = [tileMap layerNamed:@\"WinterLayer\"];\n        winterLayer.visible = !winterLayer.visible;\n\
    \    }\n}\n```\n\n`CCTMXTiledMap`以常规方式检索。触摸位置首先被转换为屏幕坐标，然后用于获取包含该特定屏幕位置切片地图索引的`tilePos`。稍后我会介绍`tilePosFromLocation`方法。现在，只需知道它返回了被触摸切片的索引即可。"
  raw: 'You can also edit properties of objects, layers, and tiles by right-clicking
    them and clicking the corresponding `Properties` menu item. One use for that is
    to create an additional tile layer by using `Layer` ![images](images/U001.jpg)
    `Add Tile Layer`. This will be a layer used to tell the game about certain properties
    of tiles. I called it `GameEventLayer` because it will be used to define trigger
    areas for certain game events.


    With `GameEventLayer` selected, choose `Map` ![images](images/U001.jpg) `New Tileset`
    and load game-events.png from the same folder as dg_grounds32.png. It contains
    only three tiles. Right-click one, select `Tile Properties`, and add the `isWater`
    property, as shown in [Figure 10–8](#Chapter10.html#fig_10_8).


    **CAUTION:** Keep in mind that each tile layer creates some overhead, especially
    if you set tiles in multiple layers at the same location. This will cause both
    layers to be drawn and can adversely affect the game''s performance. It is recommended
    to keep the number of tile layers to a minimum. Two to four tile layers should
    be sufficient for most games. Be sure to take a look at your game''s framerate
    on the device after you have added a new tile layer and drawn on it.


    You should also be aware that Tiled allows you to add more than one tileset for
    a layer. However, cocos2d supports only one tileset per layer.


    ![images](images/1008.jpg)


    **Figure 10–8.** *Adding a tile property*


    You can then draw over the tilemap using the tile to whose properties you just
    added the `isWater` property. Ideally, draw it over the river. If you want to
    see the tiles underneath what you''re drawing, you can use the `Opacity` slider
    for the `GameEventLayer` in the Layers view. Or, click the layer''s check box
    to hide or unhide everything drawn on this particular layer.


    Just be sure to enable all layer check boxes before saving the TMX tilemap. Cocos2d
    does not load layers that are unchecked in Tiled.


    When you''re done with this, you should have a tilemap similar to the one in [Figure
    10–9](#Chapter10.html#fig_10_9). Save it in the same TileMap01 Resourcesfolder
    where the tileset images are.


    ![images](images/1009.jpg)


    **Figure 10–9.** *A completed tilemap with three tile layers and an object layer*


    ### Using Orthogonal Tilemaps with Cocos2d


    To use TMX tilemaps with cocos2d, you first have to add the TMX file and the accompanying
    tileset image files as resources to your Xcode project. In the TileMap01 project,
    I added orthogonal.tmx along with the tilesets dg_grounds32.png and game-events.png.
    Loading and displaying the tilemap is very straightforward; the following code
    is from the `init` method of the `TileMapLayer` class:


    `CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"orthogonal.tmx"];`

    `[self addChild:tileMap z:-1 tag:TileMapNode];`


    `CCTMXLayer* eventLayer = [tileMap layerNamed:@"GameEventLayer"];`

    `eventLayer.visible = NO;`


    The `CCTMXTiledMap` class is initialized with the name of the TMX file and then
    added as a child with a tag so that it can be retrieved later. A member variable
    would of course work just as well. The next step is to retrieve the `CCTMXTiledMap`
    used for game events by using the `layerNamed` method and providing the name of
    the layer as it was named in Tiled. Because the game events layer will be used
    only as hints for code to determine properties of certain tiles, this layer should
    not be rendered at all. Note that if you uncheck the layer in Tiled, it won''t
    be displayed, but you will also not have access to its tiles and tile properties
    either.


    If you run the project now, you''ll see a tilemap just like in [Figure 10–10](#Chapter10.html#fig_10_10).


    ![images](images/1010.jpg)


    **Figure 10–10.** *The orthogonal tilemap in the iPhone Simulator*


    Right now you can''t do anything with the tilemap, but I''d like to change that.
    Moving on to the TileMap02 project, I''d like to be able to find the `isWater`
    tiles. I''ve added the `ccTouchesBegan` method, as shown in [Listing 10–1](#Chapter10.html#list_10_1),
    in order to determine the tile that the player is touching.


    **Listing 10–1.** *Determining a Tile''s Properties*


    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    CCNode* node = [self getChildByTag:TileMapNode];`

    `    NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");`

    `    CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;`


    `    // Get the position in tile coordinates from the touch location`

    `    CGPoint touchLocation = [self locationFromTouch:[touches anyObject]];`

    `    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];`


    `    // Check if the touch was on water (e.g., tiles with isWater property)`

    `    bool isTouchOnWater = NO;`


    `    CCTMXLayer* eventLayer = [tileMap layerNamed:@"GameEventLayer"];`

    `    int tileGID = [eventLayer tileGIDAt:tilePos];`


    `    if (tileGID != 0)`

    `    {`

    `        NSDictionary* properties = [tileMap propertiesForGID:tileGID];`

    `        if (properties)`

    `        {`

    `            NSString* isWaterProperty = [properties valueForKey:@"isWater"];`

    `            isTouchOnWater = ([isWaterProperty boolValue] == YES);`

    `        }`

    `    }`


    `    // Decide what to do depending on where the touch was`

    `    if (isTouchOnWater)`

    `    {`

    `        [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];`

    `    }`

    `    else`

    `    {`

    `        // Get the winter layer and toggle its visibility`

    `        CCTMXLayer* winterLayer = [tileMap layerNamed:@"WinterLayer"];`

    `        winterLayer.visible = !winterLayer.visible;`

    `    }`

    `}`


    The `CCTMXTiledMap` is retrieved as usual. The location of the touch is first
    converted into screen coordinates and then used to retrieve the `tilePos` containing
    the indices into the tilemap at that specific screen location. I''ll get to the
    `tilePosFromLocation` method in a minute. For now, just know that it returns the
    index of the touched tile.'
