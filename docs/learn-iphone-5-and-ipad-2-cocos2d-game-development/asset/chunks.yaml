  trans: '

    # 混合使用 Cocoa Touch 与 cocos2d 的局限性


    在设计混合使用 Cocoa Touch 视图与 cocos2d 视图的应用或游戏时，你需要注意一些局限性。最明显的一点是，UIKit 视图并非为高性能而设计，因此在快节奏的游戏过程中使用
    UIKit 视图，你可能会注意到性能下降。


    例如，在游戏过程中使用 `CCLabelBMFont` 显示分数比使用 `UITextField` 更有利于性能。同样，你应该优先使用 `CCMenu` 作为游戏内的暂停菜单按钮，而不是使用
    `UIButton`。不过，在菜单界面中，这些性能考量通常不是问题，而且你还会发现，能够使用 Interface Builder 创建菜单界面可以提升工作效率。


    在支持自动旋转的 cocos2d 应用中混合使用 UIKit 视图也会影响性能，在第一代和第二代设备上影响尤为严重。即使不渲染任何内容，仅仅允许所有视图可能被旋转，就可能导致你的帧率立即下降到
    60 fps 以下！这意味着你可能希望专门针对旧设备禁用自动旋转支持，而这正是 cocos2d 项目模板中的默认设置。


    你还应该注意，任何 UIKit 视图要么完全位于整个 cocos2d 视图的前面，要么完全位于其后面。你不能让一个 UIKit 视图位于 cocos2d 场景部分精灵、标签、效果等的前面，同时又位于其他
    cocos2d 精灵、标签、效果或其他节点的后面。换句话说，你不能将 UIKit 视图"夹"在两个或更多 cocos2d 节点之间。


    然而，你可以反过来做，尽管有一些限制。你可以"夹"住 cocos2d 视图：背景中的 UIKit 视图，然后是透明的 cocos2d 视图，再然后是前景中的更多
    UIKit 视图。这种方法只需要在设置视图层次结构和使 cocos2d 视图透明方面多做一些工作。想象一下，在背景中播放全动态视频，在其上绘制 cocos2d
    精灵，而用户界面的其余部分由 UIKit 视图构成。


    但是触摸输入仍然是个问题：要么 UIKit 视图（而非 cocos2d 视图）会接收输入，要么添加到 cocos2d 视图的那些 UIKit 视图以及 cocos2d
    视图本身会接收输入，但背景中的视图不会。这与 cocos2d 视图占据整个屏幕，从而接收屏幕上所有触摸事件有关。因此，你需要编写额外的代码来处理 cocos2d
    视图上的触摸，然后决定 cocos2d 视图是否应该转发这些触摸，例如，如果用户没有触摸当前屏幕上显示的任何 cocos2d 精灵。


    让所有视图都能接收输入是可能的，我将在本章后面为你提供一个基本解决方案。但你需要根据自身需求对其进行改进和适配。根据你的需求，为了完全支持位于 cocos2d
    视图前方和后方的 UIKit 视图，并让所有视图都能正确响应触摸输入，所需的代码更改实际上可能相当庞大且具有挑战性。


    ## Cocoa Touch 与 cocos2d 有何不同？


    让我们来看看 Cocoa Touch 编程与使用 cocos2d 的主要区别。一个区别是 Cocoa Touch 应用中常见的模型-视图-控制器模式，但在
    cocos2d 中基本上缺失了。此外，你还必须考虑 cocos2d 的 OpenGL ES 视图所带来的差异，因为它的一些行为与常规的 `UIView` 不同。


    ### 模型-视图-控制器模式


    对于有 Cocoa Touch 背景的程序员来说，第一个也是最大的区别可能是 cocos2d 并不严格遵守模型-视图-控制器（MVC）模式，而该模式在 Cocoa
    和 Cocoa Touch 中非常普遍。


    MVC 模式将编程任务分为三个部分：模型、视图和控制器。模型包含在后台运行的任何算法，并维护世界的状态；本质上，模型代表着知识。视图是模型的可视化表示，并基于模型数据渲染世界的当前状态。而控制器主要为用户提供通过用户输入与世界交互的方式，但也用于响应其他外部事件，例如通过网络接收数据。模型、视图和控制器各自是独立的类，旨在将用户界面与业务（或游戏）逻辑解耦。


    在游戏中可以应用 MVC 模式，并且许多人曾尝试在 cocos2d 中这样做。如果你搜索 *cocos2d mvc*，你会找到大量关于此主题的文章，我个人最喜欢的是
    Bartek Wilczyński 的这两篇文章：


    `http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-game`

    `http://xperienced.com.pl/blog/how-to-implement-mvc-pattern-in-cocos2d-gamepart-2`


    对于 Cocoa Touch 程序员来说，cocos2d 不遵循 MVC 模式可能是一种文化冲击。但你可以解决这个问题。另一方面，作为 cocos2d 程序员，你可能甚至不会注意到自己正在使用
    MVC，因为整个 Cocoa Touch 框架都是为 MVC 模式设计的。你会愉快地使用提供给您的控制器和视图，并且会发现将逻辑和算法（模型）添加到控制器或视图（或两者）中都没有问题。这同样是一种有效的模式，尽管耦合度更高，并且在大型项目中维护性较差。


    ### Cocos2d 的视图使用 OpenGL ES


    cocos2d 并不依赖 UIKit 来显示其图形，而是创建了一个 OpenGL ES 视图。这意味着 cocos2d 可以更直接地访问图形资源，并且能更快地渲染其视图。另一方面，它也失去了一些
    UIKit 应用的自动功能，比如自动旋转。


    当然，在幕后，所有 UIKit 视图也是由 OpenGL ES 渲染的；只是为了实现图形用户界面，后台执行了更多操作，而这些操作对于制作游戏来说基本上是性能浪费。你可能还记得早期那些完全使用
    UIKit、Core Graphics 和 Core Animation 编写的游戏吗？如果不记得，那对你来说是件好事。它们通常运行缓慢且反应迟钝。


    Cocoa Touch 和 cocos2d 之间一个显著的区别是处理自动旋转的方式。在本章后面，你将了解到 cocos2d 如何实现自动旋转来旋转 OpenGL
    ES 内容和 UIKit 视图。幸运的是，对于你我来说，这个问题最终被 cocos2d 引擎解决了，因此你可以同时旋转 UIKit 和 cocos2d 视图，但存在一些性能缺陷。在某些情况下，你仍然需要考虑
    UIKit 和 OpenGL ES 使用的坐标系差异，尤其是在视图被旋转时。


    另外，由于 cocos2d 被设计为直接与图形硬件交互，它使用自己的层次结构来显示图形元素。在 cocos2d 中，这是 `CCNode` 层次结构，你可以将任何基于
    `CCNode` 的类添加到任何其他 `CCNode` 中，并以 `CCScene` 作为该层次结构中的第一个元素。而 UIKit 框架则使用视图层次结构，你将基于
    `UIView` 的类添加到另一个类中，通常以 `UIWindow` 作为最顶层的元素。这两种视图层次结构是不兼容的，因此你不能将 `UIView` 添加到
    `CCNode` 中，反之亦然。当你使用 `CCTransitionScene` 从一个 `CCScene` 切换到另一个 `CCScene` 时，这一点尤为明显。当
    cocos2d 节点都在移动时，UIKit 视图将保持固定不动，除非你单独移动它们并与 cocos2d 动画同步。实际上，最好是首先避免出现这种情况。

    '
- fmt: "### Alert: Your First UIKit View in cocos2d\n\nThe simplest and most straightforward\
    \ example for using a UIKit view with cocos2d is found in the example project\
    \ `CocosWithCocoa01`. It displays a `UIAlertView` on top of the cocos2d scene\
    \ created from the default cocos2d project template. To re-create the project\
    \ from scratch, open Xcode and go to **File > New > New Project** to bring up\
    \ the New Project dialog. In that dialog, select `cocos2d` under the iOS list\
    \ and create the `cocos2d` project.\n\nLet’s modify the `HelloWorldLayer` class\
    \ to display a `UIAlertView`. The interface in `HelloWorldLayer.h` needs only\
    \ one small addition; namely, the `HelloWorldLayer` class needs to support the\
    \ `UIAlertViewDelegate` protocol:\n\n```\n@interface HelloWorldLayer : CCLayer\
    \ <UIAlertViewDelegate>\n{\n}\n```\n\nAll other changes are made to the `HelloWorldLayer.m`\
    \ implementation file. At the top, you first need to declare the `PrivateMethods`\
    \ interface to avoid the “may not respond to selector” compiler warning where\
    \ the `addSomeCocoaTouch` method is called before the actual implementation of\
    \ the method:\n\n```\n#import \"HelloWorldLayer.h\"\n\n@interface HelloWorldLayer\
    \ (PrivateMethods)\n-(void) addSomeCocoaTouch;\n@end\n```\n\nThe `init` method\
    \ of the “Hello World” sample is modified to use a uniformly colored background,\
    \ just so you see the visual effect of the `UIAlertView`, and to call the `addSomeCocoaTouch`\
    \ method. It still retains the Hello World `CCLabelTTF`, but I moved it from its\
    \ center position:\n\n```\n-(id) init\n{\n    if ((self=[super init]))\n    {\n\
    \        // color background to make the UIAlertView \"darkening\" effect noticeable\n\
    \        glClearColor(0.1f, 0.3f, 0.7f, 1.0f);\n\n        CCLabelTTF* label =\
    \ [CCLabelTTF labelWithString:@\"Hello Cocos2D!\"\n                          \
    \                     fontName:@\"Marker Felt\"\n                            \
    \                   fontSize:54];\n        CGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n        label.position = CGPointMake(size.width / 2, size.height\
    \ / 6);\n        [self addChild:label];\n\n        [self showHelloWorldAlertView];\n\
    \    }\n    return self;\n}\n```\n\nThe `addSomeCocoaTouch` allocates a `UIAlertView`\
    \ with a title, two buttons, and the message text “Hello Cocoa Touch!” For a delegate,\
    \ you’ll be using `self` now that you’ve added the `UIAlertViewDelegate` protocol\
    \ to the `HelloWorldLayer` class.\n\nFinally, you can show the alert view. Since\
    \ showing the alert view retains the alert view behind the scenes, you can immediately\
    \ send the `release` message to the `alertView` without risking a crash. [Listing\
    \ 15–1](#Chapter15.html#list_15_1) shows the resulting code.\n\n**Listing 15–1.**\
    \ *A UIAlertView Is Created and Added to cocos2d’s openGLView (EAGLView Class)*\n\
    \n```\n-(void) showHelloWorldAlertView\n{\n    UIAlertView* alertView = [[UIAlertView\
    \ alloc] initWithTitle:@\"UIAlertView Example\"\n                            \
    \                            message:@\"Hello Cocoa Touch!\"\n               \
    \                                        delegate:self\n                     \
    \                         cancelButtonTitle:@\"Well\"\n                      \
    \                        otherButtonTitles:@\"Done\", nil];\n\n    [alertView\
    \ show];\n    [alertView release];\n}\n```\n\n**TIP:** It is not necessary to\
    \ add a `UIAlertView` to another view. This makes it very straightforward to create\
    \ `UIAlertView` messages. The only drawback is that `UIAlertView` will always\
    \ be drawn above everything else, and it will swallow all touches as long as it\
    \ is displayed. No amount of sending views to back or reordering the view hierarchy\
    \ will change that. If you need a simple solution for a pause menu, `UIAlertView`\
    \ is your cheap and dirty friend, especially during development. But keep in mind\
    \ that while touches are disabled, you’ll still be receiving acceleration events,\
    \ which you’ll have to turn off or ignore while the `UIAlertView` is shown.\n\n\
    The `HelloWorldLayer` class will receive all events from the `UIAlertView` and\
    \ can respond to them by simply implementing one or more of the `UIAlertViewDelegate`\
    \ methods. For this example, I decided to respond to the `didDismissWithButtonIndex`\
    \ message (see [Listing 15–2](#Chapter15.html#list_15_2)), which is sent whenever\
    \ the user taps a button, which always dismisses the `UIAlertView` regardless\
    \ of which button was tapped. Another `CCLabelTTF`, with a string and color that\
    \ depend on the `buttonIndex`, is added to the cocos2d scene at a random position\
    \ every time the alert view is dismissed.\n\n**Listing 15–2.** *Responding to\
    \ the UIAlertView didDismissWithButtonIndex Message*\n\n```\n-(void) alertView:(UIAlertView*)alertView\n\
    \    didDismissWithButtonIndex:(NSInteger)buttonIndex\n{\n    NSString* message\
    \ = @\"Well\";\n    ccColor3B labelColor = ccYELLOW;\n    if (buttonIndex == 1)\n\
    \    {\n        message = @\"Done\";\n        labelColor = ccGREEN;\n    }\n\n\
    \    CCLabelTTF* label = [CCLabelTTF labelWithString:message\n               \
    \                            fontName:@\"Arial\"\n                           \
    \                fontSize:32];\n\n    CGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n    label.position = CGPointMake(CCRANDOM_0_1() * size.width,\n \
    \       CCRANDOM_0_1() * size.height);\n    label.color = labelColor;\n    [self\
    \ addChild:label];\n\n    // keep the alert view alive by bringing it up again\n\
    \    [self showHelloWorldAlertView];\n}\n```\n\nThe `addSomeCocoaTouch` is called\
    \ again whenever the alert view has been dismissed, so the alert view will keep\
    \ showing up again, allowing you to add another label to the cocos2d view. You\
    \ can see the result in [Figure 15–1](#Chapter15.html#fig_15_1).\n\n![images](images/1501.jpg)\n\
    \n**Figure 15–1.** *A UIAlertView is displayed over the cocos2d view.*\n\n###\
    \ Embedding UIKit Views in a cocos2d App\n\nNext you’ll be embedding more commonly\
    \ used UIKit views in cocos2d. One of the simplest and most common is the `UITextField`,\
    \ which you’ll add on top of cocos2d, as you’ve done before. It gets more complicated\
    \ when you move it to the background of cocos2d, which requires making the cocos2d\
    \ view transparent.\n\nFinally, I’ll show you how you can add your Interface Builder\
    \ views into a cocos2d app, instead of creating the views programmatically, and\
    \ I’ll also go into detail on how the `RootViewController` class and autorotation\
    \ works."
  raw: '### Alert: Your First UIKit View in cocos2d


    The simplest and most straightforward example for using a UIKit view with cocos2d
    is found in the example project CocosWithCocoa01\. It displays a `UIAlertView`
    on top of the cocos2d scene created from the default cocos2d project template.
    To re-create the project from scratch, open Xcode and go to **File ![image](images/U001.jpg)
    New ![image](images/U001.jpg) New Project** to bring up the New Project dialog.
    In that dialog, select `cocos2d` under the iOS list and create the `cocos2d` project.


    Let’s modify the `HelloWorldLayer` class to display a `UIAlertView`. The interface
    in HelloWorldLayer.hneeds only one small addition; namely, the `HelloWorldLayer`
    class needs to support the `UIAlertViewDelegate` protocol:


    `@interface HelloWorldLayer : CCLayer` **`<UIAlertViewDelegate>`**

    `{`

    `}`


    All other changes are made to the HelloWorldLayer.m implementation file. At the
    top, you first need to declare the `PrivateMethods` interface to avoid the “may
    not respond to selector” compiler warning where the `addSomeCocoaTouch` method
    is called before the actual implementation of the method:


    `#import "HelloWorldLayer.h"`


    `@interface HelloWorldLayer (PrivateMethods)`

    `-(void) addSomeCocoaTouch;`

    `@end`


    The `init` method of the “Hello World” sample is modified to use a uniformly colored
    background, just so you see the visual effect of the `UIAlertView`, and to call
    the `addSomeCocoaTouch` method. It still retains the Hello World `CCLabelTTF`,
    but I moved it from its center position:


    `-(id) init`

    `{`

    `    if ((self=[super init]))`

    `    {`

    `        // color background to make the UIAlertView "darkening" effect noticeable`

    `        glClearColor(0.1f, 0.3f, 0.7f, 1.0f);`


    `        CCLabelTTF* label = [CCLabelTTF labelWithString:@"Hello Cocos2D!"`

    `                                               fontName:@"Marker Felt"`

    `                                               fontSize:54];`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`

    `        label.position = CGPointMake(size.width / 2, size.height / 6);`

    `        [self addChild:label];`


    `        [self showHelloWorldAlertView];`

    `    }`

    `    return self;`

    `}`


    The `addSomeCocoaTouch` allocates a `UIAlertView` with a title, two buttons, and
    the message text “Hello Cocoa Touch!” For a delegate, you’ll be using `self` now
    that you’ve added the `UIAlertViewDelegate` protocol to the `HelloWorldLayer`
    class.


    Finally, you can show the alert view. Since showing the alert view retains the
    alert view behind the scenes, you can immediately send the release message to
    the `alertView` without risking a crash. [Listing 15–1](#Chapter15.html#list_15_1)
    shows the resulting code.


    **Listing 15–1.** *A UIAlertView Is Created and Added to cocos2d’s openGLView
    (EAGLView Class)*


    `-(void) showHelloWorldAlertView`

    `{`

    `    UIAlertView* alertView = [[UIAlertView alloc] initWithTitle:@"UIAlertView
    Example"`

    `                                                        message:@"Hello Cocoa
    Touch!"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"Well"`

    `                                              otherButtonTitles:@"Done", nil];`


    `    [alertView show];`

    `    [alertView release];`

    `}`


    **TIP:** It is not necessary to add a `UIAlertView` to another view. This makes
    it very straightforward to create `UIAlertView` messages. The only drawback is
    that `UIAlertView` will always be drawn above everything else, and it will swallow
    all touches as long as it is displayed. No amount of sending views to back or
    reordering the view hierarchy will change that. If you need a simple solution
    for a pause menu, `UIAlertView` is your cheap and dirty friend, especially during
    development. But keep in mind that while touches are disabled, you’ll still be
    receiving acceleration events, which you’ll have to turn off or ignore while the
    `UIAlertView` is shown.


    The `HelloWorldLayer` class will receive all events from the `UIAlertView` and
    can respond to them by simply implementing one or more of the `UIAlertViewDelegate`
    methods. For this example, I decided to respond to the `didDismissWithButtonIndex`
    message (see [Listing 15–2](#Chapter15.html#list_15_2)), which is sent whenever
    the user taps a button, which always dismisses the `UIAlertView` regardless of
    which button was tapped. Another `CCLabelTTF`, with a string and color that depend
    on the `buttonIndex`, is added to the cocos2d scene at a random position every
    time the alert view is dismissed.


    **Listing 15–2.** *Responding to the UIAlertView didDismissWithButtonIndex Message*


    `-(void) alertView:(UIAlertView*)alertView`![image](images/U002.jpg)

    `    didDismissWithButtonIndex:(NSInteger)buttonIndex`

    `{`

    `    NSString* message = @"Well";`

    `    ccColor3B labelColor = ccYELLOW;`

    `    if (buttonIndex == 1)`

    `    {`

    `        message = @"Done";`

    `        labelColor = ccGREEN;`

    `    }`


    `    CCLabelTTF* label = [CCLabelTTF labelWithString:message`

    `                                           fontName:@"Arial"`

    `                                           fontSize:32];`


    `    CGSize size = [[CCDirector sharedDirector] winSize];`

    `    label.position = CGPointMake(CCRANDOM_0_1() * size.width,`![image](images/U002.jpg)

    `        CCRANDOM_0_1() * size.height);`

    `    label.color = labelColor;`

    `    [self addChild:label];`


    `    // keep the alert view alive by bringing it up again`

    `    [self showHelloWorldAlertView];`

    `}`


    The `addSomeCocoaTouch` is called again whenever the alert view has been dismissed,
    so the alert view will keep showing up again, allowing you to add another label
    to the cocos2d view. You can see the result in [Figure 15–1](#Chapter15.html#fig_15_1).


    ![images](images/1501.jpg)


    **Figure 15–1.** *A UIAlertView is displayed over the cocos2d view.*


    ### Embedding UIKit Views in a cocos2d App


    Next you’ll be embedding more commonly used UIKit views in cocos2d. One of the
    simplest and most common is the `UITextField`, which you’ll add on top of cocos2d,
    as you’ve done before. It gets more complicated when you move it to the background
    of cocos2d, which requires making the cocos2d view transparent.


    Finally, I’ll show you how you can add your Interface Builder views into a cocos2d
    app, instead of creating the views programmatically, and I’ll also go into detail
    on how the `RootViewController` class and autorotation works.'
  trans: "\n### 提示：在 cocos2d 中使用你的第一个 UIKit 视图\n\n在`CocosWithCocoa01`示例项目中，可以找到使用\
    \ UIKit 视图与 cocos2d 结合的最简单、最直接的例子。它会在由 cocos2d 默认项目模板创建的场景之上显示一个`UIAlertView`。若要从头重新创建该项目，请打开\
    \ Xcode 并进入**File > New > New Project**，调出新建项目对话框。在该对话框中，从 iOS 列表下选择`cocos2d`，然后创建`cocos2d`项目。\n\
    \n现在让我们修改`HelloWorldLayer`类，使其能够显示一个`UIAlertView`。`HelloWorldLayer.h`中的接口只需做一处小改动：即`HelloWorldLayer`类需要支持`UIAlertViewDelegate`协议：\n\
    \n```\n@interface HelloWorldLayer : CCLayer <UIAlertViewDelegate>\n{\n}\n```\n\
    \n所有其他改动都在`HelloWorldLayer.m`实现文件中进行。首先，你需要在文件顶部声明`PrivateMethods`接口，以避免在`addSomeCocoaTouch`方法的实际实现之前调用它时出现“may\
    \ not respond to selector”编译器警告：\n\n```\n#import \"HelloWorldLayer.h\"\n\n@interface\
    \ HelloWorldLayer (PrivateMethods)\n-(void) addSomeCocoaTouch;\n@end\n```\n\n\
    “Hello World”示例中的`init`方法被修改为使用统一颜色的背景，以便让你看到`UIAlertView`的视觉效果，同时还会调用`addSomeCocoaTouch`方法。它仍然保留了\
    \ Hello World 的`CCLabelTTF`，但我将其从中心位置移开了：\n\n```\n-(id) init\n{\n    if ((self=[super\
    \ init]))\n    {\n        // 设置彩色背景，使 UIAlertView 的“变暗”效果更明显\n        glClearColor(0.1f,\
    \ 0.3f, 0.7f, 1.0f);\n\n        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
    Hello Cocos2D!\"\n                                               fontName:@\"\
    Marker Felt\"\n                                               fontSize:54];\n\
    \        CGSize size = [[CCDirector sharedDirector] winSize];\n        label.position\
    \ = CGPointMake(size.width / 2, size.height / 6);\n        [self addChild:label];\n\
    \n        [self showHelloWorldAlertView];\n    }\n    return self;\n}\n```\n\n\
    `addSomeCocoaTouch`方法会分配一个带有标题、两个按钮以及消息文本“Hello Cocoa Touch!”的`UIAlertView`。由于你已经在`HelloWorldLayer`类中添加了`UIAlertViewDelegate`协议，现在可以将`self`作为委托使用。\n\
    \n最后，你可以显示这个警告视图。由于显示警告视图时它会在后台被保留，因此你可以立即向`alertView`发送`release`消息，而不会导致崩溃。结果代码如列表\
    \ 15-1 所示。\n\n**列表 15-1.** *创建 UIAlertView 并将其添加到 cocos2d 的 openGLView（EAGLView\
    \ 类）中*\n\n```\n-(void) showHelloWorldAlertView\n{\n    UIAlertView* alertView\
    \ = [[UIAlertView alloc] initWithTitle:@\"UIAlertView 示例\"\n                 \
    \                                       message:@\"你好，Cocoa Touch!\"\n       \
    \                                                delegate:self\n             \
    \                                 cancelButtonTitle:@\"好的\"\n                \
    \                              otherButtonTitles:@\"完成\", nil];\n\n    [alertView\
    \ show];\n    [alertView release];\n}\n```\n\n**提示：** 无需将`UIAlertView`添加到另一个视图。这使得创建`UIAlertView`消息变得非常简单。唯一的缺点是`UIAlertView`始终会被绘制在所有内容之上，并且在显示期间它会拦截所有触摸事件。无论你将视图发送到后方或重新排序视图层次结构都无法改变这一点。如果你需要一个简单的暂停菜单解决方案，`UIAlertView`是你的廉价而粗暴的好帮手，尤其是在开发阶段。但请记住，虽然触摸被禁用，但你仍然会收到加速事件，因此在显示`UIAlertView`时，你需要关闭或忽略这些事件。\n\
    \n`HelloWorldLayer`类将接收来自`UIAlertView`的所有事件，并且只需实现一个或多个`UIAlertViewDelegate`方法即可对这些事件做出响应。在本例中，我决定响应`didDismissWithButtonIndex`消息（参见列表\
    \ 15-2），每当用户点击按钮时，无论点击的是哪个按钮，都会发送该消息并关闭`UIAlertView`。每次警告视图被关闭时，一个新的`CCLabelTTF`（其字符串和颜色取决于`buttonIndex`）会以随机位置添加到\
    \ cocos2d 场景中。\n\n**列表 15-2.** *响应 UIAlertView 的 didDismissWithButtonIndex 消息*\n\
    \n```\n-(void) alertView:(UIAlertView*)alertView\n    didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    {\n    NSString* message = @\"好的\";\n    ccColor3B labelColor = ccYELLOW;\n  \
    \  if (buttonIndex == 1)\n    {\n        message = @\"完成\";\n        labelColor\
    \ = ccGREEN;\n    }\n\n    CCLabelTTF* label = [CCLabelTTF labelWithString:message\n\
    \                                           fontName:@\"Arial\"\n            \
    \                               fontSize:32];\n\n    CGSize size = [[CCDirector\
    \ sharedDirector] winSize];\n    label.position = CGPointMake(CCRANDOM_0_1() *\
    \ size.width,\n        CCRANDOM_0_1() * size.height);\n    label.color = labelColor;\n\
    \    [self addChild:label];\n\n    // 保持警告视图存活，再次显示它\n    [self showHelloWorldAlertView];\n\
    }\n```\n\n每当警告视图被关闭时，`addSomeCocoaTouch`会被再次调用，因此警告视图会持续出现，让你可以在 cocos2d 视图中添加另一个标签。你可以在图\
    \ 15-1 中看到结果。\n\n![images](img/1501.jpg)\n\n**图 15-1.** *在 cocos2d 视图上显示 UIAlertView\
    \ 的效果*\n\n### 在 cocos2d 应用中嵌入 UIKit 视图\n\n接下来，你将在 cocos2d 中嵌入更常用的 UIKit 视图。最简单、最常见的例子之一是`UITextField`，你将像之前那样将其添加到\
    \ cocos2d 的顶层。当你需要将其移动到 cocos2d 的背景层时，情况会变得更复杂，因为这需要让 cocos2d 视图变为透明。\n\n最后，我将向你展示如何将\
    \ Interface Builder 视图添加到 cocos2d 应用中，而不是以编程方式创建视图，并且还会详细解释`RootViewController`类以及自动旋转（autorotation）的工作原理。\n"
- fmt: '#### Adding Views in Front of the cocos2d View


    In the `CocosWithCocoa03` project, I’ve added `UITextField` views on top of the
    cocos2d view. The `UITextField` is a simple text entry box that automatically
    brings up the iPhone keyboard when you tap it. I removed the `UIAlertView` from
    the `addSomeCocoaTouch` method in the `HelloWorldLayer` class implementation and
    added the `UITextField`:


    ```

    -(void) addSomeCocoaTouch

    {

        // regular text field with rounded corners

        UITextField* textField = [[UITextField alloc] initWithFrame:

            CGRectMake(40, 20, 200, 24)];

        textField.text = @"Regular UITextField";

        textField.borderStyle = UITextBorderStyleRoundedRect;


        // get the cocos2d view (it''s the EAGLView class which inherits from UIView)

        UIView* glView = [CCDirector sharedDirector].openGLView;


        // add the text field view to the cocos2d EAGLView

        [glView addSubview:textField];


        // after that it’s safe to release the textField

        [textField release];

    }

    ```


    It’s important to note that the process of programmatically creating `UIView`
    classes is quite similar to how you create the `UITextField`. You pick the desired
    class derived from `UIView` and then call `alloc` and `initWithFrame`. Most `UIView`
    controls can be created by just providing a frame rectangle. However, you will
    usually have to set some properties afterward to configure the control; in this
    example, I’ve set the `textField` to use the rounded style as well as setting
    the initial text.


    **CAUTION:** The frame rectangle is where many programmers first notice the different
    coordinate systems of cocos2d nodes and `UIView` classes. Whereas in cocos2d the
    origin (0, 0) is at the lower-left corner of the screen, the origin for `UIView`
    classes is at the upper-left corner of the screen. This means that the `UITextField`
    is actually 20 pixels below the top border of the screen and not 20 pixels above
    the bottom border. You will have to keep this in mind when working with `UIView`
    classes.


    Since the `UITextField`, like most other `UIView` classes, does not have a show
    method, you need some other way to attach it to the view hierarchy. Since the
    cocos2d view is the `EAGLView` class, which in turn inherits from `UIView`, you
    can simply add the `UITextField` to the cocos2d `glView` as a subview. The `CCDirector`
    has a `openGLView` property, which allows you to access the cocos2d view and then
    call the `addSubview` method on it to add the `textField`. By default this adds
    the view on top of the cocos2d view.


    If you try this now, you’ll see a text field on your scene, and when you tap the
    text field, the iPhone keyboard comes up, and you can start editing text. No extra
    code needed. Except, the keyboard won’t go away anymore.


    This is by design because the Return key might be a valid key to start a new line
    rather than to stop editing. So, you need some way to dismiss the keyboard. To
    do so, open the `HelloWorldLayer` header file and replace the `UIAlertViewDelegate`
    protocol with the `UITextFieldDelegate` protocol like so:


    ```

    @interface HelloWorldLayer : CCLayer <UITextFieldDelegate>

    {

    }

    ```


    Doing so allows the `HelloWorldLayer` class to respond to `UITextFieldDelegate`
    methods like `textFieldShouldReturn`. For this to work, you must assign the `HelloWorldLayer`
    class instance to the `UITextField` by assigning `self` to the `delegate` property.
    Add the highlighted line at the end of the initialization block of the `UITextField`:


    ```

    // regular text field with rounded corners

    UITextField* textField = [[UITextField alloc] initWithFrame:

        CGRectMake(40, 20, 200, 24)];

    textField.text = @"  Regular UITextField";

    textField.borderStyle = UITextBorderStyleRoundedRect;

    textField.delegate = self;

    ```


    Most UIKit views have this delegate method and an accompanying delegate protocol.
    So, if you ever wonder how you can respond to events of a certain `UIView`, it’s
    done by implementing the class’s delegate protocol and responding to the appropriate
    message. Of course, one very common and repeated mistake you’ll make (I know I
    do) is to forget to actually assign the delegate or assign the correct one. So,
    whenever a delegate method isn’t being called, you should check whether you actually
    set the (right) class instance as the view’s delegate.


    In our case, the `textFieldShouldReturn` message of the `UITextFieldDelegate`
    protocol is sent whenever the user taps the Return key on the iPhone keyboard:


    ```

    -(BOOL) textFieldShouldReturn:(UITextField *)textField

    {

        // dismiss the keyboard

        [textField resignFirstResponder];


        // if the text is empty, remove the text field

        if ([textField.text length] == 0)

        {

            [textField removeFromSuperview];

        }


        return YES;

    }

    ```


    By sending the `resignFirstResponder` message to the `textField`, the keyboard
    will be dismissed. Simply as an exercise on how to remove a `UIView` from the
    cocos2d view, I’ve added a condition that sends the `removeFromSuperview` message
    to the `textField` if the `textField` is empty when the user presses Return. Notice
    how this entire method does not care which `UITextField` is sending the message,
    nor does it care where in the view hierarchy the `textField` was added. You’ll
    take advantage of that next by adding another `UITextField`.


    If you try what you have so far, you’ll notice that the keyboard is dismissed
    when you press Return, and if you have deleted all characters from the text field,
    the entire text field will vanish.


    **TIP:** Keep in mind that if it is possible that your scene changes while the
    user is editing text in a `UITextField`, you would have to manually send the `resignFirstResponder`
    message to all text fields in order to dismiss the keyboard. Otherwise, the keyboard
    may remain visible during and after the scene change, and the user won’t be able
    to dismiss it anymore. To avoid this situation, it is preferable to also respond
    to the `textFieldDidBeginEditing` message and use that to temporarily disable
    any buttons or events that could change the current scene. Then reenable the buttons
    or events when you receive the `textFieldShouldReturn` message.'
