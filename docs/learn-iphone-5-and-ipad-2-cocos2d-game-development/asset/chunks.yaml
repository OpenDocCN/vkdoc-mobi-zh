- fmt: '# Creating Your App in iTunes Connect


    The very first step is to log in with your Apple ID on the iTunes Connect web
    site: [`http://itunesconnect.apple.com`](http://itunesconnect.apple.com).


    Then you want to add a new application, even if it doesn''t exist yet. For most
    fields that iTunes Connect asks you to fill out, you can enter bogus information.
    There are only two settings that you have to get right. The first is, obviously,
    to enable Game Center when iTunes Connect asks you whether the new application
    should support Game Center.


    The other is to enter a Bundle ID (also referred to as Bundle Identifier) that
    matches the one used in the Xcode project. Since you don''t have an Xcode project
    yet, you are free to choose any Bundle ID you want. Apple recommends using reverse
    domain names for Bundle IDs with the app''s name appended at the end. The catch
    is that the Bundle ID needs to be unique across all App Store apps, and there
    are tens of thousands of them.


    For the book''s example, I''ve chosen `com.learn-cocos2d` to be the app''s Bundle
    ID. Since this Bundle ID is now taken by me, you will have to use your own Bundle
    ID. If you want, you can simply suffix it with a string of your choosing or choose
    an entirely new string. Just remember to use your own Bundle ID whenever I refer
    to the `com.learn-cocos2d` Bundle ID.


    For a detailed description of how to create a new app and how to set up Game Center
    for an app on iTunes Connect, please refer to Apple''s iTunes Connect Developer
    Guide: [`http://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](http://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf).


    Specifically, the section labeled Game Center explains in great detail how to
    manage the Game Center features on iTunes Connect.


    # Setting Up Leaderboards and Achievements


    For the most part, after enabling Game Center for an app, what you''ll be doing
    on iTunes Connect is setting up one or more leaderboards, which will hold your
    players'' scores or times, as well as setting up a number of achievements that
    players can unlock while playing your game.


    To access the Game Center leaderboards and achievements, you refer to them by
    ID. For leaderboards, you should note the leaderboard category ID strings, and
    for achievements the achievement ID strings, to be able to query and update the
    correct leaderboards and achievements.


    For the purpose of this chapter, I have set up one leaderboard with a score format
    of Elapsed Time and a leaderboard category ID of `Playtime`. For achievements
    I''ve entered one achievement, with an achievement ID of `PlayedForTenSeconds`,
    that grants the player five achievement points.


    Feel free to set up additional leaderboards and achievements, but keep in mind
    that the example code in this chapter relies on at least one leaderboard with
    a category ID of `Playtime` and one achievement with an achievement ID of `PlayedForTenSeconds`
    to exist.


    # Creating a Cocos2d Xcode Project


    Now it is time to create the actual Xcode project. You can start the project from
    any cocos2d template—for example, the cocos2d HelloWorld application template.
    You can also use an already existing project, but you may have to upgrade to cocos2d
    v1.0 if your project was started with a cocos2d version prior to v0.99.5.


    You can determine which version of cocos2d your project is using in three ways.
    First, if your project is built and you run it, one of the first lines in the
    Debugger Console window will read something like this:


    ```

    2010-10-07 15:33:58.363 Tilemap[1046:207] cocos2d: cocos2d v1.0.1

    ```


    Or, you can use the global method `cocos2dVersion()` to print it out yourself—for
    example, using `CCLOG` in this way:


    ```

    CCLOG(@"%@", cocos2dVersion());

    ```


    The final option is to simply look it up. In your project, in the group containing
    the cocos2d sources, locate the file `cocos2d.m` and open it. It contains the
    version string in plain text:


    ```

    static NSString *version = @"cocos2d v1.0.1";

    ```


    If you are facing the problem of having to upgrade cocos2d from a previous version
    in an existing project, please refer to this short tutorial on upgrading cocos2d
    in an existing project with Xcode 4: [`www.learn-cocos2d.com/2011/05/update-cocos2d-iphone-existing-project`](http://www.learn-cocos2d.com/2011/05/update-cocos2d-iphone-existing-project).


    **TIP:** If you grow tired of the error-prone and tedious upgrade process, then
    you might be interested in Kobold2D, which is discussed in [Chapter 16](#Chapter16.html#ch16)
    and available from [`www.kobold2d.org`](http://www.kobold2d.org). With Kobold2D,
    upgrading the cocos2d version used in a project becomes as easy as moving the
    project to a different folder and adding it to the Kobold2D workspace.


    Starting with version 0.99.5, the `RootViewController` class, which is derived
    from `UIViewController`, became part of every cocos2d project. Game Center needs
    a `UIViewController` to be able to show its built-in UIKit user interface, and
    having the `RootViewController` class available makes Game Center integration
    a lot easier. The `GameKitHelper` class will make use of the `RootViewController`
    class. And in case you''re wondering, another benefit of the `RootViewController`
    class is that it allows you to enable autorotation in your app. You''ll learn
    more about autorotation in [Chapters 15](#Chapter15.html#ch15) and [16](#Chapter16.html#ch16).'
