- fmt: "##### `HelloWorldLayer`\n\nThe `HelloWorldLayer` class is where pure cocos2d\
    \ code does its magic to display the “Hello World” label. Before I get into that,\
    \ you should understand that cocos2d uses a hierarchy of `CCNode` objects to determine\
    \ what is displayed where.\n\nThe base class of all nodes is the `CCNode` class,\
    \ which contains a position but has no visual representation. It’s the parent\
    \ class for all other node classes, including the two most fundamental ones: `CCScene`\
    \ and `CCLayer`.\n\n`CCScene` is an abstract concept and does nothing more than\
    \ to allow proper placement of objects in the scene according to their pixel coordinates.\
    \ A `CCScene` node is thus always used as the parent object for every cocos2d\
    \ scene hierarchy. Most of the time you will have only one running scene, except\
    \ when transitioning from one scene to another.\n\nThe `CCLayer` class does very\
    \ little by itself other than allowing touch and accelerometer input. You’ll normally\
    \ use it as the first class added to the `CCScene`, simply because most games\
    \ use at least simple touch input.\n\nIf you open the `HelloWorldLayer.h` header\
    \ file, you’ll see that the `HelloWorldLayer` class is derived from `CCLayer`.\
    \ So, where does the `CCScene` class come into play?\n\nSince `CCScene` is merely\
    \ an abstract concept, the default way of setting up a scene has always been to\
    \ use a static initializer `+(id) scene` in your class. This method creates a\
    \ regular `CCScene` object and then adds an instance of the `HelloWorldLayer`\
    \ class to the scene. In almost all cases, that’s the only place where a `CCScene`\
    \ is created and used. The following is a generic example of the `+(id) scene`\
    \ method:\n\n```\n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    id\
    \ layer = [HelloWorldLayer node];\n    [scene addChild:layer];\n\n    return scene;\n\
    }\n```\n\nFirst, a `CCScene` object is created using the static initializer `+(id)\
    \ node` of the `CCScene` class. Next, our `HelloWorldLayer` class is created using\
    \ the same `+(id) node` method and then added to the scene. The scene is then\
    \ returned to the caller.\n\nMoving on to the `-(id) init` method in [Listing\
    \ 2–2](#Chapter02.html#list_2_2), you’ll notice something that might seem odd:\
    \ `self` is assigned the return value from the `init` message sent to the `super`\
    \ object in the call to `self = [super init]`. If you come from a C++ background,\
    \ you’ll shudder in pain looking at this. Don’t get too upset; it’s all right.\
    \ It simply means that in Objective-C we have to manually call the superclass’s\
    \ `init` method. There is no automatic call to the parent class. And we do have\
    \ to assign `self` the return value of the `[super init]` message because it might\
    \ return `nil`.\n\n**Listing 2–2.** *The init Method Creates and Adds the “Hello\
    \ World” Label*\n\n```\n-(id) init\n{\n    if ((self = [super init])) {\n    \
    \    // create and initialize a label\n        CCLabelTTF* label = [CCLabelTTF\
    \ labelWithString:@\"Hello World\"\n                                         \
    \      fontName:@\"Marker Felt\"\n                                           \
    \    fontSize:64];\n\n        // get the window (screen) size from CCDirector\n\
    \        CGSize size = [[CCDirector sharedDirector] winSize];\n\n        // position\
    \ the label at the center of the screen\n        label.position = CGPointMake(size.width\
    \ / 2, size.height / 2);\n\n        // add the label as a child to this Layer\n\
    \        [self addChild:label];\n    }\n    return self;\n}\n```\n\nThe `CCLabelTTF`\
    \ class draws text on the screen using a TrueType font.\n\nIf you’re deeply concerned\
    \ by the way Objective-C programmers write the call to `[super init]`, here’s\
    \ an alternative that might ease your mind. It’s fundamentally the same, just\
    \ not what tradition dictates:\n\n```\n-(id) init\n{\n    self = [super init];\n\
    \    if (self != nil) {\n        // do init stuff here …\n    }\n    return self;\n\
    }\n```\n\nNow let me explain how the label is added to the scene. If you look\
    \ again at the `init` method in [Listing 2–2](#Chapter02.html#list_2_2), you’ll\
    \ see that a `CCLabelTTF` object is created using one of `init`’s static initializer\
    \ methods. It’ll return a new instance of the `CCLabelTTF` class as an autoreleased\
    \ object. To not have its memory freed after control leaves the `init` method,\
    \ you have to add the label to `self` as a child using the `[self addChild:label]`\
    \ message. In between, the label is assigned a position at the center of the screen.\
    \ Note that whether you assign the position before or after the call to `addChild`\
    \ doesn’t matter."
  raw: '##### HelloWorldLayer


    The `HelloWorldLayer` class is where pure cocos2d code does its magic to display
    the “Hello World” label. Before I get into that, you should understand that cocos2d
    uses a hierarchy of `CCNode` objects to determine what is displayed where.


    The base class of all nodes is the `CCNode` class, which contains a position but
    has no visual representation. It’s the parent class for all other node classes,
    including the two most fundamental ones: `CCScene` and `CCLayer`.


    `CCScene` is an abstract concept and does nothing more than to allow proper placement
    of objects in the scene according to their pixel coordinates. A `CCScene` node
    is thus always used as the parent object for every cocos2d scene hierarchy. Most
    of the time you will have only one running scene, except when transitioning from
    one scene to another.


    The `CCLayer` class does very little by itself other than allowing touch and accelerometer
    input. You’ll normally use it as the first class added to the `CCScene`, simply
    because most games use at least simple touch input.


    If you open the HelloWorldLayer.h header file, you’ll see that the `HelloWorldLayer`
    class is derived from `CCLayer`. So, where does the `CCScene` class come into
    play?


    Since `CCScene` is merely an abstract concept, the default way of setting up a
    scene has always been to use a static initializer `+(id) scene` in your class.
    This method creates a regular `CCScene` object and then adds an instance of the
    `HelloWorldLayer` class to the scene. In almost all cases, that’s the only place
    where a `CCScene` is created and used. The following is a generic example of the
    `+(id) scene` method:


    `+(id) scene`

    `{`

    `    CCScene *scene = [CCScene node];`

    `    id layer = [HelloWorldLayer node];`

    `    [scene addChild:layer];`


    `    return scene;`

    `}`


    First, a `CCScene` object is created using the static initializer `+(id) node`
    of the `CCScene` class. Next, our `HelloWorldLayer` class is created using the
    same `+(id) node` method and then added to the scene. The scene is then returned
    to the caller.


    Moving on to the `–(id) init` method in [Listing 2–2](#Chapter02.html#list_2_2),
    you’ll notice something that might seem odd: `self` is assigned the return value
    from the `init` message sent to the `super` object in the call to `self = [super
    init]`. If you come from a C++ background, you’ll shudder in pain looking at this.
    Don’t get too upset; it’s all right. It simply means that in Objective-C we have
    to manually call the superclass’s `init` method. There is no automatic call to
    the parent class. And we do have to assign `self` the return value of the `[super
    init]` message because it might return `nil`.


    **Listing 2–2.** *The init Method Creates and Adds the “Hello World” Label*


    `-(id) init`

    `{`

    `    if ((self = [super init])) {`

    `        // create and initialize a label`

    `        CCLabelTTF* label = [CCLabelTTF labelWithString:@"Hello World"`

    `                                               fontName:@"Marker Felt"`

    `                                               fontSize:64];`


    `        // get the window (screen) size from CCDirector`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`


    `        // position the label at the center of the screen`

    `        label.position = CGPointMake(size.width / 2, size.height / 2);`


    `        // add the label as a child to this Layer`

    `        [self addChild:label];`

    `    }`

    `    return self;`

    `}`


    The `CCLabelTTF` class draws text on the screen using a TrueType font.


    If you’re deeply concerned by the way Objective-C programmers write the call to
    `[super init]`, here’s an alternative that might ease your mind. It’s fundamentally
    the same, just not what tradition dictates:


    `-(id) init`

    `{`

    `    self = [super init];`

    `    if (self != nil) {`

    `        // do init stuff here …`

    `    }`

    `    return self;`

    `}`


    Now let me explain how the label is added to the scene. If you look again at the
    `init` method in [Listing 2–2](#Chapter02.html#list_2_2), you’ll see that a `CCLabelTTF`
    object is created using one of `init`’s static initializer methods. It’ll return
    a new instance of the `CCLabelTTF` class as an autoreleased object. To not have
    its memory freed after control leaves the `init` method, you have to add the label
    to `self` as a child using the `[self addChild:label]` message. In between, the
    label is assigned a position at the center of the screen. Note that whether you
    assign the position before or after the call to `addChild` doesn’t matter.'
  trans: "\n##### `HelloWorldLayer`\n\n`HelloWorldLayer` 类中，纯 cocos2d 代码施展魔法，显示了“Hello\
    \ World”标签。在深入讲解之前，你需要了解 cocos2d 使用 `CCNode` 对象的层级结构来决定显示内容的位置。\n\n所有节点的基类是 `CCNode`\
    \ 类，它包含位置属性但没有可视化表现形式。它是所有其他节点类的父类，包括两个最基础的类：`CCScene` 和 `CCLayer`。\n\n`CCScene`\
    \ 是一个抽象概念，其唯一作用是允许根据对象的像素坐标在场景中正确放置对象。因此，`CCScene` 节点始终用作每个 cocos2d 场景层级结构的父对象。大多数情况下，你只会有一个运行中的场景，除非正在进行场景切换。\n\
    \n`CCLayer` 类本身功能很少，仅支持触摸和加速计输入。通常你会将它作为添加到 `CCScene` 的第一个类，因为大多数游戏至少会使用简单的触摸输入。\n\
    \n如果你打开 `HelloWorldLayer.h` 头文件，会看到 `HelloWorldLayer` 类派生自 `CCLayer`。那么，`CCScene`\
    \ 类是如何发挥作用的呢？\n\n由于 `CCScene` 只是一个抽象概念，设置场景的默认方法是在你的类中使用静态初始化方法 `+(id) scene`。该方法会创建一个常规的\
    \ `CCScene` 对象，然后将 `HelloWorldLayer` 类的实例添加到场景中。在几乎所有情况下，这是唯一创建和使用 `CCScene` 的地方。以下是\
    \ `+(id) scene` 方法的通用示例：\n\n```\n+(id) scene\n{\n    CCScene *scene = [CCScene\
    \ node];\n    id layer = [HelloWorldLayer node];\n    [scene addChild:layer];\n\
    \n    return scene;\n}\n```\n\n首先，使用 `CCScene` 类的静态初始化方法 `+(id) node` 创建一个 `CCScene`\
    \ 对象。接着，使用相同的 `+(id) node` 方法创建我们的 `HelloWorldLayer` 类，并将其添加到场景中。然后场景被返回给调用者。\n\
    \n继续看清单 2–2 中的 `-(id) init` 方法，你会注意到一个看似奇怪的地方：`self` 被赋值为调用 `self = [super init]`\
    \ 时向 `super` 对象发送 `init` 消息的返回值。如果你有 C++ 背景，看到这个可能会感到不安。别太纠结，这没问题。这仅仅意味着在 Objective-C\
    \ 中，我们必须手动调用父类的 `init` 方法。没有对父类的自动调用。而且我们必须将 `[super init]` 消息的返回值赋给 `self`，因为它可能返回\
    \ `nil`。\n\n**清单 2–2.** *init 方法创建并添加“Hello World”标签*\n\n```\n-(id) init\n{\n\
    \    if ((self = [super init])) {\n        // 创建并初始化一个标签\n        CCLabelTTF*\
    \ label = [CCLabelTTF labelWithString:@\"Hello World\"\n                     \
    \                          fontName:@\"Marker Felt\"\n                       \
    \                        fontSize:64];\n\n        // 从 CCDirector 获取窗口（屏幕）尺寸\n\
    \        CGSize size = [[CCDirector sharedDirector] winSize];\n\n        // 将标签放置在屏幕中心\n\
    \        label.position = CGPointMake(size.width / 2, size.height / 2);\n\n  \
    \      // 将标签作为子节点添加到此 Layer\n        [self addChild:label];\n    }\n    return\
    \ self;\n}\n```\n\n`CCLabelTTF` 类使用 TrueType 字体在屏幕上绘制文本。\n\n如果你对 Objective-C 程序员编写\
    \ `[super init]` 调用的方式感到困惑，这里有一种可能让你放心的替代写法。它本质上相同，只是不符合传统惯例：\n\n```\n-(id) init\n\
    {\n    self = [super init];\n    if (self != nil) {\n        // 在此处执行初始化操作 …\n\
    \    }\n    return self;\n}\n```\n\n现在让我解释一下标签是如何添加到场景中的。如果你再次查看清单 2–2 中的 `init`\
    \ 方法，会看到使用 `init` 的一个静态初始化方法创建了一个 `CCLabelTTF` 对象。该方法会将 `CCLabelTTF` 类的一个新实例作为自动释放对象返回。为了在控制离开\
    \ `init` 方法后其内存不被释放，你必须使用 `[self addChild:label]` 消息将标签作为子节点添加到 `self`。在此过程中，标签被分配了一个位于屏幕中心的位置。注意，在调用\
    \ `addChild` 之前还是之后分配位置并不重要。\n"
- fmt: "### Memory Management with `cocos2d`\n\nAt this point, I need to talk a bit\
    \ about memory management and the `autorelease` message. Memory management in\
    \ the reference-counting Objective-C world is governed by two simple rules:\n\n\
    - If you own (`alloc`, `copy`, or `retain`) an object, you must `release` or `autorelease`\
    \ it later.\n- If you send `autorelease` to an object, you must not `release`\
    \ it.\n\nNormally, when you create an object in Objective-C, you do so by calling\
    \ `alloc`. By doing this, you become responsible for releasing the object when\
    \ you don’t need it anymore. The following is a typical `alloc`/`init` and `release`\
    \ cycle:\n\n```\n// allocate a new instance of NSObject\nNSObject* myObject =\
    \ [[NSObject alloc] init];\n\n// do something with myObject here ...\n\n// release\
    \ the memory used by myObject\n// if you don't release it, the object is leaked\n\
    // and the memory used by it is never freed.\n[myObject release];\n```\n\nNow,\
    \ with the `autorelease` message and the fact that iOS applications always use\
    \ an autorelease pool, you can avoid sending the `release` message. Here’s the\
    \ same example rewritten using `autorelease`:\n\n```\n// allocate a new instance\
    \ of NSObject\nNSObject* myObject = [[[NSObject alloc] init] autorelease];\n\n\
    // do something with myObject here ...\n\n// no need to call release, in fact\
    \ you should not send release as it would crash.\n```\n\nAs you can see, this\
    \ simplifies memory management somewhat in that you no longer have to remember\
    \ to send the `release` message. The autorelease pool takes care of that for you\
    \ by sending the object a `release` message at the end of the current frame update\
    \ if it is no longer referenced. Creating the object gets just a little bit more\
    \ complex because the `autorelease` message was added.\n\nNow consider the following\
    \ code, which illustrates how you’d allocate a `CCNode` object if you followed\
    \ the traditional release style:\n\n```\n// allocate a new instance of CCNode\n\
    CCNode* myNode = [[CCNode alloc] init];\n\n// do something with myNode ...\n\n\
    [myNode release];\n```\n\nThis is *not* the preferred way to create `cocos2d`\
    \ objects. It’s much easier to use the static initializer methods, which return\
    \ an `autorelease` object. Contrary to what Apple recommends, the use of `autorelease`\
    \ is consistently built into the `cocos2d` engine’s design by moving calls like\
    \ `[[[NSObject alloc] init] autorelease]` to a static method in the class itself.\
    \ And that’s a good thing—do not fight it! It will make your life easier since\
    \ you don’t have to remember which objects need to be released, which is often\
    \ cause for either crashes due to over-releasing certain objects or memory leaks\
    \ due to not releasing all objects.\n\nIn the case of the `CCNode` class, the\
    \ static initializer is `+(id) node`. The following code sends the `alloc` message\
    \ to `self`, which is equivalent to using `[CCNode alloc]` if the code is placed\
    \ in the `CCNode` implementation.\n\n```\n+(id) node\n{\n    return [[[self alloc]\
    \ init] autorelease];\n}\n```\n\nIt’s just a little more generic to use `self`\
    \ in this case and perfectly legal in case you happen to be a C++ programmer now\
    \ scratching your head.\n\nSeeing this, we can rewrite the `CCNode` allocation\
    \ to use the static initializer, and, quite unsurprisingly, the code is now very\
    \ short, concise, and tidy. Just the way I like it:\n\n```\n// allocate a new\
    \ instance of CCNode\nCCNode* myNode = [CCNode node];\n\n// do something with\
    \ myNode ...\n```\n\nThat’s the beauty of using `autorelease` objects. You don’t\
    \ need to remember to send them a `release` message. Each time `cocos2d` advances\
    \ to the next frame, the `autorelease` objects that are no longer in use are released\
    \ automatically. But there’s also one caveat. If you use this code and at least\
    \ one frame later you want to access the `myNode` object, it’ll be gone. Sending\
    \ any messages to it will cause an `EXC_BAD_ACCESS` crash.\n\nSimply adding the\
    \ `CCNode* myNode` variable as a member to your class doesn’t mean that the memory\
    \ used by the object is automatically retained. If you want an `autorelease` object\
    \ to stick around into the next and future frames, you do need to `retain` it\
    \ and subsequently `release` it if you don’t explicitly add it as a child node.\n\
    \nThere’s an even better way to use `autorelease` objects and keep them around\
    \ without explicitly calling `retain`. Usually you’ll create `CCNode` objects\
    \ and add them to the scene hierarchy by adding the nodes as children to another\
    \ `CCNode`-derived object. You can even get rid of the member variable if you\
    \ want to, by relying on `cocos2d` to store the object for you.\n\n```\n// creating\
    \ an autorelease instance of CCNode\n-(void) init\n{\n    myNode = [CCNode node];\n\
    \    myNode.tag = 123;\n\n    // adding the node as children to self\n    [self\
    \ addChild:myNode];\n}\n\n-(void) update:(ccTime)delta\n{\n    // later access\
    \ and use the myNode object again\n    CCNode* myNode = [self getChildByTag:123];\n\
    \n    // do something with myNode\n}\n```\n\nThe magic is that `addChild` adds\
    \ the object to a collection, in this case a `CCArray` that’s similar to the `NSMutableArray`\
    \ of the iOS SDK but faster. The `CCArray` and the `NSMutableArray` and any other\
    \ iOS SDK collection automatically send a `retain` message to any object added\
    \ to them and send a `release` message to any object removed from the collection.\
    \ Thus, the object stays around and remains valid and can be accessed at a later\
    \ time, yet it will automatically be released after it has been removed from the\
    \ collection.\n\nWhat you should keep in mind is that managing memory for `cocos2d`\
    \ objects is best done as I described here. You may run into other developers\
    \ who say that `autorelease` is bad or slow and shouldn’t be used. Don’t give\
    \ in to them.\n\n**NOTE:** The Apple developer documentation recommends reducing\
    \ the number of `autorelease` objects. Most `cocos2d` objects, however, are created\
    \ as `autorelease` objects. It makes memory management much easier, as I’ve shown.\n\
    \nIf you start using `alloc`/`init` and `release` for every `cocos2d` object,\
    \ you’ll get yourself into a lot of pain for little to no benefit. That isn’t\
    \ to say that you’ll never use `alloc`/`init`; it does have its uses and is sometimes\
    \ even required. But for `cocos2d` objects, you should rely on using the static\
    \ `autorelease` initializers.\n\n`autorelease` objects have only one caveat, which\
    \ is that their memory is in use until the game advances by one frame. This means\
    \ if you create a lot of throwaway `autorelease` objects every frame, you might\
    \ be wasting memory. But that’s actually a rare occurrence.\n\nThis concludes\
    \ my quick primer on `cocos2d` memory management. For a more in-depth discussion\
    \ of memory management, refer to Apple’s Memory Management Programming Guide (`http://developer.apple.com/iphone/library/documentation/Cocoa/Conceptual/MemoryMgmt/MemoryMgmt.html`)."
  raw: '### Memory Management with cocos2d


    At this point, I need to talk a bit about memory management and the autorelease
    message. Memory management in the reference-counting Objective-C world is governed
    by two simple rules:


    *   If you own (`alloc`, `copy,` or `retain)` an object, you must `release` or
    `autorelease` it later.

    *   If you send `autorelease` to an object, you must not `release` it.


    Normally, when you create an object in Objective-C, you do so by calling `alloc`.
    By doing this, you become responsible for releasing the object when you don’t
    need it anymore. The following is a typical `alloc`/`init` and `release` cycle:


    `// allocate a new instance of NSObject`

    `NSObject* myObject = [[NSObject alloc] init];`


    `// do something with myObject here …`


    `// release the memory used by myObject`

    `// if you don''t release it, the object is leaked`

    `// and the memory used by it is never freed.`

    `[myObject release];`


    Now, with the `autorelease` message and the fact that iOS applications always
    use an autorelease pool, you can avoid sending the `release` message. Here’s the
    same example rewritten using `autorelease`:


    `// allocate a new instance of NSObject`

    `NSObject* myObject = [[[NSObject alloc] init] autorelease];`


    `// do something with myObject here …`


    `// no need to call release, in fact you should not send release as it would crash.`


    As you can see, this simplifies memory management somewhat in that you no longer
    have to remember to send the `release` message. The autorelease pool takes care
    of that for you by sending the object a `release` message at the end of the current
    frame update if it is no longer referenced. Creating the object gets just a little
    bit more complex because the `autorelease` message was added.


    Now consider the following code, which illustrates how you’d allocate a `CCNode`
    object if you followed the traditional release style:


    `// allocate a new instance of CCNode`

    `CCNode* myNode = [[CCNode alloc] init];`


    `// do something with myNode …`


    `[myNode release];`


    This is *not* the preferred way to create cocos2d objects. It’s much easier to
    use the static initializer methods, which return an `autorelease` object. Contrary
    to what Apple recommends, the use of `autorelease` is consistently built into
    the cocos2d engine’s design by moving calls like `[[[NSObject alloc] init] autorelease]`
    to a static method in the class itself. And that’s a good thing—do not fight it!
    It will make your life easier since you don’t have to remember which objects need
    to be released, which is often cause for either crashes due to over-releasing
    certain objects or memory leaks due to not releasing all objects.


    In the case of the `CCNode` class, the static initializer is `+(id) node`. The
    following code sends the `alloc` message to `self`, which is equivalent to using
    `[CCNode alloc]` if the code is placed in the `CCNode` implementation.


    `+(id) node`

    `{`

    `    return [[[self alloc] init] autorelease];`

    `}`


    It’s just a little more generic to use `self` in this case and perfectly legal
    in case you happen to be a C++ programmer now scratching your head.


    Seeing this, we can rewrite the `CCNode` allocation to use the static initializer,
    and, quite unsurprisingly, the code is now very short, concise, and tidy. Just
    the way I like it:


    `// allocate a new instance of CCNode`

    `CCNode* myNode = [CCNode node];`


    `// do something with myNode …`


    That’s the beauty of using autorelease objects. You don’t need to remember to
    send them a `release` message. Each time cocos2d advances to the next frame, the
    autorelease objects that are no longer in use are released automatically. But
    there’s also one caveat. If you use this code and at least one frame later you
    want to access the `myNode` object, it’ll be gone. Sending any messages to it
    will cause an `EXC_BAD_ACCESS` crash.


    Simply adding the `CCNode* myNode` variable as a member to your class doesn’t
    mean that the memory used by the object is automatically retained. If you want
    an autorelease object to stick around into the next and future frames, you do
    need to retain it and subsequently release it if you don’t explicitly add it as
    a child node.


    There’s an even better way to use autorelease objects and keep them around without
    explicitly calling `retain`. Usually you’ll create `CCNode` objects and add them
    to the scene hierarchy by adding the nodes as children to another `CCNode`-derived
    object. You can even get rid of the member variable if you want to, by relying
    on cocos2d to store the object for you.


    `// creating an autorelease instance of CCNode`

    `-(void) init`

    `{`

    `    myNode = [CCNode node];`

    **`myNode.tag = 123;`**


    `    // adding the node as children to self`

    `    [self addChild:myNode];`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    // later access and use the myNode object again`

    `    CCNode* myNode = [self getChildByTag:123];`


    `    // do something with myNode`

    `}`


    The magic is that `addChild` adds the object to a collection, in this case a `CCArray`
    that’s similar to the `NSMutableArray` of the iOS SDK but faster. The `CCArray`
    and the `NSMutableArray` and any other iOS SDK collection automatically send a
    `retain` message to any object added to them and send a `release` message to any
    object removed from the collection. Thus, the object stays around and remains
    valid and can be accessed at a later time, yet it will automatically be released
    after it has been removed from the collection.


    What you should keep in mind is that managing memory for cocos2d objects is best
    done as I described here. You may run into other developers who say that autorelease
    is bad or slow and shouldn’t be used. Don’t give in to them.


    **NOTE:** The Apple developer documentation recommends reducing the number of
    autorelease objects. Most cocos2d objects, however, are created as autorelease
    objects. It makes memory management much easier, as I’ve shown.


    If you start using `alloc`/`init` and `release` for every cocos2d object, you’ll
    get yourself into a lot of pain for little to no benefit. That isn’t to say that
    you’ll never use `alloc`/`init`; it does have its uses and is sometimes even required.
    But for cocos2d objects, you should rely on using the static autorelease initializers.


    Autorelease objects have only one caveat, which is that their memory is in use
    until the game advances by one frame. This means if you create a lot of throwaway
    autorelease objects every frame, you might be wasting memory. But that’s actually
    a rare occurrence.


    This concludes my quick primer on cocos2d memory management. For a more in-depth
    discussion of memory management, refer to Apple’s Memory Management Programming
    Guide ([`http://developer.apple.com/iphone/library/documentation/Cocoa/Conceptual/MemoryMgmt/MemoryMgmt.html`](http://developer.apple.com/iphone/library/documentation/Cocoa/Conceptual/MemoryMgmt/MemoryMgmt.html)).'
  trans: "\n### `cocos2d` 的内存管理\n\n在此，我需要谈一谈内存管理和 `autorelease` 消息。在使用引用计数的 Objective-C\
    \ 世界中，内存管理遵循两条简单规则：\n\n- 如果你拥有（通过 `alloc`、`copy` 或 `retain`）一个对象，则之后必须`release`或`autorelease`它。\n\
    - 如果你向一个对象发送了 `autorelease`，则不得再`release`它。\n\n通常，在 Objective-C 中创建对象时，你会调用 `alloc`。这样做，你就有责任在不再需要该对象时释放它。下面是一个典型的\
    \ `alloc`/`init` 和 `release` 周期：\n\n```\n// 分配 NSObject 的一个新实例\nNSObject* myObject\
    \ = [[NSObject alloc] init];\n\n// 在此处对 myObject 进行操作 ...\n\n// 释放 myObject 占用的内存\n\
    // 如果不释放它，对象就会泄漏，\n// 它所占用的内存永远不会被释放。\n[myObject release];\n```\n\n现在，借助 `autorelease`\
    \ 消息以及 iOS 应用始终使用自动释放池这一事实，你可以避免发送 `release` 消息。下面是使用 `autorelease` 重写的相同示例：\n\
    \n```\n// 分配 NSObject 的一个新实例\nNSObject* myObject = [[[NSObject alloc] init] autorelease];\n\
    \n// 在此处对 myObject 进行操作 ...\n\n// 无需调用 release，实际上你也不应该发送 release，否则会导致崩溃。\n```\n\
    \n如你所见，这在一定程度上简化了内存管理，因为你不再需要记住发送 `release` 消息。自动释放池会在当前帧更新结束时，如果该对象不再被引用，则自动向其发送\
    \ `release` 消息来处理这一切。由于添加了 `autorelease` 消息，创建对象的过程会稍微复杂一点。\n\n现在考虑以下代码，它展示了如果你遵循传统的释放风格，将如何分配一个\
    \ `CCNode` 对象：\n\n```\n// 分配 CCNode 的一个新实例\nCCNode* myNode = [[CCNode alloc] init];\n\
    \n// 对 myNode 进行操作 ...\n\n[myNode release];\n```\n\n这并不是创建 `cocos2d` 对象的推荐方式。更简单的方法是使用静态初始化方法，它们会返回一个\
    \ `autorelease` 对象。与苹果的建议相反，`cocos2d` 引擎的设计中一贯内置了 `autorelease` 的使用，方式是将诸如 `[[[NSObject\
    \ alloc] init] autorelease]` 的调用移至类本身的静态方法中。这是一件好事——不要与之对抗！它会让你的生活更轻松，因为你无需记住哪些对象需要释放，而这一点常常会导致因过度释放某些对象而崩溃，或因未释放所有对象而导致内存泄漏。\n\
    \n对于 `CCNode` 类，其静态初始化方法是 `+(id) node`。以下代码向 `self` 发送 `alloc` 消息，这等价于在 `CCNode`\
    \ 的实现中使用 `[CCNode alloc]`。\n\n```\n+(id) node\n{\n    return [[[self alloc] init]\
    \ autorelease];\n}\n```\n\n在这种情况下使用 `self` 只是更具通用性，并且如果你碰巧是一个现在挠头的 C++ 程序员，这样做也完全合法。\n\
    \n看到这一点，我们可以重写 `CCNode` 的分配来使用静态初始化方法，并且毫不意外的是，代码现在变得非常简短、简洁和整洁。这正是我喜欢的方式：\n\n\
    ```\n// 分配 CCNode 的一个新实例\nCCNode* myNode = [CCNode node];\n\n// 对 myNode 进行操作\
    \ ...\n```\n\n这就是使用 `autorelease` 对象的美妙之处。你无需记住向它们发送 `release` 消息。每当 `cocos2d`\
    \ 前进到下一帧时，不再使用的 `autorelease` 对象会被自动释放。但这里也有一个注意事项。如果你使用这段代码，并且在一帧或更多帧之后想要访问 `myNode`\
    \ 对象，它可能已经不存在了。向它发送任何消息都会导致 `EXC_BAD_ACCESS` 崩溃。\n\n仅仅将 `CCNode* myNode` 变量作为成员添加到你的类中，并不意味着该对象使用的内存会被自动保留。如果你希望一个\
    \ `autorelease` 对象在后续帧中持续存在，你需要显式地 `retain` 它，然后在你没有显式将其添加为子节点时再进行 `release`。\n\
    \n还有一种更好的方式来使用 `autorelease` 对象并让它们持续存在，而无需显式调用 `retain`。通常，你会创建 `CCNode` 对象，并通过将这些节点作为子节点添加到另一个\
    \ `CCNode` 派生对象中，从而将它们添加到场景层次结构中。如果你愿意，甚至可以去掉成员变量，依靠 `cocos2d` 来为你存储对象。\n\n```\n\
    // 创建一个 autorelease 的 CCNode 实例\n-(void) init\n{\n    myNode = [CCNode node];\n\
    \    myNode.tag = 123;\n\n    // 将该节点作为子节点添加到 self\n    [self addChild:myNode];\n\
    }\n\n-(void) update:(ccTime)delta\n{\n    // 之后再次访问并使用 myNode 对象\n    CCNode*\
    \ myNode = [self getChildByTag:123];\n\n    // 对 myNode 进行操作\n}\n```\n\n神奇之处在于\
    \ `addChild` 将对象添加到一个集合中，在这个例子中是 `CCArray`，它类似于 iOS SDK 的 `NSMutableArray`，但速度更快。`CCArray`、`NSMutableArray`\
    \ 以及任何其他 iOS SDK 集合都会自动向添加进去的任何对象发送 `retain` 消息，并向从集合中移除的任何对象发送 `release` 消息。因此，该对象会持续存在并保持有效，可以在之后被访问，同时当它从集合中移除后又会自动被释放。\n\
    \n你应该记住的是，管理 `cocos2d` 对象的内存最好按照我在这里描述的方式进行。你可能会遇到其他开发者说 `autorelease` 不好或效率低，不应该使用。不要向他们妥协。\n\
    \n**注意：** 苹果开发者文档建议减少 `autorelease` 对象的数量。然而，大多数 `cocos2d` 对象都是作为 `autorelease`\
    \ 对象创建的。正如我所示，这使得内存管理变得容易得多。\n\n如果你开始为每个 `cocos2d` 对象使用 `alloc`/`init` 和 `release`，你将给自己带来很多痛苦，却几乎没有什么好处。这并不是说你永远不会使用\
    \ `alloc`/`init`；它确实有其用途，有时甚至是必需的。但对于 `cocos2d` 对象，你应该依赖使用静态 `autorelease` 初始化方法。\n\
    \n`autorelease` 对象只有一个注意事项，那就是它们的内存会一直被占用，直到游戏前进一帧。这意味着如果你每帧创建大量一次性的 `autorelease`\
    \ 对象，你可能会浪费内存。但这实际上很少发生。\n\n以上就是我对 `cocos2d` 内存管理的快速入门介绍。有关内存管理的更深入讨论，请参考苹果的内存管理编程指南（`http://developer.apple.com/iphone/library/documentation/Cocoa/Conceptual/MemoryMgmt/MemoryMgmt.html`）。\n"
- fmt: "### Changing the World\n\nWhat good is a template project like HelloWorld\
    \ if I don’t have you tinker with it at least a little? I’ll have you change the\
    \ world by touching it! How’s that for a start?\n\nFirst you’ll make two changes\
    \ to the `init` method to enable touch input and to use a tag value to retrieve\
    \ the label at a later point. The changes are highlighted in [Listing 2–3](#Chapter02.html#list_2_3).\n\
    \n**Listing 2–3.** *Enabling Touch and Gaining Access to the Label Object*\n\n\
    ```\n-(id) init\n{\n    if ((self = [super init])) {\n        // create and initialize\
    \ a label\n        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Hello World\"\
    \n                                               fontName:@\"Marker Felt\"\n                                               fontSize:64];\n\
    \n        // get the window (screen) size from CCDirector\n        CGSize size\
    \ = [[CCDirector sharedDirector] winSize];\n\n        // position the label at\
    \ the center of the screen\n        label.position = CGPointMake(size.width /\
    \ 2, size.height / 2);\n\n        // add the label as a child to this Layer\n\
            [self addChild: label];\n\n        // our label needs a tag so we can\
    \ find it later on\n        // you can pick any arbitrary number\n        label.tag\
    \ = 13;\n\n        // must be enabled if you want to receive touch events!\n        self.isTouchEnabled\
    \ = YES;\n    }\n    return self;\n}\n```\n\nThe `label` object gets 13 assigned\
    \ to its `tag` property. Now why did you do that? I know, I told you to, but I\
    \ must have had a reason, right? In the previous section, I explained that’s how\
    \ you can later access a child object of your class—you can refer to it by its\
    \ `tag`. The `tag` number is completely arbitrary, other than that it must be\
    \ a positive number and every object should have its own tag number, so there\
    \ aren’t two with the same number or you couldn’t tell which you’d be retrieving.\n\
    \n**TIP:** Instead of using magic numbers like 13 as tag values, you should get\
    \ in the habit of defining constants to use with tags. You’ll have a hard time\
    \ remembering what tag number 13 stands for, compared to writing a meaningful\
    \ variable name like `kTagForLabel`. I’ll get to this in [Chapter 5](#Chapter05.html#ch5).\n\
    \nIn addition, `self.isTouchEnabled` is set to `YES`. This is a property of the\
    \ `CCLayer` class and tells it that you want to receive touch messages. Only then\
    \ will the method `ccTouchesBegan:` be called:\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches\
    \ withEvent:(UIEvent*)event\n{\n    CCLabelTTF* label = (CCLabelTTF*)[self getChildByTag:13];\n\
        label.scale = CCRANDOM_0_1();\n}\n```\n\nBy using `[self getChildByTag:13]`,\
    \ you can access the `CCLabelTTF` object by its `tag` property, which you assigned\
    \ in the `init` method. You can then use the label as usual. In this case, we\
    \ use cocos2d’s handy `CCRANDOM_0_1()` macro to change the label’s `scale` property\
    \ to a value between 0 and 1. This will change the label’s size every time you\
    \ touch the screen.\n\nSince `getChildByTag:` will always return the label, we\
    \ can safely cast it to a `CCLabelTTF*` object. However, you should be aware that\
    \ doing so will crash your game if the retrieved object is not derived from the\
    \ `CCLabelTTF` class for some reason. This could easily happen if you accidentally\
    \ give another object the same tag number 13. For that reason, it is good practice\
    \ to use a defensive programming style and verify that what you’re working with\
    \ is exactly what you expect. Defensive programming uses assertions to verify\
    \ that assumptions made are true. For this, you should use the `NSAssert` method:\n\
    \n```\n-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;\n{\n\
        CCNode* node = [self getChildByTag:13];\n\n    // defensive programming: verify\
    \ the returned node is a CCLabelTTF\n    NSAssert([node isKindOfClass:[CCLabelTTF\
    \ class]], \n        @\"node is not a CCLabelTTF!\");\n\n    CCLabelTTF* label\
    \ = (CCLabelTTF*)node;\n    label.scale = CCRANDOM_0_1();\n}\n```\n\nIn this case,\
    \ we expect the node returned by `getChildByTag:` to be an object derived from\
    \ `CCLabelTTF`, but we can never be sure, which is why adding an `NSAssert` to\
    \ verify the fact is helpful in finding errors before they lead to a crash.\n\n\
    Note that this adds two more lines of code, but in terms of performance things\
    \ remain the same. The call to `NSAssert` is completely removed in Release builds,\
    \ and the cast `CCLabelTTF* label = (CCLabelTTF*)node;` is what we’ve done already,\
    \ just on the same line. Essentially, both versions perform exactly the same,\
    \ but in the second case you get the benefit of being notified when you didn’t\
    \ get the expected `CCLabelTTF` object, instead of crashing with an `EXC_BAD_ACCESS`\
    \ error.\n\n### What Else You Should Know\n\nSince this is the “Getting Started”\
    \ chapter, I think it’s important to take the opportunity to introduce you to\
    \ some vital but often overlooked aspects of iOS game development. I want you\
    \ to be aware of the subtle differences among various iOS devices. In particular,\
    \ available memory is often incorrectly considered because you can use only a\
    \ fraction of each device’s memory safely.\n\nI also want you to know that the\
    \ iOS Simulator is a great tool for testing your game, but it can’t be used to\
    \ assess performance, memory usage, and other features. The simulator experience\
    \ can differ greatly from running your game on an actual iOS device. Don’t fall\
    \ into the trap of making assessments based on your game’s behavior in the iOS\
    \ Simulator. It’s only the device that counts."
  raw: '### Changing the World


    What good is a template project like HelloWorld if I don’t have you tinker with
    it at least a little? I’ll have you change the world by touching it! How’s that
    for a start?


    First you’ll make two changes to the `init` method to enable touch input and to
    use a tag value to retrieve the label at a later point. The changes are highlighted
    in [Listing 2–3](#Chapter02.html#list_2_3).


    **Listing 2–3.** *Enabling Touch and Gaining Access to the Label Object*


    `-(id) init`

    `{`

    `    if ((self = [super init])) {`

    `        // create and initialize a label`

    `        CCLabelTTF* label = [CCLabelTTF labelWithString:@"Hello World"`

    `                                               fontName:@"Marker Felt"`

    `                                               fontSize:64];`


    `        // get the window (screen) size from CCDirector`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`


    `        // position the label at the center of the screen`

    `        label.position = CGPointMake(size.width / 2, size.height / 2);`


    `        // add the label as a child to this Layer`

    `        [self addChild: label];`


    **`// our label needs a tag so we can find it later on`**

    **`// you can pick any arbitrary number`**

    **`label.tag = 13;`**


    **`        // must be enabled if you want to receive touch events!`**

    **`self.isTouchEnabled = YES;`**

    `    }`

    `    return self;`

    `}`


    The `label` object gets 13 assigned to its tag property. Now why did you do that?
    I know, I told you to, but I must have had a reason, right? In the previous section,
    I explained that’s how you can later access a child object of your class—you can
    refer to it by its tag. The tag number is completely arbitrary, other than that
    it must be a positive number and every object should have its own tag number,
    so there aren’t two with the same number or you couldn’t tell which you’d be retrieving.


    **TIP:** Instead of using magic numbers like 13 as tag values, you should get
    in the habit of defining constants to use with tags. You’ll have a hard time remembering
    what tag number 13 stands for, compared to writing a meaningful variable name
    like `kTagForLabel`. I’ll get to this in [Chapter 5](#Chapter05.html#ch5).


    In addition, `self.isTouchEnabled` is set to `YES`. This is a property of the
    `CCLayer` class and tells it that you want to receive touch messages. Only then
    will the method `ccTouchesBegan` be called:


    `-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event`

    `{`

    `    CCLabelTTF* label = (CCLabelTTF*)[self getChildByTag:13];`

    `    label.scale = CCRANDOM_0_1();`

    `}`


    By using `[self getChildByTag:13]`, you can access the `CCLabelTTF` object by
    its `tag` property, which you assigned in the `init` method. You can then use
    the label as usual. In this case, we use cocos2d’s handy `CCRANDOM_0_1()` macro
    to change the label’s `scale` property to a value between 0 and 1\. This will
    change the label’s size every time you touch the screen.


    Since `getChildByTag` will always return the label, we can safely cast it to a
    `(CCLabelTTF*)` object. However, you should be aware that doing so will crash
    your game if the retrieved object is not derived from the `CCLabelTTF` class for
    some reason. This could easily happen if you accidentally give another object
    the same tag number 13\. For that reason, it is good practice to use a defensive
    programming style and verify that what you’re working with is exactly what you
    expect. Defensive programming uses assertions to verify that assumptions made
    are true. For this, you should use the `NSAssert` method:


    `-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;`

    `{`

    `    CCNode* node = [self getChildByTag:13];`


    `    // defensive programming: verify the returned node is a CCLabelTTF`

    `    NSAssert([node isKindOfClass:[CCLabelTTF class]],`![images](images/U002.jpg)

    `        @"node is not a CCLabelTTF!");`


    `    CCLabelTTF* label = (CCLabelTTF*)node;`

    `    label.scale = CCRANDOM_0_1();`

    `}`


    In this case, we expect the node returned by `getChildByTag` to be an object derived
    from `CCLabelTTF`, but we can never be sure, which is why adding an `NSAssert`
    to verify the fact is helpful in finding errors before they lead to a crash.


    Note that this adds two more lines of code, but in terms of performance things
    remain the same. The call to `NSAssert` is completely removed in Release builds,
    and the cast `CCLabelTTF* label = (CCLabelTTF*)node;` is what we’ve done already,
    just on the same line. Essentially, both versions perform exactly the same, but
    in the second case you get the benefit of being notified when you didn’t get the
    expected `CCLabelTTF` object, instead of crashing with an `EXC_BAD_ACCESS` error.


    ### What Else You Should Know


    Since this is the “Getting Started” chapter, I think it’s important to take the
    opportunity to introduce you to some vital but often overlooked aspects of iOS
    game development. I want you to be aware of the subtle differences among various
    iOS devices. In particular, available memory is often incorrectly considered because
    you can use only a fraction of each device’s memory safely.


    I also want you to know that the iOS Simulator is a great tool for testing your
    game, but it can’t be used to assess performance, memory usage, and other features.
    The simulator experience can differ greatly from running your game on an actual
    iOS device. Don’t fall into the trap of making assessments based on your game’s
    behavior in the iOS Simulator. It’s only the device that counts.'
  trans: "\n### 改变世界\n\n一个像 HelloWorld 这样的模板项目，如果我不让你至少动手稍微修改一下，那还有什么意义呢？我将让你通过触摸来改变世界！这个开头怎么样？\n\
    \n首先，你需要对 `init` 方法做两处修改：启用触摸输入，并使用标签值（tag）在后续阶段获取标签对象。修改的部分已在代码清单 2–3 中高亮显示。\n\
    \n**代码清单 2–3.** *启用触摸并获取标签对象的访问权限*\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init])) {\n        // 创建并初始化一个标签\n        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"\
    Hello World\"\n                                               fontName:@\"Marker\
    \ Felt\"\n                                               fontSize:64];\n\n        //\
    \ 从 CCDirector 获取窗口（屏幕）尺寸\n        CGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n\n        // 将标签定位在屏幕中心\n        label.position = CGPointMake(size.width\
    \ / 2, size.height / 2);\n\n        // 将标签作为子节点添加到这个 Layer\n        [self addChild:\
    \ label];\n\n        // 我们的标签需要一个标签值，以便以后能找到它\n        // 你可以任意选一个数字\n        label.tag\
    \ = 13;\n\n        // 如果你想接收触摸事件，必须启用此属性！\n        self.isTouchEnabled = YES;\n\
        }\n    return self;\n}\n```\n\n`label` 对象的 `tag` 属性被赋值为 13。你为什么要这么做呢？我知道，是我让你这么做的，但我肯定有理由，对吧？在上一节中，我解释过，这样你就可以通过\
    \ `tag` 来访问类中的子对象——你可以通过标签值来引用它。标签值完全可以是任意的，但它必须是一个正数，并且每个对象应该有自己的标签值，这样就不会有两个相同的数字，否则你就无法区分你检索到的是哪一个。\n\
    \n**提示：** 与其使用像 13 这样的魔法数字作为标签值，你应该养成定义常量来配合标签使用的习惯。与写一个有意义的变量名如 `kTagForLabel`\
    \ 相比，你很难记住标签值 13 代表什么。我会在第 5 章中讲到这一点。\n\n此外，`self.isTouchEnabled` 被设置为 `YES`。这是\
    \ `CCLayer` 类的一个属性，告诉它你想要接收触摸消息。只有这样，`ccTouchesBegan:` 方法才会被调用：\n\n```\n-(void)\
    \ ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event\n{\n    CCLabelTTF*\
    \ label = (CCLabelTTF*)[self getChildByTag:13];\n    label.scale = CCRANDOM_0_1();\n\
    }\n```\n\n通过使用 `[self getChildByTag:13]`，你可以通过标签值属性访问你在 `init` 方法中赋值的 `CCLabelTTF`\
    \ 对象。然后你就可以像平常一样使用这个标签了。在这个例子中，我们使用了 cocos2d 便捷的 `CCRANDOM_0_1()` 宏，将标签的 `scale`\
    \ 属性改变为 0 到 1 之间的一个值。这样，每次你触摸屏幕时，标签的大小都会改变。\n\n由于 `getChildByTag:` 总是返回标签对象，我们可以安全地将其转换为\
    \ `CCLabelTTF*` 对象。然而，你应该知道，如果检索到的对象由于某些原因不是从 `CCLabelTTF` 类派生出来的，这样做会导致游戏崩溃。如果你不小心给了另一个对象同样的标签值\
    \ 13，这种情况很容易发生。因此，良好的做法是采用防御性编程风格，并验证你所操作的对象正是你所期望的。防御性编程使用断言来验证所做的假设是否成立。为此，你应该使用\
    \ `NSAssert` 方法：\n\n```\n-(void) ccTouchesBegan:(NSSet*)touches withEvent:(UIEvent*)event;\n\
    {\n    CCNode* node = [self getChildByTag:13];\n\n    // 防御性编程：验证返回的节点是 CCLabelTTF\n\
        NSAssert([node isKindOfClass:[CCLabelTTF class]], \n        @\"node is not\
    \ a CCLabelTTF!\");\n\n    CCLabelTTF* label = (CCLabelTTF*)node;\n    label.scale\
    \ = CCRANDOM_0_1();\n}\n```\n\n在这个例子中，我们期望 `getChildByTag:` 返回的节点是一个派生自 `CCLabelTTF`\
    \ 的对象，但我们永远无法百分百确定，因此添加一个 `NSAssert` 来验证这一事实，有助于在错误导致崩溃之前发现它们。\n\n请注意，这增加了一行代码，但在性能方面没有什么变化。`NSAssert`\
    \ 的调用在 Release 版本中会被完全移除，而 `CCLabelTTF* label = (CCLabelTTF*)node;` 的转换操作我们之前已经做过，只是现在放在了单独的一行。本质上，两种版本的执行效果完全相同，但在第二种情况下，你获得了这样的好处：当你没有获得预期的\
    \ `CCLabelTTF` 对象时，你会收到通知，而不是因为 `EXC_BAD_ACCESS` 错误而崩溃。\n\n### 你还应了解的其他内容\n\n\
    由于这是“入门”章节，我认为有必要借此机会向你介绍一些 iOS 游戏开发中至关重要但常被忽视的方面。我希望你能意识到不同 iOS 设备之间的细微差别。特别是，可用内存常常被错误地考虑，因为你只能安全地使用每台设备内存的一部分。\n\
    \n我还想让你知道，iOS 模拟器是测试游戏的一个极好工具，但它不能用来评估性能、内存使用情况和其他特性。模拟器的体验可能与在实际 iOS 设备上运行游戏有很大不同。不要陷入基于游戏在\
    \ iOS 模拟器中的行为来做出评估的陷阱。只有设备本身才是评判的标准。\n"
- fmt: "# The iOS Devices\n\nWhen you develop for iOS devices, you need to take into\
    \ account their differences. Most independent and hobby game developers can’t\
    \ afford to purchase each slightly different iOS device, of which there are eight\
    \ at the time of this writing, with roughly two more to be released each year.\
    \ At the very least, you need to understand that there are important differences.\n\
    \nYou might want to refer to Apple’s spec sheets to familiarize yourself with\
    \ the iOS device technical specifications. The following links list the iPhone,\
    \ iPod touch, and iPad device specifications, respectively:\n\n*   [`http://support.apple.com/specs/#iphone`](http://support.apple.com/specs/#iphone)\n\
    *   [`http://support.apple.com/specs/#ipodtouch`](http://support.apple.com/specs/#ipodtouch)\n\
    *   [`http://support.apple.com/specs/#ipad`](http://support.apple.com/specs/#ipad)\n\
    \n[Table 2–1](#Chapter02.html#tab_2_1) summarizes the most important hardware\
    \ differences that concern game developers. The table lists iPod touch devices\
    \ by generation since Apple doesn’t use suffixes like “3G” for its iPod touch\
    \ models. This table serves to show that the iOS devices are not as homogenous\
    \ as you might expect. For example, it is noteworthy that the second-generation\
    \ iPod touch has a faster CPU than the second-generation iPhone 3G, but then the\
    \ fourth- generation iPod touch has only half the memory of the iPhone 4. And\
    \ the iPad 2 introduces for the first time a dual-core processor.\n\n![images](images/t0201.jpg)\n\
    \nAs you can see, with every new generation, iOS devices usually have a faster\
    \ CPU, a more powerful graphics chip, and increased memory and screen resolution.\
    \ This trend will continue, with newer devices getting more and more powerful.\
    \ If you plan to make money from iOS games, keep in mind that the older models\
    \ still have significant market share, and this changes only very slowly, much\
    \ slower than the rate at which new devices are released. Even today, if you do\
    \ not design your game to run on second-generation devices, you are giving up\
    \ a significant portion of the market!\n\nUsually when game developers look at\
    \ hardware features, they tend to focus on the CPU speed and graphics chip to\
    \ assess what’s technically possible. However, being mobile devices, the iOS devices\
    \ until the most recent iPhone 4 are limited mostly by the amount of available\
    \ RAM.\n\n**NOTE:** RAM is not to be confused with the flash storage memory where\
    \ MP3s, videos, apps, and photos are stored, of which even the smallest iOS device\
    \ has 8GB. Flash storage memory is equivalent to the hard drive on your desktop\
    \ computer. RAM is the memory your application uses to store code, data, and textures\
    \ while it’s running.\n\n## About Memory Usage\n\nCurrent iOS devices have 128MB,\
    \ 256MB, or 512MB of RAM installed. However, that’s not the amount of memory available\
    \ to apps. iOS uses a big chunk of memory all the time, and this is compounded\
    \ by iOS multitasking introduced with iOS 4. Each device running iOS 4 or newer\
    \ may be running various background tasks that use up an undefined additional\
    \ amount of memory.\n\nOver time, iOS developers have been able to close in on\
    \ the theoretical maximum amount of RAM an app can use before it’s forcibly closed\
    \ by the OS. [Table 2–2](#Chapter02.html#tab_2_2) shows what you can expect to\
    \ work with. Ideally, you want to keep your memory usage below the number in the\
    \ Memory Warning Threshold column at all times. This is especially challenging\
    \ on devices with only 128MB of RAM because there is only 20MB to 25MB of RAM\
    \ more or less guaranteed to be available for an app. Around that point your app\
    \ might start receiving Memory Warning notifications. You can ignore Memory Warning\
    \ Level 1 notifications, but if the app continues to use more memory, you may\
    \ get a Memory Warning Level 2 message, at which point the OS basically threatens\
    \ to close your app if you don’t free some memory right now. It’s like your mom\
    \ threatening not to buy your new computer if you don’t clean up your room right\
    \ now! Please oblige.\n\n![images](images/t0202.jpg)\n\nCocos2d can help you a\
    \ little with freeing memory by calling the `purge` methods. By adding the `purgeCachedData`\
    \ method to the `AppDelegate`’s `applicationDidReceiveMemoryWarning` method, you\
    \ can have cocos2d try to free up some more unused memory:\n\n```\n- (void)applicationDidReceiveMemoryWarning:(UIApplication\
    \ *)application {\n    [[CCTextureCache sharedTextureCache] removeUnusedTextures];\n\
    \    [[CCDirector sharedDirector] purgeCachedData];\n}\n```\n\nBut when your games\
    \ get more complex, you may need to implement your own scheme of handling Memory\
    \ Warning notifications. The problem inherent with Memory Warning notifications\
    \ is that they can cause performance glitches as your app frees big chunks of\
    \ memory. If you rely on the cocos2d mechanisms to do this, it may remove a sprite’s\
    \ texture from memory, but if within a few frames that sprite is needed again,\
    \ the texture will be reloaded during game play, which is slow. This can create\
    \ noticeable stutters, so having your own memory management scheme implemented\
    \ is preferable. You should be able to differentiate between textures that may\
    \ be needed again soon and those that aren’t needed at all right now. Unfortunately,\
    \ there’s no one size fits all solution—or I’d provide you with one.\n\nIf you\
    \ are developing on a device with 256MB or 512MB of memory, keep in mind that\
    \ a great number of iOS devices are models with only 128MB. Unless you plan to\
    \ limit your game to third-generation and newer iOS devices, you would do well\
    \ to buy a cheap, used, first- or second-generation device and test your game\
    \ primarily with that device in order to catch issues of excessive memory consumption\
    \ early. That’s when they are still easy and cheap to fix, especially if they\
    \ require a change in the game’s design. In general, it’s advisable to use the\
    \ device for development that’s the weakest one available to you in terms of hardware\
    \ capabilities. This helps you catch any performance or low-memory issues as early\
    \ as possible.\n\n**NOTE:** It’s also recommended that you test your app on a\
    \ multitasking-capable device that has a good number of background tasks running\
    \ in order to test for a worst-case scenario of background tasks using up additional\
    \ memory. Multitasking is available only for third-generation and newer devices,\
    \ which means only devices with 256MB of RAM are allowed to run apps in the background.\
    \ That’s good news, since the 128MB of the first- and second-generation devices\
    \ is barely enough for a single app. If you design for those devices, and I think\
    \ you should, you don’t have to worry too much about background tasks eating away\
    \ your app’s precious memory.\n\nOn devices with 128MB of RAM, you can at most\
    \ allocate around 35MB to 40MB memory. Keep in mind that this is only a theoretical\
    \ maximum; the number varies on each device and may even depend on which apps\
    \ the user had previously used. This is the reason app developers recommend rebooting\
    \ a device if you are experiencing crashes. It can free up some more memory. The\
    \ number-one cause for apps to quit unexpectedly is that the device ran out of\
    \ memory. So, be sure to be wary of your app’s memory usage and to frequently\
    \ reboot your devices when you get weird behavior.\n\nYou can measure memory usage\
    \ using the Instruments application, which is explained in Apple’s Instruments\
    \ User Guide: [`http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html`](http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html)."
  raw: '#### The iOS Devices


    When you develop for iOS devices, you need to take into account their differences.
    Most independent and hobby game developers can’t afford to purchase each slightly
    different iOS device, of which there are eight at the time of this writing, with
    roughly two more to be released each year. At the very least, you need to understand
    that there are important differences.


    You might want to refer to Apple’s spec sheets to familiarize yourself with the
    iOS device technical specifications. The following links list the iPhone, iPod
    touch, and iPad device specifications, respectively:


    *   [`http://support.apple.com/specs/#iphone`](http://support.apple.com/specs/#iphone)

    *   [`http://support.apple.com/specs/#ipodtouch`](http://support.apple.com/specs/#ipodtouch)

    *   [`http://support.apple.com/specs/#ipad`](http://support.apple.com/specs/#ipad)


    [Table 2–1](#Chapter02.html#tab_2_1) summarizes the most important hardware differences
    that concern game developers. The table lists iPod touch devices by generation
    since Apple doesn’t use suffixes like “3G” for its iPod touch models. This table
    serves to show that the iOS devices are not as homogenous as you might expect.
    For example, it is noteworthy that the second-generation iPod touch has a faster
    CPU than the second-generation iPhone 3G, but then the fourth- generation iPod
    touch has only half the memory of the iPhone 4\. And the iPad 2 introduces for
    the first time a dual-core processor.


    ![images](images/t0201.jpg)


    As you can see, with every new generation, iOS devices usually have a faster CPU,
    a more powerful graphics chip, and increased memory and screen resolution. This
    trend will continue, with newer devices getting more and more powerful. If you
    plan to make money from iOS games, keep in mind that the older models still have
    significant market share, and this changes only very slowly, much slower than
    the rate at which new devices are released. Even today, if you do not design your
    game to run on second-generation devices, you are giving up a significant portion
    of the market!


    Usually when game developers look at hardware features, they tend to focus on
    the CPU speed and graphics chip to assess what’s technically possible. However,
    being mobile devices, the iOS devices until the most recent iPhone 4 are limited
    mostly by the amount of available RAM.


    **NOTE:** RAM is not to be confused with the flash storage memory where MP3s,
    videos, apps, and photos are stored, of which even the smallest iOS device has
    8GB. Flash storage memory is equivalent to the hard drive on your desktop computer.
    RAM is the memory your application uses to store code, data, and textures while
    it’s running.


    #### About Memory Usage


    Current iOS devices have 128MB, 256MB, or 512MB of RAM installed. However, that’s
    not the amount of memory available to apps. iOS uses a big chunk of memory all
    the time, and this is compounded by iOS multitasking introduced with iOS 4\. Each
    device running iOS 4 or newer may be running various background tasks that use
    up an undefined additional amount of memory.


    Over time, iOS developers have been able to close in on the theoretical maximum
    amount of RAM an app can use before it’s forcibly closed by the OS. [Table 2–2](#Chapter02.html#tab_2_2)
    shows what you can expect to work with. Ideally, you want to keep your memory
    usage below the number in the Memory Warning Threshold column at all times. This
    is especially challenging on devices with only 128MB of RAM because there is only
    20MB to 25MB of RAM more or less guaranteed to be available for an app. Around
    that point your app might start receiving Memory Warning notifications. You can
    ignore Memory Warning Level 1 notifications, but if the app continues to use more
    memory, you may get a Memory Warning Level 2 message, at which point the OS basically
    threatens to close your app if you don’t free some memory right now. It’s like
    your mom threatening not to buy your new computer if you don’t clean up your room
    right now! Please oblige.


    ![images](images/t0202.jpg)


    Cocos2d can help you a little with freeing memory by calling the `purge` methods.
    By adding the `purgeCachedData` method to the `AppDelegate`’s `applicationDidReceiveMemoryWarning`
    method, you can have cocos2d try to free up some more unused memory:


    `- (void)applicationDidReceiveMemoryWarning:(UIApplication *)application {`

    `    [[CCTextureCache sharedTextureCache] removeUnusedTextures];`

    **`[[CCDirector sharedDirector] purgeCachedData];`**

    `}`


    But when your games get more complex, you may need to implement your own scheme
    of handling Memory Warning notifications. The problem inherent with Memory Warning
    notifications is that they can cause performance glitches as your app frees big
    chunks of memory. If you rely on the cocos2d mechanisms to do this, it may remove
    a sprite’s texture from memory, but if within a few frames that sprite is needed
    again, the texture will be reloaded during game play, which is slow. This can
    create noticeable stutters, so having your own memory management scheme implemented
    is preferable. You should be able to differentiate between textures that may be
    needed again soon and those that aren’t needed at all right now. Unfortunately,
    there’s no one size fits all solution—or I’d provide you with one.


    If you are developing on a device with 256MB or 512MB of memory, keep in mind
    that a great number of iOS devices are models with only 128MB. Unless you plan
    to limit your game to third-generation and newer iOS devices, you would do well
    to buy a cheap, used, first- or second-generation device and test your game primarily
    with that device in order to catch issues of excessive memory consumption early.
    That’s when they are still easy and cheap to fix, especially if they require a
    change in the game’s design. In general, it’s advisable to use the device for
    development that’s the weakest one available to you in terms of hardware capabilities.
    This helps you catch any performance or low-memory issues as early as possible.


    **NOTE:** It’s also recommended that you test your app on a multitasking-capable
    device that has a good number of background tasks running in order to test for
    a worst-case scenario of background tasks using up additional memory. Multitasking
    is available only for third-generation and newer devices, which means only devices
    with 256MB of RAM are allowed to run apps in the background. That’s good news,
    since the 128MB of the first- and second-generation devices is barely enough for
    a single app. If you design for those devices, and I think you should, you don’t
    have to worry too much about background tasks eating away your app’s precious
    memory.


    On devices with 128MB of RAM, you can at most allocate around 35MB to 40MB memory.
    Keep in mind that this is only a theoretical maximum; the number varies on each
    device and may even depend on which apps the user had previously used. This is
    the reason app developers recommend rebooting a device if you are experiencing
    crashes. It can free up some more memory. The number-one cause for apps to quit
    unexpectedly is that the device ran out of memory. So, be sure to be wary of your
    app’s memory usage and to frequently reboot your devices when you get weird behavior.


    You can measure memory usage using the Instruments application, which is explained
    in Apple’s Instruments User Guide: [`http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html`](http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html).'
  trans: "\n# iOS 设备\n\n在为 iOS 设备开发应用时，你需要考虑它们之间的差异。大多数独立及业余游戏开发者无力购买每一款略有不同的 iOS\
    \ 设备——截至本文撰写时，市面上已有八款设备，且每年大约还会发布两款新机型。但至少，你必须认识到它们之间存在重要差异。\n\n你可能需要查阅苹果的规格说明表，以熟悉\
    \ iOS 设备的技术规格。以下链接分别列出了 iPhone、iPod touch 和 iPad 的设备规格：\n\n*   [`http://support.apple.com/specs/#iphone`](http://support.apple.com/specs/#iphone)\n\
    *   [`http://support.apple.com/specs/#ipodtouch`](http://support.apple.com/specs/#ipodtouch)\n\
    *   [`http://support.apple.com/specs/#ipad`](http://support.apple.com/specs/#ipad)\n\
    \n表 2-1 总结了与游戏开发者相关的最重要的硬件差异。该表按代列出了 iPod touch 设备，因为苹果并未为 iPod touch 机型使用像“3G”这样的后缀。这张表旨在说明，iOS\
    \ 设备并非你想象的那样同质化。例如，值得注意的是，第二代 iPod touch 的 CPU 比第二代 iPhone 3G 更快，但第四代 iPod touch\
    \ 的内存却只有 iPhone 4 的一半。而 iPad 2 则首次引入了双核处理器。\n\n![images](img/t0201.jpg)\n\n如上所述，每一代新的\
    \ iOS 设备通常都拥有更快的 CPU、更强大的图形芯片，以及更大的内存和屏幕分辨率。这一趋势将持续下去，新设备会变得越来越强大。如果你想通过 iOS 游戏赚钱，请记住，旧款机型仍然占据着相当大的市场份额，而且这种变化非常缓慢，远低于新设备的发布速度。即便在今天，如果你不设计能在第二代设备上运行的游戏，你将放弃相当大一部分市场！\n\
    \n通常，当游戏开发者审视硬件特性时，他们倾向于关注 CPU 速度和图形芯片，以评估技术上的可能性。然而，作为移动设备，在最新款 iPhone 4 之前，iOS\
    \ 设备主要受限于可用 RAM 的大小。\n\n**注意：** 不要将 RAM 与存储 MP3、视频、应用和照片的闪存存储混淆，即便是容量最小的 iOS 设备也有\
    \ 8GB 闪存。闪存存储相当于台式电脑的硬盘。RAM 则是你的应用程序在运行时用于存储代码、数据和纹理的内存。\n\n## 关于内存使用\n\n目前的 iOS\
    \ 设备配备有 128MB、256MB 或 512MB 的 RAM。然而，这并非应用可用的内存量。iOS 系统本身会持续占用大量内存，而 iOS 4 引入的多任务功能则加剧了这种情况。每台运行\
    \ iOS 4 或更新系统的设备，都可能同时运行着各种后台任务，它们会消耗数量不确定的额外内存。\n\n随着时间的推移，iOS 开发者已经能够接近应用在被操作系统强制关闭前所能使用的理论最大\
    \ RAM 量。表 2-2 展示了你可预期的可用内存。理想情况下，你应始终将内存使用量保持在“内存警告阈值”列所列数值以下。对于仅有 128MB RAM 的设备而言，这一点尤其具有挑战性，因为基本上只能保证有\
    \ 20MB 到 25MB 的内存可供应用使用。接近这个临界点时，你的应用可能会开始收到内存警告通知。你可以忽略一级内存警告，但如果应用继续消耗更多内存，你可能会收到二级内存警告消息，此时操作系统基本上会威胁说，如果你不立即释放一些内存，就会关闭你的应用。这就像你妈妈威胁说，如果你不马上打扫房间，就不给你买新电脑一样！请务必配合。\n\
    \nCocos2d 可以通过调用 `purge` 方法在一定程度上帮助你释放内存。通过在 `AppDelegate` 的 `applicationDidReceiveMemoryWarning`\
    \ 方法中添加 `purgeCachedData` 方法，你可以让 cocos2d 尝试释放一些不再使用的内存：\n\n```\n- (void)applicationDidReceiveMemoryWarning:(UIApplication\
    \ *)application {\n    [[CCTextureCache sharedTextureCache] removeUnusedTextures];\n\
    \    [[CCDirector sharedDirector] purgeCachedData];\n}\n```\n\n但当你的游戏变得越来越复杂时，你可能需要实现自己的方案来处理内存警告通知。内存警告通知固有的问题是，当你的应用释放大块内存时，可能会导致性能卡顿。如果你依赖\
    \ cocos2d 的机制来做这件事，它可能会从内存中移除一个精灵的纹理，但如果几帧之后又需要这个精灵，则需要在游戏过程中重新加载纹理，这很慢。这会产生明显的卡顿，因此最好实现你自己的内存管理方案。你应该能够区分哪些纹理很快会再次需要，哪些当前完全不需要。遗憾的是，没有一种万能的解决方案——否则我肯定会提供给你。\n\
    \n如果你正在使用 256MB 或 512MB 内存的设备进行开发，请记住，有大量 iOS 设备型号仅有 128MB 内存。除非你计划将游戏限制在第三代及更新的\
    \ iOS 设备上，否则最好购买一台便宜的二手第一代或第二代设备，并主要在该设备上测试你的游戏，以便尽早发现内存过度消耗的问题。此时修复问题仍然简单且便宜，尤其是当问题需要对游戏设计进行修改时。一般来说，建议使用你手中硬件性能最弱的设备进行开发。这有助于你尽早发现任何性能或内存不足的问题。\n\
    \n**注意：** 还建议你在一台具备多任务处理能力且运行着大量后台任务的设备上测试你的应用，以便测试后台任务占用额外内存的最坏情况。只有第三代及更新的设备才支持多任务处理，这意味着只有\
    \ 256MB RAM 的设备才允许在后台运行应用。这是个好消息，因为第一代和第二代设备 128MB 的内存对于单个应用来说都勉强够用。如果你为这些设备进行设计（我认为你应该这样做），那么你就不必太担心后台任务会消耗掉应用宝贵的内存。\n\
    \n对于 128MB RAM 的设备，你最多可以分配约 35MB 到 40MB 的内存。请记住，这只是一个理论最大值；实际数值因设备而异，甚至可能取决于用户之前使用过哪些应用。这就是应用开发者建议在遇到崩溃时重启设备的原因。重启可以释放一些额外的内存。导致应用意外退出的首要原因就是设备内存耗尽。因此，务必警惕应用的内存使用情况，并在遇到异常行为时频繁重启设备。\n\
    \n你可以使用 Instruments 应用来测量内存使用情况，详细介绍请参见苹果的《Instruments 用户指南》：[`http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html`](http://developer.apple.com/iphone/library/documentation/DeveloperTools/Conceptual/InstrumentsUserGuide/Introduction/Introduction.html)。\n"
- fmt: '#### The iOS Simulator


    Apple’s iOS SDK allows you to run and test iPhone and iPad applications on your
    Mac with the iOS Simulator. The primary purpose of the iOS Simulator is to let
    you more rapidly test your application because deployment to an iOS device takes
    longer and longer as your game gets bigger and bigger. Games in particular use
    a lot of images and other assets that need to be transferred, slowing down deployment.


    However, there are several caveats to using the iOS Simulator. The following sections
    reveal what the iOS Simulator does not allow you to do. For all these reasons,
    it is recommended that you test your game early and often on a device. At least
    after every major change or near the end of the day, you should run a test on
    your iOS device to verify that the game behaves exactly as intended.


    ##### Can’t Assess Performance


    The performance of your game running in the iOS Simulator depends entirely on
    your computer’s CPU. The graphics-rendering process does not even use the hardware
    acceleration capabilities of your Mac’s graphics chip. That’s why the framerate
    of your game running in the simulator has no meaning at all. You can’t even be
    sure that comparing the framerate before and after a change will reveal the same
    results on the device. In extreme cases, the framerate in the simulator may go
    up even as it goes down on the device. Always do your performance testing on the
    device, using the Release build configuration.


    ##### Can’t Assess Memory Usage


    The iOS Simulator is able to use all the memory available on your computer, so
    there’s a lot more memory available on the simulator than on the device. This
    means you won’t get Memory Warning notifications and your game will run fine on
    the iOS Simulator, but you may be in for a shock (a crash) when you try the game
    for the first time on an iOS device.


    You can, however, assess how much memory is currently used by your game using
    the iOS Simulator.


    ##### Can’t Use All iOS Device Features


    Some features, such as device orientation, can be simulated using menu items or
    keyboard shortcuts, but this comes nowhere close to the experience of a real device.
    And certain hardware features, such as multitouch input, accelerometer, vibration,
    or obtaining location information can’t be tested at all on the iOS Simulator
    because your computer’s hardware can’t simulate these features. No, it doesn’t
    help to shake your Mac or touch its screen. Try it if you don’t believe me.


    **TIP:** The iSimulate app (`www.vimov.com/isimulate`) is an invaluable development
    tool, as it allows an iOS device to send accelerometer, GPS, compass and multi-touch
    events to an app running in the iOS Simulator.


    ##### Runtime Behavior Can Differ


    From time to time you may encounter nasty cases where a game runs just fine on
    the iOS Simulator but crashes on the device or the game slows down for no apparent
    reason. There may also be graphical glitches that appear only on the iOS Simulator
    or only on the device. If in doubt and before delving into a prolonged quest to
    figure out what’s wrong, always try running your game on the device if you’re
    having trouble on the iOS Simulator, or vice versa. Sometimes, the problem may
    just go away, but if not, you may get a hint about what’s going on.


    #### About Logging


    By default, an Xcode project will have two build configurations named Debug and
    Release. The main difference between the two is that only in Debug builds are
    certain functions like `CCLOG` compiled. This is typically controlled by preprocessor
    macros like `DEBUG` and `COCOS2D_DEBUG`, which control the level of debugging
    code built into the app. That’s the single most important factor when it comes
    to performance variations between Debug and Release builds.


    **NOTE:** The `CCLOG` macro wraps Apple’s `NSLog` method so that `CCLOG` is compiled
    only in Debug builds but omitted in Release builds. I recommend using `CCLOG`
    in place of `NSLog` because logging is for your eyes only. `NSLog` can slow down
    your published game because it will be run even in Release builds!


    One `NSLog` or `CCLOG` in the wrong place can spam the Debugger Console window
    with logging messages, causing slowdowns and lag. Logging is very slow, and a
    continuous stream of log messages printed to the Debugger Console can drag your
    game’s performance down to a crawl. If you suspect your game’s performance to
    be particularly slow in Debug builds, always check the Debugger Console for excessive
    logging activities. From the `Run` menu in Xcode, select `Console` to show the
    Debugger Console window.


    The exclusion of logging and typically better code optimization settings are the
    main reason you should only use Release builds to test your game’s performance.


    ### Summary


    Wow, that was a lot for a “Getting Started” chapter! In the first part of this
    chapter you learned to download and set up all the necessary tools to the point
    where you had your first cocos2d template project running.


    I then walked you through the workings of the template project to get you up to
    speed with how an iOS cocos2d application works in principle and somewhat in detail
    as well. I do have a pet peeve about proper memory management, which is why I
    also included those details. I think it’s important because it’s easy to misunderstand
    or even completely ignore memory management, and then you might be building your
    game on a very crumbly foundation.


    I did manage to sneak in a short “do it yourself” section to at least show you
    how touch input is done in cocos2d and how cocos2d objects are stored and retrieved.


    Finally, I thought it important to give you the details about the various iOS
    devices and what you can expect in terms of available memory. I also discussed
    the simulator and how it differs for testing your game compared with testing it
    on a device.


    In the next chapter, you’ll learn all the essential features of cocos2d, which
    will bring you closer to making a complete cocos2d game.


    ## Chapter 3


    ## Essentials


    This chapter will introduce you to the essential building blocks of the cocos2d
    game engine. You’ll be using most of these classes in every game you create, so
    understanding what’s available and how these classes work together will help you
    write better games. Armed with this knowledge, you’ll find it a lot easier to
    start working with cocos2d.


    Accompanying this chapter is an Xcode project named Essentials that includes everything
    I discuss here plus additional examples. The source code is full of comments,
    so you can read it as if it were an appendix to the book.


    We’ll start with a high-level overview of the cocos2d game engine architecture.
    Every game engine is different in the way game objects are managed and presented
    on the screen. It’s best to begin with an understanding of what the individual
    elements are and how they fit together.'
