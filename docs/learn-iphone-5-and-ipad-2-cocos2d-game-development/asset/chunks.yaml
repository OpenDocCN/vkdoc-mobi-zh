- fmt: '### Download and Install the iOS SDK


    As a registered iOS developer, you can download the latest iOS SDK from the iOS
    Dev Center. The download is well over 4GB and will take a while to download and
    install, so you might want to do it right away.


    After the installation of the iOS SDK is complete, you are set with everything
    you need to develop iOS applications, including the Xcode integrated development
    environment (IDE). If you’ve never worked with Xcode before, I suggest you familiarize
    yourself with it. I recommend *Learn Xcode Tools for Mac OS X and iPhone Development*
    by Ian Piper (Apress, 2010).


    **CAUTION:** It may be tempting to be at the bleeding edge of iOS SDK development.
    From time to time, beta versions of the iOS SDK are made available. I recommend
    not using iOS SDK beta versions unless you have a very, very good reason to do
    so!


    Beta versions can contain bugs, they may be incompatible with the current cocos2d
    version, and they are under NDA. This means it’s hard to find solutions if any
    issue related to the beta version arises, since no one is allowed to discuss the
    beta SDK in public.


    Moreover, you have to install a beta version of the iOS to your device, and you
    can’t revert to a previous iOS version. Installed apps on your device may be incompatible
    with the new iOS beta, and they usually aren’t updated until the new iOS SDK is
    officially released. If you rely on any apps to do your work, don’t upgrade.


    ### Download and Install cocos2d


    The next step is to get cocos2d. You can download it from [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download).
    Since many new developers continue to have issues with the template installation
    script, I also provide an installer for cocos2d and cocos3d that runs the template
    installation script for you. You can download the installer on Cocos2d Central:
    [`http://cocos2d-central.com/files/file/6-installer`](http://cocos2d-central.com/files/file/6-installer).


    I recommend downloading and extracting the Stable version of cocos2d. The Unstable
    version doesn’t mean it’s going to crash all the time, but it is a beta version.
    It’ll work just fine in general, but it may have some rough edges, untested features,
    and incompatibilities with third-party tools. Before you consider the Unstable
    version, please review the release notes to see whether it contains anything of
    particular use to you. If not, just stick to the Stable version.


    After downloading and extracting cocos2d, you’ll have a subfolder named `cocos2d-iphone-1.0.1`
    or similar, depending on the exact version number of cocos2d you downloaded.


    #### Install cocos2d Xcode Project Templates


    **NOTE:** If you used my cocos2d/cocos3d installer, you can skip this section.
    The Xcode project templates have already been installed by the installer.


    Open the Terminal app, which you’ll find in the Utilities folder of your Applications
    folder on your Mac. Or just enter `Terminal.app` in Spotlight to locate it. The
    cocos2d Xcode project templates installation procedure is driven by a shell script
    that you’ll have to run from the command-line program Terminal.


    First, change to the directory where cocos2d is installed. For example, if your
    cocos2d version is installed under Documents in the folder `cocos2d-iphone-1.0.0`,
    then enter the following:


    `cd ~/Documents/cocos2d-iphone-1.0.0`


    Press Return to change into the cocos2d directory and then enter the following:


    `./install-templates.sh –f -u`


    Press Return to run the template installation script. If everything goes fine,
    you should see a number of lines printed on the Terminal window. Most of them
    will start with “…copying.” If that’s the case, the templates should now be installed.


    If you get any kind of error, verify that you have changed into the `cocos2d-iphone`
    directory with the `cd` command and that the command for the `install-templates.sh`
    script is correct, including spaces between the command and the `–f` and `–u`
    options. If that does not help, consider using the cocos2d installer I created
    to alleviate exactly such dreaded template installation problems. You can download
    the installer from here:


    `cocos2d-central.com/files/file/6-installer`


    #### Create a cocos2d Application


    Now open Xcode and select **File ![images](images/U001.jpg) New Project**. Under
    User Templates you should see the cocos2d project templates, as shown in [Figure
    2–1](#Chapter02.html#fig_2_1).


    **NOTE:** The Box2d and Chipmunk application templates will be discussed in [Chapter
    13](#Chapter13.html#ch13). Feel free to try them if you want to have some fun
    with physics right now.


    ![images](images/0201.jpg)


    **Figure 2–1.** *The cocos2d Xcode project templates*


    Choose the cocos2d Application template and name it `HelloWorld`.


    **TIP:** It is good practice not to use space characters in project names. Xcode
    doesn’t mind, but some tools you might use could. It’s just a matter of defensively
    avoiding any potential hiccups.


    For a very, very long time, programmers who built operating systems and applications
    could rely on file names not containing spaces. Even today, after modern operating
    systems have allowed spaces in file names for at least the past 10 years, there
    are occasional problems related to spaces and special characters in file names.
    I always avoid naming anything code-related, whether projects, source files, or
    resources, with spaces or other special characters. Only numbers, digits, and
    the minus sign and underscore are guaranteed safe for developers to use in file
    names.


    Xcode will create the project based on the template. An Xcode project window like
    the one in [Figure 2–2](#Chapter02.html#fig_2_2) will open.


    ![images](images/0202.jpg)


    **Figure 2–2.** *The newly created HelloWorld project in Xcode 4*


    When you click the **Run** button, the project will build and then run in the
    iOS Simulator. The result should look like [Figure 2–3](#Chapter02.html#fig_2_3).


    ![images](images/0203.jpg)


    **Figure 2–3.** *Success! The template project works and displays a “Hello World”
    label running in the iPhone Simulator.*


    ### The HelloWorld Application


    So here we are—with minimal fuss you created a running cocos2d application. Perfect.
    Say no more. Say no more.


    But now you want to know how it works, right? Well, I didn’t expect you’d let
    me off the hook so easily. And something tells me that, however deep I go into
    the details over the course of the book, you’ll want to know more. That’s the
    spirit!


    Let’s check what’s in the HelloWorld code project and see how it all works so
    you get a rough overview of how things are connected. Feel free to play around
    with this HelloWorld project. If anything breaks, you can just start over with
    a new project created from the cocos2d template. Over the course of this book,
    you’ll learn all the details about cocos2d and the settings first mentioned in
    this chapter.'
