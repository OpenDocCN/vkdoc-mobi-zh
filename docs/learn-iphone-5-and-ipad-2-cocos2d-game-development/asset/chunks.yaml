- fmt: "方向变化的实际处理由`RootViewController`类负责，cocos2d也在`applicationDidFinishLaunching`方法中初始化了该类。让我们查看`RootViewController`类的实现，并专门添加`shouldAutorotateToInterfaceOrientation`方法，该方法由UIKit框架调用，以查询此特定`UIViewController`支持哪些界面方向。该方法仅对支持的方向返回`YES`，如果它不支持旋转到给定的`interfaceOrientation`，则返回`NO`。\n\
    \n```\n-(BOOL) shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n#if GAME_AUTOROTATION == kGameAutorotationNone\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n#elif GAME_AUTOROTATION == kGameAutorotationCCDirector\n\
    \    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft)\n    {\n\
    \        [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeRight];\n\
    \    }\n    else if (interfaceOrientation == UIInterfaceOrientationLandscapeRight)\n\
    \    {\n        [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];\n\
    \    }\n    return (interfaceOrientation == UIInterfaceOrientationPortrait);\n\
    #elif GAME_AUTOROTATION == kGameAutorotationUIViewController\n    return (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    #endif // GAME_AUTOROTATION\n    return NO;\n}\n```\n\n上述代码是你在`RootViewController`类中找到的代码的清理版本。我移除了所有注释，使代码更简洁易读，因为在`RootViewController`类中，它看起来比实际更复杂。\n\
    \n同样，这段代码使用`GameConfig.h`中设置的当前`GAME_AUTOROTATION`配置，从三个可能的代码路径中选择一个。如果自动旋转支持设置为`kGameAutorotationNone`，则仅当方向为竖屏模式时，该方法返回`YES`。如果你的应用实际使用的是横屏方向，这可能看起来有点奇怪。实际上，你也可以直接返回`NO`或调用`super`实现并返回该值。这并不重要，因为如果使用`kGameAutorotationNone`，不会发生自动旋转。当然，你仍然可以随时手动调用`CCDirectorsetDeviceOrientation`方法来改变方向。\n\
    \n如果启用了`kGameAutorotationCCDirector`模式，则会调用导演的`setDeviceOrientation`方法，将设备方向更改为支持的`interfaceOrientation`模式之一。例如，如果你想支持所有四个方向，或者支持竖屏方向而不是横屏方向，你需要相应地扩展代码，使用对应的受支持的设备方向调用`setDeviceOrientation`。如果你的应用是为竖屏方向而非横屏方向设计的，以下是你会使用的代码：\n\
    \n```\nif (interfaceOrientation == UIInterfaceOrientationPortrait)\n{\n    [[CCDirector\
    \ sharedDirector] setDeviceOrientation:kCCDeviceOrientationPortrait];\n}\nelse\
    \ if (interfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)\n{\n \
    \   [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationPortraitUpsideDown];\n\
    }\n```\n\n**注意：**你可能已经注意到，如果`interfaceOrientation`是`UIInterfaceOrientationLandscapeLeft`，设备方向实际上被设置为看似相反的`kCCDeviceOrientationLandscapeRight`模式。这并非错误，而是`UIInterfaceOrientation`和`UIDeviceOrientation`枚举在定义上的差异。\n\
    \n使用`setDeviceOrientations`方法设置设备方向有一个缺点：它不会旋转UIKit视图。如果你在应用中使用任何UIKit视图，并且希望它们自动旋转，你将不得不使用`kGameAutorotationViewController`设置。默认情况下，仅支持横屏方向：\n\
    \n```\n// support all landscape orientations\nreturn (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    ```\n\n你可以轻松更改以仅支持竖屏方向：\n\n```\n// support all portrait orientations\nreturn (UIInterfaceOrientationIsPortrait(interfaceOrientation));\n\
    ```\n\n你甚至可以声明支持所有方向：\n\n```\n// support all four orientations\nreturn (UIInterfaceOrientationIsLandscape(interfaceOrientation)\
    \ ||\n    UIInterfaceOrientationIsPortrait(interfaceOrientation));\n```\n\n在后一种情况下，你可以直接返回`YES`。但视图控制器如何执行实际的自动旋转呢？实际的旋转发生在`RootViewController`类的`willRotateToInterfaceOrientation`方法中，如[列表\
    \ 15–6](#Chapter15.html#list_15_6)所示。\n\n**列表 15–6.** *执行 cocos2d 视图的旋转*\n\n```\n\
    #if GAME_AUTOROTATION == kGameAutorotationUIViewController\n-(void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\n\
    \                                duration:(NSTimeInterval)duration\n{\n    CGRect\
    \ screenRect = [UIScreen mainScreen].bounds;\n    CGRect rect = CGRectZero;\n\n\
    \    if (toInterfaceOrientation == UIInterfaceOrientationPortrait ||\n       \
    \ toInterfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)\n    {\n\
    \        rect = screenRect;\n    }\n    else if (toInterfaceOrientation == UIInterfaceOrientationLandscapeLeft\
    \ ||\n        toInterfaceOrientation == UIInterfaceOrientationLandscapeRight)\n\
    \    {\n        rect.size = CGSizeMake(screenRect.size.height, screenRect.size.width);\n\
    \    }\n\n    CCDirector* director = [CCDirector sharedDirector];\n    EAGLView*\
    \ glView = director.openGLView;\n    float contentScaleFactor = [director contentScaleFactor];\n\
    \n    if (contentScaleFactor != 1)\n    {\n        rect.size.width *= contentScaleFactor;\n\
    \        rect.size.height *= contentScaleFactor;\n    }\n\n    glView.frame =\
    \ rect;\n}\n#endif // GAME_AUTOROTATION == kGameAutorotationUIViewController\n\
    ```\n\n本质上，通过`director.openGLView`获取的cocos2d `EAGLView`，其`frame`属性会更新为新的屏幕尺寸。而这个新屏幕尺寸就是`[UIScreen\
    \ mainScreen].bounds`属性返回的值。这段代码为你处理的唯一事情是，在横屏方向下，高度实际上是新`EAGLView`帧的宽度，反之亦然。当然，它通过将`rect.size.width`和`rect.size.height`乘以`contentScaleFactor`来考虑Retina显示模式。你实际上不需要完全理解这段代码，因为你几乎不需要更改它。你唯一需要知道的是，这段代码假设cocos2d视图是全屏的。\n\
    \n名为`CocosWithCocoa06`的项目对`RootViewController`和自动旋转进行了一些更改。例如，即使在第一代和第二代设备上，它也默认支持`UIViewController`。如果你拥有这些设备之一，你会看到屏幕自动旋转，并且你可能想将其性能与之前的`CocosWithCocoa05`项目进行比较。此外，`RootViewController`类的代码已被清理，并包含了启用竖屏或所有四个方向自动旋转支持的示例代码。\n\
    \n### 在 Cocoa Touch 应用中嵌入 cocos2d 视图\n\n许多开发者没有意识到，实际上可以将cocos2d视图嵌入到使用UIKit视图作为主要元素的常规应用程序中。cocos2d视图甚至不必是全屏的！\n\
    \n问题仅在于项目设置。我想向你展示如何实现。"
  raw: 'The actual handling of orientation changes is the responsibility of the `RootViewController`
    class, which cocos2d also initializes in the `applicationDidFinishLaunching` method.
    Let’s take a look at the `RootViewController` class implementation and specifically
    add the `shouldAutorotateToInterfaceOrientation` method, which is called by the
    UIKit framework in order to query which interface orientations are supported by
    this particular `UIViewController`. The method returns `YES` only for those orientations
    it supports, and it returns `NO` if it does not support rotation to the given
    `interfaceOrientation`.


    `-(BOOL) shouldAutorotateToInterfaceOrientation:`![image](images/U002.jpg)

    `    (UIInterfaceOrientation)interfaceOrientation`

    `{`

    `#if GAME_AUTOROTATION == kGameAutorotationNone`


    `    return (interfaceOrientation == UIInterfaceOrientationPortrait);`


    `#elif GAME_AUTOROTATION == kGameAutorotationCCDirector`


    `    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft)`

    `    {`

    `        [[CCDirector sharedDirector]`![image](images/U002.jpg)

    `            setDeviceOrientation:kCCDeviceOrientationLandscapeRight];`

    `    }`

    `    else if (interfaceOrientation == UIInterfaceOrientationLandscapeRight)`

    `    {`

    `        [[CCDirector sharedDirector]`![image](images/U002.jpg)

    `            setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];`

    `    }`

    `    return (interfaceOrientation == UIInterfaceOrientationPortrait);`


    `#elif GAME_AUTOROTATION == kGameAutorotationUIViewController`


    `    return (UIInterfaceOrientationIsLandscape(interfaceOrientation));`


    `#endif // GAME_AUTOROTATION`


    `    return NO;`

    `}`


    The previous code is a cleaned-up version of the code you’ll find in the `RootViewController`
    class. I removed all comments and made the code more concise and readable, because
    in the `RootViewController` class it looks more daunting than it actually is.


    Once again, this code uses the current `GAME_AUTOROTATION` setting set in GameConfig.h
    to pick one of three possible code paths. If autorotation support is set to `kGameAutorotationNone`,
    the method returns `YES` only if the orientation is the portrait mode. This may
    seem a bit strange if your app is actually using the landscape orientation. In
    fact, you could just as well return `NO` here or call the `super` implementation
    and return that value. It doesn’t matter because if `kGameAutorotationNone` is
    used, no autorotation takes place. Of course, you can still call the `CCDirectorsetDeviceOrientation`
    method manually at any time to change the orientation.


    If the `kGameAutorotationCCDirector` mode is in effect, the director’s `setDeviceOrientation`
    method is called to change the device orientation to one of the supported `interfaceOrientation`
    modes. If you wanted to support all four orientations, for example, or both portrait
    orientations instead of landscape orientations, you would have to extend the code
    accordingly to call `setDeviceOrientation` with the corresponding and supported
    device orientation. Here’s the code you would use if your app were designed for
    portrait orientations instead of landscape orientations:


    `if (interfaceOrientation == UIInterfaceOrientationPortrait)`

    `{`

    `    [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationPortrait];`

    `}`

    `else if (interfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)`

    `{`

    `    [[CCDirector sharedDirector]`![image](images/U002.jpg)

    `        setDeviceOrientation:kCCDeviceOrientationPortraitUpsideDown];`

    `}`


    **NOTE:** You may have noticed that if the `interfaceOrientation` is `UIInterfaceOrientationLandscapeLeft`,
    the device orientation is actually set to the seemingly opposing `kCCDeviceOrientationLandscapeRight`
    mode. This is not a mistake but a difference in definition in the `UIInterfaceOrientation`
    and `UIDeviceOrientation` enums.


    Setting the device orientation with the `setDeviceOrientations` method has one
    drawback: it won’t rotate UIKit views. If you use any UIKit views in your app
    and you want them to autorotate, you will have to use the `kGameAutorotationViewController`
    setting. By default only landscape orientations are supported:


    `// support all landscape orientations`

    `return (UIInterfaceOrientationIsLandscape(interfaceOrientation));`


    You can easily change that to support only portrait orientations:


    `// support all portrait orientations`

    `return (UIInterfaceOrientationIsPortrait(interfaceOrientation));`


    Or you can even signal that you support all orientations:


    `// support all four orientations`

    `return (UIInterfaceOrientationIsLandscape(interfaceOrientation) ||`![image](images/U002.jpg)

    `    UIInterfaceOrientationIsPortrait(interfaceOrientation));`


    In the latter case, you could just return `YES`. But how does the view controller
    perform the actual autorotation? The actual rotation happens in the `willRotateToInterfaceOrientation`
    method in the `RootViewController` class, shown in [Listing 15–6](#Chapter15.html#list_15_6).


    **Listing 15–6.** *Performing the Rotation of the cocos2d View*


    `#if GAME_AUTOROTATION == kGameAutorotationUIViewController`

    `-(void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation`

    `                                duration:(NSTimeInterval)duration`

    `{`

    `    CGRect screenRect = [UIScreen mainScreen].bounds;`

    `    CGRect rect = CGRectZero;`


    `    if (toInterfaceOrientation == UIInterfaceOrientationPortrait ||`![image](images/U002.jpg)

    `        toInterfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)`

    `    {`

    `        rect = screenRect;`

    `    }`

    `    else if (toInterfaceOrientation == UIInterfaceOrientationLandscapeLeft ||`![image](images/U002.jpg)

    `        toInterfaceOrientation == UIInterfaceOrientationLandscapeRight)`

    `    {`

    `        rect.size = CGSizeMake(screenRect.size.height, screenRect.size.width);`

    `    }`


    `    CCDirector* director = [CCDirector sharedDirector];`

    `    EAGLView* glView = director.openGLView;`

    `    float contentScaleFactor = [director contentScaleFactor];`


    `    if (contentScaleFactor != 1)`

    `    {`

    `        rect.size.width *= contentScaleFactor;`

    `        rect.size.height *= contentScaleFactor;`

    `    }`


    `    glView.frame = rect;`

    `}`

    `#endif // GAME_AUTOROTATION == kGameAutorotationUIViewController`


    In essence, the cocos2d `EAGLView` obtained via `director.openGLView` gets its
    frame property updated with the new screen size. And that is the new screen size
    returned from the `[UIScreen mainScreen].bounds` property. The only thing that
    this code sorts out for you is that in landscape orientations the height is actually
    the new `EAGLView` frame’s width, and vice versa. And of course, it takes the
    Retina display mode into account by multiplying `rect.size.width` and `rect.size.height`
    with the `contentScaleFactor`. You don’t actually need to understand the code
    in full since you’ll hardly ever need to change it. The only thing you should
    know is that the code assumes that the cocos2d view is in full-screen.


    The project named CocosWithCocoa06 has some changes regarding the `RootViewController`
    and autorotation. For example, it defaults to support the `UIViewController` even
    on first- and second-generation devices. If you have one of those, you’ll see
    the screen autorotate, and you might want to compare its performance with the
    previous CocosWithCocoa05project. Additionally, the `RootViewController` class
    code is cleaned up and contains the example code to enable autorotation support
    for portrait or all four orientations.


    ### Embedding the cocos2d View in Cocoa Touch Apps


    Many developers don’t realize it is actually possible to embed a cocos2d view
    in a regular application using UIKit views as its main elements. The cocos2d view
    doesn’t even have to be full-screen!


    The problem merely lies in setting up the project. I’d like to show you how it’s
    done.'
  trans: "\n方向变化的实际处理由`RootViewController`类负责，cocos2d 也在`applicationDidFinishLaunching`方法中初始化了该类。让我们查看`RootViewController`类的实现，并专门添加`shouldAutorotateToInterfaceOrientation`方法，该方法由\
    \ UIKit 框架调用，以查询此特定`UIViewController`支持哪些界面方向。该方法仅对支持的方向返回`YES`，如果它不支持旋转到给定的`interfaceOrientation`，则返回`NO`。\n\
    \n```\n-(BOOL) shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n#if GAME_AUTOROTATION == kGameAutorotationNone\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n#elif GAME_AUTOROTATION == kGameAutorotationCCDirector\n\
    \    if (interfaceOrientation == UIInterfaceOrientationLandscapeLeft)\n    {\n\
    \        [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeRight];\n\
    \    }\n    else if (interfaceOrientation == UIInterfaceOrientationLandscapeRight)\n\
    \    {\n        [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationLandscapeLeft];\n\
    \    }\n    return (interfaceOrientation == UIInterfaceOrientationPortrait);\n\
    #elif GAME_AUTOROTATION == kGameAutorotationUIViewController\n    return (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    #endif // GAME_AUTOROTATION\n    return NO;\n}\n```\n\n上述代码是你在`RootViewController`类中找到的代码的清理版本。我移除了所有注释，使代码更简洁易读，因为在`RootViewController`类中，它看起来比实际更复杂。\n\
    \n同样，这段代码使用`GameConfig.h`中设置的当前`GAME_AUTOROTATION`配置，从三个可能的代码路径中选择一个。如果自动旋转支持设置为`kGameAutorotationNone`，则仅当方向为竖屏模式时，该方法返回`YES`。如果你的应用实际使用的是横屏方向，这可能看起来有点奇怪。实际上，你也可以直接返回`NO`或调用`super`实现并返回该值。这并不重要，因为如果使用`kGameAutorotationNone`，不会发生自动旋转。当然，你仍然可以随时手动调用`CCDirectorsetDeviceOrientation`方法来改变方向。\n\
    \n如果启用了`kGameAutorotationCCDirector`模式，则会调用导演的`setDeviceOrientation`方法，将设备方向更改为支持的`interfaceOrientation`模式之一。例如，如果你想支持所有四个方向，或者支持竖屏方向而不是横屏方向，你需要相应地扩展代码，使用对应的受支持的设备方向调用`setDeviceOrientation`。如果你的应用是为竖屏方向而非横屏方向设计的，以下是你会使用的代码：\n\
    \n```\nif (interfaceOrientation == UIInterfaceOrientationPortrait)\n{\n    [[CCDirector\
    \ sharedDirector] setDeviceOrientation:kCCDeviceOrientationPortrait];\n}\nelse\
    \ if (interfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)\n{\n \
    \   [[CCDirector sharedDirector] setDeviceOrientation:kCCDeviceOrientationPortraitUpsideDown];\n\
    }\n```\n\n**注意：**你可能已经注意到，如果`interfaceOrientation`是`UIInterfaceOrientationLandscapeLeft`，设备方向实际上被设置为看似相反的`kCCDeviceOrientationLandscapeRight`模式。这并非错误，而是`UIInterfaceOrientation`和`UIDeviceOrientation`枚举在定义上的差异。\n\
    \n使用`setDeviceOrientations`方法设置设备方向有一个缺点：它不会旋转 UIKit 视图。如果你在应用中使用任何 UIKit 视图，并且希望它们自动旋转，你将不得不使用`kGameAutorotationViewController`设置。默认情况下，仅支持横屏方向：\n\
    \n```\n// support all landscape orientations\nreturn (UIInterfaceOrientationIsLandscape(interfaceOrientation));\n\
    ```\n\n你可以轻松更改以仅支持竖屏方向：\n\n```\n// support all portrait orientations\nreturn (UIInterfaceOrientationIsPortrait(interfaceOrientation));\n\
    ```\n\n你甚至可以声明支持所有方向：\n\n```\n// support all four orientations\nreturn (UIInterfaceOrientationIsLandscape(interfaceOrientation)\
    \ ||\n    UIInterfaceOrientationIsPortrait(interfaceOrientation));\n```\n\n在后一种情况下，你可以直接返回`YES`。但视图控制器如何执行实际的自动旋转呢？实际的旋转发生在`RootViewController`类的`willRotateToInterfaceOrientation`方法中，如列表\
    \ 15–6 所示。\n\n**列表 15–6.** *执行 cocos2d 视图的旋转*\n\n```\n#if GAME_AUTOROTATION ==\
    \ kGameAutorotationUIViewController\n-(void) willRotateToInterfaceOrientation:(UIInterfaceOrientation)toInterfaceOrientation\n\
    \                                duration:(NSTimeInterval)duration\n{\n    CGRect\
    \ screenRect = [UIScreen mainScreen].bounds;\n    CGRect rect = CGRectZero;\n\n\
    \    if (toInterfaceOrientation == UIInterfaceOrientationPortrait ||\n       \
    \ toInterfaceOrientation == UIInterfaceOrientationPortraitUpsideDown)\n    {\n\
    \        rect = screenRect;\n    }\n    else if (toInterfaceOrientation == UIInterfaceOrientationLandscapeLeft\
    \ ||\n        toInterfaceOrientation == UIInterfaceOrientationLandscapeRight)\n\
    \    {\n        rect.size = CGSizeMake(screenRect.size.height, screenRect.size.width);\n\
    \    }\n\n    CCDirector* director = [CCDirector sharedDirector];\n    EAGLView*\
    \ glView = director.openGLView;\n    float contentScaleFactor = [director contentScaleFactor];\n\
    \n    if (contentScaleFactor != 1)\n    {\n        rect.size.width *= contentScaleFactor;\n\
    \        rect.size.height *= contentScaleFactor;\n    }\n\n    glView.frame =\
    \ rect;\n}\n#endif // GAME_AUTOROTATION == kGameAutorotationUIViewController\n\
    ```\n\n本质上，通过`director.openGLView`获取的 cocos2d `EAGLView`，其`frame`属性会更新为新的屏幕尺寸。而这个新屏幕尺寸就是`[UIScreen\
    \ mainScreen].bounds`属性返回的值。这段代码为你处理的唯一事情是，在横屏方向下，高度实际上是新`EAGLView`帧的宽度，反之亦然。当然，它通过将`rect.size.width`和`rect.size.height`乘以`contentScaleFactor`来考虑\
    \ Retina 显示模式。你实际上不需要完全理解这段代码，因为你几乎不需要更改它。你唯一需要知道的是，这段代码假设 cocos2d 视图是全屏的。\n\n\
    名为`CocosWithCocoa06`的项目对`RootViewController`和自动旋转进行了一些更改。例如，即使在第一代和第二代设备上，它也默认支持`UIViewController`。如果你拥有这些设备之一，你会看到屏幕自动旋转，并且你可能想将其性能与之前的`CocosWithCocoa05`项目进行比较。此外，`RootViewController`类的代码已被清理，并包含了启用竖屏或所有四个方向自动旋转支持的示例代码。\n\
    \n### 在 Cocoa Touch 应用中嵌入 cocos2d 视图\n\n许多开发者没有意识到，实际上可以将 cocos2d 视图嵌入到使用 UIKit\
    \ 视图作为主要元素的常规应用程序中。cocos2d 视图甚至不必是全屏的！\n\n问题仅在于项目设置。我想向你展示如何实现。\n"
- fmt: '# Creating a View-Based Application Project with cocos2d


    Fire up your Xcode 4\. Create a new project via **File ![image](images/U001.jpg)
    New ![image](images/U001.jpg) New Project**. Select the View-Based Application
    template, as shown in [Figure 15–8](#Chapter15.html#fig_15_8), and name the project
    `ViewBasedAppWithCocos2D`. You’ll end up with a project that has a view controller
    class, the corresponding `.xib` file, a `MainWindow.xib` file, and an app delegate
    class. If you run it right now, you’ll see a blank iPhone view with just the status
    bar on top.


    ![images](images/1508.jpg)


    **Figure 15–8.** *The starting point for embedding a cocos2d view is the View-based
    Application template.*


    **TIP:** You may encounter the message in [Figure 15–9](#Chapter15.html#fig_15_9)
    if you try to run this project on a device, even if the device is properly provisioned.
    By default, the new project templates set the `iOS Deployment Target` setting
    to the latest iOS SDK, which may be iOS 4.3 or iOS 5.0\. Those and newer iOS versions
    are not available for devices of the first and second generation. In such a case,
    click the project in the Project Navigator pane to see the list of projects and
    targets. Select the project again in the new view and switch to its `Info` pane.
    You’ll see that the first setting `iOS Deployment Target` is set to `iOS 4.3`
    or newer. Change this to `iOS 3.1.3` or lower and try running the app again. If
    Xcode still complains with the same message as in [Figure 15–9](#Chapter15.html#fig_15_9),
    your device is not properly provisioned, and you’ll have to look into that. Possibly
    the provisioning profile has expired, and you may have to get a new one from [`http://developer.apple.com/ios`](http://developer.apple.com/ios).


    ![images](images/1509.jpg)


    **Figure 15–9.** *If you get this message when trying to run the app on a device,
    try changing the `iOS Deployment Target` setting in the project’s `Info` pane
    to `iOS 3.1.3` or lower.*


    The next step is to get the cocos2d source code added to the project. There are
    several ways to do this; I prefer to rely on the cocos2d project templates because
    it makes it easier to copy exactly the necessary files—no more, no less. So, in
    Xcode, create another project via **File ![image](images/U001.jpg) New ![image](images/U001.jpg)
    New Project**, and this time select one of the cocos2d project templates. If you
    need physics in your cocos2d view, you should choose one of the templates using
    a physics engine; otherwise, just pick the cocos2d template. Save the project
    anywhere using any name; just remember where you saved it. In fact, you can immediately
    close the cocos2d Xcode project after you’ve created it.


    With your `ViewBasedAppWithCocos2D` project still open in Xcode 4, navigate to
    the cocos2d project folder using the Finder app. Locate the subfolder named `libs`
    in the cocos2d project folder. Drag the `libs` folder onto the `ViewBasedAppWithCocos2D`
    project and drop it onto the Project Navigator pane where all the project’s files
    are listed. If necessary, open the Project Navigator first by selecting **View
    ![image](images/U001.jpg) Navigators ![image](images/U001.jpg) Project** from
    the menu. Make sure the **Copy items into destination group’s folder (if needed)**
    check box is checked and the other settings also correspond to the ones you see
    in [Figure 15–10](#Chapter15.html#fig_15_10).


    ![images](images/1510.jpg)


    **Figure 15–10.** *Make sure the Copy Items… check box is set when dropping the
    cocos2d `libs` folder into the view-based application project.*


    You can’t build the project just yet because the cocos2d engine requires additional
    frameworks and libraries, without which you’ll only receive linker errors. To
    add these dependencies to the project, select the project itself in the Project
    Navigator (first entry in the list with the blue icon). Select the `ViewBasedAppWithCocos2D`
    target, navigate to the **Build Phases** tab, and unfold the **Link Binary With
    Libraries** pane. Then click the **+** button to add additional libraries. If
    you have trouble finding this location, take a look at [Figure 15–11](#Chapter15.html#fig_15_11).


    ![images](images/1511.jpg)


    **Figure 15–11.** *Add the missing frameworks and libraries to the target’s Link
    Binary With Libraries Build Phase.*


    Once you click the **+** button, a list of frameworks and libraries opens. Here’s
    the list of frameworks and libraries you will have to add. They’re found in the
    list in the same alphabetical order as I list them here:


    *   `AudioToolbox.framework`

    *   `AVFoundation.framework`

    *   `libz.dylib`

    *   `OpenAL.framework`

    *   `OpenGLES.framework`

    *   `QuartzCore.framework`


    Note that you can select all libraries in one go by holding down the Command key
    while selecting the items in the list. The added frameworks and libraries will
    be added to the root of the project in the Project Navigator. You can safely move
    them to the `Frameworks` group where they belong, just to get them out of sight
    since you don’t need to work with them.


    You can now build and run the app. It has the cocos2d source code built into it,
    but of course without a user interface, it’s the same dull and empty app as it
    was before. Let’s change that!'
  raw: '#### Creating a View-Based Application Project with cocos2d


