    files in cocos2d is by using the SimpleAudioEngine. Audio support is not an integral
    part of cocos2d; this is the domain of CocosDenshion, a third-party addition to
    cocos2d and fortunately distributed with cocos2d.


    **TIP:** If you’re looking for an alternative sound engine, I recommend ObjectAL
    available from [`http://kstenerud.github.com/ObjectAL-for-iPhone`](http://kstenerud.github.com/ObjectAL-for-iPhone),
    which is the preferred audio engine in Kobold2D (see [Chapter 16](#Chapter16.html#ch16)).
    ObjectAL has a cleanly written API and excellent documentation.


    Because CocosDenshion is treated as separate code from cocos2d, you have to add
    the corresponding header files whenever you use the CocosDenshion audio functionality,
    like so:


    `#import "GameScene.h"`

    **`#import "SimpleAudioEngine.h"`**


    You’ll find playing music and audio using the `SimpleAudioEngine` is straightforward,
    as shown here:


    `[[SimpleAudioEngine sharedEngine] playBackgroundMusic:@"blues.mp3" loop:YES];`

    `[[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];`


    For music and longer speech files, playing MP3 files is the preferred choice.
    Note that you can play only one MP3 file in the background at a time. Technically,
    it’s possible to play two or more MP3 files, but only one can be decoded in hardware.
    The extra strain on the CPU is undesirable for games, so playing multiple MP3
    files at the same time is out of the question for most. This also means that short-lived
    sound effects should not be in MP3 format. For those audio effects, I’ve had only
    good experiences with 16-bit PCM (uncompressed) audio in either the WAV or CAF
    file format. The sampling rate can be 22.5 kHz for most game sound effects, unless
    you need or want crystal-clear audio quality, in which case you should use 44.1
    kHz.


    A good and complete audio-editing tool for Mac OS X is Audacity, which you can
    download for free from [`http://audacity.sourceforge.net`](http://audacity.sourceforge.net).
    If you need only to quickly convert audio files from one format to another, possibly
    changing some basic settings such as sampling rate, I recommend SoundConverter,
    which was developed by Steve Dekorte. The tool is free to use for files up to
    500KB in size, and the license to use SoundConverter without restrictions is just
    $15\. You can download SoundConverter from [`http://dekorte.com/projects/shareware/SoundConverter/`](http://dekorte.com/projects/shareware/SoundConverter/).


    A free alternative to SoundConverter is the command-line tool `afconvert`. Familiarity
    with Terminal is recommended. You can do a lot with `afconvert`, but being a command-line
    tool, you’ll also have to type all settings. To get help for `afconvert`, open
    the Terminal app and type the following:


    `afconvert -h`


    The preferred audio format for iOS devices is 16-bit, little endian, linear PCM
    packaged as CAF file (Apple CAF audio format code: `LEI16`), according to Apple’s
    Audio Coding How To, which contains generally helpful advice for audio programming
    ([`http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html`](http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html)).


    To convert any audio file that `afconvert` supports to the preferred iOS audio
    format, you would run the `afconvert` command like this:


    `afconvert -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf`


    The `-f` (or `-file`) switch denotes the file format, which is `caff` for CAF
    files. With the `-d` switch, you specify the audio data format, here `LEI16`.
    You can get a list of the audio data formats supported by `afconvert` by running
    `afconvert` with the `-hf` switch.


    **NOTE:** If you ever find yourself in the situation where an audio file just
    won’t play or results in a garbled mess of noise, don’t worry. There are countless
    audio applications and numerous audio codecs that all create their own variations
    of the respective formats. Some are unable to play on iOS devices but play fine
    otherwise. Particularly, WAV files seem to be affected, which is why I prefer
    to use Apple’s more native audio container format CAF. Typically, the way you
    can fix broken audio files is to open the audio file in an audio-editing program
    that you know is capable of saving iOS-compatible audio files and then save it
    again. You can do this with the aptly named SoundConverter or the audio application
    of your choice. Usually, after this resave, the file will play just fine on the
    iOS device.


    ### Porting to iPad


    With all coordinates taking the screen’s size into account, the game should simply
    scale up without any problems when running it on the iPad’s bigger screen. And
    it does. Just like that. In contrast, if you had been using fixed coordinates,
    you’d be facing a serious rework of your game.


    #### One Universal App or Two Separate Apps?


    When porting your app to iPad, you generally have to decide whether your app will
    be treated as a single (Universal) app on the App Store or whether it should be
    treated as two separate apps. Both options have their pros and cons, and generally
    you could say that Universal apps are better and fairer for customers, whereas
    separate apps are usually better for developers.


    Universal apps include code and assets for both iPhone/iPod touch and iPad devices.
    This has the drawback that all assets are added to the same Xcode target, increasing
    the app’s size. That’s the technical drawback; there are no performance penalties.


    With a Universal app, you will not be able to set different prices for iPhone/iPod
    touch and iPad versions, and user reviews and comments for all devices will be
    listed under the same app. Moreover, you won’t know which percentage of your download’s
    respective purchases were made by iPad users.


    Regardless of that, Universal apps will still be ranked separately by device in
    the App Store charts. If the user downloads or purchases the app on an iPhone
    or iPod touch device, it is accounted for in the iPhone charts. The same goes
    for downloads/purchases on the iPad, which add to your app’s ranking in the iPad
    charts. That leaves the question of how iTunes downloads/purchases are accounted
    for. They are simply accounted for in the iPhone rankings. That makes it impossible
    to even estimate how many of your users are iPad users, unless you add analytics
    tracking code to your app.


    Splitting your app into two separate apps for iPhone/iPod touch and iPad allows
    you to keep the game assets separate. Most importantly, if an iOS user wants both
    the iPhone and iPad versions, he’ll have to buy both. That is good for you but
    bad for the customer. And some won’t hesitate to give your app a worse rating
    just because of that.


    But since your app will be treated as two entirely separate apps in the App Store,
    at least the customer reviews and comments will be specific to the particular
    app version. You’ll also be able to optimize each app’s description and screenshots
    for the target platform and update each version separately. Splitting your app
    is also a good choice if your app has been on the App Store for a while, since
    adding support for new devices in a Universal app will not have your app appear
    in the What’s New section of the App Store.'
  trans: '

    ### 简单播放音频


    我添加了一些音频文件来完成这个游戏。在 `DoodleDrop07` 项目的 Resources 文件夹中，你可以找到名为 `blues.mp3` 和 `alien-sfx.caf`
    的音频文件，你可以将它们添加到你的项目中。在 `cocos2d` 中播放音频文件的首选且最简单的方法是使用 `SimpleAudioEngine`。音频支持并非
    `cocos2d` 的核心组成部分；这属于 `CocosDenshion` 的领域，它是 `cocos2d` 的第三方扩展，并且幸运的是它与 `cocos2d`
    一起分发。


    **提示：** 如果你在寻找替代的声音引擎，我推荐从 [`http://kstenerud.github.com/ObjectAL-for-iPhone`](http://kstenerud.github.com/ObjectAL-for-iPhone)
    获取的 `ObjectAL`，它是 `Kobold2D` 中首选的音频引擎（参见 第 16 章）。`ObjectAL` 具有编写整洁的 API 和优秀的文档。


    由于 `CocosDenshion` 被视为与 `cocos2d` 分离的代码，因此每当你使用 `CocosDenshion` 的音频功能时，都必须添加相应的头文件，如下所示：


    ```

    #import "GameScene.h"

    #import "SimpleAudioEngine.h"

    ```


    你会发现使用 `SimpleAudioEngine` 播放音乐和音频非常直接，如下所示：


    ```

    [[SimpleAudioEngine sharedEngine] playBackgroundMusic:@"blues.mp3" loop:YES];

    [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];

    ```


    对于音乐和较长的语音文件，播放 MP3 文件是首选。请注意，你一次只能播放一个 MP3 背景音乐文件。从技术上讲，同时播放两个或多个 MP3 文件是可能的，但只有一个能通过硬件解码。额外的
    CPU 负担对游戏来说是不可取的，因此对大多数人来说，同时播放多个 MP3 文件是不现实的。这也意味着短促的音效不应采用 MP3 格式。对于这些音效，我使用
    WAV 或 CAF 文件格式的 16 位 PCM（未压缩）音频效果一直很好。大多数游戏音效的采样率可以是 22.5 kHz，除非你需要或想要水晶般清晰的音质，在这种情况下你应该使用
    44.1 kHz 的采样率。


    Mac OS X 上一个优秀且完整的音频编辑工具是 `Audacity`，你可以从 [`http://audacity.sourceforge.net`](http://audacity.sourceforge.net)
    免费下载。如果你只需要快速将音频文件从一种格式转换为另一种格式，可能还会更改一些基本设置（如采样率），我推荐 Steve Dekorte 开发的 `SoundConverter`。该工具对大小不超过
    500KB 的文件免费使用，而无限制使用 `SoundConverter` 的许可只需 15 美元。你可以从 [`http://dekorte.com/projects/shareware/SoundConverter/`](http://dekorte.com/projects/shareware/SoundConverter/)
    下载 `SoundConverter`。


    `SoundConverter` 的一个免费替代品是命令行工具 `afconvert`。建议熟悉终端。你可以用 `afconvert` 做很多事情，但作为命令行工具，你需要手动输入所有设置。要获取
    `afconvert` 的帮助，请打开终端应用程序并输入以下内容：


    ```

    afconvert -h

    ```


    根据 Apple 的音频编码操作指南（其中包含对音频编程通常有用的建议，[`http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html`](http://developer.apple.com/library/ios/#codinghowtos/AudioAndVideo/_index.html)），iOS
    设备首选的音频格式是 16 位、小端序、线性 PCM，并打包为 CAF 文件（Apple CAF 音频格式代码：`LEI16`）。


    要将 `afconvert` 支持的任何音频文件转换为首选的 iOS 音频格式，你可以像这样运行 `afconvert` 命令：


    ```

    afconvert -f caff -d LEI16 myInputFile.mp3 myOutputFile.caf

    ```


    `-f`（或 `-file`）开关指定文件格式，对于 CAF 文件是 `caff`。使用 `-d` 开关，你可以指定音频数据格式，此处为 `LEI16`。你可以通过运行带
    `-hf` 开关的 `afconvert` 来获取 `afconvert` 支持的音频数据格式列表。


    **注意：** 如果你遇到某个音频文件无法播放或产生混乱噪音的情况，请不要担心。有无数音频应用程序和音频编解码器都会创建各自格式的变体。有些格式在 iOS
    设备上无法播放，但在其他设备上却能正常播放。特别是 WAV 文件似乎容易受到影响，这就是为什么我更倾向于使用 Apple 更原生的音频容器格式 CAF。通常，修复损坏音频文件的方法是在一个你知道能够保存
    iOS 兼容音频文件的音频编辑程序中打开该音频文件，然后重新保存。你可以使用名称贴切的 `SoundConverter` 或你选择的音频应用程序来做到这一点。通常，在重新保存后，该文件就能在
    iOS 设备上正常播放了。


    ### 移植到 iPad


    由于所有坐标都考虑了屏幕尺寸，因此当游戏在 iPad 更大的屏幕上运行时，它应该可以毫无问题地简单缩放。事实也确实如此。就这么简单。相比之下，如果你之前使用了固定坐标，那么你将面临对游戏进行重大返工的情况。


    #### 一个通用应用还是两个独立的应用？


    当将你的应用移植到 iPad 时，你通常需要决定你的应用在 App Store 上是作为一个单一（通用）应用，还是作为两个独立的应用。这两种选择各有利弊，通常可以说，通用应用对客户来说更好、更公平，而独立应用通常对开发者更有利。


    通用应用包含适用于 iPhone/iPod touch 和 iPad 设备的代码和资源。这有一个缺点：所有资源都添加到同一个 Xcode 目标中，会增加应用的体积。这是一个技术上的缺点；在性能方面没有影响。


    使用通用应用，你将无法为 iPhone/iPod touch 和 iPad 版本设置不同的价格，并且所有设备的用户评论和留言都将列在同一个应用下。此外，你无法知道你的下载量中有多少百分比是来自
    iPad 用户。


    尽管如此，通用应用在 App Store 排行榜中仍将按设备分别排名。如果用户在 iPhone 或 iPod touch 设备上下载或购买该应用，则计入 iPhone
    排行榜。在 iPad 上的下载/购买同样如此，这有助于提升你的应用在 iPad 排行榜中的排名。这留下了一个问题：iTunes 的下载/购买如何计算？它们仅仅被计入
    iPhone 排名。这使得你甚至无法估计你的用户中有多少是 iPad 用户，除非你在应用中添加分析跟踪代码。


    将你的应用拆分为适用于 iPhone/iPod touch 和 iPad 的两个独立应用，可以让你将游戏资源分离。最重要的是，如果 iOS 用户想要同时拥有
    iPhone 和 iPad 版本，他就必须购买两次。这对你有利，但对客户不利。有些用户会毫不犹豫地仅仅因为这个原因就给你的应用打低分。


    但是，由于你的应用在 App Store 中将被视为两个完全独立的应用，至少客户的评论和留言将是针对特定应用版本的。你还可以针对目标平台优化每个应用的描述和截图，并分别更新每个版本。如果你的应用已经在
    App Store 上架了一段时间，拆分应用也是一个不错的选择，因为在一个通用应用中为新设备添加支持不会让你的应用出现在 App Store 的“新内容”部分。

