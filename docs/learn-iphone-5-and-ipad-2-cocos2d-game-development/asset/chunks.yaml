- fmt: "#### Tools, Tools, Tools\n\nIn this book I’ve introduced you to what I think\
    \ are the best tools for each purpose. However, there are usually always alternatives.\
    \ If you also read the first edition of this book, you know that I used different\
    \ tools in the first edition than in the second. In less than a year, some tools\
    \ put on wings, and others essentially stopped progressing and fell behind.\n\n\
    Since that almost natural process is not going to change in the future and it’s\
    \ hard to predict which tools are here to stay and which aren’t over the coming\
    \ years, I wanted to share an alphabetically sorted list of currently existing\
    \ tools that you can use for `cocos2d` without going into describing them and\
    \ regardless of their current state, except of course that they need to be usable\
    \ and functional at the very least.\n\nThe following tools can be used for development\
    \ with `cocos2d`:\n\n*   Bitmap Font Tools\n    *   BMFont (Windows): `www.angelcode.com/products/bmfont`\n\
    \    *   Fonteditor: `http://code.google.com/p/fonteditor`\n    *   Glyph Designer:\
    \ `http://glyphdesigner.71squared.com`\n    *   Hiero: `http://slick.cokeandcode.com/demos/hiero.jnlp`\n\
    \    *   LabelAtlasCreator: `www.cocos2d-iphone.org/forum/topic/4357`\n*   Particle\
    \ Editing Tools\n    *   ParticleCreator: `www.cocos2d-iphone.org/forum/topic/16363`\n\
    \    *   Particle Designer: `http://particledesigner.71squared.com`\n*   Physics\
    \ Editing Tools\n    *   Mekanimo: `www.mekanimo.net`\n    *   PhysicsBench: `www.cocos2d-iphone.org/forum/topic/9064`\n\
    \    *   PhysicsEditor: `www.physicseditor.de`\n    *   VertexHelper: `www.cocos2d-iphone.org/archives/779`\n\
    *   Scene Editing Tools\n    *   CocosBuilder: `http://cocosbuilder.com`\n   \
    \ *   Cocoshop: `www.cocos2d-iphone.org/forum/topic/15668`\n    *   LevelHelper:\
    \ `www.levelhelper.org`\n*   Texture Atlas Tools\n    *   DarkFunction Editor:\
    \ `http://darkfunction.com`\n    *   SpriteHelper: `www.spritehelper.org`\n  \
    \  *   TexturePacker: `www.texturepacker.com`\n    *   Zwoptex: `zwoptexapp.com`\n\
    *   Tilemap Editing Tools\n    *   iTileMaps (iPad): `www.klemix.com/page/iTileMaps.aspx`\n\
    \    *   Tiled Map Editor: `www.mapeditor.org`\n\n#### Cocos2d Reference Apps\n\
    \nThe following is a list of games and apps made with `cocos2d`. They should serve\
    \ as shining examples of what you can do with `cocos2d` as well as the creativity\
    \ of `cocos2d` developers.\n\nInstead of providing an iTunes link to each app\
    \ in the book, I decided to create a post on my blog where I host all the links\
    \ to the games mentioned here, and I’ll update this list to include noteworthy\
    \ games released after the book has been published. You can find the list of links\
    \ to these apps, including other links of interest, on the Great Apps Made With\
    \ `cocos2d` page: `www.learn-cocos2d.com/2010/10/great-apps-made-with-cocos2d`.\n\
    \n*   **The Elements** (iPad) is a graphical representation of the periodic table\
    \ of elements. The outstanding features are the plentiful photographs and smooth\
    \ 360 animations that invite you to explore the elements that make up you, me,\
    \ and the rest of the universe (excluding empty space, of which there’s a lot\
    \ I’ve been told). It’s priced highly but worth every cent, and if you need an\
    \ app that will let you brag about your new iPad, this is it!\n*   **Bloomies**\
    \ is a colorful gardening game, full of bees (see [Figure 17–7](#Chapter17.html#fig_17_7)).\
    \ If that doesn’t sway you, maybe the idea of fostering and nurturing your own\
    \ garden does. The flowers need your constant attention, and the game play is\
    \ addictive, just like any Tamagotchi-style game. Oh, and it happens to be made\
    \ by two former colleagues of mine. It’s just a beautiful game, and so is their\
    \ follow-up game, Super Blast.\n\n![images](images/1707.jpg)\n\n**Figure 17–7.**\
    \ *Bloomies from Phantoom Entertainment*\n\n*   **StickWars** is a game where\
    \ you defend your castle from incoming stick figures by flicking them in the air\
    \ or literally shaking them to the ground. The developer, John Hartzog, had never\
    \ before worked with `Objective-C` or on mobile devices, but he pulled it off.\
    \ `StickWars` remains to this date within the top 100 games and continues to be\
    \ updated even a year after the initial release.\n*   **ZombieSmash** is also\
    \ a castle defense game, except that this time hordes of zombies are attacking,\
    \ and you get explosives, 16-ton weights, shotguns, and other cool items that\
    \ make a bloody mess to fend them off (see [Figure 17–8](#Chapter17.html#fig_17_8)).\
    \ Your castle is your barn, and if you can defend it, you’ll be rewarded with\
    \ a slow-motion animation of the final zombie losing its, err, unlife. The outstanding\
    \ feature of this game is certainly the rag doll animation system that allows\
    \ zombies to walk, crawl, or otherwise try to move even if they lost some of their\
    \ limbs.\n\n![images](images/1708.jpg)\n\n**Figure 17–8.** *Zombie Smash by GameDoctors*"
