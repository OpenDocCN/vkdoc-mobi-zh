  trans: "\n#### `BodyNode` 类\n\n`BodyNode` 类的设计理念是，我们希望将所有动态类封装到一个独立的对象中。目前，我们只是简单地将\
    \ `CCSprite` 添加到物体的 `userData` 字段中。但假设你想要与精灵所代表的类进行实际交互——例如，在某个 `ContactListener`\
    \ 方法中——你无法做到，因为你所能访问的只是 `CCSprite` 对象。为了解决这个问题，我在 `PhysicsBox2D03` 项目中创建了 `BodyNode`\
    \ 类。\n\n`BodyNode` 继承自 `CCSprite`，并包含一个 Box2D 物体作为实例变量。这个物体引用使得任何继承自 `BodyNode`\
    \ 的类都能方便地访问它。由于弹球游戏中所有元素类都继承自 `BodyNode`，我们便有了一个通用的基类，并可在此基础上进一步查询其具体类型。例如，你可以使用\
    \ `isKindOfClass` 方法在运行时根据任一 `BodyNode*` 指针判断当前操作的是哪个类。所有继承自 `NSObject` 的类都支持\
    \ `isKindOfClass` 方法。\n\n此外，`BodyNode` 类的头文件中包含了常用的头文件，如 `Box2d.h` 和 `Helper.h`（参见代码清单\
    \ 13–1）。\n\n**代码清单 13–1.** *BodyNode 头文件*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n#import \"Helper.h\"\n#import \"Constants.h\"\n#import\
    \ \"PinballTable.h\"\n#import \"Box2D.h\"\n#import \"b2Body.h\"\n\n@interface\
    \ BodyNode : CCSprite\n{\n    b2Body* body;\n}\n\n@property (readonly, nonatomic)\
    \ b2Body* body;\n\n/**\n * 创建一个新形状\n * @param shapeName: 形状和精灵的名称\n * @param inWorld:\
