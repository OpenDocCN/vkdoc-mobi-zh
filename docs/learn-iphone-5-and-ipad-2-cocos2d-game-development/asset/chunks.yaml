  trans: '

    # 发射器持续时间


    `duration` 属性决定了粒子将被发射多长时间。如果设置为 2，它将持续两秒生成新粒子，然后停止。就是这么简单：


    ```

    self.duration = 2.0f;

    ```


    如果你希望在粒子系统停止发射粒子且最后一批粒子消散后，自动将粒子效果节点从其父节点中移除，请将 `autoRemoveOnFinish` 属性设置为 `YES`：


    ```

    self.autoRemoveOnFinish = YES;

    ```


    `autoRemoveOnFinish` 属性是一个便捷特性，仅当与**非无限运行**的粒子系统（如一次性爆炸效果）结合使用时才有意义。Cocos2d 为无限运行的粒子效果定义了一个常量
    `kCCParticleDurationInfinity (等于: -1)`：


    ```

    self.duration = kCCParticleDurationInfinity;

    ```


    大多数粒子效果是无限运行的，只能通过将其从节点层级中移除来停止。无限运行的粒子效果会忽略 `autoRemoveOnFinish` 属性。


    # 发射器模式


    有两种发射器模式：`gravity`（重力）和 `radius`（半径），由 `emitterMode` 属性控制。即使大部分参数相同，这两种模式也会产生截然不同的效果，比较图
    9-4 和 图 9-5 即可看出。两种模式都使用了一些专属属性（见列表 9-3），如果当前模式不支持这些属性，则不应设置它们；否则，你会收到来自 cocos2d
    的运行时异常，如下所示：


    ```

    ParticleEffects[6332:207] *** Terminating app due to uncaught exception

                ''NSInternalInconsistencyException'', reason: ''Particle Mode should
    be Radius''

    ```


    ## 发射器模式：重力


    重力模式让粒子飞向或飞离一个中心点。其优势在于能够创造出非常动态、有机的效果。你可以通过以下代码设置重力模式：


    ```

    self.emitterMode = kCCParticleModeGravity;

    ```


    重力模式使用以下专属属性，仅在 `emitterMode` 设置为 `kCCParticleModeGravity` 时才能使用：


    ```

    self.sourcePosition = CGPointMake(-15, 0);

    self.gravity = CGPointMake(-50, -90);

    self.radialAccel = -90;

    self.radialAccelVar = 20;

    self.tangentialAccel = 120;

    self.tangentialAccelVar = 10;

    self.speed = 15;

    self.speedVar = 4;

    ```


    `sourcePosition` 决定了新粒子出现时相对于节点位置的偏移量（`CGPoint`）。这个名称有些误导性，因为实际的重力中心是节点的位置，而 `sourcePosition`
    是相对于该重心的偏移。`gravity` 属性则决定了粒子在 `x` 和 `y` 方向上加速的速度。在此例中，负值表示重力会使粒子向左（-50）和向下（-90）加速。但这个加速度是相对于粒子节点位置的。由于粒子从
    `sourcePosition` 偏移量 -15（略微偏左）的位置开始，它们将围绕粒子节点位置进行逆时针运动。你可以在图 9-4 中看到这种效果，在 ParticleEffects02
    项目中调整这些数值有助于理解 `sourcePosition` 和 `gravity` 如何影响粒子的运动。


    要使重心产生任何影响，粒子的重力不应太大，并且 `sourcePosition` 的偏移量也不应过远。上述数值为你提供了一个良好的工作示例，你可以对其进行调整。


    `radialAccel` 属性定义了粒子远离发射器时加速的速率。该参数也可以是负值，这会使粒子在远离时减速。`tangentialAccel` 属性类似，它使粒子围绕发射器旋转，并在远离时加速。负值使粒子顺时针旋转，正值则使其逆时针旋转。


    `speed` 属性应该相当直观——它只是粒子的速度。它没有特定的度量单位。图 9-4 展示了一个使用重力模式的粒子效果示例。粒子被粒子节点的位置所吸引，并且起始位置略微偏左，因此它们进行逆时针径向运动。


    ![images](img/0904.jpg)


    **图 9-4.** *ParticleEffects02 项目中重力模式下的 ParticleEffectSelfMade*


    ## 发射器模式：半径


    半径模式使粒子沿圆周旋转。它还允许你创建螺旋效果，粒子既可以向内旋转，也可以向外旋转。你可以通过以下代码设置半径模式：


    ```

    self.emitterMode = kCCParticleModeRadius;

    ```


    与重力模式一样，半径模式也有专属属性。以下属性仅在 `emitterMode` 设置为 `kCCParticleModeRadius` 时才能使用：


    ```

    self.startRadius = 100;

    self.startRadiusVar = 0;

    self.endRadius = 10;

    self.endRadiusVar = 0;

    self.rotatePerSecond = -180;

    self.rotatePerSecondVar = 0;

    ```


    `startRadius` 属性决定了粒子在被发射时距离粒子效果节点位置的距离。同样，`endRadius` 决定了粒子在旋转过程中最终应到达的距离节点位置的距离。如果你想实现完美的圆形效果，可以将
    `endRadius` 设置为与 `startRadius` 相同，使用以下常量：


    ```

    self.endRadius = kCCParticleStartRadiusEqualToEndRadius;

    ```


    通过 `rotatePerSecond` 属性，你可以影响粒子的运动方向和速度，从而在 `startRadius` 和 `endRadius` 不同时，控制它们围绕旋转的次数。


    在图 9-4 中使用重力模式展示的同一个粒子效果，在图 9-5 中则使用了半径模式，你会注意到它的外观有多么不同，尽管所有其他属性（专属属性除外）都是相同的。要进行测试，请在
    ParticleEffects02 项目中取消注释以下代码行：


    ```

    //self.emitterMode = kCCParticleModeRadius;

    ```


    ![images](img/0905.jpg)


    **图 9-5.** *使用半径模式的同一个效果看起来完全不同。*


    # 粒子位置


    通过移动节点，你也会移动效果。但该效果也有一个 `posVar` 属性，它决定了新粒子生成位置的方差。默认情况下，两者都位于节点的中心：


    ```

    self.position = CGPointZero;

    self.posVar = CGPointZero;

    ```


    粒子位置的一个非常重要的方面是，现有粒子是应随节点移动而移动，还是根本不受节点位置的影响。例如，如果你有一个在玩家角色头部周围产生星星的粒子效果，你会希望星星在玩家移动时跟随玩家。你可以通过设置以下属性来实现此效果：


    ```

    self.positionType = kCCPositionTypeGrouped;

    ```


    另一方面，如果你想让玩家着火，并希望粒子在玩家移动时产生类似拖尾的效果，则应将 `positionType` 属性设置如下：


    ```

    self.positionType = kCCPositionTypeFree;

    ```


    自由移动最适合用于蒸汽、火焰、引擎排烟等效果，以及类似的效果，这些效果会随所附着对象一起移动，并且应该给人一种与其发射粒子的对象没有关联的印象。

    '
- fmt: '### Particle Size


    The size of particles is given in pixels using the `startSize` and `endSize` properties,
    which determine the size of the particles when they are emitted and how big they
    are when they are removed. The size of the particle gradually scales from `startSize`
    to `endSize`.


    ```

    self.startSize = 40.0f;

    self.startSizeVar = 0.0f;

    self.endSize = kCCParticleStartSizeEqualToEndSize;

    self.endSizeVar = 0;

    ```


    The constant `kCCParticleStartSizeEqualToEndSize` can be used to ensure that the
    particle size does not change during a particle''s lifetime.


    ### Particle Direction


    The direction in which particles are initially emitted is set with the `angle`
    property and measured in degrees from 0 to 360. A value of `0` means that particles
    will be emitted upward, but this is true only for the gravity `emitterMode`. In
    radius `emitterMode`, the `angle` property determines where on the `startRadius`
    the particles will be emitted; higher values will move the emission point counterclockwise
    along the radius.


    ```

    self.angle = 0;

    self.angleVar = 0;

    ```


    ### Particle Lifetime


    A particle''s lifetime determines how many seconds it will take to transition
    from start to end, where the particle will simply fade out and disappear. The
    `life` property sets the lifetime of individual particles. Keep in mind that the
    longer particles live, the more particles will be on-screen at any given time.
    If the total number of particles is reached, no new particles will be spawned
    until some existing particles have died.


    ```

    self.life = 5.0f;

    self.lifeVar = 1.0f;

    ```


    The `emissionRate` property directly influences how many particles are created
    per second. Together with the `totalParticles` property, it has a big impact on
    what the particle effect looks like.


    ```

    self.emissionRate = 30;

    self.totalParticles = 250;

    ```


    In general, you will want to balance the `emissionRate` so that it matches the
    particle lifetime with the `totalParticles` allowed in the particle effect. You
    can do so by dividing `totalParticles` by `life` and set the result as the `emissionRate`:


    ```

    self.emissionRate = self.totalParticles / self.life;

    ```


    **TIP:** By tweaking particle lifetime, the total number of particles allowed
    in the system, and the `emissionRate`, you can create burst effects by allowing
    the stream of particles to be frequently interrupted just because the number of
    particles on-screen is limited and new particles are emitted relatively quickly.
    On the other hand, if you notice undesirable gaps in your particle stream, you
    need to either increase the number of allowed particles or preferably reduce the
    lifetime and/or emission rate. In that case, you should use `emissionRate = totalParticles
    / life`.


    ### Particle Color


    Each particle can transition from a starting color to an end color, creating the
    vibrant colors particle effects are known for. You should at least set the `startColor`
    in a particle effect; otherwise, the particles may not be visible at all since
    the default color is black. The colors are of type `ccColor4F`, a struct with
    four floating-point members: `r`, `g`, `b`, and `a`, corresponding to the colors
    red, green, and blue, as well as the alpha channel, which determines the color''s
    opacity. The value range for each of these members goes from 0 to 1, with 1 being
    the full color.


    If you want a completely white particle color, you''d set all four `r`, `g`, `b`,
    and `a` members to `1`. If you want a red color, you only need to set the `r`
    and `a` values to `1.0f`. If you want blue, then set `b` and `a` to `1.0f`. Note
    that the `a` value is the alpha transparency of the color. If you leave it at
    the default value of `0.0f`, the color will be completely translucent and thus
    not visible.


    ```

    // startColor is mostly red and fully opaque

    startColor.r = 1.0f;

    startColor.g = 0.25f;

    startColor.b = 0.12f;

    startColor.a = 1.0f;

    // startColor has no variance (plus/minus 0.0f)

    startColorVar.r = 0.0f;

    startColorVar.g = 0.0f;

    startColorVar.b = 0.0f;

    startColorVar.a = 0.0f;

    // endColor is a fully opaque black color

    endColor.r = 0.0f;

    endColor.g = 0.0f;

    endColor.b = 0.0f;

    endColor.a = 1.0f;

    // endColorVar specifies a full variance range for color blue

    // the end of lifetime color of a particle will be randomly between black and
    blue

    endColorVar.r = 0.0f;

    endColorVar.g = 0.0f;

    endColorVar.b = 1.0f;

    endColorVar.a = 0.0f;

    ```


    ### Particle Blend Mode


    *Blending* refers to the computation a particle''s pixels go through before being
    displayed on-screen. The property `blendFunc` takes a `ccBlendFunc` struct as
    input, which provides the source and destination blend modes:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_DST_ALPHA};

    ```


    Blending works by taking the red, green, blue, and alpha of the source image (the
    particle) and mixing it with the colors of any images that are already on-screen
    when the particle is rendered. In effect, the particle blends in a certain way
    with its background, and `blendFunc` determines how much and what colors of the
    source image are blended how much and with which colors of the background.


    The formula to determine the final pixel color on-screen is as follows:


    ```

    (source color * source blend function) + (destination color * destination blend
    function)

    ```


    Let''s assume our example source pixel has the RGB values `(0.1, 0.2, 0.3)` and
    the destination pixel has the RGB values `(0.4, 0.5, 0.6)`. Both color values
    are multiplied by the blend function, the simplest being `GL_ONE`, which equals
    `1.0`. That means the resulting pixel''s color will be as follows:


    ```

    (0.1 * 1 + 0.4 * 1, 0.2 * 1 + 0.5 * 1, 0.3 * 1 + 0.6 * 1) = (0.5, 0.7, 0.9)

    ```


    The `blendFunc` property has a very profound effect on how particles are displayed.
    By using a combination of the following blend modes for both source and target,
    you can create rather bizarre effects or simply cause the effect to render as
    black squares. There''s lots of room for experimentation.


    * `GL_ZERO`

    * `GL_ONE`

    * `GL_SRC_COLOR`

    * `GL_ONE_MINUS_SRC_COLOR`

    * `GL_SRC_ALPHA`

    * `GL_ONE_MINUS_SRC_ALPHA`

    * `GL_DST_ALPHA`

    * `GL_ONE_MINUS_DST_ALPHA`


    You''ll find more information on the OpenGL blend modes and details about the
    blend calculations in the OpenGL ES documentation at [www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html](http://www.khronos.org/opengles/documentation/opengles1_0/html/glBlendFunc.html).


    **TIP:** Since it''s hard to imagine which blend functions will create which results
    with varying images, I''d like to point you to an article that describes the most
    common blend operations with example images: [www.machwerx.com/2009/02/11/glblendfunc/](http://www.machwerx.com/2009/02/11/glblendfunc/).


    Even more interesting is the Visual glBlendFunc tool developed by Anders Riggelsen:
    [www.andersriggelsen.dk/OpenGL/](http://www.andersriggelsen.dk/OpenGL/). With
    any HTML5-compatible browser you can play with various images and blend functions
    to see the results instantly.


    Note that you can also modify the `blendFunc` property of other cocos2d nodes,
    namely, all nodes that conform to the `CCBlendProtocol` such as the classes `CCSprite`,
    `CCSpriteBatchNode`, `CCLabelTTF`, `CCLayerColor`, and `CCLayerGradient`.


    The source and target blend modes `GL_SRC_ALPHA` and `GL_ONE` are frequently combined
    to create additive blending, resulting in very bright or even white colors where
    many particles are drawn on top of each other:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE};

    ```


    Alternatively, you can simply set the `blendAdditive` property to `YES`, which
    is the same as setting `blendFunc` to `GL_SRC_ALPHA` and `GL_ONE`:


    ```

    self.blendAdditive = YES;

    ```


    The normal blend mode is set using `GL_SRC_ALPHA` and `GL_ONE_MINUS_SRC_ALPHA`,
    which creates transparent particles:


    ```

    self.blendFunc = (ccBlendFunc){GL_SRC_ALPHA, GL_ONE_MINUS_SRC_ALPHA};

    ```'
