- fmt: "### Step-by-Step Project Setup\n\nFire up `Xcode` now, and I’ll walk you through\
    \ the steps to create your first cocos2d game. In `Xcode`, select **File ![images](images/U001.jpg)\
    \ New ![images](images/U001.jpg) New Project…** and choose the cocos2d Application\
    \ template, as shown in [Figure 4–2](#Chapter04.html#fig_4_2). When asked to enter\
    \ a name for the new project, enter **DoodleDrop** and, if necessary, find a suitable\
    \ location to save the project. `Xcode` will automatically create a subfolder\
    \ named `DoodleDrop`, so you don’t have to create that folder.\n\n![images](images/0402.jpg)\n\
    \n**Figure 4–2.** *Create the project from the cocos2d Application template.*\n\
    \n`Xcode` should present you with a project view similar to the one in [Figure\
    \ 4–3](#Chapter04.html#fig_4_3). Depending on the versions of cocos2d and `Xcode`\
    \ you’re using, there may be more files, or the names of the groups may be slightly\
    \ different.\n\nI’ve already unfolded the `Classes` and `Resources` groups because\
    \ that’s where you’ll be adding the source code and game resource files, respectively.\
    \ Anything that’s not source code is considered to be a resource, be it an image,\
    \ an audio file, a text file, or a `plist`. The grouping is not strictly necessary,\
    \ but it does make it easier for you to navigate the project if you keep similar\
    \ files grouped together.\n\n![images](images/0403.jpg)\n\n**Figure 4–3.** *Let\
    \ the games begin! The `DoodleDrop` project at this point is based on the `HelloWorld`\
    \ cocos2d project template. Make sure you add subsequent files to the `Classes`\
    \ and `Resources` groups accordingly to keep your game project organized.*\n\n\
    The next step you’re faced with is a decision: do you start working with the `HelloWorldScene`\
    \ because it’s there already, possibly renaming it later? Or do you go through\
    \ the extra steps to create your own scene to replace the `HelloWorldScene`? I\
    \ chose the latter because eventually you’ll have to add new scenes anyway, so\
    \ it’s a good idea to learn the ropes here and now and start with a clean slate.\n\
    \nMake sure the `Classes` group is selected and then select **File ![images](images/U001.jpg)\
    \ New ![images](images/U001.jpg) New File…** or right-click the `Classes` folder\
    \ and select **New File…** to open the New File dialog shown in [Figure 4–4](#Chapter04.html#fig_4_4).\
    \ Since cocos2d comes with class templates for the most important nodes, it would\
    \ be a shame not to use them. From the cocos2d User Templates section, select\
    \ the `CCNode` class, click **Next**, and make sure it’s set to **Subclass of\
    \ CCLayer** before clicking **Next** again to bring up the save file dialog in\
    \ [Figure 4–5](#Chapter04.html#fig_4_5).\n\n![images](images/0404.jpg)\n\n**Figure\
    \ 4–4.** *Adding new `CCNode`-derived classes is best done using the class templates\
    \ provided by cocos2d. In this case, we want the `CCNode` class to be a subclass\
    \ of `CCLayer` since we’re setting up a new scene.*\n\nI prefer to name classes\
    \ by function and in a generic way. I’m using `GameScene.m` in this case. It’s\
    \ going to be the scene where the `DoodleDrop` game play takes place, so that\
    \ name seems appropriate. Be sure that the `DoodleDrop` target check box is checked.\
    \ If you’re using `Xcode 3`, the **Also create “GameScene.h”** check box must\
    \ also be checked. Targets are `Xcode`’s way of creating more or less different\
    \ versions of the executable. For example, the iPad version of a game is usually\
    \ created as a separate target. In this case, we have only one target, but once\
    \ you create an iPad target, you want to make sure that, for example, the iPad’s\
    \ high-resolution images aren’t accidentally added to the iPhone/iPod touch target.\n\
    \n**NOTE:** Not reviewing the target check boxes can lead to all kinds of issues,\
    \ from compile errors to “file not found” errors or crashes during game play when\
    \ files haven’t been added to the targets that need them. Or you might simply\
    \ waste space by adding files to targets that don’t need them at all, for example\
    \ by adding iPad and iPhone 4 high-res images to regular iPhone/iPod touch targets.\n\
    \n![images](images/0405.jpg)\n\n**Figure 4–5.** *Naming the new scene and making\
    \ sure it’s added to the appropriate targets*\n\nAt this point, our `GameScene`\
    \ class is empty, and the first thing we need to do to set it up as a scene is\
    \ to add the `+(id) scene` method to it. The code we’ll plug in is essentially\
    \ the same as in [Chapter 3](#Chapter03.html#ch3), with only the layer’s class\
    \ name changed. What you’ll almost always need in any class are the `-(id) init`\
    \ and `-(void) dealloc` methods, so it makes sense to add them right away. I’m\
    \ also a very cautious programmer and decided to add the logging statements introduced\
    \ in [Chapter 3](#Chapter03.html#ch3). The resulting `GameScene.h` is shown in\
    \ [Listing 4–1](#Chapter04.html#list_4_1), and `GameScene.m` is in [Listing 4–2](#Chapter04.html#list_4_2).\n\
    \n**Listing 4–1.** *`GameScene.h` with the Scene Method*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface GameScene : CCLayer\n{\n}\n\n+(id) scene;\n\
    \n@end\n```\n\n**Listing 4–2.** *`GameScene.m` with the Scene Method and Standard\
    \ Methods Added, Including Logging*\n\n```\n#import \"GameScene.h\"\n\n@implementation\
    \ GameScene\n\n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    CCLayer*\
    \ layer = [GameScene node];\n    [scene addChild:layer];\n    return scene;\n\
    }\n\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        CCLOG(@\"%@:\
    \ %@\", NSStringFromSelector(_cmd), self);\n    }\n\n    return self;\n}\n\n-(void)\
    \ dealloc\n{\n    CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\n  \
    \  // never forget to call [super dealloc]\n    [super dealloc];\n}\n\n@end\n\
    ```\n\nNow you can safely delete the `HelloWorldScene` class. When asked, select\
    \ the **Also Move to Trash** option to remove the file from the hard drive as\
    \ well, not just from the `Xcode` project. Select both files and choose **Edit\
    \ ![images](images/U001.jpg) Delete**, or right-click the files and choose **Delete**\
    \ from the context menu. With the `HelloWorldScene` class gone, you have to modify\
    \ `DoodleDropAppDelegate.m` to change any references to `HelloWorldScene` to `GameScene`.\
    \ [Listing 4–3](#Chapter04.html#list_4_3) highlights the necessary changes to\
    \ the `#import` and `runWithScene` statements. I also changed the device orientation\
    \ to portrait mode since the game is designed to work best in that mode.\n\n**Listing\
    \ 4–3.** *Changing `DoodleDropAppDelegate.m` File to Use the `GameScene` Class\
    \ Instead of `HelloWorldScene`*\n\n```\n// replace the line #import \"HelloWorldScene.h\"\
    \ with this one:\n#import \"GameScene.h\"\n\n- (void) applicationDidFinishLaunching:(UIApplication*)application\n\
    {\n    …\n\n    // Sets Portrait mode\n    [director setDeviceOrientation:kCCDeviceOrientationPortrait];\n\
    \n    …\n\n    // replace HelloWorld with GameScene\n[[CCDirector sharedDirector]\
    \ runWithScene: [GameScene scene]];\n}\n```\n\nCompile and run, and you should\
    \ end up with…a blank scene. Success! If you run into any problems, compare your\
    \ project with the `DoodleDrop01` project that accompanies this book.\n\n**NOTE:**\
    \ Starting with cocos2d version 0.99.5, a file named `GameConfig.h` was added\
    \ to the cocos2d `Xcode` project templates. If portrait mode isn’t working for\
    \ you and you started a new project based on one of the cocos2d `Xcode` project\
    \ templates, it’s probably because the game defaults to autorotation. If you see\
    \ `#define GAME_AUTOROTATION kGameAutorotationUIViewController` in `GameConfig.h`,\
    \ you have to change it to this line in order to disable autorotation: `#define\
    \ GAME_AUTOROTATION kGameAutorotationNone`."
