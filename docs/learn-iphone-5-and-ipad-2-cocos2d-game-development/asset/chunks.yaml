- fmt: "#### Working with the Object Layer\n\nThe `orthogonal.tmx` tilemap I've created\
    \ as an example tilemap for this chapter also contains an object layer, fittingly\
    \ named `ObjectLayer`. You can create object layers in Tiled by choosing `Layer`\
    \ `Add Object Layer`. Then you can click inside the tilemap and draw rectangles.\
    \ I think the name *object layer* is a bit unfortunate and misleading, because\
    \ most games will use these rectangles as points of interest and trigger areas,\
    \ and not as actual objects.\n\nIn the `Tilemap03` project, I've added a bit more\
    \ code to the `ccTouchesBegan` method to interact with the object layer. [Listing\
    \ 10–4](#Chapter10.html#list_10_4) shows the relevant part of the code, which\
    \ follows directly after the `isWater` check:\n\n**Listing 10–4.** *Detecting\
    \ If a Touch Was Inside an ObjectLayer Rectangle*\n\n```\n// Check if the touch\
    \ was within one of the rectangle objects\nCCTMXObjectGroup* objectLayer = [tileMap\
    \ objectGroupNamed:@\"ObjectLayer\"];\n\nbool isTouchInRectangle = NO;\nint numObjects\
    \ = [objectLayer.objects count];\nfor (int i = 0; i < numObjects; i++)\n{\n  \
    \  NSDictionary* properties = [objectLayer.objects objectAtIndex:i];\n    CGRect\
    \ rect = [self getRectFromObjectProperties:properties tileMap:tileMap];\n\n  \
    \  if (CGRectContainsPoint(rect, touchLocation))\n    {\n        isTouchInRectangle\
    \ = YES;\n        break;\n    }\n}\n```\n\nBecause object layers are a different\
    \ kind of layer, you can't get them via the `layerNamed` method of the tilemap.\
    \ The object layer in cocos2d is the class `CCTMXObjectGroup`, another unfortunate\
    \ naming mishap, since Tiled refers to it as an *object layer*, not an *object\
    \ group*. In any case, you can get the `CCTMXObjectGroup` for the object layer\
    \ named simply `ObjectLayer` by using the tilemap's `objectGroupNamed` method\
    \ and specifying the object layer's name as defined in Tiled.\n\nNext, I iterate\
    \ over the `objectLayer.objects` `NSMutableArray`, which contains a list of `NSDictionary`\
    \ items. Sound familiar? Yes, these are the same `NSDictionary` properties returned\
    \ by the tilemap's `propertiesForGID` method, as shown earlier—except that the\
    \ contents of these `NSDictionary` items are given by Tiled and not user editable.\
    \ They simply contain the coordinates for each rectangle. The method `getRectFromObjectProperties`\
    \ returns the rectangle:\n\n```\n-(CGRect) getRectFromObjectProperties:(NSDictionary*)dict\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    float x, y, width, height;\n\n    x\
    \ = [[dict valueForKey:@\"x\"] floatValue] + tileMap.position.x;\n    y = [[dict\
    \ valueForKey:@\"y\"] floatValue] + tileMap.position.y;\n    width = [[dict valueForKey:@\"\
    width\"] floatValue];\n    height = [[dict valueForKey:@\"height\"] floatValue];\n\
    \n    return CGRectMake(x, y, width, height);\n}\n```\n\nThe keys `x`, `y`, `width`,\
    \ and `height` are set by Tiled. I simply retrieve them from the `NSDictionary`\
    \ via `valueForKey` and use the `floatValue` method to convert the values from\
    \ `NSString` to actual floating-point numbers. The x and y values need to be offset\
    \ with the `tileMap`'s position, because the rectangles need to be moving along\
    \ with the tilemap. At the end, a `CGRect` is returned by calling the `CGRectMake`\
    \ convenience method.\n\nThe remaining code in `ccTouchesBegan` then simply checks\
    \ whether the touch location is contained in the `rect` via `CGRectContainsPoint`.\
    \ If it is, the `isTouchInRectangle` flag is set to `true`, and the `for` loop\
    \ is aborted by using the `break` statement. There's no need to check another\
    \ rectangle for containing the touch location. At the end of `ccTouchesBegan`,\
    \ the `isTouchInRectangle` flag is then used to decide whether to play a particle\
    \ effect at the touch location. So, this code is creating an explosion particle\
    \ effect whenever you touch inside a rectangle:\n\n```\nif (isTouchOnWater)\n\
    {\n    [[SimpleAudioEngine sharedEngine] playEffect:@\"alien-sfx.caf\"];\n}\n\
    else if (isTouchInRectangle)\n{\n    CCParticleSystem* system = [CCQuadParticleSystem\
    \ particleWithFile:\n        @\"fx-explosion.plist\"];\n    system.autoRemoveOnFinish\
    \ = YES;\n    system.position = touchLocation;\n    [self addChild:system z:1];\n\
    }\n```"
  raw: '#### Working with the Object Layer


    Theorthogonal.tmxtilemap I''ve created as an example tilemap for this chapter
    also contains an object layer, fittingly named `ObjectLayer`. You can create object
    layers in Tiled by choosing `Layer` ![images](images/U001.jpg) `Add Object Layer`.
    Then you can click inside the tilemap and draw rectangles. I think the name *object
    layer* is a bit unfortunate and misleading, because most games will use these
    rectangles as points of interest and trigger areas, and not as actual objects.


    In the Tilemap03 project, I''ve added a bit more code to the `ccTouchesBegan`
    method to interact with the object layer. [Listing 10–4](#Chapter10.html#list_10_4)
    shows the relevant part of the code, which follows directly after the `isWater`
    check:


    **Listing 10–4.** *Detecting If a Touch Was Inside an ObjectLayer Rectangle*


    `// Check if the touch was within one of the rectangle objects`

    `CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];`


    `bool isTouchInRectangle = NO;`

    `int numObjects = [objectLayer.objects count];`

    `for (int i = 0; i < numObjects; i++)`

    `{`

    `    NSDictionary* properties = [objectLayer.objects objectAtIndex:i];`

    `    CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];`


    `    if (CGRectContainsPoint(rect, touchLocation))`

    `    {`

    `        isTouchInRectangle = YES;`

    `        break;`

    `    }`

    `}`


    Because object layers are a different kind of layer, you can''t get them via the
    `layerNamed` method of the tilemap. The object layer in cocos2d is the class `CCTMXObjectGroup`,
    another unfortunate naming mishap, since Tiled refers to it as an *object layer*,
    not an *object group*. In any case, you can get the `CCTMXObjectGroup` for the
    object layer named simply `ObjectLayer` by using the tilemap''s `objectGroupNamed`
    method and specifying the object layer''s name as defined in Tiled.


    Next, I iterate over the `objectLayer.objectsNSMutableArray`, which contains a
    list of `NSDictionary` items. Sound familiar? Yes, these are the same `NSDictionary`
    properties returned by the tilemap''s `propertiesForGID` method, as shown earlier—except
    that the contents of these `NSDictionary` items are given by Tiled and not user
    editable. They simply contain the coordinates for each rectangle. The method `getRectFromObjectProperties`
    returns the rectangle:


    `-(CGRect) getRectFromObjectProperties:(NSDictionary*)dict tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    float x, y, width, height;`


    `    x = [[dict valueForKey:@"x"] floatValue] + tileMap.position.x;`

    `    y = [[dict valueForKey:@"y"] floatValue] + tileMap.position.y;`

    `    width = [[dict valueForKey:@"width"] floatValue];`

    `    height = [[dict valueForKey:@"height"] floatValue];`


    `    return CGRectMake(x, y, width, height);`

    `}`


    The keys `x`, `y`, `width`, and `height` are set by Tiled. I simply retrieve them
    from the `NSDictionary` via `valueForKey` and use the `floatValue` method to convert
    the values from `NSString` to actual floating-point numbers. The x and y values
    need to be offset with the `tileMap`''s position, because the rectangles need
    to be moving along with the tilemap. At the end, a `CGRect` is returned by calling
    the `CGRectMake` convenience method.


    The remaining code in `ccTouchesBegan` then simply checks whether the touch location
    is contained in the `rect` via `CGRectContainsPoint`. If it is, the `isTouchInRectangle`
    flag is set to `true`, and the `for` loop is aborted by using the `break` statement.
    There''s no need to check another rectangle for containing the touch location.
    At the end of `ccTouchesBegan`, the `isTouchInRectangle` flag is then used to
    decide whether to play a particle effect at the touch location. So, this code
    is creating an explosion particle effect whenever you touch inside a rectangle:


    `if (isTouchOnWater)`

    `{`

    `    [[SimpleAudioEngine sharedEngine] playEffect:@"alien-sfx.caf"];`

    `}`

    `else if (isTouchInRectangle)`

    `{`

    `    CCParticleSystem* system = [CCQuadParticleSystem particleWithFile:`![images](images/U002.jpg)

    `        @"fx-explosion.plist"];`

    `    system.autoRemoveOnFinish = YES;`

    `    system.position = touchLocation;`

    `    [self addChild:system z:1];`

    `}`'
  trans: "\n#### 使用对象层\n\n我在本章中用作示例瓦片地图的 `orthogonal.tmx` 文件也包含一个对象层，它的名称恰如其分地叫做 `ObjectLayer`。你可以在\
    \ Tiled 中通过选择 `图层` -> `添加对象层` 来创建对象层。然后，你就能点击瓦片地图内部并绘制矩形。我认为 *对象层* 这个名称有点不幸且容易让人误解，因为大多数游戏会把这些矩形用作兴趣点和触发区域，而不是当作实际的对象。\n\
    \n在 `Tilemap03` 项目中，我在 `ccTouchesBegan` 方法中增加了一些代码来处理对象层。清单 10–4 展示了紧随 `isWater`\
    \ 检查之后的相关代码部分：\n\n**清单 10–4.** *检测触摸点是否位于对象层矩形内*\n\n```\n// 检查触摸点是否在矩形对象内部\nCCTMXObjectGroup*\
    \ objectLayer = [tileMap objectGroupNamed:@\"ObjectLayer\"];\n\nbool isTouchInRectangle\
    \ = NO;\nint numObjects = [objectLayer.objects count];\nfor (int i = 0; i < numObjects;\
    \ i++)\n{\n    NSDictionary* properties = [objectLayer.objects objectAtIndex:i];\n\
    \    CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];\n\
    \n    if (CGRectContainsPoint(rect, touchLocation))\n    {\n        isTouchInRectangle\
    \ = YES;\n        break;\n    }\n}\n```\n\n由于对象层是一种不同类型的图层，你不能通过瓦片地图的 `layerNamed`\
    \ 方法来获取它。cocos2d 中的对象层是 `CCTMXObjectGroup` 类，这又是一个不幸的命名失误，因为 Tiled 将其称为 *对象层*，而非\
    \ *对象组*。无论如何，你可以通过使用瓦片地图的 `objectGroupNamed` 方法，并指定在 Tiled 中定义的对象层名称，来获取名为 `ObjectLayer`\
    \ 的对象层所对应的 `CCTMXObjectGroup`。\n\n接下来，我遍历 `objectLayer.objects` 这个 `NSMutableArray`，它包含了一个\
    \ `NSDictionary` 项的列表。听起来很熟悉对吧？是的，这些正是之前展示的、由瓦片地图的 `propertiesForGID` 方法返回的 `NSDictionary`\
    \ 属性——不过，这些 `NSDictionary` 项的内容是由 Tiled 提供的，并且用户不可编辑。它们只是包含了每个矩形的坐标。`getRectFromObjectProperties`\
    \ 方法用于获取矩形：\n\n```\n-(CGRect) getRectFromObjectProperties:(NSDictionary*)dict\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    float x, y, width, height;\n\n    x\
    \ = [[dict valueForKey:@\"x\"] floatValue] + tileMap.position.x;\n    y = [[dict\
    \ valueForKey:@\"y\"] floatValue] + tileMap.position.y;\n    width = [[dict valueForKey:@\"\
    width\"] floatValue];\n    height = [[dict valueForKey:@\"height\"] floatValue];\n\
    \n    return CGRectMake(x, y, width, height);\n}\n```\n\n键 `x`、`y`、`width` 和 `height`\
    \ 是由 Tiled 设置的。我只需通过 `valueForKey` 从 `NSDictionary` 中获取它们，并使用 `floatValue` 方法将这些值从\
    \ `NSString` 转换为实际的浮点数。x 和 y 的值需要加上 `tileMap` 的偏移量，因为矩形需要跟随瓦片地图一起移动。最后，通过调用 `CGRectMake`\
    \ 便捷方法来返回一个 `CGRect`。\n\n`ccTouchesBegan` 中剩下的代码则简单地通过 `CGRectContainsPoint` 检查触摸点是否位于\
    \ `rect` 内。如果是，则将 `isTouchInRectangle` 标志设置为 `true`，并使用 `break` 语句中止 `for` 循环。这里无需再检查其他矩形是否包含该触摸点。在\
    \ `ccTouchesBegan` 的末尾，根据 `isTouchInRectangle` 标志决定是否在触摸点处播放粒子效果。因此，这段代码会在你触摸矩形内部时创建一个爆炸粒子效果：\n\
    \n```\nif (isTouchOnWater)\n{\n    [[SimpleAudioEngine sharedEngine] playEffect:@\"\
    alien-sfx.caf\"];\n}\nelse if (isTouchInRectangle)\n{\n    CCParticleSystem* system\
    \ = [CCQuadParticleSystem particleWithFile:\n        @\"fx-explosion.plist\"];\n\
    \    system.autoRemoveOnFinish = YES;\n    system.position = touchLocation;\n\
    \    [self addChild:system z:1];\n}\n```\n"
- fmt: '### Drawing the Object Layer Rectangles


    When you run the `Tilemap03` project, you''ll notice that the object layer rectangles
    are drawn over the tilemap, as shown in [Figure 10–12](#Chapter10.html#fig_10_12).
    This is not a standard feature of tilemaps or object layers. Instead, the rectangles
    are drawn using OpenGL ES code. Every `CCNode` has a `–(void) draw` method that
    you can override to add custom OpenGL ES code. I tend to use this a lot to debug
    my code visually by drawing lines, circles, and rectangles that may be used for
    collision and distance tests, among other things. In this case, it''s very useful
    to actually see where the object layer areas are. Visualizing such information
    beats looking up and comparing coordinates in the debugger. Our minds are much
    better at assessing visual information than at comparing and calculating numbers.
    Use this to your advantage!


    ![images](images/1012.jpg)


    **Figure 10–12.** *The tilemap with object layer rectangles displayed using OpenGL
    ES code*


    The `–(void) draw` method just needs to be in the class, and it will be called
    automatically every frame. However, you should refrain from using the `draw` method
    to modify properties of nodes, because this can interfere with drawing the nodes.
    [Listing 10–5](#Chapter10.html#list_10_5) shows the `draw` method of the `TileMapLayer`
    class.


    **Listing 10–5.** *Drawing ObjectLayer Rectangles*


    ```

    -(void) draw

    {

        CCNode* node = [self getChildByTag:TileMapNode];

        NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

        CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


        // Get the object layer

        CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];


        // Make the line 3 pixels thick

        glLineWidth(3.0f);

        glColor4f(1, 0, 1, 1);


        int numObjects = [[objectLayer objects] count];

        for (int i = 0; i < numObjects; i++)

        {

            NSDictionary* properties = [[objectLayer objects] objectAtIndex:i];

            CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];

            [self drawRect:rect];

        }


        glLineWidth(1.0f);

        glColor4f(1, 1, 1, 1);

    }

    ```


    First, I get the tilemap by its tag and then the `CCTMXObjectGroup` by using the
    `objectGroupNamed` method. I then set the line width to 3 pixels by using the
    OpenGL ES method `glLineWidth` and set the color to purple by using `glColor4f`.
    This affects line thickness and color of all subsequent lines drawn with OpenGL
    ES—not just in the current method but possibly other nodes that use OpenGL ES
    code for drawing (for example, any of the convenience methods for drawing lines,
    circles, and polygons defined in cocos2d''s `CCDrawingPrimitives.h` header file).
    That is why I reset `glLineWidth` and `glColor4f` after I''m done drawing. It
    is good style in OpenGL code to leave its state like you found it; otherwise,
    it might alter the way other draw code produces its output. OpenGL is a state
    machine, so every setting you change is remembered and may affect subsequent drawing
    methods. To avoid this, any OpenGL settings you change should be set back to a
    safe default after you''re done drawing.


    **NOTE:** Code inside the `-(void) draw` method is always drawn at a z-order of
    0. It is also drawn before all other nodes at z-order 0, which means that any
    OpenGL ES code will be overdrawn by other nodes if they are also at z-order 0.
    In the case of the object layer `draw` code, I had to add the `tileMap` at a z-order
    of –1 for the rectangles to be drawn over the tilemap.


    Just like before, I iterate over all object layer objects and get their properties
    from `NSDictionary` to get the `CGRect` of that object, which is then passed to
    the `drawRect` method. Unfortunately, cocos2d omitted this particular convenience
    method, but it''s easy enough to add using `ccDrawLine`, as [Listing 10–6](#Chapter10.html#list_10_6)
    shows.


    **Listing 10–6.** *Drawing a Rectangle*


    ```

    -(void) drawRect:(CGRect)rect

    {

        // The rect is drawn using four lines

        CGPoint pos1, pos2, pos3, pos4;

        pos1 = CGPointMake(rect.origin.x, rect.origin.y);

        pos2 = CGPointMake(rect.origin.x, rect.origin.y + rect.size.height);

        pos3 = CGPointMake(rect.origin.x + rect.size.width,

            rect.origin.y + rect.size.height);

        pos4 = CGPointMake(rect.origin.x + rect.size.width, rect.origin.y);


        ccDrawLine(pos1, pos2);

        ccDrawLine(pos2, pos3);

        ccDrawLine(pos3, pos4);

        ccDrawLine(pos4, pos1);

    }

    ```


    For each corner of the rectangle, a `CGPoint` is created, which is then used in
    four `ccDrawLine` methods to draw the lines between the corners of the rectangle.
    You may want to remember this method and put it in a safe place, because you''ll
    probably need it again.


    Note that the `draw` and `drawRect` methods are enclosed in `#ifdef DEBUG` and
    `#endif` statements. This means that the object layer rectangles will not be drawn
    in release builds, because I only need them for debugging and illustration purposes—the
    end user should never see them.


    ```

    #ifdef DEBUG

    -(void) drawRect:(CGRect)rect

    {

        ...

    }


    -(void) draw

    {

        ...

    }

    #endif

    ```'
