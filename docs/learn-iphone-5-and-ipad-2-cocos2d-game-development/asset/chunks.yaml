    `    }`

    `    return self;`

    `}`


    `+(id) ballWithWorld:(b2World*)world`

    `{`

    `    return [[[self alloc] initWithWorld:world] autorelease];`

    `}`


    `-(void) dealloc`

    `{`

    `    [[CCTouchDispatcher sharedDispatcher] removeDelegate:self];`

    `    [super dealloc];`

    `}`


    Just like the `TablePart` class, the initialization begins by calling the `BodyNode`
    init method `initWithShape`, which takes care of setting up the body and sprite.
    Well, it almost does so, since we do have to set the body type to be a `b2_dynamicBody`
    to let `Box2D` know that this body should be treated as a movable object.


    In addition, the angular damping value of the bodyis set to `0.9f`, which makes
    the ball''s angular motion more resistant to change. This allows the ball to slide
    over a surface without rolling too much, which is standard behavior for heavy
    pinballs made of metal.


    **TIP:** Tweaking physics values is usually a very labor-intensive aspect that
    requires careful consideration of each change. It''s also frequently underestimated
    by both designers and programmers alike. That is because all physics attributes
    are interrelated or interdependent. For example, if you change the density (mass),
    friction, or restitution of one object, you''ll inevitably alter the behavior
    of any colliding object. You''ll notice that this example pinball game, while
    it does a fairly good job of simulating a pinball game, would still require a
    lot of tweaking and fine-tuning of the ball''s behavior and collision responses
    for everything to feel just right and to be a fair and fun pinball table. PhysicsEditor
    can help you with the tweaking of values by providing you a single, convenient
    interface for editing any shape''s physics parameters.


    The `setBallStartPosition` method repositions the ball somewhere in the area where
    you''ll later add the plunger. By slightly randomizing the ball''s position the
    plunger will later shoot the ball into play more realistically, meaning unpredictably
    to some extent. Whenever the ball falls into the drain, the `setBallStartPosition`
    method is called again to place the ball back to its start position.'
