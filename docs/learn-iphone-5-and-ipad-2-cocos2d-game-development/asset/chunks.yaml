    \n`CC3World` 类是 cocos3d 节点层次结构的根节点。重要的是要注意，cocos3d 节点和 cocos2d 节点是两个独立的事物，不能混合在一起。您可以添加到\
    \ cocos2d 节点层次结构中的唯一 cocos3d 类是 `CC3Layer` 类，它继承自 `CCLayerColor`。\n\n**注意：** 我将跳过\
    \ Hello Cocos3D 项目中对 `CC3Layer` 类的描述，因为它是一个空的存根类，本质上与 `CCLayer` 类相同。\n\n所有其他 cocos3d\
    \ 节点都继承自 `CC3Node`，尽管其名称如此，但它并非派生自 `CCNode`。但有趣的是，您可以将 cocos2d 动作与 `CC3Node` 类一起使用，正如您在\
    \ 代码清单 16–8 的 `initializeWorld` 方法中看到的那样。\n\n**代码清单 16–8.** 初始化 3D 世界\n\n```\n\
    -(void) initializeWorld\n{\n    CC3Camera* cam = [CC3Camera nodeWithName:@\"Camera\"\
    ];\n    cam.location = cc3v( 0.0, 0.0, 5.0 );\n    [self addChild: cam];\n\n \
    \   CC3Light* lamp = [CC3Light nodeWithName:@\"Lamp\"];\n    lamp.location = cc3v(\
    \ -2.0, 0.0, -2.0 );\n    lamp.isDirectionalOnly = NO;\n    [cam addChild: lamp];\n\
    \n    [self addContentFromPODResourceFile:@\"hello-world.pod\"];\n\n    [self\
    \ createGLBuffers];\n    [self releaseRedundantData];\n\n    // ------------------------------------------\n\
    \n    CC3MeshNode* helloTxt = (CC3MeshNode*)[self getNodeNamed:@\"Hello\"];\n\
    \    CCActionInterval* partialRot = [CC3RotateBy actionWithDuration:1.0\n    \
    \                                                      rotateBy:cc3v(0, 60.0,\
    \ 10.0)];\n    [helloTxt runAction:[CCRepeatForever actionWithAction:partialRot]];\n\
    \n    CC3MeshNode* camNode = (CC3MeshNode*)[self getNodeNamed: @\"Camera\"];\n\
    \    CCActionInterval* camMove1 = [CC3MoveBy actionWithDuration:4 moveBy:cc3v(0,\
    \ 0, 8)];\n    id camEase1 = [CCEaseBackInOut actionWithAction:camMove1];\n  \
    \  CCActionInterval* camMove2 = [CC3MoveBy actionWithDuration:2 moveBy:cc3v(0,\
    \ 0, -8)];\n    id camEase2 = [CCEaseElasticOut actionWithAction:camMove2 period:0.25f];\n\
    \    id sequence = [CCSequence actions:camEase1, camEase2, nil];\n    [camNode\
    \ runAction:[CCRepeatForever actionWithAction:sequence]];\n\n    GLfloat tintTime\
    \ = 8.0f;\n    ccColor3B startColor = ccc3(255, 0, 255);\n    ccColor3B endColor\
    \ = { 255, 255, 0 };\n    CCActionInterval* tintDown = [CCTintTo actionWithDuration:tintTime\n\
    \                                                          red:endColor.r\n  \
    \                                                      green:endColor.g\n    \
    \                                                     blue:endColor.b];\n    CCActionInterval*\
    \ tintUp = [CCTintTo actionWithDuration:tintTime\n                           \
    \                             red:startColor.r\n                             \
    \                         green:startColor.g\n                               \
    \                        blue:startColor.b];\n    CCActionInterval* tintCycle\
    \ = [CCSequence actionOne:tintDown two:tintUp];\n    [helloTxt runAction:[CCRepeatForever\
    \ actionWithAction:tintCycle]];\n}\n```\n\n3D 世界首先需要一个摄像机，通过它来观察场景。摄像机仅影响 cocos3d\
    \ 节点，不会改变 cocos2d 节点的显示方式。摄像机的 `location` 属性定义了摄像机的位置，这对 3D 世界的新手来说起初可能会感到困惑。如果您移动摄像机，所有\
    \ cocos3d 节点将向相反方向移动。想象一下，您透过相机的取景器观看，然后将相机向右移动，您会看到相机视野中的所有物体都向左移动。`CC3Camera`\
    \ 也是如此，只是您必须将设备的屏幕想象成您用来观察 3D 世界的取景器。\n\n作为参考，增加摄像机 x、y 和 z 位置的值将分别使摄像机向右、向上和朝向观察者移动。这将导致\
    \ 3D 对象向左、向下和远离观察者移动（缩小）。减小 x、y 和 z 位置将使摄像机视图向左、向下和远离观察者移动。3D 对象将向右、向上和朝向观察者移动（放大）。当然，如果您觉得更容易处理，您也可以始终将摄像机固定在某个位置，然后移动\
    \ 3D 节点。\n\n一个 `CC3World` 缺少至少一个光源是不完整的。没有光，您的 3D 模型的所有侧面都会得到均匀的照明，这会让它们看起来是平面的，尽管是\
    \ 3D 的。默认情况下，`CC3Light` 节点创建的是方向光，类似于手电筒。如果您想实现灯泡均匀照亮其所有周围环境的效果（首选），则需要将 `isDirectionallyOnly`\
    \ 设置为 `NO`。\n\n设置好摄像机和光源后，所缺少的就是动作了。在我们讨论这个之前，我们需要一个要显示的 3D 模型。您可以使用 `CC3Node`\
    \ 方法 `addContentFromPODResourceFile` 从 POD 文件加载 3D 模型。这将加载 POD 文件并将其作为 `CC3MeshNode`\
    \ 实例添加到世界中。稍后，您可以使用 `getNodeNamed` 方法并提供在 3D 建模程序中设置的网格名称来获取对此节点的引用。`hello-world.pod`\
    \ 网格的名称为 `Hello`。\n\n**提示：** Cocos3d v0.6.1 仅支持加载 PowerVR POD 文件。其他 3D 模型文件加载器已列入\
    \ 2011 年第四季度的路线图中，但未指定将支持哪些文件格式。在此之前，您可以使用 POD 或编写自己的加载器代码。\n\nPOD 格式是一种优化的二进制格式，大多数\
    \ 3D 建模应用程序无法直接导出。然而，几乎所有的建模软件都可以导出为 COLLADA 格式，然后您可以将其转换为 POD 格式。cocos3d 的开发者\
    \ Bill Hollings 有一个关于将 COLLADA 文件转换为 POD 格式的出色教程：[`http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod`](http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod)。\n\
    \n该教程假设您使用的是 Blender 3D 内容创作套件，它因免费和开源而非常流行。许多其他 3D 建模程序的价格高达四位数甚至五位数。您可以在 [`www.blender.org`](http://www.blender.org)\
    \ 获取 Blender，并忽略它的一些怪异之处。毕竟，您刚刚省下了一大笔钱。\n\n`createGLBuffers` 方法应在加载所有 3D 网格模型后调用。它优化用于渲染的顶点数组。而\
    \ `releaseRedundantData` 只是执行一次清理以释放一些内存。\n\n`initializeWorld` 方法的后半部分用于使用 cocos2d\
    \ 和 cocos3d 动作进行动画。cocos3d 提供了一些额外的动作，如 `CC3RotateBy`、`CC3MoveBy`，以及所有需要在三维坐标系中工作的操作位置的动作。其他动作，如\
    \ `CCSequence`、`CCRepeatForever` 或 `CCTintTo` 来自 cocos2d。它们一如既往地工作，并且可以与 cocos3d\
    \ 动作混合使用。\n\n本质上，有三个动作块。第一个块绕其自身轴旋转 Hello World 3D 模型。第二个块让摄像机来回弹跳。第三个动作块在 Hello\
    \ World 3D 模型上执行重复的颜色循环。\n"
- fmt: '# Adding cocos3d to an Existing Kobold2D Project


    You can always start with a regular Kobold2D project template and only later decide
    that you want to include cocos3d features in your app. There’s only one thing
    that you’ll have to do manually; otherwise, you’ll get runtime errors like this
    unrecognized selector error:


    `-[Hello3DWorld addContentFromPODResourceFile:]: unrecognized selector sent to
    instance`


    This is a common error that can occur when an app links to a static library that
    contains Objective-C categories.


    **CAUTION:** The often proposed simple solution to this problem is to use the
    `–all_load` linker flag. However, this is not recommended and specifically not
    for Kobold2D, because the linker would blindly include each and every library
    and framework whether it’s being used or not. The final executable will be several
    megabytes larger if you use the `–all_load` flag in a Kobold2D project.


    The recommended solution is to explicitly specify the library that must be forcibly
    included in the executable via the `–force_load` linker flag:


    `-force_load $(BUILT_PRODUCTS_DIR)/libcocos3d-ios.a`


    You will have to append this line to the build setting **Other Linker Flags**
    of the target that needs the cocos3d library. Depending on which other libraries
    are already being linked to your app, the executable size will increase by several
    hundred kilobytes up to around 1.5 megabytes. Since that’s a size that isn’t negligible,
    cocos3d is currently not fully integrated with Kobold2D and requires this manual
    step.


    ## Summary


    I hope that this chapter has given you a good impression of how working with Kobold2D
    will help you make games and apps easier and with more possibilities. And on the
    [`www.kobold2d.com`](http://www.kobold2d.com) web site, you’ll have access to
    the API documentation of all libraries, a programming guide, the support forum,
    the feedback section, and a road map that allows you to see how Kobold2D development
    is progressing.


    One of the most important features of Kobold2D is its ability to use Lua tables
    to define settings. You’ll then be able to feed these settings directly into properties
    of class instances with just a single call to the `KKConfig` class. This is even
    more important if you work with others who need to make changes to the app but
    do not want to or should not have to change the source code.


    Kobold2D also makes cross-platform development for iOS and Mac OS easier and provides
    a convenient, one-stop class for handling user input, as you saw in this section.
    You’ll also find plenty of template projects in Kobold2D based on projects created
    throughout the book and subsequently ported to work on Mac OS.


    New to the cocos2d world is the cocos3d add-on library. You learned about the
    basics of cocos3d in the discussion of the Hello Cocos3D template project. And
    I think you’ll appreciate it that you can readily try cocos3d now and understand
    the basic distinction of the `CC3World` being the root node for the cocos3d nodes
    while the `CC3Layer` allows you to plug the 3D world anywhere into a cocos2d scene.


    What’s left is for you to go to [`www.kobold2d.com`](http://www.kobold2d.com)
    now to download the latest version, install it, and start experimenting with the
    provided template projects.


    ## Chapter 17


    ## Out of the Ordinary


    This final chapter contains no source code. I’m not even going to talk much about
    the cocos2d engine. Instead, I’d like to focus on where you can go after you’ve
    read this book—for example, to ask questions and to learn more. But you should
    also investigate which technologies may be useful to implement in your game, such
    as advertising, analytics, one of the many social networking libraries, and even
    server technology used in persistent world games.


    Everything you ever wanted to know is probably somewhere on the Internet. It may
    simply be hiding. If you want to know where to find art, audio, and freelancers,
    I’ll provide good starting points. And I’ll continue to provide more information
    and links on my blog, so be sure to visit my web site, at [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com).


    I’m also giving you a glimpse into marketing and public relations in this final
    chapter. Those are topics that are often asked about, full of mystery and misunderstandings.
    They include working with a publisher and how you can benefit from such a relationship
    and also how to market your game and yourself.


    For an independent developer, it’s very important to be recognized by the community
    as a creative, enthusiastic game developer and to connect with the community.
    All of your social networking efforts will then help you promote your game simply
    by being able to reach out to more like-minded people. If you can build a network
    of followers, the success of your game will follow. A lot of people get that mixed
    up and think it’s the other way round. It’s not.


    You’ll also learn about the reference games and apps made available with cocos2d.
    They’ll give you a good impression of what’s possible with the cocos2d game engine
    and also what you can achieve as an independent developer. One of the most exciting
    learning tools is other people’s source code, so I’ve included a list of commercial
    cocos2d source code projects that are on sale for exactly this reason.


    Most of all, “out of the ordinary” should be the guiding principle for whatever
    you do. Create something that’s different, and don’t be afraid to be different.


    ### Additional Resources for Learning and Working


    The purpose of this section is to help you find answers to your questions, get
    support for a particular problem, obtain more source code to learn from and base
    your own games on, and of course introduce you to all the cocos2d tools and some
    of the best cocos2d reference games.


    It is also the purpose of my blog at [`www.learn-cocos2d.com/blog`](http://www.learn-cocos2d.com/blog).
    You’ll find the latest updates and cocos2d game development tips and tricks in
    my blog where I post a new article on average once per week.


    #### Where to Find Help


    Whether you are facing a technical problem that you can’t solve on your own or
    need more people to work on your game, you can get help. In addition, if you’re
    looking for art, audio, or tools, I know just the places where you can find what
    you’re looking for, or at least where you can begin your search.


    **TIP:** If you get stuck and you don’t know what else to try, it can help to
    just write down what the problem is, what you’re trying to achieve, and what you’ve
    done so far. Most of the time it frees your mind to think of things you haven’t
    tried yet, and more often than not it leads to a solution. If not, you now have
    a summary that you can post to a forum or Q&A site, which will help you get a
    good answer more quickly. The art of asking questions is all about making it easy
    for others to answer them.


    ##### Cocos2d Home Page


    This may seem obvious, but if you have a question related to cocos2d, you should
    stop by and join the cocos2d community in the forum: [`http://cocos2d-iphone.org/forum`](http://cocos2d-iphone.org/forum).


    In the cocos2d forum, you can ask about anything related to cocos2d. It has subforums
    for hot topics like audio programming, physics engines, social networks, cocos3d,
    and ads, as well as a general forum for Objective-C and iPhone SDK–related questions.
    For the most part, the cocos2d community is friendly and very helpful, and a lot
    of great example code and development stories have been shared on the forum.


    Before asking questions, be sure to search both the forum and the official cocos2d
    documentation wiki: [`http://cocos2d-iphone.org/wiki/doku.php`](http://cocos2d-iphone.org/wiki/doku.php).


    In addition, you can announce your newly released game in the cocos2d games forum.
    Don’t forget to also add it to the list of games made with cocos2d. You can do
    this on the cocos2d Games page: [`www.cocos2d-iphone.org/games`](http://www.cocos2d-iphone.org/games).'
