    aspects.


    You should also consider the Games Press web site, which is frequented by game
    journalists worldwide (see [`www.gamespress.com/about_howtosubmit.asp`](http://www.gamespress.com/about_howtosubmit.asp)).


    #### Engaging Players for More Revenue


    Every platform has a number of peripheral technologies that are helpful if not
    essential, at least in some cases and for some developers. On the iOS platform,
    this includes the ever-growing list of social networking platforms to choose from,
    besides Apple’s Game Center. Then there’s server development kits that you might
    need for developing persistent games that ought to connect to your own server,
    be it to find and run matches of more than four players or simply to save characters,
    progress, settings, and worlds online.


    And sometimes regarded dubiously, providing ads in games can create an additional
    revenue stream, especially for free games and lite versions. Often in conjunction
    with ads, you can also investigate whether it would help your game to add analytics
    and metrics in order to find out where players fail most often, what buttons they
    click the most, and how frequently they play individual game modes. This can help
