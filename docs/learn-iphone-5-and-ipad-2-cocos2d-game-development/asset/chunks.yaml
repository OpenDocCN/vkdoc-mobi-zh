    \n**代码清单 6–1.** *创建多个`CCSprite`并将其添加至`CCSpriteBatchNode`以加速渲染*\n\n```\nCCSpriteBatchNode*\
    \ batch = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"];\n[self addChild:batch];\n\
    \nfor (int i = 0; i < 100; i++)\n{\n    CCSprite* bullet = [CCSprite spriteWithFile:@\"\
    bullet.png\"];\n    [batch addChild:bullet];\n}\n```\n\n您会注意到，在代码清单 6–1 中，`CCSpriteBatchNode`将一个文件作为参数，尽管`CCSpriteBatchNode`本身并不显示。在这方面，它更像是一个`CCLayer`，只不过您只能向其中添加`CCSprite`节点。它接受一个图像文件作为参数的原因是，添加到`CCSpriteBatchNode`的所有`CCSprite`节点必须使用相同的纹理。如果您犯了这样的错误，会在调试器控制台窗口中看到如下错误信息：\n\
    \n```\nSpriteBatches[13879:207] *** Terminating app due to uncaught exception\n\
    'NSInternalInconsistencyException', reason: 'CCSprite is not using the same texture\
    \ id'\n```\n"
- fmt: "#### When to Use `CCSpriteBatchNode`\n\n`CCSpriteBatchNode` can be used whenever\
    \ you display two or more `CCSprite`s of the same kind. The more `CCSprite`s you\
    \ can group together, the greater the benefit of using `CCSpriteBatchNode` will\
    \ be.\n\nThere are limitations, however. Since all the `CCSprite` nodes are added\
    \ to the `CCSpriteBatchNode`, all `CCSprite` nodes added to it will be drawn at\
    \ the same z-order (depth). If your game is supposed to have bullets flying behind\
    \ and in front of enemies, you would have to use two `CCSpriteBatchNode`s to group\
    \ the bullet sprites of the lower and the higher z-order independently.\n\nAnother\
    \ drawback is that all `CCSprite`s added to the `CCSpriteBatchNode` need to use\
    \ the same texture. But that also means the `CCSpriteBatchNode` becomes most important\
    \ when you are using a texture atlas. With a texture atlas, you are not limited\
    \ to drawing only one image; instead, you can add a number of different images\
    \ to the same texture atlas and draw all of these images using the same `CCSpriteBatchNode`,\
    \ speeding up the rendering of all the images of the same texture atlas.\n\nIf\
    \ all your game’s images can fit into the same texture atlas, you could compose\
    \ almost your entire game using just a single `CCSpriteBatchNode` (although this\
    \ will be the rare exception).\n\nThink of the `CCSpriteBatchNode` as similar\
    \ to a `CCLayer`, except that it only accepts `CCSprite` nodes using the same\
    \ texture. With that mind-set, I’m sure you’ll find the right places to use the\
    \ `CCSpriteBatchNode`.\n\n#### Demo Projects\n\nThere are four projects—named\
    \ Sprites01 through Sprites04—that are intended as a demonstration of using a\
    \ `CCSpriteBatchNode`. They are the first steps toward the scrolling shoot-’em-up\
    \ game that I’ll discuss in [Chapters 7](#Chapter07.html#ch7) and [8](#Chapter08.html#ch8).\
    \ Since developers often start by using just the `CCSprite` node and then they\
    \ improve the code to support `CCSpriteBatchNode`, I found it interesting to show\
    \ exactly this process and how the code changes along the way.\n\nThe projects\
    \ use two classes, named `Ship` and `Bullet`, both derived from `CCSprite`, to\
    \ illustrate how a project may be changed from using regular `CCSprite` objects\
    \ to a `CCSpriteBatchNode`.\n\n##### A Common and Fatal Mistake\n\nThe Sprites01\
    \ project shows a common trap developers new to Objective-C can quickly find themselves\
    \ in. It’s easy to make this mistake but hard to figure out the cause and how\
    \ to fix it. I’ll spare you the headache. Take a look at [Listing 6–2](#Chapter06.html#list_6_2);\
    \ do you see what’s wrong with this code?\n\n**Listing 6–2.** *A Commonly Made\
    \ Fatal Mistake When Subclassing CCSprite (or Other Classes for That Matter)*\n\
    \n```\n-(id) init\n{\n    if ((self = [super initWithFile:@\"ship.png\"]))\n \
    \   {\n        [self scheduleUpdate];\n    }\n    return self;\n}\n```\n\nNo,\
    \ it’s not about `scheduleUpdate`; that’s just to throw you off guard. The problem\
    \ lies in the fact that the `-(id) init` method is the default initializer, which\
    \ is eventually called by any other specialized initializer like `initWithFile`.\
    \ Can you imagine now what’s wrong with the code?\n\nWell, `initWithFile` will\
    \ eventually call the default initializer, `-(id) init`. Then, since this class’s\
    \ implementation overrides it, it will call `[super initWithFile: ..]` again.\
    \ Repeat *ad infinitum*.\n\nThe solution is very simple. As shown in [Listing\
    \ 6–3](#Chapter06.html#list_6_3), it is sufficient to give the initializer method\
    \ a different name—something other than `-(id) init`.\n\n**Listing 6–3.** *Fixing\
    \ the Infinite Loop Caused by the Code in [Listing 6–2](#Chapter06.html#list_6_2)*\n\
    \n```\n-(id) initWithShipImage\n{\n    if ((self = [super initWithFile:@\"ship.png\"\
    ]))\n    {\n        [self scheduleUpdate];\n    }\n    return self;\n}\n```\n\n\
    **CAUTION:** In general, to avoid this problem, you should never call anything\
    \ but `[super init]` in the default initializer `-(id) init`. If you have to call\
    \ `[super initWith...]` in your class’s initializer method, then you should name\
    \ the initializer method accordingly, as `-(id) initWith...` (for example, like\
    \ `-(id) initWithShipImage`, as in [Listing 6–3](#Chapter06.html#list_6_3)).\n\
    \n##### Bullets Without a SpriteBatch\n\nThe Sprites02 project creates a new `CCSprite`\
    \ for each `Bullet`. Notice how in [Listing 6–4](#Chapter06.html#list_6_4) the\
    \ ship sprite is adding the bullets to its parent node—it does not add them to\
    \ itself; otherwise, all the flying bullets would be positioned relative to the\
    \ ship and mimic the ship’s movement.\n\n**Listing 6–4.** *The Ship Shooting the\
    \ Bullets*\n\n```\n-(void) update:(ccTime)delta\n{\n    // Keep creating new bullets\n\
    \    Bullet* bullet = [Bullet bulletWithShip:self];\n\n    // Add the bullets\
    \ to the ship's parent\n    CCNode* gameScene = [self parent];\n    [gameScene\
    \ addChild:bullet z:0 tag:GameSceneNodeTagBullet];\n}\n```\n\nThe `Bullet` sprites\
    \ are added to the ship’s parent for the simple reason that adding them to the\
    \ ship would make all flying bullets positioned at an offset to the ship. This\
    \ means that if the ship were to move—which I suppose you will want eventually;\
    \ otherwise, this would be a really boring game—all the flying bullets would change\
    \ their positions relative to the ship, as if they were somehow attached to it.\n\
    \n**TIP:** The bullets are all added with the same z-order, 0. All nodes using\
    \ the same z-order are drawn in the order they are added to the scene hierarchy.\
    \ Meaning, the node added last will be drawn in front of all other previously\
    \ added nodes with the same z-order.\n\nIn addition, all bullets use the same\
    \ tag. Tags do not need to be unique, and sometimes it can be helpful to use a\
    \ tag to denote group membership of nodes. You could then loop through all children\
    \ of a node and perform different code based on the node tag.\n\nThe bullets also\
    \ use an `update` method to update their position and to remove themselves at\
    \ some point. Although sprites aren’t drawn if they are outside the screen, they\
    \ still consume memory and CPU power, so it’s a necessity to remove any stray\
    \ objects that leave the screen area at some point in time. In this case, you\
    \ simply check the bullet’s position against the right side of the screen, as\
    \ shown in [Listing 6–5](#Chapter06.html#list_6_5).\n\n**Listing 6–5.** *Moving\
    \ and Removing the Bullets*\n\n```\n-(void) update:(ccTime)delta\n{\n    // update\
    \ position of the bullet\n    // multiply the velocity by the time since the last\
    \ update was called\n    // this ensures same bullet velocity even if framerate\
    \ drops\n    self.position = ccpAdd(self.position, ccpMult(velocity, delta));\n\
    \n    // delete the bullet if it leaves the screen\n    if (self.position.x >\
    \ outsideScreen)\n    {\n        [self removeFromParentAndCleanup:YES];\n    }\n\
    }\n```\n\nThe bullet position is updated by multiplying its velocity (speed and\
    \ direction given by a `CGPoint`) and then adding the result to the bullet’s position.\
    \ The velocity simply determines how many pixels to move in each direction every\
    \ second. Multiplying the velocity by the time results in the distance the bullet\
    \ traveled. The reason for using the delta time when updating the position is\
    \ that this makes the movement of the bullets independent from the framerate.\
    \ If you don’t do that for all moving objects, your game would slow down proportionally\
    \ with a decreasing framerate, for example when there’s a boss fight with lots\
    \ of sprites on the screen.\n\nCalculating the movement in the aptly named update\
    \ method `update` is much more effective than using `CCMoveTo` or `CCMoveBy` actions\
    \ in this case. It avoids some overhead and the problem that actions run for a\
    \ given duration. If the ship were to move closer to the right side of the screen,\
    \ the move actions would cause the bullets to move more slowly since they need\
    \ to travel a shorter distance in the same time."
  raw: '#### When to Use CCSpriteBatchNode


    `CCSpriteBatchNode` can be used whenever you display two or more `CCSprite`s of
    the same kind. The more `CCSprite`s you can group together, the greater the benefit
    of using `CCSpriteBatchNode` will be.


    There are limitations, however. Since all the `CCSprite` nodes are added to the
    `CCSpriteBatchNode`, all `CCSprite` nodes added to it will be drawn at the same
    z-order (depth). If your game is supposed to have bullets flying behind and in
    front of enemies, you would have to use two `CCSpriteBatchNode`s to group the
    bullet sprites of the lower and the higher z-order independently.


    Another drawback is that all `CCSprite`s added to the `CCSpriteBatchNode` need
    to use the same texture. But that also means the `CCSpriteBatchNode` becomes most
    important when you are using a texture atlas. With a texture atlas, you are not
    limited to drawing only one image; instead, you can add a number of different
    images to the same texture atlas and draw all of these images using the same `CCSpriteBatchNode`,
    speeding up the rendering of all the images of the same texture atlas.


    If all your game’s images can fit into the same texture atlas, you could compose
    almost your entire game using just a single `CCSpriteBatchNode` (although this
    will be the rare exception).


    Think of the `CCSpriteBatchNode` as similar to a `CCLayer`, except that it only
    accepts `CCSprite` nodes using the same texture. With that mind-set, I’m sure
    you’ll find the right places to use the `CCSpriteBatchNode`.


    #### Demo Projects


    There are four projects—named Sprites01 through Sprites04—that are intended as
    a demonstration of using a `CCSpriteBatchNode`. They are the first steps toward
    the scrolling shoot-’em-up game that I’ll discuss in [Chapters 7](#Chapter07.html#ch7)
    and [8](#Chapter08.html#ch8). Since developers often start by using just the `CCSprite`
    node and then they improve the code to support `CCSpriteBatchNode`, I found it
    interesting to show exactly this process and how the code changes along the way.


    The projects use two classes, named `Ship` and `Bullet`, both derived from `CCSprite`,
    to illustrate how a project may be changed from using regular `CCSprite` objects
    to a `CCSpriteBatchNode`.


    ##### A Common and Fatal Mistake


    The Sprites01 project shows a common trap developers new to Objective-C can quickly
    find themselves in. It’s easy to make this mistake but hard to figure out the
    cause and how to fix it. I’ll spare you the headache. Take a look at [Listing
    6–2](#Chapter06.html#list_6_2); do you see what’s wrong with this code?


    **Listing 6–2.** *A Commonly Made Fatal Mistake When Subclassing CCSprite (or
    Other Classes for That Matter)*


    `-(id) init`

    `{`

    `    if ((self = [super initWithFile:@"ship.png"]))`

    `    {`

    `        [self scheduleUpdate];`

    `    }`

    `    return self;`

    `}`


    No, it’s not about `scheduleUpdate`; that’s just to throw you off guard. The problem
    lies in the fact that the `-(id) init` method is the default initializer, which
    is eventually called by any other specialized initializer like `initWithFile`.
    Can you imagine now what’s wrong with the code?


    Well, `initWithFile` will eventually call the default initializer, `-(id) init`.
    Then, since this class’s implementation overrides it, it will call `[super initWithFile:
    ..]` again. Repeat *ad infinitum*.


    The solution is very simple. As shown in [Listing 6–3](#Chapter06.html#list_6_3),
    it is sufficient to give the initializer method a different name—something other
    than `-(id) init`.


    **Listing 6–3.** *Fixing the Infinite Loop Caused by the Code in [Listing 6–2](#Chapter06.html#list_6_2)*


    **`-(id) initWithShipImage`**

    `{`

    `    if ((self = [super initWithFile:@"ship.png"]))`

    `    {`

    `        [self scheduleUpdate];`

    `    }`

    `    return self;`

    `}`


    **CAUTION:** In general, to avoid this problem, you should never call anything
    but `[super init]` in the default initializer `-(id) init`. If you have to call
    `[super initWith...]` in your class’s initializer method, then you should name
    the initializer method accordingly, as `-(id) initWith...` (for example, like
    `-(id) initWithShipImage`, as in [Listing 6–3](#Chapter06.html#list_6_3)).


    ##### Bullets Without a SpriteBatch


    The Sprites02 project creates a new `CCSprite` for each `Bullet`. Notice how in
    [Listing 6–4](#Chapter06.html#list_6_4) the ship sprite is adding the bullets
    to its parent node—it does not add them to itself; otherwise, all the flying bullets
    would be positioned relative to the ship and mimic the ship’s movement.


    **Listing 6–4.** *The Ship Shooting the Bullets*


    `-(void) update:(ccTime)delta`

    `{`

    `    // Keep creating new bullets`

    `    Bullet* bullet = [Bullet bulletWithShip:self];`


    `    // Add the bullets to the ship''s parent`

    `    CCNode* gameScene = [self parent];`

    `    [gameScene addChild:bullet z:0 tag:GameSceneNodeTagBullet];`

    `}`


    The `Bullet` sprites are added to the ship’s parent for the simple reason that
    adding them to the ship would make all flying bullets positioned at an offset
    to the ship. This means that if the ship were to move—which I suppose you will
    want eventually; otherwise, this would be a really boring game—all the flying
    bullets would change their positions relative to the ship, as if they were somehow
    attached to it.


    **TIP:** The bullets are all added with the same z-order, 0\. All nodes using
    the same z-order are drawn in the order they are added to the scene hierarchy.
    Meaning, the node added last will be drawn in front of all other previously added
    nodes with the same z-order.


    In addition, all bullets use the same tag. Tags do not need to be unique, and
    sometimes it can be helpful to use a tag to denote group membership of nodes.
    You could then loop through all children of a node and perform different code
    based on the node tag.


    The bullets also use an `update` method to update their position and to remove
    themselves at some point. Although sprites aren’t drawn if they are outside the
    screen, they still consume memory and CPU power, so it’s a necessity to remove
    any stray objects that leave the screen area at some point in time. In this case,
    you simply check the bullet’s position against the right side of the screen, as
    shown in [Listing 6–5](#Chapter06.html#list_6_5).


    **Listing 6–5.** *Moving and Removing the Bullets*


    `-(void) update:(ccTime)delta`

    `{`

    `    // update position of the bullet`

    `    // multiply the velocity by the time since the last update was called`

    `    // this ensures same bullet velocity even if framerate drops`

    `    self.position = ccpAdd(self.position, ccpMult(velocity, delta));`


    `    // delete the bullet if it leaves the screen`

    `    if (self.position.x > outsideScreen)`

    `    {`

    `        [self removeFromParentAndCleanup:YES];`

    `    }`

    `}`


    The bullet position is updated by multiplying its velocity (speed and direction
    given by a `CGPoint`) and then adding the result to the bullet’s position. The
    velocity simply determines how many pixels to move in each direction every second.
    Multiplying the velocity by the time results in the distance the bullet traveled.
    The reason for using the delta time when updating the position is that this makes
    the movement of the bullets independent from the framerate. If you don’t do that
    for all moving objects, your game would slow down proportionally with a decreasing
    framerate, for example when there’s a boss fight with lots of sprites on the screen.


    Calculating the movement in the aptly named update method `update` is much more
    effective than using `CCMoveTo` or `CCMoveBy` actions in this case. It avoids
    some overhead and the problem that actions run for a given duration. If the ship
    were to move closer to the right side of the screen, the move actions would cause
    the bullets to move more slowly since they need to travel a shorter distance in
    the same time.'
  trans: "\n#### 何时使用 `CCSpriteBatchNode`\n\n当你需要显示两个或更多同类别的 `CCSprite` 时，就可以使用 `CCSpriteBatchNode`。你能归为一组的\
    \ `CCSprite` 越多，使用 `CCSpriteBatchNode` 带来的好处就越明显。\n\n不过，它也存在局限性。由于所有 `CCSprite`\
    \ 节点都添加到 `CCSpriteBatchNode` 中，因此添加到其中的所有 `CCSprite` 节点都会以相同的 z 顺序（深度）进行绘制。如果你的游戏中，子弹需要在敌人前后飞行，那么你就得使用两个\
    \ `CCSpriteBatchNode`，分别将低 z 顺序和高 z 顺序的子弹精灵归为一组。\n\n另一个缺点是，添加到 `CCSpriteBatchNode`\
    \ 中的所有 `CCSprite` 都必须使用相同的纹理。但这也意味着，当你使用纹理图集时，`CCSpriteBatchNode` 变得最为重要。有了纹理图集，你就不限于只绘制一张图片；相反，你可以将多个不同的图片添加到同一个纹理图集中，并使用同一个\
    \ `CCSpriteBatchNode` 绘制所有这些图片，从而加快该纹理图集中所有图片的渲染速度。\n\n如果你游戏中的所有图片都能放入同一个纹理图集，那么你几乎可以仅使用一个\
    \ `CCSpriteBatchNode` 来构建整个游戏（尽管这种情况比较少见）。\n\n你可以将 `CCSpriteBatchNode` 视为类似于 `CCLayer`，只不过它只接受使用相同纹理的\
    \ `CCSprite` 节点。带着这种理解，我相信你一定能找到使用 `CCSpriteBatchNode` 的正确场景。\n\n#### 演示项目\n\n\
    这里有四个项目——分别命名为 Sprites01 到 Sprites04——旨在演示如何使用 `CCSpriteBatchNode`。它们是我将在第 7 章和第\
    \ 8 章中讨论的纵向卷轴射击游戏的第一步。由于开发者通常从仅使用 `CCSprite` 节点开始，然后改进代码以支持 `CCSpriteBatchNode`，我发现展示这一过程以及代码在此过程中的变化非常有趣。\n\
    \n这些项目使用了两个类，分别名为 `Ship` 和 `Bullet`，两者都派生自 `CCSprite`，用于说明项目如何从使用常规的 `CCSprite`\
    \ 对象转变为使用 `CCSpriteBatchNode`。\n\n##### 一个常见且致命的错误\n\nSprites01 项目展示了刚接触 Objective-C\
    \ 的开发者容易陷入的一个常见陷阱。犯这个错误很容易，但找出原因和解决方案却很难。我来帮你省去这个麻烦。请看一下列表 6–2；你能看出这段代码有什么问题吗？\n\
    \n**列表 6–2.** *对 CCSprite（或类似类）进行子类化时常犯的致命错误*\n\n```\n-(id) init\n{\n    if ((self\
    \ = [super initWithFile:@\"ship.png\"]))\n    {\n        [self scheduleUpdate];\n\
    \    }\n    return self;\n}\n```\n\n不，问题不在于 `scheduleUpdate`；那只是为了分散你的注意力。问题在于，`-(id)\
    \ init` 方法是默认初始化器，任何其他特定的初始化器（如 `initWithFile`）最终都会调用它。现在你能想象出代码有什么问题了吗？\n\n嗯，`initWithFile`\
    \ 最终会调用默认初始化器 `-(id) init`。然后，由于这个类的实现重写了它，它又会再次调用 `[super initWithFile: ..]`。如此循环往复，*无穷无尽*。\n\
    \n解决方案非常简单。如列表 6–3 所示，只需给初始化器方法起一个不同的名称——而不是 `-(id) init` 即可。\n\n**列表 6–3.** *修复由列表\
    \ 6–2 中的代码引起的无限循环*\n\n```\n-(id) initWithShipImage\n{\n    if ((self = [super\
    \ initWithFile:@\"ship.png\"]))\n    {\n        [self scheduleUpdate];\n    }\n\
    \    return self;\n}\n```\n\n**注意：** 一般来说，为避免此问题，你绝不应在默认初始化器 `-(id) init` 中调用除\
    \ `[super init]` 之外的任何内容。如果你必须在类的初始化器方法中调用 `[super initWith...]`，那么你应该将该初始化器方法相应地命名为\
    \ `-(id) initWith...`（例如，像列表 6–3 中的 `-(id) initWithShipImage` 一样）。\n\n##### 没有\
    \ SpriteBatch 的子弹\n\nSprites02 项目为每个`Bullet`创建一个新的 `CCSprite`。请注意，在列表 6–4 中，飞船精灵是如何将子弹添加到其父节点中的——它并没有将子弹添加到自身；否则，所有飞行的子弹都将相对于飞船定位，并模仿飞船的运动。\n\
    \n**列表 6–4.** *飞船发射子弹*\n\n```\n-(void) update:(ccTime)delta\n{\n    // 不断创建新的子弹\n\
    \    Bullet* bullet = [Bullet bulletWithShip:self];\n\n    // 将子弹添加到飞船的父节点\n \
    \   CCNode* gameScene = [self parent];\n    [gameScene addChild:bullet z:0 tag:GameSceneNodeTagBullet];\n\
    }\n```\n\n将 `Bullet` 精灵添加到飞船的父节点，原因很简单：将它们添加到飞船会导致所有飞行的子弹相对于飞船有一个偏移量。这意味着，如果飞船移动——我猜你最终会想要实现这一点；否则，这游戏就太无聊了——所有飞行的子弹都会相对于飞船改变位置，就好像它们以某种方式附着在飞船上一样。\n\
    \n**提示：** 所有子弹都以相同的 z 顺序（0）添加。使用相同 z 顺序的所有节点，按照它们添加到场景层次结构的顺序进行绘制。这意味着，最后添加的节点将绘制在所有先前添加的具有相同\
    \ z 顺序的节点之前。\n\n此外，所有子弹都使用相同的标签。标签不必唯一，有时使用标签来表示节点所属的组会很有帮助。然后，你可以遍历一个节点的所有子节点，并根据节点标签执行不同的代码。\n\
    \n子弹还使用一个 `update` 方法来更新它们的位置，并在某个时刻将自己移除。虽然精灵在屏幕外不会被绘制，但它们仍然会消耗内存和 CPU 资源，因此有必要在某个时间点移除所有离开屏幕区域的游离物体。在这种情况下，你只需检查子弹位置相对于屏幕右侧的位置，如列表\
    \ 6–5 所示。\n\n**列表 6–5.** *移动并移除子弹*\n\n```\n-(void) update:(ccTime)delta\n{\n \
    \   // 更新子弹位置\n    // 将速度乘以上次更新以来的时间\n    // 确保即使帧率下降，子弹速度也保持不变\n    self.position\
    \ = ccpAdd(self.position, ccpMult(velocity, delta));\n\n    // 如果子弹离开屏幕，则删除它\n\
    \    if (self.position.x > outsideScreen)\n    {\n        [self removeFromParentAndCleanup:YES];\n\
    \    }\n}\n```\n\n通过将速度（由 `CGPoint` 给定的速度和方向）乘以时间，然后将结果加到子弹位置上，来更新子弹位置。速度简单地决定了每秒在每个方向上移动多少像素。用速度乘以时间得到子弹移动的距离。在更新位置时使用增量时间的原因在于，这会使子弹的运动独立于帧率。如果你不对所有移动对象都这样做，你的游戏会随着帧率下降而按比例变慢，例如，当出现大量精灵在屏幕上的\
    \ Boss 战时。\n\n在这种情况下，在名为 `update` 的恰当方法中计算移动，要比使用 `CCMoveTo` 或 `CCMoveBy` 动作高效得多。这可以避免一些开销，并避免动作在给定持续时间内运行的问题。如果飞船向右屏幕边缘移动，则移动动作会导致子弹移动得更慢，因为它们需要在相同时间内移动更短的距离。\n"
- fmt: "**TIP:** 你可以让`CCMoveTo`和`CCMoveBy`动作以固定速度将节点移动到任意位置。为此，首先需要使用`ccpDistance`方法计算节点当前位置与目标位置之间的距离，然后将该距离除以所需速度（以每帧像素数表示）。这种方法效果不错，但其缺点是`ccpDistance`调用了`sqrtf`（平方根）方法，这在计算上开销较大。应避免频繁使用该方法。因此，对于像每帧更新节点位置这样简单的操作，通常建议避免对连续移动的节点使用移动动作。\n\
    \n### 引入`CCSpriteBatchNode`\n\n在Sprites03项目中，已为子弹添加了`CCSpriteBatchNode`。我决定将其添加到`GameScene`自身中，因为子弹不应被添加到`Ship`类中。由于`Ship`类无法访问`GameScene`，我还需要添加伪单例访问器`sharedGameScene`，以使飞船能够获取`CCSpriteBatchNode`，如[代码清单6-6](#Chapter06.html#list_6_6)所示。\n\
    \n**代码清单6-6.** `GameScene`为子弹获取`CCSpriteBatchNode`并为`Ship`类提供访问器\n\n```\nstatic\
    \ GameScene* instanceOfGameScene;\n+(GameScene*) sharedGameScene\n{\n    NSAssert(instanceOfGameScene\
    \ != nil, @\" instance not yet initialized!\");\n    return instanceOfGameScene;\n\
    }\n\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        instanceOfGameScene\
    \ = self;\n\n…\n\n        CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@\"\
    bullet.png\"];\n        [self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];\n\
    \    }\n    return self;\n}\n\n-(void) dealloc\n{\n    instanceOfGameScene = nil;\n\
    \    [super dealloc];\n}\n\n-(CCSpriteBatchNode*) bulletSpriteBatch\n{\n    CCNode*\
    \ node = [self getChildByTag:GameSceneNodeTagBulletSpriteBatch];\n    NSAssert([node\
    \ isKindOfClass:[CCSpriteBatchNode class]], @\"not a SpriteBatch\");\n    return\
    \ (CCSpriteBatchNode*)node;\n}\n```\n\n**CAUTION：** 我知道这个单例以及额外的访问器方法`bulletSpriteBatch`可能不符合所有人的喜好。为什么我不简单地将`CCSpriteBatchNode`作为指针传递给`Ship`类，无论是在初始化器中还是通过属性？\n\
    \n一个原因是`Ship`并不拥有子弹精灵批次，因此它不应保留对该批次的引用。此外，如果`Ship`类也保留了精灵批次，若不小心处理，可能导致整个场景无法释放。节点绝不应保留不属于它们的其他节点。\n\
    \n特别地，子节点不应保留其父节点。首先，子节点从不需要保留其父节点，因为cocos2d的节点层级结构已经处理了这一点。如果子节点保留了其父节点或任何祖先节点，由于父节点被子节点持有，将导致父节点无法释放。而父节点若不释放，子节点也无法释放。这种循环会导致内存泄漏，并可能引发奇怪的副作用，例如本应早已消失的节点仍持续执行其代码。\n\
    \n现在，`Ship`类可以通过使用`sharedGameScene`和`bulletSpriteBatch`访问器直接向精灵批次添加子弹。如[代码清单6-7](#Chapter06.html#list_6_7)所示。\n\
    \n**代码清单6-7.** `GameScene`为子弹获取`CCSpriteBatchNode`并为`Ship`类提供访问器\n\n```\n-(void)\
    \ update:(ccTime)delta\n{\n    Bullet* bullet = [Bullet bulletWithShip:self];\n\
    \    [[[GameScene sharedGameScene] bulletSpriteBatch] addChild:bullet\n      \
    \                                                      z:0\n                 \
    \                                         tag:GameSceneNodeTagBullet];\n}\n```\n\
    \n### 优化\n\n在优化这段代码的同时，为何不消除由`Bullet`类引起的不必要内存分配和释放呢？分配和释放内存是一项开销巨大的操作，应在游戏过程中尽量减少。一种常见的解决方案是在游戏开始时实例化固定数量的对象，然后根据需要简单地启用或禁用/隐藏这些对象。这被称为**对象池**（object\
    \ pooling）。\n\n由于可以安全地定义屏幕上同时存在的子弹数量上限，子弹是对象池的绝佳候选，以避免在游戏过程中分配和释放子弹。由于所有子弹共享相同的纹理，即使内存中始终驻留更多子弹，其额外内存消耗也可以忽略不计。[代码清单6-8](#Chapter06.html#list_6_8)展示了Sprites04项目中`GameScene`的`init`方法的变更。\n\
    \n**代码清单6-8.** 预先创建合理数量的子弹精灵可避免游戏过程中不必要的内存分配\n\n```\nCCSpriteBatchNode* batch\
    \ = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"];\n[self addChild:batch\
    \ z:0 tag:GameSceneNodeTagBulletSpriteBatch];\n\n// 预先创建一定数量的子弹，并在需要时重用它们。\nfor\
    \ (int i = 0; i < 400; i++)\n{\n    Bullet* bullet = [Bullet bullet];\n    bullet.visible\
    \ = NO;\n    [batch addChild:bullet];\n}\n```\n\n所有子弹都被设为不可见，因为我们暂时还不使用它们。在[代码清单6-9](#Chapter06.html#list_6_9)中，`GameScene`类获得了一个新方法，通过按顺序重新激活非活动子弹，使飞船能够发射子弹。这个过程通常被称为**对象池**（object\
    \ pooling）。现在，射击过程通过`GameScene`重新路由，因为它包含了用于子弹的`CCSpriteBatchNode`。一旦选中一个非活动子弹，它就会被指示自行发射。\n\
    \n**代码清单6-9.** 射击现在被重新路由\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n{\n\
    \    CCArray* bullets = [self.bulletSpriteBatch children];\n\n    CCNode* node\
    \ = [bullets objectAtIndex:nextInactiveBullet];\n    NSAssert([node isKindOfClass:[Bullet\
    \ class]], @\"not a bullet!\");\n\n    Bullet* bullet = (Bullet*)node;\n    [bullet\
    \ shootBulletFromShip:ship];\n\n    nextInactiveBullet++;\n    if (nextInactiveBullet\
    \ >= [bullets count])\n    {\n        nextInactiveBullet = 0;\n    }\n}\n```\n\
    \n通过维护引用计数器`nextInactiveBullet`，每次射击都使用该索引处的精灵批次子弹。一旦所有子弹都被射击过一次，索引便会重置。只要池中的子弹数量始终大于屏幕上同时出现的最大子弹数量，这种方法就能正常工作。\n\
    \n在[代码清单6-10](#Chapter06.html#list_6_10)中，`Bullet`类的`shoot`方法仅执行重新初始化子弹的必要步骤，包括通过首先取消调度更新选择器（如果它已经在运行中）来重新调度其更新选择器。最重要的是，`Bullet`被重新设为可见。其位置和速度也被重置。`Bullet`类的`shoot`方法简单地重置诸如位置和速度等相关变量，然后将子弹设为可见。一旦子弹生命周期结束，它就会被再次设为不可见。\n\
    \n**代码清单6-10.** `Bullet`类的`shoot`方法重新初始化子弹\n\n```\n-(void) shootBulletFromShip:(Ship*)ship\n\
    {\n    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;\n    velocity = CGPointMake(1,\
    \ spread);\n\n    outsideScreen = [[CCDirector sharedDirector] winSize].width;\n\
    \nself.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,\
    \ ![images](images/U002.jpg)\n        ship.position.y;\n    self.visible = YES;\n\
    \n    [self unscheduleUpdate];\n    [self scheduleUpdate];\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    self.position = ccpAdd(self.position, velocity);\n```"
  raw: '**TIP:** You can have the `CCMoveTo` and `CCMoveBy` actions move a node at
    a fixed speed to any position. To do so, you would first have to calculate the
    distance between the node’s current position to its desired destination by using
    the `ccpDistance` method. Then divide the distance by the desired speed (in pixels
    per frame). This works well enough, but the drawback is that `ccpDistance` calls
    the `sqrtf` (square root) method, which is computationally expensive. You would
    want to avoid doing this regularly, so for something as simple as updating node
    positions every frame, it’s generally advisable to avoid using move actions for
    continuously moving nodes.


    ##### Introducing the CCSpriteBatchNode


    In the Sprites03 project, the `CCSpriteBatchNode` for bullets has been added.
    I decided to add it to the `GameScene` itself, since bullets are not supposed
    to be added to the `Ship` class. Since the `Ship` class has no access to the `GameScene`,
    I also needed to add the pseudosingleton accessor `sharedGameScene` to allow the
    ship to get to the `CCSpriteBatchNode`, as shown in [Listing 6–6](#Chapter06.html#list_6_6).


    **Listing 6–6.** *TheGameScene Gets a CCSpriteBatchNode for Bullets and Accessors
    for the Ship Class*


    `static GameScene* instanceOfGameScene;`

    `+(GameScene*) sharedGameScene`

    `{`

    `    NSAssert(instanceOfGameScene != nil, @" instance not yet initialized!");`

    `    return instanceOfGameScene;`

    `}`


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        instanceOfGameScene = self;`


    `…`


    `        CCSpriteBatchNode* batch = [CCSpriteBatchNodebatchNodeWithFile:@"bullet.png"];`

    `        [self addChild:batch z:1 tag:GameSceneNodeTagBulletSpriteBatch];`

    `    }`

    `    return self;`

    `}`


    `-(void) dealloc`

    `{`

    `    instanceOfGameScene = nil;`

    `    [super dealloc];`

    `}`


    `-(CCSpriteBatchNode*) bulletSpriteBatch`

    `{`

    `    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletSpriteBatch];`

    `    NSAssert([node isKindOfClass:[CCSpriteBatchNode class]], @"not a SpriteBatch");`

    `    return (CCSpriteBatchNode*)node;`

    `}`


    **CAUTION:** I know this singleton and the additional accessor method `bulletSpriteBatch`
    may not be to everyone’s liking. Why didn’t I simply pass the `CCSpriteBatchNode`
    as a pointer to the `Ship` class, either in the initializer or via a property?


    One reason is that `Ship` does not own the bullet sprite batch, and therefore
    it should not keep a reference to it. Moreover, if the `Ship` class also retains
    the sprite batch, it could cause your whole scene to not be deallocated if you’re
    not careful. Nodes should never retain other nodes that do not belong to them.


    In particular, parent nodes should not be retained by one of their child nodes.
    For one, a child node never needs to retain its parent node that is already taken
    care of by cocos2d’s node hierarchy. A child node that does retain its parent
    or any of its grandparents would cause the parent not to get deallocated because
    it is retained by one of its children. And the children won’t be deallocated unless
    its parent gets deallocated. This vicious circle causes a memory leak and potentially
    weird side effects as nodes that should long be gone keep executing their code.


    Now the `Ship` class can add the bullets to the sprite batch directly by using
    the `sharedGameScene` and `bulletSpriteBatch` accessors. This is shown in [Listing
    6–7](#Chapter06.html#list_6_7).


    **Listing 6–7.** *GameScene Gets a CCSpriteBatchNode for Bullets and Accessors
    for the Ship Class*


    `-(void) update:(ccTime)delta`

    `{`

    `    Bullet* bullet = [Bullet bulletWithShip:self];`

    `    [[[GameScene sharedGameScene] bulletSpriteBatch] addChild:bullet`

    `                                                            z:0`

    `                                                          tag:GameSceneNodeTagBullet];`

    `}`


    ##### Optimizations


    While I’m optimizing this code, why not get rid of the unnecessary memory allocations
    and releases caused by the `Bullet` class? Allocating and releasing memory is
    an expensive operation you should aim to minimize during game play. A common solution
    is to instantiate a fixed number of objects when the game starts and then simply
    enable or disable/hide the objects as needed. This is called *object pooling*.


    Because you can safely define an upper limit for the number of bullets that can
    be on the screen at the same time, bullets are an excellent candidate for pooling
    to avoid allocating and releasing bullets during game play. Since the bullets
    share the same texture, the additional memory used by having a greater number
    of bullets that resides in memory at all times is negligible. [Listing 6–8](#Chapter06.html#list_6_8)
    shows the changes to `GameScene`’s `init` method implemented in the Sprites04
    project.


    **Listing 6–8.** *Creating a Reasonable Number of Bullet Sprites Up Front Avoids
    Unnecessary Memory Allocations During Game Play*


    `CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@"bullet.png"];`

    `[self addChild:batch z:0 tag:GameSceneNodeTagBulletSpriteBatch];`


    `// Create a number of bullets up front and reuse them whenever necessary.`

    `for (int i = 0; i < 400; i++)`

    `{`

    `    Bullet* bullet = [Bullet bullet];`

    `    bullet.visible = NO;`

    `    [batch addChild:bullet];`

    `}`


    All the bullets are made invisible since we don’t use them just yet. The `GameScene`
    class gets a new method in [Listing 6–9](#Chapter06.html#list_6_9) that allows
    it to shoot bullets from the ship by reactivating inactive bullets in sequence.
    This process is often referred to as *object pooling*. Shooting is now rerouted
    through the `GameScene` since it contains the `CCSpriteBatchNode` used for the
    bullets. Once an inactive bullet has been selected, it is instructed to shoot
    itself.


    **Listing 6–9.** *Shooting Is Now Rerouted*


    `-(void) shootBulletFromShip:(Ship*)ship`

    `{`

    `    CCArray* bullets = [self.bulletSpriteBatch children];`


    `    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];`

    `    NSAssert([node isKindOfClass:[Bullet class]], @"not a bullet!");`


    `    Bullet* bullet = (Bullet*)node;`

    `    [bullet shootBulletFromShip:ship];`


    `    nextInactiveBullet++;`

    `    if (nextInactiveBullet >= [bullets count])`

    `    {`

    `        nextInactiveBullet = 0;`

    `    }`

    `}`


    By keeping the reference counter `nextInactiveBullet`, each shot uses the sprite-batched
    bullet from that index. Once all bullets have been shot once, the index is reset.
    This works fine as long as the number of bullets in the pool is always greater
    than the maximum number of bullets on the screen.


    The `Bullet` class’s `shoot` method in [Listing 6–10](#Chapter06.html#list_6_10)
    only performs the necessary steps to reinitialize a bullet, including rescheduling
    its update selector by first unscheduling the update selector in case it is already
    running. Most importantly, the `Bullet` is set to be visible again. Its position
    and velocity are also reset. The `Bullet` class’s shoot method simply resets the
    relevant variables such as position and velocity and then sets the bullet to be
    visible. Once the bullet has reached the end of its lifetime, it’s simply set
    to not be visible again.


    **Listing 6–10.** *The Bullet Class’s Shoot Method Reinitializing a Bullet*


    `-(void) shootBulletFromShip:(Ship*)ship`

    `{`

    `    float spread = (CCRANDOM_0_1() - 0.5f) * 0.5f;`

    `    velocity = CGPointMake(1, spread);`


    `    outsideScreen = [[CCDirector sharedDirector] winSize].width;`


    `self.position = CGPointMake(ship.position.x + ship.contentSize.width * 0.5f,`
    ![images](images/U002.jpg)

    `        ship.position.y;`

    `    self.visible = YES;`


    `    [self unscheduleUpdate];`

    `    [self scheduleUpdate];`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    self.position = ccpAdd(self.position, velocity);`'
