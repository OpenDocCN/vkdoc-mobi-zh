    }\n\n在`registerWithTouchDispatcher`中，`UserInterfaceLayer`将自己注册为优先级为-1的目标触摸处理程序。因为`GameLayer`使用相同的代码但优先级为0，所以`UserInterfaceLayer`将是第一个接收触摸输入的图层。\n\
    \n在`ccTouchBegan`中，首先要检查此触摸是否与`UserInterfaceLayer`相关。`isTouchForMe`方法通过`CGRectContainsPoint`实现了一个简单的“边界框内的点”检查，以查看触摸是否始于`uiframe`精灵。`CGGeometry`中还有更多有用的方法可用于测试相交、包含点或相等性。请参考Apple文档以了解更多关于`CGGeometry`方法的信息（[http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html](http://developer.apple.com/mac/library/documentation/GraphicsImaging/Reference/CGGeometry/Reference/reference.html)）。\n\
    \n如果触摸位置检查确定触摸在精灵上，`ccTouchBegan`将返回`YES`，表示此触摸事件已被使用，不应由其他优先级较低的目标触摸委托的图层处理。\n\
    \n只有当`isTouchForMe`检查失败时，`GameLayer`才会接收触摸输入，并在用户在屏幕上移动手指时使用它来滚动自身。您可以在[清单5-9](#Chapter05.html#list_5_9)中比较`GameLayer`的输入处理代码。\n\
    \n**Listing 5–9.** *GameLayer Receives the Remaining Touch Events and Uses Them\
    \ to Scroll Itself*\n\n```\n-(void) registerWithTouchDispatcher\n{\n    [[CCTouchDispatcher\
    \ sharedDispatcher] addTargetedDelegate:self\n                               \
    \                   priority:0\n                                          swallowsTouches:YES];\n\
    }\n\n-(BOOL) ccTouchBegan:(UITouch*)touch withEvent:(UIEvent *)event\n{\n    lastTouchLocation\
    \ = [MultiLayerScene locationFromTouch:touch];\n\n    // Stop the move action\
    \ so it doesn't interfere with the user's scrolling.\n    [self stopActionByTag:ActionTagGameLayerMovesBack];\n\
    \n    // Always swallow touches, GameLayer is the last layer to receive touches.\n\
    \    return YES;\n}\n\n-(void) ccTouchMoved:(UITouch*)touch withEvent:(UIEvent\
    \ *)event\n{\n    CGPoint currentTouchLocation = [MultiLayerScene locationFromTouch:touch];\n\
    \n    // Take the difference of the current to the last touch location.\n    CGPoint\
    \ moveTo = ccpSub(lastTouchLocation, currentTouchLocation);\n\n    // Then reverse\
    \ to give the impression of moving the background\n    moveTo = ccpMult(moveTo,\
    \ -1);\n\n    lastTouchLocation = currentTouchLocation;\n\n    // Adjust the layer's\
    \ position accordingly, and with it all child nodes.\n    self.position = ccpAdd(self.position,\
    \ moveTo);\n}\n\n-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event\n\
    {\n    // Move the game layer back to its designated position.\n    CCMoveTo*\
    \ move = [CCMoveTo actionWithDuration:1 position:gameLayerPosition];\n    CCEaseIn*\
    \ ease = [CCEaseIn actionWithAction:move rate:0.5f];\n    ease.tag = ActionTagGameLayerMovesBack;\n\
    \    [self runAction:ease];\n}\n```\n\n由于`GameLayer`是最后一个接收输入的图层，它不需要进行任何`isTouchForMe`检查，只是简单地吞噬所有触摸。\n\
    \n使用`ccTouchMoved`事件，计算上一个和当前触摸位置之间的差异。然后通过乘以-1进行反转，以将效果从在背景上移动摄像机改为在摄像机下移动背景。如果您很难想象我的意思，请尝试`ScenesAndLayers04`项目，然后第二次尝试，注释掉`moveTo\
    \ = ccpMult(moveTo, -1);`这一行。您会注意到第二次时，每次手指移动都会使图层向相反方向移动。\n\n在`ccTouchEnded`中，当用户将手指从屏幕上抬起时，图层会自动移回其中心位置。[图5-2](#Chapter05.html#fig_5_2)展示了该项目实际运行的效果，整个`GameLayer`被旋转并缩小。`GameLayer`上的每个游戏对象都会自动遵循`GameLayer`的每一次移动、旋转和缩放，而`UserInterfaceLayer`始终保持不变。\n\
    \n![images](images/0502.jpg)\n\n**Figure 5–2.** *多图层的实用性在GameLayer被缩小和旋转时变得明显，其所有节点都遵循图层的动作，而顶部的UserInterfaceLayer则不受影响地保持在原位。*\n\
    \n### 如何最佳实现关卡\n\n到目前为止，我们已经探讨了多个场景和多个图层。现在您想了解关卡是什么吗？\n\n嗯，关卡的概念在许多游戏中非常常见，所以我认为不需要解释。更难的是决定哪种方法最适合基于关卡的游戏。在cocos2d中，您可以采用两种方式：为每个关卡创建一个新场景，或者使用单独的图层来管理多个关卡。两者各有用途，选择哪一种主要取决于关卡在游戏中的目的。\n\
