    \    while((fixture = body->GetFixtureList()))\n    {\n        body->DestroyFixture(fixture);\n\
    \    }\n\n    // 从形状缓存中附加新形状\n    if(shapeName)\n    {\n        GB2ShapeCache*shapeCache\
    \ = [GB2ShapeCache sharedShapeCache];\n        [shapeCache addFixturesToBody:body\
    \ forShapeName:shapeName];\n\n        // 将形状的锚点（PhysicsEditor 中圆圈内的蓝色加号）\n   \
    \     // 设置为 BodyNode 的锚点。否则图片和形状会偏移。\n        self.anchorPoint = [shapeCache\
    \ anchorPointForShape:shapeName];\n    }\n}\n\n-(void) dealloc\n{\n    // 从世界中移除物体\n\
    \    body->GetWorld()->DestroyBody(body);\n\n[super dealloc];\n}\n\n@end\n```\n\
    \n`BodyNode` 的实现使用 `initWithSpriteFrameName` 方法初始化精灵。然后调用世界的 `CreateBody` 方法，并将\
    \ `self` 设置为物体的用户数据指针，这使得你以后可以在 Box2D 碰撞回调方法中访问 `BodyNode` 类。\n\n**提示：** `CCNode`\
    \ 类也有一个 `userData` 属性，你可以像使用 `b2Body` 的 `userData` 字段一样使用它。\n\nPhysicsEditor 的\
    \ `GB2ShapeCache` 类用于通过提供的 `shapeName` 向物体添加夹具。`PhysicsBox2D03` 项目已包含必要的文件。如果你想在新项目中使用\
    \ `GB2ShapeCache` 类，只需记得将 `PhysicEditor.dmg` 磁盘映像文件夹 `/Loaders/generic-box2d-plist`\
    \ 中的 `GB2ShapeCache.h` 和 `GB2ShapeCache.mm` 文件添加到你的 Xcode 项目中。\n\n这里需要理解的关键点是：`BodyNode`\
    \ 是一个 `CCSprite`，它为你管理 Box2D 物体的分配、释放和配置。它还确保你能够访问 `BodyNode` 类，从而访问 cocos2d 精灵，而在通常情况下，你只能访问\
    \ Box2D 物体对象。因此，`BodyNode` 类成为了连接物理物体与 cocos2d 精灵的粘合剂。\n\n如果一个继承自 `BodyNode` 的精灵超出作用域——例如，你将其作为子节点从其\
    \ cocos2d 父节点中移除——那么 `BodyNode` 会负责为你销毁 Box2D 物体。\n\n此外，你可以通过调用 `setBodyShape`\
    \ 来更改精灵的物体形状。这会移除物体上所有现有的夹具，然后从 `GB2ShapeCache` 中添加与给定 `shapeName` 关联的夹具。这只会改变物体的碰撞形状，并保留物体当前的运动状态，如速度、位置和旋转。请记住，调用此方法较为耗时，应仅在必要时使用。在每一帧都更改物体形状绝非好主意。\n\
