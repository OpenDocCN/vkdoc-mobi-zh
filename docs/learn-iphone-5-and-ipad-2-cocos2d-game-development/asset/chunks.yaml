    }\n```\n\n如果你现在运行`PhysicsBox2D03`项目，你会看到……一个弹球桌。很好。但是你怎么知道碰撞形状已经正确放置并激活了呢？"
  raw: 'As of now, the job of the `TableSetup` class is to create the three `TablePart`
    classes that make up the static background elements of the pinball table. It also
    sets the correct position of each `TablePart` instance, which is influenced by
    their shape''s `anchorPoint`. For example, the table-top image has its shape `anchorPoint`
    set to the upper-left corner of the image so that positioning it at (0, 480) aligns
    the image and shape correctly at the top border of the screen. Since `TablePart`
    inherits from `BodyNode`, which inherits from `CCSprite`, it is legal and quite
    convenient to add these classes directly to the `TableSetup` class, which inherits
    from `CCSpriteBatchNode`.


    You''ll later extend the `TableSetup` class to add the other pinball table elements,
    like plunger, ball, bumpers, and flippers.


    **TIP:** Did you notice the use of the `ccp` method? It''s exactly the same as
    the `CGPointMake` method but simply shorter to type. Some cocos2d developers prefer
    to use `ccp` over `CGPointMake` simply because it''s shorter to type. You''ll
    find the entire `ccp` line of helpful math functions defined in CGPointExtension.h.
    They tend to come in handy particularly when you''re developing physics games.
    Box2D also brings its own math functions that are defined in b2Math.h. The reason
    is that Box2D''s vector classes like b2Vec2 are C++ classes, and not C structs
    like CGPoint, meaning the Box2D data structures can generally not be used with
    the `ccp` methods.


    The `TableSetup` class itself is initialized by the `PinballTable` class, which
    is based on the `HelloWorldScene` class of the Box2D project from [Chapter 12](#Chapter12.html#ch12).
    [Listing 13–6](#Chapter13.html#list_13_6) shows the interface of the `PinballTable`
    class.


    **Listing 13–6.** *PinballTable Class Header File*


    `#import "cocos2d.h"`

    `#import "Box2D.h"`

    `#import "GLES-Render.h"`


    `#import "ContactListener.h"`


    `@interface PinballTable : CCLayer`

    `{`

    `    b2World* world;`

    `    ContactListener* contactListener;`


    `    GLESDebugDraw* debugDraw;`

    `}`


    `+(id) scene;`


    `@end`


    It contains references to the `ContactListener` and `GLESDebugDraw` classes. The
    latter I''ll get to shortly; the `ContactListener` class will play a role when
    you''re adding the pinball game''s plunger. For now, let''s look at the initialization
    of the `PinballTable` class in [Listing 13–7](#Chapter13.html#list_13_7).


    **Listing 13–7.** *Initialization of the PinballTable Class*


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        // pre load the sprite frames from the texture atlas`

    `        [[CCSpriteFrameCache sharedSpriteFrameCache]`

    `            addSpriteFramesWithFile:@"pinball.plist"];`


    `        // load physics definitions`

    `        [[GB2ShapeCache sharedShapeCache] addShapesWithFile:@"pinball-shapes.plist"];`


    `        // init the box2d world`

    `        [self initBox2dWorld];`


    `        // debug drawing`

    `        [self enableBox2dDebugDrawing];`


    `        // load the background from the texture atlas`

    `        CCSprite* background = [CCSprite spriteWithSpriteFrameName:@"background"];`

    `        background.anchorPoint = ccp(0,0);`

    `        background.position = ccp(0,0);`

    `        [self addChild:background z:-3];`


    `        // Set up table elements`

    `        TableSetup* tableSetup = [TableSetup setupTableWithWorld:world];`

    `        [self addChild:tableSetup z:-1];`


    `        [self scheduleUpdate];`

    `    }`

    `    return self;`

    `}`


    The `CCSpriteFrameCache` loads the sprite frames from the texture atlas created
    with TexturePacker by loading the pinball.plist file.


    More importantly this is followed by loading the pinball-shapes.plist file into
    the `GB2ShapeCache class`. It is important to do this first before calling any
    other Box2D method so that the shape cache''s `ptmRatio` is correctly set to thevalue
    from the PhysicsEditor setting `PTM-Ratio`. If you recall, `PTM-Ratio` was one
    of the first PhysicsEditor setting we modified at the beginning of this chapter.


    The pixel-to-meters macro `PTM_RATIO` used in [Chapter 12](#Chapter12.html#ch12)
    has been changed from a simple constant value to the following definition that
    you''ll find in the Constants.h header file:


    `#define PTM_RATIO ([[GB2ShapeCache sharedShapeCache] ptmRatio] * 0.5f)`


    This improved `PTM_RATIO` macro now retrieves the points-to-meter ratio from the
    `GB2ShapeCache` class. And that''s why you have to make sure the shape cache is
    initialized before using the `PTM_RATIO` macro.


    The shape cache''s `ptmRatio` is divided by two (multiplied by 0.5f) because the
    shapes created in PhysicsEditor were based on the Retina resolution images, while
    cocos2d''s resolution-independent point coordinates used for positioning nodes
    always assume the iPhone''s screen resolution to be 480x320 points.


    The initialization of the Box2D physics engine is moved to a separate `initBox2dWorld`
    method. The Box2D init code is essentially the same as in the previous chapter,
    with two exceptions: the static screen boundary shape that keeps dynamic objects
    inside the screen area defines no bottom shape, allowing dynamic bodies to fall
    outside the screen through the bottom. We''ll need that for the ball to be able
    to roll into the table''s drain.


    In addition to that, the collision parameters for the left and right boundary
    are set in the `init` code, since these shapes aren''t defined with the help of
    PhysicsEditor. The `categoryBits` must be set to the `Wall` bit (collision bit
    4 in PhysicsEditor), and the `maskBits` must be set to the `Ball` bit (collision
    bit 0 in PhysicsEditor). The bit values are specified in hexadecimal format, indicated
    by the leading `0x`. You''ll find that PhysicsEditor will display those hexadecimal
    values below the `Cat.` and `Mask` columns under `Fixture Parameters`.


    The following is the `initBox2dWorld` method with the changes and additions compared
    to the Box2D initialization code from [Chapter 12](#Chapter12.html#ch12) highlighted:


    `-(void) initBox2dWorld`

    `{`

    `    // Construct a world object, which will hold and simulate the rigid bodies.`

    `    b2Vec2 gravity = b2Vec2(0.0f, -5.0f);`

    `    bool allowBodiesToSleep = true;`

    `    world = new b2World(gravity, allowBodiesToSleep);`


    `    contactListener = new ContactListener();`

    `    world->SetContactListener(contactListener);`


    `    // Define the collisions at screen borders.`

    `    b2BodyDef containerBodyDef;`

    `    b2Body* containerBody = world->CreateBody(&containerBodyDef);`


    `    // for the ground body we''ll need these values`

    `    CGSize screenSize = [CCDirector sharedDirector].winSize;`

    `    float widthInMeters = screenSize.width / PTM_RATIO;`

    `    float heightInMeters = screenSize.height / PTM_RATIO;`

    `    b2Vec2 lowerLeftCorner = b2Vec2(0, 0);`

    `    b2Vec2 lowerRightCorner = b2Vec2(widthInMeters, 0);`

    `    b2Vec2 upperLeftCorner = b2Vec2(0, heightInMeters);`

    `    b2Vec2 upperRightCorner = b2Vec2(widthInMeters, heightInMeters);`


    `    // Create the screen box'' sides by using a polygon assigning each side individually.`

    `    b2PolygonShape screenBoxShape;`

    `    float density = 0.0;`


    **`// We now only need the sides for the table:`**

    **`// left side`**

    **`screenBoxShape.SetAsEdge(upperLeftCorner, lowerLeftCorner);`**

    **`b2Fixture *left = containerBody->CreateFixture(&screenBoxShape, density);`**


    **`// right side`**

    **`screenBoxShape.SetAsEdge(upperRightCorner, lowerRightCorner);`**

    **`b2Fixture *right = containerBody->CreateFixture(&screenBoxShape, density);`**


    **`// set the collision flags: category and mask`**

    **`b2Filter collisonFilter;`**

    **`collisonFilter.groupIndex = 0;`**

    **`collisonFilter.categoryBits = 0x0010; // category = Wall`**

    **`collisonFilter.maskBits = 0x0001;     // mask = Ball`**


    **`left->SetFilterData(collisonFilter);`**

    **`right->SetFilterData(collisonFilter);`**

    `}`


    If you run the PhysicsBox2D03 project now, you''ll see … a pinball table. Great.
    But how do you know that the collision shapes are properly placed and active?'
  trans: "\n# 排版后的内容\n\n截至目前，`TableSetup`类的工作是创建构成弹球桌静态背景元素的三个`TablePart`类。它还设置了每个`TablePart`实例的正确位置，该位置受其形状的`anchorPoint`影响。例如，桌面图像的`anchorPoint`设置到图像的左上角，以便将其放置在`(0,\
    \ 480)`处时，图像和形状能在屏幕顶部边框正确对齐。由于`TablePart`继承自`BodyNode`，而`BodyNode`继承自`CCSprite`，因此将这些类直接添加到继承自`CCSpriteBatchNode`的`TableSetup`类中是合法且非常方便的。\n\
    \n稍后你将扩展`TableSetup`类，添加其他弹球桌元素，例如柱塞、球、缓冲器和挡板。\n\n**提示：** 你注意到`ccp`方法的使用了吗？它与`CGPointMake`方法完全相同，只是输入更短。一些`cocos2d`开发者更倾向于使用`ccp`而不是`CGPointMake`，仅仅因为它输入更短。你可以在`CGPointExtension.h`中找到整个`ccp`系列有用的数学函数。在开发物理游戏时它们尤其方便。`Box2D`也带来了其自身的数学函数，定义在`b2Math.h`中。原因在于`Box2D`的向量类（如`b2Vec2`）是\
    \ C++类，而不是像`CGPoint`这样的 C 结构体，这意味着`Box2D`数据结构通常不能与`ccp`方法一起使用。\n\n`TableSetup`类本身由`PinballTable`类初始化，该类基于第\
    \ 12 章中`Box2D`项目的`HelloWorldScene`类。列表 13-6 展示了`PinballTable`类的接口。\n\n**列表 13-6.**\
    \ *PinballTable 类头文件*\n\n```\n#import \"cocos2d.h\"\n#import \"Box2D.h\"\n#import\
    \ \"GLES-Render.h\"\n\n#import \"ContactListener.h\"\n\n@interface PinballTable\
    \ : CCLayer\n{\n    b2World* world;\n    ContactListener* contactListener;\n\n\
    \    GLESDebugDraw* debugDraw;\n}\n\n+(id) scene;\n\n@end\n```\n\n它包含对`ContactListener`和`GLESDebugDraw`类的引用。后者稍后我会介绍；在你添加弹球游戏的柱塞时，`ContactListener`类将发挥作用。现在，让我们看看列表\
    \ 13-7 中对`PinballTable`类的初始化。\n\n**列表 13-7.** *PinballTable 类的初始化*\n\n```\n-(id)\
    \ init\n{\n    if ((self = [super init]))\n    {\n        // pre load the sprite\
    \ frames from the texture atlas\n        [[CCSpriteFrameCache sharedSpriteFrameCache]\
    \ \n            addSpriteFramesWithFile:@\"pinball.plist\"];\n\n        // load\
    \ physics definitions\n        [[GB2ShapeCache sharedShapeCache] addShapesWithFile:@\"\
    pinball-shapes.plist\"];\n\n        // init the box2d world\n        [self initBox2dWorld];\n\
    \n        // debug drawing\n        [self enableBox2dDebugDrawing];\n\n      \
    \  // load the background from the texture atlas\n        CCSprite* background\
    \ = [CCSprite spriteWithSpriteFrameName:@\"background\"];\n        background.anchorPoint\
    \ = ccp(0,0);\n        background.position = ccp(0,0);\n        [self addChild:background\
    \ z:-3];\n\n        // Set up table elements\n        TableSetup* tableSetup =\
    \ [TableSetup setupTableWithWorld:world];\n        [self addChild:tableSetup z:-1];\n\
    \n        [self scheduleUpdate];\n    }\n    return self;\n}\n```\n\n`CCSpriteFrameCache`通过加载`pinball.plist`文件，从使用`TexturePacker`创建的纹理图集中加载精灵帧。\n\
    \n更重要的是，接下来将`pinball-shapes.plist`文件加载到`GB2ShapeCache`类中。重要的是，在调用任何其他`Box2D`方法之前先执行此操作，以便形状缓存的`ptmRatio`能正确设置为`PhysicsEditor`设置`PTM-Ratio`中的值。如果你还记得，`PTM-Ratio`是我们在本章开头修改的第一个`PhysicsEditor`设置。\n\
    \n第 12 章中使用的像素到米宏`PTM_RATIO`已从一个简单的常量值更改为以下定义，你可以在`Constants.h`头文件中找到：\n\n```\n\
    #define PTM_RATIO ([[GB2ShapeCache sharedShapeCache] ptmRatio] * 0.5f)\n```\n\n\
    这个改进的`PTM_RATIO`宏现在从`GB2ShapeCache`类中检索点到米的比率。这就是为什么你必须确保在使用`PTM_RATIO`宏之前先初始化形状缓存。\n\
    \n形状缓存的`ptmRatio`被除以二（乘以 0.5f），因为在`PhysicsEditor`中创建的形状是基于 Retina 分辨率图像的，而`cocos2d`的与分辨率无关的点坐标（用于定位节点）始终假定\
    \ iPhone 屏幕分辨率为 480x320 点。\n\n`Box2D`物理引擎的初始化被移到了一个单独的`initBox2dWorld`方法中。`Box2D`初始化代码与前一章基本相同，有两个例外：静态屏幕边界形状（用于将动态对象保持在屏幕区域内）没有定义底部形状，允许动态物体从底部掉出屏幕。这对于球能够滚入桌面排水槽是必需的。\n\
    \n此外，左右边界的碰撞参数在`init`代码中设置，因为这些形状不是通过`PhysicsEditor`定义的。`categoryBits`必须设置为`Wall`位（在`PhysicsEditor`中为碰撞位\
    \ 4），`maskBits`必须设置为`Ball`位（在`PhysicsEditor`中为碰撞位 0）。这些位值以十六进制格式指定，由前导的`0x`指示。你会在`PhysicsEditor`的`Fixture\
    \ Parameters`下方的`Cat.`和`Mask`列下看到这些十六进制值。\n\n以下是`initBox2dWorld`方法，其中突出显示了与第 12\
    \ 章中`Box2D`初始化代码相比的更改和新增部分：\n\n```\n-(void) initBox2dWorld\n{\n    // Construct\
    \ a world object, which will hold and simulate the rigid bodies.\n    b2Vec2 gravity\
    \ = b2Vec2(0.0f, -5.0f);\n    bool allowBodiesToSleep = true;\n    world = new\
    \ b2World(gravity, allowBodiesToSleep);\n\n    contactListener = new ContactListener();\n\
    \    world->SetContactListener(contactListener);\n\n    // Define the collisions\
    \ at screen borders.\n    b2BodyDef containerBodyDef;\n    b2Body* containerBody\
    \ = world->CreateBody(&containerBodyDef);\n\n    // for the ground body we'll\
    \ need these values\n    CGSize screenSize = [CCDirector sharedDirector].winSize;\n\
    \    float widthInMeters = screenSize.width / PTM_RATIO;\n    float heightInMeters\
    \ = screenSize.height / PTM_RATIO;\n    b2Vec2 lowerLeftCorner = b2Vec2(0, 0);\n\
    \    b2Vec2 lowerRightCorner = b2Vec2(widthInMeters, 0);\n    b2Vec2 upperLeftCorner\
    \ = b2Vec2(0, heightInMeters);\n    b2Vec2 upperRightCorner = b2Vec2(widthInMeters,\
    \ heightInMeters);\n\n    // Create the screen box' sides by using a polygon assigning\
    \ each side individually.\n    b2PolygonShape screenBoxShape;\n    float density\
    \ = 0.0;\n\n    // We now only need the sides for the table:\n    // left side\n\
    \    screenBoxShape.SetAsEdge(upperLeftCorner, lowerLeftCorner);\n    b2Fixture\
    \ *left = containerBody->CreateFixture(&screenBoxShape, density);\n\n    // right\
    \ side\n    screenBoxShape.SetAsEdge(upperRightCorner, lowerRightCorner);\n  \
    \  b2Fixture *right = containerBody->CreateFixture(&screenBoxShape, density);\n\
    \n    // set the collision flags: category and mask\n    b2Filter collisonFilter;\n\
    \    collisonFilter.groupIndex = 0;\n    collisonFilter.categoryBits = 0x0010;\
    \ // category = Wall\n    collisonFilter.maskBits = 0x0001;     // mask = Ball\n\
    \n    left->SetFilterData(collisonFilter);\n    right->SetFilterData(collisonFilter);\n\
    }\n```\n\n如果你现在运行`PhysicsBox2D03`项目，你会看到……一个弹球桌。很好。但是你怎么知道碰撞形状已经正确放置并激活了呢？\n"
- fmt: "### Box2D Debug Drawing\n\nThis is where the `GLESDebugDraw` class distributed\
    \ separately from Box2D comes in handy. It's also the reason why in [Listing 13–7](#Chapter13.html#list_13_7)\
    \ all child objects are added using a negative z-order. Remember that any drawing\
    \ done by OpenGL ES code in a node's `draw` method is drawn at a z-order of 0.\
    \ If you want the OpenGL ES drawings to actually be drawn over other nodes, those\
    \ nodes need to have a negative z-order.\n\nLet's first look at the `enableBox2dDebugDrawing`\
    \ method of the `PinballTable` class:\n\n```\n-(void) enableBox2dDebugDrawing\n\
    {\n    // Debug Draw functions\n    debugDraw = new GLESDebugDraw([[CCDirector\
    \ sharedDirector] contentScaleFactor] * ![images](images/U002.jpg)\n        PTM_RATIO);\n\
    \    world->SetDebugDraw(debugDraw);\n\n    uint32 flags = 0;\n    flags |= b2DebugDraw::e_shapeBit;\n\
    \    flags |= b2DebugDraw::e_jointBit;\n    // flags |= b2DebugDraw::e_aabbBit;\n\
    \    // flags |= b2DebugDraw::e_pairBit;\n    // flags |= b2DebugDraw::e_centerOfMassBit;\n\
    \    debugDraw->SetFlags(flags);\n}\n```\n\nAn instance of the `GLESDebugDraw`\
    \ class is created, using the pixel-to-meter ratio given by the `PTM_RATIO` macro,\
    \ and then stored in the `PinballTable` member variable `debugDraw`. Since cocos2d\
    \ uses resolution-independent point coordinates that the `GLESDebugDraw` class\
    \ does not know or care about—it bypasses cocos2d to render the debug display\
    \ with regular OpenGL calls—the current display scaling factor must also be considered\
    \ so that the `GLESDebugDraw` overlay is correct for both standard and Retina\
    \ resolution devices. In case you're wondering, the `contentScaleFactor` will\
    \ be 2.0 for Retina devices and 1.0 for all other devices, including the iPad.\n\
    \nThe `debugDraw` instance is then passed to the Box2D world via the `SetDebugDraw`\
    \ method. You can define what to draw by setting the bits defined in `b2DebugDraw`,\
    \ with the `e_shapeBit` being the most important because it draws the collision\
    \ shapes of all bodies.\n\nThat alone isn't enough to render the debug output.\
    \ You also have to override the `draw` method of the `PinballTable` class and\
    \ call the `debugDraw->DrawDebugData()` method to actually draw the debug info.\
    \ Since you don't want the end user to see the debug info, the `draw` method is\
    \ enclosed in an `#ifdef DEBUG...#endif` statement so that it's visible only in\
    \ debug builds:\n\n```\n#ifdef DEBUG\n-(void) draw\n{\n    glDisable(GL_TEXTURE_2D);\n\
    \    glDisableClientState(GL_COLOR_ARRAY);\n    glDisableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    \n    world->DrawDebugData();\n\n    // restore default GL states\n    glEnable(GL_TEXTURE_2D);\n\
    \    glEnableClientState(GL_COLOR_ARRAY);\n    glEnableClientState(GL_TEXTURE_COORD_ARRAY);\n\
    }\n#endif\n```\n\nTo render the debug info correctly, some of the OpenGL ES states\
    \ need to be disabled and restored afterward, as you can see from the calls to\
    \ `glDisable` and `glEnable` methods before and after the call to `world->DrawDebugData()`.\
    \ You don't have to concern yourself with these OpenGL ES states, but if you're\
    \ interested in learning more about OpenGL ES rendering, a good starting point\
    \ is the OpenGL ES 1.1 reference: [`www.khronos.org/opengles/sdk/1.1/docs/man`](http://www.khronos.org/opengles/sdk/1.1/docs/man).\n\
    \n**NOTE:** Cocos2d 1.x versions only support OpenGL ES 1.1, and all future releases\
    \ of cocos2d v1.x will continue to use OpenGL ES 1.1 in order to be compatible\
    \ with all iOS devices. The next major release of cocos2d (version number 2.0)\
    \ will use OpenGL ES 2.0 instead and exclusively. Note that OpenGL ES 2.0 is not\
    \ available on first- and second-generation devices. In my opinion (see [`www.learn-cocos2d.com/2011/07/dropping-dead-opengl-es-v1`](http://www.learn-cocos2d.com/2011/07/dropping-dead-opengl-es-v1)),\
    \ you can safely switch to cocos2d 2.0 once it's out. And when it is, you'll find\
    \ the OpenGL ES 2.0 documentation at [`www.khronos.org/opengles/sdk/docs/man`](http://www.khronos.org/opengles/sdk/docs/man).\n\
    \n### Adding the Ball\n\nCan you imagine a pinball game without a pinball? I can't,\
    \ so let's add one to the PhysicsBox2D04 project and have a look at its implementation.\
    \ The aptly named `Ball` class is derived from `BodyNode` and also implements\
    \ the `CCTargetedTouchDelegate` protocol for experimentation purposes (see [Listing\
    \ 13–8](#Chapter13.html#list_13_8)).\n\n**Listing 13–8.** *The Ball Class's Interface*\n\
    \n```\n#import \"BodyNode.h\"\n\n@interface Ball : BodyNode <CCTargetedTouchDelegate>\n\
    {\n    bool moveToFinger;\n    CGPoint fingerLocation;\n}\n\n+(id) ballWithWorld:(b2World*)world;\n\
    \n@end\n```\n\nThere's the usual static initializer `ballWithWorld`, which takes\
    \ a `b2World` pointer as input. Then we have the member variable `moveToFinger`,\
    \ which determines whether the ball should move toward the touch location, and\
    \ the `fingerLocation` `CGPoint` variable, which specifies the actual location\
    \ of the finger. We can use those to have a little fun with the ball as long as\
    \ the pinball game doesn't yet have any other interactive elements to move the\
    \ ball. Take a look at the `Ball` initialization and `dealloc` methods in [Listing\
    \ 13–9](#Chapter13.html#list_13_9).\n\n**Listing 13–9.** *The init and dealloc\
    \ Methods of the Ball Class*\n\n```\n-(id) initWithWorld:(b2World*)world\n{\n\
    \    if ((self = [super initWithShape:@\"ball\" inWord:world]))\n    {\n     \
    \   // set the parameters\n        body->SetType(b2_dynamicBody);\n        body->SetAngularDamping(0.9f);\n\
    \n        // set random starting point\n        [self setBallStartPosition];\n\
    \n        // enable handling touches\n        [[CCTouchDispatcher sharedDispatcher]\
    \ addTargetedDelegate:self\n                                                 \
    \        priority:0\n                                                  swallowsTouches:NO];\n\
    \n        // schedule updates\n        [self scheduleUpdate];\n    }\n    return\
    \ self;\n}\n\n+(id) ballWithWorld:(b2World*)world\n{\n    return [[[self alloc]\
    \ initWithWorld:world] autorelease];\n}\n\n-(void) dealloc\n{\n    [[CCTouchDispatcher\
    \ sharedDispatcher] removeDelegate:self];\n    [super dealloc];\n}\n```\n\nJust\
    \ like the `TablePart` class, the initialization begins by calling the `BodyNode`\
    \ init method `initWithShape`, which takes care of setting up the body and sprite.\
    \ Well, it almost does so, since we do have to set the body type to be a `b2_dynamicBody`\
    \ to let Box2D know that this body should be treated as a movable object.\n\n\
    In addition, the angular damping value of the body is set to `0.9f`, which makes\
    \ the ball's angular motion more resistant to change. This allows the ball to\
    \ slide over a surface without rolling too much, which is standard behavior for\
    \ heavy pinballs made of metal.\n\n**TIP:** Tweaking physics values is usually\
    \ a very labor-intensive aspect that requires careful consideration of each change.\
    \ It's also frequently underestimated by both designers and programmers alike.\
    \ That is because all physics attributes are interrelated or interdependent. For\
    \ example, if you change the density (mass), friction, or restitution of one object,\
    \ you'll inevitably alter the behavior of any colliding object. You'll notice\
    \ that this example pinball game, while it does a fairly good job of simulating\
    \ a pinball game, would still require a lot of tweaking and fine-tuning of the\
    \ ball's behavior and collision responses for everything to feel just right and\
    \ to be a fair and fun pinball table. PhysicsEditor can help you with the tweaking\
    \ of values by providing you a single, convenient interface for editing any shape's\
    \ physics parameters.\n\nThe `setBallStartPosition` method repositions the ball\
    \ somewhere in the area where you'll later add the plunger. By slightly randomizing\
    \ the ball's position the plunger will later shoot the ball into play more realistically,\
    \ meaning unpredictably to some extent. Whenever the ball falls into the drain,\
    \ the `setBallStartPosition` method is called again to place the ball back to\
    \ its start position."
  raw: '#### Box2D Debug Drawing


    This is where the `GLESDebugDraw` class distributed separately from Box2D comes
    in handy. It''s also the reason why in [Listing 13–7](#Chapter13.html#list_13_7)
    all child objects are added using a negative z-order. Remember that any drawing
    done by OpenGL ES code in a node''s `draw` method is drawn at a z-order of 0.
    If you want the OpenGL ES drawings to actually be drawn over other nodes, those
    nodes need to have a negative z-order.


    Let''s first look at the `enableBox2dDebugDrawing` method of the `PinballTable`
    class:


    `-(void) enableBox2dDebugDrawing`

    `{`

    `    // Debug Draw functions`

    `    debugDraw = new GLESDebugDraw([[CCDirector sharedDirector] contentScaleFactor]
    *`![images](images/U002.jpg)

    `        PTM_RATIO);`

    `    world->SetDebugDraw(debugDraw);`


    `    uint32 flags = 0;`

    `    flags |= b2DebugDraw::e_shapeBit;`

    `    flags |= b2DebugDraw::e_jointBit;`

    `    // flags |= b2DebugDraw::e_aabbBit;`

    `    // flags |= b2DebugDraw::e_pairBit;`

    `    // flags |= b2DebugDraw::e_centerOfMassBit;`

    `    debugDraw->SetFlags(flags);`

    `}`


    An instance of the `GLESDebugDraw` class is created, using the pixel-to-meter
    ratio given by the `PTM_RATIO` macro, and then stored in the `PinballTable` member
    variable `debugDraw`. Since cocos2d uses resolution-independent point coordinatesthatthe
    `GLESDebugDraw` class does not know or care about—it bypasses cocos2d to render
    the debug display with regular OpenGL calls—the current display scaling factor
    must also be considered so that the `GLESDebugDraw` overlay is correct for both
    standard and Retina resolution devices. In case you''re wondering, the `contentScaleFactor`
    will be 2.0 for Retina devices and 1.0 for all other devices, including the iPad.


    The `debugDraw` instance is then passed to the Box2D world via the `SetDebugDraw`
    method. You can define what to draw by setting the bits defined in `b2DebugDraw`,
    with the `e_shapeBit` being the most important because it draws the collision
    shapes of all bodies.


    That alone isn''t enough to render the debug output. You also have to override
    the `draw` method of the `PinballTable` class and call the `debugDraw->DrawDebugData()`
    method to actually draw the debug info. Since you don''t want the end user to
    see the debug info, the `draw` method is enclosed in an `#ifdef DEBUG...#endif`
    statement so that it''s visible only in debug builds:


    `#ifdef DEBUG`

    `-(void) draw`

    `{`

    `    glDisable(GL_TEXTURE_2D);`

    `    glDisableClientState(GL_COLOR_ARRAY);`

    `    glDisableClientState(GL_TEXTURE_COORD_ARRAY);`


    `    world->DrawDebugData();`


    `    // restore default GL states`

    `    glEnable(GL_TEXTURE_2D);`

    `    glEnableClientState(GL_COLOR_ARRAY);`

    `    glEnableClientState(GL_TEXTURE_COORD_ARRAY);`

    `}`

    `#endif`


    To render the debug info correctly, some of the OpenGL ES states need to be disabled
    and restored afterward, as you can see from the calls to `glDisable` and `glEnable`
    methods before and after the call to `world->DrawDebugData()`. You don''t have
    to concern yourself with these OpenGL ES states, but if you''re interested in
    learning more about OpenGL ES rendering, a good starting point is the OpenGL ES
    1.1 reference: [`www.khronos.org/opengles/sdk/1.1/docs/man`](http://www.khronos.org/opengles/sdk/1.1/docs/man).


    **NOTE:** Cocos2d 1.x versions only support OpenGL ES 1.1, and all future releases
