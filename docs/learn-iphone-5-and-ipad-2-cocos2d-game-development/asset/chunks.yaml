  raw: '#### The Component Classes


    Component classes are intended as plug-ins for game logic. If you add a component
    to an entity, the entity will execute the behavior of the component: moving, shooting,
    animating, showing a healthbar, and so on. The big benefit is that you program
    these components to work generically almost automatically, because they interact
    with the parent `CCNode` class and should make as few assumptions about the parent
    class as possible. Of course, in some cases a component requires the parent to
    be an `EnemyEntity` class, but then you can still use it with any `EnemyEntity`.


    Component classes can also be configured depending on the class that''s using
    the component. As an example for component classes, let''s take a look at the
    `StandardShootComponent` initialization in the `EnemyEntity` class:


    `StandardShootComponent* shootComponent = [StandardShootComponent node];`

    `shootComponent.shootFrequency = shootFrequency;`

    `shootComponent.bulletFrameName = bulletFrameName;`

    `[self addChild:shootComponent];`


    The variables `shootFrequency` and `bulletFrameName` have been set previously
    based on the `EnemyType`. By adding the `StandardShootComponent` to the `EnemyEntity`
    class, the enemy will shoot specific bullets at certain intervals. Since this
    component makes no assumptions about the parent class, you could even add an instance
    of it to the `ShipEntity` class and have your player''s ship shoot automatically
    at specific intervals! Or by simply activating and deactivating specialized shooting
    components, you can create the effect of changing weapons for the player with
    very little code. You just program the shooting code in isolation and then plug
    it into a game entity and add some parameters to it. The only logic left for programming
    the switching of weapons is simply when to deactivate which components. What''s
    more, you can reuse these components in other games if they make sense. Components
    are great for writing reusable code and are a standard mechanism in many, many
    game engines. If you''d like to learn more about game components, please refer
    to this blog post on my web site: [`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/`](http://www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/).


    Let''s look at the `StandardShootComponent`''s source code, starting with the
    header file:


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface StandardShootComponent : CCSprite`

    `{`

    `    float updateCount;`

    `    float shootFrequency;`

    `    NSString* bulletFrameName;`

    `}`


    `@property (nonatomic) float shootFrequency;`

    `@property (nonatomic, copy) NSString* bulletFrameName;`


    `@end`


    There are two things of note. The first is that `StandardShootComponent` is derived
    from `CCSprite`, even though it doesn''t use any texture. That is a workaround
    because all `EnemyEntity` objects are added to a `CCSpriteBatchNode`, which can
    contain only `CCSprite-` based objects. This also extends to any child node of
    the `EnemyEntity` class; thus, the `StandardShootComponent` needs to inherit from
    `CCSprite` to satisfy the requirement of the `CCSpriteBatchNode`.


    Next there''s an `NSString*` pointer, `bulletFrameName`, with a corresponding
    `@property`. If you look closely, you''ll notice the keyword `copy` in the `@property`
    definition. That means assigning an `NSString` to this property will create a
    copy of it. This is important for strings since they are generally autoreleased
    objects, and we want to make sure this string is ours. We could also retain it,
    but the problem is that the source string could be an `NSMutableString` that can
    be changed. And that would also change the `bulletFrameName`, which would be undesirable
    in this case. Of course, with the `copy` keyword comes the responsibility to release
    the `bulletFrameName` memory on `dealloc`, as shown in the implementation in [Listing
    8–9](#Chapter08.html#list_8_9).


    **Listing 8–9.** *The StandardShootComponent Implementation in Its Entirety*


    `#import "StandardShootComponent.h"`

    `#import "BulletCache.h"`

    `#import "GameScene.h"`


    `@implementation StandardShootComponent`


    `@synthesize shootFrequency;`

    `@synthesize bulletFrameName;`


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        [self scheduleUpdate];`

    `    }`


    `    return self;`

    `}`


    `-(void) dealloc`

    `{`

    `    [bulletFrameName release];`

    `    [super dealloc];`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    if (self.parent.visible)`

    `    {`

    `        updateCount += delta;`


    `        if (updateCount >= shootFrequency)`

    `        {`

    `            updateCount = 0;`


    `            GameScene* game = [GameScene sharedGameScene];`

    `            CGPoint startPos = ccpSub(self.parent.position,`![images](images/U002.jpg)

    `                CGPointMake(self.parent.contentSize.width * 0.5f, 0));`

    `            [game.bulletCache shootBulletFrom:startPos`

    `                        velocity:CGPointMake(-200, 0)`

    `                        rameName:bulletFrameName];`

    `        }`

    `    }`

    `}`

    `@end`


    The actual shooting code first checks whether the parent is visible, because if
    the parent isn''t visible, the code obviously shouldn''t shoot. The `BulletCache`
    is what shoots the bullet, using the `bulletFrameName` provided to the component
    and a fixed velocity. For the start position, the component''s position itself
    is irrelevant. Instead, the parent position and `contentSize` properties are used
    to calculate the correct starting position: in this case, at the left side of
    the enemy''s sprite.


    This bullet `startPos` works reasonably well for regular enemies but may need
    tweaking for the boss enemy. I''ll leave it up to you to add another property
    to this component with which to set the bullet `startPosition`. Alternatively,
    you could also create a separate `BossShootComponent` and add this only to boss
    enemies to create more complex shooting patterns. The same goes for `StandardMoveComponents`,
    which for the boss might require hovering at a certain position at the right side
    of the screen.'
  trans: "\n### 组件类\n\n组件类旨在作为游戏逻辑的插件。如果你向实体添加一个组件，该实体将执行组件的行为：移动、射击、动画、显示血条等。其巨大优势在于，你可以将这些组件编程为几乎自动地通用工作，因为它们与父类`CCNode`交互，并应尽可能少地对父类做出假设。当然，在某些情况下，组件要求父类为`EnemyEntity`类，但你仍然可以将其用于任何`EnemyEntity`。\n\
    \n组件类也可以根据使用该组件的类进行配置。以组件类为例，我们来看一下`EnemyEntity`类中的`StandardShootComponent`初始化：\n\
    \n```\nStandardShootComponent* shootComponent = [StandardShootComponent node];\n\
    shootComponent.shootFrequency = shootFrequency;\nshootComponent.bulletFrameName\
    \ = bulletFrameName;\n[self addChild:shootComponent];\n```\n\n变量`shootFrequency`和`bulletFrameName`已根据`EnemyType`预先设置。通过将`StandardShootComponent`添加到`EnemyEntity`类，敌人将以特定间隔发射特定子弹。由于此组件对父类不做任何假设，你甚至可以将其实例添加到`ShipEntity`类，让玩家的飞船以特定间隔自动射击！或者，只需激活和停用专门的射击组件，就能用很少的代码实现玩家更换武器的效果。你只需独立编写射击代码，然后将其插入游戏实体并添加一些参数。切换武器编程剩下的逻辑仅仅是何时停用哪些组件。更重要的是，如果这些组件合理，你可以在其他游戏中复用它们。组件非常适合编写可复用代码，并且是许多游戏引擎中的标准机制。如果你想了解更多关于游戏组件的信息，请参考我网站上的博客文章：[`www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/`](http://www.learn-cocos2d.com/2010/06/prefer-composition-inheritance/)。\n\
    \n让我们看看`StandardShootComponent`的源代码，从头文件开始：\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface StandardShootComponent : CCSprite\n{\n   \
    \ float updateCount;\n    float shootFrequency;\n    NSString* bulletFrameName;\n\
    }\n\n@property (nonatomic) float shootFrequency;\n@property (nonatomic, copy)\
    \ NSString* bulletFrameName;\n\n@end\n```\n\n有两点值得注意。第一，`StandardShootComponent`派生自`CCSprite`，尽管它不使用任何纹理。这是一种变通方法，因为所有`EnemyEntity`对象都被添加到一个`CCSpriteBatchNode`中，而该节点只能包含基于`CCSprite`的对象。这也适用于`EnemyEntity`类的任何子节点；因此，`StandardShootComponent`需要继承自`CCSprite`以满足`CCSpriteBatchNode`的要求。\n\
    \n接下来是一个`NSString*`指针`bulletFrameName`，带有相应的`@property`。如果仔细观察，你会注意到`@property`定义中的关键字`copy`。这意味着将`NSString`赋值给此属性会创建其副本。这对字符串很重要，因为它们通常是自动释放的对象，我们希望确保这个字符串归我们所有。我们也可以保留它，但问题在于源字符串可能是一个可更改的`NSMutableString`，这也会改变`bulletFrameName`，在本例中是不可取的。当然，使用`copy`关键字意味着需要在`dealloc`中释放`bulletFrameName`内存，如代码清单\
    \ 8-9 的实现所示。\n\n**代码清单 8-9.** *StandardShootComponent 的完整实现*\n\n```\n#import \"\
    StandardShootComponent.h\"\n#import \"BulletCache.h\"\n#import \"GameScene.h\"\
    \n\n@implementation StandardShootComponent\n\n@synthesize shootFrequency;\n@synthesize\
    \ bulletFrameName;\n\n-(id) init\n{\n    if ((self = [super init]))\n    {\n \
    \       [self scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) dealloc\n\
    {\n    [bulletFrameName release];\n    [super dealloc];\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    if (self.parent.visible)\n    {\n        updateCount += delta;\n\n    \
    \    if (updateCount >= shootFrequency)\n        {\n            updateCount =\
    \ 0;\n\n            GameScene* game = [GameScene sharedGameScene];\n         \
    \   CGPoint startPos = ccpSub(self.parent.position, \n                CGPointMake(self.parent.contentSize.width\
    \ * 0.5f, 0));\n            [game.bulletCache shootBulletFrom:startPos\n     \
    \                   velocity:CGPointMake(-200, 0)\n                        frameName:bulletFrameName];\n\
    \        }\n    }\n}\n@end\n```\n\n实际的射击代码首先检查父节点是否可见，因为如果父节点不可见，代码显然不应射击。`BulletCache`负责发射子弹，使用提供给组件的`bulletFrameName`和固定速度。对于起始位置，组件本身的位置无关紧要。相反，使用父节点的位置和`contentSize`属性来计算正确的起始位置：在此例中，位于敌人精灵的左侧。\n\
    \n这个子弹的`startPos`对普通敌人来说效果尚可，但可能需要对首领敌人进行调整。我将留给你来为此组件添加另一个属性，用于设置子弹的`startPosition`。或者，你也可以创建一个单独的`BossShootComponent`，仅将其添加到首领敌人，以实现更复杂的射击模式。`StandardMoveComponents`也是如此，对于首领敌人，可能需要其在屏幕右侧的某个位置悬停。\n"
- fmt: "### Shooting Things\n\nI almost forgot—you actually want to shoot the enemies,\
    \ right? Well, in the `ShootEmUp03` project, you can!\n\nThe ideal starting point\
    \ to check if a bullet has hit something is in the `BulletCache` class. I've added\
    \ just the method to do that. Actually, I've added three methods, two of them\
    \ public; the third is private to the class and combines the common code (see\
    \ [Listing 8–10](#Chapter08.html#list_8_10)). The idea behind using the two wrapper\
    \ methods, `isPlayerBulletCollidingWithRect` and `isEnemyBulletCollidingWithRect`,\
    \ is to hide the internal detail of determining which kinds of bullets are used\
    \ for collision checks. You could also expose the `usePlayerBullets` parameter\
    \ to other classes, but doing so would only make it harder to eventually change\
    \ the parameter from a `bool` to an `enum`, in case you want to introduce a third\
    \ type of bullet.\n\n**Listing 8–10.** *Checking for Collisions with Bullets*\n\
    \n```\n-(bool) isPlayerBulletCollidingWithRect:(CGRect)rect\n{\n    return [self\
    \ isBulletCollidingWithRect:rect usePlayerBullets:YES];\n}\n\n-(bool) isEnemyBulletCollidingWithRect:(CGRect)rect\n\
    {\n    return [self isBulletCollidingWithRect:rect usePlayerBullets:NO];\n}\n\n\
    -(bool) isBulletCollidingWithRect:(CGRect)rect usePlayerBullets:(bool)usePlayerBullets\n\
    {\n    bool isColliding = NO;\n\n    Bullet* bullet;\n    CCARRAY_FOREACH([batch\
    \ children], bullet)\n    {\n        if (bullet.visible && usePlayerBullets ==\
    \ bullet.isPlayerBullet)\n        {\n            if (CGRectIntersectsRect([bullet\
    \ boundingBox], rect))\n            {\n                isColliding = YES;\n\n\
    \                // remove the bullet\n                bullet.visible = NO;\n\
    \                break;\n            }\n        }\n    }\n\n    return isColliding;\n\
    }\n```\n\nOnly visible bullets can collide, of course, and by checking the bullet's\
    \ `isPlayerBullet` property, we ensure that enemies can't shoot themselves. The\
    \ actual collision test is a simple `CGRectIntersectsRect` test, and if the bullet\
    \ has actually hit something, the bullet itself is also set to be invisible to\
    \ make it disappear.\n\nThe `EnemyCache` class holding all `EnemyEntity` objects\
    \ is the perfect place to call this method to check whether any enemy was hit\
    \ by a player bullet. The class has a new `checkForBulletCollisions` method, which\
    \ is called from its `update` method:\n\n```\n-(void) checkForBulletCollisions\n\
    {\n    EnemyEntity* enemy;\n    CCARRAY_FOREACH([batch children], enemy)\n   \
    \ {\n        if (enemy.visible)\n        {\n            BulletCache* bulletCache\
    \ = [[GameScene sharedGameScene] bulletCache];\n            CGRect bbox = [enemy\
    \ boundingBox];\n            if ([bulletCache isPlayerBulletCollidingWithRect:bbox])\n\
    \            {\n                // This enemy got hit ...\n                [enemy\
    \ gotHit];\n            }\n        }\n    }\n}\n```\n\nHere again it's convenient\
    \ to be able to iterate over all the enemy entities in the game, skipping those\
    \ that are currently not visible. Using each enemy's `boundingBox` to check with\
    \ the `isPlayerBulletCollidingWithRect` method of `BulletCache`, we can quickly\
    \ find if an enemy got hit by a player bullet. If so, the `gotHit` method of `EnemyEntity`\
    \ is called, which simply sets the enemy to be invisible.\n\nI'll leave it as\
    \ an exercise for you to implement the player's ship being hit by enemy bullets.\
    \ You'll have to schedule an `update` method in `ShipEntity` and then implement\
    \ the `checkForBulletCollisions` method and call it from the `update` method.\
    \ You'll have to change the call to `isPlayerBulletCollidingWithRect` to `isEnemyBulletCollidingWithRect`\
    \ and decide how you want to react to being hit by a bullet, for example by playing\
    \ a sound effect.\n\n### A Healthbar for the Boss\n\nThe boss monster shouldn't\
    \ be an easy, one-hit kill. It also should give the player feedback about its\
    \ health by displaying a healthbar that decreases with each hit. The first step\
    \ toward a healthbar is adding the `hitPoints` member variable to the `EnemyEntity`\
    \ class, which tells us how many hits the enemy can take before being destroyed.\
    \ The `initialHitPoints` variable stores the maximum hit points, since after an\
    \ enemy gets killed we need to be able to restore the original hit points. This\
    \ is the changed header file in the `EnemyEntity` class:\n\n```\n@interface EnemyEntity\
    \ : Entity\n{\n    EnemyTypes type;\n    int initialHitPoints;\n    int hitPoints;\n\
    }\n\n@property (readonly, nonatomic) int hitPoints;\n```\n\nTo display the healthbar,\
    \ a component class is ideal because it provides a plug-and-play solution. The\
    \ header file for the `HealthbarComponent` proves to be highly unspectacular:\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface\
    \ HealthbarComponent : CCSprite\n{\n}\n\n-(void) reset;\n\n@end\n```\n\nThe implementation\
    \ of the `HealthbarComponent` class is more interesting, as [Listing 8–11](#Chapter08.html#list_8_11)\
    \ shows.\n\n**Listing 8–11.** *The HealthBarComponent Updates Its `scaleX` Property\
    \ Based on the Enemy's Remaining Hit Points*\n\n```\n#import \"HealthbarComponent.h\"\
    \n#import \"EnemyEntity.h\"\n\n@implementation HealthbarComponent\n\n-(id) init\n\
    {\n    if ((self = [super init]))\n    {\n        self.visible = NO;\n       \
    \ [self scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) reset\n{\n \
    \   float parentHeight = self.parent.contentSize.height;\n    float selfHeight\
    \ = self.contentSize.height;\n    self.position = CGPointMake(self.parent.anchorPointInPixels.x,\n\
    \        parentHeight + selfHeight);\n    self.scaleX = 1;\n    self.visible =\
    \ YES;\n}\n\n-(void) update:(ccTime)delta\n{\n    if (self.parent.visible)\n \
    \   {\n        NSAssert([self.parent isKindOfClass:[EnemyEntity class]], @\"not\
    \ a EnemyEntity\");\n        EnemyEntity* parentEntity = (EnemyEntity*)self.parent;\n\
    \        self.scaleX = parentEntity.hitPoints / (float)parentEntity.initialHitPoints;\n\
    \    }\n    else if (self.visible)\n    {\n        self.visible = NO;\n    }\n\
    }\n@end\n```\n\nThe healthbar turns its visible state on and off to be in line\
    \ with its parent `EnemyEntity` object. The `reset` method places the healthbar\
    \ sprite at the proper location just above the head of the `EnemyEntity`'s sprite.\
    \ Since a decrease in health is displayed by modifying the `scaleX` property,\
    \ it, too, needs to be reset to its default state.\n\nIn the update method and\
    \ when its parent is visible, the `HealthbarComponent` first asserts that the\
    \ parent is of class `EnemyEntity`. Since this component relies on certain properties\
    \ only available in the `EnemyEntity` class and its subclasses, we need to make\
    \ sure that it's the right parent class. We modify the `scaleX` property as a\
    \ percentage of the current hit points divided by the initial hit points. Since\
    \ there's currently no way of telling when the hit points change, the calculation\
    \ is done every frame, regardless of whether it's needed. The overhead here is\
    \ minimal, but for more complex calculations, a call to the `HealthbarComponent`\
    \ from the `onHit` method of the `EnemyEntity` class would be preferable.\n\n\
    **NOTE:** The `parentEntity.initialHitPoints` is cast to `float`. If I hadn't\
    \ done this, the division would be an integer division that would always result\
    \ in 0 since integers can't represent fractional numbers and are always rounded\
    \ down. Casting the divisor to a `float` data type ensures that floating-point\
    \ division is done and the desired result is returned.\n\nIn the `init` method\
    \ of the `EnemyEntity`, the `HealthbarComponent` is added if the enemy type is\
    \ `EnemyTypeBoss`:"
