- fmt: "# Kobold2D Provides “Lib Service”\n\nA central aspect of Kobold2D is to spare\
    \ developers the pain of adding third-party libraries to cocos2d projects. Correctly\
    \ setting up third-party libraries often requires intricate knowledge of the build\
    \ system, an intuition about how to read compiler and linker errors, and possibly\
    \ even small but crucial source code changes in the right places. It can take\
    \ hours, if not days, for someone else’s code to compile and link successfully\
    \ on all platforms: iOS (`ARMv6` and `ARMv7`), iOS Simulator, and Mac OS X both\
    \ in 32-bit and 64-bit variants.\n\nThat’s what Kobold2D provides: lib service.\
    \ In the first public release of Kobold2D, the following libraries are included:\n\
    \n- These are libraries for both iOS and Mac OS X projects:\n  - `Kobold2D` (game\
    \ engine code, Objective-C)\n  - `cocos2d-iphone` (2D graphics, Objective-C)\n\
    \  - `cocos2d-iphone-extensions` (utility code, Objective-C)\n  - `Box2D` (physics,\
    \ C++)\n  - `Chipmunk` (physics, C)\n  - `Chipmunk SpaceManager` (Chipmunk physics,\
    \ Objective-C)\n  - `CocosDenshion` (audio, Objective-C)\n  - `Wax` (scripting,\
    \ Lua)\n- These are libraries available only for iOS projects:\n  - `cocos3d`\
    \ (3D graphics, Objective-C)\n  - `ObjectAL` (audio, Objective-C)\n  - `SneakyInput`\
    \ (joystick, Objective-C)\n  - `iSimulate` (library for iSimulate app)\n\nWhenever\
    \ an essential library such as `cocos2d` or `cocos3d` is updated, a new release\
    \ of Kobold2D will follow within days, if not hours. There’s no need for you to\
    \ get active on the library front.\n\nSome readers may wonder whether this means\
    \ that Kobold2D apps are bloated, with all those libraries being included. You\
    \ may be surprised to hear that early tests showed that Kobold2D apps are actually\
    \ slightly smaller compared to `cocos2d-iphone` apps even though `Wax` and `Lua`\
    \ are built into Kobold2D. The reason is that the Kobold2D projects are set up\
    \ to allow the linker to throw away any code that isn’t used in your app. That\
    \ means if, for example, you don’t include any of the `Box2D` headers, none of\
    \ the `Box2D` library code will be linked with your app. But if you do want to\
    \ start using `Box2D`, it’s as simple as adding the `Box2D.h` header file to your\
    \ project, and you’re ready to start writing `Box2D`-enabled physics apps.\n\n\
    # Kobold2D Takes Cross-Platform to Heart\n\nBy having one target for each platform\
    \ (iOS and Mac OS X) by default in its project templates, Kobold2D allows you\
    \ to build and run your code on both platforms from within the same Xcode project.\n\
    \nDeveloping for both iOS and Mac OS platforms is also encouraged by the Kobold2D\
    \ API, which goes a long way to ensure that game engine code compiles for both\
    \ platforms. For example, if you try to read the mouse button states on iOS, the\
    \ code still compiles, and the result is a safe default, which in this case would\
    \ simply report that no mouse button is pressed.\n\n## The Kobold2D Workspace\n\
    \nAfter downloading and installing Kobold2D, you’ll find the most recent version\
    \ of Kobold2D in a versioned subfolder of `~/Kobold2D`, for example, `~/Kobold2D/Kobold2D-1.0.*`.\
    \ The installer will also open the `Kobold2D Project Starter.app` for you, which\
    \ allows you to start a new Kobold2D project from one of the supplied project\
    \ templates (see [Figure 16–1](#Chapter16.html#fig_16_1)).\n\n![images](images/1601.jpg)\n\
    \n**Figure 16–1.** *The Kobold2D Project Starter tool allows you to start new\
    \ projects easily.*\n\nSelect the `Hello-Kobold2D` template, enter any text in\
    \ the `New Project Name` text field, and click `Create Project from Template`.\
    \ You can also change the `Add to Workspace` text if you want to add the new project\
    \ to a custom workspace (it will be created if necessary). By default, Kobold2D\
    \ projects are added to the `Kobold2D.xcworkspace`.\n\nXcode should now open the\
    \ Kobold2D workspace that contains your new project, as shown in [Figure 16–2](#Chapter16.html#fig_16_2).\n\
    \n**CAUTION:** Kobold2D uses the new workspace concept of Xcode 4, which allows\
    \ you to combine multiple projects in a single workspace window. If you open the\
    \ `.xcodeproj` file of a Kobold2D project either from the most recently used list\
    \ or by double-clicking it in Finder, the project will not work. You can easily\
    \ spot this problem because the `Kobold2D-Libraries` project will be absent from\
    \ the `Project Navigator` pane. Make sure to always open the corresponding `.xcodeworkspace`\
    \ file that contains the `.xcodeproj` that you want to work with.\n\nConsequently,\
    \ Kobold2D is not compatible with Xcode 3.x since workspaces were first introduced\
    \ with Xcode 4.0.\n\n![images](images/1602.jpg)\n\n**Figure 16–2.** *The Kobold2D\
    \ Xcode 4 workspace view with the Hello Kobold2D Mac OS X project running*\n\n\
    ## The Hello Kobold2D Template Project\n\nLet’s take a closer look at the `Hello\
    \ Kobold2D` project ([Figure 16–2](#Chapter16.html#fig_16_2)) to demonstrate several\
    \ key concepts of Kobold2D.\n\n### The Hello World Project Files\n\nIn [Figure\
    \ 16–3](#Chapter16.html#fig_16_3) you’ll see the groups and files in the `My First\
    \ Kobold2D Project`, which was created from the `Hello-Kobold2D` template project.\n\
    \n![images](images/1603.jpg)\n\n**Figure 16–3.** *The default group structure\
    \ of a Kobold2D project*\n\nThe immediately noticeable difference compared to\
    \ a regular cocos2d project is that three groups begin with `Projectfiles`, and\
    \ there is the additional `BuildSettings` group. The idea behind that is to have\
    \ a `Projectfiles` group and folder that contain the source code and resource\
    \ files common to all platforms. The majority of your source code and resources\
    \ will be in this folder. The additional `Projectfiles-iOS` and `Projectfiles-Mac`\
    \ groups should contain only files used by that particular platform. These groups\
    \ are meant as suggestions; you are of course free to structure your project’s\
    \ group as you see fit.\n\nThe `BuildSettings` group contains several `.xcconfig`\
    \ files, which are the textual format for Xcode build settings. Normally you will\
    \ not need to modify these files, but in some cases you may want to, for example,\
    \ disable `iSimulate` or enable support for `cocos3d`. The huge benefit of the\
    \ `.xcconfig` files is that they can be documented, and accordingly you’ll find\
    \ several notes for each build setting, what it does, what it affects, and when\
    \ you might want to enable or disable it.\n\nAlmost all Kobold2D project templates\
    \ provide targets for both iOS and Mac OS X, which are suffixed with `-iOS` and\
    \ `-Mac`, respectively. I hope that the readily available Mac target will encourage\
    \ you and other developers to consider cross-platform development from the start\
    \ and to publish more apps to both Apple App Store. It’s certainly a lot easier\
    \ to take cross-platform development into account from the start rather than porting\
    \ the app once it’s finished.\n\n### How Kobold2D Launches an App\n\nKobold2D\
    \ simplifies the start-up process, in particular how much custom code is needed\
    \ in your project (by default: none). Kobold2D does all the initialization performed\
    \ by the `main` function, the app delegate, and the root view controller behind\
    \ the scenes.\n\nFurthermore, Kobold2D allows you to easily modify the start-up\
    \ settings, such as the first scene or layer to display, the device orientation,\
    \ the render settings, the Mac window size, Retina support, and many more. All\
    \ these settings are centralized in the `config.lua` script file."
