  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您提供的格式和注意事项，对给定的英文文本进行专业、准确的中文翻译。\n\n\n# 图块全局标识符（GID）介绍\n\
    \n现在，我想介绍一下图块的全局标识符（GID）这个概念。GID 是分配给 tilemap 中每个图块的唯一整数编号。地图中的图块从 1 开始连续编号。GID\
    \ 为 0 表示一个空图块。通过 `CCTMXLayer` 的 `tileGIDAt` 方法，你可以获取指定图块坐标处的图块的 GID 编号。\n\n接下来，从\
    \ tilemap 中获取名为 `GameEventLayer` 的 `CCTMXLayer`。这是我定义 `isWater` 图块并将其绘制在河流图块上的图层。`tileGIDAt`\
    \ 方法返回该图块的唯一标识符。如果标识符恰好是 0，则表示该图层的此位置上没有图块——在这种情况下，很明显触摸到的图块不可能是 `isWater` 图块。\n\
    \n`CCTMXTiledMap` 有一个 `propertiesForGID` 方法，如果具有给定标识符（GID）的图块有可用属性，该方法会返回一个 `NSDictionary`。这个\
    \ `NSDictionary` 包含了在 Tiled 中编辑的属性（参见图 10–8）。该字典将任何键/值对存储为 `NSString` 对象。如果你出于调试目的想查看特定\
    \ `NSDictionary` 的内容，可以使用如下 `CCLOG` 语句：\n\n```\nCCLOG(@\"NSDictionary 'properties'\
    \ 包含:\\n%@\", properties);\n```\n\n这将在调试器控制台窗口中打印出类似于下面一行内容：\n\n```\n2010–08-30\
    \ 19:50:52.344 Tilemap[978:207] NSDictionary 'properties' 包含:\n{\n    isWater\
    \ = 1;\n}\n```\n\n在处理 tilemaps 时，你会接触到各种 `NSDictionary` 对象。记录其内容可以让你窥探任何 `NSDictionary`\
    \ 的内部，或者就此而言，任何 iPhone SDK 集合类的内部。这在某些时候会派上用场。\n\n`NSDictionary` 中的每个属性都可以通过 `NSDictionary`\
    \ 的 `valueForKey` 方法根据其名称来检索，该方法返回一个 `NSString`。要从 `NSString` 获取布尔值，你可以简单地使用 `NSString`\
    \ 的 `boolValue` 方法。以类似的方式，你可以分别使用 `NSString` 的 `intValue` 和 `floatValue` 方法来检索整型和浮点型数值。\n\
    \n在 `ccTouchesBegan` 方法的末尾，我检查触摸点是否在水面上，如果是，则播放一个音效。否则，我获取 `WinterLayer` 并通过对其取反来切换其\
    \ `visible` 属性。改变季节从未如此简单！这个效果应该能说明如何使用 Tiled 中的多个图层来实现全局范围内的变化，而无需加载一个完全独立的 tilemap。\n\
    \n对于单个图块的局部更改，你可以利用 `removeTileAt` 和 `setTileGID` 方法在游戏过程中移除或替换特定图层的图块：\n\n```\n\
    [winterLayer removeTileAt:tilePos];\n[winterLayer setTileGID:tileGID at:tilePos];\n\
    ```\n\n## 定位触摸的图块\n\n我之前提到过 `tilePosFromLocation` 方法，这里重复一下相关的两行代码：\n\n```\n//\
    \ 从触摸位置获取图块坐标中的位置\nCGPoint touchLocation = [self locationFromTouch:[touches anyObject]];\n\
    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\
    ```\n\n首先，触摸的位置被映射到屏幕坐标。我之前做过这个，但由于你会经常需要这段代码，我在代码清单 10–2 中提供了它供你参考。\n\n**代码清单\
    \ 10–2.** *确定触摸的位置*\n\n```\n-(CGPoint) locationFromTouch:(UITouch*)touch\n{\n\
    \    CGPoint touchLocation = [touch locationInView: [touch view]];\n    return\
    \ [[CCDirector sharedDirector] convertToGL:touchLocation];\n}\n```\n\n将触摸位置转换为屏幕坐标后，调用\
    \ `tilePosFromLocation` 方法。它以触摸位置和一个指向 `tileMap` 的指针作为参数。代码清单 10–3 中的方法包含一些数学运算，我将马上解释——屏住呼吸：\n\
    \n**代码清单 10–3.** *将位置转换为图块坐标*\n\n```\n-(CGPoint) tilePosFromLocation:(CGPoint)location\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // 必须偏移 Tilemap 位置，以防 tilemap 正在滚动\n\
    \    CGPoint pos = ccpSub(location, tileMap.position);\n\n    // 转换为 int 确保结果是整数\n\
    \    pos.x = (int)(pos.x / tileMap.tileSize.width);\n    pos.y = (int)((tileMap.mapSize.height\
    \ * tileMap.tileSize.height - pos.y) /\n        tileMap.tileSize.height);\n\n\
    \    CCLOG(@\"触摸位置 (%.0f, %.0f) 在图块坐标 (%i, %i)\", location.x, location.y,\n  \
    \      (int)pos.x, (int)pos.y);\n    NSAssert(pos.x >= 0 && pos.y >= 0 && pos.x\
    \ < tileMap.mapSize.width &&\n        pos.y < tileMap.mapSize.height, @\"%@: 坐标\
    \ (%i, %i) 超出范围!\",\n        NSStringFromSelector(_cmd), (int)pos.x, (int)pos.y);\n\
    \n    return pos;\n}\n```\n\n还在听吗？如果你以前处理过 tilemaps，这段代码应该很熟悉，但如果没有，你可能一头雾水。我来解释一下。这个方法做的第一件事是从触摸位置中减去当前的\
    \ `tileMap.position`。即将推出的 Tilemap03 示例项目添加了 tilemap 滚动功能，因此 tilemap 的位置很可能不在\
    \ (0,0)。\n\n要使视点进一步向上（北）和向右（东）滚动，实际上必须通过负值来改变其位置。这是因为 tilemap 从位置 (0,0) 开始，这会将地图的左下角定位在屏幕的最左下角。最初，tilemap\
    \ 的 (0,0) 点与屏幕的 (0,0) 点重合。如果你将 tilemap 移动到位置 (100,100)，看起来好像视点正在向左和向下移动。常见的错误是认为你正在移动视点，但实际上并非如此。移动的是\
    \ tilemap 图层，要更进一步向 tilemap 的中心滚动，你必须用负值来偏移 tilemap。\n\n剩下的就是简单的数学运算了：为了从 tilemap（我们知道其位置总是负数）获取正确的偏移量，我们必须减去触摸位置和\
    \ `tileMap.position`。具体数字表明，减去一个负数实际上就是加法：\n\n`location(240, 160) – tileMap.position(-100,\
    \ -100) = pos(340, 260)`\n\n当 tilemap 图层从屏幕的 (0,0) 点移动了 (-100,-100) 像素，而触摸点在屏幕上的\
    \ (240,160) 像素处时，触摸位置相对于 tilemap 当前位置的总偏移量为 (340,260) 像素。\n"
- fmt: "  \n考虑到滚动偏移后，我们可以获取该位置在图块地图中的图块坐标。此时，你需要注意：图块坐标的`(0,0)`图块位于图块地图的左上角。与屏幕坐标相反，屏幕坐标的`(0,0)`点（原点）位于左下角，而图块地图坐标从左上角开始。[图10-11](#Chapter10.html#fig_10_11)展示了一系列图块的`x`、`y`坐标。该截图是通过在\
    \ Tiled Java 版本中启用`View`![images](images/U001.jpg)`Show Coordinates`功能制作的，该功能在\
    \ Tiled Qt 版本中尚未提供。\n\n![images](images/1011.jpg)\n\n**图10-11.** *正交图块地图的坐标系*\n\
    \n为了避免混淆，以下是计算图块坐标`x`位置的代码行：\n\n`pos.x = (int)(pos.x / tileMap.tileSize.width);`\n\
    \n`tileMap.tileSize`属性是图块集中图块的尺寸，本例中为32×32（另请参见[图10-6](#Chapter10.html#fig_10_6)）。如果触摸点位于`340`的`x`位置，计算结果如下：\n\
    \n`340 / 32 = 10.625`\n\n然而这不可能正确。我们寻找的是图块的`x`坐标，它绝不会是小数！原因当然在于，触摸点位于我们所需图块的内部（即一个32×32的方形区域内）。将结果强制转换为`int`值的简单技巧可以去除小数部分，并将其赋值给`pos.x`：\n\
    \n`pos.x = (int)10.625        // pos.x == 10`\n\n强制转换为`int`会去除小数部分。你可以安全地丢弃小数部分，因为它根本不相关——实际上它是有害的。如果你没有舍弃小数部分，而是使用了非整数坐标（本例中为`10.625`）来尝试检索图块，你会收到一个运行时错误，因为在`x`坐标为`10`和`11`处才有图块，而不是在`10.625`处。\n\
    \n获取图块`y`坐标的计算稍微复杂一些：\n\n`pos.y = (int)((tileMap.mapSize.height * tileMap.tileSize.height\
    \ - pos.y) /`![images](images/U002.jpg)\n`     tileMap.tileSize.height);`\n\n\
    注意，括号很重要，以确保除法最后执行。用实际数字来看，这个计算更容易理解。如[图10-5](#Chapter10.html#fig_10_5)所示，`tileMap.mapSize`是30×20个图块，而如前所述，`tileMap.tileSize`是32×32像素。计算过程如下：\n\
    \n`pos.y = (int)((20 * 32 – 260) / 32)`\n\n将`tileMap.mapSize.height`与`tileMap.tileSize.height`相乘，得到图块地图的像素总高度。这是必要的，因为图块地图的`y`坐标从顶部向底部计数，而屏幕的`y`坐标从底部向顶部计数。通过计算图块地图的最底部`y`坐标，并从中减去当前`y`位置`260`，就能得到触摸点在图块地图中以像素为单位的正确`y`位置。由于这是一个像素坐标，你需要除以`tileSize.height`，然后向下转换为`int`值，以获取图块的`y`坐标。\n\
    \n`CCLOG`和`NSAssert`这两行有助于在调试器控制台窗口中查看计算结果，并确保图块坐标永远不会取非法值。这既是一个学习工具，也是一份保障策略。\n\
    \n#### 优化与可读性的练习\n\n由于图块地图的大小从不改变，你可以对计算进行一点优化，通过在类的`@interface`中添加一个成员变量来存储图块地图的像素高度，从而获取`y`图块坐标：\n\
    \n`float tileMapHeightInPixels;`\n\n然后，你可以在`init`方法中，就在图块地图加载完成后，仅计算一次`tileMapHeightInPixels`：\n\
    \n`CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@\"orthogonal.tmx\"\
    ];`  \n`tileMapHeightInPixels = tileMap.mapSize.height * tileMap.tileSize.height;`\n\
    \n接着你可以重写计算过程，这样每次调用`tilePosFromLocation`方法时，就节省了一次乘法运算：\n\n`pos.y = (int)((tileMapHeightInPixels\
    \ - pos.y) / tileMap.tileSize.height);`\n\n这可能不会赢得最佳优化奖——这只是性能上非常微小的提升。但点滴积累都很重要，并且它通过降低复杂性，用一个可读性强的变量名取而代之，使计算更易于阅读。\
    \  \n"
  raw: 'With the scrolling offset taken into account, we can get the tile coordinates
    for the tile at this location into the tilemap. At this point, you have to consider
    that the tile coordinates'' 0,0 tile is at the top-left corner of the tilemap.
    Contrary to screen coordinates, where the 0,0 point (point of origin) is at the
    lower-left corner, the tilemap coordinates start at the upper-left corner. [Figure
    10–11](#Chapter10.html#fig_10_11) shows the x, y coordinates of a series of tiles.
    The screenshot was made with the Tiled Java version by enabling `View` ![images](images/U001.jpg)`Show
    Coordinates`, which is a feature that isn''t available yet in the Tiled Qt version.


    ![images](images/1011.jpg)


    **Figure 10–11.** *The coordinate system of an orthogonal tilemap*


    So as not to get confused, this is the line of code that calculates the tile coordinate''s
    x position:


    `pos.x = (int)(pos.x / tileMap.tileSize.width);`


    The `tileMap.tileSize` property is the size of the tiles in the tileset, which
    in this case is 32×32 (see also [Figure 10–6](#Chapter10.html#fig_10_6)). If the
    touch were at the 340 x position, the calculation would reveal the following:


    `340 / 32 = 10.625`


    That can''t be right, though. We''re looking for a tile''s x coordinate, which
    is never a fractional number! The reason is, of course, that the touch was somewhere
    inside the tile we''re looking for (that is, inside a 32×32 square area). The
    simple trick of casting the result to an int value will get rid of the fractional
    part and assign this to `pos.x`:


    `pos.x = (int)10.625        // pos.x == 10`


    Casting to an int will remove the fractional part. You can safely get rid of the
    fractional part because it''s simply not relevant—actually it''s harmful. If you
    didn''t cast away the fractional part but used the noninteger coordinate, in this
    example 10.625, to try to retrieve the tile at a tile coordinate 10.625, you''d
    receive a runtime error because there is only a tile at x coordinates 10 and 11,
    not at 10.625.


    A slightly more complicated calculation is used to get the tile''s y coordinate:


    `pos.y = (int)((tileMap.mapSize.height * tileMap.tileSize.height - pos.y) /`![images](images/U002.jpg)

    `     tileMap.tileSize.height);`


    Note that the parentheses are important to make sure that the division is done
    last. In actual numbers, this calculation may be easier to understand. As shown
    in [Figure 10–5](#Chapter10.html#fig_10_5), the `tileMap.mapSize` is 30×20 tiles,
    and as I mentioned earlier, `tileMap.tileSize` is 32×32 pixels. The calculation
    then looks like this:


    `pos.y = (int)((20 * 32 – 260) / 32)`


    Multiplying `tileMap.mapSize.height` with `tileMap.tileSize.height` returns the
    full height of the tilemap in pixels. This is necessary because the tilemap starts
    counting y coordinates from top to bottom, whereas screen y coordinates count
    from bottom to top. By calculating the bottommost y coordinate of the tilemap
    and subtracting the current y position 260 from that, you get the correct y position
    of the touch into the tilemap, in pixels. And because it is a pixel coordinate,
    you need to divide by the `tileSize.height` and then cast down to an `int` value
    to get the tile''s y coordinate.


    The `CCLOG` and `NSAssert` lines are helpful for seeing the results of the calculation
    in the Debugger Console window, as well as ensuring that tile coordinates never
    take on illegal values. It''s both a learning tool and an insurance policy.


    #### An Exercise in Optimization and Readability


    Since the tilemap''s size never changes, you can optimize the calculation a little
    to get the y tile coordinate by adding a member variable to the class''s `@interface`,
    which will be used to store the tilemap''s height in pixels:


    `float tileMapHeightInPixels;`


    You can then make the calculation to get the `tileMapHeightInPixels` just once
    in the `init` method, right after the tilemap is loaded:


    `CCTMXTiledMap* tileMap = [CCTMXTiledMap tiledMapWithTMXFile:@"orthogonal.tmx"];`

    `tileMapHeightInPixels = tileMap.mapSize.height * tileMap.tileSize.height;`


    Then you can rewrite the calculation, saving a multiplication every time you call
    the `tilePosFromLocation` method:


    `pos.y = (int)((tileMapHeightInPixels - pos.y) / tileMap.tileSize.height);`


    It may not win any awards for best optimization ever—it''s only a very tiny improvement
    in performance. But every bit counts, and it does make the calculation easier
    to read by taking away complexity and putting a readable variable name in its
    place.'
