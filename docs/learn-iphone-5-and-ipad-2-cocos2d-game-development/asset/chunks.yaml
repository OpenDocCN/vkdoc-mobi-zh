    {\n}\n@end\n```\n\n预处理定义`ARCH_OPTIMAL_PARTICLE_SYSTEM`代替了实际的类名，用于在编译期间确定该类应从哪个粒子系统进行子类化。cocos2d\
    \ 中的定义基于处理器架构，结果为`CCParticleSystemQuad`或`CCParticleSystemPoint`：\n\n```\n// 为每个架构构建最优粒子系统\n\
