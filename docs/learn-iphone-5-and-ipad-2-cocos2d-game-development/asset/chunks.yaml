- fmt: '### The Future of the `cocos2d-iphone` Project


    In May 2011, Zynga announced that it hired Ricardo Quesada and Rolando Abarca,
    key contributors to the `cocos2d-iphone` project.


    Zynga is the developer of the blockbuster social game Farmville. The iPhone version
    of Farmville was created with `cocos2d-iphone` and published in June 2010. It’s
    expected that Zynga plans to create more iOS games based on `cocos2d-iphone` now
    that Quesada and Abarca work for them.


    Quesada is the creator and lead developer of `cocos2d-iphone`. In fact, he has
    been running all aspects of `cocos2d-iphone` since 2008. He managed the web site,
    he fostered the community, and he is the driving force behind the development
    and success of the `cocos2d-iphone` project. Abarca is a contributor to the project,
    best known for his Ruby wrapper for `cocos2d-iphone`.


    Both developers relocated from Argentina and Chile, respectively, to work for
    Zynga in San Francisco. At the same time, their previous company, Sapus Media,
    has stopped selling their two flagship products, Sapus Tongue Source Code and
    Level SVG, after they had been bought by Zynga.


    This means Quesada and Abarca now get a regular paycheck and aren’t required to
    sell, support, and maintain their commercial products to make a living. On the
    other hand, they will now work primarily for Zynga, and time will have to tell
    how much of their work will actually find its way into the publicly available
    open source version of `cocos2d-iphone`. Currently Ricardo is working on `cocos2d
    2.0` which will use `OpenGL ES 2.0` exclusively.


    Although Zynga promises to advance the development of the `cocos2d-iphone` project
    and community, there is reason to doubt that the `cocos2d-iphone` project will
    continue to be developed at the same rate as in the past. Still, the community
    can help itself, and some of them have already started a project dubbed `cocos2d-iphone-extensions`,
    which provides additional functionality for the `cocos2d-iphone` game engine.


    I do not think we have to generally worry about the future of `cocos2d`. The `cocos2d-iphone`
    project has a strong community and has seen widespread adoption, and even though
    there are competing game engines, most of them are commercial and proprietary,
    not free and open source like `cocos2d-iphone`.


    ### Other `cocos2d` Game Engines


    You may have noticed that `cocos2d` ports exist for various platforms, including
    Windows, JavaScript, and Android. There’s even a C++ version of `cocos2d` dubbed
    `cocos2d-x` that supports multiple mobile platforms, including iOS and Android.


    These `cocos2d` ports all share the same name and design philosophy but are written
    in different languages by different authors and are generally quite different
    from `cocos2d` for iOS. For example, the Android `cocos2d` port is written in
    Java, which is the native language when developing for Android devices.


    If you’re interested in porting your games to other platforms, you should know
    that the various `cocos2d` game engines differ a lot. Porting your game to Android,
    for example, isn’t an easy task. First there’s the language barrier—all your Objective-C
    code must be rewritten in Java. When that’s done, you still need to make a lot
    of modifications to cope with numerous changes in the `cocos2d` API or possibly
    unsupported features of the port or the target platform. Finally, every port can
    have its own kind of bugs, and every platform has its own technical limitations
    and challenges.


    Overall, porting iOS games written with `cocos2d` to other platforms that also
    have a `cocos2d` game engine entails almost the same effort as rewriting the game
    for the target platform using some other game engine. This means there’s no switch
    you can flip and it’ll work. The similarity of the `cocos2d` engines across various
    platforms is mostly in name and philosophy. If cross-platform development is your
    goal, you should take a look at `cocos2d-x`, which has most of the features of
    `cocos2d-iphone` and is backed financially by China Unicom.


    In any case, you should still know about the most popular `cocos2d` game engines.
    [Table 1–1](#Chapter01.html#tab_1_1) lists the `cocos2d` game engines that are
    frequently updated and are stable enough for production use. I did not include
    `cocos2d` ports in this list that are significantly out of date and haven’t been
    updated for months, if not years.


    ![images](images/t0101.jpg)


    ### This Book Is for You


    I’d like to imagine you picked this book because its title caught your interest.
    I suppose you want to make 2D games for iPhone, iPod touch, and iPad, and the
    game engine of your choice is `cocos2d` for iOS. Or maybe you don’t care so much
    about the game engine but you do want to make 2D games for the iOS devices in
    general. Maybe you’re looking for some in-depth discussion on `cocos2d`, since
    you’ve been using it for a while already. Whatever your reasons for choosing this
    book, I’m sure you’ll get a lot out it.


    ### Prerequisites


    As with every programming book, there are some prerequisites that are nice to
    have and some that are almost mandatory.


    #### Programming Experience


    The only thing that’s mandatory for this book is some degree of programming experience,
    so let’s get that out of the way first. You should have an understanding of programming
    concepts such as loops, functions, classes, and so forth. If you have written
    a computer program before, preferably using an object-oriented programming language,
    you should be fine.


    Still with me? Good.


    #### Objective-C


    So, you do have programming experience, but maybe you’ve never written anything
    in that obscure language called `Objective-C`.


    You don’t need to know `Objective-C` for this book, but it definitely helps to
    know the language basics. If you are already familiar with at least one other
    object-oriented programming language, such as `C++`, `C#`, or `Java`, you may
    be able to pick it up as you go. But to be honest, I found it hard to do that
    myself even after roughly 15 years of programming experience with `C++`, `C#`,
    and various scripting languages. There are always those small, bothersome questions
    about tiny things you just don’t get right away, and they tend to steal your attention
    away. In that case, it’s handy to have a resource you can refer to whenever there’s
    something you need to understand about `Objective-C`.


    `Objective-C` may seem scary with its square brackets, and you may have picked
    up some horror stories about its memory management and how there’s no garbage
    collection on iOS devices. Worry not.


    First, `Objective-C` is just a different set of clothes. It looks unfamiliar,
    but the underlying programming concepts such as loops, classes, inheritance, and
    function calls still work in the same way as in other programming languages. The
    terminology might be different; for example, what `Objective-C` developers call
    *sending messages* is in essence the same as calling a method. As for memory management,
    let’s just say `cocos2d` makes it as easy for you as possible, and I’ll help you
    understand the very simple and basic rules you can follow.


    I had one invaluable `Objective-C` book to learn from, and I recommend it wholeheartedly
    as a companion book in case you want to learn more about `Objective-C` and `Xcode`.
    It’s called *Learn Objective-C on the Mac* by Mark Dalrymple and Scott Knaster,
    published by Apress.


    There is also Apple’s “Introduction to the Objective-C Programming Language,”
    which proved valuable as an online reference. It’s available here: [`http://developer.apple.com/mac/library/DOCUMENTATION/Cocoa/Conceptual/ObjectiveC/Introduction/introObjectiveC.html`](http://developer.apple.com/mac/library/DOCUMENTATION/Cocoa/Conceptual/ObjectiveC/Introduction/introObjectiveC.html).'
