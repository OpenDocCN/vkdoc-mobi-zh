  trans: '

    ### 绘制对象层矩形


    当你运行 `Tilemap03` 项目时，会注意到对象层矩形被绘制在瓦片地图上方，如图 10-12 所示。这并不是瓦片地图或对象层的标准功能。实际上，这些矩形是通过
    OpenGL ES 代码绘制的。每个 `CCNode` 都有一个 `–(void) draw` 方法，你可以覆写该方法来添加自定义的 OpenGL ES 代码。我经常使用这个方法来进行可视化的代码调试，例如绘制直线、圆形和矩形，这些图形可用于碰撞检测、距离测试等场景。在这里，能够直观地看到对象层区域的位置非常有用。将此类信息可视化，远比在调试器中查找和比较坐标要高效。我们的大脑更擅长处理视觉信息，而非比较和计算数字。请善加利用这一点！


    ![images](img/1012.jpg)


    **图 10-12.** *使用 OpenGL ES 代码在瓦片地图上显示的对象层矩形*


    `–(void) draw` 方法只需放在类中，它会在每一帧自动被调用。但是，应避免在 `draw` 方法中修改节点的属性，因为这可能会干扰节点的绘制。代码清单
    10-5 展示了 `TileMapLayer` 类的 `draw` 方法。


    **代码清单 10-5.** *绘制对象层矩形*


    ```

    -(void) draw

    {

        CCNode* node = [self getChildByTag:TileMapNode];

        NSAssert([node isKindOfClass:[CCTMXTiledMap class]], @"not a CCTMXTiledMap");

        CCTMXTiledMap* tileMap = (CCTMXTiledMap*)node;


        // 获取对象层

        CCTMXObjectGroup* objectLayer = [tileMap objectGroupNamed:@"ObjectLayer"];


        // 将线条宽度设为 3 像素

        glLineWidth(3.0f);

        glColor4f(1, 0, 1, 1);


        int numObjects = [[objectLayer objects] count];

        for (int i = 0; i < numObjects; i++)

        {

            NSDictionary* properties = [[objectLayer objects] objectAtIndex:i];

            CGRect rect = [self getRectFromObjectProperties:properties tileMap:tileMap];

            [self drawRect:rect];

        }


        glLineWidth(1.0f);

        glColor4f(1, 1, 1, 1);

    }

    ```


    首先，我通过标签获取瓦片地图，然后使用 `objectGroupNamed` 方法获取 `CCTMXObjectGroup`。接着，我使用 OpenGL ES
    方法 `glLineWidth` 将线条宽度设为 3 像素，并使用 `glColor4f` 将颜色设为紫色。这会影响随后所有用 OpenGL ES 绘制的线条的粗细和颜色——不仅限于当前方法，还可能影响其他使用
    OpenGL ES 代码进行绘制的节点（例如，cocos2d 的 `CCDrawingPrimitives.h` 头文件中定义的用于绘制直线、圆形和多边形的任何便捷方法）。这就是为什么我在完成绘制后要重置
    `glLineWidth` 和 `glColor4f`。在 OpenGL 代码中，保持良好的风格意味着将状态恢复为你最初发现它时的样子；否则，它可能会改变其他绘制代码的输出方式。OpenGL
    是一个状态机，因此你更改的每一个设置都会被记住，并可能影响后续的绘制方法。为避免这种情况，你应该在完成绘制后，将任何更改过的 OpenGL 设置恢复到安全的默认值。


    **注意：** `-(void) draw` 方法内的代码始终以 z 轴顺序 0 进行绘制。它也会在所有 z 轴顺序为 0 的其他节点之前绘制。这意味着，如果其他节点也处于
    z 轴顺序 0，它们会覆盖掉任何 OpenGL ES 绘制的代码。就对象层 `draw` 代码而言，我必须将 `tileMap` 的 z 轴顺序设为 -1，这样矩形才能显示在瓦片地图的上方。


    和之前一样，我遍历所有对象层的对象，从 `NSDictionary` 中获取它们的属性，从而得到该对象的 `CGRect`，然后将其传递给 `drawRect`
    方法。遗憾的是，cocos2d 省略了这个特定的便捷方法，但使用 `ccDrawLine` 来添加它很容易，如代码清单 10-6 所示。


    **代码清单 10-6.** *绘制矩形*


    ```

    -(void) drawRect:(CGRect)rect

    {

        // 使用四条直线绘制矩形

        CGPoint pos1, pos2, pos3, pos4;

        pos1 = CGPointMake(rect.origin.x, rect.origin.y);

        pos2 = CGPointMake(rect.origin.x, rect.origin.y + rect.size.height);

        pos3 = CGPointMake(rect.origin.x + rect.size.width,

            rect.origin.y + rect.size.height);

        pos4 = CGPointMake(rect.origin.x + rect.size.width, rect.origin.y);


        ccDrawLine(pos1, pos2);

        ccDrawLine(pos2, pos3);

        ccDrawLine(pos3, pos4);

        ccDrawLine(pos4, pos1);

    }

    ```


    为矩形的每个角创建一个 `CGPoint`，然后在四个 `ccDrawLine` 方法中使用这些点来绘制矩形各角之间的连线。你可能会想记住这个方法并将其放在一个安全的地方，因为你可能以后还会用到它。


    请注意，`draw` 和 `drawRect` 方法被包裹在 `#ifdef DEBUG` 和 `#endif` 语句中。这意味着在发布版本中，对象层矩形将不会被绘制，因为我仅将其用于调试和演示目的——最终用户绝不应看到它们。


    ```

    #ifdef DEBUG

    -(void) drawRect:(CGRect)rect

    {

        ...

    }


    -(void) draw

    {

        ...

    }

    #endif

    ```

    '
- fmt: "#### Scrolling the Tilemap\n\nThe best part comes last: scrolling. It's actually\
    \ straightforward because only the `CCTMXTiledMap` needs to be moved. In the Tilemap04\
    \ project, I've added the call to the `centerTileMapOnTileCoord` method in `ccTouchesBegan`\
    \ right after obtaining the tile coordinates of the touch:\n\n```\n-(void) ccTouchesBegan:(NSSet\
    \ *)touches withEvent:(UIEvent *)event\n{\n    ...\n    // Get the position in\
    \ tile coordinates from the touch location\n    CGPoint touchLocation = [self\
    \ locationFromTouches:touches];\n    CGPoint tilePos = [self tilePosFromLocation:touchLocation\
    \ tileMap:tileMap];\n\n    // Move tilemap so that the touched tile is at the\
    \ center of the screen\n    [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
    \    ...\n}\n```\n\n[Listing 10–7](#Chapter10.html#list_10_7) shows the `centerTileMapOnTileCoord`\
    \ method, which moves the tilemap so that the touched tile is at the center of\
    \ the screen. It also stops the tilemap from scrolling further if any tilemap\
    \ border already aligns with the screen edge.\n\n**Listing 10–7.** *Centering\
    \ the Tilemap on a Tile Coordinate*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // Center tilemap on the given tile\
    \ pos\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    CGPoint\
    \ screenCenter = CGPointMake(screenSize.width * 0.5f,\n        screenSize.height\
    \ * 0.5f);\n\n    // Tile coordinates are counted from upper-left corner\n   \
    \ tilePos.y = (tileMap.mapSize.height - 1) - tilePos.y;\n\n    // Point is now\
    \ at lower-left corner of the screen\n    CGPoint scrollPosition = CGPointMake(-(tilePos.x\
    \ * tileMap.tileSize.width),\n        -(tilePos.y * tileMap.tileSize.height));\n\
    \n    // Offset point to center of screen and center of tile\n    scrollPosition.x\
    \ += screenCenter.x - tileMap.tileSize.width * 0.5f;\n    scrollPosition.y +=\
    \ screenCenter.y - tileMap.tileSize.height * 0.5f;\n\n    // Make sure tilemap\
    \ scrolling stops at the tilemap borders\n    scrollPosition.x = MIN(scrollPosition.x,\
    \ 0);\n    scrollPosition.x = MAX(scrollPosition.x, -screenSize.width);\n    scrollPosition.y\
    \ = MIN(scrollPosition.y, 0);\n    scrollPosition.y = MAX(scrollPosition.y, -screenSize.height);\n\
    \n    CCAction* move = [CCMoveTo actionWithDuration:0.2f position: scrollPosition];\n\
    \    [tileMap stopAllActions];\n    [tileMap runAction:move];\n}\n```\n\nAfter\
    \ obtaining the center position of the screen, I modify the `tilePos` y coordinate\
    \ because tilemap coordinates are counted from top to bottom (see [Figure 10–11](#Chapter10.html#fig_10_11)),\
    \ while screen coordinates increase from bottom up. In effect, I convert the `tilePos`\
    \ y coordinate as if it were counted from bottom up. In addition, I subtract 1\
    \ from the map's height to account for the fact that tile coordinates are counted\
    \ from 0. In other words, if the map's height were 10, only the tile coordinates\
    \ 0 to 9 would be valid.\n\nNext, the `scrollPosition` `CGPoint` is created, which\
    \ will become the position the tilemap will be moved to. The first step is to\
    \ multiply the tile coordinates with the tilemap's `tileSize`. You may be wondering\
    \ why I negate the `tilePosInPixels` coordinates. It's simply because if I want\
    \ the tiles to move from top right to bottom left, I have to move the tilemap\
    \ down and to the left by decreasing the coordinates.\n\nThe next big block modifies\
    \ the coordinates of the `scrollPosition` to center the tile on the screen's center\
    \ point. You also need to take into account the center of the tile itself, which\
    \ is why half the `tileSize` is deducted from the `screenCenter` offset.\n\nBy\
    \ using the Objective-C language's `MIN` and `MAX` macros, it is ensured that\
    \ the `scrollPosition` is kept within the bounds of the tilemap, so as to not\
    \ reveal anything past the borders of the tilemap. `MIN` and `MAX` return the\
    \ minimum and maximum values of their two parameters, respectively, and are a\
    \ more compact and readable solution than conditional assignments using `if` and\
    \ `else` statements.\n\nFinally, a `CCMoveTo` action is used to scroll the tilemap\
    \ node so that the touched tile is centered on the screen. The result is a tilemap\
    \ that scrolls to the tile that you tap. You can use the same method to scroll\
    \ to a tile of interest—for example, the player's position.\n\n**TIP:** As for\
    \ the player character itself, you'll find an implementation in the next chapter\
    \ about isometric tilemaps. You can apply the same principle to orthogonal tilemaps.\
    \ And this Cocos2D forum thread will get you started with pathfinding on orthogonal\
    \ tilemaps, source code included: [`www.cocos2d-iphone.org/forum/topic/19463`](http://www.cocos2d-iphone.org/forum/topic/19463).\n\
    \nIf you're interested in a complete, working, and ready-made solution for a hack-and-slash\
