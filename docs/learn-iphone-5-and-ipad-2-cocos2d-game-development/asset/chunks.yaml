- fmt: '# iCloud


    With iOS 5 Apple introduced iCloud, its cloud-based storage solution for storing
    documents and simple key-value data on the cloud. What cloud? Well, obviously
    not that white, fluffy stuff floating way above your head. Cloud storage simply
    means storing data on a remote server, and the *cloud* part refers to the fact
    that you don’t know exactly which server your data is stored on, or how. You just
    send data to the cloud, and the cloud server stores it. The next time you want
    your data back, the cloud server finds it for you and delivers it back to you.


    Cloud storage allows game developers to store savegames in the cloud so that the
    game’s progress isn’t locked into a particular device and app. If your app is
    available for both iOS and Mac OS, you could store savegames on the cloud and
    the user can continue where he left off on both versions and on any of his devices
    and computers.


    Or you could save the persistent world of your Mac OS massively multiplayer game
    to the cloud, and the iPhone app could allow the user to change the player’s inventory,
    sell items on the auction house, and do all the other chores while he’s on the
    road.


    You can learn more about iCloud here: [`http://developer.apple.com/icloud`](http://developer.apple.com/icloud).


    # Earning More Revenue


    Don’t we all want to make more money? With apps, you can do so by displaying ads
    or by selling in-game content via In App Purchases. Both are powerful tools in
    particular for free apps, because apps that cost nothing get on average about
    ten times more downloads than if the same app would cost $.99.


    ## Ads and Analytics


    Advertisements provide a way to generate additional revenue from apps and games.
    It can be very lucrative if the app is very popular, but frankly speaking, it’s
    also easy to put off users by displaying ads, and it’s much more likely to make
    little to no money. It’s still worth experimenting with advertisements—for example,
    if you use them as a motivator in free versions of your app by letting your users
    know that the full version removes the ads—besides offering all the other cool
    features the players want, of course.


    Regardless of whether you dislike ads, there’s another reason to evaluate the
    ad space. That’s because most advertising SDKs can also provide you with insightful
    metrics and analytics. This not only includes statistical data such as which iOS
    version your users have installed and which device they’re using but also includes
    custom metrics, such as which game mode is played most often and where players
    tend to fail more frequently. This allows you to tweak the difficulty and the
    user interface layout according to how the users are actually using your app and
    to plan upgrades and your marketing strategy.


    - **iAd** by Apple is the first contender when it comes to advertising on iOS
    devices. You can get an overview of the iAd Network on Apple’s advertising web
    site: [`http://advertising.apple.com`](http://advertising.apple.com).

    - **AdMob for App Developers** is also a very popular ad platform among game developers.
    You can learn more about the iOS version of AdMob at [`www.admob.com/appdevs`](http://www.admob.com/appdevs),
    while the Mobile Analytics product is hosted on this web site: [`http://analytics.admob.com`](http://analytics.admob.com).
    AdMob also offers AdWhirl ([`www.adwhirl.com`](http://www.adwhirl.com)), which
    allows you to display ads from a variety of ad providers.

    - **Flurry Analytics** is the only product that focuses solely on metrics and
    analytics. Note that Flurry bought Pinch Media, and its products have merged into
    Flurry Analytics, in case you’re wondering why I’m not mentioning the very popular
    Pinch Analytics. Begin your research into Flurry Analytics here: [`www.flurry.com/product/analytics/index.html`](http://www.flurry.com/product/analytics/index.html).


    ## In App Purchases


    Even if you sell your app, you could publish a free (lite) version of your app
    that uses In App Purchase to unlock the full version while the user is running
    the app. For you it can be as little as setting a `BOOL` variable to `YES` after
    the purchase was made, but for the user it’s so much more convenient not having
    to go through the App Store to make the purchase. I have no data on this, but
    you can expect a significant percentage of users won’t make the purchase simply
    because it means quitting your app, waiting for the App Store to load, entering
    their password, and then waiting for the download to finish.


    To get acquainted with In App Purchases, you can (and should) read Apple’s extensive
    and detailed In App Purchase Programming Guide: [`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/StoreKitGuide/Introduction/Introduction.html).


    But then again, you might want to get started as quickly as possible and learn
    as you go. With a technology as complex and involving as In App Purchases, it
    can be quite frustrating, but Ray Wenderlich’s tutorial will help you get up on
    your feet: [`www.raywenderlich.com/2797/introduction-to-in-app-purchases`](http://www.raywenderlich.com/2797/introduction-to-in-app-purchases).


    Since Apple is constantly improving their technology, some of the information
    in the tutorial may no longer apply. In such a case, it is very helpful to study
    the Technical Note TN2259: Adding In App Purchase to your iOS and Mac Applications:
    [`http://developer.apple.com/library/ios/#technotes/tn2259/_index.html`](http://developer.apple.com/library/ios/#technotes/tn2259/_index.html).
    This is a relatively short guide that helps you overcome the typical hurdles of
    implementing In App Purchases, including links to set up your contracts, tax and
    banking information, and a frequently asked questions list.


    # Summary


    I hope you enjoyed learning about some of the surrounding technologies and resources
    that may be useful for creating your game and becoming a successful game developer,
    including where to get help and where to find royalty-free game art and audio.


    As mentioned in this chapter, marketing and public relations will definitely need
    to be on your table if you want to actually earn a living from making games. I’ve
    only scratched the surface of those here, but it should help you get started.


    Finally, remember to buy and use other cocos2d games in order to learn from them.
    As a game developer, you need to be constantly playing new games to feed your
    creativity with new ideas, and you also need to learn what players are saying
    about other developers’ games. Improving your knowledge of how games are made
    is just as important—purchasing one or several commercial cocos2d source code
    projects is certainly going to be a wise investment. In particular, if you want
    to support the development of Kobold2D, I recommend you look at the offerings
    on the Kobold2D Store: [`www.kobold2d.com/display/KKSITE/Kobold2D+Store`](http://www.kobold2d.com/display/KKSITE/Kobold2D+Store).


    This book ends here, but your journey has just begun. I’m sure you’ll still have
    lots of questions, and for that reason I’ve launched a community web site Cocos2D
    Central on [`http://cocos2d-central.com`](http://cocos2d-central.com). Feel free
    to stop by and ask me anything about cocos2d, the book, my game kits, marketing,
    publishers, Xcode, Objective-C, or anything else related to game development.
    I will continue to blog about cocos2d on the book’s [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com)
    web site, and I’m looking forward to hearing from you.


    I hope you have enjoyed reading this book as much as I did writing it. Thank you
    for reading it!


    # Index'
