  trans: "\n# 配置 Xcode 项目\n\n现在你要做的第一件事，就是在 iTunes Connect 中输入你为应用设置的`Bundle ID`。请记住，虽然我在示例项目中使用了`com.learn-cocos2d`作为`Bundle\
    \ ID`，但你不能使用相同的 ID，因为它已经被占用了，而且`Bundle ID`必须是唯一的。\n\n找到项目`Resources`文件夹中的`Info.plist`文件并选中它。然后你就可以在属性列表编辑器中编辑它，如图\
    \ 14–1 所示。你需要将`Bundle identifier`键的值设置为与应用`Bundle ID`相同的值。在我的例子中是`com.learn-cocos2d`，在你的例子中则是你为应用`Bundle\
    \ ID`选择的任意字符串。\n\n![images](img/1401.jpg)\n\n**图 14–1.** *`Bundle identifier`键必须与你应用的`Bundle\
    \ ID`匹配。*\n\n实际上，使用 Game Kit（以及相关的 Game Center）有两种方式。一种是将其设为必需，这意味着你的应用只能在支持 Game\
    \ Center 且运行 iOS 4.1 或更高版本的设备上运行。不过，对于我写的示例，我没有将 Game Center 设为必需，因为检查 Game Center\
    \ 是否可用相对容易，如果不可用就不使用它。这样你的游戏就可以在较旧的设备上运行，只是没有 Game Center 的所有功能。\n\n但如果你确实想要要求\
    \ Game Kit 和 Game Center 必须存在，可以在应用的`Info.plist`的`UIRequiredDeviceCapabilities`列表中设置。通过添加另一个名为`gamekit`的键，将其布尔值设为选中状态，如图\
    \ 14–2 所示，就可以告诉 iTunes 和潜在用户，你的应用需要使用 Game Kit，因此需要 iOS 4.1 或更高版本。\n\n你可以阅读苹果的《构建时配置文档》来了解更多关于\
    \ iTunes 要求和`UIRequiredDeviceCapabilities`键的信息：[`http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/BuildTimeConfiguration/BuildTimeConfiguration.html`](http://developer.apple.com/library/ios/#documentation/iPhone/Conceptual/iPhoneOSProgrammingGuide/BuildTimeConfiguration/BuildTimeConfiguration.html)。\n\
    \n**注意：** 如果你添加了`gamekit`键，但后来决定不将 Game Kit 设为必需，请务必移除`gamekit`条目。如果只是取消选中`gamekit`复选框，实际上会告诉\
    \ iTunes，你的应用在支持 Game Center 的设备上不可用。这恰恰与你的预期相反。要真正将 Game Kit 设为可选需求，你必须完全删除`gamekit`条目。\n\
    \n![images](img/1402.jpg)\n\n**图 14–2.** *将 Game Kit 设为严格必需条件*\n\n接下来，你需要将 Game\
    \ Kit 框架添加到你的 Xcode 项目中——更具体地说，是添加到项目中你想要的目标应用（如果你有多个目标的话）。在项目导航器中选中根条目（即项目本身，在本例中标记为`Tilemap`）。然后选择相应的目标，切换到`Build\
    \ Phases`标签页。展开`Link Binary With Libraries`部分，查看该目标当前链接的库列表。列表下方有两个 + 和 - 按钮，你可以用它们添加或删除库。\n\
    \n要添加另一个库，点击`+`按钮。你会看到另一个列表弹出，如图 14–3 所示。找到`GameKit.framework`条目，然后点击`Add`按钮。由于有很多库可供选择，而且它们并不总是按字母顺序排列的，因此在列表上方的文本框中输入*GameKit*来过滤列表会很有帮助。\n\
    \n点击`Add`按钮后，`GameKit.framework`会添加到`Linked Libraries`列表中。默认情况下，新添加的库被设为`Required`，这显示在每个库的右侧。`Required`设置意味着你的应用只能在那些`GameKit.framework`库可用的设备上运行。如果这正是你想要的，并且你已经在`Info.plist`中添加了`gamekit`键，那么可以保持这个设置。否则，请将设置更改为`Optional`，以便你的应用甚至可以在没有\
    \ Game Center 的设备上运行。我们可以通过代码中相对简单的检查（稍后在列表 14–3 中讨论）来处理这种情况，然后在设备不支持 Game Kit\
    \ 时禁用任何 Game Kit 功能。\n\n![images](img/1403.jpg)\n\n**图 14–3.** *添加`GameKit.framework`*\n\
    \n最后，你希望`GameKit.h`头文件在你的项目的所有源文件中可用。不必将其添加到每一个源文件中，而是应该将其添加到项目的`Prefix.pch`文件中。这是预编译头文件，包含来自外部框架的头文件，以便让项目编译得更快。但它还有一个额外的好处：添加到前缀头文件中的每个头文件，其定义都会对当前项目中的每个源代码文件可用。\n\
    \n前缀头文件的文件名总是以项目名称开头。例如，在 tilemap 项目中，文件名是`Tilemap_Prefix.pch`，并且该文件可以在`Other\
    \ Sources`组中找到。打开你项目中的该文件，并将 GameKit 头文件添加到其中，如列表 14–1 所示。\n\n**列表 14–1.** *将\
    \ GameKit 头文件添加到你的项目前缀头文件*\n\n```\n#ifdef __OBJC__\n    #import <Foundation/Foundation.h>\n\
    \    #import <UIKit/UIKit.h>\n#import <GameKit/GameKit.h>\n#endif\n```\n\n就是这样——你的应用现在已准备好使用\
    \ Game Center 了。\n\n# Game Center 设置总结\n\n总结一下，为你的应用启用 Game Center 需要以下步骤：\n\n\
    1.  在 iTunes Connect 中创建一个新应用：\n    1.  为新应用指定一个`Bundle ID`。\n    2.  为此应用启用 Game\
    \ Center。\n2.  在 iTunes Connect 中设置初始排行榜和成就：\n    1.  记下排行榜分类 ID 和成就 ID。（注意，你很可能在游戏开发过程中继续编辑和添加排行榜和成就。）\n\
    3.  创建或升级 Xcode 项目：\n    1.  确保至少使用 cocos2d v0.99.5 版本。\n4.  编辑`Info.plist`：\n\
    \    1.  在`Bundle identifier`字段中输入应用的`Bundle ID`。\n    2.  （可选）通过在`UIRequiredDeviceCapabilities`列表中添加一个值为布尔型的`gamekit`键来将\
    \ Game Kit 设为必需。\n5.  添加必要的 Game Kit 引用：\n    1.  为每个目标添加`GameKit.framework`链接库。如果\
    \ Game Kit 支持是可选的，将其`Type`设置从`Required`改为`Weak`。\n    2.  将`#import <GameKit/GameKit.h>`添加到项目的前缀头文件中。\n\
    \n在继续之前，请确保你已经完成了每一步。你随时可以返回并做必要的修改。但是，如果你一开始没有完成所有这些步骤，很可能会遇到错误或某些功能无法工作，而相关的错误信息并不一定会直接指出你在这些步骤中的错误或疏忽。\n\
    \nGame Center 无法正常工作的常见原因是：项目`Info.plist`文件中的`Bundle ID`与你在 iTunes Connect 中为应用设置的`Bundle\
    \ ID`不匹配。\n"
- fmt: "### Game Kit Programming\n\nBefore I get into programming Game Center with\
    \ the Game Kit API, I'd like to mention the two important resources on Apple's\
    \ developer web site.\n\nThere is the `Game Kit Programming Guide`, which provides\
    \ a high-level, task-based overview of Game Kit and Game Center concepts: [`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html).\n\
    \nFor in-depth detailed information about the Game Center classes and protocols,\
    \ you can refer to the `Game Kit Framework Reference`: [`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html).\n\
    \n#### The `GameKitHelper` Delegate\n\nI mentioned earlier in this chapter that\
    \ I will use a `GameKitHelper` class to provide easier access to Game Kit and\
    \ Game Center features. Since connecting to an online server causes responses\
    \ to be delayed by several milliseconds, if not seconds, it's a good idea to have\
    \ a central class manage all Game Center–related features. All the Game Center\
    \ examples are based on the isometric game developed in [Chapter 11](#Chapter11.html#ch11).\
    \ You'll find the following example code in the `Tilemap11` project.\n\nOne of\
    \ your game's classes can then use this functionality and register itself as a\
    \ `GameKitHelper` delegate to get notified of events as they occur. To do that,\
    \ the delegate must implement the `GameKitHelper@protocol` that is defined in\
    \ the `GameKitHelper.h` header file ([Listing 14–2](#Chapter14.html#list_14_2)).\
    \ Only classes implementing this protocol can be assigned to the `GameKitHelperdelegate`\
    \ property to receive the protocol messages. The protocol is simply a list of\
    \ method definitions that a class using the protocol must implement. If any of\
    \ the methods in the protocol aren't implemented, the compiler will let you know\
    \ about that.\n\n**Listing 14–2.** *The `GameKitHelper` Header File*\n\n```\n\
    #import \"cocos2d.h\"\n#import <GameKit/GameKit.h>\n\n@protocol GameKitHelperProtocol\n\
    -(void) onLocalPlayerAuthenticationChanged;\n-(void) onFriendListReceived:(NSArray*)friends;\n\
    -(void) onPlayerInfoReceived:(NSArray*)players;\n@end\n\n@interface GameKitHelper\
    \ : NSObject\n{\n    id<GameKitHelperProtocol> delegate;\n    bool isGameCenterAvailable;\n\
    \    NSError* lastError;\n}\n\n@property (nonatomic, retain) id<GameKitHelperProtocol>\
    \ delegate;\n@property (nonatomic, readonly) bool isGameCenterAvailable;\n@property\
    \ (nonatomic, readonly) NSError* lastError;\n\n+(GameKitHelper*) sharedGameKitHelper;\n\
    \n// Player authentication, info\n-(void) authenticateLocalPlayer;\n-(void) getLocalPlayerFriends;\n\
    -(void) getPlayerInfo:(NSArray*)players;\n@end\n```\n\nFor your convenience, the\
    \ `GameKitHelper` class also stores the last error in its `lastError` property.\
    \ This allows you to check whether any error occurred and, if so, what kind of\
    \ error, without actually receiving the Game Center messages directly. The `GameKitHelper`\
    \ class is a singleton, which was described in [Chapter 3](#Chapter03.html#ch3),\
    \ so I'll leave the singleton-specific code out of the discussion.\n\nThe remaining\
    \ properties and methods will be discussed shortly. For now, let's take a look\
    \ at how the `TileMapLayer` class is extended so that it can function as the delegate\
    \ for `GameKitHelper`. The essential changes to the header file are importing\
    \ `GameKitHelper.h` and specifying that `TileMapLayer` implements `GameKitHelperProtocol`:\n\
    \n```\n#import \"GameKitHelper.h\"\n\n@interface TileMapLayer : CCLayer <GameKitHelperProtocol>\n\
    {\n    …\n}\n```\n\nThen you can set the `TileMapLayer` class to be the delegate\
    \ of the `GameKitHelper` class, in the `init` method:\n\n```\nGameKitHelper* gkHelper\
    \ = [GameKitHelper sharedGameKitHelper];\ngkHelper.delegate = self;\n[gkHelper\
    \ authenticateLocalPlayer];\n```\n\nNote that you are responsible for setting\
    \ the `GameKitHelper` delegate back to `nil` when appropriate—for example, shortly\
    \ before changing scenes. Because `GameKitHelper` retains the delegate, it will\
    \ not be released from memory, even if it otherwise would (for example, during\
    \ a scene change). That would not only keep the delegate itself in memory but\
    \ all of its member variables as well, including all of its children if it's a\
    \ `CCNode` class.\n\n#### Checking for Game Center Availability\n\nThe `GameKitHelper`\
    \ class starts by checking for Game Center availability right in its `init` method\
    \ ([Listing 14–3](#Chapter14.html#list_14_3)). It needs to do that only once because\
    \ the conditions never change while the app is running.\n\n**Listing 14–3.** *Testing\
    \ for Game Center Availability*\n\n```\n// Test for Game Center availability\n\
    Class gameKitLocalPlayerClass = NSClassFromString(@\"GKLocalPlayer\");\nbool isLocalPlayerAvailable\
    \ = (gameKitLocalPlayerClass != nil);\n\n// Test if device is running iOS 4.1\
    \ or higher\nNSString* reqSysVer = @\"4.1\";\nNSString* currSysVer = [[UIDevice\
    \ currentDevice] systemVersion];\nbool isOSVer41 = ([currSysVer compare:reqSysVer\n\
    \    options:NSNumericSearch] != NSOrderedAscending);\n\nisGameCenterAvailable\
    \ = (isLocalPlayerAvailable && isOSVer41);\n```\n\nThe first test is simply to\
    \ check whether a specific Game Center class is available. In this case, the Objective-C\
    \ runtime method `NSClassFromString` is used to get one of the Game Center classes\
    \ by name. If this call returns `nil`, you can be certain that Game Center is\
    \ unavailable.\n\nBut it's not quite that simple. Because Game Center was already\
    \ partially available in beta versions prior to iOS 4.1, you also need to check\
    \ whether the device is running at least iOS 4.1. This is done by comparing the\
    \ `reqSysVer` string with the `systemVersion` string.\n\nOnce both checks are\
    \ made, the results are combined using the `&&` (and) operator, so that both must\
    \ be true for `isGameCenterAvailable` to become true. The `isGameCenterAvailable`\
    \ variable is used to safeguard all calls to Game Center functionality within\
    \ the `GameKitHelper` class. This avoids accidentally calling Game Center functionality\
    \ when it is not available, which would crash the application.\n\nNote that this\
    \ is how Apple recommends to check for Game Center availability. You should not\
    \ try any other methods—for example, determining the type of device your game\
    \ is running on. While certain devices are excluded from using Game Center, this\
    \ is already accounted for with the preceding check."
  raw: '### Game Kit Programming


    Before I get into programming Game Center with the Game Kit API, I''d like to
    mention the two important resources on Apple''s developer web site.


    There is the Game Kit Programming Guide, which provides a high-level, task-based
    overview of Game Kit and Game Center concepts: [`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html).


    For in-depth detailed information about the Game Center classes and protocols,
    you can refer to the Game Kit Framework Reference: [`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html).


    #### The GameKitHelper Delegate


    I mentioned earlier in this chapter that I will use a `GameKitHelper` class to
    provide easier access to Game Kit and Game Center features. Since connecting to
    an online server causes responses to be delayed by several milliseconds, if not
    seconds, it''s a good idea to have a central class manage all Game Center–related
    features. All the Game Center examples are based on the isometric game developed
    in [Chapter 11](#Chapter11.html#ch11). You''ll find the following example code
    in the Tilemap11 project.


    One of your game''s classes can then use this functionality and register itself
    as a `GameKitHelper` delegate to get notified of events as they occur. To do that,
    the delegate must implement the `GameKitHelper@protocol` that is defined in the
    GameKitHelper.h header file ([Listing 14–2](#Chapter14.html#list_14_2)). Only
    classes implementing this protocol can be assigned to the `GameKitHelperdelegate`
    property to receive the protocol messages. The protocol is simply a list of method
    definitions that a class using the protocol must implement. If any of the methods
    in the protocol aren''t implemented, the compiler will let you know about that.


    **Listing 14–2.** *The GameKitHelper Header File*


    `#import "cocos2d.h"`

    `#import <GameKit/GameKit.h>`


    `@protocol GameKitHelperProtocol`

    `-(void) onLocalPlayerAuthenticationChanged;`

    `-(void) onFriendListReceived:(NSArray*)friends;`

    `-(void) onPlayerInfoReceived:(NSArray*)players;`

    `@end`


    `@interface GameKitHelper : NSObject`

    `{`

    `    id<GameKitHelperProtocol> delegate;`

    `    bool isGameCenterAvailable;`

    `    NSError* lastError;`

    `}`


    `@property (nonatomic, retain) id<GameKitHelperProtocol> delegate;`

    `@property (nonatomic, readonly) bool isGameCenterAvailable;`

    `@property (nonatomic, readonly) NSError* lastError;`


    `+(GameKitHelper*) sharedGameKitHelper;`


    `// Player authentication, info`

    `-(void) authenticateLocalPlayer;`

    `-(void) getLocalPlayerFriends;`

    `-(void) getPlayerInfo:(NSArray*)players;`

    `@end`


    For your convenience, the `GameKitHelper` class also stores the last error in
    its `lastError` property. This allows you to check whether any error occurred
    and, if so, what kind of error, without actually receiving the Game Center messages
    directly. The `GameKitHelper` class is a singleton, which was described in [Chapter
    3](#Chapter03.html#ch3), so I''ll leave the singleton-specific code out of the
    discussion.


    The remaining properties and methods will be discussed shortly. For now, let''s
    take a look at how the `TileMapLayer` class is extended so that it can function
    as the delegate for `GameKitHelper`. The essential changes to the header file
    are importing GameKitHelper.h and specifying that `TileMapLayer` implements `GameKitHelperProtocol`:


    `#import "GameKitHelper.h"`


    `@interface TileMapLayer : CCLayer <GameKitHelperProtocol>`

    `{`

    `    …`

    `}`


    Then you can set the `TileMapLayer` class to be the delegate of the `GameKitHelper`
    class, in the `init` method:


    `GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `gkHelper.delegate = self;`

    `[gkHelper authenticateLocalPlayer];`


    Note that you are responsible for setting the `GameKitHelper` delegate back to
    `nil` when appropriate—for example, shortly before changing scenes. Because `GameKitHelper`
    retains the delegate, it will not be released from memory, even if it otherwise
    would (for example, during a scene change). That would not only keep the delegate
    itself in memory but all of its member variables as well, including all of its
    children if it''s a `CCNode` class.


    #### Checking for Game Center Availability


    The `GameKitHelper` class starts by checking for Game Center availability right
    in its `init` method ([Listing 14–3](#Chapter14.html#list_14_3)). It needs to
    do that only once because the conditions never change while the app is running.


    **Listing 14–3.** *Testing for Game Center Availability*


    `// Test for Game Center availability`

    `Class gameKitLocalPlayerClass = NSClassFromString(@"GKLocalPlayer");`

    `bool isLocalPlayerAvailable = (gameKitLocalPlayerClass != nil);`


    `// Test if device is running iOS 4.1 or higher`

    `NSString* reqSysVer = @"4.1";`

    `NSString* currSysVer = [[UIDevice currentDevice] systemVersion];`

    `bool isOSVer41 = ([currSysVer compare:reqSysVer`![images](images/U002.jpg)

    `    options:NSNumericSearch] != NSOrderedAscending);`


    `isGameCenterAvailable = (isLocalPlayerAvailable && isOSVer41);`


    The first test is simply to check whether a specific Game Center class is available.
    In this case, the Objective-C runtime method `NSClassFromString` is used to get
    one of the Game Center classes by name. If this call returns `nil`, you can be
    certain that Game Center is unavailable.


    But it''s not quite that simple. Because Game Center was already partially available
    in beta versions prior to iOS 4.1, you also need to check whether the device is
    running at least iOS 4.1\. This is done by comparing the `reqSysVer` string with
    the `systemVersion` string.


    Once both checks are made, the results are combined using the `&&` (and) operator,
    so that both must be true for `isGameCenterAvailable` to become true. The `isGameCenterAvailable`
    variable is used to safeguard all calls to Game Center functionality within the
    `GameKitHelper` class. This avoids accidentally calling Game Center functionality
    when it is not available, which would crash the application.


    Note that this is how Apple recommends to check for Game Center availability.
    You should not try any other methods—for example, determining the type of device
    your game is running on. While certain devices are excluded from using Game Center,
    this is already accounted for with the preceding check.'
  trans: "\n### 游戏套件编程\n\n在开始使用 Game Kit API 进行 Game Center 编程之前，我想先提一下苹果开发者网站上的两个重要资源。\n\
    \n有一份`Game Kit 编程指南`，它提供了基于任务的高层次概述，涵盖 Game Kit 和 Game Center 的概念：[`http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html`](http://developer.apple.com/library/ios/#documentation/NetworkingInternet/Conceptual/GameKit_Guide/Introduction/Introduction.html)。\n\
    \n关于 Game Center 类和协议的详细深入信息，你可以查阅`Game Kit 框架参考`：[`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_Collection/_index.html)。\n\
    \n#### `GameKitHelper` 委托\n\n本章前面我提到过，将使用一个`GameKitHelper`类来更方便地访问 Game Kit 和\
    \ Game Center 功能。由于连接到在线服务器会导致响应延迟若干毫秒甚至秒级，因此最好有一个中心类来管理所有与 Game Center 相关的功能。所有\
    \ Game Center 示例都基于第 11 章中开发的等距游戏。你可以在`Tilemap11`项目中找到以下示例代码。\n\n游戏中的某个类可以利用此功能，并将自身注册为`GameKitHelper`的委托对象，以便在事件发生时接收通知。为此，委托必须实现`GameKitHelper.h`头文件中定义的`GameKitHelper@protocol`协议（列表\
    \ 14–2）。只有实现此协议的类才能被赋值给`GameKitHelperdelegate`属性来接收协议消息。该协议本质上是一个方法定义列表，使用该协议的类必须实现这些方法。如果协议中的任何方法未被实现，编译器会提示你。\n\
    \n**列表 14–2.** *`GameKitHelper` 头文件*\n\n```\n#import \"cocos2d.h\"\n#import <GameKit/GameKit.h>\n\
    \n@protocol GameKitHelperProtocol\n-(void) onLocalPlayerAuthenticationChanged;\n\
    -(void) onFriendListReceived:(NSArray*)friends;\n-(void) onPlayerInfoReceived:(NSArray*)players;\n\
    @end\n\n@interface GameKitHelper : NSObject\n{\n    id<GameKitHelperProtocol>\
    \ delegate;\n    bool isGameCenterAvailable;\n    NSError* lastError;\n}\n\n@property\
    \ (nonatomic, retain) id<GameKitHelperProtocol> delegate;\n@property (nonatomic,\
    \ readonly) bool isGameCenterAvailable;\n@property (nonatomic, readonly) NSError*\
    \ lastError;\n\n+(GameKitHelper*) sharedGameKitHelper;\n\n// 玩家认证、信息\n-(void)\
    \ authenticateLocalPlayer;\n-(void) getLocalPlayerFriends;\n-(void) getPlayerInfo:(NSArray*)players;\n\
    @end\n```\n\n为方便起见，`GameKitHelper`类还会将最后一次错误存储在其`lastError`属性中。这使得你无需直接接收 Game\
    \ Center 消息，即可检查是否有错误发生以及错误类型。`GameKitHelper`类是一个单例，这一点已在第 3 章中描述过，因此这里不再讨论与单例相关的代码。\n\
    \n其余属性和方法将在稍后讨论。现在，让我们看看`TileMapLayer`类是如何扩展的，以便它能够充当`GameKitHelper`的委托对象。头文件的关键更改是导入`GameKitHelper.h`并指定`TileMapLayer`实现`GameKitHelperProtocol`协议：\n\
    \n```\n#import \"GameKitHelper.h\"\n\n@interface TileMapLayer : CCLayer <GameKitHelperProtocol>\n\
    {\n    …\n}\n```\n\n然后，你可以在`init`方法中将`TileMapLayer`类设置为`GameKitHelper`类的委托：\n\n\
    ```\nGameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\ngkHelper.delegate\
    \ = self;\n[gkHelper authenticateLocalPlayer];\n```\n\n请注意，你需要在适当的时候（例如，在切换场景之前）负责将`GameKitHelper`委托设置回`nil`。因为`GameKitHelper`会\
    \ retain 该委托，所以即使它在其他情况下会被释放（例如，在场景切换期间），它也不会从内存中释放。这不仅会使委托本身保留在内存中，还会保留其所有成员变量，如果它是一个`CCNode`类，还包括其所有子节点。\n\
    \n#### 检查 Game Center 可用性\n\n`GameKitHelper`类在其`init`方法中首先检查 Game Center 的可用性（列表\
    \ 14–3）。它只需要检查一次，因为在应用程序运行期间条件不会改变。\n\n**列表 14–3.** *测试 Game Center 可用性*\n\n```\n\
    // 测试 Game Center 可用性\nClass gameKitLocalPlayerClass = NSClassFromString(@\"GKLocalPlayer\"\
    );\nbool isLocalPlayerAvailable = (gameKitLocalPlayerClass != nil);\n\n// 测试设备是否运行\
    \ iOS 4.1 或更高版本\nNSString* reqSysVer = @\"4.1\";\nNSString* currSysVer = [[UIDevice\
    \ currentDevice] systemVersion];\nbool isOSVer41 = ([currSysVer compare:reqSysVer\n\
    \    options:NSNumericSearch] != NSOrderedAscending);\n\nisGameCenterAvailable\
    \ = (isLocalPlayerAvailable && isOSVer41);\n```\n\n第一个测试只是检查特定的 Game Center 类是否可用。这里使用了\
    \ Objective-C 运行时方法`NSClassFromString`来按名称获取一个 Game Center 类。如果此调用返回`nil`，则可以确定\
    \ Game Center 不可用。\n\n但这并不那么简单。由于 Game Center 在 iOS 4.1 之前的测试版中已经部分可用，你还需要检查设备是否至少运行\
    \ iOS 4.1。这通过比较`reqSysVer`字符串和`systemVersion`字符串来完成。\n\n完成两项检查后，使用`&&`（与）运算符组合结果，因此`isGameCenterAvailable`必须同时为真才能变为`true`。`isGameCenterAvailable`变量用于保护`GameKitHelper`类中对\
    \ Game Center 功能的所有调用。这可以避免在 Game Center 不可用时意外调用其功能，从而导致应用程序崩溃。\n\n请注意，这是苹果推荐的检查\
    \ Game Center 可用性的方式。你不应尝试任何其他方法——例如，确定你的游戏运行在哪种设备类型上。虽然某些设备被排除在 Game Center 之外，但前面的检查已经考虑到了这一点。\n"
- fmt: "# Authenticating the Local Player\n\nThe local player is a fundamental concept\
    \ to Game Center programming. It refers to the player account that is signed into\
    \ the device. This is important to know because only the local player can send\
    \ scores to leaderboards and report achievement progress to the Game Center service.\
    \ The very first thing a Game Center application needs to do is authenticate the\
    \ local player. If that fails, you cannot use most of the Game Center services,\
    \ and in fact Apple recommends not using any Game Center functionality unless\
    \ there is an authenticated local player.\n\nIn the `GameKitHelper` init method,\
    \ the `registerForLocalPlayerAuthChange` method is called so that `GameKitHelper`\
    \ receives events concerning authentication changes for the local player. This\
    \ is the only Game Center notification that is sent through `NSNotificationCenter`.\
    \ You register a selector to receive the message, as shown in Listing 14–4.\n\n\
    **Listing 14–4.** Registering for Local Player Authentication Changes\n\n```\n\
    -(void) registerForLocalPlayerAuthChange\n{\n    if (isGameCenterAvailable ==\
    \ NO)\n        return;\n\n    NSNotificationCenter* nc = [NSNotificationCenter\
    \ defaultCenter];\n    [nc addObserver:self\n           selector:@selector(onLocalPlayerAuthenticationChanged)\n\
    \               name:GKPlayerAuthenticationDidChangeNotificationName\n       \
    \      object:nil];\n}\n```\n\nAs you can see, `isGameCenterAvailable` is used\
    \ here to skip the rest of the method in case Game Center isn't available. You'll\
    \ notice other methods doing the same thing, and I'll refrain from repeating this\
    \ in the book's code.\n\nThe actual method being called by `NSNotificationCenter`\
    \ simply forwards the message to the delegate:\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n\
    {\n    [delegate onLocalPlayerAuthenticationChanged];\n}\n```\n\n**NOTE:** The\
    \ local player's signed-in status may actually change while the game is in the\
    \ background and the user runs the Game Center app and signs out. This is because\
    \ of the multitasking nature of iOS 4.0 and newer. Essentially, your game must\
    \ be prepared to handle the local player logging out and some other player signing\
    \ in at any time during game play. Typically, you should end the current game\
    \ session and return to a safe place—for example, the main menu. But you should\
    \ consider saving the current state of the game for each local player as they\
    \ sign out so that when a particular local player signs back in, the game continues\
    \ exactly where that player left the game.\n\nThe actual authentication is performed\
    \ by the `authenticateLocalPlayer` method, in Listing 14–5.\n\n**Listing 14–5.**\
    \ Authenticating the Local Player\n\n```\n-(void) authenticateLocalPlayer\n{\n\
    \    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated\
    \ == NO)\n    {\n        [localPlayer authenticateWithCompletionHandler:\n   \
    \         ^(NSError* error)\n            {\n                [self setLastError:error];\n\
    \            }];\n    }\n}\n```\n\nAt first glance, that's relatively straightforward.\
    \ The `localPlayer` object is obtained, and if it's not authenticated, the `authenticateWithCompletionHandler`\
    \ method is called. And the `NSError` object returned by the method is set to\
    \ the `lastError` and … hey, wait a second. That's all part of the method's parameter?\n\
    \nYes. These inline methods are called *block objects*. I'll tell you more about\
    \ them in the next section. For now, you only need to know that the block object\
    \ is a C-style method that's passed as a parameter to the `authenticateWithCompletionHandler`\
    \ method. It's run only after the authentication request has returned from the\
    \ server.\n\nIf you call the `authenticateLocalPlayer` method, your game will\
    \ display the Game Center sign-in dialog, shown in Figure 14–4. If you have an\
    \ Apple ID, you can sign in with your Apple ID and password. Or you can choose\
    \ to create a new account.\n\n**Figure 14–4.** Game Center sign-in dialog\n\n\
    But there's a third possibility—if Game Center detects that there's already a\
    \ signed-in player on this device, it will simply greet you with a “welcome back”\
    \ message. How do you sign out in that case? This is done through the Game Center\
    \ app, which also exists on the iPhone/iPad Simulator for that very reason. If\
    \ you run the Game Center app, select the first tab that reads either `Me` or\
    \ `Sandbox`, and then click the label at the bottom that starts with `Account:`,\
    \ and you'll get a pop-up dialog that allows you to view your account or sign\
    \ out. After signing out through the Game Center app, the next time you run your\
    \ app and it's going through the player authentication process, the sign-in dialog\
    \ in Figure 14–4 will be shown again.\n\n**NOTE:** If the `[GKLocalPlayer localPlayer].underage`\
    \ property is set after the local player was authenticated, some Game Center features\
    \ are disabled. You can also refer to the `underage` property if your game should\
    \ disable optional features that are not suitable for underage players.\n\nNow,\
    \ about error handling, you'll notice that `GameKitHelper` uses the `setLastError`\
    \ method wherever there's an error object returned. This allows the delegate class\
    \ to check whether any error occurred through the `lastError` property. If it\
    \ is `nil`, then there was no error.\n\nHowever, only the last error object is\
    \ kept around, and the next method returning an `NSError` object will replace\
    \ the previous error, so it is crucial to check for the `lastError` property right\
    \ away if error handling is important in that particular case. In some cases,\
    \ you can safely ignore errors. They might lead only to temporary problems, like\
    \ an empty friends list. Regardless, the `setLastError` message copies the new\
    \ error after releasing the old one and then prints out diagnostic information\
    \ so that you can always keep an eye on the kinds of errors that occur during\
    \ development:\n\n```\n-(void) setLastError:(NSError*)error\n{\n    [lastError\
    \ release];\n    lastError = [error copy];\n\n    if (lastError != nil)\n    \
    \    NSLog(@\"GameKitHelper ERROR: %@\", [[lastError userInfo] description]);\n\
    }\n```\n\nIf you receive an error and would like to know more about it, you can\
    \ refer to Apple's Game Kit Constants Reference, which describes the error constants\
    \ defined in the `GameKit/GKError.h` header file. You can find the Constants Reference\
    \ here: [`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html).\n\
    \nAfter the local player has successfully signed in, you can access his friend\
    \ list, leaderboards, and achievements. But before I get to that, let's sidestep\
    \ for a moment and review the important aspects of block objects."
  raw: '#### Authenticating the Local Player


    The local player is a fundamental concept to Game Center programming. It refers
    to the player account that is signed into the device. This is important to know
    because only the local player can send scores to leaderboards and report achievement
    progress to the Game Center service. The very first thing a Game Center application
    needs to do is authenticate the local player. If that fails, you cannot use most
    of the Game Center services, and in fact Apple recommends not using any Game Center
    functionality unless there is an authenticated local player.


    In the `GameKitHelperinit` method, the `registerForLocalPlayerAuthChange` method
    is called so that `GameKitHelper` receives events concerning authentication changes
    for the local player. This is the only Game Center notification that is sent through
    `NSNotificationCenter`. You register a selector to receive the message, as shown
    in [Listing 14–4](#Chapter14.html#list_14_4).


    **Listing 14–4.** *Registering for Local Player Authentication Changes*


    `-(void) registerForLocalPlayerAuthChange`

    `{`

    `    if (isGameCenterAvailable == NO)`

    `        return;`


    `    NSNotificationCenter* nc = [NSNotificationCenter defaultCenter];`

    `    [nc addObserver:self`

    `           selector:@selector(onLocalPlayerAuthenticationChanged)`

    `               name:GKPlayerAuthenticationDidChangeNotificationName`

    `             object:nil];`

    `}`


    As you can see, `isGameCenterAvailable` is used here to skip the rest of the method
    in case Game Center isn''t available. You''ll notice other methods doing the same
    thing, and I''ll refrain from repeating this in the book''s code.


    The actual method being called by `NSNotificationCenter` simply forwards the message
    to the delegate:


    `-(void) onLocalPlayerAuthenticationChanged`

    `{`

    `    [delegate onLocalPlayerAuthenticationChanged];`

    `}`


    **NOTE:** The local player''s signed-in status may actually change while the game
    is in the background and the user runs the Game Center app and signs out. This
    is because of the multitasking nature of iOS 4.0 and newer. Essentially, your
    game must be prepared to handle the local player logging out and some other player
    signing in at any time during game play. Typically, you should end the current
    game session and return to a safe place—for example, the main menu. But you should
    consider saving the current state of the game for each local player as they sign
    out so that when a particular local player signs back in, the game continues exactly
    where that player left the game.


    The actual authentication is performed by the `authenticateLocalPlayer` method,
    in [Listing 14–5](#Chapter14.html#list_14_5).


    **Listing 14–5.** *Authenticating the Local Player*


    `-(void) authenticateLocalPlayer`

    `{`

    `    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];`

    `    if (localPlayer.authenticated == NO)`

    `    {`

    `[localPlayer authenticateWithCompletionHandler:` ![images](images/U002.jpg)

    `        ^(NSError* error)`

    `        {`

    `            [self setLastError:error];`

    `        }];`

    `    }`

    `}`


    At first glance, that''s relatively straightforward. The `localPlayer` object
    is obtained, and if it''s not authenticated, the `authenticateWithCompletionHandler`
    method is called. And the `NSError` object returned by the method is set to the
    `lastError` and … hey, wait a second. That''s all part of the method''s parameter?


    Yes. These inline methods are called *block objects*. I''ll tell you more about
    them in the next section. For now, you only need to know that the block object
    is a C-style method that''s passed as a parameter to the `authenticateWithCompletionHandler`
    method. It''s run only after the authentication request has returned from the
    server.


    If you call the `authenticateLocalPlayer` method, your game will display the Game
    Center sign-in dialog, shown in [Figure 14–4](#Chapter14.html#fig_14_4). If you
    have an Apple ID, you can sign in with your Apple ID and password. Or you can
    choose to create a new account.


    ![images](images/1404.jpg)


    **Figure 14–4.** *Game Center sign-in dialog*


    But there''s a third possibility—if Game Center detects that there''s already
    a signed-in player on this device, it will simply greet you with a “welcome back”
    message. How do you sign out in that case? This is done through the Game Center
    app, which also exists on the iPhone/iPad Simulator for that very reason. If you
    run the Game Center app, select the first tab that reads either `Me` or `Sandbox`,
    and then click the label at the bottom that starts with `Account:`, and you''ll
    get a pop-up dialog that allows you to view your account or sign out. After signing
    out through the Game Center app, the next time you run your app and it''s going
    through the player authentication process, the sign-in dialog in [Figure 14–4](#Chapter14.html#fig_14_4)
    will be shown again.


    **NOTE:** If the `[GKLocalPlayer localPlayer].underage` property is set after
    the local player was authenticated, some Game Center features are disabled. You
    can also refer to the `underage` property if your game should disable optional
    features that are not suitable for underage players.


    Now, about error handling, you''ll notice that `GameKitHelper` uses the `setLastError`
    method wherever there''s an error object returned. This allows the delegate class
    to check whether any error occurred through the `lastError` property. If it is
    `nil`, then there was no error.


    However, only the last error object is kept around, and the next method returning
    an `NSError` object will replace the previous error, so it is crucial to check
    for the `lastError` property right away if error handling is important in that
    particular case. In some cases, you can safely ignore errors. They might lead
    only to temporary problems, like an empty friends list. Regardless, the `setLastError`
    message copies the new error after releasing the old one and then prints out diagnostic
    information so that you can always keep an eye on the kinds of errors that occur
    during development:


    ` -(void) setLastError:(NSError*)error`

    `{`

    `    [lastError release];`

    `    lastError = [error copy];`


    `    if (lastError != nil)`

    `        NSLog(@"GameKitHelper ERROR: %@", [[lastError userInfo] description]);`

    `}`


    If you receive an error and would like to know more about it, you can refer to
    Apple''s Game Kit Constants Reference, which describes the error constants defined
    in the GameKit/GKError.h header file. You can find the Constants Reference here:
    [`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html).


    After the local player has successfully signed in, you can access his friend list,
    leaderboards, and achievements. But before I get to that, let''s sidestep for
    a moment and review the important aspects of block objects.'
  trans: "\n# 验证本地玩家\n\n本地玩家是 Game Center 编程中的一个基本概念。它指的是已登录到设备的玩家账户。了解这一点很重要，因为只有本地玩家才能向排行榜发送分数，并向\
    \ Game Center 服务报告成就进度。Game Center 应用需要做的第一件事就是验证本地玩家。如果验证失败，你将无法使用大多数 Game Center\
    \ 服务，事实上苹果也建议，除非存在已验证的本地玩家，否则不要使用任何 Game Center 功能。\n\n在 `GameKitHelper` 的 init\
    \ 方法中，会调用 `registerForLocalPlayerAuthChange` 方法，以便 `GameKitHelper` 接收有关本地玩家身份验证更改的事件。这是唯一一个通过\
    \ `NSNotificationCenter` 发送的 Game Center 通知。你需要注册一个选择器来接收该消息，如列表 14-4 所示。\n\n\
    **列表 14-4.** 注册本地玩家身份验证更改\n\n```\n-(void) registerForLocalPlayerAuthChange\n{\n\
    \    if (isGameCenterAvailable == NO)\n        return;\n\n    NSNotificationCenter*\
    \ nc = [NSNotificationCenter defaultCenter];\n    [nc addObserver:self\n     \
    \      selector:@selector(onLocalPlayerAuthenticationChanged)\n              \
    \ name:GKPlayerAuthenticationDidChangeNotificationName\n             object:nil];\n\
    }\n```\n\n如你所见，这里使用了 `isGameCenterAvailable`，以便在 Game Center 不可用时跳过方法的其余部分。你会注意到其他方法也执行同样的操作，本书代码中将不再重复说明。\n\
    \n`NSNotificationCenter` 实际调用的方法只是将消息转发给代理：\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n\
    {\n    [delegate onLocalPlayerAuthenticationChanged];\n}\n```\n\n**注意：** 当游戏处于后台且用户运行\
    \ Game Center 应用并注销时，本地玩家的登录状态实际上可能会发生变化。这是因为 iOS 4.0 及更高版本的多任务特性。本质上，你的游戏必须准备好处理本地玩家注销以及游戏过程中其他玩家随时登录的情况。通常，你应该结束当前的游戏会话并返回到一个安全的地方，例如主菜单。但是，你应该考虑为每个注销的本地玩家保存当前游戏状态，以便当某个特定本地玩家重新登录时，游戏能够从他上次离开的地方继续。\n\
    \n实际的验证过程由 `authenticateLocalPlayer` 方法执行，如列表 14-5 所示。\n\n**列表 14-5.** 验证本地玩家\n\
    \n```\n-(void) authenticateLocalPlayer\n{\n    GKLocalPlayer* localPlayer = [GKLocalPlayer\
    \ localPlayer];\n    if (localPlayer.authenticated == NO)\n    {\n        [localPlayer\
    \ authenticateWithCompletionHandler:\n            ^(NSError* error)\n        \
    \    {\n                [self setLastError:error];\n            }];\n    }\n}\n\
    ```\n\n乍一看，这相当简单。获取 `localPlayer` 对象，如果它尚未通过验证，则调用 `authenticateWithCompletionHandler`\
    \ 方法。而该方法返回的 `NSError` 对象被设置为 `lastError`，然后……等等，这些都是方法参数的一部分吗？\n\n是的。这些内联方法被称为**块对象**。我将在下一节中详细介绍它们。现在，你只需要知道块对象是一种\
    \ C 风格的方法，作为参数传递给 `authenticateWithCompletionHandler` 方法。它只在验证请求从服务器返回后才会运行。\n\
    \n如果你调用 `authenticateLocalPlayer` 方法，你的游戏将显示 Game Center 登录对话框，如图 14-4 所示。如果你有\
    \ Apple ID，可以使用你的 Apple ID 和密码登录。或者你也可以选择创建一个新账户。\n\n**图 14-4.** Game Center 登录对话框\n\
    \n但还有第三种可能性——如果 Game Center 检测到该设备上已有一个已登录的玩家，它将只会显示一条“欢迎回来”的消息。在这种情况下如何注销？这可以通过\
    \ Game Center 应用来完成，也正是因为这个原因，iPhone/iPad 模拟器上也存在该应用。如果你运行 Game Center 应用，选择显示为\
    \ `Me` 或 `Sandbox` 的第一个选项卡，然后点击底部以 `Account:` 开头的标签，将会弹出一个对话框，允许你查看账户或注销。通过 Game\
    \ Center 应用注销后，下次运行你的应用并进行玩家验证过程时，图 14-4 中的登录对话框将再次出现。\n\n**注意：** 如果在本地玩家通过验证后设置了\
    \ `[GKLocalPlayer localPlayer].underage` 属性，则某些 Game Center 功能将被禁用。如果你的游戏应禁用不适合未成年玩家的可选功能，你也可以参考\
    \ `underage` 属性。\n\n现在，关于错误处理，你会注意到 `GameKitHelper` 在返回错误对象的地方都使用了 `setLastError`\
    \ 方法。这允许代理类通过 `lastError` 属性检查是否发生任何错误。如果它为 `nil`，则没有错误。\n\n但是，只保留最后一个错误对象，下一个返回\
    \ `NSError` 对象的方法将替换之前的错误。因此，如果在该特定情况下错误处理很重要，则立即检查 `lastError` 属性至关重要。在某些情况下，你可以安全地忽略错误。它们可能只会导致暂时性问题，例如好友列表为空。无论如何，`setLastError`\
    \ 消息会在释放旧错误后复制新错误，然后打印诊断信息，以便你始终可以关注开发过程中发生的错误类型：\n\n```\n-(void) setLastError:(NSError*)error\n\
    {\n    [lastError release];\n    lastError = [error copy];\n\n    if (lastError\
    \ != nil)\n        NSLog(@\"GameKitHelper ERROR: %@\", [[lastError userInfo] description]);\n\
    }\n```\n\n如果你收到错误并想了解更多信息，可以参考 Apple 的 Game Kit 常量参考，其中描述了 `GameKit/GKError.h`\
    \ 头文件中定义的错误常量。你可以在此处找到常量参考：[`http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html`](http://developer.apple.com/library/ios/#documentation/GameKit/Reference/GameKit_ConstantsRef/Reference/reference.html)。\n\
    \n本地玩家成功登录后，你可以访问他的好友列表、排行榜和成就。但在介绍这些之前，让我们先暂时岔开话题，回顾一下块对象的重要方面。\n"
- fmt: "### Block Objects\n\nThe inline method shown in [Listing 14–5](#Chapter14.html#list_14_5)\
    \ is called a *block object* and commonly referred to simply as *blocks*. You\
    \ might have heard of *closures*, *anonymous functions*, or *lambda* in other\
    \ languages, which are essentially the same concept. Block objects are a C-language\
    \ extension introduced by Apple to make multithreaded and asynchronous programming\
    \ tasks easier.\n\nIn layman's terms, block objects are callback functions that\
    \ can be created within other functions, assigned to variables for later use,\
    \ passed on to other functions, and run asynchronously at a later time. Since\
    \ a block object has read access to the local variables of the function or scope\
    \ it was defined in, the block object typically requires fewer arguments than\
    \ a regular callback method. Optionally, with the `__block` storage specifier,\
    \ you can also allow the block object to modify variables in its enclosing scope.\n\
    \n**TIP:** Refer to Apple's Blocks Programming Topics documentation if you are\
    \ interested in more details about block objects:  \n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html).\n\
    \nI'll cut out the actual block object from [Listing 14–5](#Chapter14.html#list_14_5)\
    \ to discuss it separately:\n\n```\n^(NSError* error)\n{\n    [self setLastError:error];\n\
    }\n```\n\nIt looks like a method, except it has no name and it begins with a caret\
    \ symbol (`^`). The `NSError` pointer is the only variable passed to it, but there\
    \ can be multiple variables delimited by commas, as in this example:\n\n```\n\
    ^(NSArray* scores, NSError* error)\n{\n    [self setLastError:error];\n    [delegate\
    \ onScoresReceived:scores];\n}\n```\n\nIf that reminds you of a C method's parameters,\
    \ you are correct. If you will, you can consider a block to be a C method whose\
    \ name is `^` and can be passed to one of the many Game Kit methods taking block\
    \ objects as parameters.\n\nThere are two technicalities I'd like to point out.\
    \ First, local variables can be accessed in a block. But they can't normally be\
    \ modified, unless they are prefixed with the `__block` keyword. Consider this\
    \ code snippet:\n\n```\n__block bool success = NO;\n[localPlayer authenticateWithCompletionHandler:![images](images/U002.jpg)\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n    lastError = error;\n\
    }];\n```\n\nWith blocks, it is only legal to modify a local variable declared\
    \ outside the block's scope if the variable is declared with the `__block` keyword.\
    \ In this case, the `success` variable is declared locally outside the block but\
    \ is modified within the block, so it must be prefixed with the `__block` keyword.\
    \ On the other hand, the `lastError` variable is a member variable of the class.\
    \ Member variables can be modified within blocks without the use of the `__block`\
    \ keyword.\n\nAlso, in the case of Game Kit, you'll be frequently passing block\
    \ objects to Game Kit methods, but the block objects won't be run until a later\
    \ time. You are probably used to code being executed in sequence, but in Game\
    \ Kit programming it is not! The block passed to a Game Kit method is called only\
    \ when the call completes a round-trip to and from the Game Center server. That\
    \ takes time because data needs to be transmitted to the Game Center servers and\
    \ processed, and then a result needs to be returned to the device. Only then does\
    \ the block object get executed.\n\nLet's take an example. You may find yourself\
    \ tempted to write something like this:\n\n```\n__block bool success = NO;\n\n\
    [localPlayer authenticateWithCompletionHandler:![images](images/U002.jpg)\n^(NSError*\
    \ error)\n{\n    success = (error == nil);\n}];\n\nif (success)\n    NSLog(@\"\
    Local player logged in!\");\nelse\n    NSLog(@\"Local player NOT logged in!\"\
    );\n```\n\nHowever, this example will always report that the player is not logged\
    \ in. Why? Well, the execution path is such that the `authenticateWithCompletionHandler`\
    \ will take your block as a parameter and store it while it sends a request to\
    \ the server and waits for the response to come back. However, the execution continues\
    \ right away after the `authenticateWithCompletionHandler` method, and that's\
    \ where the `success` variable decides which log statement to print. The problem\
    \ is, the `success` variable is still set to `NO` because the block hasn't been\
    \ executed yet.\n\nSeveral milliseconds later, the server responds to the authentication,\
    \ and that triggers the completion handler—the block object—to be run. If it returns\
    \ without error, the `success` variable is set to `YES`. But alas, your logging\
    \ code has already been run, so the assignment has no effect.\n\nNote that this\
    \ is not a problem of block objects in general; there are methods that immediately,\
    \ or even repeatedly, run a block right away before returning back to you. But\
    \ in the case of almost all Game Kit methods, the block objects are used exclusively\
    \ as pieces of code that will be run whenever the Game Center server has responded\
    \ to a particular request. In other words, the block objects used by Game Kit\
    \ are run asynchronously after an unspecified delay (and possibly not at all if\
    \ the connection is interrupted)."
  raw: '#### Block Objects


    The inline method shown in [Listing 14–5](#Chapter14.html#list_14_5) is called
    a *block object* and commonly referred to simply as *blocks*. You might have heard
    of *closures*, *anonymous functions*, or *lambda* in other languages, which are
    essentially the same concept. Block objects are a C-language extension introduced
    by Apple to make multithreaded and asynchronous programming tasks easier. In layman''s
    terms, block objects are callback functions that can be created within other functions,
    assigned to variables for later use, passed on to other functions, and run asynchronously
    at a later time. Since a block object has read access to the local variables of
    the function or scope it was defined in, the block object typically requires fewer
    arguments than a regular callback method. Optionally, with the `__block` storage
    specifier, you can also allow the block object to modify variables in its enclosing
    scope.


    **TIP:** Refer to Apple''s Blocks Programming Topics documentation if you are
    interested in more details about block objects:

    [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html).


    I''ll cut out the actual block object from [Listing 14–5](#Chapter14.html#list_14_5)
    to discuss it separately:


    `^(NSError* error)`

    `{`

    `    [self setLastError:error];`

    `}`


    It looks like a method, except it has no name and it begins with a caret symbol
    (`^`). The `NSError` pointer is the only variable passed to it, but there can
    be multiple variables delimited by commas, as in this example:


    `^(NSArray* scores, NSError* error)`

    `{`

    `    [self setLastError:error];`

    `    [delegate onScoresReceived:scores];`

    `}`


    If that reminds you of a C method''s parameters, you are correct. If you will,
    you can consider a block to be a C method whose name is `^` and can be passed
    to one of the many Game Kit methods taking block objects as parameters.


    There are two technicalities I''d like to point out. First, local variables can
    be accessed in a block. But they can''t normally be modified, unless they are
    prefixed with the `__block` keyword. Consider this code snippet:


    `__block bool success = NO;`

    `[localPlayer authenticateWithCompletionHandler:`![images](images/U002.jpg)

    `^(NSError* error)`

    `{`

    `    success = (error == nil);`

    `    lastError = error;`

    `}];`


    With blocks, it is only legal to modify a local variable declared outside the
    block''s scope if the variable is declared with the `__block` keyword. In this
    case, the `success` variable is declared locally outside the block but is modified
    within the block, so it must be prefixed with the `__block` keyword. On the other
    hand, the `lastError` variable is a member variable of the class. Member variables
    can be modified within blocks without the use of the `__block` keyword.


    Also, in the case of Game Kit, you''ll be frequently passing block objects to
    Game Kit methods, but the block objects won''t be run until a later time. You
    are probably used to code being executed in sequence, but in Game Kit programming
    it is not! The block passed to a Game Kit method is called only when the call
    completes a round-trip to and from the Game Center server. That takes time because
    data needs to be transmitted to the Game Center servers and processed, and then
    a result needs to be returned to the device. Only then does the block object get
    executed.


    Let''s take an example. You may find yourself tempted to write something like
    this:


    `__block bool success = NO;`


    `[localPlayer authenticateWithCompletionHandler:`![images](images/U002.jpg)

    `^(NSError* error)`

    `{`

    `    success = (error == nil);`

    `}];`


    `if (success)`

    `    NSLog(@"Local player logged in!");`

    `else`

    `    NSLog(@"Local player NOT logged in!");`


    However, this example will always report that the player is not logged in. Why?
    Well, the execution path is such that the `authenticateWithCompletionHandler`
    will take your block as a parameter and store it while it sends a request to the
    server and waits for the response to come back. However, the execution continues
    right away after the `authenticateWithCompletionHandler` method, and that''s where
    the `success` variable decides which log statement to print. The problem is, the
    `success` variable is still set to `NO` because the block hasn''t been executed
    yet.


    Several milliseconds later, the server responds to the authentication, and that
    triggers the completion handler—the block object—to be run. If it returns without
    error, the `success` variable is set to `YES`. But alas, your logging code has
    already been run, so the assignment has no effect.


    Note that this is not a problem of block objects in general; there are methods
    that immediately, or even repeatedly, run a block right away before returning
    back to you. But in the case of almost all Game Kit methods, the block objects
    are used exclusively as pieces of code that will be run whenever the Game Center
    server has responded to a particular request. In other words, the block objects
    used by Game Kit are run asynchronously after an unspecified delay (and possibly
    not at all if the connection is interrupted).'
  trans: "\n### 块对象\n\n清单 14-5 中展示的内联方法被称为*块对象*，通常简称为*块*。你可能在其他语言中听说过*闭包*、*匿名函数*或*Lambda*，它们本质上是同一概念。块对象是苹果公司引入的\
    \ C 语言扩展，旨在简化多线程和异步编程任务。\n\n通俗来讲，块对象是可以在其他函数内部创建的回调函数，可以赋值给变量供后续使用、传递给其他函数，并在未来某个时刻异步执行。由于块对象对其定义所在的函数或作用域的局部变量具有读取权限，因此它通常比常规回调方法所需的参数更少。可选地，使用`__block`存储类型修饰符，还可以允许块对象修改其所在作用域中的变量。\n\
    \n**提示：** 若想了解关于块对象的更多细节，请参考苹果的《Blocks 编程主题》文档：\n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/Blocks/Articles/00_Introduction.html)。\n\
    \n我将从清单 14-5 中摘取实际的块对象单独讨论：\n\n```\n^(NSError* error)\n{\n    [self setLastError:error];\n\
    }\n```\n\n它看起来像一个方法，只是没有名称，并且以插入符号（`^`）开头。`NSError`指针是传递给它的唯一变量，但也可以有多个变量，用逗号分隔，如下例所示：\n\
    \n```\n^(NSArray* scores, NSError* error)\n{\n    [self setLastError:error];\n\
    \    [delegate onScoresReceived:scores];\n}\n```\n\n如果这让你联想到 C 语言方法的参数，那你的想法没错。你可以将块视为一个名称为`^`的\
    \ C 方法，并可以将其传递给许多接受块对象作为参数的 Game Kit 方法。\n\n我想指出两个技术细节。首先，局部变量可以在块中被访问。但通常情况下它们不能被修改，除非变量以`__block`关键字作为前缀。请看这段代码片段：\n\
    \n```\n__block bool success = NO;\nlocalPlayer authenticateWithCompletionHandler:![images\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n    lastError = error;\n\
    }];\n```\n\n使用块时，只有使用`__block`关键字声明的变量，才能在块作用域外被合法地修改。在此例中，`success`变量在块外局部声明，但在块内被修改，因此必须加上`__block`关键字。另一方面，`lastError`变量是类的成员变量。成员变量可以在块内被修改，而无需使用`__block`关键字。\n\
    \n此外，在使用 Game Kit 时，你会频繁地将块对象传递给 Game Kit 方法，但这些块对象不会立即执行，而是要等到稍后的某个时刻。你可能习惯了代码按顺序执行，但在\
    \ Game Kit 编程中并非如此！传递给 Game Kit 方法的块，只有在调用完成与 Game Center 服务器的一次往返通信后才会被调用。这需要时间，因为数据需要传输到\
    \ Game Center 服务器并进行处理，然后将结果返回到设备。只有在这之后，块对象才会得到执行。\n\n举个例子。你可能会忍不住写出这样的代码：\n\n\
    ```\n__block bool success = NO;\n\nlocalPlayer authenticateWithCompletionHandler:![images\n\
    ^(NSError* error)\n{\n    success = (error == nil);\n}];\n\nif (success)\n   \
    \ NSLog(@\"本地玩家已登录！\");\nelse\n    NSLog(@\"本地玩家未登录！\");\n```\n\n然而，这个示例总会报告玩家未登录。为什么呢？原因是执行路径是这样的：`authenticateWithCompletionHandler`方法会将你的块作为参数存储起来，同时向服务器发送请求并等待响应返回。但是，执行流程在`authenticateWithCompletionHandler`方法之后会立即继续，此时`success`变量决定了打印哪条日志语句。问题在于，`success`变量仍然被设置为`NO`，因为块还没有被执行。\n\
    \n几毫秒后，服务器响应了认证请求，这会触发完成处理器——即块对象——的执行。如果返回时没有错误，`success`变量会被设置为`YES`。但可惜的是，你的日志代码已经运行过了，因此这个赋值操作没有产生任何效果。\n\
    \n请注意，这通常不是块对象本身的问题；有些方法会立即、甚至重复地执行块，然后再返回给你。但对于几乎所有 Game Kit 方法而言，块对象专门用作一段代码，每当\
    \ Game Center 服务器响应了某个特定请求时就会执行这些代码。换句话说，Game Kit 使用的块对象是在一个不确定的延迟后异步执行的（如果连接中断，甚至可能根本不执行）。"
- fmt: "#### Receiving the Local Player's Friend List\n\nWhen the local player signs\
    \ in or out, the `onLocalPlayerAuthenticationChanged` method is received and forwarded\
    \ to the delegate. The delegate in these examples is the `TileMapLayer` class,\
    \ which implements this method to ask for the local player's friend list in [Listing\
    \ 14–6](#Chapter14.html#list_14_6).\n\n**Listing 14–6.** *Asking for the List\
    \ of Friends*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n{\n    GKLocalPlayer*\
    \ localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper getLocalPlayerFriends];\n    }\n}\n```\n\nIt checks whether\
    \ the local player is authenticated, and if so, it calls the `getLocalPlayerFriends`\
    \ method of the `GameKitHelper` class right away. Let's take a look at that in\
    \ [Listing 14–7](#Chapter14.html#list_14_7).\n\n**Listing 14–7.** *GameKitHelper\
    \ Requesting the Friends List*\n\n```\n-(void) getLocalPlayerFriends\n{\n    GKLocalPlayer*\
    \ localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        [localPlayer loadFriendsWithCompletionHandler:![images](images/U002.jpg)\n\
    \        ^(NSArray* friends, NSError* error)\n        {\n            [self setLastError:error];\n\
    \            [delegate onFriendListReceived:friends];\n        }];\n    }\n}\n\
    ```\n\nBecause the `getLocalPlayerFriends` method doesn't know when it's called\
    \ or by whom, it plays things safe by checking again that the local player is\
    \ actually authenticated. Then it calls the `GKLocalPlayer` class's `loadFriendsWithCompletionHandler`\
    \ method, for which you'll supply another block object that is run when the server\
    \ returns a list of player identifiers as strings. Unsurprisingly, this list of\
    \ identifiers is stored in the `friends` array.\n\nOnce the call to `loadFriendsWithCompletionHandler`\
    \ has succeeded, you can access the current player identifiers of the local player's\
    \ friends through the `GKLocalPlayer` class:\n\n```\nNSArray* friends = [GKLocalPlayer\
    \ localPlayer].friends;\n```\n\nNote that the `friends` array can be `nil` or\
    \ not contain all friends. In the delegate that receives the `onFriendsListReceived`\
    \ message, and in all other `GameKitHelper` delegate methods for that matter,\
    \ you should check whether the received parameter is `nil` before working with\
    \ it. If it is `nil`, you can refer to the `lastError` property of the `GameKitHelper`\
    \ class to get more information about the error for debugging, logging, or possibly\
    \ presenting it to the user when it makes sense to do so.\n\nThe delegate method\
    \ `onFriendsListReceived` simply passes the player identifiers back to `GameKitHelper`,\
    \ requesting more info about the player identifiers in the friends list:\n\n```\n\
    -(void) onFriendListReceived:(NSArray*)friends\n{\n    GameKitHelper* gkHelper\
    \ = [GameKitHelper sharedGameKitHelper];\n    [gkHelper getPlayerInfo:friends];\n\
    }\n```\n\nThat's straightforward, so let's turn our attention back to the `GameKitHelper`\
    \ class's `getPlayerInfo` method. If the `playerList` array contains at least\
    \ one entry, it will call the `loadPlayersForIdentifiers` static method of the\
    \ `GKPlayer` class, as shown in [Listing 14–8](#Chapter14.html#list_14_8).\n\n\
    **Listing 14–8.** *Requesting Players from a List of Player Identifiers*\n\n```\n\
    -(void) getPlayerInfo:(NSArray*)playerList\n{\n    if ([playerList count] > 0)\n\
    \    {\n        // Get detailed information about a list of players\n        [GKPlayer\
    \ loadPlayersForIdentifiers:playerList withCompletionHandler:![images](images/U002.jpg)\n\
    \        ^(NSArray* players, NSError* error)\n        {\n            [self setLastError:error];\n\
    \            [delegate onPlayerInfoReceived:players];\n        }];\n    }\n}\n\
    ```\n\nAgain, a block object is used to handle the returned results from the server.\
    \ And as always, the `lastError` property is updated before calling the delegate's\
    \ `onPlayerInfoReceived` method. The `players` array should now contain a list\
    \ of `GKPlayer` class instances, which the delegate then simply prints to the\
    \ Debugger Console window in the absence of a proper friend list user interface:\n\
    \n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n{\n    for (GKPlayer* gkPlayer\
    \ in players)\n    {\n        CCLOG(@\"PlayerID: %@, Alias: %@\", gkPlayer.playerID,\
    \ gkPlayer.alias);\n    }\n}\n```\n\nThe `GKPlayer` class has only three properties:\
    \ the player identifier, an alias, and the `isFriend` flag, which is `true` for\
    \ all the players in this particular case. The alias is simply the player's nickname."
  raw: '#### Receiving the Local Player''s Friend List


    When the local player signs in or out, the `onLocalPlayerAuthenticationChanged`
    method is received and forwarded to the delegate. The delegate in these examples
    is the `TileMapLayer` class, which implements this method to ask for the local
    player''s friend list in [Listing 14–6](#Chapter14.html#list_14_6).


    **Listing 14–6.** *Asking for the List of Friends*


    `-(void) onLocalPlayerAuthenticationChanged`

    `{`

    `    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];`

    `    if (localPlayer.authenticated)`

    `    {`

    `        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `        [gkHelper getLocalPlayerFriends];`

    `    }`

    `}`


    It checks whether the local player is authenticated, and if so, it calls the `getLocalPlayerFriends`
    method of the `GameKitHelper` class right away. Let''s take a look at that in
    [Listing 14–7](#Chapter14.html#list_14_7).


    **Listing 14–7.** *GameKitHelper Requesting the Friends List*


    `-(void) getLocalPlayerFriends`

    `{`

    `    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];`

    `    if (localPlayer.authenticated)`

    `    {`

    `        [localPlayer loadFriendsWithCompletionHandler:`![images](images/U002.jpg)

    `        ^(NSArray* friends, NSError* error)`

    `        {`

    `            [self setLastError:error];`

    `            [delegate onFriendListReceived:friends];`

    `        }];`

    `    }`

    `}`


    Because the `getLocalPlayerFriends` method doesn''t know when it''s called or
    by whom, it plays things safe by checking again that the local player is actually
    authenticated. Then it calls the `GKLocalPlayer` class''s `loadFriendsWithCompletionHandler`
    method, for which you''ll supply another block object that is run when the server
    returns a list of player identifiers as strings. Unsurprisingly, this list of
    identifiers is stored in the `friends` array.


    Once the call to `loadFriendsWithCompletionHandler` has succeeded, you can access
    the current player identifiers of the local player''s friends through the `GKLocalPlayer`
    class:


    `NSArray* friends = [GKLocalPlayer localPlayer].friends;`


    Note that the `friends` array can be `nil` or not contain all friends. In the
    delegate that receives the `onFriendsListReceived` message, and in all other `GameKitHelper`
    delegate methods for that matter, you should check whether the received parameter
    is `nil` before working with it. If it is `nil`, you can refer to the `lastError`
    property of the `GameKitHelper` class to get more information about the error
    for debugging, logging, or possibly presenting it to the user when it makes sense
    to do so.


    The delegate method `onFriendsListReceived` simply passes the player identifiers
    back to `GameKitHelper`, requesting more info about the player identifiers in
    the friends list:


    `-(void) onFriendListReceived:(NSArray*)friends`

    `{`

    `    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `    [gkHelper getPlayerInfo:friends];`

    `}`


    That''s straightforward, so let''s turn our attention back to the `GameKitHelper`
    class''s `getPlayerInfo` method. If the `playerList` array contains at least one
    entry, it will call the `loadPlayersForIdentifiers` static method of the `GKPlayer`
    class, as shown in [Listing 14–8](#Chapter14.html#list_14_8).


    **Listing 14–8.** *Requesting Players from a List of Player Identifiers*


    `-(void) getPlayerInfo:(NSArray*)playerList`

    `{`

    `    if ([playerList count] > 0)`

    `    {`

    `        // Get detailed information about a list of players`

    `        [GKPlayer loadPlayersForIdentifiers:playerList withCompletionHandler:`![images](images/U002.jpg)

    `        ^(NSArray* players, NSError* error)`

    `        {`

    `            [self setLastError:error];`

    `            [delegate onPlayerInfoReceived:players];`

    `        }];`

    `    }`

    `}`


    Again, a block object is used to handle the returned results from the server.
    And as always, the `lastError` property is updated before calling the delegate''s
    `onPlayerInfoReceived` method. The `players` array should now contain a list of
    `GKPlayer` class instances, which the delegate then simply prints to the Debugger
    Console window in the absence of a proper friend list user interface:


    `-(void) onPlayerInfoReceived:(NSArray*)players`

    `{`

    `    for (GKPlayer* gkPlayer in players)`

    `    {`

    `        CCLOG(@"PlayerID: %@, Alias: %@", gkPlayer.playerID, gkPlayer.alias);`

    `    }`

    `}`


    The `GKPlayer` class has only three properties: the player identifier, an alias,
    and the `isFriend` flag, which is `true` for all the players in this particular
    case. The alias is simply the player''s nickname.'
  trans: "\n#### 接收本地玩家的好友列表\n\n当本地玩家登录或登出时，会接收到 `onLocalPlayerAuthenticationChanged`\
    \ 方法并将其转发给委托。这些示例中的委托是 `TileMapLayer` 类，它实现了该方法以向本地玩家请求好友列表，如代码清单 14–6 所示。\n\n\
    **代码清单 14–6.** *请求好友列表*\n\n```\n-(void) onLocalPlayerAuthenticationChanged\n{\n\
    \    GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper getLocalPlayerFriends];\n    }\n}\n```\n\n它会检查本地玩家是否通过身份验证，如果通过，则立即调用\
    \ `GameKitHelper` 类的 `getLocalPlayerFriends` 方法。我们来看看代码清单 14–7 中的这个方法。\n\n**代码清单\
    \ 14–7.** *GameKitHelper 请求好友列表*\n\n```\n-(void) getLocalPlayerFriends\n{\n  \
    \  GKLocalPlayer* localPlayer = [GKLocalPlayer localPlayer];\n    if (localPlayer.authenticated)\n\
    \    {\n        localPlayer loadFriendsWithCompletionHandler:![images\n      \
    \  ^(NSArray* friends, NSError* error)\n        {\n            [self setLastError:error];\n\
    \            [delegate onFriendListReceived:friends];\n        }];\n    }\n}\n\
    ```\n\n由于 `getLocalPlayerFriends` 方法不知道它被谁、在何时调用，因此为了安全起见，它会再次检查本地玩家是否确实通过了身份验证。然后调用\
    \ `GKLocalPlayer` 类的 `loadFriendsWithCompletionHandler` 方法，你需要为该方法的参数提供一个块对象，该对象在服务器返回以字符串形式呈现的玩家标识符列表时运行。不出所料，这个标识符列表被存储在\
    \ `friends` 数组中。\n\n一旦对 `loadFriendsWithCompletionHandler` 的调用成功，你就可以通过 `GKLocalPlayer`\
    \ 类访问本地玩家好友的当前玩家标识符：\n\n```\nNSArray* friends = [GKLocalPlayer localPlayer].friends;\n\
    ```\n\n请注意，`friends` 数组可能为 `nil`，或者可能不包含所有好友。在接收 `onFriendsListReceived` 消息的委托中，以及所有其他\
    \ `GameKitHelper` 委托方法中，你应该在使用收到的参数之前检查它是否为 `nil`。如果是 `nil`，你可以查阅 `GameKitHelper`\
    \ 类的 `lastError` 属性，以获取关于错误的更多信息，用于调试、日志记录，或者在合适时向用户显示。\n\n委托方法 `onFriendsListReceived`\
    \ 只是将玩家标识符传递回 `GameKitHelper`，请求获取好友列表中关于这些玩家标识符的更多信息：\n\n```\n-(void) onFriendListReceived:(NSArray*)friends\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ getPlayerInfo:friends];\n}\n```\n\n这很直观，让我们将注意力转回到 `GameKitHelper` 类的 `getPlayerInfo`\
    \ 方法上。如果 `playerList` 数组至少包含一个条目，它将调用 `GKPlayer` 类的 `loadPlayersForIdentifiers`\
    \ 静态方法，如代码清单 14–8 所示。\n\n**代码清单 14–8.** *从玩家标识符列表请求玩家信息*\n\n```\n-(void) getPlayerInfo:(NSArray*)playerList\n\
    {\n    if ([playerList count] > 0)\n    {\n        // Get detailed information\
    \ about a list of players\n        GKPlayer loadPlayersForIdentifiers:playerList\
    \ withCompletionHandler:![images\n        ^(NSArray* players, NSError* error)\n\
    \        {\n            [self setLastError:error];\n            [delegate onPlayerInfoReceived:players];\n\
    \        }];\n    }\n}\n```\n\n再次使用一个块对象来处理从服务器返回的结果。与往常一样，在调用委托的 `onPlayerInfoReceived`\
    \ 方法之前，会先更新 `lastError` 属性。此时，`players` 数组应当包含一个 `GKPlayer` 类实例的列表，而在没有合适的好友列表用户界面时，委托会将其简单地打印到调试器控制台窗口中：\n\
    \n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n{\n    for (GKPlayer* gkPlayer\
    \ in players)\n    {\n        CCLOG(@\"PlayerID: %@, Alias: %@\", gkPlayer.playerID,\
    \ gkPlayer.alias);\n    }\n}\n```\n\n`GKPlayer` 类只有三个属性：玩家标识符、别名以及 `isFriend`\
    \ 标志，在此特定情况下，列表中所有玩家的该标志都为 `true`。别名就是玩家的昵称。\n"
- fmt: "### Leaderboards\n\nIn the `Tilemap12` project, I added functionality for\
    \ posting and retrieving leaderboard scores. I hooked into the `onPlayerInfoReceived`\
    \ method in the `TileMapLayer` class to submit a dummy score to Game Center, under\
    \ the `Playtime` category:\n\n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ submitScore:1234 category:@\"Playtime\"];\n}\n```\n\nThe `submitScore` method\
    \ shown in [Listing 14–9](#Chapter14.html#list_14_9) is implemented in `GameKitHelper`\
    \ and calls the `onScoresSubmitted` message back to the delegate. Since there's\
    \ no return parameter to pass on, it simply reports through the `success` value\
    \ if the score was transmitted without an error.\n\n**Listing 14–9.** *Submitting\
    \ a Score to a Leaderboard*\n\n```\n-(void) submitScore:(int64_t)score category:(NSString*)category\n\
    {\n    GKScore* gkScore = [[[GKScore alloc] initWithCategory:category] autorelease];\n\
    \    gkScore.value = score;\n    [gkScore reportScoreWithCompletionHandler:![images](images/U002.jpg)\n\
    \    ^(NSError* error)\n    {\n        [self setLastError:error];\n\n        bool\
    \ success = (error == nil);\n        [delegate onScoresSubmitted:success];\n \
    \   }];\n}\n```\n\nThe score value is of type `int64_t`, which is the same as\
    \ `long long`. It's a 64-bit value, so it can store an incredibly large number—one\
    \ with 19 digits. That allows for more than 4 billion times greater values than\
    \ a regular 32-bit integer can represent!\n\nA temporary `GKScore` object is created\
    \ and sent the `autorelease` message, so you don't need to release it. It's initialized\
    \ with a leaderboard category identifier, which you define in iTunes Connect.\
    \ In this case, the category ID is `Playtime`. The `GKScore` object also gets\
    \ the score assigned, and then its `reportScoreWithCompletionHandler` method is\
    \ called, which will transmit the score to the Game Center server and to the correct\
    \ leaderboard.\n\nThe delegate receives the `onScoresSubmitted` message and subsequently\
    \ calls the `retrieveTopTenAllTimeGlobalScores` method to get the top ten scores:\n\
    \n```\n-(void) onScoresSubmitted:(bool)success\n{\n    if (success)\n    {\n \
    \       GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n     \
    \   [gkHelper retrieveTopTenAllTimeGlobalScores];\n    }\n}\n```\n\nThe `GameKitHelper`\
    \ class's `retrieveTopTenAllTimeGlobalScores` simply wraps the call to `retrieveScoresForPlayers`\
    \ and feeds it with preconfigured parameters:\n\n```\n-(void) retrieveTopTenAllTimeGlobalScores\n\
    {\n    [self retrieveScoresForPlayers:nil\n                          category:nil\n\
    \                             range:NSMakeRange(1, 10)\n                     \
    \  playerScope:GKLeaderboardPlayerScopeGlobal\n                         timeScope:GKLeaderboardTimeScopeAllTime];\n\
    }\n```\n\nFeel free to add more wrapper methods for retrieving scores as you see\
    \ fit, depending on your game's needs. Since there are a variety of ways to retrieve\
    \ leaderboard scores and several filters to reduce the number of scores retrieved,\
    \ it makes sense to use wrapper methods to reduce the potential for human error.\
    \ [Listing 14–10](#Chapter14.html#list_14_10) shows the `retrieveScoresForPlayers`\
    \ method in full.\n\n**Listing 14–10.** *Retrieving a List of Scores from a Leaderboard*\n\
    \n```\n-(void) retrieveScoresForPlayers:(NSArray*)players\n                  \
    \      category:(NSString*)category\n                           range:(NSRange)range\n\
    \                     playerScope:(GKLeaderboardPlayerScope)playerScope\n    \
    \                   timeScope:(GKLeaderboardTimeScope)timeScope\n{\n    GKLeaderboard*\
    \ leaderboard = nil;\n    if ([players count] > 0)\n    {\n        leaderboard\
    \ = [[[GKLeaderboard alloc] initWithPlayerIDs:players] autorelease];\n    }\n\
    \    else\n    {\n        leaderboard = [[[GKLeaderboard alloc] init] autorelease];\n\
    \        leaderboard.playerScope = playerScope;\n    }\n\n    if (leaderboard\
    \ != nil)\n    {\n        leaderboard.timeScope = timeScope;\n        leaderboard.category\
    \ = category;\n        leaderboard.range = range;\n\n        [leaderboard loadScoresWithCompletionHandler:![images](images/U002.jpg)\n\
    \        ^(NSArray* scores, NSError* error)\n        {\n            [self setLastError:error];\n\
    \            [delegate onScoresReceived:scores];\n        }];\n    }\n}\n```\n\
    \nFirst, a `GKLeaderboard` object is initialized. Depending on whether the `players`\
    \ array contains any players, the leaderboard may be initialized with a list of\
    \ player identifiers to retrieve scores only for those players. Otherwise, the\
    \ `playerScope` variable is used, which can be set to either `GKLeaderboardPlayerScopeGlobal`\
    \ or `GKLeaderboardPlayerScoreFriendsOnly` to retrieve only friends' scores.\n\
    \nThen the leaderboard scope is further reduced by the `timeScope` parameter,\
    \ which allows you to obtain the all-time high scores (`GKLeaderboardTimeScopeAllTime`),\
    \ only those from the past week (`GKLeaderboardTimeScopeWeek`), or only today's\
    \ scores (`GKLeaderboardTimeScopeToday`).\n\nOf course, you also have to specify\
    \ the category ID for the leaderboard; otherwise, `GKLeaderboard` wouldn't know\
    \ which leaderboard to retrieve the scores from. Finally, an `NSRange` parameter\
    \ allows you to refine the score positions you'd like to retrieve. In this example,\
    \ a range of 1 to 10 indicates that the top ten scores should be retrieved.\n\n\
    Make sure that you limit the score retrieval using all these parameters (especially\
    \ the `NSRange` parameter) to reasonably small chunks of data. While you could,\
    \ it's not recommended to retrieve all the scores of a leaderboard. If your game\
    \ is played online a lot and many scores are submitted, you might be loading hundreds\
    \ of thousands—if not millions or billions—of scores from the Game Center servers.\
    \ That would cause a significant delay when retrieving scores.\n\nWith the leaderboard\
    \ object set up properly, the `loadScoresWithCompletionHandler` method takes over\
    \ and asks the server for the scores. When the scores are received, it calls the\
    \ delegate method with `onScoresReceived`, passing on the array of scores. The\
    \ array contains objects of class `GKScore` sorted by leaderboard rank. The `GKScore`\
    \ objects provide you with all the information you need, including the `playerID`,\
    \ the `date` the score was posted, and its `rank`, `value`, and `formattedValue`,\
    \ which you should use to display the score to the user.\n\nFortunately for us,\
    \ Apple provides a default leaderboard user interface. Instead of using the scores\
    \ I just retrieved, I'm going to ignore them and use the `onScoresReceived` delegate\
    \ method to bring up the built-in leaderboard view:\n\n```\n-(void) onScoresReceived:(NSArray*)scores\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ showLeaderboard];\n}\n```\n\nGame Kit has a `GKLeaderboardViewController` class,\
    \ which is used to display the Game Center leaderboard user interface, as shown\
    \ in [Listing 14–11](#Chapter14.html#list_14_11).\n\n**Listing 14–11.** *Showing\
    \ the Leaderboard User Interface*\n\n```\n-(void) showLeaderboard\n{\n    GKLeaderboardViewController*\
    \ leaderboardVC = ![images](images/U002.jpg)\n        [[[GKLeaderboardViewController\
    \ alloc] init] autorelease];\n    if (leaderboardVC != nil)\n    {\n        leaderboardVC.leaderboardDelegate\
    \ = self;\n        [self presentViewController:leaderboardVC];\n    }\n}\n```\n\
    \nThe `leaderboardDelegate` is set to `self`, which means the `GameKitHelper`\
    \ class must implement the `GKLeaderboardViewControllerDelegate` protocol. The\
    \ first step is to add this protocol to the class's interface, like so:\n\n```\n\
    @interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate>\n```\n\
    \nThen you must implement the `leaderboardViewControllerDidFinish` method, which\
    \ is used to simply dismiss the view and to forward the event to the delegate."
  raw: '#### Leaderboards


    In the Tilemap12 project, I added functionality for posting and retrieving leaderboard
    scores. I hooked into the `onPlayerInfoReceived` method in the `TileMapLayer`
    class to submit a dummy score to Game Center, under the `Playtime` category:


    `-(void) onPlayerInfoReceived:(NSArray*)players`

    `{`

    `    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `    [gkHelper submitScore:1234 category:@"Playtime"];`

    `}`


    The `submitScore` method shown in [Listing 14–9](#Chapter14.html#list_14_9) is
    implemented in `GameKitHelper` and calls the `onScoresSubmitted` message back
    to the delegate. Since there''s no return parameter to pass on, it simply reports
    through the `success` value if the score was transmitted without an error.


    **Listing 14–9.** *Submitting a Score to a Leaderboard*


    `-(void) submitScore:(int64_t)score category:(NSString*)category`

    `{`

    `    GKScore* gkScore = [[[GKScore alloc] initWithCategory:category] autorelease];`

    `    gkScore.value = score;`

    `    [gkScore reportScoreWithCompletionHandler:`![images](images/U002.jpg)

    `    ^(NSError* error)`

    `    {`

    `        [self setLastError:error];`


    `        bool success = (error == nil);`

    `        [delegate onScoresSubmitted:success];`

    `    }];`

    `}`


    The score value is of type `int64_t`, which is the same as `long long`. It''s
    a 64-bit value, so it can store an incredibly large number—one with 19 digits.
    That allows for more than 4 billion times greater values than a regular 32-bit
    integer can represent!


    A temporary `GKScore` object is created and sent the autorelease message, so you
    don''t need to release it. It''s initialized with a leaderboard category identifier,
    which you define in iTunes Connect. In this case, the category ID is `Playtime`.
    The `GKScore` object also gets the score assigned, and then its `reportScoreWithCompletionHandler`
    method is called, which will transmit the score to the Game Center server and
    to the correct leaderboard.


    The delegate receives the `onScoresSubmitted` message and subsequently calls the
    `retrieveTopTenAllTimeGlobalScores` method to get the top ten scores:


    `-(void) onScoresSubmitted:(bool)success`

    `{`

    `    if (success)`

    `    {`

    `        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `        [gkHelper retrieveTopTenAllTimeGlobalScores];`

    `    }`

    `}`


    The `GameKitHelper` class''s `retrieveTopTenAllTimeGlobalScores` simply wraps
    the call to `retrieveScoresForPlayers` and feeds it with preconfigured parameters:


    `-(void) retrieveTopTenAllTimeGlobalScores`

    `{`

    `    [self retrieveScoresForPlayers:nil`

    `                          category:nil`

    `                             range:NSMakeRange(1, 10)`

    `                       playerScope:GKLeaderboardPlayerScopeGlobal`

    `                         timeScope:GKLeaderboardTimeScopeAllTime];`

    `}`


    Feel free to add more wrapper methods for retrieving scores as you see fit, depending
    on your game''s needs. Since there are a variety of ways to retrieve leaderboard
    scores and several filters to reduce the number of scores retrieved, it makes
    sense to use wrapper methods to reduce the potential for human error. [Listing
    14–10](#Chapter14.html#list_14_10) shows the `retrieveScoresForPlayers` method
    in full.


    **Listing 14–10.** *Retrieving a List of Scores from a Leaderboard*


    `-(void) retrieveScoresForPlayers:(NSArray*)players`

    `                        category:(NSString*)category`

    `                           range:(NSRange)range`

    `                     playerScope:(GKLeaderboardPlayerScope)playerScope`

    `                       timeScope:(GKLeaderboardTimeScope)timeScope`

    `{`

    `    GKLeaderboard* leaderboard = nil;`

    `    if ([players count] > 0)`

    `    {`

    `        leaderboard = [[[GKLeaderboard alloc] initWithPlayerIDs:players] autorelease];`

    `    }`

    `    else`

    `    {`

    `        leaderboard = [[[GKLeaderboard alloc] init] autorelease];`

    `        leaderboard.playerScope = playerScope;`

    `    }`


    `    if (leaderboard != nil)`

    `    {`

    `        leaderboard.timeScope = timeScope;`

    `        leaderboard.category = category;`

    `        leaderboard.range = range;`


    `        [leaderboard loadScoresWithCompletionHandler:`![images](images/U002.jpg)

    `        ^(NSArray* scores, NSError* error)`

    `        {`

    `            [self setLastError:error];`

    `            [delegate onScoresReceived:scores];`

    `        }];`

    `    }`

    `}`


    First, a `GKLeaderboard` object is initialized. Depending on whether the `players`
    array contains any players, the leaderboard may be initialized with a list of
    player identifiers to retrieve scores only for those players. Otherwise, the `playerScope`
    variable is used, which can be set to either `GKLeaderboardPlayerScopeGlobal`
    or `GKLeaderboardPlayerScoreFriendsOnly` to retrieve only friends'' scores.


    Then the leaderboard scope is further reduced by the `timeScope` parameter, which
    allows you to obtain the all-time high scores (`GKLeaderboardTimeScopeAllTime`),
    only those from the past week (`GKLeaderboardTimeScopeWeek`), or only today''s
    scores (`GKLeaderboardTimeScopeToday`).


    Of course, you also have to specify the category ID for the leaderboard; otherwise,
    `GKLeaderboard` wouldn''t know which leaderboard to retrieve the scores from.
    Finally, an `NSRange` parameter allows you to refine the score positions you''d
    like to retrieve. In this example, a range of 1 to 10 indicates that the top ten
    scores should be retrieved.


    Make sure that you limit the score retrieval using all these parameters (especially
    the `NSRange` parameter) to reasonably small chunks of data. While you could,
    it''s not recommended to retrieve all the scores of a leaderboard. If your game
    is played online a lot and many scores are submitted, you might be loading hundreds
    of thousands—if not millions or billions—of scores from the Game Center servers.
    That would cause a significant delay when retrieving scores.


    With the leaderboard object set up properly, the `loadScoresWithCompletionHandler`
    method takes over and asks the server for the scores. When the scores are received,
    it calls the delegate method with `onScoresReceived`, passing on the array of
    scores. The array contains objects of class `GKScore` sorted by leaderboard rank.
    The `GKScore` objects provide you with all the information you need, including
    the `playerID`, the `date` the score was posted, and its `rank`, `value`, and
    `formattedValue`, which you should use to display the score to the user.


    Fortunately for us, Apple provides a default leaderboard user interface. Instead
    of using the scores I just retrieved, I''m going to ignore them and use the `onScoresReceived`
    delegate method to bring up the built-in leaderboard view:


    `-(void) onScoresReceived:(NSArray*)scores`

    `{`

    `    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];`

    `    [gkHelper showLeaderboard];`

    `}`


    Game Kit has a `GKLeaderboardViewController` class, which is used to display the
    Game Center leaderboard user interface, as shown in [Listing 14–11](#Chapter14.html#list_14_11).


    **Listing 14–11.** *Showing the Leaderboard User Interface*


    `-(void) showLeaderboard`

    `{`

    `    GKLeaderboardViewController* leaderboardVC =`![images](images/U002.jpg)

    `        [[[GKLeaderboardViewController alloc] init] autorelease];`

    `    if (leaderboardVC != nil)`

    `    {`

    `        leaderboardVC.leaderboardDelegate = self;`

    `        [self presentViewController:leaderboardVC];`

    `    }`

    `}`


    The `leaderboardDelegate` is set to `self`, which means the `GameKitHelper` class
    must implement the `GKLeaderboardViewControllerDelegate` protocol. The first step
    is to add this protocol to the class''s interface, like so:


    `@interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate>`


    Then you must implement the `leaderboardViewControllerDidFinish` method, which
    is used to simply dismiss the view and to forward the event to the delegate:'
  trans: "\n### 排行榜\n\n在 `Tilemap12` 项目中，我添加了提交和获取排行榜分数的功能。我在 `TileMapLayer` 类的 `onPlayerInfoReceived`\
    \ 方法中接入了向 Game Center 提交模拟分数的逻辑，该分数归属于 `Playtime` 类别：\n\n```\n-(void) onPlayerInfoReceived:(NSArray*)players\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ submitScore:1234 category:@\"Playtime\"];\n}\n```\n\n列表 14–9 中展示的 `submitScore`\
    \ 方法实现在 `GameKitHelper` 中，并将 `onScoresSubmitted` 消息回调给委托对象。由于没有返回值需要传递，它仅通过 `success`\
    \ 值报告分数是否已成功发送且未出现错误。\n\n**列表 14–9.** *向排行榜提交分数*\n\n```\n-(void) submitScore:(int64_t)score\
    \ category:(NSString*)category\n{\n    GKScore* gkScore = [[[GKScore alloc] initWithCategory:category]\
    \ autorelease];\n    gkScore.value = score;\n    gkScore reportScoreWithCompletionHandler:![images\n\
    \    ^(NSError* error)\n    {\n        [self setLastError:error];\n\n        bool\
    \ success = (error == nil);\n        [delegate onScoresSubmitted:success];\n \
    \   }];\n}\n```\n\n分数值的类型是 `int64_t`，它与 `long long` 相同。这是一个 64 位的值，因此它可以存储一个极其巨大的数字——一个拥有\
    \ 19 位数字的数。这比常规的 32 位整数所能表示的值大了超过 40 亿倍！\n\n创建了一个临时的 `GKScore` 对象，并向其发送了 `autorelease`\
    \ 消息，因此你无需手动释放它。该对象使用你在 iTunes Connect 中定义的排行榜类别标识符进行初始化。在这个例子中，类别 ID 是 `Playtime`。此外，还为\
    \ `GKScore` 对象分配了分数值，然后调用其 `reportScoreWithCompletionHandler` 方法，该方法会将分数发送到 Game\
    \ Center 服务器和正确的排行榜。\n\n委托对象收到 `onScoresSubmitted` 消息后，会接着调用 `retrieveTopTenAllTimeGlobalScores`\
    \ 方法来获取前十名分数：\n\n```\n-(void) onScoresSubmitted:(bool)success\n{\n    if (success)\n\
    \    {\n        GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n\
    \        [gkHelper retrieveTopTenAllTimeGlobalScores];\n    }\n}\n```\n\n`GameKitHelper`\
    \ 类的 `retrieveTopTenAllTimeGlobalScores` 方法只是简单地封装了对 `retrieveScoresForPlayers`\
    \ 的调用，并向其传入预配置的参数：\n\n```\n-(void) retrieveTopTenAllTimeGlobalScores\n{\n    [self\
    \ retrieveScoresForPlayers:nil\n                          category:nil\n     \
    \                        range:NSMakeRange(1, 10)\n                       playerScope:GKLeaderboardPlayerScopeGlobal\n\
    \                         timeScope:GKLeaderboardTimeScopeAllTime];\n}\n```\n\n\
    你可以根据自己游戏的需求，随时添加更多用于获取分数的封装方法。由于有多种获取排行榜分数的方式和多个用于减少获取分数数量的过滤器，使用封装方法来减少人为错误的可能性是很有意义的。列表\
    \ 14–10 完整展示了 `retrieveScoresForPlayers` 方法。\n\n**列表 14–10.** *从排行榜获取分数列表*\n\n\
    ```\n-(void) retrieveScoresForPlayers:(NSArray*)players\n                    \
    \    category:(NSString*)category\n                           range:(NSRange)range\n\
    \                     playerScope:(GKLeaderboardPlayerScope)playerScope\n    \
    \                   timeScope:(GKLeaderboardTimeScope)timeScope\n{\n    GKLeaderboard*\
    \ leaderboard = nil;\n    if ([players count] > 0)\n    {\n        leaderboard\
    \ = [[[GKLeaderboard alloc] initWithPlayerIDs:players] autorelease];\n    }\n\
    \    else\n    {\n        leaderboard = [[[GKLeaderboard alloc] init] autorelease];\n\
    \        leaderboard.playerScope = playerScope;\n    }\n\n    if (leaderboard\
    \ != nil)\n    {\n        leaderboard.timeScope = timeScope;\n        leaderboard.category\
    \ = category;\n        leaderboard.range = range;\n\n        leaderboard loadScoresWithCompletionHandler:![images\n\
    \        ^(NSArray* scores, NSError* error)\n        {\n            [self setLastError:error];\n\
    \            [delegate onScoresReceived:scores];\n        }];\n    }\n}\n```\n\
    \n首先，初始化了一个 `GKLeaderboard` 对象。根据 `players` 数组是否包含玩家，排行榜可能会使用一个玩家标识符列表进行初始化，以便仅检索这些玩家的分数。否则，将使用\
    \ `playerScope` 变量，该变量可以设置为 `GKLeaderboardPlayerScopeGlobal` 或 `GKLeaderboardPlayerScoreFriendsOnly`，以仅检索好友的分数。\n\
    \n然后，通过 `timeScope` 参数进一步缩小排行榜的作用域，该参数允许你获取历史最高分（`GKLeaderboardTimeScopeAllTime`）、仅过去一周的分数（`GKLeaderboardTimeScopeWeek`），或仅当天的分数（`GKLeaderboardTimeScopeToday`）。\n\
    \n当然，你还需要为排行榜指定类别 ID；否则，`GKLeaderboard` 将不知道从哪个排行榜获取分数。最后，`NSRange` 参数允许你精确定位想要检索的分数排名范围。在本示例中，范围\
    \ 1 到 10 表示应检索前十分数。\n\n请确保使用所有这些参数（尤其是 `NSRange` 参数）将分数检索限制在合理的小数据块范围内。虽然你可以，但不建议检索排行榜的所有分数。如果你的游戏在线玩家众多，且提交了大量分数，你可能会从\
    \ Game Center 服务器加载成千上万——甚至数百万或数十亿——的分数。这会导致检索分数时出现显著延迟。\n\n正确设置排行榜对象后，`loadScoresWithCompletionHandler`\
    \ 方法接管控制权，并向服务器请求分数。当收到分数时，它会调用 `onScoresReceived` 委托方法，并将分数数组传递过去。该数组包含按排行榜排名排序的\
    \ `GKScore` 类对象。`GKScore` 对象为你提供了所需的所有信息，包括 `playerID`、分数提交的 `date`，以及 `rank`、`value`\
    \ 和 `formattedValue`，你应该使用这些信息向用户显示分数。\n\n对我们来说幸运的是，Apple 提供了一个默认的排行榜用户界面。我不会使用刚刚检索到的分数，而是忽略它们，并利用\
    \ `onScoresReceived` 委托方法来调出内置的排行榜视图：\n\n```\n-(void) onScoresReceived:(NSArray*)scores\n\
    {\n    GameKitHelper* gkHelper = [GameKitHelper sharedGameKitHelper];\n    [gkHelper\
    \ showLeaderboard];\n}\n```\n\nGame Kit 有一个 `GKLeaderboardViewController` 类，用于显示\
    \ Game Center 排行榜用户界面，如列表 14–11 所示。\n\n**列表 14–11.** *显示排行榜用户界面*\n\n```\n-(void)\
    \ showLeaderboard\n{\n    GKLeaderboardViewController* leaderboardVC = ![images](img/U002.jpg)\n\
    \        [[[GKLeaderboardViewController alloc] init] autorelease];\n    if (leaderboardVC\
    \ != nil)\n    {\n        leaderboardVC.leaderboardDelegate = self;\n        [self\
    \ presentViewController:leaderboardVC];\n    }\n}\n```\n\n`leaderboardDelegate`\
    \ 被设置为 `self`，这意味着 `GameKitHelper` 类必须实现 `GKLeaderboardViewControllerDelegate`\
    \ 协议。第一步是将此协议添加到类的接口中，如下所示：\n\n```\n@interface GameKitHelper : NSObject <GKLeaderboardViewControllerDelegate>\n\
    ```\n\n然后，你必须实现 `leaderboardViewControllerDidFinish` 方法，该方法用于简单地关闭视图并将事件转发给委托对象。\n"
- fmt: "`-(void) leaderboardViewControllerDidFinish:(GKLeaderboardViewController*)viewController`\n\
    `{`\n`    [self dismissModalViewController];`\n`    [delegate onLeaderboardViewDismissed];`\n\
    `}`\n\nNow there's a bit of behind-the-scenes magic going on. I've added a few\
    \ helper methods to `GameKitHelper` that deal specifically with presenting and\
    \ dismissing the various Game Kit view controllers making use of cocos2d's root\
    \ view controller. If you remember, cocos2d added a `RootViewController` class\
    \ to all projects beginning with cocos2d version 0.99.5 and newer, and this controller\
    \ will be used to display the Game Center views. Those methods are shown in [Listing\
    \ 14–12](#Chapter14.html#list_14_12).\n\n**Listing 14–12.** *Using Cocos2d's Root\
    \ View Controller to Present and Dismiss Game Kit Views*\n\n```\n-(UIViewController*)\
    \ getRootViewController\n{\n    return [UIApplication sharedApplication].keyWindow.rootViewController;\n\
    }\n\n-(void) presentViewController:(UIViewController*)vc\n{\n    UIViewController*\
    \ rootVC = [self getRootViewController];\n    [rootVC presentModalViewController:vc\
    \ animated:YES];\n}\n\n-(void) dismissModalViewController\n{\n    UIViewController*\
    \ rootVC = [self getRootViewController];\n    [rootVC dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\nThe `rootViewController` is a `UIWindow` property, and the main window\
    \ used by cocos2d is the `keyWindow` property of the `UIApplication` class. There's\
    \ only one catch: the current cocos2d project templates do not assign the new\
    \ root view controller to the `UIWindow`'s property, so normally it's unavailable\
    \ unless you expose it in the `AppDelegate` class itself. But there's a better\
    \ way to make the `rootViewController` accessible to all classes without requiring\
    \ to import the `AppDelegate` class. You'll have to open the project's `AppDelegate`\
    \ class and add the following line in the `applicationDidFinishLaunching` method,\
    \ just above the call to `[window makeKeyAndVisible]`:\n\n```\nwindow.rootViewController\
    \ = viewController;\n[window makeKeyAndVisible];\n```\n\nAfter you've done this,\
    \ the cocos2d `rootViewController` is accessible from anywhere through the `keyWindow.rootViewController`\
    \ property.\n\nThe `GKLeaderboardViewController` will load the scores it needs\
    \ automatically and present you with a view like the one in [Figure 14–5](#Chapter14.html#fig_14_5).\n\
    \n**NOTE:** The built-in Game Kit views are presented in portrait mode. If your\
    \ game uses a landscape orientation, the default views may not be ideal, because\
    \ players will have to rotate their devices to view leaderboards, achievements,\
    \ friends, and matchmaking views. In this case, you might have to consider writing\
    \ your own user interface to display Game Center information.\n\n![images](images/1405.jpg)\n\
    \n**Figure 14–5.** *The Game Kit leaderboard view*\n\n### Achievements\n\nIn the\
    \ Tilemap13 project, instead of showing the leaderboard, I'm calling the `GameKitHelper\
    \ showAchievements` method in the `onScoresReceived` method to bring up the Achievements\
    \ view ([Listing 14–13](#Chapter14.html#list_14_13)).\n\n**Listing 14–13.** *Showing\
    \ the Achievements View*\n\n```\n-(void) showAchievements\n{\n    GKAchievementViewController*\
    \ achievementsVC = \n        [[[GKAchievementViewController alloc] init] autorelease];\n\
    \    if (achievementsVC != nil)\n    {\n        achievementsVC.achievementDelegate\
    \ = self;\n        [self presentViewController:achievementsVC];\n    }\n}\n```\n\
    \nThis is very similar to showing the leaderboard view in [Listing 14–11](#Chapter14.html#list_14_11).\
    \ Once more, the `GameKitHelper` class also has to implement the proper protocol,\
    \ named `GKAchievementViewControllerDelegate`:\n\n```\n@interface GameKitHelper\
    \ : NSObject <GKLeaderboardViewControllerDelegate, \n    GKAchievementViewControllerDelegate>\n\
    ```\n\nThe protocol requires the `GameKitHelper` class to implement the `achievementViewControllerDidFinish`\
    \ method, which is also strikingly similar to the one used by the leaderboard\
    \ view controller:\n\n```\n-(void) achievementViewControllerDidFinish:(GKAchievementViewController*)viewControl\n\
    {\n    [self dismissModalViewController];\n    [delegate onAchievementsViewDismissed];\n\
    }\n```\n\nYou can see an example of the achievements view in [Figure 14–6](#Chapter14.html#fig_14_6),\
    \ in which one achievement is already unlocked.\n\n![images](images/1406.jpg)\n\
    \n**Figure 14–6.** *The Game Kit achievements view*\n\nSo, what else can you do\
    \ with achievements?\n\nObviously, you'll want to determine whether an achievement\
    \ has been unlocked, and actually you'll want to report all the progress a player\
    \ makes toward completing an achievement. For example, if the achievement's goal\
    \ is to eat 476 bananas, then you would report the progress to Game Center every\
    \ time the player eats a banana. In this example project, I'm simply checking\
