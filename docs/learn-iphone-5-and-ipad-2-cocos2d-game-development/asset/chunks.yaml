    \ to [Listing 13–3](#Chapter13.html#list_13_3)).\n\nThe `TablePart` class also\
    \ sets the body type to `b2_staticBody`, which makes each `TablePart` a nonmoving\
    \ object. This has two advantages, one being that Box2D does not need to perform\
    \ certain calculations on static objects and the other is simply that objects\
    \ colliding with a static body will not affect a static body's position or rotation\
    \ at all.\n\n**Listing 13–4.** *TablePart Class Implementation*\n\n```\n@implementation\
