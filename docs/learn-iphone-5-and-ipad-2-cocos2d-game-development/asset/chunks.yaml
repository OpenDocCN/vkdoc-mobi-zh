  trans: '

    # 滚动之乐


    延续上一章的游戏初始内容，现在我想将其打造成一款真正的射击游戏。首要任务是让玩家的飞船可控。加速度计控制在此场景下并不适用；虚拟手柄则更为合适。不过，我们不必重新发明轮子，将使用一个名为
    `SneakyInput` 的酷炫源代码包，为这款 `cocos2d` 游戏添加虚拟手柄。


    让玩家飞船移动只是其一。我们还希望背景能滚动，从而营造出向某一方向移动的视觉效果。为此，我们将自行实现视差滚动方案，因为 `CCParallaxNode`
    存在局限，无法支持无限滚动的视差背景。


    此外，我将结合你在前一章学到的纹理图集和精灵批处理知识进行讲解。游戏中所有图形将整合到同一个纹理图集中，因为使用纹理图集时无需单独对图像进行分组。


    ## 高级视差滚动


    我之前提到过，`CCParallaxNode` 的局限性在于它不支持无限滚动。针对这款射击游戏，我们将添加一个 `ParallaxBackground` 节点来实现这一功能。此外，它还将使用
    `CCSpriteBatchNode` 来加速背景图像的渲染。


    ### 将背景创建为条带


    首先，我想说明一下我是如何创建用于产生视差效果的背景条带的。这对于理解 `TexturePacker` 创建的纹理图集如何帮你节省内存和提升性能，以及如何节省单独定位各条带的时间至关重要。请看
    图 7-1；它展示了由多个独立视差层组成的海景背景图层。该图片也位于 `ScrollingWithJoy01` 项目的 Assets 文件夹中，文件名为 `background-parallax.xcf`。


    ![images](img/0701.jpg)


    **图 7-1.** *视差滚动背景的源图像*


    在图像编辑程序 Seashore 中，每条条带都位于独立的图层上。在 图 7-2 中你可以看到各个图层，如果查看 Assets 文件夹，你会注意到存在名为
    `bg0.png` 至 `bg6.png` 的图片，它们对应组成背景的七条独立条带。


    采用这种方式创建视差背景图像有若干原因。你可以整体创建图像，但又能将每个图层保存为独立文件。所有这些文件的大小均为 960×640 像素，乍看之下可能有些浪费。但你不会将这些独立图像直接添加到游戏中，而是将它们放入纹理图集。由于
    `TexturePacker` 会去除每张图像周围透明的空白区域，它会将各条带压缩至最小尺寸。你在 图 7-3 中可以看到这一点。


    ![images](img/0702.jpg)


    **图 7-2.** *背景的每条条带位于独立图层上。这有助于创建独立图像并在游戏中进行定位。*


    ![images](img/0703.jpg)


    **图 7-3.** *背景条带在纹理图集中的呈现效果*


    将条带分割成独立图像不仅有助于按正确的 z 顺序绘制图像。严格来说，图像 `bg5.png` 和 `bg6.png` 可以处于相同的 z 顺序，因为它们并不重叠，但我还是选择将它们保存为单独的文件。在
    图 7-3 中，你可以看到这两个文件作为最上方的两条条带。你会发现它们在纹理图集中实际占用的空间非常小，这是因为 `TexturePacker` 能够移除这些图像周围大部分透明的部分。


    现在假设我将这两条条带保留在同一张 960×640 的图像中——一条位于图像顶部，另一条位于底部，两者之间留有大片的透明区域。`TexturePacker`
    无法移除这两个精灵之间的透明部分，因此它们会以 960×640 的完整图像保留在纹理图集中，这比作为独立图像所占用的空间要大得多。


    将条带分割成独立图像也有助于维持高帧率。iOS 设备的**填充率**（即每帧能绘制的像素数量）非常有限。由于图像可能相互重叠，而且这种情况经常发生，iOS
    设备通常每帧需要多次绘制同一个像素。极端情况是一张全屏图像叠在另一张全屏图像之上。你只能看到两张图像中的一张，但设备实际上必须同时绘制这两张。这种技术术语称为**过度绘制**。将背景分离成尽可能少重叠的独立条带，可以减少需要绘制的像素数量。


    **提示：** 使用 16 位纹理（`RGB565`、`RGBA5551` 和 `RGBA4444`）乃至 PVR 压缩纹理，可以提升游戏的渲染性能。当然，这会损失一些图像质量，但在许多情况下，这种损失在
    iPhone 屏幕上几乎难以察觉，尽管在电脑屏幕上可能会看到一些伪影。`TexturePacker` 让你能够降低图像的颜色深度，同时通过抖动技术保留大部分图像质量。如果遇到加载时间过长的问题，值得尝试将图像保存为压缩的
    `pvr.czz` 格式，因为这种特定图像文件格式的加载速度明显快于其他格式。

