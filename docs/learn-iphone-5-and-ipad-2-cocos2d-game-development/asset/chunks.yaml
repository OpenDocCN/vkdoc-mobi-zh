    ## Collision Detection\n\nYou may be surprised to see that collision detection\
    \ can be as simple as in [Listing 4–14](#Chapter04.html#list_4_14). Admittedly,\
    \ this only checks the distance between the player and all spiders, which makes\
    \ this type of collision detection a radial check. For this type of game, it’s\
    \ sufficient. The call to `[self checkForCollision]` is added to the end of the\
    \ `-(void) update:(ccTime)delta` method.\n\n**Listing 4–14.** *A Simple Range-Check\
    \ or Radial Collision-Check Suffices*\n\n```\n-(void) checkForCollision\n{\n \
    \   // Assumption: both player and spider images are squares.\n    float playerImageSize\
    \ = [player texture].contentSize.width;\n    float spiderImageSize = [[spiders\
    \ lastObject] texture].contentSize.width;\n    float playerCollisionRadius = playerImageSize\
    \ * 0.4f;\n    float spiderCollisionRadius = spiderImageSize * 0.4f;\n\n    //\
    \ This collision distance will roughly equal the image shapes.\n    float maxCollisionDistance\
    \ = playerCollisionRadius + spiderCollisionRadius;\n\n    int numSpiders = [spiders\
    \ count];\n    for (int i = 0; i < numSpiders; i++)\n    {\n        CCSprite*\
    \ spider = [spiders objectAtIndex:i];\n\n        if ([spider numberOfRunningActions]\
    \ == 0)\n        {\n            // This spider isn't even moving so we can skip\
    \ checking it.\n            continue;\n        }\n\n        // Get the distance\
    \ between player and spider.\n        float actualDistance = ccpDistance(player.position,\
    \ spider.position);\n\n        // Are the two objects closer than allowed?\n \
    \       if (actualDistance < maxCollisionDistance)\n        {\n            //\
    \ Game Over (just restart the game for now)\n            [self resetSpiders];\n\
    \            break;\n        }\n    }\n}\n```\n\nThe image sizes of the player\
    \ and spider are used as hints for the collision radii. The approximation is good\
    \ enough for this game. If you check the `DoodleDrop05` project, you’ll also notice\
    \ that I’ve added a debug drawing method that renders the collision radii for\
    \ each sprite.\n\n**NOTE:** The correct plural of radius is *radii*. You can also\
    \ say *radiuses* without being expelled from the country, though I wouldn’t dare\
    \ say it in the vicinity of programmers. Less critically but also hotly debated\
    \ is the plural of vertex, which is correctly spelled *vertices*, but *vertexes*\
    \ is also deemed acceptable.\n\nI’m iterating over all the spiders but ignoring\
    \ those that aren’t moving at the moment because they’ll definitely be out of\
    \ range. The distance between the current spider and the player is calculated\
    \ by the `ccpDistance` method. This is another undocumented but fully supported\
    \ cocos2d method. You can find these and other useful math functions in the `CGPointExtension`\
    \ files in the `cocos2d/Support` group in the Xcode project.\n\nThe resulting\
    \ distance is then compared to the sum of the player’s and spider’s collision\
    \ radius. If the actual distance is smaller than that, a collision has occurred.\
    \ Since no game-over has been implemented, I chose to simply reset the spiders\
    \ to restart the game.\n\n## Labels and Bitmap Fonts\n\nLabels are the second\
    \ most important graphical element of cocos2d games, right after sprites. The\
