- fmt: '#### [Chapter 10](#Chapter10.html#ch10), “Working with Tilemaps”


    Infinitely jumping upward, you’ll apply what you’ve learned from the side-scrolling
    game in portrait mode to create another popular iOS game genre.


    #### [Chapter 11](#Chapter11.html#ch11), “Isometric Tilemaps”


    Since `cocos2d` supports the `TMX` file format, you’ll take a look at how to create
    tile-based games using the `Tiled` editor.


    #### [Chapter 12](#Chapter12.html#ch12), “Physics Engines”


    Directing where things go with the move of your fingertips—you’ll learn here how
    that’s done.


    #### [Chapter 13](#Chapter13.html#ch13), “Pinball Game”


    This is a primer on using the `Chipmunk` and `Box2d` physics engines—and the crazy
    things you can do with them.


    #### [Chapter 14](#Chapter14.html#ch14), “Game Center”


    This time, you’ll use real physics for a gravity-defying, planet-bouncing, ball-shooter
    in space. It’s not going to be realistic, but it’s going to have real physics.
    It’s a conundrum, maybe, but fun in any case.


    #### [Chapter 15](#Chapter15.html#ch15), “Cocos2d with UIKit Views”


    This chapter goes into depth on how to mix and match `cocos2d` with regular Cocoa
    Touch, particularly UIKit views. You’ll learn how to add UIKit views to a `cocos2d`
    game or, conversely, how to make use of `cocos2d` in an existing UIKit app.


    #### [Chapter 16](#Chapter16.html#ch16), “Kobold2D Introduction”


    `Kobold2D` is my take on improving the `cocos2d` game engine by adding popular
    libraries and combining them into a single, ready-to-use package. In this chapter,
    you’ll learn how to set up new `Kobold2D` projects and the role of Lua scripting
    in `Kobold2D`, and you’ll get a primer on 3D game development with `cocos3d`.


    #### [Chapter 17](#Chapter17.html#ch17), “Conclusion”


    This is where the book ends. Worry not, your journey won’t. You’ll get inspiration
    on where to go from here.


    #### Where to Get the Book’s Source Code?


    One of the most frequently asked questions following the release of the first
    edition of this book was about where to get the book’s source code. I’ve added
    this little section to answer this question.


    You can get the book’s source code on the Apress web site under Source Code/Downloads
    if you follow this link: [`www.apress.com/9781430233039`](http://www.apress.com/9781430233039).
    Alternatively, you can download the source code in the Downloads section on Cocos2D
    Central: `cocos2d-central.com/files/file/2-source-code`.


    Of course, you can always type the code directly from the book if you prefer.


    ### Questions and Feedback


    I do hope I get the right mixture of easing you into `cocos2d` and iOS game development
    while challenging you with advanced game-programming concepts.


    If at any time I fail and leave you wondering, please feel free to ask your questions
    on Cocos2D Central ([`www.cocos2d-central.com`](http://www.cocos2d-central.com)).
    I’ll also continue to post frequently about `cocos2d` news and developments on
    the Learn Cocos2D companion web site for this book at [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com).
    Your feedback is always welcome!


    ## Chapter 2


    ## Getting Started


    I will get you up to speed and developing `cocos2d` games as quickly as possible.
    By the end of this chapter, you’ll be able to create new `cocos2d` projects based
    on the supplied Xcode project templates. I’ll also introduce you to the important
    bits of knowledge you need to keep in mind during game development. And since
    it’s always been a big source of confusion, I’ll explain how memory management
    works in the context of `cocos2d`, ideally helping you avoid some of the common
    pitfalls. At the end of this chapter, you’ll have a first `cocos2d` project based
    on a project template up and running.


    ### What You Need to Get Started


    In this section, I’ll quickly walk you through the requirements and necessary
    steps to get started. Getting registered as an iOS developer and creating the
    necessary provisioning profiles are both excellently documented by Apple, so I
    won’t re-create that detailed information here.


    #### System Requirements


    These are the minimum hardware and software requirements for developing iOS applications:


    *   Intel-based Mac computer with 1GB RAM

    *   Mac OS X 10.6 (Snow Leopard) or greater

    *   Any iOS device


    For development, any Intel-based Mac computer suffices. Even the Mac mini and
    MacBook Air are perfectly fine for developing iOS applications and games. I do
    recommend having 2GB of RAM installed. It’ll make using your computer smoother,
    especially since game development tools often require much more memory than most
    other software. You’ll be handling a lot of images, audio files, and program code,
    and you’ll probably be running all these tools in parallel.


    Note that Mac OS X 10.6 is mandatory for iOS development since the release of
    the iOS SDK 4 in June 2010\. With the release of Mac OS X 10.7 Lion, you can expect
    that eventually it will become a requirement for iOS development. As a developer
    with Apple, you’re regularly required to be using the latest OS X version.


    If you are running an older version of Mac OS X, please consult the Max OS X Technical
    Specifications web site ([`www.apple.com/macosx/specs.html`](http://www.apple.com/macosx/specs.html))
    to learn whether your Mac meets the system requirements and how to purchase and
    upgrade to the latest Mac OS X version.


    #### Register as an iOS Developer


    If you haven’t done so yet, you might want to register yourself as an iOS developer
    with Apple. Access to the iOS Developer Program costs $99 per year. If you plan
    to submit Mac OS X apps to the Mac App Store, you will also have to register as
    a Mac OS X developer, which costs an additional $99 per year.


    As a registered developer, you get access to the iOS SDK, Xcode, and the iOS Developer
    Portal where you have to set up your development devices and provisioning profiles
    in order to deploy your app to iOS devices. You also get access to iTunes Connect
    where you can manage your contracts, manage and submit your apps, and review financial
    reports. In addition, you’ll be offered preview (beta) versions of Apple software.
    Registered Mac OS X developers will also get free access to the latest Mac OS.


    You can register as an iOS developer at [`http://developer.apple.com/programs/ios`](http://developer.apple.com/programs/ios).


    To register as a Mac OS X developer, go to [`http://developer.apple.com/programs/mac`](http://developer.apple.com/programs/mac).


    **Tip:** You can also get Xcode from the Mac App Store for free. This download
    includes the iOS SDK and Mac OS X SDK. You’ll be able to develop `cocos2d` apps
    for iOS and Mac OS X. The catch: you cannot run your iOS apps on an iOS device
    unless you register as an iOS developer, so you’ll be limited to using the iOS
    Simulator. You will also not be able to submit your app to the iOS App Store or
    Mac App Store until you sign up as a registered iOS respectively Mac OS developer.


    #### Certificates and Provisioning Profiles


    Eventually you’ll want to deploy the games you’re building onto your iOS device.
    To do so, you must create an iOS development certificate, register your iOS device,
    and enable it for development. Finally, you’ll create development or distribution
    provisioning profiles, download them to your computer, and set up each Xcode project
    to use them.


    All of these steps are well explained on the iOS Provisioning Portal. Apple has
    done an excellent job at documenting these steps on the How To tabs of each section
    of the Provisioning Portal.


    The iOS Provisioning Portal is accessible for registered iOS developers at [`http://developer.apple.com/ios/manage/overview/index.action`](http://developer.apple.com/ios/manage/overview/index.action).'
