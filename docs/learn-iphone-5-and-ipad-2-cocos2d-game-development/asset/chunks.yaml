    ![images](images/0404.jpg)


    **Figure 4–4.** *Adding new CCNode-derived classes is best done using the class
    templates provided by cocos2d. In this case, we want the CCNode class to be a
    subclass of CCLayer since we’re setting up a new scene.*


    I prefer to name classes by function and in a generic way. I’m using GameScene.m
    in this case. It’s going to be the scene where the DoodleDrop game play takes
    place, so that name seems appropriate. Be sure that the DoodleDrop target check
    box is checked. If you’re using Xcode 3, the Also create “GameScene.h” check box
    must also be checked. Targets are Xcode’s way of creating more or less different
    versions of the executable. For example, the iPad version of a game is usually
    created as a separate target. In this case, we have only one target, but once
    you create an iPad target, you want to make sure that, for example, the iPad’s
    high-resolution images aren’t accidentally added to the iPhone/iPod touch target.


    **NOTE:** Not reviewing the target check boxes can lead to all kinds of issues,
    from compile errors to “file not found” errors or crashes during game play when
    files haven’t been added to the targets that need them. Or you might simply waste
    space by adding files to targets that don’t need them at all, for example by adding
    iPad and iPhone 4 high-res images to regular iPhone/iPod touch targets.


    ![images](images/0405.jpg)


    **Figure 4–5.** *Naming the new scene and making sure it’s added to the appropriate
    targets*


    At this point, our `GameScene` class is empty, and the first thing we need to
    do to set it up as a scene is to add the `+(id) scene` method to it. The code
    we’ll plug in is essentially the same as in [Chapter 3](#Chapter03.html#ch3),
    with only the layer’s class name changed. What you’ll almost always need in any
    class are the `–(id) init` and `–(void) dealloc` methods, so it makes sense to
    add them right away. I’m also a very cautious programmer and decided to add the
    logging statements introduced in [Chapter 3](#Chapter03.html#ch3). The resulting
    GameScene.h is shown in [Listing 4–1](#Chapter04.html#list_4_1), and GameScene.m
    is in [Listing 4–2](#Chapter04.html#list_4_2).


    **Listing 4–1.** *GameScene.h with the Scene Method*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface GameScene : CCLayer`

    `{`

    `}`


    `+(id) scene;`


    `@end`


    **Listing 4–2.** *GameScene.m with the Scene Method and Standard Methods Added,
    Including Logging*


    `#import "GameScene.h"`


    `@implementation GameScene`


    `+(id) scene`

    `{`

    `    CCScene *scene = [CCScene node];`

    `    CCLayer* layer = [GameScene node];`

    `    [scene addChild:layer];`

    `    return scene;`

    `}`


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);`

    `    }`


    `    return self;`

    `}`


    `-(void) dealloc`

    `{`

    `    CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);`


    `    // never forget to call [super dealloc]`

    `    [super dealloc];`

    `}`


    `@end`


    Now you can safely delete the `HelloWorldScene` class. When asked, select the
    **Also Move to Trash** option to remove the file from the hard drive as well,
    not just from the Xcode project. Select both files and choose **Edit** ![images](images/U001.jpg)
    **Delete**, or right-click the files and choose **Delete** from the context menu.
    With the `HelloWorldScene` class gone, you have to modify `DoodleDropAppDelegate.m`
    to change any references to `HelloWorldScene` to `GameScene`. [Listing 4–3](#Chapter04.html#list_4_3)
    highlights the necessary changes to the `#import` and `runWithScene` statements.
    I also changed the device orientation to portrait mode since the game is designed
    to work best in that mode.


    **Listing 4–3.** *Changing DoodleDropAppDelegate.m File to Use the GameScene Class
    Instead of HelloWorldScene*


    `// replace the line #import “HelloWorldScene.h” with this one:`

    **`#import "GameScene.h"`**


    `- (void) applicationDidFinishLaunching:(UIApplication*)application`

    `{`

    `    …`


    `    // Sets Portrait mode`

    **`    [director setDeviceOrientation:kCCDeviceOrientationPortrait];`**


    `    …`


    `    // replace HelloWorld with GameScene`

    `[[CCDirector sharedDirector] runWithScene:` **`[GameScene scene]`**`];`

    `}`


    Compile and run, and you should end up with…a blank scene. Success! If you run
    into any problems, compare your project with the DoodleDrop01 project that accompanies
    this book.


    **NOTE:** Starting with cocos2d version 0.99.5, a file named GameConfig.h was
    added to the cocos2d Xcode project templates. If portrait mode isn’t working for
    you and you started a new project based on one of the cocos2d Xcode project templates,
    it’s probably because the game defaults to autorotation. If you see `#define GAME_AUTOROTATION
    kGameAutorotationUIViewController` in *GameConfig.h*, you have to change it to
    this line in order to disable autorotation: `#define GAME_AUTOROTATION kGameAutorotationNone`.'
  trans: "\n### 分步项目设置\n\n现在启动 `Xcode`，我将引导您完成创建第一个 cocos2d 游戏的步骤。在 `Xcode` 中，选择 **文件\
    \ ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建项目…**，然后选择 cocos2d 应用程序模板，如图\
    \ 4–2 所示。当系统提示您输入新项目的名称时，请输入 **DoodleDrop**，并在必要时选择合适的位置来保存项目。`Xcode` 会自动创建一个名为\
    \ `DoodleDrop` 的子文件夹，因此您无需手动创建该文件夹。\n\n![images](img/0402.jpg)\n\n**图 4–2.** *从\
    \ cocos2d 应用程序模板创建项目。*\n\n`Xcode` 应会显示一个类似于图 4–3 的项目视图。根据您使用的 cocos2d 和 `Xcode`\
    \ 版本，可能会显示更多文件，或者组名可能略有不同。\n\n我已经展开了 `Classes` 和 `Resources` 组，因为您将分别在其中添加源代码和游戏资源文件。任何非源代码的内容都被视为资源，无论是图像、音频文件、文本文件还是\
    \ `plist`。这种分组并非严格必要，但如果将相似的文件保持在一起，确实能让您更轻松地浏览项目。\n\n![images](img/0403.jpg)\n\
    \n**图 4–3.** *游戏开始吧！此时的 `DoodleDrop` 项目基于 `HelloWorld` cocos2d 项目模板。请确保后续将文件相应地添加到\
    \ `Classes` 和 `Resources` 组中，以保持游戏项目的井然有序。*\n\n接下来您面临一个选择：是直接使用现有的 `HelloWorldScene`，稍后再重命名它？还是通过额外的步骤创建自己的场景来替换\
    \ `HelloWorldScene`？我选择了后者，因为最终您无论如何都需要添加新场景，所以现在学习基本方法并从头开始是个好主意。\n\n确保选中 `Classes`\
    \ 组，然后选择 **文件 ![images](img/U001.jpg) 新建 ![images](img/U001.jpg) 新建文件…**，或右键单击\
    \ `Classes` 文件夹并选择 **新建文件…**，打开如图 4–4 所示的新建文件对话框。由于 cocos2d 为最重要的节点提供了类模板，不使用它们实在可惜。从\
    \ cocos2d 用户模板部分，选择 `CCNode` 类，点击 **下一步**，并确保其设置为 **CCLayer 的子类**，然后再次点击 **下一步**\
    \ 以调出如图 4–5 所示的保存文件对话框。\n\n![images](img/0404.jpg)\n\n**图 4–4.** *添加新的 `CCNode`\
    \ 派生类最好使用 cocos2d 提供的类模板。在本例中，我们希望 `CCNode` 类是 `CCLayer` 的子类，因为我们正在设置一个新场景。*\n\
    \n我倾向于按功能并以通用方式命名类。这里我使用的是 `GameScene.m`。它将是 `DoodleDrop` 游戏玩法发生的场景，因此这个名称很合适。请确保选中\
    \ `DoodleDrop` 目标复选框。如果您使用的是 `Xcode 3`，则还必须选中 **同时创建 “GameScene.h”** 复选框。目标是 `Xcode`\
    \ 创建可执行文件不同版本的一种方式。例如，游戏的 iPad 版本通常作为一个单独的目标创建。在本例中，我们只有一个目标，但一旦您创建了 iPad 目标，就需要确保，例如，iPad\
    \ 的高分辨率图像不会意外添加到 iPhone/iPod touch 目标中。\n\n**注意：** 不检查目标复选框可能会导致各种问题，从编译错误到“文件未找到”错误，或者在游戏过程中因文件未添加到所需目标而导致崩溃。或者，您也可能仅仅因为将文件添加到不需要它们的目标（例如将\
    \ iPad 和 iPhone 4 的高分辨率图像添加到普通 iPhone/iPod touch 目标）而浪费空间。\n\n![images](img/0405.jpg)\n\
    \n**图 4–5.** *命名新场景并确保将其添加到适当的目标*\n\n此时，我们的 `GameScene` 类是空的，我们需要做的第一件事是添加 `+(id)\
    \ scene` 方法来将其设置为场景。我们将插入的代码与第 3 章 中的代码基本相同，仅更改了层的类名。在任何类中，您几乎总是需要 `-(id) init`\
    \ 和 `-(void) dealloc` 方法，因此立即添加它们是有意义的。我也是非常谨慎的程序员，决定添加第 3 章 中介绍的日志记录语句。生成的 `GameScene.h`\
    \ 如代码清单 4–1 所示，`GameScene.m` 如代码清单 4–2 所示。\n\n**代码清单 4–1.** *包含场景方法的 `GameScene.h`*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n@interface\
    \ GameScene : CCLayer\n{\n}\n\n+(id) scene;\n\n@end\n```\n\n**代码清单 4–2.** *包含场景方法以及包括日志记录在内的标准方法的\
    \ `GameScene.m`*\n\n```\n#import \"GameScene.h\"\n\n@implementation GameScene\n\
    \n+(id) scene\n{\n    CCScene *scene = [CCScene node];\n    CCLayer* layer = [GameScene\
    \ node];\n    [scene addChild:layer];\n    return scene;\n}\n\n-(id) init\n{\n\
    \    if ((self = [super init]))\n    {\n        CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd),\
    \ self);\n    }\n\n    return self;\n}\n\n-(void) dealloc\n{\n    CCLOG(@\"%@:\
    \ %@\", NSStringFromSelector(_cmd), self);\n\n    // 切勿忘记调用 [super dealloc]\n\
    \    [super dealloc];\n}\n\n@end\n```\n\n现在您可以安全地删除 `HelloWorldScene` 类。当系统询问时，选择\
    \ **也移动到废纸篓** 选项，将文件从硬盘驱动器以及 `Xcode` 项目中一并移除。选择这两个文件，然后选择 **编辑 ![images](img/U001.jpg)\
    \ 删除**，或者右键单击文件并从上下文菜单中选择 **删除**。删除 `HelloWorldScene` 类后，您需要修改 `DoodleDropAppDelegate.m`，将对\
    \ `HelloWorldScene` 的所有引用更改为 `GameScene`。代码清单 4–3 突出显示了对 `#import` 和 `runWithScene`\
    \ 语句的必要更改。我还将设备方向更改为纵向模式，因为该游戏设计为该模式下效果最佳。\n\n**代码清单 4–3.** *修改 `DoodleDropAppDelegate.m`\
    \ 文件以使用 `GameScene` 类而非 `HelloWorldScene`*\n\n```\n// 将 #import \"HelloWorldScene.h\"\
    \ 这一行替换为此处：\n#import \"GameScene.h\"\n\n- (void) applicationDidFinishLaunching:(UIApplication*)application\n\
    {\n    …\n\n    // 设置纵向模式\n    [director setDeviceOrientation:kCCDeviceOrientationPortrait];\n\
    \n    …\n\n    // 将 HelloWorld 替换为 GameScene\n[[CCDirector sharedDirector] runWithScene:\
    \ [GameScene scene]];\n}\n```\n\n编译并运行，您应该会看到一个……空白场景。成功了！如果您遇到任何问题，请将您的项目与本书附带的\
    \ `DoodleDrop01` 项目进行比较。\n\n**注意：** 从 cocos2d 版本 0.99.5 开始，一个名为 `GameConfig.h`\
    \ 的文件被添加到 cocos2d `Xcode` 项目模板中。如果您发现纵向模式不起作用，并且您是根据某个 cocos2d `Xcode` 项目模板创建的新项目，那很可能是因为游戏默认启用了自动旋转。如果您在\
    \ `GameConfig.h` 中看到 `#define GAME_AUTOROTATION kGameAutorotationUIViewController`，您需要将其更改为以下代码以禁用自动旋转：`#define\
    \ GAME_AUTOROTATION kGameAutorotationNone`。\n"
- fmt: "### Adding the Player Sprite\n\nNext you’ll add the player sprite and use\
    \ the accelerometer to control its actions. To add the player image, select the\
    \ **Resources** group in Xcode and select **File** ![images](images/U001.jpg)![images](images/U001.jpg)\
    \ **Add Files to “DoodleDrop”…** or, alternatively, right-click and from the context\
    \ menu pick **Add Files to “DoodleDrop”…** to open the file picker dialog. The\
    \ player image `alien.png` is located in the **Resources** folder of the DoodleDrop\
    \ project supplied with the book. You can also choose your own image, as long\
    \ as it’s 64 by 64 pixels in size.\n\nXcode will then ask you details about how\
    \ and where to add the files, as in [Figure 4–6](#Chapter04.html#fig_4_6). Make\
    \ sure the **Add To Targets** check boxes are set for each target that will use\
    \ the files, which in this case is only the DoodleDrop target. The defaults are\
    \ good enough.\n\n**TIP:** The preferred image format for iOS games is PNG (which\
    \ stands for Portable Network Graphics). It’s a compressed file format, but unlike\
    \ JPG, the compression is lossless, retaining all pixels of the original image\
    \ unchanged. Although you can also save JPEG files without compression, the same\
    \ image in PNG format is typically smaller than an uncompressed JPEG file. This\
    \ affects only the app size, not the memory (RAM) usage of the textures. In [Chapter\
    \ 16](#Chapter16.html#ch16), you’ll also learn about TexturePacker, a tool that\
    \ manages images for you. It allows you to convert images into various compressed\
    \ formats or reduce the color depth while retaining the best possible image quality\
    \ through dithering and other techniques.\n\n![images](images/0406.jpg)\n\n**Figure\
    \ 4–6.** *You’ll see this dialog whenever you add resource files. In most cases\
    \ you should use these default settings.*\n\nNow we’ll add the player sprite to\
    \ the game scene. I decided to add it as a `CCSprite*` member variable to the\
    \ `GameScene` class. This is easier for now, and the game is simple enough for\
    \ everything to go into the same class. Generally, that’s not the recommended\
    \ approach, so the projects following this one will create separate classes for\
    \ individual game components as a matter of good code design.\n\n[Listing 4–4](#Chapter04.html#list_4_4)\
    \ shows the addition of the `CCSprite*` member to the GameScene header file.\n\
    \n**Listing 4–4.** *The CCSprite* Player Is Added as a Member Variable to the\
    \ GameScene Class*\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\
    \n\n@interface GameScene : CCLayer\n{\n    CCSprite* player;\n}\n\n+(id) scene;\n\
    \n@end\n```\n\n[Listing 4–5](#Chapter04.html#list_4_5) contains the code I’ve\
    \ added to the `init` method to initialize the sprite, assign it to the member\
    \ variable, and position it at the bottom center of the screen. I’ve also enabled\
    \ accelerometer input.\n\n**Listing 4–5.** *Enabling Accelerometer Input and Creating\
    \ and Positioning the Player Sprite*\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n        CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\
    \n        self.isAccelerometerEnabled = YES;\n\n        player = [CCSprite spriteWithFile:@\"\
    alien.png\"];\n        [self addChild:player z:0 tag:1];\n\n        CGSize screenSize\
    \ = [[CCDirector sharedDirector] winSize];\n        float imageHeight = [player\
    \ texture].contentSize.height;\n        player.position = CGPointMake(screenSize.width\
    \ / 2, imageHeight / 2);\n    }\n\n    return self;\n}\n```\n\nThe player sprite\
    \ is added as a child with a tag of 1, which will later be used to identify and\
    \ separate the player sprite from all other sprites. Notice that I don’t retain\
    \ the player sprite. Since we’ll add it as a child to the layer, cocos2d will\
    \ retain it, and since the player sprite is never removed from the layer, that’s\
    \ sufficient to keep the player sprite without specifically retaining it. Not\
    \ retaining an object whose memory is managed by another class or object is called\
    \ *keeping a weak reference*.\n\n**CAUTION:** File names on iOS devices are case-sensitive.\
    \ If you try to load `Alien.png` or `ALIEN.PNG`, it will work in the simulator\
    \ but not on any iOS device because the real name is `alien.png` in all lowercase.\
    \ That’s why it’s a good idea to stick to a naming convention like rigorously\
    \ keeping all file names in all lowercase. Why lowercase? Because filenames in\
    \ all uppercase are typically harder to read.\n\nYou set the initial position\
    \ of the player sprite by centering the x position at half the screen width, which\
    \ puts the sprite in the center horizontally. Vertically we want the bottom of\
    \ the player sprite’s texture to align with the bottom of the screen. If you remember\
    \ from the previous chapter, you know that the sprite texture is centered on the\
    \ node’s position. Positioning the sprite vertically at 0 would cause the bottom\
    \ half of the sprite texture to be below the screen. That’s not what we want;\
    \ we want to move it up by half the texture height.\n\nThis is done by the call\
    \ to `[player texture].contentSize.height`, which returns the sprite texture’s\
    \ content size. What exactly is the content size? In [Chapter 3](#Chapter03.html#ch3),\
    \ I mentioned that the texture dimensions of iOS devices can only be powers of\
    \ two. But the actual image size may be less than the texture size. For example,\
    \ this is the case if the image is 100 by 100 pixels while the texture has to\
    \ be 128 by 128 pixels. The `contentSize` property of the texture returns the\
    \ original image’s size of 100 by 100 pixels. In most cases, you’ll want to work\
    \ with the content size, not the texture size. Even if your image is a power of\
    \ two, you should use `contentSize` because the texture might be a texture atlas\
    \ containing multiple images. Texture atlases are described in [Chapter 6](#Chapter06.html#ch6).\n\
    \nBy taking half of the image height and setting this as the position on the y-axis,\
    \ the sprite image will align neatly with the bottom of the screen.\n\n**TIP:**\
    \ It’s good practice to avoid using fixed positions wherever you can. If you simply\
    \ set the player position to `160,32`, you are making two assumptions you should\
    \ avoid. First, you’re assuming the screen width will be 320 pixels, but that\
    \ will not hold true for every iOS device. Second, you’re assuming that the image\
    \ height is 64 pixels, but that might change too. Once you start to make assumptions\
    \ like these, you’re forming a habit to do so throughout the project.\n\nThe way\
    \ I wrote the positioning code involves a bit more typing, but in the long run\
    \ this pays off big time. You can deploy to different devices and it’ll work,\
    \ and you can use different image sizes and it’ll work. There’s no need to change\
    \ this particular code anymore. One of the most time-consuming tasks a programmer\
    \ faces is having to change code that was based on assumptions.\n\nImagine yourself\
    \ three months down the road with lots of images and objects added to your game,\
    \ having to change all those fixed numbers to create an iPad version that obviously\
    \ also requires images of different sizes and then doing the same thing again\
    \ to adjust the game to the iPhone 4’s Retina Display. At that point, you have\
    \ three different Xcode projects you need to maintain and add features to. Eventually\
    \ it will lead to “copy & paste hell,” which is even more undesirable—don’t go\
    \ there!"
  raw: '### Adding the Player Sprite


    Next you’ll add the player sprite and use the accelerometer to control its actions.
    To add the player image, select the Resources group in Xcode and select **File**
    ![images](images/U001.jpg)![images](images/U001.jpg) **Add Files to “DoodleDrop”…**
    or, alternatively, right-click and from the context menu pick **Add Files to “DoodleDrop”…**
    to open the file picker dialog. The player image alien.png is located in the Resources
    folder of the DoodleDrop project supplied with the book. You can also choose your
    own image, as long as it’s 64 by 64 pixels in size.


    Xcode will then ask you details about how and where to add the files, as in [Figure
    4–6](#Chapter04.html#fig_4_6). Make sure the **Add To Targets** check boxes are
    set for each target that will use the files, which in this case is only the DoodleDrop
    target. The defaults are good enough.


    **TIP:** The preferred image format for iOS games is PNG (which stands for Portable
    Network Graphics). It’s a compressed file format, but unlike JPG, the compression
    is lossless, retaining all pixels of the original image unchanged. Although you
    can also save JPEG files without compression, the same image in PNG format is
    typically smaller than an uncompressed JPEG file. This affects only the app size,
    not the memory (RAM) usage of the textures. In [Chapter 16](#Chapter16.html#ch16),
    you’ll also learn about TexturePacker, a tool that manages images for you. It
    allows you to convert images into various compressed formats or reduce the color
    depth while retaining the best possible image quality through dithering and other
    techniques.


    ![images](images/0406.jpg)


    **Figure 4–6.** *You’ll see this dialog whenever you add resource files. In most
    cases you should use these default settings.*


    Now we’ll add the player sprite to the game scene. I decided to add it as a `CCSprite*`
    member variable to the `GameScene` class. This is easier for now, and the game
    is simple enough for everything to go into the same class. Generally, that’s not
    the recommended approach, so the projects following this one will create separate
    classes for individual game components as a matter of good code design.


    [Listing 4–4](#Chapter04.html#list_4_4) shows the addition of the `CCSprite*`
    member to the GameScene header file.


    **Listing 4–4.** *The CCSprite* Player Is Added as a Member Variable to the GameScene
    Class*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface GameScene : CCLayer`

    `{`

    **`    CCSprite* player;`**

    `}`


    `+(id) scene;`


    `@end`


    [Listing 4–5](#Chapter04.html#list_4_5) contains the code I’ve added to the `init`
    method to initialize the sprite, assign it to the member variable, and position
    it at the bottom center of the screen. I’ve also enabled accelerometer input.


    **Listing 4–5.** *Enabling Accelerometer Input and Creating and Positioning the
    Player Sprite*


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);`


    **`        self.isAccelerometerEnabled = YES;`**


    **`        player = [CCSprite spriteWithFile:@"alien.png"];`**

    **`        [self addChild:player z:0 tag:1];`**


    **`        CGSize screenSize = [[CCDirector sharedDirector] winSize];`**

    **`        float imageHeight = [player texture].contentSize.height;`**

    **`        player.position = CGPointMake(screenSize.width / 2, imageHeight / 2);`**

    `    }`


    `    return self;`

    `}`


    The player sprite is added as a child with a tag of 1, which will later be used
    to identify and separate the player sprite from all other sprites. Notice that
    I don’t retain the player sprite. Since we’ll add it as a child to the layer,
    cocos2d will retain it, and since the player sprite is never removed from the
    layer, that’s sufficient to keep the player sprite without specifically retaining
    it. Not retaining an object whose memory is managed by another class or object
    is called *keeping a weak reference*.


    **CAUTION:** File names on iOS devices are case-sensitive. If you try to load
    Alien.png or ALIEN.PNG, it will work in the simulator but not on any iOS device
    because the real name is alien.png in all lowercase. That’s why it’s a good idea
    to stick to a naming convention like rigorously keeping all file names in all
    lowercase. Why lowercase? Because filename in all uppercase are typically harder
    to read.


    You set the initial position of the player sprite by centering the x position
    at half the screen width, which puts the sprite in the center horizontally. Vertically
    we want the bottom of the player sprite’s texture to align with the bottom of
    the screen. If you remember from the previous chapter, you know that the sprite
    texture is centered on the node’s position. Positioning the sprite vertically
    at 0 would cause the bottom half of the sprite texture to be below the screen.
    That’s not what we want; we want to move it up by half the texture height.


    This is done by the call to `[player texture].contentSize.height`, which returns
    the sprite texture’s content size. What exactly is the content size? In [Chapter
    3](#Chapter03.html#ch3), I mentioned that the texture dimensions of iOS devices
    can only be powers of two. But the actual image size may be less than the texture
    size. For example, this is the case if the image is 100 by 100 pixels while the
    texture has to be 128 by128 pixels. The `contentSize` property of the texture
    returns the original image’s size of 100 by 100 pixels. In most cases, you’ll
    want to work with the content size, not the texture size. Even if your image is
    a power of two, you should use `contentSize` because the texture might be a texture
    atlas containing multiple images. Texture atlases are described in [Chapter 6](#Chapter06.html#ch6).


    By taking half of the image height and setting this as the position on the y-axis,
    the sprite image will align neatly with the bottom of the screen.


    **TIP:** It’s good practice to avoid using fixed positions wherever you can. If
    you simply set the player position to 160,32, you are making two assumptions you
    should avoid. First, you’re assuming the screen width will be 320 pixels, but
    that will not hold true for every iOS device. Second, you’re assuming that the
    image height is 64 pixels, but that might change too. Once you start to make assumptions
    like these, you’re forming a habit to do so throughout the project.


    The way I wrote the positioning code involves a bit more typing, but in the long
    run this pays off big time. You can deploy to different devices and it’ll work,
    and you can use different image sizes and it’ll work. There’s no need to change
    this particular code anymore. One of the most time-consuming tasks a programmer
    faces is having to change code that was based on assumptions.


    Imagine yourself three months down the road with lots of images and objects added
    to your game, having to change all those fixed numbers to create an iPad version
    that obviously also requires images of different sizes and then doing the same
    thing again to adjust the game to the iPhone 4’s Retina Display. At that point,
    you have three different Xcode projects you need to maintain and add features
    to. Eventually it will lead to “copy & paste hell,” which is even more undesirable—don’t
    go there!'
  trans: "\n### 添加玩家精灵\n\n接下来，你将添加玩家精灵，并使用加速度计来控制其行为。要添加玩家图像，请在 Xcode 中选择 **Resources**\
    \ 组，然后选择 **File** ![images](img/U001.jpg)![images](img/U001.jpg) **Add Files to\
    \ “DoodleDrop”…**，或者右键单击并从上下文菜单中选择 **Add Files to “DoodleDrop”…** 以打开文件选择对话框。玩家图像\
    \ `alien.png` 位于本书提供的 DoodleDrop 项目的 **Resources** 文件夹中。你也可以选择自己的图像，只要它的大小是 64\
    \ x 64 像素即可。\n\n随后 Xcode 会询问你添加文件的详细方式和位置，如 图 4–6 所示。确保为每个将使用这些文件的目标选中 **Add To\
    \ Targets** 复选框，在这种情况下，只有 DoodleDrop 目标。默认设置已经足够。\n\n**提示：** iOS 游戏的首选图像格式是 PNG（可移植网络图形格式）。它是一种压缩文件格式，但与\
    \ JPG 不同，这种压缩是无损的，可以保持原始图像的所有像素不变。虽然你也可以保存未压缩的 JPEG 文件，但相同图像的 PNG 格式通常比未压缩的 JPEG\
    \ 文件更小。这只会影响应用大小，不会影响纹理的内存（RAM）使用。在第 16 章中，你还会了解 TexturePacker，这是一个为你管理图像的工具。它允许你将图像转换为各种压缩格式，或者通过抖动和其他技术在保持尽可能好的图像质量的同时降低颜色深度。\n\
    \n![images](img/0406.jpg)\n\n**图 4–6.** *每次添加资源文件时都会看到此对话框。大多数情况下，你应该使用这些默认设置。*\n\
    \n现在我们将玩家精灵添加到游戏场景中。我决定将其作为 `CCSprite*` 成员变量添加到 `GameScene` 类中。目前这样做更简单，而且游戏足够简单，所有内容都可以放在同一个类中。通常，这不是推荐的方法，因此后续的项目会为单独的游戏组件创建独立的类，这是良好代码设计的体现。\n\
    \n代码清单 4–4 展示了将 `CCSprite*` 成员添加到 GameScene 头文件的过程。\n\n**代码清单 4–4.** *将 CCSprite*\
    \ Player 作为成员变量添加到 GameScene 类*\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"cocos2d.h\"\n\n@interface GameScene : CCLayer\n{\n    CCSprite* player;\n\
    }\n\n+(id) scene;\n\n@end\n```\n\n代码清单 4–5 包含了我添加到 `init` 方法中的代码，用于初始化精灵，将其赋值给成员变量，并将其定位在屏幕底部中央。同时启用了加速度计输入。\n\
    \n**代码清单 4–5.** *启用加速度计输入并创建和定位玩家精灵*\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n        CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\
    \n        self.isAccelerometerEnabled = YES;\n\n        player = [CCSprite spriteWithFile:@\"\
    alien.png\"];\n        [self addChild:player z:0 tag:1];\n\n        CGSize screenSize\
    \ = [[CCDirector sharedDirector] winSize];\n        float imageHeight = [player\
    \ texture].contentSize.height;\n        player.position = CGPointMake(screenSize.width\
    \ / 2, imageHeight / 2);\n    }\n\n    return self;\n}\n```\n\n玩家精灵作为子节点添加，标签为\
    \ 1，稍后将用于识别玩家精灵并将其与所有其他精灵区分开来。注意，我没有保留玩家精灵。由于我们将其作为子节点添加到图层，cocos2d 会保留它，并且因为玩家精灵从未从图层中移除，所以无需特意保留就足以保持玩家精灵的存在。不保留由另一个类或对象管理内存的对象称为*保持弱引用*。\n\
    \n**注意：** iOS 设备上的文件名是区分大小写的。如果你尝试加载 `Alien.png` 或 `ALIEN.PNG`，它在模拟器中可以运行，但在任何\
    \ iOS 设备上都不行，因为实际名称是全小写的 `alien.png`。因此，最好坚持使用诸如严格保持所有文件名全小写的命名约定。为什么用全小写？因为全大写的文件名通常更难阅读。\n\
    \n你通过将 x 位置居中于屏幕宽度一半处来设置玩家精灵的初始位置，这使精灵在水平方向上居中。在垂直方向上，我们希望玩家精灵纹理的底部与屏幕底部对齐。如果你还记得上一章的内容，就知道精灵纹理是围绕节点位置居中的。将精灵垂直定位在\
    \ 0 会导致精灵纹理的下半部分位于屏幕下方。这不是我们想要的；我们想将其向上移动半个纹理高度。\n\n这是通过调用 `[player texture].contentSize.height`\
    \ 实现的，该方法返回精灵纹理的内容大小。内容大小到底是什么？在第 3 章中，我提到 iOS 设备的纹理尺寸只能是 2 的幂。但实际图像大小可能小于纹理大小。例如，如果图像是\
    \ 100 x 100 像素，而纹理必须是 128 x 128 像素，就会出现这种情况。纹理的 `contentSize` 属性返回原始图像的尺寸，即 100\
    \ x 100 像素。大多数情况下，你会希望使用内容大小，而不是纹理大小。即使你的图像是 2 的幂，你也应该使用 `contentSize`，因为纹理可能是一个包含多个图像的纹理图集。纹理图集将在第\
    \ 6 章中描述。\n\n通过取图像高度的一半并将其设置为 y 轴上的位置，精灵图像将与屏幕底部整齐对齐。\n\n**提示：** 在可能的情况下避免使用固定位置是一个好习惯。如果你简单地将玩家位置设置为\
    \ `160,32`，你就做出了两个应该避免的假设。首先，你假设屏幕宽度为 320 像素，但这并不适用于所有 iOS 设备。其次，你假设图像高度为 64 像素，但这也可能改变。一旦你开始做出这样的假设，你就会在整个项目中形成这样做的习惯。\n\
    \n我编写定位代码的方式涉及更多的输入，但从长远来看，这会带来巨大的回报。你可以部署到不同的设备上，它都能正常工作；你也可以使用不同尺寸的图像，它也能正常工作。再也不需要更改这段特定的代码了。程序员面临的最耗时的任务之一就是修改基于假设编写的代码。\n\
    \n想象一下，三个月后，你的游戏中添加了大量图像和对象，你必须更改所有这些固定数字，以创建一个显然也需要不同尺寸图像的 iPad 版本，然后为了适配 iPhone\
    \ 4 的 Retina 显示屏再次做同样的事情。到那时，你会有三个不同的 Xcode 项目需要维护和添加功能。最终，这将导致“复制粘贴地狱”，这是更不可取的——千万别走到那一步！\n"
- fmt: "### Accelerometer Input\n\nOne last step, and then we should be done tilting\
    \ the player sprite around. As I demonstrated in [Chapter 3](#Chapter03.html#ch3),\
    \ you have to add the accelerometer method to the layer that receives accelerometer\
    \ input. Here I use the `acceleration.x` parameter and add it to the player’s\
    \ position; multiplying by 10 is to speed up the player’s movement.\n\n```\n-(void)\
    \ accelerometer:(UIAccelerometer *)accelerometer\n        didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n    CGPoint pos = player.position;\n    pos.x += acceleration.x\
    \ * 10;\nplayer.position = pos;\n}\n```\n\nNotice something odd? I wrote three\
    \ lines where one might seem to suffice:\n\n```\n// ERROR: lvalue required as\
    \ left operand of assignment\nplayer.position.x += acceleration.x * 10;\n```\n\
    \nUnlike other programming languages such as Java, C++, and C#, writing something\
    \ like `player.position.x += value` won’t work with Objective-C properties. The\
    \ `position` property is a `CGPoint`, which is a regular C struct data type. Objective-C\
    \ properties simply can’t assign a value to a field in a struct directly. The\
    \ problem lies in how properties work in Objective-C and also how assignment works\
    \ in the C language, on which Objective-C is based.\n\nThe statement `player.position.x`\
    \ is actually a call to the position getter method `[player position]`, which\
    \ means you’re actually retrieving a temporary position and then trying to change\
    \ the `x` member of the temporary `CGPoint`. But the temporary `CGPoint` would\
    \ then get thrown away. The position setter `[player setPosition]` simply will\
    \ not be called automagically. You can only assign to the `player.position` property\
    \ directly, in this case a new `CGPoint`. In Objective-C you’ll have to live with\
    \ this unfortunate issue—and possibly change programming habits if you come from\
    \ a Java, C++, or C# background.\n\nThis is why the previous code has to create\
    \ a temporary `CGPoint` object, change the point’s `x` field, and then assign\
    \ the temporary `CGPoint` to `player.position`. Unfortunately, this is how it\
    \ needs to be done in Objective-C.\n\n### First Test Run\n\nYour project should\
    \ now be at the same level as the one in the `DoodleDrop02` folder of the code\
    \ provided with this chapter. Give it a try now. Make sure you choose to run the\
    \ app on the device, because you won’t get accelerometer input from the simulator.\
    \ Test how the accelerometer input behaves in this version.\n\nIf you haven’t\
    \ installed your development provisioning profiles in Xcode for this particular\
    \ project yet, you’ll get a CodeSign error. Code signing is required to run an\
    \ app on an iOS device. Please refer to Apple’s documentation to learn how to\
    \ create and install the necessary development provisioning profiles ([`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`](http://developer.apple.com/ios/manage/provisioningprofiles/howto.action)).\n\
    \n### Player Velocity\n\nNotice how the accelerometer input isn’t quite right?\
    \ It’s reacting slowly, and the motion isn’t fluid. That’s because the player\
    \ sprite doesn’t experience true acceleration and deceleration. Let’s fix that\
    \ now. The accompanying code changes are found in the `DoodleDrop03` project.\n\
    \nThe concept for implementing acceleration and deceleration is not to change\
    \ the player’s position directly but to use a separate `CGPoint` variable as a\
    \ velocity vector. Every time an accelerometer event is received, the velocity\
    \ variable accumulates input from the accelerometer. Of course, that means we\
    \ also have to limit the velocity to an arbitrary maximum; otherwise, it’ll take\
    \ too long to decelerate. The velocity is then added to the player position every\
    \ frame, regardless of whether accelerometer input was received.\n\n**NOTE:**\
    \ Why not use actions to move the player sprite? Well, move actions are a bad\
    \ choice whenever you want to change an object’s speed or direction very often,\
    \ say multiple times per second. Actions are designed to be relatively long-lived\
    \ objects, so creating new ones frequently creates additional overhead in terms\
    \ of allocating and releasing memory. This can quickly drain a game’s performance.\n\
    \nWorse yet, actions don’t work at all if you don’t give them any time to do their\
    \ work. That’s why adding a new action to replace the previous one every frame\
    \ won’t show any effect whatsoever. Many cocos2d developers have stumbled across\
    \ this seemingly odd behavior.\n\nFor example, stopping all actions and then adding\
    \ a new `MoveBy` action to an object every frame will not make it move at all!\
    \ The `MoveBy` action will change the object’s position only in the next frame.\
    \ But that’s when you’re already stopping all actions again and adding another\
    \ new `MoveBy` action. Repeat *ad infinitum*, but the object will simply not move\
    \ at all. It’s like the clichéd donkey: push it too hard, and it’ll become a stubborn,\
    \ immobile object.\n\nLet’s go through the code changes. The `playerVelocity`\
    \ variable is added to the header:\n\n```\n@interface GameScene : CCLayer\n{\n\
    \    CCSprite* player;\n    CGPoint playerVelocity;\n}\n```\n\nIf you wonder why\
    \ I’m using a `CGPoint` instead of `float`, who’s to say you’ll never want to\
    \ accelerate up or down a little? So, it doesn’t hurt to be prepared for future\
    \ expansions.\n\n[Listing 4–6](#Chapter04.html#list_4_6) shows the accelerometer\
    \ code, which I changed to use the velocity instead of updating the player position\
    \ directly. It introduces three new design parameters for the amount of deceleration,\
    \ the accelerometer sensitivity, and the maximum velocity. Those are values that\
    \ don’t have an optimum; you need to tweak them and find the right settings that\
    \ work best with your game’s design (which is why they’re called *design parameters*).\n\
    \nDeceleration works by reducing the current velocity before adding the new accelerometer\
    \ value multiplied by the sensitivity. The lower the deceleration, the quicker\
    \ the player can change the alien’s direction. The higher the sensitivity, the\
    \ more responsive the player will react to accelerometer input. These values interact\
    \ with each other since they modify the same value, so be sure to tweak only one\
    \ value at a time.\n\n**Listing 4–6.** *GameScene Implementation Gets playerVelocity*\n\
    \n```\n-(void) accelerometer:(UIAccelerometer *)accelerometer\n        didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n    // controls how quickly velocity decelerates (lower =\
    \ quicker to change direction)\n    float deceleration = 0.4f;\n    // determines\
    \ how sensitive the accelerometer reacts (higher = more sensitive)\n    float\
    \ sensitivity = 6.0f;\n    // how fast the velocity can be at most\n    float\
    \ maxVelocity = 100;\n\n    // adjust velocity based on current accelerometer\
    \ acceleration\n    playerVelocity.x = playerVelocity.x * deceleration + acceleration.x\
    \ * sensitivity;\n```"
  raw: '### Accelerometer Input


    One last step, and then we should be done tilting the player sprite around. As
    I demonstrated in [Chapter 3](#Chapter03.html#ch3), you have to add the accelerometer
    method to the layer that receives accelerometer input. Here I use the `acceleration.x`
    parameter and add it to the player’s position; multiplying by 10 is to speed up
    the player’s movement.


    `-(void) accelerometer:(UIAccelerometer *)accelerometer`

    `        didAccelerate:(UIAcceleration *)acceleration`

    `{`

    `    CGPoint pos = player.position;`

    `    pos.x += acceleration.x * 10;`

    `player.position = pos;`

    `}`


    Notice something odd? I wrote three lines where one might seem to suffice:


    `// ERROR: lvalue required as left operand of assignment`

    `player.position.x += acceleration.x * 10;`


    Unlike other programming languages such as Java, C++, and C#, writing something
    like `player.position.x += value` won’t work with Objective-C properties. The
    `position` property is a `CGPoint`, which is a regular C struct data type. Objective-C
    properties simply can’t assign a value to a field in a struct directly. The problem
    lies in how properties work in Objective-C and also how assignment works in the
    C language, on which Objective-C is based.


    The statement `player.position.x` is actually a call to the position getter method
    `[player position]`, which means you’re actually retrieving a temporary position
    and then trying to change the x member of the temporary `CGPoint`. But the temporary
    `CGPoint` would then get thrown away. The position setter `[player setPosition]`
    simply will not be called automagically. You can only assign to the `player.position`
    property directly, in this case a new `CGPoint`. In Objective-C you’ll have to
    live with this unfortunate issue—and possibly change programming habits if you
    come from a Java, C++, or C# background.


    This is why the previous code has to create a temporary `CGPoint` object, change
    the point’s x field, and then assign the temporary `CGPoint` to `player.position`.
    Unfortunately, this is how it needs to be done in Objective-C.


    ### First Test Run


    Your project should now be at the same level as the one in the DoodleDrop02 folder
    of the code provided with this chapter. Give it a try now. Make sure you choose
    to run the app on the device, because you won’t get accelerometer input from the
    simulator. Test how the accelerometer input behaves in this version.


    If you haven’t installed your development provisioning profiles in Xcode for this
    particular project yet, you’ll get a CodeSign error. Code signing is required
    to run an app on an iOS device. Please refer to Apple’s documentation to learn
    how to create and install the necessary development provisioning profiles ([`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`](http://developer.apple.com/ios/manage/provisioningprofiles/howto.action)).


    ### Player Velocity


    Notice how the accelerometer input isn’t quite right? It’s reacting slowly, and
    the motion isn’t fluid. That’s because the player sprite doesn’t experience true
    acceleration and deceleration. Let’s fix that now. The accompanying code changes
    are found in the DoodleDrop03 project.


    The concept for implementing acceleration and deceleration is not to change the
    player’s position directly but to use a separate `CGPoint` variable as a velocity
    vector. Every time an accelerometer event is received, the velocity variable accumulates
    input from the accelerometer. Of course, that means we also have to limit the
    velocity to an arbitrary maximum; otherwise, it’ll take too long to decelerate.
    The velocity is then added to the player position every frame, regardless of whether
    accelerometer input was received.


    **NOTE:** Why not use actions to move the player sprite? Well, move actions are
    a bad choice whenever you want to change an object’s speed or direction very often,
    say multiple times per second. Actions are designed to be relatively long-lived
    objects, so creating new ones frequently creates additional overhead in terms
    of allocating and releasing memory. This can quickly drain a game’s performance.


    Worse yet, actions don’t work at all if you don’t give them any time to do their
    work. That’s why adding a new action to replace the previous one every frame won’t
    show any effect whatsoever. Many cocos2d developers have stumbled across this
    seemingly odd behavior.


    For example, stopping all actions and then adding a new `MoveBy` action to an
    object every frame will not make it move at all! The `MoveBy` action will change
    the object’s positiononly in the next frame. But that’s when you’re already stopping
    all actions again and adding another new `MoveBy` action. Repeat *ad infinitum*,
    but the object will simply not move at all. It’s like the clichéd donkey: push
    it too hard, and it’ll become a stubborn, immobile object.


    Let’s go through the code changes. The `playerVelocity` variable is added to the
    header:


    `@interface GameScene : CCLayer`

    `{`

    `    CCSprite* player;`

    **`    CGPoint playerVelocity;`**

    `}`


    If you wonder why I’m using a `CGPoint` instead of `float`, who’s to say you’ll
    never want to accelerate up or down a little? So, it doesn’t hurt to be prepared
    for future expansions.


    [Listing 4–6](#Chapter04.html#list_4_6) shows the accelerometer code, which I
    changed to use the velocity instead of updating the player position directly.
    It introduces three new design parameters for the amount of deceleration, the
    accelerometer sensitivity, and the maximum velocity. Those are values that don’t
    have an optimum; you need to tweak them and find the right settings that work
    best with your game’s design (which is why they’re called *design parameters*).


    Deceleration works by reducing the current velocity before adding the new accelerometer
    value multiplied by the sensitivity. The lower the deceleration, the quicker the
    player can change the alien’s direction. The higher the sensitivity, the more
    responsive the player will react to accelerometer input. These values interact
    with each other since they modify the same value, so be sure to tweak only one
    value at a time.


    **Listing 4–6.** *GameScene Implementation Gets playerVelocity*


    `-(void) accelerometer:(UIAccelerometer *)accelerometer`

    `        didAccelerate:(UIAcceleration *)acceleration`

    `{`

    `    // controls how quickly velocity decelerates (lower = quicker to change direction)`

    `    float deceleration = 0.4f;`

    `    // determines how sensitive the accelerometer reacts (higher = more sensitive)`

    `    float sensitivity = 6.0f;`

    `    // how fast the velocity can be at most`

    `    float maxVelocity = 100;`


    `    // adjust velocity based on current accelerometer acceleration`

    `    playerVelocity.x = playerVelocity.x * deceleration + acceleration.x * sensitivity;`'
  trans: "\n### 加速度计输入\n\n最后一步，完成这些我们就能让玩家精灵倾斜移动了。正如我在第三章中演示的，你需要在接收加速度计输入的图层中添加相应方法。这里我使用`acceleration.x`参数并将其添加到玩家的位置中；乘以\
    \ 10 是为了加快玩家的移动速度。\n\n```\n-(void) accelerometer:(UIAccelerometer *)accelerometer\n\
    \        didAccelerate:(UIAcceleration *)acceleration\n{\n    CGPoint pos = player.position;\n\
    \    pos.x += acceleration.x * 10;\nplayer.position = pos;\n}\n```\n\n发现什么奇怪的地方了吗？我写了三行代码，而原本一行似乎就够了：\n\
    \n```\n// 错误：需要左值作为赋值操作数\nplayer.position.x += acceleration.x * 10;\n```\n\n与\
    \ Java、C++和 C#等其他编程语言不同，在 Objective-C 的属性中，像`player.position.x += value`这样的写法是行不通的。`position`属性是一个`CGPoint`，这是一种常规的\
    \ C 语言结构体数据类型。Objective-C 的属性无法直接给结构体中的字段赋值。问题出在 Objective-C 中属性的工作方式，以及作为其基础的\
    \ C 语言的赋值机制上。\n\n语句`player.position.x`实际上是对位置的获取方法`[player position]`的调用，这意味着你实际上获取了一个临时位置，然后试图修改这个临时`CGPoint`对象的`x`成员。但这个临时`CGPoint`随后会被丢弃。位置的设置方法`[player\
    \ setPosition]`并不会被自动调用。你只能直接给`player.position`属性赋值，即赋给一个新的`CGPoint`。在 Objective-C\
    \ 中，你不得不面对这个令人遗憾的问题——如果你有 Java、C++或 C#背景，可能还需要改变编程习惯。\n\n这就是为什么之前的代码必须创建一个临时的`CGPoint`对象，修改该对象的`x`字段，然后再将临时`CGPoint`赋值给`player.position`。遗憾的是，在\
    \ Objective-C 中必须这样做。\n\n### 首次测试运行\n\n你的项目现在应该与本章提供的代码中`DoodleDrop02`文件夹内的项目处于同一水平。现在试运行一下。请确保选择在设备上运行该应用，因为你无法从模拟器获得加速度计输入。测试此版本中加速度计输入的表现。\n\
    \n如果你尚未在 Xcode 中为这个特定项目安装开发配置文件，将会遇到 CodeSign 错误。在 iOS 设备上运行应用需要代码签名。请参考 Apple\
    \ 的文档了解如何创建和安装必要的开发配置文件（[`http://developer.apple.com/ios/manage/provisioningprofiles/howto.action`](http://developer.apple.com/ios/manage/provisioningprofiles/howto.action)）。\n\
    \n### 玩家速度\n\n注意到加速度计输入不太对劲了吗？它反应缓慢，而且运动不流畅。这是因为玩家精灵没有体验到真正的加速和减速。现在我们来修复这个问题。相关的代码改动可以在`DoodleDrop03`项目中找到。\n\
    \n实现加速和减速的概念不是直接改变玩家的位置，而是使用一个单独的`CGPoint`变量作为速度向量。每次收到加速度计事件时，速度变量会累积来自加速度计的输入。当然，这也意味着我们必须将速度限制在一个任意最大值内；否则减速会需要太长时间。然后，无论是否收到加速度计输入，每一帧都会将速度加到玩家位置上。\n\
    \n**注意：** 为什么不使用动作（actions）来移动玩家精灵呢？当你需要频繁改变对象的速度或方向时（例如每秒多次），移动动作是一个糟糕的选择。动作被设计为相对长期存在的对象，频繁创建新动作会在分配和释放内存方面产生额外开销。这会迅速拖累游戏的性能。\n\
    \n更糟的是，如果你不给动作留出执行时间，它们根本不会工作。这就是为什么每帧添加一个新动作来替换前一个动作，不会产生任何效果。许多 cocos2d 开发者都曾遇到过这种看似怪异的行为。\n\
    \n例如，每帧停止所有动作，然后给一个对象添加一个新的`MoveBy`动作，根本不会让它移动！`MoveBy`动作只会在下一帧改变对象的位置。但那时你又已经停止了所有动作，并添加了另一个新的`MoveBy`动作。如此无限循环，对象根本不会移动。这就像俗话里说的驴子：逼得太紧，它反而会变成固执不动的对象。\n\
    \n让我们来看一下代码改动。`playerVelocity`变量被添加到了头文件中：\n\n```\n@interface GameScene : CCLayer\n\
    {\n    CCSprite* player;\n    CGPoint playerVelocity;\n}\n```\n\n如果你想知道为什么我使用`CGPoint`而不是`float`，谁说你以后肯定不想稍微向上或向下加速呢？所以，为未来的扩展做好准备没什么坏处。\n\
    \n代码清单 4-6 展示了加速度计的代码，我对其进行了修改，改为使用速度而非直接更新玩家位置。它引入了三个新的设计参数：减速度、加速度计灵敏度和最大速度。这些值没有最优解；你需要进行调整，找到最适合你游戏设计的设置（这就是为什么它们被称为*设计参数*）。\n\
    \n减速的工作原理是，在加上新的加速度计值乘以灵敏度之前，先降低当前速度。减速度越低，玩家改变外星人方向的速度越快。灵敏度越高，玩家对加速度计输入的反应越灵敏。这些值会相互影响，因为它们修改的是同一个变量，所以请务必一次只调整一个数值。\n\
    \n**代码清单 4-6.** *GameScene 实现获取 playerVelocity*\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n        didAccelerate:(UIAcceleration *)acceleration\n{\n \
    \   // 控制速度减速的快慢 (值越小 = 改变方向越快)\n    float deceleration = 0.4f;\n    // 决定加速度计反应的灵敏度\
    \ (值越高 = 越灵敏)\n    float sensitivity = 6.0f;\n    // 速度的最大可能值\n    float maxVelocity\
    \ = 100;\n\n    // 根据当前加速度计的加速度调整速度\n    playerVelocity.x = playerVelocity.x *\
    \ deceleration + acceleration.x * sensitivity;\n```\n"
- fmt: "// we must limit the maximum velocity of the player sprite, in both directions\n\
    if (playerVelocity.x > maxVelocity)\n{\n    playerVelocity.x = maxVelocity;\n\
    }\nelse if (playerVelocity.x < -maxVelocity)\n{\n    playerVelocity.x = -maxVelocity;\n\
    }\n\nNow `playerVelocity` will be changed, but how do you add the velocity to\
    \ the player’s position? You do so by scheduling the `update` method in the `GameScene`\
    \ init method, by adding this line:\n\n// schedules the –(void) update:(ccTime)delta\
    \ method to be called every frame\n[self scheduleUpdate];\n\nYou also need to\
    \ add the `–(void) update:(ccTime)delta` method as shown in [Listing 4–7](#Chapter04.html#list_4_7).\
    \ The scheduled `update` method is called every frame, and that’s where we add\
    \ the velocity to the player position. This way, we get a smooth constant movement\
    \ in either direction regardless of the frequency of accelerometer input.\n\n\
    **Listing 4–7.** *Updating the Player’s Position with the Current Velocity*\n\n\
    ```\n-(void) update:(ccTime)delta\n{\n    // Keep adding up the playerVelocity\
    \ to the player's position\n    CGPoint pos = player.position;\n    pos.x += playerVelocity.x;\n\
    \n    // The Player should also be stopped from going outside the screen\n   \
    \ CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    float imageWidthHalved\
    \ = [player texture].contentSize.width * 0.5f;\n    float leftBorderLimit = imageWidthHalved;\n\
    \    float rightBorderLimit = screenSize.width - imageWidthHalved;\n\n    // preventing\
    \ the player sprite from moving outside the screen\n    if (pos.x < leftBorderLimit)\n\
    \    {\n        pos.x = leftBorderLimit;\n        playerVelocity = CGPointZero;\n\
    \    }\n    else if (pos.x > rightBorderLimit)\n    {\n        pos.x = rightBorderLimit;\n\
    \        playerVelocity = CGPointZero;\n    }\n\n    // assigning the modified\
    \ position back\n    player.position = pos;\n}\n```\n\n**TIP:** The `contentSize`\
    \ width is not divided by two but rather multiplied by `0.5` in order to calculate\
    \ `imageWidthHalved`. This is a conscious choice and leads to the same results\
    \ because any division can be rewritten as a multiplication.\n\nThe `update` method\
    \ is called in every frame, and every piece of code that runs in every frame should\
    \ be running at top speed. And since the ARM CPUs of the iOS devices don’t support\
    \ division operations in hardware, multiplications are generally a bit faster.\
    \ It’s not going to be noticeable in this case, but it’s a good habit to get into\
    \ since, unlike other (premature) optimizations, it doesn’t make the code harder\
    \ to read or maintain.\n\nAnother option for making this code just a little bit\
    \ faster would be to precalculate values like `imageWidthHalved`, `leftBorderLimit`,\
    \ and `rightBorderLimit` and then store them in instance variables. This is going\
    \ to work as long as the player’s texture remains the same while the game is running.\
    \ The trade-off here is higher memory usage for fewer CPU cycles, and you’ll generally\
    \ find that this trade-off is very common for most code optimizations. But, as\
    \ long you don’t need to squeeze out speed, it’s advisable to write readable and\
    \ flexible code first and optimize only when you really must.\n\nA boundary check\
    \ prevents the player sprite from leaving the screen. Once again, we have to take\
    \ the player texture’s `contentSize` into account, since the player position is\
    \ at the center of the sprite image but we don’t want either side of the image\
    \ to be off the screen. For this, we calculate `imageWidthHalved` and then use\
    \ it to check whether the newly updated player position is within the left and\
    \ right border limits. The code may be a bit verbose at this point, but that makes\
    \ it easier to understand. And that’s it with the player accelerometer input logic.\n\
    \n**TIP:** You’ll notice that this straightforward implementation of accelerometer\
    \ control doesn’t give you the same dynamic feeling that you may be used to from\
    \ games like Tilt to Live. The reason is that smooth, dynamic accelerometer controls\
    \ require additional computations on the input values that go beyond the scope\
    \ of this book.\n\nThe technique to smooth the accelerometer input is called *filtering*.\
    \ To be specific, you might want to search the cocos2d forum primarily for high-pass\
    \ and low-pass filtering. Filtering the accelerometer input values reduces the\
    \ effects of sudden peaks in acceleration (high-pass filter) as well as cancels\
    \ out the effects of gravity or simply one’s natural hand tremor caused by our\
    \ pulse (low-pass filter).\n\nIn addition, there are several ways to have an accelerometer-controlled\
    \ object appear to have momentum. To achieve this effect, you would apply an easing\
    \ function to the input values. Easing functions can simulate the effect of an\
    \ object wanting to continue to move in the same direction with the same velocity\
    \ unless an external force is exerted on the object. In other words, easing can\
    \ emulate Newton’s first and second laws of motion."
  raw: '`    // we must limit the maximum velocity of the player sprite, in both directions`

    `    if (playerVelocity.x > maxVelocity)`

    `    {`

    `        playerVelocity.x = maxVelocity;`

    `    }`

    `    else if (playerVelocity.x < - maxVelocity)`

    `    {`

    `        playerVelocity.x = - maxVelocity;`

    `    }`

    `}`


    Now `playerVelocity` will be changed, but how do you add the velocity to the player’s
    position? You do so by scheduling the update method in the `GameSceneinit` method,
    by adding this line:


    `// schedules the –(void) update:(ccTime)delta method to be called every frame`

    `[self scheduleUpdate];`


    You also need to add the `–(void) update:(ccTime)delta` method as shown in [Listing
    4–7](#Chapter04.html#list_4_7). The scheduled update method is called every frame,
    and that’s where we add the velocity to the player position. This way, we get
    a smooth constant movement in either direction regardless of the frequency of
    accelerometer input.


    **Listing 4–7.** *Updating the Player’s Position with the Current Velocity*


    `-(void) update:(ccTime)delta`

    `{`

    `    // Keep adding up the playerVelocity to the player''s position`

    `    CGPoint pos = player.position;`

    `    pos.x += playerVelocity.x;`


    `    // The Player should also be stopped from going outside the screen`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`

    `    float imageWidthHalved = [player texture].contentSize.width * 0.5f;`

    `    float leftBorderLimit = imageWidthHalved;`

    `    float rightBorderLimit = screenSize.width - imageWidthHalved;`


    `    // preventing the player sprite from moving outside the screen`

    `    if (pos.x < leftBorderLimit)`

    `    {`

    `        pos.x = leftBorderLimit;`

    `        playerVelocity = CGPointZero;`

    `    }`

    `    else if (pos.x > rightBorderLimit)`

    `    {`

    `        pos.x = rightBorderLimit;`

    `        playerVelocity = CGPointZero;`

    `    }`


    `    // assigning the modified position back`

    `    player.position = pos;`

    `}`


    **TIP:** The `contentSize` width is not divided by two but rather multiplied by
    0.5 in order to calculate `imageWidthHalved`. This is a conscious choice and leads
    to the same results because any division can be rewritten as a multiplication.


    The update method is called in every frame, and every piece of code that runs
    in every frame should be running at top speed. And since the ARM CPUs of the iOS
    devices don’t support division operations in hardware, multiplications are generally
    a bit faster. It’s not going to be noticeable in this case, but it’s a good habit
    to get into since, unlike other (premature) optimizations, it doesn’t make the
    code harder to read or maintain.


    Another option for making this code just a little bit faster would be to precalculate
    values like `imageWidthHalved`, `leftBorderLimit`, and `rightBorderLimit` and
    then store them in instance variables. This is going to work as long as the player’s
    texture remains the same while the game is running. The trade-off here is higher
    memory usage for fewer CPU cycles, and you’ll generally find that this trade-off
    is very common for most code optimizations. But, as long you don’t need to squeeze
    out speed, it’s advisable to write readable and flexible code first and optimize
    only when you really must.


    A boundary check prevents the player sprite from leaving the screen. Once again,
    we have to take the player texture’s `contentSize` into account, since the player
    position is at the center of the sprite image but we don’t want either side of
    the image to be off the screen. For this, we calculate `imageWidthHalved` and
    then use it to check whether the newly updated player position is within the left
    and right border limits. The code may be a bit verbose at this point, but that
    makes it easier to understand. And that’s it with the player accelerometer input
    logic.


    **TIP:** You’ll notice that this straightforward implementation of accelerometer
    control doesn’t give you the same dynamic feeling that you may be used to from
    games like Tilt to Live. The reason is that smooth, dynamic accelerometer controls
    require additional computations on the input values that go beyond the scope of
    this book.


    The technique to smooth the accelerometer input is called *filtering*. To be specific,
    you might want to search the cocos2d forum primarily for high-pass and low-pass
    filtering. Filtering the accelerometer input values reduces the effects of sudden
    peaks in acceleration (high-pass filter) as well as cancels out the effects of
    gravity or simply one’s natural hand tremor caused by our pulse (low-pass filter).


    In addition, there are several ways to have an accelerometer-controlled object
    appear to have momentum. To achieve this effect, you would apply an easing function
    to the input values. Easing functions can simulate the effect of an object wanting
    to continue to move in the same direction with the same velocity unless an external
    force is exerted on the object. In other words, easing can emulate Newton’s first
    and second laws of motion.'
  trans: "\n// 我们必须限制玩家精灵在正反两个方向上的最大速度\nif (playerVelocity.x > maxVelocity)\n{\n \
    \   playerVelocity.x = maxVelocity;\n}\nelse if (playerVelocity.x < -maxVelocity)\n\
    {\n    playerVelocity.x = -maxVelocity;\n}\n\n现在 `playerVelocity` 会被修改，但如何将速度应用到玩家的位置呢？你可以在\
    \ `GameScene` 的 init 方法中调度 `update` 方法，通过添加以下代码行来实现：\n\n// 调度 `–(void) update:(ccTime)delta`\
    \ 方法，使其在每一帧被调用\n[self scheduleUpdate];\n\n你还需要添加 `–(void) update:(ccTime)delta`\
    \ 方法，如代码清单 4-7 所示。被调度的 `update` 方法会在每一帧被调用，而正是在这个方法中，我们将速度应用到玩家的位置上。这样一来，无论加速度计输入的频率如何变化，我们都能在两个方向上获得平滑且恒定的移动。\n\
    \n**代码清单 4-7。** *使用当前速度更新玩家的位置*\n\n```\n-(void) update:(ccTime)delta\n{\n    //\
    \ 不断将 playerVelocity 累加到玩家的位置上\n    CGPoint pos = player.position;\n    pos.x\
    \ += playerVelocity.x;\n\n    // 同时应阻止玩家移出屏幕\n    CGSize screenSize = [[CCDirector\
    \ sharedDirector] winSize];\n    float imageWidthHalved = [player texture].contentSize.width\
    \ * 0.5f;\n    float leftBorderLimit = imageWidthHalved;\n    float rightBorderLimit\
    \ = screenSize.width - imageWidthHalved;\n\n    // 阻止玩家精灵移出屏幕\n    if (pos.x <\
    \ leftBorderLimit)\n    {\n        pos.x = leftBorderLimit;\n        playerVelocity\
    \ = CGPointZero;\n    }\n    else if (pos.x > rightBorderLimit)\n    {\n     \
    \   pos.x = rightBorderLimit;\n        playerVelocity = CGPointZero;\n    }\n\n\
    \    // 将修改后的位置重新赋值给玩家\n    player.position = pos;\n}\n```\n\n**提示：** 在计算 `imageWidthHalved`\
    \ 时，`contentSize` 的宽度并未除以二，而是乘以了 `0.5`。这是一个有意为之的选择，并且结果相同，因为任何除法运算都可以改写为乘法运算。\n\
    \n`update` 方法在每一帧都会被调用，因此每一帧中运行的每一段代码都必须以最高速度执行。由于 iOS 设备的 ARM CPU 不支持硬件除法操作，乘法通常速度稍快。虽然在这种情况下这种差异并不明显，但养成这个习惯是个好主意——与其他（过早的）优化不同，它并不会使代码更难阅读或维护。\n\
    \n另一种让这段代码稍微提速的方法是预计算 `imageWidthHalved`、`leftBorderLimit` 和 `rightBorderLimit`\
    \ 等值，并将它们存储在实例变量中。只要游戏运行时玩家的纹理保持不变，这种方法就能一直有效。这是一种用更高的内存占用换取更少的 CPU 周期的权衡，你通常会发现这种权衡在大多数代码优化中非常常见。不过，只要你不需要极致地压榨速度，建议首先编写可读性强、灵活性高的代码，只有在真正必要时才进行优化。\n\
    \n边界检查可以防止玩家精灵离开屏幕。再次强调，我们必须考虑玩家纹理的 `contentSize`，因为玩家的位置位于精灵图像的中心，但我们不希望图像的任一侧超出屏幕边缘。为此，我们计算了\
    \ `imageWidthHalved`，并用它来检查新更新后的玩家位置是否处于左右边界内。目前这段代码可能略显冗长，但这使得它更容易理解。至此，玩家的加速度计输入逻辑就完成了。\n\
    \n**提示：** 你会注意到，这种直接的加速度计控制实现无法带来你在《Tilt to Live》等游戏中习以为常的动态感。原因是流畅、动态的加速度计控制需要对输入值进行额外计算，这超出了本书的讨论范围。\n\
    \n平滑加速度计输入的技术被称为*滤波*。具体来说，你可能会在 cocos2d 论坛上主要搜索高通滤波和低通滤波。对加速度计输入值进行滤波可以减少加速度突变峰值的影响（高通滤波），同时消除重力效应，或者仅仅是因脉搏引起的自然手抖（低通滤波）的影响。\n\
    \n此外，有几种方法可以让受加速度计控制的对象表现出动量感。要实现这种效果，你可以对输入值应用缓动函数。缓动函数可以模拟这样一个效果：除非有外力作用，否则物体会倾向于以相同的速度沿相同方向继续移动。换句话说，缓动能够模拟牛顿第一和第二运动定律。\n"
- fmt: "### Adding Obstacles\n\nThis game isn’t any good until we add something for\
    \ the player to avoid. The `DoodleDrop04` project introduces an abomination of\
    \ nature: a six-legged man-spider. Who wouldn’t want to avoid that?\n\nAs with\
    \ the player sprite, you should add the `spider.png` to the `Resources` group.\
    \ Then the `GameScene.h` file gets three new member variables added to its interface:\
    \ a `spiders` `CCArray` whose class reference is shown in [Listing 4–9](#Chapter04.html#list_4_9)\
    \ and the `spiderMoveDuration` and `numSpidersMoved`, which are used in [Listing\
    \ 4–12](#Chapter04.html#list_4_12):\n\n```\n@interface GameScene : CCLayer\n{\n\
    \    CCSprite* player;\n    CGPoint playerVelocity;\n\n    CCArray* spiders;\n\
    \    float spiderMoveDuration;\n    int numSpidersMoved;\n}\n```\n\nAnd in the\
    \ `GameScene` init method add the call to the `initSpiders` method discussed next,\
    \ right after `scheduleUpdate`:\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n        ...\n\n        [self scheduleUpdate];\n        [self\
    \ initSpiders];\n    }\n    return self;\n}\n```\n\nAfter that a fair bit of code\
    \ is added to the `GameScene` class, beginning with the `initSpiders` method in\
    \ [Listing 4–8](#Chapter04.html#list_4_8), which is creating the spider sprites.\n\
    \n**Listing 4–8.** *For Easier Access, Spider Sprites Are Initialized and Added\
    \ to a CCArray*\n\n```\n-(void) initSpiders\n{\n    CGSize screenSize = [[CCDirector\
    \ sharedDirector] winSize];\n\n    // using a temporary spider sprite is the easiest\
    \ way to get the image's size\n    CCSprite* tempSpider = [CCSprite spriteWithFile:@\"\
    spider.png\"];\n    float imageWidth = [tempSpider texture].contentSize.width;\n\
    \n    // Use as many spiders as can fit next to each other over the whole screen\
    \ width.\n    int numSpiders = screenSize.width / imageWidth;\n\n    // Initialize\
    \ the spiders array using alloc.\n    spiders = [[CCArray alloc] initWithCapacity:numSpiders];\n\
    \n    for (int i = 0; i < numSpiders; i++)\n    {\n        CCSprite* spider =\
    \ [CCSprite spriteWithFile:@\"spider.png\"];\n        [self addChild:spider z:0\
    \ tag:2];\n\n        // Also add the spider to the spiders array.\n        [spiders\
    \ addObject:spider];\n    }\n\n    // call the method to reposition all spiders\n\
    \    [self resetSpiders];\n}\n```\n\nThere are a few things to note. I create\
    \ a `tempSpider` `CCSprite` only to find out the sprite’s image width, which is\
    \ then used to decide how many spider sprites can fit next to each other. The\
