    `@end`


    After the `spriteBatch`, which contains all the enemy sprites, there''s an `enemiesCCArray`
    that stores a list of enemies of each type. The `updateCount` variable is increased
    every frame and used to spawn enemies at regular intervals. The `init` method
    of the `EnemyCache` is quite similar to the `BulletCacheinit` with its initialization
    of the `CCSpriteBatchNode`:


