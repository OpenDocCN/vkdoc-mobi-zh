  trans: "\n#### 弹射杆\n\n我不愿剥夺你对游戏的控制权，但暂时我必须这么做。现在我们正在添加弹射杆，用手指控制球可能会造成干扰。因此，请进入`Ball`类的`update`方法，注释掉对`applyForceTowardsFinger`的调用：\n\
    \n```\nif (moveToFinger == YES)\n{\n    // 已禁用：不再需要\n    // [self applyForceTowardsFinger];\n\
    }\n```\n\n现在你可以添加`Plunger`类了，这个类我已经在 PhysicsBox2D05 项目中创建好了。代码清单 13–14 展示了`Plunger`类的接口，它也继承自`BodyNode`。\n\
    \n**代码清单 13–14.** *弹射杆的头文件*\n\n```\n#import \"BodyNode.h\"\n\n@interface Plunger\
    \ : BodyNode\n{\n    b2PrismaticJoint* joint;\n}\n\n+(id) plungerWithWorld:(b2World*)world;\n\
    \n@end\n```\n\n`Plunger`类有一个`b2PrismaticJoint`类型的成员变量，用于驱动自身向上弹射。棱柱关节只允许沿一个轴运动——伸缩杆就是现实世界中棱柱关节的一个典型例子。你只能在较粗的管内移动较细的管，这使得伸缩杆只能沿单一方向进行伸缩。\n\
    \n初始化弹射杆也很直接，如代码清单 13–15 所示。弹射杆的物理参数已在 PhysicsEditor 中编辑过。具体来说，摩擦系数被设置为一个非常高的值，而弹性系数则设为\
    \ 0。这确保了在弹射杆向上推进的过程中，球能与其保持紧密接触，从而被平稳地发射出去。\n\n**代码清单 13–15.** *初始化弹射杆*\n\n```\n\
    -(id) initWithWorld:(b2World*)world\n{\n    if ((self = [super initWithShape:@\"\
    plunger\" inWord:world]))\n    {\n        CGSize screenSize = [[CCDirector sharedDirector]\
    \ winSize];\n        CGPoint plungerPos = CGPointMake(screenSize.width - 13, -32);\n\
    \n        body->SetTransform([Helper toMeters:plungerPos], 0);\n        body->SetType(b2_dynamicBody);\n\
    \n        [self attachPlunger];\n    }\n    return self;\n}\n```\n\n最有趣的部分是对`attachPlunger`的调用，以及在此方法中实际创建棱柱关节的过程，如代码清单\
    \ 13–16 所示。\n\n**代码清单 13–16.** *创建弹射杆的棱柱关节*\n\n```\n-(void) attachPlunger\n{\n\
    \    // 创建一个不可见的静态物体来连接关节\n    b2BodyDef bodyDef;\n    bodyDef.position = body->GetWorldCenter();\n\
    \    b2Body* staticBody = body->GetWorld()->CreateBody(&bodyDef);\n\n    // 创建一个棱柱关节，使弹射杆能够上下移动\n\
    \    b2PrismaticJointDef jointDef;\n    b2Vec2 worldAxis(0.0f, 1.0f);\n    jointDef.Initialize(staticBody,\
    \ body, body->GetWorldCenter(), worldAxis);\n    jointDef.lowerTranslation = 0.0f;\n\
    \    jointDef.upperTranslation = 0.35f;\n    jointDef.enableLimit = true;\n  \
    \  jointDef.maxMotorForce = 80.0f;\n    jointDef.motorSpeed = 40.0f;\n    jointDef.enableMotor\
    \ = false;\n\n    joint = (b2PrismaticJoint*)body->GetWorld()->CreateJoint(&jointDef);\n\
    }\n```\n\n首先，在弹射杆动态物体的同一位置创建一个静态物体。它将充当伸缩杆中固定不动的较粗管，使得只有较细的管在释放时能向上弹起。请记住物理学原理（或者想想《流言终结者》）：每个作用力都有一个大小相等、方向相反的反作用力。为了避免产生反作用力——即棱柱关节中另一个物体向下运动的倾向——我们将它变成了一个不可移动的静态物体，从而将弹射杆固定在原位。\n\
    \n`worldAxis`将棱柱关节的运动限制在 y 轴方向（即上下移动）。`worldAxis`以法向量的形式表示，其取值范围为 0.0f 到 1.0f；当\
    \ y 轴设置为 1.0f 时，`worldAxis`与 y 轴平行。若将 x 轴和 y 轴均设置为 0.5f，则`worldAxis`将呈 45 度角。`b2PrismaticJointDef`使用`staticBody`和弹射杆动态物体的世界中心位置进行初始化。`worldAxis`用作关节的锚点，它将棱柱关节的运动限制在\
    \ y 轴方向。\n\n接下来是一组参数。`lowerTranslation`和`upperTranslation`定义了弹射杆允许沿轴移动的范围。本例中，它允许向上移动\
    \ 0.35f 米，这在 Retina 显示屏设备上正好是 42 个点（即 84 个像素），在非 Retina 设备上是 42 个像素。`enableLimit`字段设置为`true`，以确保相连的物体确实遵守这个移动限制。由于静态物体不会移动，弹射杆将完全移动整个范围。如果两者都是动态物体，那么两者都能移动，如之前所述，这在本例中是不可取的。\n\
    \n接下来，我将`maxMotorForce`设置为`80.0f`（此处的单位是牛顿·米，这是一个扭矩单位）。在 Chipmunk 引擎中，这被称为物体的*力矩*。`maxMotorForce`值限制了关节运动的扭矩或能量。`motorSpeed`则决定了达到这个`maxMotorForce`的速度（如果可以的话）。我通过反复试错确定了这两个值，直到感觉效果合适为止。现在，球能够以恰到好处的速度被弹射上去并开始环绕运动。电机最初是禁用的，因为我只希望当有球接触弹射杆时才触发它。\n\
    \n然后，使用世界的`CreateJoint`方法创建关节，并将其存储在`joint`成员变量中。由于`CreateJoint`返回一个`b2Joint`指针，因此在赋值前必须将其转换为`b2PrismaticJoint`指针。\n\
    \n请注意，无需销毁`Plunger`类作为成员变量保存的关节。当关节所连接的两个物体中的任意一个被销毁时，关节会自动销毁；在本例中，`BodyNode`的`dealloc`方法会销毁物体。\n\
    \n弹射杆也必须添加到台球桌上。像往常一样，这在`TableSetup`类的`initTableWithWorld`方法中完成。只需追加以下代码：\n\n\
    ```\n// 添加弹射杆\nPlunger *plunger = [Plunger plungerWithWorld:world];\n[self addChild:plunger\
    \ z:-1];\n```\n"
- fmt: "### Creating a Universal Contact Listener\n\nTo launch the ball automatically\
    \ on contact, we need some way to react to collisions. The Box2D physics engine\
    \ includes the `b2ContactListener` class. To process collisions, you will have\
    \ to create a custom class that inherits from `b2ContactListener` and overrides\
    \ at least one of the collision callback methods `BeginContact`, `EndContact`,\
    \ `PreSolve`, and `PostSolve`.\n\nYou commonly end up with code that looks similar\
    \ to [Listing 13–17](#Chapter13.html#list_13_17). In principle, you'll retrieve\
    \ the two colliding bodies from the `b2Contact` class. In this particular case,\
    \ each body's user data pointer holds a pointer to a `BodyNode` object, which\
    \ allows you to compare the classes to decide how to further process the collision.\
    \ The verbosity of the code is further increased because a contact's two bodies\
    \ may be in any order even if the same objects collide frequently. That means\
    \ during any contact, the plunger might be either `bodyA` or `bodyB`, while the\
    \ ball would be the corresponding other body. So, you always have to test for\
    \ both cases.\n\n**Listing 13–17.** *A Very Common but Tedious Way to Process\
    \ Box2D Collisions*\n\n```\nvoid ContactListener::BeginContact(b2Contact* contact)\n\
    {\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body* bodyB =\
    \ contact->GetFixtureB()->GetBody();\n    BodyNode* bodyNodeA = (BodyNode*)bodyA->GetUserData();\n\
    \    BodyNode* bodyNodeB = (BodyNode*)bodyB->GetUserData();\n\n    if ([bodyNodeA\
    \ isKindOfClass:[Plunger class]] &&    // U002.jpg\n        [bodyNodeB isKindOfClass:[Ball\
    \ class]])\n    {\n        Plunger* plunger = (Plunger*)bodyNodeA;\n        //\
    \ … perform custom code for collision handling\n    }\n    else if ([bodyNodeB\
    \ isKindOfClass:[Plunger class]] &&   // U002.jpg\n             [bodyNodeA isKindOfClass:[Ball\
    \ class]])\n    {\n        Plunger* plunger = (Plunger*)bodyNodeB;\n        //\
    \ … perform custom code for collision handling\n    }\n}\n```\n\nThe previous\
    \ approach also requires you to import the header files for each colliding `BodyNode`\
    \ class. Over time, the collision-handling class would know about most game objects.\
    \ Instead, you would want to have each `BodyNode` class handle the collision events\
    \ that it is involved in. This keeps the code cleanly separated and easier to\
    \ maintain and turns the job of the collision handling class to one of delegating\
    \ the collision events to the colliding objects.\n\nThe `ContactListener` class\
    \ ([Listing 13–18](#Chapter13.html#list_13_18)) in the PhysicsBox2D05 project\
    \ defines two additional methods next to the regular Box2D collision callback\
    \ methods to perform the delegation of collision events.\n\n**Listing 13–18.**\
    \ *The ContactListener Class Definition*\n\n```\nclass ContactListener : public\
    \ b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact* contact);\n\
    \    void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);\n    void\
    \ PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);\n    void EndContact(b2Contact*\
    \ contact);\n\n    void notifyObjects(b2Contact* contact, NSString* contactType);\n\
    \    void notifyAB(b2Contact* contact,\n                  NSString* contactType,\n\
    \                  b2Fixture* fixtureA,\n                  NSObject* objA,\n \
    \                 b2Fixture* fixtureB,\n                  NSObject* objB);\n};\n\
    ```\n\nThe regular Box2D contact methods are implemented in [Listing 13–19](#Chapter13.html#list_13_19).\
    \ The `BeginContact` and `EndContact` methods simply delegate the contact information\
    \ to the `notifyObjects` methods but also provide the information about whether\
    \ it was a begin or end contact event by passing an appropriate `NSString` object.\
    \ The reason why it's a string and not a flag or enumeration will become clear\
    \ shortly. Since we do not care about the `PreSolve` and `PostSolve` events, they\
    \ remain empty stubs but could be extended by also calling `notifyObjects` with\
    \ the contact and an appropriate string.\n\n**Listing 13–19.** *Implementation\
    \ of the Box2D Contact Methods*\n\n```\n/// Called when two fixtures begin to\
    \ touch.\nvoid ContactListener::BeginContact(b2Contact* contact)\n{\n    notifyObjects(contact,\
    \ @\"begin\");\n}\n\n/// Called when two fixtures cease to touch.\nvoid ContactListener::EndContact(b2Contact*\
    \ contact)\n{\n    notifyObjects(contact, @\"end\");\n}\n\nvoid ContactListener::PreSolve(b2Contact*\
    \ contact, const b2Manifold* oldManifold)\n{\n    // do nothing\n}\n\nvoid ContactListener::PostSolve(b2Contact*\
    \ contact, const b2ContactImpulse* impulse)\n{\n    // do nothing\n}\n```\n\n\
    What does the `notifyObjects` method do? Extracting the two colliding bodies and\
    \ obtaining their user data pointer is similar to [Listing 13–17](#Chapter13.html#list_13_17).\
    \ But take note of the differences:\n\n```\nvoid ContactListener::notifyObjects(b2Contact*\
    \ contact, NSString* contactType)\n{\n    b2Fixture* fixtureA = contact->GetFixtureA();\n\
    \    b2Fixture* fixtureB = contact->GetFixtureB();\n\n    b2Body* bodyA = fixtureA->GetBody();\n\
    \    b2Body* bodyB = fixtureB->GetBody();\n\n    NSObject* objA = (NSObject*)bodyA->GetUserData();\n\
    \    NSObject* objB = (NSObject*)bodyB->GetUserData();\n\n    if ((objA != nil)\
    \ && (objB != nil))\n    {\n        notifyAB(contact, contactType, fixtureA, objA,\
    \ fixtureB, objB);\n        notifyAB(contact, contactType, fixtureB, objB, fixtureA,\
    \ objA);\n    }\n}\n```\n\nIn this case, we simply assume the user data pointer\
    \ to be a pointer to an Objective-C class derived from `NSObject`. This provides\
    \ the flexibility that any object can respond to collision events, not just `BodyNode`\
    \ objects. If both user data pointers are not `nil`, then the `notifyAB` method\
    \ is called twice, the second time with the A and B variables switched. This will\
    \ ensure that both `objA` and `objB` will receive the collision notification,\
    \ and the `notifyAB` method only needs to handle one case.\n\nThe job of the `notifyAB`\
    \ method is to construct the selector that should be called and, if possible,\
    \ call the selector with any contact information that the receiving object might\
    \ need to handle the collision. [Listing 13–20](#Chapter13.html#list_13_20) shows\
    \ the implementation of the `notifyAB` method.\n\n**Listing 13–20.** *Implementation\
    \ of the Box2D Contact Methods*\n\n```\nvoid ContactListener::notifyAB(b2Contact*\
    \ contact,\n                               NSString* contactType,\n          \
    \                     b2Fixture* fixture,\n                               NSObject*\
    \ obj,\n                               b2Fixture* otherFixture,\n            \
    \                   NSObject* otherObj)\n{\n    NSString* format = @\"%@ContactWith%@:\"\
    ;\n    NSString* otherClassName = NSStringFromClass([otherObj class]);\n    NSString*\
    \ selectorString = [NSString stringWithFormat:format, contactType,    // U002.jpg\n\
    \        otherClassName];\n    SEL contactSelector = NSSelectorFromString(selectorString);\n\
    \n    if ([obj respondsToSelector:contactSelector])\n    {\n        Contact* contactInfo\
    \ = [Contact contactWithObject:otherObj\n                                    \
    \         otherFixture:otherFixture\n                                        \
    \       ownFixture:fixture\n                                                b2Contact:contact];\n\
    \        [obj performSelector:contactSelector withObject:contactInfo];\n    }\n\
    }\n```\n\nThe format string defines the general naming format of the selectors\
    \ that will be called. The syntax of the selectors that `notifyAB` calls is as\
    \ follows:\n\n```\n<contactType>ContactWith<otherClassName>:(Contact*)contactInfo\n\
    ```\n\nThe `contactType` is the string you pass to the `notifyObjects` method,\
    \ which will be either “begin” or “end” in the current implementation. The `otherClassName`\
    \ string is obtained from the `NSStringFromClass` method, which takes the class\
    \ of the `otherObj`. For the collision events of the ball and the plunger, the\
    \ `selectorString` will be one of the following, depending on the `contactType`\
    \ and the `otherObj` class name:"
  raw: '##### Creating a Universal Contact Listener


    To launch the ball automatically on contact, we need some way to react to collisions.
    The Box2D physics engine includes the `b2ContactListener` class. To process collisions,
    you will have to create a custom class that inherits from `b2ContactListener`
    and overrides at least one of the collision callback methods `BeginContact`, `EndContact`,
    `PreSolve`, and `PostSolve`.


    You commonly end up with code that looks similar to [Listing 13–17](#Chapter13.html#list_13_17).
    In principle, you''ll retrieve the two colliding bodies from the `b2Contact` class.
    In this particular case, each body''s user data pointer holds a pointer to a `BodyNode`
    object, which allows you to compare the classes to decide how to further process
    the collision. The verbosity of the code is further increased because a contact''s
    two bodies may be in any order even if the same objects collide frequently. That
    means during any contact, the plunger might be either `bodyA` or `bodyB`, while
    the ball would be the corresponding other body. So, you always have to test for
    both cases.


    **Listing 13–17.** *A Very Common but Tedious Way to Process Box2D Collisions*


    `void ContactListener::BeginContact(b2Contact* contact)`

    `{`

    `    b2Body* bodyA = contact->GetFixtureA()->GetBody();`

    `    b2Body* bodyB = contact->GetFixtureB()->GetBody();`

    `    BodyNode* bodyNodeA = (BodyNode*)bodyA->GetUserData();`

    `    BodyNode* bodyNodeB = (BodyNode*)bodyB->GetUserData();`


    `    if ([bodyNodeA isKindOfClass:[Plunger class]] &&`![images](images/U002.jpg)

    `        [bodyNodeB isKindOfClass:[Ball class]])`

    `    {`

    `        Plunger* plunger = (Plunger*)bodyNodeA;`

    `        // … perform custom code for collision handling`

    `    }`

    `    else if ([bodyNodeB isKindOfClass:[Plunger class]] &&`![images](images/U002.jpg)

    `             [bodyNodeA isKindOfClass:[Ball class]])`

    `    {`

    `        Plunger* plunger = (Plunger*)bodyNodeB;`

    `        // … perform custom code for collision handling`

    `    }`

    `}`


    The previous approach also requires you to import the header files for each colliding
    `BodyNode` class. Over time, the collision-handling class would know about most
    game objects. Instead, you would want to have each `BodyNode` class handle the
    collision events that it is involved in. This keeps the code cleanly separated
    and easier to maintain and turns the job of the collision handling class to one
    of delegating the collision events to the colliding objects.


    The `ContactListener` class ([Listing 13–18](#Chapter13.html#list_13_18)) in the
    PhysicsBox2D05 project defines two additional methods next to the regular Box2D
    collision callback methods to perform the delegation of collision events.


    **Listing 13–18.** *The ContactListener Class Definition*


    `class ContactListener : public b2ContactListener`

    `{`

    `private:`

    `    void BeginContact(b2Contact* contact);`

    `    void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);`

    `    void PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);`

    `    void EndContact(b2Contact* contact);`


    `    void notifyObjects(b2Contact* contact, NSString* contactType);`

    `    void notifyAB(b2Contact* contact,`

    `                  NSString* contactType,`

    `                  b2Fixture* fixtureA,`

    `                  NSObject* objA,`

    `                  b2Fixture* fixtureB,`

    `                  NSObject* objB);`

    `};`


    The regular Box2D contact methods are implemented in [Listing 13–19](#Chapter13.html#list_13_19).
    The `BeginContact` and `EndContact` methods simply delegate the contact information
    to the `notifyObjects` methods but also provide the information about whether
    it was a begin or end contact event by passing an appropriate `NSString` object.
    The reason why it''s a string and not a flag or enumeration will become clear
    shortly. Since we do not care about the `PreSolve` and `PostSolve` events, they
    remain empty stubs but could be extended by also calling `notifyObjects` with
    the contact and an appropriate string.


    **Listing 13–19.** *Implementation of the Box2D Contact Methods*


    `/// Called when two fixtures begin to touch.`

    `void ContactListener::BeginContact(b2Contact* contact)`

    `{`

    `    notifyObjects(contact, @"begin");`

    `}`


    `/// Called when two fixtures cease to touch.`

    `void ContactListener::EndContact(b2Contact* contact)`

    `{`

    `    notifyObjects(contact, @"end");`

    `}`


    `void ContactListener::PreSolve(b2Contact* contact, const b2Manifold* oldManifold)`

    `{`

    `    // do nothing`

    `}`


    `void ContactListener::PostSolve(b2Contact* contact, const b2ContactImpulse* impulse)`

    `{`

    `    // do nothing`

    `}`


    What does the `notifyObjects` method do? Extracting the two colliding bodies and
    obtaining their user data pointer is similar to [Listing 13–17](#Chapter13.html#list_13_17).
    But take note of the differences:


    `void ContactListener::notifyObjects(b2Contact* contact, NSString* contactType)`

    `{`

    `    b2Fixture* fixtureA = contact->GetFixtureA();`

    `    b2Fixture* fixtureB = contact->GetFixtureB();`


    `    b2Body* bodyA = fixtureA->GetBody();`

    `    b2Body* bodyB = fixtureB->GetBody();`


    `    NSObject* objA = (NSObject*)bodyA->GetUserData();`

    `    NSObject* objB = (NSObject*)bodyB->GetUserData();`


    `    if ((objA != nil) && (objB != nil))`

    `    {`

    `        notifyAB(contact, contactType, fixtureA, objA, fixtureB, objB);`

    `        notifyAB(contact, contactType, fixtureB, objB, fixtureA, objA);`

    `    }`

    `}`


    In this case, we simply assume the user data pointer to be a pointer to an Objective-C
    class derived from `NSObject`. This provides the flexibility that any object can
    respond to collision events, not just `BodyNode` objects. If both user data pointers
    are not `nil`, then the `notifyAB` method is called twice, the second time with
    the A and B variables switched. This will ensure that both `objA` and `objB` will
    receive the collision notification, and the `notifyAB` method only needs to handle
    one case.


    The job of the `notifyAB` method is to construct the selector that should be called
    and, if possible, call the selector with any contact information that the receiving
    object might need to handle the collision. [Listing 13–20](#Chapter13.html#list_13_20)
    shows the implementation of the `notifyAB` method.


    **Listing 13–20.** *Implementation of the Box2D Contact Methods*


    `void ContactListener::notifyAB(b2Contact* contact,`

    `                               NSString* contactType,`

    `                               b2Fixture* fixture,`

    `                               NSObject* obj,`

    `                               b2Fixture* otherFixture,`

    `                               NSObject* otherObj)`

    `{`

    `    NSString* format = @"%@ContactWith%@:";`

    `    NSString* otherClassName = NSStringFromClass([otherObj class]);`

    `    NSString* selectorString = [NSString stringWithFormat:format, contactType,`![images](images/U002.jpg)

    `        otherClassName];`

    `    SEL contactSelector = NSSelectorFromString(selectorString);`


    `    if ([obj respondsToSelector:contactSelector])`

    `    {`

    `        Contact* contactInfo = [Contact contactWithObject:otherObj`

    `                                             otherFixture:otherFixture`

    `                                               ownFixture:fixture`

    `                                                b2Contact:contact];`

    `        [obj performSelector:contactSelector withObject:contactInfo];`

    `    }`

    `}`


    The format string defines the general naming format of the selectors that will
    be called. The syntax of the selectors that `notifyAB` calls is as follows:


    `<contactType>ContactWith<otherClassName>:(Contact*)contactInfo`


    The `contactType` is the string you pass to the `notifyObjects` method, which
    will be either “begin” or “end” in the current implementation. The `otherClassName`
    string is obtained from the `NSStringFromClass` method, which takes the class
    of the `otherObj`. For the collision events of the ball and the plunger, the `selectorString`
    will be one of the following, depending on the `contactType` and the `otherObj`
    class name:'
  trans: "\n### 创建通用碰撞监听器\n\n为了在接触时自动发射球，我们需要某种方式对碰撞做出反应。Box2D 物理引擎包含了 `b2ContactListener`\
    \ 类。要处理碰撞，你必须创建一个自定义类，该类继承自 `b2ContactListener` 并重写至少一个碰撞回调方法：`BeginContact`、`EndContact`、`PreSolve`\
    \ 和 `PostSolve`。\n\n最终你通常会得到类似于代码清单 13-17 所示的代码。基本原理是，你需要从 `b2Contact` 类中获取两个碰撞的刚体。在这种特定情况下，每个刚体的用户数据指针都指向一个\
    \ `BodyNode` 对象，这使你可以比较这些类，以决定如何进一步处理碰撞。由于即使相同的物体频繁碰撞，接触的两个刚体顺序也可能不一致，因此代码的冗长程度进一步增加。这意味着在任何一次接触中，柱塞可能是\
    \ `bodyA` 或 `bodyB`，而球则是对应的另一个刚体。因此，你总是需要处理两种情况。\n\n**代码清单 13-17.** *一种非常常见但繁琐的\
    \ Box2D 碰撞处理方式*\n\n```\nvoid ContactListener::BeginContact(b2Contact* contact)\n\
    {\n    b2Body* bodyA = contact->GetFixtureA()->GetBody();\n    b2Body* bodyB =\
    \ contact->GetFixtureB()->GetBody();\n    BodyNode* bodyNodeA = (BodyNode*)bodyA->GetUserData();\n\
    \    BodyNode* bodyNodeB = (BodyNode*)bodyB->GetUserData();\n\n    if ([bodyNodeA\
    \ isKindOfClass:[Plunger class]] &&    // U002.jpg\n        [bodyNodeB isKindOfClass:[Ball\
    \ class]])\n    {\n        Plunger* plunger = (Plunger*)bodyNodeA;\n        //\
    \ … 执行碰撞处理的自定义代码\n    }\n    else if ([bodyNodeB isKindOfClass:[Plunger class]]\
    \ &&   // U002.jpg\n             [bodyNodeA isKindOfClass:[Ball class]])\n   \
    \ {\n        Plunger* plunger = (Plunger*)bodyNodeB;\n        // … 执行碰撞处理的自定义代码\n\
    \    }\n}\n```\n\n之前的方法还需要你为每个发生碰撞的 `BodyNode` 类导入头文件。随着时间的推移，碰撞处理类会了解大部分游戏对象。相反，你希望每个\
    \ `BodyNode` 类自己处理其参与的碰撞事件。这样可以使代码清晰分离，更易于维护，并将碰撞处理类的职责转变为将碰撞事件委托给碰撞对象。\n\nPhysicsBox2D05\
    \ 项目中的 `ContactListener` 类（代码清单 13-18）在常规 Box2D 碰撞回调方法之外定义了两个额外的方法，用于执行碰撞事件的委托。\n\
    \n**代码清单 13-18.** *ContactListener 类定义*\n\n```\nclass ContactListener : public\
    \ b2ContactListener\n{\nprivate:\n    void BeginContact(b2Contact* contact);\n\
    \    void PreSolve(b2Contact* contact, const b2Manifold* oldManifold);\n    void\
    \ PostSolve(b2Contact* contact, const b2ContactImpulse* impulse);\n    void EndContact(b2Contact*\
    \ contact);\n\n    void notifyObjects(b2Contact* contact, NSString* contactType);\n\
    \    void notifyAB(b2Contact* contact,\n                  NSString* contactType,\n\
    \                  b2Fixture* fixtureA,\n                  NSObject* objA,\n \
    \                 b2Fixture* fixtureB,\n                  NSObject* objB);\n};\n\
    ```\n\n常规的 Box2D 接触方法在代码清单 13-19 中实现。`BeginContact` 和 `EndContact` 方法简单地将接触信息委托给\
    \ `notifyObjects` 方法，同时通过传入适当的 `NSString` 对象来提供这是开始接触还是结束接触事件的信息。之所以使用字符串而不是标志或枚举，稍后就会清楚。由于我们不关心\
    \ `PreSolve` 和 `PostSolve` 事件，它们保持为空存根，但可以通过调用 `notifyObjects` 并传入接触和一个适当的字符串来进行扩展。\n\
    \n**代码清单 13-19.** *Box2D 接触方法的实现*\n\n```\n/// 当两个夹具开始接触时调用。\nvoid ContactListener::BeginContact(b2Contact*\
    \ contact)\n{\n    notifyObjects(contact, @\"begin\");\n}\n\n/// 当两个夹具停止接触时调用。\n\
    void ContactListener::EndContact(b2Contact* contact)\n{\n    notifyObjects(contact,\
    \ @\"end\");\n}\n\nvoid ContactListener::PreSolve(b2Contact* contact, const b2Manifold*\
    \ oldManifold)\n{\n    // 不执行任何操作\n}\n\nvoid ContactListener::PostSolve(b2Contact*\
    \ contact, const b2ContactImpulse* impulse)\n{\n    // 不执行任何操作\n}\n```\n\n`notifyObjects`\
    \ 方法做了什么？提取两个碰撞的刚体并获取它们的用户数据指针，这与代码清单 13-17 类似。但请注意不同之处：\n\n```\nvoid ContactListener::notifyObjects(b2Contact*\
    \ contact, NSString* contactType)\n{\n    b2Fixture* fixtureA = contact->GetFixtureA();\n\
    \    b2Fixture* fixtureB = contact->GetFixtureB();\n\n    b2Body* bodyA = fixtureA->GetBody();\n\
    \    b2Body* bodyB = fixtureB->GetBody();\n\n    NSObject* objA = (NSObject*)bodyA->GetUserData();\n\
    \    NSObject* objB = (NSObject*)bodyB->GetUserData();\n\n    if ((objA != nil)\
    \ && (objB != nil))\n    {\n        notifyAB(contact, contactType, fixtureA, objA,\
    \ fixtureB, objB);\n        notifyAB(contact, contactType, fixtureB, objB, fixtureA,\
    \ objA);\n    }\n}\n```\n\n在这种情况下，我们简单假设用户数据指针是一个指向从 `NSObject` 派生的 Objective-C\
    \ 类的指针。这提供了灵活性，使得任何对象都能响应碰撞事件，而不仅仅是 `BodyNode` 对象。如果两个用户数据指针都不为 `nil`，则 `notifyAB`\
    \ 方法会被调用两次，第二次调用时交换了 A 和 B 变量。这将确保 `objA` 和 `objB` 都能收到碰撞通知，并且 `notifyAB` 方法只需要处理一种情况。\n\
    \n`notifyAB` 方法的工作是构造要调用的选择器，如果可能，则用接收对象处理碰撞可能需要的任何接触信息来调用该选择器。代码清单 13-20 展示了\
    \ `notifyAB` 方法的实现。\n\n**代码清单 13-20.** *Box2D 接触方法的实现*\n\n```\nvoid ContactListener::notifyAB(b2Contact*\
    \ contact,\n                               NSString* contactType,\n          \
    \                     b2Fixture* fixture,\n                               NSObject*\
    \ obj,\n                               b2Fixture* otherFixture,\n            \
    \                   NSObject* otherObj)\n{\n    NSString* format = @\"%@ContactWith%@:\"\
    ;\n    NSString* otherClassName = NSStringFromClass([otherObj class]);\n    NSString*\
    \ selectorString = [NSString stringWithFormat:format, contactType,    // U002.jpg\n\
    \        otherClassName];\n    SEL contactSelector = NSSelectorFromString(selectorString);\n\
    \n    if ([obj respondsToSelector:contactSelector])\n    {\n        Contact* contactInfo\
    \ = [Contact contactWithObject:otherObj\n                                    \
    \         otherFixture:otherFixture\n                                        \
    \       ownFixture:fixture\n                                                b2Contact:contact];\n\
    \        [obj performSelector:contactSelector withObject:contactInfo];\n    }\n\
    }\n```\n\n格式化字符串定义了将要调用的选择器的通用命名格式。`notifyAB` 调用的选择器语法如下：\n\n```\n<contactType>ContactWith<otherClassName>:(Contact*)contactInfo\n\
    ```\n\n`contactType` 是你传递给 `notifyObjects` 方法的字符串，在当前实现中将是 \"begin\" 或 \"end\"\
    。`otherClassName` 字符串是通过 `NSStringFromClass` 方法获取的，该方法接收 `otherObj` 的类。对于球和柱塞的碰撞事件，根据\
    \ `contactType` 和 `otherObj` 的类名，`selectorString` 将是以下之一：\n"
- fmt: "`beginContactWithBall`  \n`endContactWithBall`  \n`beginContactWithPlunger`\
    \  \n`endContactWithPlunger`  \n`// and so on …`\n\nBefore performing the selector,\
    \ `notifyAB` first checks whether `obj` actually responds to that selector. In\
    \ the current implementation, only the `Plunger` class implements one of the selectors:\
    \ `beginContactWithBall`. All other selectors will never be performed since they\
    \ don't exist (yet).\n\nThe `Contact` class is also defined in `ContactListener.h`\
    \ and merely acts as a container object holding any collision information that\
    \ you might want to pass to receiving classes. By using a container class, the\
    \ selector format does not need to change when you decide to pass more or less\
    \ information, simply because the only parameter is a pointer to a `Contact` object\
    \ and the information is encapsulated within the `Contact` class.\n\n**TIP:**\
    \ There's also a technical reason for using a container class. The `performSelector`\
    \ method of the `NSObject` class knows only three variants: with zero, one, or\
    \ two parameters. Since we definitely like to pass on more than two parameters\
    \ to the receiving object, there's simply no other choice than to use a container\
    \ class. Whenever you find the `performSelector` method limiting, remember that\
    \ you can always create a container class holding any information that you'd like\
    \ to pass on to the class implementing the selector.\n\nSince `Contact` is such\
    \ a simple class, [Listing 13–21](#Chapter13.html#list_13_21) shows both interface\
    \ and implementation in one Listing.\n\n**Listing 13–21.** *Interface and Implementation\
    \ of the Contact Class*\n\n```\n@interface Contact : NSObject\n{\n@private\n \
    \   NSObject* otherObject;\n    b2Fixture* ownFixture;\n    b2Fixture* otherFixture;\n\
    \    b2Contact* b2contact;\n}\n@property (assign, nonatomic) NSObject* otherObject;\n\
    @property (assign, nonatomic) b2Fixture* ownFixture;\n@property (assign, nonatomic)\
    \ b2Fixture* otherFixture;\n@property (assign, nonatomic) b2Contact* b2contact;\n\
    \n+(id) contactWithObject:(NSObject*)otherObject\n           otherFixture:(b2Fixture*)otherFixture\n\
    \             ownFixture:(b2Fixture*)ownFixture\n              b2Contact:(b2Contact*)b2contact;\n\
    @end\n\n@implementation Contact\n\n@synthesize otherObject, ownFixture, otherFixture,\
    \ b2contact;\n\n+(id) contactWithObject:(NSObject*)otherObject\n           otherFixture:(b2Fixture*)otherFixture\n\
    \             ownFixture:(b2Fixture*)ownFixture\n              b2Contact:(b2Contact*)b2contact\n\
    {\n    Contact* contact = [[[Contact alloc] init] autorelease];\n\n    if (contact)\n\
    \    {\n        contact.otherObject = otherObject;\n        contact.otherFixture\
    \ = otherFixture;\n        contact.ownFixture = ownFixture;\n        contact.b2contact\
    \ = b2contact;\n    }\n\n    return contact;\n}\n\n-(id) retain\n{\n    [NSException\
    \ raise:@\"ContactRetainException\"\n                format:@\"Do not retain a\
    \ Contact - it is for temporary use only!\"];\n    return self;\n}\n\n@end\n```\n\
    \nThe only notable aspect of the `Contact` class is that it overrides the `retain`\
    \ method. This is in case a user tries to retain contact information, which is\
    \ not allowed in Box2D. Directly after the call to the Box2D contact methods,\
    \ the `contact` variable will be released by Box2D and so the `otherFixture`,\
    \ `ownFixture`, and `b2contact` pointers will be invalid, and accessing them would\
    \ cause a crash. Since calling `retain` indicates that the user wants to keep\
    \ a reference to the `Contact` object for later use, this must be prevented by\
    \ throwing an exception that will cause the program execution to halt with an\
    \ error message logged to the debug console.\n\n### Responding to Contact Events\n\
    \nNow whenever the ball and the plunger get in contact, the `beginContactWithBall`\
    \ method in the `Plunger` class will be called:\n\n```\n-(void) endPlunge:(ccTime)delta\n\
    {\n    // stop the scheduling of endPlunge\n    [self unschedule:_cmd];\n\n  \
    \  // stop the motor\n    joint->EnableMotor(NO);\n}\n\n-(void) beginContactWithBall:(Contact*)contact\n\
    {\n    // start the motor\n    joint->EnableMotor(YES);\n\n    // schedule motor\
    \ to come back, unschedule in case the plunger is hit repeatedly    \n    [self\
    \ unschedule:_cmd];\n    [self schedule:@selector(endPlunge:) interval:0.5f];\n\
    }\n```\n\nAs soon as the ball touches the plunger, the plunger's motor is enabled,\
    \ which propels the plunger and thus the ball upward. The `endPlunge` method is\
    \ scheduled to stop the motor after a short time. Extra care has been taken to\
    \ correctly unschedule the selectors. For example, it is very likely that the\
    \ `beginContactWithBall` method is called repeatedly within a short time period,\
    \ because there may be more than one contact point (Box2D reports each contact\
    \ point individually); or simply, the ball might bounce a little and lose contact,\
    \ but the plunger's motor ensures that the plunger will touch the ball again after\
    \ a short time.\n\nSimilarly, you'll find the two methods `beginContactWithPlunger`\
    \ and `beginContactWithBumper` implemented in the `Ball` class. Both types of\
    \ contact will simply play a sound effect:\n\n```\n-(void) playSound\n{\n    float\
    \ pitch = 0.9f + CCRANDOM_0_1() * 0.2f;\n    float gain = 1.0f + CCRANDOM_0_1()\
    \ * 0.3f;\n    [[SimpleAudioEngine sharedEngine] playEffect:@\"bumper.wav\"\n\
    \                                           pitch:pitch\n                    \
    \                         pan:0.0f\n                                         \
    \   gain:gain];\n}\n\n-(void) endContactWithBumper:(Contact*)contact\n{\n    [self\
    \ playSound];\n}\n\n-(void) endContactWithPlunger:(Contact*)contact\n{\n    [self\
    \ playSound];\n}\n```\n\n**TIP:** Keep in mind that Box2D reports each individual\
    \ contact of two colliding objects, causing the contact methods to be called more\
    \ than once for the same two objects. In some cases, you may want to set a boolean\
    \ variable to `YES` in order to note that a contact has already happened. The\
    \ corresponding contact method should first check whether the variable is set,\
    \ and if it is, skip the code. You should later set the variable back to `NO`\
    \ in a scheduled update method to reenable contact events. By doing so, you can\
    \ avoid contact code being run multiple times to avoid undesirable side effects\
    \ like too many sounds played at once."
