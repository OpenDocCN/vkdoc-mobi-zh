- fmt: '# Marketing Your Game and Yourself


    If you’re really not sure whether your game is going to be a success based on
    how much fun it’s going to be, one rather effective way to increase your chances
    is to make a game that’s very presentable and colorful and just looks like great
    fun in screenshots. With the low barrier to entry on mobile devices because of
    the low price points, a great-looking game with little in terms of play depth
    more often than not will outperform and outsell a complex game with multiple game
    modes and many hours of potential game play. It may pain some developers because
    it goes against everything they believe in, but it’s an unavoidable fact of life.
    Of course, if you can combine the two and create an innovative, fun game that
    just looks great, the opportunities are endless.


    If you browse reviews, there’s one thing you should be giving a lot of attention
    to. The most prominently featured screenshots are always action scenes from the
    game, usually with a lot of things going on at the same time. This has almost
    become an art form; professional developers will even develop specialized tools
    to stage scenes where they can take the best possible action screenshots, without
    having to play the game and rely on luck to get it just right. Maybe you should
    consider that, too. So, the best artwork you can create or pay for should definitely
    be a priority for you, and so should making a convincing trailer for your game.
    Outstanding presentation is a very important buy-in to get to talking with a publisher
    as well.


    This advice goes for your blog as well. You do have a blog, don’t you? If not,
    start one right now! You can get a free blog on [`http://wordpress.com`](http://wordpress.com),
    and you’ll learn how to work with the most popular blogging software along the
    way. As your blog matures, you may want to consider hosting your blog on your
    own server; you can do that with WordPress as well, but with a lot more options
    for customization through plug-ins and themes.


    Your blog is an important piece for marketing yourself. The most important aspect
    here is that self-marketing will indirectly benefit anything you do from now on.
    Blogging gets you in touch with other like-minded people, who sooner or later
    will be willing to help you, sometimes for free. If you are really making a name
    for yourself in your development community, it’s good news, because it could get
    you attention from publishers, who follow the same channels you’re working in
    (as opposed to most of the players of your game, which you’ll have to reach out
    to on a different level).


    And since your blog should be your public face, it should be you who’s talking.
    Don’t put on a mask and try to sound like a big corporation—for example, by saying
    things like what you’re doing is going to revolutionize the way we play games.
    I call that . . . a term I won’t write out in this book, but I’m sure you know
    what I mean.


    Make sure you don’t come across as cocky on your blog, but likewise don’t belittle
    yourself. You may be a beginner, but you’re learning, so focus on what you’ve
    learned. The things you do learn will seem like things that millions of other
    developers already know, so you might wonder whether you should really blog about
    them. I’m familiar with these thoughts, and frankly speaking, you’ll always have
    doubts about whether what you write is going to be of interest to others. It is,
    trust me. And if it isn’t, no big deal. The truth is, even though there are millions
    of developers who may already know about what you post, there are millions more
    who don’t and who will be able to learn from you.


    And remember to put your best skills up front and avoid blogging about your weaknesses.
    You may not know it all, but you can learn it. If you really want to know how
    multiplayer game programming can be enhanced by predicting client movements, learn
    about it. The web is a great resource—collect what you find, and blog about what
    you found and learned. Others will respect you for it. Blogging takes years of
    practice, so it’s best to start now because it will pay off in the end—possibly
    in ways you can’t even imagine right now.


    Another important way of marketing yourself is by using Twitter. Once you have
    something to tell the world, you’ll be happy to be able to reach out to dozens,
    hundreds, if not thousands of your followers at once. It’s a very effective marketing
    tool. How to use it effectively is a matter of following simple steps. First,
    don’t protect your tweets—it seriously limits the number of people who are going
    to follow you. (I certainly won’t.) Then provide an interesting bio, which should
    include your interests, what you do, and anything else that makes you seem like
    an interesting person to follow. Simply using a joke, poem, or quote as your bio
    is a no-no. And don’t forget to link to your blog! The most important thing is
    to tweet regularly, and tweet about things others might find interesting. Tweeting
    only about yourself and your products (or just retweeting other’s posts) isn’t
    going to convince many people to follow you.'
