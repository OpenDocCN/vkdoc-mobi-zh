    folder of the PhysicsBox2D01 project. The tiles are 32×32 pixels, so they''ll
    make perfect 1×1-meter boxes. [Listing 12–3](#Chapter12.html#list_12_3) is the
    code in the `init` method that adds the texture and creates a couple boxes. It
    also schedules the `update` method, which is needed to update the box sprite positions,
    and it enables touch so that the user can tap the screen to create a new box.


