  trans: '

    #### 使用 Xcode 3 移植到 iPad


    移植 iPhone 项目是一个简单的过程。如果你使用的是 Xcode 3，请在 `Groups & Files` 面板中选择要转换的目标，然后选择**项目**
    → **将当前目标升级到 iPad…**，这将弹出如图 4-8 所示的对话框。


    ![images](img/0408.jpg)


    **图 4-8.** *在 Xcode 3 中将目标升级到 iPad 会提供两个选项。通用应用程序要求你将 iPhone 和 iPad 资源都添加到同一个目标中，这会增加应用的下载体积。*


    对于简单的游戏，默认的**一个通用应用程序**选项就足够了。它的缺点是所有资源都会被添加到同一个目标中，从而增加应用的体积。这是唯一的技术缺陷，并不会带来性能上的惩罚。生成的应用可以在
    iPhone 和 iPad 上运行。选择**两个特定设备应用**选项可以让你将游戏资源分离，但最终会得到两个应用，你需要分别将它们提交到 App Store。


    目前更简单的做法是选择**一个通用应用程序**并运行代码。在设备上，应用会自动检测连接到哪个设备，并运行相应的版本。如果你想在 iPad 模拟器中尝试，只需将
    iPad 模拟器设置为活动可执行文件，如图 4-9 所示。


    ![images](img/0409.jpg)


    **图 4-9.** *要在 iPad 模拟器中运行新的通用应用，请将其设为活动可执行文件。*


    #### 使用 Xcode 4 移植到 iPad


    Xcode 4 让应用移植变得极其直接，你甚至可以通过一个简单的下拉菜单来更改目标设备。


    首先，在项目导航器中选择项目 `DoodleDrop`。这会显示目标列表，在其中选择 `DoodleDrop` 目标，然后选择**摘要**选项卡。在 iOS
    应用目标部分，有一个标记为 `Devices` 的弹出控件，提供三个选项：iPhone、iPad 和 Universal。


    根据设备设置，你的应用将专门为 iPhone 或 iPad 构建，或者作为通用应用同时支持 iPhone 和 iPad 构建。在图 4-10 中，目标被设置为构建通用应用。


    ![images](img/0410.jpg)


    **图 4-10.** *将应用目标更改为构建通用应用*


    现在你可能会想，如果我想为 iPhone 和 iPad 分别设置两个独立的目标该怎么办？这对于为 iPhone 和 iPad 版本设定不同价格，或者单纯为了减小任一版本的下载体积来说非常有用。


    在这种情况下，你只需选择目标（本例中为 `DoodleDrop`），然后从菜单中选择**编辑** → **复制**。或者直接右键单击目标并选择**复制**。这会创建一个目标的副本，使你可以将一个目标的
    `Devices` 设置设为 iPhone，另一个目标的 `Devices` 设置设为 iPad。现在你为每种设备类型都拥有了独立的目标，并且你可能希望相应地标记这些目标以避免混淆。


    ### 摘要


    我希望你在构建这第一个游戏时玩得开心。这当然需要吸收很多东西，但我宁愿信息过多，也不愿信息过少。


    至此，你已经学会了如何创建自己的游戏层类以及如何使用精灵。你使用了加速度计来控制玩家，并添加了速度以使玩家精灵能够加速和减速，从而赋予其更具动感的感觉。


    我还向你介绍了未文档化的 `CCArray` 类，它是 cocos2d 对 `NSMutableArray` 的替代品。当需要存储数据列表时，这应该是你的首选。同样来自未文档化的
    `CGPointExtensions` 中，使用距离检测方法的简单径向碰撞检测也一并为你呈现。


    作为餐后甜点，你还接触了标签、位图字体和 Glyph Designer 工具的混合大杂烩，并点缀了一些音频编程。


    还剩下什么？或许可以浏览一下本章的源代码。我已经添加了本游戏的最终版本，其中包含了一些游戏玩法的改进、一个启动菜单以及一个游戏结束信息。


    关于 `DoodleDrop` 项目，我还没有提到一件事：它全部放在一个类中。对于一个小项目来说，这可能足够了，但随着你继续实现更多功能，它会很快变得混乱。你需要在代码设计中增加一些结构。下一章将为你提供
    cocos2d 编程的最佳实践，并展示如何布局你的代码，以及在对象不再属于同一个类时，它们之间传递信息的各种方式。


    ## 第 5 章


    ## 游戏构建块


    上一章中的游戏 `DoodleDrop` 被编写得易于理解，适合刚接触 cocos2d 的新手。不过，如果你是一位经验更丰富的开发者，你可能会注意到代码没有分离；所有内容都放在一个文件中。显然，这无法扩展，如果你要制作比
    `DoodleDrop` 更大、更刺激的游戏，你必须找到适合的方式来组织你的代码。否则，你可能会用一个类来驱动游戏的所有逻辑。代码量可能会迅速增长到数千行，使得导航变得困难，并容易从任何地方修改任何内容，很可能会引入难以发现的细微错误。


    每个新项目都需要其自己的代码设计。在本章中，我将介绍一些用于编写更复杂 cocos2d 游戏的构建块。本章奠定的代码基础将用于创建我们在接下来几章中将要构建的横向卷轴射击游戏。


    ### 使用多个场景


    `DoodleDrop` 游戏只有一个场景和一个图层。更复杂的游戏肯定需要多个场景和多个图层。如何使用它们以及何时使用它们将逐渐成为你的本能。让我们来看看具体内容。

    '
- fmt: "#### Adding More Scenes\n\nThe basics still apply. In [Listings 4-1](#Chapter04.html#list_4_1)\
    \ and [4-2](#Chapter04.html#list_4_2) in the previous chapter, I outlined the\
    \ basic code needed to create a scene. Adding more scenes is a matter of adding\
    \ more classes built on that same basic code. It’s when you’re transitioning between\
    \ scenes that things get a little more interesting. There’s a set of three methods\
    \ in `CCNode` that are called on each node object in the current scene hierarchy\
    \ when you’re replacing a scene via the `CCDirectorreplaceScene` method.\n\nThe\
    \ `onEnter` and `onExit` methods get called at certain times during a scene change,\
    \ depending on whether a `CCTransitionScene` is used. You must always call the\
    \ super implementation of these methods to avoid input problems and memory leaks.\
    \ Take a look at [Listing 5–1](#Chapter05.html#list_5_1), and note that all of\
    \ these methods call the `super` implementation.\n\n**Listing 5–1.** *The onEnter\
    \ and onExit Methods*\n\n```\n-(void) onEnter\n{\n    // Called right after a\
    \ node's init method is called.\n    // If using a CCTransitionScene: called when\
    \ the transition begins.\n\n    [super onEnter];\n}\n\n-(void) onEnterTransitionDidFinish\n\
    {\n    // Called right after onEnter.\n    // If using a CCTransitionScene: called\
    \ when the transition has ended.\n\n    [super onEnterTransitionDidFinish];\n\
    }\n\n-(void) onExit\n{\n    // Called right before node's dealloc method is called.\n\
    \    // If using a CCTransitionScene: called when the transition has ended.\n\n\
    \    [super onExit];\n}\n```\n\n**NOTE:** If you don’t make the call to the `super`\
    \ implementation in the `onEnter` methods, your new scene may not react to touch\
    \ or accelerometer input. If you don’t call `super` in `onExit`, the current scene\
    \ may not be released from memory. Since it’s easy to forget this and the resulting\
    \ behavior doesn’t lead you to realize that it may be related to these methods,\
    \ it’s important to stress this point. You can see this behavior in the `ScenesAndLayer01_WithBugs`\
    \ project.\n\nThese methods are useful whenever you need to do something in any\
    \ node (`CCNode`, `CCLayer`, `CCScene`, `CCSprite`, `CCLabelTTF`, and so on) right\
    \ before a scene is changed or right after. The difference from simply writing\
    \ the same code in a node’s `init` or `dealloc` method is that the scene is already\
    \ fully set up during `onEnter`, and it still contains all nodes during `onExit`.\n\
    \nThis can be important. For example, if you perform a transition to change scenes,\
    \ you may want to pause certain animations or hide user interface elements until\
    \ the transition finishes. Here’s the sequence in which these methods get called,\
    \ based on the logging information from the `ScenesAndLayers02` project:\n\n1.\
    \  `scene: OtherScene`\n2.  `init: <OtherScene = 066B2130 | Tag = -1>`\n3.  `onEnter:\
    \ <OtherScene = 066B2130 | Tag = -1>`\n4.  `// Transition is running here …`\n\
    5.  `onExit: <FirstScene = 0668DF40 | Tag = -1>`\n6.  `onEnterTransitionDidFinish:\
    \ <OtherScene = 066B2130 | Tag = -1>`\n7.  `dealloc: <FirstScene = 0668DF40 |\
    \ Tag = -1>`\n\nAt first, `OtherScene`’s `+(id) scene` method is called to initialize\
    \ the `CCScene` and the `CCLayer` it contains. The `OtherSceneCCLayer`’s `init`\
    \ method is then called, directly followed by the `onEnter` method in line 3.\
    \ In line 4, the transition is sliding the new scene in, and when it’s done, the\
    \ `FirstSceneonExit` method gets called, followed by `onEnterTransitionDidFinish`\
    \ in `OtherScene`.\n\n**TIP:** The numbers following the class name, like `FirstScene\
    \ = 0668DF40`, are the memory address where this object is stored in memory. If\
    \ you have multiple objects of the same class, they will log the same class name,\
    \ but their memory addresses will be different. This and the possibly unique tag\
    \ values can help you identify objects of the same class and assist in debugging.\
    \ If you have little experience in debugging code, I strongly suggest you read\
    \ the section on debugging applications in Apple’s iOS Development Guide: `developer.apple.com/library/ios/#documentation/Xcode/Conceptual/iphone_development/130-Debugging_Applications/debugging_applications.html`.\n\
    \nDebugging an application is not as hard as it may sound. You don’t need to know\
    \ assembler or machine code, and you don’t need to be a hacker or expert coder.\
    \ The debugger is an invaluable tool for every developer to pinpoint issues, crashes\
    \ in particular. A great number of users seeking for help on the Internet because\
    \ their application is crashing could have easily solved their problem if they\
    \ knew just the debugging basics: setting breakpoints, stepping through code,\
    \ and inspecting the values of variables. That covers about 80 percent of the\
    \ time spent with the debugger.\n\nNote that the `FirstScenedealloc` method is\
    \ called last. This means that during `onEnterTransitionDidFinish`, the previous\
    \ scene is still in memory. If you want to allocate memory-intensive nodes at\
    \ this point, you’ll have to schedule a selector to wait at least one frame before\
    \ doing the memory allocations, to be certain that the previous scene’s memory\
    \ is released. You can schedule a method that is guaranteed to be called the next\
    \ frame by omitting the interval parameter when scheduling the method:\n\n```\n\
    [self schedule:@selector(waitOneFrame:)];\n```\n\nThe method that will be called\
    \ then needs to unscheduled itself by calling `unschedule` with the hidden `_cmd`\
    \ parameter:\n\n```\n-(void) waitOneFrame:(ccTime)delta\n{\n    [self unschedule:_cmd];\n\
    \n    // delayed code goes here ...\n}\n```\n\nAnother strategy would be to release\
    \ as much memory as possible in the previous scene’s `onExit` method. However,\
    \ this works only if the memory was allocated by you. For example, if your `init`\
    \ method allocates an `NSMutableArray` instance variable like so:\n\n```\nmyArray\
    \ = [[NSMutableArray alloc] init];\n```\n\nyou will eventually have to call `release`\
    \ on `myArray` to free its memory. Normally you would do so in the `dealloc` method,\
    \ but you can also release the memory early in the `onExit` method:\n\n```\n-(void)\
    \ onExit\n{\n    [super onExit];\n\n    [myArray release];\n    myArray = nil;\n\
    }\n```\n\nNotice that I set `myArray` to `nil`. It’s still possible that `myArray`\
    \ might be used after `onExit` and before the node is deallocated. Setting instance\
    \ variables to `nil` when they’re being released is good practice to prevent a\
    \ potential crash. Since the memory address `myArray` points to has been freed,\
    \ any code that tries to send a message to the now-released `myArray` would cause\
    \ an `EXC_BAD_ACCESS` error."
  raw: '#### Adding More Scenes


    The basics still apply. In [Listings 4-1](#Chapter04.html#list_4_1) and [4-2](#Chapter04.html#list_4_2)
    in the previous chapter, I outlined the basic code needed to create a scene. Adding
    more scenes is a matter of adding more classes built on that same basic code.
    It’s when you’re transitioning between scenes that things get a little more interesting.
    There’s a set of three methods in `CCNode` that are called on each node object
    in the current scene hierarchy when you’re replacing a scene via the `CCDirectorreplaceScene`
    method.


    The `onEnter` and `onExit` methods get called at certain times during a scene
    change, depending on whether a `CCTransitionScene` is used. You must always call
    the super implementation of these methods to avoid input problems and memory leaks.
    Take a look at [Listing 5–1](#Chapter05.html#list_5_1), and note that all of these
    methods call the `super` implementation.


    **Listing 5–1.** *The onEnter and onExit Methods*


    `-(void) onEnter`

    `{`

    `    // Called right after a node''s init method is called.`

    `    // If using a CCTransitionScene: called when the transition begins.`


    `    [super onEnter];`

    `}`


    `-(void) onEnterTransitionDidFinish`

    `{`

    `    // Called right after onEnter.`

    `    // If using a CCTransitionScene: called when the transition has ended.`


    `    [super onEnterTransitionDidFinish];`

    `}`


    `-(void) onExit`

    `{`

    `    // Called right before node''s dealloc method is called.`

    `    // If using a CCTransitionScene: called when the transition has ended.`


    `    [super onExit];`

    `}`


    **NOTE:** If you don’t make the call to the `super` implementation in the `onEnter`
    methods, your new scene may not react to touch or accelerometer input. If you
    don’t call `super` in `onExit`, the current scene may not be released from memory.
    Since it’s easy to forget this and the resulting behavior doesn’t lead you to
    realize that it may be related to these methods, it’s important to stress this
    point. You can see this behavior in the ScenesAndLayer01_WithBugs project.


    These methods are useful whenever you need to do something in any node (`CCNode`,
    `CCLayer`, `CCScene`, `CCSprite`, `CCLabelTTF`, and so on) right before a scene
    is changed or right after. The difference from simply writing the same code in
    a node’s `init` or `dealloc` method is that the scene is already fully set up
    during `onEnter`, and it still contains all nodes during `onExit`.


    This can be important. For example, if you perform a transition to change scenes,
    you may want to pause certain animations or hide user interface elements until
    the transition finishes. Here’s the sequence in which these methods get called,
    based on the logging information from the ScenesAndLayers02 project:


    1.  `scene: OtherScene`

    2.  `init: <OtherScene = 066B2130 | Tag = -1>`

    3.  `onEnter: <OtherScene = 066B2130 | Tag = -1>`

    4.  `// Transition is running here …`

    5.  `onExit: <FirstScene = 0668DF40 | Tag = -1>`

    6.  `onEnterTransitionDidFinish: <OtherScene = 066B2130 | Tag = -1>`

    7.  `dealloc: <FirstScene = 0668DF40 | Tag = -1>`


    At first, `OtherScene`’s `+(id) scene` method is called to initialize the `CCScene`
    and the `CCLayer` it contains. The `OtherSceneCCLayer`’s `init` method is then
    called, directly followed by the `onEnter` method in line 3\. In line 4, the transition
    is sliding the new scene in, and when it’s done, the `FirstSceneonExit` method
    gets called, followed by `onEnterTransitionDidFinish` in `OtherScene`.


    **TIP:** The numbers following the class name, like `FirstScene = 0668DF40`, are
    the memory address where this object is stored in memory. If you have multiple
    objects of the same class, they will log the same class name, but their memory
    addresses will be different. This and the possibly unique tag values can help
    you identify objects of the same class and assist in debugging. If you have little
    experience in debugging code, I strongly suggest you read the section on debugging
    applications in Apple’s iOS Development Guide:

    [`developer.apple.com/library/ios/#documentation/Xcode/Conceptual/iphone_development/130-Debugging_Applications/debugging_applications.html`](http://developer.apple.com/library/ios/#documentation/Xcode/Conceptual/iphone_development/130-Debugging_Applications/debugging_applications.html).


    Debugging an application is not as hard as it may sound. You don’t need to know
    assembler or machine code, and you don’t need to be a hacker or expert coder.
    The debugger is an invaluable tool for every developer to pinpoint issues, crashes
    in particular. A great number of users seeking for help on the Internet because
    their application is crashing could have easily solved their problem if they knew
    just the debugging basics: setting breakpoints, stepping through code, and inspecting
    the values of variables. That covers about 80 percent of the time spent with the
    debugger.


    Note that the `FirstScenedealloc` method is called last. This means that during
    `onEnterTransitionDidFinish`, the previous scene is still in memory. If you want
    to allocate memory-intensive nodes at this point, you’ll have to schedule a selector
    to wait at least one frame before doing the memory allocations, to be certain
    that the previous scene’s memory is released. You can schedule a method that is
    guaranteed to be called the next frame by omitting the interval parameter when
    scheduling the method:


    `[self schedule:@selector(waitOneFrame:)];`


    The method that will be called then needs to unscheduled itself by calling `unschedule`
    with the hidden `_cmd` parameter:


    `-(void) waitOneFrame:(ccTime)delta`

    `{`

    `    [self unschedule:_cmd];`


    `    // delayed code goes here ...`

    `}`


    Another strategy would be to release as much memory as possible in the previous
    scene’s `onExit` method. However, this worksonly if the memory was allocated by
    you. For example, if your `init` method allocates an `NSMutableArray` instance
    variable like so:


    `myArray = [[NSMutableArray alloc] init];`


    you will eventually have to call `release` on `myArray` to free its memory. Normally
    you would do so in the `dealloc` method, but you can also release the memory early
    in the `onExit` method:


    `-(void) onExit`

    `{`

    `    [super onExit];`


    `    [myArray release];`

    `    myArray = nil;`

    `}`


    Notice that I set `myArray` to `nil`. It’s still possible that `myArray` might
    be used after `onExit` and before the node is deallocated. Setting instance variables
    to `nil` when they’re being released is good practice to prevent a potential crash.
    Since the memory address `myArray` points to has been freed, any code that tries
    to send a message to the now-released `myArray` would cause an `EXC_BAD_ACCESS`
    error.'
  trans: "\n#### 添加更多场景\n\n基础内容仍然适用。在上一章的代码清单 4-1 和 4-2 中，我概述了创建场景所需的基本代码。添加更多场景就是基于相同的基础代码构建更多类。真正有趣的是场景之间的过渡。当您通过\
    \ `CCDirector` 的 `replaceScene` 方法替换场景时，当前场景层级中的每个节点对象都会调用 `CCNode` 中的三个方法。\n\n\
    `onEnter` 和 `onExit` 方法会在场景切换的特定时刻被调用，具体取决于是否使用了 `CCTransitionScene`。您必须始终调用这些方法的父类实现，以避免输入问题和内存泄漏。请看代码清单\
    \ 5-1，请注意所有这些方法都调用了 `super` 实现。\n\n**代码清单 5-1.** *onEnter 和 onExit 方法*\n\n```\n\
    -(void) onEnter\n{\n    // 在节点的 init 方法被调用后立即调用。\n    // 如果使用了 CCTransitionScene：则在过渡开始时调用。\n\
    \n    [super onEnter];\n}\n\n-(void) onEnterTransitionDidFinish\n{\n    // 在 onEnter\
    \ 之后立即调用。\n    // 如果使用了 CCTransitionScene：则在过渡结束时调用。\n\n    [super onEnterTransitionDidFinish];\n\
    }\n\n-(void) onExit\n{\n    // 在节点的 dealloc 方法被调用前立即调用。\n    // 如果使用了 CCTransitionScene：则在过渡结束时调用。\n\
    \n    [super onExit];\n}\n```\n\n**注意：** 如果您在 `onEnter` 方法中没有调用 `super` 实现，您的新场景可能无法响应触摸或加速计输入。如果您在\
    \ `onExit` 中没有调用 `super`，当前场景可能无法从内存中释放。由于这一点很容易被遗忘，并且由此产生的行为不会让您意识到可能与此有关，因此强调这一点非常重要。您可以在\
    \ `ScenesAndLayer01_WithBugs` 项目中看到这种行为。\n\n这些方法在您需要在场景即将改变或刚刚改变后，对任何节点（`CCNode`、`CCLayer`、`CCScene`、`CCSprite`、`CCLabelTTF`\
    \ 等）执行某些操作时非常有用。与简单地在节点的 `init` 或 `dealloc` 方法中编写相同代码的区别在于：在 `onEnter` 期间，场景已经完全设置好；在\
    \ `onExit` 期间，场景仍然包含所有节点。\n\n这可能很重要。例如，如果您执行一个过渡来切换场景，您可能希望暂停某些动画或隐藏用户界面元素，直到过渡完成。以下是这些方法的调用顺序，基于\
    \ `ScenesAndLayers02` 项目的日志信息：\n\n1.  `scene: OtherScene`\n2.  `init: <OtherScene\
    \ = 066B2130 | Tag = -1>`\n3.  `onEnter: <OtherScene = 066B2130 | Tag = -1>`\n\
    4.  `// 过渡在此处运行...`\n5.  `onExit: <FirstScene = 0668DF40 | Tag = -1>`\n6.  `onEnterTransitionDidFinish:\
    \ <OtherScene = 066B2130 | Tag = -1>`\n7.  `dealloc: <FirstScene = 0668DF40 |\
    \ Tag = -1>`\n\n首先，调用 `OtherScene` 的 `+(id) scene` 方法来初始化 `CCScene` 及其包含的 `CCLayer`。接着调用\
    \ `OtherSceneCCLayer` 的 `init` 方法，随后在第 3 行立即调用 `onEnter` 方法。在第 4 行，过渡正在将新场景滑入，完成后，调用\
    \ `FirstScene` 的 `onExit` 方法，接着调用 `OtherScene` 中的 `onEnterTransitionDidFinish`。\n\
    \n**提示：** 类名后面的数字，例如 `FirstScene = 0668DF40`，是此对象在内存中存储的内存地址。如果您有多个同一类的对象，它们会记录相同的类名，但内存地址会不同。这以及可能唯一的标签值可以帮助您识别同一类的对象并辅助调试。如果您在调试代码方面经验不足，我强烈建议您阅读苹果\
    \ iOS 开发指南中关于调试应用程序的部分：`developer.apple.com/library/ios/#documentation/Xcode/Conceptual/iphone_development/130-Debugging_Applications/debugging_applications.html`。\n\
    \n调试应用程序并不像听起来那么难。您不需要了解汇编器或机器码，也不需要成为黑客或专家级程序员。调试器是每个开发者定位问题（尤其是崩溃）的宝贵工具。大量用户在互联网上寻求帮助，因为他们的应用程序崩溃了，其实只要他们了解基本的调试知识：设置断点、单步执行代码以及检查变量值，他们就可以轻松解决自己的问题。这涵盖了大约\
    \ 80% 的调试器使用场景。\n\n请注意，`FirstScene` 的 `dealloc` 方法最后才被调用。这意味着在 `onEnterTransitionDidFinish`\
    \ 期间，上一个场景仍在内存中。如果您此时想要分配内存密集型节点，则必须安排一个选择器，等待至少一帧后再进行内存分配，以确保上一个场景的内存已被释放。您可以通过在调度方法时省略间隔参数，来保证调度的方法在下一帧被调用：\n\
    \n```\n[self schedule:@selector(waitOneFrame:)];\n```\n\n随后被调用的方法需要调用 `unschedule`\
    \ 并使用隐藏参数 `_cmd` 来取消自身调度：\n\n```\n-(void) waitOneFrame:(ccTime)delta\n{\n    [self\
    \ unschedule:_cmd];\n\n    // 延迟执行的代码写在这里...\n}\n```\n\n另一种策略是在上一个场景的 `onExit`\
    \ 方法中尽可能多地释放内存。但这仅在内存是由您分配时才有效。例如，如果您的 `init` 方法像这样分配了一个 `NSMutableArray` 实例变量：\n\
    \n```\nmyArray = [[NSMutableArray alloc] init];\n```\n\n您最终将需要调用 `myArray` 上的\
    \ `release` 来释放其内存。通常您会在 `dealloc` 方法中这样做，但您也可以在 `onExit` 方法中提前释放内存：\n\n```\n\
    -(void) onExit\n{\n    [super onExit];\n\n    [myArray release];\n    myArray\
    \ = nil;\n}\n```\n\n请注意，我将 `myArray` 设置为 `nil`。在 `onExit` 之后、节点被释放之前，`myArray`\
    \ 仍有可能被使用。在释放实例变量时将其设置为 `nil` 是防止潜在崩溃的良好实践。由于 `myArray` 指向的内存地址已被释放，任何试图向已释放的\
    \ `myArray` 发送消息的代码都会导致 `EXC_BAD_ACCESS` 错误。\n"
- fmt: "# Loading Next Paragraph, Please Stand By\n\nSooner or later you’ll face noticeable\
    \ loading times during scene transitions. As you add more content, loading times\
    \ will correspondingly increase. Creating a new scene actually happens before\
    \ the scene transition starts. If you have very complex code or load a lot of\
    \ assets in the new scene’s `init` or `onEnter` methods, there will be an obvious\
    \ delay before the transition begins. This is especially problematic if the new\
    \ scene takes more than one second to load and the user initiated the scene change\
    \ by clicking a button. The user may get the impression that the game has locked\
    \ up or frozen. The way to alleviate this problem is to add another scene in between:\
    \ a loading scene. You’ll find an example implementation in the `ScenesAndLayers03`\
    \ project.\n\nIn effect, the `LoadingScene` acts as an intermediate scene. It\
    \ is derived from the cocos2d `CCScene` class. You don’t have to create a new\
    \ `LoadingScene` for each transition; you can use one scene for which you simply\
    \ specify the target scene you’d like to be loaded. An `enum` works best for this;\
    \ it’s defined in the `LoadingScene` header file shown in [Listing 5–2](#Chapter05.html#list_5_2).\n\
    \n**Listing 5–2.** *LoadingScene.h*\n\n```\ntypedef enum\n{\n    TargetSceneINVALID\
    \ = 0,\n    TargetSceneFirstScene,\n    TargetSceneOtherScene,\n    TargetSceneMAX,\n\
    } TargetScenes;\n\n// LoadingScene is derived directly from Scene. We don't need\
    \ a CCLayer for this scene.\n@interface LoadingScene : CCScene\n{\n    TargetScenes\
    \ targetScene_;\n}\n\n+(id) sceneWithTargetScene:(TargetScenes)targetScene;\n\
    -(id) initWithTargetScene:(TargetScenes)targetScene;\n```\n\n**TIP:** It is good\
    \ practice to set the first `enum` value to be an `INVALID` value, unless you\
    \ intend to make the first the default. Variables in Objective-C are initialized\
    \ to 0 automatically unless you specify a different value.\n\nIn addition, you\
    \ can also add a `MAX` or `NUM` entry at the end of the `enum` if you intend to\
    \ iterate over every `enum` value, as in:\n\n```\nfor (int i = TargetSceneINVALID\
    \ + 1; i < TargetScenesMAX; i++) { .. }\n```\n\nIn the case of the `LoadingScene`,\
    \ it’s not necessary, but I tend to add these entries merely out of habit, even\
    \ if I don’t need them.\n\nThis brings me to the `LoadingScene` class implementation\
    \ of the `ScenesAndLayers03` project in [Listing 5–3](#Chapter05.html#list_5_3).\
    \ You’ll notice that the scene is initialized differently and that it uses `scheduleUpdate`\
    \ to delay replacing the `LoadingScene` with the actual target scene.\n\n**Listing\
    \ 5–3.** *The LoadingScene Class Uses a Switch to Decide Whether to Load the Target\
    \ Scene*\n\n```\n+(id) sceneWithTargetScene:(TargetScenes)targetScene;\n{\n  \
    \  // This creates an autorelease object of the current class\n    return [[[self\
    \ alloc] initWithTargetScene:targetScene] autorelease];\n}\n\n-(id) initWithTargetScene:(TargetScenes)targetScene\n\
    {\n    if ((self = [super init]))\n    {\n        targetScene_ = targetScene;\n\
    \n        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"Loading ...\"\n \
    \                                              fontName:@\"Marker Felt\"\n   \
    \                                            fontSize:64];\n        CGSize size\
    \ = [[CCDirector sharedDirector] winSize];\n        label.position = CGPointMake(size.width\
    \ / 2, size.height / 2);\n        [self addChild:label];\n\n        // Must wait\
    \ one frame before loading the target scene!\n        [self scheduleUpdate];\n\
    \    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n{\n    [self unscheduleAllSelectors];\n\
    \n    // Decide which scene to load based on the TargetScenes enum.\n    switch\
    \ (targetScene_)\n    {\n        case TargetSceneFirstScene:\n            [[CCDirector\
    \ sharedDirector] replaceScene:[FirstScene scene]];\n            break;\n    \
    \    case TargetSceneOtherScene:\n            [[CCDirector sharedDirector] replaceScene:[OtherScene\
    \ scene]];\n            break;\n\n        default:\n            // Always warn\
    \ if an unspecified enum value was used\n            NSAssert2(nil, @\"%@: unsupported\
    \ TargetScene %i\", \n                NSStringFromSelector(_cmd), targetScene_);\n\
    \            break;\n    }\n}\n```\n\nBecause the `LoadingScene` is derived from\
    \ `CCScene` and requires a new parameter passed to it, it’s no longer sufficient\
    \ to call `[CCScene node]`. The `sceneWithTargetScene` method first allocates\
    \ `self`, calls the `initWithTargetScene` method, and returns the new object as\
    \ autorelease. This is the same way cocos2d initializes its own classes, and it’s\
    \ the reason you can rely on cocos2d objects being autoreleased. If you’re deriving\
    \ your own classes, you should always add the appropriate static autorelease initializers,\
    \ like in this case `sceneWithTargetScene`.\n\nThe `init` method simply stores\
    \ the target scene in a member variable, creates the “Loading…” label, and runs\
    \ `scheduleUpdate`.\n\n**CAUTION:** Why not just call `replaceScene` right inside\
    \ the `init` method? There are two rules about that. Rule number 1 is never call\
    \ `CCDirector`’s `replaceScene` in a node’s `init` method. Rule number 2 is follow\
    \ rule number 1. The reason: it crashes. The `Director` can’t cope with replacing\
    \ a scene from a node that is currently being initialized.\n\nThe `update` method\
    \ then uses a simple `switch` statement based on the provided `TargetScenes` enum\
    \ to determine which scene is to be replaced. The default `switch` contains an\
    \ `NSAssert`, which always triggers when the default case is hit. This is good\
    \ practice because you’ll be editing and expanding this list several times, and\
    \ if you forgot to update the `switch` statement with a new case, you’ll be notified\
    \ of that.\n\nThis is a very simple `LoadingScene` implementation that you can\
    \ use in your own games. Simply extend the `enum` and `switch` statement with\
    \ more target scenes, or use the same target scene multiple times but with different\
    \ transitions. But as I mentioned, don’t overdo the transitions just because they’re\
    \ cool-looking.\n\nUsing the `LoadingScene` has an important effect regarding\
    \ memory. Since you’re replacing the existing scene with the lightweight `LoadingScene`\
    \ and then replacing the `LoadingScene` with the actual target scene, you’re giving\
    \ cocos2d enough time to free up the previous scene’s memory. Effectively there’s\
    \ no longer any overlap with two complex scenes in memory at the same time, reducing\
    \ spikes in memory usage during scene changes."
  raw: '#### Loading Next Paragraph, Please Stand By


    Sooner or later you’ll face noticeable loading times during scene transitions.
    As you add more content, loading times will correspondingly increase. Creating
    a new scene actually happens before the scene transition starts. If you have very
    complex code or load a lot of assets in the new scene’s `init` or `onEnter` methods,
    there will be an obvious delay before the transition begins. This is especially
    problematic if the new scene takes more than one second to load and the user initiated
    the scene change by clicking a button. The user may get the impression that the
    game has locked up or frozen. The way to alleviate this problem is to add another
    scene in between: a loading scene. You’ll find an example implementation in the
    ScenesAndLayers03 project.


    In effect, the `LoadingScene` acts as an intermediate scene. It is derived from
    the cocos2d `CCScene` class. You don’t have to create a new `LoadingScene` for
    each transition; you can use one scene for which you simply specify the target
    scene you’d like to be loaded. An `enum` works best for this; it’s defined in
    the `LoadingScene` header file shown in [Listing 5–2](#Chapter05.html#list_5_2).


    **Listing 5–2.** *LoadingScene.h*


    `typedef enum`

    `{`

    `    TargetSceneINVALID = 0,`

    `    TargetSceneFirstScene,`

    `    TargetSceneOtherScene,`

    `    TargetSceneMAX,`

    `} TargetScenes;`


    `// LoadingScene is derived directly from Scene. We don''t need a CCLayer for
    this scene.`

    `@interface LoadingScene : CCScene`

    `{`

    `    TargetScenes targetScene_;`

    `}`


    `+(id) sceneWithTargetScene:(TargetScenes)targetScene;`

    `-(id) initWithTargetScene:(TargetScenes)targetScene;`


    **TIP:** It is good practice to set the first `enum` value to be an `INVALID`
    value, unless you intend to make the first the default. Variables in Objective-C
    are initialized to 0 automatically unless you specify a different value.


    In addition, you can also add a `MAX` or `NUM` entry at the end of the `enum`
    if you intend to iterate over every `enum` value, as in:


    `for (inti = TargetSceneINVALID + 1; i<TargetScenesMAX; i++) { .. }`


    In the case of the `LoadingScene`, it’s not necessary, but I tend to add these
    entries merely out of habit, even if I don’t need them.


    This brings me to the `LoadingScene` class implementation of the ScenesAndLayers03
    project in [Listing 5–3](#Chapter05.html#list_5_3). You’ll notice that the scene
    is initialized differently and that it uses `scheduleUpdate` to delay replacing
    the `LoadingScene` with the actual target scene.


    **Listing 5–3.** *The LoadingScene Class Uses a Switch to Decide Whether to Load
    the Target Scene*


    `+(id) sceneWithTargetScene:(TargetScenes)targetScene;`

    `{`

    `    // This creates an autorelease object of the current class`

    `    return [[[self alloc] initWithTargetScene:targetScene] autorelease];`

    `}`


    `-(id) initWithTargetScene:(TargetScenes)targetScene`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        targetScene_ = targetScene;`


    `        CCLabelTTF* label = [CCLabelTTF labelWithString:@"Loading ..."`

    `                                               fontName:@"Marker Felt"`

    `                                               fontSize:64];`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`

    `        label.position = CGPointMake(size.width / 2, size.height / 2);`

    `        [self addChild:label];`


    `        // Must wait one frame before loading the target scene!`

    `        [self scheduleUpdate];`

    `    }`


    `    return self;`

    `}`


    `-(void) update:(ccTime)delta`

    `{`

    `    [self unscheduleAllSelectors];`


    `    // Decide which scene to load based on the TargetScenes enum.`

    `    switch (targetScene_)`

    `    {`

    `        case TargetSceneFirstScene:`

    `            [[CCDirector sharedDirector] replaceScene:[FirstScene scene]];`

    `            break;`

    `        case TargetSceneOtherScene:`

    `            [[CCDirector sharedDirector] replaceScene:[OtherScene scene]];`

    `            break;`


    `        default:`

    `            // Always warn if an unspecified enum value was used`

    `NSAssert2(nil, @"%@: unsupported TargetScene %i",` ![images](images/U002.jpg)

    `                NSStringFromSelector(_cmd), targetScene_);`

    `            break;`

    `    }`

    `}`


    Because the `LoadingScene` is derived from `CCScene` and requires a new parameter
    passed to it, it’s no longer sufficient to call `[CCScene node]`. The `sceneWithTargetScene`
    method first allocates `self`, calls the `initWithTargetScene` method, and returns
    the new object as autorelease. This is the same way cocos2d initializes its own
    classes, and it’s the reason you can rely on cocos2d objects being autoreleased.
    If you’re deriving your own classes, you should always add the appropriate static
    autorelease initializers, like in this case `sceneWithTargetScene`.


    The `init` method simply stores the target scene in a member variable, creates
    the “Loading…” label, and runs `scheduleUpdate`.


    **CAUTION:** Why not just call `replaceScene` right inside the `init` method?
    There are two rules about that. Rule number 1 is never call `CCDirector`’s `replaceScene`
    in a node’s `init` method. Rule number 2 is follow rule number 1\. The reason:
    it crashes. The `Director` can’t cope with replacing a scene from a node that
    is currently being initialized.


    The `update` method then uses a simple `switch` statement based on the provided
    `TargetScenesenum` to determine which scene is to be replaced. The default `switch`
    contains an `NSAssert`, which always triggers when the default case is hit. This
    is good practice because you’ll be editing and expanding this list several times,
    and if you forgot to update the `switch` statement with a new case, you’ll be
    notified of that.


    This is a very simple `LoadingScene` implementation that you can use in your own
    games. Simply extend the `enum` and `switch` statement with more target scenes,
    or use the same target scene multiple times but with different transitions. But
    as I mentioned, don’t overdo the transitions just because they’re cool-looking.


    Using the `LoadingScene` has an important effect regarding memory. Since you’re
    replacing the existing scene with the lightweight `LoadingScene` and then replacing
    the `LoadingScene` with the actual target scene, you’re giving cocos2d enough
    time to free up the previous scene’s memory. Effectively there’s no longer any
    overlap with two complex scenes in memory at the same time, reducing spikes in
    memory usage during scene changes.'
  trans: "\n# 正在加载下一场景，请稍候\n\n在场景切换过程中，你迟早会遇到明显的加载时间。随着内容不断增加，加载时间也会相应延长。新建场景实际上是在场景切换开始之前就进行的。如果在新场景的\
    \ `init` 或 `onEnter` 方法中包含了非常复杂的代码或加载了大量资源，那么在切换开始前就会出现明显的延迟。尤其是当新场景加载时间超过一秒，且用户是通过点击按钮触发场景切换时，这个问题尤为突出。用户可能会误以为游戏已卡死或冻结。缓解此问题的方法是在两者之间添加一个过渡场景：加载场景。你可以在\
    \ `ScenesAndLayers03` 项目中找到一个示例实现。\n\n实际上，`LoadingScene` 起到了中间场景的作用。它派生自 cocos2d\
    \ 的 `CCScene` 类。你不必为每个过渡都创建新的 `LoadingScene`；只需使用一个场景，并指定要加载的目标场景即可。使用 `enum`\
    \ 是最佳方式；该枚举在 `LoadingScene` 头文件中定义，如代码清单 5–2 所示。\n\n**代码清单 5–2.** *LoadingScene.h*\n\
    \n```\ntypedef enum\n{\n    TargetSceneINVALID = 0,\n    TargetSceneFirstScene,\n\
    \    TargetSceneOtherScene,\n    TargetSceneMAX,\n} TargetScenes;\n\n// LoadingScene\
    \ 直接派生自 Scene。此场景无需 CCLayer。\n@interface LoadingScene : CCScene\n{\n    TargetScenes\
    \ targetScene_;\n}\n\n+(id) sceneWithTargetScene:(TargetScenes)targetScene;\n\
    -(id) initWithTargetScene:(TargetScenes)targetScene;\n```\n\n**提示：** 建议将枚举的第一个值设为\
    \ `INVALID` 值，除非你打算将第一个值作为默认值。在 Objective-C 中，变量会被自动初始化为 0，除非你指定了其他值。\n\n此外，如果你打算遍历所有枚举值，还可以在枚举末尾添加\
    \ `MAX` 或 `NUM` 条目，如下所示：\n\n```\nfor (int i = TargetSceneINVALID + 1; i < TargetScenesMAX;\
    \ i++) { .. }\n```\n\n对于 `LoadingScene` 来说，这并非必需，但我出于习惯通常会添加这些条目，即使并不需要它们。\n\n\
    接下来，我们来看代码清单 5–3 中 `ScenesAndLayers03` 项目的 `LoadingScene` 类实现。你会注意到该场景的初始化方式有所不同，并且它使用了\
    \ `scheduleUpdate` 来延迟将 `LoadingScene` 替换为实际的目标场景。\n\n**代码清单 5–3.** *LoadingScene\
    \ 类使用 switch 语句决定是否加载目标场景*\n\n```\n+(id) sceneWithTargetScene:(TargetScenes)targetScene;\n\
    {\n    // 这会创建当前类的一个自动释放对象\n    return [[[self alloc] initWithTargetScene:targetScene]\
    \ autorelease];\n}\n\n-(id) initWithTargetScene:(TargetScenes)targetScene\n{\n\
    \    if ((self = [super init]))\n    {\n        targetScene_ = targetScene;\n\n\
    \        CCLabelTTF* label = [CCLabelTTF labelWithString:@\"正在加载...\"\n      \
    \                                         fontName:@\"Marker Felt\"\n        \
    \                                       fontSize:64];\n        CGSize size = [[CCDirector\
    \ sharedDirector] winSize];\n        label.position = CGPointMake(size.width /\
    \ 2, size.height / 2);\n        [self addChild:label];\n\n        // 必须等待一帧后再加载目标场景！\n\
    \        [self scheduleUpdate];\n    }\n\n    return self;\n}\n\n-(void) update:(ccTime)delta\n\
    {\n    [self unscheduleAllSelectors];\n\n    // 根据 TargetScenes 枚举决定加载哪个场景。\n\
    \    switch (targetScene_)\n    {\n        case TargetSceneFirstScene:\n     \
    \       [[CCDirector sharedDirector] replaceScene:[FirstScene scene]];\n     \
    \       break;\n        case TargetSceneOtherScene:\n            [[CCDirector\
    \ sharedDirector] replaceScene:[OtherScene scene]];\n            break;\n\n  \
    \      default:\n            // 使用未指定的枚举值时，始终发出警告\n            NSAssert2(nil,\
    \ @\"%@: 不支持的 TargetScene %i\", \n                NSStringFromSelector(_cmd),\
    \ targetScene_);\n            break;\n    }\n}\n```\n\n由于 `LoadingScene` 派生自 `CCScene`\
    \ 并且需要传入一个新参数，因此仅仅调用 `[CCScene node]` 已经不够了。`sceneWithTargetScene` 方法先分配 `self`，调用\
    \ `initWithTargetScene` 方法，然后将新对象以自动释放的形式返回。这与 cocos2d 初始化自身类的方式相同，也是你可以依赖 cocos2d\
    \ 对象会被自动释放的原因。如果你在派生自己的类，也应该始终添加相应的静态自动释放初始化方法，就像这里的 `sceneWithTargetScene`。\n\
    \n`init` 方法仅仅是将目标场景存储在一个成员变量中，创建\"正在加载...\"标签，然后运行 `scheduleUpdate`。\n\n**注意：**\
    \ 为什么不在 `init` 方法中直接调用 `replaceScene`？关于这点有两条规则。规则 1：绝不要在节点的 `init` 方法中调用 `CCDirector`\
    \ 的 `replaceScene`。规则 2：遵循规则 1。原因是：这样会导致崩溃。`Director` 无法处理从当前正在初始化的节点中替换场景的情况。\n\
    \n`update` 方法随后使用一个基于所提供 `TargetScenes` 枚举的简单 `switch` 语句，来判断需要替换哪个场景。`switch`\
    \ 的 `default` 分支包含一个 `NSAssert`，当触发 default 情况时，该断言总会生效。这是一种良好的实践，因为你会多次编辑和扩展这个列表，如果你忘记在\
    \ `switch` 语句中更新新的分支，系统就会提醒你。\n\n这是一个非常简单的 `LoadingScene` 实现，你可以在自己的游戏中使用。只需扩展\
    \ `enum` 和 `switch` 语句来增加更多目标场景，或者多次使用同一个目标场景但搭配不同的过渡效果。但正如我提到的，不要因为过渡效果看起来很酷就过度使用它们。\n\
    \n使用 `LoadingScene` 在内存方面有一个重要效果。由于你正在用轻量级的 `LoadingScene` 替换现有场景，然后再将 `LoadingScene`\
    \ 替换为实际的目标场景，这给了 cocos2d 足够的时间来释放上一个场景的内存。实际上，两个复杂场景同时存在于内存中的重叠情况就不再发生了，从而减少了场景切换期间内存使用的峰值。\n"
- fmt: "### Working with Multiple Layers\n\nThe project `ScenesAndLayers04` illustrates\
    \ how multiple layers can be used to scroll the contents of a game’s objects layer\
    \ while the content of the user interface layer, where it says “Here be your Game\
    \ Scores” (see [Figure 5–1](#Chapter05.html#fig_5_1)), remains static. You’ll\
    \ learn how multiple layers can cooperate and react only to their own touch input,\
    \ as well as how to access the various layers from any node.\n\n![images](images/0501.jpg)\n\
    \n**Figure 5–1.** *The `ScenesAndLayers04` project. So far, so normal.*\n\nI’ll\
    \ start by putting the `MultiLayerScene` together in the `init` method. If you\
    \ skim over the code in [Listing 5–4](#Chapter05.html#list_5_4), you’ll barely\
    \ notice anything different from what we’ve done so far.\n\n**Listing 5–4.** *Initializing\
    \ the `MultiLayerScene`*\n\n```\n-(id) init\n{\n    if ((self = [super init]))\n\
    \    {\n        multiLayerSceneInstance = self;\n\n        // The GameLayer will\
    \ be moved, rotated and scaled independently\n        GameLayer* gameLayer = [GameLayer\
    \ node];\n        [self addChild:gameLayer z:1 tag:LayerTagGameLayer];\n     \
    \   gameLayerPosition = gameLayer.position;\n\n        // The UserInterfaceLayer\
    \ remains static and relative to the screenarea.\n        UserInterfaceLayer*\
    \ uiLayer = [UserInterfaceLayer node];\n        [self addChild:uiLayer z:2 tag:LayerTagUserInterfaceLayer];\n\
    \    }\n\n    return self;\n}\n```\n\n**TIP:** It’s worth mentioning that I’ve\
    \ started using `enum` values for tags, like `LayerTagGameLayer`. This has the\
    \ advantage over using numbers in that you can actually read whose tag it is,\
    \ instead of having to remember which layer had tag 7 assigned to it. It also\
    \ shows that the actual tag values are not important; what’s important is that\
    \ you use the same value consistently for the same node. Using a human-readable\
    \ tag makes that task easier and less error prone. The same goes for action tags,\
    \ of course.\n\nYou may have noticed the variable `multiLayerSceneInstance` and\
    \ that it gets `self` assigned. A bit strange, isn’t it? What would that be good\
    \ for? If you recall from [Chapter 3](#Chapter03.html#ch3), I explained how to\
    \ create a singleton class. In this case, I’ll turn the `MultiLayerScene` class\
    \ into a singleton. See [Listing 5–5](#Chapter05.html#list_5_5), and if you want,\
    \ compare it with [Listing 3-1](#Chapter03.html#list_3_1) to spot the differences.\n\
    \n**Listing 5–5.** *Turning the `MultiLayerScene` into a Semi-Singleton Object*\n\
    \n```\nstatic MultiLayerScene* multiLayerSceneInstance;\n\n+(MultiLayerScene*)\
    \ sharedLayer\n{\n    NSAssert(multiLayerSceneInstance != nil, @\"MultiLayerScene\
    \ not available!\");\n    return multiLayerSceneInstance;\n}\n\n-(void) dealloc\n\
    {\n    // MultiLayerScene will be deallocated now, you must set it to nil\n  \
    \  multiLayerSceneInstance = nil;\n\n    // don't forget to call \"super dealloc\"\
    \n    [super dealloc];\n}\n```\n\nSimply put, the `multiLayerSceneInstance` is\
    \ a `static` global variable that will hold the current `MultiLayerScene` object\
    \ during its lifetime. The `static` keyword denotes that the `multiLayerSceneInstance`\
    \ variable is accessible only within the implementation file it is defined in.\
    \ At the same time, it is not an instance variable; it lives outside the scope\
    \ of any class. That’s why it is defined outside any method, and it can be accessed\
    \ in class methods like `sharedLayer`.\n\nWhen the layer is deallocated, the `multiLayerSceneInstance`\
    \ variable is set back to `nil` to avoid crashes, because the `multiLayerSceneInstance`\
    \ variable would be pointing to an already released object after the `dealloc`\
    \ method. Remember, variables declared `static` live on past the deallocation\
    \ of a class. Using `static` variables to store pointers to dynamically allocated\
    \ classes requires great care to ensure that the `static` variable either points\
    \ to a valid object or is `nil`.\n\nThe reason for this semi-singleton is that\
    \ you’ll be using several layers, each with its own child nodes, but you still\
    \ need to somehow access the main layer. It’s a very comfortable way to give access\
    \ to the main layer to other layers and nodes of the current scene.\n\n**CAUTION:**\
    \ This semi-singleton works only if there is only ever one instance of `MultiLayerScene`\
    \ allocated at any one time. It also can’t be used to initialize `MultiLayerScene`,\
    \ unlike a regular singleton class.\n\nAccess to the `GameLayer` and `UserInterfaceLayer`\
    \ is granted through property getter methods, for ease of use. The properties\
    \ are defined in [Listing 5–6](#Chapter05.html#list_5_6), which shows the relevant\
    \ part from `MultiLayerScene.h`.\n\n**Listing 5–6.** *Property Definitions for\
    \ Accessing the `GameLayer` and `UserInterfaceLayer`*\n\n```\n@property (readonly)\
    \ GameLayer* gameLayer;\n@property (readonly) UserInterfaceLayer* uiLayer;\n```\n\
    \nThe properties are defined as `readonly`, since we only ever want to retrieve\
    \ the layers, never set them through the property. Their implementation in [Listing\
    \ 5–7](#Chapter05.html#list_5_7) is a straightforward wrapper to the `getChildByTag`\
    \ method, but they also perform a safety check just in case, verifying that the\
    \ retrieved object is of the correct class.\n\n**Listing 5–7.** *Implementation\
    \ of the Property Getters*\n\n```\n-(GameLayer*) gameLayer\n{\n    CCNode* layer\
    \ = [self getChildByTag:LayerTagGameLayer];\nNSAssert([layer isKindOfClass:[GameLayer\
    \ class]], @\"%@: not a GameLayer!\", ![images](images/U002.jpg)\n        NSStringFromSelector(_cmd));\n\
    \    return (GameLayer*)layer;\n}\n\n-(UserInterfaceLayer*) uiLayer\n{\n    CCNode*\
    \ layer = [[MultiLayerScene sharedLayer] getChildByTag:LayerTagUILayer];\n   \
    \ NSAssert([layer isKindOfClass:[UserInterfaceLayer class]],@\"%@: not a UILayer!\"\
    ,![images](images/U002.jpg)\n        NSStringFromSelector(_cmd));\n    return\
    \ (UserInterfaceLayer*)layer;\n}\n```\n\nThis makes it easy to access the various\
    \ layers from any node of the `MultiLayerScene`.\n\n- You can access the “scene”\
    \ layer of `MultiLayerScene`:\n  `MultiLayerScene* sceneLayer = [MultiLayerScene\
    \ sharedLayer];`\n- You can access the other layers through the scene layer:\n\
    \  `GameLayer* gameLayer = [sceneLayer gameLayer];`\n  `UserInterfaceLayer* uiLayer\
    \ = [sceneLayer uiLayer];`\n- As an alternative, because of the `@property` definition,\
    \ you can also use the dot accessor:\n  `GameLayer* gameLayer = sceneLayer.gameLayer;`\n\
    \  `UserInterfaceLayer* uiLayer = sceneLayer.uiLayer;`\n\nThe `UserInterfaceLayer`\
    \ and `GameLayer` classes both handle touch input, but independently. To achieve\
    \ the correct results, we need to use `TargetedTouchHandlers`, and by using the\
    \ `priority` parameter, we can make sure that the `UserInterfaceLayer` gets to\
    \ look at a touch event before the `GameLayer`. The `UserInterfaceLayer` uses\
    \ the `isTouchForMe` method to determine whether it should handle the touch, and\
    \ it will return `YES` from the `ccTouchBegan` method if it did handle the touch.\
    \ This will keep other targeted touch handlers from receiving this touch. [Listing\
    \ 5–8](#Chapter05.html#list_5_8) illustrates the important bits of the touch event\
    \ code for the `UserInterfaceLayer`.\n\n**Listing 5–8.** *Touch Input Processing\
    \ Using `TargetedTouchDelegate`*\n\n```\n// Register TargetedTouch handler with\
    \ higher priority than GameLayer\n-(void) registerWithTouchDispatcher\n{\n   \
    \ [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self\n           \
    \                                           priority:-1\n                    \
    \                          swallowsTouches:YES];\n}\n\n// Checks if the touch\
    \ location was in an area that this layer wants to handle as input.\n-(bool) isTouchForMe:(CGPoint)touchLocation\n\
    {\n    CCNode* node = [self getChildByTag:UILayerTagFrameSprite];\n    return\
    \ CGRectContainsPoint([node boundingBox], touchLocation);\n}\n```"
