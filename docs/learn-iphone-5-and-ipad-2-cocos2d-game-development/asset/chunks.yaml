  trans: '

    ### cocos2d 场景图


    有时也被称为*场景层次结构*，场景图是当前所有活跃 cocos2d 节点的层级结构。


    cocos2d 节点是任何派生自 `CCNode` 类的对象。大多数节点如 `CCSprite` 和 `CCLabelTTF` 会显示在屏幕上，但也有一些没有视觉表现，包括
    `CCNode`、`CCScene` 和 `CCLayer`。它们同样重要；恰恰相反，它们经常让 cocos2d 新手感到困惑。


    我将在后续章节中更详细地介绍这些类，并解释它们的用途。现在，我先专注于高级概念，你只需知道 `CCSprite` 在屏幕上显示纹理，`CCLabelTTF`
    打印任意文本，而 `CCNode`、`CCScene` 和 `CCLayer` 主要用于将节点组合在一起。


    图 3–1 描绘了你将从第 6 章开始创建的射击游戏，并展示了玩家不易察觉但对游戏开发者至关重要的理解要点。


    ![images](img/0301.jpg)


    **图 3–1.** *一款射击游戏*


    图 3–1 中的场景完全由 `CCSprite` 对象构成。至少这是你所能看到的。你看不到的是 `CCScene` 和 `CCLayer` 类如何用于分组和排列各种精灵：多个背景层、玩家飞船、敌人、子弹以及虚拟摇杆和按钮。为了说明该场景元素的层叠关系，我在图
    3–2 中绘制了该场景的分解视图。


    ![images](img/0302.jpg)


    **图 3–2.** *说明典型 cocos2d 游戏场景布局的分解视图*


    在这个具体示例中，三个层有助于维护精灵之间正确的绘制顺序：背景层、游戏对象层和虚拟摇杆层。如果你想要隐藏整个层的节点、移动该层及其包含的所有节点，或者重新排序层使其节点绘制在另一层节点的上方或后方，使用场景中的多个层也会很有帮助。你甚至可以旋转和缩放一个层，这将旋转和缩放该层中包含的所有节点。这使得使用层成为一个强大的概念。


    在这方面，游戏场景是使用层来建模的，就像你在 Photoshop、Seashore 或 Gimp 等图像编辑程序中编辑图像一样。不过，每一层中的节点（笔触）不是静态的，而是保持为独立的元素。


    实际的 `Scene` 对象只是所有层的容器（可以说是实际的图像），就像层是其他节点的容器一样。这些节点中的每一个都可以运行逻辑——场景、层、各个节点、精灵、标签等，具体取决于你如何组织代码。


    任何节点都可以将其他任何节点作为子节点，并且层级结构中的每个节点（场景本身除外）都有一个父对象，即该节点作为子节点所从属的对象。如果你从场景图中移除该节点，或者尚未添加它，则它不会有父对象。请注意，节点的这种父子关系不要与面向对象编程中的继承混淆。换句话说，父节点不是该节点的
    `super` 类！


    你可以创建的这种树状节点层级结构被称为*场景图*，在本书中我有时会将其称为*节点层级结构*。对于熟悉编程设计模式的人来说，你会认识到这种层级结构就是复合设计模式。图
    3–3 向你展示了该场景的简化节点层级结构，以树状结构呈现。


    ![images](img/0303.jpg)


    **图 3–3.** *图 3–2 中所示场景的节点层级结构*


    请注意，这种场景/层/节点结构并非由 cocos2d 强制规定，只是场景图始终有一个 `CCScene` 类对象作为其根节点。但除此之外，你可以使用任何 `CCNode`
    类代替 `CCLayer` 来创建你的“层”。


    事实上，我通常更倾向于使用普通的 `CCNode` 类而不是 `CCLayer` 来进行分层和分组对象；在大多数情况下，`CCLayer` 类会增加不必要的开销，因为它能够接收触摸和加速度计输入（在
    Mac OS X 上还有键盘和鼠标输入）。剥离对输入处理的支持后，`CCLayer` 类实际上就只是一个 `CCNode` 类。`CCScene` 也是如此，它本质上只是一个抽象概念，用于强制规定一个共同的根节点类。否则，`CCScene`
    类实际上与 `CCNode` 相同。


    **注意：** cocos2d 节点层级结构中的节点是相对于其父节点定位的。子节点会继承父节点的某些属性，例如 `scale` 和 `rotation`，但不会继承
    `color` 和 `opacity`。这在初次接触时可能会令人困惑。


    例如，如果一个 `CCLabelTTF` 节点的父节点是像 `CCNode`、`CCScene` 或 `CCLayer` 这样的非绘制节点，并且它们本身是其他非绘制节点的唯一子节点，那么该标签的位置将是相对于视图左下角的。所以，一切正常且符合预期。但是，如果你将另一个
    `CCLabelTTF` 作为子节点添加到该标签，那么子标签的位置将是相对于父标签的。


    你有理由期望子标签以父标签的位置为中心。可惜，情况并非如此，如图 3–4 所示。你会发现子标签反而以父标签纹理的左下角为中心，这是 cocos2d 设计中一个令人遗憾的异常之处。要正确定位这样一个节点并使其以父节点为中心，你必须使用父节点的
    `contentSize.width / 2` 和 `contentSize.height / 2` 作为子节点的 `position.x` 和 `position.y`。


    我创建了 NodeHierarchy 项目，为你提供父子关系节点中相对定位和旋转的示例，并让你熟悉 cocos2d 节点层级结构。可以将其视为你自己实验的测试平台。


    ![images](img/0304.jpg)


    **图 3–4.** *注意：子节点的默认位置会意外地偏离其父节点的位置。*


    ### CCNode 类层次结构


    此时，你可能想知道哪些类派生自 `CCNode`。图 3–5 展示了 `CCNode` 类层次结构。你最常使用的节点类已被突出显示，仅使用这些类就能制作出相当令人印象深刻的游戏。我将稍后解释最重要的类，随着本书的深入，你甚至将深入了解那些更不为人知的类。


    ![images](img/0305.jpg)


    **图 3–5.** *CCNode 类层次结构*


    ### CCNode


    `CCNode` 是所有节点的基类。它是一个没有视觉表现的抽象类，定义了所有节点共有的属性和方法。

