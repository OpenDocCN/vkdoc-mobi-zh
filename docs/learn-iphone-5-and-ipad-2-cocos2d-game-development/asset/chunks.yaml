    **图 4-7.** *`Glyph Designer` 允许你从任何 TrueType 字体创建位图字体。它可以导出与 cocos2d 的 `CCLabelBMFont`
    类兼容的 FNT 和 PNG 文件。*


    在左侧，你有一个 TrueType 字体列表，如果这些还不够，你可以使用 `Load Font` 图标加载任何 TTF 文件。在列表下方，你可以通过滑块更改字体大小，并切换到粗体、斜体和其他字体样式。


    **提示：** 创建支持 Retina 的位图字体很容易。按常规创建字体并导出。这将是你的非 Retina 或 SD 字体。然后只需在 `Glyph Designer`
    中将字体大小改为正常大小的两倍；例如，将滑块从字体大小 30 移动到字体大小 60。然后使用相同的名称重新导出字体，但添加 `-hd` 后缀。这样你就拥有了相同字体的普通/SD
    和 Retina/HD 尺寸。


    如果启用了 Retina 支持且游戏运行在 Retina 设备上，cocos2d 会自动识别并使用带有 `-hd` 后缀的字体。


    在屏幕中央，你会看到用于当前字体设置的最终纹理图集。你会注意到，当你修改字体设置时，纹理图集的大小和字形的顺序会频繁变化。你也可以选择一个字形，并在右侧窗格的
    `Glyph Info` 下查看其信息。


    在右侧窗格的下方，你可以更改纹理图集设置，不过在大多数情况下你不需要这样做。`Glyph Designer` 确保纹理图集的大小始终足以在单个纹理中包含所有字形。


    通过 `Glyph Fill` 设置，你可以更改颜色以及填充字形的方式，包括渐变设置。除此之外，你还可以选择更改 `Glyph Outline`，即每个字形周围的黑色细线，以及
    `Glyph Shadow`，它可以为字体营造 3D 外观效果。


    在右侧窗格的最底部，你会找到 `Included Glyphs` 部分。通过它，你可以从预定义的字符集中选择要包含在图集中的字形。如果你十分确定不需要某些字符，你也可以输入自己的字符列表以减小纹理的大小。这对于只需要数字和极少数额外字符的分数字符串尤其有用。


    一旦你对位图字体感到满意，你可以保存整个项目，以便恢复先前的设置。要以 cocos2d 可用的格式保存字体，你需要通过 **文件 ![images](images/U001.jpg)
    导出** 以 `.fnt`（Cocos2d 文本）格式保存。然后你可以将 `Glyph Designer` 创建的 FNT 和 PNG 文件添加到你的 Xcode
    项目中，并将 FNT 文件与 `CCLabelBMFont` 类一起使用。


    **注意：** 如果你尝试使用 `CCLabelBMFont` 显示 `.fnt` 文件中不存在的字符，这些字符将被跳过且不显示。例如，如果你执行 `[label
    setString:@"Hello, World!"]` 但位图字体只包含小写字母且没有标点符号，你将看到字符串 "ello orld" 被显示。'
  raw: '#### Introducing CCLabelBMFont


    Labels that update fast at the expense of more memory usage, like any other `CCSprite`,
    are the specialty of the `CCLabelBMFont` class. I’ve replaced the `CCLabelTTF`
    with a `CCLabelBMFont` in DoodleDrop07\. It’s relatively straightforward; besides
    changing the declaration of the `scoreLabel` variable from `CCLabelTTF` to `CCLabelBMFont`
    in the header file, you only have to change the line in the `init` method, as
    shown here:


    `scoreLabel = [CCLabelBMFont labelWithString:@"0" fntFile:@"bitmapfont.fnt"];`


    **NOTE:** Bitmap fonts are a great choice for games because they are fast, but
    they do have one disadvantage. The size of any bitmap font is fixed. If you need
    the same font but larger or smaller in size, you can scale the `CCLabelBMFont`—but
    you lose image quality scaling up, and you’re potentially wasting memory scaling
    down. The other option is to create a separate font file with the new size, but
    this uses up more memory since each bitmap font comes with its own texture, even
    if only the font size changed.


    But there’s a catch, obviously. You need to add the bitmapfont.fnt file as well
    as the accompanying bitmapfont.png, which are both in the project’s Resources
    folder. More importantly, you do want to create your own bitmap fonts sooner or
    later. The tool to use for that used to be Hiero; that was before Glyph Designer
    came along. Now Hiero is only the tool of choice if you really don’t want to spend
    any money. Hiero was written by Kevin James Glass. It’s a free Java Web application
    and is available from [`http://slick.cokeandcode.com/demos/hiero.jnlp`](http://slick.cokeandcode.com/demos/hiero.jnlp).


    The downside is, it’s a free Java web application. It will ask you to trust the
    application because of a missing security certificate. On the other hand, many
    developers use the tool, and so far there has been no evidence that the application
    is untrustworthy. Hiero also “features” several odd and downright annoying bugs,
    including an obnoxious one that has the resulting image file flipped upside down.
    If you see only garbage instead of a bitmap font text in your app, you may have
    to flip the bitmap font PNG image upside down with an image-editing program. I
    have documented these issues and how to fix them in my Hiero tutorial: [`www.learn-cocos2d.com/knowledge-base/tutorial-bitmap-fonts-hiero/`](http://www.learn-cocos2d.com/knowledge-base/tutorial-bitmap-fonts-hiero/).


    Some developers also swear by BMFont. But as a Windows program, it requires a
    Windows computer or Windows installed in a virtual machine on your Mac. That’s
    why it’s not more widely used in the Mac developer community. You can download
    BMFont from [`www.angelcode.com/products/bmfont/`](http://www.angelcode.com/products/bmfont/).


    Finally, along came a tool that satisfied everyone who wouldn’t hesitate to trade
    a few dollars for convenience and reliability: Glyph Designer.


    #### Creating Bitmap Fonts with Glyph Designer


    After the first edition of this book was printed, the guys at [`www.71squared.com`](http://www.71squared.com)
    released their Hiero replacement tool called Glyph Designer. Although it’s not
    free, it’s definitely worth every cent.


    You can download a trial version of Glyph Designer on [`http://glyphdesigner.71squared.com`](http://glyphdesigner.71squared.com),
    and if you’re already familiar with Hiero, you’ll notice a striking similarity
    in features, although the user interface is a lot easier to use and encourages
    experimentation. Mike Daley also mentioned in an episode of the Cocos2D Podcast
    available at [`http://cocos2dpodcast.wordpress.com`](http://cocos2dpodcast.wordpress.com)
    that Glyph Designer will get a new feature that allows you to share font designs
    with other users of the tool.


    [Figure 4–7](#Chapter04.html#fig_4_7) shows Glypgh Designer in action. The process
    of creating a bitmap font is relatively playful, and it doesn’t hurt to change
    the various knobs, buttons, and colors as you please. I’ll outline just the basic
    editing areas for you.


    ![images](images/0407.jpg)


    **Figure 4–7.** *Glyph Designer allows you to create bitmap fonts from any TrueType
    font. It can export FNT and PNG files compatible with the CCLabelBMFont class
    of cocos2d.*


    On the left side you have the list of TrueType fonts, and if those aren’t enough,
    you can use the `Load Font` icon to load any TTF file. Below the list you can
    change the size of the font with the slider and also switch to bold, italic, and
    other font styles.


    **TIP:** Creating Retina-enabled bitmap fonts is easy. Create your font as usual
    and export it. This will be your non-Retina or SD font. Then simply change the
    size of the font in Glyph Designer to twice its normal size; for example, move
    the slider from a font size of 30 to a font size of 60\. Then reexport the font
    using the same name but adding the -hd suffix. Now you have the same font in regular/SD
    and Retina/HD sizes.


    Cocos2d will automatically recognize and use the font with the -hd suffix if Retina
    support is enabled and the game is running on a Retina device.


    In the center of the screen, you see the resulting texture atlas used for your
    current font settings. You’ll notice that the texture atlas size and the order
    of the glyphs frequently change as you modify the font settings. You can also
    select a glyph and see its info on the right pane under Glyph Info.


    Further down on the right pane you can change the texture atlas settings, although
    in most cases you don’t have to. Glyph Designer makes sure that the texture atlas
    size is always large enough to contain all the glyphs in a single texture.


    With the Glyph Fill settings, you can change the color and the way glyphs are
    being filled, including a gradient setting. Alongside that, you have the option
    to change the Glyph Outline, which is a black thin line around each glyph, and
    the Glyph Shadow, which allows you to create a 3D-ish look of the font.


    At the very bottom on the right pane you find the Included Glyphs section. With
    that you can choose from a predefined selection of glyphs to include in the atlas.
    If you absolutely know for sure that you won’t be needing certain characters,
    you can also enter your own list of characters to reduce the size of the texture.
    This is especially helpful for score strings where you may only need digits plus
    very few extra characters.


    Once you are satisfied with your bitmap font, you can save the entire project
    so that you can restore previous settings. To save the font in a format usable
    by cocos2d, you have to save it via **File ![images](images/U001.jpg) Export**
    in the .fnt (Cocos2d Text) format. You can then add the FNT and PNG files created
    by Glyph Designer to your Xcode project and use the FNT file with the `CCLabelBMFont`
    class.


    **CAUTION:** If you try to display characters using a `CCLabelBMFont`, which are
    not available in the .fntfile, they will simply be skipped and not displayed.
    For example, if you do `[label setString:@“Hello, World!”]` but your bitmap font
    contains only lowercase letters and no punctuation characters, you’ll see the
    string “ello orld” displayed instead.'
