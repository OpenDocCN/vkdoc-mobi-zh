    ### Summary


    In this chapter, you learned more about scenes and layers—how and when to use
    them and for what. I explained why it’s usually not a good idea to subclass game
    objects directly from `CCSprite`, and I showed you how to create a fully self-contained
    game object class that derives from `CCNode` instead.


    Finally, you learned how to use specialized `CCNode` classes like `CCProgressTimer`,
    `CCParallaxNode`, `CCRibbon`, and `CCMotionStreak`.


    You now have enough knowledge about cocos2d to start creating more complex games,
    like the side-scrolling shooter I’m preparing you for. And with complex games
    come complex graphics, including animations. How to handle all of these sprites
    efficiently both in terms of memory and performance is the topic of the next chapter.


    ## Chapter 6


    ## **Sprites In-Depth**


    In this chapter, I’ll focus on working with sprites. There are numerous ways to
    create sprites from individual image files and texture atlases. I will also explain
    how to create and play sprite animations.


    A *texture atlas* is a regular texture that contains more than one image. Often
    it is used to store all animation frames of a single character in one texture,
    but it is not limited to that. In fact, you can place any image into a texture
    atlas. The goal is to get as many images as possible into each texture atlas.
    To help create a texture atlas, a great tool to rely on is TexturePacker, which
    I’ll also introduce in this chapter.


    *Sprite batching* is a technique for speeding up the drawing of sprites. As the
    name implies, batching sprites allows the GPU to render all the sprites in one
    go, or in technical terms, in one draw call. It speeds up drawing identical sprites
    but is most effective when using a texture atlas. If you use a texture atlas along
    with sprite batching, you can draw all of the images in that texture atlas in
    one draw call.


    A *draw call* is the process of transmitting the necessary information to the
    graphics hardware in order to render a texture or parts of it. When you are using
    `CCSprite`s, each `CCSprite` will cause one draw call. The CPU overhead for issuing
    each draw call can add up so much that it can decrease the framerate, particularly
    with the more sprites you want to display.


    `CCSpriteBatchNode` functions like an extra layer to which you can add sprite
    nodes, as long as they all use the same texture. From then on, all the children
    of the `CCSpriteBatchNode` will be drawn with a single draw call. Effectively,
    the CPU tells the GPU what texture it should draw from but also passes a long
    list of frames and positions to the GPU so that it can render a large number of
    sprites from that texture all by itself.


    To summarize, sprite batching speeds up drawing identical sprites using the same
    texture and is most effective when using a texture atlas.


    The lessons you’ll learn in this chapter will become the foundation for the parallax-scrolling
    shoot-’em-up game that I’ll be discussing in [Chapters 7](#Chapter07.html#ch7)
    and [8](#Chapter08.html#ch8).'
  trans: "\n#### `CCMotionStreak`\n\n`CCMotionStreak`本质上是`CCRibbon`的一个封装器。它会使`CCRibbon`元素在绘制后或多或少地缓慢淡出并消失。你可以在`ScenesAndLayers10`项目中试用它，并查看图\
    \ 5-6 来了解淡出效果的大致样貌。\n\n![images](img/0506.jpg)\n\n**图 5-6.** *`CCMotionStreak`类允许你让`CCRibbon`元素缓慢淡出。*\n\
    \n如代码清单 5-19 所示，其用法与`CCRibbon`几乎相同，区别仅在于`CCRibbon`现在成了`CCMotionStreak`的一个属性。`fade`参数决定了条带元素淡出的速度；数值越小，消失越快。`minSeg`参数似乎没有明显效果，不过如果将其设为负值，会出现一个有趣的图形显示异常。\n\
    \n**代码清单 5-19.** *`CCMotionStreak` 使条带的元素淡出，从而产生拖尾效果*\n\n```\n-(void) resetMotionStreak\n\
    {\n    // 移除当前的 CCMotionStreak 并创建一个新的。\n    [self removeChildByTag:ParallaxSceneTagRibbon\
    \ cleanup:YES];\n    CCMotionStreak* streak = [CCMotionStreak streakWithFade:0.7f\n\
    \                                                    minSeg:10\n             \
    \                                        image:@\"spider.png\"\n             \
    \                                        width:32\n                          \
    \                          length:32\n                                       \
    \              color:ccc4(255, 0, 255, 255)];\n    [self addChild:streak z:5 tag:ParallaxSceneTagRibbon];\n\
    }\n\n-(void) addMotionStreakPoint:(CGPoint)point\n{\n    CCMotionStreak* streak\
    \ = [self getMotionStreak];\n    [streak.ribbon addPointAt:point width:32];\n\
    }\n```\n\n### 本章小结\n\n在本章中，你学习了更多关于场景和层的内容——如何使用它们、何时使用以及用于何种目的。我解释了为什么通常不建议直接从`CCSprite`继承子类化游戏对象，并展示了如何创建一个完全自包含的、继承自`CCNode`的游戏对象类。\n\
    \n最后，你学习了如何使用诸如`CCProgressTimer`、`CCParallaxNode`、`CCRibbon`和`CCMotionStreak`等专门的`CCNode`类。\n\
    \n现在，你已经掌握了足够的 cocos2d 知识，可以开始创建更复杂的游戏了，比如我为你准备的横向卷轴射击游戏。而复杂的游戏必然伴随着复杂的图形，包括动画。如何高效地（无论是在内存还是性能方面）处理所有这些精灵，将是下一章的主题。\n\
    \n## 第 6 章\n\n## 深入理解精灵\n\n在本章中，我将重点讲解精灵的使用。有多种方法可以从单个图像文件和纹理图集中创建精灵。我还会解释如何创建和播放精灵动画。\n\
    \n*纹理图集*是一种包含多个图像的常规纹理。它通常被用来将单个角色的所有动画帧存储在一个纹理中，但其用途不仅限于此。事实上，你可以将任何图像放入纹理图集。目标是让每个纹理图集包含尽可能多的图像。`TexturePacker`是一个可以帮助创建纹理图集的出色工具，我也会在本章中介绍它。\n\
    \n*精灵批处理*是一种加速精灵绘制的技术。顾名思义，批处理精灵允许 GPU 一次性渲染所有精灵，用技术术语来说，就是一次绘制调用。它能够加速相同精灵的绘制，但在使用纹理图集时效果最为显著。如果你将纹理图集与精灵批处理结合使用，就可以在一次绘制调用中绘制该纹理图集中的所有图像。\n\
    \n*绘制调用*是将必要信息传输到图形硬件以渲染纹理或其部分的过程。当你使用`CCSprite`时，每个`CCSprite`都会导致一次绘制调用。每次绘制调用带来的\
    \ CPU 开销会累积起来，从而降低帧率，尤其是在需要显示更多精灵时。\n\n`CCSpriteBatchNode`的作用就像一个额外的层，只要所有精灵节点都使用相同的纹理，你就可以将它们添加到这个层上。此后，`CCSpriteBatchNode`的所有子节点都将通过一次绘制调用来完成绘制。实际上，CPU\
    \ 会告诉 GPU 应该从哪个纹理进行绘制，同时还会向 GPU 传递一长串帧和位置信息，以便 GPU 能自行从该纹理渲染大量精灵。\n\n总而言之，精灵批处理通过使用相同纹理来加速相同精灵的绘制，并在使用纹理图集时效果最佳。\n\
    \n你在本章学到的知识，将成为我将在第 7 章和第 8 章中讨论的视差滚动射击游戏的基础。\n"
- fmt: "### `Retina Display`\n\n从`iPhone 4`开始，新款`iPhone`机型采用了名为`Retina`显示屏的新型高分辨率屏幕。其分辨率为`960×640`像素，在水平和垂直方向上的像素数均为上一代设备（`480×320`像素）的两倍。为区分两者，`Retina`显示屏图形被称为高清（`HD`）图形，而非`Retina`设备则被称为标准清晰度（`SD`）图形。\n\
    \n在[表6–1](#Chapter06.html#tab_6_1)中，您将简要了解包括第四代在内的`iOS`设备的技术规格。\n\n![images](images/t0601.jpg)\n\
    \n对于使用`PowerVR MBX Lite`的`GPU`的设备，还存在一个重要的限制：它们只能使用`24MB`的显存。这个限制在新款设备上不存在。这一限制对图形密集型应用尤为重要，因为您需要在纹理内存的使用与应用所需的常规内存之间取得平衡。\n\
    \n尽管第一代和第二代设备已不再生产或销售，但仍有数百万用户拥有并使用它们。是否支持这些设备由您决定。但这是一个应该在开始编写应用之前就做出的决定，因为在开发过程中甚至完成后再去优化，使其在性能较弱的硬件上良好运行，要困难得多。幸运的是，`cocos2d`能帮助您同时兼顾新旧设备的适配。\n\
    \n`Cocos2d`使用基于点（`points`）而非像素（`pixels`）的与分辨率无关的坐标系。在`SD`设备上，一个点正好是一个像素；而在`Retina`显示屏设备上，一个点则是两个像素。通过使用点来编写所有位置坐标，这些坐标在两种设备上将是相同的！\n\
    \n**提示：** 若要在`Retina`设备上将对象设置到精确的像素位置，点可以用分数表示。例如，点`100.5,99.5`会在`Retina`设备上设置到像素坐标`201,200`。然而，在非`Retina`设备上，这也会将像素位置设置为`100.5,99.5`，这被称为**亚像素渲染**。由于图像未处于精确的像素位置，可能会发生一些混合，导致对象对齐不正确或出现间隙。通常建议避免这种情况。\n\
    \n`Cocos2d`在加载图像方面非常智能。如果您的代码启用了`Retina`支持，并且应用运行在配备`Retina`显示屏的设备上，`cocos2d`会先尝试加载带有`-hd`后缀的精灵。因此，如果您在`Retina`显示屏设备上加载一个名为`ship.png`的文件，它会先尝试加载`ship-hd.png`；如果该文件不存在或设备不是`Retina`显示屏设备，则会加载`SD`分辨率图像`ship.png`。\n\
    \n当然，这只有在所有`-hd`图像的分辨率恰好是非`-hd`图像的两倍时才有效。否则，您会发现，不是正好两倍分辨率的`-hd`图像在应用中显示时会出现或多或少的偏移。通常，您应避免使用像素分辨率不能被二整除（无余数）的`-hd`图像。如果您确实要支持`Retina`显示屏，应创建所有图像的`HD`分辨率版本，然后简单地将其缩小`50%`保存为`SD`图像。将`SD`图像放大并不会带来`Retina`显示屏的画质。\n\
    \n`Cocos2d`的`HD`图像支持的好处在于，您的游戏甚至不需要知道它是否运行在`Retina`设备上。代码将是完全相同的。您唯一需要关心的是，需要准备两张图像而不是一张。\n\
    \n理论上，也可以只使用`HD`图形，然后通过精灵的`scale`属性动态缩小它们以匹配显示分辨率。但这有一个主要缺点：内存使用量会翻两番！假设使用`32`位色彩质量，[图6–1](#Chapter06.html#fig_6_1)中的`HD`图像占用`128KB`纹理内存，而`SD`版本仅占用`32KB`内存。非`Retina`设备的内存通常比`Retina`设备要小，会很快耗尽内存。此外，考虑一下，显示缩小版图像还会带来性能损失，因为每帧需要处理四倍于原图的像素来显示缩小后的版本。\n\
    \n![images](images/0601.jpg)\n\n**图6–1.** *适用于高清（`Retina`）和标清（非`Retina`）显示的两种分辨率的精灵*\n\
    \n要在`cocos2d`中启用对`Retina`显示屏分辨率的支持，您必须调用`CCDirector`的`enableRetinaDisplay`方法：\n\
    \n```\nif(![director enableRetinaDisplay:YES])\n{\n    CCLOG(@\"Retina Display\
    \ Not supported\");\n}\n```\n\n**警告：** 如果您启用了`Retina`显示屏支持，则应为所有精灵、位图字体、粒子效果等提供`HD`图像。否则，您应用在`SD`设备上看起来正常，但在`Retina`显示屏上，所有没有`HD`版本的视觉元素将会以一半大小绘制。\n\
    \n### `CCSpriteBatchNode`\n\n每次在屏幕上绘制纹理时，图形硬件都需要准备渲染、执行渲染并在渲染后进行清理。启动和结束单个纹理的渲染会带来固有的开销。通过让图形硬件知道您有一组应使用相同纹理渲染的精灵，可以缓解这一问题。在这种情况下，图形硬件将仅对一组精灵执行一次准备和清理步骤。\n\
    \n[图6–2](#Chapter06.html#fig_6_2)展示了这种批量渲染的示例。如您所见，屏幕上出现了数百个完全相同的子弹。如果逐一渲染它们，在这种情况下帧率会下降至少`15%`。使用`CCSpriteBatchNode`，可以避免这种重复性的开销。\n\
    \n![images](images/0602.jpg)\n\n**图6–2.** *将多个使用相同纹理的`CCSprite`节点添加到一个`CCSpriteBatchNode`中进行绘制会更高效*\n\
    \n作为回顾，以下是创建`CCSprite`的常规方式：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@\"\
    bullet.png\"];\n[self addChild:sprite];\n```\n\n[代码清单6–1](#Chapter06.html#list_6_1)\
    \ 将同一个`CCSprite`的创建方式改为使用`CCSpriteBatchNode`。当然，仅添加一个`CCSprite`到其中是没有任何好处的，因此我会向`CCSpriteBatchNode`中添加多个使用同一纹理的精灵。\n\
    \n**代码清单 6–1.** *创建多个`CCSprite`并将其添加至`CCSpriteBatchNode`以加速渲染*\n\n```\nCCSpriteBatchNode*\
    \ batch = [CCSpriteBatchNode batchNodeWithFile:@\"bullet.png\"];\n[self addChild:batch];\n\
    \nfor (int i = 0; i < 100; i++)\n{\n    CCSprite* bullet = [CCSprite spriteWithFile:@\"\
    bullet.png\"];\n    [batch addChild:bullet];\n}\n```\n\n您会注意到，在[代码清单6–1](#Chapter06.html#list_6_1)中，`CCSpriteBatchNode`将一个文件作为参数，尽管`CCSpriteBatchNode`本身并不显示。在这方面，它更像是一个`CCLayer`，只不过您只能向其中添加`CCSprite`节点。它接受一个图像文件作为参数的原因是，添加到`CCSpriteBatchNode`的所有`CCSprite`节点必须使用相同的纹理。如果您犯了这样的错误，会在调试器控制台窗口中看到如下错误信息：\n\
    \n```\nSpriteBatches[13879:207] *** Terminating app due to uncaught exception\n\
    'NSInternalInconsistencyException', reason: 'CCSprite is not using the same texture\
    \ id'\n```"
  raw: '### Retina Display


    The newer iPhone models starting with iPhone 4 use the new high-resolution display
    called the Retina display. It has a resolution of 960×640 pixels, which duplicates
    the number of pixels in each direction; previous-generation devices had a resolution
    of 480×320 pixels. To make this distinction, the Retina display graphics are referred
    to as high-definition (HD) graphics, whereas non-Retina devices are referred to
    as having standard-definition (SD) graphics.


    In [Table 6–1](#Chapter06.html#tab_6_1) you’ll get a brief overview over the technical
    specifications of the iOS devices up to and including the fourth generation.


    ![images](images/t0601.jpg)


    For the devices using PowerVR MBX Lite, there is another important limitation.
    They can use only 24MB of RAM for graphics. This limit does not exist on newer
    devices. This limit is specifically important to graphic-intensive applications
    where you have to balance the usage of texture memory with regular memory required
    by the app.


    Although first- and second-generation devices are no longer produced or sold,
    there are still millions of people who own and use these devices. Whether you
    want to support these devices or decide to ignore them is your decision. But it’s
    one that you should make before you start writing your app because it’s a lot
    harder to optimize a work in progress or even finished app and make it perform
    well on less capable hardware. Fortunately, cocos2d helps you accomplish the task
    of targeting newer and older devices at the same time.


    Cocos2d uses a resolution-independent coordinate system using points instead of
    pixels. One point is exactly one pixel on the SD devices, but one point is two
    pixels on Retina display devices. By writing all positions in points, the coordinates
    will be the same on both devices!


    **TIP:** To set an object to an exact pixel location on Retina devices, the points
    can be expressed in fractions. For example, the point 100.5,99.5 will set an object
    to the pixel coordinate 201,200 on a Retina device. However, this also sets the
    pixel position to 100.5,99.5 on a non-Retina device, which is referred to as *subpixel
    rendering*. Since the image is not on an exact pixel location, some blending can
    occur, which can cause objects to not align properly or to leave gaps. It is generally
    recommended to avoid this kind of situation.


    Cocos2d is smart when it comes to loading images. If your code has Retina support
    enabled and the app is running on a device that has a Retina display, cocos2d
    will try to load a sprite with the -hd suffix first. So if you load a file named
    ship.png on a Retina display device, it will first try to load ship-hd.png, and
    if that file does not exist or the device is not a Retina display device, the
    SD resolution image ship.png will be loaded.


    Of course, this makes sense only if all -hd images have exactly twice the resolution
    of the non -hd image. Otherwise, you’ll notice that -hd images that are not exactly
    twice the resolution will be more or less offset when you display them in your
    app. In general, you should avoid using -hd images whose pixel resolution is not
    divisible by two without a remainder. If you do support Retina displays, you should
    create all images in HD resolution and simply scale them down by 50 percent to
    save them as the SD images. Upscaling SD images will not give you Retina display
    quality.


    The nice thing about cocos2d’s HD image support is that your game does not even
    have to know if it is running on a Retina device. The code will be the same. The
    only thing you do need to care about is that you need two images instead of one.


    In theory, it is also possible to use only HD graphics and then scale them down
    on the fly using the `scale` property of sprites to match the display resolution.
    But this comes with a major drawback: memory usage quadruples! The HD image in
    [Figure 6–1](#Chapter06.html#fig_6_1) uses 128KB of texture memory, assuming 32-bit
    color quality. The SD version consumes only 32KB of memory. The non-Retina devices
    have generally less memory than Retina devices and would quickly run out of memory.
    Then consider that displaying a scaled-down version of an image incurs a performance
    penalty because four times more pixels need to be processed each frame to display
    a scaled-down version of the image.


    ![images](images/0601.jpg)


    **Figure 6–1.** *Sprites in two resolutions for HD (Retina) and SD (non-Retina)
    displays*


    To enable support for Retina display resolutions in cocos2d, you must call the
    `CCDirector` method `enableRetinaDisplay`:


    `if(![director enableRetinaDisplay:YES])`

    `{`

    `    CCLOG(@"Retina Display Not supported");`

    `}`


    **CAUTION:** If you enable Retina display support, you should supply HD images
    for all your sprites, bitmap fonts, particle effects, and so on. If you don’t,
    the resulting effect will be that your app looks normal on SD devices, but all
    the visuals that don’t have an HD version will be drawn in half the size on Retina
    displays.


    ### CCSpriteBatchNode


    Every time a texture is drawn on the screen, the graphics hardware has to prepare
    the rendering, render the graphics, and clean up after rendering. There is an
    inherent overhead caused by starting and ending the rendering of a single texture.
    This can be alleviated by letting the graphics hardware know that you have a group
    of sprites that should be rendered using the same texture. In that case, the graphics
    hardware will perform the preparation and cleanup steps only once for a group
    of sprites.


    [Figure 6–2](#Chapter06.html#fig_6_2) shows an example of this kind of batch rendering.
    As you can see, there are hundreds of identical bullets on the screen. If you
    rendered them each one at a time, your framerate would drop by at least 15 percent
    in this case. With a `CCSpriteBatchNode`, you can avoid the repeated effort.


    ![images](images/0602.jpg)


    **Figure 6–2.** *Drawing many CCSprite nodes using the same texture is more efficient
    when they are added to a CCSpriteBatchNode.*


    As a refresher, here’s how you’d create a `CCSprite` the normal way:


    `CCSprite* sprite = [CCSprite spriteWithFile:@"bullet.png"];`

    `[self addChild:sprite];`


    [Listing 6–1](#Chapter06.html#list_6_1) changes the creation of the same `CCSprite`
    to use a `CCSpriteBatchNode` instead. Of course, just adding one `CCSprite` to
    it won’t give you any benefit, so I’ll be adding a number of sprites using the
    same texture to the `CCSpriteBatchNode`.


    **Listing 6–1.** *Creating Multiple CCSprites and Adding Them to a CCSpriteBatchNode
    to Render Them Faster*


    `CCSpriteBatchNode* batch = [CCSpriteBatchNode batchNodeWithFile:@"bullet.png"];`

    `[self addChild:batch];`


    `for (int i = 0; i < 100; i++)`

    `{`

    `    CCSprite* bullet = [CCSprite spriteWithFile:@"bullet.png"];`

    `    [batch addChild:bullet];`

    `}`


    You will notice that in [Listing 6–1](#Chapter06.html#list_6_1) the `CCSpriteBatchNode`
    takes a file as an argument, even though the `CCSpriteBatchNode` itself isn’t
    displayed. It’s more like a `CCLayer` in that regard, except that you can addonly
    `CCSprite` nodes to it. The reason it takes an image file as an argument is that
    all `CCSprite` nodes added to the `CCSpriteBatchNode` must use the same texture.
    If you make that mistake, you’ll see the following error message in the Debugger
    Console window:


    `SpriteBatches[13879:207] *** Terminating app due to uncaught exception`

    `''NSInternalInconsistencyException'', reason: ''CCSprite is not using the same
    texture id''`'
