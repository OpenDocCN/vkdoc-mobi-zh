    \n`TableSetup`类本身由`PinballTable`类初始化，该类基于[第12章](#Chapter12.html#ch12)中`Box2D`项目的`HelloWorldScene`类。[列表13-6](#Chapter13.html#list_13_6)展示了`PinballTable`类的接口。\n\
