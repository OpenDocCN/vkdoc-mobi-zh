- fmt: '#### 使用 TexturePacker 创建纹理图集


    使用 TexturePacker 非常直观，只需几个步骤即可完成，如图 [图 6-6](#Chapter06.html#fig_6_6) 所示。在大多数情况下，使用默认设置即可满足需求。


    首先，你需要添加要纳入纹理图集的图像。之后随时可以添加更多图像或移除现有图像。点击 **添加精灵**（Add Sprites）或 **添加文件夹**（Add
    Folder）按钮，或直接将精灵或文件夹拖放到右侧窗格中。TexturePacker 能够加载大多数常见图形格式的图像。在此示例中，我们将添加所有飞船图像、动画帧以及子弹图像。你可以在
    `Sprites06` 示例的 `Assets` 文件夹中找到它们。


    直接将 `GameArt` 文件夹拖放到右侧窗格。操作完成后，精灵会立即出现在中央窗格中，这是纹理图集的实时预览。当你更改任何设置（包括图像优化和布局）时，预览会立即更新。


    ![images](images/0606.jpg)


    **图 6-6.** *使用 TexturePacker 的过程非常简单。*


    在右下角的状态栏中，你还可以看到生成的纹理大小以及它在设备上将占用的内存。在此案例中，纹理图集为 512×512 像素，将占用 1MB 内存。此信息针对高清（HD）纹理。标清（SD）纹理尺寸约为
    256×256 像素，内存消耗为四分之一，即 256KB。请注意，标清纹理图集不总是恰好为高清纹理宽度和高度的一半。这是因为某些布局特性（如边距）在创建标清纹理时不会缩放。


    **注意：** 除非你的游戏专门针对第三代及更新的设备开发，否则不应使用 2048 的宽度或高度。较旧设备仅支持最大 1024×1024 像素的纹理尺寸。你可以在左侧窗格的“几何”部分限制
    TexturePacker 生成的最大纹理尺寸。


    TexturePacker 使用多种技巧优化纹理空间，以达到最佳填充率。首先，它会裁剪每个图像的透明边框像素。Cocos2d 通过在绘制精灵时，将裁剪区域作为偏移量添加到精灵位置来补偿这一操作。这样做有两个优点：减小纹理尺寸，并加快精灵的渲染速度。


    你可能还会注意到某些图像被旋转了。TexturePacker 这样做是为了优化纹理图集空间的利用率。同样，Cocos2d 会在将图像加载到内存时恢复其原始方向来补偿。如果你添加了两个或更多完全相同的图像，TexturePacker
    只会添加一个图像，以进一步节省纹理图集空间。如果这些图像通过不同的文件名被引用，你可以在 Cocos2d 中使用任意一个源文件名加载该图像。当纹理图集中的某个图像对应多个包含相同图像的源文件时，TexturePacker
    会在中央窗格中在该图像上绘制一个小叠加层（一叠纸）。


    如果你对 `Border Padding` 和 `Shape Padding` 设置感到好奇，它们决定了所有图像之间以及图像与图集边界之间保留多少像素的空间。默认的
    2 像素可确保纹理图集中的所有图像在绘制时不会出现任何伪影。边距过小时，图像在游戏中显示时，其边缘周围可能会出现杂散像素。这些杂散像素的数量和颜色取决于纹理图集中其他图像周围的像素。这是一个技术问题，与图形硬件如何过滤纹理有关，唯一的解决方案是在纹理图集的所有图像之间留出一定量的边距。


    在保存纹理图集之前，需要对 TexturePacker 的 `Output` 设置进行调整，如图 [图 6-7](#Chapter06.html#fig_6_7)
    所示。


    ![images](images/0607.jpg)


    **图 6-7.** *TexturePacker 输出设置*


    首先，确保数据格式设置为 `cocos2d`，因为 TexturePacker 也可用于其他游戏引擎。


    对于数据文件，你应该指定一个位于项目 `Resources` 文件夹中的文件。确保文件名包含 `-hd` 后缀。在 `Sprites06` 项目中，文件名为
    `game-art-hd.plist`。TexturePacker 会将高清纹理保存到指定的文件名，但对于标清版本会省略 `-hd` 后缀，这正是 Cocos2d
    所需的数据格式。要让 TexturePacker 自动创建纹理图集的标清版本，你还需要勾选底部的 `AutoSD` 复选框。


    最后，为导出的纹理图集选择 **纹理格式**（Texture Format）和 **图像格式**（Image Format）。推荐的 **纹理格式** 设置为
    **Compressed PVR (.pvr.ccz)**，这是 iPhone 原生 PVR 格式的压缩版本。这种格式通常比 PNG 加载更快，并且如果你的图像是
    16 位色深，压缩的 PVR 格式将生成比 PNG 更小的文件。无论图像的实际颜色位深如何，PNG 文件格式始终存储 32 位颜色值。


    **注意：** 颜色深度、位深或每像素位数是存储像素颜色信息所用的位数。4 位色深允许图像中的每个像素拥有 16 种可能的颜色之一。使用 16 位色深，图像像素可以显示
    65，536 种颜色范围。而使用 24 位色深，图像可以拥有数百万种颜色——数量之多，以至于 24 位色深的图像有时被称为*真彩色*图像。为什么这种格式通常被称为
    32 位？因为大多数常见文件格式中额外的 8 位用于存储每个像素的不透明度。


    我鼓励你阅读维基百科上关于颜色深度（[`http://en.wikipedia.org/wiki/Color_depth`](http://en.wikipedia.org/wiki/Color_depth)）和
    RGB 颜色模型（[`http://en.wikipedia.org/wiki/RGB`](http://en.wikipedia.org/wiki/RGB)）的文章，以了解更多关于计算设备如何显示颜色的信息。


    使用 PVR 格式时，你还应启用 **Premultiply alpha** 复选框，以避免在某些情况下精灵周围出现黑色边框。在你的项目应用委托中，在 Cocos2d
    初始化之后、运行第一个场景之前，你应该让 Cocos2d 知道你的 PVR 图像使用了预乘 alpha：


    **`// 为 PVR 纹理启用预乘 alpha 以避免伪影`**

    **`[CCTexture2D PVRImagesHavePremultipliedAlpha:YES];`**


    ```

    // 运行主场景

    [[CCDirector sharedDirector] runWithScene: [GameScene scene]];

    ```


    对于 **图像格式**（Image Format）设置，你有多种选择。默认格式是 `RGBA8888`，它提供最佳视觉效果。它提供 24 位色深和 8 位
    alpha 通道。缺点是该格式渲染速度也最慢，尤其是在第一代和第二代设备上，建议回退到较低质量的图像格式以优先保证渲染速度。然而，提供设备特定的纹理图集变体操作起来很麻烦。你可能只想在旧设备上渲染较少的精灵，或者甚至完全放弃对这些设备的支持。


    在质量、内存使用和渲染速度之间取得最佳平衡的是 `RGBA4444` 格式。它为每种颜色使用 4 位，为 alpha 通道使用 4 位。这是精灵最常用的图像格式。


    如果透明度对你来说不重要，并且你希望获得更多颜色变化，则应使用 `RGB5551` 格式。它为每种颜色提供 5 位，仅为 alpha 通道提供 1 位。alpha
    通道的 1 位只能设置为开或关，这意味着你的图像只能有完全透明或完全不透明的像素。换句话说，`RGB5551` 精灵无法与背景像素进行混合。'
  raw: '#### Creating a Texture Atlas with TexturePacker


    Working with TexturePacker is very straightforward and involves only a few steps,
    as illustrated in [Figure 6–6](#Chapter06.html#fig_6_6). In most cases you will
    be fine using the default settings.


    First you’ll have to add the images you want to add to the texture atlas. You
    can always add more at a later time or remove existing ones. Click the **Add Sprites**
    or **Add Folder** button, or simply drag and drop sprites or folders on the right
    pane. TexturePacker can load images from the most common graphics formats. In
    this case, we will add all ship images and animation frames, as well as the bullet
    image. You can find them in the Assets folder in the Sprites06 example.


    Simply drop the GameArt folder on the right pane. After doing so, the sprites
    immediately appear in the center pane, which is the real-time preview of our texture
    atlas. It updates immediately whenever you change any setting, including image
    optimizations and image layout.


    ![images](images/0606.jpg)


    **Figure 6–6.** *The process of working with TexturePackeris straightforward.*


    In the status bar at the bottom-right corner, you also see how big the resulting
    texture will be and how much memory it will use on the device. In this case, the
    texture atlas is 512×512 pixels and will use up 1MB of memory. This information
    is for the HD texture. The SD texture will be about 256×256 pixels in size and
    consume a quarter of the memory, which is 256KB. Note that the SD texture atlas
    may not always be exactly half the width and height of the HD atlas. This is because
    some layout features such as padding do not scale when the SD texture is created.


    **CAUTION:** Unless you develop your game exclusively for third-generation and
    newer devices, you should not use a width or height of 2048\. Older devices support
    texture dimensions only up to a maximum of 1024×1024 pixels. You can limit the
    maximum texture size that TexturePacker should generate in the left pane’s Geometry
    section.


    TexturePacker uses several tricks to optimize the texture space to create an optimal
    packing rate. First it trims the transparent border pixels of each image. Cocos2d
    compensates for this by adding the trimmed area as an offset to the sprite’s position
    when drawing it. This has two advantages: it reduces the texture size, and it
    speeds up the rendering of the sprites.


    You may also notice that some images are rotated. TexurePacker does this to optimize
    how the texture atlas space is used. Again, cocos2d compensates by restoring the
    original orientation when loading the image into memory. If you add two or more
    exactly identical images, TexturePacker will add only one image to further save
    texture atlas space. If the images are referenced by different file names, then
    you can load the image in cocos2d by using any of the image’s source file names.
    Whenever an image in a texture atlas has multiple source files containing the
    same image, TexturePacker will draw a small overlay (a stack of paper) over the
    image in the center pane.


    In case you are wondering about the `Border Padding` and `Shape Padding` settings,
    they determine how many pixels of space is left between all images and the border
    of the atlas. The default of 2 pixels ensures that all the images in the texture
    atlas can be drawn without any artifacts. With less padding, images can show stray
    pixels around their borders when they are displayed in your game. The amount and
    color of these stray pixels depend on the surrounding pixels from other images
    in the texture atlas. This is a technical issue that has to do with how the graphics
    hardware filters textures, and the only solution is to leave a certain amount
    of padding between all images in a texture atlas.


    Before you can save the texture atlas, you need to make adjustments to the TexturePacker
    `Output` settings depicted in [Figure 6–7](#Chapter06.html#fig_6_7).


    ![images](images/0607.jpg)


    **Figure 6–7.** *TexturePacker Output settings*


    First make sure that the data formatis set to **cocos2d** since TexturePacker
    can be used with other game engines as well.


    For the data file, you should specify a file that is located in the project’s
    Resources folder. Make sure the file has the -hd suffix. In the Sprites06 project,
    the file is named game-art-hd.plist. TexturePacker will save the HD texture to
    the given file name but will omit the -hd suffix for the SD version, which is
    exactly how cocos2d wants the data. To have TexturePacker automatically create
    the SD version of the texture atlas, you also need to check the `AutoSD` check
    box at the bottom.


    Finally, you choose **Texture Format** and **Image Format** for the exported texture
    atlas. The recommended **Texture Format** setting is **Compressed PVR (.pvr.ccz)**,
    which is a compressed version of the iPhone’s native PVR format. This format typically
    loads faster than PNG, and if you have images with a 16–bit color depth, the compressed
    PVR format will create smaller files than PNG. The PNG file format will always
    store 32-bit color values regardless of the actual color bit depth of the image.


    **NOTE:** Color depth, bit depth, or bits per pixel is the number of bits that
    are stored to represent a pixel’s color information. A color depth of 4 bits allows
    each pixel in the image to have one of 16 possible colors. With a color depth
    of 16 bits, an image’s pixel can display a range of 65,536 colors. And with a
    24-bit color depth, an image can have millions of colors—so many in fact that
    an image with 24-bit color depth is sometimes referred to as a *true-color* image.
    Why is this format commonly referred to as 32-bit? Because the additional 8 bits
    in the most common file formats are used to store the opacity of each pixel.


    I encourage you to read the Wikipedia articles on color depth ([`http://en.wikipedia.org/wiki/Color_depth`](http://en.wikipedia.org/wiki/Color_depth))
    and the RGB color model ([`http://en.wikipedia.org/wiki/RGB`](http://en.wikipedia.org/wiki/RGB))
    to learn more about how computing devices display color.


    When using the PVR format, you should also enable the **Premultiply alpha** check
    box to avoid dark borders around sprites in some cases. In your project’s app
    delegate, after cocos2d has been initialized and shortly before running the first
    scene, you should also let cocos2d know that your PVR images uses premultiplied
    alpha:


    **`// Enable pre multiplied alpha for PVR textures to avoid artifacts`**

    **`[CCTexture2D PVRImagesHavePremultipliedAlpha:YES];`**


    `// run the main scene`

    `[[CCDirector sharedDirector] runWithScene: [GameScene scene]];`


    For the **Image Format** setting, you have a variety of options. The default format
    is **RGBA8888**, which gives the best-looking results. It provides 24-bit color
    depth and an 8-bit alpha channel. The downside is that this format is also the
    slowest to render, and particularly on first- and second-generation devices, it
    is recommended to fall back to a lower-quality image format and favor rendering
    speed. However, providing device-specific variants of texture atlases is cumbersome
    to work with. You may want to simply render fewer sprites on older devices or
    possibly even drop support for those devices altogether.


    The best compromise between quality, memory usage, and rendering speed is provided
    by the **RGBA4444** format. It uses 4 bits per color and 4 bits for the alpha
    channel. This is the most commonly used image format for sprites.


    If transparency is not important to you and you’d like to have more color variations,
    you should use the **RGB5551** format. It provides 5 bits per color and only 1
    bit for the alpha channel. The 1 bit for the alpha channel can be either set or
    not, which means your image can have only fully transparent or fully opaque pixels.
    In other words, RGB5551 sprites won’t be able to blend with pixels in the background.'
  trans: '

    #### 使用 TexturePacker 创建纹理图集


    使用 TexturePacker 非常直观，只需几个步骤即可完成，如图 图 6-6 所示。在大多数情况下，使用默认设置即可满足需求。


    首先，你需要添加要纳入纹理图集的图像。之后随时可以添加更多图像或移除现有图像。点击 **添加精灵**（Add Sprites）或 **添加文件夹**（Add
    Folder）按钮，或直接将精灵或文件夹拖放到右侧窗格中。TexturePacker 能够加载大多数常见图形格式的图像。在此示例中，我们将添加所有飞船图像、动画帧以及子弹图像。你可以在
    `Sprites06` 示例的 `Assets` 文件夹中找到它们。


    直接将 `GameArt` 文件夹拖放到右侧窗格。操作完成后，精灵会立即出现在中央窗格中，这是纹理图集的实时预览。当你更改任何设置（包括图像优化和布局）时，预览会立即更新。


    ![images](img/0606.jpg)


    **图 6-6.** *使用 TexturePacker 的过程非常简单。*


    在右下角的状态栏中，你还可以看到生成的纹理大小以及它在设备上将占用的内存。在此案例中，纹理图集为 512×512 像素，将占用 1MB 内存。此信息针对高清（HD）纹理。标清（SD）纹理尺寸约为
    256×256 像素，内存消耗为四分之一，即 256KB。请注意，标清纹理图集不总是恰好为高清纹理宽度和高度的一半。这是因为某些布局特性（如边距）在创建标清纹理时不会缩放。


    **注意：** 除非你的游戏专门针对第三代及更新的设备开发，否则不应使用 2048 的宽度或高度。较旧设备仅支持最大 1024×1024 像素的纹理尺寸。你可以在左侧窗格的“几何”部分限制
    TexturePacker 生成的最大纹理尺寸。


    TexturePacker 使用多种技巧优化纹理空间，以达到最佳填充率。首先，它会裁剪每个图像的透明边框像素。Cocos2d 通过在绘制精灵时，将裁剪区域作为偏移量添加到精灵位置来补偿这一操作。这样做有两个优点：减小纹理尺寸，并加快精灵的渲染速度。


    你可能还会注意到某些图像被旋转了。TexturePacker 这样做是为了优化纹理图集空间的利用率。同样，Cocos2d 会在将图像加载到内存时恢复其原始方向来补偿。如果你添加了两个或更多完全相同的图像，TexturePacker
    只会添加一个图像，以进一步节省纹理图集空间。如果这些图像通过不同的文件名被引用，你可以在 Cocos2d 中使用任意一个源文件名加载该图像。当纹理图集中的某个图像对应多个包含相同图像的源文件时，TexturePacker
    会在中央窗格中在该图像上绘制一个小叠加层（一叠纸）。


    如果你对 `Border Padding` 和 `Shape Padding` 设置感到好奇，它们决定了所有图像之间以及图像与图集边界之间保留多少像素的空间。默认的
    2 像素可确保纹理图集中的所有图像在绘制时不会出现任何伪影。边距过小时，图像在游戏中显示时，其边缘周围可能会出现杂散像素。这些杂散像素的数量和颜色取决于纹理图集中其他图像周围的像素。这是一个技术问题，与图形硬件如何过滤纹理有关，唯一的解决方案是在纹理图集的所有图像之间留出一定量的边距。


    在保存纹理图集之前，需要对 TexturePacker 的 `Output` 设置进行调整，如图 图 6-7 所示。


    ![images](img/0607.jpg)


    **图 6-7.** *TexturePacker 输出设置*


    首先，确保数据格式设置为 `cocos2d`，因为 TexturePacker 也可用于其他游戏引擎。


    对于数据文件，你应该指定一个位于项目 `Resources` 文件夹中的文件。确保文件名包含 `-hd` 后缀。在 `Sprites06` 项目中，文件名为
    `game-art-hd.plist`。TexturePacker 会将高清纹理保存到指定的文件名，但对于标清版本会省略 `-hd` 后缀，这正是 Cocos2d
    所需的数据格式。要让 TexturePacker 自动创建纹理图集的标清版本，你还需要勾选底部的 `AutoSD` 复选框。


    最后，为导出的纹理图集选择 **纹理格式**（Texture Format）和 **图像格式**（Image Format）。推荐的 **纹理格式** 设置为
    **Compressed PVR (.pvr.ccz)**，这是 iPhone 原生 PVR 格式的压缩版本。这种格式通常比 PNG 加载更快，并且如果你的图像是
    16 位色深，压缩的 PVR 格式将生成比 PNG 更小的文件。无论图像的实际颜色位深如何，PNG 文件格式始终存储 32 位颜色值。


    **注意：** 颜色深度、位深或每像素位数是存储像素颜色信息所用的位数。4 位色深允许图像中的每个像素拥有 16 种可能的颜色之一。使用 16 位色深，图像像素可以显示
    65,536 种颜色范围。而使用 24 位色深，图像可以拥有数百万种颜色——数量之多，以至于 24 位色深的图像有时被称为*真彩色*图像。为什么这种格式通常被称为
    32 位？因为大多数常见文件格式中额外的 8 位用于存储每个像素的不透明度。


    我鼓励你阅读维基百科上关于颜色深度（[`http://en.wikipedia.org/wiki/Color_depth`](http://en.wikipedia.org/wiki/Color_depth)）和
    RGB 颜色模型（[`http://en.wikipedia.org/wiki/RGB`](http://en.wikipedia.org/wiki/RGB)）的文章，以了解更多关于计算设备如何显示颜色的信息。


    使用 PVR 格式时，你还应启用 **Premultiply alpha** 复选框，以避免在某些情况下精灵周围出现黑色边框。在你的项目应用委托中，在 Cocos2d
    初始化之后、运行第一个场景之前，你应该让 Cocos2d 知道你的 PVR 图像使用了预乘 alpha：


    **`// 为 PVR 纹理启用预乘 alpha 以避免伪影`**

    **`[CCTexture2D PVRImagesHavePremultipliedAlpha:YES];`**


    ```

    // 运行主场景

    [[CCDirector sharedDirector] runWithScene: [GameScene scene]];

    ```


    对于 **图像格式**（Image Format）设置，你有多种选择。默认格式是 `RGBA8888`，它提供最佳视觉效果。它提供 24 位色深和 8 位
    alpha 通道。缺点是该格式渲染速度也最慢，尤其是在第一代和第二代设备上，建议回退到较低质量的图像格式以优先保证渲染速度。然而，提供设备特定的纹理图集变体操作起来很麻烦。你可能只想在旧设备上渲染较少的精灵，或者甚至完全放弃对这些设备的支持。


    在质量、内存使用和渲染速度之间取得最佳平衡的是 `RGBA4444` 格式。它为每种颜色使用 4 位，为 alpha 通道使用 4 位。这是精灵最常用的图像格式。


    如果透明度对你来说不重要，并且你希望获得更多颜色变化，则应使用 `RGB5551` 格式。它为每种颜色提供 5 位，仅为 alpha 通道提供 1 位。alpha
    通道的 1 位只能设置为开或关，这意味着你的图像只能有完全透明或完全不透明的像素。换句话说，`RGB5551` 精灵无法与背景像素进行混合。

