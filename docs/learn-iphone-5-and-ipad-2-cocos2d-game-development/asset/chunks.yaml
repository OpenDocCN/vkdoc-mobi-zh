    \n        // 从 config.lua 文件中获取 hello world 字符串\n        [KKConfig injectPropertiesFromKeyPath:@\"\
    HelloWorldSettings\" target:self];\n\n        CCLabelTTF* label = [CCLabelTTF\
    \ labelWithString:helloWorldString\n                                         \
