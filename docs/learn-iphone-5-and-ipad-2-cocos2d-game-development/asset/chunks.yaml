  raw: '#### Scrolling the Tilemap


    The best part comes last: scrolling. It''s actually straightforward because only
    the `CCTMXTiledMap` needs to be moved. In the Tilemap04 project, I''ve added the
    call to the `centerTileMapOnTileCoord` method in `ccTouchesBegan` right after
    obtaining the tile coordinates of the touch:


    `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`

    `{`

    `    ...`

    `    // Get the position in tile coordinates from the touch location`

    `    CGPoint touchLocation = [self locationFromTouches:touches];`

    `    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];`


    **`// Move tilemap so that the touched tile is at the center of the screen`**

    **`[self centerTileMapOnTileCoord:tilePos tileMap:tileMap];`**

    `    ...`

    `}`


    [Listing 10–7](#Chapter10.html#list_10_7) shows the `centerTileMapOnTileCoord`
    method, which moves the tilemap so that the touched tile is at the center of the
    screen. It also stops the tilemap from scrolling further if any tilemap border
    already aligns with the screen edge.


    **Listing 10–7.** *Centering the Tilemap on a Tile Coordinate*


    `-(void) centerTileMapOnTileCoord:(CGPoint)tilePos tileMap:(CCTMXTiledMap*)tileMap`

    `{`

    `    // Center tilemap on the given tile pos`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`

    `    CGPoint screenCenter = CGPointMake(screenSize.width * 0.5f,`![images](images/U002.jpg)

    `        screenSize.height * 0.5f);`


    `    // Tile coordinates are counted from upper-left corner`

    `    tilePos.y = (tileMap.mapSize.height - 1) - tilePos.y;`


    `    // Point is now at lower-left corner of the screen`

    `    CGPoint scrollPosition = CGPointMake(-(tilePos.x * tileMap.tileSize.width),`![images](images/U002.jpg)

    `        -(tilePos.y * tileMap.tileSize.height));`


    `    // Offset point to center of screen and center of tile`

    `    scrollPosition.x += screenCenter.x - tileMap.tileSize.width * 0.5f;`

    `    scrollPosition.y += screenCenter.y - tileMap.tileSize.height * 0.5f;`


    `    // Make sure tilemap scrolling stops at the tilemap borders`

    `    scrollPosition.x = MIN(scrollPosition.x, 0);`

    `    scrollPosition.x = MAX(scrollPosition.x, -screenSize.width);`

    `    scrollPosition.y = MIN(scrollPosition.y, 0);`

    `    scrollPosition.y = MAX(scrollPosition.y, -screenSize.height);`


    `    CCAction* move = [CCMoveTo actionWithDuration:0.2f position: scrollPosition];`

    `    [tileMap stopAllActions];`

    `    [tileMap runAction:move];`

    `}`


    After obtaining the center position of the screen, I modify the `tilePos` y coordinate
    because tilemap coordinates are counted from top to bottom (see [Figure 10–11](#Chapter10.html#fig_10_11)),
    while screen coordinates increase from bottom up. In effect, I convert the `tilePos`
    y coordinate as if it were counted from bottom up. In addition, I subtract 1 from
    the map''s height to account for the fact that tile coordinates are counted from
    0\. In other words, if the map''s height were 10, only the tile coordinates 0
    to 9 would be valid.


    Next, the `scrollPositionCGPoint` is created, which will become the position the
    tilemap will be moved to. The first step is to multiply the tile coordinates with
    the tilemap''s `tileSize`. You may be wondering why I negate the `tilePosInPixels`
    coordinates. It''s simply because if I want the tiles to move from top right to
    bottom left, I have to move the tilemap down and to the left by decreasing the
    coordinates.


    The next big block modifies the coordinates of the `scrollPosition` to center
    the tile on the screen''s center point. You also need to take into account the
    center of the tile itself, which is why half the `tileSize` is deducted from the
    `screenCenter` offset.


    By using the Objective-C language''s `MIN` and `MAX` macros, it is ensured that
    the `scrollPosition` is kept within the bounds of the tilemap, so as to not reveal
    anything past the borders of the tilemap. `MIN` and `MAX` return the minimum and
    maximum values of their two parameters, respectively, and are a more compact and
    readable solution than conditional assignments using `if` and `else` statements.


    Finally, a `CCMoveTo` action is used to scroll the tilemap node so that the touched
    tile is centered on the screen. The result is a tilemap that scrolls to the tile
    that you tap. You can use the same method to scroll to a tile of interest—for
    example, the player''s position.


    **TIP:** As for the player character itself, you''ll find an implementation in
    the next chapter about isometric tilemaps. You can apply the same principle to
    orthogonal tilemaps. And this Cocos2D forum thread will get you started with pathfinding
    on orthogonal tilemaps, source code included: [`www.cocos2d-iphone.org/forum/topic/19463`](http://www.cocos2d-iphone.org/forum/topic/19463).


    If you''re interested in a complete, working, and ready-made solution for a hack-and-slash
    game on orthogonal tilemaps, including a great tutorial, I recommend looking at
    Nate Weiss'' iPhone Game Kit: [`www.iphonegamekit.com`](http://www.iphonegamekit.com).


    ### Summary


    You should now have a fair understanding of what tilemaps are and how to work
    with Tiled Map Editor to create a tilemap with multiple layers and properties
    that can be used by your game.


    Loading and displaying a tilemap with cocos2d is a simple task that quickly grows
    in complexity when it comes to obtaining tile and object layers, modifying them,
    and reading their properties. You also learned how to determine the tile coordinate
    of a touch location and how to use tile coordinates to scroll the tilemap so that
    it centers the touched tile on the screen.


    I even got you acquainted with custom drawing and a bit of OpenGL ES code to render
    the object layer rectangles on the tilemap for debugging purposes.


    ## Chapter 11


    ## Isometric Tilemaps


    With isometric tilemaps you can get the best of both worlds—using two-dimensional
    graphics to achieve a three-dimensional look. This is the reason isometric tilemap
    games are so widely popular. Isometric tilemap games started to get a strong foothold
    in the late 1990s but slowly disappeared with the increasing 3D-rendering performance
    of desktop computers and consoles. They reemerged with force in recent years in
    mobile games and social web games, where 3D rendering is very costly or not even
    available. Examples range from classic computer role-playing games like Ultima
    VII and Diablo to current Facebook-hype Farmville and many of its official and
    unofficial companion games.


    Isometric games allow you to create believable game worlds that seem to have spatial
    depth with relatively simple graphics and tools. In addition, 2D graphics require
    far less powerful devices than real 3D computer graphics.


    [Figure 11–1](#Chapter11.html#fig_11_1) shows an example of the isometric tilemap
    game we''ll build in this chapter. You''ll control a ninja character who sneaks
    around in this world, avoiding collisions with walls and mountains. The ninja
    will also be able to hide behind certain objects, such as trees and cacti.


    ![images](images/1101.jpg)


    **Figure 11–1.** *An isometric tilemap game*


    **NOTE:** All tilesets used in this chapter were created by David E. Gervais and
    published under the Creative Commons license. You can download more of his work
    at [`http://pousse.rapiere.free.fr/tome/index.htm`](http://pousse.rapiere.free.fr/tome/index.htm).'
  trans: "\n#### 滚动瓦片地图\n\n最精彩的部分留到最后：滚动。实际上这很简单，因为只需移动 `CCTMXTiledMap` 即可。在 Tilemap04\
    \ 项目中，我在 `ccTouchesBegan` 方法中获取触摸的瓦片坐标后，紧接着添加了对 `centerTileMapOnTileCoord` 方法的调用：\n\
    \n```\n-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\n{\n\
    \    ...\n    // 从触摸位置获取瓦片坐标下的位置\n    CGPoint touchLocation = [self locationFromTouches:touches];\n\
    \    CGPoint tilePos = [self tilePosFromLocation:touchLocation tileMap:tileMap];\n\
    \n    // 移动瓦片地图，使被触摸的瓦片位于屏幕中央\n    [self centerTileMapOnTileCoord:tilePos tileMap:tileMap];\n\
    \    ...\n}\n```\n\n代码清单 10-7 展示了 `centerTileMapOnTileCoord` 方法，该方法移动瓦片地图，使被触摸的瓦片位于屏幕中央。同时，如果瓦片地图的任何边界已与屏幕边缘对齐，它也会阻止瓦片地图继续滚动。\n\
    \n**代码清单 10-7.** *将瓦片地图居中于某个瓦片坐标*\n\n```\n-(void) centerTileMapOnTileCoord:(CGPoint)tilePos\
    \ tileMap:(CCTMXTiledMap*)tileMap\n{\n    // 将瓦片地图居中于给定的瓦片位置\n    CGSize screenSize\
    \ = [[CCDirector sharedDirector] winSize];\n    CGPoint screenCenter = CGPointMake(screenSize.width\
    \ * 0.5f,\n        screenSize.height * 0.5f);\n\n    // 瓦片坐标从左上角开始计数\n    tilePos.y\
    \ = (tileMap.mapSize.height - 1) - tilePos.y;\n\n    // 该点现在位于屏幕左下角\n    CGPoint\
    \ scrollPosition = CGPointMake(-(tilePos.x * tileMap.tileSize.width),\n      \
    \  -(tilePos.y * tileMap.tileSize.height));\n\n    // 将点偏移到屏幕中心和瓦片中心\n    scrollPosition.x\
    \ += screenCenter.x - tileMap.tileSize.width * 0.5f;\n    scrollPosition.y +=\
    \ screenCenter.y - tileMap.tileSize.height * 0.5f;\n\n    // 确保瓦片地图滚动在瓦片地图边界处停止\n\
    \    scrollPosition.x = MIN(scrollPosition.x, 0);\n    scrollPosition.x = MAX(scrollPosition.x,\
    \ -screenSize.width);\n    scrollPosition.y = MIN(scrollPosition.y, 0);\n    scrollPosition.y\
    \ = MAX(scrollPosition.y, -screenSize.height);\n\n    CCAction* move = [CCMoveTo\
    \ actionWithDuration:0.2f position: scrollPosition];\n    [tileMap stopAllActions];\n\
    \    [tileMap runAction:move];\n}\n```\n\n在获取屏幕中心位置后，我修改了 `tilePos` 的 y 坐标，因为瓦片地图坐标是从上到下计数的（参见图\
    \ 10-11），而屏幕坐标是从下到上递增。实际上，我将 `tilePos` 的 y 坐标转换成了从下到上计数的方式。此外，我从地图高度中减去了 1，以考虑瓦片坐标是从\
    \ 0 开始计数的这一事实。换句话说，如果地图高度为 10，则只有瓦片坐标 0 到 9 是有效的。\n\n接下来创建了 `scrollPosition` CGPoint，它将成为瓦片地图移动到的位置。第一步是将瓦片坐标乘以瓦片地图的\
    \ `tileSize`。你可能会疑惑为什么我对 `tilePosInPixels` 坐标取负值。原因很简单：如果我想要瓦片从右上角移动到左下角，就必须通过减小坐标值来将瓦片地图向下和向左移动。\n\
    \n下一个大块代码修改了 `scrollPosition` 的坐标，以将瓦片居中于屏幕中心点。你还需要考虑瓦片本身的中心，这就是为什么从 `screenCenter`\
    \ 偏移量中减去了 `tileSize` 的一半。\n\n通过使用 Objective-C 语言的 `MIN` 和 `MAX` 宏，确保了 `scrollPosition`\
    \ 被限制在瓦片地图的边界内，从而不会露出瓦片地图边界之外的任何内容。`MIN` 和 `MAX` 分别返回其两个参数的最小值和最大值，相比使用 `if` 和\
    \ `else` 语句的条件赋值，这是一种更紧凑且更易读的解决方案。\n\n最后，使用 `CCMoveTo` 动作来滚动瓦片地图节点，使被触摸的瓦片居中于屏幕。其效果是让瓦片地图滚动到你点击的瓦片位置。你可以使用同样的方法滚动到感兴趣的瓦片，例如玩家的位置。\n\
    \n**提示：** 至于玩家角色本身，你将在下一章关于等距瓦片地图的内容中找到相关实现。你可以将同样的原理应用于正交瓦片地图。并且，这个 Cocos2D 论坛帖子将帮助你入门正交瓦片地图上的寻路算法，其中包含源代码：[`www.cocos2d-iphone.org/forum/topic/19463`](http://www.cocos2d-iphone.org/forum/topic/19463)。\n\
    \n如果你对正交瓦片地图上完整、可用且立即可用的砍杀游戏解决方案感兴趣（包括一份优秀的教程），我推荐查看 Nate Weiss 的 iPhone 游戏工具包：[`www.iphonegamekit.com`](http://www.iphonegamekit.com)。\n\
    \n### 总结\n\n现在，你应该对什么是瓦片地图，以及如何使用 Tiled Map Editor 创建包含多层和多种属性（可供游戏使用）的瓦片地图有了相当的理解。\n\
    \n使用 cocos2d 加载和显示瓦片地图是一项简单的任务，但当涉及到获取瓦片层和对象层、修改它们以及读取其属性时，其复杂性会迅速增加。你还学习了如何确定触摸位置的瓦片坐标，以及如何使用瓦片坐标来滚动瓦片地图，使被触摸的瓦片居中于屏幕。\n\
    \n我甚至让你初步了解了自定义绘图和一些 OpenGL ES 代码，用于在瓦片地图上渲染对象层矩形，以便进行调试。\n\n## 第 11 章\n\n## 等距瓦片地图\n\
    \n使用等距瓦片地图，你可以两全其美——利用二维图形实现三维外观。这就是等距瓦片地图游戏如此广受欢迎的原因。等距瓦片地图游戏在 20 世纪 90 年代末期开始占据重要地位，但随着台式电脑和游戏主机\
    \ 3D 渲染性能的提升而逐渐消失。近年来，它们在移动游戏和社交网页游戏中强势复兴，在这些场景中，3D 渲染成本高昂，甚至不可用。从《创世纪 VII》和《暗黑破坏神》等经典电脑角色扮演游戏，到当前\
    \ Facebook 上火爆的《Farmville》及其众多官方和非官方衍生游戏，皆是如此。\n\n等距游戏允许你使用相对简单的图形和工具，创建出看似具有空间深度的可信游戏世界。此外，与真正的\
    \ 3D 计算机图形相比，2D 图形所需的设备性能要低得多。\n\n图 11-1 展示了我们将在本章中构建的等距瓦片地图游戏示例。你将控制一名忍者角色在这个世界中潜行，避开墙壁和山脉的碰撞。忍者还能隐藏在树木、仙人掌等特定物体后面。\n\
    \n![images](img/1101.jpg)\n\n**图 11-1.** *一个等距瓦片地图游戏*\n\n**注意：** 本章使用的所有图块集均由\
    \ David E. Gervais 创作，并根据知识共享许可发布。你可以从他的网站下载更多作品：[`http://pousse.rapiere.free.fr/tome/index.htm`](http://pousse.rapiere.free.fr/tome/index.htm)。\n"
- fmt: '### Designing Isometric Tile Graphics


    So you understand how to design isometric graphics, I will first introduce the
    concept of projection. In a 3D world, you can look at the objects from all sides,
    because 3D worlds can freely project the 3D world onto your two-dimensional screen
    from any angle and position. This conversion from a three-dimensional world onto
    a two-dimensional screen is called *perspective projection*. Taking a photograph
    is also a form of perspective projection of the real world onto a 2D image. Both
    projections retain the perspective of the viewer''s point of view.


    In an isometric tilemap world, each individual tilemap image is already a projection
    of a seemingly three-dimensional object onto a flat surface. This projection is
    usually performed with a special form of parallel projection called *isometric
    projection*. The image then becomes more or less skewed, but our minds still recognize
    it as a three-dimensional object.


    **TIP:** If you want to learn more about the various projection techniques and
    technical details of each, I recommend browsing the section about parallel projection
    on Wikipedia at [`http://en.wikipedia.org/wiki/Parallel_projection`](http://en.wikipedia.org/wiki/Parallel_projection).


    In terms of tilemaps, if you take a look at [Figure 11–2](#Chapter11.html#fig_11_2),
    you can see the concrete steps for creating an isometric projection of an orthogonal
    image. The square is first rotated by 45 degrees and then scaled down along its
    `y`-axis to give it its typical isometric diamond shape.


    ![images](images/1102.jpg)


    **Figure 11–2.** *An orthogonal turned isometric by rotating it by 45 degrees
    and then compressing it vertically*


    However, [Figure 11–2](#Chapter11.html#fig_11_2) is just the theoretical approach
    to illustrate the projection of the isometric shape. You can''t turn an orthogonal
    image into an isometric image by simply rotating and compressing it, because the
    rotation would affect the image content. It would just look flat and very wrong,
    just like [Figure 11–3](#Chapter11.html#fig_11_3).


    ![images](images/1103.jpg)


    **Figure 11–3.** *Turning an orthogonal tileset into an isometric tileset—it''s
    not that simple!*


    Instead, consider the diamond shape created in [Figure 11–2](#Chapter11.html#fig_11_2)
    as your drawing canvas of the floor. The simplest isometric tiles you can design
    are flat ground tiles. Just fill the diamond shape with a certain pattern, and
    you get yourself usable isometric tiles. [Figure 11–4](#Chapter11.html#fig_11_4)
    shows a number of flat-colored isometric tiles laid out next to each other, creating
    a ground floor pattern. Ground floor tiles are not impressive and look very flat.
    Yet they are essential as the game world''s background layer.


    ![images](images/1104.jpg)


    **Figure 11–4.** *Ground floor isometric tiles have no depth. They are used as
    solid surface areas.*


    To add actual visual depth to an isometric tilemap, you need to have object tiles
    that extend beyond the diamond shape. The most commonly used approach is to draw
    three-dimensional objects as if they were viewed at a 45-degree angle and then
    draw them up and over the diamond shape, typically extending no more than one
    tile above. In the example in [Figure 11–5](#Chapter11.html#fig_11_5), you can
    see this quite nicely by looking at the doorway. The door arch is drawn mostly
    over the isometric tile above the one that the door''s frame is standing on. This
    gives the door its visual depth.


    ![images](images/1105.jpg)


    **Figure 11–5.** *Add depth by drawing objects up to twice as high as the diamond
    shape.*


    Isometric tilemaps allow object tiles to overlap one another because the tiles
    are drawn from back to front, which means that object tiles closer to the viewer
    will always be drawn over tiles behind them, adding to the feeling of depth. But
    this approach requires careful design of individual tiles and the tilemap itself,
    because too much overlap or overlapping the wrong tiles can quickly destroy the
    illusion of depth.


    As a good practice, try not to overlap object tiles that have wildly different
    shapes but use the same or similar color palette. In the case of [Figure 11–5](#Chapter11.html#fig_11_5),
    for example, you would not want to place the crystal tile directly behind the
    doorway. The loss in contrast and merging outlines of these tiles could easily
    destroy the perception of depth.


    Likewise, although you can create isometric object tiles that span much higher
    than twice the tile height, it''s very hard to create a convincing 3D look if
    objects appear very high because the player will see only part of the tilemap.
    If you were building a huge castle whose walls span a dozen tiles high and the
    player approached them from below, the walls could easily be mistaken for a large
    section of ground floor. You can even end up creating optical illusions like the
    drawings of M. C. Escher because the isometric tiles do not get smaller the farther
    away from the screen they are. So, there''s always a fine line between what works
    and what doesn''t when designing isometric tiles and tilemaps.


    [Figure 11–6](#Chapter11.html#fig_11_6) shows a finely crafted isometric tileset
    named `dg_iso32.png`, which contains a good variation of ground floor tiles; object
    tiles such as walls, trees, and houses; and adornment objects or items that can
    be placed on any ground tile. The tiles in this set are each 54x49 pixels in size.
    The height can be chosen arbitrarily; it can be more or less than 49 pixels and
    depends on how much overlap between tiles you like in your tilemap. The actual
    height of the diamond shape is 27 pixels. This will become important when you
    create the tilemap in Tiled (Qt) Map Editor.


    ![images](images/1106.jpg)


    **Figure 11–6.** *David Gervais''s finely crafted isometric tileset*


    ### Isometric Tilemap Editing with Tiled


    I''ll use the Tiled Map Editor once again to create the isometric tilemap. The
    basic tilemap editing is the same as with orthogonal maps, but there are certain
    crucial steps to correctly set up a new isometric tilemap and load an isometric
    tileset.'
