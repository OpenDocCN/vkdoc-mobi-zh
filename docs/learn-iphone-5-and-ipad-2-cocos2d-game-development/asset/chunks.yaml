    \        float angle = body->GetAngle();\n        bodyNode.rotation = -(CC_RADIANS_TO_DEGREES(angle));\n\
    \    }\n}\n\nThe `world->Step()` method call has also been changed. The `update`\
    \ method's `delta` parameter is now used in place of the previously fixed time\
    \ interval in order to make the simulation framerate independent. This change\
    \ will allow the physics simulation to run at the same speed even if the framerate\
    \ drops.\n\nThe only drawback to updating the physics world independently of the\
    \ framerate is that if there's a one-time but relatively long (more than a tenth\
    \ of a second) interruption during game play—possibly caused by a background task—the\
    \ physics objects may seem to jump or warp to a new location from one instant\
    \ to another. If you see this behavior in your game, you will want to cap the\
    \ `delta` value to a safe upper limit in order to advance the physics world no\
    \ faster than the given constant value:\n\n```\nfloat cappedDelta = fminf(delta,\
    \ 0.08f);\nworld->Step(cappedDelta, velocityIterations, positionIterations);\n\
    ```\n\nThe effect of that code is that the physics simulation will be updated\
    \ independently from the framerate, but if the framerate drops too low, the physic\
    \ simulation will update at a constant speed.\n\n## Creating the Pinball Table\n\
    \nThe pinball's table is made up of three individual images and associated shapes,\
    \ named *table-top*, *table-left*, and *table-bottom*. You'll create the table\
    \ using the `TablePart` class, which inherits from `BodyNode`. The `TablePart`\
    \ header only adds the static initializer method `tablePartInWorld`:\n\n```\n\
    #import \"BodyNode.h\"\n\n@interface TablePart : BodyNode\n{\n}\n\n+(id) tablePartInWorld:(b2World*)world\
    \ position:(CGPoint)pos name:(NSString*)name;\n\n@end\n```\n\nThe `TablePart`\
