  trans: '

    # 划线游戏入门套件


    我的`划线游戏入门套件`模仿了《Flight Control》和《Harbor Master》等成功游戏。如果你想制作划线游戏，这个入门套件能让你快速上手，涵盖画线、沿路径移动物体、碰撞检测以及结构清晰的代码库，并同时包含
    iPhone 和 iPad 版本。


    每次购买即授予站点许可证，这意味着你的整个团队都可以使用该游戏的源代码和素材。由于这是一个入门套件，你自然可以制作该游戏的克隆版本。我还提供 30 天无条件退款保证，并且很乐意帮助你学习入门套件的源代码，并指导如何扩展它。


    `划线游戏入门套件`的产品页面包含了该套件的功能列表、演示应用链接（参见图 17–2）、代码示例以及完整的文档：[`www.learn-cocos2d.com/store/line-drawing-game-starterkit`](http://www.learn-cocos2d.com/store/line-drawing-game-starterkit)。


    ![images](img/1702.jpg)


    **图 17–2.** *划线游戏入门套件示例游戏（iPad）*


    # 平台游戏套件


    我的第二个源代码产品专注于制作像《索尼克》、《马里奥》、《吉安娜姐妹》、《时空幻境》、《超级肉肉哥》等平台游戏。第一个版本模拟了《League of Evil》iPhone
    游戏（参见图 17–3）的玩法，但会根据你的反馈进行扩展，以支持其他类型的平台游戏。


    **注意：** 我与《League of Evil》游戏的开发者并无关联，也未参与其开发。我选择重现《League of Evil》的玩法作为平台游戏套件的首个里程碑，是因为《League
    of Evil》是一款有趣且受欢迎的游戏，并且包含了平台游戏最重要的元素。在[`www.leagueofevilgame.com`](http://www.leagueofevilgame.com)查看该游戏。


    该套件基于 Kobold2D 构建，并考虑了跨平台开发，以便你可以轻松地创建和部署你的平台游戏到 iOS 设备以及作为 Mac OS X 应用程序。游戏关卡使用
    Tiled Map Editor 创建，并使用了该套件提供的免费游戏素材。


    源代码的设计注重模块化和灵活性，以便你可以轻松地扩展自己的功能。例如，许多游戏参数可通过 Lua 配置文件编辑，并且可以为单个角色添加或移除现成的行为类，以实现下落、跳跃、碰撞、死亡、射击、动画、播放声音等功能。


    在[`www.platformergamekit.com`](http://www.platformergamekit.com)和[`www.learn-cocos2d.com/store`](http://www.learn-cocos2d.com/store)上了解更多关于平台游戏套件的信息并获取最新的开发动态。


    ![images](img/1703.jpg)


    **图 17–3.** *使用平台游戏套件创建类似于《League of Evil》（如图所示）的游戏。*


    # 太空游戏入门套件


    太空游戏入门套件源自 Ray Wenderlich 的太空游戏教程（[`www.raywenderlich.com/3611/how-to-make-a-space-shooter-iphone-game`](http://www.raywenderlich.com/3611/how-to-make-a-space-shooter-iphone-game)），现已发展成为一个用于制作横向卷轴射击游戏的商业入门套件。


    与 iPhone RPG 游戏套件一样，购买时附赠四篇史诗级教程，增加了附加价值。这些教程详细讲解了制作这款特定游戏以及游戏制作中的许多细节。Ray Wenderlich
    出品，你尽可期待高质量的代码和教程。


    Ray 的妻子 Vicki 为本入门套件提供了美术素材。只要你注明出处为 Vicki Wenderlich，就可以随意重用和修改这些美术素材。她运营着一个
    iPhone 美术博客，地址是 [`www.vickiwenderlich.com`](http://www.vickiwenderlich.com)。


    在 Ray Wenderlich 的商店中了解更多关于太空游戏入门套件（如图 17–4 所示）的信息：[`www.raywenderlich.com/store/space-game-starter-kit`](http://www.raywenderlich.com/store/space-game-starter-kit)。


    ![images](img/1704.jpg)


    **图 17–4.** *Ray 和 Vicki Wenderlich 的太空游戏入门套件*


    # iUridium 源代码


    如果你在 1980 年代或 1990 年代初拥有过 Commodore 64 家用电脑，那么你很可能玩过或至少听说过《Uridium》。《Uridium》是一款快节奏的太空射击游戏，有一个独特的功能：你可以通过流畅动画的伊梅尔曼转弯来改变飞船的飞行方向，从而在敌方飞船上从头到尾飞行以完成各种目标。可以说，它是早期自由漫游世界类型游戏之一。


    Nenad Alajbegovic 正在将这款游戏移植到 iPhone 上，并恰如其分地命名为 iUridium。你将获得该游戏的完整源代码，它几乎用到了
    cocos2d 游戏引擎提供的所有功能，甚至更多。例如，Nenad 实现了子弹和敌人的缓存（对象池）以实现流畅的游戏体验。他还集成了 UIKit 视图、Game
    Center 排行榜以及 Facebook 和 Twitter。关卡完全以瓦片地图形式创建，并通过 XML 动态加载到游戏的场景和图层节点中。


    许可证是公平的，仅要求你不要克隆 iUridium，但明确允许你制作自己的横向卷轴射击游戏。不过，你必须将所有美术、音乐和音效替换为自己的。


    您可以在以下网站上找到关于 iUridium 的所有信息（如图 17–5 所示）：[`www.iuridium.com/?page_id=2`](http://www.iuridium.com/?page_id=2)。


    ![images](img/1705.jpg)


    **图 17–5.** *iUridium 的游戏源代码可供出售。*


    # BATAK Duel 源代码


    Dan Nelson 是 iPhone 游戏《BATAK Duel》的开发者。他在没有 iPhone 游戏开发经验的情况下，用了五个月时间创建了这款游戏。他成功地将
    OpenFeint、菜单系统以及当然还有存档功能集成到了游戏中。这款应用视觉效果丰富，既利用了 cocos2d 的粒子系统，也使用了其他效果，如光照、平滑滚动的致谢名单和透明弹出键盘。


    许可证是公平的，仅要求你不要使用任何《BATAK Duel》的美术、音乐和音效。您可以在以下网站上找到关于《BATAK Duel》源代码的更多信息（如图 17–6
    所示）：[`www.batakduel.com/blog/78`](http://www.batakduel.com/blog/78)。


    ![images](img/1706.jpg)


    **图 17–6.** *iPhone 游戏《BATAK Duel》的源代码正在出售。*


    # Cocos2D 播客


    Mohammad Azam 和我正在录制 Cocos2D 播客，报道近期事件、讨论热门话题、采访游戏开发者、工具作者和博主，并为听众提供关于使用 cocos2d
    进行游戏开发的内部信息和见解。


    Cocos2D 播客可在 `cocos2dpodcast.wordpress.com` 上收听，新剧集会在 [`www.learn-cocos2d.com/blog`](http://www.learn-cocos2d.com/blog)
    上发布通知。每集时长 30 到 60 分钟。以下是我们目前涉及的部分剧集主题：


    *   通过 iAds、IAP、出售源代码等方式赚取额外收入

    *   Michael Daley 讲解 Particle Designer 和 Glyph Designer

    *   Ray Wenderlich 谈论 Cocos2d、书籍、研讨会等

    *   Andreas Löw 讲解 TexturePacker 和 PhysicsEditor

    *   Vladu Bogdan 讲解 LevelHelper 和 SpriteHelper

    *   Zynga 收购 Cocos2d 贡献者

    *   Cocos2d iPhone 游戏开发中的工具

    *   作为 Cocos2d 替代方案的游戏引擎和框架

