  trans: '

    # 定义台面形状


    弹球台由三个独立的形状组成，分别命名为 `table-bottom`、`table-left` 和 `table-top`。将台面背景图像分割开来，可以更轻松地编辑其形状，也便于创建不同的弹球布局，而无需替换整张图像。


    在"形状"窗格中选择 `table-top` 图像，开始编辑弹球台最顶部部分的形状。如图 13–6 所示，这是一个凹形。如果采用手动定义柱塞的方法，要手动创建这个圆形形状的所有顶点会很困难且容易出错，更不用说确保生成的形状是凸形的了。PhysicsEditor
    能为你大大简化这一过程：它会描摹形状的轮廓，只需单击一次鼠标即可创建合适的形状！


    在中央窗格上方的工具栏中有一个名为 `Shape Tracer` 的魔术棒图标。单击该魔术棒图标，即可打开如图 13–6 所示的"形状追踪器"对话框。


    ![images](img/1306.jpg)


    **图 13–6.** *形状追踪器可自动创建形状。*


    "形状追踪器"会显示形状的图像，以及单击 `OK` 按钮后将要创建的形状的叠加预览。图像下方有一个滑块，滑块左右两侧是控制图像缩放级别的按钮。图像的缩放设置不会影响形状的创建方式。


    在"形状追踪器"中，你需要调整的最重要设置是 `Tolerance`（容差）设置。`Tolerance` 决定了追踪图像以创建形状的精确程度，这直接影响形状所使用的顶点数量。形状的顶点数量反过来又会影响物理模拟的性能。通常，你应该始终力求使用最少的顶点来实现足够的碰撞响应。对于你的游戏来说，碰撞的精确性越重要，你就越需要允许某些对象使用更多的顶点。同时，如果你使用相同的形状添加许多对象，那么使用顶点较少的形状将获得更好的性能。


    通过尝试不同的 `Tolerance` 设置，我发现本例中一个很好的折中方案是 `Tolerance` 值为 4.0。这将创建一个包含 18 个顶点的形状，并且它是能够相当准确地追踪图像形状的最高
    `Tolerance` 值。默认的 `Tolerance` 设置（1.0）会创建一个包含 31 个顶点的形状，因此我成功节省了 13 个顶点。但你会注意到，如果你遍历不同的
    `Tolerance` 值，即使 `Tolerance` 值仅为 1.5，顶点数也会降至 20。


    **提示：** "形状追踪器"中的帧模式设置可用于为动画（图像序列）创建形状。要在 PhysicsEditor 中创建动画，你需要在默认 PhysicsEditor
    窗口的"参数"窗格的"图像参数"下为某个形状添加更多图像文件。通过单击"文件名"设置旁的 + 按钮，你可以为单个形状添加更多图像；然后你可以让形状追踪器创建形状，该形状可以是每个动画帧形状的交集或并集。


    当你对追踪到的形状感到满意时，单击 OK 按钮关闭"形状追踪器"对话框。这将创建新的形状。你仍然需要进行一次快速的手动调整，以确保弹球台的碰撞能够顺畅运行。由于屏幕区域将定义弹球台两侧的碰撞，你应该将左下角和右下角的顶点以及左上角和右上角的顶点分别稍微拖出屏幕区域并向下/向上移动，使它们明显位于
    `table-top` 图像周围的黑色边框之外。请参考图 13–7 以获取视觉提示。


    通过将这些顶点向外延伸，形状将形成向屏幕边框两侧的平滑过渡。如果不延伸这些顶点，由于物理模拟中始终存在的微小误差，球可能会从这些顶点尖端被反弹回来。


    现在，将锚点（内部带有 + 的蓝色圆圈）移动到左上角，最好使用"参数"窗格中"图像参数"下的锚点设置。分别将`Relative`值设置为 `0,0` 和 `1,0`，以将锚点移动到左上角。这个锚点位置之后将允许你通过简单地将图像定位到点坐标
    `0,480`，来使其与屏幕边框精确对齐。


    **注意：** 如果你没有看到锚点圆圈，并且"图像参数"下没有锚点设置，则说明你未将"参数"窗格中的`Exporter`设置设为 `Box2D generic
    (PLIST)` 格式。


    最后一步是调整 `table-top` 形状的碰撞位。选中"墙壁"行的类别（`Cat.`）复选框，然后选中"球"行中的`Mask`复选框。这将启用弹球台与球的碰撞。相应地，你必须为
    `table-left` 和 `table-bottom` 形状设置相同的碰撞位，因为它们都属于"墙壁"类别，并且应该与"球"类别发生碰撞。


    ![images](img/1307.jpg)


    **图 13–7.** *完成台面顶部形状的最终调整*


    以相同的方式使用"形状追踪器"为 `table-left` 图像创建形状。在"图像参数"下，将锚点移动到`像素`坐标 `0,0` 和 `50,0`。不要忘记像之前为
    `table-top` 设置的那样设置碰撞位。


    现在我们来追踪 `table-bottom` 图像的形状。这需要额外的几个步骤，因为 `table-bottom` 图像实际上由四个独立且不相连的元素组成，每个元素都需要有自己的形状。PhysicsEditor
    1.0.4 版本只能追踪连续的形状，因此你需要总共打开四次"形状追踪器"。每次打开"形状追踪器"时，单击你想要追踪的图像部分，然后单击 OK 按钮创建形状。`Tolerance`
    设置为 4.0 对所有四个形状都效果良好。最终你应该得到四个形状，覆盖 `table-bottom` 图像的所有四个元素。不要忘记像为 `table-top`
    设置的那样设置碰撞位，如图 13–7 所示。

    '
- fmt: '#### Defining the Flippers


    Select the image named `flipper-left`, and open the Shape Tracer. You will notice
    that the resulting shape initially suggested by the Shape Tracer does not make
    much sense; the shape is a lot larger than the image would suggest. This is because
    the image has glow and shadow effects that create an aura around the shape itself
    and that is nearly invisible on a light background. To enable the Shape Tracer
    to create a better shape, you need to adjust the `Alpha threshold` setting. The
    default value is 0, which means that all pixels that are not entirely transparent
    will be considered when the shape is traced. In this case, we want only the fully
    opaque pixels to be considered for the shape. If you set the `Alpha threshold`
    to 254, as in [Figure 13–8](#Chapter13.html#fig_13_8), you''ll get a much better
    result.


    ![images](images/1308.jpg)


    **Figure 13–8.** *Tracing the shape of a flipper with an alpha threshold to ignore
    the image shadow.*


    **TIP:** If for any reason the Shape Tracer result is not what you want and neither
    the `Tolerance` nor the `Alpha threshold` setting allows you to fix the shape,
    you can still manually edit the shape after closing the Shape Tracer. Just click
    any vertex and drag it. You can also double-click a vertex to remove it or double-click
    a line segment between two vertices to add a new vertex.


    Repeat the same process for the `flipper-right` image. And don''t forget to set
    the collision bits for both flippers. You will want to check the `Flipper` category
    and the `Mask` check box in the `Ball` row. [Figure 13–8](#Chapter13.html#fig_13_8)
    shows the correct collision bit settings. The anchor point of the left flipper
    should be set to `Pixel` coordinates 27,78 and 97,79 for the right flipper.


    #### Defining the Bumper and Ball


    The ball and bumper images are both circles, so you can use the `Add Circle` command
    from the toolbar to create a circle shape. The circle shape has only one “vertex”
    that acts as a handle to resize the circle shape.


    Starting with the bumper, change the circle shape''s size and position so that
    it overlaps the solid part of the bumper while ignoring the bumper''s shadow.
    Set the bumper''s anchor point to `Pixel` coordinates 33, 42 so that the anchor
    point is centered on the bumper. Set the collision bits category check box next
    to `Bumper`, and set the `Mask` check box of the `Ball` row.


    To simulate the bumper''s bounce effect, you should also modify the `Fixture parameter`
    in the `Parameters` pane labeled `Restitution`. Restitution is the amount of elasticity
    with which an object repels other colliding objects. A restitution of 0 means
    that the collision is not elastic at all and will stop the incoming object. A
    restitution of 1 simulates a perfect elastic collision, allowing the colliding
    object to continue with the same speed after colliding. Since we want to simulate
    an additional repelling force coming from the bumper, we can simply use a value
    of 1,5 or higher in order to have the colliding object move away from the collision
    at a higher speed than the speed it had when it impacted. In real life, this would
    be a violation of Newtonian physics and is in fact impossible. So, don''t tell
    your physics teacher!


    Lastly, create the circle shape for the ball image. Size and position the circle
    shape so that it overlays the entire ball image. You should set the anchor point
    `Relative` values to 0,5 and 0,5.


    As for the ball''s collision bits, you should set the category check box next
    to `Ball` and check all the `Mask` check boxes for the other categories: `Ball`,
    `Bumper`, `Flipper`, `Plunger`, and `Wall`. You can also simply click the `All`
    button at the bottom of the `Mask` column. Since we don''t use the other bits,
    it doesn''t matter if they are checked, too.


    Some of the ball''s Fixture Parameters affect how the ball behaves on the table.
    I set the `Density` to 8,0, `Restitution` to 0,3 and `Friction` to 0,7. These
    settings give the ball just a little bit of bounce. Feel free to tweak these settings
    and observe how the ball''s behavior changes.


    #### Save and Publish


    Lastly you should save the current PhysicsEditor `.pes` file. You can later open
    the `.pes` file to continue editing shapes. You should not add the `.pes` file
    to your Xcode project; it is used only by PhysicsEditor.


    To use the shapes in cocos2d, you will have to use the `Publish` button. This
    creates a `.plist` file that the `GB2ShapeCache` class distributed with PhysicsEditor
    can read. For the PhysicsBox2D03 project, I published the shapes as `pinball-shapes.plist`
    in the `Resources` folder of the project. Add this file to the `Resources` group
    in Xcode.


    ### Programming the Pinball Game


    Now we can move on to the implementation phase and actually program the pinball
    game. You''ll learn how to lay out the table before moving on to the interactive
    elements like the ball, plunger, bumpers, and flippers. But before we get to that,
    I''d like to introduce you to the essential `BodyNode` class, which synchronizes
    a cocos2d sprite with a Box2D body.


    **CAUTION:** Keep in mind that the pinball project uses Box2D, which is written
    in C++. This requires us to use the `.mm` file extension instead of `.m` for all
    class implementation files so that the compiler correctly switches to compiling
    C++ code instead of C code. Whenever you create a new Objective-C class, you will
    have to rename the implementation file so that it uses the `.mm` file extension.
    Otherwise, you''ll see a lot of compile errors seemingly caused by the Box2D source
    code.'
  raw: '#### Defining the Flippers


    Select the image named flipper-left, and open the Shape Tracer. You will notice
    that the resulting shape initially suggested by the Shape Tracer does not make
    much sense; the shape is a lot larger than the image would suggest.


    This is because the image has glow and shadow effects that create an aura around
    the shape itself and that is nearly invisible on a light background. To enable
    the Shape Tracer to create a better shape, you need to adjust the `Alpha threshold`
    setting. The default value is 0, which means that all pixels that are not entirely
    transparent will be considered when the shape is traced. In this case, we want
    only the fully opaque pixels to be considered for the shape. If you set the `Alpha
    threshold` to 254, as in [Figure 13–8](#Chapter13.html#fig_13_8), you''ll get
    a much better result.


    ![images](images/1308.jpg)


    **Figure 13–8.** *Tracing the shape of a flipper with an alpha threshold to ignore
    the image shadow.*


    **TIP:** If for any reason the Shape Tracer result is not what you want and neither
    the `Tolerance` nor the `Alpha threshold` setting allows you to fix the shape,
    you can still manually edit the shape after closing the Shape Tracer. Just click
    any vertex and drag it. You can also double-click a vertex to remove it or double-click
    a line segment between two vertices to add a new vertex.


    Repeat the same process for the flipper-right image. And don''t forget to set
    the collision bits for both flippers. You will want to check the `Flipper` category
    and the `Mask` check box in the `Ball` row. [Figure 13–8](#Chapter13.html#fig_13_8)
    shows the correct collision bit settings.


    The anchor point of the left flipper should be set to `Pixel` coordinates 27,78
    and 97,79 for the right flipper.


    #### Defining the Bumper and Ball


    The ball and bumper images are both circles, so you can use the `Add Circle` command
    from the toolbar to create a circle shape. The circle shape has only one “vertex”
    that acts as a handle to resize the circle shape.


    Starting with the bumper, change the circle shape''s size and position so that
    it overlaps the solid part of the bumper while ignoring the bumper''s shadow.
    Set the bumper''s anchor point to `Pixel` coordinates 33, 42 so that the anchor
    point is centered on the bumper. Set the collision bits category check box next
    to `Bumper`, and set the `Mask` check box of the `Ball` row.


    To simulate the bumper''s bounce effect, you should also modify the `Fixture parameter`
    in the `Parameters` pane labeled `Restitution`. Restitution is the amount of elasticity
    with which an object repels other colliding objects. A restitution of 0 means
    that the collision is not elastic at all and will stop the incoming object. A
    restitution of 1 simulates a perfect elastic collision, allowing the colliding
    object to continue with the same speed after colliding.


    Since we want to simulate an additional repelling force coming from the bumper,
    we can simply use a value of 1,5 or higher in order to have the colliding object
    move away from the collision at a higher speed than the speed it had when it impacted.
    In real life, this would be a violation of Newtonian physics and is in fact impossible.
    So, don''t tell your physics teacher!


    Lastly, create the circle shape for the ball image. Size and position the circle
    shape so that it overlays the entire ball image. You should set the anchor point
    `Relative` values to 0,5 and 0,5.


    As for the ball''s collision bits, you should set the category check box next
    to `Ball` and check all the `Mask` check boxes for the other categories: `Ball`,
    `Bumper`, `Flipper`, `Plunger`, and `Wall`. You can also simply click the `All`
    button at the bottom of the `Mask` column. Since we don''t use the other bits,
    it doesn''t matter if they are checked, too.


    Some of the ball''s Fixture Parameters affect how the ball behaves on the table.
    I set the `Density` to 8,0,`Restitution` to 0,3 and `Friction` to 0,7\. These
    settings give the ball just a little bit of bounce. Feel free to tweak these settings
    and observe how the ball''s behavior changes.


    #### Save and Publish


    Lastly you should save the current PhysicsEditor .pes file. You can later open
    the .pes file to continue editing shapes. You should not add the .pes file to
    your Xcode project; it is usedonly by PhysicsEditor.


    To use the shapes in cocos2d, you will have to use the `Publish` button. This
    creates a .plist file that the `GB2ShapeCache` class distributed with PhysicsEditor
    can read. For the PhysicsBox2D03 project, I published the shapes as pinball-shapes.plist
    in theResources folder of the project. Add this file to the Resources group in
    Xcode.


    ### Programming the Pinball Game


    Now we can move on to the implementation phase and actually program the pinball
    game. You''ll learn how to lay out the table before moving on to the interactive
    elements like the ball, plunger, bumpers, and flippers. But before we get to that,
    I''d like to introduce you to the essential `BodyNode` class, which synchronizes
    a cocos2d sprite with a Box2D body.


    **CAUTION:** Keep in mind that the pinball project uses Box2D, which is written
    in C++. This requires us to use the .mm file extension instead of .m for all class
    implementation files so that the compiler correctly switches to compiling C++
    code instead of C code. Whenever you create a new Objective-C class, you will
    have to rename the implementation file so that it uses the .mm file extension.
    Otherwise, you''ll see a lot of compile errors seemingly caused by the Box2D source
    code.'
  trans: '

    #### 定义挡板


    选择名为 `flipper-left` 的图像，然后打开形状追踪器。你会注意到，形状追踪器初步建议的生成形状并不合理；该形状比图像所展示的要大得多。这是因为图像带有发光和阴影效果，在形状本身周围形成了一圈光晕，而这在浅色背景上几乎不可见。为了让形状追踪器能生成更合理的形状，你需要调整
    `Alpha threshold`（透明度阈值）设置。默认值为 0，这意味着在追踪形状时，所有非完全透明的像素都会被考虑。在这种情况下，我们只希望将完全不透明的像素纳入形状范围。如果将
    `Alpha threshold` 设置为 254，如 图 13-8 所示，你会得到好得多的结果。


    ![images](img/1308.jpg)


    **图 13-8.** *使用透明度阈值追踪挡板形状以忽略图像阴影。*


    **提示：** 如果出于某种原因，形状追踪器的结果不理想，并且调整 `Tolerance`（容差）或 `Alpha threshold` 设置都无法修正形状，你仍可以在关闭形状追踪器后手动编辑形状。只需点击任意顶点并拖动即可。你还可以双击顶点将其删除，或者双击两个顶点之间的线段来添加一个新顶点。


    对 `flipper-right` 图像重复相同的过程。并且不要忘记为两个挡板设置碰撞位。你需要勾选 `Flipper` 类别，并在 `Ball` 行中勾选
    `Mask` 复选框。图 13-8 展示了正确的碰撞位设置。左侧挡板的锚点应设置为像素坐标 (27, 78)，右侧挡板的锚点应设置为 (97, 79)。


    #### 定义缓冲器和球


    球和缓冲器图像都是圆形，因此你可以使用工具栏中的 `Add Circle`（添加圆形）命令来创建圆形形状。圆形形状只有一个“顶点”，用作调整圆形大小的手柄。


    从缓冲器开始，调整圆形形状的大小和位置，使其覆盖缓冲器的实体部分，同时忽略其阴影。将缓冲器的锚点设置为像素坐标 (33, 42)，使锚点位于缓冲器的中心。在碰撞位类别中勾选
    `Bumper` 旁边的复选框，并设置 `Ball` 行的 `Mask` 复选框。


    为了模拟缓冲器的弹跳效果，你还应在 `Parameters`（参数）窗格中修改标有 `Restitution`（恢复系数）的 `Fixture parameter`（夹具参数）。恢复系数是指物体排斥其他碰撞物体的弹性大小。恢复系数为
    0 表示碰撞完全没有弹性，会阻止入射物体。恢复系数为 1 模拟完全弹性碰撞，允许碰撞物体在碰撞后以相同速度继续运动。由于我们希望模拟缓冲器产生的额外排斥力，我们可以简单地使用
    1.5 或更高的值，以使碰撞物体以比撞击时更高的速度远离碰撞。在现实生活中，这违反了牛顿物理学定律，实际上是不可能的。所以，可别告诉你的物理老师！


    最后，为球图像创建圆形形状。调整圆形形状的大小和位置，使其覆盖整个球图像。你应该将锚点的 `Relative`（相对）值设置为 0.5 和 0.5。


    至于球的碰撞位，你应该勾选 `Ball` 旁边的类别复选框，并勾选其他所有类别的 `Mask` 复选框：`Ball`、`Bumper`、`Flipper`、`Plunger`
    和 `Wall`。你也可以直接点击 `Mask` 列底部的 `All`（全部）按钮。由于我们不使用其他位，即使它们被勾选也没有影响。


    球的某些夹具参数会影响球在桌面上的行为。我将 `Density`（密度）设置为 8.0，`Restitution`（恢复系数）设置为 0.3，`Friction`（摩擦力）设置为
    0.7。这些设置让球具有一点点弹性。你可以随意调整这些设置，并观察球的行为如何变化。


    #### 保存与发布


    最后，你应该保存当前的 PhysicsEditor `.pes` 文件。你可以稍后再次打开该 `.pes` 文件以继续编辑形状。你不应将 `.pes` 文件添加到你的
    Xcode 项目中；它仅供 PhysicsEditor 使用。


    要在 cocos2d 中使用这些形状，你需要使用 `Publish`（发布）按钮。这会创建一个 `.plist` 文件，PhysicsEditor 附带的
    `GB2ShapeCache` 类可以读取该文件。对于 PhysicsBox2D03 项目，我将形状发布为项目 `Resources` 文件夹中的 `pinball-shapes.plist`
    文件。将此文件添加到 Xcode 的 `Resources` 分组中。


    ### 编写弹球游戏程序


    现在，我们可以进入实现阶段，实际编写弹球游戏程序了。你将学习如何布局桌面，然后再处理球、发射器、缓冲器和挡板等交互元素。但在那之前，我想向你介绍基本的 `BodyNode`
    类，它负责将 cocos2d 精灵与 Box2D 刚体同步。


    **注意：** 请记住，弹球项目使用了用 C++ 编写的 Box2D。这要求我们为所有类实现文件使用 `.mm` 文件扩展名，而不是 `.m`，以便编译器正确切换到编译
    C++ 代码而非 C 代码。每当你创建一个新的 Objective-C 类时，都需要重命名实现文件，使其使用 `.mm` 文件扩展名。否则，你将看到大量看似由
    Box2D 源代码引起的编译错误。

    '
- fmt: "#### The `BodyNode` Class\n\nThe idea behind the `BodyNode` class is that\
    \ you want to use a self-contained object for all of your dynamic classes. So\
    \ far, we simply added the `CCSprite` to a body's `userData` field. But suppose\
    \ you want to actually interact with the class represented by that sprite—for\
    \ example, during one of the `ContactListener` methods. You couldn't, because\
    \ all you had access to was the `CCSprite` object. To solve this problem, I created\
    \ the class `BodyNode` in the `PhysicsBox2D03` project.\n\n`BodyNode` is derived\
    \ from `CCSprite` and contains a Box2D body as an instance variable. The reference\
    \ to the body allows for convenient access to it by any class that derives from\
    \ `BodyNode`. With all classes for the pinball game elements being derived from\
    \ the `BodyNode` class, you have a common class to work with, which you can then\
    \ further probe for its type. For example, you can use the `isKindOfClass` method\
    \ to determine at runtime from any `BodyNode*` pointer which class you are working\
    \ with. The `isKindOfClass` method is supported by all classes that derive from\
    \ `NSObject`.\n\nIn addition, the `BodyNode` class header file includes commonly\
    \ used headers such as `Box2d.h` and `Helper.h` (see [Listing 13–1](#Chapter13.html#list_13_1)).\n\
    \n**Listing 13–1.** *The BodyNode Header File*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n#import \"Helper.h\"\n#import \"Constants.h\"\n#import\
    \ \"PinballTable.h\"\n#import \"Box2D.h\"\n#import \"b2Body.h\"\n\n@interface\
    \ BodyNode : CCSprite\n{\n    b2Body* body;\n}\n\n@property (readonly, nonatomic)\
    \ b2Body* body;\n\n/**\n * Creates a new shape\n * @param shapeName: Name of the\
    \ shape and sprite\n * @param inWorld: Pointer to the world object to add the\
    \ sprite to\n * @return BodyNode object\n */\n-(id) initWithShape:(NSString*)shapeName\
    \ inWord:(b2World*)world;\n\n/**\n * Changes the body's shape\n * Removes the\
    \ fixtures of the body replacing them\n * with the new ones\n * @param shapeName\
    \ name of the shape to set\n */\n-(void) setBodyShape:(NSString*)shapeName;\n\n\
    @end\n```\n\nThe `BodyNode` provides a property for its instance variable `body`\
    \ so that it can be conveniently accessed. The initializer method `initWithShape`\
    \ is used to initialize both the body and the sprite by using the supplied shape\
    \ name. It assumes that both the name of the image and the name of the shape are\
    \ identical.\n\n**CAUTION:** By default TexturePacker will retain the file extension\
    \ of images so that your shape might be named \"plunger,\" but the sprite frame\
    \ name might be \"plunger.png.\" To fix that, you'll have to check the `Trim sprite\
    \ names` check box in the TexturePacker `Output` pane. The `pinball.tps` file\
    \ used in this chapter has this check box already set; it removes the `.png` extension\
    \ from the sprite frame names. That way, both the TexturePacker sprite frames\
    \ and PhysicsEditor shape names will be identical.\n\nFor the texture atlas, you\
    \ use TexturePacker and add the pinball folder as a smart folder reference, meaning\
    \ that TexturePacker will keep the texture atlas contents up to date with all\
    \ changes to the images in the pinball folder. Refer to [Chapter 6](#Chapter06.html#ch6)\
    \ for instructions on how to set up a smart folder reference.\n\nYou also need\
    \ to set an additional option we did not yet use: trim sprite names. This feature\
    \ removes the `.png` suffix from the sprite names. The advantage is that we can\
    \ use the same names for the physics shapes and the sprites. The only caveat is\
    \ that you'll have to refer to sprite frame names without the `.png` extension,\
    \ which admittedly out of habit is sometimes easy to forget.\n\n[Listing 13–2](#Chapter13.html#list_13_2)\
    \ shows the `BodyNode` class implementation file.\n\n**Listing 13–2.** *The BodyNode\
    \ Class Implementation*\n\n```\n#import \"BodyNode.h\"\n\n@implementation BodyNode\n\
    \n@synthesize body;\n\n-(id) initWithShape:(NSString*)shapeName inWord:(b2World*)world\n\
    {\n    NSAssert(world != NULL, @\"world is null!\");\n    NSAssert(shapeName !=\
    \ nil, @\"name is nil!\");\n\n    // init the sprite itself with the given shape\
    \ name\n    self = [super initWithSpriteFrameName:shapeName];\n    if(self)\n\
    \    {        \n        // create the body\n        b2BodyDef bodyDef;\n     \
    \   body = world->CreateBody(&bodyDef);\n        body->SetUserData(self);\n\n\
    \        // set the shape\n        [self setBodyShape:shapeName];\n    }\n   \
    \ return self;\n}\n\n-(void) setBodyShape:(NSString*)shapeName\n{\n    // remove\
    \ any existing fixtures from the body\n    b2Fixture*fixture;\n    while((fixture\
    \ = body->GetFixtureList()))\n    {\n        body->DestroyFixture(fixture);\n\
    \    }\n\n    // attach a new shape from the shape cache\n    if(shapeName)\n\
    \    {\n        GB2ShapeCache*shapeCache = [GB2ShapeCache sharedShapeCache];\n\
    \        [shapeCache addFixturesToBody:body forShapeName:shapeName];\n\n     \
    \   // Assign the shape's anchorPoint (the blue + in a circle in PhysicsEditor)\n\
    \        // as the BodyNode's anchorPoint. Otherwise image and shape would be\
    \ offset.\n        self.anchorPoint = [shapeCache anchorPointForShape:shapeName];\n\
    \    }\n}\n\n-(void) dealloc\n{\n    // remove the body from the world\n    body->GetWorld()->DestroyBody(body);\n\
    \n[super dealloc];\n}\n\n@end\n```\n\nThe `BodyNode` implementation initializes\
    \ the sprite with the `initWithSpriteFrameName` method. Then it calls the world's\
    \ `CreateBody` method and sets `self` as the user data pointer of the body, allowing\
    \ you to later access the `BodyNode` class in the Box2D collision callback methods.\n\
    \n**TIP:** The `CCNode` class also has a `userData` property, which you can use\
    \ in the same way as `b2Body`'s `userData` field.\n\nThe PhysicsEditor `GB2ShapeCache`\
    \ class is used to add the fixtures to the body using the provided `shapeName`.\
    \ The `PhysicsBox2D03` project already includes the necessary files. If you want\
    \ to make use of the `GB2ShapeCache` class in a new project, just remember to\
    \ add the `GB2ShapeCache.h` and `GB2ShapeCache.mm` files from the `PhysicEditor.dmg`\
    \ disk image folder `/Loaders/generic-box2d-plist` to your Xcode project.\n\n\
    The key point to take away here is actually that the `BodyNode` is a `CCSprite`\
    \ that manages the allocation, deallocation, and configuration of the Box2D body\
    \ for you. It also ensures that you'll be able to access the `BodyNode` class\
    \ and thus the cocos2d sprite wherever you normally have access only to the Box2D\
    \ body object. Thus, the `BodyNode` class becomes the glue that brings the physics\
    \ body together with the cocos2d sprite.\n\nIf a sprite derived from `BodyNode`\
    \ goes out of scope—for example, if you remove it as a child from its cocos2d\
    \ parent node—then `BodyNode` will take care of destroying the Box2D body for\
    \ you.\n\nIn addition, you are able to change the sprite's body shape by calling\
    \ `setBodyShape`. This removes any existing fixtures from the body and then adds\
    \ the fixtures associated with the given `shapeName` from the `GB2ShapeCache`.\
    \ This will change only the collision shape of the body and preserve the body's\
    \ current state of motion, like its velocity, position, and rotation. Keep in\
    \ mind that calling this method is time-consuming and should be done only as needed.\
    \ It's certainly not a good idea to change the body shape every frame.\n\nAll\
    \ classes inheriting from `BodyNode` now have to concern themselves only with\
    \ setting the correct shape name and any code that is unique to the class.\n\n\
    The `update` method in the `PinballTable` class has also been rewritten to account\
    \ for the body's user data change from a simple `CCSprite` class instance to a\
    \ `BodyNode` class instance, since the `body->GetUserData()` method will now return\
    \ a `BodyNode` object (see [Listing 13–3](#Chapter13.html#list_13_3)).\n\n**Listing\
    \ 13–3.** *The Modified Update Method of the PinballTable Class*\n\n```\n-(void)\
    \ update:(ccTime)delta\n{\n    int32 velocityIterations = 8;\n    int32 positionIterations\
    \ = 1;\n    world->Step(delta, velocityIterations, positionIterations);\n}\n```"
  raw: '#### The BodyNode Class


    The idea behind the `BodyNode` class is that you want to use a self-contained
    object for all of your dynamic classes. So far, we simply added the `CCSprite`
    to a body''s `userData` field. But suppose you want to actually interact with
    the class represented by that sprite—for example, during one of the `ContactListener`
    methods. You couldn''t, because all you had access to was the `CCSprite` object.
    To solve this problem, I created the class `BodyNode` in the PhysicsBox2D03 project.


    `BodyNode` is derived from `CCSprite` and contains a Box2D body as an instance
    variable. The reference to the body allows for convenient access to it by any
    class that derives from `BodyNode`. With all classes for the pinball game elements
    being derived from the `BodyNode` class, you have a common class to work with,
    which you can then further probe for its type. For example, you can use the `isKindOfClass`
    method to determine at runtime from any `BodyNode*` pointer which class you are
    working with. The `isKindOfClass` method is supported by all classes that derive
    from `NSObject`.


    In addition, the `BodyNode` class header file includes commonly used headers such
    as Box2d.h and Helper.h (see [Listing 13–1](#Chapter13.html#list_13_1)).


    **Listing 13–1.** *The BodyNode Header File*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`

    `#import "Helper.h"`

    `#import "Constants.h"`

    `#import "PinballTable.h"`

    `#import "Box2D.h"`

    `#import "b2Body.h"`


    `@interface BodyNode : CCSprite`

    `{`

    `    b2Body* body;`

    `}`


