    is a force that falls off by the square of the distance between two objects pulling
    on each other through gravity. So if you want a more realistic simulation of gravity
    in your game, simply replace the `applyForceTowardsFinger` code with that in [Listing
    13–11](#Chapter13.html#list_13_11).


    **Listing 13–11.** *Simulating Gravitational Pull*


