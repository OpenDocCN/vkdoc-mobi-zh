    剩下的事情就只是物理了。如果球落在球拍上，并且你触碰了正确一侧的屏幕，球拍就会向上加速，将球一同推起。根据球落在球拍的哪个位置，球会被或多或少地笔直向上弹射出去。


    ### 总结


    在本章中，你学会了如何使用 `PhysicsEditor` 工具来为弹球游戏中的刚体定义碰撞形状。仅通过放置一个球，我就向你展示了如何模拟向某一点的加速度，包括如何或多或少真实地模拟重力或磁力的效果。


    我希望本章能让你感受到物理是多么有趣，无论你在物理课上经历过什么。不过话说回来，你在物理课上并没有建造过弹球机——对吗？


    如果你希望超越这个示例——例如，使用更多的关节或对碰撞过程进行更多控制——我建议你参考`Box2D`手册，网址为 [`www.box2d.org/manual.html`](http://www.box2d.org/manual.html)。


    另一方面，如果你需要关于各个类和结构的更多信息，你应该查阅`Box2D` API 参考文档。它位于`Box2D`下载包的`Documentation`文件夹中，你可以从
    [`http://code.google.com/p/box2d`](http://code.google.com/p/box2d) 获取。由于`Box2D`
    API 参考文档没有在线版本，我决定将其托管在我自己的网站：[`www.learn-cocos2d.com/box2d-api-reference/API/index.html`](http://www.learn-cocos2d.com/box2d-api-reference/API/index.html)。


    要获取有关`Box2D`的帮助，你可以查阅官方`Box2D`论坛：[`www.box2d.org/forum/index.php`](http://www.box2d.org/forum/index.php)，以及`cocos2d`论坛的`Physics`板块：[`www.cocos2d-iphone.org/forum/forum/7`](http://www.cocos2d-iphone.org/forum/forum/7)。


    如果你对学习更多关于`PhysicsEditor`的知识感兴趣，我推荐`PhysicsEditor`博客（[`www.physicseditor.de/blog`](http://www.physicseditor.de/blog)），Andreas
    Löw 在博客中展示了一些很酷的用法以及`PhysicsEditor`的技巧和小贴士。如果你需要向 Andreas 寻求支持，可以直接发送邮件至 `support@code-and-web.de`。


    ## 第 14 章


    ## Game Center


    `Game Center` 是苹果公司的社交网络解决方案。它能够让你对玩家进行身份验证、存储他们的分数并显示排行榜，以及跟踪和显示他们的成就进度。此外，玩家可以邀请好友一起游戏，或选择快速匹配以与任何人进行游戏。


    在本章中，我不仅会向你介绍`Game Center`和`Game Kit` API，还会介绍在线多人编程的基础知识，当然，还有如何将`Game Center`与`cocos2d`结合使用。


    由于苹果公司的许多示例故意不完整，我将在本章中开发一个 `GameKitHelper` 类。这个类将为你消除 `Game Center` 编程中的一些复杂性。它会让使用
    `Game Kit` 和 `Game Center` 功能变得更加容易，并且允许你轻松地将相同的代码复用到其他游戏中。


    要为你的应用程序配置 `Game Center` 的使用，你需要使用 `iTunes Connect`。`iTunes Connect` 网站上的信息被视为苹果公司的机密信息，因此我无法在本书中讨论。不过，我会为你指出苹果公司关于每个步骤的优秀文档——并且坦率地说，在
    `iTunes Connect` 上设置排行榜和成就可能是 `Game Center` 中最简单的部分。


    ### 启用 Game Center


    `Game Center` 是管理和存储玩家账户以及每个玩家的好友列表、排行榜和成就的服务。这些信息在线存储在苹果公司的服务器上，可以通过你的游戏或所有运行
    iOS 4.1 或更高版本设备上安装的 `Game Center` 应用程序来访问。


    **注意：** `Game Center` 仅适用于运行 iOS 4.1 或更高版本的设备，并且不适用于第一代设备或 iPhone 3G。`Game Center`
    目前可在第二代、第三代和第四代 iPod touch；iPhone 3GS 和 iPhone 4；以及 iPad 上运行，前提是它们安装了 iOS 4.1
    或更高版本。用户检查设备是否支持 `Game Center` 的最简单方法是在设备上找到 `Game Center` 应用程序。如果它存在，则设备已为 `Game
    Center` 做好准备；否则则不支持。如果 `Game Center` 应用程序不可用，但设备有资格升级到 iOS 4.1，那么在通过 `iTunes`
    升级设备的操作系统后，`Game Center` 支持将变为可用。


    如果你没有支持 `Game Center` 的设备，你仍然可以使用 `iPhone/iPad Simulator` 来编程和测试 `Game Center`
    的功能。除了匹配之外，所有 `Game Center` 功能都可以在模拟器中测试。


    另一方面，`Game Kit` API 是你用来编程 `Game Center` 功能的工具。`Game Kit` 提供了对存储在 `Game Center`
    服务器上的数据进行编程访问的能力，并且能够显示内置的排行榜、成就和匹配界面。但 `Game Kit` 也提供除 `Game Center` 之外的功能——例如，通过
    `Bluetooth` 进行点对点网络连接和语音聊天。这是仅有的两个在运行 iOS 3.0 或更高版本的设备上已经可用的 `Game Kit` 功能。


    这个组合中的最后一个组成部分是 `iTunes Connect`。你可以通过 `iTunes Connect` 网站设置你的游戏的排行榜和成就。但最重要的是，它允许你首先为你的游戏启用
    `Game Center`。我将首先介绍这一步骤，因此你可以在甚至还没有为你的游戏创建 `Xcode` 项目之前就执行这一步。


    关于学习 `Game Center` 以及创建使用 `Game Center` 的游戏所涉及步骤的更多信息，你的起点是苹果公司的“Game Center 入门”网站：[`http://developer.apple.com/devcenter/ios/gamecenter`](http://developer.apple.com/devcenter/ios/gamecenter)。


    对于 `Game Center` 的高层概述，我建议阅读“Game Center 入门”文档：[`http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf`](http://developer.apple.com/ios/download.action?path=/ios/getting_started_with_ios_4.1/gettingstartedwithgamecenter.pdf)。

