  trans: "\n# Chipmunk 碰撞路线\n\nChipmunk 中的碰撞同样由 C 回调方法处理。在 `PhysicsChipmunk02` 项目中，我添加了\
    \ `contactBegin` 和 `contactEnd` 这两个静态方法（见代码清单 12-13），它们的作用与 Box2D 中的对应方法完全相同：将发生碰撞的方块颜色改为洋红色。\n\
    \n**代码清单 12-13.** *Chipmunk 风格的碰撞回调*\n\n```c\nstatic int contactBegin(cpArbiter*\
    \ arbiter, struct cpSpace* space, void* data)\n{\n    bool processCollision =\
    \ YES;\n    \n    cpShape* shapeA;\n    cpShape* shapeB;\n    cpArbiterGetShapes(arbiter,\
    \ &shapeA, &shapeB);\n    \n    CCSprite* spriteA = (CCSprite*)shapeA->data;\n\
    \    CCSprite* spriteB = (CCSprite*)shapeB->data;\n    if (spriteA != nil && spriteB\
    \ != nil)\n    {\n        spriteA.color = ccMAGENTA;\n        spriteB.color =\
    \ ccMAGENTA;\n    }\n    \n    return processCollision;\n}\n\nstatic void contactEnd(cpArbiter*\
    \ arbiter, cpSpace* space, void* data)\n{\n    cpShape* shapeA;\n    cpShape*\
    \ shapeB;\n    cpArbiterGetShapes(arbiter, &shapeA, &shapeB);\n    \n    CCSprite*\
    \ spriteA = (CCSprite*)shapeA->data;\n    CCSprite* spriteB = (CCSprite*)shapeB->data;\n\
    \    if (spriteA != nil && spriteB != nil)\n    {\n        spriteA.color = ccWHITE;\n\
    \        spriteB.color = ccWHITE;\n    }\n}\n```\n\n如果碰撞应被正常处理，`contactBegin`\
    \ 方法应返回 `YES`。通过从该方法返回 `NO` 或 `0`，你也可以忽略碰撞。要获取精灵，首先必须从 `cpArbiter` 中获取形状，它就像 `b2Contact`\
    \ 一样保存着碰撞信息。通过 `cpArbiterGetShapes` 方法，并将两个形状作为 `out` 参数传递，就能得到发生碰撞的形状，然后从中检索出各自的\
    \ `CCSprite` 指针。如果两者都有效，就可以改变它们的颜色。\n\n与 Box2D 一样，这些回调不会自动被调用。在 `HelloWorldSceneinit`\
    \ 方法中，在创建空间之后，必须立即使用 `cpSpaceAddCollisionHandler` 方法添加碰撞处理器：\n\n```c\nunsigned\
    \ int defaultCollisionType = 0;\ncpSpaceAddCollisionHandler(space, defaultCollisionType,\
    \ defaultCollisionType,\n    &contactBegin, NULL, NULL, &contactEnd, NULL);\n\
    ```\n\n形状的默认碰撞类型是 `0`，因为我不关心碰撞过滤，所以两个碰撞类型参数都设置为 `0`。你可以为每个物体的形状的 `collision_type`\
    \ 属性赋予一个整数值，然后添加碰撞处理器，使其仅在匹配碰撞类型的物体发生碰撞时被调用。这被称为*过滤碰撞*，在 Chipmunk 手册中有相关描述，参见\
    \ [`http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape`](http://files.slembcke.net/chipmunk/release/ChipmunkLatest-Docs/#cpShape)。\n\
    \n接下来的四个参数是指向 C 回调方法的指针，分别对应四个碰撞阶段：*开始*、*预求解*、*后求解*和*分离*（与 Box2D 中的 `EndContact`\
    \ 事件相同）。它们的作用与 Box2D 中相应的回调相同。大多数情况下，你只需要关注 `begin` 和 `separation` 事件。\n\n我为预求解和后求解传递了\
    \ `NULL`，因为我不关心处理这些阶段。你可以使用这些方法来影响碰撞，或者在后求解步骤中获取碰撞力。最后一个参数是一个任意数据指针，如果需要，你可以将其传递给回调方法。我不需要，所以也将其设置为\
    \ `NULL`。\n\n至此，你就拥有了一个可正常工作的碰撞回调机制。\n\n## Chipmunk 的关节\n\nChipmunk 示例项目也需要自己的\
    \ `addSomeJoinedBodies` 实现。其设置比 Box2D 更繁琐，如代码清单 12-14 所示。你会认出大部分代码是在设置静态和动态物体——如果你觉得代码很熟悉，可以直接跳到创建关节的结尾部分。\n\
    \n**代码清单 12-14.** *创建三个由关节连接的物体*\n\n```objc\n-(void) addSomeJoinedBodies:(CGPoint)pos\n\
    {\n    float mass = 1.0f;\n    float moment = cpMomentForBox(mass, TILESIZE, TILESIZE);\n\
    \    \n    float halfTileSize = TILESIZE * 0.5f;\n    int numVertices = 4;\n \
    \   CGPoint vertices[] =\n    {\n        CGPointMake(-halfTileSize, -halfTileSize),\n\
    \        CGPointMake(-halfTileSize, halfTileSize),\n        CGPointMake(halfTileSize,\
    \ halfTileSize),\n        CGPointMake(halfTileSize, -halfTileSize),\n    };\n\
    \    \n    // 创建一个静态物体\n    cpBody* staticBody = cpBodyNew(INFINITY, INFINITY);\n\
    \    staticBody->p = pos;\n    \n    CGPoint offset = CGPointZero;\n    cpShape*\
    \ shape = cpPolyShapeNew(staticBody, numVertices, vertices, offset);\n    cpSpaceAddStaticShape(space,\
    \ shape);\n    \n    // 创建三个新的动态物体\n    float posOffset = 1.4f;\n    pos.x +=\
    \ TILESIZE * posOffset;\n    cpBody* bodyA = cpBodyNew(mass, moment);\n    bodyA->p\
    \ = pos;\n    cpSpaceAddBody(space, bodyA);\n    \n    shape = cpPolyShapeNew(bodyA,\
    \ numVertices, vertices, offset);\n    shape->data = [self addRandomSpriteAt:pos];\n\
    \    cpSpaceAddShape(space, shape);\n    \n    pos.x += TILESIZE * posOffset;\n\
    \    cpBody* bodyB = cpBodyNew(mass, moment);\n    bodyB->p = pos;\n    cpSpaceAddBody(space,\
    \ bodyB);\n    \n    shape = cpPolyShapeNew(bodyB, numVertices, vertices, offset);\n\
    \    shape->data = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space, shape);\n\
    \    \n    pos.x += TILESIZE * posOffset;\n    cpBody* bodyC = cpBodyNew(mass,\
    \ moment);\n    bodyC->p = pos;\n    cpSpaceAddBody(space, bodyC);\n    \n   \
    \ shape = cpPolyShapeNew(bodyC, numVertices, vertices, offset);\n    shape->data\
    \ = [self addRandomSpriteAt:pos];\n    cpSpaceAddShape(space, shape);\n    \n\
    \    // 创建关节并向空间添加约束\n    cpConstraint* constraint1 = cpPivotJointNew(staticBody,\
    \ bodyA, staticBody->p);\n    cpConstraint* constraint2 = cpPivotJointNew(bodyA,\
    \ bodyB, bodyA->p);\n    cpConstraint* constraint3 = cpPivotJointNew(bodyB, bodyC,\
    \ bodyB->p);\n    \n    cpSpaceAddConstraint(space, constraint1);\n    cpSpaceAddConstraint(space,\
    \ constraint2);\n    cpSpaceAddConstraint(space, constraint3);\n}\n```\n\n在这个例子中，我使用\
    \ `cpPivotJointNew` 创建了一个枢轴关节，它与 Box2D 示例中使用的 `b2RevoluteJoint` 相同。每个关节的创建需要指定两个应相互连接的物体，并将其中一个物体的中心位置作为锚点。`cpPivotJointNew`\
    \ 方法返回一个 `cpConstraint` 指针，你需要使用 `cpSpaceAddConstraint` 方法将其添加到空间中。\n\n## 总结\n\
    \n在本章中，你学习了 cocos2d 附带的两个物理引擎的基本知识：Box2D 和 Chipmunk。现在你已经掌握了这两个物理引擎的工作示例，这应该能帮助你决定使用哪一个。\n\
    \n你学习了如何设置一个屏幕区域，该区域包含了从瓦片地图创建的所有小方块，作为动态物体。现在你也了解了检测碰撞的基础知识，以及如何在两个物理引擎中创建关节来连接物体。\n\
    \n在下一章中，你将制作一个使用 Box2D 物理引擎的游戏。\n\n## 第 13 章\n"
- fmt: '# Pinball Game


    I''d like to put the Box2D physics engine to good use, so in this chapter you''ll
    be making an actual pinball game. Pinball tables are all about using our physical
    world and turning that into a fun experience. With a physics engine, however,
    you''re not just limited to real-world physics.


    Some elements of the pinball table, such as bumpers and balls, can be created
    by simply choosing the right balance of friction, restitution, and density. Others
    need joints to work—a `revolute` joint for the flippers and a `prismatic` joint
    for the plunger. And of course, you''ll need lots of static shapes that define
    the collision polygons of the table.


    Since it would be impractical to define collision polygons in source code, at
    least for the level of detail necessary to build a believable pinball table, I''ll
    introduce another useful tool: PhysicsEditor. With that, you can create collision
    polygons by simply drawing the vertices or, even faster, let PhysicsEditor trace
    the shape''s outlines with a single mouse click.


    At the end of this chapter, you''ll have a fully playable pinball game, as depicted
    in [Figure 13–1](#Chapter13.html#fig_13_1).


    ![images](images/1301.jpg)


    **Figure 13–1.** *The pinball table built in this chapter*


    ## Shapes: Convex and Counterclockwise


    Let''s start with the requirements of collision polygons. The first thing you
    need to be aware of when defining collision polygons for Box2D and Chipmunk is
    that these engines expect the collision polygons to have the following properties:


    * Vertices defined in a counterclockwise fashion

    * Polygons as convex shapes


    A *convex* shape is a shape where you can draw a straight line between any two
    points without the line ever leaving the shape. This is opposed to *concave* shapes,
    where a straight line between two points can be drawn such that the line is not
    entirely contained within the shape. See [Figure 13–2](#Chapter13.html#fig_13_2)
    for an illustration of the difference between convex and concave shapes.


    ![images](images/1302.jpg)


    **Figure 13–2.** *Convex and concave shapes*


    Defining the vertices of a convex shape in a counterclockwise fashion can be illustrated
    by drawing a convex shape in your mind. You place one vertex anywhere and then
    go left to place another. Then go down and to the right, and you will have drawn
    a rectangle in a counterclockwise fashion. Or place another vertex and then go
    right, up, and then left, and you will have drawn a counterclockwise shape. It
    doesn''t matter where you start with the first vertex, but it''s very important
    to follow the counterclockwise orientation of vertices.


    Fortunately, if you''re working with PhysicsEditor, you don''t have to care about
    polygon vertex order (orientation) or whether the polygon is convex or concave.
    PhysicsEditor automatically takes care of that for you transparently. PhysicsEditor
    will split concave shapes into one or more convex shapes. The physic objects loader
    shipped with PhysicsEditor then assigns all the shapes to a single Box2D body.
    It''s still good practice to try to avoid shapes to be split in order to have
    as few collision shapes per body as possible to get the best performance.


    **TIP:** How do you know if you made a mistake and accidentally created a clockwise-oriented
    or concave collision shape? Well, every physics engine reacts differently. Some
    will tell you up front by throwing an error. But in the case of Box2D, if a moving
    body hits a collision shape that is not well formed, the moving body will simply
    stop moving when it gets close to that shape. If you ever see that effect happening
    in your Box2D game, check the nearby collision polygons.


    ## Working with PhysicsEditor


    Armed with the knowledge about properly defining collision polygons, it''s time
    to check out the PhysicsEditor tool, which you can download from [`www.physicseditor.de`](http://www.physicseditor.de).
    After opening the downloaded PhysicsEditor disk image and dragging `PhysicsEditor.app`
    to your application''s folder, you are ready to run PhysicsEditor (see [Figure
    13–3](#Chapter13.html#fig_13_3)). In the PhysicsEditor disk image, you will also
    find a folder named `Loaders`, which contains the loader code (shape cache) for
    Box2D and Chipmunk plist files created by PhysicsEditor. You will be using the
    `GB2ShapeCache` class in the example projects of this chapter in order to load
    the shapes created by PhysicsEditor.


    ![images](images/1303.jpg)


    **Figure 13–3.** *The PhysicsEditor application*


    You should now drag and drop the PNG files located in the `PhysicsBox2D03` project''s
    `Assets/pinball` folder onto the leftmost pane in PhysicsEditor, which is labeled
    `Shapes`.


    **NOTE:** You will be using only the HD resolution images to create physic shapes.
    It is not necessary to create separate HD and SD resolution physics shapes. The
    physics simulation world is independent from the graphical representation of the
    objects and thus independent of the screen resolution.


    The first thing you should modify in PhysicsEditor are the settings for the exporter.
    PhysicsEditor can export to several game engines, supports both Box2D and Chipmunk
    physics engines, and even allows you to create your own custom export format.
    To write files compatible with `cocos2d`, you must set the `Exporter` setting
    on the rightmost pane to `Box2D generic (PLIST)`. It is important to set the exporter
    first since it enables or disables some features of the PhysicsEditor GUI depending
    on the targeted physics engine''s capabilities.


    Next you should set the `PTM-Ratio` setting to 240. This value''s unit is in pixels
    per meter, meaning 240 pixels will equal 1 meter in the Box2D physics simulation
    world. The dimensions of the Box2D physics world matters because Box2D is optimized
    to work best with objects of 1 to 10 meters in size. You can easily run a simulation
    with larger or smaller objects. However, Box2D loses precision and can show odd
    behavior when you have very large (tens or even hundreds of meters) or very small
    objects (small or tiny fractions of a meter).


    Since we are using high-resolution images in PhysicsEditor, the `PTM-Ratio` of
    240 will create a pinball table that is 4 meters high (960 Retina resolution pixels
    divided by 240) and 2.6 meters wide (640 Retina resolution pixels divided by 240).
    The actual pixels to meter ratio in `cocos2d` will be half the `PTM-Ratio` setting
    of PhysicsEditor, in this case 120 pixels per meter. This is because the `cocos2d`
    coordinate system is in points, which means both the standard-resolution display
    and Retina displays have the same dimension: 320x480 points. A point equals 1
    pixel on standard displays and 2 pixels on Retina displays. The size of the table
    in the Box2D physics world is unaffected by the actual screen resolution. If you
    work only with standard resolution images and have Retina support disabled in
    your app, the `PTM-Ratio` setting in PhysicsEditor will equal that in `Cocos2D`.'
  raw: '## Pinball Game


    I''d like to put the Box2D physics engine to good use, so in this chapter you''ll
    be making an actual pinball game. Pinball tables are all about using our physical
    world and turning that into a fun experience. With a physics engine, however,
    you''re not just limited to real-world physics.


    Some elements of the pinball table, such as bumpers and balls, can be created
    by simply choosing the right balance of friction, restitution, and density. Others
    need joints to work—a revolute joint for the flippers and a prismatic joint for
    the plunger. And of course, you''ll need lots of static shapes that define the
    collision polygons of the table.


    Since it would be impractical to define collision polygons in source code, at
    least for the level of detail necessary to build a believable pinball table, I''ll
    introduce another useful tool: PhysicsEditor. With that, you can create collision
    polygons by simply drawing the vertices or, even faster, let PhysicsEditor trace
    the shape''s outlines with a single mouse click.


    At the end of this chapter, you''ll have a fully playable pinball game, as depicted
    in [Figure 13–1](#Chapter13.html#fig_13_1).


    ![images](images/1301.jpg)


