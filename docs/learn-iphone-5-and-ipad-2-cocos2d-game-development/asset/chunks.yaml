  trans: "\n### 节点操作\n\n`CCNode` 类实现了添加、获取和移除子节点的所有方法。以下是一些操作子节点的方式：\n- 你可以创建一个新节点：`CCNode*\
    \ childNode = [CCNode node];`\n- 你可以将新节点添加为子节点：`[myNode addChild:childNode z:0\
    \ tag:123];`\n- 你可以检索子节点：`CCNode* retrievedNode = [myNode getChildByTag:123];`\n\
    - 你可以通过标签移除子节点；`cleanup` 参数会同时停止所有正在运行的动作：`[myNode removeChildByTag:123 cleanup:YES];`\n\
    - 如果你持有节点指针，可以直接移除该节点：`[myNode removeChild:retrievedNode];`\n- 你可以移除节点的所有子节点：`[myNode\
    \ removeAllChildrenWithCleanup:YES];`\n- 你可以将 `myNode` 从其父节点中移除：`[myNode removeFromParentAndCleanup:YES];`\n\
    \n`addChild` 中的 `z` 参数决定了节点的绘制顺序。`z` 值最低的节点最先绘制，`z` 值最高的节点最后绘制。如果多个节点具有相同的 `z`\
    \ 值，则按添加顺序依次绘制。当然，这一条仅适用于拥有视觉表现的节点，例如精灵。\n\n`tag` 参数让你能够在后续通过 `getChildByTag`\
    \ 方法识别和获取特定节点。\n\n**注意：** 如果多个节点最终使用了相同的标签编号，`getChildByTag` 将返回第一个具有该标签编号的节点，其余节点将无法访问。请确保为你的节点使用唯一的标签编号。\n\
    \n请注意，动作也可以拥有标签。不过，节点标签和动作标签不会冲突，因此一个动作和一个节点可以使用相同的标签编号而不会产生任何问题。\n\n### 动作操作\n\
    \n节点同样可以运行动作。稍后我会更详细地介绍动作。现在，只需了解动作可以让节点移动、旋转、缩放，并随时间执行其他操作。\n- 以下是动作的声明方式：`CCAction*\
    \ action = [CCBlink actionWithDuration:10 blinks:20];` `action.tag = 234;`\n-\
    \ 运行动作使节点闪烁：`[myNode runAction:action];`\n- 如果你稍后需要访问该动作，可以通过其标签获取：`CCAction*\
    \ retrievedAction = [myNode getActionByTag:234];`\n- 你可以通过标签停止动作：`[myNode stopActionByTag:234];`\n\
    - 或者通过指针停止动作：`[myNode stopAction:action];`\n- 或者停止该节点上运行的所有动作：`[myNode stopAllActions];`\n\
    \n### 定时消息\n\n节点可以定时消息，这是 Objective-C 中调用方法的术语。在很多情况下，你可能希望某个特定的更新方法在节点上运行以进行某些处理，例如碰撞检测。让特定的更新方法每帧都被调用的最简单方式如下：\n\
    ```\n-(void) scheduleUpdateMethod\n{\n    [self scheduleUpdate];\n}\n\n-(void)\
    \ update:(ccTime)delta\n{\n    // 此方法每帧都会被调用\n}\n```\n\n非常简单，不是吗？注意，update 方法具有固定的签名，这意味着它总是以这种方式定义。`delta`\
    \ 参数是自上次调用该方法以来经过的时间。这是安排每帧更新时的首选方式，但也有一些理由让你使用其他更灵活的更新方法。\n\n如果你希望运行不同的方法，或者不希望方法每帧都被调用，而是每十分之一秒调用一次，那么应使用此方法：\n\
    ```\n-(void) scheduleUpdateMethod\n{\n    [self schedule:@selector(updateTenTimesPerSecond:)\
    \ interval:0.1f];\n}\n\n-(void) updateTenTimesPerSecond:(ccTime)delta\n{\n   \
    \ // 此方法根据其间隔被调用，每秒十次\n}\n```\n\n请注意，如果 `interval` 为 0，则应改用 `scheduleUpdate` 方法。然而，如果你日后需要取消调度某个特定的选择器，前面的代码是首选。`scheduleUpdate`\
    \ 方法不允许你这样做。\n\n`update` 方法的签名仍然相同；它接收一个增量时间作为其唯一参数。但这次它可以按你的意愿任意命名，并且仅每十分之一秒被调用一次。这在检查胜负条件时可能很有用，特别是当条件非常复杂以至于你不想每帧都运行时。或者，如果你希望某事在\
    \ 10 分钟后发生，你可以调度一个间隔为 600 的选择器。\n\n**注意：** `@selector(…)` 的语法可能看起来有些奇怪。这是 Objective-C\
    \ 中通过名称引用特定方法的方式。这里关键的一点是不要忽略末尾的冒号。它告诉 Objective-C 查找具有给定名称且恰好有一个参数的方法。如果你忘记在末尾添加冒号，程序仍然可以编译，但随后会崩溃。在调试器控制台中，错误日志将显示“向实例发送了无法识别的选择器...”。\n\
    \n`@selector(…)` 中冒号的数量必须始终与方法参数的数量和名称相匹配。对于以下方法：\n```\n-(void) example:(ccTime)delta\
    \ sender:(id)sender flag:(bool)aBool\n```\n对应的 `@selector` 应如下所示：\n```\n@selector(example:sender:flag:)\n\
    ```\n\n调度自己的选择器，或普遍使用 `@selector(…)` 关键字时，存在一个主要的陷阱。默认情况下，如果方法的名称不存在，编译器根本不会报错。相反，当该选择器被调用时，你的应用会直接崩溃。由于调用是由\
    \ cocos2d 内部完成的，你将很难找出问题的原因。幸运的是，你可以启用一个编译器警告。图 3–6 显示了在 NodeHierarchy 项目中启用了“未声明的选择器”警告，本章的\
    \ EssentialsXcode 项目也已启用该警告。\n\n![images](img/0306.jpg)\n\n**图 3–6.** *激活构建设置以警告未声明的选择器*\n\
    \n剩下的就是展示如何停止这些已调度的方法的调用。你可以通过取消调度来实现。\n- 你可以停止节点的所有选择器，甚至包括那些通过 `scheduleUpdate`\
    \ 调度的：`[self unscheduleAllSelectors];`\n- 你可以停止特定的选择器，在本例中为 `updateTenTimesPerSecond`\
    \ 方法：`[self unschedule:@selector(updateTenTimesPerSecond:)];`\n\n注意，这不会停止由 `scheduleUpdate`\
    \ 调度的 `update` 方法。\n"
- fmt: "`There’s also a useful trick for scheduling and unscheduling selectors. Quite\
    \ often you’ll find that in the scheduled method you want a particular method\
    \ to no longer be called, without having to replicate the exact name and number\
    \ of parameters, because they can change. Here’s how you’d run a scheduled selector\
    \ and stop it on the first call:\n\n```\n-(void) scheduleUpdates\n{\n    [self\
    \ schedule:@selector(tenMinutesElapsed:) interval:600];\n}\n\n-(void) tenMinutesElapsed:(ccTime)delta\n\
    {\n    // unschedule the current method by using the _cmd keyword\n    [self unschedule:_cmd];\n\
    }\n```\n\nThe hidden variable `_cmd` is available in all Objective-C methods.\
    \ It is the selector of the current method. In the previous example, `_cmd` is\
    \ equivalent to writing `@selector(tenMinutesElapsed:)`. Unscheduling `_cmd` effectively\
    \ stops the `tenMinutesElapsed` method from ever being called again. You can also\
    \ use `_cmd` for scheduling the selector in the first place, if you want the current\
    \ method to be scheduled. Let’s assume you need a method called at varying intervals\
    \ and this interval is changed each time the method is called. In this case, your\
    \ code can make use of `_cmd` like this:\n\n```\n-(void) scheduleUpdates\n{\n\
    \    // schedule the first update as usual\n    [self schedule:@selector(irregularUpdate:)\
    \ interval:1];\n}\n\n-(void) irregularUpdate:(ccTime)delta\n{\n    // unschedule\
    \ the method first\n    [self unschedule:_cmd];\n\n    // I assume you’d have\
    \ some kind of logic other than random to determine\n    // the next time the\
    \ method should be called\n    float nextUpdate = CCRANDOM_0_1() * 10;\n\n   \
    \ // then re-schedule it with the new interval using _cmd as the selector\n  \
    \  [self schedule:_cmd interval:nextUpdate];\n}\n```\n\nUsing the `_cmd` keyword\
    \ will save you a lot of pain in the long run because it avoids the dreaded issue\
    \ of scheduling or unscheduling the wrong selector, and it decouples the code\
    \ from having to know the name of the method it is used in.\n\nThere’s one final\
    \ scheduling issue to mention, and that’s prioritizing updates. Take a look at\
    \ the following code:\n\n```\n// in Node A\n-(void) scheduleUpdates\n{\n    [self\
    \ scheduleUpdate];\n}\n\n// in Node B\n-(void) scheduleUpdates\n{\n    [self scheduleUpdateWithPriority:1];\n\
    }\n\n// in Node C\n-(void) scheduleUpdates\n{\n    [self scheduleUpdateWithPriority:-1];\n\
    }\n```\n\nThis may take a moment to sink in. All nodes are still calling the same\
    \ `–(void) update:(ccTime)delta` method for themselves. However, scheduling the\
    \ update methods with a priority causes the one in Node C to be run first. Then\
    \ the one in Node A is called because, by default, `scheduleUpdate` uses a priority\
    \ of 0. Node B’s update method is called last because it has the highest number.\
    \ The update methods are called in the order from lowest-priority number to highest.\n\
    \nYou might wonder where that’s useful. To be honest, they’re rarely needed, but\
    \ in those cases it’s quite useful to be able to prioritize updates, such as when\
    \ applying forces to physics objects before or after the physics simulation itself\
    \ is updated or ensuring that the game-over condition is checked only after all\
    \ game objects have run their `update` methods. And sometimes, usually late in\
    \ the project, you may discover an odd bug that turns out to be a timing issue,\
    \ and it forces you to run the player’s update method after all other objects\
    \ have updated themselves.\n\nUntil you need to solve a particular problem by\
    \ using prioritized updates, you can safely ignore them. Also, keep in mind that\
    \ each prioritized update method call adds a little overhead because the methods\
    \ need to be called in a specific order.\n\n## Director, Scenes, and Layers\n\n\
    Like `CCNode`, the `CCScene` and `CCLayer` classes have no visual representation\
    \ and are used internally as abstract concepts for the starting point of the scene\
    \ graph, which is always a `CCScene`-derived object. The `CCScene` class is the\
    \ container for all other nodes of the scene. And `CCLayer` is typically used\
    \ to group nodes together, particularly to maintain the correct drawing order\
    \ among multiple layers. But also to receive touch and accelerometer input on\
    \ iOS, respectively, mouse and keyboard input on Mac OS X.\n\nI’ll start this\
    \ section with the `CCDirector` class, however, because it is the class that,\
    \ among other things, allows you to run and replace scenes."
  raw: 'There’s also a useful trick for scheduling and unscheduling selectors. Quite
    often you’ll find that in the scheduled method you want a particular method to
    no longer be called, without having to replicate the exact name and number of
    parameters, because they can change. Here’s how you’d run a scheduled selector
    and stop it on the first call:


    `-(void) scheduleUpdates`

    `{`

    `    [self schedule:@selector(tenMinutesElapsed:) interval:600];`

    `}`


    `-(void) tenMinutesElapsed:(ccTime)delta`

    `{`

    `    // unschedule the current method by using the _cmd keyword`

    `    [self unschedule:_cmd];`

    `}`


    The hidden variable `_cmd` is available in all Objective-C methods. It is the
    selector of the current method. In the previous example, `_cmd` is equivalent
    to writing `@selector(tenMinutesElapsed:)`. Unscheduling `_cmd` effectively stops
    the `tenMinutesElapsed` method from ever being called again. You can also use
    `_cmd` for scheduling the selector in the first place, if you want the current
    method to be scheduled. Let’s assume you need a method called at varying intervals
    and this interval is changed each time the method is called. In this case, your
    code can make use of `_cmd` like this:


    `-(void) scheduleUpdates`

    `{`

    `    // schedule the first update as usual`

    `    [self schedule:@selector(irregularUpdate:) interval:1];`

    `}`


    `-(void) irregularUpdate:(ccTime)delta`

    `{`

    `    // unschedule the method first`

    `    [self unschedule:_cmd];`


    `    // I assume you’d have some kind of logic other than random to determine`

    `    // the next time the method should be called`

    `    float nextUpdate = CCRANDOM_0_1() * 10;`


    `    // then re-schedule it with the new interval using _cmd as the selector`

    `    [self schedule:_cmd interval:nextUpdate];`

    `}`


    Using the `_cmd` keyword will save you a lot of pain in the long run because it
    avoids the dreaded issue of scheduling or unscheduling the wrong selector, and
    it decouples the code from having to know the name of the method it is used in.


    There’s one final scheduling issue to mention, and that’s prioritizing updates.
    Take a look at the following code:


    `// in Node A`

    `-(void) scheduleUpdates`

    `{`

    `    [self scheduleUpdate];`

    `}`


    `// in Node B`

    `-(void) scheduleUpdates`

    `{`

    `    [self scheduleUpdateWithPriority:1];`

    `}`


    `// in Node C`

    `-(void) scheduleUpdates`

    `{`

    `    [self scheduleUpdateWithPriority:-1];`

    `}`


    This may take a moment to sink in. All nodes are still calling the same `–(void)
    update:(ccTime)delta` method for themselves. However, scheduling the update methods
    with a priority causes the one in Node C to be run first. Then the one in Node
    A is called because, by default, `scheduleUpdate` uses a priority of 0\. Node
    B’s update method is called last because it has the highest number. The update
    methods are called in the order from lowest-priority number to highest.


    You might wonder where that’s useful. To be honest, they’re rarely needed, but
    in those cases it’s quite useful to be able to prioritize updates, such as when
    applying forces to physics objects before or after the physics simulation itself
    is updated or ensuring that the game-over condition is checked only after all
    game objects have run their `update` methods. And sometimes, usually late in the
    project, you may discover an odd bug that turns out to be a timing issue, and
    it forces you to run the player’s update method after all other objects have updated
    themselves.


    Until you need to solve a particular problem by using prioritized updates, you
    can safely ignore them. Also, keep in mind that each prioritized update method
    call adds a little overhead because the methods need to be called in a specific
    order.


    ### Director, Scenes, and Layers


    Like `CCNode`, the `CCScene` and `CCLayer` classes have no visual representation
    and are used internally as abstract concepts for the starting point of the scene
    graph, which is always a `CCScene`-derived object. The `CCScene` class is the
    container for all other nodes of the scene. And `CCLayer` is typically used to
    group nodes together, particularly to maintain the correct drawing order among
    multiple layers. But also to receive touch and accelerometer input on iOS, respectively,
    mouse and keyboard input on Mac OS X.


    I’ll start this section with the `CCDirector` class, however, because it is the
    class that, among other things, allows you to run and replace scenes.'
  trans: "\n`在调度和取消调度选择器时，有一个实用的小技巧。你经常会发现，在已调度的某个方法中，你希望某个特定方法不再被调用，但又不想重复写出该方法确切的名字和参数数量，因为这些内容可能发生变化。以下展示如何运行一个已调度的选择器，并在首次调用时停止它：\n\
    \n```\n-(void) scheduleUpdates\n{\n    [self schedule:@selector(tenMinutesElapsed:)\
    \ interval:600];\n}\n\n-(void) tenMinutesElapsed:(ccTime)delta\n{\n    // 通过使用\
    \ _cmd 关键字来取消当前方法的调度\n    [self unschedule:_cmd];\n}\n```\n\n所有 Objective-C 方法中都存在隐藏变量\
    \ `_cmd`，它代表当前方法的选择器。在上一个示例中，`_cmd` 等同于书写 `@selector(tenMinutesElapsed:)`。取消调度\
    \ `_cmd` 能有效阻止 `tenMinutesElapsed` 方法被再次调用。如果你希望当前方法被调度，也可以先用 `_cmd` 来调度该选择器。假设你需要一个以不同间隔调用的方法，且每次调用后间隔都会改变。这种情况下，你的代码可以像这样利用\
    \ `_cmd`：\n\n```\n-(void) scheduleUpdates\n{\n    // 像往常一样调度第一次更新\n    [self schedule:@selector(irregularUpdate:)\
    \ interval:1];\n}\n\n-(void) irregularUpdate:(ccTime)delta\n{\n    // 首先取消当前方法的调度\n\
    \    [self unschedule:_cmd];\n\n    // 假设你会用某种逻辑（而非随机）来确定方法下次被调用的时间\n    float\
    \ nextUpdate = CCRANDOM_0_1() * 10;\n\n    // 然后使用 _cmd 作为选择器，以新的间隔重新调度它\n   \
    \ [self schedule:_cmd interval:nextUpdate];\n}\n```\n\n从长远来看，使用 `_cmd` 关键字能省去很多麻烦，因为它避免了调度或取消调度错误选择器这一棘手问题，并且将代码与它所处方法的名称解耦。\n\
    \n最后还有一个关于调度的问题需要提及，那就是更新操作的优先级。请看以下代码：\n\n```\n// 在节点 A 中\n-(void) scheduleUpdates\n\
    {\n    [self scheduleUpdate];\n}\n\n// 在节点 B 中\n-(void) scheduleUpdates\n{\n \
    \   [self scheduleUpdateWithPriority:1];\n}\n\n// 在节点 C 中\n-(void) scheduleUpdates\n\
    {\n    [self scheduleUpdateWithPriority:-1];\n}\n```\n\n这可能需要一点时间才能理解。所有节点仍然都在调用各自的\
    \ `–(void) update:(ccTime)delta` 方法。然而，通过优先级来调度更新方法，会导致节点 C 中的方法最先运行。接着调用节点 A\
    \ 中的方法，因为默认情况下 `scheduleUpdate` 使用的优先级是 0。节点 B 的更新方法最后被调用，因为它的优先级数字最高。更新方法按照优先级从低到高的顺序依次被调用。\n\
    \n你可能会想这有什么用。老实说，这些优先级很少用到，但在某些情况下，能够对更新操作进行优先级排序非常有用。例如，在物理模拟本身更新之前或之后对物理对象施加力，或者确保只有在所有游戏对象都执行完它们的\
    \ `update` 方法后才检查游戏结束条件。有时，尤其是在项目后期，你可能会发现一个奇怪的 Bug，而它本质上是一个时序问题，这会迫使你在所有其他对象完成自身更新后，再运行玩家的更新方法。\n\
    \n在你需要通过使用优先级更新来解决特定问题之前，可以安全地忽略它们。此外，请记住，每次调用优先级更新的方法都会增加一点开销，因为这些方法需要按特定顺序调用。\n\
    \n## 导演、场景与层\n\n与 `CCNode` 类似，`CCScene` 和 `CCLayer` 类也没有可视化表现，它们内部被用作场景图起始点的抽象概念，而场景图的起始点总是一个继承自\
    \ `CCScene` 的对象。`CCScene` 类是场景中所有其他节点的容器。而 `CCLayer` 通常用于将节点分组，特别是为了在多个层之间维持正确的绘制顺序。同时，在\
    \ iOS 上它用于接收触摸和加速度计输入，在 Mac OS X 上则分别用于接收鼠标和键盘输入。\n\n不过，我将从 `CCDirector` 类开始本节内容，因为它是一个能够让你运行和替换场景的类。\n"
- fmt: "### The Director\n\n`CCDirector`类（或简称为Director）是cocos2d游戏引擎的核心。如果你还记得[第2章](#Chapter02.html#ch2)中的HelloWorld应用，你会记得许多cocos2d初始化过程都涉及对`[CCDirector\
    \ sharedDirector]`的调用。\n\n`CCDirector`类是一个单例，这意味着在任何时候只能有一个`CCDirector`类的实例，并且可以通过调用类方法`sharedDirector`进行全局访问。目前，这就是你需要了解关于单例的全部内容。本章后面“关于cocos2d中单例的说明”部分将解释什么是单例以及cocos2d提供了哪些其他单例类。\n\
    \n`CCDirector`类存储cocos2d的全局配置设置，并管理cocos2d场景。`CCDirector`类的主要职责包括：\n\n- 提供对当前运行场景的访问\n\
    - 运行、替换、压栈和弹出场景\n- 提供对cocos2d配置细节的访问\n- 提供对cocos2d的OpenGL视图和窗口的访问\n- 暂停、恢复和结束游戏\n\
    - 转换UIKit和OpenGL坐标\n- 决定游戏状态的更新方式\n\n你可以从四种不同的Director类型中选择，这会影响Director更新游戏状态的方式。这反过来会对渲染性能以及与UIKit视图的兼容性产生重大影响。你通常会在应用委托类中找到设置Director类型的如下行：\n\
    \n```\n// Try CADisplayLink director first.\n// If CADisplayLink is not available\
    \ (iOS < 3.1) fall back to NSTimer director.\nif ( ! [CCDirector setDirectorType:kCCDirectorTypeDisplayLink]\
    \ )\n    [CCDirector setDirectorType:kCCDirectorTypeDefault];\n```\n\n你可以设置四种Director类型：\n\
    \n- `kCCDirectorTypeDisplayLink`（最快；需要iOS 3.1或更高版本）\n- `kCCDirectorTypeNSTimer`（最慢）\n\
    - `kCCDirectorTypeThreadMainLoop`（快速，但与UIKit视图存在兼容性问题）\n- `kCCDirectorTypeMainLoop`（快速，但与UIKit视图存在兼容性问题）\n\
    \n最常用且推荐的Director类型是`kCCDirectorTypeDisplayLink`，它在内部使用Apple的`CADisplayLink`类。这是首选和默认的选择，并且仅在iOS\
    \ 3.1或更高版本上可用。`CADisplayLink`类确保屏幕更新与屏幕刷新同步，从而实现非常流畅的滚动。它还能与UIKit视图良好协作。\n\n**提示：**\
    \ 由于所有设备都可以升级到iOS 3.1.3，并且iOS 3.1已于2009年9月发布，因此可以安全地假设只有极少数的设备没有运行至少iOS 3.1。应用开发者和分析公司发布的各种设备统计数据支持了这一观点，甚至显示截至2011年4月，iOS\
    \ 4在iPhone设备上的采用率已超过90%。为了确保`CADisplayLink`类在运行你应用的任何设备上都可用，你应该将项目的iOS部署目标设置为iOS\
    \ 3.1，而不是iOS 3.0（Xcode当前允许你选择的最低部署目标）。\n\n默认的备用选项是`kCCDirectorTypeNSTimer`，它默认仅在运行iOS\
    \ 3.0.1或更旧版本的设备上使用。不建议使用`kCCDirectorTypeNSTimer`，因为它是最慢的Director类型，并且在内部使用`NSTimer`对象来驱动帧更新。根据Apple的文档，`NSTimer`的分辨率大约在50到100毫秒之间。如果你考虑到需要每16.6毫秒更新一次才能渲染60帧每秒，那么在使用`kCCDirectorTypeNSTimer`时，特别是在第一代和第二代设备上，不要期望能够渲染60\
    \ fps。更糟糕的是，由于超出你控制的原因，更新之间的时间可能会显著波动，导致帧率波动。不过它至少能与UIKit视图良好协作。\n\n比`kCCDirectorTypeNSTimer`更快的备用选项是`kCCDirectorTypeMainLoop`或`kCCDirectorTypeThreadMainLoop`，除非你想在你的游戏中添加UIKit视图。在这种情况下，这两种Director类型可能会导致UIKit视图响应缓慢、无响应以及其他问题。这是因为它们使用一种老式的、非协作的更新循环来驱动cocos2d更新，一旦上一个更新结束，就会立即开始下一个更新。这几乎没有给包括UIKit视图在内的其他事物留下CPU时间，尽管`kCCDirectorTypeThreadMainLoop`在这方面表现更好。\n\
    \n总而言之，使用`kCCDirectorTypeDisplayLink`（默认），并将你的项目iOS部署目标设置为iOS 3.1或更高版本（参见[图3-7](#Chapter03.html#fig_3_7)），以确保`CADisplayLink`在运行你应用的所有设备上始终可用。其他Director类型可以被视为远古时代的遗物（就像：上个月的计算机技术），但在某些不常见的场景中可能仍然有用。\n\
    \n![images](images/0307.jpg)\n\n**图3-7.** *将iOS部署目标设置为3.1确保`CADisplayLinkDirector`类型可用。*\n\
    \n### CCScene\n\n`CCScene`对象始终是场景图中的第一个节点。在cocos2d中，场景是一个抽象概念，并且`CCScene`类与`CCNode`相比几乎不包含额外的代码。但是`CCDirector`需要一个派生自`CCScene`的类，以便能够通过`CCDirector`的`runWithScene`、`replaceScene`和`pushScene`方法更改当前活动的场景图。你还可以将`CCScene`类包装到一个派生自`CCSceneTransition`的类中，以便在当前运行场景和新场景之间制作过渡动画。\n\
    \n通常，`CCScene`的唯一子节点是那些派生自`CCLayer`的节点，这些节点又包含各个游戏对象，尽管cocos2d并不强制这一约定。由于场景对象本身在大多数情况下不包含任何游戏特定的代码，并且很少被子类化，它通常是在`CCLayer`对象内部的静态方法`+(id)\
    \ scene`中创建的。我在[第2章](#Chapter02.html#ch2)中已经提到过这个方法，但这里再次提及以唤起你的记忆：\n\n```\n+(id)\
    \ scene\n{\n    CCScene *scene = [CCScene node];\n    CCLayer* layer = [HelloWorld\
    \ node];\n    [scene addChild:layer];\n\n    return scene;\n}\n```\n\n你创建场景的第一个地方是在应用委托的`applicationDidFinishLaunching`方法末尾。你使用Director通过`runWithScene`方法启动第一个场景：\n\
    \n```\n// only use this to run the very first scene\n[[CCDirector sharedDirector]\
    \ runWithScene:[HelloWorld scene]];\n```\n\n对于所有后续的场景更改，你必须使用恰如其名的`replaceScene`方法来替换现有场景：\n\
    \n```\n// use replaceScene to change all subsequent scenes\n[[CCDirector sharedDirector]\
    \ replaceScene:[HelloWorld scene]];\n```\n\n正如你将在接下来的章节中很快学到的，你也可以在替换场景时使用过渡效果。以下是一个示例，它使用`CCTransitionShrinkGrow`类作为管理过渡动画的中间场景：\n\
    \n```\nCCScene* scene = [HelloWorld scene];\nCCSceneTransition* tran = [CCTransitionShrinkGrow\
    \ transitionWithDuration:2 scene:scene];\n[[CCDirector sharedDirector] replaceScene:tran];\n\
    ```\n\n**注意：** 如果你在`HelloWorld`场景中运行此代码，它将正常工作。它会创建一个`HelloWorld`的新实例并替换旧实例，有效地重新加载场景。但是，不要尝试通过将`self`作为参数传递给`replaceScene`来重新加载当前场景。这会导致你的游戏卡死！"
  raw: '#### The Director


    The `CCDirector` class, or simply Director for short, is the heart of the cocos2d
    game engine. If you recall the HelloWorld application from [Chapter 2](#Chapter02.html#ch2),
    you’ll remember that a lot of the cocos2d initialization procedure involved calls
    to `[CCDirectorsharedDirector]`.


    The `CCDirector` class is a singleton, which means there can be only one instance
    of the `CCDirector` class at any time, and it can be accessed globally by calling
    the class method `sharedDirector`. For now that’s all you need to know about singletons.
    Later in this chapter, the “A Note on Singletons in cocos2d” section will explain
    what a singleton is and what other singleton classes cocos2d has to offer.


    The `CCDirector` class stores global configuration settings for cocos2d and also
    manages the cocos2d scenes. The major responsibilities of the `CCDirector` class
    include the following:


    *   Providing access to the currently running scene

    *   Running, replacing, pushing, and popping scenes

    *   Providing access to cocos2d configuration details

    *   Providing access to cocos2d’s OpenGL view and window

    *   Pausing, resuming, and ending the game

    *   Converting UIKit and OpenGL coordinates

    *   Determining how game state is updated


    You can choose from four different types of Directors, which affects the way the
    Director updates the game states. This in turn can have a great impact on rendering
    performance and compatibility with UIKit views. You’ll typically find these lines
    in the app delegate class, which sets the Director type:


    `// Try CADisplayLink director first.`

    `// If CADisplayLink is not available (iOS < 3.1) fall back to NSTimer director.`

    `if ( ! [CCDirector setDirectorType:kCCDirectorTypeDisplayLink] )`

    `    [CCDirector setDirectorType:kCCDirectorTypeDefault];`


    You can set four Director types:


    *   `kCCDirectorTypeDisplayLink` (fastest; requires iOS 3.1 or newer)

    *   `kCCDirectorTypeNSTimer` (slowest)

    *   `kCCDirectorTypeThreadMainLoop` (fast but has issues with UIKit views)

    *   `kCCDirectorTypeMainLoop`(fast but has issues with UIKit views)


    The most commonly used and recommended Director type is the `kCCDirectorTypeDisplayLink`,
    which uses Apple’s `CADisplayLink` class internally. It’s the preferred and default
    choice and available only on iOS 3.1 or newer. The `CADisplayLink` class ensures
    that screen updates are synchronized with the screen refresh, which enables very
    smooth scrolling. It also cooperates well with UIKit views.


    **TIP:** Since all devices can be upgraded to iOS 3.1.3 and iOS 3.1 was already
    released in September 2009, it is safe to assume that there’s only a negligible
    fraction of devices left that do not run at least iOS 3.1\. Various device statistics
    published by app developers and analytics companies support that notion and even
    indicate an adoption rate for iOS 4 of more than 90 percent for iPhone devices,
    as of April 2011\. To ensure that the `CADisplayLink` class is available on any
    device running your app, you should set your project’s iOS deployment target to
    iOS 3.1 and not iOS 3.0 (the lowest deployment target Xcode currently allows you
    to choose).


    The default fallback option is `kCCDirectorTypeNSTimer`, which by default will
    be usedonly on devices running iOS 3.0.1 or older. Using the `kCCDirectorTypeNSTimer`
    is not recommended because it’s the slowest Director type and uses an `NSTimer`
    object internally to drive frame updates. The resolution of `NSTimer` is somewhere
    around 50 to 100 milliseconds according to Apple’s documentation. If you consider
    that you need one update every 16.6 milliseconds to render 60 frames per second,
    don’t expect to be able to render 60 fps particularly on first- and second-generation
    devices when using `kCCDirectorTypeNSTimer`. Worse yet, the time between updates
    can fluctuate significantly because of reasons beyond your control that can result
    in a fluctuating framerate. At least it cooperates well with UIKit views.


    The faster fallback options to the `kCCDirectorTypeNSTimer` would be the `kCCDirectorTypeMainLoop`
    or the `kCCDirectorTypeThreadMainLoop`, that is, unless you want to add UIKit
    views to your game. In that case, these two Director types can cause slow and
    unresponsive UIKit views and other issues. This is because they drive cocos2d
    updates using an old-school, noncooperative update loop that will start the next
    update as soon as the last one ended. This leaves little to no CPU time for other
    things, including UIKit views, although the `kCCDirectorTypeThreadMainLoop` behaves
    better in this regard.


    To sum up, use the `kCCDirectorTypeDisplayLink` (the default) and set your project’s
    iOS deployment target to iOS 3.1 or newer (see [Figure 3–7](#Chapter03.html#fig_3_7))
    to ensure the `CADisplayLink` is always available on all devices running your
    app. The other Director types can be considered relics of the ancient past (as
    in: last month’s computer technology) but may still be useful in some obscure
    scenarios.


    ![images](images/0307.jpg)


    **Figure 3–7.** *Setting the iOS deployment target to 3.1 ensures that the CADisplayLinkDirector
    type is available.*


    #### CCScene


    A `CCScene` object is always the first node in the scene graph. In cocos2d, a
    scene is an abstract concept, and the `CCScene` class contains virtually no additional
    code compared to `CCNode`. But the `CCDirector` requires a `CCScene`-derived class
    to be able to change the currently active scene graph via the `CCDirectorrunWithScene`,
    `replaceScene`, and `pushScene` methods. You can also wrap a `CCScene` class into
    a class derived from `CCSceneTransition` in order to animate the transition between
    a currently running scene and the new scene.


    Normally the only children of a `CCScene` are those derived from `CCLayer`, which
    in turn contain the individual game objects, although this convention is not enforced
    by cocos2d. Since the scene object itself in most cases doesn’t contain any game-specific
    code and is rarely subclassed, it’s most often created in a static method `+(id)
    scene` inside the `CCLayer` object. I already mentioned this method in [Chapter
    2](#Chapter02.html#ch2), but here it is again to refresh your memory:


    `+(id) scene`

    `{`

    `    CCScene *scene = [CCScene node];`

    `    CCLayer* layer = [HelloWorld node];`

    `    [scene addChild:layer];`


    `    return scene;`

    `}`


    The very first place you’ll create a scene is at the end of the app delegate’s
    `applicationDidFinishLaunching` method. You use the Director to start the first
    scene with the `runWithScene` method:


    `// only use this to run the very first scene`

    `[[CCDirector sharedDirector] runWithScene:[HelloWorld scene]];`


    For all subsequent scene changes, you must replace the existing scene with the
    aptly named `replaceScene` method:


    `// use replaceScene to change all subsequent scenes`

    `[[CCDirector sharedDirector] replaceScene:[HelloWorld scene]];`


    As you’ll soon learn in an upcoming section, you can also use transitional effects
    when replacing scenes. The following is an example that uses the `CCTransitionShrinkGrow`
    class as an intermediary scene that manages the transition animation:


    `CCScene* scene = [HelloWorld scene];`

    `CCSceneTransition* tran = [CCTransitionShrinkGrow transitionWithDuration:2 scene:scene];`

    `[[CCDirector sharedDirector] replaceScene:tran];`


    **NOTE:** If you run this code in the `HelloWorld scene`, it will work just fine.
    It will create a new instance of `HelloWorld` and replace the old one, effectively
    reloading the scene. However, don’t try to reload the current scene by passing
    `self` as a parameter to `replaceScene`. This will freeze your game!'
  trans: "\n### Director\n\n`CCDirector`类（或简称为 Director）是 cocos2d 游戏引擎的核心。如果你还记得第\
    \ 2 章中的 HelloWorld 应用，你会记得许多 cocos2d 初始化过程都涉及对`[CCDirector sharedDirector]`的调用。\n\
    \n`CCDirector`类是一个单例，这意味着在任何时候只能有一个`CCDirector`类的实例，并且可以通过调用类方法`sharedDirector`进行全局访问。目前，这就是你需要了解关于单例的全部内容。本章后面“关于\
    \ cocos2d 中单例的说明”部分将解释什么是单例以及 cocos2d 提供了哪些其他单例类。\n\n`CCDirector`类存储 cocos2d 的全局配置设置，并管理\
    \ cocos2d 场景。`CCDirector`类的主要职责包括：\n\n- 提供对当前运行场景的访问\n- 运行、替换、压栈和弹出场景\n- 提供对 cocos2d\
    \ 配置细节的访问\n- 提供对 cocos2d 的 OpenGL 视图和窗口的访问\n- 暂停、恢复和结束游戏\n- 转换 UIKit 和 OpenGL\
    \ 坐标\n- 决定游戏状态的更新方式\n\n你可以从四种不同的 Director 类型中选择，这会影响 Director 更新游戏状态的方式。这反过来会对渲染性能以及与\
    \ UIKit 视图的兼容性产生重大影响。你通常会在应用委托类中找到设置 Director 类型的如下行：\n\n```\n// 优先尝试使用 CADisplayLink\
    \ director。\n// 如果 CADisplayLink 不可用（iOS < 3.1），则回退到 NSTimer director。\nif ( !\
    \ [CCDirector setDirectorType:kCCDirectorTypeDisplayLink] )\n    [CCDirector setDirectorType:kCCDirectorTypeDefault];\n\
    ```\n\n你可以设置四种 Director 类型：\n\n- `kCCDirectorTypeDisplayLink`（最快；需要 iOS 3.1 或更高版本）\n\
    - `kCCDirectorTypeNSTimer`（最慢）\n- `kCCDirectorTypeThreadMainLoop`（快速，但与 UIKit\
    \ 视图存在兼容性问题）\n- `kCCDirectorTypeMainLoop`（快速，但与 UIKit 视图存在兼容性问题）\n\n最常用且推荐的 Director\
    \ 类型是`kCCDirectorTypeDisplayLink`，它在内部使用 Apple 的`CADisplayLink`类。这是首选和默认的选择，并且仅在\
    \ iOS 3.1 或更高版本上可用。`CADisplayLink`类确保屏幕更新与屏幕刷新同步，从而实现非常流畅的滚动。它还能与 UIKit 视图良好协作。\n\
    \n**提示：** 由于所有设备都可以升级到 iOS 3.1.3，并且 iOS 3.1 已于 2009 年 9 月发布，因此可以安全地假设只有极少数的设备没有运行至少\
    \ iOS 3.1。应用开发者和分析公司发布的各种设备统计数据支持了这一观点，甚至显示截至 2011 年 4 月，iOS 4 在 iPhone 设备上的采用率已超过\
    \ 90%。为了确保`CADisplayLink`类在运行你应用的任何设备上都可用，你应该将项目的 iOS 部署目标设置为 iOS 3.1，而不是 iOS\
    \ 3.0（Xcode 当前允许你选择的最低部署目标）。\n\n默认的备用选项是`kCCDirectorTypeNSTimer`，它默认仅在运行 iOS 3.0.1\
    \ 或更旧版本的设备上使用。不建议使用`kCCDirectorTypeNSTimer`，因为它是最慢的 Director 类型，并且在内部使用`NSTimer`对象来驱动帧更新。根据\
    \ Apple 的文档，`NSTimer`的分辨率大约在 50 到 100 毫秒之间。如果你考虑到需要每 16.6 毫秒更新一次才能渲染 60 帧每秒，那么在使用`kCCDirectorTypeNSTimer`时，特别是在第一代和第二代设备上，不要期望能够渲染\
    \ 60 fps。更糟糕的是，由于超出你控制的原因，更新之间的时间可能会显著波动，导致帧率波动。不过它至少能与 UIKit 视图良好协作。\n\n比`kCCDirectorTypeNSTimer`更快的备用选项是`kCCDirectorTypeMainLoop`或`kCCDirectorTypeThreadMainLoop`，除非你想在你的游戏中添加\
    \ UIKit 视图。在这种情况下，这两种 Director 类型可能会导致 UIKit 视图响应缓慢、无响应以及其他问题。这是因为它们使用一种老式的、非协作的更新循环来驱动\
    \ cocos2d 更新，一旦上一个更新结束，就会立即开始下一个更新。这几乎没有给包括 UIKit 视图在内的其他事物留下 CPU 时间，尽管`kCCDirectorTypeThreadMainLoop`在这方面表现更好。\n\
    \n总而言之，使用`kCCDirectorTypeDisplayLink`（默认），并将你的项目 iOS 部署目标设置为 iOS 3.1 或更高版本（参见图\
    \ 3-7），以确保`CADisplayLink`在运行你应用的所有设备上始终可用。其他 Director 类型可以被视为远古时代的遗物（就像：上个月的计算机技术），但在某些不常见的场景中可能仍然有用。\n\
    \n![images](img/0307.jpg)\n\n**图 3-7.** *将 iOS 部署目标设置为 3.1 确保`CADisplayLinkDirector`类型可用。*\n\
    \n### CCScene\n\n`CCScene`对象始终是场景图中的第一个节点。在 cocos2d 中，场景是一个抽象概念，并且`CCScene`类与`CCNode`相比几乎不包含额外的代码。但是`CCDirector`需要一个派生自`CCScene`的类，以便能够通过`CCDirector`的`runWithScene`、`replaceScene`和`pushScene`方法更改当前活动的场景图。你还可以将`CCScene`类包装到一个派生自`CCSceneTransition`的类中，以便在当前运行场景和新场景之间制作过渡动画。\n\
    \n通常，`CCScene`的唯一子节点是那些派生自`CCLayer`的节点，这些节点又包含各个游戏对象，尽管 cocos2d 并不强制这一约定。由于场景对象本身在大多数情况下不包含任何游戏特定的代码，并且很少被子类化，它通常是在`CCLayer`对象内部的静态方法`+(id)\
    \ scene`中创建的。我在第 2 章中已经提到过这个方法，但这里再次提及以唤起你的记忆：\n\n```\n+(id) scene\n{\n    CCScene\
    \ *scene = [CCScene node];\n    CCLayer* layer = [HelloWorld node];\n    [scene\
    \ addChild:layer];\n\n    return scene;\n}\n```\n\n你创建场景的第一个地方是在应用委托的`applicationDidFinishLaunching`方法末尾。你使用\
    \ Director 通过`runWithScene`方法启动第一个场景：\n\n```\n// 仅用于运行第一个场景\n[[CCDirector sharedDirector]\
    \ runWithScene:[HelloWorld scene]];\n```\n\n对于所有后续的场景更改，你必须使用恰如其名的`replaceScene`方法来替换现有场景：\n\
    \n```\n// 使用 replaceScene 更改所有后续场景\n[[CCDirector sharedDirector] replaceScene:[HelloWorld\
    \ scene]];\n```\n\n正如你将在接下来的章节中很快学到的，你也可以在替换场景时使用过渡效果。以下是一个示例，它使用`CCTransitionShrinkGrow`类作为管理过渡动画的中间场景：\n\
    \n```\nCCScene* scene = [HelloWorld scene];\nCCSceneTransition* tran = [CCTransitionShrinkGrow\
    \ transitionWithDuration:2 scene:scene];\n[[CCDirector sharedDirector] replaceScene:tran];\n\
    ```\n\n**注意：** 如果你在`HelloWorld`场景中运行此代码，它将正常工作。它会创建一个`HelloWorld`的新实例并替换旧实例，有效地重新加载场景。但是，不要尝试通过将`self`作为参数传递给`replaceScene`来重新加载当前场景。这会导致你的游戏卡死！\n"
- fmt: "### Scenes and Memory\n\nKeep in mind that when you replace one scene with\
    \ another, the new scene is loaded into memory before the old scene’s memory is\
    \ freed. This creates a short spike in memory usage. Replacing scenes is always\
    \ a crucial point where you can run into memory warnings or straight into a crash\
    \ related to not enough free memory. You should test scene switching early and\
    \ often when your app uses a lot of memory.\n\n**Note:** Cocos2d does a good job\
    \ of cleaning up its own memory when you replace one scene with another. It removes\
    \ all nodes, stops all actions, and unschedules all selectors. I mention this\
    \ because sometimes I come across code that makes explicit calls to the respective\
    \ `removeAll` cocos2d methods. Remember, if in doubt, trust cocos2d’s memory management.\n\
    \nThis issue becomes even more pronounced when you start using transitions. What\
    \ happens then is that the new scene is created, the transition runs, and only\
    \ after the transition has done its job is the old scene removed from memory.\
    \ It’s good practice to add log statements to your scene or, respectively, to\
    \ the layer that creates the scene:\n\n```\n-(id) init\n{\n    if ((self = [super\
    \ init]))\n    {\n        CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\
    \    }\n}\n\n-(void) dealloc\n{\n    CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd),\
    \ self);\n\n    // always call [super dealloc] in the dealloc method!\n    [super\
    \ dealloc];\n}\n```\n\nKeep an eye on these log messages. If you ever notice that\
    \ the `dealloc` log message is never sent when you switch from one scene to another,\
    \ this is a huge warning sign. In that case, you’re leaking the whole scene, not\
    \ freeing its memory. Something like that is extremely unlikely to be caused by\
    \ cocos2d. In almost all cases, it will boil down to retaining or not properly\
    \ releasing nodes.\n\nOne thing you should never do is add a node as a child to\
    \ the scene graph and then retain it yourself for some other purpose. Use cocos2d’s\
    \ methods to access node objects instead, or at the very least keep a weak reference\
    \ to the pointer instead of retaining it. As long as you let cocos2d worry about\
    \ managing the memory of nodes, you should be fine.\n\n### Pushing and Popping\
    \ Scenes\n\nWhile I’m still talking about changing scenes, I should mention the\
    \ `pushScene` and `popScene` methods of the Director, which can be useful tools.\
    \ What they do is run the new scene without removing the old scene from memory.\
    \ If you think of your scenes as sheets of paper, then pushing a scene means that\
    \ a new sheet of paper will be added on top of the currently visible sheet. The\
    \ paper underneath stays in place and in memory, as opposed to replacing scenes.\
    \ For each pushed scene, you then need to call `popScene` (this is equal to removing\
    \ the topmost sheet of paper) until only the initial scene is left.\n\nThe idea\
    \ is to make changing scenes faster. But there’s the conundrum: if your scenes\
    \ are lightweight enough that they can share memory with each other, they’ll load\
    \ fast anyway. And if they are complex and thus slow to load, chances are they\
    \ take away each other’s precious memory—and memory usage quickly gets to a critical\
    \ level.\n\nThe biggest issue with `pushScene` and `popScene` is that you need\
    \ to keep track of how many scenes were pushed in order to pop the exact amount.\
    \ If you’re not very careful about managing your pushes and pops, you’ll end up\
    \ forgetting a pop or popping one scene too many. And this is besides the fact\
    \ that all those scenes have to share the same memory.\n\nThere are cases where\
    \ `pushScene` and `popScene` are very handy; one is if you have one common scene\
    \ that’s used in many places, such as the Settings screen where you can change\
    \ music and sound volume. You can push the Settings scene to display it, and the\
    \ Settings scene’s Back button then simply calls `popScene`; the game will return\
    \ to the previous state. Whether you opened the Settings menu from the main menu,\
    \ from within the game, or someplace else, this technique works fine and lets\
    \ you avoid having to keep track of where the Settings menu was opened.\n\nAnother\
    \ case where `pushScene` and `popScene` are very useful is if you want to retain\
    \ the state of the initial scene without having to revert to saving and loading\
    \ that scene’s state. For example, you could push the scene that shows the current\
    \ leaderboard in a multiplayer game and then pop it again without having to save\
    \ and load the game state, because the game scene remains in memory. And the game\
    \ hasn’t advanced while the player was inspecting the leaderboard because the\
    \ game scene was automatically paused while the leaderboard scene was visible.\n\
    \nHowever, you need to ensure that there’s always enough additional free memory\
    \ available for the pushed scene at any time the scene could be pushed, which\
    \ is hard to test for. It is recommended that any scene you may want to push should\
    \ be very lightweight, consume little memory, and should only pop itself but never\
    \ push other scenes or even call `replaceScene`.\n\nFor example, to display a\
    \ Settings scene from anywhere on top of the current scene, use this code:\n\n\
    ```\n[[CCDirector sharedDirector] pushScene:[Settings scene]];\n```\n\nNow inside\
    \ the Settings scene you need to call `popScene` when you want to go back to the\
    \ previous scene that’s still in memory:\n\n```\n[[CCDirector sharedDirector]\
    \ popScene];\n```\n\n**Caution:** You can animate the `pushScene` call only with\
    \ `CCSceneTransition` classes and not `popScene`. This is a drawback of pushing\
    \ and popping scenes that you should be aware of."
  raw: '#### Scenes and Memory


    Keep in mind that when you replace one scene with another, the new scene is loaded
    into memory before the old scene’s memory is freed. This creates a short spike
    in memory usage. Replacing scenes is always a crucial point where you can run
    into memory warnings or straight into a crash related to not enough free memory.
    You should test scene switching early and often when your app uses a lot of memory.


    **NOTE:** Cocos2d does a good job of cleaning up its own memory when you replace
    one scene with another. It removes all nodes, stops all actions, and unschedules
    all selectors. I mention this because sometimes I come across code that makes
    explicit calls to the respective `removeAll` cocos2d methods. Remember, if in
    doubt, trust cocos2d’s memory management.


    This issue becomes even more pronounced when you start using transitions. What
    happens then is that the new scene is created, the transition runs, and only after
    the transition has done its job is the old scene removed from memory. It’s good
    practice to add log statements to your scene or, respectively, to the layer that
    creates the scene:


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);`

    `    }`

    `}`


    `-(void) dealloc`

    `{`

    `    CCLOG(@"%@: %@", NSStringFromSelector(_cmd), self);`


    `    // always call [super dealloc] in the dealloc method!`

    `    [super dealloc];`

    `}`


    Keep an eye on these log messages. If you ever notice that the `dealloc` log message
    is never sent when you switch from one scene to another, this is a huge warning
    sign. In that case, you’re leaking the whole scene, not freeing its memory. Something
    like that is extremely unlikely to be caused by cocos2d. In almost all cases,
    it will boil down to retaining or not properly releasing nodes.


    One thing you should never do is add a node as a child to the scene graph and
    then retain it yourself for some other purpose. Use cocos2d’s methods to access
    node objects instead, or at the very least keep a weak reference to the pointer
    instead of retaining it. As long as you let cocos2d worry about managing the memory
    of nodes, you should be fine.


    #### Pushing and Popping Scenes


    While I’m still talking about changing scenes, I should mention the `pushScene`
    and `popScene` methods of the Director, which can be useful tools. What they do
    is run the new scene without removing the old scene from memory. If you think
    of your scenes as sheets of paper, then pushing a scene means that a new sheet
    of paper will be added on top of the currently visible sheet. The paper underneath
    stays in place and in memory, as opposed to replacing scenes. For each pushed
    scene, you then need to call `popScene` (this is equal to removing the topmost
    sheet of paper) until only the initial scene is left.


    The idea is to make changing scenes faster. But there’s the conundrum: if your
    scenes are lightweight enough that they can share memory with each other, they’ll
    load fast anyway. And if they are complex and thus slow to load, chances are they
    take away each other’s precious memory—and memory usage quickly gets to a critical
    level.


    The biggest issue with `pushScene` and `popScene` is that you need to keep track
    of how many scenes were pushed in order to pop the exact amount. If you’re not
    very careful about managing your pushes and pops, you’ll end up forgetting a pop
    or popping one scene too many. And this is besides the fact that all those scenes
    have to share the same memory.


    There are cases where `pushScene` and `popScene` are very handy; one is if you
    have one common scene that’s used in many places, such as the Settings screen
    where you can change music and sound volume. You can push the Settings scene to
    display it, and the Settings scene’s Back button then simply calls `popScene`;
    the game will return to the previous state. Whether you opened the Settings menu
    from the main menu, from within the game, or someplace else, this technique works
    fine and lets you avoid having to keep track of where the Settings menu was opened.


    Another case where `pushScene` and `popScene` are very useful is if you want to
    retain the state of the initial scene without having to revert to saving and loading
    that scene’s state. For example, you could push the scene that shows the current
    leaderboard in a multiplayer game and then pop it again without having to save
    and load the game state, because the game scene remains in memory. And the game
    hasn’t advanced while the player was inspecting the leaderboard because the game
    scene was automatically paused while the leaderboard scene was visible.


    However, you need to ensure that there’s always enough additional free memory
    available for the pushed scene at any time the scene could be pushed, which is
    hard to test for. It is recommended that any scene you may want to push should
    be very lightweight, consume little memory, and should only pop itself but never
    push other scenes or even call `replaceScene`.


    For example, to display a Settings scene from anywhere on top of the current scene,
    use this code:


    `[[CCDirector sharedDirector] pushScene:[Settings scene]];`


    Now inside the Settings scene you need to call `popScene` when you want to go
    back to the previous scene that’s still in memory:


    `[[CCDirector sharedDirector] popScene];`


    **CAUTION:** You can animate the `pushScene` call only with `CCSceneTransition`
    classes and not `popScene`. This is a drawback of pushing and popping scenes that
    you should be aware of.'
  trans: "\n### 场景与内存\n\n请记住，当您用一个场景替换另一个场景时，新场景会在旧场景的内存被释放之前加载到内存中。这会导致内存使用量短暂激增。场景替换始终是一个关键时刻，您可能会在此遇到内存警告，或因可用内存不足而直接导致崩溃。当您的应用占用大量内存时，应尽早并频繁测试场景切换。\n\
    \n**注意：** Cocos2d 在您替换场景时能够很好地清理自身内存。它会移除所有节点、停止所有动作并取消所有选择器的调度。我提到这一点，是因为我有时会遇到一些代码显式调用了各自的\
    \ `removeAll` cocos2d 方法。请记住，如果存疑，请相信 Cocos2d 的内存管理。\n\n当您开始使用转场效果时，这个问题会变得更加明显。此时发生的情况是：新场景被创建，转场效果运行，只有在转场效果完成后，旧场景才会从内存中移除。良好的做法是在场景中，或者更确切地说，在创建场景的图层中添加日志语句：\n\
    \n```\n-(id) init\n{\n    if ((self = [super init]))\n    {\n        CCLOG(@\"\
    %@: %@\", NSStringFromSelector(_cmd), self);\n    }\n}\n\n-(void) dealloc\n{\n\
    \    CCLOG(@\"%@: %@\", NSStringFromSelector(_cmd), self);\n\n    // 始终在 dealloc\
    \ 方法中调用 [super dealloc]！\n    [super dealloc];\n}\n```\n\n密切关注这些日志消息。如果您发现当从一个场景切换到另一个场景时，`dealloc`\
    \ 日志消息从未被发送，这是一个巨大的警示信号。在这种情况下，您正在泄漏整个场景，而没有释放其内存。这种情况极不可能由 Cocos2d 引起。在几乎所有情况下，它都归结为保留（retain）了节点或未正确释放（release）节点。\n\
    \n有一件事您绝对不应该做：将一个节点作为子节点添加到场景图中，然后又为了其他目的自行保留它。请使用 Cocos2d 的方法来访问节点对象，或者至少保持对指针的弱引用（weak\
    \ reference），而不是保留它。只要您让 Cocos2d 负责管理节点的内存，一切就相安无事。\n\n### 场景的推送与弹出\n\n当我还在讨论场景切换时，应该提一下导演类（Director）的\
    \ `pushScene` 和 `popScene` 方法，它们可以是很有用的工具。它们的作用是在不将旧场景从内存中移除的情况下运行新场景。如果您将场景想象成一张张纸，那么推送一个场景意味着在当前可见纸张的顶部添加一张新纸。底层的纸张保持原位并保留在内存中，这与场景替换不同。对于每个推送的场景，您随后需要调用\
    \ `popScene`（这相当于移除最顶层的纸张），直到只剩下初始场景。\n\n其想法是让场景切换更快。但这里存在一个难题：如果您的场景足够轻量，能够彼此共享内存，那么它们无论如何都会加载得很快。但如果它们很复杂，因此加载缓慢，那么它们很可能会占用彼此宝贵的内存——内存使用量会迅速达到临界水平。\n\
    \n`pushScene` 和 `popScene` 最大的问题在于，您需要跟踪推送了多少个场景，以便精确地弹出相同数量的场景。如果您不非常小心地管理推送和弹出，最终会忘记一次弹出，或者多弹出了一个场景。这还不算所有那些场景必须共享同一片内存的事实。\n\
    \n在某些情况下，`pushScene` 和 `popScene` 非常方便；一种情况是，您有一个在许多地方都会用到的通用场景，例如可以调整音乐和音量的设置屏幕。您可以推送设置场景来显示它，而设置场景的“返回”按钮则只需调用\
    \ `popScene`；游戏将返回到之前的状态。无论您是从主菜单、游戏内还是其他地方打开设置菜单，这种技术都很好用，并且能让您避免跟踪设置菜单是在哪里打开的。\n\
    \n`pushScene` 和 `popScene` 非常有用的另一种情况是，您希望保留初始场景的状态，而无需回退到保存和加载该场景的状态。例如，您可以推送一个显示多人游戏中当前排行榜的场景，然后再将其弹出，而无需保存和加载游戏状态，因为游戏场景仍保留在内存中。而且，当玩家查看排行榜时，游戏不会继续推进，因为在排行榜场景可见时，游戏场景会自动暂停。\n\
    \n然而，您需要确保在任何可能推送场景的时刻，都有足够的额外可用内存供推送的场景使用，这很难测试。建议任何您可能想要推送的场景都应该非常轻量，消耗极少内存，并且只能弹出自身，绝不能推送其他场景或甚至调用\
    \ `replaceScene`。\n\n例如，要从当前场景的任意位置之上显示一个设置场景，请使用以下代码：\n\n```\n[[CCDirector sharedDirector]\
    \ pushScene:[Settings scene]];\n```\n\n现在，在设置场景内部，当您想要返回到仍在内存中的上一个场景时，需要调用 `popScene`：\n\
    \n```\n[[CCDirector sharedDirector] popScene];\n```\n\n**注意：** 您只能使用 `CCSceneTransition`\
    \ 类来为 `pushScene` 调用添加动画效果，而不能用于 `popScene`。这是推送和弹出场景的一个缺点，您应该了解。\n"
- fmt: "#### `CCTransitionScene`\n\nTransitions, meaning any class derived from `CCTransitionScene`,\
    \ can give your game a really professional look. [Figure 3–8](#Chapter03.html#fig_3_8)\
    \ gives you an overview of the `CCTransitionScene` class hierarchy and shows the\
    \ available transition classes. [Figure 3–8](#Chapter03.html#fig_3_8) also complements\
    \ the `CCNode` class hierarchy in [Figure 3–5](#Chapter03.html#fig_3_5), where\
    \ the `CCTransitionScene` subclasses were not included for the sake of clarity.\n\
    \n![images](images/0308.jpg)\n\n**Figure 3–8.** *The `CCTransitionScene` class\
    \ hierarchy*\n\n**CAUTION:** Not every transition is really useful in a game,\
    \ even though they all look neat. What players care most about is the speed of\
    \ a transition. Even just three seconds before they can interact with the next\
    \ scene is quite a strain; I prefer to transition scenes within a second or avoid\
    \ them altogether if it better fits the situation.\n\nWhat you should certainly\
    \ try to avoid is picking random transitions when replacing scenes. Players don’t\
    \ care, and as game developers, we know you just got a little over-excited by\
    \ how cool the transitions are. If you don’t know which transition is right for\
    \ a particular change of scene, you shouldn’t use any at all. In other words,\
    \ just because you can doesn’t mean you should.\n\nTransitions add only one more\
    \ line of code to replacing a scene, although admittedly that one line can be\
    \ a long one given how long the names of transitions are and how they get even\
    \ longer with the number of parameters they often require. Here’s the very popular\
    \ fade transition as an example; it fades to white in one second:\n\n```\n// initialize\
    \ a transition scene with the scene we’d like to display next\nCCTransitionFade*\
    \ tran = [CCTransitionFade transitionWithDuration:1\n                        \
    \                                   scene:[HelloWorld scene]  \n             \
    \                                          withColor:ccWHITE];\n// use the transition\
    \ scene object instead of HelloWorld\n[[CCDirector sharedDirector] replaceScene:tran];\n\
    ```\n\nYou can use a `CCTransitionScene` with `replaceScene` and `pushScene`,\
    \ but as I said earlier, you can’t use a transition with `popScene`.\n\nA variety\
    \ of transitions are available, although most are variations of directions, as\
    \ in where the transition moves to or from which side it starts. Here’s a list\
    \ of the currently available transitions, along with a short description for each:\n\
    \n*   `CCTransitionFade`: Fades to a specific color and back.\n*   `CCTransitionFadeTR`\
    \ (three more variations): Tiles flip over to reveal a new scene.\n*   `CCTransitionJumpZoom`:\
    \ Scene bounces and gets smaller; new scene does the reverse.\n*   `CCTransitionMoveInL`\
    \ (three more variations): Scene moves out; new scene moves in at the same time,\
    \ either from left, right, top, or bottom.\n*   `CCTransitionSceneOriented` (six\
    \ more variations): A variety of transitions flipping the whole scene around.\n\
    *   `CCTransitionPageTurn`: An effect like turning a page.\n*   `CCTransitionRadialCCW`\
    \ (one variation): Like a radar screen that reveals the new scene with a radial\
    \ wipe animation.\n*   `CCTransitionRotoZoom`: Scene rotates and gets smaller;\
    \ new scene does reverse.\n*   `CCTransitionShrinkGrow`: Current scene shrinks;\
    \ new scene grows over it.\n*   `CCTransitionSlideInL` (three more variations):\
    \ New scene slides over the current scene, either from left, right, top, or bottom.\n\
    *   `CCTransitionSplitCols` (one variation): Columns of scene move up or down\
    \ to reveal new scene.\n*   `CCTransitionTurnOffTiles`: Tiles randomly replaced\
    \ by tiles of new scene.\n\n#### `CCLayer`\n\nSometimes you need more than one\
    \ layer in your scene. In that case, you can add more `CCLayer` objects to your\
    \ scene like this:\n\n```\n+(id) scene\n{\n    CCScene* scene = [CCScene node];\n\
    \n    CCLayer* backgroundLayer = [HelloWorldBackground node];\n    [scene addChild:\
    \ backgroundLayer];\n\n    CCLayer* layer = [HelloWorld node];\n    [scene addChild:layer];\n\
    \n    CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];\n    [scene\
    \ addChild: userInterfaceLayer];\n\n    return scene;\n}\n```\n\nThis scene now\
    \ has three distinct layers: the `backgroundLayer`, the regular game object `layer`,\
    \ and on top of that the `userInterfaceLayer`. Because the layers are added to\
    \ the scene in the order they are created, any nodes added to the `backgroundLayer`\
    \ will be drawn behind the other layers. Likewise, nodes added to the `userInterfaceLayer`\
    \ will always be drawn on top of any nodes in the `layer` and `backgroundLayer`.\n\
    \n**TIP:** Again, strictly speaking, a layer does not have to be derived from\
    \ the `CCLayer` class; it could also be a simple `CCNode`. This is often preferable\
    \ when you need the layer only to group nodes together and don’t require the layer\
    \ to handle input.\n\nOne case where you might want to use multiple layers per\
    \ scene is if you have a scrolling background and a static frame surrounding the\
    \ background, possibly including user interface elements. Using two separate layers\
    \ makes it easy to move the background layer by simply adjusting the layer’s position\
    \ while the foreground layer remains in place. In addition, all objects of the\
    \ same layer will be either in front of or behind objects of another layer, depending\
    \ on the z-order of the layers. Of course, you can achieve the same effect without\
    \ layers, but it would require each individual object in the background to be\
    \ moved separately. That’s just ineffective, so avoid it if you can.\n\nLike scenes,\
    \ layers have the same dimension as the cocos2d OpenGL view. For iOS devices,\
    \ this will almost always be the size of the screen; on Mac OS X, it will be the\
    \ size of the window.\n\nLayers are primarily a grouping concept. For example,\
    \ you can use any action with a layer, and the action will affect all of the objects\
    \ on the layer. That means you can move all layer objects around in unison or\
    \ rotate and scale them all at once. In general, use a layer if you need a group\
    \ of objects to perform the same actions and behaviors. Moving all objects to\
    \ scroll them is one such case; sometimes you might want to rotate them or reorder\
    \ them so they are drawn on top of other objects. If all these objects are children\
    \ of a layer, you can simply change the layer’s properties or run an action on\
    \ the layer to affect all of its child nodes.\n\n**NOTE:** There is a recommendation\
    \ not to use too many `CCLayer` objects per scene. This is often misunderstood.\
    \ You can use as many layers as you want without affecting performance any more\
    \ than using any other node. However, things change if the layer also accepts\
    \ input, because receiving touch or accelerometer events are costly tasks. So,\
    \ you should not use several layers receiving touch or accelerometer input; one\
    \ will do. Preferably one layer receives and handles input and, where necessary,\
    \ informs other nodes or classes about the input events by forwarding them to\
    \ registered objects. You usually do this via the `performSelector` method that\
    \ calls a method with a defined method signature. See cocos2d’s `CCScheduler`\
    \ class for an example implementation."
  raw: '#### CCTransitionScene


    Transitions, meaning any class derived from `CCTransitionScene`, can give your
    game a really professional look. [Figure 3–8](#Chapter03.html#fig_3_8) gives you
    an overview of the `CCTransitionScene` class hierarchy and shows the available
    transition classes. [Figure 3–8](#Chapter03.html#fig_3_8) also complements the
    `CCNode` class hierarchy in [Figure 3–5](#Chapter03.html#fig_3_5), where the `CCTransitionScene`
    subclasses were not included for the sake of clarity.


    ![images](images/0308.jpg)


    **Figure 3–8.** *The CCTransitionScene class hierarchy*


    **CAUTION:** Not every transition is really useful in a game, even though they
    all look neat. What players care most about is the speed of a transition. Even
    just three seconds before they can interact with the next scene is quite a strain;
    I prefer to transition scenes within a second or avoid them altogether if it better
    fits the situation.


    What you should certainly try to avoid is picking random transitions when replacing
    scenes. Players don’t care, and as game developers, we know you just got a little
    over-excited by how cool the transitions are. If you don’t know which transition
    is right for a particular change of scene, you shouldn’t use any at all. In other
    words, just because you can doesn’t mean you should.


    Transitions add only one more line of code to replacing a scene, although admittedly
    that one line can be a long one given how long the names of transitions are and
    how they get even longer with the number of parameters they often require. Here’s
    the very popular fade transition as an example; it fades to white in one second:


    `// initialize a transition scene with the scene we’d like to display next`

    `CCTransitionFade* tran = [CCTransitionFade transitionWithDuration:1`

    `                                                            scene:[HelloWorld
    scene]  `

    `                                                        withColor:ccWHITE];`

    `// use the transition scene object instead of HelloWorld`

    `[[CCDirector sharedDirector] replaceScene:tran];`


    You can use a `CCTransitionScene` with `replaceScene` and `pushScene`, but as
    I said earlier, you can’t use a transition with `popScene`.


    A variety of transitions are available, although most are variations of directions,
    as in where the transition moves to or from which side it starts. Here’s a list
    of the currently available transitions, along with a short description for each:


    *   `CCTransitionFade`: Fades to a specific color and back.

    *   `CCTransitionFadeTR` (three more variations): Tiles flip over to reveal a
    new scene.

    *   `CCTransitionJumpZoom`: Scene bounces and gets smaller; new scene does the
    reverse.

    *   `CCTransitionMoveInL` (three more variations): Scene moves out; new scene
    moves in at the same time, either from left, right, top, or bottom.

    *   `CCTransitionSceneOriented` (six more variations): A variety of transitions
    flipping the whole scene around.

    *   `CCTransitionPageTurn`: An effect like turning a page.

    *   `CCTransitionRadialCCW` *(one variation)*: Like a radar screen that reveals
    the new scene with a radial wipe animation.

    *   `CCTransitionRotoZoom`: Scene rotates and gets smaller; new scene does reverse.

    *   `CCTransitionShrinkGrow`: Current scene shrinks; new scene grows over it.

    *   `CCTransitionSlideInL` (three more variations): New scene slides over the
    current scene, either from left, right, top, or bottom.

    *   `CCTransitionSplitCols` (one variation): Columns of scene move up or down
    to reveal new scene.

    *   `CCTransitionTurnOffTiles`: Tiles randomly replaced by tiles of new scene.


    #### CCLayer


    Sometimes you need more than one layer in your scene. In that case, you can add
    more `CCLayer` objects to your scene like this:


    `+(id) scene`

    `{`

    `    CCScene* scene = [CCScene node];`


    `    CCLayer* backgroundLayer = [HelloWorldBackground node];`

    `    [scene addChild: backgroundLayer];`


    `    CCLayer* layer = [HelloWorld node];`

    `    [scene addChild:layer];`


    `    CCLayer* userInterfaceLayer = [HelloWorldUserInterface node];`

    `    [scene addChild: userInterfaceLayer];`


    `    return scene;`

    `}`


    This scene now has three distinct layers: the `backgroundLayer`, the regular game
    object `layer`, and on top of that the `userInterfaceLayer`. Because the layers
    are added to the scene in the order they are created, any nodes added to the `backgroundLayer`
    will be drawn behind the other layers. Likewise, nodes added to the `userInterfaceLayer`
    will always be drawn on top of any nodes in the `layer` and `backgroundLayer`.


    **TIP:** Again, strictly speaking, a layer does not have to be derived from the
    `CCLayer` class; it could also be a simple `CCNode`. This is often preferable
    when you need the layer only to group nodes together and don’t require the layer
    to handle input.


    One case where you might want to use multiple layers per scene is if you have
    a scrolling background and a static frame surrounding the background, possibly
    including user interface elements. Using two separate layers makes it easy to
    move the background layer by simply adjusting the layer’s position while the foreground
    layer remains in place. In addition, all objects of the same layer will be either
    in front of or behind objects of another layer, depending on the z-order of the
    layers. Of course, you can achieve the same effect without layers, but it would
    require each individual object in the background to be moved separately. That’s
    just ineffective, so avoid it if you can.


    Like scenes, layers have the same dimension as the cocos2d OpenGL view. For iOS
    devices, this will almost always be the size of the screen; on Mac OS X, it will
    be the size of the window.


    Layers are primarily a grouping concept. For example, you can use any action with
    a layer, and the action will affect all of the objects on the layer. That means
    you can move all layer objects around in unison or rotate and scale them all at
    once. In general, use a layer if you need a group of objects to perform the same
    actions and behaviors. Moving all objects to scroll them is one such case; sometimes
    you might want to rotate them or reorder them so they are drawn on top of other
    objects. If all these objects are children of a layer, you can simply change the
    layer’s properties or run an action on the layer to affect all of its child nodes.


    **NOTE:** There is a recommendation not to use too many `CCLayer` objects per
    scene. This is often misunderstood. You can use as many layers as you want without
    affecting performance any more than using any other node. However, things change
    if the layer also accepts input, because receiving touch or accelerometer events
    are costly tasks. So, you should not use several layers receiving touch or accelerometer
    input; one will do. Preferably one layer receives and handles input and, where
    necessary, informs other nodes or classes about the input events by forwarding
    them to registered objects. You usually do this via the `performSelector` method
    that calls a method with a defined method signature. See cocos2d’s `CCScheduler`
    class for an example implementation.'
  trans: "\n#### `CCTransitionScene`\n\n过渡效果，即任何从 `CCTransitionScene` 派生的类，都能让你的游戏看起来真正专业。图\
    \ 3–8 为你概述了 `CCTransitionScene` 的类层次结构，并展示了可用的过渡类。图 3–8 还补充了图 3–5 中的 `CCNode`\
    \ 类层次结构，为了清晰起见，图 3–5 中并未包含 `CCTransitionScene` 的子类。\n\n![images](img/0308.jpg)\n\
    \n**图 3–8.** *`CCTransitionScene` 类层次结构*\n\n**注意：** 并非所有过渡效果在游戏中都真正有用，尽管它们看起来都很酷。玩家最关心的是过渡的速度。哪怕只是让他们等待三秒钟才能与下一个场景交互，都是一种煎熬；我倾向于在一秒内完成场景过渡，或者如果情况更适合，就完全避免使用过渡。\n\
    \n你绝对应该避免的是在替换场景时随机选择过渡效果。玩家并不在意这些，而作为游戏开发者，我们知道你只是对那些酷炫的过渡效果有点过于兴奋了。如果你不确定某个特定场景切换应该使用哪种过渡，那就根本不要使用任何过渡。换句话说，能做不代表应该做。\n\
    \n虽然过渡效果只为替换场景增加了一行代码，但不可否认，鉴于过渡效果的名称长度以及它们通常需要的参数数量会使名称变得更长，这一行代码可能会很长。以下是一个非常流行的淡入淡出过渡效果示例；它会在\
    \ 1 秒内淡出为白色：\n\n```\n// 用一个过渡场景来初始化，该场景包含我们接下来要显示的场景\nCCTransitionFade* tran =\
    \ [CCTransitionFade transitionWithDuration:1\n                               \
    \                            scene:[HelloWorld scene]  \n                    \
    \                                   withColor:ccWHITE];\n// 使用过渡场景对象替代 HelloWorld\n\
    [[CCDirector sharedDirector] replaceScene:tran];\n```\n\n你可以将 `CCTransitionScene`\
    \ 与 `replaceScene` 和 `pushScene` 一起使用，但正如我之前所说，不能将过渡效果与 `popScene` 一起使用。\n\n有各种各样的过渡效果可用，尽管大多数只是方向上的变化，例如过渡效果移动到的方向或起始的方位。以下是当前可用的过渡效果列表，以及每个效果的简短描述：\n\
    \n*   `CCTransitionFade`：淡出到特定颜色，再淡入回来。\n*   `CCTransitionFadeTR`（另有三种变体）：瓦片翻转以显示新场景。\n\
    *   `CCTransitionJumpZoom`：场景弹跳并缩小；新场景则反向进行（弹跳并放大）。\n*   `CCTransitionMoveInL`（另有三种变体）：原场景移出；新场景同时移入，可从左侧、右侧、顶部或底部进入。\n\
    *   `CCTransitionSceneOriented`（另有六种变体）：将整个场景翻转的多种过渡效果。\n*   `CCTransitionPageTurn`：像翻书页一样的效果。\n\
    *   `CCTransitionRadialCCW`（另有一种变体）：类似雷达屏幕，通过径向擦除动画显示新场景。\n*   `CCTransitionRotoZoom`：场景旋转并缩小；新场景则反向进行（旋转并放大）。\n\
    *   `CCTransitionShrinkGrow`：当前场景缩小；新场景在其上放大。\n*   `CCTransitionSlideInL`（另有三种变体）：新场景从左侧、右侧、顶部或底部滑入，覆盖当前场景。\n\
    *   `CCTransitionSplitCols`（另有一种变体）：场景的列向上或向下移动以显示新场景。\n*   `CCTransitionTurnOffTiles`：瓦片被新场景的瓦片随机替换。\n\
    \n#### `CCLayer`\n\n有时你需要在场景中使用多个层。在这种情况下，你可以像这样向场景添加更多的 `CCLayer` 对象：\n\n```\n\
    +(id) scene\n{\n    CCScene* scene = [CCScene node];\n\n    CCLayer* backgroundLayer\
    \ = [HelloWorldBackground node];\n    [scene addChild: backgroundLayer];\n\n \
    \   CCLayer* layer = [HelloWorld node];\n    [scene addChild:layer];\n\n    CCLayer*\
    \ userInterfaceLayer = [HelloWorldUserInterface node];\n    [scene addChild: userInterfaceLayer];\n\
    \n    return scene;\n}\n```\n\n这个场景现在有三个不同的层：`backgroundLayer`、常规的游戏对象层 `layer`，以及在其上方的\
    \ `userInterfaceLayer`。由于层是按创建顺序添加到场景中的，因此添加到 `backgroundLayer` 的任何节点都将绘制在其他层的后面。同样，添加到\
    \ `userInterfaceLayer` 的节点将始终绘制在 `layer` 和 `backgroundLayer` 中任何节点的上方。\n\n**提示：**\
    \ 再次强调，严格来说，一个层不必派生自 `CCLayer` 类；它也可以是一个简单的 `CCNode`。当你只需要将节点分组在一起，而不需要该层来处理输入时，这通常是更好的选择。\n\
    \n你可能想要在每个场景中使用多个层的一种情况是，你有一个滚动的背景和一个围绕背景的静态框架，其中可能包括用户界面元素。使用两个独立的层，只需调整背景层的位置即可轻松移动它，而前景层则保持不动。此外，同一层的所有对象将根据层的\
    \ z 顺序，要么位于另一层对象的前面，要么位于其后面。当然，不使用层也能达到同样的效果，但这需要单独移动背景中的每个独立对象。这效率很低，所以如果可能的话，尽量避免这样做。\n\
    \n与场景一样，层的尺寸与 cocos2d OpenGL 视图的尺寸相同。对于 iOS 设备，这几乎总是屏幕的尺寸；在 Mac OS X 上，则是窗口的尺寸。\n\
    \n层主要是一种分组概念。例如，你可以对层使用任何动作，该动作将影响该层上的所有对象。这意味着你可以同步移动层上的所有对象，或者一次性旋转或缩放它们。通常，如果你需要一组对象执行相同的动作和行为，就使用一个层。移动所有对象以滚动它们就是其中一种情况；有时你可能想要旋转它们或重新排序它们，以便它们绘制在其他对象之上。如果所有这些对象都是一个层的子对象，你可以简单地更改层的属性，或者对层运行动作，以影响其所有子节点。\n\
    \n**注意：** 有一个建议是不要在每场景中使用过多的 `CCLayer` 对象。这经常被误解。你可以使用任意多的层，而不会比使用任何其他节点对性能产生更大的影响。但是，如果该层也接受输入，情况就不同了，因为接收触摸或加速度计事件是开销很大的任务。因此，你不应该使用多个层来接收触摸或加速度计输入；一个就够了。最好是由一个层接收和处理输入，并在必要时通过将输入事件转发给注册的对象来通知其他节点或类。你通常通过\
    \ `performSelector` 方法来实现这一点，该方法会调用一个具有定义方法签名的方法。参见 cocos2d 的 `CCScheduler` 类以获取实现示例。\n"
- fmt: "### Receiving Touch Events\n\nThe `CCLayer` class is designed to receive touch\
    \ input but only if you explicitly enable it. To enable receiving touch events,\
    \ set the property `isTouchEnabled` to `YES`:\n\n`self.isTouchEnabled = YES;`\n\
    \nThis is best done in the class’s `init` method, but it can be changed at any\
    \ time.\n\nOnce the `isTouchEnabled` property is set, a variety of methods for\
    \ receiving touch input will start to get called. These are the events received\
    \ when a new touch begins, when a finger is moved on the touchscreen, and when\
    \ the user lifts his finger off the screen. Canceled touches are rare, and you\
    \ can safely ignore this method for the most part or simply forward it to the\
    \ `ccTouchesEnded` method.\n\n- This is called when a finger just begins touching\
    \ the screen: `-(void) ccTouchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`\n\
    - This is called whenever the finger moves on the screen: `-(void) ccTouchesMoved:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n- This is called when a finger is lifted\
    \ off the screen: `-(void) ccTouchesEnded:(NSSet *)touches withEvent:(UIEvent\
    \ *)event`\n- This is called to cancel a touch: `-(void) ccTouchesCancelled:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\nCancel events are rare and should behave\
    \ just like touches ended in most cases.\n\nIn many cases, you’ll want to know\
    \ where a touch occurred. Since the touch events are received by the Cocoa Touch\
    \ API, the location must be converted to OpenGL coordinates. The following is\
    \ a method that does this for you:\n\n```\n-(CGPoint) locationFromTouches:(NSSet\
    \ *)touches\n{\n    UITouch *touch = [touches anyObject];\n    CGPoint touchLocation\
    \ = [touch locationInView: [touch view]];\n    return [[CCDirector sharedDirector]\
    \ convertToGL:touchLocation];\n}\n```\n\nThis method works only with a single\
    \ touch since it uses `[touches anyObject]`. To keep track of multitouch locations,\
    \ you have to keep track of each touch individually.\n\nBy default, the layer\
    \ receives the same events as Apple’s `UIResponder` class. Cocos2d also supports\
    \ targeted touch handlers. The difference is that targeted touches receive only\
    \ one touch at a time, in comparison to the `UIResponder` touch events that always\
    \ receive a set of touches. The targeted touch handler simply splits those touches\
    \ into separate events that, depending on your game’s needs, may be easier to\
    \ work with. More importantly, it allows you to remove certain touches from the\
    \ event queue, specifying that you’ve handled this touch and don’t want it to\
    \ be forwarded to other layers. This makes it easy to sort out if touches are\
    \ in a specific area of the screen; if they are, you mark the touch as claimed,\
    \ and all the remaining layers don’t need to do this area check again.\n\nTo enable\
    \ the targeted touch handler, add the following method to your layer’s class:\n\
    \n```\n-(void) registerWithTouchDispatcher\n{\n    [[CCTouchDispatcher sharedDispatcher]\
    \ addTargetedDelegate:self\n                                                 \
    \    priority:INT_MIN+1\n                                              swallowsTouches:YES];\n\
    }\n```\n\n**CAUTION:** If you leave the `registerWithTouchDispatcher` method empty,\
    \ you won’t receive any touches at all! If you want to keep the method but also\
    \ want to use the default handler, you’ll have to call `[super registerWithTouchDispatcher]`\
    \ in this method.\n\nNow, instead of using the default touch input methods, you’ll\
    \ be using a slightly different set of methods. They are almost equivalent with\
    \ the exception of receiving a `(UITouch*) touch` instead of a `(NSSet*) touches`\
    \ as the first parameter:\n\n```\n-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {}\n-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event\
    \ {}\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {}\n-(void)\
    \ ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event {}\n```\n\nWhat’s\
    \ important to note here is that `ccTouchBegan` returns a `BOOL` value. If you\
    \ return `YES` in that method, it means you don’t want this particular touch to\
    \ be propagated to other targeted touch handlers with a lower priority. You have\
    \ effectively “swallowed” this touch.\n\n**NOTE:** Cocos2d has no built-in support\
    \ for recognizing gestures. You will have to roll out your own gesture recognition\
    \ code, possibly with the help of Apple’s Gesture Recognizers: [`http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html`](http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html).\n\
    \n### Receiving Accelerometer Events\n\nLike touch input, the accelerometer must\
    \ be specifically enabled to receive accelerometer events:\n\n`self.isAccelerometerEnabled\
    \ = YES;`\n\nOnce more, there’s a specific method to be added to the layer that\
    \ receives the accelerometer events:\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n                                        didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n    CCLOG(@\"acceleration: x:%f / y:%f / z:%f\",\n      \
    \                                  acceleration.x, acceleration.y, acceleration.z);\n\
    }\n```\n\nYou can use the `acceleration` parameter to determine the acceleration\
    \ in any of the three directions.\n\n### Receiving Keyboard Events\n\nIf you’re\
    \ creating a Mac OS X app, you will want to be able to process keyboard presses.\
    \ You first have to enable keyboard events:\n\n`self.isKeyboardEnabled = YES;`\n\
    \nThe callback methods to receive keyboard events are defined in the `CCKeyboardEventDelegate`\
    \ protocol as follows:\n\n```\n-(BOOL) ccKeyDown:(NSEvent*)event\n{\n    CCLOG(@\"\
    key pressed: %@\", [event characters]);\n}\n\n-(BOOL) ccKeyUp:(NSEvent*)event\n\
    {\n    CCLOG(@\"key released: %@\", [event characters]);\n}\n\n-(BOOL) ccFlagsChanged:(NSEvent*)event\n\
    {\n    CCLOG(@\"flags changed: %@\", [event characters]);\n}\n```\n\nThe flags\
    \ changed event is received whenever the user presses or releases a modifier key,\
    \ regardless of whether any other key is pressed at the same time. You can use\
    \ it to implement controls that are assigned directly to a modifier key.\n\nA\
    \ very simplistic keyboard event check to react to presses or releases of the\
    \ key D would go something like this:\n\n```\nNSString* key = [event charactersIgnoringModifiers];\n\
    if ([key isEqualToString:@\"d\"] || [key isEqualToString:@\"D\"])\n{\n    CCLOG(@\"\
    D key\");\n}\n```\n\nChecking for the uppercase variant is good style because\
    \ the player may have the Caps Lock key activated by accident or otherwise. The\
    \ cocos2d forum has a thread with more involved example code for implementing\
    \ keyboard controls: [`www.cocos2d-iphone.org/forum/topic/11725`](http://www.cocos2d-iphone.org/forum/topic/11725).\n\
    \nTo learn more about keyboard event handling in general, I recommend reading\
    \ Apple’s documentation on handling key events:\n[`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`](http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html).\n\
    \nThe `NSEvent` class is crucial not only for keyboard but also for mouse and\
    \ other events. Because of this, it will be a good idea to take a look at the\
    \ `NSEvent` class reference:\n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html)."
  raw: '##### Receiving Touch Events


    The `CCLayer` class is designed to receive touch input but only if you explicitly
    enable it. To enable receiving touch events, set the property `isTouchEnabled`
    to `YES`:


    `self.isTouchEnabled = YES;`


    This is best done in the class’s `init` method, but it can be changed at any time.


    Once the `isTouchEnabled` property is set, a variety of methods for receiving
    touch input will start to get called. These are the events received when a new
    touch begins, when a finger is moved on the touchscreen, and when the user lifts
    his finger off the screen. Canceled touches are rare, and you can safely ignore
    this method for the most part or simply forward it to the `ccTouchesEnded` method.


    *   This is called when a finger just begins touching the screen: `-(void) ccTouchesBegan:(NSSet
    *)touches withEvent:(UIEvent *)event`

    *   This is called whenever the finger moves on the screen: `-(void) ccTouchesMoved:(NSSet
    *)touches withEvent:(UIEvent *)event`

    *   This is called when a finger is lifted off the screen: `-(void) ccTouchesEnded:(NSSet
    *)touches withEvent:(UIEvent *)event`

    *   This is called to cancel a touch: `-(void) ccTouchesCancelled:(NSSet *)touches
    withEvent:(UIEvent *)event`


    Cancel events are rare and should behave just like touches ended in most cases.


    In many cases, you’ll want to know where a touch occurred. Since the touch events
    are received by the Cocoa Touch API, the location must be converted to OpenGL
    coordinates. The following is a method that does this for you:


    `-(CGPoint) locationFromTouches:(NSSet *)touches`

    `{`

    `    UITouch *touch = [touches anyObject];`

    `    CGPoint touchLocation = [touch locationInView: [touch view]];`

    `    return [[CCDirector sharedDirector] convertToGL:touchLocation];`

    `}`


    This method works only with a single touch since it uses `[touches anyObject]`.
    To keep track of multitouch locations, you have to keep track of each touch individually.


    By default, the layer receives the same events as Apple’s `UIResponder` class.
    Cocos2d also supports targeted touch handlers. The difference is that targeted
    touches receive only one touch at a time, in comparison to the `UIResponder` touch
    events that always receive a set of touches. The targeted touch handler simply
    splits those touches into separate events that, depending on your game’s needs,
    may be easier to work with. More importantly, it allows you to remove certain
    touches from the event queue, specifying that you’ve handled this touch and don’t
    want it to be forwarded to other layers. This makes it easy to sort out if touches
    are in a specific area of the screen; if they are, you mark the touch as claimed,
    and all the remaining layers don’t need to do this area check again.


    To enable the targeted touch handler, add the following method to your layer’s
    class:


    `-(void) registerWithTouchDispatcher`

    `{`

    `    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self`

    `                                                     priority:INT_MIN+1`

    `                                              swallowsTouches:YES];`

    `}`


    **CAUTION:** If you leave the `registerWithTouchDispatcher` method empty, you
    won’t receive any touches at all! If you want to keep the method but also want
    to use the default handler, you’ll have to call `[super registerWithTouchDispatcher]`
    in this method.


    Now, instead of using the default touch input methods, you’ll be using a slightly
    different set of methods. They are almost equivalent with the exception of receiving
    a `(UITouch*) touch` instead of a `(NSSet*) touches` as the first parameter:


    `-(BOOL) ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event {}`

    `-(void) ccTouchMoved:(UITouch *)touch withEvent:(UIEvent *)event {}`

    `-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {}`

    `-(void) ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event {}`


    What’s important to note here is that `ccTouchBegan` returns a `BOOL` value. If
    you return `YES` in that method, it means you don’t want this particular touch
    to be propagated to other targeted touch handlers with a lower priority. You have
    effectively “swallowed” this touch.


    **NOTE:** Cocos2d has no built-in support for recognizing gestures. You will have
    to roll out your own gesture recognition code, possibly with the help of Apple’s
    Gesture Recognizers: [`http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html`](http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html).


    ##### Receiving Accelerometer Events


    Like touch input, the accelerometer must be specifically enabled to receive accelerometer
    events:


    `self.isAccelerometerEnabled = YES;`


    Once more, there’s a specific method to be added to the layer that receives the
    accelerometer events:


    `-(void) accelerometer:(UIAccelerometer *)accelerometer`

    `                                                                didAccelerate:(UIAcceleration
    *)acceleration`

    `{`

    `    CCLOG(@"acceleration: x:%f / y:%f / z:%f",`![images](images/U002.jpg)

    `                                        acceleration.x, acceleration.y, acceleration.z);`

    `}`


    You can use the `acceleration` parameter to determine the acceleration in any
    of the three directions.


    ##### Receiving Keyboard Events


    If you’re creating a Mac OS X app, you will want to be able to process keyboard
    presses. You first have to enable keyboard events:


    `self.isKeyboardEnabled = YES;`


    The callback methods to receive keyboard events are defined in the `CCKeyboardEventDelegate`
    protocol as follows:


    `-(BOOL) ccKeyDown:(NSEvent*)event`

    `{`

    `    CCLOG(@"key pressed: %@", [event characters]);`

    `}`


    `-(BOOL) ccKeyUp:(NSEvent*)event`

    `{`

    `    CCLOG(@"key released: %@", [event characters]);`

    `}`


    `-(BOOL) ccFlagsChanged:(NSEvent*)event`

    `{`

    `    CCLOG(@"flags changed: %@", [event characters]);`

    `}`


    The flags changed event is received whenever the user presses or releases a modifier
    key, regardless of whether any other key is pressed at the same time. You can
    use it to implement controls that are assigned directly to a modifier key.


    A very simplistic keyboard event check to react to presses or releases of the
    key D would go something like this:


    `NSString* key = [event charactersIgnoringModifiers];`

    `if ([key isEqualToString:@"d"] || [key isEqualToString:@"D"])`

    `{`

    `    CCLOG(@"D key");`

    `}`


    Checking for the uppercase variant is good style because the player may have the
    Caps Lock key activated by accident or otherwise. The cocos2d forum has a thread
    with more involved example code for implementing keyboard controls: [`www.cocos2d-iphone.org/forum/topic/11725`](http://www.cocos2d-iphone.org/forum/topic/11725).


    To learn more about keyboard event handling in general, I recommend reading Apple’s
    documentation on handling key events:

    [`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`](http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html).


    The `NSEvent` class is crucial not only for keyboard but also for mouse and other
    events. Because of this, it will be a good idea to take a look at the `NSEvent`
    class reference:

    [`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html).'
  trans: "\n### 接收触摸事件\n\n`CCLayer` 类设计用于接收触摸输入，但前提是您需要显式启用它。要启用触摸事件接收，请将属性 `isTouchEnabled`\
    \ 设置为 `YES`：\n\n`self.isTouchEnabled = YES;`\n\n最好在类的 `init` 方法中执行此操作，但也可以随时更改。\n\
    \n一旦设置了 `isTouchEnabled` 属性，一系列用于接收触摸输入的方法就会被调用。这些事件会在新触摸开始、手指在触摸屏上移动以及用户将手指从屏幕上抬起时被接收。取消触摸的情况很少见，大多数情况下您可以安全地忽略此方法，或者直接将其转发到\
    \ `ccTouchesEnded` 方法。\n\n-   当手指刚开始触摸屏幕时调用：`-(void) ccTouchesBegan:(NSSet *)touches\
    \ withEvent:(UIEvent *)event`\n-   每当手指在屏幕上移动时调用：`-(void) ccTouchesMoved:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n-   当手指从屏幕上抬起时调用：`-(void) ccTouchesEnded:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n-   用于取消触摸时调用：`-(void) ccTouchesCancelled:(NSSet\
    \ *)touches withEvent:(UIEvent *)event`\n\n取消事件很少见，在大多数情况下其行为应与触摸结束一致。\n\n在许多情况下，您需要知道触摸发生的位置。由于触摸事件由\
    \ Cocoa Touch API 接收，因此必须将位置转换为 OpenGL 坐标。以下是一个为您完成此操作的方法：\n\n```\n-(CGPoint)\
    \ locationFromTouches:(NSSet *)touches\n{\n    UITouch *touch = [touches anyObject];\n\
    \    CGPoint touchLocation = [touch locationInView: [touch view]];\n    return\
    \ [[CCDirector sharedDirector] convertToGL:touchLocation];\n}\n```\n\n此方法仅适用于单点触摸，因为它使用了\
    \ `[touches anyObject]`。要跟踪多点触摸位置，您必须单独跟踪每个触摸。\n\n默认情况下，图层接收与 Apple 的 `UIResponder`\
    \ 类相同的事件。Cocos2d 也支持目标触摸处理程序。区别在于，与总是接收一组触摸的 `UIResponder` 触摸事件相比，目标触摸一次只接收一个触摸。目标触摸处理程序只是将这些触摸拆分为单独的事件，根据您的游戏需求，这可能更容易处理。更重要的是，它允许您从事件队列中移除某些触摸，指定您已经处理过此触摸并且不希望它被转发到其他图层。这使得判断触摸是否位于屏幕的特定区域变得容易；如果是，您可以将该触摸标记为已占用，其余图层就不需要再次执行此区域检查。\n\
    \n要启用目标触摸处理程序，请将以下方法添加到您的图层类中：\n\n```\n-(void) registerWithTouchDispatcher\n{\n\
    \    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self\n        \
    \                                             priority:INT_MIN+1\n           \
    \                                   swallowsTouches:YES];\n}\n```\n\n**注意：** 如果您将\
    \ `registerWithTouchDispatcher` 方法留空，您将根本收不到任何触摸！如果您想保留该方法但同时希望使用默认处理程序，则必须在此方法中调用\
    \ `[super registerWithTouchDispatcher]`。\n\n现在，您将使用一组略微不同的方法，而不是默认的触摸输入方法。它们几乎是等效的，区别在于第一个参数接收的是\
    \ `(UITouch*) touch` 而不是 `(NSSet*) touches`：\n\n```\n-(BOOL) ccTouchBegan:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {}\n-(void) ccTouchMoved:(UITouch *)touch\
    \ withEvent:(UIEvent *)event {}\n-(void) ccTouchEnded:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {}\n-(void) ccTouchCancelled:(UITouch *)touch withEvent:(UIEvent *)event\
    \ {}\n```\n\n这里需要注意的是 `ccTouchBegan` 返回一个 `BOOL` 值。如果您在该方法中返回 `YES`，则表示您不希望该特定触摸被传播给优先级较低的其他目标触摸处理程序。您实际上已经“吞没”了这个触摸。\n\
    \n**注意：** Cocos2d 没有内置的手势识别支持。您需要自行编写手势识别代码，可能还需要借助 Apple 的手势识别器：[`http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html`](http://developer.apple.com/library/ios/#documentation/EventHandling/Conceptual/EventHandlingiPhoneOS/GestureRecognizers/GestureRecognizers.html)。\n\
    \n### 接收加速计事件\n\n与触摸输入类似，必须专门启用加速计才能接收加速计事件：\n\n`self.isAccelerometerEnabled =\
    \ YES;`\n\n同样，有一个特定的方法需要添加到接收加速计事件的图层中：\n\n```\n-(void) accelerometer:(UIAccelerometer\
    \ *)accelerometer\n                                        didAccelerate:(UIAcceleration\
    \ *)acceleration\n{\n    CCLOG(@\"acceleration: x:%f / y:%f / z:%f\",\n      \
    \                                  acceleration.x, acceleration.y, acceleration.z);\n\
    }\n```\n\n您可以使用 `acceleration` 参数来确定任意三个方向上的加速度。\n\n### 接收键盘事件\n\n如果您正在创建 Mac\
    \ OS X 应用程序，您将需要能够处理键盘按键。您首先需要启用键盘事件：\n\n`self.isKeyboardEnabled = YES;`\n\n用于接收键盘事件的回调方法在\
    \ `CCKeyboardEventDelegate` 协议中定义如下：\n\n```\n-(BOOL) ccKeyDown:(NSEvent*)event\n\
    {\n    CCLOG(@\"key pressed: %@\", [event characters]);\n}\n\n-(BOOL) ccKeyUp:(NSEvent*)event\n\
    {\n    CCLOG(@\"key released: %@\", [event characters]);\n}\n\n-(BOOL) ccFlagsChanged:(NSEvent*)event\n\
    {\n    CCLOG(@\"flags changed: %@\", [event characters]);\n}\n```\n\n每当用户按下或释放修饰键时，无论是否同时按下任何其他键，都会接收到标志更改事件。您可以使用它来实现直接分配给修饰键的控件。\n\
    \n一个非常简单的键盘事件检查，用于响应 D 键的按下或释放，可以像这样实现：\n\n```\nNSString* key = [event charactersIgnoringModifiers];\n\
    if ([key isEqualToString:@\"d\"] || [key isEqualToString:@\"D\"])\n{\n    CCLOG(@\"\
    D key\");\n}\n```\n\n检查大写变体是一种良好的风格，因为玩家可能无意中或由于其他原因启用了 Caps Lock 键。cocos2d 论坛有一个包含更复杂示例代码的帖子，用于实现键盘控制：[`www.cocos2d-iphone.org/forum/topic/11725`](http://www.cocos2d-iphone.org/forum/topic/11725)。\n\
    \n要更全面地了解键盘事件处理，我建议阅读 Apple 关于处理按键事件的文档：\n[`http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html`](http://developer.apple.com/library/mac/#documentation/cocoa/conceptual/EventOverview/HandlingKeyEvents/HandlingKeyEvents.html)。\n\
    \n`NSEvent` 类不仅对键盘事件至关重要，对鼠标和其他事件也是如此。因此，查看 `NSEvent` 类的参考文档是个好主意：\n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/ApplicationKit/Classes/NSEvent_Class/Reference/Reference.html)。\n"
- fmt: "### Receiving Mouse Events\n\nSimilar to all other input methods, you first\
    \ have to enable mouse input via the following:\n\n`self.isMouseEnabled = YES;`\n\
    \nThen your layer will start receiving `CCMouseEventDelegate` protocol messages,\
    \ of which there are quite a number:\n\n```\n// received when the mouse moves\
    \ with no button pressed\n-(BOOL) ccMouseMoved:(NSEvent*)event {}\n\n// received\
    \ when the mouse moves while the corresponding button is held down\n-(BOOL) ccMouseDragged:(NSEvent*)event\
    \ {}\n-(BOOL) ccRightMouseDragged:(NSEvent*)event {}\n-(BOOL) ccOtherMouseDragged:(NSEvent*)event\
    \ {}\n\n// received when the corresponding mouse button is pressed (left, right,\
    \ other)\n-(BOOL) ccMouseDown:(NSEvent*)event {}\n-(BOOL) ccRightMouseDown:(NSEvent*)event\
    \ {}\n-(BOOL) ccOtherMouseDown:(NSEvent*)event {}\n\n// received when the corresponding\
    \ mouse button is released (left, right, other)\n-(BOOL) ccMouseUp:(NSEvent*)event\
    \ {}\n-(BOOL) ccRightMouseUp:(NSEvent*)event {}\n-(BOOL) ccOtherMouseUp:(NSEvent*)event\
    \ {}\n\n// received when the scroll wheel is turned\n-(BOOL) ccScrollWheel:(NSEvent*)event\
    \ {}\n```\n\nSince you get specific events for each mouse button, the `NSEvent`\
    \ object is mainly used to get the current mouse cursor position. You will have\
    \ to convert that position to cocos2d coordinates via the Director’s `convertEventToGL`\
    \ method:\n\n```\nCGPoint mousePos = [[CCDirector sharedDirector] convertEventToGL:event];\n\
    ```\n\nApple has a great tutorial on handling mouse events if you need to learn\
    \ more about mouse event handling:  \n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html).\n\
    \n### CCSprite\n\n`CCSprite` is certainly the most commonly used class. It uses\
    \ an image to display the sprite on-screen. The simplest way to create a sprite\
    \ is from a file that will be loaded into a `CCTexture2D` texture and assigned\
    \ to the sprite. You have to add the image file to the Resources group in Xcode;\
    \ otherwise, the app will not be able to find the file:\n\n```\nCCSprite* sprite\
    \ = [CCSprite spriteWithFile:@”Default.png”];\n[self addChild:sprite];\n```\n\n\
    Here’s a question for you: where do you think this sprite will be positioned on\
    \ the screen? Contrary to what you might be used to from other game engines, the\
    \ texture is centered on the sprite’s position. The sprite just initialized will\
    \ be located at position 0,0, so it is positioned at the lower-left corner of\
    \ the screen. Because the sprite’s texture is centered on the sprite’s position,\
    \ the texture will be only partially visible. Assuming the image is 80 by 30 pixels\
    \ in size, you’d have to move the sprite to position 40,15 to make the texture\
    \ align perfectly with the lower-left corner of the screen and be fully visible.\n\
    \nWhile unusual at first glance, centering the texture on the sprite does have\
    \ great advantages. Once you start using the rotation or scale properties of the\
    \ sprite, the sprite will stay centered on its position.\n\n**WARNING:** File\
    \ names are case-sensitive on iOS devices. While you’re on the simulator, the\
    \ file name’s case doesn’t matter, but when you switch to testing on the device,\
    \ it will most likely crash if the file name is actually something like `@“default.PNG”`,\
    \ as in the example.\n\nThis has caused many developers serious headaches, and\
    \ it’s another reason you should test on the device often. It’s also a good idea\
    \ to come up with a naming scheme for file names and stick to it. Personally,\
    \ I keep them in lowercase, using dashes where needed to separate words.\n\n####\
    \ Anchor Points Demystified\n\nEvery node has an anchor point, but it only starts\
    \ to make a difference if the node has a texture, like `CCSprite` or `CCLabelTTF`.\
    \ By default, the `anchorPoint` property is at 0.5,0.5, or, in other words, at\
    \ the center of the texture.\n\nThe anchor point has nothing to do with the node’s\
    \ position, even though changing the `anchorPoint` will change where the texture\
    \ is rendered on the screen. By modifying the `anchorPoint`, you change only where\
    \ the texture of the node is drawn relative to the node’s position. But that also\
    \ raises the question, why would you want to modify the `anchorPoint`, and what\
    \ effects can you achieve by doing so?\n\nFor example, setting the `anchorPoint`\
    \ to 0,0 effectively moves the texture so that its lower-left corner aligns with\
    \ the node’s position. If you set the `anchorPoint` to 1,1 instead, the top-right\
    \ corner of the texture will align with the node’s position. Sometimes this can\
    \ be useful to align textures with the screen borders or other elements; specifically,\
    \ it is useful as a way for `CCLabel` classes to, for example, right align or\
    \ top align the text.\n\nGenerally, you do not want to modify the `anchorPoint`\
    \ unless you have a good reason to do so, because it can have wide-ranging side\
    \ effects such as offsetting position-based collision checks. It will also have\
    \ an effect on rotation and scaling because the texture will no longer be rotated\
    \ or scaled around its center position.\n\nIn this example code, the sprite image\
    \ will neatly align with the lower-left corner of the screen because its `anchorPoint`\
    \ is set to 0,0, which causes the texture’s lower-left corner to align with the\
    \ sprite’s default `position`, which is also 0,0:\n\n```\nCCSprite* sprite = [CCSprite\
    \ spriteWithFile:@”Default.png”];\nsprite.anchorPoint = CGPointMake(0, 0);\n[self\
    \ addChild:sprite];\n```\n\n#### Texture Dimensions\n\nTexture dimensions deserve\
    \ a special mention. iOS devices so far can work only with textures whose dimensions\
    \ are a power of two, so the individual width and height of a texture can be 2,\
    \ 4, 8, 16, 32, 64, 128, 256, 512, 1024, and, beginning with third-generation\
    \ devices, even 2048 pixels. The textures don’t need to be square, so a texture\
    \ with a size of 8 by 1024 pixels is perfectly fine.\n\nThis comes into play whenever\
    \ you create a texture, for example by creating a sprite from an image file. Let’s\
    \ check the worst-case scenario right away by assuming you have an image that\
    \ is 260 by 260 pixels in size with 32-bit colors. In memory, the texture should\
    \ use around 270KB, yet the texture is using a whopping 1MB!\n\nThe almost fourfold\
    \ increase stems from the fact that textures need to be powers of two in width\
    \ and height, so the iOS device simply creates a texture with the smallest dimension\
    \ that’s still a power of two but large enough to contain the image. In the case\
    \ of the 260 by 260 texture, the next best option is to create a 512 by 512 pixel\
    \ texture in memory, which uses 1MB of memory.\n\nThere’s nothing you can do about\
    \ this, other than creating images that are already powers of two from the start.\
    \ The 260 by 260 pixel texture should really be a 256 by 256 texture instead so\
    \ it doesn’t waste that much memory. If you work with an artist, make sure she\
    \ is aware of this issue.\n\nIn [Chapter 6](#Chapter06.html#ch6), I’ll show you\
    \ how you can alleviate this problem to a great extent by creating and using a\
    \ Texture Atlas."
  raw: '##### Receiving Mouse Events


    Similar to all other input methods, you first have to enable mouse input via the
    following:


    `self.isMouseEnabled = YES;`


    Then your layer will start receiving `CCMouseEventDelegate` protocol messages,
    of which there are quite a number:


    `// received when the mouse moves with no button pressed`

    `-(BOOL) ccMouseMoved:(NSEvent*)event {}`


    `// received when the mouse moves while the corresponding button is held down`

    `-(BOOL) ccMouseDragged:(NSEvent*)event {}`

    `-(BOOL) ccRightMouseDragged:(NSEvent*)event {}`

    `-(BOOL) ccOtherMouseDragged:(NSEvent*)event {}`


    `// received when the corresponding mouse button is pressed (left, right, other)`

    `-(BOOL) ccMouseDown:(NSEvent*)event {}`

    `-(BOOL) ccRightMouseDown:(NSEvent*)event {}`

    `-(BOOL) ccOtherMouseDown:(NSEvent*)event {}`


    `// received when the corresponding mouse button is released (left, right, other)`

    `-(BOOL) ccMouseUp:(NSEvent*)event {}`

    `-(BOOL) ccRightMouseUp:(NSEvent*)event {}`

    `-(BOOL) ccOtherMouseUp:(NSEvent*)event {}`


    `// received when the scroll wheel is turned`

    `-(BOOL) ccScrollWheel:(NSEvent*)event {}`


    Since you get specific events for each mouse button, the `NSEvent` object is mainly
    used to get the current mouse cursor position. You will have to convert that position
    to cocos2d coordinates via the Director’s `convertEventToGL` method:


    `CGPoint mousePos = [[CCDirector sharedDirector] convertEventToGL:event];`


    Apple has a great tutorial on handling mouse events if you need to learn more
    about mouse event handling:

    [`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html).


    ### CCSprite


    `CCSprite` is certainly the most commonly used class. It uses an image to display
    the sprite on-screen. The simplest way to create a sprite is from a file that
    will be loaded into a `CCTexture2D` texture and assigned to the sprite. You have
    to add the image file to the Resources group in Xcode; otherwise, the app will
    not be able to find the file:


    `CCSprite* sprite = [CCSprite spriteWithFile:@”Default.png”];`

    `[self addChild:sprite];`


    Here’s a question for you: where do you think this sprite will be positioned on
    the screen? Contrary to what you might be used to from other game engines, the
    texture is centered on the sprite’s position. The sprite just initialized will
    be located at position 0,0, so it is positioned at the lower-left corner of the
    screen. Because the sprite’s texture is centered on the sprite’s position, the
    texture will be only partially visible. Assuming the image is 80 by 30 pixels
    in size, you’d have to move the sprite to position 40,15 to make the texture align
    perfectly with the lower-left corner of the screen and be fully visible.


    While unusual at first glance, centering the texture on the sprite does have great
    advantages. Once you start using the rotation or scale properties of the sprite,
    the sprite will stay centered on its position.


    **WARNING:** File names are case-sensitive on iOS devices. While you’re on the
    simulator, the file name’s case doesn’t matter, but when you switch to testing
    on the device, it will most likely crash if the file name is actually something
    like @“default.PNG”, as in the example.


    This has caused many developers serious headaches, and it’s another reason you
    should test on the device often. It’s also a good idea to come up with a naming
    scheme for file names and stick to it. Personally, I keep them in lowercase, using
    dashes where needed to separate words.


    #### Anchor Points Demystified


    Every node has an anchor point, but it only starts to make a difference if the
    node has a texture, like `CCSprite` or `CCLabelTTF`. By default, the `anchorPoint`
    property is at 0.5,0.5, or, in other words, at the center of the texture.


    The anchor point has nothing to do with the node’s position, even though changing
    the `anchorPoint` will change where the texture is rendered on the screen. By
    modifying the `anchorPoint`, you change only where the texture of the node is
    drawn relative to the node’s position. But that also raises the question, why
    would you want to modify the `anchorPoint`, and what effects can you achieve by
    doing so?


    For example, setting the `anchorPoint` to 0,0 effectively moves the texture so
    that its lower-left corner aligns with the node’s position. If you set the `anchorPoint`
    to 1,1 instead, the top-right corner of the texture will align with the node’s
    position. Sometimes this can be useful to align textures with the screen borders
    or other elements; specifically, it is useful as a way for `CCLabel` classes to,
    for example, right align or top align the text.


    Generally, you do not want to modify the `anchorPoint` unless you have a good
    reason to do so, because it can have wide-ranging side effects such as offsetting
    position-based collision checks. It will also have an effect on rotation and scaling
    because the texture will no longer be rotated or scaled around its center position.


    In this example code, the sprite image will neatly align with the lower-left corner
    of the screen because its `anchorPoint` is set to 0,0, which causes the texture’s
    lower-left corner to align with the sprite’s default `position`, which is also
    0,0:


    `CCSprite* sprite = [CCSprite spriteWithFile:@”Default.png”];`

    `sprite.anchorPoint = CGPointMake(0, 0);`

    `[self addChild:sprite];`


    #### Texture Dimensions


    Texture dimensions deserve a special mention. iOS devices so far can work only
    with textures whose dimensions are a power of two, so the individual width and
    height of a texture can be 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, and, beginning
    with third-generation devices, even 2048 pixels. The textures don’t need to be
    square, so a texture with a size of 8 by 1024 pixels is perfectly fine.


    This comes into play whenever you create a texture, for example by creating a
    sprite from an image file. Let’s check the worst-case scenario right away by assuming
    you have an image that is 260 by 260 pixels in size with 32-bit colors. In memory,
    the texture should use around 270KB, yet the texture is using a whopping 1MB!


    The almost fourfold increase stems from the fact that textures need to be powers
    of two in width and height, so the iOS device simply creates a texture with the
    smallest dimension that’s still a power of two but large enough to contain the
    image. In the case of the 260 by 260 texture, the next best option is to create
    a 512 by 512 pixel texture in memory, which uses 1MB of memory.


    There’s nothing you can do about this, other than creating images that are already
    powers of two from the start. The 260 by 260 pixel texture should really be a
    256 by 256 texture instead so it doesn’t waste that much memory. If you work with
    an artist, make sure she is aware of this issue.


    In [Chapter 6](#Chapter06.html#ch6), I’ll show you how you can alleviate this
    problem to a great extent by creating and using a Texture Atlas.'
  trans: "\n### 接收鼠标事件\n\n与其他所有输入方式类似，你首先需要通过以下方式启用鼠标输入：\n\n`self.isMouseEnabled =\
    \ YES;`\n\n然后你的层将开始接收`CCMouseEventDelegate`协议消息，这些消息的数量相当多：\n\n```\n// 当鼠标在无按键按下时移动时收到\n\
    -(BOOL) ccMouseMoved:(NSEvent*)event {}\n\n// 当对应的鼠标键按住时移动时收到\n-(BOOL) ccMouseDragged:(NSEvent*)event\
    \ {}\n-(BOOL) ccRightMouseDragged:(NSEvent*)event {}\n-(BOOL) ccOtherMouseDragged:(NSEvent*)event\
    \ {}\n\n// 当对应的鼠标键按下时收到（左键、右键、其他键）\n-(BOOL) ccMouseDown:(NSEvent*)event {}\n-(BOOL)\
    \ ccRightMouseDown:(NSEvent*)event {}\n-(BOOL) ccOtherMouseDown:(NSEvent*)event\
    \ {}\n\n// 当对应的鼠标键松开时收到（左键、右键、其他键）\n-(BOOL) ccMouseUp:(NSEvent*)event {}\n-(BOOL)\
    \ ccRightMouseUp:(NSEvent*)event {}\n-(BOOL) ccOtherMouseUp:(NSEvent*)event {}\n\
    \n// 当滚轮滚动时收到\n-(BOOL) ccScrollWheel:(NSEvent*)event {}\n```\n\n由于你为每个鼠标按钮都获得了特定事件，`NSEvent`对象主要用于获取当前鼠标光标位置。你需要通过导演类的`convertEventToGL`方法将该位置转换为\
    \ cocos2d 坐标：\n\n```\nCGPoint mousePos = [[CCDirector sharedDirector] convertEventToGL:event];\n\
    ```\n\n如果你需要了解更多关于处理鼠标事件的知识，苹果官方有一份很棒的教程：  \n[`http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Conceptual/EventOverview/HandlingMouseEvents/HandlingMouseEvents.html).\n\
    \n### CCSprite\n\n`CCSprite`无疑是最常用的类。它使用图像在屏幕上显示精灵。创建精灵最简单的方法是从一个文件加载，该文件将被加载到`CCTexture2D`纹理中并分配给精灵。你必须将图像文件添加到\
    \ Xcode 的 Resources 组中；否则，应用程序将无法找到该文件：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@”Default.png”];\n\
    [self addChild:sprite];\n```\n\n这里有个问题：你认为这个精灵会被定位在屏幕的什么位置？与你可能习惯的其他游戏引擎不同，纹理是居中于精灵位置的。刚刚初始化的精灵将位于位置\
    \ 0,0，因此它被定位在屏幕的左下角。由于精灵的纹理是居中于精灵位置的，纹理将只能部分可见。假设图像大小为 80×30 像素，你需要将精灵移动到位置 40,15，才能使纹理与屏幕左下角完美对齐并完全可见。\n\
    \n虽然乍看起来不寻常，但将纹理居中于精灵确实有很大优势。一旦你开始使用精灵的旋转或缩放属性，精灵将始终保持在其位置的中心。\n\n**警告：** 在 iOS\
    \ 设备上，文件名是区分大小写的。在模拟器上时，文件名的大小写无关紧要，但当切换到设备上测试时，如果文件名确实像示例中的`@“default.PNG”`，则很可能会导致崩溃。\n\
    \n这曾让许多开发者头疼不已，这也是你应该经常在设备上进行测试的另一个原因。制定一套文件命名方案并坚持执行也是个好主意。就我个人而言，我通常使用小写字母，并在需要时用破折号分隔单词。\n\
    \n#### 锚点揭秘\n\n每个节点都有一个锚点，但只有当节点有纹理时（例如`CCSprite`或`CCLabelTTF`），它才会发挥作用。默认情况下，`anchorPoint`属性位于\
    \ 0.5,0.5，换句话说，位于纹理的中心。\n\n锚点与节点的位置无关，尽管更改`anchorPoint`会改变纹理在屏幕上的渲染位置。通过修改`anchorPoint`，你只改变了节点的纹理相对于节点位置的绘制位置。但这又引出了一个问题：为什么要修改`anchorPoint`，以及这样做能达到什么效果？\n\
    \n例如，将`anchorPoint`设置为 0,0，可以有效地移动纹理，使其左下角与节点的位置对齐。如果改为将`anchorPoint`设置为 1,1，纹理的右上角将与节点的位置对齐。有时这有助于将纹理与屏幕边界或其他元素对齐；特别是，它对于`CCLabel`类实现文本的右对齐或顶对齐非常有用。\n\
    \n通常情况下，除非你有充分的理由，否则最好不要修改`anchorPoint`，因为它可能会产生广泛的影响，例如使基于位置的碰撞检测产生偏移。它还会影响旋转和缩放，因为纹理将不再围绕其中心位置进行旋转或缩放。\n\
    \n在下面的示例代码中，精灵图像将与屏幕左下角完美对齐，因为它的`anchorPoint`被设置为 0,0，这使得纹理的左下角与精灵的默认`position`（也是\
    \ 0,0）对齐：\n\n```\nCCSprite* sprite = [CCSprite spriteWithFile:@”Default.png”];\n\
    sprite.anchorPoint = CGPointMake(0, 0);\n[self addChild:sprite];\n```\n\n####\
    \ 纹理尺寸\n\n纹理尺寸值得特别提及。到目前为止，iOS 设备只能处理尺寸为 2 的幂的纹理，因此纹理的单个宽度和高度可以是 2、4、8、16、32、64、128、256、512、1024，并且从第三代设备开始，甚至可以是\
    \ 2048 像素。纹理不需要是正方形，因此大小为 8×1024 像素的纹理完全没问题。\n\n无论何时创建纹理（例如通过图像文件创建精灵），这一点都会起作用。让我们立刻来看一个最坏的情况：假设你有一个大小为\
    \ 260×260 像素、32 位颜色的图像。在内存中，纹理应占用约 270KB，但实际上纹理居然占用了 1MB！\n\n这种近乎四倍的增长源于纹理的宽度和高度必须是\
    \ 2 的幂这一事实，因此 iOS 设备会简单地创建一个宽度和高度都是 2 的幂、但足以容纳该图像的最小纹理。对于 260×260 的纹理，次优的选择是在内存中创建一个\
    \ 512×512 像素的纹理，这占用了 1MB 的内存。\n\n对此你无能为力，只能一开始就创建尺寸已经是 2 的幂的图像。260×260 像素的纹理实际上应该做成\
    \ 256×256 纹理，这样才能避免浪费那么多内存。如果你与美工合作，请确保她了解这个问题。\n\n在第 6 章中，我将向你展示如何通过创建和使用纹理图集来在很大程度上缓解这个问题。\n"
- fmt: "### CCLabelTTF\n\n`CCLabelTTF` is the simplest choice when it comes to displaying\
    \ text on the screen. Here’s how to create a `CCLabelTTF` object to display some\
    \ text:\n\n```\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"text\"\n  \
    \                                     fontName:@\"AppleGothic\"\n            \
    \                           fontSize:32];\n[self addChild:label];\n```\n\nIn case\
    \ you’re wondering which TrueType fonts are available on iOS devices, you’ll find\
    \ a list of fonts in the Essentials code project for this chapter.\n\nInternally,\
    \ the given TrueType font is used to render the text on a `CCTexture2D` texture.\
    \ Since this is done every time the text changes, it’s not something you should\
    \ do every frame. Re-creating the texture of a `CCLabelTTF` is really slow, and\
    \ it is done every time the string of the label is modified:\n\n```\n[label setString:@\"\
    new text\"];\n```\n\nYou’ll also notice that if you increase or decrease the length\
    \ of the text of a label, the text behaves as if it is center-aligned on the label’s\
    \ position. The following sentences are center-aligned to illustrate this effect:\n\
    \n```\n              Hello World!\n              Hello World Once Again!\nHello\
    \ Our World and all the other Worlds out there!\n```\n\nThe center alignment is\
    \ because of the anchor point and its default position of 0.5,0.5, which causes\
    \ the center of the texture (in this case the label’s text is the texture) to\
    \ be center aligned with the label’s position. In many cases you want to align\
    \ labels left, right, up, or down, and you can use the `anchorPoint` property\
    \ to easily achieve this. The following code shows how you can align a label by\
    \ simply changing the `anchorPoint` property:\n\n```\n// align label to the right\n\
    label.anchorPoint = CGPointMake(1, 0.5f);\n// align label to the left\nlabel.anchorPoint\
    \ = CGPointMake(0, 0.5f);\n// align label to the top\nlabel.anchorPoint = CGPointMake(0.5f,\
    \ 1);\n// align label to the bottom\nlabel.anchorPoint = CGPointMake(0.5f, 0);\n\
    // use case: place label at top-right corner of the screen\n// the label's text\
    \ extends to the left and down and is always completely on screen\nCGSize size\
    \ = [[CCDirector sharedDirector] winSize];\nlabel.position = CGPointMake(size.width,\
    \ size.height);\nlabel.anchorPoint = CGPointMake(1, 1);\n```\n\n### Menus\n\n\
    You’ll soon need some kind of button a user can click to perform an action, such\
    \ as going to another scene or toggling music on and off. This is where the `CCMenu`\
    \ class comes into play. `CCMenu` is a subclass of `CCLayer` and accepts only\
    \ `CCMenuItem` nodes as children. The `CCMenuItem` class hierarchy can be reviewed\
    \ in [Figure 3–5](#Chapter03.html#fig_3_5) and is depicted again in [Figure 3–9](#Chapter03.html#fig_3_9)\
    \ for the sake of clarity.\n\n![images](images/0309.jpg)\n\n**Figure 3–9.** *The\
    \ CCMenuItem class hierarchy*\n\n[Listing 3–1](#Chapter03.html#list_3_1) shows\
    \ the code for setting up a menu. You can find the menu code in the Essentials\
    \ project in the `MenuScene` class.\n\n**Listing 3–1.** *Creating Menus in cocos2d\
    \ with Text and Image Menu Items*\n\n```\nCGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n\n// set CCMenuItemFont default properties\n[CCMenuItemFont setFontName:@\"\
    Helvetica-BoldOblique\"];\n[CCMenuItemFont setFontSize:26];\n\n// create a few\
    \ labels with text and selector\nCCMenuItemFont* item1 = [CCMenuItemFont itemFromString:@\"\
    Go Back!\" target:self\n                                              selector:@selector(menuItem1Touched:)];\n\
    \n// create a menu item using existing sprites\nCCSprite* normal = [CCSprite spriteWithFile:@\"\
    Icon.png\"];\nnormal.color = ccRED;\nCCSprite* selected = [CCSprite spriteWithFile:@\"\
    Icon.png\"];\nselected.color = ccGREEN;\nCCMenuItemSprite* item2 = [CCMenuItemSprite\n\
    \                                    itemFromNormalSprite:normal\n           \
    \                               selectedSprite:selected\n                    \
    \                              target:self\n                                 \
    \               selector:@selector(menuItem2Touched:)];\n// create a toggle item\
    \ using two other menu items (toggle works with images, too)\n[CCMenuItemFont\
    \ setFontName:@\"STHeitiJ-Light\"];\n[CCMenuItemFont setFontSize:18];\nCCMenuItemFont*\
    \ toggleOn = [CCMenuItemFont itemFromString:@\"I'm ON!\"];\nCCMenuItemFont* toggleOff\
    \ = [CCMenuItemFont itemFromString:@\"I'm OFF!\"];\nCCMenuItemToggle* item3 =\
    \ [CCMenuItemToggle itemWithTarget:self\n                                    \
    \              selector:@selector(menuItem3Touched:)\n                       \
    \                              items:toggleOn, toggleOff, nil];\n\n// create the\
    \ menu using the items\nCCMenu* menu = [CCMenu menuWithItems:item1, item2, item3,\
    \ nil];\nmenu.position = CGPointMake(size.width / 2, size.height / 2);\n[self\
    \ addChild:menu];\n\n// aligning is important, so the menu items don’t occupy\
    \ the same location\n[menu alignItemsVerticallyWithPadding:40];\n```\n\n**WARNING:**\
    \ The lists of menu items always end with `nil` as the last parameter. This is\
    \ a technical requirement. If you forget to add `nil` as the last parameter, your\
    \ app will crash at that particular line.\n\nIt takes a fair bit of code to set\
    \ up a menu. The first menu item is based on `CCMenuItemFont` and simply displays\
    \ a string. When the menu item is touched, it calls the method `menuItem1Touched`.\
    \ Internally, `CCMenuItemFont` simply creates a `CCLabel`. If you already have\
    \ a `CCLabel`, you can use that with the `CCMenuItemLabel` class instead.\n\n\
    Likewise, there are two menu item classes for images; one is `CCMenuItemImage`,\
    \ which creates an image from a file and uses a `CCSprite` internally, and the\
    \ other is one I’ve used here, `CCMenuItemSprite`. This class takes existing sprites\
    \ as input, which I think is more convenient because you can use the same image\
    \ and simply tint its color to achieve a highlighting effect when touched.\n\n\
    `CCMenuItemToggle` accepts exactly two `CCMenuItem`-derived objects and, when\
    \ touched, will toggle between the two items. You can use either text labels or\
    \ images with `CCMenuItemToggle`.\n\nFinally, `CCMenu` itself is created and positioned.\
    \ Since the menu items are all children of `CCMenu`, they will be positioned relative\
    \ to the menu. To keep them from stacking up on each other, you have to call one\
    \ of `CCMenu`’s align methods, like `alignItemsVerticallyWithPadding`, as I’ve\
    \ done at the end of [Listing 3–1](#Chapter03.html#list_3_1).\n\nSince `CCMenu`\
    \ is a node containing all menu items, you can use actions on the menu to let\
    \ it scroll in and out. This makes your menu screens appear less static, which\
    \ is usually a good thing. See the Essentials project for an example. In the meantime,\
    \ take a look at [Figure 3–10](#Chapter03.html#fig_3_10) to see what our current\
    \ menu looks like.\n\n![images](images/0310.jpg)\n\n**Figure 3–10.** *This is\
    \ the menu produced by the code in [Listing 3–1](#Chapter03.html#list_3_1).*"
  raw: '### CCLabelTTF


    `CCLabelTTF` is the simplest choice when it comes to displaying text on the screen.
    Here’s how to create a `CCLabelTTF` object to display some text:


    `CCLabelTTF* label = [CCLabelTTF labelWithString:@"text"`

    `                                       fontName:@"AppleGothic"`

    `                                       fontSize:32];`

    `[self addChild:label];`


    In case you’re wondering which TrueType fonts are available on iOS devices, you’ll
    find a list of fonts in the Essentials code project for this chapter.


    Internally, the given TrueType font is used to render the text on a `CCTexture2D`
    texture. Since this is done every time the text changes, it’s not something you
    should do every frame. Re-creating the texture of a `CCLabelTTF` is really slow,
    and it is done every time the string of the label is modified:


    `[label setString:@"new text"];`


    You’ll also notice that if you increase or decrease the length of the text of
    a label, the text behaves as if it is center-aligned on the label’s position.
    The following sentences are center-aligned to illustrate this effect:


    `              Hello World!`

    `              Hello World Once Again!`

    `Hello Our World and all the other Worlds out there!`


    The center alignment is because of the anchor point and its default position of
    0.5,0.5, which causes the center of the texture (in this case the label’s text
    is the texture) to be center aligned with the label’s position. In many cases
    you want to align labels left, right, up, or down, and you can use the `anchorPoint`
    property to easily achieve this. The following code shows how you can align a
    label by simply changing the `anchorPoint` property:


    `// align label to the right`

    `label.anchorPoint = CGPointMake(1, 0.5f);`

    `// align label to the left`

    `label.anchorPoint = CGPointMake(0, 0.5f);`

    `// align label to the top`

    `label.anchorPoint = CGPointMake(0.5f, 1);`

    `// align label to the bottom`

    `label.anchorPoint = CGPointMake(0.5f, 0);`

    `// use case: place label at top-right corner of the screen`

    `// the label''s text extends to the left and down and is always completely on
    screen`

    `CGSize size = [[CCDirector sharedDirector] winSize];`

    `label.position = CGPointMake(size.width, size.height);`

    `label.anchorPoint = CGPointMake(1, 1);`


    ### Menus


    You’ll soon need some kind of button a user can click to perform an action, such
    as going to another scene or toggling music on and off. This is where the `CCMenu`
    class comes into play. `CCMenu` is a subclass of `CCLayer` and accepts only `CCMenuItem`
    nodes as children. The `CCMenuItem` class hierarchy can be reviewed in [Figure
    3–5](#Chapter03.html#fig_3_5) and is depicted again in [Figure 3–9](#Chapter03.html#fig_3_9)
    for the sake of clarity.


    ![images](images/0309.jpg)


    **Figure 3–9.** *The CCMenuItem class hierarchy*


    [Listing 3–1](#Chapter03.html#list_3_1) shows the code for setting up a menu.
    You can find the menu code in the Essentials project in the `MenuScene` class.


    **Listing 3–1.** *Creating Menus in cocos2d with Text and Image Menu Items*


    `CGSize size = [[CCDirector sharedDirector] winSize];`


    `// set CCMenuItemFont default properties`

    `[CCMenuItemFont setFontName:@"Helvetica-BoldOblique"];`

    `[CCMenuItemFont setFontSize:26];`


    `// create a few labels with text and selector`

    `CCMenuItemFont* item1 = [CCMenuItemFont itemFromString:@"Go Back!" target:self`


    `selector:@selector(menuItem1Touched:)];`


    `// create a menu item using existing sprites`

    `CCSprite* normal = [CCSprite spriteWithFile:@"Icon.png"];`

    `normal.color = ccRED;`

    `CCSprite* selected = [CCSprite spriteWithFile:@"Icon.png"];`

    `selected.color = ccGREEN;`

    `CCMenuItemSprite* item2 = [CCMenuItemSprite`

    `                                    itemFromNormalSprite:normal`

    `                                          selectedSprite:selected`

    `                                                  target:self`

    `                                                selector:@selector(menuItem2Touched:)];`

    `// create a toggle item using two other menu items (toggle works with images,
    too)`

    `[CCMenuItemFont setFontName:@"STHeitiJ-Light"];`

    `[CCMenuItemFont setFontSize:18];`

    `CCMenuItemFont* toggleOn = [CCMenuItemFont itemFromString:@"I''m ON!"];`

    `CCMenuItemFont* toggleOff = [CCMenuItemFont itemFromString:@"I''m OFF!"];`

    `CCMenuItemToggle* item3 = [CCMenuItemToggle itemWithTarget:self`

    `                                                  selector:@selector(menuItem3Touched:)`

    `                                                     items:toggleOn, toggleOff,
    nil];`


    `// create the menu using the items`

    `CCMenu* menu = [CCMenu menuWithItems:item1, item2, item3, nil];`

    `menu.position = CGPointMake(size.width / 2, size.height / 2);`

    `[self addChild:menu];`


    `// aligning is important, so the menu items don’t occupy the same location`

    `[menu alignItemsVerticallyWithPadding:40];`


    **WARNING:** The lists of menu items always end with `nil` as the last parameter.
    This is a technical requirement. If you forget to add `nil` as the last parameter,
    your app will crash at that particular line.


    It takes a fair bit of code to set up a menu. The first menu item is based on
    `CCMenuItemFont` and simply displays a string. When the menu item is touched,
    it calls the method `menuItem1Touched`. Internally, `CCMenuItemFont` simply creates
    a `CCLabel`. If you already have a `CCLabel`, you can use that with the `CCMenuItemLabel`
    class instead.


    Likewise, there are two menu item classes for images; one is `CCMenuItemImage`,
    which creates an image from a file and uses a `CCSprite` internally, and the other
    is one I’ve used here, `CCMenuItemSprite`. This class takes existing sprites as
    input, which I think is more convenient because you can use the same image and
    simply tint its color to achieve a highlighting effect when touched.


    `CCMenuItemToggle` accepts exactly two `CCMenuItem`-derived objects and, when
    touched, will toggle between the two items. You can use either text labels or
    images with `CCMenuItemToggle`.


    Finally, `CCMenu` itself is created and positioned. Since the menu items are all
    children of `CCMenu`, they will be positioned relative to the menu. To keep them
    from stacking up on each other, you have to call one of `CCMenu`’s align methods,
    like `alignItemsVerticallyWithPadding`, as I’ve done at the end of [Listing 3–1](#Chapter03.html#list_3_1).


    Since `CCMenu` is a node containing all menu items, you can use actions on the
    menu to let it scroll in and out. This makes your menu screens appear less static,
    which is usually a good thing. See the Essentials project for an example. In the
    meantime, take a look at [Figure 3–10](#Chapter03.html#fig_3_10) to see what our
    current menu looks like.


    ![images](images/0310.jpg)


    **Figure 3–10.** *This is the menu produced by the code in [Listing 3–1](#Chapter03.html#list_3_1).*'
  trans: "\n### CCLabelTTF\n\n`CCLabelTTF` 是在屏幕上显示文本时最简单的选择。以下是创建 `CCLabelTTF` 对象来显示文本的方法：\n\
    \n```\nCCLabelTTF* label = [CCLabelTTF labelWithString:@\"文本内容\"\n           \
    \                            fontName:@\"AppleGothic\"\n                     \
    \                  fontSize:32];\n[self addChild:label];\n```\n\n如果你想知道 iOS 设备上有哪些可用的\
    \ TrueType 字体，可以在本章的 Essentials 代码项目中找到字体列表。\n\n在内部，给定的 TrueType 字体用于在 `CCTexture2D`\
    \ 纹理上渲染文本。由于每次文本变化时都会执行此操作，因此不建议每帧都进行。重新创建 `CCLabelTTF` 的纹理速度非常慢，并且每次修改标签的字符串时都会执行此操作：\n\
    \n```\n[label setString:@\"新文本\"];\n```\n\n你还会注意到，如果增加或减少标签文本的长度，文本会表现为以标签位置居中对齐。以下句子居中对齐以展示此效果：\n\
    \n```\n              你好，世界!\n              你好，世界，再来一次!\n你好，我们的世界以及外面所有的世界!\n```\n\
    \n居中对齐是因为锚点及其默认位置为 0.5, 0.5，这会导致纹理的中心（在此示例中，标签的文本即为纹理）与标签位置居中对齐。在许多情况下，你可能希望将标签左对齐、右对齐、上对齐或下对齐，你可以使用\
    \ `anchorPoint` 属性轻松实现。以下代码展示了如何通过简单地更改 `anchorPoint` 属性来对齐标签：\n\n```\n// 将标签右对齐\n\
    label.anchorPoint = CGPointMake(1, 0.5f);\n// 将标签左对齐\nlabel.anchorPoint = CGPointMake(0,\
    \ 0.5f);\n// 将标签顶部对齐\nlabel.anchorPoint = CGPointMake(0.5f, 1);\n// 将标签底部对齐\n\
    label.anchorPoint = CGPointMake(0.5f, 0);\n// 使用场景：将标签放置在屏幕右上角\n// 标签文本向左和向下延伸，并且始终完全显示在屏幕上\n\
    CGSize size = [[CCDirector sharedDirector] winSize];\nlabel.position = CGPointMake(size.width,\
    \ size.height);\nlabel.anchorPoint = CGPointMake(1, 1);\n```\n\n### 菜单\n\n你很快就会需要某种用户可点击以执行操作的按钮，例如跳转到另一个场景或打开/关闭音乐。这时\
    \ `CCMenu` 类就派上用场了。`CCMenu` 是 `CCLayer` 的一个子类，并且只接受 `CCMenuItem` 节点作为子节点。`CCMenuItem`\
    \ 类层次结构可以在图 3-5 中查看，为了清晰起见，在此再次展示于图 3-9。\n\n![images](img/0309.jpg)\n\n**图 3-9.**\
    \ *CCMenuItem 类层次结构*\n\n清单 3-1 展示了设置菜单的代码。你可以在 Essentials 项目的 `MenuScene` 类中找到菜单代码。\n\
    \n**清单 3-1.** *在 cocos2d 中使用文本和图片菜单项创建菜单*\n\n```\nCGSize size = [[CCDirector sharedDirector]\
    \ winSize];\n\n// 设置 CCMenuItemFont 默认属性\n[CCMenuItemFont setFontName:@\"Helvetica-BoldOblique\"\
    ];\n[CCMenuItemFont setFontSize:26];\n\n// 创建几个带文本和选择器的标签\nCCMenuItemFont* item1\
    \ = [CCMenuItemFont itemFromString:@\"返回!\" target:self\n                    \
    \                          selector:@selector(menuItem1Touched:)];\n\n// 使用现有精灵创建菜单项\n\
    CCSprite* normal = [CCSprite spriteWithFile:@\"Icon.png\"];\nnormal.color = ccRED;\n\
    CCSprite* selected = [CCSprite spriteWithFile:@\"Icon.png\"];\nselected.color\
    \ = ccGREEN;\nCCMenuItemSprite* item2 = [CCMenuItemSprite\n                  \
    \                  itemFromNormalSprite:normal\n                             \
    \             selectedSprite:selected\n                                      \
    \            target:self\n                                                selector:@selector(menuItem2Touched:)];\n\
    // 使用另外两个菜单项创建切换项（切换也适用于图片）\n[CCMenuItemFont setFontName:@\"STHeitiJ-Light\"];\n\
    [CCMenuItemFont setFontSize:18];\nCCMenuItemFont* toggleOn = [CCMenuItemFont itemFromString:@\"\
    我开了!\"];\nCCMenuItemFont* toggleOff = [CCMenuItemFont itemFromString:@\"我关了!\"\
    ];\nCCMenuItemToggle* item3 = [CCMenuItemToggle itemWithTarget:self\n        \
    \                                          selector:@selector(menuItem3Touched:)\n\
    \                                                     items:toggleOn, toggleOff,\
    \ nil];\n\n// 使用这些项创建菜单\nCCMenu* menu = [CCMenu menuWithItems:item1, item2, item3,\
    \ nil];\nmenu.position = CGPointMake(size.width / 2, size.height / 2);\n[self\
    \ addChild:menu];\n\n// 对齐很重要，这样菜单项才不会占据同一位置\n[menu alignItemsVerticallyWithPadding:40];\n\
    ```\n\n**警告：** 菜单项列表始终以 `nil` 作为最后一个参数结束。这是一个技术要求。如果你忘记将 `nil` 添加为最后一个参数，你的应用程序将在该特定行崩溃。\n\
    \n设置菜单需要相当多的代码。第一个菜单项基于 `CCMenuItemFont`，仅显示一个字符串。当菜单项被触摸时，它会调用方法 `menuItem1Touched`。在内部，`CCMenuItemFont`\
    \ 只是创建了一个 `CCLabel`。如果你已经有一个 `CCLabel`，你可以使用 `CCMenuItemLabel` 类来替代。\n\n同样，有两个用于图像的菜单项类；一个是\
    \ `CCMenuItemImage`，它从文件创建图像并在内部使用 `CCSprite`；另一个是我在此处使用的 `CCMenuItemSprite`。这个类将现有精灵作为输入，我认为这更方便，因为你可以使用相同的图像，只需调整其色调即可在触摸时实现高亮效果。\n\
    \n`CCMenuItemToggle` 恰好接受两个派生于 `CCMenuItem` 的对象，当被触摸时，它会在两个项之间切换。你可以将文本标签或图片与\
    \ `CCMenuItemToggle` 一起使用。\n\n最后，`CCMenu` 本身被创建并定位。由于菜单项都是 `CCMenu` 的子节点，它们将相对于菜单进行定位。为了防止它们相互堆叠，你必须调用\
    \ `CCMenu` 的某个对齐方法，例如我在清单 3-1 末尾所做的 `alignItemsVerticallyWithPadding`。\n\n由于 `CCMenu`\
    \ 是一个包含所有菜单项的节点，你可以对菜单使用动作来让它滑入和滑出。这会使你的菜单屏幕看起来不那么静态，这通常是一件好事。有关示例，请参阅 Essentials\
    \ 项目。同时，请查看图 3-10，了解我们当前菜单的外观。\n\n![images](img/0310.jpg)\n\n**图 3-10.** *这是由清单\
    \ 3-1 中的代码生成的菜单。*\n"
- fmt: '# Actions


    Actions are lightweight classes that are used on nodes to perform certain, well,
    actions. They allow you to move, rotate, scale, tint, fade, and do a lot of other
    things with a node. Because they work with every node, you can use them on sprites,
    labels, and even menus or whole scenes! That’s what makes them so powerful.


    In [Figure 3–11](#Chapter03.html#fig_3_11) you can see the `CCAction` class hierarchy
    without the many subclasses of `CCActionInterval` and `CCActionInstant`. You will
    see their class hierarchies in [Figure 3–12](#Chapter03.html#fig_3_12) and [Figure
    3–17](#Chapter03.html#fig_3_17), respectively.


    ![images](images/0311.jpg)


    **Figure 3–11.** *The CCAction class hierarchy with subclasses of CCActionInstant
    and CCActionInterval omitted*


    There are only three actions that directly derive from `CCAction`:


    - `CCFollow` (allows a node to follow another node)

    - `CCRepeatForever` (repeats an action indefinitely)

    - `CCSpeed` (changes the update frequency of an action while it is running)


    With the `CCFollow` action, you can instruct a node to follow another node. For
    example, to have a label follow the player character sprite, the code might look
    something like this:


    ```

    [label runAction:[CCFollow actionWithTarget:playerSprite]];

    ```


    You can also have actions or even a whole sequence of actions repeat (loop) forever
    with `CCRepeatForever`. You can create endlessly looping animations this way,
    for example. This code lets a node rotate forever like an endlessly spinning wheel:


    ```

    CCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2 angle:360];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];

    [myNode runAction:repeat];

    ```


    The `CCSpeed` action can be used to influence the speed of an action while it
    is running. Let’s take the earlier rotation example and wrap it with a `CCSpeed`
    action:


    ```

    CCRotateBy* rotateBy = [CCRotateBy actionWithDuration:2 angle:360];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:rotateBy];

    CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.5f];

    speedAction.tag = 1;

    [myNode runAction:speedAction];

    ```


    Now the node will take twice as long to make a full revelation because the `CCSpeed`
    action’s speed is set to `0.5f`. You can later change the `speed` property of
    the `CCSpeed` action to influence the speed of the wrapped action while it is
    running. To make the node suddenly rotate faster, you only need to get the speed
    action and modify its `speed` property:


    ```

    CCSpeed* speedAction = (CCSpeed*)[myNode getActionByTag:1];

    speedAction.speed = 2;

    ```


    **NOTE:** You cannot add a `CCSpeed` action to a `CCSequence` action, since only
    actions derived from `CCFiniteTimeAction` can be used in a sequence.


    ## Interval Actions


    Since most actions happen over time, like a rotation for three seconds, you’d
    normally have to write an update method and add variables to store the intermediate
    results. The `CCActionInterval` actions shown in [Figure 3–12](#Chapter03.html#fig_3_12)
    wrap this kind of logic for you and turn it into simple, parameterized methods:


    ```

    // have myNode move to 100, 200 and arrive there in 3 seconds

    CCMoveTo* move = [CCMoveTo actionWithDuration:3 position:CGPointMake(100, 200)];

    [myNode runAction:move];

    ```


    Once you start using this particular code, you’ll notice that depending on the
    distance `myNode` has to move, its speed will be different. This is a very common
    problem that has a simple solution. You need to calculate the distance from the
    current position to the target position and then divide it by the speed you want
    the node to move. The result is the correct duration to have the node move to
    the target position at the same speed, regardless of where the node and target
    positions are.


    ```

    // have myNode move at a fixed speed to any position

    CGPoint targetPos = CGPointMake(100, 200);

    float speed = 10; // in pixels per second

    float duration = ccpDistance(myNode.position, targetPos) / speed;


    CCMoveTo* move = [CCMoveTo actionWithDuration:duration position:targetPos];

    [myNode runAction:move];

    ```


    By the way, you don’t have to remove an action. Once an action has completed its
    task, it will remove itself from the node automatically and release the memory
    it uses.


    ![images](images/0312.jpg)


    **Figure 3–12.** *The CCActionInterval class hierarchy with subclasses of CCActionEase
    and CCGridAction omitted*


    ### Action Sequences


    Normally, when you add several actions to a node, they all perform their duties
    at the same time. For example, you could have an object rotate and fade out at
    the same time by adding the corresponding actions. But what if you want to run
    the actions one after the other?


    Sometimes it’s more useful to sequence actions, and that’s where `CCSequence`
    comes in. Since it is so frequently used, it deserves an extra mention. You can
    use any number and type of actions in a sequence, which makes it easy to have
    a node move to a target location and, at arrival, have it rotate around and then
    fade out, each action followed by the next one until the sequence is complete.


    Here’s how to cycle a label’s colors from red to blue to green:


    ```

    CCTintTo* tint1 = [CCTintTo actionWithDuration:4 red:255 green:0 blue:0];

    CCTintTo* tint2 = [CCTintTo actionWithDuration:4 red:0 green:0 blue:255];

    CCTintTo* tint3 = [CCTintTo actionWithDuration:4 red:0 green:255 blue:0];

    CCSequence* sequence = [CCSequence actions:tint1, tint2, tint3, nil];

    [label runAction:sequence];

    ```


    You can also use a `CCRepeatForever` action with the sequence:


    ```

    CCSequence* sequence = [CCSequence actions:tint1, tint2, tint3, nil];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];

    [label runAction:repeat];

    ```


    And being able to modify the speed of the entire repeating sequence can come in
    handy too:


    ```

    CCSequence* sequence = [CCSequence actions:tint1, tint2, tint3, nil];

    CCRepeatForever* repeat = [CCRepeatForever actionWithAction:sequence];

    CCSpeed* speedAction = [CCSpeed actionWithAction:repeat speed:0.75f];

    [label runAction:speedAction];

    ```


    **NOTE:** As with menu items, a list of actions always ends with `nil`. If you
    forget to add `nil` as the last parameter, the line creating the `CCSequence`
    will crash!'
  raw: '### Actions


    Actions are lightweight classes that are used on nodes to perform certain, well,
    actions. They allow you to move, rotate, scale, tint, fade, and do a lot of other
