    `}`


    `-(void) ccTouchEnded:(UITouch*)touch withEvent:(UIEvent *)event`

    `{`

    `    // Move the game layer back to its designated position.`

    `    CCMoveTo* move = [CCMoveTo actionWithDuration:1 position:gameLayerPosition];`

    `    CCEaseIn* ease = [CCEaseIn actionWithAction:move rate:0.5f];`

    `    ease.tag = ActionTagGameLayerMovesBack;`

    `    [self runAction:ease];`

    `}`


    Since `GameLayer` is the last layer to receive input, it doesn’t need to do any
    `isTouchForMe` checks and simply swallows all touches.


    Using the `ccTouchMoved` event, the difference between the previous and current
    touch location is calculated. It is then reversed by multiplying it by -1 to change
    the effect from moving the camera over the background to moving the background
    under the camera. If you have a hard time imagining what I mean by this, try the
    ScenesAndLayers04 project, and then try it a second time, commenting out the `moveTo
    = ccpMult(moveTo, -1);` line. You’ll notice the second time that every finger
    movement moves the layer in the opposite direction.


    In `ccTouchEnded`, the layer is then simply moved back to its center position
    automatically when the user lifts the finger off the screen. [Figure 5–2](#Chapter05.html#fig_5_2)
    shows this project in action with the whole `GameLayer` rotated and zoomed out.
    Every game object on the `GameLayer` abides by every movement, rotation, and scaling
    of the `GameLayer` automatically, whereas the `UserInterfaceLayer` always stays
    put.


    ![images](images/0502.jpg)


    **Figure 5–2.** *The utility of multiple layers becomes clear once the GameLayer
    is zoomed out and rotated, with all its nodes adhering to the layer’s behavior,
    while the UserInterfaceLayer on top remains in place unaffected.*


    #### How to Best Implement Levels


    So far we’ve examined multiple scenes and multiple layers. Now you want to cover
    what, levels?


    Well, the concept of levels is very common in many games, so I don’t think I need
    to explain that. What’s much harder is deciding which approach best serves a level-based
    game. In cocos2d you can go either way, choosing a new scene for each level or
    using separate layers to manage multiple levels. Both have their uses, and which
    one to choose depends mostly on what purpose levels serve in your game.


    ##### Scenes as Levels


    The most straightforward approach is to run each level as a separate scene. You
    can either create a new `Scene` class for each level or choose to initialize one
    common `LevelScene` class and pass as a parameter the level number or other information
    necessary to load the correct level data.


    This approach works best if you have clearly separated levels and most everything
    that happens within a level is no longer relevant or needed after the player has
    progressed through that level. Maybe you’ll keep the player’s score and the number
    of lives left, but that’s about it. The user interface is probably minimal and
    noninteractive and likely is purely informative without any interactive elements
    other than a pause button.


    I imagine this approach works best for twitch-based action game levels.'
