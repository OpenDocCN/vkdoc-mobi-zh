    \ 输出当前平台信息\n        NSString* platform = @\"（未知平台）\";\n\n        if (director.currentPlatformIsIOS)\n\
    \        {\n            // 添加代码\n            platform = @\"iPhone/iPod Touch\"\
    ;\n\n            if (director.currentDeviceIsIPad)\n                platform =\
    \ @\"iPad\";\n\n            if (director.currentDeviceIsSimulator)\n         \
    \       platform = [NSString stringWithFormat:@\"%@ 模拟器\", platform];\n      \
    \  }\n        else if (director.currentPlatformIsMac)\n        {\n           \
    \ platform = @\"Mac OS X\";\n        }\n\n        CCLabelTTF* platformLabel =\
    \ [CCLabelTTF labelWithString:platform\n                                     \
    \                  fontName:@\"Arial\"\n                                     \
    \                  fontSize:24];\n        platformLabel.position = director.screenCenter;\n\
    \        platformLabel.color = ccYELLOW;\n        [self addChild:platformLabel];\n\
    \        glClearColor(0.2f, 0.2f, 0.4f, 1.0f);\n    }\n\n    return self;\n}\n\
    \n@end\n```\n\n请注意我通过`currentPlatformIsIOS`和`currentDeviceIsSimulator`等导演属性确定平台（iOS,\
    \ Mac OS）和设备类型（iPad, iOS 模拟器）的方法。这些是我之前提到的`CCDirector`的一些扩展。\n\n你可能会好奇为什么我没有使用像`__IPHONE_OS_VERSION_MAX_ALLOWED`这样的预处理宏来确定平台和设备类型。首先，在\
    \ Kobold2D 中，我不会使用那些难以记忆且冗长的 SDK 宏。相反，Kobold2D 提供了更简洁的宏`KK_PLATFORM_IOS`和`KK_PLATFORM_MAC`来区分两种支持的平台。如果需要，你还可以使用`KK_PLATFORM_IOS_DEVICE`和`KK_PLATFORM_IOS_SIMULATOR`这两个宏来区分\
    \ iOS 设备和 iOS 模拟器。\n\n不使用预处理宏以及为何应仅在万不得已时才使用`#ifdef`进行条件编译的真正原因是：编译器是你的朋友！每次编译代码时，编译器都会告诉你一切正常，或者指出代码中存在的技术或语法错误。有时这可能令人烦恼，但编译器只是在提醒你犯了错误或遗漏了某些东西。在进行跨平台开发时，让尽可能多的代码在每次构建时都能被编译器编译至关重要，以至于平台和设备的运行时测试所带来的额外开销完全可以忽略不计。\n\
    \n一旦你开始进行跨平台开发，你很可能会花大量时间在仅针对一个平台编写和编译代码上。任何处于其他平台的`#ifdef`块内的代码对编译器都是不可见的，它不会报告其中存在的错误。而一旦你切换目标并编译另一个平台时，你很可能会遇到之前不存在的错误。这些错误可能与你在一个小时前、一天前，甚至一周前所做的代码更改有关。\n\
    \n这不仅会增加大量脑力负担来找出是哪个代码更改导致了错误，以及正确的修复方法是什么，而且还会令人沮丧，因为你会经常发现切换目标平台会导致构建失败。你要么会花费比必要时间更多的时间来为两个目标平台定期构建代码，要么就会干脆放弃，可能还抱着等项目完成后再移植的良好愿望。然而，移植一个已完成的项目远比从一开始就为两个平台开发的工作量要大得多。为什么呢？因为只要你的代码仅为单一平台编写，那么你的代码可能跟全部放在一个`#ifdef`块里没什么区别。\n\
    \n能够编译的代码才是可工作的代码。至少它在技术上是正确的。即时的构建错误更有可能立即被修正，并且更容易修复，因为你对最近的代码更改还记忆犹新。\n\n###\
    \ 使用 iSimulate 运行 Hello World\n\n如果你在 iPhone 或 iPad 模拟器上运行 Hello World 项目，你会看到一个网络连接对话框，如图\
    \ 16-4 所示。你还会注意到一个 iAd 横幅，因为它已在 `config.lua` 中启用。\n\n**注意：** 如果你在日志中看到 `bannerView:didFailToReceiveAdWithError`\
    \ 错误，并显示消息“The operation couldn’t be completed. (ADErrorDomain error 1.)”，这很可能是由于应用未设置为支持\
    \ iAd 所致。每个应用和每位开发者都需要在 iTunes Connect 中为应用启用 iAd 服务。你可以在 [`https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf`](https://itunesconnect.apple.com/docs/iTunesConnect_DeveloperGuide.pdf)\
    \ 找到有关为应用启用 iAd 的更多信息。\n\n![图片](img/1604.jpg)\n\n**图 16-4.** *由 iSimulate 引起的网络连接警告*\n\
    \n传入的网络连接警告对话框是由 iSimulate 引起的。这无需担心。iSimulate 库会接受来自 iSimulate 应用的传入连接，你可以在支持\
    \ WiFi 的 iOS 设备上运行该应用，以便远程控制模拟器。换句话说，iSimulate 使你能够在使用设备的同时，在模拟器中测试游戏。模拟器不具备的所有功能，如\
    \ GPS、加速度计或多点触控，都可以通过 iSimulate 应用来模拟。这可以节省大量时间。\n\n例如，如果你在设备上运行 iSimulate 并连接到你的\
    \ Mac，即使模拟器没有加速度计，你的应用中也会收到类似 `accelerometer:didAccelerate:` 的消息。考虑到在模拟器上运行应用通常比部署到设备上快得多，这使得\
    \ iSimulate 成为一个非常宝贵的工具。我建议你用 Kobold2D 的用户输入模板项目尝试一下。\n\niSimulate 在 App Store\
    \ 上有售，通常售价为 $15.99： [`http://itunes.apple.com/app/isimulate/id306908756`](http://itunes.apple.com/app/isimulate/id306908756)。\n\
    ```"
- fmt: "### Doodle Drop for Mac with KKInput\n\nSo far, all the projects we created\
    \ throughout the book were written for iOS. If you install Kobold2D, you’ll notice\
    \ that not only are most of the book’s projects included in Kobold2D, almost all\
    \ of them also have a Mac OS version.\n\nSo, what would it take to make a project\
    \ like Doodle Drop from [Chapter 4](#Chapter04.html#ch4) work both on Mac and\
    \ on iOS? Not that much actually. It turns out that by far the biggest change\
    \ is related to handling user input. Thankfully, Kobold2D provides a platform-agnostic\
    \ user input handler that simplifies user input dramatically by allowing you to\
    \ test the state of input devices at any time in any class and method.\n\nFirst,\
    \ the `accelerometer:didAccelerate` event method has been removed since it is\
    \ no longer needed. Instead, `KKInput` will be responsible for providing the app\
    \ with acceleration values. We tell it to activate accelerometer input and to\
    \ set the filtering factor in the `init` method of the Doodle Drop `GameLayer`\
    \ class:\n\n```\n// Yes, we want to receive accelerometer input events.\n[KKInput\
    \ sharedInput].accelerometerActive = YES;\n[KKInput sharedInput].acceleration.filteringFactor\
    \ = 0.2f;\n```\n\nEnabling the accelerometer will first test whether the device\
    \ supports the Core Motion framework. If so, acceleration values will be provided\
    \ by Core Motion, which gives us a tiny performance benefit. In all other cases,\
    \ the standard UIAccelerometer interface is used to obtain acceleration values.\
    \ The filtering factor is a percentage that determines how responsive the game\
    \ character will react to sudden changes in acceleration.\n\n[Listing 16–5](#Chapter16.html#list_16_5)\
    \ shows the modified Doodle Drop update method that includes user input handling\
    \ for both platforms.\n\n**Listing 16–5.** *Handling User Input for Both Platforms\
    \ with KKInput*\n\n```\n-(void) update:(ccTime)delta\n{\n    KKInput* input =\
    \ [KKInput sharedInput];\n    if (isGameOver)\n    {\n        if (input.anyTouchEnded\
    \ || ![image](images/U002.jpg)\n            [input isKeyDown:kKKKeyCode_Space]\
    \ || ![image](images/U002.jpg)\n            [input isKeyDown:kKKKeyCode_Return])\n\
    \        {\n            [self resetGame];\n        }\n    }\n    else\n    {\n\
    \        [self acceleratePlayerWithX:input.acceleration.smoothedX];\n\n      \
    \  if ([input isKeyDown:kKKKeyCode_LeftArrow])\n        {\n            [self acceleratePlayerWithX:-keyAcceleration];\n\
    \        }\n        else if ([input isKeyDown:kKKKeyCode_RightArrow])\n      \
    \  {\n            [self acceleratePlayerWithX:keyAcceleration];\n        }\n\n\
    \        // The rest of the update code remained unchanged.\n        …\n    }\n\
    }\n```\n\nThe update method processing is split into handling the gameover and\
    \ the rest of the code that runs while the game is commencing. If the game is\
    \ over, we simply check whether any touch ended or the spacebar or Return key\
    \ was pressed before resetting the game, starting over.\n\nWhile the game is running,\
    \ the player’s velocity is updated either based on the `input.acceleration.smoothedX`\
    \ value or based on a constant `keyAcceleration` value when either the left or\
    \ right arrow key is held down. The `acceleratePlayerWithX` method is shown in\
    \ [Listing 16–6](#Chapter16.html#list_16_6) later in the chapter, which contains\
    \ the code previously in the `accelerometer:didAccelerate` method.\n\n`KKInput`\
    \ provides you with built-in high-pass and low-pass filters via properties of\
    \ the `KKAcceleration` class exposed by the `input.acceleration` property. You\
    \ can access the raw acceleration, the smoothed (low-pass filtered), and the instantaneous\
    \ (high-pass filtered) values. In most games, you will want to use the smoothed\
    \ values, which provides steady acceleration and cancels out sudden, short-lived\
    \ movements. Instantaneous acceleration values are useful whenever you want to\
    \ react to sudden acceleration movements, such as shaking or quickly flipping\
    \ the device.\n\nYou’ll notice that the input code does not use conditional compiling\
    \ via `#ifdef`. If you run this code on Mac, the `anyTouchEnded` method is guaranteed\
    \ to return `NO` all the time. Likewise, when running on iOS, the `isKeyDown`\
    \ method always return `NO`, since there’s no keyboard available. And the `input.acceleration`\
    \ values are all 0 on Mac OS.\n\nIf it seems wasteful to you to test for keyboard\
    \ events on iOS and touch events on Mac OS, please keep in mind that the additional\
    \ overhead is very small while the benefit of always compiling all your code guarantees\
    \ that it continues to work for both platforms. If the platform-specific code\
    \ is extensive, you can always branch it using the Kobold2D `CCDirector` extensions\
    \ like `currentPlatformIsIOS` and `currentPlatformIsMac`.\n\n**Listing 16–6.**\
    \ *Updating the Player’s Velocity*\n\n```\n-(void) acceleratePlayerWithX:(double)xAcceleration\n\
    {\n    // adjust velocity based on current accelerometer acceleration\n    playerVelocity.x\
    \ = (playerVelocity.x * deceleration) + ![image](images/U002.jpg)\n        (xAcceleration\
    \ *sensitivity);\n\n    // we must limit the maximum velocity of the player sprite,\
    \ in both directions\n    if (playerVelocity.x > maxVelocity)\n    {\n       \
    \ playerVelocity.x = maxVelocity;\n    }\n    else if (playerVelocity.x < -maxVelocity)\n\
    \    {\n        playerVelocity.x = -maxVelocity;\n    }\n}\n```\n\nEverything\
    \ else requires no changes to create the Mac OS port thanks to the fact that no\
    \ hard-coded positions and offsets were used. Nevertheless, it makes sense for\
    \ game play reasons to restrict the Mac window size to that of an iPhone in `config.lua`:\n\
    \n```\nWindowFrame = RectMake(300, 300, 320, 480),\n```\n\nThe Lua function `RectMake`\
    \ creates a rectangle with the given origin (300, 300) and size (320, 480). `RectMake`\
    \ creates rectangles that are compatible with `CGRect` or `NSRect`, depending\
    \ on the platform. Additional Lua utility functions are `PointMake` and `SizeMake`.\n\
    \n### Entering the Third Dimension with cocos3d\n\nIn February 2011 the first\
    \ release of the cocos3d add-on library made it possible to add the third dimension\
    \ to cocos2d apps with relative ease. Cocos3d is modeled after the cocos2d API\
    \ and is currently available as an early beta version, labeled v0.6.1. Sadly,\
    \ it’s not part of the cocos2d-iphone distribution, and correctly setting up a\
    \ cocos3d project is not as straightforward as one would hope it to be. Installing\
    \ Kobold2D is by far the easiest way to try cocos3d.\n\nKobold2D comes with a\
    \ Hello-Cocos3D template project, which is based on the official cocos3d project\
    \ template and includes the necessary changes to integrate it smoothly with Kobold2D.\n\
    \nYou can find the documentation for cocos3d on the official web site at [`http://brenwill.com/cocos3d`](http://brenwill.com/cocos3d)."
  raw: '### Doodle Drop for Mac with KKInput


    So far, all the projects we created throughout the book were written for iOS.
    If you install Kobold2D, you’ll notice that not only are most of the book’s projects
    included in Kobold2D, almost all of them also have a Mac OS version.


    So, what would it take to make a project like Doodle Drop from [Chapter 4](#Chapter04.html#ch4)
    work both on Mac and on iOS? Not that much actually. It turns out that by far
    the biggest change is related to handling user input. Thankfully, Kobold2D provides
    a platform-agnostic user input handler that simplifies user input dramatically
    by allowing you to test the state of input devices at any time in any class and
    method.


    First, the `accelerometer:didAccelerate` event method has been removed since it
    is no longer needed. Instead, `KKInput` will be responsible for providing the
    app with acceleration values. We tell it to activate accelerometer input and to
    set the filtering factor in the `init` method of the Doodle Drop `GameLayer` class:


    `// Yes, we want to receive accelerometer input events.`

    `[KKInput sharedInput].accelerometerActive = YES;`

    `[KKInput sharedInput].acceleration.filteringFactor = 0.2f;`


    Enabling the accelerometer will first test whether the device supports the Core
    Motion framework. If so, acceleration values will be provided by Core Motion,
    which gives us a tiny performance benefit. In all other cases, the standard UIAccelerometer
    interface is used to obtain acceleration values. The filtering factor is a percentage
    that determines how responsive the game character will react to sudden changes
    in acceleration.


    [Listing 16–5](#Chapter16.html#list_16_5) shows the modified Doodle Drop update
    method that includes user input handling for both platforms.


    **Listing 16–5.** *Handling User Input for Both Platforms with KKInput*


    `-(void) update:(ccTime)delta`

    `{`

    `    KKInput* input = [KKInput sharedInput];`

    `    if (isGameOver)`

    `    {`

    `        if (input.anyTouchEnded ||`![image](images/U002.jpg)

    `            [input isKeyDown:kKKKeyCode_Space] ||`![image](images/U002.jpg)

    `            [input isKeyDown:kKKKeyCode_Return])`

    `        {`

    `            [self resetGame];`

    `        }`

    `    }`

    `    else`

    `    {`

    `        [self acceleratePlayerWithX:input.acceleration.smoothedX];`


    `        if ([input isKeyDown:kKKKeyCode_LeftArrow])`

    `        {`

    `            [self acceleratePlayerWithX:-keyAcceleration];`

    `        }`

    `        else if ([input isKeyDown:kKKKeyCode_RightArrow])`

    `        {`

    `            [self acceleratePlayerWithX:keyAcceleration];`

    `        }`


    `        // The rest of the update code remained unchanged.`

    `        …`

    `    }`

    `}`


    The update method processing is split into handling the gameover and the rest
    of the code that runs while the game is commencing. If the game is over, we simply
    check whether any touch ended or the spacebar or Return key was pressed before
    resetting the game, starting over.


    While the game is running, the player’s velocity is updated either based on the
    `input.acceleration.smoothedX` value or based on a constant `keyAcceleration`
    value when either the left or right arrow key is held down. The `acceleratePlayerWithX`
    method is shown in [Listing 16–6](#Chapter16.html#list_16_6) later in the chapter,
    which contains the code previously in the `accelerometer:didAccelerate` method.


    `KKInput` provides you with built-in high-pass and low-pass filters via properties
    of the `KKAcceleration` class exposed by the `input.acceleration` property. You
    can access the raw acceleration, the smoothed (low-pass filtered), and the instantaneous
    (high-pass filtered) values. In most games, you will want to use the smoothed
    values, which provides steady acceleration and cancels out sudden, short-lived
    movements. Instantaneous acceleration values are useful whenever you want to react
    to sudden acceleration movements, such as shaking or quickly flipping the device.


    You’ll notice that the input code does not use conditional compiling via `#ifdef`.
    If you run this code on Mac, the `anyTouchEnded` method is guaranteed to return
    `NO` all the time. Likewise, when running on iOS, the `isKeyDown` method always
    return `NO`, since there’s no keyboard available. And the `input.acceleration`
    values are all 0 on Mac OS.


    If it seems wasteful to you to test for keyboard events on iOS and touch events
    on Mac OS, please keep in mind that the additional overhead is very small while
    the benefit of always compiling all your code guarantees that it continues to
    work for both platforms. If the platform-specific code is extensive, you can always
    branch it using the Kobold2D `CCDirector` extensions like `currentPlatformIsIOS`
    and `currentPlatformIsMac`.


    **Listing 16–6.** *Updating the Player’s Velocity*


    `-(void) acceleratePlayerWithX:(double)xAcceleration`

    `{`

    `    // adjust velocity based on current accelerometer acceleration`

    `playerVelocity.x = (playerVelocity.x * deceleration) +` ![image](images/U002.jpg)

    `        (xAcceleration *sensitivity);`


    `    // we must limit the maximum velocity of the player sprite, in both directions`

    `    if (playerVelocity.x > maxVelocity)`

    `    {`

    `        playerVelocity.x = maxVelocity;`

    `    }`

    `    else if (playerVelocity.x < -maxVelocity)`

    `    {`

    `        playerVelocity.x = -maxVelocity;`

    `    }`

    `}`


    Everything else requires no changes to create the Mac OS port thanks to the fact
    that no hard-coded positions and offsets were used. Nevertheless, it makes sense
    for game play reasons to restrict the Mac window size to that of an iPhone in
    config.lua:


    `WindowFrame = RectMake(300, 300, 320, 480),`


    The Lua function `RectMake` creates a rectangle with the given origin (300, 300)
    and size (320, 480). `RectMake` creates rectangles that are compatible with `CGRect`
    or `NSRect`, depending on the platform. Additional Lua utility functions are `PointMake`
    and `SizeMake`.


    ### Entering the Third Dimension with cocos3d


    In February 2011 the first release of the cocos3d add-on library made it possible
    to add the third dimension to cocos2d apps with relative ease. Cocos3d is modeled
    after the cocos2d API and is currently available as an early beta version, labeled
    v0.6.1\. Sadly, it’s not part of the cocos2d-iphone distribution, and correctly
    setting up a cocos3d project is not as straightforward as one would hope it to
    be. Installing Kobold2D is by far the easiest way to try cocos3d.


    Kobold2D comes with a Hello-Cocos3D template project, which is based on the official
    cocos3d project template and includes the necessary changes to integrate it smoothly
    with Kobold2D.


    You can find the documentation for cocos3d on the official web site at [`http://brenwill.com/cocos3d`](http://brenwill.com/cocos3d).'
  trans: "\n### 使用 KKInput 的 Mac 版 Doodle Drop\n\n到目前为止，整本书中创建的所有项目都是为 iOS 编写的。如果你安装了\
    \ Kobold2D，你会注意到，不仅书中大部分项目已包含在 Kobold2D 中，而且几乎所有这些项目也都拥有 Mac OS 版本。\n\n那么，要使 第\
    \ 4 章 中的 Doodle Drop 这样的项目同时在 Mac 和 iOS 上运行，需要做些什么呢？实际上并不需要太多。事实证明，最大的变化与处理用户输入有关。幸运的是，Kobold2D\
    \ 提供了一个与平台无关的用户输入处理器，它允许你在任何类和方法中随时测试输入设备的状态，从而极大地简化了用户输入的处理。\n\n首先，`accelerometer:didAccelerate`\
    \ 事件方法已被移除，因为它不再需要。取而代之的是，`KKInput` 将负责为应用提供加速度值。我们在 Doodle Drop 的 `GameLayer`\
    \ 类的 `init` 方法中激活加速度计输入并设置滤波因子：\n\n```\n// 是的，我们希望接收加速度计输入事件。\n[KKInput sharedInput].accelerometerActive\
    \ = YES;\n[KKInput sharedInput].acceleration.filteringFactor = 0.2f;\n```\n\n\
    启用加速度计后，首先会测试设备是否支持 Core Motion 框架。如果支持，加速度值将由 Core Motion 提供，这能带来微小的性能提升。在所有其他情况下，则使用标准的\
    \ UIAccelerometer 接口来获取加速度值。滤波因子是一个百分比，它决定了游戏角色对加速度的突然变化会有多敏感。\n\n代码清单 16–5 展示了修改后的\
    \ Doodle Drop 更新方法，其中包含了两个平台的用户输入处理。\n\n**代码清单 16–5.** *使用 KKInput 处理两个平台的用户输入*\n\
    \n```\n-(void) update:(ccTime)delta\n{\n    KKInput* input = [KKInput sharedInput];\n\
    \    if (isGameOver)\n    {\n        if (input.anyTouchEnded || ![image](img/U002.jpg)\n\
    \            [input isKeyDown:kKKKeyCode_Space] || ![image](img/U002.jpg)\n  \
    \          [input isKeyDown:kKKKeyCode_Return])\n        {\n            [self\
    \ resetGame];\n        }\n    }\n    else\n    {\n        [self acceleratePlayerWithX:input.acceleration.smoothedX];\n\
    \n        if ([input isKeyDown:kKKKeyCode_LeftArrow])\n        {\n           \
    \ [self acceleratePlayerWithX:-keyAcceleration];\n        }\n        else if ([input\
    \ isKeyDown:kKKKeyCode_RightArrow])\n        {\n            [self acceleratePlayerWithX:keyAcceleration];\n\
    \        }\n\n        // 更新代码的其余部分保持不变。\n        …\n    }\n}\n```\n\n更新方法的处理分为两部分：处理游戏结束状态，以及游戏进行期间运行的其余代码。如果游戏结束，我们只需检查是否有任何触摸结束，或者是否按下了空格键或回车键，然后重置游戏重新开始。\n\
    \n在游戏运行期间，玩家的速度会根据 `input.acceleration.smoothedX` 值更新，或者当左箭头键或右箭头键被按住时，根据一个恒定的\
    \ `keyAcceleration` 值更新。`acceleratePlayerWithX` 方法将在本章稍后的代码清单 16–6 中展示，其中包含了先前在\
    \ `accelerometer:didAccelerate` 方法中的代码。\n\n`KKInput` 通过 `input.acceleration` 属性暴露的\
    \ `KKAcceleration` 类的属性，为你提供了内置的高通和低通滤波器。你可以访问原始加速度值、平滑加速度值（经低通滤波）和瞬时加速度值（经高通滤波）。在大多数游戏中，你会希望使用平滑值，它能提供稳定的加速度，并滤除突然的、短暂的移动。当你需要对突然的加速运动（如摇晃或快速翻转设备）做出反应时，瞬时加速度值非常有用。\n\
    \n你会注意到，输入代码没有使用 `#ifdef` 进行条件编译。如果你在 Mac 上运行此代码，`anyTouchEnded` 方法将始终返回 `NO`。同样，在\
    \ iOS 上运行时，由于没有键盘可用，`isKeyDown` 方法始终返回 `NO`。而在 Mac OS 上，`input.acceleration` 的值全部为\
    \ 0。\n\n如果你觉得在 iOS 上测试键盘事件、在 Mac OS 上测试触摸事件有些浪费资源，请记住，这种额外开销非常小，而始终编译所有代码的好处是能确保它在两个平台上都能持续工作。如果平台特定代码量很大，你始终可以使用\
    \ Kobold2D 的 `CCDirector` 扩展（如 `currentPlatformIsIOS` 和 `currentPlatformIsMac`）对其进行分支处理。\n\
    \n**代码清单 16–6.** *更新玩家的速度*\n\n```\n-(void) acceleratePlayerWithX:(double)xAcceleration\n\
    {\n    // 根据当前加速度计的加速度调整速度\n    playerVelocity.x = (playerVelocity.x * deceleration)\
    \ + ![image](img/U002.jpg)\n        (xAcceleration *sensitivity);\n\n    // 我们必须限制玩家精灵在正反两个方向上的最大速度\n\
    \    if (playerVelocity.x > maxVelocity)\n    {\n        playerVelocity.x = maxVelocity;\n\
    \    }\n    else if (playerVelocity.x < -maxVelocity)\n    {\n        playerVelocity.x\
    \ = -maxVelocity;\n    }\n}\n```\n\n由于没有使用硬编码的位置和偏移量，创建 Mac OS 移植版不需要对任何其他部分进行修改。尽管如此，出于游戏玩法的考虑，在\
    \ `config.lua` 中将 Mac 窗口大小限制为 iPhone 的尺寸是合理的：\n\n```\nWindowFrame = RectMake(300,\
    \ 300, 320, 480),\n```\n\nLua 函数 `RectMake` 根据给定的原点 (300, 300) 和尺寸 (320, 480)\
    \ 创建一个矩形。`RectMake` 会根据平台创建与 `CGRect` 或 `NSRect` 兼容的矩形。其他 Lua 实用函数还有 `PointMake`\
    \ 和 `SizeMake`。\n\n### 使用 cocos3d 进入三维世界\n\n2011 年 2 月，cocos3d 附加库的第一个版本发布，它使相对轻松地为\
    \ cocos2d 应用添加第三维度成为可能。Cocos3d 以 cocos2d API 为模型，目前作为早期测试版（版本 v0.6.1）提供。遗憾的是，它并非\
    \ cocos2d-iphone 发行版的一部分，且正确设置一个 cocos3d 项目并不像人们期望的那样直接。安装 Kobold2D 是目前尝试 cocos3d\
    \ 最简单的方式。\n\nKobold2D 附带了 Hello-Cocos3D 模板项目，该项目基于官方的 cocos3d 项目模板，并包含了使其与 Kobold2D\
    \ 平滑集成的必要更改。\n\n你可以在官方网站 [`http://brenwill.com/cocos3d`](http://brenwill.com/cocos3d)\
    \ 上找到 cocos3d 的文档。\n"
- fmt: "#### Changes to the AppDelegate Class\n\nThe entire start-up code for cocos3d\
    \ is in the `AppDelegate` class. Although it was entirely empty in the Hello World\
    \ project, the class can now be put to good use. The `AppDelegate` interface now\
    \ has a new instance variable:\n\n```\n#import \"KKAppDelegate.h\"\n#import \"\
    CCNodeController.h\"\n\n@interface AppDelegate : KKAppDelegate\n{\n    CCNodeController*\
    \ nodeController;\n}\n@end\n```\n\nThe `CCNodeController` is provided by cocos3d\
    \ and is needed for two things. For one, it allows you to perform autorotation\
    \ with cocos3d. The regular `RootViewController` class is not fully compatible\
    \ with cocos3d; it tends to stretch the view or displaces nodes while rotating.\
    \ So, cocos3d provides its own view controller solution for autorotation, unfortunately\
    \ without the rotation animation.\n\nThe other benefit of the `CCNodeController`\
    \ class is that it has built-in support for the `UIImagePickerController`, which\
    \ enables your app to show the camera view in real time as the background of the\
    \ scene. This allows you to create so-called augmented reality apps.\n\n[Figure\
    \ 16–5](#Chapter16.html#fig_16_5) shows an example of my iPhone’s camera scanning\
    \ the solar system poster I have above my computer on the wall. The image gives\
    \ the phrase “Hello World” an entirely new meaning (depicted is the earth, *Erde*\
    \ in German).\n\n**CAUTION:** Check the framerate counter in [Figure 16–4](#Chapter16.html#fig_16_4).\
    \ My poor iPhone 3G (second-generation device) was heavily stressed by the real-time\
    \ camera background. It was averaging around 20 frames per second (fps), and even\
    \ without rendering the Hello World 3D model it did not go above an average somewhere\
    \ between 30 to 40 fps. My iPod touch 4 did not perform that much better and averaged\
    \ at about 40 frames per second, with or without the 3D model. Apparently it has\
    \ enough reserves for rendering 3D models in this scenario. The performance tests\
    \ were made with release builds, of course.\n\nDespite the performance penalties,\
    \ I hope you’ll come up with cool augmented reality apps. Just witnessing the\
    \ cocos2d/cocos3d scene overlaying the live camera view is an inspiring experience!\n\
    \n![images](images/1605.jpg)\n\n**Figure 16–5.** *Augmented reality: using the\
    \ iPhone’s camera as real-time background image*\n\nSetting up the cocos3d node\
    \ controller to show the camera background is easy as pie. In [Listing 16–7](#Chapter16.html#list_16_7)\
    \ you only need to set the variable `useNodeController` to `YES`, and the camera\
    \ background is automatically enabled, if the feature is available. It’s only\
    \ one line of code that tests and enables the camera overlay:\n\n`nodeController.isOverlayingDeviceCamera\
    \ = nodeController.isDeviceCameraAvailable;`\n\nThis code assigns the result of\
    \ the camera availability check directly to the `isOverlayingDeviceCamera` property,\
    \ enabling it on every device that has a camera.\n\nThe `AppDelegate` implementation\
    \ in [Listing 16–7](#Chapter16.html#list_16_7) uses the `initializationComplete`\
    \ code to perform all that is needed to set up cocos3d. This method is perfect\
    \ because it is called right after everything is set up except for the actual\
    \ running scene. And since you’ll be running a scene in this method either directly\
    \ with the `CCDirectorrunWithScene` method or indirectly via the `CCNodeController`’s\
    \ `runSceneOnNode` method, the `FirstSceneClassName` setting in `config.lua` will\
    \ be silently ignored.\n\n**Listing 16–7.** *The AppDelegate Implementation of\
    \ a cocos3d Project*\n\n```\n#import \"AppDelegate.h\"\n#import \"Hello3DLayer.h\"\
    \n#import \"Hello3DWorld.h\"\n#import \"HelloWorldLayer.h\"\n\n@implementation\
    \ AppDelegate\n\n-(void) initializationComplete\n{\n    CC3World* cc3World = [Hello3DWorld\
    \ world];\n    CC3Layer* cc3Layer = [Hello3DLayer node];\n    cc3Layer.cc3World\
    \ = cc3World;\n\n    [cc3World play];\n    [cc3Layer scheduleUpdate];\n\n    ControllableCCLayer*\
    \ mainLayer = cc3Layer;\n\n    BOOL useNodeController = NO;\n    if (useNodeController)\n\
    \    {\n        CCLayer* helloLayer = [HelloWorldLayer node];\n        [mainLayer\
    \ addChild:helloLayer z:-1];\n\n        nodeController = [[CCNodeController controller]\
    \ retain];\n        nodeController.doesAutoRotate = YES;\n        [nodeController\
    \ runSceneOnNode:mainLayer];\n\n        // Let's have some fun with the camera\n\
    \        nodeController.isOverlayingDeviceCamera = nodeController.isDeviceCameraAvailable;\n\
    \    }\n    else\n    {\n        CCScene* scene = [CCScene node];\n        CCLayer*\
    \ helloLayer = [HelloWorldLayer node];\n        [scene addChild:helloLayer];\n\
    \        [layer addChild:mainLayer];\n        [[CCDirector sharedDirector] runWithScene:scene];\n\
    \    }\n}\n@end\n```\n\nThe cocos3d scenes always consist of two parts. An instance\
    \ of the `CC3World` class defines the world, loads the 3D models, and sets up\
    \ the 3D scene. The `CC3World` is also the root class of the 3D scene and contains\
    \ nodes derived from `CC3Node` that make up the 3D scene hierarchy.\n\nA `CC3Layer`\
    \ class instance is responsible for integration with the cocos2d engine. The `CC3Layer`\
    \ class instance can be added to any cocos2d node, because it is derived from\
    \ the cocos2d class `CCLayerColor`. In addition to that, it holds a reference\
    \ to the `CC3World` instance and is responsible for updating the 3D world.\n\n\
    This explains why you need to call both `play` on the `cc3World` and `scheduleUpdate`\
    \ on the `cc3Layer`. The layer’s update method will be forwarded the world, which\
    \ can be either in a play or pause state depending on whether the `play` or `pause`\
    \ method was called last. Whenever you call `pause` on the `CC3World`, the world\
    \ will not be rendered, but the last frame remains visible. Also, any cocos2d\
    \ actions that are currently running on 3D nodes will continue to be updated and\
    \ move the 3D nodes. To pause and resume the actions as well, you need to pause\
    \ or resume each 3D node that is running an action:\n\n```\n[[CCActionManager\
    \ sharedManager] pauseTarget:node];\n[[CCActionManager sharedManager] resumeTarget:node];\n\
    ```\n\nThe cocos3d start-up code implementation I chose allows you to switch between\
    \ using the cocos3d node controller, which enables autorotation, and the live\
    \ camera background. In this case, the `HelloWorldLayer` is added as a child to\
    \ the `CC3Layer` and with a negative z value so it is displayed entirely behind\
    \ the cocos3d layer. You could also use a positive z value of 1 or higher to display\
    \ the scene in front of the cocos3d layer. Either approach works best if your\
    \ app is primarily a 3D application that uses only some cocos2d elements, for\
    \ example for its user interface.\n\nThe alternative to using the `CCNodeController`\
    \ is to create the regular cocos2d scene and then add the `CC3Layer` as a child\
    \ of the scene. Now you can easily decide which of the 2D nodes in the scene are\
    \ behind or in front of the cocos3d layer by adjusting their z value. This approach\
    \ is preferable if your app is primarily 2D but you want to be able to render\
    \ 3D models occasionally. It will also be faster since it does not use the `CCNodeController`.\
    \ Just to give you some ballpark numbers, my iPhone 3G renders 30 fps with the\
    \ `CCNodeController` enabled and 50 fps without, whereas my iPod touch 4 is unaffected\
    \ and maxed out at 60 fps either way.\n\nWhichever approach you choose, you can\
    \ always embed the `CC3Layer` in a cocos2d scene so that some cocos2d nodes are\
    \ behind and others are in front of the 3D nodes. It’s a simple matter of using\
    \ the `addChild` method’s `z` parameter or, respectively, the `zOrder` property.\
    \ You can see a sandwiched 3D model in [Figure 16–6](#Chapter16.html#fig_16_6).\n\
    \n![images](images/1606.jpg)\n\n**Figure 16–6.** *You can have cocos2d nodes both\
    \ in front of and behind the CC3Layer.*"
  raw: '#### Changes to the AppDelegate Class


    The entire start-up code for cocos3d is in the `AppDelegate` class. Although it
    was entirely empty in the Hello World project, the class can now be put to good
    use. The `AppDelegate` interface now has a new instance variable:


    `#import "KKAppDelegate.h"`

    `#import "CCNodeController.h"`


    `@interface AppDelegate : KKAppDelegate`

    `{`

    `    CCNodeController* nodeController;`

    `}`

    `@end`


    The `CCNodeController` is provided by cocos3d and is needed for two things. For
    one, it allows you to perform autorotation with cocos3d. The regular `RootViewController`
    class is not fully compatible with cocos3d; it tends to stretch the view or displaces
    nodes while rotating. So, cocos3d provides its own view controller solution for
    autorotation, unfortunately without the rotation animation.


    The other benefit of the `CCNodeController` class is that it has built-in support
    for the `UIImagePickerController`, which enables your app to show the camera view
    in real time as the background of the scene. This allows you to create so-called
    augmented reality apps.


    [Figure 16–5](#Chapter16.html#fig_16_5) shows an example of my iPhone’s camera
    scanning the solar system poster I have above my computer on the wall. The image
    gives the phrase “Hello World” an entirely new meaning (depicted is the earth,
    *Erde* in German).


    **CAUTION:** Check the framerate counter in [Figure 16–4](#Chapter16.html#fig_16_4).
    My poor iPhone 3G (second-generation device) was heavily stressed by the real-time
    camera background. It was averaging around 20 frames per second (fps), and even
    without rendering the Hello World 3D model it did not go above an average somewhere
    between 30 to 40 fps. My iPod touch 4 did not perform that much better and averaged
    at about 40 frames per second, with or without the 3D model. Apparently it has
    enough reserves for rendering 3D models in this scenario. The performance tests
    were made with release builds, of course.


    Despite the performance penalties, I hope you’ll come up with cool augmented reality
    apps. Just witnessing the cocos2d/cocos3d scene overlaying the live camera view
    is an inspiring experience!


    ![images](images/1605.jpg)


    **Figure 16–5.** *Augmented reality: using the iPhone’s camera as real-time background
    image*


    Setting up the cocos3d node controller to show the camera background is easy as
    pie. In [Listing 16–7](#Chapter16.html#list_16_7) you only need to set the variable
    `useNodeController` to `YES`, and the camera background is automatically enabled,
    if the feature is available. It’s only one line of code that tests and enables
    the camera overlay:


    `nodeController.isOverlayingDeviceCamera = nodeController.isDeviceCameraAvailable;`


    This code assigns the result of the camera availability check directly to the
    `isOverlayingDeviceCamera` property, enabling it on every device that has a camera.


    The `AppDelegate` implementation in [Listing 16–7](#Chapter16.html#list_16_7)
    uses the `initializationComplete` code to perform all that is needed to set up
    cocos3d. This method is perfect because it is called right after everything is
    set up except for the actual running scene. And since you’ll be running a scene
    in this method either directly with the `CCDirectorrunWithScene` method or indirectly
    via the `CCNodeController`’s `runSceneOnNode` method, the `FirstSceneClassName`
    setting in config.lua will be silently ignored.


    **Listing 16–7.** *The AppDelegate Implementation of a cocos3d Project*


    `#import "AppDelegate.h"`

    `#import "Hello3DLayer.h"`

    `#import "Hello3DWorld.h"`

    `#import "HelloWorldLayer.h"`


    `@implementation AppDelegate`


    `-(void) initializationComplete`

    `{`

    `    CC3World* cc3World = [Hello3DWorld world];`

    `    CC3Layer* cc3Layer = [Hello3DLayer node];`

    `    cc3Layer.cc3World = cc3World;`


    `    [cc3World play];`

    `    [cc3Layer scheduleUpdate];`


    `    ControllableCCLayer* mainLayer = cc3Layer;`


    `    BOOL useNodeController = NO;`

    `    if (useNodeController)`

    `    {`

    `        CCLayer* helloLayer = [HelloWorldLayer node];`

    `        [mainLayer addChild:helloLayer z:-1];`


    `        nodeController = [[CCNodeController controller] retain];`

    `        nodeController.doesAutoRotate = YES;`

    `        [nodeController runSceneOnNode:mainLayer];`


    `        // Let''s have some fun with the camera`

    `        nodeController.isOverlayingDeviceCamera=nodeController.isDeviceCameraAvailable;`

    `    }`

    `    else`

    `    {`

    `        CCScene* scene = [CCScene node];`

    `        CCLayer* helloLayer= [HelloWorldLayer node];`

    `        [scene addChild:helloLayer];`

    `        [layer addChild:mainLayer];`

    `        [[CCDirector sharedDirector] runWithScene:scene];`

    `    }`

    `}`

    `@end`


    The cocos3d scenes always consist of two parts. An instance of the `CC3World`
    class defines the world, loads the 3D models, and sets up the 3D scene. The `CC3World`
    is also the root class of the 3D scene and contains nodes derived from `CC3Node`
    that make up the 3D scene hierarchy.


    A `CC3Layer` class instance is responsible for integration with the cocos2d engine.
    The `CC3Layer` class instance can be added to any cocos2d node, because it is
    derived from the cocos2d class `CCLayerColor`. In addition to that, it holds a
    reference to the `CC3World` instance and is responsible for updating the 3D world.


    This explains why you need to call both `play` on the `cc3World` and `scheduleUpdate`
    on the `cc3Layer`. The layer’s update method will be forwarded the world, which
    can be either in a play or pause state depending on whether the `play` or `pause`
    method was called last. Whenever you call `pause` on the `CC3World`, the world
    will not be rendered, but the last frame remains visible. Also, any cocos2d actions
    that are currently running on 3D nodes will continue to be updated and move the
    3D nodes. To pause and resume the actions as well, you need to pause or resume
    each 3D node that is running an action:


    `[[CCActionManager sharedManager] pauseTarget:node];`

    `[[CCActionManager sharedManager] resumeTarget:node];`


    The cocos3d start-up code implementation I chose allows you to switch between
    using the cocos3d node controller, which enables autorotation, and the live camera
    background. In this case, the `HelloWorldLayer` is added as a child to the `CC3Layer`
    and with a negative z value so it is displayed entirely behind the cocos3d layer.
    You could also use a positive z value of 1 or higher to display the scene in front
    of the cocos3d layer. Either approach works best if your app is primarily a 3D
    application that uses only some cocos2d elements, for example for its user interface.


    The alternative to using the `CCNodeController` is to create the regular cocos2d
    scene and then add the `CC3Layer` as a child of the scene. Now you can easily
    decide which of the 2D nodes in the scene are behind or in front of the cocos3d
    layer by adjusting their z value. This approach is preferable if your app is primarily
    2D but you want to be able to render 3D models occasionally. It will also be faster
    since it does not use the `CCNodeController`. Just to give you some ballpark numbers,
    my iPhone 3G renders 30 fps with the `CCNodeController` enabled and 50 fps without,
    whereas my iPod touch 4 is unaffected and maxed out at 60 fps either way.


    Whichever approach you choose, you can always embed the CC3Layer in a cocos2d
    scene so that some cocos2d nodes are behind and others are in front of the 3D
    nodes. It’s a simple matter of using the `addChild` method’s `z` parameter or,
    respectively, the `zOrder` property. You can see a sandwiched 3D model in [Figure
    16–6](#Chapter16.html#fig_16_6).


    ![images](images/1606.jpg)


    **Figure 16–6.** *You can have cocos2d nodes both in front of and behind the CC3Layer.*'
  trans: "\n#### 对 AppDelegate 类的更改\n\ncocos3d 的整个启动代码都位于 `AppDelegate` 类中。虽然在 Hello\
    \ World 项目中它完全是空的，但现在这个类可以派上用场了。`AppDelegate` 接口现在有了一个新的实例变量：\n\n```\n#import\
    \ \"KKAppDelegate.h\"\n#import \"CCNodeController.h\"\n\n@interface AppDelegate\
    \ : KKAppDelegate\n{\n    CCNodeController* nodeController;\n}\n@end\n```\n\n\
    `CCNodeController` 由 cocos3d 提供，用于两个目的。其一，它允许你使用 cocos3d 执行自动旋转。常规的 `RootViewController`\
    \ 类与 cocos3d 不完全兼容；它在旋转时往往会拉伸视图或移动节点。因此，cocos3d 提供了自己的用于自动旋转的视图控制器方案，但不幸的是没有旋转动画。\n\
    \n`CCNodeController` 类的另一个好处是它内置了对 `UIImagePickerController` 的支持，这使你的应用能够实时将摄像头视图显示为场景的背景。这使你能够创建所谓的增强现实应用。\n\
    \n图 16-5 展示了一个例子，我的 iPhone 摄像头正在扫描我电脑上方墙上的太阳系海报。这张图像赋予了“Hello World”这个短语全新的含义（图中显示的是地球，德语为\
    \ *Erde*）。\n\n**注意：** 请检查 图 16-4 中的帧率计数器。我那可怜的 iPhone 3G（第二代设备）在实时摄像头背景的压力下不堪重负。它的平均帧率大约为每秒\
    \ 20 帧（fps），即使不渲染 Hello World 3D 模型，平均帧率也不会超过 30 到 40 fps。我的 iPod touch 4 表现也没有好多少，无论是否有\
    \ 3D 模型，平均帧率都在每秒 40 帧左右。显然，在这种情况下，它还有足够的资源来渲染 3D 模型。当然，性能测试是在发布版本下进行的。\n\n尽管存在性能问题，但我希望你能想出很酷的增强现实应用。仅仅是目睹\
    \ cocos2d/cocos3d 场景覆盖在实时摄像头视图之上，就是一种令人振奋的体验！\n\n![images](img/1605.jpg)\n\n**图\
    \ 16-5.** *增强现实：使用 iPhone 的摄像头作为实时背景图像*\n\n设置 cocos3d 节点控制器以显示摄像头背景非常简单。在代码清单\
    \ 16-7 中，你只需将变量 `useNodeController` 设置为 `YES`，如果该功能可用，摄像头背景就会自动启用。只需一行代码即可测试并启用摄像头叠加：\n\
    \n`nodeController.isOverlayingDeviceCamera = nodeController.isDeviceCameraAvailable;`\n\
    \n这段代码直接将摄像头可用性检查的结果赋值给 `isOverlayingDeviceCamera` 属性，从而在每一个有摄像头的设备上启用它。\n\n代码清单\
    \ 16-7 中的 `AppDelegate` 实现使用了 `initializationComplete` 代码来执行所有设置 cocos3d 所需的操作。这个方法非常完美，因为它恰好在所有内容都已设置完毕（除了实际运行的场景）之后被调用。并且，由于你将在此方法中直接通过\
    \ `CCDirectorrunWithScene` 方法或间接通过 `CCNodeController` 的 `runSceneOnNode` 方法来运行场景，`config.lua`\
    \ 中的 `FirstSceneClassName` 设置将被静默忽略。\n\n**代码清单 16-7.** *cocos3d 项目的 AppDelegate\
    \ 实现*\n\n```\n#import \"AppDelegate.h\"\n#import \"Hello3DLayer.h\"\n#import \"\
    Hello3DWorld.h\"\n#import \"HelloWorldLayer.h\"\n\n@implementation AppDelegate\n\
    \n-(void) initializationComplete\n{\n    CC3World* cc3World = [Hello3DWorld world];\n\
    \    CC3Layer* cc3Layer = [Hello3DLayer node];\n    cc3Layer.cc3World = cc3World;\n\
    \n    [cc3World play];\n    [cc3Layer scheduleUpdate];\n\n    ControllableCCLayer*\
    \ mainLayer = cc3Layer;\n\n    BOOL useNodeController = NO;\n    if (useNodeController)\n\
    \    {\n        CCLayer* helloLayer = [HelloWorldLayer node];\n        [mainLayer\
    \ addChild:helloLayer z:-1];\n\n        nodeController = [[CCNodeController controller]\
    \ retain];\n        nodeController.doesAutoRotate = YES;\n        [nodeController\
    \ runSceneOnNode:mainLayer];\n\n        // 让我们用摄像头来点乐趣\n        nodeController.isOverlayingDeviceCamera\
    \ = nodeController.isDeviceCameraAvailable;\n    }\n    else\n    {\n        CCScene*\
    \ scene = [CCScene node];\n        CCLayer* helloLayer = [HelloWorldLayer node];\n\
    \        [scene addChild:helloLayer];\n        [layer addChild:mainLayer];\n \
    \       [[CCDirector sharedDirector] runWithScene:scene];\n    }\n}\n@end\n```\n\
    \ncocos3d 场景始终由两部分组成。`CC3World` 类的一个实例定义了世界，加载 3D 模型，并设置 3D 场景。`CC3World` 也是 3D\
    \ 场景的根类，并包含派生自 `CC3Node` 且构成 3D 场景层次结构的节点。\n\n一个 `CC3Layer` 类实例负责与 cocos2d 引擎的集成。`CC3Layer`\
    \ 类实例可以被添加到任何 cocos2d 节点，因为它派生自 cocos2d 类 `CCLayerColor`。除此之外，它还持有对 `CC3World`\
    \ 实例的引用，并负责更新 3D 世界。\n\n这就解释了为什么你需要同时在 `cc3World` 上调用 `play`，并在 `cc3Layer` 上调用\
    \ `scheduleUpdate`。图层的更新方法将被转发给世界，世界可以处于播放或暂停状态，具体取决于最后调用的是 `play` 方法还是 `pause`\
    \ 方法。每当你对 `CC3World` 调用 `pause` 时，世界将不会被渲染，但最后一帧仍然可见。此外，任何当前在 3D 节点上运行的 cocos2d\
    \ 动作将继续被更新并移动 3D 节点。要同时暂停和恢复这些动作，你需要暂停或恢复每个正在运行动作的 3D 节点：\n\n```\n[[CCActionManager\
    \ sharedManager] pauseTarget:node];\n[[CCActionManager sharedManager] resumeTarget:node];\n\
    ```\n\n我所选择的 cocos3d 启动代码实现允许你在使用 cocos3d 节点控制器（它启用自动旋转）和实时摄像头背景之间切换。在这种情况下，`HelloWorldLayer`\
    \ 作为子节点添加到 `CC3Layer`，并带有负的 z 值，因此它完全显示在 cocos3d 图层之后。你也可以使用 1 或更高的正 z 值将场景显示在\
    \ cocos3d 图层之前。如果你的应用主要是 3D 应用，仅使用一些 cocos2d 元素（例如用于用户界面），那么这两种方法都最有效。\n\n不使用\
    \ `CCNodeController` 的另一种方法是创建常规的 cocos2d 场景，然后将 `CC3Layer` 作为该场景的子节点添加。现在，你可以通过调整它们的\
    \ z 值来轻松决定场景中的哪些 2D 节点位于 cocos3d 图层的后面或前面。如果你的应用主要是 2D 的，但希望偶尔能够渲染 3D 模型，那么这种方法更可取。它也会更快，因为它不使用\
    \ `CCNodeController`。给你一些大致的数据作为参考，我的 iPhone 3G 在启用 `CCNodeController` 时渲染帧率为\
    \ 30 fps，不启用时为 50 fps，而我的 iPod touch 4 则不受影响，两种情况下都能达到 60 fps 的最高帧率。\n\n无论你选择哪种方法，你总是可以将\
    \ `CC3Layer` 嵌入到 cocos2d 场景中，使得一些 cocos2d 节点位于 3D 节点之后，而另一些则位于 3D 节点之前。这只是一个使用\
    \ `addChild` 方法的 `z` 参数或相应的 `zOrder` 属性的简单问题。你可以在图 16-6 中看到一个夹层式的 3D 模型。\n\n![images](img/1606.jpg)\n\
    \n**图 16-6.** *你可以让 cocos2d 节点既出现在 CC3Layer 的前面，也出现在它的后面。*\n"
- fmt: "### The World According to cocos3d\n\nThe `CC3World` class forms the root\
    \ node of the cocos3d node hierarchy. It is important to note that cocos3d nodes\
    \ and cocos2d nodes are two separate things and cannot be mixed together. The\
    \ only cocos3d class that you can add to the cocos2d node hierarchy is the `CC3Layer`\
    \ class, which inherits from `CCLayerColor`.\n\n**Note:** I’ll skip the description\
    \ of the `CC3Layer` class in the Hello Cocos3D project since it’s an empty stub\
    \ class and essentially the same as a `CCLayer` class.\n\nAll other cocos3d nodes\
    \ inherit from `CC3Node`, which despite its name is not derived from `CCNode`.\
    \ Interestingly, though, you can use cocos2d actions with `CC3Node` classes, as\
    \ you’ll see in the `initializeWorld` method in [Listing 16–8](#Chapter16.html#list_16_8).\n\
    \n**Listing 16–8.** Initializing the 3D World\n\n```\n-(void) initializeWorld\n\
    {\n    CC3Camera* cam = [CC3Camera nodeWithName:@\"Camera\"];\n    cam.location\
    \ = cc3v( 0.0, 0.0, 5.0 );\n    [self addChild: cam];\n\n    CC3Light* lamp =\
    \ [CC3Light nodeWithName:@\"Lamp\"];\n    lamp.location = cc3v( -2.0, 0.0, -2.0\
    \ );\n    lamp.isDirectionalOnly = NO;\n    [cam addChild: lamp];\n\n    [self\
    \ addContentFromPODResourceFile:@\"hello-world.pod\"];\n\n    [self createGLBuffers];\n\
    \    [self releaseRedundantData];\n\n    // ------------------------------------------\n\
    \n    CC3MeshNode* helloTxt = (CC3MeshNode*)[self getNodeNamed:@\"Hello\"];\n\
    \    CCActionInterval* partialRot = [CC3RotateBy actionWithDuration:1.0\n    \
    \                                                      rotateBy:cc3v(0, 60.0,\
    \ 10.0)];\n    [helloTxt runAction:[CCRepeatForever actionWithAction:partialRot]];\n\
    \n    CC3MeshNode* camNode = (CC3MeshNode*)[self getNodeNamed: @\"Camera\"];\n\
    \    CCActionInterval* camMove1 = [CC3MoveBy actionWithDuration:4 moveBy:cc3v(0,\
    \ 0, 8)];\n    id camEase1 = [CCEaseBackInOut actionWithAction:camMove1];\n  \
    \  CCActionInterval* camMove2 = [CC3MoveBy actionWithDuration:2 moveBy:cc3v(0,\
    \ 0, -8)];\n    id camEase2 = [CCEaseElasticOut actionWithAction:camMove2 period:0.25f];\n\
    \    id sequence = [CCSequence actions:camEase1, camEase2, nil];\n    [camNode\
    \ runAction:[CCRepeatForever actionWithAction:sequence]];\n\n    GLfloat tintTime\
    \ = 8.0f;\n    ccColor3B startColor = ccc3(255, 0, 255);\n    ccColor3B endColor\
    \ = { 255, 255, 0 };\n    CCActionInterval* tintDown = [CCTintTo actionWithDuration:tintTime\n\
    \                                                          red:endColor.r\n  \
    \                                                      green:endColor.g\n    \
    \                                                     blue:endColor.b];\n    CCActionInterval*\
    \ tintUp = [CCTintTo actionWithDuration:tintTime\n                           \
    \                             red:startColor.r\n                             \
    \                         green:startColor.g\n                               \
    \                        blue:startColor.b];\n    CCActionInterval* tintCycle\
    \ = [CCSequence actionOne:tintDown two:tintUp];\n    [helloTxt runAction:[CCRepeatForever\
    \ actionWithAction:tintCycle]];\n}\n```\n\nThe first thing the 3D world needs\
    \ is a camera through which you view the scene. The camera affects only cocos3d\
    \ nodes and will not change how cocos2d nodes are displayed. The camera `location`\
    \ property defines the position of the camera, which newcomers to the 3D world\
    \ might find confusing at first. If you move the camera, all cocos3d nodes will\
    \ move in the opposite direction. Imagine looking through the viewfinder of your\
    \ camera and then moving the camera to the right, and you’ll see all objects in\
    \ the camera view moving to the right. It’s the same with `CC3Camera` except that\
    \ you have to imagine the screen of the device to be the viewfinder through which\
    \ you look into the 3D world.\n\nFor reference, increasing the values for the\
    \ camera’s x, y, and z locations will move the camera to the right, up, and toward\
    \ the viewer, respectively. This will have 3D objects move to the left, down,\
    \ and away from the viewer (zoom out). Decreasing the x, y, and z location will\
    \ move the camera view to the left, down, and away from the viewer. The 3D objects\
    \ will move to the right, up, and toward the viewer (zoom in). Of course, you\
    \ can always have the camera at a fixed location and move the 3D nodes instead\
    \ if you find that easier to work with.\n\nA `CC3World` is not complete without\
    \ at least one light. Without light, your 3D models would be illuminated equally\
    \ on all sides and would make them look flat despite being 3D. By default a `CC3Light`\
    \ node creates a directional light, comparable to that of a flashlight. If you\
    \ want to achieve the effect of a lightbulb illuminating all of its surroundings\
    \ equally (the preferred choice), you need to set `isDirectionallyOnly` to `NO`.\n\
    \nWith camera and lights set, all that is missing is action. Before we get to\
    \ that, we need a 3D model to display. You can load 3D models from POD files with\
    \ the `CC3Node` method `addContentFromPODResourceFile`. This will load the POD\
    \ file and add it as a `CC3MeshNode` instance to the world. You can later get\
    \ a reference to this node with the `getNodeNamed` method and by supplying the\
    \ name of the mesh as set in the 3D modeling program. The `hello-world.pod` mesh\
    \ has the name `Hello`.\n\n**Tip:** Cocos3d v0.6.1 supports loading of PowerVR\
    \ POD files only. Additional 3D model file loaders are listed in the road map\
    \ for Q4 2011 but without specifying which file formats will be supported. Until\
    \ then, you can either use POD or write your own loader code.\n\nThe POD format\
    \ is an optimized binary format that most 3D modeling applications can’t directly\
    \ export. However, almost all of them can export to the COLLADA format, which\
    \ you can then convert to POD. The developer of cocos3d Bill Hollings has an excellent\
    \ tutorial about converting COLLADA files to the POD format: [`http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod`](http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod).\n\
    \nThe tutorial assumes you are using the Blender 3D content creation suite, which\
    \ is very popular because it’s free and open source. Many other 3D modeling programs\
    \ cost four- or even five-digit sums. You can get Blender at [`www.blender.org`](http://www.blender.org)\
    \ and overlook some of its oddities. After all, you have just saved a big pile\
    \ of money.\n\nThe method `createGLBuffers` should be called after loading all\
    \ 3D mesh models. It optimizes the vertex arrays for rendering. And `releaseRedundantData`\
    \ simply performs a cleanup to release some memory afterward.\n\nThe second half\
    \ of the `initializeWorld` method is left to animations with cocos2d and cocos3d\
    \ actions. Some additional actions are provided by cocos3d like `CC3RotateBy`,\
    \ `CC3MoveBy`, and essentially all actions that manipulate positions needed to\
    \ have versions that work in the three-dimensional coordinate system. Other actions\
    \ like `CCSequence`, `CCRepeatForever`, or `CCTintTo` are from cocos2d. They work\
    \ as always and can be mixed with cocos3d actions.\n\nIn essence, there are three\
    \ action blocks. The first rotates the Hello World 3D model around its own axis.\
    \ The second has the camera bounce back and forth. And the third action block\
    \ performs a repeated color cycle on the Hello World 3D model."
  raw: '#### The World According to cocos3d


    The `CC3World` class forms the root node of the cocos3d node hierarchy. It is
    important to note that cocos3d nodes and cocos2d nodes are two separate things
    and cannot be mixed together. The only cocos3d class that you can add to the cocos2d
    node hierarchy is the `CC3Layer` class, which inherits from `CCLayerColor`.


    **NOTE:** I’ll skip the description of the `CC3Layer` class in the Hello Cocos3D
    project since it’s an empty stub class and essentially the same as a `CCLayer`
    class.


    All other cocos3d nodes inherit from `CC3Node`, which despite its name is not
    derived from `CCNode`. Interestingly, though, you can use cocos2d actions with
    `CC3Node` classes, as you’ll see in the `initializeWorld` method in [Listing 16–8](#Chapter16.html#list_16_8).


    **Listing 16–8.** *Initializing the 3D World*


    `-(void) initializeWorld`

    `{`

    `    CC3Camera* cam = [CC3Camera nodeWithName:@"Camera"];`

    `    cam.location = cc3v( 0.0, 0.0, 5.0 );`

    `    [self addChild: cam];`


    `    CC3Light* lamp = [CC3Light nodeWithName:@"Lamp"];`

    `    lamp.location = cc3v( -2.0, 0.0, -2.0 );`

    `    lamp.isDirectionalOnly = NO;`

    `    [cam addChild: lamp];`


    `    [self addContentFromPODResourceFile:@"hello-world.pod"];`


    `    [self createGLBuffers];`

    `    [self releaseRedundantData];`


    `    // ------------------------------------------`


    `    CC3MeshNode* helloTxt = (CC3MeshNode*)[self getNodeNamed:@"Hello"];`

    `    CCActionInterval* partialRot = [CC3RotateBy actionWithDuration:1.0`

    `                                                          rotateBy:cc3v(0, 60.0,
    10.0)];`

    `    [helloTxt runAction:[CCRepeatForever actionWithAction:partialRot]];`


    `    CC3MeshNode* camNode = (CC3MeshNode*)[self getNodeNamed: @"Camera"];`

    `    CCActionInterval* camMove1 = [CC3MoveBy actionWithDuration:4 moveBy:cc3v(0,
    0, 8)];`

    `    id camEase1 = [CCEaseBackInOut actionWithAction:camMove1];`

    `    CCActionInterval* camMove2 = [CC3MoveBy actionWithDuration:2 moveBy:cc3v(0,
    0, -8)];`

    `    id camEase2 = [CCEaseElasticOut actionWithAction:camMove2 period:0.25f];`

    `    id sequence = [CCSequence actions:camEase1, camEase2, nil];`

    `    [camNode runAction:[CCRepeatForever actionWithAction:sequence]];`


    `    GLfloat tintTime = 8.0f;`

    `    ccColor3B startColor = ccc3(255, 0, 255);`

    `    ccColor3B endColor = { 255, 255, 0 };`

    `    CCActionInterval* tintDown = [CCTintTo actionWithDuration:tintTime`

    `                                                          red:endColor.r`

    `                                                        green:endColor.g`

    `                                                         blue:endColor.b];`

    `    CCActionInterval* tintUp = [CCTintTo actionWithDuration:tintTime`

    `                                                        red:startColor.r`

    `                                                      green:startColor.g`

    `                                                       blue:startColor.b];`

    `    CCActionInterval* tintCycle = [CCSequence actionOne:tintDown two:tintUp];`

    `    [helloTxt runAction:[CCRepeatForever actionWithAction:tintCycle]];`

    `}`


    The first thing the 3D world needs is a camera through which you view the scene.
    The camera affects only cocos3d nodes and will not change how cocos2d nodes are
    displayed. The camera `location` property defines the position of the camera,
    which newcomers to the 3D world might find confusing at first. If you move the
    camera, all cocos3d nodes will move in the opposite direction. Imagine looking
    through the viewfinder of your camera and then moving the camera to the right,
    and you’ll see all objects in the camera view moving to the right. It’s the same
    with `CC3Camera` except that you have to imagine the screen of the device to be
    the viewfinder through which you look into the 3D world.


    For reference, increasing the values for the camera’s x, y, and z locations will
    move the camera to the right, up, and toward the viewer, respectively. This will
    have 3D objects move to the left, down, and away from the viewer (zoom out). Decreasing
    the x, y, and z location will move the camera view to the left, down, and away
    from the viewer. The 3D objects will move to the right, up, and toward the viewer
    (zoom in). Of course, you can always have the camera at a fixed location and move
    the 3D nodes instead if you find that easier to work with.


    A `CC3World` is not complete without at least one light. Without light, your 3D
    models would be illuminated equally on all sides and would make them look flat
    despite being 3D. By default a `CC3Light` node creates a directional light, comparable
    to that of a flashlight. If you want to achieve the effect of a lightbulb illuminating
    all of its surroundings equally (the preferred choice), you need to set `isDirectionallyOnly`
    to `NO`.


    With camera and lights set, all that is missing is action. Before we get to that,
    we need a 3D model to display. You can load 3D models from POD files with the
    `CC3Node` method `addContentFromPODResourceFile`. This will load the POD file
    and add it as a `CC3MeshNode` instance to the world. You can later get a reference
    to this node with the `getNodeNamed` method and by supplying the name of the mesh
    as set in the 3D modeling program. The hello-world.pod mesh has the name `Hello`.


    **TIP:** Cocos3d v0.6.1 supports loading of PowerVR POD filesonly. Additional
    3D model file loaders are listed in the road map for Q4 2011 but without specifying
    which file formats will be supported. Until then, you can either use POD or write
    your own loader code.


    The POD format is an optimized binary format that most 3D modeling applications
    can’t directly export. However, almost all of them can export to the COLLADA format,
    which you can then convert to POD. The developer of cocos3d Bill Hollings has
    an excellent tutorial about converting COLLADA files to the POD format: [`http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod`](http://brenwill.com/2011/cocos3d-importing-converting-collada-to-pod).


    The tutorial assumes you are using the Blender 3D content creation suite, which
    is very popular because it’s free and open source. Many other 3D modeling programs
    cost four- or even five-digit sums. You can get Blender at [`www.blender.org`](http://www.blender.org)
    and overlook some of its oddities. After all, you have just saved a big pile of
    money.


    The method `createGLBuffers` should be called after loading all 3D mesh models.
    It optimizes the vertex arrays for rendering. And `releaseRedundantData` simply
    performs a cleanup to release some memory afterward.


    The second half of the `initializeWorld` method is left to animations with cocos2d
    and cocos3d actions. Some additional actions are provided by cocos3d like `CC3RotateBy`,
    `CC3MoveBy`, and essentially all actions that manipulate positions needed to have
    versions that work in the three-dimensional coordinate system. Other actions like
    `CCSequence`, `CCRepeatForever`, or `CCTintTo` are from cocos2d. They work as
    always and can be mixed with cocos3d actions.


    In essence, there are three action blocks. The first rotates the Hello World 3D
    model around its own axis. The second has the camera bounce back and forth. And
    the third action block performs a repeated color cycle on the Hello World 3D model.'
