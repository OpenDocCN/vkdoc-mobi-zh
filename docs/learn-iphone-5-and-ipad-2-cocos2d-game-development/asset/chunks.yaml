- fmt: '## About the Authors


    ![image](images/steffen_itterheim.jpg) **Steffen Itterheim** has been a game development
    enthusiast since the early 1990s. His work in the Doom and Duke Nukem 3D communities
    landed him his first freelance job as a beta tester for 3D Realms. He has been
    a professional game developer for more than a decade, having worked most of his
    career as a gameplay and tools programmer for Electronic Arts Phenomic. His first
    contact with `cocos2d` was in 2009, when he cofounded an aspiring iOS games start-up
    company called Fun Armada. He loves to teach and enable other game developers
    so that they can work smarter, not harder. Occasionally you''ll find him strolling
    around in the lush vineyards near his domicile at daytime, and the desert of Nevada
    at night, collecting bottle caps.


    ![image](images/andreas_low.jpg) **Andreas Löw** has been a computer feak since
    he the age of 10 when he got is first Commodore C16. Teaching himself how to write
    games, he released his first computer game, Gamma Zone, for Commodore Amiga in
    1994, written in pure assembly language. After his diploma in electrical engineering,
    he worked for Harman International, in the department responsible for developing
    navigation and infotainment systems with speech recognition for the automotive
    industy. He invented his own programming language and development tools, which
    are in use by every car with speech recognition technology around the world.


    With the iPhone, he found his way back to his roots and began developing a game
    called `TurtleTrigger`. He realized there is a huge demand for good tools in the
    cocos2d community. With his knowledge in both game and tool development, his products
    `TexturePacker` and `PhysicsEditor` quickly became essential development tools
    for any `cocos2d` user.


    ## About the Technical Reviewer


    ![image](images/boon_chew.jpg) **Boon Chew** is the managing director for Nanaimo
    Studio, a game studio based in Seattle and Shanghai that specializes in web and
    mobile games.He has extensive experience with game development and interactive
    media, having previously worked for companies such as Vivendi Universal, Amazon,
    Microsoft, and various game studios and advertising agencies. His passion is in
    building things and working with great people.You can reach Boon at [`boon@nanaimostudio.com`](http://boon@nanaimostudio.com).


    ## Preface


    In May 2009 I made first contact. For the first time in my life, I was subjected
    to the Mac OS platform and started learning Xcode, Objective-C, and `cocos2d`.
    Even for experienced developers like me and my colleagues, it was a struggle.
    It was then that I realized `cocos2d` was good, but it lacked documentation, tutorials,
    and how-to articles—especially when compared with the other technologies I was
    learning at the time.


    Fast-forward a year to May 2010. I had completed four `cocos2d` projects. My Objective-C
    and `cocos2d` had become fluent. It pained me to see how other developers were
    still struggling with the same basic issues and were falling victim to the same
    misconceptions that I did about a year earlier. The `cocos2d` documentation was
    still severely lacking.


    I saw that other `cocos2d` developers were having great success attracting readers
    to their blogs by writing tutorials and sharing what they know about `cocos2d`.
    To date, most of the `cocos2d` documentation is actively being created in a decentralized
    fashion by other developers. I saw a need for a web site to channel all of the
    information that''s spread over so many different web sites.


    I created the [`www.learn-cocos2d.com`](http://www.learn-cocos2d.com) web site
    to share what I knew about `cocos2d` and game development, to write tutorials
    and FAQs, and to redirect readers interested in `cocos2d` to all the important
    sources of information. In turn, I would be selling `cocos2d`-related products,
    hoping it might one day bring me close to the ultimate goal of becoming financially
    independent. I knew I could make the web site a win for everyone.


    From day one, the web site was a success—beyond my wildest imaginations. Then,
    within 24 hours of taking the web site live, Jack Nutting asked me if I had considered
    writing a `cocos2d` book. The rest is history, and the result is the book you''re
    reading right now.


    I took everything I had in mind for the web site and put it in the book. But that
    alone would have amounted to maybe a quarter of the book, at most. I hope the
    four months I spent writing the book full-time paid off by being able to provide
    an unprecedented level of detail on how `cocos2d` works and how to work with `cocos2d`.


    I learned a lot in the process, and even more so during months updating the chapters
    of the second edition. I wish nothing more than for you to learn a great deal
    about `cocos2d` and game development from this book.


    What I learned from writing about `cocos2d` is that there''s a lot of room for
    improvement. I strongly believed that the world needed a better `cocos2d` that''s
    more approachable for beginning game developers. The result of that is `Kobold2D`,
    which you''ll find an introduction to in Chapter 16 and of course on [`www.kobold2d.com`](http://www.kobold2d.com).
    Of course, almost all of what you''ll learn throughout the book still applies
    to `Kobold2D`.


    Steffen Itterheim


