    packet type. If you assign the wrong packet type, the receiver won''t know what
    to do with the packet. It might mistake it for a different type of packet, causing
    a crash because the receiver might try to access a nonexisting field. Or the receiver
    might simply work with unrelated data, causing all kinds of bugs. Imagine the
    score becoming the player''s position, or vice versa. To avoid these kinds of
    issues, particularly if you have many different packet types, it may be helpful
    to create methods like `createPositionPacket` and `createScorePacket`, which you
    call with all the required parameters for the packet while the method itself fills
    in the correct packet type.


