    project.


    The key point to take away here is actually that the `BodyNode` is a `CCSprite`
    that manages the allocation, deallocation, and configuration of the Box2D body
    for you. It also ensures that you''ll be able to access the `BodyNode` class and
    thus the cocos2d sprite wherever you normally have accessonly to the Box2D body
    object. Thus, the `BodyNode` class becomes the glue that brings the physics body
    together with the cocos2d sprite.


    If a sprite derived from `BodyNode` goes out of scope—for example, if you remove
    it as a child from its cocos2d parent node—then `BodyNode` will take care of destroying
    the Box2D body for you.


    In addition, you are able to change the sprite''s body shape by calling `setBodyShape`.
    This removesany existing fixtures from the body and then adds the fixturesassociated
