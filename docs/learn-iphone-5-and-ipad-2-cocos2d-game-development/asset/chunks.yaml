    `    CGPoint velocity = ccpMult(joystick.velocity, 7000 * delta);`

    `    if (velocity.x != 0 && velocity.y != 0)`

    `    {`

    `        ship.position = CGPointMake(ship.position.x + velocity.x * delta,`![images](images/U002.jpg)

    `            ship.position.y + velocity.y * delta);`

    `    }`

    `}`'
  trans: "\n# 排版后的文本\n\n我像往常一样初始化了 `fireButton`，但使其能够被长按，这意味着你可以持续按住它来连续发射子弹。它也不再设置\
    \ `radius` 属性，因为现在 `SneakyButtonSkinnedBase` 类的图像决定了半径。请记住，我在之前创建的 `SneakyExtension`\
    \ 源文件中为 `SneakyButtonSkinnedBase` 添加了一个分类。`skinnedButton` 初始化器就在其中，并封装了 `alloc`\
    \ 和 `autorelease` 消息。\n\n现在不再直接定位 `fireButton`，而是使用蒙皮按钮来在屏幕上定位按钮；`SneakyButtonSkinnedBase`\
    \ 会相应地更新实际按钮的位置。\n\n此时，编写开火代码也合情合理；代码清单 7–10 展示了 `update` 方法现在如何向 `GameScene`\
    \ 类发送开火消息。\n\n**代码清单 7–10.** *当开火按钮激活时发射子弹*\n\n```\n-(void) update:(ccTime)delta\n\
    {\n    totalTime += delta;\n\n    if (fireButton.active && totalTime > nextShotTime)\n\
    \    {\n        nextShotTime = totalTime + 0.5f;\n\n        GameScene* game =\
    \ [GameScene sharedGameScene];\n        [game shootBulletFromShip:[game defaultShip]];\n\
    \    }\n\n    // 通过快速点击开火按钮实现更快的射击\n    if (fireButton.active == NO)\n    {\n\
    \        nextShotTime = 0;\n    }\n}\n```\n\n两个 `ccTime` 类型的变量，`totalTime` 和 `nextShotTime`，用于限制飞船每秒最多发射两枚子弹。如果开火按钮未激活（即未被按下），则将\
    \ `nextShotTime` 设置为 0，这样下次按下按钮时，一定会发射子弹。快速点击按钮，你应该能够比连续开火发射更多的子弹。\n\n## 控制操作\n\
    \n没有某种形式的输入，你就无法驾驶飞船。这正是 `SneakyJoystick` 要助我们一臂之力（我是说虚拟摇杆）的地方。看好了，ScrollingWithJoy07\
    \ 来了！\n\n像往常一样，我做的第一件事就是为新类添加另一个 `Extension` 分类，这样我就可以像初始化其他任何 `CCNode` 一样初始化它们。对于摇杆，我将在代码清单\
    \ 7–11 中的 `addJoystick` 方法里直接创建一个蒙皮摇杆。\n\n**代码清单 7–11.** *添加一个蒙皮摇杆*\n\n```\n-(void)\
    \ addJoystick\n{\n    float stickRadius = 50;\n\n    joystick = [SneakyJoystick\
    \ joystickWithRect:CGRectMake(0, 0, stickRadius,\n        stickRadius)];\n   \
    \ joystick.autoCenter = YES;\n    joystick.hasDeadzone = YES;\n    joystick.deadRadius\
    \ = 10;\n\n    SneakyJoystickSkinnedBase* skinStick = [SneakyJoystickSkinnedBase\n\
    \        skinnedJoystick];\n    skinStick.position = CGPointMake(stickRadius *\
    \ 1.5f, stickRadius * 1.5f);\n    skinStick.backgroundSprite = [CCSprite spriteWithSpriteFrameName:\n\
    \        @\"joystick-back.png\"];\n    skinStick.backgroundSprite.color = ccYELLOW;\n\
    \    skinStick.thumbSprite = [CCSprite spriteWithSpriteFrameName:\n        @\"\
    joystick-stick.png\"];\n    skinStick.joystick = joystick;\n    [self addChild:skinStick];\n\
    }\n```\n\n`SneakyJoystick` 使用一个 `CGRect` 进行初始化，与 `SneakyButton` 不同，这个 `CGRect`\
    \ 实际上用于确定摇杆的半径。我将摇杆设置为 `autoCenter`，这样拇指控制器就会弹回中立位置，就像大多数现实世界的游戏控制器一样。同时启用了死区；这是由\
    \ `deadRadius` 定义的一个小区域，在此区域内移动拇指控制器不会产生任何效果。这为用户提供了一个特定半径，他们可以在其中保持拇指控制器居中。没有死区的话，几乎不可能手动将拇指控制器居中。\n\
    \n`SneakyJoystickSkinnedBase` 的位置距离屏幕边缘有一小段距离。按钮的位置和大小对于游戏来说可能并非理想，但这让我能更好地展示控制效果。如果你将拇指控制器与屏幕边缘对齐，手指很容易无意中移出触摸屏，从而失去对飞船的控制。\n\
    \n**提示：** 灰色区域很有用！我指的是像 `joystick-back.png` 这样的灰色图像。通过仅使用灰度颜色，你可以使用精灵的 `color`\
    \ 属性为图像着色。你可以创建同一图像的红色、绿色、黄色、蓝色、洋红色及其他彩色版本，从而节省下载大小和游戏内存。唯一的缺点是它会变成纯色，因此你的图像将使用红色阴影，而不是灰色阴影。这个技巧最适合那些本该是单一颜色深浅变化的图像。\n\
    \n当然，你希望屏幕上的摇杆用于控制飞船。像往常一样，`update` 方法处理输入，如代码清单 7–12 所示。\n\n**代码清单 7–12.** *基于摇杆输入移动飞船*\n\
    \n```\n-(void) update:(ccTime)delta\n{\n    …\n\n    // 使用拇指控制器移动飞船\n    GameScene*\
    \ game = [GameScene sharedGameScene];\n    Ship* ship = [game defaultShip];\n\n\
    \    // 速度必须按感觉合适的比例进行缩放\n    CGPoint velocity = ccpMult(joystick.velocity, 7000\
    \ * delta);\n    if (velocity.x != 0 && velocity.y != 0)\n    {\n        ship.position\
    \ = CGPointMake(ship.position.x + velocity.x * delta,\n            ship.position.y\
    \ + velocity.y * delta);\n    }\n}\n```\n"
- fmt: "I have added a `defaultShip` accessor method to the `GameScene` class in the\
    \ meantime so that the `InputLayer` has access to the ship. The `velocity` property\
    \ of the joystick is used to change the ship’s position but not without scaling\
    \ it up. The `velocity` values are a tiny fraction of a pixel, so multiplying\
    \ the velocity using cocos2d’s `ccpMult` method, which takes a `CGPoint` and a\
    \ float factor, is necessary for the joypad velocity to have a noticeable effect.\
    \ The scale factor is arbitrary; it’s just a value that feels good for this game.\n\
    \nTo ensure smooth movement even if the `update` method is called at uneven intervals,\
    \ the `update` method’s `delta` parameter is factored in as well. The `delta`\
    \ parameter is passed by cocos2d and contains the time elapsed since the `update`\
    \ method was last called. This isn’t strictly necessary, but it’s good practice.\
    \ If you don’t do it, you run the risk that the ship will move more slowly whenever\
    \ the framerate drops below 60 fps. Tiny things like these can be pretty annoying\
    \ to players, and as game developers, our goal is the exact opposite of annoying\
    \ players.\n\nAt this point, it is still possible to move the ship outside the\
    \ screen area. I bet you’d like for the ship to stay on the screen as much as\
    \ I do. And you may be tempted to add this code directly to the `InputLayer` where\
    \ the ship’s position is updated. That brings up a question: do you want to prevent\
    \ the joystick input from moving the ship outside the screen, or do you want to\
    \ prevent the ship from ever being able to move outside the screen? The latter\
    \ is the more general solution and preferable in this case. To do so, you only\
    \ need to override the `setPosition` method in the `Ship` class, as shown in [Listing\
    \ 7–13](#Chapter07.html#list_7_13).\n\n**Listing 7–13.** *Overriding the Ship’s\
    \ setPosition Method*\n\n```\n// Override setPosition to keep the ship within\
    \ bounds\n-(void) setPosition:(CGPoint)pos\n{\n    CGSize screenSize = [[CCDirector\
    \ sharedDirector] winSize];\n    float halfWidth = contentSize_.width * 0.5f;\n\
    \    float halfHeight = contentSize_.height * 0.5f;\n\n\t\t`// Cap the position\
    \ so the ship's sprite stays on the screen`\n\t    if (pos.x < halfWidth)\n  \
    \  {\n        pos.x = halfWidth;\n    }\n    else if (pos.x > (screenSize.width\
    \ - halfWidth))\n    {\n        pos.x = screenSize.width - halfWidth;\n    }\n\
    \n    if (pos.y < halfHeight)\n    {\n        pos.y = halfHeight;\n    }\n   \
    \ else if (pos.y > (screenSize.height - halfHeight))\n    {\n        pos.y = screenSize.height\
    \ - halfHeight;\n    }\n\n\t    // Must call super with the new position\n   \
    \ [super setPosition:pos];\n}\n```\n\nEvery time the ship’s position is updated,\
    \ the preceding code performs the check to see whether the ship’s sprite is still\
    \ inside the screen boundaries. If not, then the X or Y coordinate is set to a\
    \ distance of half the `contentSize` away from the respective screen border.\n\
    \nBecause `position` is a property, the `setPosition` method gets called by this\
    \ code:\n\n```\nship.position = CGPointMake(200, 100);\n```\n\nThe dot notation\
    \ is shorthand for getter and setter messages to Objective-C properties, and it\
    \ can be rewritten:\n\n```\n[ship setPosition:CGPointMake(200, 100)];\n```\n\n\
    You can override other base class methods in this way to change the behavior of\
    \ your game objects. For example, if an object is allowed to be rotated only between\
    \ 0 and 180 degrees, you would override the `setRotation:(float)rotation` method\
    \ and add the code to limit the rotation to it.\n\n#### Digital Controls\n\nYou\
    \ can turn the `SneakyJoystick` class into a digital controller as well, often\
    \ referred to as a *D-pad*. The necessary code changes are minimal. You can find\
    \ them in the ScrollingWithJoy08 project or right here:\n\n```\njoystick = [SneakyJoystick\
    \ joystickWithRect:CGRectMake(0, 0, stickRadius, stickRadius)];\njoystick.autoCenter\
    \ = YES;\n\n// Now with fewer directions\njoystick.isDPad = YES;\njoystick.numberOfDirections\
    \ = 8;\n```\n\nThe dead zone properties have been removed—they are not needed\
    \ for a digital controller. The joystick is set to digital controls by setting\
    \ the `isDPad` property to `YES`. You can also define the number of directions.\
    \ While D-pads regularly have four directions, in many games you can keep two\
    \ directions pressed at the same time to have the character move in a diagonal\
    \ direction. To achieve the same effect, the `numberOfDirections` property is\
    \ set to 8. `SneakyJoystick` automatically ensures that these directions are evenly\
    \ divided onto the thumbpad controller. Of course, you will get strange results\
    \ if you set the number of directions to 6, but then again, maybe that’s exactly\
    \ what you need to travel across a hexagonal tile map.\n\n### Summary\n\nIn this\
    \ chapter you learned several tricks to make an effective parallax scrolling background.\
    \ Not only did you learn to scroll the background infinitely and without flickering\
    \ edges, but you also learned how to properly separate the parallax layers so\
    \ that TexturePacker can cut down on any unnecessary transparent areas while keeping\
    \ the image’s offset so you don’t have to fumble with positioning the parallax\
    \ layers.\n\nThe downside to this approach is that it is specific to a certain\
    \ screen resolution. If you wanted to create an iPad version, for example, you\
    \ could use the same process, except you’d have to create the image at a 1024×768\
    \ resolution. I’ll leave that up to you as an exercise.\n\nThe second half of\
    \ this chapter introduced you to SneakyInput, an open source project to add virtual\
    \ thumbsticks and buttons to any cocos2d game. It may not be perfect, but it’s\
    \ good enough for most games, and it definitely beats writing your own virtual\
    \ thumbstick code.\n\nThe ship is now controllable and stays within the screen’s\
    \ boundaries, and it’s able to shoot with the press of a button—but the game is\
    \ still lacking something. A shoot-’em-up isn’t a shoot-’em-up without something\
    \ to shoot down, is it? The next chapter addresses that lack.\n\n## Chapter 8\n\
    \n## Shoot 'emUp\n\nWhat does a game of this kind need above all else? Something\
    \ to shoot up and bullets to evade. In this chapter, you'll be adding enemies\
    \ to the game and even a boss monster.\n\nBoth enemies and player will use the\
    \ new `BulletCache` class to shoot a variety of bullets from the same pool. The\
    \ cache class reuses inactive bullets to avoid constantly allocating and releasing\
    \ bullets from memory. Likewise, enemies will use their own `EnemyCache` class\
    \ because they, too, will appear in greater numbers on the screen.\n\nObviously\
    \ the player will be able to shoot these enemies. I will also introduce the concept\
    \ of component-based programming, which allows you to extend the game's actors\
    \ in a modular way. Besides shooting and moving components, we also create a healthbar\
    \ component for the boss monster. After all, a boss monster should not be an instant\
    \ kill but require several hits before it is destroyed."
  raw: 'I have added a `defaultShip` accessor method to the `GameScene` class in the
    meantime so that the `InputLayer` has access to the ship. The `velocity` property
    of the joystick is used to change the ship’s position but not without scaling
    it up. The `velocity` values are a tiny fraction of a pixel, so multiplying the
    velocity using cocos2d’s `ccpMult` method, which takes a `CGPoint` and a float
    factor, is necessary for the joypad velocity to have a noticeable effect. The
    scale factor is arbitrary; it’s just a value that feels good for this game.


    To ensure smooth movement even if the `update` method is called at uneven intervals,
    the `update` method’s `delta` parameter is factored in as well. The `delta` parameter
    is passed by cocos2d and contains the time elapsed since the `update` method was
    last called. This isn’t strictly necessary, but it’s good practice. If you don’t
    do it, you run the risk that the ship will move more slowly whenever the framerate
    drops below 60 fps. Tiny things like these can be pretty annoying to players,
    and as game developers, our goal is the exact opposite of annoying players.


    At this point, it is still possible to move the ship outside the screen area.
    I bet you’d like for the ship to stay on the screen as much as I do. And you may
    be tempted to add this code directly to the `InputLayer` where the ship’s position
    is updated. That brings up a question: do you want to prevent the joystick input
    from moving the ship outside the screen, or do you want to prevent the ship from
    ever being able to move outside the screen? The latter is the more general solution
    and preferable in this case. To do so, you only need to override the `setPosition`
    method in the `Ship` class, as shown in [Listing 7–13](#Chapter07.html#list_7_13).


    **Listing 7–13.** *Overriding the Ship’s setPosition Method*


    `// Override setPosition to keep the ship within bounds`

    `-(void) setPosition:(CGPoint)pos`

    `{`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`

    `    float halfWidth = contentSize_.width * 0.5f;`

    `    float halfHeight = contentSize_.height * 0.5f;`


    `    // Cap the position so the ship''s sprite stays on the screen`

    `    if (pos.x < halfWidth)`

    `    {`

    `        pos.x = halfWidth;`

    `    }`

    `    else if (pos.x > (screenSize.width - halfWidth))`

    `    {`

    `        pos.x = screenSize.width - halfWidth;`

    `    }`


    `    if (pos.y < halfHeight)`

    `    {`

    `        pos.y = halfHeight;`

    `    }`

    `    else if (pos.y > (screenSize.height - halfHeight))`

    `    {`

    `        pos.y = screenSize.height - halfHeight;`

    `    }`


    `    // Must call super with the new position`

    `    [super setPosition:pos];`

    `}`


    Every time the ship’s position is updated, the preceding code performs the check
    to see whether the ship’s sprite is still inside the screen boundaries. If not,
    then the X or Y coordinate is set to a distance of half the `contentSize` away
    from the respective screen border.


    Because `position` is a property, the `setPosition` method gets called by this
    code:


    `ship.position = CGPointMake(200, 100);`


    The dot notation is shorthand for getter and setter messages to Objective-C properties,
    and it can be rewritten:


    `[ship setPosition:CGPointMake(200, 100)];`


    You can override other base class methods in this way to change the behavior of
    your game objects. For example, if an object is allowed to be rotated only between
    0 and 180 degrees, you would override the `setRotation:(float)rotation` method
    and add the code to limit the rotation to it.


    #### Digital Controls


    You can turn the `SneakyJoystick` class into a digital controller as well, often
    referred to as a *D-pad*. The necessary code changes are minimal. You can find
    them in the ScrollingWithJoy08 project or right here:


    `joystick = [SneakyJoystick joystickWithRect:CGRectMake(0, 0, stickRadius, stickRadius)];`

    `joystick.autoCenter = YES;`


    `// Now with fewer directions`

    **`joystick.isDPad = YES;`**

    **`joystick.numberOfDirections = 8;`**


    The dead zone properties have been removed—they are not needed for a digital controller.
    The joystick is set to digital controls by setting the `isDPad` property to `YES`.
    You can also define the number of directions. While D-pads regularly have four
    directions, in many games you can keep two directions pressed at the same time
    to have the character move in a diagonal direction. To achieve the same effect,
    the `numberOfDirections` property is set to 8\. `SneakyJoystick` automatically
    ensures that these directions are evenly divided onto the thumbpad controller.
    Of course, you will get strange results if you set the number of directions to
    6, but then again, maybe that’s exactly what you need to travel across a hexagonal
    tile map.


    ### Summary


    In this chapter you learned several tricks to make an effective parallax scrolling
    background. Not only did you learn to scroll the background infinitely and without
    flickering edges, but you also learned how to properly separate the parallax layers
    so that TexturePacker can cut down on any unnecessary transparent areas while
    keeping the image’s offset so you don’t have to fumble with positioning the parallax
    layers.


    The downside to this approach is that it is specific to a certain screen resolution.
    If you wanted to create an iPad version, for example, you could use the same process,
    except you’d have to create the image at a 1024×768 resolution. I’ll leave that
    up to you as an exercise.


    The second half of this chapter introduced you to SneakyInput, an open source
    project to add virtual thumbsticks and buttons to any cocos2d game. It may not
    be perfect, but it’s good enough for most games, and it definitely beats writing
    your own virtual thumbstick code.


    The ship is now controllable and stays within the screen’s boundaries, and it’s
    able to shoot with the press of a button—but the game is still lacking something.
    A shoot-’em-up isn’t a shoot-’em-up without something to shoot down, is it? The
    next chapter addresses that lack.


    ## Chapter 8


    ## Shoot ''emUp


    What does a game of this kind need above all else? Something to shoot up and bullets
    to evade. In this chapter, you''ll be adding enemies to the game and even a boss
    monster.


    Both enemies and player will use the new `BulletCache` class to shoot a variety
    of bullets from the same pool. The cache class reuses inactive bullets to avoid
    constantly allocating and releasing bullets from memory. Likewise, enemies will
    use their own `EnemyCache` class because they, too, will appear in greater numbers
    on the screen.


    Obviously the player will be able to shoot these enemies. I will also introduce
    the concept of component-based programming, which allows you to extend the game''s
    actors in a modular way. Besides shooting and moving components, we also create
    a healthbar component for the boss monster. After all, a boss monster should not
    be an instant kill but require several hits before it is destroyed.'
  trans: "\n在此期间，我为 `GameScene` 类添加了一个 `defaultShip` 访问器方法，以便 `InputLayer` 能够访问飞船。摇杆的\
    \ `velocity` 属性用于改变飞船的位置，但必须进行缩放。`velocity` 的值只是像素的极小一部分，因此需要使用 cocos2d 的 `ccpMult`\
    \ 方法（该方法接收一个 `CGPoint` 和一个浮点因子）来乘以速度，才能使游戏摇杆的速度产生明显效果。缩放因子是任意的；只是一个对这个游戏感觉合适的数值。\n\
    \n为了确保即使在 `update` 方法以不均匀的时间间隔被调用时也能实现平滑移动，`update` 方法的 `delta` 参数也被考虑在内。`delta`\
    \ 参数由 cocos2d 传递，包含自上次调用 `update` 方法以来经过的时间。这并非严格必要，但这是一个好习惯。如果不这样做，当帧率低于 60 fps\
    \ 时，飞船的移动速度就会变慢。像这样的小细节可能会让玩家感到相当恼火，而作为游戏开发者，我们的目标恰恰与惹恼玩家相反。\n\n目前，飞船仍然可能移动到屏幕区域之外。我敢肯定，你和我一样希望飞船能停留在屏幕上。你可能会想直接将这段代码添加到更新飞船位置的\
    \ `InputLayer` 中。这就引出了一个问题：你是想阻止摇杆输入将飞船移出屏幕，还是想从根本上阻止飞船移出屏幕的可能性？后者是更通用的解决方案，在这种情况下也更可取。为此，你只需要在\
    \ `Ship` 类中重写 `setPosition` 方法，如列表 7–13 所示。\n\n**列表 7–13.** *重写飞船的 setPosition\
    \ 方法*\n\n```\n// 重写 setPosition 以将飞船保持在边界内\n-(void) setPosition:(CGPoint)pos\n\
    {\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    float halfWidth\
    \ = contentSize_.width * 0.5f;\n    float halfHeight = contentSize_.height * 0.5f;\n\
    \n\t\t`// 限制位置，使飞船精灵保持在屏幕上`\n\t    if (pos.x < halfWidth)\n    {\n        pos.x\
    \ = halfWidth;\n    }\n    else if (pos.x > (screenSize.width - halfWidth))\n\
    \    {\n        pos.x = screenSize.width - halfWidth;\n    }\n\n    if (pos.y\
    \ < halfHeight)\n    {\n        pos.y = halfHeight;\n    }\n    else if (pos.y\
    \ > (screenSize.height - halfHeight))\n    {\n        pos.y = screenSize.height\
    \ - halfHeight;\n    }\n\n\t    // 必须使用新位置调用父类方法\n    [super setPosition:pos];\n\
    }\n```\n\n每次更新飞船的位置时，上述代码都会进行检查，看飞船的精灵是否仍在屏幕边界内。如果不是，则将 X 或 Y 坐标设置为距离相应屏幕边框 `contentSize`\
    \ 一半的位置。\n\n因为 `position` 是一个属性，`setPosition` 方法会被以下代码调用：\n\n```\nship.position\
    \ = CGPointMake(200, 100);\n```\n\n点语法是向 Objective-C 属性发送 getter 和 setter 消息的简写形式，可以改写为：\n\
    \n```\n[ship setPosition:CGPointMake(200, 100)];\n```\n\n你可以通过这种方式重写其他基类的方法来改变游戏对象的行为。例如，如果一个对象只允许在\
    \ 0 到 180 度之间旋转，你可以重写 `setRotation:(float)rotation` 方法，并添加代码来限制旋转角度。\n\n#### 数字控制\n\
    \n你也可以将 `SneakyJoystick` 类变成数字控制器，通常称为 *D-pad*。所需的代码改动很小。你可以在 ScrollingWithJoy08\
    \ 项目中或此处找到它们：\n\n```\njoystick = [SneakyJoystick joystickWithRect:CGRectMake(0,\
    \ 0, stickRadius, stickRadius)];\njoystick.autoCenter = YES;\n\n// 现在方向更少了\njoystick.isDPad\
    \ = YES;\njoystick.numberOfDirections = 8;\n```\n\n死区属性已被移除——数字控制器不需要它们。通过将 `isDPad`\
    \ 属性设置为 `YES`，可以将摇杆设置为数字控制。你还可以定义方向的数量。虽然 D-pad 通常有四个方向，但在许多游戏中，你可以同时按住两个方向来让角色沿对角线移动。为了达到同样的效果，`numberOfDirections`\
    \ 属性被设置为 8。`SneakyJoystick` 会自动确保这些方向均匀分布在拇指摇杆控制器上。当然，如果你将方向数设置为 6，你会得到奇怪的结果，但话说回来，这也许正是你在六边形瓦片地图上移动所需要的。\n\
    \n### 总结\n\n在本章中，你学习了几种制作有效视差滚动背景的技巧。你不仅学会了如何无限滚动背景且无闪烁边缘，还学会了如何正确分离视差层，以便 TexturePacker\
    \ 可以减少任何不必要的透明区域，同时保留图像的偏移量，这样你就不必费力定位视差层了。\n\n这种方法的缺点在于它特定于某种屏幕分辨率。例如，如果你想创建\
    \ iPad 版本，可以使用相同的过程，只是需要以 1024×768 的分辨率创建图像。我把这作为练习留给你。\n\n本章的后半部分向你介绍了 SneakyInput，这是一个开源项目，用于为任何\
    \ cocos2d 游戏添加虚拟摇杆和按钮。它可能并不完美，但对于大多数游戏来说已经足够好了，而且绝对比自己编写虚拟摇杆代码要好。\n\n现在，飞船已可控并保持在屏幕边界内，并且可以通过按下按钮进行射击——但游戏仍缺少一些东西。一个射击游戏如果没有可以击落的目标，还叫射击游戏吗？下一章将解决这个问题。\n\
    \n## 第 8 章\n\n## 射击游戏\n\n这类游戏最需要什么？需要射击的目标和需要躲避的子弹。在本章中，你将向游戏添加敌人，甚至一个 Boss 怪物。\n\
    \n敌我双方都将使用新的 `BulletCache` 类从同一个对象池中发射各种子弹。缓存类会重用未激活的子弹，以避免不断地从内存中分配和释放子弹。同样，敌人也会使用它们自己的\
    \ `EnemyCache` 类，因为它们也会大量出现在屏幕上。\n\n显然，玩家将能够射击这些敌人。我还将介绍基于组件的编程概念，它允许你以模块化的方式扩展游戏角色。除了射击和移动组件，我们还为\
    \ Boss 怪物创建了一个生命条组件。毕竟，Boss 怪物不应该被一击毙命，而是需要多次命中才能被摧毁。\n"
- fmt: "### Adding the BulletCache Class\n\nThe `BulletCache` class is the one-stop\
    \ shop for creating new bullets in the ShootEmUp01 project. Previously all of\
    \ this code was in the `GameScene` class, but it shouldn't be the responsibility\
    \ of the `GameScene` to manage and create new bullets. [Listing 8–1](#Chapter08.html#list_8_1)\
    \ shows the new `BulletCache` header file, and it now contains the `CCSpriteBatchNode`\
    \ and the inactive bullets counter.\n\n**Listing 8–1.** *The @interface of the`BulletCache`Class*\n\
    \n```objective-c\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n\
    @interface BulletCache : CCNode\n{\n    CCSpriteBatchNode* batch;\n    int nextInactiveBullet;\n\
    }\n\n-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)velocity\n\
    \                                            frameName:(NSString*)frameName;\n\
    @end\n```\n\nTo refactor the bullet-shooting code out of the `GameScene` class,\
    \ I needed to move both the initialization and the method to shoot bullets to\
    \ the new `BulletCache` class ([Listing 8–2](#Chapter08.html#list_8_2)). Along\
    \ the way, I decided to keep the `CCSpriteBatchNode` in a member variable instead\
    \ of using the `CCNodegetChildByTag` method every time I need the sprite batch\
    \ object. It's a minor performance optimization. Since I'll be adding the `BulletCache`\
    \ class as child to the `GameScene`, I can simply add the sprite batch node to\
    \ the `BulletCache` class.\n\n**NOTE:** There's little harm in increasing the\
    \ depth of the scene hierarchy by adding an in-between `CCNode` like `BulletCache`.\
    \ If you're concerned about scene hierarchy depth, the alternative would be to\
    \ add the sprite batch node to the `GameScene` class as usual and use an accessor\
    \ method to get to the sprite batch node in the `BulletCache` class. But the additional\
    \ function call overhead could possibly void any performance gain. If in doubt,\
    \ always prefer to make your code more readable and then refactor later to improve\
    \ performance where necessary, and only where necessary.\n\n**Listing 8–2.** *The\
    \ BulletCache Maintains a Pool of Bullets for Reuse*\n\n```objective-c\n#import\
    \ \"BulletCache.h\"\n#import \"Bullet.h\"\n\n@implementation BulletCache\n\n-(id)\
    \ init\n{\n    if ((self = [super init]))\n    {\n        // get any bullet image\
    \ from the texture atlas we're using\n        CCSpriteFrame* bulletFrame = [[CCSpriteFrameCache\
    \ sharedSpriteFrameCache] spriteFrameByName:@\"bullet.png\"];\n\n        // use\
    \ the bullet's texture\n        batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];\n\
    \        [self addChild:batch];\n\n        // Create a number of bullets up front\
    \ and re-use them\n        for (int i = 0; i < 200; i++)\n        {\n        \
    \    Bullet* bullet = [Bullet bullet];\n            bullet.visible = NO;\n   \
    \         [batch addChild:bullet];\n        }\n    }\n\n    return self;\n}\n\n\
    -(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)velocity\n    \
    \                                        frameName:(NSString*)frameName\n{\n \
    \   CCArray* bullets = [batch children];\n    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];\n\
    \    NSAssert([node isKindOfClass:[Bullet class]], @\"not a Bullet!\");\n\n  \
    \  Bullet* bullet = (Bullet*)node;\n    [bullet shootBulletAt:startPosition velocity:velocity\
    \ frameName:frameName];\n\n    nextInactiveBullet++;\n    if (nextInactiveBullet\
    \ >= [bullets count])\n    {\n        nextInactiveBullet = 0;\n    }\n}\n@end\n\
    ```\n\nThe `shootBulletAt` method has changed the most as you can see. It now\
    \ takes three parameters, `startPosition`, `velocity`, and `frameName`, instead\
    \ of a pointer to the `Ship` class. It then passes on these parameters to the\
    \ `Bullet` class's `shootBulletAt` method, which I had to refactor as well:\n\n\
    ```objective-c\n-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)vel\n\
    \                                            frameName:(NSString*)frameName\n\
    {\n    self.velocity = vel;\n    self.position = startPosition;\n    self.visible\
    \ = YES;\n\n    // change the bullet's texture by setting a different SpriteFrame\
    \ to be displayed\n    CCSpriteFrame* frame = [[CCSpriteFrameCache sharedSpriteFrameCache]\
    \ spriteFrameByName:frameName];\n    [self setDisplayFrame:frame];\n\n    [self\
    \ unscheduleUpdate];\n    [self scheduleUpdate];\n}\n```\n\nBoth `velocity` and\
    \ `position` are now directly assigned to the bullet. This means that the code\
    \ calling the `shootBulletAt` method has to determine the position, direction,\
    \ and speed of the bullet. This is exactly what I wanted: full flexibility for\
    \ shooting bullets, including changing the bullet's sprite frame by using the\
    \ `setDisplayFrame` method. Since the bullets are all in the same texture atlas\
    \ and thus use the same texture, all it needs to do to change which bullet is\
    \ displayed is to set the desired sprite frame. In effect, this is simply going\
    \ to render a different part of the texture and comes at no extra cost.\n\nWhile\
    \ I was in the `Bullet` class, I also fixed the boundary issues the bullets would\
    \ have had—that only bullets moving outside the right side of the screen would\
    \ have been set invisible and put back on the waiting list. By using the `CGRectIntersectsRect`\
    \ check with the bullet's `boundingBox` and the `screenRect` in the `update` method,\
    \ any bullet having moved completely outside the screen area will be marked for\
    \ reuse:\n\n```objective-c\n// When the bullet leaves the screen, make it invisible\n\
    if (CGRectIntersectsRect([self boundingBox], screenRect) == NO)\n{\n    …\n}\n\
    ```\n\nThe `screenRect` variable itself is now stored for convenience and performance\
    \ reasons as a static variable, so it can be accessed by other classes and doesn't\
    \ need to be re-created for each use. Static variables like `screenRect` are available\
    \ in the class implementation file where they are declared. They are like global\
    \ variables to the class; any class instance can read and modify the variable,\
    \ as opposed to class member variables, which are local to every class instance.\
    \ Since the screen size never changes during game play and all `Bullet` instances\
    \ need to use this variable, it makes sense to store it in a static variable for\
    \ all class instances. The first bullet to be initialized sets the `screenRect`\
    \ variable. The `CGRectIsEmpty` method checks whether the `screenRect` variable\
    \ is still uninitialized; since the variable is static, I want to initialize it\
    \ only once.\n\n```objective-c\nstatic CGRect screenRect;\n\n…\n\n// make sure\
    \ to initialize the screen rect only once\nif (CGRectIsEmpty(screenRect))\n{\n\
    \    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    screenRect\
    \ = CGRectMake(0, 0, screenSize.width, screenSize.height);\n}\n```\n\nWith these\
    \ changes implemented, what's left is to clean up the `GameScene` by removing\
    \ any of the methods and member variables previously used for shooting bullets.\
    \ Specifically, I need to replace the `CCSpriteBatchNode` initialization with\
    \ the initialization of the `BulletCache` class:\n\n```objective-c\nBulletCache*\
    \ bulletCache = [BulletCache node];\n[self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n\
    ```\n\nI also need to add a `bulletCache` accessor so other classes can access\
    \ the `BulletCache` instance through the `GameScene`:\n\n```objective-c\n-(BulletCache*)\
    \ bulletCache\n{\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];\n\
    \    NSAssert([node isKindOfClass:[BulletCache class]], @\"not a BulletCache\"\
    );\n    return (BulletCache*)node;\n}\n```\n\nThe `InputLayer` can now use the\
    \ new `BulletCache` class and uses it to shoot the player's bullets. The bullet\
    \ properties, such as starting position, velocity, and the sprite frame to use,\
    \ are now passed by the shooting code in the `update` method of the `InputLayer`:\n\
    \n```objective-c\nif (fireButton.active && totalTime > nextShotTime)\n{\n    nextShotTime\
    \ = totalTime + 0.4f;\n\n    GameScene* game = [GameScene sharedGameScene];\n\
    \    Ship* ship = [game defaultShip];\n    BulletCache* bulletCache = [game bulletCache];\n\
    ```"
  raw: '### Adding the BulletCache Class


    The `BulletCache` class is the one-stop shop for creating new bullets in the ShootEmUp01
    project. Previously all of this code was in the `GameScene` class, but it shouldn''t
    be the responsibility of the `GameScene` to manage and create new bullets. [Listing
    8–1](#Chapter08.html#list_8_1) shows the new `BulletCache` header file, and it
    now contains the `CCSpriteBatchNode` and the inactive bullets counter.


    **Listing 8–1.** *The @interface of the `BulletCache` Class*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface BulletCache : CCNode`

    `{`

    `    CCSpriteBatchNode* batch;`

    `    int nextInactiveBullet;`

    `}`


    `-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)velocity`

    `                                            frameName:(NSString*)frameName;`

    `@end`


    To refactor the bullet-shooting code out of the `GameScene` class, I needed to
    move both the initialization and the method to shoot bullets to the new `BulletCache`
    class ([Listing 8–2](#Chapter08.html#list_8_2)). Along the way, I decided to keep
    the `CCSpriteBatchNode` in a member variable instead of using the `CCNodegetChildByTag`
    method every time I need the sprite batch object. It''s a minor performance optimization.
    Since I''ll be adding the `BulletCache` class as child to the `GameScene`, I can
    simply add the sprite batch node to the `BulletCache` class.


    **NOTE:** There''s little harm in increasing the depth of the scene hierarchy
    by adding an in-between `CCNode` like `BulletCache`. If you''re concerned about
    scene hierarchy depth, the alternative would be to add the sprite batch node to
    the `GameScene` class as usual and use an accessor method to get to the sprite
    batch node in the `BulletCache` class. But the additional function call overhead
    could possibly void any performance gain. If in doubt, always prefer to make your
    code more readable and then refactor later to improve performance where necessary,
    and only where necessary.


    **Listing 8–2.** *The BulletCache Maintains a Pool of Bullets for Reuse*


    `#import "BulletCache.h"`

    `#import "Bullet.h"`


    `@implementation BulletCache`


    `-(id) init`

    `{`

    `    if ((self = [super init]))`

    `    {`

    `        // get any bullet image from the texture atlas we''re using`

    `        CCSpriteFrame* bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache]`![images](images/U002.jpg)

    `            spriteFrameByName:@"bullet.png"];`


    `        // use the bullet''s texture`

    `        batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];`

    `        [self addChild:batch];`


    `        // Create a number of bullets up front and re-use them`

    `        for (int i = 0; i < 200; i++)`

    `        {`

    `            Bullet* bullet = [Bullet bullet];`

    `            bullet.visible = NO;`

    `            [batch addChild:bullet];`

    `        }`

    `    }`


    `    return self;`

    `}`


    `-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)velocity`

    `                                            frameName:(NSString*)frameName`

    `{`

    `    CCArray* bullets = [batch children];`

    `    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];`

    `    NSAssert([node isKindOfClass:[Bullet class]], @"not a Bullet!");`


    `    Bullet* bullet = (Bullet*)node;`

    `    [bullet shootBulletAt:startPosition velocity:velocity frameName:frameName];`


    `    nextInactiveBullet++;`

    `    if (nextInactiveBullet >= [bullets count])`

    `    {`

    `        nextInactiveBullet = 0;`

    `    }`

    `}`

    `@end`


    The `shootBulletAt` method has changed the most as you can see. It now takes three
    parameters, `startPosition`, `velocity`, and `frameName`, instead of a pointer
    to the `Ship` class. It then passes on these parameters to the `Bullet` class''s
    `shootBulletAt` method, which I had to refactor as well:


    `-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)vel`

    `                                            frameName:(NSString*)frameName`

    `{`

    `    self.velocity = vel;`

    `    self.position = startPosition;`

    `    self.visible = YES;`


    `    // change the bullet''s texture by setting a different SpriteFrame to be
    displayed`

    `    CCSpriteFrame* frame = [[CCSpriteFrameCache sharedSpriteFrameCache]`![images](images/U002.jpg)

    `        spriteFrameByName:frameName];`

    `    [self setDisplayFrame:frame];`


    `    [self unscheduleUpdate];`

    `    [self scheduleUpdate];`

    `}`


    Both `velocity` and `position` are now directly assigned to the bullet. This means
    that the code calling the `shootBulletAt` method has to determine the position,
    direction, and speed of the bullet. This is exactly what I wanted: full flexibility
    for shooting bullets, including changing the bullet''s sprite frame by using the
    `setDisplayFrame` method. Since the bullets are all in the same texture atlas
    and thus use the same texture, all it needs to do to change which bullet is displayed
    is to set the desired sprite frame. In effect, this is simply going to render
    a different part of the texture and comes at no extra cost.


    While I was in the `Bullet` class, I also fixed the boundary issues the bullets
    would have had—that only bullets moving outside the right side of the screen would
    have been set invisible and put back on the waiting list. By using the `CGRectIntersectsRect`
    check with the bullet''s `boundingBox` and the `screenRect` in the `update` method,
    any bullet having moved completely outside the screen area will be marked for
    reuse:


    `// When the bullet leaves the screen, make it invisible`

    `if (CGRectIntersectsRect([self boundingBox], screenRect) == NO)`

    `{`

    `    …`

    `}`


    The `screenRect` variable itself is now stored for convenience and performance
    reasons as a static variable, so it can be accessed by other classes and doesn''t
    need to be re-created for each use. Static variables like `screenRect` are available
    in the class implementation file where they are declared. They are like global
    variables to the class; any class instance can read and modify the variable, as
    opposed to class member variables, which are local to every class instance. Since
    the screen size never changes during game play and all `Bullet` instances need
    to use this variable, it makes sense to store it in a static variable for all
    class instances. The first bullet to be initialized sets the `screenRect` variable.
    The `CGRectIsEmpty` method checks whether the `screenRect` variable is still uninitialized;
    since the variable is static, I want to initialize it only once.


    `static CGRect screenRect;`


    `…`


    `// make sure to initialize the screen rect only once`

    `if (CGRectIsEmpty(screenRect))`

    `{`

    `    CGSize screenSize = [[CCDirector sharedDirector] winSize];`

    `    screenRect = CGRectMake(0, 0, screenSize.width, screenSize.height);`

    `}`


    With these changes implemented, what''s left is to clean up the `GameScene` by
    removing any of the methods and member variables previously used for shooting
    bullets. Specifically, I need to replace the `CCSpriteBatchNode` initialization
    with the initialization of the `BulletCache` class:


    `BulletCache* bulletCache = [BulletCache node];`

    `[self addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];`


    I also need to add a `bulletCache` accessor so other classes can access the `BulletCache`
    instance through the `GameScene`:


    `-(BulletCache*) bulletCache`

    `{`

    `    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];`

    `    NSAssert([node isKindOfClass:[BulletCache class]], @"not a BulletCache");`

    `    return (BulletCache*)node;`

    `}`


    The `InputLayer` can now use the new `BulletCache` class and uses it to shoot
    the player''s bullets. The bullet properties, such as starting position, velocity,
    and the sprite frame to use, are now passed by the shooting code in the `update`
    method of the `InputLayer`:


    `if (fireButton.active && totalTime > nextShotTime)`

    `{`

    `    nextShotTime = totalTime + 0.4f;`


    `    GameScene* game = [GameScene sharedGameScene];`

    `    Ship* ship = [game defaultShip];`

    `    BulletCache* bulletCache = [game bulletCache];`'
  trans: "\n### 添加 BulletCache 类\n\n在 ShootEmUp01 项目中，`BulletCache` 类是创建新子弹的一站式服务类。此前所有相关代码都位于\
    \ `GameScene` 类中，但管理和创建新子弹不应是 `GameScene` 的职责。代码清单 8-1 展示了新的 `BulletCache` 头文件，其中包含了\
    \ `CCSpriteBatchNode` 和非活跃子弹计数器。\n\n**代码清单 8–1.** *`BulletCache` 类的 @interface*\n\
    \n```objective-c\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n\n\
    @interface BulletCache : CCNode\n{\n    CCSpriteBatchNode* batch;\n    int nextInactiveBullet;\n\
    }\n\n-(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)velocity\n\
    \                                            frameName:(NSString*)frameName;\n\
    @end\n```\n\n为了将子弹发射代码从 `GameScene` 类中重构出来，我需要将初始化和发射子弹的方法都迁移到新的 `BulletCache`\
    \ 类中（代码清单 8-2）。在此过程中，我决定将 `CCSpriteBatchNode` 保存在成员变量中，而不是在每次需要精灵批处理对象时都调用 `CCNodegetChildByTag`\
    \ 方法。这是一种微小的性能优化。由于我会将 `BulletCache` 类作为子节点添加到 `GameScene` 中，因此只需将精灵批处理节点添加到 `BulletCache`\
    \ 类即可。\n\n**注意：** 通过添加像 `BulletCache` 这样的中间 `CCNode` 来增加场景层次深度，几乎不会带来负面影响。如果你担心场景层次深度问题，另一种方案是像往常一样将精灵批处理节点添加到\
    \ `GameScene` 类，并在 `BulletCache` 类中使用访问器方法获取该精灵批处理节点。但额外的函数调用开销可能会抵消任何性能提升。如有疑问，应始终优先保证代码可读性，然后仅在必要时对性能进行重构优化。\n\
    \n**代码清单 8–2.** *BulletCache 维护一个供复用的子弹池*\n\n```objective-c\n#import \"BulletCache.h\"\
    \n#import \"Bullet.h\"\n\n@implementation BulletCache\n\n-(id) init\n{\n    if\
    \ ((self = [super init]))\n    {\n        // 从纹理图集中获取任意子弹图片\n        CCSpriteFrame*\
    \ bulletFrame = [[CCSpriteFrameCache sharedSpriteFrameCache] spriteFrameByName:@\"\
    bullet.png\"];\n\n        // 使用子弹的纹理\n        batch = [CCSpriteBatchNode batchNodeWithTexture:bulletFrame.texture];\n\
    \        [self addChild:batch];\n\n        // 预先创建一批子弹并重复使用\n        for (int\
    \ i = 0; i < 200; i++)\n        {\n            Bullet* bullet = [Bullet bullet];\n\
    \            bullet.visible = NO;\n            [batch addChild:bullet];\n    \
    \    }\n    }\n\n    return self;\n}\n\n-(void) shootBulletAt:(CGPoint)startPosition\
    \ velocity:(CGPoint)velocity\n                                            frameName:(NSString*)frameName\n\
    {\n    CCArray* bullets = [batch children];\n    CCNode* node = [bullets objectAtIndex:nextInactiveBullet];\n\
    \    NSAssert([node isKindOfClass:[Bullet class]], @\"不是 Bullet 类型！\");\n\n  \
    \  Bullet* bullet = (Bullet*)node;\n    [bullet shootBulletAt:startPosition velocity:velocity\
    \ frameName:frameName];\n\n    nextInactiveBullet++;\n    if (nextInactiveBullet\
    \ >= [bullets count])\n    {\n        nextInactiveBullet = 0;\n    }\n}\n@end\n\
    ```\n\n如你所见，`shootBulletAt` 方法变化最大。它现在接收三个参数：`startPosition`、`velocity` 和 `frameName`，取代了之前指向\
    \ `Ship` 类的指针。随后它将这些参数传递给 `Bullet` 类的 `shootBulletAt` 方法，而该方法也经过了重构：\n\n```objective-c\n\
    -(void) shootBulletAt:(CGPoint)startPosition velocity:(CGPoint)vel\n         \
    \                                   frameName:(NSString*)frameName\n{\n    self.velocity\
    \ = vel;\n    self.position = startPosition;\n    self.visible = YES;\n\n    //\
    \ 通过设置不同的 SpriteFrame 来更改子弹纹理\n    CCSpriteFrame* frame = [[CCSpriteFrameCache\
    \ sharedSpriteFrameCache] spriteFrameByName:frameName];\n    [self setDisplayFrame:frame];\n\
    \n    [self unscheduleUpdate];\n    [self scheduleUpdate];\n}\n```\n\n现在 `velocity`\
    \ 和 `position` 都直接赋值给子弹。这意味着调用 `shootBulletAt` 方法的代码必须自行确定子弹的位置、方向和速度。这正是我期望的效果：实现发射子弹的完全灵活性，包括使用\
    \ `setDisplayFrame` 方法更改子弹的精灵帧。由于所有子弹都位于同一纹理图集中，使用同一纹理，因此只需设置所需的精灵帧即可更改显示的子弹。实际上，这仅仅是在渲染纹理的不同区域，不会产生额外开销。\n\
    \n在处理 `Bullet` 类时，我还修复了子弹可能存在的边界问题——此前只有移动到屏幕右侧之外的子弹会被设为不可见并放回待命列表。通过在 `update`\
    \ 方法中使用 `CGRectIntersectsRect` 检查子弹的 `boundingBox` 和 `screenRect`，任何完全移出屏幕区域的子弹都将被标记为可复用：\n\
    \n```objective-c\n// 当子弹离开屏幕时，将其设为不可见\nif (CGRectIntersectsRect([self boundingBox],\
    \ screenRect) == NO)\n{\n    …\n}\n```\n\n为了便利和性能考虑，`screenRect` 变量现在存储为静态变量，这样其他类可以直接访问，无需每次使用时重新创建。像\
    \ `screenRect` 这样的静态变量可在其声明所在的类实现文件中访问。它们类似于类的全局变量；任何类实例都可以读取和修改该变量，这与类成员变量不同（后者对每个类实例是局部的）。由于游戏运行时屏幕尺寸不会改变，且所有\
    \ `Bullet` 实例都需要使用该变量，因此将其存储在静态变量中供所有类实例使用是合理的。第一个初始化的子弹会设置 `screenRect` 变量。`CGRectIsEmpty`\
    \ 方法用于检查 `screenRect` 变量是否仍未初始化；由于该变量是静态的，我希望仅初始化一次。\n\n```objective-c\nstatic\
    \ CGRect screenRect;\n\n…\n\n// 确保屏幕矩形只初始化一次\nif (CGRectIsEmpty(screenRect))\n\
    {\n    CGSize screenSize = [[CCDirector sharedDirector] winSize];\n    screenRect\
    \ = CGRectMake(0, 0, screenSize.width, screenSize.height);\n}\n```\n\n实施这些更改后，剩下的工作就是清理\
    \ `GameScene`，移除之前用于发射子弹的所有方法和成员变量。具体来说，我需要将 `CCSpriteBatchNode` 的初始化替换为 `BulletCache`\
    \ 类的初始化：\n\n```objective-c\nBulletCache* bulletCache = [BulletCache node];\n[self\
    \ addChild:bulletCache z:1 tag:GameSceneNodeTagBulletCache];\n```\n\n我还需要添加一个\
    \ `bulletCache` 访问器，以便其他类可以通过 `GameScene` 访问 `BulletCache` 实例：\n\n```objective-c\n\
    -(BulletCache*) bulletCache\n{\n    CCNode* node = [self getChildByTag:GameSceneNodeTagBulletCache];\n\
    \    NSAssert([node isKindOfClass:[BulletCache class]], @\"不是 BulletCache 类型\"\
    );\n    return (BulletCache*)node;\n}\n```\n\n现在 `InputLayer` 可以使用新的 `BulletCache`\
    \ 类来发射玩家子弹。子弹属性（如起始位置、速度和要使用的精灵帧）现在由 `InputLayer` 的 `update` 方法中的发射代码传入：\n\n```objective-c\n\
    if (fireButton.active && totalTime > nextShotTime)\n{\n    nextShotTime = totalTime\
    \ + 0.4f;\n\n    GameScene* game = [GameScene sharedGameScene];\n    Ship* ship\
    \ = [game defaultShip];\n    BulletCache* bulletCache = [game bulletCache];\n\
    ```\n"
- fmt: "// Set the position, velocity and spriteframe before shooting\n`CGPoint shotPos\
    \ = CGPointMake(ship.position.x + 45, ship.position.y – 19);`\n\n`float spread\
    \ = (CCRANDOM_0_1() - 0.5f) * 0.5f;`\n`CGPoint velocity = CGPointMake(200, spread\
    \ * 50);`\n`[bulletCache shootBulletAt:shotPos velocity:velocity frameName:@\"\
    bullet.png\"];`\n\nThis short refactoring session adds much-needed flexibility\
    \ to shooting bullets. I'm sure you can imagine how enemies can now use the very\
    \ same code to shoot their own bullets.\n\n## What About Enemies?\n\nAt this point,\
    \ there's only a fuzzy idea about what the enemies are, what they do, and what\
    \ their behavior will be. That's the thing with enemies—you never quite know what\
    \ they're up to.\n\nIn the case of games, that means going back to the drawing\
    \ board, planning out what you want the enemies to do, and then deducing from\
    \ that plan what you need to program. Contrary to real life, you have full control\
    \ over the enemies. Doesn't that make you feel powerful? But before you or anyone\
    \ can have fun, you need to come up with a plan for world domination.\n\nI already\
    \ created the graphics for three different types of enemies. At this point, I\
    \ know only that at least one of them is supposed to be a boss monster. Take a\
    \ look at [Figure 8–1](#Chapter08.html#fig_8_1) and try to imagine what these\
    \ enemies could be up to.\n\n![images](images/0801.jpg)\n\n**Figure 8–1.** *The\
    \ graphics used as the game's enemy characters*\n\nBefore you start programming,\
    \ you should have a good understanding of which behaviors the enemies will have\
    \ in common so that you program those parts only once. Eliminating code duplication\
    \ is the single most important goal of clean code design.\n\nLet's see what we\
    \ know for sure is common to all enemies:\n\n- Shoots bullets\n- Has logic that\
    \ determines when and where to shoot what bullet\n- Can be hit by player's bullets\n\
    - Cannot be hit by other enemy's bullets\n- Can take one or more hits (has health)\n\
    - Has a specific behavior and movement pattern\n- Has a specific behavior or animation\
    \ when destroyed\n- Will appear outside the screen area and move inside\n- Will\
    \ not leave the screen area once inside\n\nWhen you look at that list, you may\
    \ notice that some of these attributes also apply to the player's ship. It certainly\
    \ can shoot bullets, we may want it to sustain multiple hits, and it should have\
    \ a specific behavior or animation when destroyed. It makes sense to consider\
    \ the player's ship as just a special type of enemy and take it into consideration\
    \ as well.\n\nLooking at this feature set, I see three possible approaches. I\
    \ could create one class that contains all the code for the ship, the enemies,\
    \ and the boss monster. Certain parts of the code would run conditionally, depending\
    \ on the type of enemy. For example, the shooting code may have different code\
    \ paths for each type of game object. With a limited number of different objects,\
    \ this approach works reasonably well—but it doesn't scale. As you add more and\
    \ more types of game objects, you end up with a bigger and fatter class containing\
    \ all of the game logic code. Any change to any part of that class has the potential\
    \ to cause undesirable side effects in enemies' or even the player ship's behavior.\
    \ Determining which code path to execute depending on a type variable is quite\
    \ reminiscent of pure C programming and doesn't make use of the object-oriented\
    \ nature of the Objective-C programming language. But if used judiciously, it's\
    \ a very powerful concept even today.\n\nThe second approach is to create a class\
    \ hierarchy with the `Entity` class as the base class and then derive a ship,\
    \ two monsters, and a boss monster class from it. This is what a lot of programmers\
    \ actually do, and it also works reasonably well for a small number of game objects.\
    \ But in essence, it's little different from the first approach, in that common\
    \ code often ends up piling up in the base `Entity` class when it is needed by\
    \ some of the subclasses, but not all of them. It takes a turn for the worse as\
    \ soon as that code in the `Entity` class starts to add switches based on the\
    \ type of the enemy, to skip parts of the code or execute code paths specific\
    \ to that type of enemy. That's the same problem of the first C-style programming\
    \ approach. With a little care, you can make sure the code specific to an enemy\
    \ is part of that enemy's class, but it's all too easy to end up making most changes\
    \ in the `Entity` class itself.\n\nThe third option is to use a component system.\
    \ This means that individual code paths are separated from the `Entity` class\
    \ hierarchy and only added to the subclasses that need the components, such as\
    \ a healthbar component. Since component-based development would justify a book\
    \ on its own and is likely to be overkill for a small project like this shoot-'em-up\
    \ game, I'll use a mixture of the class hierarchy approach and component design\
    \ to at least give you an idea how compositing game objects out of individual\
    \ parts works in principle and what the benefits are.\n\nI do want to point out\
    \ that there is no one best approach to code design. Certain choices are entirely\
    \ subjective and depend on personal preferences and experience. Working code is\
    \ often preferable to clean code if you're willing to refactor your codebase often\
    \ as you learn more about the game you're making. Experience allows you to make\
