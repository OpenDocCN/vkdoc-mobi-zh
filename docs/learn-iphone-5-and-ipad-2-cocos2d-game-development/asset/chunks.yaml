    The `BodyNode` implementation initializes the sprite with the `initWithSpriteFrameName`
    method. Then it calls the world''s `CreateBody` method and sets `self` as the
    user data pointer of the body, allowing you to later access the `BodyNode` class
    in the Box2D collision callback methods.


    **TIP:** The `CCNode` class also has a `userData` property, which you can use
    in the same way as `b2Body`''s `userData` field.


    The PhysicsEditor `GB2ShapeCache` class is used to add the fixtures to the body
    using the provided `shapeName`. The PhysicsBox2D03 project already includes the
    necessary files. If you want to make use of the `GB2ShapeCache` class in a new
