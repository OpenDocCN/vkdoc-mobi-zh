- fmt: "### Ease Actions\n\nActions become even more powerful by using actions based\
    \ on the `CCActionEase` class. Ease actions allow you to modify the effect of\
    \ an action over time. For example, if you use a `CCMoveTo` action on a node,\
    \ the node will move the whole distance at the same speed until it has arrived.\
    \ With `CCActionEase`, you can have the node start slow and speed up toward the\
    \ target, or vice versa. Or you can let it move past the target location a little\
    \ and then bounce back. Ease actions create very dynamic animations that are normally\
    \ very time-consuming to implement. The following code shows how an ease action\
    \ is used to modify the behavior of a regular action. The `rate` parameter determines\
    \ how pronounced the effect of the ease action is and should be greater than 1\
    \ to see any effect.\n\n```\n// I want myNode to move to 100, 200 and arrive there\
    \ in 3 seconds\nCCMoveTo* move = [CCMoveTo actionWithDuration:3 position:CGPointMake(100,\
    \ 200)];\n// this time the node should slowly speed up and then slow down as it\
    \ moves\nCCEaseInOut* ease = [CCEaseInOut actionWithAction:move rate:4];\n[myNode\
    \ runAction:ease];\n```\n\n**NOTE:** In the example, the ease action is run on\
    \ the node, not the move action. It’s all too easy to forget to change the `runAction`\
    \ line when you’re working with actions. It’s a common mistake that happens even\
    \ to the most experienced cocos2d developers. If you notice your actions aren’t\
    \ working as expected or at all, double-check that you’re actually running the\
    \ correct action. And if the correct actions are used but you’re still not seeing\
    \ the desired result, verify that it’s the correct node running the action. That\
    \ is another common mistake.\n\nCocos2d implements the following `CCActionEase`\
    \ classes:\n\n- `CCEaseBackIn`, `CCEaseBackInOut`, `CCEaseBackOut`\n- `CCEaseBounceIn`,\
    \ `CCEaseBounceInOut`, `CCEaseBounceOut`\n- `CCEaseElasticIn`, `CCEaseElasticInOut`,\
    \ `CCEaseElasticOut`\n- `CCEaseExponentialIn`, `CCEaseExponentialInOut`, `CCEaseExponentialOut`\n\
    - `CCEaseIn`, `CCEaseInOut`, `CCEaseOut`\n- `CCEaseSineIn`, `CCEaseSineInOut`,\
    \ `CCEaseSineOut`\n\nIn [Chapter 4](#Chapter04.html#ch4), I’ll use a number of\
    \ these ease actions in the DoodleDrop project so you can see what effect they\
    \ have. I’ve added the `CCActionEase` class hierarchy in [Figure 3–13](#Chapter03.html#fig_3_13)\
    \ for reference.\n\n![images](images/0313.jpg)\n\n**Figure 3–13.** *The* `CCActionEase`\
    \ *class hierarchy*\n\n### Grid Actions\n\nGrid actions are purely visual actions\
    \ derived from `CCGridAction` and one of its two subclasses, `CCGrid3DAction`\
    \ and `CCTiledGrid3DAction`. Their class hierarchies are shown in [Figure 3–14](#Chapter03.html#fig_3_14)\
    \ and [Figure 3–15](#Chapter03.html#fig_3_15).\n\n![images](images/0314.jpg)\n\
    \n**Figure 3–14.** *The* `CCGrid3DAction` *class hierarchy*\n\n![images](images/0315.jpg)\n\
    \n**Figure 3–15.** *The* `CCTiledGrid3DAction` *class hierarchy*\n\nThe specialty\
    \ of the grid actions are three-dimensional effects such as the turning of a page\
    \ (`CCPageTurn3D`; see [Figure 3–16](#Chapter03.html#fig_3_16)) or simulating\
    \ waves and liquids (`CCWaves`, `CCLiquid`). The downside is that the 3D effects\
    \ may show visual artifacts unless you enable depth buffering, which requires\
    \ more memory and has a negative impact on rendering performance, particularly\
    \ on first- and second-generation devices.\n\nTo enable depth buffering, you will\
    \ have to change the line in your project’s app delegate class that initializes\
    \ the `EAGLView` class to add depth buffering support. You do this by changing\
    \ the `depthFormat` parameter from its default value 0 to either `GL_DEPTH_COMPONENT16_OES`\
    \ for a 16-bit depth buffer or `GL_DEPTH_COMPONENT24_OES` for a 24-bit depth buffer:\n\
    \n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n                               pixelFormat:kEAGLColorFormatRGB565\n\
                                   depthFormat:GL_DEPTH_COMPONENT16_OES];\n```\n\n\
    Ideally, you should try the 16-bit depth buffer first; it uses less memory, but\
    \ in a few cases a 24-bit depth buffer may be necessary in case visual artifacts\
    \ still occur when using 3D actions.\n\n![images](images/0316.jpg)\n\n**Figure\
    \ 3–16.** *The* `CCPageTurn3D` *action in action*\n\n### Instant Actions\n\nYou\
    \ might wonder why there are instantaneous actions based on the `CCInstantAction`\
    \ class (see [Figure 3–17](#Chapter03.html#fig_3_17) for the class hierarchy),\
    \ when you could just as well change the node’s property to achieve the same effect.\
    \ For example, there are instant actions to flip the node, to place it at a specific\
    \ location, or to toggle its visible property.\n\n![images](images/0317.jpg)\n\
    \n**Figure 3–17.** *The* `CCActionInstant` *class hierarchy*\n\nThe main reason\
    \ that instant actions exist is because they are useful in action sequences. Sometimes\
    \ in a sequence of actions you have to change a certain property of the node,\
    \ such as visibility or position, and then continue with the sequence. Instant\
    \ actions make this possible. True, they are rarely used—with one exception: `CCCallFunc`\
    \ actions.\n\nWhen using an action sequence, you may want to be notified at certain\
    \ times, for example when the sequence has ended, and then perhaps start another\
    \ sequence immediately thereafter. To do this, you can make use of several versions\
    \ of `CCCallFunc` actions that will send a message whenever it is their turn in\
    \ the sequence. Let’s rewrite the color cycle sequence so that it calls a method\
    \ each time one of the `CCTintTo` actions has done its job:\n\n```\nCCCallFunc*\
    \ func = [CCCallFunc actionWithTarget:self\n                                       selector:@selector(onCallFunc)];\n\
    \nCCCallFuncN* funcN = [CCCallFuncN actionWithTarget:self\n                                          selector:@selector(onCallFuncN:)];\n\
    \nCCCallFuncND* funcND = [CCCallFuncND actionWithTarget:self\n                                             selector:@selector(onCallFuncND:data:)\n\
                                                     data:(void*)self];\n\nCCCallFuncO*\
    \ funcO = [CCCallFuncO actionWithTarget:self\n                                          selector:@selector(onCallFuncO:)\n\
                                                object:(id)self];\n\nCCSequence* seq\
    \ = [CCSequence actions:\n    tint1, func, tint2, funcN, tint3, funcND, funcO,\
    \ nil];\n[label runAction:seq];\n```\n\nThe difference between these variants\
    \ of `CCCallFunc` is in which selector they will be calling and thus which context\
    \ is available to the method they call. For example, when `CCCallFunc` calls the\
    \ `onCallFunc` method, you have no way of knowing who called the method or why.\
    \ There’s no context, but in many cases that context is not needed.\n\nThe action\
    \ sequence `seq` will call the methods in the following code one after another.\
    \ The `sender` parameter will always be derived from `CCNode`; it’s the node that’s\
    \ running the actions. The data parameter can be used in any way you want, including\
    \ passing values, structs, or other pointers. You only have to properly cast the\
    \ data pointer.\n\n```\n-(void) onCallFunc\n{\n        CCLOG(@\"end of tint1!\"\
    );\n}\n\n-(void) onCallFuncN:(id)sender\n{\n        CCLOG(@\"end of tint2! sender:\
    \ %@\", sender);\n}\n\n-(void) onCallFuncND:(id)sender data:(void*)data\n{\n \
    \       // be careful when casting pointers like this!\n        // you have to\
    \ be 100% sure the object is of this type!\n        CCSprite* sprite = (CCSprite*)data;\n\
    \        CCLOG(@\"end of sequence! sender: %@ - data: %@\", sender, sprite);\n\
    }\n-(void) onCallFuncO:(id)object\n{\n    // object is the object you passed to\
    \ CCCallFuncO\n    CCLOG(@\"call func with object %@\", object);\n}\n```\n\nOf\
    \ course, the `CCCallFunc` actions also work with `CCRepeatForever` sequences.\
    \ Your methods will be called repeatedly at the appropriate time."
  raw: '##### Ease Actions


    Actions become even more powerful by using actions based on the `CCActionEase`
    class. Ease actions allow you to modify the effect of an action over time. For
    example, if you use a `CCMoveTo` action on a node, the node will move the whole
    distance at the same speed until it has arrived. With `CCActionEase`, you can
    have the node start slow and speed up toward the target, or vice versa. Or you
    can let it move past the target location a little and then bounce back. Ease actions
    create very dynamic animations that are normally very time-consuming to implement.
    The following code shows how an ease action is used to modify the behavior of
    a regular action. The `rate` parameter determines how pronounced the effect of
    the ease action is and should be greater than 1 to see any effect.


    `// I want myNode to move to 100, 200 and arrive there in 3 seconds`

    `CCMoveTo* move = [CCMoveTo actionWithDuration:3 position:CGPointMake(100, 200)];`

    **`// this time the node should slowly speed up and then slow down as it moves`**

    **`CCEaseInOut* ease = [CCEaseInOut actionWithAction:move rate:4];`**

    `[myNode runAction:`**`ease`**`];`


    **NOTE:** In the example, the ease action is run on the node, not the move action.
    It’s all too easy to forget to change the `runAction` line when you’re working
    with actions. It’s a common mistake that happens even to the most experienced
    cocos2d developers. If you notice your actions aren’t working as expected or at
    all, double-check that you’re actually running the correct action. And if the
    correct actions are used but you’re still not seeing the desired result, verify
    that it’s the correct node running the action. That is another common mistake.


    Cocos2d implements the following `CCActionEase` classes:


    *   `CCEaseBackIn`, `CCEaseBackInOut`, `CCEaseBackOut`

    *   `CCEaseBounceIn`, `CCEaseBounceInOut`, `CCEaseBounceOut`

    *   `CCEaseElasticIn`, `CCEaseElasticInOut`, `CCEaseElasticOut`

    *   `CCEaseExponentialIn`, `CCEaseExponentialInOut`, `CCEaseExponentialOut`

    *   `CCEaseIn`, `CCEaseInOut`, `CCEaseOut`

    *   `CCEaseSineIn`, `CCEaseSineInOut`, `CCEaseSineOut`


    In [Chapter 4](#Chapter04.html#ch4), I’ll use a number of these ease actions in
    the DoodleDrop project so you can see what effect they have. I’ve added the `CCActionEase`
    class hierarchy in [Figure 3–13](#Chapter03.html#fig_3_13) for reference.


    ![images](images/0313.jpg)


    **Figure 3–13.** *The CCActionEase class hierarchy*


    ##### Grid Actions


    Grid actions are purely visual actions derived from `CCGridAction` and one of
    its two subclasses, `CCGrid3DAction` and `CCTiledGrid3DAction`. Their class hierarchies
    are shown in [Figure 3–14](#Chapter03.html#fig_3_14) and [Figure 3–15](#Chapter03.html#fig_3_15).


    ![images](images/0314.jpg)


    **Figure 3–14.** *The CCGrid3DAction class hierarchy*


    ![images](images/0315.jpg)


    **Figure 3–15.** *The CCTiledGrid3DAction class hierarchy*


    The specialty of the grid actions are three-dimensional effects such as the turning
    of a page (`CCPageTurn3D`; see [Figure 3–16](#Chapter03.html#fig_3_16)) or simulating
    waves and liquids (`CCWaves`, `CCLiquid`). The downside is that the 3D effects
    may show visual artifacts unless you enable depth buffering, which requires more
    memory and has a negative impact on rendering performance, particularly on first-
    and second-generation devices.


    To enable depth buffering, you will have to change the line in your project’s
    app delegate class that initializes the `EAGLView` class to add depth buffering
    support. You do this by changing the `depthFormat` parameter from its default
    value 0 to either `GL_DEPTH_COMPONENT16_OES` for a 16-bit depth buffer or `GL_DEPTH_COMPONENT24_OES`
    for a 24-bit depth buffer:


    `EAGLView *glView = [EAGLView viewWithFrame:[window bounds]`

    `                               pixelFormat:kEAGLColorFormatRGB565`

    `                               depthFormat:GL_DEPTH_COMPONENT16_OES];`


    Ideally, you should try the 16-bit depth buffer first; it uses less memory, but
    in a few cases a 24-bit depth buffer may be necessary in case visual artifacts
    still occur when using 3D actions.


    ![images](images/0316.jpg)


    **Figure 3–16.** *The CCPageTurn3D action in action*


    #### Instant Actions


    You might wonder why there are instantaneous actions based on the `CCInstantAction`
    class (see [Figure 3–17](#Chapter03.html#fig_3_17) for the class hierarchy), when
    you could just as well change the node’s property to achieve the same effect.
    For example, there are instant actions to flip the node, to place it at a specific
    location, or to toggle its visible property.


    ![images](images/0317.jpg)


    **Figure 3–17.** *The CCActionInstant class hierarchy*


    The main reason that instant actions exist is because they are useful in action
    sequences. Sometimes in a sequence of actions you have to change a certain property
    of the node, such as visibility or position, and then continue with the sequence.
    Instant actions make this possible. True, they are rarely used—with one exception:
    `CCCallFunc` actions.


    When using an action sequence, you may want to be notified at certain times, for
    example when the sequence has ended, and then perhaps start another sequence immediately
    thereafter. To do this, you can make use of several versions of `CCCallFunc` actions
    that will send a message whenever it is their turn in the sequence. Let’s rewrite
    the color cycle sequence so that it calls a method each time one of the `CCTintTo`
    actions has done its job:


    `CCCallFunc* func = [CCCallFunc actionWithTarget:self`

    `                                       selector:@selector(onCallFunc)];`


    `CCCallFuncN* funcN = [CCCallFuncN actionWithTarget:self`

    `                                          selector:@selector(onCallFuncN:)];`


    `CCCallFuncND* funcND = [CCCallFuncND actionWithTarget:self`

    `                                             selector:@selector(onCallFuncND:data:)`

    `                                                 data:(void*)self];`


    `CCCallFuncO* funcO = [CCCallFuncO actionWithTarget:self`

    `                                          selector:@selector(onCallFuncO:)`

    `                                            object:(id)self];`


    `CCSequence* seq = [CCSequence actions:`![images](images/U002.jpg)

    `    tint1, func, tint2, funcN, tint3, funcND, funcO, nil];`

    `[label runAction:seq];`


    The difference between these variants of `CCCallFunc` is in which selector they
    will be calling and thus which context is available to the method they call. For
    example, when `CCCallFunc` calls the `onCallFunc` method, you have no way of knowing
    who called the method or why. There’s no context, but in many cases that context
    is not needed.


    The action sequence `seq` will call the methods in the following code one after
    another. The `sender` parameter will always be derived from `CCNode`; it’s the
    node that’s running the actions. The data parameter can be used in any way you
    want, including passing values, structs, or other pointers. You only have to properly
    cast the data pointer.


    `-(void) onCallFunc`

    `{`

    `        CCLOG(@"end of tint1!");`

    `}`


    `-(void) onCallFuncN:(id)sender`

    `{`

    `        CCLOG(@"end of tint2! sender: %@", sender);`

    `}`


    `-(void) onCallFuncND:(id)sender data:(void*)data`

    `{`

    `        // be careful when casting pointers like this!`

    `        // you have to be 100% sure the object is of this type!`

    `        CCSprite* sprite = (CCSprite*)data;`

    `        CCLOG(@"end of sequence! sender: %@ - data: %@", sender, sprite);`

    `}`

    **`-(void) onCallFuncO:(id)object`**

    `{`

    `    // object is the object you passed to CCCallFuncO`

    `    CCLOG(@"call func with object %@", object);`

    `}`


    Of course, the `CCCallFunc` actions also work with `CCRepeatForever` sequences.
    Your methods will be called repeatedly at the appropriate time.'
  trans: "\n### 缓动动作\n\n通过使用基于`CCActionEase`类的动作，动作会变得更加强大。缓动动作允许你随时间改变动作的效果。例如，如果你对一个节点使用`CCMoveTo`动作，该节点会以恒定速度移动整个距离直至到达终点。使用`CCActionEase`，你可以让节点先缓慢移动，然后加速移向目标，或者相反。你也可以让它越过目标位置一小段距离后再弹回。缓动动作可以创造出通常需要大量时间才能实现的非常动态的动画效果。以下代码展示了如何使用缓动动作来修改常规动作的行为。`rate`参数决定了缓动效果的显著程度，并且必须大于\
    \ 1 才能看到效果。\n\n```\n// 我希望 myNode 在 3 秒内移动到 100, 200 的位置\nCCMoveTo* move = [CCMoveTo\
    \ actionWithDuration:3 position:CGPointMake(100, 200)];\n// 这次，节点应该在移动过程中先缓慢加速，再减速\n\
    CCEaseInOut* ease = [CCEaseInOut actionWithAction:move rate:4];\n[myNode runAction:ease];\n\
    ```\n\n**注意：** 在示例中，是缓动动作在节点上运行，而不是移动动作。在处理动作时，很容易忘记修改`runAction`这一行。即使是经验最丰富的\
    \ cocos2d 开发者，也经常会犯这个常见错误。如果你发现动作没有按预期工作或完全不起作用，请仔细检查你运行的是否是正确动作。如果使用了正确的动作但仍未达到预期效果，请验证是否是正确的节点在运行该动作。这是另一个常见错误。\n\
    \nCocos2d 实现了以下`CCActionEase`类：\n\n- `CCEaseBackIn`、`CCEaseBackInOut`、`CCEaseBackOut`\n\
    - `CCEaseBounceIn`、`CCEaseBounceInOut`、`CCEaseBounceOut`\n- `CCEaseElasticIn`、`CCEaseElasticInOut`、`CCEaseElasticOut`\n\
    - `CCEaseExponentialIn`、`CCEaseExponentialInOut`、`CCEaseExponentialOut`\n- `CCEaseIn`、`CCEaseInOut`、`CCEaseOut`\n\
    - `CCEaseSineIn`、`CCEaseSineInOut`、`CCEaseSineOut`\n\n在第 4 章中，我将在 DoodleDrop 项目中使用其中一些缓动动作，以便你能看到它们的效果。我已在图\
    \ 3–13 中添加了`CCActionEase`类的层次结构供参考。\n\n![images](img/0313.jpg)\n\n**图 3–13.**\
    \ *`CCActionEase`* *类层次结构*\n\n### 网格动作\n\n网格动作是纯视觉动作，派生自`CCGridAction`及其两个子类之一：`CCGrid3DAction`和`CCTiledGrid3DAction`。它们的类层次结构分别如图\
    \ 3–14 和图 3–15 所示。\n\n![images](img/0314.jpg)\n\n**图 3–14.** *`CCGrid3DAction`*\
    \ *类层次结构*\n\n![images](img/0315.jpg)\n\n**图 3–15.** *`CCTiledGrid3DAction`* *类层次结构*\n\
    \n网格动作的特色在于三维效果，例如翻页（`CCPageTurn3D`；参见图 3–16）或模拟波浪和液体（`CCWaves`、`CCLiquid`）。缺点是，除非你启用深度缓冲，否则\
    \ 3D 效果可能会出现视觉伪影。启用深度缓冲需要更多内存，并对渲染性能产生负面影响，尤其是在第一代和第二代设备上。\n\n要启用深度缓冲，你需要修改项目中应用代理类中初始化`EAGLView`类的代码行，以添加深度缓冲支持。具体操作是将`depthFormat`参数从其默认值\
    \ 0 改为`GL_DEPTH_COMPONENT16_OES`（用于 16 位深度缓冲）或`GL_DEPTH_COMPONENT24_OES`（用于 24\
    \ 位深度缓冲）：\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n\
                                   pixelFormat:kEAGLColorFormatRGB565\n                               depthFormat:GL_DEPTH_COMPONENT16_OES];\n\
    ```\n\n理想情况下，你应该先尝试 16 位深度缓冲；它占用更少的内存，但在极少数情况下，如果使用 3D 动作时仍然出现视觉伪影，则可能需要 24 位深度缓冲。\n\
    \n![images](img/0316.jpg)\n\n**图 3–16.** *运行中的* `CCPageTurn3D` *动作*\n\n### 即时动作\n\
    \n你可能会想，既然可以直接改变节点属性达到相同效果，为什么还需要基于`CCInstantAction`类的即时动作（类层次结构见图 3–17）？例如，存在一些即时动作用于翻转节点、将其放置到特定位置或切换其可见性属性。\n\
    \n![images](img/0317.jpg)\n\n**图 3–17.** *`CCActionInstant`* *类层次结构*\n\n即时动作存在的主要原因在于它们在动作序列中非常有用。有时，在动作序列中你需要改变节点的某个属性（如可见性或位置），然后继续执行序列。即时动作使这成为可能。诚然，它们很少被使用——但有一个例外：`CCCallFunc`动作。\n\
    \n在使用动作序列时，你可能希望在特定时刻收到通知，例如序列结束时，然后可能在之后立即启动另一个序列。为此，你可以使用`CCCallFunc`动作的几个变体，这些变体会在序列中轮到它们时发送一条消息。让我们重写颜色循环序列，使其在每个`CCTintTo`动作完成其任务时调用一个方法：\n\
    \n```\nCCCallFunc* func = [CCCallFunc actionWithTarget:self\n                                       selector:@selector(onCallFunc)];\n\
    \nCCCallFuncN* funcN = [CCCallFuncN actionWithTarget:self\n                                          selector:@selector(onCallFuncN:)];\n\
    \nCCCallFuncND* funcND = [CCCallFuncND actionWithTarget:self\n                                             selector:@selector(onCallFuncND:data:)\n\
                                                     data:(void*)self];\n\nCCCallFuncO*\
    \ funcO = [CCCallFuncO actionWithTarget:self\n                                          selector:@selector(onCallFuncO:)\n\
                                                object:(id)self];\n\nCCSequence* seq\
    \ = [CCSequence actions:\n    tint1, func, tint2, funcN, tint3, funcND, funcO,\
    \ nil];\n[label runAction:seq];\n```\n\n这些`CCCallFunc`变体之间的区别在于它们调用的选择器不同，因此它们所调用的方法可访问的上下文也不同。例如，当`CCCallFunc`调用`onCallFunc`方法时，你无法知道是谁调用了该方法或为什么调用。没有上下文信息，但在许多情况下，这种上下文是不需要的。\n\
    \n动作序列`seq`将依次调用以下代码中的方法。`sender`参数始终派生自`CCNode`，即正在运行动作的节点。`data`参数可以以任何你希望的方式使用，包括传递值、结构体或其他指针。你只需正确地转换数据指针即可。\n\
    \n```\n-(void) onCallFunc\n{\n        CCLOG(@\"tint1 结束!\");\n}\n\n-(void) onCallFuncN:(id)sender\n\
    {\n        CCLOG(@\"tint2 结束! 发送者: %@\", sender);\n}\n\n-(void) onCallFuncND:(id)sender\
    \ data:(void*)data\n{\n        // 像这样转换指针时要小心！\n        // 你必须 100%确定该对象属于此类型！\n\
    \        CCSprite* sprite = (CCSprite*)data;\n        CCLOG(@\"序列结束! 发送者: %@ -\
    \ 数据: %@\", sender, sprite);\n}\n-(void) onCallFuncO:(id)object\n{\n    // object\
    \ 是你传递给 CCCallFuncO 的对象\n    CCLOG(@\"使用对象 %@ 调用 func\", object);\n}\n```\n\n\
    当然，`CCCallFunc`动作也可以与`CCRepeatForever`序列一起使用。你的方法将在适当的时间被重复调用。\n"
- fmt: '### A Note on Singletons in cocos2d


    Cocos2d makes good use of the Singleton design pattern, which I believe deserves
    mention because it’s regularly and hotly debated. In principle, a singleton is
    a regular class that is instantiated only once during the lifetime of the application.
    To ensure that this is the case, a static method is used to both create and access
    the instance of the object. So, instead of using `alloc`/`init` or a static autorelease
    initializer, you gain access to a singleton object via methods that begin with
    `shared`. Here are some of cocos2d’s most-used singleton classes and how you access
    them:


    ```

    CCActionManager* sharedManager = [CCActionManager sharedManager];

    CCDirector* sharedDirector = [CCDirector sharedDirector];

    CCSpriteFrameCache* sharedCache = [CCSpriteFrameCache sharedSpriteFrameCache];

    CCTextureCache* sharedTexCache = [CCTextureCache sharedTextureCache];

    CCTouchDispatcher* sharedDispatcher = [CCTouchDispatcher sharedDispatcher];

    CDAudioManager* sharedManager = [CDAudioManager sharedManager];

    SimpleAudioEngine* sharedEngine = [SimpleAudioEngine sharedEngine];

    ```


    The upside of a singleton is that it can be used anywhere by any class at any
    time. It acts almost like a global class, much like global variables. Singletons
    are very useful if you have a combination of data and methods you need to use
    in many different places. Audio is a good example of this, because any of your
    classes—whether the player, an enemy, a menu button, or a cutscene—might want
    to play a sound effect or change the background music. So, it makes a lot of sense
    to use a singleton for playing audio. Likewise, if you have global game stats,
    perhaps the size of the player’s army and each platoon’s number of troops, you
    might want to store that information in a singleton so you can carry it over from
    one level to another. Implementing a singleton is straightforward, as [Listing
    3–2](#Chapter03.html#list_3_2) shows. This code implements the class `MyManager`
    as a singleton with minimal code. The `sharedManager` static method grants access
    to the single instance of `MyManager`. If the instance doesn’t exist, a `MyManager`
    instance will be allocated and initialized; otherwise, the existing instance is
    returned.


    **Listing 3–2.** *Implementing the Exemplary Class MyManager as a Singleton*


    ```

    static MyManager *sharedManager = nil;


    +(MyManager*) sharedManager

    {

        if (sharedManager == nil)

        {

            sharedManager = [[MyManager alloc] init];

        }

        return sharedManager;

    }

    ```


    However, singletons also have ugly sides. Because they’re simple to use and implement
    and can be accessed from any other class, there’s a tendency to overuse them.
    They’re like global variables that most programmers agree should be used scarcely
    and judiciously.


    For example, you might think you have only one player object, so why not make
    the player class a singleton? Everything seems to be fine—until you realize that
    whenever the player advances from one level to another, the singleton not only
    keeps the player’s score but also his last animation frame, his health, and all
    the items he has picked up, and then he might even begin the new level in Berserk
    mode because that mode was active when he left the previous level.


    To fix that, you add another method to reset certain variables when changing levels.
    So far, so good, but as you add more features to the game, you’ll end up having
    to add and maintain more and more variables when switching a level. What’s worse,
    suppose one day a friend suggests you give the iPad version a two-player mode.
    But, oh wait, your player is a singleton; you can have only one player at any
    time! This gives you a major headache: refactor a lot of code or miss out on the
    cool two-player mode?


    Or why not make the second player a singleton, too? And whenever the second player
    needs to know something of the first player, it’ll just use that singleton. So,
    they keep a reference to each other, which means you can’t have a single-player
    game without initializing the other players as well. This is one side effect of
    classes strongly dependent on each other, also known as *tight coupling*. The
    more classes are tightly coupled with each other, the harder it is to make changes
    to any part of your code. It’s like you’re mixing cement that’s slowly drying
    up until it’s so hard that any change is easier done by hacking it, instead of
    improving the code. That’s the point where bugs seem to occur everywhere, at random,
    with no connection to a recent change. In one word: frustrating.


    The more you rely on singletons, the more likely such issues will arise. Before
    creating a singleton class, always consider whether you really need only one instance
    of this class and its data and whether this might change at a later time.


    I understand it’s hard for a beginner to judge when and where to use a singleton,
    particularly if you haven’t had much experience with object-oriented programming.
    The Q&A web site Stackoverflow.com hosts a discussion with additional links that
    illustrates the controversy around the Singleton design pattern and gives some
    food for thought: [`http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons`](http://stackoverflow.com/questions/137975/what-is-so-bad-about-singletons).


    My advice is to study popular uses of singletons. The use of singletons in the
    cocos2d game engine for resource management is acceptable, since it simplifies
    the overall design of the game engine. Most other game engines use singletons
    for similar purposes as well, and I’ve rarely heard anyone complain about that.
    And you’ll even find singletons in the iOS SDK. Singletons are generally not as
    bad as some make them sound like, although they do tend to be very problematic
    by introducing strong dependencies, and the problems grow exponentially with the
    size of the code base.


    ### Cocos2d Test Cases


    Did you know that cocos2d comes with a lot of sample code? In your cocos2d-iphone
    folder, you’ll find a project aptly named cocos2d-iphone that contains a lot of
    test targets you can build and run. You can see how things work and then check
    the code to see how it’s implemented.


    ### Summary


    Wow! That was a lot to take in! I don’t expect you to remember all of this chapter’s
    content at once. Feel free to come back at any time to look again at cocos2d’s
    scene graph and how to use the various `CCNode` classes. I wrote this chapter
    to be a good reference whenever you need it, as well as the accompanying NodeHierarchy
    and Essentials Xcode projects.


    Armed with this chapter’s knowledge and a fair bit of motivation on your side,
    you could be starting to write your own games now.


    You know what, let’s do that together. Read on to the next chapter, and I’ll walk
    you through your first complete game project!


    ## Chapter 4


    ## Your First Game


    In this chapter you’ll build your first complete game. It won’t win any awards,
    but you’ll learn how to get the essential elements of cocos2d to work together.
    I’ll guide you through the individual steps, so you’ll also learn a bit about
    working with Xcode along the way.


    The game is the inversion of the famous Doodle Jump game, aptly named DoodleDrop.
    The player’s goal is to avoid falling obstacles for as long as possible by rotating
    the device to move the player sprite. Take a look at the final version in [Figure
    4–1](#Chapter04.html#fig_4_1) to get an idea of what you’ll be creating in this
    chapter.


    ![images](images/0401.jpg)


    **Figure 4–1.** *The final version of the DoodleDrop game*'
